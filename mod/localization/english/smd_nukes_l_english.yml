 STRAT_BOMBING_HEADER: "Strategic Bombing"
 BOMBING_ADD_TARGET_TOOLTIP: "Add this state to the bombing list for the next run."
 BOMBING_REMOVE_TARGET_TOOLTIP: "Remove this state from the bombing list."
 BOMBING_EXECUTE_TOOLTIP: "Execute a strategic bombing run against all targeted states. Devastation is added based on the number of qualifying air formations. 30 day cooldown applies."
 
 NUCLEAR_ICBM_PROGRESS_TOOLTIP: "ICBM development progress. At 100%, nuclear weapons can target any state globally."
 NUCLEAR_ICBM_TOOLTIP: "Begin development of intercontinental ballistic missiles. Requires nuclear capability. Takes several years. Once complete, nuclear weapons can target any state in the world — not just neighbouring ones."
 
 CONV_PRODUCE_MISSILES_TOOLTIP: "Manufacture a salvo of 5 conventional missiles. Small ongoing production cost. Missiles are consumed on firing — one per targeted state."
 
 missile_production_cost:0 "Missile Production"
 state_buy_orders_missiles_add:0 "Missile Consumption"
 
 CONV_DEPLOY_10_TOOLTIP: "Fire 10% of your missile stockpile against targeted states."
 CONV_DEPLOY_25_TOOLTIP: "Fire 25% of your missile stockpile against targeted states."
 CONV_DEPLOY_50_TOOLTIP: "Fire 50% of your missile stockpile against targeted states."
 CONV_DEPLOY_75_TOOLTIP: "Fire 75% of your missile stockpile against targeted states."
 CONV_DEPLOY_100_TOOLTIP: "Fire your entire missile stockpile against targeted states."
 
 CONV_BUILDING_CHANCE_TOOLTIP: "Each missile fired rolls a 3% chance to destroy one of the following buildings in its targeted state, if present:\n\n• Airport\n• Barracks\n• Naval Base\n• Nuclear Power Plant\n• Nuclear Silo\n• Government Administration\n• Railway\n\nAll building types are rolled independently. A single missile salvo may destroy multiple buildings in the same state if it is large enough."
 
 nuclear_events.12.t: "Missile Strike on [ROOT.GetName]"
 nuclear_events.12.d: "[SCOPE.sCountry('missile_attacker').GetName] has launched a conventional missile strike against [ROOT.GetAdjective] territory. Reports are coming in of impacts across [ROOT.GetAdjective] states — infrastructure damage is being assessed.\n\nThe missiles were not nuclear, but the message is clear. [SCOPE.sCountry('missile_attacker').GetName] is willing to use long-range weapons against us."
 nuclear_events.12.f: "The craters are already there. The question is what we do next."
 nuclear_events.12.a: "Assess the damage and respond accordingly"

 missile_strike_victim_modifier: "Conventional Missile Strike"
 missile_strike_victim_modifier_desc: "Our territory has been targeted by a conventional missile strike. Infrastructure damage and public anxiety are elevated."

 # ── EVENT 13: RETALIATION CHOICE ───────────

 nuclear_events.13.t: "Nuclear Retaliation — Decision Required"
 nuclear_events.13.d: "[SCOPE.sCountry('nuclear_attacker').GetName] has launched nuclear weapons against [ROOT.GetName]. Our warheads are armed. The launch codes are ready.\n\nA retaliatory strike against [SCOPE.sCountry('nuclear_attacker').GetAdjective] territory would consume 25% of our arsenal and strike all [SCOPE.sCountry('nuclear_attacker').GetAdjective] states. The strike would carry no infamy — the world will understand.\n\nThe alternative is to absorb the attack. There is no dishonour in survival."
 nuclear_events.13.f: "The order only needs to be given once."
 nuclear_events.13.a: "Retaliate — launch 25% of the arsenal against [SCOPE.sCountry('nuclear_attacker').GetName]"
 nuclear_events.13.b: "Stand down — absorb the strike, preserve the arsenal"

 nuclear_first_strike_response: "Nuclear Retaliation (First Strike Response)"
 nuclear_first_strike_response_desc: "[ROOT.GetName] has launched a nuclear counterstrike in response to an unprovoked nuclear attack on its territory. The international community recognises the right to retaliation — infamy gain is significantly reduced."

 nuclear_absorbed_first_strike: "Nuclear Strike Absorbed"
 nuclear_absorbed_first_strike_desc: "[ROOT.GetName] endured a nuclear strike without retaliating. The restraint has been noted internationally. Diplomatic standing and prestige are considerably enhanced."

 # ── EVENT 14: RETALIATION NOTIFICATION ─────

 nuclear_events.14.t: "Nuclear Retaliation Inbound"
 nuclear_events.14.d: "Our nuclear strike has been answered. [ROOT.GetName] has launched a retaliatory strike — warheads are confirmed inbound.\n\nWe initiated the exchange. The consequences are ours to bear."
 nuclear_events.14.f: "Every strike invites the next one."
 nuclear_events.14.a: "Brace for impact"