 CONV_TARGET_GOVERNMENT_TOOLTIP: "Target government administration buildings. Each missile has a 3% chance of destroying them."
 CONV_TARGET_RAILWAY_TOOLTIP: "Target railway infrastructure. Each missile has a 3% chance of destroying the railway."
 CONV_ADD_TARGET_TOOLTIP: "Add this state to the conventional missile strike list."
 CONV_REMOVE_TARGET_TOOLTIP: "Remove this state from the conventional missile strike list."
