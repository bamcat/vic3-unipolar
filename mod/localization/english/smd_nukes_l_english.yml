 CONV_TARGET_AIRPORT_TOOLTIP: "Target airports in selected states. Each missile has a 3% chance of destroying the airport building."
 CONV_TARGET_BARRACKS_TOOLTIP: "Target barracks. Each missile has a 3% chance of destroying barracks in each targeted state."
 CONV_TARGET_NAVAL_TOOLTIP: "Target naval bases. Each missile has a 3% chance of destroying naval infrastructure."
 CONV_TARGET_NUCLEAR_PLANT_TOOLTIP: "Target nuclear power plants. Each missile has a 3% chance of destroying the facility."
