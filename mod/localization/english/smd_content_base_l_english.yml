 great_polarization.1.t:0 "The Great Polarization"
 great_polarization.1.d:0 "The United States is entering a new era of political polarization, driven by media fragmentation, culture-war politics, and mutual fear between ideological blocs."
 great_polarization.1.f:0 "Every election becomes existential. Every scandal becomes proof. Every tragedy becomes a weapon."
 great_polarization.1.a:0 "The center begins to crack."
 great_polarization.30.t:0 "The Killing of George Floyd"
 great_polarization.30.d:0 "The killing of George Floyd by police has triggered a nationwide protest wave, with demands for accountability, policing reform, and racial justice."
 great_polarization.30.f:0 "The video does not stay local. It becomes a national indictment."
 great_polarization.30.a:0 "The streets erupt."
 great_polarization.30.b:0 "Promise serious reform."
 great_polarization.31.t:0 "CHOP / CHAZ"
 great_polarization.31.d:0 "An occupied protest zone has formed in Seattle, becoming a national symbol of both anti-police activism and fears of state retreat."
 great_polarization.31.f:0 "To its supporters, it is community self-rule. To its opponents, it is collapse in miniature."
 great_polarization.31.a:0 "Let the standoff play out."
 great_polarization.31.b:0 "Clear the zone."
 great_polarization.32.t:0 "Attempted Assassination in Butler"
 great_polarization.32.d:0 "An attempted assassination of Donald Trump at a rally in Butler, Pennsylvania has intensified fears of political violence and revenge."
 great_polarization.32.f:0 "The image travels faster than the facts."
 great_polarization.32.a:0 "The right rallies in anger."
 great_polarization.32.b:0 "Appeal for national calm."
 great_polarization.33.t:0 "No Kings"
 great_polarization.33.d:0 "Mass demonstrations under the slogan 'No Kings' have filled streets across the country, framed by supporters as a defense of democracy and by opponents as destabilizing resistance."
 great_polarization.33.f:0 "The crowd chants against monarchy in a republic that fears it has forgotten the difference."
 great_polarization.33.a:0 "The movement spreads."
 great_polarization.33.b:0 "Defuse the confrontation."
 great_polarization.34.t:0 "Minnesota Lawmakers Targeted"
 great_polarization.34.d:0 "Shootings targeting Minnesota state lawmakers have deepened national fear that political disputes are sliding into organized violence."
 great_polarization.34.f:0 "A doorstep becomes a front line."
 great_polarization.34.a:0 "Security becomes politics."
 great_polarization.34.b:0 "Condemn political violence across the spectrum."
 great_polarization.35.t:0 "Charlie Kirk Assassinated"
 great_polarization.35.d:0 "The assassination of Charlie Kirk while speaking at a public event has become a flashpoint in America's escalating political crisis."
 great_polarization.35.f:0 "A microphone falls silent; a movement grows louder."
 great_polarization.35.a:0 "The right radicalizes."
 great_polarization.35.b:0 "Condemn the killing and lower the temperature."
 great_polarization.36.t:0 "ICE Shootings"
 great_polarization.36.d:0 "Fatal shootings involving federal immigration agents have triggered anti-ICE protests, national outrage, and fierce arguments over federal power."
 great_polarization.36.f:0 "The badge becomes the argument."
 great_polarization.36.a:0 "The protests spread."
 great_polarization.36.b:0 "Suspend operations and investigate."
 great_polarization.37.t:0 "Voting Rights Act Gutted"
 great_polarization.37.d:0 "A Supreme Court ruling has sharply weakened the Voting Rights Act, igniting accusations that minority voting power is being dismantled before the 2026 elections."
 great_polarization.37.f:0 "The court speaks in doctrine. The country hears power."
 great_polarization.37.a:0 "Trust collapses."
 great_polarization.37.b:0 "Pursue emergency voting-rights legislation."
 great_polarization.100.t:0 "The Second American Civil War"
 great_polarization.100.d:0 "A revolutionary crisis has broken the United States. Federal authority is contested, and armed factions are beginning to carve the country into rival governments."
 great_polarization.100.f:0 "The first civil war asked whether the union could survive. The second asks what the union even is."
 great_polarization.100.a:0 "The union fractures."
 great_polarization.120.t:0 "An Offer from Blue America"
 great_polarization.120.d:0 "Blue America offers recognition, protection, and wartime cooperation in exchange for joining its side in the civil war."
 great_polarization.120.f:0 "Neutrality is hard to keep when the map is burning."
 great_polarization.120.a:0 "Join Blue America."
 great_polarization.120.b:0 "Remain apart."
 great_polarization.121.t:0 "An Offer from Red America"
 great_polarization.121.d:0 "Red America offers recognition, protection, and wartime cooperation in exchange for joining its side in the civil war."
 great_polarization.121.f:0 "The question is no longer whether to fight, but under whose flag."
 great_polarization.121.a:0 "Join Red America."
