 great_polarization.1.t:0 "The Great Polarization"
 great_polarization.1.d:0 "The United States is entering a new era of political polarization, driven by media fragmentation, culture-war politics, and mutual fear between ideological blocs."
 great_polarization.1.f:0 "Every election becomes existential. Every scandal becomes proof. Every tragedy becomes a weapon."
 great_polarization.1.a:0 "The center begins to crack."

 great_polarization.2.t:0 "Politically Motivated Mass Shooting"
 great_polarization.2.d:0 "A mass shooting tied to extremist political rhetoric has shocked the country. Competing factions immediately argue over blame, security, civil liberties, and ideology."
 great_polarization.2.f:0 "The dead are mourned. The narrative is fought over before the funerals begin."
 great_polarization.2.a:0 "The outrage feeds the divide."
 great_polarization.2.b:0 "Seek a serious bipartisan response."

 great_polarization.3.t:0 "Attempted Assassination"
 great_polarization.3.d:0 "An attempted assassination of a political figure has raised fears that political violence is becoming normalized."
 great_polarization.3.f:0 "The shot missed its target, but struck the republic."
 great_polarization.3.a:0 "The country recoils."
 great_polarization.3.b:0 "Expand protective security."

 great_polarization.4.t:0 "Algorithmic Outrage"
 great_polarization.4.d:0 "Social media platforms have amplified political outrage, exposing millions to radical content, conspiracy networks, and identity-driven counter-mobilization."
 great_polarization.4.f:0 "The feed does not persuade. It escalates."
 great_polarization.4.a:0 "The outrage machine accelerates."
 great_polarization.4.b:0 "Pressure platforms to moderate."

 great_polarization.5.t:0 "A Wave of Exposure"
 great_polarization.5.d:0 "A wave of public allegations against powerful figures has triggered a national reckoning over abuse, gender, and institutional hypocrisy."
 great_polarization.5.f:0 "What had been whispered is now searchable."
 great_polarization.5.a:0 "The reckoning spreads."
 great_polarization.5.b:0 "Build institutional channels for accountability."

 great_polarization.6.t:0 "Minorities Targeted"
 great_polarization.6.d:0 "A surge of hostility toward minority communities has triggered protests, counter-protests, and a renewed debate over racism, identity, and national belonging."
 great_polarization.6.f:0 "For some, it is backlash. For others, it is survival."
 great_polarization.6.a:0 "The streets fill again."
 great_polarization.6.b:0 "Condemn the backlash and lower the temperature."

 great_polarization.20.t:0 "The Temperature Falls"
 great_polarization.20.d:0 "Polarization has not disappeared, but the most dangerous spiral has been interrupted. Political institutions have regained some legitimacy."
 great_polarization.20.f:0 "A republic survives not because its citizens agree, but because enough of them accept losing."
 great_polarization.20.a:0 "The union endures."

 great_polarization.21.t:0 "The Divide Entrenched"
 great_polarization.21.d:0 "The immediate crisis has not exploded into civil war, but polarization has become embedded in American political life."
 great_polarization.21.f:0 "The fever did not break. It became chronic."
 great_polarization.21.a:0 "The new normal."

