 # ==========================================
 # JOURNAL ENTRY
 # ==========================================
 
 je_covid_pandemic: "COVID-19 Pandemic"
 je_covid_pandemic_reason: "A novel respiratory coronavirus has emerged in [ROOT.GetCountry.GetName] and is spreading rapidly across the world. COVID-19 spreads faster than any pathogen in living memory, exploiting the dense networks of trade and travel that bind the modern world together. Mortality is concentrated among the elderly and the immunocompromised — but its sheer reach threatens to overwhelm health systems in every country it touches.\n\nUse the #bold COVID-19 Response#! decision to set policy. Lockdowns slow the spread but hammer the economy. Masks and distancing are less effective but more sustainable. Doing nothing is a choice too — one the electorate and the dead will remember."
 
 # ==========================================
 # covid.1 — PANDEMIC ARRIVES
 # ==========================================
 
 covid.1.t: "A Novel Coronavirus"
 covid.1.d: "A cluster of unusual pneumonia cases has been reported in [SCOPE.sState('plague_origin_state').GetName], [ROOT.GetCountry.GetName]. Preliminary analysis by [ROOT.GetCountry.GetAdjective] health authorities suggests a previously unknown coronavirus — spreading human-to-human, with an incubation period long enough that carriers are contagious before they know they are sick.\n\nThe World Health Organization has been notified. Whether this remains a local outbreak or becomes something more depends on decisions made in the next weeks."
 covid.1.f: "A new pathogen. Again."
 covid.1.a: "Notify the WHO and begin contact tracing"
 
 # ==========================================
 # covid.2 — SPREAD
 # ==========================================
 
 covid.2.t: "COVID-19 Reaches [ROOT.GetCountry.GetName]"
 covid.2.d: "Cases of the novel coronavirus first identified in [SCOPE.sCountry('plague_originator_country').GetName] have been confirmed in [ROOT.GetCountry.GetName]. The virus has arrived — through a traveler, a trade route, or simply the invisible currents of a connected world.\n\n[ROOT.GetCountry.GetAdjective] health authorities are activating pandemic response protocols. Use the #bold COVID-19 Response#! decision to set policy."
 covid.2.f: "It was only a matter of time."
 covid.2.a: "Activate pandemic protocols"
 
 # ==========================================
 # covid.3 — SUBSEQUENT WAVES
 # ==========================================
 
 covid.3.t: "The Omicron Variant"
 covid.3.d: "A new variant has caused a fresh wave of COVID-19 infections. Health authorities are reassessing containment protocols."
 covid.3.f: "The virus is still with us."
 
 # ==========================================
 # covid.4 — NOTIFICATION TO OTHER PLAYERS
 # ==========================================
 
 covid.4.t: "The New Virus from Wuhan, China"
 covid.4.a: "Monitor the situation closely"
 
 # ==========================================
 # covid.5 — RESPONSE CHOICE
 # ==========================================
 
 covid.5.t: "COVID-19 Response Policy"
 covid.5.d: "How should [ROOT.GetCountry.GetName] respond to the pandemic? The choice will define the economic and social landscape of the next years."
 covid.5.f: "There are no good options. Only trade-offs."
 covid.5.a: "Full lockdown — close businesses, restrict movement"
 covid.5.b: "Mask mandates and social distancing guidelines"
 covid.5.c: "Keep the economy open — prioritize recovery"
 
 # ==========================================
 # covid.7 — WAR SUPPORT
 # ==========================================
 
 covid.7.t: "The Pandemic Undermines the War Effort"
 covid.7.d: "With COVID-19 ravaging [ROOT.GetCountry.GetName]'s population, [SCOPE.gsInterestGroup('pacifist_ig').GetName] — led by [SCOPE.sCharacter('pacifist_leader').GetFullName] — is questioning whether a country fighting a pandemic can sustain a war simultaneously. The population is exhausted. Field hospitals are competing with front-line logistics for resources."
 covid.7.f: "Fight the virus or fight the enemy. Doing both is hard."
 covid.7.a: "The war continues — the virus does not change that"
 covid.7.b: "Use public health messaging to maintain morale"
 covid.7.c: "Suppress the defeatist narrative"
 
 # ==========================================
 # covid.8 — POVERTY AND EVICTIONS
 # ==========================================
 
 covid.8.t: "The Economic Toll of the Pandemic"
 covid.8.d: "The pandemic has cost thousands of [ROOT.GetCountry.GetAdjective] workers their jobs, and in [SCOPE.sState('plague_poverty_state').GetName], unemployment has surpassed 20%. Families cannot pay rent. Landlords — backed by [SCOPE.gsInterestGroup('landowner_ig').GetName] — are pushing for the right to evict. Poverty is concentrating in the areas already hardest hit by the virus."
 covid.8.f: "A pandemic within the pandemic."
 covid.8.a: "Impose a rent freeze and eviction moratorium"
 covid.8.b: "Expand social security and unemployment benefits"
 covid.8.c: "The market will sort it out"
 
 # ==========================================
 # covid.9 — ANTI-MASK RESISTANCE
 # ==========================================
 
 covid.9.t: "Anti-Lockdown Protests"
 covid.9.d: "[SCOPE.gsInterestGroup('anti_mask_ig').GetName], led by [SCOPE.sCharacter('anti_mask_ig_leader').GetFullName], has organized mass protests against [ROOT.GetCountry.GetName]'s pandemic restrictions. Their position: the lockdowns and mask mandates are government overreach, the economic damage is greater than the health risk, and citizens have the right to make their own choices.\n\nThe protests are growing. How [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName] responds will set a precedent."
 covid.9.f: "Masks. The hill they chose."
 covid.9.a: "Hold firm — the restrictions stay"
 covid.9.b: "Stand down — lift the restrictions"
 covid.9.c: "Commission scientific rebuttals and public health campaigns"
 
 # ==========================================
 # DECISION
 # ==========================================
 
 covid_response: "COVID-19 Response"
 covid_response_desc: "Set [ROOT.GetCountry.GetName]'s policy for managing the COVID-19 pandemic. This decision can be taken every six months to adjust policy as the situation evolves."
 
