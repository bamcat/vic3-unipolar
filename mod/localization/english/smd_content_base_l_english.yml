 great_polarization.130.t:0 "Lead Blue America?"
 great_polarization.130.d:0 "With the United States fractured, the administration's liberal or center-left character places it closest to Blue America. You may continue the war as Blue America or remain with the remnants of the United States."
 great_polarization.130.f:0 "A government can claim continuity, but power follows the institutions that still obey."
 great_polarization.130.a:0 "Switch to Blue America."
 great_polarization.130.b:0 "Remain as the United States."

 great_polarization.131.t:0 "Lead Red America?"
 great_polarization.131.d:0 "With the United States fractured, the administration's right-wing character places it closest to Red America. You may continue the war as Red America or remain with the remnants of the United States."
 great_polarization.131.f:0 "The flag is the same shape, but the country beneath it has changed."
 great_polarization.131.a:0 "Switch to Red America."
 great_polarization.131.b:0 "Remain as the United States."

