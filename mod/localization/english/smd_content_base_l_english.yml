 rise_of_the_right.1.t:0 "The Rise of the Right"
 rise_of_the_right.1.d:0 "A new right-wing populist current has entered national politics. It draws strength from distrust of institutions, anger at elites, cultural backlash, and a fragmented media environment."
 rise_of_the_right.1.f:0 "The old parties still hold the offices. The new politics is learning how to hold the crowd."
 rise_of_the_right.1.a:0 "The political center is no longer safe."

 rise_of_the_right.10.t:0 "Algorithmic Anger"
 rise_of_the_right.10.d:0 "Online political networks have amplified anti-establishment outrage, giving right-wing populist movements new ways to organize outside traditional parties."
 rise_of_the_right.10.f:0 "A feed becomes a rally. A grievance becomes a platform."
 rise_of_the_right.10.a:0 "The outrage spreads."
 rise_of_the_right.10.b:0 "Push back through civic institutions."

 rise_of_the_right.11.t:0 "Migration Backlash"
 rise_of_the_right.11.d:0 "A surge of anger over immigration, integration, and national identity has strengthened right-wing movements."
 rise_of_the_right.11.f:0 "The border becomes a symbol for every fear the old order cannot answer."
 rise_of_the_right.11.a:0 "The backlash grows."
 rise_of_the_right.11.b:0 "De-escalate the debate."

 rise_of_the_right.12.t:0 "Populists Break Through"
 rise_of_the_right.12.d:0 "A right-wing populist faction has broken through the old party system, forcing mainstream parties to respond to its language and agenda."
 rise_of_the_right.12.f:0 "They were once outside the room. Now the room is built around them."
 rise_of_the_right.12.a:0 "The right surges."
 rise_of_the_right.12.b:0 "Rebuild the center."

 rise_of_the_right.13.t:0 "Street Politics"
 rise_of_the_right.13.d:0 "Demonstrations, counter-demonstrations, and viral confrontations have deepened the sense that politics has moved out of parliament and into the streets."
 rise_of_the_right.13.f:0 "The chant is policy in its larval form."
 rise_of_the_right.13.a:0 "The streets radicalize."
 rise_of_the_right.13.b:0 "Cool the temperature."

