 opec_events.1.t: "OPEC Vote Initiated"
 opec_events.1.d: "A member nation has called for a vote within the Organization of the Petroleum Exporting Countries. All members are invited to cast their votes through the OPEC journal entry."
 opec_events.1.a: "We shall consider our position"

 opec_events.10.t: "OPEC Vote Concluded"
 opec_events.10.d: "The OPEC vote has concluded and the results are being tallied."

 opec_events.11.t: "OPEC Increases Production"
 opec_events.11.d: "OPEC member states have voted to increase oil production quotas. For the next year, all member nations will benefit from higher extraction throughput and improved trade positioning for petroleum exports."
 opec_events.11.a: "The taps are open"

 opec_events.12.t: "OPEC Cuts Production"
 opec_events.12.d: "OPEC member states have voted to cut oil production quotas. For the next year, all member nations will restrict their oil output in order to tighten global supply and support prices."
 opec_events.12.a: "We will comply"

 opec_events.13.t: "OPEC Oil Embargo Imposed"
 opec_events.13.d: "The Organization of the Petroleum Exporting Countries has voted to impose an oil embargo. OPEC member states will collectively restrict petroleum exports to the targeted nation, severely disrupting their economy."
 opec_events.13.a: "This will reshape global trade"

