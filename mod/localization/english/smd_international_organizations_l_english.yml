 ### ORGANIZATIONS — Names & Descriptions
 ### ═══════════════════════════════════════

 ### United Nations
 io_un_name: "United Nations"
 io_un_abbreviation: "UN"
 io_un_desc: "The [concept_united_nations] is a [concept_cooperative_agreement] founded to maintain international peace and security, develop friendly relations among nations, and promote social progress. Unlike other [concept_intergovernmental_organization]s, the UN does not directly provide modifiers to its members. Its influence is exercised through diplomatic resolutions, peacekeeping mandates, and global initiatives."
 io_un_tooltip: "The [concept_united_nations] is a [concept_cooperative_agreement] of the world's nations.\nClick to view details."

 ### NATO
 io_nato_name: "North Atlantic Treaty Organization"
 io_nato_abbreviation: "NATO"
 io_nato_desc: "The [concept_nato] is a [concept_military_defense_agreement] established in 1949, binding North American and European nations in collective defense. An armed attack against one member is considered an attack against all. NATO coordinates joint military exercises, standardizes equipment, and maintains integrated command structures."

 ### G7
 io_g7_name: "[GetPlayer.GetCustom('io_g7_dynamic_name')]"
 io_g7_abbreviation: "G7"
 io_g7_desc: "The [concept_g7] is a [concept_financial_agreement] comprising the world's largest advanced economies. Members coordinate fiscal policy, monetary policy, and economic governance. Membership confers significant diplomatic influence and financial credibility."

 ### OPEC
 io_opec_name: "Organization of the Petroleum Exporting Countries"
 io_opec_abbreviation: "OPEC"
 io_opec_desc: "The [concept_opec] is a [concept_free_trade_agreement] of major oil-producing nations that coordinates petroleum policies among member countries. OPEC seeks to ensure stabilization of oil markets and fair returns for producing nations."

 ### EEC
 io_eec_name: "European Economic Community"
 io_eec_abbreviation: "EEC"
 io_eec_desc: "The [concept_eec] is a [concept_free_trade_agreement] establishing a common market among European member states. It reduces trade barriers, harmonizes economic regulations, and promotes the free movement of goods, services, capital, and labor across member nations."
 
 ### Arab League
 io_arab_league_name: "Arab League"
 io_arab_league_abbreviation: "LAS"
 io_arab_league_desc: "The [concept_arab_league] is a [concept_cultural_pact] of Arab-speaking nations that promotes political, economic, cultural, and social cooperation among its members. The League coordinates policies on matters of common interest and mediates disputes between Arab states."

 ### IMF
 io_imf_name: "International Monetary Fund"
 io_imf_abbreviation: "IMF"
 io_imf_desc: "The [concept_imf] is a [concept_financial_agreement] that promotes international monetary cooperation, exchange rate stability, and orderly exchange arrangements. It provides financial assistance and policy advice to member countries facing balance of payments difficulties."

 ### ESA
 io_esa_name: "European Space Agency"
 io_esa_abbreviation: "ESA"
 io_esa_desc: "The [concept_esa] is a [concept_cooperative_agreement] dedicated to the exploration and utilization of outer space. Member states pool resources to develop launch vehicles, satellites, and scientific missions that no single European nation could achieve alone."

 ### ASEAN
 io_asean_name: "Association of Southeast Asian Nations"
 io_asean_abbreviation: "ASEAN"
 io_asean_desc: "The [concept_asean] is a [concept_cooperative_agreement] of Southeast Asian nations promoting economic growth, social progress, and cultural development. ASEAN facilitates regional stability and provides a framework for multilateral dialogue in the Asia-Pacific region."

 ### WHO
 io_saarc_name: "South Asian Association for Regional Cooperation"
 io_saarc_desc: "The [concept_saarc] is a [concept_cooperative_agreement] among South Asian nations aimed at regional cooperation, development coordination, and multilateral dialogue."

 io_cis_name: "Commonwealth of Independent States"
 io_cis_desc: "The [concept_cis] is a [concept_cooperative_agreement] among post-Soviet states focused on regional consultation, economic coordination, and practical intergovernmental cooperation."

 io_who_name: "World Health Organization"
 io_who_abbreviation: "WHO"
 io_who_desc: "The [concept_who] is a [concept_cooperative_agreement] directing and coordinating international health policy. It provides leadership on global health matters, sets norms and standards, monitors health trends, and coordinates responses to international health emergencies."

 ### ═══════════════════════════════════════
 ### TREATIES — Names & Descriptions
 ### ═══════════════════════════════════════

 io_treaty_geneva_name: "Geneva Conventions"
 io_treaty_geneva_desc: "A series of treaties known as the Geneva Conventions are responsible for establishing standards of international law for humanitarian treatment during armed conflict. Signatories to the [concept_international_treaty] agree to protect wounded soldiers, prisoners of war, and civilians in wartime."

 io_treaty_cwc_name: "Chemical Weapons Convention"
 io_treaty_cwc_desc: "The Chemical Weapons Convention is an [concept_international_treaty] that prohibits the development, production, acquisition, stockpiling, retention, transfer, and use of chemical weapons. Signatories agree to destroy existing stockpiles under international verification."

 io_treaty_npt_name: "Non-Proliferation Treaty"
 io_treaty_npt_desc: "The Treaty on the Non-Proliferation of Nuclear Weapons is an [concept_international_treaty] aimed at preventing the spread of nuclear weapons, promoting disarmament, and facilitating the peaceful use of nuclear energy under international safeguards."

 io_treaty_bwc_name: "Biological Weapons Convention"
 io_treaty_bwc_desc: "The Biological Weapons Convention is an [concept_international_treaty] prohibiting the development, production, and stockpiling of biological and toxin weapons. It was the first multilateral disarmament treaty to ban an entire category of weapons."

 io_treaty_cat_name: "Convention Against Torture"
 io_treaty_cat_desc: "The Convention Against Torture is an [concept_international_treaty] prohibiting all forms of torture and cruel, inhuman, or degrading treatment or punishment. Signatories commit to effective measures to prevent torture within their jurisdiction."

 ### ═══════════════════════════════════════
 ### NGOs — Names & Descriptions
 ### ═══════════════════════════════════════

 io_iaea_name: "International Atomic Energy Agency"
 io_iaea_abbreviation: "IAEA"
 io_iaea_desc: "The IAEA promotes the peaceful use of nuclear energy and works to prevent its use for military purposes. It conducts inspections, provides technical assistance, and sets international safety standards for nuclear facilities."

 io_redcross_name: "International Red Cross"
 io_redcross_abbreviation: "ICRC"
 io_redcross_desc: "The International Red Cross provides humanitarian aid during armed conflicts and natural disasters. It monitors compliance with the Geneva Conventions, visits prisoners of war, and facilitates communication between separated family members."

 io_amnesty_name: "Amnesty International"
 io_amnesty_abbreviation: "AI"
 io_amnesty_desc: "Amnesty International investigates and exposes human rights abuses worldwide. It campaigns for the release of political prisoners, the abolition of torture and the death penalty, and the protection of refugees and migrants."

