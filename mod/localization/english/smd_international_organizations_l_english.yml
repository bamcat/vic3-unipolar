 # imf

 je_imf_loan: "IMF Loan Programme"
 je_imf_loan_reason: "An International Monetary Fund loan has been extended to [ROOT.GetCountry.GetName]. In exchange for emergency financing, the country has accepted significant conditions: high interest rates, mandatory free trade, and obligations to the great powers who underwrite the fund."

 imf_je_obligations_active_tt: "Great power obligations are still in effect. Foreign creditors maintain leverage over key economic policy decisions."
 imf_je_obligations_met_tt: "Great power obligations have been discharged. The country retains full economic sovereignty — though the loan conditions remain in force."

 decision_leave_imf: "Leave the IMF"
 decision_leave_imf_desc: "Withdraw from the International Monetary Fund. The country will no longer be eligible for IMF loan support if it approaches bankruptcy, but will be free of creditor obligations and interference. This decision cannot be reversed.\n\nNote: You cannot leave while holding an active IMF loan."
 imf_cannot_leave_while_indebted_tt: "Cannot leave the IMF while an active loan is in place"


 imf_button_pay_obligations_name: "Pay Off Obligations"
 imf_button_pay_obligations_desc: "Pay off the remaining great power obligations early. Costs 500 gold and requires debt below 50%, but immediately restores full economic sovereignty and improves relations with all great powers."
 imf_pay_obligations_cost_tt: "Requires scaled debt below 50% and 500 gold"
 imf_obligations_paid_tt: "Obligations paid off early. Great power relations improved."

 # imf_events.1 — Loan offer
 imf_events.1.t: "IMF Intervention"
 imf_events.1.d: "The treasury of [ROOT.GetCountry.GetName] is in crisis. Debt has reached a level that makes markets nervous and creditors cautious. The International Monetary Fund has taken notice — and has dispatched a delegation to offer emergency financing.\n\nThe terms are not generous. Interest rates will be set at punishing levels. The country will be required to adopt free trade, regardless of its existing economic policy. And the great powers who underwrite the fund will expect certain obligations to be met. But the alternative — approaching outright bankruptcy without a safety net — may be worse."
 imf_events.1.f: "Sovereignty and solvency are rarely available at the same time."
 imf_events.1.a: "Accept the loan — we need the financing"
 imf_events.1.b: "Refuse — we will manage our own affairs"

 # imf_events.2 — Great power notification
 imf_events.2.t: "IMF Loan Extended"
 imf_events.2.d: "[SCOPE.sCountry('imf_debtor_scope').GetName] has accepted an IMF loan package. As one of the great powers underwriting the fund, [ROOT.GetCountry.GetName] now holds obligations from the debtor nation. The arrangement comes with strategic as well as financial implications."
 imf_events.2.f: "Debt is a form of diplomacy."
 imf_events.2.a: "Good — this gives us leverage"
 imf_events.2.b: "Unfortunate — the terms imposed are too harsh"

 # imf_events.3 — Loan complete
 imf_events.3.t: "IMF Programme Concluded"
 imf_events.3.d: "Five years after accepting an IMF loan, [ROOT.GetCountry.GetName] has fulfilled its programme obligations. The interest payments have been made, the conditions endured, and the great power creditors satisfied. The country emerges from the experience with its sovereignty restored — and, one hopes, with its finances in better order than when it began."
 imf_events.3.f: "The ledger is balanced. The lessons are harder to measure."
 imf_events.3.a: "We have come through it"

 # imf_events.4 — Leaving
 imf_events.4.t: "Withdrawing from the IMF"
 imf_events.4.d: "[ROOT.GetCountry.GetName] is withdrawing from the International Monetary Fund. The decision reflects a conviction that the costs of membership — the conditions, the obligations, the loss of economic sovereignty during a crisis — outweigh the benefits of access to emergency financing.\n\nThe great powers will not be pleased. And should [ROOT.GetCountry.GetName] ever again approach bankruptcy, there will be no safety net."
 imf_events.4.f: "Independence has a price. So does dependency."
 imf_events.4.a: "We stand alone — as we should"

 # imf_events.5 — Great power notification of leaving
 imf_events.5.t: "A Country Has Left the IMF"
 imf_events.5.d: "[SCOPE.sCountry('imf_leaver_scope').GetName] has withdrawn from the International Monetary Fund. The decision is a rebuke to the international financial order — and signals that [SCOPE.sCountry('imf_leaver_scope').GetName] intends to chart its own economic course, for better or worse."
 imf_events.5.f: "One less debtor. One less lever."
 imf_events.5.a: "Noted"

 # imf_events.10 — War bonds
 imf_events.10.t: "War Bonds"
 imf_events.10.d: "With the treasury strained and the war ongoing, the Finance Ministry has proposed an emergency measure: the issuance of war bonds. Citizens and investors would be invited to lend money to the state in exchange for future repayment with interest, providing an immediate cash injection to fund the war effort.\n\nThe bonds will work — but they are debt, and debt in wartime compounds quickly. Supply consumption will rise as the money flows into the military machine."
 imf_events.10.f: "A nation borrows against its future to defend its present."
 imf_events.10.a: "Issue the bonds — we need the money now"
 imf_events.10.b: "Decline — we will not mortgage our future"

 imf_loan_modifier: "IMF Loan Conditions"
 imf_loan_modifier_desc: "An IMF loan is in place. Interest rates are punishingly high and free trade is mandatory. Foreign investment is flowing in, but economic sovereignty is constrained and legitimacy has suffered."

 imf_great_power_obligations: "Great Power Obligations"
 imf_great_power_obligations_desc: "The great powers who underwrite the IMF hold obligations from this country as a condition of the loan. Their leverage over economic policy is real."

 imf_refused_loan_modifier: "IMF Loan Refused"
 imf_refused_loan_modifier_desc: "The country declined IMF assistance and will manage its debt alone. Credit conditions have worsened as a result."

 imf_post_loan_stability: "Post-Programme Recovery"
 imf_post_loan_stability_desc: "The IMF programme has concluded. Having met its obligations, the government has gained a measure of credibility — and the country's finances are in better order."

 imf_left_modifier: "Outside the IMF"
 imf_left_modifier_desc: "This country has withdrawn from the IMF. It is free of creditor obligations but cut off from international emergency financing. Investment flows are reduced."

 war_bonds_modifier: "War Bonds Issued"
 war_bonds_modifier_desc: "Emergency war bonds have been issued to finance the war effort. Revenue is up, but debt is growing and supply consumption has increased."

 war_bonds_refused_modifier: "War Bonds Declined"
 war_bonds_refused_modifier_desc: "The government declined to issue war bonds. Fiscal discipline is maintained, but the army feels the pinch."

 un_events.6.t: "Our Forces Return From the UN Mission"
 un_events.6.d: "[ROOT.GetCountry.GetAdjective] forces have completed their service in the UN peacekeeping mission and are returning home. The contribution was modest in military terms but meaningful diplomatically — [ROOT.GetCountry.GetName] was present when it mattered. The general is back."
 un_events.6.a: "Welcome home"
 
 un_peacekeeping_contribution: "UN Peacekeeping Contribution"
 un_peacekeeping_contribution_desc: "[ROOT.GetCountry.GetName] contributed forces to a UN peacekeeping mission. The international community has taken note."
 
