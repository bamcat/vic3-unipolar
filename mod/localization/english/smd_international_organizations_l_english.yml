 ### GAME CONCEPTS
 ### ═══════════════════════════════════════

 concept_international_organization: "International Organization"
 concept_international_organization_desc: "International Organizations are institutions that operate across national borders to coordinate policy, promote trade, ensure collective security, or foster cultural exchange among their member nations. They come in several forms: [concept_free_trade_agreement]s, [concept_financial_agreement]s, [concept_military_defense_agreement]s, [concept_cultural_pact]s, and [concept_cooperative_agreement]s."

 concept_intergovernmental_organization: "Intergovernmental Organization"
 concept_intergovernmental_organization_desc: "An Intergovernmental Organization is an [concept_international_organization] whose members are sovereign nations. Unlike [concept_nongovernmental_organization]s, IGOs require formal membership and can provide significant diplomatic, economic, or military benefits."

 concept_nongovernmental_organization: "Non-Governmental Organization"
 concept_nongovernmental_organization_desc: "Non-Governmental Organizations are independent institutions that operate internationally without being controlled by any government. All nations are affiliated with NGOs by default. Governments may choose to ban, tolerate, or subsidize them, which affects the NGO's opinion and the benefits they provide."

 concept_international_treaty: "International Treaty"
 concept_international_treaty_desc: "An International Treaty is a formal binding agreement between sovereign nations. Unlike [concept_intergovernmental_organization]s, treaties do not require ongoing organizational membership — a nation is either a signatory or it is not. Signatories receive diplomatic benefits, while withdrawal damages relations with other signatories."

 international_treaty_type:0 "[concept_international_treaty]
 concept_free_trade_agreement: "Free Trade Agreement"
 concept_free_trade_agreement_desc: "A Free Trade Agreement is an [concept_international_organization] that reduces trade barriers between member nations, promoting the exchange of goods and economic growth."

 concept_financial_agreement: "Financial Agreement"
 concept_financial_agreement_desc: "A Financial Agreement is an [concept_international_organization] focused on monetary cooperation, development funding, and financial stability among its members. Members receive +5% Influence and +1 Diplomatic Reputation."

 concept_military_defense_agreement: "Military Defense Agreement"
 concept_military_defense_agreement_desc: "A Military Defense Agreement is an [concept_international_organization] built on the principle of collective security. An attack on one member is considered an attack on all."

 concept_cultural_pact: "Cultural Pact"
 concept_cultural_pact_desc: "A Cultural Pact is an [concept_international_organization] that promotes shared heritage, language, and cultural exchange among its members."

 concept_cooperative_agreement: "Cooperative Agreement"
 concept_cooperative_agreement_desc: "A Cooperative Agreement is an [concept_international_organization] focused on broad multilateral diplomacy. Unlike other organization types, Cooperative Agreements do not directly provide modifiers. Their influence is exercised through resolutions and initiatives."

 concept_united_nations: "United Nations"
 concept_united_nations_desc: "The United Nations is a [concept_cooperative_agreement] of the world's nations, dedicated to maintaining international peace, security, and cooperation."

 concept_nato: "NATO"
 concept_nato_desc: "The North Atlantic Treaty Organization is a [concept_military_defense_agreement] binding North American and European nations in collective defense."

 concept_g7: "G7"
 concept_g7_desc: "The Group of Seven is a [concept_financial_agreement] of the world's largest advanced economies, coordinating fiscal and monetary policy."

 concept_opec: "OPEC"
 concept_opec_desc: "The Organization of the Petroleum Exporting Countries is a [concept_free_trade_agreement] that coordinates petroleum policies among major oil-producing nations."

 concept_eec: "EEC"
 concept_eec_desc: "The European Economic Community is a [concept_free_trade_agreement] establishing a common market among European member states."

 concept_arab_league: "Arab League"
 concept_arab_league_desc: "The Arab League is a [concept_cultural_pact] promoting cooperation among Arab-speaking nations."

 concept_imf: "IMF"
 concept_imf_desc: "The International Monetary Fund is a [concept_financial_agreement] promoting international monetary cooperation and financial stability."

 concept_esa: "ESA"
 concept_esa_desc: "The European Space Agency is a [concept_cooperative_agreement] dedicated to space exploration and utilization."

 concept_asean: "ASEAN"
 concept_asean_desc: "The Association of Southeast Asian Nations is a [concept_cooperative_agreement] promoting economic growth and regional stability in Southeast Asia."

 concept_saarc: "SAARC"
 concept_saarc_desc: "The South Asian Association for Regional Cooperation is a [concept_cooperative_agreement] promoting regional cooperation among South Asian states."

 concept_cis: "CIS"
 concept_cis_desc: "The Commonwealth of Independent States is a [concept_cooperative_agreement] for coordination between several post-Soviet states."

 concept_who: "WHO"
 concept_who_desc: "The World Health Organization is a [concept_cooperative_agreement] directing and coordinating international health policy."

 concept_iaea: "IAEA"
 concept_iaea_desc: "The International Atomic Energy Agency is a [concept_nongovernmental_organization] that promotes peaceful use of nuclear energy and works to prevent nuclear proliferation."

