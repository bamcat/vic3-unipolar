 # ── TREATY ARTICLES ──────────────────────
 
 defense_attache: "Send Defense Attaché"
 defense_attache_desc: "Embed military advisors and liaison officers with the target country's armed forces. The target gains experience and reduces military costs; the source gains influence and diplomatic standing. The source country must maintain a larger power projection than the target."
 
 cultural_exchange: "Cultural Exchange"
 cultural_exchange_desc: "Establish a formal program of cultural exchange — shared exhibitions, academic programs, and people-to-people contact. Both countries gain prestige, influence, and become more attractive to migrants."
 
 research_partnership: "Research Partnership"
 research_partnership_desc: "A formal agreement to share research programs and academic institutions. Both countries benefit from improved research speed and technology spread. Requires both parties to be at least recognized powers."
 
 human_development_collaboration: "Human Development Collaboration"
 human_development_collaboration_desc: "The wealthier country funds development programs in the target — healthcare, education, welfare. The source pays ongoing costs in exchange for influence and prestige. The agreement breaks if the source country's economy falls below the target's."
 
 research_partnership_rank_tt: "Both countries must be at least recognized powers to enter a research partnership"
 
