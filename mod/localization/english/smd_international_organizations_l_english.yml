 io_events.10.d: "The member states of the European Economic Community have agreed to deepen their integration through the Treaty on European Union. The EEC will be formally transformed into the European Union, a political and economic union with expanded competencies in foreign policy, justice, and monetary affairs."
 io_events.10.a: "A new era for Europe"
 
 io_events.11.t: "The European Union is Born"
 io_events.11.d: "The European Economic Community has been formally transformed into the European Union. As a member state, our nation is now part of an unprecedented experiment in supranational governance."
 io_events.11.a: "A new chapter begins"
 
