 un_events.300.t: "UN Resolution Passed"
 un_events.300.d: "The General Assembly has agreed on a resolution to address worldwide issues and coordinate global cooperation on a given topic"
 un_events.300.f: "The resolution carries the weight of international consensus — for what that is worth."
 un_events.300.a: "Noted"
 
 UN_RES_DESC_ENVIRONMENT: "#bold Resolution on Environmental Protection#!\nMember states commit to coordinated environmental standards and sustainable resource management.\n\n#tooltip_separator!\n@green_checkmark! All countries receive the #bold UN Environmental Resolution#! modifier for 12 months."
 UN_RES_DESC_PEACE: "#bold Resolution on World Peace#!\nThe General Assembly reaffirms the commitment to peaceful resolution of disputes and the reduction of interstate conflict.\n\n#tooltip_separator!\n@green_checkmark! All countries receive the #bold UN Peace Resolution#! modifier for 12 months."
 UN_RES_DESC_ECONOMY: "#bold Resolution on Economic Development#!\nMember states endorse coordinated investment in developing economies and the lowering of trade barriers.\n\n#tooltip_separator!\n@green_checkmark! All countries receive the #bold UN Economic Development Resolution#! modifier for 12 months."
 UN_RES_DESC_TECHNOLOGY: "#bold UNESCO Technology Resolution#!\nThe General Assembly establishes frameworks for technology sharing and cooperative scientific research between member states.\n\n#tooltip_separator!\n@green_checkmark! All countries receive the #bold UN Technology Resolution#! modifier for 12 months."
 
 # ── EVENT 301: RESOLUTION FAILED ─────────────────────────────────
 
 un_events.301.t: "UN Resolution Fails to Pass"
 un_events.301.d: "The motion before the United Nations General Assembly has failed to secure the necessary majority. The resolution has been defeated and the session adjourned without result.\n\nNo measures will be implemented. The sponsoring delegation has expressed its disappointment. Others have not."
 un_events.301.f: "The United Nations does what the United Nations does best."
 un_events.301.a: "Unsurprising"
 
 # ── EVENT 302: SANCTIONS (TARGET) ────────────────────────────────
 
 un_events.302.t: "[ROOT.GetCountry.GetName] Sanctioned by the United Nations"
 un_events.302.d: "The United Nations Security Council has passed a resolution imposing economic sanctions on [ROOT.GetCountry.GetName]. The resolution was supported by the required majority and takes effect immediately.\n\nTrade restrictions are now in force. Diplomatic isolation deepens. Member states are expected — though not compelled — to comply with the sanctions regime.\n\nThe sanctions will remain in effect for five years unless the Security Council convenes to review them."
 un_events.302.f: "Sovereignty does not insulate a country from the world's opinion of it."
 un_events.302.a: "We reject this resolution"
 
 # ── EVENT 303: CONDEMNATION (TARGET) ─────────────────────────────
 
 un_events.303.t: "[ROOT.GetCountry.GetName] Condemned by the United Nations"
 un_events.303.d: "The United Nations General Assembly has passed a formal resolution condemning [ROOT.GetCountry.GetName]. The condemnation was approved by majority vote following debate on the floor.\n\nA condemnation carries no binding enforcement mechanism, but it represents a formal statement of international disapproval and will affect [ROOT.GetCountry.GetAdjective] standing in the diplomatic community for years to come."
 un_events.303.f: "Words are not weapons. But they leave marks."
 un_events.303.a: "We will not be lectured"
 
 # ── EVENT 304: SANCTIONS/CONDEMNATION (OBSERVERS) ────────────────
 
 un_events.304.t: "UN Punitive Resolution Passed"
 un_events.304.d: "The United Nations Security Council has passed a resolution levying sanctions against another country. They will face severe penalties as the world coordinates economic strain against them."
 un_events.304.f: "The machinery of international censure turns slowly, but it turns."
 un_events.304.a: "Noted"
 
 UN_304_DESC_SANCTIONS: "The United Nations Security Council has voted to impose economic sanctions on [global_var:un_sanction_target.GetName]. The resolution passed by the required margin.\n\n[global_var:un_sanction_target.GetName] will face trade restrictions, diplomatic isolation, and significant economic penalties for the duration of the sanctions period. Member states are expected to comply with the restrictions."
 UN_304_DESC_CONDEMNATION: "The United Nations General Assembly has formally condemned [global_var:un_sanction_target.GetName] by majority vote. The resolution represents an official statement of international disapproval.\n\nWhile a condemnation carries no binding enforcement, it places [global_var:un_sanction_target.GetAdjective] conduct on the record and affects their international standing."
 
