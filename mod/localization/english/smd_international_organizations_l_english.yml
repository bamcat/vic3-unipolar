  ### ══════════════════════════════════════════
 ### AMNESTY INTERNATIONAL
 ### ══════════════════════════════════════════

 ngo_events.1.t: "Amnesty International Condemns Our Policies"
 ngo_events.1.d: "Amnesty International has published a damning report on our nation's human rights record, citing our current laws as a systematic violation of fundamental freedoms. The international community has taken notice, and our government faces mounting pressure to address these concerns."
 ngo_events.1.a: "Their criticism changes nothing"
 ngo_events.1.b: "We will review their concerns"

 ngo_events.2.t: "Amnesty International Praises Reform"
 ngo_events.2.d: "Our recent legislative reforms have been recognized by Amnesty International as a significant step forward for human rights. Their annual report highlights our progress, boosting our nation's international reputation."
 ngo_events.2.a: "We are proud of our progress"

 ngo_events.3.t: "Amnesty Reports on Civil Unrest"
 ngo_events.3.d: "Amnesty International has published a special report documenting the widespread civil unrest gripping our nation. They call on our government to address the root causes of discontent through meaningful reform rather than repression."
 ngo_events.3.a: "We will consider reforms"
 ngo_events.3.b: "Our internal affairs are not their concern"

 ### ══════════════════════════════════════════
 ### RED CROSS
 ### ══════════════════════════════════════════

 ngo_events.10.t: "Red Cross Offers Humanitarian Aid"
 ngo_events.10.d: "The International Red Cross has offered to deploy humanitarian workers to assist civilians affected by the ongoing conflict. Their aid teams are ready to provide medical care, shelter, and food to displaced populations in our war-torn regions."
 ngo_events.10.a: "We welcome their assistance"
 ngo_events.10.b: "We cannot allow foreign workers in a war zone"

 ngo_events.11.t: "Red Cross Criticizes Wartime Conduct"
 ngo_events.11.d: "The International Red Cross has issued a public statement expressing deep concern over the conduct of our armed forces. Reports of extensive civilian casualties and infrastructure destruction in the conflict zones have drawn international attention. They urge all parties to respect the Geneva Conventions."
 ngo_events.11.a: "We will cooperate with their investigators"
 ngo_events.11.b: "We deny these allegations"

 ngo_events.12.t: "Red Cross Offers Crisis Relief"
 ngo_events.12.d: "Despite the absence of open warfare, the International Red Cross has identified a growing humanitarian crisis within our borders. Widespread civil unrest and economic disruption have created conditions requiring international assistance. They offer to coordinate relief efforts for affected populations."
 ngo_events.12.a: "We accept their help"
 ngo_events.12.b: "We can handle this ourselves"

 ### ══════════════════════════════════════════
 ### IAEA
 ### ══════════════════════════════════════════

 ngo_events.20.t: "IAEA Requests Nuclear Inspection"
 ngo_events.20.d: "The International Atomic Energy Agency has formally requested access to our nuclear facilities for a comprehensive safety and compliance inspection. As a non-signatory of the Non-Proliferation Treaty, our nuclear program has attracted heightened international scrutiny. The IAEA assures us the inspection is routine, but refusal would send a clear signal to the international community."
 ngo_events.20.a: "Our facilities are open to inspection"
 ngo_events.20.b: "Our nuclear program is a sovereign matter"

 ngo_events.21.t: "IAEA Commends Nuclear Safety Record"
 ngo_events.21.d: "Following a review of our nuclear program, the International Atomic Energy Agency has formally commended our commitment to safety standards and non-proliferation compliance. Our adherence to the NPT and cooperation with international inspectors has strengthened our standing in the global nuclear community."
 ngo_events.21.a: "We remain committed to peaceful nuclear energy"

 ngo_events.22.t: "IAEA Raises Proliferation Concerns"
 ngo_events.22.d: "The International Atomic Energy Agency has raised alarm over the direction of our nuclear program. Without NPT membership and with our continued refusal to cooperate with inspectors, the IAEA has issued a formal statement expressing concern over possible weapons development. The international community is watching closely."
 ngo_events.22.a: "We are open to dialogue"
 ngo_events.22.b: "We assert our sovereign right to nuclear technology"

