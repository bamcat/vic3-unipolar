 # ==========================================
 # LAWGROUP
 # ==========================================
 
 lawgroup_subsidized_housing: "Subsidized Housing"
 lawgroup_subsidized_housing_desc: "The degree to which the state funds, builds, and guarantees housing for its citizens. More progressive frameworks expand real estate production in urban centers, improve infrastructure, and increase migration pull — at rising welfare and budgetary costs."
 
 # ==========================================
 # LAWS
 # ==========================================
 
 law_no_public_housing: "No Public Housing"
 law_no_public_housing_desc: "The state provides no housing support. Shelter is a private matter — bought, rented, or gone without. The urban housing market operates without public intervention, and whatever the market produces is what citizens get."
 
 law_housing_projects: "Housing Projects"
 law_housing_projects_desc: "The state builds basic high-density public housing in urban areas — tower blocks, tenement rows, functional and cheap. The quality is not always high and the locations are not always desirable, but the housing exists. Urban centers can now produce additional real estate through state construction programs."
 
 law_public_housing_program: "Public Housing Program"
 law_public_housing_program_desc: "A comprehensive state housing program with design standards, mixed-use development, and active urban planning. The government is not just building shelters — it is shaping the city. Urban centers produce significantly more real estate as the public construction sector expands, and infrastructure improves as a consequence of better city planning."
 
 law_universal_housing: "Universal Housing"
 law_universal_housing_desc: "Housing is a guaranteed right. The state funds, builds, and maintains shelter for every citizen who needs it — no means testing, no market dependency, no going without. The fiscal cost is substantial and ongoing. Urban centers produce maximum real estate output. Cities planned around universal access attract migration and improve infrastructure across the board."
 
 law_no_public_housing_modifier: "No Public Housing"
 law_no_public_housing_modifier_desc: "The state provides no housing support. The urban housing market is entirely private."
 
 law_housing_projects_modifier: "Housing Projects"
 law_housing_projects_modifier_desc: "Basic state housing construction is underway. Welfare costs are up modestly as the state subsidises the housing stock."
 
 law_public_housing_program_modifier: "Public Housing Program"
 law_public_housing_program_modifier_desc: "A comprehensive public housing program is expanding the urban real estate supply and improving city infrastructure, at significant ongoing cost."
 
 law_universal_housing_modifier: "Universal Housing"
 law_universal_housing_modifier_desc: "Housing is a guaranteed right. Welfare costs are high, but urban infrastructure is improved, migration is attracted, and real estate output is maximised."
 
 institution_central_bank: "Central Bank"
 institution_central_bank_desc: "A state monetary authority that manages the money supply, sets reserve requirements, and controls interest rates. Each level of investment tightens monetary policy — constraining commercial credit production but expanding the national debt ceiling and raising the benchmark interest rate. The Central Bank is the mechanism by which the state exercises direct control over the financial system."
 
 lawgroup_central_banking: "Central Banking"
 lawgroup_central_banking_desc: "The legal framework governing [ROOT.GetCountry.GetName]'s monetary system — from no central monetary authority to full state control of the money supply. The choice of banking framework determines how credit and securities are produced and what the state can borrow."
 
 law_no_central_bank: "No Central Bank"
 law_no_central_bank_desc: "There is no central monetary authority. Banks operate independently, setting their own reserve ratios and lending policies. The money supply is uncoordinated and the state has no mechanism to manage interest rates or credit conditions. This is an unstable arrangement that most modern economies have moved away from."
 
 law_fractional_reserve_banking: "Fractional Reserve Banking"
 law_fractional_reserve_banking_desc: "Banks are required to hold only a fraction of their deposits as reserves, lending the remainder into the economy. This expands the money supply — financial districts produce more securities as the multiplied capital flows through the system, but commercial credit production is somewhat diluted by the leverage. This is the standard arrangement for most modern economies."
 
 law_full_reserve_banking: "Full Reserve Banking"
 law_full_reserve_banking_desc: "Banks must hold 100% of deposits as reserves — no fractional lending. The Central Bank institution becomes available, allowing the state to directly manage monetary policy. Each level of Central Bank investment raises the benchmark interest rate by 1% and increases the maximum credit limit by 5%. Credit production from commercial banks is more stable. Securities production from financial districts falls as leverage is removed from the system."

 law_no_central_bank_modifier: "No Central Bank"
 law_no_central_bank_modifier_desc: "No central monetary authority exists. The money supply is unmanaged."
 
 law_fractional_reserve_banking_modifier: "Fractional Reserve Banking"
 law_fractional_reserve_banking_modifier_desc: "Fractional reserve lending is expanding the money supply. Securities production is up; commercial credit production is modestly reduced by the leverage effect."
 
 law_full_reserve_banking_modifier: "Full Reserve Banking"
 law_full_reserve_banking_modifier_desc: "Full reserve requirements are in effect. Credit production is stable and higher. Securities production is reduced. The Central Bank institution is available to manage interest rates and the national debt ceiling."
 
 institution_central_bank_modifier: "Central Bank"
 institution_central_bank_modifier_desc: "The Central Bank is active and managing monetary policy. Each level of investment tightens credit supply, raises the interest rate by 1%, and increases the maximum credit limit by 5%."
 
 country_max_credit_limit_mult: "Maximum Credit Limit"
 country_institution_cost_institution_central_bank_mult: "Central Bank Cost"
 country_institution_central_bank_max_investment_add: "Central Bank Max Investment"
 country_institution_size_change_speed_institution_central_bank_mult: "Central Bank Expansion Speed"
 building_group_bg_banking_throughput_add: "Banking Throughput"
 
 lawgroup_media_regulations: "Media Regulations"
 lawgroup_media_regulations_desc: "The legal framework governing [ROOT.GetCountry.GetName]'s information environment — from fully unregulated media to state-controlled communications infrastructure. More regulated frameworks suppress political movement radicalization and increase state authority, while unregulated environments amplify movements and weaken the government's grip on the information space."
 
 law_fully_unregulated_media: "Fully Unregulated"
 law_fully_unregulated_media_desc: "There is no regulation of the media or information environment. News outlets, online platforms, and communications networks operate without any government oversight. Disinformation spreads freely. Political movements thrive in the noise. The state has no mechanism to shape or manage the information its citizens consume — and no authority derived from controlling it."
 
 law_digital_rights: "Digital Rights"
 law_digital_rights_desc: "Basic legal protections govern the information environment — privacy guarantees, anti-censorship provisions, freedom of information laws. Citizens have legal recourse against certain abuses of the media, but the information space remains substantially free. Political movements still find fertile ground. [ROOT.GetCountry.GetName] gains a modest reputational benefit from being a rights-respecting state."
 
 law_fairness_doctrine: "Fairness Doctrine"
 law_fairness_doctrine_desc: "Media outlets are legally required to present balanced coverage of political issues — giving time and space to multiple perspectives rather than platforming only one. The most extreme political voices lose their megaphone. Radical movement recruitment is dampened. The state positions itself as a fair referee rather than a participant in the information war, and gains authority from the role."
 
 law_government_content_moderators: "Government Content Moderators"
 law_government_content_moderators_desc: "The state actively moderates online content — removing disinformation, extremist material, and content deemed harmful or destabilizing. Political movements lose significant reach as their most effective recruitment material is suppressed. Authority rises. The international community and domestic critics of press freedom will note the policy and [ROOT.GetCountry.GetName]'s prestige will suffer accordingly."
 
 law_state_wifi: "State WiFi"
 law_state_wifi_desc: "The state operates the communications infrastructure directly. Internet access is a public utility, fully owned, operated, and monitored by the government. The information environment is a state resource — what citizens read, watch, and share passes through infrastructure [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName]'s government controls. Political movement radicalization is near-completely suppressed. The cost, financial and reputational, is substantial."
 
 law_fully_unregulated_media_modifier: "Fully Unregulated Media"
 law_fully_unregulated_media_modifier_desc: "An ungoverned information environment is amplifying political movements and weakening state authority."
 
 law_digital_rights_modifier: "Digital Rights Framework"
 law_digital_rights_modifier_desc: "Basic legal protections govern the information environment. Political movements still thrive but [ROOT.GetCountry.GetName] gains some prestige from its rights-respecting stance."
 
 law_fairness_doctrine_modifier: "Fairness Doctrine"
 law_fairness_doctrine_modifier_desc: "Balanced media coverage requirements are dampening radical movement recruitment and improving state legitimacy."
 
 law_government_content_moderators_modifier: "Government Content Moderation"
 law_government_content_moderators_modifier_desc: "Active state content moderation is significantly suppressing political movement radicalization, at the cost of prestige and legitimacy."
 
 law_state_wifi_modifier: "State-Controlled Communications"
 law_state_wifi_modifier_desc: "[ROOT.GetCountry.GetName] controls the communications infrastructure directly. Political movement radicalization is near-totally suppressed. Authority is high. International reputation suffers."
 
 institution_courts: "Court System"
 institution_courts_desc: "A formal judiciary operating through established courts and legal procedure. Each level of investment expands the court system's reach — more judges, more courts, more consistent enforcement of the law. Turmoil falls as disputes are resolved through legal channels, law enactment becomes more consistent, and revolutionary movements find the state's legal apparatus harder to overcome."
 
 lawgroup_judiciary: "Judiciary"
 lawgroup_judiciary_desc: "The legal philosophy underlying [ROOT.GetCountry.GetName]'s court system — how disputes are resolved, who holds legal authority, and what the purpose of justice is held to be. The choice of judiciary shapes authority, legitimacy, diplomatic standing, and the stability of the social order."
 
 law_inquisitive_judiciary: "Inquisitive"
 law_inquisitive_judiciary_desc: "The state investigates, prosecutes, and judges — the judiciary is an arm of government authority rather than an independent institution. Judges are agents of the crown or government, tasked with finding the truth and enforcing the law on the state's behalf. Authority is high and enactment of government policy is smoother, but due process is weak and the population knows it."
 
 law_customary_judiciary: "Customary"
 law_customary_judiciary_desc: "Disputes are resolved through traditional community norms, tribal councils, elder arbitration, and local custom. There are no formal courts — justice is delivered by those the community recognises as its authorities, according to rules the community recognises as legitimate. The state has limited reach into this system. Communities are stable, loyal to their traditions, and resistant to external disruption."
 
 law_religious_judiciary: "Religious Law"
 law_religious_judiciary_desc: "Scripture, religious jurisprudence, and the interpretations of clerical authorities govern legal proceedings. The devout gain enormous political power as arbiters of what the law means and how it applies. Religious legitimacy runs deep among the faithful. Those outside the faith, or who interpret it differently, may find the system less welcoming."
 
 law_restorative_judiciary: "Restorative"
 law_restorative_judiciary_desc: "The purpose of justice is not punishment but restoration — repairing the harm done to victims, rehabilitating offenders, and reintegrating both into society. Courts focus on mediation, reconciliation, and community healing. Turmoil falls. Mortality from conflict decreases. Loyalists grow. The state gives up some authority in exchange for a population that trusts the system it lives under."
 
 law_adversarial_judiciary: "Adversarial"
 law_adversarial_judiciary_desc: "Prosecution and defence contest before an independent judge or jury. The presumption of innocence is protected. Legal standing is equal regardless of social position. The state is bound by the same rules as its citizens. [ROOT.GetCountry.GetName]'s international prestige rises significantly. The independent judiciary constrains government action — but a government that can be constrained by law is one the population can trust."
 
 law_inquisitive_judiciary_modifier: "Inquisitive Judiciary"
 law_inquisitive_judiciary_modifier_desc: "The judiciary acts as an arm of state authority. Enactment of policy is easier and turmoil is suppressed — but due process is weak and the radical pressure building beneath the surface is real."
 
 law_customary_judiciary_modifier: "Customary Law"
 law_customary_judiciary_modifier_desc: "Traditional community justice provides deep legitimacy and social stability. The state's formal authority is limited but the population's trust in the system is genuine."
 
 law_religious_judiciary_modifier: "Religious Law"
 law_religious_judiciary_modifier_desc: "Clerical authority governs the law. The [ROOT.GetCountry.GetAdjective] devout hold enormous political power. Deep loyalty among the faithful — and growing resentment among those outside it."
 
 law_restorative_judiciary_modifier: "Restorative Justice"
 law_restorative_judiciary_modifier_desc: "The justice system focuses on rehabilitation and reconciliation. Turmoil and mortality fall, loyalists grow, and [ROOT.GetCountry.GetName] gains international respect for its humane approach."
 
 law_adversarial_judiciary_modifier: "Adversarial Judiciary"
 law_adversarial_judiciary_modifier_desc: "An independent judiciary operating on due process and equal standing before the law. Legitimacy and prestige are high. State authority is checked — but that check is what makes the system credible."
 
 institution_courts_modifier: "Judiciary"
 institution_courts_modifier_desc: "An established court network is reducing turmoil, improving law enactment, and suppressing revolutionary momentum. Each additional level extends the courts' reach further across [ROOT.GetCountry.GetName]."
 
 country_institution_cost_institution_courts_mult: "Court System Cost"
 country_institution_courts_max_investment_add: "Court System Max Investment"
 country_institution_size_change_speed_institution_courts_mult: "Court System Expansion Speed"
 
 law_privatized_preschool_education:0 "Privatized Preschool Education"
 law_privatized_preschool_education_desc:0 "Early childhood education is provided through a regulated private market. Providers compete for enrollment, with the state setting minimum standards but leaving delivery to independent operators. Access depends largely on household income, though subsidies may offset some of the burden for lower-earning families."

 law_universal_childcare:0 "Universal Childcare"
 law_universal_childcare_desc:0 "The state guarantees affordable childcare for all families regardless of income. Publicly funded facilities are available nationwide, freeing parents to participate in the workforce and ensuring that early childhood development is not contingent on the means of the family."

 law_legal_protections:0 "Legal Protections"
 law_legal_protections_desc:0 "The state has codified formal legal equality between men and women, enshrining protections against discrimination in employment, property, and public life. Rights that were previously customary or selectively enforced are now backed by the force of law."

 law_structural_egalitarianism:0 "Structural Egalitarianism"
 law_structural_egalitarianism_desc:0 "The government has moved beyond legal equality to actively dismantle the institutional structures that perpetuate gender inequality. Representation in public offices, professions, and civic institutions is mandated, and the state takes an active role in enforcing equal outcomes rather than merely equal rights."

 law_matriarchy:0 "Matriarchy"
 law_matriarchy_desc:0 "Women hold a dominant position in the political and social structure of the country. Women will form the vast majority of positions of leadership."

 law_disability_cheques:0 "Disability Cheques"
 law_disability_cheques_desc:0 "The state provides regular financial support to citizens unable to work due to disability or chronic illness. Payments are administered through the social security apparatus and are intended to guarantee a minimum standard of living for those outside the workforce."

 law_student_coverage:0 "Maternity Leave"
 law_student_coverage_desc:0 "Women are granted coverage for pregnancies."

 law_universal_basic_income:0 "Universal Basic Income"
 law_universal_basic_income_desc:0 "Every citizen receives an unconditional periodic payment from the state, regardless of employment status or means. The policy represents a fundamental rethinking of the relationship between labour, welfare, and economic participation — guaranteeing a floor beneath which no one can fall while raising the minimum expectations of all work."
 
 law_universal_college:0 "Universal College"
 law_universal_college_desc:0 "The state guarantees access to higher education for all citizens regardless of background or means. Universities and colleges are publicly funded and their places open to merit rather than wealth, producing a more educated workforce and a more informed citizenry."

 education_laws.1.t:0 "Who Pays for the Degree?"
 education_laws.1.d:0 "The commitment to universal college has prompted an immediate and pointed question from fiscal conservatives: who exactly will be paying for it? Funding higher education for every citizen who seeks it represents a significant expansion of public expenditure, and opponents are making their objections loudly. The government must decide whether to commit to full public funding or to introduce a means-tested model that limits the burden."
 education_laws.1.f:0 "The question of who pays for education has always really been a question of who education is for."
 education_laws.1.a:0 "Commit to full public funding — higher education is a public good."
 education_laws.1.b:0 "Introduce means-tested subsidies — fund the poor, not the wealthy."

 education_laws.2.t:0 "The Meritocracy Objection"
 education_laws.2.d:0 "Wealthy interests have found their preferred argument against universal college: standards. If everyone can attend, they warn, then the degree becomes worthless — institutions of genuine excellence will be dragged down to accommodate the underprepared. The government must choose between defending universal access on principle, or offering a carveout that preserves elite institutions alongside the public system."
 education_laws.2.f:0 "Every expansion of access has been met with the same warning about standards. The standards always survive."
 education_laws.2.a:0 "Defend universal access — excellence is not the preserve of the wealthy."
 education_laws.2.b:0 "Preserve elite institutions alongside universal access."

 education_laws.3.t:0 "The Intelligentsia Speaks"
 education_laws.3.d:0 "The academic community has entered the debate with characteristic conviction. Universal college, they argue, is not merely a social good but an economic necessity — a nation that limits higher education to those who can afford it is a nation choosing deliberate ignorance. The government must decide whether to formally invite their voice into the legislative argument or to keep the debate in strictly political terms."
 education_laws.3.f:0 "The university has always been where societies decide what kind of future they want. Now it must decide who is allowed to help build it."
 education_laws.3.a:0 "Invite them into the debate — let the academics lead the argument."
 education_laws.3.b:0 "Keep it a political decision — academics advise, they do not govern."

 education_college_fiscal_resistance:0 "Fiscal Resistance"
 education_college_fiscal_resistance_desc:0 "Fiscal conservatives are actively opposing the public cost of universal college, stalling the enactment process and forcing the government to justify its spending commitments."

 education_college_public_funded:0 "Publicly Funded Commitment"
 education_college_public_funded_desc:0 "The government has committed to absorbing the full cost of universal higher education, strengthening enactment momentum at significant expense."

 education_college_meritocracy_debate:0 "Meritocracy Debate Engaged"
 education_college_meritocracy_debate_desc:0 "The government has publicly defended universal access against claims that it will dilute academic standards, shifting the terms of the enactment debate."

 education_college_elite_carveout:0 "Elite Carveout Offered"
 education_college_elite_carveout_desc:0 "A carveout preserving elite private institutions alongside the public system has been offered, slowing implementation but reducing wealthy opposition."

 education_college_academic_endorsement:0 "Academic Endorsement"
 education_college_academic_endorsement_desc:0 "The intelligentsia has publicly endorsed universal college, lending scholarly authority and organised support to the enactment effort."

 education_college_elites_rebuked:0 "Elites Rebuked"
 education_college_elites_rebuked_desc:0 "Wealthy interests have been publicly challenged on their meritocracy arguments, embarrassing their position but sharpening their resolve."

 education_college_elites_appeased:0 "Elites Appeased"
 education_college_elites_appeased_desc:0 "The offer of an elite institutional carveout has softened wealthy opposition to universal college."

 education_college_intelligentsia_engaged:0 "Intelligentsia Engaged"
 education_college_intelligentsia_engaged_desc:0 "Academics and researchers are actively making the public case for universal higher education, lending intellectual credibility to the enactment effort."

 education_college_intelligentsia_sidelined:0 "Intelligentsia Sidelined"
 education_college_intelligentsia_sidelined_desc:0 "The decision to keep academics out of the legislative debate has left the intelligentsia frustrated and disengaged from the government's education agenda."