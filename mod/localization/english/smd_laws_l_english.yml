  # New Laws Any Group
 law_equal_rights:0 "Equal Rights"
 law_equal_rights_desc:0 "Women can expect to experience the same level of rights as their male counterparts."
 law_prison_slavery:0 "Prison Slavery"
 law_prison_slavery_desc:0 "Prisoners and Criminals are forced to work for long hours with little to no pay during their sentence."
 law_restricted_police:0 "Restricted Police"
 law_restricted_police_desc:0 "The power presented by the police force has been restricted and is subject to strict regulations to ensure the safety of the citizens they are poised to protect."
 law_resettlement_enticement:0 "Resettlement Enticing"
 law_resettlement_enticement_desc:0 "The government features programs to entice people to move to their territories."
 
 # Rights of Minorities Group
 
 lawgroup_rights_of_minorities:0 "Rights of Minorities"
 lawgroup_rights_of_minorities_desc:0 "The legal regulations and protections on minority populations."
 
 law_no_minority_rights:0 "No Minority Rights"
 law_no_minority_rights_desc:0 "Minorities of all types will not recieve the same rights as those of the general populace."
 law_segregation:0 "Segregation Laws"
 law_segregation_desc:0 "Minorities will experience degrees of separation from the general populace, often getting the scraps & leftovers."
 law_apartheid:0 "Apartheid Laws"
 law_apartheid_desc:0 "Minorities will not experience the same society of the general populace, and will often be removed or relocated (often forcefully) to a designated 'land'."
 law_unfulfilled_protections:0 "Unfulfilled Protections"
 law_unfulfilled_protections_desc:0 "The state has made efforts to remove barriers for minorities, but the laws governing the rights of minorities remains largely unenforced."
 law_limited_protections:0 "Limited Protections"
 law_limited_protections_desc:0 "Minorities who are of a different ethnicity or nationality will recieve much of the same rights that the general population enjoy."
 law_encompassing_protections:0 "Encompassing Protections"
 law_encompassing_protections_desc:0 "Minorities that are of a different ethnicity or nationality, and those that are disabled will recieve all the rights and protections the general population enjoys."
 law_universal_protections:0 "Universal Protections"
 law_universal_protections_desc:0 "All Minorities, regardless of their ethnicity, nationality, ability, sexuality, or gender identity will recieve the same rights that the general population enjoys."
 
 # Union Laws Group
 
 lawgroup_union_laws:0 "Union Laws"
 lawgroup_union_laws_desc:0 "The governing body's disposition towards work union actions such as strikes, walkouts, protests, riots & otherwise."
 law_unions_outlawed:0 "Outlawed Unity"
 law_unions_outlawed_desc:0 "Unions are outlawed in this nation & perpetrators will recieve swift resistance."
 law_useless_unions:0 "Useless Bureaucracy"
 law_useless_unions_desc:0 "Unions are nothing more than workers bureaucracy & lack the necessities to function & fight without external forces."
 law_limited_action:0 "Limited Action"
 law_limited_action_desc:0 "Unions are heavily restricted in what they are allowed to achieve and often have to navigate legal loopholes in order to be effective."
 law_craft_unions:0 "Craft Unions"
 law_craft_unions_desc:0 "Unions are restricted to their specific roles, and are prevented from forging allegiances with unions of other roles."
 law_permitted_unions:0 "Permitted Action"
 law_permitted_unions_desc:0 "Unions are neither legal nor illegal, they can function as they please but have little to no protection from the governing body."
 law_enterprise_unions:0 "Enterprises"
 law_enterprise_unions_desc:0 "Unions are there to improve working performance of its employees & focus on the needs of their members. They are effective at improving the lives of their members through necessary means."
 law_backed_unions:0 "Backed Protections"
 law_backed_unions_desc:0 "Unions are effectively backed by the public and has cemented itself as a part of the countries culture. They have protection by the people and are given legal protections towards striking action."
 law_empowered_unions:0 "Union Empowerment"
 law_empowered_unions_desc:0 "Unions are heavily reinforced by the police & have government backing. These unions are capable of getting their demands effectively, and are under every circumstance are protected & cheered on."
 
 # Corporate Authority Group
 
 lawgroup_corporate_authority:0 "Corporate Authority"
 lawgroup_corporate_authority:0 "The legal regulations towards the corporations & the absurdly wealthy, these include regulations of their political power & control they are capable of exerting."
 law_completely_unregulated:0 "Completely Unregulated"
 law_completely_unregulated_desc:0 "The actions of corporations and the actions of the absurdly wealthy are not hindered in any way. Often to the detriment of the workers & people living there."
 law_political_lobbying:0 "Political Lobbying"
 law_political_lobbying_desc:0 "Anyone with a large enough sum of funds can lobby the government & pressure them into changing laws in their favour."
 law_tax_haven:0 "Tax Haven"
 law_tax_haven_desc:0 "Corporations and individuals with absurd wealth are considered welcome & the governing body has put laws into place favouring them with less taxes & more land."
 law_feign_ignorance:0 "Feigned Ignorance"
 law_political_lobbying_desc:0 "The governing body chooses to do as little as possible to restrict the power of the corporations and the absurdly wealthy by choosing to pretend it is not a problem."
 law_limited_restrictions:0 "Limited Restrictance"
 law_limited_restrictions_desc:0 "The assets of corporations & of the absurdly wealthy are taxed regardless of whether they are in money or held up in investments & stocks."
 law_progressive_restrictions:0 "Progressive Restrictance"
 law_progressive_restrictions_desc:0 "Any assets of the absurdly wealthy & all profits of corporation realised or not is taxed & used to better off the populace at a progressive rate."
 law_no_one_individual:0 "No One Individual"
 law_no_one_individual_desc:0 "The absurdly wealthy are beholden to the tax system of the governing body if they choose to do business there. Their wealth generated while in the country is reduced & is distributed to the populace in need."
 law_corporate_redistribution:0 "Corporate Redistributance"
 law_corporate_redistribution_desc:0 "Any wealth generated by the absurdly wealthy, or corporations is reduced to the maximum allowed amount. This wealth is then redistributed as needed. Corporations are handed over to the public & consist of a board including elected officials"
 
 law_serfdom:0 "Unfulfilled Labor Rights"
 law_serfdom_desc:0 "There is either no established labour rights, or the established labour rights are completely unenforced."
 law_serfdom_banned:0 "Bare Minimum Protections"
 law_serfdom_banned_desc:0 "The bare minimum of protections have been established."
 
 lawgroup_drug_regulations: "Drug Regulations"
 lawgroup_drug_regulations_desc: "The legal status of intoxicating substances — from total prohibition to full legalisation of trafficking. Drug policy shapes mortality, state authority, enforcement costs, and the power of agricultural and criminal interests."

 law_total_prohibition: "Total Prohibition"
 law_total_prohibition_desc: "All intoxicating substances — including alcohol and tobacco — are banned by law. The state claims the moral authority to regulate what citizens put into their bodies, backed by religious and conservative institutions. Black markets thrive in the gaps enforcement cannot fill."

 law_alcohol_tobacco_legal: "Alcohol & Tobacco Legal"
 law_alcohol_tobacco_legal_desc: "Alcohol and tobacco are legal and taxed. All other substances remain prohibited. This is the baseline legal framework for most modern states — a pragmatic compromise between economic interest and moral conservatism."

 law_marijuana_decriminalization: "Marijuana Decriminalization"
 law_marijuana_decriminalization_desc: "Personal possession and use of cannabis is no longer a criminal offence. Trade remains illegal, but enforcement is redirected toward harder substances. The policy reflects a growing consensus that incarceration is not an effective response to recreational drug use."

 law_hard_drugs_decriminalized: "Hard Drug Decriminalization"
 law_hard_drugs_decriminalized_desc: "Possession of all controlled substances — including opiates, cocaine, and amphetamines — is treated as a public health matter rather than a criminal one. Users are referred to treatment rather than prosecution. The policy is controversial but evidence from early adopters suggests it reduces overdose mortality and frees up enforcement resources."

 law_safe_injection_sites: "Safe-Injection Sites"
 law_safe_injection_sites_desc: "Government-funded facilities allow users to consume drugs under medical supervision. Staff can administer overdose reversal medication and connect users with treatment programs. Mortality rates fall significantly. Religious and conservative opposition is fierce — the policy is seen as accepting, and even enabling, drug use."

 law_trafficking_allowed: "Trafficking Allowed"
 law_trafficking_allowed_desc: "The trade in controlled substances is fully legalised and regulated by the state. The economic benefits are immediate and substantial — drug revenue flows into the formal economy and tax base. The reputational and social consequences are severe. Most of the world will regard this as a capitulation to criminal networks."

 law_total_prohibition_modifier: "Total Prohibition"
 law_alcohol_tobacco_legal_modifier: "Alcohol & Tobacco Legal"
 law_marijuana_decriminalization_modifier: "Marijuana Decriminalization"
 law_hard_drugs_decriminalized_modifier: "Hard Drug Decriminalization"
 law_safe_injection_sites_modifier: "Safe-Injection Sites"
 law_trafficking_allowed_modifier: "Trafficking Allowed"
 
 lawgroup_disability_rights: "Disability Rights"
 lawgroup_disability_rights_desc: "The legal framework governing the rights of disabled citizens — from bare acknowledgement to active state support through treatment, infrastructure, and workplace inclusion. More comprehensive frameworks expand workforce participation, improve standard of living, and reduce mortality, at increasing cost to the state and employers."

 law_minimal_recognition: "Minimal Recognition"
 law_minimal_recognition_desc: "The state acknowledges that disabled citizens exist but provides no accommodation, support, or legal protection for them. Disabled people are largely excluded from formal employment and public life. The human cost is significant; the fiscal cost is negligible."
 
 law_workplace_accommodations: "Workplace Accommodations"
 law_workplace_accommodations_desc: "Employers are legally required to make reasonable adjustments to allow disabled workers to participate in the workforce — modified equipment, adjusted duties, accessible workstations. The policy brings a meaningful population into productive employment. Employers bear adjustment costs, but the workforce expands."
 
 law_anti_ableist_architecture: "Anti-Ableist Architecture"
 law_anti_ableist_architecture_desc: "Public buildings, transport networks, and infrastructure are required to be accessible to disabled citizens. Ramps, lifts, tactile paving, accessible signage — the physical environment must no longer exclude. Retrofitting existing infrastructure is expensive. The population that can fully participate in society expands considerably."
 
 law_public_treatments: "Public Treatments"
 law_public_treatments_desc: "The state funds medical treatments, assistive devices, prosthetics, therapy, and ongoing support services for disabled citizens as a matter of right rather than charity. Mortality falls significantly. Standard of living rises across the population. The cost to the public budget is substantial and ongoing — but the argument that some citizens are less entitled to state support than others has been formally rejected."
 
 law_minimal_recognition_modifier: "Minimal Recognition of Disability"
 law_minimal_recognition_modifier_desc: "Disabled citizens receive no accommodation from the state. The effective workforce is reduced and mortality is above what it could be."
 
 law_workplace_accommodations_modifier: "Workplace Accommodations"
 law_workplace_accommodations_modifier_desc: "Employers are required to accommodate disabled workers. The workforce is broader and more inclusive, at modest cost to building productivity."
 
 law_anti_ableist_architecture_modifier: "Accessible Infrastructure"
 law_anti_ableist_architecture_modifier_desc: "Public infrastructure has been made accessible. Construction costs are higher as buildings meet accessibility standards, but the population that can fully participate in society is significantly larger."
 
 law_public_treatments_modifier: "Public Disability Treatments"
 law_public_treatments_modifier_desc: "The state funds treatment and support for disabled citizens. Mortality is reduced, standard of living is improved, and education access is broader — at significant and ongoing public expense."
 
 institution_environmental_protection: "Environmental Protection Agency"
 institution_environmental_protection_desc: "A government agency dedicated to monitoring and enforcing environmental standards. Each level of investment represents expanded enforcement capacity, more stringent regulations, and broader conservation programs — reducing pollution generation across all states."
 
 lawgroup_environmental_regulations: "Environmental Regulations"
 lawgroup_environmental_regulations_desc: "The legal framework governing [ROOT.GetCountry.GetName]'s relationship with the natural environment — from unregulated industrial exploitation to constitutionally guaranteed rights of nature. More progressive frameworks reduce pollution, lower mortality, and protect ecosystems, at increasing cost to industrial throughput and public expenditure."
 
 law_no_environmental_regulations: "No Regulations"
 law_no_environmental_regulations_desc: "Industry operates without environmental constraint. Factories, mines, and farms may pollute, extract, and exploit without legal limit. Output is maximised. The long-term cost — in mortality, ecosystem degradation, and public health — is borne by the population, not the producers."
 
 law_game_law: "Game Law"
 law_game_law_desc: "Hunting and fishing are regulated to prevent the collapse of game populations. Protected seasons, licensed hunting, and restrictions on the most destructive extraction methods. It is a conservation framework that primarily serves the interests of those wealthy enough to hunt recreationally — but it establishes the principle that the state has an interest in managing natural resources."
 
 law_national_recycling: "National Recycling"
 law_national_recycling_desc: "A national programme for the collection and processing of recyclable waste. Industrial and domestic waste is sorted, recovered, and reused where possible, reducing the volume of material entering landfill and waterways. Resource efficiency improves modestly. Pollution falls. The programme requires coordination across municipalities and industries."
 
 law_protection_agency: "Protection Agency"
 law_protection_agency_desc: "A dedicated government agency with the authority to set, monitor, and enforce environmental standards across all sectors of the economy. Emissions limits, land use restrictions, industrial waste regulations, and protected natural areas all fall within its remit. The agency can be invested in — each additional level of funding expands its enforcement capacity and reduces pollution further."
 
 law_guaranteed_rights_of_nature: "Guaranteed Rights of Nature"
 law_guaranteed_rights_of_nature_desc: "Rivers, forests, wetlands, and ecosystems are granted legal standing — the right not to be destroyed, polluted, or exploited beyond their capacity to recover. The framework is the most ambitious environmental legislation possible, drawn from emerging legal traditions in countries that have begun to treat nature as a subject of rights rather than an object of ownership. Industrial activity is significantly constrained. Pollution falls sharply. The Environmental Protection Agency operates at its highest possible effectiveness."
 
 law_no_environmental_regulations_modifier: "Unregulated Industry"
 law_no_environmental_regulations_modifier_desc: "No environmental constraints on industry. Throughput is up, but pollution and mortality are rising as a consequence."
 
 law_game_law_modifier: "Game Law"
 law_game_law_modifier_desc: "Regulated hunting and fishing have marginally reduced environmental degradation. A minimal but real intervention."
 
 law_national_recycling_modifier: "National Recycling Programme"
 law_national_recycling_modifier_desc: "A national recycling programme is reducing waste generation and recovering materials, modestly improving pollution and construction efficiency."
 
 law_protection_agency_modifier: "Environmental Protection Agency"
 law_protection_agency_modifier_desc: "The Environmental Protection Agency is enforcing emissions limits and industrial standards. Pollution is falling and the institution can be further invested in to expand its reach."
 
 law_guaranteed_rights_of_nature_modifier: "Guaranteed Rights of Nature"
 law_guaranteed_rights_of_nature_modifier_desc: "Nature has been granted constitutional standing. Industry faces significant constraints, but pollution is sharply reduced, mortality falls, and food security improves as ecosystems are protected."
 
