 demographic_events.1.t: "The Demographic Crisis"
 demographic_events.1.d: "Experts have warned that our nation faces a severe demographic crisis. Decades of declining birth rates have produced an aging population that will soon overwhelm our workforce. Without sustained investment in childcare, healthcare, housing, and social welfare, our economic foundation will erode as the ratio of workers to dependents collapses.\n\nA temporary demographic buffer currently masks the worst effects, but this buffer will decay over the coming decades. We must enact and sustain comprehensive pro-natalist reforms for at least ten years to reverse the trend."
 demographic_events.1.a: "We must act before it is too late"

 demographic_events.2.t: "Demographic Recovery"
 demographic_events.2.d: "After a decade of sustained investment in our people — universal childcare, accessible healthcare, comprehensive welfare, and affordable housing — our nation's birth rate has stabilized. The demographic crisis that threatened to cripple our economy has been averted. A new generation of workers is entering the labor force, and the future looks bright."
 demographic_events.2.a: "Our patience has paid off"

