 korea_reunification_bonus:0 "Korea Reunified"
 korea_reunification_bonus_desc:0 "The division of the Korean peninsula has been ended. The nation is whole for the first time since 1945. Authority, legitimacy, and prestige are dramatically improved. Separatist and revolutionary pressures are suppressed. The [ROOT.GetCountry.GetAdjective] state can begin the work of integrating a unified Korea."
 
