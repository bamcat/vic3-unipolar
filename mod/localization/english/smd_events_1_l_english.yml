 y2k_events.1.t: "The Millennium Bug"
 y2k_events.1.d: "As the year 2000 approaches, a quiet anxiety has gripped [ROOT.GetCountry.GetAdjective] engineers, bureaucrats, and IT departments. The so-called Y2K problem — the discovery that most computer systems store the year as two digits, and will therefore interpret '00' as 1900 rather than 2000 — has triggered a global scramble.\n\nSome say the consequences could be catastrophic: power grids failing, banking systems corrupting, air traffic control going dark. Others say the concern is wildly overblown and the consultants selling compliance audits are simply getting rich off the panic. [ROOT.GetCountry.GetName] must decide how seriously to take it."
 y2k_events.1.f: "Midnight is coming. Whether the lights stay on is another question."
 
 y2k_events.1.a: "Invest in full Y2K compliance"
 y2k_events.1.a_tt: "Expensive, thorough, and probably unnecessary — but if even a fraction of the predictions are right, the cost of doing nothing is far higher. [ROOT.GetCountry.GetName] will fund compliance programs across critical infrastructure."
 y2k_events.1.b: "It is obviously overblown — ignore it"
 y2k_events.1.b_tt: "The panic is a consulting industry goldmine and nothing more. [ROOT.GetCountry.GetName] will not waste public funds on an imaginary problem."
 
 # ── NEW YEAR 2000 ─────────────────────────
 
 y2k_events.2.t: "Happy New Year — Welcome to 2000"
 y2k_events.2.d: "The clocks ticked past midnight on 31 December 1999, and the lights stayed on.\n\nThe planes kept flying. The banks opened. Power grids hummed. Water flowed. The millennium bug, the most anticipated catastrophe in computing history, arrived with a whisper rather than a bang — or perhaps it never arrived at all, and the billions spent on compliance simply worked.\n\nAcross [ROOT.GetCountry.GetName], crowds filled the streets, fireworks lit the sky, and for one night the world felt, briefly, like it was beginning again. The twenty-first century has started. What comes next is anyone's guess."
 y2k_events.2.f: "The year is 2000. The world did not end. That, all things considered, is good news."
 
 y2k_events.2.a: "A new century begins"
 
