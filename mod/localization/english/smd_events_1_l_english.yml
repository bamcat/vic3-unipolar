 yugoslav_war_crimes.2.a:0 "Reject the accusations."
 yugoslav_war_crimes.2.b:0 "Cooperate with investigators."

 yugoslav_war_crimes.3.t:0 "Respond to Sarajevo"
 yugoslav_war_crimes.3.d:0 "The siege has intensified demands for international action."
 yugoslav_war_crimes.3.a:0 "Condemn Belgrade."
 yugoslav_war_crimes.3.b:0 "Issue a limited protest."

 yugoslav_war_crimes.4.t:0 "Respond to Srebrenica"
 yugoslav_war_crimes.4.d:0 "The massacre has changed the international mood toward the war."
 yugoslav_war_crimes.4.a:0 "Demand accountability."
 yugoslav_war_crimes.4.b:0 "Avoid further involvement."

 yugoslav_war_crimes.5.t:0 "National Grief"
 yugoslav_war_crimes.5.d:0 "News from the front has shocked the country and deepened the scars of war."
 yugoslav_war_crimes.5.a:0 "We mourn."

