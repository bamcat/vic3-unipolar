 intifada_events.1.t: "The Conflict Escalates"
 intifada_events.1.d: "The uprising has escalated beyond street clashes. What began as stones and protests has become a full confrontation. In the narrow alleys and refugee camps of Palestine, every building is a fortress and every street a battlefield."
 intifada_events.1.a: "We will restore order"
 intifada_events.1.a.pal: "We will never stop resisting"

 intifada_events.2.t_isr: "The Intifada Ends"
 intifada_events.2.d_isr: "The Second Intifada has been suppressed. Israeli military operations have reasserted control over the Palestinian territories, though the cost in international reputation and Palestinian civilian lives has been enormous. The underlying grievances remain unresolved."
 intifada_events.2.t_pal: "Palestinian Resistance Prevails"
 intifada_events.2.d_pal: "The Second Intifada has achieved what seemed impossible. Through sheer determination and sacrifice, the Palestinian people have forced Israel to the negotiating table. The world has witnessed the power of popular resistance against occupation."
 intifada_events.2.a: "What comes next?"

 intifada_events.5.t: "Street Clashes"
 intifada_events.5.d: "Young Palestinians have gathered at the edges of Israeli checkpoints, armed with stones and burning tires. The narrow streets channel the confrontation into a close-quarters struggle where Israeli armored vehicles cannot maneuver effectively. Television cameras from around the world record the scenes."
 intifada_events.5.a: "Intensify the resistance"
 intifada_events.5.b: "Show restraint"

 intifada_events.6.t: "Checkpoint Raids"
 intifada_events.6.d: "Israeli military checkpoints dividing Palestinian communities present both a symbol of occupation and a tactical target. A coordinated strike could disrupt Israeli control of movement within the territories, though it will invite harsh retaliation."
 intifada_events.6.a: "Strike the checkpoints"
 intifada_events.6.b: "Too dangerous"

 intifada_events.8.t: "International Media Coverage"
 intifada_events.8.d: "International media outlets are broadcasting images of the uprising across the world. Scenes of Palestinian civilians confronting Israeli military forces have sparked protests and condemnation in capitals worldwide. Arab League nations are rallying behind the Palestinian cause, while Israel faces mounting diplomatic pressure."
 intifada_events.8.a: "The world is watching"

 intifada_events.7.t: "The Second Intifada"
 intifada_events.7.d: "The Palestinian territories have erupted. After years of failed peace negotiations and continued settlement expansion, the frustration of the Palestinian people has boiled over into open uprising. In the cramped streets of Gaza and the hillsides of the West Bank, a new generation takes up the struggle."
 intifada_events.7.a: "This will define a generation"

