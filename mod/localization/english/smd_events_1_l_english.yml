oil_titans_bonus:0 "Oil Titan"
oil_titans_bonus_desc:0 "[ROOT.GetCountry.GetName] is one of the world's top three oil producers. The revenues this generates flow into the state treasury, fund construction, and give [ROOT.GetCountry.GetName] a degree of geopolitical influence that its population size alone would never justify. The world needs [ROOT.GetCountry.GetAdjective] oil. That need is power."

