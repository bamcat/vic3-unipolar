 millennium_celebration: "Millennium Celebrations"
 millennium_celebration_desc: "The year 2000 has arrived without catastrophe. The public mood is buoyant, the streets are still full of revelers, and [ROOT.GetCountry.GetName] enters the new century with a cautious optimism."
 
 y2k_minor_disruption: "Y2K Disruption"
 y2k_minor_disruption_desc: "[ROOT.GetCountry.GetName] dismissed Y2K concerns and now faces minor but real disruptions as unprepared systems hiccup into the new year. Nothing catastrophic — but the critics were not entirely wrong either."
 
