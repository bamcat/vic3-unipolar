# canada

canada.1.t:0 "Highway of Tears"
canada.1.d:0 "A stretch of British Columbia’s Highway 16, commonly referred to as the Highway of Tears, has become a symbol of tragedy and injustice in Canada, where dozens of Indigenous women and girls have gone missing or been murdered since the 1970s. Spanning between Prince George and Prince Rupert, the remote area has long lacked public transportation, forcing many to hitchhike—often with deadly consequences."
canada.1.f:0 "They (the authorities) put her in a steel box. It had to be a closed casket because of the way they found her ...” He pauses to hold back his tears, before stammering out the words, “she … was deteriorated."

canada.1.a:0 "Unfortunately, there's much more pressing issues facing this country."
canada.1.b:0 "We should be ashamed!"

je_indigenous_rights: "Indigenous Rights"
je_indigenous_rights_reason: "The question of Indigenous rights remains one of the most significant unresolved issues in [ROOT.GetCountry.GetName]'s domestic politics. Generations of dispossession, forced assimilation, and broken treaty obligations have left deep structural inequalities between Indigenous and non-Indigenous populations. Closing this gap will require sustained political will — and faces resistance from those who benefit from the status quo."


 indigenous_je_status_usa_tt: "Across the United States, over 570 federally recognized tribes occupy reservation lands that represent a fraction of their ancestral territories. Life expectancy, educational attainment, and income on reservations lag far behind national averages. The federal trust responsibility — the legal obligation to protect tribal sovereignty and welfare — is widely acknowledged to be inadequately fulfilled."

 indigenous_je_status_can_tt: "Canada's First Nations, Métis, and Inuit peoples number over one million, living under a system of reserves established by the Indian Act of 1876. The Indian residential school system — which forcibly removed Indigenous children from their families to 'assimilate' them — operated until 1996, its last school closing only recently. The intergenerational trauma of that system continues to shape Indigenous communities today."

 indigenous_je_status_nzl_tt: "The Māori people — tangata whenua, the people of the land — signed the Treaty of Waitangi with the British Crown in 1840. That treaty has never been fully honoured. Land confiscations in the 19th century stripped Māori communities of most of their territory, and Māori New Zealanders continue to face significant disparities in health, income, and incarceration rates. The Waitangi Tribunal, established in 1975, continues to hear claims against the Crown."

 indigenous_je_status_ast_tt: "Australia's Aboriginal and Torres Strait Islander peoples are the world's oldest continuous cultures — and among its most disadvantaged. The 'Stolen Generations' — Aboriginal children forcibly removed from their families under state assimilation policies that continued until the 1970s — left wounds that have not healed. Life expectancy for Indigenous Australians remains over a decade below the national average. The 1992 Mabo decision recognised native title for the first time, but implementation has been uneven."

 # indigenous.1 — Land Rights
 indigenous.1.t: "Indigenous Land Rights Claim"
 indigenous.1.d_usa: "A coalition of tribal nations has filed a formal claim asserting rights to a significant tract of federal land, arguing that the territory was unlawfully taken in violation of treaty obligations. The claim has attracted substantial media coverage and legal support. The courts are watching, and so is the broader Native American community."
 indigenous.1.d_can: "A First Nations band has asserted Aboriginal title to a substantial area of Crown land, claiming that no valid treaty extinguished their rights to the territory. The claim has reached federal court. Legal experts note that Canadian jurisprudence on Aboriginal title has been evolving significantly, and the government's response will set an important precedent."
 indigenous.1.d_nzl: "The Waitangi Tribunal has issued a report finding that the Crown failed to honour the Treaty of Waitangi in its management of contested land. The findings are not legally binding, but carry significant moral and political weight. Māori communities are calling for the government to act on the recommendations without further delay."
 indigenous.1.d_ast: "The Federal Court has upheld a native title claim over a region of land currently leased to pastoral interests. The ruling requires the government to negotiate with the claimant group over land use rights. Pastoral industry groups are lobbying hard for the government to appeal the decision."
 indigenous.1.f: "The land was always theirs. The question is whether the law will say so."
 indigenous.1.a: "Negotiate a settlement — honour the claim"
 indigenous.1.b: "Contest the claim in court — our position is defensible"

 # indigenous.2 — Treaty Obligations
 indigenous.2.t: "Treaty Obligations Under Review"
 indigenous.2.d_usa: "A congressional report has found that the federal government is failing to meet its treaty obligations to dozens of tribal nations — underfunding healthcare, education, and infrastructure on reservations by billions of dollars annually. Tribal leaders are calling for a formal review of the federal trust responsibility and a commitment to close the funding gap."
 indigenous.2.d_can: "A parliamentary committee has tabled a report detailing chronic underfunding of First Nations communities relative to obligations under historic treaties. The report identifies specific shortfalls in housing, water infrastructure, and education. The government must decide how to respond — and whether to commit the resources needed to make the treaties whole."
 indigenous.2.d_nzl: "Māori leaders have presented a formal memorandum to the government arguing that a series of recent policy decisions violate the principles of the Treaty of Waitangi. The memo cites specific breaches in areas of resource management, healthcare, and education funding, and calls for a comprehensive review of compliance with the treaty across all government departments."
 indigenous.2.d_ast: "An Indigenous rights organization has published a detailed analysis of the gap between the government's stated commitments to Aboriginal communities and actual resource allocation. The report concludes that treaty and settlement commitments are being met at less than 60 cents on the dollar. Community leaders are demanding a formal audit and binding commitment to full compliance."
 indigenous.2.f: "A promise written on paper is only as good as the will to keep it."
 indigenous.2.a: "Honour our obligations fully — commit the resources"
 indigenous.2.b: "Acknowledge the shortfalls — work toward gradual improvement"

 # indigenous.3 — Cultural Preservation
 indigenous.3.t: "The Threat to Indigenous Languages"
 indigenous.3.d: "Linguists have published a report warning that dozens of Indigenous languages in [ROOT.GetCountry.GetName] are on the verge of extinction. In many cases, only a handful of fluent speakers remain — all elderly. Once lost, these languages cannot be recovered. With them go oral histories, ecological knowledge, legal traditions, and ways of understanding the world that exist nowhere else.\n\nThe question is whether the government is prepared to invest the resources needed to reverse this trajectory — or whether it will watch history disappear in silence."
 indigenous.3.f: "A language is a world. Its death is irreversible."
 indigenous.3.a: "Fund Indigenous language revitalization programs"
 indigenous.3.b: "This is a matter for communities — not government"

 # indigenous.4 — Health Crisis
 indigenous.4.t: "Indigenous Health Crisis"
 indigenous.4.d: "A national health report has highlighted the stark gap between Indigenous and non-Indigenous health outcomes in [ROOT.GetCountry.GetName]. Life expectancy is significantly lower. Rates of diabetes, addiction, and mental illness — many of them rooted in intergenerational trauma — are dramatically higher. Infant mortality on reserves and in remote communities is multiple times the national average.\n\nThe medical establishment is calling for culturally appropriate, adequately funded Indigenous health services. The cost of inaction — measured in lives — is substantial."
 indigenous.4.f: "Inequality in health is a political choice."
 indigenous.4.a: "Invest in dedicated Indigenous healthcare programs"
 indigenous.4.b: "The existing health system is available to all citizens equally"

 # indigenous.5 — Reservation Conditions (USA/CAN)
 indigenous.5.t: "Conditions on the Reserves"
 indigenous.5.d_usa: "A federal inspector general's report has found that living conditions on many Native American reservations are significantly below national standards. Housing is overcrowded and dilapidated. Access to clean drinking water is unreliable on dozens of reservations. Unemployment rates exceed 50% in many communities. The report calls the situation 'a crisis of federal neglect' and recommends a substantial increase in Bureau of Indian Affairs funding."
 indigenous.5.d_can: "A government audit has found that hundreds of First Nations communities are under boil-water advisories — some for over a decade. Housing on many reserves is severely overcrowded. Mental health services are largely absent. The audit concludes that the federal government is spending approximately 30% less per capita on First Nations communities than on other Canadians for equivalent services."
 indigenous.5.f: "The reserve system was built to contain — not to support."
 indigenous.5.a: "Increase federal funding for reserve communities"
 indigenous.5.b: "Maintain current funding levels — the budget does not allow for more"

 # indigenous.6 — Reservation Economic Development (USA/CAN)
 indigenous.6.t: "Economic Development on Indigenous Lands"
 indigenous.6.d_usa: "Several tribal nations have proposed economic development initiatives — including gaming operations, resource extraction partnerships, and tourism ventures — that would generate significant revenue for reservation communities. The proposals require federal approval and face opposition from adjacent state governments and commercial interests who see tribal enterprises as competition. Tribal leaders argue that economic self-sufficiency is the only sustainable path out of poverty."
 indigenous.6.d_can: "First Nations communities in resource-rich areas are seeking to negotiate revenue-sharing agreements for resource extraction on or near their traditional territories. Several communities have also proposed joint ventures with provincial governments for forestry and energy development. The proposals offer a path toward economic self-sufficiency — but require the government to share control and revenue that it has historically claimed entirely."
 indigenous.6.f: "Sovereignty without an economic base is an empty word."
 indigenous.6.a: "Support Indigenous economic development — approve the proposals"
 indigenous.6.b: "Prioritize existing resource interests — these proposals create complications"

 # indigenous.20 — Ipperwash
 indigenous.20.t: "The Ipperwash Crisis"
 indigenous.20.d: "Stoney Point Ojibwe protesters have occupied Ipperwash Provincial Park in Ontario, asserting that the land — including a sacred burial ground — was unlawfully seized from their community during World War II for use as a military base and never returned as promised. The occupation is peaceful, but the Ontario Provincial Police have established a perimeter and are requesting guidance on how to proceed.\n\nThe situation is tense. There are weapons among the protesters. There are also elders, families, and a legitimate grievance that has been unaddressed for fifty years."
 indigenous.20.f: "A burial ground was taken. It was never given back."
 indigenous.20.a: "Order the OPP to disperse the occupation — restore order"
 indigenous.20.b: "Direct the OPP to stand down — negotiate a peaceful resolution"

 # indigenous.21 — Last residential school
 indigenous.21.t: "The Last Residential School Closes"
 indigenous.21.d: "Gordon Residential School in Punnichy, Saskatchewan has closed its doors — the last federally operated Indian residential school in Canada. Since 1874, the residential school system forcibly removed an estimated 150,000 Aboriginal children from their families and placed them in institutions where Indigenous language, culture, and identity were actively suppressed — and where physical and sexual abuse were widespread.\n\nThe closure of the last school is not a resolution. It is an acknowledgement that a chapter of deliberate cultural destruction has finally, officially, ended. The survivors are still living with its consequences."
 indigenous.21.f: "The last school has closed. The wounds it created have not."
 indigenous.21.a: "A dark chapter in Canadian history is over"

 # indigenous.22 — TRC
 indigenous.22.t: "The Truth and Reconciliation Commission Reports"
 indigenous.22.d: "The Truth and Reconciliation Commission of Canada has released its final report — the culmination of six years of testimony from over 6,500 survivors of the Indian residential school system. The report documents systematic abuse, cultural genocide, and the multigenerational trauma inflicted by a policy of forced assimilation.\n\nThe Commission has issued 94 Calls to Action — specific recommendations across areas of child welfare, education, language, health, and justice. The report uses the term 'cultural genocide' to describe what was done. The government must now decide how seriously to take the Commission's work."
 indigenous.22.f: "Truth is the first step. Reconciliation is the work of generations."
 indigenous.22.a: "Formally accept the Calls to Action — commit to reconciliation"
 indigenous.22.b: "Acknowledge the report — review the Calls to Action carefully"

 indigenous.10.t: "A Step Toward Equity"
 indigenous.10.d_usa: "The enactment of affirmative action legislation in the United States marks a significant step toward addressing the structural inequalities faced by Native American communities — alongside other historically marginalized groups. It is not a solution to the full scope of Indigenous dispossession, but it represents a meaningful commitment to closing gaps that have persisted for generations."
 indigenous.10.d_can: "Canada has enacted affirmative action legislation — a formal acknowledgement that systemic inequality requires systemic remedy. For First Nations, Métis, and Inuit communities, the measure is one piece of a much larger puzzle. But it signals a political willingness to take the question of Indigenous disadvantage seriously, and to back that willingness with policy."
 indigenous.10.d_nzl: "New Zealand has enacted affirmative action legislation, acknowledging that the disparities between Māori and Pākehā New Zealanders are not the product of individual failure but of historical policy. For Māori communities, it is a meaningful step — though the Waitangi Tribunal notes that many of its recommendations remain unimplemented."
 indigenous.10.d_ast: "Australia has enacted affirmative action legislation — a significant policy shift that acknowledges the structural nature of Indigenous disadvantage. For Aboriginal and Torres Strait Islander communities, it represents progress. The gap in life expectancy, health outcomes, and educational attainment will not close overnight, but the direction of travel has changed."
 indigenous.10.f: "The road to justice is long. This is a step forward."
 indigenous.10.a: "It is the right thing to do"

