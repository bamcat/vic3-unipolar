 je_second_intifada: "The Second Intifada"
 je_second_intifada_reason: "The Palestinian territories have erupted in a mass uprising against Israeli occupation. In the narrow streets and densely packed refugee camps, conventional military superiority counts for almost nothing. The world watches as stones meet tanks in one of the most asymmetric conflicts in modern history."

 je_intifada_complete_tt: "One side has been defeated or annexed."

 je_intifada_status_uprising: "The Intifada is in its #bold uprising phase#!. Street clashes, stone throwing, and guerrilla resistance dominate the conflict. Conventional military operations are nearly impossible in such confined territory."
