 je_tangentopoli: "Tangentopoli"
 je_tangentopoli_reason: "Italy runs on a system of kickbacks. Public contracts — construction, infrastructure, defense procurement, healthcare — go to firms that pay a percentage to the political parties. The Christian Democrats take their share. The Socialists take theirs. The smaller coalition partners take theirs. Everyone knows. Everyone participates. It has been this way since the war.\n\nThe system is called #bold Tangentopoli#! — Bribe City. It is stable, efficient, and utterly corrupt. The only question is whether it can survive contact with a judge who refuses to look the other way."

 je_mani_pulite: "Mani Pulite"
 je_mani_pulite_reason: "The investigation is running. Judge Antonio Di Pietro and the Milan pool of magistrates are working through the network of bribes and kickbacks that has funded Italian politics since the Republic was founded. Every arrest leads to a confession. Every confession leads to a name. Every name leads to another arrest.\n\nThe political class is fighting back. Emergency decrees, transfers of magistrates, public attacks on the judiciary. The question is whether the investigation can reach its conclusion before the system finds a way to stop it.\n\n@information! The #bold investigation bar#! tracks the magistrates' progress. The #bold resistance bar#! tracks the political class's ability to shut them down."

 # Status descs — tangentopoli
 je_tangentopoli_contained_tt: "The investigation is in its early stages. A handful of minor figures have been arrested. The political class is dismissing it as a provincial matter."
 je_tangentopoli_spreading_tt: "#bold The investigation is spreading.#! Confessions are accumulating. Names are emerging. The magistrates in Milan are following every thread."
 je_tangentopoli_critical_tt: "@warning! #bold The system is at breaking point.#! The scale of Tangentopoli is becoming undeniable. A political crisis is imminent."

 # Status descs — mani pulite
 je_mani_pulite_early_tt: "The investigation is building momentum. Di Pietro's team is working through the evidence. The political class has not yet organized a coherent response."
 je_mani_pulite_winning_tt: "#bold The investigation is winning.#! The magistrates are ahead of the resistance. Names are falling faster than the system can contain them."
 je_mani_pulite_stalemate_tt: "@warning! The investigation and the political resistance are evenly matched. The outcome depends on the next moves."
 je_mani_pulite_suppressed_tt: "@warning! #bold The political resistance is gaining the upper hand.#! The system is organizing. The investigation may be buried before it reaches its conclusion."

 # Progress bars
 tangentopoli_exposure_bar: "Network Exposure"
 tangentopoli_exposure_bar_desc: "How far the corruption network has been penetrated."
 tangentopoli_exposure_bar_second_desc: "The exposure grows organically as each arrest leads to more confessions."
 tangentopoli_bar_from_exposure: "Ongoing judicial exposure of the Tangentopoli network"

 investigation_progress_bar: "Investigation Progress"
 investigation_progress_bar_desc: "How far Di Pietro's magistrates have gotten."
 investigation_bar_progress: "The magistrates advance through the evidence"

 political_resistance_bar: "Political Resistance"
 political_resistance_bar_desc: "Resistance to the Investigation"
 political_resistance_bar_progress: "The political class organizes against the magistrates"

 # ── EVENT TITLES AND TEXT ────────────────

 mani_pulite.1.t: "A Businessman Tries to Flush Twenty Million Lire"
 mani_pulite.1.d: "Mario Chiesa, chairman of the Pio Albergo Trivulzio — a Milan retirement home — has been arrested by judge Antonio Di Pietro while attempting to flush banknotes down a toilet. Chiesa had been caught receiving a 37 million lire kickback from a cleaning company.\n\nThe Socialists have disowned him immediately. Their party secretary, Bettino Craxi, calls Chiesa 'a thief' — not a very wise choice of words, given what Di Pietro will find next. The arrest is minor. What it will lead to is not."
 mani_pulite.1.f: "A routine arrest. Or so it seemed."
 mani_pulite.1.a: "A local embarrassment. The system is secure."

 mani_pulite.2.t: "The First Confessions"
 mani_pulite.2.d: "Faced with prison, minor functionaries have begun to talk. Not in exchange for immunity — there is no formal deal — but because the dam has broken and the logic of silence no longer holds. Each name leads to another. Each other name leads to a party. Each party leads to a ministry.\n\nThe investigation is no longer about one man with a toilet full of banknotes. It is about the entire financial architecture of the Republic."
 mani_pulite.2.f: "When one man talks, they all talk."
 mani_pulite.2.a: "Let the investigation proceed — there is no stopping it now"
 mani_pulite.2.b: "Use executive pressure to contain the spread"

 mani_pulite.5.t: "Mani Pulite — Italy Learns What Everyone Knew"
 mani_pulite.5.d: "The Milan pool of magistrates — Di Pietro, Colombo, Davigo, Borrelli — has gone public. The evidence they have accumulated makes the scale undeniable: over the past decades, virtually every public contract in Italy came with a kickback. The parties that ran the Republic collectively consumed a percentage of every road, every hospital, every school.\n\nItaly's newspapers have a name for it: #bold Tangentopoli#!. Bribe City. The First Republic is on trial."
 mani_pulite.5.f: "Everyone knew. Now everyone knows that everyone knew."
 mani_pulite.5.a: "The investigation will go where it leads"

 mani_pulite.6.t: "Avvisi di Garanzia"
 mani_pulite.6.d: "Notices of investigation are arriving across [ROOT.GetCountry.GetName] — for businessmen, ministry officials, party treasurers, mayors. The #italic avviso di garanzia#! — a notification that one is under investigation — has become shorthand for disgrace. Newspapers print them on the front page. Careers end overnight.\n\n[SCOPE.gsInterestGroup('indicted_ig').GetName], among others, has received notice. The investigation is no longer confined to Milan."
 mani_pulite.6.f: "The postman has never been so dreaded."
 mani_pulite.6.a: "Cooperate — resistance will only make it worse"
 mani_pulite.6.b: "Apply executive pressure on the judiciary"

 mani_pulite.7.t: "Craxi and the Coins"
 mani_pulite.7.d: "Bettino Craxi — former Prime Minister, Socialist party secretary, the most powerful politician in Italy for a decade — has emerged from the Hotel Raphael in Rome to face a crowd of several hundred citizens.\n\nThey pelted him with coins and tomatoes. Coins, because they know where the money came from.\n\nCraxi gave a brief statement defending the system of party financing — 'everyone knew, everyone participated' — and retreated inside. Within months he will fly to his villa in Hammamet, Tunisia. He will never return to Italy. The Socialists, the party he built, will cease to exist."
 mani_pulite.7.f: "A man who stole from a country, driven out by coins."
 mani_pulite.7.a: "The old system is finished — let it fall"
 mani_pulite.7.b: "Manage the transition — accept responsibility, seek reform"

 mani_pulite.8.t: "The Investigation Reaches the South"
 mani_pulite.8.d: "Tangentopoli was never just a northern phenomenon. In [SCOPE.sState('tangentopoli_south_state').GetName] and across the Mezzogiorno, the kickback system was woven into EU agricultural subsidies, public infrastructure projects, and the network of relationships between local politics and organized crime.\n\nDi Pietro's investigation has followed the money south. The political networks in [SCOPE.sState('tangentopoli_south_state').GetName] are older and more deeply rooted than their northern counterparts. They will not come apart easily."
 mani_pulite.8.f: "The corruption went all the way down."
 mani_pulite.8.a: "Extend the investigation — no exceptions"
 mani_pulite.8.b: "Contain the investigation in the North — the South is too complex"

 mani_pulite.9.t: "The Biondi Decree"
 mani_pulite.9.d: "Justice Minister Alfredo Biondi has issued an emergency decree that would prohibit the use of investigative custody for a range of financial offences — including precisely the crimes at the heart of Mani Pulite. Critics have immediately named it the #italic salvaladri#! decree: the 'save-thieves' law.\n\nWithin 24 hours, the Milan magistrates have announced their collective resignation in protest. The public response is overwhelming. Prosecutors across Italy have received letters of support from hundreds of thousands of citizens. The political cost of proceeding is becoming visible."
 mani_pulite.9.f: "A government that passes a law to protect its own criminals does not long survive the attempt."
 mani_pulite.9.a: "Push through the decree — the investigation must be contained"
 mani_pulite.9.b: "Withdraw the decree — the public reaction is too strong"

 mani_pulite.10.t: "The First Republic Is Dead"
 mani_pulite.10.d: "It is over. The Christian Democracy — the party that governed Italy without interruption since 1948 — has dissolved. The Socialists are gone. The smaller coalition parties are gone. Forty-five years of the First Republic, dismantled in two years by a group of magistrates in Milan who simply refused to look the other way.\n\nOver 1,200 politicians and businessmen have been convicted. Five thousand have been investigated. Former prime ministers, cabinet ministers, and industrialists have faced trial.\n\nWhat comes next for [ROOT.GetCountry.GetName] is uncertain. But the system that fed on the Republic for half a century is finished."
 mani_pulite.10.f: "The judges did what elections never could."
 mani_pulite.10.a: "A new Italy — embrace the clean break"
 mani_pulite.10.b: "A managed transition — reform without rupture"

 mani_pulite.15.t: "The Investigation Is Buried"
 mani_pulite.15.d: "The political class has won. The magistrates have been transferred, discredited, or defunded. The evidence has been sealed. The momentum has been broken.\n\nThis does not mean that Tangentopoli did not happen. It means that the people who built it have survived it. The corruption did not end — it went underground, into new forms and new arrangements. [ROOT.GetCountry.GetName]'s citizens know what was done. They know it was not punished. That knowledge does not disappear."
 mani_pulite.15.f: "Justice deferred is justice denied. And everyone knows it."
 mani_pulite.15.a: "The system survives — for now"

 # ── MODIFIERS ────────────────────────────

 tangentopoli_systemic_corruption: "Tangentopoli"
 tangentopoli_systemic_corruption_desc: "The kickback system that has financed [ROOT.GetCountry.GetAdjective] politics for decades is embedded in every public contract. Legitimacy is structurally weakened. The system costs money and invites infamy."

 tangentopoli_chiesa_arrest: "The Chiesa Affair"
 tangentopoli_chiesa_arrest_desc: "The arrest of Mario Chiesa has opened the first crack in the system. The political class is dismissing it, but the magistrates are following the thread."

 tangentopoli_ig_under_scrutiny: "Under Investigation"
 tangentopoli_ig_under_scrutiny_desc: "This group is under judicial scrutiny in connection with the Tangentopoli corruption network. Its political strength and popular appeal are significantly damaged."

 tangentopoli_widening_investigation: "Widening Investigation"
 tangentopoli_widening_investigation_desc: "The investigation is expanding beyond its initial scope. Every confession leads to a new arrest. The political cost of governance is rising."

 tangentopoli_suppression_attempt: "Suppression Attempt"
 tangentopoli_suppression_attempt_desc: "[ROOT.GetCountry.GetName] has attempted to suppress the judicial investigation. The international community and the domestic press have noted it."

 tangentopoli_party_collapse: "Party Collapse"
 tangentopoli_party_collapse_desc: "This party has been destroyed by the Tangentopoli revelations. Its leadership is in exile or under indictment. Its voters have gone elsewhere."

 tangentopoli_legitimacy_crisis: "Legitimacy Crisis"
 tangentopoli_legitimacy_crisis_desc: "The revelation of systemic corruption has shattered public trust in [ROOT.GetCountry.GetAdjective] institutions. Radicalism is surging. Authority is weakened."

 tangentopoli_south_exposure: "Southern Networks Exposed"
 tangentopoli_south_exposure_desc: "The Mani Pulite investigation has reached the Mezzogiorno, exposing the relationship between southern political networks and the Tangentopoli system."

 mani_pulite_investigation_begins: "Mani Pulite Investigation"
 mani_pulite_investigation_begins_desc: "The Milan pool of magistrates is conducting a full investigation. [ROOT.GetCountry.GetName]'s international reputation benefits from the visible commitment to accountability."

 mani_pulite_public_mandate: "Public Mandate for Justice"
 mani_pulite_public_mandate_desc: "The withdrawal of the decree under public pressure has demonstrated the breadth of popular support for the investigation."

 mani_pulite_clean_hands_victory: "Clean Hands Victory"
 mani_pulite_clean_hands_victory_desc: "Mani Pulite succeeded. The First Republic's corrupt party system has been dismantled by judicial process. [ROOT.GetCountry.GetName] begins its Second Republic with higher legitimacy, a cleaner institutional foundation, and the international recognition that comes from holding power accountable."

 mani_pulite_cautious_transition: "Managed Transition"
 mani_pulite_cautious_transition_desc: "The transition from the First to Second Republic is being managed carefully — reform without rupture. The old parties are gone, but the institutional continuity is preserved."

 mani_pulite_investigation_buried: "Investigation Buried"
 mani_pulite_investigation_buried_desc: "Mani Pulite failed. The political class survived. [ROOT.GetCountry.GetName]'s citizens know what was done and know it was not punished. The corruption continues beneath the surface. Legitimacy is permanently damaged."

 amendment_events.1.t: "A Federal Health Programme for the Poor"
 amendment_events.1.d: "Proposals are before Congress to create a federally funded health insurance programme for low-income Americans, the elderly, and the disabled. Supporters argue that private markets cannot and will not serve those who cannot afford premiums. Opponents argue it is an unacceptable expansion of federal involvement in healthcare.\n\nThe coalition backing the bill is broad — trade unions, social reformers, and a significant portion of the public. Whether [ROOT.GetCountry.GetName] will act is a question of political will."
 amendment_events.1.f: "Medicine should not depend on whether you can afford it."
 amendment_events.1.a: "Enact Medicaid — federal health coverage for those who need it"
 amendment_events.1.b: "Reject it — healthcare is a private matter"
 
 amendment_events.2.t: "The Affordable Care Act"
 amendment_events.2.d: "The administration has put forward comprehensive healthcare reform — the Affordable Care Act. The bill mandates that all citizens carry health insurance, creates regulated marketplaces, extends Medicaid eligibility, and bars insurers from denying coverage for pre-existing conditions.\n\nThe individual mandate is deeply controversial. Supporters say it is the only way to make insurance markets function. The opposition calls it government overreach. The bill has the votes — if the coalition holds."
 amendment_events.2.f: "Forty million uninsured Americans. Congress has a chance to change that."
 amendment_events.2.a: "Sign the Affordable Care Act into law"
 amendment_events.2.b: "Veto it — the mandate goes too far"
 
 amendment_events.3.t: "The PATRIOT Act"
 amendment_events.3.d: "In the weeks after the September 11 attacks, Congress has moved with extraordinary speed to pass the USA PATRIOT Act — dramatically expanding domestic surveillance authorities, reducing judicial oversight of intelligence operations, and enabling unprecedented information-sharing across law enforcement agencies.\n\nThe bill has near-unanimous support. Civil liberties advocates warn that the speed of passage and the breadth of the provisions will be difficult to walk back. The country is still grieving. The vote is tomorrow."
 amendment_events.3.f: "Fear is a legislator."
 amendment_events.3.a: "Sign the PATRIOT Act — national security requires it"
 amendment_events.3.b: "Refuse — civil liberties cannot be bargained away in grief"
 
 amendment_events.4.t: "A Federal Assault Weapons Ban"
 amendment_events.4.d: "Congress is voting on a ten-year federal prohibition on the manufacture of specified semi-automatic weapons and high-capacity magazines for civilian sale. The bill is backed by law enforcement associations and the families of shooting victims. The gun lobby has spent heavily against it.\n\nThe ten-year sunset clause was added to secure the final votes. The ban will expire in 2004 unless renewed — and the political coalition to renew it may not hold."
 amendment_events.4.f: "Ten years. Then the vote happens again."
 amendment_events.4.a: "Pass the ban — ten years is a start"
 amendment_events.4.b: "Defeat it — law-abiding citizens should not pay for criminals' actions"
 
 amendment_events.5.t: "The Violent Crime Control and Law Enforcement Act"
 amendment_events.5.d: "Congress is considering the largest crime legislation in [ROOT.GetCountry.GetName]'s history — funding for 100,000 new police officers, a significant expansion of the federal prison system, new mandatory minimum sentences, and the Violence Against Women Act as a rider.\n\nThe political logic is bipartisan. The crime wave of the late 1980s has made law-and-order politics popular across party lines. The bill will pass easily. Whether it will work is a question for later."
 amendment_events.5.f: "The bill passes easily. The consequences take longer."
 amendment_events.5.a: "Sign it — the country demands action on crime"
 amendment_events.5.b: "Reject it — mandatory minimums and mass incarceration are not the answer"
 
 amendment_events.6.t: "The Tax-Sharing System Reform"
 amendment_events.6.d: "Finance Minister Liu Jihua has proposed the most significant fiscal reform since the founding of the People's Republic — replacing the negotiated enterprise tax-sharing arrangements between Beijing and local governments with a national value-added tax and a formal revenue formula.\n\nThe reform would dramatically centralize fiscal power, giving Beijing a reliable and growing revenue stream. Local governments will lose discretion but gain clarity. The industrial and commercial interests that have built relationships with local authorities are quietly opposed."
 amendment_events.6.f: "The centre wants what the provinces have been keeping."
 amendment_events.6.a: "Implement the tax-sharing system — centralize fiscal authority"
 amendment_events.6.b: "Maintain the existing arrangements — do not disrupt what functions"
 
 amendment_events.7.t: "The 35-Hour Work Week"
 amendment_events.7.d: "Labour Minister Martine Aubry has proposed legislation mandating a 35-hour statutory working week for most employees — reducing standard hours from 39. The policy is presented as a way to share work more broadly: fewer hours per worker, more workers employed.\n\nTrade unions are enthusiastic. The employers' federation has warned of a competitiveness crisis. Economists are divided. The left-wing coalition that elected this government ran on the promise. The question is whether to deliver it."
 amendment_events.7.f: "Thirty-five hours. Two hours less. A political firestorm."
 amendment_events.7.a: "Pass the Aubry Law — workers deserve shorter hours"
 amendment_events.7.b: "Drop it — the economic cost is too high"
 
 patriot_act_rejected_modifier: "PATRIOT Act Rejected"
 patriot_act_rejected_modifier_desc: "The decision not to pass the PATRIOT Act has left the security establishment frustrated and the post-attack political consensus strained."
 
 china_tax_reform_rejected_modifier: "Tax Reform Stalled"
 china_tax_reform_rejected_modifier_desc: "The failure to centralize the tax system has left fiscal authority fragmented. Local governments continue to negotiate their own arrangements, reducing the centre's revenue and authority."
 
 terrorism_a.1.t: "The World Trade Center Is Bombed"
 terrorism_a.1.d: "A bomb has exploded in the underground parking garage of the World Trade Center in New York. The blast killed six people and wounded over a thousand. The building did not fall — but the intent was to bring one tower down onto the other.\n\nIt is the first major international terrorist attack on [ROOT.GetCountry.GetName] soil. The perpetrators have links to networks operating out of the Middle East and Central Asia. The investigation is ongoing."
 terrorism_a.1.f: "The first attack. Not the last."
 terrorism_a.1.a: "We will find those responsible"
 
 terrorism_a.2.t: "Hurricane Andrew Strikes"
 terrorism_a.2.d: "Hurricane Andrew — the most destructive Atlantic hurricane on record at the time — has made landfall in South Florida with winds exceeding 165 miles per hour. The damage is catastrophic. Entire communities in Miami-Dade County have been destroyed. Preliminary estimates suggest this will be one of the costliest natural disasters in [ROOT.GetCountry.GetName]'s history."
 terrorism_a.2.f: "The hurricane cares nothing for what was built."
 terrorism_a.2.a: "Declare a federal disaster — mobilize relief"
 
 terrorism_a.3.t: "Northridge Earthquake"
 terrorism_a.3.d: "A magnitude 6.7 earthquake struck the San Fernando Valley north of Los Angeles at 4:31 in the morning. Fifty-seven people are dead, thousands injured, and the damage to infrastructure — particularly the freeway system and older buildings — has already exceeded tens of billions of dollars. The earthquake is the costliest in [ROOT.GetCountry.GetName]'s history."
 terrorism_a.3.f: "California shakes. It always shakes."
 terrorism_a.3.a: "Mobilize federal relief immediately"
 
 terrorism_a.4.t: "Bombing in Oklahoma City"
 terrorism_a.4.d: "A truck bomb has destroyed the front face of the Alfred P. Murrah Federal Building in Oklahoma City, killing 168 people — including 19 children in the building's daycare centre. It is the deadliest domestic terrorist attack in [ROOT.GetCountry.GetName]'s history.\n\nThe perpetrators are not foreign. Timothy McVeigh and Terry Nichols are [ROOT.GetCountry.GetAdjective] citizens motivated by anti-government ideology. The country is confronted with the reality that the threat can come from within."
 terrorism_a.4.f: "The enemy was not at the border. He was already here."
 terrorism_a.4.a: "This is domestic terrorism — we will respond with full force"
 
 terrorism_a.5.t: "U.S. Embassies Bombed in East Africa"
 terrorism_a.5.d: "Simultaneous truck bombs have exploded outside the [ROOT.GetCountry.GetAdjective] embassies in Nairobi, Kenya and Dar es Salaam, Tanzania. The attacks killed over 200 people — most of them Kenyan and Tanzanian civilians — and wounded thousands more. A network led by Osama bin Laden has claimed responsibility.\n\nThe attacks are a declaration that [ROOT.GetCountry.GetAdjective] interests worldwide are targets. [ROOT.GetCountry.GetName]'s response will define the shape of counterterrorism for the coming decade."
 terrorism_a.5.f: "The war came to our embassies first."
 terrorism_a.5.a: "This is an act of war — we will respond"
 
 terrorism_a.6.t: "The [ROOT.GetCountry.GetAdjective] Embassy Is Bombed"
 terrorism_a.6.d: "A truck bomb has exploded outside the United States Embassy in Nairobi, killing over 200 people — the majority of them [ROOT.GetCountry.GetAdjective] civilians who happened to be near the building at the time. The attack was not aimed at [ROOT.GetCountry.GetName]. [ROOT.GetCountry.GetName] bore the cost of it anyway."
 terrorism_a.6.f: "The bomb did not distinguish between nations."
 terrorism_a.6.a: "We demand justice for our dead"
 
 terrorism_a.7.t: "The [ROOT.GetCountry.GetAdjective] Capital Is Struck"
 terrorism_a.7.d: "A bomb has exploded near the United States Embassy in Dar es Salaam, killing eleven people in what appears to be a coordinated attack alongside a simultaneous bombing in Nairobi, Kenya. The victims were primarily [ROOT.GetCountry.GetAdjective] civilians. The attack has shaken the country."
 terrorism_a.7.f: "Terrorism reached our shores from across an ocean."
 terrorism_a.7.a: "We stand with our people"
 
 terrorism_a.8.t: "The USS Cole Is Bombed"
 terrorism_a.8.d: "A small boat carrying explosives detonated alongside the USS Cole as it refueled in the port of Aden, Yemen. Seventeen [ROOT.GetCountry.GetAdjective] sailors were killed and 39 injured. The attack is attributed to al-Qaeda.\n\nA warship of the [ROOT.GetCountry.GetAdjective] Navy, on a routine refueling stop in a friendly port, was attacked by a suicide bomber in a rubber dinghy. The military leadership is asking how this was allowed to happen."
 terrorism_a.8.f: "The navy is supposed to be the hard target."
 terrorism_a.8.a: "This will not go unanswered"
 
 terrorism_a.9.t: "The Bridge Creek–Moore Tornado"
 terrorism_a.9.d: "An EF5 tornado — the strongest recorded on the Fujita scale — has cut a path through Bridge Creek and Moore, Oklahoma. Wind speeds exceeded 300 miles per hour. The tornado was on the ground for 85 minutes and carved a mile-wide path of total destruction through communities south of Oklahoma City. Thirty-six people are dead."
 terrorism_a.9.f: "There is nothing left where the tornado was."
 terrorism_a.9.a: "Deploy relief to affected communities"
 
 terrorism_a.10.t: "32 Dead at Virginia Tech"
 terrorism_a.10.d: "A gunman has killed 32 students and faculty at Virginia Polytechnic Institute in Blacksburg, Virginia, before taking his own life. It is the deadliest school shooting in [ROOT.GetCountry.GetName]'s history. The shooter legally purchased his firearms despite a history of mental health concerns that should have disqualified him under existing law.\n\nThe failure of the background check system is now under scrutiny."
 terrorism_a.10.f: "He bought the gun legally."
 terrorism_a.10.a: "Review firearms background check procedures immediately"
 
 terrorism_a.11.t: "82 Shot in Aurora Theatre"
 terrorism_a.11.d: "A gunman opened fire during a midnight premiere of a major film at the Century 16 theater in Aurora, Colorado, killing 12 people and wounding 70. The attacker was armed with a semi-automatic rifle, shotgun, and handguns — all purchased legally in the weeks before the attack.\n\nColorado and the country are in shock."
 terrorism_a.11.f: "A night at the movies. Twelve people did not go home."
 terrorism_a.11.a: "A tragedy that demands reflection"
 
 terrorism_a.12.t: "Gunman Kills 6 at Wisconsin Sikh Temple"
 terrorism_a.12.d: "A white supremacist opened fire at the Sikh Temple of Wisconsin in Oak Creek, killing six worshippers before being shot by police. The attacker was a US Army veteran with links to neo-Nazi organizations.\n\nThe victims were targeted because of their religion and ethnicity. The attack has reignited debate about domestic extremism, hate crime, and the failure to monitor white nationalist networks."
 terrorism_a.12.f: "They came to pray. He came to kill them for who they were."
 terrorism_a.12.a: "This is hate crime — we will not ignore domestic extremism"
 
 terrorism_a.13.t: "Tragedy in Sandy Hook"
 terrorism_a.13.d: "A gunman killed 20 children aged between six and seven years old, and six adult staff members, at Sandy Hook Elementary School in Newtown, Connecticut. The children were shot multiple times with an assault-style rifle.\n\nThere are no adequate words. [ROOT.GetCountry.GetName] is in mourning."
 terrorism_a.13.f: "Twenty children. Six years old."
 terrorism_a.13.a: "The country grieves"
 
 terrorism_a.14.t: "The Dunblane Massacre"
 terrorism_a.14.d: "A gunman entered Dunblane Primary School in Scotland and killed sixteen children aged five and six, and their teacher, before taking his own life. It is the deadliest mass shooting in [ROOT.GetCountry.GetName]'s history.\n\nThe national response is overwhelming. Survivors, parents, and the public have launched a campaign for a total ban on private handgun ownership. The government will face enormous pressure to act."
 terrorism_a.14.f: "Sixteen children. Five years old. Scotland will not forget."
 terrorism_a.14.a: "Something must change — the country demands it"
 
 terrorism_a.15.t: "The Yangtze Floods"
 terrorism_a.15.d: "The Yangtze River and its tributaries have flooded catastrophically following months of unusually heavy rainfall. The flooding has affected 240 million people across central and southern [ROOT.GetCountry.GetName] — 14 provinces, 56 million acres of farmland, and thousands of settlements. Over 3,000 people are dead and 14 million have been displaced.\n\nThe state mobilization is massive. The military has deployed hundreds of thousands of troops to flood relief. This is the largest natural disaster in recent [ROOT.GetCountry.GetAdjective] history."
 terrorism_a.15.f: "The river decided to take what the dikes had promised to keep."
 terrorism_a.15.a: "The full force of the state will be deployed"
 
 terrorism_a.16.t: "Apartment Buildings Bombed in Moscow"
 terrorism_a.16.d: "A series of bomb attacks on apartment buildings in Moscow and other Russian cities has killed almost 300 people while they slept. The bombings have been attributed to Chechen separatists — though the evidence is contested by some observers.\n\nThe attacks have created enormous public pressure for a decisive military response. A new military campaign in Chechnya is now under serious consideration. The political figure who promises to crush the terrorists will find the public is ready to follow him."
 terrorism_a.16.f: "Fear is a powerful political tool. So is grief."
 terrorism_a.16.a: "This demands a full military response"
 
