 je_korea_reunification_stk_reason:0 "The Republic of Korea is the sole legitimate government of the Korean nation. The division of the peninsula is a legacy of foreign occupation and Cold War rivalry — [ROOT.GetCountry.GetName] has never accepted it as permanent.\n\nReunification under [ROOT.GetCountry.GetAdjective] leadership would bring the Korean people together under a democratic constitutional order. North Korea's northern administration must be absorbed into the [ROOT.GetCountry.GetAdjective] state. The Pyonyang regime's grip on the north is the last obstacle."
 
