 je_io_eec_membership_process:0 "EEC Accession Process"
 je_io_eec_membership_process_reason:0 "Joining the EEC requires more than a normal membership vote. The applicant must align its trade, administrative, and democratic institutions with European standards."
 io_eec_membership_status_reforming:0 "Reforms are underway."
 io_eec_membership_status_ready:0 "Accession requirements are met."

 je_io_eu_membership_process:0 "EU Accession Process"
 je_io_eu_membership_process_reason:0 "Joining the EU requires a deeper accession process than ordinary international organizations. The applicant must satisfy democratic, civil-liberty, market, and administrative standards."
 io_eu_membership_status_reforming:0 "Reforms are underway."
 io_eu_membership_status_ready:0 "Accession requirements are met."

 io_accession_country_in_europe_tt:0 "The capital must be in Europe."
 io_accession_not_subject_tt:0 "The applicant must not be a subject."
 io_accession_democratic_government_tt:0 "Have a democratic constitutional framework: Presidential Republic, Parliamentary Republic, or a constitutional monarchy with voting rights."
 io_accession_no_authoritarian_laws_tt:0 "Do not have authoritarian laws such as Autocracy, Oligarchy, Single-Party State, No Voting, Landed Voting, Appointed Bureaucrats, or Outlawed Dissent."
 io_accession_voting_rights_tt:0 "Have Census Voting or Universal Suffrage."
 io_accession_civil_liberties_tt:0 "Have Right of Assembly or Protected Speech."
 io_accession_elected_bureaucrats_tt:0 "Have Elected Bureaucrats."
 io_eec_accession_trade_policy_tt:0 "Have Protectionism or Free Trade."
 io_eu_accession_free_trade_tt:0 "Have Free Trade."
 io_eu_accession_minorities_tt:0 "Have Cultural Exclusion or Multiculturalism."
 io_eu_accession_migration_tt:0 "Have No Migration Controls or Migration Controls."
 io_accession_authoritarian_failure_tt:0 "The accession process fails if authoritarian laws are adopted."

 io_accession_events.1.t:0 "EEC Accession Completed"
 io_accession_events.1.d:0 "Our reforms have satisfied the requirements for EEC membership. We have entered the European economic framework."
 io_accession_events.1.a:0 "Join the EEC."

 io_accession_events.2.t:0 "EU Accession Completed"
 io_accession_events.2.d:0 "Our accession process is complete. We have joined the European Union and entered its political and economic framework."
 io_accession_events.2.a:0 "Join the European Union."

 io_accession_events.3.t:0 "EEC Accession Halted"
 io_accession_events.3.d:0 "The EEC accession process has collapsed after our government moved away from democratic standards."
 io_accession_events.3.a:0 "The process is over."

 io_accession_events.4.t:0 "EU Accession Halted"
 io_accession_events.4.d:0 "The EU accession process has collapsed after our government moved away from democratic standards."
 io_accession_events.4.a:0 "The process is over."

 io_accession_events.10.t:0 "Expelled from NATO"
 io_accession_events.10.d:0 "Our adoption of authoritarian laws has made continued NATO membership impossible. The alliance has expelled us and our defensive pacts with its members have been withdrawn."
 io_accession_events.10.a:0 "We stand alone."

 io_accession_events.11.t:0 "Expelled from the EEC"
 io_accession_events.11.d:0 "Our adoption of authoritarian laws has violated the political expectations of European cooperation. We have been expelled from the EEC."
 io_accession_events.11.a:0 "So be it."

 io_accession_events.12.t:0 "Expelled from the European Union"
 io_accession_events.12.d:0 "Our adoption of authoritarian laws has violated the democratic standards of the European Union. We have been expelled from the Union."
 io_accession_events.12.a:0 "The Union turns away."

 io_accession_events.13.t:0 "Expelled from the G7"
 io_accession_events.13.d:0 "Our adoption of authoritarian laws has made continued membership in the G7 politically unacceptable. We have been removed from the group."
 io_accession_events.13.a:0 "A diplomatic setback."

 io_accession_events.20.t:0 "NATO Democratic Standards Warning"
 io_accession_events.20.d:0 "Our government has adopted authoritarian laws. If these laws remain in place, NATO membership will be revoked during the next review."
 io_accession_events.20.a:0 "We have been warned."

 io_accession_events.21.t:0 "EEC Democratic Standards Warning"
 io_accession_events.21.d:0 "Our government has adopted authoritarian laws. If these laws remain in place, EEC membership will be revoked during the next review."
 io_accession_events.21.a:0 "We have been warned."

 io_accession_events.22.t:0 "EU Democratic Standards Warning"
 io_accession_events.22.d:0 "Our government has adopted authoritarian laws. If these laws remain in place, EU membership will be revoked during the next review."
 io_accession_events.22.a:0 "We have been warned."

 io_accession_events.23.t:0 "G7 Democratic Standards Warning"
 io_accession_events.23.d:0 "Our government has adopted authoritarian laws. If these laws remain in place, G7 membership will be revoked during the next review."
 io_accession_events.23.a:0 "We have been warned."

 io_democratic_standards_warning:0 "Democratic Standards Warning"
 io_democratic_standards_warning_desc:0 "This country has been warned that its authoritarian laws may threaten membership in democratic international organizations."

 io_expelled_from_democratic_org:0 "Expelled from Democratic Organization"
 io_expelled_from_democratic_org_desc:0 "This country has been expelled from an international organization after adopting authoritarian laws."
 
 intifada_2005.1.t:0 "The Second Intifada Winds Down"
 intifada_2005.1.d:0 "After years of sustained violence, exhaustion, security measures, diplomatic pressure, and political change have brought the uprising to a close."
 intifada_2005.1.f:0 "The conflict is not resolved, but the phase of open intifada has ended. A ceasefire leaves both sides scarred, suspicious, and uncertain of what comes next."
 intifada_2005.1.a:0 "Accept a white peace."

 intifada_2005.2.t:0 "The Second Intifada Winds Down"
 intifada_2005.2.d:0 "The fighting has abated, and the uprising has entered a new, quieter phase."
 intifada_2005.2.f:0 "No final settlement has been reached, but the escalation has burned itself out."
 intifada_2005.2.a:0 "The struggle continues by other means."

 intifada_2005_ceasefire:0 "Second Intifada Ceasefire"
 intifada_2005_ceasefire_desc:0 "The open phase of the Second Intifada has ended in a fragile ceasefire."
 
 arab_spring_jihadist_breakaways.1.t:0 "The Islamic State Emerges"
 arab_spring_jihadist_breakaways.1.d:0 "The chaos of revolution and state collapse has allowed jihadist forces to consolidate territory under the banner of the Islamic State."
 arab_spring_jihadist_breakaways.1.f:0 "The old state fights the revolution. The revolution fights the old state. In the ruins between them, a third force raises its flag."
 arab_spring_jihadist_breakaways.1.a:0 "A new front opens."

 arab_spring_jihadist_breakaways.2.t:0 "Jihadist Enclaves Emerge"
 arab_spring_jihadist_breakaways.2.d:0 "As the Arab Spring destabilizes the region, jihadist cells have seized scattered territory and declared loyalty to the Islamic State."
 arab_spring_jihadist_breakaways.2.f:0 "Where the state withdraws, armed networks become administrations."
 arab_spring_jihadist_breakaways.2.a:0 "The crisis spreads."

 arab_spring_jihadist_breakaways.3.t:0 "The Houthis Seize Territory"
 arab_spring_jihadist_breakaways.3.d:0 "The Yemeni revolution has fractured the country, allowing the Houthi movement to seize territory and mobilize its own forces."
 arab_spring_jihadist_breakaways.3.f:0 "The uprising did not produce one opposition, but many."
 arab_spring_jihadist_breakaways.3.a:0 "Yemen splinters."

