 ip_uneasy_status_quo:0 "Uneasy Status Quo"
 ip_uneasy_status_quo_desc:0 "Open fighting has subsided, but the conflict still shapes politics, diplomacy, and everyday administration."

 ip_security_coordination:0 "Security Coordination"
 ip_security_coordination_desc:0 "Coordination between security forces is limiting escalation, though it is politically costly."

 ip_closure_policy:0 "Closure Policy"
 ip_closure_policy_desc:0 "Movement restrictions are reducing some security risks while increasing diplomatic and humanitarian pressure."

 ip_economic_restrictions:0 "Economic Restrictions"
