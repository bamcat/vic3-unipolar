 je_ip_peacetime_grassroots_outreach:0 "Grassroots Outreach"
 je_ip_peacetime_grassroots_outreach_desc:0 "Support civil society, local organizing, and nonviolent political initiatives. This lowers tension but can anger hardliners."

 je_ip_peacetime_mass_mobilization:0 "Mass Mobilization"
