 ip_breakdown_of_calm:0 "Breakdown of Calm"
 ip_breakdown_of_calm_desc:0 "The peacetime status quo has broken down and the public is bracing for escalation."

 ip_peacetime.1.t:0 "Checkpoint Incident"
 ip_peacetime.1.d:0 "A local security incident has drawn public attention and raised pressure for a response."
 ip_peacetime.1.f:0 "Even minor confrontations can become symbols of the wider conflict."
 ip_peacetime.1.a:0 "Tighten security procedures."
 ip_peacetime.1.b:0 "Coordinate quietly with local authorities."

 ip_peacetime.2.t:0 "Security Crackdown"
 ip_peacetime.2.d:0 "Palestinian security forces face pressure to act against militants and armed factions."
 ip_peacetime.2.f:0 "Cooperation can prevent escalation, but it can also look like collaboration."
 ip_peacetime.2.a:0 "Move against the networks."
 ip_peacetime.2.b:0 "Avoid a confrontation."

 ip_peacetime.3.t:0 "Settlement Announcement"
 ip_peacetime.3.d:0 "A proposed expansion has become a flashpoint in the diplomatic process."
 ip_peacetime.3.f:0 "Maps, permits, and hilltops can carry the weight of national strategy."
 ip_peacetime.3.a:0 "Proceed with the announcement."
 ip_peacetime.3.b:0 "Delay the expansion."

 ip_peacetime.4.t:0 "Street Protests"
 ip_peacetime.4.d:0 "Demonstrations have spread through several communities, challenging the current political balance."
 ip_peacetime.4.f:0 "The street can be a safety valve, or the first sign of something larger."
 ip_peacetime.4.a:0 "Let the mobilization continue."
 ip_peacetime.4.b:0 "Call for restraint."

 ip_peacetime.5.t:0 "International Envoy"
 ip_peacetime.5.d:0 "A foreign envoy has arrived with proposals for renewed dialogue."
 ip_peacetime.5.f:0 "Diplomacy rarely resolves the conflict at once, but it can buy time."
 ip_peacetime.5.a:0 "Receive the envoy."
 ip_peacetime.5.b:0 "Reject outside pressure."

 ip_peacetime.6.t:0 "Donor Conference"
 ip_peacetime.6.d:0 "Foreign donors are offering new support, but expect political concessions in return."
 ip_peacetime.6.f:0 "Aid can stabilize institutions, but dependence carries its own costs."
 ip_peacetime.6.a:0 "Accept the diplomatic framework."
 ip_peacetime.6.b:0 "Demand fewer conditions."

 ip_peacetime.10.t:0 "The Calm Breaks"
 ip_peacetime.10.d:0 "The accumulated pressure of raids, protests, closures, political breakdown, and failed talks has brought the situation to the brink."
 ip_peacetime.10.f:0 "The language of administration gives way to the language of emergency."
 ip_peacetime.10.a:0 "Prepare for escalation."
 ip_peacetime.10.b:0 "Make one last emergency push."

 ip_peacetime.20.t:0 "A Durable Calm"
 ip_peacetime.20.d:0 "A rare combination of security coordination, political restraint, and diplomatic engagement has stabilized the situation."
 ip_peacetime.20.f:0 "It is not a final peace, but it is more than the absence of war."
 ip_peacetime.20.a:0 "A fragile success."
 
 oslo_accords.1.t:0 "The Oslo I Accord"
 oslo_accords.1.d:0 "Israeli negotiators have reached a proposed declaration of principles with the Palestinian leadership. The proposal would establish mutual recognition and an interim framework for Palestinian self-government."
 oslo_accords.1.f:0 "The agreement does not settle borders, Jerusalem, settlements, refugees, or final sovereignty. It does, however, offer a staged political process."
 oslo_accords.1.a:0 "Propose the Declaration of Principles."
 oslo_accords.1.b:0 "Delay the agreement."

 oslo_accords.10.t:0 "Israel Proposes the Oslo I Accord"
 oslo_accords.10.d:0 "Israel has proposed a declaration of principles establishing mutual recognition and an interim Palestinian self-government framework."
 oslo_accords.10.f:0 "Acceptance would begin a new political process and end formal subordination to Israel, but many final-status issues would remain unresolved."
 oslo_accords.10.a:0 "Accept the Declaration of Principles."
 oslo_accords.10.b:0 "Reject the proposal."

 oslo_accords.11.t:0 "Palestine Accepts Oslo I"
 oslo_accords.11.d:0 "The Palestinian leadership has accepted the Declaration of Principles. The interim peace process has begun."
 oslo_accords.11.f:0 "The handshake is historic; the difficult work is only beginning."
 oslo_accords.11.a:0 "The process begins."

 oslo_accords.12.t:0 "Palestine Rejects Oslo I"
 oslo_accords.12.d:0 "The Palestinian leadership has rejected the proposed Declaration of Principles."
 oslo_accords.12.f:0 "Without mutual acceptance, the diplomatic opening closes."
 oslo_accords.12.a:0 "The talks collapse."

 oslo_accords.2.t:0 "The Oslo II Accord"
 oslo_accords.2.d:0 "Two years after the Declaration of Principles, Israeli negotiators have prepared an interim agreement expanding Palestinian self-government in the West Bank and Gaza."
 oslo_accords.2.f:0 "The proposal divides authority into zones of Palestinian control, shared responsibility, and continued Israeli control."
 oslo_accords.2.a:0 "Propose the Interim Agreement."
 oslo_accords.2.b:0 "Delay further redeployment."

 oslo_accords.20.t:0 "Israel Proposes the Oslo II Accord"
 oslo_accords.20.d:0 "Israel has proposed an interim agreement expanding Palestinian self-government and organizing the West Bank into Areas A, B, and C."
 oslo_accords.20.f:0 "The agreement promises expanded authority, but also entrenches a fragmented map of overlapping jurisdictions."
 oslo_accords.20.a:0 "Accept the Interim Agreement."
 oslo_accords.20.b:0 "Reject the proposal."

 oslo_accords.21.t:0 "Palestine Accepts Oslo II"
 oslo_accords.21.d:0 "The Palestinian leadership has accepted the Interim Agreement. The Oslo process moves into its next phase."
 oslo_accords.21.f:0 "More authority is transferred, but the final settlement remains distant."
 oslo_accords.21.a:0 "Implement the agreement."

 oslo_accords.22.t:0 "Palestine Rejects Oslo II"
 oslo_accords.22.d:0 "The Palestinian leadership has rejected the proposed Interim Agreement."
 oslo_accords.22.f:0 "The structure built by Oslo I survives, but its next step has failed."
 oslo_accords.22.a:0 "The process stalls."

 oslo_i_peace_process:0 "Oslo I Peace Process"
 oslo_i_peace_process_desc:0 "The Declaration of Principles has opened a formal interim peace process."

 oslo_i_palestinian_authority:0 "Palestinian Authority Established"
 oslo_i_palestinian_authority_desc:0 "An interim Palestinian authority has begun assuming civil responsibilities."

 oslo_talks_delayed:0 "Talks Delayed"
 oslo_talks_delayed_desc:0 "The diplomatic process has stalled, raising frustration and uncertainty."

 oslo_ii_interim_agreement:0 "Oslo II Interim Agreement"
 oslo_ii_interim_agreement_desc:0 "The interim agreement has expanded the framework for Palestinian self-government."

 oslo_ii_expanded_self_government:0 "Expanded Self-Government"
 oslo_ii_expanded_self_government_desc:0 "Palestinian institutions have assumed greater administrative responsibilities."

 oslo_ii_joint_security_framework:0 "Joint Security Framework"
 oslo_ii_joint_security_framework_desc:0 "Security responsibilities are being coordinated under the interim framework."

 oslo_ii_administrative_fragmentation:0 "Administrative Fragmentation"
 oslo_ii_administrative_fragmentation_desc:0 "The territory is governed through fragmented and overlapping jurisdictions."

 oslo_ii_delayed_redeployment:0 "Delayed Redeployment"
 oslo_ii_delayed_redeployment_desc:0 "Further redeployment has been delayed, damaging confidence in the process."

 oslo_accords.30.t:0 "The Oslo I Accord Is Signed"
 oslo_accords.30.d:0 "Israel and Palestine have accepted the Declaration of Principles. The United States is now expected to support the new peace process and help sustain the interim framework."
 oslo_accords.30.f:0 "A diplomatic opening has emerged, but it will need guarantors, money, pressure, and patience."
 oslo_accords.30.a:0 "Monitor the process."

 oslo_accords.31.t:0 "The Oslo I Accord Fails"
 oslo_accords.31.d:0 "The proposed Declaration of Principles has been rejected. The diplomatic opening has closed before an interim framework could be established."
 oslo_accords.31.f:0 "Without mutual acceptance, outside mediation cannot carry the process alone."
 oslo_accords.31.a:0 "A setback for mediation."

 oslo_accords.32.t:0 "The Oslo II Accord Is Signed"
 oslo_accords.32.d:0 "Israel and Palestine have accepted the Interim Agreement, expanding Palestinian self-government and establishing the next stage of the Oslo process."
 oslo_accords.32.f:0 "The agreement is a diplomatic success, but its map of divided authority may prove difficult to administer."
 oslo_accords.32.a:0 "Support implementation."

 oslo_accords.33.t:0 "The Oslo II Accord Fails"
 oslo_accords.33.d:0 "The proposed Interim Agreement has been rejected. The Oslo process remains incomplete and the territorial-administrative framework is now uncertain."
 oslo_accords.33.f:0 "The first step was not enough to guarantee the second."
 oslo_accords.33.a:0 "The process stalls."

