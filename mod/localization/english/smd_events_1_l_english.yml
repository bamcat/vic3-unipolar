 # ── EVENTS ───────────────────────────────
 
 velvet_divorce.1.t: "The Constitutional Crisis Begins"
 velvet_divorce.1.d: "The elections of June 1992 have produced an impossible result. In the Czech lands, Václav Klaus's Civic Democratic Party won on a platform of rapid market liberalisation. In Slovakia, Vladimír Mečiar's Movement for a Democratic Slovakia won on a platform of slower reform and greater Slovak autonomy.\n\nThe two men met in Brno and agreed on one thing: the current arrangement cannot continue. They disagree on almost everything else. President Václav Havel — who believes the public would vote to keep the country together if asked — has been sidelined.\n\nThe fate of [ROOT.GetCountry.GetName] is now a question of what the next months bring."
 velvet_divorce.1.f: "Two elections. Two mandates. One country."
 velvet_divorce.1.a: "The government will work to hold the federation together"
 
 velvet_divorce.2.t: "Slovak Economic Grievances"
 velvet_divorce.2.d: "Slovakia's economy is suffering the transition from communism harder than Bohemia and Moravia. The Slovak industrial base — built around heavy manufacturing and arms production for the Warsaw Pact — has collapsed almost overnight. Unemployment is rising sharply. Slovak politicians are blaming federal economic policy and demanding either redistribution or the right to set their own course.\n\nThe gap between the two halves of the country is becoming politically combustible."
 velvet_divorce.2.f: "When half a country does well and the other half does not, the question of why becomes a question of who."
 velvet_divorce.2.a: "Redirect federal funds toward the Slovak regions"
 velvet_divorce.2.b: "The market will find its level — no special treatment"
 
 velvet_divorce.3.t: "The Slovak Declaration of Sovereignty"
 velvet_divorce.3.d: "The Slovak National Council has passed a declaration of the sovereignty of Slovakia. The document stops short of declaring independence, but asserts that Slovak law supersedes federal law on Slovak territory.\n\nThis is constitutionally ambiguous and politically explosive. President Havel condemned it and resigned his Czechoslovak presidency shortly after. The declaration is not yet a rupture — but it is the first formal step toward one."
 velvet_divorce.3.f: "Not yet independence. But the direction is clear."
 velvet_divorce.3.a: "Condemn the declaration — federal law is supreme"
 velvet_divorce.3.b: "Open talks — offer Slovakia more formal autonomy within the federation"
 
 velvet_divorce.4.t: "Mečiar and Klaus: Two Men, Two Visions"
 velvet_divorce.4.d: "Vladimír Mečiar and Václav Klaus have met again. Their negotiating positions have hardened. Klaus wants a tight federal union with unified economic policy. Mečiar wants either a loose confederation with near-total Slovak domestic autonomy, or independence.\n\nThose who attended the meeting describe it as civil but irreconcilable. The two men are not enemies — but they want fundamentally different things, and one of them will get what he wants."
 velvet_divorce.4.f: "Two pragmatists. Opposite conclusions."
 velvet_divorce.4.a: "Back the unified market reform programme — support Klaus"
 velvet_divorce.4.b: "Offer a looser confederation — give Mečiar something to work with"
 
 velvet_divorce.5.t: "Calls for a Referendum"
 velvet_divorce.5.d: "Slovak politicians and civic groups are calling for a referendum on independence. The proposal has significant public support in Slovakia, where polls suggest a narrow majority favour some form of separation.\n\nPresident Havel — still influential despite his resignation — has argued against a referendum. He believes the process itself would inflame passions and make a rational outcome impossible. 'Nations do not decide to separate the way a shareholders' meeting votes on a merger,' he said. 'They feel their way toward it, or away from it.'\n\nThe question of whether to hold a vote is itself a vote on what [ROOT.GetCountry.GetName] believes it is."
 velvet_divorce.5.f: "A referendum is a question. But asking some questions changes the answer."
 velvet_divorce.5.a: "Hold the referendum — let the people speak"
 velvet_divorce.5.b: "Block the referendum — follow Havel's counsel"
 
 velvet_divorce.10.t: "Czechoslovakia Survives"
 velvet_divorce.10.d: "The crisis has passed. Through a combination of economic compromise, political negotiation, and the persistence of federal institutions, [ROOT.GetCountry.GetName] has held together.\n\nThe arrangement that emerged is not the federation of 1990. Slovakia has more autonomy. The economic relationship between the two halves has been rebalanced. But the state is intact, and the flag is unchanged.\n\nHistory will note that this was not inevitable — that it required active choices, and that those choices were made."
 velvet_divorce.10.f: "The velvet divorce did not happen. That is a victory."
 velvet_divorce.10.a: "Czechoslovakia endures"
 
 velvet_divorce.15.t: "The Velvet Divorce"
 velvet_divorce.15.d: "It is done. On January 1, 1993, Czechoslovakia will cease to exist.\n\nThe dissolution was agreed by the federal parliament — not by referendum. The public was never directly asked. Polls in both halves of the country consistently showed majority support for preserving some form of common state, but the political class — Klaus and Mečiar foremost — determined that the union was unworkable.\n\nThe split was peaceful. No shots were fired. No borders were contested. The assets and liabilities of the federation were divided according to a formula based on population. The army was split. The currency was split. The flag was split.\n\nCzechoslovakia existed for seventy-four years. It was born in revolution and dissolved in a parliamentary vote. Both successor states have already applied for EU and NATO membership."
 velvet_divorce.15.f: "Seventy-four years. Ended by paperwork."
 velvet_divorce.15.a: "The dissolution proceeds"
 
 velvet_divorce.16.t: "The Czech Republic Is Born"
 velvet_divorce.16.d: "On January 1, 1993, the Czech Republic becomes an independent state. The territory of Bohemia, Moravia, and Czech Silesia — with Prague as its capital — forms one of the two successor states to the Czechoslovak federation.\n\nThe new state inherits the more developed half of the old economy, a functioning democratic system, and immediate international recognition. The path to Europe is open."
 velvet_divorce.16.f: "A new state. An old nation."
 velvet_divorce.16.a: "The Czech Republic begins"
 
 velvet_divorce.17.t: "The Slovak Republic Is Born"
 velvet_divorce.17.d: "On January 1, 1993, the Slovak Republic becomes an independent state. Bratislava is the capital of a country that has existed in this form for exactly one day.\n\nSlovakia inherits a heavier industrial legacy, higher unemployment, and a more complicated political environment — Mečiar's style of governance will soon draw international criticism. But the state is sovereign, recognised, and, for the first time in history, fully independent."
 velvet_divorce.17.f: "For the first time in its history: an independent Slovakia."
 velvet_divorce.17.a: "The Slovak Republic begins"
 
 velvet_divorce.18.t: "What Comes Next?"
 velvet_divorce.18.d: "Czechoslovakia is dissolving. Its successor states — the Czech Republic and the Slovak Republic — are taking shape.\n\nYou were the leader of a country that no longer exists. The question now is what role you will play in what comes next."
 velvet_divorce.18.f: "One country. Two futures."
 velvet_divorce.18.a: "Continue as the Czech Republic"
 velvet_divorce.18.b: "Continue as the Slovak Republic"
 velvet_divorce.18.c: "Remain and observe the dissolution"
 
