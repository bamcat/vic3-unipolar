 ## breakup of czechoslovakia
 je_velvet_divorce: "The Velvet Divorce"
 je_velvet_divorce_reason: "The federation is under strain. The transition from communism has exposed the economic and political fault lines between the Czech and Slovak halves of the state. Slovak politicians — led by Vladimír Mečiar — are pushing for greater autonomy, and some for full independence. The Czech side, led by Václav Klaus, is increasingly willing to let them go.\n\nTwo forces are now in motion. [ROOT.GetCountry.GetName] must build #bold federal cohesion#! — through negotiation, economic compromise, and political skill — before #bold separatist pressure#! makes dissolution irreversible.\n\nIf pressure reaches 100 before cohesion does, the federation will dissolve. Peacefully. That is what 'velvet' means."
 
 je_velvet_divorce_stable_tt: "The federation is holding. Negotiations continue. The outcome is still in the government's hands."
 je_velvet_divorce_tense_tt: "@warning! #bold Separatist pressure is rising.#! Slovak politicians are increasingly confident that independence is possible and desirable. The window for a negotiated settlement is narrowing."
 je_velvet_divorce_critical_tt: "@warning! #bold The federation is at breaking point.#! The political conditions for dissolution are nearly complete. Without a dramatic intervention, Czechoslovakia will not survive the year."
 
