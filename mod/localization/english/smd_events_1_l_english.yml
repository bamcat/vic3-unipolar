 wot_coalition.2.t:0 "Article 5 Invoked"
 wot_coalition.2.d:0 "Following the attacks on the United States, NATO has invoked Article 5. The alliance now treats the attack as an attack on all members."
 wot_coalition.2.f:0 "The North Atlantic alliance was built for collective defense. Its first invocation comes not from tanks crossing a border, but from a terrorist attack."
 wot_coalition.2.a:0 "Stand with the United States."

