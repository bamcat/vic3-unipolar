 je_korea_reunification_nrk:0 "Korean Reunification"
 je_korea_reunification_nrk_reason:0 "The Democratic People's Republic of Korea is the sole legitimate government of the Korean nation. The division of the peninsula at the 38th parallel is an artificial wound inflicted by foreign powers — a temporary arrangement that [ROOT.GetCountry.GetName] is committed to correcting.\n\nReunification under [ROOT.GetCountry.GetAdjective] leadership will restore the Korean nation to wholeness. South Korea's southern administration must be brought within the [ROOT.GetCountry.GetAdjective] state — by force, by treaty, or by the weight of [ROOT.GetCountry.GetAdjective] power making further resistance impossible."
 
