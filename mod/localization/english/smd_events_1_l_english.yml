 kosovo_events.4.b:0 "Kosovo remains autonomous."

 yugoslav_war_crimes.1.t:0 "The Siege of Sarajevo"
 yugoslav_war_crimes.1.d:0 "Reports from Sarajevo describe shelling, starvation, and civilian suffering under siege conditions."
 yugoslav_war_crimes.1.a:0 "Deny responsibility and continue."
 yugoslav_war_crimes.1.b:0 "Open an investigation."

