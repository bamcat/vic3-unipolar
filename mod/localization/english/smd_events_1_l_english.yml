 afghan_civil_war.6.t:0 "Northern Alliance Networks"
 afghan_civil_war.6.d:0 "Northern Alliance commanders expand local networks, using terrain, loyalties, and external supply routes to sustain the war."
 afghan_civil_war.6.f:0 "In the north, a supply route can matter as much as a battalion."
 afghan_civil_war.6.a:0 "Hold the line."
 acw_guerrilla_warfare:0 "Afghan Guerrilla Warfare"
 acw_guerrilla_warfare_desc:0 "The war is dominated by mountains, raids, ambushes, shifting loyalties, and fragmented fronts. Advancement is nearly impossible without overwhelming momentum."
 acw_taliban_security_push:0 "Taliban Campaign"
 acw_taliban_security_push_desc:0 "The Taliban has committed to a broader campaign to break the war of attrition."
 acw_northern_alliance_mountain_resistance:0 "Mountain Resistance"
 acw_northern_alliance_mountain_resistance_desc:0 "The Northern Alliance is using mountain terrain and local networks to resist conventional offensives."
 acw_taliban_supply_strain:0 "Taliban Supply Strain"
 acw_taliban_supply_strain_desc:0 "Sustained pressure is imposing heavy logistical strain on Taliban forces."
 acw_northern_alliance_supply_networks:0 "Northern Alliance Supply Networks"
 acw_northern_alliance_supply_networks_desc:0 "The Northern Alliance is strengthening its local and external supply networks."
 acw_afg_reward:0 "Afghanistan Consolidated"
 acw_afg_reward_desc:0 "The Taliban government has emerged from the civil war with renewed control."
 acw_ana_reward:0 "Alliance Ascendant"
 acw_ana_reward_desc:0 "The Northern Alliance has emerged from the civil war with renewed legitimacy."
 
