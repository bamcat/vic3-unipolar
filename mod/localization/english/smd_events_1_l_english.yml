 yugoslav_collapse.10.b:0 "The process fails."

 yugoslav_collapse.20.t:0 "Yugoslavia Preserved"
 yugoslav_collapse.20.d:0 "Through compromise and restraint, Yugoslavia has avoided full disintegration and accepted a confederal settlement."
