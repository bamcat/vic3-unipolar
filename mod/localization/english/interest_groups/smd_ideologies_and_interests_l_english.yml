 # leaders
 
 ideology_marxist_leader: "Marxist"
 ideology_marxist_leader_desc: "Revolutionary socialist leaders who favour council rule, public ownership, collectivized agriculture, and a sharp break with liberal capitalism."
 ideology_state_socialist_leader: "State Socialist"
 ideology_state_socialist_leader_desc: "Centralizing socialist leaders who prefer one-party or technocratic state direction, command economics, and large public systems."
 ideology_left_wing_populist_leader: "Left-Wing Populist"
 ideology_left_wing_populist_leader_desc: "Anti-elite mass-politics leaders who mix redistribution, protectionism, democracy, and strong hostility to oligarchic rule."
 ideology_democratic_socialist_leader: "Democratic Socialist"
 ideology_democratic_socialist_leader_desc: "Democratic left leaders who favour elections, worker power, social ownership, strong welfare, and civil liberties."
 ideology_green_leader: "Green"
 ideology_green_leader_desc: "Environmental democratic leaders focused on ecological regulation, public goods, civil liberties, and post-industrial reform."
 ideology_state_capitalist_leader: "State Capitalist"
 ideology_state_capitalist_leader_desc: "Developmentalist leaders who accept markets but want a strong state, strategic industry, centralized banking, and guided investment."
 ideology_market_socialist_leader: "Market Socialist"
 ideology_market_socialist_leader_desc: "Decentralized socialist leaders who favour cooperatives, trade unions, welfare, and market mechanisms under democratic oversight."
 ideology_progressive_leader: "Progressive"
 ideology_progressive_leader_desc: "Reformist leaders focused on equal rights, welfare expansion, education, civil liberties, and managed market reform."
 ideology_social_liberal_leader: "Social Liberal"
 ideology_social_liberal_leader_desc: "Liberal-democratic leaders who support markets with welfare, equal citizenship, education, and regulated capitalism."
 ideology_technocrat_leader: "Technocrat"
 ideology_technocrat_leader_desc: "Expert-rule leaders who support secularism, administrative planning, state capacity, regulated markets, and scientific governance."
 ideology_liberal_leader: "Liberal"
 ideology_liberal_leader_desc: "Mainstream liberal leaders who support constitutional republics, civil liberties, free trade, private markets, and legal equality."
 ideology_moderate_leader: "Moderate"
 ideology_moderate_leader_desc: "Pragmatic establishment leaders who rarely push radical reforms and are most common in stable mixed systems."
 ideology_neoliberal_leader: "Neoliberal"
 ideology_neoliberal_leader_desc: "Market-oriented liberal leaders who favour free trade, laissez-faire, private provision, fiscal restraint, and technocratic institutions."
 ideology_conservative_leader: "Conservative"
 ideology_conservative_leader_desc: "Status-quo right leaders who favour social order, limited reform, moderate market economics, tradition, and cautious nationalism."
 ideology_corporatist_leader: "Corporatist"
 ideology_corporatist_leader_desc: "Capitalist coordination leaders who favour interventionist or laissez-faire capitalism organized through state-business-labour institutions."
 ideology_theocrat_leader: "Theocrat"
 ideology_theocrat_leader_desc: "Religious-rule leaders who want the state, schools, courts, and citizenship ordered around official religion."
 ideology_right_wing_libertarian_leader: "Right-Wing Libertarian"
 ideology_right_wing_libertarian_leader_desc: "Anti-state market leaders who favour private institutions, low welfare, free media, and weak internal security."
 ideology_classical_liberal_leader: "Classical Liberal"
 ideology_classical_liberal_leader_desc: "Old liberal constitutionalists who favour free trade, limited government, property rights, representative institutions, and rule of law."
 ideology_neocon_leader: "Neocon"
 ideology_neocon_leader_desc: "Militarized liberal-conservative leaders who favour professional armed forces, intervention abroad, capitalist institutions, and national security."
 ideology_jihadist_leader: "Jihadist"
 ideology_jihadist_leader_desc: "Militant religious leaders who can only emerge from Islamic state-religion countries under radical pressure."
 ideology_minarchist_leader: "Minarchist"
 ideology_minarchist_leader_desc: "Extreme small-state market leaders who support laissez-faire, private systems, and near-total rollback of public authority."
 ideology_right_wing_populist_leader: "Right-Wing Populist"
 ideology_right_wing_populist_leader_desc: "Anti-elite national-populist leaders who rise in liberal democracies with high radicals, mixing welfare chauvinism, protectionism, and cultural backlash."
 ideology_authoritarian_capitalist_leader: "Authoritarian Capitalist"
 ideology_authoritarian_capitalist_leader_desc: "Hard-order capitalist leaders who favour private or guided capitalism under autocracy, police power, censorship, and weak opposition."
 ideology_monarchist_leader: "Monarchist"
 ideology_monarchist_leader_desc: "Dynastic loyalist leaders who almost only appear in monarchies and favour hereditary authority, tradition, church, and hierarchy."
 ideology_fascist_leader: "Fascist"
 ideology_fascist_leader_desc: "Ultra-nationalist authoritarian leaders who favour militarization, single-party rule, state violence, closed society, and corporate-national economics."
 ideology_anarchist_leader: "Anarchist"
 ideology_anarchist_leader_desc: "Anti-authoritarian socialist leaders who favour stateless self-government, cooperative ownership, militias, free speech, no police, and strong local autonomy."