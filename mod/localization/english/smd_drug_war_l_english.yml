 mdw_suppression_bar:0 "Campaign Progress"
 mdw_suppression_bar_desc:0 "Operation Progress: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/100)"
 
 mdw_peril_bar:0 "Commander Peril"
 mdw_peril_bar_desc:0 "Operation Peril: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#!"
 
 mdw_bar_commander_active_tt:0 "Active [ROOT.GetCountry.GetAdjective] military operations"
 mdw_bar_multiple_states_tt:0 "Multiple cartel-held states — [ROOT.GetCountry.GetAdjective] operations are spread thin"
 mdw_bar_us_aid_tt:0 "[SCOPE.sCountry('c:USA').GetAdjective] military assistance is providing intelligence and logistical support"
 mdw_bar_excess_authority_tt:0 "Strong state capacity is accelerating the campaign"
 mdw_bar_legitimacy_tt:0 "High public support is sustaining [ROOT.GetCountry.GetAdjective] military morale"
 mdw_bar_good_commander_tt:0 "Commander's tactical skill is accelerating operations"
 mdw_bar_at_war_tt:0 "Military resources are being diverted to an active war"
 mdw_bar_turmoil_tt:0 "High national turmoil is impeding the [ROOT.GetCountry.GetAdjective] campaign"
 mdw_peril_base_tt:0 "Sustained operations in cartel territory carry constant risk"
 mdw_peril_multiple_states_tt:0 "Operating across many fronts increases the commander's exposure"
 mdw_peril_us_aid_tt:0 "[SCOPE.sCountry('c:USA').GetAdjective] intelligence is reducing the cartels' ability to target the commander"
 mdw_peril_cautious_tt:0 "Commander's cautious approach is reducing personal risk"
 
 # ==========================================
 # EVENTS
 # ==========================================
 
 # mdw_events.1 — War Declared
 mdw_events.1.t:0 "[ROOT.GetCountry.GetName] Declares War on the Cartels"
 mdw_events.1.d:0 "After years of creeping cartel expansion and failed half-measures, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName]'s government has formally committed the [ROOT.GetCountry.GetAdjective] military to a campaign against the narco networks. The declaration is significant — not just operationally, but symbolically. The [ROOT.GetCountry.GetAdjective] state is asserting that it will not accept the status quo.\n\nThe cartels will respond. The military must be ready."
 mdw_events.1.f:0 "The state has drawn its line."
 mdw_events.1.a:0 "[ROOT.GetCountry.GetName] will reclaim what belongs to it"
 
 # mdw_events.2 — Commander Selection
 mdw_events.2.t:0 "Who Will Lead the Campaign?"
 mdw_events.2.d:0 "The declaration has been made. Now a commander must be chosen — one willing to take the fight into cartel-held territory, where the enemy knows the ground, has local informants, and is willing to do things the army cannot. It will be a dirty fight."
 mdw_events.2.f:0 "The right general changes everything."
 mdw_events.2.a:0 "Deploy [SCOPE.sCharacter('mdw_commander_1').GetFullName]"
 mdw_events.2.b:0 "Deploy [SCOPE.sCharacter('mdw_commander_2').GetFullName]"
 mdw_events.2.c:0 "Deploy [SCOPE.sCharacter('mdw_commander_3').GetFullName]"
 
 # mdw_events.3 — Combat Patrol
 mdw_events.3.t:0 "Contact in [SCOPE.sState('mdw_active_state').GetName]"
 mdw_events.3.d:0 "[SCOPE.sCharacter('mdw_commander').GetFullName] reports a series of engagements with cartel forces in [SCOPE.sState('mdw_active_state').GetName]. The cartels are fighting to hold their territory — using roadblocks, snipers, and IEDs on approaches to known strongholds. Progress is being made, but the cost in time and resources is significant."
 mdw_events.3.f:0 "Every kilometre of road cleared is a kilometre the cartels cannot use."
 mdw_events.3.a:0 "Push hard — take the territory quickly"
 mdw_events.3.b:0 "Advance methodically — secure each position before moving on"
 
 # mdw_events.4 — State Cleared
 mdw_events.4.t:0 "[SCOPE.sState('mdw_active_state').GetName] Has Been Cleared"
 mdw_events.4.d:0 "A significant operational success: [SCOPE.sCharacter('mdw_commander').GetFullName] reports that cartel forces in [SCOPE.sState('mdw_active_state').GetName] have been broken. Their command structure has been dismantled, their logistics cut, and their key figures are dead or in custody. [ROOT.GetCountry.GetAdjective] military occupation forces are moving in to hold the ground.\n\nOne state is back under government control. More remain."
 mdw_events.4.f:0 "The map is changing."
 mdw_events.4.a:0 "Move on to the next — keep the momentum"
 
 # mdw_events.5 — Ambush
 mdw_events.5.t:0 "Ambush — [SCOPE.sCharacter('mdw_commander').GetFullName]'s Column Is Under Attack"
 mdw_events.5.d:0 "Cartel gunmen have ambushed a [ROOT.GetCountry.GetAdjective] military column in [SCOPE.sState('mdw_active_state').GetName]. The attack was coordinated — multiple firing positions, pre-planned withdrawal routes, and knowledge of the column's movements that suggests an informant inside the [ROOT.GetCountry.GetAdjective] military chain of command. There are casualties. [SCOPE.sCharacter('mdw_commander').GetFullName] is managing the engagement."
 mdw_events.5.f:0 "The cartels fight like an army when they choose to."
 mdw_events.5.a:0 "Fight through — pursue and destroy them"
 mdw_events.5.b:0 "Break contact — regroup and sweep later"
 
 # mdw_events.6 — Commander Under Fire
 mdw_events.6.t:0 "[SCOPE.sCharacter('mdw_commander').GetFullName] Is in Danger"
 mdw_events.6.d:0 "Intelligence has confirmed what field reports have been suggesting: the cartels have identified [SCOPE.sCharacter('mdw_commander').GetFullName] as a priority target. A professional assassination team has been tasked against them. The threat is credible. Pulling the commander back to [ROOT.GetCountry.GetCapital.GetCityHubName] would reduce the risk — but would halt the campaign's momentum at a critical moment."
 mdw_events.6.f:0 "The cartels study their enemies."
 mdw_events.6.a:0 "Pull [SCOPE.sCharacter('mdw_commander').GetFullName] back — the campaign can wait"
 mdw_events.6.b:0 "Press on — [SCOPE.sCharacter('mdw_commander').GetFullName] accepts the risk"
 
 # mdw_events.10 — Victory
 mdw_events.10.t:0 "The Drug War Is Won"
 mdw_events.10.d:0 "[SCOPE.sCharacter('mdw_commander').GetFullName] sends the final operational report: cartel territorial control has been broken across [ROOT.GetCountry.GetName]. The last strongholds have been cleared. Military occupation is in place. The cartel networks still exist — they will reconstitute over years in weakened form — but the [ROOT.GetCountry.GetAdjective] state has reasserted sovereignty over its own territory.\n\nThis was not inevitable. It required political will, military commitment, and, in many ways, luck. What [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName] has won is time — time to address the conditions that made the cartels possible in the first place."
 mdw_events.10.f:0 "[ROOT.GetCountry.GetName] has reclaimed what is hers."
 mdw_events.10.a:0 "A hard victory — and a beginning"
 
 # mdw_events.11 — Commander Killed
 mdw_events.11.t:0 "[SCOPE.sCharacter('mdw_commander').GetFullName] Has Been Killed"
 mdw_events.11.d:0 "The worst has happened. The cartel assassination operation succeeded. [SCOPE.sCharacter('mdw_commander').GetFullName] is dead — killed in an attack that the [ROOT.GetCountry.GetAdjective] security services failed to prevent despite credible warnings. The news is public within hours. The cartels are celebrating openly in the streets of towns they control.\n\nThe campaign is not over. But it has suffered a blow that will take months to recover from. A new commander must be found — and the cartels will use the time to consolidate."
 mdw_events.11.f:0 "The cartels have struck their most significant blow yet."
 mdw_events.11.a:0 "We will not be broken by this — the fight continues"
 
 # mdw_events.20 — US Aid
 mdw_events.20.t:0 "[SCOPE.sCountry('c:USA').GetName] Has Signed a Military Assistance Agreement"
 mdw_events.20.d:0 "[SCOPE.sCountry('c:USA').GetCapital.GetCityHubName] has moved. [SCOPE.sCountry('c:USA').GetName] has formally signed a military assistance agreement with [ROOT.GetCountry.GetName] — committing intelligence resources, advisory personnel, equipment, and logistical support to the counter-cartel campaign. The agreement is a significant political development: it signals that [SCOPE.sCountry('c:USA').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCountry('c:USA').GetRuler.GetLastName]'s administration regards the stability of [ROOT.GetCountry.GetName] as a matter of direct national interest.\n\nFor [ROOT.GetCountry.GetName], the practical benefits are immediate: authority is restored, equipment is flowing, and the cartels now face an enemy with the full intelligence apparatus of [SCOPE.sCountry('c:USA').GetName] working against them."
 mdw_events.20.f:0 "When [SCOPE.sCountry('c:USA').GetName] commits, the balance shifts."
 mdw_events.20.a:0 "This changes the campaign entirely"
 
 # ==========================================
 # MODIFIERS
 # ==========================================
 
 mdw_war_declared_modifier:0 "Mexican Drug War — Active Campaign"
 mdw_war_declared_modifier_desc:0 "[ROOT.GetCountry.GetName] has committed its military to a direct campaign against the narco-cartels. Authority is being consumed and the military is engaged, but the [ROOT.GetCountry.GetAdjective] state is asserting itself."
 
 mdw_us_aid_modifier:0 "US Military Assistance"
 mdw_us_aid_modifier_desc:0 "An active military assistance agreement with [SCOPE.sCountry('c:USA').GetName] is providing intelligence, logistics, and equipment to [ROOT.GetCountry.GetName]'s counter-cartel campaign."
 
 mdw_victory_modifier:0 "Drug War Won"
 mdw_victory_modifier_desc:0 "[ROOT.GetCountry.GetName] has won the Drug War. Cartel territorial control has been broken and the [ROOT.GetCountry.GetAdjective] state has reasserted sovereignty. The conditions that produced the cartels remain — but this battle has been won."
 
 mdw_commander_killed_modifier:0 "Commander Killed in Action"
 mdw_commander_killed_modifier_desc:0 "The assassination of the counter-cartel commander has shaken public confidence in [ROOT.GetCountry.GetName] and emboldened the cartels."
 
 mdw_troops_ambushed:0 "Troops Ambushed"
 mdw_troops_ambushed_desc:0 "A [ROOT.GetCountry.GetAdjective] military column was ambushed by cartel forces, causing casualties and temporarily reducing offensive capability."
 
 # Cartel territory modifier descriptions (MDW context)
 cartel_cjng_controlled:0 "CJNG Territory"
 cartel_cjng_controlled_desc:0 "Jalisco New Generation Cartel operatives control this state's criminal economy. Industrial activity is disrupted, infrastructure is deteriorating, and people are leaving [ROOT.GetCountry.GetAdjective] territory."
 
 cartel_gulf_controlled:0 "Gulf Cartel Territory"
 cartel_gulf_controlled_desc:0 "The Gulf Cartel has established territorial dominance here. Economic activity is suppressed and [ROOT.GetCountry.GetAdjective] state authority is nominal."
 
 cartel_sinaloa_controlled:0 "Sinaloa Cartel Territory"
 cartel_sinaloa_controlled_desc:0 "The Sinaloa Cartel controls this state. Agricultural output has been disrupted and the local economy operates under cartel supervision."
 
 cartel_northeast_controlled:0 "Northeast Cartel Territory"
 cartel_northeast_controlled_desc:0 "The Cartel del Noreste has established dominance here. Infrastructure and building productivity in [ROOT.GetCountry.GetName] are suffering."
 
 # usa war on drugs

 je_war_on_drugs:0 "The War on Drugs"
 je_war_on_drugs_reason:0 "The flow of narcotics into [ROOT.GetCountry.GetName] is a national crisis. Cocaine, heroin, and other substances — produced largely in Latin America and smuggled across [ROOT.GetCountry.GetAdjective] borders — are devastating communities, fuelling violent crime, and corrupting public institutions.\n\n[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName]'s administration has committed to a comprehensive campaign: international partnerships to strangle supply at the source, domestic enforcement to close the borders, and social investment to address demand. The campaign is not without cost — the resources it requires weigh on the broader economy — but the alternative is a country increasingly at the mercy of foreign criminal networks.\n\n@information! Cartel territory may be expanding in Mexico. A military assistance agreement with the Mexican government is the cornerstone of the international component of this campaign."

 narco_economy_plantation_bonus:0 "Narco Economy"
 narco_economy_plantation_bonus_desc:0 "The drug trade has embedded itself into the agricultural economy of [ROOT.GetCountry.GetName]. Plantation output — particularly opium — is running above normal levels, sustained by cartel demand and the corrupting flow of narco-money into rural communities."

 war_on_drugs_active_modifier:0 "War on Drugs"
 war_on_drugs_active_modifier_desc:0 "The [ROOT.GetCountry.GetAdjective] government has committed to a comprehensive campaign against drug trafficking. The enforcement effort — domestic policing, interdiction operations, and international cooperation — is drawing resources from across the economy and imposing a modest but real cost on national productivity."

 war_on_drugs_victory_modifier:0 "War on Drugs — Won"
 war_on_drugs_victory_modifier_desc:0 "The [ROOT.GetCountry.GetAdjective] War on Drugs has achieved its stated objectives. Supply has been suppressed, borders are enforced, and the institutional framework is in place. The campaign has strengthened [ROOT.GetCountry.GetName]'s authority and prestige — though the underlying conditions that produce drug demand have not been resolved."

 wod_je_status_active:0 "The campaign continues."
 wod_je_status_ready:0 "The campaign is ready to conclude."

 wod_completion_mexico_tt:0 "Have a #bold Military Assistance#! pact with Mexico."
 wod_completion_enforcement_tt:0 "Adopt either #bold National Guard#! or #bold Secret Police#!."
 wod_completion_opium_price_tt:0 "Suppress international drug supply until drugs is at least #bold 65% pricier#! in the American market."
 wod_completion_schools_tt:0 "Raise the #bold Schools#! institution to level #bold 5#! or higher."
 wod_completion_border_tt:0 "Adopt either #bold Migration Controls#! or #bold Closed Borders#!."
 wod_completion_no_safe_injection_tt:0 "Do not have #bold Safe Injection Sites#!."
 wod_completion_no_trafficking_allowed_tt:0 "Do not have #bold Trafficking Allowed#!."
 wod_completion_no_hard_drugs_decriminalized_tt:0 "Do not have #bold Hard Drugs Decriminalized#!."
 wod_fail_tt:0 "The War on Drugs has been abandoned. Permissive drug legislation has signalled an end to the federal enforcement campaign."