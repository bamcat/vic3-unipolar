 mdw_button_declare_war_desc:0 "Commit the [ROOT.GetCountry.GetAdjective] military to a direct campaign against cartel networks. Costs 100 authority and begins the counter-cartel campaign in earnest. The bars will not move until this declaration is made."
 
 mdw_button_deploy_commander_name:0 "Deploy a Commander"
 mdw_button_deploy_commander_desc:0 "Select a general to lead counter-cartel operations across [ROOT.GetCountry.GetAdjective] territory."
 mdw_need_general_tt:0 "Requires at least one available general"
 
