l_english:

 je_national_development: "National Development Path"
 je_national_development_reason: "Every nation must choose where to focus its energies. A national development plan concentrates resources, policy, and political will behind a single strategic vision for ten years. Choose wisely — the choice cannot be reversed until the programme concludes."

 je_foreign_investment: "Foreign Investment"
 je_foreign_investment_reason: "Attracting capital from great powers can accelerate development beyond what domestic resources allow. A foreign investment treaty would open the country to outside enterprise — with all the opportunities and dependencies that entails."
 has_foreign_investment_or_trade_agreement_with_west_tt:0 "Sign a foreign investment and trade agreement with the United States, United Kingdom, or France"
 
