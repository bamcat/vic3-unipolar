 ndp_status_resource_tt: "Resource Economy development is underway. The country is focusing on agriculture and raw material extraction."
 ndp_status_service_tt: "Service Economy development is underway. The country is building up its financial sector, education, and state capacity."
 ndp_status_none_tt: "No development path is currently active. Select a path to begin a ten-year national development programme."

 fi_status_seeking_tt: "The country is seeking a foreign investment agreement with a great power. Sign an investment treaty to complete this journal entry."
 fi_status_secured_tt: "A foreign investment agreement has been secured. Foreign capital is flowing in."

 ndp_button_industrial_name: "Industrial Expansion"
 ndp_button_industrial_desc: "Focus national resources on building up the manufacturing base. Boosts heavy industry, light manufacturing, and construction. Sub-choices at Year 2: heavy industry vs light manufacturing."

 ndp_button_military_name: "Military Expansion"
 ndp_button_military_desc: "Prioritize the armed forces. Boosts army and navy, military research, and weapons production. Sub-choices at Year 2: land doctrine vs naval buildup."

 ndp_button_resource_name: "Resource Economy"
 ndp_button_resource_desc: "Build the economy around the land. Boosts agricultural and extractive industries. Sub-choices at Year 2: agriculture vs raw material extraction."

 ndp_button_service_name: "Service Economy"
 ndp_button_service_desc: "Develop state capacity, education, and the financial sector. Boosts bureaucracy, research speed, and investment. Sub-choices at Year 2: financial sector vs education and bureaucracy."

 ndp_button_abandon_name: "Abandon Path"
 ndp_button_abandon_desc: "Abandon the current development programme. All active path modifiers will be removed, and a prestige and legitimacy penalty will apply for two years. You may then select a new path."

 fi_button_reject_name: "Reject Foreign Investment"
 fi_button_reject_desc: "Close the door to foreign capital. This will end the journal entry and apply a long-term investment penalty, but will preserve economic independence and boost authority."

