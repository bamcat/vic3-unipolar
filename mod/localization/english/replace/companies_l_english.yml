 COMMAND_CONFIRMATION_ENABLE_CHARTER: "Do you want to grant the [CompanyCharterType.GetName] to [Company.GetName]?\n\n@aut! #v [CompanyCharterType.GetAuthorityCost(Company.Self)|-0]#! maintenance cost\nCurrently using [Company.GetCountry.GetUsedFreeCharters|v]/[Company.GetCountry.GetModifier.GetNonFormattedValueWithBreakdownAndNoDecimalsFor('country_free_charters_add')] free [Concept('concept_company_charter','$concept_company_charters$')]\n\n#title Effects:#!#indent_newline:3 \n$EFFECTS$#!"
 COMMAND_CONFIRMATION_ENABLE_MONOPOLY_CHARTER: "Do you want to grant the [CompanyCharterType.GetName] to [Company.GetName]?\n\n@aut! #v [CompanyCharterType.GetAuthorityCost(Company.Self)|-0]#! maintenance cost\nCurrently using [Company.GetCountry.GetUsedFreeCharters|v]/[Company.GetCountry.GetModifier.GetNonFormattedValueWithBreakdownAndNoDecimalsFor('country_free_charters_add')] free [Concept('concept_company_charter','$concept_company_charters$')]\n\n@warning! This cannot be revoked for #v [GetDefine('NEconomy','COMPANY_MONOPOLY_COOLDOWN_MONTHS')] months#! after granting.\n\n#title Effects:#!#indent_newline:3 \n$EFFECTS$#!"
 COMMAND_CONFIRMATION_DISABLE_CHARTER: "Do you want to revoke the [CompanyCharterType.GetName] from [Company.GetName]?\n\nRemoves the @aut! #v [CompanyCharterType.GetAuthorityCost(Company.Self)|+0]#! maintenance cost\n\n#title Removes the following effects:#!#indent_newline:3 \n$EFFECTS$#!"
 COMMAND_CONFIRMATION_DISABLE_CHARTER_WITH_REVOKE_EFFECTS: "$COMMAND_CONFIRMATION_DISABLE_CHARTER$\n\n$REVOKE_EFFECTS$"


 investment_charter_desc: "[CompanyCharter.GetType.GetNameNoFormatting] allows the [concept_company] to establish [Concept('concept_regional_company_hq','$concept_regional_company_hqs$')], expanding its influence and operations."
 investment_charter_type_desc: "[CompanyCharterType.GetNameNoFormatting] allows the [concept_company] to establish [Concept('concept_regional_company_hq','$concept_regional_company_hqs$')], expanding its influence and operations."
 investment_charter_effects: "Enables constructing of [Concept('concept_regional_company_hq','$concept_regional_company_hqs$')] that contribute to our [concept_investment_pool]"

 monopoly_charter_desc: "[CompanyCharter.GetType.GetNameNoFormatting] gives the [concept_company] exclusive rights to [Concept('concept_construction','$concept_construct$')] specific [Concept('concept_building','$concept_building_industries$')], ensuring [concept_market] dominance."
 monopoly_charter_type_desc: "[CompanyCharterType.GetNameNoFormatting] gives the [concept_company] exclusive rights to [Concept('concept_construction','$concept_construct$')] specific [Concept('concept_building','$concept_building_industries$')], ensuring [concept_market] dominance."
 monopoly_charter_effects: "Gives the [concept_company] the [Concept('concept_company_monopoly','$concept_company_monopoly_short$')] on a specific [Concept('concept_building','$concept_building_industry$')]. Any future [Concept('concept_building_level','$concept_building_levels$')] may not be constructed by $concept_private$ actors other than the $concept_company$, and any [concept_nationally_owned] $concept_building_levels_short$ will automatically be available for the $concept_company$ to [concept_privatize]. Existing [concept_privately_owned] $concept_building_levels$ are not affected."

 industry_charter_desc: "[CompanyCharter.GetType.GetNameNoFormatting] expands the range of [Concept('concept_building','$concept_building_industries$')] the [concept_company] is allowed to construct, fostering industrial growth."
 industry_charter_type_desc: "[CompanyCharterType.GetNameNoFormatting] expands the range of [Concept('concept_building','$concept_building_industries$')] the [concept_company] is allowed to construct, fostering industrial growth."
 industry_charter_effects: "Enables the [concept_company] to [Concept('concept_construction','$concept_construct$')] [Concept('concept_building','$concept_buildings$')] of an additional [Concept('concept_building','$concept_building_industry$')]"

 trade_charter_desc: "[CompanyCharter.GetType.GetNameNoFormatting] enable the [concept_company] to build [GetBuildingType('building_trade_center').GetName], facilitating commerce and trade."
 trade_charter_type_desc: "[CompanyCharterType.GetNameNoFormatting] enable the [concept_company] to build [GetBuildingType('building_trade_center').GetName], facilitating commerce and trade."
 trade_charter_effects: "Allows the [concept_company] to [Concept('concept_construction','$concept_construct$')] [GetBuildingType('building_trade_center').GetName]"

 colonization_charter_desc: "[CompanyCharter.GetType.GetNameNoFormatting] initiate the [Concept('concept_colony', '$concept_colonization$')] of new territories, expanding the $concept_company_possessive$ reach."
 colonization_charter_type_desc: "[CompanyCharterType.GetNameNoFormatting] initiate the [Concept('concept_colony', '$concept_colonization$')] of new territories, expanding the $concept_company_possessive$ reach."
 colonization_charter_effects: "Starts the [Concept('concept_colony', '$concept_colonization$')] process in the selected [concept_state_region]"

 COMPANY_CHARTER_INVESTMENT_EFFECTS: "@green_checkmark! Allows [Company.GetNameNoIcon] to [Concept('concept_construction','$concept_construct$')] [Concept('concept_regional_company_hq','$concept_regional_company_hqs$')]\n@green_checkmark! $concept_regional_company_hqs$ of [Company.GetNameNoIcon] contribute to our [concept_investment_pool]"
 COMPANY_CHARTER_TRADE_EFFECTS: "@green_checkmark! Enables the [concept_company] to [Concept('concept_construction','$concept_construct$')] [BUILDING_TYPE.GetName]\n@green_checkmark! Gives [concept_trade_advantage] for the produced [concept_good] to the $concept_company_possessive$ [concept_country]"
 COMPANY_CHARTER_INDUSTRY_EFFECTS: "@green_checkmark! Enables the [concept_company] to [Concept('concept_construction','$concept_construct$')] [BUILDING_TYPE.GetName]"
 COMPANY_CHARTER_MONOPOLY_EFFECTS: "@green_checkmark! Gives the [concept_company] the [Concept('concept_company_monopoly','$concept_company_monopoly_short$')] on a [BUILDING_TYPE.GetName] in the $concept_company_possessive$ [concept_country]"
 COMPANY_CHARTER_COLONIZATION_EFFECTS: "@green_checkmark! Establishes a [concept_colony] in the [STATE_REGION.GetName] with the [concept_company] overseeing the expansion\n@green_checkmark! Gives a $VALUE|v$x faster $concept_colonization$ to [STATE_REGION.GetName|v]\n@green_checkmark! Creates a [GetSubjectType('subject_type_chartered_company').GetName] on completion"

