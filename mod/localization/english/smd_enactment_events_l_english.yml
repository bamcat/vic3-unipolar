 lgbtq_law_decrim_framing:0 "Decriminalization Framed"
 lgbtq_law_decrim_framing_desc:0 "The government has carefully framed decriminalization as the removal of punishment rather than an endorsement, easing the path through debate."

 lgbtq_law_quiet_passage:0 "Quiet Passage Attempted"
 lgbtq_law_quiet_passage_desc:0 "The decision to avoid public debate has slowed the enactment process as the reform proceeds without organised public support."

 lgbtq_law_liberty_argument:0 "Liberty Argument Made"
 lgbtq_law_liberty_argument_desc:0 "The intelligentsia has publicly framed decriminalization as a matter of personal liberty, lending philosophical credibility to the reform."

 lgbtq_law_institution_debate:0 "Institution Debate Engaged"
 lgbtq_law_institution_debate_desc:0 "The government has entered into public debate over the nature of marriage as a civil institution, shifting the terms of the enactment fight."

 lgbtq_law_religious_exemptions:0 "Religious Exemptions Offered"
 lgbtq_law_religious_exemptions_desc:0 "Religious institutions have been offered exemptions from performing same-sex ceremonies, slowing implementation but softening conservative opposition."

 lgbtq_law_equality_mandate:0 "Equality Mandate Declared"
 lgbtq_law_equality_mandate_desc:0 "The government has formally declared marriage equality a civil rights landmark, generating strong political momentum for enactment."

 lgbtq_law_devout_empowered:0 "Devout Empowered"
 lgbtq_law_devout_empowered_desc:0 "The religious community has been formally brought into the legislative framing, strengthening their political position and deepening their engagement."

 lgbtq_law_devout_sidelined:0 "Devout Sidelined"
 lgbtq_law_devout_sidelined_desc:0 "The government has kept religious framing out of the justification, leaving the devout disengaged and quietly frustrated."

 lgbtq_law_conservatives_unconvinced:0 "Conservatives Unconvinced"
 lgbtq_law_conservatives_unconvinced_desc:0 "The conservative opposition has heard the government's framing and remains unpersuaded, maintaining their resistance to the reform."

 lgbtq_law_conservatives_rebuked:0 "Conservatives Rebuked"
 lgbtq_law_conservatives_rebuked_desc:0 "The government has publicly challenged conservative opposition to marriage equality, embarrassing their position but sharpening their resolve."

 lgbtq_law_conservatives_placated:0 "Conservatives Placated"
 lgbtq_law_conservatives_placated_desc:0 "Religious exemptions have reduced the immediate intensity of conservative opposition without resolving the underlying disagreement."

 lgbtq_law_intelligentsia_engaged:0 "Intelligentsia Engaged"
 lgbtq_law_intelligentsia_engaged_desc:0 "Reformers and legal scholars are actively making the public case for LGBTQ rights, lending intellectual authority to the enactment effort."

 lgbtq_law_intelligentsia_sidelined:0 "Intelligentsia Sidelined"
 lgbtq_law_intelligentsia_sidelined_desc:0 "The government has chosen to keep the reform on legislative rather than philosophical terms, leaving the intelligentsia without a formal role in the debate."

 abortion_law_moral_absolute:0 "Moral Absolute Declared"
 abortion_law_moral_absolute_desc:0 "The devout have successfully framed the abortion ban as a moral absolute, lending theological authority to the enactment effort."

 abortion_law_demographic_framing:0 "Demographic Framing Adopted"
 abortion_law_demographic_framing_desc:0 "The government has justified the abortion ban on demographic and political grounds, keeping religious language out of the official justification."

 abortion_law_exceptions_debate:0 "Exceptions Debate Resolved"
 abortion_law_exceptions_debate_desc:0 "The government has taken a clear position on the exceptions question, providing a firm basis for the enactment process to continue."

 abortion_law_medical_exceptions:0 "Medical Exceptions Allowed"
 abortion_law_medical_exceptions_desc:0 "Narrow medical exceptions have been written into the legislation, slowing passage but reducing opposition from moderates."

 abortion_law_autonomy_argument:0 "Bodily Autonomy Argued"
 abortion_law_autonomy_argument_desc:0 "The intelligentsia has made bodily autonomy the centrepiece of the case for unrestricted abortion, generating strong support among reformist IGs."

 abortion_law_healthcare_framing:0 "Healthcare Framing Adopted"
 abortion_law_healthcare_framing_desc:0 "The government has framed unrestricted abortion as a healthcare matter, broadening its appeal while avoiding the deeper philosophical debate."

 abortion_law_religious_opposition:0 "Religious Opposition Mounted"
 abortion_law_religious_opposition_desc:0 "The devout are actively stalling the liberalization of abortion law, mounting organised opposition that is testing the government's resolve."

 abortion_law_devout_empowered:0 "Devout Empowered"
 abortion_law_devout_empowered_desc:0 "The religious community has been placed at the centre of the abortion ban's justification, strengthening their political position considerably."

 abortion_law_devout_sidelined:0 "Devout Sidelined"
 abortion_law_devout_sidelined_desc:0 "The government has kept religious framing out of the abortion ban, leaving the devout present but without a formal role in the justification."

 abortion_law_devout_rebuked:0 "Devout Rebuked"
 abortion_law_devout_rebuked_desc:0 "The government has directly confronted religious opposition to abortion liberalization, weakening the devout's political position but radicalizing their base."

 abortion_law_devout_appeased:0 "Devout Appeased"
 abortion_law_devout_appeased_desc:0 "Conscience protections for medical staff have softened religious opposition to abortion liberalization without satisfying the devout's core demands."

 abortion_law_intelligentsia_engaged:0 "Intelligentsia Engaged"
 abortion_law_intelligentsia_engaged_desc:0 "Legal scholars and reformers are actively making the public case for abortion rights, lending intellectual and moral credibility to the enactment effort."

 abortion_law_intelligentsia_sidelined:0 "Intelligentsia Sidelined"
 abortion_law_intelligentsia_sidelined_desc:0 "The decision to frame abortion access as a healthcare matter has kept the intelligentsia out of the philosophical debate they wanted to lead."