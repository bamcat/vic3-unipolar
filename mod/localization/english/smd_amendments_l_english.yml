l_english:

 # ==========================================
 # UNITED STATES
 # ==========================================

 amendment_medicaid: "Medicaid"
 amendment_medicaid_desc: "Federal and state-funded health insurance for low-income Americans, the elderly, and the disabled. Medicaid fills the gap left by private markets — covering those who cannot afford premiums and those whose conditions make them uninsurable. The programme is expensive and politically contested, but its mortality reduction effects are measurable and real."

 amendment_affordable_care_act: "Affordable Care Act"
 amendment_affordable_care_act_desc: "The Affordable Care Act — known informally as Obamacare — mandates that all citizens carry health insurance, creates regulated marketplaces for private coverage, and extends Medicaid eligibility. Insurers cannot deny coverage for pre-existing conditions. The individual mandate is deeply controversial. Supporters argue it is the only way to make insurance markets function. Opponents call it government overreach into private economic decisions."

 amendment_federal_assault_weapons_ban: "Federal Assault Weapons Ban"
 amendment_federal_assault_weapons_ban_desc: "A ten-year federal prohibition on the manufacture of specified semi-automatic weapons and high-capacity magazines for civilian sale. The ban is contested — its effectiveness disputed by opponents, its necessity argued by supporters. It expires after a decade unless renewed. The political coalition that passed it is fragile, and the gun lobby is already preparing its response."

 amendment_authorization_military_force: "Authorization for Use of Military Force"
 amendment_authorization_military_force_desc: "The Authorization for Use of Military Force grants the executive sweeping authority to use military force against those responsible for terrorist attacks on [ROOT.GetCountry.GetName], and those who harbored them. The language is deliberately broad. Legal scholars will spend decades arguing about its limits — or whether it has any. In practice, it reduces the diplomatic cost of unilateral military action and expands [ROOT.GetCountry.GetName]'s reach in the international arena."

 amendment_patriot_act: "The PATRIOT Act"
 amendment_patriot_act_desc: "The Uniting and Strengthening America by Providing Appropriate Tools Required to Intercept and Obstruct Terrorism Act — known as the PATRIOT Act — dramatically expands domestic surveillance authorities. Law enforcement can monitor communications, track financial transactions, and share intelligence across agencies with fewer judicial checks than before. Turmoil and revolutionary pressure fall. Civil liberties advocates describe it as the most significant erosion of constitutional privacy in [ROOT.GetCountry.GetName]'s history."

 amendment_crime_bill_1994: "Violent Crime Control and Law Enforcement Act"
 amendment_crime_bill_1994_desc: "The 1994 Crime Bill is the largest crime legislation in [ROOT.GetCountry.GetName]'s history. It funds tens of thousands of new police officers, expands the federal prison system, introduces mandatory minimum sentences for a range of offences, and creates the Violence Against Women Act as a rider. Turmoil falls. The communities most heavily policed under it will have a different view of its legacy."

 # ==========================================
 # CHINA
 # ==========================================

 amendment_china_tax_reform_1994: "Tax-Sharing System Reform"
 amendment_china_tax_reform_1994_desc: "The 1994 tax reform replaced the enterprise-based fiscal system — in which local governments negotiated revenue-sharing arrangements with Beijing — with a national value-added tax and a formal revenue-sharing formula. The reform dramatically centralised fiscal power. Beijing gained a reliable and growing revenue stream. Local governments lost discretion but gained clarity. It is the foundation of [ROOT.GetCountry.GetName]'s modern fiscal architecture."

 amendment_one_child_policy: "One-Child Policy"
 amendment_one_child_policy_desc: "The state enforces a limit of one child per family through a combination of financial incentives, social pressure, and in some cases coercive intervention. The birth rate falls sharply. Over the following decades, [ROOT.GetCountry.GetName] will age rapidly, and the workforce will contract. The policy is enforced most strictly in urban areas and most unevenly in rural ones. The international community and domestic critics both object to its methods."

 amendment_socialist_market_economy: "Socialist Market Economy"
 amendment_socialist_market_economy_desc: "The socialist market economy is the theoretical framework under which [ROOT.GetCountry.GetName] operates market mechanisms while the Party maintains ultimate economic and political direction. Private enterprise is permitted and encouraged within bounds set by the state. Foreign investment is welcomed selectively. The contradictions are real and deliberate — the framework is designed to harness market efficiency without surrendering party control. It works, in its way."

 # ==========================================
 # FRANCE
 # ==========================================

 amendment_35_hour_work_week: "35-Hour Work Week"
 amendment_35_hour_work_week_desc: "The Aubry Laws mandate a statutory 35-hour working week for most employees, reducing standard hours from 39. The policy is presented as a way to share work more broadly across the population — fewer hours per worker, more workers employed. Trade unions celebrate. Employers argue it increases costs and reduces flexibility. The debate about whether it actually increases employment or merely redistributes existing work will not be resolved quickly."

 amendment_pasqua_law: "Pasqua Law"
 amendment_pasqua_law_desc: "The Pasqua Law tightens immigration regulations significantly — stricter naturalization requirements, reduced family reunification rights, expanded grounds for deportation, and new restrictions on the right to remain for those who entered illegally. Interior Minister Charles Pasqua frames it as a matter of national order and cultural coherence. Critics argue it is a deliberate rollback of [ROOT.GetCountry.GetName]'s tradition of asylum and inclusion. The law passes with significant public support and significant protests."

 amendment_medicaid_modifier: "Medicaid"
 amendment_medicaid_modifier_desc: "Federal health insurance covers low-income citizens. Mortality is reduced, particularly among the poorest strata."

 amendment_affordable_care_act_modifier: "Obamacare"
 amendment_affordable_care_act_modifier_desc: "Mandated private health coverage with subsidies and pre-existing condition protections. Mortality falls modestly; costs rise for middle-income employers and the state."

 amendment_federal_assault_weapons_ban_modifier: "Federal Assault Weapons Ban"
 amendment_federal_assault_weapons_ban_modifier_desc: "Civilian manufacture and sale of specified semi-automatic weapons is prohibited. Radicalization is marginally reduced."

 amendment_authorization_military_force_modifier: "Authorization for Use of Military Force"
 amendment_authorization_military_force_modifier_desc: "Broad executive authority to use military force against non-state actors reduces the diplomatic cost of intervention and expands [ROOT.GetCountry.GetName]'s declared interests."

 amendment_patriot_act_modifier: "The PATRIOT Act"
 amendment_patriot_act_modifier_desc: "Expanded domestic surveillance authorities are suppressing turmoil and revolutionary activity. Legitimacy and diplomatic reputation have taken a modest hit."

 amendment_crime_bill_1994_modifier: "1994 Crime Bill"
 amendment_crime_bill_1994_modifier_desc: "Expanded policing and mandatory minimums are reducing turmoil. Enforcement mortality has risen modestly. The budget is under pressure."

 amendment_china_tax_reform_1994_modifier: "Tax-Sharing System Reform"
 amendment_china_tax_reform_1994_modifier_desc: "A centralised value-added tax system is improving fiscal revenue and reducing waste. Authority is marginally improved."

 amendment_one_child_policy_modifier: "One-Child Policy"
 amendment_one_child_policy_modifier_desc: "State-enforced birth limits have sharply reduced the birth rate. [ROOT.GetCountry.GetName]'s population will age significantly in the decades ahead."

 amendment_socialist_market_economy_modifier: "Socialist Market Economy"
 amendment_socialist_market_economy_modifier_desc: "Market mechanisms operating under party direction are boosting private construction, improving throughput, and expanding industrial investment. Communist movement support is modestly reduced."

 amendment_35_hour_work_week_modifier: "35-Hour Work Week"
 amendment_35_hour_work_week_modifier_desc: "Statutory limits on working hours have improved working conditions significantly. Throughput is marginally reduced. Trade unions are satisfied; employers are not."

 amendment_pasqua_law_modifier: "Pasqua Law"
 amendment_pasqua_law_modifier_desc: "Tighter immigration requirements have increased restrictiveness and reduced migration pull. Cultural acceptance of non-homeland populations has fallen."
