l_english:

 # ==========================================
 # JOURNAL ENTRY NAMES & HEADERS
 # ==========================================

 je_arab_spring: "The Arab Spring"
 je_arab_spring_reason: "Across the Arab world, long-suppressed frustrations with authoritarian rule, corruption, and economic stagnation have erupted into mass protest. Beginning in Tunisia, the wave of unrest is spreading — and no regime in the region can feel entirely secure."

 je_arab_winter: "The Arab Winter"
 je_arab_winter_reason: "The optimism of the Arab Spring has given way to a bitter struggle for the soul of the revolution. Islamist movements, military factions, and foreign powers vie to fill the vacuum left by fallen or weakened regimes. The fate of the region hangs in the balance."

 # Completion headers
 je_arab_spring_complete_header: "Democratic Transition"
 je_arab_spring_on_complete_header: "A New Dawn"
 je_arab_spring_fail_header: "Revolution Suppressed"
 je_arab_spring_on_fail_header: "The Crackdown"

 # ==========================================
 # MODIFIER
 # ==========================================

 modifier_arab_spring: "Arab Spring"
 modifier_arab_spring_desc: "Popular uprisings are sweeping the Arab world. Governments face intense pressure from protest movements demanding democratic reform, economic justice, and an end to authoritarian rule."

 # ==========================================
 # TOOLTIPS
 # ==========================================

 # Possible condition
 arab_spring_underway_tt: "The Arab Spring is underway"

 # Completion conditions
 had_arab_spring_revolution_tt_no_scope: "Has experienced a revolution during the Arab Spring"
 has_liberal_or_progressive_in_government_tt: "A liberal or progressive interest group is in government"
 has_census_voting_or_universal_suffrage_tt: "Has enacted census voting or universal suffrage"

 # Failure conditions
 no_protest_leaders_tt: "No liberal or progressive politicians or agitators remain"
 arab_spring_timer_dummy_tt: "The protest movement has been suppressed for [GetMonthsText(12)]"
 all_protest_movements_crushed_tt: "All protest movements have been crushed and suppressed"

 # je_arab_winter status
 reformists_in_government_tt: "Reformist factions hold seats in government — the revolution has a political foothold."
 reformists_out_of_government_tt: "Reformists have been pushed out of government — the revolution is losing ground."

 # je_arab_winter completion
 arab_spring_liberal_victory_tt: "The liberal and secular opposition has won out"
 arab_spring_islamist_victory_tt: "Islamist or nationalist forces have seized power"
 arab_winter_on_complete_tt: "The political struggle has resolved — for better or worse."

 # je_arab_winter failure
 arab_winter_fail_tt: "The counter-revolution has crushed the uprising entirely"

 # on_complete tooltips
 on_reformist_victory_tt: "The reformist coalition has prevailed — democratic transition begins."
 on_islamist_victory_tt: "Islamist or military forces have consolidated power — the revolution is over."

 # ==========================================
 # EVENT OUTCOME DESCRIPTIONS
 # ==========================================

 event_effects_arab_spring.8_tt: "The uprising has been put down. Security forces loyal to the regime have dispersed protesters, arrested opposition leaders, and reimposed authoritarian control. The window for reform has closed — for now."

 event_effects_arab_spring.10_tt: "Against all odds, the protest movement has succeeded. The old regime has fallen or made significant concessions. A fragile democratic transition begins, though the road ahead remains uncertain."

 # ==========================================
 # SCRIPTED PROGRESS BARS
 # ==========================================

 arab_spring_progress_bar: "Revolutionary Momentum"
 arab_spring_progress_bar_desc: "How far the protest movement has advanced toward its goals."

 arab_winter_crackdown_progress_bar: "Regime Crackdown"
 arab_winter_crackdown_progress_bar_desc: "How effectively the government is suppressing the uprising. If this reaches 100%, the revolution is crushed."

 # ==========================================
 # SCRIPTED TRIGGER NAMES (for tooltips)
 # ==========================================

 arab_spring_liberal_victory_trigger: "Reformist Victory Conditions"
 arab_spring_islamist_victory_trigger: "Islamist/Nationalist Victory Conditions"

 # ==========================================
 # VARIABLES
 # ==========================================

 had_arab_spring_revolution: "Experienced Arab Spring Revolution"
 arab_winter_revolution_crushed: "Revolution Crushed"

 # ==========================================
 # TUNISIA SPARK EVENT (arab_spring.1)
 # ==========================================

 arab_spring.1.t: "The Streets Are Rising"
 arab_spring.1.d: "In [ROOT.GetCountry.GetName], the people have taken to the streets. What began as scattered protests against corruption and unemployment has swelled into a mass movement demanding an end to [SCOPE.GetRootScope.GetCountry.GetRuler.GetLastName]'s rule. The security forces are struggling to contain the demonstrations, and the eyes of the Arab world are watching.\n\nHow the government responds in these early days will shape not only the fate of this country, but the trajectory of the entire region."
 arab_spring.1.a: "Deploy security forces to disperse protesters"
 arab_spring.1.b: "Open dialogue with opposition leaders"
 arab_spring.1.c: "Announce limited reforms to buy time"

 # ==========================================
 # MONTHLY PULSE — SPREAD EVENT (arab_spring.2)
 # ==========================================

 arab_spring.2.t: "The Wave Spreads"
 arab_spring.2.d: "News of the uprisings in neighboring countries has spread via satellite television and social media. In [ROOT.GetCountry.GetName], activists are emboldened and the regime is increasingly nervous. Protest organizers are sharing tactics across borders in real time — something no previous generation of dissidents could do."

 # ==========================================
 # RANDOM MONTHLY EVENTS (3–5)
 # ==========================================

 arab_spring.3.t: "Social Media Mobilization"
 arab_spring.3.d: "Organizers in [ROOT.GetCountry.GetName] have used social media platforms to coordinate a major demonstration in [ROOT.GetCapital.GetName]. Thousands have turned out, and footage of the protests is spreading internationally. The government faces growing pressure — both from within and without."
 arab_spring.3.a: "This is manageable"
 arab_spring.3.b: "Shut down the internet"

 arab_spring.4.t: "Security Forces Waver"
 arab_spring.4.d: "Reports have reached the capital that units of the security forces in the capital have refused orders to fire on protesters. Officers sympathetic to the demonstrators have been seen fraternizing with the crowds. The loyalty of the military is no longer certain."
 arab_spring.4.a: "Bring in more reliable units"
 arab_spring.4.b: "Negotiate with the protest leaders immediately"

 arab_spring.5.t: "Foreign Pressure Mounts"
 arab_spring.5.d: "Western governments and international bodies have issued statements calling on [ROOT.GetCountry.GetName] to exercise restraint and respect the rights of protesters. Some have threatened sanctions if the crackdown continues. Meanwhile, regional powers are watching closely — some hoping the unrest spreads, others desperate to contain it."
 arab_spring.5.a: "Ignore the international community"
 arab_spring.5.b: "Respond diplomatically"

 # ==========================================
 # FAILURE EVENTS
 # ==========================================

 arab_spring.8.t: "The Crackdown"
 arab_spring.8.d: "The uprising in [ROOT.GetCountry.GetName] has been broken. Security forces — supplemented where necessary by loyalist militias — have dispersed the last protest encampments, arrested the most prominent opposition figures, and sealed the borders against outside agitators. State media is already rewriting the narrative.\n\nThe Arab Spring has come and gone from [ROOT.GetCountry.GetName], leaving behind only new grievances to fester."
 arab_spring.8.a: "Order has been restored"

 # ==========================================
 # SUCCESS EVENTS
 # ==========================================

 arab_spring.9.t: "The Regime Concedes"
 arab_spring.9.d: "Faced with protests that show no sign of abating, [SCOPE.GetRootScope.GetCountry.GetRuler.GetLastName] has announced sweeping concessions — including the promise of free elections and a new constitution. Whether these promises will be kept remains to be seen, but the protest movement has claimed a historic victory."
 arab_spring.9.a: "A new chapter begins"

 arab_spring.10.t: "The Revolution Succeeds"
 arab_spring.10.d: "The old order has fallen in [ROOT.GetCountry.GetName]. After weeks of mass protests, the regime has collapsed — whether through the flight of the ruler, defection of the military, or negotiated transition. For the first time in a generation, ordinary people in [ROOT.GetCountry.GetName] are daring to hope for something different.\n\nThe hard work of building a new political order now begins."
 arab_spring.10.a: "The people have spoken"

 # ==========================================
 # ARAB WINTER EVENTS
 # ==========================================

 arab_spring.7.t: "Islamist Forces Consolidate Power"
 arab_spring.7.d: "The revolution has been captured. In [ROOT.GetCountry.GetName], Islamist movements — better organized, better funded, and more deeply rooted in society than the secular protest movement — have turned the Arab Spring's victories to their own advantage. The ballot box, once the protesters' greatest hope, has delivered a verdict the liberal opposition never anticipated.\n\nThe Arab Spring has become the Arab Winter."
 arab_spring.7.a: "A bitter outcome"

 arab_spring.71.t: "A Democratic Transition"
 arab_spring.71.d: "In [ROOT.GetCountry.GetName], the Arab Spring has delivered on at least some of its promises. A genuine transfer of power has taken place, and the new government — however imperfect and fragile — represents a real break with the authoritarian past. It is a rare bright spot in a region where such transitions have so often been reversed.\n\nThe work of consolidating democracy in [ROOT.GetCountry.GetName] will require vigilance, compromise, and no small amount of luck."
 arab_spring.71.a: "History is watching"

 # ==========================================
 # MODIFIER NAMES (referenced in events)
 # ==========================================

 arab_spring_popular_dissident: "Voice of the Uprising"
 arab_spring_popular_dissident_desc: "This leader has become a symbol of the protest movement. Their words carry weight in the streets — and with foreign governments watching closely."

 suppressing_protests: "Suppressing the Protests"
 suppressing_protests_desc: "Security forces are actively dispersing demonstrations and arresting opposition figures. This may contain the unrest in the short term, but risks deepening popular anger."

 arab_spring_reactionary_enactment: "Emergency Security Push"
 arab_spring_reactionary_enactment_desc: "The government is fast-tracking security legislation in response to the unrest."

 arab_spring_institution_speed: "Mobilizing the Security Apparatus"
 arab_spring_institution_speed_desc: "Resources are being poured into internal security institutions to contain the protests."

 arab_spring_democratic_transition: "Democratic Transition"
 arab_spring_democratic_transition_desc: "The old regime has fallen and a new political order is being built. Optimism is high, but so is instability — the hard work of consolidating democratic gains has only just begun."

 arab_winter_revolution_crushed: "Revolution Crushed"
 arab_winter_revolution_crushed_desc: "The uprising has been put down by force. The regime has survived, but the grievances that drove people into the streets remain unresolved. Discontent festers beneath the surface."

 arab_winter_islamist_consolidation: "Islamist Consolidation"
 arab_winter_islamist_consolidation_desc: "Islamist movements have emerged from the Arab Spring as the dominant political force. The revolution's secular goals have been sidelined — replaced by a new order rooted in religious authority."

 arab_spring_regional_contagion: "Regional Unrest"
 arab_spring_regional_contagion_desc: "The Arab Spring is spreading. Protest movements in neighbouring countries are emboldening domestic opposition, and the regime is increasingly nervous about contagion."

 # ==========================================
 # arab_spring.1 — The Streets Are Rising
 # ==========================================

 arab_spring.1.t: "Uprisings Nationwide"
 arab_spring.1.d: "In [ROOT.GetCountry.GetName], the people have taken to the streets. What began as scattered protests against corruption and unemployment has swelled into a mass movement demanding an end to [ROOT.GetRuler.GetFirstName]'s rule. The security forces are struggling to contain the demonstrations, and the eyes of the Arab world are watching.\n\nHow the government responds in these early days will shape not only the fate of this country, but the trajectory of the entire region."
 arab_spring.1.d_no_leader: "In [ROOT.GetCountry.GetName], the streets are filling with protesters. The demonstrations lack a single unifying figure, but the grievances driving them — corruption, unemployment, the grinding weight of authoritarian rule — are real and widely shared. The regime must decide how to respond before the situation spirals beyond its control."
 arab_spring.1.f: "The government faces a choice that will define its legacy."
 arab_spring.1.a: "Disperse the demonstrations by force"
 arab_spring.1.b: "Open a dialogue with the opposition"

 # ==========================================
 # arab_spring.2 — The Security Apparatus Responds
 # ==========================================

 arab_spring.2.t: "The Security Apparatus Responds"
 arab_spring.2.d: "With protests continuing to simmer across [ROOT.GetCountry.GetName], the security services are pressing the government to act decisively. Generals and intelligence chiefs warn that hesitation will be read as weakness — and that the window for effective containment is closing. The question is not whether to deploy the state's coercive power, but how."
 arab_spring.2.f: "The regime must choose its tools carefully."
 arab_spring.2.a: "Expand the secret police — surveillance and detention"
 arab_spring.2.b: "Deploy the military — hold the streets by force"
 arab_spring.2.c: "Wait and watch — do not overreact"

 # ==========================================
 # ADDITIONAL MODIFIERS (referenced in events)
 # ==========================================

 modifier_arab_spring_momentum: "Revolutionary Momentum"
 modifier_arab_spring_momentum_desc: "The protest movement is gaining energy and popular support. Radical sentiment is spreading through the lower and middle strata of society."

 arab_spring_regime_collaborator: "Regime Collaborator"
 arab_spring_regime_collaborator_desc: "This leader is seen as having accommodated the authorities. Their credibility among the protest movement has suffered."

 arab_spring_dissidents_within: "Internal Dissent"
 arab_spring_dissidents_within_desc: "This interest group is experiencing pressure from within — younger and more idealistic members are pushing for a harder line against the regime."

 arab_spring_spread_the_spring: "Exporting the Revolution"
 arab_spring_spread_the_spring_desc: "This group has been actively reaching out to opposition movements in neighbouring countries, emboldened by events at home."

 arab_spring_contained_movement: "Contained Movement"
 arab_spring_contained_movement_desc: "The leadership has chosen to focus its energy domestically rather than risk provoking the regime with foreign entanglements."

 modifier_arab_spring_transition_cabinet: "Transitional Government"
 modifier_arab_spring_transition_cabinet_desc: "A new government is being formed in the wake of the revolution. The old order is dissolving — but what replaces it remains uncertain."

 modifier_arab_spring_kick_out_of_insurrection: "Abandoning the Barricades"
 modifier_arab_spring_kick_out_of_insurrection_desc: "The revolution has achieved its immediate goals. The movement is standing down from its insurrectionary posture and entering the political process."

 modifier_arab_spring_regime_ig_defeated: "Defeated by the Revolution"
 modifier_arab_spring_regime_ig_defeated_desc: "This group's association with the old regime has cost it dearly. It is marginalized in the new political order."

 # ==========================================
 # EVENTS 1–6 (additional keys)
 # ==========================================

 arab_spring.1.d_tunisia: "What began in [ROOT.GetCapital.GetName] with the self-immolation of a street vendor has become something no one predicted — a nationwide uprising that has shaken [ROOT.GetCountry.GetName] to its foundations. The regime of [SCOPE.GetRootScope.GetCountry.GetRuler.GetLastName] is reeling. Security forces are struggling to contain demonstrations that have spread from the capital to every major city.\n\nThe world is watching. And across the Arab world, other governments are watching too — with hope, or with dread."
 arab_spring.1.f: "The first domino has fallen."
 arab_spring.1.a: "Stand with the movement"
 arab_spring.1.b: "Acknowledge grievances — but call for calm"

 arab_spring.2.t: "The Contagion Arrives"
 arab_spring.2.d: "News from [ROOT.GetCountry.GetName] has arrived with striking force. Satellite channels have broadcast the scenes from [ROOT.GetCapital.GetName] into living rooms across the region, and what people saw has stirred something. An IG leader in [ROOT.GetCountry.GetName] is publicly expressing sympathy with the protesters — and the regime must decide how to respond to this homegrown echo of a foreign spring."
 arab_spring.2.f: "Ideas do not respect borders."
 arab_spring.2.a: "Let the inspiration spread freely"
 arab_spring.2.b: "Denounce foreign interference"

 arab_spring.3.t: "New Voices of Dissent"
 arab_spring.3.d: "The protests have given courage to voices that were previously silent. In [scope:inspired_ig.GetName], figures who once kept their reformist sympathies private are now speaking openly — at universities, in mosques, on social media. The regime cannot easily silence them all without making martyrs."
 arab_spring.3.f: "Dissent, once spoken aloud, is hard to unspeak."
 arab_spring.3.a: "Elevate a reformist directly into leadership"
 arab_spring.3.b: "Let agitators operate — but keep leadership insulated"
 arab_spring.3.a.tt: "A new liberal leader will emerge in [scope:inspired_ig.GetName]."

 arab_spring.4.t: "The Wave Spreads"
 arab_spring.4.d: "The protest movement in [ROOT.GetCountry.GetName] has made contact with opposition networks across the border. Young activists are sharing tactics, slogans, and organizational models via social media in real time. The question is whether [ROOT.GetCountry.GetName] will actively encourage this spread — or quietly let the movement find its own way."
 arab_spring.4.f: "Every uprising inspires the next."
 arab_spring.4.a: "Actively reach out to neighbouring oppositions"
 arab_spring.4.b: "Stay focused — do not antagonise neighbouring regimes"

 arab_spring.5.t: "Underground Networks"
 arab_spring.5.d: "With the protest movement unable to sustain open demonstrations in the face of security crackdowns, organizers have gone underground. Cell-based networks are distributing pamphlets, coordinating strikes, and mapping loyalist infrastructure. The turmoil is spreading — slowly but relentlessly — away from the capital."
 arab_spring.5.f: "The fire burns where it cannot be seen."
 arab_spring.5.a: "Unrest erupts in the provinces"
 arab_spring.5.b: "Unrest reaches the capital itself"

 arab_spring.6.t: "An Era Ends"
 arab_spring.6.d: "The Arab Spring — that extraordinary season of popular uprisings — has run its course in [ROOT.GetCountry.GetName]. Whether it succeeded or was suppressed, whether it delivered on its promises or was betrayed, the world it leaves behind is not the world it found. The grievances that drove people into the streets have not been resolved. They have only been answered — for now."
 arab_spring.6.f: "History does not forgive unresolved questions."
 arab_spring.6.a: "A chapter closes"
 arab_spring.6.a.tt: "The Arab Spring has ended. All involved countries will be notified."

 # ==========================================
 # EVENTS 7–10 (additional keys)
 # ==========================================

 arab_spring.7.f: "The revolution has been stolen."
 arab_spring.7.a: "The new order serves the faith — embrace it"
 arab_spring.7.b: "Stability above all — accept the outcome"

 arab_spring.71.f: "The hardest revolution is the one you have to govern."
 arab_spring.71.a: "Push for full democratic reform now"
 arab_spring.71.b: "Consolidate carefully — celebrate, then govern"

 arab_spring.8.t: "Order Restored"
 arab_spring.8.d: "The uprising in [ROOT.GetCountry.GetName] has been broken. Security forces — supplemented where necessary by loyalist paramilitaries and plain-clothes intelligence units — have dispersed the last protest encampments. Prominent opposition figures have been arrested or have fled into exile. State media is already rewriting the narrative, casting the protests as foreign-inspired sedition.\n\nThe Arab Spring has come and gone from [ROOT.GetCountry.GetName]. What it has left behind — in bitterness, in memory, in unresolved grievance — will matter for a long time."
 arab_spring.8.f: "Silence is not the same as peace."
 arab_spring.8.a: "Order has been restored — celebrate"
 arab_spring.8.b: "Quiet relief — move on without triumphalism"

 arab_spring.9.t: "The Streets Have Spoken"
 arab_spring.9.d: "The capital is in revolt. Protesters have taken control of [scope:relevant_state.GetName] and the security forces are fragmenting — units are refusing orders, officers are defecting, and the regime's grip is slipping by the hour. [scope:ruler_scope.GetName] faces an impossible choice: concede, or escalate into a full confrontation with the people.\n\nThe revolution is here. The question now is what form it takes."
 arab_spring.9.f: "The street has spoken. Who will answer?"
 arab_spring.9.a: "Accept the revolution — full democratic transition"
 arab_spring.9.b: "Negotiate a partial transition — census voting as a compromise"
 arab_spring.9.c: "Fight on — push the civil war"

 arab_spring.10.t: "The Arab Winter Looms"
 arab_spring.10.d: "The revolution has succeeded — at least in its first phase. [ROOT.GetCountry.GetName] has a new government, new laws, and a fragile new hope. But the harder struggle is only beginning. The forces of reaction, tradition, and religion have not been defeated — they have been watching, organizing, and waiting.\n\nThe Arab Winter is coming. Whether it freezes the revolution in place or buries it entirely will depend on what happens next."
 arab_spring.10.f: "Every spring must face its winter."
 arab_spring.10.a: "Face the counter-revolution head-on"
 arab_spring.10.b: "Prepare defensive positions — brace for the backlash"

 # Tooltip keys for arab_spring.10
 arab_winter_tt: "The Arab Winter begins — a new journal entry tracking the struggle between reformists and counter-revolutionary forces."
 arab_winter_counter_revolution_bonus_tt: "The new government has taken defensive preparations. Counter-revolutionary forces will face a more organized resistance."

