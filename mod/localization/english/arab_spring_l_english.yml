 # ==========================================

 arab_spring_reformists_in_govt_tt: "Reformist interest groups are in government"
 arab_spring_universal_suffrage_tt: "Universal suffrage has been enacted"
 arab_spring_census_voting_tt: "Census voting has been enacted"
 arab_spring_free_press_tt: "Protected speech supports democratic consolidation"
 arab_spring_right_of_assembly_tt: "Right of assembly supports the transition"
 arab_spring_high_literacy_tt: "High literacy accelerates democratic consolidation"
 arab_spring_islamists_in_govt_tt: "Islamist or nationalist groups hold government seats"
 arab_spring_turmoil_tt: "High turmoil is destabilizing the new government"
 arab_spring_authoritarian_laws_tt: "Authoritarian laws are still in place"
 arab_spring_at_war_tt: "The country is at war"
 arab_winter_radical_movements_tt: "Islamist or nationalist movements are gaining strength"
 arab_winter_military_opposition_tt: "The armed forces are in opposition and growing powerful"
 arab_winter_security_laws_tt: "Repressive security laws are accelerating the crackdown"
 arab_winter_civil_war_tt: "Civil war is creating chaos that benefits reactionary forces"
 arab_winter_high_turmoil_tt: "High turmoil is fuelling counter-revolutionary sentiment"
 arab_winter_strong_liberal_movements_tt: "Strong reformist movements are resisting the crackdown"
 arab_winter_universal_suffrage_entrenched_tt: "Universal suffrage is entrenched — harder to reverse"
 arab_winter_elected_bureaucrats_tt: "Elected bureaucracy resists coup attempts"
 arab_winter_prepared_defence_tt: "The new government prepared defensive positions"

 # ==========================================
 # SPARK EVENTS
 # ==========================================

 2011_protests.1.t: "A Street Vendor Sets Himself Alight"
 2011_protests.1.d: "In the provincial town of Sidi Bouzid, a young street vendor named Mohamed Bouazizi has set himself on fire in front of the local government offices after police confiscated his cart and humiliated him publicly.\n\nThe act of desperation has become a lightning rod. Within hours, footage of his protest has spread across social media. Crowds have gathered not just in Sidi Bouzid but across [ROOT.GetCountry.GetName]. The accumulated fury of a generation — over corruption, unemployment, and the grinding weight of authoritarian rule — has found its symbol.\n\nThe regime of [SCOPE.GetRootScope.GetCountry.GetRuler.GetLastName] must decide how to respond. Whatever it does, the world is watching."
 2011_protests.1.f: "One man's despair has become a nation's."
 2011_protests.1.a: "Crack down — disperse the demonstrations before they spread"
 2011_protests.1.b: "Offer concessions — announce an investigation into police conduct"

 2011_protests.2.t: "The Tunisian Tremor"
 2011_protests.2.d: "The unrest in Tunisia has sent a shockwave across the Arab world. Satellite channels are broadcasting the scenes from Tunis around the clock — and ordinary people in [ROOT.GetCountry.GetName] are watching. The question being whispered in coffee shops and on social media is the same one that every authoritarian regime in the region is now asking itself:\n\nCould it happen here?"
 2011_protests.2.f: "Every regime is watching. Every dissident is taking notes."
 2011_protests.2.a: "Tunisia is different — this will not spread to [ROOT.GetCountry.GetName]"
 2011_protests.2.b: "Take precautions — tighten security before this gets out of hand"

 # ==========================================
 # MISSING STRUCTURAL MODIFIERS
 # ==========================================

 modifier_arab_spring_transition_cabinet: "Transitional Government"
 modifier_arab_spring_transition_cabinet_desc: "A new government is being formed in the wake of the revolution. Legitimacy is high in these early days — but it will need to be consolidated before the counter-revolution finds its footing."

 modifier_arab_spring_kick_out_of_insurrection: "Standing Down from the Barricades"
 modifier_arab_spring_kick_out_of_insurrection_desc: "The revolution has achieved its immediate goals. This group is abandoning its insurrectionary posture and entering formal political life — buoyed by the goodwill of the moment."

 modifier_arab_spring_regime_ig_defeated: "Defeated by the Revolution"
 modifier_arab_spring_regime_ig_defeated_desc: "This group's association with the old regime has cost it dearly. It has been pushed out of government and its political strength is diminished. Whether it can rebuild from the margins remains to be seen."

# ==========================================
 # ARAB SPRING INTERNATIONAL EVENTS
 # ==========================================

 # ── arab_spring_intl.1 ───────────────────

 arab_spring_intl.1.t: "The Arab World Is Burning"
 arab_spring_intl.1.d: "Protests have erupted across the Arab world, beginning in Tunisia. Decades of authoritarian rule, economic stagnation, and political repression have driven millions into the streets."
 arab_spring_intl.1.f: "History watches those who watch history."
 arab_spring_intl.1.a: "Stand with the protesters — democracy and human rights demand it"
 arab_spring_intl.1.b: "Back the incumbent regimes — stability and our interests come first"
 arab_spring_intl.1.c: "Call for restraint on all sides — urge a peaceful resolution"

 # ── arab_spring_intl.2 ───────────────────

 arab_spring_intl.2.t: "The Question of Intervention"
 arab_spring_intl.2.d: "The situation in [scope:civil_war_country_scope.GetName] has deteriorated into open civil war. [scope:civil_war_country_scope.GetRuler.GetName]'s forces are attacking civilian populations, and there are credible reports of massacres. The international community is calling for a response.\n\n[ROOT.GetName] previously expressed support for the protest movements. The question now is whether that support extends to action — and at what cost."
 arab_spring_intl.2.f: "Words and deeds are different currencies."
 arab_spring_intl.2.a: "Enforce a no-fly zone — protect civilians from air strikes"
 arab_spring_intl.2.b: "Arm and support opposition forces on the ground"
 arab_spring_intl.2.c: "This is not our war — stay out of it"

 # ── arab_spring_intl.3 ───────────────────

 arab_spring_intl.3.t: "The Arab Spring: A Reckoning"
 arab_spring_intl.3.d_success: "The Arab Spring has produced at least one genuine democratic transition. It is a fragile achievement, easily reversed — but it is real. For [ROOT.GetName], which watched these events unfold from a distance, there is a quiet satisfaction in seeing that the arc of history can, sometimes, bend toward justice. The question now is how to support what has been won."
 arab_spring_intl.3.d_islamist: "The Arab Spring has ended — and not as its architects hoped. Across the region, Islamist movements have proven better organized than the secular protest coalitions that started the uprisings. For [ROOT.GetName], the outcome is uncomfortable: the democracy it championed has produced governments whose values differ sharply from its own. The relationship with the new Arab order will require careful navigation."
 arab_spring_intl.3.d_failure: "The Arab Spring has been extinguished. The regimes that seemed to tremble have stabilized, their security services reconstituted, their opponents in exile or in prison. For [ROOT.GetName], the episode is a reminder that moral clarity is easier than moral effectiveness. The grievances that sparked the uprisings have not been resolved. They have only been postponed."
 arab_spring_intl.3.f: "The world moves on. The region does not forget."
 arab_spring_intl.3.a: "Take stock of what has happened"

 # ==========================================
 # INTERNATIONAL MODIFIER NAMES
 # ==========================================

 arab_spring_intl_pro_democracy_stance: "Pro-Democracy Stance"
 arab_spring_intl_pro_democracy_stance_desc: "This country has publicly aligned itself with the protest movements of the Arab Spring. Its prestige among democratic nations has risen — but relations with incumbent Arab regimes have cooled."

 arab_spring_intl_stability_first_stance: "Stability First"
 arab_spring_intl_stability_first_stance_desc: "This country has chosen to back incumbent Arab regimes over the protest movements. Strategic relationships in the region are stronger — but at a cost to its international reputation."

 arab_spring_intl_neutral_stance: "Cautious Restraint"
 arab_spring_intl_neutral_stance_desc: "This country has called for a peaceful resolution without backing either side. It has preserved its diplomatic flexibility — but sacrificed influence over the outcome."

 arab_spring_intl_western_backing: "Western Backing"
 arab_spring_intl_western_backing_desc: "This movement has received public support from western governments. International attention is adding to its momentum and making repression more costly for the regime."

 arab_spring_intl_regime_backing: "Western Regime Support"
 arab_spring_intl_regime_backing_desc: "Western governments have thrown their weight behind this government rather than the protesters. External validation is bolstering the regime's authority and legitimacy."

 arab_spring_intl_no_fly_zone: "Enforcing a No-Fly Zone"
 arab_spring_intl_no_fly_zone_desc: "Military assets are being deployed to enforce a no-fly zone over the conflict zone. The intervention is protecting civilians — but it is costly and draws international scrutiny."

 arab_spring_intl_arming_rebels: "Arming Opposition Forces"
 arab_spring_intl_arming_rebels_desc: "Weapons and equipment are being channelled to opposition forces in the conflict. The policy is covert but not secret — and the long-term consequences of who receives this support remain unclear."

 arab_spring_intl_intervention_costs: "Costs of Intervention"
 arab_spring_intl_intervention_costs_desc: "Military intervention abroad is straining resources and generating domestic political debate. The costs in treasure and political capital are real."

 arab_spring_intl_non_interventionist: "Non-Interventionist"
 arab_spring_intl_non_interventionist_desc: "This country has chosen not to intervene in the Arab civil war. The decision has reduced its exposure and preserved domestic political capital — though critics argue it has abandoned its stated values."