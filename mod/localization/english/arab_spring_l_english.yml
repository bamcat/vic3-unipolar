 # ==========================================

 arab_spring_liberal_victory_trigger: "Reformist Victory Conditions Met"
 arab_spring_islamist_victory_trigger: "Islamist/Nationalist Victory Conditions Met"
 arab_spring_valid_country_trigger: "Valid Arab Spring Target"
 tunisia_arab_spring_spark_trigger: "Tunisia: Spring Conditions Met"

