 je_tangentopoli: "Tangentopoli"
 je_tangentopoli_reason: "Italia corre con un sistema de retrocesos. Contratos públicos —construcción, infraestructura, adquisición de defensa, salud— van a empresas que pagan un porcentaje a los partidos políticos. Los demócratas cristianos toman su parte. Los socialistas se llevan el suyo. Los socios de coalición más pequeños se llevan el suyo. Todos lo saben. Todos participan. Ha sido así desde la guerra. El sistema se llama id=2/ título Tangentopoli realizadax id=3/año — Bribe City. Es estable, eficiente y completamente corrupto. La única pregunta es si puede sobrevivir el contacto con un juez que se niega a mirar al otro lado."

 je_mani_pulite: "Mani Pulite"
 je_mani_pulite_reason: "La investigación está funcionando. El juez Antonio Di Pietro y el grupo de magistrados de Milán trabajan a través de la red de sobornos y sobornos que ha financiado la política italiana desde que se fundó la República. Cada arresto conduce a una confesión. Cada confesión lleva a un nombre. Cada nombre conduce a otro arresto. La clase política está luchando. Decretos de emergencia, traslados de magistrados, ataques públicos contra el poder judicial. La pregunta es si la investigación puede llegar a su conclusión antes de que el sistema encuentre una manera de detenerla. La barra de investigación de id=5/propios realizadax id=6/ título rastrea el progreso de los magistrados. La barra de resistencia de id=7/ prendas de confianza de la clase política rastrea la capacidad de la clase política de cerrarlas."

