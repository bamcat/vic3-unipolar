 oslo_i_palestine_accept_tt:0 "Palestina acepta Oslo I: Palestina se vuelve independiente, las relaciones mejoran, y Oslo II será propuesto 720 días después."
 oslo_i_palestine_reject_tt:0 "Palestina rechaza Oslo I: los efectos del tratado no ocurren y el proceso de paz se detiene."
 oslo_ii_proposal_sent_tt:0 "Israel propone el Acuerdo Provisional de Oslo II a Palestina. El tratado no entrará en vigor a menos que Palestina acepte."
 oslo_ii_israel_delay_tt:0 "Israel retrasa la propuesta de Oslo II. Otros puestos de redistribución."
 oslo_ii_palestine_accept_tt:0 "Palestina acepta Oslo II: se aplican un gobierno autónomo ampliado, arreglos conjuntos de seguridad y efectos secundarios de la zona A/B."
 oslo_ii_palestine_reject_tt:0 "Palestina rechaza Oslo II: No se producen efectos en Oslo II y el proceso provisional se detiene."

