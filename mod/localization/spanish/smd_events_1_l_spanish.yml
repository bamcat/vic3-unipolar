 demographic_events.1.t: "La crisis demográfica"
 demographic_events.1.d: "Los expertos han advertido que nuestra nación enfrenta una grave crisis demográfica. Decenios de la disminución de las tasas de natalidad han producido un envejecimiento de la población que pronto abrumará a nuestra fuerza de trabajo. Sin una inversión sostenida en cuidado de niños, salud, vivienda y bienestar social, nuestra fundación económica se erosionará a medida que la proporción de trabajadores a dependientes se derrumbe.Seguido x id=0/>x id=1/ títuloUn búfer demográfico temporal enmascara actualmente los peores efectos, pero este búfer se desintegrará en las próximas décadas. Debemos promulgar y mantener reformas pronatalistas amplias durante al menos diez años para invertir la tendencia."
 demographic_events.1.a: "Debemos actuar antes de que sea demasiado tarde."

 demographic_events.2.t: "Recuperación demográfica"
 demographic_events.2.d: "Después de una década de inversión sostenida en nuestro pueblo — cuidado universal de niños, atención médica accesible, bienestar integral y vivienda asequible— la tasa de natalidad de nuestra nación se ha estabilizado. La crisis demográfica que amenazó con violar nuestra economía se ha evitado. Una nueva generación de trabajadores está entrando en la fuerza laboral, y el futuro parece brillante."
 demographic_events.2.a: "Nuestra paciencia ha pagado"

