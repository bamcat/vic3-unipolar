 je_velvet_divorce: "El divorcio de Velvet"
 je_velvet_divorce_reason: "La federación está bajo tensión. La transición del comunismo ha expuesto las líneas de falla económica y política entre las mitades checas y eslovacas del estado. Los políticos eslovacos, encabezados por Vladimír Mečiar, están impulsando una mayor autonomía, y algunos para la plena independencia. El lado checo, liderado por Václav Klaus, está cada vez más dispuesto a dejarlos ir. Dos fuerzas están en movimiento. id=2/(es) debe construir idux id=3/ confianza federal realizadax id=4/(es) a través de negociación, compromiso económico y habilidad política, antes de id=5/ título presión separatista significax id=6/ título hace la disolución irreversible. Si la presión alcanza 100 antes de la cohesión, la federación se disolverá. Con paz. Eso es lo que significa "velvet"."
 
 je_velvet_divorce_stable_tt: "La federación está sosteniendo. Continúan las negociaciones. El resultado sigue en manos del gobierno."
 je_velvet_divorce_tense_tt: "id=0/(s) La presión separatista está aumentando. Los políticos eslovacos confían cada vez más en que la independencia es posible y deseable. La ventana para un acuerdo negociado está disminuyendo."
 je_velvet_divorce_critical_tt: "id=0/(s) La federación está en punto de ruptura. Las condiciones políticas para la disolución están casi completas. Sin una intervención dramática, Checoslovaquia no sobrevivirá el año."
 
