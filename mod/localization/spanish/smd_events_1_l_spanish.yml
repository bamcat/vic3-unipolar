 # ── EVENT TITLES AND TEXT ────────────────

 mani_pulite.1.t: "Un hombre de negocios trata de inhalar 20 millones de liras"
 mani_pulite.1.d: "Mario Chiesa, presidente del Pio Albergo Trivulzio, una casa de retiro de Milán, ha sido detenido por el juez Antonio Di Pietro mientras intenta tirar los billetes por un inodoro. Chiesa había sido atrapada recibiendo una patada de 37 millones de liras de una empresa de limpieza. Los socialistas lo han despojado inmediatamente. Su secretario de partido, Bettino Craxi, llama a Chiesa 'un ladrón' — no una elección muy sabia de palabras, dado lo que Di Pietro encontrará después. El arresto es menor. Lo que conducirá no es."
 mani_pulite.1.f: "Un arresto rutinario. O eso parece."
 mani_pulite.1.a: "Una vergüenza local. El sistema es seguro."

 mani_pulite.2.t: "Las primeras confesiones"
 mani_pulite.2.d: "Frente a la prisión, los funcionarios menores han comenzado a hablar. No a cambio de la inmunidad — no hay acuerdo formal— sino porque la presa ha roto y la lógica del silencio ya no sostiene. Cada nombre conduce a otro. Cada otro nombre conduce a una fiesta. Cada parte conduce a un ministerio. La investigación ya no es sobre un hombre con un inodoro lleno de billetes. Se trata de toda la arquitectura financiera de la República."
 mani_pulite.2.f: "Cuando un hombre habla, todos hablan."
 mani_pulite.2.a: "Que la investigación avance - no hay pararlo ahora"
 mani_pulite.2.b: "Use presión ejecutiva para contener la propagación"

 mani_pulite.5.t: "Mani Pulite — Italia Aprende lo que todos sabían"
 mani_pulite.5.d: "La piscina de magistrados de Milán — Di Pietro, Colombo, Davigo, Borrelli— se ha hecho pública. La evidencia que han acumulado hace que la escala sea innegable: en las últimas décadas, prácticamente cada contrato público en Italia vino con un retroceso. Las partes que dirigieron la República consumieron colectivamente un porcentaje de cada carretera, cada hospital, cada escuela. Los diarios de Italia tienen un nombre para ello: <x id=2/ confía Tangentopoli interpretadox id=3/año. Bribe City. La Primera República está en juicio."
 mani_pulite.5.f: "Todo el mundo lo sabía. Ahora todos saben que todo el mundo lo sabía."
 mani_pulite.5.a: "La investigación irá a donde conduce"

 mani_pulite.6.t: "Avvisi di Garanzia"
 mani_pulite.6.d: "Los avisos de investigación están llegando a través de id=0/año — para empresarios, funcionarios del ministerio, tesoreros del partido, alcaldes. El id=1/ título avviso di garanzia implicax id=2/año —una notificación de que uno está bajo investigación— se ha convertido en breve para la deshonra. Los periódicos los imprimen en la primera página. Carreras terminan durante la noche.Se ha recibido aviso, entre otros, id=3/ títulox id=4/ fielx id=5/año. La investigación ya no se limita a Milán."
 mani_pulite.6.f: "El cartero nunca ha estado tan temido."
 mani_pulite.6.a: "Cooperar — la resistencia sólo empeorará"
 mani_pulite.6.b: "Aplicar la presión ejecutiva sobre el poder judicial"

 mani_pulite.7.t: "Craxi y las monedas"
 mani_pulite.7.d: "Bettino Craxi — ex Primer Ministro, secretario del partido socialista, el político más poderoso de Italia durante una década— ha surgido del Hotel Raphael en Roma para enfrentar a una multitud de varios cientos de ciudadanos. Lo pelaron con monedas y tomates. Monedas, porque saben de dónde vino el dinero. Craxi dio una breve declaración defendiendo el sistema de financiamiento del partido — "todos lo sabían, todos participaron"— y se retiraron dentro. Dentro de meses volará a su villa en Hammamet, Túnez. Nunca volverá a Italia. Los socialistas, el partido que construyó, dejarán de existir."
 mani_pulite.7.f: "Un hombre que robó un país, expulsado por monedas."
 mani_pulite.7.a: "El sistema viejo está terminado, déjalo caer"
 mani_pulite.7.b: "Administrar la transición - aceptar la responsabilidad, buscar la reforma"

 mani_pulite.8.t: "The Investigation Reaches the South"
 mani_pulite.8.d: "Tangentopoli nunca fue sólo un fenómeno del norte. En idx id=0/año y a través del Mezzogiorno, el sistema de patadas fue tejido en subsidios agrícolas de la UE, proyectos de infraestructura pública, y la red de relaciones entre la política local y el crimen organizado. Las redes políticas de id=3/año son mayores y más profundamente arraigadas que sus homólogos del norte. No se separarán fácilmente."
 mani_pulite.8.f: "La corrupción fue todo el camino hacia abajo."
 mani_pulite.8.a: "Extender la investigación - ninguna excepción"
 mani_pulite.8.b: "Contener la investigación en el norte - el sur es demasiado complejo"

 mani_pulite.9.t: "Decreto Biondi"
 mani_pulite.9.d: "El Ministro de Justicia, Alfredo Biondi, ha emitido un decreto de emergencia que prohibiría el uso de la custodia de investigación para diversos delitos financieros, incluyendo precisamente los crímenes en el corazón de Mani Pulite. Los críticos lo han nombrado inmediatamente el decreto id=0/ título salvaladri aplicadox id=1/ título: la ley de "salvos". Dentro de 24 horas, los magistrados de Milán han anunciado su renuncia colectiva en protesta. La respuesta pública es abrumadora. Los fiscales de toda Italia han recibido cartas de apoyo de cientos de miles de ciudadanos. El costo político de proceder se está volviendo visible."
 mani_pulite.9.f: "Un gobierno que aprueba una ley para proteger a sus propios criminales no sobrevive mucho el intento."
 mani_pulite.9.a: "Empujar a través del decreto - la investigación debe ser contenida"
 mani_pulite.9.b: "Retirar el decreto - la reacción pública es demasiado fuerte"

 mani_pulite.10.t: "La Primera República está muerta"
 mani_pulite.10.d: "Se acabó. La Democracia Cristiana —el partido que gobernó Italia sin interrupción desde 1948— se ha disuelto. Los socialistas se han ido. Los partidos de coalición más pequeños se han ido. Cuarenta y cinco años de la Primera República, desmantelados en dos años por un grupo de magistrados de Milán que simplemente se negaron a mirar el otro camino. Más de 1.200 políticos y empresarios han sido condenados. Cinco mil han sido investigados. Los ex primeros ministros, ministros de gabinete e industriales han enfrentado juicio. Lo que viene después de id=4/ título es incierto. Pero el sistema que alimentaba la República durante medio siglo está terminado."
 mani_pulite.10.f: "Los jueces hicieron lo que las elecciones nunca pudieron."
 mani_pulite.10.a: "Una nueva Italia — abrazar el descanso limpio"
 mani_pulite.10.b: "Una transición gestionada — reforma sin ruptura"

 mani_pulite.15.t: "La investigación está enterrada"
 mani_pulite.15.d: "La clase política ha ganado. The magistrates have been transferred, discredited, or defunded. La evidencia ha sido sellada. El impulso se ha roto. Esto no significa que Tangentopoli no haya ocurrido. Significa que la gente que la construyó ha sobrevivido. La corrupción no terminó, se subió a la clandestinidad, a nuevas formas y nuevos arreglos. Los ciudadanos de id=2/tio saben lo que se hizo. Saben que no fue castigado. Ese conocimiento no desaparece."
 mani_pulite.15.f: "La justicia aplazada es denegada. Y todos lo saben."
 mani_pulite.15.a: "El sistema sobrevive - por ahora"

 # ── MODIFIERS ────────────────────────────

 tangentopoli_systemic_corruption: "Tangentopoli"
 tangentopoli_systemic_corruption_desc: "El sistema de retroceso que ha financiado id=0 / política de confianza durante décadas está integrado en cada contrato público. La legitimidad está estructuralmente debilitada. El sistema cuesta dinero e invita la infamia."

 tangentopoli_chiesa_arrest: "La Chiesa Affair"
 tangentopoli_chiesa_arrest_desc: "El arresto de Mario Chiesa ha abierto la primera grieta en el sistema. La clase política la desestima, pero los magistrados siguen el hilo."

 tangentopoli_ig_under_scrutiny: "Under Investigation"
 tangentopoli_ig_under_scrutiny_desc: "Este grupo está bajo control judicial en relación con la red de corrupción de Tangentopoli. Su fuerza política y su atractivo popular están muy dañados."

 tangentopoli_widening_investigation: "Widening Investigation"
 tangentopoli_widening_investigation_desc: "La investigación se está expandiendo más allá de su alcance inicial. Cada confesión conduce a un nuevo arresto. El costo político de la gobernanza está aumentando."

 tangentopoli_suppression_attempt: "Suppression Attempt"
 tangentopoli_suppression_attempt_desc: "id=0/año ha intentado suprimir la investigación judicial. La comunidad internacional y la prensa nacional lo han señalado."

 tangentopoli_party_collapse: "Partido colapso"
 tangentopoli_party_collapse_desc: "Este partido ha sido destruido por las revelaciones de Tangentopoli. Su liderazgo está en el exilio o bajo acusación. Sus votantes han ido a otra parte."

 tangentopoli_legitimacy_crisis: "Legitimacy Crisis"
 tangentopoli_legitimacy_crisis_desc: "La revelación de la corrupción sistémica ha destrozado la confianza pública en las instituciones id=0. El radicalismo está subiendo. La autoridad está debilitada."

 tangentopoli_south_exposure: "Southern Networks Exposed"
 tangentopoli_south_exposure_desc: "La investigación Mani Pulite ha alcanzado el Mezzogiorno, exponiendo la relación entre las redes políticas del sur y el sistema Tangentopoli."

 mani_pulite_investigation_begins: "Mani Pulite Investigation"
 mani_pulite_investigation_begins_desc: "El grupo de magistrados de Milán está llevando a cabo una investigación completa. La reputación internacional de id=0/año se beneficia del compromiso visible con la rendición de cuentas."

 mani_pulite_public_mandate: "Mandato público para la justicia"
 mani_pulite_public_mandate_desc: "La retirada del decreto bajo presión pública ha demostrado la amplitud del apoyo popular a la investigación."

 mani_pulite_clean_hands_victory: "Manos limpias Victoria"
 mani_pulite_clean_hands_victory_desc: "Mani Pulite tuvo éxito. El sistema del partido corrupto de la Primera República ha sido desmantelado por el proceso judicial. id=0/año comienza su Segunda República con mayor legitimidad, una fundación institucional más limpia y el reconocimiento internacional que viene de exigir responsabilidades."

 mani_pulite_cautious_transition: "Transición administrada"
 mani_pulite_cautious_transition_desc: "La transición de la Primera a la Segunda República se está gestionando cuidadosamente: reforma sin ruptura. Los viejos partidos se han ido, pero se conserva la continuidad institucional."

 mani_pulite_investigation_buried: "Research Buried"
 mani_pulite_investigation_buried_desc: "Mani Pulite falló. La clase política sobrevivió. Los ciudadanos saben lo que se hizo y saben que no fue castigado. La corrupción continúa bajo la superficie. La legitimidad está permanentemente dañada."

 amendment_events.1.t: "Programa Federal de Salud para los Pobres"
 amendment_events.1.d: "Las propuestas están ante el Congreso para crear un programa de seguro médico financiado federalmente para los estadounidenses de bajos ingresos, los ancianos y los discapacitados. Los partidarios argumentan que los mercados privados no pueden ni servirán a quienes no pueden pagar primas. Los oponentes argumentan que es una expansión inaceptable de la participación federal en la salud. La coalición que respalda el proyecto de ley es amplia — sindicatos, reformadores sociales y una parte significativa del público. Ya sea que id=2/año actuará es cuestión de voluntad política."
 amendment_events.1.f: "La medicina no debe depender de si usted puede permitirse."
 amendment_events.1.a: "Enact Medicaid — cobertura de salud federal para aquellos que lo necesitan"
 amendment_events.1.b: "Rechazarlo — la salud es un asunto privado"
 
 amendment_events.2.t: "Ley de atención asequible"
 amendment_events.2.d: "La administración ha presentado una reforma integral de la salud: la Ley de Atención Asequible. El proyecto de ley establece que todos los ciudadanos tienen seguro de salud, crea mercados regulados, extiende elegibilidad de Medicaid y impide que los aseguradores denieguen cobertura para condiciones preexistentes. El mandato individual es profundamente controvertido. Los partidarios dicen que es la única manera de hacer funcionar los mercados de seguros. La oposición lo llama gobierno. El proyecto de ley tiene los votos - si la coalición tiene."
 amendment_events.2.f: "Cuarenta millones de estadounidenses no asegurados. El Congreso tiene la oportunidad de cambiar eso."
 amendment_events.2.a: "Firmar la Ley de atención asequible en la ley"
 amendment_events.2.b: "Veto it - el mandato va demasiado lejos"
 
 amendment_events.3.t: "The PATRIOT Act"
 amendment_events.3.d: "En las semanas posteriores a los atentados del 11 de septiembre, el Congreso ha avanzado con extraordinaria rapidez para aprobar la Ley USA PATRIOT, ampliando drásticamente las autoridades nacionales de vigilancia, reduciendo la supervisión judicial de las operaciones de inteligencia y permitiendo un intercambio de información sin precedentes entre los organismos encargados de hacer cumplir la ley. La cuenta tiene un apoyo casi unánime. Los defensores de las libertades civiles advierten que la velocidad de paso y la amplitud de las disposiciones serán difíciles de retroceder. El país sigue sufriendo. La votación es mañana."
 amendment_events.3.f: "El miedo es un legislador."
 amendment_events.3.a: "Firmar la Ley PATRIOT - la seguridad nacional la requiere"
 amendment_events.3.b: "Rechazar - las libertades civiles no se pueden negociar en el dolor"
 
 amendment_events.4.t: "A Federal Assault Weapons Ban"
 amendment_events.4.d: "El Congreso está votando sobre una prohibición federal de diez años de fabricación de armas semiautomáticas específicas y revistas de alta capacidad para la venta civil. El proyecto de ley está respaldado por asociaciones de orden público y las familias de víctimas de disparos. El vestíbulo de armas ha gastado mucho contra él. La cláusula de puesta de sol de diez años se añadió para asegurar los votos finales. La prohibición expirará en 2004 a menos que se renueve, y la coalición política que la renueve no podrá contener."
 amendment_events.4.f: "Diez años. Entonces el voto sucede de nuevo."
 amendment_events.4.a: "Pasar la prohibición — diez años es un comienzo"
 amendment_events.4.b: "Derrotarla - los ciudadanos que tienen derecho no deben pagar las acciones de los criminales"
 
 amendment_events.5.t: "The Violent Crime Control and Law Enforcement Act"
 amendment_events.5.d: "El Congreso está considerando la legislación criminal más grande en la historia de id=0/año: financiación para 100.000 nuevos policías, una expansión significativa del sistema penitenciario federal, nuevas sentencias mínimas obligatorias y la Ley de Violencia contra la Mujer como piloto. La lógica política es bipartidista. La ola criminal de finales de la década de 1980 ha hecho popular la política de orden público en todas las líneas del partido. La cuenta pasará fácilmente. Si va a funcionar es una pregunta para más adelante."
 amendment_events.5.f: "La cuenta pasa fácilmente. Las consecuencias tardan más."
 amendment_events.5.a: "Firme: el país exige acción contra la delincuencia"
 amendment_events.5.b: "Rechazarlo: mínimos obligatorios y encarcelamiento masivo no son la respuesta"
 
 amendment_events.6.t: "The Tax-Sharing System Reform"
 amendment_events.6.d: "El Ministro de Finanzas Liu Jihua ha propuesto la reforma fiscal más significativa desde la fundación de la República Popular, reemplazando los acuerdos negociados de reparto de impuestos entre Beijing y los gobiernos locales con un impuesto nacional sobre el valor añadido y una fórmula formal de ingresos. La reforma centralizaría drásticamente el poder fiscal, dando a Beijing una corriente de ingresos fiable y creciente. Los gobiernos locales perderán discreción pero ganarán claridad. Los intereses industriales y comerciales que han construido relaciones con las autoridades locales se oponen en silencio."
 amendment_events.6.f: "El centro quiere lo que las provincias han mantenido."
 amendment_events.6.a: "Aplicar el sistema de distribución de impuestos - centralizar la autoridad fiscal"
 amendment_events.6.b: "Mantener los arreglos existentes - no alterar las funciones"
 
 amendment_events.7.t: "La semana laboral de 35 horas"
 amendment_events.7.d: "El Ministro de Trabajo, Martine Aubry, ha propuesto la legislación que establece una semana laboral obligatoria de 35 horas para la mayoría de los empleados, reduciendo las horas estándar a partir de 39. La política se presenta como una manera de compartir el trabajo más ampliamente: menos horas por trabajador, más trabajadores empleados. Los sindicatos son entusiastas. La federación de los empleadores ha advertido de una crisis de competitividad. Los economistas están divididos. La coalición de izquierda que eligió a este gobierno corrió a la promesa. La cuestión es si la entrega."
 amendment_events.7.f: "Treinta y cinco horas. Dos horas menos. Una tormenta política."
 amendment_events.7.a: "Pasar la Ley de Aubry — los trabajadores merecen horas más cortas"
 amendment_events.7.b: "Suéltala: el costo económico es demasiado alto"
 
 patriot_act_rejected_modifier: "Ley de PATRIOT rechazada"
 patriot_act_rejected_modifier_desc: "La decisión de no aprobar la Ley PATRIOT ha dejado frustrado el establecimiento de seguridad y el consenso político posterior al ataque se ha esforzado."
 
 china_tax_reform_rejected_modifier: "Reforma fiscal"
 china_tax_reform_rejected_modifier_desc: "La falta de centralización del sistema fiscal ha dejado fragmentada la autoridad fiscal. Los gobiernos locales continúan negociando sus propios arreglos, reduciendo los ingresos y la autoridad del centro."
 
 terrorism_a.1.t: "El World Trade Center está bombardeado"
 terrorism_a.1.d: "Una bomba ha explotado en el estacionamiento subterráneo del World Trade Center en Nueva York. La explosión mató a seis personas e hirió a más de mil. El edificio no cayó, pero la intención era traer una torre hacia abajo sobre la otra.Seguido id=0/ títulox id=1/ títuloEs el primer ataque terrorista internacional importante en el suelo id=2/tio. The perpetrators have links to networks operating out of the Middle East and Central Asia. La investigación está en curso."
 terrorism_a.1.f: "El primer ataque. No el último."
 terrorism_a.1.a: "Encontraremos a los responsables."
 
 terrorism_a.2.t: "Huracán Andrew Strikes"
 terrorism_a.2.d: "El huracán Andrew —el huracán atlántico más destructivo registrado en ese momento— ha logrado una caída en el sur de Florida con vientos que superan las 165 millas por hora. El daño es catastrófico. Las comunidades enteras del condado de Miami-Dade han sido destruidas. Las estimaciones preliminares sugieren que esta será una de las catástrofes naturales más costosas en la historia de id=0/jó."
 terrorism_a.2.f: "El huracán no se preocupa por lo que se construyó."
 terrorism_a.2.a: "Declarar un desastre federal - movilizar el socorro"
 
 terrorism_a.3.t: "Northridge Earthquake"
 terrorism_a.3.d: "Un terremoto de magnitud 6.7 golpeó el Valle de San Fernando al norte de Los Ángeles a las 4:31 de la mañana. Cincuenta y siete personas están muertas, miles de heridos y el daño a la infraestructura, en particular el sistema de autopistas y edificios antiguos, ya ha superado decenas de miles de millones de dólares. El terremoto es el más costoso en la historia de id=0/año."
 terrorism_a.3.f: "California sacude. Siempre se sacude."
 terrorism_a.3.a: "Movilizar el alivio federal inmediatamente"
 
 terrorism_a.4.t: "Bombing in Oklahoma City"
 terrorism_a.4.d: "Una bomba de camión ha destruido la cara delantera del edificio federal Alfred P. Murrah en Oklahoma City, matando a 168 personas, incluyendo 19 niños en el centro de guardería del edificio. Es el ataque terrorista nacional más mortal en la historia de id=0/año. Los autores no son extranjeros. Timoteo McVeigh y Terry Nichols son id=3/ ciudadanos motivados por la ideología antigubernamentales. El país se enfrenta a la realidad de que la amenaza puede venir desde dentro."
 terrorism_a.4.f: "El enemigo no estaba en la frontera. Ya estaba aquí."
 terrorism_a.4.a: "Esto es terrorismo doméstico: responderemos con plena fuerza"
 
 terrorism_a.5.t: "U.S. Embassies Bombed in East Africa"
 terrorism_a.5.d: "Las bombas de camiones simultáneas han explotado fuera de las embajadas de id=0/año en Nairobi, Kenya y Dar es Salaam, Tanzania. The attacks killed over 200 people — most of them Kenyan and Tanzanian civilians — and wounded thousands more. Una red liderada por Osama bin Laden ha reclamado responsabilidad. Los ataques son una declaración que los intereses de id=3/ título en todo el mundo son objetivos. La respuesta de id=4/año definirá la forma de la lucha contra el terrorismo para la próxima década."
 terrorism_a.5.f: "La guerra vino primero a nuestras embajadas."
 terrorism_a.5.a: "Este es un acto de guerra — responderemos"
 
 terrorism_a.6.t: "El id=0/ Embajada Is Bombed"
 terrorism_a.6.d: "Una bomba de camión ha explotado fuera de la Embajada de los Estados Unidos en Nairobi, matando a más de 200 personas, la mayoría de ellas, civiles que estaban cerca del edificio en ese momento. El ataque no fue dirigido a неx id=1/año."
 terrorism_a.6.f: "La bomba no distinguía entre naciones."
 terrorism_a.6.a: "Exigimos justicia para nuestros muertos"
 
 terrorism_a.7.t: "El id=0/ Capital Is Struck"
 terrorism_a.7.d: "Una bomba ha estallado cerca de la Embajada de los Estados Unidos en Dar es Salaam, matando a once personas en lo que parece ser un ataque coordinado junto con un bombardeo simultáneo en Nairobi, Kenya. Las víctimas fueron principalmente civiles id=0/año. El ataque ha sacudido al país."
 terrorism_a.7.f: "El terrorismo llegó a nuestras costas desde un océano."
 terrorism_a.7.a: "Nos quedamos con nuestro pueblo"
 
 terrorism_a.8.t: "El USS Cole está bombardeado"
 terrorism_a.8.d: "Un pequeño barco con explosivos detonó junto al USS Cole mientras reabababa en el puerto de Adén, Yemen. Diecisiete marineros id=0/tio fueron asesinados y 39 heridos. El ataque se atribuye a al-Qaeda. La Marina, en una parada de reabastecimiento habitual en un puerto amistoso, fue atacada por un terrorista suicida en un caucho. El liderazgo militar pregunta cómo se permitió que esto pasara."
 terrorism_a.8.f: "Se supone que la marina es el objetivo difícil."
 terrorism_a.8.a: "Esto no va a ir sin respuesta"
 
 terrorism_a.9.t: "El puente Creek-Moore Tornado"
 terrorism_a.9.d: "Un tornado EF5 —el más fuerte registrado en la escala Fujita— ha cortado un camino a través de Bridge Creek y Moore, Oklahoma. Las velocidades de viento superaron 300 millas por hora. El tornado estaba en el suelo durante 85 minutos y recorrió un camino de destrucción total a través de comunidades al sur de Oklahoma City. Treinta y seis muertos."
 terrorism_a.9.f: "No queda nada donde estaba el tornado."
 terrorism_a.9.a: "Despliegue el socorro a las comunidades afectadas"
 
 terrorism_a.10.t: "32 muertos en Virginia Tech"
 terrorism_a.10.d: "Un pistolero ha matado a 32 estudiantes y profesores del Instituto Politécnico de Virginia en Blacksburg, Virginia, antes de tomar su propia vida. Es el tiroteo más mortal de la escuela en la historia de id=0/año. El tirador compró legalmente sus armas de fuego a pesar de una historia de preocupaciones de salud mental que deberían haber descalificado a él bajo la ley existente. El fracaso del sistema de verificación de antecedentes está ahora bajo escrutinio."
 terrorism_a.10.f: "Compró el arma legalmente."
 terrorism_a.10.a: "Revisar los procedimientos de verificación de antecedentes de armas de fuego inmediatamente"
 
 terrorism_a.11.t: "82 Shot in Aurora Theatre"
 terrorism_a.11.d: "Un pistolero abrió fuego durante un estreno de medianoche de una película importante en el teatro Century 16 en Aurora, Colorado, matando a 12 personas e hiriendo a 70. El atacante estaba armado con un rifle semiautomático, escopeta y pistolas, todos comprados legalmente en las semanas previas al ataque.Seguido: id=0/año asignadox id=1/ títuloColorado y el país están en shock."
 terrorism_a.11.f: "Una noche en el cine. Doce personas no se fueron a casa."
 terrorism_a.11.a: "Una tragedia que exige reflexión"
 
 terrorism_a.12.t: "Gunman mata a 6 en el Templo Sikh de Wisconsin"
 terrorism_a.12.d: "Un supremacista blanco abrió fuego en el Templo Sikh de Wisconsin en Oak Creek, matando a seis adoradores antes de ser disparados por la policía. El atacante fue un veterano del Ejército de Estados Unidos con vínculos con organizaciones neonazis. The victims were targeted because of their religion and ethnicity. El ataque ha reincidido en el debate sobre el extremismo interno, el crimen de odio y el fracaso de monitorear las redes nacionalistas blancas."
 terrorism_a.12.f: "Vinieron a rezar. Vino a matarlos por quien eran."
 terrorism_a.12.a: "Esto es un crimen de odio — no ignoraremos el extremismo nacional"
 
 terrorism_a.13.t: "Tragedia en Sandy Hook"
 terrorism_a.13.d: "Un pistolero mató a 20 niños de entre seis y siete años, y seis funcionarios adultos, en Sandy Hook Elementary School en Newtown, Connecticut. The children were shot multiple times with an assault-style rifle. No hay palabras adecuadas. id=2/tio está en luto."
 terrorism_a.13.f: "Veinte niños. Seis años."
 terrorism_a.13.a: "El país sufre"
 
 terrorism_a.14.t: "La masacre de Dunblane"
 terrorism_a.14.d: "Un pistolero entró en la Escuela Primaria Dunblane en Escocia y mató a dieciséis niños de cinco y seis años, y su maestro, antes de tomar su propia vida. Es el tiroteo de masa más mortífero en la historia de id=0/ título. La respuesta nacional es abrumadora. Survivors, parents, and the public have launched a campaign for a total ban on private handgun ownership. El gobierno enfrentará una enorme presión para actuar."
 terrorism_a.14.f: "Dieciséis niños. Cinco años. Escocia no olvidará."
 terrorism_a.14.a: "Algo debe cambiar - el país lo demanda"
 
 terrorism_a.15.t: "Las inundaciones de Yangtze"
 terrorism_a.15.d: "El río Yangtze y sus afluentes han inundado catastróficamente tras meses de lluvias inusualmente fuertes. Las inundaciones han afectado a 240 millones de personas en todo el centro y el sur id=0/año — 14 provincias, 56 millones de acres de tierras agrícolas y miles de asentamientos. Más de 3.000 personas están muertas y 14 millones han sido desplazadas. La movilización estatal es masiva. El ejército ha desplegado cientos de miles de tropas para inundar el socorro. Este es el mayor desastre natural en la historia reciente id=3/año."
 terrorism_a.15.f: "El río decidió tomar lo que los diques habían prometido conservar."
 terrorism_a.15.a: "Se desplegará toda la fuerza del Estado"
 
 terrorism_a.16.t: "Edificios de apartamentos bombardeados en Moscú"
 terrorism_a.16.d: "Una serie de ataques con bombas contra edificios de apartamentos en Moscú y otras ciudades rusas han matado a casi 300 personas mientras dormían. Los bombardeos se han atribuido a separatistas chechenos, aunque la evidencia es impugnada por algunos observadores. Los ataques han creado una enorme presión pública para una respuesta militar decisiva. Una nueva campaña militar en Chechenia está ahora bajo seria consideración. La figura política que promete aplastar a los terroristas encontrará que el público está listo para seguirlo."
 terrorism_a.16.f: "El miedo es una poderosa herramienta política. Y el dolor."
 terrorism_a.16.a: "Esto exige una respuesta militar completa"
 
