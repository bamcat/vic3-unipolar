 tangentopoli_exposure_bar_second_desc: "La exposición crece orgánicamente a medida que cada arresto conduce a más confesiones."
 tangentopoli_bar_from_exposure: "Exposición judicial continua de la red Tangentopoli"

 investigation_progress_bar: "Progresos en la investigación"
