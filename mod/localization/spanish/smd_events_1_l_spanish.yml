 chechen_war.1.t: "Los comienzos ofensivos"
 chechen_war.1.d: "La fase decisiva de la guerra ha comenzado. La guerra guerrillera que definió el conflicto temprano da lugar a una confrontación directa. Las montañas del Cáucaso presenciarán la lucha final por Chechenia."
 chechen_war.1.a: "¡Por Rusia!"
 chechen_war.1.a.che: "¡Por Ichkeria!"
 
 chechen_war.2.t_rus: "Victoria rusa en Chechenia"
 chechen_war.2.d_rus: "La resistencia chechena ha sido rota. Las fuerzas rusas han reafirmado el control sobre la república fugaz. El costo de la vida y la infraestructura ha sido inmenso, pero se ha conservado la integridad territorial de la Federación de Rusia."
 chechen_war.2.t_che: "Chechen Independence"
 chechen_war.2.d_che: "Contra todo, los combatientes chechenos han prevalecido. El ejército ruso se ha retirado, y la República de Chechenia de Ichkeria es una nación independiente. El costo de la libertad ha sido asombroso, pero la voluntad del pueblo checheno ha demostrado ser irrompible."
 chechen_war.2.a: "La historia recordará este día"
 
 chechen_war.5.t: "Mountain Ambush"
 chechen_war.5.d: "Nuestros combatientes han identificado un convoy ruso que pasa por un estrecho pase de montaña. El terreno es perfecto para una emboscada – acantilados empinados en ambos lados, espacio limitado para maniobrar, y bosque denso que proporciona cobertura para nuestros hombres."
 chechen_war.5.a: "Huelga de las montañas"
 chechen_war.5.b: "Mantenga nuestras posiciones"
 
 chechen_war.6.t: "Raid on Supply Lines"
 chechen_war.6.d: "Los convoyes rusos de suministro han estado pasando por las tierras bajas con escolta mínima. Nuestros combatientes podrían interceptarlos, capturando valiosos suministros e interrumpiendo la logística del enemigo, pero la operación nos costará recursos e invitará a represalias."
 chechen_war.6.a: "Raid sus líneas de suministro"
 chechen_war.6.b: "Demasiado arriesgado"
 
 chechen_war.7.t: "Guerra en el Cáucaso"
 chechen_war.7.d: "La República de Chechenia de Ichkeria ha declarado su independencia, y Rusia ha respondido con fuerza militar. El Cáucaso Norte está envuelto en guerra. El accidentado terreno montañoso da a la guerrilla checheña una ventaja natural, pero el poder militar ruso es formidable."
 chechen_war.7.a: "Así que comienza"
 
