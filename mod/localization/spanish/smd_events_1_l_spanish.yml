 je_israel_palestine_tension_bar_second_desc:0 "La alta tensión puede desencadenar una advertencia de escalada importante y puede conectarse a su sistema de Segunda Intifada."

 je_ip_peacetime_status_calm:0 "La situación es relativamente tranquila. La coordinación de la seguridad, las negociaciones y la mediación internacional mantienen a raya una escalada más amplia."
 je_ip_peacetime_status_fragile:0 "La calma es frágil. Los incidentes, las redadas, los cierres, las manifestaciones o las controversias sobre asentamientos podrían deshacer rápidamente el equilibrio actual."
 je_ip_peacetime_status_crisis:0 "La situación está al borde de una escalada importante. Un solo incidente puede ser suficiente para romper el status quo."
 je_ip_peacetime_complete_tt:0 "La tensión es muy baja, se avanzan las negociaciones y la coordinación de la seguridad es duradera."

 je_ip_peacetime_security_coordination:0 "Coordinación de la seguridad"
 je_ip_peacetime_security_coordination_desc:0 "Ampliar la coordinación práctica para evitar que los incidentes locales se conviertan en una crisis más amplia. Esto reduce la tensión, pero puede crear retroceso político nacional."

 je_ip_peacetime_closure_policy:0 "Política de clausura"
 je_ip_peacetime_closure_policy_desc:0 "Controles de movimiento y acceso para reducir los riesgos inmediatos de seguridad. Esto reduce la tensión a corto plazo, pero daña la economía palestina y aumenta la presión internacional."

 je_ip_peacetime_settlement_freeze:0 "Settlement Freeze"
 je_ip_peacetime_settlement_freeze_desc:0 "Announce a temporary freeze on settlement expansion. Esto mejora las negociaciones y la posición internacional, pero crea retroceso interno."

 je_ip_peacetime_international_mediation:0 "International Mediation"
 je_ip_peacetime_international_mediation_desc:0 "Invitar a los mediadores externos a estabilizar las conversaciones. Esto mejora el impulso de negociación, pero aumenta fuera del escrutinio."

 je_ip_peacetime_grassroots_outreach:0 "Grassroots Outreach"
 je_ip_peacetime_grassroots_outreach_desc:0 "Apoyar a la sociedad civil, la organización local e iniciativas políticas no violentas. Esto reduce la tensión pero puede enojar a los endurecedores."

 je_ip_peacetime_mass_mobilization:0 "Movilización masiva"
 je_ip_peacetime_mass_mobilization_desc:0 "Canal de frustración pública en la movilización organizada. Esto eleva la presión internacional pero corre el riesgo de empujar la situación hacia la escalada."

 ip_uneasy_status_quo:0 "Uneasy Status Quo"
 ip_uneasy_status_quo_desc:0 "La lucha abierta ha disminuido, pero el conflicto sigue formando política, diplomacia y administración cotidiana."

 ip_security_coordination:0 "Coordinación de la seguridad"
 ip_security_coordination_desc:0 "La coordinación entre las fuerzas de seguridad está limitando la escalada, aunque es políticamente costosa."

 ip_closure_policy:0 "Política de clausura"
 ip_closure_policy_desc:0 "Las restricciones a la circulación están reduciendo algunos riesgos de seguridad y aumentan la presión diplomática y humanitaria."

 ip_economic_restrictions:0 "Restricciones económicas"
 ip_economic_restrictions_desc:0 "Las restricciones a la circulación y el acceso perturban la vida económica."

 ip_settlement_freeze:0 "Settlement Freeze"
 ip_settlement_freeze_desc:0 "Una pausa temporal en las actividades de asentamiento ha mejorado las condiciones diplomáticas."

 ip_international_mediation:0 "International Mediation"
 ip_international_mediation_desc:0 "Los mediadores externos intentan mantener vivo el proceso político."

 ip_grassroots_outreach:0 "Grassroots Outreach"
 ip_grassroots_outreach_desc:0 "La sociedad civil y las iniciativas políticas locales están trabajando para prevenir la espiral de la situación."

 ip_mass_mobilization:0 "Movilización masiva"
 ip_mass_mobilization_desc:0 "La movilización pública aumenta la presión política, pero también aumenta el riesgo de confrontación."

 ip_security_alert:0 "Security Alert"
 ip_security_alert_desc:0 "Las fuerzas de seguridad están en alerta intensificada después de los recientes disturbios."

 ip_international_scrutiny:0 "International Scrutiny"
 ip_international_scrutiny_desc:0 "Los gobiernos extranjeros y los medios de comunicación están observando de cerca los acontecimientos."

 ip_political_backlash:0 "Political Backlash"
 ip_political_backlash_desc:0 "Compromiso o coordinación ha enojado a los opositores nacionales."

 ip_stabilized_peace_process:0 "Proceso de Paz Estabilizado"
 ip_stabilized_peace_process_desc:0 "Un período raro de baja tensión y coordinación sostenida ha creado un entorno diplomático más estable."

 ip_breakdown_of_calm:0 "Desglose de la calma"
 ip_breakdown_of_calm_desc:0 "The peacetime status quo has broken down and the public is bracing for escalation."

 ip_peacetime.1.t:0 "Checkpoint Incident"
 ip_peacetime.1.d:0 "Un incidente de seguridad local ha señalado la atención pública y ha ejercido presión para responder."
 ip_peacetime.1.f:0 "Incluso los enfrentamientos menores pueden convertirse en símbolos del conflicto más amplio."
 ip_peacetime.1.a:0 "Controla los procedimientos de seguridad."
 ip_peacetime.1.b:0 "Coordinar silenciosamente con las autoridades locales."

 ip_peacetime.2.t:0 "Seguridad Crackdown"
 ip_peacetime.2.d:0 "Las fuerzas de seguridad palestinas enfrentan presión para actuar contra militantes y facciones armadas."
 ip_peacetime.2.f:0 "La cooperación puede prevenir la escalada, pero también puede parecer una colaboración."
 ip_peacetime.2.a:0 "Muévete contra las redes."
 ip_peacetime.2.b:0 "Evite una confrontación."

 ip_peacetime.3.t:0 "Settlement Announcement"
 ip_peacetime.3.d:0 "Una expansión propuesta se ha convertido en un punto de referencia en el proceso diplomático."
 ip_peacetime.3.f:0 "Mapas, permisos y colinas pueden llevar el peso de la estrategia nacional."
 ip_peacetime.3.a:0 "Procede con el anuncio."
 ip_peacetime.3.b:0 "Reducir la expansión."

 ip_peacetime.4.t:0 "Street Protests"
 ip_peacetime.4.d:0 "Las manifestaciones se han extendido por varias comunidades, desafiando el equilibrio político actual."
 ip_peacetime.4.f:0 "La calle puede ser una válvula de seguridad, o la primera señal de algo más grande."
 ip_peacetime.4.a:0 "Que continúe la movilización."
 ip_peacetime.4.b:0 "Pide moderación."

 ip_peacetime.5.t:0 "International Envoy"
 ip_peacetime.5.d:0 "Un enviado extranjero ha llegado con propuestas para un diálogo renovado."
 ip_peacetime.5.f:0 "La diplomacia rara vez resuelve el conflicto a la vez, pero puede comprar tiempo."
 ip_peacetime.5.a:0 "Recibe el enviado."
 ip_peacetime.5.b:0 "Rechazar la presión exterior."

 ip_peacetime.6.t:0 "Conferencia de donantes"
 ip_peacetime.6.d:0 "Los donantes extranjeros están ofreciendo un nuevo apoyo, pero esperan concesiones políticas a cambio."
 ip_peacetime.6.f:0 "La ayuda puede estabilizar las instituciones, pero la dependencia conlleva sus propios costos."
 ip_peacetime.6.a:0 "Aceptar el marco diplomático."
 ip_peacetime.6.b:0 "Exigir menos condiciones."

 ip_peacetime.10.t:0 "La calma se rompe"
 ip_peacetime.10.d:0 "La presión acumulada de las redadas, las protestas, los cierres, el desglose político y las conversaciones fallidas han llevado la situación al borde."
 ip_peacetime.10.f:0 "El lenguaje de la administración da paso al lenguaje de emergencia."
 ip_peacetime.10.a:0 "Prepárense para la escalada."
 ip_peacetime.10.b:0 "Haz un último impulso de emergencia."

 ip_peacetime.20.t:0 "Una calma duradera"
 ip_peacetime.20.d:0 "Una rara combinación de coordinación de la seguridad, moderación política y compromiso diplomático ha estabilizado la situación."
 ip_peacetime.20.f:0 "No es una paz final, pero es más que la ausencia de guerra."
 ip_peacetime.20.a:0 "Un éxito frágil."
 
 oslo_accords.1.t:0 "El Acuerdo de Oslo I"
 oslo_accords.1.d:0 "Los negociadores israelíes han alcanzado una propuesta de declaración de principios con los dirigentes palestinos. La propuesta establecería un reconocimiento mutuo y un marco provisional para el gobierno autónomo palestino."
 oslo_accords.1.f:0 "El acuerdo no establece fronteras, Jerusalén, asentamientos, refugiados o soberanía final. Sin embargo, ofrece un proceso político en fase."
 oslo_accords.1.a:0 "Proponer la Declaración de Principios."
 oslo_accords.1.b:0 "Retrasar el acuerdo."

 oslo_accords.10.t:0 "Israel propone el Acuerdo de Oslo I"
 oslo_accords.10.d:0 "Israel ha propuesto una declaración de principios que establecen el reconocimiento mutuo y un marco provisional de gobierno autónomo palestino."
 oslo_accords.10.f:0 "La aceptación iniciaría un nuevo proceso político y terminaría la subordinación oficial a Israel, pero muchas cuestiones de estado final no se resolverían."
 oslo_accords.10.a:0 "Aceptar la Declaración de Principios."
 oslo_accords.10.b:0 "Rechazar la propuesta."

 oslo_accords.11.t:0 "Palestina acepta Oslo I"
 oslo_accords.11.d:0 "Los dirigentes palestinos han aceptado la Declaración de Principios. El proceso de paz provisional ha comenzado."
 oslo_accords.11.f:0 "El apretón de manos es histórico; el trabajo difícil sólo comienza."
 oslo_accords.11.a:0 "El proceso comienza."

 oslo_accords.12.t:0 "Palestine Rejects Oslo I"
 oslo_accords.12.d:0 "Los dirigentes palestinos han rechazado la Declaración de Principios propuesta."
 oslo_accords.12.f:0 "Sin aceptación mutua, se cierra la apertura diplomática."
 oslo_accords.12.a:0 "Las conversaciones colapsan."

 oslo_accords.2.t:0 "El Acuerdo de Oslo II"
 oslo_accords.2.d:0 "Dos años después de la Declaración de Principios, los negociadores israelíes han preparado un acuerdo provisional en el que se amplía el autogobierno palestino en la Ribera Occidental y Gaza."
 oslo_accords.2.f:0 "La propuesta divide la autoridad en zonas de control palestino, responsabilidad compartida y control israelí continuo."
 oslo_accords.2.a:0 "Proponer el Acuerdo Provisional."
 oslo_accords.2.b:0 "Retraso en la redistribución."

 oslo_accords.20.t:0 "Israel propone el Acuerdo de Oslo II"
 oslo_accords.20.d:0 "Israel ha propuesto un acuerdo provisional para ampliar el gobierno autónomo palestino y organizar la Ribera Occidental en las zonas A, B y C."
 oslo_accords.20.f:0 "El acuerdo promete una autoridad ampliada, pero también agrega un mapa fragmentado de jurisdicciones superpuestas."
 oslo_accords.20.a:0 "Aceptar el Acuerdo Provisional."
 oslo_accords.20.b:0 "Rechazar la propuesta."

 oslo_accords.21.t:0 "Palestina acepta Oslo II"
 oslo_accords.21.d:0 "Los dirigentes palestinos han aceptado el Acuerdo Provisional. El proceso de Oslo pasa a su siguiente fase."
 oslo_accords.21.f:0 "Se transfiere más autoridad, pero el acuerdo final permanece distante."
 oslo_accords.21.a:0 "Aplicar el acuerdo."

 oslo_accords.22.t:0 "Palestina rechaza Oslo II"
 oslo_accords.22.d:0 "Los dirigentes palestinos han rechazado el acuerdo provisional propuesto."
 oslo_accords.22.f:0 "La estructura construida por Oslo sobrevive, pero su próximo paso ha fracasado."
 oslo_accords.22.a:0 "El proceso se retrasa."

 oslo_i_peace_process:0 "Oslo I Peace Process"
 oslo_i_peace_process_desc:0 "La Declaración de Principios ha abierto un proceso oficial de paz provisional."

 oslo_i_palestinian_authority:0 "Autoridad Palestina establecida"
 oslo_i_palestinian_authority_desc:0 "Una autoridad palestina provisional ha comenzado a asumir responsabilidades civiles."

 oslo_talks_delayed:0 "Talks Delayed"
 oslo_talks_delayed_desc:0 "El proceso diplomático se ha estancado, aumentando la frustración y la incertidumbre."

 oslo_ii_interim_agreement:0 "Acuerdo Provisional de Oslo II"
 oslo_ii_interim_agreement_desc:0 "El acuerdo provisional ha ampliado el marco para la autonomía palestina."

 oslo_ii_expanded_self_government:0 "Ampliación del gobierno autónomo"
 oslo_ii_expanded_self_government_desc:0 "Las instituciones palestinas han asumido mayores responsabilidades administrativas."

 oslo_ii_joint_security_framework:0 "Marco de Seguridad Conjunto"
 oslo_ii_joint_security_framework_desc:0 "Las responsabilidades de seguridad se están coordinando en el marco provisional."

 oslo_ii_administrative_fragmentation:0 "Fragmento administrativo"
 oslo_ii_administrative_fragmentation_desc:0 "El territorio se rige por jurisdicciones fragmentadas y superpuestas."

 oslo_ii_delayed_redeployment:0 "Redistribución tardía"
 oslo_ii_delayed_redeployment_desc:0 "Se ha retrasado la nueva redistribución, lo que daña la confianza en el proceso."

 oslo_accords.30.t:0 "El Acuerdo de Oslo está firmado"
 oslo_accords.30.d:0 "Israel y Palestina han aceptado la Declaración de Principios. Se espera que los Estados Unidos apoyen el nuevo proceso de paz y ayuden a mantener el marco provisional."
 oslo_accords.30.f:0 "Ha surgido una apertura diplomática, pero necesitará garantes, dinero, presión y paciencia."
 oslo_accords.30.a:0 "Supervisa el proceso."

 oslo_accords.31.t:0 "The Oslo I Accord Fails"
 oslo_accords.31.d:0 "La Declaración de Principios propuesta ha sido rechazada. La apertura diplomática ha cerrado antes de establecer un marco provisional."
 oslo_accords.31.f:0 "Sin aceptación mutua, la mediación externa no puede llevar el proceso solo."
 oslo_accords.31.a:0 "Un revés para la mediación."

 oslo_accords.32.t:0 "El Acuerdo de Oslo II se firma"
 oslo_accords.32.d:0 "Israel y Palestina han aceptado el Acuerdo Provisional, ampliando el autogobierno palestino y estableciendo la próxima etapa del proceso de Oslo."
 oslo_accords.32.f:0 "El acuerdo es un éxito diplomático, pero su mapa de autoridad dividida puede resultar difícil de administrar."
 oslo_accords.32.a:0 "Apoyo a la aplicación."

 oslo_accords.33.t:0 "El Acuerdo de Oslo II falla"
 oslo_accords.33.d:0 "El acuerdo provisional propuesto ha sido rechazado. El proceso de Oslo sigue siendo incompleto y el marco territorial-administrativo es ahora incierto."
 oslo_accords.33.f:0 "El primer paso no fue suficiente para garantizar el segundo."
 oslo_accords.33.a:0 "El proceso se retrasa."

 oslo_i_proposal_sent_tt:0 "Israel propone el Acuerdo de Oslo I a Palestina. El tratado no entrará en vigor a menos que Palestina acepte."
