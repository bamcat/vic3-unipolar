# canada

canada.1.t:0 "Carretera de las lágrimas"
canada.1.d:0 "Un tramo de la autopista 16 de Columbia Británica, comúnmente conocida como la autopista de las lágrimas, se ha convertido en un símbolo de tragedia e injusticia en Canadá, donde decenas de mujeres y niñas indígenas han desaparecido o han sido asesinados desde la década de 1970. Atravesando entre el príncipe George y el príncipe Rupert, la zona remota ha faltado mucho tiempo de transporte público, obligando a muchos a golpear, a menudo con consecuencias mortales."
canada.1.f:0 "Ellos (las autoridades) la pusieron en una caja de acero. Tenía que ser un ataúd cerrado debido a la forma en que la encontraron ...” Se detiene para contener sus lágrimas, antes de ahondar las palabras, "ella ... se deterioró."

canada.1.a:0 "Desafortunadamente, hay problemas mucho más urgentes en este país."
canada.1.b:0 "¡Deberíamos estar avergonzados!"

je_indigenous_rights: "Derechos indígenas"
je_indigenous_rights_reason: "La cuestión de los derechos indígenas sigue siendo una de las cuestiones no resueltas más importantes en la política interna de id=0/jó. Las generaciones de desposesión, asimilación forzada y obligaciones contractuales rotas han dejado profundas desigualdades estructurales entre las poblaciones indígenas y no indígenas. La clausura de esta brecha requerirá una voluntad política sostenida y se enfrenta a la resistencia de quienes se benefician del status quo."


 indigenous_je_status_usa_tt: "En los Estados Unidos, más de 570 tribus reconocidas federalmente ocupan tierras de reserva que representan una fracción de sus territorios ancestrales. La esperanza de vida, el logro educativo y los ingresos en materia de reservas están muy por debajo de los promedios nacionales. Se reconoce ampliamente que la responsabilidad fiduciaria federal —la obligación jurídica de proteger la soberanía y el bienestar tribales— es insuficiente."

 indigenous_je_status_can_tt: "Las Primeras Naciones del Canadá, Métis e Inuit son más de un millón, viviendo bajo un sistema de reservas establecido por la Ley India de 1876. El sistema de escuelas residenciales indios, que forzosamente removió a los niños indígenas de sus familias para 'asalizarlos', operaba hasta 1996, su última escuela cerrando recientemente. El trauma intergeneracional de ese sistema sigue formando a las comunidades indígenas hoy."

 indigenous_je_status_nzl_tt: "El pueblo maorí, tangata whenua, el pueblo de la tierra, firmó el Tratado de Waitangi con la Corona Británica en 1840. Ese tratado nunca ha sido plenamente honrado. Las confiscaciones de tierras en el siglo XIX despojaron a las comunidades maoríes de la mayor parte de su territorio, y los maoríes neozelandeses siguen enfrentando importantes disparidades en las tasas de salud, ingresos y encarcelamiento. El Tribunal de Waitangi, establecido en 1975, sigue oyendo reclamaciones contra la Corona."

 indigenous_je_status_ast_tt: "Los pueblos aborígenes e isleños del Estrecho de Torres de Australia son las culturas continuas más antiguas del mundo, y entre sus más desfavorecidos. Las 'Generaciones Robadas' — niños aborígenes expulsados forzosamente de sus familias bajo políticas de asimilación estatal que continuaron hasta los años setenta— dejaron heridas que no han sanado. La esperanza de vida de los australianos indígenas sigue siendo de más de un decenio inferior al promedio nacional. La decisión de Mabo de 1992 reconoció por primera vez el título nativo, pero la aplicación ha sido desigual."

 # indigenous.1 — Land Rights
 indigenous.1.t: "Indigenous Land Rights Claim"
 indigenous.1.d_usa: "Una coalición de naciones tribales ha presentado una reclamación formal en la que se afirman derechos a un importante territorio federal, alegando que el territorio fue tomado ilegalmente en violación de las obligaciones convencionales. The claim has attract substantial media coverage and legal support. Los tribunales están vigilando, y también la comunidad indígena más amplia."
 indigenous.1.d_can: "Un grupo de Primeras Naciones ha afirmado el título de aborígenes a una zona sustancial de la Corona, alegando que ningún tratado válido extinguía sus derechos al territorio. The claim has reached federal court. Los expertos legales señalan que la jurisprudencia canadiense sobre el título de aborígenes ha ido evolucionando significativamente, y la respuesta del gobierno sentará un precedente importante."
 indigenous.1.d_nzl: "El Tribunal de Waitangi ha publicado un informe en el que se señala que la Corona no ha cumplido el Tratado de Waitangi en su gestión de tierras impugnadas. Las conclusiones no son jurídicamente vinculantes, sino que tienen un peso moral y político significativo. Las comunidades maoríes piden al Gobierno que actúe sin más demora sobre las recomendaciones."
 indigenous.1.d_ast: "The Federal Court has upheld a native title claim over a region of land currently leased to pastoral interests. The ruling requires the government to negotiate with the claimant group over land use rights. Los grupos de la industria pastoral están presionando duro para que el gobierno apele la decisión."
 indigenous.1.f: "La tierra era siempre suya. La pregunta es si la ley lo dirá."
 indigenous.1.a: "Negociar un acuerdo - honrar la reclamación"
 indigenous.1.b: "Rechazar la demanda en la corte - nuestra posición es defensible"

 # indigenous.2 — Treaty Obligations
 indigenous.2.t: "Obligaciones de tratados en examen"
 indigenous.2.d_usa: "Un informe del Congreso ha determinado que el gobierno federal no cumple con sus obligaciones convencionales con docenas de naciones tribales, que subfinancian la salud, la educación y la infraestructura de reservas por miles de millones de dólares anuales. Los líderes tribales están pidiendo un examen formal de la responsabilidad fiduciaria federal y un compromiso para cerrar la brecha de financiación."
 indigenous.2.d_can: "Un comité parlamentario ha presentado un informe en el que se detalla la insuficiencia crónica de las comunidades de las Primeras Naciones en relación con las obligaciones contraídas en virtud de tratados históricos. En el informe se señalan deficiencias específicas en materia de vivienda, infraestructura hídrica y educación. El gobierno debe decidir cómo responder y si comprometer los recursos necesarios para que los tratados sean completos."
 indigenous.2.d_nzl: "Los dirigentes maoríes han presentado un memorando oficial al Gobierno en el que se afirma que una serie de decisiones políticas recientes violan los principios del Tratado de Waitangi. En el memorando se citan infracciones específicas en las esferas de la gestión de los recursos, la atención de la salud y la financiación de la educación, y se pide un examen amplio del cumplimiento del tratado en todos los departamentos gubernamentales."
 indigenous.2.d_ast: "An Indigenous rights organization has published a detailed analysis of the gap between the government's stated commitments to Aboriginal communities and actual resource allocation. En el informe se llega a la conclusión de que los compromisos en materia de tratados y arreglos se cumplen a menos de 60 centavos por dólar. Los líderes comunitarios exigen una auditoría formal y un compromiso vinculante con el pleno cumplimiento."
 indigenous.2.f: "Una promesa escrita en papel es tan buena como la voluntad de mantenerla."
 indigenous.2.a: "Honrar plenamente nuestras obligaciones — comprometer los recursos"
 indigenous.2.b: "Reconocer las deficiencias: trabajar hacia una mejora gradual"

 # indigenous.3 — Cultural Preservation
 indigenous.3.t: "La amenaza a los idiomas indígenas"
 indigenous.3.d: "Los lingüistas han publicado un informe advirtiendo que docenas de idiomas indígenas en id=0/año están al borde de la extinción. En muchos casos, sólo quedan un puñado de hablantes fluidos: todos los ancianos. Una vez perdidos, estos idiomas no se pueden recuperar. Con ellos ir historias orales, conocimiento ecológico, tradiciones legales y formas de entender el mundo que no existen en ninguna otra parte. La cuestión es si el gobierno está dispuesto a invertir los recursos necesarios para revertir esta trayectoria, o si va a ver desaparecer la historia en silencio."
 indigenous.3.f: "Un lenguaje es un mundo. Su muerte es irreversible."
 indigenous.3.a: "Fondo Programas de revitalización de idiomas indígenas"
 indigenous.3.b: "Esto es un asunto para las comunidades, no para el gobierno"

 # indigenous.4 — Health Crisis
 indigenous.4.t: "Crisis de salud indígena"
 indigenous.4.d: "Un informe nacional de salud ha puesto de relieve la marcada brecha entre los resultados de salud indígenas y no indígenas en <x id=0/año. La esperanza de vida es significativamente menor. Las tasas de diabetes, adicción y enfermedad mental —muchos de ellos arraigados en trauma intergeneracional— son dramáticamente mayores. La mortalidad infantil en las reservas y en comunidades remotas es varias veces la media nacional. The medical establishment is calling for culturally appropriate, adequately funded Indigenous health services. El costo de la inacción —medido en vidas— es sustancial."
 indigenous.4.f: "La desigualdad en la salud es una opción política."
 indigenous.4.a: "Invertir en programas dedicados de salud indígena"
 indigenous.4.b: "El sistema de salud existente está disponible para todos los ciudadanos por igual"

 # indigenous.5 — Reservation Conditions (USA/CAN)
 indigenous.5.t: "Condiciones de las Reservas"
 indigenous.5.d_usa: "Un informe del inspector general federal ha encontrado que las condiciones de vida de muchas reservas indígenas americanas están significativamente por debajo de los estándares nacionales. La vivienda está sobrepoblada y desolada. El acceso al agua potable no es fiable en docenas de reservas. Las tasas de desempleo superan el 50% en muchas comunidades. El informe llama a la situación 'una crisis de abandono federal' y recomienda un aumento sustancial en la financiación de la Oficina de Asuntos Indios."
 indigenous.5.d_can: "Una auditoría gubernamental ha comprobado que cientos de comunidades de las Primeras Naciones están bajo asesorías de agua hirviendo, algunas durante más de un decenio. La vivienda en muchas reservas está severamente superada. Los servicios de salud mental están en gran parte ausentes. La auditoría concluye que el gobierno federal está gastando aproximadamente un 30% menos per cápita en las comunidades de Primeras Naciones que en otros canadienses para servicios equivalentes."
 indigenous.5.f: "El sistema de reservas se construyó para contener, no para apoyar."
 indigenous.5.a: "Aumento de la financiación federal para las comunidades de reserva"
 indigenous.5.b: "Mantener los niveles de financiación actuales - el presupuesto no permite más"

 # indigenous.6 — Reservation Economic Development (USA/CAN)
 indigenous.6.t: "Economic Development on Indigenous Lands"
 indigenous.6.d_usa: "Varias naciones tribales han propuesto iniciativas de desarrollo económico, como operaciones de juego, asociaciones de extracción de recursos y empresas turísticas, que generarían ingresos significativos para las comunidades de reservas. Las propuestas requieren la aprobación federal y la oposición de los gobiernos estatales adyacentes y los intereses comerciales que ven a las empresas tribales como competencia. Los líderes tribales argumentan que la autosuficiencia económica es el único camino sostenible de la pobreza."
 indigenous.6.d_can: "Las primeras comunidades de las Naciones Unidas en zonas ricas en recursos están tratando de negociar acuerdos de participación en los ingresos para la extracción de recursos en sus territorios tradicionales o cerca de ellos. Varias comunidades también han propuesto empresas conjuntas con gobiernos provinciales para la silvicultura y el desarrollo energético. Las propuestas ofrecen un camino hacia la autosuficiencia económica, pero requieren que el gobierno comparta el control y los ingresos que históricamente ha reclamado por completo."
 indigenous.6.f: "La soberanía sin base económica es una palabra vacía."
 indigenous.6.a: "Apoyo al desarrollo económico indígena - aprobar las propuestas"
 indigenous.6.b: "Priorizar los intereses existentes en materia de recursos, estas propuestas crean complicaciones"

 # indigenous.20 — Ipperwash
 indigenous.20.t: "La crisis de Ipperwash"
 indigenous.20.d: "Stoney Point Ojibwe protesters have occupied Ipperwash Provincial Park in Ontario, asserting that the land — including a Sacred enial ground — was unlawfully seized from their community during World War II for use as a military base and never returned as promised. La ocupación es pacífica, pero la Policía Provincial de Ontario ha establecido un perímetro y solicita orientación sobre cómo proceder. La situación es tensa. Hay armas entre los manifestantes. También hay ancianos, familias, y una queja legítima que ha sido desatendida durante cincuenta años."
 indigenous.20.f: "Se tomó un lugar de entierro. Nunca lo devolvieron."
 indigenous.20.a: "Ordene al OPP para dispersar la ocupación - restaurar el orden"
 indigenous.20.b: "Dirigir la OPP a ponerse de pie — negociar una resolución pacífica"

 # indigenous.21 — Last residential school
 indigenous.21.t: "La última escuela residencial cierra"
 indigenous.21.d: "Gordon Residential School in Punnichy, Saskatchewan ha cerrado sus puertas, la última escuela residencial india operada federalmente en Canadá. Desde 1874, el sistema de escuelas residenciales removió por la fuerza a unos 150.000 niños aborígenes de sus familias y los situó en instituciones donde se suprimió activamente el idioma, la cultura y la identidad indígenas, y donde se generalizaron los abusos físicos y sexuales. El cierre de la última escuela no es una resolución. Es un reconocimiento que un capítulo de destrucción cultural deliberada ha terminado finalmente, oficialmente,. Los sobrevivientes siguen viviendo con sus consecuencias."
 indigenous.21.f: "La última escuela ha cerrado. Las heridas que creó no lo han hecho."
 indigenous.21.a: "Un capítulo oscuro de la historia canadiense ha terminado"

 # indigenous.22 — TRC
 indigenous.22.t: "La Comisión de la Verdad y la Reconciliación informa"
 indigenous.22.d: "La Comisión de la Verdad y la Reconciliación del Canadá ha publicado su informe final: la culminación de seis años de testimonio de más de 6.500 sobrevivientes del sistema escolar indio. El informe documenta el abuso sistemático, el genocidio cultural y el trauma multigeneracional infligido por una política de asimilación forzada. La Comisión ha emitido 94 llamamientos a la acción: recomendaciones específicas en todas las esferas del bienestar infantil, la educación, el idioma, la salud y la justicia. El informe utiliza el término 'cifragio cultural' para describir lo que se hizo. El gobierno debe decidir ahora qué tan seriamente tomar el trabajo de la Comisión."
 indigenous.22.f: "La verdad es el primer paso. La reconciliación es obra de generaciones."
 indigenous.22.a: "Aceptar formalmente los llamamientos a la acción — comprometerse a la reconciliación"
 indigenous.22.b: "Reconocer el informe — revisar cuidadosamente los llamamientos a la acción"

 indigenous.10.t: "Un paso hacia la equidad"
 indigenous.10.d_usa: "La promulgación de leyes de acción afirmativa en los Estados Unidos constituye un paso importante hacia la lucha contra las desigualdades estructurales que enfrentan las comunidades indígenas americanas, junto con otros grupos históricamente marginados. No es una solución al alcance completo de la desposesión indígena, pero representa un compromiso significativo para cerrar las brechas que han persistido durante generaciones."
 indigenous.10.d_can: "El Canadá ha promulgado leyes de acción afirmativa, un reconocimiento oficial de que la desigualdad sistémica requiere un recurso sistémico. Para las comunidades de Primeras Naciones, Métis e Inuit, la medida es una pieza de un rompecabezas mucho mayor. Pero señala una voluntad política de tomar en serio la cuestión de la desventaja indígena y respaldar esa disposición con la política."
 indigenous.10.d_nzl: "Nueva Zelandia ha promulgado leyes de acción afirmativa, reconociendo que las disparidades entre los maoríes y los habitantes de Nueva Zelandia no son el producto del fracaso individual sino de la política histórica. Para las comunidades maoríes, es un paso significativo, aunque el Tribunal de Waitangi observa que muchas de sus recomendaciones siguen sin aplicarse."
 indigenous.10.d_ast: "Australia ha promulgado leyes de acción afirmativa, un importante cambio de política que reconoce la naturaleza estructural de la desventaja indígena. Para las comunidades aborígenes e isleñas del Estrecho de Torres, representa un progreso. La brecha en la esperanza de vida, los resultados de la salud y el logro educativo no cerrarán durante la noche, pero la dirección del viaje ha cambiado."
 indigenous.10.f: "El camino a la justicia es largo. Esto es un paso adelante."
 indigenous.10.a: "Es lo correcto"

 indigenous_land_settlement: "Land Rights Settlement"
 indigenous_land_settlement_desc: "Un acuerdo negociado sobre derechos de tierra ha mejorado las relaciones con las comunidades indígenas y ha mejorado la legitimidad del gobierno."

 indigenous_land_contested: "Land Rights Contested"
 indigenous_land_contested_desc: "The decision to contest Indigenous land rights in court has increased tensions with Indigenous communities."

 indigenous_treaty_honoured: "Obligaciones por tratados"
 indigenous_treaty_honoured_desc: "El pleno cumplimiento de las obligaciones convencionales ha fortalecido la legitimidad y mejorado la posición del gobierno con las comunidades indígenas."

 indigenous_treaty_partial: "Obligaciones de Tratados"
 indigenous_treaty_partial_desc: "El cumplimiento parcial de las obligaciones contraídas en virtud de tratados no ha satisfecho a los defensores de los derechos indígenas."

 indigenous_cultural_investment: "Indigenous Cultural Investment"
 indigenous_cultural_investment_desc: "La financiación gubernamental para los programas culturales y lingüísticos indígenas está apoyando la resiliencia comunitaria."

 indigenous_health_investment: "Indigenous Health Programs"
 indigenous_health_investment_desc: "Los programas de salud indígenas dedicados están mejorando los resultados de salud en las comunidades indígenas."

 indigenous_health_cost: "Costos del programa de salud indígena"
 indigenous_health_cost_desc: "Los nuevos programas de salud indígenas están exigiendo el presupuesto de salud."

 indigenous_health_neglect: "Negecto de salud indígena"
 indigenous_health_neglect_desc: "La falta de atención a las disparidades en materia de salud indígena está generando descontento permanente."

 indigenous_reservation_investment: "Reserva Community Investment"
 indigenous_reservation_investment_desc: "El aumento de la financiación federal para las comunidades de reserva está empezando a reducir la brecha en los niveles de vida."

 indigenous_reservation_cost: "Costos de financiación de reservas"
 indigenous_reservation_cost_desc: "El aumento de la financiación de la comunidad de reservas está agotando el presupuesto federal."

 indigenous_reservation_neglect: "Reserva Community Neglect"
 indigenous_reservation_neglect_desc: "La insuficiencia crónica de las comunidades de reserva sigue generando descontento y crítica internacional."

 indigenous_economic_development: "Indigenous Economic Development"
 indigenous_economic_development_desc: "El apoyo a las iniciativas de desarrollo económico indígena está generando ingresos para las comunidades y mejorando la autosuficiencia."

 indigenous_economic_blocked: "Desarrollo económico indígena bloqueado"
 indigenous_economic_blocked_desc: "El rechazo de las propuestas de desarrollo económico indígena ha dañado las relaciones con las comunidades de las Primeras Naciones."

 ipperwash_crackdown: "Ipperwash Crackdown"
 ipperwash_crackdown_desc: "La violenta dispersión de los manifestantes indígenas en Ipperwash ha generado importantes críticas nacionales e internacionales."

 ipperwash_negotiation: "Ipperwash Resolved Peacefully"
 ipperwash_negotiation_desc: "La resolución pacífica del enfrentamiento de Ipperwash ha mejorado la credibilidad del gobierno con las comunidades indígenas."

 indigenous_residential_school_closed: "Última escuela residencial cerrada"
 indigenous_residential_school_closed_desc: "El cierre de la última escuela residencial india marca el final formal de una política de destrucción cultural, aunque sus consecuencias perduran."

 trc_accepted: "La verdad y la reconciliación aceptadas"
 trc_accepted_desc: "La aceptación formal del Canadá de los llamamientos a la acción de la Comisión de la Verdad y la Reconciliación representa un compromiso significativo para abordar el legado de las escuelas residenciales."

 trc_enactment_bonus: "Mandato de reconciliación"
 trc_enactment_bonus_desc: "El impulso del proceso de la Verdad y Reconciliación facilita la aprobación de leyes relacionadas con los derechos indígenas."

 trc_partial: "TRC Agradecido"
 trc_partial_desc: "El gobierno ha reconocido el informe de la Comisión de la Verdad y la Reconciliación pero no se ha comprometido a implementar sus Llamamientos a la Acción."

 indigenous_rights_progress: "Legislación sobre derechos indígenas"
 indigenous_rights_progress_desc: "La promulgación de leyes de acción afirmativa representa un compromiso significativo para hacer frente a las desventajas indígenas. La brecha no cerrará durante la noche — pero la dirección política ha cambiado."


# japan

japan.1.t: "Fukushima Nuclear Disaster"
japan.1.d: "Tras un terremoto y tsunami masivos, la central nuclear de Fukushima Daiichi sufrió fallas catastróficas, liberando material radiactivo al medio ambiente. El desastre ha impactado al mundo, provocando debates mundiales sobre seguridad nuclear y preparación para emergencias."
japan.1.a: "Una tragedia nacional y una llamada global de despertar."

fukushima_nuclear_disaster: "Fukushima Nuclear Disaster"
fukushima_nuclear_disaster_desc: "Los graves daños causados a la planta de Fukushima Daiichi han provocado contaminación radiactiva, perturbación de la infraestructura y un esfuerzo de recuperación nacional a largo plazo."

# south sudan

southsudan.1.t: "South Sudanese Independence Referendum"
southsudan.1.d: "Tras decenios de conflicto y un referéndum decisivo, los estados del sur del Sudán se han visto obligados a formar la República de Sudán del Sur. El gobierno central de Jartum se enfrenta a una opción fatídica: aceptar la nueva nación o ir a la guerra para reclamarla."
southsudan.1.a: "No permitiremos que Sudán sea dividido."
southsudan.1.b: "Déjalos ir, por el bien de la paz."

# russia

first_chechen_war: "Primera Guerra de Chechenia"

russia_parliament_resisting: "Resistencia del Parlamento"
russia_military_loyality: "Complicidad militar"
russia_parliamentary_support: "Apoyo parlamentario"
russia_constitution_crisis_resolved_mod: "Crisis evitada"

je_russian_constitutional_crisis: "Crisis constitucional rusa"
je_russian_constitutional_crisis_reason: "El año 1993 ha llevado a Rusia al borde del colapso político. El Presidente Boris Yeltsin, que busca consolidar la autoridad ejecutiva, ha ordenado la disolución del Parlamento ruso, acusando a sus miembros de obstaculizar las reformas y resistir la democratización. El parlamento, a su vez, ha declarado inconstitucional el decreto de Yeltsin, negándose a disolver y reunir partidarios a su causa. Durante semanas, las tensiones aumentan a medida que las facciones rivales ganan el respaldo de diferentes elementos de las fuerzas militares, de seguridad y del público en general. El aparato gubernamental se fractura, con lealtad al poder ejecutivo o legislativo que determina el destino de la Federación de Rusia. Esta confrontación es más que una disputa política, es una batalla sobre la naturaleza misma de la gobernanza rusa en la era post-soviética. Si la crisis sale del control, la violencia civil en el corazón de Moscú no sólo es posible, sino inevitable."

je_russia_wild_nineties: "Los años 90"
je_russia_wild_nineties_reason: "El ‘Los años noventa salvajes’ (ruso: Лихие девяностые, Likhiye devyanostyye) es un término con una connotación evaluativa negativa, caracterizando el período del período de transición después del colapso de la Unión Soviética y la formación de la Federación de Rusia en los años noventa. id=0/principio indicadox id=1/ La turbulenta transición de Rusia del gobierno soviético a una democracia capitalista ha desencadenado una ola de inestabilidad, corrupción y violencia. Los primeros años post-soviéticos han sido marcados por el colapso económico, el aumento de los oligarcas, los enfrentamientos políticos y un aumento del crimen organizado. Desde el bombardeo del parlamento hasta los escándalos de privatización, cada mes parece traer nuevos levantamientos. El país se entremezcla entre la reforma y el caos, y la paciencia del pueblo se agota."

rus_events.0.t: "La crisis constitucional rusa de 1993 comienza"
rus_events.0.d: "El Presidente Boris Yeltsin ha emitido un decreto que disolve al Parlamento ruso, acusándolo de obstaculizar las reformas democráticas y amenazar la estabilidad de la Federación. El Parlamento ha declarado la iniciativa inconstitucional, pidiendo a los militares y ciudadanos que se resistan. El destino de la frágil democracia rusa ahora cuelga en el equilibrio."
rus_events.0.a: "La nación sostiene su aliento."

1993_russian_crisis_tt: "La crisis ha concluido"
rus_events.1.t: "La crisis constitucional"
rus_events.1.d: "El presidente Yeltsin ha anunciado la disolución del parlamento, pero los legisladores se niegan a retirarse, atrincherándose en la Casa Blanca. Las tensiones se están intensificando rápidamente."
rus_events.1.a: "Junto con el Presidente"
rus_events.1.a.tt: "Los militares apoyarán al ejecutivo."
rus_events.1.b: "Apoyo al Parlamento"
rus_events.1.b.tt: "Defenderemos la autoridad legislativa."

rus_events.2.t: "Military Backs the President"
rus_events.2.d: "Las fuerzas armadas han tomado el control de las calles, bombardeando el edificio del parlamento y asegurando la autoridad de Yeltsin."
rus_events.2.a: "La crisis ha terminado."

rus_events.3.t: "Victoria parlamentaria"
rus_events.3.d: "A pesar de la presión del ejecutivo, el Parlamento ha reunido el apoyo popular y ha mantenido su poder."
rus_events.3.a: "La crisis ha terminado."

rus_events.4.t: "Tormenta de la Casa Blanca"
rus_events.4.d: "Moscú está en caos. Las tropas pro-presidenciales han rodeado la Casa Blanca rusa, hogar de la dirección del parlamento, y han abierto fuego con tanques y armas pequeñas. Los billows de humo de los pisos superiores mientras el edificio está en llamas. La resistencia final se derrumba a medida que las fuerzas militares asumen el control, marcando el final de la desposección, pero a costa de vidas y la inocencia política del país."
rus_events.4.a: "El orden es restaurado, por ahora."

# chechnya

je_first_chechen_war_reason: "La Primera Guerra de Chechenia comenzó a finales de 1994 cuando la Federación de Rusia trató de recuperar el control sobre la expoliada República de Chechenia de Ichkeria. El conflicto resultaría costoso en vidas y recursos, con feroz combate urbano en Grozny y devastación generalizada en el Cáucaso Norte. Terminar la guerra sin una victoria clara podría dañar la credibilidad del gobierno, pero continuar la lucha arriesga la inestabilidad prolongada."
je_first_chechen_war: "Chechen War"
chechen_war_resolved: "Chechen War Resolved"

chechen_events.1.t: "Guerra en Chechenia"
chechen_events.1.d: "Las fuerzas rusas han entrado en Chechenia para restaurar el control federal, comenzando lo que se espera sea una operación rápida. Sin embargo, el terreno montañoso y la resistencia local determinada podrían convertirlo en un conflicto prolongado."
chechen_events.1.a: "Restituiremos el orden."

chechen_events.2.t: "Asalto a Grozny"
chechen_events.2.d: "La batalla de Grozny ha comenzado, con fuerzas rusas que intentan apoderarse de la capital chechena. Los combates son intensos, con fuertes bajas en ambas partes."
chechen_events.2.a: "Presiona hacia adelante, no importa el costo."

chechen_events.3.t: "Conferencias de Paz en Chechenia"
chechen_events.3.d: "Después de meses de combate, el cansancio de guerra ha crecido en ambos lados. Se ha puesto sobre la mesa una propuesta de cesación del fuego que ofrece un fin al derramamiento de sangre."
chechen_events.3.a: "Acepta la paz y retira fuerzas."
chechen_events.3.b: "Continuar la guerra hasta la victoria."

# haiti

uphold_democracy: "Operación Defendiendo la democracia"

haiti_events.1.t: "Operación Defendiendo la democracia"
haiti_events.1.d: "En septiembre de 1994, los Estados Unidos iniciaron una intervención militar en Haití para restaurar el Presidente democráticamente elegido Jean-Bertrand Aristide, derrocado en un golpe de Estado de 1991. Las fuerzas estadounidenses, apoyadas por aliados internacionales, aseguraron áreas clave, allanando el camino para el regreso de Aristide."
haiti_events.1.a: "Despliegue fuerzas para restaurar la democracia."
haiti_events.1.b: "Nos prepararemos para tropas extranjeras."

haiti_events.2.t: "Llegaron tropas extranjeras"
haiti_events.2.d: "Las fuerzas estadounidenses han aterrizado en Haití, controlando lugares estratégicos. La intervención se justifica como un medio para restaurar la gobernanza democrática, pero plantea preguntas sobre soberanía e influencia extranjera."
haiti_events.2.a: "Debemos cooperar para evitar el derramamiento de sangre."

je_haiti_political_crisis: "Crisis política haitiana"
je_haiti_political_crisis_reason: "Tras la elección democrática del Presidente Jean-Bertrand Aristide en 1990, Haití experimentó un breve momento de optimismo. Sin embargo, la frágil estabilidad se rompió en septiembre de 1991 cuando un golpe militar derrocó a Aristide, sumergiendo al país en el caos político. El régimen militar se enfrenta a la condena internacional, ya que los abusos de los derechos humanos y la represión política se han generalizado. Las sanciones económicas impuestas por las Naciones Unidas y la Organización de los Estados Americanos afectaron gravemente a la economía ya en lucha de Haití. A lo largo de 1992 y 1993, las negociaciones entre la junta militar y los partidarios de Aristide faltaron, mientras que la violencia contra los opositores políticos y la población general se intensificó. Los intentos de la Misión de las Naciones Unidas en Haití (UNMIH) de restablecer la gobernanza democrática se reunieron con obstrucción. En 1994, la creciente presión de la comunidad internacional, en particular de los Estados Unidos, estableció el escenario para la intervención directa. Operación Defender la democracia, dirigida por las fuerzas estadounidenses en septiembre de 1994, con el objetivo de restaurar a Aristide al poder y poner fin a la regla de la junta."

# quebec
# [GetPlayer.MakeScope.GetVariable('quebec_happiness_var').GetValue|0]

je_quebec_happiness: "Situación de Quebec"
je_quebec_happiness_reason: "El estado de Quebec dentro del Canadá ha sido una cuestión contenciosa durante décadas. La cultura, el lenguaje y la historia de Quebec han alimentado con frecuencia debates sobre la autonomía y la independencia. En los años previos al referéndum de Quebec de 1995, la relación entre Quebec y el gobierno federal de Canadá se ha caracterizado por la tensión, la negociación y la ocasional aparición de sentimientos nacionalistas. La provincia de Quebec, con su singular mayoría de habla francesa, identidad cultural distinta y larga historia de abogar por la autonomía, ha tratado periódicamente de redefinir su lugar dentro de la federación canadiense. Algunos Quebecois desean la independencia completa, otros desean aumentar las potencias provinciales, mientras que muchos todavía apoyan permanecer en un Canadá unificado.Seguido id=4/ títulox id=5/ títuloAs Primer Ministro, su tarea es navegar por esta delicada situación. Usted debe equilibrar la unidad nacional con respeto a las aspiraciones culturales y políticas de Quebec. Cada decisión que tomes, ya sea en las leyes lingüísticas, la política económica o la inversión cultural, influirá en la felicidad de la población de Quebec. Si la puntuación de la Felicidad de Quebec sigue siendo alta, el referéndum puede terminar con un voto para permanecer en Canadá. Pero si el descontento crece demasiado fuerte, el pueblo de Quebec puede votar por la independencia, alterando para siempre el mapa de América del Norte."
quebec_happiness_bar_desc: "Franco-Canadian Happiness"
quebec_happiness_monthly_tt: "Cambio mensual en la felicidad de Quebec."
quebec_happiness_bar:0 "Apoyo a la Independencia de Quebec"
recently_pissed_quebec_off:0 "No recientemente enojó a Quebec"

