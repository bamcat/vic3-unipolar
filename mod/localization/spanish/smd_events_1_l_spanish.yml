 io_accession_events.1.t:0 "CEE Adhesión completada"
 io_accession_events.1.d:0 "Nuestras reformas han satisfecho los requisitos para ser miembro de la CEE. Hemos entrado en el marco económico europeo."
 io_accession_events.1.a:0 "Únete al EEC."

 io_accession_events.2.t:0 "Adhesión de la UE"
 io_accession_events.2.d:0 "Nuestro proceso de adhesión está completo. Nos hemos unido a la Unión Europea y hemos entrado en su marco político y económico."
 io_accession_events.2.a:0 "Únase a la Unión Europea."

 io_accession_events.3.t:0 "EEC Accession Halted"
 io_accession_events.3.d:0 "El proceso de adhesión a la CEE se ha colapsado después de que nuestro gobierno se haya alejado de los estándares democráticos."
 io_accession_events.3.a:0 "El proceso ha terminado."

 io_accession_events.4.t:0 "Adhesión de la UE"
 io_accession_events.4.d:0 "El proceso de adhesión a la UE se ha colapsado después de que nuestro gobierno se haya alejado de las normas democráticas."
 io_accession_events.4.a:0 "El proceso ha terminado."

 io_accession_events.10.t:0 "Expulsión de la OTAN"
 io_accession_events.10.d:0 "Nuestra aprobación de leyes autoritarias ha hecho imposible la pertenencia a la OTAN. La alianza nos ha expulsado y nuestros pactos defensivos con sus miembros han sido retirados."
 io_accession_events.10.a:0 "Estamos solos."

 io_accession_events.11.t:0 "Expeled from the EEC"
 io_accession_events.11.d:0 "Nuestra aprobación de leyes autoritarias ha violado las expectativas políticas de la cooperación europea. Nos han expulsado de la CEE."
 io_accession_events.11.a:0 "Así sea."

 io_accession_events.12.t:0 "Expulsión de la Unión Europea"
 io_accession_events.12.d:0 "Nuestra aprobación de leyes autoritarias ha violado las normas democráticas de la Unión Europea. Nos han expulsado de la Unión."
 io_accession_events.12.a:0 "La Unión se aleja."

 io_accession_events.13.t:0 "Expelled from the G7"
 io_accession_events.13.d:0 "Nuestra aprobación de leyes autoritarias ha hecho que la pertenencia al G7 sea políticamente inaceptable. Nos han quitado del grupo."
 io_accession_events.13.a:0 "Un revés diplomático."

 io_accession_events.20.t:0 "Advertencia de los estándares democráticos de la OTAN"
 io_accession_events.20.d:0 "Nuestro gobierno ha adoptado leyes autoritarias. Si estas leyes siguen vigentes, se revocará la adhesión de la OTAN durante el próximo examen."
 io_accession_events.20.a:0 "Nos han advertido."

 io_accession_events.21.t:0 "Advertencia de estándares democráticos EEC"
 io_accession_events.21.d:0 "Nuestro gobierno ha adoptado leyes autoritarias. Si estas leyes permanecen vigentes, la composición de la CEE será revocada durante el próximo examen."
 io_accession_events.21.a:0 "Nos han advertido."

 io_accession_events.22.t:0 "EU Democratic Standards Advertencia"
 io_accession_events.22.d:0 "Nuestro gobierno ha adoptado leyes autoritarias. Si estas leyes siguen vigentes, se revocará la adhesión de la UE durante el próximo examen."
 io_accession_events.22.a:0 "Nos han advertido."

 io_accession_events.23.t:0 "G7 Democratic Standards Advertencia"
 io_accession_events.23.d:0 "Nuestro gobierno ha adoptado leyes autoritarias. Si estas leyes siguen vigentes, se revocará la composición del G7 durante el próximo examen."
 io_accession_events.23.a:0 "Nos han advertido."

 io_democratic_standards_warning:0 "Advertencia de normas democráticas"
 io_democratic_standards_warning_desc:0 "Este país ha sido advertido de que sus leyes autoritarias pueden amenazar la pertenencia a organizaciones internacionales democráticas."

 io_expelled_from_democratic_org:0 "Expeled from Democratic Organization"
 io_expelled_from_democratic_org_desc:0 "Este país ha sido expulsado de una organización internacional después de adoptar leyes autoritarias."
 
 intifada_2005.1.t:0 "Los vientos de la segunda intifada bajan"
 intifada_2005.1.d:0 "Después de años de violencia sostenida, agotamiento, medidas de seguridad, presión diplomática y cambio político han puesto fin al levantamiento."
 intifada_2005.1.f:0 "El conflicto no se resuelve, pero la fase de intifada abierta ha terminado. Una cesación del fuego deja a ambas partes asustadas, sospechosas e inciertas de lo que sigue."
 intifada_2005.1.a:0 "Acepta una paz blanca."

 intifada_2005.2.t:0 "Los vientos de la segunda intifada bajan"
 intifada_2005.2.d:0 "La lucha ha disminuido, y el levantamiento ha entrado en una nueva fase más tranquila."
 intifada_2005.2.f:0 "No se ha llegado a un acuerdo final, pero la escalada se ha quemado."
 intifada_2005.2.a:0 "La lucha continúa por otros medios."

 intifada_2005_ceasefire:0 "Second Intifada Ceasefire"
 intifada_2005_ceasefire_desc:0 "La fase abierta de la Segunda Intifada ha terminado en una frágil cesación del fuego."
 
 arab_spring_jihadist_breakaways.1.t:0 "The Islamic State Emerges"
 arab_spring_jihadist_breakaways.1.d:0 "El caos de la revolución y el colapso estatal ha permitido a las fuerzas yihadistas consolidar territorio bajo la bandera del Estado Islámico."
 arab_spring_jihadist_breakaways.1.f:0 "El viejo estado lucha contra la revolución. La revolución lucha contra el viejo estado. En las ruinas entre ellos, una tercera fuerza levanta su bandera."
 arab_spring_jihadist_breakaways.1.a:0 "Se abre un nuevo frente."

 arab_spring_jihadist_breakaways.2.t:0 "Jihadist Enclaves Emerge"
 arab_spring_jihadist_breakaways.2.d:0 "A medida que la Primavera Árabe desestabiliza la región, las células yihadistas han incautado territorio dispersa y declarado lealtad al Estado Islámico."
 arab_spring_jihadist_breakaways.2.f:0 "Cuando el Estado se retira, las redes armadas se convierten en administraciones."
 arab_spring_jihadist_breakaways.2.a:0 "La crisis se extiende."

 arab_spring_jihadist_breakaways.3.t:0 "The Houthis Seize Territory"
 arab_spring_jihadist_breakaways.3.d:0 "La revolución yemení ha fracturado el país, permitiendo al movimiento de Houthi apoderarse del territorio y movilizar sus propias fuerzas."
 arab_spring_jihadist_breakaways.3.f:0 "El levantamiento no produjo una oposición, sino muchos."
 arab_spring_jihadist_breakaways.3.a:0 "Yemen espinas."

