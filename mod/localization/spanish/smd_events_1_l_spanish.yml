 # Status descs — mani pulite
 je_mani_pulite_early_tt: "La investigación está dando impulso. El equipo de Di Pietro está trabajando a través de la evidencia. La clase política aún no ha organizado una respuesta coherente."
 je_mani_pulite_winning_tt: "id=0/ La investigación está ganando. Los magistrados están por delante de la resistencia. Los nombres están cayendo más rápido de lo que el sistema puede contenerlos."
 je_mani_pulite_stalemate_tt: "id=0/ La investigación y la resistencia política coinciden uniformemente. El resultado depende de los próximos movimientos."
 je_mani_pulite_suppressed_tt: "id=0/(s) La resistencia política está ganando la mano superior. El sistema está organizando. La investigación puede ser enterrada antes de que llegue a su conclusión."

