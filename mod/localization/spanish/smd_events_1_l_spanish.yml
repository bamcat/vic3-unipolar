#################### JE ####################
# The Internet

je_internet:0 "Internet"
je_internet_reason:0 "¡Es hora de conectar nuestro país a Internet! Debemos mejorar nuestra red de telecomunicaciones más allá de apoyar el simple tráfico telefónico, y finalmente presentar a nuestros ciudadanos a las maravillas de la World Wide Web!"

smd_tech.1.t:0 "id=0/% Goes Online"
smd_tech.1.d:0 "Durante décadas, nuestras comunicaciones se han basado en periódicos, radio y televisión. Pero una revolución silenciosa está barriendo el mundo, una vasta red de ordenadores interconectados conocidos como Internet. Una vez que el dominio de académicos e investigadores militares, ahora promete cambiar cómo nuestros ciudadanos trabajan, aprenden y conectan."
smd_tech.1.f:0 "Internet: porque nada dice 'alta tecnología' como sondeos gritando y esperando 5 minutos para cargar una foto de un gato."

smd_tech.1.a:0 "¡Quizás otras tecnologías deberían conectarse a la web también!"
smd_tech.1.b:0 "Podríamos utilizar los interwebs para ejercer control sobre la opinión pública"

government_run_wifi_modifier:0 "Government Interference in Wifi"

# Computer Science

je_computer_science:0 "Computer Science"
je_computer_science_reason:0 "La informática es el estudio de cómo funcionan las computadoras, cómo se pueden hacer para resolver problemas, y cómo podemos utilizarlos de manera eficiente y segura."

smd_tech.2.t:0 "Grados en Ciencias de la Computación"
smd_tech.2.d:0 "Imagínese como la ciencia de pensar lógicamente y resolver problemas — pero con máquinas que obedecen cada pequeña instrucción. Es tanto abstracto como práctico, y potencia casi todas las tecnologías modernas que nos rodean, desde teléfonos inteligentes a autoconducir coches."

# Pesticides

je_pesticides:0 "Herbicidas"
je_pesticides_reason:0 "Los plaguicidas son sustancias que se utilizan para controlar las plagas. Incluyen herbicidas, insecticidas, nematicidas, fungicidas y muchos otros. Los más comunes son los herbicidas, que representan aproximadamente el 50% de todos los plaguicidas utilizados a nivel mundial. Con esta nueva invención, nos enfrentamos al deber de modernizar nuestro sector agrícola de incluir pesticidas."

smd_tech.3.t:0 "Un mar de mortíferos"
smd_tech.3.d:0 "Durante milenios, los insectos &quot; roedores &quot; han sido una amenaza incansable para la actividad agrícola humana. Con la reciente invención de varios productos químicos seguros de alimentos que repelen y matan insectos dañinos, podemos producir cosechas más abundantes, asegurando una mayor seguridad alimentaria de una vez por todas!"

smd_tech.3.a:0 "Probablemente sería mejor si hicieran menos daño ambiental..."

# Globalization

je_globalization:0 "Globalización"
je_globalization_reason:0 "La globalización es un fenómeno a finales del siglo XX definido por una mayor interconexión, el libre tránsito de la cultura, los bienes, las armas y las personas, cada uno de ellos provocado por mayores iniciativas de libre comercio en todo el mundo."

je_asian_economic_reform: "Reforma económica"
je_asian_economic_reform_reason: "China e India han estado obligados desde hace mucho tiempo por restricciones económicas. La economía mundial avanza rápidamente hacia la integración y el libre comercio. Al eliminar las restricciones obsoletas, podemos generar un crecimiento sin precedentes. Hasta entonces, nuestros mercados siguen siendo limitados."

asian_economy_restrictions: "Restricciones económicas"
asian_economy_restrictions_desc: "Las deficiencias controladas por el Estado y las barreras proteccionistas frenan el comercio, reduciendo la competitividad y el acceso internacional."

booming_trade_economy: "Booming Trade Economy"
booming_trade_economy_desc: "Con las restricciones levantadas, los mercados extranjeros y nacionales florecen, lo que conduce a una mayor prosperidad."

asia_reform.1.t: "Los mercados abren"
asia_reform.1.d: "Se han promulgado las reformas y se han eliminado las políticas comerciales restrictivas. China y la India están ahora a la vanguardia de la globalización económica."
asia_reform.1.f: "“Debemos abrir nuestros mercados, porque el aislamiento ya no es sostenible”."
asia_reform.1.a: "Comienza una nueva era de comercio."

# Starship

je_starships:0 "Naves espaciales"
je_starships_reason:0 "La invención del cohete reutilizable ha estimulado rápidamente la invención de otro tipo de nave espacial, la nave estelar. Capaz de violar eficazmente las barreras interplanetarias, aterrizar en marte y regresar a la tierra, mientras mantiene a los astronautas en una salud estable, es un nuevo diseño revolucionario que merece nuestro reconocimiento."

# coming soon

################ others ###########

# Cancer

cancer.1.t:0 "La cura para el cáncer"
cancer.1.d:0 "Durante más de un siglo, el cáncer ha perseguido a la humanidad, una aflicción impredecible que reclamó millones y eludió cada cura. No conocía fronteras, no respetaba el estatus y dejaba devastación en cada familia que tocaba. Pero hoy, después de años de investigación implacable, ensayos clínicos y colaboración internacional, los científicos han hecho lo imposible: desarrollar una cura universal y dirigida. Esta terapia innovadora detecta y destruye células malignas sin dañar el tejido sano, haciendo la remisión no sólo posible, sino garantizado."
cancer.1.a:0 "Un triunfo para toda la humanidad."
cancer_eradication_prestige:0 "Cáncer borrado"

# 2004 Indian Ocean earthquake and tsunami

indian_ocean_tsunami.1.t: "El terremoto desencadena el Océano Índico"
indian_ocean_tsunami.1.d: "Un terremoto masivo de submarinos ha desencadenado un tsunami catastrófico, devastadoras regiones costeras de todo el Asia meridional y sudoriental. El daño no tiene precedentes, y la recuperación llevará años."
indian_ocean_tsunami.1.a: "Debemos comenzar a reconstruir inmediatamente."
indian_ocean_tsunami.1.f: "En uno de los peores desastres registrados, un devastador terremoto ha destruido nuestras regiones costeras"

je_indian_ocean_tsunami: "Recuperación de Tsunami"
je_indian_ocean_tsunami_reason: "Un tsunami devastador ha dañado su infraestructura costera y ha sacudido al país. Los esfuerzos de reconstrucción son cruciales para la recuperación y la estabilidad."

tsunami_recovery_success_tt: "Has iniciado exitosamente la recuperación nacional."

tsunami_disaster_struck: "Daño del tsunami en todo el país"
tsunami_local_destruction: "Devastación local de Tsunami"
tsunami_reconstruction_complete: "Reconstrucción completa"
  
indian_ocean_tsunami_recovery_title: "Tsunami Recovery Efforts"
indian_ocean_tsunami_recovery_desc: "Su país ha sido golpeado por el tsunami del Océano Índico. Implementar ayuda y recuperación para estabilizar su población e infraestructura."

tsunami_aid_title: "Proporcionar ayuda humanitaria"
tsunami_aid_desc: "Realizar reformas sociales o asignar ayuda financiera para ayudar a reconstruir las zonas afectadas."

tsunami_disaster_struck: "Daño del tsunami en todo el país"
tsunami_local_destruction: "Devastación local de Tsunami"
tsunami_reconstruction_complete: "Éxito esfuerzo de reconstrucción"
tsunami_recovery_success_tt: "El país ha promulgado una ley de bienestar social antes de diciembre de 2005."
 
indian_ocean_tsunami.2.t: "Tsunami Devastates South Asia"
indian_ocean_tsunami.2.d: "Un terremoto y tsunami masivos han golpeado el Océano Índico. La catástrofe humanitaria se desploma. El mundo mira: ¿actuaremos?"
indian_ocean_tsunami.2.f: "Las costas enteras han desaparecido. Se necesita ayuda urgentemente."
indian_ocean_tsunami.2.a: "Envía ayuda de emergencia."
indian_ocean_tsunami.2.b: "Tenemos nuestras propias prioridades."

indian_ocean_tsunami.3.t: "Ayuda recibida"
indian_ocean_tsunami.3.d: "Una nación extranjera ha enviado socorro humanitario. Tu gente está agradecido."
indian_ocean_tsunami.3.a: "Gracias a Dios por la solidaridad global."

tsunami_foreign_aid_sent: "Enviados de ayuda extranjera a víctimas del tsunami"
countries_available_to_request_aid_from:0 "Los países pueden solicitar ayuda"
has_sent_iosa:0 "Ya ha enviado ayuda"

je_request_iosa_aid_button:0 "Solicitud de ayuda internacional"
je_request_iosa_aid_button_desc:0 "Solicitar ayuda de la comunidad internacional para ayudar a recuperarse del devastador terremoto y tsunami."

tsunami_disaster_struck: "Afectado por el tsunami del Océano Índico 2004"

# Iraq disarmament Crisis

je_iraq_disarmament_crisis: "Crisis de desarme de Iraq"
je_iraq_disarmament_crisis_reason: "Tras la guerra del Golfo, el Iraq estaba obligado por la resolución 687 del Consejo de Seguridad de las Naciones Unidas a desmantelar sus programas de armas de destrucción en masa. La comunidad internacional, a través de la UNSCOM y el OIEA, trató de verificar el cumplimiento, pero la obstrucción y disputas del Iraq sobre las inspecciones han creado un punto de vista prolongado. La crisis amenaza con reinar el conflicto a medida que crecen las tensiones sobre la negativa del Iraq a cooperar plenamente con el régimen de desarme."
iraq_disarmament_resolved_tt: "Se ha resuelto la crisis de desarme iraquí."

je_us_iraq_disarmament: "Crisis de desarme de Iraq"
je_us_iraq_disarmament_reason: "Los Estados Unidos se han comprometido a hacer cumplir la resolución 687 del Consejo de Seguridad de las Naciones Unidas. La obstrucción reiterada de las inspecciones de la UNSCOM y el OIEA socava la seguridad mundial y alimenta las tensiones en la región del Golfo. Continúan los esfuerzos diplomáticos, pero las opciones militares permanecen sobre la mesa si las inspecciones fracasan."

iraq_events.10.t: "Iraq rechaza aeronaves de la UNSCOM"
iraq_events.10.d: "En un audaz desafío a la Comisión Especial de las Naciones Unidas (UNSCOM), el Iraq ha rechazado propuestas para que los inspectores utilicen sus propios aviones para entrar en el país. Bagdad insiste en el pleno control del acceso y el transporte, suscitando nuevas preocupaciones sobre su compromiso con el desarme."
iraq_events.10.a: "Rechazar sus términos — la soberanía de Irak viene primero."
iraq_events.10.b: "Permitir los vuelos: la cooperación puede aliviar las tensiones."

us_events.10.t: "Aviones de la UNSCOM"
us_events.10.d: "El Iraq se ha negado a permitir que los inspectores de la UNSCOM vuelen sus propios aviones al país, lo que dificulta aún más las actividades de inspección. Esta medida se considera un acto directo de desafío hacia la ONU y un revés para los esfuerzos de desarme."
us_events.10.a: "Esto no puede ir sin respuesta."
us_events.10.b: "Evite la escalada, por ahora."

################# COUNTRY-SPECIFIC ##############

# united states

rodney.1.t:0 "Policía golpeando a Rodney King"
rodney.1.d:0 "Un afroamericano desarmado, Rodney King fue golpeado violentamente por oficiales del Departamento de Policía de Los Ángeles después de una persecución de alta velocidad. Un espectador filmó el asalto, exponiendo brutalidad policial y provocando indignación nacional."
rodney.1.f:0 "Lo rodearon y lo golpearon con bastones. No estaba luchando. Era horripilante, como si quisieran hacer un ejemplo de él."

rodney.1.a:0 "Va a ser un verano caliente .."

rodney.2.t:0 "Ríos en Los Ángeles"
rodney.2.d:0 "A raíz de los policías acusados de usar la fuerza excesiva en la paliza de Rodney King siendo acuñados, vastos grupos de personas han tomado las calles, causando más de 1.000 millones de dólares en daños a la ciudad"
los_angeles_riots:0 "Rodney King Riots"
rodney.2.a:0 "Se establecerán solos."
rodney.2.b:0 "¡Envíen a la Guardia Nacional!"

north_hollywood.1.t: "Disparos en North Hollywood"
north_hollywood.1.d: "Dos ladrones estaban revestidos en armadura corporal y llevaban rifles de asalto. Los oficiales armados tenían que pedir prestados armas de una tienda local de armas para responder con eficacia."
north_hollywood.1.f: "Two heavily armed bank robbers engaged in a lengthy shootout with Los Angeles police, wounding several officers and civilians. The incident has shocked the nation and raised questions about police preparedness."
north_hollywood.1.a: "Un día frío en la historia de las fuerzas del orden."

north_hollywood_police_response:0 "Mayor apoyo a la aplicación de la ley"

wtc_bombing.1.t: "1993 World Trade Center Bombing"
wtc_bombing.1.d: "Una poderosa bomba de camiones ha explotado bajo la Torre Norte del World Trade Center en Nueva York, matando a seis personas e hiriendo a más de mil. El ataque ha impactado a la nación, revelando vulnerabilidades al terrorismo dentro de sus propias fronteras."
wtc_bombing.1.a: "Aumentar las medidas de seguridad nacional."
wtc_bombing.1.b: "Mantenga la calma y evite la exageración."
heightened_security_measures: "Medidas de seguridad más estrictas"
heightened_security_measures_desc: "En respuesta a un ataque terrorista, el Gobierno ha aplicado políticas internas de seguridad más sólidas y coordinación de las fuerzas del orden."
oklahoma_city_aftermath: "Oklahoma City Bombing Aftermath"
oklahoma_city_aftermath_desc: "El devastador bombardeo del edificio federal Alfred P. Murrah ha dejado a la nación sacudida. Las preocupaciones en materia de seguridad y las repercusiones políticas se ensalzan mientras el gobierno endurece su vigilancia interna."
 
usa_events.1.t: "Resultados primarios republicanos"
usa_events.1.d: "Después de una temporada primaria calentada llena de debates y campañas, el Partido Republicano ha elegido su nuevo portador estándar. George W. Bush ha surgido victorioso, tomando las riendas de la Petite Bourgeoisie y prometiendo un nuevo capítulo audaz para el partido."
usa_events.1.a: "La nominación es suya."

usa_events.2.t: "La nominación de Barack Obama"
usa_events.2.d: "Después de una temporada primaria calentada llena de debates y campañas, el Partido Demócrata ha elegido su nuevo portador estándar. Barack Hussein Obama ha surgido victorioso, tomando las riendas de la Petite Bourgeoisie y prometiendo un nuevo capítulo audaz para el partido."
usa_events.2.a: "La nominación es suya."

usa_events.3.t: "La Nominación de Donald Trump"
usa_events.3.d: "Después de una temporada primaria calentada llena de debates y campañas, el Partido Republicano ha elegido su nuevo portador estándar. Donald John Trump, una figura particularmente controvertida, ha surgido victorioso, tomando las riendas de los profesionales y prometiendo un nuevo capítulo audaz para el partido."
usa_events.3.a: "La nominación es suya."

# Storm of the Century
american_disasters.1.t: "1993 Storm of the Century"
american_disasters.1.d: "Una tormenta ciclónica masiva ha barrido por todo el este de Estados Unidos, trayendo nieve récord, vientos de fuerza huracana y inundaciones severas a lo largo de las costas. Millones quedan sin poder, y el número de muertos aumenta diariamente."
american_disasters.1.a: "Debemos soportar la ira del invierno."

# Great Flood of 1993
american_disasters.2.t: "¡El Gran Diluvio!"
american_disasters.2.d: "Semanas de lluvias pesadas y suelos saturados han hecho que los ríos Mississippi y Missouri se hinchen mucho más allá de sus bancos, sumergiendo vastas áreas del Medio Oeste Americano. Las ciudades enteras están bajo el agua, y el daño es sin precedentes."
american_disasters.2.a: "Un desastre para el corazón."

great_flood_of_1993: "Gran Diluvio de 1993"
storm_of_the_century: "1993 Storm of the Century"

# Columbine

columbine.1.t: "Colorado High School Massacre"
columbine.1.d: "Dos estudiantes fuertemente armados han llevado a cabo un ataque mortal en Columbine High School en Colorado, matando e hiriendo a muchos antes de tomar su propia vida. El evento ha provocado dolor y debate en todo el país sobre control de armas, seguridad escolar e influencias culturales."
columbine.1.a: "Pensamientos &quot; oraciones"
columbine.1.b: "Debemos aumentar la seguridad en las escuelas de todo nuestro país."

national_mourning_school_shooting: "Mourning School Shooting"
school_security_measures: "Medidas de seguridad escolar"

better_school_security: "Mejor seguridad escolar"
thoughts_and_prayers: "Pensamientos &quot; Oraciones"
recent_mass_shooting: "Disparos en masa recientes"

# September 11 Attacks 

ground_zero: "Tierra cero"
  
je_war_on_terror: "Guerra contra el terrorismo"
je_war_on_terror_reason: "Los ataques terroristas del 11 de septiembre de 2001 contra Estados Unidos marcaron el comienzo de una campaña mundial sostenida contra el terrorismo. Después de los ataques, Estados Unidos lanzó lo que llamó "Guerra contra el Terrorismo", una estrategia amplia que combina operaciones militares, esfuerzos de inteligencia y medidas de seguridad nacional. Las consecuencias reestructuran la política exterior, los debates sobre las libertades civiles y las alianzas internacionales."

usa_wot.1.t: "América bajo ataque"
usa_wot.1.d: "Los ataques terroristas coordinados golpearon la ciudad de Nueva York y Washington, D.C., destruyendo las torres del World Trade Center y dañando gravemente al Pentágono. Miles han sido asesinados o heridos. La nación está en shock y exige una respuesta."
usa_wot.1.a: "Un día que vivirá en la infamia."

usa_wot.2.t: "Una guerra contra el terrorismo"
usa_wot.2.d: "Tras los ataques, el Presidente ha anunciado una campaña mundial contra quienes planifican, apoyan o albergan organizaciones terroristas. Esta declaración dará lugar al aumento de las medidas de seguridad en el país y los compromisos militares en el extranjero."
usa_wot.2.a: "Los llevaremos a la justicia."

global_wot.1.t: "Estados Unidos atacó; miles de muertos"
global_wot.1.d: "Los Estados Unidos han sufrido ataques terroristas devastadores. Los líderes mundiales han ofrecido condolencias y muchos estados están reconsiderando sus acuerdos de seguridad."
global_wot.1.a: "Una tragedia para toda la humanidad."

global_wot.2.t: "Estados Unidos declara guerra contra el terrorismo"
global_wot.2.d: "Tras los atentados del 11 de septiembre, Estados Unidos ha declarado una "guerra contra el terrorismo" global, exhortando a la comunidad internacional a unirse a una campaña contra grupos terroristas y sus partidarios."
global_wot.2.a: "El orden internacional cambia."

global_wot.3.t: "Estados Unidos invoca el artículo 5"
global_wot.3.d: "Tras los ataques del 11 de septiembre y la posterior campaña militar estadounidense en Afganistán, el Artículo 5 de la Carta de la OTAN ha sido invocado por primera vez en la historia. Como Estado miembro, estamos siendo llamados a unirse al esfuerzo de guerra."
global_wot.3.a: "Estamos con nuestros aliados."

usa_wot.3.t: "Ataques de ántrax aterrorizan América"
usa_wot.3.d: "En las semanas posteriores a los ataques del 11 de septiembre, cartas anónimas que contenían esporas mortales de ántrax fueron enviadas a organizaciones de noticias y senadores estadounidenses. Los ataques sembraron el miedo en todo el país, provocaron investigaciones masivas y aumentaron las preocupaciones sobre la guerra biológica."
usa_wot.3.a: "La justicia será entregada. Y será rápido."
usa_wot.3.b: "¡Otra vez no!"
  
je_hunt_for_bin_laden: "La caza de Osama Bin Laden"
je_hunt_for_bin_laden_reason: "A raíz de los ataques del 11 de septiembre de 2001, Estados Unidos ha lanzado una extensa &quot; búsqueda mundial de Osama bin Laden, líder de al-Qaeda. Esta misión se extenderá a través de las fronteras, involucrando operaciones militares, reunión de inteligencia y presión diplomática."
intensified_intelligence_operations: "La caza de Osama Bin Laden"

hunt_bin_laden_progress_bar: "Progresos en la caza"
hunt_bin_laden_progress_bar_desc: "Progresos en la búsqueda"
osama_bar_completed: "Osama Bin Laden ha sido encontrada"

usa_wot.10.t: "La caza de Osama Bin Laden"
usa_wot.10.d: "Con la guerra contra el terrorismo en curso, agencias de inteligencia y fuerzas especiales de Estados Unidos han comenzado una búsqueda mundial de Osama bin Laden. Las decisiones ahora determinarán la intensidad y el alcance de la operación."
usa_wot.10.a: "Comprobar todos los recursos necesarios."
usa_wot.10.b: "Centrarse en otras prioridades."

usa_wot.12.t: "Bin Laden Captured"
usa_wot.12.d: "Después de años de persecución, Osama bin Laden ha sido localizado y neutralizado. Estados Unidos celebra una importante victoria en la guerra contra el terrorismo."
usa_wot.12.a: "Se ha servido a la justicia."

usa_wot.11.t: "Estados Unidos mata a Bin Laden"
usa_wot.11.d: "Después de meses de reunión y preparación de inteligencia, US Navy SEALs lanzó una atrevida redada en un complejo en Abbottabad, Pakistán. El objetivo: capturar o matar a Osama Bin Laden. El mundo espera el resultado."

usa_wot.11.a: "Cobarde hasta el final."

usa_wot.11.success_tt: "Osama Bin Laden ha sido asesinado en Pakistán. La guerra contra el terrorismo entra en una nueva fase."

usa_wot.20.t: "Inteligencia"
usa_wot.20.d: "Los operativos de la CIA descubrieron valiosa inteligencia de militantes capturados, proporcionando nuevas pistas sobre el posible paradero de Bin Laden."
usa_wot.20.a: "Excelente, adelante."
usa_wot.20.a.tt: "Han aumentado los progresos en la búsqueda de Bin Laden."

usa_wot.21.t: "Bin Laden lanza vídeo"
usa_wot.21.d: "Los meses de rastrear a un sospechoso que se cree que está conectado con Bin Laden resultaron ser un callejón sin salida. Se han desperdiciado los recursos. Para empeorar las cosas, el terrorista de Oriente Medio ha lanzado un video para que el público estadounidense vea."
usa_wot.21.a: "Un retroceso frustrante."
usa_wot.21.a.tt: "Los progresos hacia la búsqueda de Bin Laden han disminuido."

usa_wot.22.t: "Cooperación regional"
usa_wot.22.d: "Pakistán y aliados regionales prestan asistencia en la reunión de inteligencia, acelerando la búsqueda de Bin Laden."
usa_wot.22.a: "Esto nos ayudará mucho."
usa_wot.22.a.tt: "Los progresos en la búsqueda de Bin Laden han aumentado considerablemente."
 
accuse_iraq_wmds_button: "Acuse Iraq of Harboring WMDs"
accuse_iraq_wmds_button_desc: "Acusa a Iraq de desarrollar o albergar armas secretas de destrucción masiva. Esto agravará las tensiones y puede justificar la acción militar."

end_war_on_terror_button: "Fin de la guerra contra el terrorismo"
end_war_on_terror_button_desc: "Declarar oficialmente la Guerra contra el Terror, eliminando las operaciones internacionales. Esto dejará consecuencias persistentes en el país y en el extranjero."

usa_wot.30.t: "Acusado de armas de destrucción en masa portuarias"
usa_wot.30.d: "Estados Unidos nos ha acusado públicamente de desarrollar y albergar armas secretas de destrucción masiva. Esto marca una escalada significativa en las tensiones y puede acercar el conflicto."
usa_wot.30.a: "Scary"
  
osama_extradited: "Osama Bin Laden ha sido extraditado"
war_on_terror_stopped_tt: "La guerra contra el terrorismo ha terminado"
# War on TERROR

usa_wot.5.t: "Bin Laden in custody"
usa_wot.5.d: "En un sorprendente avance diplomático, el Afganistán ha acordado extraditar a Osama bin Laden a los Estados Unidos. Esta concesión marca una victoria significativa en las primeras etapas de la guerra contra el terrorismo."
usa_wot.5.a: "Esta es una gran victoria diplomática."

usa_wot.6.t: "Afghanistan Refuses to Extradite Bin Laden"
usa_wot.6.d: "El gobierno afgano se ha negado a entregar a Osama bin Laden a las autoridades estadounidenses. Las tensiones suben mientras Washington debate su próximo movimiento."
usa_wot.6.a: "Usted está con los terroristas, o contra ellos."
usa_wot.6.b: "No tome ninguna acción descarada, ahora .."

je_request_bin_laden_extradition_button: "Solicitar la extradición de Bin Laden"
je_request_bin_laden_extradition_button_desc: "Solicitar formalmente que el Afganistán extradite a Osama bin Laden a los Estados Unidos para su juicio."

bin_laden_extradition_accepted_country: "Extradición Bin Laden - Aceptada"
bin_laden_extradition_accepted_country_desc: "El Afganistán ha acordado extraditar a Osama bin Laden, impulsar la moral nacional y mejorar la preparación militar."
  
bin_laden_extradition_accepted_ig_armed_forces: "Extradición Bin Laden - Aceptada"
