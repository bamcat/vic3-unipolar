 velvet_divorce.1.t: "La crisis constitucional comienza"
 velvet_divorce.1.d: "Las elecciones de junio de 1992 han producido un resultado imposible. En las tierras checas, el Partido Democrático Cívico de Václav Klaus ganó en una plataforma de liberalización rápida del mercado. En Eslovaquia, el Movimiento de Vladimír Mečiar por una Eslovaquia Democrática ganó en una plataforma de reforma más lenta y mayor autonomía eslovaca. Los dos hombres se reunieron en Brno y acordaron una cosa: el acuerdo actual no puede continuar. No están de acuerdo en casi todo lo demás. El Presidente Václav Havel, que cree que el público votaría para mantener al país unido si se le solicita, ha sido delineado. El destino de id=4/ título es ahora una cuestión de lo que traen los próximos meses."
 velvet_divorce.1.f: "Dos elecciones. Dos mandatos. Un país."
 velvet_divorce.1.a: "El gobierno trabajará para mantener juntos la federación"
 
 velvet_divorce.2.t: "Luchas económicas eslovacas"
 velvet_divorce.2.d: "La economía de Eslovaquia está sufriendo la transición del comunismo más difícil que Bohemia y Moravia. La base industrial eslovaca, construida alrededor de la fabricación pesada y la producción de armas para el Pacto de Varsovia, ha colapsado casi toda la noche. El desempleo está aumentando considerablemente. Los políticos eslovacos culpan a la política económica federal y exigen la redistribución o el derecho a establecer su propio curso. La brecha entre las dos mitades del país se está convirtiendo en combustible político."
 velvet_divorce.2.f: "Cuando la mitad de un país hace bien y la otra mitad no, la cuestión de por qué se convierte en una cuestión de quién."
 velvet_divorce.2.a: "Redir fondos federales hacia las regiones eslovacas"
 velvet_divorce.2.b: "El mercado encontrará su nivel, sin tratamiento especial"
 
 velvet_divorce.3.t: "La Declaración Eslovaca de Soberanía"
 velvet_divorce.3.d: "El Consejo Nacional Eslovaco ha aprobado una declaración de la soberanía de Eslovaquia. El documento deja de declarar la independencia, pero afirma que la ley eslovaca supera la ley federal en territorio eslovaco. Esto es constitucionalmente ambiguo y políticamente explosivo. El Presidente Havel lo condenó y renunció a su presidencia checoslovaca poco después. La declaración todavía no es una ruptura, pero es el primer paso formal hacia uno."
 velvet_divorce.3.f: "Aún no la independencia. Pero la dirección está clara."
 velvet_divorce.3.a: "Condena la declaración - ley federal es suprema"
 velvet_divorce.3.b: "Las conversaciones abiertas — ofrecen a Eslovaquia una autonomía más formal dentro de la federación"
 
 velvet_divorce.4.t: "Mečiar y Klaus: Dos hombres, dos visiones"
 velvet_divorce.4.d: "Vladimír Mečiar y Václav Klaus se han reunido de nuevo. Sus posiciones negociadoras se han endurecido. Klaus quiere una estrecha unión federal con una política económica unificada. Mečiar quiere una confederación floja con casi total autonomía interna eslovaca, o independencia. Quienes asistieron a la reunión lo describen como civil pero irreconciliable. Los dos hombres no son enemigos, pero quieren cosas fundamentalmente diferentes, y uno de ellos recibirá lo que quiere."
 velvet_divorce.4.f: "Dos pragmatistas. Conclusiones contrarias."
 velvet_divorce.4.a: "Retroceder el programa unificado de reforma del mercado — apoyar a Klaus"
 velvet_divorce.4.b: "Ofrezca una confederación más floja — dé a Mečiar algo con lo que trabajar"
 
 velvet_divorce.5.t: "Llamadas para un referéndum"
 velvet_divorce.5.d: "Los políticos eslovacos y los grupos cívicos están pidiendo un referéndum sobre la independencia. La propuesta cuenta con un apoyo público significativo en Eslovaquia, donde las encuestas sugieren que una mayoría estrecha favorece alguna forma de separación. El Presidente Havel —a pesar de su renuncia— ha defendido un referéndum. Cree que el propio proceso inflamaría las pasiones y haría imposible un resultado racional. "Las naciones no deciden separar la forma en que un accionista vota en una fusión", dijo. Ellos sienten su camino hacia ella, o lejos de ella. La cuestión de si celebrar un voto es en sí misma un voto sobre lo que se cree que es id=4/cero."
 velvet_divorce.5.f: "Un referéndum es una pregunta. Pero hacer algunas preguntas cambia la respuesta."
 velvet_divorce.5.a: "Sostener el referéndum - dejar hablar al pueblo"
 velvet_divorce.5.b: "Bloquear el referéndum - seguir el consejo de Havel"
 
 velvet_divorce.10.t: "Checoslovaquia sobrevive"
 velvet_divorce.10.d: "La crisis ha pasado. A través de una combinación de compromiso económico, negociación política, y la persistencia de las instituciones federales, se han mantenido juntas. El arreglo que surgió no es la federación de 1990. Eslovaquia tiene más autonomía. La relación económica entre las dos mitades ha sido reequilibrada. Pero el estado está intacto, y la bandera no cambia. La historia notará que esto no era inevitable — que requería opciones activas, y que esas decisiones se tomaron."
 velvet_divorce.10.f: "El divorcio de terciopelo no ocurrió. Es una victoria."
 velvet_divorce.10.a: "Checoslovaquia soporta"
 
 velvet_divorce.15.t: "El divorcio de Velvet"
 velvet_divorce.15.d: "Está hecho. El 1o de enero de 1993, Checoslovaquia dejará de existir. La disolución fue acordada por el Parlamento federal, no por referéndum. El público nunca fue preguntado directamente. Las encuestas en ambas mitades del país siempre mostraron apoyo mayoritario para preservar alguna forma de estado común, pero la clase política — Klaus y Mečiar sobre todo— determinó que el sindicato era inviable. La división era pacífica. No hubo disparos. No hubo fronteras impugnadas. Los activos y pasivos de la federación se dividieron según una fórmula basada en la población. El ejército estaba dividido. La moneda estaba dividida. La bandera se dividió.Se observó que existían durante setenta y cuatro años. Nació en revolución y se disolvió en votación parlamentaria. Ambos estados sucesores ya han solicitado la adhesión a la UE y a la OTAN."
 velvet_divorce.15.f: "Setenta y cuatro años. Con papeleo."
 velvet_divorce.15.a: "La disolución procede"
 
 velvet_divorce.16.t: "La República Checa nació"
 velvet_divorce.16.d: "El 1o de enero de 1993, la República Checa se convierte en un Estado independiente. El territorio de Bohemia, Moravia y Silesia Checa, con Praga como su capital, forma uno de los dos estados sucesores de la federación checoslovaca. El nuevo estado hereda la mitad más desarrollada de la vieja economía, un sistema democrático funcional y un reconocimiento internacional inmediato. El camino a Europa está abierto."
 velvet_divorce.16.f: "Un nuevo estado. Una vieja nación."
 velvet_divorce.16.a: "La República Checa comienza"
 
 velvet_divorce.17.t: "La República Eslovaca nació"
 velvet_divorce.17.d: "El 1o de enero de 1993, la República Eslovaca se convierte en un Estado independiente. Bratislava es la capital de un país que ha existido en esta forma durante exactamente un día.Seguido id=0/Consejo identificadox id=1/ Fuelovaquia hereda un legado industrial más pesado, desempleo más alto y un entorno político más complicado: el estilo de gobierno de Mečiar pronto atraerá la crítica internacional. Pero el estado es soberano, reconocido y, por primera vez en la historia, totalmente independiente."
 velvet_divorce.17.f: "Por primera vez en su historia: una Eslovaquia independiente."
 velvet_divorce.17.a: "La República Eslovaca comienza"
 
 velvet_divorce.18.t: "¿Qué sigue?"
 velvet_divorce.18.d: "Checoslovaquia se está disolviendo. Sus estados sucesores, la República Checa y la República Eslovaca, están tomando forma. Fuiste el líder de un país que ya no existe. La pregunta ahora es qué papel jugarás en lo que viene después."
 velvet_divorce.18.f: "Un país. Dos futuros."
 velvet_divorce.18.a: "Continuar como República Checa"
 velvet_divorce.18.b: "Continuar como República Eslovaca"
 velvet_divorce.18.c: "Permanezca y observe la disolución"
 
