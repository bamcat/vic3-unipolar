 oslo_us_broker:0 "Oslo Broker"
 oslo_us_broker_desc:0 "Nos estamos beneficiando diplomáticamente de su apoyo al proceso de Oslo."

 oslo_us_failed_mediation:0 "Failed Oslo Mediation"
 oslo_us_failed_mediation_desc:0 "El colapso del proceso de Oslo ha dañado la confianza en la mediación estadounidense y occidental."
 
 ## war on terror again
 
 wot_coalition.2.t:0 "Artículo 5 Invocado"
 wot_coalition.2.d:0 "Tras los ataques contra Estados Unidos, la OTAN ha invocado el artículo 5. La alianza ahora trata el ataque como un ataque a todos los miembros."
 wot_coalition.2.f:0 "La alianza del Atlántico Norte fue construida para la defensa colectiva. Su primera invocación no proviene de tanques que cruzan una frontera, sino de un ataque terrorista."
 wot_coalition.2.a:0 "Quédate con los Estados Unidos."

 wot_coalition.10.t:0 "Estados Unidos exige cooperación"
 wot_coalition.10.d:0 "Estados Unidos ha exigido la cooperación paquistaní en la guerra contra el terrorismo. Washington espera acceso militar, derechos de bastión, apoyo de inteligencia y rutas logísticas hacia Afganistán."
 wot_coalition.10.f:0 "La geografía de Pakistán lo hace indispensable. Sin embargo, la negativa invitaría a la acusación de que Islamabad está protegiendo el terrorismo."
 wot_coalition.10.a:0 "Coopera con la coalición."
 wot_coalition.10.b:0 "Rechazar el ultimátum."

 wot_coalition.11.t:0 "Pakistán Coopera"
 wot_coalition.11.d:0 "El Pakistán ha convenido en cooperar con los Estados Unidos y los asociados de la coalición, otorgando acceso militar y acogiendo bases militares para la campaña en el Afganistán."
 wot_coalition.11.f:0 "El camino hacia Afganistán atraviesa el Pakistán."
 wot_coalition.11.a:0 "Aseguren las rutas."

 wot_coalition.12.t:0 "Pakistán rechaza"
 wot_coalition.12.d:0 "Pakistán ha rechazado las demandas estadounidenses de cooperación. Washington ahora etiqueta a Pakistán complicit in terrorism y prepara acción militar directa."
 wot_coalition.12.f:0 "Refusal transforma un socio logístico en un objetivo."
 wot_coalition.12.a:0 "Han elegido su lado."

 wot_article_5_join_war_tt:0 "Este miembro de la OTAN se sumará a los Estados Unidos en cualquier guerra activa contra Afganistán. Si la guerra aún no ha comenzado, se unirá una vez que comience la guerra."
 wot_pakistan_cooperate_tt:0 "Pakistán firma tratados de 10 años con los Estados Unidos y todos los socios de la coalición, otorgando id=0/conejo Acceso Militar Secuenciax id=1/año y ierex id=2/ título Host Military Bases hechosx id=3/año."
 wot_pakistan_refuse_tt:0 "Estados Unidos lanza una guerra de cambio de régimen contra Pakistán y la etiqueta que complicita en el terrorismo."

 wot_pakistan_coalition_access_treaty_name:0 "Acuerdo de Acceso a la Coalición contra el Terrorismo"
 operation_enduring_freedom_pakistan:0 "Operación Libertad Duradera — Pakistán"

 wot_article_5_commitment:0 "Artículo 5 Compromiso"
 wot_article_5_commitment_desc:0 "Este país ha comprometido fuerzas con la respuesta de la OTAN después del 11 de septiembre."

 wot_pakistan_cooperation:0 "Coalition Cooperation"
 wot_pakistan_cooperation_desc:0 "El Pakistán coopera con los Estados Unidos y los asociados de la coalición en la guerra contra el terrorismo."

 wot_pakistan_complicit:0 "Complicit in Terrorism"
 wot_pakistan_complicit_desc:0 "El Pakistán ha rechazado la cooperación y ahora se considera cómplice en el terrorismo por los Estados Unidos."

 wot_coalition.20.t:0 "La Alianza del Norte se une a la Coalición"
 wot_coalition.20.d:0 "La Alianza del Norte ha tomado Kabul y se ha unido a la campaña dirigida por Estados Unidos contra el régimen talibán en el Afganistán."
 wot_coalition.20.f:0 "Los talibanes se enfrentan ahora a una coalición externa y a un enemigo interno de inmediato."
 wot_coalition.20.a:0 "Avance en Kabul."

