 y2k_events.1.t: "El Error del Milenio"
 y2k_events.1.d: "A medida que el año 2000 se acerca, una ansiedad silenciosa se ha apoderado de id=0/ ingenieros, burócratas y departamentos de TI. El llamado problema Y2K —el descubrimiento que la mayoría de los sistemas informáticos almacenan el año como dos dígitos, y por lo tanto interpretará '00' como 1900 en lugar de 2000— ha desencadenado un cambio global. Algunos dicen que las consecuencias podrían ser catastróficas: fallan las redes eléctricas, los sistemas bancarios corruptos, el control del tráfico aéreo oscureciendo. Otros dicen que la preocupación es tremendamente exagerada y los consultores que venden auditorías de cumplimiento simplemente se están haciendo ricos del pánico. id=3/ título debe decidir qué tan seriamente tomarlo."
 y2k_events.1.f: "Medianoche viene. Si las luces permanecen encendidas es otra pregunta."
 
 y2k_events.1.a: "Invertir en el cumplimiento completo de Y2K"
 y2k_events.1.a_tt: "Expensivo, minucioso y probablemente innecesario — pero si incluso una fracción de las predicciones son correctas, el costo de hacer nada es mucho más alto. id=0/año financiará programas de cumplimiento en infraestructura crítica."
 y2k_events.1.b: "Es obviamente exagerado — ignorarlo"
 y2k_events.1.b_tt: "El pánico es una mina de oro de la industria consultora y nada más. No desperdiciará fondos públicos en un problema imaginario."
 
 # ── NEW YEAR 2000 ─────────────────────────
 
 y2k_events.2.t: "Feliz Año Nuevo — Bienvenido al año 2000"
 y2k_events.2.d: "Los relojes marcaron la medianoche del 31 de diciembre de 1999, y las luces se quedaron. Los aviones seguían volando. Los bancos se abrieron. Las redes de energía se humedecieron. El agua fluía. El fallo del milenio, la catástrofe más anticipada en la historia de la computación, llegó con un susurro en lugar de una explosión, o tal vez nunca llegó a nada, y los miles de millones gastados en cumplimiento simplemente funcionaron. A través de id=4/(es), multitudes llenaron las calles, fuegos artificiales encendieron el cielo, y por una noche el mundo sintió, brevemente, como si estuviera comenzando de nuevo. El siglo XXI ha comenzado. Lo siguiente es la suposición de alguien."
 y2k_events.2.f: "El año es 2000. El mundo no terminó. Eso, todas las cosas consideradas, son buenas noticias."
 
 y2k_events.2.a: "Un nuevo siglo comienza"
 
