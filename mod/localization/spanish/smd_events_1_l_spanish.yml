 intifada_events.1.t: "El conflicto aumenta"
 intifada_events.1.d: "El levantamiento ha escalado más allá de los enfrentamientos callejeros. Lo que comenzó como piedras y protestas se ha convertido en una confrontación completa. En los estrechos callejones y campamentos de refugiados de Palestina, cada edificio es una fortaleza y cada calle un campo de batalla."
 intifada_events.1.a: "Vamos a restaurar el orden"
 intifada_events.1.a.pal: "Nunca dejaremos de resistir."

 intifada_events.2.t_isr: "La Intifada termina"
 intifada_events.2.d_isr: "La Segunda Intifada ha sido suprimida. Las operaciones militares israelíes han reafirmado el control sobre los territorios palestinos, aunque el costo de la reputación internacional y la vida civil palestina ha sido enorme. Las quejas subyacentes siguen sin resolverse."
 intifada_events.2.t_pal: "Prevails de resistencia palestina"
 intifada_events.2.d_pal: "La Segunda Intifada ha logrado lo que parecía imposible. Mediante su determinación y sacrificio, el pueblo palestino ha obligado a Israel a negociar. El mundo ha presenciado el poder de la resistencia popular contra la ocupación."
 intifada_events.2.a: "¿Qué viene después?"

 intifada_events.5.t: "Street Clashes"
 intifada_events.5.d: "Los jóvenes palestinos se han reunido en los bordes de los puestos de control israelíes, armados con piedras y neumáticos quemados. Las calles estrechas canalizan la confrontación en una lucha de corta distancia donde los vehículos blindados israelíes no pueden maniobrar eficazmente. Las cámaras de televisión de todo el mundo registran las escenas."
 intifada_events.5.a: "Intensificar la resistencia"
 intifada_events.5.b: "Mostrar moderación"

 intifada_events.6.t: "Punto de control Raids"
 intifada_events.6.d: "Los puestos de control militares israelíes que dividen a las comunidades palestinas presentan un símbolo de ocupación y un objetivo táctico. Una huelga coordinada podría perturbar el control israelí de la circulación dentro de los territorios, aunque invitará a represalias duras."
 intifada_events.6.a: "Ataque los puestos de control"
 intifada_events.6.b: "Demasiado peligroso."

 intifada_events.8.t: "International Media Coverage"
 intifada_events.8.d: "Los medios internacionales transmiten imágenes del levantamiento en todo el mundo. Escenas de civiles palestinos que enfrentan fuerzas militares israelíes han provocado protestas y condenas en capitales de todo el mundo. Las naciones de la Liga Árabe se están reuniendo detrás de la causa palestina, mientras que Israel enfrenta una presión diplomática creciente."
 intifada_events.8.a: "El mundo está mirando"

 intifada_events.7.t: "La Segunda Intifada"
 intifada_events.7.d: "Los territorios palestinos han estallado. Después de años de negociaciones de paz fracasadas y de una expansión continua de los asentamientos, la frustración del pueblo palestino se ha convertido en un levantamiento abierto. En las calambres calles de Gaza y las laderas de la Ribera Occidental, una nueva generación asume la lucha."
 intifada_events.7.a: "Esto definirá una generación"

