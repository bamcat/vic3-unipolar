 gov_dalai_lama:0 "Religious Kingdom"
 gov_dalai_lama_desc:2 "Se trata de un id=0/año en el que el id=1/consejo es gobernado por la cabeza del clero."
 gov_heavenly_kingdom_theocracy:0 "Reino Celestial"
