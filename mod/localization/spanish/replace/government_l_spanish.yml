 gov_theocratic_oligarchy_desc:2 "Este es un id=0/año en el que el id=1/consejo es gobernado por una clase de miembros del clero ricos y poderosos."
 gov_theocratic_democracy:0 "Democracia teocrática"
 gov_theocratic_democracy_desc:2 "Este es un id=0/conferencia que es gobernado por un clero que son id=1/conferencia por la gente."
 gov_theocratic_single_party_state: "Régimen democrático"
 gov_theocratic_single_party_state_desc: "Este es un id=0/año que es gobernado por un clérigo que son id=1/(s) por miembros de un solo partido legal."
 gov_catholic_theocracy:0 "Catholic Theocracy"
 gov_catholic_theocracy_desc:2 "A id=0/año gobernado por la jerarquía local de la Iglesia Católica. El más alto id=1/ título toma el papel de id=2/ título."
 gov_protestant_theocracy:0 "Teocracia protestante"
 gov_protestant_theocracy_desc:2 "A id=0/año gobernado por la Iglesia protestante estatal. Su autoridad más alta se llama el id=1/año, que ejerce autoridad secular y espiritual."
 gov_oriental_orthodox_theocracy:1 "Teocracia oriental ortodoxa"
 gov_oriental_orthodox_theocracy_desc:3 "A id=0/año gobernado por la Iglesia Ortodoxa Oriental. Reglamentado por el id=1/ título, la Iglesia controla todos los aspectos del estado."
 gov_sunni_theocracy:0 "Imamate"
 gov_sunni_theocracy_desc:2 "Un teocrático id=0/año gobernado por líderes de la fe musulmana sunita. Un superior id=1/ título toma el papel de id=2/conferencia."
 gov_papacy:0 "Papacy"
 gov_papacy_desc:1 "Este es un id=0/año gobernado por el id=1/ título, el pontífice supremo, obispo de Roma, y cabeza de la Iglesia Católica."
 gov_jewish_theocracy:0 "Estado rabino"
 gov_jewish_theocracy_desc:2 "Una teocracia judía liderada por el id=0/año."
 gov_prince_bishopric:0 "Prince-Bishopric"
 gov_prince_bishopric_desc:2 "Se trata de un id=0/año en el que el <x id=1/ título ejerce tanto la autoridad temporal como eclesiástica sobre el reino."
 gov_zaidi_imamate:0 "Zaidi Imamate"
 gov_zaidi_imamate_desc:2 "Se trata de un id=0/año en el que el poder descansa con un semi-hereditorio id=1/(s) perteneciente a la rama Zaidi de Shia Islam."
 gov_shiite_theocracy:0 "Teocracia chiita"
 gov_shiite_theocracy_desc:2 "Un teocrático id=0/año gobernado por líderes de la fe musulmana chiita. Un superior id=1/ título toma el papel de id=2/conferencia."
 gov_bhutanese_dual_system_dharma:0 "Diarquía bhutanesa"
