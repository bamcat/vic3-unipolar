pm_no_public_housing_desc: "El estado no proporciona soporte de vivienda. Los centros urbanos producen sólo los bienes raíces generados por la actividad del mercado privado."
 
pm_the_projects: "Los proyectos"
pm_the_projects_desc: "Bloques de torre de alta densidad financiados por el Estado y viviendas de tenencia. Básico, funcional y construido rápidamente de madera y materiales prefabricados. La producción inmobiliaria aumenta significativamente a medida que el estado se convierte en un gran constructor."
 
pm_affordable_construction: "Construcción asequible"
pm_affordable_construction_desc: "Un amplio programa de vivienda pública que utiliza la construcción de calidad: edificios con estructura de acero, bases adecuadas, materiales duraderos. La producción inmobiliaria aumenta sustancialmente. Los ingenieros y burócratas gestionan el programa en expansión."
 
pm_housing_for_all: "Vivienda para Todos"
pm_housing_for_all_desc: "Vivienda universal entregada a escala. El Estado construye y mantiene viviendas de alta calidad para todos los ciudadanos, consumiendo importantes insumos de construcción. La producción inmobiliaria alcanza su máximo. Una gran fuerza de trabajo de trabajadores, ingenieros y burócratas sostiene el programa."
