l_spanish:
  
  # Leader Ideologies
 ideology_moderate:0 "Moderado"
 ideology_moderate_desc:0 "id=0/ Este líder se considera un moderado en su Grupo de Interés, sin ninguna ideología particular propia."
 
 ideology_traditionalist:0 "Tradicional"
 ideology_traditionalist_desc:0 "id=0/ Este líder cree en mantener las costumbres tradicionales, considerándolos como una extensión de las leyes naturales. id=1/"

 ideology_traditionalist_minoritarian: "Tradicionalista"
 ideology_traditionalist_minoritarian_desc:0 "id=0/ Este líder cree en mantener las costumbres tradicionales, considerándolos como una extensión de las leyes naturales. Mientras su país permanece bajo el dominio de una religión diferente, se opondrán a imponer la religión estatal sobre la población. id=1/"

 ideology_atheist:1 "Nihilist"
 ideology_atheist_desc:1 "id=0/ Este líder prioriza el cuestionamiento y revocación del orden social tradicionalista y de las instituciones a toda costa, tratando de limpiar el terreno para una sociedad globalmente revolucionaria. id=1/"

 ideology_republican_leader:0 "Republicano"
 ideology_republican_leader_desc:0 "id=0/ Este líder busca establecer una república gobernada por funcionarios electos. id=1/"

 ideology_radical:0 "Radical"
 ideology_radical_desc:0 "id=0/ Este líder se esfuerza por reformas liberales radicales que promueven los ideales democráticos. id=1/"

 ideology_abolitionist:0 "Abolicionista"
 ideology_abolitionist_desc:0 "id=0/ Este líder considera la esclavitud una violación abominable de los derechos humanos y busca abolirla del mundo. id=1/"

 ideology_slaver:0 "Esclavista"
 ideology_slaver_desc:0 "id=0/ Este líder considera la esclavitud como parte natural de su modo de vida y se opone a su abolición. id=1/"

 ideology_feminist:0 "Feminista"
 ideology_feminist_desc:0 "id=0/ Este líder sostiene que las mujeres son iguales a los hombres y se esfuerza por ampliar sus derechos como ciudadanos."
 
 ideology_reformer:0 "Reformista"
 ideology_reformer_desc:0 "id=0/ Este líder quiere hacer algunos cambios incrementales para hacer la sociedad un poco más igual. Pero no demasiado."

 ideology_pacifist:0 "Pacifist"
 ideology_pacifist_desc:0 "id=0/ Este líder cree en la no violencia como su método y paz como su objetivo."

 ideology_jingoist_leader:0 "Jingoist"
 ideology_jingoist_leader_desc:0 "id=0/ Este líder aboga por una política exterior agresiva, enfatizando la disposición a ir a la guerra para avanzar en sus ambiciones. id=1/"

 ideology_royalist:0 "Royalist"
 ideology_royalist_desc:0 "id=0/ Las lealtades de este líder son a la monarquía y su gobernante legítimo."
 
 ideology_social_democrat:0 "Social Democrat"
 ideology_social_democrat_desc:0 "id=0/ Este líder cree en lograr una sociedad socialista mediante la reforma parlamentaria. id=1/"

 ideology_communist:0 "Comunista"
 ideology_communist_desc:0 "id=0/ Este líder cree en la clase obrera apoderarse del poder político a través de cualquier medio necesario. id=1/"

 ideology_vanguardist:0 "Vanguardista"
 ideology_vanguardist_desc:0 "id=0/ Este líder cree en lograr una sociedad socialista a través de un partido de vanguardia de radicales dedicados. id=1/"

 ideology_fascist:0 "fascista"
 ideology_fascist_desc:0 "id=0/ Este líder es un ultranacionalista que espanta el renacimiento de los valores tradicionales y autoritarios percibidos en un contexto moderno. id=1/"

 ideology_anarchist:0 "Anarquista"
 ideology_anarchist_desc:0 "id=0/ Este líder busca la abolición de la jerarquía, la autoridad y el estado, dejando que la gente gobierne. id=1/"

 ideology_ethno_nationalist:0 "Ethno-Nationalist"
 ideology_ethno_nationalist_desc:0 "id=0/ Este líder cree en una nación definida por motivos étnicos. id=1/"

 ideology_theocrat:0 "Theocrat"
 ideology_theocrat_desc:0 "id=0/ Este líder cree en un estado dirigido por la iglesia en línea con los valores doctrinales."

 ideology_market_liberal:0 "Mercado Liberal"
 ideology_market_liberal_desc:0 "id=0/ Este líder cree que la mano invisible del libre mercado debe ser la fuerza rectora de la economía nacional."
 
 ideology_liberal_leader:0 "Liberal"
 ideology_liberal_leader_desc:0 "id=0/ Este líder prioriza la institución de la democracia y se opone al gobierno incontestado sobre la nación. id=1/"

  # Interest Group Ideologies

 ideology_paternalistic:0 "Paternalista"
 ideology_paternalistic_desc:0 "id=0/ Este grupo tiene poca fe en el populus tratando de gobernarse, creyendo que necesitan la guía de una aristocracia tradicional."
  
 ideology_patriarchal:0 "Patriarca"
 ideology_patriarchal_desc:0 "id=0/ Este grupo cree que los hombres deben tener autoridad política y que las mujeres deben obedecer a sus padres y esposos."
   
 ideology_republican:0 "Republicano"
 ideology_republican_desc:0 "id=0/ Este grupo cree que los mejores líderes son elegidos por voto público y apoya una forma republicana de gobierno."
  
 ideology_populist:0 "Populista"
 ideology_populist_desc:0 "id=0/ Este grupo cree en la gobernanza del pueblo y busca expandir la franquicia a todas las clases sociales."
  
 ideology_stratocratic:0 "Estratocrático"
 ideology_stratocratic_desc:0 "id=0/ Este grupo favorece mantener una jerarquía en la sociedad a través de formas tradicionales de tributación y relaciones laborales."
  
 ideology_oligarchic:0 "Oligarchic"
 ideology_oligarchic_desc:0 "id=0/ Este grupo favorece el monopolio del poder en manos de un estado secular controlado por oligarquías locales."

 ideology_laissez_faire:0 "Laissez-Faire"
 ideology_laissez_faire_desc:0 "id=0/ Este grupo cree en el libre flujo del comercio y las fuerzas laborales, favoreciendo el juicio de los mercados sobre el de los gobiernos."
  
 ideology_individualist:0 "Individualista"
 ideology_individualist_desc:0 "id=0/ Este grupo cree que cada persona es responsable de su propio destino y se opone a los programas gubernamentales para proporcionar servicios que pueden ser pagados por el individuo."
  
 ideology_pious:0 "Pío"
 ideology_pious_desc:0 "id=0/ Este grupo cree que los principios religiosos son verdades morales primordiales y que deben impregnar toda la sociedad."
  
 ideology_particularist:0 "Particularista"
 ideology_particularist_desc:0 "id=0/ Este grupo quiere autonomía local en su trabajo, libre de disposiciones feudales de servidumbre asegurada."
  
 ideology_isolationist:0 "Isolationist"
 ideology_isolationist_desc:0 "id=0/ Este grupo quiere que el Estado se centre en asuntos internos, oponiéndose a las ambiciones para expandirse a tierras extranjeras, así como la inmigración de ellas."
  
 ideology_moralist:0 "Moralist"
 ideology_moralist_desc:1 "id=0/ Este grupo tiene una fuerte creencia en un orden moral religioso y considera que la diversidad de opinión es una amenaza para esta orden."
  
 ideology_jingoist:0 "Jingoist"
 ideology_jingoist_desc:0 "id=0/ Este grupo cree en una política exterior agresiva y manteniendo un ejército para respaldarlo."

 ideology_loyalist:0 "Loyalist"
 ideology_loyalist_desc:0 "id=0/ Este grupo cree que cada ciudadano debe pagar sus cuotas para financiar las funciones vitales del estado."
 
 ideology_meritocratic:0 "Meritocratic"
 ideology_meritocratic_desc:0 "id=0/ Este grupo cree que el éxito se gana y que aquellos que lo han logrado merecen la responsabilidad y la riqueza que lo acompañan."
   
 ideology_patriotic:0 "Patriótico"
 ideology_patriotic_desc:0 "id=0/ Este grupo está ferozmente dedicado a su país y quiere medidas duras contra aquellos que propagan el disentimiento."
  
 ideology_liberal:0 "Liberal"
 ideology_liberal_desc:0 "id=0/ Este grupo considera que la libertad y la igualdad jurídica son valores importantes que deben salvaguardarse."
  
 ideology_anti_clerical:0 "Anti-Clerical"
 ideology_anti_clerical_desc:1 "id=0/ Este grupo se opone a la influencia de la religión organizada en el sistema político y educativo. Creen que las mentes racionales deben estar a la vanguardia de la gobernanza."
  
 ideology_proletarian:0 "Proletario"
 ideology_proletarian_desc:0 "id=0/ Este grupo ve política a través de la lente de lucha de clases y los lados con los trabajadores en este conflicto."
  
 ideology_egalitarian:0 "Equidad"
 ideology_egalitarian_desc:0 "id=0/ Este grupo considera que el trato igual y humano de las personas debe ser una piedra angular de la política política."
   
 ideology_anti_slavery:0 "Antiesclavitud"
 ideology_anti_slavery_desc:0 "id=0/ Este grupo aborrece la esclavitud y la considera una característica de un pasado bárbaro."
 
 ideology_pro_slavery:0 "Pro-Slavery"
 ideology_pro_slavery_desc:0 "id=0/ Este grupo considera la esclavitud como una parte necesaria de una sociedad que funciona bien."
  
 ideology_reactionary:0 "Reaccionario"
 ideology_reactionary_desc:0 "id=0/ Este grupo es nostálgico para un pasado, real o imaginado, donde sólo los reyes gobernaban sobre una sociedad uniforme."
 
 ideology_plutocratic:0 "Plutocrático"
 ideology_plutocratic_desc:0 "id=0/ Este grupo cree que los ricos han demostrado su valía como tomadores de decisiones y forman una élite intelectual bien adaptada para establecer el curso de la sociedad."

 ideology_agrarian:0 "Agrarian"
 ideology_agrarian_desc:0 "id=0/ Este grupo considera que la política económica debe centrarse en la agricultura y los intereses de los agricultores."

 ideology_corporatist: "Corporatista"
 ideology_corporatist_desc: "id=0/ Este grupo cree en la resolución del conflicto entre clases mediante la aplicación de principios religiosos."

 ideology_corporatist_leader: "Corporatista"
 ideology_corporatist_leader_desc: "id=0/ Este líder cree en la resolución del conflicto de clases mediante concesiones de la clase superior y la colaboración entre diferentes grupos sociales."

 ideology_agrarian_jeffersonian:0 "Jeffersonian"
 ideology_agrarian_jeffersonian_desc:0 "id=0/ Este grupo cree que la clase de pequeños agricultores forma la fundación del país, apoyando el agarianismo como base para una sociedad libre."

  # flavor ideologies

 ideology_republican_paternalistic:0 "Elitist"
 ideology_republican_paternalistic_desc:0 "id=0/ Este grupo favorece la gobernación de la élite desembarcada, pero sigue apoyando una forma republicana de gobierno."

 ideology_scholar_paternalistic:0 "Scholar-Gentry"
 ideology_scholar_paternalistic_desc:0 "id=0/ Este grupo preferiría ver el país gobernado por un monarca aconsejado por los sabios y educados."

 ideology_junker_paternalistic:0 "Junker"
 ideology_junker_paternalistic_desc:0 "id=0/ Este grupo cree que la nobleza desembarcada es más adecuada para llevar al país a su futuro."

 ideology_papal_paternalistic:1 "Baronial"
 ideology_papal_paternalistic_desc:0 "id=0/ Este grupo apoya la autoridad del Papa y la jerarquía tradicional de la Santa Sede."

 ideology_confucian:0 "Confucio"
 ideology_confucian_desc:0 "id=0/ Este grupo cree en las enseñanzas de Confucio, apoyando un orden social que ven como arraigado en las leyes del Cielo."

 ideology_bakufu:0 "Bakufu"
 ideology_bakufu_desc:0 "id=0/ Este grupo apoya al shogunato y cree que el poder pertenece a las manos de la clase guerrero."
 
 ideology_shinto_moralist:0 "Shinto Piousness"
 ideology_shinto_moralist_desc:0 "id=0/ Este grupo cree en la divinidad del Emperador y vincula esta creencia con la antigua adoración de dioses y espíritus."

 ideology_caudillismo:0 "Caudillismo"
 ideology_caudillismo_desc:0 "id=0/ Este grupo tiende a apoyar a los líderes fuertes con antecedentes militares sobre el estado de derecho constitucional."

 ideology_heavenly_kingdom_theocratic:0 "Dios adorador"
 ideology_heavenly_kingdom_theocratic_desc:0 "id=0/ Este grupo apoya la idea de que todas las personas se convierten en hijos e hijas de Dios cuando son redimidas por Cristo, y favorece una forma teocrática de gobierno."

 ideology_papal_moralist:0 "Pontificio"
 ideology_papal_moralist_desc:0 "id=0/ Este grupo tiene una fuerte devoción a mantener tanto los poderes temporales como eclesiásticos de la Iglesia Católica."

 ideology_liberal_modern: "Liberal"
 ideology_liberal_modern_desc: "id=0/ Este grupo considera que la libertad y la igualdad jurídica son valores importantes que deben salvaguardarse."

 ideology_egalitarian_modern: "Equidad"
 ideology_egalitarian_modern_desc: "id=0/ Este grupo considera que el trato igual y humano de las personas debe ser una piedra angular de la política política."

 ideology_enclavist: "Enclavist"
 ideology_enclavist_desc: "id=0/ Los intereses de este grupo residen en preservar su posición como clase dominante colonial, secluyéndose de sus sujetos y preservando su poder mediante un sistema burocrático intrincado e incontable."

 ideology_malthusian: "Malthusian"
 ideology_malthusian_desc: "id=0/ Este grupo se suscribe a las teorías económicas establecidas por Thomas Malthus, creyendo cualquier esfuerzo para aliviar la pobreza a ser auto-defeminado debido al crecimiento demográfico consiguiente."

 liberal_and_egalitarian_amended_tt: "Las posturas de id=2/año en el id=3/ título cambiarán"

 # Movement Ideologies

 ideology_royalist_movement: "Royalist"
 ideology_royalist_movement_desc: "id=0/ Las lealtades de este grupo son a la monarquía y su gobernante legítimo."

 ideology_absolutist_movement: "Absolutista"
 ideology_absolutist_movement_desc: "id=0/ Este grupo es leal a la institución de la monarquía, y apoya la conferencia con poder absoluto."

 ideology_anarchist_movement: "Anarquista"
 ideology_anarchist_movement_desc: "id=0/ Este grupo busca la abolición de la jerarquía, la autoridad y el Estado, dejando que la gente gobierne. id=1/"

 ideology_communist_movement: "Comunista"
 ideology_communist_movement_desc: "id=0/ Este grupo cree en la clase obrera que toma el poder político a través de cualquier medio necesario. id=1/"

 ideology_vanguardist_movement: "Vanguardista"
 ideology_vanguardist_movement_desc: "id=0/ Este grupo cree en lograr una sociedad socialista a través de un partido de vanguardia de radicales dedicados. id=1/"

 ideology_radical_movement: "Radical"
 ideology_radical_movement_desc:1 "id=0/ Este grupo se esfuerza por reformas liberales radicales que promueven los ideales democráticos. id=1/"

 ideology_liberal_movement: "Liberal"
 ideology_liberal_movement_desc: "id=0/ Este grupo valora la institución de la democracia y apoya la garantía de las libertades esenciales para los ciudadanos. id=1/"

 ideology_pluralist_movement_1: "Pluralist"
 ideology_pluralist_movement_1_desc: "id=0/ Este grupo desea salvaguardar sus tradiciones culturales, identidad e idioma. id=1/"

 ideology_pluralist_movement_2: "$ideology_pluralist_movement_1$"
 ideology_pluralist_movement_2_desc: "$ideology_pluralist_movement_1_desc$"

 ideology_pluralist_movement_3: "$ideology_pluralist_movement_1$"
 ideology_pluralist_movement_3_desc: "$ideology_pluralist_movement_1_desc$"

 ideology_pluralist_movement_4: "$ideology_pluralist_movement_1$"
 ideology_pluralist_movement_4_desc: "$ideology_pluralist_movement_1_desc$"

  # Government Principles group
 lawgroup_governance_principles:0 "Principios de gobernanza"
 lawgroup_governance_principles_desc:0 "Los principios y la autoridad fundamentales por los que se gobierna su país. Determina quién es el Jefe de Estado."
  
 law_chiefdom:0 "Chiefdom"
 law_chiefdom_desc:0 "Un sistema político preindustrial jerárquico basado en el parentesco, con un señor de guerra o un anciano de una familia prominente en la cabeza. Es incapaz de un control centralizado eficiente sobre estados enteros."
 law_monarchy:0 "Monarquía"
 law_monarchy_desc:0 "Una forma de gobierno donde una dinastía aristocrática representa la identidad nacional del país y da poderes ejecutivos al jefe real de la dinastía."
 law_presidential_republic:0 "República Presidencial"
 law_presidential_republic_desc:0 "Un sistema político en el que el pueblo y sus representantes electos ejercen el poder. Las repúblicas tienen un elegido o nominado id=0/año como Jefe de Estado."
 law_parliamentary_republic:0 "República parlamentaria"
 law_parliamentary_republic_desc:0 "Un sistema político en el que el pueblo y sus representantes electos ejercen el poder. El líder de la legislatura actúa como Jefe de Estado y se denomina id=0/Consejo."
 law_theocracy:0 "Theocracy"
 law_theocracy_desc:0 "El gobierno es gobernado por un clero y su interpretación de la escritura santa. The Head of State is nominally the person of worship, though in practice a worldly representative selected by merit, status, or birth."
 law_council_republic:0 "y Social Republic"
 law_council_republic_desc:0 "Un sistema político donde los trabajadores eligen delegados a los consejos locales. Amplia los conceptos de organización del lugar de trabajo a la gobernanza general."
 law_corporate_state:0 "Corporate State"
 law_corporate_state_desc:0 "Un sistema político basado en la colaboración institucionalizada entre grupos corporativos oficialmente reconocidos. El Estado sirve como foro para la negociación entre diferentes clases sociales."
 law_corporate_state_1:0 "Corporate State"
 law_corporate_state_1_desc:0 "Un sistema político basado en la colaboración institucionalizada entre grupos corporativos oficialmente reconocidos. El Estado sirve como foro para la negociación entre diferentes clases sociales."
  # Free speech group
 lawgroup_free_speech:0 "Discurso libre"
 lawgroup_free_speech_desc:0 "Leyes que regulan la libertad de expresión y el derecho a la asamblea pública."
  
 law_outlawed_dissent:0 "Disenso prohibido"
 law_outlawed_dissent_desc:0 "Criticar al gobierno es considerado traición e ilegal."
 law_censorship:0 "Censura"
 law_censorship_desc:0 "Existe una censura activa de la prensa y ningún derecho garantizado de reunión."
 law_right_of_assembly:0 "Derecho de la Asamblea"
 law_right_of_assembly_desc:0 "Los ciudadanos disfrutan del derecho a la asamblea pública."
 law_protected_speech:0 "Discurso protegido"
 law_protected_speech_desc:0 "La protección de la libertad de expresión está consagrada en la ley."
  
  # Army Model group
 lawgroup_army_model:0 "Modelo del Ejército"
 lawgroup_army_model_desc:0 "Cómo se organiza y regula su ejército."
  
 law_peasant_levies:0 "Peasant Levies"
 law_peasant_levies_desc:0 "La fuerza principal del ejército proviene de infantería conscripta con entrenamiento cero a básico."
 law_national_militia:0 "Milicia nacional"
 law_national_militia_desc:0 "El ejército de pie es pequeño, pero las milicias locales pueden ser activadas para defender sus hogares."
 law_mass_conscription:0 "Conscripción masiva"
 law_mass_conscription_desc:0 "Gran número de reclutas de infantería se puede activar según sea necesario para complementar el ejército profesional."
 law_professional_army:0 "Ejército Profesional"
 law_professional_army_desc:0 "El ejército está formado por regulares profesionales bien entrenados."
  
  # Distribution of Power group
 lawgroup_distribution_of_power:0 "Distribución del poder"
 lawgroup_distribution_of_power_desc:0 "Cómo se distribuye el poder político. Determina a quién es responsable el Jefe de Estado."
  
 law_autocracy:0 "Autocracia"
 law_autocracy_desc:0 "El poder del Jefe de Estado es absoluto y son responsables de ningún poder terrenal."
 law_oligarchy:0 "Oligarquía"
 law_oligarchy_desc:1 "El Jefe de Estado comparte el poder y la responsabilidad con un pequeño grupo de individuos poderosos y no elegidos."
 law_landed_voting:0 "Landed Voting"
 law_landed_voting_desc:0 "Los que poseen tierras o bienes de capital reciben un voto."
 law_wealth_voting:0 "Voto de riqueza"
 law_wealth_voting_desc:1 "Se concede a los ciudadanos ricos un voto. Los hombres de más riqueza reciben más votos."
 law_census_voting:0 "Census Suffrage"
 law_census_voting_desc:0 "Se somete a votación a los hombres con estatuto particular."
 law_universal_suffrage:0 "Sufragio universal"
 law_universal_suffrage_desc:0 "Cada hombre adulto tiene un voto igual."
 law_elder_council:0 "Elder Council"
 law_elder_council_desc:0 "Los hombres más venerados tienen un discurso en la gobernanza de la nación."
 law_anarchy:0 "Anarquía"
 law_anarchy_desc:1 "Las comunidades locales gobiernan sus propios asuntos y envían representantes para que presten servicios limitados en consejos cooperativos más grandes. Sin jerarquías formales, la autoridad central es difícil de ejercer."
 law_single_party_state: "Single-Party State"
 law_single_party_state_desc: "El Estado está gobernado por un solo partido político legal, que tiene el monopolio de toda actividad política dentro de la nación."
 ruler_in_party_tt: "El id=0 / título de esta nación es un miembro de un id=1 / título que tiene una política activa id=2/"
 sps_no_party_tt: "Esta nación no tiene ningún activo id=0"
 sps_government_reshuffle_tt: "id=0/propiedad se actualizará con los miembros de la única legal id=1/"
  
  # Voting System group
 law_first_past_the_post:0 "Primer Pasado El Post"
 law_first_past_the_post_desc:0 "También conocido como Winner Takes All, este sistema elige al candidato único que gana el mayor número de escaños en las subelesiones regionales. Tiende a crear gobiernos de partido único con mandatos fuertes, pero es vulnerable a la gerrymandering."
 law_proportional_representation:0 "Representación proporcional"
 law_proportional_representation_desc:0 "Este sistema distribuye escaños parlamentarios en proporción al número de votos emitidos. Tiende a crear gobiernos de coalición multipartidistas donde el compromiso es clave para hacer cualquier cosa."
  
  # Workplace Safety group
 lawgroup_labor_rights:0 "Derechos laborales"
 lawgroup_labor_rights_desc:0 "Los derechos de los trabajadores."
  
 law_serfdom:0 "Serpiente"
 law_serfdom_desc:0 "Los campesinos están atados a su tierra y deben realizar trabajos para sus maestros feudales."
 law_no_workers_rights:0 "No Workers' Rights"
 law_no_workers_rights_desc:0 "Los trabajadores no tienen derechos laborales particulares garantizados por el Estado."
 law_regulatory_bodies:0 "Órganos reguladores"
 law_regulatory_bodies_desc:0 "Se han creado instituciones gubernamentales para regular los excesos de empleadores."
 law_worker_protections:0 "Protección de los trabajadores"
 law_worker_protections_desc:0 "Los trabajadores gozan de amplias protecciones que están consagradas en la ley."
  
  # Children's Rights group
 lawgroup_childrens_rights:0 "Derechos de los niños"
 lawgroup_childrens_rights_desc:0 "The rights and protections afforded to children."
  
 law_child_labor_allowed:0 "Child Labor Allowed"
 law_child_labor_allowed_desc:0 "No se imponen restricciones legales en los casos en que los niños pueden trabajar."
 law_restricted_child_labor:0 "Restricted Child Labor"
 law_restricted_child_labor_desc:0 "Ningún niño está permitido en el piso de la fábrica."
 law_compulsory_primary_school:0 "Escuela primaria obligatoria"
 law_compulsory_primary_school_desc:0 "Todos los niños deben asistir a varios años de escuela primaria durante los cuales están prohibidos trabajar."
  
  # Slavery group
 lawgroup_slavery:0 "Esclavitud"
 lawgroup_slavery_desc:0 "Gente como propiedad."
  
 law_slavery_banned:0 "Prohibición de la esclavitud"
 law_slavery_banned_desc:0 "Ningún ser humano puede ser propiedad de otro."
 law_debt_slavery:0 "Debt Slavery"
 law_debt_slavery_desc:0 "Aquellos que no pueden despejar sus deudas en cambio pierden a su persona como propiedad de su acreedor."
 law_slave_trade:0 "Trata de esclavos"
 law_slave_trade_desc:0 "La demanda de mano de obra barata se cumple mediante un comercio deshumanizador de cuerpos extranjeros."
 law_legacy_slavery:0 "Legacy Slavery"
 law_legacy_slavery_desc:0 "Como compromiso entre abolicionistas y esclavistas, la institución de la esclavitud puede continuar mientras no se expanda."
  
  # Church and State group
 lawgroup_church_and_state:0 "Iglesia y Estado"
 lawgroup_church_and_state_desc:0 "La relación entre los gobernadores físicos y espirituales."
  
 law_state_religion:0 "State Religion"
 law_state_religion_desc:0 "La iglesia es un órgano oficial del estado. Todas las religiones minoritarias son discriminadas."
 law_freedom_of_conscience:0 "Libertad de conciencia"
 law_freedom_of_conscience_desc:0 "El estado tiene una religión oficial del estado pero la gente puede elegir qué creer. Sólo las religiones particularmente exóticas son discriminadas."
 law_total_separation:0 "Separación total"
 law_total_separation_desc:0 "Ninguna iglesia o fe puede interferir en las funciones gubernamentales. Ninguna religión puede ser discriminada."
 law_atheist_state:0 "Atheist State"
 law_atheist_state_desc:0 "Predicar la creencia religiosa está prohibida, y practicar uno es fruncido. Todas las religiones son discriminadas."
  
   # Citizenship group
 lawgroup_citizenship:0 "Ciudadanía"
 lawgroup_citizenship_desc:0 "Ampliación de los derechos de ciudadanía."
  
 law_ethnostate:0 "Ethnostate"
 law_ethnostate_desc:1 "El Estado se considera inextricablemente vinculado a una cierta etnia, con otras etnias excluidas de la ciudadanía. Todas las culturas extranjeras son discriminadas."
 law_national_supremacy:0 "Supremacía nacional"
 law_national_supremacy_desc:1 "El Estado define a sus ciudadanos por el cumplimiento de una determinada identidad nacional, que se considera suprema sobre todos los demás. Las culturas extranjeras son discriminadas a menos que compartan el patrimonio y el idioma (o otras costumbres)."
 law_racial_segregation:0 "Segregación racial"
 law_racial_segregation_desc:1 "El Estado considera que los derechos de ciudadanía están vinculados al concepto de patrimonio racial compartido. Las culturas extranjeras de diferente patrimonio son discriminadas."
 law_cultural_exclusion:0 "Cultural Exclusion"
 law_cultural_exclusion_desc:1 "El Estado ofrece derechos de ciudadanía a personas de todas las identidades culturales, mientras considera que una identidad oficial es primordial. Las culturas extranjeras sin nada en común con sus culturas primarias son discriminadas."
 law_multicultural:0 "Multiculturalismo"
 law_multicultural_desc:1 "El Estado defiende la igualdad de derechos de ciudadanía para las personas de todas las identidades culturales, y no trata de defender oficialmente una determinada cultura sobre otras. No se discriminan culturas."
 law_subjecthood: "Título"
 law_subjecthood_desc: "El Estado define a su pueblo sobre todo como sujetos de un soberano, haciendo poco esfuerzo para fomentar cualquier nacionalidad oficial. Las culturas se dejan en gran medida a sus propios dispositivos dentro de sus propias comunidades."

  # Caste Hegemony, a Social Stratification law group
 lawgroup_caste_hegemony: "Caste Hegemony"
 lawgroup_caste_hegemony_desc: "Erradicar los derechos entre los miembros de la sociedad sobre la base del Sistema de Caste Indio Británico."
 law_hindu_caste_enforced: "Sistema de Caste reforzado"
 law_hindu_caste_enforced_desc: "La jerarquía de la casta se aplica legalmente y previene la movilidad socioeconómica ascendente."
 law_hindu_caste_codified: "Sistema de Caste Codificado"
 law_hindu_caste_codified_desc: "La jerarquía de la casta es reconocida y utilizada para restringir la movilidad socioeconómica ascendente."
 law_hindu_caste_not_enforced: "Caste Not Enforced"
 law_hindu_caste_not_enforced_desc: "La movilidad socioeconómica basada en la casta no está legalmente restringida, pero la discriminación puede seguir persistiendo."
 law_affirmative_action: "Acción afirmativa"
 law_affirmative_action_desc: "Medidas activas para crear una situación socioeconómica equitativa, priorizando grupos previamente marginados."
  
  # Economic System group
 lawgroup_economic_system:0 "Sistema Económico"
 lawgroup_economic_system_desc:0 "Los principios fundamentales de su economía."

 law_traditionalism:0 "Tradicionalismo"
 law_traditionalism_desc:0 "Economía de subsistencia preindustrial con poco control central."
 law_agrarianism:0 "Agrarianism"
 law_agrarianism_desc:0 "Una economía rural que hace hincapié en el desarrollo agrícola y la comunidad."
 law_cooperative_ownership:0 "Propiedad cooperativa"
 law_cooperative_ownership_desc:0 "Un sistema económico basado en el concepto de propiedad social, donde la producción excedente se distribuye más equitativamente entre los trabajadores."
 law_command_economy:0 "Economía del Comando"
 law_command_economy_desc:0 "Una economía intervencionista centrada en el interior donde el gobierno gestiona directamente la mayoría de los aspectos de la producción."
 law_laissez_faire:0 "Laissez-Faire"
 law_laissez_faire_desc:0 "Una economía liberal fundada en los principios de ventaja comparativa y que menos intervenciones gubernamentales significa un crecimiento mayor"
 law_interventionism:0 "Intervencionismo"
 law_interventionism_desc:0 "Para garantizar la estabilidad de nuestra nación, el gobierno debe frenar los peores excesos de las empresas privadas."

 # Trade Policy group
 lawgroup_trade_policy:0 "Política comercial"
 lawgroup_trade_policy_desc:0 "Leyes que rigen el comercio y el intercambio de mercancías a través de las fronteras."
 
 law_free_trade:0 "Comercio libre"
 law_free_trade_desc:1 "No debe impedirse el libre intercambio de bienes, ya que el comercio redunda en beneficio de todos."
 law_protectionism:0 "Protectionism"
 law_protectionism_desc:0 "Nuestras industrias deben protegerse de las depredaciones de los actores del mercado extranjero."
 law_isolationism:0 "Isolationism"
 law_isolationism_desc:0 "Una economía se centró en abastecer internamente las necesidades de la nación, manteniendo al mismo tiempo fuera de los asuntos de otros."
 law_mercantilism:0 "Export-Focused"
 law_mercantilism_desc:0 "Una economía centrada en las exportaciones con énfasis en mantener una cuenta corriente positiva y competir con otras naciones."

  # Taxation Group
 lawgroup_taxation:0 "Tributación"
 lawgroup_taxation_desc:0 "Cómo el Estado recauda ingresos imponiendo a sus ciudadanos."
 law_consumption_based_taxation:0 "Impuestos basados en el consumo"
 law_consumption_based_taxation_desc:0 "Un sistema tributario donde no hay ingresos directos o impuestos per cápita y, en cambio, los ingresos se recaudan mediante la imposición del consumo de bienes."
 law_land_based_taxation:0 "Land-Based Taxation"
 law_land_based_taxation_desc:0 "Una forma tradicional de tributación terrestre, recogida principalmente del campesinado."
 law_per_capita_based_taxation:0 "Regressive Taxation"
 law_per_capita_based_taxation_desc:0 "Un sistema tributario que impuestos desproporcionadamente a los pobres mediante una combinación de ingresos y impuestos per cápita."
 law_proportional_taxation:0 "Tributación proporcional"
 law_proportional_taxation_desc:0 "Un sistema tributario basado principalmente en los ingresos que trata de asegurar que todos paguen una parte aproximadamente igual de sus ingresos al estado."
 law_graduated_taxation:0 "Tributación progresiva"
 law_graduated_taxation_desc:0 "Un sistema tributario que pretende poner la carga de la tributación principalmente en el bien-hacer a través de altos impuestos de dividendos."
  
  # Education System group
 lawgroup_education_system:0 "Sistema de educación"
 lawgroup_education_system_desc:0 "Porque cuando los niños se hacen con caricias barredoras."
  
 law_no_schools:0 "No hay escuelas"
 law_no_schools_desc:0 "La educación es responsabilidad de los padres. Sólo los ciudadanos más esparcidos aprenden a leer y escribir."
 law_religious_schools:0 "Escuelas religiosas"
 law_religious_schools_desc:0 "Dejar que la iglesia se ocupe de la educación estatal asegura una población leal y moralmente sana."
 law_private_schools:0 "Escuelas privadas"
 law_private_schools_desc:0 "La escolaridad es mejor para los intereses privados que pueden garantizar la libertad de elección en la propia educación."
 law_public_schools:0 "Escuelas públicas"
 law_public_schools_desc:0 "La escolarización es responsabilidad del Estado, y debe ser estandarizada e igualmente accesible para todos."
  
  # Health System group
 lawgroup_health_system:0 "Sistema de salud"
 lawgroup_health_system_desc:1 "Leyes sobre la participación del gobierno (o la falta de ella) en la prestación de atención médica a sus ciudadanos."
  
 law_no_health_system:0 "No Sistema de Salud"
 law_no_health_system_desc:1 "El gobierno no financia ningún sistema de salud."
 law_charitable_health_system:0 "Hospitales de Caridad"
 law_charitable_health_system_desc:0 "Las organizaciones caritativas —a menudo religiosas— proporcionan ayuda a cualquiera que esté enfermo o muriéndose, en la medida en que sean capaces."
 law_private_health_insurance:0 "Seguro de salud privado"
 law_private_health_insurance_desc:0 "La salud de la población se gestiona a través de un sistema de hospitales de propiedad privada pagados a través de programas privados de seguro médico, asegurando el bienestar de aquellos que pueden pagarlo con un impacto mínimo en el tesoro del gobierno."
 law_public_health_insurance:0 "Seguro de salud pública"
 law_public_health_insurance_desc:0 "El gobierno proporciona un programa de seguro médico financiado públicamente que garantiza un acceso igual a la atención de todos."
 
  # Welfare group
 lawgroup_welfare:0 "Bienestar"
 lawgroup_welfare_desc:0 "Asistencia gubernamental para los ingresos privados."
  
 law_no_social_security:0 "No Social Security"
 law_no_social_security_desc:0 "No es el papel del Estado proveer para aquellos que no pueden proveer para sí mismos."
 law_poor_laws:0 "Pobres leyes"
 law_poor_laws_desc:0 "Sacar a los vagabundos y a los hobos de nuestras calles y de los centros de trabajo vale la pena."
 law_wage_subsidies:1 "Subvenciones de salarios"
 law_wage_subsidies_desc:1 "Todos los que están dispuestos a trabajar tienen derecho a comer. Ningún hombre debe carecer de los medios para proveer a su familia."
 law_old_age_pension:0 "Pensiones de vejez"
 law_old_age_pension_desc:0 "Existe un límite práctico para la edad en que nuestra fuerza de trabajo ya no es eficiente y su bienestar ulterior debe caer bajo el ámbito del gobierno."
 law_disability_insurance:0 "Seguro de discapacidad"
 law_disability_insurance_desc:0 "Es responsabilidad del Estado cuidar de aquellos que, por no culpa propia, se encuentran incapaces de trabajar."
  
  # Rights of Women group
 lawgroup_rights_of_women:0 "Derechos de la Mujer"
 lawgroup_rights_of_women_desc:0 "Las normas legales del sexo más justo."
  
 law_no_womens_rights:0 "Legal Guardianship"
 law_no_womens_rights_desc:0 "Las mujeres están legalmente bajo la tutela de los hombres y gozan de muy pocos derechos."
 law_women_own_property:0 "Mujeres propietarias"
 law_women_own_property_desc:0 "Ya sea heredada o ganada de otro modo, incluso las mujeres tienen el derecho y el deber de poseer y apreciar sus posesiones."
 law_women_in_the_workplace:0 "Mujeres en el lugar de trabajo"
 law_women_in_the_workplace_desc:0 "¿Cómo podremos mantener los hornos de progreso en llamas con sólo la mitad de la fuerza laboral potencial?"
 law_womens_suffrage:0 "Sufragio femenino"
 law_womens_suffrage_desc:0 "En el ajuste del nuevo orden de cosas, las mujeres demandamos una voz igual; no aceptaremos nada menos."
  
  # Policing
 lawgroup_policing:0 "Policía"
 lawgroup_policing_desc:0 "Las prioridades de la policía nacional."

 law_no_police:0 "No Police"
 law_no_police_desc:0 "En este país no existe ningún tipo de fuerza policial estructurada."
 law_local_police:0 "Policía local"
 law_local_police_desc:0 "Este país tiene fuerzas policiales locales que operan."
 law_dedicated_police:0 "Dedicated Police Force"
 law_dedicated_police_desc:0 "Este país cuenta con una fuerza policial dedicada con formación estandarizada."
 law_militarized_police:0 "Militarized Police Force"
 law_militarized_police_desc:0 "Al dar a su policía equipo militar y entrenamiento militar, su eficacia en llevar a cabo su voluntad aumenta."
  
  # Bureaucracy
 lawgroup_bureaucracy:0 "Bureaucracy"
 lawgroup_bureaucracy_desc:0 "Cómo se administra su país."

 law_hereditary_bureaucrats:0 "Hereditary Bureaucrats"
 law_hereditary_bureaucrats_desc:0 "Los burócratas mantienen su posición a través de la herencia tradicional, pasando las responsabilidades a sus hijos."
 law_appointed_bureaucrats:0 "Nombrados burócratas"
 law_appointed_bureaucrats_desc:0 "Los burócratas son designados por los gobernantes para servir al interés superior del país a cambio de salarios altos."
 law_meritocratic_bureaucracy:0 "Meritocratic Bureaucracy"
 law_meritocratic_bureaucracy_desc:0 "Los burócratas vie for positions of power through merit. Con el tiempo esto crea enormes administraciones bizantinas."
 law_elected_bureaucrats:0 "Los burócratas elegidos"
 law_elected_bureaucrats_desc:0 "Los gobernadores locales son elegidos por sus constituyentes, descentralizando el poder y facilitando la gestión de los ciudadanos."
  
  # Colonization
 lawgroup_colonization:0 "Colonización"
 lawgroup_colonization_desc:0 "Su postura sobre establecer colonias para suplantar y conquistar id=0/año."
  
 law_no_colonial_affairs:0 "No Colonial Affairs"
 law_no_colonial_affairs_desc:0 "El país no participa en ningún tipo formal de colonización y no puede establecer colonias."
 law_colonial_resettlement:0 "Reasentamiento colonial"
 law_colonial_resettlement_desc:0 "Se establecen colonias para proporcionar tierras a los colonos de los estados incorporados del país."
 law_colonial_exploitation:0 "Explotación colonial"
 law_colonial_exploitation_desc:0 "Se establecen colonias para explotar el área por sus recursos naturales y mano de obra barata."
  
  # Internal Security
 lawgroup_internal_security:0 "Seguridad interna"
 lawgroup_internal_security_desc:0 "Mantener sus propios asuntos en orden."
  
 law_no_home_affairs:0 "No Home Affairs"
 law_no_home_affairs_desc:0 "El estado no hace ningún intento especial de poner fin a los disturbios y levantamientos."
 law_national_guard:0 "Guardia Nacional"
 law_national_guard_desc:0 "El Estado puede utilizar la fuerza militar para suprimir los disturbios domésticos."
 law_secret_police:0 "Policía secreta"
 law_secret_police_desc:0 "La policía secreta mantiene un estrecho seguimiento de los elementos radicales y los disidentes."
 law_guaranteed_liberties:0 "Libertades garantizadas"
 law_guaranteed_liberties_desc:1 "La oficina de asuntos internos del estado se centra exclusivamente en abordar los reclamos de los ciudadanos, y se prohíbe investigarlos o detenerlos sin causa debida."
  
  # Migration
 lawgroup_migration:0 "Migración"
 lawgroup_migration_desc:0 "Controlando el flujo de personas."
  
 law_no_migration_controls:0 "No Controles de Migración"
 law_no_migration_controls_desc:0 "El país no intenta controlar el movimiento a través de sus fronteras."
 law_migration_controls:0 "Controles de migración"
 law_migration_controls_desc:0 "Sólo las personas de culturas y religiones no discriminadas pueden emigrar dentro o fuera del país."
 law_closed_borders:0 "Fronteras cerradas"
 law_closed_borders_desc:0 "No se permite la migración dentro o fuera del país."

 liberate_slaves_tt:0 "Todos los id=0/año serán liberados"
 enslave_discriminated_farm_workers_tt:0 "Todo id=0/año con bajo id=1/ título trabajando en fincas, ranchos y plantaciones en antiguos Estados eslavos será id=2/(conocido)."
 
 enact_law_radical_leftist_government_warning_desc:0 "Enacting this idx id=1/Consejo puede causar id=2/Consejo sin una forma similar de idx id=3/ consiente para volverse agresivo contra nosotros."
 enact_law_radical_leftist_economy_warning_desc:0 "Enacting this idx id=1/Consejo puede causar id=2/Consejo sin una forma similar de idx id=3/ consiente para volverse agresivo contra nosotros."

 # Labour Associations
 lawgroup_labour_associations: "Labor Associations"
 lawgroup_labour_associations_desc: "Reglamento sobre las asociaciones de obreros y artesanos."

 law_guild_system: "Guild System"
 law_guild_system_desc: "Un sistema en el que la elegibilidad para el empleo dentro de ciertos campos depende de la pertenencia a un oficio formalizado o un gremio comerciante."
 law_combination_acts: "Actos de combinación"
 law_combination_acts_desc: "La formación de asociaciones laborales de cualquier tipo está prohibida por la ley."
 law_anti_strike_laws: "Anti-Strike Laws"
 law_anti_strike_laws_desc: "Mientras se permite la formación de asociaciones laborales, se prohíben huelgas y ciertas formas de negociación colectiva."
 law_right_to_associate: "Derecho a Asociado"
 law_right_to_associate_desc: "No se imponen restricciones especiales a la formación y actividad de las asociaciones laborales."
 law_corporatized_unions: "Corporatized Unions"
 law_corporatized_unions_desc: "Las asociaciones laborales están bajo el control del Estado, ya sea mediante la amalgama obligatoria en una sola unión nacional o la incorporación de asociaciones existentes en funciones estatales."


# Luddites
 law_industry_banned: "Industria prohibida"
 law_industry_banned_desc: "Una visión económica que rechaza la industria pesada y la automatización, prefiriendo los frutos del trabajo honesto sobre la maquinaria sin alma."
 industry_banned_tt: "Ya no será posible construir Industria pesada: edificios id=1/"
 industry_banned_destroy_tt: "id=0/conferencia Todos id=1/ Se desmantelarán los edificios de Heavy Industry madex id=2/tio en este país"
 ideology_luddite: "Luddite"
 ideology_luddite_desc: "Los luddites se oponen a la automatización industrial, o en casos más extremos a la propia industria."

  
 law_extraction_economy: "Extracción Economía"
 law_extraction_economy_desc: "Un sistema económico colonial que se centra en la máxima extracción de capital en beneficio de la metrópoli."

# Land Reform Laws
 lawgroup_land_reform: "Reforma agraria"
 lawgroup_land_reform_desc: "Las leyes que rigen la tierra agrícola y las personas que la trabajan."
 law_tenant_farmers: "Inquilinos"
 law_tenant_farmers_desc: "La tierra agrícola es propiedad de élites hereditarias. Los trabajadores no están vinculados a la tierra, y pueden buscar empleo alternativo si pueden encontrarla."
 law_homesteading: "Homesteading"
 law_homesteading_desc: "Los agricultores reclaman parcelas de tierra que trabajan junto a sus trabajadores contratados."
 law_commercialized_agriculture: "Agricultura comercial"
 law_commercialized_agriculture_desc: "La agricultura es un negocio como cualquier otro, sujeto a las fuerzas del mercado y propiedad del capital."
 law_collectivized_agriculture: "Agricultura colectivizada"
 law_collectivized_agriculture_desc:1 "La tierra agrícola se organiza en parcelas trabajadas por grupos de agricultores como empresa conjunta."

 pm_homesteading: "Homesteading"
 pm_homesteading_building_subsistence: "Homesteading"
 pm_privately_owned_plantation: "Privadamente"
 pm_publicly_traded_plantation: "Publicly Traded"
 pm_government_run_plantation: "Government Run"

 # Jacksonian Democrat
 ideology_jacksonian_democrat: "Jacksonian Democrat"
 ideology_jacksonian_democrat_desc: "Este personaje aboga por una mayor participación pública en el gobierno - para una determinada definición de 'público'."

