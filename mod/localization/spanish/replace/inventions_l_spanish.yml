   #hereditary_aristocracy: "Hereditary Aristocracy"
  # Categories
  # Culture Technology
  # Economy Technology
  # Military Technology
  ### Technology Tooltips
  ##lenders_of_last_resort: "Lenders of Last Resort"
  ##lenders_of_last_resort_desc: "State-owned central banks are large enough to come to the rescue of smaller commercial banks, such as during bank runs. This can prevent a financial crisis spreading to other sectors of the economy. Often, even the promise of rescue in times of difficulty is enough to prevent bank runs occurring in the first place. Some 'critics' claim that such a promise will encourage risky behavior by the commercial banks, but these 'critics' are surely just anarchists looking to wreck the nation's economic security, as bankers are some of the most trustworthy people to walk the halls of power."
  ##limited_liability: "Limited Liability"
  ##limited_liability_desc: "A limited liability company draws a legal distinction between the company and its owners. This helps prevent the bankruptcy of a company ruining the personal lives of the investors, as creditors will not try to haul off the furniture of failed businessmen to recoup losses. This makes investing less risky, if perhaps less satisfying to watch from afar. As a separate legal entity, the company has its own finances that must be audited and taxed."
  ##marketing_desc: "Promotional schemes to grab more market share or create a new market from scratch were devised by Josiah Wedgwood, leader of the expanding pottery industry at the dawn of the Industrial Revolution."
  ##paper_money: "Paper Money"
  ##paper_money_desc: "A kind of promissory note issued by a bank, paper money allows private citizens to move and exchange large volumes of currency without the danger and discomfit of gold or silver coins which cannot be divided and are heavy to carry. Thus, commercial exchanges are easier and safer."
  ##regulated_private_notes: "Regulated Private Notes"
  ##regulated_private_notes_desc: "Bankers realized hundreds of years ago that their customers only rarely demand back their deposits all at once. By issuing loans in excess of their reserves in the form of private bank notes, bankers could make even more money from interest. Unfortunately, when all the bank's customers do demand their deposits at once, there will not be enough reserves. With better communications technology, these 'bank runs' become more frequent. To prevent bank runs, governments can restrict the issuance of private notes only to banks that meet certain criteria of fiduciary responsibility, such as being close personal friends to the finance minister."
  #alcohol: "Alcohol"
  #alcohol_desc: "An ancient technology, presumably discovered when a tribesman left some grain in a puddle and decided to drink it after a few months had passed, alcohol became central to the discipline of alchemy, and continues to serve men of reason in the field of chemistry in various processes, some of which do not involve drinking it."
  #atomic_theory_of_matter: "Atomic Theory of Matter"
  #atomic_theory_of_matter_desc: "Observations in chemistry seem to have disproven the notion held by supporters of phlogiston that matter is composed of the three fundamental essences of solidity, fluidity and inflammability. Air is not merely a void into which phlogiston flows during combustion - it contains oxygen, which combines with other matter during chemical reactions."
  #bankruptcy_law: "Bankruptcy Law"
  #bankruptcy_law_desc: "Having a legal framework for a company to declare bankruptcy allows investors and creditors to try to recoup losses via liquidation of assets. This makes investment less risky."
  #building_societies: "Building Societies"
  #building_societies_desc: "Originally set up within communities to help new families raise loans with which to buy homes and then disbanded once the members had all satisfied their requirements, building societies can also be permanent financial institutions that specialize in cheap mortgages."
  #census: "Census"
  #census_desc: "Knowing how many people we have in our country and roughly were they live is important so we know where to spend out money and how many men we will have if we have to fight. Should we be involved in that grubby business of having our lower orders actually having representation I suppose it will have a use for that as well."
  #chemical_batteries: "Chemical Batteries"
  #chemical_batteries_desc: "Electricity can be generated by exploiting the difference in charge as electrolytes pass through oxidation and reduction cells containing copper and zinc cathodes and annodes. Early experiments in this field took the form of a series of jars which had the appearance of a battery of artillery, hence the name."
  #civil_service: "Civil Service"
  #civil_service_desc: "The idea that the government should have a body of men on which they rely on to carry out administration is neither new nor necessarily efficient. The radical idea that people should be selected for these positions on merit and ability and that they should keep their positions if the government is changed are radical and leads to greater efficiency."
  #clinical_thermometer: "Clinical Thermometer"
  #clinical_thermometer_desc: "The mercury thermometer had been around since the mid 18th century. Its use for medical purposes were limited as they tended to be large (over a foot long) and could take over 20 minutes to measure someone's temperature. Now we have made the thermometer smaller and it only takes a few minutes to get a reading, making it truly useful for doctors."
  #commercial_banks: "Commercial Banks"
  #commercial_banks_desc: "Businesses need various financial services to operate normally. Payroll at the end of the month might require a short loan to cover a temporary shortfall. Expanding the business might likewise require borrowing, especially if the business is a limited liability company rather than a personal venture. Commercial banks offer financial services to these companies, as opposed to wealthy private individuals, middle-class savers or professional investors."
  #cooperatives: "Co-Operatives"
  #cooperatives_desc: "Intended as a mutually beneficial organization to help small businesses and workers buy basic necessities, a co-operative tends to be run democratically by its members to achieve social good rather than pure profit."
  #credit_unions: "Credit Unions"
  #credit_unions_desc: "Rather than being operated for the profit of an owner or shareholders, credit unions are a financial institution which tries to improve the welfare of its members through access to credit. They tend to be run democratically, with each member having a vote on the director of the credit union."
  #customs_tariffs: "Customs Tariffs"
  #customs_tariffs_desc: "Tariffs are a very important weapon in a government's arsenal. They can be used both to raise revenue and to 'guide' merchants and businesses into making choices beneficial to the national interest, as determined by the government. Tariffs can be charged on entry into a country, for the use of port facilities, or on the price of imported or exported goods. One important use for tariffs is in protecting native industries against more efficient foreign companies, which can give domestic firms time to catch up with their rivals abroad."
  #department_stores: "Department Stores"
  #department_stores_desc: "Having one large store that sells a huge variety of goods can be more convenient for customers and gives the retailer more buying-power over the distribution chains."
  #distribution_channels: "Distribution Channels"
  #distribution_channels_desc: "Companies can be structured to sell goods in a number of ways. Raw materials are generally sold to other industries; industries might then sell manufactured goods to wholesalers such as brokers; wholesalers then sell goods to retailers such as specific shops or chains of shops, and the retailer then sells the goods to the final customer. Innovations in this area include factory or outlet stores, which sell goods directly to customers from the factory complex, such as to workers and their families and community."
  #enclosure_acts: "Enclosure Acts"
  #enclosure_acts_desc: "Enclosure is the process of taking small strips of peasant land, passed down from father to son since the beginning of feudalism, and 'combining' them under one owner via Acts of Parliament. By merging these subsistence plots into enclosed fields, arable land can be turned into pasture, capital goods such as machinery can be invested in, and many small surpluses can be merged into a significant profit. Where the landless peasants go is up to them - am I my brother's keeper?"
  #espionage: "Espionage"
  #espionage_desc: "Know thy enemy. Knowledge of what is going on in places that could be hostile to us is vital if we are going to keep out country safe. This can be in the form of the mundane, like ensuring proper maps exist of areas we may end up being at war in to the significant like enemy forces and plans."
  #gold_standard: "Gold Standard"
  #hereditary_aristocracy_desc: "As a society becomes more productive enough food can be generated to allow people to specialize and do things that do not require you to farm. A military caste to protect yourself from hostile neighbors is a natural development and eventually they will entrench their position and hereditary aristocracy is born."
  #insurance: "Insurance"
  #insurance_desc: "Insurance against loss of property has existed for many hundreds of years, being especially important for merchant vessels traveling overseas. As global trade becomes more prevalent, the need for more secure maritime insurance increases. Lloyd's of London began as a specialist for maritime insurance but has expanded into other markets such as insuring properties against fire damage."
  #malthusianism: "Malthusianism"
  #malthusianism_desc: "Population is increasing much faster than our food supply. We must face the fact that if we allow this to continue we will face a catastrophe for our people. Further more we must face the face any such catastrophe will hurt the lower classes the most. The Tory ideal of paternalism is not good nor noble but instead will lead to a greater catastrophe on the least fortunate."
  #manifest_destiny: "Manifest Destiny"
  #manifest_destiny_desc: "If we are to spread our civilization to those less fortunate to have we must accept the fact that we have been uniquely blessed with virtues and institutions that others simply do not have. We have a mission to redeem the less fortunate by remaking them in our own image. It is no more that our destiny to do this."
  #oceanic_cablelaying: "Oceanic Cablelaying"
  #oceanic_cablelaying_desc: "With the technology of the telegraph, thought soon turned to how to lay a cable under bodies of water. Although it proved not technically difficult to lay cables of short stretches of water (like bays and straits), the wide oceans proved a greater challenge. Good news - after several false starts we have successfully mastered the techniques to lay such a cable so no longer must we rely on the good will of others."
  #ophthalmoscope: "Opthalmoscope"
  #ophthalmoscope_desc: "'every eye could be made luminous if the axis from a source of illumination directed towards a person's eye and the line of vision of the observer were coincident', this discovery revolutionized the treatment of eye problems. Creating a hand held device with a mirror that could shine the light, the ophthalmoscope, was made the doctor's life a lot easier."
  #positivism: "Positivism"
  #positivism_desc: "We we consider what knowledge is we know that there is certain knowledge. Information that comes from sensory experience and  then interpretation comes through logic and reason is the exclusive source of certain knowledge. We can extend this from the physical world to societies as a whole. Societies operate under general laws which if we took the time to analyze we would understand. Theology must be rejected because faith by its very nature denies reason and verification."
  #postal_banks: "Postal Banks"
  #postal_banks_desc: "Rural and otherwise isolated communities may not have access to a local bank branch. In such cases, a postal bank can operate to offer them financial services, such as savings and a current account, without the need to travel into a town or city."
  #savings_banks: "Savings Banks"
  #silver_standard: "Silver Standard"
  #vertical_filing_cabinet: "Vertical Filing Cabinet"
  #vertical_filing_cabinet_desc: "Gone but not forgotten"
 admiralty:0 "Radar moderno"
 admiralty_desc:0 "El Almirantazgo es un complejo sistema de filas conectadas por una cadena de mando rígida para ayudar al trabajo naval de manera más eficiente."
 anaesthetics:0 "Anaestética"
 anaesthetics_desc:0 "Los anestesias son sedantes o analgésicos usados durante la cirugía para evitar que los pacientes sientan los cuchillos y el prodding invasivo del personal médico, que podría ser desconfiado."
 anarchism:0 "Mercado Socialismo"
 anarchism_desc:0 "El socialismo de mercado es un tipo de sistema económico que implica la propiedad social de los medios de producción en el marco de una economía de mercado. Existen varios modelos para ese sistema, que suelen incluir empresas cooperativas y a veces una mezcla que incluye empresas públicas o privadas."
 aniline:0 "Algoritmo de aprendizaje automático"
 aniline_desc:0 "un proceso o conjunto de reglas a seguir en cálculos u otras operaciones de solución de problemas, especialmente por un ordenador. Utilizado por las empresas de redes sociales para evaluar los deseos del consumidor."
 anti_clericalism:0 "Anti-Clericalismo"
 anti_clericalism_desc:0 "Los corruptos del poder y las instituciones religiosas no son más inmunes a esta corrupción que los demás. Pueden pretender ofrecer salvaciones a las masas, pero en lugar de ello el deseo de emplumar sus propios nidos y negar los derechos a los que consideran indignos. Debemos barrer la influencia de la religión organizada de nuestra esfera pública y dejar esa materia como opción a los no iluminados."
 antibiotics:0 "Erradicación del cáncer"
 antibiotics_desc:0 "La edición genética permite la creación de genes insosceptibles para el cáncer y otras enfermedades."
 antiseptics:0 "Antisépticos"
 antiseptics_desc:0 "La ciencia ha establecido que la exposición al calor destruirá los gérmenes. El problema es que no es una solución válida cuando se trata de tejido vivo. Sin embargo, cuando se realizaron experimentos donde las heridas estaban cubiertas con almohadillas empapadas una solución de fenol vimos incidentes de gangrena dramáticamente declinación. Esta ciencia de antiescépticos ha nacido."
 arc_welding:0 "Colonización interplanetaria"
 arc_welding_desc:0 "La colonización de diferentes planetas"
 army_reserves:0 "Comida, lista para comer"
 army_reserves_desc:0 "Una comida a la carta (MRE) es una ración militar diseñada para una larga vida útil, con una alta diversidad de opciones alimentarias."
 art_patronage:0 "Patronaje de Arte"
 art_patronage_desc:0 "El arte no es libre y para desarrollar el arte y la cultura que usted necesita para tomar un interés y apoyo arte. A cambio de hacer esto ganan prestigio por tener cosas tan hermosas a su alrededor."
 art_silk:0 "Vida artificial"
 art_silk_desc:0 "Crear organismos con genomas sintéticos o diseñar organismos con propiedades completamente nuevas y no naturales. Los genomas sintéticos se han utilizado para crear nuevas formas de vida desde cero, como la primera bacteria sintética creada por Craig Venter y el equipo en 2010."
 artificial_fertilisers:0 "Fertilizantes artificiales"
 assembly_line:0 "Assembly Line"
 assembly_line_desc:0 "Al racionalizar el proceso de construcción de las cosas para que cada acción se haga correctamente después de la otra acción se puede hacer una fábrica mucho más eficiente."
 atmospheric_engine:0 "Clean Energy"
 atmospheric_engine_desc:0 "Métodos de producción de energía limpia, como molinos de viento, permiten la generación de energía sin causar contaminación"
 automatic_bottle_blowers:0 "Mycoremediation"
 automatic_bottle_blowers_desc:0 "Esto implica el uso de hongos para degradar contaminantes ambientales. Los hongos pueden utilizarse para descomponer materiales peligrosos, como los productos derivados del petróleo y los solventes industriales."
 battlefleet_tactics:0 "Spacefleet-Battlefleet Tactics"
 battlefleet_tactics_desc:0 "Operar una gran flota de batalla puede ser una tarea difícil. Al practicar y aprender tácticas específicas como flota, se puede lograr un mayor rendimiento."
 battleship_tech:0 "Destructor guiado-drone"
 battleship_tech_desc:0 "Naves de combate ultramasivos capaces de volar grandes extensiones de océano"
 bessemer_process:0 "Polímeros"
 bessemer_process_desc:0 "Los tejidos sintéticos permiten la producción masiva de bienes comunes para los menos afortunados."
 bessemer_steel:0 "Bessemer Steel"
 bessemer_steel_desc:0 "El Proceso Bessemer destruye el aire frío en hierro fundido, quema de carbono, silicio y manganeso, y crea acero suave. Esto no es tan alta calidad como la producida en los crisoles, pero es mucho más barato, permitiendo el uso de minerales de hierro de grado inferior y permitiendo la producción masiva de líneas ferroviarias y hormigón armado."
 biological_determinism:0 "Determinismo biológico"
 biological_determinism_desc:0 "El estudio de la genética y la herencia en la naturaleza abre preguntas sobre cuánto comportamiento humano es determinado por la biología."
 feminism:0 "Environmentalist Economics"
 feminism_desc:0 "El ambientalismo o los derechos ambientales es una filosofía amplia, ideología y movimiento social sobre el apoyo a la vida, los hábitats y el entorno."
 blast_furnaces:0 "Hornos de limpieza"
 blast_furnaces_desc:0 "Se utiliza un horno de explosión para añadir oxígeno extra a procesos metalúrgicos como la fundición de mineral, originalmente con las túnicas de mano o con ruedas de agua. Esto hace que el horno alcance temperaturas aún mayores que un horno de aire abierto, quemando impurezas y permitiendo aleaciones de metales exóticos. El horno de explosión es especialmente útil para la producción de hierro de cerdo, que se puede hacer en hierro forjado o acero suave utilizando procesos más avanzados."
 bolt_action_rifles:0 "Cibernética"
 bolt_action_rifles_desc:0 "Los soldados autónomos tenían la intención de salvar vidas reales en el estallido de la guerra."
 chemical_bleaching:0 "Personal Computer"
 chemical_bleaching_desc:0 "La computadora personal surgió a mediados de los años 80, con productos como el Apple II, Macintosh y el IBM PC, haciendo que la informática sea accesible a individuos y pequeñas empresas."
  # bone_china: "Bone China"
  # bone_china_desc: "Bone China is a form of porcelain which in part is made from bone ash, the greater strength of this type of porcelain makes it rather valuable."
 # artillery: "Artillery"	// There is already a loc key for this in Goods, require prefix to support unique localization
 artillery_desc:0 "El bombardeo de larga distancia con municiones pesadas intimida y dispersa fuerzas enemigas sin arriesgar sus propias tropas. Inexacto, lento y caro, pero un ingrediente crucial en cualquier ejército moderno."
 breech_loading_artillery:0 "Batería de misiles de largo alcance"
 breech_loading_artillery_desc:0 "Las baterías de misiles de largo alcance, como las HIMARS, fascilitan la destrucción de objetivos muy lejanos en territorio extranjero."
 tech_bureaucracy:0 "Social Liberalism"
 tech_bureaucracy_desc:0 "El liberalismo social es una ideología que defiende un mercado libre con fuerte influencia gubernamental &quot; control para proteger a los menos afortunados."
 centralization:0 "Capitalismo autoritario"
 centralization_desc:0 "Relacionado y superpuesto con el capitalismo estatal, un sistema en el que el Estado realiza actividad comercial, el capitalismo autoritario combina la propiedad privada y el funcionamiento de las fuerzas del mercado con restricciones al disentimiento."
 camera:0 "Starlink"
 camera_desc:0 "Starlink es una constelación de internet por satélite operada por Starlink Services, LLC, un proveedor internacional de telecomunicaciones que es una filial de propiedad total de la empresa aeroespacial estadounidense SpaceX"
 canals:0 "Canales"
 canals_desc:0 "Las barcazas costeras y fluviales son un método muy eficiente de transporte de mercancías. El desplazamiento de canales en el interior de un país amplía la cobertura de estas barcazas, aunque puede ser una propuesta costosa cuando diferentes alturas necesitan ser puenteadas por sistemas de bloqueo."
 canneries:0 "Alimentos ultraprocesados"
 canneries_desc:0 "Los alimentos ultraprocesados (UPF) son alimentos que han sido alterados significativamente de su forma original mediante el uso de procesos industriales y la adición de ingredientes que no se encuentran típicamente en una cocina casera."
 canning_jars:0 "Canning Jars"
 canning_jars_desc:0 "Los ejércitos de la Revolución Francesa requerían soluciones innovadoras para sus problemas de oferta. Una solución era cocinar la comida dentro de los frascos de vidrio, para prevenir los mal humores y el miasma mezclando con el contenido y así estropear las raciones. La cera fundida se derrama en la boca del frasco para actuar como un sello contra el mundo exterior."
 canning_machines:0 "Máquinas de canto"
 canning_machines_desc:0 "La producción temprana de alimentos enlatados carece de automatización. Las latas fueron rodadas y soldadas a mano. El uso de máquinas para convertir rápidamente la tinplate en latas mejora los estándares y aumenta el rendimiento."
 carrier_tech:0 "Lancha láser"
 carrier_tech_desc:0 "Las lanchas láser son vasos con un láser de alta potencia para eliminar rápidamente los drones entrantes."
 catalytic_contact_process:0 "Proceso de contacto catalítico"
 catalytic_contact_process_desc:0 "En 1831, el comerciante de vinagre británico Peregrine Phillips inventó un proceso para producir ácido sulfúrico más concentrado utilizando platino como convertidor catalítico. Aunque no es especialmente útil para la producción de soda o fertilizante de ceniza, esto pronto se convirtió en un granero para la producción de tinte orgánico."
 chemical_isolation:0 "Aislamiento químico"
 chemical_isolation_desc:0 "Los productos químicos pueden ser purificados de muchas maneras, como destilación, filtración y evaporación. La calidad del proceso de purificación obviamente afectará la calidad del aislato."
 chemical_synthesis:0 "Síntesis química"
 chemical_synthesis_desc:0 "La orina de perros fue famosamente sintetizada por el químico alemán Friedrich Wöhler en 1828. Esto comenzó a desdibujar los límites entre la química orgánica e inorgánica, y a medida que se están abriendo más productos químicos nuevos procesos industriales sintetizados."
 chemical_warfare:0 "AI-Terrorism"
 chemical_warfare_desc:0 "Ciertas combinaciones químicas producen efectos adversos o incluso fatales cuando los humanos están expuestos a ellos. Armonizar esto trae un nuevo aspecto horrible a la guerra."
 civilizing_mission:0 "CRISPR Gene Editing"
 civilizing_mission_desc:0 "La edición genética a través de CRISPR permite que los humanos crezcan nuevos órganos."
 colonization:0 "El ultrasonido"
 colonization_desc:0 "Avances a finales del siglo XX en trasplante de órganos, imágenes médicas a través de RM y tomografía computarizada, y maquinaria óptica permitida para tratamientos más especializados y negativos para condiciones individuales"
 color_photography:0 "Fotografía de color"
 color_photography_desc:0 "Técnica temprana para capturar fotografías a todo color, basada en ideas sobre cómo la luz es percibida por el ojo. Al tomar efectivamente tres fotos a través de diferentes filtros de color, estos se pueden combinar en una imagen recreando los colores originales."
 combination_acts:0 "Actos de combinación"
 combination_acts_desc:0 "Los hombres de trabajo reunidos en juramentos secretos y jurando entre sí son una amenaza para la seguridad del estado y claramente un medio para que el radical Jacobin subvierta al estado. También podría ser una amenaza para nuestra capacidad de defendernos de enemigos externos debido a las amenazas de acción de los hombres trabajadores en momentos críticos del conflicto. Pasaremos una serie de leyes que nos permitirán regular ese comportamiento por el bien común."
 combustion_engine:0 "Nanocoatings"
 combustion_engine_desc:0 "Se aplican a varias superficies para hacerlas más resistentes a la corrosión, el desgaste y las manchas. Se están desarrollando superficies autolimpiables y nanocoatings antibacterianos para aplicaciones en salud, electrónica y construcción."
 central_planning:0 "Gobernanza digital"
 central_planning_desc:1 "Permite al gobierno correr a través de varios sistemas informáticos seguros."
 compound_microscopes:0 "Microscopios compuestos"
 compound_microscopes_desc:0 "Los lentes utilizados en la óptica requieren habilidades de vidrio muy finas. Una innovación en este campo es utilizar dos lentes, uno centrado en un objeto y el otro centrado en la primera lente, para aumentar la magnificación. Este microscopio se puede utilizar para ver las bacterias vivientes."
 compression_ignition:0 "Energy From Waste"
 compression_ignition_desc:1 "Al convertir los residuos almacenados en vertederos en energía, nuestro mundo puede generar grandes cantidades de energía"
 concrete_dockyards:0 "Campos de ensayo artificiales"
 concrete_dockyards_desc:0 "Probando rangos totalmente generados dentro de AI."
 concrete_fortifications:0 "Fortificaciones futuras"
 concrete_fortifications_desc:0 "Al introducir hormigón en fortificaciones es posible hacer posiciones fuertes arraigadas muy rápidamente."
 condensed_milk:0 "Milk condensado"
 condensed_milk_desc:0 "Normalmente, la leche debe consumirse rápidamente después de ser extruída de una glándula mamaria bovina. Al bajar la presión dentro de un recipiente, como una cacerola de vacío, el contenido de agua de la leche se evapora, y la leche condensada se puede enlazar y vender."
 conspicuous_consumption:0 "Consumo visible"
 conspicuous_consumption_desc:0 "La riqueza tiene un prestigio propio. Las muestras de riqueza pueden hacer que uno parezca más prestigioso y ayudar a avanzar a través de las clases sociales, abriendo nuevas oportunidades para el escalador social como contactos con empresarios y políticos. En una sociedad materialista, las frivolidades y la extravagancia paradójicamente ayudan a ser más ricos."
 conveyors:0 "Factores automatizados"
 conveyors_desc:0 "Mediante la aplicación de los últimos sistemas de inteligencia artificial, es posible crear plataformas que muevan mercancías a lo largo de ellos sin el uso del trabajo humano."
 cotton_gin:0 "Automóviles modernos"
 cotton_gin_desc:0 "Los automóviles permiten el transporte rápido de bienes de la gente en todas las tierras."
 crucible_steel:0 "Acero crucificado"
 crucible_steel_desc:0 "Producido por la aplicación de calor a un crisol de piedra que contiene hierro en polvo y carbón, esta aleación de alto carbono se cree que es similar a "Acero de Damasco", creado en la India y Persia hasta alrededor de 1750. Este proceso produce acero de alto grado adecuado para uso en herramientas, resortes y otros objetos extra duros y costosos."
 law_enforcement:0 "Racismo sistémico"
 law_enforcement_desc:1 "El racismo sistémico es una forma de discriminación institucional basada en la raza o el grupo étnico y puede incluir políticas y prácticas que existen en toda una sociedad u organización que dan lugar a una ventaja injusta y constante a algunas personas y al trato injusto o nocivo de otros."
 defense_in_depth:0 "Targetting AI-Driven"
 defense_in_depth_desc:0 "Al hacer múltiples líneas de defensa, es posible extender y frenar al enemigo y a veces incluso envolverlos."
 democracy:0 "Caída del Bloc Oriental"
 democracy_desc:0 "A finales del decenio de 1980, una serie de acontecimientos llevaron al colapso del comunismo en Europa oriental."
 distillation:0 "Electrodomésticos"
 distillation_desc:0 "Los aparatos incluyen el uso de hornos, reductores, microondas, mezcladores, hervidores y otros artículos domésticos utilizados en la producción de alimentos."
 divine_revelation:0 "Revelación Divina"
 divine_revelation_desc:0 "La base de toda la ley se deriva en nuestras sagradas escrituras. Sólo mediante la obediencia a un poder superior se puede ordenar adecuadamente a nuestra sociedad y garantizar la estabilidad."
 watertube_boiler:0 "Robotics"
 watertube_boiler_desc:0 "Los robots fueron introducidos en líneas de montaje, especialmente en la industria del automóvil, para mejorar la precisión, la velocidad y la seguridad."
 dreadnought_desc:0 "Los portadores de drones, similares a los portaaviones de hoy, llevan enjambres de drones y desencadenan ataques devastadores contra nuestros enemigos."
 dreadnought_tech:0 "Drone Carrier"
 dynamite:0 "Deep-Sea Mining"
 dynamite_desc:0 "El desarrollo de tecnologías mineras de aguas profundas avanzó significativamente en los años 2000, ya que las empresas comenzaron a explorar la extracción de minerales valiosos (por ejemplo, nódulos polimetálicos, metales de tierras raras) del suelo oceánico."
 egalitarianism:0 "Guerra contra el terrorismo"
 egalitarianism_desc:0 "La guerra contra el terrorismo, oficialmente la Guerra Mundial contra el Terrorismo (GWOT), se llevó a cabo como una campaña militar global iniciada por Estados Unidos tras los ataques del 11 de septiembre de 2001."
 electric_arc_process:0 "Neuralink"
 electric_arc_process_desc:0 "Empresas como Neuralink y Synchron están desarrollando interfaces de computador cerebral que permiten una comunicación directa entre el cerebro y los dispositivos digitales. Estas interfaces podrían revolucionar los tratamientos médicos, incluyendo ayudar a las personas con parálisis a recuperar el movimiento, mejorar las habilidades cognitivas y ofrecer nuevas formas de interactuar con la tecnología."
 electric_railway:0 "Transporte público masivo"
 electric_railway_desc:0 "Con los coches insostenibles, el transporte público entre las ciudades puede funcionar en masa"
 electrical_generation:0 "Computación cuántica"
 electrical_generation_desc:0 "Se espera que las computadoras cuánticas se utilicen para problemas complejos que actualmente son intrínsecos para las computadoras tradicionales, como: descubrimiento de drogas, simulaciones de ciencias materiales, criptografía avanzada, pronóstico del tiempo, modelado financiero, desarrollo de inteligencia artificial y problemas de optimización en campos como la logística y la producción de energía, principalmente aprovechando su capacidad para procesar grandes cantidades de datos y resolver problemas con muchas variables simultáneamente a través de la superposición cuántica y enredamiento."
 elevator:0 "Elevation Pods"
 elevator_desc:0 "Transport Pods, similar a ascensores, que pueden moverse a altas velocidades."
 empiricism:0 "World Wide Web"
 empiricism_desc:0 "La World Wide Web (WWW o simplemente la Web) es un sistema de información que permite compartir contenidos a través de Internet mediante formas fáciles de usar destinadas a atraer a usuarios más allá de especialistas en TI y hobbyists."
 enlightenment_thought:0 "Iluminación Pensamiento"
 enlightenment_thought_desc:0 "Durante la Era de la Razón, los viejos dogmas comenzaron a ser cuestionados. Ya no se aceptó que "Dios lo quiere", y aquellos en el poder comenzaron a tener que justificar su posición en la sociedad. Incluso los monarcas absolutos vieron el prestigio de estas nuevas ideas, y los 'Despots iluminados' reformaron los sistemas educativos, legales y económicos de Europa. Sin embargo, estas reformas no fueron lo suficientemente lejos, y pensadores como John Locke, Voltaire, Jean-Jacques Rousseau y Thomas Paine dirigieron un ataque contra el establecimiento que culminó en revoluciones en América y Francia que inspiraron a los liberales en todo el mundo."
 fascism:0 "Fascismo"
 fascism_desc:0 "El fascismo es un sistema político donde el gobierno tiene un control estricto sobre todos los aspectos de la sociedad."
 field_works:0 "HESCO Barrier"
 field_works_desc:0 "HESCO Barriers se puede levantar más rápido que sacos de arena, y proporcionar más protección."
 film:0 "Direct Propaganda"
 film_desc:0 "Usando implantes cerebrales, la propaganda se puede insertar directamente en nuestra población"
 flash_freezing:0 "Portable Freeze-Dryer"
 flash_freezing_desc:0 "Portable Freeze-dryers for civilian use"
 floating_harbor:0 "Islas artificiales"
 floating_harbor_desc:0 "Las islas artificiales son masacras artificiales, generalmente creadas para medios militares"
 food_sterilisation:0 "Estarilización alimentaria"
 food_sterilisation_desc:0 "Por ensayo y error, los empresarios han descubierto métodos de preservar los alimentos, como el calentamiento de la leche en pasteurización o su condensación en jarabe grueso, la recolección de frutas y verduras, y el canning de carnes y sopas. El hilo común entre todas estas tecnologías es la eliminación de los gérmenes de la comida preservada, un concepto no comprendido completamente hasta el descubrimiento de bacterias bajo microscopios. Con una comprensión generalizada de estas ideas, las normas en la industria alimentaria están mejorando, y con ello la salud del público."
 four_field_crop_rotation:0 "Rotación de cuatro cultivos de campo"
 four_field_crop_rotation_desc:0 "Famosamente expuesta por el terrateniente Charles 'Turnip' Townsend, el uso de fijadores de nitrógeno, como nabos o trébol, permite que las tierras agrícolas permanezcan en uso constante sin agotarse o tener que dejar barbecho."
 fractional_distillation:0 "OGM"
 fractional_distillation_desc:0 "Los organismos genéticamente modificados (OMG) son métodos hechos por el hombre para cambiar la forma en que las plantas &quot; crecen &quot; aparecen con el propósito de la producción de alimentos."
 fruit_jars:0 "Jarras de frutas"
 fruit_jars_desc:0 "La idea de preservar la carne y la sopa dentro de latas de metal ha ganado en popularidad. También se están generalizando otros tipos de conservación de alimentos, como preservar frutas y verduras en los líquidos de recolección o hervirlas en mermeladas."
 fulminates:0 "Fulminates"
 fulminates_desc:0 "Un material fulminante es uno que se enciende cuando se golpea agudamente. Tales materiales incluyen iones de mercurio, plata y potasio. Fueron descubiertos por primera vez por Edward Charles Howard en 1800, y su aplicación militar en los sistemas de gorra de percusión pronto se hizo evidente."
 functionalism:0 "Funcionalismo"
 functionalism_desc:0 "Un marco teórico que considera a la sociedad como un sistema de componentes definido por las funciones sociales. Usando sistemas mecánicos y biológicos como metáfora, ve las estructuras de la sociedad y su interdependencia como determinar su estabilidad."
 gantry_cranes:0 "grúas pesadas"
 gantry_cranes_desc:0 "Útil en construcción y transporte, las grúas pesadas son lo suficientemente grandes para atar la anchura de un barco. Esto les da una robustez que significa que pueden levantar las cargas más pesadas que un barco puede llevar."
 general_staff:0 "Drones"
 general_staff_desc:0 "Los Drones son aviones no tripulados que pueden utilizarse tanto para aplicaciones militares como civiles"
 germ_theory:0 "Teoría Germ"
 germ_theory_desc:0 "Thucydides fue la primera persona en afirmar que las enfermedades podrían propagarse de persona a la otra y desde tiempos antiguos hemos creído que los miasmas eran las causas de enfermedades como el cólera. Sin embargo, la ciencia tiene provincia que los microorganismos, llamados gérmenes, son responsables de enfermedades."
 gunpowder:0 "Pólvora"
 gunpowder_desc:0 "Un compuesto químico compuesto de azufre, carbón vegetal y nitratos, pólvora conflagra rápidamente, expandiéndose en un gas que puede propulsar tubos bajos. La combustión deja atrás grandes cantidades de humo del azufre y carbón, lo que hace que la musketry sea un negocio sucio y cegador en el campo de batalla. Los cargos de pólvora también tienen más usos civiles en la apertura de la tierra para la minería y la construcción. Los chinos inventaron pólvora mil años antes y lo utilizaron para los fuegos artificiales y la artillería de asedio."
 gunsmithing:0 "Asalto Rifle"
 gunsmithing_desc:0 "Los rifles de asalto combinan la potencia de fuego de un SMG, y la precisión de un rifle para crear una poderosa plataforma de armas pequeñas."
 gymnastics:0 "Gimnasia"
 gymnastics_desc:0 "Para los espartanos la gimnasia formó parte del entrenamiento de ustedes reclutas militares, y la palabra misma ha estado alrededor desde los años 1570 para referirse a ejercicios atléticos. Ahora, aunque nos damos cuenta de que los espartanos estaban en algo, para disciplinar la mente debemos disciplinar el cuerpo. Los pioneros educativos han desarrollado una serie de ejercicios para niños en diversos aparatos para ayudarlos a desarrollar la autodisciplina. Algunos radicales incluso sugieren extender estos ejercicios a las niñas."
 gyroscopes:0 "Giroscopios"
 gyroscopes_desc:0 "Un giroscopio se hace combinando una serie de gimbals, que son simplemente soportes giratorios. Una gimbal gira verticalmente y otra horizontalmente, por lo que el objeto soportado más interno puede girar libremente en cualquier dirección. Los giroscopios son útiles para mantener un objeto estable mientras sus alrededores se mueven, como una brújula magnética en un barco de lanzamiento."
 handcranked_machine_gun:0 "Anti-Drone Systems"
 handcranked_machine_gun_desc:0 "Sistemas de defensa diseñados para derribar drones baratos."
 hydraulic_cranes:0 "Helicopter Carrier"
 hydraulic_cranes_desc:0 "Los transportistas de helicópteros permiten apoyar a las tropas logísticamente"
 hydraulic_power:0 "Potencia hidráulica"
 hydraulic_power_desc:0 "Las ruedas de agua se han utilizado durante mucho tiempo para fresar granos. Adaptarlos a otros usos industriales, como las máquinas de alimentación, es un paso lógico hacia adelante."
 hypodermic_syringes:0 "Hipotenciales"
 hypodermic_syringes_desc:0 "Las inoculaciones se dieron originalmente a los pacientes abriendo la piel y frotando material enfermo en la herida. La idea de usar una aguja hueca para inyectar líquidos en un paciente es obviamente más higiénica, y también tiene el beneficio de permitir que los volúmenes precisos sean administrados por el médico. Se han hecho jeringas tempranas de plata, pero el vidrio se está volviendo popular a medida que los procesos de fabricación se vuelven más refinados, permitiendo que se hagan agujas más estrechas."
 idealism:0 "Idealismo"
 idealism_desc:0 "Una serie de filosofías que sostienen que nuestro conocimiento depende de cómo percibimos las cosas, lo que nos limita a conocer la idea de una cosa, en lugar de la cosa tal como es en realidad."
 identification_documents:0 "Identificación digital"
 identification_documents_desc:0 "La identificación digital es la representación electrónica de una persona que les permite acceder a servicios en línea, hacer compras e interactuar con otros."
 impressionism:0 "Impresionismo"
 impressionism_desc:0 "Un estilo de arte centrado en técnicas que recrean la sensación visual general de una escena. La misma ambición artística de recrear el sentimiento y la experiencia de una situación también se aplicó en formas artísticas más allá de lo visual."
 improved_fertilizer:0 "Microencapsulación"
 improved_fertilizer_desc:0 "La microencapsulación implica encerrar ingredientes activos como vitaminas, sabores y probióticos en un revestimiento protector. Esta tecnología se utilizó ampliamente en los alimentos funcionales para mejorar la entrega de nutrientes, la vida útil de la plataforma y la estabilidad de ingredientes sensibles, ofreciendo nuevas posibilidades en la producción de alimentos, incluyendo alimentos y bebidas fortificados."
 international_trade:0 "neoliberalismo"
 international_trade_desc:0 "El neoliberalismo es distinto del liberalismo en la medida en que no promueve la política económica laissez-faire, sino que es altamente constructivista y aboga por un estado fuerte para llevar a cabo reformas similares al mercado en todos los aspectos de la sociedad."
 ironclad_tech:0 "Batalla del siglo XXI"
 ironclad_tech_desc:0 "Los buques de combate del siglo XXI pueden soportar enormes bombardeos de misiles."
 jeune_ecole:0 "Barco de combate littoral"
 jeune_ecole_desc:0 "Los barcos autónomos son barcos que son esencialmente drones en el mar. Además, al tener muchos barcos más pequeños en lugar de algunos grandes, es posible mantener un cierto nivel de maniobrabilidad que de otro modo sería imposible."
 labor_movement:0 "Smartphone"
 labor_movement_desc:0 "Un teléfono inteligente, a menudo llamado simplemente un teléfono, es un dispositivo móvil que combina la funcionalidad de un teléfono móvil tradicional con capacidades de computación avanzadas."
 land_reform:0 "Reforma agraria"
 land_reform_desc:0 "La propiedad de la tierra y la sociedad van de la mano. La tierra es la fuente principal y la riqueza y el estatus en cualquier país y por lo tanto quién tiene la propiedad de la tierra es quién tiene riqueza y estatus. Si queremos crear la sociedad que queremos, debemos estar preparados para alterar fundamentalmente quién es dueño de la tierra."
 lathe:0 "Líneas de producción"
 lathe_desc:0 "Una línea de producción es una asamblea de trabajadores, cada uno con una tarea asignada, que permite la racionalización de la producción."
 lathes:0 "tornos"
 lathes_desc:0 "Un torno es una herramienta que gira el material en el que la herramienta está trabajando, en lugar de un taladro, que se gira contra el material. Esto frena el material de una manera simétrica. Esto tiene aplicaciones en muchas industrias, desde candelabros artesanales hasta el aburrido de piezas de artillería. Los tornos tempranos se alimentan a mano, a caballo, o por rueda de agua, dependiendo del alcance de la industria."
 laws_of_physics:0 "Leyes de Física"
 laws_of_physics_desc:0 "Las leyes fundamentales que rigen los órganos en movimiento pueden observarse fácilmente con el uso de un telescopio. Sir Isaac Newton fue pionero en este campo, gracias a su tecnología de un telescopio reflectante de alta calidad y la aplicación rigurosa de sus observaciones a las predicciones científicas existentes por Johannes Kepler."
 crystal_glass:0 "Microprocesador"
 crystal_glass_desc:0 "El microprocesador es el corazón de la informática moderna, permitiendo que las computadoras se vuelvan más pequeñas, más rápidas y más asequibles. Consiguió el desarrollo de computadoras personales y la rápida evolución de la tecnología."
 automatic_machine_guns:0 "Turret autónomo"
 automatic_machine_guns_desc:0 "Torretas estacionarias avanzadas capaces de bloquear automáticamente los objetivos enemigos."
 malaria_prevention:0 "STEM Cells"
 malaria_prevention_desc:0 "Debido a las condiciones extremas en el espacio, los astronautas son especialmente vulnerables a las infecciones, dado que la radiación cósmica, la microgravedad y el estrés psicológico tienden a comprometer el sistema inmunitario humano"
 manufacturies:0 "Fabricación"
 manufacturies_desc:0 "Los gremios controlaban los métodos y las prácticas de contratación que un negocio podría utilizar, limitando la entrada en la fuerza laboral y exigiendo que sólo los artesanos altamente calificados y certificados (por el gremio, naturalmente) realicen ciertas tareas. Cada vez más, los industriales abandonaron las ciudades y fundaron nuevos sitios de innovación, libres de los estándares exigentes y salarios altos de los maestros del gremio."
 mass_communication:0 "Celulares"
 mass_communication_desc:0 "Mass Communication this the easy spread of information useizing technologies such as the cellphone."
 mass_propaganda:0 "Autoeducación"
 mass_propaganda_desc:0 "A través de implantes de chip, toda la información del mundo puede ser transmitida directamente a los hijos de nuestras naciones."
 mass_surveillance:0 "Democracia directa en masa"
 mass_surveillance_desc:0 "Permite que cada ciudadano vote en cualquier momento, en cualquier cosa, a través de microchips implantados en el cerebro."
 mechanized_farming:0 "Base interplanetaria"
 mechanized_farming_desc:0 "Bases en otros planetas"
 mechanized_workshops:0 "Tecnologías inteligentes"
 mechanized_workshops_desc:0 "Las tecnologías inteligentes son tecnologías que tradicionalmente no son controladas por ordenadores, pero ahora lo son."
 military:0 "Militar"
 military_aviation:0 "Huelga orbital"
 military_aviation_desc:0 "Una huelga orbital es un satélite diseñado para disparar un proyectil de alta potencia a un objetivo en la tierra."
 mobile_armor:0 "Mech"
 mobile_armor_desc:0 "Multi-Firepower-Platform (MFP) es un vehículo pesado, similar a un tanque, equipado con la última tecnología para eliminar enemigos autónomos"
 modern_nursing:0 "Stealth Aircraft"
 modern_nursing_desc:0 "Los aviones Stealth son aviones diseñados para tener una firma de radar inferior."
 modern_sewerage:0 "Cryptocurrency"
 modern_sewerage_desc:0 "Una criptomoneda, criptomoneda o cripto es una moneda digital diseñada para trabajar a través de una red informática que no depende de ninguna autoridad central, como un gobierno o un banco, para mantenerla o mantenerla"
 currency_standards:0 "Comercio en línea"
 currency_standards_desc:0 "Compras en línea es una forma de comercio electrónico que permite a los consumidores comprar directamente bienes o servicios de un vendedor a través de Internet utilizando un navegador web o una aplicación móvil."
 monitor_tech:0 "AI Vessel"
 monitor_tech_desc:0 "Se envía totalmente controlado por la inteligencia artificial."
 musical_instruments:0 "Instrumentos musicales"
 musical_instruments_desc:0 "La música es una parte clave del desarrollo de cualquier cultura y arte. En ese sentido, la evolución de los instrumentos musicales que crea una cultura tiene una influencia eco en todos los futuros desarrollos culturales."
 napoleonic_warfare:0 "Guerra Proxy"
 napoleonic_warfare_desc:0 "Los conflictos indirectos son guerras luchadas por la influencia de dos potencias opuestas, libradas a través de dos poderes más débiles contra cada una."
 nationalism:0 "Terrorismo"
 nationalism_desc:0 "¿Quién soy? Es una cuestión clave que corre a los corazones de la identidad de una persona. En tiempos pasados la gente ha dicho que son de una provincia, una ciudad o incluso una familia como expresión de esa identidad. Se han desarrollado nuevas ideas que trascienden estas nociones y en cambio ven la identidad como algo que se comparte entre la nación. Además, la nación debe estar unida en un solo país."
 natural_selection:0 "Selección Natural"
 natural_selection_desc:0 "La selección natural es un mecanismo por el cual las formas de vida evolucionan pasando rasgos heritables a las generaciones futuras. Su descubrimiento proporciona una explicación de cómo surgen y se adaptan las especies según su entorno."
 naval_theory:0 "Teoría Naval"
 naval_theory_desc:0 "Al aplicar alguna estrategia a los movimientos navales es posible hacer una Armada mucho más efectiva."
 drydocks:0 "Astillero moderno"
 drydocks_desc:0 "La creación de zonas cerradas en las que se pueden atracar buques en tierra seca permite un mantenimiento más fácil y minucioso de buques de carga y buques de guerra."
 navigation:0 "Construcción naval moderna"
 navigation_desc:0 "A través de diversos métodos, desde estrellas, mapas, a una brújula es posible trazar correctamente un curso en todo el mundo."
 neoclassicism:0 "Neoclásico"
 neoclassicism_desc:0 "El período clásico del arte, el teatro y la música se extendió de alrededor de 1750 a 1820, con innovaciones desde entonces siendo etiquetado Neoclásico. El nombre también alude a la Antigüedad Clásica, y por lo tanto compara la alta cultura de Occidente con la de Roma y Grecia, estableciendo así el pedigrí de la clase dominante europea como maestros del mundo conocido."
 nitrogen_fixation:0 "Astroid Mining"
 nitrogen_fixation_desc:0 "La minería astrónida es la colección de recursos de astroides en el espacio"
 nitroglycerin:0 "Pipelines modernos"
 nitroglycerin_desc:0 "Las tuberías modernas permiten el transporte de carbón, petróleo, GNL (Gas Natural Licificado) y otros líquidos a través de vastas distancias."
 open_hearth_furnace:0 "horno de corazón abierto"
 open_hearth_furnace_desc:0 "La producción de acero implica las impurezas de eliminación de hierro de cerdo y luego añadir en otros materiales para crear el grado de acero que buscas. Para producir acero requiere temperaturas muy altas y el horno de corazón abierto utiliza el gas de desecho del horno para calentar ladrillos y revertir el flujo de combustible y aire pasa sobre estos ladrillos para acumular el calor del horno. El proceso es más lento que otros, pero es más fácil de controlar y escala permitiendo que grandes cantidades de acero se produzcan en un solo lote."
 open_hearth_process:0 "Impresión 3D temprana"
 open_hearth_process_desc:0 "Mientras que la impresión 3D comenzó en el decenio de 1980, los años 2000 vieron su expansión en la producción a gran escala. La tecnología, que permite la construcción de capa por capa de materiales, ganó impulso en industrias tales como aeroespacial, automotriz y dispositivos médicos."
 opium_dens:0 "Dens de opio"
 opium_dens_desc:0 "Un den Opium es simplemente un lugar donde el opio se puede comprar y fumar. Sin embargo, hay personas que se preocupan de que estas dens sean más siniestras y sean una fuente de corrupción moral."
 paddle_steamer:0 "Balística"
 paddle_steamer_desc:0 "El misil sabe dónde está en todo momento. Esto lo sabe porque sabe dónde no es, restando donde está, desde donde no está, o donde no está, desde donde es, donde es, lo que es mayor, obtiene una diferencia o una desviación."
 pan-nationalism:0 "Pan-nationalism"
 pan-nationalism_desc:0 "Through organizations like the EU, de-facto super-states can be formed through trade & economic relations."
 percussion_cap:0 "Flecha de asalto pesado"
 percussion_cap_desc:0 "Los rifles pesados, como el SCAR-L, proporcionan una gran potencia de fuego para operaciones especiales."
 percussion_caps:0 "Capas de percusión"
 percussion_caps_desc:0 "Las gorras de percusión toman armas de fuego no fiables y hacen posible que disparen en cualquier clima."
 personal_liberty:0 "Personal Liberty"
 personal_liberty_desc:0 "Además de la cuestión de cómo debe regirse la sociedad, existe también la cuestión de lo que debe ir más allá de la gobernanza. Establecer libertades individuales sobre las cuales la tiranía de la mayoría no puede intruir es una parte crucial de los ideales liberales."
 social_media:0 "Social Media"
 social_media_desc:0 "Los medios sociales son una colección de tecnologías que permiten a los usuarios compartir información, ideas y contenidos a través de comunidades y redes virtuales."
 policing_by_consent:0 "Policing by Consent"
 policing_by_consent_desc:0 "Sir Robert Peel, mientras servía como Secretario de Interior, creó la Policía Metropolitana, un policía distinto de la gendarmería de los tiranos continentales porque son civiles actuando en interés público en lugar de soldados que reprimen enemigos políticos."
 political_agitation:0 "Revoluciones digitales"
 political_agitation_desc:0 "El activismo de Internet ahora tiene el poder de estimular las grandes revoluciones y acontecimientos históricos.."
 political_theory:0 "Teoría política"
 political_theory_desc:0 "Cómo dirigir un país es una pregunta que muchos han comenzado a preguntar y varias teorías han sido elaboradas en lo que exactamente el mejor plan para un estado se vería."
 popular_sovereignty:0 "Soberanía popular"
 popular_sovereignty_desc:0 "La autoridad de un Estado y la extensión de su gobierno sólo puede ser creada y sostenida por el consentimiento de su pueblo. En un gobierno libre, los gobernantes son los siervos y el pueblo sus superiores y soberanos."
 portland_cement:0 "Portland Cement"
 portland_cement_desc:0 "Así llamado por su parecido a piedra cuarrimada de una isla en Dorset, Inglaterra, este cemento es un componente eficaz en hormigón, utilizado para construir grandes estructuras. Se produce a partir de piedra caliza y otros materiales comunes, por lo que es muy barato."
 potash:0 "Potash"
 potash_desc:0 "Producido por la quema de madera y depositar las cenizas en una olla de agua, la potasa se utiliza en procesos químicos como la producción de vidrio, jabón, tinte, pólvora y fertilizante. Proporciona su nombre al elemento potasio, que es el ingrediente activo en estos procesos."
 power_looms:0 "Perdidos de poder"
 power_looms_desc:0 "Un telar es un dispositivo para tejer lana, algodón y otras fibras. Los primeros lomos usaron la mano o el pie para girar el hilo. El "transbordador de vuelo" inventado en 1733 se acredita con la estimulación de la revolución industrial, y el uso del poder mecánico en tejido permite a los tejedores menos hábiles producir tela. Otras innovaciones incluyen el telar de Jacquard, un sistema de tarjetas de puñetazo programables desarrollado en 1804 para automatizar patrones."
 power_of_the_purse:0 "Proyección de energía"
 power_of_the_purse_desc:0 "La proyección de la energía utiliza buques para excertar la fuerza en otros países mediante una intimidación pura."
 pre_modern_warfare:0 "Pre-Modern Warfare"
 pre_modern_warfare_desc:0 "Los conflictos de antaño pálido en comparación con los estragos de la guerra moderna, sin embargo, todavía eran asuntos sangrientos en su propio derecho."
 production:0 "Producción"
 propaganda:0 "Propaganda"
 propaganda_desc:0 "Durante las Guerras Revolucionarias y Napoleónicas, los gobiernos de Europa establecieron alas de propaganda para obtener apoyo público para las dificultades que enfrenta el pueblo común. Los panfletos políticos y las caricaturas satíricas se distribuyeron en las ciudades, mientras que los versos patrióticos fueron escritos para ser cantados a las canciones populares."
 puddling_furnaces:0 "Hornos de cocina"
 puddling_furnaces_desc:0 "Se utiliza un horno para producir hierro forjado de hierro de cerdo. Un horno de ladrillo se calienta para que el hierro se derrite con la cindro acompañante, después de lo cual la mezcla se trabaja mecánicamente, como con una palanca, para que el exceso de carbono en el hierro se ponga en contacto con el aire, formando monóxido de carbono, mientras que el azufre y otras impurezas son arrastradas por una escoria más ligera que se eleva a la superficie. Después de dos horas de trabajo a mano, "bolas de punta" de forma de hierro forjado y se puede quitar de la escoria restante. Este es un trabajo difícil, hábil, y por lo tanto caro para realizar."
 quinine:0 "MRNA Vacuna"
 quinine_desc:0 "Una vacuna MRNA es un tipo de vacuna que utiliza una copia de una molécula llamada RNA mensajero (mRNA) para producir una respuesta inmune."
 radio:0 "Comunicación interplanetaria"
 radio_desc:0 "Mediante el uso de ondas invisibles es posible pasar información a una gran distancia más rápido que la radio."
 railways:0 "Ferrocarriles de alta velocidad"
 railways_desc:0 "Las tecnologías recientes permiten el transporte ultrarrápido de mercancías &quot; personas"
 rationalism:0 "Revolución cultural"
 rationalism_desc:0 "La revolución cultural de la década de 1960 estimulaba un cambio de actitudes sociales en todo el mundo."
 realism:0 "Cámara digital"
 realism_desc:0 "Una cámara digital, también llamada digicam, es una cámara que captura fotografías en memoria digital."
 reinforced_concrete:0 "BIM"
 reinforced_concrete_desc:0 "Building Information Modeling (BIM) ganó una adopción generalizada durante los años 2000, es una representación digital de las características físicas y funcionales de un edificio. Esta tecnología de modelado 3D permitió una planificación, diseño y construcción más eficientes."
 repeaters:0 "Lasers"
 repeaters_desc:0 "Los láseres permiten la concentración de energía en ciertas direcciones con fines de combate"
 rifling:0 "Rifle de combate ligero"
 rifling_desc:0 "El último rifle de combate ligero permite a nuestro país equipar a nuestros soldados con la potencia de fuego más eficiente posible."
 romanticism:0 "Videocassette Recorder"
 romanticism_desc:0 "El Videocassette Recorder (VCR) o grabador de vídeo es un dispositivo electromecánico que registra audio analógico y vídeo analógico de la televisión de transmisión u otras fuentes AV y puede reproducir la grabación después de rebobinar"
 rotary_valve_engine:0 "Inteligencia Artificial"
 rotary_valve_engine_desc:0 "El uso de AI para producir bienes en masa"
 rubber_recycling:0 "Reciclaje de goma"
 rubber_recycling_desc:0 "El uso de un 'masticador' para masticar y reformar el caucho viejo nos permite reciclar y reutilizar este material valioso."
 rubberised_fabrics:0 "Tejidos gobernados"
 rubberised_fabrics_desc:0 "Usando goma natural para unir dos telas, o para combinar fibras de plantas en una especie de cuero artificial, produce artículos impermeables como el abrigo Mackintosh, o ropa elástica como tirantes."
 rule_of_law:0 "Estado de derecho"
 rule_of_law_desc:0 "Generalmente presente en un sistema de gobierno con una constitución escrita (como en los Estados Unidos) o no escrita (como en el Reino Unido), el Estado de Derecho consiste en un grupo de ideas relacionadas sobre jurisprudencia, tales como que la violencia del Estado sea predecible, y por lo tanto evitable, al tener el gobierno establecido claramente lo que es ilegal y cuál será el castigo por crímenes; y que los propios agentes del Estado estén sujetos a las leyes que imponen."
 screw_frigate:0 "Destructor de misiles guiado"
 screw_frigate_desc:0 "El destructor de misiles guiado utiliza misiles para alcanzar objetivos antes de que ellos incluso sepan de la existencia de una flota"
 sea_lane_strategies:0 "Future Naval Strategy"
 sea_lane_strategies_desc:0 "Es probable que las futuras estrategias navales giran alrededor de la IA."
 semaphore_signalling:0 "Semaphore Signalling"
 semaphore_signalling_desc:0 "Las señales ferroviarias transmiten instrucciones a trenes activos en líneas ferroviarias, ayudando al tráfico directo incluso cuando una locomotora está en movimiento y lejos del personal en una estación. El uso de señales semáforas, inspiradas en un sistema de señalización militar utilizado por los ejércitos de Napoleón, crea un sistema uniforme que todos los ferrocarriles pueden utilizar."
 separation_of_powers:0 "Separación de poderes"
 separation_of_powers_desc:0 "La idea de distintas ramas de gobierno con diferentes roles que se supervisan mutuamente para prevenir la corrupción y el abuso se ha vuelto mucho más popular desde el éxito relativo del "gran experimento americano", con su Constitución dividiendo al gobierno en ramas ejecutivas, legislativas y judiciales."
 sericulture:0 "Sericultura"
 sericulture_desc:0 "La técnica antigua y estrechamente guardada de cultivar gusanos de seda para la producción de seda."
 sewage_systems:0 "Sistemas de aguas residuales"
 sewage_systems_desc:0 "El crecimiento de las ciudades ha llevado a ríos ahogados con aguas residuales, se han vuelto negros y huelen a muerte. Es hora de mirar atrás a los antiguos que construyen sistemas de alcantarillado para llevar estas aguas de la ciudad."
 shaft_mining:0 "Minería"
 shaft_mining_desc:0 "Mediante el despliegue de maquinaria pesada, podemos competir en el mercado mundial para la producción de recursos naturales."
 shell_gun:0 "Armadura reactiva"
 shell_gun_desc:0 "Un tanque de combate principal (MBT), también conocido como un tanque de batalla o un tanque universal o simplemente tanque, es un tanque que llena el papel de fuego y maniobra directas protegidos por armadura en muchos ejércitos modernos."
 slag_fertilisers:0 "Fertilizantes Slag"
 slag_fertilisers_desc:0 "El bajo valor de pH de los residuos de hornos de explosión y convertidores de acero hace que sea una excelente adición al suelo para fines agrícolas. La escoria de cal es más soluble que la piedra caliza natural o dolomita, aumentando el contenido de fosfato del suelo."
 socialism:0 "Populismo derechista"
 socialism_desc:0 "El populismo de derecha, también llamado populismo nacional y populismo de derecha, es una ideología política que combina la política de derecha con la retórica populista y temas"
 society:0 "Society"
 enclosure:0 "Agricultura eficiente"
 enclosure_desc:0 "Al dedicarse a la agricultura en masa, con la ayuda de un sistema regulado por el gobierno, podemos aumentar nuestra producción lo suficiente para competir en el mercado mundial."
 intensive_agriculture:0 "Plaguicidas"
 intensive_agriculture_desc:0 "Productos químicos utilizados en la producción de alimentos que eliminan insectos y bacterias."
 steam_donkey:0 "Fabricación sostenible"
 steam_donkey_desc:0 "Con una mayor conciencia de los efectos ambientales, los fabricantes comenzaron a adoptar métodos de producción más sostenibles."
 threshing_machine:0 "Spaceflight comercial"
 threshing_machine_desc:0 "Aumenta la efluencia de nuestros paneles solares, plantas nucleares y molinos de viento"
 steel_frame_buildings:0 "Hologramas"
 steel_frame_buildings_desc:0 "La Holografía es una técnica que permite grabar una onda y posteriormente reconstruirse. Es más conocido como un método de generación de imágenes tridimensionales, y tiene una amplia gama de otros usos, incluyendo almacenamiento de datos, microscopía e interferometría. En principio, es posible hacer un holograma para cualquier tipo de onda."
 steel_railway_cars:0 "Automóvil eléctrico"
 steel_railway_cars_desc:0 "La investigación y el desarrollo en vehículos autónomos se aceleraron durante el decenio de 2000. El Gran Desafío de la DARPA (2004 y 2005), organizado por el Departamento de Defensa de los Estados Unidos, fue un hito importante, mostrando los primeros intentos de autoconducir coches."
 stormtroopers:0 "Especialista"
 stormtroopers_desc:0 "Tener tropas humanas entrenadas y equipadas específicamente para la destrucción de la IA y captura de unidades."
 streamliners:0 "Streamliners"
 streamliners_desc:0 "Los nuevos diseños de trenes que utilizan la potencia moderna del tracto y la nueva construcción del cuerpo de aluminio permiten que los ferrocarriles ejecuten más trenes de forma fiable a velocidades más altas."
 submarine:0 "Futuros submarinos"
 submarine_desc:0 "Los futuros submarinos son impulsados por la tecnología futura, que permite huelgas devastadoras."
 multilateral_alliances:1 "Cryonics"
 multilateral_alliances_desc:0 "ryonics es la práctica de preservar a las personas que están legalmente muertas por congelarlos a temperaturas muy bajas, con la esperanza de que la futura tecnología médica pueda revivirlas y curar la condición que causó su muerte."
 synthetic_dye:0 "Tinte sintético"
 synthetic_dye_desc:0 "Esto incorporó un proceso químico que creó diferentes tipos de tinte de manera sintética. revolucionó la coloración de la tela y puso fin a la producción de tintes agrícolas, que se convirtió en demasiado caro para producir."
 system_gin:0 "El automóvil"
 system_gin_desc:0 "Los automóviles permiten el transporte rápido de bienes de la gente en todas las tierras."
 telegraph:0 "Telegraph"
 telegraph_desc:0 "La electricidad se puede utilizar para pasar señales por líneas casi al instante, como con el código Morse. La principal fuente de retraso es en el operador humano, que necesita estar bien entrenado para codificar y decodificar los mensajes que han sido transferidos en forma de 'dots' cortos y largos y 'dashes' de ruido."
 telephone:0 "Smart City"
 telephone_desc:0 "La integración de dispositivos IoT en la infraestructura urbana permite a las ciudades monitorear y gestionar recursos como agua, electricidad, tráfico y residuos en tiempo real, mejorando la eficiencia y sostenibilidad."
 telephones:0 "Teléfonos"
 telephones_desc:0 "En teoría hemos sabido que la idea del telégrafo hablando podría ser posible, pero no estábamos seguros de cómo. Los avances en el campo de la electrónica han hecho esta idea finalmente posible y el teléfono nace."
 tin_cans:0 "Tin Cans"
 tin_cans_desc:0 "El concepto de alimentos enlatados se remonta a los frascos de vidrio utilizados por los ejércitos de la Revolución Francesa. Pronto, la idea se extendió al uso civil. La carne o la sopa que se ha cocinado dentro de un metal puede protegerse de la exposición al mundo exterior y puede consumirse a tiempo libre por hogares de clase media. El nombre deriva de la tinplate, que tiene una capa delgada de estaño fuera de la plancha de hierro o de acero para proteger el metal de la oxidación en el aire abierto."
 trench_works:0 "Tanque de reconocimiento"
 trench_works_desc:0 "Dispositivos usados para enviar ondas de choque y atascar tropas enemigas"
 triage:0 "VTOL Aircraft"
 triage_desc:0 "Aviones verticales de despegue y aterrizaje (VTOL) es un tipo de aeronave que puede despegar y aterrizar verticalmente sin necesidad de una pista de aterrizaje"
 urban_planning:0 "Moneda de Fiat"
 urban_planning_desc:0 "Las monedas fiat son suministros monetarios que no están respaldados por el oro."
 urbanization:0 "International Organizations"
 urbanization_desc:0 "Organizaciones internacionales como las Naciones Unidas tienen por objeto mantener la paz y promover el crecimiento económico en todo el mundo."
 vaccination:0 "Vacunación"
 vaccination_desc:0 "La inoculación de personas con lo que se esperaba que fueran formas menos virulentas de una enfermedad se había conocido durante siglos, pero también era altamente arriesgado. La vacunación, que implicaba el uso de una enfermedad menos peligrosa pero relacionada o el tratamiento de los agentes de las enfermedades por lo que perdieron la capacidad de infectar, era mucho más segura y mucho más confiable."
 vacuum_canning:0 "Lean Manufacturing"
 vacuum_canning_desc:0 "La fabricación magra, concepto que surgió en el decenio de 1990, se centra en reducir los desechos y mejorar la eficiencia de los sistemas de producción. Destaca la mejora continua de los procesos eliminando las actividades no relacionadas con el valor, mejorando la calidad y aumentando la satisfacción del cliente."
 vulcanization:0 "Drones autónomos"
 vulcanization_desc:0 "Los drones de entrega han avanzado más allá de las etapas experimentales, con empresas como Amazon y Wing probando sistemas comerciales de suministro de drones, capaces de mover paquetes de forma rápida y eficiente en zonas urbanas y rurales."
 wargaming:0 "Simulación de combate"
 wargaming_desc:0 "Al burlarse de escenarios de guerra imaginarios y de estrategia práctica, es posible mejorar las habilidades de combate de los oficiales."
 water_treatment:0 "Tratamiento del agua"
 water_treatment_desc:0 "Se ha encontrado que el agua lleva enfermedades a nuestros hogares. Aún así la ciencia tiene la respuesta, podemos simplemente hacer que el agua se limpie de nuevo mediante la aplicación de filtración y tratamientos químicos."
 wood_pulp_papermaking:0 "Madera Pulp"
 # gold_standard_desc: "This meant a currency system based on gold. Money was rather expensive to produce by the government and this could sometimes result in a low of money stock. However, the good thing was that the gold prices were rather stable and the trust in gold was high, making the currency stable."
 # savings_banks_desc: "The middle-class is growing larger and wealthier thanks to education and a strong work ethic. Many individuals wish to be part of railways through Africa; dams across the Nile; fleets of ocean Greyhounds; majestic, self-amortizing canals; plantations of ripening tea; all from tuppence prudently, fruitfully, frugally invested (to be specific) in the Dawes-Tomes-Mousely-Grubbs Fidelity Fiduciary Bank."
 # silver_standard_desc: "This meant a currency system based on silver. Money was cheaper to produce by the government which meant that there was rarely any lack of money in the country. However, the problem was that the silver prices had a tendency to be dominated by gold prices, which meant that foreign trade was often suffering."
#  acidic_and_basic_converters: "Acidic and Basic Converters"
#  acidic_and_basic_converters_desc: "The original Bessemer converters had a lining of insulating clay between the walls and the molten iron. The #clay is acidic and affects the composition of the resulting steel. By replacing the clay with basic (alkaline) materials such as magnesite, chromite or dolomite, or more acidic materials such as ganister, the process can be fine tuned to remove even more impurities, depending upon the content of the iron ore."
#  fluid_compressed_steel: "Fluid Compressed Steel"
#  fluid_compressed_steel_desc: "This process involves the use of a hydraulic forging press to put the steel under great pressure while still a #fluid. This squeezes the tiny pockets of gas impurities out of the cooling ingots, allowing for a much higher quality steel by preventing the #formation of blowholes and piping."
#  global_trade_desc: "By the end of the 18th century, the world-system had encompassed almost the entire globe, with raw materials being imported #from the colonies and peripheral nations and turned into finished goods in the global core, to be exported in turn."
#  guilds: "Guilds"
#  guilds_desc: "The guild system was a way of organizing labor which mandated participation in the guild and in advancing through its ranks in order #to practice the guild trade within a city. While it protected the living standards of the guild members and supposedly ensured better quality #work, it also raised prices and stymied innovation."
#  hydraulic_forging_press: "Hydraulic Forging Press"
#  hydraulic_forging_press_desc: "A hydraulic forging press applies applies massive force, up to thousands of pounds per square inch, to a material #that is being worked while hot. An engine drives water, air or hydraulic fluid through valves connected to a piston, which in turn presses the #die onto the material. The valves can be turned on and off by the operator, allowing the material to be manipulated and precise amounts of force #applied at will."
#  mutualism_desc: "An economic theory usually associated with anarchism, mutualism opposes capital interest but advocates free markets and advocates #the formation of  mutual savings banks as a method for loans."
#  news_agencies: "News Agencies"
#  news_agencies_desc: "Organizations which sell news reports to various media, such as newspapers. This allows for media to include reports of #events and developments beyond the reach of their own bureaus and international news to be reported even in local media."
#  one-nationism: "One-nationism"
#  one-nationism_desc: "A type of conservative politics wherein social obligation and responsibility towards the poor and needy is combined with #traditional conservative ideals. Opposed to class struggle, one-nation conservatives seek to create a hierarchy wherein the classes support each #other."
#  percussion_oil_drilling: "Percussion Oil Drilling"
#  percussion_oil_drilling_desc: "When using a percussion drill, the drill-bit is raised by hand and then released to bite into the earth under the #force of gravity. Depths of up to around thirty metres are possible using this technique."
#  private_banks: "Private Banks"
#  private_banks_desc: "The wealthy merchant families of city states, and the royal families of European monarchies, need somewhere safe to keep #their piles of gold and someone to look after their finances. The first banks were created with this goal in mind."
#  ricardian_economics: "Ricardian Economics"
#  ricardian_economics_desc: "David Ricardo formalized several concepts that made up the Classical School of Economics, such as economic rent, the #labor theory of value, and comparative advantage."
#  self_acting_looms_desc: "Gradual improvements in loom technology have transformed the weaving industry and vastly increased the output of fabrics #factories. By using mechanical power for more and more operations, the role of the weaver is reduced to merely keeping the machine running and #clearing blockages. Children are especially useful for this as they can crawl into smaller spaces than adults. Shutting the machines down while #such work is carried out has been judged to be less profitable than allowing for the occasional child to be mangled."
#  smithian_economics: "Smithian Economics"
#  smithian_economics_desc: "Building upon the ideas of the earlier Physiocrats, with their agrarian opposition to the 'unproductive labor' of the #feudal system, Adam Smith led an attack on mercantilism which founded the Classical School of Economics."
#  steam_engines: "Steam Engines"
#  steam_engines_desc: "Pioneers in steam technology usually had uses other than locomotion in mind. For example, Richard Trevithick built huge #engine houses that dot the Cornish landscape to keep the tin mines free from flooding."
#  steam_hammer: "Steam Hammer"
#  steam_hammer_desc: "Hammering out metals is useful for both shaping and alloying the material. When used on pig iron, this creates wrought iron or #mild steel, the difference being how much carbon is left in the alloy. The use of steam means both more efficiency and better precision than #hammering out the alloy by hand."
#  steam_lathes: "Steam Lathes"
#  steam_lathes_desc: "The lathe is a machine used for boring holes of various shapes and sizes into materials, or for otherwise whittling them down #symmetrically. Exploiting steam power to drive lathes allows industry to use more precision in engineering."
#  stock_exchanges: "Stock Exchanges"
#  stock_exchanges_desc: "Organized trading of financial instruments dates back to the Italian city states and the Dutch Republic. A stock exchange #brings together buyers and sellers of assets such as government debt and shares in companies."#
#  tunnelling_shields: "Tunnelling Shields"
#  tunnelling_shields_desc: "When digging a mine shaft or railway tunnel, supporting the vast weight of the earth above the workers is vital for the #integrity of the project. A tunnelling shield is a mobile structure made of steel that provides temporary support on the active site of digging. #As the tunnelling shield is moved along, such as on a railway track, a more permanent support is laid, such as brickwork or timbers. The first #use of such a device was in the construction of the Thames Tunnel in 1825 by Anglo-French engineer Marc Isambard Brunel, the father of the more #famous Isambard Kingdom Brunel."
# alienation: "Alienation"
# alienation_desc: "The creation of the capitalist means of production has fundamentally altered the relationship of the worker to his work. No longer is he the craftsmen who creates something unique or the farmer who gains a share of the produce. In his production he is able to objectify his individuality and his character. Now though the capitalist means of production estranges a person from their very humanity, they are no longer the director of their own actions and through that they gain a profound sense of alienation."
# experimental_psychology: "Experimental Psychology"
# experimental_psychology_desc: "The human mind is a very complicated things, what do people experience when they receive a sensory stimulus and is it the same for you as it is for me? Trying to measure these things is no easy manner, but the recent advancements in the field of psychology have created a new field called experimental psychology where tests can be done to see how people react to stimuli."
# global_trade: "Global Trade"
# historical_materialism: "Historical Materialism"
# historical_materialism_desc: "What is society? This is a complicated question but if we were to define society as the union of the productive capacity and the relationships people have to the means of production we can begin to analyze past societies and how they have developed and evolved over time. We call this methodological approach Historical Materialism."
# individualism_desc: "A philosophy focused on the interests, happiness and autonomy of the individual. This includes the right of the individual to pursue its own self-interest, conclude for itself what is true and false, to think and act independently of society."
# institutionalization: "Institutionalization"
# institutionalization_desc: "If we want to expand the role of the state we need to expands the means the state has to deliver these roles. The building up the institutions of the state are the means to doing this. This steadily institutionalization of functions that were previously in the private sphere also bring along profound societal changes as well."
# pragmatism: "Pragmatism"
# pragmatism_desc: "The problem with philosophers is that they seek knowledge for knowledge sake and they also seek to create a nice unchanging universe to suit their theories. Pragmatism explicitly rejects these two tenants. Knowledge should actually be viewed only from the point of view of what practical use it has and we should accept that the universe itself is ever changing."
# religion_of_humanity: "Religion of Humanity"
# religion_of_humanity_desc: "The rise of secularism has started to free our people from the chains of superstition that religion forces on people but at the same time we lost the societal cohesion that organized religion provided. The religion of humanity offers the social cohesion of organized religion without the superstition. The cynics describe at as Catholicism minus Christianity but it also offers all the things a religion should."
# self_acting_looms: "Self-Acting Looms"
# transcendentalism: "Transcendentalism"
# transcendetalism_desc: "Transcendentalism was a philosophical movement that was founded by the German philosopher Immanuel Kant in his book Critique of Pure Reason published in 1781. It has also been described as critical philosophy as it sees philosophy's role as that of criticism rather than justification of knowledge. The task of philosophy shifts for being about establishing theories about knowledge and instead subjecting these theories to critical review to see who valid they are."
##marketing: "Marketing"
#individualism: "Individualism"
#mutualism: "Mutualism"
#vitamins: "Vitamins"
#vitamins_desc: "By isolating certain nutrients that the body needs, it is possible to make sure that more people have a healthy and balanced diet."

 central_archives:0 "Archivos digitales"
 central_archives_desc:1 "Un archivo digital es un sitio web creado con el fin de preservar datos para uso posterior."
 steelworking:0 "Refinerías offshore"
 steelworking_desc:1 "Refining oil allows for the creation of efficient fuels for vehicles, electricity, and plastic"
 prospecting:0 "FOREX"
 prospecting_desc:1 "El intercambio de divisas para un beneficio."
 baking_powder:0 "Opciones vegetarianas"
 baking_powder_desc:1 "Las carnes vegetales permiten que nuestra población vegetariana prospere en productos una vez inalcanzables"
 mechanical_tools:0 "Factory Farming"
 mechanical_tools_desc:1 "La agricultura de fábrica permite el producto de carnes a través de la crueldad animal"
 rubber_mastication:0 "Advanced Surveying Technologies"
 rubber_mastication_desc:1 "Los sistemas de escaneo LiDAR (Detección de la luz y Ranging) se utilizaron para crear modelos 3D altamente precisos de los sitios de construcción, mientras que los equipos habilitados por GPS ayudaron a mejorar la precisión de la excavación, la clasificación y otros trabajos del sitio."
 pumpjacks:0 "Flete eléctrico"
 pumpjacks_desc:1 "Al igual que los coches eléctricos, los camiones de contenedores eléctricos permiten la entrega sin emisiones de mercancías a las ubicaciones"
 shift_work:0 "Blockchain"
 shift_work_desc:1 "Blockchains es el rastreo del origen de las mercancías en una cadena de suministro a través de la tecnología informática. La adopción de blockchain por empresas como Walmart e IBM a finales de los años 2000 ayudó a garantizar la transparencia en la oferta de alimentos, mejorando la confianza del consumidor."
 paved_roads:0 "Green City"
 paved_roads_desc:1 "Ciudades totalmente verdes y automatizadas"
 pasteurization:0 "Lab-Grown Meats"
 pasteurization_desc:1 "La producción masiva de carnes de laboratorio"
 pneumatic_tools:0 "Megaestructuras"
 pneumatic_tools_desc:1 "La construcción de megaestructuras a través de IA, Impresión 3D y Metaverse."
 steam_turbine:0 "Carbon-Neutral Concrete"
 steam_turbine_desc:1 "Concreto que no genera contaminación"
 plastics:0 "Co-Bots"
 plastics_desc:1 "Robots colaborativos (Cobots): Los Cobots trabajan junto con los humanos en la configuración de fabricación, ayudando con tareas como montaje, manipulación de materiales e inspección de calidad, lo que aumenta la productividad y reduce los riesgos."
 dough_rollers:0 "3D-Printed Food"
 dough_rollers_desc:1 "La rápida producción de todos los alimentos a través de computadoras automatizadas"
 oil_turbine:0 "Bioplastia"
 oil_turbine_desc:1 "Soluciones de plástico seguras y ecológicas."
 standing_army:0 "Doctrina del Ejército de Guerra Fría"
 standing_army_desc:1 "Los complejos desafíos de la política exterior y el malestar doméstico ya no pueden ser abordados por milicias apresuradas. Los tiempos modernos requieren un ejército listo en todo momento para actuar."
 mandatory_service:0 "Rotorcraft"
 mandatory_service_desc:1 "La invención del helicóptero permite opciones de ataque y apoyo basadas en helicópteros."
 military_drill:0 "Ejercicios de combate"
 military_drill_desc:1 "Como dice el dicho, "la práctica hace perfecta", y esto es tan cierto para los soldados como lo es para los músicos. No hay ejército más apreciado por los generales que un ejército que pueda reaccionar a todos los comandos al instante y sin confusión."
 line_infantry:0 "Infantería de asalto"
 line_infantry_desc:1 "Los soldados equipados con equipo estandarizado y entrenados con métodos estandarizados dan una mayor uniformidad a un ejército, y de esa manera le dan una mayor fiabilidad."
 logistics:0 "GPS"
 logistics_desc:1 "El Sistema Mundial de Posicionamiento (GPS), es un sistema de satélites que proporcionan capacidades críticas de posicionamiento a los usuarios militares, civiles y comerciales de todo el mundo."
 electric_telegraph:0 "Gun"
 electric_telegraph_desc:1 "Las armas de asalto modernas pueden utilizarse de forma similar a un IFV para ayudar a las operaciones de infantería."
 enlistment_offices:0 "Satélite de ataque"
 enlistment_offices_desc:1 "Los satélites de ataque pueden destruir otros satélites con fines de combate"
 military_statistics:0 "Jet-Fighter autónomo"
 military_statistics_desc:1 "Combatientes Jet totalmente controlados por inteligencia artificial"
 self_propelled_torpedoes:0 "Submarino autónomo"
 self_propelled_torpedoes_desc:1 "Los submarinos autónomos son un tipo de barco totalmente controlado por submarinos."
 war_propaganda:0 "Propaganda autogenerada"
 war_propaganda_desc:1 "Convincing a population to commit its time, its resources, and its blood, all for the sake of success, is a whole field of work on its own."
 nco_training:0 "Helicóptero autónomo"
 nco_training_desc:1 "Helicópteros totalmente controlados por drones."
 destroyer:0 "Future Destroyer"
 destroyer_desc:1 "Los vasos más ligeros, equipados con torpedos y armas más pequeñas, son tan importantes en las marinas modernas como los buques de capital."
 landing_craft:0 "Sistemas informáticos integrados por inteligencia artificial"
 landing_craft_desc:1 "Sistemas computacionales intergrados AI para nuestros barcos"
 flamethrowers:0 "Patógenos manufacturados"
 flamethrowers_desc:1 "Un patógeno fabricado es una enfermedad creada en un laboratorio con el propósito de matar a tantas personas como sea posible."
 banking:0 "E-Mail"
 banking_desc:1 "Correo electrónico (corte para correo electrónico; e-mail deletreado alternativo) es un método de transmisión y recepción de mensajes utilizando dispositivos electrónicos."
 academia:0 "Digitalización"
 academia_desc:1 "La digitalización del mundo mediante avances en la tecnología de sistemas informáticos de información."
 international_relations:0 "El Pill"
 international_relations_desc:1 "Las píldoras o antibióticos son cápsulas consumibles que tienen como objetivo adormecer los síntomas de las afecciones médicas. La Píldora a menudo se refiere a la invención del control bith, permitiendo un mayor crecimiento de la población."
 stock_exchange:0 "Economic Globalisation"
 stock_exchange_desc:1 "La globalización económica es la creciente integración de las economías de todo el mundo, lo que implica el intercambio de bienes, servicios, capital, tecnología y personas."
 medical_degrees:0 "Disco compacto"
 medical_degrees_desc:1 "El disco compacto (CD) es un formato digital de almacenamiento de datos de disco óptico que fue desarrollado conjuntamente por Philips y Sony para almacenar y reproducir grabaciones digitales de audio."
 organized_sports:0 "Operaciones de lucha contra el terrorismo"
 organized_sports_desc:1 "La capacitación en lucha contra el terrorismo (a veces denominada capacitación en respuesta al terrorismo o preparación contra el terrorismo) aborda la amenaza de un ataque terrorista inminente mediante la sensibilización, preparación, prevención y métodos de respuesta."
 central_banking:0 "Izquierdaismo moderno"
 central_banking_desc:1 "La política de izquierda describe la gama de ideologías políticas que apoyan y buscan alcanzar la igualdad social y el igualitarismo"
 corporate_charters: "Liberalismo corporativo"
 corporate_charters_desc: "El liberalismo corporativo es una tesis en la historiografía de Estados Unidos y una herramienta para su imperialismo de puerta abierta en la que la élite corporativa se convierte tanto en los principales beneficiarios como en los principales cabilderos para las supuestas regulaciones anti-negocios"
 joint_stock_companies: "La teoría monetaria moderna"
 joint_stock_companies_desc: "La teoría monetaria moderna o la teoría monetaria moderna (MMT) es una teoría macroeconómica heterodoxa que describe la moneda como monopolio público y desempleo como evidencia de que un monopolista de divisas está restringiendo excesivamente el suministro de los activos financieros necesarios para pagar impuestos y satisfacer deseos de ahorro."
 investment_banks: "AI Financial Advisors"
 investment_banks_desc: "Robo-advisores utilizan algoritmos e inteligencia artificial (AI) para proporcionar servicios de planificación financiera con mínima intervención humana"
 corporate_management: "Gobierno de Internet"
 corporate_management_desc: "Permite al gobierno tomar el control completo de Internet"
 dialectics:0 "Influencers"
 dialectics_desc:1 "Un influencer, también conocido como influenciador de redes sociales, es un tipo de celebridad de Internet que es influyente y bien conocido en las redes sociales. El referente moderno del término es comúnmente un papel pagado en el que una entidad empresarial paga por la actividad de influencia de las redes sociales para promover sus productos y servicios, conocidos como marketing de influencers."
 psychiatry:0 "Memes"
 psychiatry_desc:1 "Un meme de Internet, o meme, es un elemento cultural (como una idea, comportamiento o estilo) que se extiende a través de Internet, principalmente a través de plataformas de redes sociales."
 postal_savings:0 "Valores malignos"
 postal_savings_desc:1 "Una hipoteca subprime es un tipo de préstamo que se da a las personas que no cumplen los requisitos típicos para una hipoteca de un banco tradicional o sindicato de crédito."
 human_rights:0 "Bienestar animal"
 human_rights_desc:1 "Las posiciones de bienestar animal afirman que los animales deben estar protegidos de ciertos activitos humanos."
 mutual_funds:0 "Gigeconomía"
 mutual_funds_desc:1 "En enero de 2021, tuvo lugar una breve expresion del stock del minorista estadounidense de videojuegos GameStop y otros valores, causando importantes consecuencias financieras para ciertos fondos de cobertura y grandes pérdidas para vendedores cortos."
 zeppelins:0 "Starship"
 zeppelins_desc:1 "Las naves estelares permiten el rápido transporte de seres humanos y mercancías entre planetas"
 international_exchange_standards:0 "Mercado solar"
 international_exchange_standards_desc:1 "El mercado de valores se ha ampliado al espacio ultraterrestre"
 psychoanalysis:0 "Neuroplicidad"
 psychoanalysis_desc:1 "La neuroplicidad es el estudio de la forma en que las neuronas forman conexiones en el cerebro."
 philosophical_pragmatism:0 "Cyberwarfare"
 philosophical_pragmatism_desc:1 "Cyberwarfare es una serie de ataques cibernéticos o contraataques entre estados nacionales o organizaciones internacionales para dañar o interrumpir las computadoras, redes o sistemas de información de otra nación"
 modern_financial_instruments:0 "Digital Hedgefund"
 modern_financial_instruments_desc:1 "Los métodos de fabricación de dinero siguen creciendo y proliferan. Algunos métodos pueden implicar dinero fluyendo en una pirámide hacia arriba, pero todos ellos implican más y más dinero fluyendo todo el tiempo."
 macroeconomics:0 "Digital-Economics"
 macroeconomics_desc:1 "El estudio de economía en línea, y economías de servicio electrónico."
 behaviorism:0 "Terapia psicodélica"
 behaviorism_desc:1 "La investigación sobre el potencial terapéutico de las sustancias psicodélicas (como psilocybin, MDMA y LSD) ha cobrado un impulso significativo. Estas sustancias se están estudiando para sus efectos en condiciones como el trastorno de estrés postraumático (PTSD), la depresión, la ansiedad y la adicción."
 analytical_philosophy:0 "Teleterapia"
 analytical_philosophy_desc:1 "Teleterapia y Teleconsejería remota: La telesalud, que explotó durante la pandemia COVID-19, sigue creciendo como una manera conveniente para que los individuos puedan acceder a la terapia de forma remota."
 electrical_capacitors:0 "Nomateriales"
 electrical_capacitors_desc:0 "La capacidad de manipular materiales en una nanoescala (millones de metros) está dando lugar a avances en varias industrias. El grafeno, una sola capa de átomos de carbono, es uno de los nanomateriales más prometedores, ofreciendo una fuerza excepcional, conductividad y flexibilidad."
 corporatism:0 "Post-Neoliberalismo"
 corporatism_desc:0 "Con el fin del neoliberalismo, la sociedad pretende mejorar el actual sistema capitalista."
 drone_carrier:0 "Drone Carrier"
 drone_carrier_desc:0 "Los portadores de drones, similares a los portaaviones de hoy, llevan enjambres de drones y desencadenan ataques devastadores contra nuestros enemigos."
