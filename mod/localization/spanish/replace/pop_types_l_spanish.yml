l_spanish:
 aristocrats:0 "@aristocrats! $aristocrats_no_icon$"
 aristocrats_only_icon:0 "@aristocrats!"
 aristocrats_no_icon:0 "Aristócratas"
 aristocrats_desc:1 "Los terratenientes ricos, dinero viejo con viejas conexiones. Trabajan exclusivamente en неx id=0/ título id=1/ título, donde poseen fincas y plantaciones. Contribuyen algunas de sus ganancias a la id=2/año. Sus intereses políticos están representados como el id=3/año."
 bureaucrats:0 "@bureaucrats! $bureaucrats_no_icon$"
 bureaucrats_only_icon:0 "@bureaucrats!"
 bureaucrats_no_icon:0 "burócratas"
 bureaucrats_desc:0 "Funcionarios encargados de la administración de funciones e infraestructuras gubernamentales. Políticamente, tienden a alinearse con la Intelligentsia o Petite Bourgeoisie."
 capitalists:0 "@capitalists! $capitalists_no_icon$"
 capitalists_only_icon:0 "@capitalists!"
 capitalists_no_icon:0 "Capitalistas"
 capitalists_desc:1 "Capitáns de la industria, nuevo dinero para una nueva era. Trabajan exclusivamente en неx id=0/ título id=1/ título, donde poseen minas y manufacturas. Contribuyen algunas de sus ganancias a la id=2/año. Sus intereses políticos están representados como el id=3/año."
 clergymen:0 "@clergymen! $clergymen_no_icon$"
 clergymen_only_icon:0 "@clergymen!"
 clergymen_no_icon:0 "Clergymen"
 clergymen_desc:0 "Sacerdotes, eruditos y otros líderes religiosos que tienden a las necesidades espirituales de la población rural. Políticamente, son la columna vertebral del Devout."
 clerks:0 "@clerks! $clerks_no_icon$"
 clerks_only_icon:0 "@clerks!"
 clerks_no_icon:0 "Trabajadores de color blanco"
 clerks_desc:0 "Trabajadores de oficinas de menor rango que realizan tareas administrativas en el gobierno, la infraestructura y las tiendas. Comúnmente parte de la Petite Bourgeoisie, aunque algunos se unen a Sindicatos."
 engineers:0 "@engineers! $engineers_no_icon$"
 engineers_only_icon:0 "@engineers!"
 engineers_no_icon:0 "Ingenieros"
 engineers_desc:1 "Inventarios y diseñadores de soluciones técnicas, trabajando con maquinaria avanzada en sectores como fabricación, minería y construcción. Algunos apoyan a los industrialistas o a la pequeña burguesía, mientras que otros se unen a los sindicatos."
 farmers:0 "@farmers! $farmers_no_icon$"
 farmers_only_icon:0 "@farmers!"
 farmers_no_icon:0 "Agricultores"
 farmers_desc:0 "Accionistas, pequeños agricultores y otros que hacen un alimento estable pero poco vivo produciendo o cultivando cultivos comerciales. La mayoría ve sus intereses representados como el Pueblo Rural."
 peasants:0 "@peasants! $peasants_no_icon$"
 peasants_only_icon:0 "@peasants!"
 peasants_no_icon:0 "Peasants"
 peasants_desc:2 "Los agricultores de subsistencia sólo se encuentran en idx id=0/año, donde producen productos agrícolas y simples manufacturados que utilizan principalmente para sus propias necesidades. Ellos confían en id=1 / título para la supervivencia y juegan sólo un papel limitado en la economía de id=2 / título. Tienden a ser id=3/año."
 laborers:0 "@laborers! $laborers_no_icon$"
 laborers_only_icon:0 "@laborers!"
 laborers_no_icon:0 "Trabajadores de color azul"
 laborers_desc:0 "Trabajadores de día, campesinos y otros con poca o ninguna seguridad laboral, realizando cualquier trabajo disponible en toda la sociedad. Por lo general no se dedican a la política, pero pueden involucrarse a través de los sindicatos."
 officers:0 "@officers! $officers_no_icon$"
 officers_only_icon:0 "@officers!"
 officers_no_icon:0 "Oficiales"
 officers_desc:0 "Funcionarios encargados de mando de las fuerzas militares de la nación en el ejército y la marina. Políticamente, representan a los escalones superiores de las Fuerzas Armadas."
 academics:0 "@academics! $academics_no_icon$"
 academics_only_icon:0 "@academics!"
 academics_no_icon:0 "Academics"
 academics_desc:0 "Investigadores, médicos, abogados y otros profesionales educados que estudian y enseñan en instituciones académicas. Políticamente, están a la vanguardia de la Inteligentesia."
 shopkeepers:0 "@shopkeepers! $shopkeepers_no_icon$"
 shopkeepers_only_icon:0 "@shopkeepers!"
 shopkeepers_no_icon:0 "Propietarios de pequeña empresa"
 shopkeepers_desc:0 "Propietarios y gerentes de tiendas, vendiendo mercancías a clientes en ciudades. Normalmente caen dentro de la Petite Bourgeoisie políticamente."
 slaves:0 "@slaves! $slaves_no_icon$"
 slaves_only_icon:0 "@slaves!"
 slaves_no_icon:0 "Esclavos"
 slaves_desc:0 "Trate no como persona sino como propiedad, realizando trabajos forzados en diversos sectores en países donde se permite la esclavitud. Debido a su estatus, no se les permite participar en la política."
 soldiers:1 "@soldiers! $soldiers_no_icon$"
 soldiers_only_icon:1 "@soldiers!"
 soldiers_no_icon:1 "Servicemen"
 soldiers_desc:0 "Soldados y marineros que forman la mayor parte del personal militar de la nación. Normalmente se alinean políticamente con su papel como parte de las Fuerzas Armadas."
 machinists:0 "@machinists! $machinists_no_icon$"
 machinists_only_icon:0 "@machinists!"
 machinists_no_icon:0 "maquinistas"
 machinists_desc:0 "Trabajadores manuales con maquinaria operativa de empleo estable en manufacturas, minas, fincas mecanizadas y otros sectores. Políticamente, tienden a ser una fuerza motriz en los sindicatos."
  
