 # olympics.1 — Host selection
 olympics.1.t: "Una Oferta para acoger los Juegos Olímpicos"
 olympics.1.d: "El Comité Olímpico Internacional se ha acercado con una propuesta: acoger los próximos Juegos Olímpicos. Como una democracia estable de prestigio internacional, id=1/año cumple con los criterios de alojamiento y el prestigio y la atención que vienen con él son considerables. Por lo tanto, también son los costos y demandas de organizar el evento deportivo más grande del mundo."
 olympics.1.f: "El mundo necesita un escenario. ¿Construirá uno?"
 olympics.1.a: "Aceptar — nos honra acoger"
 olympics.1.b: "Decline — no podemos comprometernos con esto en este momento"

 # olympics.3 — Participation offer
 olympics.3.t: "Los Juegos Olímpicos están llegando"
 olympics.3.d: "Los próximos Juegos Olímpicos se celebrarán en idx id=0/año. Cada nación del mundo está invitada a enviar a sus atletas para competir. Los juegos son una oportunidad para id=1 / título para demostrar su fuerza, celebrar su gente, y tomar su lugar en el escenario mundial — o para hacer una declaración política al permanecer lejos."
