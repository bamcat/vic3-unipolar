 olympics.3.a: "Enviar a nuestros atletas - vamos a competir"
 olympics.3.b: "Boicot — nuestra ausencia hablará más alto que nuestros atletas"

 # olympics.3b — Doping choice
 olympics.11.t: "Los atletas están preparando"
 olympics.11.d: "Los Juegos Olímpicos están a semanas de distancia. Los atletas de id=0/año han estado entrenando duro, pero la competencia será feroz. Algunos dentro del programa deportivo sugieren silenciosamente que la competencia limpia puede no ser suficiente. Medicamentos que mejoran el rendimiento, administrados cuidadosamente, podrían dar a los atletas el borde que necesitan. El riesgo de detección es real. Las consecuencias de ser atrapados serían graves. Pero las consecuencias de regresar a casa con las manos vacías pueden ser peores para algunos."
 olympics.11.f: "La victoria tiene muchos padres. La derrota no tiene ninguno."
 olympics.11.a: "Compite limpio — nuestros atletas harán lo mejor honestamente"
 olympics.11.b: "Mejorar su preparación — jugamos para ganar"

 # olympics.4 — Caught doping
 olympics.4.t: "Doping Scandal Rocks the Olympic Team"
 olympics.4.d: "El Comité Olímpico Internacional ha anunciado que los atletas de idx id=0/año han probado positivamente para sustancias prohibidas de mejora del rendimiento. Las medallas están siendo despojadas. Los funcionarios están siendo suspendidos. La historia es el elemento principal en cada canal deportivo del mundo. Las negaciones del gobierno no se creen. El daño de la reputación es grave y tardará años en recuperarse."
 olympics.4.f: "El oro empaña más rápido de lo que brilla."
 olympics.4.a: "Lamentamos profundamente esta lamentable situación"

 # olympics.5 — Terrible
 olympics.5.t: "Un decepcionante Juegos Olímpicos"
 olympics.5.d: "Los atletas de id=0/año compitieron, y fueron en gran medida superados. El cuento de medallas es un malentendido. Las actuaciones eran respetables en lugares, embarazosos en otros. De vuelta a casa, la prensa deportiva está haciendo preguntas difíciles sobre los criterios de financiación, preparación y selección. No fue la demostración que nadie esperaba."
 olympics.5.d_doping: "Los atletas de id=0/año compitieron con asistencia farmacéutica, y aún llegaron a casa casi con las manos vacías. El programa de dopaje ha proporcionado un valor deficiente por su considerable riesgo."
 olympics.5.f: "Siempre hay los siguientes juegos."
 olympics.5.a: "El equipo hizo lo mejor que pudo"

 # olympics.6 — Modest
 olympics.6.t: "Un rendimiento olímpico respetable"
 olympics.6.d: "Los atletas de id=0/año regresaron de los juegos con logros modestos pero reales. Un puñado de medallas, algunas actuaciones individuales fuertes, y el conocimiento que el país puede competir al más alto nivel. No es un triunfo, pero tampoco es una decepción."
 olympics.6.d_doping: "Con alguna asistencia farmacéutica, los atletas de id=0/año gestionaron una muestra respetable. El dopaje parece no ser detectado — esta vez."
 olympics.6.f: "Consistente, si no espectacular."
