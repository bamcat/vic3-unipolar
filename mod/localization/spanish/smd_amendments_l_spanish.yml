l_spanish:

 # ==========================================
 # UNITED STATES
 # ==========================================

 amendment_medicaid: "Medicaid"
 amendment_medicaid_desc: "Seguro médico federal y estatal para estadounidenses de bajos ingresos, ancianos y discapacitados. Medicaid llena la brecha que quedan los mercados privados, cubriendo aquellos que no pueden pagar primas y aquellos cuyas condiciones les hacen inseguros. El programa es caro y políticamente impugnado, pero sus efectos de reducción de la mortalidad son mensurables y reales."

 amendment_affordable_care_act: "Ley de atención asequible"
 amendment_affordable_care_act_desc: "La Ley de atención asequible —conocida informalmente como Obamacare— establece que todos los ciudadanos tienen seguro médico, crea mercados regulados para cobertura privada y extiende elegibilidad de Medicaid. Los aseguradores no pueden negar cobertura para condiciones preexistentes. El mandato individual es profundamente controvertido. Los partidarios argumentan que es la única manera de hacer funcionar los mercados de seguros. Los oponentes lo llaman "sobre-reach" del gobierno en decisiones económicas privadas."

 amendment_federal_assault_weapons_ban: "Federal Assault Weapons Ban"
 amendment_federal_assault_weapons_ban_desc: "Prohibición federal de diez años de fabricación de armas semiautomáticas y revistas de alta capacidad para la venta civil. La prohibición es impugnada — su eficacia cuestionada por los opositores, su necesidad argumentada por los partidarios. Caduca después de un decenio a menos que se renueve. La coalición política que lo aprobó es frágil, y el lobby de armas ya está preparando su respuesta."

 amendment_authorization_military_force: "Autorización para el uso de la fuerza militar"
 amendment_authorization_military_force_desc: "The Authorization for Use of Military Force grants the executive baring authority to use military force against those responsible for terrorist attacks on ierex id=0/año, and those who Harbored them. El lenguaje es deliberadamente amplio. Los académicos legales pasarán décadas discutiendo sobre sus límites, o si tiene alguno. En la práctica, reduce el costo diplomático de la acción militar unilateral y expande el alcance de id=1/conejo en el ámbito internacional."

 amendment_patriot_act: "The PATRIOT Act"
 amendment_patriot_act_desc: "The Uniting and Strengthening America by providing Appropriate Tools required to Intercept and Obstruct Terrorism Act — known as the PATRIOT Act — dramatic expands domestic surveillance authorities. La aplicación de la ley puede supervisar las comunicaciones, rastrear las transacciones financieras y compartir información entre los organismos con menos controles judiciales que antes. Tormoil y presión revolucionaria caen. Los defensores de las libertades civiles lo describen como la erosión más significativa de la privacidad constitucional en la historia de id=0/año."

 amendment_crime_bill_1994: "Ley de lucha contra la delincuencia violenta y aplicación de la ley"
 amendment_crime_bill_1994_desc: "El Proyecto de Ley de Delitos de 1994 es la mayor legislación criminal en la historia de id=0/año. Financia a decenas de miles de nuevos agentes de policía, amplía el sistema penitenciario federal, introduce penas mínimas obligatorias para diversos delitos, y crea la Ley de Violencia contra la Mujer como piloto. Tormoil cae. Las comunidades más fuertemente policíadas bajo ella tendrán una visión diferente de su legado."

 # ==========================================
 # CHINA
 # ==========================================

 amendment_china_tax_reform_1994: "Reforma del sistema de distribución de impuestos"
 amendment_china_tax_reform_1994_desc: "La reforma tributaria de 1994 sustituyó al sistema fiscal basado en la empresa, en el que los gobiernos locales negociaron acuerdos de participación en los ingresos con Beijing, con un impuesto nacional sobre el valor añadido y una fórmula oficial para compartir los ingresos. La reforma centralizó dramáticamente el poder fiscal. Beijing ganó una corriente de ingresos fiable y creciente. Los gobiernos locales perdieron discreción pero ganaron claridad. Es la base de la arquitectura fiscal moderna de id=0/año."

 amendment_one_child_policy: "Política de un niño"
 amendment_one_child_policy_desc: "El Estado impone un límite de un niño por familia mediante una combinación de incentivos financieros, presión social y, en algunos casos, intervención coercitiva. La tasa de natalidad cae marcadamente. A lo largo de las siguientes décadas, id=0/año envejecerá rápidamente, y la fuerza laboral se contraerá. La política se aplica más estrictamente en las zonas urbanas y más desigualmente en las rurales. La comunidad internacional y los críticos nacionales se oponen a sus métodos."

 amendment_socialist_market_economy: "Socialist Market Economy"
 amendment_socialist_market_economy_desc: "La economía socialista de mercado es el marco teórico bajo el cual id=0/jero opera mecanismos de mercado mientras que el Partido mantiene la dirección económica y política definitiva. La empresa privada está permitida y fomentada dentro de los límites establecidos por el Estado. Se acoge selectivamente la inversión extranjera. Las contradicciones son reales y deliberadas; el marco está diseñado para aprovechar la eficiencia del mercado sin renunciar al control de las partes. Funciona en su camino."

 # ==========================================
 # FRANCE
 # ==========================================

 amendment_35_hour_work_week: "35-Hour Work Week"
 amendment_35_hour_work_week_desc: "The Aubry Laws mandate a statute 35-hour working week for most employees, reducing standard hours from 39. La política se presenta como una forma de compartir el trabajo más ampliamente entre la población, menos horas por trabajador, más trabajadores empleados. Los sindicatos celebran. Los empleadores sostienen que aumenta los costos y reduce la flexibilidad. El debate sobre si realmente aumenta el empleo o simplemente redistribuye el trabajo existente no se resolverá rápidamente."

 amendment_pasqua_law: "Pasqua Law"
 amendment_pasqua_law_desc: "The Pasqua Law tightens immigration regulations significantly — stricter naturalization requirements, reduced family gathering rights, expanded grounds for deportation, and new restrictions on the right to remain for those who entered illegally. El Ministro del Interior Charles Pasqua lo enmarca como cuestión de orden nacional y coherencia cultural. Los críticos argumentan que es un retroceso deliberado de la tradición de asilo e inclusión de id=0/. La ley aprueba un importante apoyo público y protestas importantes."

 amendment_medicaid_modifier: "Medicaid"
 amendment_medicaid_modifier_desc: "El seguro médico federal cubre a los ciudadanos de bajos ingresos. La mortalidad se reduce, especialmente entre los estratos más pobres."

 amendment_affordable_care_act_modifier: "Obamacare"
 amendment_affordable_care_act_modifier_desc: "Cobertura de salud privada con subsidios y protección de condiciones preexistentes. La moral baja modestamente; los costos aumentan para los empleadores de ingresos medianos y el estado."

 amendment_federal_assault_weapons_ban_modifier: "Federal Assault Weapons Ban"
 amendment_federal_assault_weapons_ban_modifier_desc: "Se prohíbe la fabricación y venta de armas semiautomáticas específicas. La radiación se reduce marginalmente."

 amendment_authorization_military_force_modifier: "Autorización para el uso de la fuerza militar"
 amendment_authorization_military_force_modifier_desc: "La autoridad ejecutiva amplia para utilizar la fuerza militar contra actores no estatales reduce el costo diplomático de intervención y amplía los intereses declarados de id=0/año."

 amendment_patriot_act_modifier: "The PATRIOT Act"
 amendment_patriot_act_modifier_desc: "Las autoridades de vigilancia interna ampliadas están suprimiendo la agitación y la actividad revolucionaria. La legitimidad y la reputación diplomática han tenido un modesto éxito."

 amendment_crime_bill_1994_modifier: "1994 Crime Bill"
 amendment_crime_bill_1994_modifier_desc: "La policía ampliada y los mínimos obligatorios están reduciendo la turbulencia. La mortalidad policial ha aumentado modestamente. El presupuesto está bajo presión."

 amendment_china_tax_reform_1994_modifier: "Reforma del sistema de distribución de impuestos"
 amendment_china_tax_reform_1994_modifier_desc: "Un sistema fiscal centralizado de valor añadido está mejorando los ingresos fiscales y reduciendo los desechos. La autoridad está marginalmente mejorada."

 amendment_one_child_policy_modifier: "Política de un niño"
 amendment_one_child_policy_modifier_desc: "Los límites de nacimiento forzados por el Estado han reducido considerablemente la tasa de natalidad. La población de id=0/año envejecerá significativamente en las décadas venideras."

 amendment_socialist_market_economy_modifier: "Socialist Market Economy"
 amendment_socialist_market_economy_modifier_desc: "Los mecanismos de mercado que operan bajo la dirección del partido están impulsando la construcción privada, mejorando el rendimiento y ampliando la inversión industrial. El apoyo al movimiento comunista se reduce modestamente."

 amendment_35_hour_work_week_modifier: "35-Hour Work Week"
 amendment_35_hour_work_week_modifier_desc: "Los límites estatutarios de las horas de trabajo han mejorado considerablemente las condiciones de trabajo. El rendimiento se reduce marginalmente. Los sindicatos están satisfechos; los empleadores no lo están."

 amendment_pasqua_law_modifier: "Pasqua Law"
 amendment_pasqua_law_modifier_desc: "Los requerimientos de inmigración más estrictos han aumentado la restricción y reducido la tirada migratoria. La aceptación cultural de las poblaciones no nacionales ha disminuido."
