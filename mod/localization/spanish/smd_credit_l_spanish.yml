 # ==========================================
 # THE RESERVE CURRENCY
 # ==========================================

 je_reserve_currency:0 "Moneda reserva"
 je_reserve_currency_reason:0 "id=0/ título exporta crédito internacionalmente - haciendo que el sector bancario id=1/ título sea un jugador significativo en el sistema financiero global. Cuando los distritos financieros de otras naciones requieren crédito para sostener sus operaciones, se extraen de bancos id=4/ título. Esto crea una forma de apalancamiento estructural: los países que importan crédito de id=5/propiedad se convierten, en cierto grado, en dependientes del flujo continuo de ese crédito para la salud de sus sectores financieros. Los distritos financieros de los países importadores exigen que el crédito funcione eficazmente. Cuando el precio del crédito se eleva por encima del precio de los valores, sus inversores pierden dinero en la construcción y el desarrollo. Una contracción repentina del crédito, mediante sanciones o embargo, obligaría a esos países a producir créditos en el país, un proceso más lento y costoso."

 je_reserve_status_strong_tt:0 "id=0/ título id=1/ título es ampliamente negociado. Se trata de las exportaciones de id=2/ título superior a неx id=3/ título 5,000 unidades de id=4/ título. Los mercados financieros extranjeros han desarrollado una dependencia significativa en el suministro bancario id=5/propiedad."
 je_reserve_status_moderate_tt:0 "id=0/ título id=1/ título es un crédito internacionalmente activo. Seguido id=2/ título Las exportaciones excedan idux id=3/ título 2,500 unidades efectuadasx id=4/ título. Una parte significativa de la actividad financiera extranjera depende del suministro de id=5/ título."
 je_reserve_status_marginal_tt:0 "id=0/ título id=1/ título El crédito id=1/ título está entrando en mercados internacionales. El papel es modesto pero creciente."

