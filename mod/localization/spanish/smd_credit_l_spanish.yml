 # ==========================================
 # THE DOLLAR 
 # ==========================================

 je_the_dollar:0 "El dólar"
 je_the_dollar_reason:0 "El dólar de los Estados Unidos es la moneda de reserva mundial. id=0/ título exporta más crédito que cualquier otra nación, y al hacerlo, tiene una posición de poder financiero extraordinario. Cuando los distritos financieros de otras naciones requieren crédito para sostener sus operaciones, miran a los bancos id=3/tios para suministrarlo. Mientras el dólar fluya, los capitalistas de esos países pueden construir, invertir y obtener ganancias. Si id=4/año opta por restringir ese flujo, mediante sanciones, embargo o contracción deliberada, las consecuencias para los mercados financieros extranjeros serían inmediatas y severas. Exportar crédito no es simplemente comercio. Es el ejercicio de la soberanía monetaria sobre los países que han llegado a depender de la infraestructura financiera de id=8/prop. Sus distritos financieros requieren crédito. Si el precio del crédito se eleva por encima del precio de los valores, sus inversores comienzan a perder dinero. Si el crédito deja de fluir por completo, sus bancos deben asfixiarse para producir lo suficiente internamente — un proceso que lleva tiempo que no pueden tener."

