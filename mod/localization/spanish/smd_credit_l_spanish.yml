 # THE FINANCIAL SYSTEM — je_financial_system
 # ==========================================

 je_financial_system:0 "El Sistema Financiero"
 je_financial_system_reason:0 "Esta entrada de la revista es totalmente opcional — no necesita involucrarse con el sistema de crédito y valores para jugar el juego. Es aquí como referencia para aquellos que quieren entenderlo. ¿Cómo funciona el sistema? Los distritos financieros compran crédito y, en el método de producción negociado públicamente, venden id=8/ títulos obtenidosx id=9/año. Los valores dan a los inversores un beneficio extra al reinvertir en la nueva construcción, pero sólo cuando el precio de los valores es más alto que el precio del crédito. Esto significa que hay un equilibrio natural que el mercado busca: Cuando неx id=12 / título de crédito es barato efectuax id=13/ título relativo a valores, beneficios de distritos financieros e inversores construyen más agresivamente. La construcción se acelera en toda la economía. Cuando securities id=16/ títulos son baratos securities hechosx id=17/ título relativo al crédito, los distritos financieros pierden dinero comprando crédito que no pueden convertir rentablemente. Los bancos encuentran su producto menos valioso. La construcción disminuye. La relación precio entre crédito y valores es por lo tanto la señal clave para observar. Una distribución saludable — valores por encima del crédito— significa que su sector financiero está funcionando según lo previsto y sus capitalistas están recibiendo rendimientos en la inversión de la construcción. Si el crédito aumenta por encima de los valores, sus distritos financieros están operando a una pérdida en cada unidad que procesan. Los bancos se vuelven rentables, pero los inversores retrasan su actividad y su economía crecen menos dinámicamente.Seguido id=24/ contactosx id=25/ titulax id=26/conferencia El Banco Central seccionóx id=27/Consejo recomendadox id=28/Consejo recomendadox id=29/consejo Puede utilizar la institución id=30/ título Central Bank madex id=31/propiedad para influir directamente en la producción de valores. Invertir en el Banco Central aumenta el suministro de valores en su mercado, lo que reduce su precio relativo al crédito. Esto significaría que id=32/conferencias cortaron sus bancos comerciales realizadosx id=33/conferencia, que encuentran su crédito menos rentable para producir, pero lo hará id=34/conferencia ampliando la inversión industrial efectuadax id=35/conferencia manteniendo los valores de crédito favorables para sus capitalistas. Esto es un intercambio deliberado: la inversión del Banco Central favorece el crecimiento industrial a expensas de la rentabilidad bancaria. Si esa compensación vale la pena depende de su estrategia económica."

 je_financial_credit_expensive_tt:0 "id=0/ título El crédito está negociando por encima de su precio base. Los bancos comerciales son rentables. Los distritos financieros están pagando una prima por crédito, que está apretando sus márgenes en la producción de valores. Los inversores pueden frenar su actividad de construcción si la difusión se vuelve desfavorable."
 je_financial_securities_expensive_tt:0 "Securities están negociando por encima de su precio base. Los distritos financieros son rentables — están convirtiendo el crédito en valores a un margen saludable. Los inversores están recibiendo buenos resultados en la construcción. Los bancos se enfrentan a una presión modesta ya que su producto se precio por debajo de las mercancías que alimentan."
 je_financial_balanced_tt:0 "El crédito y los valores están negociando cerca de sus precios básicos. El sistema financiero está en equilibrio: los bancos son marginalmente rentables y los inversores reciben rendimientos moderados."

 ### Great Recession

 je_subprime_mortgage_crisis:0 "Crisis de la hipoteca subprime"
 je_subprime_mortgage_crisis_reason:0 "Las instituciones financieras id=0/tio están emitiendo y empaquetando valores respaldados por hipotecas a escala, acumulando préstamos hipotecarios subprime en instrumentos vendidos en todo el sistema financiero mundial. Los valores se clasifican como seguros. No están a salvo. Cuando las hipotecas subyacentes comienzan a predeterminarse, cada institución que sostiene estos instrumentos descubrirá simultáneamente que sus hojas de balance están construidas sobre papel sin valor. Si el precio de los valores no corre significativamente antes de que madure la crisis, se congelará el sistema bancario id=4/ título, y el choque se sentirá por cada economía con vínculos sustanciales con id=5/año."

 je_great_recession:0 "La Gran Recesión"
 je_great_recession_reason:0 "El sistema financiero de los Estados Unidos se ha colapsado. Los valores respaldados por hipotecas, que son mantenidos por bancos de todo el mundo han sido revelados como casi inútiles. Los mercados de crédito se han congelado. Los bancos no se prestarán entre sí, ni mucho menos a las empresas. La inversión se ha secado. La construcción ha disminuido. La recesión es global. El mercado corregirá. Siempre lo hace. La pregunta es cuánto daño se hace antes de hacerlo."

 # Status descriptions
 subprime_je_danger_tt:0 "El precio de los valores no ha caído suficientemente. Seguridades respaldadas por hipotecas id=0/tio aún están sobrevaloradas: el mercado todavía no tiene precio en el riesgo. Cuanto más perdura esto, más catastrófico es la eventual corrección."
 subprime_je_safe_tt:0 "Securities han bajado más del 35% por debajo del precio base. El mercado está corregiendo. Si esto sostiene, el accidente puede ser evitado — o al menos suavizado."

 great_recession_je_usa_tt:0 "El sistema bancario id=0/tio está en crisis. El crujiente de crédito está reduciendo el rendimiento bancario fuertemente, congelando la inversión y la construcción. La recesión durará hasta que el mercado corrija, aproximadamente diez meses."
 great_recession_je_global_tt:0 "Los vínculos comerciales sustanciales de id=0/año con id=1/conferencia han transmitido el choque financiero. Los bancos de id=2/ título están expuestos a instrumentos financieros de id=3/ título. El crédito es más estricto, la inversión ha disminuido y la recesión ha llegado."

