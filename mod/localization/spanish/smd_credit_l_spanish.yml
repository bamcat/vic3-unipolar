 great_recession_credit_crunch:0 "Crédito Crunch"
 great_recession_credit_crunch_desc:0 "El sistema bancario se ha apoderado. Los bancos se niegan a prestar a las empresas, entre sí, a cualquiera. El crédito se ha evaporado. La inversión se ha derrumbado. La construcción ha disminuido. La economía no se recuperará hasta que la confianza regrese al sistema financiero."
