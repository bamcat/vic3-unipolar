 # ==========================================
 # SPARK EVENTS
 # ==========================================

 2011_protests.1.t: "Un vendedor de la calle se pone a la luz"
 2011_protests.1.d: "En la ciudad provincial de Sidi Bouzid, un joven vendedor callejero llamado Mohamed Bouazizi se ha incendiado frente a las oficinas del gobierno local después de que la policía confiscara su carrito y lo humillara públicamente. El acto de desesperación se ha convertido en una barra de relámpago. Dentro de horas, las imágenes de su protesta se han propagado por las redes sociales. Los cuervos se han reunido no sólo en Sidi Bouzid sino a través de idx id=2/conejo. La furia acumulada de una generación, sobre la corrupción, el desempleo y el peso de la regla autoritaria, ha encontrado su símbolo. El régimen de ierex id=5/año debe decidir cómo responder. Lo que sea que haga, el mundo está mirando."
 2011_protests.1.f: "La desesperación de un hombre se ha convertido en una nación."
 2011_protests.1.a: "Desgarrar — dispersar las manifestaciones antes de que se extendieran"
 2011_protests.1.b: "Ofrecer concesiones - anunciar una investigación sobre conducta policial"

 2011_protests.2.t: "The Tunisian Tremor"
 2011_protests.2.d: "Los disturbios en Túnez han enviado una onda de choque en todo el mundo árabe. Los canales de satélite están emitiendo las escenas de Túnez durante todo el día, y la gente común en idx id=0/año están viendo. La pregunta que se está susurrando en las cafeterías y en las redes sociales es la misma que se hace ahora todo régimen autoritario en la región: ¿Podría pasar aquí?"
 2011_protests.2.f: "Cada régimen está mirando. Cada disidente toma nota."
 2011_protests.2.a: "Túnez es diferente: esto no se extenderá a id=0/"
 2011_protests.2.b: "Tomar precauciones — reforzar la seguridad antes de que esto salga de la mano"

 # ==========================================
 # MISSING STRUCTURAL MODIFIERS
 # ==========================================

 modifier_arab_spring_transition_cabinet: "Gobierno de Transición"
 modifier_arab_spring_transition_cabinet_desc: "Se está formando un nuevo gobierno tras la revolución. La legitimidad es alta en estos primeros días, pero tendrá que consolidarse antes de que la contrarrevolución encuentre su pie."

 modifier_arab_spring_kick_out_of_insurrection: "De pie de los Barricados"
 modifier_arab_spring_kick_out_of_insurrection_desc: "La revolución ha alcanzado sus objetivos inmediatos. Este grupo está abandonando su postura insurreccionaria y entrando en la vida política formal, agitada por la buena voluntad del momento."

 modifier_arab_spring_regime_ig_defeated: "Derrotada por la revolución"
 modifier_arab_spring_regime_ig_defeated_desc: "La asociación de este grupo con el viejo régimen le ha costado caro. Ha sido expulsado del gobierno y su fuerza política se disminuye. Queda por ver si puede reconstruirse desde los márgenes."

# ==========================================
 # ARAB SPRING INTERNATIONAL EVENTS
 # ==========================================

 # ── arab_spring_intl.1 ───────────────────

 arab_spring_intl.1.t: "El mundo árabe está quemando"
 arab_spring_intl.1.d: "Las protestas han surgido en todo el mundo árabe, comenzando en Túnez. Décadas de gobierno autoritario, estancamiento económico y represión política han llevado a millones a las calles."
 arab_spring_intl.1.f: "La historia mira a los que ven la historia."
 arab_spring_intl.1.a: "Manténganse con los manifestantes —la democracia y los derechos humanos lo exigen"
 arab_spring_intl.1.b: "Retrocedan los regímenes titulares: la estabilidad y nuestros intereses son los primeros"
 arab_spring_intl.1.c: "Llamar a la moderación de todas las partes — instar a una resolución pacífica"

 # ── arab_spring_intl.2 ───────────────────

 arab_spring_intl.2.t: "La cuestión de la intervención"
 arab_spring_intl.2.d: "La situación en idx id=0/año se ha deteriorado en una guerra civil abierta. Las fuerzas de id=1/año están atacando poblaciones civiles, y hay reportes creíbles de masacres. La comunidad internacional está pidiendo una respuesta. La cuestión ahora es si ese apoyo se extiende a la acción y a qué costo."
 arab_spring_intl.2.f: "Las palabras y hechos son monedas diferentes."
 arab_spring_intl.2.a: "Forzar una zona de exclusión aérea: proteger a los civiles de los ataques aéreos"
 arab_spring_intl.2.b: "Arm and support opposition forces on the ground"
 arab_spring_intl.2.c: "Esta no es nuestra guerra: no te metas."

 # ── arab_spring_intl.3 ───────────────────

 arab_spring_intl.3.t: "La Primavera Árabe: Un Reckoning"
 arab_spring_intl.3.d_success: "La Primavera Árabe ha producido al menos una auténtica transición democrática. Es un logro frágil, fácilmente revertido — pero es real. Para id=0/año, que vio que estos eventos se desarrollaban a distancia, hay una satisfacción tranquila al ver que el arco de la historia puede, a veces, doblarse hacia la justicia. La pregunta ahora es cómo apoyar lo que se ha ganado."
 arab_spring_intl.3.d_islamist: "La Primavera Árabe ha terminado, y no como esperaban sus arquitectos. En toda la región, los movimientos islamistas han sido mejor organizados que las coaliciones de protesta secular que iniciaron los levantamientos. Para id=0/año, el resultado es incómodo: la democracia que defendió ha producido gobiernos cuyos valores difieren marcadamente de los suyos. La relación con el nuevo orden árabe requerirá una navegación cuidadosa."
 arab_spring_intl.3.d_failure: "La Primavera Árabe ha sido extinguida. Los regímenes que parecían temblar se han estabilizado, se reconstituyeron sus servicios de seguridad, sus opositores en el exilio o en la cárcel. Para id=0/año, el episodio es un recordatorio de que la claridad moral es más fácil que la eficacia moral. Las quejas que provocaron los levantamientos no se han resuelto. Sólo han sido pospuestos."
 arab_spring_intl.3.f: "El mundo sigue adelante. La región no olvida."
 arab_spring_intl.3.a: "Haz balance de lo que ha pasado."

 # ==========================================
 # INTERNATIONAL MODIFIER NAMES
 # ==========================================

 arab_spring_intl_pro_democracy_stance: "Pro-Democracy Stance"
 arab_spring_intl_pro_democracy_stance_desc: "Este país se ha alineado públicamente con los movimientos de protesta de la Primavera Árabe. Su prestigio entre las naciones democráticas ha aumentado, pero las relaciones con los actuales regímenes árabes se han enfriado."

 arab_spring_intl_stability_first_stance: "Primera etapa"
 arab_spring_intl_stability_first_stance_desc: "Este país ha optado por respaldar a los actuales regímenes árabes sobre los movimientos de protesta. Las relaciones estratégicas en la región son más fuertes, pero a un costo para su reputación internacional."

 arab_spring_intl_neutral_stance: "Cautious Restraint"
 arab_spring_intl_neutral_stance_desc: "Este país ha pedido una resolución pacífica sin apoyar a ninguna de las dos partes. Ha preservado su flexibilidad diplomática, pero ha sacrificado su influencia sobre el resultado."

 arab_spring_intl_western_backing: "Western Backing"
 arab_spring_intl_western_backing_desc: "Este movimiento ha recibido apoyo público de gobiernos occidentales. La atención internacional está añadiendo su impulso y haciendo que la represión sea más costosa para el régimen."

 arab_spring_intl_regime_backing: "Western Regime Support"
 arab_spring_intl_regime_backing_desc: "Los gobiernos occidentales han arrojado su peso detrás de este gobierno en lugar de los manifestantes. La validación externa está fortaleciendo la autoridad y legitimidad del régimen."

 arab_spring_intl_no_fly_zone: "Realización de una zona de exclusión aérea"
 arab_spring_intl_no_fly_zone_desc: "Se están desplegando activos militares para hacer cumplir una zona de exclusión aérea en la zona de conflicto. La intervención está protegiendo a los civiles, pero es costosa y atrae el escrutinio internacional."

 arab_spring_intl_arming_rebels: "Fuerzas de la Oposición Armadora"
 arab_spring_intl_arming_rebels_desc: "Se están canalizando armas y equipo a las fuerzas de oposición en el conflicto. La política es encubierta pero no secreta, y las consecuencias a largo plazo de quién recibe este apoyo siguen siendo poco claras."

 arab_spring_intl_intervention_costs: "Costos de la intervención"
 arab_spring_intl_intervention_costs_desc: "La intervención militar en el extranjero está agotando los recursos y generando un debate político nacional. Los costos en el tesoro y el capital político son reales."

 arab_spring_intl_non_interventionist: "Non-Interventionist"
 arab_spring_intl_non_interventionist_desc: "Este país ha optado por no intervenir en la guerra civil árabe. La decisión ha reducido su exposición y preservado el capital político nacional, aunque los críticos argumentan que ha abandonado sus valores declarados."
