l_spanish:
 
  # Middle East
  YMN_FLAVOR_TEXT:0 "Los esfuerzos para mantener el poder se han agotado y la guerra se ha roto dentro del Yemen entre el Viejo Gobierno, el Consejo de Transición &quot; el Houthi. Esta guerra brutal ha traído consigo los ojos desgarradores de los poderes de Arabia, que se enfrentan entre sí para hacer que Yemen se mueva a su favor. ¿Tendrá Yemen que soportar subyugación por sus vecinos, o podrán salir arriba?"
  HOU_FLAVOR_TEXT:0 "$YMN_FLAVOR_TEXT$"
  STC_FLAVOR_TEXT:0 "$YMN_FLAVOR_TEXT$"
  SYR_FLAVOR_TEXT:0 "Siria está sufriendo actualmente una compleja guerra civil que se ha convertido en una guerra proxy contra varios poderes. La región sigue siendo extremadamente hostil &quot; los conflictos sólo se intensifican entre los creyentes interinos en su derecho a gobernar, y Rojava se libera para formar una república más progresista. Los refugiados salen y enjambren a Europa en busca de tierras más seguras para vivir. ¿Siria terminará la guerra &quot; traerá de vuelta a su población rápidamente fugaz, o está destinada a fracasar y convertirse en un vacío para los otros poderes?"
  SIG_FLAVOR_TEXT:0 "$SYR_FLAVOR_TEXT$"
  ROJ_FLAVOR_TEXT:0 "$SYR_FLAVOR_TEXT$"
  IRA_FLAVOR_TEXT:0 "Irán está a punto de su propia revolución islámica, El país se ha sentado con la relativa estabilidad del islam tradicional y no se ha visto afectado por la primavera del arab. Sin embargo, los efectos de la Primavera Árabe no han pasado desapercibidos por la población más joven, y la población anhela el fin de sus formas extremistas-tradicionales. ¿Puede Irán aferrarse a sus valores tradicionales? ¿O serán derrocados por una población más multicultural?"
  
  # East Asia
  PRC_FLAVOR_TEXT:0 "La República Popular China se sienta como un hegemon económico global y ha sido financiada por naciones menos afortunadas. Sin embargo, los esquemas de tracción de la deuda están respaldando, y la dependencia de bienes hechos por chino está siendo debilitada por la automatización de sus vecinos cercanos. ¿Puede China restablecer su dominio económico? ¿O están destinados a desmoronarse debido a las tensiones internas?"
  NRK_FLAVOR_TEXT:0 "Corea del Norte sigue siendo el último bastión de la dictadura maoísta en el planeta. Los diversos juegos mentales y lavado de cerebros de la nación siguen siendo excruciosamente eficaces a pesar de lo estricto y mortal que es su régimen. ¿El régimen de 80 años durará otros 80? o es para reencuentro con su vecino al sur &quot; reconstruir desde allí?"
  JPN_FLAVOR_TEXT:0 "Japón ha permanecido una nación desarmada desde el fin de la Segunda Guerra Mundial, sin embargo esto no ha detenido su control económico extremo. Los automóviles japoneses &quot; electrónicos japoneses son conocidos por todo el mundo y venerados como el mejor de los mejores. Pero esto no es sin sacrificio... El país tiene una población envejecida y está emparejado entre muchas potencias regionales. ¿Qué se necesita para que Japón siga siendo independiente?"
  
  # Oceania
  AUZ_FLAVOR_TEXT:0 "Australia, la tierra de la oportunidad "Dream". Mientras que la posición de los Estados Unidos falte, Australia, a pesar de sus deficiencias y un entorno más cálido, el continente que atraviesa el país ha reverenciado el nombre "La Tierra de la Oportunidad". Sin embargo, las divisiones políticas internas &quot; el clima de calentamiento busca arruinar la oportunidad de Australia de ser un bastión de prosperidad. ¿Puede Australia atravesar con éxito el mundo moderno?"
  
  # Balkans
  SRB_FLAVOR_TEXT:0 "Serbia se sienta como un estado de triunfo y remanente final del fallido experimento yugoslavo. Habiendo perdido tanto Montenegro como Kosovo en los últimos años, la nación anhela una victoria. ¿Recuperará Serbia la gloria perdida de Yugoslavia?"
  
  # Europe
  ENG_FLAVOR_TEXT:0 "Inglaterra ha rugido a lo largo del siglo XX ejerciendo la fuerza como un gran poder, sin embargo múltiples recesiones, corrupción política a gran escala y legitimidad ha puesto en tela de juicio el acto de unión. ¿Puede Inglaterra retener su control sobre sus dominios? ¿O dejar el mercado europeo ha sido la pajita final?"
  SCO_FLAVOR_TEXT:0 "Escocia ha permanecido relativamente inexplorada a lo largo de las recesiones del siglo XXI, y sigue prosperando desde que se concedió la devolución. La corrupción a gran escala &quot; falta de representación dentro del sindicato ha puesto en tela de juicio su lugar. ¿Será próspero cuando obtenga la independencia? ¿O el sindicato será el camino del futuro?"
  NIR_FLAVOR_TEXT:0 "El último puesto del Imperialismo Británico en Irlanda, Irlanda del Norte es un barril de pólvora esperando ser iluminado. Los problemas pueden terminar, pero la cuestión de su soberanía sigue permeando mientras las generaciones más jóvenes anhelan la unificación con sus hermanos del sur... Británico en Irlanda, ¿va a ir el camino de los monarcas?"
  IRE_FLAVOR_TEXT:0 "Irlanda se ha transformado de un país bajo la bota imperial british, al faro brillante de la anglósfera, los esfuerzos por reavivar su lenguaje y distanciarse de la del Reino Unido han demostrado ser exitosos y los esfuerzos entre su vecino al norte han llevado a un deseo de unidad. ¿Qué vendrá después para la Isla Esmeralda?"
  UKR_FLAVOR_TEXT:0 "Los esfuerzos de occidentalización dentro de Ucrania han ido lejos y la vida de muchos ucranianos está mejorando rápidamente, sin embargo, una invasión rusa por Crimea 8 años antes ha quitado una región importante. Los separatistas en el este también han dado a Rusia una apertura a la tierra. ¿Puede Ucrania traer a los separatistas de nuevo bajo el pliegue, o es Ucrania el próximo objetivo en las ambiciones crecientes de Rusia"
  CYP_FLAVOR_TEXT:0 "Chipre se sienta como una isla dividida por los grupos étnicos, griegos en el sur, turcos en el norte. Sin embargo, se está formando una identidad chipriota creciente y tal vez no sea mucho antes de que haya llamamientos para unificar la nación de una vez por todas. ¿Podrá Chipre unificarse con éxito o están destinados a estar siempre divididos?"
  BYL_FLAVOR_TEXT:0 "Belarús está al comienzo de una revolución política, sus ciudadanos están activamente en contra del gobierno &quot; el verdadero jefe de Estado había perdido la elección mediante un voto arduo. Lukashenko está calentando a su vecino ruso para proteger su control. ¿Lukashenko tendrá éxito, o los bielorrusos pondrán fin a su gobierno ilegítimo?"
  SPA_FLAVOR_TEXT:0 "España está perdurando un auge agradable tras el derrocamiento del movimiento Falangista, Es un país de modernización rápida, y está haciendo esfuerzos hacia un futuro mayor para su pueblo. Sin embargo, no todos están de acuerdo con su dirección, ya que un movimiento de independencia en Cataluña gana vapor. España prosperará con o sin Cataluña?"
  XSP_FLAVOR_TEXT:0 "España está perdurando un auge agradable tras el derrocamiento del movimiento Falangista, Es un país de modernización rápida, y está haciendo esfuerzos hacia un futuro mayor para su pueblo. Sin embargo, no todos están de acuerdo con su dirección, ya que un movimiento de independencia en Cataluña gana vapor. España prosperará con o sin Cataluña?"
  NRW_FLAVOR_TEXT:0 "Noruega sigue siendo uno de los pocos países que entran en el siglo XXI una nación más fuerte que antes, un sistema de seguridad social fuerte &quot; poderosos recursos que puede empujar al mercado para convertirlo en el lugar de los sueños. Sin embargo, a medida que el mundo se aleja del petróleo, ¿no puede Noruega mantener con éxito su proeza, o la onda de aceite será su desaparición?"
  RSF_FLAVOR_TEXT:0 "Desde la caída de la Unión Soviética, Rusia, Su estado sucesor, ha falte para aferrarse a la misma potencia económica &quot; sin embargo. La mayoría de sus campañas desde la caída del sindicato han sido restablecer el dominio económico. Dentro de Georgia en 2008, y dentro de Ucrania en 2014. Sin embargo, los oligarcas hablan de otra campaña en Ucrania, para tomar las tierras al este del niegue &quot; las regiones separatistas del este. ¿Es este su camino en el siglo XXI, o fracasarán?"
  EUR_FLAVOR_TEXT:0 "La Unión Europea es el cerebro-hijo de la reconstrucción después de la guerra después de la devastación causada por WW2. Desde entonces ha evolucionado para incluir a la mayoría del continente, prohibir algunas naciones como Noruega &quot; Suiza &quot; , o los antiguos estados yugoslavos de los Balcanes occidentales. El sindicato sólo se ha fortalecido ya que la elección inusual del Reino Unido para librarse de él, y la mayoría de las conversaciones de dejarlo ya no se han tomado en serio en la mayoría de los países, La Unión sólo se fortalece mucho desde aquí mientras crecen las conversaciones de una federación. ¿La Unión Europea evolucionará hacia la Federación Europea? ¿O la Unión Europea terminará solo mencionada en los libros de historia?"
  TRK_FLAVOR_TEXT:0 "Türkiye se sienta como la principal barrera en las ambiciones marinas de Rusia, y tiene un gancho estratégico sobre muchos de sus vecinos. Se involucró activamente en los conflictos hacia el sur, apoyando al Gobierno Provisional de Siria y teniendo milicias activas en África, el Oriente Medio. La posición de Türkiye en la región anatólica le ofrece un gran control sobre las regiones que la rodean, y afianza las ambiciones de los Osmans ante ella. ¿Türkiye mantendrá sus ambiciones? ¿O está destinado a fallar como los otomanos antes?"
  
  # North America
  USS_FLAVOR_TEXT:0 "Estados Unidos tuvo un próspero siglo XX gracias al boom económico de la posguerra y ha catapultado como la única superpotencia para finales del siglo. Sin embargo, la corrupción a gran escala &quot; tácticas mal manejadas por las corporaciones sirven para desgarrar la tela en el sindicato. A medida que Estados Unidos cae más atrás tanto socialmente como económicamente. ¿Qué espera el futuro para la Unión, y serán capaces de recuperar su antigua gloria?"
  MEX_FLAVOR_TEXT:0 "Narcotrófilos El imperialismo estadounidense son las características definitorias del siglo XXI México. Sin embargo, se han hecho muchos esfuerzos para resolver los cárteles sin que EE.UU. combata una guerra en su suelo. Lo que mexico tiene guardado para el próximo siglo, y pueden escapar con éxito de las garras del imperialismo estadounidense"
  CAN_FLAVOR_TEXT:0 "Canadá rugió hacia el siglo XXI como una nación estable carente de enormes problemas. Sin embargo, las Primeras Naciones exigen concesiones sobre su horrible trato desde la fundación del reino canadiense. ¿Dice Canadá?"
  
  # Central Asia
  AFH_FLAVOR_TEXT:0 "El cementerio de imperios, Afganistán, ha resistido con éxito los esfuerzos del imperialismo americano y ha garantizado su soberanía como un poder regional. Sin embargo, los conflictos entre los diversos grupos étnicos &quot; detractores de la fe amenazan el modo de vida tradicional. ¿Puede Afganistán superar con éxito sus formas tradicionales?"
  AZB_FLAVOR_TEXT:0 "Azerbaiyán es una nación próspera de los caucasos, los descubrimientos recientes de las reservas de petróleo &quot; Gas &quot; han hecho de ella un importante aliado a Europa, sin embargo, los conflictos de Artsakh, y las guerras fronterizas posteriores con su vecino Armenia han estado impidiendo que lleguen a sus mayores. ¿Puede Azerbaiyán resolver pacíficamente esta crisis o se convertirá en guerra?"
  KZK_FLAVOR_TEXT:0 "Kazajistán está entre diferentes dirigentes y ha caído a una anarquía leve. Su líder anterior dejó un vacío de poder masivo &quot; nuevos gobernantes han aparecido para intentar dirigir Kazajstán en una dirección muy agradable. ¿Puede Kazajistán sobrevivir es la lucha de poder interno?"
  UZB_FLAVOR_TEXT:0 "Uzbekistán ha luchado por liberarse de la dictadura desde su separación de la URSS en los años 90, sin embargo ha comenzado con éxito a liberalizar &quot; continúa mejorando su situación con sus vecinos. Si bien sigue siendo más afortunado, no se puede decir lo mismo de algunos de sus vecinos, y tendrá que proclamar su soberanía para sobrevivir..."
  
  # Africa
  SAF_FLAVOR_TEXT:0 "Sudáfrica es una nación que lucha por encontrar su camino, los conflictos que definen su historia han llevado a su resentimiento entre los diversos grupos étnicos, esta tensión sólo se hizo peor del apartheid. Si Sudáfrica tiene la intención de prosperar, tiene un camino difícil de concesiones, reconstruir &quot; reforma política a hacer. ¿Puede Sudáfrica hacer esto? O está destinado a desmoronarse."
  SSD_FLAVOR_TEXT:0 "Sudán del Sur nació del conflicto resultante de los grupos étnicos a lo largo del Nilo, es el país más nuevo que han de reconocer las Naciones Unidas, y tiene un largo camino por recorrer antes de que pueda considerarse un éxito. Las tensiones étnicas mantienen al país en una maniobra inmóvil y cuidadosa tendrá que hacerse para asegurar que esta nación no sea corta. ¿Es capaz de esto?"
  ETH_FLAVOR_TEXT:0 "Etiopía es una nación que moderniza rápidamente y ha logrado ser relativamente inestable por manos coloniales. Sin embargo, la nación todavía tiene sus problemas, ya que los grupos étnicos somalí, tigray &quot; oromia &quot; amenazan con arrastre a Etiopía en una guerra civil costosa. ¿Puede Etiopía seguir prosperando a pesar de la tensión?"
  EGY_FLAVOR_TEXT:0 "Egipto está experimentando un boom poblacional en medio de una extrema escasez de agua, y un gobierno tradicional fracasado. Los egipcios se van en las carreteras para mejores tierras y el Nilo se está secando lentamente. ¿Puede Egipto encontrar una manera de navegar por la crisis?"
  KYA_FLAVOR_TEXT:0 "Kenya es una nación africana estructuralmente sólida en medio de esfuerzos de modernización exitosos y de mejora rápida de los niveles de vida. Mientras Kenia puede estar mayormente desprovista de problemas graves, sus vecinos no tienen tanta suerte. Hay conversaciones para formar una Superpotencia de África Oriental dentro de la esfera política. ¿Kenya pondrá exitosamente las bases para formar una superpotencia africana? O la turbulencia dentro de sus vecinos afectará sus propias tierras."
  MOR_FLAVOR_TEXT:0 "Marruecos ha surgido en el siglo XXI fuerte y orgulloso tras su hábil subyugación de la república sahrawi, y sus principales mejoras en su disparidad económica. Ahora busca la asociación de los poderes europeos para promover su movilidad económica, y convertirse en un importante jugador en el continente africano. ¿Se alcanzarán las ambiciones de Marruecos?"
  GHA_FLAVOR_TEXT:0 "Después de una brutal junta militar en los años 80 apodado el 'Cold Chop' La situación económica de Ghana comenzó a caer masivamente. Sin embargo, desde el regreso de los partidos políticos y las elecciones, el país ha regresado a un período de estabilidad y prosperidad económica, y se prevé que seguirá haciéndolo. Sin embargo, la crisis climática &quot; la desertificación de los sahel amenaza una vez más la inestabilidad. ¿Puede Ghana navegar con éxito estas condiciones?"
  
  # South Asia
  VNM_FLAVOR_TEXT:0 "Vietnam se sienta como una nación de relativa estabilidad desde su descolonización. Siendo una de las pocas economías de mercado lejanas tiene sus ventajas, y mientras que los ciudadanos soportan una paz relativa, los turistas están abrumando al país. Opciones cuidadosas &quot; geopolítica inteligente puede permitir que tenga éxito extremadamente bien en el siglo XXI. Sin embargo, ¿hará estas elecciones?"
  IDA_FLAVOR_TEXT:0 "La India no sólo ha sobrevivido, sino que ha prosperado desde la disolución del raj británico el fin de 400 años de dominio colonial. However some post-colonial trauma with the separation of Myanmar, Bangladesh &apos; Pakistan have been a scar on an otherwise decent record. Sin embargo, el aumento de las tensiones entre la India y el Pakistán sobre las tierras de Jammu &quot; Cachemira es una causa importante de preocupación, y el aumento de las tensiones con el PRC sobre Arunchal Pradesh están poniendo en juego el conflicto armado. ¿Puede la India resistir con éxito 100 años más de Imperialismo?"
  PAK_FLAVOR_TEXT:0 "Pakistán se separó del Raj en los años 40 y 50 sobre las tensiones religiosas entre hindúes y musulmanes. Aunque muchos creen que el conflicto tiene un fin a la vista, sin embargo, entre los diversos grupos étnicos del conflicto del Pakistán se está gestando. Un movimiento equivocado &quot; puede haber un colapso del estado, y con tensiones con la India &quot; Afganistán a su altura, ¿puede Pakistán navegar estos problemas?"
  
  # South and Central America
  ARG_FLAVOR_TEXT:0 "Argentina es una nación que después de experimentar un éxito serio del siglo XX, ha fracasado debido a la intervención de Estados Unidos y un conflicto fallido sobre Las Malvinas. Las disputas entre el nativo Mapuche, los estados argentinos &quot; el gobierno de Buenos Aires han bloqueado muchos cambios. ¿Puede Argentina volver a su país a la gloria?"
  
  # Nonsense Countries
  GLI_FLAVOR_TEXT:2 "Galicia es un pequeño y poco notable país poblado por entusiastas de la catedral. ¿Recuperará Galicia su gloria pasada?"
  GENERIC_FLAVOR_TEXT:0 "The 21st Century is a time of relative peace & prosperity, however exploitation by the wealthy, waning standards of living and global communication have brought with it a resurgence in political activism and societal shifts like none ever seen. What will this new wave of political expression bring?
  REV_GENERIC_FLAVOR_TEXT:1 "Insatisfecho con la dirección que tomaba el llamado gobierno organizado, estos revolucionarios han decidido tomar armas para derrocarla. ¿Tendrán éxito en apoderarse del poder o serán aplastados como tantas revoluciones olvidadas del pasado?"
  DECENTRALIZED_FLAVOR_TEXT:0 "Atracado por poderes más organizados, este país lucha por mantener su autonomía. ¿Verán el amanecer de un nuevo siglo, o su nombre sobrevivirá sólo en libros de historia?"
