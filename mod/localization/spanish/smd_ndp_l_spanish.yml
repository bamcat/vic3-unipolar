l_spanish:

 je_national_development: "Sendero Nacional de Desarrollo"
 je_national_development_reason: "Cada nación debe elegir dónde enfocar sus energías. Un plan nacional de desarrollo concentra recursos, políticas y voluntad política detrás de una sola visión estratégica durante diez años. Elija sabiamente: la elección no puede ser revertida hasta que el programa concluye."

 je_foreign_investment: "Inversiones extranjeras"
 je_foreign_investment_reason: "Atraer capital de grandes potencias puede acelerar el desarrollo más allá de lo que los recursos internos permiten. Un tratado de inversión extranjera abriría al país a una empresa externa, con todas las oportunidades y dependencias que entrañan."
 has_foreign_investment_or_trade_agreement_with_west_tt:0 "Firmar un acuerdo de inversión extranjera y comercio con Estados Unidos, Reino Unido o Francia"
 
 ndp_status_industrial_tt: "La expansión industrial está en marcha. El país dirige recursos hacia la construcción de su base industrial pesada y de fabricación."
 ndp_status_military_tt: "La expansión militar está en marcha. El país está invirtiendo en sus industrias armadas, doctrina y defensa."
 ndp_status_resource_tt: "El desarrollo de la economía de recursos está en marcha. El país se centra en la agricultura y la extracción de materias primas."
 ndp_status_service_tt: "El desarrollo de la economía de servicio está en marcha. El país está construyendo su sector financiero, educación y capacidad estatal."
 ndp_status_none_tt: "Actualmente no hay camino de desarrollo activo. Seleccione un camino para iniciar un programa de desarrollo nacional de diez años."

 fi_status_seeking_tt: "El país busca un acuerdo de inversión extranjera con un gran poder. Firme un tratado de inversión para completar esta entrada de diario."
 fi_status_secured_tt: "Se ha asegurado un acuerdo de inversión extranjera. El capital extranjero está entrando."

 ndp_button_industrial_name: "Expansión industrial"
 ndp_button_industrial_desc: "Centrar los recursos nacionales en la construcción de la base de fabricación. Boosta industria pesada, fabricación ligera y construcción. Subelementos en el año 2: industria pesada vs manufactura ligera."

 ndp_button_military_name: "Expansión militar"
 ndp_button_military_desc: "Priorizar las fuerzas armadas. Boosts ejército y marina, investigación militar y producción de armas. Subelección en el año 2: doctrina de la tierra vs construcción naval."

 ndp_button_resource_name: "Economía de recursos"
 ndp_button_resource_desc: "Construir la economía alrededor de la tierra. Aumenta las industrias agrícolas y extractivas. Subelección en el año 2: agricultura vs extracción de materia prima."

 ndp_button_service_name: "Economía de servicio"
 ndp_button_service_desc: "Desarrollar la capacidad estatal, la educación y el sector financiero. Boosts burocracia, velocidad de investigación e inversión. Subelección en el año 2: sector financiero vs educación y burocracia."

 ndp_button_abandon_name: "Sendero abandonado"
 ndp_button_abandon_desc: "Abandonar el actual programa de desarrollo. Todos los modificadores activos de trayectoria serán eliminados, y una pena de prestigio y legitimidad será aplicable durante dos años. Entonces puede seleccionar un nuevo camino."

 fi_button_reject_name: "Rechazo de la inversión extranjera"
 fi_button_reject_desc: "Cierra la puerta al capital extranjero. Esto terminará la entrada de la revista y aplicará una pena de inversión a largo plazo, pero preservará la independencia económica y aumentará la autoridad."

