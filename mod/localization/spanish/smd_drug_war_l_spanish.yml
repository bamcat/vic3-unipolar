 # EVENTS
 # ==========================================
 
 # mdw_events.1 — War Declared
 mdw_events.1.t:0 "id=0/año Declares Guerra de los Carretes"
 mdw_events.1.d:0 "Después de años de expansión del cártel y faltaron medias medidas, El gobierno de id=1/año ha comprometido formalmente el militar id=2/tio a una campaña contra las redes narco. La declaración es significativa, no sólo operacional, sino simbólicamente. El estado id=3/propiano significa que no aceptará el status quo. Los cárteles responderán. Los militares deben estar listos."
 mdw_events.1.f:0 "El estado ha dibujado su línea."
 mdw_events.1.a:0 "id=0/año reclamará lo que le pertenece"
 
 # mdw_events.2 — Commander Selection
 mdw_events.2.t:0 "¿Quién liderará la campaña?"
 mdw_events.2.d:0 "Se ha hecho la declaración. Ahora hay que elegir a un comandante, uno dispuesto a tomar la lucha en territorio controlado por el cártel, donde el enemigo conoce la tierra, tiene informantes locales, y está dispuesto a hacer cosas que el ejército no puede. Será una pelea sucia."
 mdw_events.2.f:0 "El general correcto cambia todo."
 mdw_events.2.a:0 "Despliegue id=0/"
 mdw_events.2.b:0 "Despliegue id=0/"
 mdw_events.2.c:0 "Despliegue id=0/"
 
 # mdw_events.3 — Combat Patrol
 mdw_events.3.t:0 "Contacto en id=0/"
 mdw_events.3.d:0 "id=0/año reporta una serie de compromisos con las fuerzas del cártel en ierex id=1/año. Los cárteles luchan por mantener su territorio, utilizando barricadas, francotiradores y artefactos explosivos improvisados sobre enfoques de fortalezas conocidas. Se están logrando progresos, pero el costo en el tiempo y los recursos es significativo."
 mdw_events.3.f:0 "Cada kilómetro de camino es un kilómetro que los cárteles no pueden usar."
 mdw_events.3.a:0 "Empujar duro — tomar el territorio rápidamente"
 mdw_events.3.b:0 "Avance metódicamente — asegurar cada posición antes de seguir adelante"
 
 # mdw_events.4 — State Cleared
 mdw_events.4.t:0 "Se ha aclarado"
 mdw_events.4.d:0 "Un éxito operativo significativo: <x id=0/ título reporta que las fuerzas del cártel en יx id=1/ título han sido rotas. Su estructura de mando ha sido desmantelada, su corte logístico, y sus figuras clave están muertas o bajo custodia. Las fuerzas de ocupación militar se están moviendo para mantener el terreno. Un estado está bajo control del gobierno. Quedan más."
 mdw_events.4.f:0 "El mapa está cambiando."
 mdw_events.4.a:0 "Muévete al siguiente: mantén el impulso"
 
 # mdw_events.5 — Ambush
 mdw_events.5.t:0 "Ambush — idx id=0 / título de columna está bajo ataque"
 mdw_events.5.d:0 "Los artilleros de cártel han emboscado una columna militar de id=0/año en Identificax id=1/año. El ataque fue coordinado — múltiples posiciones de disparo, rutas de retirada preplanificadas y conocimiento de los movimientos de la columna que sugieren un informante dentro de la cadena de mando militar de id=2/tio. Hay bajas. id=3/propiación está gestionando el compromiso."
 mdw_events.5.f:0 "Los carteles luchan como un ejército cuando eligen."
 mdw_events.5.a:0 "Luchar a través — perseguirlos y destruirlos"
 mdw_events.5.b:0 "Contacto de ruptura - reagrupar y barrer más tarde"
 
 # mdw_events.6 — Commander Under Fire
 mdw_events.6.t:0 "id=0/ Está en peligro."
 mdw_events.6.d:0 "La inteligencia ha confirmado lo que los informes sobre el terreno han estado sugiriendo: los cárteles han identificado como un objetivo prioritario. Se ha encomendado a un equipo profesional de asesinato. La amenaza es creíble. Retirar al comandante de nuevo a неx id=1/ título reduciría el riesgo, pero frenaría el impulso de la campaña en un momento crítico."
 mdw_events.6.f:0 "Los carteles estudian a sus enemigos."
 mdw_events.6.a:0 "Tire de id=0 / confianza atrás - la campaña puede esperar"
 mdw_events.6.b:0 "Pulse en — <x id=0/ título acepta el riesgo"
 
 # mdw_events.10 — Victory
 mdw_events.10.t:0 "La Guerra de las Drogas es Won"
 mdw_events.10.d:0 "id=0/año envía el informe operativo final: el control territorial del cártel se ha roto a través de id=1/año. Las últimas fortalezas han sido limpiadas. La ocupación militar está en vigor. Las redes de cártel todavía existen — se reconstituirán a lo largo de años en forma debilitada— pero el estado id=2/año ha reafirmado la soberanía sobre su propio territorio. Esto no era inevitable. Requirió voluntad política, compromiso militar y, de muchas maneras, suerte. Lo que ha ganado id=5/ título id=6/ título ha ganado es tiempo — tiempo para abordar las condiciones que hicieron posible los cárteles en primer lugar."
 mdw_events.10.f:0 "Se ha reclamado lo que es suyo."
 mdw_events.10.a:0 "Una victoria dura y un comienzo"
 
 # mdw_events.11 — Commander Killed
 mdw_events.11.t:0 "id=0/año Ha sido asesinado"
 mdw_events.11.d:0 "Lo peor ha pasado. La operación de asesinato del cártel tuvo éxito. id=0/año está muerto, muerto en un ataque que los servicios de seguridad id=1/ título no pudieron evitar a pesar de advertencias creíbles. Las noticias son públicas dentro de horas. Los cárteles están celebrando abiertamente en las calles de las ciudades que controlan. La campaña no ha terminado. Pero ha sufrido un golpe que tardará meses en recuperarse. Hay que encontrar un nuevo comandante, y los cárteles usarán el tiempo para consolidarse."
 mdw_events.11.f:0 "Los cárteles han golpeado su golpe más importante aún."
 mdw_events.11.a:0 "No nos romperemos por esto: la lucha continúa"
 
 # mdw_events.20 — US Aid
 mdw_events.20.t:0 "Se ha firmado un acuerdo de asistencia militar"
 mdw_events.20.d:0 "Se ha movido. id=1/año ha firmado formalmente un acuerdo de asistencia militar con <x id=2/(conferir recursos de inteligencia, personal asesor, equipo y apoyo logístico a la campaña contra el cartel. El acuerdo es un desarrollo político significativo: indica que Identificax id=4 / administración del título se refiere a la estabilidad de id=5/conferencia como cuestión de interés nacional directo. Para неx id=8/tio, los beneficios prácticos son inmediatos: la autoridad es restaurada, el equipo está fluyendo, y los cárteles ahora se enfrentan a un enemigo con el aparato de inteligencia completo de неx id=9/año trabajando contra ellos."
 mdw_events.20.f:0 "Cuando se compromete id=0/ título, el saldo cambia."
 mdw_events.20.a:0 "Esto cambia completamente la campaña"
 
