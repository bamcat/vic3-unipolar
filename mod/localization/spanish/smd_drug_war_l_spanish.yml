 mdw_victory_modifier:0 "Guerra contra las drogas"
 mdw_victory_modifier_desc:0 "id=0/año ha ganado la Guerra de las Drogas. El control territorial del cártel se ha roto y el estado de id=1/año ha reafirmado la soberanía. Las condiciones que produjeron los cárteles permanecen, pero esta batalla ha sido ganada."
 
