 je_us_mexico_drug_war_support:0 "Apoyo a México"
 je_us_mexico_drug_war_support_desc:0 "Se trata de una lucha existencial contra las redes narcocartel que se han apoderado del control de partes significativas del país. id=1/año tiene un interés directo en el resultado: el flujo de narcóticos hacia el norte, la estabilidad de la frontera sur, y la integridad del estado id=2/ título están en juego. La firma de un acuerdo de asistencia militar con لx id=5/año proporcionaría recursos, inteligencia y legitimidad a لx id=6/ <x id=7/ gobierno de confianza - y profundizar la relación bilateral de maneras que se extienden mucho más allá de la guerra de drogas."
 
