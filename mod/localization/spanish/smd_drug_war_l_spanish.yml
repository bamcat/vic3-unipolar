 # cartel.1 — Escobar Captured
 cartel.1.t:0 "Pablo Escobar está muerto"
 cartel.1.d:0 "Después de años de violencia de caza y montaje, el fundador y líder del Cartel de Medellín ha sido rastreado a una casa segura en Medellín y asesinado por las fuerzas de seguridad id=0/cero. La muerte de Pablo Escobar es el golpe más significativo jamás alcanzado contra el comercio de drogas id=1/ título, el fin de una era, y el comienzo incierto de otra. El Cartel de Medellín está destrozado. Pero el Cartel de Cali y otros se moverán para llenar el vacío. La guerra no ha terminado. Pero esta batalla ha sido ganada."
 cartel.1.f:0 "El hombre más buscado del mundo está muerto."
 cartel.1.a:0 "id=0/año ha golpeado un golpe histórico contra el narcoterrorismo"

 # cartel.2 — El Chapo Captured
 cartel.2.t:0 "El Chapo es capturado"
 cartel.2.d:0 "En una redada dramática coordinada entre las fuerzas de seguridad de id=0/año y la inteligencia internacional, Joaquín 'El Chapo' Guzmán, jefe del cártel de Sinaloa y el más poderoso señor de las drogas del mundo, ha sido capturado. El arresto es una gran victoria para id=1/año id=2 / campaña contra el cártel del usuario y un golpe significativo a las operaciones del cártel de Sinaloa. Chapo está ahora en una instalación de máxima seguridad. Si se queda allí es otro asunto."
 cartel.2.f:0 "El hombre más buscado en las Américas está detrás de las rejas."
 cartel.2.a:0 "Se ha prestado justicia, por ahora"

 # cartel.3 — El Chapo Escapes
 cartel.3.t:0 "El Chapo ha escapado"
 cartel.3.d:0 "Lo imposible ha pasado. Joaquín 'El Chapo' Guzmán ha escapado de la prisión de máxima seguridad de Altiplano a través de un túnel excavado directamente en su celda, una hazaña de ingeniería que tardó meses en completar e implicar la complicidad de guardias, contratistas y funcionarios a múltiples niveles. La fuga es una humillación internacional. El gobierno de id=2/año ha tomado un golpe catastrófico a su credibilidad. Y en algún lugar en el territorio id=4/ título, el más poderoso narcotraficante del mundo es libre."
 cartel.3.f:0 "Siempre iba a escapar. La única pregunta era cuándo."
 cartel.3.a:0 "Esto es una indignación — los cabezales se lanzarán"

 # cartel.4 — Mexico Turf Division
 cartel.4.t:0 "Los carretes dividen id=0/"
 cartel.4.d:0 "Años de política estatal fallida o ausentes han dejado vacío. Las principales organizaciones cárteles han establecido ahora, mediante la violencia, la negociación y la corrupción selectiva de las autoridades locales, esferas territoriales reconocidas de influencia en todo el territorio id=0/año. El CJNG controla el centro y el oeste. El Cartel del Golfo tiene la costa noreste. El Cártel de Sinaloa es dominante en el noroeste. El Cártel del Nordeste ha excavado su propio territorio en Coahuila y Zacatecas. El estado id=3/propiado tiene, en efecto, soberanía cedida sobre partes de su propio país. Esto no puede soportar."
 cartel.4.f:0 "Un estado que no puede proteger su territorio no es un estado."
 cartel.4.a:0 "Debemos recuperar lo que se perdió."

 # cartel.5 — Assassination
 cartel.5.t:0 "A Cartel Assassination"
 cartel.5.d_crackdown:0 "Se ha asesinado una campaña de contracartel de la policía o un funcionario militar de categoría superior, que tiene por objeto intimidar al Estado y señalar que los carteles pueden llegar a cualquiera. El funeral es mañana. La investigación ya ha identificado sospechosos. La pregunta es si El gobierno de id=2/año tiene la voluntad de perseguirlos."
 cartel.5.d_cooperation:0 "Un cártel rival ha asesinado a uno de los tenientes clave de sus socios criminales, y el golpe de espalda está aterrizando en el gobierno de id=0/año. The killing was carried out in broad daylight in a major city. Es imposible pretender que el estado no tiene nada que ver con los hombres que hicieron esto."
 cartel.5.d_default:0 "Una figura prominente —político, periodista o juez— ha sido asesinada por hombres armados vinculados a cárteles en idx id=0/año. El asesinato es descarado. El mensaje es claro: los cárteles operan sin temor al estado."
 cartel.5.f:0 "La impunidad es el arma más grande del cártel."
 cartel.5.a:0 "Encontraremos a los responsables."

 # cartel.6 — Money Laundering
 cartel.6.t:0 "Cartel Money Laundering Exposed"
 cartel.6.d_crackdown:0 "Una unidad de inteligencia financiera id=0/tio ha descubierto evidencia de que el dinero del cártel está fluyendo a través de negocios legítimos — empresas de construcción, restaurantes, concesionarios de automóviles— en <x id=1/año. La escala de la operación de lavado sugiere una profunda penetración de la economía formal. Seguir el sendero será caro, políticamente peligroso, y puede llevar a lugares incómodos."
 cartel.6.d_cooperation:0 "Investigadores financieros internacionales han registrado transacciones sospechosas que fluyen a través de instituciones con vínculos conocidos con el gobierno de id=0/año. Los enlaces entre id=1/ La administración y la financiación de cárteles se están haciendo más difíciles de ocultar. Esto podría convertirse en un importante incidente diplomático."
 cartel.6.d_default:0 "Los periodistas investigadores han publicado evidencias de lavado de dinero a gran escala a través del sector bancario de id=0/propiedad, sospechoso de ser el producto del cártel que se limpia a través de inversiones inmobiliarias y comerciales. El banco central pide una investigación."
 cartel.6.f:0 "El dinero sucio está en todas partes si sabes dónde buscar."
 cartel.6.a:0 "Proseguir la investigación dondequiera que conduce"
 cartel.6.b:0 "Debe protegerse la estabilidad del sector bancario; déjalo"

 # cartel.7 — US Pressure
 cartel.7.t:0 "Washington Es mirar"
 cartel.7.d:0 "El id=0/ El Departamento de Estado ha solicitado formalmente una reunión con el Ministro de Relaciones Exteriores de id=1/año. La agenda, comunicada en privado, se relaciona con el tráfico de drogas - específicamente la evaluación del gobierno de id=2/ título que <x id=3/año no está haciendo lo suficiente para interrumpir el flujo de narcóticos hacia el norte. Hay una sugerencia de que la asistencia financiera, de inteligencia y posiblemente militar podría ser próxima si ierex id=5/año coopera más activamente."
 cartel.7.f:0 "id=0/tio tiene apalancamiento. La pregunta es si dejar que se utilice."
 cartel.7.a:0 "Aceptar id=0/conferenciar - necesitamos el apoyo"
 cartel.7.b:0 "Decline — <x id=0/ título manejará sus propios asuntos"

 # cartel.8 — Cartel Retaliation
 cartel.8.t:0 "The Cartels Retaliate"
 cartel.8.d:0 "La represión ha sacado sangre, y ahora los cárteles están sacando la suya. Una serie coordinada de ataques entre las estaciones de policía, los puestos de control militares y las zonas civiles de las comunidades conocidas por prestar apoyo a las comisarías de policía, los puestos de control militares y las zonas civiles Identificax id=2/ campaña de título. Los ataques son un mensaje: los cárteles no pueden ser destruidos sin precio. id=3/ título debe decidir cómo responder."
 cartel.8.f:0 "Cada golpe aterrizó es un golpe invitando a regresar."
 cartel.8.a:0 "Escalada, no nos intimidarán"
 cartel.8.b:0 "Retirar por ahora — proteger a la población civil"

 # cartel.9 — Completion
 cartel.9.t:0 "El comercio de drogas tiene su curso"
 cartel.9.d_crackdown:0 "La campaña de represión ha logrado sus objetivos inmediatos. El mercado de opio se ha endurecido significativamente, una consecuencia directa de la presión sostenida de id=0/jero sobre las redes de tráfico. Los cárteles están debilitados. Ha mejorado la posición internacional de id=1/año. La lucha está lejos de terminar, pero esta ronda pertenece al estado."
 cartel.9.d_cooperation:0 "El acuerdo ha entregado lo prometido. La autoridad está intacta, las funciones estatales y los cárteles han mantenido, sobre todo, a su lado del trato. Si esto es gobernanza o capitulación es una pregunta que los historiadores debatirán. El mercado de opio cuenta su propia historia."
 cartel.9.d_default:0 "El comercio de drogas ha evolucionado, ya sea para bien o para mal, no está claro. El mercado de opio se ha movido significativamente de su precio base. Las opciones hechas por id=0/ título id=1/(s) en este periodo darán forma a lo que viene después."
 cartel.9.f:0 "Cada política termina. Cada elección tiene consecuencias."
 cartel.9.a:0 "Un capítulo cierra"

 # cartel.100 — Timeout
 cartel.100.t:0 "La ventana ha cerrado"
 cartel.100.d:0 "Años de política inconclusiva sobre el tráfico de drogas en las redes narcotraficantes no han dado lugar a una represión significativa ni a un arreglo estable con las redes narco. Los cárteles han usado bien el tiempo. Se necesitará un enfoque más directo."
 cartel.100.f:0 "La inacción es una opción, y los cárteles lo saben."
 cartel.100.a:0 "Debemos actuar directamente."

 # cartel.10 — Escobar news for Americas
 cartel.10.t:0 "Pablo Escobar está muerto"
 cartel.10.d:0 "Noticias de id=0/año: Pablo Escobar, fundador del Cártel de Medellín y el hombre que definía la edad del narco-terrorismo en América Latina, ha sido asesinado por las fuerzas de seguridad id=1/prop. El hombre más buscado del hemisferio occidental está muerto. Los efectos de onda en el comercio de drogas de la región se sentirán durante años."
 cartel.10.f:0 "La edad del gran narco ha terminado. Lo que sigue puede ser peor."
 cartel.10.a:0 "Una nueva era comienza"

