 cartel_fight.3.t:0 "Informant Provides Key Intelligence"
 cartel_fight.3.d:0 "Un informante — motivado por el dinero, la queja personal, o el miedo— ha proporcionado id=0/año información detallada sobre casas seguras de cártel, rutas de suministro y personal. La información permite una serie de operaciones de precisión que degradan significativamente la capacidad operacional de los cárteles en la región."
 cartel_fight.3.f:0 "La mayor vulnerabilidad de los cárteles es el uno al otro."
 cartel_fight.3.a:0 "Ley de inteligencia inmediatamente"

 cartel_fight.10.t:0 "Los carretes han sido rotos"
 cartel_fight.10.d:0 "La campaña ha terminado. Se ha desmantelado hasta el punto de irrelevancia operacional. Las figuras clave están muertas o bajo custodia. Las redes están fragmentadas. El estado ha reclamado su territorio. Ha sido una pelea fea. Pero se ha ganado."
 cartel_fight.10.f:0 "El estado ha mostrado lo que puede hacer cuando se compromete."
 cartel_fight.10.a:0 "Una victoria dura"

