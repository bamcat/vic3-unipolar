 cartel_fight.1.t:0 "A Major Cartel Bust"
 cartel_fight.1.d:0 "id=0/año informa de una operación exitosa: se ha desmantelado una importante red de distribución de cárteles, se han incautado cantidades significativas de narcóticos y se han detenido varias figuras de cárteles de nivel medio. Es una buena semana de trabajo. El impulso es con el gobierno de id=1/año."
