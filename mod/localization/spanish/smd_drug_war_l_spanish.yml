 cartel_fight.2.t:0 "Troops Ambushed"
 cartel_fight.2.d:0 "Una unidad bajo el mando de id=0/año ha sido emboscada por hombres de carteles en una zona rural. El ataque fue bien coordinado y sugiere que los cárteles tienen inteligencia sobre los movimientos militares id=1/tio. Hay bajas. Morale está sacudida."
 cartel_fight.2.f:0 "Los carteles luchan como un ejército cuando eligen."
