 # Cartel territory modifier descriptions (MDW context)
 cartel_cjng_controlled:0 "CJNG Territory"
 cartel_cjng_controlled_desc:0 "Los agentes de Jalisco New Generation Cartel controlan la economía criminal de este estado. La actividad industrial se interrumpe, la infraestructura se está deteriorando y la gente está dejando territorio id=0/año."
 
 cartel_gulf_controlled:0 "Gulf Cartel Territory"
 cartel_gulf_controlled_desc:0 "El Cártel del Golfo ha establecido el dominio territorial aquí. La actividad económica es suprimida y la autoridad estatal de id=0/año es nominal."
 
 cartel_sinaloa_controlled:0 "Territorio del Cártel de Sinaloa"
 cartel_sinaloa_controlled_desc:0 "El Cártel de Sinaloa controla este estado. Se ha interrumpido la producción agrícola y la economía local funciona bajo supervisión de cárteles."
 
 cartel_northeast_controlled:0 "Territorio del cártel noreste"
 cartel_northeast_controlled_desc:0 "El Cartel del Noreste ha establecido la dominación aquí. La infraestructura y la productividad de construcción en id=0/año están sufriendo."
 
 # usa war on drugs

 je_war_on_drugs:0 "La guerra contra las drogas"
 je_war_on_drugs_reason:0 "El flujo de narcóticos en id=0/año es una crisis nacional. La cocaína, la heroína y otras sustancias — producidas en gran parte en América Latina y traficadas a través de las fronteras de id=1/ título— son comunidades devastadoras, que alimentan delitos violentos y corrompen las instituciones públicas. Identificax id=5/ La administración del usuario se ha comprometido a una campaña integral: asociaciones internacionales para estrangular la oferta en la fuente, la ejecución nacional para cerrar las fronteras y la inversión social para hacer frente a la demanda. La campaña no es sin costo, los recursos que requiere pesan sobre la economía más amplia, pero la alternativa es un país cada vez más a merced de las redes criminales extranjeras. El territorio del cártel puede estar en expansión en México. Un acuerdo de asistencia militar con el gobierno mexicano es la piedra angular del componente internacional de esta campaña."

 narco_economy_plantation_bonus:0 "Narco Economy"
 narco_economy_plantation_bonus_desc:0 "El comercio de drogas se ha incorporado a la economía agrícola de id=0/año. La producción de plantación, en particular el opio, se encuentra por encima de los niveles normales, sostenida por la demanda de cárteles y la corriente corrupta del dinero narco hacia las comunidades rurales."

 war_on_drugs_active_modifier:0 "Guerra contra las drogas"
 war_on_drugs_active_modifier_desc:0 "El gobierno de id=0/año se ha comprometido a una campaña integral contra el narcotráfico. El esfuerzo de ejecución —policía interna, operaciones de interdicción y cooperación internacional— está aprovechando recursos de toda la economía e imponiendo un costo modesto pero real a la productividad nacional."

 war_on_drugs_victory_modifier:0 "Guerra contra las drogas"
 war_on_drugs_victory_modifier_desc:0 "El id=0/ La guerra contra las drogas ha alcanzado sus objetivos declarados. Se ha suprimido el suministro, se aplican las fronteras y se ha establecido el marco institucional. La campaña ha fortalecido la autoridad y el prestigio de id=1/año, aunque no se han resuelto las condiciones subyacentes que producen demanda de drogas."

