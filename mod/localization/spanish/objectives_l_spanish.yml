objective_the_west_name_USA:0 "La Superpotencia Solitaria"
objective_the_west_name_GBR:0 "Los problemas"
objective_the_west_name_FRA:0 "Mitterrand's France"

objective_the_west_desc_USA:0 "Los Estados Unidos de América se encuentran en una posición única a finales del siglo XXI. Siendo la principal superpotencia del mundo, y la humanidad más fuerte del Estado nacional jamás ha visto, la República enfrenta un conjunto de problemas externos e internos difíciles. A pesar del colapso del principal rival de Estados Unidos, la Unión Soviética, la amenaza del terrorismo, China y varias otras amenazas para el mundo libre llaman la implicación de Estados Unidos en cuestión. ¿Los Estados Unidos seguirán siendo la superpotencia mundial? El tiempo lo dirá."
objective_the_west_desc_GBR:0 "En 1992, el Reino Unido se enfrentaba a la incertidumbre económica y a la turbulencia política. El país ha surgido recientemente de una profunda recesión, caracterizada por un alto desempleo y una disminución de la confianza del consumidor. Para añadir a lo británico, la inestabilidad en Irlanda del Norte, ahora conocida como "Los problemas" sigue siendo un tema de debate caliente. ¿Cómo sobrevivirá Britannia estos tiempos turbulentos?"
objective_the_west_desc_FRA:0 "El panorama político de Francia se caracterizó por una creciente tensión sobre la integración europea y los desafíos económicos internos. El presidente François Mitterrand, socialista en su segundo mandato, se enfrentaba a una popularidad declinante mientras el país luchaba con un alto desempleo y un crecimiento económico lento. Su Gobierno, encabezado por el Primer Ministro Pierre Bérégovoy, se muestra complacido con el descontento público por las medidas de austeridad destinadas a estabilizar la economía. Políticamente, Francia estaba profundamente dividida sobre el Tratado de Maastricht, que tenía por objeto fortalecer la integración europea y allanar el camino hacia el euro. ¿Tiene la UE lo que se necesita para sobrevivir el siglo XXI?"

objective_the_east_name_RUS:0 "Caída de la Unión Soviética"
objective_the_east_name_PRC:0 "La Gran República Popular"
objective_the_east_name_IRQ:0 "Iraq de Saddam Hussein"

objective_the_east_desc_RUS:0 "Rusia está experimentando una dramática transformación política tras la disolución de la Unión Soviética en diciembre de 1991. Boris Yeltsin, el primer presidente de la Federación de Rusia, se enfrentó al inmenso desafío de dirigir una democracia inquietante mientras navegaba la transición caótica de un sistema comunista centralizado a una economía de mercado. En el plano nacional, el gobierno de Yeltsin luchó por la inestabilidad política, la inflación creciente y el malestar social generalizado como reformas económicas, conocidas como “terapia de choque”, provocaron dificultades para millones. Diplomatically, Russia sought to redefine its role on the world stage, forging new relationships with Western powers while attempting to maintain influence over the former Soviet republics."
objective_the_east_desc_PRC:0 "China está saliendo con cautela del aislamiento internacional y las sanciones de las naciones occidentales. Políticamente, el país estaba firmemente bajo el control del Partido Comunista Chino (CCP), con Deng Xiaoping manteniendo una influencia significativa a pesar de haberse retirado formalmente de posiciones de liderazgo. Su famoso "Viaje Sur" a principios de 1992 revitalizó el compromiso de China con la reforma económica y la apertura, señalando un renovado impulso hacia políticas orientadas al mercado y una mayor integración con la economía global"
objective_the_east_desc_IRQ:0 "Reeling from a devastating loss in the Gulf War last year, and facing intense international isolation. Saddam Hussein remained firmly in power, maintaining an iron grip on the country through brutal repression of internal dissent, particularly against the Shi'a in the south and the Kurds in the north. Iraq truly has several paths going into the 2000s.

objective_rising_powers_name_IDA:0 "El siglo indio"
objective_rising_powers_name_BRZ:0 "El ascenso de Brasil a la dominación"
objective_rising_powers_name_VNM:0 "Levántate de Vietnam"

objective_rising_powers_desc_IDA:0 "La India está navegando por un período de cambio político y económico significativo. El país fue dirigido por el Primer Ministro P.V. Narasimha Rao, quien había llegado al poder en 1991 e inició una serie de reformas económicas transformadoras encaminadas a liberalizar la economía e integrarla más estrechamente con el mercado mundial."
objective_rising_powers_desc_BRZ:0 "En 1992, el Brasil se encontraba en medio de una transición política tras el fin del gobierno militar en 1985. El país fue gobernado por el presidente Fernando Collor de Mello, que asumió el cargo en 1990 como primer presidente electo directamente en Brasil en más de 20 años. El gobierno de Collor comenzó con una ola de reformas económicas destinadas a estabilizar la economía, pero su administración pronto se enfrentó a una creciente desilusión pública debido al aumento de las acusaciones de inflación y corrupción. En 1992, Collor se incorporó en un gran escándalo de corrupción, que llevó a protestas masivas y pidió su impeachment. Diplomatically, Brazil was focused on improving its international image and expanding its influence within Latin America. También busca vínculos más estrechos con los países occidentales, al tiempo que reafirma su papel en cuestiones mundiales, en particular en cuestiones ambientales relacionadas con la selva amazónica. Sin embargo, la inestabilidad política y las dificultades económicas siguieron dominando el programa nacional."
objective_rising_powers_desc_VNM:0 "Vietnam se reintegra gradualmente en la comunidad internacional después de años de aislamiento tras el fin de la guerra de Vietnam y los efectos severos de las sanciones económicas. En 1992, Vietnam normalizó las relaciones con los Estados Unidos y se unió a la Asociación de Naciones del Asia Sudoriental (ASEAN), señalando un cambio hacia una mayor cooperación regional y un interés en mejorar las relaciones con Occidente. ¿Qué camino tomará Vietnam? depende de ti."
