l_spanish:

  # Landowners IG Traits
 ig_trait_noblesse_oblige:0 "Noblesse Oblige"
 ig_trait_noblesse_oblige_desc:0 "Somos mejores que los comunes, lo que significa que tenemos el deber de cuidarlos. Sus intentos de organizar las cosas por sí mismos son autodestructivos y condenados al fracaso."
 ig_trait_family_ties:0 "Tintes familiares"
 ig_trait_family_ties_desc:0 "En estos tiempos cambiantes, todavía sabemos el valor de un buen matrimonio. Nuestras conexiones son mayores que las fronteras que superan y superarán tanto las alianzas como los gobiernos."
 ig_trait_noble_privileges:0 "Privilegios nobles"
 ig_trait_noble_privileges_desc:0 "¿Qué pasó con la idea de que la nobleza debe ser dejada para cumplir sus deberes sin ser perseguido por los recaudadores de impuestos? Es hora de traer esos días de vuelta."
 ig_trait_profitable_estates: "Profitable Estates"
 ig_trait_profitable_estates_desc: "¿No lo sabías? Lo que es bueno para la nobleza es bueno para la nación - la prosperidad se engaña."
 ig_trait_the_velvet_book: "El libro de Velvet"
 ig_trait_the_velvet_book_desc: "Sólo las familias más augustas pueden etch sus nombres en este venerable libro. Sabemos quién pertenece y quién no."
 ig_trait_bad_boyars: "Mal Boyars"
 ig_trait_bad_boyars_desc: "¿Así que quieren decir que el buen zar del país está siendo engañado por sus malos boyares? Podemos enseñarles de qué son capaces los boyares malos."
 ig_trait_latifundios: "Latifúndios"
 ig_trait_latifundios_desc: "La productividad y la riqueza de nuestras fincas es incomparable. El dinero fluye a través de nuestras manos como agua a través de los rápidos. En verdad, estos son días de oro para todos nosotros."
 ig_trait_junkerdom: "Junkerdom"
 ig_trait_junkerdom_desc: "Nuestro poder viene de nuestras tierras, y nuestras tierras son tierras poderosas. Lo que eligiéramos hacer, la nación seguirá."
 ig_trait_patrician_philanthropy: "Patrician Philanthropy"
 ig_trait_patrician_philanthropy_desc: "Es hora de que hiciéramos algo para nuestro compañero, y nos aseguramos de que nuestros nombres fueran emblazados en cualquier extremo que se construyera, por supuesto."
 ig_trait_wiener_walzer: "Wiener Walzer"
 ig_trait_wiener_walzer_desc: "Alguien tenía el nervio en la última bola para pedir un minuet para ser jugado. ¡Queridos, hacemos cerdas! Establecimos lo que está de moda, y es id=0/No se indicax id=1/ título el minuet!"
 ig_trait_fazenda_ibicaba: "Fazenda Ibicaba"
 ig_trait_fazenda_ibicaba_desc: "La mano de obra es un tema constante para nuestras empresas, por lo que debemos seguir cada camino posible para conseguir el trabajo que necesitamos."
 ig_trait_summon_no_zamindars: "Momento No Zamindars"
 ig_trait_summon_no_zamindars_desc: "Los gobernantes de nuestro país han demostrado que no tienen interés en la negociación o la flexibilidad. Si esto es así, entonces no deben perderse las cosas más sutiles que hacemos para mantener el orden."
 ig_trait_famine_reserves: "Reservas de hambre"
 ig_trait_famine_reserves_desc: "Es nuestro deber abrir nuestras tiendas de grano cuando surge una necesidad apremiante. ¿Qué mejor manera hay de comprar buena voluntad de nuestros inquilinos?"

  # Industrialists IG Traits
 ig_trait_job_creators:0 "Creadores de empleo"
 ig_trait_job_creators_desc:0 "Uno debe gastar dinero para ganar dinero. Mientras el gobierno pueda confiar en no interferir con nuestras inversiones, no hay ningún lugar donde prefiriéramos poner nuestros beneficios que hacia el crecimiento económico."
 ig_trait_engines_of_progress:0 "Motores de Progreso"
 ig_trait_engines_of_progress_desc:0 "¡He aquí las maravillas de la era moderna! No hay tiempo para dudar. Si puede ser pensado, diseñado y patentado, debe ser construido, probado y puesto en uso inmediato."
 ig_trait_tax_avoidance:0 "Evitación fiscal"
 ig_trait_tax_avoidance_desc:0 "¿Quién sabe mejor dónde debe gastarse nuestro dinero? No el gobierno, y ciertamente no el actual. Afortunadamente, su incompetencia ha dejado lagunas fiscales que se pueden poner en buen uso."
 ig_trait_zaibatsu_cooperation: "Zaibatsu Cooperation"
 ig_trait_zaibatsu_cooperation_desc: "Una relación saludable entre la industria y el gobierno beneficia a todos. Es en nuestro interés asegurarnos de que este estado amistoso continúe."
 ig_trait_zaibatsu_withdrawal: "Zaibatsu Retiro"
 ig_trait_zaibatsu_withdrawal_desc: "Nuestra salud financiera se beneficiaría más con una reorientación de la especulación monetaria y la reinversión interna. El comercio público es, lamentablemente para el gobierno, no una prioridad en este momento."
 ig_trait_kommerskollegium: "Kommerskollegium"
 ig_trait_kommerskollegium_desc: "Nos corresponde, ya que la escala de nuestros intereses comerciales sigue creciendo, asegurar que la riqueza ganada sea manejada equitativamente."
 ig_trait_ventilate_unify_beautify: "Ventilar, Unificar y Beautificar"
 ig_trait_ventilate_unify_beautify_desc: "¿Has visto como es ahí fuera? Es un taller de enfermedad, un lugar donde el sol nunca brilla, donde las plantas acuden y perezcan, y donde la miseria y la peste trabajan en concierto. Nos cae, por supuesto, arreglar este desastre."
 ig_trait_the_goods_must_flow: "Los Bienes deben Fluir"
 ig_trait_the_goods_must_flow_desc: "Todo está bien y bien producir tanto como lo hace nuestra nación, pero ¿qué utilidad es si no puede llegar a los mercados a los que necesita ser vendido? Ahora es el momento de asegurar que el país comprenda lo necesario que es el buen transporte."
 ig_trait_wounded_honor: "Wounded Honor"
 ig_trait_wounded_honor_desc: "Somos unos pocos iluminados en una tierra que resiste cualquier iluminación. Nuestros métodos son superiores: cualquier trastorno es una traición, y la traición debe cumplirse con la sanción más dura."
 ig_trait_stamped_and_signed: "Sellado y firmado"
 ig_trait_stamped_and_signed_desc: "Los sellos y los libros son los métodos que utilizamos para crear orden fuera del caos. La gobernanza de la India requiere un océano de papel, y es nuestra tarea asegurar que circula impecablemente."
 ig_trait_responsible_government: "Gobernanza responsable"
 ig_trait_responsible_government_desc: "Nuestra misión es extender la justicia y la civilización a todos los hombres, y, por supuesto, perpetuar la regla que permite esto para siempre."

  # Armed Forces IG Traits
 ig_trait_patriotic_fervor:0 "Patriótico Fervor"
 ig_trait_patriotic_fervor_desc:0 "No importa lo brillante que sea la estrategia y lo avanzados que sean las armas, algunas batallas sólo pueden ser ganadas con duro trabajo y agallas. Los soldados que realmente creen en lo que su país representa lucharán valientemente independientemente de las probabilidades."
 ig_trait_veteran_consultation:0 "Veteran Consultation"
 ig_trait_veteran_consultation_desc:0 "Los avances tecnológicos están cambiando la cara de la guerra, pero sólo podemos hacer uso de ellos si entendemos cómo. Afortunadamente, aquellos de nosotros con experiencia de primera mano deben tener una idea."
 ig_trait_materiel_waste:0 "Materiel Waste"
 ig_trait_materiel_waste_desc:0 "La lealtad a la nación no es lealtad al gobierno. Si no podemos confiar en la gente a cargo, podemos utilizar lo que nos dan como nos parece."
 ig_trait_elan_vital: "Élan Vital"
 ig_trait_elan_vital_desc: "Mientras los últimos brazos y armamentos están bien y bien, el camino a la victoria depende de un espíritu conductor que no se inclinará ante la adversidad. Los soldados que realmente creen en lo que representa la nación avanzarán valientemente, independientemente de las probabilidades."
 ig_trait_newly_created_army: "Ejército recién creado"
 ig_trait_newly_created_army_desc: "El corazón de un ejército moderno no está en los últimos rifles, ni en los mejores uniformes, sino en organización y logística. Mantener a todos los soldados suministrados, mantener el flujo de municiones y raciones regular y confiable, para asegurarse de que cada hombre conozca su papel en la vasta máquina militar, así es como hacer que un ejército valga algo."
 ig_trait_self_strengthening: "Auto-Fortalecimiento"
 ig_trait_self_strengthening_desc: "Nuestra inteligencia y sabiduría son necesariamente superiores a los que nos rodean. Así, lo que tenemos que aprender del extranjero es sólo una cosa: barcos sólidos y armas efectivas."
 ig_trait_parochial_leadership: "Parochial Leadership"
 ig_trait_parochial_leadership_desc: "En estos tiempos oscuros, es cada hombre para sí mismo, y cada provincia debe buscar su propio bienestar ante todo. Es irrazonable esperar que cada oficial lleve entusiastamente lejos de casa, cuando su propio corazón podría estar bajo amenaza."
 ig_trait_el_buen_jefe: "El Buen Jefe"
 ig_trait_el_buen_jefe_desc: "Lo que cada buen soldado necesita es un buen oficial para guiarlo. En estos tiempos, lo que toda la nación necesita es un buen oficial."
 ig_trait_clube_militar: "Clube Militar"
 ig_trait_clube_militar_desc: "Un lugar donde oficiales y soldados como nosotros pueden descansar, relajarse y organizar en su tiempo libre es seguro ser inofensivo. Si algo, un lugar donde todos podemos hablar y planear cosas puede servir al país algo bueno."
 ig_trait_coronelismo: "Coronelismo"
 ig_trait_coronelismo_desc: "¿Has visto el último decreto del gobierno? ¿No se dan cuenta de con quién están tratando? ¡Un caballero decorado como yo, con todos mis hombres y propiedades, no debe ser trivial!"
 ig_trait_divided_ranks: "Dividido Ranks"
 ig_trait_divided_ranks_desc: "Hay una ruptura fundamental entre nuestros soldados y nuestros oficiales, uno que ha crecido demasiado para ignorar. ¿Por qué un hombre puso su vida en la línea para alguien que trata sus costumbres con desprecio?"
 ig_trait_imperial_service: "Servicio Imperial"
 ig_trait_imperial_service_desc: "Usar nuestro uniforme y expandir nuestra frontera es un gran honor, al que millones se esfuerzan hacia. Es afortunado para ellos que siempre hay posiciones que llenar."
 ig_trait_veerta: "Veerta"
 ig_trait_veerta_desc: "El nuestro es el ejército que conquistó a toda la India, produciendo una corriente interminable de victorias contra toda materia de enemigos. Nuestra valentía y disciplina aseguran que este rollo de honor nunca llegue a su fin."

  # Rural Folk IG Traits
 ig_trait_farmers_markets:0 "Mercados de agricultores"
 ig_trait_farmers_markets_desc:0 "Conseguir los bienes que producimos a las personas que los necesitan parece ser una gran preocupación en estos días. En buenas circunstancias, somos capaces de conseguirlos donde necesitan ser nosotros mismos."
 ig_trait_honest_work:0 "Trabajo honesto"
 ig_trait_honest_work_desc:0 "Ganamos nuestra vida por trabajo honesto y sudor honesto. Si eso significa que producimos más de lo que necesitamos, mucho mejor."
 ig_trait_old_ways:0 "Old Ways"
 ig_trait_old_ways_desc:0 "Estas personas que dirigen el país parecen tener todo tipo de ideas sobre cómo debería ser el futuro. ¿Por qué deberíamos confiar en ellos cuando son los que hicieron el presente lo que es?"
 ig_trait_obshchina: "Obshchina"
 ig_trait_obshchina_desc: "La vida en nuestro pequeño pueblo no es tan mala. Dividir el trabajo entre todos es fácil, y difundir alrededor de los productos y beneficios doblemente."
 ig_trait_fellahin: "Fellahin"
 ig_trait_fellahin_desc: "Nuestro lote en la vida es trabajar estos campos lo mejor que podamos. A veces, nuestro trabajo realmente nos paga."
 ig_trait_nucleos_coloniais: "Núcleos Coloniais"
 ig_trait_nucleos_coloniais_desc: "Un nuevo hogar significa un nuevo comienzo de la vida. ¿Qué es lo que no quiere? Vamos, veamos qué tiene que ofrecer ese nuevo acuerdo."
 ig_trait_plantation_work: "Plantation Work"
 ig_trait_plantation_work_desc: "Trabajamos duro día tras día, y obtenemos lo que necesitamos. Algunos días, sin embargo, tenemos más que eso, y apreciamos esos días."
 ig_trait_of_the_sovereign_alone: "Del Soberano Solo"
 ig_trait_of_the_sovereign_alone_desc: "La carga que nos imponen los dueños de la tierra es insoportable. Estos intermediarios deben ser recordados que somos ryots del soberano solo, y no tienen un poder legítimo sobre nosotros."
 ig_trait_imandari: "Imandari"
 ig_trait_imandari_desc: "Nuestra tierra es rica, y la trabajamos con diligencia. En buenos tiempos, podemos producir lo que necesitamos y más."
 ig_trait_bazaar_bargains: "Bazaar Bargains"
 ig_trait_bazaar_bargains_desc: "Son nuestros bazares los que enriquecen nuestras ciudades y atraen a visitantes de millas alrededor. Si la prosperidad requiere una organización extra, ese es un precio que estamos dispuestos a pagar."

  # Trade Unions IG Traits
 ig_trait_solidarity:0 "Solidaridad"
 ig_trait_solidarity_desc:0 "¡Todos los que quieren trabajo deben tener trabajo! Nadie será excluido o abandonado. Debemos apoyar el derecho del otro a un trabajo bastante compensado."
 ig_trait_industrial_organizers:0 "Organizadores industriales"
 ig_trait_industrial_organizers_desc:0 "No importa quién esté a cargo, la forma en que los trabajadores colaboran en última instancia tiene un mayor impacto en lo bien que funciona una fábrica que cualquier regla que se entrega desde arriba."
 ig_trait_work_to_rule:0 "Work-to-rule"
 ig_trait_work_to_rule_desc:0 "Parece que la gente a cargo quiere que nos callemos y hagamos lo que nos dicen, en lugar de pensar por nosotros mismos. Veamos cómo les gusta si realmente aplicamos esa filosofía a nuestro trabajo 'sin matar'."
 ig_trait_bourse_du_travail: "Bourse du Travail"
 ig_trait_bourse_du_travail_desc: "¡La organización no termina al final del día de trabajo! Un frente unido requiere ayudarse no sólo en el suelo de la fábrica, sino también en nuestros hogares y comunidades."

  # Intelligentsia IG Traits
 ig_trait_propagandists:0 "Propagandistas"
 ig_trait_propagandists_desc:0 "En nuestra poesía, nuestras cartas y nuestros manifiestos políticos, debemos sobre todo defender el progreso alcanzado en nuestro país de origen como ejemplo de lo que esta nueva era tiene que traer a partes menos afortunados del mundo."
 ig_trait_avant_garde:0 "Avant-garde"
 ig_trait_avant_garde_desc:0 "Lo que otros no se atreven a pensar, ya hablaremos en voz alta. Nuestro arte e ideas cortarán directamente a los corazones y forzarán los ojos abiertos, si no en asombro, ¡entonces en shock!"
 ig_trait_social_criticism:0 "Crítica social"
 ig_trait_social_criticism_desc:0 "La gente en el poder suele pensar que están más allá del reproche, pero la autoridad no hace que las ideas de alguien sean interesantes. Tenemos muchas cosas interesantes que decir, y sabemos exactamente de quién hablar."
 ig_trait_restoration: "Restauración"
 ig_trait_restoration_desc: "En esta era de grandes desafíos y grandes logros, nos enorgullecemos de nuestra sucia búsqueda de restaurar la nación a su antigua grandeza. El trabajo extraordinario ha reafirmado el estatus de nuestra civilización, y el trabajo extraordinario lo llevará a mayores alturas."
 ig_trait_crisis_of_identity: "Crisis de identidad"
 ig_trait_crisis_of_identity_desc: "La nación que servimos puede no ser la nación que realmente somos. ¿Cuánto tenemos en común con la gente a cargo?"
 ig_trait_les_beaux_arts: "Les Beaux-Arts"
 ig_trait_les_beaux_arts_desc: "Nuestras artes, nuestras exposiciones, y nuestro talento creativo es segundo a ninguno. ¿Por qué no deberíamos mostrarnos? Nos merecemos poner celos a otros."
 ig_trait_brasilidade: "Brasilidade"
 ig_trait_brasilidade_desc: "¡Ven, amigo, vamos a celebrar esta noche! Por aquí podemos escuchar las baladas más bellas bajo la luz de la estrella con una botella en nuestras manos, y por allá, ¡mira lo que ya está pintando! ¿No es esta la vida?"
 ig_trait_bachareis: "Bacharé"
 ig_trait_bachareis_desc: "¡Sabemos lo que necesita la nación! Después de todo, hablamos por el pueblo, ¿qué? No, no dijimos que hablemos."
 ig_trait_swaraj: "Swaraj"
 ig_trait_swaraj_desc: "Nos encontramos alienados y esclavizados por el estado. Nuestros gobernantes nos niegan agencia mientras solicitan nuestro servicio impensable. Tal cosa está condenada a fracasar, y, si es necesario, trabajaremos para asegurar que lo haga."
 ig_trait_westernisation: "occidentalización"
 ig_trait_westernisation_desc: "Nuestro actual gobierno sirve como representante de la justicia y el progreso, pero gran parte de nuestro país sigue distante de él. Debemos tratar de reducir la separación entre Estado y pueblo."

  # Petite-Bourgeoisie IG Traits
 ig_trait_treasury_bonds:0 "Treasury Bonds"
 ig_trait_treasury_bonds_desc:0 "Mientras el gobierno pueda ser confiado para pagar sus deudas, poner nuestros ahorros duros para financiar esta gran nación no es sólo patriota, sino una buena inversión."
 ig_trait_middle_managers:0 "Middle Managers"
 ig_trait_middle_managers_desc:0 "No podemos hacer que todos hagan todo por el libro, pero al menos podemos mantener lo que se hace en los libros. Alguien necesita recordar la manera adecuada de hacer las cosas por aquí."
 ig_trait_xenophobia:0 "Xenofobia"
 ig_trait_xenophobia_desc:0 "Todos sabemos quién es la culpa del estado de nuestro país, la gente tiene miedo de decirlo. Mientras tanto, se están riendo detrás de nuestras espaldas por lo que les dejamos escapar. Alguien necesita actuar."
 ig_trait_bergsbrukens_valdistrikten: "Bergsbrukens Valdistrikt"
 ig_trait_bergsbrukens_valdistrikten_desc: "La estrecha colaboración entre los intereses mineros y la finca de los ladrones significa que en mejores tiempos, podemos asegurarnos de que el estado obtenga una especie de apoyo que otros países sólo pueden soñar."
 ig_trait_effendi: "Effendi"
 ig_trait_effendi_desc: "Por hábitos serios y medios honestos, hemos subido a la cima, y nuestros esfuerzos están bien alabados por todos."
 ig_trait_reorganization: "Reorganización"
 ig_trait_reorganization_desc: "Sabemos que con los mandatos y departamentos adecuados en vigor, reformamos tanto. Di la palabra, y empezaremos."
 ig_trait_master_of_the_house: "Master of the House"
 ig_trait_master_of_the_house_desc: "¡Por favor! Siéntate. Aspiramos a refinar aquí: ser siervos de los pobres, mayordomos de los grandes, consoladores y filósofos de la nación."
 ig_trait_haute_finance: "Haute Finance"
 ig_trait_haute_finance_desc: "En el juego de la financiación continental, buscamos ser los ganadores por ser los primeros en jugar nuestra mano."
 ig_trait_old_lady_of_threadneedle_street: "La vieja dama de la calle Threadneedle"
 ig_trait_old_lady_of_threadneedle_street_desc: "Si la nación necesita ayuda, hay una anciana alrededor que es prudente, segura, y siempre se puede convertir en una crisis: el Banco de Inglaterra."
 ig_trait_civil_service: "Administración pública"
 ig_trait_civil_service_desc: "La gente tiene ideas divertidas sobre los funcionarios. Estamos aquí para ayudarle a formular e implementar sus políticas, eso es todo."
 ig_trait_bah_humbug: "Bah Humbug"
 ig_trait_bah_humbug_desc: "Los pobres y indigentes están en la miseria. ¿No hay prisiones? ¿Están en funcionamiento los centros de trabajo? ¡Entonces déjame en paz! Los que están mal, deben ir allí."
 ig_trait_swadesh: "Swadesh"
 ig_trait_swadesh_desc: "Somos tan industriosos como cualquier otra gente, sin embargo somos negados crédito y forzados a servidumbre por negocios extranjeros. Si nuestros gobernantes buscan excluirnos de la economía, haremos lo mismo por ellos."
 ig_trait_lines_of_credit: "Líneas de crédito"
 ig_trait_lines_of_credit_desc: "Si no fuera por crédito proporcionado por nuestros propios financieros adeptos, la Compañía nunca podría haber conquistado la India. Si se nos da un caso de negocio sólido, estamos totalmente dispuestos a continuar esta relación."
 ig_trait_cooperative_agencies: "Organismos cooperativos"
 ig_trait_cooperative_agencies_desc: "Nuestros gobernantes poseen abundante capital, pero tienen poco conocimiento de nuestro país. Al reunir sus recursos y nuestra experiencia, podemos enriquecer nuestra patria mucho más de lo que nunca lo harían solos."

  # Devout IG Traits
 ig_trait_be_fruitful_and_multiply:0 "Ser Fruta y Multiply"
 ig_trait_be_fruitful_and_multiply_desc:0 "El ascetismo es bueno para los pocos que dedican su vida a las búsquedas espirituales, pero en la gente común, los valores más importantes para inculcar son los de construir una familia y cuidar a los niños."
 ig_trait_divine_right:0 "Derecho Divino"
 ig_trait_divine_right_desc:0 "Creemos que hay una orden para nuestras vidas. La sociedad puede reflejar ese orden mejor o peor. Mientras los gobernantes sean virtuosos y sus decretos, podemos asegurar que la gente sepa por qué."
 ig_trait_pious_fiction:0 "Pious Fiction"
 ig_trait_pious_fiction_desc:0 "Los valores de hoy están tan envenenados y la literatura tan corrupta que la educación misma tiene un efecto erosionante en la moral. Mejor que enseñar a la gente lo que el actual establecimiento considera 'verdad' es enseñarles lo que debe ser verdad."
 ig_trait_work_ethic: "Work Ethic"
 ig_trait_work_ethic_desc: "Recuerde, el dinero tiene una naturaleza generadora. El dinero engendra dinero; la producción de ganancias es un acto de creación, un honor y glorificación de la propia obra de Dios."
 ig_trait_asceticism: "Asceticismo"
 ig_trait_asceticism_desc: "Abstenerse de los placeres de este mundo es el camino correcto. No deje que se perturbe demasiado por los cambios materiales; éstos también pasarán."
 ig_trait_kar_seva: "Kar Seva"
 ig_trait_kar_seva_desc: "Dios está con nosotros y entre nosotros. Servir desinteresadamente a otros, entonces, es servir la creación de Dios y servir a Dios. Nos corresponde a todos comprometernos en un trabajo honesto y compartir los frutos de ese trabajo con otros, y por esos medios estar más cerca de Dios."
 ig_trait_temporal_mandate: "Mandato temporal"
 ig_trait_temporal_mandate_desc: "La línea entre los cielos y la tierra es a menudo borrosa; así también la línea entre la fe y el gobierno. Se necesita todo tipo para administrar el mundo secular, siempre podemos encontrar maneras de hacer que nuestros sistemas funcionen juntos."
 ig_trait_the_best_revenge: "La mejor venganza"
 ig_trait_the_best_revenge_desc: "Si quieres vengarte de tu enemigo, adquiere más buenas cualidades y camina en el camino de la justicia. Al hacerlo, inevitablemente tomarás venganza contra tu enemigo porque él estará angustiado por tus buenas cualidades, y él será afligido por tu buena reputación."
 ig_trait_yeshivot: "Yeshivot"
 ig_trait_yeshivot_desc: "Estudiar el Sifrut Chazal es un deber clave de cada juventud. Si nadie va a la escuela, ¿cómo se pueden recordar y guardar nuestras leyes?"
 ig_trait_traditsye: "Traditsye"
 ig_trait_traditsye_desc: "El mundo está cambiando rápidamente a nuestro alrededor. ¿Cómo estamos destinados a mantener nuestro equilibrio si nos precipitamos después de este torbellino inconocible de cambio?"
 ig_trait_heavenly_sovereign: "Celestial Soberano"
 ig_trait_heavenly_sovereign_desc: "Los herederos del Emperador Jimmu han tendido a una de las instituciones más venerables de la tierra. Esta fuente de tradición merece veneración, y como nación debemos reconocerlo."
 ig_trait_secular_shrine_theory: "Teoría de Santuario Seglar"
 ig_trait_secular_shrine_theory_desc: "Los santuarios son una creencia inherente del pueblo japonés; existen intitucionalmente con el propósito de los rituales públicos del estado. El Shintoismo es ideológico: es una expresión del patriotismo que esperamos de cada ciudadano."
 ig_trait_haibutsu_kishaku: "Haibutsu Kishaku"
 ig_trait_haibutsu_kishaku_desc: "Las religiones extranjeras deben ser abolidas de la nación y sus figuras destruidas. ¡Mira lo que han causado! ¡Ve a sus santuarios, sus templos, sus chozas, y muéstrales que no tienen lugar aquí!"
 ig_trait_da_wat: "Dawat"
 ig_trait_da_wat_desc: "Debemos salir, invitar a otros a unirse a nosotros en la fe y vivir según la voluntad de Alá. La ummah da la bienvenida a todos."
 ig_trait_sharia: "Sharia"
 ig_trait_sharia_desc: "Vivir correctamente requiere conocer las leyes que definen lo correcto y lo que no es. La interpretación de la ley es una de las obligaciones más honradas y solemnes que podemos cumplir."
 ig_trait_mecelle: "Mecelle"
 ig_trait_mecelle_desc: "Basado en la jurisprudencia de Hanafi, el Mecelle-i Ahkâm-ı Adliye asegura que seguiremos un código que satisface tanto nuestra fe como nuestras expectativas de ley secular."

