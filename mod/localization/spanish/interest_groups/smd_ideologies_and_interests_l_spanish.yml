 # leaders
 
 ideology_marxist_leader: "Marxista"
 ideology_marxist_leader_desc: "Líderes socialistas revolucionarios que favorecen el gobierno del consejo, la propiedad pública, la agricultura colectivizada y una fuerte ruptura con el capitalismo liberal."
 ideology_state_socialist_leader: "State Socialist"
 ideology_state_socialist_leader_desc: "Centralizar a los líderes socialistas que prefieren la dirección estatal un partido o tecnócrata, la economía de mando y los grandes sistemas públicos."
 ideology_left_wing_populist_leader: "Populista zurdo"
 ideology_left_wing_populist_leader_desc: "Los líderes antielite de la política de masas que mezclan la redistribución, el proteccionismo, la democracia y una fuerte hostilidad al gobierno oligárquico."
 ideology_democratic_socialist_leader: "Democratic Socialist"
 ideology_democratic_socialist_leader_desc: "Líderes de izquierda democrática que favorecen las elecciones, el poder obrero, la propiedad social, el bienestar fuerte y las libertades civiles."
 ideology_green_leader: "Verde"
 ideology_green_leader_desc: "Los líderes democráticos ambientales se centraron en la regulación ecológica, los bienes públicos, las libertades civiles y la reforma postindustrial."
 ideology_state_capitalist_leader: "Capitalista estatal"
 ideology_state_capitalist_leader_desc: "Los líderes de desarrollo que aceptan mercados pero quieren un estado fuerte, una industria estratégica, una banca centralizada y una inversión guiada."
 ideology_market_socialist_leader: "Market Socialist"
 ideology_market_socialist_leader_desc: "Líderes socialistas descentralizados que favorecen cooperativas, sindicatos, bienestar y mecanismos de mercado bajo supervisión democrática."
 ideology_progressive_leader: "Progresiva"
 ideology_progressive_leader_desc: "Los dirigentes reformistas se centraron en la igualdad de derechos, la expansión del bienestar, la educación, las libertades civiles y la gestión de la reforma del mercado."
 ideology_social_liberal_leader: "Social Liberal"
 ideology_social_liberal_leader_desc: "Líderes democrático-liberales que apoyan a mercados con bienestar, igualdad de ciudadanía, educación y capitalismo regulado."
 ideology_technocrat_leader: "Technocrat"
 ideology_technocrat_leader_desc: "Líderes expertos que apoyan el secularismo, la planificación administrativa, la capacidad estatal, los mercados regulados y la gobernanza científica."
 ideology_liberal_leader: "Liberal"
 ideology_liberal_leader_desc: "Principales dirigentes liberales que apoyan las repúblicas constitucionales, las libertades civiles, el libre comercio, los mercados privados y la igualdad jurídica."
 ideology_moderate_leader: "Moderado"
 ideology_moderate_leader_desc: "Los líderes de establecimientos pragmáticos que rara vez empujan reformas radicales y son más comunes en sistemas mixtos estables."
 ideology_neoliberal_leader: "Neoliberal"
 ideology_neoliberal_leader_desc: "Los líderes liberales orientados al mercado que favorecen el libre comercio, laissez-faire, la provisión privada, la moderación fiscal y las instituciones tecnócratas."
 ideology_conservative_leader: "Conservador"
 ideology_conservative_leader_desc: "Líderes de derechos de status-quo que favorecen el orden social, reforma limitada, economía de mercado moderada, tradición y nacionalismo cauteloso."
 ideology_corporatist_leader: "Corporatista"
 ideology_corporatist_leader_desc: "Los líderes de coordinación capitalista que favorecen el capitalismo intervencionista o laissez-faire organizado a través de las instituciones estatales-trabajadores."
 ideology_theocrat_leader: "Theocrat"
 ideology_theocrat_leader_desc: "Líderes religiosos que quieren el estado, escuelas, tribunales y ciudadanía ordenados alrededor de la religión oficial."
 ideology_right_wing_libertarian_leader: "Libertario de derechas"
 ideology_right_wing_libertarian_leader_desc: "Los líderes del mercado antiestatal que favorecen las instituciones privadas, el bajo bienestar, los medios de comunicación libres y la débil seguridad interna."
 ideology_classical_liberal_leader: "Liberal clásico"
 ideology_classical_liberal_leader_desc: "Antiguos constitucionalistas liberales que favorecen el libre comercio, el gobierno limitado, los derechos de propiedad, las instituciones representativas y el estado de derecho."
 ideology_neocon_leader: "Neocon"
 ideology_neocon_leader_desc: "Líderes militarizados liberales-conservadores que favorecen las fuerzas armadas profesionales, la intervención en el extranjero, las instituciones capitalistas y la seguridad nacional."
 ideology_jihadist_leader: "Jihadist"
 ideology_jihadist_leader_desc: "Líderes religiosos militantes que sólo pueden emerger de países islámicos de religión estatal bajo presión radical."
 ideology_minarchist_leader: "Minarchist"
 ideology_minarchist_leader_desc: "Extremadas líderes del mercado de pequeños estados que apoyan a laissez-faire, sistemas privados, y el retroceso casi total de la autoridad pública."
 ideology_right_wing_populist_leader: "Populista derechista"
 ideology_right_wing_populist_leader_desc: "Los líderes nacional-populistas antielitas que se levantan en democracias liberales con altos radicales, mezclando el chovinismo social, el proteccionismo y la reacción cultural."
 ideology_authoritarian_capitalist_leader: "Autoritario capitalista"
 ideology_authoritarian_capitalist_leader_desc: "Líderes capitalistas de difícil orden que favorecen al capitalismo privado o guiado bajo autocracia, poder policial, censura y oposición débil."
 ideology_monarchist_leader: "Monarquista"
 ideology_monarchist_leader_desc: "Líderes lealistas dinamistas que casi sólo aparecen en monarquías y favorecen la autoridad hereditaria, la tradición, la iglesia y la jerarquía."
 ideology_fascist_leader: "fascista"
 ideology_fascist_leader_desc: "Líderes autoritarios ultranacionalistas que favorecen la militarización, el gobierno de partido único, la violencia estatal, la sociedad cerrada y la economía corporativa-nacional."
 ideology_anarchist_leader: "Anarquista"
 ideology_anarchist_leader_desc: "Los líderes socialistas antiautoritarios que favorecen el autogobierno apátridas, la propiedad cooperativa, las milicias, la libertad de expresión, la policía y la fuerte autonomía local."
