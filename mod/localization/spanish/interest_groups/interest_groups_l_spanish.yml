l_spanish:

  # Base IGs
 ig_rural_folk:0 "Rural"
 ig_rural_folk_only_icon:0 "@rural_folk!"
 ig_rural_folk_desc:0 "Gente en el campo cuyos intereses políticos están mayormente alineados con sus medios de vida agrarios."
 ig_devout:0 "Fundamentalistas religiosos"
 ig_devout_only_icon:0 "@devout!"
 ig_devout_desc:0 "Los seguidores más dedicados de la religión mayoritaria, considerándola la mejor fuente de sabiduría moral y política."
 ig_industrialists:0 "Corporations"
 ig_industrialists_only_icon:0 "@industrialists!"
 ig_industrialists_desc:0 "Inversionistas y accionistas interesados en el avance tecnológico y el crecimiento industrial."
 ig_landowners:0 "Landowners"
 ig_landowners_only_icon:0 "@landowners!"
 ig_landowners_desc:0 "Los propietarios de grandes fincas y vastas plantaciones, los terratenientes son custodios de tradición y dinero viejo."
 ig_intelligentsia:0 "Academia"
 ig_intelligentsia_only_icon:0 "@intelligentsia!"
 ig_intelligentsia_desc:0 "Los intelectuales que lideran las tendencias de la nación en la literatura, el arte, la música y el teatro. También incluye la clase de gestión común /"
 ig_petty_bourgeoisie:0 "Urbanitas"
 ig_petty_bourgeoisie_only_icon:0 "@petty_bourgeoisie!"
 ig_petty_bourgeoisie_desc:0 "Pequeñas empresas, empleados de oficina, contadores y otros individuos que son considerados entre los ricos y pobres estratos."
 ig_armed_forces:0 "Fuerzas armadas"
 ig_armed_forces_only_icon:0 "@armed_forces!"
 ig_armed_forces_desc:0 "Soldados profesionales y otros cuyo interés está fuertemente ligado al ejército del país."
 ig_trade_unions:0 "Sindicatos Laborales"
 ig_trade_unions_only_icon:0 "@trade_unions!"
 ig_trade_unions_desc:0 "Trabajo organizado que busca organizar a los trabajadores en las minas, fábricas y campos y al hacer que se unen las fortalezas de los intereses dispares en una sola voz."

  # Religious IGs
 ig_catholic_church:0 "Iglesia Católica"
 ig_catholic_church_desc:0 "El catolicismo es la mayor secta del cristianismo. Los creyentes sostienen que el arzobispo de Roma, el Papa, es el sucesor ininterrumpido de la autoridad de Jesucristo a través de San Pedro. Otras creencias importantes incluyen la veneración de los santos y de la Virgen María."
 ig_orthodox_church:0 "Iglesia Ortodoxa"
 ig_orthodox_church_desc:0 "Las iglesias ortodoxas tienden a ser iglesias orientales no en comunión con el Papa."
 ig_oriental_orthodox_church:1 "Iglesia Ortodoxa Oriental"
 ig_oriental_orthodox_church_desc:1 "Las iglesias ortodoxas orientales tienden a ser iglesias de Oriente Medio no en comunión con el Papa."
 ig_anglican_church:0 "Iglesia Anglicana"
 ig_anglican_church_desc:0 "La Iglesia Anglicana fue creada por el rey Enrique VIII durante la Reforma protestante. Los anglicanos creen que la Biblia es la principal autoridad en el dogma cristiano, rechazando al Papa siendo menos radical que otras iglesias evangélicas."
 ig_evangelical_church:0 "Iglesia Evangélica"
 ig_evangelical_church_desc:0 "Las iglesias evangélicas fueron creadas principalmente en el norte de Europa durante la Reforma protestante. Los evangélicos creen que la Biblia es la única autoridad en el dogma cristiano, rechazando al Papa y viendo la veneración católica de los santos como frontera con la idolatría."
 ig_rabbinical_council:0 "Consejo Rabínico"
 ig_rabbinical_council_desc:0 "El liderazgo de la población judía de un país tiende a ser rabinos bien educados con fuertes tradiciones de debate y beca."
 ig_sunni_madrasahs:1 "Sunni Ulema"
 ig_sunni_madrasahs_desc:1 "El sunnismo es la mayor secta del Islam. Los creyentes sostienen que Muhammad fue sucedido como Califa del Islam por su tío, Abu Bakr, en oposición a la opinión de Shi’a de que su yerno Ali era el sucesor legítimo."
 ig_shia_madrasahs:1 "Shi'a Ulema"
 ig_shia_madrasahs_desc:1 "Shi’ism es la segunda secta más grande del Islam. Los creyentes sostienen que Muhammad fue sucedido como Califa del Islam por su yerno, Ali, en oposición a la opinión sunita de que su tío Abu Bakr era el sucesor legítimo."
 ig_hindu_priesthood:0 "Sacerdote hindú"
 ig_hindu_priesthood_desc:0 "Probablemente la religión organizada más antigua todavía en existencia, el hinduismo sostiene que romper el ciclo de reencarnación y alcanzar el Nirvana requiere la adhesión a un sistema de castas por el cual los individuos sirven un papel para mejorar su karma, así como los muchos dioses adorados por los hindúes sirven diferentes roles."
 ig_vajrayana_monks:0 "Vajrayana Monks"
 ig_vajrayana_monks_desc:0 "El budismo vajrayana es más fuerte en el Tíbet y Mongolia. Destaca el uso de la meditación y la autodisciplina."
 ig_mahayana_monks:0 "Mahayana Monks"
 ig_mahayana_monks_desc:0 "El budismo mahayana es más fuerte en China, Vietnam y Corea. Destaca que se debe alentar a todos en la sociedad a buscar la iluminación a través de la perfección. Mahayana ve a Buda como una figura parecida a Dios."
 ig_theravada_monks:0 "Teravada Monks"
 ig_theravada_monks_desc:0 "El budismo Theravada es más fuerte en Birmania, Siam, Camboya y Ceylán. Pone gran énfasis en individuos que buscan a Nirvana para romper el ciclo de reencarnación. Theravada ve a Buda no como un Dios, sino como un hombre iluminado que mostró al resto de la humanidad el camino hacia la perfección."
 ig_shinto_monks:0 "Shinto Monks"
 ig_shinto_monks_desc:0 "El Shintoismo es una fe sincrática, combinando conceptos budistas del karma y la reencarnación con adoración y aplauso de kami, los espíritus de la naturaleza y los antepasados muertos."
 ig_pagan_shamans:0 "Pagan Shamans"
 ig_pagan_shamans_desc:0 "El animismo es la adoración y la placa de los espíritus naturales. Los rituales realizados por los animistas incluyen sacrificios de alimentos y ganado, y consumo de drogas alucinógenas para viajes espirituales de introspección."

  # Taiping IGs
 ig_taiping_god_worshippers:0 "God-Worshipping Society"
 ig_taiping_god_worshippers_desc:0 "La Sociedad Dios-Ordenamiento, o Emperador-Ordenamiento, es una fe cristiana sincrática prominente entre el Reino Celestial, apoyando una interpretación del cristianismo que ve a todos los creyentes como hijos e hijas de Dios."

  # British IGs
 ig_landed_gentry:0 "Landed Gentry"
 ig_landed_gentry_desc:0 "Los dueños de grandes fincas y vastas propiedades, el género de tierra son custodios de tradición y dinero viejo."

  # Prussian IGs
 ig_junkers:0 "Junkers"
 ig_junkers_desc:0 "Descubierto de los ’ jung herrs’ (jóvenes señores) que siguieron a raíz de conquistas teutónicas del Báltico pagano para establecer y Christianizar las tierras prusianas, los Junkers son la nobleza de Prusia y los principales propietarios. Ellos tienden a oponerse a los movimientos hacia la democracia como una amenaza para el gobierno de élite."

  # USA IGs
 ig_southern_planters:0 "Homeowners"
 ig_southern_planters_desc:0 "Mientras que la vivienda se ha vuelto más escasa en los últimos tiempos, grupos de personas que afirman ser asociaciones de propietarios de viviendas dedicadas a la compra y venta de bienes raíces con fines de lucro han inflado artificialmente el costo de la vida."
 ig_evangelicals:0 "Cristianos"
 ig_evangelicals_desc:0 "Cristianos Ardientes de una sorprendente variedad de denominaciones protestantes, todos los cristianos están de acuerdo en que la nación necesita encontrar su propio despertar espiritual para salvarse de un ascenso en el secularismo en toda la nación."
 ig_yeoman_farmers:0 "Rurales"
 ig_yeoman_farmers_desc:1 "La pequeña clase rural estadounidense, considerada por muchos de los Padres Fundadores como la base de la nación. La clase yeoman se ha establecido desde hace tiempo como la vanguardia del populismo rural estadounidense."
 ig_wallstreet:0 "Wall Street"
 ig_wallstreet_desc:0 "Los bancos de inversión en Wall Street en Nueva York son la columna vertebral del sistema financiero estadounidense, excertando la influencia extrema en toda la economía."
 ig_silicon_valley:0 "Silicon Valley"
 ig_silicon_valley_desc:0 "Los programadores y los wizzes de ordenador de casa que manejan la vida cotidiana en Internet."
 ig_american_middle_class:0 "Middle America"
 ig_american_middle_class_desc:0 "La clase media americana constituye la mayoría de la base de consumo del país, empleos de trabajo que dan salarios dignos."
 ig_digital_activists:0 "Activistas digitales"
 ig_digital_activists_desc:0 "Varios influencers en línea ejercen el poder sobre nuestra población."
  # Ottoman IGs
 ig_local_governors:0 "Gobernadores locales"
 ig_local_governors_desc:0 "Los gobernantes de las provincias pueden adquirir una gran influencia mediante la creación de redes locales de patrocinio. Las dinastías pueden llegar a ser tan poderosas que son estados efectivamente independientes sólo atados nominalmente al imperio."

  # Chinese IGs
 ig_literati:0 "Literati"
 ig_literati_desc:0 "Los académicos de China desempeñan un papel importante, tanto como partidarios del gobierno como críticos de él."
 ig_scholar_officials:0 "Scholar-Officials"
 ig_scholar_officials_desc:0 "El género aterrizado en China no son realmente la nobleza de China. Conservan su riqueza mediante la compra de propiedades, pero deben su poder a sus posiciones en el gobierno."
 ig_confucian:0 "Estudios confucianos"
 ig_confucian_desc:0 "Más de una tradición social, el confucianismo coexiste cómodamente con una multitud de fes, pero sin embargo exige armonía social y moral fuerte de los que la siguen."

  # Papal IGs
 ig_roman_landowners:1 "Nobilidad cívica"
 ig_roman_landowners_desc:1 "Consistiendo en familias nobles y en élites terrestres otorgadas títulos por el Papa, la nobleza cívica romana sirve como personas de riqueza, influencia y poder temporal en los territorios de la Santa Sede."
 ig_roman_curia:0 "Roman Curia"
 ig_roman_curia_desc:0 "La Curia Romana, o "Corte de Roma", como se sabe a veces, es la institución administrativa de la Santa Sede, ejerciendo tanto poderes eclesiásticos como temporales."

  # Japanese IGs
 ig_samurai:0 "Samurai"
 ig_samurai_desc:0 "Los Samurai son la nobleza militar hereditaria de Japón, sirviendo como retenedores privilegiados a los poderosos Daimyo de terratenientes, y como ejecutores de la voluntad de sus maestros feudales."
 ig_shogunate:0 "Shogunate"
 ig_shogunate_desc:0 "El Shogunate se refiere al gobierno militar que ha gobernado Japón en el nombre del Emperador desde el siglo XII. Anclado en el apoyo de poderosos señores feudales, el Daimyo, la insitución está dedicada a la defensa del orden tradicional de Japón."
 ig_peasants:1 "Heimin"
 ig_peasants_desc:0 "Heimin denota la clase japonesa de comuneros, nacidos sin ningún tipo de privilegios sociales, y con intereses políticos que reflejan principalmente los de los agricultores rurales."
 ig_buddhist_monks:0 "Monjes budistas"
 ig_buddhist_monks_desc:0 "Existiendo junto, y a menudo en contra de la creencia japonesa nativa en kami, el budismo del siglo XIX ha estado presente en Japón durante más de un milenio. Las escuelas budistas patronizadas por el estado a lo largo de la era Edo enfatizan la relación sincrática entre kami y buddhas."

  # Hawaiian IGs
 ig_christian_missionaries:0 "Christian Missionaries"
 ig_christian_missionaries_desc:0 "Los Misioneros Cristianos llegaron a Hawai'i hace apenas unas décadas, pero ya han suplantado el Kahuna como la clase dominante clerical de Hawai. Abogan por el comercio con las potencias occidentales, atrayendo migrantes de Occidente, y la conversión de nativos hawaianos al cristianismo."
 ig_alii:0 "Ali’i"
 ig_alii_desc:0 "Los Ali’i representan a los nobles menores de Hawai en el servicio del monarca reinante. Abogan por los valores tradicionales y preservan la regla de la monarquía."
 ig_maka_ainana:0 "Maka’āinana"
 ig_maka_ainana_desc:0 "La Maka’āinana representa a la clase rural de Hawai, a menudo trabajando en plantaciones y pesca. Abogan por los valores tradicionales y por la dependencia económica continua de Hawai en el sector agrícola."
 ig_hawaiian_democrats:0 "Demócratas"
 ig_hawaiian_democrats_desc:0 "Los demócratas representan a los reformadores liberales de Hawai. Ellos abogan por eliminar el poder absoluto del monarca a favor de un régimen democrático y las relaciones comerciales continuas con los poderes occidentales."

  # Swedish IGs
 ig_church_of_sweden:0 "Iglesia de Suecia"
 ig_church_of_sweden_desc:0 "La Iglesia de Suecia fue instigada por el rey Gustav Vasa en el siglo XVI y es la iglesia oficial del Estado de Suecia. Al ser una institución luterana, la Iglesia sostiene que la Biblia es la única autoridad en el dogma cristiano, rechazando así la autoridad del Papa y tradiciones como la veneración de los santos."

  # Finnish IGs
 ig_church_of_finland: "Iglesia de Finlandia"
 ig_church_of_finland_desc: "Nacido de la separación de Finlandia de Suecia en 1809, la Iglesia de Finlandia fue establecida como la iglesia oficial del estado del país. Al ser una institución luterana, la Iglesia sostiene que la Biblia es la única autoridad en el dogma cristiano, rechazando así la autoridad del Papa y tradiciones como la veneración de los santos."

# Danish IGs
 ig_church_of_denmark: "Church of Denmark"
 ig_church_of_denmark_desc: "Establecida en el siglo XVI por el rey cristiano III, la Iglesia de Dinamarca es la iglesia oficial del estado de Dinamarca. Al ser una institución luterana, la Iglesia sostiene que la Biblia es la única autoridad en el dogma cristiano, rechazando así la autoridad del Papa y tradiciones como la veneración de los santos."

# Norwegian IGs
 ig_aristocracy_of_officials: "Aristocracy of Officials"
 ig_aristocracy_of_officials_desc: "Sin ninguna nobleza histórica significativa y con la abolición formal de la institución en 1821, la clase superior de Noruega está compuesta por funcionarios públicos, con abogados, sacerdotes y médicos que ocupan las posiciones de una nobleza tradicional."
 ig_church_of_norway: "Church of Norway"
 ig_church_of_norway_desc: "La Iglesia de Noruega fue establecida como un cuerpo separado de la Iglesia Católica Romana e integrada con el estado noruego en el siglo XVI como resultado de la Reforma Protestante. Al ser una institución luterana, la Iglesia sostiene que la Biblia es la única autoridad en el dogma cristiano, rechazando así la autoridad del Papa y tradiciones como la veneración de los santos."

  # Korean IGs
 ig_yangban:0 "Oficiales de Yangban"
 ig_yangban_desc:0 "El Yangban representa a los descendientes y sin tierra de Corea, que obtienen sus títulos e influencia de posiciones dentro del aparato burocrático del país. Exencionando los ideales confucianos del Scholar-Official, son firmes defensores del orden tradicional de Corea."

  # Russian IGs
 ig_gentry_assembly:0 "Asamblea General de la Gentry"
 ig_gentry_assembly_desc:0 "La Asamblea Gentista es el órgano autónomo que representa a la Aristocracia rusa. Concedido la condición oficial en 1785, la Asamblea ha defendido desde entonces la retención o ampliación de los poderes y privilegios tradicionales de los nobles."

  # Australian IGs
 ig_squattocracy: "Squattocracy"
 ig_squattocracy_desc: "La ’Escuatocracia’ representa la clase de colonos blancos australianos que han ocupado grandes extensiones de tierra con poca o ninguna reivindicación legal. A menudo los primeros colonos para llegar a una zona determinada, la escuatocracia ha adquirido inmensa riqueza e influencia social principalmente por el producto de criar ganado en sus territorios."

  # Austrian IGs
 austrian_aristocracy:0 "Austrian Aristocracy"
 austrian_aristocracy_desc: "La Aristocracia austriaca representa la noble clase establecida de Austria, históricamente otorgada con títulos nobles por los emperadores romanos y archiduques de Austria, y posee una gran influencia dentro de la corte imperial."

  # Misc Igs
 ig_red_army:0 "Ejército Rojo"
 ig_red_army_desc:0 "El Ejército Rojo es una institución dedicada a la defensa y propagación de la Revolución, nacida a través de la amalgama de las fuerzas armadas tradicionales con el proletariado y la ideología comunista."
 ig_fellahin: "Fellahin"
 ig_fellahin_desc: "Consiguiendo su nombre de los arados que trabajan y de los campos que hasta, los hombres son los campesinos y campesinos de Egipto."

  # Indian IGs
  ig_zamindars: "Zamindars"
  ig_zamindars_desc: "Los Zamindar son los propietarios típicamente hereditarios de grandes fincas. A menudo representan los restos de la aristocracia de la era de Mughal, otorgó el derecho a recaudar ingresos de tierras en nombre de sus gobernantes."

  ig_east_india_company: "East India Company"
  ig_east_india_company_desc: "La East India Company es la empresa privada encargada de gobernar la India bajo la supervisión del Parlamento británico. Tras la revocación de su mandato comercial en 1833, se ha convertido en un órgano puramente administrativo."

  ig_presidency_armies: "Presidencia"
  ig_presidency_armies_desc: "Las fuerzas armadas de la Presidencia son las fuerzas armadas de la India colonial, compuestas típicamente de sepoys indígenas bajo el mando de oficiales europeos."

  ig_indian_army: "Ejército Indio"
  ig_indian_army_desc: "El ejército indio es la principal fuerza armada de la India colonial, formada por unificar a los ejércitos presidenciales en un cuerpo singular. Está compuesta en gran medida por soldados nativos indios bajo el mando de oficiales europeos."

  ig_ryots: "Ryots"
  ig_ryots_desc: "Los Ryots son los agricultores y campesinos tradicionales de la India, normalmente sin ninguna tierra propia. Sus intereses son en gran medida agrarios."

  ig_civil_servants: "Funcionarios civiles"
  ig_civil_servants_desc: "Las Siervas Civiles abarcan la intelectualidad india nativa que se ha desarrollado principalmente de los diversos órganos de la burocracia colonial india. Normalmente tienen o han desempeñado funciones como clerks u otros administradores de bajo a medio nivel."

  ig_government_of_india: "Government of India"
  ig_government_of_india_desc: "El Gobierno de la India se refiere a la administración colonial europea encargada de promover los intereses de la corona británica en la India."

  ig_bhadralok: "Bhadraloks"
  ig_bhadralok_desc: "El Bhadralok, o "gentes" abarcan las clases medias financiadas de la sociedad india. Este grupo en su forma actual se originó en Bengal, entre los comerciantes nativos de Bengali, industriales y financieros que alinearon con la Compañía de la India Oriental durante su conquista de la India."

  ig_kisanharu: "Kisanharu"
  ig_kisanharu_desc: "Los Kisanharu son los agricultores y campesinos tradicionales de Nepal, por lo general sin ninguna tierra propia. Sus intereses son en gran medida agrarios."
