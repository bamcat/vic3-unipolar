l_spanish:
 law_jihad:0 "Jihadismo"
 law_jihad_desc:0 "Los militares yihadistas tienen un objetivo claramente religioso en sus prácticas, entrenamiento y organización."
 law_mixed_healthcare:0 "Sistema mixto de salud"
 law_mixed_healthcare_desc:0 "La salud de la población es gestionada por planes de seguro de salud tanto privados como gubernamentales. Los planes gubernamentales se ofrecen a nuestros ciudadanos de bajos ingresos para resolver los fallos del mercado del seguro médico privado."
 law_affirmative_action:0 "Acción afirmativa"
 law_affirmative_action_desc:0 "Se han hecho obligatorias diversas protecciones para las minorías. Esto incluye citas &quot; diversos sistemas para fomentar su participación en nuestro sistema actual, protecciones legales y financiación monetaria."
 
 lawgroup_firearms:0 "Propiedad de armas de fuego"
 lawgroup_firearms_desc:0 "Cuestiones relativas al derecho a llevar armas."
 
 lawgroup_abortions:0 "Abortos"
 lawgroup_abortions_desc:0 "Se permite que nuestros ciudadanos tengan o no abortos."
 
 lawgroup_unions:0 "Uniones"
 lawgroup_unions_desc:0 "Cuestiones relativas a la capacidad de nuestros trabajadores para formar sindicatos."
 
 lawgroup_homosexuality:0 "Homosexualidad"
 lawgroup_homosexuality_desc:0 "Asuntos relativos al movimiento LGBTQ+ en nuestro país."
 
 law_canton_system:0 "Isolationism"
 
 law_unrestricted_firearms:0 "Armas de fuego sin restricciones"
 law_unrestricted_firearms_desc:0 "Nuestro país es el hogar de una gran industria de armas de fuego, madura para uso civil."
 
 law_licensed_firearms:0 "Armas de fuego autorizadas"
 law_licensed_firearms_desc:0 "Los ciudadanos requieren una licencia para poseer un arma en nuestro país."
 
 law_banned_firearms:0 "Armas de fuego prohibidas"
 law_banned_firearms_desc:0 "El uso civil de armas de fuego está estrictamente prohibido."
 
 law_banned_unions:0 "Banned Unions"
 law_banned_unions_desc:0 "No se permite a los trabajadores sindicalizarse con la intención de obtener beneficios laborales."
 
 law_restricted_unions:0 "Sindicatos restringidos"
 law_restricted_unions_desc:0 "Se permite a los trabajadores formar sindicatos, con algunas restricciones destinadas a proteger a nuestros inversores."
 
 law_unrestricted_unions:0 "Sindicatos no restringidos"
 law_unrestricted_unions_desc:0 "Se alienta plenamente a los trabajadores a sindicalizarse y a buscar plenos beneficios para su trabajo."
 
 law_banned_abortions:0 "Abortos prohibidos"
 law_banned_abortions_desc:0 "El asesinato de bebés está estrictamente prohibido en nuestras leyes."
 
 law_restricted_abortion:0 "Abortos restringidos"
 law_restricted_abortion_desc:0 "Los ciudadanos son abortos autorizados cuando la vida de la madre es amenazada, o en los casos de violación e incesto."
 
 law_unrestricted_abortions:0 "Abortos sin restricciones"
 law_unrestricted_abortions_desc:0 "Los ciudadanos pueden ejercer libremente su derecho a un aborto como deseen."
 
 law_active_oppression:0 "Opresión activa"
 law_active_oppression_desc:0 "Los ciudadanos que se identifican abiertamente como miembros de la comunidad LGBTQ son oprimidos, encarcelados o incluso asesinados."
 
 law_restricted_lgbtq:0 "Homosexualidad criminalizada"
 law_restricted_lgbtq_desc:0 "Los ciudadanos pueden enfrentar la cárcel por ser gay."
 
 law_decriminalized_gays:0 "Homosexualidad despenalizada"
 law_decriminalized_gays_desc:0 "Los ciudadanos pueden entablar relaciones homosexuales, tras puertas cerradas, por supuesto. Las relaciones homosexuales no serán sancionadas por el estado."
 
 law_gay_marriage:0 "Matrimonio del mismo sexo"
 law_gay_marriage_desc:0 "El Estado está obligado a sancionar todo tipo de matrimonios, independientemente de si los iniciadores son del mismo sexo."
 
