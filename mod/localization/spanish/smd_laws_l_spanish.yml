 # LAWGROUP
 # ==========================================
 
 lawgroup_subsidized_housing: "Vivienda subvencionada"
 lawgroup_subsidized_housing_desc: "El grado en que el Estado financia, construye y garantiza la vivienda para sus ciudadanos. Los marcos más progresivos amplían la producción de bienes raíces en los centros urbanos, mejoran la infraestructura y aumentan la atracción migratoria, a un aumento de los costos de bienestar y presupuesto."
 
 # ==========================================
 # LAWS
 # ==========================================
 
 law_no_public_housing: "No Public Housing"
 law_no_public_housing_desc: "El estado no proporciona soporte de vivienda. Shelter es un asunto privado — comprado, alquilado o desaparecido sin. El mercado urbano de vivienda funciona sin intervención pública, y lo que el mercado produce es lo que obtienen los ciudadanos."
 
 law_housing_projects: "Proyectos de vivienda"
 law_housing_projects_desc: "El estado construye viviendas públicas básicas de alta densidad en zonas urbanas — bloques de torre, filas de tenencia, funcionales y baratas. La calidad no siempre es alta y los lugares no siempre son deseables, pero la vivienda existe. Los centros urbanos ahora pueden producir bienes raíces adicionales a través de programas de construcción estatales."
 
 law_public_housing_program: "Public Housing Program"
 law_public_housing_program_desc: "Un amplio programa de vivienda estatal con estándares de diseño, desarrollo de uso mixto y planificación urbana activa. El gobierno no sólo está construyendo refugios — está conformando la ciudad. Los centros urbanos producen significativamente más bienes raíces a medida que se expande el sector de la construcción pública, y la infraestructura mejora como consecuencia de una mejor planificación de la ciudad."
 
 law_universal_housing: "Vivienda universal"
 law_universal_housing_desc: "La vivienda es un derecho garantizado. El Estado financia, construye y mantiene refugio para todos los ciudadanos que lo necesitan, sin pruebas, sin dependencia del mercado, sin ir sin él. El costo fiscal es sustancial y continuo. Los centros urbanos producen la máxima producción inmobiliaria. Las ciudades planificadas en torno al acceso universal atraen la migración y mejoran la infraestructura en todo el tablero."
 
 law_no_public_housing_modifier: "No Public Housing"
 law_no_public_housing_modifier_desc: "El estado no proporciona soporte de vivienda. El mercado urbano de viviendas es totalmente privado."
 
 law_housing_projects_modifier: "Proyectos de vivienda"
 law_housing_projects_modifier_desc: "Está en marcha la construcción básica de viviendas estatales. Los costos de bienestar son modestos, ya que el Estado subvenciona la vivienda."
 
 law_public_housing_program_modifier: "Public Housing Program"
 law_public_housing_program_modifier_desc: "Un amplio programa de vivienda pública está ampliando el suministro urbano de bienes raíces y mejorando la infraestructura urbana, a un costo considerable."
 
 law_universal_housing_modifier: "Vivienda universal"
 law_universal_housing_modifier_desc: "La vivienda es un derecho garantizado. Los costos de bienestar son altos, pero se mejora la infraestructura urbana, se atrae la migración y se maximiza la producción inmobiliaria."
 
 institution_central_bank: "Banco Central"
 institution_central_bank_desc: "Una autoridad monetaria estatal que gestiona el suministro de dinero, establece requisitos de reserva y controla las tasas de interés. Cada nivel de inversión restringe la política monetaria, limitando la producción de crédito comercial pero ampliando el límite máximo de la deuda nacional y aumentando la tasa de interés de referencia. El Banco Central es el mecanismo por el cual el Estado ejerce control directo sobre el sistema financiero."
 
 lawgroup_central_banking: "Banco Central"
 lawgroup_central_banking_desc: "El marco legal que rige el sistema monetario de id=0/año, de ninguna autoridad monetaria central a un control estatal completo de la oferta monetaria. La elección del marco bancario determina cómo se producen créditos y valores y qué puede pedir prestado el Estado."
 
 law_no_central_bank: "No Central Bank"
 law_no_central_bank_desc: "No hay autoridad monetaria central. Los bancos operan independientemente, estableciendo sus propias relaciones de reserva y políticas de préstamo. El suministro de dinero no está coordinado y el Estado no tiene ningún mecanismo para gestionar los tipos de interés o las condiciones de crédito. Este es un arreglo inestable que la mayoría de las economías modernas se han alejado."
 
 law_fractional_reserve_banking: "Banco de Reserva Fraccional"
 law_fractional_reserve_banking_desc: "Los bancos deben tener sólo una fracción de sus depósitos como reservas, prestando el resto a la economía. Esto amplía el suministro de dinero: los distritos financieros producen más valores a medida que el capital multiplicado fluye a través del sistema, pero la producción de crédito comercial está algo diluida por el apalancamiento. Este es el arreglo estándar para la mayoría de las economías modernas."
 
 law_full_reserve_banking: "Banca completa de reserva"
 law_full_reserve_banking_desc: "Los bancos deben mantener el 100% de los depósitos como reservas, sin préstamos fraccionados. La institución del Banco Central está disponible, permitiendo al Estado gestionar directamente la política monetaria. Cada nivel de inversión del Banco Central eleva la tasa de interés de referencia en 1% y aumenta el límite máximo de crédito en 5%. La producción de crédito de bancos comerciales es más estable. La producción de valores de los distritos financieros cae a medida que se elimina el apalancamiento del sistema."

 law_no_central_bank_modifier: "No Central Bank"
 law_no_central_bank_modifier_desc: "No existe ninguna autoridad monetaria central. El suministro de dinero no está gestionado."
 
 law_fractional_reserve_banking_modifier: "Banco de Reserva Fraccional"
 law_fractional_reserve_banking_modifier_desc: "Los préstamos de reserva fraccional están ampliando el suministro de dinero. La producción de valores aumenta; la producción de crédito comercial se reduce modestamente por el efecto de apalancamiento."
 
 law_full_reserve_banking_modifier: "Banca completa de reserva"
 law_full_reserve_banking_modifier_desc: "Los requisitos completos de reserva están en vigor. La producción de crédito es estable y superior. Se reduce la producción de valores. La institución del Banco Central está disponible para gestionar los tipos de interés y el límite máximo de la deuda nacional."
 
 institution_central_bank_modifier: "Banco Central"
 institution_central_bank_modifier_desc: "El Banco Central es activo y gestiona la política monetaria. Cada nivel de inversión restringe la oferta de crédito, aumenta la tasa de interés en 1%, y aumenta el límite máximo de crédito en 5%."
 
 country_max_credit_limit_mult: "Límite máximo de crédito"
 country_institution_cost_institution_central_bank_mult: "Costo del Banco Central"
 country_institution_central_bank_max_investment_add: "Banco Central Max Investment"
 country_institution_size_change_speed_institution_central_bank_mult: "Velocidad de expansión del Banco Central"
 building_group_bg_banking_throughput_add: "Banking Throughput"
 
 lawgroup_media_regulations: "Reglamento de medios de comunicación"
 lawgroup_media_regulations_desc: "El marco legal que rige el entorno de información de id=0/año, desde medios totalmente no regulados hasta infraestructuras de comunicaciones controladas por el Estado. Los marcos regulados suprimen la radicalización del movimiento político y aumentan la autoridad estatal, mientras que los entornos no regulados amplifican los movimientos y debilitan el control del gobierno sobre el espacio informativo."
 
 law_fully_unregulated_media: "Fully Unregulated"
 law_fully_unregulated_media_desc: "No hay regulación de los medios de comunicación ni del entorno de información. Los medios de comunicación, las plataformas en línea y las redes de comunicaciones funcionan sin supervisión gubernamental. La desinformación se extiende libremente. Los movimientos políticos prosperan en el ruido. El Estado no tiene ningún mecanismo para configurar o gestionar la información que consumen sus ciudadanos, y ninguna autoridad derivada de controlarla."
 
 law_digital_rights: "Derechos digitales"
 law_digital_rights_desc: "Las protecciones jurídicas básicas rigen el entorno de la información, las garantías de privacidad, las disposiciones contra la censura, las leyes sobre la libertad de información. Los ciudadanos tienen recursos legales contra ciertos abusos de los medios de comunicación, pero el espacio de información sigue siendo sustancialmente libre. Los movimientos políticos todavía encuentran terreno fértil. id=0/jero obtiene un beneficio modesto de reputación de ser un estado de respeto a los derechos."
 
 law_fairness_doctrine: "Fairness Doctrine"
 law_fairness_doctrine_desc: "Los medios de comunicación están legalmente obligados a presentar una cobertura equilibrada de las cuestiones políticas, dando tiempo y espacio a múltiples perspectivas en lugar de una sola plataforma. Las voces políticas más extremas pierden su megáfono. El reclutamiento de movimiento radical se amortigua. El Estado se posiciona como un árbitro justo en lugar de un participante en la guerra de información, y obtiene autoridad del papel."
 
 law_government_content_moderators: "Government Content Moderators"
 law_government_content_moderators_desc: "El estado modera activamente el contenido en línea — eliminando la desinformación, el material extremista y el contenido considerado dañino o desestabilizador. Los movimientos políticos pierden un alcance significativo ya que su material de reclutamiento más eficaz se suprime. La autoridad aumenta. La comunidad internacional y los críticos nacionales de la libertad de prensa notarán la política y el prestigio de id=0/año sufrirá en consecuencia."
 
 law_state_wifi: "State WiFi"
 law_state_wifi_desc: "El estado opera directamente la infraestructura de comunicaciones. El acceso a Internet es una utilidad pública, totalmente propiedad, operada y supervisada por el gobierno. El entorno de información es un recurso estatal: lo que los ciudadanos leen, observan y comparten pasa a través de la infraestructura Controles del gobierno de id=1/(es) La radicalización del movimiento político está casi completamente suprimida. El costo, financiero y de reputación, es sustancial."
 
 law_fully_unregulated_media_modifier: "Medios completamente no regulados"
 law_fully_unregulated_media_modifier_desc: "Un entorno de información ingobernado está amplificando los movimientos políticos y debilitando la autoridad estatal."
 
 law_digital_rights_modifier: "Marco de derechos digitales"
 law_digital_rights_modifier_desc: "Las protecciones legales básicas rigen el entorno de la información. Los movimientos políticos todavía prosperan pero id=0/año gana cierto prestigio de su posición de respeto a los derechos."
 
 law_fairness_doctrine_modifier: "Fairness Doctrine"
 law_fairness_doctrine_modifier_desc: "Los requisitos de cobertura de los medios de comunicación equilibrados están disminuyendo el reclutamiento de movimientos radicales y mejorando la legitimidad del Estado."
 
 law_government_content_moderators_modifier: "Moderación del contenido del gobierno"
 law_government_content_moderators_modifier_desc: "La moderación del contenido activo del estado suprime significativamente la radicalización del movimiento político, a costa de prestigio y legitimidad."
 
 law_state_wifi_modifier: "Comunicaciones controladas por el Estado"
 law_state_wifi_modifier_desc: "id=0/tio controla directamente la infraestructura de comunicaciones. La radicalización del movimiento político está casi totalmente suprimida. La autoridad es alta. La reputación internacional sufre."
 
 institution_courts: "Sistema judicial"
 institution_courts_desc: "A formal judiciary operating through established courts and legal procedure. Cada nivel de inversión amplía el alcance del sistema judicial: más jueces, más tribunales, una aplicación más coherente de la ley. Turmoil cae a medida que las disputas se resuelven a través de canales legales, la promulgación de leyes se vuelve más consistente, y los movimientos revolucionarios encuentran el aparato legal del estado más difícil de superar."
 
 lawgroup_judiciary: "Judicatura"
 lawgroup_judiciary_desc: "La filosofía legal subyacente en el sistema judicial de id=0/ título, cómo se resuelven las disputas, quién tiene autoridad legal y cuál es el propósito de la justicia. La elección del poder judicial da forma a la autoridad, legitimidad, posición diplomática y estabilidad del orden social."
 
 law_inquisitive_judiciary: "Inquisitivo"
 law_inquisitive_judiciary_desc: "El Estado investiga, juzga y juzga: el poder judicial es un brazo de autoridad gubernamental en lugar de una institución independiente. Los jueces son agentes de la corona o del gobierno, encargados de encontrar la verdad y hacer cumplir la ley en nombre del Estado. La autoridad es alta y la promulgación de la política gubernamental es más suave, pero el debido proceso es débil y la población lo sabe."
 
 law_customary_judiciary: "Customary"
 law_customary_judiciary_desc: "Las controversias se resuelven mediante normas comunitarias tradicionales, consejos tribales, arbitraje anciano y costumbres locales. No hay tribunales formales: la justicia es impartida por aquellos que la comunidad reconoce como sus autoridades, según normas que la comunidad reconoce como legítima. El Estado tiene un alcance limitado en este sistema. Las comunidades son estables, leales a sus tradiciones y resistentes a la perturbación externa."
 
 law_religious_judiciary: "Derecho religioso"
 law_religious_judiciary_desc: "Las Escrituras, la jurisprudencia religiosa y las interpretaciones de las autoridades clericales rigen los procedimientos judiciales. El devoto gana enorme poder político como árbitros de lo que la ley significa y cómo se aplica. La legitimidad religiosa es profunda entre los fieles. Aquellos fuera de la fe, o que la interpretan de manera diferente, pueden encontrar el sistema menos acogedor."
 
 law_restorative_judiciary: "Restaurativa"
 law_restorative_judiciary_desc: "El propósito de la justicia no es el castigo sino la restauración, la reparación del daño causado a las víctimas, la rehabilitación de los delincuentes y la reintegración en la sociedad. Los tribunales se centran en la mediación, la reconciliación y la curación comunitaria. Tormoil cae. La mortalidad por conflicto disminuye. Los loyalistas crecen. El estado renuncia a cierta autoridad a cambio de una población que confía en el sistema que vive bajo."
 
 law_adversarial_judiciary: "Adversarial"
 law_adversarial_judiciary_desc: "Acusación y defensa ante un juez o jurado independiente. La presunción de inocencia está protegida. La condición jurídica es igual independientemente de la posición social. El Estado está obligado por las mismas reglas que sus ciudadanos. El prestigio internacional de id=0/año aumenta significativamente. El poder judicial independiente limita la acción gubernamental, pero un gobierno que puede verse limitado por la ley es uno en el que la población puede confiar."
 
 law_inquisitive_judiciary_modifier: "Judicatura Inquisitiva"
 law_inquisitive_judiciary_modifier_desc: "El poder judicial actúa como un brazo de autoridad estatal. La acción de la política es más fácil y la turbulencia se suprime, pero el debido proceso es débil y el edificio de presión radical bajo la superficie es real."
 
 law_customary_judiciary_modifier: "Derecho consuetudinario"
 law_customary_judiciary_modifier_desc: "La justicia comunitaria tradicional proporciona profunda legitimidad y estabilidad social. La autoridad formal del estado es limitada pero la confianza de la población en el sistema es genuina."
 
 law_religious_judiciary_modifier: "Derecho religioso"
 law_religious_judiciary_modifier_desc: "La autoridad clerical rige la ley. El id=0/cero devout tiene un enorme poder político. La lealtad profunda entre los fieles y el creciente resentimiento entre los que están fuera de ella."
 
 law_restorative_judiciary_modifier: "Justicia restitutiva"
 law_restorative_judiciary_modifier_desc: "El sistema judicial se centra en la rehabilitación y la reconciliación. La caída de turba y mortalidad, los lealistas crecen y id=0/provee el respeto internacional por su enfoque humano."
 
 law_adversarial_judiciary_modifier: "Judicatura Adversaria"
 law_adversarial_judiciary_modifier_desc: "Un poder judicial independiente que opera en el debido proceso y en pie de igualdad ante la ley. La legitimidad y el prestigio son altos. La autoridad estatal es verificada, pero ese cheque es lo que hace que el sistema sea creíble."
 
 institution_courts_modifier: "Judicatura"
 institution_courts_modifier_desc: "Una red judicial establecida está reduciendo el desorden, mejorando la promulgación de leyes y suprimiendo el impulso revolucionario. Cada nivel adicional extiende el alcance de las cortes más allá de id=0/año."
 
 country_institution_cost_institution_courts_mult: "Costo del sistema judicial"
 country_institution_courts_max_investment_add: "Sistema judicial Max Investment"
 country_institution_size_change_speed_institution_courts_mult: "Velocidad de ampliación del sistema judicial"
 
 law_privatized_preschool_education:0 "Educación preescolar privatizada"
 law_privatized_preschool_education_desc:0 "La educación en la primera infancia se imparte mediante un mercado privado regulado. Los proveedores compiten por la inscripción, con el estado fijando estándares mínimos pero dejando la entrega a operadores independientes. El acceso depende en gran medida de los ingresos del hogar, aunque los subsidios pueden compensar parte de la carga para las familias de menor edad."

 law_universal_childcare:0 "Universal Childcare"
 law_universal_childcare_desc:0 "El Estado garantiza un cuidado de niños asequible para todas las familias, independientemente de sus ingresos. Las instalaciones financiadas por el público están disponibles en todo el país, liberando a los padres a participar en la fuerza de trabajo y garantizando que el desarrollo de la primera infancia no dependa de los medios de la familia."

 law_legal_protections:0 "Legal Protections"
 law_legal_protections_desc:0 "El Estado ha codificado la igualdad jurídica formal entre hombres y mujeres, incorporando protecciones contra la discriminación en el empleo, la propiedad y la vida pública. Los derechos anteriormente consuetudinarios o aplicados selectivamente están respaldados por la fuerza de la ley."

 law_structural_egalitarianism:0 "Egalitarismo estructural"
 law_structural_egalitarianism_desc:0 "El gobierno ha ido más allá de la igualdad jurídica para desmantelar activamente las estructuras institucionales que perpetúan la desigualdad de género. La representación en las oficinas públicas, las profesiones y las instituciones cívicas tiene el mandato, y el Estado desempeña un papel activo en la aplicación de resultados iguales en lugar de simplemente la igualdad de derechos."

 law_matriarchy:0 "Matriarquía"
 law_matriarchy_desc:0 "Las mujeres ocupan una posición dominante en la estructura política y social del país. Las mujeres constituirán la gran mayoría de los puestos de liderazgo."

 law_disability_cheques:0 "Problemas de discapacidad"
 law_disability_cheques_desc:0 "El Estado proporciona apoyo financiero regular a los ciudadanos incapaces de trabajar por discapacidad o enfermedad crónica. Los pagos se administran a través del aparato de seguridad social y tienen por objeto garantizar un nivel de vida mínimo para los que no trabajan."

 law_student_coverage:0 "Licencia por maternidad"
 law_student_coverage_desc:0 "Las mujeres reciben cobertura por embarazos."

 law_universal_basic_income:0 "Ingresos básicos universales"
 law_universal_basic_income_desc:0 "Todo ciudadano recibe un pago periódico incondicional del Estado, independientemente de su situación laboral o de sus medios. La política representa una repensa fundamental de la relación entre el trabajo, el bienestar y la participación económica, garantizando un mínimo bajo el cual nadie puede caer al mismo tiempo que aumenta las expectativas mínimas de todo trabajo."
 
 law_universal_college:0 "Universal College"
 law_universal_college_desc:0 "El Estado garantiza el acceso a la educación superior para todos los ciudadanos, independientemente de sus antecedentes o medios. Universidades y colegios son financiados públicamente y sus lugares abiertos al mérito en lugar de la riqueza, produciendo una fuerza laboral más educada y una ciudadanía más informada."

 education_laws.1.t:0 "¿Quién paga el título?"
 education_laws.1.d:0 "El compromiso con la universidad universal ha suscitado una pregunta inmediata y señalada de los conservadores fiscales: ¿quién pagará exactamente por ella? Financiar la educación superior para todos los ciudadanos que la buscan representa una expansión significativa del gasto público, y los opositores están haciendo sus objeciones en voz alta. El gobierno debe decidir si comprometerse con la financiación pública completa o introducir un modelo de prueba de medios que limite la carga."
 education_laws.1.f:0 "La cuestión de quién paga la educación siempre ha sido realmente una cuestión para quién es la educación."
 education_laws.1.a:0 "Comprometirse con la financiación pública completa: la educación superior es un bien público."
 education_laws.1.b:0 "Introducir subvenciones comprobadas por medios — financiar a los pobres, no a los ricos."

 education_laws.2.t:0 "La objeción de la Meritocracia"
 education_laws.2.d:0 "Los intereses débiles han encontrado su argumento preferido contra la universidad universal: estándares. Si todo el mundo puede asistir, advierten, entonces el grado se vuelve inútil — las instituciones de auténtica excelencia serán arrastradas hacia abajo para acomodar a los no preparados. El gobierno debe elegir entre defender el acceso universal en principio, o ofrecer un carveout que preserve las instituciones de élite junto al sistema público."
 education_laws.2.f:0 "Cada expansión del acceso se ha satisfecho con la misma advertencia sobre las normas. Los estándares siempre sobreviven."
 education_laws.2.a:0 "Defender el acceso universal — la excelencia no es la preservación de los ricos."
 education_laws.2.b:0 "Preserve elite institutions along universal access."

 education_laws.3.t:0 "Habla Intelligentsia"
 education_laws.3.d:0 "La comunidad académica ha entrado en el debate con convicción característica. La universidad universal, argumentan, no es simplemente un bien social sino una necesidad económica: una nación que limita la educación superior a aquellos que pueden pagarla es una nación que elige la ignorancia deliberada. El gobierno debe decidir si invitar formalmente su voz al argumento legislativo o mantener el debate en términos estrictamente políticos."
 education_laws.3.f:0 "La universidad siempre ha sido donde las sociedades deciden qué tipo de futuro quieren. Ahora debe decidir quién puede ayudar a construirlo."
 education_laws.3.a:0 "Invítales en el debate — que los académicos dirijan el argumento."
 education_laws.3.b:0 "Mantenerlo en una decisión política — los académicos aconsejan, no gobiernan."

 education_college_fiscal_resistance:0 "Resistencia fiscal"
 education_college_fiscal_resistance_desc:0 "Los conservadores fiscales se oponen activamente al costo público de la universidad universal, estancando el proceso de promulgación y obligando al gobierno a justificar sus compromisos de gastos."

 education_college_public_funded:0 "Compromiso financiado por el público"
 education_college_public_funded_desc:0 "El Gobierno se ha comprometido a absorber el costo total de la educación superior universal, fortaleciendo el impulso de la promulgación a un costo significativo."

 education_college_meritocracy_debate:0 "Debate sobre la Meritocracia"
 education_college_meritocracy_debate_desc:0 "El gobierno ha defendido públicamente el acceso universal contra las afirmaciones de que diluirá las normas académicas, cambiando las condiciones del debate sobre la promulgación."

 education_college_elite_carveout:0 "Elite Carveout Ofrecido"
 education_college_elite_carveout_desc:0 "Se ha ofrecido un carveout que preserva las instituciones privadas de élite junto con el sistema público, desacelerando la implementación pero reduciendo la oposición adinerada."

 education_college_academic_endorsement:0 "Academic Endorsement"
 education_college_academic_endorsement_desc:0 "La intelectualidad ha respaldado públicamente la universidad universal, ha prestado autoridad académica y ha organizado apoyo al esfuerzo de promulgación."

 education_college_elites_rebuked:0 "Elites Rebuked"
 education_college_elites_rebuked_desc:0 "Los intereses débiles han sido desafiados públicamente por sus argumentos de meritocracia, avergonzando su posición pero agudizando su determinación."

 education_college_elites_appeased:0 "Elites apaciguadas"
 education_college_elites_appeased_desc:0 "La oferta de un carveout institucional de élite ha suavizado la oposición rica a la universidad universal."

 education_college_intelligentsia_engaged:0 "Intelligentsia Engaged"
 education_college_intelligentsia_engaged_desc:0 "Los académicos e investigadores están preparando activamente el caso público de la educación superior universal, otorgando credibilidad intelectual al esfuerzo de promulgación."

 education_college_intelligentsia_sidelined:0 "Intelligentsia Sidelined"
 education_college_intelligentsia_sidelined_desc:0 "La decisión de mantener a los académicos fuera del debate legislativo ha dejado la intelectualidad frustrada y desenganchada de la agenda educativa del gobierno."
