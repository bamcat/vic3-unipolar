 law_trafficking_allowed_modifier: "Trata permitida"
 
 lawgroup_disability_rights: "Derechos de discapacidad"
 lawgroup_disability_rights_desc: "El marco jurídico que rige los derechos de los ciudadanos con discapacidad, desde el reconocimiento inmediato hasta el apoyo activo del Estado mediante el tratamiento, la infraestructura y la inclusión en el lugar de trabajo. Los marcos más amplios amplían la participación laboral, mejoran el nivel de vida y reducen la mortalidad, a un costo creciente para el Estado y los empleadores."

 law_minimal_recognition: "Reconocimiento mínimo"
 law_minimal_recognition_desc: "El Estado reconoce que existen ciudadanos discapacitados pero no les proporciona alojamiento, apoyo o protección jurídica. Las personas con discapacidad están excluidas en gran medida del empleo formal y la vida pública. El costo humano es importante; el costo fiscal es insignificante."
 
 law_workplace_accommodations: "Alojamientos en el lugar de trabajo"
 law_workplace_accommodations_desc: "Los empleadores tienen la obligación legal de realizar ajustes razonables para permitir que los trabajadores discapacitados participen en la fuerza de trabajo: equipo modificado, derechos ajustados, estaciones de trabajo accesibles. La política lleva a una población significativa al empleo productivo. Los empleadores soportan costos de ajuste, pero la fuerza de trabajo se expande."
 
 law_anti_ableist_architecture: "Arquitectura antiableista"
 law_anti_ableist_architecture_desc: "Los ciudadanos discapacitados deben acceder a edificios públicos, redes de transporte e infraestructura. Abrazaderas, ascensores, pavimentación táctil, señalización accesible — el entorno físico ya no debe excluir. La recuperación de la infraestructura existente es costosa. La población que puede participar plenamente en la sociedad se expande considerablemente."
 
 law_public_treatments: "Tratamientos públicos"
 law_public_treatments_desc: "El Estado financia tratamientos médicos, dispositivos de asistencia, prótesis, terapia y servicios de apoyo continuo para los ciudadanos discapacitados como cuestión de derecho y no de caridad. La mortalidad cae significativamente. El nivel de vida aumenta en toda la población. El costo del presupuesto público es sustancial y continuo, pero el argumento de que algunos ciudadanos tienen menos derecho al apoyo estatal que otros ha sido rechazado formalmente."
 
 law_minimal_recognition_modifier: "Reconocimiento mínimo de la discapacidad"
 law_minimal_recognition_modifier_desc: "Los ciudadanos discapacitados no reciben alojamiento del estado. La fuerza laboral efectiva se reduce y la mortalidad es superior a lo que podría ser."
 
 law_workplace_accommodations_modifier: "Alojamientos en el lugar de trabajo"
 law_workplace_accommodations_modifier_desc: "Los empleadores deben alojar a los trabajadores discapacitados. La fuerza de trabajo es más amplia e incluyente, a un costo modesto para aumentar la productividad."
 
 law_anti_ableist_architecture_modifier: "Infraestructura accesible"
 law_anti_ableist_architecture_modifier_desc: "Se ha hecho accesible la infraestructura pública. Los costos de construcción son mayores a medida que los edificios cumplen las normas de accesibilidad, pero la población que puede participar plenamente en la sociedad es significativamente mayor."
 
 law_public_treatments_modifier: "Tratamientos de discapacidad pública"
 law_public_treatments_modifier_desc: "El Estado financia el tratamiento y el apoyo a los ciudadanos discapacitados. Se reduce la mortalidad, se mejora el nivel de vida y el acceso a la educación es más amplio, a un costo público significativo y continuo."
 
 institution_environmental_protection: "Environmental Protection Agency"
 institution_environmental_protection_desc: "A government agency dedicated to monitoring and enforcing environmental standards. Cada nivel de inversión representa una capacidad de cumplimiento ampliada, regulaciones más estrictas y programas de conservación más amplios, reduciendo la generación de contaminación en todos los estados."
 
 lawgroup_environmental_regulations: "Environmental Regulations"
 lawgroup_environmental_regulations_desc: "El marco legal que rige la relación de id=0/año con el entorno natural, desde la explotación industrial no regulada hasta los derechos constitucionalmente garantizados de la naturaleza. Los marcos más progresivos reducen la contaminación, la menor mortalidad y protegen los ecosistemas, a un costo creciente para el rendimiento industrial y el gasto público."
 
 law_no_environmental_regulations: "No Reglamento"
 law_no_environmental_regulations_desc: "La industria funciona sin limitaciones ambientales. Las fábricas, minas y granjas pueden contaminar, extraer y explotar sin límites legales. La salida es máxima. El costo a largo plazo, en la mortalidad, la degradación de los ecosistemas y la salud pública, es sufragado por la población, no por los productores."
 
 law_game_law: "Ley del juego"
 law_game_law_desc: "La caza y la pesca se regulan para prevenir el colapso de las poblaciones de juego. Estaciones protegidas, caza con licencia y restricciones a los métodos de extracción más destructivos. Es un marco de conservación que sirve principalmente a los intereses de los lo suficientemente ricos para cazar recreativamente, pero establece el principio de que el Estado tiene interés en gestionar los recursos naturales."
 
 law_national_recycling: "Reciclaje nacional"
 law_national_recycling_desc: "Programa nacional de recogida y procesamiento de desechos reciclables. Los desechos industriales y domésticos se clasifican, recuperan y reutilizan cuando sea posible, reduciendo el volumen de material que entra en vertederos y vías fluviales. La eficiencia de los recursos mejora modestamente. La contaminación cae. El programa requiere coordinación entre municipios e industrias."
 
 law_protection_agency: "Organismo de Protección"
 law_protection_agency_desc: "Un organismo gubernamental dedicado con la autoridad para establecer, supervisar y aplicar normas ambientales en todos los sectores de la economía. Los límites de las emisiones, las restricciones del uso de la tierra, las reglamentaciones de los desechos industriales y las zonas naturales protegidas corresponden a su competencia. El organismo puede invertir en: cada nivel adicional de financiación amplía su capacidad de ejecución y reduce aún más la contaminación."
 
 law_guaranteed_rights_of_nature: "Derechos garantizados de la naturaleza"
 law_guaranteed_rights_of_nature_desc: "Los ríos, los bosques, los humedales y los ecosistemas gozan de una posición jurídica, el derecho a no ser destruidos, contaminados o explotados más allá de su capacidad de recuperación. El marco es la legislación ambiental más ambiciosa posible, derivada de las nuevas tradiciones jurídicas de los países que han comenzado a tratar la naturaleza como sujeto de derechos y no como objeto de propiedad. La actividad industrial se ve considerablemente limitada. La contaminación cae marcadamente. The Environmental Protection Agency operates at its highest possible effectiveness."
 
 law_no_environmental_regulations_modifier: "Industria no reglamentada"
 law_no_environmental_regulations_modifier_desc: "No hay limitaciones ambientales en la industria. El rendimiento ha aumentado, pero la contaminación y la mortalidad están aumentando como consecuencia."
 
 law_game_law_modifier: "Ley del juego"
 law_game_law_modifier_desc: "La caza regulada y la pesca han reducido marginalmente la degradación ambiental. Una intervención mínima pero real."
 
 law_national_recycling_modifier: "Programa Nacional de Reciclaje"
 law_national_recycling_modifier_desc: "Un programa nacional de reciclaje está reduciendo la generación de desechos y recuperando materiales, mejorando modestamente la contaminación y la eficiencia de la construcción."
 
 law_protection_agency_modifier: "Environmental Protection Agency"
 law_protection_agency_modifier_desc: "The Environmental Protection Agency is enforcing emissions limits and industrial standards. La contaminación está disminuyendo y la institución puede seguir invirtiendo para ampliar su alcance."
 
 law_guaranteed_rights_of_nature_modifier: "Derechos garantizados de la naturaleza"
 law_guaranteed_rights_of_nature_modifier_desc: "La naturaleza ha sido otorgada constitucionalidad. La industria enfrenta importantes limitaciones, pero la contaminación se reduce notablemente, la mortalidad disminuye y la seguridad alimentaria mejora a medida que se protegen los ecosistemas."
 
