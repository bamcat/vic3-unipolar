  # New Laws Any Group
 law_equal_rights:0 "Igualdad de derechos"
 law_equal_rights_desc:0 "Las mujeres pueden esperar experimentar el mismo nivel de derechos que sus homólogos masculinos."
 law_prison_slavery:0 "La esclavitud en prisión"
 law_prison_slavery_desc:0 "Los reclusos y los delincuentes se ven obligados a trabajar durante largas horas sin pagar durante su condena."
 law_restricted_police:0 "Policía restringida"
 law_restricted_police_desc:0 "The power presented by the police force has been restricted and is subject to strict regulations to ensure the safety of the citizens they are poised to protect."
 law_resettlement_enticement:0 "Reasentamiento"
 law_resettlement_enticement_desc:0 "El gobierno cuenta con programas para atraer a la gente a trasladarse a sus territorios."
 
 # Rights of Minorities Group
 
 lawgroup_rights_of_minorities:0 "Derechos de las Minorías"
 lawgroup_rights_of_minorities_desc:0 "The legal regulations and protections on minority populations."
 
 law_no_minority_rights:0 "No Minority Rights"
 law_no_minority_rights_desc:0 "Las minorías de todo tipo no reconocerán los mismos derechos que los de la población general."
 law_segregation:0 "Leyes de separación"
 law_segregation_desc:0 "Las minorías experimentarán grados de separación de la población general, con frecuencia obteniendo las sobras de chatarra."
 law_apartheid:0 "Leyes de apartheid"
 law_apartheid_desc:0 "Las minorías no experimentarán la misma sociedad de la población general, y a menudo serán removidas o trasladadas (a menudo con fuerza) a una "tierra" designada."
 law_unfulfilled_protections:0 "Protecciónes no cumplidas"
 law_unfulfilled_protections_desc:0 "El Estado se ha esforzado por eliminar los obstáculos a las minorías, pero las leyes que rigen los derechos de las minorías siguen siendo en gran medida inaplicables."
 law_limited_protections:0 "Protección limitada"
 law_limited_protections_desc:0 "Las minorías que tengan una etnia o nacionalidad diferente recibirán muchos de los mismos derechos que goza la población en general."
 law_encompassing_protections:0 "Protecciónes complementarias"
 law_encompassing_protections_desc:0 "Las minorías de diferente etnia o nacionalidad, y las personas con discapacidad recibirán todos los derechos y protecciones que goza la población en general."
 law_universal_protections:0 "Protección universal"
 law_universal_protections_desc:0 "Todas las minorías, independientemente de su origen étnico, nacionalidad, capacidad, sexualidad o identidad de género, recibirán los mismos derechos que goza la población en general."
 
 # Union Laws Group
 
 lawgroup_union_laws:0 "Union Laws"
 lawgroup_union_laws_desc:0 "La disposición del órgano rector hacia acciones sindicales como huelgas, abandonos, protestas, disturbios."
 law_unions_outlawed:0 "Unidad prohibida"
 law_unions_outlawed_desc:0 "Los sindicatos están prohibidos en esta nación &quot; los autores recibirán una resistencia rápida."
 law_useless_unions:0 "Burocracia inútil"
 law_useless_unions_desc:0 "Los sindicatos no son nada más que la burocracia obrera &quot; carece de las necesidades para funcionar &quot; lucha sin fuerzas externas."
 law_limited_action:0 "Limited Action"
 law_limited_action_desc:0 "Los sindicatos están fuertemente restringidos en lo que se les permite lograr y a menudo tienen que navegar lagunas legales para ser eficaces."
 law_craft_unions:0 "Sindicatos de Artesanía"
 law_craft_unions_desc:0 "Los sindicatos están restringidos a sus funciones específicas, y se les impide forjar alianzas con sindicatos de otras funciones."
 law_permitted_unions:0 "Medidas permitidas"
 law_permitted_unions_desc:0 "Los sindicatos no son legales ni ilegales, pueden funcionar como lo deseen pero no tienen poca o ninguna protección del órgano rector."
 law_enterprise_unions:0 "Empresas"
 law_enterprise_unions_desc:0 "Los sindicatos están allí para mejorar el desempeño de sus empleados &quot; se centran en las necesidades de sus miembros. Son eficaces para mejorar la vida de sus miembros mediante los medios necesarios."
 law_backed_unions:0 "Protecciónes respaldadas"
 law_backed_unions_desc:0 "Los sindicatos están efectivamente respaldados por el público y se ha cementado como parte de la cultura de los países. Tienen protección de la población y reciben protección jurídica para la acción de huelga."
 law_empowered_unions:0 "Empoderamiento de la Unión"
 law_empowered_unions_desc:0 "Los sindicatos están fuertemente reforzados por la policía &quot; tienen respaldo del gobierno. Estos sindicatos son capaces de conseguir sus demandas con eficacia, y están bajo cada circunstancia están protegidos &quot; animados."
 
 # Corporate Authority Group
 
 lawgroup_corporate_authority:0 "Corporate Authority"
 lawgroup_corporate_authority:0 "Las regulaciones legales hacia las corporaciones &quot; absurdamente ricas, incluyen regulaciones de su poder político &quot; que son capaces de ejercer."
 law_completely_unregulated:0 "Completamente no reglamentada"
 law_completely_unregulated_desc:0 "Las acciones de las corporaciones y las acciones de los absurdos ricos no se ven obstaculizadas de ninguna manera. A menudo, en detrimento de los trabajadores que viven allí."
 law_political_lobbying:0 "Lobby político"
 law_political_lobbying_desc:0 "Cualquiera con una cantidad suficiente de fondos puede presionar al gobierno &quot; presionándolos a cambiar las leyes a su favor."
 law_tax_haven:0 "Tax Haven"
 law_tax_haven_desc:0 "Las corporaciones y los individuos con riqueza absurda son considerados bienvenidos &quot; el órgano rector ha puesto en marcha leyes a favor de ellos con menos impuestos &quot; más tierras."
 law_feign_ignorance:0 "Feigned Ignorance"
 law_political_lobbying_desc:0 "El órgano rector opta por hacer lo menos posible para restringir el poder de las corporaciones y los absurdos ricos al elegir fingir que no es un problema."
 law_limited_restrictions:0 "Limitación limitada"
 law_limited_restrictions_desc:0 "Los activos de las corporaciones &quot; de los absurdos ricos son impuestos independientemente de si están en dinero o se mantienen en acciones de inversión &quot; ."
 law_progressive_restrictions:0 "Restricción progresiva"
 law_progressive_restrictions_desc:0 "Cualquier activo de los absurdamente ricos &quot; todas las ganancias de las sociedades realizadas o no se grava &quot; se utiliza para mejorar la población a un ritmo progresivo."
 law_no_one_individual:0 "No One Individual"
 law_no_one_individual_desc:0 "Los absurdos ricos están contemplados en el sistema tributario del órgano rector si eligen hacer negocios allí. Su riqueza generada mientras en el país se reduce &quot; se distribuye a la población necesitada."
 law_corporate_redistribution:0 "Corporate Redistributance"
 law_corporate_redistribution_desc:0 "Cualquier riqueza generada por los absurdos ricos, o las corporaciones se reduce a la cantidad máxima permitida. Esta riqueza se redistribuye según sea necesario. Las corporaciones se entregan al público &quot; consisten en una junta, incluidos los funcionarios electos"
 
 law_serfdom:0 "Derechos laborales incumplidos"
 law_serfdom_desc:0 "Tampoco existen derechos laborales establecidos, o los derechos laborales establecidos no se aplican por completo."
 law_serfdom_banned:0 "Protecciones mínimas"
 law_serfdom_banned_desc:0 "Se ha establecido el mínimo de protecciones."
 
 lawgroup_drug_regulations: "Reglamento sobre drogas"
 lawgroup_drug_regulations_desc: "The legal status of intoxicating substances — from total prohibition to full legalisation of trafficking. La política de drogas da forma a la mortalidad, la autoridad estatal, los costos de ejecución y el poder de los intereses agrícolas y criminales."

 law_total_prohibition: "Prohibición total"
 law_total_prohibition_desc: "Todas las sustancias intoxicantes, incluido el alcohol y el tabaco, están prohibidas por la ley. El Estado reclama la autoridad moral para regular lo que los ciudadanos ponen en sus cuerpos, respaldado por instituciones religiosas y conservadoras. Los mercados negros prosperan en la aplicación de las lagunas no pueden llenarse."

 law_alcohol_tobacco_legal: "Alcohol &quot; Tobacco Legal"
 law_alcohol_tobacco_legal_desc: "El alcohol y el tabaco son legales e impuestos. Todas las demás sustancias siguen prohibidas. Este es el marco jurídico de referencia para la mayoría de los estados modernos, un compromiso pragmático entre el interés económico y el conservadurismo moral."

 law_marijuana_decriminalization: "Marijuana Decriminalization"
 law_marijuana_decriminalization_desc: "La posesión personal y el consumo de cannabis ya no es un delito penal. El comercio sigue siendo ilegal, pero la aplicación se redirige hacia sustancias más difíciles. La política refleja un creciente consenso en el sentido de que el encarcelamiento no es una respuesta eficaz al uso recreativo de drogas."

 law_hard_drugs_decriminalized: "Despenalización de drogas duras"
 law_hard_drugs_decriminalized_desc: "La posesión de todas las sustancias controladas, incluidos los opiáceos, la cocaína y las anfetaminas, se considera una cuestión de salud pública en lugar de una cuestión delictiva. Se remite a los usuarios al tratamiento en lugar de al enjuiciamiento. La política es polémica pero las pruebas de los adoptadores tempranos sugieren que reduce la mortalidad por sobredosis y libera los recursos de ejecución."

 law_safe_injection_sites: "Sitios de inyección segura"
 law_safe_injection_sites_desc: "Las instalaciones financiadas por el Gobierno permiten a los usuarios consumir drogas bajo supervisión médica. El personal puede administrar medicamentos de inversión de sobredosis y conectar a los usuarios con programas de tratamiento. Las tasas de mortalidad disminuyen significativamente. La oposición religiosa y conservadora es feroz: se considera que la política es aceptar, e incluso permitir, el consumo de drogas."

 law_trafficking_allowed: "Trata permitida"
 law_trafficking_allowed_desc: "El comercio de sustancias controladas está totalmente legalizado y regulado por el Estado. Los beneficios económicos son inmediatos y sustanciales: las corrientes de ingresos de drogas hacia la economía formal y la base tributaria. Las consecuencias sociales y de reputación son graves. La mayoría del mundo considerará esto como una capitulación a las redes criminales."

 law_total_prohibition_modifier: "Prohibición total"
 law_alcohol_tobacco_legal_modifier: "Alcohol &quot; Tobacco Legal"
 law_marijuana_decriminalization_modifier: "Marijuana Decriminalization"
 law_hard_drugs_decriminalized_modifier: "Despenalización de drogas duras"
