 lgbtq_law_devout_empowered:0 "Devout Empowered"
 lgbtq_law_devout_empowered_desc:0 "The religious community has been formally brought into the legislative framing, strengthening their political position and deepening their engagement."

 lgbtq_law_devout_sidelined:0 "Devout Sidelined"
 lgbtq_law_devout_sidelined_desc:0 "El gobierno ha mantenido el encuadre religioso fuera de la justificación, dejando al devoto desenganchado y frustrado silenciosamente."

 lgbtq_law_conservatives_unconvinced:0 "Conservadores sin contacto"
 lgbtq_law_conservatives_unconvinced_desc:0 "La oposición conservadora ha escuchado la franqueza del gobierno y sigue sin estar convencida, manteniendo su resistencia a la reforma."

 lgbtq_law_conservatives_rebuked:0 "Conservadores reprendidos"
