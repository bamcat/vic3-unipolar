 lgbtq_law_conservatives_placated:0 "Conservadores colocados"
 lgbtq_law_conservatives_placated_desc:0 "Las exenciones religiosas han reducido la intensidad inmediata de la oposición conservadora sin resolver el desacuerdo subyacente."

 lgbtq_law_intelligentsia_engaged:0 "Intelligentsia Engaged"
 lgbtq_law_intelligentsia_engaged_desc:0 "Los reformadores y académicos legales están haciendo el caso público por los derechos LGBTQ, otorgando autoridad intelectual al esfuerzo de promulgación."

 lgbtq_law_intelligentsia_sidelined:0 "Intelligentsia Sidelined"
 lgbtq_law_intelligentsia_sidelined_desc:0 "El gobierno ha optado por mantener la reforma en términos legislativos y no filosóficos, dejando la intelectualidad sin un papel formal en el debate."

 abortion_law_moral_absolute:0 "Absoluto moral declarado"
 abortion_law_moral_absolute_desc:0 "The devout have successfully framed the abortion ban as a moral absolute, lending theological authority to the enactment effort."

 abortion_law_demographic_framing:0 "Marco demográfico adoptado"
 abortion_law_demographic_framing_desc:0 "El gobierno ha justificado la prohibición del aborto por motivos demográficos y políticos, manteniendo el lenguaje religioso fuera de la justificación oficial."

 abortion_law_exceptions_debate:0 "Excepciones Debate resuelto"
 abortion_law_exceptions_debate_desc:0 "El Gobierno ha adoptado una posición clara sobre la cuestión de las excepciones, que constituye una base firme para que continúe el proceso de promulgación."

 abortion_law_medical_exceptions:0 "Salvos médicos permitidos"
 abortion_law_medical_exceptions_desc:0 "Las excepciones médicas limitadas han sido escritas en la legislación, desacelerando el paso pero reduciendo la oposición de los moderados."

 abortion_law_autonomy_argument:0 "Bodily Autonomy Arguida"
 abortion_law_autonomy_argument_desc:0 "La intelectualidad ha hecho de la autonomía corporal la pieza central del caso para el aborto sin restricciones, generando un fuerte apoyo entre los IG reformistas."

 abortion_law_healthcare_framing:0 "Marco de atención de salud adoptado"
 abortion_law_healthcare_framing_desc:0 "El gobierno ha enmarcado el aborto irrestricto como un asunto de salud, ampliando su apelación evitando al mismo tiempo el debate filosófico más profundo."

 abortion_law_religious_opposition:0 "Oposición religiosa montada"
 abortion_law_religious_opposition_desc:0 "El devoto está estancando activamente la liberalización de la ley del aborto, creando una oposición organizada que está probando la resolución del gobierno."

 abortion_law_devout_empowered:0 "Devout Empowered"
 abortion_law_devout_empowered_desc:0 "La comunidad religiosa se ha situado en el centro de la justificación de la prohibición del aborto, fortaleciendo su posición política considerablemente."

 abortion_law_devout_sidelined:0 "Devout Sidelined"
 abortion_law_devout_sidelined_desc:0 "El gobierno ha mantenido la franqueza religiosa de la prohibición del aborto, dejando presente al devoto pero sin un papel formal en la justificación."

 abortion_law_devout_rebuked:0 "Devout Rebuked"
 abortion_law_devout_rebuked_desc:0 "El gobierno ha enfrentado directamente la oposición religiosa a la liberalización del aborto, debilitando la posición política del devoto pero radicalizando su base."

 abortion_law_devout_appeased:0 "Devout Appeased"
 abortion_law_devout_appeased_desc:0 "Las protecciones de conciencia para el personal médico han suavizado la oposición religiosa a la liberalización del aborto sin satisfacer las exigencias fundamentales del devoto."

 abortion_law_intelligentsia_engaged:0 "Intelligentsia Engaged"
 abortion_law_intelligentsia_engaged_desc:0 "Los académicos y reformadores jurídicos están preparando activamente el caso público de los derechos al aborto, otorgando credibilidad intelectual y moral al esfuerzo de promulgación."

 abortion_law_intelligentsia_sidelined:0 "Intelligentsia Sidelined"
 abortion_law_intelligentsia_sidelined_desc:0 "La decisión de enmarcar el acceso al aborto como asunto de salud ha mantenido la intelectualidad fuera del debate filosófico que querían liderar."
