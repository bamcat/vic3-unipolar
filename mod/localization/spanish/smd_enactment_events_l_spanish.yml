 lgbtq_law_religious_exemptions:0 "Exenciones religiosas ofrecidas"
 lgbtq_law_religious_exemptions_desc:0 "Se han ofrecido exenciones a las instituciones religiosas de realizar ceremonias del mismo sexo, desacelerando la aplicación pero suavizando la oposición conservadora."

