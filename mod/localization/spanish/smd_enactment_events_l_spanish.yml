 lgbtq_law_enforcement_scope:0 "Conjunto de medidas de aplicación"
 lgbtq_law_enforcement_scope_desc:0 "El gobierno se ha comprometido a aplicar activamente las restricciones, fortaleciendo el impulso legislativo de la ley."

 lgbtq_law_enforcement_cost:0 "Gastos de ejecución Absorbed"
 lgbtq_law_enforcement_cost_desc:0 "Se está financiando la plena aplicación de las restricciones, lo que supone una carga adicional para el gasto público."

 lgbtq_law_decrim_framing:0 "Decriminalization Framed"
 lgbtq_law_decrim_framing_desc:0 "El gobierno ha enmarcado cuidadosamente la despenalización como la eliminación del castigo en lugar de un aval, aliviando el camino a través del debate."

 lgbtq_law_quiet_passage:0 "Pasaje silencioso intento"
 lgbtq_law_quiet_passage_desc:0 "La decisión de evitar el debate público ha frenado el proceso de promulgación a medida que avanza la reforma sin un apoyo público organizado."

 lgbtq_law_liberty_argument:0 "Liberty Argument Made"
