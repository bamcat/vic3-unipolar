 objective_the_east: "Oriente"
 objective_the_east_desc: "El orden liberal occidental no es el único mundo posible. id=0/año tiene un modelo diferente: uno de dirección estatal, fuerza colectiva y desarrollo soberano. La tarea es demostrar que este modelo puede igualar a Occidente en el poder económico y el alcance global, y construir un mundo en el que se definen los términos del orden internacional."

