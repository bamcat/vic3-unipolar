 je_east_sphere_reason: "Concertar acuerdos de asistencia militar con al menos cuatro países. No puede desafiar el sistema de alianzas occidentales solo. La esfera oriental debe ser un colectivo genuino — estados que dependen de id=1/propiedad y en los que idx id=2/ título puede depender a cambio."

