 je_east_currency_reason: "El estado de la moneda de reserva de id=0 / dólar de propiedad es la ventaja estructural que ha permitido que Occidente golpee por encima de su peso durante décadas. Para emparejarlo requiere exportar más de 1.000 unidades de crédito a los mercados internacionales, y mantener los valores de valores de id=1/ títulos precio dentro del 25% de su valor base para que los inversores extranjeros los encuentren atractivos. Un sistema financiero oriental que otros utilizan voluntariamente no es sólo un logro económico. Es una declaración que el dólar no es la única opción."

