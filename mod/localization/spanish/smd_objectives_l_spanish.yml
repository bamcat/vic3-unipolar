 je_west_alliances: "Seguridad colectiva"
 je_west_alliances_reason: "OTAN. ANZUS. Las asociaciones de seguridad que definen el bloque occidental no son sólo arreglos militares, sino compromisos políticos. Concertar acuerdos de asistencia militar con al menos cuatro países. Cada asociación extiende id=0 / contacto y reduce el costo de mantenimiento del orden."
 
 je_west_human_rights: "The Institutional Foundation"
 je_west_human_rights_reason: "Sufragio universal. Protecciones de trabajadores. La abolición de la esclavitud. Discurso protegido. Estas no son adiciones opcionales al modelo occidental — son el modelo. Sin ellos, lo que id=0/año está defendiendo es sólo poder, no principio. Promulgar los cuatro para establecer la fundación institucional que requiere el orden liberal."
 
 je_west_education: "Educación para Todos"
 je_west_education_reason: "El modelo occidental depende de los ciudadanos que puedan leer, razonar y participar. Invertir en las escuelas hasta el nivel 5 y alcanzar una tasa nacional de alfabetización del 75%. No es suficiente para tener las leyes adecuadas — la población debe ser suficientemente educada para utilizarlas."
 
