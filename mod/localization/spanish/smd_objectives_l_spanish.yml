 sg_west_open_trade: "Estado de la reserva"
 sg_west_open_trade_desc: "El sistema financiero occidental funciona con el crédito id=0/año. Establecer id=1/ título como el exportador dominante del crédito —más de 1.000 unidades— que cemente el sistema financiero id=2/propios como columna vertebral de la economía global."
 
 sg_west_alliances: "Network of Alliances"
 sg_west_alliances_desc: "El orden occidental es un proyecto de seguridad colectiva. Establecer acuerdos de asistencia militar con por lo menos cuatro países, construyendo la red de alianzas que disuade la agresión y los proyectos."
 
 sg_west_human_rights: "Marco democrático"
 sg_west_human_rights_desc: "El Occidente se define no sólo por su riqueza sino por sus valores. Promulgar el sufragio universal, la protección de los trabajadores, la abolición de la esclavitud y el discurso protegido, los fundamentos institucionales de una sociedad democrática liberal. La orden id=0/año es construir debe valer la pena defender."
 
 sg_west_education: "Una ciudadanía educada"
 sg_west_education_desc: "La participación democrática y el dinamismo económico dependen por igual de una población educada. Invertir en el sistema escolar hasta el nivel 5 y alcanzar una tasa de alfabetización de al menos 75%. Una ciudadanía informada es la base más duradera que el orden liberal tiene."
 
 sg_west_gdp: "Economic Leadership"
 sg_west_gdp_desc: "El orden occidental está infrascrito por peso económico. id=0/año debe tener en cuenta por lo menos el 25% del PIB global, haciendo que el id=1/ la economía demasiado grande y demasiado central para el sistema global para cualquier rival a un desafío creíble."
 
 sg_west_endgame: "El Momento Unipolar"
 sg_west_endgame_desc: "El desafío final. Ambos id=0/año y <x id=1/ título deben ser llevados dentro del orden o incapaces de amenazarlo. Para cada uno: o democratizan, adoptan el sufragio universal, y firman un pacto defensivo con id=2/año, o su poder cae por debajo del rango de un poder mayor. No hay tercera opción que preserve el orden."
 
