 objective_the_west: "Occidente"
 objective_the_west_desc: "El orden internacional liberal —democracia, libre comercio, seguridad colectiva y derechos humanos— debe ser sostenido y ampliado. Se encuentra en el centro del sistema que lo construyó. La tarea no es simplemente mantener lo que existe, sino asegurar que cuando el siglo termina, los grandes poderes del mundo están dentro del orden o no pueden desafiarlo."
 
