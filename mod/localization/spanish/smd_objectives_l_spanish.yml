 objective_rising_powers: "Potencias crecientes"
 objective_rising_powers_desc: "El mundo no tiene que dividirse entre dos bloques. Se niega a elegir entre Washington y Moscú, entre el dólar y lo que viene después, entre un imperio y otro. El tercer camino es más difícil que cualquiera de las alternativas. Requiere un peso económico genuino, un poder militar creíble y la habilidad diplomática para mantener una coalición de estados que sólo tienen una cosa en común: también se niegan a elegir."

