 sg_east_state_industry: "Base Industrial Dirigida"
 sg_east_state_industry_desc: "El modelo oriental se basa en la capacidad del Estado para dirigir la inversión a la industria pesada. Mantener una economía intervencionista o de mando, crear capacidad de construcción a al menos 10, y desarrollar la minería de hierro al menos nivel 5 con fuerte ocupación. Esta es la base económica en la que todo lo demás depende."

 sg_east_great_power: "Gran estado de poder"
 sg_east_great_power_desc: "El desafío oriental a la hegemonía occidental sólo puede ser montado por un gran poder genuino. Alcanzar el rango de gran poder - no hay negociación con id=0 / título como igual a una posición de debilidad."

 sg_east_sphere: "El Bloc Oriental"
 sg_east_sphere_desc: "Construye la red de estados aliados que constituye la esfera de influencia de id=0/año. Establecer acuerdos de asistencia militar con al menos cuatro países. Las alianzas no son caridad, son la infraestructura de proyección de poder."

 sg_east_currency: "Moneda de la Reserva Oriental"
 sg_east_currency_desc: "El dominio del dólar es la ventaja más duradera de Occidente: permite a los Estados Unidos financiar su hegemonía a expensas de la economía global. Desafíalo. Exportar más de 1.000 unidades de crédito a mercados internacionales y mantener valores precio competitivo para atraer inversores extranjeros. Una moneda de reserva oriental no es sólo económica — es geopolítica."

 sg_east_endgame: "Un mundo multipolar"
 sg_east_endgame_desc: "El desafío final. Los Estados Unidos, Gran Bretaña y Francia —los tres pilares del orden occidental— deben ser neutralizados cada uno. Para cada uno: o su rango de poder cae por debajo de la de un poder mayor, o firman un pacto defensivo con id=0/año. Cuando se cumplen las tres condiciones, el orden mundial ha cambiado."

 je_east_state_industry: "The Industrial Foundation"
 je_east_state_industry_reason: "El Estado debe dirigir la inversión en la industria pesada, no dejarlo en los mercados. Mantener una economía intervencionista o de mando, crear capacidad de construcción a al menos 10, y desarrollar una capacidad de extracción de hierro sustancial al 75% de ocupación o mejor. Sin esta base industrial, no puede soportar el peso militar y económico que requiere el desafío oriental."

 je_east_great_power: "Levántate a Gran Poder"
 je_east_great_power_reason: "Alcanza el rango de gran poder. En la actualidad id=0/año puede estar entre las naciones más fuertes del mundo, pero el gran estado de poder es el reconocimiento formal de que idx id=1/año pertenece a la sala donde se toman decisiones sobre el orden global. Es el requisito para todo lo que sigue."

