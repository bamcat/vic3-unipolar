 je_east_endgame_reason: "El orden mundial cambia cuando sus guardianes ya no pueden protegerlo. Los tres deben ser resueltos: identificados id=0/ títulox id=1/ título• id=2/ título: debajo de rango de potencia mayor, o firmado un pacto defensivo con id=3/ títulox id=4/ título• Identificax id=5/conferencia: bajo rango de potencia mayor, o firmado un pacto defensivo con idux id=11 contacto Cuando las tres condiciones están satisfechas, id=12/año no ha sobrevivido simplemente al orden occidental. Lo ha reemplazado."

