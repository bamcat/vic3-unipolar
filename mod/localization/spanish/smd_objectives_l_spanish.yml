 je_west_gdp_reason: "Cuestiones de tamaño. id=0/año debe tener en cuenta por lo menos una cuarta parte de la producción económica mundial. En esa escala, el id=1/ la economía no es simplemente grande — es indispensable. El mundo negocia con id=2/año, prestatarios de idx id=3/ título, y no puede permitirse hacer un enemigo id=4/=4."
 
 je_west_endgame: "Fin de la Historia"
 je_west_endgame_reason: "La cuestión de la edad: ¿se puede neutralizar a ambos id=0/año y <x id=1/ título como rivales sistémicos al orden occidental? Para cada país, uno de los siguientes debe ser verdadero: Han adoptado una república democrática, sufragio universal, y firmaron un pacto defensivo con id=5/ títulox id=6/ título• Su rango de poder ha caído por debajo de la de una potencia principal: Cuando se cumplen ambas condiciones, el momento unipolar está completo."
 
