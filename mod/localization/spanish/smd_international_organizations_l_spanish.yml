 ### ORGANIZATIONS — Names & Descriptions
 ### ═══════════════════════════════════════

 ### United Nations
 io_un_name: "Naciones Unidas"
 io_un_abbreviation: "ONU"
 io_un_desc: "El id=0/conferencia es un id=1/conferencia creado para mantener la paz y la seguridad internacionales, desarrollar relaciones de amistad entre las naciones y promover el progreso social. A diferencia de otros id=2/ títulos, la ONU no proporciona directamente modificadores a sus miembros. Su influencia se ejerce mediante resoluciones diplomáticas, mandatos de mantenimiento de la paz e iniciativas mundiales."
 io_un_tooltip: "El id=0/año es un id=1 / título de las naciones del mundo. Haga clic para ver detalles."

 ### NATO
 io_nato_name: "North Atlantic Treaty Organization"
 io_nato_abbreviation: "OTAN"
 io_nato_desc: "El id=0/ título es un id=1/ título establecido en 1949, obligando a las naciones norteamericanas y europeas en defensa colectiva. Un ataque armado contra un miembro se considera un ataque contra todos. La OTAN coordina ejercicios militares conjuntos, estandariza equipos y mantiene estructuras de mando integradas."

 ### G7
 io_g7_name: "Grupo de los Siete"
 io_g7_abbreviation: "G7"
 io_g7_desc: "El id=0/conferencia es un id=1/conceptor que comprende las mayores economías avanzadas del mundo. Los miembros coordinan la política fiscal, la política monetaria y la gobernanza económica. Los miembros confieren una importante influencia diplomática y credibilidad financiera."

 ### OPEC
 io_opec_name: "Organization of the Petroleum Exporting Countries"
 io_opec_abbreviation: "OPEC"
 io_opec_desc: "El id=0/año es un id=1 / título de las principales naciones productoras de petróleo que coordina las políticas de petróleo entre los países miembros. La OPEP procura garantizar la estabilización de los mercados petroleros y el rendimiento justo de los países productores."

 ### EEC
 io_eec_name: "Comunidad Económica Europea"
 io_eec_abbreviation: "EEC"
 io_eec_desc: "El id=0/conferencia es un id=1/conferencia que establece un mercado común entre los Estados miembros europeos. Reduce las barreras comerciales, armoniza las regulaciones económicas y promueve la libre circulación de bienes, servicios, capital y mano de obra entre las naciones miembros."
 
 ### Arab League
 io_arab_league_name: "Liga Árabe"
 io_arab_league_abbreviation: "LAS"
 io_arab_league_desc: "El id=0 / título es un id=1 / título de naciones de habla árabe que promueve la cooperación política, económica, cultural y social entre sus miembros. La Liga coordina políticas sobre asuntos de interés común y media disputas entre los estados árabes."

 ### IMF
 io_imf_name: "Fondo Monetario Internacional"
 io_imf_abbreviation: "FMI"
 io_imf_desc: "El id=0/año es un id=1/propiedad que promueve la cooperación monetaria internacional, la estabilidad de los tipos de cambio y los arreglos de intercambio ordenado. Proporciona asistencia financiera y asesoramiento normativo a los países miembros que enfrentan dificultades de balanza de pagos."

 ### ESA
 io_esa_name: "European Space Agency"
 io_esa_abbreviation: "ESA"
 io_esa_desc: "El id=0/año es un id=1 / dedicado a la exploración y utilización del espacio exterior. Los Estados Miembros agrupan recursos para desarrollar vehículos de lanzamiento, satélites y misiones científicas que ningún país europeo pueda lograr por sí solo."

 ### ASEAN
 io_asean_name: "Association of Southeast Asian Nations"
 io_asean_abbreviation: "ASEAN"
 io_asean_desc: "El id=0/año es un id=1 / título de las naciones del sudeste asiático que promueven el crecimiento económico, el progreso social y el desarrollo cultural. La ASEAN facilita la estabilidad regional y proporciona un marco para el diálogo multilateral en la región de Asia y el Pacífico."

 ### WHO
 io_saarc_name: "South Asian Association for Regional Cooperation"
 io_saarc_desc: "El id=0/ &gt; &gt; es un id=1 / título entre las naciones del Asia meridional dirigidas a la cooperación regional, la coordinación del desarrollo y el diálogo multilateral."

 io_cis_name: "Comunidad de Estados Independientes"
 io_cis_desc: "El id=0/año es un id=1/% entre los estados post-soviéticos centrado en la consulta regional, la coordinación económica y la cooperación intergubernamental práctica."

 io_who_name: "World Health Organization"
 io_who_abbreviation: "OMS"
 io_who_desc: "El id=0/conferencia es un id=1/conferencia que dirige y coordina la política internacional de salud. Proporciona liderazgo en cuestiones de salud mundial, establece normas y normas, supervisa las tendencias de salud y coordina las respuestas a emergencias internacionales de salud."

 ### ═══════════════════════════════════════
 ### TREATIES — Names & Descriptions
 ### ═══════════════════════════════════════

 io_treaty_geneva_name: "Convenios de Ginebra"
 io_treaty_geneva_desc: "Una serie de tratados conocidos como los Convenios de Ginebra se encargan de establecer normas de derecho internacional para el tratamiento humanitario durante los conflictos armados. Los signatarios de la id=0/año acordaron proteger soldados heridos, prisioneros de guerra y civiles en tiempo de guerra."

 io_treaty_cwc_name: "Convención sobre las armas químicas"
 io_treaty_cwc_desc: "La Convención sobre las armas químicas es un id=0/año que prohíbe el desarrollo, producción, adquisición, almacenamiento, retención, transferencia y uso de armas químicas. Los signatarios convienen en destruir las existencias existentes bajo verificación internacional."

 io_treaty_npt_name: "Tratado sobre la no proliferación"
 io_treaty_npt_desc: "El Tratado sobre la No Proliferación de las Armas Nucleares es un tratado que tiene por objeto prevenir la propagación de las armas nucleares, promover el desarme y facilitar el uso pacífico de la energía nuclear bajo salvaguardias internacionales."

 io_treaty_bwc_name: "Convención sobre las armas biológicas"
 io_treaty_bwc_desc: "La Convención sobre las armas biológicas es un id=0/año que prohíbe el desarrollo, la producción y el almacenamiento de armas biológicas y toxínicas. Es el primer tratado multilateral de desarme que prohíbe toda una categoría de armas."

 io_treaty_cat_name: "Convención contra la Tortura"
 io_treaty_cat_desc: "La Convención contra la Tortura es un id=0/año que prohíbe todas las formas de tortura y tratos o penas crueles, inhumanos o degradantes. Los signatarios se comprometen a adoptar medidas eficaces para prevenir la tortura en su jurisdicción."

 ### ═══════════════════════════════════════
 ### NGOs — Names & Descriptions
 ### ═══════════════════════════════════════

 io_iaea_name: "Organismo Internacional de Energía Atómica"
 io_iaea_abbreviation: "OIEA"
 io_iaea_desc: "El OIEA promueve el uso pacífico de la energía nuclear y trabaja para prevenir su utilización con fines militares. Realiza inspecciones, presta asistencia técnica y establece normas internacionales de seguridad para las instalaciones nucleares."

 io_redcross_name: "International Red Cross"
 io_redcross_abbreviation: "CICR"
 io_redcross_desc: "La Cruz Roja Internacional presta asistencia humanitaria durante los conflictos armados y los desastres naturales. Supervisa el cumplimiento de los Convenios de Ginebra, visita a los prisioneros de guerra y facilita la comunicación entre familiares separados."

 io_amnesty_name: "Amnistía Internacional"
 io_amnesty_abbreviation: "AI"
 io_amnesty_desc: "Amnistía Internacional investiga y expone los abusos de los derechos humanos en todo el mundo. It campaigns for the release of political prisoners, the abolition of torture and the death penalty, and the protection of refugees and migrants."

