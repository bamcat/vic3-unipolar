 # imf_events.1 — Loan offer
 imf_events.1.t: "FMI Intervención"
 imf_events.1.d: "El tesorería de id=0/año está en crisis. La deuda ha alcanzado un nivel que hace que los mercados nerviosos y los acreedores cautelosos. El Fondo Monetario Internacional ha tomado nota y ha enviado una delegación para ofrecer financiación de emergencia. Los términos no son generosos. Los tipos de interés se establecerán en niveles de castigo. El país tendrá que adoptar el libre comercio, independientemente de su política económica actual. Y los grandes poderes que subescriben el fondo esperarán que se cumplan ciertas obligaciones. Pero la alternativa —acercándose a la bancarrota sin una red de seguridad— puede ser peor."
 imf_events.1.f: "La soberanía y la solvencia rara vez están disponibles al mismo tiempo."
 imf_events.1.a: "Aceptar el préstamo — necesitamos la financiación"
 imf_events.1.b: "Rechazar - gestionaremos nuestros propios asuntos"

 # imf_events.2 — Great power notification
 imf_events.2.t: "Préstamo del FMI extendido"
 imf_events.2.d: "id=0/año ha aceptado un paquete de préstamos del FMI. Como uno de los grandes poderes que subscriben el fondo, id=1/ título ahora tiene obligaciones de la nación deudora. El acuerdo tiene implicaciones estratégicas y financieras."
 imf_events.2.f: "La deuda es una forma de diplomacia."
 imf_events.2.a: "Bien, esto nos da ventaja"
 imf_events.2.b: "Desgraciadamente: los términos impuestos son demasiado duros"

 # imf_events.3 — Loan complete
 imf_events.3.t: "Programa del FMI"
 imf_events.3.d: "Cinco años después de aceptar un préstamo del FMI, id=0/año ha cumplido sus obligaciones programáticas. Los pagos de intereses se han hecho, las condiciones soportadas, y los grandes acreedores de poder satisfechos. El país emerge de la experiencia con su soberanía restaurada — y, una esperanza, con sus finanzas en mejor orden que cuando comenzó."
 imf_events.3.f: "El libro está equilibrado. Las lecciones son más difíciles de medir."
 imf_events.3.a: "Hemos pasado por eso."

 # imf_events.4 — Leaving
 imf_events.4.t: "Retirada del FMI"
 imf_events.4.d: "Se retira del Fondo Monetario Internacional. La decisión refleja la convicción de que los costos de afiliación —las condiciones, las obligaciones, la pérdida de soberanía económica durante una crisis— superan los beneficios del acceso a la financiación de emergencia. Los grandes poderes no estarán contentos. Y si se trata de una quiebra, no habrá red de seguridad."
 imf_events.4.f: "La independencia tiene un precio. También depende."
 imf_events.4.a: "Estamos solos, como deberíamos"

 # imf_events.5 — Great power notification of leaving
 imf_events.5.t: "Un país ha abandonado el FMI"
 imf_events.5.d: "Se ha retirado del Fondo Monetario Internacional. La decisión es una reprensión al orden financiero internacional — y señales que <x id=1/ título tiene la intención de trazar su propio curso económico, para mejor o peor."
 imf_events.5.f: "Un deudor menos. Una palanca menos."
 imf_events.5.a: "Notas"

 # imf_events.10 — War bonds
 imf_events.10.t: "Bonos de guerra"
 imf_events.10.d: "Con el tesoro tenso y la guerra en curso, el Ministerio de Finanzas ha propuesto una medida de emergencia: la emisión de bonos de guerra. Se invitaría a ciudadanos e inversores a prestar dinero al Estado a cambio de futuros pagos con interés, proporcionando una inyección inmediata de efectivo para financiar el esfuerzo de guerra. Los bonos funcionarán —pero son deuda y deuda en compuestos de tiempo de guerra rápidamente. El consumo de suministros aumentará a medida que el dinero fluya en la máquina militar."
 imf_events.10.f: "Una nación toma prestada contra su futuro para defender su presente."
 imf_events.10.a: "Emitir los bonos — necesitamos el dinero ahora"
 imf_events.10.b: "Decline — no hipotecaremos nuestro futuro"

 imf_loan_modifier: "Condiciones de préstamo del FMI"
 imf_loan_modifier_desc: "Un préstamo del FMI está en su lugar. Las tasas de interés son castigadamente altas y el libre comercio es obligatorio. La inversión extranjera está fluyendo, pero la soberanía económica está limitada y la legitimidad ha sufrido."

 imf_great_power_obligations: "Grandes obligaciones de poder"
 imf_great_power_obligations_desc: "Los grandes poderes que subscriben al FMI tienen obligaciones de este país como condición del préstamo. Su ventaja sobre la política económica es real."

 imf_refused_loan_modifier: "Fondo Monetario Internacional"
 imf_refused_loan_modifier_desc: "El país rechazó la asistencia del FMI y gestionará su deuda por sí solo. Las condiciones de crédito han empeorado como resultado."

 imf_post_loan_stability: "Recuperación posterior al programa"
 imf_post_loan_stability_desc: "El programa del FMI ha concluido. Habiendo cumplido sus obligaciones, el gobierno ha ganado una medida de credibilidad y las finanzas del país están en mejor orden."

 imf_left_modifier: "Fuera del FMI"
 imf_left_modifier_desc: "Este país se ha retirado del FMI. Está libre de obligaciones crediticias, pero está excluida de la financiación internacional de emergencia. Las corrientes de inversión se reducen."

 war_bonds_modifier: "Bonos de guerra emitidos"
 war_bonds_modifier_desc: "Se han emitido bonos de guerra de emergencia para financiar los esfuerzos de guerra. Los ingresos han aumentado, pero la deuda está creciendo y el consumo de suministros ha aumentado."

 war_bonds_refused_modifier: "Bonos de guerra declinados"
 war_bonds_refused_modifier_desc: "El gobierno se negó a emitir bonos de guerra. La disciplina fiscal se mantiene, pero el ejército siente la presión."

 un_events.6.t: "Nuestras fuerzas regresan de la Misión de la ONU"
 un_events.6.d: "Las fuerzas de id=0/año han completado su servicio en la misión de mantenimiento de la paz de las Naciones Unidas y regresan a casa. La contribución fue modesta en términos militares, pero significativa diplomáticamente — id=1/ título estaba presente cuando importaba. El general ha vuelto."
 un_events.6.a: "Bienvenido a casa"
 
 un_peacekeeping_contribution: "Contribución de las Naciones Unidas para el Mantenimiento de la Paz"
 un_peacekeeping_contribution_desc: "id=0/año contribuyó a una misión de mantenimiento de la paz de la ONU. La comunidad internacional ha tomado nota."
 
  # ── EVENT 300: RESOLUTION PASSED ─────────────────────────────────
 
 un_events.300.t: "Resolución aprobada por la ONU"
 un_events.300.d: "La Asamblea General ha acordado una resolución para abordar cuestiones mundiales y coordinar la cooperación mundial sobre un tema determinado"
 un_events.300.f: "La resolución conlleva el peso del consenso internacional, por lo que vale."
 un_events.300.a: "Notas"
 
 UN_RES_DESC_ENVIRONMENT: "id=0/Consejo Resolución sobre Protección Ambiental efectuadax id=1/ implicax id=2/ConsejoLos estados se comprometen a normas ambientales coordinadas y gestión sostenible de recursos. Todos los países reciben el modificador de la resolución ambiental de las Naciones Unidas correspondiente a 12 meses."
 UN_RES_DESC_PEACE: "La Asamblea General reafirma el compromiso con la solución pacífica de controversias y la reducción del conflicto interestatal.Seguido: id=3/ &lt; &gt; &gt; &gt; id=4/ indicax id=5/ &gt; id=6/ títulox id=7/ id=7/ &gt; Todos los países reciben el modificador de la resolución de paz de las Naciones Unidas correspondiente a 12 meses."
 UN_RES_DESC_ECONOMY: "id=0/Consejo Resolución sobre Desarrollo Económico realizadax id=1/ títulox id=2/ConsejoLos estados respaldan la inversión coordinada en las economías en desarrollo y la reducción de las barreras comerciales. Todos los países reciben el modificador de id=9/año de la Resolución de Desarrollo Económico de la ONU correspondiente a 12 meses."
 UN_RES_DESC_TECHNOLOGY: "La Asamblea General establece marcos para el intercambio de tecnología y la investigación científica cooperativa entre los Estados miembros.Seguido: id=3/ títulox id=4/ títulox id=5/ tercero = id=6/ título autorizadox id=7/ título Todos los países reciben el modificador de la tecnología de la ONU de id=9/año por 12 meses."
 
 # ── EVENT 301: RESOLUTION FAILED ─────────────────────────────────
 
 un_events.301.t: "UN Resolution Fails to Pass"
 un_events.301.d: "La moción ante la Asamblea General de las Naciones Unidas no ha conseguido la mayoría necesaria. La resolución ha sido derrotada y la sesión se suspendió sin resultado.Se aplicarán medidas no aplicadas. La delegación patrocinadora ha expresado su decepción. Otros no lo han hecho."
 un_events.301.f: "Las Naciones Unidas hacen lo que las Naciones Unidas hacen mejor."
 un_events.301.a: "Sin sorpresas"
 
 # ── EVENT 302: SANCTIONS (TARGET) ────────────────────────────────
 
 un_events.302.t: "id=0/ Sancionado por las Naciones Unidas"
 un_events.302.d: "El Consejo de Seguridad de las Naciones Unidas ha aprobado una resolución que impone sanciones económicas a id=0/año. La resolución fue apoyada por la mayoría requerida y tiene efecto inmediatamente. Ahora están en vigor las restricciones comerciales. El aislamiento diplomático se profundiza. Se espera que los Estados Miembros, aunque no se vean obligados, cumplan con el régimen de sanciones. Las sanciones seguirán vigentes durante cinco años a menos que el Consejo de Seguridad se reúna para examinarlas."
 un_events.302.f: "La soberanía no aísla a un país de la opinión del mundo."
 un_events.302.a: "Rechazamos esta resolución"
 
 # ── EVENT 303: CONDEMNATION (TARGET) ─────────────────────────────
 
 un_events.303.t: "id=0/ Condenadas por las Naciones Unidas"
 un_events.303.d: "La Asamblea General de las Naciones Unidas ha aprobado una resolución oficial en la que se condena id=0/año. La condena fue aprobada por mayoría de votos después del debate sobre el suelo. Una condena no conlleva un mecanismo obligatorio de aplicación, pero representa una declaración formal de desaprobación internacional y afectará a idx id=3/ &gt; que se encuentra en la comunidad diplomática durante años."
 un_events.303.f: "Las palabras no son armas. Pero deja marcas."
 un_events.303.a: "No seremos conferenciados"
 
 # ── EVENT 304: SANCTIONS/CONDEMNATION (OBSERVERS) ────────────────
 
 un_events.304.t: "UN Punitive Resolution Passed"
 un_events.304.d: "El Consejo de Seguridad de las Naciones Unidas ha aprobado una resolución en que se establecen sanciones contra otro país. Se enfrentarán a penas severas mientras el mundo coordina la tensión económica contra ellos."
 un_events.304.f: "La maquinaria de la censura internacional gira lentamente, pero gira."
 un_events.304.a: "Notas"
 
 UN_304_DESC_SANCTIONS: "El Consejo de Seguridad de las Naciones Unidas ha votado para imponer sanciones económicas a id=0/año. La resolución aprobada por el margen requerido. Se espera que los Estados Miembros cumplan las restricciones."
 UN_304_DESC_CONDEMNATION: "La Asamblea General de las Naciones Unidas ha condenado formalmente id=0/año por voto mayoritario. La resolución representa una declaración oficial de desaprobación internacional. Si bien una condena no lleva a cabo ninguna aplicación vinculante, coloca id=3/año conducta en el registro y afecta su posición internacional."
 
