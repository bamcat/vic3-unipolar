 ### ═══════════════════════════════════════
 ### GAME CONCEPTS
 ### ═══════════════════════════════════════

 concept_international_organization: "International Organization"
 concept_international_organization_desc: "International Organizations are institutions that operate across national borders to coordinate policy, promote trade, ensure collective security, or foster cultural exchange among their member nations. Vienen en varias formas: id=0/ títulos, id=1/ títulos, неx id=2/ títulos, неx id=3/ títulos, y неx id=4/ títulos."

 concept_intergovernmental_organization: "Organización Intergubernamental"
 concept_intergovernmental_organization_desc: "Una Organización Intergubernamental es un id=0/año cuyos miembros son naciones soberanas. A diferencia de id=1/ títulos, las organizaciones intergubernamentales requieren ser miembros formales y pueden proporcionar beneficios diplomáticos, económicos o militares significativos."

 concept_nongovernmental_organization: "Non-Governmental Organization"
 concept_nongovernmental_organization_desc: "Non-Governmental Organizations are independent institutions that operate internationally without being controlled by any government. Todas las naciones están afiliadas a ONG por defecto. Los gobiernos pueden optar por prohibir, tolerar o subvencionarlos, lo que afecta la opinión de la ONG y los beneficios que proporcionan."

 concept_international_treaty: "Tratado Internacional"
 concept_international_treaty_desc: "Un Tratado Internacional es un acuerdo vinculante formal entre naciones soberanas. A diferencia de los tratados id=0/ títulos, los tratados no requieren la afiliación organizativa en curso, una nación es o no signataria. Los signatarios reciben beneficios diplomáticos, mientras que el retiro daña las relaciones con otros signatarios."

