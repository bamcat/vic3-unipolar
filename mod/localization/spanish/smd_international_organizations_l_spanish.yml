 io_igos_tab_desc: "Las organizaciones internacionales son instituciones multilaterales que coordinan la política entre las naciones miembros. Haga clic en una organización para ver sus detalles, miembros y acciones disponibles."
 io_treaties_tab_desc: "Los tratados internacionales son acuerdos vinculantes entre naciones. Su país puede convertirse en signatario para obtener beneficios o retirarse al costo de la condición diplomática."
