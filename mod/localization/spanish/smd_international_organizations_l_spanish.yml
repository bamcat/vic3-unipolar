  ### ══════════════════════════════════════════
 ### AMNESTY INTERNATIONAL
 ### ══════════════════════════════════════════

 ngo_events.1.t: "Amnistía Internacional condena nuestras políticas"
 ngo_events.1.d: "Amnistía Internacional ha publicado un informe condenatorio sobre el historial de derechos humanos de nuestra nación, citando nuestras leyes actuales como una violación sistemática de las libertades fundamentales. La comunidad internacional ha tomado nota, y nuestro gobierno se enfrenta a una presión creciente para abordar estas preocupaciones."
 ngo_events.1.a: "Su crítica no cambia nada"
 ngo_events.1.b: "Revisaremos sus preocupaciones"

 ngo_events.2.t: "Amnistía Internacional valora la reforma"
 ngo_events.2.d: "Nuestras recientes reformas legislativas han sido reconocidas por Amnistía Internacional como un avance significativo para los derechos humanos. Su informe anual destaca nuestro progreso, potenciando la reputación internacional de nuestra nación."
 ngo_events.2.a: "Estamos orgullosos de nuestro progreso"

 ngo_events.3.t: "Informes de Amnistía sobre disturbios civiles"
 ngo_events.3.d: "Amnistía Internacional ha publicado un informe especial en el que se documenta el descontento civil generalizado de nuestra nación. Exhortan a nuestro gobierno a abordar las causas profundas del descontento mediante una reforma significativa en lugar de la represión."
 ngo_events.3.a: "Vamos a considerar reformas"
 ngo_events.3.b: "Nuestros asuntos internos no son su preocupación"

 ### ══════════════════════════════════════════
 ### RED CROSS
 ### ══════════════════════════════════════════

 ngo_events.10.t: "Cruz Roja ofrece ayuda humanitaria"
 ngo_events.10.d: "La Cruz Roja Internacional se ha ofrecido a desplegar trabajadores humanitarios para ayudar a los civiles afectados por el conflicto en curso. Sus equipos de ayuda están listos para proporcionar atención médica, refugio y alimentos a las poblaciones desplazadas en nuestras regiones devastadas por la guerra."
 ngo_events.10.a: "Acogemos con beneplácito su asistencia"
 ngo_events.10.b: "No podemos permitir a los trabajadores extranjeros en una zona de guerra"

 ngo_events.11.t: "Cruz Roja critica la conducta en tiempo de guerra"
 ngo_events.11.d: "La Cruz Roja Internacional ha emitido una declaración pública en la que expresa profunda preocupación por la conducta de nuestras fuerzas armadas. Los informes de extensas víctimas civiles y destrucción de infraestructura en las zonas de conflicto han señalado a la atención internacional. Instan a todas las partes a que respeten los Convenios de Ginebra."
 ngo_events.11.a: "Cooperaremos con sus investigadores"
 ngo_events.11.b: "Negamos estas alegaciones"

 ngo_events.12.t: "Cruz Roja ofrece alivio de crisis"
 ngo_events.12.d: "A pesar de la ausencia de guerra abierta, la Cruz Roja Internacional ha identificado una creciente crisis humanitaria dentro de nuestras fronteras. La perturbación civil generalizada y la perturbación económica han creado condiciones que requieren asistencia internacional. Ofrecen coordinar los esfuerzos de socorro para las poblaciones afectadas."
 ngo_events.12.a: "Aceptamos su ayuda"
 ngo_events.12.b: "Podemos manejar esto nosotros mismos."

 ### ══════════════════════════════════════════
 ### IAEA
 ### ══════════════════════════════════════════

 ngo_events.20.t: "OIEA solicita inspección nuclear"
 ngo_events.20.d: "El Organismo Internacional de Energía Atómica ha solicitado oficialmente el acceso a nuestras instalaciones nucleares para una inspección general de seguridad y cumplimiento. Como no signatario del Tratado sobre la no proliferación, nuestro programa nuclear ha atraído un mayor escrutinio internacional. El OIEA nos asegura que la inspección es rutinaria, pero la negativa enviaría una señal clara a la comunidad internacional."
 ngo_events.20.a: "Nuestras instalaciones están abiertas a la inspección"
 ngo_events.20.b: "Nuestro programa nuclear es un asunto soberano"

 ngo_events.21.t: "OIEA encomia el registro de seguridad nuclear"
 ngo_events.21.d: "Tras un examen de nuestro programa nuclear, el Organismo Internacional de Energía Atómica ha encomiado oficialmente nuestro compromiso con las normas de seguridad y el cumplimiento de la no proliferación. Nuestra adhesión al TNP y la cooperación con los inspectores internacionales han fortalecido nuestra posición en la comunidad nuclear mundial."
 ngo_events.21.a: "Seguimos comprometidos con la energía nuclear pacífica"

 ngo_events.22.t: "OIEA aumenta la preocupación por la proliferación"
 ngo_events.22.d: "El Organismo Internacional de Energía Atómica ha alarmado la dirección de nuestro programa nuclear. Sin ser miembros del TNP y con nuestra continua negativa a cooperar con los inspectores, el OIEA ha emitido una declaración oficial en la que expresa preocupación por el posible desarrollo de armas. La comunidad internacional observa de cerca."
 ngo_events.22.a: "Estamos abiertos al diálogo"
 ngo_events.22.b: "Afirmamos nuestro derecho soberano a la tecnología nuclear"

 ### ══════════════════════════════════════════
 ### MODIFIERS
 ### ══════════════════════════════════════════

 ngo_amnesty_scrutiny: "Under Amnesty Scrutiny"
 ngo_amnesty_scrutiny_desc: "Amnistía Internacional está vigilando estrechamente nuestro historial de derechos humanos tras las recientes críticas. La legitimidad gubernamental está bajo presión."

 ngo_amnesty_reform_pressure: "Presión de la reforma"
 ngo_amnesty_reform_pressure_desc: "El informe de Amnistía Internacional sobre disturbios civiles ha creado presión nacional e internacional para la reforma, pero ha ayudado a crear sentimientos revolucionarios."

 ngo_redcross_aid: "Red Cross Humanitarian Aid"
 ngo_redcross_aid_desc: "Red Cross workers are providing humanitarian assistance to civilians in conflict zones, reducing mortality and enhancing our international reputation."

 ngo_redcross_cooperation: "Cooperación de la Cruz Roja"
 ngo_redcross_cooperation_desc: "Nuestra cooperación con la Cruz Roja en relación con la conducta en tiempo de guerra ha mejorado nuestra posición internacional y ha reducido la infamia generada por nuestras acciones militares."

 ngo_redcross_relief: "Red Cross Crisis Relief"
 ngo_redcross_relief_desc: "La Cruz Roja está proporcionando socorro humanitario durante este período de crisis civil, ayudando a estabilizar a las poblaciones afectadas."

 ngo_iaea_inspectors: "Inspectores del OIEA"
 ngo_iaea_inspectors_desc: "Los inspectores del OIEA están operando dentro de nuestras instalaciones nucleares, compartiendo conocimientos técnicos y de seguridad. Su presencia acelera la transferencia de tecnología y aumenta nuestra reputación diplomática."
