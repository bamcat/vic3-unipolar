 # ── EVENTS ───────────────────────────────
 
 nuclear_events.1.t: "Enriquecimiento de uranio completo"
 nuclear_events.1.d: "id=0/año ha enriquecido con éxito el uranio a la pureza de grado de armas. El programa, realizado a lo largo de varios años en instalaciones construidas a tal efecto, ha alcanzado su objetivo técnico. El país posee ahora la capacidad científica e industrial para producir armas nucleares. Si proceder con la producción es una decisión separada, pero se ha cruzado el umbral. id=3/tio es un estado de detención nuclear."
 nuclear_events.1.f: "La parte dura está hecha."
 nuclear_events.1.a: "Comience a prepararse para la producción de ojivas"
 
 nuclear_events.2.t: "Servicios de Inteligencia: El Programa ha sido expuesto"
 nuclear_events.2.d: "Las agencias de inteligencia extranjeras, aprovechando imágenes satelitales, reportes de desertores e inteligencia de señales, han concluido con alta confianza que idx id=0/ título está operando un programa clandestino de armas nucleares. Los resultados están circulando entre los gobiernos aliados. El Consejo de Seguridad ha sido informado oficiosamente. id=3/ título puede negar, explicar o poseerlo. Cada camino tiene consecuencias."
 nuclear_events.2.f: "Nada permanece en secreto para siempre."
 nuclear_events.2.a: "Negación: las instalaciones son puramente infraestructuras de energía civil"
 nuclear_events.2.b: "El reconocimiento — id=0/ título se realiza con derecho a disuasión"
 
 nuclear_events.3.t: "Primera cabeza de guerra producida"
 nuclear_events.3.d: "id=0/año produjo su primera ojiva nuclear. El dispositivo está montado, probado y almacenado. La decisión de dónde implementarlo —y bajo qué doctrina— vendrá más adelante. Por ahora: <x id=3/año ha entrado en el club nuclear. El mundo es un lugar diferente al de esta mañana."
 nuclear_events.3.f: "Una ojiva es una especie de argumento. El tipo más consecuente."
 nuclear_events.3.a: "Se establece el disuasivo"
 
