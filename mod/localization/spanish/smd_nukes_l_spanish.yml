 nuclear_programme_acknowledged: "Programa reconocido"
 nuclear_programme_acknowledged_desc: "id=0/año ha reconocido su programa nuclear, reclamando el derecho a un disuasivo. Las relaciones con los principales poderes han sufrido considerablemente."
 
 nuclear_warhead_produced_modifier: "Nuclear Power"
