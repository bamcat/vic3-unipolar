 # ── ICBM ─────────────────────────────────
 
 je_icbm_programme: "ICBM Development Programme"
 je_icbm_programme_reason: "id=0/año ha logrado la capacidad nuclear. La siguiente frontera es la entrega: misiles balísticos intercontinentales capaces de alcanzar cualquier punto en el mundo sin advertencia. El programa es largo, años de investigación de cohetes, desarrollo de sistemas de orientación y pruebas de alcance, pero el pago estratégico es absoluto. Un Estado capaz de ICBM no puede ser disuadido por geografía."
 
 je_icbm_early_tt: "El programa de fomento de la confianza está en desarrollo temprano. Se están probando los sistemas de orientación. Será años antes de que exista un vehículo de entrega intercontinental viable."
