 # ── JOURNAL ENTRIES ───────────────────────
 
 je_uranium_enrichment: "Programa de Enriquecimiento de uranio"
 je_uranium_enrichment_reason: "id=0/año ha iniciado un programa de enriquecimiento de uranio. Los centrífugos están corriendo. Los científicos están trabajando. Y el mundo, si lo descubre, querrá respuestas. El programa avanza cada mes. Otras centrales nucleares aceleran el progreso. La guerra lo perturba. Al finalizar, id=3/año se utilizará la capacidad nuclear, la capacidad de producir material apto para armas."
 
