 nuclear_capable_modifier: "Nuclear Threshold State"
 nuclear_capable_modifier_desc: "id=0/año ha logrado la capacidad nuclear, la capacidad de producir material fisionable apto para armas. El prestigio y la posición diplomática se refuerzan. La producción de ojivas puede comenzar ahora."
 
 nuclear_programme_denied: "Programa denegado"
