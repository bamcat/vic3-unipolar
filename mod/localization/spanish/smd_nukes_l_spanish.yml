 nuclear_disarmament_desc: "Exigir que la nación objetivo desmantele por completo su programa de armas nucleares y entregue su arsenal existente. Si se aplica, se eliminarán todas las capacidades de enriquecimiento, las existencias de ojivas y las variables programáticas: el país debe comenzar desde cero."
 
 # ── EVENT ────────────────────────────────
 
 nuclear_events.10.t: "El programa se ha ido"
 nuclear_events.10.d: "Se han cumplido los términos de la paz. Los inspectores internacionales han entrado en las instalaciones id=0/año, desmantelaron las cascadas centrífugas, retiraron el arsenal y sellaron el silos. Años de trabajo científico, riesgo político e inversión nacional se han borrado en semanas. El programa no existe. El conocimiento sigue siendo, pero la infraestructura, el material y la posición legal para seguirlo se han ido.Seguido se puede iniciar de nuevo, si lo elige. Esa será una decisión diferente, tomada en diferentes circunstancias."
 nuclear_events.10.f: "Puede ser reconstruido. No será olvidado."
 nuclear_events.10.a: "Reconocer los términos"
 
