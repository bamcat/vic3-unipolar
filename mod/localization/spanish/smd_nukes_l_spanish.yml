 # ── EVENTS ───────────────────────────────
 
 nuclear_events.4.t: "¿Iniciar el ataque nuclear?"
 nuclear_events.4.d: "La solución de objetivos está bloqueada. id=0/(s) cabeza(s) de guerra(s) se han asignado a las víctimas civiles estimadas: id=1/(s) estado(s).Segúnx id=2/ título autorizadox id=3/(s) bajas civiles estimadas: Esta acción es irreversible. Las ojivas serán expulsadas. Los estados serán destruidos. El mundo sabrá quién hizo esto."
 nuclear_events.4.f: "No hay que devolverlo."
 nuclear_events.4.a: "id=0/confirme - lanzamiento de la huelga"
 nuclear_events.4.b: "Aborto"
 
 nuclear_events.5.t: "Ataque nuclear"
 nuclear_events.5.d: "id=0/año ha sido alcanzado por armas nucleares. Múltiples ojivas han detonado en el territorio id=3/año. Las ciudades están ardiendo. Las comunicaciones se han colapsado en las regiones afectadas. La escala de bajas aún no se conoce: las estimaciones tempranas sugieren que el número de muertos es catastrófico. The attack was carried out without warning. No hubo declaración. Sin ultimátum. No había nada."
 nuclear_events.5.f: "No queda nada que decir."
 nuclear_events.5.a: "Inicio de la respuesta de emergencia"
 
 
 # ── EVENT 6: IAEA REQUEST ─────────────────
 
 nuclear_events.6.t: "OIEA pide acceso a la inspección"
 nuclear_events.6.d: "El Organismo Internacional de Energía Atómica ha solicitado oficialmente el acceso a instalaciones nucleares id=0/año. La solicitud sigue los informes de inteligencia, que ahora se distribuyen ampliamente entre los Estados miembros, que sugieren la existencia de un programa de enriquecimiento de grado de armas. La posición del OIEA es inequívoca: <x id=3/año es signatario de los compromisos de no proliferación. La reducción del acceso a la inspección constituiría una violación importante. Permitirlo requeriría abrir las instalaciones a la vigilancia internacional, y casi sin duda terminar el programa de armas. Los inspectores están esperando una respuesta."
 nuclear_events.6.f: "Los inspectores son educados. La solicitud no lo es."
 nuclear_events.6.a: "Acceso de subvenciones: permitir al OIEA inspeccionar nuestras instalaciones"
 nuclear_events.6.b: "Rechazar — id=0/ título no se someterá a inspección extranjera"
 
 # ── EVENT 7: UN ULTIMATUM (via IAEA refusal) ──
 
 nuclear_events.7.t: "Consejo de Seguridad de las Naciones Unidas: Enriquecimiento de la cesación del fuego"
 nuclear_events.7.d: "El Consejo de Seguridad de las Naciones Unidas ha aprobado una resolución en la que se exige que se ponga fin inmediatamente a su programa de enriquecimiento de uranio y se someta a la verificación del OIEA. La votación no fue cercana. La resolución exige el cese total dentro de treinta días y amenaza las sanciones coordinadas si ierex id=3/propios se niega a cumplir. Esto no es una petición. Es un ultimátum."
 nuclear_events.7.f: "El Consejo de Seguridad ha hablado. Lo que hace ahora se define su lugar en el mundo."
 nuclear_events.7.a: "Comply - halt enrichment and submit to monitoring"
 nuclear_events.7.b: "Rechazar — id=0/ título continuará independientemente de las consecuencias"
 
 # ── EVENT 8: UN ULTIMATUM (via acknowledgement) ──
 
 nuclear_events.8.t: "Consejo de Seguridad de la ONU: Consecuencias de desarme o de cara"
 nuclear_events.8.d: "Habiendo reconocido su programa de armas nucleares, ierex id=0/año no ha dejado al Consejo de Seguridad con ninguna ambigüedad. Una resolución ha pasado exigiendo el cese inmediato de la actividad de enriquecimiento y el desmantelamiento de la infraestructura relacionada con las armas. La resolución fue aprobada en virtud del Capítulo VII, lo que significa que no se ha descartado la ejecución militar. id=3/año tiene treinta días para cumplir."
 nuclear_events.8.f: "La honestidad no fue recompensada. El ultimátum es igual."
 nuclear_events.8.a: "Cumplir el programa y someterlo a verificación"
 nuclear_events.8.b: "Rechazar — id=0/ título no se desarma bajo presión"
 
 # ── EVENT 9: GREAT POWER RESPONSE ─────────
 
 nuclear_events.9.t: "Respuesta al desafío nuclear de id=0/año"
 nuclear_events.9.d: "id=0/año ha rechazado el ultimátum del Consejo de Seguridad de las Naciones Unidas y sigue enriqueciendo uranio hacia la pureza de grado de armas. El régimen de sanciones está en su lugar.Se debe aclarar ahora la posición de id=1/ títulox id=2/ título indicadox id=3/ título. Un país en nuestra esfera estratégica está desarrollando armas nucleares en desafío del orden internacional que ayudamos a construir. La pregunta es cómo respondemos con fuerza."
 nuclear_events.9.f: "Se han intentado palabras. Este es el momento para decidir qué viene después."
 nuclear_events.9.a: "Intervene - lanzar un juego diplomático para forzar el desarme"
 nuclear_events.9.b: "Amenazarse — aclarar las consecuencias sin comprometer fuerzas"
 
 # ── MODIFIERS ────────────────────────────
 
 nuclear_iaea_cooperation: "Acuerdo de Cooperación del OIEA"
 nuclear_iaea_cooperation_desc: "id=0/año ha abierto sus instalaciones nucleares a la vigilancia del OIEA. A cambio de uso civil verificable, se ha ampliado el apoyo internacional a la infraestructura de energía nuclear."
 
 nuclear_iaea_defiance: "Acceso del OIEA"
 nuclear_iaea_defiance_desc: "id=0/año ha rechazado la inspección internacional de sus instalaciones nucleares. La posición diplomática se ha deteriorado significativamente."
 
 nuclear_un_compliance: "UN Disarmament Compliance"
 nuclear_un_compliance_desc: "id=0/año aceptó el ultimátum de la ONU y detuvo su programa nuclear. La decisión era políticamente costosa en casa."
 
 nuclear_un_sanctions: "UN Nuclear Sanctions"
 nuclear_un_sanctions_desc: "El Consejo de Seguridad de la ONU ha impuesto sanciones en respuesta a la negativa de id=0/año de detener su programa nuclear. El comercio está perturbado y el aislamiento diplomático se está profundizando."
 
