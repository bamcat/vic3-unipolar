 icbm_progress_bar_tt: "Progresos mensuales en el desarrollo de la ICBM"
 
 icbm_capable_modifier: "ICBM Capable"
 icbm_capable_modifier_desc: "id=0/año ha desarrollado misiles balísticos intercontinentales. Ahora las armas nucleares pueden ser dirigidas a cualquier estado del mundo, independientemente de su alcance."
 
 nuclear_events.11.t: "ICBM Programme Complete"
 nuclear_events.11.d: "id=0/año ha probado con éxito un misil balístico intercontinental. El dispositivo voló su gama completa, demostró la precisión de la orientación terminal dentro de parámetros aceptables, y se bajó en la zona designada. Las consecuencias estratégicas son inmediatas. La disuasión nuclear de id=3/tio ya no está limitada por la geografía. Cualquier estado en el planeta es ahora, en principio, un objetivo potencial. La comunidad internacional habrá tomado nota de la prueba. Siempre lo hace."
 nuclear_events.11.f: "No queda nada para estar fuera de rango."
 nuclear_events.11.a: "El disuasor ahora es verdaderamente global"
 
