 covid.1.t: "Un Coronavirus Novel"
 covid.1.d: "Se ha reportado un cúmulo de casos de neumonía inusual en idux id=0/consejo, id=1/Consejo. Análisis preliminar por las autoridades sanitarias de id=2/ título sugieren un coronavirus previamente desconocido, difundiendo humano-a-humano, con un período de incubación suficiente tiempo que los portadores son contagiosos antes de saber que están enfermos. Si esto sigue siendo un brote local o se convierte en algo más depende de las decisiones tomadas en las próximas semanas."
