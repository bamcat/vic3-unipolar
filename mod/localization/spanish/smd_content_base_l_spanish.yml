 # covid.8 — POVERTY AND EVICTIONS
 # ==========================================
 
 covid.8.t: "The Economic Toll of the Pandemic"
 covid.8.d: "La pandemia ha costado miles de trabajadores de id=0/ títulos, y en idx id=1/ título, el desempleo ha superado el 20%. Las familias no pueden pagar alquiler. Los señores de la tierra, respaldados por id=2/año, están presionando para el derecho a desalojar. La pobreza se concentra en las áreas ya más afectadas por el virus."
 covid.8.f: "Una pandemia dentro de la pandemia."
 covid.8.a: "Imposibilidad de una suspensión de alquiler y una moratoria de desalojo"
 covid.8.b: "Ampliar las prestaciones de seguridad social y desempleo"
 covid.8.c: "El mercado lo resolverá"
 
