 # covid.5 — RESPONSE CHOICE
 # ==========================================
 
 covid.5.t: "COVID-19 Response Policy"
 covid.5.d: "¿Cómo debe responder a la pandemia? La elección definirá el paisaje económico y social de los próximos años."
 covid.5.f: "No hay buenas opciones. Sólo oficios."
 covid.5.a: "Bloqueo completo — cerrar negocios, restringir el movimiento"
 covid.5.b: "Mandatos de máscaras y directrices de alejamiento social"
 covid.5.c: "Mantener la economía abierta — priorizar la recuperación"
 
 # ==========================================
 # covid.7 — WAR SUPPORT
 # ==========================================
 
 covid.7.t: "La pandemia socava el esfuerzo de guerra"
 covid.7.d: "Con la población de COVID-19 ravaging id=0/año, se cuestiona si un país que lucha contra una pandemia puede sostener una guerra simultáneamente. La población está agotada. Los hospitales de campo compiten con la logística de primera línea para los recursos."
 covid.7.f: "Lucha contra el virus o lucha contra el enemigo. Hacer ambos es duro."
 covid.7.a: "La guerra continúa: el virus no cambia eso"
 covid.7.b: "Usar mensajes de salud pública para mantener la moral"
 covid.7.c: "Suprimir la narrativa derrotista"
 
