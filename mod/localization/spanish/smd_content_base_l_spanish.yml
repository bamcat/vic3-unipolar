 je_rise_of_the_right:0 "El ascenso de la derecha"
 je_rise_of_the_right_reason:0 "En todo Occidente, los movimientos populistas de derecha están ganando fuerza a través de la fragmentación de los medios, el retroceso de la migración, la política de la cultura y el resentimiento anti-establecimiento. Hasta 2035, los movimientos de derecha son más fuertes y los líderes populistas de derecha son más propensos a emerger."

 rise_of_the_right_status_baseline:0 "Los movimientos de derecha están ganando fuerza."
 rise_of_the_right_status_strong:0 "Una oleada populista de derecha está remodelando la política nacional."
 rise_of_the_right_completion_header:0 "Esta onda se reduce después de 2035."
 rise_of_the_right_ends_2035_tt:0 "El Levántate de la derecha termina después de id=0/año Enero 1, 2035 se hizo id=1/año."
 rise_of_the_right_spawnrate_tt:0 "El líder populista de derecha se incrementa. Las pesas exactas desgastadas se manejan manualmente en los archivos desgastados de la ideología/caracter."

 rise_of_the_right.1.t:0 "El ascenso de la derecha"
 rise_of_the_right.1.d:0 "Una nueva corriente populista de derecha ha entrado en la política nacional. Aprovecha la fuerza de la desconfianza de las instituciones, el enojo de las élites, el retroceso cultural y un ambiente mediático fragmentado."
 rise_of_the_right.1.f:0 "Los viejos partidos todavía mantienen las oficinas. La nueva política está aprendiendo a mantener a la multitud."
 rise_of_the_right.1.a:0 "El centro político ya no es seguro."

 rise_of_the_right.10.t:0 "Algoritmic Anger"
 rise_of_the_right.10.d:0 "Las redes políticas en línea han amplificado la indignación contra el restablecimiento, dando a los movimientos populistas de derecha nuevas formas de organizar fuera de los partidos tradicionales."
 rise_of_the_right.10.f:0 "Un alimento se convierte en un mitin. Una queja se convierte en una plataforma."
 rise_of_the_right.10.a:0 "La indignación se propaga."
 rise_of_the_right.10.b:0 "Retrocedan las instituciones cívicas."

 rise_of_the_right.11.t:0 "Migration Backlash"
 rise_of_the_right.11.d:0 "Una oleada de ira sobre inmigración, integración e identidad nacional ha fortalecido los movimientos de derecha."
 rise_of_the_right.11.f:0 "La frontera se convierte en un símbolo por cada miedo que el viejo orden no puede responder."
 rise_of_the_right.11.a:0 "La reacción crece."
 rise_of_the_right.11.b:0 "Descalar el debate."

 rise_of_the_right.12.t:0 "Los populistas atraviesan"
 rise_of_the_right.12.d:0 "Una facción populista de derecha ha roto a través del sistema del viejo partido, obligando a las partes principales a responder a su idioma y agenda."
 rise_of_the_right.12.f:0 "Estaban una vez fuera de la habitación. Ahora la habitación está construida alrededor de ellos."
 rise_of_the_right.12.a:0 "Las oleadas derechas."
 rise_of_the_right.12.b:0 "Reconstruye el centro."

 rise_of_the_right.13.t:0 "Street Politics"
 rise_of_the_right.13.d:0 "Las manifestaciones, las contra-demonstraciones y los enfrentamientos virales han profundizado el sentido de que la política ha salido del parlamento y a las calles."
 rise_of_the_right.13.f:0 "El canto es política en su forma larval."
 rise_of_the_right.13.a:0 "Las calles se radicalizan."
 rise_of_the_right.13.b:0 "Enfriar la temperatura."

 rise_of_the_right_baseline:0 "El ascenso de la derecha"
 rise_of_the_right_baseline_desc:0 "Los movimientos de derecha están ganando fuerza en la política nacional."

 rise_of_the_right_populist_surge:0 "Surge Populista derechista"
 rise_of_the_right_populist_surge_desc:0 "Los populistas de derecha están remodelando el paisaje político."

 rise_of_the_right_migration_backlash:0 "Migration Backlash"
 rise_of_the_right_migration_backlash_desc:0 "La inmigración y la identidad nacional se han convertido en motores centrales de la movilización política."

 rise_of_the_right_online_radicalization:0 "Algoritmic Anger"
 rise_of_the_right_online_radicalization_desc:0 "La indignación en línea está acelerando la movilización política de derecha."

 rise_of_the_right_establishment_response:0 "Respuesta del establecimiento"
 rise_of_the_right_establishment_response_desc:0 "Las instituciones principales están tratando de absorber o desactivar la oleada populista."

