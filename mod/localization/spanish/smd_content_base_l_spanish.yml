 great_polarization.130.t:0 "¿Líder Blue America?"
 great_polarization.130.d:0 "Con los Estados Unidos fracturados, el carácter liberal o central de la administración lo sitúa más cerca de Blue America. Usted puede continuar la guerra como América Azul o permanecer con los restos de los Estados Unidos."
 great_polarization.130.f:0 "Un gobierno puede reclamar continuidad, pero el poder sigue a las instituciones que aún obedecen."
 great_polarization.130.a:0 "Cambia a Blue America."
 great_polarization.130.b:0 "Quedarse como Estados Unidos."

 great_polarization.131.t:0 "¿Llevar América Roja?"
 great_polarization.131.d:0 "Con los Estados Unidos fracturados, el personaje de derecha de la administración lo sitúa más cerca de América Roja. Usted puede continuar la guerra como América Roja o permanecer con los restos de los Estados Unidos."
 great_polarization.131.f:0 "La bandera es la misma forma, pero el país debajo ha cambiado."
 great_polarization.131.a:0 "Cambia a Red America."
 great_polarization.131.b:0 "Quedarse como Estados Unidos."

