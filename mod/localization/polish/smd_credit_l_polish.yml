l_polish:

 # ==========================================
 # THE DOLLAR 
 # ==========================================

 je_the_dollar:0 "Dolar"
 je_the_dollar_reason:0 "Dolar amerykański jest walutą rezerwową. [ROOT.GetCountry.GetName] eksportuje więcej kredytów niż jakikolwiek inny kraj - i tym samym posiada pozycję o nadzwyczajnej sile finansowej. \n \n Jeżeli okręgi finansowe innych krajów wymagają kredytu, aby utrzymać swoją działalność, oczekują one [ROOT.GetCountry.GetAdjective] banków, aby ją dostarczyć. Dopóki dolar płynie, kapitaliści tych krajów mogą budować, inwestować i osiągać zyski. Jeżeli [ROOT.GetCountry.GetName] zdecyduje się ograniczyć ten przepływ - poprzez sankcje, embargo lub celowe zmniejszenie - konsekwencje dla zagranicznych rynków finansowych byłyby natychmiastowe i ciężkie. \n \n @information! Eksportowanie kredytu to nie tylko handel. Jest to wykonywanie suwerenności monetarnej nad krajami, które zaczęły zależeć od [ROOT.GetCountry.GetAdjective] infrastruktury finansowej. Ich dzielnice finansowe wymagają kredytu. Jeśli cena kredytu wzrośnie powyżej ceny papierów wartościowych, ich inwestorzy zaczynają tracić pieniądze. Jeśli kredyt całkowicie przestanie płynąć, ich banki muszą się zakodować, aby wyprodukować wystarczająco dużo na rynku krajowym - proces, który wymaga czasu, który może nie mieć."

 je_dollar_status_hegemonic_tt:0 "#bold Dolar jest hegemoniczny. #! [ROOT.GetCountry.GetName] eksportuje więcej niż #v 20 000 #! jednostek kredytowych. Zagraniczne rynki finansowe są głęboko zintegrowane z infrastrukturą bankową [ROOT.GetCountry.GetAdjective]. Ta dźwignia jest znaczna."
 je_dollar_status_stronger_tt:0 "#bold Dolar jest potężny. #! [ROOT.GetCountry.GetName] eksportuje więcej niż #v 10 000 #! jednostek kredytowych. Zagraniczne rynki finansowe są głęboko zintegrowane z infrastrukturą bankową [ROOT.GetCountry.GetAdjective]. Ta dźwignia jest znaczna."
 je_dollar_status_strong_tt:0 "#bold Dolar jest wpływowy. #! [ROOT.GetCountry.GetName] eksportuje więcej niż #v 5000 #! jednostek kredytowych. Zagraniczne rynki finansowe są głęboko zintegrowane z infrastrukturą bankową [ROOT.GetCountry.GetAdjective]. Ta dźwignia jest znaczna."
 je_dollar_status_moderate_tt:0 "#bold Dolar jest dobrze ustalony. #! [ROOT.GetCountry.GetName] eksportuje więcej niż #v 2500 #! jednostek kredytowych. Zagraniczne uzależnienie od [ROOT.GetCountry.GetAdjective] kredyt jest rzeczywisty i rośnie."
 je_dollar_status_marginal_tt:0 "#bold Wychodzi dolar. #! [ROOT.GetCountry.GetName] eksportuje kredyty międzynarodowe. Rola dolara jako waluty rezerwowej jest na wczesnym etapie - ale fundamenty są ustanawiane."

 # ==========================================
 # THE RESERVE CURRENCY
 # ==========================================

 je_reserve_currency:0 "Rezerwa walutowa"
 je_reserve_currency_reason:0 "[ROOT.GetCountry.GetName] kredyty eksportowe na arenie międzynarodowej - co sprawia, że [ROOT.GetCountry.GetAdjective] sektor bankowy jest znaczącym graczem w światowym systemie finansowym. W przypadku gdy okręgi finansowe innych krajów wymagają kredytu na utrzymanie swojej działalności, pochodzą one z [ROOT.GetCountry.GetAdjective] banków. Stwarza to formę dźwigni strukturalnej: kraje, które importują kredyty z [ROOT.GetCountry.GetName] stają się w pewnym stopniu zależne od stałego przepływu tych kredytów dla zdrowia ich sektorów finansowych. \n \n @information! Okręgi finansowe w krajach przywozu wymagają kredytu, aby działać skutecznie. Gdy cena kredytów wzrasta powyżej ceny papierów wartościowych, ich inwestorzy tracą pieniądze na budowę i rozwój. Nagłe ograniczenie kredytów - poprzez sankcje lub embargo - zmusiłoby te kraje do produkcji kredytów na szczeblu krajowym, wolniejszego i droższego procesu."

 je_reserve_status_strong_tt:0 "#bold [ROOT.GetCountry.GetAdjective] kredyt jest szeroko handlowany. #! Eksport przekracza #v 5000 #! jednostki. Zagraniczne rynki finansowe rozwinęły znaczne uzależnienie od dostaw bankowych [ROOT.GetCountry.GetAdjective]."
 je_reserve_status_moderate_tt:0 "#bold [ROOT.GetCountry.GetAdjective] kredyt jest aktywny na arenie międzynarodowej. #! Eksport przekracza #v 2500 #! jednostki. Znaczna część zagranicznej działalności finansowej zależy od [ROOT.GetCountry.GetAdjective] dostawy."
 je_reserve_status_marginal_tt:0 "#bold [ROOT.GetCountry.GetAdjective] Kredyt wchodzi na rynki międzynarodowe. Rola jest skromna, ale rośnie."

 # ==========================================
 # THE FINANCIAL SYSTEM — je_financial_system
 # ==========================================

 je_financial_system:0 "System finansowy"
 je_financial_system_reason:0 "Ten wpis dziennika jest całkowicie opcjonalny - nie trzeba angażować się w system kredytów i papierów wartościowych, aby grać w grę. Jest tutaj jako odniesienie dla tych, którzy chcą to zrozumieć. \n \n #bold Jak działa system #! \n \n Banki komercyjne produkują #bold kredyty #!. Kredyt na zakup części finansowych oraz, zgodnie z metodą produkcji w obrocie publicznym, sprzedaż #bold papiery wartościowe #!. Papiery wartościowe dają inwestorom dodatkowy zysk przy reinwestowaniu w nową budowę - ale tylko wtedy, gdy cena papierów wartościowych jest wyższa niż cena kredytu. Oznacza to istnienie naturalnej równowagi na rynku: \n \n • Kiedy #bold kredyt jest tani #! w stosunku do papierów wartościowych, zyski okręgów finansowych i inwestorów budować bardziej agresywnie. Budowa przyspiesza w całej gospodarce. \n \n Gdy #bold papiery wartościowe są tanie #! w stosunku do kredytu, okręgi finansowe tracą pieniądze nabywając kredyt nie mogą z zyskiem przekonwertować. Banki uważają swój produkt za mniej wartościowy. \n \n @information! Stosunek cen między kredytem a papierami wartościowymi jest zatem kluczowym sygnałem do obserwowania. Zdrowy spread - papiery wartościowe powyżej kredytu - oznacza, że sektor finansowy funkcjonuje zgodnie z planem, a kapitaliści otrzymują zwrot z inwestycji budowlanych. \n \n @warning! Jeśli kredyty wzrosną powyżej papierów wartościowych, twoje okręgi finansowe będą działać ze stratą na każdej jednostce, którą przetwarzają. Banki stają się rentowne, ale inwestorzy spowalniają swoją działalność, a gospodarka rośnie mniej dynamicznie. \n \n #bold Bank Centralny #! \n \n Można użyć #bold Bank Centralny #! do bezpośredniego wpływu na produkcję papierów wartościowych. Inwestowanie w Bank Centralny zwiększa podaż papierów wartościowych na rynku - co obniża ich cenę w stosunku do kredytu. To będzie #bold podcinać swoje banki komercyjne #!, którzy uważają, że ich kredyt mniej opłacalny do produkcji, ale będzie #bold rozszerzenie inwestycji przemysłowych #! poprzez utrzymanie rozpiętości kredytów papierów wartościowych korzystnych dla kapitalistów. \n \n Jest to celowa wymiana handlowa: Inwestycje Banku Centralnego sprzyjają wzrostowi przemysłowemu kosztem rentowności bankowej. To, czy warto dokonać tego handlu zależy od strategii gospodarczej."

 je_financial_credit_expensive_tt:0 "#bold Kredyt jest przedmiotem obrotu powyżej ceny bazowej. #! Banki komercyjne są rentowne. Okręgi finansowe płacą premię za kredyt, co powoduje zmniejszenie marży na produkcję papierów wartościowych. Inwestorzy mogą spowolnić swoją działalność budowlaną, jeżeli rozprzestrzenianie się stanie się niekorzystne."
 je_financial_securities_expensive_tt:0 "#bold Securities are trading over their base price. #! Okręgi finansowe są rentowne - przekształcają kredyty na papiery wartościowe na zdrowej marży. Inwestorzy otrzymują dobre wyniki z budowy. Banki stoją w obliczu skromnej presji, ponieważ ich produkt jest wyceniony poniżej towarów, które karmią."
 je_financial_balanced_tt:0 "Kredyty i papiery wartościowe znajdują się w pobliżu ich cen bazowych. System finansowy jest w równowadze - banki są marginalnie rentowne, a inwestorzy otrzymują umiarkowane zyski."

 ### Great Recession

 je_subprime_mortgage_crisis:0 "Kryzys kredytów hipotecznych subprime"
 je_subprime_mortgage_crisis_reason:0 "[ROOT.GetCountry.GetAdjective] Instytucje finansowe emitują i pakują papiery wartościowe zabezpieczone hipoteką w skali - łączenie kredytów hipotecznych subprime na instrumenty sprzedawane w całym światowym systemie finansowym. Zabezpieczenia są oceniane jako bezpieczne. Nie są bezpieczne. Kiedy bazowe kredyty hipoteczne zaczną być niespłacone, każda instytucja posiadająca te instrumenty odkryje jednocześnie, że ich bilansy są budowane na bezwartościowym papierze. \n \n @warning! Jeżeli cena papierów wartościowych nie poprawi się znacząco przed okresem kryzysu, system bankowy [ROOT.GetCountry.GetAdjective] zamarznie - a szok będzie odczuwalny przez każdą gospodarkę ze znaczącymi powiązaniami do [ROOT.GetCountry.GetName]."

 je_great_recession:0 "Wielka Recesja"
 je_great_recession_reason:0 "System finansowy Stanów Zjednoczonych upadł. Papiery wartościowe zabezpieczone hipoteką, które są w posiadaniu banków na całym świecie, zostały ujawnione jako prawie bezwartościowe. Rynki kredytowe zamarzły. Banki nie pożyczą sobie nawzajem, a co dopiero przedsiębiorstwom. Inwestycje wyschły. Budowa zwolniła. Recesja jest globalna. \n \n Rynek się poprawi. Zawsze tak jest. Pytanie brzmi, ile szkód wyrządza się przed tym."

 # Status descriptions
 subprime_je_danger_tt:0 "Cena papierów wartościowych nie spadła w wystarczającym stopniu. [ROOT.GetCountry.GetAdjective] papiery wartościowe zabezpieczone hipoteką są nadal przeszacowane - rynek nie wycenił jeszcze ryzyka. Im dłużej to trwa, tym bardziej katastrofalna jest ewentualna korekta."
 subprime_je_safe_tt:0 "#bold Papiery wartościowe spadły o ponad 35% poniżej ceny bazowej. Rynek się poprawia. Jeżeli tak jest, wypadek może być ukrócony lub przynajmniej zmiękczony."

 great_recession_je_usa_tt:0 "System bankowy [ROOT.GetCountry.GetAdjective] znajduje się w kryzysie. Kryzys kredytowy powoduje gwałtowne zmniejszenie przepustowości bankowej, zamrożenie inwestycji i budowa. Recesja będzie trwała do czasu skorygowania rynku - około dziesięciu miesięcy."
 great_recession_je_global_tt:0 "[ROOT.GetCountry.GetName] znaczące powiązania handlowe z [SCOPE.sCountry('c:USA').GetName] przekazały szok finansowy. [ROOT.GetCountry.GetAdjective] banki są narażone na [SCOPE.sCountry('c:USA').GetAdjective] instrumenty finansowe. Kredyt jest zaostrzony, inwestycje spowolniły, a recesja nadeszła."

 # ==========================================
 # MODIFIERS
 # ==========================================

 great_recession_credit_crunch:0 "Credit Crunch"
 great_recession_credit_crunch_desc:0 "System bankowy skonfiskował. Banki odmawiają udzielania pożyczek przedsiębiorstwom, sobie nawzajem, każdemu. Kredyt wyparował. Inwestycje upadły. Budowa zwolniła. Gospodarka nie wyzdrowieje, dopóki zaufanie nie powróci do systemu finansowego."
