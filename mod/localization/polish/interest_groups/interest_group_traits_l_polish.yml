l_polish:

  # Landowners IG Traits
 ig_trait_noblesse_oblige:0 "Noblesse Oblige"
 ig_trait_noblesse_oblige_desc:0 "Jesteśmy lepsi od zwykłych ludzi, co oznacza, że mamy obowiązek dbać o nich. Ich próby organizowania rzeczy dla siebie są autodestrukcyjne i skazane na porażkę."
 ig_trait_family_ties:0 "Więzy rodzinne"
 ig_trait_family_ties_desc:0 "W tych zmieniających się czasach nadal znamy wartość dobrego małżeństwa. Nasze powiązania są starsze niż granice, które przekraczają i przetrwają zarówno sojusze, jak i rządy."
 ig_trait_noble_privileges:0 "Noble Privileges"
 ig_trait_noble_privileges_desc:0 "Co się stało z myślą, że szlachta powinna być pozostawiona do wykonywania swoich obowiązków bez bycia prześladowanym przez podatników? Nadszedł czas, aby przywrócić te dni."
 ig_trait_profitable_estates: "Korzystne stany"
 ig_trait_profitable_estates_desc: "Nie wiedziałeś? To, co jest dobre dla szlachty, jest dobre dla narodu - dobrobyt się podkrada."
 ig_trait_the_velvet_book: "Księga aksamitu"
 ig_trait_the_velvet_book_desc: "Tylko najbardziej szlachetne rodziny mogą znaleźć swoje imiona w tej czcigodnej książce. Wiemy, kto należy, a kto nie."
 ig_trait_bad_boyars: "Bad Boyars"
 ig_trait_bad_boyars_desc: "Więc chcą powiedzieć, że dobry car jest wprowadzany w błąd przez jego złych bojowników? Możemy im pokazać, do czego są zdolni źli chłopi."
 ig_trait_latifundios: "Latifúndios"
 ig_trait_latifundios_desc: "Wydajność i bogactwo naszych posiadłości jest niezrównane. Pieniądze płyną przez nasze ręce jak woda przez rapidy. To są złote dni dla nas wszystkich."
 ig_trait_junkerdom: "Junkerdom"
 ig_trait_junkerdom_desc: "Nasza moc pochodzi z naszych ziem, a nasze ziemie są potężnymi ziemiami. Cokolwiek postanowiliśmy, naród podąży za nami."
 ig_trait_patrician_philanthropy: "Patrician Philanthropy"
 ig_trait_patrician_philanthropy_desc: "Najwyższy czas, byśmy zrobili coś dla naszego bliźniego - i upewnili się, że nasze imiona będą osadzone na tym, co zostanie zbudowane."
 ig_trait_wiener_walzer: "Wiener Walzer"
 ig_trait_wiener_walzer_desc: "Ktoś miał tupet na ostatniej piłce, żeby poprosić o grę w minuety. Kochana, walczymy! Ustawiamy to, co modne, i to jest #italic nie #! minuet!"
 ig_trait_fazenda_ibicaba: "Fazenda Ibicaba"
 ig_trait_fazenda_ibicaba_desc: "Ludzkość jest stałym problemem dla naszych przedsiębiorstw, więc musimy podążać każdą drogą, by zdobyć pracę, której potrzebujemy."
 ig_trait_summon_no_zamindars: "Wezwanie nr Zamindars"
 ig_trait_summon_no_zamindars_desc: "Władcy naszego kraju wykazali, że nie są zainteresowani negocjacjami ani elastycznością. Jeśli tak, to nie powinni przegapić bardziej subtelnych rzeczy, które robimy, aby utrzymać porządek."
 ig_trait_famine_reserves: "Rezerwy na głód"
 ig_trait_famine_reserves_desc: "Naszym obowiązkiem jest otwieranie naszych zapasów zboża, kiedy pojawia się pilna potrzeba. Czy jest lepszy sposób na zakup dobrej woli od naszych lokatorów?"

  # Industrialists IG Traits
 ig_trait_job_creators:0 "Twórcy pracy"
 ig_trait_job_creators_desc:0 "Trzeba wydać pieniądze, żeby zarobić. Dopóki rządowi można ufać, by nie ingerować w nasze inwestycje, nie ma miejsca, gdzie wolelibyśmy stawiać nasze zyski niż w kierunku wzrostu gospodarczego."
 ig_trait_engines_of_progress:0 "Silniki Progress"
 ig_trait_engines_of_progress_desc:0 "Oto cuda współczesnego wieku! Nie ma czasu na wahanie. Jeśli można myśleć, projektować i opatentować, należy go zbudować, przetestować i niezwłocznie wykorzystać."
 ig_trait_tax_avoidance:0 "Unikanie opodatkowania"
 ig_trait_tax_avoidance_desc:0 "Kto wie najlepiej, gdzie powinniśmy wydać pieniądze? Nie rząd, a już na pewno nie obecny. Na szczęście ich niekompetencja pozostawiła luki podatkowe, które można dobrze wykorzystać."
 ig_trait_zaibatsu_cooperation: "Współpraca z Zaibatsu"
 ig_trait_zaibatsu_cooperation_desc: "Zdrowy związek między przemysłem a rządem przynosi korzyści wszystkim. W naszym interesie leży zapewnienie, że ten polubowny stan rzeczy będzie kontynuowany."
 ig_trait_zaibatsu_withdrawal: "Wycofanie się Zaibatsu"
 ig_trait_zaibatsu_withdrawal_desc: "Nasze zdrowie finansowe przyniosłoby największe korzyści dzięki przeorientowaniu się na spekulacje walutowe i wewnętrzne reinwestycje. Handel publiczny, niestety, nie jest teraz priorytetem dla rządu."
 ig_trait_kommerskollegium: "Kommerskollegium"
 ig_trait_kommerskollegium_desc: "W miarę jak skala naszych interesów handlowych stale rośnie, musimy zadbać o to, by zdobyte bogactwo było odpowiednio zarządzane."
 ig_trait_ventilate_unify_beautify: "Ventilate, Unify i Beautify"
 ig_trait_ventilate_unify_beautify_desc: "Widziałeś, jak tam jest? To warsztat chorób, miejsce, gdzie słońce nigdy nie świeci, gdzie rośliny gdzie i gdzie giną, i gdzie bieda i zaraza działają w koncercie. Oczywiście to my musimy naprawić ten bałagan."
 ig_trait_the_goods_must_flow: "Towary muszą płynąć"
 ig_trait_the_goods_must_flow_desc: "Dobrze jest produkować tak dużo jak nasz naród, ale po co, jeśli nie może dotrzeć na rynki, na które musi być sprzedawana? Teraz jest czas, aby zapewnić, że kraj rozumie, jak potrzebny jest dobry transport."
 ig_trait_wounded_honor: "Ranny Honor"
 ig_trait_wounded_honor_desc: "Jesteśmy nieliczni oświeceni w ziemi, która opiera się jakiemukolwiek oświeceniu. Nasze metody są lepsze - wszelkie zaburzenia są zdradą, a zdrada musi być spełniona najsurowszą sankcją."
 ig_trait_stamped_and_signed: "Zapięte i podpisane"
 ig_trait_stamped_and_signed_desc: "Stamps i księgi to metody, których używamy do tworzenia porządku z chaosu. Zarządzanie Indiami wymaga oceanu papieru, a naszym zadaniem jest zapewnienie, by krążyło ono bez zarzutu."
 ig_trait_responsible_government: "Odpowiedzialne zarządzanie"
 ig_trait_responsible_government_desc: "Naszą misją jest rozszerzenie sprawiedliwości i cywilizacji na wszystkich ludzi - i, oczywiście, utrzymanie zasady, która pozwala na to na zawsze."

  # Armed Forces IG Traits
 ig_trait_patriotic_fervor:0 "Patriotyczny Fervor"
 ig_trait_patriotic_fervor_desc:0 "Nie ważne jak genialna jest strategia i jak zaawansowana jest broń, niektóre bitwy można wygrać tylko ciężką pracą i odwagą. Żołnierze, którzy naprawdę wierzą w to, co reprezentuje ich kraj, będą walczyć dzielnie bez względu na szanse."
 ig_trait_veteran_consultation:0 "Konsultacje weteranów"
 ig_trait_veteran_consultation_desc:0 "Postęp technologiczny zmienia oblicze wojny, ale możemy z nich skorzystać tylko wtedy, gdy zrozumiemy jak. Na szczęście ci z nas z doświadczeniem z pierwszej ręki powinni mieć pomysł."
 ig_trait_materiel_waste:0 "Odpady materiałowe"
 ig_trait_materiel_waste_desc:0 "Lojalność wobec narodu nie jest lojalnością wobec rządu. Jeśli nie możemy ufać ludziom, którzy tu dowodzą, równie dobrze możemy wykorzystać to, co nam dają."
 ig_trait_elan_vital: "Élan Vital"
 ig_trait_elan_vital_desc: "Podczas gdy najnowsze uzbrojenia i uzbrojenia są dobre i dobre, droga do zwycięstwa zależy od ducha jazdy, który nie będzie się kłaniać w obliczu przeciwności losu. Żołnierze, którzy naprawdę wierzą w to, za czym stoi naród, postępują dzielnie, bez względu na szanse."
 ig_trait_newly_created_army: "Nowo utworzona Armia"
 ig_trait_newly_created_army_desc: "Serce nowoczesnej armii nie leży w najnowszych karabinów, lub najlepszych mundurów, ale w organizacji i logistyki. Aby utrzymać każdego żołnierza dostarczonego, aby utrzymać przepływ amunicji i racji stałych i niezawodnych, aby upewnić się, że każdy człowiek zna swoją rolę w ogromnej maszynie wojskowej - to jest sposób, aby armia coś warta."
 ig_trait_self_strengthening: "Self- Wzmocnienie"
 ig_trait_self_strengthening_desc: "Nasza inteligencja i mądrość są koniecznie wyższe od tych, którzy nas otaczają. Dlatego to, czego musimy się nauczyć z zagranicy, to tylko jedna rzecz: solidne statki i skuteczna broń."
 ig_trait_parochial_leadership: "Przywództwo parafialne"
 ig_trait_parochial_leadership_desc: "W tych mrocznych czasach, każdy jest sam dla siebie, a każda prowincja musi przede wszystkim dbać o swoje dobro. Nierozsądnie jest oczekiwać, że każdy oficer poprowadzi entuzjastycznie daleko od domu, kiedy jego własne serce może być zagrożone."
 ig_trait_el_buen_jefe: "El Buen Jefe"
 ig_trait_el_buen_jefe_desc: "Każdy dobry żołnierz potrzebuje dobrego oficera. W tych czasach cały naród potrzebuje dobrego oficera."
 ig_trait_clube_militar: "Clube Militar"
 ig_trait_clube_militar_desc: "Miejsce, gdzie oficerowie i żołnierze tacy jak my mogą odpocząć, zrelaksować się i zorganizować się w wolnym czasie, z pewnością będzie nieszkodliwe. Jeśli już, to miejsce, gdzie możemy rozmawiać i planować wszystko, może dobrze służyć krajowi."
 ig_trait_coronelismo: "Coronelismo"
 ig_trait_coronelismo_desc: "Widziałeś ostatni dekret rządu? Nie wiedzą, z kim mają do czynienia? Taki odznaczony dżentelmen jak ja, ze wszystkimi moimi ludźmi i posiadłościami, nie może być pobłażliwy!"
 ig_trait_divided_ranks: "Dzielone rankingi"
 ig_trait_divided_ranks_desc: "Istnieje fundamentalna przepaść między naszymi żołnierzami a oficerami, która stała się zbyt szeroka, by ją ignorować. Dlaczego człowiek miałby ryzykować życie dla kogoś, kto traktuje swoje zwyczaje z pogardą?"
 ig_trait_imperial_service: "Cesarska Służba"
 ig_trait_imperial_service_desc: "Noszenie munduru i rozszerzanie naszej granicy to wielki zaszczyt, do którego miliony dążą. Mają szczęście, że zawsze są pozycje do wypełnienia."
 ig_trait_veerta: "Veerta Przewodniczący"
 ig_trait_veerta_desc: "Nasza armia podbiła wszystkie Indie, tworząc niekończący się strumień zwycięstw przeciwko wszelkim wrogom. Nasza odwaga i dyscyplina zapewniają, że ta kolej honoru nigdy się nie skończy."

  # Rural Folk IG Traits
 ig_trait_farmers_markets:0 "Rynki rolnicze"
 ig_trait_farmers_markets_desc:0 "Dostarczanie towarów, które produkujemy ludziom, którzy ich potrzebują, wydaje się w dzisiejszych czasach wielkim zmartwieniem. W dobrych okolicznościach jesteśmy w stanie dostarczyć ich tam, gdzie powinni być sami."
 ig_trait_honest_work:0 "Uczciwa praca"
 ig_trait_honest_work_desc:0 "Żyjemy uczciwą pracą i uczciwym potem. Jeśli to oznacza, że produkujemy więcej niż potrzebujemy, to o wiele lepiej."
 ig_trait_old_ways:0 "Stare drogi"
 ig_trait_old_ways_desc:0 "Ci ludzie rządzący krajem wydają się mieć różne pomysły, jak powinna wyglądać przyszłość. Dlaczego mamy im ufać, skoro to oni stworzyli teraźniejszość?"
 ig_trait_obshchina: "ObshchinaCity in British Columbia Canada"
 ig_trait_obshchina_desc: "Życie w naszej wiosce nie jest takie złe. Dzielenie pracy między nas wszystkich jest łatwe, a rozprzestrzenianie się wokół produktów i zysków podwójnie tak."
 ig_trait_fellahin: "Fellahin"
 ig_trait_fellahin_desc: "Nasz los w życiu to praca na tych polach najlepiej jak potrafimy. Czasami nasza praca się opłaca."
 ig_trait_nucleos_coloniais: "Núcleos Coloniais"
 ig_trait_nucleos_coloniais_desc: "Nowy dom oznacza nowy początek życia. Czego tu nie kochać? Zobaczmy, co ta nowa ugoda ma do zaoferowania."
 ig_trait_plantation_work: "Plantacja pracy"
 ig_trait_plantation_work_desc: "Pracujemy ciężko dzień po dniu, i dostajemy to, co potrzebujemy, aby przetrwać. Czasami dostajemy więcej niż to i cenimy te dni."
 ig_trait_of_the_sovereign_alone: "Sam Władca"
 ig_trait_of_the_sovereign_alone_desc: "Ciężar nałożony na nas przez tych, którzy posiadają ziemię jest nie do zniesienia. Należy przypomnieć tym pośrednikom, że sami jesteśmy ryotami suwerennego państwa i nie mają nad nami żadnej władzy."
 ig_trait_imandari: "Imandari"
 ig_trait_imandari_desc: "Nasza ziemia jest bogata i pracujemy nad nią z należytą starannością. W dobrych czasach możemy produkować to, czego potrzebujemy, a nawet więcej."
 ig_trait_bazaar_bargains: "Bazaar Bargreats"
 ig_trait_bazaar_bargains_desc: "To nasze bazary wzbogacają nasze miasta i przyciągają odwiedzających z wielu mil. Jeśli dobrobyt wymaga dodatkowej organizacji, to cena, którą jesteśmy gotowi zapłacić."

  # Trade Unions IG Traits
 ig_trait_solidarity:0 "Solidarność"
 ig_trait_solidarity_desc:0 "Wszyscy, którzy chcą pracować powinni mieć pracę! Nikt nie będzie wykluczony ani wykluczony. Musimy wspierać swoje prawo do sprawiedliwie zrekompensowanej pracy."
 ig_trait_industrial_organizers:0 "Organizatory przemysłowe"
 ig_trait_industrial_organizers_desc:0 "Niezależnie od tego, kto tu rządzi, sposób współpracy pracowników ma ostatecznie większy wpływ na to, jak dobrze działa fabryka, niż jakiekolwiek przepisy wydane z góry."
 ig_trait_work_to_rule:0 "Zasady pracy"
 ig_trait_work_to_rule_desc:0 "Wygląda na to, że szefowie chcą, żebyśmy się zamknęli i robili to, co nam każą, zamiast myśleć za siebie. Zobaczmy, jak im się spodoba, jeśli zastosujemy tę filozofię do naszej niewykwalifikowanej pracy."
 ig_trait_bourse_du_travail: "Bourse du Travail"
 ig_trait_bourse_du_travail_desc: "Organizacja nie kończy się pod koniec dnia roboczego! Wspólny front wymaga wzajemnej pomocy nie tylko na podłodze fabryki, ale także w naszych domach i społecznościach."

  # Intelligentsia IG Traits
 ig_trait_propagandists:0 "Propagandyści"
 ig_trait_propagandists_desc:0 "W naszych wierszach, listach i manifestach politycznych musimy przede wszystkim podtrzymywać postęp osiągnięty w naszym kraju ojczystym, jako przykład tego, co ta nowa epoka musi przynieść mniej szczęśliwym częściom świata."
 ig_trait_avant_garde:0 "Avant- garde"
 ig_trait_avant_garde_desc:0 "Czego inni nie ośmielają się nawet myśleć, już będziemy mówić głośno. Nasza sztuka i pomysły przetną się bezpośrednio do serc i wymuszą otwarte oczy, jeśli nie w zdumieniu, to w szoku!"
 ig_trait_social_criticism:0 "Krytyka społeczna"
 ig_trait_social_criticism_desc:0 "Ludzie u władzy często myślą, że są poza zasięgiem, ale władza nie sprawia, że czyjeś pomysły są interesujące. Mamy wiele interesujących rzeczy do powiedzenia i wiemy, o kim dokładnie powiedzieć."
 ig_trait_restoration: "Przywrócenie"
 ig_trait_restoration_desc: "W tej epoce wielkich wyzwań i wielkich osiągnięć, szczycimy się naszym uporczywym dążeniem do przywrócenia narodowi dawnej wielkości. Nadzwyczajne prace potwierdziły status naszej cywilizacji, a nadzwyczajna praca przyniesie jej jeszcze większe wyżyny."
 ig_trait_crisis_of_identity: "Kryzys tożsamości"
 ig_trait_crisis_of_identity_desc: "Naród, któremu służymy może nie być narodem, którym naprawdę jesteśmy. Ile naprawdę mamy wspólnego z ludźmi dowodzącymi?"
 ig_trait_les_beaux_arts: "Les Beaux- Arts"
 ig_trait_les_beaux_arts_desc: "Nasza sztuka, nasze wystawy i nasz talent twórczy są niczym innym. Dlaczego nie mamy się popisywać? Zasługujemy, by inni byli zazdrośni."
 ig_trait_brasilidade: "Brasilidade"
 ig_trait_brasilidade_desc: "Chodź, przyjacielu, uczcijmy to dzisiaj! Tutaj słyszymy najpiękniejsze ballady pod światłem gwiazd z butelką w rękach, a tam - popatrz, co już maluje! Czy to nie jest życie?"
 ig_trait_bachareis: "Bacharéis Przewodniczący"
 ig_trait_bachareis_desc: "Wiemy, czego potrzebuje naród! W końcu mówimy w imieniu ludu. Nie, nie mówiliśmy, że mówimy #italic do #! ludzie."
 ig_trait_swaraj: "Swaraj Przewodniczący"
 ig_trait_swaraj_desc: "Jesteśmy wyobcowani i zniewoleni przez państwo. Nasi władcy odmawiają nam agencji, prosząc o naszą bezmyślną służbę. Taka rzecz jest skazana na porażkę - a jeśli zajdzie taka potrzeba, będziemy pracować nad jej zapewnieniem."
 ig_trait_westernisation: "Zachód"
 ig_trait_westernisation_desc: "Nasz obecny rząd służy jako przedstawiciel sprawiedliwości i postępu, ale wiele z naszego kraju pozostaje od niego daleko. Musimy dążyć do zmniejszenia odseparowania państwa od ludzi."

  # Petite-Bourgeoisie IG Traits
 ig_trait_treasury_bonds:0 "Obligacje skarbowe"
 ig_trait_treasury_bonds_desc:0 "Dopóki rządowi można ufać w spłacaniu długów, nasze ciężko zarobione oszczędności na finansowanie tego wielkiego narodu są nie tylko patriotyczne, ale i dobre inwestycje."
 ig_trait_middle_managers:0 "Menedżerowie środkowi"
 ig_trait_middle_managers_desc:0 "Nie możemy zmusić wszystkich do wszystkiego, ale możemy przynajmniej zachować to, co się stało. Ktoś musi pamiętać, jak się tu załatwia sprawy."
 ig_trait_xenophobia:0 "Ksenofobia"
 ig_trait_xenophobia_desc:0 "Wszyscy wiemy, kto jest winny stanu naszego kraju, ludzie boją się to powiedzieć. Tymczasem śmieją się za naszymi plecami z tego, co im uszło na sucho. Ktoś musi działać."
 ig_trait_bergsbrukens_valdistrikten: "Bergsbrukens Valdistricht"
 ig_trait_bergsbrukens_valdistrikten_desc: "Ścisła współpraca między interesami górniczymi a burgerem oznacza, że w lepszych czasach możemy zapewnić państwu wsparcie, o którym inne kraje mogą tylko marzyć."
 ig_trait_effendi: "Effendi"
 ig_trait_effendi_desc: "Przez najszczersze nawyki i uczciwe środki, wznieśliśmy się na szczyt, a nasze wysiłki są słusznie chwalone przez wszystkich."
 ig_trait_reorganization: "Reorganizacja"
 ig_trait_reorganization_desc: "Wiemy, że dzięki odpowiednim mandatom i wydziałom tak bardzo się reformujemy. Powiedz tylko słowo, a zaczniemy."
 ig_trait_master_of_the_house: "Mistrz Izby"
 ig_trait_master_of_the_house_desc: "Proszę! Usiądź. Pragniemy tu doskonalić - być sługami ubogich, sługami wielkich, pocieszających i filozofów narodu."
 ig_trait_haute_finance: "Haute Finance"
 ig_trait_haute_finance_desc: "W grze finansów kontynentalnych, chcemy być zwycięzcami, będąc pierwszymi, którzy zagrają naszą rękę."
 ig_trait_old_lady_of_threadneedle_street: "The Old Lady of Threadidle Street"
 ig_trait_old_lady_of_threadneedle_street_desc: "Jeśli naród potrzebuje pomocy, w pobliżu jest starsza pani, która jest rozważna, bezpieczna i zawsze może być zwrócona w kryzysie: Bank Anglii."
 ig_trait_civil_service: "Służba cywilna"
 ig_trait_civil_service_desc: "Ludzie mają zabawne pomysły na urzędników służby cywilnej. Jesteśmy tu, by pomóc ci opracować i wdrożyć politykę, to wszystko."
 ig_trait_bah_humbug: "Bah Humbug"
 ig_trait_bah_humbug_desc: "Mówi pan, że biedni i nieustępliwi są w potrzebie. Nie ma więzień? Czy domki nadal działają? Więc zostaw mnie w spokoju! Ci, którzy źle się mają, muszą tam iść."
 ig_trait_swadesh: "Swadesz"
 ig_trait_swadesh_desc: "Jesteśmy tak samo pracowici, jak inni ludzie, ale odmówiono nam kredytu i zmuszeni do niewolnictwa przez zagraniczne przedsiębiorstwa. Jeśli nasi władcy chcą nas wykluczyć z gospodarki, zrobimy to samo dla nich."
 ig_trait_lines_of_credit: "Linie kredytowe"
 ig_trait_lines_of_credit_desc: "Gdyby nie kredyt udzielony przez naszych własnych sponsorów, Spółka nigdy nie podbiłaby Indii. Jeżeli otrzymamy solidną sprawę biznesową, jesteśmy całkowicie gotowi kontynuować ten związek."
 ig_trait_cooperative_agencies: "Agencje spółdzielcze"
 ig_trait_cooperative_agencies_desc: "Nasi władcy posiadają dużą stolicę, ale niewiele wiedzą o naszym kraju. Łącząc ich zasoby i naszą wiedzę, możemy wzbogacić naszą ojczyznę o wiele bardziej niż oni sami."

  # Devout IG Traits
 ig_trait_be_fruitful_and_multiply:0 "Be Fruitful and Multiple"
 ig_trait_be_fruitful_and_multiply_desc:0 "Ascetyzm jest w porządku dla nielicznych, którzy poświęcają swoje życie duchowym dążeniom, ale u zwykłych ludzi najważniejszymi wartościami do wskrzeszenia są te, które budują rodzinę i opiekują się dziećmi."
 ig_trait_divine_right:0 "Boskie prawo"
 ig_trait_divine_right_desc:0 "Wierzymy, że w naszym życiu jest porządek. Społeczeństwo może lepiej lub gorzej odzwierciedlać ten porządek. Dopóki władcy są cnotliwi, a ich dekrety sprawiedliwe, możemy zapewnić, że ludzie wiedzą dlaczego."
 ig_trait_pious_fiction:0 "Pious Fiction"
 ig_trait_pious_fiction_desc:0 "Dzisiejsze wartości są tak zatrute, a literatura tak skorumpowała, że sama edukacja ma negatywny wpływ na moralność. Lepsze to niż nauczanie ludzi tego, co obecna instytucja uważa za "prawdziwe", jest nauczanie ich tego, co powinno być prawdą."
 ig_trait_work_ethic: "Etyka pracy"
 ig_trait_work_ethic_desc: "Pamiętaj, pieniądze mają naturę generującą. Pieniądze rodzą pieniądze; produkcja zysków jest aktem tworzenia, czcią i gloryfikacją Bożego dzieła."
 ig_trait_asceticism: "Ascetyzm"
 ig_trait_asceticism_desc: "Powstrzymanie się od przyjemności tego świata jest właściwą drogą. Nie pozwól, aby zakłopotały cię zmiany materialne; te też przejdą."
 ig_trait_kar_seva: "Kar Seva"
 ig_trait_kar_seva_desc: "Bóg jest z nami i wśród nas. Zatem bezinteresownie służyć innym jest służyć stworzeniu Boga i służyć Bogu. Wszyscy powinniśmy zaangażować się w uczciwą pracę i dzielić się owocami tej pracy z innymi, a tym sposobem być bliżej Boga."
 ig_trait_temporal_mandate: "Mandat tymczasowy"
 ig_trait_temporal_mandate_desc: "Linia między niebem a ziemią jest często zamazana, podobnie jak linia między wiarą a rządem. Do zarządzania świeckim światem potrzebne są wszystkie rodzaje - zawsze możemy znaleźć sposoby, aby nasze systemy współpracowały."
 ig_trait_the_best_revenge: "Najlepsza zemsta"
 ig_trait_the_best_revenge_desc: "Jeśli chcesz się zemścić na swoim wrogu, zdobądź więcej dobrych cech i idź ścieżką sprawiedliwości. W ten sposób, nieuchronnie zemścisz się na swoim wrogu, bo on będzie zasmucony twoimi dobrymi cechami i będzie zasmucony twoją dobrą reputacją."
 ig_trait_yeshivot: "Yeshivot"
 ig_trait_yeshivot_desc: "Nauka Sifruta Chazala jest kluczowym obowiązkiem każdej młodzieży. Jeśli nikt nie chodził do szkoły, jak nasze prawa mogą być zapamiętane i zachowywane?"
 ig_trait_traditsye: "Traditsye Przewodniczący"
 ig_trait_traditsye_desc: "Świat szybko zmienia się wokół nas. Jak mamy utrzymać równowagę, skoro pędzimy po tym nieznanym wirze zmian?"
 ig_trait_heavenly_sovereign: "Niebiański Władca"
 ig_trait_heavenly_sovereign_desc: "Spadkobiercy cesarza Jimmu zajmowali się jedną z najbardziej szanowanych instytucji na ziemi. Ta czcionka tradycji słusznie zasługuje na czczenie i jako naród powinniśmy to przyznać."
 ig_trait_secular_shrine_theory: "Teoria świeckiego sanktuarium"
 ig_trait_secular_shrine_theory_desc: "Shrines są nieodłączną wiarą narodu japońskiego; istnieją niesłusznie dla celów publicznych rytuałów państwa. Shintoizm jest ideologiczny: jest to wyraz patriotyzmu, którego oczekujemy od każdego obywatela."
 ig_trait_haibutsu_kishaku: "Haibutsu Kishaku"
 ig_trait_haibutsu_kishaku_desc: "Religie zagraniczne muszą zostać zniesione z narodu, a ich postacie zniszczone. Spójrz, jakie spustoszenie spowodowali! Idź do ich świątyń, do ich chat i pokaż im, że nie mają tu miejsca!"
 ig_trait_da_wat: "Da 'wat"
 ig_trait_da_wat_desc: "Musimy wyjść, aby zaprosić innych, aby przyłączyli się do nas w wierze i żyli zgodnie z wolą Boga. Ummah wita wszystkich."
 ig_trait_sharia: "Sharia"
 ig_trait_sharia_desc: "Właściwe życie wymaga znajomości praw, które określają, co jest właściwe, a co nie. Interpretacja prawa jest jednym z najbardziej honorowych i uroczystych obowiązków, jakie możemy wykonywać."
 ig_trait_mecelle: "Mecelle"
 ig_trait_mecelle_desc: "Based in Hanafi jurisprudence, the Mecelle- i Ahkâm- ı Adliye zapewnia, że będziemy przestrzegać kodeksu, który spełnia zarówno naszą wiarę, jak i oczekiwania prawa świeckiego."

