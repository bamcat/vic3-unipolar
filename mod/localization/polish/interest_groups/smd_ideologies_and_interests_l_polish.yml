 # leaders
 
 ideology_marxist_leader: "Marksista"
 ideology_marxist_leader_desc: "Rewolucyjni socjaliści, którzy popierają rządy rady, własność publiczną, zbiorowe rolnictwo i gwałtowne zerwanie z liberalnym kapitalizmem."
 ideology_state_socialist_leader: "Państwowy Socjalista"
 ideology_state_socialist_leader_desc: "Scentralizowanie socjalistycznych przywódców, którzy wolą jednopartyjny lub technokratyczny kierunek państwa, ekonomia dowodzenia i duże systemy publiczne."
 ideology_left_wing_populist_leader: "Left- Wing Populist"
 ideology_left_wing_populist_leader_desc: "Antyelitarni przywódcy masowo-polityczni, którzy mieszają redystrybucję, protekcjonizm, demokrację i silną wrogość oligarchicznym rządom."
 ideology_democratic_socialist_leader: "Demokratyczny Socjalista"
 ideology_democratic_socialist_leader_desc: "Demokraci pozostawili przywódców, którzy popierają wybory, siłę roboczą, odpowiedzialność społeczną, silny dobrobyt i wolność obywatelską."
 ideology_green_leader: "Zielony"
 ideology_green_leader_desc: "Demokratyczni przywódcy ochrony środowiska koncentrowali się na przepisach ekologicznych, dobrach publicznych, wolnościach obywatelskich i reformach postindustrialnych."
 ideology_state_capitalist_leader: "Kapitalista państwowy"
 ideology_state_capitalist_leader_desc: "Przywódcy deweloperów, którzy akceptują rynki, ale chcą silnego państwa, przemysłu strategicznego, scentralizowanej bankowości i inwestycji kierowanych."
 ideology_market_socialist_leader: "Rynek Socjalistyczny"
 ideology_market_socialist_leader_desc: "zdecentralizowanych socjalistycznych przywódców, którzy faworyzują spółdzielnie, związki zawodowe, dobrobyt i mechanizmy rynkowe pod nadzorem demokratycznym."
 ideology_progressive_leader: "Progresja"
 ideology_progressive_leader_desc: "Reformatorscy przywódcy koncentrowali się na równych prawach, ekspansji dobrobytu, edukacji, wolnościach obywatelskich i zarządzanej reformie rynku."
 ideology_social_liberal_leader: "Społeczna liberalizacja"
 ideology_social_liberal_leader_desc: "Liberalno-demokratyczni przywódcy, którzy wspierają rynki poprzez dobrobyt, równe obywatelstwo, edukację i kapitalizm regulowany."
 ideology_technocrat_leader: "Technocrat"
 ideology_technocrat_leader_desc: "Eksperci przywódcy rządów, którzy wspierają sekularyzm, planowanie administracyjne, zdolności państwowe, rynki regulowane i zarządzanie naukowe."
 ideology_liberal_leader: "Liberalne"
 ideology_liberal_leader_desc: "Główni liberalni przywódcy, którzy popierają republiki konstytucyjne, wolności obywatelskie, wolny handel, rynki prywatne i równość prawną."
 ideology_moderate_leader: "Średni"
 ideology_moderate_leader_desc: "Pragmatic liderów przedsiębiorczości, którzy rzadko naciskają radykalne reformy i są najbardziej powszechne w stabilnych systemach mieszanych."
 ideology_neoliberal_leader: "Neoliberal"
 ideology_neoliberal_leader_desc: "Zorientowani na rynek liberalni liderzy, którzy faworyzują wolny handel, laissez- faire, zaopatrzenie prywatne, ograniczenia fiskalne i instytucje technokratyczne."
 ideology_conservative_leader: "Konserwatywny"
 ideology_conservative_leader_desc: "Przywódcy prawa statusowego, którzy opowiadają się za porządkiem społecznym, ograniczonymi reformami, umiarkowaną ekonomią rynkową, tradycją i ostrożnym nacjonalizmem."
 ideology_corporatist_leader: "Corporatist"
 ideology_corporatist_leader_desc: "Kapitalistyczni przywódcy koordynacyjni, którzy popierają kapitalizm interwencjonistyczny lub laissezfaire organizowany przez państwowe instytucje pracy."
 ideology_theocrat_leader: "Theocrat"
 ideology_theocrat_leader_desc: "Liderzy rządzący religią, którzy chcą państwa, szkół, sądów i obywatelstwa zamówione wokół oficjalnej religii."
 ideology_right_wing_libertarian_leader: "Right- Wing Libertarian"
 ideology_right_wing_libertarian_leader_desc: "Liderzy rynku antypaństwowego, którzy sprzyjają instytucjom prywatnym, niskiemu zasiłkowi, wolnym mediom i słabemu bezpieczeństwu wewnętrznemu."
 ideology_classical_liberal_leader: "Liberal klasyczny"
 ideology_classical_liberal_leader_desc: "Staroliberalni konstytucjoniści, którzy popierają wolny handel, ograniczony rząd, prawa własności, instytucje przedstawicielskie i państwo prawa."
 ideology_neocon_leader: "Neokon"
 ideology_neocon_leader_desc: "Zmilitaryzowani liberalnie konserwatywni przywódcy, którzy faworyzują profesjonalne siły zbrojne, interweniują za granicą, instytucje kapitalistyczne i bezpieczeństwo narodowe."
 ideology_jihadist_leader: "Dżihadysta"
 ideology_jihadist_leader_desc: "Wojownicy przywódcy religijni, którzy mogą wyjść tylko z krajów islamskich pod radykalną presją."
 ideology_minarchist_leader: "Minarchista"
 ideology_minarchist_leader_desc: "Ekstremalne liderów rynku drobnego państwa, którzy wspierają laissez- faire, systemy prywatne i prawie całkowite wycofanie władzy publicznej."
 ideology_right_wing_populist_leader: "Right- Wing Populist"
 ideology_right_wing_populist_leader_desc: "Antyelitarni narodowo-populistyczni przywódcy, którzy wzmagają się w liberalnych demokracjach z wysokimi radykałami, mieszając szowinizm opieki społecznej, protekcjonizm i kulturowy opór."
 ideology_authoritarian_capitalist_leader: "Kapitalista autorytarny"
 ideology_authoritarian_capitalist_leader_desc: "Kapitalistyczni liderzy Hard-Order, którzy faworyzują prywatny lub kierowany kapitalizm pod autokracją, władzę policji, cenzurę i słabą opozycję."
 ideology_monarchist_leader: "Monarchista"
 ideology_monarchist_leader_desc: "Dynastyczni przywódcy lojalni, którzy pojawiają się prawie tylko w monarchii i faworyzują dziedziczną władzę, tradycję, kościół i hierarchię."
 ideology_fascist_leader: "Faszysta"
 ideology_fascist_leader_desc: "Ultranacjonalistyczni przywódcy autorytarni, którzy popierają militaryzację, jednopartyjne rządy, przemoc państwową, zamknięte społeczeństwo i cielesną gospodarkę narodową."
 ideology_anarchist_leader: "Anarchista"
 ideology_anarchist_leader_desc: "Antyautorytarni socjalistyczni przywódcy, którzy popierają bezpaństwowy samorząd, współodpowiedzialność, milicje, wolność słowa, brak policji i silną autonomię lokalną."
