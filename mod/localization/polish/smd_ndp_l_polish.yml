 ndp_bar_industrial_mines_tt: "Ustanowiona baza przemysłu ciężkiego"
 ndp_bar_industrial_factories_tt: "Wzrost sektora wytwórczego"
 ndp_bar_military_army_tt: "Duża armia stojąca"
 ndp_bar_military_conscription_tt: "Zatwierdzone masowe pobranie"
 ndp_bar_resource_farms_tt: "Produkcja rolna silna"
 ndp_bar_resource_extraction_tt: "Ustanowiony przemysł wydobywczy"
 ndp_bar_service_literacy_tt: "Wysoka umiejętność czytania i pisania przyspiesza rozwój usług"
 ndp_bar_service_university_tt: "Obecna infrastruktura uniwersytecka"
