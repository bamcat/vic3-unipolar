 ndp_modifier_military_domestic_arms: "Przemysł broni domowej"
 ndp_modifier_military_domestic_arms_desc: "Inwestowanie w produkcję broni domowej przynosi dywidendy w zakresie przepustowości."

 ndp_modifier_military_foreign_arms: "Zamówienia zagraniczne"
 ndp_modifier_military_foreign_arms_desc: "Obcy sprzęt wzmacnia zdolności wojskowe."

