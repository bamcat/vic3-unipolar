 # ==========================================
 # OPENING EVENT — ndp_events.0
 # ==========================================

 ndp_events.0.t: "Krajowy program rozwoju rozpoczyna się"
 ndp_events.0.d_industrial: "Rząd [ROOT.GetCountry.GetName] zobowiązał się do dekady ekspansji przemysłowej. Inwestycje będą płynąć w kierunku fabryk, kopalni i infrastruktury, która je łączy. Plan jest ambitny - a przeszkody są znaczne - ale wizja jest jasna: budowanie zdolności produkcyjnych, które określą miejsce [ROOT.GetCountry.GetName] na świecie."
 ndp_events.0.d_military: "Rząd [ROOT.GetCountry.GetName] zobowiązał się do dekady wojskowej ekspansji. Będą budowane baraki, oficerowie szkoleni i reformowane doktryny. Niezależnie od tego, czy motywacją jest obrona, odstraszanie czy ambicja, przesłanie do świata jest jednoznaczne: [ROOT.GetCountry.GetName] ma być traktowane poważnie."
 ndp_events.0.d_resource: "Rząd [ROOT.GetCountry.GetName] zobowiązał się do dekady rozwoju gospodarki zasobami. Sama ziemia - jej gleby i minerały - będzie motorem wzrostu. Jest to zakład na to, co [ROOT.GetCountry.GetName] już ma i plan, aby zrobić znacznie więcej."
 ndp_events.0.d_service: "Rząd [ROOT.GetCountry.GetName] zobowiązał się do dekady rozwoju gospodarki usług. Szkoły, banki i ministerstwa rządowe zobaczą inwestycje. Zakład jest taki, że mądrzejszy, lepiej zarządzany kraj jest ostatecznie silniejszy."
 ndp_events.0.f: "Dziesięć lat. Jeden kierunek."
 ndp_events.0.a: "Niech program się rozpocznie"

 # ==========================================
 # INDUSTRIAL PATH EVENTS
 # ==========================================

 ndp_events.1.t: "Pytanie branżowe"
 ndp_events.1.d: "Dwa lata w programie rozwoju należy wyjaśnić kierunek inwestycji przemysłowych. Kraj nie może budować wszystkiego naraz. Planiści i przemysłowcy są podzieleni: niektórzy opowiadają się za koncentracją zasobów na przemyśle ciężkim - żelazo, stal, węgiel - ścięgna nowoczesnej energii. Inni twierdzą, że lekka produkcja zapewnia szybszy zwrot i szersze zatrudnienie."
 ndp_events.1.f: "Stal lub tkanina - naród musi wybrać."
 ndp_events.1.a: "Przemysł ciężki - budować fundamenty nowoczesnej energii"
 ndp_events.1.b: "Produkcja lekka - priorytetem zatrudnienie i dobra konsumpcyjne"

 ndp_events.2.t: "Napęd inwestycyjny"
 ndp_events.2.d: "Program przemysłowy nabiera tempa, ale tempo budowy zależy od tego, skąd pochodzi kapitał. Rządowi planiści naciskają na bezpośrednie inwestycje państwa - kierowanie funduszy do sektorów priorytetowych bez niepewności rynku. Prywatni przemysłowcy sprzeciwiają się temu, że zachęty do konkurencji i zysków przyniosą lepsze wyniki niż przydział biurokratyczny."
 ndp_events.2.f: "Rynek lub plan - debata jest tak stara jak sam przemysł."
 ndp_events.2.a: "Inwestycje państwowe - rząd będzie budować"
 ndp_events.2.b: "Prywatne przedsiębiorstwo - przyciągnięcie inwestorów i krok w tył"

 ndp_events.3.t: "Pytanie dotyczące pracy"
 ndp_events.3.d: "Fabryki działają, a kopalnie produkują - ale pracownicy, którzy to umożliwiają, domagają się więcej. Program rozwoju stworzył miejsca pracy, ale stworzył również oczekiwania. Właściciele fabryki chcą dłuższych godzin i mniej ograniczeń. Organizatorzy pracy chcą czegoś przeciwnego. Rząd musi zdecydować, po której stronie stoi ten argument."
 ndp_events.3.f: "Silnik działa na węglu - i na ludzi, którzy go kopią."
 ndp_events.3.a: "Pobudzanie wydajności - wydobycie maksymalnej produkcji z siły roboczej"
 ndp_events.3.b: "Inwestowanie w pracowników - lepsze warunki oznaczają stabilny, trwały wzrost"

 ndp_events.4.t: "Dekada Przemysłu"
 ndp_events.4.d: "Zakończono dziesięć lat rozwoju przemysłowego. Zbudowane fabryki, linie kolejowe, rozbudowane kopalnie - wyniki są realne i widoczne. [ROOT.GetCountry.GetName] wchodzi w następną dekadę z silniejszą podstawą produkcyjną niż w momencie rozpoczęcia programu. Teraz pytanie brzmi, co będzie dalej."
 ndp_events.4.f: "Kuźnia wykonała swoją pracę."
 ndp_events.4.a: "Wykres następny kurs"
 ten_year_programme_concluded:0 "Zakończył się dziesięcioletni program."
 # ==========================================
 # MILITARY PATH EVENTS
 # ==========================================

 ndp_events.11.t: "Pytanie doktrynowe"
 ndp_events.11.d: "Dwa lata ekspansji wojskowej przyniosły więcej żołnierzy, więcej broni i więcej opcji - ale podstawowa kwestia doktryny pozostaje nierozwiązana. Sztab Generalny jest podzielony. Jedna frakcja naciska, aby skupić się na władzy lądowej: masowe armie, głębokość obronna i dominacja kontynentalna. Inna argumentuje, że ekspansja marynarki oferuje większą elastyczność strategiczną i zdolność do projektowania energii poza granicami [ROOT.GetCountry.GetName]."
 ndp_events.11.f: "Miecz czy flota - każda z nich zakłada inną wizję władzy."
 ndp_events.11.a: "Land doktryna - budować armię, że żaden sąsiad nie może zakwestionować"
 ndp_events.11.b: "Doktryna Marynarki Wojennej - siła projektu poza horyzontem"

 ndp_events.12.t: "Debata o zamówieniach publicznych"
 ndp_events.12.d: "Wojsko potrzebuje nowoczesnego sprzętu - ale skąd powinien pochodzić? Krajowa produkcja broni stworzyłaby potencjał przemysłowy obok siły militarnej, ale potrzeba czasu i inwestycji, aby dorosnąć. Zamówienia zagraniczne oferują szybsze wyniki kosztem finansowym i tworzą zależność od zewnętrznych dostawców, których niektórzy generałowie uważają za kłopotliwych."
 ndp_events.12.f: "Najlepsza broń to ta, na której można się oprzeć."
 ndp_events.12.a: "Budowanie krajowego przemysłu zbrojeniowego - inwestycje w samowystarczalność"
 ndp_events.12.b: "Kup za granicą - zaakceptować koszt natychmiastowej zdolności"

 ndp_events.13.t: "Duch Armii"
 ndp_events.13.d: "Osiem lat w programie wojskowym, sprzęt jest na miejscu - ale sam sprzęt nie wygrywa wojen. Teraz pytanie brzmi: duch walki siły. Niektórzy oficerowie opowiadają się za nacjonalistyczną kampanią moralną: apele do patriotyzmu i honoru narodowego, które sprawią, że każdy żołnierz będzie walczył ciężej. Inni opowiadają się za inwestowaniem w profesjonalizm korpusu oficerskiego - przywództwo, taktykę i wiedzę instytucjonalną."
 ndp_events.13.f: "Armia walczy swoim sprzętem i duszą."
 ndp_events.13.a: "Rozpocząć nacjonalistyczną kampanię moralną - pobudzić ducha walki"
 ndp_events.13.b: "Profesjonalizuj korpus oficerski - inwestuj w przywództwo"

 ndp_events.14.t: "Dekada rozszerzenia wojskowego"
 ndp_events.14.d: "Dziesięć lat rozwoju wojskowego jest ukończonych. Siły zbrojne [ROOT.GetCountry.GetName] są większe, lepiej wyposażone i bardziej zdolne niż w momencie rozpoczęcia programu. To, co zrobią z tą zdolnością - i czy inwestycja była warta kosztów - będzie zależeć od następujących decyzji."
 ndp_events.14.f: "Miecz został wykuty. Teraz musi znaleźć swój cel."
 ndp_events.14.a: "Wykres następny kurs"

 # ==========================================
 # RESOURCE ECONOMY PATH EVENTS
 # ==========================================

 ndp_events.21.t: "The Land 's Bounty"
 ndp_events.21.d: "Dwa lata w programie zasobów należy dokonać zasadniczego wyboru: jaki rodzaj gospodarki zasobami będzie [ROOT.GetCountry.GetName]? Rolnictwo - żywienie rosnącej populacji i tworzenie upraw eksportowych - zapewnia stabilność i szerokie zatrudnienie. Wydobycie surowców - wydobycie, wyręb, wiercenie - zapewnia szybsze dochody, ale jest bardziej niestabilne i sprawia, że gospodarka jest narażona na wahania cen surowców."
 ndp_events.21.f: "Ziemia daje to, co daje. Pytanie brzmi, o co pan pyta."
 ndp_events.21.a: "Rolnictwo - budować koszyk na chleb"
 ndp_events.21.b: "Ekstrakcja - wykopać bogactwa poniżej"

 ndp_events.22.t: "Polityka rolna"
 ndp_events.22.d: "Pięć lat później, program zasobów stoi przed centralnym problemem lądowym. Terytorium, które nadal może zostać wprowadzone do produkcji, jest nieobjęte roszczeniami lub niewykorzystane - ale wymaga to inwestycji w infrastrukturę, osadników i ramy prawne. Alternatywą jest zintensyfikowanie produkcji na istniejących gruntach, ściskając większą produkcję z tego, co już działa."
 ndp_events.22.f: "Nowa ziemia lub głębsze korzenie - wieczny dylemat rolnika."
 ndp_events.22.a: "Rozwiń się na nowe tereny - otwórz granicę"
 ndp_events.22.b: "Wzmocnienie istniejącej produkcji - uzyskać więcej z tego, co mamy"

 ndp_events.23.t: "Pytanie dotyczące wywozu"
 ndp_events.23.d: "Osiem lat po realizacji programu sektor zasobów produkuje - ale kto z nich korzysta, zależy od tego, dokąd zmierza. Poszukiwanie umów eksportowych z zagranicznymi rynkami zwiększyłoby dochody i włączyłoby [ROOT.GetCountry.GetName] do globalnych sieci handlowych, ale stworzyłoby zależność od popytu zewnętrznego. Priorytetowe traktowanie krajowych dostaw odizolowałoby ten kraj od wstrząsów cenowych i wzmocniłoby bezpieczeństwo żywnościowe, ale rezygnuje z zysków z eksportu."
 ndp_events.23.f: "Nakarm świat albo najpierw nakarm naród."
 ndp_events.23.a: "Poszukaj rynków eksportowych - sprzedaj nadwyżkę za granicą"
 ndp_events.23.b: "Priorytetowe dostawy krajowe - bezpieczeństwo żywnościowe powyżej zysku"

 ndp_events.24.t: "Dekada rozwoju zasobów"
 ndp_events.24.d: "Dziesięć lat rozwoju gospodarki zasobami są zakończone. Gospodarstwa, kopalnie i miejsca wydobycia [ROOT.GetCountry.GetName] produkować więcej niż w momencie rozpoczęcia programu. Na pytanie, czy zyski zostały sprawiedliwie podzielone - i czy wydobycie było zrównoważone - odpowiedzą kolejne dziesięciolecie."
 ndp_events.24.f: "Co ziemia daje, ziemia pamięta."
 ndp_events.24.a: "Wykres następny kurs"

 # ==========================================
 # SERVICE ECONOMY PATH EVENTS
 # ==========================================

 ndp_events.31.t: "Pytanie dotyczące usługi"
 ndp_events.31.d: "Dwa lata w programie usług, należy wyjaśnić kierunek. Dwie wizje gospodarki usługowej konkurują o priorytet: sektor finansowy - bankowość, ubezpieczenia i handel - który szybko generuje bogactwo i przyciąga inwestycje, lub edukacja i biurokracja - szkoły, uniwersytety i instytucje państwowe - które budują kapitał ludzki i zdolności zarządzania, które stanowią podstawę wszystkiego innego."
 ndp_events.31.f: "Książka czy biblioteka - oba są fundamentami nowoczesności."
 ndp_events.31.a: "Sektor finansowy - budowa banków i domów handlowych"
 ndp_events.31.b: "Edukacja i biurokracja - budowa kapitału ludzkiego"

 ndp_events.32.t: "Pytanie dotyczące talentu"
 ndp_events.32.d: "Przez pięć lat gospodarka usługowa rośnie - ale potrzebuje wykwalifikowanych ludzi, by utrzymać ten wzrost. Jedną z opcji jest przyciągnięcie zagranicznych talentów: otworzyć drzwi dla inżynierów, finansistów i profesjonalistów z zagranicy, akceptując, że niektóre z zysków będą płynąć do osób z zewnątrz. Drugim jest inwestowanie w edukację krajową - wolniej, ale budowanie możliwości, które pozostają."
 ndp_events.32.f: "Najlepsze umysły idą tam, gdzie są cenione."
 ndp_events.32.a: "Przyciągnąć zagranicznych talentów - otworzyć drzwi"
 ndp_events.32.b: "Inwestowanie w edukację krajową - budowanie od wewnątrz"

 ndp_events.33.t: "Reforma instytucjonalna"
 ndp_events.33.d: "Osiem lat później gospodarka usługowa potrzebuje, aby jej instytucje dojrzewały. Dwie ścieżki się prezentują: liberalizacja - ograniczenie regulacji, ograniczenie biurokracji i umożliwienie rynkom bardziej swobodnego - lub instytucjonalnego wzmocnienia - inwestowania w praworządność, prawa własności i wiarygodność samego rządu. Oba te kraje mogą generować wzrost, ale produkują różne kraje."
 ndp_events.33.f: "Zasady gry mają znaczenie tak samo jak gracze."
 ndp_events.33.a: "Liberalizacja rynków - deregulacja i krok w tył"
 ndp_events.33.b: "Wzmocnienie instytucji - inwestowanie w praworządność"

 ndp_events.34.t: "Dekada rozwoju usług"
 ndp_events.34.d: "Ukończono dziesięć lat rozwoju gospodarki usługowej. Banki są bardziej wyrafinowane, szkoły lepiej obsadzone, rząd jest bardziej zdolny niż wtedy, gdy program się rozpoczął. Czy przekłada się to na szeroki dobrobyt, który uzasadnia inwestycję, jest pytaniem dłuższym - pytaniem, na które w następnej dekadzie zacznie odpowiadać."
 ndp_events.34.f: "Infrastruktura umysłu przewyższa wszystkie inne."
 ndp_events.34.a: "Wykres następny kurs"

 # ==========================================
 # MODIFIERS
 # ==========================================

 ndp_modifier_industrial: "Ścieżka rozwoju przemysłowego"
 ndp_modifier_industrial_desc: "Zasoby krajowe są ukierunkowane na ekspansję przemysłową. Stopy budownictwa rosną, a przepustowość produkcji ogólnie się poprawia."

 ndp_modifier_military: "Wojskowa ścieżka rozszerzająca"
 ndp_modifier_military_desc: "Kraj ma pierwszeństwo przed rozwojem wojskowym. Badania skupiają się na technologii wojskowej, a siły zbrojne są budowane."

 ndp_modifier_resource: "Ścieżka gospodarki zasobami"
 ndp_modifier_resource_desc: "Zasoby krajowe są ukierunkowane na przemysł rolny i wydobywczy. Ziemia zaczyna działać."

 ndp_modifier_service: "Ścieżka ekonomii usług"
 ndp_modifier_service_desc: "Zasoby krajowe są ukierunkowane na edukację, biurokrację i rozwój finansowy. Kapitał ludzki jest motorem wzrostu."

 ndp_modifier_industrial_heavy: "Heavy Industry Focus"
 ndp_modifier_industrial_heavy_desc: "Inwestycje skupiają się na żelazo, stal i węgiel - fundamentach energii przemysłowej."

 ndp_modifier_industrial_light: "Light Manufacturing Focus"
 ndp_modifier_industrial_light_desc: "Inwestycje koncentrują się na produkcji wyrobów włókienniczych i dóbr konsumpcyjnych."

 ndp_modifier_state_heavy_industry: "Strefa przemysłu ciężkiego"
 ndp_modifier_state_heavy_industry_desc: "Państwo to zostało wyznaczone jako strefa priorytetowa dla przemysłu ciężkiego."

 ndp_modifier_state_light_industry: "Strefa przemysłu lekkiego"
 ndp_modifier_state_light_industry_desc: "Państwo to zostało wyznaczone jako strefa priorytetowa lekkiej produkcji."

 ndp_modifier_industrial_state_investment: "Napęd inwestycyjny państwa"
 ndp_modifier_industrial_state_investment_desc: "Rząd bezpośrednio finansuje budowę przemysłową."

 ndp_modifier_industrial_state_investment_cost: "Koszty inwestycji przemysłowych"
 ndp_modifier_industrial_state_investment_desc: "Państwa inwestują w przemysł, który obciąża budżet."

 ndp_modifier_industrial_private_investment: "Prywatne zachęty inwestycyjne"
 ndp_modifier_industrial_private_investment_desc: "Zachęty dla kapitału prywatnego zwiększają efektywność puli inwestycji."

