l_polish:

 je_national_development: "Krajowa ścieżka rozwoju"
 je_national_development_reason: "Każdy naród musi wybrać, gdzie skupić swoją energię. Krajowy plan rozwoju skupia zasoby, politykę i wolę polityczną na jednej wizji strategicznej na dziesięć lat. Wybór mądrze - wyboru nie można odwrócić, dopóki program się nie zakończy."

 je_foreign_investment: "Inwestycje zagraniczne"
 je_foreign_investment_reason: "Przyciągnięcie kapitału z wielkich potęg może przyspieszyć rozwój wykraczający poza to, na co pozwalają zasoby krajowe. Traktat dotyczący inwestycji zagranicznych otworzyłby kraj na przedsiębiorstwa zewnętrzne - ze wszystkimi możliwościami i zależnościami, jakie z tego wynikają."
 has_foreign_investment_or_trade_agreement_with_west_tt:0 "Podpisanie umowy inwestycyjnej i handlowej ze Stanami Zjednoczonymi, Zjednoczonym Królestwem lub Francją"
 
 ndp_status_industrial_tt: "Rozbudowa przemysłu jest w toku. Kraj kieruje zasoby na budowę swojej bazy produkcyjnej i przemysłowej."
 ndp_status_military_tt: "Rozbudowa wojskowa jest w toku. Kraj inwestuje w swoje siły zbrojne, doktrynę i przemysł obronny."
 ndp_status_resource_tt: "Trwa rozwój gospodarki zasobami. Kraj koncentruje się na rolnictwie i wydobyciu surowców."
 ndp_status_service_tt: "Trwa rozwój gospodarki usług. Kraj ten buduje swój sektor finansowy, edukację i potencjał państwowy."
 ndp_status_none_tt: "Żadna ścieżka rozwoju nie jest obecnie aktywna. Wybierz ścieżkę do rozpoczęcia dziesięcioletniego krajowego programu rozwoju."

 fi_status_seeking_tt: "Kraj dąży do zawarcia umowy inwestycyjnej z wielką siłą. Podpisz umowę inwestycyjną, aby zakończyć wpis do dziennika."
 fi_status_secured_tt: "Zatwierdzono umowę inwestycyjną. Kapitał zagraniczny płynie."

 ndp_button_industrial_name: "Rozbudowa przemysłu"
 ndp_button_industrial_desc: "Skoncentrowanie zasobów krajowych na tworzeniu bazy produkcyjnej. Wzmacnia przemysł ciężki, lekka produkcja i budownictwo. Podwybory w roku 2: przemysł ciężki vs lekka produkcja."

 ndp_button_military_name: "Rozbudowa wojskowa"
 ndp_button_military_desc: "Preordityzuj siły zbrojne. Wzmacnia armię i marynarkę wojenną, badania wojskowe i produkcję broni. Podwybory na drugim roku: doktryna lądowa vs naval buildup."

 ndp_button_resource_name: "Gospodarka zasobami"
 ndp_button_resource_desc: "Zbuduj gospodarkę wokół ziemi. Wzmacnia przemysł rolny i wydobywczy. Podwybory w roku 2: rolnictwo vs wydobycie surowców."

 ndp_button_service_name: "Gospodarka usług"
 ndp_button_service_desc: "Rozwój potencjału państwa, edukacji i sektora finansowego. Wzmacnia biurokrację, szybkość badań i inwestycje. Podwybory w roku 2: sektor finansowy kontra edukacja i biurokracja."

 ndp_button_abandon_name: "Porzucenie ścieżki"
 ndp_button_abandon_desc: "Porzucenie obecnego programu rozwoju. Wszystkie aktywne modyfikatory ścieżki zostaną usunięte, a prestiż i prawomocność będą obowiązywać przez dwa lata. Możesz wtedy wybrać nową ścieżkę."

 fi_button_reject_name: "Odrzucenie inwestycji zagranicznych"
 fi_button_reject_desc: "Zamknij drzwi do stolicy. Pozwoli to zakończyć wejście do czasopisma i zastosować długoterminową karę inwestycyjną, ale zachowa niezależność gospodarczą i wzmocni władzę."

