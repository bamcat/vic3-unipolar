 je_rise_of_the_right:0 "Powstanie prawicy"
 je_rise_of_the_right_reason:0 "Na Zachodzie, prawicowe populistyczne ruchy zyskują siłę poprzez rozdrobnienie mediów, odwrotność migracji, kulturalną politykę i antyestablishment. Do 2035 r. ruchy prawicowe są silniejsze, a populistyczni przywódcy mają większe szanse się pojawić."

 rise_of_the_right_status_baseline:0 "Ruchy prawego skrzydła zyskują na sile."
 rise_of_the_right_status_strong:0 "Prawicowy populistyczny wzrost zmienia politykę narodową."
 rise_of_the_right_completion_header:0 "Ta fala ustępuje po 2035 roku."
 rise_of_the_right_ends_2035_tt:0 "Rise of the Right kończy się po #bold 1 stycznia 2035 #!."
 rise_of_the_right_spawnrate_tt:0 "Prawa-skrzydło populistyczne lider spawn rate wzrasta. Dokładne wagi tarcicy są obsługiwane ręcznie w plikach ideologii / znaków."

 rise_of_the_right.1.t:0 "Powstanie prawicy"
 rise_of_the_right.1.d:0 "Nowy, prawicowy populistyczny prąd wszedł do krajowej polityki. Siła czerpie z nieufności wobec instytucji, złości na elity, kulturowych odruchów i fragmentarycznego środowiska mediów."
 rise_of_the_right.1.f:0 "Stare partie nadal mają biura. Nowa polityka uczy się tłumu."
 rise_of_the_right.1.a:0 "Centrum polityczne nie jest już bezpieczne."

 rise_of_the_right.10.t:0 "Gniew algorytmiczny"
 rise_of_the_right.10.d:0 "Sieci polityczne online wzmocniły oburzenie antyestablishmentu, dając prawicowe ruchy populistyczne nowe sposoby organizacji poza tradycyjnymi partiami."
 rise_of_the_right.10.f:0 "Karma staje się rajdem. Skarga staje się platformą."
 rise_of_the_right.10.a:0 "Oburzenie się rozprzestrzenia."
 rise_of_the_right.10.b:0 "Odsuńcie się przez instytucje obywatelskie."

 rise_of_the_right.11.t:0 "Backlash migracji"
 rise_of_the_right.11.d:0 "Wzrost gniewu wobec imigracji, integracji i tożsamości narodowej wzmocnił ruchy prawicowe."
 rise_of_the_right.11.f:0 "Granica staje się symbolem każdego strachu, na który stary porządek nie może odpowiedzieć."
 rise_of_the_right.11.a:0 "Odrzuty rosną."
 rise_of_the_right.11.b:0 "Przeeskaluj debatę."

 rise_of_the_right.12.t:0 "Populist Break Through"
 rise_of_the_right.12.d:0 "Prawicowa populistyczna frakcja przełamała się przez stary system partyjny, zmuszając strony głównego nurtu do odpowiedzi na jego język i program."
 rise_of_the_right.12.f:0 "Byli kiedyś poza pokojem. Teraz pokój jest zbudowany wokół nich."
 rise_of_the_right.12.a:0 "Prawy skok."
 rise_of_the_right.12.b:0 "Przebudujcie centrum."

 rise_of_the_right.13.t:0 "Polityka uliczna"
 rise_of_the_right.13.d:0 "Demonstracje, antydemonstracje i konfrontacje wirusowe pogłębiły poczucie, że polityka wyszła z parlamentu na ulice."
 rise_of_the_right.13.f:0 "Pieśń jest polityką w postaci larwalnej."
 rise_of_the_right.13.a:0 "Ulice radykalizują."
 rise_of_the_right.13.b:0 "Ochłodzić temperaturę."

