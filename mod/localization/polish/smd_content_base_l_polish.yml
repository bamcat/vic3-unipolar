 great_polarization_mass_shooting_aftermath_desc:0 "Zmotywowana politycznie masakra pogłębiła konflikt społeczny."

 great_polarization_reform_concessions:0 "Koncesje reformujące"
 great_polarization_reform_concessions_desc:0 "Poważna reakcja na reformy zmniejszyła napięcia polityczne."

 great_polarization_security_crackdown:0 "Uszkodzenie bezpieczeństwa"
 great_polarization_security_crackdown_desc:0 "Rozszerzone środki bezpieczeństwa zwiększyły presję państwa, jednocześnie ryzykując odwrotność."

 great_polarization_online_radicalization:0 "Radykalizacja online"
