 great_polarization.30.a:0 "Ulice wybuchają."
 great_polarization.30.b:0 "Obiecaj poważną reformę."
 great_polarization.31.t:0 "CHOP / CHAZ"
 great_polarization.31.d:0 "Okupowana strefa protestu powstała w Seattle, stając się narodowym symbolem zarówno antypolicyjnego aktywizmu, jak i strachu przed wycofywaniem się państwa."
 great_polarization.31.f:0 "Dla swoich zwolenników, jest to samorządzenie społeczności. Dla swoich przeciwników, zapada się w miniaturze."
 great_polarization.31.a:0 "Niech ten impas się skończy."
 great_polarization.31.b:0 "Oczyścić strefę."
 great_polarization.32.t:0 "Próba zabójstwa w Butler"
 great_polarization.32.d:0 "Próba zabójstwa Donalda Trumpa na wiecu w Butler w Pensylwanii nasiliła obawy o polityczną przemoc i zemstę."
 great_polarization.32.f:0 "Obraz podróżuje szybciej niż fakty."
 great_polarization.32.a:0 "Właściwe wiece w gniewie."
 great_polarization.32.b:0 "Apel o spokój narodowy."
 great_polarization.33.t:0 "No Kings"
 great_polarization.33.d:0 "Masowe demonstracje pod hasłem "No Kings" wypełniły ulice w całym kraju, wrobione przez zwolenników jako obrona demokracji i przez przeciwników jako destabilizujący opór."
