 great_polarization.1.t:0 "Wielka Polaryzacja"
 great_polarization.1.d:0 "Stany Zjednoczone wkraczają w nową erę politycznej polaryzacji, napędzaną przez rozdrobnienie mediów, kulturalną politykę wojenną i wzajemny strach między blokami ideologicznymi."
 great_polarization.1.f:0 "Każdy wybór staje się egzystencjalny. Każdy skandal staje się dowodem. Każda tragedia staje się bronią."
 great_polarization.1.a:0 "Centrum zaczyna pękać."

 great_polarization.2.t:0 "Politycznie motywowane strzelanie masowe"
 great_polarization.2.d:0 "Masowa strzelanina związana z ekstremistyczną retoryką polityczną wstrząsnęła krajem. Konkurujące frakcje natychmiast spierają się o winę, bezpieczeństwo, wolności obywatelskie i ideologię."
 great_polarization.2.f:0 "Zmarli są opłakiwani. Opowieść toczy się przed pogrzebem."
 great_polarization.2.a:0 "Oburzenie karmi przepaść."
 great_polarization.2.b:0 "Szukać poważnej dwupartyjnej odpowiedzi."

 great_polarization.3.t:0 "Próba zabójstwa"
 great_polarization.3.d:0 "Próba zamachu na osobę polityczną wzbudziła obawy, że przemoc polityczna staje się normalizowana."
 great_polarization.3.f:0 "Strzał ominął cel, ale uderzył w republikę."
 great_polarization.3.a:0 "Kraj się uspokoi."
 great_polarization.3.b:0 "Rozszerzyć ochronę."

 great_polarization.4.t:0 "Algorithmic Outrage"
 great_polarization.4.d:0 "Platformy mediów społecznościowych zwiększyły oburzenie polityczne, narażając miliony na radykalne treści, sieci spiskowe i przeciwmobilizację."
 great_polarization.4.f:0 "Pasza nie przekonuje. To narasta."
 great_polarization.4.a:0 "Maszyna oburzająca przyspiesza."
 great_polarization.4.b:0 "Platformy ciśnieniowe do umiarkowanego."

 great_polarization.5.t:0 "Fala ekspozycji"
 great_polarization.5.d:0 "Fala publicznych oskarżeń przeciwko potężnym liczbom wywołała ogólnokrajowe rozliczenie nadużyć, płci i instytucjonalnej hipokryzji."
 great_polarization.5.f:0 "To, co szeptaliśmy, jest teraz możliwe do przeszukania."
 great_polarization.5.a:0 "Rozprzestrzenia się rachunek."
 great_polarization.5.b:0 "Zbuduj instytucjonalne kanały odpowiedzialności."

 great_polarization.6.t:0 "Ukierunkowane mniejszości"
 great_polarization.6.d:0 "Napływ wrogości wobec społeczności mniejszościowych wywołał protesty, protesty przeciwne oraz ponowną debatę na temat rasizmu, tożsamości i przynależności narodowej."
 great_polarization.6.f:0 "Dla niektórych jest to odwrot. Dla innych jest to przetrwanie."
 great_polarization.6.a:0 "Ulice znów się wypełniają."
 great_polarization.6.b:0 "Skondensuj backlash i obniżyć temperaturę."

 great_polarization.20.t:0 "Temperatura spada"
 great_polarization.20.d:0 "Polaryzacja nie zniknęła, ale najbardziej niebezpieczna spirala została przerwana. Instytucje polityczne odzyskały pewną legitymację."
 great_polarization.20.f:0 "Republika przetrwa nie dlatego, że jej obywatele się zgadzają, ale dlatego, że wielu z nich akceptuje przegraną."
 great_polarization.20.a:0 "Związek trwa."

 great_polarization.21.t:0 "The Divide Entrenched"
 great_polarization.21.d:0 "Bezpośredni kryzys nie wybuchł w wojnie domowej, ale polaryzacja stała się częścią amerykańskiego życia politycznego."
 great_polarization.21.f:0 "Gorączka nie pękła. To stało się przewlekłe."
 great_polarization.21.a:0 "Nowa norma."

 great_polarization.100.t:0 "Druga amerykańska wojna domowa"
 great_polarization.100.d:0 "Rewolucyjny kryzys załamał Stany Zjednoczone. Władza federalna jest kwestionowana, a uzbrojone frakcje zaczynają kroić kraj w rywalizujące rządy."
 great_polarization.100.f:0 "Pierwsza wojna domowa pytała, czy związek może przetrwać. Drugi pyta, czym jest związek."
 great_polarization.100.a:0 "Złamania związku."

 great_polarization_baseline:0 "Wielka Polaryzacja"
 great_polarization_baseline_desc:0 "Atmosfera polityczna jest coraz bardziej radykalizowana i reaktywna."

 great_polarization_right_wing_president:0 "Right-Wing Prezydencja"
 great_polarization_right_wing_president_desc:0 "Prawicowy prezydent pobudził liberalne, socjaldemokratyczne, socjalistyczne, komunistyczne i mniejszościowe ruchy opozycyjne."

 great_polarization_left_wing_president:0 "Prezydencja lewicowa"
 great_polarization_left_wing_president_desc:0 "Lewy prezydent pobudził konserwatywne, libertariańskie, tradycjonalistyczne, faszystowskie i religijne ruchy opozycyjne."

 great_polarization_divided_media:0 "Polaryzacja zakorzeniona"
 great_polarization_divided_media_desc:0 "Środowisko mediów izoluje obozy polityczne od siebie."

 great_polarization_attempted_assassination:0 "Próba zabójstwa"
 great_polarization_attempted_assassination_desc:0 "Przemoc polityczna wstrząsnęła zaufaniem społeczeństwa."

