 # transit rights
 
 je_transit_rights: "Zablokowany!"
 je_transit_rights_reason: "[ROOT.GetCountry.GetName] nie ma linii brzegowej. Dostęp do rynków międzynarodowych zależy wyłącznie od dobrej woli krajów sąsiadujących. Zapewnienie umowy o prawach tranzytowych z przynajmniej jednym z nich ma zasadnicze znaczenie dla handlu i elastyczności strategicznej."
 secure_transit_rights_treaty:0 "Podpisanie traktatu o prawach tranzytowych z każdym sąsiadującym krajem bez dostępu do lądu."
 # ==========================================
 # JOURNAL ENTRY
 # ==========================================
 
 je_covid_pandemic: "COVID- 19 Pandemia"
 je_covid_pandemic_reason: "Nowy Coronavirus układu oddechowego pojawił się w [ROOT.GetCountry.GetName] i rozprzestrzenia się szybko na całym świecie. COVID- 19 rozprzestrzenia się szybciej niż jakikolwiek patogen w żywej pamięci, wykorzystując gęste sieci handlu i podróży, które łączą nowoczesny świat razem. Śmiertelność jest skoncentrowana wśród osób starszych i upośledzonych odporności - ale jej czysty zasięg grozi zatłoczeniem systemów opieki zdrowotnej w każdym kraju, którego dotyka. \n \n Użyj #bold COVID- 19 Response #! Decision to set policy. Zamknięcia spowalniają rozprzestrzenianie się, ale hamują gospodarkę. Maski i dystanse są mniej skuteczne, ale bardziej zrównoważone. Nie robienie niczego jest również wyborem - jeden elektorat i zmarli będą pamiętać."
 
 # ==========================================
 # covid.1 — PANDEMIC ARRIVES
 # ==========================================
 
 covid.1.t: "A Novel Coronavirus"
 covid.1.d: "Zgłaszano występowanie nietypowego zapalenia płuc u [SCOPE.sState('plague_origin_state').GetName], [ROOT.GetCountry.GetName]. Wstępna analiza przeprowadzana przez [ROOT.GetCountry.GetAdjective] organy ds. zdrowia sugeruje wcześniej nieznany coronavirus - rozprzestrzeniający się na człowieka ludzki, z okresem inkubacji na tyle długim, że nosiciele są zakaźni, zanim się zorientują, że są chorzy. Czy pozostaje to miejscowa epidemia, czy stanie się czymś więcej zależy od decyzji podjętych w najbliższych tygodniach."
 covid.1.f: "Nowy patogen. Znowu."
 covid.1.a: "Powiadomić WHO i rozpocząć śledzenie kontaktów"
 
 # ==========================================
 # covid.2 — SPREAD
 # ==========================================
 
 covid.2.t: "COVID- 19 Reaches [ROOT.GetCountry.GetName]"
 covid.2.d: "Przypadki nowego Coronavirus po raz pierwszy zidentyfikowane w [SCOPE.sCountry('plague_originator_country').GetName] zostały potwierdzone w [ROOT.GetCountry.GetName]. Wirus przybył - poprzez podróżnika, szlak handlowy, lub po prostu niewidzialne prądy połączonego świata. \n \n [ROOT.GetCountry.GetAdjective] organy ochrony zdrowia aktywują protokoły reakcji pandemii. Użyj #bold COVID- 19 Response #! Decision to set policy."
 covid.2.f: "To była tylko kwestia czasu."
 covid.2.a: "Aktywować protokoły pandemii"
 
 # ==========================================
 # covid.3 — SUBSEQUENT WAVES
 # ==========================================
 
 covid.3.t: "Wariant Omicron"
 covid.3.d: "Nowy wariant spowodował świeżą falę zakażeń COVID- 19. Władze zdrowia ponownie oceniają protokoły zapobiegania."
 covid.3.f: "Wirus wciąż jest z nami."
 
 # ==========================================
 # covid.4 — NOTIFICATION TO OTHER PLAYERS
 # ==========================================
 
 covid.4.t: "Nowy wirus z Wuhan, Chiny"
 covid.4.a: "Należy uważnie monitorować sytuację"
 
 # ==========================================
 # covid.5 — RESPONSE CHOICE
 # ==========================================
 
 covid.5.t: "COVID- 19 Polityka reagowania"
 covid.5.d: "Jak [ROOT.GetCountry.GetName] powinien zareagować na pandemię? Wybór ten określi gospodarczy i społeczny krajobraz najbliższych lat."
 covid.5.f: "Nie ma dobrych opcji. Tylko w handlu."
 covid.5.a: "Pełna blokada - zamknięte przedsiębiorstwa, ograniczenie ruchu"
 covid.5.b: "Mandaty maskujące i wytyczne dotyczące dystansu społecznego"
 covid.5.c: "Utrzymanie otwartej gospodarki - priorytet ożywienia gospodarczego"
 
 # ==========================================
 # covid.7 — WAR SUPPORT
 # ==========================================
 
 covid.7.t: "Pandemia osłabia wysiłki wojenne"
 covid.7.d: "Z populacją COVID- 19 [ROOT.GetCountry.GetName], [SCOPE.gsInterestGroup('pacifist_ig').GetName] - prowadzoną przez [SCOPE.sCharacter('pacifist_leader').GetFullName] - zastanawia się, czy kraj walczący z pandemią może jednocześnie przetrwać wojnę. Ludność jest wyczerpana. Szpitale polowe konkurują z logistyką linii frontu o zasoby."
 covid.7.f: "Walcz z wirusem albo z wrogiem. To trudne."
 covid.7.a: "Wojna trwa - wirus nie zmienia, że"
 covid.7.b: "Użyj komunikatów zdrowia publicznego, aby utrzymać morale"
 covid.7.c: "Powstrzymaj narrację dezerterów"
 
 # ==========================================
 # covid.8 — POVERTY AND EVICTIONS
 # ==========================================
 
 covid.8.t: "Tłok gospodarczy pandemii"
 covid.8.d: "Pandemia kosztowała tysiące pracowników [ROOT.GetCountry.GetAdjective], a w [SCOPE.sState('plague_poverty_state').GetName] bezrobocie przekroczyło 20%. Rodziny nie mogą płacić czynszu. Właściciele - wspierani przez [SCOPE.gsInterestGroup('landowner_ig').GetName] - naciskają na prawo do eksmisji. Ubóstwo koncentruje się w obszarach, które już najbardziej ucierpiały przez wirusa."
 covid.8.f: "Pandemia w pandemii."
 covid.8.a: "Wprowadzenie zamrożenia czynszu i moratorium eksmisji"
 covid.8.b: "Rozszerzenie zabezpieczenia społecznego i świadczeń dla bezrobotnych"
 covid.8.c: "Rynek to naprawi."
 
 # ==========================================
 # covid.9 — ANTI-MASK RESISTANCE
 # ==========================================
 
 covid.9.t: "Protesty przeciwko blokowaniu"
 covid.9.d: "[SCOPE.gsInterestGroup('anti_mask_ig').GetName], prowadzony przez [SCOPE.sCharacter('anti_mask_ig_leader').GetFullName], zorganizował masowe protesty przeciwko ograniczeniom pandemicznym [ROOT.GetCountry.GetName]. Ich pozycja: mandaty na blokowanie i maskowanie są przekroczeniem rządowego zasięgu, szkody gospodarcze są większe niż ryzyko dla zdrowia, a obywatele mają prawo do dokonywania własnych wyborów. \n \n Protesty rosną. Jak [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName] odpowiada ustawi precedens."
 covid.9.f: "Maski. Wzgórze, które wybrali."
 covid.9.a: "Hold firma - ograniczenia pobyt"
 covid.9.b: "Wycofanie - zniesienie ograniczeń"
 covid.9.c: "Odrzuty naukowe Komisji i kampanie na rzecz zdrowia publicznego"
 
 # ==========================================
 # DECISION
 # ==========================================
 
 covid_response: "Odpowiedź COVID- 19"
 covid_response_desc: "Ustaw [ROOT.GetCountry.GetName] politykę zarządzania pandemią COVID- 19. Decyzja ta może być podejmowana co sześć miesięcy w celu dostosowania polityki w miarę rozwoju sytuacji."
 
