 great_polarization.38.t:0 "U.S Capitol Oblężony"
 great_polarization.38.d:0 "Tłum szturmuje Kapitol Stanów Zjednoczonych po gorzko kwestionowanych wyborach, szokując kraj i pogłębiając obawy, że konflikt polityczny przełamuje się przez ograniczenia konstytucyjne."
 great_polarization.38.f:0 "Rotunda staje się polem bitwy symboli."
 great_polarization.38.a:0 "Republika drży."
 great_polarization.38.b:0 "Potępić atak i odbudować zaufanie."
 
