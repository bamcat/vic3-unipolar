 great_polarization.1.a:0 "Centrum zaczyna pękać."
 great_polarization.30.t:0 "Zabijanie George 'a Floyda"
 great_polarization.30.d:0 "Zabicie George 'a Floyda przez policję wywołało ogólnokrajową falę protestów, z żądaniami odpowiedzialności, reformą policji i sprawiedliwością rasową."
