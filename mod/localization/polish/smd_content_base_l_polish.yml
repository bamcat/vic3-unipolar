 great_polarization.130.t:0 "Lead Blue America?"
 great_polarization.130.d:0 "Z rozpadem Stanów Zjednoczonych, liberalny lub lewy w centrum charakter administracji stawia go najbliżej Blue America. Możecie kontynuować wojnę jako Niebieska Ameryka albo pozostać z pozostałościami Stanów Zjednoczonych."
 great_polarization.130.f:0 "Rząd może żądać ciągłości, ale władza podąża za instytucjami, które nadal są posłuszne."
 great_polarization.130.a:0 "Przełącz na Blue America."
 great_polarization.130.b:0 "Pozostań jak Stany Zjednoczone."

 great_polarization.131.t:0 "Prowadzić Amerykę Czerwoną?"
 great_polarization.131.d:0 "Po złamaniu Stanów Zjednoczonych, prawicowy charakter administracji stawia go najbliżej Czerwonej Ameryki. Możesz kontynuować wojnę jako Ameryka Czerwona lub pozostać z pozostałościami Stanów Zjednoczonych."
 great_polarization.131.f:0 "Flaga jest w tym samym kształcie, ale kraj pod nią się zmienił."
 great_polarization.131.a:0 "Przełącz na Czerwoną Amerykę."
 great_polarization.131.b:0 "Pozostań jak Stany Zjednoczone."

