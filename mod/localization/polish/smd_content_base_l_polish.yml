 je_second_american_civil_war_reason:0 "Stany Zjednoczone rozpadły się na rywalizujące rządy. Czerwona Ameryka i Niebieska Ameryka są głównymi bojownikami, podczas gdy kraje rozpadu mogą być zachęcane przez propozycje dyplomatyczne."
