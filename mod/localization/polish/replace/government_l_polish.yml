 gov_catholic_theocracy:0 "Teokracja katolicka"
 gov_catholic_theocracy_desc:2 "A [concept_government_type] rządzone przez lokalną hierarchię Kościoła Katolickiego. Najstarszy [Concept('concept_ruler','$RULER_CARDINAL$')] przyjmuje rolę [concept_head_of_state]. \n \n $TRANSFER_OF_POWER_NAME_DESC$"
 gov_protestant_theocracy:0 "Teokracja protestancka"
 gov_protestant_theocracy_desc:2 "A [concept_government_type] rządzone przez państwowy Kościół Protestancki. Jego najwyższy autorytet nazywa się [Concept('concept_ruler','$RULER_PRIMATE$')], który posiada władzę świecką i duchową. \n \n $TRANSFER_OF_POWER_NAME_DESC$"
 gov_oriental_orthodox_theocracy:1 "Orientalna prawosławna teokracja"
 gov_oriental_orthodox_theocracy_desc:3 "A [concept_government_type] rządzone przez orientalny kościół prawosławny. Pod kierownictwem [Concept('concept_ruler','$RULER_PATRIARCH$')] Kościół kontroluje wszystkie aspekty stanu. \n \n $TRANSFER_OF_POWER_NAME_DESC$"
 gov_sunni_theocracy:0 "Imamat"
