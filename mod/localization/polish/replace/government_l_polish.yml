 gov_corporate_state: "Państwo korporacyjne"
 gov_corporate_state_desc: "Jest to [concept_government_type] zorganizowane wzdłuż linii cielesnych, w których rząd oficjalnie służy jako pośrednik między różnymi klasami społecznymi. Jest kierowany przez wybrany [Concept('concept_ruler','$RULER_TITLE_PRESIDENT$')] \n \n $TRANSFER_OF_POWER_NAME_DESC$"
 gov_folkhemmet: "Folkhemmet"
 gov_folkhemmet_desc: "Jest to [concept_government_type] zorganizowane wzdłuż linii cielesnych, w których rząd oficjalnie służy jako pośrednik między różnymi klasami społecznymi. Jest kierowany przez wybrany [Concept('concept_ruler','$RULER_TITLE_STATSMINISTER$')] \n \n $TRANSFER_OF_POWER_NAME_DESC$"
 gov_technate_corporate: "Technate"
 gov_technate_corporate_desc: "Jest to [concept_government_type] rządzone przez [Concept('concept_ruler','$RULER_TITLE_CHIEF_EXECUTIVE$')], wykwalifikowaną liczbę powierzoną administracji przez zarząd urzędników technokratycznych wybranych z różnych grup korporacyjnych. \n \n $TRANSFER_OF_POWER_NAME_DESC$"
 gov_falangist_state: "Państwo falangistyczne"
 gov_falangist_state_desc: "Jest to [concept_government_type] zorganizowane wzdłuż linii cielesnych, charakteryzujących się radykalnym nacjonalizmem i naciskiem na totalizację władzy państwa. Jest kierowany przez [Concept('concept_ruler','$RULER_TITLE_JEFE$')] \n \n $TRANSFER_OF_POWER_NAME_DESC$"
 gov_volksgemeinschaft: "Volksgemeinschaft"
 gov_volksgemeinschaft_desc: "Jest to [concept_government_type] zorganizowany według linii rasowych, w celu zastąpienia konfliktu klasowego poprzez wspólnotę między członkami rządzącej etniczności. Jest kierowany przez [Concept('concept_ruler','$RULER_TITLE_FUHRER$')] \n \n $TRANSFER_OF_POWER_NAME_DESC$"
 gov_danubian_federation_corporate_state: "Dania"
 gov_danubian_federation_corporate_state_desc: "Jest to [concept_government_type], w którym państwo jest zorganizowane w wielu federalnych jednostek narysowanych wzdłuż linii etnicznych, w których rząd oficjalnie służy jako pośrednik między różnymi klasami społecznymi. Jest kierowany przez wybrany [Concept('concept_ruler','$RULER_TITLE_MINISTER_PRESIDENT$')]. \n \n $TRANSFER_OF_POWER_NAME_DESC$"
 gov_danubian_federation_technocratic_corporate_state: "Dania"
 gov_danubian_federation_technocratic_corporate_state_desc: "To jest [concept_government_type] w którym stan jest zorganizowany w wielu federalnych jednostek narysowanych wzdłuż linii etnicznych. Władza centralna jest w posiadaniu [Concept('concept_ruler','$RULER_TITLE_CHIEF_EXECUTIVE$')], wykwalifikowanej osoby, której administracja została powierzona przez zarząd urzędników technicznych wybranych z różnych grup korporacyjnych i etnicznych jednostek federalnych. \n \n $TRANSFER_OF_POWER_NAME_DESC$"
