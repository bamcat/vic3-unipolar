 central_archives:0 "Archiwa cyfrowe"
 central_archives_desc:1 "Archiwum cyfrowe jest stroną internetową stworzoną w celu zachowania danych do późniejszego użycia."
 steelworking:0 "Rafinerie morskie"
 steelworking_desc:1 "Rafinowanie oleju pozwala na tworzenie efektywnych paliw dla pojazdów, energii elektrycznej i tworzyw sztucznych"
 prospecting:0 "FOREX"
 prospecting_desc:1 "Wymiana walut obcych na zysk."
 baking_powder:0 "Opcje wegetariańskie"
 baking_powder_desc:1 "Mieszanki na bazie plantacji pozwalają naszej populacji wegetariańskiej rozwijać się na jednorazowych niedostępnych towarów"
 mechanical_tools:0 "Rolnictwo fabryczne"
 mechanical_tools_desc:1 "Rolnictwo fabryczne pozwala na masową produkcję mięsa poprzez okrucieństwo zwierząt"
 rubber_mastication:0 "Zaawansowane technologie badawcze"
 rubber_mastication_desc:1 "Systemy skanujące LiDAR (Light Detection and Ranging) były wykorzystywane do tworzenia bardzo dokładnych modeli 3D obiektów budowlanych, podczas gdy urządzenia zasilane GPS- pomogły poprawić dokładność wykopalisk, klasyfikacji i innych prac."
 pumpjacks:0 "Transport elektryczny"
 pumpjacks_desc:1 "Podobnie jak samochody elektryczne, elektryczne kontenerowce pozwalają na mniej emisji towarów do miejsc"
 shift_work:0 "Łańcuch blokujący"
 shift_work_desc:1 "Łańcuchy blokujące to śledzenie pochodzenia towarów w łańcuchu dostaw za pomocą technologii komputerowej. Przyjęcie blokady przez przedsiębiorstwa takie jak Walmart i IBM pod koniec XXI wieku pomogło zapewnić przejrzystość w pozyskiwaniu żywności, zwiększając zaufanie konsumentów."
 paved_roads:0 "Zielone Miasto"
 paved_roads_desc:1 "W pełni zielone i zautomatyzowane miasta"
 pasteurization:0 "Lab- Dorosłe mięso"
 pasteurization_desc:1 "Masowa produkcja mięsa hodowlanego"
 pneumatic_tools:0 "Megastruktury"
 pneumatic_tools_desc:1 "Budowa megastruktur poprzez AI, 3D Printing i Metaverse."
 steam_turbine:0 "Beton węglowo-neutralny"
 steam_turbine_desc:1 "Beton, który nie powoduje zanieczyszczenia"
 plastics:0 "Co- bots"
 plastics_desc:1 "Roboty współpracujące (Cobots): Koboty pracują razem z ludźmi w zakładach produkcyjnych, pomagając w zadaniach takich jak montaż, obsługa materiałów i kontrola jakości, co zwiększa wydajność i zmniejsza ryzyko."
 dough_rollers:0 "3D- Printed Food"
 dough_rollers_desc:1 "Szybka produkcja wszystkich produktów spożywczych za pośrednictwem automatycznych komputerów"
 oil_turbine:0 "Bioplastyka"
 oil_turbine_desc:1 "Bezpieczne, oparte na środowisku rozwiązania z tworzyw sztucznych."
 standing_army:0 "Doktryna armii zimnej wojny"
 standing_army_desc:1 "Złożone wyzwania polityki zagranicznej i wewnętrznych niepokojów nie mogą być już rozwiązywane przez szybko opanowane milicje. Nowoczesne czasy wymagają armii gotowej do działania."
 mandatory_service:0 "Silniki turboodrzutowe"
 mandatory_service_desc:1 "Wynalezienie helikoptera pozwala na atak i wsparcie."
 military_drill:0 "Ćwiczenia bojowe"
 military_drill_desc:1 "Jak mówi powiedzenie, "praktyka czyni mistrza", a to jest tak samo prawdziwe dla żołnierzy, jak i dla muzyków. Nie ma armii bardziej cenionych przez generałów niż armia, która może reagować na wszystkie polecenia natychmiast i bez zamieszania."
 line_infantry:0 "Napaść na piechotę"
 line_infantry_desc:1 "Żołnierze wyposażeni w znormalizowany sprzęt i wyszkoleni w standaryzowanych metodach dają armii większą jednolitość i w ten sposób dają jej większą niezawodność."
 logistics:0 "GPS"
 logistics_desc:1 "Globalny system pozycjonowania (GPS) jest systemem satelitów, który zapewnia krytyczne możliwości pozycjonowania dla wojskowych, cywilnych i komercyjnych użytkowników na całym świecie."
 electric_telegraph:0 "Broń szturmowa"
 electric_telegraph_desc:1 "Nowoczesna broń szturmowa może być używana podobnie do IFV do wspomagania operacji piechoty."
 enlistment_offices:0 "Atak satelity"
 enlistment_offices_desc:1 "Satelity atakujące mogą zniszczyć inne satelity do celów bojowych"
 military_statistics:0 "Autonomiczny Jet- Fighter"
 military_statistics_desc:1 "myśliwce odrzutowe w pełni kontrolowane sztuczną inteligencją"
 self_propelled_torpedoes:0 "Autonomiczny okręt podwodny"
 self_propelled_torpedoes_desc:1 "Autonomiczne okręty podwodne są rodzajem statku w pełni kontrolowanego przez łodzie podwodne."
 war_propaganda:0 "Automatycznie wygenerowana Propaganda"
 war_propaganda_desc:1 "Przekonanie ludności, by poświęciła swój czas, swoje zasoby i jej krew, wszystko dla zwycięstwa, to całe pole pracy na własną rękę."
 nco_training:0 "Autonomiczny śmigłowiec"
 nco_training_desc:1 "Śmigłowce w pełni kontrolowane przez drony."
 destroyer:0 "Destroyer przyszłości"
 destroyer_desc:1 "Statki lżejsze, wyposażone w torpedy i mniejsze karabiny, są równie ważne we współczesnych wozach, jak statki kapitałowe."
 landing_craft:0 "Systemy komputerowe AI- Intergrated"
 landing_craft_desc:1 "Systemy obliczeniowe AI- Intergrated dla naszych statków"
 flamethrowers:0 "Patogeny produkowane"
 flamethrowers_desc:1 "Wyprodukowany patogen jest chorobą stworzoną w laboratorium w celu zabicia jak największej liczby ludzi."
 banking:0 "E-Mail"
 banking_desc:1 "E-mail (skrót dla poczty elektronicznej; alternatywnie e- mail) jest metodą przesyłania i odbierania wiadomości za pomocą urządzeń elektronicznych."
 academia:0 "Digitalizacja"
 academia_desc:1 "Cyfryzacja świata poprzez postęp w technologii systemów informatycznych."
 international_relations:0 "The Pill"
 international_relations_desc:1 "Tabletki lub antybiotyki są zużywalne kapsułki, które mają na celu zdrętwienie objawów chorób. Pill często odnosi się do wynalazku kontroli bith, co pozwala na wyższy wzrost populacji."
 stock_exchange:0 "Globalizacja gospodarcza"
 stock_exchange_desc:1 "Globalizacja gospodarcza to coraz większa integracja gospodarek na całym świecie, która obejmuje wymianę towarów, usług, kapitału, technologii i ludzi."
 medical_degrees:0 "Kompaktowy dysk"
 medical_degrees_desc:1 "Płyta kompaktowa (CD) jest cyfrowym formatem zapisu danych dysków optycznych, który został opracowany przez Philipsa i Sony do przechowywania i odtwarzania cyfrowych nagrań audio."
 organized_sports:0 "Operacje przeciwdziałania terroryzmowi"
 organized_sports_desc:1 "Szkolenie w zakresie przeciwdziałania terroryzmowi (czasem zwane szkoleniem w zakresie reagowania na terroryzm lub przygotowaniem do przeciwdziałania terroryzmowi) zajmuje się zagrożeniem związanym z nieuchronnym atakiem terrorystycznym poprzez zapewnienie świadomości, przygotowania, zapobiegania i metod reagowania."
 central_banking:0 "Nowoczesny Leftyzm"
 central_banking_desc:1 "Polityka lewicowa opisuje zakres politycznych ideologii wspierających i dążących do osiągnięcia równości społecznej i egalitaryzmu"
 corporate_charters: "Liberalizm korporacyjny"
 corporate_charters_desc: "Liberalizm korporacyjny jest tezą w historii Stanów Zjednoczonych i narzędziem dla jego imperializmu otwartych drzwi, w którym elity korporacyjne stają się głównymi beneficjentami i głównymi lobbystami dla rzekomo antybiznesowych przepisów"
 joint_stock_companies: "Nowoczesna teoria monetarna"
 joint_stock_companies_desc: "Nowoczesna teoria monetarna lub współczesna teoria monetarna (MMT) to teoria makroekonomiczna heterodoksu, która opisuje walutę jako monopol publiczny i bezrobocie jako dowód na to, że monopolista walutowy nadmiernie ogranicza podaż aktywów finansowych potrzebnych do płacenia podatków i zaspokojenia potrzeb oszczędnościowych."
 investment_banks: "Doradcy finansowi AI"
 investment_banks_desc: "Robodoradcy wykorzystują algorytmy i sztuczną inteligencję (AI) do świadczenia usług planowania finansowego przy minimalnym udziale ludzi"
 corporate_management: "Zarządzanie Internetem"
 corporate_management_desc: "Umożliwia rządowi pełną kontrolę nad internetem"
 dialectics:0 "Wpływy"
 dialectics_desc:1 "Influencer, znany również jako wpływowy media społecznościowe, jest rodzajem sławy internetowej, która jest wpływowa i dobrze znana w mediach społecznościowych. Współczesny termin jest powszechnie płatną rolą, w której podmiot gospodarczy płaci za wpływ mediów społecznościowych na działalność związaną z zatrudnieniem w celu promowania swoich produktów i usług, zwanych marketingiem wpływającym."
 psychiatry:0 "Memy"
 psychiatry_desc:1 "Internet meme, czyli meme, jest elementem kulturalnym (takim jak idea, zachowanie lub styl), który rozprzestrzenia się po całym Internecie, głównie poprzez platformy mediów społecznościowych."
 postal_savings:0 "Papiery wartościowe zabezpieczone hipoteką"
 postal_savings_desc:1 "Hipoteka subprime to rodzaj pożyczki udzielanej ludziom, którzy nie spełniają typowych wymogów hipoteki z tradycyjnego banku lub unii kredytowej."
 human_rights:0 "Dobrostan zwierząt"
 human_rights_desc:1 "Pozycje w zakresie dobrostanu zwierząt twierdzą, że zwierzęta powinny być chronione przed niektórymi aktywistami ludzkimi."
 mutual_funds:0 "Gigeconomy"
 mutual_funds_desc:1 "W styczniu 2021 r. nastąpiło krótkie wyciśnięcie zapasów amerykańskiego detalisty gier wideo GameStop i innych papierów wartościowych, co spowodowało poważne konsekwencje finansowe dla niektórych funduszy hedgingowych i duże straty dla shortsellerów."
 zeppelins:0 "Statek gwiezdny"
 zeppelins_desc:1 "Statki kosmiczne pozwalają na szybki transport ludzi i towarów pomiędzy planetami"
 international_exchange_standards:0 "Rynek energii słonecznej"
 international_exchange_standards_desc:1 "Rynek akcji został rozszerzony w przestrzeni zewnętrznej"
 psychoanalysis:0 "Neuroplastyczność"
 psychoanalysis_desc:1 "Neuroplastyczność jest badaniem sposobu, w jaki neurony tworzą połączenia w mózgu."
 philosophical_pragmatism:0 "Cyberwojna"
 philosophical_pragmatism_desc:1 "Cyberwojna jest serią ataków cybernetycznych lub antyataków między państwami lub organizacjami międzynarodowymi w celu zniszczenia lub zakłócenia komputerów, sieci lub systemów informatycznych innego narodu"
 modern_financial_instruments:0 "Digital Hedgefund"
 modern_financial_instruments_desc:1 "Metody tworzenia pieniędzy nadal rosną i proliferacji. Niektóre metody mogą obejmować pieniądze płynące w piramidzie w górę, ale wszystkie z nich obejmują coraz więcej pieniędzy płynących cały czas."
 macroeconomics:0 "Digital- Ekonomia"
 macroeconomics_desc:1 "Badanie ekonomii online i gospodarki e-usług."
 behaviorism:0 "Terapia psychedeliczna"
 behaviorism_desc:1 "Badania nad potencjałem terapeutycznym substancji psychodelicznych (takich jak psylocybina, MDMA i LSD) nabrały znaczącego tempa. Substancje te są badane pod kątem ich wpływu na warunki takie jak zespół stresu pourazowego (PTSD), depresja, niepokój i uzależnienie."
 analytical_philosophy:0 "Teleterapia"
 analytical_philosophy_desc:1 "Teleterapia i zdalne doradztwo: Telezdrowie, które wybuchło podczas pandemii COVID- 19, nadal rośnie jako wygodny sposób na zdalny dostęp do terapii."
 electrical_capacitors:0 "Nanomateriały"
 electrical_capacitors_desc:0 "Zdolność manipulowania materiałami na nanoskali (miliardy metrów) prowadzi do przełomu w kilku branżach. Grafen, pojedyncza warstwa atomów węgla, jest jednym z najbardziej obiecujących nanomateriałów, oferując wyjątkową wytrzymałość, przewodność i elastyczność."
 corporatism:0 "Post- neoliberalizm"
 corporatism_desc:0 "Wraz z końcem neoliberalizmu społeczeństwo dąży do poprawy obecnego systemu kapitalistycznego."
 drone_carrier:0 "Przewoźnik dronów"
 drone_carrier_desc:0 "Przewoźnicy dronów, podobnie jak przewoźnicy samolotów dzisiejszych, noszą roje dronów i uwalniają niszczące ataki na naszych wrogów."
