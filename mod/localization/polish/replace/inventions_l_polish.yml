   #hereditary_aristocracy: "Hereditary Aristocracy"
  # Categories
  # Culture Technology
  # Economy Technology
  # Military Technology
  ### Technology Tooltips
  ##lenders_of_last_resort: "Lenders of Last Resort"
  ##lenders_of_last_resort_desc: "State-owned central banks are large enough to come to the rescue of smaller commercial banks, such as during bank runs. This can prevent a financial crisis spreading to other sectors of the economy. Often, even the promise of rescue in times of difficulty is enough to prevent bank runs occurring in the first place. Some 'critics' claim that such a promise will encourage risky behavior by the commercial banks, but these 'critics' are surely just anarchists looking to wreck the nation's economic security, as bankers are some of the most trustworthy people to walk the halls of power."
  ##limited_liability: "Limited Liability"
  ##limited_liability_desc: "A limited liability company draws a legal distinction between the company and its owners. This helps prevent the bankruptcy of a company ruining the personal lives of the investors, as creditors will not try to haul off the furniture of failed businessmen to recoup losses. This makes investing less risky, if perhaps less satisfying to watch from afar. As a separate legal entity, the company has its own finances that must be audited and taxed."
  ##marketing_desc: "Promotional schemes to grab more market share or create a new market from scratch were devised by Josiah Wedgwood, leader of the expanding pottery industry at the dawn of the Industrial Revolution."
  ##paper_money: "Paper Money"
  ##paper_money_desc: "A kind of promissory note issued by a bank, paper money allows private citizens to move and exchange large volumes of currency without the danger and discomfit of gold or silver coins which cannot be divided and are heavy to carry. Thus, commercial exchanges are easier and safer."
  ##regulated_private_notes: "Regulated Private Notes"
  ##regulated_private_notes_desc: "Bankers realized hundreds of years ago that their customers only rarely demand back their deposits all at once. By issuing loans in excess of their reserves in the form of private bank notes, bankers could make even more money from interest. Unfortunately, when all the bank's customers do demand their deposits at once, there will not be enough reserves. With better communications technology, these 'bank runs' become more frequent. To prevent bank runs, governments can restrict the issuance of private notes only to banks that meet certain criteria of fiduciary responsibility, such as being close personal friends to the finance minister."
  #alcohol: "Alcohol"
  #alcohol_desc: "An ancient technology, presumably discovered when a tribesman left some grain in a puddle and decided to drink it after a few months had passed, alcohol became central to the discipline of alchemy, and continues to serve men of reason in the field of chemistry in various processes, some of which do not involve drinking it."
  #atomic_theory_of_matter: "Atomic Theory of Matter"
  #atomic_theory_of_matter_desc: "Observations in chemistry seem to have disproven the notion held by supporters of phlogiston that matter is composed of the three fundamental essences of solidity, fluidity and inflammability. Air is not merely a void into which phlogiston flows during combustion - it contains oxygen, which combines with other matter during chemical reactions."
  #bankruptcy_law: "Bankruptcy Law"
  #bankruptcy_law_desc: "Having a legal framework for a company to declare bankruptcy allows investors and creditors to try to recoup losses via liquidation of assets. This makes investment less risky."
  #building_societies: "Building Societies"
  #building_societies_desc: "Originally set up within communities to help new families raise loans with which to buy homes and then disbanded once the members had all satisfied their requirements, building societies can also be permanent financial institutions that specialize in cheap mortgages."
  #census: "Census"
  #census_desc: "Knowing how many people we have in our country and roughly were they live is important so we know where to spend out money and how many men we will have if we have to fight. Should we be involved in that grubby business of having our lower orders actually having representation I suppose it will have a use for that as well."
  #chemical_batteries: "Chemical Batteries"
  #chemical_batteries_desc: "Electricity can be generated by exploiting the difference in charge as electrolytes pass through oxidation and reduction cells containing copper and zinc cathodes and annodes. Early experiments in this field took the form of a series of jars which had the appearance of a battery of artillery, hence the name."
  #civil_service: "Civil Service"
  #civil_service_desc: "The idea that the government should have a body of men on which they rely on to carry out administration is neither new nor necessarily efficient. The radical idea that people should be selected for these positions on merit and ability and that they should keep their positions if the government is changed are radical and leads to greater efficiency."
  #clinical_thermometer: "Clinical Thermometer"
  #clinical_thermometer_desc: "The mercury thermometer had been around since the mid 18th century. Its use for medical purposes were limited as they tended to be large (over a foot long) and could take over 20 minutes to measure someone's temperature. Now we have made the thermometer smaller and it only takes a few minutes to get a reading, making it truly useful for doctors."
  #commercial_banks: "Commercial Banks"
  #commercial_banks_desc: "Businesses need various financial services to operate normally. Payroll at the end of the month might require a short loan to cover a temporary shortfall. Expanding the business might likewise require borrowing, especially if the business is a limited liability company rather than a personal venture. Commercial banks offer financial services to these companies, as opposed to wealthy private individuals, middle-class savers or professional investors."
  #cooperatives: "Co-Operatives"
  #cooperatives_desc: "Intended as a mutually beneficial organization to help small businesses and workers buy basic necessities, a co-operative tends to be run democratically by its members to achieve social good rather than pure profit."
  #credit_unions: "Credit Unions"
  #credit_unions_desc: "Rather than being operated for the profit of an owner or shareholders, credit unions are a financial institution which tries to improve the welfare of its members through access to credit. They tend to be run democratically, with each member having a vote on the director of the credit union."
  #customs_tariffs: "Customs Tariffs"
  #customs_tariffs_desc: "Tariffs are a very important weapon in a government's arsenal. They can be used both to raise revenue and to 'guide' merchants and businesses into making choices beneficial to the national interest, as determined by the government. Tariffs can be charged on entry into a country, for the use of port facilities, or on the price of imported or exported goods. One important use for tariffs is in protecting native industries against more efficient foreign companies, which can give domestic firms time to catch up with their rivals abroad."
  #department_stores: "Department Stores"
  #department_stores_desc: "Having one large store that sells a huge variety of goods can be more convenient for customers and gives the retailer more buying-power over the distribution chains."
  #distribution_channels: "Distribution Channels"
  #distribution_channels_desc: "Companies can be structured to sell goods in a number of ways. Raw materials are generally sold to other industries; industries might then sell manufactured goods to wholesalers such as brokers; wholesalers then sell goods to retailers such as specific shops or chains of shops, and the retailer then sells the goods to the final customer. Innovations in this area include factory or outlet stores, which sell goods directly to customers from the factory complex, such as to workers and their families and community."
  #enclosure_acts: "Enclosure Acts"
  #enclosure_acts_desc: "Enclosure is the process of taking small strips of peasant land, passed down from father to son since the beginning of feudalism, and 'combining' them under one owner via Acts of Parliament. By merging these subsistence plots into enclosed fields, arable land can be turned into pasture, capital goods such as machinery can be invested in, and many small surpluses can be merged into a significant profit. Where the landless peasants go is up to them - am I my brother's keeper?"
  #espionage: "Espionage"
  #espionage_desc: "Know thy enemy. Knowledge of what is going on in places that could be hostile to us is vital if we are going to keep out country safe. This can be in the form of the mundane, like ensuring proper maps exist of areas we may end up being at war in to the significant like enemy forces and plans."
  #gold_standard: "Gold Standard"
  #hereditary_aristocracy_desc: "As a society becomes more productive enough food can be generated to allow people to specialize and do things that do not require you to farm. A military caste to protect yourself from hostile neighbors is a natural development and eventually they will entrench their position and hereditary aristocracy is born."
  #insurance: "Insurance"
  #insurance_desc: "Insurance against loss of property has existed for many hundreds of years, being especially important for merchant vessels traveling overseas. As global trade becomes more prevalent, the need for more secure maritime insurance increases. Lloyd's of London began as a specialist for maritime insurance but has expanded into other markets such as insuring properties against fire damage."
  #malthusianism: "Malthusianism"
  #malthusianism_desc: "Population is increasing much faster than our food supply. We must face the fact that if we allow this to continue we will face a catastrophe for our people. Further more we must face the face any such catastrophe will hurt the lower classes the most. The Tory ideal of paternalism is not good nor noble but instead will lead to a greater catastrophe on the least fortunate."
  #manifest_destiny: "Manifest Destiny"
  #manifest_destiny_desc: "If we are to spread our civilization to those less fortunate to have we must accept the fact that we have been uniquely blessed with virtues and institutions that others simply do not have. We have a mission to redeem the less fortunate by remaking them in our own image. It is no more that our destiny to do this."
  #oceanic_cablelaying: "Oceanic Cablelaying"
  #oceanic_cablelaying_desc: "With the technology of the telegraph, thought soon turned to how to lay a cable under bodies of water. Although it proved not technically difficult to lay cables of short stretches of water (like bays and straits), the wide oceans proved a greater challenge. Good news - after several false starts we have successfully mastered the techniques to lay such a cable so no longer must we rely on the good will of others."
  #ophthalmoscope: "Opthalmoscope"
  #ophthalmoscope_desc: "'every eye could be made luminous if the axis from a source of illumination directed towards a person's eye and the line of vision of the observer were coincident', this discovery revolutionized the treatment of eye problems. Creating a hand held device with a mirror that could shine the light, the ophthalmoscope, was made the doctor's life a lot easier."
  #positivism: "Positivism"
  #positivism_desc: "We we consider what knowledge is we know that there is certain knowledge. Information that comes from sensory experience and  then interpretation comes through logic and reason is the exclusive source of certain knowledge. We can extend this from the physical world to societies as a whole. Societies operate under general laws which if we took the time to analyze we would understand. Theology must be rejected because faith by its very nature denies reason and verification."
  #postal_banks: "Postal Banks"
  #postal_banks_desc: "Rural and otherwise isolated communities may not have access to a local bank branch. In such cases, a postal bank can operate to offer them financial services, such as savings and a current account, without the need to travel into a town or city."
  #savings_banks: "Savings Banks"
  #silver_standard: "Silver Standard"
  #vertical_filing_cabinet: "Vertical Filing Cabinet"
  #vertical_filing_cabinet_desc: "Gone but not forgotten"
 admiralty:0 "Nowoczesny Radar"
 admiralty_desc:0 "Admiralicja jest złożonym systemem szeregów połączonych sztywnym łańcuchem dowodzenia, aby pomóc marynarce bardziej efektywnie pracować."
 anaesthetics:0 "Leki znieczulające"
 anaesthetics_desc:0 "Środki znieczulające są środkami uspokajającymi lub środkami przeciwbólowymi stosowanymi podczas zabiegu chirurgicznego w celu zapobiegania odczuwaniu noży i inwazyjnego spowalniania personelu medycznego, które mogą być rozpraszające."
 anarchism:0 "Socjalizm rynkowy"
 anarchism_desc:0 "Socjalizm rynkowy jest rodzajem systemu gospodarczego obejmującego społeczną własność środków produkcji w ramach gospodarki rynkowej. Istnieją różne modele takiego systemu, zazwyczaj obejmujące przedsiębiorstwa spółdzielcze, a czasami mieszanka obejmująca przedsiębiorstwa publiczne lub prywatne."
 aniline:0 "Algorytm uczenia się maszynowego"
 aniline_desc:0 "proces lub zbiór zasad, które należy stosować w obliczeniach lub innych operacjach rozwiązywania problemów, w szczególności przez komputer. Wykorzystywane przez firmy mediów społecznościowych do oceny pragnień konsumentów."
 anti_clericalism:0 "Anty- klerykalizm"
 anti_clericalism_desc:0 "Władza i instytucje religijne nie są bardziej odporne na korupcję niż inne. Mogą oni twierdzić, że oferują ratunek masom, ale zamiast tego starają się upiec własne gniazda i odmawiają praw tym, których uważają za niegodnych. Musimy usunąć wpływ zorganizowanej religii z naszej sfery publicznej i pozostawić tę sprawę jako wybór dla nieoświeconych."
 antibiotics:0 "Eliminacja raka"
 antibiotics_desc:0 "Edycja genów pozwala na tworzenie genów niepodatnych na raka i innych chorób."
 antiseptics:0 "Antyseptyki"
 antiseptics_desc:0 "Nauka ustaliła, że narażenie na ciepło zniszczy zarazki. Problem w tym, że nie jest to właściwe rozwiązanie w odniesieniu do żywej tkanki. Jednak podczas eksperymentów, w których rany były pokryte ochraniaczami nasączonymi roztworem fenolu, widzieliśmy przypadki gangreny dramatycznie maleją. Narodziła się nauka antysceptyków."
 arc_welding:0 "Kolonizacja międzyplanetarna"
 arc_welding_desc:0 "Kolonizacja różnych planet"
 army_reserves:0 "Posiłek, posiłek do spożycia"
 army_reserves_desc:0 "A Meal -Ready- to- Eat (MRE) jest wojskową racją przeznaczoną na długie życie półkowe, z dużą różnorodnością opcji żywności."
 art_patronage:0 "Patronat artystyczny"
 art_patronage_desc:0 "Sztuka nie jest darmowa i aby rozwijać sztukę i kulturę potrzebujesz bogatych, aby zainteresować i wspierać sztukę. W zamian za to zyskują prestiż za takie piękne rzeczy wokół nich."
 art_silk:0 "Sztuczne życie"
 art_silk_desc:0 "Tworzenie organizmów z syntetycznymi genomami lub projektowanie organizmów o zupełnie nowych, nienaturalnych właściwościach. Genomy syntetyczne zostały użyte do tworzenia nowych form życia od podstaw, jak pierwsza syntetyczna bakteria stworzona przez Craiga Ventera i zespół w 2010 roku."
 artificial_fertilisers:0 "Nawozy sztuczne"
 assembly_line:0 "Linia montażowa"
 assembly_line_desc:0 "Poprzez usprawnienie procesu budowania rzeczy tak, aby każde działanie było wykonywane prawidłowo po każdym działaniu, można zrobić dużo bardziej wydajną fabrykę."
 atmospheric_engine:0 "Czysta energia"
 atmospheric_engine_desc:0 "Metody produkcji czystej energii, takie jak wiatraki, umożliwiają wytwarzanie energii bez powodowania zanieczyszczeń"
 automatic_bottle_blowers:0 "Mykorekulcja"
 automatic_bottle_blowers_desc:0 "Oznacza to wykorzystanie grzybów do degradacji zanieczyszczeń środowiska. Grzyby mogą być wykorzystywane do rozbijania materiałów niebezpiecznych, takich jak produkty naftowe i rozpuszczalniki przemysłowe."
 battlefleet_tactics:0 "Spacefleet-Battlefleet Tactics"
 battlefleet_tactics_desc:0 "Obsługa dużej floty bojowej może być trudnym zadaniem. Praktykując i ucząc się konkretnych taktyk jako floty, można osiągnąć większą wydajność."
 battleship_tech:0 "Niszczyciel drony"
 battleship_tech_desc:0 "Ultramasywne pancerniki zdolne wysadzić ogromne strumienie oceanu"
 bessemer_process:0 "Polimery"
 bessemer_process_desc:0 "Syntetyczne ubrania i tkaniny pozwalają na masową produkcję towarów wspólnych dla mniej szczęśliwych."
 bessemer_steel:0 "Bessemer Steel"
 bessemer_steel_desc:0 "Bessemer Process wysadza zimne powietrze w stopioną surówkę, spalając węgiel, krzem i mangan, tworząc stal łagodną. Nie jest to tak wysoka jakość, jak produkcja w tyglach, ale jest znacznie tańsza, pozwalając na stosowanie rud żelaza niższej jakości oraz umożliwiając masową produkcję linii kolejowych i żelbetonu."
 biological_determinism:0 "Determinacja biologiczna"
 biological_determinism_desc:0 "Badanie genetyki i dziedziczenia w przyrodzie otwiera pytania o to, jak wiele ludzkich zachowań zależy od biologii."
 feminism:0 "Ekonomia środowiskowa"
 feminism_desc:0 "Środowisko naturalne lub prawa środowiskowe to szeroka filozofia, ideologia i ruch społeczny dotyczący wspierania życia, siedlisk i otoczenia."
 blast_furnaces:0 "Piece Blast"
 blast_furnaces_desc:0 "Wielki piec jest używany do dodawania dodatkowego tlenu do procesów metalurgicznych, takich jak wytapianie rudy, pierwotnie ręcznie - lub mieszkami napędzanymi kołami wodnymi. Powoduje to, że piec osiąga nawet wyższe temperatury niż piec na otwartym powietrzu, spalając zanieczyszczenia i umożliwiając powstawanie stopów metali egzotycznych. Wielki piec jest szczególnie przydatny do produkcji surówki, która następnie może być wykonana z kutego żelaza lub stali miękkiej przy użyciu bardziej zaawansowanych procesów."
 bolt_action_rifles:0 "Cybernetyka"
 bolt_action_rifles_desc:0 "Żołnierze Autonomiczni mieli ratować życie podczas wybuchu wojny."
 chemical_bleaching:0 "Komputer osobisty"
 chemical_bleaching_desc:0 "Komputer osobisty pojawił się w połowie lat 80-tych, z produktami takimi jak Apple II, Macintosh i IBM PC, dzięki czemu komputery są dostępne dla osób indywidualnych i małych przedsiębiorstw."
  # bone_china: "Bone China"
  # bone_china_desc: "Bone China is a form of porcelain which in part is made from bone ash, the greater strength of this type of porcelain makes it rather valuable."
 # artillery: "Artillery"	// There is already a loc key for this in Goods, require prefix to support unique localization
 artillery_desc:0 "Bombardowanie dalekiego zasięgu z ciężką amunicją zastrasza i rozprasza siły wroga bez narażania własnych żołnierzy. Niedokładny, wolno poruszający się i drogi, a jednocześnie kluczowy składnik we współczesnej armii."
 breech_loading_artillery:0 "Bateria rakietowa o długim zasięgu"
 breech_loading_artillery_desc:0 "Baterie rakietowe dalekiego zasięgu, takie jak HIMARS, fascynują niszczenie celów daleko na terytorium obcym."
 tech_bureaucracy:0 "Liberalizm społeczny"
 tech_bureaucracy_desc:0 "Liberalizm społeczny jest ideologią, która opowiada się za wolnym rynkiem o silnym wpływie rządu i kontroli w celu ochrony mniej szczęśliwych."
 centralization:0 "Kapitalizm autorytarny"
 centralization_desc:0 "Powiązany z kapitalizmem państwowym i pokrywający się z nim system, w którym państwo podejmuje działalność handlową, autorytarny kapitalizm łączy własność prywatną i funkcjonowanie sił rynkowych z ograniczeniami niezgody."
 camera:0 "Powiązanie gwiazd"
 camera_desc:0 "Starlink to satelitarna konstelacja internetowa obsługiwana przez Starlink Services, LLC, międzynarodowe przedsiębiorstwo telekomunikacyjne, będące w całości własnością amerykańskiej spółki lotniczej SpaceX"
 canals:0 "Kanały"
 canals_desc:0 "Barki przybrzeżne i rzeczne są bardzo efektywną metodą transportu towarów. Kopanie kanałów we wnętrzu kraju rozszerza zasięg tych barek, chociaż może to być kosztowna propozycja, gdy różne wysokości muszą być zrównane przez systemy blokady."
 canneries:0 "Ultra- przetworzona żywność"
 canneries_desc:0 "Ultraprzetworzona żywność (UPF) to żywność, która została znacząco zmieniona ze swojej pierwotnej postaci poprzez zastosowanie procesów przemysłowych i dodanie składników, które zazwyczaj nie występują w kuchni domowej."
 canning_jars:0 "Słoje do konserw"
 canning_jars_desc:0 "Armie Rewolucji Francuskiej wymagały innowacyjnych rozwiązań problemów z zaopatrzeniem. Jednym z rozwiązań było gotowanie żywności wewnątrz szklanych słoików, aby zapobiec złym humorom i miasma mieszanie z zawartością i tym samym psuć racje. Roztopiony wosk jest wlany do ust słoika, aby działać jako pieczęć przeciwko światu zewnętrznemu."
 canning_machines:0 "Maszyny do puszczania"
 canning_machines_desc:0 "Przedwczesnej produkcji żywności w puszkach brakowało automatyzacji. Puszki były toczone i lutowane ręcznie. Wykorzystanie maszyn do szybkiego przekształcenia blachy w puszki poprawia standardy i zwiększa przepustowość."
 carrier_tech:0 "Laserboat"
 carrier_tech_desc:0 "Laserboats to statki posiadające laser o dużej mocy w celu szybkiego wyeliminowania nadlatujących dronów."
 catalytic_contact_process:0 "Katalityczny proces kontaktowy"
 catalytic_contact_process_desc:0 "W 1831 r. brytyjski sprzedawca octu Peregrine Phillips wynalazł proces produkcji bardziej skoncentrowanego kwasu siarkowego za pomocą platyny jako katalizatora. Choć nie jest to szczególnie przydatne do produkcji sody popielniczej lub nawozu, wkrótce stało się to boon do produkcji barwników organicznych."
 chemical_isolation:0 "Izolacja chemiczna"
 chemical_isolation_desc:0 "Chemikalia mogą być oczyszczone na wiele sposobów, takich jak destylacja, filtracja i parowanie. Jakość procesu oczyszczania będzie oczywiście miała wpływ na jakość izolatu."
 chemical_synthesis:0 "Synteza chemiczna"
 chemical_synthesis_desc:0 "Uryna psów została zsyntetyzowana przez niemieckiego chemika Friedricha Wöhlera w 1828 roku. Zaczęło to zacierać granice między chemią organiczną i nieorganiczną, a ponieważ coraz więcej chemikaliów jest syntetyzowanych, otwierają się nowe procesy przemysłowe."
 chemical_warfare:0 "AI- Terroryzm"
 chemical_warfare_desc:0 "Niektóre kombinacje chemiczne wywołują niepożądane lub nawet śmiertelne skutki, gdy ludzie są na nie narażeni. Uzbrojenie to przynosi nowy, przerażający aspekt wojny."
 civilizing_mission:0 "CRISPR Gene Editing"
 civilizing_mission_desc:0 "Edycja genów poprzez CRISPR pozwala ludziom na rozwój nowych narządów."
 colonization:0 "USG"
 colonization_desc:0 "Postęp pod koniec XX wieku w transplantacji narządów, obrazowaniu medycznym metodą rezonansu magnetycznego i tomografii komputerowej oraz w maszynach optycznych umożliwiającym bardziej specjalistyczne i deverse zabiegi dla poszczególnych warunków"
 color_photography:0 "Fotografia kolorów"
 color_photography_desc:0 "Wczesne techniki do rejestrowania fotografii w pełnym kolorze, oparte na wnikliwości, jak światło jest postrzegane przez oko. Dzięki efektywnemu wykonaniu trzech zdjęć poprzez różne filtry kolorów, mogą one być połączone w jeden obraz odtwarzający oryginalne kolory."
 combination_acts:0 "Akty łączone"
 combination_acts_desc:0 "Ludzie pracujący spotykający się w tajemnicy i przysięgający na siebie nawzajem są zagrożeniem dla bezpieczeństwa państwa i wyraźnie środkiem dla radykalnych Jakobinów, które mogą być podporządkowane państwu. Może to również stanowić zagrożenie dla naszej zdolności do obrony przed zewnętrznymi wrogami ze względu na groźby działania ludzi pracujących w krytycznych momentach konfliktu. Przejmiemy szereg przepisów, które pozwolą nam regulować takie zachowanie dla wspólnego dobra."
 combustion_engine:0 "Nanopowłoki"
 combustion_engine_desc:0 "Są one stosowane na różnych powierzchniach, aby uczynić je bardziej odpornymi na korozję, zużycie i plamy. Do zastosowań w dziedzinie opieki zdrowotnej, elektroniki i budownictwa opracowywane są powierzchnie czyszczące i nano-bakteryjne."
 central_planning:0 "Zarządzanie cyfrowe"
 central_planning_desc:1 "Umożliwia rządowi korzystanie z różnych bezpiecznych systemów komputerowych."
 compound_microscopes:0 "Mikroskopy złożone"
 compound_microscopes_desc:0 "Soczewki stosowane w optyce wymagają bardzo dobrych umiejętności produkcji szkła. Jedną z innowacji w tej dziedzinie jest użycie dwóch soczewek, jeden skupiony na obiekcie, a drugi na pierwszym obiektywie, aby zwiększyć powiększenie. Taki mikroskop może być używany do oglądania żywych bakterii."
 compression_ignition:0 "Energia z odpadów"
 compression_ignition_desc:1 "Poprzez przekształcanie odpadów składowanych na składowiskach w energię, nasz świat może generować wysokie ilości energii"
 concrete_dockyards:0 "Sztuczny zakres badań"
 concrete_dockyards_desc:0 "Testy są w pełni generowane w ramach SI."
 concrete_fortifications:0 "Przyszłe fortyfikacje"
 concrete_fortifications_desc:0 "Poprzez wprowadzenie betonu do fortyfikacji można bardzo szybko zająć mocno zakorzenione pozycje."
 condensed_milk:0 "Mleko skondensowane"
 condensed_milk_desc:0 "Zazwyczaj mleko musi być spożywane szybko po usunięciu z gruczołu sutkowego bydła. Poprzez obniżenie ciśnienia wewnątrz pojemnika, takich jak patelnia próżniowa, zawartość wody w mleku paruje, a skondensowane mleko może być następnie konserwowane i sprzedawane."
 conspicuous_consumption:0 "Konsumpcja wywoławcza"
 conspicuous_consumption_desc:0 "Bogactwo ma swój własny prestiż. Pokazy bogactwa mogą sprawić, że jeden z nich stanie się bardziej prestiżowy i pomoże przejść przez klasy społeczne, otwierając nowe możliwości dla wspinacza społecznego, takie jak kontakty z biznesmenami i politykami. W materialistycznym społeczeństwie frewolity i ekstrawagancja paradoksalnie pomagają się wzbogacić."
 conveyors:0 "Automatyczne fabryki"
 conveyors_desc:0 "Stosując najnowsze systemy AI, można tworzyć platformy, które poruszają się po nich bez użycia ludzkiej pracy."
 cotton_gin:0 "Nowoczesne samochody"
 cotton_gin_desc:0 "Automobile umożliwiają szybki transport ludzi i towarów po całym kraju."
 crucible_steel:0 "Stal niestopowa"
 crucible_steel_desc:0 "Produkowany przez zastosowanie ciepła do tygla kamiennego zawierającego sproszkowane żelazo i węgiel drzewny, ten wysokowęglowy stop jest uważany za podobny do "stali Damaszek", utworzonej w Indiach i Persji do około 1750 roku. Proces ten produkuje stal wysokiej jakości, nadającą się do stosowania w narzędziach, sprężynach i innych ekstremalnie twardych i kosztownych obiektach."
 law_enforcement:0 "Rasizm ogólnoustrojowy"
 law_enforcement_desc:1 "Rasizm systemowy jest formą instytucjonalnej dyskryminacji ze względu na rasę lub grupę etniczną i może obejmować politykę i praktyki istniejące w całym społeczeństwie lub organizacji, które powodują i wspierają ciągłą niesprawiedliwą przewagę dla niektórych ludzi oraz niesprawiedliwe lub szkodliwe traktowanie innych."
 defense_in_depth:0 "Cel AI- Driven"
 defense_in_depth_desc:0 "Tworząc wiele linii obrony, można się rozprzestrzeniać i spowalniać wroga, a czasem nawet je oczarować."
 democracy:0 "Upadek bloku wschodniego"
 democracy_desc:0 "Pod koniec lat 80-tych XX wieku seria wydarzeń doprowadziła do upadku komunizmu w Europie Wschodniej."
 distillation:0 "Urządzenia"
 distillation_desc:0 "Do urządzeń należą piece, chłodnie, mikrofalówki, mieszalniki, czajniki oraz inne artykuły gospodarstwa domowego wykorzystywane w produkcji żywności."
 divine_revelation:0 "Objawienie Boże"
 divine_revelation_desc:0 "Podstawą wszelkiego prawa są nasze święte pisma. Tylko dzięki posłuszeństwu wyższej władzy nasze społeczeństwo może być odpowiednio uporządkowane i gwarantowane stabilność."
 watertube_boiler:0 "Robotyki"
 watertube_boiler_desc:0 "Roboty zostały wprowadzone do linii montażowych, szczególnie w przemyśle motoryzacyjnym, w celu poprawy precyzji, prędkości i bezpieczeństwa."
 dreadnought_desc:0 "Przewoźnicy dronów, podobnie jak przewoźnicy samolotów dzisiejszych, noszą roje dronów i uwalniają niszczące ataki na naszych wrogów."
 dreadnought_tech:0 "Przewoźnik dronów"
 dynamite:0 "Górnictwo głębinowe"
 dynamite_desc:0 "Rozwój głębokowodnych technologii wydobywczych w latach 2000-tych znacznie się rozwijał, ponieważ firmy zaczęły badać wydobycie cennych minerałów (np. polimetalicznych guzków, metali ziem rzadkich) z dna oceanu."
 egalitarianism:0 "Wojna z terrorem"
 egalitarianism_desc:0 "Wojna z terroryzmem, oficjalnie Światowa Wojna z Terroryzmem (GWOT), [3] to globalna kampania wojskowa zainicjowana przez Stany Zjednoczone po 11 września 2001 roku."
 electric_arc_process:0 "Neuralink"
 electric_arc_process_desc:0 "Firmy takie jak Neuralink i Synchron rozwijają interfejsy komputerowe, które umożliwiają bezpośrednią komunikację między mózgiem a urządzeniami cyfrowymi. Interfejsy te mogłyby zrewolucjonizować leczenie, w tym pomóc osobom z paraliżem odzyskać ruch, zwiększenie zdolności poznawczych i oferując nowe sposoby interakcji z technologią."
 electric_railway:0 "Masowy transport publiczny"
 electric_railway_desc:0 "Z samochodów jest niezrównoważony, transport publiczny między miastami może być prowadzony masy"
 electrical_generation:0 "Obliczanie kwantowe"
 electrical_generation_desc:0 "Komputery kwantowe powinny być wykorzystywane do skomplikowanych problemów, które są obecnie trudne do rozwiązania w przypadku tradycyjnych komputerów, takich jak: wykrywanie narkotyków, symulacje nauki materialnej, zaawansowana kryptografia, prognozowanie pogody, modelowanie finansowe, rozwój sztucznej inteligencji i optymalizacja problemów w dziedzinach takich jak logistyka i produkcja energii, przede wszystkim poprzez wykorzystanie ich zdolności do przetwarzania dużych ilości danych i rozwiązywania problemów z wieloma zmiennymi jednocześnie poprzez kwantową superpozycję i splątanie."
 elevator:0 "Podpunkty podnoszenia"
 elevator_desc:0 "Pody transportowe, podobne do wind, które mogą poruszać się z dużą prędkością."
 empiricism:0 "World Wide Web"
 empiricism_desc:0 "World Wide Web (WWW lub po prostu Web) jest systemem informacyjnym, który umożliwia udostępnianie treści przez Internet za pomocą przyjaznych dla użytkownika sposobów mających na celu odwołanie się do użytkowników poza specjalistów IT i hobbystów."
 enlightenment_thought:0 "Myśl o oświeceniu"
 enlightenment_thought_desc:0 "Podczas Wieku Rozumu, stare dogmaty zaczęły być kwestionowane. Nie było już akceptowane, że "Bóg tego chce", a ci, którzy mają władzę, zaczęli usprawiedliwiać swoją pozycję w społeczeństwie. Nawet absolutni monarchowie dostrzegli prestiż tych nowych idei, a "oświeceni Despoty" zreformowali systemy edukacyjne, prawne i gospodarcze Europy. Reformy te nie poszły jednak wystarczająco daleko, a myśliciele, tacy jak John Locke, Voltaire, Jean- Jacques Rousseau i Thomas Paine, przeprowadzili atak na placówkę, która zakończyła się rewolucjami w Ameryce i Francji, które same zainspirowały liberałów na całym świecie."
 fascism:0 "Faszyzm"
 fascism_desc:0 "Faszyzm jest systemem politycznym, w którym rząd sprawuje ścisłą kontrolę nad wszystkimi aspektami społeczeństwa."
 field_works:0 "HESCO Barrier"
 field_works_desc:0 "Bariery HESCO można wznosić szybciej niż worki z piaskiem i zapewnić większą ochronę."
 film:0 "Propaganda bezpośrednia"
 film_desc:0 "Używając implantów mózgowych, propaganda może być bezpośrednio wprowadzana do naszej populacji"
 flash_freezing:0 "Portable Freeze- Suszarka"
 flash_freezing_desc:0 "Suszarki przenośne do użytku cywilnego"
 floating_harbor:0 "Wyspy sztuczne"
 floating_harbor_desc:0 "Sztuczne wyspy to masy lądowe wykonane przez człowieka, zwykle stworzone dla celów wojskowych."
 food_sterilisation:0 "Sterylizacja żywności"
 food_sterilisation_desc:0 "Przez próbę i błąd, biznesmeni odkryli metody konserwowania żywności, takie jak podgrzewanie mleka w pasteryzacji lub jego kondensacja w gęsty syrop, marynowanie owoców i warzyw, i konserwacja mięsa i zup. Wspólnym wątkiem tych wszystkich technologii jest eliminacja zarazków z konserwowanej żywności, koncepcji nie do końca zrozumiałej aż do odkrycia bakterii pod mikroskopem. Dzięki powszechnemu zrozumieniu tych pomysłów normy w przemyśle spożywczym poprawiają się, a tym samym zdrowie społeczeństwa."
 four_field_crop_rotation:0 "Obrót czterech upraw polowych"
 four_field_crop_rotation_desc:0 "Znany wyeksponowany przez ziemianina Charlesa 'Turnip' Townsend, stosowanie stabilizatorów azotu, takich jak rzepa lub koniczyna, pozwala na pozostawienie gruntów rolnych w stałym użyciu bez wyczerpania lub konieczności pozostawienia odłogów."
 fractional_distillation:0 "GMO"
 fractional_distillation_desc:0 "Organizmy modyfikowane genetycznie (GMO) są metodami zmiany sposobu, w jaki rośliny i zwierzęta rosną i pojawiają się do celów produkcji żywności."
 fruit_jars:0 "Słoje owocowe"
 fruit_jars_desc:0 "Pomysł zachowania mięsa i zupy w metalowych puszkach zyskał popularność. Inne rodzaje konserwacji żywności stają się również powszechne, takie jak konserwowanie owoców i warzyw w piklujących płynach lub gotowanie ich w dżemy."
 fulminates:0 "Spełniacze"
 fulminates_desc:0 "Spełniający materiał jest tym, który zapala się, gdy uderza gwałtownie. Do takich materiałów zalicza się jony rtęci, srebra i potasu. Po raz pierwszy zostały odkryte przez Edwarda Charlesa Howarda w 1800 roku, a ich wojskowe zastosowanie w systemach perkusyjnych stało się wkrótce widoczne."
 functionalism:0 "Funkcjonalizm"
 functionalism_desc:0 "Teoretyczne ramy postrzegania społeczeństwa jako systemu komponentów określonych przez funkcje społeczne. Wykorzystując systemy mechaniczne i biologiczne jako metaforę, postrzega struktury społeczeństwa i ich współzależność jako określenie jego stabilności."
 gantry_cranes:0 "Żurawie ciężkie"
 gantry_cranes_desc:0 "Przydatne w budownictwie i transporcie, żurawie ciężkie są wystarczająco duże, aby podeprzeć szerokość statku. To daje im wytrzymałość, co oznacza, że mogą podnieść najcięższe ładunki, jakie statek może nosić."
 general_staff:0 "Drony"
 general_staff_desc:0 "Drony to bezzałogowe statki powietrzne, które mogą być wykorzystywane zarówno do celów wojskowych, jak i cywilnych"
 germ_theory:0 "Teoria zarazków"
 germ_theory_desc:0 "Thucydides był pierwszą osobą, która stwierdziła, że choroby mogą rozprzestrzeniać się z człowieka na inne i od czasów starożytnych wierzyliśmy, że miasmas były przyczyną chorób takich jak cholera. Jednak nauka ma prowincji, że mikroorganizmy, zwane zarazkami, są odpowiedzialne za choroby."
 gunpowder:0 "Proch"
 gunpowder_desc:0 "Chemiczny związek składający się z siarki, węgla drzewnego i azotanów, gundrung conflagrates szybko, rozszerzając się w gaz, który może sprowokować pociski w rurach. Spalanie pozostawia za sobą duże ilości dymu z siarki i węgla drzewnego, co czyni muszkieterię brudną i oślepiającą firmą na polu bitwy. Ładunki prochu mają również bardziej cywilne zastosowania w otwieraniu ziemi dla górnictwa i budowy. Chińczycy wynaleźli proch sprzed tysiąca lat i użyli go do celebracji fajerwerków i artylerii oblężniczej."
 gunsmithing:0 "Rozbój"
 gunsmithing_desc:0 "Karabiny szturmowe łączą siłę ognia SMG i dokładność karabinu, aby stworzyć potężną platformę małej broni."
 gymnastics:0 "Gimnastyka"
 gymnastics_desc:0 "Dla Spartan gimnastyka była częścią szkolenia was rekrutów wojskowych, a samo słowo jest około od 1570 roku, aby odnieść się do ćwiczeń sportowych. Teraz, chociaż zdajemy sobie sprawę, że Spartanie byli na coś, aby zdyscyplinować umysł, musimy zdyscyplinować ciało. Pionierzy edukacyjni opracowali serię ćwiczeń dla chłopców na różnych urządzeniach, aby pomóc im rozwinąć samodyscyplinę. Niektórzy radykałowie nawet sugerują, aby rozszerzyć te ćwiczenia na dziewczyny."
 gyroscopes:0 "Żyroskopy"
 gyroscopes_desc:0 "Żyroskop jest wytwarzany przez połączenie serii gimbali, które są po prostu obrotowe podpory. Jeden gimbal obraca się w pionie, a drugi w poziomie, tak więc innermost obsługiwany obiekt może obracać się swobodnie w dowolnym kierunku. Żyroskopy są przydatne do utrzymania równowagi obiektu podczas jego otoczenia w ruchu, takich jak kompas magnetyczny na statku rzucającym."
 handcranked_machine_gun:0 "Systemy przeciwdronowe"
 handcranked_machine_gun_desc:0 "Systemy obronne przeznaczone do zestrzelenia tanich dronów."
 hydraulic_cranes:0 "Przewoźnik śmigłowca"
 hydraulic_cranes_desc:0 "Przewoźnicy śmigłowców pozwalają wspierać oddziały logistycznie"
 hydraulic_power:0 "Moc hydrauliczna"
 hydraulic_power_desc:0 "Koła wodne są od dawna używane do mielenia ziarna. Dostosowanie ich do innych zastosowań przemysłowych, takich jak maszyny zasilające, jest logicznym krokiem naprzód."
 hypodermic_syringes:0 "Strzykawki podskórne"
 hypodermic_syringes_desc:0 "Inokulacje były początkowo podawane pacjentom poprzez otwarcie skóry i otarcie chorobowego materiału w ranie. Pomysł użycia igły do wstrzykiwania pacjentowi płynów jest oczywiście bardziej higieniczny, a także pozwala na dokładne podanie objętości przez lekarza. Wczesne strzykawki zostały wykonane ze srebra, ale szkło staje się popularne, ponieważ procesy produkcyjne stają się bardziej wyrafinowane, co pozwala na węższe igły do produkcji."
 idealism:0 "Idealizm"
 idealism_desc:0 "Pewna liczba filozofii utrzymuje, że nasza wiedza zależy od tego, jak postrzegamy rzeczy, co ogranicza nas do poznania idei rzeczy, a nie tego, czym jest."
 identification_documents:0 "Identyfikacja cyfrowa"
 identification_documents_desc:0 "Identyfikacja cyfrowa to reprezentacja elektroniczna osoby, która umożliwia jej dostęp do usług online, dokonywanie zakupów i interakcje z innymi."
 impressionism:0 "Impresjonizm"
 impressionism_desc:0 "Styl sztuki skupiony na technikach odtwarzających ogólne wrażenie wizualne sceny. Ta sama artystyczna ambicja odtworzenia uczucia i doświadczenia sytuacji była również stosowana w formach artystycznych poza zasięgiem wzroku."
 improved_fertilizer:0 "Mikrokapsułkowanie"
 improved_fertilizer_desc:0 "Mikrokapsułkowanie wiąże się z włączeniem aktywnych składników, takich jak witaminy, smaki i probiotyki w powłoce ochronnej. Technologia ta stała się szeroko stosowana w żywności funkcjonalnej w celu poprawy dostarczania składników odżywczych, życia półproduktów i stabilności wrażliwych składników, oferując nowe możliwości w produkcji żywności, w tym wzmocnionej żywności i napojów."
 international_trade:0 "Neoliberalizm"
 international_trade_desc:0 "Neoliberalizm różni się od liberalizmu, ponieważ nie opowiada się za polityką gospodarczą laissez-faire, ale jest bardzo konstruktywny i opowiada się za silnym państwem, aby wprowadzić reformy rynkowe w każdym aspekcie społeczeństwa."
 ironclad_tech:0 "Pancernik XXI wieku"
 ironclad_tech_desc:0 "Pancerniki XXI wieku są w stanie wytrzymać ogromne bombardowania rakietowe."
 jeune_ecole:0 "Statek bojowy typu littoral"
 jeune_ecole_desc:0 "Autonomiczne statki to łodzie, które są zasadniczo dronami na morzu. Dodatkowo, posiadając wiele mniejszych statków, a nie kilka dużych, możliwe jest utrzymanie pewnego poziomu zwrotności, który w przeciwnym razie byłby niemożliwy."
 labor_movement:0 "Smartphone"
 labor_movement_desc:0 "Smartfon, często nazywany tylko telefonem, jest urządzeniem mobilnym, które łączy funkcjonalność tradycyjnego telefonu komórkowego z zaawansowanymi zdolnościami obliczeniowymi."
 land_reform:0 "Reforma gruntów"
 land_reform_desc:0 "Własność ziemi i społeczeństwo idą w parze. Grunty są głównym źródłem, bogactwem i statusem w każdym kraju i tym samym, kto będzie właścicielem ziemi, jest tym, kto ma bogactwo i status. Jeśli chcemy stworzyć społeczeństwo, którego chcemy, musimy być przygotowani do zasadniczej zmiany właściciela ziemi."
 lathe:0 "Linie produkcyjne"
 lathe_desc:0 "Linia produkcyjna to zespół pracowników, każdy z przydzielonym zadaniem, który umożliwia usprawnienie produkcji."
 lathes:0 "Tokarki"
 lathes_desc:0 "Tokarka jest narzędziem, które obraca materiał, nad którym pracuje narzędzie, w przeciwieństwie do wiertła, który jest obracany przeciwko materiałowi. To oczyszcza materiał w symetryczny sposób. Ma to zastosowanie w wielu branżach, od artystycznych świeczników do nudnych sztuk artylerii. Wczesne tokarki są zasilane ręcznie, konno lub kołem wodnym, w zależności od zakresu przemysłu."
 laws_of_physics:0 "Prawa fizyki"
 laws_of_physics_desc:0 "Przy użyciu teleskopu można łatwo przestrzegać podstawowych praw rządzących organami w ruchu. Sir Isaac Newton był pionierem w tej dziedzinie, dzięki swojej technologii wysokiej jakości teleskopu refleksyjnego i rygorystycznego stosowania jego obserwacji do istniejących naukowych prognoz Johannesa Keplera."
 crystal_glass:0 "Mikroprocesor"
 crystal_glass_desc:0 "Mikroprocesor jest sercem nowoczesnych komputerów, pozwalając komputerom stać się mniejsze, szybsze i bardziej przystępne. Doprowadziło to do rozwoju komputerów osobistych i szybkiego rozwoju technologii."
 automatic_machine_guns:0 "Wieżyczka autonomiczna"
 automatic_machine_guns_desc:0 "Zaawansowane wieże stacjonarne zdolne do automatycznego blokowania celów wroga."
 malaria_prevention:0 "Komórki STEM"
 malaria_prevention_desc:0 "Ze względu na ekstremalne warunki w kosmosie, astronauci są szczególnie podatni na infekcje, biorąc pod uwagę, że promieniowanie kosmiczne, mikrograwitacja i stres psychologiczny mają tendencję do narażania ludzkiego układu odpornościowego"
 manufacturies:0 "Produkcja"
 manufacturies_desc:0 "Gildie kontrolowały metody i praktyki zatrudniania, które firma mogłaby wykorzystać, ograniczając wejście do siły roboczej i domagając się, aby tylko wysoko wykwalifikowani i certyfikowani (przez gildię, naturalnie) rzemieślnicy wykonywali pewne zadania. Coraz więcej przemysłowców opuściło miasta i założyło nowe miejsca innowacji, wolne od wymagających standardów i wysokich płac mistrzów gildii."
 mass_communication:0 "Komórki"
 mass_communication_desc:0 "Mass Communication to łatwe rozpowszechnianie informacji wykorzystujących technologie takie jak telefon komórkowy."
 mass_propaganda:0 "Autoedukacja"
 mass_propaganda_desc:0 "Poprzez implanty chipowe, wszystkie informacje na świecie mogą być przekazywane bezpośrednio dzieciom naszych narodów."
 mass_surveillance:0 "Demokracja Mass Direct"
 mass_surveillance_desc:0 "Umożliwia każdemu obywatelowi głosowanie w każdej chwili, na cokolwiek, poprzez implanty mózgowe."
 mechanized_farming:0 "Interplanetaria - podstawa"
 mechanized_farming_desc:0 "Bazy na innych planetach"
 mechanized_workshops:0 "Inteligentne technologie"
 mechanized_workshops_desc:0 "Inteligentne technologie to technologie, które nie są tradycyjnie kontrolowane przez komputery, ale teraz są."
 military:0 "Wojskowe"
 military_aviation:0 "Uderzenie orbitalne"
 military_aviation_desc:0 "Atak orbitalny jest satelitą zaprojektowanym, by wystrzelić pocisk o dużej mocy na cel na Ziemi."
 mobile_armor:0 "Mech Przewodniczący"
 mobile_armor_desc:0 "Multi- Firepower- Platforma (MFP) to ciężki pojazd, podobny do zbiornika, wyposażony w najnowszą technologię do zdejmowania autonomicznych wrogów"
 modern_nursing:0 "Samoloty podstępne"
 modern_nursing_desc:0 "Skradzione samoloty są samolotami zaprojektowanymi tak, by miały mniejszą sygnaturę radarową."
 modern_sewerage:0 "Kryptowaluta"
 modern_sewerage_desc:0 "Kryptowaluta, kryptowaluta lub kryptowaluta jest walutą cyfrową przeznaczoną do pracy za pośrednictwem sieci komputerowej, która nie jest zależna od jakiegokolwiek organu centralnego, takiego jak rząd lub bank, w celu utrzymania lub utrzymania jej"
 currency_standards:0 "Handel online"
 currency_standards_desc:0 "Zakupy online to forma handlu elektronicznego, która pozwala konsumentom bezpośrednio kupować towary lub usługi od sprzedawcy przez Internet za pomocą przeglądarki internetowej lub aplikacji mobilnej."
 monitor_tech:0 "Statek AI"
 monitor_tech_desc:0 "Statki w pełni kontrolowane przez sztuczną inteligencję."
 musical_instruments:0 "Instrumenty muzyczne"
 musical_instruments_desc:0 "Muzyka jest kluczowym elementem rozwoju kultury i sztuki. W tym względzie ewolucja instrumentów muzycznych, którą tworzy kultura, ma wpływ echem na wszystkie przyszłe wydarzenia kulturalne."
 napoleonic_warfare:0 "Wojna Proxy"
 napoleonic_warfare_desc:0 "Konflikty proxy są wojnami walczącymi o wpływy dwóch przeciwnych mocarstw, prowadzonymi przez przybijanie dwóch słabszych mocarstw przeciwko sobie."
 nationalism:0 "Terroryzm"
 nationalism_desc:0 "Kim jestem? Jest to kluczowe pytanie, które dociera do serca tożsamości osoby. W przeszłości ludzie mówili, że są z prowincji, miasta lub nawet rodziny jako wyraz tej tożsamości. Opracowano nowe idee, które wykraczają poza te pojęcia i zamiast tego postrzegają tożsamość jako coś, co jest dzielone między naród. Co więcej, naród powinien być zjednoczony w jeden kraj."
 natural_selection:0 "Wybór naturalny"
 natural_selection_desc:0 "Selekcja naturalna jest mechanizmem, za pomocą którego formy życia ewoluują poprzez przekazywanie dziedzicznych cech przyszłym pokoleniom. Jej odkrycie stanowi wyjaśnienie, w jaki sposób gatunki powstają i dostosowują się do środowiska."
 naval_theory:0 "Teoria marynarki wojennej"
 naval_theory_desc:0 "Stosując pewną strategię w ruchu marynarki, można stworzyć znacznie skuteczniejszą marynarkę."
 drydocks:0 "Nowoczesna Stocznia"
 drydocks_desc:0 "Tworzenie zamkniętych obszarów, na których statki można dokować na suchym lądzie, pozwala na łatwiejszą i dokładniejszą konserwację statków towarowych i okrętów wojennych."
 navigation:0 "Nowoczesny budownictwo okrętowe"
 navigation_desc:0 "Dzięki różnym metodom, od gwiazd, do map, do kompasu możliwe jest prawidłowe wykreślenie kursu na całym świecie."
 neoclassicism:0 "Neoklasycyzm"
 neoclassicism_desc:0 "Klasyczny okres sztuki, teatru i muzyki rozciągnął się od około 1750 do 1820 roku, z innowacji od tego czasu jest oznakowany Neoclassic. Nazwa odnosi się również do klasycznej antyczności, a zatem porównuje wysoką kulturę Zachodu z kulturą Rzymu i Grecji, ustanawiając w ten sposób rodowód europejskiej klasy rządzącej jako mistrzów znanego świata."
 nitrogen_fixation:0 "Górnictwo astroidalne"
 nitrogen_fixation_desc:0 "Górnictwo astroidów to zbiór zasobów astroidów w kosmosie"
 nitroglycerin:0 "Nowoczesne rurociągi"
 nitroglycerin_desc:0 "Nowoczesne rurociągi umożliwiają transport węgla, ropy naftowej, LNG (skroplony gaz ziemny) i innych cieczy na rozległe odległości."
 open_hearth_furnace:0 "Otwarte piece do ziemi"
 open_hearth_furnace_desc:0 "Produkcja stali wiąże się z usuwaniem zanieczyszczeń z surówki, a następnie dodanie w innych materiałach, aby utworzyć gatunek stali jesteś po. Aby wyprodukować stal wymaga bardzo wysokich temperatur, a piec na otwartym palenisku wykorzystuje gaz odlotowy z pieca do ogrzewania cegieł i odwrócenia przepływu paliwa i powietrza przechodzi nad tymi cegłami w celu zwiększenia ciepła pieca. Proces ten jest wolniejszy od innych, ale łatwiejszy do kontrolowania i skalowania, pozwalając na produkcję dużych ilości stali w jednej partii."
 open_hearth_process:0 "Wczesne drukowanie 3D"
 open_hearth_process_desc:0 "Podczas gdy druk 3D rozpoczął się w latach 80-tych, w latach 2000-tych rozbudowano go na produkcję na pełną skalę. Technologia, która pozwala na konstrukcję materiałów warstwowo-warstwowych, zyskała dynamikę w takich branżach jak przemysł lotniczy, motoryzacyjny i medyczny."
 opium_dens:0 "Dens opium"
 opium_dens_desc:0 "Opium den jest po prostu miejscem, gdzie opium można kupić i palić. Są jednak ludzie, którzy obawiają się, że te nory są bardziej złowieszcze i są źródłem moralnej korupcji."
 paddle_steamer:0 "Balistyka"
 paddle_steamer_desc:0 "Pocisk wie, gdzie jest. Wie o tym, bo wie, gdzie go nie ma, odejmując, gdzie go nie ma, lub gdzie go nie ma, gdzie jest, w zależności od tego, która jest większa, otrzymuje różnicę lub odchylenie."
 pan-nationalism:0 "Pan-nationalism"
 pan-nationalism_desc:0 "Through organizations like the EU, de-facto super-states can be formed through trade & economic relations."
 percussion_cap:0 "Silny rozbój"
 percussion_cap_desc:0 "Karabiny ciężkie, takie jak SCAR- L zapewniają wystarczającą siłę ognia do specjalnych operacji."
 percussion_caps:0 "Kapsle perkusyjne"
 percussion_caps_desc:0 "Kapelusze perkusyjne przyjmują wcześniej nieniezawodną broń palną i umożliwiają im wystrzelenie w każdej pogodzie."
 personal_liberty:0 "Osobista wolność"
 personal_liberty_desc:0 "Oprócz kwestii, w jaki sposób społeczeństwo powinno być zarządzane, pojawia się także kwestia tego, co powinno być poza zarządzaniem. Ustanowienie swobód indywidualnych, których tyrania większości nie może zakłócać, jest kluczową częścią liberalnych ideałów."
 social_media:0 "Media społecznościowe"
 social_media_desc:0 "Media społecznościowe to zbiór technologii umożliwiających użytkownikom dzielenie się informacjami, pomysłami i treściami poprzez wirtualne społeczności i sieci."
 policing_by_consent:0 "Polerowanie w drodze zgody"
 policing_by_consent_desc:0 "Sir Robert Peel, pełniąc funkcję Ministra Spraw Wewnętrznych, stworzył Policję Metropolitalną, policję odmienną od żandarmerii tyranów kontynentalnych, ponieważ są cywilami działającymi w interesie publicznym, a nie żołnierzami tłumiącymi wrogów politycznych."
 political_agitation:0 "Rewolucje cyfrowe"
 political_agitation_desc:0 "Internetowy aktywizm ma teraz moc stymulowania wielkich rewolucji i wydarzeń historycznych."
 political_theory:0 "Teoria polityczna"
 political_theory_desc:0 "Jak prowadzić kraj jest pytanie wielu zaczęło zadawać i kilka teorii zostały opracowane na to, co dokładnie najlepszy plan dla państwa będzie wyglądać."
 popular_sovereignty:0 "Popularna suwerenność"
 popular_sovereignty_desc:0 "Władza państwa i rozszerzenie jego rządu mogą być tworzone i podtrzymywane tylko za zgodą jego obywateli. W wolnym rządzie, władcami są słudzy i ludzie ich przełożeni i władcy."
 portland_cement:0 "Cement Portland"
 portland_cement_desc:0 "Tak nazwany za podobieństwo do kamienia wydobywanego z wyspy Dorset w Anglii, cement ten jest skutecznym składnikiem betonu, używanym do budowy dużych konstrukcji. Jest on produkowany z wapienia i innych wspólnych materiałów, co czyni go bardzo tanim."
 potash:0 "Potas"
 potash_desc:0 "Produkowany przez spalanie drewna i składowanie popiołów do garnka wody, potaż jest stosowany w procesach chemicznych, takich jak produkcja szkła, mydła, ługu, prochu i nawozu. Podaje swoją nazwę pierwiastkowi potasu, który jest aktywnym składnikiem tych procesów."
 power_looms:0 "Zawory zasilające"
 power_looms_desc:0 "Włókno jest urządzeniem do tkania wełny, bawełny i innych włókien. Wczesne krosna uzywane do obracania nitki. "Latający wahadłowiec" wynaleziony w 1733 roku został uznany za sprowokujący rewolucję przemysłową, a wykorzystanie siły mechanicznej w tkaniu umożliwia mniej wykwalifikowanym tkaczom masową produkcję tkanin. Dodatkowe innowacje obejmują krosno Jacquard, system programowalnych kart dziurkowanych opracowany w 1804 roku do automatyzacji wzorców."
 power_of_the_purse:0 "Projekcja mocy"
 power_of_the_purse_desc:0 "Projekcja energii wykorzystuje statki do wymuszenia siły na innych krajach poprzez zwykłe zastraszanie."
 pre_modern_warfare:0 "Wczesna wojna"
 pre_modern_warfare_desc:0 "Konflikty ubiegłego roku były blade w porównaniu z zniszczeniami współczesnej wojny, ale nadal były krwawe sprawy we własnym zakresie."
 production:0 "Produkcja"
 propaganda:0 "Propaganda"
 propaganda_desc:0 "Podczas wojen rewolucyjnych i napoleońskich rządy Europy utworzyły propagandowe skrzydła, aby zdobyć publiczne poparcie dla trudności, z jakimi borykają się zwykli ludzie. Polityczne broszury i satyryczne kreskówki były rozprowadzane w miastach, podczas gdy patriotyczne wersety były pisane do śpiewania popularnych piosenek."
 puddling_furnaces:0 "Piece do pudlingu"
 puddling_furnaces_desc:0 "Do produkcji kutego żelaza z surówki wykorzystuje się piec kałuży. Piec z cegły jest podgrzewany w taki sposób, aby żelazo topniało z towarzyszącą ściółką, po której mieszanina jest mechanicznie obrabiana, jak na przykład łomem, tak aby nadmiar węgla w żelazku miał kontakt z powietrzem, tworząc tlenek węgla, podczas gdy siarka i inne zanieczyszczenia są przenoszone przez lżejszy żużel, który wznosi się na powierzchnię. Po dwóch godzinach obróbki ręcznej, "kałuża" z kutej formy żelaza i może być usunięta z pozostałych żużli. Jest to trudna, wykwalifikowana i dlatego kosztowna praca."
 quinine:0 "Szczepionka mRNA"
 quinine_desc:0 "Szczepionka mRNA jest rodzajem szczepionki, która wykorzystuje kopię cząsteczki zwanej RNA (mRNA) w celu uzyskania odpowiedzi immunologicznej."
 radio:0 "Komunikacja międzyplanetarna"
 radio_desc:0 "Używając niewidzialnych "fal" można przekazywać informacje o dużej odległości szybciej niż radio."
 railways:0 "Koleje dużych prędkości"
 railways_desc:0 "Najnowsze technologie pozwalają na bardzo szybki transport towarów i osób"
 rationalism:0 "Rewolucja kulturalna"
 rationalism_desc:0 "Rewolucja kulturalna lat 60. XX wieku wywołała zmianę postaw społecznych na całym świecie."
 realism:0 "Aparat cyfrowy"
 realism_desc:0 "Kamera cyfrowa, zwana także digicam, to kamera, która rejestruje fotografie w pamięci cyfrowej."
 reinforced_concrete:0 "BIM"
 reinforced_concrete_desc:0 "Modelowanie informacji o budynkach (BIM) zyskało powszechne przyjęcie w 2000 roku, jest cyfrową reprezentacją fizycznych i funkcjonalnych cech budynku. Ta technologia modelowania 3D pozwoliła na bardziej efektywne planowanie, projektowanie i budowę."
 repeaters:0 "Lasery"
 repeaters_desc:0 "Lasery pozwalają na koncentrację energii w określonych kierunkach do celów walki"
 rifling:0 "Lekki mechanizm bojowy"
 rifling_desc:0 "Najnowszy lekki karabin bojowy pozwala naszemu krajowi wyposażyć naszych żołnierzy w najefektywniejszą broń."
 romanticism:0 "Rejestrator wideo"
 romanticism_desc:0 "Rejestrator wideo (VCR) lub rejestrator wideo jest urządzeniem elektromechanicznym, które rejestruje analogowe audio i analogowe wideo z telewizji nadawanej lub innych źródeł AV i może odtwarzać nagranie po przewinięciu"
 rotary_valve_engine:0 "Sztuczna inteligencja"
 rotary_valve_engine_desc:0 "Wykorzystanie ptasiej grypy do masowej produkcji towarów"
 rubber_recycling:0 "Recykling gumy"
 rubber_recycling_desc:0 "Wykorzystanie "mastykatora" do żucia i reformowania starej gumy pozwala nam na recykling i ponowne użycie tego cennego materiału."
 rubberised_fabrics:0 "Tkaniny gumowane"
 rubberised_fabrics_desc:0 "Używając kauczuku naturalnego, aby połączyć dwie tkaniny lub połączyć włókna roślinne w sztuczną skórę, produkuje wodoodporne artykuły, takie jak płaszcz Mackintosh, lub elastyczne ubrania, takie jak szelki."
 rule_of_law:0 "Państwo prawa"
 rule_of_law_desc:0 "Zazwyczaj obecny w systemie rządowym z zapisaną (jak w Stanach Zjednoczonych) lub niepisaną (jak w Wielkiej Brytanii) konstytucją, Państwo prawa składa się z grupy powiązanych idei dotyczących orzecznictwa, takich jak to, że przemoc państwa jest przewidywalna, a zatem uniknięta, poprzez wyraźne określenie przez rząd tego, co jest nielegalne i jaka będzie kara za przestępstwa, oraz że agenci państwa sami podlegają przepisom, które egzekwują."
 screw_frigate:0 "Niszczyciel pocisków z przewodnikiem"
 screw_frigate_desc:0 "Niszczyciel pocisków z przewodnikiem używa pocisków, by trafić w cel, zanim dowiedzą się o istnieniu floty."
 sea_lane_strategies:0 "Przyszła strategia marynarki wojennej"
 sea_lane_strategies_desc:0 "Przyszłe strategie morskie prawdopodobnie krążą wokół SI."
 semaphore_signalling:0 "Sygnał semaforowy"
 semaphore_signalling_desc:0 "Sygnały kolejowe przekazują instrukcje pociągom działającym na liniach kolejowych, pomagając w bezpośrednim ruchu nawet wtedy, gdy lokomotywa jest w ruchu i z dala od personelu na stacji. Wykorzystanie sygnałów semaforowych, inspirowanych wojskowym systemem sygnalizacji wykorzystywanym przez wojska Napoleona, tworzy jednolity system, który wszystkie koleje mogą wykorzystywać."
 separation_of_powers:0 "Rozdzielenie uprawnień"
 separation_of_powers_desc:0 "Idea odmiennych gałęzi rządu o różnych rolach, które nadzorują się nawzajem w celu zapobiegania korupcji i nadużyciom, stała się znacznie bardziej popularna od czasu względnego sukcesu "wielkiego amerykańskiego eksperymentu", z jej konstytucją podzielającą rząd na oddziały wykonawcze, ustawodawcze i sądowe."
 sericulture:0 "Serykatura"
 sericulture_desc:0 "Starożytna i ściśle strzeżona technika uprawy jedwabników do produkcji jedwabiu."
 sewage_systems:0 "Systemy ściekowe"
 sewage_systems_desc:0 "Wzrost miast doprowadził do rzek zaduszonych ściekami, stały się czarne i pachną śmiercią. Czas spojrzeć wstecz na starożytnych, którzy budują systemy kanalizacyjne, by nieść te brudne wody z miasta."
 shaft_mining:0 "Maszyny górnicze"
 shaft_mining_desc:0 "Dzięki wdrożeniu ciężkich maszyn możemy konkurować na światowym rynku produkcji zasobów naturalnych."
 shell_gun:0 "Reactive Armor"
 shell_gun_desc:0 "Główny czołg bojowy (MBT), znany również jako czołg wojenny lub czołg uniwersalny lub po prostu czołg, jest czołgiem, który wypełnia rolę zbrojowni chroniony bezpośredni ogień i manewr w wielu nowoczesnych armii."
 slag_fertilisers:0 "Nawozy słowiaste"
 slag_fertilisers_desc:0 "Niska wartość pH odpadów z wielkich pieców i przetworników stali sprawia, że jest doskonałym dodatkiem do gleby do celów rolniczych. Wapno krzemianowe jest bardziej rozpuszczalne niż naturalny wapień lub dolomit, zwiększając zawartość fosforanów w glebie."
 socialism:0 "Prawa-Skrzydło Populizm"
 socialism_desc:0 "Populizm prawicowy, zwany również populizmem narodowym i populizmem prawym, jest ideologią polityczną łączącą politykę prawicową z retoryką populistyczną i tematami"
 society:0 "Społeczeństwo"
 enclosure:0 "Efektywne rolnictwo"
 enclosure_desc:0 "Poprzez angażowanie się w rolnictwo masowe, przy pomocy systemu rządowego, możemy zwiększyć naszą produkcję na tyle, aby konkurować na rynku światowym."
 intensive_agriculture:0 "Pestycydy"
 intensive_agriculture_desc:0 "Chemikalia stosowane w produkcji żywności eliminującej owady i bakterie."
 steam_donkey:0 "Zrównoważona produkcja"
 steam_donkey_desc:0 "Wraz z rosnącą świadomością wpływu na środowisko producenci zaczęli przyjmować bardziej zrównoważone metody produkcji."
 threshing_machine:0 "Komercyjne światło kosmiczne"
 threshing_machine_desc:0 "Zwiększa skuteczność naszych paneli słonecznych, elektrowni jądrowych i wiatraków"
 steel_frame_buildings:0 "Hologramy"
 steel_frame_buildings_desc:0 "Holografia jest techniką umożliwiającą rejestrowanie i rekonstruowanie fali. Jest on najbardziej znany jako metoda generowania obrazów trójwymiarowych, i ma szeroki zakres innych zastosowań, w tym przechowywania danych, mikroskopii, i interferometrii. Zasadniczo możliwe jest wykonanie hologramu dla każdego rodzaju fali."
 steel_railway_cars:0 "Automobil elektryczny"
 steel_railway_cars_desc:0 "Badania i rozwój pojazdów autonomicznych przyspieszyły w 2000 r. DARPA Grand Challenge (2004 i 2005), organizowana przez Departament Obrony Stanów Zjednoczonych, była ważnym kamieniem milowym, pokazującym wczesne próby samoprowadzenia samochodów."
 stormtroopers:0 "Specjalista"
 stormtroopers_desc:0 "Umieszczenie żołnierzy ludzkich przeszkolonych i specjalnie wyposażonych do niszczenia ptasiej grypy i przechwytywania jednostek."
 streamliners:0 "Streamlinery"
 streamliners_desc:0 "Nowe konstrukcje pociągów wykorzystujące nowoczesną moc trakcyjną i nową konstrukcję korpusu glinu pozwalają na niezawodne prowadzenie większej liczby pociągów przy wyższych prędkościach."
 submarine:0 "Przyszłe okręty podwodne"
 submarine_desc:0 "Przyszłe łodzie podwodne są napędzane przez przyszłą technologię, która pozwala na niszczycielskie strajki."
 multilateral_alliances:1 "Kryonika"
 multilateral_alliances_desc:0 "ryonics jest praktyką zachowania osób, które są prawnie martwe przez zamrożenie ich w bardzo niskich temperaturach, z nadzieją, że przyszła technologia medyczna może być w stanie je ożywić i wyleczyć stan, który spowodował ich śmierć."
 synthetic_dye:0 "Kauczuk syntetyczny"
 synthetic_dye_desc:0 "Włączyło to proces chemiczny, który stworzył różne rodzaje barwników w syntetyczny sposób. Zrewolucjonizował barwnik tkaniny i zakończył produkcję farb rolniczych, które stały się zbyt drogie do produkcji."
 system_gin:0 "Automobil"
 system_gin_desc:0 "Automobile umożliwiają szybki transport ludzi i towarów po całym kraju."
 telegraph:0 "Telegraph"
 telegraph_desc:0 "Elektryczność może być wykorzystywana do przekazywania sygnałów w dół linii niemal natychmiast, takich jak z kodem Morse. Głównym źródłem opóźnienia jest operator ludzki, który musi być dobrze przeszkolony do kodowania i dekodowania wiadomości, które zostały przeniesione w postaci krótkich i długich "kropek" i "kresek" hałasu."
 telephone:0 "Smart City"
 telephone_desc:0 "Integracja urządzeń IoT z infrastrukturą miejską umożliwia miastom monitorowanie i zarządzanie zasobami takimi jak woda, energia elektryczna, ruch i odpady w czasie rzeczywistym, poprawiając efektywność i zrównoważony rozwój."
 telephones:0 "Telefony"
 telephones_desc:0 "Teoretycznie wiedzieliśmy, że idea telegrafu może być możliwa, ale nie byliśmy pewni jak. Postęp w dziedzinie elektroniki sprawił, że ten pomysł wreszcie stał się możliwy i narodził się telefon."
 tin_cans:0 "Cynowe puszki"
 tin_cans_desc:0 "Koncepcja konserw pochodzi ze szklanych słoików używanych przez armie rewolucji francuskiej. Wkrótce pomysł rozprzestrzenił się na cywilny użytek. Mięso lub zupa, które zostały ugotowane wewnątrz metalowej puszki jest chronione przed narażeniem na zewnątrz świata i może być spożywane w wolnym czasie przez gospodarstwa domowe klasy średniej. Nazwa pochodzi od blachy aluminiowej, która ma cienką warstwę cyny na zewnątrz płyty żelaza lub stali w celu ochrony metalu przed rdzewieniem na otwartym powietrzu."
 trench_works:0 "Zbiornik zwiadowczy"
 trench_works_desc:0 "Urządzenia używane do wysyłania fal uderzeniowych i zagłuszania żołnierzy wroga"
 triage:0 "VLANDY Aircraft"
 triage_desc:0 "Pionowe Takeoff i Lądowanie samolotów (Vathers) to typ samolotu, który może startować i lądować pionowo bez potrzeby drogi startowej"
 urban_planning:0 "Waluta Fiat"
 urban_planning_desc:0 "Waluty Fiat to dostawy pieniężne, które nie są zabezpieczone złotem."
 urbanization:0 "Organizacje międzynarodowe"
 urbanization_desc:0 "Organizacje międzynarodowe, takie jak Organizacja Narodów Zjednoczonych, dążą do utrzymania pokoju i promowania wzrostu gospodarczego na całym świecie."
 vaccination:0 "Szczepienie"
 vaccination_desc:0 "Inokulowanie ludzi z czymś, co miało być mniej złośliwe formy choroby było znane od wieków, ale było również bardzo ryzykowne. Szczepienie, które polegało na stosowaniu mniej niebezpiecznych, ale powiązanych chorób lub przez leczenie czynników chorobotwórczych, tak że utracili zdolność do zakażenia, było znacznie bezpieczniejsze i bardziej niezawodne."
 vacuum_canning:0 "Produkcja Lean"
 vacuum_canning_desc:0 "Lean Manufacturing, koncepcja, która pojawiła się w latach dziewięćdziesiątych, koncentruje się na ograniczeniu odpadów i poprawie wydajności systemów produkcyjnych. Podkreśla ciągłą poprawę procesów poprzez wyeliminowanie działań niezwiązanych z dodawaniem wartości, poprawę jakości i zwiększenie satysfakcji klienta."
 vulcanization:0 "Drony autonomiczne"
 vulcanization_desc:0 "Drony dostawcze przeszły poza fazy eksperymentalne, a firmy takie jak Amazon i Wing testują komercyjne systemy dostarczania dronów, zdolne do szybkiego i skutecznego przemieszczania pakietów na obszarach miejskich i wiejskich."
 wargaming:0 "Symulacje walki"
 wargaming_desc:0 "Wyśmiewając wyimaginowane scenariusze wojenne i praktykując strategię, można poprawić zdolności bojowe oficerów."
 water_treatment:0 "Uzdatnianie wody"
 water_treatment_desc:0 "Znaleziono, że woda przenosi choroby do naszych domów. Nadal nauka ma odpowiedź, możemy po prostu oczyścić wodę ponownie poprzez zastosowanie filtracji i zabiegów chemicznych."
 wood_pulp_papermaking:0 "Produkcja papieru z drewna"
 # gold_standard_desc: "This meant a currency system based on gold. Money was rather expensive to produce by the government and this could sometimes result in a low of money stock. However, the good thing was that the gold prices were rather stable and the trust in gold was high, making the currency stable."
 # savings_banks_desc: "The middle-class is growing larger and wealthier thanks to education and a strong work ethic. Many individuals wish to be part of railways through Africa; dams across the Nile; fleets of ocean Greyhounds; majestic, self-amortizing canals; plantations of ripening tea; all from tuppence prudently, fruitfully, frugally invested (to be specific) in the Dawes-Tomes-Mousely-Grubbs Fidelity Fiduciary Bank."
 # silver_standard_desc: "This meant a currency system based on silver. Money was cheaper to produce by the government which meant that there was rarely any lack of money in the country. However, the problem was that the silver prices had a tendency to be dominated by gold prices, which meant that foreign trade was often suffering."
#  acidic_and_basic_converters: "Acidic and Basic Converters"
#  acidic_and_basic_converters_desc: "The original Bessemer converters had a lining of insulating clay between the walls and the molten iron. The #clay is acidic and affects the composition of the resulting steel. By replacing the clay with basic (alkaline) materials such as magnesite, chromite or dolomite, or more acidic materials such as ganister, the process can be fine tuned to remove even more impurities, depending upon the content of the iron ore."
#  fluid_compressed_steel: "Fluid Compressed Steel"
#  fluid_compressed_steel_desc: "This process involves the use of a hydraulic forging press to put the steel under great pressure while still a #fluid. This squeezes the tiny pockets of gas impurities out of the cooling ingots, allowing for a much higher quality steel by preventing the #formation of blowholes and piping."
#  global_trade_desc: "By the end of the 18th century, the world-system had encompassed almost the entire globe, with raw materials being imported #from the colonies and peripheral nations and turned into finished goods in the global core, to be exported in turn."
#  guilds: "Guilds"
#  guilds_desc: "The guild system was a way of organizing labor which mandated participation in the guild and in advancing through its ranks in order #to practice the guild trade within a city. While it protected the living standards of the guild members and supposedly ensured better quality #work, it also raised prices and stymied innovation."
#  hydraulic_forging_press: "Hydraulic Forging Press"
#  hydraulic_forging_press_desc: "A hydraulic forging press applies applies massive force, up to thousands of pounds per square inch, to a material #that is being worked while hot. An engine drives water, air or hydraulic fluid through valves connected to a piston, which in turn presses the #die onto the material. The valves can be turned on and off by the operator, allowing the material to be manipulated and precise amounts of force #applied at will."
#  mutualism_desc: "An economic theory usually associated with anarchism, mutualism opposes capital interest but advocates free markets and advocates #the formation of  mutual savings banks as a method for loans."
#  news_agencies: "News Agencies"
#  news_agencies_desc: "Organizations which sell news reports to various media, such as newspapers. This allows for media to include reports of #events and developments beyond the reach of their own bureaus and international news to be reported even in local media."
#  one-nationism: "One-nationism"
#  one-nationism_desc: "A type of conservative politics wherein social obligation and responsibility towards the poor and needy is combined with #traditional conservative ideals. Opposed to class struggle, one-nation conservatives seek to create a hierarchy wherein the classes support each #other."
#  percussion_oil_drilling: "Percussion Oil Drilling"
#  percussion_oil_drilling_desc: "When using a percussion drill, the drill-bit is raised by hand and then released to bite into the earth under the #force of gravity. Depths of up to around thirty metres are possible using this technique."
#  private_banks: "Private Banks"
#  private_banks_desc: "The wealthy merchant families of city states, and the royal families of European monarchies, need somewhere safe to keep #their piles of gold and someone to look after their finances. The first banks were created with this goal in mind."
#  ricardian_economics: "Ricardian Economics"
#  ricardian_economics_desc: "David Ricardo formalized several concepts that made up the Classical School of Economics, such as economic rent, the #labor theory of value, and comparative advantage."
#  self_acting_looms_desc: "Gradual improvements in loom technology have transformed the weaving industry and vastly increased the output of fabrics #factories. By using mechanical power for more and more operations, the role of the weaver is reduced to merely keeping the machine running and #clearing blockages. Children are especially useful for this as they can crawl into smaller spaces than adults. Shutting the machines down while #such work is carried out has been judged to be less profitable than allowing for the occasional child to be mangled."
#  smithian_economics: "Smithian Economics"
#  smithian_economics_desc: "Building upon the ideas of the earlier Physiocrats, with their agrarian opposition to the 'unproductive labor' of the #feudal system, Adam Smith led an attack on mercantilism which founded the Classical School of Economics."
#  steam_engines: "Steam Engines"
#  steam_engines_desc: "Pioneers in steam technology usually had uses other than locomotion in mind. For example, Richard Trevithick built huge #engine houses that dot the Cornish landscape to keep the tin mines free from flooding."
#  steam_hammer: "Steam Hammer"
#  steam_hammer_desc: "Hammering out metals is useful for both shaping and alloying the material. When used on pig iron, this creates wrought iron or #mild steel, the difference being how much carbon is left in the alloy. The use of steam means both more efficiency and better precision than #hammering out the alloy by hand."
#  steam_lathes: "Steam Lathes"
#  steam_lathes_desc: "The lathe is a machine used for boring holes of various shapes and sizes into materials, or for otherwise whittling them down #symmetrically. Exploiting steam power to drive lathes allows industry to use more precision in engineering."
#  stock_exchanges: "Stock Exchanges"
#  stock_exchanges_desc: "Organized trading of financial instruments dates back to the Italian city states and the Dutch Republic. A stock exchange #brings together buyers and sellers of assets such as government debt and shares in companies."#
#  tunnelling_shields: "Tunnelling Shields"
#  tunnelling_shields_desc: "When digging a mine shaft or railway tunnel, supporting the vast weight of the earth above the workers is vital for the #integrity of the project. A tunnelling shield is a mobile structure made of steel that provides temporary support on the active site of digging. #As the tunnelling shield is moved along, such as on a railway track, a more permanent support is laid, such as brickwork or timbers. The first #use of such a device was in the construction of the Thames Tunnel in 1825 by Anglo-French engineer Marc Isambard Brunel, the father of the more #famous Isambard Kingdom Brunel."
# alienation: "Alienation"
# alienation_desc: "The creation of the capitalist means of production has fundamentally altered the relationship of the worker to his work. No longer is he the craftsmen who creates something unique or the farmer who gains a share of the produce. In his production he is able to objectify his individuality and his character. Now though the capitalist means of production estranges a person from their very humanity, they are no longer the director of their own actions and through that they gain a profound sense of alienation."
# experimental_psychology: "Experimental Psychology"
# experimental_psychology_desc: "The human mind is a very complicated things, what do people experience when they receive a sensory stimulus and is it the same for you as it is for me? Trying to measure these things is no easy manner, but the recent advancements in the field of psychology have created a new field called experimental psychology where tests can be done to see how people react to stimuli."
# global_trade: "Global Trade"
# historical_materialism: "Historical Materialism"
# historical_materialism_desc: "What is society? This is a complicated question but if we were to define society as the union of the productive capacity and the relationships people have to the means of production we can begin to analyze past societies and how they have developed and evolved over time. We call this methodological approach Historical Materialism."
# individualism_desc: "A philosophy focused on the interests, happiness and autonomy of the individual. This includes the right of the individual to pursue its own self-interest, conclude for itself what is true and false, to think and act independently of society."
# institutionalization: "Institutionalization"
# institutionalization_desc: "If we want to expand the role of the state we need to expands the means the state has to deliver these roles. The building up the institutions of the state are the means to doing this. This steadily institutionalization of functions that were previously in the private sphere also bring along profound societal changes as well."
# pragmatism: "Pragmatism"
# pragmatism_desc: "The problem with philosophers is that they seek knowledge for knowledge sake and they also seek to create a nice unchanging universe to suit their theories. Pragmatism explicitly rejects these two tenants. Knowledge should actually be viewed only from the point of view of what practical use it has and we should accept that the universe itself is ever changing."
# religion_of_humanity: "Religion of Humanity"
# religion_of_humanity_desc: "The rise of secularism has started to free our people from the chains of superstition that religion forces on people but at the same time we lost the societal cohesion that organized religion provided. The religion of humanity offers the social cohesion of organized religion without the superstition. The cynics describe at as Catholicism minus Christianity but it also offers all the things a religion should."
# self_acting_looms: "Self-Acting Looms"
# transcendentalism: "Transcendentalism"
# transcendetalism_desc: "Transcendentalism was a philosophical movement that was founded by the German philosopher Immanuel Kant in his book Critique of Pure Reason published in 1781. It has also been described as critical philosophy as it sees philosophy's role as that of criticism rather than justification of knowledge. The task of philosophy shifts for being about establishing theories about knowledge and instead subjecting these theories to critical review to see who valid they are."
