 # Labour Associations
 lawgroup_labour_associations: "Stowarzyszenie Pracowników"
 lawgroup_labour_associations_desc: "Przepisy nałożone na stowarzyszenia pracowników i rzemieślników."

 law_guild_system: "System Gildii"
 law_guild_system_desc: "System, w którym kwalifikowanie się do zatrudnienia w określonych dziedzinach zależy od członkostwa w sformalizowanej jednostce lub gildii handlowej."
 law_combination_acts: "Akty łączone"
 law_combination_acts_desc: "Tworzenie wszelkiego rodzaju związków zawodowych jest zakazane przez prawo."
 law_anti_strike_laws: "Prawa antystrajkowe"
 law_anti_strike_laws_desc: "Chociaż zezwala się na tworzenie związków zawodowych, strajki i niektóre formy negocjacji zbiorowych są zakazane."
 law_right_to_associate: "Prawo do stowarzyszania się"
 law_right_to_associate_desc: "Nie nakłada się specjalnych ograniczeń na tworzenie i działalność stowarzyszeń pracowniczych."
 law_corporatized_unions: "Związki korafinowane"
 law_corporatized_unions_desc: "Związki zawodowe podlegają kontroli państwa poprzez obowiązkowe połączenie w jedną unię krajową lub włączenie istniejących stowarzyszeń do funkcji państwowych."


# Luddites
 law_industry_banned: "Przemysł zakazany"
 law_industry_banned_desc: "Pogląd ekonomiczny, który odrzuca przemysł ciężki i automatykę, preferując owoce uczciwej pracy nad bezdusznymi maszynami."
 industry_banned_tt: "Budowa #bold Przemysł ciężki #! budynki"
 industry_banned_destroy_tt: "@warning! Wszystkie #bold Przemysł ciężki #! budynki w tym kraju zostaną zdemontowane"
 ideology_luddite: "Luddite"
 ideology_luddite_desc: "Luddici sprzeciwiają się automatyzacji przemysłowej, a w bardziej skrajnych przypadkach samej branży."

  
 law_extraction_economy: "Gospodarka wydobywcza"
 law_extraction_economy_desc: "Kolonialny system gospodarczy, który koncentruje się na maksymalnym wydobyciu kapitału na korzyść metropolii."

# Land Reform Laws
 lawgroup_land_reform: "Reforma gruntów"
 lawgroup_land_reform_desc: "Prawa regulujące grunty rolne i ludzi, którzy je pracują."
 law_tenant_farmers: "Tubylcy"
 law_tenant_farmers_desc: "Grunty rolne są własnością dziedzicznych elit. Pracownicy nie są związani z ziemią i mogą szukać alternatywnego zatrudnienia, jeśli go znajdą."
 law_homesteading: "Gospodarstwa domowe"
 law_homesteading_desc: "Rolnicy roszczą sobie prawo do działki, na której pracują wraz z najemcami."
 law_commercialized_agriculture: "Rolnictwo komercyjne"
 law_commercialized_agriculture_desc: "Rolnictwo jest przedsiębiorstwem jak każdy inny, podlegającym siłom rynkowym i posiadającym kapitał."
 law_collectivized_agriculture: "Rolnictwo zbiorowe"
 law_collectivized_agriculture_desc:1 "Grunty rolne są organizowane na działkach prowadzonych przez grupy rolników jako wspólne przedsiębiorstwo."

