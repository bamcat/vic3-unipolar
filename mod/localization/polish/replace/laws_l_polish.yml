l_polish:
  
  # Leader Ideologies
 ideology_moderate:0 "Średni"
 ideology_moderate_desc:0 "#lore Ten lider jest uważany za umiarkowanego w swojej grupie interesów, bez szczególnej ideologii własnej. #!"
 
 ideology_traditionalist:0 "Tradycjonalista"
 ideology_traditionalist_desc:0 "#lore Ten lider wierzy w utrzymanie tradycyjnych zwyczajów, postrzeganie ich jako rozszerzenia prawa naturalnego. #!"

 ideology_traditionalist_minoritarian: "Tradycjonista Minoritary"
 ideology_traditionalist_minoritarian_desc:0 "#lore Ten lider wierzy w utrzymanie tradycyjnych zwyczajów, postrzeganie ich jako rozszerzenia prawa naturalnego. Podczas gdy ich kraj pozostaje pod rządami innej religii, sprzeciwią się narzucaniu ludności religii państwowej. #!"

 ideology_atheist:1 "Nihilista"
 ideology_atheist_desc:1 "#lore Lider ten za wszelką cenę traktuje priorytetowo kwestionowanie i obalanie tradycjonalistycznego porządku społecznego i instytucji społecznych, starając się oczyścić grunt dla wszechstronnego rewolucyjnego społeczeństwa. #!"

 ideology_republican_leader:0 "Republikański"
 ideology_republican_leader_desc:0 "#lore Ten przywódca stara się ustanowić republikę rządzoną przez wybranych urzędników. #!"

 ideology_radical:0 "Radykalny"
 ideology_radical_desc:0 "#lore Ten przywódca dąży do radykalnych, liberalnych reform, które sprzyjają demokratycznym ideałom. #!"

 ideology_abolitionist:0 "Abolicjonista"
 ideology_abolitionist_desc:0 "#lore Ten przywódca uważa niewolnictwo za odrażające pogwałcenie praw człowieka i stara się je znieść ze świata. #!"

 ideology_slaver:0 "Niewolnik"
 ideology_slaver_desc:0 "#lore Ten przywódca postrzega niewolnictwo jako naturalną część ich stylu życia i sprzeciwia się jego zniesieniu. #!"

 ideology_feminist:0 "Feminista"
 ideology_feminist_desc:0 "#lore Lider ten utrzymuje, że kobiety są równe mężczyznom i dążą do rozszerzenia swoich praw jako obywatele. #!"
 
 ideology_reformer:0 "Reformator"
 ideology_reformer_desc:0 "#lore Ten lider chce dokonać kilku dodatkowych zmian, aby społeczeństwo było trochę bardziej równe. Ale nie za dużo. #!"

 ideology_pacifist:0 "Pacifist"
 ideology_pacifist_desc:0 "#lore Ten lider wierzy w brak przemocy jako ich sposób i pokój jako cel. #!"

 ideology_jingoist_leader:0 "Jingoist"
 ideology_jingoist_leader_desc:0 "#lore Ten lider opowiada się za agresywną polityką zagraniczną, podkreślając gotowość do pójścia na wojnę, aby osiągnąć swoje ambicje. #!"

 ideology_royalist:0 "Royalista"
 ideology_royalist_desc:0 "#lore Lojalność tego przywódcy jest wobec monarchii i jej prawowitego władcy. #!"
 
 ideology_social_democrat:0 "Socjaldemokrata"
 ideology_social_democrat_desc:0 "#lore Lider ten wierzy w osiągnięcie społeczeństwa socjalistycznego poprzez reformę parlamentarną. #!"

 ideology_communist:0 "Komunistyczny"
 ideology_communist_desc:0 "#lore Ten przywódca wierzy, że klasa robotnicza przejmuje władzę polityczną wszelkimi środkami. #!"

 ideology_vanguardist:0 "Vanguardict Przewodniczący"
 ideology_vanguardist_desc:0 "#lore Ten przywódca wierzy w osiągnięcie socjalistycznego społeczeństwa poprzez awangardową partię oddanych radykałów. #!"

 ideology_fascist:0 "Faszysta"
 ideology_fascist_desc:0 "#lore Ten przywódca jest ultranacjonalistą, który popiera ożywienie postrzeganych tradycyjnych, autorytarnych wartości w nowoczesnym kontekście. #!"

 ideology_anarchist:0 "Anarchista"
 ideology_anarchist_desc:0 "#lore Ten przywódca dąży do zniesienia hierarchii, autorytetu i państwa, pozostawiając ludzi samym sobie. #!"

 ideology_ethno_nationalist:0 "Nacjonalista etniczny"
 ideology_ethno_nationalist_desc:0 "#lore Ten przywódca wierzy w naród określony na tle etnicznym. #!"

 ideology_theocrat:0 "Theocrat"
 ideology_theocrat_desc:0 "#lore Ten lider wierzy w stan prowadzony przez kościół zgodnie z wartościami doktrynalnymi. #!"

 ideology_market_liberal:0 "Liberalny rynek"
 ideology_market_liberal_desc:0 "#lore Lider ten uważa, że niewidzialna ręka wolnego rynku powinna być siłą napędową gospodarki narodowej."
 
 ideology_liberal_leader:0 "Liberalne"
 ideology_liberal_leader_desc:0 "#lore Przywódca ten traktuje priorytetowo instytucję demokracji i sprzeciwia się bezspornym rządom nad narodem. #!"

  # Interest Group Ideologies

 ideology_paternalistic:0 "Paternalistyczne"
 ideology_paternalistic_desc:0 "#lore Grupa ta ma mało wiary w populus próbuje rządzić się, wierząc, że potrzebują przewodnictwa tradycyjnej arystokracji. #!"
  
 ideology_patriarchal:0 "Patriarchal"
 ideology_patriarchal_desc:0 "#lore Grupa ta uważa, że mężczyźni powinni mieć władzę polityczną i że kobiety powinny być posłuszne swoim ojcom i mężom. #!"
   
 ideology_republican:0 "Republikański"
 ideology_republican_desc:0 "#lore Grupa ta uważa, że najlepsi przywódcy są wybierani w głosowaniu publicznym i popiera republikańską formę rządu. #!"
  
 ideology_populist:0 "Populista"
 ideology_populist_desc:0 "#lore Grupa ta wierzy w zarządzanie przez ludzi i stara się rozszerzyć franczyzę na wszystkie klasy społeczne. #!"
  
 ideology_stratocratic:0 "Strukratyczne"
 ideology_stratocratic_desc:0 "#lore Grupa ta sprzyja utrzymaniu hierarchii w społeczeństwie poprzez tradycyjne formy opodatkowania i stosunków pracy. #!"
  
 ideology_oligarchic:0 "Oligarchic"
 ideology_oligarchic_desc:0 "#lore Ta grupa sprzyja monopolizacji w rękach świeckiego państwa kontrolowanego przez lokalne oligarchie. #!"

 ideology_laissez_faire:0 "Laissez- Faire Przewodniczący"
 ideology_laissez_faire_desc:0 "#lore Grupa ta wierzy w swobodny przepływ handlu i siły roboczej, faworyzując ocenę rynków nad oceną rządów. #!"
  
 ideology_individualist:0 "Osoba"
 ideology_individualist_desc:0 "#lore Grupa ta uważa, że każda osoba jest odpowiedzialna za swój los i sprzeciwia się rządowym programom w celu świadczenia usług, które mogą być opłacane przez jednostkę. #!"
  
 ideology_pious:0 "Gorzkie"
 ideology_pious_desc:0 "#lore Ta grupa uważa, że zasady religijne są absolutnymi prawdami moralnymi i że powinny przenikać całe społeczeństwo. #!"
  
 ideology_particularist:0 "Cząsteczka"
 ideology_particularist_desc:0 "#lore Grupa ta chce lokalnej autonomii w swojej pracy, bez feudalnych przepisów indentured servitude. #!"
  
 ideology_isolationist:0 "Izolacjonista"
 ideology_isolationist_desc:0 "#lore Grupa ta chce, aby państwo skupiło się na sprawach wewnętrznych, przeciwstawiając się ambicjom ekspansji na obce ziemie oraz imigracji z nich. #!"
  
 ideology_moralist:0 "Moralista"
 ideology_moralist_desc:1 "#lore Grupa ta ma silną wiarę w religijny porządek moralny i postrzega różnorodność opinii jako zagrożenie dla tego porządku. #!"
  
 ideology_jingoist:0 "Jingoist"
 ideology_jingoist_desc:0 "#lore Grupa ta wierzy w agresywną politykę zagraniczną i utrzymuje armię, aby ją poprzeć. #!"

 ideology_loyalist:0 "Lojalista"
 ideology_loyalist_desc:0 "#lore Grupa ta uważa, że każdy obywatel powinien płacić składki na sfinansowanie podstawowych funkcji państwa. #!"
 
 ideology_meritocratic:0 "Meritokratic"
 ideology_meritocratic_desc:0 "#lore Grupa ta uważa, że sukces został osiągnięty i że ci, którzy go osiągnęli zasługują na towarzyszącą im odpowiedzialność i bogactwo. #!"
   
 ideology_patriotic:0 "Patriotyczne"
 ideology_patriotic_desc:0 "#lore Grupa ta jest zawzięcie oddana swojemu krajowi i chce surowych środków wobec tych, którzy rozprzestrzeniają niezgodę. #!"
  
 ideology_liberal:0 "Liberalne"
 ideology_liberal_desc:0 "#lore Grupa ta postrzega wolność i równość prawną jako ważne wartości, które należy chronić. #!"
  
 ideology_anti_clerical:0 "Anty- kleryczne"
 ideology_anti_clerical_desc:1 "#lore Grupa ta sprzeciwia się wpływowi zorganizowanej religii na system polityczny i edukacyjny. Uważają, że racjonalne umysły powinny być na czele zarządzania. #!"
  
 ideology_proletarian:0 "Proletariat"
 ideology_proletarian_desc:0 "#lore Grupa ta postrzega politykę poprzez obiektyw walki klasowej i strony z pracownikami w tym konflikcie. #!"
  
 ideology_egalitarian:0 "Egalitarny"
 ideology_egalitarian_desc:0 "#lore Grupa ta uważa, że równe i humanitarne traktowanie ludzi powinno być podstawą polityki politycznej."
   
 ideology_anti_slavery:0 "Przeciw niewolnictwu"
 ideology_anti_slavery_desc:0 "#lore Ta grupa nienawidzi niewolnictwa i postrzega go jako cechę barbarzyńskiej przeszłości. #!"
 
 ideology_pro_slavery:0 "Niewolnictwo"
 ideology_pro_slavery_desc:0 "#lore Grupa ta postrzega niewolnictwo jako niezbędną część dobrze funkcjonującego społeczeństwa. #!"
  
 ideology_reactionary:0 "Reakcja"
 ideology_reactionary_desc:0 "#lore Ta grupa jest nostalgiczna dla przeszłości, prawdziwe lub wyobrażone, gdzie tylko królowie rządzili jednolite społeczeństwo. #!"
 
 ideology_plutocratic:0 "Plutokratic"
 ideology_plutocratic_desc:0 "#lore Grupa ta uważa, że bogaci udowodnili swoją wartość jako decydenci i tworzą elitę intelektualną dobrze nadającą się do określania przebiegu społeczeństwa. #!"

 ideology_agrarian:0 "Agrarian"
 ideology_agrarian_desc:0 "#lore Grupa ta uważa, że polityka gospodarcza powinna koncentrować się na rolnictwie i interesie rolników. #!"

 ideology_corporatist: "Corporatist"
 ideology_corporatist_desc: "#lore Grupa ta wierzy w rozwiązywanie konfliktów między klasami poprzez stosowanie zasad religijnych. #!"

 ideology_corporatist_leader: "Corporatist"
 ideology_corporatist_leader_desc: "#lore Lider ten wierzy w rozwiązanie konfliktu klasowego poprzez ustępstwa od klasy wyższej i współpracę między różnymi grupami społecznymi. #!"

 ideology_agrarian_jeffersonian:0 "Jeffersonian"
 ideology_agrarian_jeffersonian_desc:0 "#lore Grupa ta uważa, że klasa drobnych rolników stanowi fundament kraju, wspierając agarianizm jako podstawę wolnego społeczeństwa. #!"

  # flavor ideologies

 ideology_republican_paternalistic:0 "Elitarny"
 ideology_republican_paternalistic_desc:0 "#lore Ta grupa faworyzuje rządy wylądowanej elity, ale nadal wspiera republikańską formę rządu. #!"

 ideology_scholar_paternalistic:0 "Scholar- Gentry"
 ideology_scholar_paternalistic_desc:0 "#lore Grupa ta wolałaby, aby kraj rządzony przez monarchę doradzał mądry i wykształcony. #!"

 ideology_junker_paternalistic:0 "Junker"
 ideology_junker_paternalistic_desc:0 "#lore Grupa ta uważa, że szlachta najlepiej nadaje się do prowadzenia kraju do jego przyszłości. #!"

 ideology_papal_paternalistic:1 "Baronial"
 ideology_papal_paternalistic_desc:0 "#lore Grupa ta wspiera autorytet Papieża i tradycyjną hierarchię Stolicy Apostolskiej. #!"

 ideology_confucian:0 "Konfucjan"
 ideology_confucian_desc:0 "#lore Grupa ta wierzy w nauki Konfucjusza, wspierając porządek społeczny, który uważają za zakorzeniony w prawach Nieba. #!"

 ideology_bakufu:0 "Bakufu"
 ideology_bakufu_desc:0 "#lore Grupa ta wspiera shogunate i uważa, że władza należy do klasy wojowników. #!"
 
 ideology_shinto_moralist:0 "Ostrość Shinto"
 ideology_shinto_moralist_desc:0 "#lore Ta grupa wierzy w boskość cesarza i łączy tę wiarę ze starym czczeniem bogów i duchów. #!"

 ideology_caudillismo:0 "Caudillismo"
 ideology_caudillismo_desc:0 "#lore Grupa ta ma tendencję do wspierania przywódców mocnych ludzi z wojskowymi środowisk nad konstytucyjną praworządnością. #!"

 ideology_heavenly_kingdom_theocratic:0 "Bóg Worshipper"
 ideology_heavenly_kingdom_theocratic_desc:0 "#lore Grupa ta popiera ideę, że wszyscy ludzie stają się synami i córkami Bożymi po odkupieniu przez Chrystusa i sprzyja teokratycznej formie rządu."

 ideology_papal_moralist:0 "Pontifical"
 ideology_papal_moralist_desc:0 "#lore Grupa ta ma silne oddanie utrzymaniu zarówno doczesnych jak i kościelnych mocy Kościoła Katolickiego. #!"

 ideology_liberal_modern: "Liberalne"
 ideology_liberal_modern_desc: "#lore Grupa ta postrzega wolność i równość prawną jako ważne wartości, które należy chronić. #!"

 ideology_egalitarian_modern: "Egalitarny"
 ideology_egalitarian_modern_desc: "#lore Grupa ta uważa, że równe i humanitarne traktowanie ludzi powinno być podstawą polityki politycznej."

 ideology_enclavist: "Enklawista"
 ideology_enclavist_desc: "#lore Interesy tej grupy polegają na zachowaniu jej pozycji jako kolonialnej klasy rządzącej, odizolowaniu się od przedmiotów i zachowaniu jej władzy za pomocą skomplikowanego i nieodpowiedzialnego systemu biurokratycznego. #!"

 ideology_malthusian: "MaltuzjańskiName"
 ideology_malthusian_desc: "#lore Grupa ta podpisuje się pod teoriami ekonomicznymi stworzonymi przez Thomasa Malthusa, wierząc, że wszelkie wysiłki mające na celu złagodzenie ubóstwa będą podejmowane w sposób samowystarczalny ze względu na wynikający z tego wzrost populacji. #!"

 liberal_and_egalitarian_amended_tt: "[GetIdeology('ideology_liberal').GetName] i [GetIdeology('ideology_egalitarian').GetName] [Concept('concept_ideology','$concept_ideologies$')] 'Stan na $lawgroup_rights_of_women$ ulegnie zmianie"

 # Movement Ideologies

 ideology_royalist_movement: "Royalista"
 ideology_royalist_movement_desc: "#lore Lojalność tej grupy jest wobec monarchii i jej prawowitego władcy. #!"

 ideology_absolutist_movement: "Absolutyst"
 ideology_absolutist_movement_desc: "#lore Grupa ta jest lojalna instytucji monarchii i wspiera jej pozyskanie z mocą absolutną. #!"

 ideology_anarchist_movement: "Anarchista"
 ideology_anarchist_movement_desc: "#lore Grupa ta dąży do zniesienia hierarchii, władzy i państwa, pozostawiając ludzi samym sobie. #!"

 ideology_communist_movement: "Komunistyczny"
 ideology_communist_movement_desc: "#lore Grupa ta wierzy, że klasa pracująca przejmuje władzę polityczną wszelkimi niezbędnymi środkami. #!"

 ideology_vanguardist_movement: "Vanguardict Przewodniczący"
 ideology_vanguardist_movement_desc: "#lore Grupa ta wierzy w osiągnięcie socjalistycznego społeczeństwa poprzez awangardową partię oddanych radykałów. #!"

 ideology_radical_movement: "Radykalny"
 ideology_radical_movement_desc:1 "#lore Grupa ta dąży do radykalnych, liberalnych reform sprzyjających demokratycznym ideałom. #!"

 ideology_liberal_movement: "Liberalne"
 ideology_liberal_movement_desc: "#lore Grupa ta ceni instytucję demokracji i wspiera zagwarantowanie podstawowych wolności obywatelom. #!"

 ideology_pluralist_movement_1: "Pluralista"
 ideology_pluralist_movement_1_desc: "#lore Grupa ta pragnie chronić swoje tradycje kulturowe, tożsamość i język. #!"

 ideology_pluralist_movement_2: "$ideology_pluralist_movement_1$"
 ideology_pluralist_movement_2_desc: "$ideology_pluralist_movement_1_desc$"

 ideology_pluralist_movement_3: "$ideology_pluralist_movement_1$"
 ideology_pluralist_movement_3_desc: "$ideology_pluralist_movement_1_desc$"

 ideology_pluralist_movement_4: "$ideology_pluralist_movement_1$"
 ideology_pluralist_movement_4_desc: "$ideology_pluralist_movement_1_desc$"

  # Government Principles group
 lawgroup_governance_principles:0 "Zasady zarządzania"
 lawgroup_governance_principles_desc:0 "Fundacjonalne zasady i autorytet, którym rządzi wasz kraj. Określa, kto jest szefem państwa."
  
 law_chiefdom:0 "Przewodniczący"
 law_chiefdom_desc:0 "Hierarchiczny przedindustrialny system polityczny oparty na pokrewieństwie, z wodzem lub starszym z wybitnej rodziny na czele. Nie jest w stanie sprawnie centralnie kontrolować całych stanów."
 law_monarchy:0 "Monarchia"
 law_monarchy_desc:0 "Forma zarządzania, gdzie arystokratyczna dynastia reprezentuje narodową tożsamość kraju i daje uprawnienia wykonawcze królewskiemu szefowi dynastii."
 law_presidential_republic:0 "Republika Prezydencka"
 law_presidential_republic_desc:0 "System polityczny, w którym władzę mają obywatele i ich wybrani przedstawiciele. Republiki mają wybrany lub nominowany $RULER_TITLE_PRESIDENT$ jako szef państwa."
 law_parliamentary_republic:0 "Republika Parlamentarna"
 law_parliamentary_republic_desc:0 "System polityczny, w którym władzę mają obywatele i ich wybrani przedstawiciele. Lider prawodawcy pełni funkcję szefa państwa i jest określany jako $RULER_TITLE_CHANCELLOR$."
 law_theocracy:0 "Teokracja"
 law_theocracy_desc:0 "Rządem rządzą duchowni i ich interpretacja Pisma Świętego. Głowa państwa jest nominalnie osobą czczącą, chociaż w praktyce jest światowym przedstawicielem wybranym przez zasługę, status lub narodziny."
 law_council_republic:0 "Republika Rady"
 law_council_republic_desc:0 "System polityczny, w którym pracownicy wybierają delegatów do lokalnych rad. Rozszerza pojęcia organizacji pracy na ogólne zarządzanie."
 law_corporate_state:0 "Państwo korporacyjne"
 law_corporate_state_desc:0 "System polityczny oparty na instytucjonalnej współpracy między oficjalnie uznanymi grupami korporacyjnymi. Państwo służy jako forum negocjacji między różnymi klasami społecznymi."
 law_corporate_state_1:0 "Państwo korporacyjne"
 law_corporate_state_1_desc:0 "System polityczny oparty na instytucjonalnej współpracy między oficjalnie uznanymi grupami korporacyjnymi. Państwo służy jako forum negocjacji między różnymi klasami społecznymi."
  # Free speech group
 lawgroup_free_speech:0 "Free Speech"
 lawgroup_free_speech_desc:0 "Prawo regulujące wolność słowa i prawo do publicznego zgromadzenia."
  
 law_outlawed_dissent:0 "Niezgodne z prawem"
 law_outlawed_dissent_desc:0 "Krytykowanie rządu jest uważane za zdradę i nielegalne."
 law_censorship:0 "Cenzura"
 law_censorship_desc:0 "Istnieje aktywna cenzura prasy i nie ma gwarantowanego prawa do montażu."
 law_right_of_assembly:0 "Prawo Zgromadzenia"
 law_right_of_assembly_desc:0 "Obywatele korzystają z prawa do zgromadzeń publicznych."
 law_protected_speech:0 "Chroniona mowa"
 law_protected_speech_desc:0 "Ochrona wolności słowa jest prawnie zagwarantowana."
  
  # Army Model group
 lawgroup_army_model:0 "Model wojskowy"
 lawgroup_army_model_desc:0 "Jak twoja armia jest zorganizowana i regulowana."
  
 law_peasant_levies:0 "Lewies wiejski"
 law_peasant_levies_desc:0 "Główna siła armii pochodzi od zwerbowanej piechoty z zerem do podstawowego szkolenia."
 law_national_militia:0 "Milicja Narodowa"
 law_national_militia_desc:0 "Stała armia jest mała, ale lokalne milicje mogą być aktywowane, aby bronić swoich domów."
 law_mass_conscription:0 "Mass Conscription"
 law_mass_conscription_desc:0 "Duża liczba konskryptów piechoty można aktywować w razie potrzeby, aby uzupełnić profesjonalną armię."
 law_professional_army:0 "Armia zawodowa"
 law_professional_army_desc:0 "Armia składa się z dobrze wyszkolonych, zawodowych stałych."
  
  # Distribution of Power group
 lawgroup_distribution_of_power:0 "Podział mocy"
 lawgroup_distribution_of_power_desc:0 "Jak rozprowadzana jest władza polityczna. Określa, komu odpowiada szef państwa."
  
 law_autocracy:0 "Autokracja"
 law_autocracy_desc:0 "Głowa Państwa jest absolutna i są one pociągane do odpowiedzialności przed żadną ziemską mocą."
 law_oligarchy:0 "Oligarchia"
 law_oligarchy_desc:1 "Szef państwa dzieli władzę i odpowiedzialność z małą grupą potężnych, niewybranych osób."
 law_landed_voting:0 "Głosowanie nad lądowaniem"
 law_landed_voting_desc:0 "Ci, którzy posiadają ziemię lub własność kapitałową, otrzymują prawo głosu."
 law_wealth_voting:0 "Głosowanie na bogactwo"
 law_wealth_voting_desc:1 "Bogaci obywatele mają prawo głosu. Mężczyznom z większym majątkiem przyznano więcej głosów."
 law_census_voting:0 "Scenariusz Sufraż"
 law_census_voting_desc:0 "Literaci o szczególnym statusie mają prawo głosu."
 law_universal_suffrage:0 "Uniwersalny sufraż"
 law_universal_suffrage_desc:0 "Każdy dorosły mężczyzna ma równy głos."
 law_elder_council:0 "Rada Starszych"
 law_elder_council_desc:0 "Najbardziej czczony człowiek ma coś do powiedzenia w rządzeniu krajem."
 law_anarchy:0 "Anarchia"
 law_anarchy_desc:1 "Społeczności lokalne rządzą własnymi sprawami i wysyłają przedstawicieli, aby służyli ograniczonym terminom w większych radach spółdzielczych. Bez formalnych hierarchii organ centralny jest trudny do wykonania."
 law_single_party_state: "Państwo jednej strony"
 law_single_party_state_desc: "Państwo jest zarządzane przez jedną prawną partię polityczną, która ma monopol na wszelką działalność polityczną w kraju."
 ruler_in_party_tt: "[concept_ruler] w tym kraju jest członkiem [concept_interest_group] z aktywnym politycznym [concept_party]"
 sps_no_party_tt: "Ten naród nie ma aktywnego [Concept('concept_party', 'Political Parties')]"
 sps_government_reshuffle_tt: "[concept_government] kompozycja zostanie zaktualizowana przez członków pojedynczego prawnego [concept_party]"
  
  # Voting System group
 law_first_past_the_post:0 "Pierwsza przeszłość post"
 law_first_past_the_post_desc:0 "Znany również jako Zwycięzca Bierze wszystko, ten system wybiera jednego kandydata, który wygrywa najwięcej miejsc w regionalnych podwyborach. Ma tendencję do tworzenia jednopartyjnych rządów z silnymi mandatami, ale jest podatny na gerrymandering."
 law_proportional_representation:0 "Reprezentacja proporcjonalna"
 law_proportional_representation_desc:0 "System ten rozdziela stanowiska parlamentarne proporcjonalnie do liczby oddanych głosów. Ma tendencję do tworzenia wielopartyjnych rządów koalicyjnych, gdzie kompromis jest kluczem do osiągnięcia czegokolwiek."
  
  # Workplace Safety group
 lawgroup_labor_rights:0 "Prawa pracownicze"
 lawgroup_labor_rights_desc:0 "Prawa pracowników."
  
 law_serfdom:0 "Serfdom"
 law_serfdom_desc:0 "Chłopi są przywiązani do swojej ziemi i muszą pracować dla swoich feudalnych mistrzów."
 law_no_workers_rights:0 "Brak praw pracowniczych"
 law_no_workers_rights_desc:0 "Pracownicy nie mają szczególnych praw pracowniczych gwarantowanych przez państwo."
 law_regulatory_bodies:0 "Organy regulacyjne"
 law_regulatory_bodies_desc:0 "Instytucje rządowe zostały utworzone w celu regulowania ekscesów pracodawców."
 law_worker_protections:0 "Ochrona pracowników"
 law_worker_protections_desc:0 "Pracownicy korzystają z szerokiej ochrony zapisanej w prawie."
  
  # Children's Rights group
 lawgroup_childrens_rights:0 "Prawa dziecka"
 lawgroup_childrens_rights_desc:0 "Prawa i ochrona dzieci."
  
 law_child_labor_allowed:0 "Praca dzieci"
 law_child_labor_allowed_desc:0 "Nie nakłada się żadnych ograniczeń prawnych dotyczących miejsca pracy dzieci."
 law_restricted_child_labor:0 "Ograniczona praca dzieci"
 law_restricted_child_labor_desc:0 "Żadne dziecko nie jest dozwolone na podłodze fabryki."
 law_compulsory_primary_school:0 "Obowiązkowa Szkoła Podstawowa"
 law_compulsory_primary_school_desc:0 "Wszystkie dzieci muszą uczęszczać do kilku lat szkoły podstawowej, podczas których nie wolno im pracować."
  
  # Slavery group
 lawgroup_slavery:0 "Niewolnictwo"
 lawgroup_slavery_desc:0 "Ludzie jako własność."
  
 law_slavery_banned:0 "Niewolnictwo"
 law_slavery_banned_desc:0 "Żadna istota ludzka nie może być własnością innej."
 law_debt_slavery:0 "Niewolnictwo dłużne"
 law_debt_slavery_desc:0 "Ci, którzy nie mogą spłacić swoich długów, zamiast tego tracą swoją osobę jako własność swojego wierzyciela."
 law_slave_trade:0 "Handel niewolnikami"
 law_slave_trade_desc:0 "Popyt na tanią siłę roboczą jest spełniany przez odczłowieczający handel obcymi ciałami."
 law_legacy_slavery:0 "Niewolnictwo dziedziczne"
 law_legacy_slavery_desc:0 "Jako kompromis między abolicjonistami a posiadaczami niewolników, instytucja niewolnictwa może trwać tak długo, jak długo nie będzie się rozwijać."
  
  # Church and State group
 lawgroup_church_and_state:0 "Kościół i państwo"
 lawgroup_church_and_state_desc:0 "Relacja między rządami fizycznymi i duchowymi."
  
 law_state_religion:0 "Religia państwowa"
 law_state_religion_desc:0 "Kościół jest oficjalnym organem państwa. Wszystkie religie mniejszości są dyskryminowane."
 law_freedom_of_conscience:0 "Wolność nauk ścisłych"
 law_freedom_of_conscience_desc:0 "Państwo ma oficjalną religię państwową, ale ludzie mogą wybrać, w co wierzyć. Tylko szczególnie egzotyczne religie są dyskryminowane."
 law_total_separation:0 "Całkowite oddzielenie"
 law_total_separation_desc:0 "Żaden kościół czy wiara nie może ingerować w funkcje rządowe. Żadna religia nie może być dyskryminowana."
 law_atheist_state:0 "Państwo ateistyczne"
 law_atheist_state_desc:0 "Głoszenie wiary religijnej jest zabronione, a praktykowanie jest marszczone. Wszystkie religie są dyskryminowane."
  
   # Citizenship group
 lawgroup_citizenship:0 "Obywatelstwo"
 lawgroup_citizenship_desc:0 "Rozszerzenie praw obywatelskich."
  
 law_ethnostate:0 "Ethnostate"
 law_ethnostate_desc:1 "Państwo uważa się za nierozerwalnie związane z pewną etnicznością, a inne etniczności wykluczone z obywatelstwa. Wszystkie obce kultury są dyskryminowane."
 law_national_supremacy:0 "Najwyższość narodowa"
 law_national_supremacy_desc:1 "Państwo definiuje swoich obywateli poprzez przestrzeganie pewnej tożsamości narodowej, która jest uważana za najwyższą nad wszystkimi innymi. Kultura zagraniczna jest dyskryminowana, chyba że ma wspólne dziedzictwo i język (lub inne zwyczaje)."
 law_racial_segregation:0 "Segregacja rasowa"
 law_racial_segregation_desc:1 "Państwo uważa, że prawa obywatelskie są powiązane z pojęciem wspólnego dziedzictwa rasowego. Kultury obce o różnym dziedzictwie są dyskryminowane."
 law_cultural_exclusion:0 "Wyłączenie kulturalne"
 law_cultural_exclusion_desc:1 "Państwo oferuje obywatelom prawa obywatelskie wszystkich tożsamości kulturowych, przy jednoczesnym uznaniu pewnej oficjalnej tożsamości za nadrzędną. Zagraniczne kultury, które nie mają nic wspólnego z twoimi podstawowymi kulturami, są dyskryminowane."
 law_multicultural:0 "Wielokulturowość"
 law_multicultural_desc:1 "Państwo podtrzymuje równe prawa obywatelskie dla ludzi o wszystkich tożsamości kulturowych i nie próbuje oficjalnie utrzymać pewnej kultury nad innymi. Żadna kultura nie jest dyskryminowana."
 law_subjecthood: "Objętość"
 law_subjecthood_desc: "Państwo definiuje swoich obywateli głównie jako osoby suwerenne, nie dokładając żadnych starań, aby zachęcić do jakiejkolwiek oficjalnej narodowości. Kultury są w dużej mierze pozostawione własnym urządzeniom w obrębie własnych społeczności."

  # Caste Hegemony, a Social Stratification law group
 lawgroup_caste_hegemony: "Caste Hegemony"
 lawgroup_caste_hegemony_desc: "Zapewnienie praw członkom społeczeństwa w oparciu o brytyjski indyjski system kastowy."
 law_hindu_caste_enforced: "System kastowy"
 law_hindu_caste_enforced_desc: "Hierarchia kastowa jest prawnie egzekwowana i zapobiega wzrostowi mobilności społeczno-gospodarczej."
 law_hindu_caste_codified: "System kastowy skodyfikowany"
 law_hindu_caste_codified_desc: "Hierarchia kastowa jest uznawana i stosowana w celu ograniczenia wzrostu mobilności społeczno-gospodarczej."
 law_hindu_caste_not_enforced: "Kasta niewymuszona"
 law_hindu_caste_not_enforced_desc: "Mobilność społeczno-gospodarcza na podstawie kasty nie jest prawnie ograniczona, ale dyskryminacja może nadal istnieć."
 law_affirmative_action: "Działanie potwierdzające"
 law_affirmative_action_desc: "Aktywne środki mające na celu stworzenie sprawiedliwej sytuacji społeczno-gospodarczej, priorytetowe traktowanie wcześniej zmarginalizowanych grup."
  
  # Economic System group
 lawgroup_economic_system:0 "System gospodarczy"
 lawgroup_economic_system_desc:0 "Podstawowe zasady waszej gospodarki."

 law_traditionalism:0 "Tradycjonizm"
 law_traditionalism_desc:0 "Gospodarka przedprzemysłowa z niewielką kontrolą centralną."
 law_agrarianism:0 "Agrarianizm"
 law_agrarianism_desc:0 "Gospodarka wiejska kładąca nacisk na rozwój rolnictwa i społeczności."
 law_cooperative_ownership:0 "Spółdzielczość Własność"
 law_cooperative_ownership_desc:0 "System gospodarczy oparty na koncepcji własności społecznej, w którym nadwyżka produkcji jest bardziej równomiernie rozdzielana wśród pracowników."
 law_command_economy:0 "Gospodarka dowodzenia"
 law_command_economy_desc:0 "Inwardowa gospodarka interwencyjna, gdzie rząd bezpośrednio zarządza większością aspektów produkcji."
 law_laissez_faire:0 "Laissez- Faire Przewodniczący"
 law_laissez_faire_desc:0 "liberalna gospodarka oparta na zasadach przewagi komparatywnej, a mniejsza liczba interwencji rządowych oznacza większy wzrost"
 law_interventionism:0 "Interwencjonizm"
 law_interventionism_desc:0 "Aby zapewnić stabilność naszego kraju, rząd musi ograniczyć najgorsze ekscesy prywatnych przedsiębiorstw."

 # Trade Policy group
 lawgroup_trade_policy:0 "Polityka handlowa"
 lawgroup_trade_policy_desc:0 "Przepisy regulujące handel i wymianę towarów za granicą."
 
 law_free_trade:0 "Wolny handel"
 law_free_trade_desc:1 "Swoboda wymiany towarów nie może być utrudniona, ponieważ handel jest korzystny dla wszystkich."
 law_protectionism:0 "Protekcjonizm"
 law_protectionism_desc:0 "Nasz przemysł musi być chroniony przed deprecjacjami zagranicznych podmiotów rynkowych."
 law_isolationism:0 "Izolacjonizm"
 law_isolationism_desc:0 "Gospodarka skoncentrowana na zaspokajaniu wewnętrznych potrzeb narodu, przy jednoczesnym zachowaniu się z dala od spraw innych."
 law_mercantilism:0 "Eksport- Focused"
 law_mercantilism_desc:0 "Gospodarka zorientowana na eksport, z naciskiem na utrzymanie pozytywnego rachunku bieżącego i konkurowanie z innymi krajami."

  # Taxation Group
 lawgroup_taxation:0 "Podatki"
 lawgroup_taxation_desc:0 "W jaki sposób państwo podnosi dochody poprzez opodatkowanie swoich obywateli."
 law_consumption_based_taxation:0 "Podatki oparte na konsumpcji"
 law_consumption_based_taxation_desc:0 "System podatkowy, w którym nie ma bezpośrednich podatków dochodowych ani podatków od osób przesiadkowych, a zamiast tego dochody są podnoszone poprzez opodatkowanie konsumpcji towarów."
 law_land_based_taxation:0 "Opodatkowanie lądowe"
 law_land_based_taxation_desc:0 "Tradycyjna forma opodatkowania lądowego, zbierana głównie od chłopów."
 law_per_capita_based_taxation:0 "Podatki regresyjne"
 law_per_capita_based_taxation_desc:0 "System podatkowy, który w sposób nieproporcjonalny opodatkowuje ubogich poprzez połączenie podatków dochodowych z podatkami dla osób w podeszłym wieku."
 law_proportional_taxation:0 "Opodatkowanie proporcjonalne"
 law_proportional_taxation_desc:0 "System podatkowy oparty głównie na przychodach, który stara się zapewnić, by każdy płacił państwu mniej więcej równą część swoich dochodów."
 law_graduated_taxation:0 "Postępowe opodatkowanie"
 law_graduated_taxation_desc:0 "System podatkowy, który ma na celu nałożenie obciążenia podatkowego przede wszystkim na dobrobyt poprzez wysokie podatki dywidendowe."
  
  # Education System group
 lawgroup_education_system:0 "System edukacji"
 lawgroup_education_system_desc:0 "Kiedy dzieci skończą sprzątać komin."
  
 law_no_schools:0 "Brak szkół"
 law_no_schools_desc:0 "Edukacja jest obowiązkiem rodziców. Tylko najspokojniejsi obywatele uczą się czytać i pisać."
 law_religious_schools:0 "Szkoły religijne"
 law_religious_schools_desc:0 "Pozwolenie kościołowi na opiekę nad edukacją państwową zapewnia wierną i moralnie zdrową populację."
 law_private_schools:0 "Szkoły prywatne"
 law_private_schools_desc:0 "Szkolnictwo najlepiej pozostawić prywatnym interesom, które mogą zapewnić wolność wyboru w edukacji."
 law_public_schools:0 "Szkoły publiczne"
 law_public_schools_desc:0 "Edukacja jest obowiązkiem państwa i powinna być standaryzowana i dostępna dla wszystkich."
  
  # Health System group
 lawgroup_health_system:0 "System zdrowia"
 lawgroup_health_system_desc:1 "Ustawy dotyczące zaangażowania rządu (lub jego braku) w świadczenie opieki zdrowotnej dla swoich obywateli."
  
 law_no_health_system:0 "Brak systemu opieki zdrowotnej"
 law_no_health_system_desc:1 "Rząd nie finansuje żadnego systemu opieki zdrowotnej."
 law_charitable_health_system:0 "Szpitale charytatywne"
 law_charitable_health_system_desc:0 "Organizacje charytatywne - często religijne - zapewniają pomoc każdemu, kto jest chory lub umiera, w stopniu, w jakim są w stanie."
 law_private_health_insurance:0 "Prywatne ubezpieczenie zdrowotne"
 law_private_health_insurance_desc:0 "Zdrowie ludności jest zarządzane poprzez system prywatnych szpitali wypłacanych za pośrednictwem prywatnych programów ubezpieczeń zdrowotnych, zapewniając dobrobyt tym, którzy mogą sobie na nie pozwolić, przy minimalnym wpływie na Skarb Państwa."
 law_public_health_insurance:0 "Ubezpieczenie zdrowia publicznego"
 law_public_health_insurance_desc:0 "Rząd zapewnia finansowany ze środków publicznych program ubezpieczeń zdrowotnych zapewniający równy dostęp do opieki dla wszystkich."
 
  # Welfare group
 lawgroup_welfare:0 "Opieka społeczna"
 lawgroup_welfare_desc:0 "Pomoc rządowa dla ubogich dochodów."
  
 law_no_social_security:0 "Brak zabezpieczenia społecznego"
 law_no_social_security_desc:0 "Nie jest rolą państwa, aby zapewnić tym, którzy nie mogą zapewnić siebie."
 law_poor_laws:0 "Biedne prawa"
 law_poor_laws_desc:0 "Zabranie włóczęgów i włóczęgów z naszych ulic i do przytułku jest warte zachodu."
 law_wage_subsidies:1 "Dotacje płacowe"
 law_wage_subsidies_desc:1 "Wszyscy chętni do pracy mają prawo do jedzenia. Żaden człowiek nie powinien mieć środków, by zapewnić rodzinę."
 law_old_age_pension:0 "Emerytura w starszym wieku"
 law_old_age_pension_desc:0 "Istnieje praktyczna granica wieku, w którym nasza siła robocza nie jest już efektywna, a ich dobrobyt musi podlegać kompetencji rządu."
 law_disability_insurance:0 "Ubezpieczenie od niepełnosprawności"
 law_disability_insurance_desc:0 "Obowiązkiem państwa jest dbanie o tych, którzy bez własnej winy nie są w stanie pracować."
  
  # Rights of Women group
 lawgroup_rights_of_women:0 "Prawa kobiet"
 lawgroup_rights_of_women_desc:0 "Prawne przepisy bardziej sprawiedliwego seksu."
  
 law_no_womens_rights:0 "Ochrona prawna"
 law_no_womens_rights_desc:0 "Kobiety są prawnie pod opieką mężczyzn i mają bardzo niewiele praw."
 law_women_own_property:0 "Odpowiednie kobiety"
 law_women_own_property_desc:0 "Nawet kobiety mają prawo i obowiązek posiadać i pielęgnować swój dobytek."
 law_women_in_the_workplace:0 "Kobiety w miejscu pracy"
 law_women_in_the_workplace_desc:0 "W jaki sposób będziemy w stanie utrzymać piece postępu przy zaledwie połowie potencjalnych pracowników?"
 law_womens_suffrage:0 "Sufraż kobiecy"
 law_womens_suffrage_desc:0 "Przy dostosowywaniu nowego porządku rzeczy, my, kobiety, domagamy się równego głosu; nie będziemy akceptować niczego innego."
  
  # Policing
 lawgroup_policing:0 "Polerowanie"
 lawgroup_policing_desc:0 "Priorytety krajowej policji."

 law_no_police:0 "Brak policji"
 law_no_police_desc:0 "W tym kraju nie ma żadnej zorganizowanej policji."
 law_local_police:0 "Lokalne Siły Policyjne"
 law_local_police_desc:0 "W tym kraju działają lokalne siły policyjne."
 law_dedicated_police:0 "Dedykowane Siły Policyjne"
 law_dedicated_police_desc:0 "Ten kraj ma oddaną policję ze standaryzowanym szkoleniem."
 law_militarized_police:0 "Zmilitaryzowane Siły Policyjne"
 law_militarized_police_desc:0 "Dając policji sprzęt wojskowy i szkolenie wojskowe, ich skuteczność w realizacji woli wzrasta."
  
  # Bureaucracy
 lawgroup_bureaucracy:0 "Biurokracja"
 lawgroup_bureaucracy_desc:0 "Jak twój kraj jest podawany."

 law_hereditary_bureaucrats:0 "Dziedziczne"
 law_hereditary_bureaucrats_desc:0 "Biurokraci zajmują swoją pozycję poprzez tradycyjny spadek, przekazując obowiązki swoim dzieciom."
 law_appointed_bureaucrats:0 "Mianowane bydlaki"
 law_appointed_bureaucrats_desc:0 "Biurokraci są mianowani przez władców, aby służyć najlepszym interesom kraju w zamian za wysokie wynagrodzenie."
 law_meritocratic_bureaucracy:0 "Meritokratic Bureagracy"
 law_meritocratic_bureaucracy_desc:0 "Biurokraci szturmują pozycje władzy poprzez zasługi. Z czasem tworzy to ogromne, bizantyjskie administracje."
 law_elected_bureaucrats:0 "Wyselekcjonowane bydlaki"
 law_elected_bureaucrats_desc:0 "Lokalni gubernatorzy są wybierani przez swoich wyborców, decentralizując władzę, ułatwiając obywatelom zarządzanie."
  
  # Colonization
 lawgroup_colonization:0 "Kolonizacja"
 lawgroup_colonization_desc:0 "Twoje stanowisko w sprawie ustanowienia kolonii do supplant i podbić [concept_decentralized_nation]."
  
 law_no_colonial_affairs:0 "Nie ma sprawy kolonialnej"
 law_no_colonial_affairs_desc:0 "Kraj nie angażuje się w żaden formalny rodzaj kolonizacji i nie może założyć kolonii."
 law_colonial_resettlement:0 "Przesiedlenie kolonialne"
 law_colonial_resettlement_desc:0 "Powołuje się kolonie w celu zapewnienia gruntów osadnikom z państw włączonych do kraju."
 law_colonial_exploitation:0 "Kolonialne wykorzystanie"
 law_colonial_exploitation_desc:0 "Powstają kolonie w celu wykorzystania obszaru dla ich zasobów naturalnych i taniej pracy."
  
  # Internal Security
 lawgroup_internal_security:0 "Bezpieczeństwo wewnętrzne"
 lawgroup_internal_security_desc:0 "Utrzymywanie własnych spraw w porządku."
  
 law_no_home_affairs:0 "Brak spraw wewnętrznych"
 law_no_home_affairs_desc:0 "Państwo nie podejmuje specjalnych prób powstrzymania niepokojów i powstania."
 law_national_guard:0 "Gwardia Narodowa"
 law_national_guard_desc:0 "Państwo może użyć sił wojskowych do stłumienia wewnętrznych niepokojów."
 law_secret_police:0 "Tajna policja"
 law_secret_police_desc:0 "Tajna policja śledzi radykalne elementy i dysydentów."
 law_guaranteed_liberties:0 "Gwarantowane swobody"
 law_guaranteed_liberties_desc:1 "Biuro Spraw Wewnętrznych państwa koncentruje się wyłącznie na rozpatrywaniu skarg obywateli i nie wolno im prowadzić dochodzenia lub aresztować ich bez uzasadnionej przyczyny."
  
  # Migration
 lawgroup_migration:0 "Migracja"
 lawgroup_migration_desc:0 "Kontrolowanie przepływu ludzi."
  
 law_no_migration_controls:0 "Brak kontroli migracji"
 law_no_migration_controls_desc:0 "Kraj ten nie próbuje kontrolować przemieszczania się przez swoje granice."
 law_migration_controls:0 "Kontrole migracji"
 law_migration_controls_desc:0 "Tylko ludzie kultury i religii niedyskryminowane mogą migrować w kraju lub poza nim."
 law_closed_borders:0 "Zamknięte granice"
 law_closed_borders_desc:0 "Nie zezwala się na migrację do ani z kraju."

 liberate_slaves_tt:0 "Wszystkie [GetPopType('slaves').GetName] zostaną uwolnione"
 enslave_discriminated_farm_workers_tt:0 "Wszystkie $laborers$ przy niskim [concept_acceptance] pracujące na farmach, ranczach i plantacjach w byłych państwach Slave będzie [Concept('concept_slavery', '$concept_enslaved$')]."
 
 enact_law_radical_leftist_government_warning_desc:0 "@warning! Przyjmowanie tego [concept_law] może spowodować, że [Concept('concept_country', '$concept_countries$')] bez podobnej postaci $lawgroup_governance_principles$ stanie się agresywne wobec nas."
