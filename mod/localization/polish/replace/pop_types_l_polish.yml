l_polish:
 aristocrats:0 "@aristocrats! $aristocrats_no_icon$"
 aristocrats_only_icon:0 "@aristocrats!"
 aristocrats_no_icon:0 "Arystokraty"
 aristocrats_desc:1 "Bogaci właściciele ziemi, stare pieniądze ze starymi koneksjami. Pracują wyłącznie w gospodarstwie [GetBuildingType('building_manor_house').GetName] [Concept('concept_building', '$concept_buildings$')], gdzie posiadają gospodarstwa i plantacje. Składają część swoich zysków do [concept_investment_pool]. Ich interesy polityczne są reprezentowane jako [GetInterestGroupVariant('ig_landowners',GetPlayer).GetNameWithCountryVariant]."
 bureaucrats:0 "@bureaucrats! $bureaucrats_no_icon$"
 bureaucrats_only_icon:0 "@bureaucrats!"
 bureaucrats_no_icon:0 "Biurokraci"
 bureaucrats_desc:0 "Urzędnicy odpowiedzialni za zarządzanie funkcjami rządowymi i infrastrukturą. Politycznie, mają tendencję do zbliżania się do Intelligentsia lub Petite Bourgeoisie."
 capitalists:0 "@capitalists! $capitalists_no_icon$"
 capitalists_only_icon:0 "@capitalists!"
 capitalists_no_icon:0 "Kapitaliści"
 capitalists_desc:1 "Kapitanowie przemysłu, nowe pieniądze na nową erę. Pracują wyłącznie w [GetBuildingType('building_financial_district').GetName] [Concept('concept_building', '$concept_buildings$')], gdzie posiadają kopalnie i wytwórnie. Składają część swoich zysków do [concept_investment_pool]. Ich interesy polityczne są reprezentowane jako [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetNameWithCountryVariant]."
 clergymen:0 "@clergymen! $clergymen_no_icon$"
 clergymen_only_icon:0 "@clergymen!"
 clergymen_no_icon:0 "Urzędnicy"
 clergymen_desc:0 "Kapłani, uczeni i inni przywódcy religijni dążący do duchowych potrzeb ludności wiejskiej. Politycznie są one kręgosłupem Devout."
 clerks:0 "@clerks! $clerks_no_icon$"
 clerks_only_icon:0 "@clerks!"
 clerks_no_icon:0 "White- Collar Workers"
 clerks_desc:0 "Niżsi pracownicy biurowi wykonujący zadania administracyjne w rządzie, infrastrukturze i sklepach. Częściowa część Petite Bourgeoisie, chociaż niektórzy dołączają do Związków Zawodowych."
 engineers:0 "@engineers! $engineers_no_icon$"
 engineers_only_icon:0 "@engineers!"
 engineers_no_icon:0 "Inżynierowie"
 engineers_desc:1 "Wynalazcy i projektanci rozwiązań technicznych, współpracujący z zaawansowanymi maszynami w sektorach takich jak produkcja, górnictwo i budownictwo. Niektórzy popierają Industrialistów lub Petty Bourgeoisie, inni dołączają do Związków Zawodowych."
 farmers:0 "@farmers! $farmers_no_icon$"
 farmers_only_icon:0 "@farmers!"
 farmers_no_icon:0 "Rolnicy"
 farmers_desc:0 "Akcjonariusze, drobni posiadacze i inni, którzy tworzą stabilne, ale marne żyjące przedsiębiorstwa produkujące żywność lub uprawiające uprawy pieniężne. Większość uważa, że ich interesy reprezentowane są jako Rural Folk."
 peasants:0 "@peasants! $peasants_no_icon$"
 peasants_only_icon:0 "@peasants!"
 peasants_no_icon:0 "Chłopi"
 peasants_desc:2 "Rolnicy produkujący produkty rolne i proste produkty, których używają głównie na własne potrzeby, znaleźli się jedynie w [Concept('concept_subsistence_building', '$concept_subsistence_buildings$')]. Zależą one od [concept_subsistence_output] dla przetrwania i odgrywają jedynie ograniczoną rolę w gospodarce [concept_market]. Są one zwykle [Concept('concept_politically_unaligned_aligned', '$concept_politically_unaligned$')]."
 laborers:0 "@laborers! $laborers_no_icon$"
 laborers_only_icon:0 "@laborers!"
 laborers_no_icon:0 "Pracownicy Blue- Collar"
 laborers_desc:0 "Dzienni robotnicy, rolnicy i inni, którzy nie mają bezpieczeństwa zatrudnienia, wykonują każdą pracę dostępną w całym społeczeństwie. Zazwyczaj nie angażują się w politykę, ale mogą się zaangażować poprzez Związki Zawodowe."
 officers:0 "@officers! $officers_no_icon$"
 officers_only_icon:0 "@officers!"
 officers_no_icon:0 "Oficerowie"
 officers_desc:0 "Oficerowie dowodzący siłami wojskowymi w armii i marynarce. Politycznie reprezentują górne eszelony sił zbrojnych."
 academics:0 "@academics! $academics_no_icon$"
 academics_only_icon:0 "@academics!"
 academics_no_icon:0 "Akademika"
 academics_desc:0 "Naukowcy, lekarze, prawnicy i inni wykształceni specjaliści studiujący i nauczający w instytucjach akademickich. Politycznie, są one na czele Intelligentsia."
 shopkeepers:0 "@shopkeepers! $shopkeepers_no_icon$"
 shopkeepers_only_icon:0 "@shopkeepers!"
 shopkeepers_no_icon:0 "Small- Właściciele przedsiębiorstw"
 shopkeepers_desc:0 "Właściciele i menedżerowie sklepów, sprzedaż wyrobów klientom w miastach. Zazwyczaj należą do Petite Bourgeoisie politycznie."
 slaves:0 "@slaves! $slaves_no_icon$"
 slaves_only_icon:0 "@slaves!"
 slaves_no_icon:0 "Niewolnicy"
 slaves_desc:0 "Traktowany nie jako osoba, ale jako własność, wykonując pracę przymusową w różnych sektorach w krajach, w których niewolnictwo jest dozwolone. Ze względu na ich status, nie mogą uczestniczyć w polityce."
 soldiers:1 "@soldiers! $soldiers_no_icon$"
 soldiers_only_icon:1 "@soldiers!"
 soldiers_no_icon:1 "Służba"
 soldiers_desc:0 "Żołnierze i marynarze, którzy stanowią większość personelu wojskowego. Powszechnie dostosowują się one politycznie do ich roli jako części sił zbrojnych."
 machinists:0 "@machinists! $machinists_no_icon$"
 machinists_only_icon:0 "@machinists!"
 machinists_no_icon:0 "Machiniści"
 machinists_desc:0 "Pracownicy ręczni o stabilnym zatrudnieniu obsługujący maszyny w wytwórniach, kopalniach, zmechanizowanych gospodarstwach rolnych i innych sektorach. Politycznie są siłą napędową Związków Zawodowych."
  
 ACADEMICS_QUALIFICATIONS_DESC:0 "Tylko pop z odpowiednią [concept_literacy] może stać się #v $academics$ #!. Potencjalny wzrost przy większym [concept_literacy] i [concept_wealth]. Pops, którego [concept_culture] ma niski [concept_acceptance] zajmuje dużo więcej czasu. #v $clerks$ #! i #v $aristocrats$ #! mają szczególnie łatwy czas stawania się #v $academics$ #!."
 ARISTOCRATS_QUALIFICATIONS_DESC:0 "Tylko pop z odpowiednią [concept_wealth] może stać się #v $aristocrats$ #!. Potencjalny wzrost przy większym [concept_wealth] i w mniejszym stopniu [concept_literacy]. Pops, którego [concept_culture] ma niski [concept_acceptance] zajmuje dużo więcej czasu. #v $officers$ #! i #v $bureaucrats$ #! mają szczególnie łatwy czas stawania się #v $aristocrats$ #!."
 BUREAUCRATS_QUALIFICATIONS_DESC:0 "Tylko pop z odpowiednią [concept_literacy] może stać się #v $bureaucrats$ #!. Potencjalny wzrost przy większym [concept_literacy]. Pops, którego [concept_culture] ma niski [concept_acceptance] zajmuje dużo więcej czasu, podczas gdy idzie szybciej dla tych z obu z [concept_culture] i [concept_religion] z wysokim $concept_acceptance$."
 CAPITALISTS_QUALIFICATIONS_DESC:0 "Tylko pop z odpowiednią [concept_wealth] może stać się #v $capitalists$ #!. Potencjalny wzrost przy większym [concept_wealth] i [concept_literacy]. Pops, którego [concept_culture] ma niski [concept_acceptance] zajmuje dużo więcej czasu. #v $shopkeepers$ #! i #v $engineers$ #! mają szczególnie łatwy czas stawania się #v $capitalists$ #!."
 CLERGYMEN_QUALIFICATIONS_DESC:0 "Tylko pop z odpowiednią [concept_literacy] może stać się #v $clergymen$ #!. Potencjalny wzrost przy większym [concept_literacy]. Pops, którego [concept_religion] ma niski [concept_acceptance] zajmuje dużo więcej czasu, podczas gdy idzie szybciej dla tych z [concept_religion] z wysokim $concept_acceptance$. #v $academics$ #! i #v $aristocrats$ #! mają szczególnie łatwy czas stawania się #v $clergymen$ #!."
 CLERKS_QUALIFICATIONS_DESC:0 "Każdy pop może stać się #v $clerks$ #!. Potencjalny wzrost przy większej ilości [concept_literacy]. #v $laborers$ #! charakteryzuje się wyjątkowo łatwym stawaniem się #v $clerks$ #!."
 ENGINEERS_QUALIFICATIONS_DESC:0 "Potencjalny wzrost z większą liczbą [concept_literacy] i [concept_wealth]. #v $machinists$ #! i #v $clerks$ #! ma szczególnie łatwy czas stawania się #v $engineers$ #!."
 FARMERS_QUALIFICATIONS_DESC:0 "Każdy pop może stać się #v $farmers$ #!. Potencjalny wzrost z większą liczbą [concept_wealth]. #v $peasants$ #! i #v $laborers$ #! ma szczególnie łatwy czas stawania się #v $farmers$ #!."
 MACHINISTS_QUALIFICATIONS_DESC:0 "Pops z minimalnym [concept_literacy] może stać się #v $machinists$ #!. Potencjalny wzrost przy większej ilości [concept_literacy]. #v $laborers$ #! charakteryzuje się szczególnie łatwym stawaniem się #v $machinists$ #!."
 OFFICERS_QUALIFICATIONS_DESC:0 "Tylko #v $soldiers$ #! lub pop of [concept_culture] with high enough [concept_acceptance] może stać się #v $officers$ #!. Potencjalny wzrost przy większej ilości [concept_literacy]. #v $aristocrats$ #! charakteryzuje się szczególnie łatwym stawaniem się #v $officers$ #!."
 SHOPKEEPERS_QUALIFICATIONS_DESC:0 "Potencjalny wzrost z większą liczbą [concept_wealth] może się stać #v $shopkeepers$ #!. Potencjalny wzrost z większą liczbą [concept_wealth]. #v $clerks$ #! i #v $farmers$ #! ma szczególnie łatwy okres stawania się #v $shopkeepers$ #!."
