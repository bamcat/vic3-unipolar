pm_no_public_housing_desc: "Państwo nie zapewnia wsparcia mieszkaniowego. Centra miejskie produkują tylko nieruchomości generowane przez działalność na rynku prywatnym."
 
pm_the_projects: "Projekty"
pm_the_projects_desc: "Finansowane przez państwo wieże o wysokiej gęstości i kamienice. Podstawowy, funkcjonalny i zbudowany szybko z drewna i materiałów prefabrykowanych. Produkcja nieruchomości znacznie wzrasta, ponieważ państwo staje się głównym konstruktorem."
 
pm_affordable_construction: "Niedrogie budownictwo"
pm_affordable_construction_desc: "Kompleksowy publiczny program mieszkaniowy wykorzystujący wysokiej jakości budownictwo - stalowe budynki, odpowiednie fundamenty, trwałe materiały. Produkcja nieruchomości znacznie wzrasta. Inżynierowie i biurokraci zarządzają programem rozszerzającym."
 
pm_housing_for_all: "Obudowa dla wszystkich"
pm_housing_for_all_desc: "Powszechne obudowy dostarczane w skali. Państwo buduje i utrzymuje wysokiej jakości mieszkania dla wszystkich obywateli, zużywając znaczne nakłady budowlane. Produkcja nieruchomości osiąga maksimum. Duża liczba pracowników, inżynierów i biurokratów podtrzymuje program."
