 ### ══════════════════════════════════════════
 ### UPDATED ORG DESCRIPTIONS reflecting mechanics
 ### ══════════════════════════════════════════
 
 io_nato_desc: "[concept_nato] jest [concept_military_defense_agreement] wiążące narody Ameryki Północnej i Europy w obronie zbiorowej. Uzbrojony atak na jednego członka jest uważany za atak na wszystkich. Przystąpienie do NATO automatycznie tworzy umowy o wzajemnym pakcie obronnym z każdym istniejącym państwem członkowskim."
 
 io_opec_desc: "[concept_opec] jest organizacją głównych krajów wywozu petroleum, które koordynują politykę produkcji ropy naftowej. Państwa członkowskie korzystają z siły cenowej kartelu, uzyskując znaczną przewagę handlową w eksporcie ropy naftowej i zwiększając wydajność wydobycia z skoordynowanych inwestycji."
 
 io_eec_desc: "[concept_eec] jest [concept_free_trade_agreement] ustanowienie unii celnej między europejskimi państwami członkowskimi. Członkowie mają wspólny rynek ze znormalizowanymi regulacjami produktowymi i skoordynowaną polityką handlową, zmniejszając bariery w handlu transgranicznym."
 
 io_arab_league_desc: "[concept_arab_league] jest [concept_cultural_pact] krajów arabskojęzycznych, które promują współpracę polityczną, gospodarczą, kulturalną i społeczną. Wspólne dziedzictwo przyspiesza wymianę technologii i pomysłów, podczas gdy solidarność państw członkowskich pomaga w tłumieniu wewnętrznych nacisków rewolucyjnych."
 
