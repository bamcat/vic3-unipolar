 io_ngo_iaea_high_support: "Partnerstwo MAEA"
 io_ngo_iaea_high_support_desc: "Nasze silne poparcie dla Międzynarodowej Agencji Energii Atomowej dało nam dostęp do ich wiedzy technicznej i programów bezpieczeństwa jądrowego, co przyspieszyło rozprzestrzenianie zaawansowanych technologii."
 
