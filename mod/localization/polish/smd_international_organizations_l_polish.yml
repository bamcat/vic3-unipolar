 ### ═══════════════════════════════════════
 ### TAB DESCRIPTIONS
 ### ═══════════════════════════════════════
 io_igos_tab_desc: "Organizacje międzynarodowe są instytucjami wielostronnymi, które koordynują politykę między państwami członkowskimi. Kliknij na organizację, aby zobaczyć jej szczegóły, członków i dostępne działania."
 io_treaties_tab_desc: "Traktaty międzynarodowe są wiążącymi umowami między narodami. Państwa kraj może stać się sygnatariuszem w celu uzyskania świadczeń lub wycofania się kosztem pozycji dyplomatycznej."
 io_ngos_tab_desc: "[concept_nongovernmental_organization] s działają niezależnie ponad granicami. Wszystkie narody są domyślnie powiązane. Możesz zdecydować się na zakaz lub subwencjonowanie ich, wpływając na ich opinię o Twoim kraju."

 ### ═══════════════════════════════════════
 ### GAME CONCEPTS
 ### ═══════════════════════════════════════

 concept_international_organization: "Organizacja międzynarodowa"
 concept_international_organization_desc: "Organizacje międzynarodowe są instytucjami działającymi ponad granicami państw w celu koordynowania polityki, promowania handlu, zapewnienia bezpieczeństwa zbiorowego lub wspierania wymiany kulturalnej między ich państwami członkowskimi. Występują w kilku formach: [concept_free_trade_agreement] s, [concept_financial_agreement] s, [concept_military_defense_agreement] s, [concept_cultural_pact] s i [concept_cooperative_agreement] s."

 concept_intergovernmental_organization: "Organizacja międzyrządowa"
 concept_intergovernmental_organization_desc: "Organizacja międzyrządowa to id < x = 0 / >, którego członkami są suwerenne narody. W przeciwieństwie do [concept_nongovernmental_organization] s, IGO wymagają formalnego członkostwa i mogą zapewnić znaczące korzyści dyplomatyczne, ekonomiczne lub wojskowe."

 concept_nongovernmental_organization: "Organizacja pozarządowa"
 concept_nongovernmental_organization_desc: "Organizacje pozarządowe są niezależnymi instytucjami, które działają na arenie międzynarodowej bez kontroli rządu. Wszystkie kraje są domyślnie powiązane z organizacjami pozarządowymi. Rządy mogą podjąć decyzję o zakazie, tolerowaniu lub subsydiowaniu ich, co wpływa na opinię organizacji pozarządowych i korzyści, jakie zapewniają."

 concept_international_treaty: "Traktat międzynarodowy"
 concept_international_treaty_desc: "Traktat międzynarodowy jest formalnym wiążącym porozumieniem między suwerennymi narodami. W przeciwieństwie do [concept_intergovernmental_organization] s, traktaty nie wymagają stałego członkostwa organizacyjnego - naród jest albo sygnatariuszem, albo nie. Sygnatariusze otrzymują świadczenia dyplomatyczne, podczas gdy odstąpienie od umowy powoduje szkody w stosunkach z innymi sygnatariuszami."

 international_treaty_type:0 "[concept_international_treaty]
 concept_free_trade_agreement: "Umowa o wolnym handlu"
 concept_free_trade_agreement_desc: "Umowa o wolnym handlu jest programem [concept_international_organization], który zmniejsza bariery handlowe między państwami członkowskimi, promując wymianę towarów i wzrost gospodarczy."

 concept_financial_agreement: "Umowa finansowa"
 concept_financial_agreement_desc: "Umowa finansowa jest [concept_international_organization] skoncentrowana na współpracy pieniężnej, finansowaniu rozwoju i stabilności finansowej wśród jej członków. Członkowie otrzymują + 5% wpływów i + 1 reputacji dyplomatycznej."

 concept_military_defense_agreement: "Umowa w sprawie obrony wojskowej"
 concept_military_defense_agreement_desc: "Wojskowa Umowa Obronna jest [concept_international_organization] zbudowany na zasadzie bezpieczeństwa zbiorowego. Atak na jednego członka jest uważany za atak na wszystkich."

 concept_cultural_pact: "Pakt kulturalny"
 concept_cultural_pact_desc: "Pakt kulturalny jest programem [concept_international_organization], który promuje wspólne dziedzictwo, język i wymianę kulturalną między swoimi członkami."

 concept_cooperative_agreement: "Umowa o współpracy"
 concept_cooperative_agreement_desc: "Umowa o współpracy to id < x = 0 / > skupiony na szeroko zakrojonej wielostronnej dyplomacji. W przeciwieństwie do innych rodzajów organizacji, Umowy Spółdzielcze nie zapewniają bezpośrednio modyfikatorów. Ich wpływ jest realizowany poprzez rezolucje i inicjatywy."

 concept_united_nations: "ONZ"
 concept_united_nations_desc: "Narodów Zjednoczonych jest [concept_cooperative_agreement] narodów świata, poświęconych utrzymaniu międzynarodowego pokoju, bezpieczeństwa i współpracy."

 concept_nato: "NATO"
 concept_nato_desc: "Organizacja Traktatu Północnoatlantyckiego jest [concept_military_defense_agreement] wiążąca kraje Ameryki Północnej i Europy w obronie zbiorowej."

 concept_g7: "G7"
 concept_g7_desc: "Grupa Siedem jest [concept_financial_agreement] największych na świecie rozwiniętych gospodarek, koordynując politykę fiskalną i pieniężną."

 concept_opec: "OPEC"
 concept_opec_desc: "Organizacja krajów wywozu ropy naftowej jest [concept_free_trade_agreement], który koordynuje politykę naftową wśród głównych krajów produkujących ropę naftową."

 concept_eec: "EWG"
 concept_eec_desc: "Europejska Wspólnota Gospodarcza jest programem [concept_free_trade_agreement] ustanawiającym wspólny rynek między europejskimi państwami członkowskimi."

 concept_arab_league: "Liga Arabska"
 concept_arab_league_desc: "Liga Arabska jest programem [concept_cultural_pact] promującym współpracę między narodami arabskimi."

 concept_imf: "MFW"
 concept_imf_desc: "Międzynarodowy Fundusz Walutowy jest programem [concept_financial_agreement] wspierającym międzynarodową współpracę monetarną i stabilność finansową."

 concept_esa: "PZE"
 concept_esa_desc: "Europejska Agencja Kosmiczna jest programem [concept_cooperative_agreement] poświęconym eksploracji i wykorzystaniu przestrzeni kosmicznej."

 concept_asean: "ASEAN"
 concept_asean_desc: "Stowarzyszenie Narodów Azji Południowo-Wschodniej jest [concept_cooperative_agreement] promowanie wzrostu gospodarczego i stabilności regionalnej w Azji Południowo-Wschodniej."

 concept_saarc: "SAARC"
 concept_saarc_desc: "South Asian Association for Regional Cooperation is a [concept_cooperative_agreement] promoting regional cooperation among South Asian States."

 concept_cis: "WNP"
 concept_cis_desc: "Wspólnota Niepodległych Państw jest [concept_cooperative_agreement] dla koordynacji między kilkoma państwami postsowieckimi."

 concept_who: "WHO"
 concept_who_desc: "Światowa Organizacja Zdrowia jest programem [concept_cooperative_agreement] kierującym i koordynującym międzynarodową politykę zdrowotną."

 concept_iaea: "MAEA"
 concept_iaea_desc: "Międzynarodowa Agencja Energii Atomowej jest programem [concept_nongovernmental_organization], który promuje pokojowe wykorzystanie energii jądrowej i działa na rzecz zapobiegania rozprzestrzenianiu broni jądrowej."

