 io_financial_agreement_member: "Członek umowy finansowej"
 io_financial_agreement_member_desc: "Członkostwo w międzynarodowej umowie finansowej zapewnia większy wpływ dyplomatyczny i renomę."

 io_free_trade_agreement_member: "Członek Umowy o wolnym handlu"
 io_free_trade_agreement_member_desc: "Członkostwo w umowie o wolnym handlu zmniejsza bariery handlowe z innymi członkami."

 io_military_defense_agreement_member: "Wojskowy pakt obronny"
 io_military_defense_agreement_member_desc: "Członkostwo w wojskowej umowie obronnej zapewnia zbiorowe gwarancje bezpieczeństwa."

 io_cultural_pact_member: "Członek Paktu Kulturowego"
 io_cultural_pact_member_desc: "Członkostwo w pakcie kulturalnym promuje wspólne dziedzictwo i wymianę kulturalną."

 io_ngo_subsidized_bonus: "NGO Subwencjonowane"
 io_ngo_subsidized_bonus_desc: "Dotacje rządowe dla organizacji pozarządowej poprawiły naszą międzynarodową pozycję."

 io_ngo_banned_penalty: "NGO Banned"
 io_ngo_banned_penalty_desc: "Zakaz organizacji pozarządowej zniszczył naszą międzynarodową pozycję."

 io_treaty_geneva_signatory: "Sygnatariusz Konwencji Genewskiej"
 io_treaty_geneva_signatory_desc: "Jako sygnatariusz konwencji genewskiej nasze zaangażowanie na rzecz prawa humanitarnego zmniejsza międzynarodową wrogość."

 io_treaty_cwc_signatory: "Sygnatariusz CWC"
 io_treaty_cwc_signatory_desc: "Jako sygnatariusz Konwencji o zakazie broni chemicznej, nasza reputacja dyplomatyczna została wzmocniona."

 io_treaty_npt_signatory: "NPT sygnatariusz"
 io_treaty_npt_signatory_desc: "Jako sygnatariusz traktatu o nierozprzestrzenianiu broni jądrowej, nasze zaangażowanie na rzecz ograniczenia rozprzestrzeniania broni jądrowej jest uznawane na arenie międzynarodowej."

 io_treaty_bwc_signatory: "Sygnatariusz BWC"
