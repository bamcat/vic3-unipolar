 un_je_voting_condemnation_tt: "#bold Głosowanie ONZ w trakcie głosowania. #! Stały członek Rady Bezpieczeństwa zaproponował formalne potępienie [GetGlobalVariable('un_sanction_target').GetCountry.GetName]. Użyj przycisków Yay lub Nay poniżej, aby oddać swój głos. Jeśli wniosek przejdzie, cel ucierpi na trwałym uszkodzeniu jego prestiżu i legitymacji."
 
 un_je_under_sanctions_tt: "@warning! #bold [ROOT.GetCountry.GetName] jest obecnie objęty sankcjami ONZ. #! Społeczność międzynarodowa głosowała za nałożeniem sankcji ekonomicznych na [ROOT.GetCountry.GetName]. Przepustowość bankowa, inwestycje i budownictwo są poważnie ograniczone. Sankcje pozostaną w mocy do czasu ich wygaśnięcia."
 
