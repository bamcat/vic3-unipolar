 # European Union
 
 je_european_union: "Unia Europejska"
 je_european_union_reason: "Unia Europejska stanowi jeden z najbardziej ambitnych projektów politycznych i gospodarczych współczesnego wieku. W oparciu o zasady integracji gospodarczej, wspólnego zarządzania i bezpieczeństwa zbiorowego UE zapewnia swoim członkom wspólny rynek, skoordynowaną politykę handlową oraz miejsce przy stole w kształtowaniu przyszłości kontynentu. Członkostwo przynosi obietnicę swobodnego przepływu towarów, usług, kapitału i ludzi - bezprecedensową szansę na dobrobyt. \n \n Unia nie jest jednak bez wyzwań. Członkowie muszą kierować się złożonymi negocjacjami, przestrzegać przepisów ponadnarodowych oraz kompromisem w sprawie elementów suwerenności narodowej. Im głębsza integracja rośnie, tym bardziej los każdego członka jest związany z losem kolektywu. \n \n Niezależnie od tego, czy kraj rozwija się lub walczy w obrębie UE, zależy od jego zdolności do wyważenia interesów krajowych ze wspólnym dobrem, tworząc ścieżkę w ramach unii, która ma być czymś więcej niż sumą jego części."

 eu_events.1.t: "Zaproszenie do Unii Europejskiej"
 eu_events.1.d: "Unia Europejska rozszerzyła zaproszenie naszego kraju do przystąpienia jako pełnoprawny członek."
 eu_events.1.a: "Przyjmujemy ofertę"
 eu_events.1.b: "Musimy upaść."

 eu_events.2.t: "Debata nad członkostwem w UE"
 eu_events.2.d: "Frakcje polityczne wzywają do podjęcia decyzji, czy pozostać w UE."
 eu_events.2.a: "Opuść Unię"
 eu_events.2.b: "Pozostać w Unii"

 modifier_eu_member_state: "Państwo członkowskie UE"
 eu_membership_accept_tt: "Zostaniesz członkiem Unii Europejskiej, uzyskując korzyści gospodarcze i dyplomatyczne."
 eu_member_state: "Państwo członkowskie UE"
 is_eu_member_state: "Państwo członkowskie UE"
 
 eu_call_summit_button: "Zwołanie szczytu UE"
 eu_call_summit_button_desc: "Wzywać państwa członkowskie do dyskusji na temat handlu, sankcji i współpracy."

 eu_events.3.t: "Szczyt Unii Europejskiej"
 eu_events.3.d: "Przedstawiciele wszystkich państw członkowskich UE zbierają się, aby omówić wspólne cele i wyzwania."
 eu_events.3.a: "Deepen Trade Ties"
 eu_events.3.b: "Sankcje koordynujące"
 eu_events.3.c: "Promowanie wymiany kulturalnej"

 eu_sanctions_ready: "Przygotowane do sankcji"
 
 leave_eu: "Wyjazd z Unii Europejskiej"
 leave_eu_desc: "Wycofanie się z Unii Europejskiej, co jest ważniejsze od korzyści gospodarczych i integracji politycznej."
 
 eu_member_state_is: "Państwo członkowskie UE"
 eu_member_state_is_no_longer: "Nie jest już państwem członkowskim UE"
 eu_deeper_trade_ties: "UE - głębsze powiązania handlowe"
 eu_deeper_trade_ties_desc: "Rozszerzona integracja gospodarcza w Unii Europejskiej zwiększyła wielkość handlu i poprawiła dostęp do rynku między państwami członkowskimi."

 eu_cultural_exchange: "Wymiana kulturalna UE"
 eu_cultural_exchange_desc: "Członkostwo w Unii Europejskiej wspierało zrozumienie kulturowe, migrację oraz rozpowszechnianie nowych pomysłów i technologii."
 je_eu_membership_request: "Wniosek o członkostwo w UE"
 je_eu_membership_request_reason: "Państwa rząd złożył formalny wniosek o przystąpienie do Unii Europejskiej. \n \n Proces ten obejmuje długie negocjacje, reformy polityki oraz dostosowanie do przepisów i standardów UE. W ciągu najbliższych lat, Twój kraj będzie oceniany na temat swojej stabilności gospodarczej, zarządzania, praw człowieka i przestrzegania zasad demokratycznych. \n \n Pomyślne przystąpienie zapewni Ci: \n - Dostęp do jednolitego rynku UE \n - Swobodny przepływ towarów, usług, kapitału i osób z innych państw członkowskich \n - Udział w organach decyzyjnych UE \n \n Proces ten jest jednak politycznie wrażliwy i może napotkać opór zarówno na szczeblu krajowym, jak i na szczeblu istniejących członków UE."
 eu_membership_process: "Rozpoczęcie procesu członkostwa w UE"
 request_to_join_eu_decision: "Wniosek o przystąpienie do UE"
 request_to_join_eu_decision_desc: "Formalnie ubiegać się o przystąpienie do Unii Europejskiej."
 
 eu_events.0.t: "Wstąpienie do Unii Europejskiej"
 eu_events.0.d: "Zostaliśmy oficjalnie przyjęci do Unii Europejskiej"
 
 # NATO
 
 allow_leave_nato: "Pozwala ci opuścić Nato w ciągu najbliższych miesięcy"
 left_nato: "Opuszczenie NATO"
 leave_nato: "Opuść NATO"
 leave_nato_desc: "Cofnąć nasze członkostwo w NATO, pozwalając wojsku działać jako niezależna siła, wolna od amerykańskich wpływów."

 # imf

 je_imf_loan: "Program pożyczek MFW"
 je_imf_loan_reason: "Pożyczka Międzynarodowego Funduszu Walutowego została rozszerzona na [ROOT.GetCountry.GetName]. W zamian za finansowanie awaryjne kraj przyjął znaczące warunki: wysokie stopy procentowe, obowiązkowy wolny handel oraz zobowiązania wobec wielkich władz, które ubezpieczają fundusz."

 imf_je_obligations_active_tt: "Wielkie obowiązki energetyczne nadal obowiązują. Zagraniczni wierzyciele utrzymują dźwignię nad kluczowymi decyzjami dotyczącymi polityki gospodarczej."
 imf_je_obligations_met_tt: "Wypisano wielkie obowiązki energetyczne. Kraj ten zachowuje pełną suwerenność gospodarczą - mimo że warunki pożyczki pozostają w mocy."

 decision_leave_imf: "Opuść MFW"
 decision_leave_imf_desc: "Wycofanie z Międzynarodowego Funduszu Walutowego. Kraj ten nie będzie już kwalifikował się do wsparcia kredytowego MFW w przypadku upadłości, ale będzie wolny od zobowiązań wierzycieli i ingerencji. Decyzji tej nie można odwrócić. \n \n Uwaga: Nie możesz odejść, trzymając aktywną pożyczkę MFW."
 imf_cannot_leave_while_indebted_tt: "Nie można opuścić MFW, gdy uruchomiona jest aktywna pożyczka"


 imf_button_pay_obligations_name: "Wypłać zobowiązania"
 imf_button_pay_obligations_desc: "Spłać pozostałe wielkie zobowiązania energetyczne wcześniej. Kosztuje 500 złota i wymaga zadłużenia poniżej 50%, ale natychmiast przywraca pełną suwerenność gospodarczą i poprawia stosunki ze wszystkimi wielkimi mocami."
 imf_pay_obligations_cost_tt: "Wymagana skala zadłużenia poniżej 50% i 500 złota"
 imf_obligations_paid_tt: "Obowiązki opłaciły się wcześniej. Znakomite stosunki władzy poprawiły się."

 # imf_events.1 — Loan offer
 imf_events.1.t: "Interwencja MFW"
 imf_events.1.d: "Skarbiec [ROOT.GetCountry.GetName] znajduje się w kryzysie. Dług osiągnął poziom, który czyni rynki nerwowymi i wierzycielami ostrożnymi. Międzynarodowy Fundusz Walutowy zwrócił uwagę i wysłał delegację w celu zaoferowania finansowania w sytuacjach nadzwyczajnych. \n \n Warunki nie są hojne. Stopy procentowe zostaną ustalone na poziomie kar. Państwo to będzie musiało przyjąć wolny handel, niezależnie od istniejącej polityki gospodarczej. A wielkie władze, które zasilają fundusz, będą oczekiwać spełnienia pewnych zobowiązań. Ale alternatywa - zbliżająca się do bankructwa bez siatki bezpieczeństwa - może być gorsza."
 imf_events.1.f: "Niezależność i wypłacalność są rzadko dostępne w tym samym czasie."
 imf_events.1.a: "Zaakceptuj pożyczkę - potrzebujemy finansowania"
 imf_events.1.b: "Odmowa - będziemy zarządzać własnymi sprawami"

 # imf_events.2 — Great power notification
 imf_events.2.t: "Rozszerzony kredyt MFW"
 imf_events.2.d: "[SCOPE.sCountry('imf_debtor_scope').GetName] zaakceptował pakiet pożyczek MFW. Jako jedna z wielkich uprawnień gwarantowanych funduszu, [ROOT.GetCountry.GetName] posiada obecnie zobowiązania od kraju dłużnika. Porozumienie to wiąże się ze strategicznymi i finansowymi konsekwencjami."
 imf_events.2.f: "Dług jest formą dyplomacji."
 imf_events.2.a: "Dobrze - to daje nam przewagę"
 imf_events.2.b: "Niefortunne - narzucone warunki są zbyt surowe"

 # imf_events.3 — Loan complete
 imf_events.3.t: "Zakończenie programu MFW"
 imf_events.3.d: "Po upływie pięciu lat od przyjęcia pożyczki MFW, [ROOT.GetCountry.GetName] wypełniła zobowiązania związane z programem. Odsetki zostały wypłacone, warunki zostały spełnione, a wielcy wierzyciele mocy spełnione. Kraj ten wyłania się z doświadczeń związanych z przywróconą suwerennością - i ma nadzieję, że jego finanse będą lepiej uporządkowane niż wtedy, kiedy się zaczęły."
 imf_events.3.f: "Rejestr jest zrównoważony. Lekcje są trudniejsze do zmierzenia."
 imf_events.3.a: "Przeszliśmy przez to."

 # imf_events.4 — Leaving
 imf_events.4.t: "Wycofanie z MFW"
 imf_events.4.d: "[ROOT.GetCountry.GetName] wycofuje się z Międzynarodowego Funduszu Walutowego. Decyzja odzwierciedla przekonanie, że koszty członkostwa - warunki, zobowiązania, utrata suwerenności gospodarczej w czasie kryzysu - przeważają nad korzyściami płynącymi z dostępu do finansowania nadzwyczajnego. \n \n Wielkie moce nie będą zadowolone. I powinien [ROOT.GetCountry.GetName] ponownie podejść do bankructwa, nie będzie siatki bezpieczeństwa."
 imf_events.4.f: "Niezależność ma swoją cenę. Tak jak zależność."
 imf_events.4.a: "Stoimy sami - tak jak powinniśmy"

 # imf_events.5 — Great power notification of leaving
 imf_events.5.t: "Kraj opuścił MFW"
 imf_events.5.d: "[SCOPE.sCountry('imf_leaver_scope').GetName] wycofał się z Międzynarodowego Funduszu Walutowego. Decyzja jest rebuke do międzynarodowego porządku finansowego - i sygnały, że [SCOPE.sCountry('imf_leaver_scope').GetName] zamierza zaplanować swój własny kurs gospodarczy na lepsze lub gorsze."
 imf_events.5.f: "Jeden dłużnik mniej. Jedna dźwignia mniej."
 imf_events.5.a: "Zanotowane"

 # imf_events.10 — War bonds
 imf_events.10.t: "Obligacje wojenne"
 imf_events.10.d: "Ministerstwo Finansów zaproponowało środek nadzwyczajny: emisję obligacji wojennych. Obywatele i inwestorzy byliby proszeni o pożyczenie pieniędzy państwu w zamian za przyszłe spłatę wraz z odsetkami, zapewniając natychmiastowy zastrzyk pieniężny w celu sfinansowania działań wojennych. \n \n Obligacje będą działać - ale są to długi, a dług w związkach wojennych szybko. Zużycie dostaw wzrośnie wraz z przepływem pieniędzy do maszyny wojskowej."
 imf_events.10.f: "Naród pożycza od swojej przyszłości, by bronić swojej teraźniejszości."
 imf_events.10.a: "Wydaj obligacje - potrzebujemy pieniędzy teraz"
 imf_events.10.b: "Decline - nie będziemy hipoteki naszej przyszłości"

 imf_loan_modifier: "Warunki pożyczki MFW"
 imf_loan_modifier_desc: "Pożyczka MFW została udzielona. Stopy procentowe są bardzo wysokie, a wolny handel jest obowiązkowy. Inwestycje zagraniczne napływają, ale suwerenność gospodarcza jest ograniczona i ucierpiała legitymacja."

 imf_great_power_obligations: "Wielkie zobowiązania mocy"
 imf_great_power_obligations_desc: "Wielka władza, która wspiera MFW, posiada zobowiązania z tego kraju jako warunek pożyczki. Ich wpływ na politykę gospodarczą jest prawdziwy."

 imf_refused_loan_modifier: "Odrzucone pożyczki MFW"
 imf_refused_loan_modifier_desc: "Kraj ten odmówił udzielenia pomocy MFW i będzie sam zarządzać swoim długiem. W rezultacie warunki kredytowe uległy pogorszeniu."

 imf_post_loan_stability: "Po odzyskaniu programu"
 imf_post_loan_stability_desc: "Program MFW zakończył się. Po wypełnieniu swoich zobowiązań rząd zyskał pewną wiarygodność - a finanse tego kraju są w lepszym stanie."

 imf_left_modifier: "Poza MFW"
 imf_left_modifier_desc: "Ten kraj wycofał się z MFW. Jest ona wolna od zobowiązań wierzycieli, ale wyłączona z międzynarodowego finansowania nadzwyczajnego. Przepływy inwestycyjne są zmniejszone."

 war_bonds_modifier: "Obligacje wojenne wyemitowane"
 war_bonds_modifier_desc: "W celu sfinansowania działań wojennych wyemitowano obligacje wojenne. Dochody rosną, ale zadłużenie rośnie, a konsumpcja podaży wzrosła."

 war_bonds_refused_modifier: "Obligacje wojenne"
 war_bonds_refused_modifier_desc: "Rząd odmówił emisji obligacji wojennych. Dyscyplina fiskalna jest utrzymana, ale armia czuje szczyptę."

 un_events.6.t: "Nasze siły wracają z misji ONZ"
 un_events.6.d: "[ROOT.GetCountry.GetAdjective] siły zakończyły służbę w misji pokojowej ONZ i wracają do domu. Wkład ten był skromny pod względem wojskowym, ale znaczący dyplomatycznie - [ROOT.GetCountry.GetName] był obecny, gdy miało to znaczenie. Generał wrócił."
 un_events.6.a: "Witaj w domu."
 
 un_peacekeeping_contribution: "Wkład ONZ na rzecz pokoju"
 un_peacekeeping_contribution_desc: "[ROOT.GetCountry.GetName] przyczynił się do misji pokojowej ONZ. Społeczność międzynarodowa przyjęła do wiadomości."
 
  # ── EVENT 300: RESOLUTION PASSED ─────────────────────────────────
 
 un_events.300.t: "Rezolucja ONZ minęła"
 un_events.300.d: "Zgromadzenie Ogólne uzgodniło rezolucję w sprawie rozwiązania problemów na całym świecie i koordynacji globalnej współpracy w danym temacie"
 un_events.300.f: "Rezolucja niesie ze sobą ciężar międzynarodowego konsensusu - jeśli to coś warte."
 un_events.300.a: "Zanotowane"
 
 UN_RES_DESC_ENVIRONMENT: "#bold Resolution on Environmental Protection #! \n Państwa członkowskie zobowiązują się do przestrzegania skoordynowanych norm środowiskowych i zrównoważonego zarządzania zasobami. \n \n #tooltip_separator! \n @green_checkmark! Wszystkie kraje otrzymują #bold UN Environmental Resolution #! modyfikator przez 12 miesięcy."
 UN_RES_DESC_PEACE: "#bold Resolution on World Peace #! \n Zgromadzenie Ogólne potwierdza zaangażowanie w pokojowe rozwiązywanie sporów i zmniejszenie konfliktu międzystanowego. \n \n #tooltip_separator! \n @green_checkmark! Wszystkie kraje otrzymują #bold UN Peace Resolution #! modyfikator przez 12 miesięcy."
 UN_RES_DESC_ECONOMY: "#bold Rezolucja w sprawie rozwoju gospodarczego #! \n Państwa Członkowskie popierają skoordynowane inwestycje w gospodarkach rozwijających się i obniżenie barier handlowych. \n \n #tooltip_separator! \n @green_checkmark! Wszystkie kraje otrzymują #bold UN Economic Development Resolution #! modyfikator przez 12 miesięcy."
 UN_RES_DESC_TECHNOLOGY: "#bold Rezolucja Technologiczna UNESCO #! \n Zgromadzenie Ogólne ustanawia ramy podziału technologii i wspólnych badań naukowych między państwami członkowskimi. \n \n #tooltip_separator! \n @green_checkmark! Wszystkie kraje otrzymują #bold Rozdzielczość technologii ONZ #! modyfikator przez 12 miesięcy."
 
 # ── EVENT 301: RESOLUTION FAILED ─────────────────────────────────
 
 un_events.301.t: "Uchwała ONZ nie przejdzie."
 un_events.301.d: "Wniosek przed Zgromadzeniem Ogólnym Narodów Zjednoczonych nie zapewnił niezbędnej większości. Rezolucja została odrzucona, a sesja odroczona bez rezultatu. \n \n Nie zostaną wdrożone żadne środki. Delegacja sponsorująca wyraziła swoje rozczarowanie. Inni nie."
 un_events.301.f: "ONZ robi to, co robi najlepiej."
 un_events.301.a: "Nic dziwnego."
 
 # ── EVENT 302: SANCTIONS (TARGET) ────────────────────────────────
 
 un_events.302.t: "[ROOT.GetCountry.GetName] Usankcjonowane przez ONZ"
 un_events.302.d: "Rada Bezpieczeństwa ONZ przyjęła rezolucję nakładającą sankcje ekonomiczne na [ROOT.GetCountry.GetName]. Resolution was supposed by the requirement most and gets effect impossible. \n \n Obecnie obowiązują ograniczenia handlowe. Dyplomatyczna izolacja pogłębia się. Oczekuje się, że państwa członkowskie - choć nie są zmuszone - będą przestrzegać systemu sankcji. \n \n Sankcje pozostaną w mocy przez pięć lat, chyba że Rada Bezpieczeństwa zwoła ich przegląd."
 un_events.302.f: "Władza nie oddziela kraju od opinii świata."
 un_events.302.a: "Odrzucamy tę rezolucję"
 
 # ── EVENT 303: CONDEMNATION (TARGET) ─────────────────────────────
 
 un_events.303.t: "[ROOT.GetCountry.GetName] Skazany przez ONZ"
 un_events.303.d: "Zgromadzenie Ogólne Narodów Zjednoczonych przyjęło formalną rezolucję potępiającą [ROOT.GetCountry.GetName]. Potępienie zostało zatwierdzone większością głosów w wyniku debaty na głos. \n \n Potępienie nie ma wiążącego mechanizmu egzekwowania, ale stanowi formalne oświadczenie o międzynarodowej dezaprobaty i będzie miało wpływ na [ROOT.GetCountry.GetAdjective] pozostawanie w społeczności dyplomatycznej przez najbliższe lata."
 un_events.303.f: "Słowa to nie broń. Ale zostawiają ślady."
 un_events.303.a: "Nie będziemy pouczać."
 
 # ── EVENT 304: SANCTIONS/CONDEMNATION (OBSERVERS) ────────────────
 
 un_events.304.t: "Uzupełniona rezolucja ONZ w sprawie sankcji"
 un_events.304.d: "Rada Bezpieczeństwa ONZ przyjęła rezolucję nakładającą sankcje na inne państwo. Zmierzą się one z surowymi sankcjami, ponieważ świat koordynuje ekonomiczne obciążenie."
 un_events.304.f: "Maszyna międzynarodowej cenzury obraca się powoli, ale obraca się."
 un_events.304.a: "Zanotowane"
 
 UN_304_DESC_SANCTIONS: "Rada Bezpieczeństwa ONZ głosowała za nałożeniem sankcji gospodarczych na [global_var:un_sanction_target.GetName]. Rezolucja przekazywana przez wymagany margines. \n \n [global_var:un_sanction_target.GetName] będą podlegać ograniczeniom handlowym, izolacji dyplomatycznej i znaczącym karom ekonomicznym na okres obowiązywania sankcji. Oczekuje się, że państwa członkowskie będą przestrzegać tych ograniczeń."
 UN_304_DESC_CONDEMNATION: "Zgromadzenie Ogólne Narodów Zjednoczonych formalnie potępiło [global_var:un_sanction_target.GetName] większością głosów. Uchwała reprezentuje oficjalne oświadczenie o międzynarodowej dezaprobaty. \n \n Podczas gdy potępienie nie wiąże się z egzekwowaniem przepisów, umieszcza ono [global_var:un_sanction_target.GetAdjective] na płycie i wpływa na ich pozycję międzynarodową."
 
