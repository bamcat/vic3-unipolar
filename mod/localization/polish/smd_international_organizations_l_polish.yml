 ### AMNESTY INTERNATIONAL
 ### ══════════════════════════════════════════

 ngo_events.1.t: "Amnesty International potępia naszą politykę"
 ngo_events.1.d: "Amnesty International opublikowała obciążający raport na temat praw człowieka w naszym kraju, powołując nasze obecne prawa jako systematyczne pogwałcenie podstawowych wolności. Społeczność międzynarodowa zauważyła, a nasz rząd stoi w obliczu rosnącej presji, by rozwiązać te problemy."
 ngo_events.1.a: "Ich krytyka nic nie zmienia."
 ngo_events.1.b: "Przejrzymy ich obawy."

 ngo_events.2.t: "Reforma Amnesty International Chwali"
 ngo_events.2.d: "Nasze ostatnie reformy legislacyjne zostały uznane przez Amnesty International za znaczący krok naprzód w zakresie praw człowieka. Ich sprawozdanie roczne podkreśla nasze postępy, zwiększając międzynarodową reputację naszego kraju."
 ngo_events.2.a: "Jesteśmy dumni z naszych postępów"

 ngo_events.3.t: "Raporty o amnestii w sprawie niepokojów obywatelskich"
 ngo_events.3.d: "Amnesty International opublikowała specjalny raport dokumentujący powszechne niepokoje społeczne chwytające nasz naród. Wzywają nasz rząd do zajęcia się podstawowymi przyczynami niezadowolenia, zamiast represji."
 ngo_events.3.a: "Rozważmy reformy"
 ngo_events.3.b: "Nasze wewnętrzne sprawy nie są ich zmartwieniem."

 ### ══════════════════════════════════════════
 ### RED CROSS
 ### ══════════════════════════════════════════

 ngo_events.10.t: "Czerwony Krzyż oferuje pomoc humanitarną"
 ngo_events.10.d: "Międzynarodowy Czerwony Krzyż zaproponował oddelegowanie pracowników humanitarnych do pomocy ludności cywilnej dotkniętej trwającym konfliktem. Ich zespoły pomocy są gotowe do zapewnienia opieki medycznej, schronienia i żywności przesiedleńcom w naszych rozdartych regionach."
 ngo_events.10.a: "Z zadowoleniem przyjmujemy ich pomoc."
 ngo_events.10.b: "Nie możemy pozwolić zagranicznym pracownikom w strefie wojny"

 ngo_events.11.t: "Czerwony Krzyż krytykuje przebieg wojny"
 ngo_events.11.d: "Międzynarodowy Czerwony Krzyż wydał publiczne oświadczenie wyrażające głębokie zaniepokojenie postępowaniem naszych sił zbrojnych. Raporty o rozległych ofiarach śmiertelnych i zniszczeniu infrastruktury w strefach konfliktu przyciągnęły uwagę międzynarodową. Wzywają wszystkie strony do poszanowania konwencji genewskich."
 ngo_events.11.a: "Będziemy współpracować z ich śledczymi."
 ngo_events.11.b: "Zaprzeczamy tym zarzutom."

 ngo_events.12.t: "Czerwony Krzyż oferuje pomoc kryzysową"
 ngo_events.12.d: "Pomimo braku otwartej wojny, Międzynarodowy Czerwony Krzyż zidentyfikował rosnący kryzys humanitarny w naszych granicach. Powszechne niepokoje społeczne i zakłócenia gospodarcze stworzyły warunki wymagające pomocy międzynarodowej. Oferują one koordynację działań pomocowych dla dotkniętych ludności."
 ngo_events.12.a: "Przyjmujemy ich pomoc."
 ngo_events.12.b: "Poradzimy sobie sami."

 ### ══════════════════════════════════════════
 ### IAEA
 ### ══════════════════════════════════════════

 ngo_events.20.t: "MAEA wnioskuje o inspekcję jądrową"
 ngo_events.20.d: "Międzynarodowa Agencja Energii Atomowej oficjalnie zwróciła się o dostęp do naszych obiektów jądrowych w celu przeprowadzenia kompleksowej inspekcji bezpieczeństwa i zgodności. Jako niesygnatariusz traktatu o nierozprzestrzenianiu broni jądrowej, nasz program jądrowy przyciągnął większą kontrolę międzynarodową. MAEA zapewnia nas, że inspekcja jest rutynowa, ale odmowa byłaby wyraźnym sygnałem dla społeczności międzynarodowej."
 ngo_events.20.a: "Nasze obiekty są otwarte do inspekcji"
 ngo_events.20.b: "Nasz program nuklearny jest suwerenny."

 ngo_events.21.t: "MAEA rozpoczyna rejestr bezpieczeństwa jądrowego"
 ngo_events.21.d: "Po przeglądzie naszego programu jądrowego, Międzynarodowa Agencja Energii Atomowej oficjalnie pochwaliła nasze zaangażowanie na rzecz norm bezpieczeństwa i nieproliferacji. Nasze przestrzeganie NPT i współpraca z międzynarodowymi inspektorami wzmocniły naszą pozycję w globalnej społeczności jądrowej."
 ngo_events.21.a: "Nadal jesteśmy zaangażowani w pokojową energię jądrową."

 ngo_events.22.t: "MAEA podnosi obawy o rozprzestrzenianie"
 ngo_events.22.d: "Międzynarodowa Agencja Energii Atomowej wzbudziła niepokój co do kierunku naszego programu nuklearnego. Bez członkostwa w NPT i z naszą ciągłą odmową współpracy z inspektorami, MAEA wydała formalne oświadczenie wyrażające zaniepokojenie ewentualnym rozwojem broni. Społeczność międzynarodowa uważnie obserwuje."
 ngo_events.22.a: "Jesteśmy otwarci na dialog"
 ngo_events.22.b: "Potwierdzamy nasze suwerenne prawo do technologii jądrowej"

 ### ══════════════════════════════════════════
 ### MODIFIERS
 ### ══════════════════════════════════════════

 ngo_amnesty_scrutiny: "Pod Amnesty Scrutiny"
 ngo_amnesty_scrutiny_desc: "Amnesty International ściśle monitoruje nasze dane dotyczące praw człowieka w następstwie niedawnej krytyki. Legalność rządu jest pod presją."

 ngo_amnesty_reform_pressure: "Presja reformująca"
 ngo_amnesty_reform_pressure_desc: "Sprawozdanie Amnesty International w sprawie niepokojów obywatelskich wywołało wewnętrzną i międzynarodową presję na reformy, ale pomogło stłumić rewolucyjne uczucia."

 ngo_redcross_aid: "Pomoc humanitarna dla Czerwonego Krzyża"
 ngo_redcross_aid_desc: "Pracownicy Czerwonego Krzyża udzielają pomocy humanitarnej cywilom w strefach konfliktu, zmniejszając śmiertelność i zwiększając naszą międzynarodową reputację."

 ngo_redcross_cooperation: "Współpraca Czerwonego Krzyża"
 ngo_redcross_cooperation_desc: "Nasza współpraca z Czerwonym Krzyżem w sprawie działań wojennych poprawiła naszą międzynarodową pozycję i zmniejszyła niesławę wywołaną naszymi działaniami wojskowymi."

 ngo_redcross_relief: "Pomoc kryzysowa dla Czerwonego Krzyża"
 ngo_redcross_relief_desc: "Czerwony Krzyż zapewnia pomoc humanitarną w tym okresie kryzysu cywilnego, pomagając ustabilizować dotknięte społeczeństwo."

 ngo_iaea_inspectors: "Obecni inspektorzy MAEA"
 ngo_iaea_inspectors_desc: "Inspektorzy MAEA działają w naszych obiektach jądrowych, dzieląc się wiedzą techniczną i wiedzą na temat bezpieczeństwa. Ich obecność przyspiesza transfer technologii i zwiększa naszą reputację dyplomatyczną."
