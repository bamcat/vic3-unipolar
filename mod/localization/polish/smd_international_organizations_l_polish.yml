 ### EU ORGANIZATION
 ### ══════════════════════════════════════════
 
 io_eu_name: "Unia Europejska"
 io_eu_abbreviation: "UE"
 io_eu_desc: "Unia Europejska jest unią polityczną i gospodarczą państw europejskich, które zastąpiły [concept_eec]. Ustanawia jednolity rynek, koordynuje politykę zagraniczną i bezpieczeństwa oraz promuje wspólne zarządzanie za pośrednictwem swoich instytucji w Brukseli. Członkowie korzystają z unii celnej i harmonizacji regulacyjnej."
 
