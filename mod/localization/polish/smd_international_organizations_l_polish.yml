 # ── TREATY ARTICLES ──────────────────────
 
 defense_attache: "Wyślij attaché obrony"
 defense_attache_desc: "Zamieść doradców wojskowych i oficerów łącznikowych z siłami zbrojnymi kraju docelowego. Cel zyskuje doświadczenie i zmniejsza koszty wojskowe; źródło zyskuje wpływ i pozycję dyplomatyczną. Kraj źródłowy musi utrzymywać większą projekcję mocy niż cel."
 
 cultural_exchange: "Wymiana kulturalna"
 cultural_exchange_desc: "Ustanowienie formalnego programu wymiany kulturalnej - wspólne wystawy, programy akademickie i kontakty międzyludzkie. Oba kraje zyskują prestiż, wpływy i stają się bardziej atrakcyjne dla migrantów."
 
 research_partnership: "Partnerstwo w zakresie badań naukowych"
 research_partnership_desc: "Formalne porozumienie w sprawie dzielenia się programami badawczymi i instytucjami akademickimi. Oba kraje korzystają z poprawy szybkości badań i rozpowszechniania technologii. Wymaga, aby obie strony były co najmniej uznanymi uprawnieniami."
 
 human_development_collaboration: "Współpraca na rzecz rozwoju ludzkiego"
 human_development_collaboration_desc: "Bogaty kraj finansuje programy rozwoju w celu - opieka zdrowotna, edukacja, opieka społeczna. Źródło pokrywa bieżące koszty w zamian za wpływy i prestiż. Umowa złamie się, jeśli gospodarka kraju pochodzenia spadnie poniżej poziomu docelowego."
 
 research_partnership_rank_tt: "Oba kraje muszą być co najmniej uznanymi kompetencjami do nawiązania partnerstwa badawczego"
 
 # ── DIPLOMATIC ACTIONS ───────────────────
 
 financial_sanctions: "Sankcje finansowe"
 financial_sanctions_desc: "Odcinanie relacji finansowych [ROOT.GetCountry.GetName] z celem - blokowanie dostępu do rynków kredytowych i ograniczanie obrotu papierami wartościowymi. Sektor bankowy i finansowy docelowy ucierpi znacznie."
 
 condemn: "Wyrok skazujący"
 condemn_desc: "Wydanie formalnego publicznego potępienia działań państwa docelowego. Cel cierpi na trwałe uderzenie w prestiż, legitymację i reputację dyplomatyczną. Wymaga, aby cel miał znaczną niesławę."
 condemn_action_notification_name: "[INITIATOR_COUNTRY.GetName] potępił nas!"
 condemn_pact_desc: "[SCOPE.GetRootScope.GetDiplomaticPact.GetFirstCountry.GetName] jest potępiony [SCOPE.GetRootScope.GetDiplomaticPact.GetSecondCountry.GetName]!"
 condemn_action_notification_desc: "Zostaliśmy potępieni przez [INITIATOR_COUNTRY.GetName]!"
 condemn_break_name:0 "Ponowne potępienie"
 condemn_pact_desc:0 "Potępić działania tego kraju."
 
 propose_un_sanctions: "Zaproponowanie sankcji ONZ"
 propose_un_sanctions_desc: "Jako stały członek Rady Bezpieczeństwa możemy zaproponować, aby Organizacja Narodów Zjednoczonych formalnie sankcjonowała ten cel. Jeśli głosowanie się uda, cel będzie musiał zostać poddany surowym karom ekonomicznym przez pięć lat."
 propose_un_sanctions_action_notification_name: "[INITIATOR_COUNTRY.GetName] zaproponował ONZ sankcje przeciwko nam!"
 propose_un_sanctions_pact_desc: "[SCOPE.GetRootScope.GetDiplomaticPact.GetFirstCountry.GetName] wystąpił o międzynarodowe sankcje przeciwko [SCOPE.GetRootScope.GetDiplomaticPact.GetSecondCountry.GetName]!"
 propose_un_sanctions_action_notification_desc:1 "[INITIATOR_COUNTRY.GetName] skierował się w ONZ do zaproponowania międzynarodowych sankcji przeciwko nam!"
 
 propose_un_condemnation: "Propozycja kondeminacji ONZ"
 propose_un_condemnation_desc: "Zaproponować, by Organizacja Narodów Zjednoczonych formalnie potępiła cel. Jeśli głosowanie się uda, cel ucierpi na trwałym prestiżu i uszkodzeniu legitymacji. Mniej surowe niż sankcje."
 propose_un_condemnation__action_notification_name:0 "[INITIATOR_COUNTRY.GetName] zaproponował ONZ Demonstration gateus!"
 propose_un_condemnation_pact_desc:0 "[SCOPE.GetRootScope.GetDiplomaticPact.GetFirstCountry.GetName] wystąpił o międzynarodowe potępienie przeciwko [SCOPE.GetRootScope.GetDiplomaticPact.GetSecondCountry.GetName]!"
 propose_un_condemnation_action_notification_desc:0 "[INITIATOR_COUNTRY.GetName] zaapelował w ONZ o międzynarodowe potępienie przeciwko nam!"
 
 condemn_requires_infamy_tt: "Cel musi mieć niesławę."
