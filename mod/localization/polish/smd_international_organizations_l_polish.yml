 ### United Nations
 io_un_name: "ONZ"
 io_un_abbreviation: "ONZ"
 io_un_desc: "[concept_united_nations] jest [concept_cooperative_agreement] założonym w celu utrzymania międzynarodowego pokoju i bezpieczeństwa, rozwijania przyjaznych stosunków między narodami i promowania postępu społecznego. W przeciwieństwie do innych [concept_intergovernmental_organization] s, ONZ nie dostarcza bezpośrednio modyfikatorów swoim członkom. Jego wpływ wykorzystuje się w rezolucjach dyplomatycznych, mandatach pokojowych i globalnych inicjatywach."
 io_un_tooltip: "[concept_united_nations] jest [concept_cooperative_agreement] z narodów świata. \n Kliknij, aby zobaczyć szczegóły."

 ### NATO
 io_nato_name: "Organizacja Traktatu Północnoatlantyckiego"
 io_nato_abbreviation: "NATO"
 io_nato_desc: "[concept_nato] to [concept_military_defense_agreement] ustanowiony w 1949 roku, wiążący kraje Ameryki Północnej i Europy w obronie zbiorowej. Uzbrojony atak na jednego członka jest uważany za atak na wszystkich. NATO koordynuje wspólne ćwiczenia wojskowe, standaryzuje sprzęt i utrzymuje zintegrowane struktury dowodzenia."

 ### G7
 io_g7_name: "Grupa Siedem"
 io_g7_abbreviation: "G7"
 io_g7_desc: "[concept_g7] to [concept_financial_agreement] obejmujący największe na świecie zaawansowane gospodarki. Członkowie koordynują politykę fiskalną, politykę pieniężną i zarządzanie gospodarcze. Członkostwo daje znaczący wpływ dyplomatyczny i wiarygodność finansową."

 ### OPEC
 io_opec_name: "Organizacja krajów wywozu ropy naftowej"
 io_opec_abbreviation: "OPEC"
 io_opec_desc: "[concept_opec] jest [concept_free_trade_agreement] głównych krajów produkujących ropę naftową, które koordynują politykę ropopochodną pomiędzy państwami członkowskimi. Celem OPEC jest zapewnienie stabilizacji rynków ropy naftowej i sprawiedliwego zwrotu dla krajów produkujących."

 ### EEC
 io_eec_name: "Europejska Wspólnota Gospodarcza"
 io_eec_abbreviation: "EWG"
 io_eec_desc: "[concept_eec] jest [concept_free_trade_agreement] ustanawiającym wspólny rynek wśród europejskich państw członkowskich. Zmniejsza bariery handlowe, harmonizuje regulacje ekonomiczne i promuje swobodny przepływ towarów, usług, kapitału i pracy w krajach członkowskich."
 
 ### Arab League
 io_arab_league_name: "Liga Arabska"
 io_arab_league_abbreviation: "LAS"
 io_arab_league_desc: "[concept_arab_league] jest [concept_cultural_pact] krajów arabskojęzycznych, które promują współpracę polityczną, gospodarczą, kulturalną i społeczną wśród swoich członków. Liga koordynuje politykę w sprawach będących przedmiotem wspólnego zainteresowania i pośredniczy w sporach między państwami arabskimi."

 ### IMF
 io_imf_name: "Międzynarodowy Fundusz Walutowy"
 io_imf_abbreviation: "MFW"
 io_imf_desc: "[concept_imf] jest [concept_financial_agreement], który promuje międzynarodową współpracę monetarną, stabilność kursu walutowego i uporządkowane uzgodnienia walutowe. Zapewnia pomoc finansową i doradztwo polityczne państwom członkowskim borykającym się z problemami bilansu płatniczego."

 ### ESA
 io_esa_name: "Europejska Agencja Kosmiczna"
 io_esa_abbreviation: "PZE"
 io_esa_desc: "[concept_esa] jest [concept_cooperative_agreement] dedykowany do eksploracji i wykorzystania przestrzeni kosmicznej. Państwa członkowskie gromadzą środki na rozwój pojazdów nośnych, satelitów i misji naukowych, których żaden pojedynczy naród europejski nie mógłby osiągnąć samodzielnie."

 ### ASEAN
 io_asean_name: "Stowarzyszenie Narodów Azji Południowo-Wschodniej"
 io_asean_abbreviation: "ASEAN"
 io_asean_desc: "[concept_asean] jest [concept_cooperative_agreement] krajów Azji Południowo-Wschodniej promujących wzrost gospodarczy, postęp społeczny i rozwój kulturalny. ASEAN ułatwia stabilność regionalną i zapewnia ramy wielostronnego dialogu w regionie Azji i Pacyfiku."

 ### WHO
 io_saarc_name: "Południowoazjatyckie Stowarzyszenie Współpracy Regionalnej"
 io_saarc_desc: "[concept_saarc] jest [concept_cooperative_agreement] wśród krajów Azji Południowej, których celem jest współpraca regionalna, koordynacja rozwoju i dialog wielostronny."

 io_cis_name: "Wspólnota Niepodległych Państw"
 io_cis_desc: "[concept_cis] jest [concept_cooperative_agreement] wśród krajów postsowieckich skupionych na konsultacjach regionalnych, koordynacji gospodarczej i praktycznej współpracy międzyrządowej."

 io_who_name: "Światowa Organizacja Zdrowia"
 io_who_abbreviation: "WHO"
 io_who_desc: "[concept_who] to [concept_cooperative_agreement] kierujący i koordynujący międzynarodową politykę zdrowotną. Zapewnia on przywództwo w światowych sprawach zdrowotnych, określa normy i standardy, monitoruje tendencje zdrowotne oraz koordynuje reakcje na międzynarodowe sytuacje kryzysowe w dziedzinie zdrowia."

 ### ═══════════════════════════════════════
 ### TREATIES — Names & Descriptions
 ### ═══════════════════════════════════════

 io_treaty_geneva_name: "Konwencje genewskie"
 io_treaty_geneva_desc: "Seria traktatów znanych jako konwencje genewskie jest odpowiedzialna za ustanowienie norm prawa międzynarodowego w zakresie traktowania humanitarnego podczas konfliktu zbrojnego. Sygnatariusze [concept_international_treaty] zgadzają się chronić rannych żołnierzy, jeńców wojennych i cywilów w czasie wojny."

 io_treaty_cwc_name: "Konwencja o broni chemicznej"
 io_treaty_cwc_desc: "Konwencja o broni chemicznej jest programem [concept_international_treaty], który zakazuje rozwoju, produkcji, nabywania, przechowywania, zatrzymywania, przekazywania i używania broni chemicznej. Sygnatariusze zgadzają się zniszczyć istniejące zapasy w ramach międzynarodowej weryfikacji."

 io_treaty_npt_name: "Traktat o nierozprzestrzenianiu broni masowego rażenia"
 io_treaty_npt_desc: "Traktat o nierozprzestrzenianiu broni jądrowej ma na celu zapobieganie rozprzestrzenianiu broni jądrowej, promowanie rozbrojenia oraz ułatwienie pokojowego wykorzystania energii jądrowej w ramach międzynarodowych zabezpieczeń."

 io_treaty_bwc_name: "Konwencja o broni biologicznej"
 io_treaty_bwc_desc: "Konwencja o broni biologicznej jest programem [concept_international_treaty] zakazującym rozwoju, produkcji i składowania broni biologicznej i toksycznej. Była to pierwsza wielostronna umowa o rozbrojeniu, która zakazała całej kategorii broni."

 io_treaty_cat_name: "Konwencja przeciwko torturom"
 io_treaty_cat_desc: "Konwencja przeciwko torturom jest programem [concept_international_treaty] zakazującym wszelkich form tortur i okrutnego, nieludzkiego lub poniżającego traktowania lub karania. Sygnatariusze zobowiązują się do podjęcia skutecznych środków zapobiegających torturom w ramach ich jurysdykcji."

 ### ═══════════════════════════════════════
 ### NGOs — Names & Descriptions
 ### ═══════════════════════════════════════

 io_iaea_name: "Międzynarodowa Agencja Energii Atomowej"
 io_iaea_abbreviation: "MAEA"
 io_iaea_desc: "MAEA promuje pokojowe wykorzystanie energii jądrowej i działa na rzecz zapobiegania jej wykorzystywaniu do celów wojskowych. Przeprowadza inspekcje, zapewnia pomoc techniczną oraz ustanawia międzynarodowe normy bezpieczeństwa obiektów jądrowych."

 io_redcross_name: "Międzynarodowy Czerwony Krzyż"
 io_redcross_abbreviation: "ICRC"
 io_redcross_desc: "Międzynarodowy Czerwony Krzyż zapewnia pomoc humanitarną w czasie konfliktów zbrojnych i klęsk żywiołowych. Monitoruje zgodność z konwencjami genewskimi, odwiedza jeńców wojennych i ułatwia komunikację między oddzielonymi członkami rodziny."

 io_amnesty_name: "Amnesty International"
 io_amnesty_abbreviation: "AI"
 io_amnesty_desc: "Amnesty International bada i ujawnia łamanie praw człowieka na całym świecie. Kampanie na rzecz uwolnienia więźniów politycznych, zniesienia tortur i kary śmierci oraz ochrony uchodźców i migrantów."

