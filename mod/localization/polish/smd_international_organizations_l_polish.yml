 ### MEMBERSHIP VOTING EVENTS
 ### ══════════════════════════════════════════
 
 io_events.1.t: "Wniosek o członkostwo"
 io_events.1.d: "[scope:io_applicant.GetName] złożył formalny wniosek o dołączenie do naszej organizacji. Jako obecny członek Rady zostaliśmy poproszeni o głosowanie nad ich przyjęciem."
 io_events.1.a: "Zatwierdzenie ich członkostwa"
 io_events.1.b: "Odrzuć ich podanie"
 
 io_events.2.t: "Program zaakceptowany"
 io_events.2.d: "Nasz wniosek o przystąpienie do organizacji został poddany przeglądowi przez wszystkich członków. Nie zgłoszono żadnych zastrzeżeń i zostaliśmy oficjalnie przyjęci."
 io_events.2.a: "Doskonałe wieści"
 
 io_events.3.t: "Odrzucony wniosek"
 io_events.3.d: "Nasz wniosek o przyłączenie się do organizacji został odrzucony. Przynajmniej jedno państwo członkowskie głosowało przeciwko naszemu przyjęciu."
 io_events.3.a: "Rozczarowanie"
 
 ### ══════════════════════════════════════════
 ### EU FORMATION EVENTS
 ### ══════════════════════════════════════════
 
 io_events.10.t: "Traktat z Maastricht"
 io_events.10.d: "Państwa członkowskie Europejskiej Wspólnoty Gospodarczej zgodziły się pogłębić swoją integrację poprzez Traktat o Unii Europejskiej. EEC zostanie formalnie przekształcona w Unię Europejską, unię polityczną i gospodarczą z rozszerzonymi kompetencjami w dziedzinie polityki zagranicznej, sprawiedliwości i spraw monetarnych."
 io_events.10.a: "Nowa era dla Europy"
 
 io_events.11.t: "Unia Europejska rodzi się"
 io_events.11.d: "Europejska Wspólnota Gospodarcza została formalnie przekształcona w Unię Europejską. Jako państwo członkowskie, nasz naród jest teraz częścią bezprecedensowego eksperymentu w ponadnarodowym zarządzaniu."
 io_events.11.a: "Zaczyna się nowy rozdział"
 
