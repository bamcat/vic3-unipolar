 io_financial_agreement_member: "Członek umowy finansowej"
 io_financial_agreement_member_desc: "Członkostwo w międzynarodowej umowie finansowej zapewnia większy wpływ dyplomatyczny i pozycję wśród największych gospodarek świata."
 
 io_free_trade_agreement_member: "Członek Umowy o wolnym handlu"
 io_free_trade_agreement_member_desc: "Ten naród jest stroną unii celnej z innymi członkami, zmniejszając bariery handlowe i harmonizując regulacje gospodarcze."
 
 io_opec_member: "Członek OPEC"
 io_opec_member_desc: "Członkostwo w organizacji krajów wywozu ropy naftowej zapewnia skoordynowaną siłę cenową i zwiększoną zdolność produkcyjną ropy naftowej."
 
 io_military_defense_agreement_member: "Członek Wojskowej Umowy Obronnej"
 io_military_defense_agreement_member_desc: "Ten naród jest związany zbiorowymi zobowiązaniami bezpieczeństwa. Atak na każdego członka jest uważany za atak na wszystkich."
 
 io_cultural_pact_member: "Członek Paktu Kulturowego"
 io_cultural_pact_member_desc: "Wspólne dziedzictwo i współpraca kulturalna między państwami członkowskimi przyspiesza rozprzestrzenianie się nowych technologii i łagodzi rewolucyjne odczucia."
 
