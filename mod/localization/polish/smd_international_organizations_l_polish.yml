 ### EVENTS
 ### ══════════════════════════════════════════

 opec_events.1.t: "Zainicjowane głosowanie OPEC"
 opec_events.1.d: "Państwo członkowskie wezwało do głosowania w ramach organizacji krajów wywozu ropy naftowej. Wszyscy członkowie proszeni są o oddanie głosów za pośrednictwem wpisu do dziennika OPEC."
 opec_events.1.a: "Rozważymy nasze stanowisko."

 opec_events.10.t: "Głosowanie OPEC zakończone"
 opec_events.10.d: "Głosowanie OPEC dobiegło końca, a wyniki są porównywane."

 opec_events.11.t: "OPEC zwiększa produkcję"
 opec_events.11.d: "Państwa członkowskie OPEC głosowały za zwiększeniem kwot produkcji ropy. W następnym roku wszystkie państwa członkowskie skorzystają na wyższej przepustowości wydobycia i lepszej pozycji handlowej dla eksportu ropy naftowej."
 opec_events.11.a: "Krany są otwarte."

 opec_events.12.t: "Produkcja cięć OPEC"
 opec_events.12.d: "Państwa członkowskie OPEC głosowały za obniżeniem kwot produkcji ropy. W przyszłym roku wszystkie państwa członkowskie ograniczą produkcję ropy naftowej, aby zaostrzyć światową podaż i wesprzeć ceny."
 opec_events.12.a: "Będziemy przestrzegać"

 opec_events.13.t: "Embargo oleju OPEC"
 opec_events.13.d: "Organizacja krajów wywozu ropy naftowej głosowała za nałożeniem embarga na ropę naftową. Państwa członkowskie OPEC zbiorowo ograniczą eksport ropy naftowej do kraju docelowego, poważnie zakłócając ich gospodarkę."
 opec_events.13.a: "To zmieni globalny handel"

