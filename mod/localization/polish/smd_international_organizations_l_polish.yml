l_polish:
 # United Nations
 je_united_nations: "ONZ"
 je_united_nations_reason: "\n \n Organizacja Narodów Zjednoczonych służy jako międzynarodowy organ do spraw dyplomacji, utrzymania pokoju i wysiłków humanitarnych. \n \n Stała Rada Bezpieczeństwa: \n - [GetGlobalVariable('permanent_members_1').GetCountry.GetName] \n - [GetGlobalVariable('permanent_members_2').GetCountry.GetName] \n - [GetGlobalVariable('permanent_members_3').GetCountry.GetName] \n [GetGlobalVariable('permanent_members_4').GetCountry.GetName] \n [GetGlobalVariable('permanent_members_5').GetCountry.GetName] \n \n > \n Organizacja Narodów Zjednoczonych pełni rolę międzynarodowego organu ds. dyplomacji, utrzymania pokoju i działań humanitarnych. Decyzje ONZ - zwłaszcza Rady Bezpieczeństwa - mogą mieć bezpośredni wpływ na przyszłe wydarzenia w waszym kraju."

 # ── PROPOSE BUTTON ────────────────────────
 
 un_propose_motion_button: "Zaproponowanie uchwały"
 un_propose_motion_button_desc: "Zaproponowanie rezolucji ONZ dla wszystkich państw członkowskich do głosowania. Jeżeli rezolucja przejdzie, wszystkie kraje otrzymają skutki na okres pięciu lat. Można zaproponować tylko raz w roku."
 un_no_motion_active_tt: "Żadna rezolucja nie jest obecnie przedmiotem debaty."
 
 # ── VOTE BUTTONS ─────────────────────────
 
 un_vote_yay_button: "Głosowanie w favour"
 un_vote_yay_button_desc: "Obsada [ROOT.GetCountry.GetName] Głosowanie za przyjęciem obecnej rezolucji. Stała Rada Bezpieczeństwa głosowała dwukrotnie."
 
 un_vote_nay_button: "Głosowanie przeciwko"
 un_vote_nay_button_desc: "Obsada [ROOT.GetCountry.GetName] przeciwko obecnej rezolucji. Stała Rada Bezpieczeństwa głosowała dwukrotnie."
 
 # ── MOTION EVENTS ────────────────────────
 
 un_events.100.t: "ONZ - Przedstawienie rezolucji"
 un_events.100.d: "Jako członek Organizacji Narodów Zjednoczonych [ROOT.GetCountry.GetName] może zaproponować Zgromadzeniu Ogólnemu uchwałę do głosowania. Wybierz rezolucję do przedłożenia do debaty. Wszystkie państwa członkowskie zostaną powiadomione i mogą głosować przy użyciu przycisków w dzienniku ONZ."
 un_events.100.a: "Rezolucja w sprawie ochrony środowiska"
 un_events.100.b: "Rezolucja w sprawie światowego pokoju"
 un_events.100.c: "Rezolucja w sprawie rozwoju gospodarczego"
 un_events.100.e: "Rezolucja w sprawie technologii UNESCO"
 
 un_events.101.t: "Organizacja Narodów Zjednoczonych - rezolucja w ramach debaty"
 un_events.101.d: "Na forum Zgromadzenia Ogólnego Narodów Zjednoczonych zaproponowano rezolucję. [ROOT.GetCountry.GetName] może oddać głos używając przycisków Yay lub Nay w dzienniku ONZ. Stała Rada Bezpieczeństwa głosowała dwukrotnie. Wynik zostanie ogłoszony w ciągu 120 dni."
 un_events.101.a: "Zrozumiałem - będziemy rozważać"
 
 # ── NOTIFICATIONS ─────────────────────────
 
 un_motion_passed: "Rezolucja ONZ minęła"
 un_motion_passed_desc: "Przyjęto rezolucję ONZ. [ROOT.GetCountry.GetName] będzie otrzymywać efekty przez następne pięć lat."
 
 un_motion_failed: "Uchwała ONZ nie powiodła się"
 un_motion_failed_desc: "Rezolucja ONZ nie przeszła. Wniosek nie uzyskał wystarczającego poparcia."
 
 # ── PROGRESS BAR ─────────────────────────
 
 un_je_no_motion_tt: "Żadna rezolucja nie jest obecnie przedmiotem debaty. Użyj #bold Zaproponować przycisk Rozdzielczość #!, aby wnieść wniosek do Zgromadzenia Ogólnego."
 
 un_je_voting_environment_tt: "#bold Rezolucja w sprawie ochrony środowiska - głosowanie w toku. #! Państwa członkowskie oddają swoje głosy. Użyj przycisków Yay lub Nay poniżej, aby oddać swój głos. Wynik zostanie ogłoszony po zamknięciu okresu głosowania."
 
 un_je_voting_peace_tt: "#bold Rezolucja w sprawie pokoju na świecie - głosowanie w toku. #! Państwa członkowskie oddają swoje głosy. Użyj przycisków Yay lub Nay poniżej, aby oddać swój głos. Wynik zostanie ogłoszony po zamknięciu okresu głosowania."
 
 un_je_voting_economy_tt: "#bold Rezolucja w sprawie rozwoju gospodarczego - głosowanie w toku. #! Państwa członkowskie oddają swoje głosy. Użyj przycisków Yay lub Nay poniżej, aby oddać swój głos. Wynik zostanie ogłoszony po zamknięciu okresu głosowania."
 
 un_je_voting_technology_tt: "#bold Rezolucja w sprawie technologii UNESCO - głosowanie w toku. #! Państwa członkowskie oddają swoje głosy. Użyj przycisków Yay lub Nay poniżej, aby oddać swój głos. Wynik zostanie ogłoszony po zamknięciu okresu głosowania."
 
 un_motion_progress_bar: "Wsparcie restrukturyzacji i uporządkowanej likwidacji"
 un_motion_progress_bar_desc: "Uprzywilejowany udział głosów: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%1] #! Głosy w favour: ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|0])"
 un_motion_progress_bar_second_desc: ""
 un_motion_progress_from_yes_votes: ""
 
 # ── RESOLUTION MODIFIERS ─────────────────
 
 un_resolution_environment: "Rezolucja ONZ - Ochrona środowiska"
 un_resolution_environment_desc: "Organizacja Narodów Zjednoczonych przyjęła rezolucję w sprawie ochrony środowiska. [ROOT.GetCountry.GetName] zobowiązał się do ograniczenia wytwarzania zanieczyszczeń i poprawy norm środowiskowych w ciągu najbliższych pięciu lat."
 
 un_resolution_peace: "Rezolucja ONZ - pokój na świecie"
 un_resolution_peace_desc: "Organizacja Narodów Zjednoczonych przyjęła rezolucję w sprawie światowego pokoju. [ROOT.GetCountry.GetName] korzysta ze zmniejszonego pokolenia niesławy i poprawy pozycji dyplomatycznej przez następne pięć lat."
 
 un_resolution_economy: "Rezolucja ONZ w sprawie rozwoju gospodarczego"
 un_resolution_economy_desc: "Organizacja Narodów Zjednoczonych przyjęła rezolucję w sprawie rozwoju gospodarczego. [ROOT.GetCountry.GetName] otrzymuje premie budowlane i inwestycyjne odzwierciedlające międzynarodową współpracę gospodarczą na najbliższe pięć lat."
 
 un_resolution_technology: "Rezolucja ONZ - technologia UNESCO"
 un_resolution_technology_desc: "Organizacja Narodów Zjednoczonych przyjęła rezolucję w sprawie technologii i edukacji. [ROOT.GetCountry.GetName] korzysta z lepszego dostępu do edukacji i kwalifikacji pop przez następne pięć lat."
 
 sb_request_peacekeepers: "Wniosek o rozjemców ONZ"
 sb_request_peacekeepers_desc: "Wzywać ONZ do rozmieszczenia sił pokojowych w celu pomocy w rozwiązywaniu konfliktów."

 un_events.1.t: "Wniosek o rozjemców ONZ"
 un_events.1.d: "Możemy zaapelować do ONZ o wysłanie sił pokojowych, by pomogły nam zakończyć nasz konflikt."
 un_events.1.a: "Złóż wniosek."
 un_events.1.b: "Nie angażuj ONZ."

 un_events.2.t: "Głosowanie Rady Bezpieczeństwa ONZ"
 un_events.2.d: "Rada Bezpieczeństwa musi głosować nad wysłaniem sił pokojowych do [GetGlobalVariable('peacekeeper_requestor').GetCountry.GetName]"
 un_events.2.a: "Yay"
 un_events.2.b: "Wstrzymać się od głosu"
 un_events.2.c: "Nie."
 un_events.2.e: "Veto [GetGlobalVariable('peacekeeper_requestor').GetCountry.GetName] 's Request for Peacekeeping"

 un_events.3.t: "Zatwierdzone Rozjemcy"
 un_events.3.d: "Rada Bezpieczeństwa ONZ głosowała za wysłaniem sił pokojowych."
 un_events.3.a: "Wejdź!"

 un_events.4.t: "Rozjemcy odrzuceni"
 un_events.4.d: "Rada Bezpieczeństwa ONZ głosowała przeciwko wysłaniu nam sił pokojowych."
 un_events.4.a: "Jesteśmy zdani na siebie."

 un_events.10.t: "Wybór członka Rady Bezpieczeństwa"
 un_events.10.d: "Zgromadzenie Ogólne Narodów Zjednoczonych wybrało nowego rotacyjnego członka do Rady Bezpieczeństwa: [un_rotating_member.GetName]."
 un_events.10.a: "Przyjąłem."
 
 unsc_member: "Członek Rady Bezpieczeństwa ONZ"
 permanent_unsc_member: "Stały członek Rady Bezpieczeństwa ONZ"
 un_peacekeepers_vetoed: "Rozjemcy odrzuceni"
 un_peacekeepers_deployed: "Utrzymanie pokoju ONZ"
 un_already_voting_on_peacekeeping: "Proszę poczekać, aż ONZ zakończy głosowanie nad obecną misją pokojową."
 
 un_events.5.t: "Uczestniczyć w misji pokojowej [GetGlobalVariable('peacekeeper_requestor').GetCountry.GetName]?"
 un_events.5.d: "Rada Bezpieczeństwa ONZ głosowała za wysłaniem misji pokojowej do [GetGlobalVariable('peacekeeper_requestor').GetCountry.GetName]. Członkowie walnego zgromadzenia zebrali się, aby omówić, które kraje są gotowe wysłać swoich ludzi na wojnę w interesie światowego pokoju."
 un_events.5.a: "Wyślemy [SCOPE.sCharacter('peacekeeper_general_1').GetFullName]"
 un_events.5.b: "Nie bierz w tym udziału."
 
 you_vote_yes: "Głosujesz w przychylności."
 you_abstain: "Jesteś ABSTAIN swój głos"
 you_vote_no: "Głosujesz za AGAINST"
 you_veto: "Ty weterujesz proces."
 
