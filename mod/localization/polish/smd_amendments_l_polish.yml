l_polish:

 # ==========================================
 # UNITED STATES
 # ==========================================

 amendment_medicaid: "Leki"
 amendment_medicaid_desc: "Federalne i państwowe ubezpieczenie zdrowotne dla biednych Amerykanów, osób starszych i niepełnosprawnych. Pomoc medyczna wypełnia lukę pozostawioną przez rynki prywatne - obejmującą tych, którzy nie mogą sobie pozwolić na składki oraz tych, których warunki sprawiają, że nie można ich ubezpieczyć. Program jest kosztowny i kwestionowany politycznie, ale jego skutki zmniejszenia śmiertelności są wymierne i rzeczywiste."

 amendment_affordable_care_act: "Ustawa o opiece przystępnej"
 amendment_affordable_care_act_desc: "Ustawa o opiece przystępnej - znana nieformalnie jako Obamacare - upoważnia wszystkich obywateli do posiadania ubezpieczenia zdrowotnego, do tworzenia regulowanych rynków dla potrzeb prywatnych i rozszerza uprawnienia do korzystania z pomocy medycznej. Ubezpieczyciele nie mogą zaprzeczać pokryciu istniejących wcześniej warunków. Indywidualny mandat jest głęboko kontrowersyjny. Supporterzy twierdzą, że jest to jedyny sposób, aby rynki ubezpieczeń funkcjonowały. Przeciwnicy nazywają to przesadą rządu w prywatne decyzje gospodarcze."

 amendment_federal_assault_weapons_ban: "Zakaz broni federalnej"
 amendment_federal_assault_weapons_ban_desc: "10-letni federalny zakaz produkcji określonej broni półautomatycznej i czasopism o dużej pojemności na sprzedaż cywilną. Zakaz jest kwestionowany - jego skuteczność kwestionowana przez przeciwników, jego konieczność argumentowana przez zwolenników. Wygasa po dekadzie, chyba że zostanie odnowiona. Koalicja polityczna, która ją minęła, jest krucha, a lobby broni już przygotowuje swoją odpowiedź."

 amendment_authorization_military_force: "Zezwolenie na użycie sił zbrojnych"
 amendment_authorization_military_force_desc: "Upoważnienie do korzystania z Sił Wojskowych upoważnia władze wykonawcze do używania sił wojskowych przeciwko osobom odpowiedzialnym za ataki terrorystyczne na [ROOT.GetCountry.GetName] oraz tym, którzy je ukrywali. Język jest celowo szeroki. Legalni uczeni spędzą dziesięciolecia kłócąc się o swoje granice - lub czy je mają. W praktyce zmniejsza on koszty dyplomatyczne jednostronnych działań wojskowych i rozszerza zasięg [ROOT.GetCountry.GetName] na arenie międzynarodowej."

 amendment_patriot_act: "Ustawa PATRIOT"
 amendment_patriot_act_desc: "Łącząc i wzmacniając Amerykę poprzez zapewnienie odpowiednich narzędzi wymaganych do Interceptu i Przeszkadzania Ustawy o Terroryzmie - znanej jako ustawa PATRIOT - radykalnie rozszerza krajowe organy nadzoru. Organy ścigania mogą monitorować komunikację, śledzić transakcje finansowe oraz dzielić się informacjami wywiadowczymi między agencjami, przy czym kontrole sądowe są mniejsze niż dotychczas. Turmoil i rewolucyjny spadek ciśnienia. Wolność obywatelska określa ją jako najistotniejszą erozję prywatności konstytucyjnej w historii [ROOT.GetCountry.GetName]."

 amendment_crime_bill_1994: "Ustawa o kontroli i egzekwowaniu prawa"
 amendment_crime_bill_1994_desc: "Ustawa o przestępczości z 1994 roku jest największym ustawodawstwem o przestępczości w historii [ROOT.GetCountry.GetName]. Finansuje dziesiątki tysięcy nowych funkcjonariuszy policji, rozszerza federalny system więzienny, wprowadza obowiązkowe kary minimalne za szereg przestępstw i tworzy ustawę o przemocy wobec kobiet jako jeźdźca. Turmoil spada. Społeczności, które są pod nią najbardziej politowane, będą miały inny pogląd na jej dziedzictwo."

 # ==========================================
 # CHINA
 # ==========================================

 amendment_china_tax_reform_1994: "Reforma systemu wymiany podatków"
 amendment_china_tax_reform_1994_desc: "Reforma podatkowa z 1994 r. zastąpiła system podatkowy oparty na przedsiębiorstwach - w którym rządy lokalne negocjowały porozumienia o podziale zysków z Pekinią - krajowym podatkiem od wartości dodanej i formalną formułą podziału zysków. Reforma radykalnie scentralizowana siła fiskalna. Pekin zyskał wiarygodne i rosnące dochody. Władze lokalne straciły dyskrecję, ale uzyskały jasność. Jest to fundament nowoczesnej architektury fiskalnej [ROOT.GetCountry.GetName]."

 amendment_one_child_policy: "Polityka wobec dzieci"
 amendment_one_child_policy_desc: "Państwo wymusza limit jednego dziecka na rodzinę poprzez połączenie zachęt finansowych, presji społecznej, a w niektórych przypadkach wymuszającą interwencję. Wskaźnik urodzeń gwałtownie spada. W kolejnych dziesięcioleciach [ROOT.GetCountry.GetName] szybko się zestarzeje, a siła robocza będzie się kurczyć. Polityka ta jest egzekwowana najbardziej ściśle na obszarach miejskich, a najbardziej nierównomiernie na obszarach wiejskich. Zarówno społeczność międzynarodowa, jak i krytycy krajowi sprzeciwiają się jej metodom."

 amendment_socialist_market_economy: "Socjalistyczna gospodarka rynkowa"
 amendment_socialist_market_economy_desc: "Socjalistyczna gospodarka rynkowa jest teoretycznymi ramami, w ramach których [ROOT.GetCountry.GetName] działa mechanizmy rynkowe, podczas gdy Strona utrzymuje ostateczny kierunek gospodarczy i polityczny. Prywatne przedsiębiorstwo jest dozwolone i wspierane w granicach określonych przez państwo. Z zadowoleniem przyjmuje się wybiórcze inwestycje zagraniczne. Kontrakty są rzeczywiste i celowe - ramy te mają na celu wykorzystanie efektywności rynku bez poddawania się kontroli strony. Działa na swój sposób."

 # ==========================================
 # FRANCE
 # ==========================================

 amendment_35_hour_work_week: "35- godzinny tydzień pracy"
 amendment_35_hour_work_week_desc: "Prawo Aubry nakazuje ustawowy 35-godzinny tydzień pracy dla większości pracowników, redukując standardowe godziny pracy z 39. Polityka ta jest przedstawiana jako sposób na szerszy podział pracy w całej populacji - mniej godzin na pracownika, więcej zatrudnionych pracowników. Związki zawodowe świętują. Pracodawcy twierdzą, że zwiększa koszty i zmniejsza elastyczność. Debata na temat tego, czy rzeczywiście zwiększa zatrudnienie czy jedynie redystrybuuje istniejące prace, nie zostanie szybko rozstrzygnięta."

 amendment_pasqua_law: "Prawo Pasqua"
 amendment_pasqua_law_desc: "Ustawa z Pasqua znacznie zaostrza przepisy imigracyjne - bardziej rygorystyczne wymogi w zakresie naturalizacji, zmniejszone prawa do łączenia rodzin, rozszerzone podstawy do deportacji oraz nowe ograniczenia prawa do pozostania dla osób, które wjechały nielegalnie. Minister spraw wewnętrznych Charles Pasqua ocenia to jako kwestię porządku narodowego i spójności kulturowej. Krytycy twierdzą, że jest to celowe wycofanie [ROOT.GetCountry.GetName] tradycji azylu i włączenia. Prawo to przechodzi ze znacznym poparciem publicznym i znaczącymi protestami."

 amendment_medicaid_modifier: "Leki"
 amendment_medicaid_modifier_desc: "Federalne ubezpieczenie zdrowotne obejmuje obywateli o niskich dochodach. Zmniejsza się śmiertelność, zwłaszcza wśród najbiedniejszych warstw."

 amendment_affordable_care_act_modifier: "Obamacare"
 amendment_affordable_care_act_modifier_desc: "Upoważniony prywatny zakres ochrony zdrowia z subwencjami i wcześniejszymi warunkami ochrony. Śmiertelność spada skromnie; koszty rosną dla pracodawców o średnich dochodach i państwa."

 amendment_federal_assault_weapons_ban_modifier: "Zakaz broni federalnej"
 amendment_federal_assault_weapons_ban_modifier_desc: "Cywilna produkcja i sprzedaż określonej broni półautomatycznej jest zabroniona. Radykalizacja jest znikoma."

 amendment_authorization_military_force_modifier: "Zezwolenie na użycie sił zbrojnych"
 amendment_authorization_military_force_modifier_desc: "Szeroki organ wykonawczy, aby użyć siły wojskowej przeciwko aktorom niepaństwowym, obniża dyplomatyczne koszty interwencji i rozszerza deklarowane zainteresowanie [ROOT.GetCountry.GetName]."

 amendment_patriot_act_modifier: "Ustawa PATRIOT"
 amendment_patriot_act_modifier_desc: "Rozszerzone krajowe organy nadzoru tłumią zamieszki i działalność rewolucyjną. Legitymacja i reputacja dyplomatyczna są skromne."

 amendment_crime_bill_1994_modifier: "1994 Crime Bill"
 amendment_crime_bill_1994_modifier_desc: "Rozszerzona policja i obowiązkowe minima zmniejszają zawirowania. Śmiertelność w egzekwowaniu prawa umiarkowanie wzrosła. Budżet jest pod presją."

 amendment_china_tax_reform_1994_modifier: "Reforma systemu wymiany podatków"
 amendment_china_tax_reform_1994_modifier_desc: "Scentralizowany system podatku od wartości dodanej przyczynia się do poprawy dochodów podatkowych i zmniejszenia ilości odpadów. Urząd jest nieznacznie ulepszony."

 amendment_one_child_policy_modifier: "Polityka wobec dzieci"
 amendment_one_child_policy_modifier_desc: "Wymuszone przez stan limity urodzeń znacznie obniżyły wskaźnik urodzeń. [ROOT.GetCountry.GetName] populacja będzie się znacznie starzeć w nadchodzących dziesięcioleciach."

 amendment_socialist_market_economy_modifier: "Socjalistyczna gospodarka rynkowa"
 amendment_socialist_market_economy_modifier_desc: "Mechanizmy rynkowe działające pod kierunkiem stron stymulują budowę prywatną, poprawiają przepustowość i rozszerzają inwestycje przemysłowe. Wsparcie ruchu komunistycznego jest skromnie ograniczone."

 amendment_35_hour_work_week_modifier: "35- godzinny tydzień pracy"
 amendment_35_hour_work_week_modifier_desc: "Ustawowe ograniczenia dotyczące godzin pracy znacznie poprawiły warunki pracy. Troubput jest nieznacznie zredukowany. Związki zawodowe są zadowolone, pracodawcy nie."

 amendment_pasqua_law_modifier: "Prawo Pasqua"
 amendment_pasqua_law_modifier_desc: "Bardziej rygorystyczne wymogi imigracyjne zwiększyły restrykcyjność i ograniczyły siłę napędową migracji. Upadła akceptacja kulturalna ludności innej niż ojczyzna."
