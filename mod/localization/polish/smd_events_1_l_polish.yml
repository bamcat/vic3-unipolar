 ### ══════════════════════════════════════════
 ### EVENTS
 ### ══════════════════════════════════════════

 demographic_events.1.t: "Kryzys demograficzny"
 demographic_events.1.d: "Eksperci ostrzegali, że nasz naród stoi w obliczu poważnego kryzysu demograficznego. Dekady spadku liczby urodzeń spowodowały, że starzejąca się populacja wkrótce przytłoczy naszą siłę roboczą. Bez trwałych inwestycji w opiekę nad dziećmi, opiekę zdrowotną, mieszkalnictwo i opiekę społeczną, nasza fundacja ekonomiczna ulegnie erozji wraz z upadkiem stosunku pracowników do osób pozostających na utrzymaniu. Musimy przeprowadzić i utrzymać kompleksowe pronatalistyczne reformy przez co najmniej dziesięć lat, aby odwrócić tę tendencję."
 demographic_events.1.a: "Musimy działać, zanim będzie za późno."

 demographic_events.2.t: "Odzyskiwanie demograficzne"
 demographic_events.2.d: "Po dziesięcioleciu trwałych inwestycji w naszych ludzi - powszechna opieka nad dziećmi, dostępna opieka zdrowotna, kompleksowy dobrobyt i przystępne zakwaterowanie - wskaźnik urodzeń naszego narodu ustabilizował się. Kryzys demograficzny, który groził osłabieniem naszej gospodarki, został powstrzymany. Nowe pokolenie robotników wchodzi w siłę roboczą, a przyszłość wygląda na jasną."
 demographic_events.2.a: "Nasza cierpliwość się opłaciła."

