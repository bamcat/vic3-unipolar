# canada

canada.1.t:0 "Autostrada łez"
canada.1.d:0 "W Kanadzie, gdzie dziesiątki rdzennych kobiet i dziewcząt zaginęły lub zostały zamordowane od lat 70. Spanning pomiędzy księciem Jerzem i księciem Rupertem, oddalony obszar od dawna brakowało transportu publicznego, zmuszając wielu do autostopu - często z śmiertelnymi konsekwencjami."
canada.1.f:0 "Wsadzili ją do stalowego pudełka. To musiała być zamknięta trumna z powodu sposobu, w jaki ją znaleźli "... Zatrzymał się, by wstrzymać łzy, zanim wykrzyknął słowa:" Ona... uległa pogorszeniu."

canada.1.a:0 "Niestety, przed tym krajem stoją pilniejsze problemy."
canada.1.b:0 "Powinniśmy się wstydzić!"

je_indigenous_rights: "Prawa tubylcze"
je_indigenous_rights_reason: "Kwestia praw rdzennych pozostaje jedną z najważniejszych nierozwiązanych kwestii w polityce krajowej [ROOT.GetCountry.GetName]. Generacje wywłaszczenia, przymusowej asymilacji i złamanych zobowiązań traktatowych pozostawiły głębokie różnice strukturalne pomiędzy populacjami rdzennymi i nierdzennymi. Wyeliminowanie tej luki będzie wymagało trwałej woli politycznej - i stanie w obliczu oporu ze strony tych, którzy korzystają ze status quo."


 indigenous_je_status_usa_tt: "W Stanach Zjednoczonych ponad 570 uznanych federalnie plemion zajmuje tereny rezerwacyjne, które stanowią ułamek ich terenów przodków. Przewidywana długość życia, poziom wykształcenia i dochody z rezerwacji są znacznie niższe od średnich krajowych. Federalna odpowiedzialność za zaufanie - prawny obowiązek ochrony suwerenności i dobrobytu plemiennych - jest powszechnie uznawana za nieodpowiednio wypełnioną."

 indigenous_je_status_can_tt: "Kanadyjskie Narody Pierwsze, Métis i Inuici liczą ponad milion ludzi, żyjących pod systemem rezerw ustanowionym ustawą indyjską z 1876 roku. Indyjski system szkoły mieszkaniowej - który siłą usunął dzieci rdzenne z rodzin do "asymilacji" - działał do 1996 r., a jego ostatnia szkoła została zamknięta dopiero niedawno. Uraz międzypokoleniowy tego systemu nadal kształtuje dziś społeczności rdzenne."

 indigenous_je_status_nzl_tt: "Lud Māori - tangata whenua, lud ziemi - podpisał traktat z Waitangi z Koroną Brytyjską w 1840 roku. Ten traktat nigdy nie był w pełni honorowany. Konfiskaty gruntów w XIX wieku pozbawiły społeczności Māori większości ich terytorium, a Māori New Zealanders nadal borykają się ze znacznymi różnicami w zakresie zdrowia, dochodów i wskaźników uwięzienia. Sąd Waitangi, ustanowiony w 1975 r., nadal słyszy skargi przeciwko Koronie."

 indigenous_je_status_ast_tt: "Australijski Aborygeni i Lud Wyspiarski Torres Strait są najstarszymi na świecie nieustającymi kulturami - i należą do najsłabszych. "Skradzione pokolenia" - dzieci aborygeni przymusowo usunięte ze swoich rodzin w ramach państwowej polityki asymilacji, która trwała do lat siedemdziesiątych - pozostawiły rany, które się nie zagoiły. Przewidywana długość życia rdzennych Australijczyków utrzymuje się ponad dekadę poniżej średniej krajowej. Decyzja Mabo z 1992 r. po raz pierwszy uznała tytuł ojczysty, ale jej wdrożenie było nierównomierne."

 # indigenous.1 — Land Rights
 indigenous.1.t: "Rdzenne prawo do ziemi"
 indigenous.1.d_usa: "Koalicja narodów plemiennych złożyła formalny wniosek o przyznanie praw do znacznej części ziemi federalnej, argumentując, że terytorium to zostało niezgodnie z prawem przyjęte z naruszeniem zobowiązań traktatowych. Twierdzenie to przyciągnęło znaczne zainteresowanie mediów i wsparcie prawne. Sądy obserwują i szersza społeczność rdzennych Amerykanów."
 indigenous.1.d_can: "Zespół First Nations twierdzi, że Aborygeni mają prawo do znacznej części terytorium Korony, twierdząc, że żaden ważny traktat nie wygasł ich praw do terytorium. Roszczenie dotarło do sądu federalnego. Eksperci prawni zauważają, że kanadyjskie orzecznictwo w sprawie tytułu aborygeńskiego znacznie się zmienia, a reakcja rządu będzie stanowić ważny precedens."
 indigenous.1.d_nzl: "Sąd Waitangi wydał raport stwierdzający, że Korona nie uhonorowała traktatu z Waitangi w zarządzaniu spornymi gruntami. Ustalenia te nie są prawnie wiążące, lecz mają istotne znaczenie moralne i polityczne. Społeczności Māori wzywają rząd do niezwłocznego podjęcia działań zgodnie z zaleceniami."
 indigenous.1.d_ast: "Trybunał Federalny podtrzymuje roszczenie o tytuł ojczysty dotyczące regionu gruntów obecnie dzierżawionych interesom duszpasterskim. Orzeczenie nakłada na rząd obowiązek negocjowania z grupą powodową praw użytkowania gruntów. Grupy przemysłu pastoralnego lobbują ciężko, by rząd odwołał się od decyzji."
 indigenous.1.f: "Ziemia zawsze należała do nich. Pytanie brzmi, czy prawo tak powie."
 indigenous.1.a: "Negocjowanie ugody - uszanowanie roszczenia"
 indigenous.1.b: "Konkurs w sądzie - nasza pozycja jest obronna"

 # indigenous.2 — Treaty Obligations
 indigenous.2.t: "Obowiązki traktatowe w trakcie przeglądu"
 indigenous.2.d_usa: "W raporcie Kongresu stwierdzono, że rząd federalny nie wywiązuje się ze swoich zobowiązań traktatowych wobec dziesiątków narodów plemiennych - niedofinansowując opiekę zdrowotną, edukację i infrastrukturę w zakresie rezerwacji o miliardy dolarów rocznie. Przywódcy plemienni wzywają do formalnego przeglądu federalnej odpowiedzialności za zaufanie i zobowiązania do zlikwidowania luki w finansowaniu."
 indigenous.2.d_can: "Komisja parlamentarna przedstawiła sprawozdanie szczegółowo dotyczące przewlekłego niedofinansowania społeczności Narodów Zjednoczonych w stosunku do zobowiązań wynikających z traktatów historycznych. W sprawozdaniu wskazano szczególne niedociągnięcia w zakresie mieszkalnictwa, infrastruktury wodnej i edukacji. Rząd musi zdecydować, jak zareagować - i czy zaangażować środki niezbędne do stworzenia całości traktatów."
 indigenous.2.d_nzl: "Przywódcy Māori przedstawili rządowi formalne memorandum, argumentując, że szereg ostatnich decyzji politycznych narusza zasady traktatu z Waitangi. W notatce przywołuje się konkretne naruszenia w obszarach zarządzania zasobami, opieki zdrowotnej i edukacji oraz wzywa się do kompleksowego przeglądu przestrzegania traktatu we wszystkich departamentach rządowych."
 indigenous.2.d_ast: "Organizacja praw rdzennych opublikowała szczegółową analizę luki między zadeklarowanymi przez rząd zobowiązaniami wobec społeczności Aborygenów a faktyczną alokacją zasobów. W sprawozdaniu stwierdza się, że zobowiązania traktatowe i ugodowe są realizowane za mniej niż 60 centów od dolara. Przywódcy Wspólnoty domagają się formalnego audytu i wiążącego zobowiązania do pełnej zgodności."
 indigenous.2.f: "Obietnica napisana na papierze jest tak dobra jak wola jej dotrzymania."
 indigenous.2.a: "Czcij nasze zobowiązania - angażuj zasoby"
 indigenous.2.b: "Potwierdzenie braków - praca na rzecz stopniowego doskonalenia"

 # indigenous.3 — Cultural Preservation
 indigenous.3.t: "Zagrożenie dla rdzennych języków"
 indigenous.3.d: "Linguiści opublikowali raport ostrzegający, że dziesiątki języków rdzennych w [ROOT.GetCountry.GetName] są na skraju wyginięcia. W wielu przypadkach pozostaje tylko garstka płynnych mówców - wszyscy starsi. Po utracie tych języków nie można odzyskać. Z nimi przejść ustne historie, wiedza ekologiczna, tradycji prawnych, i sposoby zrozumienia świata, który nie istnieje nigdzie indziej. \n \n Pytanie brzmi, czy rząd jest gotowy zainwestować środki potrzebne do odwrócenia tej trajektorii, czy też będzie patrzył, jak historia znika w ciszy."
 indigenous.3.f: "Język to świat. Jego śmierć jest nieodwracalna."
 indigenous.3.a: "Fundusz Programy rewitalizacji języka rodzimego"
 indigenous.3.b: "To sprawa społeczności, a nie rządu."

 # indigenous.4 — Health Crisis
 indigenous.4.t: "Krajowy kryzys zdrowotny"
 indigenous.4.d: "W krajowym sprawozdaniu w sprawie zdrowia podkreślono wyraźną lukę pomiędzy rodzimymi a nierdzennymi wynikami w zakresie zdrowia [ROOT.GetCountry.GetName]. Średnia długość życia jest znacznie niższa. Wskaźniki cukrzycy, uzależnienia i chorób psychicznych - wiele z nich zakorzenionych w urazie międzypokoleniowym - są znacznie wyższe. Śmiertelność niemowląt w rezerwatach i w odległych społecznościach jest wielokrotnie większa od średniej krajowej. \n \n Zakład medyczny domaga się odpowiednich pod względem kulturowym, odpowiednio finansowanych usług zdrowotnych. Koszt bezczynności - mierzony w życiach - jest znaczny."
 indigenous.4.f: "Nierówność w zdrowiu jest wyborem politycznym."
 indigenous.4.a: "Inwestuj w dedykowane programy opieki zdrowotnej"
 indigenous.4.b: "Istniejący system opieki zdrowotnej jest dostępny dla wszystkich obywateli jednakowo"

 # indigenous.5 — Reservation Conditions (USA/CAN)
 indigenous.5.t: "Warunki dotyczące rezerw"
 indigenous.5.d_usa: "W raporcie federalnego inspektora generalnego stwierdzono, że warunki życia w wielu rezerwatach rdzennych Amerykanów są znacznie poniżej standardów krajowych. Obudowa jest przepełniona i zniszczona. Dostęp do czystej wody pitnej jest niewiarygodny w przypadku wielu rezerwacji. W wielu społecznościach stopa bezrobocia przekracza 50%. Sprawozdanie nazywa sytuację "kryzysem federalnego zaniedbania" i zaleca znaczne zwiększenie finansowania Biura Spraw Indyjskich."
 indigenous.5.d_can: "Kontrola rządowa wykazała, że setki społeczności Narodów Zjednoczonych znajdują się pod opieką doradców w zakresie wody wrzącej - niektóre od ponad dekady. Mieszkalnictwo na wielu rezerwatach jest bardzo przepełnione. W dużej mierze brak jest usług w zakresie zdrowia psychicznego. Audyt stwierdza, że rząd federalny wydaje około 30% mniej na mieszkańca na społeczności Narodów Zjednoczonych niż na innych Kanadyjczyków na równoważne usługi."
 indigenous.5.f: "System rezerwowy został zbudowany w taki sposób, aby zawierał - a nie wspierał."
 indigenous.5.a: "Zwiększenie finansowania federalnego dla społeczności rezerwowych"
 indigenous.5.b: "Utrzymanie obecnego poziomu finansowania - budżet nie pozwala na więcej"

 # indigenous.6 — Reservation Economic Development (USA/CAN)
 indigenous.6.t: "Rozwój gospodarczy na ziemiach rodzimych"
 indigenous.6.d_usa: "Kilka plemiennych narodów zaproponowało inicjatywy na rzecz rozwoju gospodarczego, w tym działania w zakresie gier hazardowych, partnerstwa w zakresie pozyskiwania zasobów i przedsięwzięcia turystyczne, które przyniosłyby znaczne dochody społecznościom rezerwacyjnym. Propozycje wymagają zgody federalnej i stoją w obliczu sprzeciwu sąsiednich rządów państwowych i interesów handlowych, które postrzegają przedsiębiorstwa plemienne jako konkurencję. Przywódcy plemienni twierdzą, że samowystarczalność ekonomiczna jest jedyną zrównoważoną drogą wyjścia z ubóstwa."
 indigenous.6.d_can: "Społeczności Narodów Zjednoczonych na obszarach bogatych w zasoby starają się negocjować umowy o podziale dochodów dotyczące wydobycia zasobów na ich tradycyjnych terytoriach lub w ich pobliżu. Kilka społeczności zaproponowało również wspólne przedsięwzięcia z rządami prowincji na rzecz leśnictwa i rozwoju energetycznego. Propozycje te stanowią drogę do samowystarczalności gospodarczej - ale wymagają od rządu podziału kontroli i dochodów, które historycznie w pełni deklarował."
 indigenous.6.f: "Władza bez bazy ekonomicznej to puste słowo."
 indigenous.6.a: "Wsparcie rodzimego rozwoju gospodarczego - zatwierdza propozycje"
 indigenous.6.b: "Priorytet istniejących interesów zasobów - propozycje te tworzą komplikacje"

 # indigenous.20 — Ipperwash
 indigenous.20.t: "Kryzys Ipperwash"
 indigenous.20.d: "W czasie II wojny światowej protestujący w Stoney Point Ojibwe zajęli Park Prowincji Ipperwash w Ontario, twierdząc, że ziemia - w tym święte cmentarzysko - została niezgodnie z prawem przejęta ze swojej społeczności w celu wykorzystania jej jako bazy wojskowej i nigdy nie powróciła, jak obiecano. Okupacja jest pokojowa, ale policja prowincji Ontario ustanowiła obwód i proszą o wskazówki, jak postępować. \n \n Sytuacja jest napięta. Wśród protestujących jest broń. Są też starsi, rodziny i uzasadniona skarga, która nie była rozpatrywana od pięćdziesięciu lat."
 indigenous.20.f: "Zrobiono miejsce pochówku. Nigdy go nie oddano."
 indigenous.20.a: "Rozkaż OPP rozproszyć okupację - przywrócić porządek"
 indigenous.20.b: "Skierowanie OPP do wycofania się - negocjowanie pokojowej rezolucji"

 # indigenous.21 — Last residential school
 indigenous.21.t: "Ostatnia Szkoła Mieszkaniowa zamyka"
 indigenous.21.d: "Gordon Residential School w Punnichy, Saskatchewan zamknął swoje drzwi - ostatnia federalnie prowadzona indyjska szkoła mieszkaniowa w Kanadzie. Od 1874 r. system szkół domowych przymusowo usunął z rodzin 150 000 dzieci Aborygenów i umieścił je w instytucjach, w których rdzenny język, kultura i tożsamość były aktywnie tłumione - i gdzie fizyczne i seksualne nadużycia były rozpowszechnione. \n \n Zamknięcie ostatniej szkoły nie jest rozwiązaniem. To jest uznanie, że rozdział celowej zagłady kulturalnej w końcu, oficjalnie, zakończył. Ocaleni wciąż żyją z konsekwencjami."
 indigenous.21.f: "Ostatnia szkoła została zamknięta. Rany, które stworzył nie."
 indigenous.21.a: "Koniec mrocznego rozdziału w historii Kanady."

 # indigenous.22 — TRC
 indigenous.22.t: "Sprawozdania Komisji Prawdy i Pojednania"
 indigenous.22.d: "Kanadyjska Komisja Prawdy i Pojednania wydała raport końcowy - kulminację sześciu lat zeznań ponad 6500 ocalałych z indyjskiego systemu edukacji mieszkaniowej. Sprawozdanie dokumentuje systematyczne nadużywanie, ludobójstwo kulturowe i wielopokoleniową traumę spowodowaną polityką przymusowej asymilacji. \n \n Komisja wydała 94 zaproszenia do działania - szczegółowe zalecenia dotyczące opieki nad dziećmi, edukacji, języka, zdrowia i sprawiedliwości. Sprawozdanie wykorzystuje termin "ludobójstwo kulturowe" do opisania tego, co zostało zrobione. Rząd musi teraz zdecydować, jak poważnie traktować pracę Komisji."
 indigenous.22.f: "Prawda jest pierwszym krokiem. Pojednanie jest dziełem pokoleń."
 indigenous.22.a: "Formalnie akceptują zaproszenia do działania - zobowiązują się do pojednania"
 indigenous.22.b: "Potwierdź sprawozdanie - wnikliwie dokonaj przeglądu zaproszeń do działania"

 indigenous.10.t: "A Step Toward Equity"
 indigenous.10.d_usa: "Ustanowienie w Stanach Zjednoczonych afirmatywnego prawodawstwa w zakresie działań stanowi znaczący krok w kierunku rozwiązania problemu nierówności strukturalnych, z którymi borykają się społeczności rdzennych Amerykanów - obok innych grup zmarginalizowanych historycznie. Nie jest to rozwiązanie dla pełnego zakresu wywłaszczenia rdzennego, ale stanowi znaczące zobowiązanie do likwidacji luk, które utrzymują się od pokoleń."
 indigenous.10.d_can: "Kanada uchwaliła prawodawstwo dotyczące działań potwierdzających - formalne uznanie, że nierówność systemowa wymaga środków zaradczych. Dla Pierwszych Narodów, Métis i społeczności Inuitów, miara jest jednym kawałkiem znacznie większej układanki. Jest to jednak oznaką woli politycznej, by poważnie potraktować kwestię niekorzystnej sytuacji rdzennej i poprzeć tę gotowość polityką."
 indigenous.10.d_nzl: "Nowa Zelandia uchwaliła prawodawstwo dotyczące działań potwierdzających, uznając, że różnice między Māori a Pākehā New Zealanders nie są wynikiem indywidualnej porażki, lecz polityki historycznej. Dla społeczności Māori jest to znaczący krok - choć Sąd Waitangi zauważa, że wiele z jego zaleceń pozostaje niewdrożonych."
 indigenous.10.d_ast: "Australia uchwaliła prawodawstwo dotyczące działań potwierdzających - znaczące przesunięcie polityki, które uznaje strukturalny charakter niekorzystnej sytuacji rdzennej. Dla społeczności Aborygenów i Torres Strait Islander oznacza to postęp. Różnica w średniej długości życia, wynikach zdrowotnych i osiągnięciach w zakresie edukacji nie zakończy się z dnia na dzień, ale zmienił się kierunek podróży."
 indigenous.10.f: "Droga do sprawiedliwości jest długa. To krok naprzód."
 indigenous.10.a: "Tak trzeba zrobić."

 indigenous_land_settlement: "Rozrachunek praw własności gruntów"
 indigenous_land_settlement_desc: "Negocjowane rozwiązanie w zakresie praw lądowych poprawiło stosunki ze społecznościami rdzennymi i umocniło legitymację rządu."

 indigenous_land_contested: "Kontestowane prawa gruntowe"
 indigenous_land_contested_desc: "Decyzja o zaskarżeniu prawa do ziemi rdzennej w sądzie zwiększyła napięcia ze społecznościami rdzennymi."

 indigenous_treaty_honoured: "Zobowiązania traktatowe honorowane"
 indigenous_treaty_honoured_desc: "Pełne przestrzeganie zobowiązań traktatowych wzmocniło legitymację i wzmocniło pozycję rządu w stosunku do społeczności rdzennych."

 indigenous_treaty_partial: "Zobowiązania traktatowe częściowo spełnione"
 indigenous_treaty_partial_desc: "Częściowe przestrzeganie zobowiązań traktatowych nie spełniło praw rdzennych."

 indigenous_cultural_investment: "Lokalne inwestycje kulturalne"
 indigenous_cultural_investment_desc: "Finansowanie przez rząd rodzimych programów językowych i kulturalnych wspiera odporność społeczności."

 indigenous_health_investment: "Indywidualne programy zdrowotne"
 indigenous_health_investment_desc: "Indywidualne programy opieki zdrowotnej poprawiają wyniki zdrowotne w społecznościach rdzennych."

 indigenous_health_cost: "Koszty rodzimego programu zdrowotnego"
 indigenous_health_cost_desc: "Nowe, rodzime programy opieki zdrowotnej nakładają dodatkowe wymagania na budżet zdrowotny."

 indigenous_health_neglect: "Indywidualne zaburzenia psychiczne"
 indigenous_health_neglect_desc: "Brak rozwiązania problemu rdzennych różnic zdrowotnych powoduje ciągłe niezadowolenie."

 indigenous_reservation_investment: "Rezerwa na inwestycje Wspólnoty"
 indigenous_reservation_investment_desc: "Zwiększone fundusze federalne dla społeczności rezerwowych zaczynają zanikać różnice w poziomie życia."

 indigenous_reservation_cost: "Rezerwa kosztów finansowania"
 indigenous_reservation_cost_desc: "Zwiększona rezerwa środków publicznych ogranicza budżet federalny."

 indigenous_reservation_neglect: "Rezerwa Zaniedbanie Wspólnoty"
 indigenous_reservation_neglect_desc: "Przewlekłe niedostateczne finansowanie społeczności rezerwowych nadal powoduje niezadowolenie i międzynarodową krytykę."

 indigenous_economic_development: "Rdzenny rozwój gospodarczy"
 indigenous_economic_development_desc: "Wsparcie dla inicjatyw rozwoju gospodarczego rdzennej ludności generuje dochody dla społeczności i zwiększa samowystarczalność."

 indigenous_economic_blocked: "Indiański blokowany rozwój gospodarczy"
 indigenous_economic_blocked_desc: "Odrzucenie propozycji rozwoju gospodarczego rdzennej ludności zaszkodziło stosunkom ze społecznościami Narodów Zjednoczonych."

 ipperwash_crackdown: "Ipperwash Crackdown"
 ipperwash_crackdown_desc: "Brutalna dyspersja Indian protestujących w Ipperwash wywołała znaczącą krytykę krajową i międzynarodową."

 ipperwash_negotiation: "Ipperwash Resoluted Peacefully"
 ipperwash_negotiation_desc: "Pokojowe rozwiązanie impasu Ipperwash zwiększyło wiarygodność rządu wobec społeczności rdzennych."

 indigenous_residential_school_closed: "Ostatnia zamykana szkoła mieszkaniowa"
 indigenous_residential_school_closed_desc: "Zamknięcie ostatniej indyjskiej szkoły mieszkaniowej oznacza formalny koniec polityki kulturalnej destrukcji - choć jej konsekwencje trwają."

 trc_accepted: "Prawda i pojednanie przyjęte"
 trc_accepted_desc: "Formalne przyjęcie przez Kanadę wezwań Komisji Prawdy i Pojednania stanowi znaczące zobowiązanie do zajęcia się dziedzictwem szkół mieszkalnych."

 trc_enactment_bonus: "Mandat pojednawczy"
 trc_enactment_bonus_desc: "Impet procesu prawdy i pojednania ułatwia przyjęcie prawodawstwa związanego z prawami rdzennymi."

 trc_partial: "TRC potwierdzone"
 trc_partial_desc: "Rząd uznał sprawozdanie Komisji Prawdy i Pojednania, ale nie zobowiązał się do wdrożenia jej wezwań do działania."

 indigenous_rights_progress: "Prawodawstwo dotyczące praw tubylczych"
 indigenous_rights_progress_desc: "Wdrożenie przepisów dotyczących działań potwierdzających stanowi znaczące zobowiązanie do przeciwdziałania niekorzystnej sytuacji rdzennej. Luka ta nie zamknie się z dnia na dzień, ale zmienił się kierunek polityki."


# japan

japan.1.t: "Katastrofa jądrowa w Fukushimie"
japan.1.d: "Po potężnym trzęsieniu ziemi i tsunami elektrownia jądrowa Fukushima Daiichi doznała katastrofalnych awarii, uwalniając materiał radioaktywny do środowiska. Katastrofa wstrząsnęła światem, wywołując globalne debaty na temat bezpieczeństwa jądrowego i gotowości na wypadek awarii."
japan.1.a: "Krajowa tragedia i globalny alarm."

fukushima_nuclear_disaster: "Katastrofa jądrowa w Fukushimie"
fukushima_nuclear_disaster_desc: "Poważne uszkodzenia elektrowni Fukushima Daiichi doprowadziły do skażenia radioaktywnego, zakłócenia infrastruktury oraz długoterminowego krajowego wysiłku naprawczego."

# south sudan

southsudan.1.t: "Referendum niepodległości Sudanu Południowego"
southsudan.1.d: "Po dziesięcioleciach konfliktów i decydującym referendum południowe państwa Sudanu przystąpiły do utworzenia Republiki Sudanu Południowego. Rząd centralny w Chartumie stoi przed fatalnym wyborem: zaakceptuj nowy naród lub idź na wojnę, aby go odzyskać."
southsudan.1.a: "Nie pozwolimy, by Sudan został podzielony."
southsudan.1.b: "Pozwól im odejść, dla pokoju."

# russia

first_chechen_war: "Pierwsza wojna czeczeńska"

russia_parliament_resisting: "Parlament sprzeciwia się"
russia_military_loyality: "Kompleks wojskowy"
russia_parliamentary_support: "Wsparcie Parlamentu"
russia_constitution_crisis_resolved_mod: "Kryzys odwrócony"

je_russian_constitutional_crisis: "Rosyjski kryzys konstytucyjny"
je_russian_constitutional_crisis_reason: "Rok 1993 doprowadził Rosję do załamania politycznego. \n \n Prezydent Boris Yeltsin, dążący do konsolidacji władzy wykonawczej, nakazał rozwiązanie rosyjskiego parlamentu, oskarżając swoich członków o utrudnianie reform i stawianie oporu demokratyzacji. Z kolei parlament ogłosił dekret Yeltsina niekonstytucyjny, odmawiając rozbrajania i nawoływania zwolenników. \n \n Przez kilka tygodni napięcia, jako rywalizujące frakcje, zyskały poparcie różnych elementów wojskowych, sił bezpieczeństwa i ogółu społeczeństwa. Pęknięcie aparatu rządowego, z lojalnością wobec wydziału wykonawczego lub legislacyjnego określającego los Federacji Rosyjskiej. \n \n Ta konfrontacja to coś więcej niż spór polityczny - jest to walka o sam charakter rosyjskiego zarządzania w epoce postsowieckiej. Jeśli kryzys wymknie się spod kontroli, przemoc obywatelska w sercu Moskwy jest nie tylko możliwa, ale nieunikniona."

je_russia_wild_nineties: "Dzikie lata 90."
je_russia_wild_nineties_reason: ""Dzikie lata dziewięćdziesiąte" (rosyjski: Лихие девяностые, Likhiye devyanostyye) to termin z negatywnym konotacji oceniającej, charakteryzujący okres przejściowy po upadku Związku Radzieckiego i Federacji Rosyjskiej w latach 90. \n \n Niespokojne przejście Rosji od rządów sowieckich do kapitalistycznej demokracji wywołało falę niestabilności, korupcji i przemocy. We wczesnych latach postsowieckich odnotowano załamanie gospodarcze, wzrost oligarchów, kryzysy polityczne i wzrost przestępczości zorganizowanej. \n \n Od ostrzału parlamentu po skandale prywatyzacyjne, każdy miesiąc wydaje się powodować nowe wstrząsy. Kraj wzmaga się pomiędzy reformą a chaosem, a cierpliwość ludzi jest cienka."

rus_events.0.t: "Rosyjski kryzys konstytucyjny z 1993 r."
rus_events.0.d: "Prezydent Borys Yeltsin wydał dekret o rozwiązaniu rosyjskiego parlamentu, oskarżając go o utrudnianie reform demokratycznych i zagrażając stabilności Federacji. Parlament ogłosił ten ruch niekonstytucyjny, wzywając wojsko i obywateli do oporu. \n \n Moskwa szykuje się do konfrontacji jako rywalizujące frakcje zbierają swoich zwolenników. Los niestabilnej demokracji Rosji wisi na włosku."
rus_events.0.a: "Naród wstrzymuje oddech."

1993_russian_crisis_tt: "Kryzys zakończył się"
rus_events.1.t: "Kryzys konstytucyjny"
rus_events.1.d: "Prezydent Yeltsin ogłosił rozwiązanie parlamentu, ale prawodawcy odmawiają ustąpienia, zabarykadując się w Białym Domu. Napięcia szybko rosną."
rus_events.1.a: "Strona z prezydentem"
rus_events.1.a.tt: "Wojsko poprze kierownictwo."
rus_events.1.b: "Wsparcie Parlamentu"
rus_events.1.b.tt: "Będziemy bronić władzy prawodawcy."

rus_events.2.t: "Wojskowe Backs Prezydent"
rus_events.2.d: "Siły zbrojne przejęły kontrolę nad ulicami, ostrzeliwując parlament i zabezpieczając władzę Yeltsin 'a."
rus_events.2.a: "Kryzys się skończył."

rus_events.3.t: "Zwycięstwo parlamentarne"
rus_events.3.d: "Pomimo nacisków ze strony kierownictwa, parlament zgromadził poparcie społeczne i zachował swoją władzę."
rus_events.3.a: "Kryzys się skończył."

rus_events.4.t: "Storming Białego Domu"
rus_events.4.d: "Moskwa jest w chaosie. Oddziały proprezydenckie otoczyły rosyjski Biały Dom, będący domem przywódców parlamentu i otworzyły ogień czołgami i bronią strzelecką. Dym wznosi się z górnych pięter, ponieważ budynek jest rozpalony. Ostateczny opór upada, gdy siły zbrojne przejmują kontrolę, wyznaczając koniec impasu - ale kosztem życia i politycznej niewinności kraju."
rus_events.4.a: "Porządek jest przywrócony - na razie."

# chechnya

je_first_chechen_war_reason: "Pierwsza wojna czeczeńska rozpoczęła się pod koniec 1994 roku, kiedy Federacja Rosyjska próbowała odzyskać kontrolę nad Czeczeńską Republiką Ichkerii. Konflikt mógłby okazać się kosztowny w życiu i zasobach, z ostrą walką miejską w Groznym i rozległym zniszczeniem na Północnym Kaukazie. \n \n Zakończenie wojny bez wyraźnego zwycięstwa może zaszkodzić wiarygodności rządu, ale kontynuowanie walki grozi przedłużeniem niestabilności."
je_first_chechen_war: "Wojna czeczeńska"
chechen_war_resolved: "Wojna czeczeńska rozwiązana"

chechen_events.1.t: "Wojna w Czeczenii"
chechen_events.1.d: "Rosyjskie siły wkroczyły do Czeczenii, by przywrócić kontrolę federalną, zaczynając od czegoś, co ma być szybką operacją. Jednak górzysty teren i zdeterminowany lokalny opór mogą zmienić to w długotrwały konflikt."
chechen_events.1.a: "Przywrócimy porządek."

chechen_events.2.t: "Napaść na Grozny"
chechen_events.2.d: "Rozpoczęła się bitwa pod Groznym, a siły rosyjskie próbowały przejąć czeczeńską stolicę. Walka jest intensywna, z ciężkimi ofiarami po obu stronach."
chechen_events.2.a: "Pchaj do przodu, bez względu na koszty."

chechen_events.3.t: "Rozmowy pokojowe w Czeczenii"
chechen_events.3.d: "Po miesiącach walk, znużenie wojenne rosło po obu stronach. Propozycja zawieszenia broni została przedstawiona na stole, oferując zakończenie rozlewu krwi."
chechen_events.3.a: "Zaakceptuj pokój i wycofaj siły."
chechen_events.3.b: "Kontynuuj wojnę aż do zwycięstwa."

# haiti

uphold_democracy: "Operacja Demokracja w stanie uśpienia"

haiti_events.1.t: "Operacja Demokracja w stanie uśpienia"
haiti_events.1.d: "We wrześniu 1994 r. Stany Zjednoczone rozpoczęły interwencję wojskową na Haiti w celu przywrócenia demokratycznie wybranego prezydenta Jeana-Bertranda Aristide 'a, który został wyeliminowany w 1991 roku. Siły USA, wspierane przez międzynarodowych sojuszników, zabezpieczyły kluczowe obszary, torując drogę do powrotu Aristide."
haiti_events.1.a: "Uruchomić siły w celu przywrócenia demokracji."
haiti_events.1.b: "Przygotujemy się do obcokrajowców."

haiti_events.2.t: "Przybycie zagranicznych oddziałów"
haiti_events.2.d: "Amerykańskie siły wylądowały na Haiti, przejmując kontrolę nad strategicznymi lokalizacjami. Interwencja jest uzasadniona jako sposób przywrócenia demokratycznego sprawowania rządów, ale rodzi pytania dotyczące suwerenności i wpływów zagranicznych."
haiti_events.2.a: "Musimy współpracować, by uniknąć rozlewu krwi."

je_haiti_political_crisis: "Haitański kryzys polityczny"
je_haiti_political_crisis_reason: "Po demokratycznych wyborach prezydenta Jean- Bertranda Aristide w 1990 roku Haiti doświadczyło krótkiego momentu optymizmu. Jednak krucha stabilność została zniszczona we wrześniu 1991 roku, kiedy wojskowy zamach stanu wypędził Aristide, pogrążając kraj w chaosie politycznym. \n \n Reżim wojskowy stanął w obliczu międzynarodowego potępienia, ponieważ łamanie praw człowieka i represje polityczne stały się powszechne. Sankcje ekonomiczne nakładane przez Organizację Narodów Zjednoczonych i Organizację Państw Amerykańskich poważnie wpłynęły na już trudną gospodarkę Haiti. \n \n W latach 1992 i 1993 negocjacje między juntą wojskową a zwolennikami Aristide były błędne, podczas gdy przemoc wobec przeciwników politycznych i ludności ogólnej nasiliła się. Próby misji ONZ na Haiti (UNMIH) w celu przywrócenia demokratycznego sprawowania rządów napotkały przeszkody. \n \n Do 1994 r. rosnąca presja ze strony społeczności międzynarodowej, w szczególności Stanów Zjednoczonych, stworzyła etap bezpośredniej interwencji. Operacja Uphold Democracy, prowadzona przez siły USA we wrześniu 1994 roku, miała na celu przywrócenie Aristide do władzy i zakończenie rządów junty."

# quebec
# [GetPlayer.MakeScope.GetVariable('quebec_happiness_var').GetValue|0]

je_quebec_happiness: "Sytuacja w Quebecu"
je_quebec_happiness_reason: "Status Quebec w Kanadzie jest kwestią sporną od dziesięcioleci. Różna kultura, język i historia Quebecu często napędzały debaty na temat autonomii i niezależności. \n \n W latach poprzedzających Referendum Quebec 1995 związek między Quebec a rządem federalnym Kanady został naznaczony napięciem, negocjacjami i okazjonalnym rozbłyskiem nacjonalistycznego sentymentu. \n \n Prowincja Quebec, z wyjątkową większością francuskojęzyczną, odrębną tożsamością kulturową i długą historią popierania autonomii, okresowo dążyła do ponownego określenia jej miejsca w kanadyjskiej federacji. Niektórzy Quebecois pragną pełnej niezależności, inni chcą zwiększonej władzy prowincji, podczas gdy wielu nadal wspierać pozostaje w zjednoczonej Kanadzie. \n \n Jako premier, Twoim zadaniem jest nawigowanie tej delikatnej sytuacji. Musisz zrównoważyć jedność narodową z poszanowaniem kulturowych i politycznych aspiracji Quebecu. Każda decyzja, jaką podejmiesz - czy to w zakresie prawa językowego, polityki gospodarczej, czy inwestycji kulturalnych - będzie miała wpływ na szczęście populacji Quebecois. \n \n Jeśli wynik Quebec Happiness pozostaje wysoki, referendum może zakończyć się głosowaniem w Kanadzie. Ale jeśli niezadowolenie staje się zbyt silne, mieszkańcy Quebecu mogą głosować za niepodległością, wiecznie zmieniając mapę Ameryki Północnej."
quebec_happiness_bar_desc: "Franco Canadian Happiness"
quebec_happiness_monthly_tt: "Miesięczna zmiana w Quebec Happiness."
quebec_happiness_bar:0 "Wsparcie dla niepodległości Quebecu"
recently_pissed_quebec_off:0 "Ostatnio nie wkurzył Quebec"

too_many_quebec_concessions: "Zbyt wiele koncesji; Quebecers Unimpounded"
quebec_happiness_10: "#green Zwiększenie #! Frankokanadyjskie szczęście przez #green 5 #! punkty"
quebec_happiness_minus_10: "#r Zmniejszenie #! Frankokanadyjskie szczęście przez #r 5 #! punkty"

quebec.6.t: "Samozadowolenie w Quebecu"
quebec.6.d: "Z przytłaczającą satysfakcją Quebecu, rząd federalny stał się samotny. Ottawa uważa, że kwestia jedności jest rozstrzygnięta, ale krytycy ostrzegają, że takie nadmierne zaufanie może prowadzić do zaniedbania innych ważnych kwestii."
quebec.6.a: "Tabarnak!"

complacent_on_quebec: "Samozadowolenie na Quebecu"
complacent_on_quebec_desc: "Dzięki wysokiemu wsparciu Quebec, rząd stał się zadowolony ze swoich negocjacji i uwagi politycznej, prowadząc do rosnącej krytyki z innych frakcji."
 
quebec_concessions_button: "Koncesje do Quebecu"
quebec_concessions_button_desc: "Zaoferować Quebec polityczne i kulturowe ustępstwa, zwiększając ich szczęście."

quebec_ignore_button: "Ignoruj żądania Quebeca"
quebec_ignore_button_desc: "Odmów zaangażowania się w polityczne żądania Quebeca, zmniejszając ich szczęście."

quebec.1.t: "Napięcia w Quebecu"
quebec.1.d: "Napięcia polityczne rosną w Quebecu w miarę intensyfikacji debat na temat autonomii i praw językowych."
quebec.1.a: "Zapewnij Quebec."
quebec.1.b: "Stań w obronie jedności narodowej."

quebec.2.t: "Referendum Quebec 1995"
quebec.2.d: "Po latach debaty, Quebec głosuje nad tym, czy pozostać częścią Kanady, czy też stać się niepodległym narodem."
quebec.2.a: "Ludzie wybrali jedność."
quebec.2.b: "Quebec głosuje za niepodległością!"

quebec.3.t: "Spór w języku francuskim"
quebec.3.d: "Propozycja polityki federalnej grozi zmniejszeniem statusu Francuzów w Quebecu, wywołując oburzenie wielu obywateli."
quebec.3.a: "Chroń język francuski za wszelką cenę."
quebec.3.a.tt: "Quebec Szczęście wzrośnie o #G + 8 #!."
quebec.3.b: "Utrzymać obecną politykę."
quebec.3.b.tt: "Quebec Szczęście zmniejszy się o #R -5 #!."
quebec.3.b.tt2: "Będziesz mógł więcej ustępstw"

quebec.4.t: "Federalne cięcia finansowe do Quebec"
quebec.4.d: "Rząd federalny stoi w obliczu presji budżetowej, a finansowanie przez Quebec infrastruktury i usług jest na skraju."
quebec.4.a: "Kontynuuj cięcia."
quebec.4.a.tt: "Quebec Szczęście zmniejszy się o #R -7 #!."
quebec.4.b: "Mniej z Quebecu."
quebec.4.b.tt: "Quebec Szczęście zmniejszy się o #R -2 #!."

quebec.5.t: "Festiwal Kultury Quebec"
quebec.5.d: "Ogromne obchody kultury Quebecois przyciągają uwagę narodową i międzynarodową, wspierając dumę i jedność."
quebec.5.a: "Świętować i zwiększyć finansowanie kultury."
quebec.5.a.tt: "Quebec Szczęście wzrośnie o #G + 10 #!."
quebec.5.b: "Gratuluję organizatorom, ale bez dodatkowych funduszy."
quebec.5.b.tt: "Szczęście Quebec zwiększy się o #G + 3 #!."

# China

je_china_southern_tour: "Southern Tour"
je_china_southern_tour_reason: "Na początku 1992 roku Deng Xiaoping wyruszył na swoją słynną "Southern Tour", podróżując do Shenzhen, Zhuhai, Guangzhou i Szanghaju. \n \n Jego wystąpienia promowały kontynuację reform gospodarczych, liberalizację rynku oraz ekspansję specjalnych stref ekonomicznych. Wycieczka rewitalizowała tempo reformatorskie w ramach Partii Komunistycznej i zapewniła inwestorów krajowych i zagranicznych, że chińska "reforma i otwarcie" będą kontynuowane. \n"
je_china_southern_tour_progress_tt: "Postęp wzrasta co miesiąc i poprzez pewne wydarzenia."

southern_tour_reforms: "Southern Tour Economic Legacy"
je_china_southern_tour_complete: "Deng Xiaoping zakończył swoją trasę"
china_southern_tour.1.t: "Deng Xiaoping Southern Tour"
china_southern_tour.1.d: "Deng Xiaoping rozpoczął bardzo popularną wycieczkę po południowych Chinach, odwiedzając kluczowe strefy ekonomiczne i zachęcając urzędników do kontynuowania reform."
china_southern_tour.1.a: "Podróż się zaczyna."

china_southern_tour.2.t: "Zaproszenia do reformy rynku"
china_southern_tour.2.d: "W przemówieniach tournee Southern, Deng Xiaoping wezwał do ponownego zaangażowania w reformy zorientowane na rynek."
china_southern_tour.2.a: "Wspieraj pchnięcie."
china_southern_tour.2.b: "Utrzymuj obecne tempo."

china_southern_tour.3.t: "Wewnętrzny opór partii"
china_southern_tour.3.d: "Konserwatywne elementy w ramach Strony wyraziły obawy dotyczące tempa i zakresu liberalizacji gospodarczej."
china_southern_tour.3.a: "Pchaj do przodu."
china_southern_tour.3.b: "Negocjować kompromis."

