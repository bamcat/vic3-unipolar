rwandan_genocide: "Tutsi Genocide"

je_rwandan_genocide: "Ludobójstwo rwandyjskie"
je_rwandan_genocide_reason: "W kwietniu 1994 roku samolot z prezydentami Rwandy i Burundi został zestrzelony, co wywołało jeden z najbardziej przerażających genocydów pod koniec XX wieku. \n \n Estremistyczne milicje, przy wsparciu rządowym, rozpoczęły masowe zabójstwa, ukierunkowane na mniejszość Tutsi i umiarkowanego Hutusa. Międzynarodowa świadomość była powolna, ale w miarę rozprzestrzeniania się masakry, wymaga interwencji. \n \n"

je_rwandan_genocide_progress_tt: "Postępy rosną z czasem i w wyniku gwałtownych wydarzeń. Interwencja może ograniczyć postęp."

rwandan_genocide.1.t: "Ludobójstwo zaczyna się"
rwandan_genocide.1.d: "Po zabójstwie prezydenta Habyarimana, siły ekstremistyczne rozpoczęły szeroko zakrojone zabójstwa skierowane na mniejszość Tutsi."
rwandan_genocide.1.a: "Zaczyna się mroczny rozdział."

rwandan_genocide.2.t: "Masakry Kontynuuj"
rwandan_genocide.2.d: "Raporty z regionów wiejskich opisują całe społeczności zniszczone w wyniku skoordynowanych ataków."
rwandan_genocide.2.a: "Przemoc nasila się."

rwandan_genocide.3.t: "Międzynarodowy Okrzyk"
rwandan_genocide.3.d: "Obrazy graficzne i konta ocalałych dotarły do światowych mediów, co skłoniło ONZ do podjęcia pilnych działań."
rwandan_genocide.3.a: "Proszę o pomoc."
rwandan_genocide.3.b: "Nic nie rób."

rwandan_genocide_request_peacekeepers_tt: "Spowoduje to głosowanie ONZ w sprawie rozmieszczenia sił pokojowych w Rwandzie."
rwandan_genocide_community_angry: "To rozgniewa społeczność międzynarodową"

rwandan_genocide.4.t: "Głosowanie ONZ w sprawie pokoju"
rwandan_genocide.4.d: "Rada Bezpieczeństwa Organizacji Narodów Zjednoczonych zwołała głosowanie nad wysłaniem sił pokojowych do Rwandy."

