 io_accession_events.4.t:0 "Przystąpienie UE zatrzymane"
 io_accession_events.4.d:0 "Proces akcesyjny UE upadł po odejściu naszego rządu od standardów demokratycznych."
 io_accession_events.4.a:0 "Proces się skończył."

 io_accession_events.10.t:0 "Wyrzucone z NATO"
 io_accession_events.10.d:0 "Nasze przyjęcie praw autorytarnych uniemożliwiło dalsze członkostwo w NATO. Sojusz nas wypędził, a nasze pakty obronne z jego członkami zostały wycofane."
 io_accession_events.10.a:0 "Jesteśmy sami."

 io_accession_events.11.t:0 "Wyrzucone z EWG"
 io_accession_events.11.d:0 "Nasze przyjęcie praw autorytarnych naruszyło polityczne oczekiwania współpracy europejskiej. Zostaliśmy wydaleni z EWG."
 io_accession_events.11.a:0 "Niech tak będzie."

 io_accession_events.12.t:0 "Wyrzucone z Unii Europejskiej"
 io_accession_events.12.d:0 "Nasze przyjęcie praw autorytarnych naruszyło demokratyczne standardy Unii Europejskiej. Zostaliśmy wydaleni z Unii."
 io_accession_events.12.a:0 "Unia odwraca się."

 io_accession_events.13.t:0 "Wyrzucone z G7"
 io_accession_events.13.d:0 "Nasze przyjęcie praw autorytarnych uczyniło dalsze członkostwo w G7 nie do przyjęcia politycznego. Zostaliśmy usunięci z grupy."
 io_accession_events.13.a:0 "Dyplomatyczna komplikacja."

 io_accession_events.20.t:0 "Ostrzeżenie NATO dotyczące norm demokratycznych"
 io_accession_events.20.d:0 "Nasz rząd przyjął prawo autorytarne. Jeżeli przepisy te pozostaną w mocy, członkostwo NATO zostanie cofnięte podczas następnego przeglądu."
