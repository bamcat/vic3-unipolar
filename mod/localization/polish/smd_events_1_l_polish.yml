 io_democratic_standards_warning:0 "Ostrzeżenie o normach demokratycznych"
 io_democratic_standards_warning_desc:0 "Kraj ten został ostrzeżony, że jego autorytarne prawa mogą zagrozić członkostwu w demokratycznych organizacjach międzynarodowych."

 io_expelled_from_democratic_org:0 "Wyrzucone z organizacji demokratycznej"
 io_expelled_from_democratic_org_desc:0 "Kraj ten został wydalony z organizacji międzynarodowej po przyjęciu praw autorytarnych."
 
 intifada_2005.1.t:0 "Drugi Intifada wieje"
 intifada_2005.1.d:0 "Po latach długotrwałej przemocy, wyczerpania, środków bezpieczeństwa, presji dyplomatycznej i politycznych zmian, powstanie dobiegło końca."
 intifada_2005.1.f:0 "Konflikt nie został rozwiązany, ale faza otwartej intifady dobiegła końca. Zawieszenie broni pozostawia obie strony blizny, podejrzane i niepewne, co będzie dalej."
 intifada_2005.1.a:0 "Przyjmij biały pokój."

 intifada_2005.2.t:0 "Drugi Intifada wieje"
 intifada_2005.2.d:0 "Walka się skończyła, a powstanie wkroczyło w nową, spokojniejszą fazę."
 intifada_2005.2.f:0 "Nie osiągnięto ostatecznego porozumienia, ale eskalacja sama się wypaliła."
 intifada_2005.2.a:0 "Walka trwa w inny sposób."

 intifada_2005_ceasefire:0 "Drugie zawieszenie broni w Intifada"
 intifada_2005_ceasefire_desc:0 "Otwarta faza Drugiej Intifady zakończyła się delikatnym zawieszeniem broni."
 
 arab_spring_jihadist_breakaways.1.t:0 "Państwo islamskie wyłania się"
 arab_spring_jihadist_breakaways.1.d:0 "Chaos rewolucji i upadku państwa pozwolił siłom dżihadystów umocnić terytorium pod sztandarem państwa islamskiego."
 arab_spring_jihadist_breakaways.1.f:0 "Stary stan walczy z rewolucją. Rewolucja walczy ze starym państwem. W ruinach między nimi, trzecia siła podnosi swoją flagę."
 arab_spring_jihadist_breakaways.1.a:0 "Otwiera się nowy front."

 arab_spring_jihadist_breakaways.2.t:0 "Pojawiają się enklawy dżihadystów"
 arab_spring_jihadist_breakaways.2.d:0 "Ponieważ Arabska Wiosna destabilizuje region, komórki dżihadystów zajęły rozproszone terytorium i zadeklarowały lojalność wobec państwa islamskiego."
 arab_spring_jihadist_breakaways.2.f:0 "Tam, gdzie państwo się wycofuje, uzbrojone sieci stają się administracjami."
 arab_spring_jihadist_breakaways.2.a:0 "Kryzys się rozprzestrzenia."

 arab_spring_jihadist_breakaways.3.t:0 "Terytorium Houthis"
 arab_spring_jihadist_breakaways.3.d:0 "Rewolucja jemeńska rozbiła kraj, pozwalając ruchowi Houthi zająć terytorium i zmobilizować własne siły."
 arab_spring_jihadist_breakaways.3.f:0 "Powstanie nie wywołało jednej opozycji, ale wielu."
 arab_spring_jihadist_breakaways.3.a:0 "Odłamki Jemenu."

