 je_first_chechen_war: "Pierwsza wojna czeczeńska"
 je_first_chechen_war_reason: "Czeczeńska Republika Ichkerii ogłosiła niepodległość od Rosji. Moskwa zareagowała wojskowymi siłami. Górski teren Kaukazu Północnego sprzyja czeczeńskim partyzantom, ale Rosja przynosi przytłaczającą konwencjonalną siłę. Wynik tej wojny zadecyduje o losie Czeczenii i sprawdzi determinację Federacji Rosyjskiej."
 
 je_chechen_war_complete_tt: "Jedna strona została pokonana lub załączona."
 
 je_chechen_war_status_guerilla: "Wojna jest w fazie #bold partyzantka #!. Czeczeńscy bojownicy używają gór do przeprowadzania ataków. Bitwy przesuwają wynik wojny i odblokowują główne ofensywy."
 je_chechen_war_status_offensive: "Wystąpiła ofensywa #!. Wojna weszła w decydującą fazę."
 
 je_chechen_war_score_bar: "Wynik wojny"
 je_chechen_war_score_bar_desc: "Zalety rosyjskie"
 je_chechen_war_score_bar_second_desc: "Chechen Advantage"
 
 chechen_war_startup_tt: "Pierwsza wojna czeczeńska się rozpoczęła. Bitwy pomiędzy siłami rosyjskimi i czeczeńskimi zmienią wynik wojny. Kiedy nabierze tempa, można rozpocząć zdecydowaną ofensywę."
 
 ### ══════════════════════════════════════════
 ### SCRIPTED BUTTONS
 ### ══════════════════════════════════════════
 
 je_chechen_war_storm_grozny: "Storm Grozny"
 je_chechen_war_storm_grozny_desc: "Rozpocząć atak na czeczeńską stolicę. To kończy fazę partyzancką i zobowiązuje siły rosyjskie do decydującej walki miejskiej."
 
 je_chechen_war_mountain_offensive: "Kontrafensywa górska"
 je_chechen_war_mountain_offensive_desc: "Rozpocząć poważną antyofensywę z gór, uderzając w pozycje Rosjan na Kaukazie. To kończy fazę partyzancką i ryzykuje wszystko na decydujące zaangażowanie."
 
 chechen_war_minimum_score_tt: "Wymaga korzyści wynik wojny co najmniej 5"
 
 ### ══════════════════════════════════════════
 ### EVENTS
 ### ══════════════════════════════════════════
 
 chechen_war.1.t: "The Ofensive Begins"
 chechen_war.1.d: "Rozpoczęła się decydująca faza wojny. Wojna partyzancka, która zdefiniowała wczesny konflikt, ustępuje bezpośredniej konfrontacji. Góry Kaukazu będą świadkami ostatecznej walki o Czeczenię."
 chechen_war.1.a: "Za Rosję!"
 chechen_war.1.a.che: "Dla Ichkerii!"
 
 chechen_war.2.t_rus: "Zwycięstwo Rosji w Czeczenii"
 chechen_war.2.d_rus: "Czeczeński opór został złamany. Rosyjskie siły wzmocniły kontrolę nad republiką. Koszty życia i infrastruktury były ogromne, ale integralność terytorialna Federacji Rosyjskiej została zachowana."
 chechen_war.2.t_che: "Niezależność czeczeńska"
 chechen_war.2.d_che: "Wbrew wszelkim przeciwnościom, czeczeńscy wojownicy zwyciężyli. Rosyjskie wojsko wycofało się, a Czeczeńska Republika Ichkerii stoi jako niezależny naród. Koszt wolności był oszałamiający, ale wola narodu czeczeńskiego okazała się nie do złamania."
 chechen_war.2.a: "Historia będzie pamiętać ten dzień"
 
 chechen_war.5.t: "Zasadzka górska"
 chechen_war.5.d: "Nasi myśliwce zidentyfikowali rosyjski konwój poruszający się przez wąską górską przełęcz. Teren jest idealny na zasadzkę - strome klify z obu stron, ograniczona przestrzeń do manewru, a gęsty las zapewnia osłonę dla naszych ludzi."
 chechen_war.5.a: "Uderzenie z gór"
 chechen_war.5.b: "Utrzymać pozycje"
 
 chechen_war.6.t: "Raid on Supply Lines"
 chechen_war.6.d: "Rosyjskie konwoje zaopatrzeniowe poruszają się po nizinach z minimalną eskortą. Nasze myśliwce mogą ich przechwycić, przechwycić cenne zapasy i zakłócić logistykę wroga - ale operacja będzie kosztować nas zasoby i może zachęcić do odwetu."
 chechen_war.6.a: "Raid ich linie dostaw"
 chechen_war.6.b: "Zbyt ryzykowne."
 
 chechen_war.7.t: "Wojna na Kaukazie"
 chechen_war.7.d: "Czeczeńska Republika Ichkerii ogłosiła niepodległość, a Rosja odpowiedziała siłami wojskowymi. Północny Kaukaz jest pochłonięty wojną. Twardy górski teren daje czeczeńskim partyzantom naturalną przewagę, ale rosyjska potęga wojskowa jest groźna."
 chechen_war.7.a: "Więc to się zaczyna"
 
