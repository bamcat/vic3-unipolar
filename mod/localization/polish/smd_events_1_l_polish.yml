 # The Troubles

je_troubles_in_northern_ireland: "Kłopoty w Irlandii Północnej"
je_troubles_in_northern_ireland_reason: "Irlandia Północna stała się punktem zapalnym przemocy politycznej między społecznościami nacjonalistycznymi i unionistycznymi, przechodząc do konfliktów zbrojnych z udziałem grup paramilitarnych, cywilów i armii brytyjskiej. \n \n Musimy ostrożnie zarządzać obecnością wojsk i działaniami politycznymi na rzecz stabilizacji regionu."

je_troubles_increase_troop_button: "Zwiększenie obecności wojsk"
je_troubles_increase_troop_button_desc: "Wprowadzić więcej sił armii brytyjskiej do Irlandii Północnej w celu wzmocnienia kontroli i utrzymania porządku."

troubles_troop_strength_bar: "Obecność wojsk w Irlandii Północnej"
troubles_troop_strength_bar_desc: "Moc wojsk"
troubles_troop_strength_bar_monthly_desc: "Mierzy siłę brytyjskich oddziałów w Irlandii Północnej."

troubles_events.1.t: "Bomba w Belfaście"
troubles_events.1.d: "Bomba wybuchła w Belfaście, zabijając cywilów i zwiększając napięcie."
troubles_events.1.a: "Tragiczne."

troubles_events.2.t: "Oddziały pod atakiem"
troubles_events.2.d: "Brytyjscy żołnierze byli pod ostrzałem rebeliantów w Derry."
troubles_events.2.a: "Musimy odpowiedzieć."

troubles_events.3.t: "Protest praw obywatelskich"
troubles_events.3.d: "Duży protest w Londonderry stał się gwałtowny po starciach z policją."
troubles_events.3.a: "Niepokojący rozwój sytuacji."

troubles_events.4.t: "Przybywają posiłki"
troubles_events.4.d: "Świeże oddziały przybyły do Irlandii Północnej, wzmacniając naszą obecność."
troubles_events.4.a: "Dobrze."

troubles_events.5.t: "Strzelcy zabijają cywilów w irlandzkim pubie"
troubles_events.5.d: "Śmiertelna strzelanina w Irlandii Północnej wstrząsnęła lokalnymi społecznościami, co jest smutnym odbiciem przemocy w czasie trwających problemów."
troubles_events.5.a: "Droga do pokoju nigdy nie jest prosta."
 
je_northern_ireland_peace_process: "Proces pokojowy w Irlandii Północnej"
je_northern_ireland_peace_process_reason: "Po dziesięcioleciach konfliktu, znanego jako "Kłopoty", rządy Zjednoczonego Królestwa i Irlandii - obok partii politycznych Irlandii Północnej - weszły w okres negocjacji. \n \n Od Deklaracji Downing Street po wielopartyjne rozmowy i potencjalne zawieszenie broni, dyskusje te mogą zakończyć lata rozlewu krwi. \n \n Wynik będzie zależał od woli politycznej, opinii publicznej i możliwości kompromisu."

ni_peace_process_success_tt: "Proces pokojowy zakończył się sukcesem, zwiększając stabilność w Irlandii Północnej."

ni_peace_events.1.t: "Deklaracja Ulicy Downing"
ni_peace_events.1.d: "Rządy brytyjskie i irlandzkie wydały wspólną deklarację potwierdzającą prawo obywateli Irlandii Północnej do decydowania o swojej przyszłości."
ni_peace_events.1.a: "Znaczący krok naprzód."

ni_peace_events.2.t: "Rozmowy wielopartyjne"
ni_peace_events.2.d: "Po raz pierwszy przedstawiciele większości północnoirlandzkich frakcji politycznych spotykają się przy stole negocjacyjnym."
ni_peace_events.2.a: "Dialog jest drogą do pokoju."

ni_peace_events.3.t: "Dobra piątkowa umowa"
ni_peace_events.3.d: "Grupy paramilitarne w Irlandii Północnej ogłosiły zawieszenie broni, otwierając drzwi do trwałego pokoju, po serii pozytywnych rozmów między rządem Zjednoczonego Królestwa a Irlandią."
ni_peace_events.3.a: "Broń milczy."

ni_peace_events.5.t: "Brytyjskie oddziały kopnięte z Irlandii Północnej"
ni_peace_events.5.d: "Przy ograniczonej obecności wojsk w Irlandii Północnej do zera, brytyjski rząd nie jest w stanie utrzymać kontroli. W zaskakującym ruchu, rząd formalnie cedes Irlandii Północnej do Republiki Irlandii."
ni_peace_events.5.a: "Nie mamy wyboru."
ni_peace_events.5.a.tt: "Irlandia Północna zostanie przeniesiona do Irlandii."

ni_peace_events.6.t: "Zjednoczenie Irlandii"
ni_peace_events.6.d: "Po dziesięcioleciach podziału Irlandia Północna oficjalnie przystąpiła do Republiki Irlandii. Ulice wypełniają się świętami, kiedy naród patrzy na zjednoczoną przyszłość."
ni_peace_events.6.a: "Pop szampana!"
reunification_pride: "Duma zjednoczenia"
reunification_pride_desc: "Radość zjednoczenia narodowego wzmocniła jedność społeczną i umocniła pozycję rządu."

je_oil_titans:0 "Tytany olejowe"
je_oil_titans_reason:0 "Zatoka znajduje się na szczycie największych sprawdzonych rezerw ropy na planecie. Co [ROOT.GetCountry.GetName] robi z tym spadkiem będzie definiować nadchodzący wiek - dla regionu, dla światowego rynku energii, i dla każdego kraju, którego przemysł, transport i dobrobyt działa na ropy naftowej. \n \n Celem nie jest jedynie wydobycie ropy. Ma stać się nieodzownym - być jednym z trzech najlepszych producentów na świecie, tak, że kiedy cena ropy przesuwa się, porusza się, ponieważ [ROOT.GetCountry.GetName] zdecydował się ją przenieść."
 
oil_titans_top3_tt:0 "#bold [ROOT.GetCountry.GetName] jest najlepszym światowym producentem oleju. #! Wpis dziennika jest kompletny - [ROOT.GetCountry.GetName] stał się jednym z niezbędnych węzłów światowego systemu energetycznego."
oil_titans_top10_tt:0 "[ROOT.GetCountry.GetName] jest top 10 światowym producentem ropy naftowej i zbliża się do top 3. Kontynuacja inwestycji w wydobycie ropy naftowej zlikwiduje tę lukę."
oil_titans_outside_tt:0 "[ROOT.GetCountry.GetName] nie należy jeszcze do 10 największych światowych producentów ropy naftowej. Potrzebne są znaczne inwestycje w infrastrukturę wydobywczą ropy naftowej."
 
oil_titans_bonus:0 "Tytan olejowy"
oil_titans_bonus_desc:0 "[ROOT.GetCountry.GetName] jest jednym z trzech największych światowych producentów ropy naftowej. Przychody te generują przepływ do skarbu państwa, budowy funduszy i dają [ROOT.GetCountry.GetName] pewien wpływ geopolityczny, którego sama wielkość populacji nigdy by nie usprawiedliwiła. Świat potrzebuje [ROOT.GetCountry.GetAdjective] olej. Ta potrzeba to władza."

bid_for_olympics_decision:0 "Ogłoś ofertę na Olimpiadę"
bid_for_olympics_decision_desc:0 "Mamy szczęście, że Międzynarodowy Komitet Olimpijski uznał nas za gospodarza kolejnych Igrzysk Olimpijskich."
we_can_host_the_next_olympics_tt:0 "Możemy zorganizować następne igrzyska olimpijskie."

 je_korea_reunification_nrk:0 "Koreańskie zjednoczenie"
 je_korea_reunification_nrk_reason:0 "Koreańska Republika Ludowo-Demokratyczna jest jedynym legalnym rządem koreańskiego narodu. Podział półwyspu na 38 równoleżniku jest sztuczną raną spowodowaną przez obce moce - tymczasowe rozwiązanie, które [ROOT.GetCountry.GetName] jest zobowiązane do skorygowania. \n \n Zjednoczenie w ramach [ROOT.GetCountry.GetAdjective] przywództwo przywróci narodowi koreańskiemu całość. Południowa administracja Korei Południowej musi zostać wprowadzona do stanu [ROOT.GetCountry.GetAdjective] - siłą, traktatem lub ciężarem [ROOT.GetCountry.GetAdjective], co uniemożliwia dalszą odporność."
 
 korea_nrk_complete_tt:0 "#bold Półwysep jest zjednoczony pod [ROOT.GetCountry.GetAdjective] przywództwo. #! Korea jest cała. Podział 1945 został poprawiony."
 korea_nrk_subject_path_tt:0 "[SCOPE.sCountry('c:STK').GetName] jest przedmiotem [ROOT.GetCountry.GetName]. Administracja południowa została wprowadzona w stan [ROOT.GetCountry.GetAdjective]. Trwa pełna integracja Półwyspu."
 korea_nrk_incomplete_tt:0 "[SCOPE.sCountry('c:STK').GetName] grupy kontrolne [SCOPE.sState('STATE_SEOUL').GetName], [SCOPE.sState('STATE_BUSAN').GetName] i [SCOPE.sState('STATE_YANGHO').GetName]. Zjednoczenie wymaga, aby [ROOT.GetCountry.GetName] posiadał wszystkie trzy - lub miał [SCOPE.sCountry('c:STK').GetName] jako obiekt."
 
 # ==========================================
 # SOUTH KOREA JE
 # ==========================================
 
 je_korea_reunification_stk:0 "Koreańskie zjednoczenie"
 je_korea_reunification_stk_reason:0 "Republika Korei jest jedynym legalnym rządem koreańskiego narodu. Podział półwyspu jest dziedzictwem obcej okupacji i rywalizacja zimnej wojny - [ROOT.GetCountry.GetName] nigdy nie zaakceptowała go jako stałego. \n \n zjednoczenie pod [ROOT.GetCountry.GetAdjective] przywództwo połączyłoby naród koreański pod demokratycznym porządkiem konstytucyjnym. Północne podawanie Korei Północnej musi być wchłaniane do stanu [ROOT.GetCountry.GetAdjective]. Uchwyt reżimu Pyonyang na północy jest ostatnią przeszkodą."
 
 korea_stk_complete_tt:0 "#bold Półwysep jest zjednoczony pod [ROOT.GetCountry.GetAdjective] przywództwo. #! Korea jest cała. Podział 1945 został poprawiony."
 korea_stk_subject_path_tt:0 "[SCOPE.sCountry('c:NRK').GetName] jest przedmiotem [ROOT.GetCountry.GetName]. Administracja północna została wprowadzona do porządku konstytucyjnego [ROOT.GetCountry.GetAdjective]. Integracja Północy jest w toku - ogromne przedsięwzięcie."
 korea_stk_incomplete_tt:0 "[SCOPE.sCountry('c:NRK').GetName] grupy kontrolne [SCOPE.sState('STATE_PYONGYANG').GetName] i [SCOPE.sState('STATE_SARIWON').GetName]. Łączenie wymaga, aby [ROOT.GetCountry.GetName] posiadało zarówno - lub miało [SCOPE.sCountry('c:NRK').GetName] jako obiekt."
 
 # ==========================================
 # MODIFIERS
 # ==========================================
 
 korea_reunification_bonus:0 "Korea zjednoczona"
 korea_reunification_bonus_desc:0 "Podział Półwyspu Koreańskiego został zakończony. Naród jest cały po raz pierwszy od 1945 roku. Władza, legitymacja i prestiż ulegają dramatycznej poprawie. Presja separatystów i rewolucyjnych jest tłumiona. Stan [ROOT.GetCountry.GetAdjective] może rozpocząć pracę integracji zjednoczonej Korei."
 
 korea_stk_integration_bonus:0 "Integracja północna"
 korea_stk_integration_bonus_desc:0 "[ROOT.GetCountry.GetName] absorbuje poprzednie [SCOPE.sCountry('c:NRK').GetAdjective] terytorium. Różnica gospodarcza i administracyjna między północą a południem jest ogromna - integracja wymaga trwałych inwestycji i przyspieszonego włączenia. Koszty są realne, ale celem jest zjednoczona Korea."
 
 y2k_events.1.t: "Bug Millennium"
 y2k_events.1.d: "Gdy zbliża się rok 2000, cichy niepokój chwycił [ROOT.GetCountry.GetAdjective] inżynierów, biurokratów i działów IT. Tak zwany problem Y2K - odkrycie, że większość systemów komputerowych przechowuje rok jako dwie cyfry, i dlatego będzie interpretować '00' jako 1900 zamiast 2000 - wywołał globalny koder. \n \n Niektórzy twierdzą, że konsekwencje mogą być katastrofalne: awaria sieci energetycznych, korupcja systemów bankowych, utrata kontroli ruchu lotniczego. Inni twierdzą, że obawy są rażąco przesadzone, a konsultanci sprzedający audyty zgodności po prostu wzbogacają się na panice. [ROOT.GetCountry.GetName] musi zdecydować, jak poważnie to traktować."
 y2k_events.1.f: "Zbliża się północ. Czy światła pozostają włączone to kolejne pytanie."
 
 y2k_events.1.a: "Zainwestuj w pełną zgodność Y2K"
 y2k_events.1.a_tt: "Drogie, dokładne i prawdopodobnie niepotrzebne - ale jeśli nawet ułamek przewidywań jest słuszny, koszt bezczynności jest znacznie wyższy. [ROOT.GetCountry.GetName] sfinansuje programy zgodności w całej infrastrukturze krytycznej."
 y2k_events.1.b: "Oczywiście jest przesadzony - ignoruj to"
 y2k_events.1.b_tt: "Panika to kopalnia złota i nic więcej. [ROOT.GetCountry.GetName] nie będzie marnować środków publicznych na wyimaginowany problem."
 
 # ── NEW YEAR 2000 ─────────────────────────
 
 y2k_events.2.t: "Szczęśliwego Nowego Roku - Witamy w 2000"
 y2k_events.2.d: "Zegary wybiły się przed północą 31 grudnia 1999, a światła pozostały włączone. \n \n Samoloty wciąż leciały. Banki otworzyły. Siatka zasilana. Woda płynęła. Milenijny błąd, najbardziej przewidywana katastrofa w historii komputerowej, przybył z szeptem, a nie hukiem - a może nigdy nie przybył w ogóle, a miliardy wydane na zgodność po prostu działa. \n \n Przez [ROOT.GetCountry.GetName], tłumy wypełniały ulice, fajerwerki oświetlały niebo, i przez jedną noc świat czuł, krótko, jakby zaczynał się ponownie. XX-I wiek się rozpoczął. To, co będzie następne, to zgadywanie."
 y2k_events.2.f: "Jest rok 2000. Świat się nie skończył. To, biorąc wszystko pod uwagę, jest dobra wiadomość."
 
 y2k_events.2.a: "Zaczyna się nowy wiek"
 
 # ── MODIFIERS ────────────────────────────
 
 y2k_compliance_investment: "Programy zgodności Y2K"
 y2k_compliance_investment_desc: "[ROOT.GetCountry.GetName] zainwestował w kompleksową zgodność Y2K w infrastrukturze krytycznej. Koszt jest prawdziwy, ale systemy są gotowe na wszystko, co przyniesie północ."
 
 millennium_celebration: "Millennium Celebrations"
 millennium_celebration_desc: "Rok 2000 przybył bez katastrofy. Nastrój publiczny jest płynny, ulice są wciąż pełne rewelatorów i [ROOT.GetCountry.GetName] wchodzi w nowy wiek z ostrożnym optymizmem."
 
 y2k_minor_disruption: "Rozpraszanie Y2K"
 y2k_minor_disruption_desc: "[ROOT.GetCountry.GetName] odrzucił obawy Y2K i teraz napotyka drobne, ale rzeczywiste zakłócenia jako nieprzygotowany czkawka systemów do nowego roku. Nic katastrofalnego - ale krytycy też się nie mylili."
 
  # ── TAGENTOPOLI ──────────────────────

 je_tangentopoli: "Tangentopoli"
 je_tangentopoli_reason: "Włochy działają na systemie łapówek. Zamówienia publiczne - budownictwo, infrastruktura, zamówienia obronne, opieka zdrowotna - trafiają do firm, które płacą procent partiom politycznym. Chrześcijańscy Demokraci biorą swój udział. Socjaliści biorą swoje. Mniejsi partnerzy koalicji biorą swoje. Wszyscy wiedzą. Wszyscy uczestniczą. Jest tak od czasu wojny. \n \n System nazywany jest #bold Tangentopoli #! - miasto brybe. Jest stabilny, wydajny i całkowicie skorumpowany. Jedynym pytaniem jest, czy może przetrwać kontakt z sędzią, który odmawia spojrzenia w drugą stronę."

 je_mani_pulite: "Mani Pulite"
 je_mani_pulite_reason: "Śledztwo jest w toku. Sędzia Antonio Di Pietro i grupa sędziów z Mediolanu pracują za pośrednictwem sieci łapówek i łapówek, które finansowały włoską politykę od czasu założenia Republiki. Każde aresztowanie prowadzi do przyznania się. Każde wyznanie prowadzi do nazwiska. Każda nazwa prowadzi do kolejnego aresztowania. \n \n Klasa polityczna walczy. Dekrety nadzwyczajne, przekazanie sędziów, publiczne ataki na sądownictwo. Pytanie brzmi, czy dochodzenie może dojść do wniosku, zanim system znajdzie sposób, aby go powstrzymać. \n \n @information! Pasek śledczy #bold #! śledzi postęp magistratów. Pasek oporu #bold #! śledzi zdolność klasy politycznej do ich wyłączenia."

 # Status descs — tangentopoli
 je_tangentopoli_contained_tt: "Dochodzenie jest na wczesnym etapie. Aresztowano kilka osób. Klasa polityczna odrzuca to jako sprawę prowincjonalną."
 je_tangentopoli_spreading_tt: "#bold Dochodzenie się rozszerza. #! Wyznania się gromadzą. Pojawiają się nazwiska. Sędziowie w Mediolanie śledzą wszystkie wątki."
 je_tangentopoli_critical_tt: "@warning! #bold System jest w punkcie zerwania. #! Skala Tangentopoli staje się niezaprzeczalna. Kryzys polityczny jest nieuchronny."

 # Status descs — mani pulite
 je_mani_pulite_early_tt: "Śledztwo nabiera tempa. Zespół Di Pietro pracuje nad dowodami. Klasa polityczna nie zorganizowała jeszcze spójnej reakcji."
 je_mani_pulite_winning_tt: "#bold Śledztwo wygrywa. #! Sędziowie wyprzedzają ruch oporu. Nazwy spadają szybciej niż system może je powstrzymać."
 je_mani_pulite_stalemate_tt: "@warning! Śledztwo i opór polityczny są równomiernie dopasowane. Wynik zależy od kolejnych ruchów."
 je_mani_pulite_suppressed_tt: "@warning! #bold Opór polityczny zyskuje przewagę. #! System się organizuje. Dochodzenie może zostać pogrzebane, zanim dojdzie do jego zakończenia."

 # Progress bars
 tangentopoli_exposure_bar: "Narażenie na działanie sieci"
 tangentopoli_exposure_bar_desc: "Jak daleko sieć korupcyjna została spenetrowana."
 tangentopoli_exposure_bar_second_desc: "Narażenie rośnie w sposób organiczny, ponieważ każde aresztowanie prowadzi do przyznania się do winy."
 tangentopoli_bar_from_exposure: "Trwające narażenie sądowe sieci Tangentopoli"

 investigation_progress_bar: "Postępy w dochodzeniach"
 investigation_progress_bar_desc: "Jak daleko zaszli sędziowie Di Pietro."
 investigation_bar_progress: "Sędziowie przeszli przez dowody."

 political_resistance_bar: "Opór polityczny"
 political_resistance_bar_desc: "Odporność na dochodzenie"
 political_resistance_bar_progress: "Klasa polityczna organizuje przeciwko sędziom"

 # ── EVENT TITLES AND TEXT ────────────────

 mani_pulite.1.t: "Biznesmen próbuje spalić 20 milionów lirów"
 mani_pulite.1.d: "Mario Chiesa, przewodniczący Pio Albergo Trivulzio - domu starców w Mediolanie - został aresztowany przez sędziego Antonio Di Pietro podczas próby spuszczenia banknotów w toalecie. Chiesa został złapany na otrzymaniu 37 milionów lirów od firmy sprzątającej. \n \n Socjaliści natychmiast się go wyrzekli. Ich sekretarz partii, Bettino Craxi, nazywa Chiesę "złodziejem" - niezbyt mądry dobór słów, biorąc pod uwagę to, co Di Pietro znajdzie dalej. Aresztowanie jest niewielkie. To, do czego doprowadzi, nie jest."
 mani_pulite.1.f: "Rutynowe aresztowanie. Albo tak to wyglądało."
 mani_pulite.1.a: "Miejscowy wstyd. System jest zabezpieczony."

 mani_pulite.2.t: "Pierwsze wyznania"
 mani_pulite.2.d: "W obliczu więzienia, drobni agenci zaczęli mówić. Nie w zamian za immunitet - nie ma formalnej umowy - ale dlatego, że tama się zepsuła i logika milczenia już nie trzyma. Każde imię prowadzi do drugiego. Każde inne imię prowadzi do przyjęcia. Każda strona prowadzi do ministerstwa. \n \n Śledztwo nie dotyczy już jednego człowieka z toaletą pełną banknotów. Chodzi o całą architekturę finansową Republiki."
 mani_pulite.2.f: "Kiedy jeden człowiek mówi, wszyscy mówią."
 mani_pulite.2.a: "Niech śledztwo będzie kontynuowane - teraz nie da się go powstrzymać"
 mani_pulite.2.b: "Użyj presji wykonawczej, aby powstrzymać rozprzestrzenianie"

 mani_pulite.5.t: "Mani Pulite - Włochy uczą się tego, co każdy wiedział"
 mani_pulite.5.d: "Milan basen sędziów - Di Pietro, Colombo, Davigo, Borrelli - upublicznił się. Zebrane przez nich dowody sprawiają, że skala jest niezaprzeczalna: w ciągu ostatnich dziesięcioleci praktycznie każdy kontrakt publiczny we Włoszech miał swój wkład. Strony, które zarządzały Republiką spożywały łącznie procent każdej drogi, każdego szpitala, każdej szkoły. \n \n Włoskie gazety mają nazwę: #bold Tangentopoli #!. Pierwsza Republika jest sądzona."
 mani_pulite.5.f: "Wszyscy wiedzieli. Teraz wszyscy wiedzą, że wszyscy wiedzieli."
 mani_pulite.5.a: "Śledztwo pójdzie tam, gdzie prowadzi."

 mani_pulite.6.t: "Avvisi di Garanzia"
 mani_pulite.6.d: "Ogłoszenia o śledztwie docierają w ciągu [ROOT.GetCountry.GetName] - dla przedsiębiorców, urzędników ministerstwa, skarbników partii, burmistrzów. #italic avviso di garanzia #! - powiadomienie, że jest ono przedmiotem dochodzenia - stało się skrótem od hańby. Gazety drukują je na pierwszej stronie. Kariera kończy się z dnia na dzień. Dochodzenie nie ogranicza się już do Mediolanu."
 mani_pulite.6.f: "Listonosz nigdy nie był tak przerażony."
 mani_pulite.6.a: "Współpraca - opór tylko pogorszy sprawę"
 mani_pulite.6.b: "Nacisk wykonawczy na sądownictwo"

 mani_pulite.7.t: "Craxi i monety"
 mani_pulite.7.d: "Bettino Craxi - były premier, sekretarz partii socjalistycznych, najpotężniejszy polityk we Włoszech od dekady - wyłonił się z hotelu Raphael w Rzymie, aby stawić czoła tłumowi kilkuset obywateli. \n \n Obrzucili go monetami i pomidorami. Monety, ponieważ wiedzą skąd pochodzą pieniądze. \n \n Craxi wygłosił krótkie oświadczenie broniące systemu finansowania partii - "każdy wiedział, każdy uczestniczył" - i wycofał się wewnątrz. W ciągu miesięcy poleci do swojej willi w Hammamet w Tunezji. Nigdy nie wróci do Włoch. Socjaliści, partia, którą zbudował, przestaną istnieć."
 mani_pulite.7.f: "Człowiek, który okradł kraj, wypędzony monetami."
 mani_pulite.7.a: "Stary system jest skończony - niech spadnie"
 mani_pulite.7.b: "Zarządzanie przejściem - przyjęcie odpowiedzialności, poszukiwanie reform"

 mani_pulite.8.t: "Dochodzenie zdobywa południe"
 mani_pulite.8.d: "Tangentopoli nigdy nie był tylko fenomenem północnym. W przypadku [SCOPE.sState('tangentopoli_south_state').GetName] i w całym Mezzogiorno system kickback został włączony do unijnych dotacji rolnych, projektów infrastruktury publicznej oraz sieci relacji między lokalną polityką a przestępczością zorganizowaną. Sieci polityczne w [SCOPE.sState('tangentopoli_south_state').GetName] są starsze i bardziej zakorzenione niż ich północne odpowiedniki. Nie rozpadną się łatwo."
 mani_pulite.8.f: "Korupcja poszła na dno."
 mani_pulite.8.a: "Rozszerzenie dochodzenia - brak wyjątków"
 mani_pulite.8.b: "Zatrzymać dochodzenie na północy - Południe jest zbyt skomplikowane"

 mani_pulite.9.t: "Dekret Biondi"
 mani_pulite.9.d: "Minister sprawiedliwości Alfredo Biondi wydał dekret nadzwyczajny, który zabroniłby stosowania aresztu śledczego w odniesieniu do szeregu przestępstw finansowych - w tym właśnie przestępstw leżących w sercu Mani Pulite. Krytycy natychmiast nazwali go #italic salvaladri #! dekret "save- złodziei". \n \n W ciągu 24 godzin sędziowie Mediolanu ogłosili zbiorową rezygnację w proteście. Społeczna reakcja jest przytłaczająca. Prokuratorzy z Włoch otrzymali listy wsparcia od setek tysięcy obywateli. Polityczny koszt postępowania staje się widoczny."
 mani_pulite.9.f: "Rząd, który uchwala prawo w celu ochrony własnych przestępców, nie długo przetrwa próbę."
 mani_pulite.9.a: "Przepchnięcie przez dekret - dochodzenie musi być ograniczone"
 mani_pulite.9.b: "Cofnięcie dekretu - reakcja społeczeństwa jest zbyt silna"

 mani_pulite.10.t: "Pierwsza Republika nie żyje."
 mani_pulite.10.d: "To koniec. Demokracja chrześcijańska - partia, która rządziła Włochami bez przerwy od 1948 roku - rozwiązała się. Socjaliści zniknęli. Mniejsze partie koalicyjne zniknęły. Pięć lat pierwszej Republiki, rozebrane w ciągu dwóch lat przez grupę sędziów w Mediolanie, którzy po prostu odmówili spojrzenia w drugą stronę. \n \n Ponad 1200 polityków i biznesmenów zostało skazanych. Pięć tysięcy zostało zbadanych. Były premier, ministrowie rządu i przemysłowcy stanęli przed procesem. \n \n To, co jest następne dla [ROOT.GetCountry.GetName] jest niepewne. Ale system, który karmił Republikę przez pół wieku jest skończony."
 mani_pulite.10.f: "Sędziowie zrobili to, czego wybory nigdy nie mogły zrobić."
 mani_pulite.10.a: "A new Italy - embrace the clean break"
 mani_pulite.10.b: "Zarządzanie przejściem - reforma bez pęknięcia"

 mani_pulite.15.t: "Śledztwo jest pogrzebane."
 mani_pulite.15.d: "Klasa polityczna wygrała. Sędziowie zostali przeniesieni, zdyskredytowani lub zdefinansowani. Dowody zostały zapieczętowane. Pęd został przerwany. \n \n Nie oznacza to, że Tangentopoli nie miało miejsca. To znaczy, że ludzie, którzy go zbudowali, przeżyli. Korupcja nie zakończyła się - poszła pod ziemię, w nowe formy i nowe ustalenia. [ROOT.GetCountry.GetName] obywatele wiedzą, co się stało. Wiedzą, że nie została ukarana. Ta wiedza nie znika."
 mani_pulite.15.f: "Sprawiedliwość odroczona jest odrzucona. I wszyscy o tym wiedzą."
 mani_pulite.15.a: "System przetrwa - na razie"

 # ── MODIFIERS ────────────────────────────

 tangentopoli_systemic_corruption: "Tangentopoli"
 tangentopoli_systemic_corruption_desc: "System kickback, który finansował [ROOT.GetCountry.GetAdjective] polityka od dziesięcioleci jest osadzony w każdym zamówieniu publicznym. Legitymacja jest strukturalnie osłabiona. System kosztuje pieniądze i zachęca do niesławy."

 tangentopoli_chiesa_arrest: "Afera Chiesy"
 tangentopoli_chiesa_arrest_desc: "Aresztowanie Mario Chiesy otworzyło pierwsze pęknięcie w systemie. Klasy polityczne go odrzucają, ale sędziowie podążają za nicią."

 tangentopoli_ig_under_scrutiny: "Dochodzenie"
 tangentopoli_ig_under_scrutiny_desc: "Grupa ta podlega kontroli sądowej w związku z siecią korupcji w Tangentopoli. Jego siła polityczna i popularna apelacja są znacznie zniszczone."

 tangentopoli_widening_investigation: "Rozszerzenie dochodzenia"
 tangentopoli_widening_investigation_desc: "Dochodzenie wykracza poza początkowy zakres. Każde przyznanie się do winy prowadzi do nowego aresztowania. Polityczne koszty zarządzania rosną."

 tangentopoli_suppression_attempt: "Próba tłumienia"
 tangentopoli_suppression_attempt_desc: "[ROOT.GetCountry.GetName] próbował powstrzymać dochodzenie sądowe. Społeczność międzynarodowa i prasa krajowa odnotowały to."

 tangentopoli_party_collapse: "Upadek strony"
 tangentopoli_party_collapse_desc: "Ta partia została zniszczona przez rewelacje Tangentopoli. Jego przywództwo jest na wygnaniu lub pod zarzutem. Jego wyborcy poszli gdzie indziej."

 tangentopoli_legitimacy_crisis: "Kryzys legalności"
 tangentopoli_legitimacy_crisis_desc: "Objawienie systemowej korupcji zniszczyło zaufanie społeczeństwa do [ROOT.GetCountry.GetAdjective] instytucji. Radykalizm rośnie. Władza jest osłabiona."

 tangentopoli_south_exposure: "Sieć południowa"
 tangentopoli_south_exposure_desc: "Śledztwo Mani Pulite dotarło do Mezzogiorno, ujawniając relacje między południowymi sieciami politycznymi a systemem Tangentopoli."

 mani_pulite_investigation_begins: "Dochodzenie Mani Pulite"
 mani_pulite_investigation_begins_desc: "Milan Pula Sędziów prowadzi pełne śledztwo. [ROOT.GetCountry.GetName] międzynarodowej reputacji korzysta z widocznego zaangażowania w odpowiedzialność."

 mani_pulite_public_mandate: "Publiczny mandat na rzecz sprawiedliwości"
 mani_pulite_public_mandate_desc: "Wycofanie dekretu pod naciskiem publicznym wykazało szeroki zakres poparcia dla dochodzenia."

 mani_pulite_clean_hands_victory: "Zwycięstwo czystych rąk"
 mani_pulite_clean_hands_victory_desc: "Mani Pulite odniosła sukces. Korupcyjny system partyjny Pierwszej Republiki został zdemontowany przez proces sądowy. [ROOT.GetCountry.GetName] rozpoczyna swoją drugą Republikę z wyższą legitymacją, czystszą fundacją instytucjonalną i międzynarodowym uznaniem, które wynika z odpowiedzialności władzy."

 mani_pulite_cautious_transition: "Zarządzanie transformacją"
 mani_pulite_cautious_transition_desc: "Przejście z pierwszej do drugiej Republiki jest zarządzane ostrożnie - reforma bez pęknięcia. Stare partie zniknęły, ale ciągłość instytucjonalna jest zachowana."

 mani_pulite_investigation_buried: "Dochodzenie pogrzebane"
 mani_pulite_investigation_buried_desc: "Mani Pulite zawiodła. Klasa polityczna przetrwała. [ROOT.GetCountry.GetName] obywatele wiedzą, co zostało zrobione i nie zostali ukarani. Korupcja trwa pod powierzchnią. Legitymacja jest trwale uszkodzona."

 amendment_events.1.t: "Federalny Program Zdrowia dla biednych"
 amendment_events.1.d: "Propozycje są przed Kongresem, aby stworzyć federalnie finansowany program ubezpieczeń zdrowotnych dla Amerykanów o niskich dochodach, osób starszych i niepełnosprawnych. Zwolennicy twierdzą, że rynki prywatne nie mogą i nie będą służyć tym, którzy nie mogą sobie pozwolić na składki. Przeciwnicy twierdzą, że jest to niedopuszczalne rozszerzenie federalnego zaangażowania w opiekę zdrowotną. \n \n Koalicja popierająca projekt ustawy jest szeroka - związki zawodowe, reformatorzy społeczni i znaczna część społeczeństwa. Czy [ROOT.GetCountry.GetName] będzie działać jest kwestią woli politycznej."
 amendment_events.1.f: "Medycyna nie powinna zależeć od tego, czy cię na to stać."
 amendment_events.1.a: "Enact Medicaid - Federalny zasięg zdrowotny dla tych, którzy go potrzebują"
 amendment_events.1.b: "Odrzuć to - opieka zdrowotna jest sprawą prywatną"
 
 amendment_events.2.t: "Ustawa o przystępnej cenie"
 amendment_events.2.d: "Administracja przedstawiła kompleksową reformę opieki zdrowotnej - ustawę o opiece przystępnej. Ustawa upoważnia wszystkich obywateli do posiadania ubezpieczenia zdrowotnego, tworzenia regulowanych rynków, rozszerza uprawnienia do korzystania z Medicaid i barów ubezpieczycieli do odmawiania pokrycia istniejących warunków. \n \n Indywidualny mandat jest głęboko kontrowersyjny. Supporterzy twierdzą, że jest to jedyny sposób, aby rynki ubezpieczeń funkcjonowały. Opozycja nazywa to przesadą rządu. Ustawa ma głosy - jeśli koalicja wytrzyma."
 amendment_events.2.f: "Czterdzieści milionów nieubezpieczonych Amerykanów. Kongres ma szansę to zmienić."
 amendment_events.2.a: "Podpisz ustawę o przystępnej cenie"
 amendment_events.2.b: "Veto - mandat posuwa się za daleko"
 
 amendment_events.3.t: "Ustawa PATRIOT"
 amendment_events.3.d: "W tygodniach po atakach 11 września Kongres z niezwykłą prędkością przeszedł do uchwalenia ustawy PATRIOT USA - radykalnie rozszerzając krajowe organy nadzoru, zmniejszając nadzór sądowy nad operacjami wywiadowczymi i umożliwiając bezprecedensową wymianę informacji między organami ścigania. \n \n Ustawa ma niemal jednomyślne poparcie. Wolność obywatelska ostrzega, że szybkość przejścia i zakres przepisów będą trudne do przejścia. Kraj nadal jest w żałobie. Głosowanie jest jutro."
 amendment_events.3.f: "Strach jest prawodawcą."
 amendment_events.3.a: "Podpisz ustawę PATRIOT - wymaga tego bezpieczeństwo narodowe"
 amendment_events.3.b: "Odmowa - swobód obywatelskich nie można odpierać w smutku"
 
 amendment_events.4.t: "Zakaz broni federalnej"
 amendment_events.4.d: "Kongres głosuje nad dziesięcioletnim federalnym zakazem produkcji określonej broni półautomatycznej i czasopism o dużej pojemności na sprzedaż cywilną. Ustawa jest poparta przez stowarzyszenia organów ścigania i rodziny ofiar strzelaniny. Lobby broni wydały na to dużo pieniędzy. \n \n 10-letnia klauzula wygaśnięcia została dodana, aby uzyskać ostateczne głosy. Zakaz wygaśnie w 2004 roku, o ile nie zostanie odnowiony - a koalicja polityczna, która ma go odnowić, może nie wytrwać."
 amendment_events.4.f: "Dziesięć lat. Wtedy głosowanie znów się odbędzie."
 amendment_events.4.a: "Zdaj zakaz - dziesięć lat to początek"
 amendment_events.4.b: "Pokonaj go - przestrzegający prawa obywatele nie powinni płacić za działania przestępców"
 
 amendment_events.5.t: "Ustawa o brutalnej przestępczości i egzekwowaniu prawa"
 amendment_events.5.d: "Kongres rozważa największe prawodawstwo w zakresie przestępczości w historii [ROOT.GetCountry.GetName] - finansowanie 100.000 nowych funkcjonariuszy policji, znaczne rozszerzenie federalnego systemu więziennego, nowe obowiązkowe kary minimalne, i ustawy o przemocy wobec kobiet jako jeźdźca. \n \n Logika polityczna jest dwupartyjna. Fala przestępcza pod koniec lat 80-tych sprawiła, że polityka prawa i porządku stała się popularna w całej partii. Rachunek z łatwością przejdzie. Czy to zadziała to pytanie na później."
 amendment_events.5.f: "Rachunek łatwo przejdzie. Konsekwencje są dłuższe."
 amendment_events.5.a: "Podpisz - kraj żąda działań w sprawie przestępczości"
 amendment_events.5.b: "Odrzucenie go - obowiązkowe minima i uwięzienie masy nie są odpowiedzią"
 
 amendment_events.6.t: "Reforma systemu wymiany podatków"
 amendment_events.6.d: "Minister finansów Liu Jihua zaproponował najistotniejszą reformę fiskalną od czasu utworzenia Republiki Ludowej - zastępując wynegocjowane porozumienia w sprawie podziału podatków między Pekin i samorządy terytorialne krajowym podatkiem od wartości dodanej i formalną formułą dochodów. \n \n Reforma znacznie scentralizowałaby władzę fiskalną, dając Pekin wiarygodny i rosnący strumień dochodów. Samorządy lokalne utracą dyskrecję, ale uzyskają jasność. Interesy przemysłowe i handlowe, które nawiązały stosunki z władzami lokalnymi, są po cichu przeciwne."
 amendment_events.6.f: "Centrum chce tego, co prowincje trzymały."
 amendment_events.6.a: "Wdrożenie systemu podziału podatków - centralizacja organu podatkowego"
 amendment_events.6.b: "Utrzymanie istniejących rozwiązań - nie zakłócać jakie funkcje"
 
 amendment_events.7.t: "35- godzinny tydzień pracy"
 amendment_events.7.d: "Minister pracy, Martine Aubry, zaproponowała ustawę zezwalającą na 35-godzinny ustawowy tydzień pracy dla większości pracowników - redukując standardowe godziny pracy z 39. Polityka jest przedstawiana jako sposób na szerszą wymianę pracy: mniej godzin na pracownika, więcej zatrudnionych pracowników. \n \n Związki zawodowe są entuzjastyczne. Federacja pracodawców ostrzegała przed kryzysem konkurencyjności. Ekonomiści są podzieleni. Lewa koalicja, która wybrała ten rząd, spełniła obietnicę. Pytanie brzmi, czy je dostarczyć."
 amendment_events.7.f: "Trzydzieści pięć godzin. Dwie godziny mniej. Polityczna burza."
 amendment_events.7.a: "Prawo Aubry - pracownicy zasługują na krótsze godziny pracy"
 amendment_events.7.b: "Rzuć to - koszty ekonomiczne są zbyt wysokie"
 
 patriot_act_rejected_modifier: "Ustawa PATRIOT odrzucona"
 patriot_act_rejected_modifier_desc: "Decyzja o nieuchwaleniu ustawy PATRIOT spowodowała, że instytucja bezpieczeństwa stała się sfrustrowana, a po ataku polityczny konsensus został napięty."
 
 china_tax_reform_rejected_modifier: "Reforma podatkowa opóźniona"
 china_tax_reform_rejected_modifier_desc: "Niescentralizowanie systemu podatkowego spowodowało rozdrobnienie władzy budżetowej. Samorządy lokalne nadal negocjują własne porozumienia, zmniejszając dochody i autorytet centrum."
 
 terrorism_a.1.t: "World Trade Center jest bombardowany"
 terrorism_a.1.d: "Bomba wybuchła na podziemnym parkingu World Trade Center w Nowym Jorku. Wybuch zabił sześć osób i zranił ponad tysiąc. Budynek nie spadł - ale celem było sprowadzenie jednej wieży na drugą. \n \n Jest to pierwszy poważny międzynarodowy atak terrorystyczny na [ROOT.GetCountry.GetName] gleby. Sprawcy mają powiązania z sieciami działającymi na Bliskim Wschodzie i w Azji Środkowej. Dochodzenie jest w toku."
 terrorism_a.1.f: "Pierwszy atak. Nie ostatni."
 terrorism_a.1.a: "Znajdziemy odpowiedzialnych."
 
 terrorism_a.2.t: "Huragan Andrew Strikes"
 terrorism_a.2.d: "Huragan Andrew - najbardziej niszczycielski huragan atlantycki w tym czasie - spowodował upadek na południowej Florydzie z wiatrem przekraczającym 165 mil na godzinę. Zniszczenia są katastrofalne. Całe społeczności hrabstwa Miami- Dade zostały zniszczone. Wstępne szacunki sugerują, że będzie to jedna z najkosztowniejszych klęsk żywiołowych w historii [ROOT.GetCountry.GetName]."
 terrorism_a.2.f: "Huragan nie dba o to, co zostało zbudowane."
 terrorism_a.2.a: "Decyduj o katastrofie federalnej - mobilizuj pomoc"
 
 terrorism_a.3.t: "Trzęsienie ziemi w Northridge"
 terrorism_a.3.d: "O 4: 31 rano trzęsienie ziemi o sile 6.7 uderzyło w dolinę San Fernando na północ od Los Angeles. Pięćdziesiąt siedem osób nie żyje, tysiące rannych, a szkody w infrastrukturze - szczególnie system autostrad i starsze budynki - przekroczyły już dziesiątki miliardów dolarów. Trzęsienie ziemi jest najbardziej kosztowne w historii [ROOT.GetCountry.GetName]."
 terrorism_a.3.f: "Kalifornijskie koktajle. Zawsze się trzęsie."
 terrorism_a.3.a: "Natychmiast zmobilizować federalną pomoc"
 
 terrorism_a.4.t: "Bomba w Oklahoma City"
 terrorism_a.4.d: "Bomba w ciężarówce zniszczyła front budynku federalnego Alfreda P. Murrah w Oklahomie, zabijając 168 osób - w tym 19 dzieci w przedszkolu. Jest to najgroźniejszy krajowy atak terrorystyczny w historii [ROOT.GetCountry.GetName]. \n \n Sprawcy nie są obcymi. Timothy McVeigh i Terry Nichols są mniej niż x id = 3 / > obywatele motywowani przez antyrządową ideologię. Kraj stoi w obliczu rzeczywistości, że zagrożenie może pochodzić z wewnątrz."
 terrorism_a.4.f: "Wróg nie był na granicy. Już tu był."
 terrorism_a.4.a: "To jest terroryzm krajowy - odpowiemy z pełną siłą"
 
 terrorism_a.5.t: "Ambasady USA zbombardowane w Afryce Wschodniej"
 terrorism_a.5.d: "Równoczesne bomby ciężarowe wybuchły poza ambasadą [ROOT.GetCountry.GetAdjective] w Nairobi, Kenii i Dar es Salaam, Tanzania. Ataki zabiły ponad 200 osób - większość z nich to cywile Kenii i Tanzanii - i zraniły tysiące innych. Sieć kierowana przez Osamą bin Laden. \n \n Ataki są deklaracją, że [ROOT.GetCountry.GetAdjective] zainteresowania na całym świecie są celami. Odpowiedź [ROOT.GetCountry.GetName] określi kształt antyterroryzmu na najbliższe dziesięciolecie."
 terrorism_a.5.f: "Wojna przyszła najpierw do naszych ambasad."
 terrorism_a.5.a: "To jest akt wojny - odpowiemy"
 
 terrorism_a.6.t: "[ROOT.GetCountry.GetAdjective] Ambasada Czy bomba?"
 terrorism_a.6.d: "Bomba wybuchła poza ambasadą Stanów Zjednoczonych w Nairobi, zabijając ponad 200 osób - większość z nich [ROOT.GetCountry.GetAdjective] cywili, którzy byli wtedy w pobliżu budynku. Atak nie miał na celu [ROOT.GetCountry.GetName]. [ROOT.GetCountry.GetName] i tak poniósł koszty."
 terrorism_a.6.f: "Bomba nie rozróżniała narodów."
 terrorism_a.6.a: "Żądamy sprawiedliwości dla naszych zmarłych."
 
 terrorism_a.7.t: "[ROOT.GetCountry.GetAdjective] Capital Is Struck"
 terrorism_a.7.d: "Bomba wybuchła w pobliżu Ambasady Stanów Zjednoczonych w Dar es Salaam, zabijając jedenaście osób w tym, co wydaje się być skoordynowany atak wraz z równoczesnym bombardowaniem w Nairobi w Kenii. Ofiarami były głównie [ROOT.GetCountry.GetAdjective] cywile. Atak wstrząsnął krajem."
 terrorism_a.7.f: "Terroryzm dotarł do naszych brzegów zza oceanu."
 terrorism_a.7.a: "Stoimy z naszymi ludźmi"
 
 terrorism_a.8.t: "USS Cole jest bombardowany"
 terrorism_a.8.d: "Mała łódź przewożąca ładunki wybuchowe zdetonowana obok USS Cole, tankowała w porcie Aden w Jemenie. 17 [ROOT.GetCountry.GetAdjective] żeglarze zostali zabici i 39 rannych. Atak przypisuje się al- Kaidzie. \n \n Statek wojenny [ROOT.GetCountry.GetAdjective] Marynarka, na rutynowym przystanku tankowania w przyjaznym porcie, została zaatakowana przez zamachowca w gumowym pontonie. Wojskowe przywództwo pyta, jak do tego doszło."
 terrorism_a.8.f: "Marynarka powinna być celem."
 terrorism_a.8.a: "To nie pozostanie bez odpowiedzi."
 
 terrorism_a.9.t: "Most Creek- Moore Tornado"
 terrorism_a.9.d: "Tornado EF5 - najsilniejsze nagrane na skali Fujita - wycięło ścieżkę przez Bridge Creek i Moore w Oklahomie. Prędkość wiatru przekroczyła 300 mil na godzinę. Tornado leżało na ziemi przez 85 minut i wyrzeźbiło ogromną ścieżkę całkowitego zniszczenia przez społeczności na południe od Oklahoma City. Trzydzieści sześć osób nie żyje."
 terrorism_a.9.f: "Nic nie zostało tam, gdzie było tornado."
 terrorism_a.9.a: "Wdrożenie pomocy dla dotkniętych społeczności"
 
 terrorism_a.10.t: "32 Martwy w Virginia Tech"
 terrorism_a.10.d: "Strzelec zabił 32 studentów i nauczycieli w Virginia Polytechnical Institute w Blacksburgu, zanim odebrał sobie życie. Jest to najbardziej zabójcza strzelanina szkolna w historii [ROOT.GetCountry.GetName]. Strzelec legalnie kupił swoją broń pomimo historii problemów zdrowotnych psychicznych, które powinny go zdyskwalifikować zgodnie z obowiązującym prawem. \n \n Awaria systemu sprawdzania tła jest obecnie badana."
 terrorism_a.10.f: "Kupił broń legalnie."
 terrorism_a.10.a: "Należy niezwłocznie dokonać przeglądu procedur kontroli tła broni palnej."
 
 terrorism_a.11.t: "82 Strzał w teatrze Aurora"
 terrorism_a.11.d: "Strzelec otworzył ogień podczas premiery wielkiego filmu w teatrze Century 16 w Aurora w Kolorado, zabijając 12 osób i raniąc 70. Napastnik był uzbrojony w półautomatyczny karabin, strzelbę i broń - wszystkie zakupione legalnie w tygodniach przed atakiem. \n \n Kolorado i kraj są w szoku."
 terrorism_a.11.f: "Noc w kinie. 12 osób nie wróciło do domu."
 terrorism_a.11.a: "Tragedia wymagająca refleksji"
 
 terrorism_a.12.t: "Strzelec zabija 6 w Wisconsin Sikh Temple"
 terrorism_a.12.d: "Biały supremacysta otworzył ogień w świątyni Sikh w Wisconsin w Oak Creek, zabijając sześciu wyznawców, zanim został zastrzelony przez policję. Napastnik był weteranem armii amerykańskiej z linkami do organizacji neonazistowskich. \n \n Ofiary były celem ze względu na ich religię i pochodzenie etniczne. Atak zapoczątkował ponownie debatę na temat krajowego ekstremizmu, przestępstw z nienawiści i braku monitorowania białych sieci nacjonalistycznych."
 terrorism_a.12.f: "Przyszli się modlić. Przyszedł zabić ich za to kim byli."
 terrorism_a.12.a: "To zbrodnia nienawiści - nie będziemy ignorować krajowego ekstremizmu"
 
 terrorism_a.13.t: "Tragedia w Sandy Hook"
 terrorism_a.13.d: "Strzelec zabił 20 dzieci w wieku od 6 do 7 lat oraz 6 dorosłych pracowników w szkole podstawowej Sandy Hook w Newtown w Connecticut. Dzieci były wielokrotnie postrzelane z karabinu w stylu ataku. \n \n Nie ma odpowiednich słów. [ROOT.GetCountry.GetName] jest w żałobie."
 terrorism_a.13.f: "20 dzieci. Sześć lat."
 terrorism_a.13.a: "Kraj rozpacza"
 
 terrorism_a.14.t: "Masakra Dunblane 'a"
 terrorism_a.14.d: "Strzelec wszedł do szkoły podstawowej Dunblane w Szkocji i zabił szesnaście dzieci w wieku pięciu i sześciu lat, a ich nauczyciel, zanim odebrał sobie życie. Jest to najbardziej zabójcze masowe ujęcie w historii [ROOT.GetCountry.GetName]. \n \n Reakcja narodowa jest przytłaczająca. Ocaleni, rodzice i społeczeństwo rozpoczęli kampanię na rzecz całkowitego zakazu posiadania prywatnej broni. Rząd stanie przed ogromną presją do działania."
 terrorism_a.14.f: "Szesnaście dzieci. Pięć lat. Szkocja nie zapomni."
 terrorism_a.14.a: "Coś musi się zmienić - kraj tego żąda"
 
 terrorism_a.15.t: "Jangcze powodzie"
 terrorism_a.15.d: "Rzeka Yangtze i jej dopływy zalały katastrofalnie po miesiącach niezwykle ciężkich opadów. Powódź dotknęła 240 milionów ludzi na obszarze środkowym i południowym [ROOT.GetCountry.GetName] - 14 prowincji, 56 milionów akrów gruntów rolnych i tysiące osad. Ponad 3000 osób nie żyje, a 14 milionów zostało przesiedlonych. \n \n Mobilizacja państwowa jest ogromna. Wojsko rozlokowało setki tysięcy żołnierzy, by zalać pomoc. Jest to największa klęska żywiołowa w ostatnim okresie [ROOT.GetCountry.GetAdjective] historii."
 terrorism_a.15.f: "Rzeka zdecydowała się zabrać to, co Dike obiecał zachować."
 terrorism_a.15.a: "Cała siła państwa zostanie rozmieszczona."
 
 terrorism_a.16.t: "Mieszkanie Budynki wysadzone w Moskwie"
 terrorism_a.16.d: "Seria ataków bombowych na budynki mieszkalne w Moskwie i innych rosyjskich miastach zabiła prawie 300 osób podczas snu. Bomby zostały przypisane czeczeńskim separatystom - chociaż dowody są kwestionowane przez niektórych obserwatorów. \n \n Ataki wywołały ogromną presję publiczną na zdecydowaną reakcję militarną. Nowa kampania wojskowa w Czeczenii jest obecnie poważnie rozważana. Polityczna postać, która obiecuje zniszczyć terrorystów, dowie się, że społeczeństwo jest gotowe go śledzić."
 terrorism_a.16.f: "Strach jest potężnym narzędziem politycznym. Tak jak żal."
 terrorism_a.16.a: "Wymaga to pełnej reakcji wojskowej."
 
 # ── MODIFIERS ────────────────────────────
 
 he_terror_attack_domestic: "Krajowy atak terroru"
 he_terror_attack_domestic_desc: "Atak terrorystyczny na glebę [ROOT.GetCountry.GetAdjective] wstrząsnął zaufaniem społeczeństwa i zwiększył radykalizację i zawirowania."
 
 he_terror_attack_foreign: "Zamorski atak terroru"
 he_terror_attack_foreign_desc: "Atak terrorystyczny na [ROOT.GetCountry.GetAdjective] interesy zagranicą zniszczył prestiż i pozycję dyplomatyczną."
 
 he_counterterrorism_push: "Odpowiedź na zwalczanie terroryzmu"
 he_counterterrorism_push_desc: "Trwa poważna kampania antyterrorystyczna. Władza i legitymacja są wzmocnione - ale zniesławienie generowane przez agresywne działania za granicą zajmie czas, aby się rozpadnąć."
 
 he_natural_disaster_emergency: "Naturalne katastrofy awaryjne"
 he_natural_disaster_emergency_desc: "Poważna klęska żywiołowa wywołała reakcję federalną. Koszt jest znaczny, a zdolność rządu jest rozciągnięta."
 
 he_disaster_zone: "Obszar klęsk żywiołowych"
 he_disaster_zone_desc: "Stan ten został poważnie uszkodzony przez klęskę żywiołową. Infrastruktura, śmiertelność i migracja mają negatywny wpływ."
 
 he_domestic_extremism_response: "Odpowiedź na leczenie ekstremizmem krajowym"
 he_domestic_extremism_response_desc: "Po krajowym ataku terrorystycznym, [ROOT.GetCountry.GetName] uruchomiła znaczącą reakcję bezpieczeństwa wewnętrznego na sieci ekstremistyczne."
 
 he_military_shock: "Szok wojskowy"
 he_military_shock_desc: "Udany atak na aktywa wojskowe [ROOT.GetCountry.GetAdjective] wstrząsnął siłami zbrojnymi i uszkodził narodowy prestiż."
 
 he_mass_shooting: "Strzelanie masowe"
 he_mass_shooting_desc: "Masowe strzelanie zwiększyło niepokój społeczeństwa i polityczną polaryzację polityki broni palnej."
 
 he_mass_shooting_severe: "Mass Shooting - Krajowa tragedia"
 he_mass_shooting_severe_desc: "Masowe strzelanie o wyjątkowej sile spowodowało głęboki narodowy smutek i silną presję polityczną. Kwestionuje się zasadność istniejącej polityki."
 
 he_hate_crime_shock: "Zbrodnia nienawiści - National Shock"
 he_hate_crime_shock_desc: "Ukierunkowany atak na przestępczość z nienawiści wstrząsnął narodem i zwrócił uwagę na zagrożenie ekstremizmem krajowym skierowanym do społeczności mniejszościowych."
 
 he_gun_reform_mandate: "Publiczny mandat na rzecz reformy broni"
 he_gun_reform_mandate_desc: "Publiczne oburzenie po masowej strzelaninie stworzyło silny impuls polityczny dla reformy broni palnej. Prawo jest łatwiejsze niż zwykle."
 
 he_security_state_response: "Odpowiedź państwa bezpieczeństwa"
 he_security_state_response_desc: "Poważny atak terrorystyczny wywołał publiczne poparcie dla rozszerzonych sił bezpieczeństwa państwa. Władza i legitymacja są wzmocnione."
 
 ## breakup of czechoslovakia
 je_velvet_divorce: "Rozwód Velvet"
 je_velvet_divorce_reason: "Federacja jest pod presją. Przejście od komunizmu ujawniło gospodarcze i polityczne wady pomiędzy czeskimi i słowackimi połowami państwa. Słowaccy politycy - pod przewodnictwem Vladimíra Mečiara - dążą do większej autonomii, a niektórzy do pełnej niezależności. Strona czeska, kierowana przez Václava Klausa, jest coraz bardziej skłonna je wypuścić. \n \n Dwie siły są teraz w ruchu. [ROOT.GetCountry.GetName] musi zbudować #bold spójność federalna #! - poprzez negocjacje, kompromis ekonomiczny i umiejętności polityczne - przed #bold ciśnienie separatystów #! powoduje nieodwracalne rozpuszczenie. \n \n Jeśli ciśnienie osiągnie 100 przed spójnością, Federacja się rozpuści. Spokojnie. To właśnie oznacza aksamit."
 
 je_velvet_divorce_stable_tt: "Federacja trzyma. Negocjacje trwają. Wynik jest nadal w rękach rządu."
 je_velvet_divorce_tense_tt: "@warning! #bold Ciśnienie Separatystów wzrasta. #! Słowaccy politycy są coraz bardziej przekonani, że niezależność jest możliwa i pożądana. Okno na wynegocjowaną ugodę się zawęża."
 je_velvet_divorce_critical_tt: "@warning! #bold Federacja znajduje się w punkcie zerwania. #! Polityczne warunki rozwiązania są prawie spełnione. Bez dramatycznej interwencji Czechosłowacja nie przetrwa roku."
 
 federal_cohesion_bar: "Spójność federalna"
 federal_cohesion_bar_desc: "Spójność federalna"
 federal_cohesion_bar_progress_tt: "Poziom spójności federalnej"
 
 separatist_pressure_bar: "Ciśnienie separatystów"
 separatist_pressure_bar_desc: "Ciśnienie separatystów"
 separatist_pressure_bar_progress_tt: "Pęd separatystów"
 
 # ── EVENTS ───────────────────────────────
 
 velvet_divorce.1.t: "Kryzys konstytucyjny zaczyna się"
 velvet_divorce.1.d: "Wybory w czerwcu 1992 r. przyniosły niemożliwy wynik. W Czechach Partia Demokratyczna Václava Klausa wygrała na platformie szybkiej liberalizacji rynku. Na Słowacji Vladimír Mečiar 's Movement for a Democratic Slovakia wygrał na platformie wolniejszej reformy i większej autonomii Słowacji. Dwóch mężczyzn spotkało się w Brnie i zgodziło się w jednej sprawie: obecny układ nie może być kontynuowany. Nie zgadzają się ze wszystkim. Prezydent Václav Havel - który wierzy, że opinia publiczna zagłosuje za utrzymaniem kraju razem na jego prośbę - został odsunięty na bok. \n \n Los [ROOT.GetCountry.GetName] jest teraz kwestią tego, co przyniesie kolejne miesiące."
 velvet_divorce.1.f: "Dwa wybory. Dwa mandaty. Jeden kraj."
 velvet_divorce.1.a: "Rząd będzie pracował nad utrzymaniem federacji razem"
 
 velvet_divorce.2.t: "Słowackie deficyty gospodarcze"
 velvet_divorce.2.d: "Słowacka gospodarka cierpi na przechodzenie od komunizmu ciężej niż Czechy i Morawy. Słowacka baza przemysłowa - zbudowana wokół ciężkiej produkcji i produkcji broni dla Paktu Warszawskiego - zawaliła się niemal z dnia na dzień. Bezrobocie gwałtownie wzrasta. Słowaccy politycy obwiniają federalną politykę gospodarczą i domagają się redystrybucji lub prawa do własnego kursu. \n \n Przepaść między dwiema połowami kraju staje się politycznie łatwopalna."
 velvet_divorce.2.f: "Kiedy połowa kraju dobrze sobie radzi, a druga połowa nie, pytanie dlaczego staje się pytaniem kto."
 velvet_divorce.2.a: "Przekierowanie funduszy federalnych w kierunku regionów słowackich"
 velvet_divorce.2.b: "Rynek znajdzie swój poziom - bez specjalnego traktowania"
 
 velvet_divorce.3.t: "Słowacka deklaracja suwerenności"
 velvet_divorce.3.d: "Słowacka Rada Narodowa przyjęła deklarację o suwerenności Słowacji. Dokument zatrzymuje się w momencie ogłoszenia niepodległości, ale twierdzi, że prawo słowackie zastępuje prawo federalne na terytorium Słowacji. \n \n Jest to konstytucyjnie niejednoznaczne i politycznie wybuchowe. Prezydent Havel potępił go i wkrótce później zrezygnował ze swojej czechosłowackiej prezydencji. Oświadczenie to nie jest jeszcze pęknięciem - ale jest pierwszym formalnym krokiem w kierunku jego powstania."
 velvet_divorce.3.f: "Jeszcze nie niepodległość. Ale kierunek jest jasny."
 velvet_divorce.3.a: "Stwierdzenie - prawo federalne jest najwyższe"
 velvet_divorce.3.b: "Otwarte rozmowy - zaoferować Słowacji bardziej formalną autonomię w ramach federacji"
 
 velvet_divorce.4.t: "Mečiar i Klaus: Dwóch mężczyzn, dwie wizje"
 velvet_divorce.4.d: "Vladimír Mečiar i Václav Klaus spotkali się ponownie. Ich stanowiska negocjacyjne się zahartowały. Klaus chce unii federalnej z jednolitą polityką gospodarczą. Mečiar chce albo luźnej konfederacji z prawie całkowitą Słowacką autonomią krajową, albo niezależności. \n \n Ci, którzy wzięli udział w spotkaniu, opisują je jako cywilne, ale nie do pogodzenia. Dwóch mężczyzn nie jest wrogami - ale chcą różnych rzeczy, a jeden z nich dostanie to, czego chce."
 velvet_divorce.4.f: "Dwóch pragmatystów. Przeciwne wnioski."
 velvet_divorce.4.a: "Wsparcie dla jednolitego programu reform rynku - wsparcie dla Klausa"
 velvet_divorce.4.b: "Oferta luźniejszej konfederacji - dać Mečiar coś do pracy z"
 
 velvet_divorce.5.t: "Wzywa do referendum"
 velvet_divorce.5.d: "Słowaccy politycy i grupy obywatelskie wzywają do referendum w sprawie niepodległości. Wniosek ma istotne poparcie społeczne na Słowacji, gdzie sondaże sugerują, że wąska większość sprzyja pewnej formie separacji. \n \n Prezydent Havel - wciąż wpływowy pomimo swojej rezygnacji - sprzeciwił się referendum. Uważa, że sam proces roznieciłby namiętności i uniemożliwiłby racjonalny wynik. "Narody nie decydują się na oddzielenie sposobu głosowania zgromadzenia akcjonariuszy nad fuzją", powiedział. 'Czują drogę ku niej, lub z dala od niej.' \n \n Pytanie, czy przeprowadzić głosowanie samo w sobie jest głosowaniem nad tym, co [ROOT.GetCountry.GetName] uważa, że jest."
 velvet_divorce.5.f: "Referendum to pytanie. Ale zadawanie pytań zmienia odpowiedź."
 velvet_divorce.5.a: "Przetrwać referendum - niech ludzie mówią"
 velvet_divorce.5.b: "Blokuj referendum - postępuj zgodnie z radą Havela"
 
 velvet_divorce.10.t: "Czechosłowacja Przetrwa"
 velvet_divorce.10.d: "Kryzys minął. Poprzez połączenie kompromisów gospodarczych, negocjacji politycznych i trwałości instytucji federalnych, [ROOT.GetCountry.GetName] utrzymywały się razem. \n \n Wyłonione porozumienie nie jest federacją z 1990 r. Słowacja ma większą autonomię. Stosunki gospodarcze pomiędzy tymi dwiema połowami zostały zrekompensowane. Ale stan jest nienaruszony, a flaga niezmieniona. \n \n Historia będzie pamiętać, że nie było to nieuniknione - że wymagało aktywnych wyborów, i że te wybory zostały podjęte."
 velvet_divorce.10.f: "Nie doszło do aksamitnego rozwodu. To zwycięstwo."
 velvet_divorce.10.a: "Czechosłowacja trwa"
 
 velvet_divorce.15.t: "Rozwód Velvet"
 velvet_divorce.15.d: "Zrobione. 1 stycznia 1993 roku Czechosłowacja przestanie istnieć. \n \n Rozwiązanie zostało uzgodnione przez parlament federalny - nie w drodze referendum. Publiczność nigdy nie była bezpośrednio proszona. Sondaże w obu połowach kraju konsekwentnie wykazywały poparcie większości dla zachowania jakiejś formy państwa wspólnego, ale klasa polityczna - Klaus i Mečiar - ustaliła, że związek jest niewykonalny. \n \n Rozstanie było spokojne. Nie padły strzały. Nie zakwestionowano żadnych granic. Aktywa i pasywa federacji zostały podzielone według wzoru opartego na liczbie ludności. Armia została rozdzielona. Waluta została podzielona. Flaga została podzielona. Urodziła się w rewolucji i rozwiązana w głosowaniu parlamentarnym. Oba kolejne państwa złożyły już wniosek o członkostwo w UE i NATO."
 velvet_divorce.15.f: "Siedemdziesiąt cztery lata. Skończyło się papierkową robotą."
 velvet_divorce.15.a: "Rozpuszczenie następuje"
 
 velvet_divorce.16.t: "Republika Czeska jest urodzona"
 velvet_divorce.16.d: "1 stycznia 1993 r. Republika Czeska staje się niepodległym państwem. Terytorium Czech, Moraw i Czeskiego Śląska - z Pragą jako stolicą - stanowi jeden z dwóch państw będących następcami federacji Czechosłowackiej. \n \n Nowe państwo odziedziczyło bardziej rozwiniętą połowę starej gospodarki, funkcjonujący system demokratyczny i natychmiastowe międzynarodowe uznanie. Droga do Europy jest otwarta."
 velvet_divorce.16.f: "Nowy stan. Stary naród."
 velvet_divorce.16.a: "Czechy zaczynają"
 
 velvet_divorce.17.t: "Urodziła się Republika Słowacka"
 velvet_divorce.17.d: "1 stycznia 1993 r. Republika Słowacka staje się niepodległym państwem. Bratysława jest stolicą kraju, który istnieje w tej formie dokładnie od jednego dnia. \n \n Słowacja odziedziczy cięższe dziedzictwo przemysłowe, wyższe bezrobocie i bardziej skomplikowane środowisko polityczne - styl zarządzania Mečiar wkrótce przyciągnie międzynarodową krytykę. Ale państwo jest suwerenne, uznane i po raz pierwszy w historii w pełni niezależne."
 velvet_divorce.17.f: "Po raz pierwszy w historii: niezależna Słowacja."
 velvet_divorce.17.a: "Republika Słowacka rozpoczyna"
 
 velvet_divorce.18.t: "Co dalej?"
 velvet_divorce.18.d: "Czechosłowacja się rozpada. Jej następcy - Republika Czeska i Republika Słowacka - nabierają kształtu. \n \n Byłeś przywódcą kraju, który już nie istnieje. Pytanie brzmi, jaką rolę odegrasz w tym, co nastąpi później."
 velvet_divorce.18.f: "Jeden kraj. Dwie przyszłości."
 velvet_divorce.18.a: "Kontynuuj jako Republika Czeska"
 velvet_divorce.18.b: "Kontynuuj jako Republika Słowacka"
 velvet_divorce.18.c: "Pozostać i obserwować rozpad"
 
 # ── MODIFIERS ────────────────────────────
 
 czh_federal_strain: "Federal Strain"
 czh_federal_strain_desc: "Kryzys konstytucyjny osłabia instytucje federalne. Legitymacja ulega erozji, a uchwalenie prawa jest trudniejsze, ponieważ obie połowy federacji kwestionują autorytet centrum."
 
 czh_slovak_subsidy: "Słowacki program wsparcia gospodarczego"
 czh_slovak_subsidy_desc: "Fundusze federalne są przekierowywane w celu wsparcia słowackiej gospodarki w okresie transformacji. Drogie - ale to poprawiło temperaturę polityczną."
 
 czh_federal_authority_asserted: "Organ federalny"
 czh_federal_authority_asserted_desc: "Rząd federalny potępił słowacką deklarację i potwierdził nadrzędność prawa federalnego. Władza jest wzmocniona, ale gniew Słowacji nasilił się."
 
 czh_autonomy_negotiations: "Negocjacje autonomiczne"
 czh_autonomy_negotiations_desc: "Trwają formalne rozmowy mające na celu zapewnienie Słowacji większej autonomii w ramach federacji. Proces ten poprawił klimat polityczny."
 
 czh_confederation_talks: "Wniosek Konfederacji"
 czh_confederation_talks_desc: "Negocjowany jest luźniejszy model konfederacji. Obie strony mówią. Wynik jest niepewny, ale tempo rozpadu zwolniło."
 
 czh_referendum_blocked: "Referendum tłumione"
 czh_referendum_blocked_desc: "Zaproszenie do referendum niepodległości zostało odrzucone. Słowaccy politycy i społeczeństwo obywatelskie zareagowały ze złością. Presja polityczna nie zniknęła - odmówiono jej wyjścia."
 
 czh_federal_union_preserved: "Federal Union Preserved"
 czh_federal_union_preserved_desc: "Kryzys konstytucyjny minął. [ROOT.GetCountry.GetName] utrzymywane razem. Negocjowana ugoda wzmocniła instytucje federalne i zaufanie społeczeństwa do unii."
 
 czc_new_republic_founding: "Republika Czeska"
 czc_new_republic_founding_desc: "Republika Czeska została utworzona jako suwerenne państwo. Międzynarodowe uznanie jest natychmiastowe. Fundamenty nowej republiki są stabilne."
 
 svk_new_republic_founding: "Republika Słowacka"
 svk_new_republic_founding_desc: "Republika Słowacka została utworzona jako suwerenne państwo. Pierwsza w pełni niezależna Słowacja w historii znajduje swoją podstawę."
 
 attacked_on_home_soil:0 "Zaatakowany na podłożu domowym"
 war_on_terror_campaign:0 "Wojna z terrorem"
 
