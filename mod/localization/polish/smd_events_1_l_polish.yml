 je_demographic_crisis: "Kryzys demograficzny"
 je_demographic_crisis_reason: "Nasz naród stoi w obliczu zbliżającego się kryzysu demograficznego. Starzejąca się populacja i zmniejszające się wskaźniki urodzeń grożą zmniejszeniem siły roboczej i obciążeniem systemów społecznych. Musimy wprowadzić kompleksową pronatalistyczną politykę i utrzymać ją przez dziesięć lat, aby odwrócić tę tendencję przed wygaśnięciem tymczasowego bufora demograficznego."

 je_demographic_crisis_progressing_tt: "Polityka pronatalistyczna jest skuteczna i spełnione są warunki. Progress: #bold [Root.GetCountry.MakeScope.Var('demographic_months_sustained').GetValue|0] #! / 120 miesięcy."
 je_demographic_crisis_stalling_tt: "#negative Warunki pronatalistyczne nie są już spełniane. #! Postęp się pogarsza. Bieżące: #bold [Root.GetCountry.MakeScope.Var('demographic_months_sustained').GetValue|0] #! / 120 miesięcy. Ustanowienie przepisów dotyczących opieki nad dziećmi, opieki zdrowotnej, opieki społecznej i mieszkaniowej przy jednoczesnym utrzymaniu standardu życia powyżej 12 lat."
 je_demographic_crisis_idle_tt: "Brak postępów w rozwiązywaniu kryzysu demograficznego. Wdrożenie pronatalistycznej polityki: opieki nad dziećmi, opieki zdrowotnej, opieki społecznej i mieszkaniowej. Utrzymanie przeciętnego standardu życia co najmniej 12."

 demographic_crisis_sustained_tt: "Pronatalistyczna polityka trwa od 10 lat (120 miesięcy)."

