 io_accession_events.21.a:0 "Zostaliśmy ostrzeżeni."

 io_accession_events.22.t:0 "Ostrzeżenie UE dotyczące norm demokratycznych"
 io_accession_events.22.d:0 "Nasz rząd przyjął prawo autorytarne. Jeżeli przepisy te pozostaną w mocy, członkostwo w UE zostanie cofnięte podczas następnego przeglądu."
 io_accession_events.22.a:0 "Zostaliśmy ostrzeżeni."

