 dayton_peace_framework:0 "Ramy dla pokoju w Dayton"
 dayton_peace_framework_desc:0 "Międzynarodowe porozumienie stabilizuje porządek powojenny."

 peaceful_independence_recognized:0 "Pokojowa Niezależność Uznana"
 peaceful_independence_recognized_desc:0 "Niepodległość została rozpoznana bez wojny na pełną skalę."

