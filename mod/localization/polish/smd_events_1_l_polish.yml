 demographic_crisis_workforce_penalty: "Kryzys demograficzny"
 demographic_crisis_workforce_penalty_desc: "Starzenie się populacji i zmniejszający się wskaźnik urodzeń znacznie zmniejszyły stosunek osób dorosłych pracujących do osób pozostających na utrzymaniu, ograniczając gospodarkę."

 demographic_crisis_buffer: "Bufor demograficzny"
 demographic_crisis_buffer_desc: "Obecne pokolenie pracujących dorosłych czasowo równoważy kryzys demograficzny, ale ten bufor wygaśnie wraz z starzeniem się pracowników."

 demographic_crisis_resolved: "Odzyskiwanie demograficzne"
 demographic_crisis_resolved_desc: "Trwała pronatalistyczna polityka odwróciła kryzys demograficzny. Wskaźnik urodzeń się ustabilizował, a siła robocza znów rośnie."

