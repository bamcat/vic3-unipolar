l_polish:
#################### JE ####################
# The Internet

je_internet:0 "Internet"
je_internet_reason:0 "Czas połączyć nasz kraj z internetem! Musimy ulepszyć naszą sieć telekomunikacyjną poza wspieraniem prostego ruchu telefonicznego i wreszcie przedstawić naszym obywatelom cuda World Wide Web!"

smd_tech.1.t:0 "[ROOT.GetCountry.GetName] Goes Online"
smd_tech.1.d:0 "Od dziesięcioleci nasza komunikacja opiera się na gazetach, radiu i telewizji. Ale cicha rewolucja zamiata świat - ogromna sieć połączonych komputerów znanych jako Internet. Kiedy domena naukowców i naukowców wojskowych zapowiada się na zmianę sposobu pracy, uczenia się i łączenia naszych obywateli."
smd_tech.1.f:0 "Dial- up internet: bo nic nie mówi "high-tech" jak krzyki i czekając 5 minut, aby załadować zdjęcie kota."

smd_tech.1.a:0 "Być może inne technologie powinny połączyć się z siecią!"
smd_tech.1.b:0 "Możemy użyć interweb do kontroli opinii publicznej"

government_run_wifi_modifier:0 "Interferencje rządowe w Wifi"

# Computer Science

je_computer_science:0 "Informatyka"
je_computer_science_reason:0 "Informatyka to nauka o tym, jak komputery działają, jak można je tworzyć, aby rozwiązywać problemy i jak możemy ich używać efektywnie i bezpiecznie."

smd_tech.2.t:0 "Stopnie informatyki"
smd_tech.2.d:0 "Wyobraźcie to sobie jako naukę myślenia logicznie i rozwiązywania problemów - ale z maszynami, które wykonują każdą małą instrukcję. Jest zarówno abstrakcyjny, jak i praktyczny, i zasila prawie każdą nowoczesną technologię wokół nas, od smartfonów po samonapędzające się samochody."

# Pesticides

je_pesticides:0 "Herbicydy"
je_pesticides_reason:0 "Pestycydy to substancje stosowane do zwalczania szkodników. Obejmują one herbicydy, insektycydy, nematocydy, fungicydy i wiele innych. Najczęstszym z nich są herbicydy, które stanowią około 50% wszystkich pestycydów na świecie. Dzięki temu nowemu wynalazkowi, mamy obowiązek zmodernizować nasz sektor rolnictwa, aby obejmował pestycydy."

smd_tech.3.t:0 "Morze martwych skrzydeł"
smd_tech.3.d:0 "Od tysiącleci owady i gryzonie pozostają nieustającym zagrożeniem dla ludzkiej działalności rolniczej. Dzięki niedawnemu wynalazkowi różnych, bezpiecznych środków chemicznych, które odstraszają i zabijają szkodliwe owady, możemy uzyskać bardziej obfite zbiory, zapewniając jednocześnie większe bezpieczeństwo żywności raz na zawsze!"

smd_tech.3.a:0 "Pewnie byłoby lepiej, gdyby zrobili mniej szkód dla środowiska..."

# Globalization

je_globalization:0 "Globalizacja"
je_globalization_reason:0 "Globalizacja jest zjawiskiem pod koniec XX wieku określonym przez większe wzajemne powiązania, swobodny tranzyt kultury, towarów, broni i ludzi, każdy wywołany przez większe inicjatywy wolnego handlu na całym świecie."

je_asian_economic_reform: "Reforma gospodarcza"
je_asian_economic_reform_reason: "Chiny i Indie od dawna są związane ograniczeniami gospodarczymi. Gospodarka światowa szybko zmierza w kierunku integracji i wolnego handlu. Usuwając przestarzałe ograniczenia, możemy wprowadzić bezprecedensowy wzrost. Do tego czasu nasze rynki pozostają ograniczone."

asian_economy_restrictions: "Ograniczenia gospodarcze"
asian_economy_restrictions_desc: "Kontrolowana przez państwo nieefektywność i bariery protekcjonistyczne spowalniają handel, zmniejszając konkurencyjność i dostęp międzynarodowy."

booming_trade_economy: "Rozwój gospodarki handlowej"
booming_trade_economy_desc: "Wraz ze zniesieniem ograniczeń rozwijają się rynki zagraniczne i krajowe, co prowadzi do większego dobrobytu."

asia_reform.1.t: "Otwarcie rynków"
asia_reform.1.d: "Reformy zostały wprowadzone i usunięto restrykcyjne polityki handlowe. Chiny i Indie stoją teraz na czele globalizacji gospodarczej."
asia_reform.1.f: ""Musimy otworzyć nasze rynki, ponieważ izolacja nie jest już zrównoważona"."
asia_reform.1.a: "Zaczyna się nowa era handlu."

# Starship

je_starships:0 "Statki kosmiczne"
je_starships_reason:0 "Wynalezienie rakiety wielokrotnego użytku szybko spurred na wynalazek innego typu statku kosmicznego, statku gwiezdnego. Zdolny do skutecznego łamania międzyplanetarnych barier, lądowania na marsie i powrotu na Ziemię, wszystko przy zachowaniu astronautów w stabilnym stanie zdrowia, to rewolucyjny nowy projekt, który zasługuje na nasze uznanie."

# coming soon

################ others ###########

# Cancer

cancer.1.t:0 "Leczenie raka"
cancer.1.d:0 "Przez ponad stulecie rak nawiedzał ludzkość - nieprzewidywalną przypadłość, która odebrała miliony i uniknęła każdego lekarstwa. Nie znał granic, nie szanował statusu i pozostawił zniszczenie w każdej rodzinie, której dotknął. Ale dzisiaj, po latach nieustępliwych badań, badań klinicznych i współpracy międzynarodowej, naukowcy dokonali niemożliwego: opracowali uniwersalne, ukierunkowane lekarstwo. Ta przełomowa terapia wykrywa i niszczy komórki złośliwe bez szkody zdrowej tkanki, co remisja nie tylko możliwe, ale gwarantowane."
cancer.1.a:0 "Triumf dla całej ludzkości."
cancer_eradication_prestige:0 "Eradykated Cancer"

# 2004 Indian Ocean earthquake and tsunami

indian_ocean_tsunami.1.t: "Trzęsienie ziemi uderza w Ocean Indyjski"
indian_ocean_tsunami.1.d: "Potężne trzęsienie ziemi wywołało katastrofalne tsunami, niszczące regiony przybrzeżne w Azji Południowej i Południowo-Wschodniej. Szkody są bezprecedensowe, a powrót do zdrowia potrwa lata."
indian_ocean_tsunami.1.a: "Musimy natychmiast zacząć odbudowę."
indian_ocean_tsunami.1.f: "W jednej z najgorszych klęsk w historii, niszczycielskie trzęsienie ziemi i tsunami zniszczyło nasze regiony przybrzeżne"

je_indian_ocean_tsunami: "Odzyskiwanie tsunami"
je_indian_ocean_tsunami_reason: "Destrukcyjne tsunami zniszczyło waszą przybrzeżną infrastrukturę i wstrząsnęło krajem. Odbudowa wysiłków ma kluczowe znaczenie dla ożywienia gospodarczego i stabilności."

tsunami_recovery_success_tt: "Pomyślnie rozpoczęliście krajową regenerację."

tsunami_disaster_struck: "Uszkodzenie Tsunami w całym kraju"
tsunami_local_destruction: "Lokalne zniszczenie tsunami"
tsunami_reconstruction_complete: "Rekonstrukcja zakończona"
  
indian_ocean_tsunami_recovery_title: "Wysiłki na rzecz odbudowy tsunami"
indian_ocean_tsunami_recovery_desc: "Wasz kraj został uderzony przez tsunami na Oceanie Indyjskim. Wdrożenie pomocy i odnowy, aby ustabilizować swoją populację i infrastrukturę."

tsunami_aid_title: "Pomoc humanitarna"
tsunami_aid_desc: "Należy przeprowadzić reformy opieki społecznej lub przyznać pomoc finansową, aby pomóc w odbudowie dotkniętych obszarów."

tsunami_disaster_struck: "Uszkodzenie Tsunami w całym kraju"
tsunami_local_destruction: "Lokalne zniszczenie tsunami"
tsunami_reconstruction_complete: "Skuteczny wysiłek odbudowy"
tsunami_recovery_success_tt: "Do grudnia 2005 r. państwo wprowadziło ustawę o opiece społecznej."
 
indian_ocean_tsunami.2.t: "Tsunami Niszczy Azję Południową"
indian_ocean_tsunami.2.d: "Potężne trzęsienie ziemi i tsunami uderzyło w Ocean Indyjski. Katastrofa humanitarna. Świat patrzy - czy będziemy działać?"
indian_ocean_tsunami.2.f: "Całe wybrzeże zniknęło. Pomoc jest pilnie potrzebna."
indian_ocean_tsunami.2.a: "Wyślij pomoc w nagłych wypadkach."
indian_ocean_tsunami.2.b: "Mamy własne priorytety."

indian_ocean_tsunami.3.t: "Otrzymana pomoc"
indian_ocean_tsunami.3.d: "Obcy naród wysłał pomoc humanitarną. Twoi ludzie są wdzięczni."
indian_ocean_tsunami.3.a: "Dzięki Bogu za globalną solidarność."

tsunami_foreign_aid_sent: "Wysyłanie pomocy zagranicznej ofiarom tsunami"
countries_available_to_request_aid_from:0 "Kraje są dostępne, aby zwrócić się o pomoc od"
has_sent_iosa:0 "Już wysłał pomoc"

je_request_iosa_aid_button:0 "Wniosek o pomoc międzynarodową"
je_request_iosa_aid_button_desc:0 "Prośba o pomoc ze strony społeczności międzynarodowej, aby pomóc w przezwyciężeniu trzęsienia ziemi i tsunami."

tsunami_disaster_struck: "Dotknięty trzęsieniem ziemi i tsunami na Oceanie Indyjskim 2004"

# Iraq disarmament Crisis

je_iraq_disarmament_crisis: "Kryzys w Iraku"
je_iraq_disarmament_crisis_reason: "Po wojnie w Zatoce Perskiej Irak był związany rezolucją Rady Bezpieczeństwa Organizacji Narodów Zjednoczonych nr 687 w celu demontażu swoich programów broni masowego rażenia. Społeczność międzynarodowa, za pośrednictwem UNSCOM i MAEA, starała się zweryfikować zgodność, ale utrudnianie działań irackich i spory dotyczące kontroli spowodowały długotrwałe ograniczenie. \n \n Kryzys grozi wznowieniem konfliktu w miarę wzrostu napięć w związku z odmową przez Irak pełnej współpracy z reżimem rozbrojenia."
iraq_disarmament_resolved_tt: "Kryzys rozbrojenia Iraku został rozwiązany."

je_us_iraq_disarmament: "Kryzys w Iraku"
je_us_iraq_disarmament_reason: "Stany Zjednoczone zobowiązały się do egzekwowania przestrzegania przez Irak rezolucji 687 Rady Bezpieczeństwa ONZ. Powtarzające się irackie utrudnianie inspekcji UNSCOM i MAEA podważa światowe bezpieczeństwo i napędza napięcia w regionie Zatoki Perskiej. \n \n Nadal trwają wysiłki dyplomatyczne, ale opcje wojskowe pozostają na stole, jeśli inspekcje zawiodą."

iraq_events.10.t: "Irak odrzuca samoloty UNSCOM"
iraq_events.10.d: "W odważnym wyzwaniu, przed Komisją Specjalną ONZ (UNSCOM), Irak odrzucił propozycje inspektorów dotyczące wykorzystania własnego samolotu do wjazdu do kraju. Bagdad nalega na pełną kontrolę nad dostępem i transportem, wzbudzając nowe obawy dotyczące jego zaangażowania w rozbrojenie."
iraq_events.10.a: "Odrzućcie ich warunki - pierwszeństwo ma suwerenność Iraku."
iraq_events.10.b: "Pozwolić na loty - współpraca może złagodzić napięcia."

us_events.10.t: "Irak Blokuje samoloty UNSCOM"
us_events.10.d: "Irak odmówił zezwolenia inspektorom UNSCOM na wlot własnego samolotu do kraju, co dodatkowo utrudnia działania inspekcyjne. To posunięcie jest postrzegane jako bezpośredni akt sprzeciwu wobec ONZ i niechęć do rozbrojenia."
us_events.10.a: "To nie może pozostać bez odpowiedzi."
us_events.10.b: "Unikaj eskalacji - na razie."

################# COUNTRY-SPECIFIC ##############

# united states

rodney.1.t:0 "Police Beating of Rodney King"
rodney.1.d:0 "Rodney King został brutalnie pobity przez funkcjonariuszy policji Los Angeles po pościgu. Prześladowca sfilmował napaść, ujawniając brutalność policji i skandal narodowy."
rodney.1.f:0 "Otoczyli go i bili pałkami. Nie bronił się. To było przerażające, jakby chcieli zrobić z niego przykład."

rodney.1.a:0 "To będzie gorące lato.."

rodney.2.t:0 "Zamieszki w Los Angeles"
rodney.2.d:0 "Po tym, jak policjanci oskarżeni o użycie nadmiernej siły w pobiciu Rodneya Kinga zostali zatopieni, ogromne grosze ludzi wynieśli na ulice, powodując ponad miliard dolarów szkód w Mieście."
los_angeles_riots:0 "Rodney King Riots"
rodney.2.a:0 "Sami się uspokoją."
rodney.2.b:0 "Przyślijcie Gwardię Narodową!"

north_hollywood.1.t: "Strzelanina w północnym Hollywood"
north_hollywood.1.d: "Dwóch rabusiów było ubranych w kamizelki i nosiło karabiny. Oficerowie bez broni musieli pożyczyć broń z lokalnego sklepu z bronią, by skutecznie zareagować."
north_hollywood.1.f: "Dwóch ciężko uzbrojonych rabusiów napadło na policję Los Angeles, raniąc kilku oficerów i cywilów. Incydent wstrząsnął narodem i wywołał pytania dotyczące gotowości policji."
north_hollywood.1.a: "Chłodny dzień w historii stróżów prawa."

north_hollywood_police_response:0 "Zwiększone wsparcie dla egzekwowania prawa"

wtc_bombing.1.t: "1993 World Trade Center Bombing"
wtc_bombing.1.d: "Potężna bomba wybuchła pod północną wieżą World Trade Center w Nowym Jorku, zabijając sześć osób i raniąc ponad tysiąc osób. Atak wstrząsnął narodem, ujawniając słabości terroryzmu we własnych granicach."
wtc_bombing.1.a: "Zwiększenie środków bezpieczeństwa wewnętrznego."
wtc_bombing.1.b: "Zachowaj spokój i unikaj nadmiernej reakcji."
heightened_security_measures: "Zaostrzone środki bezpieczeństwa"
heightened_security_measures_desc: "W odpowiedzi na atak terrorystyczny rząd wdrożył silniejszą politykę bezpieczeństwa wewnętrznego i koordynację egzekwowania prawa."
oklahoma_city_aftermath: "Oklahoma City Bombing Aftermath"
oklahoma_city_aftermath_desc: "Destrukcyjny wybuch budynku federalnego Alfreda P. Murrah wstrząsnął narodem. Obawy dotyczące bezpieczeństwa i reperkusje polityczne utrzymują się w miarę jak rząd zwiększa swoją wewnętrzną czujność."
 
usa_events.1.t: "Republikańskie wyniki pierwotne"
usa_events.1.d: "Po ogrzanym sezonie podstawowym pełnym debat i kampanii, Partia Republikańska wybrała nowego nosiciela norm. George W. Bush zwyciężył, przejmując władzę nad Petite Bourgeoisie i obiecując odważny nowy rozdział dla partii."
usa_events.1.a: "Nominacja jest jego."

usa_events.2.t: "Nominacja Baracka Obamy"
usa_events.2.d: "Po ogrzanym sezonie podstawowym pełnym debat i kampanii, Partia Demokratyczna wybrała nowego nosiciela norm. Barack Hussein Obama zwyciężył, przejmując władzę nad Petite Bourgeoisie i obiecując odważny nowy rozdział dla partii."
usa_events.2.a: "Nominacja jest jego."

usa_events.3.t: "Nominacja Donalda Trumpa"
usa_events.3.d: "Po ogrzanym sezonie podstawowym pełnym debat i kampanii, Partia Republikańska wybrała nowego nosiciela norm. Donald John Trump, szczególnie kontrowersyjny człowiek, zwyciężył, przejmując rządy profesjonalistów i obiecując odważny nowy rozdział dla partii."
usa_events.3.a: "Nominacja jest jego."

# Storm of the Century
american_disasters.1.t: "1993 Burza stulecia"
american_disasters.1.d: "Masywna burza cyklonowa przepłynęła przez wschodnie Stany Zjednoczone, przynosząc rekordowy opady śniegu, huragany i poważne powodzie wzdłuż wybrzeży. Miliony zostają bez mocy, a liczba ofiar codziennie wzrasta."
american_disasters.1.a: "Musimy znosić zimowy gniew."

# Great Flood of 1993
american_disasters.2.t: "Wielka Powódź!"
american_disasters.2.d: "Tygodnie obfitych deszczów i nasyconych gleb spowodowały, że rzeki Mississippi i Missouri zakwitły daleko poza ich brzegiem, zatapiając ogromne obszary Ameryki Środkowego Zachodu. Całe miasta są pod wodą, a uszkodzenia są bezprecedensowe."
american_disasters.2.a: "Katastrofa dla krainy serc."

great_flood_of_1993: "Great Flood of 1993"
storm_of_the_century: "1993 Burza stulecia"

# Columbine

columbine.1.t: "Masakra liceum Colorado"
columbine.1.d: "Dwóch uzbrojonych uczniów dokonało śmiertelnego ataku w Columbine High School w Kolorado, zabijając i raniąc wielu, zanim odebrali sobie życie. Wydarzenie wywołało ogólnokrajowy żal i debatę na temat kontroli broni, bezpieczeństwa szkół i wpływów kulturowych."
columbine.1.a: "Myśli i modlitwy"
columbine.1.b: "Musimy zwiększyć bezpieczeństwo w szkołach w całym kraju."

national_mourning_school_shooting: "Szkolna strzelanina"
school_security_measures: "Środki bezpieczeństwa szkół"

better_school_security: "Lepsze bezpieczeństwo szkół"
thoughts_and_prayers: "Myśli i modlitwy"
recent_mass_shooting: "Ostatnie masowe strzelanie"

# September 11 Attacks 

ground_zero: "Pole Zero"
  
je_war_on_terror: "Wojna na terrorze"
je_war_on_terror_reason: "11 września 2001 roku ataki terrorystyczne na Stany Zjednoczone były początkiem długotrwałej globalnej kampanii przeciwko terroryzmowi. \n \n Po atakach Stany Zjednoczone rozpoczęły tzw. "wojnę z terroryzmem" - szeroko zakrojoną strategię łączącą operacje wojskowe, działania wywiadowcze i środki bezpieczeństwa wewnętrznego. Konsekwencje przekształciły politykę zagraniczną, debaty na temat swobód obywatelskich i sojusze międzynarodowe. \n \n"

usa_wot.1.t: "Ameryka pod atakiem"
usa_wot.1.d: "Skoordynowane ataki terrorystyczne uderzyły w Nowy Jork i Waszyngton, niszcząc wieże World Trade Center i poważnie niszcząc Pentagon. Tysiące zostało zabitych lub rannych. Naród jest w szoku i żąda odpowiedzi."
usa_wot.1.a: "Dzień, który będzie żył w niesławie."

usa_wot.2.t: "Wojna z terrorem"
usa_wot.2.d: "W następstwie ataków prezydent ogłosił globalną kampanię przeciwko tym, którzy planują, wspierają lub ukrywają organizacje terrorystyczne. Deklaracja ta doprowadzi do zwiększenia środków bezpieczeństwa w zakresie zobowiązań krajowych i wojskowych za granicą."
usa_wot.2.a: "Wymierzymy im sprawiedliwość."

global_wot.1.t: "USA zaatakowane; Tysiące martwych"
global_wot.1.d: "Stany Zjednoczone doświadczyły niszczycielskich ataków terrorystycznych. Światowi przywódcy złożyli kondolencje, a wiele państw ponownie rozważa swoje ustalenia dotyczące bezpieczeństwa."
global_wot.1.a: "Tragedia dla całej ludzkości."

global_wot.2.t: "Stany Zjednoczone Declares War on Terror"
global_wot.2.d: "Po atakach 11 września Stany Zjednoczone ogłosiły globalną "wojnę z terroryzmem" - wzywając społeczność międzynarodową do przyłączenia się do kampanii przeciwko grupom terrorystycznym i ich zwolennikom."
global_wot.2.a: "Międzynarodowy porządek się zmienia."

global_wot.3.t: "USS Invokes Artykuł 5"
global_wot.3.d: "Po atakach 11 września i kolejnej amerykańskiej kampanii wojskowej w Afganistanie po raz pierwszy w historii powołano się na art. 5 Karty NATO. Jako państwo członkowskie jesteśmy wzywani do przyłączenia się do działań wojennych."
global_wot.3.a: "Stoimy z naszymi sojusznikami."

usa_wot.3.t: "Antrax Ataki Terroryzować Ameryka"
usa_wot.3.d: "W tygodniach po atakach 11 września anonimowe listy zawierające śmiertelne zarodniki wąglika zostały wysłane do organizacji informacyjnych i senatorów USA. Ataki zasiały strach w całym kraju, wywołały masowe dochodzenia i zwiększyły obawy dotyczące wojny biologicznej."
usa_wot.3.a: "Sprawiedliwości stanie się zadość. I będzie szybko."
usa_wot.3.b: "Nie znowu!"
  
je_hunt_for_bin_laden: "Polowanie na Osamę Bin Ladena"
je_hunt_for_bin_laden_reason: "Po atakach z 11 września 2001 roku Stany Zjednoczone rozpoczęły szeroko zakrojone i globalne poszukiwania Osamy bin Ladena, przywódcy Al-Kaidy. Misja ta będzie obejmowała działania wojskowe, zbieranie danych wywiadowczych i presję dyplomatyczną. \n \n"
intensified_intelligence_operations: "Polowanie na Osamę Bin Ladena"

hunt_bin_laden_progress_bar: "Postęp polowania"
hunt_bin_laden_progress_bar_desc: "Postęp wyszukiwania"
osama_bar_completed: "Osama Bin Laden została znaleziona"

usa_wot.10.t: "Polowanie na Osamę Bin Ladena"
usa_wot.10.d: "Wraz z wojną z terrorem amerykańskie agencje wywiadowcze i siły specjalne rozpoczęły poszukiwania Osamy bin Ladena na całym świecie. Decyzje będą teraz określać intensywność i zakres operacji."
usa_wot.10.a: "Przekazać wszystkie niezbędne środki."
usa_wot.10.b: "Skup się na innych priorytetach."

usa_wot.12.t: "Bin Laden schwytany"
usa_wot.12.d: "Po latach pościgu, Osama bin Laden został zlokalizowany i zneutralizowany. Stany Zjednoczone świętują znaczące zwycięstwo w wojnie z terroryzmem."
usa_wot.12.a: "Sprawiedliwości stało się zadość."

usa_wot.11.t: "U.S Kills Bin Laden"
usa_wot.11.d: "Po miesiącach gromadzenia i przygotowania wywiadu, US Navy SEALs rozpoczęło atak na obóz w Abbottabad w Pakistanie. Cel: schwytanie lub zabicie Osamy Bin Ladena. Świat czeka na wynik."

usa_wot.11.a: "Tchórz do samego końca."

usa_wot.11.success_tt: "Osama Bin Laden została zabita w Pakistanie. Wojna z terrorem wchodzi w nową fazę."

usa_wot.20.t: "Przełom w wywiadzie"
usa_wot.20.d: "Agenci CIA odkrywają cenne informacje o schwytanych bojownikach, dostarczając nowych tropów o możliwym miejscu pobytu Bin Ladena."
usa_wot.20.a: "Doskonale."
usa_wot.20.a.tt: "Zwiększył się postęp w poszukiwaniu Bin Ladena."

usa_wot.21.t: "Bin Laden uwalnia filmy"
usa_wot.21.d: "Miesiące śledzenia podejrzanego, który był powiązany z Bin Ladenem, okazały się ślepym zaułkiem. Zasoby zostały zmarnowane. Aby pogorszyć sprawę, środkowo-wschodni terrorysta opublikował film dla amerykańskiej publiczności."
usa_wot.21.a: "Frustrujące komplikacje."
usa_wot.21.a.tt: "Postęp w poszukiwaniu Bin Ladena zmniejszył się."

usa_wot.22.t: "Współpraca regionalna"
usa_wot.22.d: "Pakistan i sojusznicy regionalni zapewniają pomoc w gromadzeniu informacji wywiadowczych, przyspieszając polowanie na Bin Ladena."
usa_wot.22.a: "To nam bardzo pomoże."
usa_wot.22.a.tt: "Postęp w poszukiwaniu Bin Ladena znacznie wzrósł."
 
accuse_iraq_wmds_button: "Oskarżenie Iraku o ukrywanie broni masowego rażenia"
accuse_iraq_wmds_button_desc: "Oskarżyć Irak o potajemne rozwijanie lub ukrywanie broni masowego rażenia. Zwiększy to napięcia i może uzasadnić działania wojskowe."

end_war_on_terror_button: "Zakończ wojnę z terrorem"
end_war_on_terror_button_desc: "Oficjalnie koniec wojny z terroryzmem, likwidacja międzynarodowych operacji. Pozostawia to utrzymujące się konsekwencje w kraju i za granicą."

usa_wot.30.t: "Domniemywany o udźwigu WMD"
usa_wot.30.d: "Stany Zjednoczone publicznie oskarżyły nas o potajemne rozwijanie i ukrywanie broni masowego rażenia. Oznacza to znaczną eskalację napięć i może zbliżyć konflikt."
usa_wot.30.a: "Straszne."
  
osama_extradited: "Osama Bin Laden została ekstradytowana"
war_on_terror_stopped_tt: "Wojna z terrorem się skończyła."
# War on TERROR

usa_wot.5.t: "Bin Laden in Custody"
usa_wot.5.d: "W zaskakującym przełomie dyplomatycznym Afganistan zgodził się na ekstradycję Osamy bin Ladena do Stanów Zjednoczonych. Ta koncesja oznacza znaczące zwycięstwo na wczesnych etapach wojny z terroryzmem."
usa_wot.5.a: "To wielka wygrana dyplomatyczna."

usa_wot.6.t: "Afganistan Odmawia ekstradycji Bin Ladena"
usa_wot.6.d: "Rząd afgański odmówił przekazania Osamy bin Ladena władzom USA. Napięcie wzrasta, gdy Waszyngton debatuje nad kolejnym krokiem."
usa_wot.6.a: "Jesteś albo z terrorystami, albo przeciwko nim."
usa_wot.6.b: "Nie podejmujmy żadnych gwałtownych działań."

je_request_bin_laden_extradition_button: "Prośba o ekstradycję Bin Ladena"
je_request_bin_laden_extradition_button_desc: "Formalnie żąda ekstradycji Osamy bin Ladena do Stanów Zjednoczonych na proces."

bin_laden_extradition_accepted_country: "Ekstradycja Bin Ladena - akceptowane"
bin_laden_extradition_accepted_country_desc: "Afganistan zgodził się na ekstradycję Osamy bin Ladena, zwiększenie morale narodowego i poprawę gotowości wojskowej."
  
bin_laden_extradition_accepted_ig_armed_forces: "Ekstradycja Bin Ladena - akceptowane"
bin_laden_extradition_accepted_ig_armed_forces_desc: "Siły zbrojne są zadowolone z dyplomatycznego sukcesu rządu w zabezpieczaniu ekstradycji Bin Ladena."

bin_laden_extradition_rejected_country: "Ekstradycja Bin Ladena - odrzucona"
bin_laden_extradition_rejected_country_desc: "Afganistan odmówił ekstradycji Osamy bin Ladena, narażając naszą gotowość wojskową i ograniczając zasoby."
  
bin_laden_extradition_rejected_ig_armed_forces: "Trwała wolność"
bin_laden_extradition_rejected_ig_armed_forces_desc: "Siły zbrojne są rozgniewane niepowodzeniem rządu w zabezpieczaniu ekstradycji Bin Ladena."

bin_laden_extradition_rejected_ig_armed_forces_2: "Nie najechał Afganistanu"
bin_laden_extradition_rejected_ig_armed_forces_2_desc: "Siły zbrojne są rozgniewane niepowodzeniem rządu w zabezpieczaniu ekstradycji Bin Ladena."

operation_enduring_freedom: "Operacja Trwała Wolność"


limited_response: "Ograniczona odpowiedź"
heightened_security_measures: "Ograniczone środki bezpieczeństwa"

afghanistan.1.t: "USA domaga się ekstradycji Bin Ladena"
afghanistan.1.d: "Stany Zjednoczone oficjalnie poprosiły Afganistan o przekazanie Osamy bin Ladena, oskarżonego o atak 11 września. Przyjęcie tego wniosku mogłoby złagodzić napięcia - ale odmowa może wywołać poważne konsekwencje."
afghanistan.1.a: "Dostosuj się do prośby."
afghanistan.1.b: "Odmów."

# 2003 Invasion of Iraq

iraq_war.1.t: "Konwencja ONZ w sprawie roszczeń dotyczących broni masowego rażenia w Iraku"
iraq_war.1.d: "Stany Zjednoczone oskarżyły Irak o ukrywanie broni masowego rażenia. ONZ zwołała sesję nadzwyczajną w celu omówienia tej kwestii i zebrania międzynarodowych odpowiedzi."
iraq_war.1.a: "Rozpoczyna się debata."

iraq_war.2.t: "Debata ONZ na temat broni masowego rażenia w Iraku"
iraq_war.2.d: "Społeczność międzynarodowa debatuje, jak odpowiedzieć na amerykańskie oskarżenia przeciwko Irakowi."
iraq_war.2.a: "Wsparcie Stanów Zjednoczonych."
iraq_war.2.b: "Po stronie Iraku."
iraq_war.2.c: "Pozostań Neutralny."

iraq_war.3.t: "NATO Response to US Accusations"
iraq_war.3.d: "Jako sojusznicy NATO musimy zdecydować, czy poprzeć stanowisko Stanów Zjednoczonych w sprawie rzekomego programu broni masowego rażenia w Iraku."
iraq_war.3.a: "Będziemy trzymać się USA."
iraq_war.3.b: "Nie możemy poprzeć tego działania."

iraq_war.4.t: "Irak odpowiada na oskarżenia"
iraq_war.4.d: "Irak został oskarżony o ukrywanie broni masowego rażenia. Rząd musi zareagować na rosnącą presję z zagranicy."
iraq_war.4.a: "Zaprzeczyć wszystkiemu i znosić izolację."
iraq_war.4.b: "Skompromituj Zachód i mobilizuj propagandę."
  
iraq_war.5.t: "U.S. Pleads do ONZ"
iraq_war.5.d: "Stany Zjednoczone przedstawiły swoją sprawę ONZ, wzywając do poparcia działań wojskowych przeciwko Irakowi w sprawie domniemanej broni masowego rażenia. Światowi przywódcy muszą teraz zdecydować, czy poprzeć wniosek Waszyngtonu, czy oprzeć się interwencji."
iraq_war.5.b: "ONZ jest zablokowana - musimy działać sami"
iraq_war_us_lobby_tt: "USA lobbuje kluczowe uprawnienia do wspierania, dostosowywania stosunków dyplomatycznych."
iraq_war_unfail_tt: "Urodzony w samą porę na śmierć na Bliskim Wschodzie."

iraq_war.6.t: "USA decyduje o wojnie"
iraq_war.6.d: "Z ONZ sparaliżowaną przez podział, Waszyngton stoi przed doniosłą decyzją: działać samotnie i stawić czoła Irakowi w sposób militarny lub wycofać się i zaryzykować pojawienie się słabego przed światem."
iraq_war.6.a: "Uruchom inwazję Iraku"
iraq_war.6.b: "Cofnąć się i uniknąć wojny"
iraq_war_backdown_tt: "USA wycofuje się z interwencji, tracąc międzynarodowy prestiż."
2003_invasion_of_iraq: "2003 Inwazja Iraku"
iraq_condemned: "Irak skazany"

