 kosovo_autonomy_compromise:0 "Kompromis autonomiczny Kosowa"
 kosovo_autonomy_compromise_desc:0 "Kosowo otrzymało szeroką autonomię, zmniejszając bezpośrednie napięcia."

 war_crimes_investigation:0 "Dochodzenie w sprawie zbrodni wojennych"
 war_crimes_investigation_desc:0 "Rząd rozpoczął śledztwo w sprawie nadużyć w czasie wojny."

