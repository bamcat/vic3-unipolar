 je_afghan_civil_war:0 "Afgańska wojna domowa"
 je_afghan_civil_war_reason:0 "Rząd talibów i Afgański Sojusz Północny są zamknięci w niezwykle powolnej wojnie partyzanckiej. Wojna górska, słaba infrastruktura i rozproszone fronty sprawiają, że decydujące postępy rzadko."
 je_afghan_civil_war_status:0 "Wojna pozostaje w fazie partyzanckiej. Postępy są boleśnie powolne, a obie strony starają się zebrać wystarczająco dużo pędu dla decydującej kampanii."
 je_afghan_civil_war_status_final_phase:0 "Afgańska wojna domowa weszła w decydującą fazę. Jedna strona zaangażowała się w szerszą kampanię."
 je_afghan_civil_war_complete:0 "Rząd talibów lub Sojusz Północny już nie istnieją."
 je_afghan_civil_war_score_bar:0 "Afgański Momentum Wojny"
 je_afghan_civil_war_score_bar_desc:0 "Talib"
 je_afghan_civil_war_score_bar_second_desc:0 "Sojusz Północny"
 je_afghan_civil_war_northern_offensive:0 "Uruchom północną ofensywę"
 je_afghan_civil_war_northern_offensive_desc:0 "Sojusz Północny może próbować zmienić skumulowany partyzancki pęd w szerszą kampanię."
 je_afghan_civil_war_taliban_campaign:0 "Uruchom kampanię talibów"
 je_afghan_civil_war_taliban_campaign_desc:0 "Talibowie mogą próbować przerwać powolną wojnę o przypisanie, podejmując zdecydowaną kampanię."
 AFGHAN_CIVIL_WAR_OFFENSIVE_MINIMUM_SCORE:0 "Wymaga bardzo wysokiego tempa wojny lub konfliktu trwającego do 1998 roku."
 afghan_civil_war.1.t:0 "The Decisive Afgański Kampania"
 afghan_civil_war.1.d:0 "Powolny etap partyzancki ustąpił miejsca szerszej kampanii. Po latach nalotów, zasadzek i spornych dolin obie strony próbują teraz zmienić nagromadzony pęd w ostateczny wynik."
 afghan_civil_war.1.f:0 "W Afganistanie armie nie tylko się rozwijają. Handlują terenem, pogodą, zaopatrzeniem i lojalnością, które przesuwają dolinę po dolinie."
 afghan_civil_war.1.a:0 "Rozpocząć kampanię."
 afghan_civil_war.1.a.ana:0 "Przyj z północy."
 afghan_civil_war.2.t_afg:0 "Prevales Talibów"
 afghan_civil_war.2.t_ana:0 "Prewencje Sojuszu Północnego"
 afghan_civil_war.2.d_afg:0 "Afgańska wojna domowa zakończyła się na korzyść rządu talibów. Obecnie państwo przejmuje kontrolę nad krajem."
 afghan_civil_war.2.d_ana:0 "Afgańska wojna domowa zakończyła się na korzyść Sojuszu Północnego. Koalicja musi teraz przekształcić wojskowe przetrwanie w realny stan."
 afghan_civil_war.2.f:0 "Walka się kończy, ale kraj jest ukształtowany przez długie lata wojny."
 afghan_civil_war.2.a:0 "Wojna się skończyła."
 afghan_civil_war.5.t:0 "Nacisk talibski"
 afghan_civil_war.5.d:0 "Talibskie siły badają pozycje Sojuszu Północnego, szukając słabych punktów w liniach dostaw i obronie gór."
 afghan_civil_war.5.f:0 "Przód porusza się ridgelinami i drogami, a nie czystymi strzałkami map personelu."
 afghan_civil_war.5.a:0 "Kontynuuj ciśnienie."
 afghan_civil_war.6.t:0 "Sieci Sojuszu Północnego"
 afghan_civil_war.6.d:0 "Dowódcy Sojuszu Północnego rozbudowują lokalne sieci, używając terenu, lojalności i zewnętrznych dróg dostaw, aby utrzymać wojnę."
 afghan_civil_war.6.f:0 "Na północy droga zaopatrzenia może być równie ważna jak batalion."
 afghan_civil_war.6.a:0 "Trzymaj linię."
 acw_guerrilla_warfare:0 "Afgańska wojna partyzancka"
 acw_guerrilla_warfare_desc:0 "Wojna jest zdominowana przez góry, naloty, zasadzki, przesuwanie lojalności i rozdrobnione fronty. Postępy są prawie niemożliwe bez przytłaczającego pędu."
 acw_taliban_security_push:0 "Kampania talibska"
 acw_taliban_security_push_desc:0 "Talibowie zaangażowali się w szerszą kampanię, aby przerwać wojnę o przywłaszczenie."
 acw_northern_alliance_mountain_resistance:0 "Oporność na góry"
 acw_northern_alliance_mountain_resistance_desc:0 "Sojusz Północny wykorzystuje tereny górskie i lokalne sieci, by oprzeć się konwencjonalnym przestępstwom."
 acw_taliban_supply_strain:0 "Talib Supply Strain"
 acw_taliban_supply_strain_desc:0 "Trwała presja nakłada na siły talibów duże obciążenie logistyczne."
 acw_northern_alliance_supply_networks:0 "Sieci zaopatrzenia Sojuszu Północnego"
 acw_northern_alliance_supply_networks_desc:0 "Sojusz Północny wzmacnia lokalne i zewnętrzne sieci dostaw."
 acw_afg_reward:0 "Afganistan Skonsolidowany"
 acw_afg_reward_desc:0 "Rząd talibów wyszedł z wojny domowej z odnowioną kontrolą."
 acw_ana_reward:0 "Sojusz Ascendant"
 acw_ana_reward_desc:0 "Sojusz Północny wyszedł z wojny domowej z nową legitymacją."
 
 ### ══════════════════════════════════════════
 ### SECOND INTIFADA
 ### ══════════════════════════════════════════

 je_second_intifada: "Drugi Intifada"
 je_second_intifada_reason: "Terytoria palestyńskie wybuchły w masowym powstaniu przeciwko izraelskiej okupacji. Na wąskich ulicach i gęsto spakowanych obozach dla uchodźców, konwencjonalna wyższość wojskowa liczy się prawie za nic. Świat patrzy, jak kamienie spotykają czołgi w jednym z najbardziej asymetrycznych konfliktów współczesnej historii."

 je_intifada_complete_tt: "Jedna strona została pokonana lub załączona."

 je_intifada_status_uprising: "Intifada jest w fazie #bold powstanie #!. Uliczne starcia, rzucanie kamieniem i partyzancki opór dominują konflikt. Konwencjonalne operacje wojskowe są prawie niemożliwe na tak ograniczonym terytorium."
 je_intifada_status_offensive: "Uruchomiono operację #bold. Konflikt nasilił się do decydującej fazy."

 je_intifada_score_bar: "Ocena konfliktu"
 je_intifada_score_bar_desc: "Izraelski Advantage"
 je_intifada_score_bar_second_desc: "Zalety palestyńskie"

 intifada_startup_tt: "Drugi Intifada się rozpoczął. Terytoria palestyńskie wybuchają w oporze przed izraelską okupacją."

 ### ══════════════════════════════════════════
 ### SCRIPTED BUTTONS
 ### ══════════════════════════════════════════

 je_intifada_military_operation: "Operacja Tarcza Obronna"
 je_intifada_military_operation_desc: "Rozpoczęcie pełnej operacji wojskowej na terytorium palestyńskim. Siły IDF przeniosą się w kierunku ponownego zajęcia głównych ośrodków ludności, demontażu bojowej infrastruktury i stłumienia powstania siłą."

 je_intifada_mass_resistance: "Popularny opór masy"
 je_intifada_mass_resistance_desc: "Eskalacja powstania w skoordynowany ruch oporu masowego. Strajki ogólne, masowe demonstracje i wzmożone walki uliczne będą podważać kontrolę Izraela na każdym froncie."

 intifada_minimum_score_tt: "Wymaga korzyści wyniku konfliktu co najmniej 5"

 ### ══════════════════════════════════════════
 ### EVENTS
 ### ══════════════════════════════════════════

 intifada_events.1.t: "Konflikt eskaluje"
 intifada_events.1.d: "Powstanie wyrosło poza uliczne starcia. To, co zaczęło się od kamieni i protestów, stało się pełną konfrontacją. W wąskich alejkach i obozach dla uchodźców w Palestynie każdy budynek to forteca, a każda ulica to pole bitwy."
 intifada_events.1.a: "Przywrócimy porządek."
 intifada_events.1.a.pal: "Nigdy nie przestaniemy się opierać."

 intifada_events.2.t_isr: "Koniec Intifady"
 intifada_events.2.d_isr: "Drugi Intifada został stłumiony. Izraelskie operacje wojskowe wzmocniły kontrolę nad terytoriami palestyńskimi, choć koszt międzynarodowej reputacji i palestyńskiego życia cywilnego był ogromny. Podstawowe skargi pozostają nierozwiązane."
 intifada_events.2.t_pal: "Palestyński Opór Prevatals"
 intifada_events.2.d_pal: "Drugi Intifada osiągnął coś, co wydawało się niemożliwe. Poprzez samą determinację i poświęcenie naród palestyński zmusił Izrael do negocjacji. Świat był świadkiem siły powszechnego oporu przed okupacją."
 intifada_events.2.a: "Co dalej?"

 intifada_events.5.t: "Zderzenia uliczne"
 intifada_events.5.d: "Młodzi Palestyńczycy zebrali się na obrzeżach izraelskich punktów kontrolnych, uzbrojonych w kamienie i palące opony. Wąskie ulice prowadzą konfrontację do walki, gdzie izraelskie opancerzone pojazdy nie mogą skutecznie manewrować. Kamery telewizyjne z całego świata nagrywają sceny."
 intifada_events.5.a: "Wzmocnienie oporności"
 intifada_events.5.b: "Pokaż urządzenie przytrzymujące"

 intifada_events.6.t: "Raids punktu kontrolnego"
 intifada_events.6.d: "Izraelskie wojskowe punkty kontrolne dzielące społeczności palestyńskie przedstawiają zarówno symbol okupacji, jak i cel taktyczny. Skoordynowany strajk może zakłócić izraelską kontrolę ruchu na terytoriach, chociaż będzie to zachętą do ostrego odwetu."
 intifada_events.6.a: "Uderzenie punktów kontrolnych"
 intifada_events.6.b: "Zbyt niebezpieczne."

 intifada_events.8.t: "International Media Coverage"
 intifada_events.8.d: "Międzynarodowe media transmitują obrazy powstania na całym świecie. Sceny palestyńskich cywilów konfrontujących się z izraelskimi siłami wojskowymi wywołały protesty i potępienie w stolicach na całym świecie. Kraje Ligi Arabskiej gromadzą się za sprawą Palestyny, podczas gdy Izrael stoi w obliczu rosnącej presji dyplomatycznej."
 intifada_events.8.a: "Świat patrzy"

 intifada_events.7.t: "Drugi Intifada"
 intifada_events.7.d: "Terytoria palestyńskie wybuchły. Po latach nieudanych negocjacji pokojowych i ciągłej ekspansji osadnictwa, frustracja narodu palestyńskiego przerodziła się w otwarte powstanie. W ciasnych ulicach Gazy i zboczach Zachodniego Brzegu, nowe pokolenie podejmuje walkę."
 intifada_events.7.a: "To zdefiniuje pokolenie"

 ### ══════════════════════════════════════════
 ### MODIFIERS
 ### ══════════════════════════════════════════

 intifada_urban_uprising: "Powstanie miejskie"
 intifada_urban_uprising_desc: "Walki odbywają się na gęsto zatłoczonych obszarach miejskich i obozach dla uchodźców, gdzie konwencjonalne siły wojskowe nie mogą skutecznie działać. Terytorium sprawia, że manewry o dużej skali są praktycznie niemożliwe."

 intifada_isr_morale: "Momentum IDF"
 intifada_isr_morale_desc: "Sukcesy wojskowe wzmocniły izraelską determinację, by stłumić powstanie."

 intifada_popular_resistance: "Popularny opór"
 intifada_popular_resistance_desc: "Naród palestyński wzniósł się w masowych oporach. Każda dzielnica to twierdza, każdy cywil to potencjalny wojownik."

 intifada_stone_throwing: "Ruch oporu"
 intifada_stone_throwing_desc: "Trwałe starcia uliczne i rzucanie kamieniem sprawiły, że tereny okupowane były niezwykle trudne do kontrolowania przez siły izraelskie."

 intifada_idf_crackdown: "IDF Crackdown"
 intifada_idf_crackdown_desc: "Izraelskie operacje wojskowe na obszarach cywilnych powodują znaczne straty."

 intifada_devastation: "Intifada Destruction"
 intifada_devastation_desc: "Walki zniszczyły domy, infrastrukturę i źródła utrzymania na całym terytorium."

 intifada_raid_expenses: "Operacje oporu"
 intifada_raid_expenses_desc: "Finansowanie skoordynowanych operacji oporu przeciwko izraelskim stanowiskom wojskowym."

 intifada_international_pressure: "Ciśnienie międzynarodowe"
 intifada_international_pressure_desc: "Światowy reportaż medialny o konflikcie zniszczył międzynarodową pozycję Izraela i jego reputację dyplomatyczną."

 intifada_isr_reward: "Intifada Sussessered"
 intifada_isr_reward_desc: "Izrael stłumił drugą Intifadę, wzmacniając kontrolę wojskową nad terytoriami palestyńskimi."

 intifada_pal_reward: "Opór Victorious"
 intifada_pal_reward_desc: "Naród palestyński zwyciężył przez powszechny opór, zdobywanie uznania i ustępstwa przez poświęcenie."
 
 je_israel_palestine_peacetime:0 "The Uneasy Status Quo"
 je_israel_palestine_peacetime_reason:0 "Nie ma otwartej intifady ani poważnej eskalacji, ale konflikt trwa nadal poprzez koordynację bezpieczeństwa, zamknięcie, dyplomację, demonstracje i okresowe incydenty."
 je_israel_palestine_tension_bar:0 "Napięcie konfliktowe"
 je_israel_palestine_tension_bar_desc:0 "Niestabilność regionalna"
 je_israel_palestine_tension_bar_second_desc:0 "Wysokie napięcie może wywołać poważne ostrzeżenie eskalacji i może być podłączony do systemu Second Intifada."

 je_ip_peacetime_status_calm:0 "Sytuacja jest stosunkowo spokojna. Koordynacja, negocjacje i mediacja międzynarodowa w zakresie bezpieczeństwa utrzymują szerszą eskalację."
 je_ip_peacetime_status_fragile:0 "Spokój jest kruchy. Incydenty, naloty, zamknięcia, demonstracje lub spory ugodowe mogłyby szybko odwrócić obecną równowagę."
 je_ip_peacetime_status_crisis:0 "Sytuacja jest na krawędzi wielkiej eskalacji. Jeden incydent może wystarczyć, by złamać status quo."
 je_ip_peacetime_complete_tt:0 "Napięcie jest bardzo niskie, negocjacje są zaawansowane, a koordynacja bezpieczeństwa jest trwała."

 je_ip_peacetime_security_coordination:0 "Koordynacja bezpieczeństwa"
 je_ip_peacetime_security_coordination_desc:0 "Rozszerzenie praktycznej koordynacji, aby zapobiec przekształceniu lokalnych incydentów w szerszy kryzys. To obniża napięcie, ale może stworzyć wewnętrzne polityczne przeciwstawienie."

 je_ip_peacetime_closure_policy:0 "Polityka zamknięcia"
 je_ip_peacetime_closure_policy_desc:0 "Wzmocnienie kontroli ruchu i dostępu w celu zmniejszenia natychmiastowego zagrożenia bezpieczeństwa. Zmniejsza to napięcia krótkoterminowe, ale szkodzi gospodarce palestyńskiej i zwiększa presję międzynarodową."

 je_ip_peacetime_settlement_freeze:0 "Zamrożenie rozliczeń"
 je_ip_peacetime_settlement_freeze_desc:0 "Ogłoś tymczasowe zamrożenie w związku z rozszerzeniem osadnictwa. Poprawia to negocjacje i pozycję międzynarodową, ale tworzy wewnętrzne przeciwstawienie."

 je_ip_peacetime_international_mediation:0 "Mediacja międzynarodowa"
 je_ip_peacetime_international_mediation_desc:0 "Zaproście mediatorów, by ustabilizowali rozmowy. Poprawia to tempo negocjacji, ale zwiększa kontrolę zewnętrzną."

 je_ip_peacetime_grassroots_outreach:0 "Gruczoły"
 je_ip_peacetime_grassroots_outreach_desc:0 "Wspieranie społeczeństwa obywatelskiego, organizacji lokalnych i inicjatyw politycznych bez przemocy. To zmniejsza napięcie, ale może gniew twardzieli."

 je_ip_peacetime_mass_mobilization:0 "Mobilizacja masowa"
 je_ip_peacetime_mass_mobilization_desc:0 "Kanał frustracji publicznej w zorganizowaną mobilizację. Powoduje to naciski międzynarodowe, ale może doprowadzić do eskalacji sytuacji."

 ip_uneasy_status_quo:0 "Nieznany status quo"
 ip_uneasy_status_quo_desc:0 "Otwarte walki ustąpiły, ale konflikt nadal kształtuje politykę, dyplomację i codzienną administrację."

 ip_security_coordination:0 "Koordynacja bezpieczeństwa"
 ip_security_coordination_desc:0 "Koordynacja między siłami bezpieczeństwa ogranicza eskalację, choć jest politycznie kosztowna."

 ip_closure_policy:0 "Polityka zamknięcia"
 ip_closure_policy_desc:0 "Ograniczenia ruchu ograniczają pewne zagrożenia dla bezpieczeństwa, zwiększając jednocześnie presję dyplomatyczną i humanitarną."

 ip_economic_restrictions:0 "Ograniczenia gospodarcze"
 ip_economic_restrictions_desc:0 "Ograniczenia ruchu i dostępu zakłócają życie gospodarcze."

 ip_settlement_freeze:0 "Zamrożenie rozliczeń"
 ip_settlement_freeze_desc:0 "Tymczasowa przerwa w działalności osadniczej poprawiła warunki dyplomatyczne."

 ip_international_mediation:0 "Mediacja międzynarodowa"
 ip_international_mediation_desc:0 "Pośrednicy z zewnątrz próbują utrzymać proces polityczny przy życiu."

 ip_grassroots_outreach:0 "Gruczoły"
 ip_grassroots_outreach_desc:0 "Społeczeństwo obywatelskie i lokalne inicjatywy polityczne działają na rzecz zapobiegania gwałtownej sytuacji."

 ip_mass_mobilization:0 "Mobilizacja masowa"
 ip_mass_mobilization_desc:0 "Mobilizacja publiczna zwiększa presję polityczną, ale także zwiększa ryzyko konfrontacji."

 ip_security_alert:0 "Alarm bezpieczeństwa"
 ip_security_alert_desc:0 "Siły bezpieczeństwa są w stanie gotowości po ostatnich zamieszkach."

 ip_international_scrutiny:0 "Badanie międzynarodowe"
 ip_international_scrutiny_desc:0 "Zagraniczne rządy i media uważnie obserwują rozwój wydarzeń."

 ip_political_backlash:0 "Polityczny backlash"
 ip_political_backlash_desc:0 "Kompromis lub koordynacja rozgniewała krajowych przeciwników."

 ip_stabilized_peace_process:0 "Ustabilizowany proces pokojowy"
 ip_stabilized_peace_process_desc:0 "Rzadki okres niskiego napięcia i trwałej koordynacji stworzył bardziej stabilne środowisko dyplomatyczne."

 ip_breakdown_of_calm:0 "Podział spokoju"
 ip_breakdown_of_calm_desc:0 "Sytuacja w czasie pokoju uległa załamaniu, a społeczeństwo szykuje się do eskalacji."

 ip_peacetime.1.t:0 "Incydent punktu kontrolnego"
 ip_peacetime.1.d:0 "Miejscowy incydent w zakresie bezpieczeństwa zwrócił uwagę społeczeństwa i zwiększył nacisk na odpowiedź."
 ip_peacetime.1.f:0 "Nawet drobne konfrontacje mogą stać się symbolami szerszego konfliktu."
 ip_peacetime.1.a:0 "Zaostrzenie procedur bezpieczeństwa."
 ip_peacetime.1.b:0 "Współpracuj cicho z lokalnymi władzami."

 ip_peacetime.2.t:0 "Uszkodzenie bezpieczeństwa"
 ip_peacetime.2.d:0 "Palestyńskie siły bezpieczeństwa stoją przed presją, by działać przeciwko bojownikom i uzbrojonym frakcjom."
 ip_peacetime.2.f:0 "Współpraca może zapobiec eskalacji, ale może również wyglądać na współpracę."
 ip_peacetime.2.a:0 "Przeciwko sieciom."
 ip_peacetime.2.b:0 "Unikaj konfrontacji."

 ip_peacetime.3.t:0 "Ogłoszenie o rozrachunku"
 ip_peacetime.3.d:0 "Proponowana ekspansja stała się punktem zapalającym w proces dyplomatyczny."
 ip_peacetime.3.f:0 "Mapy, pozwolenia i szczyty górskie mogą mieć znaczenie dla strategii krajowej."
 ip_peacetime.3.a:0 "Kontynuuj ogłoszenie."
 ip_peacetime.3.b:0 "Opóźnić ekspansję."

 ip_peacetime.4.t:0 "Protesty uliczne"
 ip_peacetime.4.d:0 "Demonstracje rozprzestrzeniły się w kilku społecznościach, podważając obecną równowagę polityczną."
 ip_peacetime.4.f:0 "Ulica może być zastawką bezpieczeństwa, albo pierwszym znakiem czegoś większego."
 ip_peacetime.4.a:0 "Niech mobilizacja trwa."
 ip_peacetime.4.b:0 "Wezwij powściągliwość."

 ip_peacetime.5.t:0 "Międzynarodowy wysłannik"
 ip_peacetime.5.d:0 "Przybył zagraniczny wysłannik z propozycjami wznowienia dialogu."
 ip_peacetime.5.f:0 "Dyplomacja rzadko rozwiązuje konflikt naraz, ale może zyskać czas."
 ip_peacetime.5.a:0 "Przyjmij wysłannika."
 ip_peacetime.5.b:0 "Odrzucić ciśnienie zewnętrzne."

 ip_peacetime.6.t:0 "Konferencja darczyńców"
 ip_peacetime.6.d:0 "Zagraniczni darczyńcy oferują nowe wsparcie, ale oczekują w zamian ustępstw politycznych."
 ip_peacetime.6.f:0 "Pomoc może stabilizować instytucje, ale uzależnienie ponosi własne koszty."
 ip_peacetime.6.a:0 "Zaakceptuj ramy dyplomatyczne."
 ip_peacetime.6.b:0 "Żądaj mniej warunków."

 ip_peacetime.10.t:0 "The Calm Breaks"
 ip_peacetime.10.d:0 "Skumulowana presja nalotów, protestów, zamknięć, załamania politycznego i nieudanych rozmów doprowadziła sytuację na krawędzi."
 ip_peacetime.10.f:0 "Język administracji ustępuje językowi zagrożenia."
 ip_peacetime.10.a:0 "Przygotować się do eskalacji."
 ip_peacetime.10.b:0 "Zrób ostatnie nagłe pchnięcie."

 ip_peacetime.20.t:0 "Trwały spokój"
 ip_peacetime.20.d:0 "Rzadkie połączenie koordynacji bezpieczeństwa, ograniczeń politycznych i zaangażowania dyplomatycznego ustabilizowało sytuację."
 ip_peacetime.20.f:0 "To nie jest ostateczny pokój, ale coś więcej niż brak wojny."
 ip_peacetime.20.a:0 "Delikatny sukces."
 
 oslo_accords.1.t:0 "Oslo I Accord"
 oslo_accords.1.d:0 "Izraelscy negocjatorzy osiągnęli proponowaną deklarację zasad z przywódcami palestyńskimi. Wniosek ustanowiłby wzajemne uznawanie i tymczasowe ramy dla palestyńskiego samorządu."
 oslo_accords.1.f:0 "Umowa nie rozstrzyga granic, Jerozolimy, osiedli, uchodźców ani ostatecznej suwerenności. Oferuje jednak upozorowany proces polityczny."
 oslo_accords.1.a:0 "Przedstawienie deklaracji zasad."
 oslo_accords.1.b:0 "Opóźnij umowę."

 oslo_accords.10.t:0 "Izrael proponuje Oslo I Accord"
 oslo_accords.10.d:0 "Izrael zaproponował deklarację zasad ustanawiających wzajemne uznawanie i tymczasowe ramy palestyńskiego samorządu."
 oslo_accords.10.f:0 "Akceptacja rozpocznie nowy proces polityczny i zakończy formalne podporządkowanie się Izraelowi, ale wiele kwestii dotyczących statusu finalnego pozostanie nierozwiązanych."
 oslo_accords.10.a:0 "Zaakceptuj deklarację zasad."
 oslo_accords.10.b:0 "Odrzuć propozycję."

 oslo_accords.11.t:0 "Palestyna Akceptuje Oslo I"
 oslo_accords.11.d:0 "Palestyńskie przywództwo przyjęło deklarację zasad. Rozpoczęto tymczasowy proces pokojowy."
 oslo_accords.11.f:0 "Uścisk dłoni jest historyczny, trudna praca dopiero się zaczyna."
 oslo_accords.11.a:0 "Proces się rozpoczyna."

 oslo_accords.12.t:0 "Palestyna Rejects Oslo I"
 oslo_accords.12.d:0 "Przywództwo palestyńskie odrzuciło proponowaną deklarację zasad."
 oslo_accords.12.f:0 "Bez wzajemnej akceptacji, otwarcie dyplomatyczne zostaje zamknięte."
 oslo_accords.12.a:0 "Rozmowy się rozpadają."

 oslo_accords.2.t:0 "Oslo II Accord"
 oslo_accords.2.d:0 "Dwa lata po deklaracji zasad izraelscy negocjatorzy przygotowali tymczasowe porozumienie rozszerzające palestyński samorząd na Zachodnim Brzegu i w Strefie Gazy."
 oslo_accords.2.f:0 "Wniosek dzieli władzę na strefy kontroli palestyńskiej, wspólną odpowiedzialność i dalszą kontrolę izraelską."
 oslo_accords.2.a:0 "Zaproponować umowę przejściową."
 oslo_accords.2.b:0 "Opóźnić dalsze przesunięcie."

 oslo_accords.20.t:0 "Izrael proponuje porozumienie z Oslo II"
 oslo_accords.20.d:0 "Izrael zaproponował umowę przejściową rozszerzającą palestyński samorząd i organizującą Zachodni Brzeg na obszary A, B i C."
 oslo_accords.20.f:0 "Porozumienie obiecuje rozszerzenie władzy, ale również zawiera fragmentaryczną mapę nakładania się jurysdykcji."
 oslo_accords.20.a:0 "Przyjęcie umowy przejściowej."
 oslo_accords.20.b:0 "Odrzuć propozycję."

 oslo_accords.21.t:0 "Palestyna Akceptuje Oslo II"
 oslo_accords.21.d:0 "Palestyńskie przywództwo przyjęło umowę przejściową. Proces Oslo przechodzi do następnej fazy."
 oslo_accords.21.f:0 "Więcej władzy jest przenoszonych, ale ostateczne rozwiązanie pozostaje odległe."
 oslo_accords.21.a:0 "Wdrożenie umowy."

 oslo_accords.22.t:0 "Palestyna Odrzuty Oslo II"
 oslo_accords.22.d:0 "Przywództwo palestyńskie odrzuciło proponowaną umowę przejściową."
 oslo_accords.22.f:0 "Struktura zbudowana przez Oslo I przetrwa, ale jej następny krok się nie powiódł."
 oslo_accords.22.a:0 "Proces się opóźnia."

 oslo_i_peace_process:0 "Proces pokojowy Oslo I"
 oslo_i_peace_process_desc:0 "Deklaracja zasad otworzyła formalny tymczasowy proces pokojowy."

 oslo_i_palestinian_authority:0 "Autonomia Palestyńska"
 oslo_i_palestinian_authority_desc:0 "Tymczasowa władza palestyńska zaczęła przyjmować odpowiedzialność cywilną."

 oslo_talks_delayed:0 "Rozmowy opóźnione"
 oslo_talks_delayed_desc:0 "Proces dyplomatyczny utknął, powodując frustrację i niepewność."

 oslo_ii_interim_agreement:0 "Umowa przejściowa Oslo II"
 oslo_ii_interim_agreement_desc:0 "Umowa przejściowa rozszerzyła ramy palestyńskiego samorządu."

 oslo_ii_expanded_self_government:0 "Rozszerzony samorząd"
 oslo_ii_expanded_self_government_desc:0 "Instytucje palestyńskie przyjęły na siebie większą odpowiedzialność administracyjną."

 oslo_ii_joint_security_framework:0 "Wspólne ramy bezpieczeństwa"
 oslo_ii_joint_security_framework_desc:0 "Obowiązki w zakresie bezpieczeństwa są koordynowane w ramach przejściowych."

 oslo_ii_administrative_fragmentation:0 "Fragmentacja administracyjna"
 oslo_ii_administrative_fragmentation_desc:0 "Terytorium to podlega rozdrobnionym i nakładającym się na siebie jurysdykcjom."

 oslo_ii_delayed_redeployment:0 "Opóźnione przesunięcie"
 oslo_ii_delayed_redeployment_desc:0 "Dalsza realokacja została opóźniona, co wpłynęło negatywnie na zaufanie do procesu."

 oslo_accords.30.t:0 "Podpisane Oslo I Accord"
 oslo_accords.30.d:0 "Izrael i Palestyna przyjęły deklarację zasad. Stany Zjednoczone mają teraz wspierać nowy proces pokojowy i pomóc w utrzymaniu tymczasowych ram."
 oslo_accords.30.f:0 "Pojawiło się otwarcie dyplomatyczne, ale będzie ono wymagało gwarancji, pieniędzy, presji i cierpliwości."
 oslo_accords.30.a:0 "Monitoruj proces."

 oslo_accords.31.t:0 "Niepowodzenie Oslo I Accord"
 oslo_accords.31.d:0 "Proponowana deklaracja zasad została odrzucona. Otwarcie dyplomatyczne zostało zamknięte przed ustanowieniem tymczasowych ram prawnych."
 oslo_accords.31.f:0 "Bez wzajemnej akceptacji mediacja zewnętrzna nie może prowadzić samego procesu."
 oslo_accords.31.a:0 "Niepowodzenie mediacji."

 oslo_accords.32.t:0 "Podpisano porozumienie Oslo II"
 oslo_accords.32.d:0 "Izrael i Palestyna przyjęły umowę przejściową, rozszerzając palestyński samorząd i ustanawiając kolejny etap procesu Oslo."
 oslo_accords.32.f:0 "Umowa jest sukcesem dyplomatycznym, ale jej mapa podzielonych władz może okazać się trudna do zarządzania."
 oslo_accords.32.a:0 "Wspieranie wdrażania."

 oslo_accords.33.t:0 "Niepowodzenie Oslo II Accord"
 oslo_accords.33.d:0 "Proponowana umowa przejściowa została odrzucona. Proces Oslo pozostaje niekompletny, a ramy terytorialne- administracyjne są obecnie niepewne."
 oslo_accords.33.f:0 "Pierwszy krok nie wystarczył, by zagwarantować drugi."
 oslo_accords.33.a:0 "Proces się opóźnia."

