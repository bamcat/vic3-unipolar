 chechen_war_guerilla_warfare: "Warfara partyzancka Kaukazu"
 chechen_war_guerilla_warfare_desc: "Górski teren Kaukazu Północnego ogranicza konwencjonalne operacje wojskowe. Hit-and-run taktyka dominuje na polu bitwy."
 
 chechen_war_rus_morale: "Rosyjski momentum wojskowy"
 chechen_war_rus_morale_desc: "Sukces Battlefield zwiększył morale rosyjskich sił zbrojnych."
 
 chechen_mountain_resistance: "Oporność na góry"
 chechen_mountain_resistance_desc: "Czeczeńscy bojownicy przekopali się w góry, sprawiając, że ich pozycje obronne są niezwykle trudne do usunięcia."
 
 chechen_ambush_tactics: "Zasadzka taktyczna"
 chechen_ambush_tactics_desc: "Ostatnie zasadzki partyzantów dały obrońcom czeczeńskim przewagę na ich terytorium."
 
 chechen_storm_grozny: "Bitwa pod Groznym"
 chechen_storm_grozny_desc: "Atak na Grozny spowodował katastrofalne straty i zniszczenie cywilów."
 
 chechen_war_devastation: "War- Torn Kaukaz"
 chechen_war_devastation_desc: "Walka zniszczyła ten region, zniszczyła infrastrukturę i zabiła cywilów."
 
 chechen_war_raid_expenses: "Partyzantka Koszty Raid"
 chechen_war_raid_expenses_desc: "Finansowanie partyzanckich operacji przeciwko rosyjskim liniom dostaw."
 
 chechen_war_rus_reward: "Wiktor Czeczenii"
 chechen_war_rus_reward_desc: "Zwycięstwo Rosji w wojnie czeczeńskiej zachowało integralność terytorialną i pokazało jego militarną determinację."
 
 chechen_war_che_reward: "Niezależność Won"
 chechen_war_che_reward_desc: "Czeczeńscy ludzie zdobyli niepodległość poprzez krew i poświęcenie. Nowy naród jest dumny."
 
