 ## war on terror again
 
 wot_coalition.2.t:0 "Artykuł 5 Zawiadomienie"
 wot_coalition.2.d:0 "W następstwie ataków na Stany Zjednoczone NATO powołało się na art. 5. Sojusz traktuje atak jako atak na wszystkich członków."
 wot_coalition.2.f:0 "Sojusz Północnoatlantycki został zbudowany dla wspólnej obrony. Jego pierwsze wezwanie nie pochodzi od czołgów przekraczających granicę, ale od ataku terrorystycznego."
 wot_coalition.2.a:0 "Stań ze Stanami Zjednoczonymi."

 wot_coalition.10.t:0 "Stany Zjednoczone domagają się współpracy"
 wot_coalition.10.d:0 "Stany Zjednoczone zażądały współpracy Pakistanu w wojnie z terroryzmem. Waszyngton oczekuje dostępu wojskowego, bazuje na prawach, wsparcie wywiadowcze i trasy logistyczne do Afganistanu."
 wot_coalition.10.f:0 "Geografia Pakistanu czyni ją konieczną. Odmowa jednak zachęca do oskarżenia, że Islamabad chroni terroryzm."
 wot_coalition.10.a:0 "Współpracuj z koalicją."
 wot_coalition.10.b:0 "Odmów ultimatum."

 wot_coalition.11.t:0 "Pakistan"
 wot_coalition.11.d:0 "Pakistan zgodził się współpracować ze Stanami Zjednoczonymi i partnerami koalicyjnymi, udzielając dostępu wojskowego i przyjmując bazy wojskowe do kampanii w Afganistanie."
 wot_coalition.11.f:0 "Droga do Afganistanu prowadzi teraz przez Pakistan."
 wot_coalition.11.a:0 "Zabezpieczyć trasy."

 wot_coalition.12.t:0 "Pakistan Refuses"
 wot_coalition.12.d:0 "Pakistan odrzucił amerykańskie żądania współpracy. Waszyngton wyznacza Pakistan jako współwinnego terroryzmu i przygotowuje bezpośrednie działania wojskowe."
 wot_coalition.12.f:0 "Odmowa zmienia partnera logistycznego w cel."
 wot_coalition.12.a:0 "Wybrali swoją stronę."

 wot_article_5_join_war_tt:0 "Ten członek NATO dołączy do Stanów Zjednoczonych w każdej aktywnej wojnie z Afganistanem. Jeśli wojna jeszcze się nie rozpoczęła, przyłączy się, gdy wojna się zacznie."
 wot_pakistan_cooperate_tt:0 "Pakistan podpisuje 10-letnie umowy ze Stanami Zjednoczonymi i wszystkimi partnerami koalicyjnymi, przyznając #bold Wojskowy dostęp #! i #bold Host Military Bases #!."
 wot_pakistan_refuse_tt:0 "Stany Zjednoczone wszczynają rewolucyjną wojnę przeciwko Pakistanowi i oznaczają jego udział w terroryzmie."

 wot_pakistan_coalition_access_treaty_name:0 "Wojna z umową o dostępie do koalicji terrorystycznej"
 operation_enduring_freedom_pakistan:0 "Operacja Trwała Wolność - Pakistan"

 wot_article_5_commitment:0 "Artykuł 5 Zobowiązania"
 wot_article_5_commitment_desc:0 "Kraj ten zaangażował siły w reakcję NATO po 11 września."

 wot_pakistan_cooperation:0 "Współpraca koalicyjna"
 wot_pakistan_cooperation_desc:0 "Pakistan współpracuje ze Stanami Zjednoczonymi i partnerami koalicyjnymi w wojnie z terroryzmem."

 wot_pakistan_complicit:0 "Etykietowane Komplikacje w Terroryzmie"
 wot_pakistan_complicit_desc:0 "Pakistan odmówił współpracy i jest teraz traktowany jako współwinny terroryzmu przez Stany Zjednoczone."

 wot_coalition.20.t:0 "Sojusz Północny dołącza do Koalicji"
 wot_coalition.20.d:0 "Sojusz Północny zajął Kabul i przyłączył się do amerykańskiej kampanii przeciwko reżimowi talibów w Afganistanie."
 wot_coalition.20.f:0 "Talibowie stoją teraz przed zewnętrzną koalicją i wrogiem krajowym."
 wot_coalition.20.a:0 "Naprzód na Kabul."

