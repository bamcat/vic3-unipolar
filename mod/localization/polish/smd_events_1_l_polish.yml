 # PKK insurgency
 
 je_kurdistan_war:0 "Wojna w Kurdystanie"
 je_kurdistan_war_reason:0 "Konflikt między Turcją a Kurdystanem wszedł w przedłużającą się fazę partyzancką. Zwycięstwo w bitwie, udane naloty i decydujące operacje bezpieczeństwa określą, która strona może wymusić rozwiązanie."
 je_kurdistan_war_status:0 "Wojna pozostaje w fazie partyzanckiej. Obie strony starają się stworzyć wystarczającą siłę napędową dla decydującej kampanii."
 je_kurdistan_war_status_final_phase:0 "Wojna weszła w decydującą fazę. Jedna strona zobowiązała się do ostatecznej kampanii."
 je_kurdistan_war_complete:0 "Turcja czy Kurdystan już nie istnieją."
 je_kurdistan_war_score_bar:0 "Momentum wojny"
 je_kurdistan_war_score_bar_desc:0 "Turecki Momentum."
 je_kurdistan_war_score_bar_second_desc:0 "Momentum kurdyjski"
 je_kurdistan_war_spring_offensive:0 "Uruchom wiosenną ofensywę"
 je_kurdistan_war_spring_offensive_desc:0 "Kurdystan może próbować zmienić partyzancki sukces w szerszą ofensywę."
 je_kurdistan_war_security_operation:0 "Uruchomienie operacji bezpieczeństwa"
 je_kurdistan_war_security_operation_desc:0 "Turcja może zobowiązać się do zdecydowanej kampanii bezpieczeństwa w celu stłumienia sił kurdyjskich."
 KURDISTAN_WAR_OFFENSIVE_MINIMUM_SCORE:0 "Wymaga wystarczającego tempa wojny lub konfliktu trwającego do 1993 roku."
 kurdistan_war.1.t:0 "Kampania Decyzywna"
 kurdistan_war.1.d:0 "Faza partyzancka konfliktu ustąpiła miejsca decydującej kampanii. Obie strony próbują teraz zmienić nagromadzony pęd w zwycięstwo."
 kurdistan_war.1.f:0 "To, co kiedyś było nalotem, potyczkami i zasadzkami, stało się wojną narodowej wytrzymałości."
 kurdistan_war.1.a:0 "Zaangażować siły bezpieczeństwa."
 kurdistan_war.1.a.kur:0 "Rozpocząć ofensywę."
 kurdistan_war.2.t_trk:0 "Prewencje dla Turcji"
 kurdistan_war.2.t_kur:0 "Prewencje kurdystańskie"
 kurdistan_war.2.d_trk:0 "Konflikt w Kurdystanie zakończył się przychylnością Turcji. Państwo teraz zwraca się do konsolidacji kontroli."
 kurdistan_war.2.d_kur:0 "Konflikt w Kurdystanie zakończył się na korzyść Kurdystanu. Nowe państwo musi teraz umocnić swoją niezależność."
 kurdistan_war.2.f:0 "Wojna się kończy, ale jej konsekwencje będą kształtować region przez lata."
 kurdistan_war.2.a:0 "Walka się skończyła."
 kurdistan_war.5.t:0 "Zamiatanie bezpieczeństwa"
 kurdistan_war.5.d:0 "Tureckie siły bezpieczeństwa rozszerzają działalność w spornych regionach kurdyjskich, zakłócając sieci rebeliantów, ale zwiększając koszty kampanii."
 kurdistan_war.5.f:0 "Państwo może utrzymać drogi w ciągu dnia, ale góry pozostają niepewne po zmierzchu."
 kurdistan_war.5.a:0 "Kontynuuj operację."
 kurdistan_war.6.t:0 "Sieć partyzancka Expand"
 kurdistan_war.6.d:0 "Kurdyjskie siły partyzanckie rozszerzają swoje sieci, wykorzystując teren i lokalne wsparcie w celu zrównoważenia przewagi wojskowej Turcji."
 kurdistan_war.6.f:0 "Góry zwalniają armie i szybko plotkują."
 kurdistan_war.6.a:0 "Walka trwa."
 kurdistan_war_guerilla_warfare:0 "Warfara partyzancka"
 kurdistan_war_guerilla_warfare_desc:0 "Wojna jest zdominowana przez zasadzki, naloty i rozproszone operacje, co ogranicza skuteczność konwencjonalnych formacji."
 kurdistan_war_trk_reward:0 "Skonsolidowane zabezpieczenia"
 kurdistan_war_trk_reward_desc:0 "Turcja wyszła z konfliktu z silniejszymi instytucjami bezpieczeństwa wewnętrznego."
 kurdistan_war_kur_reward:0 "Momentum wyzwolenia"
 kurdistan_war_kur_reward_desc:0 "Kurdystan wyszedł z konfliktu z odnowioną legitymacją polityczną i wojskową."
 trk_security_operation:0 "Operacja bezpieczeństwa"
 trk_security_operation_desc:0 "Turcja zobowiązała się do podjęcia zdecydowanej kampanii bezpieczeństwa."
 kur_mountain_resistance:0 "Oporność na góry"
 kur_mountain_resistance_desc:0 "Kurdyjskie siły wykorzystują teren i lokalne sieci, by przeciwdziałać konwencjonalnym przestępstwom."
 trk_counterinsurgency_expenses:0 "Wydatki wyrównawcze"
 trk_counterinsurgency_expenses_desc:0 "Koszty rozszerzonych operacji bezpieczeństwa obciążają państwo."
 kur_guerrilla_networks:0 "Sieci partyzanckie"
 kur_guerrilla_networks_desc:0 "Rozproszone sieci kurdyjskie wzmacniają rebelię."
 
