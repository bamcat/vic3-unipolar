 je_reunify_yugoslavia:0 "Reunify Jugosławia"
 je_reunify_yugoslavia_reason:0 "Stara federacja upadła. Serbia może próbować odbudowy poprzez podbój, dyplomację lub integrację tematyczną."

 je_yugoslav_wars_serbia:0 "Wojny jugosłowiańskie"
 je_yugoslav_wars_serbia_reason:0 "Wojna o sukcesję jugosłowiańską trwa do czasu, gdy region zasiądzie w porządku postfederalnym."
 je_yugo_wars_status_general:0 "Trwa kryzys regionalny."
 je_yugo_wars_status_bosnia:0 "Bośnia pozostaje centrum wojny."
 je_yugo_wars_status_kosovo:0 "Kosowo stało się głównym kryzysem."

 yugoslav_collapse.1.t:0 "Frakcje Federacji"
 yugoslav_collapse.1.d:0 "Rządy nacjonalistyczne i upadające władze federalne zepchnęły Jugosławię na krawędź rozwiązania."
 yugoslav_collapse.1.a:0 "Republiki muszą być trzymane razem."
 yugoslav_collapse.1.b:0 "Zaoferuj ugodę federalną."
 yugoslav_collapse.1.c:0 "Przywróć władzę federalną siłą."

 yugoslav_collapse.2.t:0 "Chorwacja Breaks Away"
 yugoslav_collapse.2.d:0 "Chorwacja posunęła się w kierunku niepodległości, zmuszając Belgrad do podjęcia decyzji, czy walczyć lub uznać przerwę."
 yugoslav_collapse.2.a:0 "Rozpocząć Chorwacką Wojnę Niepodległości."
 yugoslav_collapse.2.b:0 "Uznaj niepodległość Chorwacji."

 yugoslav_collapse.3.t:0 "Bośnia Declares Independence"
 yugoslav_collapse.3.d:0 "Niezależność Bośni stworzyła konkurencyjne roszczenia w całej republice, a serbskie podmioty zaczęły organizować własne władze terytorialne."
 yugoslav_collapse.3.a:0 "Zaczyna się wojna bośniacka."
 yugoslav_collapse.3.b:0 "Rozpoznaj Bośnię i poszukaj ugody."

 yugoslav_collapse.4.t:0 "Odpowiedź międzynarodowa"
 yugoslav_collapse.4.d:0 "Rządy zagraniczne debatują nad utrzymaniem pokoju, sankcjami i mediacją w miarę rozprzestrzeniania się konfliktu jugosłowiańskiego."
 yugoslav_collapse.4.a:0 "Misja pokojowa jest konieczna."
 yugoslav_collapse.4.b:0 "To sprawa wewnętrzna."

 yugoslav_collapse.5.t:0 "Serbia wnioskuje o zjednoczenie"
 yugoslav_collapse.5.d:0 "Belgrad poprosił nasz rząd o powrót do odrestaurowanego państwa jugosłowiańskiego."
 yugoslav_collapse.5.a:0 "Akceptuj zjednoczenie."
 yugoslav_collapse.5.b:0 "Odrzuć żądanie."

 yugoslav_collapse.10.t:0 "Negocjacje federalne"
 yugoslav_collapse.10.d:0 "Luźniejsza jugosłowiańska konfederacja może zachować pokój, ale republiki pozostają podejrzane o zamiary Belgradu."
 yugoslav_collapse.10.a:0 "Kontynuuj reformy."
 yugoslav_collapse.10.b:0 "Proces się nie powiedzie."

 yugoslav_collapse.20.t:0 "Jugosławia zakonserwowana"
 yugoslav_collapse.20.d:0 "Poprzez kompromis i powściągliwość Jugosławia uniknęła pełnej dezintegracji i przyjęła ugodę federalną."
 yugoslav_collapse.20.a:0 "Federacja przetrwa."

 yugoslav_collapse.30.t:0 "Referendum Czarnogóry"
 yugoslav_collapse.30.d:0 "Czarnogóra przygotowuje się do podjęcia decyzji, czy kontynuować związek z Serbią, czy przywrócić pełną niezależność."
 yugoslav_collapse.30.a:0 "Uznając niepodległość Czarnogóry."
 yugoslav_collapse.30.b:0 "Zachowaj związek."

 srpskas.1.t:0 "Republika Srpska Mobilises"
 srpskas.1.d:0 "Przywódcy bośniackich Serbów zmobilizowali się, by zabezpieczyć terytorium przed nowym rządem Bośni."
 srpskas.1.a:0 "Rozpocząć wojnę."
 srpskas.1.b:0 "Zaakceptuj autonomię w Bośni."

 kosovo_events.1.t:0 "Kryzys w Kosowie"
 kosovo_events.1.d:0 "Rosnące niepokoje i represje w Kosowie spowodowały kryzys, który może doprowadzić Albanię i NATO do konfliktu z Jugosławią."
 kosovo_events.1.a:0 "Rozwal się."
 kosovo_events.1.b:0 "Oferujemy szeroką autonomię."

 kosovo_events.2.t:0 "Interwencja w Kosowie?"
 kosovo_events.2.d:0 "Konflikt z Kosowem nasilił się. Rządy NATO debatują nad interwencją wojskową przeciwko Jugosławii."
 kosovo_events.2.a:0 "Rozpocząć kampanię bombową."
 kosovo_events.2.b:0 "Unikać eskalacji."

 kosovo_events.3.t:0 "NATO rozpoczyna bombardowanie"
 kosovo_events.3.d:0 "Samoloty NATO zaczęły atakować cele jugosłowiańskie. Belgrad musi zdecydować, czy wycofać się z Kosowa, czy się oprzeć."
 kosovo_events.3.a:0 "Wycofuję się z Kosowa."
 kosovo_events.3.b:0 "Opieraj się NATO."

 kosovo_events.4.t:0 "Status Kosowa"
 kosovo_events.4.d:0 "Wraz z wycofaniem sił jugosłowiańskich i wdrożeniem administracji międzynarodowej, należy zlikwidować status Kosowa."
 kosovo_events.4.a:0 "Kosowo staje się niezależne."
 kosovo_events.4.b:0 "Kosowo pozostaje autonomiczne."

 yugoslav_war_crimes.1.t:0 "Oblężenie Sarajewa"
 yugoslav_war_crimes.1.d:0 "Raporty z Sarajewa opisują ostrzał, głód i cierpienie cywilów w warunkach oblężenia."
 yugoslav_war_crimes.1.a:0 "Zaprzecz odpowiedzialności i kontynuuj."
 yugoslav_war_crimes.1.b:0 "Otwórz śledztwo."

 yugoslav_war_crimes.2.t:0 "Srebrenica"
 yugoslav_war_crimes.2.d:0 "Doniesienia o masowych zabójstwach w pobliżu Srebrenicy wywołały międzynarodowe oburzenie."
 yugoslav_war_crimes.2.a:0 "Odrzućcie oskarżenia."
 yugoslav_war_crimes.2.b:0 "Współpracuj z śledczymi."

 yugoslav_war_crimes.3.t:0 "Respond to Sarajevo"
 yugoslav_war_crimes.3.d:0 "Oblężenie zintensyfikowało żądania działań międzynarodowych."
 yugoslav_war_crimes.3.a:0 "Condemn Belgrad."
 yugoslav_war_crimes.3.b:0 "Wydaj ograniczony protest."

 yugoslav_war_crimes.4.t:0 "Respond to Srebrenica"
 yugoslav_war_crimes.4.d:0 "Masakra zmieniła międzynarodowy nastrój do wojny."
 yugoslav_war_crimes.4.a:0 "Pożądanie odpowiedzialności."
 yugoslav_war_crimes.4.b:0 "Unikać dalszego zaangażowania."

 yugoslav_war_crimes.5.t:0 "Krajowy żal"
 yugoslav_war_crimes.5.d:0 "Wieści z frontu wstrząsnęły krajem i pogłębiły blizny wojny."
 yugoslav_war_crimes.5.a:0 "Płaczemy."

