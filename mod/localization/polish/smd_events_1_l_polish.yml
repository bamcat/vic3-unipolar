 oslo_i_palestine_reject_tt:0 "Palestyna odrzuca Oslo I: skutki traktatu nie występują, a proces pokojowy stoi w miejscu."
 oslo_ii_proposal_sent_tt:0 "Izrael proponuje umowę przejściową Oslo II z Palestyną. Traktat nie wejdzie w życie, dopóki Palestyna się nie zgodzi."
 oslo_ii_israel_delay_tt:0 "Izrael opóźnia propozycję Oslo II. Dalsze przesunięcie stajni."
 oslo_ii_palestine_accept_tt:0 "Palestyna akceptuje Oslo II: stosuje się rozszerzone samorządy, wspólne ustalenia w zakresie bezpieczeństwa oraz efekty działania placeholdera obszaru A / B."
 oslo_ii_palestine_reject_tt:0 "Palestyna odrzuca Oslo II: nie występują skutki Oslo II, a proces przejściowy się opóźnia."

