 io_accession_events.1.d:0 "Nasze reformy spełniły wymogi członkostwa w EWG. Wkroczyliśmy w europejskie ramy gospodarcze."
 io_accession_events.1.a:0 "Dołącz do EEC."

 io_accession_events.2.t:0 "Ukończone przystąpienie UE"
 io_accession_events.2.d:0 "Nasz proces akcesyjny jest zakończony. Dołączyliśmy do Unii Europejskiej i weszliśmy w jej ramy polityczne i gospodarcze."
