l_polish:
 law_jihad:0 "Jihadyzm"
 law_jihad_desc:0 "Żołnierze dżihadyści mają wyraźny cel religijny w swoich praktykach, szkoleniach i organizacjach."
 law_mixed_healthcare:0 "Mieszany system zdrowia"
 law_mixed_healthcare_desc:0 "Zdrowie ludności jest zarządzane zarówno przez prywatne i rządowe plany ubezpieczenia zdrowotnego. Plany rządu są oferowane naszym obywatelom o niskich dochodach w celu rozwiązania problemów rynkowych związanych z prywatnym ubezpieczeniem zdrowotnym."
 law_affirmative_action:0 "Działanie potwierdzające"
 law_affirmative_action_desc:0 "Obowiązkowo wprowadzono różne środki ochrony mniejszości. Obejmuje to cytaty i różne systemy zachęcające do ich zaangażowania w nasz obecny system, ochronę prawną i finansowanie pieniężne."
 
 lawgroup_firearms:0 "Własność broni palnej"
 lawgroup_firearms_desc:0 "Sprawy dotyczące prawa do noszenia broni."
 
 lawgroup_abortions:0 "Aborcje"
 lawgroup_abortions_desc:0 "Czy nasi obywatele mają prawo do aborcji."
 
 lawgroup_unions:0 "Związki"
 lawgroup_unions_desc:0 "Sprawy dotyczące zdolności naszych pracowników do tworzenia związków."
 
 lawgroup_homosexuality:0 "Homoseksualizm"
 lawgroup_homosexuality_desc:0 "Sprawy dotyczące ruchu LGBTQ + w naszym kraju."
 
 law_canton_system:0 "Izolacjonizm"
 
 law_unrestricted_firearms:0 "Nieograniczona broń palna"
 law_unrestricted_firearms_desc:0 "Nasz kraj jest domem dla dużego przemysłu broni palnej, dojrzałego do użytku cywilnego."
 
 law_licensed_firearms:0 "Upoważniona broń palna"
 law_licensed_firearms_desc:0 "Obywatele potrzebują licencji na posiadanie broni w naszym kraju."
 
 law_banned_firearms:0 "Broń palna zakazana"
 law_banned_firearms_desc:0 "Cywilne użycie broni palnej jest surowo zabronione."
 
 law_banned_unions:0 "Związki zakazowe"
 law_banned_unions_desc:0 "Pracownicy nie mogą zrzeszać się z zamiarem uzyskania świadczeń w miejscu pracy."
 
 law_restricted_unions:0 "Ograniczone związki"
 law_restricted_unions_desc:0 "Pracownicy mogą tworzyć związki zawodowe, z pewnymi ograniczeniami mającymi na celu ochronę naszych inwestorów."
 
 law_unrestricted_unions:0 "Nieograniczone związki"
 law_unrestricted_unions_desc:0 "Pracownicy są w pełni zachęcani do zrzeszania się i poszukiwania pełnych korzyści dla ich pracy."
 
 law_banned_abortions:0 "Zakazane aborcje"
 law_banned_abortions_desc:0 "Zabijanie dzieci jest zabronione na mocy naszych praw."
 
 law_restricted_abortion:0 "Aborcje ograniczone"
 law_restricted_abortion_desc:0 "Obywatele są uprawnieni do aborcji, gdy życie matki jest zagrożone, lub w przypadku gwałtu i kazirodztwa."
 
 law_unrestricted_abortions:0 "Aborcje nieograniczone"
 law_unrestricted_abortions_desc:0 "Obywatele mogą swobodnie korzystać z przysługującego im prawa do aborcji."
 
 law_active_oppression:0 "Aktywne opresja"
 law_active_oppression_desc:0 "Obywatele, którzy otwarcie identyfikują się jako członkowie społeczności LGBTQ, są uciskani, więzieni lub nawet zabici."
 
 law_restricted_lgbtq:0 "Zbrodniona homoseksualizm"
 law_restricted_lgbtq_desc:0 "Obywatele mogą zostać skazani za bycie gejem."
 
 law_decriminalized_gays:0 "Zmniejszona homoseksualizm"
 law_decriminalized_gays_desc:0 "Obywatele mogą angażować się w związki homoseksualne, oczywiście za zamkniętymi drzwiami. Związki homoseksualne nie zostaną zatwierdzone przez państwo."
 
 law_gay_marriage:0 "Same- Seks Małżeństwo"
 law_gay_marriage_desc:0 "Państwo jest zobowiązane do sankcjonowania wszystkich rodzajów małżeństw, niezależnie od tego, czy inicjatorzy są tej samej płci."
 
  # immigration
  institution_immigration:0 "Kontrole imigracyjne"
  institution_immigration_desc:0 "A government body has been formed to curb or encourage immigration into our country as we see fit.
  # dei

  institution_diversity_equity_inclusion:0 "Różnorodność, kapitał własny i integracja"
  institution_diversity_equity_inclusion_desc:0 "Departament rządowy, który skupia się na zapewnianiu osobom w niekorzystnej sytuacji sprawiedliwego miejsca w społeczeństwie."
  
  # spies
  
  institution_intelligence_agency:0 "Agencja wywiadowcza"
  institution_intelligence_agency_desc:0 "Agencje wywiadowcze są odpowiedzialne za tajne operacje na całym świecie."
  
  # laws below may be defunct.
  
  
  # New Laws Any Group
 law_equal_rights:0 "Równe prawa"
 law_equal_rights_desc:0 "Kobiety mogą oczekiwać takiego samego poziomu praw, jak ich męscy odpowiednicy."
 law_prison_slavery:0 "Więzienie Niewolnictwo"
 law_prison_slavery_desc:0 "Więźniowie i przestępcy są zmuszeni pracować przez długie godziny, z niewielką płatnością za karę."
 law_restricted_police:0 "Ograniczona policja"
 law_restricted_police_desc:0 "Uprawnienia przedstawione przez policję zostały ograniczone i podlegają rygorystycznym przepisom w celu zapewnienia bezpieczeństwa obywateli, których mają chronić."
 law_resettlement_enticement:0 "Przesiedlenie"
 law_resettlement_enticement_desc:0 "Rząd oferuje programy zachęcające ludzi do przeprowadzki na ich terytoria."
 
 # Rights of Minorities Group
 
 lawgroup_rights_of_minorities:0 "Prawa mniejszości"
 lawgroup_rights_of_minorities_desc:0 "Przepisy prawne i ochrona mniejszości."
 
 law_no_minority_rights:0 "Brak praw mniejszości"
 law_no_minority_rights_desc:0 "Mniejszości wszystkich rodzajów nie otrzymają takich samych praw, jak prawa ogółu ludności."
 law_segregation:0 "Prawo segregacji"
 law_segregation_desc:0 "Mniejszości będą doświadczać stopnia oddzielenia od ogólnej ludności, często dostając resztki i resztki."
 law_apartheid:0 "Prawo apartheidu"
 law_apartheid_desc:0 "Mniejszości nie będą doświadczać tego samego społeczeństwa ogółu ludności i często będą usuwane lub przenoszone (często siłą) na wyznaczony "ląd"."
 law_unfulfilled_protections:0 "Niespełnione zabezpieczenia"
 law_unfulfilled_protections_desc:0 "Państwo podjęło wysiłki na rzecz usunięcia barier dla mniejszości, ale przepisy regulujące prawa mniejszości pozostają w dużej mierze nieegzekwowane."
 law_limited_protections:0 "Ograniczona ochrona"
 law_limited_protections_desc:0 "Mniejszości o różnym pochodzeniu etnicznym lub narodowości otrzymają wiele z tych samych praw, jakie przysługują ogółowi społeczeństwa."
 law_encompassing_protections:0 "Zabezpieczenia wspierające"
 law_encompassing_protections_desc:0 "Mniejszości o różnym pochodzeniu etnicznym lub narodowości oraz te, które są niepełnosprawne, otrzymają wszystkie prawa i ochronę, z których korzysta ogół społeczeństwa."
 law_universal_protections:0 "Uniwersalne zabezpieczenia"
 law_universal_protections_desc:0 "Wszystkie mniejszości, bez względu na ich pochodzenie etniczne, narodowość, zdolności, seksualność lub tożsamość płciową, otrzymają te same prawa, z których korzysta ogół społeczeństwa."
 
 # Union Laws Group
 
 lawgroup_union_laws:0 "Prawo Unii"
 lawgroup_union_laws_desc:0 "Usposobienie organu zarządzającego do działań związanych ze związkami zawodowymi, takich jak strajki, strajki, protesty, zamieszki i inne."
 law_unions_outlawed:0 "Zakazana jedność"
 law_unions_outlawed_desc:0 "Związki są zakazane w tym kraju i sprawcy będą odbierać szybki opór."
 law_useless_unions:0 "Bezużyteczna biurokracja"
 law_useless_unions_desc:0 "Związki zawodowe to nic więcej, jak biurokracja pracowników i brak im konieczności działania i walki bez sił zewnętrznych."
 law_limited_action:0 "Ograniczone działanie"
 law_limited_action_desc:0 "Związki są mocno ograniczone w tym, co im wolno osiągnąć, i często muszą nawigować luki prawne, aby być skuteczne."
 law_craft_unions:0 "Związki rzemieślnicze"
 law_craft_unions_desc:0 "Związki są ograniczone do ich konkretnych ról i nie mogą tworzyć wierności związkom innych ról."
 law_permitted_unions:0 "Dozwolone działanie"
 law_permitted_unions_desc:0 "Związki nie są ani legalne, ani nielegalne, mogą funkcjonować tak, jak chcą, ale nie mają żadnej ochrony przed organem zarządzającym."
 law_enterprise_unions:0 "Przedsiębiorstwa"
 law_enterprise_unions_desc:0 "Związki zawodowe mają poprawić wyniki pracy swoich pracowników i skupić się na potrzebach swoich członków. Są one skuteczne w poprawie życia swoich członków za pomocą niezbędnych środków."
 law_backed_unions:0 "Zabezpieczenia zabezpieczone"
 law_backed_unions_desc:0 "Związki są skutecznie wspierane przez społeczeństwo i cementuje się jako część kultury krajów. Mają oni ochronę ze strony obywateli i otrzymują prawną ochronę przed uderzającymi działaniami."
 law_empowered_unions:0 "Umocnienie Unii"
 law_empowered_unions_desc:0 "Związki są mocno wzmocnione przez policję i mają wsparcie rządu. Związki te są w stanie uzyskać swoje żądania skutecznie, i są pod każdym warunkiem są chronione i wiwatowane."
 
 # Corporate Authority Group
 
 lawgroup_corporate_authority:0 "Organ korporacyjny"
 lawgroup_corporate_authority:0 "Przepisy prawne wobec korporacji i absurdalnie bogatych, obejmują przepisy ich władzy politycznej i kontroli są w stanie wywierać wpływ."
 law_completely_unregulated:0 "Całkowicie nieuregulowane"
 law_completely_unregulated_desc:0 "Działania korporacji i działania absurdalnie bogatych nie są w żaden sposób utrudnione. Często ze szkodą dla pracowników i ludzi tam mieszkających."
 law_political_lobbying:0 "Lobbing polityczny"
 law_political_lobbying_desc:0 "Każdy, kto ma wystarczająco dużą sumę funduszy, może lobbować rząd i zmuszać go do zmiany prawa na ich korzyść."
 law_tax_haven:0 "Tax Haven"
 law_tax_haven_desc:0 "Korporacje i osoby z absurdalnym bogactwem są uważane za mile widziane i organ zarządzający wprowadził prawa sprzyjające im przy mniejszych podatkach i więcej ziemi."
 law_feign_ignorance:0 "Udawana Ignorancja"
 law_political_lobbying_desc:0 "Organ zarządzający decyduje się na jak najmniejsze ograniczenie władzy korporacji i absurdalnie bogatych, decydując się udawać, że to nie problem."
 law_limited_restrictions:0 "Ograniczone ograniczenia"
 law_limited_restrictions_desc:0 "Aktywa korporacji & absurdalnie bogatych są opodatkowane niezależnie od tego, czy są one w pieniądzach, czy też w inwestycjach i akcjach."
 law_progressive_restrictions:0 "Ograniczenia progresywne"
 law_progressive_restrictions_desc:0 "Wszelkie aktywa absurdalnie bogatych & wszystkie zyski korporacji zrealizowane lub nie jest opodatkowane i wykorzystywane do poprawy populacji w stopniowym tempie."
 law_no_one_individual:0 "Nikt indywidualny"
 law_no_one_individual_desc:0 "Absurdalnie zamożni są związani z systemem podatkowym organu zarządzającego, jeśli zdecydują się tam prowadzić działalność gospodarczą. Ich bogactwo generowane podczas gdy w kraju jest zmniejszona i jest dystrybuowana do ludności w potrzebie."
 law_corporate_redistribution:0 "Redystrybucja korporacyjna"
 law_corporate_redistribution_desc:0 "Wszelkie bogactwa generowane przez absurdalnie bogatych, lub korporacje są redukowane do maksymalnej dopuszczalnej kwoty. To bogactwo jest następnie redystrybuowane w razie potrzeby. Korporacje są przekazywane do publicznej wiadomości i składają się z rady, w tym wybranych urzędników"
 
 law_serfdom:0 "Niespełnione prawa pracy"
 law_serfdom_desc:0 "Albo nie ma ustalonych praw pracowniczych, albo ustalone prawa pracownicze są całkowicie nieegzekwowane."
 law_serfdom_banned:0 "Minimalne zabezpieczenia bare"
 law_serfdom_banned_desc:0 "Określono najmniejszą ochronę."
 
 lawgroup_drug_regulations: "Przepisy antynarkotykowe"
 lawgroup_drug_regulations_desc: "Status prawny substancji odurzających - od całkowitego zakazu do pełnej legalizacji handlu ludźmi. Polityka antynarkotykowa kształtuje śmiertelność, władze państwowe, koszty egzekwowania przepisów oraz siłę interesów rolnych i karnych."

 law_total_prohibition: "Prohibicja ogółem"
 law_total_prohibition_desc: "Wszystkie substancje odurzające - w tym alkohol i tytoń - są zakazane przez prawo. Państwo twierdzi, że autorytet moralny reguluje to, co obywatele wkładają do swoich organów, wspieranych przez instytucje religijne i konserwatywne. Czarne rynki rozwijają się w tych lukach, których nie można wypełnić."

 law_alcohol_tobacco_legal: "Alkohol i tytoń Legal"
 law_alcohol_tobacco_legal_desc: "Alkohol i tytoń są legalne i opodatkowane. Wszystkie inne substancje pozostają zakazane. Jest to podstawowe ramy prawne dla większości nowoczesnych państw - pragmatyczny kompromis pomiędzy interesami gospodarczymi a konserwatyzmem moralnym."

 law_marijuana_decriminalization: "Dekryminalizacja marihuany"
 law_marijuana_decriminalization_desc: "Posiadanie i zażywanie konopi indyjskich nie jest już przestępstwem. Handel pozostaje nielegalny, ale egzekwowanie prawa jest skierowane na trudniejsze substancje. Polityka odzwierciedla rosnący konsensus, zgodnie z którym uwięzienie nie jest skuteczną odpowiedzią na rekreacyjne zażywanie narkotyków."

 law_hard_drugs_decriminalized: "Dekryminalizacja twardych leków"
 law_hard_drugs_decriminalized_desc: "Posiadanie wszystkich substancji kontrolowanych - w tym opiatów, kokainy i amfetamin - jest traktowane raczej jako sprawa zdrowia publicznego niż przestępcza. Użytkownicy odnoszą się raczej do leczenia niż do ścigania. Polityka jest kontrowersyjna, ale dowody pochodzące od osób wcześnie adoptowanych sugerują, że zmniejsza śmiertelność przedawkowania i uwalnia środki egzekwowania prawa."

 law_safe_injection_sites: "Miejsca wstrzyknięcia"
 law_safe_injection_sites_desc: "Udogodnienia finansowane przez rząd umożliwiają użytkownikom zażywanie narkotyków pod nadzorem lekarza. Personel może podawać leki odwracające przedawkowanie i połączyć użytkowników z programami leczenia. Wskaźniki śmiertelności znacznie spadają. Opozycja religijna i konserwatywna jest zawzięta - polityka postrzegana jest jako akceptacja, a nawet umożliwienie zażywania narkotyków."

 law_trafficking_allowed: "Handel dopuszczony"
 law_trafficking_allowed_desc: "Handel substancjami kontrolowanymi jest w pełni zalegalizowany i regulowany przez państwo. Korzyści gospodarcze są natychmiastowe i znaczące - dochody z narkotyków wpływają do formalnej gospodarki i podstawy opodatkowania. Reputacyjne i społeczne konsekwencje są poważne. Większość świata uzna to za kapitulację przestępczych sieci."

 law_total_prohibition_modifier: "Prohibicja ogółem"
 law_alcohol_tobacco_legal_modifier: "Alkohol i tytoń Legal"
 law_marijuana_decriminalization_modifier: "Dekryminalizacja marihuany"
 law_hard_drugs_decriminalized_modifier: "Dekryminalizacja twardych leków"
 law_safe_injection_sites_modifier: "Miejsca wstrzyknięcia"
 law_trafficking_allowed_modifier: "Handel dopuszczony"
 
 lawgroup_disability_rights: "Prawa osób niepełnosprawnych"
 lawgroup_disability_rights_desc: "Ramy prawne regulujące prawa niepełnosprawnych obywateli - od bezstronnego uznania do aktywnego wsparcia ze strony państwa poprzez leczenie, infrastrukturę i integrację w miejscu pracy. Bardziej kompleksowe ramy zwiększają udział pracowników, poprawiają standard życia i zmniejszają śmiertelność, zwiększając koszty dla państwa i pracodawców."

 law_minimal_recognition: "Minimalne uznawanie"
 law_minimal_recognition_desc: "Państwo przyznaje, że osoby niepełnosprawne istnieją, ale nie zapewniają im zakwaterowania, wsparcia ani ochrony prawnej. Osoby niepełnosprawne są w dużej mierze wykluczone z formalnego zatrudnienia i życia publicznego. Koszt ludzki jest znaczny; koszt fiskalny jest nieznaczny."
 
 law_workplace_accommodations: "Zakwaterowanie w miejscu pracy"
 law_workplace_accommodations_desc: "Pracodawcy są prawnie zobowiązani do dokonania odpowiednich dostosowań, aby umożliwić pracownikom niepełnosprawnym uczestnictwo w zatrudnieniu - zmodyfikowany sprzęt, dostosowane obowiązki, dostępne stanowiska pracy. Polityka ta wprowadza znaczącą populację do produktywnego zatrudnienia. Pracodawcy ponoszą koszty dostosowania, ale siła robocza wzrasta."
 
 law_anti_ableist_architecture: "Architektura antyableistyczna"
 law_anti_ableist_architecture_desc: "Budynki publiczne, sieci transportowe i infrastruktura muszą być dostępne dla niepełnosprawnych obywateli. Rampy, dźwigi, ściernice dotykowe, dostępne oznakowanie - środowisko fizyczne nie może już wykluczać. Modernizacja istniejącej infrastruktury jest kosztowna. Ludność, która może w pełni uczestniczyć w społeczeństwie, znacznie się rozszerza."
 
 law_public_treatments: "Postępowanie publiczne"
 law_public_treatments_desc: "Państwo finansuje zabiegi medyczne, urządzenia wspomagające, protezy, terapie i bieżące usługi wsparcia dla niepełnosprawnych obywateli, a nie charytatywne. Śmiertelność znacznie spada. Standard życia wzrasta w całej populacji. Koszt budżetu publicznego jest znaczny i jest w toku - ale argument, że niektórzy obywatele są mniej uprawnieni do wsparcia państwa niż inni został formalnie odrzucony."
 
 law_minimal_recognition_modifier: "Minimalne uznawanie niepełnosprawności"
 law_minimal_recognition_modifier_desc: "Osoby niepełnosprawne nie otrzymują zakwaterowania od państwa. Efektywna siła robocza jest zmniejszona, a śmiertelność jest ponad to, czym mogłaby być."
 
 law_workplace_accommodations_modifier: "Zakwaterowanie w miejscu pracy"
 law_workplace_accommodations_modifier_desc: "Pracodawcy są zobowiązani do przyjmowania pracowników niepełnosprawnych. Zatrudnienie jest szersze i bardziej sprzyjające włączeniu społecznemu, przy skromnych kosztach budowy wydajności."
 
 law_anti_ableist_architecture_modifier: "Infrastruktura dostępna"
 law_anti_ableist_architecture_modifier_desc: "Infrastruktura publiczna została udostępniona. Koszty budowy są wyższe, ponieważ budynki spełniają standardy dostępności, ale ludność, która może w pełni uczestniczyć w społeczeństwie, jest znacznie większa."
 
 law_public_treatments_modifier: "Traktowanie osób niepełnosprawnych"
 law_public_treatments_modifier_desc: "Państwa finansują traktowanie i wsparcie dla niepełnosprawnych obywateli. Zmniejsza się śmiertelność, poprawia się poziom życia, a dostęp do edukacji jest szerszy - przy znacznych i trwających wydatkach publicznych."
 
 institution_environmental_protection: "Agencja Ochrony Środowiska"
 institution_environmental_protection_desc: "Agencja rządowa poświęcona monitorowaniu i egzekwowaniu norm środowiskowych. Każdy poziom inwestycji oznacza zwiększenie zdolności w zakresie egzekwowania przepisów, bardziej rygorystyczne przepisy oraz szersze programy ochrony - zmniejszanie wytwarzania zanieczyszczeń we wszystkich państwach."
 
 lawgroup_environmental_regulations: "Przepisy ochrony środowiska"
 lawgroup_environmental_regulations_desc: "Ramy prawne regulujące relacje [ROOT.GetCountry.GetName] ze środowiskiem naturalnym - od nieuregulowanej eksploatacji przemysłowej po konstytucyjnie zagwarantowane prawa natury. Bardziej progresywne ramy zmniejszają zanieczyszczenie, obniżają śmiertelność i chronią ekosystemy, zwiększając koszty związane z przerobem przemysłowym i wydatkami publicznymi."
 
 law_no_environmental_regulations: "Brak rozporządzeń"
 law_no_environmental_regulations_desc: "Przemysł działa bez ograniczeń środowiskowych. Fabryki, kopalnie i gospodarstwa rolne mogą zanieczyszczać, wydobywać i wykorzystywać bez ograniczeń prawnych. Wyjście jest zmaksymalizowane. Długoterminowy koszt - śmiertelności, degradacji ekosystemu i zdrowia publicznego - ponosi ludność, a nie producenci."
 
 law_game_law: "Prawo gry"
 law_game_law_desc: "Polowanie i rybołówstwo są regulowane, aby zapobiec upadkowi populacji zwierząt łownych. Chronione pory roku, licencjonowane polowania i ograniczenia najbardziej niszczycielskich metod wydobycia. Jest to ramy ochrony, które służą przede wszystkim interesom tych, którzy są wystarczająco bogaci, aby polować na rekreacji - ale ustanawia zasadę, że państwo jest zainteresowane zarządzaniem zasobami naturalnymi."
 
 law_national_recycling: "Recykling krajowy"
 law_national_recycling_desc: "Krajowy program zbierania i przetwarzania odpadów nadających się do recyklingu. Odpady przemysłowe i domowe są sortowane, odzyskiwane i ponownie wykorzystywane tam, gdzie to możliwe, zmniejszając ilość materiałów wprowadzanych na składowiska odpadów i drogi wodne. Efektywność gospodarowania zasobami poprawia się skromnie. Zanieczyszczenie spada. Program wymaga koordynacji między gminami i przemysłem."
 
 law_protection_agency: "Agencja Ochrony"
 law_protection_agency_desc: "Specjalna agencja rządowa upoważniona do ustanawiania, monitorowania i egzekwowania norm środowiskowych we wszystkich sektorach gospodarki. Limity emisji, ograniczenia użytkowania gruntów, przepisy dotyczące odpadów przemysłowych oraz chronione obszary naturalne należą do jej kompetencji. Agencja może być inwestowana w - każdy dodatkowy poziom finansowania zwiększa jej możliwości egzekwowania przepisów i zmniejsza zanieczyszczenie."
 
 law_guaranteed_rights_of_nature: "Gwarantowane prawa natury"
 law_guaranteed_rights_of_nature_desc: "Rzeki, lasy, obszary podmokłe i ekosystemy posiadają status prawny - prawo do nieniszczenia, zanieczyszczania lub wykorzystywania poza ich zdolnością do odbudowy. Ramy te są możliwie najbardziej ambitnym prawodawstwem w zakresie ochrony środowiska, wynikającym z pojawiających się tradycji prawnych w krajach, które zaczęły traktować naturę jako przedmiot praw, a nie przedmiot własności. Działalność przemysłowa jest znacznie ograniczona. Zanieczyszczenie gwałtownie spada. Agencja Ochrony Środowiska działa na najwyższym możliwym poziomie skuteczności."
 
 law_no_environmental_regulations_modifier: "Przemysł nieuregulowany"
 law_no_environmental_regulations_modifier_desc: "Brak ograniczeń środowiskowych dla przemysłu. W związku z tym wzrasta zanieczyszczenie i śmiertelność."
 
 law_game_law_modifier: "Prawo gry"
 law_game_law_modifier_desc: "Regulowane łowiectwo i rybołówstwo nieznacznie zmniejszyły degradację środowiska. Minimalna, ale prawdziwa interwencja."
 
 law_national_recycling_modifier: "Krajowy program recyklingu"
 law_national_recycling_modifier_desc: "Krajowy program recyklingu ogranicza wytwarzanie i odzyskiwanie odpadów, w niewielkim stopniu poprawia zanieczyszczenie i efektywność budowy."
 
 law_protection_agency_modifier: "Agencja Ochrony Środowiska"
 law_protection_agency_modifier_desc: "Agencja Ochrony Środowiska egzekwuje ograniczenia emisji i normy przemysłowe. Zanieczyszczenie spada, a instytucja może być dalej inwestowana w zwiększenie zasięgu."
 
 law_guaranteed_rights_of_nature_modifier: "Gwarantowane prawa natury"
 law_guaranteed_rights_of_nature_modifier_desc: "Natura zyskała konstytucyjną pozycję. Przemysł boryka się ze znacznymi ograniczeniami, ale zanieczyszczenie jest gwałtownie zmniejszone, spada śmiertelność, a bezpieczeństwo żywnościowe poprawia się w miarę ochrony ekosystemów."
 
 # Institution modifier names
 country_institution_cost_institution_environmental_protection_mult: "Koszty Agencji Ochrony Środowiska"
 country_institution_environmental_protection_max_investment_add: "Agencja Ochrony Środowiska Max Investment"
 country_institution_size_change_speed_institution_environmental_protection_mult: "Prędkość rozbudowy Agencji Ochrony Środowiska"
 
 # ==========================================
 # LAWGROUP
 # ==========================================
 
 lawgroup_subsidized_housing: "Dotacje na mieszkalnictwo"
 lawgroup_subsidized_housing_desc: "Stopień, w jakim państwa finansują, budują i gwarantują mieszkalnictwo swoim obywatelom. Bardziej progresywne ramy rozszerzają produkcję nieruchomości w centrach miejskich, ulepszają infrastrukturę i zwiększają import migracyjny - przy rosnących kosztach dobrobytu i budżetu."
 
 # ==========================================
 # LAWS
 # ==========================================
 
 law_no_public_housing: "Brak mieszkań publicznych"
 law_no_public_housing_desc: "Państwo nie zapewnia wsparcia mieszkaniowego. Schronisko to prywatna sprawa - kupione, wynajęte lub wyprowadzone bez. Rynek mieszkalnictwa miejskiego funkcjonuje bez interwencji publicznej, a to, co tworzy rynek, jest tym, co dostają obywatele."
 
 law_housing_projects: "Projekty mieszkaniowe"
 law_housing_projects_desc: "Państwo buduje podstawowe budynki publiczne o wysokiej gęstości w obszarach miejskich - wieże, wiersze kamienic, funkcjonalne i tanie. Jakość nie zawsze jest wysoka, a lokalizacje nie zawsze są pożądane, ale mieszkanie istnieje. Centra miejskie mogą teraz produkować dodatkowe nieruchomości poprzez państwowe programy budowlane."
 
 law_public_housing_program: "Program mieszkalnictwa publicznego"
 law_public_housing_program_desc: "Kompleksowy państwowy program mieszkaniowy o standardach projektowych, rozwoju mieszanego i aktywnego planowania przestrzennego. Rząd nie tylko buduje schroniska - kształtuje miasto. Centra miejskie produkują znacznie więcej nieruchomości w miarę rozwoju sektora budownictwa publicznego, a infrastruktura poprawia się w wyniku lepszego planowania miasta."
 
 law_universal_housing: "Obudowa uniwersalna"
 law_universal_housing_desc: "Mieszkalnictwo jest zagwarantowanym prawem. Fundusze państwowe, budują i utrzymują schronienie dla każdego obywatela, który tego potrzebuje - bez testów, bez zależności od rynku, bez. Koszt fiskalny jest znaczny i trwa. Centra miejskie produkują maksymalną produkcję nieruchomości. Miasta planowane wokół powszechnego dostępu przyciągają migrację i ulepszają infrastrukturę na całym świecie."
 
 law_no_public_housing_modifier: "Brak mieszkań publicznych"
 law_no_public_housing_modifier_desc: "Państwo nie zapewnia wsparcia mieszkaniowego. Rynek budownictwa miejskiego jest całkowicie prywatny."
 
 law_housing_projects_modifier: "Projekty mieszkaniowe"
 law_housing_projects_modifier_desc: "Trwa budowa mieszkań państwowych. Koszty opieki społecznej rosną skromnie, ponieważ państwo dotuje zasoby mieszkaniowe."
 
 law_public_housing_program_modifier: "Program mieszkalnictwa publicznego"
 law_public_housing_program_modifier_desc: "Kompleksowy program mieszkalnictwa publicznego rozszerza podaż nieruchomości miejskich i poprawia infrastrukturę miejską, przy stałych kosztach."
 
 law_universal_housing_modifier: "Obudowa uniwersalna"
 law_universal_housing_modifier_desc: "Mieszkalnictwo jest zagwarantowanym prawem. Koszty opieki społecznej są wysokie, ale infrastruktura miejska jest ulepszona, przyciąga migrację i maksymalizuje produkcję nieruchomości."
 
 institution_central_bank: "Bank Centralny"
 institution_central_bank_desc: "Państwowy organ monetarny, który zarządza podażą pieniądza, ustala wymogi dotyczące rezerwy i kontroluje stopy procentowe. Każdy poziom inwestycji zaostrza politykę pieniężną - ogranicza produkcję kredytów komercyjnych, ale rozszerza pułap długu krajowego i podnosi stopę referencyjną. Bank Centralny jest mechanizmem, za pomocą którego państwo sprawuje bezpośrednią kontrolę nad systemem finansowym."
 
 lawgroup_central_banking: "Bankowość centralna"
 lawgroup_central_banking_desc: "Ramy prawne regulujące system monetarny [ROOT.GetCountry.GetName] - od żadnego centralnego organu monetarnego do pełnej kontroli państwa podaży pieniądza. Wybór ram bankowych określa sposób produkcji kredytów i papierów wartościowych oraz to, co państwo może pożyczyć."
 
 law_no_central_bank: "Brak banku centralnego"
 law_no_central_bank_desc: "Nie ma centralnego organu monetarnego. Banki działają niezależnie, ustalając własne stopy rezerw i polityki udzielania kredytów. Zaopatrzenie w pieniądze jest nieskoordynowane, a państwo nie ma mechanizmu zarządzania stopami procentowymi ani warunkami kredytowymi. Jest to niestabilny układ, od którego odsunęła się większość nowoczesnych gospodarek."
 
 law_fractional_reserve_banking: "Bankowość rezerw częściowych"
 law_fractional_reserve_banking_desc: "Banki są zobowiązane do utrzymywania tylko części swoich depozytów jako rezerw, udzielając pozostałej części kredytu gospodarce. Rozszerza to podaż pieniądza - okręgi finansowe produkują więcej papierów wartościowych, ponieważ mnoży się przepływ kapitału przez system, ale komercyjna produkcja kredytów jest nieco osłabiona przez dźwignię finansową. Jest to standardowe rozwiązanie dla większości nowoczesnych gospodarek."
 
 law_full_reserve_banking: "Pełna rezerwa bankowa"
 law_full_reserve_banking_desc: "Banki muszą posiadać 100% depozytów jako rezerwy - bez kredytów częściowych. Instytucja Banku Centralnego staje się dostępna, umożliwiając państwu bezpośrednie zarządzanie polityką pieniężną. Każdy poziom inwestycji banku centralnego podnosi stopę referencyjną o 1% i zwiększa maksymalny limit kredytowy o 5%. Produkcja kredytów z banków komercyjnych jest bardziej stabilna. Produkcja papierów wartościowych z okręgów finansowych spada wraz z usunięciem dźwigni finansowej z systemu."

 law_no_central_bank_modifier: "Brak banku centralnego"
 law_no_central_bank_modifier_desc: "Nie istnieje centralny organ monetarny. Zaopatrzenie w pieniądze nie jest zarządzane."
 
 law_fractional_reserve_banking_modifier: "Bankowość rezerw częściowych"
 law_fractional_reserve_banking_modifier_desc: "Kredyty z rezerwy krańcowej zwiększają podaż pieniądza. Produkcja papierów wartościowych wzrasta; komercyjna produkcja kredytów jest skromnie zmniejszona przez efekt dźwigni."
 
 law_full_reserve_banking_modifier: "Pełna rezerwa bankowa"
 law_full_reserve_banking_modifier_desc: "Pełne wymogi dotyczące rezerwy obowiązują. Produkcja kredytów jest stabilna i wyższa. Produkcja papierów wartościowych ulega zmniejszeniu. Instytucja Banku Centralnego jest dostępna do zarządzania stopami procentowymi i pułapem długu krajowego."
 
 institution_central_bank_modifier: "Bank Centralny"
 institution_central_bank_modifier_desc: "Bank Centralny aktywnie zarządza polityką pieniężną. Każdy poziom inwestycji zwiększa podaż kredytów, podnosi stopę procentową o 1% i zwiększa maksymalny limit kredytowy o 5%."
 
 country_max_credit_limit_mult: "Maksymalny limit kredytowy"
 country_institution_cost_institution_central_bank_mult: "Koszt banku centralnego"
 country_institution_central_bank_max_investment_add: "Bank Centralny Max Investment"
 country_institution_size_change_speed_institution_central_bank_mult: "Prędkość rozbudowy banku centralnego"
 building_group_bg_banking_throughput_add: "Próg bankowy"
 
 lawgroup_media_regulations: "Przepisy dotyczące mediów"
 lawgroup_media_regulations_desc: "Ramy prawne regulujące środowisko informacyjne [ROOT.GetCountry.GetName] - od w pełni nieuregulowanych mediów po państwową infrastrukturę łączności. Bardziej uregulowane ramy hamują radykalizację ruchów politycznych i zwiększają władzę państwową, natomiast nieregulowane środowiska wzmacniają ruchy i osłabiają pozycję rządu w przestrzeni informacyjnej."
 
 law_fully_unregulated_media: "W pełni nieuregulowane"
 law_fully_unregulated_media_desc: "Nie ma regulacji mediów ani środowiska informacyjnego. Sieci informacyjne, platformy internetowe i sieci łączności działają bez nadzoru rządowego. Przekazywanie informacji rozprzestrzenia się swobodnie. Ruch polityczny rozkwita w hałasie. Państwo nie posiada mechanizmu kształtowania i zarządzania informacjami, które konsumują obywatele, ani też nie posiada autorytetu wynikającego z kontroli."
 
 law_digital_rights: "Prawa cyfrowe"
 law_digital_rights_desc: "Podstawowa ochrona prawna reguluje środowisko informacyjne - gwarancje prywatności, przepisy antycenzury, prawo wolności informacji. Obywatele korzystają z prawnych środków przeciwko niektórym nadużyciom mediów, ale przestrzeń informacyjna pozostaje zasadniczo wolna. Ruch polityczny wciąż znajduje żyzną ziemię. [ROOT.GetCountry.GetName] zyskuje umiarkowaną korzyść z bycia państwem przestrzegającym praw."
 
 law_fairness_doctrine: "Doktryna uczciwości"
 law_fairness_doctrine_desc: "Spoty medialne są prawnie zobowiązane do przedstawiania wyważonego podejścia do kwestii politycznych - nadania czasu i przestrzeni wielu perspektywom, a nie tylko platformom. Najbardziej skrajne głosy polityczne tracą megafon. Rekrutacja radykalnych ruchów jest osłabiona. Państwo uważa się za uczciwego sędziego, a nie za uczestnika wojny informacyjnej i zyskuje autorytet."
 
 law_government_content_moderators: "Moderatorzy treści rządowych"
 law_government_content_moderators_desc: "Państwo aktywnie modernizuje treści online - usuwając dezinformacje, materiały ekstremistyczne i treści uznane za szkodliwe lub destabilizujące. Ruch polityczny traci znaczny zasięg, ponieważ ich najskuteczniejsze materiały rekrutacyjne są tłumione. Władza wzrasta. Społeczność międzynarodowa i krajowi krytycy wolności prasy zauważą politykę i prestiż [ROOT.GetCountry.GetName] będzie cierpieć odpowiednio."
 
 law_state_wifi: "State WiFi"
 law_state_wifi_desc: "Państwo prowadzi bezpośrednio infrastrukturę łączności. Dostęp do Internetu jest narzędziem publicznym, w pełni posiadanym, zarządzanym i monitorowanym przez rząd. Środowisko informacyjne jest zasobem państwowym - co obywatele czytają, obserwują i udostępniają poprzez infrastrukturę [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName] kontrola rządowa. Radykalizacja ruchu politycznego jest niemal całkowicie stłumiona. Koszty, finansowe i reputacja, jest znaczna."
 
 law_fully_unregulated_media_modifier: "W pełni nieuregulowane media"
 law_fully_unregulated_media_modifier_desc: "Nieregulowane środowisko informacyjne wzmacnia ruchy polityczne i osłabia władze państwowe."
 
 law_digital_rights_modifier: "Ramy praw cyfrowych"
 law_digital_rights_modifier_desc: "Podstawowa ochrona prawna reguluje środowisko informacyjne. Ruch polityczny wciąż kwitnie, ale [ROOT.GetCountry.GetName] zyskuje pewien prestiż ze swojego szacunku dla praw."
 
 law_fairness_doctrine_modifier: "Doktryna uczciwości"
 law_fairness_doctrine_modifier_desc: "Zbalansowane wymogi dotyczące zasięgu mediów hamują rekrutację radykalnych ruchów i poprawiają legitymację państwa."
 
 law_government_content_moderators_modifier: "Moderacja treści rządowych"
 law_government_content_moderators_modifier_desc: "Aktywne ograniczanie zawartości państwa znacznie ogranicza radykalizację ruchów politycznych kosztem prestiżu i legitymacji."
 
 law_state_wifi_modifier: "Komunikacja kontrolowana przez stan"
 law_state_wifi_modifier_desc: "[ROOT.GetCountry.GetName] kontroluje bezpośrednio infrastrukturę łączności. Radykalizacja ruchu politycznego jest prawie całkowicie stłumiona. Władza jest wysoka. Międzynarodowa reputacja cierpi."
 
 institution_courts: "System sądowy"
 institution_courts_desc: "Formalne sądownictwo działające za pośrednictwem utrwalonych sądów i procedury prawnej. Każdy poziom inwestycji rozszerza zasięg systemu sądownictwa - więcej sędziów, więcej sądów, bardziej konsekwentne egzekwowanie prawa. Turmoil spada, gdy spory są rozwiązywane drogą prawną, uchwalanie prawa staje się bardziej spójne, a ruchy rewolucyjne uważają aparat prawny państwa trudniej przezwyciężyć."
 
 lawgroup_judiciary: "Sądownictwo"
 lawgroup_judiciary_desc: "Filozofia prawna leżąca u podstaw systemu sądowego [ROOT.GetCountry.GetName] - jak rozstrzyga się spory, kto posiada władzę prawną i jaki jest cel sprawiedliwości. Wybór wymiaru sprawiedliwości kształtuje władzę, legitymację, pozycję dyplomatyczną i stabilność porządku społecznego."
 
 law_inquisitive_judiciary: "Inquisitive"
 law_inquisitive_judiciary_desc: "Państwo bada, ściga i osądza - sądownictwo jest raczej organem władzy rządowej niż niezależną instytucją. Sędziowie są agentami korony lub rządu, których zadaniem jest znalezienie prawdy i egzekwowanie prawa w imieniu państwa. Władza jest wysoka, a realizacja polityki rządowej jest łagodniejsza, ale sprawiedliwy proces jest słaby i społeczeństwo o tym wie."
 
 law_customary_judiciary: "Niestandardowe"
 law_customary_judiciary_desc: "Spory są rozwiązywane poprzez tradycyjne normy wspólnotowe, rady plemienia, starszą arbitraż i lokalne zwyczaje. Nie ma formalnych sądów - sprawiedliwość jest wymierzana przez tych, których społeczność uznaje za swoje władze, zgodnie z zasadami, które uznaje za uzasadnione. Stan ma ograniczony zasięg w tym systemie. Społeczności są stabilne, lojalne swoim tradycjom i odporne na zewnętrzne zakłócenia."
 
 law_religious_judiciary: "Prawo religijne"
 law_religious_judiciary_desc: "Pismo Święte, orzecznictwo religijne oraz interpretacje władz duchownych regulują postępowanie sądowe. Pobożni zyskują ogromną władzę polityczną jako arbitrzy tego, co prawo oznacza i jak ma ono zastosowanie. Legitymacja religijna jest głęboka wśród wiernych. Ci spoza wiary, którzy inaczej ją interpretują, mogą uznać system za mniej przyjazny."
 
 law_restorative_judiciary: "Przywracające"
 law_restorative_judiciary_desc: "Celem wymiaru sprawiedliwości nie jest kara, lecz odbudowa - naprawianie szkód wyrządzonych ofiarom, rehabilitacja przestępców i reintegracja obu stron w społeczeństwie. Sądy skupiają się na mediacji, pojednaniu i uzdrowieniu społeczności. Turmoil spada. Śmiertelność z konfliktu maleje. Lojaliści rosną. Państwo zrzeka się autorytetu w zamian za ludność, która ufa systemowi, pod którym żyje."
 
 law_adversarial_judiciary: "Adversarial"
 law_adversarial_judiciary_desc: "Konkurs prokuratury i obrony przed niezależnym sędzią lub ławą przysięgłych. Domniemanie niewinności jest chronione. Stałość prawna jest równa niezależnie od pozycji społecznej. Państwo jest związane tymi samymi zasadami co obywatele. [ROOT.GetCountry.GetName] międzynarodowy prestiż znacznie wzrasta. Niezależne sądownictwo ogranicza działania rządu - ale rząd, który może być ograniczony przez prawo, jest jednym, któremu może ufać ludność."
 
 law_inquisitive_judiciary_modifier: "Inquisitive Judity"
 law_inquisitive_judiciary_modifier_desc: "Sędziowie działają jako ramię władz państwowych. Wdrażanie polityki jest łatwiejsze, a zawirowania są tłumione - ale sprawiedliwy proces jest słaby, a radykalny wzrost ciśnienia pod powierzchnią jest prawdziwy."
 
 law_customary_judiciary_modifier: "Prawo zwyczajowe"
 law_customary_judiciary_modifier_desc: "Tradycyjna sprawiedliwość wspólnotowa zapewnia głęboką legitymację i stabilność społeczną. Oficjalna władza państwa jest ograniczona, ale zaufanie ludności do systemu jest prawdziwe."
 
 law_religious_judiciary_modifier: "Prawo religijne"
 law_religious_judiciary_modifier_desc: "Władza naukowa rządzi prawem. Devout [ROOT.GetCountry.GetAdjective] posiada ogromną siłę polityczną. Głęboka lojalność wśród wiernych - i rosnąca niechęć wśród tych, którzy są poza nią."
 
 law_restorative_judiciary_modifier: "Przywracająca sprawiedliwość"
 law_restorative_judiciary_modifier_desc: "System sprawiedliwości koncentruje się na rehabilitacji i pojednaniu. Turmoil i śmiertelność spada, Lojaliści rosną i [ROOT.GetCountry.GetName] zyskują międzynarodowy szacunek dla jej humanitarnego podejścia."
 
 law_adversarial_judiciary_modifier: "Sądownictwo wrogie"
 law_adversarial_judiciary_modifier_desc: "Niezależne sądownictwo działające w ramach sprawiedliwego procesu i równorzędnej pozycji wobec prawa. Legitymacja i prestiż są wysokie. Władza państwowa jest sprawdzana - ale ta kontrola czyni system wiarygodnym."
 
 institution_courts_modifier: "Sądownictwo"
 institution_courts_modifier_desc: "Ustanowiona sieć sądowa zmniejsza zawirowania, poprawia wdrażanie prawa i tłumi rewolucyjny impet. Każdy dodatkowy poziom rozszerza zasięg sądów w zakresie [ROOT.GetCountry.GetName]."
 
 country_institution_cost_institution_courts_mult: "Koszty systemu sądowego"
 country_institution_courts_max_investment_add: "System sądowy Max Investment"
 country_institution_size_change_speed_institution_courts_mult: "Prędkość rozbudowy systemu sądu"
 
 law_privatized_preschool_education:0 "Prywatna edukacja przedszkolna"
 law_privatized_preschool_education_desc:0 "Wczesne kształcenie dziecięce odbywa się za pośrednictwem regulowanego rynku prywatnego. Dostawcy konkurują o wpisanie do rejestru, przy czym państwo ustala minimalne standardy, ale pozostawia dostawy niezależnym podmiotom. Dostęp zależy w dużej mierze od dochodów gospodarstw domowych, chociaż dotacje mogą zrekompensować niektóre obciążenia dla rodzin o niskich dochodach."

 law_universal_childcare:0 "Uniwersalna opieka nad dziećmi"
 law_universal_childcare_desc:0 "Państwo gwarantuje przystępną cenowo opiekę nad dziećmi dla wszystkich rodzin, niezależnie od dochodów. Publicznie finansowane obiekty są dostępne w całym kraju, uwalniając rodziców do udziału w pracy i zapewniając, że wczesny rozwój dzieci nie jest uzależniony od środków rodziny."

 law_legal_protections:0 "Ochrona prawna"
 law_legal_protections_desc:0 "Państwo skodyfikowało formalną równość prawną mężczyzn i kobiet, zapewniając ochronę przed dyskryminacją w zakresie zatrudnienia, własności i życia publicznego. Prawa, które wcześniej były zwyczajowo lub selektywnie egzekwowane, są obecnie wspierane przez prawo."

 law_structural_egalitarianism:0 "Egalitaryzm strukturalny"
 law_structural_egalitarianism_desc:0 "Rząd wykroczył poza równość prawną, aby aktywnie zlikwidować struktury instytucjonalne, które utrwalają nierówność płci. Przedstawicielstwo w urzędach publicznych, zawodach i instytucjach obywatelskich jest upoważnione, a państwo odgrywa aktywną rolę w egzekwowaniu równych wyników, a nie tylko równych praw."

 law_matriarchy:0 "Matriarchia"
 law_matriarchy_desc:0 "Kobiety zajmują dominującą pozycję w strukturze politycznej i społecznej kraju. Kobiety będą stanowić większość stanowisk kierowniczych."

 law_disability_cheques:0 "Niepełnosprawność"
 law_disability_cheques_desc:0 "Państwo zapewnia regularne wsparcie finansowe obywatelom niezdolnym do pracy z powodu niepełnosprawności lub przewlekłej choroby. Płatności są zarządzane za pośrednictwem aparatu zabezpieczenia społecznego i mają na celu zagwarantowanie minimalnego poziomu życia osobom spoza personelu."

 law_student_coverage:0 "Urlop macierzyński"
 law_student_coverage_desc:0 "Kobietom przyznaje się ochronę przed ciążą."

 law_universal_basic_income:0 "Uniwersalny dochód podstawowy"
 law_universal_basic_income_desc:0 "Każdy obywatel otrzymuje bezwarunkową okresową płatność od państwa, niezależnie od statusu zatrudnienia lub środków. Polityka ta stanowi fundamentalne przemyślenie relacji między pracą, dobrobytem i uczestnictwem w życiu gospodarczym - gwarantując grunt pod którym nikt nie może spaść, jednocześnie podnosząc minimalne oczekiwania wszystkich pracowników."
 
 law_universal_college:0 "Universal College"
 law_universal_college_desc:0 "Państwo gwarantuje wszystkim obywatelom dostęp do szkolnictwa wyższego bez względu na pochodzenie i środki. Uniwersytety i uczelnie są finansowane ze środków publicznych, a ich miejsca są otwarte raczej na zasługi niż na bogactwo, tworząc lepiej wykształconą siłę roboczą i bardziej świadomych obywateli."

 education_laws.1.t:0 "Kto płaci za stopień?"
 education_laws.1.d:0 "Zaangażowanie na rzecz uniwersalnego kolegium wywołało natychmiastowe i punktowe pytanie ze strony konserwatystów podatkowych: kto dokładnie za to zapłaci? Finansowanie szkolnictwa wyższego dla każdego obywatela, który go szuka, stanowi znaczny wzrost wydatków publicznych, a przeciwnicy głośno wyrażają swoje zastrzeżenia. Rząd musi zdecydować, czy zobowiązać się do pełnego finansowania ze środków publicznych, czy też wprowadzić model, który ograniczy obciążenie."
 education_laws.1.f:0 "Pytanie, kto płaci za edukację, zawsze było pytaniem, dla kogo jest edukacja."
 education_laws.1.a:0 "Przyznanie pełnego finansowania publicznego - szkolnictwo wyższe jest dobrem publicznym."
 education_laws.1.b:0 "Wprowadzenie subwencjonowanych środków - finansowanie biednych, a nie bogatych."

 education_laws.2.t:0 "Sprzeciw wobec merytokracji"
 education_laws.2.d:0 "Bogate interesy znalazły swój preferowany argument przeciwko uniwersalnym uczelniom: standardy. Jeśli każdy może uczestniczyć, ostrzegają, wtedy stopień staje się bezwartościowy - instytucje prawdziwej doskonałości zostaną ściągnięte w dół, aby pomieścić nieprzygotowany. Rząd musi wybrać między obroną powszechnego dostępu z zasady, a oferowaniem wystawcy, która zachowuje elitarne instytucje obok systemu publicznego."
 education_laws.2.f:0 "Każde rozszerzenie dostępu zostało spełnione z tym samym ostrzeżeniem o normach. Standardy zawsze przetrwają."
 education_laws.2.a:0 "Bronić powszechnego dostępu - doskonałość nie jest ochroną bogatych."
 education_laws.2.b:0 "Zachować elitarne instytucje obok powszechnego dostępu."

 education_laws.3.t:0 "The Intelligentsia Speaks"
 education_laws.3.d:0 "Społeczność akademicka rozpoczęła debatę z charakterystycznym przekonaniem. Twierdzą, że uniwersalna szkoła jest nie tylko dobrem społecznym, ale i koniecznością gospodarczą - narodem, który ogranicza szkolnictwo wyższe do tych, którzy mogą sobie na to pozwolić, jest narodem, który wybiera świadomą ignorancję. Rząd musi podjąć decyzję, czy formalnie zaprosić swój głos do argumentu legislacyjnego, czy utrzymać debatę w ściśle politycznych warunkach."
 education_laws.3.f:0 "Uniwersytet zawsze był tam, gdzie społeczeństwa decydują, jakiej przyszłości chcą. Teraz musi zdecydować, kto może pomóc go zbudować."
 education_laws.3.a:0 "Zaproście ich do debaty - pozwólcie naukowcom poprowadzić spór."
 education_laws.3.b:0 "Niech to pozostanie decyzją polityczną - doradzają naukowcy, nie rządzą."

 education_college_fiscal_resistance:0 "Odporność fiskalna"
 education_college_fiscal_resistance_desc:0 "Konserwatyści podatkowi aktywnie sprzeciwiają się publicznym kosztom uniwersalnego kolegium, opóźniając proces wdrażania i zmuszając rząd do uzasadnienia swoich zobowiązań w zakresie wydatków."

 education_college_public_funded:0 "Publicznie finansowane zobowiązanie"
 education_college_public_funded_desc:0 "Rząd zobowiązał się do absorpcji pełnych kosztów powszechnego szkolnictwa wyższego, zwiększając tempo realizacji działań przy znacznych kosztach."

 education_college_meritocracy_debate:0 "Meritokracja Debata zaangażowana"
 education_college_meritocracy_debate_desc:0 "Rząd publicznie obronił powszechny dostęp przed twierdzeniami, że spowoduje on pogorszenie standardów akademickich, zmieniając warunki debaty nad uchwalaniem aktów."

 education_college_elite_carveout:0 "Elite Carveout oferowany"
 education_college_elite_carveout_desc:0 "Zaproponowano wyprowadzenie elitarnych instytucji prywatnych obok systemu publicznego, co spowalnia wdrażanie, ale zmniejsza zamożną opozycję."

 education_college_academic_endorsement:0 "Endorsement akademicki"
 education_college_academic_endorsement_desc:0 "Inteligencja publicznie poparła uniwersalną uczelnię, udzielając kredytów władzom naukowym i organizując wsparcie dla działań podejmowanych w ramach inicjatywy."

 education_college_elites_rebuked:0 "Elites Rebuked"
 education_college_elites_rebuked_desc:0 "Zamożne interesy zostały publicznie zakwestionowane na ich argumentach merytokracji, zawstydzając ich pozycję, ale ostrzegając ich determinację."

 education_college_elites_appeased:0 "Elites Appeated"
 education_college_elites_appeased_desc:0 "Oferta elity instytucjonalnej zmiękczyła bogatą opozycję do uniwersalnego kolegium."

 education_college_intelligentsia_engaged:0 "Intelegencja Zaangażowana"
 education_college_intelligentsia_engaged_desc:0 "Naukowcy i badacze aktywnie stawiają publiczne argumenty za uniwersalnym szkolnictwem wyższym, udzielając wiarygodności intelektualnej działaniom podejmującym działania."

 education_college_intelligentsia_sidelined:0 "Intelligency Sidelined"
 education_college_intelligentsia_sidelined_desc:0 "Decyzja o trzymaniu naukowców z dala od debaty legislacyjnej spowodowała, że inteligencja została sfrustrowana i wyłączona z rządowego programu edukacji."
