l_polish:
 
  # Middle East
  YMN_FLAVOR_TEXT:0 "Wysiłki na rzecz utrzymania władzy poszły nie tak, a wojna wybuchła w Jemenie między Starym Rządem, Radą Przejścia i Houthi. Ta brutalna wojna przyniosła ze sobą wścibskie oczy mocy w Arabii, rzucając je przeciwko sobie, aby zamachnąć Jemenem na jego korzyść. Czy Jemen będzie musiał znosić zniewolenie sąsiadów, czy będą mogli wyjść na wierzch?"
  HOU_FLAVOR_TEXT:0 "$YMN_FLAVOR_TEXT$"
  STC_FLAVOR_TEXT:0 "$YMN_FLAVOR_TEXT$"
  SYR_FLAVOR_TEXT:0 "Syria cierpi obecnie na skomplikowaną wojnę domową, która zmieniła się w wojnę zastępczą przeciwko kilku mocarstwom. Region pozostaje niezwykle wrogo nastawiony i konflikty nasilają się tylko między tymczasową wiarą w swoje prawo do rządzenia, a Rojavą, która swobodnie tworzy bardziej progresywną republikę. Uchodźcy wyjeżdżają i roją Europę w poszukiwaniu bezpieczniejszych ziem do życia. Czy Syria zakończy wojnę i przywróci ich szybko przelotną populację, czy też ma ona zawieść i stać się próżni dla innych potęg?"
  SIG_FLAVOR_TEXT:0 "$SYR_FLAVOR_TEXT$"
  ROJ_FLAVOR_TEXT:0 "$SYR_FLAVOR_TEXT$"
  IRA_FLAVOR_TEXT:0 "Iran jest u progu własnej rewolucji islamskiej, Kraj ten siedzi z względną stabilnością tradycyjnego islamu i nie został dotknięty przez wiosnę arabską. Jednak skutki arabskiej wiosny nie zostały niezauważone przez młodszą populację, a ludność pragnie położyć kres swoim ekstremistycznym tradycyjnym sposobom. Czy Iran może utrzymać swoje tradycyjne wartości? Czy może zostaną obaleni przez bardziej wielokulturową populację?"
  
  # East Asia
  PRC_FLAVOR_TEXT:0 "Chińska Republika Ludowa jest światowym hegemonem ekonomicznym i finansuje mniej szczęśliwych narodów. Jednakże programy odłowu zadłużenia są odwrotne, a poleganie na chińskich towarów jest osłabiane przez ich sąsiadów i automatyzacji. Czy Chiny mogą przywrócić swoją dominację gospodarczą. Czy są przeznaczone do rozpadu z powodu wewnętrznych napięć?"
  NRK_FLAVOR_TEXT:0 "Korea Północna pozostaje ostatnim bastionem maoistycznej dyktatury na planecie. Różne umysłowo-gry i pranie mózgu narodu pozostaje niezwykle skuteczne pomimo tego, jak surowy i zabójczy ich reżim jest. Czy 80-letni reżim wytrzyma kolejne 80 lat? czy ma zjednoczyć się z sąsiadem na południu i odbudować stamtąd?"
  JPN_FLAVOR_TEXT:0 "Japonia pozostaje krajem pozbawionym broni od końca II wojny światowej, jednak nie zatrzymało to ich skrajnej kontroli gospodarczej. Japońskie samochody i japońskie elektroniki są znane na całym świecie i szanowane jako najlepsze z najlepszych. Ale nie bez poświęcenia... Kraj ten ma starzejącą się populację i znajduje się pomiędzy wieloma siłami regionalnymi. Co sprawi, że Japonia pozostanie niezależna?"
  
  # Oceania
  AUZ_FLAVOR_TEXT:0 "Australia, kraj możliwości i "Dream". Podczas gdy pozycja amerykańskich falterów, Australii, pomimo jej niedociągnięć i ciepłego otoczenia, kontynent rozwijający się w kraju, szanował nazwę "Kraina Okazji". Jednak wewnętrzne podziały polityczne i klimat ocieplenia starają się zniszczyć szansę Australii na bycie bastionem dobrobytu. Czy Australia może z powodzeniem przemierzać nowoczesny świat?"
  
  # Balkans
  SRB_FLAVOR_TEXT:0 "Serbia znajduje się w stanie zaporowym i jest ostatnią pozostałością nieudanego eksperymentu jugosłowiańskiego. Po stracie Czarnogóry i Kosowa w ciągu ostatnich kilku lat naród pragnie zwycięstwa. Czy Serbia odzyska utraconą chwałę Jugosławii?"
  
  # Europe
  ENG_FLAVOR_TEXT:0 "Anglia po dwudziestym stuleciu wymierzała siłę jako wielką potęgę, jakkolwiek liczne recesje, szerząca się korupcja polityczna i zmniejszająca się legitymacja podważały akt unii. Czy Anglia może utrzymać kontrolę nad swoimi rządami? Czy też opuszczenie rynku europejskiego było ostatnią kroplą?"
  SCO_FLAVOR_TEXT:0 "Szkocja pozostała stosunkowo nienaruszona w czasie recesji na początku XXI wieku, a od czasu przyznania decentralizacji nadal kwitnie. Korupcja Largescale i niepowodzenie reprezentacji w ramach unii postawiły pod znakiem zapytania jej miejsce. Czy będzie dobrze, gdy odzyskamy niepodległość? Czy związek będzie drogą przyszłości?"
  NIR_FLAVOR_TEXT:0 "Ostatnie stoisko brytyjskiego imperializmu w Irlandii, w Irlandii Północnej, to beczka prochu czekająca na zapalenie. Kłopoty mogą się skończyć, ale kwestia jego suwerenności nadal przenika, gdy młode pokolenie pragnie zjednoczyć się z ich południowym rodzeństwem... Brytyjczycy utrzymają Irlandię, czy pójdzie drogą monarchów?"
  IRE_FLAVOR_TEXT:0 "Irlandia przekształciła się z kraju pod brytyjskim butem cesarskim, w lśniącą latarnię anglosfery, wysiłki na rzecz ponownego rozpalenia języka i oddalenia się od języka Wielkiej Brytanii okazały się sukcesem, a wysiłki między sobą i jej sąsiadem na północy doprowadziły do pragnienia jedności. Co będzie następne dla Emerald Isles?"
  UKR_FLAVOR_TEXT:0 "Wysiłki na rzecz Westernizacji na Ukrainie zaszły daleko, a życie wielu Ukraińców szybko się poprawia, jednak rosyjska inwazja na Krym 8 lat wcześniej odebrała ważny region. Separatyści na wschodzie również dali Rosji otwór w sercu. Czy Ukraina może sprowadzić separatystów z powrotem pod skład, lub są Ukrainą kolejnym celem w Rosję coraz większe ambicje"
  CYP_FLAVOR_TEXT:0 "Cypr jest wyspą podzieloną przez grupy etniczne, Grecy na południu, Turcy na północy. Jednak kształtuje się coraz większa tożsamość cypryjska i nie potrwa to długo, zanim pojawią się wezwania do jednoczenia narodu raz na zawsze. Czy Cypr będzie w stanie skutecznie zjednoczyć, czy też mają być zawsze rozdzielone?"
  BYL_FLAVOR_TEXT:0 "Białoruś jest na początku rewolucji politycznej, jej obywatele są aktywnie przeciwko rządowi i prawdziwa głowa państwa przegrała wybory w sfałszowanym głosowaniu. Łukaszenko podgrzewa się do ich rosyjskiego sąsiada w celu ochrony jego kontroli. Czy Łukaszenko odniesie sukces, czy Białorusini zakończą jego nielegalny rząd?"
  SPA_FLAVOR_TEXT:0 "Hiszpania przeżywa przyjemny boom po wypędzeniu ruchu falangistycznego, jest krajem szybko modernizującym się i podejmuje wysiłki na rzecz większej przyszłości swoich obywateli. Jednak nie wszyscy zgadzają się ze swoim kierunkiem, ponieważ ruch niepodległości w Katalonii zyskuje parę. Czy Hiszpania będzie prosperować z Katalonią czy bez niej?"
  XSP_FLAVOR_TEXT:0 "Hiszpania przeżywa przyjemny boom po wypędzeniu ruchu falangistycznego, jest krajem szybko modernizującym się i podejmuje wysiłki na rzecz większej przyszłości swoich obywateli. Jednak nie wszyscy zgadzają się ze swoim kierunkiem, ponieważ ruch niepodległości w Katalonii zyskuje parę. Czy Hiszpania będzie prosperować z Katalonią czy bez niej?"
  NRW_FLAVOR_TEXT:0 "Norwegia pozostaje jednym z nielicznych krajów wkraczających w XXI wiek silniejszym narodem niż wcześniej, Silny system bezpieczeństwa społecznego i potężne zasoby, które może zmusić do wprowadzenia na rynek uczynić z niego wspaniałe miejsce marzeń. Jednak w miarę jak świat odchodzi od ropy, czy Norwegia może z powodzeniem utrzymać swoją sprawność, czy też zmniejszenie ropy będzie jej upadkiem?"
  RSF_FLAVOR_TEXT:0 "Od upadku Związku Radzieckiego, Rosja, państwo, które jest następcą, nie udało się jednak utrzymać tej samej władzy ekonomicznej i umiejętności. Większość kampanii od czasu upadku unii miała na celu przywrócenie dominacji gospodarczej. W Gruzji w 2008 r. i na Ukrainie w 2014 r. Jednak oligarchowie mówią o innej kampanii na Ukrainie, aby zabrać ziemie na wschód od Dnieprza i separatystycznych regionów wschodu. Czy to ich ścieżka w XXI wieku, czy oni zawiedą?"
  EUR_FLAVOR_TEXT:0 "Unia Europejska jest dzieckiem-mózgiem odbudowy powojennej po zniszczeniu spowodowanym przez drugą wojnę światową. Od tego czasu ewoluował, aby włączyć większość kontynentu, bar niektórych krajów, takich jak Norwegia i Szwajcaria, lub Bałkanów Zachodnich i byłych państw jugoslav. Unia wzmocniła się dopiero od czasu nietypowego wyboru Wielkiej Brytanii, aby się z niej wycofać, a większość rozmów o jej odejściu nie była już traktowana poważnie w większości krajów, Unia zostaje wzmocniona tylko stąd w miarę wzrostu rozmów o federacji. Czy Unia Europejska zmieni się w Federację Europejską? Czy też Unia Europejska zostanie wymieniona tylko w książkach historycznych?"
  TRK_FLAVOR_TEXT:0 "Türkiye jest główną barierą w zdolnych do żeglugi ambicjach Rosji i posiada strategiczny haczyk nad wieloma sąsiadami. Jest aktywnie zaangażowany w konflikty na południu Syrii, wspierając tymczasowy rząd Syrii i prowadząc aktywną milicję w Afryce i na Bliskim Wschodzie. Stanowisko Türkiye w regionie anatolijskim daje mu wielką kontrolę nad otaczającymi go regionami i wzmacnia ambicje Osmanów przed nim. Czy Türkiye utrzyma swoje ambicje? A może jest to przeznaczone do porażki jak Ottomanie wcześniej?"
  
  # North America
  USS_FLAVOR_TEXT:0 "Stany Zjednoczone miały zamożny XX wiek dzięki powojennemu wzrostowi gospodarczemu i do końca stulecia katapultowała się jako jedyna supermoc. Jednak, szerzej korupcja i podstępne taktyki przez korporacje służą do rozerwania tkanki w unii. Ponieważ Stany Zjednoczone pozostają w tyle zarówno pod względem społecznym, jak i gospodarczym. Co czeka Unię w przyszłości i czy będą w stanie odzyskać swoją dawną chwałę?"
  MEX_FLAVOR_TEXT:0 "Kartele narkotykowe i amerykański imperializm to cechy charakterystyczne XXI wieku Meksyku. Jakkolwiek wiele wysiłku włożono w rozwiązanie karteli bez walki USA na swojej ziemi. Co Meksyk ma w planach na następne stulecie, i czy mogą one z powodzeniem uciec przed szponami amerykańskiego imperializmu"
  CAN_FLAVOR_TEXT:0 "Kanada weszła w XXI wiek jako stabilny naród pozbawiony ogromnych problemów. Jednak pierwsze Narody domagają się ustępstw w związku z ich okropnym traktowaniem od czasu powstania królestwa kanadyjskiego. Czy Kanada się zgodzi?"
  
  # Central Asia
  AFH_FLAVOR_TEXT:0 "Graveyard of Empires, Afganistan, skutecznie stawiał opór wysiłkom amerykańskiego imperializmu i gwarantował jego suwerenność jako władzy regionalnej. Jednak konflikty między różnymi grupami etnicznymi i przeciwnikami wiary zagrażają tradycyjnemu sposobowi życia. Czy Afganistan może skutecznie przepchnąć swoje tradycyjne sposoby?"
  AZB_FLAVOR_TEXT:0 "Azerbejdżan jest zamożnym narodem kaukaskim, niedawne odkrycia rezerw ropy naftowej i gazu uczyniły go ważnym sojusznikiem dla Europy, jednak konflikty Artsakh, a kolejne wojny graniczne z ich sąsiadem Armenią uniemożliwiały im dotarcie do najwspanialszego z nich. Czy Azerbejdżan może pokojowo rozwiązać ten kryzys, czy może przekształcić się w wojnę?"
  KZK_FLAVOR_TEXT:0 "Kazachstan jest pomiędzy różnymi liderami i rządami i spadł do łagodnej anarchii. Poprzedni lider opuścił ogromną próżni mocy i pojawili się nowi władcy, aby spróbować i kierować Kazachstanem w bardzo dobrym kierunku. Czy Kazachstan może przetrwać wewnętrzną walkę o władzę?"
  UZB_FLAVOR_TEXT:0 "Uzbekistan walczył o uwolnienie się od dyktatury od czasu jej oddzielenia od ZSRR w latach 90-tych, jednak z powodzeniem rozpoczął liberalizację i nadal poprawia swoją sytuację ze swoimi sąsiadami. Mimo, że nadal staje się szczęśliwsza, nie można tego powiedzieć o niektórych sąsiadach, i będzie musiała ogłosić swoją suwerenność, aby przetrwać..."
  
  # Africa
  SAF_FLAVOR_TEXT:0 "Republika Południowej Afryki jest krajem, który walczy o znalezienie swojej drogi, konflikty, które określają jej historię doprowadziły do ich oburzenia w najlepszym razie między różnymi grupami etnicznymi, napięcie to tylko pogorszyło się z apartheidu. Jeśli RPA zamierza prosperować, ma trudną drogę koncesji, odbudowy i reform politycznych do zrobienia. Czy RPA może to zrobić? A może ma się rozpadać."
  SSD_FLAVOR_TEXT:0 "Sudan Południowy urodził się w wyniku konfliktu grup etnicznych wzdłuż Nilu, Jest to najnowszy kraj, który zostanie uznany przez ONZ, i ma długą drogę, zanim można go uznać za sukces. Napięcia etniczne zatrzymują kraj i trzeba będzie wykonać ostrożne manewry, aby zapewnić, że ten naród nie jest krótkotrwały. Jest do tego zdolny?"
  ETH_FLAVOR_TEXT:0 "Etiopia jest szybko modernizowanym narodem, któremu udało się relatywnie odłupać ręce kolonialne. Jednak naród nadal ma swoje problemy, ponieważ somalijskie, tyszare i oromia etniczne grupy grożą secesją i wciągnięcie Etiopii w kosztowną wojnę domową. Czy Etiopia może nadal się rozwijać pomimo napięcia?"
  EGY_FLAVOR_TEXT:0 "Egipt doświadcza boomu ludności wśród skrajnego niedoboru wody i upadającego tradycyjnego rządu. Egipcjanie wyjeżdżają na lepsze ziemie, a Nil powoli schnie. Czy Egipt może znaleźć sposób na przezwyciężenie kryzysu?"
  KYA_FLAVOR_TEXT:0 "Kenia jest strukturalnie solidnym afrykańskim narodem pośród udanej modernizacji wysiłków i szybkiego podnoszenia standardów życia. Kenia może być w większości pozbawiona poważnych problemów, ale jej sąsiedzi nie mają tyle szczęścia. W sferze politycznej prowadzone są rozmowy o utworzeniu wschodnioafrykańskiej supersiły. Czy Kenia z powodzeniem utworzy afrykańską supermoc? A może zamieszki w jej sąsiedztwie wpłyną na jej własne ziemie."
  MOR_FLAVOR_TEXT:0 "Maroko wyłoniło się w XXI wieku silne i dumne w następstwie jego sprytnego podporządkowania republiki sahrawi, a także jej znacznej poprawy jej nierówności gospodarczej. Obecnie dąży do partnerstwa europejskich władz w celu dalszej mobilności gospodarczej i stania się głównym graczem na kontynencie afrykańskim. Czy ambicje Maroka zostaną osiągnięte?"
  GHA_FLAVOR_TEXT:0 "Po brutalnej juncie wojskowej w latach 80-tych nazywanej "Cold Chop" Ghana sytuacja gospodarcza zaczęła się masowo rozpadać. Jednakże od powrotu partii politycznych i wyborów kraj ten powrócił do okresu stabilności i dobrobytu gospodarczego i przewiduje się, że będzie to nadal robić. Jednak kryzys klimatyczny i pustynnienie sahelu ponownie zagrażają niestabilności. Czy Ghana może skutecznie poruszać się po tych warunkach?"
  
  # South Asia
  VNM_FLAVOR_TEXT:0 "Wietnam jest krajem względnej stabilności od czasu jego dekolonizacji. Będąc jedną z niewielu gospodarek lewego rynku ma swoje zalety, a podczas gdy obywatele znoszą relatywny pokój, turyści obchodzą cały kraj. Dokładne wybory i inteligentna geopolityka mogą pozwolić jej odnieść sukces w XXI wieku. Czy jednak dokona tych wyborów?"
  IDA_FLAVOR_TEXT:0 "Indie nie tylko przetrwały, ale prosperowały od czasu rozwiązania brytyjskiego raju i końca 400 lat rządów kolonialnych. Jednak niektóre pokolonialne urazy z separacji Myanmar, Bangladesz i Pakistan były blizną na innych przyzwoitych rekordach. Rosnące napięcia między Indiami i Pakistanem nad ziemiami Jammu i Kaszmiru są jednak główną przyczyną do niepokoju, a rosnące napięcia z ChRL wobec Arunchal Pradesh wywołują konflikt zbrojny. Czy Indie mogą skutecznie oprzeć się 100 kolejnym latom imperializmu?"
  PAK_FLAVOR_TEXT:0 "Pakistan oddzielił się od Raja w latach 40-tych i 50-tych przez religijne napięcia między hindusem i muzułmanami. Chociaż wielu uważa, że konflikt ten ma swój koniec w oczach, to jednak między różnymi grupami etnicznymi konfliktu w Pakistanie kwitnie. Jeden zły ruch i może nastąpić upadek państwa, a z napięć zarówno z Indii i Afganistanu na ich wysokości, czy Pakistan może rozwiązać te problemy?"
  
  # South and Central America
  ARG_FLAVOR_TEXT:0 "Argentyna jest narodem, który po poważnym sukcesie XX wieku, uległ załamaniu z powodu interwencji USA i nieudanego konfliktu nad Las Malvinas. Spory między rodzimymi Mapuche, argentyńskie państwa i rząd w Buenos Aires zablokowały wiele zmian. Czy Argentyna może wycofać szeregi i przywrócić swój kraj do chwały?"
  
  # Nonsense Countries
  GLI_FLAVOR_TEXT:2 "Galicja jest małym i nieznanym krajem zamieszkałym przez entuzjastów katedry. Czy Galicia odzyska swoją dawną chwałę?"
  GENERIC_FLAVOR_TEXT:0 "The 21st Century is a time of relative peace & prosperity, however exploitation by the wealthy, waning standards of living and global communication have brought with it a resurgence in political activism and societal shifts like none ever seen. What will this new wave of political expression bring?
  REV_GENERIC_FLAVOR_TEXT:1 "Niezadowolony z kierunku, który tak zwany zorganizowany rząd podejmował, ci rewolucjoniści zdecydowali się podjąć broń, aby go obalić. Czy uda im się przejąć władzę, czy też zostaną zmiażdżeni jak wiele zapomnianych rewolucji z przeszłości?"
  DECENTRALIZED_FLAVOR_TEXT:0 "Ten kraj, otoczony bardziej zorganizowanymi mocami, stara się utrzymać swoją autonomię. Zobaczą świt nowego wieku, czy ich imię przetrwa tylko w książkach historii?"
