 OBJECTIVE_TYPE_RECOMMENDED_GAME_RULE_DESC:0 "Zaleca się następujące zasady gry:"
 OBJECTIVE_TYPE_RECOMMENDED_GAME_RULE_ITEM_TEXT:0 "- [GameRuleSetting.GetGameRule.GetName]: #variable [GameRuleSetting.GetName] #!"
 SELECTED_OBJECTIVE_RECOMMENDED_GAME_RULE_DESC:0 "Cel "$NAME$" sugeruje następujące ustawienie: #variable $RULE$ #!."

objective_the_west_name_USA:0 "The Sole Superpower"
objective_the_west_name_GBR:0 "Kłopoty"
objective_the_west_name_FRA:0 "Mitterrand 's France"

objective_the_west_desc_USA:0 "Stany Zjednoczone Ameryki znajdują się w wyjątkowej pozycji na przełomie XXI wieku. Jako pierwsza światowa supermoc i najsilniejsza narodowa ludzkość kiedykolwiek widziała, Republika stoi w obliczu szeregu trudnych problemów zewnętrznych i wewnętrznych. Pomimo upadku głównego rywala Ameryki, Związku Radzieckiego, zagrożenia terroryzmem, Chin i różnych innych zagrożeń dla wolnego świata, Ameryka jest w to wplątana. Czy Stany Zjednoczone pozostaną światową supermocarstwem? Czas pokaże."
objective_the_west_desc_GBR:0 "W 1992 roku Wielka Brytania borykała się z niepewnością gospodarczą i zawirowaniami politycznymi. Kraj ten niedawno wyszedł z głębokiej recesji, charakteryzującej się wysokim bezrobociem i spadkiem zaufania konsumentów. Aby dodać do brytyjskich nieszczęść, niestabilność w Irlandii Północnej, obecnie znany jako "Kłopoty" pozostaje gorącym tematem debaty. Jak Britannia przetrwa te burzliwe czasy?"
objective_the_west_desc_FRA:0 "Krajobraz polityczny Francji charakteryzował się rosnącym napięciem związanym z integracją europejską i krajowymi wyzwaniami gospodarczymi. Prezydent François Mitterrand, socjalista w drugiej kadencji, stanął w obliczu spadku popularności, ponieważ kraj borykał się z wysokim bezrobociem i spowolnionym wzrostem gospodarczym. Jego rząd, pod przewodnictwem premiera Pierre 'a Bérégovoya, zmagał się z niezadowoleniem społeczeństwa ze środków oszczędnościowych mających na celu stabilizację gospodarki. Z politycznego punktu widzenia Francja była głęboko podzielona na traktat z Maastricht, który miał na celu wzmocnienie integracji europejskiej i utorowanie drogi dla euro. Czy UE ma to, co trzeba, by przetrwać XXI wiek?"

objective_the_east_name_RUS:0 "Upadek Związku Radzieckiego"
objective_the_east_name_PRC:0 "Wielka Republika Ludowa"
objective_the_east_name_IRQ:0 "Irak Saddama Husseina"

objective_the_east_desc_RUS:0 "Rosja przechodzi dramatyczną transformację polityczną po rozwiązaniu Związku Radzieckiego w grudniu 1991 roku. Borys Yeltsin, pierwszy prezydent Federacji Rosyjskiej, stanął w obliczu ogromnego wyzwania, jakim jest przewodzenie rozwijającej się demokracji, a jednocześnie przechodzenie od scentralizowanego systemu komunistycznego do gospodarki rynkowej. Domestycznie, rząd Yeltsin zmagał się z niestabilnością polityczną, rosnącą inflacją i powszechnymi niepokojami społecznymi jako reformami gospodarczymi, zwanymi "terapią szokową", doprowadziły do trudności dla milionów. Dyplomatycznie Rosja starała się ponownie zdefiniować swoją rolę na arenie światowej, tworząc nowe relacje z zachodnimi mocarstwami, próbując jednocześnie utrzymać wpływ na byłych republik radzieckich."
objective_the_east_desc_PRC:0 "Chiny ostrożnie wychodzą z międzynarodowej izolacji i sankcji ze strony krajów zachodnich. Z politycznego punktu widzenia kraj ten pozostawał pod kontrolą Chińskiej Partii Komunistycznej (CCP), a Deng Xiaoping utrzymywał znaczący wpływ, mimo że oficjalnie wycofał się ze stanowiska kierowniczego. Jego słynna "Southern Tour" na początku 1992 r. ożywiła zaangażowanie Chin w reformę gospodarczą i otwarcie się, sygnalizując ponowny nacisk na politykę zorientowaną na rynek i większą integrację z globalną gospodarką"
objective_the_east_desc_IRQ:0 "Reeling from a devastating loss in the Gulf War last year, and facing intense international isolation. Saddam Hussein remained firmly in power, maintaining an iron grip on the country through brutal repression of internal dissent, particularly against the Shi'a in the south and the Kurds in the north. Iraq truly has several paths going into the 2000s.

objective_rising_powers_name_IDA:0 "Indian Century"
objective_rising_powers_name_BRZ:0 "Brazylia 's Rise to Dominance"
objective_rising_powers_name_VNM:0 "Powstanie Wietnamu"

objective_rising_powers_desc_IDA:0 "Indie prowadzą okres znaczących zmian politycznych i gospodarczych. Krajowi przewodził premier P.V. Narasimha Rao, który doszedł do władzy w 1991 roku i zainicjował serię transformacyjnych reform gospodarczych mających na celu liberalizację gospodarki i jej ściślejszą integrację z rynkiem światowym."
objective_rising_powers_desc_BRZ:0 "W 1992 roku Brazylia była w trakcie politycznej transformacji po zakończeniu rządów wojskowych w 1985 roku. Rządził nim prezydent Fernando Collor de Mello, który objął urząd w 1990 roku jako pierwszy prezydent Brazylii od ponad 20 lat. Rząd Collora zaczął od fali reform gospodarczych mających na celu stabilizację gospodarki, ale jego administracja wkrótce stanęła w obliczu rosnącego rozczarowania ze względu na rosnącą inflację i zarzuty korupcji. W 1992 Collor został wplątany w wielki skandal korupcyjny, który doprowadził do masowych protestów i wzywa do jego impeachmentu. Dyplomatycznie Brazylia skupiała się na poprawie swojego wizerunku międzynarodowego i zwiększaniu wpływów w Ameryce Łacińskiej. Poszukiwała również bliższych powiązań z krajami Zachodu, podkreślając jednocześnie swoją rolę w kwestiach globalnych, szczególnie w kwestiach środowiskowych związanych z lasami tropikalnymi Amazonii. Jednakże niestabilność polityczna i trudności gospodarcze nadal dominowały w agendzie krajowej."
objective_rising_powers_desc_VNM:0 "Po latach izolacji po zakończeniu wojny wietnamskiej i ostrych skutkach sankcji gospodarczych Wietnam stopniowo reintegracji ze społecznością międzynarodową. W 1992 r. Wietnam znormalizował stosunki ze Stanami Zjednoczonymi i przyłączył się do Stowarzyszenia Narodów Azji Południowo-Wschodniej (ASEAN), sygnalizując przejście na ściślejszą współpracę regionalną i zainteresowanie poprawą stosunków z Zachodem. Jaką drogę wybierze Wietnam? To zależy od ciebie."
