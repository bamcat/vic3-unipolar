##new smd

 concept_weapon_of_mass_destruction:0 "Arme de destruction massive"
 concept_weapon_of_mass_destruction_desc:0 "Un $concept_weapon_of_mass_destruction$ est un instrument puissant utilisé par $concept_armies$ pour tuer de vastes nageurs de personnes en peu de temps"
 concept_nuclear_weapon:0 "Armes nucléaires"
 concept_nuclear_weapon_desc:0 "$concept_nuclear_weapon$ sont des dispositifs explosifs et $concept_weapon_of_mass_destruction$ qui tirent leur force destructrice des réactions nucléaires, soit de la fission nucléaire (fission ou bombe atomique), soit d'une combinaison de réactions de fission et de fusion nucléaire"
 concept_missile:0 "Missiles"
 concept_missile_desc:0 "$concept_missile$ désigne toute arme accessible par le panneau de guerre stratégique, y compris $concept_weapon_of_mass_destruction$."
