 CONV_DEPLOY_25_TOOLTIP: "Tirez 25% de votre stock de missiles contre les États ciblés."
 CONV_DEPLOY_50_TOOLTIP: "Tirez 50 % de votre stock de missiles contre des États ciblés."
 CONV_DEPLOY_75_TOOLTIP: "Tirez 75 % de votre stock de missiles contre des États ciblés."
 CONV_DEPLOY_100_TOOLTIP: "Tirez tout votre stock de missiles contre les États ciblés."
 
 CONV_BUILDING_CHANCE_TOOLTIP: "Chaque missile tiré a une chance de 3 % de détruire l'un des bâtiments suivants dans son état ciblé, s'il est présent :\n\n• Aéroport\n• casernes\n• base navale\n• centrale nucléaire\n• nucléaire Silo\n• administration gouvernementale\n• chemin de fer\n\n Tous les types de bâtiments sont roulés indépendamment. Une seule salve antimissile peut détruire plusieurs bâtiments dans le même état si elle est assez grande."
 
 nuclear_events.12.t: "Coup de missile sur [ROOT.GetName]"
 nuclear_events.12.d: "[SCOPE.sCountry('missile_attacker').GetName] a lancé une frappe conventionnelle contre le territoire [ROOT.GetAdjective]. Des rapports font état d'impacts dans les états [ROOT.GetAdjective] — les dommages causés à l'infrastructure sont évalués.\n\n Les missiles n'étaient pas nucléaires, mais le message est clair. [SCOPE.sCountry('missile_attacker').GetName] est prêt à utiliser des armes à longue portée contre nous."
 nuclear_events.12.f: "Les cratères sont déjà là. La question est de savoir ce que nous faisons ensuite."
 nuclear_events.12.a: "Évaluer les dommages et réagir en conséquence"

 missile_strike_victim_modifier: "Grève classique des missiles"
 missile_strike_victim_modifier_desc: "Notre territoire a été visé par une frappe de missiles conventionnelle. Les dommages causés aux infrastructures et l'anxiété du public sont élevés."

 # ── EVENT 13: RETALIATION CHOICE ───────────

 nuclear_events.13.t: "Rétorsion nucléaire — Décision requise"
 nuclear_events.13.d: "[SCOPE.sCountry('nuclear_attacker').GetName] a lancé des armes nucléaires contre [ROOT.GetName]. Nos ogives sont armées. Les codes de lancement sont prêts.\n\nUne grève de représailles contre le territoire [SCOPE.sCountry('nuclear_attacker').GetAdjective] consommerait 25% de notre arsenal et frapperait tous les états [SCOPE.sCountry('nuclear_attacker').GetAdjective]. La grève ne porterait aucune infamie — le monde comprendra.\n\n L'alternative est d'absorber l'attaque. Il n'y a pas de déshonneur dans la survie."
 nuclear_events.13.f: "L'ordre ne doit être donné qu'une seule fois."
 nuclear_events.13.a: "Rétorsion — lancement de 25% de l'arsenal contre [SCOPE.sCountry('nuclear_attacker').GetName]"
 nuclear_events.13.b: "Reculez — absorbez la grève, préservez l'arsenal"

 nuclear_first_strike_response: "Rétorsion nucléaire (réponse à la première grève)"
 nuclear_first_strike_response_desc: "[ROOT.GetName] a lancé une contre-attaque nucléaire en réponse à une attaque nucléaire non provoquée sur son territoire. La communauté internationale reconnaît le droit à des représailles - le gain d'infamie est considérablement réduit."

 nuclear_absorbed_first_strike: "Grève nucléaire absorbée"
 nuclear_absorbed_first_strike_desc: "[ROOT.GetName] a subi une attaque nucléaire sans représailles. Cette restriction a été observée au niveau international. La position et le prestige diplomatiques sont considérablement renforcés."

 # ── EVENT 14: RETALIATION NOTIFICATION ─────

 nuclear_events.14.t: "Rétorsion nucléaire entrant"
 nuclear_events.14.d: "On a répondu à notre attaque nucléaire. [ROOT.GetName] a lancé une grève de représailles — les ogives sont confirmées à l'arrivée.\n\nNous avons lancé l'échange. Les conséquences sont les nôtres."
 nuclear_events.14.f: "Chaque grève invite la prochaine."
 nuclear_events.14.a: "Brace pour impact"
