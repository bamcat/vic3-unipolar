# SMD units

combat_unit_type_irregular_infantry:0 "Bataillon irrégulier"
combat_unit_type_foot_infantry:0 "Bataillon des pieds"
combat_unit_type_foot_infantry:0 "L'infanterie des pieds est idéale pour la défense."
combat_unit_type_light_infantry:0 "Bataillon léger"
combat_unit_type_light_infantry:0 "L'infanterie légère est bien arrondie"
combat_unit_type_mechanized_infantry:0 "bataillon mécanisé"
combat_unit_type_mechanized_infantry:0 "L'infanterie mécanisée est idéale pour attaquer."
combat_unit_type_armored_infantry:0 "Bataillon-citerne"
