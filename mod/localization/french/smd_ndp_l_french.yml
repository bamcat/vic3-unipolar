 ndp_modifier_service_education: "Éducation et administration Investissement"
 ndp_modifier_service_education_desc: "Les écoles, les universités et les institutions gouvernementales sont toutes élargies."

 ndp_modifier_service_foreign_talent: "Politique des talents étrangers"
 ndp_modifier_service_foreign_talent_desc: "Les portes ouvertes aux travailleurs étrangers qualifiés accélèrent la croissance du secteur des services."

 ndp_modifier_service_domestic_talent: "Investissement dans l'éducation intérieure"
 ndp_modifier_service_domestic_talent_desc: "L'investissement dans l'éducation nationale consiste à créer un capital humain à long terme."

 ndp_modifier_service_liberalize: "Libéralisation du marché"
 ndp_modifier_service_liberalize_desc: "La réduction de la réglementation améliore l'efficacité des investissements et l'adoption de lois."

 ndp_modifier_service_institutions: "Renforcement institutionnel"
 ndp_modifier_service_institutions_desc: "L'investissement dans l'état de droit et la capacité de l'État améliore la gouvernance et la légitimité."

 ndp_modifier_abandoned: "Programme de développement abandonné"
 ndp_modifier_abandoned_desc: "Le programme national de développement a été abandonné avant son achèvement. La confiance dans la planification gouvernementale a souffert."

 ndp_foreign_investment_secured: "Investissement étranger garanti"
 ndp_foreign_investment_secured_desc: "Un accord d'investissement étranger a ouvert le pays à des capitaux extérieurs. La construction s'accélère et le bassin d'investissements augmente."

 ndp_foreign_investment_rejected: "Investissement étranger rejeté"
 ndp_foreign_investment_rejected_desc: "Le pays a fermé ses portes à des capitaux étrangers. L'indépendance économique est préservée, mais la croissance est plus lente."
