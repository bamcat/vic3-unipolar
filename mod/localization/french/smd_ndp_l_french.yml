l_french:

 je_national_development: "Voie nationale de développement"
 je_national_development_reason: "Chaque nation doit choisir où concentrer ses énergies. Un plan national de développement concentre les ressources, les politiques et la volonté politique sur une vision stratégique unique pendant dix ans. Choisir judicieusement — le choix ne peut être inversé avant la fin du programme."

 je_foreign_investment: "Investissement étranger"
 je_foreign_investment_reason: "Attirer le capital de grandes puissances peut accélérer le développement au-delà de ce que les ressources nationales permettent. Un traité sur l'investissement étranger ouvrirait le pays à des entreprises extérieures, avec toutes les possibilités et toutes les dépendances qui en découlent."
 has_foreign_investment_or_trade_agreement_with_west_tt:0 "Signature d'un accord d'investissement et de commerce avec les États-Unis, le Royaume-Uni ou la France"
 
 ndp_status_industrial_tt: "L'expansion industrielle est en cours. Le pays oriente ses ressources vers la construction de son industrie manufacturière et lourde."
 ndp_status_military_tt: "L'expansion militaire est en cours. Le pays investit dans ses forces armées, sa doctrine et ses industries de défense."
 ndp_status_resource_tt: "Le développement de l'économie des ressources est en cours. Le pays se concentre sur l'agriculture et l'extraction des matières premières."
 ndp_status_service_tt: "Le développement de l'économie des services est en cours. Le pays renforce son secteur financier, son éducation et ses capacités d'État."
 ndp_status_none_tt: "Aucune voie de développement n'est actuellement active. Choisir la voie à suivre pour lancer un programme national de développement décennal."

 fi_status_seeking_tt: "Le pays cherche un accord d'investissement étranger avec une grande puissance. Signez un traité d'investissement pour compléter cette entrée de journal."
 fi_status_secured_tt: "Un accord d'investissement étranger a été conclu. Les capitaux étrangers y circulent."

 ndp_button_industrial_name: "Expansion industrielle"
 ndp_button_industrial_desc: "Mettre l'accent sur les ressources nationales pour renforcer la base de production. Améliore l'industrie lourde, la fabrication légère et la construction. Sous-choix à l'année 2 : industrie lourde vs fabrication légère."

 ndp_button_military_name: "Expansion militaire"
 ndp_button_military_desc: "Privilégier les forces armées. Améliore l'armée et la marine, la recherche militaire et la production d'armes. Sous-choix à l'année 2 : doctrine foncière par rapport à l'accumulation navale."

 ndp_button_resource_name: "Économie des ressources"
 ndp_button_resource_desc: "Construire l'économie autour de la terre. Stimule les industries agricoles et extractives. Sous-choix à l'année 2 : agriculture contre extraction de matières premières."

 ndp_button_service_name: "Économie des services"
 ndp_button_service_desc: "Développer les capacités de l'État, l'éducation et le secteur financier. Améliore la bureaucratie, la vitesse de la recherche et l'investissement. Sous-choix à l'année 2 : secteur financier vs éducation et bureaucratie."

 ndp_button_abandon_name: "Abandonner la voie"
 ndp_button_abandon_desc: "Abandon du programme de développement actuel. Tous les modificateurs actifs seront supprimés, et une pénalité de prestige et de légitimité s'appliquera pendant deux ans. Vous pouvez ensuite sélectionner un nouveau chemin."

 fi_button_reject_name: "Rejet des investissements étrangers"
 fi_button_reject_desc: "Fermez la porte à la capitale étrangère. Cela mettra fin à l'entrée de la revue et imposera une pénalité pour investissement à long terme, mais préservera l'indépendance économique et renforcera l'autorité."

