 ndp_modifier_industrial_private_investment: "Incitations à l'investissement privé"
 ndp_modifier_industrial_private_investment_desc: "Les incitations au capital privé accroissent l'efficacité de la réserve d'investissement."

 ndp_modifier_industrial_labour_push: "Politique intensive du travail"
 ndp_modifier_industrial_labour_push_desc: "Les travailleurs sont poussés dur — la productivité est en hausse, mais le mécontentement l'est aussi."

 ndp_modifier_industrial_labour_welfare: "Investissement dans la protection sociale des travailleurs"
 ndp_modifier_industrial_labour_welfare_desc: "L'investissement dans les conditions de travail contribue à la stabilité et à la croissance régulière de la production."

 ndp_modifier_military_army: "Doctrine terrestre"
 ndp_modifier_military_army_desc: "Le programme militaire est axé sur le pouvoir terrestre, les armées de masse et la domination continentale."

 ndp_modifier_military_navy: "Doctrine navale"
 ndp_modifier_military_navy_desc: "Le programme militaire est axé sur la puissance navale et la projection de puissance."

 ndp_modifier_military_domestic_arms: "Industrie des armes domestiques"
 ndp_modifier_military_domestic_arms_desc: "L'investissement dans la production d'armes domestiques rapporte des dividendes."

 ndp_modifier_military_foreign_arms: "Achats étrangers"
 ndp_modifier_military_foreign_arms_desc: "L'équipement étranger renforce la capacité militaire."

 ndp_modifier_military_foreign_arms_cost: "Coûts des marchés étrangers"
 ndp_modifier_military_foreign_arms_cost_desc: "L'achat d'armes étrangères coûte cher."

 ndp_modifier_military_nationalist_morale: "Campagne nationale morale"
 ndp_modifier_military_nationalist_morale_desc: "Les appels à l ' honneur national lèvent l ' esprit de combat des forces armées."

 ndp_modifier_military_professional_officers: "Corps d ' officiers professionnels"
 ndp_modifier_military_professional_officers_desc: "L'investissement dans la formation des officiers améliore le rendement tactique."

 ndp_modifier_resource_agriculture: "Objectif agricole"
 ndp_modifier_resource_agriculture_desc: "Les ressources nationales sont concentrées sur le développement agricole."

 ndp_modifier_resource_extraction: "Concentration de l'extraction"
 ndp_modifier_resource_extraction_desc: "Les ressources nationales sont concentrées sur l'exploitation minière et l'extraction des matières premières."

 ndp_modifier_state_agriculture: "Zone prioritaire agricole"
 ndp_modifier_state_agriculture_desc: "Cet État a été désigné zone prioritaire agricole."

 ndp_modifier_state_extraction: "Zone prioritaire d'extraction"
 ndp_modifier_state_extraction_desc: "Cet état a été désigné zone prioritaire d'extraction des matières premières."

 ndp_modifier_resource_land_expansion: "Programme d ' agrandissement des terres"
 ndp_modifier_resource_land_expansion_desc: "De nouvelles terres sont ouvertes à la colonisation et à la production."

 ndp_modifier_resource_intensification: "Intensification de la production"
 ndp_modifier_resource_intensification_desc: "Les exploitations agricoles et minières existantes sont poussées à une production plus élevée."

 ndp_modifier_resource_export_markets: "Prix à l'exportation"
 ndp_modifier_resource_export_markets_desc: "La poursuite active des marchés étrangers améliore l'efficacité des routes commerciales."

 ndp_modifier_resource_domestic_supply: "Priorité de l'offre intérieure"
