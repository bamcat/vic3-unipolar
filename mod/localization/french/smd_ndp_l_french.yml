 ndp_no_path_active_tt: "Aucune voie de développement n'est actuellement active"
 ndp_abandon_cost_tt: "Abandonner la voie appliquera une peine de légitimité et de prestige pendant 2 ans"

 national_development_progress_bar: "Développement"
 national_development_progress_bar_desc: "Développement"
