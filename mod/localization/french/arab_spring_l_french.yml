 # ==========================================
 # SPARK EVENTS
 # ==========================================

 2011_protests.1.t: "Un vendeur de rue se met en lumière"
 2011_protests.1.d: "Dans la ville provinciale de Sidi Bouzid, un jeune vendeur de rue du nom de Mohamed Bouazizi s'est mis en feu devant les bureaux du gouvernement local après que la police a confisqué son chariot et l'a humilié publiquement.\n\n L'acte de désespoir est devenu un bâton de foudre. En quelques heures, des images de sa manifestation ont été diffusées dans les médias sociaux. Les foules se sont rassemblées non seulement dans Sidi Bouzid, mais à travers [ROOT.GetCountry.GetName]. La fureur accumulée d'une génération — sur la corruption, le chômage et le poids écrasant de la domination autoritaire — a trouvé son symbole.\n\n Le régime de [SCOPE.GetRootScope.GetCountry.GetRuler.GetLastName] doit décider comment réagir. Quoi qu'il en soit, le monde regarde."
 2011_protests.1.f: "Le désespoir d'un homme est devenu celui d'une nation."
 2011_protests.1.a: "Craquez — dispersez les manifestations avant qu'elles ne se propagent"
 2011_protests.1.b: "Offrir des concessions — annoncer une enquête sur la conduite de la police"

 2011_protests.2.t: "Le tremblement tunisien"
 2011_protests.2.d: "Les troubles en Tunisie ont provoqué une vague de choc dans le monde arabe. Les chaînes satellite diffusent les scènes de Tunis 24 heures sur 24 — et les gens ordinaires dans [ROOT.GetCountry.GetName] regardent. La question que l'on chuchote dans les cafés et les médias sociaux est la même que celle que tous les régimes autoritaires de la région se posent maintenant : \n\n Ça pourrait arriver ici ?"
 2011_protests.2.f: "Chaque régime regarde. Chaque dissident prend des notes."
 2011_protests.2.a: "La Tunisie est différente — cela ne s'étendra pas à [ROOT.GetCountry.GetName]"
 2011_protests.2.b: "Prendre des précautions — renforcer la sécurité avant que cela n'échappe"

 # ==========================================
 # MISSING STRUCTURAL MODIFIERS
 # ==========================================

 modifier_arab_spring_transition_cabinet: "Gouvernement de transition"
 modifier_arab_spring_transition_cabinet_desc: "Un nouveau gouvernement se forme à la suite de la révolution. La légitimité est élevée dans ces premiers jours, mais il faudra la consolider avant que la contre-révolution ne trouve son fondement."

 modifier_arab_spring_kick_out_of_insurrection: "En bas des Barricades"
 modifier_arab_spring_kick_out_of_insurrection_desc: "La révolution a atteint ses objectifs immédiats. Ce groupe abandonne sa position insurrectionnelle et entre dans la vie politique formelle, animée par la bonne volonté du moment."

 modifier_arab_spring_regime_ig_defeated: "Défait par la Révolution"
 modifier_arab_spring_regime_ig_defeated_desc: "L'association de ce groupe avec l'ancien régime a coûté cher. Il a été chassé du gouvernement et sa force politique est diminuée. Il reste à voir s'il peut se reconstruire à partir des marges."

# ==========================================
 # ARAB SPRING INTERNATIONAL EVENTS
 # ==========================================

 # ── arab_spring_intl.1 ───────────────────

 arab_spring_intl.1.t: "Le monde arabe brûle"
 arab_spring_intl.1.d: "Des manifestations ont éclaté dans le monde arabe, en commençant par la Tunisie. Des décennies de régime autoritaire, de stagnation économique et de répression politique ont poussé des millions de personnes dans la rue."
 arab_spring_intl.1.f: "L'histoire regarde ceux qui regardent l'histoire."
 arab_spring_intl.1.a: "La démocratie et les droits de l'homme l'exigent."
 arab_spring_intl.1.b: "Les régimes en place — la stabilité et nos intérêts viennent en premier"
 arab_spring_intl.1.c: "Appel à la retenue de toutes les parties - préconiser une résolution pacifique"

 # ── arab_spring_intl.2 ───────────────────

 arab_spring_intl.2.t: "La question d'intervention"
 arab_spring_intl.2.d: "La situation dans [scope:civil_war_country_scope.GetName] s'est détériorée en guerre civile ouverte. Les forces de [scope:civil_war_country_scope.GetRuler.GetName] attaquent les populations civiles, et il y a des rapports crédibles de massacres. La communauté internationale demande une réponse.\n\n[ROOT.GetName] ont déjà exprimé leur soutien aux mouvements de protestation. La question est maintenant de savoir si ce soutien s'étend à l'action — et à quel coût."
 arab_spring_intl.2.f: "Les mots et les actes sont des monnaies différentes."
 arab_spring_intl.2.a: "Appliquer une zone d'exclusion aérienne - protéger les civils contre les frappes aériennes"
 arab_spring_intl.2.b: "Armer et soutenir les forces de l'opposition sur le terrain"
 arab_spring_intl.2.c: "Ce n'est pas notre guerre."

 # ── arab_spring_intl.3 ───────────────────

 arab_spring_intl.3.t: "Le printemps arabe : un reckoning"
 arab_spring_intl.3.d_success: "Le Printemps arabe a produit au moins une véritable transition démocratique. C'est une réalisation fragile, facilement inversée, mais elle est réelle. Pour [ROOT.GetName], qui a regardé ces événements se dérouler à distance, il y a une satisfaction tranquille de voir que l'arc de l'histoire peut, parfois, plier vers la justice. La question est maintenant de savoir comment soutenir ce qui a été gagné."
 arab_spring_intl.3.d_islamist: "Le printemps arabe a pris fin, et non pas comme l'avaient espéré ses architectes. Dans toute la région, les mouvements islamistes se sont révélés mieux organisés que les coalitions de protestation laïques qui ont déclenché les soulèvements. Pour [ROOT.GetName], le résultat est inconfortable : la démocratie qu'elle a défendue a produit des gouvernements dont les valeurs diffèrent fortement des siennes. La relation avec le nouvel ordre arabe nécessitera une navigation attentive."
 arab_spring_intl.3.d_failure: "Le Printemps arabe a été éteint. Les régimes qui semblaient trembler se sont stabilisés, leurs services de sécurité reconstitués, leurs opposants en exil ou en prison. Pour [ROOT.GetName], l'épisode rappelle que la clarté morale est plus facile que l'efficacité morale. Les griefs qui ont déclenché les soulèvements n'ont pas été résolus. Ils ont seulement été reportés."
 arab_spring_intl.3.f: "Le monde avance. La région n'oublie pas."
 arab_spring_intl.3.a: "Faites le point sur ce qui s'est passé"

 # ==========================================
 # INTERNATIONAL MODIFIER NAMES
 # ==========================================

 arab_spring_intl_pro_democracy_stance: "Stance pour la démocratie"
 arab_spring_intl_pro_democracy_stance_desc: "Ce pays s'est publiquement aligné sur les mouvements de protestation du Printemps arabe. Son prestige parmi les nations démocratiques s'est accru, mais les relations avec les régimes arabes actuels se sont refroidies."

 arab_spring_intl_stability_first_stance: "Stabilité d'abord"
 arab_spring_intl_stability_first_stance_desc: "Ce pays a choisi de soutenir les régimes arabes en place sur les mouvements de protestation. Les relations stratégiques dans la région sont plus fortes, mais au détriment de sa réputation internationale."

 arab_spring_intl_neutral_stance: "Une retenue prudente"
 arab_spring_intl_neutral_stance_desc: "Ce pays a appelé à une résolution pacifique sans soutien des deux parties. Elle a conservé sa souplesse diplomatique, mais a sacrifié son influence sur le résultat."

 arab_spring_intl_western_backing: "Soutien de l'Ouest"
 arab_spring_intl_western_backing_desc: "Ce mouvement a reçu l'appui public des gouvernements occidentaux. L'attention internationale s'ajoute à son élan et rend la répression plus coûteuse pour le régime."

 arab_spring_intl_regime_backing: "Appui au régime occidental"
 arab_spring_intl_regime_backing_desc: "Les gouvernements occidentaux ont jeté leur poids derrière ce gouvernement plutôt que sur les manifestants. La validation externe renforce l'autorité et la légitimité du régime."

 arab_spring_intl_no_fly_zone: "Application d ' une zone exempte de vol"
 arab_spring_intl_no_fly_zone_desc: "Des moyens militaires sont déployés pour faire respecter une zone d'exclusion aérienne dans la zone de conflit. L'intervention protège les civils, mais elle est coûteuse et attire l'attention de la communauté internationale."

 arab_spring_intl_arming_rebels: "Armée des forces d'opposition"
 arab_spring_intl_arming_rebels_desc: "Les armes et le matériel sont acheminés vers les forces de l'opposition dans le conflit. La politique est secrète, mais pas secrète, et les conséquences à long terme de l'obtention de ce soutien demeurent incertaines."

 arab_spring_intl_intervention_costs: "Coûts de l'intervention"
 arab_spring_intl_intervention_costs_desc: "L'intervention militaire à l'étranger met à rude épreuve les ressources et suscite un débat politique national. Les coûts du trésor et du capital politique sont réels."

 arab_spring_intl_non_interventionist: "Non interventionniste"
 arab_spring_intl_non_interventionist_desc: "Ce pays a choisi de ne pas intervenir dans la guerre civile arabe. La décision a réduit son exposition et préservé le capital politique national, bien que les critiques affirment qu'elle a abandonné ses valeurs déclarées."
