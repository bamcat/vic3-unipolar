l_french:

 # ==========================================
 # UNITED STATES
 # ==========================================

 amendment_medicaid: "Médicament"
 amendment_medicaid_desc: "Assurance maladie fédérale et publique pour les Américains à faible revenu, les personnes âgées et les handicapés. Medicaid comble l'écart laissé par les marchés privés — couvrant ceux qui ne peuvent pas payer de primes et ceux dont les conditions les rendent inassurables. Le programme est coûteux et politiquement contesté, mais ses effets de réduction de la mortalité sont mesurables et réels."

 amendment_affordable_care_act: "Loi sur les soins abordables"
 amendment_affordable_care_act_desc: "La loi sur les soins abordables, connue officieusement sous le nom d'Obamacare, impose à tous les citoyens de souscrire une assurance maladie, crée des marchés réglementés pour la couverture privée et étend l'admissibilité à Medicaid. Les assureurs ne peuvent refuser la couverture pour des conditions préexistantes. Le mandat individuel est profondément controversé. Les partisans affirment que c'est la seule façon de faire fonctionner les marchés de l'assurance. Les opposants l'appellent le gouvernement envahissant dans les décisions économiques privées."

 amendment_federal_assault_weapons_ban: "Interdiction fédérale des armes à feu"
 amendment_federal_assault_weapons_ban_desc: "Une interdiction fédérale de dix ans sur la fabrication d'armes semi-automatiques spécifiées et de magazines de grande capacité pour la vente civile. L'interdiction est contestée — son efficacité contestée par les opposants, sa nécessité défendue par les partisans. Elle expire après une décennie, sauf si elle est renouvelée. La coalition politique qui l'a adoptée est fragile, et le lobby des armes prépare déjà sa réponse."

 amendment_authorization_military_force: "Autorisation d'utiliser la force militaire"
 amendment_authorization_military_force_desc: "L'autorisation d'utiliser la force militaire confère à l'exécutif le pouvoir de recourir à la force militaire contre les responsables d'attaques terroristes contre [ROOT.GetCountry.GetName], et contre ceux qui les abritaient. La langue est délibérément large. Les juristes passeront des décennies à discuter de ses limites, ou à savoir s'il en existe. Dans la pratique, il réduit le coût diplomatique de l'action militaire unilatérale et élargit la portée de [ROOT.GetCountry.GetName] sur la scène internationale."

 amendment_patriot_act: "La loi PATRIOT"
 amendment_patriot_act_desc: "L'Union et le renforcement de l'Amérique en fournissant les outils nécessaires pour intercepter et interdire la loi sur le terrorisme, connue sous le nom de PATRIOT Act, élargit considérablement les autorités nationales de surveillance. L'application de la loi peut surveiller les communications, suivre les transactions financières et partager les renseignements entre les organismes ayant moins de contrôles judiciaires qu'auparavant. La turbulence et la pression révolutionnaire tombent. Les défenseurs des libertés civiles le décrivent comme l'érosion la plus importante de la vie privée constitutionnelle dans l'histoire de [ROOT.GetCountry.GetName]."

 amendment_crime_bill_1994: "Loi sur le contrôle de la criminalité et l ' application des lois"
 amendment_crime_bill_1994_desc: "Le projet de loi sur la criminalité de 1994 est la plus importante loi sur la criminalité dans l'histoire de [ROOT.GetCountry.GetName]. Il finance des dizaines de milliers de nouveaux policiers, élargit le système pénitentiaire fédéral, introduit des peines minimales obligatoires pour toute une série d'infractions et crée la loi sur la violence à l'égard des femmes en tant que cavalier. La turbine tombe. Les communautés les plus fortement sous police auront une vision différente de son héritage."

 # ==========================================
 # CHINA
 # ==========================================

 amendment_china_tax_reform_1994: "Réforme du système de partage des impôts"
 amendment_china_tax_reform_1994_desc: "La réforme fiscale de 1994 a remplacé le système fiscal fondé sur les entreprises, dans lequel les administrations locales ont négocié des accords de partage des recettes avec Beijing, par une taxe nationale sur la valeur ajoutée et une formule formelle de partage des recettes. La réforme a radicalement centralisé le pouvoir fiscal. Pékin a gagné un flux de revenus fiable et croissant. Les gouvernements locaux ont perdu leur discrétion mais ont gagné en clarté. C'est le fondement de l'architecture fiscale moderne de [ROOT.GetCountry.GetName]."

 amendment_one_child_policy: "Politique sur l'enfant unique"
 amendment_one_child_policy_desc: "L'État impose une limite d'un enfant par famille en combinant des incitations financières, des pressions sociales et, dans certains cas, des interventions coercitives. Le taux de natalité diminue fortement. Au cours des décennies suivantes, [ROOT.GetCountry.GetName] vieillira rapidement et la main-d'oeuvre se contractera. La politique est appliquée le plus strictement dans les zones urbaines et le plus inégalement dans les zones rurales. La communauté internationale et les critiques nationales s'opposent à ses méthodes."

 amendment_socialist_market_economy: "Économie de marché socialiste"
 amendment_socialist_market_economy_desc: "L'économie de marché socialiste est le cadre théorique dans lequel [ROOT.GetCountry.GetName] opère les mécanismes du marché alors que le Parti maintient la direction économique et politique ultime. L'entreprise privée est autorisée et encouragée dans les limites fixées par l'État. Les investissements étrangers sont accueillis de manière sélective. Les contradictions sont réelles et délibérées — le cadre est conçu pour exploiter l'efficacité du marché sans céder le contrôle des parties. Ça marche, à sa façon."

 # ==========================================
 # FRANCE
 # ==========================================

 amendment_35_hour_work_week: "Semaine de travail de 35 heures"
 amendment_35_hour_work_week_desc: "Les lois Aubry prévoient une semaine de travail légale de 35 heures pour la plupart des employés, ce qui réduit les heures normales de 39 heures. La politique est présentée comme un moyen de partager plus largement le travail dans l'ensemble de la population — moins d'heures par travailleur, plus de travailleurs employés. Les syndicats célèbrent. Les employeurs affirment qu'il augmente les coûts et réduit la flexibilité. Le débat sur la question de savoir s'il augmente réellement l'emploi ou simplement redistribue le travail existant ne sera pas résolu rapidement."

 amendment_pasqua_law: "Loi Pasqua"
 amendment_pasqua_law_desc: "La loi Pasqua resserre considérablement la réglementation en matière d'immigration - des exigences plus strictes en matière de naturalisation, des droits de regroupement familial réduits, des motifs d'expulsion élargis et de nouvelles restrictions au droit de rester pour les personnes entrées illégalement. Le ministre de l'Intérieur Charles Pasqua le considère comme une question d'ordre national et de cohérence culturelle. Les critiques affirment que c'est un renversement délibéré de la tradition d'asile et d'inclusion de [ROOT.GetCountry.GetName]. La loi est adoptée avec un soutien public important et des protestations importantes."

 amendment_medicaid_modifier: "Médicament"
 amendment_medicaid_modifier_desc: "L'assurance maladie fédérale couvre les citoyens à faible revenu. La mortalité est réduite, en particulier dans les couches les plus pauvres."

 amendment_affordable_care_act_modifier: "Obamacare"
 amendment_affordable_care_act_modifier_desc: "Couverture médicale privée obligatoire avec des subventions et des protections préexistantes. La mortalité diminue légèrement; les coûts augmentent pour les employeurs à revenu intermédiaire et l'État."

 amendment_federal_assault_weapons_ban_modifier: "Interdiction fédérale des armes à feu"
 amendment_federal_assault_weapons_ban_modifier_desc: "La fabrication et la vente civiles d'armes semi-automatiques spécifiées sont interdites. La radicalisation est légèrement réduite."

 amendment_authorization_military_force_modifier: "Autorisation d'utiliser la force militaire"
 amendment_authorization_military_force_modifier_desc: "Une large autorité exécutive pour utiliser la force militaire contre des acteurs non étatiques réduit le coût diplomatique de l'intervention et élargit les intérêts déclarés de [ROOT.GetCountry.GetName]."

 amendment_patriot_act_modifier: "La loi PATRIOT"
 amendment_patriot_act_modifier_desc: "Les autorités nationales de surveillance élargies suppriment les troubles et les activités révolutionnaires. La légitimité et la réputation diplomatique ont eu un impact modeste."

 amendment_crime_bill_1994_modifier: "Projet de loi sur la criminalité de 1994"
 amendment_crime_bill_1994_modifier_desc: "Les services de police élargis et les minimums obligatoires réduisent les troubles. La mortalité par application de la loi a légèrement augmenté. Le budget est sous pression."

 amendment_china_tax_reform_1994_modifier: "Réforme du système de partage des impôts"
 amendment_china_tax_reform_1994_modifier_desc: "Un système centralisé de taxe sur la valeur ajoutée améliore les recettes fiscales et réduit les déchets. L'autorité est légèrement améliorée."

 amendment_one_child_policy_modifier: "Politique sur l'enfant unique"
 amendment_one_child_policy_modifier_desc: "Les taux de natalité fixés par l ' État ont fortement diminué. La population de [ROOT.GetCountry.GetName] vieillira considérablement dans les décennies à venir."

 amendment_socialist_market_economy_modifier: "Économie de marché socialiste"
 amendment_socialist_market_economy_modifier_desc: "Les mécanismes du marché opérant sous la direction des parties stimulent la construction privée, améliorent le débit et accroissent les investissements industriels. Le soutien du mouvement communiste est modestement réduit."

 amendment_35_hour_work_week_modifier: "Semaine de travail de 35 heures"
 amendment_35_hour_work_week_modifier_desc: "Les limites légales du temps de travail ont considérablement amélioré les conditions de travail. Le débit est légèrement réduit. Les syndicats sont satisfaits; les employeurs ne le sont pas."

 amendment_pasqua_law_modifier: "Loi Pasqua"
 amendment_pasqua_law_modifier_desc: "Les exigences plus strictes en matière d'immigration ont accru les restrictions et réduit l'attraction migratoire. L'acceptation culturelle des populations non locales a diminué."
