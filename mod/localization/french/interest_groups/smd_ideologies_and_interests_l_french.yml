 # leaders
 
 ideology_marxist_leader: "Marxiste"
 ideology_marxist_leader_desc: "Des dirigeants socialistes révolutionnaires qui favorisent le gouvernement du conseil, la propriété publique, l'agriculture collectivisée et une rupture marquée avec le capitalisme libéral."
 ideology_state_socialist_leader: "Socialiste d'État"
 ideology_state_socialist_leader_desc: "Centraliser les dirigeants socialistes qui préfèrent la direction d'un parti ou d'un État technocratique, commander l'économie et les grands systèmes publics."
 ideology_left_wing_populist_leader: "Populiste de gauche"
 ideology_left_wing_populist_leader_desc: "Des leaders anti-élites de masse qui mélangent redistribution, protectionnisme, démocratie et forte hostilité à la domination oligarchique."
 ideology_democratic_socialist_leader: "Socialiste démocratique"
 ideology_democratic_socialist_leader_desc: "Les dirigeants de gauche démocratique qui favorisent les élections, le pouvoir ouvrier, la propriété sociale, le bien-être et les libertés civiles."
 ideology_green_leader: "Vert"
 ideology_green_leader_desc: "Les dirigeants de la démocratie environnementale se sont concentrés sur la régulation écologique, les biens publics, les libertés civiles et la réforme post-industrielle."
 ideology_state_capitalist_leader: "Capitaliste d'État"
 ideology_state_capitalist_leader_desc: "Les leaders du développement qui acceptent les marchés mais veulent un État fort, une industrie stratégique, des banques centralisées et des investissements guidés."
 ideology_market_socialist_leader: "Marché socialiste"
 ideology_market_socialist_leader_desc: "Des dirigeants socialistes décentralisés qui favorisent les coopératives, les syndicats, le bien-être et les mécanismes de marché sous contrôle démocratique."
 ideology_progressive_leader: "Progressive"
 ideology_progressive_leader_desc: "Les dirigeants réformistes se sont concentrés sur l'égalité des droits, l'expansion de la protection sociale, l'éducation, les libertés civiles et la réforme du marché."
 ideology_social_liberal_leader: "Libéraux sociaux"
 ideology_social_liberal_leader_desc: "Les dirigeants libéraux-démocrates qui soutiennent les marchés avec le bien-être, l'égalité de citoyenneté, l'éducation et le capitalisme réglementé."
 ideology_technocrat_leader: "Technocrate"
 ideology_technocrat_leader_desc: "Des leaders experts qui soutiennent la laïcité, la planification administrative, la capacité de l'État, les marchés réglementés et la gouvernance scientifique."
 ideology_liberal_leader: "Libéraux"
 ideology_liberal_leader_desc: "Les dirigeants libéraux majoritaires qui soutiennent les républiques constitutionnelles, les libertés civiles, le libre-échange, les marchés privés et l'égalité juridique."
 ideology_moderate_leader: "Modéré"
 ideology_moderate_leader_desc: "Les dirigeants d'établissements pragmatiques qui font rarement des réformes radicales et sont les plus courants dans les systèmes mixtes stables."
 ideology_neoliberal_leader: "Néolibéral"
 ideology_neoliberal_leader_desc: "Des dirigeants libéraux orientés vers le marché qui privilégient le libre-échange, le laissez-faire, l'offre privée, les restrictions fiscales et les institutions technocratiques."
 ideology_conservative_leader: "Conservateur"
 ideology_conservative_leader_desc: "Leaders de droite statut-quo qui favorisent l'ordre social, réformes limitées, économie de marché modérée, tradition, et nationalisme prudent."
 ideology_corporatist_leader: "Corporatiste"
 ideology_corporatist_leader_desc: "Les dirigeants de la coordination capitaliste qui privilégient le capitalisme interventionniste ou laisser-faire organisé par les institutions étatiques-entreprises-travailleurs."
 ideology_theocrat_leader: "Théocrate"
 ideology_theocrat_leader_desc: "Les chefs religieux qui veulent l'État, les écoles, les tribunaux et la citoyenneté ordonné autour de la religion officielle."
 ideology_right_wing_libertarian_leader: "L'aile droite libertaire"
 ideology_right_wing_libertarian_leader_desc: "Les leaders du marché anti-étatique qui privilégient les institutions privées, le faible bien-être, la liberté des médias et la faiblesse de la sécurité intérieure."
 ideology_classical_liberal_leader: "Libéral classique"
 ideology_classical_liberal_leader_desc: "Ancien constitutionnaliste libéral qui favorise le libre-échange, gouvernement limité, droits de propriété, institutions représentatives et état de droit."
 ideology_neocon_leader: "Néocon"
 ideology_neocon_leader_desc: "Des dirigeants libéraux-conservateurs militarisés favorisent les forces armées professionnelles, l'intervention à l'étranger, les institutions capitalistes et la sécurité nationale."
 ideology_jihadist_leader: "Djihadiste"
 ideology_jihadist_leader_desc: "Des chefs religieux militaires qui ne peuvent émerger que de pays islamiques de religion d'État sous une pression radicale."
 ideology_minarchist_leader: "Minarchiste"
 ideology_minarchist_leader_desc: "Les leaders des petits États qui soutiennent le laissez-faire, les systèmes privés et le recul quasi total de l'autorité publique."
 ideology_right_wing_populist_leader: "Populiste droit"
 ideology_right_wing_populist_leader_desc: "Les dirigeants anti-élites national-populistes qui s'élèvent dans les démocraties libérales avec des radicaux élevés, mélangeant le chauvinisme du bien-être, le protectionnisme et la réaction culturelle."
 ideology_authoritarian_capitalist_leader: "Capitaliste autoritaire"
 ideology_authoritarian_capitalist_leader_desc: "Les dirigeants capitalistes d'ordre dur qui favorisent le capitalisme privé ou guidé sous l'autocratie, le pouvoir policier, la censure et la faible opposition."
 ideology_monarchist_leader: "Monarchiste"
 ideology_monarchist_leader_desc: "Les chefs loyalistes dynastiques qui apparaissent presque seulement dans les monarchies et favorisent l'autorité héréditaire, la tradition, l'église et la hiérarchie."
 ideology_fascist_leader: "Fasciste"
 ideology_fascist_leader_desc: "Des dirigeants autoritaires ultra-nationalistes qui privilégient la militarisation, le régime de parti unique, la violence d'État, la société fermée et l'économie nationale des entreprises."
 ideology_anarchist_leader: "Anarchiste"
 ideology_anarchist_leader_desc: "Des dirigeants socialistes antiautoritaires qui favorisent l'autonomie des apatrides, la propriété coopérative, les milices, la liberté d'expression, l'absence de police et une forte autonomie locale."
