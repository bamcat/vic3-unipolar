l_french:

  # Landowners IG Traits
 ig_trait_noblesse_oblige:0 "Noblesse Oblige"
 ig_trait_noblesse_oblige_desc:0 "Nous sommes mieux que les gens ordinaires, ce qui signifie que nous avons le devoir de nous en occuper. Leurs tentatives pour s'organiser sont autodestructives et vouées à l'échec."
 ig_trait_family_ties:0 "Liens familiaux"
 ig_trait_family_ties_desc:0 "En ces temps changeants, nous connaissons encore la valeur d'un bon mariage. Nos liens sont plus anciens que les frontières qu'ils dépassent et vont dépasser les alliances et les gouvernements."
 ig_trait_noble_privileges:0 "De nobles privilèges"
 ig_trait_noble_privileges_desc:0 "Qu'est-il arrivé à l'idée que la noblesse devrait être laissée pour s'acquitter de ses fonctions sans être poursuivie par les collecteurs d'impôts? Il est temps de ramener ces jours-là."
 ig_trait_profitable_estates: "Propriétés bénéficiaires"
 ig_trait_profitable_estates_desc: "Tu ne savais pas ? Ce qui est bon pour la noblesse, c'est bon pour la nation – la prospérité se répand."
 ig_trait_the_velvet_book: "Le livre de velours"
 ig_trait_the_velvet_book_desc: "Seules les familles les plus augustes peuvent écrire leurs noms dans ce livre vénérable. Nous savons qui appartient et qui ne le fait pas."
 ig_trait_bad_boyars: "Mauvais garçons"
 ig_trait_bad_boyars_desc: "Donc ils veulent dire que le bon tsar du pays est induit en erreur par ses mauvais garçons ? On peut leur montrer de quel mauvais garçon est capable."
 ig_trait_latifundios: "Latifúndios"
 ig_trait_latifundios_desc: "La productivité et la richesse de nos propriétés sont inégalées. L'argent passe par nos mains comme l'eau par les rapides. Vraiment, ce sont des jours d'or pour nous tous."
 ig_trait_junkerdom: "Junkerdom"
 ig_trait_junkerdom_desc: "Notre pouvoir vient de nos terres, et nos terres sont des terres puissantes. Quoi que nous ayons choisi de faire, la nation suivra."
 ig_trait_patrician_philanthropy: "Patrician Philanthropie"
 ig_trait_patrician_philanthropy_desc: "Il est grand temps que nous fassions quelque chose pour notre prochain – et que nous nous assurions que nos noms étaient emplaçonnés sur ce qui finit par être construit, bien sûr."
 ig_trait_wiener_walzer: "M. Wiener Walzer"
 ig_trait_wiener_walzer_desc: "Quelqu'un avait le culot à la dernière balle de demander un minuet à jouer. Ma chère, on fait des valses ! Nous définissons ce qui est à la mode, et c'est #italic pas#! le minuet!"
 ig_trait_fazenda_ibicaba: "Fazenda Ibicaba"
 ig_trait_fazenda_ibicaba_desc: "La main-d'oeuvre est un problème constant pour nos entreprises, et nous devons donc suivre toutes les voies possibles pour obtenir le travail dont nous avons besoin."
 ig_trait_summon_no_zamindars: "N'invoquez pas de zamindars"
 ig_trait_summon_no_zamindars_desc: "Les dirigeants de notre pays ont démontré qu'ils n'avaient aucun intérêt à négocier ou à faire preuve de souplesse. Si c'est le cas, alors ils ne devraient pas manquer les choses plus subtiles que nous faisons pour maintenir l'ordre."
 ig_trait_famine_reserves: "Réserves de famine"
 ig_trait_famine_reserves_desc: "Il est de notre devoir d'ouvrir nos magasins de céréales quand un besoin pressant émerge. Quelle meilleure façon d'acheter de la bonne volonté à nos locataires?"

  # Industrialists IG Traits
 ig_trait_job_creators:0 "Créateurs d'emplois"
 ig_trait_job_creators_desc:0 "Il faut dépenser pour gagner de l'argent. Tant qu'on peut se fier au gouvernement pour ne pas interférer avec nos investissements, il n'y a nulle part où nous préférerions mettre nos profits plutôt que vers la croissance économique."
 ig_trait_engines_of_progress:0 "Moteurs de progrès"
 ig_trait_engines_of_progress_desc:0 "Voici les merveilles de l'ère moderne ! Il n'y a pas de temps pour hésiter. S'il peut être pensé, conçu et breveté, il doit être construit, testé et mis en service immédiatement."
 ig_trait_tax_avoidance:0 "Évitement fiscal"
 ig_trait_tax_avoidance_desc:0 "Qui sait le mieux où notre argent devrait être dépensé ? Pas le gouvernement, et certainement pas le gouvernement actuel. Heureusement, leur incompétence a laissé des lacunes fiscales qui peuvent être utilisées à bon escient."
 ig_trait_zaibatsu_cooperation: "Coopération avec Zaibatsu"
 ig_trait_zaibatsu_cooperation_desc: "Une relation saine entre l'industrie et le gouvernement profite à tous. Il est dans nos deux intérêts de veiller à ce que cette situation à l'amiable se poursuive."
 ig_trait_zaibatsu_withdrawal: "Zaibatsu Retrait"
 ig_trait_zaibatsu_withdrawal_desc: "Notre santé financière profiterait le plus par un recentrage sur la spéculation monétaire et le réinvestissement interne. Le commerce public n'est malheureusement pas une priorité pour le gouvernement."
 ig_trait_kommerskollegium: "Kommerskollegium"
 ig_trait_kommerskollegium_desc: "Il nous incombe, à mesure que nos intérêts commerciaux augmentent, de veiller à ce que la richesse gagnée soit gérée équitablement."
 ig_trait_ventilate_unify_beautify: "Ventilation, unification et beauté"
 ig_trait_ventilate_unify_beautify_desc: "Tu as vu ce que c'est ? C'est un atelier de maladie, un lieu où le soleil ne brille jamais, où les plantes où périssent et où la misère et la peste travaillent de concert. Il nous appartient, bien sûr, de réparer ce désordre."
 ig_trait_the_goods_must_flow: "Les marchandises doivent circuler"
 ig_trait_the_goods_must_flow_desc: "C'est bien de produire autant que notre pays, mais à quoi bon s'il ne peut atteindre les marchés où il doit être vendu ? Le moment est venu de veiller à ce que le pays comprenne à quel point le bon transport est nécessaire."
 ig_trait_wounded_honor: "L'honneur blessé"
 ig_trait_wounded_honor_desc: "Nous sommes quelques-uns éclairés dans une terre qui résiste à toute lumière. Nos méthodes sont supérieures — tout désordre est une trahison, et la trahison doit être satisfaite avec la sanction la plus sévère."
 ig_trait_stamped_and_signed: "Estampillé et signé"
 ig_trait_stamped_and_signed_desc: "Les timbres et les registres sont les méthodes que nous utilisons pour créer l'ordre par le chaos. La gouvernance de l'Inde exige un océan de papier, et il est de notre devoir de veiller à ce qu'elle circule sans faille."
 ig_trait_responsible_government: "Gouvernance responsable"
 ig_trait_responsible_government_desc: "Notre mission est d'étendre la justice et la civilisation à tous les hommes et, bien sûr, de perpétuer la règle qui le permet pour toujours."

  # Armed Forces IG Traits
 ig_trait_patriotic_fervor:0 "Fervor patriotique"
 ig_trait_patriotic_fervor_desc:0 "Peu importe comment brillant la stratégie et comment avancé les armes, certaines batailles ne peuvent être gagnées que par le travail et le courage. Les soldats qui croient vraiment en ce que leur pays représente vont se battre courageusement, quelles que soient les chances."
 ig_trait_veteran_consultation:0 "Consultation des anciens combattants"
 ig_trait_veteran_consultation_desc:0 "Les progrès technologiques changent le visage de la guerre, mais nous ne pouvons les utiliser que si nous comprenons comment. Heureusement, ceux qui ont une expérience de première main devraient avoir une idée."
 ig_trait_materiel_waste:0 "Déchets de matériel"
 ig_trait_materiel_waste_desc:0 "La loyauté envers la nation n'est pas la loyauté envers le gouvernement. Si on ne peut pas faire confiance aux responsables, autant utiliser ce qu'on nous donne comme bon nous semble."
 ig_trait_elan_vital: "Élan Vital"
 ig_trait_elan_vital_desc: "Alors que les armes et les armements les plus récents sont tous bons, le chemin de la victoire dépend d'un esprit moteur qui ne s'inclinera pas face à l'adversité. Les soldats qui croient vraiment en ce que représente la nation progresseront courageusement, peu importe les chances."
 ig_trait_newly_created_army: "Armée nouvellement créée"
 ig_trait_newly_created_army_desc: "Le cœur d'une armée moderne ne se trouve pas dans les derniers fusils, ou les meilleurs uniformes, mais dans l'organisation et la logistique. Pour garder chaque soldat à disposition, pour garder le flux de munitions et de rations régulier et fiable, pour s'assurer que chaque homme connaît son rôle dans la vaste machine militaire – c'est comment faire une armée vaut quelque chose."
 ig_trait_self_strengthening: "Autorenforcement"
 ig_trait_self_strengthening_desc: "Notre intelligence et notre sagesse sont nécessairement supérieures à celles qui nous entourent. Ainsi, ce que nous devons apprendre de l'étranger n'est qu'une chose : des navires solides et des armes efficaces."
 ig_trait_parochial_leadership: "Leadership paroissial"
 ig_trait_parochial_leadership_desc: "En ces temps sombres, c'est chaque homme pour lui-même, et chaque province doit d'abord se tourner vers son propre bien-être. Il est déraisonnable de s'attendre à ce que chaque officier mène avec enthousiasme loin de chez lui, alors que son propre foyer pourrait être menacé."
 ig_trait_el_buen_jefe: "El Buen Jefe"
 ig_trait_el_buen_jefe_desc: "Tout bon soldat a besoin d'un bon officier pour le conduire. En ces temps, tout le pays a besoin d'un bon officier."
 ig_trait_clube_militar: "Clube Militar"
 ig_trait_clube_militar_desc: "Un endroit où les officiers et les soldats comme nous peuvent se reposer, se détendre et s'organiser dans leur temps libre est sûr d'être inoffensif. Si quelque chose, un endroit où nous pouvons tous parler et planifier les choses peut servir le pays un peu bon."
 ig_trait_coronelismo: "Coronélismo"
 ig_trait_coronelismo_desc: "Avez-vous vu le dernier décret du gouvernement ? Ils ne réalisent pas avec qui ils ont affaire ? Un gentleman décoré comme moi, avec tous mes hommes et mes biens, ne doit pas être infaillible !"
 ig_trait_divided_ranks: "Classements divisés"
 ig_trait_divided_ranks_desc: "Il y a un fossé fondamental entre nos soldats et nos officiers, un fossé qui s'est trop étendu pour être ignoré. Pourquoi un homme mettrait sa vie en jeu pour celui qui traite ses coutumes avec mépris ?"
 ig_trait_imperial_service: "Service impérial"
 ig_trait_imperial_service_desc: "Porter notre uniforme et élargir notre frontière est un grand honneur, auquel des millions de personnes s'efforcent de parvenir. Il est heureux pour eux qu'il y ait toujours des postes à pourvoir."
 ig_trait_veerta: "Veerta"
 ig_trait_veerta_desc: "Nous sommes l'armée qui a conquis toute l'Inde, produisant un flux incessant de victoires contre toute question d'ennemis. Notre bravoure et notre discipline font en sorte que ce rouleau d'honneur ne se termine jamais."

  # Rural Folk IG Traits
 ig_trait_farmers_markets:0 "Marchés agricoles"
 ig_trait_farmers_markets_desc:0 "Obtenir les biens que nous produisons aux personnes qui en ont besoin semble être une grande préoccupation de nos jours. Dans de bonnes circonstances, nous sommes capables de les amener là où ils ont besoin d'être nous-mêmes."
 ig_trait_honest_work:0 "Travail honnête"
 ig_trait_honest_work_desc:0 "Nous vivons par un travail honnête et une sueur honnête. Si cela signifie que nous produisons plus que ce dont nous avons besoin, tant mieux."
 ig_trait_old_ways:0 "Vieilles voies"
 ig_trait_old_ways_desc:0 "Ces gens qui dirigent le pays semblent avoir toutes sortes d'idées sur ce à quoi l'avenir devrait ressembler. Pourquoi devrions-nous leur faire confiance quand ce sont eux qui ont fait le présent ?"
 ig_trait_obshchina: "Obshchina"
 ig_trait_obshchina_desc: "La vie dans notre petit village n'est pas si mauvaise. Diviser le travail entre nous est facile, et se répandre autour des produits et des profits doublement."
 ig_trait_fellahin: "Fellahin"
 ig_trait_fellahin_desc: "Notre lot dans la vie est de travailler au mieux de ces domaines. Parfois, notre travail nous rapporte."
 ig_trait_nucleos_coloniais: "Núcleos Coloniais"
 ig_trait_nucleos_coloniais_desc: "Une nouvelle maison signifie un nouveau départ sur la vie. Pourquoi ne pas aimer ça ? Voyons ce que ce nouveau règlement a à offrir."
 ig_trait_plantation_work: "Travaux de plantation"
 ig_trait_plantation_work_desc: "On travaille dur jour après jour, et on obtient ce dont on a besoin. Certains jours, cependant, nous avons plus que cela, et nous chérissons ces jours-là."
 ig_trait_of_the_sovereign_alone: "Du Souverain Seul"
 ig_trait_of_the_sovereign_alone_desc: "Le fardeau imposé par ceux qui possèdent la terre est insupportable. Il faut rappeler à ces intermédiaires que nous sommes seuls des ryots du souverain et qu'ils n'ont aucun pouvoir légitime sur nous."
 ig_trait_imandari: "Imandari"
 ig_trait_imandari_desc: "Notre terre est riche, et nous le travaillons avec diligence. En temps utile, nous pouvons produire ce dont nous avons besoin et plus encore."
 ig_trait_bazaar_bargains: "Bazar Bargains"
 ig_trait_bazaar_bargains_desc: "Ce sont nos bazars qui enrichissent nos villes et attirent les visiteurs de kilomètres autour. Si la prospérité nécessite une organisation supplémentaire, c'est un prix que nous sommes prêts à payer."

  # Trade Unions IG Traits
 ig_trait_solidarity:0 "Solidarité"
 ig_trait_solidarity_desc:0 "Tous ceux qui veulent travailler devraient avoir du travail ! Personne ne sera exclu ou exclu. Nous devons nous soutenir mutuellement le droit à un travail équitable."
 ig_trait_industrial_organizers:0 "Organisateurs industriels"
 ig_trait_industrial_organizers_desc:0 "Peu importe qui est en charge, la façon dont les travailleurs collaborent a finalement un impact plus important sur le fonctionnement d'une usine que n'importe quelle règle émise d'en haut."
 ig_trait_work_to_rule:0 "Travail à faire"
 ig_trait_work_to_rule_desc:0 "On dirait que les responsables veulent qu'on se taise et qu'on fasse ce qu'on nous dit, plutôt que de penser pour nous-mêmes. Voyons comment ils l'aiment si nous appliquons cette philosophie à notre travail « non qualifié »."
 ig_trait_bourse_du_travail: "Bourse du travail"
 ig_trait_bourse_du_travail_desc: "L'organisation ne se termine pas en fin de journée de travail ! Un front uni exige de s'entraider non seulement au niveau de l'usine, mais aussi dans nos maisons et nos communautés."

  # Intelligentsia IG Traits
 ig_trait_propagandists:0 "Propagandistes"
 ig_trait_propagandists_desc:0 "Dans notre poésie, nos lettres et nos manifestes politiques, nous devons avant tout soutenir les progrès réalisés dans notre pays d'origine comme exemple de ce que cette nouvelle ère doit apporter aux régions moins fortunées du monde."
 ig_trait_avant_garde:0 "Avant-garde"
 ig_trait_avant_garde_desc:0 "Ce que d'autres n'oseront même pas penser, nous parlerons déjà à haute voix. Notre art et nos idées couperont directement au cœur et forceront les yeux ouverts, sinon dans l'étonnement, puis dans le choc!"
 ig_trait_social_criticism:0 "Critique sociale"
 ig_trait_social_criticism_desc:0 "Les gens au pouvoir pensent souvent qu'ils sont irréprochables, mais l'autorité ne rend pas les idées de quelqu'un intéressantes. Nous avons beaucoup de choses intéressantes à dire, et nous savons exactement à qui les dire."
 ig_trait_restoration: "Restauration"
 ig_trait_restoration_desc: "En cette ère de grands défis et de grandes réalisations, nous sommes fiers de notre quête obstinée de restaurer la nation à sa grandeur ancienne. Un travail extraordinaire a réaffirmé le statut de notre civilisation, et un travail extraordinaire l'amènera encore plus haut."
 ig_trait_crisis_of_identity: "Crise de l'identité"
 ig_trait_crisis_of_identity_desc: "La nation que nous servons ne sera peut-être pas la nation que nous sommes vraiment. Combien avons-nous en commun avec les responsables ?"
 ig_trait_les_beaux_arts: "Les Beaux-Arts"
 ig_trait_les_beaux_arts_desc: "Nos arts, nos expositions et notre talent créatif sont sans pareil. Pourquoi ne pas nous montrer ? Nous méritons de rendre les autres jaloux."
 ig_trait_brasilidade: "Brésilidade"
 ig_trait_brasilidade_desc: "Viens, mon ami, célébrons ce soir ! Ici, nous pouvons entendre les plus belles ballades sous la lumière des étoiles avec une bouteille dans nos mains, et là-bas—ah, regardez ce qu'il peint déjà! N'est-ce pas la vie ?"
 ig_trait_bachareis: "Bacharéis"
 ig_trait_bachareis_desc: "Nous savons ce dont la nation a besoin! Après tout, nous parlons au nom du peuple—Quoi? Non, nous n'avons pas dit que nous parlions #italic aux gens."
 ig_trait_swaraj: "Swaraj"
 ig_trait_swaraj_desc: "Nous nous trouvons à la fois aliénés et asservis par l'État. Nos dirigeants nous refusent l'agence tout en demandant notre service impensable. Une telle chose est vouée à l'échec, et, si nécessaire, nous nous efforcerons de s'en assurer."
 ig_trait_westernisation: "Occidentation"
 ig_trait_westernisation_desc: "Notre gouvernement actuel est un représentant de la justice et des progrès, mais une grande partie de notre pays reste éloignée de lui. Nous devons chercher à réduire la séparation entre l'État et le peuple."

  # Petite-Bourgeoisie IG Traits
 ig_trait_treasury_bonds:0 "Obligations du Trésor"
 ig_trait_treasury_bonds_desc:0 "Tant qu'on peut se fier au gouvernement pour payer ses dettes, mettre nos économies durement gagnées pour financer cette grande nation n'est pas seulement patriotique, mais un bon investissement."
 ig_trait_middle_managers:0 "Cadres intermédiaires"
 ig_trait_middle_managers_desc:0 "Nous ne pouvons pas faire tout ce que tout le monde fait dans le livre, mais nous pouvons au moins garder ce qui est fait dans les livres. Quelqu'un doit se souvenir de la bonne façon de faire les choses ici."
 ig_trait_xenophobia:0 "La xénophobie"
 ig_trait_xenophobia_desc:0 "Nous savons tous qui est responsable de l'état de notre pays, les gens ont peur de le dire. Pendant ce temps, ils se moquent de ce que nous leur avons laissé s'échapper. Quelqu'un doit agir."
 ig_trait_bergsbrukens_valdistrikten: "Bergsbrukens Valdistrikt"
 ig_trait_bergsbrukens_valdistrikten_desc: "La collaboration étroite entre les intérêts miniers et le domaine burgher signifie que dans les meilleurs temps, nous pouvons nous assurer que l'État obtient une sorte de soutien d'autres pays ne peut que rêver."
 ig_trait_effendi: "Effendi"
 ig_trait_effendi_desc: "Par des habitudes sérieuses et des moyens honnêtes, nous avons atteint le sommet, et nos efforts sont à juste titre salués par tous."
 ig_trait_reorganization: "Réorganisation"
 ig_trait_reorganization_desc: "Nous savons qu'avec les bons mandats et les bons ministères en place, nous réformons tellement. Dis juste le mot, et nous allons commencer."
 ig_trait_master_of_the_house: "Maître de maison"
 ig_trait_master_of_the_house_desc: "S'il vous plaît ! Asseyez-vous. Nous aspirons ici au raffinement, à être serviteurs des pauvres, majordomes des grands, consolateurs et philosophes de la nation."
 ig_trait_haute_finance: "Haute Finance"
 ig_trait_haute_finance_desc: "Dans le jeu de la finance continentale, nous voulons être les vainqueurs en étant les premiers à jouer notre main."
 ig_trait_old_lady_of_threadneedle_street: "La Vieille Dame de Threadneedle Street"
 ig_trait_old_lady_of_threadneedle_street_desc: "Si la nation a besoin d'aide, il y a une vieille dame qui est prudente, sûre, et qui peut toujours se tourner vers une crise : la Banque d'Angleterre."
 ig_trait_civil_service: "Fonction publique"
 ig_trait_civil_service_desc: "Les gens ont des idées drôles sur les fonctionnaires. Nous sommes ici pour vous aider à formuler et à mettre en œuvre vos politiques, c'est tout."
 ig_trait_bah_humbug: "Bah Humbug"
 ig_trait_bah_humbug_desc: "Les pauvres et le désespoir sont dans le besoin, vous dites. Il n'y a pas de prisons ? Les ateliers sont toujours en activité ? Alors laisse-moi tranquille ! Ceux qui sont mal partis doivent y aller."
 ig_trait_swadesh: "Swadesh"
 ig_trait_swadesh_desc: "Nous sommes aussi travailleurs que n'importe quelle autre personne, mais nous sommes privés de crédit et forcés à la servitude par des entreprises étrangères. Si nos dirigeants cherchent à nous exclure de l'économie, nous ferons de même pour eux."
 ig_trait_lines_of_credit: "Lignes de crédit"
 ig_trait_lines_of_credit_desc: "Si ce n'était pas pour le crédit fourni par nos propres financiers, la Compagnie n'aurait jamais pu conquérir l'Inde. Si nous avons une solide analyse de rentabilisation, nous sommes tout à fait disposés à poursuivre cette relation."
 ig_trait_cooperative_agencies: "Organismes de coopération"
 ig_trait_cooperative_agencies_desc: "Nos dirigeants possèdent un capital abondant, mais ils connaissent peu notre pays. En mettant en commun leurs ressources et notre expertise, nous pouvons enrichir notre patrie bien plus qu'ils ne le feraient seuls."

  # Devout IG Traits
 ig_trait_be_fruitful_and_multiply:0 "Fruits et multiples"
 ig_trait_be_fruitful_and_multiply_desc:0 "L'ascétisme est parfait pour les quelques personnes qui consacrent leur vie à des activités spirituelles, mais dans les gens communs, les valeurs les plus importantes à inculquer sont celles de construire une famille et de prendre soin des enfants."
 ig_trait_divine_right:0 "Droite divine"
 ig_trait_divine_right_desc:0 "Nous croyons qu'il y a un ordre dans nos vies. La société peut refléter cet ordre mieux ou pire. Tant que les dirigeants sont vertueux et que leurs décrets sont justes, nous pouvons nous assurer que les gens savent pourquoi."
 ig_trait_pious_fiction:0 "Fiction pieuse"
 ig_trait_pious_fiction_desc:0 "Les valeurs d'aujourd'hui sont tellement empoisonnées et la littérature si corrompue que l'éducation elle-même a un effet érodant sur la morale. Mieux que d'enseigner aux gens ce que l'établissement actuel considère comme "vrai" est de leur enseigner ce qui devrait être vrai."
 ig_trait_work_ethic: "Éthique du travail"
 ig_trait_work_ethic_desc: "Souvenez-vous, l'argent a une nature génératrice. L'argent engendre de l'argent; la production de profits est un acte de création, d'honneur et de glorification de l'œuvre de Dieu."
 ig_trait_asceticism: "Ascétisme"
 ig_trait_asceticism_desc: "S'abstenir des plaisirs de ce monde est la bonne voie. Ne vous laissez pas trop déranger par les changements matériels; ceux-ci aussi passeront."
 ig_trait_kar_seva: "Kar Seva"
 ig_trait_kar_seva_desc: "Dieu est avec nous et parmi nous. Par conséquent, servir les autres de façon désintéressée, c'est servir la création de Dieu et servir Dieu. Il nous incombe à tous de nous engager dans un travail honnête et de partager les fruits de ce travail avec les autres, et par ces moyens être plus près de Dieu."
 ig_trait_temporal_mandate: "Mandat temporaire"
 ig_trait_temporal_mandate_desc: "La ligne entre les cieux et la terre est souvent floue, de même que la ligne entre la foi et le gouvernement. Il faut tous les types pour administrer le monde laïque – nous pouvons toujours trouver des moyens de faire fonctionner nos systèmes ensemble."
 ig_trait_the_best_revenge: "La meilleure vengeance"
 ig_trait_the_best_revenge_desc: "Si vous voulez prendre la vengeance contre votre ennemi, acquérir plus de bonnes qualités et marcher sur le chemin de la justice. Ce faisant, vous prendrez inévitablement vengeance contre votre ennemi car il sera affligé par vos bonnes qualités, et il sera attristé par votre bonne réputation."
 ig_trait_yeshivot: "Ouihivot"
 ig_trait_yeshivot_desc: "Étudier le Sifrut Chazal est un devoir clé de chaque jeune. Si personne n'allait à l'école, comment nos lois pourraient-elles être rappelées et conservées ?"
 ig_trait_traditsye: "Traditsye"
 ig_trait_traditsye_desc: "Le monde change rapidement autour de nous. Comment pouvons-nous maintenir notre équilibre si nous nous précipitons après ce tourbillon de changement?"
 ig_trait_heavenly_sovereign: "Souverain céleste"
 ig_trait_heavenly_sovereign_desc: "Les héritiers de l'empereur Jimmu ont eu recours à l'une des institutions les plus vénérables de la terre. Cette tradition mérite à juste titre la vénération, et en tant que nation, nous devons la reconnaître."
 ig_trait_secular_shrine_theory: "Théorie du sanctuaire séculier"
 ig_trait_secular_shrine_theory_desc: "Les sanctuaires sont une croyance inhérente au peuple japonais; ils existent de manière intitutionnelle aux fins des rituels publics de l'État. Le shintoïsme est idéologique: c'est une expression du patriotisme que nous attendons de chaque citoyen."
 ig_trait_haibutsu_kishaku: "Haibutsu Kishaku"
 ig_trait_haibutsu_kishaku_desc: "Les religions étrangères doivent être abolies de la nation et leurs chiffres détruits. Regardez ce qu'ils ont causé ! Allez dans leurs sanctuaires, leurs temples, leurs cabanes, et montrez-leur qu'ils n'ont nulle part ici !"
 ig_trait_da_wat: "C'est bon."
 ig_trait_da_wat_desc: "Nous devons sortir, inviter les autres à nous rejoindre dans la foi et à vivre selon la volonté d'Allah. L'ummah accueille tout."
 ig_trait_sharia: "La charia"
 ig_trait_sharia_desc: "Vivre correctement exige de connaître les lois qui définissent ce qui est correct et ce qui n'est pas. L'interprétation de la loi est l'une des tâches les plus honorées et solennelles que nous puissions accomplir."
 ig_trait_mecelle: "Mellé"
 ig_trait_mecelle_desc: "Basée dans la jurisprudence Hanafi, la Mecle-i Ahkâm-ı Adliye nous assure de suivre un code qui satisfait à la fois notre foi et nos attentes de la loi laïque."

