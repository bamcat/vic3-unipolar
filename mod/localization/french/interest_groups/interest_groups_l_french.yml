l_french:

  # Base IGs
 ig_rural_folk:0 "Peuple rural"
 ig_rural_folk_only_icon:0 "@rural_folk!"
 ig_rural_folk_desc:0 "Les gens des campagnes dont les intérêts politiques sont pour la plupart alignés sur leurs moyens de subsistance agraires."
 ig_devout:0 "Les fondamentalistes religieux"
 ig_devout_only_icon:0 "@devout!"
 ig_devout_desc:0 "Les disciples les plus dévoués de la religion majoritaire, la considérant comme la meilleure source de sagesse morale et politique."
 ig_industrialists:0 "Sociétés"
 ig_industrialists_only_icon:0 "@industrialists!"
 ig_industrialists_desc:0 "Investisseurs et actionnaires intéressés par le progrès technologique et la croissance industrielle."
 ig_landowners:0 "Propriétaires"
 ig_landowners_only_icon:0 "@landowners!"
 ig_landowners_desc:0 "Les propriétaires de grandes propriétés et de vastes plantations, les propriétaires sont les gardiens de la tradition et de l'argent ancien."
 ig_intelligentsia:0 "Académique"
 ig_intelligentsia_only_icon:0 "@intelligentsia!"
 ig_intelligentsia_desc:0 "Les intellectuels qui dirigent les tendances nationales en littérature, art, musique et théâtre. Comprend également la classe de gestion commune/"
 ig_petty_bourgeoisie:0 "Urbains"
 ig_petty_bourgeoisie_only_icon:0 "@petty_bourgeoisie!"
 ig_petty_bourgeoisie_desc:0 "Petites entreprises, commis de bureau, comptables et autres personnes considérées entre les couches riches et pauvres."
 ig_armed_forces:0 "Forces armées"
 ig_armed_forces_only_icon:0 "@armed_forces!"
 ig_armed_forces_desc:0 "Des soldats professionnels et d'autres dont l'intérêt est fortement lié aux militaires du pays."
 ig_trade_unions:0 "Syndicats du travail"
 ig_trade_unions_only_icon:0 "@trade_unions!"
 ig_trade_unions_desc:0 "Travail organisé cherchant à organiser les travailleurs dans les mines, les usines et les champs et, ce faisant, mettre en commun les forces des intérêts disparates en une seule voix."

  # Religious IGs
 ig_catholic_church:0 "Église catholique"
 ig_catholic_church_desc:0 "Le catholicisme est la plus grande secte du christianisme. Les croyants considèrent que l'archevêque de Rome, le Pape, est le successeur ininterrompu de l'autorité de Jésus-Christ par Saint-Pierre. D'autres croyances importantes incluent la vénération des saints et de la Vierge Marie."
 ig_orthodox_church:0 "Église orthodoxe"
 ig_orthodox_church_desc:0 "Les églises orthodoxes ont tendance à être des églises orientales non en communion avec le pape."
 ig_oriental_orthodox_church:1 "Église orthodoxe orientale"
 ig_oriental_orthodox_church_desc:1 "Les églises orthodoxes orientales ont tendance à être des églises du Moyen-Orient non en communion avec le pape."
 ig_anglican_church:0 "Église anglicane"
 ig_anglican_church_desc:0 "L'Église anglicane a été créée par le roi Henri VIII pendant la Réforme protestante. Les anglicans croient que la Bible est la principale autorité sur le dogme chrétien, rejetant le pape tout en étant moins radical que les autres églises évangéliques."
 ig_evangelical_church:0 "Église évangélique"
 ig_evangelical_church_desc:0 "Les églises évangéliques ont été créées principalement en Europe du Nord pendant la Réforme protestante. Les évangélistes croient que la Bible est la seule autorité sur le dogme chrétien, rejetant le Pape et voyant la vénération catholique des saints comme se rapprochant de l'idolâtrie."
 ig_rabbinical_council:0 "Conseil rabbinique"
 ig_rabbinical_council_desc:0 "La direction d'un pays La population juive a tendance à être bien éduquée Rabbins avec de fortes traditions de débat et de bourses."
 ig_sunni_madrasahs:1 "Uléma sunnite"
 ig_sunni_madrasahs_desc:1 "Le sunnisme est la plus grande secte de l'Islam. Les croyants soutiennent que Muhammad a été remplacé comme calife de l'islam par son oncle, Abu Bakr, par opposition à l'opinion chiite selon laquelle son gendre Ali était le successeur légitime."
 ig_shia_madrasahs:1 "L'Uléma"
 ig_shia_madrasahs_desc:1 "Le chiisme est la deuxième plus grande secte de l'islam. Les croyants soutiennent que Muhammad a été remplacé comme calife de l'islam par son gendre, Ali, par opposition à l'opinion sunnite que son oncle Abu Bakr était le successeur légitime."
 ig_hindu_priesthood:0 "Prêtrise hindoue"
 ig_hindu_priesthood_desc:0 "Probablement la plus ancienne religion organisée qui existe encore, l'hindouisme soutient que briser le cycle de la réincarnation et atteindre le Nirvana nécessite l'adhésion à un système de castes par lequel les individus servent un rôle pour améliorer leur karma, tout comme les nombreux dieux adorés par les hindous servent différents rôles."
 ig_vajrayana_monks:0 "Monques de Vajrayana"
 ig_vajrayana_monks_desc:0 "Le bouddhisme Vajrayana est le plus fort au Tibet et en Mongolie. Il met l'accent sur l'utilisation de la méditation et de l'autodiscipline."
 ig_mahayana_monks:0 "Monques de Mahayana"
 ig_mahayana_monks_desc:0 "Le bouddhisme Mahayana est le plus fort en Chine, au Vietnam et en Corée. Il souligne que chacun dans la société doit être encouragé à rechercher l'illumination par la perfection. Mahayana voit Bouddha comme une figure de Dieu."
 ig_theravada_monks:0 "Theravada Monks"
 ig_theravada_monks_desc:0 "Le bouddhisme Theravada est le plus fort en Birmanie, au Siam, au Cambodge et à Ceylan. Il met l'accent sur les individus qui cherchent le Nirvana pour briser le cycle de la réincarnation. Theravada voit Bouddha non pas comme un Dieu, mais comme un homme éclairé qui a montré au reste de l'humanité le chemin de la perfection."
 ig_shinto_monks:0 "Monques shintoïstes"
 ig_shinto_monks_desc:0 "Le shintoïsme est une foi syncrétique, combinant les concepts bouddhistes de karma et de réincarnation avec le culte et la placation du kami, les esprits de la nature et les ancêtres morts."
 ig_pagan_shamans:0 "Pagan Shamans"
 ig_pagan_shamans_desc:0 "L'animisme est le culte et la mise en place des esprits naturels. Les rituels entrepris par les animistes comprennent des sacrifices de nourriture et de bétail, et la consommation de médicaments hallucinogènes pour les voyages spirituels d'introspection."

  # Taiping IGs
 ig_taiping_god_worshippers:0 "Société d'adoration de Dieu"
 ig_taiping_god_worshippers_desc:0 "La Société d'Adoration de Dieu, ou Société d'Adoration d'Empereur, est une foi chrétienne syncrétique qui occupe une place importante dans le Royaume céleste, soutenant une interprétation du christianisme qui considère tous les croyants comme des fils et des filles de Dieu."

  # British IGs
 ig_landed_gentry:0 "Genterie débarquée"
 ig_landed_gentry_desc:0 "Les propriétaires de grands domaines et de vastes propriétés, le gentry débarqué sont les gardiens de la tradition et de l'argent ancien."

  # Prussian IGs
 ig_junkers:0 "Junkers"
 ig_junkers_desc:0 "Descendus des "Jung herrs" (jeunes seigneurs) qui ont suivi dans le sillage des conquêtes teutoniques de la Baltique païenne pour s'installer et christianiser les terres prussiennes, les Junkers sont la noblesse de Prusse et les grands propriétaires. Ils ont tendance à s'opposer aux mouvements vers la démocratie en tant que menace pour la domination des élites."

  # USA IGs
 ig_southern_planters:0 "Propriétaires"
 ig_southern_planters_desc:0 "Alors que le logement est devenu plus rare ces derniers temps, des groupes de personnes qui prétendent être des associations de propriétaires qui achètent et vendent des biens immobiliers à des fins lucratives ont artificiellement gonflé le coût de la vie."
 ig_evangelicals:0 "Chrétiens anciens"
 ig_evangelicals_desc:0 "Chrétiens d'une étonnamment grande variété de confessions protestantes, les chrétiens conviennent tous que la nation doit trouver son propre éveil spirituel afin de se sauver d'une augmentation de la laïcité à travers la nation."
 ig_yeoman_farmers:0 "Pays du Sud"
 ig_yeoman_farmers_desc:1 "La petite classe rurale américaine, considérée par de nombreux Pères fondateurs comme le socle de la nation. La classe yéomane s'est longtemps établie comme l'avant-garde du populisme rural américain."
 ig_wallstreet:0 "Rue Wall"
 ig_wallstreet_desc:0 "Les banques d'investissement de Wall Street à New York sont l'épine dorsale du système financier américain, exerçant une influence extrême sur l'ensemble de l'économie."
 ig_silicon_valley:0 "Silicon Valley"
 ig_silicon_valley_desc:0 "Les programmeurs et le travail-de-maison ordinateur wizzes qui gèrent la vie quotidienne sur Internet."
 ig_american_middle_class:0 "Amérique centrale"
 ig_american_middle_class_desc:0 "La classe moyenne américaine constitue la majorité de la base de consommation du pays, des emplois qui produisent des salaires viables."
 ig_digital_activists:0 "Activistes numériques"
 ig_digital_activists_desc:0 "Divers influenceurs en ligne exercent un pouvoir sur notre population."
  # Ottoman IGs
 ig_local_governors:0 "Gouverneurs locaux"
 ig_local_governors_desc:0 "Les dirigeants des provinces peuvent acquérir une grande influence en créant des réseaux de mécénat locaux. Les dynasties peuvent devenir si puissantes qu'elles ne sont effectivement des États indépendants que symboliquement liés à l'empire."

  # Chinese IGs
 ig_literati:0 "Literati"
 ig_literati_desc:0 "En Chine, les chercheurs jouent un rôle important, à la fois en tant que partisans du gouvernement et en tant que critiques."
 ig_scholar_officials:0 "Spécialistes"
 ig_scholar_officials_desc:0 "Les entrées débarquées en Chine ne sont pas vraiment la noblesse de la Chine. Ils préservent leur richesse en achetant des propriétés, mais ils doivent leur pouvoir à leurs positions au sein du gouvernement."
 ig_confucian:0 "Chercheurs confuciens"
 ig_confucian_desc:0 "Plus d'une tradition sociale, le confucianisme coexiste confortablement avec une multitude de fois, mais exige néanmoins l'harmonie sociale et une morale forte de ceux qui la suivent."

  # Papal IGs
 ig_roman_landowners:1 "Noblesse civique"
 ig_roman_landowners_desc:1 "Constituée de familles nobles et d'élites terriennes, la noblesse civique romaine sert de peuple de richesse, d'influence et de puissance temporelle sur les territoires du Saint-Siège."
 ig_roman_curia:0 "Curie romaine"
 ig_roman_curia_desc:0 "La Curie romaine, ou "Cour de Rome" telle qu'elle est parfois connue, est l'institution administrative du Saint-Siège, exerçant à la fois des pouvoirs ecclésiastiques et temporels."

  # Japanese IGs
 ig_samurai:0 "Samouraï"
 ig_samurai_desc:0 "Les Samouraïs sont la noblesse militaire héréditaire du Japon, servant de gardiens privilégiés aux puissants propriétaires terriens de Daimyo, et d'exécuteurs de leurs volontés féodales."
 ig_shogunate:0 "Chogunat"
 ig_shogunate_desc:0 "Le Shogunat fait référence au gouvernement militaire qui a gouverné le Japon au nom de l'empereur depuis le XIIe siècle. Ancré dans le soutien de puissants seigneurs féodaux, le Daimyo, l'insitution est dédiée au maintien de l'ordre traditionnel japonais."
 ig_peasants:1 "Héimine"
 ig_peasants_desc:0 "Heimin désigne la classe japonaise de gens du commun, née sans aucun privilège social, et dont les intérêts politiques reflètent principalement ceux des agriculteurs ruraux."
 ig_buddhist_monks:0 "Monques bouddhistes"
 ig_buddhist_monks_desc:0 "Le bouddhisme du 19e siècle existe au Japon depuis plus d'un millénaire. Les écoles bouddhistes patronnées par l'État tout au long de l'ère Edo soulignent la relation syncrétique entre kami et bouddhas."

  # Hawaiian IGs
 ig_christian_missionaries:0 "Missionnaires chrétiens"
 ig_christian_missionaries_desc:0 "Les missionnaires chrétiens sont venus à Hawaï, il y a quelques décennies, mais ils ont déjà supplanté la Kahuna en tant que classe cléricale dominante. Ils préconisent le commerce avec les puissances occidentales, attirant les migrants de l'Ouest et la conversion des Hawaïens indigènes au christianisme."
 ig_alii:0 "Autres"
 ig_alii_desc:0 "Les Ali'i représentent les plus petits nobles d'Hawaï'i au service du monarque régnant. Ils défendent les valeurs traditionnelles et préservent la domination de la monarchie."
 ig_maka_ainana:0 "Makkaāinana"
 ig_maka_ainana_desc:0 "Les Makaāinana représentent la classe rurale des Hawaïs, travaillant souvent dans les plantations et la pêche. Ils défendent les valeurs traditionnelles et la dépendance économique des Hawaïs à l'égard du secteur agricole."
 ig_hawaiian_democrats:0 "Démocrates"
 ig_hawaiian_democrats_desc:0 "Les démocrates représentent les réformateurs libéraux de Hawaï. Ils préconisent la suppression du pouvoir absolu du monarque en faveur d'un régime démocratique et de la poursuite des relations commerciales avec les puissances occidentales."

  # Swedish IGs
 ig_church_of_sweden:0 "Église de Suède"
 ig_church_of_sweden_desc:0 "L'Église de Suède a été initiée par le roi Gustav Vasa au 16ème siècle et est l'Église officielle d'État de Suède. En tant qu'institution luthérienne, l'Église considère que la Bible est la seule autorité sur le dogme chrétien, rejetant ainsi l'autorité du Pape et les traditions telles que la vénération des saints."

  # Finnish IGs
 ig_church_of_finland: "Église de Finlande"
 ig_church_of_finland_desc: "Né de la séparation de la Finlande de la Suède en 1809, l'Église de Finlande a été créée comme église officielle d'État du pays. En tant qu'institution luthérienne, l'Église considère que la Bible est la seule autorité sur le dogme chrétien, rejetant ainsi l'autorité du Pape et les traditions telles que la vénération des saints."

# Danish IGs
 ig_church_of_denmark: "Église du Danemark"
 ig_church_of_denmark_desc: "Fondée au 16ème siècle par le Roi Christian III, l'Église du Danemark est l'église officielle de l'État du Danemark. En tant qu'institution luthérienne, l'Église considère que la Bible est la seule autorité sur le dogme chrétien, rejetant ainsi l'autorité du Pape et les traditions telles que la vénération des saints."

# Norwegian IGs
 ig_aristocracy_of_officials: "Aristocratie des fonctionnaires"
 ig_aristocracy_of_officials_desc: "Faute d'une noblesse historique significative et l'institution étant officiellement abolie en 1821, la classe supérieure de la Norvège est plutôt composée de fonctionnaires, les avocats, les prêtres et les médecins occupant les postes de noblesse traditionnelle."
 ig_church_of_norway: "Église de Norvège"
 ig_church_of_norway_desc: "L'Église de Norvège a été créée en tant qu'organe distinct de l'Église catholique romaine et intégrée à l'État norvégien au 16ème siècle à la suite de la Réforme protestante. En tant qu'institution luthérienne, l'Église considère que la Bible est la seule autorité sur le dogme chrétien, rejetant ainsi l'autorité du Pape et les traditions telles que la vénération des saints."

  # Korean IGs
 ig_yangban:0 "Fonctionnaires de Yangban"
 ig_yangban_desc:0 "Le Yangban représente la genterie débarquée et non débarquée de la Corée, qui tire leurs titres et leur influence de positions au sein de l'appareil bureaucratique du pays. L'exemple des idéaux confuciens du Scholar-Official, ce sont des défenseurs acharnés de l'ordre traditionnel coréen."

  # Russian IGs
 ig_gentry_assembly:0 "Assemblée générale"
 ig_gentry_assembly_desc:0 "L'Assemblée de Gentry est l'organe autonome représentant l'Aristocratie russe. Octroyée officiellement en 1785, l'Assemblée a depuis toujours plaidé pour le maintien ou l'expansion des pouvoirs et privilèges traditionnels des nobles."

  # Australian IGs
 ig_squattocracy: "Squattocratie"
 ig_squattocracy_desc: "La Squattocratie représente la classe des colons australiens blancs qui ont occupé de vastes étendues de terres avec peu ou pas de revendications légales. Souvent les premiers colons à arriver dans une région donnée, la squattocratie a gagné une immense richesse et influence sociale principalement grâce au produit de l'élevage sur leurs territoires."

  # Austrian IGs
 austrian_aristocracy:0 "Aristocratie autrichienne"
 austrian_aristocracy_desc: "L'Aristocratie autrichienne représente la noble classe établie d'Autriche, historiquement décernée avec des titres nobles par les empereurs romains et les archiducs de Habsbourg d'Autriche, et possédant une grande influence au sein de la cour impériale."

  # Misc Igs
 ig_red_army:0 "Armée rouge"
 ig_red_army_desc:0 "L'Armée Rouge est une institution dédiée à la défense et à la propagation de la Révolution, née par la fusion des forces armées traditionnelles avec le prolétariat et l'idéologie communiste."
 ig_fellahin: "Fellahin"
 ig_fellahin_desc: "Tirant leur nom des labours qu'ils travaillent et des champs qu'ils ont jusqu'à, les flathin sont les paysans et les paysans d'Égypte."

  # Indian IGs
  ig_zamindars: "Zamindars"
  ig_zamindars_desc: "Les Zamindar sont les propriétaires typiquement héréditaires de grands domaines. Ils représentent souvent les restes de l'aristocratie de l'ère Mughal, accordant le droit de percevoir des recettes foncières pour le compte de leurs dirigeants."

  ig_east_india_company: "Compagnie des Indes orientales"
  ig_east_india_company_desc: "La East India Company est la société privée chargée de gouverner l'Inde sous la supervision du Parlement britannique. Après la révocation de son mandat commercial en 1833, il est devenu un organisme purement administratif."

  ig_presidency_armies: "Présidence Armées"
  ig_presidency_armies_desc: "Les armées de la présidence sont les forces armées de l'Inde coloniale, généralement composées de sepoys indiens indigènes sous le commandement d'officiers européens."

  ig_indian_army: "Armée indienne"
  ig_indian_army_desc: "L'armée indienne est la principale force armée de l'Inde coloniale, formée en unifiant les armées de la présidence en un corps singulier. Il est composé en grande partie de soldats indiens autochtones sous le commandement d'officiers européens."

  ig_ryots: "Ryots"
  ig_ryots_desc: "Les Ryots sont les fermiers traditionnels et les paysans de l'Inde, généralement sans leur propre terre. Leurs intérêts sont en grande partie agraires."

  ig_civil_servants: "Fonctionnaires"
  ig_civil_servants_desc: "Les fonctionnaires comprennent l'intelligentsia indienne originaire qui s'est développée principalement à partir des divers organes de la bureaucratie coloniale indienne. Ils occupent généralement ou ont occupé des fonctions de commis ou d'administrateurs de niveau inférieur à intermédiaire."

  ig_government_of_india: "Gouvernement indien"
  ig_government_of_india_desc: "Le gouvernement indien fait référence à l'administration coloniale européenne chargée de promouvoir les intérêts de la couronne britannique en Inde."

  ig_bhadralok: "Bhadraloks"
  ig_bhadralok_desc: "Le Bhadralok, ou "gentlemen" englobe les classes moyennes financées de la société indienne. Ce groupe, sous sa forme actuelle, est originaire du Bengale, parmi les marchands, les industriels et les financiers bengali qui se sont alignés sur la Compagnie de l'Inde orientale lors de sa conquête de l'Inde."

  ig_kisanharu: "Kisanharu"
  ig_kisanharu_desc: "Les Kisanharu sont les paysans traditionnels du Népal, généralement sans terres. Leurs intérêts sont en grande partie agraires."
