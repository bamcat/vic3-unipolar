 acw_taliban_security_push_desc:0 "Les Taliban se sont engagés à mener une campagne plus vaste pour briser la guerre de l'attrition."
 acw_northern_alliance_mountain_resistance:0 "Résistance aux montagnes"
 acw_northern_alliance_mountain_resistance_desc:0 "L'Alliance du Nord utilise des terrains de montagne et des réseaux locaux pour résister aux offensives conventionnelles."
 acw_taliban_supply_strain:0 "La souche d'approvisionnement des Taliban"
 acw_taliban_supply_strain_desc:0 "Des pressions soutenues imposent de lourdes contraintes logistiques aux forces taliban."
 acw_northern_alliance_supply_networks:0 "Réseaux d'approvisionnement de l'Alliance du Nord"
 acw_northern_alliance_supply_networks_desc:0 "L'Alliance du Nord renforce ses réseaux d'approvisionnement locaux et externes."
 acw_afg_reward:0 "Afghanistan"
 acw_afg_reward_desc:0 "Le gouvernement taliban est sorti de la guerre civile avec un contrôle renouvelé."
 acw_ana_reward:0 "Alliance Ascendant"
 acw_ana_reward_desc:0 "L'Alliance du Nord est sortie de la guerre civile avec une légitimité renouvelée."
 
 ### ══════════════════════════════════════════
 ### SECOND INTIFADA
 ### ══════════════════════════════════════════

 je_second_intifada: "La deuxième Intifada"
 je_second_intifada_reason: "Les territoires palestiniens ont éclaté dans un soulèvement massif contre l'occupation israélienne. Dans les rues étroites et les camps de réfugiés denses, la supériorité militaire conventionnelle ne compte presque rien. Les montres du monde comme des pierres rencontrent des chars dans l'un des conflits les plus asymétriques de l'histoire moderne."

 je_intifada_complete_tt: "Une partie a été défaite ou annexée."

 je_intifada_status_uprising: "L'Intifada est dans sa phase de soulèvement #bold. Les affrontements de rue, les jets de pierres et la résistance de la guérilla dominent le conflit. Les opérations militaires conventionnelles sont pratiquement impossibles dans ce territoire confiné."
 je_intifada_status_offensive: "Une opération majeure #bold a été lancée. Le conflit est devenu une phase décisive."

 je_intifada_score_bar: "Score des conflits"
 je_intifada_score_bar_desc: "Avantage israélien"
 je_intifada_score_bar_second_desc: "Avantage palestinien"

 intifada_startup_tt: "La deuxième Intifada a commencé. Les territoires palestiniens amorcent une résistance contre l'occupation israélienne."

 ### ══════════════════════════════════════════
 ### SCRIPTED BUTTONS
 ### ══════════════════════════════════════════

 je_intifada_military_operation: "Opération Bouclier défensif"
 je_intifada_military_operation_desc: "Lancer une opération militaire à grande échelle dans les territoires palestiniens. Les forces de Tsahal se déplaceront pour réoccuper les grands centres de population, démanteler les infrastructures militantes et réprimer le soulèvement par la force."

 je_intifada_mass_resistance: "Résistance populaire de masse"
 je_intifada_mass_resistance_desc: "Escalade le soulèvement en un mouvement coordonné de résistance de masse. Les grèves générales, les manifestations de masse et l'intensification des combats de rue défieront le contrôle israélien sur tous les fronts."

 intifada_minimum_score_tt: "Nécessite un avantage de score de conflit d'au moins 5"

 ### ══════════════════════════════════════════
 ### EVENTS
 ### ══════════════════════════════════════════

 intifada_events.1.t: "Le conflit s'escalade"
 intifada_events.1.d: "Le soulèvement s'est intensifié au-delà des affrontements de rue. Ce qui a commencé par des pierres et des protestations est devenu une confrontation complète. Dans les ruelles étroites et les camps de réfugiés de Palestine, chaque bâtiment est une forteresse et chaque rue un champ de bataille."
 intifada_events.1.a: "Nous allons rétablir l'ordre"
 intifada_events.1.a.pal: "Nous n'arrêterons jamais de résister"

 intifada_events.2.t_isr: "L'Intifada se termine"
 intifada_events.2.d_isr: "La deuxième Intifada a été supprimée. Les opérations militaires israéliennes ont réaffirmé le contrôle des territoires palestiniens, bien que le coût de la réputation internationale et de la vie civile palestinienne ait été énorme. Les griefs sous-jacents demeurent non résolus."
 intifada_events.2.t_pal: "Résistance palestinienne"
 intifada_events.2.d_pal: "La deuxième Intifada a réalisé ce qui semblait impossible. Grâce à sa détermination et à ses sacrifices, le peuple palestinien a contraint Israël à la table des négociations. Le monde a été témoin de la puissance de la résistance populaire contre l'occupation."
 intifada_events.2.a: "Et ensuite ?"

 intifada_events.5.t: "Clashes de rue"
 intifada_events.5.d: "Des jeunes Palestiniens se sont rassemblés aux abords des postes de contrôle israéliens, armés de pierres et de pneus brûlants. Les rues étroites canalisent l'affrontement dans une lutte de quartier proche où les véhicules blindés israéliens ne peuvent pas manœuvrer efficacement. Les caméras de télévision du monde entier enregistrent les scènes."
 intifada_events.5.a: "Intensifier la résistance"
 intifada_events.5.b: "Afficher la retenue"

 intifada_events.6.t: "Raids de point de contrôle"
 intifada_events.6.d: "Les postes de contrôle militaires israéliens qui divisent les communautés palestiniennes représentent à la fois un symbole d'occupation et une cible tactique. Une grève coordonnée pourrait perturber le contrôle israélien des mouvements à l'intérieur des territoires, mais elle entraînera des représailles sévères."
 intifada_events.6.a: "Frappe les points de contrôle"
 intifada_events.6.b: "Trop dangereux"

 intifada_events.8.t: "Couverture médiatique internationale"
 intifada_events.8.d: "Les médias internationaux diffusent des images du soulèvement dans le monde entier. Des scènes de civils palestiniens confrontés aux forces militaires israéliennes ont suscité des protestations et des condamnations dans les capitales du monde entier. Les nations de la Ligue arabe se rallient à la cause palestinienne, tandis qu'Israël fait face à une pression diplomatique croissante."
 intifada_events.8.a: "Le monde regarde"

 intifada_events.7.t: "La deuxième Intifada"
 intifada_events.7.d: "Les territoires palestiniens ont éclaté. Après des années d ' échec des négociations de paix et de poursuite de l ' expansion des colonies, la frustration du peuple palestinien s ' est transformée en soulèvement ouvert. Dans les rues escarpées de Gaza et les collines de Cisjordanie, une nouvelle génération prend la lutte."
 intifada_events.7.a: "Cela définira une génération"

 ### ══════════════════════════════════════════
 ### MODIFIERS
 ### ══════════════════════════════════════════

 intifada_urban_uprising: "Amélioration urbaine"
 intifada_urban_uprising_desc: "Les combats se déroulent dans des zones urbaines densément peuplées et des camps de réfugiés où les forces militaires conventionnelles ne peuvent pas fonctionner efficacement. Le petit territoire rend pratiquement impossible les manœuvres à grande échelle."

 intifada_isr_morale: "Momentum des FDI"
 intifada_isr_morale_desc: "Les succès militaires ont renforcé la détermination israélienne à réprimer le soulèvement."

 intifada_popular_resistance: "Résistance populaire"
 intifada_popular_resistance_desc: "Le peuple palestinien a connu une résistance massive. Chaque quartier est un bastion, chaque civil un combattant potentiel."

 intifada_stone_throwing: "Résistance des rues"
 intifada_stone_throwing_desc: "Les affrontements de rue et les jets de pierres ont rendu les zones occupées extrêmement difficiles à contrôler par les forces israéliennes."

 intifada_idf_crackdown: "Craquage des FDI"
 intifada_idf_crackdown_desc: "Les opérations militaires israéliennes dans les zones civiles font de nombreuses victimes."

 intifada_devastation: "Intifada Destruction"
 intifada_devastation_desc: "Les combats ont dévasté les habitations, les infrastructures et les moyens de subsistance sur tout le territoire."

 intifada_raid_expenses: "Opérations de résistance"
 intifada_raid_expenses_desc: "Financement d'opérations de résistance coordonnées contre des positions militaires israéliennes."

 intifada_international_pressure: "Pression internationale"
 intifada_international_pressure_desc: "La couverture médiatique mondiale du conflit a porté atteinte à la réputation internationale et diplomatique d'Israël."

 intifada_isr_reward: "Intifada supprimée"
 intifada_isr_reward_desc: "Israël a supprimé la deuxième Intifada, réaffirmant le contrôle militaire sur les territoires palestiniens."

 intifada_pal_reward: "Résistance Victoire"
 intifada_pal_reward_desc: "Le peuple palestinien a prévalu par la résistance populaire, la reconnaissance et les concessions par le sacrifice."
 
 je_israel_palestine_peacetime:0 "L'état précaire Quo"
 je_israel_palestine_peacetime_reason:0 "Il n'y a pas d'intifada ouverte ni d'escalade majeure, mais le conflit se poursuit par la coordination de la sécurité, les bouclages, la diplomatie, les manifestations et les incidents périodiques."
 je_israel_palestine_tension_bar:0 "Tension de conflit"
 je_israel_palestine_tension_bar_desc:0 "Instabilité régionale"
 je_israel_palestine_tension_bar_second_desc:0 "Une tension élevée peut déclencher un avertissement d'escalade majeure et peut être connecté à votre système Second Intifada."

 je_ip_peacetime_status_calm:0 "La situation est relativement calme. La coordination de la sécurité, les négociations et la médiation internationale maintiennent une escalade plus large."
 je_ip_peacetime_status_fragile:0 "Le calme est fragile. Les incidents, les raids, les fermetures, les manifestations ou les conflits de règlement pourraient rapidement annuler l'équilibre actuel."
 je_ip_peacetime_status_crisis:0 "La situation est au bord d'une escalade majeure. Un seul incident peut suffire à briser le statu quo."
 je_ip_peacetime_complete_tt:0 "La tension est très faible, les négociations sont avancées et la coordination de la sécurité est durable."

 je_ip_peacetime_security_coordination:0 "Coordination de la sécurité"
 je_ip_peacetime_security_coordination_desc:0 "Développer la coordination pratique pour éviter que les incidents locaux ne deviennent une crise plus vaste. Cela réduit la tension, mais peut créer des réactions politiques internes."

 je_ip_peacetime_closure_policy:0 "Politique de clôture"
 je_ip_peacetime_closure_policy_desc:0 "Renforcer les contrôles des mouvements et des accès afin de réduire les risques immédiats pour la sécurité. Cela réduit la tension à court terme, mais nuit à l'économie palestinienne et accroît la pression internationale."

 je_ip_peacetime_settlement_freeze:0 "Gel du règlement"
 je_ip_peacetime_settlement_freeze_desc:0 "Annoncez un gel temporaire de l'expansion des colonies. Cela améliore les négociations et la position internationale, mais crée un contrecoup national."

 je_ip_peacetime_international_mediation:0 "Médiation internationale"
 je_ip_peacetime_international_mediation_desc:0 "Inviter les médiateurs extérieurs à stabiliser les pourparlers. Cela améliore l'élan des négociations, mais augmente le contrôle externe."

 je_ip_peacetime_grassroots_outreach:0 "Sensibilisation des communautés"
 je_ip_peacetime_grassroots_outreach_desc:0 "Soutenir la société civile, l'organisation locale et les initiatives politiques non violentes. Cela abaisse la tension mais peut irriter les hardliners."

 je_ip_peacetime_mass_mobilization:0 "Mobilisation de masse"
 je_ip_peacetime_mass_mobilization_desc:0 "Diriger la frustration publique vers une mobilisation organisée. Cela accroît la pression internationale mais risque de pousser la situation vers l'escalade."

 ip_uneasy_status_quo:0 "Situation difficile Quo"
 ip_uneasy_status_quo_desc:0 "Les combats ouverts ont diminué, mais le conflit continue de façonner la politique, la diplomatie et l'administration quotidienne."

 ip_security_coordination:0 "Coordination de la sécurité"
 ip_security_coordination_desc:0 "La coordination entre les forces de sécurité limite l'escalade, bien que politiquement coûteuse."

 ip_closure_policy:0 "Politique de clôture"
 ip_closure_policy_desc:0 "Les restrictions à la circulation réduisent certains risques pour la sécurité tout en augmentant les pressions diplomatiques et humanitaires."

 ip_economic_restrictions:0 "Restrictions économiques"
 ip_economic_restrictions_desc:0 "Les restrictions à la circulation et à l'accès perturbent la vie économique."

 ip_settlement_freeze:0 "Gel du règlement"
 ip_settlement_freeze_desc:0 "Une pause temporaire dans les activités de colonisation a amélioré les conditions diplomatiques."

 ip_international_mediation:0 "Médiation internationale"
 ip_international_mediation_desc:0 "Des médiateurs extérieurs tentent de maintenir le processus politique en vie."

 ip_grassroots_outreach:0 "Sensibilisation des communautés"
 ip_grassroots_outreach_desc:0 "La société civile et les initiatives politiques locales s'efforcent d'empêcher que la situation ne s'aggrave."

 ip_mass_mobilization:0 "Mobilisation de masse"
 ip_mass_mobilization_desc:0 "La mobilisation publique augmente la pression politique, mais aussi le risque d'affrontement."

 ip_security_alert:0 "Alerte de sécurité"
 ip_security_alert_desc:0 "Les forces de sécurité sont en alerte renforcée après les troubles récents."

 ip_international_scrutiny:0 "Examen international"
 ip_international_scrutiny_desc:0 "Les gouvernements étrangers et les médias suivent de près l'évolution de la situation."

 ip_political_backlash:0 "Rétroaction politique"
 ip_political_backlash_desc:0 "Le compromis ou la coordination a irrité les opposants nationaux."

 ip_stabilized_peace_process:0 "Processus de paix stabilisé"
 ip_stabilized_peace_process_desc:0 "Une période rare de faible tension et de coordination soutenue a créé un environnement diplomatique plus stable."

 ip_breakdown_of_calm:0 "Ventilation du calme"
 ip_breakdown_of_calm_desc:0 "Le statu quo en temps de paix s'est effondré et le public se prépare à l'escalade."

 ip_peacetime.1.t:0 "Incident de point de contrôle"
 ip_peacetime.1.d:0 "Un incident de sécurité locale a attiré l'attention du public et a suscité des pressions pour une intervention."
 ip_peacetime.1.f:0 "Même les confrontations mineures peuvent devenir des symboles du conflit plus large."
 ip_peacetime.1.a:0 "Renforcer les procédures de sécurité."
 ip_peacetime.1.b:0 "Coordonner tranquillement avec les autorités locales."

 ip_peacetime.2.t:0 "Sécurisation"
 ip_peacetime.2.d:0 "Les forces de sécurité palestiniennes font face à des pressions pour qu ' elles agissent contre les militants et les factions armées."
 ip_peacetime.2.f:0 "La coopération peut empêcher l'escalade, mais elle peut aussi ressembler à une collaboration."
 ip_peacetime.2.a:0 "Contre les réseaux."
 ip_peacetime.2.b:0 "Éviter une confrontation."

 ip_peacetime.3.t:0 "Avis de règlement"
 ip_peacetime.3.d:0 "Une expansion proposée est devenue un point d'éclair dans le processus diplomatique."
 ip_peacetime.3.f:0 "Les cartes, les permis et les sommets peuvent porter le poids de la stratégie nationale."
 ip_peacetime.3.a:0 "Passez à l'annonce."
 ip_peacetime.3.b:0 "Retardez l'expansion."

 ip_peacetime.4.t:0 "Manifestations de rue"
 ip_peacetime.4.d:0 "Des manifestations se sont répandues dans plusieurs communautés, ce qui remet en question l'équilibre politique actuel."
 ip_peacetime.4.f:0 "La rue peut être une soupape de sécurité, ou le premier signe de quelque chose de plus grand."
 ip_peacetime.4.a:0 "Que la mobilisation se poursuive."
 ip_peacetime.4.b:0 "Appel à la retenue."

 ip_peacetime.5.t:0 "Envoyé international"
 ip_peacetime.5.d:0 "Un envoyé étranger est arrivé avec des propositions pour un dialogue renouvelé."
 ip_peacetime.5.f:0 "La diplomatie résout rarement le conflit à la fois, mais elle peut gagner du temps."
 ip_peacetime.5.a:0 "Recevez l'envoyé."
 ip_peacetime.5.b:0 "Rejeter la pression extérieure."

 ip_peacetime.6.t:0 "Conférence des donateurs"
 ip_peacetime.6.d:0 "Les donateurs étrangers offrent un nouveau soutien, mais attendent des concessions politiques en retour."
 ip_peacetime.6.f:0 "L'aide peut stabiliser les institutions, mais la dépendance porte ses propres coûts."
 ip_peacetime.6.a:0 "Accepter le cadre diplomatique."
 ip_peacetime.6.b:0 "Demander moins de conditions."

 ip_peacetime.10.t:0 "Les pauses calmes"
 ip_peacetime.10.d:0 "La pression accumulée des raids, des protestations, des bouclages, des ruptures politiques et des négociations ratées a amené la situation au bord."
 ip_peacetime.10.f:0 "La langue d'administration cède la place à la langue d'urgence."
 ip_peacetime.10.a:0 "Préparez-vous à l'escalade."
 ip_peacetime.10.b:0 "Faites une dernière poussée d'urgence."

 ip_peacetime.20.t:0 "Un calme durable"
 ip_peacetime.20.d:0 "Une combinaison rare de coordination de la sécurité, de retenue politique et d'engagement diplomatique a stabilisé la situation."
 ip_peacetime.20.f:0 "Ce n'est pas une paix définitive, mais c'est plus que l'absence de guerre."
 ip_peacetime.20.a:0 "Un succès fragile."
 
 oslo_accords.1.t:0 "Accord d'Oslo I"
 oslo_accords.1.d:0 "Les négociateurs israéliens sont parvenus à une proposition de déclaration de principes avec les dirigeants palestiniens. La proposition établirait une reconnaissance mutuelle et un cadre intérimaire pour l'autonomie palestinienne."
 oslo_accords.1.f:0 "L'accord ne règle pas les frontières, Jérusalem, les colonies de peuplement, les réfugiés ou la souveraineté finale. Il offre toutefois un processus politique échelonné."
 oslo_accords.1.a:0 "Proposer la Déclaration de principes."
 oslo_accords.1.b:0 "Retardez l'accord."

 oslo_accords.10.t:0 "Israël propose l'Accord d'Oslo I"
 oslo_accords.10.d:0 "Israël a proposé une déclaration de principes établissant la reconnaissance mutuelle et un cadre provisoire d'autonomie palestinienne."
 oslo_accords.10.f:0 "L'acceptation commencerait un nouveau processus politique et mettrait fin à la subordination officielle à Israël, mais de nombreuses questions relatives au statut final resteraient en suspens."
 oslo_accords.10.a:0 "Accepter la Déclaration de principes."
 oslo_accords.10.b:0 "Rejeter la proposition."

 oslo_accords.11.t:0 "Palestine accepte Oslo I"
 oslo_accords.11.d:0 "Les dirigeants palestiniens ont accepté la Déclaration de principes. Le processus de paix intérimaire a commencé."
 oslo_accords.11.f:0 "La poignée de main est historique; le travail difficile ne fait que commencer."
 oslo_accords.11.a:0 "Le processus commence."

 oslo_accords.12.t:0 "Palestine rejette Oslo I"
 oslo_accords.12.d:0 "Les dirigeants palestiniens ont rejeté la déclaration de principes proposée."
 oslo_accords.12.f:0 "Sans acceptation mutuelle, l'ouverture diplomatique se termine."
 oslo_accords.12.a:0 "Les pourparlers s'effondrent."

 oslo_accords.2.t:0 "Accord d'Oslo II"
 oslo_accords.2.d:0 "Deux ans après la Déclaration de principes, les négociateurs israéliens ont élaboré un accord intérimaire qui étend l'autonomie palestinienne en Cisjordanie et à Gaza."
 oslo_accords.2.f:0 "La proposition divise l'autorité en zones de contrôle palestinien, de responsabilité partagée et de contrôle israélien continu."
 oslo_accords.2.a:0 "Proposer l'accord intérimaire."
 oslo_accords.2.b:0 "Retarder le redéploiement."

 oslo_accords.20.t:0 "Israël propose l ' Accord d ' Oslo II"
 oslo_accords.20.d:0 "Israël a proposé un accord intérimaire visant à étendre l'autonomie palestinienne et à organiser la Cisjordanie dans les zones A, B et C."
 oslo_accords.20.f:0 "L'accord promet un pouvoir élargi, mais entre aussi une carte fragmentée des compétences qui se chevauchent."
 oslo_accords.20.a:0 "Accepter l'Accord intérimaire."
 oslo_accords.20.b:0 "Rejeter la proposition."

 oslo_accords.21.t:0 "Palestine accepte Oslo II"
 oslo_accords.21.d:0 "Les dirigeants palestiniens ont accepté l'Accord intérimaire. Le processus d'Oslo entre dans sa prochaine phase."
 oslo_accords.21.f:0 "Plus d'autorité est transférée, mais le règlement final reste lointain."
 oslo_accords.21.a:0 "Mettre en œuvre l'accord."

 oslo_accords.22.t:0 "Palestine rejette Oslo II"
 oslo_accords.22.d:0 "Les dirigeants palestiniens ont rejeté le projet d'accord intérimaire."
 oslo_accords.22.f:0 "La structure construite par Oslo I survit, mais sa prochaine étape a échoué."
 oslo_accords.22.a:0 "Le processus s'arrête."

 oslo_i_peace_process:0 "Processus de paix d ' Oslo I"
 oslo_i_peace_process_desc:0 "La Déclaration de principes a ouvert un processus de paix provisoire formel."

 oslo_i_palestinian_authority:0 "Autorité palestinienne"
 oslo_i_palestinian_authority_desc:0 "Une autorité palestinienne intérimaire a commencé à assumer des responsabilités civiles."

 oslo_talks_delayed:0 "Discussions différées"
 oslo_talks_delayed_desc:0 "Le processus diplomatique a pris du retard, ce qui a suscité frustration et incertitude."

 oslo_ii_interim_agreement:0 "Accord intérimaire d ' Oslo II"
 oslo_ii_interim_agreement_desc:0 "L'accord intérimaire a élargi le cadre de l'autonomie palestinienne."

 oslo_ii_expanded_self_government:0 "Élargissement de l'autonomie gouvernementale"
 oslo_ii_expanded_self_government_desc:0 "Les institutions palestiniennes ont assumé de plus grandes responsabilités administratives."

 oslo_ii_joint_security_framework:0 "Cadre commun de sécurité"
 oslo_ii_joint_security_framework_desc:0 "Les responsabilités en matière de sécurité sont coordonnées dans le cadre intérimaire."

 oslo_ii_administrative_fragmentation:0 "Fragmentation administrative"
 oslo_ii_administrative_fragmentation_desc:0 "Le territoire est régi par des juridictions fragmentées et qui se chevauchent."

 oslo_ii_delayed_redeployment:0 "Retard du redéploiement"
 oslo_ii_delayed_redeployment_desc:0 "Un nouveau redéploiement a été retardé, ce qui nuit à la confiance dans le processus."

 oslo_accords.30.t:0 "L'Accord d'Oslo I est signé"
 oslo_accords.30.d:0 "Israël et la Palestine ont accepté la Déclaration de principes. Les États-Unis devraient maintenant appuyer le nouveau processus de paix et contribuer à maintenir le cadre intérimaire."
 oslo_accords.30.f:0 "Une ouverture diplomatique est apparue, mais elle aura besoin de garants, d'argent, de pression et de patience."
 oslo_accords.30.a:0 "Surveillez le processus."

 oslo_accords.31.t:0 "Les défis de l'Accord d'Oslo I"
 oslo_accords.31.d:0 "La Déclaration de principes proposée a été rejetée. L'ouverture diplomatique s'est terminée avant qu'un cadre intérimaire puisse être établi."
 oslo_accords.31.f:0 "Sans acceptation mutuelle, la médiation extérieure ne peut mener le processus seul."
 oslo_accords.31.a:0 "Un revers pour la médiation."

 oslo_accords.32.t:0 "L'Accord d'Oslo II est signé"
 oslo_accords.32.d:0 "Israël et la Palestine ont accepté l'Accord intérimaire, élargissant l'autonomie palestinienne et établissant la prochaine étape du processus d'Oslo."
 oslo_accords.32.f:0 "L'accord est un succès diplomatique, mais sa carte d'autorité divisée peut s'avérer difficile à administrer."
 oslo_accords.32.a:0 "Appui à la mise en œuvre."

 oslo_accords.33.t:0 "Les échecs de l'Accord d'Oslo II"
 oslo_accords.33.d:0 "L'accord intérimaire proposé a été rejeté. Le processus d'Oslo reste incomplet et le cadre territorial-administratif est désormais incertain."
 oslo_accords.33.f:0 "La première étape n'était pas suffisante pour garantir la seconde."
 oslo_accords.33.a:0 "Le processus s'arrête."

 oslo_i_proposal_sent_tt:0 "Israël propose l ' Accord d ' Oslo I à la Palestine. Le traité ne prendra effet que si la Palestine l'accepte."
 oslo_i_israel_delay_tt:0 "Israël retarde la proposition. Le processus de paix s'arrête et la tension augmente."
 oslo_i_palestine_accept_tt:0 "La Palestine accepte Oslo I : la Palestine devient indépendante, les relations s'améliorent, et Oslo II sera proposé 720 jours plus tard."
 oslo_i_palestine_reject_tt:0 "La Palestine rejette Oslo I : les effets du traité ne se produisent pas et le processus de paix s'arrête."
 oslo_ii_proposal_sent_tt:0 "Israël propose l'Accord intérimaire d'Oslo II à la Palestine. Le traité ne prendra effet que si la Palestine l'accepte."
 oslo_ii_israel_delay_tt:0 "Israël retarde la proposition d ' Oslo II. Nouveaux stands de redéploiement."
 oslo_ii_palestine_accept_tt:0 "La Palestine accepte Oslo II : l'autonomie élargie, les arrangements de sécurité conjoints et les effets de la zone A/B sont appliqués."
 oslo_ii_palestine_reject_tt:0 "La Palestine rejette Oslo II : les effets d'Oslo II ne se produisent pas et le processus intérimaire s'arrête."

