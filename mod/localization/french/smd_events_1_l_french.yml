 # ==========================================
 
 korea_reunification_bonus:0 "Corée réunifiée"
 korea_reunification_bonus_desc:0 "La division de la péninsule coréenne a pris fin. La nation est entière pour la première fois depuis 1945. L'autorité, la légitimité et le prestige sont considérablement améliorés. Les pressions séparatistes et révolutionnaires sont supprimées. L'État [ROOT.GetCountry.GetAdjective] peut commencer à intégrer une Corée unifiée."
 
 korea_stk_integration_bonus:0 "Intégration nordique"
 korea_stk_integration_bonus_desc:0 "[ROOT.GetCountry.GetName] absorbe l'ancien territoire [SCOPE.sCountry('c:NRK').GetAdjective]. L'écart économique et administratif entre le nord et le sud est considérable — l'intégration exige des investissements soutenus et une intégration accélérée. Les coûts sont réels, mais l'objectif est une Corée unifiée."
 
 y2k_events.1.t: "Le Bug du millénaire"
 y2k_events.1.d: "À l'approche de l'an 2000, une anxiété tranquille a saisi [ROOT.GetCountry.GetAdjective] ingénieurs, bureaucrates et services informatiques. Le problème dit Y2K — la découverte que la plupart des systèmes informatiques stockent l'année sous la forme de deux chiffres, et interpréteront donc '00' comme 1900 plutôt que 2000 — a déclenché un brouillage global.\n\n Certains disent que les conséquences pourraient être catastrophiques: défaillance des réseaux électriques, corruption des systèmes bancaires, contrôle de la circulation aérienne. D'autres disent que la préoccupation est terriblement exagérée et que les consultants qui vendent des audits de conformité s'enrichissent tout simplement de la panique. [ROOT.GetCountry.GetName] doit décider à quel point il faut le prendre au sérieux."
 y2k_events.1.f: "Minuit arrive. Que les lumières restent allumées est une autre question."
 
 y2k_events.1.a: "Investir dans la conformité complète à l'an 2000"
 y2k_events.1.a_tt: "Cher, approfondi, et probablement inutile — mais si même une fraction des prévisions sont justes, le coût de ne rien faire est beaucoup plus élevé. [ROOT.GetCountry.GetName] financera des programmes de conformité dans l'ensemble des infrastructures essentielles."
 y2k_events.1.b: "Il est évidemment exagéré — ignorez-le"
 y2k_events.1.b_tt: "La panique est une industrie de conseil mine d'or et rien de plus. [ROOT.GetCountry.GetName] ne gaspillera pas les fonds publics sur un problème imaginaire."
 
 # ── NEW YEAR 2000 ─────────────────────────
 
 y2k_events.2.t: "Bonne année — Bienvenue en 2000"
 y2k_events.2.d: "Les horloges sont passées à minuit le 31 décembre 1999, et les lumières sont restées allumées.\n\n Les avions ont continué à voler. Les banques ont ouvert. Les réseaux électriques bombés. L'eau coule. Le bogue du millénaire, la catastrophe la plus attendue dans l'histoire de l'informatique, est arrivé avec un murmure plutôt qu'un bang — ou peut-être il n'est jamais arrivé du tout, et les milliards dépensés pour la conformité ont tout simplement fonctionné.\n\n De l'autre côté de [ROOT.GetCountry.GetName], les foules remplissaient les rues, les feux d'artifice allumaient le ciel, et pendant une nuit, le monde se sentait, brièvement, comme s'il reprenait. Le XXIe siècle a commencé. Ce qui vient ensuite, c'est n'importe qui."
 y2k_events.2.f: "L'année est 2000. Le monde ne s'est pas arrêté. C'est une bonne nouvelle."
 
 y2k_events.2.a: "Un nouveau siècle commence"
 
 # ── MODIFIERS ────────────────────────────
 
 y2k_compliance_investment: "Programmes de conformité Y2K"
 y2k_compliance_investment_desc: "[ROOT.GetCountry.GetName] a investi dans la conformité complète à l'an 2000 dans l'ensemble des infrastructures essentielles. Le coût est réel, mais les systèmes sont prêts pour ce que minuit apporte."
 
 millennium_celebration: "Célébrations du millénaire"
 millennium_celebration_desc: "L'an 2000 est arrivé sans catastrophe. L'ambiance publique est dynamique, les rues sont encore pleines de revelers, et [ROOT.GetCountry.GetName] entre dans le nouveau siècle avec un optimisme prudent."
 
 y2k_minor_disruption: "Perturbation Y2K"
 y2k_minor_disruption_desc: "[ROOT.GetCountry.GetName] a rejeté les préoccupations relatives à l'an 2000 et fait maintenant face à des perturbations mineures mais réelles, car les systèmes non préparés se déplacent vers la nouvelle année. Rien de catastrophique, mais les critiques n'étaient pas totalement fausses non plus."
 
  # ── TAGENTOPOLI ──────────────────────

 je_tangentopoli: "Tangentopoli"
 je_tangentopoli_reason: "L'Italie a un système de pots-de-vin. Les marchés publics — construction, infrastructure, achats de défense, soins de santé — sont attribués à des entreprises qui paient un pourcentage aux partis politiques. Les démocrates chrétiens prennent leur part. Les socialistes prennent le leur. Les plus petits partenaires de la coalition prennent le leur. Tout le monde sait. Tout le monde y participe. C'est ainsi depuis la guerre.\n\n Le système est appelé #bold Tangentopoli#! — Bribe City. Il est stable, efficace et totalement corrompu. La seule question est de savoir si elle peut survivre au contact d'un juge qui refuse de regarder de l'autre côté."

 je_mani_pulite: "Mani Pulite"
 je_mani_pulite_reason: "L'enquête est en cours. Le juge Antonio Di Pietro et le groupe de magistrats de Milan travaillent à travers le réseau de pots-de-vin et de pots-de-vin qui a financé la politique italienne depuis la création de la République. Chaque arrestation conduit à des aveux. Chaque confession mène à un nom. Chaque nom conduit à une autre arrestation.\n\n La classe politique se bat. Décrets d'urgence, transferts de magistrats, attaques publiques contre le pouvoir judiciaire. La question est de savoir si l'enquête peut aboutir à sa conclusion avant que le système ne trouve un moyen de l'arrêter.\n\n@information! La barre d'enquête #bold suit les progrès des magistrats. La barre de résistance #bold#! suit la capacité de la classe politique de les fermer."

 # Status descs — tangentopoli
 je_tangentopoli_contained_tt: "L'enquête en est à ses débuts. Quelques personnalités mineures ont été arrêtées. La classe politique le rejette comme une affaire provinciale."
 je_tangentopoli_spreading_tt: "#bold L'enquête se répand.#! Les confessions s'accumulent. Les noms émergent. Les magistrats de Milan suivent chaque fil."
 je_tangentopoli_critical_tt: "@warning! #bold Le système est au point de rupture.#! L'échelle de Tangentopoli devient indéniable. Une crise politique est imminente."

 # Status descs — mani pulite
 je_mani_pulite_early_tt: "L'enquête renforce la dynamique. L'équipe de Di Pietro travaille sur les preuves. La classe politique n'a pas encore organisé de réponse cohérente."
 je_mani_pulite_winning_tt: "#bold L'enquête gagne.#! Les magistrats sont en avance sur la résistance. Les noms tombent plus vite que le système ne peut les contenir."
 je_mani_pulite_stalemate_tt: "@warning! L'enquête et la résistance politique sont identiques. Le résultat dépend des prochaines étapes."
 je_mani_pulite_suppressed_tt: "@warning! #bold La résistance politique gagne le dessus.#! Le système s'organise. L'enquête peut être enterrée avant d'en arriver à sa conclusion."

 # Progress bars
 tangentopoli_exposure_bar: "Exposition au réseau"
 tangentopoli_exposure_bar_desc: "Jusqu'où le réseau de corruption a été pénétré."
 tangentopoli_exposure_bar_second_desc: "L'exposition se développe organiquement alors que chaque arrestation conduit à plus de confessions."
 tangentopoli_bar_from_exposure: "Exposition judiciaire continue du réseau Tangentopoli"

 investigation_progress_bar: "Progrès de l'enquête"
 investigation_progress_bar_desc: "Jusqu'où les magistrats de Di Pietro sont arrivés."
 investigation_bar_progress: "Les magistrats avancent par les preuves"

 political_resistance_bar: "Résistance politique"
 political_resistance_bar_desc: "Résistance à l'enquête"
 political_resistance_bar_progress: "La classe politique s'organise contre les magistrats"

 # ── EVENT TITLES AND TEXT ────────────────

 mani_pulite.1.t: "Un homme d'affaires essaie de faire couler vingt millions de lires"
 mani_pulite.1.d: "Mario Chiesa, président du Pio Albergo Trivulzio, maison de retraite de Milan, a été arrêté par le juge Antonio Di Pietro alors qu'il tentait de vider les billets des toilettes. Chiesa avait reçu un coup de pied de 37 millions de lires d'une entreprise de nettoyage.\n\n Les socialistes l'ont immédiatement renié. Leur secrétaire du parti, Bettino Craxi, appelle Chiesa "un voleur" — pas un choix de mots très sage, étant donné ce que Di Pietro trouvera ensuite. L'arrestation est mineure. Ce qu'il mènera à n'est pas."
 mani_pulite.1.f: "Une arrestation systématique. Ou alors il semblait."
 mani_pulite.1.a: "Un embarras local. Le système est sécurisé."

 mani_pulite.2.t: "Les premières confessions"
 mani_pulite.2.d: "Face à la prison, des fonctionnaires mineurs ont commencé à parler. Non pas en échange de l'immunité — il n'y a pas d'accord formel —, mais parce que le barrage a rompu et que la logique du silence ne tient plus. Chaque nom mène à un autre. Chaque nom mène à une fête. Chaque partie mène à un ministère.\n\n L'enquête ne porte plus sur un homme avec une toilette pleine de billets. Il s'agit de toute l'architecture financière de la République."
 mani_pulite.2.f: "Quand un homme parle, ils parlent tous."
 mani_pulite.2.a: "Que l'enquête avance — il n'y a pas d'arrêt maintenant"
 mani_pulite.2.b: "Utiliser la pression de l'exécutif pour contenir la propagation"

 mani_pulite.5.t: "Mani Pulite — Italie apprend ce que tout le monde sait"
 mani_pulite.5.d: "Le pool de magistrats de Milan — Di Pietro, Colombo, Davigo, Borrelli — est devenu public. Les preuves qu'ils ont accumulées rendent indéniable l'échelle : au cours des dernières décennies, pratiquement tous les contrats publics en Italie ont été assortis d'un coup de pouce. Les partis qui dirigeaient la République consommaient collectivement un pourcentage de chaque route, chaque hôpital, chaque école.\n\n Les journaux italiens ont un nom pour cela : #bold Tangentopoli#!. Bribe City. La première République est en procès."
 mani_pulite.5.f: "Tout le monde le savait. Maintenant tout le monde sait que tout le monde le savait."
 mani_pulite.5.a: "L'enquête ira où elle mène"

 mani_pulite.6.t: "Avvisi di Garanzia"
 mani_pulite.6.d: "Les avis d'enquête arrivent à [ROOT.GetCountry.GetName] — pour les hommes d'affaires, les fonctionnaires du ministère, les trésoriers du parti, les maires. Le #italic avviso di garanzia#!, une notification selon laquelle l'enquête est en cours, est devenu un raccourci pour la honte. Les journaux les impriment à la une. Les carrières se terminent du jour au lendemain.\n\n[SCOPE.gsInterestGroup('indicted_ig').GetName], entre autres, ont été avisées. L'enquête ne se limite plus à Milan."
 mani_pulite.6.f: "Le facteur n'a jamais été aussi redouté."
 mani_pulite.6.a: "Coopérer — la résistance ne fera qu'empirer"
 mani_pulite.6.b: "Faire pression sur le pouvoir judiciaire"

 mani_pulite.7.t: "Craxi et les pièces"
 mani_pulite.7.d: "Bettino Craxi — ancien Premier ministre, secrétaire du Parti socialiste, le plus puissant politicien italien depuis une décennie — est sorti de l'hôtel Raphael à Rome pour faire face à une foule de plusieurs centaines de citoyens.\n\n Ils l'ont frappé avec des pièces et des tomates. Les pièces, parce qu'elles savent d'où vient l'argent.\n\n Craxi a fait une brève déclaration pour défendre le système de financement du parti — «tout le monde savait, tout le monde participait» — et s'est retiré à l'intérieur. Dans les mois, il s'envolera vers sa villa à Hammamet, en Tunisie. Il ne reviendra jamais en Italie. Les socialistes, le parti qu'il a construit, cesseront d'exister."
 mani_pulite.7.f: "Un homme qui a volé un pays, chassé par des pièces de monnaie."
 mani_pulite.7.a: "L'ancien système est terminé — qu'il tombe"
 mani_pulite.7.b: "Gérer la transition — accepter la responsabilité, chercher une réforme"

 mani_pulite.8.t: "L'enquête touche le Sud"
 mani_pulite.8.d: "Tangentopoli n'a jamais été qu'un phénomène nordique. Dans [SCOPE.sState('tangentopoli_south_state').GetName] et à travers le Mezzogiorno, le système de coup de pied a été intégré aux subventions agricoles de l'UE, aux projets d'infrastructure publique et au réseau de relations entre la politique locale et le crime organisé.\n\nL'enquête de Di Pietro a suivi l'argent au sud. Les réseaux politiques de [SCOPE.sState('tangentopoli_south_state').GetName] sont plus anciens et plus profondément enracinés que leurs homologues du Nord. Ils ne se sépareront pas facilement."
 mani_pulite.8.f: "La corruption est tombée."
 mani_pulite.8.a: "Étendre l'enquête — aucune exception"
 mani_pulite.8.b: "Contient l'enquête dans le Nord — le Sud est trop complexe"

 mani_pulite.9.t: "Décret de Biondi"
 mani_pulite.9.d: "Le ministre de la Justice Alfredo Biondi a publié un décret d'urgence qui interdirait le recours à la garde à vue pour toute une série d'infractions financières, y compris précisément les crimes au cœur de Mani Pulite. Les critiques l'ont immédiatement nommé le décret #italic salvaladri#! : la loi 'save-thieves'.\n\n Dans les 24 heures, les magistrats de Milan ont annoncé leur démission collective en signe de protestation. La réponse du public est écrasante. Les procureurs de toute l'Italie ont reçu des lettres de soutien de centaines de milliers de citoyens. Le coût politique de la procédure devient visible."
 mani_pulite.9.f: "Un gouvernement qui adopte une loi pour protéger ses propres criminels ne survit pas longtemps à cette tentative."
 mani_pulite.9.a: "Poussez le décret — l'enquête doit être contenue"
 mani_pulite.9.b: "Retirez le décret — la réaction publique est trop forte"

 mani_pulite.10.t: "La première République est morte"
 mani_pulite.10.d: "C'est fini. La démocratie chrétienne, parti qui a gouverné l'Italie sans interruption depuis 1948, s'est dissoute. Les socialistes sont partis. Les petits partis de coalition sont partis. Quarante-cinq ans de la Première République, démantelée en deux ans par un groupe de magistrats à Milan qui ont simplement refusé de regarder l'inverse.\n\n Plus de 1 200 hommes politiques et hommes d'affaires ont été condamnés. Cinq mille ont fait l'objet d'une enquête. D'anciens premiers ministres, ministres et industriels ont été jugés.\n\n Ce qui vient ensuite pour [ROOT.GetCountry.GetName] est incertain. Mais le système qui a alimenté la République pendant un demi-siècle est terminé."
 mani_pulite.10.f: "Les juges ont fait ce que les élections n'ont jamais pu."
 mani_pulite.10.a: "Une nouvelle Italie — embrasser la pause propre"
 mani_pulite.10.b: "Une transition gérée — réforme sans rupture"

 mani_pulite.15.t: "L'enquête est enterrée"
 mani_pulite.15.d: "La classe politique a gagné. Les magistrats ont été transférés, discrédités ou définancés. Les preuves ont été scellées. L'impulsion a été brisée.\n\n Cela ne signifie pas que Tangentopoli n'est pas arrivé. Cela signifie que les gens qui l'ont construite l'ont survécu. La corruption n'a pas pris fin — elle est devenue souterraine, sous de nouvelles formes et de nouveaux arrangements. [ROOT.GetCountry.GetName] les citoyens savent ce qui a été fait. Ils savent que ça n'a pas été puni. Cette connaissance ne disparaît pas."
 mani_pulite.15.f: "La justice différée est la justice refusée. Et tout le monde le sait."
 mani_pulite.15.a: "Le système survit — pour l'instant"

 # ── MODIFIERS ────────────────────────────

 tangentopoli_systemic_corruption: "Tangentopoli"
 tangentopoli_systemic_corruption_desc: "Le système de rétrocession qui finance la politique [ROOT.GetCountry.GetAdjective] depuis des décennies est intégré dans chaque contrat public. La légitimité est structurellement affaiblie. Le système coûte de l'argent et invite à l'infamie."

 tangentopoli_chiesa_arrest: "L'affaire Chiesa"
 tangentopoli_chiesa_arrest_desc: "L'arrestation de Mario Chiesa a ouvert la première fissure dans le système. La classe politique le rejette, mais les magistrats suivent le fil."

 tangentopoli_ig_under_scrutiny: "Enquête en cours"
 tangentopoli_ig_under_scrutiny_desc: "Ce groupe fait l'objet d'un contrôle judiciaire dans le cadre du réseau de corruption Tangentopoli. Sa force politique et son attrait populaire sont considérablement endommagés."

 tangentopoli_widening_investigation: "Enquête élargie"
 tangentopoli_widening_investigation_desc: "L'enquête s'étend au-delà de sa portée initiale. Chaque confession conduit à une nouvelle arrestation. Le coût politique de la gouvernance augmente."

 tangentopoli_suppression_attempt: "Tentative de répression"
 tangentopoli_suppression_attempt_desc: "[ROOT.GetCountry.GetName] a tenté de supprimer l'enquête judiciaire. La communauté internationale et la presse nationale l'ont noté."

 tangentopoli_party_collapse: "La fête s'effondre"
 tangentopoli_party_collapse_desc: "Ce parti a été détruit par les révélations de Tangentopoli. Sa direction est en exil ou sous mise en accusation. Ses électeurs sont partis ailleurs."

 tangentopoli_legitimacy_crisis: "Crise de légitimité"
 tangentopoli_legitimacy_crisis_desc: "La révélation de la corruption systémique a brisé la confiance du public dans les institutions [ROOT.GetCountry.GetAdjective]. Le radicalisme est en marche. L'autorité est affaiblie."

 tangentopoli_south_exposure: "Réseaux du Sud exposés"
 tangentopoli_south_exposure_desc: "L'enquête Mani Pulite a atteint le Mezzogiorno, exposant les relations entre les réseaux politiques du sud et le système Tangentopoli."

 mani_pulite_investigation_begins: "Enquête Mani Pulite"
 mani_pulite_investigation_begins_desc: "Le groupe de magistrats de Milan mène une enquête approfondie. La réputation internationale de [ROOT.GetCountry.GetName] bénéficie de l'engagement visible en matière de responsabilisation."

 mani_pulite_public_mandate: "Mandat public pour la justice"
 mani_pulite_public_mandate_desc: "Le retrait du décret sous pression publique a démontré l'ampleur du soutien populaire à l'enquête."

 mani_pulite_clean_hands_victory: "Les mains propres Victoire"
 mani_pulite_clean_hands_victory_desc: "Mani Pulite a réussi. Le système des partis corrompus de la Première République a été démantelé par la justice. [ROOT.GetCountry.GetName] commence sa deuxième République avec une plus grande légitimité, une base institutionnelle plus propre, et la reconnaissance internationale qui vient de tenir le pouvoir responsable."

 mani_pulite_cautious_transition: "Transition gérée"
 mani_pulite_cautious_transition_desc: "La transition de la première à la seconde République est gérée avec soin, une réforme sans rupture. Les anciens partis ont disparu, mais la continuité institutionnelle est préservée."

 mani_pulite_investigation_buried: "Enquête enterrée"
 mani_pulite_investigation_buried_desc: "Mani Pulite a échoué. La classe politique a survécu. Les citoyens de [ROOT.GetCountry.GetName] savent ce qui a été fait et savent qu'il n'a pas été puni. La corruption continue sous la surface. La légitimité est définitivement endommagée."

 amendment_events.1.t: "Un programme fédéral de santé pour les pauvres"
 amendment_events.1.d: "Le Congrès est saisi de propositions visant à créer un programme d'assurance maladie financé par le gouvernement fédéral pour les Américains à faible revenu, les personnes âgées et les personnes handicapées. Les partisans soutiennent que les marchés privés ne peuvent pas et ne serviront pas ceux qui ne peuvent pas se permettre des primes. Les opposants soutiennent qu'il s'agit d'une expansion inacceptable de la participation fédérale aux soins de santé.\n\n La coalition qui appuie le projet de loi est large — les syndicats, les réformateurs sociaux et une part importante du public. La question de savoir si [ROOT.GetCountry.GetName] agira est une question de volonté politique."
 amendment_events.1.f: "La médecine ne doit pas dépendre si vous pouvez vous le permettre."
 amendment_events.1.a: "Enact Medicaid — couverture sanitaire fédérale pour ceux qui en ont besoin"
 amendment_events.1.b: "Rejeter — la santé est une affaire privée"
 
 amendment_events.2.t: "La loi sur les soins abordables"
 amendment_events.2.d: "L'administration a proposé une réforme complète des soins de santé, la loi sur les soins abordables. Le projet de loi exige que tous les citoyens soient assurés de la santé, créent des marchés réglementés, élargissent l'admissibilité aux médicaments et empêchent les assureurs de refuser la protection pour des conditions préexistantes.\n\n Le mandat individuel est profondément controversé. Les partisans disent que c'est la seule façon de faire fonctionner les marchés de l'assurance. L'opposition l'appelle le gouvernement envahi. Le projet de loi a les voix — si la coalition détient."
 amendment_events.2.f: "40 millions d'Américains non assurés. Le Congrès a une chance de changer cela."
 amendment_events.2.a: "Signer la loi sur les soins abordables"
 amendment_events.2.b: "Le mandat va trop loin"
 
 amendment_events.3.t: "La loi PATRIOT"
 amendment_events.3.d: "Au cours des semaines qui ont suivi les attentats du 11 septembre, le Congrès a fait preuve d'une rapidité extraordinaire pour adopter la loi PATRIOT des États-Unis, en élargissant considérablement les autorités nationales de surveillance, en réduisant la surveillance judiciaire des opérations de renseignement et en permettant un partage d'information sans précédent entre les services de détection et de répression.\n\n Le projet de loi a un appui quasi unanime. Les défenseurs des libertés civiles avertissent que la vitesse de passage et l'ampleur des dispositions seront difficiles à reculer. Le pays est toujours en deuil. Le vote est demain."
 amendment_events.3.f: "La peur est un législateur."
 amendment_events.3.a: "Signer la loi PATRIOT — la sécurité nationale l'exige"
 amendment_events.3.b: "Refus — les libertés civiles ne peuvent être négociées dans le chagrin"
 
 amendment_events.4.t: "Une interdiction fédérale des armes à feu"
 amendment_events.4.d: "Le Congrès vote sur une interdiction fédérale de dix ans sur la fabrication d'armes semi-automatiques spécifiées et de magazines de grande capacité pour la vente civile. Le projet de loi est appuyé par les associations de répression et les familles des victimes de fusillades. Le lobby des armes a dépensé beaucoup contre lui.\n\n La clause de temporisation de dix ans a été ajoutée pour obtenir les votes finals. L'interdiction expirera en 2004 sauf si elle est renouvelée — et la coalition politique pour la renouveler ne pourra pas la maintenir."
 amendment_events.4.f: "Dix ans. Puis le vote se répète."
 amendment_events.4.a: "Passer l'interdiction — dix ans est un début"
 amendment_events.4.b: "L'infirmer — les citoyens respectueux de la loi ne devraient pas payer pour les actes criminels"
 
 amendment_events.5.t: "La loi sur le contrôle de la criminalité et l ' application des lois"
 amendment_events.5.d: "Le Congrès examine la plus grande loi sur la criminalité dans l'histoire de [ROOT.GetCountry.GetName] — le financement de 100 000 nouveaux policiers, une expansion importante du système pénitentiaire fédéral, de nouvelles peines minimales obligatoires et la Loi sur la violence contre les femmes en tant que cavalier.\n\n La logique politique est bipartite. La vague de criminalité de la fin des années 1980 a rendu la politique de l'ordre public populaire à travers les partis. Le projet de loi sera adopté facilement. La question de savoir si cela fonctionnera est une question pour plus tard."
 amendment_events.5.f: "Le projet de loi passe facilement. Les conséquences prennent plus de temps."
 amendment_events.5.a: "Signez - le pays exige des mesures contre la criminalité"
 amendment_events.5.b: "Rejeter — les minimums obligatoires et l'incarcération de masse ne sont pas la réponse"
 
 amendment_events.6.t: "Réforme du système de partage des impôts"
 amendment_events.6.d: "Le ministre des Finances, Liu Jihua, a proposé la réforme fiscale la plus importante depuis la création de la République populaire — remplacer les accords négociés de partage de l'impôt des entreprises entre Beijing et les administrations locales par une taxe nationale sur la valeur ajoutée et une formule de revenu officielle.\n\n La réforme centraliserait considérablement le pouvoir budgétaire, donnant à Pékin un flux de revenus fiable et croissant. Les administrations locales perdront leur discrétion mais gagneront en clarté. Les intérêts industriels et commerciaux qui ont établi des relations avec les autorités locales sont tranquillement opposés."
 amendment_events.6.f: "Le centre veut ce que les provinces gardent."
 amendment_events.6.a: "Mettre en œuvre le système de partage des impôts — centraliser l'autorité fiscale"
 amendment_events.6.b: "Maintenir les arrangements existants — ne pas perturber les fonctions"
 
 amendment_events.7.t: "La semaine de travail de 35 heures"
 amendment_events.7.d: "La ministre du Travail, Martine Aubry, a proposé un projet de loi prévoyant une semaine de travail légale de 35 heures pour la plupart des employés. La politique est présentée comme un moyen de partager le travail de façon plus générale : moins d'heures par travailleur, plus de travailleurs employés.\n\n Les syndicats sont enthousiastes. La fédération des employeurs a mis en garde contre une crise de compétitivité. Les économistes sont divisés. La coalition de gauche qui a élu ce gouvernement a tenu sa promesse. La question est de savoir s'il faut le livrer."
 amendment_events.7.f: "35 heures. Deux heures de moins. Une tempête politique."
 amendment_events.7.a: "Passer la loi Aubry — les travailleurs méritent des heures plus courtes"
 amendment_events.7.b: "Le coût économique est trop élevé"
 
 patriot_act_rejected_modifier: "PATRIOT Loi rejetée"
 patriot_act_rejected_modifier_desc: "La décision de ne pas adopter la loi PATRIOT a laissé l'établissement de sécurité frustré et le consensus politique post-attaque a été tendu."
 
 china_tax_reform_rejected_modifier: "Réforme fiscale"
 china_tax_reform_rejected_modifier_desc: "L'absence de centralisation du régime fiscal a laissé l'autorité fiscale fragmentée. Les administrations locales continuent de négocier leurs propres arrangements, ce qui réduit les recettes et les pouvoirs du centre."
 
 terrorism_a.1.t: "Le World Trade Center est bombardé"
 terrorism_a.1.d: "Une bombe a explosé dans le garage souterrain du World Trade Center à New York. L'explosion a tué six personnes et blessé plus de mille personnes. Le bâtiment n'est pas tombé, mais l'intention était d'abattre une tour sur l'autre.\n\nC'est la première attaque terroriste internationale majeure sur le sol [ROOT.GetCountry.GetName]. Les auteurs ont des liens avec des réseaux opérant hors du Moyen-Orient et en Asie centrale. L'enquête est en cours."
 terrorism_a.1.f: "La première attaque. Pas le dernier."
 terrorism_a.1.a: "Nous trouverons les responsables"
 
 terrorism_a.2.t: "Grèves de l'ouragan Andrew"
 terrorism_a.2.d: "L'ouragan Andrew, l'ouragan atlantique le plus destructeur de l'époque, a fait des ravages dans le sud de la Floride avec des vents dépassant 165 milles à l'heure. Les dégâts sont catastrophiques. Des communautés entières du comté de Miami-Dade ont été détruites. Des estimations préliminaires suggèrent que ce sera l'une des catastrophes naturelles les plus coûteuses de l'histoire de [ROOT.GetCountry.GetName]."
 terrorism_a.2.f: "L'ouragan ne se soucie pas de ce qui a été construit."
 terrorism_a.2.a: "Déclarer une catastrophe fédérale — mobiliser les secours"
 
 terrorism_a.3.t: "Tremblement de terre de Northridge"
 terrorism_a.3.d: "Un tremblement de terre de magnitude 6,7 a frappé la vallée de San Fernando au nord de Los Angeles à 4h31 du matin. Cinquante-sept personnes sont mortes, des milliers sont blessées, et les dégâts causés aux infrastructures, en particulier au réseau d'autoroutes et aux bâtiments plus anciens, ont déjà dépassé des dizaines de milliards de dollars. Le tremblement de terre est le plus coûteux de l'histoire de [ROOT.GetCountry.GetName]."
 terrorism_a.3.f: "La Californie tremble. Ça tremble toujours."
 terrorism_a.3.a: "Mobiliser immédiatement l'aide fédérale"
 
 terrorism_a.4.t: "Bombardement à Oklahoma City"
 terrorism_a.4.d: "Un camion piégé a détruit la face avant du bâtiment fédéral Alfred P. Murrah à Oklahoma, tuant 168 personnes, dont 19 enfants dans la garderie du bâtiment. C'est l'attaque terroriste la plus meurtrière dans l'histoire de [ROOT.GetCountry.GetName].\n\n Les auteurs ne sont pas étrangers. Timothy McVeigh et Terry Nichols sont des citoyens [ROOT.GetCountry.GetAdjective] motivés par l'idéologie antigouvernementale. Le pays est confronté à la réalité que la menace peut venir de l'intérieur."
 terrorism_a.4.f: "L'ennemi n'était pas à la frontière. Il était déjà là."
 terrorism_a.4.a: "Il s'agit d'un terrorisme interne — nous répondrons avec toute la force"
 
 terrorism_a.5.t: "Embassies américaines bombardées en Afrique de l'Est"
 terrorism_a.5.d: "Des camions piégés ont explosé en dehors des ambassades [ROOT.GetCountry.GetAdjective] à Nairobi, au Kenya et à Dar es-Salaam, en Tanzanie. Les attaques ont fait plus de 200 morts - la plupart des civils kényans et tanzaniens - et ont blessé des milliers d'autres personnes. Un réseau dirigé par Oussama ben Laden a revendiqué la responsabilité.\n\n Les attaques sont une déclaration que [ROOT.GetCountry.GetAdjective] les intérêts mondiaux sont des cibles. La réponse de [ROOT.GetCountry.GetName] définira la forme de la lutte contre le terrorisme pour la prochaine décennie."
 terrorism_a.5.f: "La guerre est arrivée dans nos ambassades."
 terrorism_a.5.a: "C'est un acte de guerre — nous répondrons"
 
 terrorism_a.6.t: "La valeur [ROOT.GetCountry.GetAdjective] Ambassade Est bombardé"
 terrorism_a.6.d: "Une bombe par camion a explosé en dehors de l'ambassade des États-Unis à Nairobi, tuant plus de 200 personnes, dont la majorité [ROOT.GetCountry.GetAdjective] civils qui se trouvaient à proximité du bâtiment à l'époque. L'attaque n'était pas dirigée vers [ROOT.GetCountry.GetName]. [ROOT.GetCountry.GetName] portait le coût de toute façon."
 terrorism_a.6.f: "La bombe ne distinguait pas les nations."
 terrorism_a.6.a: "Nous exigeons justice pour nos morts"
 
 terrorism_a.7.t: "La valeur [ROOT.GetCountry.GetAdjective] Le capital est Struck"
 terrorism_a.7.d: "Une bombe a explosé près de l'ambassade des États-Unis à Dar es-Salaam, tuant 11 personnes dans ce qui semble être une attaque coordonnée en même temps qu'un bombardement simultané à Nairobi, au Kenya. Les victimes étaient principalement des civils [ROOT.GetCountry.GetAdjective]. L'attaque a ébranlé le pays."
 terrorism_a.7.f: "Le terrorisme a atteint nos côtes de l'autre côté d'un océan."
 terrorism_a.7.a: "Nous sommes avec notre peuple"
 
 terrorism_a.8.t: "L'USS Cole est bombardé"
 terrorism_a.8.d: "Une petite embarcation transportant des explosifs a explosé le long de l'USS Cole alors qu'elle se réalimentait dans le port d'Aden, au Yémen. Dix-sept marins [ROOT.GetCountry.GetAdjective] ont été tués et 39 blessés. L'attaque est attribuée à Al-Qaïda.\n\nUn navire de guerre du [ROOT.GetCountry.GetAdjective] La marine, lors d'un arrêt de ravitaillement dans un port amical, a été attaquée par un kamikaze dans un canot en caoutchouc. La direction militaire demande comment cela a été autorisé."
 terrorism_a.8.f: "La marine est censée être la cible dure."
 terrorism_a.8.a: "Cela ne restera pas sans réponse"
 
 terrorism_a.9.t: "La tornade Bridge Creek–Moore"
 terrorism_a.9.d: "Une tornade EF5, la plus forte enregistrée sur l'échelle Fujita, a traversé Bridge Creek et Moore, en Oklahoma. La vitesse du vent dépassait 300 milles à l'heure. La tornade a été sur le sol pendant 85 minutes et a sculpté un chemin de mille de destruction totale à travers les communautés au sud de Oklahoma City. 36 personnes sont mortes."
 terrorism_a.9.f: "Il ne reste plus rien là où se trouvait la tornade."
 terrorism_a.9.a: "Déployer des secours aux communautés touchées"
 
 terrorism_a.10.t: "32 Mort à Virginia Tech"
 terrorism_a.10.d: "Un homme armé a tué 32 étudiants et professeurs à l'Institut polytechnique de Virginie à Blacksburg, en Virginie, avant de prendre sa vie. C'est l'école la plus meurtrière dans l'histoire de [ROOT.GetCountry.GetName]. Le tireur a légalement acheté ses armes à feu en dépit d'un passé de problèmes de santé mentale qui auraient dû le disqualifier en vertu de la loi en vigueur.\n\n L'échec du système de vérification des antécédents est maintenant examiné."
 terrorism_a.10.f: "Il a acheté l'arme légalement."
 terrorism_a.10.a: "Examiner immédiatement les procédures de vérification des antécédents des armes à feu"
 
 terrorism_a.11.t: "82 Coup de feu au Théâtre Aurora"
 terrorism_a.11.d: "Un tireur a ouvert le feu lors d'une première d'un film majeur au cinéma Century 16 à Aurora, Colorado, tuant 12 personnes et en blessant 70. L'agresseur était armé d'un fusil semi-automatique, d'un fusil de chasse et d'armes de poing, tous achetés légalement dans les semaines précédant l'attaque.\n\nColorado et le pays sont en état de choc."
 terrorism_a.11.f: "Une nuit au cinéma. Douze personnes ne sont pas rentrées chez elles."
 terrorism_a.11.a: "Une tragédie qui demande réflexion"
 
 terrorism_a.12.t: "Gunman tue 6 au temple sikh du Wisconsin"
 terrorism_a.12.d: "Un suprématiste blanc a ouvert le feu au temple sikh du Wisconsin à Oak Creek, tuant six adorateurs avant d'être abattu par la police. L'agresseur était un vétéran de l'armée américaine avec des liens avec des organisations néo-nazies.\n\n Les victimes ont été ciblées en raison de leur religion et de leur appartenance ethnique. L'attaque a relancé le débat sur l'extrémisme domestique, les crimes haineux et l'absence de surveillance des réseaux nationalistes blancs."
 terrorism_a.12.f: "Ils sont venus prier. Il est venu les tuer pour qui ils étaient."
 terrorism_a.12.a: "C'est un crime de haine — nous n'ignorons pas l'extrémisme domestique"
 
 terrorism_a.13.t: "Tragédie à Sandy Hook"
 terrorism_a.13.d: "Un homme armé a tué 20 enfants âgés de six à sept ans et six employés adultes, à l'école primaire Sandy Hook à Newtown, dans le Connecticut. Les enfants ont été abattus plusieurs fois avec un fusil de type assaut.\n\n Il n'y a pas de mots adéquats. [ROOT.GetCountry.GetName] est en deuil."
 terrorism_a.13.f: "Vingt enfants. Six ans."
 terrorism_a.13.a: "Le pays souffre"
 
 terrorism_a.14.t: "Le massacre de Dunblane"
 terrorism_a.14.d: "Un homme armé est entré dans l'école primaire de Dunblane en Écosse et a tué seize enfants âgés de cinq et six ans, et leur professeur, avant de prendre sa vie. C'est le tir de masse le plus meurtrier dans l'histoire de [ROOT.GetCountry.GetName].\n\n La réponse nationale est écrasante. Les survivants, les parents et le public ont lancé une campagne pour une interdiction totale de la propriété privée des armes de poing. Le gouvernement fera face à d'énormes pressions pour agir."
 terrorism_a.14.f: "Seize enfants. Cinq ans. L'Écosse n'oubliera pas."
 terrorism_a.14.a: "Quelque chose doit changer — le pays l'exige"
 
 terrorism_a.15.t: "Les inondations de Yangtze"
 terrorism_a.15.d: "La rivière Yangtze et ses affluents ont inondé catastrophiquement après des mois de pluies exceptionnellement abondantes. Les inondations ont touché 240 millions de personnes dans le centre et le sud, soit 14 provinces, 56 millions d'acres de terres agricoles et des milliers d'établissements. Plus de 3 000 personnes sont mortes et 14 millions ont été déplacées.\n\n La mobilisation de l'État est massive. Les militaires ont déployé des centaines de milliers de soldats pour soulager les inondations. C'est la plus grande catastrophe naturelle de l'histoire récente [ROOT.GetCountry.GetAdjective]."
 terrorism_a.15.f: "La rivière décida de prendre ce que les digues avaient promis de garder."
 terrorism_a.15.a: "La pleine force de l'État sera déployée"
 
 terrorism_a.16.t: "Appartement Bâtiments bombardés à Moscou"
 terrorism_a.16.d: "Une série d'attentats à la bombe contre des immeubles à Moscou et d'autres villes russes a tué près de 300 personnes pendant leur sommeil. Les bombardements ont été attribués à des séparatistes tchétchènes — bien que les preuves soient contestées par certains observateurs.\n\n Les attaques ont suscité d'énormes pressions publiques pour une réaction militaire décisive. Une nouvelle campagne militaire en Tchétchénie est actuellement sérieusement envisagée. La personnalité politique qui promet d'écraser les terroristes trouvera le public prêt à le suivre."
 terrorism_a.16.f: "La peur est un outil politique puissant. Tout comme le chagrin."
 terrorism_a.16.a: "Cela exige une réponse militaire complète"
 
 # ── MODIFIERS ────────────────────────────
 
 he_terror_attack_domestic: "Attaque terroriste domestique"
 he_terror_attack_domestic_desc: "Une attaque terroriste sur le sol [ROOT.GetCountry.GetAdjective] a ébranlé la confiance du public et accru la radicalisation et les troubles."
 
 he_terror_attack_foreign: "Attaque terroriste outre-mer"
 he_terror_attack_foreign_desc: "Une attaque terroriste contre des intérêts [ROOT.GetCountry.GetAdjective] à l'étranger a porté atteinte au prestige et à la réputation diplomatique."
 
 he_counterterrorism_push: "Lutte contre le terrorisme"
 he_counterterrorism_push_desc: "Une grande campagne antiterroriste est en cours. L'autorité et la légitimité sont renforcées, mais l'infamie engendrée par les opérations agressives à l'étranger prendra du temps à se dégrader."
 
 he_natural_disaster_emergency: "Catastrophe naturelle"
 he_natural_disaster_emergency_desc: "Une catastrophe naturelle majeure a déclenché une intervention d'urgence fédérale. Le coût est important et la capacité du gouvernement est étendue."
 
 he_disaster_zone: "Zone de catastrophe"
 he_disaster_zone_desc: "Cet état a été gravement endommagé par une catastrophe naturelle. L'infrastructure, la mortalité et la migration sont toutes affectées négativement."
 
 he_domestic_extremism_response: "Réponse de l'extrémisme domestique"
 he_domestic_extremism_response_desc: "À la suite d'une attaque terroriste nationale, [ROOT.GetCountry.GetName] a lancé une importante action de sécurité intérieure ciblant les réseaux extrémistes."
 
 he_military_shock: "Choc militaire"
 he_military_shock_desc: "Une attaque réussie contre des biens militaires a ébranlé les forces armées et endommagé le prestige national."
 
 he_mass_shooting: "Tir de masse"
 he_mass_shooting_desc: "Une fusillade de masse a accru l'anxiété du public et la polarisation politique sur la politique en matière d'armes à feu."
 
 he_mass_shooting_severe: "Tirs de masse — tragédie nationale"
 he_mass_shooting_severe_desc: "Une fusillade massive d'une gravité exceptionnelle a créé une profonde douleur nationale et une pression politique intense. La légitimité de la politique existante est remise en question."
 
 he_hate_crime_shock: "Crime haineux — Choc national"
 he_hate_crime_shock_desc: "Une attaque ciblée contre des crimes haineux a choqué la nation et a mis en évidence la menace de l'extrémisme national dirigé contre les communautés minoritaires."
 
 he_gun_reform_mandate: "Mandat public pour la réforme des armes à feu"
 he_gun_reform_mandate_desc: "L'indignation publique à la suite d'une fusillade de masse a créé une forte dynamique politique en faveur de la réforme des armes à feu. La promulgation de la loi est plus facile que d'habitude."
 
 he_security_state_response: "Réponse de l'État de sécurité"
 he_security_state_response_desc: "Une attaque terroriste majeure a suscité un soutien public en faveur de l'élargissement des pouvoirs de sécurité de l'État. L'autorité et la légitimité sont renforcées."
 
 ## breakup of czechoslovakia
 je_velvet_divorce: "Le divorce des velours"
 je_velvet_divorce_reason: "La fédération est sous pression. La transition du communisme a révélé les failles économiques et politiques entre les moitiés tchèque et slovaque de l'État. Les hommes politiques slovaques — sous la direction de Vladimír Mečiar — réclament une plus grande autonomie et certains une indépendance totale. La partie tchèque, dirigée par Václav Klaus, est de plus en plus disposée à les laisser partir.\n\n Deux forces sont en mouvement. [ROOT.GetCountry.GetName] doit construire #bold cohésion fédérale#! — par la négociation, le compromis économique et la compétence politique — avant que la pression séparatiste#! ne rende la dissolution irréversible.\n\n Si la pression atteint 100 avant la cohésion, la fédération se dissout. pacifiquement. C'est ce que signifie "velvet"."
 
 je_velvet_divorce_stable_tt: "La fédération tient. Les négociations se poursuivent. Le résultat est toujours entre les mains du gouvernement."
 je_velvet_divorce_tense_tt: "@warning! #bold La pression séparatrice augmente.#! Les politiciens slovaques sont de plus en plus convaincus que l'indépendance est possible et souhaitable. La fenêtre d'un règlement négocié se rétrécit."
 je_velvet_divorce_critical_tt: "@warning! #bold La fédération est au point de rupture.#! Les conditions politiques de dissolution sont presque réunies. Sans une intervention dramatique, la Tchécoslovaquie ne survivra pas à l'année."
 
 federal_cohesion_bar: "Cohésion fédérale"
 federal_cohesion_bar_desc: "Cohésion fédérale"
 federal_cohesion_bar_progress_tt: "Niveau fédéral de cohésion"
 
 separatist_pressure_bar: "Pression séparatrice"
 separatist_pressure_bar_desc: "Pression séparatrice"
 separatist_pressure_bar_progress_tt: "Un élan séparateur"
 
 # ── EVENTS ───────────────────────────────
 
 velvet_divorce.1.t: "La crise constitutionnelle commence"
 velvet_divorce.1.d: "Les élections de juin 1992 ont donné un résultat impossible. Dans les pays tchèques, le Parti civique démocratique de Václav Klaus a gagné sur une plateforme de libéralisation rapide du marché. En Slovaquie, le Mouvement pour une Slovaquie démocratique de Vladimír Mečiar a gagné sur une plate-forme de réformes plus lentes et d'une plus grande autonomie slovaque.\n\n Les deux hommes se sont rencontrés à Brno et ont convenu d'une chose: l'arrangement actuel ne peut pas continuer. Ils ne sont pas d'accord sur presque tout le reste. Le président Václav Havel — qui croit que le public votera pour maintenir le pays ensemble si on le lui demande — a été écarté.\n\n Le sort de [ROOT.GetCountry.GetName] est maintenant une question de ce que les prochains mois apportent."
 velvet_divorce.1.f: "Deux élections. Deux mandats. Un pays."
 velvet_divorce.1.a: "Le gouvernement travaillera à maintenir la fédération ensemble"
 
 velvet_divorce.2.t: "Griefs économiques slovaques"
 velvet_divorce.2.d: "L'économie slovaque subit la transition du communisme plus difficile que la Bohême et la Moravie. La base industrielle slovaque — construite autour de la fabrication lourde et de la production d'armes pour le Pacte de Varsovie — s'est effondrée presque du jour au lendemain. Le chômage augmente fortement. Les politiciens slovaques blâment la politique économique fédérale et demandent soit la redistribution, soit le droit de choisir leur propre voie.\n\n L'écart entre les deux moitiés du pays devient politiquement combustible."
 velvet_divorce.2.f: "Lorsque la moitié d'un pays se porte bien et que l'autre moitié ne se pose pas la question de savoir qui."
 velvet_divorce.2.a: "Réorienter les fonds fédéraux vers les régions slovaques"
 velvet_divorce.2.b: "Le marché trouvera son niveau — pas de traitement spécial"
 
 velvet_divorce.3.t: "La Déclaration slovaque de souveraineté"
 velvet_divorce.3.d: "Le Conseil national slovaque a adopté une déclaration de souveraineté de la Slovaquie. Le document cesse de déclarer l'indépendance, mais affirme que la loi slovaque remplace la loi fédérale sur le territoire slovaque.\n\n Ceci est constitutionnellement ambigu et politiquement explosif. Le président Havel l'a condamné et a démissionné peu après de sa présidence tchécoslovaque. La déclaration n'est pas encore une rupture, mais c'est la première étape formelle vers une."
 velvet_divorce.3.f: "Pas encore l'indépendance. Mais la direction est claire."
 velvet_divorce.3.a: "Condamner la déclaration - la loi fédérale est suprême"
 velvet_divorce.3.b: "Des discussions ouvertes — offrir à la Slovaquie une autonomie plus formelle au sein de la fédération"
 
 velvet_divorce.4.t: "Mečiar et Klaus : deux hommes, deux visions"
 velvet_divorce.4.d: "Vladimír Mečiar et Václav Klaus se sont rencontrés à nouveau. Leurs positions de négociation se sont durcies. Klaus veut une union fédérale étroite avec une politique économique unifiée. Mečiar veut soit une confédération lâche avec une autonomie nationale quasi totale, soit une indépendance.\n\n Ceux qui ont assisté à la réunion le décrivent comme civil mais inconciliable. Les deux hommes ne sont pas des ennemis, mais ils veulent des choses fondamentalement différentes, et l'un d'eux obtiendra ce qu'il veut."
 velvet_divorce.4.f: "Deux pragmatistes. Conclusions opposées."
 velvet_divorce.4.a: "Soutien au programme de réforme du marché unifié — Klaus"
 velvet_divorce.4.b: "Offrez une confédération plus lâche — donnez à Mečiar quelque chose avec"
 
 velvet_divorce.5.t: "Demande un référendum"
 velvet_divorce.5.d: "Les politiciens et les groupes civiques slovaques demandent un référendum sur l'indépendance. La proposition bénéficie d'un soutien public important en Slovaquie, où les sondages suggèrent qu'une majorité étroite favorise une forme de séparation.\n\n Le président Havel — encore influent malgré sa démission — a plaidé contre un référendum. Il croit que le processus lui-même enflammerait les passions et rendrait impossible un résultat rationnel. «Les nations ne décident pas de séparer la manière dont une assemblée des actionnaires vote sur une fusion», a-t-il déclaré. Ils se sentent en chemin, ou à l'écart. La question de savoir s'il faut voter est elle-même un vote sur ce que [ROOT.GetCountry.GetName] croit."
 velvet_divorce.5.f: "Un référendum est une question. Mais poser des questions change la réponse."
 velvet_divorce.5.a: "Tenez le référendum — laissez le peuple parler"
 velvet_divorce.5.b: "Bloquer le référendum — suivre les conseils de Havel"
 
 velvet_divorce.10.t: "Tchécoslovaquie Survive"
 velvet_divorce.10.d: "La crise est passée. Grâce à une combinaison de compromis économiques, de négociations politiques et de la persistance des institutions fédérales, [ROOT.GetCountry.GetName] s'est tenue ensemble.\n\n L'arrangement qui s'est dégagé n'est pas la fédération de 1990. La Slovaquie a plus d'autonomie. La relation économique entre les deux moitiés a été rééquilibrée. Mais l'état est intact, et le drapeau est inchangé.\n\n L'histoire remarquera que cela n'était pas inévitable, qu'il fallait faire des choix actifs et que ces choix ont été faits."
 velvet_divorce.10.f: "Le divorce de velours n'a pas eu lieu. C'est une victoire."
 velvet_divorce.10.a: "La Tchécoslovaquie endure"
 
 velvet_divorce.15.t: "Le divorce des velours"
 velvet_divorce.15.d: "C'est fait. Le 1er janvier 1993, la Tchécoslovaquie cessera d'exister. La dissolution a été approuvée par le Parlement fédéral, et non par référendum. Le public n'a jamais été directement interrogé. Les sondages dans les deux moitiés du pays ont constamment montré un soutien majoritaire à la préservation d'une forme d'État commun, mais la classe politique — Klaus et Mečiar avant tout — a déterminé que l'union était inapplicable.\n\n La division était paisible. Aucun coup de feu n'a été tiré. Aucune frontière n'a été contestée. L'actif et le passif de la fédération ont été divisés selon une formule fondée sur la population. L'armée a été divisée. La monnaie a été divisée. Le drapeau était divisé.\n\nLa tchécoslovaquie existait depuis soixante-quatorze ans. Elle est née en révolution et dissoute par un vote parlementaire. Les deux États successeurs ont déjà demandé l'adhésion à l'UE et à l'OTAN."
 velvet_divorce.15.f: "Soixante-quatorze ans. Terminé par la paperasse."
 velvet_divorce.15.a: "La dissolution se produit"
 
 velvet_divorce.16.t: "La République tchèque est née"
 velvet_divorce.16.d: "Le 1er janvier 1993, la République tchèque devient un État indépendant. Le territoire de la Bohême, de la Moravie et de la Silésie tchèque — avec Prague comme capitale — forme l'un des deux États successeurs de la fédération tchécoslovaque.\n\n Le nouvel État hérite de la moitié plus développée de l'ancienne économie, d'un système démocratique opérationnel et d'une reconnaissance internationale immédiate. La voie vers l'Europe est ouverte."
 velvet_divorce.16.f: "Un nouvel État. Une vieille nation."
 velvet_divorce.16.a: "La République tchèque commence"
 
 velvet_divorce.17.t: "La République slovaque est née"
 velvet_divorce.17.d: "Le 1er janvier 1993, la République slovaque devient un État indépendant. Bratislava est la capitale d'un pays qui a existé sous cette forme pendant exactement un jour.\n\nLa Slovaquie hérite d'un héritage industriel plus lourd, d'un chômage plus élevé et d'un environnement politique plus compliqué. Mais l'État est souverain, reconnu et, pour la première fois dans l'histoire, totalement indépendant."
 velvet_divorce.17.f: "Pour la première fois de son histoire : une Slovaquie indépendante."
 velvet_divorce.17.a: "La République slovaque commence"
 
 velvet_divorce.18.t: "Et ensuite ?"
 velvet_divorce.18.d: "La Tchécoslovaquie se dissout. Ses États successeurs — la République tchèque et la République slovaque — prennent forme.\n\n Vous étiez le chef d'un pays qui n'existe plus. La question est maintenant de savoir quel rôle vous jouerez dans ce qui viendra."
 velvet_divorce.18.f: "Un pays. Deux futurs."
 velvet_divorce.18.a: "Continuer en République tchèque"
 velvet_divorce.18.b: "Continuer comme la République slovaque"
 velvet_divorce.18.c: "Rester et observer la dissolution"
 
