 czh_federal_strain: "Strain fédérale"
 czh_federal_strain_desc: "La crise constitutionnelle affaiblit les institutions fédérales. La légitimité s'érode et l'adoption de lois est plus difficile car les deux moitiés de la fédération remettent en question l'autorité du centre."
 
 czh_slovak_subsidy: "Programme slovaque d'appui économique"
 czh_slovak_subsidy_desc: "Les fonds fédéraux sont réorientés pour soutenir l'économie slovaque par la transition. C'est cher, mais cela a amélioré la température politique."
 
 czh_federal_authority_asserted: "Autorité fédérale"
 czh_federal_authority_asserted_desc: "Le gouvernement fédéral a condamné la déclaration slovaque et affirmé la suprématie du droit fédéral. L'autorité est renforcée, mais la colère slovaque s'est intensifiée."
 
 czh_autonomy_negotiations: "Négociations sur l'autonomie"
 czh_autonomy_negotiations_desc: "Des pourparlers officiels sont en cours pour offrir à la Slovaquie une plus grande autonomie au sein de la fédération. Le processus a amélioré le climat politique."
 
 czh_confederation_talks: "Proposition de la Confédération"
 czh_confederation_talks_desc: "Un modèle de confédération plus lâche est en cours de négociation. Les deux côtés parlent. Le résultat est incertain, mais l'élan vers la dissolution a ralenti."
 
 czh_referendum_blocked: "Référendum supprimé"
 czh_referendum_blocked_desc: "L'appel à l'indépendance a été rejeté. Les politiciens slovaques et la société civile ont réagi avec colère. La pression politique n'a pas disparu — on lui a refusé un débouché."
 
 czh_federal_union_preserved: "Union fédérale Préservée"
 czh_federal_union_preserved_desc: "La crise constitutionnelle est passée. [ROOT.GetCountry.GetName] tenu ensemble. Le règlement négocié a renforcé les institutions fédérales et la confiance du public dans le syndicat."
 
 czc_new_republic_founding: "République tchèque"
 czc_new_republic_founding_desc: "La République tchèque est un État souverain. La reconnaissance internationale est immédiate. Les fondements de la nouvelle république sont stables."
 
 svk_new_republic_founding: "République slovaque"
 svk_new_republic_founding_desc: "La République slovaque est un État souverain. La première Slovaquie totalement indépendante de l'histoire se trouve sur ses bases."
 
