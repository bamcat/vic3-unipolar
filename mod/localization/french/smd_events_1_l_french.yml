l_french:
#################### JE ####################
# The Internet

je_internet:0 "Internet"
je_internet_reason:0 "Il est temps de connecter notre pays à Internet ! Nous devons améliorer notre réseau de télécommunications au-delà du simple trafic téléphonique, et enfin présenter nos citoyens aux merveilles du World Wide Web!"

smd_tech.1.t:0 "[ROOT.GetCountry.GetName] est en ligne"
smd_tech.1.d:0 "Depuis des décennies, nos communications dépendent des journaux, de la radio et de la télévision. Mais une révolution tranquille balaye le monde, un vaste réseau d'ordinateurs interconnectés, connu sous le nom d'Internet. Une fois le domaine des universitaires et des chercheurs militaires, il promet maintenant de changer la façon dont nos citoyens travaillent, apprennent et se connectent."
smd_tech.1.f:0 "Internet commuté: parce que rien ne dit 'haute technologie' comme crier des bips et attendre 5 minutes pour charger une photo d'un chat."

smd_tech.1.a:0 "Peut-être que d'autres technologies devraient se connecter au web aussi bien!"
smd_tech.1.b:0 "Nous pourrions utiliser l'interweb pour exercer un contrôle sur l'opinion publique"

government_run_wifi_modifier:0 "Interférence du gouvernement au Wifi"

# Computer Science

je_computer_science:0 "Informatique"
je_computer_science_reason:0 "L'informatique est l'étude de la façon dont les ordinateurs fonctionnent, comment ils peuvent être faits pour résoudre les problèmes, et comment nous pouvons les utiliser efficacement et en toute sécurité."

smd_tech.2.t:0 "Diplômes en informatique"
smd_tech.2.d:0 "Imaginez - le comme la science de la pensée logique et de la résolution des problèmes — mais avec des machines qui obéissent à toutes les petites instructions. Il est à la fois abstrait et pratique, et il alimente presque toutes les technologies modernes autour de nous, des smartphones aux voitures auto-conduites."

# Pesticides

je_pesticides:0 "Herbicides"
je_pesticides_reason:0 "Les pesticides sont des substances utilisées pour lutter contre les ravageurs. Ils comprennent des herbicides, des insecticides, des nématicides, des fongicides et bien d'autres. Les plus courantes sont les herbicides, qui représentent environ 50 % de l'ensemble des pesticides utilisés à l'échelle mondiale. Avec cette nouvelle invention, nous avons le devoir de moderniser notre secteur agricole pour y inclure les pesticides."

smd_tech.3.t:0 "Une mer de parasites morts"
smd_tech.3.d:0 "Depuis des millénaires, les insectes et les rongeurs sont restés une menace inébranlable pour l'activité agricole humaine. Avec l'invention récente de divers produits chimiques sans danger alimentaire qui repoussent et tuent les insectes nuisibles, nous pouvons produire des récoltes plus abondantes, tout en assurant une plus grande sécurité alimentaire une fois pour toutes!"

smd_tech.3.a:0 "Ce serait probablement mieux s'ils faisaient moins de dégâts environnementaux..."

# Globalization

je_globalization:0 "Mondialisation"
je_globalization_reason:0 "La mondialisation est un phénomène de la fin du XXe siècle, défini par une plus grande interdépendance, le libre transit de la culture, des biens, des armes et des personnes, chacune étant déclenchée par de plus grandes initiatives de libre-échange à travers le monde."

je_asian_economic_reform: "Réforme économique"
je_asian_economic_reform_reason: "La Chine et l'Inde sont depuis longtemps liées par des restrictions économiques. L'économie mondiale progresse rapidement vers l'intégration et le libre-échange. En supprimant les restrictions dépassées, nous pouvons ouvrir une croissance sans précédent. D'ici là, nos marchés restent limités."

asian_economy_restrictions: "Restrictions économiques"
asian_economy_restrictions_desc: "Les inefficacités contrôlées par l'État et les barrières protectionnistes ralentissent les échanges, réduisant la compétitivité et l'accès international."

booming_trade_economy: "L'économie commerciale"
booming_trade_economy_desc: "Avec la levée des restrictions, les marchés étrangers et nationaux prospèrent, ce qui favorise la prospérité."

asia_reform.1.t: "Marchés ouverts"
asia_reform.1.d: "Les réformes ont été adoptées et des politiques commerciales restrictives ont été supprimées. La Chine et l'Inde sont maintenant à l'avant-garde de la mondialisation économique."
asia_reform.1.f: "«Nous devons ouvrir nos marchés, car l'isolement n'est plus durable."
asia_reform.1.a: "Une nouvelle ère du commerce commence."

# Starship

je_starships:0 "Vaisseaux"
je_starships_reason:0 "L'invention de la fusée réutilisable a rapidement stimulé l'invention d'un autre type de vaisseau spatial, le vaisseau spatial. Capable de franchir efficacement les barrières interplanétaires, d'atterrir sur Mars et de retourner sur terre, tout en maintenant les astronautes en bonne santé, c'est un nouveau design révolutionnaire qui mérite notre reconnaissance."

# coming soon

################ others ###########

# Cancer

cancer.1.t:0 "La guérison du cancer"
cancer.1.d:0 "Depuis plus d'un siècle, le cancer hante l'humanité, une affliction imprévisible qui prétendait des millions de personnes et échappait à tout remède. Elle ne connaissait aucune frontière, ne respectait aucun statut et laissait la dévastation dans chaque famille qu'elle touchait. Mais aujourd'hui, après des années de recherche acharnée, d'essais cliniques et de collaboration internationale, les scientifiques ont fait l'impossible : ont développé un remède universel et ciblé. Cette thérapie révolutionnaire détecte et détruit les cellules malignes sans nuire aux tissus sains, rendant la rémission non seulement possible, mais garantie."
cancer.1.a:0 "Un triomphe pour toute l'humanité."
cancer_eradication_prestige:0 "Cancer éradiqué"

# 2004 Indian Ocean earthquake and tsunami

indian_ocean_tsunami.1.t: "Le tremblement de terre frappe l'océan Indien"
indian_ocean_tsunami.1.d: "Un tremblement de terre sous-marin massif a provoqué un tsunami catastrophique, dévastatrice des régions côtières d'Asie du Sud et du Sud-Est. Les dégâts sont sans précédent, et le rétablissement prendra des années."
indian_ocean_tsunami.1.a: "Nous devons commencer à reconstruire immédiatement."
indian_ocean_tsunami.1.f: "Dans l'une des pires catastrophes enregistrées, un tremblement de terre dévastateur et un tsunami ont détruit nos régions côtières"

je_indian_ocean_tsunami: "Récupération du tsunami"
je_indian_ocean_tsunami_reason: "Un tsunami dévastateur a endommagé votre infrastructure côtière et ébranlé le pays. Les efforts de reconstruction sont essentiels au rétablissement et à la stabilité."

tsunami_recovery_success_tt: "Vous avez entrepris avec succès le redressement national."

tsunami_disaster_struck: "Dommages causés par le tsunami à l ' échelle nationale"
tsunami_local_destruction: "Dévastation locale du tsunami"
tsunami_reconstruction_complete: "Reconstruction terminée"
  
indian_ocean_tsunami_recovery_title: "Efforts de rétablissement du tsunami"
indian_ocean_tsunami_recovery_desc: "Votre pays a été touché par le tsunami de l'océan Indien. Mettre en oeuvre l'aide et la récupération pour stabiliser votre population et votre infrastructure."

tsunami_aid_title: "Fournir une aide humanitaire"
tsunami_aid_desc: "Mettre en œuvre des réformes sociales ou allouer une aide financière pour aider à reconstruire les zones touchées."

tsunami_disaster_struck: "Dommages causés par le tsunami à l ' échelle nationale"
tsunami_local_destruction: "Dévastation locale du tsunami"
tsunami_reconstruction_complete: "Efforts de reconstruction réussis"
tsunami_recovery_success_tt: "Le pays a promulgué une loi sur la protection sociale avant décembre 2005."
 
indian_ocean_tsunami.2.t: "Tsunami Devastates Asie du Sud"
indian_ocean_tsunami.2.d: "Un tremblement de terre et un tsunami massifs ont frappé l'océan Indien. Une catastrophe humanitaire se profile. Les montres du monde — allons-nous agir?"
indian_ocean_tsunami.2.f: "Des côtes entières ont disparu. L'aide est nécessaire d'urgence."
indian_ocean_tsunami.2.a: "Envoyez une aide d'urgence."
indian_ocean_tsunami.2.b: "Nous avons nos propres priorités."

indian_ocean_tsunami.3.t: "Aide reçue"
indian_ocean_tsunami.3.d: "Une nation étrangère a envoyé des secours humanitaires. Votre peuple est reconnaissant."
indian_ocean_tsunami.3.a: "Dieu merci pour la solidarité mondiale."

tsunami_foreign_aid_sent: "Envoyé une aide étrangère aux victimes du tsunami"
countries_available_to_request_aid_from:0 "Les pays peuvent demander une aide auprès"
has_sent_iosa:0 "A déjà envoyé une aide"

je_request_iosa_aid_button:0 "Demande d'aide internationale"
je_request_iosa_aid_button_desc:0 "Demander l'aide de la communauté internationale pour aider à se remettre du tremblement de terre dévastateur et du tsunami."

tsunami_disaster_struck: "Atteint par le tremblement de terre et le tsunami de 2004 dans l'océan Indien"

# Iraq disarmament Crisis

je_iraq_disarmament_crisis: "Crise du désarmement en Iraq"
je_iraq_disarmament_crisis_reason: "Après la guerre du Golfe, l'Irak était lié par la résolution 687 du Conseil de sécurité des Nations unies pour démanteler ses programmes d'armes de destruction massive. La communauté internationale, par l'intermédiaire de la CSNU et de l'AIEA, s'est efforcée de vérifier la conformité, mais les obstacles et les différends concernant les inspections en Iraq ont créé une impasse prolongée. La crise menace de raviver le conflit à mesure que les tensions s'accentuent au sujet du refus de l'Iraq de coopérer pleinement avec le régime de désarmement."
iraq_disarmament_resolved_tt: "La crise du désarmement irakien a été résolue."

je_us_iraq_disarmament: "Crise du désarmement en Iraq"
je_us_iraq_disarmament_reason: "Les États-Unis se sont engagés à faire respecter la résolution 687 du Conseil de sécurité des Nations unies. L'obstruction répétée de l'Iraq aux inspections de la CSNU et de l'AIEA sape les tensions mondiales en matière de sécurité et alimente la région du Golfe.\n\n Les efforts diplomatiques se poursuivent, mais les options militaires demeurent sur la table si les inspections échouent."

iraq_events.10.t: "L ' Iraq rejette les aéronefs de la Commission spéciale"
iraq_events.10.d: "Face à un défi audacieux lancé à la Commission spéciale des Nations Unies, l'Iraq a rejeté les propositions tendant à ce que les inspecteurs utilisent leurs propres aéronefs pour entrer dans le pays. Bagdad insiste sur le plein contrôle de l ' accès et des transports, suscitant de nouvelles préoccupations quant à son attachement au désarmement."
iraq_events.10.a: "Rejeter leurs termes — La souveraineté de l'Irak vient en premier."
iraq_events.10.b: "Permettez les vols — la coopération peut atténuer les tensions."

us_events.10.t: "Iraq bloque les avions de la Commission spéciale"
us_events.10.d: "L ' Iraq a refusé d ' autoriser les inspecteurs de la Commission spéciale à piloter leurs propres aéronefs dans le pays, ce qui entrave encore davantage les efforts d ' inspection. Ce mouvement est perçu comme un acte de défi direct envers l'ONU et un revers pour les efforts de désarmement."
us_events.10.a: "Cela ne peut pas rester sans réponse."
us_events.10.b: "Évitez l'escalade — pour le moment."

################# COUNTRY-SPECIFIC ##############

# united states

rodney.1.t:0 "La police bat Rodney King"
rodney.1.d:0 "Un afro-américain désarmé, Rodney King a été violemment battu par des officiers du département de police de Los Angeles après une poursuite à grande vitesse. Un spectateur a filmé l'agression, exposant la brutalité policière et suscitant l'indignation nationale."
rodney.1.f:0 "Ils l'entouraient et le battaient avec des matraques. Il ne se battait pas. C'était horrible, comme s'ils voulaient en faire un exemple."

rodney.1.a:0 "Ça va être un été chaud."

rodney.2.t:0 "Les émeutes en Los Angeles"
rodney.2.d:0 "Dans le sillage des policiers accusés d'avoir abusé de la force dans le passage à tabac de Rodney King, de vastes pans de personnes sont descendus dans la rue, causant des dommages de plus d'un milliard de dollars à The City"
los_angeles_riots:0 "Rodney King Riots"
rodney.2.a:0 "Ils s'installeront seuls."
rodney.2.b:0 "Envoyez la Garde Nationale !"

north_hollywood.1.t: "Tir à Hollywood-Nord"
north_hollywood.1.d: "Deux voleurs étaient vêtus d'armure et portaient des fusils d'assaut. Des officiers armés ont dû emprunter des armes à un magasin d'armes local pour réagir efficacement."
north_hollywood.1.f: "Deux brigands lourdement armés se sont livrés à une longue fusillade avec la police de Los Angeles, blessant plusieurs officiers et civils. L'incident a choqué la nation et soulevé des questions sur la préparation de la police."
north_hollywood.1.a: "Une journée froide dans l'histoire des forces de l'ordre."

north_hollywood_police_response:0 "Appui accru à l ' application des lois"

wtc_bombing.1.t: "1993 Centre du commerce mondial"
wtc_bombing.1.d: "Un puissant camion piégé a explosé sous la tour nord du World Trade Center à New York, tuant six personnes et blessant plus d'un millier. L'attaque a choqué la nation, révélant des vulnérabilités au terrorisme à l'intérieur de ses propres frontières."
wtc_bombing.1.a: "Accroître les mesures de sécurité intérieure."
wtc_bombing.1.b: "Restez calme et évitez toute réaction excessive."
heightened_security_measures: "Mesures de sécurité renforcées"
heightened_security_measures_desc: "En réponse à une attaque terroriste, le gouvernement a mis en place des politiques de sécurité intérieure plus solides et une coordination de l'application des lois."
oklahoma_city_aftermath: "Oklahoma City Bombing Aftermath"
oklahoma_city_aftermath_desc: "Le bombardement dévastateur du bâtiment fédéral Alfred P. Murrah a secoué la nation. Les préoccupations en matière de sécurité et les répercussions politiques persistent alors que le gouvernement renforce sa vigilance intérieure."
 
usa_events.1.t: "Résultats primaires républicains"
usa_events.1.d: "Après une saison primaire chargée de débats et de campagnes, le Parti républicain a choisi son nouveau porte-étendard. George W. Bush est devenu vainqueur, prenant les rênes de la Petite Bourgeoisie et promettant un nouveau chapitre audacieux pour le parti."
usa_events.1.a: "La nomination est à lui."

usa_events.2.t: "La nomination de Barack Obama"
usa_events.2.d: "Après une saison primaire chargée de débats et de campagnes, le Parti démocratique a choisi son nouveau porte-étendard. Barack Hussein Obama est sorti vainqueur, prenant les rênes de la Petite Bourgeoisie et promettant un nouveau chapitre audacieux pour le parti."
usa_events.2.a: "La nomination est à lui."

usa_events.3.t: "La nomination de Donald Trump"
usa_events.3.d: "Après une saison primaire chargée de débats et de campagnes, le Parti républicain a choisi son nouveau porte-étendard. Donald John Trump, un personnage particulièrement controversé, est sorti victorieux, prenant les rênes des professionnels et promettant un nouveau chapitre audacieux pour le parti."
usa_events.3.a: "La nomination est à lui."

# Storm of the Century
american_disasters.1.t: "1993 La tempête du siècle"
american_disasters.1.d: "Une tempête cyclonique massive a balayé l'est des États-Unis, provoquant des chutes de neige record, des vents de force et de graves inondations le long des côtes. Des millions sont laissés sans pouvoir, et le nombre de morts augmente chaque jour."
american_disasters.1.a: "Nous devons supporter la colère de l'hiver."

# Great Flood of 1993
american_disasters.2.t: "Le grand déluge !"
american_disasters.2.d: "Des semaines de fortes pluies et de sols saturés ont fait gonfler les rivières Mississippi et Missouri bien au-delà de leurs berges, submergeant de vastes régions du Midwest américain. Des villes entières sont sous l'eau, et les dégâts sont sans précédent."
american_disasters.2.a: "Un désastre pour le cœur."

great_flood_of_1993: "Grande crue de 1993"
storm_of_the_century: "1993 La tempête du siècle"

# Columbine

columbine.1.t: "Massacre du lycée du Colorado"
columbine.1.d: "Deux étudiants lourdement armés ont commis une attaque mortelle à l'école secondaire Columbine, au Colorado, tuant et blessant beaucoup d'entre eux avant de se suicider. L'événement a suscité des deuils et des débats à l'échelle nationale sur le contrôle des armes, la sécurité scolaire et les influences culturelles."
columbine.1.a: "Pensées et prières"
columbine.1.b: "Nous devons renforcer la sécurité dans les écoles de notre pays."

national_mourning_school_shooting: "Le deuil à l'école"
school_security_measures: "Mesures de sécurité scolaire"

better_school_security: "Une meilleure sécurité scolaire"
thoughts_and_prayers: "Pensées et prières"
recent_mass_shooting: "Tir de masse récent"

# September 11 Attacks 

ground_zero: "Zéro sol"
  
je_war_on_terror: "Guerre contre la terreur"
je_war_on_terror_reason: "Les attentats terroristes du 11 septembre 2001 contre les États-Unis ont marqué le début d'une campagne mondiale soutenue contre le terrorisme. À la suite des attaques, les États-Unis ont lancé ce qu'ils ont appelé la « guerre contre la terreur », une vaste stratégie qui combine les opérations militaires, les efforts de renseignement et les mesures de sécurité intérieure. Les conséquences ont transformé la politique étrangère, les débats sur les libertés civiles et les alliances internationales.\n\n"

usa_wot.1.t: "Amérique attaquée"
usa_wot.1.d: "Des attaques terroristes coordonnées ont frappé New York et Washington, détruisant les tours du World Trade Center et endommageant gravement le Pentagone. Des milliers de personnes ont été tuées ou blessées. La nation est en état de choc et exige une réponse."
usa_wot.1.a: "Un jour qui vivra dans l'infamie."

usa_wot.2.t: "Une guerre contre la terreur"
usa_wot.2.d: "Au lendemain des attaques, le Président a annoncé une campagne mondiale contre ceux qui planifient, soutiennent ou abritent des organisations terroristes. Cette déclaration entraînera un renforcement des mesures de sécurité au pays et des engagements militaires à l'étranger."
usa_wot.2.a: "Nous allons les traduire en justice."

global_wot.1.t: "Attaqué par les États-Unis; Des milliers de morts"
global_wot.1.d: "Les États-Unis ont subi des attaques terroristes dévastatrices. Les dirigeants mondiaux ont présenté leurs condoléances et de nombreux États réexaminent leurs arrangements en matière de sécurité."
global_wot.1.a: "Une tragédie pour toute l'humanité."

global_wot.2.t: "Les États-Unis déclarent la guerre contre la terreur"
global_wot.2.d: "Après les attentats du 11 septembre, les États-Unis ont déclaré une « guerre contre la terreur » mondiale, appelant la communauté internationale à se joindre à une campagne contre les groupes terroristes et leurs partisans."
global_wot.2.a: "L'ordre international change."

global_wot.3.t: "Les États-Unis invoquent l'article 5"
global_wot.3.d: "Après les attaques du 11 septembre et la campagne militaire américaine qui a suivi en Afghanistan, l'article 5 de la charte de l'OTAN a été invoqué pour la première fois dans l'histoire. En tant qu'État membre, nous sommes appelés à nous joindre à l'effort de guerre."
global_wot.3.a: "Nous sommes avec nos alliés."

usa_wot.3.t: "Anthrax attaque terroriser l'Amérique"
usa_wot.3.d: "Dans les semaines qui ont suivi les attaques du 11 septembre, des lettres anonymes contenant des spores d'anthrax mortelles ont été envoyées par la poste à des organismes de presse et à des sénateurs américains. Les attaques ont semé la peur dans tout le pays, suscité des enquêtes massives et suscité des préoccupations accrues au sujet de la guerre biologique."
usa_wot.3.a: "La justice sera rendue. Et ce sera rapide."
usa_wot.3.b: "Pas encore !"
  
je_hunt_for_bin_laden: "La chasse pour Osama Ben Laden"
je_hunt_for_bin_laden_reason: "À la suite des attaques du 11 septembre 2001, les États-Unis ont lancé une vaste et mondiale recherche pour Oussama ben Laden, leader d'Al-Qaïda. Cette mission s'étendra au-delà des frontières, impliquant des opérations militaires, la collecte de renseignements et la pression diplomatique.\n\n"
intensified_intelligence_operations: "La chasse pour Osama Ben Laden"

hunt_bin_laden_progress_bar: "Chassez les progrès"
hunt_bin_laden_progress_bar_desc: "Progrès de la recherche"
osama_bar_completed: "Osama Ben Laden a été trouvé"

usa_wot.10.t: "La chasse pour Osama Ben Laden"
usa_wot.10.d: "Avec la guerre contre la terreur en cours, les services de renseignement américains et les forces spéciales ont commencé une recherche mondiale pour Oussama ben Laden. Les décisions vont maintenant déterminer l'intensité et la portée de l'opération."
usa_wot.10.a: "Commettez toutes les ressources nécessaires."
usa_wot.10.b: "Se concentrer sur d'autres priorités."

usa_wot.12.t: "Ben Laden capturé"
usa_wot.12.d: "Après des années de poursuite, Oussama ben Laden a été localisé et neutralisé. Les États-Unis célèbrent une victoire importante dans la guerre contre la terreur."
usa_wot.12.a: "La justice a été rendue."

usa_wot.11.t: "Les États-Unis tuent Ben Laden"
usa_wot.11.d: "Après des mois de collecte et de préparation de renseignements, les SEAL de la marine américaine ont lancé un raid audacieux sur un complexe à Abbottabad, au Pakistan. L'objectif : capturer ou tuer Oussama Ben Laden. Le monde attend le résultat."

usa_wot.11.a: "Jusqu'au bout."

usa_wot.11.success_tt: "Oussama Ben Laden a été tué au Pakistan. La guerre contre la terreur entre dans une nouvelle phase."

usa_wot.20.t: "Renseignement"
usa_wot.20.d: "Des agents de la CIA découvrent des renseignements précieux de militants capturés, fournissant de nouvelles pistes sur Ben Laden, où que ce soit."
usa_wot.20.a: "Excellent, poussez-vous."
usa_wot.20.a.tt: "Les progrès vers la recherche de Ben Laden ont augmenté."

usa_wot.21.t: "Ben Laden publie une vidéo"
usa_wot.21.d: "Des mois de recherche d'un suspect soupçonné d'être lié à Ben Laden se sont avérés être une impasse. Les ressources ont été gaspillées. Pour aggraver les choses, le terroriste du Moyen-Orient a publié une vidéo à l'intention du public américain."
usa_wot.21.a: "Un revers frustrant."
usa_wot.21.a.tt: "Les progrès vers la recherche de Ben Laden ont diminué."

usa_wot.22.t: "Coopération régionale"
usa_wot.22.d: "Le Pakistan et ses alliés régionaux apportent leur aide à la collecte de renseignements et accélèrent la chasse à Ben Laden."
usa_wot.22.a: "Cela nous aidera grandement."
usa_wot.22.a.tt: "Les progrès vers la recherche de Ben Laden ont augmenté de façon significative."
 
accuse_iraq_wmds_button: "Accuser l ' Iraq d ' armes de destruction massive"
accuse_iraq_wmds_button_desc: "Accusez l ' Iraq de mettre au point ou d ' abriter secrètement des armes de destruction massive. Cela aggravera les tensions et pourrait justifier une action militaire."

end_war_on_terror_button: "Mettre fin à la guerre contre la terreur"
end_war_on_terror_button_desc: "Déclarer la guerre contre la terreur officiellement terminée, mettre fin aux opérations internationales. Cela laissera des conséquences persistantes au pays et à l'étranger."

usa_wot.30.t: "Accusés d ' avoir volé des armes de destruction massive"
usa_wot.30.d: "Les États-Unis nous ont publiquement accusés de développer et d ' abriter secrètement des armes de destruction massive. Cela marque une escalade importante des tensions et peut rapprocher les conflits."
usa_wot.30.a: "Effrayant"
  
osama_extradited: "Oussama Ben Laden a été extradé"
war_on_terror_stopped_tt: "La guerre contre la terreur a pris fin"
# War on TERROR

usa_wot.5.t: "Ben Laden en garde à vue"
usa_wot.5.d: "Dans une percée diplomatique surprenante, l'Afghanistan a accepté d'extrader Oussama ben Laden vers les États-Unis. Cette concession marque une victoire importante dans les premières étapes de la guerre contre la terreur."
usa_wot.5.a: "C'est une victoire diplomatique majeure."

usa_wot.6.t: "L'Afghanistan refuse d'extrader Ben Laden"
usa_wot.6.d: "Le gouvernement afghan a refusé de remettre Oussama ben Laden aux autorités américaines. Les tensions s'élèvent alors que Washington débat de sa prochaine initiative."
usa_wot.6.a: "Vous êtes avec les terroristes, ou contre eux."
usa_wot.6.b: "Ne prenons aucune action brutale, maintenant.."

je_request_bin_laden_extradition_button: "Demande d'extradition de Ben Laden"
je_request_bin_laden_extradition_button_desc: "Demander officiellement à l'Afghanistan d'extrader Oussama ben Laden vers les États-Unis pour être jugé."

bin_laden_extradition_accepted_country: "Extradition de Ben Laden - acceptée"
bin_laden_extradition_accepted_country_desc: "L'Afghanistan a accepté d'extrader Oussama ben Laden, en renforçant le moral national et en améliorant la préparation militaire."
  
bin_laden_extradition_accepted_ig_armed_forces: "Extradition de Ben Laden - acceptée"
bin_laden_extradition_accepted_ig_armed_forces_desc: "Les Forces armées se félicitent du succès diplomatique du gouvernement pour obtenir l'extradition de Ben Laden."

bin_laden_extradition_rejected_country: "Extradition forcée - Rejetée"
bin_laden_extradition_rejected_country_desc: "L'Afghanistan a refusé d'extrader Oussama ben Laden, ce qui nuit à notre préparation militaire et à nos ressources."
  
bin_laden_extradition_rejected_ig_armed_forces: "Liberté immuable"
bin_laden_extradition_rejected_ig_armed_forces_desc: "Les forces armées sont en colère devant le fait que le gouvernement n'a pas obtenu l'extradition de Ben Laden."

bin_laden_extradition_rejected_ig_armed_forces_2: "N'a pas envahi l'Afghanistan"
bin_laden_extradition_rejected_ig_armed_forces_2_desc: "Les forces armées sont en colère devant le fait que le gouvernement n'a pas obtenu l'extradition de Ben Laden."

operation_enduring_freedom: "Opération Liberté immuable"


limited_response: "Réponse limitée"
heightened_security_measures: "Mesures de sécurité renforcées"

afghanistan.1.t: "Les États-Unis exigent l'extradition de Ben Laden"
afghanistan.1.d: "Les États-Unis ont officiellement demandé à l'Afghanistan de remettre Oussama ben Laden, accusé d'esprit des attaques du 11 septembre. Accepter cette demande pourrait atténuer les tensions, mais le refus peut entraîner de graves conséquences."
afghanistan.1.a: "Respectez la demande."
afghanistan.1.b: "Refuser."

# 2003 Invasion of Iraq

iraq_war.1.t: "L'ONU convoque les revendications de l'Irak sur les armes de destruction massive"
iraq_war.1.d: "Les États-Unis ont accusé l ' Iraq d ' abriter des armes de destruction massive. L'ONU a convoqué une session d'urgence pour discuter de la question et recueillir des réponses internationales."
iraq_war.1.a: "Le débat commence."

iraq_war.2.t: "Débat de l'ONU sur les ADM en Irak"
iraq_war.2.d: "La communauté internationale débat de la manière de répondre aux accusations américaines contre l'Irak."
iraq_war.2.a: "Soutenir les États-Unis."
iraq_war.2.b: "Côté Irak."
iraq_war.2.c: "Restez neutre."

iraq_war.3.t: "Réponse de l'OTAN aux accusations américaines"
iraq_war.3.d: "En tant qu'alliés de l'OTAN, nous devons décider de soutenir la position des États-Unis sur le prétendu programme d'ADM en Irak."
iraq_war.3.a: "Nous serons avec les États-Unis."
iraq_war.3.b: "Nous ne pouvons soutenir cette action."

iraq_war.4.t: "L'Iraq répond aux accusations"
iraq_war.4.d: "L ' Iraq a été accusé d ' abriter des ADM. Le gouvernement doit réagir à la pression croissante de l'étranger."
iraq_war.4.a: "Refusez tout et endurez l'isolement."
iraq_war.4.b: "Condamner l'Occident et mobiliser la propagande."
  
iraq_war.5.t: "Les États-Unis plaident auprès de l'ONU"
iraq_war.5.d: "Les États-Unis ont présenté leur cas à l ' ONU, demandant instamment leur appui à l ' action militaire contre l ' Iraq au sujet de ses armes de destruction massive présumées. Les dirigeants mondiaux doivent maintenant décider s'ils veulent soutenir l'intervention de Washington."
iraq_war.5.b: "L'ONU est dans l'impasse — nous devons agir seul"
iraq_war_us_lobby_tt: "Les États-Unis font pression sur les principaux pouvoirs de soutien et d'adaptation des relations diplomatiques."
iraq_war_unfail_tt: "Née juste à temps pour mourir au Moyen-Orient."

iraq_war.6.t: "Les États-Unis décident de la guerre"
iraq_war.6.d: "Alors que l'ONU est paralysée par la division, Washington est confronté à une décision capitale : agir seul et affronter l'Irak militairement, ou reculer et risquer de paraître faible devant le monde."
iraq_war.6.a: "Lancement de l'invasion de l'Iraq"
iraq_war.6.b: "Reculez et évitez la guerre"
iraq_war_backdown_tt: "Les États-Unis se retirent de l'intervention, perdant le prestige international."
2003_invasion_of_iraq: "Invasion de l ' Iraq en 2003"
iraq_condemned: "Iraq Condamné"

