 je_yugoslav_wars_serbia:0 "Les guerres yougoslaves"
 je_yugoslav_wars_serbia_reason:0 "Les guerres de succession yougoslave se poursuivent jusqu'à ce que la région s'installe dans un ordre postfédéral."
 je_yugo_wars_status_general:0 "La crise régionale se poursuit."
 je_yugo_wars_status_bosnia:0 "La Bosnie reste le centre de la guerre."
 je_yugo_wars_status_kosovo:0 "Le Kosovo est devenu la crise centrale."

 yugoslav_collapse.1.t:0 "Les fractures de la Fédération"
 yugoslav_collapse.1.d:0 "Les gouvernements nationalistes et l'effondrement de l'autorité fédérale ont poussé la Yougoslavie au bord de la dissolution."
 yugoslav_collapse.1.a:0 "Les républiques doivent être réunies."
 yugoslav_collapse.1.b:0 "Offrir un règlement confédéral."
 yugoslav_collapse.1.c:0 "Rétablir l'autorité fédérale par la force."

 yugoslav_collapse.2.t:0 "La Croatie s'éloigne"
 yugoslav_collapse.2.d:0 "La Croatie a progressé vers l'indépendance, forçant Belgrade à décider s'il faut combattre ou reconnaître la rupture."
 yugoslav_collapse.2.a:0 "Lancer la guerre d'indépendance croate."
 yugoslav_collapse.2.b:0 "Reconnaître l'indépendance croate."

 yugoslav_collapse.3.t:0 "La Bosnie déclare son indépendance"
 yugoslav_collapse.3.d:0 "L'indépendance de la Bosnie a créé des revendications concurrentes dans toute la République, et les entités serbes ont commencé à organiser leur propre autorité territoriale."
 yugoslav_collapse.3.a:0 "La guerre de Bosnie commence."
 yugoslav_collapse.3.b:0 "Reconnaître la Bosnie et rechercher un règlement."

 yugoslav_collapse.4.t:0 "Réponse internationale"
 yugoslav_collapse.4.d:0 "Les gouvernements étrangers débattent du maintien de la paix, des sanctions et de la médiation à mesure que le conflit yougoslave se propage."
 yugoslav_collapse.4.a:0 "Une mission de maintien de la paix est nécessaire."
 yugoslav_collapse.4.b:0 "C'est une affaire interne."

 yugoslav_collapse.5.t:0 "Serbie demande la réunification"
 yugoslav_collapse.5.d:0 "Belgrade a demandé à notre gouvernement de retourner dans un État yougoslave restauré."
 yugoslav_collapse.5.a:0 "Accepter la réunification."
 yugoslav_collapse.5.b:0 "Rejeter la demande."

 yugoslav_collapse.10.t:0 "Négociations confédérales"
 yugoslav_collapse.10.d:0 "Une confédération yougoslave plus lâche peut préserver la paix, mais les républiques restent méfiantes des intentions de Belgrade."
 yugoslav_collapse.10.a:0 "Poursuivre les réformes."
 yugoslav_collapse.10.b:0 "Le processus échoue."

 yugoslav_collapse.20.t:0 "Yougoslavie Préservée"
 yugoslav_collapse.20.d:0 "Par compromis et par retenue, la Yougoslavie a évité toute désintégration et accepté un règlement confédéral."
 yugoslav_collapse.20.a:0 "La fédération survit."

 yugoslav_collapse.30.t:0 "Référendum du Monténégro"
 yugoslav_collapse.30.d:0 "Le Monténégro se prépare à décider s'il faut poursuivre l'union avec la Serbie ou rétablir la pleine indépendance."
 yugoslav_collapse.30.a:0 "Reconnaître l'indépendance du Monténégro."
 yugoslav_collapse.30.b:0 "Préservez le syndicat."

 srpskas.1.t:0 "La Republika Srpska mobilise"
 srpskas.1.d:0 "Les dirigeants serbes de Bosnie se sont mobilisés pour sécuriser le territoire contre le nouveau gouvernement de Bosnie."
 srpskas.1.a:0 "Lancez la guerre."
 srpskas.1.b:0 "Accepter l'autonomie en Bosnie."

 kosovo_events.1.t:0 "La crise du Kosovo"
 kosovo_events.1.d:0 "La montée des troubles et de la répression au Kosovo a créé une crise qui pourrait amener l'Albanie et l'OTAN à entrer en conflit avec la Yougoslavie."
 kosovo_events.1.a:0 "Casse-toi."
 kosovo_events.1.b:0 "Offrez une large autonomie."

 kosovo_events.2.t:0 "Une intervention au Kosovo ?"
 kosovo_events.2.d:0 "Le conflit au Kosovo s'est intensifié. Les gouvernements de l'OTAN débattent de l'intervention militaire contre la Yougoslavie."
 kosovo_events.2.a:0 "Commencez la campagne de bombardement."
 kosovo_events.2.b:0 "Évitez l'escalade."

 kosovo_events.3.t:0 "Le bombardement de l'OTAN commence"
 kosovo_events.3.d:0 "Les avions de l'OTAN ont commencé à frapper des cibles yougoslaves. Belgrade doit choisir de se retirer du Kosovo ou de résister."
 kosovo_events.3.a:0 "Retirez-vous du Kosovo."
 kosovo_events.3.b:0 "Résiste à l'OTAN."

 kosovo_events.4.t:0 "Statut du Kosovo"
 kosovo_events.4.d:0 "Avec le retrait des forces yougoslaves et l'administration internationale en place, le statut du Kosovo doit être résolu."
 kosovo_events.4.a:0 "Le Kosovo devient indépendant."
 kosovo_events.4.b:0 "Le Kosovo reste autonome."

 yugoslav_war_crimes.1.t:0 "Le siège de Sarajevo"
 yugoslav_war_crimes.1.d:0 "Des rapports de Sarajevo décrivent les bombardements, la famine et les souffrances civiles dans des conditions de siège."
 yugoslav_war_crimes.1.a:0 "Refusez toute responsabilité et continuez."
 yugoslav_war_crimes.1.b:0 "Ouvre une enquête."

 yugoslav_war_crimes.2.t:0 "Srebrenica"
 yugoslav_war_crimes.2.d:0 "Des meurtres de masse près de Srebrenica ont provoqué des scandales internationaux."
 yugoslav_war_crimes.2.a:0 "Rejeter les accusations."
 yugoslav_war_crimes.2.b:0 "Coopérer avec les enquêteurs."

 yugoslav_war_crimes.3.t:0 "Répondre à Sarajevo"
 yugoslav_war_crimes.3.d:0 "Le siège a intensifié les demandes d'action internationale."
 yugoslav_war_crimes.3.a:0 "Condamner Belgrade."
 yugoslav_war_crimes.3.b:0 "Dénoncez une protestation limitée."

 yugoslav_war_crimes.4.t:0 "Répondre à Srebrenica"
 yugoslav_war_crimes.4.d:0 "Le massacre a changé l'humeur internationale à la guerre."
 yugoslav_war_crimes.4.a:0 "Demande de responsabilisation."
 yugoslav_war_crimes.4.b:0 "Éviter toute autre implication."

 yugoslav_war_crimes.5.t:0 "Grief national"
 yugoslav_war_crimes.5.d:0 "Les nouvelles du front ont choqué le pays et aggravé les cicatrices de la guerre."
 yugoslav_war_crimes.5.a:0 "Nous pleurons."

