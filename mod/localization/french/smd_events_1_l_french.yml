 ## war on terror again
 
 wot_coalition.2.t:0 "Article 5 Invoqué"
 wot_coalition.2.d:0 "Après les attaques contre les États-Unis, l'OTAN a invoqué l'article 5. L'alliance considère maintenant l'attaque comme une attaque contre tous les membres."
 wot_coalition.2.f:0 "L'alliance de l'Atlantique Nord a été construite pour la défense collective. Sa première invocation ne vient pas de chars qui traversent une frontière, mais d'une attaque terroriste."
 wot_coalition.2.a:0 "Restez avec les États-Unis."

 wot_coalition.10.t:0 "Les États-Unis exigent une coopération"
 wot_coalition.10.d:0 "Les États-Unis ont exigé la coopération du Pakistan dans la guerre contre la terreur. Washington s'attend à ce que les militaires aient accès à l'Afghanistan, qu'ils fondent leurs droits, qu'ils lui fournissent un appui en matière de renseignement et qu'ils aient accès à des itinéraires logistiques."
 wot_coalition.10.f:0 "La géographie du Pakistan le rend indispensable. Toutefois, le refus d ' Islamabad amènerait à accuser celui-ci de protéger le terrorisme."
 wot_coalition.10.a:0 "Coopérer avec la coalition."
 wot_coalition.10.b:0 "Refusez l'ultimatum."

 wot_coalition.11.t:0 "Coopératives du Pakistan"
 wot_coalition.11.d:0 "Le Pakistan a accepté de coopérer avec les États-Unis et les partenaires de la coalition, en accordant un accès militaire et en accueillant des bases militaires pour la campagne en Afghanistan."
 wot_coalition.11.f:0 "La route vers l'Afghanistan traverse maintenant le Pakistan."
 wot_coalition.11.a:0 "Sécurisez les routes."

 wot_coalition.12.t:0 "Le Pakistan refuse"
 wot_coalition.12.d:0 "Le Pakistan a refusé les demandes américaines de coopération. Washington qualifie maintenant le Pakistan de complice du terrorisme et prépare une action militaire directe."
 wot_coalition.12.f:0 "Le refus transforme un partenaire logistique en cible."
 wot_coalition.12.a:0 "Ils ont choisi leur camp."

 wot_article_5_join_war_tt:0 "Ce membre de l'OTAN se joindra aux États-Unis dans toute guerre active contre l'Afghanistan. Si la guerre n'a pas encore commencé, elle se joindra une fois la guerre commencée."
 wot_pakistan_cooperate_tt:0 "Le Pakistan signe des traités de 10 ans avec les États-Unis et tous les partenaires de la coalition, accordant #bold Accès militaire#! et #bold Bases militaires d'accueil#!."
 wot_pakistan_refuse_tt:0 "Les États-Unis lancent une guerre de changement de régime contre le Pakistan et la qualifient de complice du terrorisme."

 wot_pakistan_coalition_access_treaty_name:0 "Accord d'accès à la coalition pour la guerre contre la terreur"
 operation_enduring_freedom_pakistan:0 "Opération Liberté immuable - Pakistan"

 wot_article_5_commitment:0 "Article 5 Engagement"
 wot_article_5_commitment_desc:0 "Ce pays s'est engagé dans la réponse de l'OTAN après le 11 septembre."

 wot_pakistan_cooperation:0 "Coopération de coalition"
 wot_pakistan_cooperation_desc:0 "Le Pakistan coopère avec les États-Unis et les partenaires de la coalition dans la guerre contre la terreur."

 wot_pakistan_complicit:0 "Complicité marquée dans le terrorisme"
 wot_pakistan_complicit_desc:0 "Le Pakistan a refusé la coopération et est maintenant considéré comme complice du terrorisme par les États-Unis."

 wot_coalition.20.t:0 "L'Alliance du Nord rejoint la Coalition"
 wot_coalition.20.d:0 "L'Alliance du Nord s'est emparée de Kaboul et s'est jointe à la campagne menée par les Américains contre le régime taliban en Afghanistan."
 wot_coalition.20.f:0 "Les Taliban font maintenant face à une coalition extérieure et à un ennemi national à la fois."
 wot_coalition.20.a:0 "Avance sur Kaboul."

