 je_demographic_crisis: "Crise démographique"
 je_demographic_crisis_reason: "Notre pays fait face à une crise démographique imminente. Le vieillissement de la population et la baisse des taux de natalité menacent de réduire notre main-d'oeuvre et de mettre nos systèmes sociaux à rude épreuve. Nous devons adopter des politiques pronatalistes globales et les soutenir pendant une décennie pour inverser cette tendance avant l'expiration du tampon démographique temporaire."

 je_demographic_crisis_progressing_tt: "Les politiques pronatalistes sont en vigueur et les conditions sont remplies. Progrès : #bold [Root.GetCountry.MakeScope.Var('demographic_months_sustained').GetValue|0]#! / 120 mois."
 je_demographic_crisis_stalling_tt: "#negative Les conditions pronatalistes ne sont plus remplies.#! Le progrès se dégrade. Courant: #bold [Root.GetCountry.MakeScope.Var('demographic_months_sustained').GetValue|0]#! / 120 mois. Adopter des lois sur la garde des enfants, les soins de santé, la protection sociale et le logement tout en maintenant le niveau de vie au-dessus de 12."
 je_demographic_crisis_idle_tt: "Aucun progrès vers la résolution de la crise démographique. Mettre en œuvre des politiques pronatalistes : la garde des enfants, les soins de santé, le bien-être et le logement. Maintenir un niveau de vie moyen d'au moins 12 personnes."

 demographic_crisis_sustained_tt: "Les politiques pronatalistes sont maintenues depuis 10 ans (120 mois)."

