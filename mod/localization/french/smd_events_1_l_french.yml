 je_first_chechen_war: "Première guerre tchétchène"
 je_first_chechen_war_reason: "La République tchétchène d'Ichkeria a déclaré son indépendance de la Russie. Moscou a réagi avec la force militaire. Le territoire montagneux du Caucase du Nord favorise les guérilleros tchétchènes, mais la Russie apporte une force conventionnelle écrasante. L'issue de cette guerre déterminera le sort de la Tchétchénie et testera la détermination de la Fédération de Russie."
 
 je_chechen_war_complete_tt: "Une partie a été défaite ou annexée."
 
 je_chechen_war_status_guerilla: "La guerre est dans sa phase de guérilla #bold. Les combattants tchétchènes utilisent les montagnes pour mener des attaques. Les batailles déplacent le score de la guerre et débloquent des offensives majeures."
 je_chechen_war_status_offensive: "Une offensive majeure #bold a été lancée. La guerre est entrée dans sa phase décisive."
 
 je_chechen_war_score_bar: "Score de guerre"
 je_chechen_war_score_bar_desc: "Avantage russe"
 je_chechen_war_score_bar_second_desc: "Avantage tchétchène"
 
 chechen_war_startup_tt: "La Première Guerre tchétchène a commencé. Les combats entre les forces russes et tchétchènes vont changer le score de la guerre. Lorsque l'élan est suffisant, une offensive décisive peut être lancée."
 
