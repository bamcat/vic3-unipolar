 je_chechen_war_mountain_offensive: "Contre-offensive des montagnes"
 je_chechen_war_mountain_offensive_desc: "Lancer une contre-offensive majeure à partir des montagnes, frappant les positions russes à travers le Caucase. Cela met fin à la phase de guérilla et risque tout sur un engagement décisif."
 
