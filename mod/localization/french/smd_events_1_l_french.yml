# canada

canada.1.t:0 "Route des larmes"
canada.1.d:0 "Un tronçon de l'autoroute 16 de la Colombie-Britannique, communément appelée route des larmes, est devenu un symbole de tragédie et d'injustice au Canada, où des dizaines de femmes et de filles autochtones ont disparu ou ont été assassinées depuis les années 1970. Entre Prince George et Prince Rupert, la région éloignée manque depuis longtemps de moyens de transport en commun, obligeant beaucoup à faire du stop – souvent avec des conséquences mortelles."
canada.1.f:0 "Ils (les autorités) l'ont mise dans une boîte en acier. Ça devait être un cercueil fermé à cause de la façon dont ils l'ont trouvée... Il s'arrête pour retenir ses larmes, avant d'étouffer les mots, elle ... était détériorée."

canada.1.a:0 "Malheureusement, ce pays doit faire face à des problèmes beaucoup plus urgents."
canada.1.b:0 "On devrait avoir honte !"

je_indigenous_rights: "Droits des autochtones"
je_indigenous_rights_reason: "La question des droits des Autochtones demeure l'une des questions non résolues les plus importantes dans la politique intérieure de [ROOT.GetCountry.GetName]. Des générations de dépossession, d'assimilation forcée et de rupture des obligations conventionnelles ont laissé de profondes inégalités structurelles entre les populations autochtones et non autochtones. Pour combler cette lacune, il faudra une volonté politique soutenue et la résistance de ceux qui bénéficient du statu quo."


 indigenous_je_status_usa_tt: "Aux États-Unis, plus de 570 tribus reconnues par le gouvernement fédéral occupent des terres de réserve qui représentent une fraction de leur territoire ancestral. L'espérance de vie, le niveau d'instruction et le revenu dans les réserves sont loin de correspondre aux moyennes nationales. La responsabilité fédérale en matière de confiance, l'obligation juridique de protéger la souveraineté et le bien-être des tribus, est largement reconnue comme insuffisamment remplie."

 indigenous_je_status_can_tt: "Les Premières nations, les Métis et les Inuits du Canada comptent plus d'un million de personnes vivant dans un système de réserves établi par la Loi sur les Indiens de 1876. Le système des pensionnats indiens — qui a obligé les enfants autochtones à quitter leur famille pour les « assimiler » — a fonctionné jusqu'en 1996, sa dernière fermeture d'école n'a eu lieu que récemment. Le traumatisme intergénérationnel de ce système continue de façonner les communautés autochtones aujourd'hui."

 indigenous_je_status_nzl_tt: "Le peuple maori — tangata whenua, le peuple de la terre — a signé le traité de Waitangi avec la Couronne britannique en 1840. Ce traité n ' a jamais été pleinement respecté. Les confiscations de terres au XIXe siècle ont dépouillé les communautés maories de la plupart de leur territoire, et les Néo-Zélandais maoris continuent de faire face à des disparités importantes en matière de santé, de revenu et de taux d'incarcération. Le Tribunal de Waitangi, créé en 1975, continue d'entendre les plaintes contre la Couronne."

 indigenous_je_status_ast_tt: "Les peuples aborigènes et insulaires du détroit de Torres sont les plus anciennes cultures continues du monde et comptent parmi les plus défavorisées. Les 'Générations de Stolen' — enfants autochtones enlevés de force de leur famille en vertu de politiques d'assimilation de l'État qui se sont poursuivies jusqu'aux années 1970 — ont laissé des blessures qui n'ont pas guéri. L ' espérance de vie des Australiens autochtones reste inférieure de plus d ' une décennie à la moyenne nationale. La décision de Mabo de 1992 a reconnu le titre natif pour la première fois, mais sa mise en œuvre a été inégale."

 # indigenous.1 — Land Rights
 indigenous.1.t: "Réclamation relative aux droits fonciers autochtones"
 indigenous.1.d_usa: "Une coalition de nations tribales a déposé une réclamation officielle faisant valoir des droits sur une étendue importante de terres fédérales, faisant valoir que le territoire a été illégalement pris en violation des obligations conventionnelles. La réclamation a suscité une importante couverture médiatique et un soutien juridique. Les tribunaux surveillent, de même que l'ensemble de la communauté amérindienne."
 indigenous.1.d_can: "Une bande des Premières nations a revendiqué le titre autochtone d'une superficie importante de terres de la Couronne, affirmant qu'aucun traité valide n'a éteint ses droits sur le territoire. La demande est parvenue à la Cour fédérale. Les experts juridiques notent que la jurisprudence canadienne sur les titres autochtones a beaucoup évolué et que la réponse du gouvernement constituera un précédent important."
 indigenous.1.d_nzl: "Le Tribunal de Waitangi a publié un rapport concluant que la Couronne n'a pas respecté le Traité de Waitangi dans sa gestion des terres contestées. Les conclusions ne sont pas juridiquement contraignantes, mais ont un poids moral et politique important. Les communautés maories demandent au gouvernement de donner suite sans plus tarder aux recommandations."
 indigenous.1.d_ast: "La Cour fédérale a confirmé une revendication de titres autochtones sur une région de terres actuellement louées à des intérêts pastoraux. La décision exige que le gouvernement négocie avec le groupe demandeur au sujet des droits d'utilisation des terres. Les groupes de l'industrie pastorale font pression pour que le gouvernement fasse appel de cette décision."
 indigenous.1.f: "La terre était toujours à eux. La question est de savoir si la loi le dira."
 indigenous.1.a: "Négocier un règlement — honorer la demande"
 indigenous.1.b: "Combattre la demande au tribunal — notre position est défendable"

 # indigenous.2 — Treaty Obligations
 indigenous.2.t: "Obligations conventionnelles en cours de révision"
 indigenous.2.d_usa: "Un rapport du Congrès a révélé que le gouvernement fédéral ne s'acquitte pas de ses obligations conventionnelles envers des dizaines de nations tribales - sous-financement des soins de santé, de l'éducation et de l'infrastructure sur réserves de milliards de dollars par année. Les chefs tribaux demandent un examen officiel de la responsabilité fédérale en matière de confiance et un engagement à combler l'écart de financement."
 indigenous.2.d_can: "Un comité parlementaire a déposé un rapport détaillant le sous-financement chronique des collectivités des Premières nations par rapport aux obligations découlant des traités historiques. Le rapport identifie des lacunes spécifiques dans le logement, l'infrastructure de l'eau et l'éducation. Le gouvernement doit décider comment réagir et s'il doit engager les ressources nécessaires pour rendre les traités complets."
 indigenous.2.d_nzl: "Les dirigeants maoris ont présenté au gouvernement un mémorandum officiel faisant valoir qu'une série de décisions politiques récentes violent les principes du Traité de Waitangi. La note fait état d'infractions précises dans les domaines de la gestion des ressources, des soins de santé et du financement de l'éducation, et demande un examen complet de la conformité au traité dans tous les ministères."
 indigenous.2.d_ast: "Une organisation de défense des droits des Autochtones a publié une analyse détaillée de l'écart entre les engagements déclarés du gouvernement envers les collectivités autochtones et l'affectation réelle des ressources. Le rapport conclut que les engagements en matière de traité et de règlement sont respectés à moins de 60 cents par dollar. Les dirigeants communautaires exigent un audit officiel et un engagement contraignant en faveur de la pleine conformité."
 indigenous.2.f: "Une promesse écrite sur papier est seulement aussi bonne que la volonté de la garder."
 indigenous.2.a: "Respecter pleinement nos obligations — engager les ressources"
 indigenous.2.b: "Reconnaître les lacunes — travailler à l'amélioration progressive"

 # indigenous.3 — Cultural Preservation
 indigenous.3.t: "La menace pour les langues autochtones"
 indigenous.3.d: "Les linguistes ont publié un rapport avertissant que des dizaines de langues autochtones dans [ROOT.GetCountry.GetName] sont sur le point d'extinction. Dans de nombreux cas, il ne reste qu'une poignée de locuteurs parlant couramment — tous âgés. Une fois perdus, ces langues ne peuvent pas être récupérées. Avec eux vont des histoires orales, des connaissances écologiques, des traditions juridiques et des façons de comprendre le monde qui n'existe nulle part ailleurs.\n\n La question est de savoir si le gouvernement est prêt à investir les ressources nécessaires pour inverser cette trajectoire, ou s'il verra l'histoire disparaître en silence."
 indigenous.3.f: "Une langue est un monde. Sa mort est irréversible."
 indigenous.3.a: "Fonds Programmes de revitalisation des langues autochtones"
 indigenous.3.b: "Il s'agit d'une question qui concerne les collectivités et non le gouvernement."

 # indigenous.4 — Health Crisis
 indigenous.4.t: "Crise sanitaire autochtone"
 indigenous.4.d: "Un rapport national sur la santé a mis en évidence l'écart considérable entre les résultats en santé des Autochtones et ceux des non-Autochtones dans [ROOT.GetCountry.GetName]. L'espérance de vie est nettement inférieure. Les taux de diabète, de toxicomanie et de maladie mentale, dont beaucoup sont liés à des traumatismes intergénérationnels, sont considérablement plus élevés. La mortalité infantile dans les réserves et dans les collectivités éloignées est multipliée par plusieurs par la moyenne nationale.\n\n L'établissement médical demande des services de santé autochtones culturellement appropriés et suffisamment financés. Le coût de l'inaction — mesuré en vies — est considérable."
 indigenous.4.f: "L'inégalité en matière de santé est un choix politique."
 indigenous.4.a: "Investir dans des programmes de soins de santé autochtones"
 indigenous.4.b: "Le système de santé existant est accessible à tous les citoyens sur un pied d'égalité."

 # indigenous.5 — Reservation Conditions (USA/CAN)
 indigenous.5.t: "Conditions dans la réserve"
 indigenous.5.d_usa: "Le rapport d'un inspecteur général fédéral a révélé que les conditions de vie dans de nombreuses réserves amérindiennes sont nettement inférieures aux normes nationales. Le logement est surpeuplé et délabré. L'accès à l'eau potable est peu fiable sur des dizaines de réservations. Les taux de chômage dépassent 50 % dans de nombreuses collectivités. Le rapport appelle la situation « une crise de négligence fédérale » et recommande une augmentation substantielle du financement du Bureau des affaires indiennes."
 indigenous.5.d_can: "Une vérification gouvernementale a révélé que des centaines de collectivités des Premières nations sont sous avis d'ébullition de l'eau — certaines depuis plus d'une décennie. Le logement dans de nombreuses réserves est gravement surpeuplé. Les services de santé mentale sont largement absents. La vérification conclut que le gouvernement fédéral dépense environ 30 % de moins par habitant pour les collectivités des Premières nations que pour les autres Canadiens pour des services équivalents."
 indigenous.5.f: "Le système de réserve a été construit pour contenir — et non pour soutenir."
 indigenous.5.a: "Accroître le financement fédéral pour les collectivités de réserve"
 indigenous.5.b: "Maintenir les niveaux de financement actuels — le budget ne permet pas"

 # indigenous.6 — Reservation Economic Development (USA/CAN)
 indigenous.6.t: "Développement économique sur les terres autochtones"
 indigenous.6.d_usa: "Plusieurs nations tribales ont proposé des initiatives de développement économique - y compris des activités de jeu, des partenariats d'extraction de ressources et des projets touristiques - qui généreraient des revenus importants pour les communautés de réserve. Les propositions doivent être approuvées par le gouvernement fédéral et faire face à l'opposition des gouvernements des États voisins et des intérêts commerciaux qui considèrent les entreprises tribales comme de la concurrence. Les dirigeants tribaux soutiennent que l'autosuffisance économique est la seule voie durable pour sortir de la pauvreté."
 indigenous.6.d_can: "Les collectivités des Premières nations des régions riches en ressources cherchent à négocier des ententes de partage des revenus pour l'extraction des ressources sur leurs territoires traditionnels ou à proximité. Plusieurs collectivités ont également proposé des coentreprises avec les gouvernements provinciaux pour le développement forestier et énergétique. Les propositions offrent une voie vers l'autosuffisance économique, mais exigent du gouvernement qu'il partage le contrôle et les revenus qu'il a réclamés jusqu'à présent."
 indigenous.6.f: "La souveraineté sans base économique est un mot vide."
 indigenous.6.a: "Soutenir le développement économique autochtone — approuver les propositions"
 indigenous.6.b: "Privilégier les intérêts existants en matière de ressources — ces propositions créent des complications"

 # indigenous.20 — Ipperwash
 indigenous.20.t: "La crise d'Ipperwash"
 indigenous.20.d: "Les manifestants de Stoney Point Ojibwe ont occupé le parc provincial Ipperwash en Ontario, affirmant que la terre — y compris un cimetière sacré — a été illégalement saisie de leur communauté pendant la Seconde Guerre mondiale pour être utilisée comme base militaire et ne jamais revenir comme promis. L'occupation est pacifique, mais la police provinciale de l'Ontario a établi un périmètre et demande des conseils sur la façon de procéder.\n\n La situation est tendue. Il y a des armes parmi les manifestants. Il y a aussi des aînés, des familles et un grief légitime qui n'a pas été réglé depuis cinquante ans."
 indigenous.20.f: "Un cimetière a été enlevé. Il n'a jamais été rendu."
 indigenous.20.a: "Ordonner à l'OPP de disperser l'occupation — rétablir l'ordre"
 indigenous.20.b: "Diriger l'OPP à se retirer — négocier une résolution pacifique"

 # indigenous.21 — Last residential school
 indigenous.21.t: "Le dernier pensionnat ferme"
 indigenous.21.d: "Gordon Residential School à Punnichy, en Saskatchewan, a fermé ses portes, le dernier pensionnat indien administré par le gouvernement fédéral au Canada. Depuis 1874, le système des pensionnats a retiré de force environ 150 000 enfants autochtones de leur famille et les a placés dans des établissements où la langue, la culture et l'identité autochtones étaient activement réprimées, et où les sévices physiques et sexuels étaient répandus.\n\n La fermeture de la dernière école n'est pas une résolution. C'est une reconnaissance qu'un chapitre de destruction culturelle délibérée a finalement, officiellement, pris fin. Les survivants vivent encore avec ses conséquences."
 indigenous.21.f: "La dernière école a fermé. Les blessures qu'elle a créées ne l'ont pas fait."
 indigenous.21.a: "Un chapitre sombre de l'histoire canadienne est terminé"

 # indigenous.22 — TRC
 indigenous.22.t: "Rapports de la Commission vérité et réconciliation"
 indigenous.22.d: "La Commission de la vérité et de la réconciliation du Canada a publié son rapport final, l'aboutissement de six années de témoignage de plus de 6 500 survivants du système des pensionnats indiens. Le rapport documente les abus systématiques, le génocide culturel et le traumatisme multigénérationnel causé par une politique d'assimilation forcée.\n\n La Commission a lancé 94 appels à l'action — recommandations spécifiques dans les domaines de la protection de l'enfance, de l'éducation, de la langue, de la santé et de la justice. Le rapport utilise l'expression « génocide culturel » pour décrire ce qui a été fait. Le gouvernement doit maintenant décider à quel point il faut prendre au sérieux le travail de la Commission."
 indigenous.22.f: "La vérité est la première étape. La réconciliation est le travail des générations."
 indigenous.22.a: "Accepter formellement les appels à l'action — s'engager à la réconciliation"
 indigenous.22.b: "Reconnaissez le rapport — examinez attentivement les appels à l'action"

 indigenous.10.t: "Un pas vers l'équité"
 indigenous.10.d_usa: "L'adoption d'une loi sur l'action positive aux États-Unis marque une étape importante dans la lutte contre les inégalités structurelles auxquelles sont confrontées les communautés autochtones américaines, aux côtés d'autres groupes traditionnellement marginalisés. Il ne s'agit pas d'une solution à toute la portée de la dépossession des Autochtones, mais il représente un engagement significatif à combler les lacunes qui persistent depuis des générations."
 indigenous.10.d_can: "Le Canada a adopté une loi sur l'action positive, qui reconnaît officiellement que l'inégalité systémique exige un recours systémique. Pour les collectivités des Premières nations, des Métis et des Inuits, la mesure est un élément d'un puzzle beaucoup plus vaste. Mais cela indique une volonté politique de prendre au sérieux la question du désavantage autochtone et de soutenir cette volonté par une politique."
 indigenous.10.d_nzl: "La Nouvelle-Zélande a adopté une législation sur l ' action positive, reconnaissant que les disparités entre les Maoris et les Pākehā Les Néo-Zélandais ne sont pas le résultat d ' un échec individuel mais d ' une politique historique. Pour les communautés maories, il s'agit d'une mesure utile, bien que le Tribunal de Waitangi note que nombre de ses recommandations ne sont toujours pas appliquées."
 indigenous.10.d_ast: "L'Australie a adopté une loi sur l'action positive, un changement de politique important qui reconnaît le caractère structurel du désavantage des autochtones. Pour les communautés aborigènes et insulaires du détroit de Torres, il représente des progrès. L'écart entre l'espérance de vie, les résultats en matière de santé et le niveau de scolarité ne se comblera pas du jour au lendemain, mais l'orientation des voyages a changé."
 indigenous.10.f: "La voie de la justice est longue. C'est un pas en avant."
 indigenous.10.a: "C'est la bonne chose à faire."

 indigenous_land_settlement: "Règlement sur les droits fonciers"
 indigenous_land_settlement_desc: "Un règlement négocié des droits fonciers a amélioré les relations avec les communautés autochtones et amélioré la légitimité du gouvernement."

 indigenous_land_contested: "Droits fonciers contestés"
 indigenous_land_contested_desc: "La décision de contester les droits fonciers autochtones devant les tribunaux a accru les tensions avec les communautés autochtones."

 indigenous_treaty_honoured: "Obligations découlant des traités honorées"
 indigenous_treaty_honoured_desc: "Le plein respect des obligations découlant des traités a renforcé la légitimité et amélioré la position du gouvernement à l'égard des communautés autochtones."

 indigenous_treaty_partial: "Obligations découlant des traités partiellement respectées"
 indigenous_treaty_partial_desc: "Le respect partiel des obligations conventionnelles n'a pas satisfait les défenseurs des droits des Autochtones."

 indigenous_cultural_investment: "Investissement culturel autochtone"
 indigenous_cultural_investment_desc: "Le financement gouvernemental des programmes linguistiques et culturels autochtones appuie la résilience des collectivités."

 indigenous_health_investment: "Programmes de santé autochtone"
 indigenous_health_investment_desc: "Les programmes de soins de santé destinés aux Autochtones améliorent les résultats en matière de santé dans les collectivités autochtones."

 indigenous_health_cost: "Coûts du programme de santé autochtone"
 indigenous_health_cost_desc: "De nouveaux programmes de soins de santé autochtones imposent des exigences supplémentaires au budget de la santé."

 indigenous_health_neglect: "Négligence en matière de santé autochtone"
 indigenous_health_neglect_desc: "L'incapacité de remédier aux disparités en matière de santé des Autochtones suscite un mécontentement constant."

 indigenous_reservation_investment: "Réserve Investissement communautaire"
 indigenous_reservation_investment_desc: "L'augmentation du financement fédéral accordé aux collectivités des réserves commence à combler l'écart entre les niveaux de vie."

 indigenous_reservation_cost: "Frais de financement de réserve"
 indigenous_reservation_cost_desc: "L'augmentation du financement communautaire des réserves met à rude épreuve le budget fédéral."

 indigenous_reservation_neglect: "Réserve Négligence de la communauté"
 indigenous_reservation_neglect_desc: "Le sous-financement chronique des communautés de réserve continue de susciter le mécontentement et la critique internationale."

 indigenous_economic_development: "Développement économique autochtone"
 indigenous_economic_development_desc: "Le soutien aux initiatives de développement économique autochtone génère des revenus pour les collectivités et améliore l'autosuffisance."

 indigenous_economic_blocked: "Développement économique autochtone bloqué"
 indigenous_economic_blocked_desc: "Le rejet des propositions de développement économique autochtone a nui aux relations avec les collectivités des Premières nations."

 ipperwash_crackdown: "Craquage de l'eau de mer"
 ipperwash_crackdown_desc: "La dispersion violente des manifestants autochtones à Ipperwash a suscité d'importantes critiques nationales et internationales."

 ipperwash_negotiation: "Ipperwash Résolue pacifiquement"
 ipperwash_negotiation_desc: "La résolution pacifique de l'impasse d'Ipperwash a renforcé la crédibilité du gouvernement auprès des communautés autochtones."

 indigenous_residential_school_closed: "Dernière école résidentielle fermée"
 indigenous_residential_school_closed_desc: "La fermeture du dernier pensionnat indien marque la fin formelle d'une politique de destruction culturelle, bien que ses conséquences en persistent."

 trc_accepted: "Vérité et réconciliation acceptées"
 trc_accepted_desc: "L'acceptation officielle par le Canada des appels à l'action de la Commission de vérité et réconciliation représente un engagement important à s'attaquer à l'héritage des pensionnats."

 trc_enactment_bonus: "Mandat de réconciliation"
 trc_enactment_bonus_desc: "La dynamique du processus de vérité et de réconciliation facilite l'adoption de lois relatives aux droits des autochtones."

 trc_partial: "CRT Remerciements"
 trc_partial_desc: "Le gouvernement a reconnu le rapport de la Commission Vérité et réconciliation, mais il n'a pas pris l'engagement de mettre en œuvre ses appels à l'action."

 indigenous_rights_progress: "Législation relative aux droits des autochtones"
 indigenous_rights_progress_desc: "L'adoption d'une loi sur l'action positive représente un engagement significatif à remédier aux désavantages des autochtones. L'écart ne se comblera pas du jour au lendemain, mais l'orientation politique a changé."


# japan

japan.1.t: "Fukushima Catastrophe nucléaire"
japan.1.d: "Après un tremblement de terre et un tsunami massif, la centrale nucléaire de Fukushima Daiichi a subi des défaillances catastrophiques, libérant des matières radioactives dans l'environnement. La catastrophe a choqué le monde, provoquant des débats mondiaux sur la sûreté nucléaire et la préparation aux situations d ' urgence."
japan.1.a: "Une tragédie nationale et un réveil mondial."

fukushima_nuclear_disaster: "Fukushima Catastrophe nucléaire"
fukushima_nuclear_disaster_desc: "Les graves dommages causés à l'usine de Fukushima Daiichi ont entraîné une contamination radioactive, la perturbation des infrastructures et un effort de rétablissement national à long terme."

# south sudan

southsudan.1.t: "Référendum pour l ' indépendance du Soudan du Sud"
southsudan.1.d: "Après des décennies de conflit et un référendum décisif, les États du sud du Soudan se sont sécessionnés pour former la République du Soudan du Sud. Le gouvernement central de Khartoum fait face à un choix fatidique : accepter la nouvelle nation ou aller à la guerre pour la récupérer."
southsudan.1.a: "Nous ne permettrons pas que le Soudan soit divisé."
southsudan.1.b: "Laissez-les partir, pour la paix."

# russia

first_chechen_war: "Première guerre tchétchène"

russia_parliament_resisting: "Parlement Résistant"
russia_military_loyality: "Complicité militaire"
russia_parliamentary_support: "Appui parlementaire"
russia_constitution_crisis_resolved_mod: "Crise évitée"

je_russian_constitutional_crisis: "Crise constitutionnelle russe"
je_russian_constitutional_crisis_reason: "L'année 1993 a amené la Russie au bord de l'effondrement politique.\n\n Le président Boris Eltsine, cherchant à consolider l'autorité exécutive, a ordonné la dissolution du parlement russe, accusant ses membres d'entraver les réformes et de résister à la démocratisation. Le parlement, à son tour, a déclaré le décret d'Eltsine inconstitutionnel, refusant de dissoudre et de rallier les partisans à sa cause.\n\n Pendant des semaines, les tensions montent en tant que factions rivales et obtiennent le soutien de différents éléments de l'armée, des forces de sécurité et du grand public. L'appareil gouvernemental se fracture, avec fidélité au pouvoir exécutif ou législatif déterminant le sort de la Fédération de Russie.\n\n Cette confrontation est plus qu'un conflit politique, c'est une bataille sur la nature même de la gouvernance russe dans l'ère post-soviétique. Si la crise s'enlise, la violence civile au cœur de Moscou n'est pas seulement possible, mais inévitable."

je_russia_wild_nineties: "Les années 90 sauvages"
je_russia_wild_nineties_reason: "Le terme «Les années 90 sauvages» (en russe : ) est un terme à connotation évaluative négative qui caractérise la période de transition après l'effondrement de l'Union soviétique et la formation de la Fédération de Russie dans les années 1990. \n\n La transition turbulente de la domination soviétique à une démocratie capitaliste a déclenché une vague d'instabilité, de corruption et de violence. Les premières années post-soviétiques ont été marquées par l'effondrement économique, la montée des oligarques, les confrontations politiques et une poussée du crime organisé.\n\n Du pilonnage du parlement aux scandales de privatisation, chaque mois semble apporter de nouveaux bouleversements. Le pays se trouve entre la réforme et le chaos, et la patience du peuple est mince."

rus_events.0.t: "La crise constitutionnelle russe de 1993 commence"
rus_events.0.d: "Le président Boris Eltsine a publié un décret qui dissout le parlement russe, l'accusant d'entraver les réformes démocratiques et de menacer la stabilité de la Fédération. Le Parlement a déclaré le mouvement inconstitutionnel, demandant aux militaires et aux citoyens de résister.\n\nMoscou se bat pour la confrontation alors que les factions rivales rallient leurs partisans. Le sort de la démocratie fragile de la Russie est maintenant dans l'équilibre."
rus_events.0.a: "La nation retiendra son souffle."

1993_russian_crisis_tt: "La crise est terminée"
rus_events.1.t: "La crise constitutionnelle"
rus_events.1.d: "Le président Eltsine a annoncé la dissolution du Parlement, mais les législateurs refusent de démissionner, se barricadant à la Maison Blanche. Les tensions augmentent rapidement."
rus_events.1.a: "Côté président"
rus_events.1.a.tt: "L'armée soutiendra l'exécutif."
rus_events.1.b: "Soutenir le Parlement"
rus_events.1.b.tt: "Nous défendrons l'autorité législative."

rus_events.2.t: "L'armée soutient le président"
rus_events.2.d: "Les forces armées ont pris le contrôle des rues, bombardant le Parlement et sécurisant l'autorité d'Eltsine."
rus_events.2.a: "La crise est terminée."

rus_events.3.t: "Victoire parlementaire"
rus_events.3.d: "Malgré les pressions de l'exécutif, le Parlement a recueilli le soutien populaire et conservé son pouvoir."
rus_events.3.a: "La crise est terminée."

rus_events.4.t: "Tempête de la Maison Blanche"
rus_events.4.d: "Moscou est dans le chaos. Des troupes pro-présidentielles ont encerclé la Maison Blanche russe, abritant les dirigeants du Parlement, et ont ouvert le feu avec des chars et des armes légères. Fumées de l'étage supérieur lorsque le bâtiment est enflammé. La résistance finale s'effondre alors que les forces militaires prennent le contrôle, marquant la fin de l'impasse, mais au détriment de la vie et de l'innocence politique du pays."
rus_events.4.a: "L'ordre est rétabli — pour le moment."

# chechnya

je_first_chechen_war_reason: "La Première Guerre tchétchène a commencé à la fin de 1994 alors que la Fédération de Russie tentait de reprendre le contrôle de la République tchétchène d'Ichkeria.\n\n Le conflit se révélerait coûteux en vies et en ressources, avec des combats urbains acharnés à Grozny et des ravages généralisés dans le Caucase du Nord.\n\n Mettre fin à la guerre sans victoire claire pourrait nuire à la crédibilité du gouvernement, mais poursuivre la lutte risque une instabilité prolongée."
je_first_chechen_war: "Guerre de Tchétchénie"
chechen_war_resolved: "Guerre tchétchène résolue"

chechen_events.1.t: "Guerre en Tchétchénie"
chechen_events.1.d: "Les forces russes sont entrées en Tchétchénie pour rétablir le contrôle fédéral, en commençant par une opération rapide. Cependant, le terrain montagneux et la résistance locale déterminée pourraient transformer ce conflit en conflit prolongé."
chechen_events.1.a: "Nous allons rétablir l'ordre."

chechen_events.2.t: "Assassin sur Grozny"
chechen_events.2.d: "La bataille de Grozny a commencé, les forces russes tentant de s'emparer de la capitale tchétchène. Les combats sont intenses, avec de lourdes pertes des deux côtés."
chechen_events.2.a: "Poussez-vous, peu importe le coût."

chechen_events.3.t: "Les pourparlers de paix en Tchétchénie"
chechen_events.3.d: "Après des mois de combats, la fatigue de guerre s'est accrue des deux côtés. Une proposition de cessez-le-feu a été présentée, ce qui a permis de mettre fin à l'effusion de sang."
chechen_events.3.a: "Accepter la paix et retirer les forces."
chechen_events.3.b: "Continuez la guerre jusqu'à la victoire."

# haiti

uphold_democracy: "Opération Soutenir la démocratie"

haiti_events.1.t: "Opération Soutenir la démocratie"
haiti_events.1.d: "En septembre 1994, les États-Unis ont lancé une intervention militaire en Haïti pour rétablir le Président démocratiquement élu Jean-Bertrand Aristide, évincé par un coup d'État de 1991. Les forces américaines, soutenues par des alliés internationaux, ont sécurisé des zones clés, ouvrant la voie au retour d'Aristide."
haiti_events.1.a: "Déployer des forces pour restaurer la démocratie."
haiti_events.1.b: "Nous nous préparerons pour les troupes étrangères."

haiti_events.2.t: "Des troupes étrangères arrivent"
haiti_events.2.d: "Les forces américaines ont atterri en Haïti, prenant le contrôle des lieux stratégiques. L'intervention est justifiée comme moyen de rétablir la gouvernance démocratique, mais elle soulève des questions sur la souveraineté et l'influence étrangère."
haiti_events.2.a: "Nous devons coopérer pour éviter les effusions de sang."

je_haiti_political_crisis: "Crise politique haïtienne"
je_haiti_political_crisis_reason: "Après l'élection démocratique du Président Jean-Bertrand Aristide en 1990, Haïti a connu un bref moment d'optimisme. Cependant, la fragile stabilité a été brisée en septembre 1991 quand un coup d'État militaire a évincé Aristide, plongeant le pays dans le chaos politique.\n\n Le régime militaire fait l'objet d'une condamnation internationale, à mesure que les violations des droits de l'homme et la répression politique se répandent. Les sanctions économiques imposées par l'ONU et l'Organisation des États américains ont gravement affecté l'économie haïtienne déjà en difficulté.\n\n Tout au long des années 1992 et 1993, les négociations entre la junte militaire et Aristide ont échoué, tandis que la violence contre les opposants politiques et la population en général s'est intensifiée. Les tentatives de la Mission des Nations Unies en Haïti (MINUHA) pour rétablir la gouvernance démocratique ont été entravées.\n\n En 1994, la pression croissante de la communauté internationale, en particulier des États-Unis, a ouvert la voie à une intervention directe. L'opération Uphold Democracy, menée par les forces américaines en septembre 1994, visait à rétablir Aristide au pouvoir et à mettre fin à la junte."

# quebec
# [GetPlayer.MakeScope.GetVariable('quebec_happiness_var').GetValue|0]

je_quebec_happiness: "La situation au Québec"
je_quebec_happiness_reason: "Le statut du Québec au Canada est une question controversée depuis des décennies. La culture, la langue et l'histoire distinctes du Québec ont souvent alimenté les débats sur l'autonomie et l'indépendance.\n\n Au cours des années qui ont précédé le référendum de 1995 au Québec, les relations entre le Québec et le gouvernement fédéral du Canada ont été marquées par la tension, la négociation et l'essor occasionnel du sentiment nationaliste.\n\n La province de Québec, avec sa majorité francophone unique, son identité culturelle distincte et sa longue tradition de plaidoyer pour l'autonomie, a périodiquement cherché à redéfinir sa place au sein de la fédération canadienne. Certains Québécois désirent une indépendance totale, d'autres souhaitent des pouvoirs provinciaux accrus, tandis que beaucoup soutiennent toujours le maintien d'un Canada unifié.\n\nEn tant que premier ministre, votre tâche est de naviguer dans cette situation délicate. Vous devez équilibrer l'unité nationale avec le respect des aspirations culturelles et politiques du Québec. Chaque décision que vous prendrez — que ce soit sur les lois linguistiques, la politique économique ou l'investissement culturel — influera sur le bonheur de la population québécoise.\n\n Si le score du bonheur au Québec demeure élevé, le référendum pourrait se terminer par un vote pour rester au Canada. Mais si le mécontentement devient trop fort, la population du Québec peut voter pour l'indépendance, modifiant à jamais la carte de l'Amérique du Nord."
quebec_happiness_bar_desc: "Le bonheur franco-canadien"
quebec_happiness_monthly_tt: "Changement mensuel au Québec Le bonheur."
quebec_happiness_bar:0 "Soutien à l'indépendance du Québec"
recently_pissed_quebec_off:0 "N'a pas récemment irrité le Québec"

too_many_quebec_concessions: "Trop de concessions; Québécois Unimpressed"
quebec_happiness_10: "#green Augmentations#! Le bonheur franco-canadien par #green 5#! points"
quebec_happiness_minus_10: "#r Diminutions#! Le bonheur franco-canadien par #r 5#! points"

quebec.6.t: "La complaisance au Québec"
quebec.6.d: "Avec l'immense satisfaction du Québec, le gouvernement fédéral s'est contenté. Ottawa croit que la question de l'unité est réglée, mais les critiques mettent en garde contre le fait que cette surassurance peut conduire à négliger d'autres questions importantes."
quebec.6.a: "Tabarnak !"

complacent_on_quebec: "Compatibilité avec le Québec"
complacent_on_quebec_desc: "Avec un fort soutien du Québec, le gouvernement est devenu complaisant dans ses négociations et son attention politique, ce qui a entraîné des critiques croissantes de la part d'autres factions."
 
quebec_concessions_button: "Faire des concessions au Québec"
quebec_concessions_button_desc: "Offrir des concessions politiques et culturelles au Québec, augmentant leur bonheur."

quebec_ignore_button: "Ignorer les demandes du Québec"
quebec_ignore_button_desc: "Refuser de s'engager avec les revendications politiques du Québec, en diminuant leur bonheur."

quebec.1.t: "Tensions au Québec"
quebec.1.d: "Les tensions politiques augmentent au Québec à mesure que les débats sur l'autonomie et les droits linguistiques s'intensifient."
quebec.1.a: "Offrez des assurances au Québec."
quebec.1.b: "Tenez ferme sur l'unité nationale."

quebec.2.t: "Le référendum québécois de 1995"
quebec.2.d: "Après des années de débat, le Québec vote pour savoir s'il faut demeurer au Canada ou devenir une nation indépendante."
quebec.2.a: "Le peuple a choisi l'unité."
quebec.2.b: "Le Québec vote pour l'indépendance!"

quebec.3.t: "Différend en français"
quebec.3.d: "Une proposition de politique fédérale menace de réduire le statut de français au Québec, suscitant l'indignation de nombreux citoyens."
quebec.3.a: "Protéger la langue française à tout prix."
quebec.3.a.tt: "Québec Le bonheur augmentera de #G +8#!."
quebec.3.b: "Maintenir la politique actuelle."
quebec.3.b.tt: "Québec Le bonheur diminuera de #R -5#!."
quebec.3.b.tt2: "Vous serez autorisé à faire plus de concessions"

quebec.4.t: "Réduction du financement fédéral au Québec"
quebec.4.d: "Le gouvernement fédéral fait face à des pressions budgétaires, et le financement de l'infrastructure et des services au Québec est sur le coup."
quebec.4.a: "Continuez avec les coupures."
quebec.4.a.tt: "Québec Le bonheur diminuera de #R -7#!."
quebec.4.b: "Coupez moins du Québec."
quebec.4.b.tt: "Québec Le bonheur diminuera de #R -2#!."

quebec.5.t: "Festival culturel du Québec"
quebec.5.d: "Une célébration massive de la culture québécoise attire l'attention nationale et internationale, favorisant la fierté et l'unité."
quebec.5.a: "Célébrez et augmentez le financement de la culture."
quebec.5.a.tt: "Québec Le bonheur augmentera de #G +10#!."
quebec.5.b: "Félicitations aux organisateurs, mais aucun financement supplémentaire."
quebec.5.b.tt: "Québec Le bonheur augmentera de #G +3#!."

# China

je_china_southern_tour: "Tour sud"
je_china_southern_tour_reason: "Au début de 1992, Deng Xiaoping s'embarque pour son célèbre « Southern Tour » en voyageant à Shenzhen, Zhuhai, Guangzhou et Shanghai.\n\n Ses discours favorisaient la poursuite des réformes économiques, la libéralisation des marchés et l'expansion de zones économiques spéciales. La tournée a relancé l'élan réformiste au sein du Parti communiste et a rassuré les investisseurs nationaux et étrangers que la « réforme et l'ouverture » de la Chine se poursuivrait.\n"
je_china_southern_tour_progress_tt: "Le progrès augmente chaque mois et par certains événements."

southern_tour_reforms: "Visite Sud Héritage économique"
je_china_southern_tour_complete: "Deng Xiaoping a terminé sa tournée"
china_southern_tour.1.t: "Tour sud de Deng Xiaoping"
china_southern_tour.1.d: "Deng Xiaoping a commencé une visite très médiatisée du sud de la Chine, visitant les principales zones économiques spéciales et exhortant les responsables à poursuivre les réformes."
china_southern_tour.1.a: "Le voyage commence."

china_southern_tour.2.t: "Demande une réforme du marché"
china_southern_tour.2.d: "Lors des discours du Southern Tour, Deng Xiaoping a appelé à un engagement renouvelé en faveur de réformes orientées vers le marché."
china_southern_tour.2.a: "Appuie la poussée."
china_southern_tour.2.b: "Maintenez le rythme actuel."

china_southern_tour.3.t: "Résistance interne"
china_southern_tour.3.d: "Des éléments conservateurs du Parti se sont dits préoccupés par le rythme et la portée de la libéralisation économique."
china_southern_tour.3.a: "Poussez-vous."
china_southern_tour.3.b: "Négocier un compromis."

# Rwanda

genocide_ended: "Le génocide est terminé"
the_genocide_progresses_by_15: "Le génocide se réchauffe de 15 points"
the_genocide_progresses_by_10: "Le génocide se réchauffe de 10 points"
the_genocide_progresses_by_20: "Le génocide se réchauffe de 20 points"

post_rwandan_genocide_reconstruction: "Reconstruction après le génocide"
rwandan_genocide: "Génocide tutsi"

je_rwandan_genocide: "Génocide rwandais"
je_rwandan_genocide_reason: "En avril 1994, un avion transportant les présidents du Rwanda et du Burundi a été abattu, déclenchant l'un des génocides les plus horribles de la fin du XXe siècle.\n\nLes milices extrémistes, avec l'appui du gouvernement, ont commencé à tuer massivement la minorité tutsie et les Hutus modérés. La sensibilisation internationale était lente à construire, mais à mesure que les massacres se répandaient, les appels à l'intervention étaient montés.\n\n"

je_rwandan_genocide_progress_tt: "Les progrès augmentent au fil du temps et grâce à des événements violents. L'intervention peut réduire les progrès."

rwandan_genocide.1.t: "Le génocide commence"
rwandan_genocide.1.d: "À la suite de l ' assassinat du Président Habyarimana, les forces extrémistes ont commencé à tuer de façon généralisée la minorité tutsie."
rwandan_genocide.1.a: "Un chapitre sombre commence."

rwandan_genocide.2.t: "Massacres Continuer"
rwandan_genocide.2.d: "Les rapports des régions rurales décrivent des communautés entières détruites par des attaques coordonnées."
rwandan_genocide.2.a: "La violence s'aggrave."

rwandan_genocide.3.t: "Concours international"
rwandan_genocide.3.d: "Les images graphiques et les comptes de survivants ont atteint les médias mondiaux, ce qui a suscité des appels urgents pour que l'ONU agisse."
rwandan_genocide.3.a: "Demande aux soldats de la paix."
rwandan_genocide.3.b: "Ne faites rien."

rwandan_genocide_request_peacekeepers_tt: "Cela déclenchera un vote de l'ONU sur le déploiement de soldats de la paix au Rwanda."
rwandan_genocide_community_angry: "Cela va irriter la communauté internationale"

rwandan_genocide.4.t: "Vote des Nations Unies pour le maintien de la paix"
rwandan_genocide.4.d: "Le Conseil de sécurité des Nations Unies s'est réuni pour se prononcer sur l'opportunité d'envoyer des forces de maintien de la paix au Rwanda."

