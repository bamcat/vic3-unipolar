 demographic_events.1.t: "La crise démographique"
 demographic_events.1.d: "Les experts ont mis en garde contre une grave crise démographique. Des décennies de baisse des taux de natalité ont produit une population vieillissante qui va bientôt envahir notre main-d'oeuvre. Sans investissement soutenu dans les services de garde d'enfants, les soins de santé, le logement et la protection sociale, notre assise économique s'érodera à mesure que le rapport des travailleurs aux personnes à charge s'effondrera.\n\nUn tampon démographique temporaire masque actuellement les pires effets, mais ce tampon se dégradera au cours des prochaines décennies. Nous devons adopter et soutenir des réformes pronatalistes globales pendant au moins dix ans pour inverser la tendance."
 demographic_events.1.a: "Nous devons agir avant qu'il ne soit trop tard."

 demographic_events.2.t: "Relèvement démographique"
 demographic_events.2.d: "Après une décennie d'investissement soutenu dans notre population - garde d'enfants universelle, soins de santé accessibles, protection sociale complète et logement abordable - le taux de natalité de notre pays s'est stabilisé. La crise démographique qui menaçait de paralyser notre économie a été évitée. Une nouvelle génération de travailleurs entre dans la force de travail, et l'avenir semble brillant."
 demographic_events.2.a: "Notre patience a payé"

