 # The Troubles

je_troubles_in_northern_ireland: "Les problèmes en Irlande du Nord"
je_troubles_in_northern_ireland_reason: "L'Irlande du Nord est devenue un point d'éclair de la violence politique entre les communautés nationalistes et syndicalistes, s'intensifiant dans les conflits armés impliquant des groupes paramilitaires, des civils et l'armée britannique.\n\n Nous devons gérer avec soin la présence des troupes et les réactions politiques pour stabiliser la région."

je_troubles_increase_troop_button: "Accroître la présence des troupes"
je_troubles_increase_troop_button_desc: "Déployer davantage de forces de l'armée britannique en Irlande du Nord pour renforcer le contrôle et maintenir l'ordre."

troubles_troop_strength_bar: "Présence des troupes en Irlande du Nord"
troubles_troop_strength_bar_desc: "Force des troupes"
troubles_troop_strength_bar_monthly_desc: "Mesure l'effectif des troupes britanniques déployées en Irlande du Nord."

troubles_events.1.t: "Bombardement à Belfast"
troubles_events.1.d: "Une voiture piégée a explosé à Belfast, tuant des civils et aggravant les tensions."
troubles_events.1.a: "Tragique."

troubles_events.2.t: "Les troupes attaquées"
troubles_events.2.d: "Des soldats britanniques ont été incendiés par des insurgés à Derry."
troubles_events.2.a: "Nous devons répondre."

troubles_events.3.t: "Manifestation des droits civils"
troubles_events.3.d: "Une grande manifestation à Londonderry est devenue violente après des affrontements avec la police."
troubles_events.3.a: "Une évolution inquiétante."

troubles_events.4.t: "Renforcements Arrivée"
troubles_events.4.d: "De nouvelles troupes sont arrivées en Irlande du Nord, renforçant ainsi notre présence."
troubles_events.4.a: "Parfait."

troubles_events.5.t: "Des hommes armés tuent des civils en irlandais"
troubles_events.5.d: "Une fusillade meurtrière en Irlande du Nord a ébranlé les communautés locales, triste reflet de la violence durant les troubles en cours."
troubles_events.5.a: "La voie de la paix n'est jamais droite."
 
je_northern_ireland_peace_process: "Processus de paix en Irlande du Nord"
je_northern_ireland_peace_process_reason: "Après des décennies de conflits, connus sous le nom de « Troubles », les gouvernements du Royaume-Uni et de l'Irlande — aux côtés des partis politiques d'Irlande du Nord — sont entrés dans une période de négociations.\n\n De la Déclaration de Downing Street aux pourparlers multipartites et aux cessez-le-feu potentiels, ces discussions pourraient mettre fin à des années d'effusion de sang.\n\n Le résultat dépendra de la volonté politique, de l'opinion publique et de la capacité de compromis."

ni_peace_process_success_tt: "Le processus de paix a réussi, augmentant la stabilité en Irlande du Nord."

ni_peace_events.1.t: "Déclaration de Downing Street"
ni_peace_events.1.d: "Les gouvernements britannique et irlandais ont publié une déclaration commune affirmant le droit du peuple d'Irlande du Nord de décider de son avenir."
ni_peace_events.1.a: "Un grand pas en avant."

ni_peace_events.2.t: "Début des pourparlers multipartites"
ni_peace_events.2.d: "Pour la première fois, des représentants de la plupart des factions politiques du nord de l'Irlande se réunissent à la table des négociations."
ni_peace_events.2.a: "Le dialogue est la voie de la paix."

ni_peace_events.3.t: "L'Accord du Vendredi Saint"
ni_peace_events.3.d: "Les groupes paramilitaires d'Irlande du Nord ont annoncé un cessez-le-feu, ouvrant la voie à une paix durable, à la suite d'une série de pourparlers positifs entre le Gouvernement britannique et l'Irlande."
ni_peace_events.3.a: "Les armes sont silencieuses."

ni_peace_events.5.t: "Les troupes britanniques ont quitté l'Irlande du Nord"
ni_peace_events.5.d: "La présence de troupes en Irlande du Nord étant réduite à rien, le gouvernement britannique se trouve incapable de maintenir le contrôle. Par surprise, le gouvernement cède officiellement l'Irlande du Nord à la République d'Irlande."
ni_peace_events.5.a: "Nous n'avons pas le choix."
ni_peace_events.5.a.tt: "L'Irlande du Nord sera transférée en Irlande."

ni_peace_events.6.t: "Réunification de l'Irlande"
ni_peace_events.6.d: "Après des décennies de division, l'Irlande du Nord a officiellement rejoint la République d'Irlande. Les rues regorgent de célébrations alors que la nation envisage un avenir uni."
ni_peace_events.6.a: "Pousse le champagne !"
reunification_pride: "Reunification Pride"
reunification_pride_desc: "La joie de la réunification nationale a renforcé l'unité publique et renforcé la position du gouvernement."

je_oil_titans:0 "Titans pétroliers"
je_oil_titans_reason:0 "Le Golfe est situé au sommet des plus grandes réserves de pétrole prouvées de la planète. Ce que [ROOT.GetCountry.GetName] fait avec cet héritage définira le siècle à venir — pour la région, pour le marché mondial de l'énergie et pour chaque pays dont l'industrie, les transports et la prospérité sont alimentés par le pétrole.\n\n L'objectif n'est pas simplement d'extraire de l'huile. Il est indispensable d'être parmi les trois premiers producteurs du monde, de sorte que lorsque le prix du pétrole bouge, il bouge parce que [ROOT.GetCountry.GetName] a choisi de le faire bouger."
 
oil_titans_top3_tt:0 "#bold [ROOT.GetCountry.GetName] est un troisième producteur mondial de pétrole.#! L'entrée du journal est complète — [ROOT.GetCountry.GetName] est devenue l'un des nœuds indispensables du système énergétique mondial."
oil_titans_top10_tt:0 "[ROOT.GetCountry.GetName] est un premier producteur mondial de pétrole et s'approche du premier 3. La poursuite des investissements dans l'extraction du pétrole comblera l'écart."
oil_titans_outside_tt:0 "[ROOT.GetCountry.GetName] n'est pas encore parmi les 10 principaux producteurs mondiaux de pétrole. Des investissements importants dans les infrastructures d'extraction du pétrole sont nécessaires."
 
oil_titans_bonus:0 "Titan pétrole"
oil_titans_bonus_desc:0 "[ROOT.GetCountry.GetName] est l'un des trois principaux producteurs de pétrole au monde. Les recettes qui en découlent se déversent dans le trésor public, financent la construction et donnent [ROOT.GetCountry.GetName] une certaine influence géopolitique que sa population ne justifierait jamais à elle seule. Le monde a besoin d'huile [ROOT.GetCountry.GetAdjective]. Ce besoin est le pouvoir."

bid_for_olympics_decision:0 "Annonce d'une offre pour tenir les Jeux olympiques"
bid_for_olympics_decision_desc:0 "Nous avons la chance d'avoir été considérés par le Comité olympique international comme l'hôte des prochains Jeux olympiques."
we_can_host_the_next_olympics_tt:0 "Nous pouvons accueillir les prochains Jeux Olympiques."

 je_korea_reunification_nrk:0 "Réunification coréenne"
 je_korea_reunification_nrk_reason:0 "La République populaire démocratique de Corée est le seul gouvernement légitime de la nation coréenne. La division de la péninsule au 38e parallèle est une blessure artificielle infligée par des puissances étrangères — un arrangement temporaire que [ROOT.GetCountry.GetName] s'engage à corriger.\n\nLa réunification sous la direction de [ROOT.GetCountry.GetAdjective] rétablira la nation coréenne dans son ensemble. L'administration sud de la Corée du Sud doit être introduite dans l'État [ROOT.GetCountry.GetAdjective] — par la force, par traité, ou par le poids de [ROOT.GetCountry.GetAdjective] pouvoir rendant impossible une nouvelle résistance."
 
 korea_nrk_complete_tt:0 "#bold La péninsule est unifiée sous la direction de [ROOT.GetCountry.GetAdjective].#! La Corée est entière. La division de 1945 a été corrigée."
 korea_nrk_subject_path_tt:0 "[SCOPE.sCountry('c:STK').GetName] est un sujet de [ROOT.GetCountry.GetName]. L'administration sud a été introduite dans l'État [ROOT.GetCountry.GetAdjective]. La pleine intégration de la péninsule est en cours."
 korea_nrk_incomplete_tt:0 "[SCOPE.sCountry('c:STK').GetName] commandes [SCOPE.sState('STATE_SEOUL').GetName], [SCOPE.sState('STATE_BUSAN').GetName] et [SCOPE.sState('STATE_YANGHO').GetName]. La réunification nécessite [ROOT.GetCountry.GetName] pour posséder les trois — ou avoir [SCOPE.sCountry('c:STK').GetName] comme sujet."
 
 # ==========================================
 # SOUTH KOREA JE
 # ==========================================
 
 je_korea_reunification_stk:0 "Réunification coréenne"
 je_korea_reunification_stk_reason:0 "La République de Corée est le seul gouvernement légitime de la nation coréenne. La division de la péninsule est un héritage de l'occupation étrangère et de la rivalité de la guerre froide — [ROOT.GetCountry.GetName] ne l'a jamais acceptée comme permanente.\n\nLa réunification sous la direction de [ROOT.GetCountry.GetAdjective] rapprocherait le peuple coréen sous un ordre constitutionnel démocratique. L'administration nord de la Corée du Nord doit être absorbée dans l'État [ROOT.GetCountry.GetAdjective]. L'emprise du régime Pyonyang sur le nord est le dernier obstacle."
 
 korea_stk_complete_tt:0 "#bold La péninsule est unifiée sous la direction de [ROOT.GetCountry.GetAdjective].#! La Corée est entière. La division de 1945 a été corrigée."
 korea_stk_subject_path_tt:0 "[SCOPE.sCountry('c:NRK').GetName] est un sujet de [ROOT.GetCountry.GetName]. L'administration du Nord a été introduite dans l'ordre constitutionnel [ROOT.GetCountry.GetAdjective]. L'intégration du Nord est en cours, une entreprise immense."
 korea_stk_incomplete_tt:0 "[SCOPE.sCountry('c:NRK').GetName] commandes [SCOPE.sState('STATE_PYONGYANG').GetName] et [SCOPE.sState('STATE_SARIWON').GetName]. La réunification nécessite [ROOT.GetCountry.GetName] pour posséder les deux — ou avoir [SCOPE.sCountry('c:NRK').GetName] comme sujet."
 
