 chechen_war.1.t: "L'offensive commence"
 chechen_war.1.d: "La phase décisive de la guerre a commencé. La guérilla qui a défini le conflit précoce laisse place à une confrontation directe. Les montagnes du Caucase seront témoins de la lutte finale pour la Tchétchénie."
 chechen_war.1.a: "Pour la Russie !"
 chechen_war.1.a.che: "Pour Ichkeria !"
 
 chechen_war.2.t_rus: "Victoire russe en Tchétchénie"
 chechen_war.2.d_rus: "La résistance tchétchène a été brisée. Les forces russes ont réaffirmé le contrôle de la république dissidente. Le coût des vies humaines et des infrastructures a été immense, mais l'intégrité territoriale de la Fédération de Russie a été préservée."
 chechen_war.2.t_che: "Indépendance tchétchène"
 chechen_war.2.d_che: "Contre toute attente, les combattants tchétchènes ont prévalu. L'armée russe s'est retirée et la République tchétchène d'Ichkeria est une nation indépendante. Le coût de la liberté a été stupéfiant, mais la volonté du peuple tchétchène s'est révélée incassable."
 chechen_war.2.a: "L'histoire se souviendra de ce jour"
 
 chechen_war.5.t: "Ambush de montagne"
 chechen_war.5.d: "Nos combattants ont identifié un convoi russe qui traverse un col étroit. Le terrain est parfait pour une embuscade: des falaises abruptes des deux côtés, une marge de manœuvre limitée et une forêt dense qui couvre nos hommes."
 chechen_war.5.a: "Grève des montagnes"
 chechen_war.5.b: "Maintenez nos positions"
 
 chechen_war.6.t: "Raid sur les lignes d'approvisionnement"
 chechen_war.6.d: "Les convois d'approvisionnement russes ont traversé les basses terres avec une escorte minimale. Nos combattants pourraient les intercepter, capter des approvisionnements précieux et perturber la logistique de l'ennemi — mais l'opération nous coûtera des ressources et peut entraîner des représailles."
 chechen_war.6.a: "Raid leurs lignes d'approvisionnement"
 chechen_war.6.b: "Trop risqué"
 
 chechen_war.7.t: "Guerre dans le Caucase"
 chechen_war.7.d: "La République tchétchène d'Ichkeria a déclaré son indépendance et la Russie a réagi par la force militaire. Le Caucase du Nord est englouti dans la guerre. Le terrain montagneux accidenté donne aux guérilleros tchétchènes un avantage naturel, mais la puissance militaire de la Russie est formidable."
 chechen_war.7.a: "Alors ça commence"
 
