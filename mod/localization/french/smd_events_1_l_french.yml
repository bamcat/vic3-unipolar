 je_io_eec_membership_process:0 "Processus d'adhésion de la CEE"
 je_io_eec_membership_process_reason:0 "L'adhésion à la CEE nécessite plus qu'un vote normal. Le demandeur doit aligner ses institutions commerciales, administratives et démocratiques sur les normes européennes."
 io_eec_membership_status_reforming:0 "Des réformes sont en cours."
 io_eec_membership_status_ready:0 "Les conditions d'adhésion sont remplies."

 je_io_eu_membership_process:0 "Processus d'adhésion de l'UE"
 je_io_eu_membership_process_reason:0 "L'adhésion à l'UE nécessite un processus d'adhésion plus approfondi que les organisations internationales ordinaires. Le demandeur doit satisfaire aux normes démocratiques, civiles et administratives."
 io_eu_membership_status_reforming:0 "Des réformes sont en cours."
 io_eu_membership_status_ready:0 "Les conditions d'adhésion sont remplies."

 io_accession_country_in_europe_tt:0 "La capitale doit être en Europe."
 io_accession_not_subject_tt:0 "Le demandeur ne doit pas être un sujet."
 io_accession_democratic_government_tt:0 "Avoir un cadre constitutionnel démocratique: République présidentielle, République parlementaire, ou une monarchie constitutionnelle avec droit de vote."
 io_accession_no_authoritarian_laws_tt:0 "N'avez pas de lois autoritaires comme l'autocratie, l'oligarchie, l'État à parti unique, le vote sans droit de vote, le vote à terre, les bureaucrates nommés ou les dissidents."
 io_accession_voting_rights_tt:0 "Avoir le vote du recensement ou le suffirage universel."
 io_accession_civil_liberties_tt:0 "Droit d'assemblée ou de discours protégé."
 io_accession_elected_bureaucrats_tt:0 "Ont élu des bureaucrates."
 io_eec_accession_trade_policy_tt:0 "Avoir le protectionnisme ou le libre-échange."
 io_eu_accession_free_trade_tt:0 "Faites du libre-échange."
 io_eu_accession_minorities_tt:0 "Exclusion culturelle ou multiculturalisme."
 io_eu_accession_migration_tt:0 "Il n'y a ni contrôle ni contrôle des migrations."
 io_accession_authoritarian_failure_tt:0 "Le processus d'adhésion échoue si des lois autoritaires sont adoptées."

 io_accession_events.1.t:0 "Adhésion de la CEE"
 io_accession_events.1.d:0 "Nos réformes ont satisfait aux exigences d'adhésion à la CEE. Nous sommes entrés dans le cadre économique européen."
 io_accession_events.1.a:0 "Rejoignez la CEE."

 io_accession_events.2.t:0 "Adhésion à l'UE"
 io_accession_events.2.d:0 "Notre processus d'adhésion est terminé. Nous avons rejoint l'Union européenne et nous sommes entrés dans son cadre politique et économique."
 io_accession_events.2.a:0 "Rejoignez l'Union européenne."

 io_accession_events.3.t:0 "Adhésion à la CEE"
 io_accession_events.3.d:0 "Le processus d'adhésion à la CEE s'est effondré après que notre gouvernement se soit éloigné des normes démocratiques."
 io_accession_events.3.a:0 "Le processus est terminé."

 io_accession_events.4.t:0 "L'adhésion à l'UE s'est arrêtée"
 io_accession_events.4.d:0 "Le processus d'adhésion à l'UE s'est effondré après que notre gouvernement s'est éloigné des normes démocratiques."
 io_accession_events.4.a:0 "Le processus est terminé."

 io_accession_events.10.t:0 "Expulsion de l'OTAN"
 io_accession_events.10.d:0 "Notre adoption de lois autoritaires a rendu impossible la poursuite de l'adhésion à l'OTAN. L'alliance nous a expulsés et nos pactes de défense avec ses membres ont été retirés."
 io_accession_events.10.a:0 "Nous sommes seuls."

 io_accession_events.11.t:0 "Expulsion de la CEE"
 io_accession_events.11.d:0 "Notre adoption de lois autoritaires a violé les attentes politiques de la coopération européenne. Nous avons été expulsés de la CEE."
 io_accession_events.11.a:0 "Qu'il en soit ainsi."

 io_accession_events.12.t:0 "Expiré de l'Union européenne"
 io_accession_events.12.d:0 "Notre adoption de lois autoritaires a violé les normes démocratiques de l'Union européenne. Nous avons été expulsés de l'Union."
 io_accession_events.12.a:0 "L'Union se détourne."

 io_accession_events.13.t:0 "Expulsion du G7"
 io_accession_events.13.d:0 "Notre adoption de lois autoritaires a rendu politiquement inacceptable le maintien de l'adhésion au G7. Nous avons été retirés du groupe."
 io_accession_events.13.a:0 "Un revers diplomatique."

 io_accession_events.20.t:0 "Avertissement des normes démocratiques de l'OTAN"
 io_accession_events.20.d:0 "Notre gouvernement a adopté des lois autoritaires. Si ces lois demeurent en vigueur, l'adhésion à l'OTAN sera révoquée lors du prochain examen."
 io_accession_events.20.a:0 "Nous avons été prévenus."

 io_accession_events.21.t:0 "Avertissement relatif aux normes démocratiques de la CEE"
 io_accession_events.21.d:0 "Notre gouvernement a adopté des lois autoritaires. Si ces lois restent en vigueur, l'adhésion à la CEE sera révoquée lors du prochain examen."
 io_accession_events.21.a:0 "Nous avons été prévenus."

 io_accession_events.22.t:0 "Avertissement pour les normes démocratiques de l'UE"
 io_accession_events.22.d:0 "Notre gouvernement a adopté des lois autoritaires. Si ces lois restent en vigueur, l'adhésion à l'UE sera révoquée lors du prochain examen."
 io_accession_events.22.a:0 "Nous avons été prévenus."

 io_accession_events.23.t:0 "Avertissement des normes démocratiques du G7"
 io_accession_events.23.d:0 "Notre gouvernement a adopté des lois autoritaires. Si ces lois demeurent en vigueur, les membres du G7 seront révoqués au cours du prochain examen."
 io_accession_events.23.a:0 "Nous avons été prévenus."

 io_democratic_standards_warning:0 "Avertissement pour les normes démocratiques"
 io_democratic_standards_warning_desc:0 "Ce pays a été averti que ses lois autoritaires pourraient menacer son adhésion à des organisations internationales démocratiques."

 io_expelled_from_democratic_org:0 "Expulsion de l ' Organisation démocratique"
 io_expelled_from_democratic_org_desc:0 "Ce pays a été expulsé d'une organisation internationale après avoir adopté des lois autoritaires."
 
 intifada_2005.1.t:0 "La deuxième Intifada s'effondre"
 intifada_2005.1.d:0 "Après des années de violence soutenue, d'épuisement, de mesures de sécurité, de pression diplomatique et de changement politique, le soulèvement a pris fin."
 intifada_2005.1.f:0 "Le conflit n'est pas résolu, mais la phase de l'Intifada ouverte a pris fin. Un cessez-le-feu laisse les deux côtés marqués, méfiants et incertains de ce qui vient ensuite."
 intifada_2005.1.a:0 "Acceptez une paix blanche."

 intifada_2005.2.t:0 "La deuxième Intifada s'effondre"
 intifada_2005.2.d:0 "Les combats ont diminué, et le soulèvement est entré dans une nouvelle phase plus calme."
 intifada_2005.2.f:0 "Aucun règlement définitif n'a été trouvé, mais l'escalade s'est évanouie."
 intifada_2005.2.a:0 "La lutte se poursuit par d'autres moyens."

 intifada_2005_ceasefire:0 "Deuxième cessez-le-feu Intifada"
 intifada_2005_ceasefire_desc:0 "La phase ouverte de la deuxième Intifada s'est terminée par un cessez-le-feu fragile."
 
 arab_spring_jihadist_breakaways.1.t:0 "L'État islamique émerge"
 arab_spring_jihadist_breakaways.1.d:0 "Le chaos de la révolution et de l'effondrement de l'État a permis aux forces djihadistes de consolider le territoire sous la bannière de l'État islamique."
 arab_spring_jihadist_breakaways.1.f:0 "Le vieux Etat combat la révolution. La révolution combat l'ancien État. Dans les ruines entre elles, une troisième force lève son drapeau."
 arab_spring_jihadist_breakaways.1.a:0 "Un nouveau front s'ouvre."

 arab_spring_jihadist_breakaways.2.t:0 "Enclaves djihadistes Emerge"
 arab_spring_jihadist_breakaways.2.d:0 "Alors que le Printemps arabe déstabilise la région, des cellules djihadistes ont saisi des territoires dispersés et déclaré loyauté à l'État islamique."
 arab_spring_jihadist_breakaways.2.f:0 "Lorsque l'État se retire, les réseaux armés deviennent des administrations."
 arab_spring_jihadist_breakaways.2.a:0 "La crise se répand."

 arab_spring_jihadist_breakaways.3.t:0 "Le territoire de Houthis Seize"
 arab_spring_jihadist_breakaways.3.d:0 "La révolution yéménite a brisé le pays, permettant au mouvement Houthi de s'emparer du territoire et de mobiliser ses propres forces."
 arab_spring_jihadist_breakaways.3.f:0 "Le soulèvement n'a pas produit une seule opposition, mais beaucoup."
 arab_spring_jihadist_breakaways.3.a:0 "Des attelles au Yémen."

