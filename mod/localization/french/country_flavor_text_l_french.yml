l_french:
 
  # Middle East
  YMN_FLAVOR_TEXT:0 "Les efforts déployés pour maintenir le pouvoir ont mal tourné et la guerre a éclaté au Yémen entre l'ancien gouvernement, le Conseil de transition et les Houthis. Cette guerre brutale a apporté avec elle les regards indiscrets des puissances en Arabie, les opposant les uns aux autres pour faire basculer le Yémen en sa faveur. Le Yémen devra-t-il endurer l'assujettissement de ses voisins, ou pourra-t-il s'imposer?"
  HOU_FLAVOR_TEXT:0 "$YMN_FLAVOR_TEXT$"
  STC_FLAVOR_TEXT:0 "$YMN_FLAVOR_TEXT$"
  SYR_FLAVOR_TEXT:0 "La Syrie souffre actuellement d'une guerre civile complexe qui s'est transformée en guerre par procuration contre plusieurs puissances. La région reste extrêmement hostile et les conflits ne font qu'empirer entre la croyance intérimaire en leur droit de gouverner, et le Rojava rompant librement pour former une république plus progressiste. Les réfugiés quittent l'Europe et sillonnent l'Europe à la recherche de terres plus sûres sur lesquelles vivre. La Syrie mettra-t-elle fin à la guerre et ramènera-t-elle rapidement sa population, ou est-elle destinée à échouer et à devenir un vide pour les autres puissances?"
  SIG_FLAVOR_TEXT:0 "$SYR_FLAVOR_TEXT$"
  ROJ_FLAVOR_TEXT:0 "$SYR_FLAVOR_TEXT$"
  IRA_FLAVOR_TEXT:0 "L'Iran est à l'aube de sa propre révolution islamique, Le pays s'est assis avec la stabilité relative de l'islam traditionnel et n'a pas été affecté par le printemps arabe. Cependant, les effets du Printemps arabe ne sont pas passés inaperçus par la population plus jeune, et la population aspire à la fin de ses méthodes extrémistes traditionnelles. L'Iran peut-il conserver ses valeurs traditionnelles? Ou seront-ils renversés par une population plus multiculturelle ?"
  
  # East Asia
  PRC_FLAVOR_TEXT:0 "La République populaire de Chine est un hégémon économique mondial et un bailleur de fonds pour les pays les moins fortunés. Cependant, les systèmes de piégeage de la dette sont de retour, et la dépendance à l'égard des biens fabriqués en Chine est affaiblie par leurs voisins voisins et l'automatisation. La Chine peut-elle rétablir sa domination économique? Ou sont-ils destinés à s'effondrer en raison de tensions internes ?"
  NRK_FLAVOR_TEXT:0 "La Corée du Nord reste le dernier bastion de la dictature maoïste sur la planète. Les différents jeux d'esprit et le lavage de cerveau de la nation restent extrêmement efficaces malgré la rigueur et la mort de leur régime. Le régime de 80 ans durera-t-il encore 80 ans? Ou est-ce pour se réunifier avec son voisin du sud et reconstruire à partir de là ?"
  JPN_FLAVOR_TEXT:0 "Le Japon est resté une nation désarmée depuis la fin de la Seconde Guerre mondiale, mais cela n'a pas cessé son contrôle économique extrême. Les automobiles japonaises et l'électronique japonaise sont connues dans le monde entier et vénérées comme les meilleures des meilleures. Mais ce n'est pas sans sacrifice... Le pays a une population vieillissante et se trouve entre de nombreuses puissances régionales. Que faudra-t-il pour que le Japon reste indépendant?"
  
  # Oceania
  AUZ_FLAVOR_TEXT:0 "L'Australie, le pays des opportunités et le rêve. Alors que la position des États-Unis faucher, l'Australie, malgré ses lacunes et son environnement plus chaud, le continent à travers le pays a vénéré le nom de « La terre des opportunités ». Cependant les divisions politiques internes et le réchauffement climatique cherchent à ruiner la chance de l'Australie d'être un bastion de prospérité. L'Australie peut-elle traverser avec succès le monde moderne?"
  
  # Balkans
  SRB_FLAVOR_TEXT:0 "La Serbie est un État de premier plan et le reste de l'expérience yougoslave ratée. Ayant perdu le Monténégro et le Kosovo ces dernières années, la nation aspire à une victoire. La Serbie retrouvera-t-elle la gloire perdue de la Yougoslavie?"
  
  # Europe
  ENG_FLAVOR_TEXT:0 "L'Angleterre a rugissé au cours du XXe siècle en exerçant la force comme une grande puissance, même si de multiples récessions, une corruption politique à grande échelle et une perte de légitimité ont remis en question l'acte d'union. L'Angleterre peut-elle conserver son contrôle sur ses dominations? Ou est-ce que laisser le marché européen a été la dernière paille ?"
  SCO_FLAVOR_TEXT:0 "L'Écosse est demeurée relativement indemne pendant les récessions du début du XXIe siècle et continue de prospérer depuis que la décentralisation a été accordée. La corruption à grande échelle et l'échec de la représentation au sein du syndicat ont remis en question sa place. Sera-t-il prospère une fois l'indépendance acquise? Ou l'union sera-t-elle la voie de l'avenir?"
  NIR_FLAVOR_TEXT:0 "Dernier stand de l'impérialisme britannique en Irlande, l'Irlande du Nord est un fût de poudre qui attend d'être allumé. Les troubles sont peut-être terminés, mais la question de sa souveraineté continue de s'incarner alors que les jeunes générations aspirent à l'unification avec leurs frères et sœurs du sud... Les Anglais s'accrochent à l'Irlande, est-ce que ça va aller comme les monarques ?"
  IRE_FLAVOR_TEXT:0 "L'Irlande s'est transformée d'un pays sous la botte impériale britannique, en la balise brillante de l'anglosphère, les efforts pour raviver leur langue et s'éloigner de celle du Royaume-Uni ont été couronnés de succès et les efforts entre elle et son voisin du nord ont conduit à un souhait d'unité. Qu'arrivera-t-il ensuite pour les îles Emerald ?"
  UKR_FLAVOR_TEXT:0 "Les efforts d'occidentalisation en Ukraine sont allés loin et la vie de nombreux Ukrainiens s'améliore rapidement, mais une invasion russe pour la Crimée, huit ans auparavant, a enlevé une région importante. Les séparatistes de l'Est ont également ouvert la Russie au cœur du pays. L'Ukraine peut-elle ramener les séparatistes sous le pli, ou bien l'Ukraine est-elle la prochaine cible des ambitions croissantes de la Russie?"
  CYP_FLAVOR_TEXT:0 "Chypre est une île divisée par les groupes ethniques, les Grecs au sud, les Turcs au nord. Cependant, une identité chypriote croissante se forme et il ne sera peut-être pas long avant qu ' il n ' y ait des appels à unifier la nation une fois pour toutes. Chypre pourra-t-elle s'unifier avec succès ou est-elle destinée à être toujours divisée?"
  BYL_FLAVOR_TEXT:0 "La Biélorussie est au début d'une révolution politique, ses citoyens sont activement contre le gouvernement et le véritable chef d'État avait perdu l'élection par un vote truqué. Loukachenko s'échauffe vers son voisin russe afin de protéger son contrôle. Loukachenko réussira-t-il, ou les Biélorusses mettront fin à son gouvernement illégitime ?"
  SPA_FLAVOR_TEXT:0 "L'Espagne connaît un essor agréable après l'éviction du mouvement Falangiste, C'est un pays qui se modernise rapidement et qui fait des efforts pour un avenir plus grand pour sa population. Mais tous ne sont pas d'accord avec leur direction, car un mouvement d'indépendance en Catalogne gagne de la vapeur. L'Espagne va-t-elle prospérer avec ou sans la Catalogne?"
  XSP_FLAVOR_TEXT:0 "L'Espagne connaît un essor agréable après l'éviction du mouvement Falangiste, C'est un pays qui se modernise rapidement et qui fait des efforts pour un avenir plus grand pour sa population. Mais tous ne sont pas d'accord avec leur direction, car un mouvement d'indépendance en Catalogne gagne de la vapeur. L'Espagne va-t-elle prospérer avec ou sans la Catalogne?"
  NRW_FLAVOR_TEXT:0 "La Norvège reste l'un des rares pays entrant au 21ème siècle une nation plus forte qu'elle ne l'était auparavant, un système de sécurité sociale fort et des ressources puissantes qu'elle peut pousser au marché en font le lieu de rêve somptueux. Cependant, alors que le monde s'éloigne du pétrole, la Norvège peut-elle réussir à garder ses prouesses, ou la baisse du pétrole sera-t-elle sa disparition?"
  RSF_FLAVOR_TEXT:0 "Depuis la chute de l'Union soviétique, la Russie, l'État successeur de l'Union, a cependant échoué à s'accrocher au même pouvoir économique et aux mêmes prouesses. La plupart de ses campagnes depuis la chute de l'Union ont consisté à rétablir la domination économique. En Géorgie en 2008 et en Ukraine en 2014. Cependant, les oligarques parlent d'une autre campagne en Ukraine, pour prendre les terres à l'est du dniepr et les régions séparatistes de l'est. Est-ce leur chemin au XXIe siècle, ou vont-ils échouer?"
  EUR_FLAVOR_TEXT:0 "L'Union européenne est le cerveau-enfant de la reconstruction d'après-guerre après la dévastation provoquée par la Seconde Guerre mondiale2. Depuis, elle a évolué pour inclure la plupart des pays du continent, barrent certaines nations comme la Norvège et la Suisse, ou les Balkans occidentaux et les anciens États yougoslaves. L'Union n'a que se renforcer depuis le choix inhabituel du Royaume-Uni de s'en défaire, et la plupart des pourparlers de sortie n'ont plus été pris au sérieux dans la plupart des pays, l'Union ne se renforce qu'à mesure que se développent les pourparlers d'une fédération. L'Union européenne va-t-elle évoluer vers la Fédération européenne? Ou bien l'Union européenne ne finira-t-elle par être mentionnée que dans les livres d'histoire?"
  TRK_FLAVOR_TEXT:0 "Türkiye est la principale barrière des ambitions maritimes de la Russie, et tient un lien stratégique avec nombre de ses voisins. Elle est activement impliquée dans les conflits au sud, soutenant le gouvernement intérimaire de la Syrie et ayant des milices actives en Afrique et au Moyen-Orient. La position de Türkiye dans la région anatolienne lui offre un grand contrôle sur les régions qui l'entourent, et entreprend les ambitions des Osmans avant elle. Türkiye tiendra-t-il ses ambitions ? Ou est-il destiné à échouer comme les Ottomans avant?"
  
  # North America
  USS_FLAVOR_TEXT:0 "Les États-Unis ont connu un XXe siècle prospère grâce au boom économique d'après-guerre et ils ont catapulté comme la seule superpuissance à la fin du siècle. Cependant, la corruption à grande échelle et les tactiques discrètes des entreprises servent à déchirer le tissu dans l'union. Comme les États-Unis sont plus loin derrière à la fois socialement et économiquement. Que réserve l'avenir à l'Union et pourra-t-elle reprendre leur ancienne gloire?"
  MEX_FLAVOR_TEXT:0 "Les cartes de drogue et l'impérialisme américain sont les caractéristiques du Mexique du XXIe siècle. Cependant, de nombreux efforts ont été déployés pour résoudre les cartels sans que les États-Unis combattent une guerre sur leur sol. Qu'est-ce que le Mexique a en réserve pour le siècle prochain, et peut-il échapper avec succès aux griffes de l'impérialisme américain"
  CAN_FLAVOR_TEXT:0 "Le Canada est entré dans le XXIe siècle en tant que nation stable, dépourvue de questions énormes. Cependant, les Premières nations exigent des concessions pour leur traitement horrible depuis la fondation du royaume canadien. Le Canada concédera-t-il?"
  
  # Central Asia
  AFH_FLAVOR_TEXT:0 "Le cimetière des Empires, en Afghanistan, a réussi à résister aux efforts de l'impérialisme américain et a garanti sa souveraineté en tant que puissance régionale. Cependant, les conflits entre les différents groupes ethniques et les détracteurs de la foi menacent le mode de vie traditionnel. L'Afghanistan peut-il réussir à dépasser ses méthodes traditionnelles?"
  AZB_FLAVOR_TEXT:0 "L'Azerbaïdjan est une nation prospère du caucase, les récentes découvertes de réserves de pétrole et de gaz en ont fait un allié important pour l'Europe, cependant les conflits d'Artakh, et les guerres frontalières qui ont suivi avec leur voisin l'Arménie les empêchent d'atteindre leur plus grand. L'Azerbaïdjan peut-il résoudre pacifiquement cette crise ou va-t-il se transformer en guerre?"
  KZK_FLAVOR_TEXT:0 "Le Kazakhstan est entre les différents dirigeants et gouvernements et est tombé à l'anarchie légère. Son leader précédent a laissé un vide de pouvoir massif et de nouveaux dirigeants ont semblé essayer de diriger le Kazakhstan dans une très belle direction. Le Kazakhstan peut-il survivre à la lutte du pouvoir interne ?"
  UZB_FLAVOR_TEXT:0 "L'Ouzbékistan a lutté pour se libérer de la dictature depuis sa séparation de l'URSS dans les années 90, mais il a réussi à libéraliser et continue à améliorer sa situation avec ses voisins. Bien qu'il continue à devenir plus chanceux, il ne peut en être de même de certains de ses voisins, et il devra proclamer sa souveraineté pour survivre..."
  
  # Africa
  SAF_FLAVOR_TEXT:0 "L'Afrique du Sud est une nation qui lutte pour trouver sa voie, les conflits qui définissent son histoire ont conduit à leur ressentiment au mieux entre les différents groupes ethniques, cette tension n'a été aggravée que par l'apartheid. Si l'Afrique du Sud a l'intention de prospérer, elle a un chemin difficile de concessions, de reconstruction et de réforme politique à faire. L'Afrique du Sud peut-elle le faire ? Ou est-il destiné à s'effondrer."
  SSD_FLAVOR_TEXT:0 "Sud-Soudan est né du conflit résultant des groupes ethniques le long du Nil, C'est le nouveau pays à être reconnu par les Nations Unies, et a un long chemin à parcourir avant qu'il puisse être considéré comme un succès. Les tensions ethniques maintiennent le pays à l'arrêt et il faudra faire des manœuvres minutieuses pour que cette nation ne soit pas à court de vie. Est-il capable de ça ?"
  ETH_FLAVOR_TEXT:0 "L'Éthiopie est une nation qui se modernise rapidement et qui a réussi à être relativement épargnée par les mains coloniales. Cependant, la nation a encore ses problèmes, car les groupes ethniques somali, tigray et oromia menacent de se séparer et d'entraîner l'Éthiopie dans une guerre civile coûteuse. L'Éthiopie peut-elle continuer à prospérer malgré les tensions?"
  EGY_FLAVOR_TEXT:0 "L'Égypte connaît un boom démographique en pleine pénurie d'eau et un gouvernement traditionnel défaillant. Les Égyptiens partent pour de meilleures terres et le Nil s'assèche lentement. L'Égypte peut-elle trouver un moyen de naviguer dans la crise?"
  KYA_FLAVOR_TEXT:0 "Le Kenya est une nation africaine structurellement solide, au cœur des efforts de modernisation et d'amélioration rapide du niveau de vie. Alors que le Kenya peut être la plupart du temps dépourvu de graves problèmes, ses voisins ne sont pas si chanceux. Il y a des pourparlers pour former une superpuissance est-africaine dans la sphère politique. Le Kenya va-t-il jeter les bases d'une superpuissance africaine? Ou bien les troubles au sein de ses voisins affecteront ses propres terres."
  MOR_FLAVOR_TEXT:0 "Le Maroc est apparu au XXIe siècle fort et fier après son astuce astucieuse de la République sahraouie, et ses grandes améliorations à sa disparité économique. Il cherche maintenant le partenariat des puissances européennes pour favoriser sa mobilité économique et devenir un acteur majeur sur le continent africain. Les ambitions du Maroc seront-elles atteintes?"
  GHA_FLAVOR_TEXT:0 "Après une junte militaire brutale dans les années 80, la situation économique du Ghana a commencé à s'effondrer massivement. Cependant, depuis le retour des partis politiques et les élections, le pays est revenu à une période de stabilité et de prospérité économique, et il est prévu de continuer à le faire. Cependant, la crise climatique et la désertification du sahel menacent une fois de plus l'instabilité. Le Ghana peut-il naviguer avec succès dans ces conditions?"
  
  # South Asia
  VNM_FLAVOR_TEXT:0 "Le Vietnam est une nation de stabilité relative depuis sa décolonisation. Être l'une des rares économies de marché d'extrême-gauche a ses avantages, et bien que les citoyens endurent la paix relative, les touristes envahissent le pays. Des choix prudents et une géopolitique intelligente peuvent lui permettre de réussir extrêmement bien au XXIe siècle. Cependant, fera-t-elle ces choix?"
  IDA_FLAVOR_TEXT:0 "L'Inde a non seulement survécu, mais a prospéré depuis la dissolution du raj britannique et la fin de 400 ans de domination coloniale. Cependant, certains traumatismes postcolonial avec la séparation du Myanmar, du Bangladesh et du Pakistan ont été une cicatrice sur un record autrement décent. Les tensions croissantes entre l'Inde et le Pakistan sur les terres du Jammu-et-Cachemire sont toutefois une source de préoccupation majeure, et les tensions croissantes avec la RPC au sujet d'Arunchal Pradesh mettent en jeu des conflits armés. L'Inde peut-elle résister avec succès à 100 années supplémentaires d'impérialisme?"
  PAK_FLAVOR_TEXT:0 "Le Pakistan s'est séparé du Raj dans les années 40 et 50 au sujet des tensions religieuses entre les hirondelles et les musulmans. Bien que beaucoup pensent que le conflit a une fin en vue, cependant entre les différents groupes ethniques du conflit pakistanais est en train de se développer. Un mauvais mouvement et il peut y avoir un effondrement de l'État, et avec les tensions avec l'Inde et l'Afghanistan à leur hauteur, le Pakistan peut-il naviguer ces problèmes?"
  
  # South and Central America
  ARG_FLAVOR_TEXT:0 "L'Argentine est une nation qui, après avoir connu un grand succès au XXe siècle, a échoué en raison de l'intervention américaine et d'un conflit raté sur Las Malvinas. Les différends entre les Mapuche natifs, les états argentins et le gouvernement de Buenos Aires ont bloqué de nombreux changements. L'Argentine peut-elle remonter les rangs et ramener son pays à la gloire ?"
  
  # Nonsense Countries
  GLI_FLAVOR_TEXT:2 "La Galice est un petit pays remarquable peuplé de passionnés de cathédrales. Galice retrouvera-t-elle sa gloire passée ?"
  GENERIC_FLAVOR_TEXT:0 "The 21st Century is a time of relative peace & prosperity, however exploitation by the wealthy, waning standards of living and global communication have brought with it a resurgence in political activism and societal shifts like none ever seen. What will this new wave of political expression bring?
  REV_GENERIC_FLAVOR_TEXT:1 "Insatisfaits de la direction que prenait le soi-disant gouvernement organisé, ces révolutionnaires ont décidé de prendre les armes pour le renverser. Va-t-il réussir à saisir le pouvoir ou sera-t-on écrasé comme tant de révolutions oubliées du passé ?"
  DECENTRALIZED_FLAVOR_TEXT:0 "Emprisonné par des pouvoirs plus organisés, ce pays lutte pour maintenir son autonomie. Vont-ils voir l'aube d'un nouveau siècle, ou leur nom survivra-t-il seulement dans les livres d'histoire?"
