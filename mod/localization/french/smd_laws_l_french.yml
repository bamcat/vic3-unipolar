l_french:
 law_jihad:0 "Djihadisme"
 law_jihad_desc:0 "Les militaires djihadistes ont un objectif nettement religieux dans leurs pratiques, leur entraînement et leur organisation."
 law_mixed_healthcare:0 "Système mixte de santé"
 law_mixed_healthcare_desc:0 "La santé de la population est gérée par des régimes d'assurance-maladie privés et gouvernementaux. Des plans gouvernementaux sont offerts à nos citoyens à faible revenu pour résoudre les défaillances du marché de l'assurance maladie privée."
 law_affirmative_action:0 "Action positive"
 law_affirmative_action_desc:0 "Diverses mesures de protection des minorités ont été rendues obligatoires. Cela inclut des citations et divers systèmes pour encourager leur participation à notre système actuel, les protections juridiques et le financement monétaire."
 
 lawgroup_firearms:0 "Propriété des armes à feu"
 lawgroup_firearms_desc:0 "Questions relatives au droit de porter des armes."
 
 lawgroup_abortions:0 "Avortements"
 lawgroup_abortions_desc:0 "Que nos citoyens soient autorisés ou non à avorter."
 
 lawgroup_unions:0 "Unions"
 lawgroup_unions_desc:0 "Les questions concernant la capacité de nos travailleurs à former des syndicats."
 
 lawgroup_homosexuality:0 "Homosexualité"
 lawgroup_homosexuality_desc:0 "Questions concernant le mouvement LGBTQ+ dans notre pays."
 
 law_canton_system:0 "Isolationnisme"
 
 law_unrestricted_firearms:0 "Armes à feu sans restriction"
 law_unrestricted_firearms_desc:0 "Notre pays abrite une grande industrie des armes à feu, mûre pour l'usage civil."
 
 law_licensed_firearms:0 "Armes à feu autorisées"
 law_licensed_firearms_desc:0 "Les citoyens ont besoin d'un permis pour posséder une arme dans notre pays."
 
 law_banned_firearms:0 "Armes à feu interdites"
 law_banned_firearms_desc:0 "L'utilisation civile d'armes à feu est strictement interdite."
 
 law_banned_unions:0 "Unions interdites"
 law_banned_unions_desc:0 "Les travailleurs ne sont pas autorisés à se syndiquer dans l'intention d'obtenir des prestations en milieu de travail."
 
 law_restricted_unions:0 "Unions restreintes"
 law_restricted_unions_desc:0 "Les travailleurs sont autorisés à former des syndicats, avec certaines restrictions visant à protéger nos investisseurs."
 
 law_unrestricted_unions:0 "Unions sans restriction"
 law_unrestricted_unions_desc:0 "Les travailleurs sont pleinement encouragés à se syndiquer et à chercher à obtenir des avantages complets pour leur travail."
 
 law_banned_abortions:0 "Avortements interdits"
 law_banned_abortions_desc:0 "Le meurtre de bébés est strictement interdit par nos lois."
 
 law_restricted_abortion:0 "Avortements limités"
 law_restricted_abortion_desc:0 "Les citoyens sont autorisés à avorter lorsque la vie de la mère est menacée, ou en cas de viol et d'inceste."
 
 law_unrestricted_abortions:0 "Avortements sans restriction"
 law_unrestricted_abortions_desc:0 "Les citoyens peuvent librement exercer leur droit à un avortement à leur guise."
 
 law_active_oppression:0 "Oppression active"
 law_active_oppression_desc:0 "Les citoyens qui s'identifient ouvertement comme membres de la communauté LGBTQ sont opprimés, emprisonnés ou même tués."
 
 law_restricted_lgbtq:0 "Homosexualité criminalisée"
 law_restricted_lgbtq_desc:0 "Les citoyens risquent d'être emprisonnés pour être gays."
 
 law_decriminalized_gays:0 "Décriminalisation de l'homosexualité"
 law_decriminalized_gays_desc:0 "Les citoyens sont autorisés à s'engager dans des relations homosexuelles, à huis clos bien sûr. Les relations homosexuelles ne seront pas sanctionnées par l'État."
 
 law_gay_marriage:0 "Mariage de même sexe"
 law_gay_marriage_desc:0 "L'État est tenu de sanctionner tous les types de mariages, que les initiateurs soient ou non du même sexe."
 
  # immigration
  institution_immigration:0 "Contrôles de l'immigration"
  institution_immigration_desc:0 "A government body has been formed to curb or encourage immigration into our country as we see fit.
  # dei

  institution_diversity_equity_inclusion:0 "Diversité, équité et inclusion"
  institution_diversity_equity_inclusion_desc:0 "Un ministère qui s'attache à donner aux défavorisés un terrain d'entente dans la société."
  
  # spies
  
  institution_intelligence_agency:0 "Agence de renseignement"
  institution_intelligence_agency_desc:0 "Les services de renseignement sont responsables des opérations secrètes dans le monde entier."
  
