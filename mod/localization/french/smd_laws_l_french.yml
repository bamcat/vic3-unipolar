  # New Laws Any Group
 law_equal_rights:0 "Égalité des droits"
 law_equal_rights_desc:0 "Les femmes peuvent s'attendre à jouir du même niveau de droits que leurs homologues masculins."
 law_prison_slavery:0 "Esclavagisme carcéral"
 law_prison_slavery_desc:0 "Les détenus et les criminels sont contraints de travailler pendant de longues heures, avec peu ou pas de salaire pendant leur peine."
 law_restricted_police:0 "Police restreinte"
 law_restricted_police_desc:0 "Le pouvoir présenté par les forces de police a été limité et est soumis à des réglementations strictes pour assurer la sécurité des citoyens qu'ils sont prêts à protéger."
 law_resettlement_enticement:0 "Entrée de réinstallation"
 law_resettlement_enticement_desc:0 "Le gouvernement propose des programmes pour inciter les gens à déménager dans leurs territoires."
 
 # Rights of Minorities Group
 
 lawgroup_rights_of_minorities:0 "aux droits des minorités"
 lawgroup_rights_of_minorities_desc:0 "La législation et la protection des populations minoritaires."
 
 law_no_minority_rights:0 "Pas de droits des minorités"
 law_no_minority_rights_desc:0 "Les minorités de tous types ne recevront pas les mêmes droits que ceux de la population générale."
 law_segregation:0 "Lois sur la séparation"
 law_segregation_desc:0 "Les minorités connaîtront des degrés de séparation par rapport à la population générale, obtenant souvent les restes et les restes."
 law_apartheid:0 "Lois sur l ' apartheid"
 law_apartheid_desc:0 "Les minorités ne feront pas l'expérience de la même société de la population en général et seront souvent déplacées (souvent avec force) dans un «pays» désigné."
 law_unfulfilled_protections:0 "Protections non remplies"
 law_unfulfilled_protections_desc:0 "L ' État s ' est efforcé d ' éliminer les obstacles qui s ' opposent aux minorités, mais les lois régissant les droits des minorités restent largement non appliquées."
 law_limited_protections:0 "Protections limitées"
 law_limited_protections_desc:0 "Les minorités dont l'origine ethnique ou la nationalité diffère recevront une grande partie des mêmes droits que l'ensemble de la population."
 law_encompassing_protections:0 "Protections encompassantes"
 law_encompassing_protections_desc:0 "Les minorités dont l'ethnie ou la nationalité est différente et celles qui sont handicapées recevront tous les droits et toutes les protections dont jouit la population en général."
 law_universal_protections:0 "Protections universelles"
 law_universal_protections_desc:0 "Toutes les minorités, indépendamment de leur appartenance ethnique, de leur nationalité, de leurs capacités, de leur sexualité ou de leur identité de genre, recevront les mêmes droits que la population en général."
 
 # Union Laws Group
 
 lawgroup_union_laws:0 "Droit syndical"
 lawgroup_union_laws_desc:0 "L'attitude de l'organe directeur à l'égard des actions syndicales telles que grèves, marches, manifestations, émeutes et autres."
 law_unions_outlawed:0 "Unité interdite"
 law_unions_outlawed_desc:0 "Les syndicats sont interdits dans cette nation et les auteurs de ces actes recevront une résistance rapide."
 law_useless_unions:0 "Bureaucratie inutile"
 law_useless_unions_desc:0 "Les syndicats ne sont rien de plus que la bureaucratie des travailleurs et manquent des nécessités pour fonctionner et combattre sans forces extérieures."
 law_limited_action:0 "Action limitée"
 law_limited_action_desc:0 "Les syndicats sont fortement restreints dans ce qu'ils sont autorisés à réaliser et doivent souvent naviguer dans des failles juridiques pour être efficaces."
 law_craft_unions:0 "Syndicats de l'artisanat"
 law_craft_unions_desc:0 "Les syndicats se limitent à leurs rôles spécifiques et sont empêchés de forger des allégeances avec les syndicats d'autres rôles."
 law_permitted_unions:0 "Mesures autorisées"
 law_permitted_unions_desc:0 "Les syndicats ne sont ni légaux ni illégaux, ils peuvent fonctionner comme bon leur semble, mais n'ont guère ou pas de protection de l'organe directeur."
 law_enterprise_unions:0 "Entreprises"
 law_enterprise_unions_desc:0 "Les syndicats sont là pour améliorer le rendement de leurs employés et se concentrer sur les besoins de leurs membres. Ils sont efficaces pour améliorer la vie de leurs membres par les moyens nécessaires."
 law_backed_unions:0 "Protections soutenues"
 law_backed_unions_desc:0 "Les syndicats sont effectivement soutenus par le public et se sont cimentés dans la culture des pays. Ils bénéficient d'une protection de la part de la population et bénéficient d'une protection juridique en vue d'une action en justice."
 law_empowered_unions:0 "Autonomisation de l ' Union"
 law_empowered_unions_desc:0 "Les syndicats sont fortement renforcés par la police et bénéficient du soutien du gouvernement. Ces syndicats sont capables d'obtenir leurs demandes efficacement, et sont dans toutes les circonstances protégés et encouragés."
 
 # Corporate Authority Group
 
 lawgroup_corporate_authority:0 "Autorités"
 lawgroup_corporate_authority:0 "Les règlements juridiques à l'égard des sociétés et des personnes absurdement riches, ceux-ci incluent les règlements de leur pouvoir politique et contrôle qu'ils sont capables d'exercer."
 law_completely_unregulated:0 "Totalement non réglementé"
 law_completely_unregulated_desc:0 "Les actions des sociétés et les actions des riches absurdes ne sont en aucun cas entravées. Souvent au détriment des travailleurs et des personnes qui y vivent."
 law_political_lobbying:0 "Lobbyisme politique"
 law_political_lobbying_desc:0 "Quiconque dispose d'une somme suffisante de fonds peut faire pression sur le gouvernement et les pousser à modifier les lois en leur faveur."
 law_tax_haven:0 "Havre fiscal"
 law_tax_haven_desc:0 "Les sociétés et les personnes ayant une richesse absurde sont considérées comme les bienvenues et l'organe directeur a mis en place des lois qui les favorisent avec moins de taxes et plus de terres."
 law_feign_ignorance:0 "Ignorance"
 law_political_lobbying_desc:0 "L'organe directeur choisit de faire le moins possible pour limiter le pouvoir des sociétés et des riches absurdement en choisissant de prétendre que ce n'est pas un problème."
 law_limited_restrictions:0 "Restriction limitée"
 law_limited_restrictions_desc:0 "Les actifs des sociétés et des personnes absurdement riches sont imposés, qu'ils soient en argent ou en actions."
 law_progressive_restrictions:0 "Restriction progressive"
 law_progressive_restrictions_desc:0 "Tout actif des riches absurdement et tous les bénéfices de la société réalisés ou non est taxé et utilisé pour améliorer la population à un taux progressif."
 law_no_one_individual:0 "Personne"
 law_no_one_individual_desc:0 "Les absurdes riches sont tenus au système fiscal de l'organe directeur s'ils choisissent de faire des affaires là-bas. Leur richesse générée dans le pays est réduite et distribuée à la population dans le besoin."
 law_corporate_redistribution:0 "Redistribution des entreprises"
 law_corporate_redistribution_desc:0 "Toute richesse générée par les riches absurdement ou les sociétés est réduite au montant maximal autorisé. Cette richesse est ensuite redistribuée au besoin. Les sociétés sont remises au public et consistent en un conseil comprenant des élus"
 
 law_serfdom:0 "Droits du travail non respectés"
 law_serfdom_desc:0 "Il n'y a pas de droits du travail établis, ou les droits du travail établis sont totalement inapplicables."
 law_serfdom_banned:0 "Protections minimales à barres"
 law_serfdom_banned_desc:0 "Le strict minimum de protections a été établi."
 
 lawgroup_drug_regulations: "Règlement sur les drogues"
 lawgroup_drug_regulations_desc: "Le statut juridique des substances enivrantes — de l'interdiction totale à la légalisation complète du trafic. La politique antidrogue détermine la mortalité, l'autorité de l'État, les coûts d'exécution et le pouvoir des intérêts agricoles et criminels."

 law_total_prohibition: "Interdiction totale"
 law_total_prohibition_desc: "Toutes les substances enivrantes, y compris l'alcool et le tabac, sont interdites par la loi. L'État revendique l'autorité morale pour réglementer ce que les citoyens mettent dans leur corps, appuyé par des institutions religieuses et conservatrices. Les marchés noirs prospèrent dans les lacunes que l'application ne peut combler."

 law_alcohol_tobacco_legal: "Alcool et tabac Légal"
 law_alcohol_tobacco_legal_desc: "L'alcool et le tabac sont légaux et imposés. Toutes les autres substances demeurent interdites. C'est le cadre juridique de base pour la plupart des États modernes, un compromis pragmatique entre intérêt économique et conservatisme moral."

 law_marijuana_decriminalization: "Décriminalisation de la marijuana"
 law_marijuana_decriminalization_desc: "La possession et la consommation personnelles de cannabis ne constituent plus une infraction pénale. Le commerce demeure illégal, mais l'application est réorientée vers des substances plus difficiles. La politique reflète un consensus croissant selon lequel l'incarcération n'est pas une réponse efficace à la consommation de drogues à des fins récréatives."

 law_hard_drugs_decriminalized: "Décriminalisation des drogues dures"
 law_hard_drugs_decriminalized_desc: "La possession de toutes les substances réglementées - y compris les opiacés, la cocaïne et les amphétamines - est traitée comme une question de santé publique plutôt que comme une question pénale. Les utilisateurs sont traités plutôt que poursuivis. La politique est controversée, mais les premières adoptions semblent indiquer qu'elle réduit la mortalité par surdose et libère les ressources d'application."

 law_safe_injection_sites: "Sites d'injection sûrs"
 law_safe_injection_sites_desc: "Les installations financées par le gouvernement permettent aux utilisateurs de consommer des drogues sous surveillance médicale. Le personnel peut administrer des médicaments contre le surdosage et connecter les utilisateurs aux programmes de traitement. Les taux de mortalité diminuent considérablement. L'opposition religieuse et conservatrice est farouche — la politique est perçue comme acceptant, voire permettant, la consommation de drogues."

 law_trafficking_allowed: "Traite autorisée"
 law_trafficking_allowed_desc: "Le commerce des substances contrôlées est entièrement légalisé et réglementé par l'État. Les avantages économiques sont immédiats et substantiels — les flux de revenus de la drogue vers l'économie formelle et l'assiette fiscale. La réputation et les conséquences sociales sont graves. La plupart du monde considérera cela comme une capitulation des réseaux criminels."

 law_total_prohibition_modifier: "Interdiction totale"
 law_alcohol_tobacco_legal_modifier: "Alcool et tabac Légal"
 law_marijuana_decriminalization_modifier: "Décriminalisation de la marijuana"
 law_hard_drugs_decriminalized_modifier: "Décriminalisation des drogues dures"
 law_safe_injection_sites_modifier: "Sites d'injection sûrs"
 law_trafficking_allowed_modifier: "Traite autorisée"
 
 lawgroup_disability_rights: "Droits des handicapés"
 lawgroup_disability_rights_desc: "Le cadre juridique régissant les droits des citoyens handicapés - de la simple reconnaissance au soutien actif de l'État par le traitement, l'infrastructure et l'inclusion sur le lieu de travail. Des cadres plus complets accroissent la participation de la main-d'œuvre, améliorent le niveau de vie et réduisent la mortalité, à un coût croissant pour l'État et les employeurs."

 law_minimal_recognition: "Reconnaissance minimale"
 law_minimal_recognition_desc: "L'État reconnaît l'existence de citoyens handicapés mais n'assure aucun logement, soutien ou protection juridique pour eux. Les personnes handicapées sont largement exclues de l'emploi formel et de la vie publique. Le coût humain est important; le coût financier est négligeable."
 
 law_workplace_accommodations: "Hébergement sur le lieu de travail"
 law_workplace_accommodations_desc: "Les employeurs sont légalement tenus de procéder à des ajustements raisonnables pour permettre aux travailleurs handicapés de participer à la main-d'œuvre — équipements modifiés, fonctions ajustées, postes de travail accessibles. La politique amène une population significative dans l'emploi productif. Les employeurs supportent les coûts d'adaptation, mais la main-d'œuvre augmente."
 
 law_anti_ableist_architecture: "Architecture anti-ablienne"
 law_anti_ableist_architecture_desc: "Les bâtiments publics, les réseaux de transport et les infrastructures doivent être accessibles aux personnes handicapées. Rampes, ascenseurs, pavage tactile, signalisation accessible — l'environnement physique ne doit plus exclure. La rénovation des infrastructures existantes est coûteuse. La population qui peut participer pleinement à la société se développe considérablement."
 
 law_public_treatments: "Traitements publics"
 law_public_treatments_desc: "L'État finance des traitements médicaux, des appareils d'assistance, des prothèses, des thérapies et des services de soutien continus pour les personnes handicapées, comme une question de droit plutôt que de charité. La mortalité diminue considérablement. Le niveau de vie augmente au sein de la population. Le coût du budget public est important et continu, mais l'argument selon lequel certains citoyens ont moins droit au soutien de l'État que d'autres a été formellement rejeté."
 
 law_minimal_recognition_modifier: "Reconnaissance minimale du handicap"
 law_minimal_recognition_modifier_desc: "Les citoyens handicapés ne reçoivent aucun logement de l'État. L'effectif effectif est réduit et la mortalité est supérieure à ce qu'elle pourrait être."
 
 law_workplace_accommodations_modifier: "Hébergement sur le lieu de travail"
 law_workplace_accommodations_modifier_desc: "Les employeurs sont tenus d'accueillir les travailleurs handicapés. La main-d'oeuvre est plus vaste et plus inclusive, à un coût modeste pour accroître la productivité."
 
 law_anti_ableist_architecture_modifier: "Infrastructures accessibles"
 law_anti_ableist_architecture_modifier_desc: "Les infrastructures publiques ont été rendues accessibles. Les coûts de construction sont plus élevés à mesure que les bâtiments respectent les normes d'accessibilité, mais la population qui peut participer pleinement à la société est beaucoup plus importante."
 
 law_public_treatments_modifier: "Traitements publics pour personnes handicapées"
 law_public_treatments_modifier_desc: "L'État finance le traitement et le soutien des personnes handicapées. La mortalité est réduite, le niveau de vie est amélioré et l'accès à l'éducation est plus large, à des frais publics importants et constants."
 
 institution_environmental_protection: "Agence de protection de l ' environnement"
 institution_environmental_protection_desc: "Un organisme gouvernemental voué à la surveillance et à l'application des normes environnementales. Chaque niveau d'investissement représente une capacité d'application accrue, des règlements plus stricts et des programmes de conservation plus vastes, ce qui réduit la production de pollution dans tous les États."
 
 lawgroup_environmental_regulations: "Réglementation environnementale"
 lawgroup_environmental_regulations_desc: "Le cadre juridique régissant les relations entre [ROOT.GetCountry.GetName] et l'environnement naturel, de l'exploitation industrielle non réglementée à des droits de la nature garantis par la Constitution. Des cadres plus progressistes réduisent la pollution, réduisent la mortalité et protègent les écosystèmes, à un coût accru pour le rendement industriel et les dépenses publiques."
 
 law_no_environmental_regulations: "Aucun règlement"
 law_no_environmental_regulations_desc: "L'industrie fonctionne sans contraintes environnementales. Les usines, les mines et les fermes peuvent polluer, extraire et exploiter sans limite légale. La production est optimisée. Le coût à long terme de la mortalité, de la dégradation des écosystèmes et de la santé publique est supporté par la population et non par les producteurs."
 
 law_game_law: "Droit du jeu"
 law_game_law_desc: "La chasse et la pêche sont réglementées pour empêcher l'effondrement des populations de gibier. Saisons protégées, chasse autorisée et restrictions sur les méthodes d'extraction les plus destructrices. C'est un cadre de conservation qui sert principalement les intérêts de ceux qui sont assez riches pour chasser de façon récréative, mais il établit le principe selon lequel l'État a intérêt à gérer les ressources naturelles."
 
 law_national_recycling: "Recyclage national"
 law_national_recycling_desc: "Un programme national de collecte et de traitement des déchets recyclables. Les déchets industriels et domestiques sont triés, récupérés et réutilisés dans la mesure du possible, ce qui réduit le volume de matières entrant dans les décharges et les voies navigables. L'efficacité des ressources s'améliore modestement. La pollution tombe. Le programme exige une coordination entre les municipalités et les industries."
 
 law_protection_agency: "Agence de protection"
 law_protection_agency_desc: "Un organisme gouvernemental spécialisé ayant le pouvoir d'établir, de surveiller et d'appliquer des normes environnementales dans tous les secteurs de l'économie. Les limites d'émissions, les restrictions d'utilisation des terres, les règlements sur les déchets industriels et les zones naturelles protégées relèvent de sa compétence. L'organisme peut être investi dans — chaque niveau de financement supplémentaire accroît sa capacité d'application et réduit encore la pollution."
 
 law_guaranteed_rights_of_nature: "Droits garantis de la nature"
 law_guaranteed_rights_of_nature_desc: "Les cours d'eau, les forêts, les zones humides et les écosystèmes jouissent d'un statut juridique, le droit de ne pas être détruits, pollués ou exploités au-delà de leur capacité de récupération. Ce cadre est la législation environnementale la plus ambitieuse possible, qui s'inspire des traditions juridiques émergentes dans les pays qui ont commencé à considérer la nature comme un sujet de droits plutôt qu'un objet de propriété. L'activité industrielle est fortement limitée. La pollution diminue fortement. L'Agence de protection de l'environnement fonctionne avec la plus grande efficacité possible."
 
 law_no_environmental_regulations_modifier: "Industrie non réglementée"
 law_no_environmental_regulations_modifier_desc: "Pas de contraintes environnementales pour l'industrie. Le rendement est en hausse, mais la pollution et la mortalité augmentent en conséquence."
 
 law_game_law_modifier: "Droit du jeu"
 law_game_law_modifier_desc: "La chasse et la pêche réglementées ont légèrement réduit la dégradation de l'environnement. Une intervention minimale mais réelle."
 
 law_national_recycling_modifier: "Programme national de recyclage"
 law_national_recycling_modifier_desc: "Un programme national de recyclage réduit la production de déchets et la récupération des matériaux, améliorant modestement la pollution et l'efficacité de la construction."
 
 law_protection_agency_modifier: "Agence de protection de l ' environnement"
 law_protection_agency_modifier_desc: "L'Agence de protection de l'environnement applique les limites d'émissions et les normes industrielles. La pollution diminue et l'institution peut être davantage investie pour élargir sa portée."
 
 law_guaranteed_rights_of_nature_modifier: "Droits garantis de la nature"
 law_guaranteed_rights_of_nature_modifier_desc: "La nature a obtenu le statut constitutionnel. L'industrie est confrontée à des contraintes importantes, mais la pollution est fortement réduite, la mortalité diminue et la sécurité alimentaire s'améliore à mesure que les écosystèmes sont protégés."
 
