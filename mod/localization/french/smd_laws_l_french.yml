 # LAWGROUP
 # ==========================================
 
 lawgroup_subsidized_housing: "Logement subventionné"
 lawgroup_subsidized_housing_desc: "La mesure dans laquelle l'État finance, construit et garantit le logement de ses citoyens. Des cadres plus progressistes permettent d'accroître la production immobilière dans les centres urbains, d'améliorer les infrastructures et d'accroître l'attraction migratoire, à des coûts sociaux et budgétaires croissants."
 
 # ==========================================
 # LAWS
 # ==========================================
 
 law_no_public_housing: "Pas de logement public"
 law_no_public_housing_desc: "L ' État n ' offre aucune aide au logement. L'abri est une affaire privée, achetée, louée ou abandonnée. Le marché du logement urbain fonctionne sans intervention publique, et quel que soit le marché produit est ce que les citoyens obtiennent."
 
 law_housing_projects: "Projets de logement"
 law_housing_projects_desc: "L'État construit des logements sociaux de haute densité de base dans les zones urbaines - des tours, des rangées de logements, fonctionnels et bon marché. La qualité n'est pas toujours élevée et les emplacements ne sont pas toujours souhaitables, mais le logement existe. Les centres urbains peuvent maintenant produire des biens immobiliers supplémentaires grâce à des programmes de construction d'État."
 
 law_public_housing_program: "Programme de logement public"
 law_public_housing_program_desc: "Un programme complet de logements publics avec des normes de conception, un développement mixte et une planification urbaine active. Le gouvernement ne construit pas seulement des abris, il façonne la ville. Les centres urbains produisent beaucoup plus de biens immobiliers au fur et à mesure que le secteur public de la construction se développe, et l'infrastructure s'améliore grâce à une meilleure planification urbaine."
 
 law_universal_housing: "Logement universel"
 law_universal_housing_desc: "Le logement est un droit garanti. L'État finance, construit et entretient des logements pour tous les citoyens qui en ont besoin — pas de moyens de tester, pas de dépendance du marché, pas de marche sans. Le coût financier est important et continu. Les centres urbains produisent une production immobilière maximale. Les villes planifiées autour de l'accès universel attirent les migrations et améliorent l'infrastructure dans son ensemble."
 
 law_no_public_housing_modifier: "Pas de logement public"
 law_no_public_housing_modifier_desc: "L ' État n ' offre aucune aide au logement. Le marché du logement urbain est entièrement privé."
 
 law_housing_projects_modifier: "Projets de logement"
 law_housing_projects_modifier_desc: "La construction de logements publics de base est en cours. Les coûts de la protection sociale augmentent légèrement à mesure que l'État subventionne le parc de logements."
 
 law_public_housing_program_modifier: "Programme de logement public"
 law_public_housing_program_modifier_desc: "Un vaste programme de logements sociaux élargit l'approvisionnement immobilier urbain et améliore l'infrastructure municipale, à un coût continu important."
 
 law_universal_housing_modifier: "Logement universel"
 law_universal_housing_modifier_desc: "Le logement est un droit garanti. Les coûts de bien-être sont élevés, mais les infrastructures urbaines sont améliorées, la migration est attirée et la production immobilière est optimisée."
 
 institution_central_bank: "Banque centrale"
 institution_central_bank_desc: "Une autorité monétaire de l'État qui gère la masse monétaire, établit les réserves obligatoires et contrôle les taux d'intérêt. Chaque niveau d'investissement renforce la politique monétaire, limitant la production de crédit commercial, mais élargissant le plafond de la dette nationale et augmentant le taux d'intérêt de référence. La Banque centrale est le mécanisme par lequel l'État exerce un contrôle direct sur le système financier."
 
 lawgroup_central_banking: "Banque centrale"
 lawgroup_central_banking_desc: "Le cadre juridique régissant le système monétaire de [ROOT.GetCountry.GetName] — de l'absence d'autorité monétaire centrale au contrôle intégral de la masse monétaire par l'État. Le choix du cadre bancaire détermine la manière dont le crédit et les titres sont produits et ce que l'État peut emprunter."
 
 law_no_central_bank: "Pas de Banque centrale"
 law_no_central_bank_desc: "Il n'existe pas d'autorité monétaire centrale. Les banques opèrent de manière indépendante, fixant leurs propres ratios de réserves et leurs propres politiques de prêt. La masse monétaire n'est pas coordonnée et l'État n'a aucun mécanisme pour gérer les taux d'intérêt ou les conditions de crédit. Il s'agit d'un arrangement instable dont la plupart des économies modernes se sont éloignées."
 
 law_fractional_reserve_banking: "Banque de réserve fractionnelle"
 law_fractional_reserve_banking_desc: "Les banques ne sont tenues de détenir qu'une fraction de leurs dépôts en tant que réserves, prêtant le reste à l'économie. Cela augmente la masse monétaire — les quartiers financiers produisent plus de titres à mesure que les flux de capitaux se multiplient dans le système, mais la production de crédit commercial est quelque peu diluée par l'effet de levier. C'est l'arrangement standard pour la plupart des économies modernes."
 
 law_full_reserve_banking: "Banque de réserve complète"
 law_full_reserve_banking_desc: "Les banques doivent détenir 100 % des dépôts sous forme de réserves — aucun prêt fractionné. L'institution de la Banque centrale devient disponible, permettant à l'État de gérer directement la politique monétaire. Chaque niveau d'investissement de la Banque centrale augmente le taux d'intérêt de référence de 1 % et le plafond de crédit de 5 %. La production de crédit des banques commerciales est plus stable. La production de titres des districts financiers diminue à mesure que l'effet de levier est retiré du système."

 law_no_central_bank_modifier: "Pas de Banque centrale"
 law_no_central_bank_modifier_desc: "Il n'existe pas d'autorité monétaire centrale. La masse monétaire n'est pas gérée."
 
 law_fractional_reserve_banking_modifier: "Banque de réserve fractionnelle"
 law_fractional_reserve_banking_modifier_desc: "Les prêts de réserve fractionnaires augmentent la masse monétaire. La production de titres est en hausse; la production de crédits commerciaux est légèrement réduite par l'effet de levier."
 
 law_full_reserve_banking_modifier: "Banque de réserve complète"
 law_full_reserve_banking_modifier_desc: "Les réserves obligatoires sont en vigueur. La production de crédit est stable et supérieure. La production de titres est réduite. L'institution de la Banque centrale peut gérer les taux d'intérêt et le plafond de la dette nationale."
 
 institution_central_bank_modifier: "Banque centrale"
 institution_central_bank_modifier_desc: "La Banque centrale est active et gère la politique monétaire. Chaque niveau d'investissement resserre l'offre de crédit, augmente le taux d'intérêt de 1 % et augmente le plafond de crédit de 5 %."
 
 country_max_credit_limit_mult: "Limite de crédit maximale"
 country_institution_cost_institution_central_bank_mult: "Coût de la Banque centrale"
 country_institution_central_bank_max_investment_add: "Banque centrale Max Investissement"
 country_institution_size_change_speed_institution_central_bank_mult: "Vitesse d'expansion de la Banque centrale"
 building_group_bg_banking_throughput_add: "Débit bancaire"
 
 lawgroup_media_regulations: "Règlement sur les médias"
 lawgroup_media_regulations_desc: "Le cadre juridique régissant l'environnement de l'information de [ROOT.GetCountry.GetName], des médias entièrement non réglementés aux infrastructures de communication contrôlées par l'État. Des cadres plus réglementés suppriment la radicalisation des mouvements politiques et accroissent l'autorité de l'État, tandis que des environnements non réglementés amplifient les mouvements et affaiblissent l'emprise du gouvernement sur l'espace d'information."
 
 law_fully_unregulated_media: "Non réglementé"
 law_fully_unregulated_media_desc: "Il n'y a pas de réglementation des médias ou de l'environnement de l'information. Les points de presse, les plateformes en ligne et les réseaux de communication fonctionnent sans surveillance gouvernementale. La désinformation se répand librement. Les mouvements politiques prospèrent dans le bruit. L'État n'a pas de mécanisme pour façonner ou gérer l'information que ses citoyens consomment — et aucune autorité n'est issue de son contrôle."
 
 law_digital_rights: "Droits numériques"
 law_digital_rights_desc: "Les protections juridiques fondamentales régissent l'environnement de l'information — garanties de confidentialité, dispositions anticensure, lois sur la liberté de l'information. Les citoyens ont un recours légal contre certains abus des médias, mais l'espace d'information reste largement libre. Les mouvements politiques trouvent encore un terrain fertile. [ROOT.GetCountry.GetName] gagne un modeste avantage de réputation en étant un État respectueux des droits."
 
 law_fairness_doctrine: "Doctrine d'équité"
 law_fairness_doctrine_desc: "Les médias sont légalement tenus de présenter une couverture équilibrée des questions politiques, donnant du temps et de l'espace à de multiples perspectives plutôt qu'à une seule. Les voix politiques les plus extrêmes perdent leur mégaphone. Le recrutement de mouvements radicaux est amorti. L'État se positionne comme un arbitre équitable plutôt que comme un participant à la guerre de l'information, et gagne l'autorité du rôle."
 
 law_government_content_moderators: "Modérateurs de contenu gouvernemental"
 law_government_content_moderators_desc: "L'État modère activement le contenu en ligne, en supprimant la désinformation, le matériel extrémiste et le contenu jugé dangereux ou déstabilisant. Les mouvements politiques perdent une portée significative car leur matériel de recrutement le plus efficace est supprimé. L'autorité augmente. La communauté internationale et les critiques internes de la liberté de la presse noteront la politique et le prestige de [ROOT.GetCountry.GetName] en souffrira."
 
 law_state_wifi: "État WiFi"
 law_state_wifi_desc: "L'État gère directement l'infrastructure de communication. L'accès à Internet est un service public, entièrement détenu, exploité et surveillé par le gouvernement. L'environnement de l'information est une ressource d'État — ce que les citoyens lisent, regardent et partagent passe par l'infrastructure [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName] les contrôles gouvernementaux. La radicalisation des mouvements politiques est presque complètement supprimée. Le coût, financier et de réputation, est considérable."
 
 law_fully_unregulated_media_modifier: "Médias entièrement non réglementés"
 law_fully_unregulated_media_modifier_desc: "Un environnement d'information non gouverné amplifie les mouvements politiques et affaiblit l'autorité de l'État."
 
 law_digital_rights_modifier: "Cadre des droits numériques"
 law_digital_rights_modifier_desc: "Les protections juridiques fondamentales régissent l'environnement de l'information. Les mouvements politiques continuent de prospérer, mais [ROOT.GetCountry.GetName] gagne un certain prestige grâce à sa position respectueuse des droits."
 
 law_fairness_doctrine_modifier: "Doctrine d'équité"
 law_fairness_doctrine_modifier_desc: "Les exigences équilibrées en matière de couverture médiatique freinent le recrutement de mouvements radicaux et améliorent la légitimité de l'État."
 
 law_government_content_moderators_modifier: "Modération du contenu du gouvernement"
 law_government_content_moderators_modifier_desc: "La modération active du contenu de l'État supprime considérablement la radicalisation des mouvements politiques, au détriment du prestige et de la légitimité."
 
 law_state_wifi_modifier: "Communications contrôlées par l ' État"
 law_state_wifi_modifier_desc: "[ROOT.GetCountry.GetName] contrôle directement l'infrastructure de communication. La radicalisation des mouvements politiques est presque totalement supprimée. L'autorité est élevée. La réputation internationale en souffre."
 
 institution_courts: "Système judiciaire"
 institution_courts_desc: "Un appareil judiciaire officiel fonctionnant par l ' intermédiaire de tribunaux et de procédures juridiques établis. Chaque niveau d'investissement élargit la portée du système judiciaire: plus de juges, plus de tribunaux, plus de cohérence dans l'application de la loi. Le turmoil tombe à mesure que les différends sont résolus par les voies légales, la promulgation de lois devient plus cohérente et les mouvements révolutionnaires trouvent l'appareil juridique de l'État plus difficile à surmonter."
 
 lawgroup_judiciary: "Pouvoir judiciaire"
 lawgroup_judiciary_desc: "La philosophie juridique qui sous-tend le système judiciaire de [ROOT.GetCountry.GetName] — comment les différends sont résolus, qui détient l'autorité juridique et quel est le but de la justice. Le choix du pouvoir judiciaire façonne l'autorité, la légitimité, la position diplomatique et la stabilité de l'ordre social."
 
 law_inquisitive_judiciary: "Inquisitif"
 law_inquisitive_judiciary_desc: "L'État enquête, poursuit et juge — le pouvoir judiciaire est un organe de l'autorité gouvernementale plutôt qu'une institution indépendante. Les juges sont des agents de la Couronne ou du gouvernement, chargés de trouver la vérité et d'appliquer la loi au nom de l'État. L'autorité est élevée et l'adoption de la politique gouvernementale est plus fluide, mais la procédure régulière est faible et la population le sait."
 
 law_customary_judiciary: "Personnalisé"
 law_customary_judiciary_desc: "Les différends sont réglés par les normes communautaires traditionnelles, les conseils tribaux, l'arbitrage des aînés et la coutume locale. Il n'existe pas de tribunaux formels — la justice est rendue par ceux que la communauté reconnaît comme ses autorités, conformément aux règles que la communauté reconnaît comme légitimes. L'État a une portée limitée dans ce système. Les communautés sont stables, fidèles à leurs traditions et résistantes aux perturbations extérieures."
 
 law_religious_judiciary: "Droit religieux"
 law_religious_judiciary_desc: "L'Écriture, la jurisprudence religieuse et les interprétations des autorités cléricales régissent les procédures judiciaires. Le dévot acquiert un énorme pouvoir politique en tant qu'arbitre de ce que signifie la loi et de son application. La légitimité religieuse est profonde parmi les fidèles. Ceux qui sont en dehors de la foi, ou qui l'interprètent différemment, peuvent trouver le système moins accueillant."
 
 law_restorative_judiciary: "Rétablissement"
 law_restorative_judiciary_desc: "L'objectif de la justice n'est pas la punition, mais la réparation des dommages causés aux victimes, la réadaptation des délinquants et la réinsertion sociale. Les tribunaux se concentrent sur la médiation, la réconciliation et la guérison communautaire. La turbine tombe. La mortalité due aux conflits diminue. Les loyalistes grandissent. L'État renonce à une certaine autorité en échange d'une population qui fait confiance au système sous lequel il vit."
 
 law_adversarial_judiciary: "Adversaires"
 law_adversarial_judiciary_desc: "Compétition devant un juge ou un jury indépendant. La présomption d'innocence est protégée. Le statut juridique est égal quelle que soit la position sociale. L'État est lié par les mêmes règles que ses citoyens. Le prestige international de [ROOT.GetCountry.GetName] augmente considérablement. Le pouvoir judiciaire indépendant limite l'action du gouvernement, mais un gouvernement qui peut être limité par la loi est celui dont la population peut avoir confiance."
 
 law_inquisitive_judiciary_modifier: "Inquisitoire judiciaire"
 law_inquisitive_judiciary_modifier_desc: "Le pouvoir judiciaire agit en tant qu'organe de l'État. La mise en œuvre de la politique est plus facile et la tourmente est supprimée, mais les garanties d'une procédure régulière sont faibles et la pression radicale qui s'exerce sous la surface est réelle."
 
 law_customary_judiciary_modifier: "Droit coutumier"
 law_customary_judiciary_modifier_desc: "La justice communautaire traditionnelle offre une légitimité et une stabilité sociales profondes. L'autorité officielle de l'État est limitée, mais la confiance de la population dans le système est authentique."
 
 law_religious_judiciary_modifier: "Droit religieux"
 law_religious_judiciary_modifier_desc: "L'autorité du clergé régit la loi. Le dévot [ROOT.GetCountry.GetAdjective] détient un énorme pouvoir politique. Une fidélité profonde parmi les fidèles — et un ressentiment croissant parmi ceux qui sont en dehors de lui."
 
 law_restorative_judiciary_modifier: "Justice réparatrice"
 law_restorative_judiciary_modifier_desc: "Le système judiciaire est axé sur la réadaptation et la réconciliation. La chute de la tortue et de la mortalité, la croissance des loyalistes, et [ROOT.GetCountry.GetName] gagnent le respect international de son approche humaine."
 
 law_adversarial_judiciary_modifier: "Jurisprudence consultative"
 law_adversarial_judiciary_modifier_desc: "Un système judiciaire indépendant fonctionnant dans le respect des garanties d ' une procédure régulière et de l ' égalité devant la loi. La légitimité et le prestige sont élevés. L'autorité de l'État est vérifiée, mais c'est ce qui rend le système crédible."
 
 institution_courts_modifier: "Pouvoir judiciaire"
 institution_courts_modifier_desc: "Un réseau judiciaire établi réduit les troubles, améliore l'adoption des lois et supprime l'élan révolutionnaire. Chaque niveau supplémentaire étend la portée des tribunaux à [ROOT.GetCountry.GetName]."
 
 country_institution_cost_institution_courts_mult: "Coût du système judiciaire"
 country_institution_courts_max_investment_add: "Système judiciaire Max Investissement"
 country_institution_size_change_speed_institution_courts_mult: "Vitesse d'expansion du système judiciaire"
 
 law_privatized_preschool_education:0 "Enseignement préscolaire privatisé"
 law_privatized_preschool_education_desc:0 "L'éducation de la petite enfance est assurée par un marché privé réglementé. Les fournisseurs sont en concurrence pour s'inscrire, l'État fixant des normes minimales mais laissant la livraison aux opérateurs indépendants. L'accès dépend en grande partie du revenu des ménages, mais les subventions peuvent compenser une partie du fardeau pour les familles à faible revenu."

 law_universal_childcare:0 "La garde universelle des enfants"
 law_universal_childcare_desc:0 "L'État garantit des services de garde d'enfants abordables pour toutes les familles, quel que soit leur revenu. Des structures financées par l ' État sont disponibles dans tout le pays, ce qui permet aux parents de participer à la vie active et de veiller à ce que le développement de la petite enfance ne soit pas tributaire des moyens de la famille."

 law_legal_protections:0 "Protections juridiques"
 law_legal_protections_desc:0 "L'État a codifié l'égalité juridique formelle entre les hommes et les femmes, en consacrant des protections contre la discrimination dans l'emploi, la propriété et la vie publique. Les droits précédemment coutumiers ou appliqués de manière sélective sont désormais garantis par la loi."

 law_structural_egalitarianism:0 "Egalitarisme structurel"
 law_structural_egalitarianism_desc:0 "Le gouvernement a dépassé l'égalité juridique pour démanteler activement les structures institutionnelles qui perpétuent l'inégalité entre les sexes. La représentation dans les fonctions publiques, les professions et les institutions civiques est obligatoire, et l'État joue un rôle actif dans l'application de l'égalité des résultats plutôt que dans l'égalité des droits."

 law_matriarchy:0 "Matriarche"
 law_matriarchy_desc:0 "Les femmes occupent une position dominante dans la structure politique et sociale du pays. Les femmes formeront la grande majorité des postes de direction."

 law_disability_cheques:0 "Chèques handicap"
 law_disability_cheques_desc:0 "L'État fournit un soutien financier régulier aux citoyens incapables de travailler en raison d'un handicap ou d'une maladie chronique. Les paiements sont gérés par l'intermédiaire de l'appareil de sécurité sociale et visent à garantir un niveau de vie minimum aux personnes en dehors de la population active."

 law_student_coverage:0 "Congé de maternité"
 law_student_coverage_desc:0 "Les femmes bénéficient d ' une couverture pour les grossesses."

 law_universal_basic_income:0 "Revenu de base universel"
 law_universal_basic_income_desc:0 "Tout citoyen reçoit un paiement périodique inconditionnel de la part de l'État, quel que soit son statut professionnel ou ses moyens. La politique représente une refonte fondamentale de la relation entre le travail, le bien-être et la participation économique, qui garantit un plancher sous lequel personne ne peut tomber tout en élevant les attentes minimales de tous les travailleurs."
 
 law_universal_college:0 "Collège universel"
 law_universal_college_desc:0 "L'État garantit l'accès à l'enseignement supérieur à tous les citoyens, quels que soient leur origine ou leurs moyens. Les universités et les collèges sont financés par l'État et leurs places sont ouvertes au mérite plutôt qu'à la richesse, ce qui donne lieu à une main-d'oeuvre plus instruite et à une citoyenneté mieux informée."

 education_laws.1.t:0 "Qui paie le diplôme?"
 education_laws.1.d:0 "L'engagement en faveur du collège universel a suscité une question immédiate et pointue de la part des conservateurs fiscaux: qui paiera exactement pour cela? Le financement de l'enseignement supérieur pour chaque citoyen qui le cherche représente une augmentation importante des dépenses publiques, et les opposants font leurs objections à haute voix. Le gouvernement doit décider s'il s'engage à verser un financement public intégral ou à adopter un modèle éprouvé par les moyens qui limite le fardeau."
 education_laws.1.f:0 "La question de savoir qui paie pour l'éducation a toujours été vraiment une question de qui l'éducation est pour."
 education_laws.1.a:0 "L'enseignement supérieur est un bien public."
 education_laws.1.b:0 "Introduire des subventions sous condition de ressources — financer les pauvres et non les riches."

 education_laws.2.t:0 "L'objection de la méritocratie"
 education_laws.2.d:0 "Des intérêts riches ont trouvé leur argument préféré contre le collège universel : les normes. Si tout le monde peut y assister, ils l'avertent, alors le degré devient inutile — des institutions d'excellence authentique seront entraînées vers le bas pour accueillir les sous - préparées. Le gouvernement doit choisir entre défendre l'accès universel sur le principe, ou offrir un carveout qui préserve les institutions d'élite aux côtés du système public."
 education_laws.2.f:0 "Chaque élargissement de l'accès a reçu le même avertissement sur les normes. Les normes survivent toujours."
 education_laws.2.a:0 "Défendre l'accès universel — l'excellence n'est pas la préservation des riches."
 education_laws.2.b:0 "Préserver les institutions d'élite à côté de l'accès universel."

 education_laws.3.t:0 "L'Intelligentsia parle"
 education_laws.3.d:0 "La communauté universitaire est entrée dans le débat avec une conviction caractéristique. Selon eux, le collège universel n'est pas seulement un bien social, mais une nécessité économique, une nation qui limite l'enseignement supérieur à ceux qui peuvent se permettre de choisir l'ignorance délibérée. Le gouvernement doit décider d'inviter formellement sa voix dans l'argument législatif ou de maintenir le débat en termes strictement politiques."
 education_laws.3.f:0 "L'université a toujours été là où les sociétés décident quel avenir elles veulent. Maintenant, il doit décider qui est autorisé à aider à la construire."
 education_laws.3.a:0 "Invitez-les à participer au débat — laissez les universitaires diriger l'argument."
 education_laws.3.b:0 "Gardez une décision politique — les universitaires conseillent, ils ne gouvernent pas."

 education_college_fiscal_resistance:0 "Résistance fiscale"
 education_college_fiscal_resistance_desc:0 "Les conservateurs fiscaux s'opposent activement au coût public du collège universel, bloquant le processus de promulgation et obligeant le gouvernement à justifier ses engagements de dépenses."

 education_college_public_funded:0 "Engagement public"
 education_college_public_funded_desc:0 "Le gouvernement s'est engagé à absorber la totalité des coûts de l'enseignement supérieur universel, renforçant ainsi l'élan de la promulgation à des frais importants."

 education_college_meritocracy_debate:0 "Débat sur la méritocratie"
 education_college_meritocracy_debate_desc:0 "Le gouvernement a publiquement défendu l'accès universel contre les affirmations selon lesquelles il diluerait les normes académiques, changeant les termes du débat sur la promulgation."

 education_college_elite_carveout:0 "Elite Carveout offert"
 education_college_elite_carveout_desc:0 "Un carveout qui préserve les institutions privées d'élite aux côtés du système public a été proposé, ralentissant la mise en œuvre mais réduisant l'opposition riche."

 education_college_academic_endorsement:0 "Approbation académique"
 education_college_academic_endorsement_desc:0 "L'intelligentsia a publiquement soutenu le collège universel, prêtant l'autorité scientifique et organisé le soutien à l'effort de promulgation."

 education_college_elites_rebuked:0 "Elites repoussées"
 education_college_elites_rebuked_desc:0 "Des intérêts riches ont été publiquement contestés sur leurs arguments méritocratiques, embarrassant leur position mais aiguisant leur détermination."

 education_college_elites_appeased:0 "Les élites apaisées"
 education_college_elites_appeased_desc:0 "L'offre d'un carveout institutionnel d'élite a adouci l'opposition riche au collège universel."

 education_college_intelligentsia_engaged:0 "Intelligentsia engagés"
 education_college_intelligentsia_engaged_desc:0 "Les universitaires et les chercheurs plaident activement en faveur de l'enseignement supérieur universel en accordant une crédibilité intellectuelle à l'effort de promulgation."

 education_college_intelligentsia_sidelined:0 "Intelligentsia Sidelined"
 education_college_intelligentsia_sidelined_desc:0 "La décision de garder les universitaires en dehors du débat législatif a laissé l'intelligentsia frustrée et écartée du programme d'éducation du gouvernement."
