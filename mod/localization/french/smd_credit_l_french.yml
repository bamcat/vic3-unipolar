l_french:

 # ==========================================
 # THE DOLLAR 
 # ==========================================

 je_the_dollar:0 "Le dollar"
 je_the_dollar_reason:0 "Le dollar des États-Unis est la monnaie de réserve mondiale. [ROOT.GetCountry.GetName] exporte plus de crédit que n'importe quel autre pays — et ce faisant, détient une position de puissance financière extraordinaire.\n\n Lorsque les districts financiers d'autres pays ont besoin de crédit pour soutenir leurs opérations, ils se tournent vers les banques [ROOT.GetCountry.GetAdjective] pour les fournir. Tant que le dollar coule, les capitalistes de ces pays peuvent construire, investir et profiter. Si [ROOT.GetCountry.GetName] choisissait de limiter ce flux — par des sanctions, un embargo ou une contraction délibérée — les conséquences pour les marchés financiers étrangers seraient immédiates et sévères.\n\n@information! Le crédit à l'exportation n'est pas seulement un commerce. C'est l'exercice de la souveraineté monétaire sur les pays qui dépend de l'infrastructure financière [ROOT.GetCountry.GetAdjective]. Leurs quartiers financiers ont besoin de crédit. Si le prix du crédit augmente au-dessus du prix des titres, leurs investisseurs commencent à perdre de l'argent. Si le crédit cesse de couler, leurs banques doivent se brouiller pour produire suffisamment au pays, ce qui prend du temps."

 je_dollar_status_hegemonic_tt:0 "#bold Le dollar est hégémonique.#! [ROOT.GetCountry.GetName] exporte plus de #v 20 000#! unités de crédit. Les marchés financiers étrangers sont profondément intégrés à l'infrastructure bancaire [ROOT.GetCountry.GetAdjective]. L'effet de levier est considérable."
 je_dollar_status_stronger_tt:0 "#bold Le dollar est puissant.#! [ROOT.GetCountry.GetName] exporte plus de #v 10 000#! unités de crédit. Les marchés financiers étrangers sont profondément intégrés à l'infrastructure bancaire [ROOT.GetCountry.GetAdjective]. L'effet de levier est considérable."
 je_dollar_status_strong_tt:0 "#bold Le dollar est influent.#! [ROOT.GetCountry.GetName] exporte plus de #v 5 000#! unités de crédit. Les marchés financiers étrangers sont profondément intégrés à l'infrastructure bancaire [ROOT.GetCountry.GetAdjective]. L'effet de levier est considérable."
 je_dollar_status_moderate_tt:0 "#bold Le dollar est bien établi.#! [ROOT.GetCountry.GetName] exporte plus de #v 2 500#! unités de crédit. La dépendance étrangère à l'égard du crédit est réelle et croissante."
 je_dollar_status_marginal_tt:0 "#bold Le dollar émerge.#! [ROOT.GetCountry.GetName] exporte du crédit à l'étranger. Le rôle du dollar en tant que monnaie de réserve en est à ses débuts, mais les bases sont jetées."

 # ==========================================
 # THE RESERVE CURRENCY
 # ==========================================

 je_reserve_currency:0 "Monnaie de réserve"
 je_reserve_currency_reason:0 "[ROOT.GetCountry.GetName] exporte du crédit à l'échelle internationale, ce qui fait du secteur bancaire [ROOT.GetCountry.GetAdjective] un acteur important du système financier mondial.\n\n Lorsque les districts financiers d'autres pays ont besoin de crédit pour soutenir leurs opérations, ils puisent dans les banques [ROOT.GetCountry.GetAdjective]. Cela crée une forme de levier structurel : les pays qui importent des crédits de [ROOT.GetCountry.GetName] deviennent, dans une certaine mesure, dépendants du flux continu de ce crédit pour la santé de leurs secteurs financiers.\n\n@information! Les districts financiers des pays importateurs ont besoin de crédit pour fonctionner efficacement. Lorsque le prix du crédit augmente au-dessus du prix des titres, leurs investisseurs perdent de l'argent sur la construction et le développement. Une contraction soudaine du crédit - par le biais de sanctions ou d'embargo - obligerait ces pays à produire du crédit sur le plan intérieur, un processus plus lent et plus coûteux."

 je_reserve_status_strong_tt:0 "Le crédit #bold est largement échangé.#! Les exportations dépassent #v 5 000#! unités. Les marchés financiers étrangers se sont fortement appuyés sur l'offre bancaire [ROOT.GetCountry.GetAdjective]."
 je_reserve_status_moderate_tt:0 "#bold [ROOT.GetCountry.GetAdjective] Le crédit est actif à l'échelle internationale.#! Les exportations dépassent #v 2 500#! unités. Une part significative de l'activité financière étrangère dépend de l'offre [ROOT.GetCountry.GetAdjective]."
 je_reserve_status_marginal_tt:0 "#bold [ROOT.GetCountry.GetAdjective] le crédit entre sur les marchés internationaux.#! Les exportations dépassent #v 1 000#! unités. Le rôle est modeste mais croissant."

 # ==========================================
 # THE FINANCIAL SYSTEM — je_financial_system
 # ==========================================

 je_financial_system:0 "Le système financier"
 je_financial_system_reason:0 "Cette entrée de journal est entièrement facultative — vous n'avez pas besoin de vous engager avec le système de crédit et de valeurs mobilières pour jouer le jeu. Il est ici comme référence pour ceux qui veulent la comprendre.\n\n#bold Comment fonctionne le système#!\n\nLes banques commerciales produisent #bold le crédit#!. Les districts financiers achètent des crédits et, selon la méthode de production cotée en bourse, vendent des titres #bold#!. Les titres donnent aux investisseurs un bénéfice supplémentaire lorsqu'ils réinvestissent dans une nouvelle construction — mais seulement lorsque le prix des titres est supérieur au prix du crédit. Cela signifie qu'il y a un équilibre naturel que le marché cherche:\n\n• Lorsque #bold le crédit est bon marché#! par rapport aux titres, les profits des districts financiers et les investisseurs se construisent de façon plus agressive. La construction accélère dans toute l'économie.\n\n• Lorsque #bold les titres sont bon marché#! par rapport au crédit, les districts financiers perdent de l'argent en achetant du crédit qu'ils ne peuvent pas convertir avec profit. Les banques trouvent leur produit moins précieux. La construction ralentit.\n\n@information! La relation de prix entre crédit et titres est donc le signal clé à surveiller. Une bonne répartition — les titres au-dessus du crédit — signifie que votre secteur financier fonctionne comme prévu et que vos capitalistes reçoivent des rendements sur les investissements dans la construction.\n\n@warning! Si le crédit augmente au-dessus des titres, vos districts financiers fonctionnent à perte sur chaque unité qu'ils traitent. Les banques deviennent rentables, mais les investisseurs ralentissent leur activité et votre économie croît moins dynamiquement.\n\n#bold La Banque centrale#!\n\n Vous pouvez utiliser l'institution #bold Banque centrale#! pour influencer directement la production de titres. Investir dans la Banque centrale augmente l'offre de titres sur votre marché, ce qui fait baisser leur prix par rapport au crédit. Cela va #bold sous-cuter vos banques commerciales#!, qui trouvent leur crédit moins rentable à produire, mais il va #bold développer l'investissement industriel#! en gardant le crédit-titres diffusé favorablement pour vos capitalistes.\n\n C'est un compromis délibéré : l'investissement de la Banque centrale favorise la croissance industrielle au détriment de la rentabilité bancaire. Si ce compromis vaut la peine d'être fait dépend de votre stratégie économique."

 je_financial_credit_expensive_tt:0 "Le crédit se négocie au-dessus de son prix de base. Les banques commerciales sont rentables. Les districts financiers versent une prime de crédit qui leur impose des marges de production de titres. Les investisseurs peuvent ralentir leur activité de construction si l'écart devient défavorable."
 je_financial_securities_expensive_tt:0 "#bold Les valeurs mobilières se négocient au-dessus de leur prix de base.#! Les districts financiers sont rentables — ils convertissent le crédit en titres à une bonne marge. Les investisseurs reçoivent de bons rendements sur la construction. Les banques font face à une pression modeste, car leur produit est prix inférieur aux marchandises qu'elles nourrissent."
 je_financial_balanced_tt:0 "Le crédit et les valeurs mobilières négocient près de leurs prix de base. Le système financier est en équilibre — les banques sont légèrement rentables et les investisseurs obtiennent des rendements modérés."

 ### Great Recession

 je_subprime_mortgage_crisis:0 "Crise hypothécaire subprime"
 je_subprime_mortgage_crisis_reason:0 "[ROOT.GetCountry.GetAdjective] les institutions financières émettent et emballent les titres adossés à des prêts hypothécaires à l'échelle — en regroupant les prêts à l'habitation sous-prime en instruments vendus dans l'ensemble du système financier mondial. Les titres sont considérés comme sûrs. Ils ne sont pas en sécurité. Lorsque les hypothèques sous-jacentes commencent à faire défaut, chaque institution détenant ces instruments découvrira simultanément que leurs bilans sont construits sur du papier sans valeur.\n\n@warning! Si le prix des titres ne se corrige pas de façon significative avant l'échéance de la crise, le système bancaire [ROOT.GetCountry.GetAdjective] sera gelé — et le choc sera ressenti par toute économie ayant des liens substantiels avec [ROOT.GetCountry.GetName]."

 je_great_recession:0 "La grande récession"
 je_great_recession_reason:0 "Le système financier des États-Unis s'est effondré. Les titres adossés à des hypothèques, détenus par des banques à travers le monde, ont été révélés comme étant sans valeur. Les marchés du crédit ont gelé. Les banques ne se prêteront pas, encore moins aux entreprises. L'investissement s'est asséché. La construction a ralenti. La récession est mondiale.\n\n Le marché va corriger. Comme toujours. La question est de savoir combien de dommages sont faits avant qu'il ne le fasse."

 # Status descriptions
 subprime_je_danger_tt:0 "Le prix des titres n'a pas suffisamment baissé. [ROOT.GetCountry.GetAdjective] les titres adossés à des prêts hypothécaires sont toujours surévalués — le marché n'a pas encore cours dans le risque. Plus cela persiste, plus la correction éventuelle est catastrophique."
 subprime_je_safe_tt:0 "#bold Les titres ont chuté de plus de 35 % par rapport au prix de base.#! Le marché est en train de corriger. Si cela tient, l'accident peut être évité — ou du moins adouci."

 great_recession_je_usa_tt:0 "Le système bancaire [ROOT.GetCountry.GetAdjective] est en crise. La crise du crédit réduit considérablement le débit bancaire, gelant les investissements et la construction. La récession durera jusqu'à ce que le marché corrige — environ dix mois."
 great_recession_je_global_tt:0 "Les liens commerciaux substantiels entre [ROOT.GetCountry.GetName] et [SCOPE.sCountry('c:USA').GetName] ont transmis le choc financier. Les banques sont exposées à des instruments financiers [SCOPE.sCountry('c:USA').GetAdjective]. Le crédit est plus serré, l'investissement a ralenti et la récession est arrivée."

 # ==========================================
 # MODIFIERS
 # ==========================================

 great_recession_credit_crunch:0 "Croûte de crédit"
 great_recession_credit_crunch_desc:0 "Le système bancaire s'est saisi. Les banques refusent de prêter — aux entreprises, entre elles, à n'importe qui. Le crédit s'est évaporé. Les investissements se sont effondrés. La construction a ralenti. L'économie ne se rétablira pas tant que la confiance ne reviendra pas au système financier."
