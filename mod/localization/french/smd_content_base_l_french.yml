 great_polarization.1.d:0 "Les États-Unis entrent dans une nouvelle ère de polarisation politique, motivée par la fragmentation des médias, la politique de la guerre culturelle et la peur mutuelle entre les blocs idéologiques."
 great_polarization.1.f:0 "Chaque élection devient existentielle. Chaque scandale devient une preuve. Chaque tragédie devient une arme."
 great_polarization.1.a:0 "Le centre commence à craquer."

 great_polarization.2.t:0 "Tir de masse à motivation politique"
 great_polarization.2.d:0 "Une fusillade de masse liée à la rhétorique politique extrémiste a choqué le pays. Les factions rivales se disputent immédiatement la responsabilité, la sécurité, les libertés civiles et l'idéologie."
 great_polarization.2.f:0 "Les morts sont en deuil. Le récit est combattu avant le début des funérailles."
 great_polarization.2.a:0 "L'indignation alimente la fracture."
 great_polarization.2.b:0 "Cherchez une réponse bipartite sérieuse."

 great_polarization.3.t:0 "Tentative d'assassinat"
 great_polarization.3.d:0 "Une tentative d'assassinat d'un personnage politique a fait craindre que la violence politique ne se normalise."
 great_polarization.3.f:0 "Le tir a raté sa cible, mais a frappé la république."
 great_polarization.3.a:0 "Le pays recule."
 great_polarization.3.b:0 "Élargir la sécurité de protection."

 great_polarization.4.t:0 "Outrage algorithmique"
 great_polarization.4.d:0 "Les plateformes de médias sociaux ont amplifié l'indignation politique, exposant des millions à des contenus radicaux, des réseaux de conspiration et une contre-mobilisation motivée par l'identité."
 great_polarization.4.f:0 "L'alimentation ne convainc pas. Ça s'aggrave."
 great_polarization.4.a:0 "La machine d'indignation accélère."
 great_polarization.4.b:0 "Plates-formes à pression modérées."

 great_polarization.5.t:0 "Une vague d'exposition"
 great_polarization.5.d:0 "Une vague d'allégations publiques contre des personnalités puissantes a déclenché un jugement national sur les abus, le sexe et l'hypocrisie institutionnelle."
 great_polarization.5.f:0 "Ce qui avait été chuchoté est maintenant consultable."
 great_polarization.5.a:0 "Les comptes se répandent."
 great_polarization.5.b:0 "Mettre en place des mécanismes institutionnels de responsabilisation."

 great_polarization.6.t:0 "Minorités ciblées"
 great_polarization.6.d:0 "Un regain d'hostilité à l'égard des communautés minoritaires a déclenché des manifestations, des contre-protes et un nouveau débat sur le racisme, l'identité et l'appartenance nationale."
 great_polarization.6.f:0 "Pour certains, c'est un contrecoup. Pour les autres, c'est la survie."
 great_polarization.6.a:0 "Les rues se remplissent encore."
 great_polarization.6.b:0 "Condamnez le contrecoup et abaissez la température."

 great_polarization.20.t:0 "Les chutes de température"
 great_polarization.20.d:0 "La polarisation n'a pas disparu, mais la spirale la plus dangereuse a été interrompue. Les institutions politiques ont retrouvé une certaine légitimité."
 great_polarization.20.f:0 "Une république survit non pas parce que ses citoyens sont d'accord, mais parce que suffisamment d'entre eux acceptent de perdre."
 great_polarization.20.a:0 "L'union dure."

 great_polarization.21.t:0 "Le partage"
 great_polarization.21.d:0 "La crise immédiate n'a pas explosé dans la guerre civile, mais la polarisation s'est intégrée dans la vie politique américaine."
 great_polarization.21.f:0 "La fièvre ne s'est pas rompue. Elle est devenue chronique."
 great_polarization.21.a:0 "La nouvelle normale."

