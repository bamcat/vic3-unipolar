 great_polarization.130.t:0 "Lead Blue America ?"
 great_polarization.130.d:0 "Avec les États-Unis fracturés, le caractère libéral ou centre-gauche de l'administration le place le plus près de Blue America. Vous pouvez continuer la guerre en tant qu'Amérique bleue ou rester avec les restes des États-Unis."
 great_polarization.130.f:0 "Un gouvernement peut revendiquer la continuité, mais le pouvoir suit les institutions qui obéissent encore."
 great_polarization.130.a:0 "Passez à Blue America."
 great_polarization.130.b:0 "Restez comme les États-Unis."

 great_polarization.131.t:0 "Mener l'Amérique Rouge ?"
 great_polarization.131.d:0 "Avec les États-Unis fracturés, le caractère de droite de l'administration le place le plus près de l'Amérique rouge. Vous pouvez continuer la guerre en tant qu'Amérique Rouge ou rester avec les restes des États-Unis."
 great_polarization.131.f:0 "Le drapeau est de la même forme, mais le pays en dessous a changé."
 great_polarization.131.a:0 "Passez en Amérique Rouge."
 great_polarization.131.b:0 "Restez comme les États-Unis."

 great_polarization_switch_blue_tt:0 "Vous changerez de pays en #bold Amérique bleue#!."
 great_polarization_switch_red_tt:0 "Vous changerez de pays en #bold Red America#!."
 great_polarization_stay_usa_tt:0 "Vous resterez comme les États-Unis."

 great_polarization_complete_header:0 "La grande polarisation se termine si la crise est désamorcée, ou si les États-Unis s'effondrent dans la guerre civile."
 
 great_polarization.38.t:0 "États-Unis Capitole assiégé"
 great_polarization.38.d:0 "Une foule a envahi le Capitole des États-Unis après une élection amèrement contestée, choquant le pays et a approfondi les craintes que le conflit politique rompe avec les restrictions constitutionnelles."
 great_polarization.38.f:0 "La rotonde devient un champ de bataille de symboles."
 great_polarization.38.a:0 "La république tremble."
 great_polarization.38.b:0 "Condamner l'attaque et reconstruire la confiance."
 
 ## other western countries
 
 je_rise_of_the_right:0 "La montée de la droite"
 je_rise_of_the_right_reason:0 "Partout en Occident, les mouvements populistes de droite gagnent en force grâce à la fragmentation des médias, aux réactions migratoires, à la politique de la guerre culturelle et au ressentiment contre les établissements. Jusqu'en 2035, les mouvements de droite sont plus forts et les dirigeants populistes de droite sont plus susceptibles d'apparaître."

 rise_of_the_right_status_baseline:0 "Les mouvements de droite gagnent en force."
 rise_of_the_right_status_strong:0 "Une poussée populiste de droite remodele la politique nationale."
 rise_of_the_right_completion_header:0 "Cette vague diminue après 2035."
 rise_of_the_right_ends_2035_tt:0 "La montée de la droite se termine après #bold le 1er janvier 2035#!."
 rise_of_the_right_spawnrate_tt:0 "Le taux de fraye du chef populiste de droite est augmenté. Les poids exacts de géniteurs sont manipulés manuellement dans les fichiers de géniteurs de l'idéologie/caractère."

 rise_of_the_right.1.t:0 "La montée de la droite"
 rise_of_the_right.1.d:0 "Un nouveau courant populiste de droite est entré dans la politique nationale. Il tire sa force de la méfiance à l'égard des institutions, de la colère à l'égard des élites, des réactions culturelles et d'un environnement médiatique fragmenté."
 rise_of_the_right.1.f:0 "Les vieux partis tiennent toujours les bureaux. La nouvelle politique apprend à tenir la foule."
 rise_of_the_right.1.a:0 "Le centre politique n'est plus sûr."

 rise_of_the_right.10.t:0 "Anger algorithmique"
 rise_of_the_right.10.d:0 "Les réseaux politiques en ligne ont amplifié l'indignation anti-établissement, donnant aux mouvements populistes de droite de nouvelles façons d'organiser en dehors des partis traditionnels."
 rise_of_the_right.10.f:0 "Un repas devient un rallye. Un grief devient une plateforme."
 rise_of_the_right.10.a:0 "L'indignation se répand."
 rise_of_the_right.10.b:0 "Reculez dans les institutions civiques."

 rise_of_the_right.11.t:0 "Retour en arrière"
 rise_of_the_right.11.d:0 "La colère suscitée par l'immigration, l'intégration et l'identité nationale a renforcé les mouvements de droite."
 rise_of_the_right.11.f:0 "La frontière devient un symbole pour toute crainte que l'ancien ordre ne puisse répondre."
 rise_of_the_right.11.a:0 "Le choc se développe."
 rise_of_the_right.11.b:0 "Éliminer le débat."

 rise_of_the_right.12.t:0 "Les populistes traversent"
 rise_of_the_right.12.d:0 "Une faction populiste de droite a brisé l'ancien système des partis, obligeant les partis traditionnels à répondre à son langage et à son ordre du jour."
 rise_of_the_right.12.f:0 "Ils étaient à l'extérieur. Maintenant la chambre est construite autour d'eux."
 rise_of_the_right.12.a:0 "Les bonds."
 rise_of_the_right.12.b:0 "Reconstruisez le centre."

 rise_of_the_right.13.t:0 "Politique de rue"
 rise_of_the_right.13.d:0 "Les manifestations, les contre-manifestations et les confrontations virales ont approfondi le sentiment que la politique a quitté le Parlement et est partie dans la rue."
 rise_of_the_right.13.f:0 "Le chant est politique sous sa forme larvaire."
 rise_of_the_right.13.a:0 "Les rues se radicalisent."
 rise_of_the_right.13.b:0 "Refroidir la température."

 rise_of_the_right_baseline:0 "La montée de la droite"
 rise_of_the_right_baseline_desc:0 "Les mouvements de droite gagnent en force dans la politique nationale."

 rise_of_the_right_populist_surge:0 "Surge populiste droit"
 rise_of_the_right_populist_surge_desc:0 "Les populistes de droite remodelent le paysage politique."

 rise_of_the_right_migration_backlash:0 "Retour en arrière"
 rise_of_the_right_migration_backlash_desc:0 "L'immigration et l'identité nationale sont devenues les moteurs de la mobilisation politique."

 rise_of_the_right_online_radicalization:0 "Anger algorithmique"
 rise_of_the_right_online_radicalization_desc:0 "L'indignation en ligne accélère la mobilisation politique de droite."

 rise_of_the_right_establishment_response:0 "Réponse de l'établissement"
 rise_of_the_right_establishment_response_desc:0 "Les institutions principales tentent d'absorber ou de désamorcer la poussée populiste."

 rise_of_the_right_populist_leader_spawn_tooltip_modifier:0 "Ouverture populiste droite"
 rise_of_the_right_populist_leader_spawn_tooltip_modifier_desc:0 "Le taux de fraye du chef populiste de droite est augmenté. Les poids réels de l'idéologie sont manipulés manuellement."
 
