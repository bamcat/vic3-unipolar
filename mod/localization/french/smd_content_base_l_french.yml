 second_american_civil_war_red_status:0 "L'Amérique rouge cherche à consolider l'Amérique conservatrice tout en remportant des États dissidents."
 second_american_civil_war_complete_header:0 "La guerre civile prend fin lorsque l'Amérique rouge ou l'Amérique bleue est détruite, annexée ou subordonnée."
 second_american_civil_war_blue_defeated_tt:0 "L'Amérique bleue n'existe plus."
