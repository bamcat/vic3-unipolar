 je_the_great_polarization:0 "La grande polarisation"
 je_the_great_polarization_reason:0 "La politique américaine est entrée dans une période de polarisation croissante. \n---------------------------------------------                                                                                                                                                                                                                                         "
 great_polarization_status_right_president:0 "Une présidence de droite stimule les mouvements libéraux, sociaux-démocrates, socialistes, communistes et des droits des minorités."
 great_polarization_status_left_president:0 "Une présidence de gauche stimule les mouvements conservateurs, libertaires, traditionalistes, fascistes et à majorité religieuse."
 great_polarization_status_unstable_center:0 "Un centre fragile lutte pour contenir la polarisation."
