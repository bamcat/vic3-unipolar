 great_polarization_right_wing_president:0 "Présidence de droite"
 great_polarization_right_wing_president_desc:0 "Un président de droite a stimulé les mouvements d'opposition libéral, social-démocrate, socialiste, communiste et des droits des minorités."

 great_polarization_left_wing_president:0 "Présidence de gauche"
 great_polarization_left_wing_president_desc:0 "Un président de gauche a dynamisé les mouvements d'opposition conservateurs, libertaires, traditionalistes, fascistes et à majorité religieuse."

 great_polarization_divided_media:0 "Polarisation intégrée"
 great_polarization_divided_media_desc:0 "L'environnement médiatique maintient les camps politiques isolés les uns des autres."

 great_polarization_attempted_assassination:0 "Tentative d'assassinat"
 great_polarization_attempted_assassination_desc:0 "La violence politique a ébranlé la confiance du public."

 great_polarization_mass_shooting_aftermath:0 "Tir de masse à motivation politique"
 great_polarization_mass_shooting_aftermath_desc:0 "Un massacre politique a aggravé le conflit social."

 great_polarization_reform_concessions:0 "Concessions de réforme"
 great_polarization_reform_concessions_desc:0 "Une réforme sérieuse a réduit les tensions politiques."

 great_polarization_security_crackdown:0 "Sécurisation"
 great_polarization_security_crackdown_desc:0 "Les mesures de sécurité élargies ont accru la pression de l'État tout en risquant de provoquer des contrecoups."

 great_polarization_online_radicalization:0 "Radicalisation en ligne"
 great_polarization_online_radicalization_desc:0 "Les plateformes sociales accélèrent la mobilisation politique et l'indignation."

 great_polarization_minorities_targeted:0 "Minorités ciblées"
 great_polarization_minorities_targeted_desc:0 "Les communautés minoritaires font face à une hostilité et à une organisation accrues."

 great_polarization_metoo_mobilization:0 "Reckoning public"
 great_polarization_metoo_mobilization_desc:0 "Une vague d'exposition publique a mobilisé des mouvements libéraux et radicaux."

 second_american_civil_war_outbreak:0 "Deuxième guerre civile américaine"
 second_american_civil_war_outbreak_desc:0 "Les États-Unis se sont effondrés dans un conflit révolutionnaire."
 
