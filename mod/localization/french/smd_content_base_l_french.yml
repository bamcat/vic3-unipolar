 great_polarization_civil_war_tt:0 "La Seconde Guerre Civile américaine a commencé."
 je_second_american_civil_war:0 "Deuxième guerre civile américaine"
 je_second_american_civil_war_reason:0 "Les États-Unis se sont fracturés en gouvernements rivaux. L'Amérique rouge et l'Amérique bleue sont les principaux combattants, tandis que les États en fuite peuvent être courtisés par des propositions diplomatiques."
 second_american_civil_war_status:0 "Le syndicat s'est brisé."
