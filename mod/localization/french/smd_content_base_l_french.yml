 # transit rights
 
 je_transit_rights: "Sans littoral !"
 je_transit_rights_reason: "[ROOT.GetCountry.GetName] n'a pas de littoral. L'accès aux marchés internationaux dépend entièrement de la bonne volonté des pays voisins. La conclusion d'un accord sur les droits de transit avec au moins un d'entre eux est essentielle pour le commerce et la flexibilité stratégique."
 secure_transit_rights_treaty:0 "Signer un traité sur les droits de transit avec tout pays voisin sans littoral."
 # ==========================================
 # JOURNAL ENTRY
 # ==========================================
 
 je_covid_pandemic: "Pandémie COVID-19"
 je_covid_pandemic_reason: "Un nouveau coronavirus respiratoire est apparu dans [ROOT.GetCountry.GetName] et se propage rapidement dans le monde entier. COVID-19 se propage plus vite que n'importe quel agent pathogène dans la mémoire vivante, exploitant les réseaux denses de commerce et de voyage qui lient le monde moderne ensemble. La mortalité est concentrée parmi les personnes âgées et les personnes immunodéprimées, mais sa simple portée menace d'écraser les systèmes de santé dans chaque pays qu'elle touche.\n\nUtiliser la réponse #bold COVID-19#! décision d'établir une politique. Les verrous ralentissent l'expansion, mais écrasent l'économie. Les masques et les détachants sont moins efficaces mais plus durables. Ne rien faire est aussi un choix — on se souviendra de l'électorat et des morts."
 
 # ==========================================
 # covid.1 — PANDEMIC ARRIVES
 # ==========================================
 
 covid.1.t: "Un nouveau coronavirus"
 covid.1.d: "Un groupe de cas inhabituels de pneumonie a été signalé dans [SCOPE.sState('plague_origin_state').GetName], [ROOT.GetCountry.GetName]. L'analyse préliminaire effectuée par [ROOT.GetCountry.GetAdjective] des autorités sanitaires suggère un coronavirus jusque-là inconnu, qui se propage entre les humains, avec une période d'incubation suffisamment longue pour que les porteurs soient contagieux avant de savoir qu'ils sont malades.\n\nL'Organisation mondiale de la santé a été avisée. Que cela demeure une épidémie locale ou qu'il devienne quelque chose de plus dépend des décisions prises au cours des prochaines semaines."
 covid.1.f: "Un nouveau pathogène. Encore."
 covid.1.a: "Informer l'OMS et commencer à rechercher les contacts"
 
 # ==========================================
 # covid.2 — SPREAD
 # ==========================================
 
 covid.2.t: "COVID-19 atteint [ROOT.GetCountry.GetName]"
 covid.2.d: "Des cas de coronavirus nouveau identifiés pour la première fois dans [SCOPE.sCountry('plague_originator_country').GetName] ont été confirmés dans [ROOT.GetCountry.GetName]. Le virus est arrivé — par un voyageur, une route commerciale, ou simplement les courants invisibles d'un monde connecté.\n\n[ROOT.GetCountry.GetAdjective] Les autorités sanitaires activent les protocoles d'intervention en cas de pandémie. Utilisez la réponse de #bold COVID-19 pour établir la politique."
 covid.2.f: "C'était juste une question de temps."
 covid.2.a: "Activer les protocoles pandémiques"
 
 # ==========================================
 # covid.3 — SUBSEQUENT WAVES
 # ==========================================
 
 covid.3.t: "La variante Omicron"
 covid.3.d: "Une nouvelle variante a provoqué une nouvelle vague d'infections à COVID-19. Les autorités sanitaires réévaluent les protocoles de confinement."
 covid.3.f: "Le virus est toujours avec nous."
 
 # ==========================================
 # covid.4 — NOTIFICATION TO OTHER PLAYERS
 # ==========================================
 
 covid.4.t: "Le nouveau virus de Wuhan, Chine"
 covid.4.a: "Suivre de près la situation"
 
 # ==========================================
 # covid.5 — RESPONSE CHOICE
 # ==========================================
 
 covid.5.t: "COVID-19 Politique de réponse"
 covid.5.d: "Comment [ROOT.GetCountry.GetName] devrait-il réagir à la pandémie? Le choix définira le paysage économique et social des prochaines années."
 covid.5.f: "Il n'y a pas de bonnes options. Seulement des compromis."
 covid.5.a: "Fermeture complète — fermer les entreprises, restreindre la circulation"
 covid.5.b: "Mandats des masques et directives de distanciation sociale"
 covid.5.c: "Maintenir l'économie ouverte — priorité à la reprise"
 
 # ==========================================
 # covid.7 — WAR SUPPORT
 # ==========================================
 
 covid.7.t: "La pandémie sous-tend l'effort de guerre"
 covid.7.d: "Avec la population de COVID-19 qui ravage [ROOT.GetCountry.GetName], [SCOPE.gsInterestGroup('pacifist_ig').GetName], dirigée par [SCOPE.sCharacter('pacifist_leader').GetFullName], se demande si un pays qui lutte contre une pandémie peut soutenir une guerre simultanément. La population est épuisée. Les hôpitaux de campagne sont en concurrence avec la logistique de première ligne pour les ressources."
 covid.7.f: "Combattre le virus ou combattre l'ennemi. Faire les deux est difficile."
 covid.7.a: "La guerre continue — le virus ne change pas"
 covid.7.b: "Utiliser les messages de santé publique pour maintenir le moral"
 covid.7.c: "Supprime le récit défaitiste"
 
 # ==========================================
 # covid.8 — POVERTY AND EVICTIONS
 # ==========================================
 
 covid.8.t: "Le bilan économique de la pandémie"
 covid.8.d: "La pandémie a coûté des milliers de travailleurs [ROOT.GetCountry.GetAdjective] leur emploi, et dans [SCOPE.sState('plague_poverty_state').GetName], le chômage a dépassé 20 %. Les familles ne peuvent pas payer de loyer. Les propriétaires, soutenus par [SCOPE.gsInterestGroup('landowner_ig').GetName], font pression pour obtenir le droit d'expulsion. La pauvreté se concentre dans les zones déjà les plus durement touchées par le virus."
 covid.8.f: "Une pandémie au sein de la pandémie."
 covid.8.a: "Imposer un moratoire sur le gel des loyers et les expulsions"
 covid.8.b: "Développement de la sécurité sociale et des prestations de chômage"
 covid.8.c: "Le marché s'arrangera"
 
 # ==========================================
 # covid.9 — ANTI-MASK RESISTANCE
 # ==========================================
 
 covid.9.t: "Manifestations anti-choc"
 covid.9.d: "[SCOPE.gsInterestGroup('anti_mask_ig').GetName], dirigé par [SCOPE.sCharacter('anti_mask_ig_leader').GetFullName], a organisé des manifestations de masse contre les restrictions à la pandémie de [ROOT.GetCountry.GetName]. Leur position : les mandats de verrouillage et de masques sont une atteinte au gouvernement, les dommages économiques sont plus importants que le risque pour la santé, et les citoyens ont le droit de faire leurs propres choix.\n\n Les manifestations se multiplient. Comment [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName] répond va créer un précédent."
 covid.9.f: "Des masques. La colline qu'ils ont choisie."
 covid.9.a: "Tenir ferme — les restrictions restent"
 covid.9.b: "Renoncer — lever les restrictions"
 covid.9.c: "Réplique scientifique de la Commission et campagnes de santé publique"
 
 # ==========================================
 # DECISION
 # ==========================================
 
 covid_response: "COVID-19 Réponse"
 covid_response_desc: "Définir la politique de [ROOT.GetCountry.GetName] pour gérer la pandémie de COVID-19. Cette décision peut être prise tous les six mois pour adapter la politique à mesure que la situation évolue."
 
