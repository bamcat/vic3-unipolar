 great_polarization.1.t:0 "La grande polarisation"
 great_polarization.1.d:0 "Les États-Unis entrent dans une nouvelle ère de polarisation politique, motivée par la fragmentation des médias, la politique de la guerre culturelle et la peur mutuelle entre les blocs idéologiques."
 great_polarization.1.f:0 "Chaque élection devient existentielle. Chaque scandale devient une preuve. Chaque tragédie devient une arme."
 great_polarization.1.a:0 "Le centre commence à craquer."
 great_polarization.30.t:0 "Le meurtre de George Floyd"
 great_polarization.30.d:0 "Le meurtre de George Floyd par la police a déclenché une vague de protestation à l'échelle nationale, avec des demandes de responsabilisation, de réforme de la police et de justice raciale."
 great_polarization.30.f:0 "La vidéo ne reste pas locale. Il devient un acte d'accusation national."
 great_polarization.30.a:0 "Les rues éclatent."
 great_polarization.30.b:0 "Promets une réforme sérieuse."
 great_polarization.31.t:0 "CHOP / CHAZ"
 great_polarization.31.d:0 "Une zone de protestation occupée s'est formée à Seattle, devenant un symbole national à la fois de l'activisme antipolice et des craintes de retraite de l'État."
 great_polarization.31.f:0 "Pour ses partisans, c'est l'autonomie communautaire. Pour ses adversaires, il s'effondre en miniature."
 great_polarization.31.a:0 "Laissez l'écart jouer."
 great_polarization.31.b:0 "Dégagez la zone."
 great_polarization.32.t:0 "Tentative d'assassinat à Butler"
 great_polarization.32.d:0 "Une tentative d'assassinat de Donald Trump lors d'un rassemblement à Butler en Pennsylvanie a intensifié les craintes de violence politique et de vengeance."
 great_polarization.32.f:0 "L'image voyage plus vite que les faits."
 great_polarization.32.a:0 "Le bon rassemblement en colère."
 great_polarization.32.b:0 "Appel au calme national."
 great_polarization.33.t:0 "Pas de rois"
 great_polarization.33.d:0 "Des manifestations de masse sous le slogan « Pas de Rois » ont rempli les rues à travers le pays, encadrées par des partisans comme une défense de la démocratie et par des opposants comme une résistance déstabilisatrice."
 great_polarization.33.f:0 "La foule chante contre la monarchie dans une république qui craint d'avoir oublié la différence."
 great_polarization.33.a:0 "Le mouvement se répand."
 great_polarization.33.b:0 "Désamorcez la confrontation."
 great_polarization.34.t:0 "Les législateurs du Minnesota ciblés"
 great_polarization.34.d:0 "Les tirs visant les législateurs de l'État du Minnesota ont approfondi la peur nationale que les différends politiques se propagent dans la violence organisée."
 great_polarization.34.f:0 "Une porte devient une ligne de front."
 great_polarization.34.a:0 "La sécurité devient politique."
 great_polarization.34.b:0 "Condamner la violence politique dans tous les domaines."
 great_polarization.35.t:0 "Charlie Kirk Assassiné"
 great_polarization.35.d:0 "L'assassinat de Charlie Kirk lors d'un événement public est devenu un point d'éclair dans l'escalade de la crise politique américaine."
 great_polarization.35.f:0 "Un micro tombe silencieux ; un mouvement s'élargit."
 great_polarization.35.a:0 "La droite radicalise."
 great_polarization.35.b:0 "Condamner le meurtre et baisser la température."
 great_polarization.36.t:0 "ICE Shootings"
 great_polarization.36.d:0 "Des fusillades meurtrières impliquant des agents d'immigration fédéraux ont déclenché des protestations contre l'ICE, l'indignation nationale et des arguments féroces contre le pouvoir fédéral."
 great_polarization.36.f:0 "Le badge devient l'argument."
 great_polarization.36.a:0 "Les manifestations se sont répandues."
 great_polarization.36.b:0 "Suspendre les opérations et enquêter."
 great_polarization.37.t:0 "Loi sur les droits de vote Gutted"
 great_polarization.37.d:0 "Une décision de la Cour suprême a considérablement affaibli la Loi sur les droits de vote, faisant état d'accusations selon lesquelles le pouvoir de vote des minorités serait démantelé avant les élections de 2026."
 great_polarization.37.f:0 "La cour parle dans la doctrine. Le pays entend le pouvoir."
 great_polarization.37.a:0 "La confiance s'effondre."
 great_polarization.37.b:0 "Poursuivre la législation sur les droits de vote."
 great_polarization.100.t:0 "Deuxième guerre civile américaine"
 great_polarization.100.d:0 "Une crise révolutionnaire a brisé les États-Unis. L'autorité fédérale est contestée et les factions armées commencent à transformer le pays en gouvernements rivaux."
 great_polarization.100.f:0 "La première guerre civile a demandé si l'union pouvait survivre. La seconde demande ce qu'est même l'union."
 great_polarization.100.a:0 "Les fractures syndicales."
 great_polarization.120.t:0 "Une offre de Blue America"
 great_polarization.120.d:0 "Blue America offre reconnaissance, protection et coopération en temps de guerre en échange de son adhésion à la guerre civile."
