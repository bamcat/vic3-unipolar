 mdw_peril_bar:0 "Commandant Peril"
 mdw_peril_bar_desc:0 "Opération Peril: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#!"
 
 mdw_bar_commander_active_tt:0 "Opérations militaires actives [ROOT.GetCountry.GetAdjective]"
 mdw_bar_multiple_states_tt:0 "Plusieurs États détenteurs de cartels — [ROOT.GetCountry.GetAdjective] les opérations sont éparpillées"
 mdw_bar_us_aid_tt:0 "[SCOPE.sCountry('c:USA').GetAdjective] L'assistance militaire fournit des services de renseignement et un soutien logistique"
 mdw_bar_excess_authority_tt:0 "Une forte capacité d'État accélère la campagne"
 mdw_bar_legitimacy_tt:0 "Un soutien public élevé maintient le moral militaire"
 mdw_bar_good_commander_tt:0 "La compétence tactique du commandant accélère les opérations"
 mdw_bar_at_war_tt:0 "Les ressources militaires sont détournées vers une guerre active"
 mdw_bar_turmoil_tt:0 "Des turbulences nationales élevées empêchent le [ROOT.GetCountry.GetAdjective] Campagne"
 mdw_peril_base_tt:0 "Les opérations soutenues sur le territoire des cartels présentent un risque constant"
 mdw_peril_multiple_states_tt:0 "L'exploitation sur de nombreux fronts accroît l'exposition du commandant"
 mdw_peril_us_aid_tt:0 "[SCOPE.sCountry('c:USA').GetAdjective] Le renseignement réduit la capacité des cartels de cibler le commandant"
 mdw_peril_cautious_tt:0 "L'approche prudente du commandant consiste à réduire les risques personnels"
 
 # ==========================================
 # EVENTS
 # ==========================================
 
 # mdw_events.1 — War Declared
 mdw_events.1.t:0 "[ROOT.GetCountry.GetName] Déclare la guerre sur les cartes"
 mdw_events.1.d:0 "Après des années d'expansion rampante du cartel et de demi-mesures échouées, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] Le gouvernement de [ROOT.GetCountry.GetRuler.GetLastName] a officiellement engagé l'armée [ROOT.GetCountry.GetAdjective] dans une campagne contre les réseaux de narco. La déclaration est importante, non seulement sur le plan opérationnel, mais aussi symbolique. L'état [ROOT.GetCountry.GetAdjective] affirme qu'il n'acceptera pas le statu quo.\n\n Les cartels répondront. Les militaires doivent être prêts."
 mdw_events.1.f:0 "L'État a tracé sa ligne."
 mdw_events.1.a:0 "[ROOT.GetCountry.GetName] récupérera ce qui lui appartient"
 
 # mdw_events.2 — Commander Selection
 mdw_events.2.t:0 "Qui dirigera la campagne?"
 mdw_events.2.d:0 "La déclaration a été faite. Maintenant, un commandant doit être choisi — celui qui est disposé à se battre dans un territoire tenu par les cartels, où l'ennemi connaît le terrain, a des informateurs locaux et est disposé à faire des choses que l'armée ne peut pas faire. Ce sera un sale combat."
 mdw_events.2.f:0 "Le bon général change tout."
 mdw_events.2.a:0 "Déployer [SCOPE.sCharacter('mdw_commander_1').GetFullName]"
 mdw_events.2.b:0 "Déployer [SCOPE.sCharacter('mdw_commander_2').GetFullName]"
 mdw_events.2.c:0 "Déployer [SCOPE.sCharacter('mdw_commander_3').GetFullName]"
 
 # mdw_events.3 — Combat Patrol
 mdw_events.3.t:0 "Contact dans [SCOPE.sState('mdw_active_state').GetName]"
 mdw_events.3.d:0 "[SCOPE.sCharacter('mdw_commander').GetFullName] signale une série d'engagements avec les forces du cartel dans [SCOPE.sState('mdw_active_state').GetName]. Les cartels se battent pour maintenir leur territoire, en utilisant des barrages routiers, des tireurs d'élite et des engins piégés sur des approches de bastions connus. Des progrès sont réalisés, mais le coût en temps et en ressources est important."
 mdw_events.3.f:0 "Chaque kilomètre de route dégagé est un kilomètre que les cartels ne peuvent utiliser."
 mdw_events.3.a:0 "Poussez fort — prenez le territoire rapidement"
 mdw_events.3.b:0 "Avancer méthodiquement — sécuriser chaque position avant de passer à"
 
 # mdw_events.4 — State Cleared
 mdw_events.4.t:0 "[SCOPE.sState('mdw_active_state').GetName] A été effacé"
 mdw_events.4.d:0 "Un succès opérationnel significatif : [SCOPE.sCharacter('mdw_commander').GetFullName] signale que les forces du cartel dans [SCOPE.sState('mdw_active_state').GetName] ont été brisées. Leur structure de commandement a été démantelée, leur logistique coupée, et leurs chiffres clés sont morts ou en détention. [ROOT.GetCountry.GetAdjective] Les forces d'occupation militaire se déplacent pour tenir le sol.\n\n Un État est de retour sous contrôle gouvernemental. Encore."
 mdw_events.4.f:0 "La carte change."
 mdw_events.4.a:0 "Passer à la suivante — maintenir l'élan"
 
 # mdw_events.5 — Ambush
 mdw_events.5.t:0 "La colonne d'ambush — [SCOPE.sCharacter('mdw_commander').GetFullName] est attaquée"
 mdw_events.5.d:0 "Des hommes armés du cartel ont embusqué une colonne militaire [ROOT.GetCountry.GetAdjective] dans [SCOPE.sState('mdw_active_state').GetName]. L'attaque a été coordonnée — de multiples positions de tir, des itinéraires de retrait pré-planifiés et la connaissance des mouvements de la colonne qui suggèrent un informateur à l'intérieur de la chaîne de commandement militaire [ROOT.GetCountry.GetAdjective]. Il y a des victimes. [SCOPE.sCharacter('mdw_commander').GetFullName] gère l'engagement."
 mdw_events.5.f:0 "Les cartels se battent comme une armée quand ils le veulent."
 mdw_events.5.a:0 "Combattez - les et les détruisez"
 mdw_events.5.b:0 "Briser le contact — regrouper et balayer plus tard"
 
 # mdw_events.6 — Commander Under Fire
 mdw_events.6.t:0 "[SCOPE.sCharacter('mdw_commander').GetFullName] Est en danger"
 mdw_events.6.d:0 "Le renseignement a confirmé ce que les rapports de terrain suggèrent : les cartels ont identifié [SCOPE.sCharacter('mdw_commander').GetFullName] comme une cible prioritaire. Une équipe d'assassinat professionnelle a été chargée contre eux. La menace est crédible. Ramener le commandant à [ROOT.GetCountry.GetCapital.GetCityHubName] réduirait le risque, mais arrêterait l'élan de la campagne à un moment critique."
 mdw_events.6.f:0 "Les cartels étudient leurs ennemis."
 mdw_events.6.a:0 "Tirer [SCOPE.sCharacter('mdw_commander').GetFullName] en arrière — la campagne peut attendre"
 mdw_events.6.b:0 "Appuyez sur — [SCOPE.sCharacter('mdw_commander').GetFullName] accepte le risque"
 
 # mdw_events.10 — Victory
 mdw_events.10.t:0 "La guerre de la drogue est gagnée"
 mdw_events.10.d:0 "[SCOPE.sCharacter('mdw_commander').GetFullName] envoie le rapport opérationnel final: le contrôle territorial de l'entente a été rompu à travers [ROOT.GetCountry.GetName]. Les derniers bastions ont été dégagés. L'occupation militaire est en place. Les réseaux de cartels existent encore — ils se reconstitueront au fil des ans sous une forme affaiblie — mais l'État [ROOT.GetCountry.GetAdjective] a réaffirmé sa souveraineté sur son propre territoire.\n\n Ce n'était pas inévitable. Elle exigeait la volonté politique, l'engagement militaire et, à bien des égards, la chance. Ce que [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName] a gagné, c'est le temps — le temps d'aborder les conditions qui ont rendu les cartels possibles en premier lieu."
 mdw_events.10.f:0 "[ROOT.GetCountry.GetName] a récupéré ce qui lui appartient."
 mdw_events.10.a:0 "Une victoire dure — et un commencement"
 
 # mdw_events.11 — Commander Killed
 mdw_events.11.t:0 "[SCOPE.sCharacter('mdw_commander').GetFullName] A été tué"
 mdw_events.11.d:0 "Le pire est arrivé. L'opération d'assassinat du cartel a réussi. [SCOPE.sCharacter('mdw_commander').GetFullName] est mort — tué dans une attaque que les services de sécurité [ROOT.GetCountry.GetAdjective] n'ont pas réussi à prévenir malgré des avertissements crédibles. Les nouvelles sont publiques dans les heures. Les cartels célèbrent ouvertement les rues des villes qu'ils contrôlent.\n\n La campagne n'est pas terminée. Mais il a subi un coup qui prendra des mois pour se remettre. Un nouveau commandant doit être trouvé — et les cartels utiliseront le temps pour consolider."
 mdw_events.11.f:0 "Les cartels ont encore frappé leur coup le plus important."
 mdw_events.11.a:0 "Nous ne serons pas brisés par cela — le combat continue"
 
 # mdw_events.20 — US Aid
 mdw_events.20.t:0 "[SCOPE.sCountry('c:USA').GetName] a signé un accord d'assistance militaire"
 mdw_events.20.d:0 "[SCOPE.sCountry('c:USA').GetCapital.GetCityHubName] a été déplacé. [SCOPE.sCountry('c:USA').GetName] a officiellement signé un accord d'assistance militaire avec [ROOT.GetCountry.GetName] - en engageant des ressources de renseignement, du personnel consultatif, du matériel et un soutien logistique à la campagne contre cartel. L'accord est un développement politique important : il indique que [SCOPE.sCountry('c:USA').GetRuler.GetPrimaryRoleTitle] L'administration de [SCOPE.sCountry('c:USA').GetRuler.GetLastName] considère la stabilité de [ROOT.GetCountry.GetName] comme une question d'intérêt national direct.\n\n Pour [ROOT.GetCountry.GetName], les avantages pratiques sont immédiats : l'autorité est rétablie, l'équipement circule, et les cartels font maintenant face à un ennemi avec l'appareil de renseignement complet de [SCOPE.sCountry('c:USA').GetName] travaillant contre eux."
 mdw_events.20.f:0 "Lorsque [SCOPE.sCountry('c:USA').GetName] s'engage, l'équilibre se déplace."
 mdw_events.20.a:0 "Cela change totalement la campagne"
 
 # ==========================================
 # MODIFIERS
 # ==========================================
 
 mdw_war_declared_modifier:0 "La guerre des drogues au Mexique: une campagne active"
 mdw_war_declared_modifier_desc:0 "[ROOT.GetCountry.GetName] a engagé son armée dans une campagne directe contre les narco-cartels. L'autorité est consommée et l'armée est engagée, mais l'État [ROOT.GetCountry.GetAdjective] s'affirme."
 
 mdw_us_aid_modifier:0 "Assistance militaire américaine"
 mdw_us_aid_modifier_desc:0 "Une entente d'assistance militaire active avec [SCOPE.sCountry('c:USA').GetName] fournit des renseignements, de la logistique et de l'équipement à la campagne contre cartel de [ROOT.GetCountry.GetName]."
 
 mdw_victory_modifier:0 "La guerre de la drogue gagnée"
 mdw_victory_modifier_desc:0 "[ROOT.GetCountry.GetName] a gagné la guerre de la drogue. Le contrôle territorial du cartel a été rompu et l'État [ROOT.GetCountry.GetAdjective] a réaffirmé sa souveraineté. Les conditions qui ont produit les cartels demeurent — mais cette bataille a été gagnée."
 
 mdw_commander_killed_modifier:0 "Commandant tué au combat"
 mdw_commander_killed_modifier_desc:0 "L'assassinat du commandant de la contre-carte a ébranlé la confiance du public dans [ROOT.GetCountry.GetName] et a renforcé les cartels."
 
 mdw_troops_ambushed:0 "Troupes embusquées"
 mdw_troops_ambushed_desc:0 "Une colonne militaire [ROOT.GetCountry.GetAdjective] a été embusquée par les forces du cartel, faisant des victimes et réduisant temporairement la capacité offensive."
 
 # Cartel territory modifier descriptions (MDW context)
 cartel_cjng_controlled:0 "Territoire de la CJNG"
 cartel_cjng_controlled_desc:0 "Jalisco New Generation Les agents du cartel contrôlent l'économie criminelle de cet État. L'activité industrielle est perturbée, l'infrastructure se détériore et les gens quittent le territoire [ROOT.GetCountry.GetAdjective]."
 
 cartel_gulf_controlled:0 "Territoire du cartel du Golfe"
 cartel_gulf_controlled_desc:0 "Le cartel du Golfe a établi ici une domination territoriale. L'activité économique est supprimée et [ROOT.GetCountry.GetAdjective] l'autorité de l'État est nominale."
 
 cartel_sinaloa_controlled:0 "Territoire du cartel de Sinaloa"
 cartel_sinaloa_controlled_desc:0 "Le cartel Sinaloa contrôle cet état. La production agricole a été perturbée et l'économie locale fonctionne sous la surveillance d'ententes."
 
 cartel_northeast_controlled:0 "Territoire du cartel nord-est"
 cartel_northeast_controlled_desc:0 "Le Cartel del Noreste a établi sa domination ici. L'infrastructure et la productivité de construction dans [ROOT.GetCountry.GetName] souffrent."
 
 # usa war on drugs

 je_war_on_drugs:0 "La guerre contre la drogue"
 je_war_on_drugs_reason:0 "Le flux de stupéfiants vers [ROOT.GetCountry.GetName] est une crise nationale. La cocaïne, l'héroïne et d'autres substances, produites en grande partie en Amérique latine et introduites en contrebande aux frontières [ROOT.GetCountry.GetAdjective], sont des communautés dévastatrices, alimentant la criminalité violente et corrompant les institutions publiques.\n\n[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] L'administration de [ROOT.GetCountry.GetRuler.GetLastName] s'est engagée à mener une campagne globale : des partenariats internationaux pour étrangler l'offre à la source, des mesures d'application nationales pour fermer les frontières et des investissements sociaux pour répondre à la demande. La campagne n'est pas sans coût — les ressources dont elle a besoin pèsent sur l'économie en général — mais l'alternative est un pays de plus en plus à la merci des réseaux criminels étrangers.\n\n@information! Le territoire du cartel pourrait s'étendre au Mexique. Un accord d'assistance militaire avec le gouvernement mexicain est la pierre angulaire de la composante internationale de cette campagne."

 narco_economy_plantation_bonus:0 "Économie de Narco"
 narco_economy_plantation_bonus_desc:0 "Le commerce de la drogue s'est intégré dans l'économie agricole de [ROOT.GetCountry.GetName]. La production de plantations, en particulier d'opium, dépasse les niveaux normaux, soutenue par la demande de cartels et la corruption de l'argent narcotique dans les communautés rurales."

 war_on_drugs_active_modifier:0 "Guerre contre la drogue"
 war_on_drugs_active_modifier_desc:0 "Le gouvernement [ROOT.GetCountry.GetAdjective] s'est engagé à mener une campagne globale contre le trafic de drogues. L'effort d'application - police nationale, opérations d'interdiction et coopération internationale - tire des ressources de toute l'économie et impose un coût modeste mais réel à la productivité nationale."

 war_on_drugs_victory_modifier:0 "La guerre contre la drogue — gagnée"
 war_on_drugs_victory_modifier_desc:0 "La valeur [ROOT.GetCountry.GetAdjective] La guerre contre la drogue a atteint ses objectifs. L'offre a été supprimée, les frontières sont appliquées et le cadre institutionnel est en place. La campagne a renforcé l'autorité et le prestige de [ROOT.GetCountry.GetName], bien que les conditions sous-jacentes à la demande de drogues n'aient pas été résolues."

 wod_je_status_active:0 "La campagne se poursuit."
 wod_je_status_ready:0 "La campagne est prête à se terminer."

 wod_completion_mexico_tt:0 "Avoir un pacte d'aide militaire #bold avec le Mexique."
 wod_completion_enforcement_tt:0 "Adopter soit #bold Garde nationale#! soit #bold Police secrète#!."
 wod_completion_opium_price_tt:0 "Suppression de l'offre internationale de médicaments jusqu'à ce que les médicaments soient au moins #bold 65% de prix#! sur le marché américain."
 wod_completion_schools_tt:0 "Relever l'établissement #bold scolaire#! au niveau #bold 5#! ou plus."
 wod_completion_border_tt:0 "Adopter les contrôles de migration #bold ou #bold Frontières fermées#!."
 wod_completion_no_safe_injection_tt:0 "Ne pas avoir #bold Sites d'injection sûrs#!."
 wod_completion_no_trafficking_allowed_tt:0 "Ne pas avoir #bold Trafic autorisé#!."
 wod_completion_no_hard_drugs_decriminalized_tt:0 "Ne pas avoir #bold Médicaments durs Décriminalisé#!."
