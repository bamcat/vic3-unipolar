objective_the_west_name_USA:0 "La Superpuissance Solaire"
objective_the_west_name_GBR:0 "Les problèmes"
objective_the_west_name_FRA:0 "La France de Mitterrand"

objective_the_west_desc_USA:0 "Les États-Unis d'Amérique se trouvent dans une position unique au tournant du XXIe siècle. Étant la première superpuissance du monde et la plus forte nation que l'humanité ait jamais vue, la République fait face à un ensemble de problèmes extérieurs et internes difficiles. Malgré l'effondrement du principal rival de l'Amérique, l'Union soviétique, la menace du terrorisme, la Chine et diverses autres menaces pour le monde libre remettent en question l'implication de l'Amérique. Les Etats-Unis resteront-ils la superpuissance mondiale ? Le temps le dira."
objective_the_west_desc_GBR:0 "En 1992, le Royaume-Uni était aux prises avec l'incertitude économique et les turbulences politiques. Le pays est récemment sorti d ' une profonde récession, marquée par un taux de chômage élevé et une baisse de la confiance des consommateurs. Pour ajouter aux malheurs britanniques, l'instabilité en Irlande du Nord, aujourd'hui connue sous le nom de « Les problèmes », reste un sujet de débat brûlant. Comment Britannia survivra - t - elle à cette époque agitée?"
objective_the_west_desc_FRA:0 "Le paysage politique de la France a été marqué par une tension croissante sur l'intégration européenne et les défis économiques nationaux. Le président François Mitterrand, socialiste au cours de son second mandat, a connu une baisse de popularité alors que le pays luttait contre un chômage élevé et une croissance économique lente. Son gouvernement, dirigé par le Premier ministre Pierre Bérégovoy, est aux prises avec le mécontentement de la population quant aux mesures d'austérité visant à stabiliser l'économie. Sur le plan politique, la France est profondément divisée par le traité de Maastricht, qui vise à renforcer l'intégration européenne et à ouvrir la voie à l'euro. L'UE a-t-elle ce qu'il faut pour survivre au XXIe siècle?"

objective_the_east_name_RUS:0 "La chute de l'Union soviétique"
objective_the_east_name_PRC:0 "La Grande République Populaire"
objective_the_east_name_IRQ:0 "L'Irak de Saddam Hussein"

objective_the_east_desc_RUS:0 "La Russie subit une transformation politique dramatique à la suite de la dissolution de l'Union soviétique en décembre 1991. Boris Eltsine, le premier président de la Fédération de Russie, a fait face à l'immense défi de conduire une démocratie naissante tout en naviguant sur la transition chaotique d'un système communiste centralisé à une économie de marché. Sur le plan national, le gouvernement Eltsine a lutté contre l'instabilité politique, la hausse de l'inflation et les troubles sociaux généralisés comme des réformes économiques, connues sous le nom de thérapie de choc, a causé des difficultés pour des millions de personnes. D'un point de vue diplomatique, la Russie a cherché à redéfinir son rôle sur la scène mondiale, en établissant de nouvelles relations avec les puissances occidentales tout en essayant de maintenir l'influence sur les anciennes républiques soviétiques."
objective_the_east_desc_PRC:0 "La Chine émerge avec prudence de l'isolement international et des sanctions imposées par les pays occidentaux. Sur le plan politique, le pays était fermement sous le contrôle du Parti communiste chinois (PCC), Deng Xiaoping conservant une influence significative malgré sa démission officielle de ses postes de direction. Son célèbre « Southern Tour » au début de 1992 a revigoré l'engagement de la Chine en faveur de la réforme économique et de l'ouverture, signalant une nouvelle poussée vers des politiques axées sur le marché et une plus grande intégration avec l'économie mondiale"
objective_the_east_desc_IRQ:0 "Reeling from a devastating loss in the Gulf War last year, and facing intense international isolation. Saddam Hussein remained firmly in power, maintaining an iron grip on the country through brutal repression of internal dissent, particularly against the Shi'a in the south and the Kurds in the north. Iraq truly has several paths going into the 2000s.

objective_rising_powers_name_IDA:0 "Le siècle indien"
objective_rising_powers_name_BRZ:0 "La montée en puissance du Brésil"
objective_rising_powers_name_VNM:0 "L'élévation du Vietnam"

objective_rising_powers_desc_IDA:0 "L'Inde traverse une période de changements politiques et économiques importants. Le pays était dirigé par le Premier Ministre P.V. Narasimha Rao, qui était arrivé au pouvoir en 1991 et a lancé une série de réformes économiques transformatrices visant à libéraliser l'économie et à l'intégrer plus étroitement au marché mondial."
objective_rising_powers_desc_BRZ:0 "En 1992, le Brésil était en pleine transition politique après la fin du régime militaire en 1985. Le pays a été gouverné par le président Fernando Collo de Mello, qui a pris ses fonctions en 1990 en tant que premier président élu au Brésil en 20 ans. Le gouvernement de Collor a commencé par une vague de réformes économiques visant à stabiliser l'économie, mais son administration a rapidement été confrontée à une désillusion croissante de la part du public en raison de l'inflation croissante et des allégations de corruption. En 1992, Collor a été impliqué dans un scandale de corruption majeur, conduisant à des manifestations de masse et appelant à sa mise en accusation. Sur le plan diplomatique, le Brésil s'est attaché à améliorer son image internationale et à élargir son influence en Amérique latine. Elle cherche également à resserrer ses liens avec les pays occidentaux tout en affirmant son rôle dans les questions mondiales, en particulier dans les questions environnementales liées à la forêt amazonienne. Toutefois, l ' instabilité politique et les difficultés économiques continuent de dominer l ' ordre du jour national."
objective_rising_powers_desc_VNM:0 "Le Vietnam réintégrait progressivement la communauté internationale après des années d'isolement à la suite de la fin de la guerre du Vietnam et des graves conséquences des sanctions économiques. En 1992, le Vietnam a normalisé ses relations avec les États-Unis et s'est joint à l'Association des nations de l'Asie du Sud-Est (ANASE), ce qui indique une évolution vers une plus grande coopération régionale et un intérêt pour l'amélioration des relations avec l'Occident. Quel chemin prendra le Vietnam? C'est à toi de voir."
