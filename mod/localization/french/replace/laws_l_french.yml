 enactment_phase_0_tec: "Formulation"
 enactment_phase_1_tec: "Révision"
 enactment_phase_2_tec: "Mise en œuvre"

 enactment_phase_0_courep: "Débat"
 enactment_phase_1_courep: "Amendement"
