l_french:

 GDP_TOOLTIP:1 "#header [Country.GetAdjective] [concept_gdp]#!\n@money![Country.MakeScope.ScriptValue('cwp_gdp')|Dv] (#u #tooltippable #tooltip:[Country.GetTooltipTag],COUNTRY GDP OWNERSHIP TOOLTIP [Country.GetDomesticallyOwnedGDPFraction|%1b]#!#!#!) propriété nationale $concept_gdp_short$ (\n@money! [Concept('concept_gdp_per_capita', '$concept_gdp_per_capita_short$')] ([Country.GetGDPPerCapitaRanking])"
 COUNTRY_GDP_OWNERSHIP_TOOLTIP: "#header [concept_gdp_ownership] dans [Country.GetName]#!\n#u [Country.GetDomesticallyOwnedGDPFraction|%1b]#! (@money![Country.GetGDP|Dv]) propriété nationale $concept_gdp_short$\n$TOOLTIP_DELIMITER$\n[SelectLocalization(IsZero_CFixedPoint(Country.GetForeignOwnedGDPFraction), 'NO_FOREIGNLY_OWNED_PERCENTAGE', 'COUNTRY_FOREIGNLY_OWNED_PERCENTAGE')]\n\n[SelectLocalization(IsZero_CFixedPoint(Country.GetGDPOwnedInForeignCountries), 'NO_OWNED_FOREIGN_GDP_BY_COUNTRY', 'OWNED_FOREIGN_GDP_BY_COUNTRY')]"

 COUNTRY_ALL_GDP: "@money!#v [Country.GetGDPWithOwnershipsInForeignCountries|D]#!"
 DOMESTIC_COUNTRY_GDP: "@money!#v [Country.GetGDP|D]#!"
 FOREIGN_COUNTRY_GDP: "@money!#u [Country.GetGDPOwnedInForeignCountries|Db]#!"
 COUNTRY_ALL_OWNERSHIP: "#u [Country.GetDomesticallyOwnedGDPFraction|%1b]#![ConcatIfNeitherEmpty(' + ', AddLocalizationIf(NotZero_CFixedPoint(Country.GetGDPOwnedInForeignCountries), 'FOREIGN_COUNTRY_GDP'))]"
 
 ERROR_DEER_TOOLTIP:0 "#header Dangnabit!#!\n#instruction Cliquez sur la gauche pour ouvrir le journal d'erreur\n#instruction Cliquez à droite sur #! pour que ça s'en aille (jusqu'à ce que vous le bouleversiez à nouveau)"
 ERROR_MANUL_TOOLTIP: "#header Maudit une fois, honte à toi. Vous me trompez—vous ne pouvez pas être dupé à nouveau!#!\n#instruction Cliquez sur la gauche#! pour ouvrir le journal d'erreur\n#instruction Cliquez à droite sur #! pour que ça s'en aille (jusqu'à ce que vous le bouleversiez à nouveau)"
 
 OH_DEER:0 ""#italic Honte, honte sur vous? #! #bold [ErrorDeer.NumberOrErrors|v]#! #italic erreur(s)!#!""
 ERROR_MANUL: "#italic #! #bold [ErrorDeer.NumberOrErrors|v]#! #italic Missions accomplies."
 ERROR_DEER_SLOW_TICK_OPERATIONS:0 "#header Opérations lentes #!"
