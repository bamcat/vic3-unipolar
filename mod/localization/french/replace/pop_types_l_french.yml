l_french:
 aristocrats:0 "@aristocrats! $aristocrats_no_icon$"
 aristocrats_only_icon:0 "@aristocrats!"
 aristocrats_no_icon:0 "Aristocrates"
 aristocrats_desc:1 "De riches propriétaires terriens, de l'argent ancien avec de vieilles connexions. Ils travaillent exclusivement dans [GetBuildingType('building_manor_house').GetName] [Concept('concept_building', '$concept_buildings$')], où ils possèdent des fermes et des plantations. Ils contribuent une partie de leurs profits au [concept_investment_pool]. Leurs intérêts politiques sont représentés par le [GetInterestGroupVariant('ig_landowners',GetPlayer).GetNameWithCountryVariant]."
 bureaucrats:0 "@bureaucrats! $bureaucrats_no_icon$"
 bureaucrats_only_icon:0 "@bureaucrats!"
 bureaucrats_no_icon:0 "Bureaux"
 bureaucrats_desc:0 "Fonctionnaires responsables de l'administration des fonctions gouvernementales et de l'infrastructure. Politiquement, ils ont tendance à s'aligner sur l'Intelligentsia ou Petite Bourgeoisie."
 capitalists:0 "@capitalists! $capitalists_no_icon$"
 capitalists_only_icon:0 "@capitalists!"
 capitalists_no_icon:0 "Capitalistes"
 capitalists_desc:1 "Des capitaines de l'industrie, de l'argent pour une nouvelle ère. Ils travaillent exclusivement dans [GetBuildingType('building_financial_district').GetName] [Concept('concept_building', '$concept_buildings$')], où ils possèdent des mines et des manufactures. Ils contribuent une partie de leurs profits au [concept_investment_pool]. Leurs intérêts politiques sont représentés par le [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetNameWithCountryVariant]."
 clergymen:0 "@clergymen! $clergymen_no_icon$"
 clergymen_only_icon:0 "@clergymen!"
 clergymen_no_icon:0 "Clergés"
 clergymen_desc:0 "Prêtres, érudits et autres chefs religieux qui s'occupent des besoins spirituels de la population rurale. Politiquement, ils sont l'épine dorsale du Débout."
 clerks:0 "@clerks! $clerks_no_icon$"
 clerks_only_icon:0 "@clerks!"
 clerks_no_icon:0 "Travailleurs à col blanc"
 clerks_desc:0 "Des employés de bureau de rang inférieur s'acquittent de tâches administratives dans les administrations, les infrastructures et les magasins. Fait généralement partie de la Petite Bourgeoisie, bien que certains adhèrent à des syndicats."
 engineers:0 "@engineers! $engineers_no_icon$"
 engineers_only_icon:0 "@engineers!"
 engineers_no_icon:0 "Ingénieurs"
 engineers_desc:1 "Inventeurs et concepteurs de solutions techniques, travaillant avec des machines de pointe dans des secteurs comme la fabrication, l'exploitation minière et la construction. Certains soutiennent les industriels ou Petty Bourgeoisie, tandis que d'autres rejoignent les syndicats."
 farmers:0 "@farmers! $farmers_no_icon$"
 farmers_only_icon:0 "@farmers!"
 farmers_no_icon:0 "Agriculteurs"
 farmers_desc:0 "Les métayers, les petits exploitants et d'autres qui font une vie stable mais peu vivante produisent de la nourriture ou des cultures commerciales. La plupart voient leurs intérêts représentés comme le Folk Rural."
 peasants:0 "@peasants! $peasants_no_icon$"
 peasants_only_icon:0 "@peasants!"
 peasants_no_icon:0 "Paysans"
 peasants_desc:2 "Les agriculteurs de subsistance n'ont trouvé que dans [Concept('concept_subsistence_building', '$concept_subsistence_buildings$')], où ils produisent des produits agricoles et des produits manufacturés simples qu'ils utilisent principalement pour leurs propres besoins. Ils comptent sur [concept_subsistence_output] pour survivre et ne jouent qu'un rôle limité dans l'économie [concept_market]. Ils ont tendance à être [Concept('concept_politically_unaligned_aligned', '$concept_politically_unaligned$')]."
 laborers:0 "@laborers! $laborers_no_icon$"
 laborers_only_icon:0 "@laborers!"
 laborers_no_icon:0 "Travailleurs à col bleu"
 laborers_desc:0 "Les journaliers, les ouvriers agricoles et d'autres personnes qui ont peu ou pas de sécurité d'emploi, accomplissent tout le travail disponible dans toute la société. Ils ne sont généralement pas engagés dans la politique, mais peuvent s'engager par l'intermédiaire des syndicats."
 officers:0 "@officers! $officers_no_icon$"
 officers_only_icon:0 "@officers!"
 officers_no_icon:0 "Membres des bureaux"
 officers_desc:0 "Officiers commandés commandant les forces militaires du pays dans l'armée et la marine. Politiquement, ils représentent les échelons supérieurs des forces armées."
 academics:0 "@academics! $academics_no_icon$"
 academics_only_icon:0 "@academics!"
 academics_no_icon:0 "Études"
 academics_desc:0 "Chercheurs, médecins, avocats et autres professionnels formés qui étudient et enseignent dans des établissements universitaires. Politiquement, ils sont à l'avant-garde de l'Intelligentsia."
 shopkeepers:0 "@shopkeepers! $shopkeepers_no_icon$"
 shopkeepers_only_icon:0 "@shopkeepers!"
 shopkeepers_no_icon:0 "Propriétaires de petites entreprises"
 shopkeepers_desc:0 "Propriétaires et gestionnaires de magasins, vendant des articles aux clients dans les villes. Ils relèvent généralement de la Petite Bourgeoisie politiquement."
 slaves:0 "@slaves! $slaves_no_icon$"
 slaves_only_icon:0 "@slaves!"
 slaves_no_icon:0 "Esclaves"
 slaves_desc:0 "Traiter non pas comme une personne mais comme une propriété, effectuant le travail forcé dans divers secteurs dans les pays où l'esclavage est permis. En raison de leur statut, ils ne sont pas autorisés à participer à la politique."
 soldiers:1 "@soldiers! $soldiers_no_icon$"
 soldiers_only_icon:1 "@soldiers!"
 soldiers_no_icon:1 "Hommes de service"
 soldiers_desc:0 "Les soldats et les marins constituent la majeure partie du personnel militaire du pays. Ils s'alignent généralement politiquement sur leur rôle dans les forces armées."
 machinists:0 "@machinists! $machinists_no_icon$"
 machinists_only_icon:0 "@machinists!"
 machinists_no_icon:0 "Machinistes"
 machinists_desc:0 "Ouvriers ayant un emploi stable utilisant des machines dans des usines, des mines, des fermes mécanisées et d'autres secteurs. Sur le plan politique, ils ont tendance à être une force motrice dans les syndicats."
  
 ACADEMICS_QUALIFICATIONS_DESC:0 "Seuls les pops avec [concept_literacy] adéquats peuvent devenir #v $academics$#!. Le potentiel augmente avec [concept_literacy] et [concept_wealth]. Les papas dont [concept_culture] ont un faible [concept_acceptance] prennent beaucoup plus de temps. #v $clerks$#! et #v $aristocrats$#! ont un moment particulièrement facile pour devenir #v $academics$#!."
 ARISTOCRATS_QUALIFICATIONS_DESC:0 "Seuls les pops avec [concept_wealth] adéquats peuvent devenir #v $aristocrats$#!. Le potentiel augmente avec [concept_wealth] et à un degré moindre [concept_literacy]. Les papas dont [concept_culture] ont un faible [concept_acceptance] prennent beaucoup plus de temps. #v $officers$#! et #v $bureaucrats$#! ont un moment particulièrement facile pour devenir #v $aristocrats$#!."
 BUREAUCRATS_QUALIFICATIONS_DESC:0 "Seuls les pops avec [concept_literacy] adéquats peuvent devenir #v $bureaucrats$#!. Le potentiel augmente avec [concept_literacy]. Les pops dont [concept_culture] ont un faible [concept_acceptance] prennent beaucoup plus de temps, alors qu'ils vont plus vite pour ceux qui sont [concept_culture] et [concept_religion] avec un haut $concept_acceptance$. #v $clerks$ et #v $clergymen$#! ont un temps particulièrement facile pour devenir #v $bureaucrats$#!."
 CAPITALISTS_QUALIFICATIONS_DESC:0 "Seuls les pops avec [concept_wealth] adéquats peuvent devenir #v $capitalists$#!. Le potentiel augmente avec [concept_wealth] et [concept_literacy]. Les papas dont [concept_culture] ont un faible [concept_acceptance] prennent beaucoup plus de temps. #v $shopkeepers$#! et #v $engineers$#! ont un moment particulièrement facile pour devenir #v $capitalists$#!."
 CLERGYMEN_QUALIFICATIONS_DESC:0 "Seuls les pops avec [concept_literacy] adéquats peuvent devenir #v $clergymen$#!. Le potentiel augmente avec [concept_literacy]. Les Pops dont [concept_religion] ont un faible [concept_acceptance] prennent beaucoup plus de temps, alors qu'il va plus vite pour ceux de [concept_religion] avec un haut $concept_acceptance$. #v $academics$#! et #v $aristocrats$#! ont un temps particulièrement facile pour devenir #v $clergymen$#!."
 CLERKS_QUALIFICATIONS_DESC:0 "Toute pop peut devenir #v $clerks$#!. Les augmentations potentielles avec plus de [concept_literacy]. #v $laborers$#! ont un temps particulièrement facile pour devenir #v $clerks$#!."
 ENGINEERS_QUALIFICATIONS_DESC:0 "Seuls les pops avec [concept_literacy] adéquats peuvent devenir #v $engineers$#!. Les augmentations potentielles avec [concept_literacy] et [concept_wealth]. #v $machinists$#! et #v $clerks$#! ont un temps particulièrement facile pour devenir #v $engineers$#!."
 FARMERS_QUALIFICATIONS_DESC:0 "Toute pop peut devenir #v $farmers$#!. Les augmentations potentielles avec plus de [concept_wealth]."
 MACHINISTS_QUALIFICATIONS_DESC:0 "Les flèches ayant un minimum [concept_literacy] peuvent devenir #v $machinists$#!. Les augmentations potentielles avec plus de [concept_literacy]."
 OFFICERS_QUALIFICATIONS_DESC:0 "Seulement #v $soldiers$#! ou des pops de [concept_culture] avec suffisamment de [concept_acceptance] peuvent devenir #v $officers$#!. Les augmentations potentielles avec plus de [concept_literacy]."
 SHOPKEEPERS_QUALIFICATIONS_DESC:0 "Seules les pops avec un certain [concept_wealth] peuvent devenir #v $shopkeepers$#!. Les augmentations potentielles avec un plus grand [concept_wealth]. #v $clerks$#! et #v $farmers$#! ont un temps particulièrement facile pour devenir #v $shopkeepers$#!."
