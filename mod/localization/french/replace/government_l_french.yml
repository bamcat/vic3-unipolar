# Theocracies
 gov_theocracy:0 "Théocratie"
 gov_theocracy_desc:2 "C'est un [concept_government_type] où le [concept_country] est dirigé par le clergé.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_theocratic_dictatorship:0 "La dictature théocratique"
 gov_theocratic_dictatorship_desc:2 "C'est un [concept_government_type] où le [concept_country] est dirigé par le chef du clergé.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_theocratic_oligarchy:0 "Oligarchie théocratique"
 gov_theocratic_oligarchy_desc:2 "C'est un [concept_government_type] où le [concept_country] est dirigé par une classe de membres riches et puissants du clergé.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_theocratic_democracy:0 "Démocratie théocratique"
 gov_theocratic_democracy_desc:2 "C'est un [concept_government_type] qui est dirigé par un clergé qui est [Concept('concept_election','$concept_elected$')] par le peuple.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_theocratic_single_party_state: "Régime théocratique"
 gov_theocratic_single_party_state_desc: "Il s'agit d'un [concept_government_type] qui est dirigé par un clergé qui est [Concept('concept_election','$concept_elected$')] par des membres d'un seul parti au pouvoir.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_catholic_theocracy:0 "Théocratie catholique"
 gov_catholic_theocracy_desc:2 "Un [concept_government_type] dirigé par la hiérarchie locale de l'Église catholique. Le plus ancien [Concept('concept_ruler','$RULER_CARDINAL$')] prend le rôle de [concept_head_of_state].\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_protestant_theocracy:0 "Théocratie protestante"
 gov_protestant_theocracy_desc:2 "A [concept_government_type] dirigé par l'Église protestante d'État. Sa plus haute autorité est appelée [Concept('concept_ruler','$RULER_PRIMATE$')], qui possède à la fois l'autorité laïque et spirituelle.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_oriental_orthodox_theocracy:1 "Théocratie orthodoxe orientale"
 gov_oriental_orthodox_theocracy_desc:3 "Un [concept_government_type] dirigé par l'Église orthodoxe orientale. Règle de [Concept('concept_ruler','$RULER_PATRIARCH$')], l'Église contrôle tous les aspects de l'état.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_sunni_theocracy:0 "Immamate"
 gov_sunni_theocracy_desc:2 "Un [concept_government_type] théocratique dirigé par les dirigeants de la foi musulmane sunnite. Un senior [Concept('concept_ruler','$RULER_IMAM$')] joue le rôle de [concept_head_of_state].\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_papacy:0 "Papanie"
 gov_papacy_desc:1 "C'est un [concept_government_type] dirigé par le [Concept('concept_ruler','$RULER_POPE$')], le pontife suprême, évêque de Rome, et chef de l'Église catholique.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_jewish_theocracy:0 "État rabbinique"
 gov_jewish_theocracy_desc:2 "Une théocratie juive dirigée par le [Concept('concept_ruler','$RULER_CHIEF_RABBI$')].\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_prince_bishopric:0 "Prince-Bishopric"
 gov_prince_bishopric_desc:2 "C'est un [concept_government_type] où le [Concept('concept_ruler','$RULER_TITLE_PRINCE_BISHOP$')] exerce à la fois l'autorité temporelle et l'autorité ecclésiastique sur le royaume.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_zaidi_imamate:0 "Zaidi Imamate"
 gov_zaidi_imamate_desc:2 "C'est un [concept_government_type] où le pouvoir repose sur un semi-hérédit [Concept('concept_ruler','$RULER_IMAM$')] appartenant à la branche Zaidi de l'Islam chiite.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_shiite_theocracy:0 "Théocratie chiite"
 gov_shiite_theocracy_desc:2 "Un [concept_government_type] théocratique dirigé par les dirigeants de la foi musulmane chiite. Un senior [Concept('concept_ruler','$RULER_AYATOLLAH$')] joue le rôle de [concept_head_of_state].\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_bhutanese_dual_system_dharma:0 "Diarchie bhoutanaise"
 gov_bhutanese_dual_system_dharma_desc:1 "Il s'agit d'un [concept_government_type] où les autorités religieuses et temporelles partagent le pouvoir, mais le religieux [Concept('concept_ruler','$RULER_TITLE_DHARMA_RAJA$')] tient la plus grande place.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_dalai_lama:0 "Royaume religieux"
 gov_dalai_lama_desc:2 "C'est un [concept_government_type] où le [concept_country] est dirigé par le chef du clergé.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_heavenly_kingdom_theocracy:0 "Royaume céleste"
 gov_heavenly_kingdom_theocracy_desc:3 "Un [concept_government_type] dirigé par le [Concept('concept_ruler','$RULER_TITLE_HEAVENLY_KING$')], qui est prétendu être un enfant de Dieu et un frère de Jésus-Christ.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_contechne: "Contechne"
 gov_contechne_desc: "C'est un [concept_government_type] dirigé par le [Concept('concept_ruler','$RULER_TITLE_ARCHMAGOS$')], le prêtre principal dans la hiérarchie méritocratique d'un clergé éclairé.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_american_theocracy_democratic: "Convention congrégationaliste"
 gov_american_theocracy_democratic_desc: ""C'est un [concept_government_type] où un conseil qui est [Concept('concept_election','$concept_elected$')] par les membres des congrégations de la nation gouverne le pays.\n\n$TRANSFER_OF_POWER_NAME_DESC$""
