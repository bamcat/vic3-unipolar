 gov_danubian_federation_parliamentary_republic_desc: "Il s'agit d'un [concept_government_type] à l'intérieur duquel l'État est organisé en une multitude d'unités fédérales établies selon des lignes ethniques. Le pouvoir central est détenu démocratiquement [Concept('concept_election','$concept_elected$')] Bundesrat, dirigé par un [Concept('concept_ruler','$RULER_TITLE_MINISTER_PRESIDENT$')].\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_danubian_federation_technocratic_parliamentary_republic: "Fédération danoise"
 gov_danubian_federation_technocratic_parliamentary_republic_desc: "Il s'agit d'un [concept_government_type] à l'intérieur duquel l'État est organisé en une multitude d'unités fédérales établies selon des lignes ethniques. Le pouvoir central est détenu par le [Concept('concept_ruler','$RULER_TITLE_CHIEF_ENGINEER$')], le personnage supérieur d'un conseil d'administration de professionnels technocratiques.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_danubian_federation_parliamentary_republic_dictatorship: "Fédération danoise"
 gov_danubian_federation_parliamentary_republic_dictatorship_desc: "Il s'agit d'un [concept_government_type] à l'intérieur duquel l'État est organisé en une multitude d'unités fédérales établies selon des lignes ethniques. Le pouvoir central est détenu par un Bundesrat choisi par une classe politique riche et puissante.\n\n$TRANSFER_OF_POWER_NAME_DESC$"

#Council Republics
 gov_council_dictatorship:1 "État Vanguard"
 gov_council_dictatorship_desc:2 "Il s'agit d'un [concept_government_type] où le [concept_country] est dirigé par un conseil non élu.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_council_republic:0 "Conseil"
 gov_council_republic_desc:3 "C'est un [concept_government_type] où le [concept_country] est dirigé par un conseil qui est [Concept('concept_election','$concept_elected$')] directement par les travailleurs.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_anarchist_commune:0 "Commune anarchiste"
 gov_anarchist_commune_desc:2 "Il s'agit d'un [concept_government_type] où le [concept_country] n'a pas de structure officielle de direction et est plutôt fait de communes auto-organisantes.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_soviet_dictatorship:0 "Dictature soviétique"
 gov_soviet_dictatorship_desc:2 "C'est un [concept_government_type] où le [concept_country] est dirigé par un Soviet non élu.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_soviet_republic:0 "République soviétique"
 gov_soviet_republic_desc:3 "Il s'agit d'un [concept_government_type] où le [concept_country] est dirigé par un Soviet qui est [Concept('concept_election','$concept_elected$')] directement par les travailleurs.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_papal_commune:0 "Commune pontificale"
 gov_papal_commune_desc:3 "Un [concept_government_type] dirigé par les principes du socialisme chrétien et les traditions de l'Église catholique. Chaque homme est cardinal !"
 gov_soviet_single_party_state: "République soviétique"
 gov_soviet_single_party_state_desc: "C'est un [concept_government_type] où le [concept_country] est dirigé par un Soviet Suprême qui est [Concept('concept_election','$concept_elected$')] par les travailleurs à travers les mécanismes d'un parti communiste dédié.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_council_single_party_state: "Conseil"
 gov_council_single_party_state_desc: "C'est un [concept_government_type] où le [concept_country] est dirigé par un conseil qui est [Concept('concept_election','$concept_elected$')] par les travailleurs à travers les mécanismes d'un parti communiste dédié.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_cybernetic_state: "État cybernétique"
 gov_cybernetic_state_desc: "C'est un [concept_government_type] où le [concept_country] est dirigé par un conseil de professionnels, nommé par des représentants des organes techniques de l'État socialiste.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_phalanstere: "Phalanstère"
 gov_phalanstere_desc: "C'est un [concept_government_type] où le [concept_country] est dirigé par un conseil de professionnels, nommé par des représentants des organes techniques de l'État socialiste.\n\n$TRANSFER_OF_POWER_NAME_DESC$"

# Transfer of Power
 transfer_of_power_hereditary:0 "Hérédité"
 transfer_of_power_hereditary_desc:1 "Sous héréditaire [concept_transfer_of_power], [Concept('concept_ruler', '$concept_rulers$')] règnent pour la vie et ont un [concept_heir] qui devient le nouveau $concept_ruler$ quand le $concept_ruler$ meurt."
 transfer_of_power_presidential_elective:0 "Présidentiel élu"
 transfer_of_power_presidential_elective_desc:1 "Sous l'option présidentielle [concept_transfer_of_power], [Concept('concept_ruler', '$concept_rulers$')] sont choisis parmi le chef du [concept_interest_group] avec le plus [concept_clout] à la fin de chaque [concept_election]."
 transfer_of_power_parliamentary_elective:0 "Parlementaire élu"
 transfer_of_power_parliamentary_elective_desc:1 "Sous Elective parlementaire [concept_transfer_of_power], [Concept('concept_ruler', '$concept_rulers$')] sont choisis parmi le leader de [concept_interest_group] dans [concept_government_type] avec le plus [concept_clout]."
 transfer_of_power_dictatorial:0 "Dictatoire"
 transfer_of_power_dictatorial_desc:1 "Sous Dictatorial [concept_transfer_of_power], [Concept('concept_ruler', '$concept_rulers$')] règnent pour la vie. À la mort du $concept_ruler$, un nouveau $concept_ruler$ est choisi parmi le chef du [concept_interest_group] avec le plus [concept_clout]."
 transfer_of_power_default:0 "Aléatoire"
 transfer_of_power_default_desc:1 "Sous Random [concept_transfer_of_power], [Concept('concept_ruler', '$concept_rulers$')] règne pour la vie. À la mort de $concept_ruler$, un nouveau $concept_ruler$ est généré au hasard."

