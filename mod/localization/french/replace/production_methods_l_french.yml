pm_the_projects: "Les projets"
pm_the_projects_desc: "Des tours et des logements à forte densité financés par l'État. Basic, fonctionnel et construit rapidement à partir de bois et de matériaux préfabriqués. La production immobilière augmente considérablement à mesure que l'État devient un constructeur majeur."
 
pm_affordable_construction: "Construction abordable"
pm_affordable_construction_desc: "Un programme complet de logements publics utilisant une construction de qualité - bâtiments à ossature d'acier, fondations appropriées, matériaux durables. La production immobilière augmente considérablement. Les ingénieurs et les bureaucrates gèrent le programme élargi."
 
pm_housing_for_all: "Logement pour tous"
pm_housing_for_all_desc: "Logement universel livré à l'échelle. L'État construit et entretient des logements de haute qualité pour tous les citoyens, en consommant des intrants importants. La production immobilière atteint son maximum. Une grande main-d'œuvre de travailleurs, d'ingénieurs et de bureaucrates soutient le programme."
