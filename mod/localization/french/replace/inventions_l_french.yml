l_french:
   #hereditary_aristocracy: "Hereditary Aristocracy"
  # Categories
  # Culture Technology
  # Economy Technology
  # Military Technology
  ### Technology Tooltips
  ##lenders_of_last_resort: "Lenders of Last Resort"
  ##lenders_of_last_resort_desc: "State-owned central banks are large enough to come to the rescue of smaller commercial banks, such as during bank runs. This can prevent a financial crisis spreading to other sectors of the economy. Often, even the promise of rescue in times of difficulty is enough to prevent bank runs occurring in the first place. Some 'critics' claim that such a promise will encourage risky behavior by the commercial banks, but these 'critics' are surely just anarchists looking to wreck the nation's economic security, as bankers are some of the most trustworthy people to walk the halls of power."
  ##limited_liability: "Limited Liability"
  ##limited_liability_desc: "A limited liability company draws a legal distinction between the company and its owners. This helps prevent the bankruptcy of a company ruining the personal lives of the investors, as creditors will not try to haul off the furniture of failed businessmen to recoup losses. This makes investing less risky, if perhaps less satisfying to watch from afar. As a separate legal entity, the company has its own finances that must be audited and taxed."
  ##marketing_desc: "Promotional schemes to grab more market share or create a new market from scratch were devised by Josiah Wedgwood, leader of the expanding pottery industry at the dawn of the Industrial Revolution."
  ##paper_money: "Paper Money"
  ##paper_money_desc: "A kind of promissory note issued by a bank, paper money allows private citizens to move and exchange large volumes of currency without the danger and discomfit of gold or silver coins which cannot be divided and are heavy to carry. Thus, commercial exchanges are easier and safer."
  ##regulated_private_notes: "Regulated Private Notes"
  ##regulated_private_notes_desc: "Bankers realized hundreds of years ago that their customers only rarely demand back their deposits all at once. By issuing loans in excess of their reserves in the form of private bank notes, bankers could make even more money from interest. Unfortunately, when all the bank's customers do demand their deposits at once, there will not be enough reserves. With better communications technology, these 'bank runs' become more frequent. To prevent bank runs, governments can restrict the issuance of private notes only to banks that meet certain criteria of fiduciary responsibility, such as being close personal friends to the finance minister."
  #alcohol: "Alcohol"
  #alcohol_desc: "An ancient technology, presumably discovered when a tribesman left some grain in a puddle and decided to drink it after a few months had passed, alcohol became central to the discipline of alchemy, and continues to serve men of reason in the field of chemistry in various processes, some of which do not involve drinking it."
  #atomic_theory_of_matter: "Atomic Theory of Matter"
  #atomic_theory_of_matter_desc: "Observations in chemistry seem to have disproven the notion held by supporters of phlogiston that matter is composed of the three fundamental essences of solidity, fluidity and inflammability. Air is not merely a void into which phlogiston flows during combustion - it contains oxygen, which combines with other matter during chemical reactions."
  #bankruptcy_law: "Bankruptcy Law"
  #bankruptcy_law_desc: "Having a legal framework for a company to declare bankruptcy allows investors and creditors to try to recoup losses via liquidation of assets. This makes investment less risky."
  #building_societies: "Building Societies"
  #building_societies_desc: "Originally set up within communities to help new families raise loans with which to buy homes and then disbanded once the members had all satisfied their requirements, building societies can also be permanent financial institutions that specialize in cheap mortgages."
  #census: "Census"
  #census_desc: "Knowing how many people we have in our country and roughly were they live is important so we know where to spend out money and how many men we will have if we have to fight. Should we be involved in that grubby business of having our lower orders actually having representation I suppose it will have a use for that as well."
  #chemical_batteries: "Chemical Batteries"
  #chemical_batteries_desc: "Electricity can be generated by exploiting the difference in charge as electrolytes pass through oxidation and reduction cells containing copper and zinc cathodes and annodes. Early experiments in this field took the form of a series of jars which had the appearance of a battery of artillery, hence the name."
  #civil_service: "Civil Service"
  #civil_service_desc: "The idea that the government should have a body of men on which they rely on to carry out administration is neither new nor necessarily efficient. The radical idea that people should be selected for these positions on merit and ability and that they should keep their positions if the government is changed are radical and leads to greater efficiency."
  #clinical_thermometer: "Clinical Thermometer"
  #clinical_thermometer_desc: "The mercury thermometer had been around since the mid 18th century. Its use for medical purposes were limited as they tended to be large (over a foot long) and could take over 20 minutes to measure someone's temperature. Now we have made the thermometer smaller and it only takes a few minutes to get a reading, making it truly useful for doctors."
  #commercial_banks: "Commercial Banks"
  #commercial_banks_desc: "Businesses need various financial services to operate normally. Payroll at the end of the month might require a short loan to cover a temporary shortfall. Expanding the business might likewise require borrowing, especially if the business is a limited liability company rather than a personal venture. Commercial banks offer financial services to these companies, as opposed to wealthy private individuals, middle-class savers or professional investors."
  #cooperatives: "Co-Operatives"
  #cooperatives_desc: "Intended as a mutually beneficial organization to help small businesses and workers buy basic necessities, a co-operative tends to be run democratically by its members to achieve social good rather than pure profit."
  #credit_unions: "Credit Unions"
  #credit_unions_desc: "Rather than being operated for the profit of an owner or shareholders, credit unions are a financial institution which tries to improve the welfare of its members through access to credit. They tend to be run democratically, with each member having a vote on the director of the credit union."
  #customs_tariffs: "Customs Tariffs"
  #customs_tariffs_desc: "Tariffs are a very important weapon in a government's arsenal. They can be used both to raise revenue and to 'guide' merchants and businesses into making choices beneficial to the national interest, as determined by the government. Tariffs can be charged on entry into a country, for the use of port facilities, or on the price of imported or exported goods. One important use for tariffs is in protecting native industries against more efficient foreign companies, which can give domestic firms time to catch up with their rivals abroad."
  #department_stores: "Department Stores"
  #department_stores_desc: "Having one large store that sells a huge variety of goods can be more convenient for customers and gives the retailer more buying-power over the distribution chains."
  #distribution_channels: "Distribution Channels"
  #distribution_channels_desc: "Companies can be structured to sell goods in a number of ways. Raw materials are generally sold to other industries; industries might then sell manufactured goods to wholesalers such as brokers; wholesalers then sell goods to retailers such as specific shops or chains of shops, and the retailer then sells the goods to the final customer. Innovations in this area include factory or outlet stores, which sell goods directly to customers from the factory complex, such as to workers and their families and community."
  #enclosure_acts: "Enclosure Acts"
  #enclosure_acts_desc: "Enclosure is the process of taking small strips of peasant land, passed down from father to son since the beginning of feudalism, and 'combining' them under one owner via Acts of Parliament. By merging these subsistence plots into enclosed fields, arable land can be turned into pasture, capital goods such as machinery can be invested in, and many small surpluses can be merged into a significant profit. Where the landless peasants go is up to them - am I my brother's keeper?"
  #espionage: "Espionage"
  #espionage_desc: "Know thy enemy. Knowledge of what is going on in places that could be hostile to us is vital if we are going to keep out country safe. This can be in the form of the mundane, like ensuring proper maps exist of areas we may end up being at war in to the significant like enemy forces and plans."
  #gold_standard: "Gold Standard"
  #hereditary_aristocracy_desc: "As a society becomes more productive enough food can be generated to allow people to specialize and do things that do not require you to farm. A military caste to protect yourself from hostile neighbors is a natural development and eventually they will entrench their position and hereditary aristocracy is born."
  #insurance: "Insurance"
  #insurance_desc: "Insurance against loss of property has existed for many hundreds of years, being especially important for merchant vessels traveling overseas. As global trade becomes more prevalent, the need for more secure maritime insurance increases. Lloyd's of London began as a specialist for maritime insurance but has expanded into other markets such as insuring properties against fire damage."
  #malthusianism: "Malthusianism"
  #malthusianism_desc: "Population is increasing much faster than our food supply. We must face the fact that if we allow this to continue we will face a catastrophe for our people. Further more we must face the face any such catastrophe will hurt the lower classes the most. The Tory ideal of paternalism is not good nor noble but instead will lead to a greater catastrophe on the least fortunate."
  #manifest_destiny: "Manifest Destiny"
  #manifest_destiny_desc: "If we are to spread our civilization to those less fortunate to have we must accept the fact that we have been uniquely blessed with virtues and institutions that others simply do not have. We have a mission to redeem the less fortunate by remaking them in our own image. It is no more that our destiny to do this."
  #oceanic_cablelaying: "Oceanic Cablelaying"
  #oceanic_cablelaying_desc: "With the technology of the telegraph, thought soon turned to how to lay a cable under bodies of water. Although it proved not technically difficult to lay cables of short stretches of water (like bays and straits), the wide oceans proved a greater challenge. Good news - after several false starts we have successfully mastered the techniques to lay such a cable so no longer must we rely on the good will of others."
  #ophthalmoscope: "Opthalmoscope"
  #ophthalmoscope_desc: "'every eye could be made luminous if the axis from a source of illumination directed towards a person's eye and the line of vision of the observer were coincident', this discovery revolutionized the treatment of eye problems. Creating a hand held device with a mirror that could shine the light, the ophthalmoscope, was made the doctor's life a lot easier."
  #positivism: "Positivism"
  #positivism_desc: "We we consider what knowledge is we know that there is certain knowledge. Information that comes from sensory experience and  then interpretation comes through logic and reason is the exclusive source of certain knowledge. We can extend this from the physical world to societies as a whole. Societies operate under general laws which if we took the time to analyze we would understand. Theology must be rejected because faith by its very nature denies reason and verification."
  #postal_banks: "Postal Banks"
  #postal_banks_desc: "Rural and otherwise isolated communities may not have access to a local bank branch. In such cases, a postal bank can operate to offer them financial services, such as savings and a current account, without the need to travel into a town or city."
  #savings_banks: "Savings Banks"
  #silver_standard: "Silver Standard"
  #vertical_filing_cabinet: "Vertical Filing Cabinet"
  #vertical_filing_cabinet_desc: "Gone but not forgotten"
 admiralty:0 "Radar moderne"
 admiralty_desc:0 "L'Amirauté est un système complexe de grades reliés par une chaîne de commandement rigide pour aider la marine à travailler plus efficacement."
 anaesthetics:0 "Anesthésiques"
 anaesthetics_desc:0 "Les anesthésiques sont des sédatifs ou des analgésiques utilisés pendant la chirurgie pour empêcher les patients de sentir les couteaux et la prodémie invasive du personnel médical, qui pourraient être décomposés."
 anarchism:0 "Marché Socialisme"
 anarchism_desc:0 "Le socialisme de marché est un type de système économique impliquant la propriété sociale des moyens de production dans le cadre d'une économie de marché. Il existe divers modèles pour un tel système, qui impliquent généralement des entreprises coopératives et parfois un mélange qui comprend des entreprises publiques ou privées."
 aniline:0 "Algorithme d'apprentissage automatique"
 aniline_desc:0 "un processus ou un ensemble de règles à suivre dans les calculs ou autres opérations de résolution de problèmes, en particulier par un ordinateur. Utilisé par les entreprises de médias sociaux pour évaluer les désirs des consommateurs."
 anti_clericalism:0 "Anti-cléricalisme"
 anti_clericalism_desc:0 "Le pouvoir corrompu et les institutions religieuses ne sont pas plus immunisés contre cette corruption que les autres. Ils peuvent prétendre offrir des saluts aux masses, mais au lieu de cela, chercher à plumer leurs propres nids et nier les droits à ceux qu'ils jugent indignes. Nous devons éliminer l'influence de la religion organisée de notre sphère publique et laisser cette question comme un choix à ceux qui ne sont pas éclairés."
 antibiotics:0 "Élimination du cancer"
 antibiotics_desc:0 "L'édition des gènes permet la création de gènes non sensibles au cancer et à d'autres maladies."
 antiseptics:0 "Antiseptiques"
 antiseptics_desc:0 "La science a établi que l'exposition à la chaleur va détruire les germes. Le problème est que ce n'est pas une solution valable en ce qui concerne les tissus vivants. Cependant, lorsque des expériences où des blessures étaient couvertes de tampons ont trempé une solution de phénol, nous avons vu les incidents de gangrène diminuer de façon spectaculaire. Cette science des antisceptiques est née."
 arc_welding:0 "Colonisation interplanétaire"
 arc_welding_desc:0 "La colonisation de différentes planètes"
 army_reserves:0 "Repas, prêt à manger"
 army_reserves_desc:0 "Un repas prêt à manger (MRE) est une ration militaire conçue pour une longue durée de conservation, avec une grande diversité d'options alimentaires."
 art_patronage:0 "Art Patronage"
 art_patronage_desc:0 "L'art n'est pas libre et pour développer l'art et la culture vous avez besoin des riches pour prendre un intérêt et soutenir l'art. En retour, ils gagnent du prestige pour avoir de si belles choses autour d'eux."
 art_silk:0 "Vie artificielle"
 art_silk_desc:0 "Créer des organismes à génomes synthétiques ou concevoir des organismes à propriétés totalement nouvelles et non naturelles. Les génomes synthétiques ont été utilisés pour créer de nouvelles formes de vie à partir de zéro, comme la première bactérie synthétique créée par Craig Venter et l'équipe en 2010."
 artificial_fertilisers:0 "Engrais artificiels"
 assembly_line:0 "Ligne de montage"
 assembly_line_desc:0 "En rationalisant le processus de construction de sorte que chaque action soit faite correctement après l'autre action, une usine beaucoup plus efficace peut être faite."
 atmospheric_engine:0 "Énergie propre"
 atmospheric_engine_desc:0 "Les méthodes de production d'énergie propre, telles que les éoliennes, permettent de produire de l'énergie sans causer de pollution"
 automatic_bottle_blowers:0 "Mycoremediation"
 automatic_bottle_blowers_desc:0 "Cela implique l'utilisation de champignons pour dégrader les polluants environnementaux. Les champignons peuvent être utilisés pour décomposer les matières dangereuses, comme les produits pétroliers et les solvants industriels."
 battlefleet_tactics:0 "Tactiques Spacefleet-Battlefleet"
 battlefleet_tactics_desc:0 "L'exploitation d'une grande flotte de combat peut être une tâche difficile. En pratiquant et en apprenant des tactiques spécifiques en tant que flotte, on peut obtenir de meilleurs résultats."
 battleship_tech:0 "Détruire-Drone"
 battleship_tech_desc:0 "Des navires de combat ultra-massifs capables de faire exploser d'énormes pans d'océan"
 bessemer_process:0 "Polymères"
 bessemer_process_desc:0 "Les vêtements et tissus synthétiques permettent la production en masse de biens communs pour les moins fortunés."
 bessemer_steel:0 "Acier Bessemer"
 bessemer_steel_desc:0 "Le procédé Bessemer fait exploser l'air froid en fonte de fonte, en brûlant du carbone, du silicium et du manganèse et en créant de l'acier doux. Ce n'est pas aussi de qualité que celui produit dans les creusets, mais il est beaucoup moins cher, permettant l'utilisation de minerais de fer de qualité inférieure et permettant la production en masse de lignes ferroviaires et de béton armé."
 biological_determinism:0 "Déterminisme biologique"
 biological_determinism_desc:0 "L'étude de la génétique et de l'héritage dans la nature soulève des questions sur la quantité de comportement humain déterminée par la biologie."
 feminism:0 "Écologiste"
 feminism_desc:0 "L'environnementalisme ou les droits environnementaux sont une philosophie, une idéologie et un mouvement social de grande envergure pour soutenir la vie, les habitats et les milieux."
 blast_furnaces:0 "Fours à éclats"
 blast_furnaces_desc:0 "Un haut fourneau est utilisé pour ajouter de l'oxygène supplémentaire à des procédés métallurgiques tels que la fonte du minerai, à l'origine à la main — ou des soufflets à roue d'eau. Cela fait que le four atteint des températures encore plus élevées qu'un four à air ouvert, brûlant des impuretés et permettant des alliages de métaux exotiques. Le haut fourneau est particulièrement utile pour la production de fonte, qui peut ensuite être transformée en fer forgé ou en acier doux à l'aide de procédés plus avancés."
 bolt_action_rifles:0 "Cybernétique"
 bolt_action_rifles_desc:0 "Des soldats autonomes voulaient sauver des vies réelles au début de la guerre."
 chemical_bleaching:0 "Ordinateur personnel"
 chemical_bleaching_desc:0 "L'ordinateur personnel est apparu au milieu des années 1980, avec des produits comme Apple II, Macintosh et IBM PC, rendant l'informatique accessible aux particuliers et aux petites entreprises."
  # bone_china: "Bone China"
  # bone_china_desc: "Bone China is a form of porcelain which in part is made from bone ash, the greater strength of this type of porcelain makes it rather valuable."
 # artillery: "Artillery"	// There is already a loc key for this in Goods, require prefix to support unique localization
 artillery_desc:0 "Un bombardement à longue portée avec de lourdes munitions intimide et disperse les forces ennemies sans risquer vos propres troupes. Inexactitude, lenteur et coût, pourtant un ingrédient crucial dans toute armée moderne."
 breech_loading_artillery:0 "Batterie de missiles à longue portée"
 breech_loading_artillery_desc:0 "Les batteries de missiles à longue portée, comme l'HIMARS, fascinent la destruction de cibles loin sur le territoire étranger."
 tech_bureaucracy:0 "Libéralisme social"
 tech_bureaucracy_desc:0 "Le libéralisme social est une idéologie qui prône un marché libre avec une forte influence et un contrôle gouvernementaux pour protéger les moins fortunés."
 centralization:0 "Capitalisme autoritaire"
 centralization_desc:0 "En relation avec le capitalisme d'État, un système dans lequel l'État entreprenne une activité commerciale, le capitalisme autoritaire combine la propriété privée et le fonctionnement des forces du marché avec des restrictions à la dissidence."
 camera:0 "Lien stellaire"
 camera_desc:0 "Starlink est une constellation Internet par satellite exploitée par Starlink Services, LLC, un fournisseur international de télécommunications qui est une filiale à part entière de la société américaine SpaceX"
 canals:0 "Canals"
 canals_desc:0 "Les barges côtières et fluviales sont une méthode très efficace de transport des marchandises. Le creusement des canaux dans l'intérieur d'un pays élargit la couverture de ces barges, bien que cela puisse être une proposition coûteuse lorsque différentes hauteurs doivent être pontées par des systèmes d'écluses."
 canneries:0 "Aliments ultra-finis"
 canneries_desc:0 "Les aliments ultra-transformés (UPF) sont des aliments qui ont été significativement modifiés par rapport à leur forme originale par l'utilisation de procédés industriels et l'ajout d'ingrédients qui ne se trouvent pas habituellement dans une cuisine maison."
 canning_jars:0 "Boîtes de conserve"
 canning_jars_desc:0 "Les armées de la Révolution française ont besoin de solutions innovantes à leurs problèmes d'approvisionnement. Une solution était de cuisiner les aliments à l'intérieur de pots en verre, d'éviter les mauvaises humeurs et le miasma mélangeant avec le contenu et gâcher ainsi les rations. La cire fondue est versée dans la bouche du pot pour servir de sceau contre le monde extérieur."
 canning_machines:0 "Machines à conserver"
 canning_machines_desc:0 "La production alimentaire en conserve n'était pas automatisée. Les boîtes étaient roulées et soudées à la main. L'utilisation de machines pour transformer rapidement la tôle en boîtes améliore les normes et augmente le débit."
 carrier_tech:0 "Bateau laser"
 carrier_tech_desc:0 "Les bateaux à laser sont des navires qui lancent un laser de haute puissance afin d'éliminer rapidement les drones entrants."
 catalytic_contact_process:0 "Processus de contact catalytique"
 catalytic_contact_process_desc:0 "En 1831, le marchand britannique de vinaigre Peregrine Phillips a inventé un procédé pour produire de l'acide sulfurique plus concentré en utilisant le platine comme catalyseur. Bien qu'il ne soit pas particulièrement utile pour la production de soda de frêne ou d'engrais, cela devint bientôt un avantage pour la production de colorants organiques."
 chemical_isolation:0 "Isolation chimique"
 chemical_isolation_desc:0 "Les produits chimiques peuvent être purifiés de plusieurs façons, comme la distillation, la filtration et l'évaporation. La qualité du processus de purification affectera évidemment la qualité de l'isolat."
 chemical_synthesis:0 "Synthèse chimique"
 chemical_synthesis_desc:0 "En 1828, le chimiste allemand Friedrich Wöhler synthétise l'urine du chien. Cela a commencé à brouiller les frontières entre la chimie organique et inorganique, et comme plus de produits chimiques sont synthétisés de nouveaux processus industriels s'ouvrent."
 chemical_warfare:0 "AI-terrorisme"
 chemical_warfare_desc:0 "Certaines combinaisons chimiques produisent des effets nocifs, voire mortels, lorsque l'homme y est exposé. Armer cela apporte un tout nouvel aspect horrible à la guerre."
 civilizing_mission:0 "Édition de gènes CRISPR"
 civilizing_mission_desc:0 "L'édition de gènes par CRISPR permet aux humains de développer de nouveaux organes."
 colonization:0 "L'ultrason"
 colonization_desc:0 "Les progrès réalisés à la fin du XXe siècle en matière de transplantation d'organes, d'imagerie médicale par IRM et par balayage de la CT et de machines optiques ont permis des traitements plus spécialisés et inverses pour des conditions individuelles."
 color_photography:0 "Photographie couleur"
 color_photography_desc:0 "Technique précoce de capture de photographies en pleine couleur, basée sur des idées sur la façon dont la lumière est perçue par l'œil. En prenant efficacement trois images à travers différents filtres de couleur, ceux-ci peuvent être combinés en une image recréant les couleurs originales."
 combination_acts:0 "Actes combinés"
 combination_acts_desc:0 "Les travailleurs qui se rencontrent en secret et se jurent sont une menace pour la sécurité de l'État et clairement un moyen pour le radical Jacobin de subvertir à l'État. Cela pourrait également constituer une menace pour notre capacité à nous défendre contre les ennemis extérieurs en raison des menaces d'action des travailleurs à un moment critique du conflit. Nous adopterons une série de lois qui nous permettront de réglementer ces comportements pour le bien commun."
 combustion_engine:0 "Nanocoats"
 combustion_engine_desc:0 "Ils sont appliqués sur différentes surfaces pour les rendre plus résistants à la corrosion, à l'usure et aux taches. Des surfaces autonettoyantes et des nanocouches antibactériennes sont en cours de développement pour des applications dans les domaines des soins de santé, de l'électronique et de la construction."
 central_planning:0 "Gouvernance numérique"
 central_planning_desc:1 "Permet au gouvernement de faire fonctionner divers systèmes informatiques sécurisés."
 compound_microscopes:0 "Microscopes composés"
 compound_microscopes_desc:0 "Les lentilles utilisées en optique nécessitent des compétences de verre très fines. Une innovation dans ce domaine consiste à utiliser deux lentilles, l'une centrée sur un objet et l'autre sur le premier objectif, pour augmenter le grossissement. Un tel microscope peut être utilisé pour voir les bactéries vivantes."
 compression_ignition:0 "Énergie provenant des déchets"
 compression_ignition_desc:1 "En transformant les déchets stockés dans les décharges en énergie, notre monde peut générer des quantités élevées d'énergie"
 concrete_dockyards:0 "Plage d'essais artificiels"
 concrete_dockyards_desc:0 "Gammes d'essais entièrement générées au sein de l'IA."
 concrete_fortifications:0 "Fortifications futures"
 concrete_fortifications_desc:0 "En introduisant le béton dans les fortifications, il est possible de faire des positions fortement ancrées très rapidement."
 condensed_milk:0 "Lait condensé"
 condensed_milk_desc:0 "Normalement, le lait doit être consommé rapidement après avoir été extrait d'une glande mammaire bovine. En abaissant la pression à l'intérieur d'un contenant, comme une casserole à vide, la teneur en eau du lait s'évapore et le lait condensé peut ensuite être en conserve et vendu."
 conspicuous_consumption:0 "Consommation remarquable"
 conspicuous_consumption_desc:0 "La richesse a tout son prestige. Les expositions de richesse peuvent rendre l'on plus prestigieux et aider à progresser à travers les classes sociales, ouvrant de nouvelles possibilités pour les grimpeurs sociaux tels que les contacts avec les hommes d'affaires et les politiciens. Dans une société matérialiste, les frivolités et l'extravagance aident paradoxalement à s'enrichir."
 conveyors:0 "Fabriques automatisées"
 conveyors_desc:0 "En appliquant les derniers systèmes d'IA, il est possible de créer des plateformes qui déplacent les biens le long d'eux sans l'utilisation du travail humain."
 cotton_gin:0 "Automobiles modernes"
 cotton_gin_desc:0 "Les automobiles permettent le transport rapide de personnes et de marchandises dans les terres."
 crucible_steel:0 "Acier brut"
 crucible_steel_desc:0 "Produit par l'application de la chaleur sur un creuset de pierre contenant du fer en poudre et du charbon de bois, cet alliage à haute teneur en carbone est considéré comme similaire à l'acier Damascus, créé en Inde et en Perse jusqu'en 1750. Ce procédé produit de l'acier de haute qualité adapté à l'utilisation dans les outils, ressorts et autres objets extra-durs et coûteux."
 law_enforcement:0 "Racisme systémique"
 law_enforcement_desc:1 "Le racisme systémique est une forme de discrimination institutionnelle fondée sur la race ou le groupe ethnique et peut comprendre des politiques et des pratiques qui existent dans l'ensemble d'une société ou d'une organisation qui produisent et soutiennent un avantage injuste continu pour certaines personnes et un traitement injuste ou préjudiciable pour d'autres."
 defense_in_depth:0 "Ciblage piloté par l'IA"
 defense_in_depth_desc:0 "En faisant plusieurs lignes de défense, il est possible de s'étendre et de ralentir l'ennemi et parfois même de les envelopper."
 democracy:0 "Chute du bloc Est"
 democracy_desc:0 "À la fin des années 80, au début des années 90, une série d'événements ont conduit à l'effondrement du communisme en Europe de l'Est."
 distillation:0 "Appareils"
 distillation_desc:0 "Les appareils comprennent des fours, des réfrigérateurs, des micro-ondes, des mélangeurs, des bouilloires et d'autres articles ménagers utilisés dans la production alimentaire."
 divine_revelation:0 "Révélation divine"
 divine_revelation_desc:0 "La base de toute loi est dérivée de nos saintes Écritures. Ce n'est qu'à travers l'obéissance à une puissance supérieure que notre société peut être correctement ordonnée et la stabilité garantie."
 watertube_boiler:0 "Robotique"
 watertube_boiler_desc:0 "Des robots ont été introduits dans les chaînes de montage, en particulier dans l'industrie automobile, pour améliorer la précision, la vitesse et la sécurité."
 dreadnought_desc:0 "Les porte-drones, comme les porte-avions d'aujourd'hui, portent des essaims de drones et lancent des attaques dévastatrices contre nos ennemis."
 dreadnought_tech:0 "Drone Carrier"
 dynamite:0 "Exploitation minière en haute mer"
 dynamite_desc:0 "La mise au point de technologies d'extraction en eau profonde a considérablement progressé dans les années 2000, alors que les entreprises ont commencé à explorer l'extraction de minéraux précieux (nodules polymétalliques, métaux rares) du fond océanique."
 egalitarianism:0 "Guerre contre la terreur"
 egalitarianism_desc:0 "La guerre contre le terrorisme, officiellement la guerre mondiale contre le terrorisme (GWOT), [3] est une campagne militaire mondiale lancée par les États-Unis à la suite des attaques du 11 septembre 2001."
 electric_arc_process:0 "Neuralien"
 electric_arc_process_desc:0 "Des entreprises comme Neuralink et Synchron développent des interfaces cerveau-ordinateur qui permettent une communication directe entre le cerveau et les appareils numériques. Ces interfaces pourraient révolutionner les traitements médicaux, notamment aider les personnes atteintes de paralysie à reprendre le mouvement, améliorer leurs capacités cognitives et offrir de nouvelles façons d'interagir avec la technologie."
 electric_railway:0 "Transports publics de masse"
 electric_railway_desc:0 "Les voitures étant insoutenables, les transports publics entre les villes peuvent être gérés en masse."
 electrical_generation:0 "Informatique quantique"
 electrical_generation_desc:0 "On s'attend à ce que les ordinateurs quantiques soient utilisés pour des problèmes complexes qui sont actuellement insolubles pour les ordinateurs traditionnels, notamment la découverte de drogues, les simulations de sciences matérielles, la cryptographie avancée, la prévision météorologique, la modélisation financière, le développement de l'intelligence artificielle et les problèmes d'optimisation dans des domaines comme la logistique et la production d'énergie, principalement en tirant parti de leur capacité de traiter de grandes quantités de données et de résoudre des problèmes avec de nombreuses variables simultanément par superposition quantique et enchevêtrement."
 elevator:0 "Plaques d'élévation"
 elevator_desc:0 "Transport Pods, semblable aux ascenseurs, qui peuvent se déplacer à haute vitesse."
 empiricism:0 "World Wide Web"
 empiricism_desc:0 "Le World Wide Web (WWW ou simplement le Web) est un système d'information qui permet le partage de contenu sur Internet par des moyens conviviaux destinés à attirer les utilisateurs au-delà des spécialistes de l'informatique et des amateurs."
 enlightenment_thought:0 "Pensée des Lumières"
 enlightenment_thought_desc:0 "Pendant l'âge de la raison, de vieux dogmes ont commencé à être interrogés. Il n'a plus été accepté que 'Dieu le veut', et ceux qui étaient au pouvoir ont commencé à devoir justifier leur position dans la société. Même les monarques absolus ont vu le prestige de ces nouvelles idées, et les « Despotes éclairés » ont réformé les systèmes éducatifs, juridiques et économiques de l'Europe. Mais ces réformes ne vont pas assez loin, et des penseurs comme John Locke, Voltaire, Jean-Jacques Rousseau et Thomas Paine mènent une attaque contre l'établissement qui culmine par des révolutions en Amérique et en France qui elles-mêmes inspirent les libéraux à travers le monde."
 fascism:0 "Fascisme"
 fascism_desc:0 "Le fascisme est un système politique où le gouvernement exerce un contrôle strict sur tous les aspects de la société."
 field_works:0 "Barrière HESCO"
 field_works_desc:0 "Les barrières HESCO peuvent être érigées plus rapidement que les sacs de sable et offrent plus de protection."
 film:0 "Propagande directe"
 film_desc:0 "Grâce aux implants du cerveau, la propagande peut être directement insérée dans notre population."
 flash_freezing:0 "Congelateur portable"
 flash_freezing_desc:0 "Sèche-linge portatifs à usage civil"
 floating_harbor:0 "Îles artificielles"
 floating_harbor_desc:0 "Les îles artificielles sont des massifs terrestres artificiels, généralement créés pour des moyens militaires."
 food_sterilisation:0 "Stérilisation des aliments"
 food_sterilisation_desc:0 "Par essais et erreurs, les hommes d'affaires ont découvert des méthodes de conservation des aliments, comme le chauffage du lait dans la pasteurisation ou sa condensation en sirop épais, le décapage des fruits et légumes, et la mise en conserve des viandes et des soupes. Le fil commun de toutes ces technologies est l'élimination des germes de la nourriture conservée, un concept qui n'est pas pleinement compris avant la découverte de bactéries sous microscopes. Avec une compréhension généralisée de ces idées, les normes de l'industrie alimentaire s'améliorent, et avec cela la santé du public."
 four_field_crop_rotation:0 "Quatre grandes cultures"
 four_field_crop_rotation_desc:0 "L'utilisation de fixateurs à l'azote, comme les navets ou le trèfle, par le propriétaire foncier Charles 'Turnip' Townsend, permet aux terres agricoles de continuer à être utilisées sans être épuisées ni laissées en jachère."
 fractional_distillation:0 "OGM"
 fractional_distillation_desc:0 "Les organismes génétiquement modifiés (OGM) sont des méthodes artificielles pour changer la façon dont les plantes et les animaux poussent et apparaissent aux fins de la production alimentaire."
 fruit_jars:0 "Boîtes à fruits"
 fruit_jars_desc:0 "L'idée de conserver la viande et la soupe dans les boîtes de métal a gagné en popularité. D'autres types de préservation des aliments sont également répandus, comme la conservation des fruits et légumes dans les fluides de décapage ou leur ébullition dans des confitures."
 fulminates:0 "Fulminées"
 fulminates_desc:0 "Un matériau fulminant est celui qui s'enflamme lorsqu'il est heurté brusquement. Ces matériaux comprennent des ions de mercure, d'argent et de potassium. Ils furent découverts pour la première fois par Edward Charles Howard en 1800, et leur application militaire dans les systèmes de casquettes à percussion devint vite évidente."
 functionalism:0 "Fonctionnalité"
 functionalism_desc:0 "Un cadre théorique qui considère la société comme un système de composantes définies par les fonctions sociales. En utilisant les systèmes mécaniques et biologiques comme métaphore, elle considère les structures de la société et leur interdépendance comme déterminant sa stabilité."
 gantry_cranes:0 "Grues lourdes"
 gantry_cranes_desc:0 "Utile dans la construction et le transport, les grues lourdes sont assez grandes pour chevaucher la largeur d'un navire. Cela leur donne une robustesse qui signifie qu'ils peuvent soulever les charges les plus lourdes qu'un navire puisse transporter."
 general_staff:0 "Drones"
 general_staff_desc:0 "Les drones sont des aéronefs sans pilote qui peuvent être utilisés pour des applications militaires et civiles"
 germ_theory:0 "Théorie de la germination"
 germ_theory_desc:0 "Thucydide a été la première personne à déclarer que les maladies pouvaient se propager de personne à l'autre et depuis les temps anciens nous avons cru que les miasmas étaient les causes de maladies comme le choléra. Cependant, la science a la province que les microorganismes, appelés germes, sont responsables de la maladie."
 gunpowder:0 "Poudre"
 gunpowder_desc:0 "Composé chimique composé de soufre, de charbon et de nitrates, la poudre se conflagre rapidement et se développe dans un gaz qui peut propulser les projectiles vers le bas des tubes. La combustion laisse derrière elle de grandes quantités de fumée du soufre et du charbon de bois, ce qui fait de la mousqueterie une entreprise sale et aveuglante sur le champ de bataille. Les charges de poudre à canon ont également plus d'usage civil pour ouvrir la terre à l'exploitation minière et à la construction. Les Chinois ont inventé la poudre mille ans auparavant et l'ont utilisée pour des feux d'artifice et de l'artillerie de siège."
 gunsmithing:0 "Rifle d'assaut"
 gunsmithing_desc:0 "Les fusils d'assaut combinent la puissance de feu d'un SMG, et la précision d'un fusil pour créer une plate-forme puissante de petites armes."
 gymnastics:0 "Gymnastique"
 gymnastics_desc:0 "Pour les Spartans gymnastique fait partie de l'entraînement de vos recrues militaires, et le mot lui-même a été autour depuis les années 1570 pour se référer aux exercices athlétiques. Maintenant, bien que nous nous rendions compte que les Spartiates étaient sur quelque chose, pour discipliner l'esprit, nous devons discipliner le corps. Les pionniers de l'éducation ont élaboré une série d'exercices pour les garçons sur divers appareils pour les aider à développer leur discipline. Certains radicaux suggèrent même d'étendre ces exercices aux filles."
 gyroscopes:0 "Gyroscopes"
 gyroscopes_desc:0 "Un gyroscope est fait en combinant une série de gimbals, qui sont simplement des supports tournants. Une gimbale tourne verticalement et une autre horizontalement, de sorte que l'objet le plus pris en charge peut tourner librement dans n'importe quelle direction. Les gyroscopes sont utiles pour maintenir un objet stable pendant que son environnement se déplace, comme une boussole magnétique sur un navire de lancement."
 handcranked_machine_gun:0 "Systèmes antidrogue"
 handcranked_machine_gun_desc:0 "Systèmes de défense conçus pour tirer des drones bon marché."
 hydraulic_cranes:0 "Hélicoptère"
 hydraulic_cranes_desc:0 "Les transporteurs d ' hélicoptères permettent de soutenir les troupes sur le plan logistique"
 hydraulic_power:0 "Puissance hydraulique"
 hydraulic_power_desc:0 "Les roues à eau sont utilisées depuis longtemps pour la mouture des grains. Il est logique de les adapter à d'autres usages industriels, tels que les machines d'alimentation."
 hypodermic_syringes:0 "Syringes hypodermiques"
 hypodermic_syringes_desc:0 "Des inoculations ont été administrées à l'origine aux patients en ouvrant la peau et en frottant du matériel malade dans la plaie. L'idée d'utiliser une aiguille creuse pour injecter des liquides dans un patient est évidemment plus hygiénique, et elle a également l'avantage de permettre des volumes précis à administrer par le médecin. Les premières seringues ont été fabriquées à partir d'argent, mais le verre devient populaire à mesure que les procédés de fabrication deviennent plus raffinés, ce qui permet de fabriquer des aiguilles plus étroites."
 idealism:0 "Idéalisme"
 idealism_desc:0 "Un certain nombre de philosophies affirment que notre connaissance dépend de la façon dont nous percevons les choses, ce qui nous limite à connaître l'idée d'une chose, plutôt que la chose telle qu'elle est réellement."
 identification_documents:0 "Identification numérique"
 identification_documents_desc:0 "L'identification numérique est la représentation électronique d'une personne qui lui permet d'accéder aux services en ligne, de faire des achats et d'interagir avec d'autres personnes."
 impressionism:0 "Impressionnisme"
 impressionism_desc:0 "Un style artistique axé sur les techniques recréant la sensation visuelle générale d'une scène. La même ambition artistique de recréer le sentiment et l'expérience d'une situation a également été appliquée dans les formes artistiques au-delà du visuel."
 improved_fertilizer:0 "Microencapsulation"
 improved_fertilizer_desc:0 "La microencapsulation consiste à enfermer des ingrédients actifs comme les vitamines, les saveurs et les probiotiques dans un revêtement protecteur. Cette technologie a été largement utilisée dans les aliments fonctionnels pour améliorer la livraison des nutriments, la durée de conservation et la stabilité des ingrédients sensibles, offrant de nouvelles possibilités dans la production alimentaire, y compris les aliments enrichis et les boissons."
 international_trade:0 "Néolibéralisme"
 international_trade_desc:0 "Le néolibéralisme est distinct du libéralisme dans la mesure où il ne prône pas la politique économique du laissez-faire, mais est plutôt très constructiviste et préconise un État fort pour mener des réformes de type marché dans tous les aspects de la société."
 ironclad_tech:0 "Bataille du 21e siècle"
 ironclad_tech_desc:0 "Les navires de guerre du 21e siècle sont capables de résister à d'énormes bombardements de missiles."
 jeune_ecole:0 "Navire de combat littoral"
 jeune_ecole_desc:0 "Les navires autonomes sont essentiellement des drones en mer. En outre, En ayant beaucoup de petits navires plutôt que quelques grands, il est possible de garder un certain niveau de maniabilité qui serait autrement impossible."
 labor_movement:0 "Téléphone intelligent"
 labor_movement_desc:0 "Un smartphone, souvent appelé simplement un téléphone, est un appareil mobile qui combine la fonctionnalité d'un téléphone mobile traditionnel avec des capacités informatiques avancées."
 land_reform:0 "Réforme foncière"
 land_reform_desc:0 "La propriété foncière et la société vont de pair. La terre est la principale source, la richesse et le statut dans n'importe quel pays et donc qui devient propriétaire de la terre est celui qui a la richesse et le statut. Si nous voulons créer la société que nous voulons, nous devons être prêts à modifier fondamentalement qui possède la terre."
 lathe:0 "Lignes de production"
 lathe_desc:0 "Une chaîne de production est un assemblage de travailleurs, chacun avec une tâche assignée, qui permet la rationalisation de la production."
 lathes:0 "Tours"
 lathes_desc:0 "Un tour est un outil qui tourne le matériau sur lequel l'outil travaille, par opposition à une perceuse, qui est elle-même tournée contre le matériau. Cela agite le matériau de façon symétrique. Cela a des applications dans de nombreuses industries, des chandeliers artisanaux à l'ennui des pièces d'artillerie. Les premiers tours sont alimentés à la main, par cheval ou par roue-eau, selon l'étendue de l'industrie."
 laws_of_physics:0 "Lois de physique"
 laws_of_physics_desc:0 "Les lois fondamentales régissant les organismes en mouvement peuvent être facilement observées à l'aide d'un télescope. Sir Isaac Newton a été un pionnier dans ce domaine grâce à sa technologie de télescope réfléchissant de meilleure qualité et à l'application rigoureuse de ses observations aux prédictions scientifiques existantes de Johannes Kepler."
 crystal_glass:0 "Microprocesseur"
 crystal_glass_desc:0 "Le microprocesseur est le cœur de l'informatique moderne, permettant aux ordinateurs de devenir plus petits, plus rapides et plus abordables. Il a conduit au développement d'ordinateurs personnels et à l'évolution rapide de la technologie."
 automatic_machine_guns:0 "Turret autonome"
 automatic_machine_guns_desc:0 "Tourelles stationnaires avancées capables de verrouiller automatiquement les cibles ennemies."
 malaria_prevention:0 "Cellules STEM"
 malaria_prevention_desc:0 "En raison des conditions extrêmes dans l'espace, les astronautes sont particulièrement vulnérables aux infections étant donné que le rayonnement cosmique, la microgravité et le stress psychologique ont tendance à compromettre le système immunitaire humain."
 manufacturies:0 "Industrie manufacturière"
 manufacturies_desc:0 "Les guildes contrôlaient les méthodes et les pratiques d'embauche qu'une entreprise pouvait utiliser, limitant l'entrée dans la population active et exigeant que seuls les artisans hautement qualifiés et certifiés (par la guilde, naturellement) accomplissent certaines tâches. De plus en plus, les industriels quittent les villes et fondent de nouveaux sites d'innovation, exempts des normes exigeantes et des salaires élevés des maîtres de la guilde."
 mass_communication:0 "Téléphones cellulaires"
 mass_communication_desc:0 "La communication de masse ceci la diffusion facile de l'information utilisant des technologies telles que le téléphone cellulaire."
 mass_propaganda:0 "Auto-éducation"
 mass_propaganda_desc:0 "Grâce à des implants à puce, toutes les informations dans le monde peuvent être transmises directement aux enfants de nos nations."
 mass_surveillance:0 "Mass Direct Démocratie"
 mass_surveillance_desc:0 "Permet à chaque citoyen de voter à tout moment, sur n'importe quoi, par des micropuces implantées dans le cerveau."
 mechanized_farming:0 "Base interplanétaire"
 mechanized_farming_desc:0 "Bases sur d'autres planètes"
 mechanized_workshops:0 "Technologies intelligentes"
 mechanized_workshops_desc:0 "Les technologies intelligentes sont des technologies qui ne sont pas traditionnellement contrôlées par les ordinateurs, mais qui le sont maintenant."
 military:0 "Militaire"
 military_aviation:0 "Grève orbitale"
 military_aviation_desc:0 "Une frappe orbitale est un satellite conçu pour tirer un projectile de haute puissance sur une cible terrestre."
 mobile_armor:0 "Méch"
 mobile_armor_desc:0 "Multi-Firepower-Platform (MFP) est un véhicule lourd, semblable à un réservoir, équipé de la dernière technologie pour enlever les ennemis autonomes"
 modern_nursing:0 "Aéronefs volants"
 modern_nursing_desc:0 "Les avions volants sont des avions conçus pour avoir une signature radar inférieure."
 modern_sewerage:0 "Cryptomonnaie"
 modern_sewerage_desc:0 "Une cryptomonnaie, une cryptomonnaie ou une cryptomonnaie est une monnaie numérique conçue pour fonctionner à travers un réseau informatique qui ne dépend d'aucune autorité centrale, comme un gouvernement ou une banque, pour la maintenir ou la maintenir."
 currency_standards:0 "Commerce en ligne"
 currency_standards_desc:0 "L'achat en ligne est une forme de commerce électronique qui permet aux consommateurs d'acheter directement des biens ou des services auprès d'un vendeur sur Internet à l'aide d'un navigateur Web ou d'une application mobile."
 monitor_tech:0 "Navire AI"
 monitor_tech_desc:0 "Navires entièrement contrôlés par l'intelligence artificielle."
 musical_instruments:0 "Instruments de musique"
 musical_instruments_desc:0 "La musique est un élément clé du développement de toute culture et art. À cet égard, l'évolution des instruments de musique qu'une culture crée a d'abord une influence qui fait écho à tous les développements culturels futurs."
 napoleonic_warfare:0 "Guerre par procuration"
 napoleonic_warfare_desc:0 "Les conflits proxy sont des guerres d'influence menées par deux puissances opposées, par le biais de deux puissances plus faibles."
 nationalism:0 "Terrorisme"
 nationalism_desc:0 "Qui suis-je ? C'est une question clé qui va au cœur de l'identité d'une personne. Dans le passé, les gens ont dit qu'ils venaient d'une province, d'une ville ou même d'une famille comme expression de cette identité. Une nouvelle idée s'est développée qui transcende ces notions et voit plutôt l'identité comme une chose qui est partagée entre la nation. De plus, la nation doit être unie en un seul pays."
 natural_selection:0 "Sélection naturelle"
 natural_selection_desc:0 "La sélection naturelle est un mécanisme par lequel les formes de vie évoluent en transmettant des traits héréditaires aux générations futures. Sa découverte explique comment les espèces se présentent et s'adaptent en fonction de leur environnement."
 naval_theory:0 "Théorie navale"
 naval_theory_desc:0 "En appliquant une stratégie aux mouvements navals, il est possible de faire une marine beaucoup plus efficace."
 drydocks:0 "Chantier naval moderne"
 drydocks_desc:0 "La création de zones fermées où les navires peuvent être amarrés en terre sèche permet un entretien plus facile et plus approfondi des navires de charge et des navires de guerre."
 navigation:0 "Construction navale moderne"
 navigation_desc:0 "Par différentes méthodes, des étoiles aux cartes, à la boussole, il est possible de tracer correctement un parcours à travers le monde."
 neoclassicism:0 "Néoclassicisme"
 neoclassicism_desc:0 "La période classique de l'art, du théâtre et de la musique s'étendait de 1750 à 1820, avec des innovations depuis qu'elles étaient qualifiées de néoclassiques. Le nom fait également allusion à l'Antiquité classique, et compare ainsi la haute culture de l'Occident à celle de Rome et de la Grèce, établissant ainsi le pedigree de la classe dirigeante de l'Europe comme maîtres du monde connu."
 nitrogen_fixation:0 "Exploitation minière astroïde"
 nitrogen_fixation_desc:0 "L'exploitation minière astroïde est la collecte de ressources d'astroides dans l'espace"
 nitroglycerin:0 "Pipelines modernes"
 nitroglycerin_desc:0 "Les pipelines modernes permettent le transport du charbon, du pétrole, du GNL (gaz naturel liquéfié) et d'autres liquides sur de vastes distances."
 open_hearth_furnace:0 "Four à coeur ouvert"
 open_hearth_furnace_desc:0 "La production d'acier implique l'élimination des impuretés de la fonte, puis l'ajout d'autres matériaux pour créer la qualité de l'acier que vous recherchez. Pour produire de l'acier, il faut des températures très élevées et le four à foyer ouvert utilise le gaz résiduaire du four pour chauffer les briques et inverser le flux de carburant et d'air passe au-dessus de ces briques pour construire la chaleur du four. Le processus est plus lent que d'autres, mais il est plus facile de contrôler et d'écheller permettant la production de grandes quantités d'acier en un seul lot."
 open_hearth_process:0 "Impression 3D précoce"
 open_hearth_process_desc:0 "Alors que l'impression 3D a commencé dans les années 1980, les années 2000 ont vu son expansion en production à grande échelle. La technologie, qui permet la construction couche par couche de matériaux, a pris de l'ampleur dans des industries comme l'aérospatiale, l'automobile et les dispositifs médicaux."
 opium_dens:0 "Denses d'opium"
 opium_dens_desc:0 "Une tanière d'opium est simplement un endroit où l'opium peut être acheté et fumé. Cependant, il y a des gens qui s'inquiètent que ces tanières soient plus sinistres et soient une source de corruption morale."
 paddle_steamer:0 "Ballistique"
 paddle_steamer_desc:0 "Le missile sait où il est en tout temps. Il le sait parce qu'il sait où il n'est pas, en soustrayant où il est, d'où il n'est pas, ou où il n'est pas, d'où il est, si elle est plus grande, il obtient une différence, ou déviation."
 pan-nationalism:0 "Pan-nationalism"
 pan-nationalism_desc:0 "Through organizations like the EU, de-facto super-states can be formed through trade & economic relations."
 percussion_cap:0 "Fuite d'assaut lourde"
 percussion_cap_desc:0 "Les fusils lourds, comme le SCAR-L, fournissent une grande puissance de feu pour les opérations spéciales."
 percussion_caps:0 "Bouchons de percussion"
 percussion_caps_desc:0 "Les casquettes de percussion prennent des armes à feu auparavant peu fiables et leur permettent de tirer par tous les temps."
 personal_liberty:0 "Liberté personnelle"
 personal_liberty_desc:0 "En plus de la question de savoir comment la société doit être gouvernée, il y a aussi la question de ce qui devrait être au-delà de la gouvernance. L'établissement de libertés individuelles sur lesquelles la tyrannie de la majorité ne peut s'immiscer est un élément crucial des idéaux libéraux."
 social_media:0 "Médias sociaux"
 social_media_desc:0 "Les médias sociaux sont une collection de technologies qui permettent aux utilisateurs de partager de l'information, des idées et du contenu au moyen de communautés et de réseaux virtuels."
 policing_by_consent:0 "Police par consentement"
 policing_by_consent_desc:0 "Sir Robert Peel, alors qu'il était ministre de l'Intérieur, a créé la police métropolitaine, un constabulaire distinct de la gendarmerie des tyrans continentaux parce qu'ils sont des civils agissant dans l'intérêt public plutôt que des soldats réprimant les ennemis politiques."
 political_agitation:0 "Révolutions numériques"
 political_agitation_desc:0 "L'activisme Internet a maintenant le pouvoir de stimuler les grandes révolutions et les événements historiques.."
 political_theory:0 "Théorie politique"
 political_theory_desc:0 "Comment gérer un pays est une question que beaucoup ont commencé à se poser et plusieurs théories ont été élaborées sur ce que serait exactement le meilleur plan pour un État."
 popular_sovereignty:0 "Souveraineté populaire"
 popular_sovereignty_desc:0 "L'autorité d'un État et par extension de son gouvernement ne peut être créée et maintenue que par le consentement de son peuple. Dans un gouvernement libre, les dirigeants sont les serviteurs et le peuple leurs supérieurs et souverains."
 portland_cement:0 "Ciment Portland"
 portland_cement_desc:0 "Ainsi nommé pour sa ressemblance avec la pierre extraite d'une île de Dorset, en Angleterre, ce ciment est un composant efficace en béton, utilisé pour la construction de grandes structures. Il est produit à partir de calcaire et d'autres matériaux communs, ce qui en fait très bon marché."
 potash:0 "Potasse"
 potash_desc:0 "Produite par la combustion du bois et le dépôt des cendres dans un pot d'eau, la potasse est utilisée dans des procédés chimiques tels que la production de verre, de savon, de lys, de poudre à canon et d'engrais. Il donne son nom à l'élément potassium, qui est l'ingrédient actif de ces processus."
 power_looms:0 "Poignées de puissance"
 power_looms_desc:0 "Un métier à tisser est un dispositif pour tisser laine, coton et autres fibres. Les métiers à tisser tôt utilisaient la puissance de main ou de pied pour tourner le fil. La « navette volante » inventée en 1733 est créditée d'avoir stimulé la révolution industrielle, et l'utilisation de la puissance mécanique dans le tissage permet aux tisserands moins qualifiés de produire en masse des tissus. D'autres innovations incluent le métier Jacquard, un système de cartes de punch programmables développé en 1804 pour automatiser les modèles."
 power_of_the_purse:0 "Projection de puissance"
 power_of_the_purse_desc:0 "La projection de puissance utilise des navires pour exercer la force sur d'autres pays par l'intimidation pure."
 pre_modern_warfare:0 "Guerre prémoderne"
 pre_modern_warfare_desc:0 "Les conflits d'antan étaient pâles par rapport aux ravages de la guerre moderne, mais ils étaient encore des affaires sanglantes à part entière."
 production:0 "Production"
 propaganda:0 "Propagande"
 propaganda_desc:0 "Au cours des guerres révolutionnaires et napoléoniennes, les gouvernements européens ont mis en place des ailes de propagande pour obtenir le soutien du public aux difficultés auxquelles sont confrontés les peuples. Des brochures politiques et des caricatures satiriques ont été distribuées dans les villes, tandis que des vers patriotiques ont été écrits pour être chantés à des airs populaires."
 puddling_furnaces:0 "Fours à fourrure"
 puddling_furnaces_desc:0 "Un four à pulvériser est utilisé pour produire du fer forgé à partir de la fonte. Un four à briques est chauffé de façon à ce que le fer fusionne avec le cylindre d'accompagnement, après quoi le mélange est travaillé mécaniquement, par exemple avec un barreau, de sorte que l'excès de carbone dans le fer soit mis en contact avec l'air, formant monoxyde de carbone, tandis que le soufre et d'autres impuretés sont transportés par un laitier plus léger qui monte à la surface. Après deux heures de travail à la main, les « boules de puddle » de forme de fer forgé peuvent être retirées du laitier restant. C'est un travail difficile, compétent et donc coûteux à accomplir."
 quinine:0 "Vaccin contre l'ARNm"
 quinine_desc:0 "Un vaccin contre l'ARNm est un type de vaccin qui utilise une copie d'une molécule appelée ARNm messager (ARNm) pour produire une réponse immunitaire."
 radio:0 "Communication interplanétaire"
 radio_desc:0 "En utilisant des « ondes » invisibles, il est possible de transmettre l'information sur une grande distance plus rapidement que la radio."
 railways:0 "Chemins de fer à grande vitesse"
 railways_desc:0 "Les technologies récentes permettent le transport ultra-rapide des marchandises et des personnes"
 rationalism:0 "Révolution culturelle"
 rationalism_desc:0 "La révolution culturelle des années 60 a stimulé un changement des attitudes sociétales dans le monde entier."
 realism:0 "Caméra numérique"
 realism_desc:0 "Un appareil photo numérique, également appelé digicam, est un appareil photo qui capture des photographies en mémoire numérique."
 reinforced_concrete:0 "BIM"
 reinforced_concrete_desc:0 "La modélisation de l'information sur le bâtiment (BIM) a fait l'objet d'une adoption généralisée au cours des années 2000, c'est-à-dire une représentation numérique des caractéristiques physiques et fonctionnelles d'un bâtiment. Cette technologie de modélisation 3D a permis une planification, une conception et une construction plus efficaces."
 repeaters:0 "Laser"
 repeaters_desc:0 "Les lasers permettent la concentration d'énergie dans certaines directions pour le combat"
 rifling:0 "Fusille de combat légère"
 rifling_desc:0 "Le dernier fusil de combat léger permet à notre pays d'équiper nos soldats de la puissance de feu la plus efficace possible."
 romanticism:0 "Enregistreur de vidéocassette"
 romanticism_desc:0 "L'enregistreur vidéocassette (VCR) ou l'enregistreur vidéo est un appareil électromécanique qui enregistre des enregistrements audio et vidéo analogiques provenant de la télévision ou d'autres sources AV et qui peut lire l'enregistrement après un rembobinage"
 rotary_valve_engine:0 "Intelligence artificielle"
 rotary_valve_engine_desc:0 "L'utilisation de l'IA pour la production en masse de biens"
 rubber_recycling:0 "Recyclage du caoutchouc"
 rubber_recycling_desc:0 "L'utilisation d'un « masticateur » pour mâcher et réformer le vieux caoutchouc nous permet de recycler et de réutiliser ce précieux matériau."
 rubberised_fabrics:0 "Tissus caoutchoutés"
 rubberised_fabrics_desc:0 "En utilisant du caoutchouc naturel pour coller deux tissus ensemble, ou pour combiner des fibres végétales dans une sorte de cuir artificiel, produit des articles imperméables tels que le manteau Mackintosh, ou des vêtements élastiques tels que les bretelles."
 rule_of_law:0 "État de droit"
 rule_of_law_desc:0 "Habituellement présent dans un système de gouvernement avec une constitution écrite (comme aux États-Unis) ou non écrite (comme au Royaume-Uni), l'État de droit se compose d'un groupe d'idées connexes sur la jurisprudence, comme que la violence de l'État soit prévisible, et donc évitable, en demandant au gouvernement de fixer clairement ce qui est illégal et quelle sera la peine pour les crimes; et que les agents de l'État eux-mêmes soient soumis aux lois qu'ils appliquent."
 screw_frigate:0 "Détruire les missiles guidés"
 screw_frigate_desc:0 "Le destroyer de missiles guidé utilise des missiles pour frapper des cibles avant même qu'ils ne connaissent l'existence d'une flotte"
 sea_lane_strategies:0 "Stratégie navale future"
 sea_lane_strategies_desc:0 "Il est probable que les futures stratégies navales tournent autour de l'IA."
 semaphore_signalling:0 "Signalisation du sémaphore"
 semaphore_signalling_desc:0 "Les signaux ferroviaires transmettent des instructions aux trains actifs sur les lignes de chemin de fer, aidant la circulation directe même lorsqu'une locomotive est en mouvement et loin du personnel d'une gare. L'utilisation de signaux sémaphores, inspiré d'un système de signalisation militaire utilisé par les armées de Napoléon, crée un système uniforme que tous les chemins de fer peuvent utiliser."
 separation_of_powers:0 "Séparation des pouvoirs"
 separation_of_powers_desc:0 "L'idée de branches distinctes du gouvernement, avec des rôles différents qui se supervisent mutuellement pour prévenir la corruption et les abus, est devenue beaucoup plus populaire depuis le succès relatif de la « grande expérience américaine », avec sa Constitution scindant le gouvernement en branches exécutive, législative et judiciaire."
 sericulture:0 "Sériculture"
 sericulture_desc:0 "La technique ancienne et étroitement gardée de cultiver les vers à soie pour la production de soie."
 sewage_systems:0 "Systèmes d'égouts"
 sewage_systems_desc:0 "La croissance des villes a conduit à des rivières étouffées d'eaux usées, elles sont devenues noires et sentent la mort. Il est temps de regarder les anciens qui construisent des réseaux d'égouts pour transporter ces eaux mauvaises de la ville."
 shaft_mining:0 "Machines minières"
 shaft_mining_desc:0 "Grâce au déploiement de machines lourdes, nous pouvons rivaliser sur le marché mondial de la production de ressources naturelles."
 shell_gun:0 "Armure réactive"
 shell_gun_desc:0 "Un char de combat principal (MBT), aussi connu sous le nom de char de combat ou char universel ou simplement char, est un char qui remplit le rôle d'incendie direct protégé par les armures et de manœuvre dans de nombreuses armées modernes."
 slag_fertilisers:0 "Engrais de laitier"
 slag_fertilisers_desc:0 "Le faible pH des déchets provenant des hauts fourneaux et des convertisseurs d'acier en fait un excellent ajout au sol à des fins agricoles. Le laitier de chaux silicate est plus soluble que le calcaire naturel ou la dolomite, ce qui augmente la teneur en phosphate du sol."
 socialism:0 "Populisme droit"
 socialism_desc:0 "Le populisme de droite, aussi appelé populisme national et populisme de droite, est une idéologie politique qui combine la politique de droite avec la rhétorique et les thèmes populistes"
 society:0 "Société"
 enclosure:0 "Exploitation agricole efficace"
 enclosure_desc:0 "En s'engageant dans l'agriculture massive, avec l'aide d'un système réglementé par l'État, nous pouvons augmenter notre production suffisamment pour concurrencer le marché mondial."
 intensive_agriculture:0 "Pesticides"
 intensive_agriculture_desc:0 "Produits chimiques utilisés dans la production alimentaire qui éliminent les insectes et les bactéries."
 steam_donkey:0 "Fabrication durable"
 steam_donkey_desc:0 "Avec une prise de conscience accrue de l'impact environnemental, les fabricants ont commencé à adopter des méthodes de production plus durables."
 threshing_machine:0 "Vols spatiaux commerciaux"
 threshing_machine_desc:0 "Augmente l'efficacité de nos panneaux solaires, centrales nucléaires et éoliennes"
 steel_frame_buildings:0 "Hologrammes"
 steel_frame_buildings_desc:0 "L'holographie est une technique qui permet d'enregistrer et de reconstruire un front d'onde. Il est surtout connu comme une méthode de production d'images tridimensionnelles, et a un large éventail d'autres utilisations, y compris le stockage de données, la microscopie et l'interférométrie. En principe, il est possible de faire un hologramme pour tout type d'onde."
 steel_railway_cars:0 "Automobile électrique"
 steel_railway_cars_desc:0 "La recherche et le développement en véhicules autonomes se sont accélérés au cours des années 2000. Le Grand Défi DARPA (2004 et 2005), organisé par le Département de la défense des États-Unis, a marqué une étape importante, mettant en évidence les premières tentatives d'autoconduite."
 stormtroopers:0 "Spécialiste"
 stormtroopers_desc:0 "Avoir des troupes humaines entraînées et équipées spécifiquement pour la destruction de l'IA et la capture d'unités."
 streamliners:0 "Courroies"
 streamliners_desc:0 "De nouvelles conceptions de trains utilisant la puissance de traction moderne et la construction de nouveaux corps en aluminium permettent aux chemins de fer de rouler plus efficacement à des vitesses plus élevées."
 submarine:0 "Futurs sous-marins"
 submarine_desc:0 "Les futurs sous-marins sont guidés par la technologie future, qui permet des frappes dévastatrices."
 multilateral_alliances:1 "Cryonique"
 multilateral_alliances_desc:0 "ryonics est la pratique de préserver les personnes qui sont légalement mortes en les gelant à des températures très basses, avec l'espoir que la future technologie médicale pourrait être en mesure de les raviver et guérir la condition qui a causé leur mort."
 synthetic_dye:0 "Teinture synthétique"
 synthetic_dye_desc:0 "Ceci a incorporé un processus chimique qui a créé différents types de colorant de manière synthétique. Elle a révolutionné la coloration du tissu et a mis fin à la production de colorants agricoles, qui est devenue trop chère à produire."
 system_gin:0 "L'automobile"
 system_gin_desc:0 "Les automobiles permettent le transport rapide de personnes et de marchandises dans les terres."
 telegraph:0 "Télégraphe"
 telegraph_desc:0 "L'électricité peut être utilisée pour passer les signaux presque instantanément, comme avec le code Morse. La principale source de retard est dans l'opérateur humain, qui doit être bien formé pour coder et décoder les messages qui ont été transférés sous forme de "points" et de "dashes" courts et longs."
 telephone:0 "Ville intelligente"
 telephone_desc:0 "L'intégration des dispositifs IoT dans les infrastructures urbaines permet aux villes de surveiller et de gérer en temps réel les ressources comme l'eau, l'électricité, le trafic et les déchets, en améliorant l'efficacité et la durabilité."
 telephones:0 "Téléphones"
 telephones_desc:0 "En théorie, nous avons su que l'idée du télégraphe parlant pourrait être possible, mais nous n'étions pas sûrs comment. Les avancées dans le domaine de l'électronique ont rendu cette idée enfin possible et le téléphone est né."
 tin_cans:0 "Boîtes d'étain"
 tin_cans_desc:0 "Le concept de la nourriture en conserve remonte aux pots en verre utilisés par les armées de la Révolution française. Bientôt, l'idée s'est répandue à l'usage civil. La viande ou la soupe cuite à l'intérieur d'un métal peut être protégée de l'exposition au monde extérieur et peut être consommée à loisir par les ménages de la classe moyenne. Le nom provient de la plaque d'étain, qui a une fine couche d'étain à l'extérieur de la plaque de fer ou d'acier pour protéger le métal contre la rouille en plein air."
 trench_works:0 "Réservoir de reconnaissance"
 trench_works_desc:0 "Dispositifs utilisés pour envoyer des ondes de choc et bloquer les troupes ennemies"
 triage:0 "VTOL Aéronefs"
 triage_desc:0 "Décollage vertical et atterrissage (VTOL) est un type d'aéronef qui peut décoller et atterrir verticalement sans avoir besoin d'une piste"
 urban_planning:0 "Monnaie fiduciaire"
 urban_planning_desc:0 "Les monnaies fiduciaires sont des approvisionnements monétaires qui ne sont pas soutenus par l'or."
 urbanization:0 "Organisations internationales"
 urbanization_desc:0 "Des organisations internationales telles que l ' ONU visent à maintenir la paix et à promouvoir la croissance économique dans le monde entier."
 vaccination:0 "Vaccination"
 vaccination_desc:0 "L'inoculation de personnes avec ce qu'on espérait être des formes moins virulentes d'une maladie était connue depuis des siècles mais était également très risquée. La vaccination, qui impliquait soit l'utilisation d'une maladie moins dangereuse mais connexe, soit le traitement des agents des maladies, de sorte qu'ils ont perdu la capacité d'infecter, était beaucoup plus sûre et beaucoup plus fiable."
 vacuum_canning:0 "Fabrication de maigres"
 vacuum_canning_desc:0 "La fabrication lean, concept apparu dans les années 90, est axée sur la réduction des déchets et l'amélioration de l'efficacité des systèmes de production. Il met l'accent sur l'amélioration continue des processus en éliminant les activités sans valeur ajoutée, en améliorant la qualité et en augmentant la satisfaction de la clientèle."
 vulcanization:0 "Drones autonomes"
 vulcanization_desc:0 "Les drones de livraison ont progressé au-delà des étapes expérimentales, avec des entreprises comme Amazon et Wing testant des systèmes commerciaux de livraison de drones, capables de déplacer les paquets rapidement et efficacement dans les zones urbaines et rurales."
 wargaming:0 "Simulations de combat"
 wargaming_desc:0 "En se moquant de scénarios de guerre imaginaires et en pratiquant une stratégie, il est possible d'améliorer les capacités de combat des officiers."
 water_treatment:0 "Traitement de l'eau"
 water_treatment_desc:0 "L'eau transporte des maladies dans nos maisons. Toujours la science a la réponse, nous pouvons simplement rendre l'eau propre à nouveau par l'application de la filtration et des traitements chimiques."
 wood_pulp_papermaking:0 "Bois de pâte à papier"
 # gold_standard_desc: "This meant a currency system based on gold. Money was rather expensive to produce by the government and this could sometimes result in a low of money stock. However, the good thing was that the gold prices were rather stable and the trust in gold was high, making the currency stable."
 # savings_banks_desc: "The middle-class is growing larger and wealthier thanks to education and a strong work ethic. Many individuals wish to be part of railways through Africa; dams across the Nile; fleets of ocean Greyhounds; majestic, self-amortizing canals; plantations of ripening tea; all from tuppence prudently, fruitfully, frugally invested (to be specific) in the Dawes-Tomes-Mousely-Grubbs Fidelity Fiduciary Bank."
 # silver_standard_desc: "This meant a currency system based on silver. Money was cheaper to produce by the government which meant that there was rarely any lack of money in the country. However, the problem was that the silver prices had a tendency to be dominated by gold prices, which meant that foreign trade was often suffering."
#  acidic_and_basic_converters: "Acidic and Basic Converters"
#  acidic_and_basic_converters_desc: "The original Bessemer converters had a lining of insulating clay between the walls and the molten iron. The #clay is acidic and affects the composition of the resulting steel. By replacing the clay with basic (alkaline) materials such as magnesite, chromite or dolomite, or more acidic materials such as ganister, the process can be fine tuned to remove even more impurities, depending upon the content of the iron ore."
#  fluid_compressed_steel: "Fluid Compressed Steel"
#  fluid_compressed_steel_desc: "This process involves the use of a hydraulic forging press to put the steel under great pressure while still a #fluid. This squeezes the tiny pockets of gas impurities out of the cooling ingots, allowing for a much higher quality steel by preventing the #formation of blowholes and piping."
#  global_trade_desc: "By the end of the 18th century, the world-system had encompassed almost the entire globe, with raw materials being imported #from the colonies and peripheral nations and turned into finished goods in the global core, to be exported in turn."
#  guilds: "Guilds"
#  guilds_desc: "The guild system was a way of organizing labor which mandated participation in the guild and in advancing through its ranks in order #to practice the guild trade within a city. While it protected the living standards of the guild members and supposedly ensured better quality #work, it also raised prices and stymied innovation."
#  hydraulic_forging_press: "Hydraulic Forging Press"
#  hydraulic_forging_press_desc: "A hydraulic forging press applies applies massive force, up to thousands of pounds per square inch, to a material #that is being worked while hot. An engine drives water, air or hydraulic fluid through valves connected to a piston, which in turn presses the #die onto the material. The valves can be turned on and off by the operator, allowing the material to be manipulated and precise amounts of force #applied at will."
#  mutualism_desc: "An economic theory usually associated with anarchism, mutualism opposes capital interest but advocates free markets and advocates #the formation of  mutual savings banks as a method for loans."
#  news_agencies: "News Agencies"
#  news_agencies_desc: "Organizations which sell news reports to various media, such as newspapers. This allows for media to include reports of #events and developments beyond the reach of their own bureaus and international news to be reported even in local media."
#  one-nationism: "One-nationism"
#  one-nationism_desc: "A type of conservative politics wherein social obligation and responsibility towards the poor and needy is combined with #traditional conservative ideals. Opposed to class struggle, one-nation conservatives seek to create a hierarchy wherein the classes support each #other."
#  percussion_oil_drilling: "Percussion Oil Drilling"
#  percussion_oil_drilling_desc: "When using a percussion drill, the drill-bit is raised by hand and then released to bite into the earth under the #force of gravity. Depths of up to around thirty metres are possible using this technique."
#  private_banks: "Private Banks"
#  private_banks_desc: "The wealthy merchant families of city states, and the royal families of European monarchies, need somewhere safe to keep #their piles of gold and someone to look after their finances. The first banks were created with this goal in mind."
#  ricardian_economics: "Ricardian Economics"
#  ricardian_economics_desc: "David Ricardo formalized several concepts that made up the Classical School of Economics, such as economic rent, the #labor theory of value, and comparative advantage."
#  self_acting_looms_desc: "Gradual improvements in loom technology have transformed the weaving industry and vastly increased the output of fabrics #factories. By using mechanical power for more and more operations, the role of the weaver is reduced to merely keeping the machine running and #clearing blockages. Children are especially useful for this as they can crawl into smaller spaces than adults. Shutting the machines down while #such work is carried out has been judged to be less profitable than allowing for the occasional child to be mangled."
#  smithian_economics: "Smithian Economics"
#  smithian_economics_desc: "Building upon the ideas of the earlier Physiocrats, with their agrarian opposition to the 'unproductive labor' of the #feudal system, Adam Smith led an attack on mercantilism which founded the Classical School of Economics."
#  steam_engines: "Steam Engines"
#  steam_engines_desc: "Pioneers in steam technology usually had uses other than locomotion in mind. For example, Richard Trevithick built huge #engine houses that dot the Cornish landscape to keep the tin mines free from flooding."
#  steam_hammer: "Steam Hammer"
#  steam_hammer_desc: "Hammering out metals is useful for both shaping and alloying the material. When used on pig iron, this creates wrought iron or #mild steel, the difference being how much carbon is left in the alloy. The use of steam means both more efficiency and better precision than #hammering out the alloy by hand."
#  steam_lathes: "Steam Lathes"
#  steam_lathes_desc: "The lathe is a machine used for boring holes of various shapes and sizes into materials, or for otherwise whittling them down #symmetrically. Exploiting steam power to drive lathes allows industry to use more precision in engineering."
#  stock_exchanges: "Stock Exchanges"
#  stock_exchanges_desc: "Organized trading of financial instruments dates back to the Italian city states and the Dutch Republic. A stock exchange #brings together buyers and sellers of assets such as government debt and shares in companies."#
#  tunnelling_shields: "Tunnelling Shields"
#  tunnelling_shields_desc: "When digging a mine shaft or railway tunnel, supporting the vast weight of the earth above the workers is vital for the #integrity of the project. A tunnelling shield is a mobile structure made of steel that provides temporary support on the active site of digging. #As the tunnelling shield is moved along, such as on a railway track, a more permanent support is laid, such as brickwork or timbers. The first #use of such a device was in the construction of the Thames Tunnel in 1825 by Anglo-French engineer Marc Isambard Brunel, the father of the more #famous Isambard Kingdom Brunel."
# alienation: "Alienation"
# alienation_desc: "The creation of the capitalist means of production has fundamentally altered the relationship of the worker to his work. No longer is he the craftsmen who creates something unique or the farmer who gains a share of the produce. In his production he is able to objectify his individuality and his character. Now though the capitalist means of production estranges a person from their very humanity, they are no longer the director of their own actions and through that they gain a profound sense of alienation."
# experimental_psychology: "Experimental Psychology"
# experimental_psychology_desc: "The human mind is a very complicated things, what do people experience when they receive a sensory stimulus and is it the same for you as it is for me? Trying to measure these things is no easy manner, but the recent advancements in the field of psychology have created a new field called experimental psychology where tests can be done to see how people react to stimuli."
# global_trade: "Global Trade"
# historical_materialism: "Historical Materialism"
# historical_materialism_desc: "What is society? This is a complicated question but if we were to define society as the union of the productive capacity and the relationships people have to the means of production we can begin to analyze past societies and how they have developed and evolved over time. We call this methodological approach Historical Materialism."
# individualism_desc: "A philosophy focused on the interests, happiness and autonomy of the individual. This includes the right of the individual to pursue its own self-interest, conclude for itself what is true and false, to think and act independently of society."
# institutionalization: "Institutionalization"
# institutionalization_desc: "If we want to expand the role of the state we need to expands the means the state has to deliver these roles. The building up the institutions of the state are the means to doing this. This steadily institutionalization of functions that were previously in the private sphere also bring along profound societal changes as well."
# pragmatism: "Pragmatism"
# pragmatism_desc: "The problem with philosophers is that they seek knowledge for knowledge sake and they also seek to create a nice unchanging universe to suit their theories. Pragmatism explicitly rejects these two tenants. Knowledge should actually be viewed only from the point of view of what practical use it has and we should accept that the universe itself is ever changing."
# religion_of_humanity: "Religion of Humanity"
# religion_of_humanity_desc: "The rise of secularism has started to free our people from the chains of superstition that religion forces on people but at the same time we lost the societal cohesion that organized religion provided. The religion of humanity offers the social cohesion of organized religion without the superstition. The cynics describe at as Catholicism minus Christianity but it also offers all the things a religion should."
# self_acting_looms: "Self-Acting Looms"
# transcendentalism: "Transcendentalism"
# transcendetalism_desc: "Transcendentalism was a philosophical movement that was founded by the German philosopher Immanuel Kant in his book Critique of Pure Reason published in 1781. It has also been described as critical philosophy as it sees philosophy's role as that of criticism rather than justification of knowledge. The task of philosophy shifts for being about establishing theories about knowledge and instead subjecting these theories to critical review to see who valid they are."
##marketing: "Marketing"
#individualism: "Individualism"
#mutualism: "Mutualism"
#vitamins: "Vitamins"
#vitamins_desc: "By isolating certain nutrients that the body needs, it is possible to make sure that more people have a healthy and balanced diet."

 central_archives:0 "Archives numériques"
 central_archives_desc:1 "Une archive numérique est un site Web créé dans le but de préserver les données pour une utilisation ultérieure."
 steelworking:0 "Raffineries offshore"
 steelworking_desc:1 "Le raffinage du pétrole permet de créer des carburants efficaces pour les véhicules, l'électricité et le plastique"
 prospecting:0 "FOREXE"
 prospecting_desc:1 "L'échange de devises contre un profit."
 baking_powder:0 "Options végétariennes"
 baking_powder_desc:1 "Les viandes à base de plantes permettent à notre population végétarienne de prospérer avec des produits une fois introuvables"
 mechanical_tools:0 "Agriculture industrielle"
 mechanical_tools_desc:1 "L'élevage en usine permet la production massive de viande par la cruauté animale"
 rubber_mastication:0 "Technologies avancées de sondage"
 rubber_mastication_desc:1 "Les systèmes de balayage LiDAR (Light Detection and Ranging) ont été utilisés pour créer des modèles 3D très précis des chantiers, tandis que l'équipement GPS a contribué à améliorer la précision des travaux d'excavation, de classement et d'autres travaux de chantier."
 pumpjacks:0 "Fret électrique"
 pumpjacks_desc:1 "Comme pour les voitures électriques, les camions-conteneurs électriques permettent la livraison sans émission des marchandises aux emplacements"
 shift_work:0 "Chaîne de blocs"
 shift_work_desc:1 "Les blockchains sont le traçage de l'origine des marchandises dans une chaîne d'approvisionnement par la technologie informatique. L'adoption de la blockchain par des entreprises comme Walmart et IBM à la fin des années 2000 a contribué à assurer la transparence de l'approvisionnement alimentaire, améliorant ainsi la confiance des consommateurs."
 paved_roads:0 "Ville verte"
 paved_roads_desc:1 "Villes entièrement vertes et automatisées"
 pasteurization:0 "Viandes de laboratoire"
 pasteurization_desc:1 "La production massive de viandes cultivées en laboratoire"
 pneumatic_tools:0 "Megastructures"
 pneumatic_tools_desc:1 "La construction de mégastructures via l'IA, l'impression 3D, et la métaverse."
 steam_turbine:0 "Béton carboné-neutral"
 steam_turbine_desc:1 "Béton ne produisant pas de pollution"
 plastics:0 "Co-bottes"
 plastics_desc:1 "Robots collaboratifs (Cobots) : Cobots travaille aux côtés des humains dans des contextes de fabrication, aidant à des tâches comme l'assemblage, la manutention des matériaux et l'inspection de la qualité, ce qui augmente la productivité et réduit les risques."
 dough_rollers:0 "Aliments imprimés en 3D"
 dough_rollers_desc:1 "La production rapide de tous les aliments via des ordinateurs automatisés"
 oil_turbine:0 "Bioplastiques"
 oil_turbine_desc:1 "Solutions plastiques sûres et respectueuses de l'environnement."
 standing_army:0 "Doctrine de l'armée de guerre froide"
 standing_army_desc:1 "Les défis complexes que posent la politique étrangère et les troubles intérieurs ne peuvent plus être réglés par des milices hâtées. Les temps modernes exigent une armée prête à agir en tout temps."
 mandatory_service:0 "Aéroglisseur"
 mandatory_service_desc:1 "L'invention de l'hélicoptère permet des options d'attaque et de soutien en hélicoptère."
 military_drill:0 "Exercices de combat"
 military_drill_desc:1 "Comme le dit le dicton, « la pratique rend parfait », et c'est aussi vrai pour les soldats que pour les musiciens. Il n'y a pas d'armée plus prisée par les généraux qu'une armée capable de réagir à tous les commandements instantanément et sans confusion."
 line_infantry:0 "Infanterie d'assaut"
 line_infantry_desc:1 "Les soldats équipés d'un équipement normalisé et entraînés par des méthodes normalisées donnent une plus grande uniformité à une armée, ce qui lui donne une plus grande fiabilité."
 logistics:0 "GPS"
 logistics_desc:1 "Le Système mondial de positionnement (GPS) est un système de satellites qui fournit des capacités de positionnement critiques aux utilisateurs militaires, civils et commerciaux du monde entier."
 electric_telegraph:0 "Gun d'assaut"
 electric_telegraph_desc:1 "Les canons d'assaut modernes peuvent être utilisés de la même façon qu'une IFV pour aider les opérations d'infanterie."
 enlistment_offices:0 "Satellite d'attaque"
 enlistment_offices_desc:1 "Les satellites d'attaque peuvent détruire d'autres satellites à des fins de combat"
 military_statistics:0 "Autonome Jet-Fighter"
 military_statistics_desc:1 "Chasseurs à réaction entièrement contrôlés par l'intelligence artificielle"
 self_propelled_torpedoes:0 "Sous-marin autonome"
 self_propelled_torpedoes_desc:1 "Les sous-marins autonomes sont un type de navire entièrement contrôlé par des sous-marins."
 war_propaganda:0 "Propagande générée automatiquement"
 war_propaganda_desc:1 "Convaincre une population de consacrer son temps, ses ressources et son sang, tout cela pour la victoire, est un champ de travail tout seul."
 nco_training:0 "Hélicoptère autonome"
 nco_training_desc:1 "Hélicoptères entièrement contrôlés par des drones."
 destroyer:0 "Détruire le futur"
 destroyer_desc:1 "Les navires plus légers, équipés de torpilles et de canons plus petits, sont tout aussi importants dans les marines modernes que les navires de fortune."
 landing_craft:0 "Systèmes d'ordinateurs intégrés à l'IA"
 landing_craft_desc:1 "Systèmes informatiques intégrés AI pour nos navires"
 flamethrowers:0 "Pathogènes manufacturés"
 flamethrowers_desc:1 "Un pathogène fabriqué est une maladie créée dans un laboratoire dans le but de tuer autant de personnes que possible."
 banking:0 "Courriel"
 banking_desc:1 "L'email (court pour le courrier électronique; e-mail orthographié alternativement) est une méthode de transmission et de réception des messages au moyen d'appareils électroniques."
 academia:0 "Digitalisation"
 academia_desc:1 "La numérisation du monde grâce aux progrès de la technologie des systèmes informatiques."
 international_relations:0 "La pilule"
 international_relations_desc:1 "Les pilules ou les antibiotiques sont des capsules consommables qui visent à engourdir les symptômes des affections médicales. La pilule fait souvent référence à l'invention de la lutte contre la bidité, ce qui permet une croissance démographique plus élevée."
 stock_exchange:0 "Mondialisation économique"
 stock_exchange_desc:1 "La mondialisation économique est l'intégration croissante des économies du monde entier, qui implique l'échange de biens, de services, de capitaux, de technologies et de personnes."
 medical_degrees:0 "Disque compact"
 medical_degrees_desc:1 "Le disque compact (CD) est un format de stockage de données de disque optique numérique qui a été co-développé par Philips et Sony pour stocker et jouer des enregistrements audio numériques."
 organized_sports:0 "Opérations antiterroristes"
 organized_sports_desc:1 "La formation à la lutte contre le terrorisme (parfois appelée formation à la lutte contre le terrorisme ou préparation à la lutte contre le terrorisme) s'attaque à la menace d'une attaque terroriste imminente en fournissant des méthodes de sensibilisation, de préparation, de prévention et d'intervention."
 central_banking:0 "La gauche moderne"
 central_banking_desc:1 "La politique de gauche décrit l'éventail des idéologies politiques qui soutiennent et cherchent à réaliser l'égalité sociale et l'égalitarisme"
 corporate_charters: "Libéralisme des entreprises"
 corporate_charters_desc: "Le libéralisme d'entreprise est une thèse en historiographie des États-Unis et un outil pour son impérialisme de porte ouverte dans lequel l'élite d'entreprise deviennent à la fois les principaux bénéficiaires et les principaux lobbyistes pour la réglementation soi-disant anti-business"
 joint_stock_companies: "Théorie monétaire moderne"
 joint_stock_companies_desc: "La théorie monétaire moderne ou la théorie monétaire moderne (MMT) est une théorie macro-économique hétérodoxe qui décrit la monnaie comme un monopole public et le chômage comme une preuve qu'un monopole monétaire limite excessivement la fourniture des actifs financiers nécessaires pour payer les impôts et satisfaire les désirs de l'épargne."
 investment_banks: "Conseillers financiers AI"
 investment_banks_desc: "Robo-conseillers utilisent des algorithmes et de l'intelligence artificielle (IA) pour fournir des services de planification financière avec une intervention humaine minimale"
 corporate_management: "Gouvernance de l'Internet"
 corporate_management_desc: "Permet au gouvernement de prendre le plein contrôle de l'internet"
 dialectics:0 "Influenceurs"
 dialectics_desc:1 "Un influenceur, également connu sous le nom d'influenceur des médias sociaux, est un type de célébrité Internet qui est influent et bien connu sur les médias sociaux. Le référent moderne du terme est généralement un rôle rémunéré dans lequel une entité commerciale paie pour l'activité d'influence sur les médias sociaux pour promouvoir ses produits et services, connu sous le nom de marketing influenceur."
 psychiatry:0 "Mèmes"
 psychiatry_desc:1 "Un meme Internet, ou meme, est un objet culturel (comme une idée, un comportement ou un style) qui se répand sur Internet, principalement par le biais de plateformes de médias sociaux."
 postal_savings:0 "Titres hypothécaires"
 postal_savings_desc:1 "Un prêt hypothécaire subprime est un type de prêt qui est accordé à des personnes qui ne satisfont pas aux exigences typiques d'un prêt hypothécaire d'une banque ou d'une caisse de crédit traditionnelle."
 human_rights:0 "Bien-être animal"
 human_rights_desc:1 "Les positions sur le bien-être des animaux affirment que les animaux doivent être protégés de certaines activités humaines."
 mutual_funds:0 "Gigeconomie"
 mutual_funds_desc:1 "En janvier 2021, une courte compression du stock du détaillant américain de jeux vidéo GameStop et d'autres titres a eu lieu, entraînant des conséquences financières importantes pour certains fonds spéculatifs et des pertes importantes pour les vendeurs courts."
 zeppelins:0 "Vaisseau"
 zeppelins_desc:1 "Les vaisseaux spatiaux permettent le transport rapide des êtres humains et des biens entre les planètes"
 international_exchange_standards:0 "Marché solaire"
 international_exchange_standards_desc:1 "Le marché boursier a été étendu à l'espace extérieur"
 psychoanalysis:0 "Neuroplasie"
 psychoanalysis_desc:1 "La neuroplastie est l'étude de la façon dont les neurones forment des connexions dans le cerveau."
 philosophical_pragmatism:0 "Cyberguerre"
 philosophical_pragmatism_desc:1 "La cyberguerre est une série de cyberattaques ou de contre-attaques entre États-nations ou organisations internationales visant à endommager ou à perturber les ordinateurs, les réseaux ou les systèmes d'information d'un autre pays."
 modern_financial_instruments:0 "Fonds de couverture numérique"
 modern_financial_instruments_desc:1 "Les méthodes d'argent continuent de croître et de proliférer. Certaines méthodes peuvent impliquer de l'argent circulant dans une pyramide vers le haut, mais toutes impliquent de plus en plus d'argent circulant tout le temps."
 macroeconomics:0 "Économie numérique"
 macroeconomics_desc:1 "Étude de l'économie en ligne et des économies de services électroniques."
 behaviorism:0 "Thérapie psychédélique"
 behaviorism_desc:1 "La recherche sur le potentiel thérapeutique des substances psychédéliques (comme la psilocybine, la MDMA et la LSD) a pris une grande ampleur. Ces substances sont étudiées pour leurs effets sur des affections comme le trouble de stress post-traumatique (TSPT), la dépression, l'anxiété et la toxicomanie."
 analytical_philosophy:0 "Téléthérapie"
 analytical_philosophy_desc:1 "Téléthérapie et counseling à distance : La télésanté, qui a explosé pendant la pandémie de COVID-19, continue de croître comme moyen pratique d'accéder à la thérapie à distance."
 electrical_capacitors:0 "Nanomatériaux"
 electrical_capacitors_desc:0 "La capacité de manipuler des matériaux à l'échelle nanométrique (milliards de mètres) conduit à des percées dans plusieurs industries. Le graphène, une seule couche d'atomes de carbone, est l'un des nanomatériaux les plus prometteurs, offrant une force, une conductivité et une flexibilité exceptionnelles."
 corporatism:0 "Le post-néolibéralisme"
 corporatism_desc:0 "Avec la fin du néolibéralisme, la société vise à améliorer le système capitaliste actuel."
 drone_carrier:0 "Drone Carrier"
 drone_carrier_desc:0 "Les porte-drones, comme les porte-avions d'aujourd'hui, portent des essaims de drones et lancent des attaques dévastatrices contre nos ennemis."
