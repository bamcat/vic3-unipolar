 alert_facing_un_sanctions_name: "Faire face à [concept_united_nations] Des actions !"
 alert_facing_un_sanctions_hint: "En raison de nos actions récentes, le [concept_united_nations] a imposé de sévères restrictions économiques à notre pays à la suite d'un vote tendu entre l'Assemblée générale et les membres du Conseil de sécurité."
 
 alert_facing_un_condemnation: "Condamné par le [concept_united_nations]!"
 alert_facing_un_sanctions_hint: "En raison de nos actions récentes, le [concept_united_nations] a clairement indiqué que le monde s'oppose à notre position diplomatique dans une dure lettre de condamnation. Cela réduira la volonté des autres pays de travailler avec nous pendant une courte période."
 
 alert_can_produce_nuclear_missile_name: "Peut produire $concept_nuclear_weapon$"
 alert_can_produce_nuclear_missile_hint: "Nous pouvons produire $concept_nuclear_weapon$"
 
 alert_country_un_vote_active_name: "Un vote [concept_united_nations] est actuellement actif."
 alert_country_un_vote_active_hint: "Nous devons prendre notre décision sur la résolution actuelle [concept_united_nations]."
