 un_events.4.d: "Le Conseil de sécurité des Nations unies a voté contre l'envoi de soldats de la paix."
 un_events.4.a: "Nous sommes seuls."

 un_events.10.t: "Membre du Conseil de sécurité élu par roulement"
 un_events.10.d: "L'Assemblée générale des Nations Unies a élu un nouveau membre suppléant au Conseil de sécurité : [un_rotating_member.GetName]."
 un_events.10.a: "Noté."
 
