 ### EVENTS
 ### ══════════════════════════════════════════

 opec_events.1.t: "Ouverture du vote de l'OPEP"
 opec_events.1.d: "Une nation membre a demandé un vote au sein de l'Organisation des pays exportateurs de pétrole. Tous les membres sont invités à voter par l'intermédiaire du journal de l'OPEP."
 opec_events.1.a: "Nous examinerons notre position."

 opec_events.10.t: "Crédit de l'OPEP"
 opec_events.10.d: "Le vote de l'OPEP s'est achevé et les résultats sont en train d'être atteints."

 opec_events.11.t: "L'OPEP augmente la production"
 opec_events.11.d: "Les Etats membres de l'OPEP ont voté pour une augmentation des quotas de production pétrolière. Pour l'année prochaine, tous les pays membres bénéficieront d'un meilleur rendement d'extraction et d'un meilleur positionnement commercial pour les exportations de pétrole."
 opec_events.11.a: "Les robinets sont ouverts"

 opec_events.12.t: "L'OPEP coupe la production"
 opec_events.12.d: "Les États membres de l'OPEP ont voté pour la réduction des quotas de production de pétrole. Pour l'année prochaine, tous les pays membres limiteront leur production de pétrole afin de resserrer l'offre mondiale et de soutenir les prix."
 opec_events.12.a: "Nous nous conformerons"

 opec_events.13.t: "Embargo pétrolier de l'OPEP"
 opec_events.13.d: "L'Organisation des pays exportateurs de pétrole a voté pour imposer un embargo pétrolier. Les États membres de l'OPEP limiteront collectivement les exportations de pétrole à la nation visée, ce qui perturbera gravement leur économie."
 opec_events.13.a: "Cela remodelera le commerce mondial"

