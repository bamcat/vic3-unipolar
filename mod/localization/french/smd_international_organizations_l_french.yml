 un_events.5.t: "Participer à la mission de maintien de la paix de [GetGlobalVariable('peacekeeper_requestor').GetCountry.GetName]?"
 un_events.5.d: "Le Conseil de sécurité de l'ONU a voté en faveur de l'envoi d'une mission de maintien de la paix à [GetGlobalVariable('peacekeeper_requestor').GetCountry.GetName]. Les membres de l'Assemblée générale se sont réunis pour discuter des pays qui sont disposés à envoyer leurs hommes dans la mêlée dans l'intérêt de la paix mondiale."
