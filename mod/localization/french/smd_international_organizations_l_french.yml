 eu_deeper_trade_ties_desc: "L'intégration économique élargie au sein de l'Union européenne a stimulé le volume des échanges et amélioré l'accès aux marchés entre les États membres."

 eu_cultural_exchange: "Échange culturel de l'UE"
 eu_cultural_exchange_desc: "L'adhésion à l'Union européenne a favorisé la compréhension culturelle, la migration et la diffusion de nouvelles idées et technologies."
 je_eu_membership_request: "Demande d'adhésion à l'UE"
 je_eu_membership_request_reason: "Votre gouvernement a présenté une demande officielle d'adhésion à l'Union européenne.\n\n Ce processus implique de longues négociations, des réformes politiques et l'alignement sur les lois et les normes de l'UE. Au cours des prochaines années, votre pays sera évalué sur sa stabilité économique, sa gouvernance, ses droits de l'homme et son adhésion aux principes démocratiques.\n\nUne adhésion réussie vous accorderait :\n- Accès au marché unique de l'UE<xid=5/>- Libre circulation des biens, des services, des capitaux et des personnes avec d'autres États membres\n- Participation aux organes de décision de l'UE\n\n Toutefois, le processus est politiquement sensible et peut rencontrer une résistance tant au niveau national que de la part des membres actuels de l'UE."
