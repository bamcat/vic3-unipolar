 notification_io_join_request_sent_notification_name: "Demande présentée"
 notification_io_join_request_sent_notification_desc: "Nous avons présenté une demande de participation à l'organisation."
 notification_io_join_request_sent_notification_tooltip: "#header $notification_io_join_request_sent_notification_name$#!\n$TOOLTIP_DELIMITER$\n$notification_io_join_request_sent_notification_desc$"

 notification_io_left_org_notification_name: "Organisation de gauche"
 notification_io_left_org_notification_desc: "Nous nous sommes retirés de l'organisation. Nos relations avec les anciens membres se sont détériorées."
 notification_io_left_org_notification_tooltip: "#header $notification_io_left_org_notification_name$#!\n$TOOLTIP_DELIMITER$\n$notification_io_left_org_notification_desc$"

