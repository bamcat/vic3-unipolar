 ### ══════════════════════════════════════════
 ### UPDATED ORG DESCRIPTIONS reflecting mechanics
 ### ══════════════════════════════════════════
 
 io_nato_desc: "Le [concept_nato] est un [concept_military_defense_agreement] liant les nations nord-américaines et européennes à la défense collective. Une attaque armée contre un membre est considérée comme une attaque contre tous. L'adhésion à l'OTAN crée automatiquement des traités de pacte de défense mutuelle avec chaque État membre existant."
 
 io_opec_desc: "Le [concept_opec] est une organisation des principaux pays exportateurs de pétrole qui coordonne les politiques de production pétrolière. Les États membres bénéficient d'un pouvoir de tarification des ententes, d'un avantage commercial important sur les exportations de pétrole et d'un meilleur rendement d'extraction grâce à des investissements coordonnés."
 
 io_eec_desc: "Le [concept_eec] est un [concept_free_trade_agreement] établissant une union douanière entre les États membres européens. Les membres partagent un marché commun avec une réglementation normalisée des produits et des politiques commerciales coordonnées, ce qui réduit les obstacles au commerce transfrontalier."
 
 io_arab_league_desc: "Le [concept_arab_league] est un [concept_cultural_pact] des nations arabes qui favorise la coopération politique, économique, culturelle et sociale. Le patrimoine partagé accélère l'échange de technologies et d'idées, tandis que la solidarité des Etats membres contribue à supprimer les pressions révolutionnaires internes."
 
