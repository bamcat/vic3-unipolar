l_french:
 # United Nations
 je_united_nations: "Organisation des Nations Unies"
 je_united_nations_reason: "\n\nLes Nations Unies servent d'organisme international pour la diplomatie, le maintien de la paix et les efforts humanitaires.\n\nMembres permanents du Conseil de sécurité :\n- [GetGlobalVariable('permanent_members_1').GetCountry.GetName]\n- [GetGlobalVariable('permanent_members_2').GetCountry.GetName]\n- \n- [GetGlobalVariable('permanent_members_4').GetCountry.GetName]- \n- [GetGlobalVariable('permanent_members_5').GetCountry.GetName]\n\n\n L'Organisation des Nations Unies sert d'organe international pour la diplomatie, le maintien de la paix et les efforts humanitaires. Les décisions de l'ONU - en particulier du Conseil de sécurité - peuvent influencer directement les événements futurs dans votre pays."

 # ── PROPOSE BUTTON ────────────────────────
 
 un_propose_motion_button: "Proposer une résolution"
 un_propose_motion_button_desc: "Proposer une résolution de l'ONU sur laquelle tous les États membres voteront. Si la résolution est adoptée, tous les pays recevront ses effets pendant cinq ans. Ne peut être proposé qu'une fois par an."
 un_no_motion_active_tt: "Aucune résolution n'est actuellement à l'examen."
 
 # ── VOTE BUTTONS ─────────────────────────
 
 un_vote_yay_button: "Vote en faveur"
 un_vote_yay_button_desc: "Faites voter [ROOT.GetCountry.GetName] en faveur de la résolution actuelle. Les membres du Conseil permanent de sécurité votent pour deux poids."
 
 un_vote_nay_button: "Vote contre"
 un_vote_nay_button_desc: "Faites voter [ROOT.GetCountry.GetName] contre la résolution actuelle. Les membres du Conseil permanent de sécurité votent pour deux poids."
 
 # ── MOTION EVENTS ────────────────────────
 
 un_events.100.t: "Nations Unies — Proposer une résolution"
 un_events.100.d: "En tant que membre de l'Organisation des Nations Unies, [ROOT.GetCountry.GetName] peut proposer une résolution sur laquelle l'Assemblée générale votera. Sélectionnez la résolution à soumettre pour débat. Tous les Etats membres seront notifiés et pourront voter en utilisant les boutons de la rubrique des Nations Unies."
 un_events.100.a: "Résolution sur la protection de l ' environnement"
 un_events.100.b: "Résolution sur la paix dans le monde"
 un_events.100.c: "Résolution sur le développement économique"
 un_events.100.e: "Résolution sur la technologie de l'UNESCO"
 
 un_events.101.t: "Nations unies — Résolution en débat"
 un_events.101.d: "Une résolution a été proposée à l ' Assemblée générale des Nations Unies. [ROOT.GetCountry.GetName] peut voter en utilisant les boutons Yay ou Nay dans l'entrée du journal des Nations Unies. Les membres du Conseil permanent de sécurité votent pour deux poids. Le résultat sera annoncé dans 120 jours."
 un_events.101.a: "Compris — nous allons délibérer"
 
 # ── NOTIFICATIONS ─────────────────────────
 
 un_motion_passed: "Résolution adoptée"
 un_motion_passed_desc: "Une résolution de l'ONU a été adoptée. [ROOT.GetCountry.GetName] recevra ses effets pour les cinq prochaines années."
 
 un_motion_failed: "La résolution de l'ONU a échoué"
 un_motion_failed_desc: "Une résolution de l ' ONU n ' a pas été adoptée. La proposition n'a pas reçu un appui suffisant."
 
 # ── PROGRESS BAR ─────────────────────────
 
 un_je_no_motion_tt: "Aucune résolution n'est actuellement en discussion. Utilisez le #bold Proposer un bouton Résolution#! pour présenter une motion à l'Assemblée générale."
 
 un_je_voting_environment_tt: "#bold Résolution sur la protection de l'environnement — vote en cours.#! Les États membres votent. Utilisez les boutons Yay ou Nay ci-dessous pour voter. Le résultat sera annoncé à la clôture de la période de vote."
 
 un_je_voting_peace_tt: "#bold Résolution sur la paix dans le monde — vote en cours.#! Les États membres votent. Utilisez les boutons Yay ou Nay ci-dessous pour voter. Le résultat sera annoncé à la clôture de la période de vote."
 
