  ### ══════════════════════════════════════════
 ### AMNESTY INTERNATIONAL
 ### ══════════════════════════════════════════

 ngo_events.1.t: "Amnesty International condamne nos politiques"
 ngo_events.1.d: "Amnesty International a publié un rapport damnant sur les droits de l'homme de notre pays, citant nos lois actuelles comme une violation systématique des libertés fondamentales. La communauté internationale en a pris note, et notre gouvernement fait face à des pressions croissantes pour répondre à ces préoccupations."
 ngo_events.1.a: "Leur critique ne change rien"
 ngo_events.1.b: "Nous examinerons leurs préoccupations"

 ngo_events.2.t: "Amnesty International loue la réforme"
 ngo_events.2.d: "Nos récentes réformes législatives ont été reconnues par Amnesty International comme un pas important en avant pour les droits de l'homme. Leur rapport annuel souligne nos progrès et renforce la réputation internationale de notre pays."
 ngo_events.2.a: "Nous sommes fiers de nos progrès"

 ngo_events.3.t: "Rapports d'amnistie sur les troubles civils"
 ngo_events.3.d: "Amnesty International a publié un rapport spécial sur les troubles civils qui frappent notre pays. Ils demandent à notre gouvernement de s'attaquer aux causes profondes du mécontentement par des réformes significatives plutôt que par la répression."
 ngo_events.3.a: "Nous allons envisager des réformes"
 ngo_events.3.b: "Nos affaires intérieures ne les concernent pas."

 ### ══════════════════════════════════════════
 ### RED CROSS
 ### ══════════════════════════════════════════

 ngo_events.10.t: "La Croix-Rouge offre une aide humanitaire"
 ngo_events.10.d: "La Croix-Rouge internationale a proposé de déployer du personnel humanitaire pour aider les civils touchés par le conflit en cours. Leurs équipes d'aide sont prêtes à fournir des soins médicaux, des abris et de la nourriture aux populations déplacées dans nos régions déchirées par la guerre."
 ngo_events.10.a: "Nous nous félicitons de leur aide"
 ngo_events.10.b: "Nous ne pouvons autoriser les travailleurs étrangers dans une zone de guerre"

 ngo_events.11.t: "La Croix-Rouge critique la conduite en temps de guerre"
 ngo_events.11.d: "La Croix-Rouge internationale a publié une déclaration publique exprimant sa profonde préoccupation au sujet de la conduite de nos forces armées. Des informations faisant état de pertes civiles considérables et de destructions d ' infrastructures dans les zones de conflit ont attiré l ' attention de la communauté internationale. Ils exhortent toutes les parties à respecter les Conventions de Genève."
 ngo_events.11.a: "Nous coopérerons avec leurs enquêteurs."
 ngo_events.11.b: "Nous rejetons ces allégations"

 ngo_events.12.t: "La Croix-Rouge offre des secours de crise"
 ngo_events.12.d: "Malgré l'absence de guerre ouverte, la Croix-Rouge internationale a identifié une crise humanitaire croissante à l'intérieur de nos frontières. Les troubles civils généralisés et les perturbations économiques ont créé des conditions qui nécessitent une assistance internationale. Ils offrent de coordonner les efforts de secours pour les populations touchées."
 ngo_events.12.a: "Nous acceptons leur aide"
 ngo_events.12.b: "Nous pouvons gérer ça nous-mêmes."

 ### ══════════════════════════════════════════
 ### IAEA
 ### ══════════════════════════════════════════

 ngo_events.20.t: "L'AIEA demande l'inspection nucléaire"
 ngo_events.20.d: "L'Agence internationale de l'énergie atomique a officiellement demandé l'accès à nos installations nucléaires pour une inspection complète de sûreté et de conformité. En tant que non signataire du Traité sur la non-prolifération, notre programme nucléaire a suscité un examen international plus approfondi. L'AIEA nous assure que l'inspection est routinière, mais le refus enverrait un signal clair à la communauté internationale."
 ngo_events.20.a: "Nos installations sont ouvertes au contrôle"
 ngo_events.20.b: "Notre programme nucléaire est une question souveraine"

 ngo_events.21.t: "L ' AIEA félicite pour son dossier de sûreté nucléaire"
 ngo_events.21.d: "À la suite d'un examen de notre programme nucléaire, l'Agence internationale de l'énergie atomique a officiellement salué notre engagement envers les normes de sûreté et la non-prolifération. Notre adhésion au TNP et notre coopération avec les inspecteurs internationaux ont renforcé notre position au sein de la communauté nucléaire mondiale."
 ngo_events.21.a: "Nous restons attachés à l ' énergie nucléaire pacifique"

 ngo_events.22.t: "L ' AIEA soulève des préoccupations en matière de prolifération"
 ngo_events.22.d: "L'Agence internationale de l'énergie atomique s'inquiète de la direction de notre programme nucléaire. Sans être membre du TNP et sans que nous continuions à refuser de coopérer avec les inspecteurs, l ' AIEA a publié une déclaration officielle exprimant sa préoccupation au sujet de la mise au point éventuelle d ' armes. La communauté internationale surveille de près."
 ngo_events.22.a: "Nous sommes ouverts au dialogue"
 ngo_events.22.b: "Nous affirmons notre droit souverain à la technologie nucléaire"

 ### ══════════════════════════════════════════
 ### MODIFIERS
 ### ══════════════════════════════════════════

 ngo_amnesty_scrutiny: "Sous contrôle d ' amnistie"
 ngo_amnesty_scrutiny_desc: "Amnesty International suit de près notre bilan en matière de droits de l'homme à la suite de critiques récentes. La légitimité du gouvernement est sous pression."

 ngo_amnesty_reform_pressure: "Pression de réforme"
 ngo_amnesty_reform_pressure_desc: "Le rapport d'Amnesty International sur les troubles civils a suscité des pressions nationales et internationales en faveur de réformes, mais a contribué à atténuer le sentiment révolutionnaire."

 ngo_redcross_aid: "Croix-Rouge Aide humanitaire"
 ngo_redcross_aid_desc: "Les travailleurs de la Croix-Rouge fournissent une assistance humanitaire aux civils dans les zones de conflit, réduisent la mortalité et renforcent notre réputation internationale."

 ngo_redcross_cooperation: "Coopération avec la Croix-Rouge"
 ngo_redcross_cooperation_desc: "Notre coopération avec la Croix-Rouge en matière de conduite en temps de guerre a amélioré notre position internationale et réduit l'infamie engendrée par nos actions militaires."

 ngo_redcross_relief: "Red Cross Crisis Relief"
 ngo_redcross_relief_desc: "La Croix-Rouge fournit des secours humanitaires pendant cette période de crise civile, contribuant ainsi à stabiliser les populations touchées."

 ngo_iaea_inspectors: "Inspecteurs de l'AIEA présents"
 ngo_iaea_inspectors_desc: "Les inspecteurs de l'AIEA opèrent dans nos installations nucléaires, partageant leurs connaissances techniques et leurs connaissances en matière de sûreté. Leur présence accélère le transfert de technologie et renforce notre réputation diplomatique."
