 # imf

 je_imf_loan: "Programme de prêts du FMI"
 je_imf_loan_reason: "Un prêt du Fonds monétaire international a été étendu à [ROOT.GetCountry.GetName]. En échange d'un financement d'urgence, le pays a accepté des conditions importantes : taux d'intérêt élevés, libre-échange obligatoire et obligations envers les grandes puissances qui assurent le fonds."

 imf_je_obligations_active_tt: "De grandes obligations de pouvoir sont toujours en vigueur. Les créanciers étrangers maintiennent leur influence sur les principales décisions de politique économique."
 imf_je_obligations_met_tt: "De grandes obligations de pouvoir ont été remplies. Le pays conserve la pleine souveraineté économique, bien que les conditions de prêt restent en vigueur."

 decision_leave_imf: "Quitter le FMI"
 decision_leave_imf_desc: "Retirez-vous du Fonds monétaire international. Le pays ne pourra plus bénéficier du soutien du FMI en cas de faillite, mais il sera exempt d'obligations et d'ingérence des créanciers. Cette décision ne peut être annulée.\n\n Remarque : Vous ne pouvez pas partir en détenant un prêt actif du FMI."
 imf_cannot_leave_while_indebted_tt: "Ne peut quitter le FMI tant qu'un prêt actif est en place"


 imf_button_pay_obligations_name: "Obligations de compensation"
 imf_button_pay_obligations_desc: "Payer les obligations de puissance qui restent. Coûte 500 or et nécessite une dette inférieure à 50%, mais rétablit immédiatement la pleine souveraineté économique et améliore les relations avec toutes les grandes puissances."
 imf_pay_obligations_cost_tt: "Exige une dette à l'échelle inférieure à 50 % et 500 or"
 imf_obligations_paid_tt: "Les obligations ont été payées tôt. De grandes relations de pouvoir se sont améliorées."

 # imf_events.1 — Loan offer
 imf_events.1.t: "Intervention du FMI"
 imf_events.1.d: "Le trésor de [ROOT.GetCountry.GetName] est en crise. La dette a atteint un niveau qui rend les marchés nerveux et les créanciers prudents. Le Fonds monétaire international a pris note — et a envoyé une délégation pour offrir un financement d'urgence.\n\n Les termes ne sont pas généreux. Les taux d'intérêt seront fixés à des niveaux de sanction. Le pays sera tenu d'adopter le libre-échange, quelle que soit sa politique économique existante. Et les grandes puissances qui ont souscrit le fonds s'attendent à ce que certaines obligations soient remplies. Mais l'alternative — approcher de la faillite sans filet de sécurité — peut être pire."
 imf_events.1.f: "La souveraineté et la solvabilité sont rarement disponibles en même temps."
 imf_events.1.a: "Accepter le prêt — nous avons besoin du financement"
 imf_events.1.b: "Refuser — nous gérerons nos propres affaires"

 # imf_events.2 — Great power notification
 imf_events.2.t: "Prêt prolongé du FMI"
 imf_events.2.d: "[SCOPE.sCountry('imf_debtor_scope').GetName] a accepté un ensemble de prêts du FMI. Comme l'un des grands pouvoirs de souscription du fonds, [ROOT.GetCountry.GetName] détient maintenant des obligations de la nation débitrice. Cet arrangement a des incidences stratégiques et financières."
 imf_events.2.f: "La dette est une forme de diplomatie."
 imf_events.2.a: "Bien — cela nous donne un effet de levier"
 imf_events.2.b: "Malheureusement, les conditions imposées sont trop sévères."

 # imf_events.3 — Loan complete
 imf_events.3.t: "Programme du FMI conclu"
 imf_events.3.d: "Cinq ans après avoir accepté un prêt du FMI, [ROOT.GetCountry.GetName] a rempli ses obligations de programme. Les paiements d'intérêts ont été effectués, les conditions endurées, et les créanciers de grande puissance satisfaits. Le pays émerge de l'expérience avec sa souveraineté rétablie - et, on espère, avec ses finances dans un meilleur ordre que quand il a commencé."
 imf_events.3.f: "Le registre est équilibré. Les leçons sont plus difficiles à mesurer."
 imf_events.3.a: "Nous y sommes parvenus."

 # imf_events.4 — Leaving
 imf_events.4.t: "Retrait du FMI"
 imf_events.4.d: "[ROOT.GetCountry.GetName] se retire du Fonds monétaire international. La décision reflète la conviction que les coûts de l'adhésion — les conditions, les obligations, la perte de souveraineté économique en période de crise — l'emportent sur les avantages de l'accès au financement d'urgence.\n\n Les grandes puissances ne seront pas satisfaites. Et devrait [ROOT.GetCountry.GetName] jamais plus approcher la faillite, il n'y aura pas de filet de sécurité."
 imf_events.4.f: "L'indépendance a un prix. Tout comme la dépendance."
 imf_events.4.a: "Nous sommes seuls — comme nous devrions"

 # imf_events.5 — Great power notification of leaving
 imf_events.5.t: "Un pays a quitté le FMI"
 imf_events.5.d: "[SCOPE.sCountry('imf_leaver_scope').GetName] s'est retiré du Fonds monétaire international. La décision est un reproche à l'ordre financier international — et indique que [SCOPE.sCountry('imf_leaver_scope').GetName] a l'intention de tracer sa propre voie économique, pour le meilleur ou le pire."
 imf_events.5.f: "Un débiteur de moins. Un levier de moins."
 imf_events.5.a: "Noté"

 # imf_events.10 — War bonds
 imf_events.10.t: "Obligations de guerre"
 imf_events.10.d: "Avec la pression du Trésor et la guerre en cours, le ministère des Finances a proposé une mesure d'urgence : l'émission d'obligations de guerre. Les citoyens et les investisseurs seraient invités à prêter de l'argent à l'État en échange d'un remboursement futur avec intérêts, fournissant une injection de fonds immédiate pour financer l'effort de guerre.\n\n Les obligations fonctionneront, mais ce sont des dettes et des dettes en temps de guerre. La consommation d'approvisionnement augmentera à mesure que l'argent se déversera dans la machine militaire."
 imf_events.10.f: "Une nation emprunte contre son avenir pour défendre son présent."
 imf_events.10.a: "Émettre les obligations — nous avons besoin de l'argent maintenant"
 imf_events.10.b: "Déclin — nous n'hypothèquerons pas notre avenir"

 imf_loan_modifier: "Conditions de prêt du FMI"
 imf_loan_modifier_desc: "Un prêt du FMI est en place. Les taux d'intérêt sont très élevés et le libre-échange est obligatoire. L'investissement étranger se répand, mais la souveraineté économique est limitée et la légitimité a souffert."

 imf_great_power_obligations: "Grandes obligations de puissance"
 imf_great_power_obligations_desc: "Les grandes puissances qui ont souscrit le FMI détiennent des obligations de ce pays comme condition du prêt. Leur influence sur la politique économique est réelle."

 imf_refused_loan_modifier: "Prêts du FMI remboursés"
 imf_refused_loan_modifier_desc: "Le pays a refusé l'aide du FMI et gérera sa dette seule. Les conditions de crédit se sont détériorées."

 imf_post_loan_stability: "Recouvrement après le programme"
 imf_post_loan_stability_desc: "Le programme du FMI a pris fin. Ayant rempli ses obligations, le gouvernement a acquis une certaine crédibilité — et les finances du pays sont en meilleur état."

 imf_left_modifier: "En dehors du FMI"
 imf_left_modifier_desc: "Ce pays s'est retiré du FMI. Elle est exempte d'obligations des créanciers mais coupée du financement international d'urgence. Les flux d'investissement sont réduits."

 war_bonds_modifier: "Obligations de guerre émises"
 war_bonds_modifier_desc: "Des obligations de guerre d'urgence ont été émises pour financer l'effort de guerre. Les revenus sont en hausse, mais la dette augmente et la consommation d'approvisionnement a augmenté."

 war_bonds_refused_modifier: "Les obligations de guerre ont diminué"
 war_bonds_refused_modifier_desc: "Le gouvernement a refusé d'émettre des obligations de guerre. La discipline budgétaire est maintenue, mais l'armée en ressent la difficulté."

 un_events.6.t: "Nos forces reviennent de la mission des Nations Unies"
 un_events.6.d: "[ROOT.GetCountry.GetAdjective] les forces ont terminé leur service dans la mission de maintien de la paix des Nations Unies et rentrent chez elles. La contribution était modeste en termes militaires, mais diplomatiquement significative — [ROOT.GetCountry.GetName] était présente quand elle comptait. Le général est de retour."
 un_events.6.a: "Bienvenue chez vous"
 
 un_peacekeeping_contribution: "Contribution des Nations Unies pour le maintien de la paix"
 un_peacekeeping_contribution_desc: "[ROOT.GetCountry.GetName] a fourni des forces à une mission de maintien de la paix des Nations Unies. La communauté internationale en a pris note."
 
  # ── EVENT 300: RESOLUTION PASSED ─────────────────────────────────
 
 un_events.300.t: "Résolution adoptée"
 un_events.300.d: "L ' Assemblée générale a adopté une résolution sur les questions mondiales et la coordination de la coopération mondiale sur un sujet donné"
 un_events.300.f: "La résolution porte le poids du consensus international pour ce que cela vaut."
 un_events.300.a: "Noté"
 
 UN_RES_DESC_ENVIRONMENT: "#bold Résolution sur la protection de l'environnement#!\nLes États membres s'engagent à coordonner les normes environnementales et la gestion durable des ressources.\n\n#tooltip_separator!\n@green_checkmark! Tous les pays reçoivent le modificateur #bold de la résolution environnementale de l'ONU#! pendant 12 mois."
 UN_RES_DESC_PEACE: "#bold Résolution sur la paix dans le monde#!\nL'Assemblée générale réaffirme son engagement en faveur du règlement pacifique des différends et de la réduction des conflits entre États.\n\n#tooltip_separator!\n@green_checkmark! Tous les pays reçoivent le modificateur #bold Résolution de paix de l'ONU#! pendant 12 mois."
 UN_RES_DESC_ECONOMY: "#bold Résolution sur le développement économique#!\nLes États membres approuvent les investissements coordonnés dans les économies en développement et l'abaissement des barrières commerciales.\n\n#tooltip_separator!\n@green_checkmark! Tous les pays reçoivent le module #bold Résolution des Nations Unies sur le développement économique#! pendant 12 mois."
 UN_RES_DESC_TECHNOLOGY: "#bold Résolution technologique de l'UNESCO#!\nL'Assemblée générale établit des cadres pour le partage des technologies et la recherche scientifique coopérative entre les États membres.\n\n#tooltip_separator!\n@green_checkmark! Tous les pays reçoivent le modificateur #bold Résolution technologique de l'ONU#! pendant 12 mois."
 
 # ── EVENT 301: RESOLUTION FAILED ─────────────────────────────────
 
 un_events.301.t: "La résolution de l'ONU fait défaut"
 un_events.301.d: "La motion dont l ' Assemblée générale des Nations Unies est saisie n ' a pas obtenu la majorité nécessaire. La résolution a été rejetée et la session a été ajournée sans résultat.\n\nAucune mesure ne sera mise en oeuvre. La délégation auteur a exprimé sa déception. D'autres ne l'ont pas fait."
 un_events.301.f: "L'ONU fait ce qu'elle fait de mieux."
 un_events.301.a: "Sans surprise"
 
 # ── EVENT 302: SANCTIONS (TARGET) ────────────────────────────────
 
 un_events.302.t: "[ROOT.GetCountry.GetName] Sanctionnée par l ' Organisation des Nations Unies"
 un_events.302.d: "Le Conseil de sécurité des Nations Unies a adopté une résolution imposant des sanctions économiques à [ROOT.GetCountry.GetName]. La résolution a été appuyée par la majorité requise et prend effet immédiatement.\n\n Les restrictions commerciales sont maintenant en vigueur. L ' isolement diplomatique s ' approfondit. On s'attend à ce que les États membres se conforment au régime de sanctions, bien qu'ils ne soient pas obligés.\n\n Les sanctions resteront en vigueur pendant cinq ans à moins que le Conseil de sécurité ne se réunisse pour les examiner."
 un_events.302.f: "La souveraineté n'isole pas un pays de l'opinion du monde."
 un_events.302.a: "Nous rejetons cette résolution"
 
 # ── EVENT 303: CONDEMNATION (TARGET) ─────────────────────────────
 
 un_events.303.t: "[ROOT.GetCountry.GetName] Condamné par l ' Organisation des Nations Unies"
 un_events.303.d: "L'Assemblée générale des Nations Unies a adopté une résolution officielle condamnant [ROOT.GetCountry.GetName]. La condamnation a été approuvée par un vote majoritaire à la suite du débat sur la parole.\n\n Une condamnation ne comporte aucun mécanisme d'application contraignant, mais elle représente une déclaration officielle de désapprobation internationale et affectera [ROOT.GetCountry.GetAdjective] la position de la communauté diplomatique pour les années à venir."
 un_events.303.f: "Les mots ne sont pas des armes. Mais ils laissent des marques."
 un_events.303.a: "Nous ne serons pas exposés"
 
 # ── EVENT 304: SANCTIONS/CONDEMNATION (OBSERVERS) ────────────────
 
 un_events.304.t: "Résolution unitaire de l ' ONU"
 un_events.304.d: "Le Conseil de sécurité de l'ONU a adopté une résolution imposant des sanctions à un autre pays. Ils devront faire face à de lourdes sanctions alors que le monde coordonnera la pression économique contre eux."
 un_events.304.f: "La machine de la censure internationale tourne lentement, mais elle tourne."
 un_events.304.a: "Noté"
 
 UN_304_DESC_SANCTIONS: "Le Conseil de sécurité des Nations unies a voté pour imposer des sanctions économiques à [global_var:un_sanction_target.GetName]. La résolution adoptée par la marge requise.\n\n[global_var:un_sanction_target.GetName] fera face à des restrictions commerciales, à l'isolement diplomatique et à des sanctions économiques importantes pour la durée de la période de sanctions. Les États membres devraient respecter les restrictions."
 UN_304_DESC_CONDEMNATION: "L'Assemblée générale des Nations Unies a officiellement condamné [global_var:un_sanction_target.GetName] à la majorité. La résolution représente une déclaration officielle de désapprobation internationale.\n\n Bien qu'une condamnation n'entraîne aucune exécution contraignante, elle met [global_var:un_sanction_target.GetAdjective] le comportement au dossier et affecte leur réputation internationale."
 
