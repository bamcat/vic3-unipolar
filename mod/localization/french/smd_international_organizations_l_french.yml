 un_events.1.d: "Nous pouvons appeler l'ONU à envoyer des soldats de la paix pour aider à mettre fin à notre conflit."
 un_events.1.a: "Soumettre la demande."
 un_events.1.b: "N'impliquez pas l'ONU."

