 # ── TREATY ARTICLES ──────────────────────
 
 defense_attache: "Envoyer l'attaché de défense"
 defense_attache_desc: "Embarquez des conseillers militaires et des officiers de liaison avec les forces armées du pays cible. La cible gagne en expérience et réduit les coûts militaires; la source gagne en influence et en diplomatie. Le pays source doit maintenir une plus grande projection de puissance que la cible."
 
 cultural_exchange: "Échange culturel"
 cultural_exchange_desc: "Établir un programme officiel d'échange culturel — expositions partagées, programmes universitaires et contacts entre les gens. Les deux pays gagnent du prestige, de l'influence et deviennent plus attrayants pour les migrants."
 
 research_partnership: "Partenariat de recherche"
 research_partnership_desc: "Une entente officielle pour partager les programmes de recherche et les établissements universitaires. Les deux pays bénéficient d'une meilleure vitesse de recherche et d'une meilleure diffusion des technologies. Exige que les deux parties soient au moins des pouvoirs reconnus."
 
 human_development_collaboration: "Collaboration pour le développement humain"
 human_development_collaboration_desc: "Le pays le plus riche finance des programmes de développement dans la cible - soins de santé, éducation, bien-être. La source paie les coûts permanents en échange de l'influence et du prestige. L'accord rompt si l'économie du pays source tombe en dessous de la cible."
 
 research_partnership_rank_tt: "Les deux pays doivent être au moins des pouvoirs reconnus pour conclure un partenariat de recherche"
 
 # ── DIPLOMATIC ACTIONS ───────────────────
 
 financial_sanctions: "Les sanctions financières"
 financial_sanctions_desc: "Couper la relation financière de [ROOT.GetCountry.GetName] avec l'objectif — bloquer l'accès aux marchés de crédit et restreindre la négociation de titres. Les secteurs bancaire et financier de l'objectif souffriront considérablement."
 
 condemn: "Condamner"
 condemn_desc: "Condamner officiellement les actions du pays cible. La cible subit un impact durable sur le prestige, la légitimité et la réputation diplomatique. Exige que la cible ait une infamie importante."
 condemn_action_notification_name: "[INITIATOR_COUNTRY.GetName] nous a condamnés!"
 condemn_pact_desc: "[SCOPE.GetRootScope.GetDiplomaticPact.GetFirstCountry.GetName] a condamné [SCOPE.GetRootScope.GetDiplomaticPact.GetSecondCountry.GetName]!"
 condemn_action_notification_desc: "Nous avons été condamnés par [INITIATOR_COUNTRY.GetName]!"
 condemn_break_name:0 "Résoudre la condamnation"
 condemn_pact_desc:0 "Condamner les actions de ce pays."
 
 propose_un_sanctions: "Proposer des sanctions de l'ONU"
 propose_un_sanctions_desc: "En tant que membre permanent du Conseil de sécurité, nous pouvons proposer que l ' ONU sanctionne officiellement la cible. Si le vote est adopté, la cible est passible de lourdes sanctions économiques pendant cinq ans."
 propose_un_sanctions_action_notification_name: "[INITIATOR_COUNTRY.GetName] a proposé des sanctions de l'ONU contre nous!"
 propose_un_sanctions_pact_desc: "[SCOPE.GetRootScope.GetDiplomaticPact.GetFirstCountry.GetName] a demandé des sanctions internationales contre [SCOPE.GetRootScope.GetDiplomaticPact.GetSecondCountry.GetName]!"
 propose_un_sanctions_action_notification_desc:1 "[INITIATOR_COUNTRY.GetName] a demandé aux Nations Unies de proposer des sanctions internationales contre nous!"
 
 propose_un_condemnation: "Proposer la condamnation de l ' ONU"
 propose_un_condemnation_desc: "Proposer que l ' ONU condamne officiellement la cible. Si le vote passe, la cible subit des dommages durables de prestige et de légitimité. Moins sévère que les sanctions."
 propose_un_condemnation__action_notification_name:0 "[INITIATOR_COUNTRY.GetName] a proposé une condamnation de l'ONU nous gagne!"
 propose_un_condemnation_pact_desc:0 "[SCOPE.GetRootScope.GetDiplomaticPact.GetFirstCountry.GetName] a demandé une condamnation internationale contre [SCOPE.GetRootScope.GetDiplomaticPact.GetSecondCountry.GetName]!"
 propose_un_condemnation_action_notification_desc:0 "[INITIATOR_COUNTRY.GetName] a demandé aux Nations Unies de proposer une condamnation internationale contre nous!"
 
 condemn_requires_infamy_tt: "La cible doit avoir une infamie notable"
 propose_un_sanctions_perm_member_tt: "Seuls les membres permanents du Conseil de sécurité peuvent proposer des sanctions ou des condamnations de l'ONU"
 
