 # ── RESOLUTION MODIFIERS ─────────────────
 
 un_resolution_environment: "Résolution de l'ONU — Protection de l'environnement"
 un_resolution_environment_desc: "L'ONU a adopté une résolution sur la protection de l'environnement. [ROOT.GetCountry.GetName] s'est engagé à réduire la production de pollution et à améliorer les normes environnementales pour les cinq prochaines années."
 
 un_resolution_peace: "Résolution de l'ONU — Paix mondiale"
 un_resolution_peace_desc: "L ' ONU a adopté une résolution sur la paix mondiale. [ROOT.GetCountry.GetName] bénéficie de la réduction de la génération d'infamies et de l'amélioration de la position diplomatique pour les cinq prochaines années."
 
 un_resolution_economy: "Résolution de l'ONU — Développement économique"
 un_resolution_economy_desc: "L'ONU a adopté une résolution sur le développement économique. [ROOT.GetCountry.GetName] reçoit des primes de construction et d'investissement reflétant la coopération économique internationale pour les cinq prochaines années."
 
 un_resolution_technology: "Résolution de l'ONU — Technologie de l'UNESCO"
 un_resolution_technology_desc: "L ' ONU a adopté une résolution sur la technologie et l ' éducation. [ROOT.GetCountry.GetName] bénéficie d'un meilleur accès à l'éducation et de qualifications pop pour les cinq prochaines années."
 
 sb_request_peacekeepers: "Demande aux Casques bleus des Nations Unies"
 sb_request_peacekeepers_desc: "Demander à l'ONU de déployer des forces de maintien de la paix pour aider à résoudre les conflits."

