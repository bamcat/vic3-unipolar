 un_je_under_sanctions_tt: "@warning! #bold [ROOT.GetCountry.GetName] est actuellement sous sanctions des Nations Unies.#! La communauté internationale a voté pour imposer des sanctions économiques à [ROOT.GetCountry.GetName]. Le débit bancaire, les investissements et la construction sont fortement réduits. Les sanctions resteront en vigueur jusqu'à leur expiration."
 
