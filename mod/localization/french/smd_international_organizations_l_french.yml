 un_motion_progress_bar_desc: "Part favorable des voix: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%1]#! Votes en faveur: ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|0])"
