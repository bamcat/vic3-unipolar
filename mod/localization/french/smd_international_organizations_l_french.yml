 ### ORGANIZATIONS — Names & Descriptions
 ### ═══════════════════════════════════════

 ### United Nations
 io_un_name: "Organisation des Nations Unies"
 io_un_abbreviation: "ONU"
 io_un_desc: "Le [concept_united_nations] est un [concept_cooperative_agreement] fondé pour maintenir la paix et la sécurité internationales, établir des relations amicales entre les nations et promouvoir le progrès social. Contrairement aux autres [concept_intergovernmental_organization]s, l'ONU ne fournit pas directement de modifications à ses membres. Son influence est exercée par des résolutions diplomatiques, des mandats de maintien de la paix et des initiatives mondiales."
 io_un_tooltip: "Le [concept_united_nations] est un [concept_cooperative_agreement] des nations du monde.\n Cliquez pour voir les détails."

 ### NATO
 io_nato_name: "Organisation du Traité de l ' Atlantique Nord"
 io_nato_abbreviation: "OTAN"
 io_nato_desc: "Le [concept_nato] est un [concept_military_defense_agreement] établi en 1949, liant les nations nord-américaines et européennes à la défense collective. Une attaque armée contre un membre est considérée comme une attaque contre tous. L'OTAN coordonne les exercices militaires conjoints, standardise l'équipement et maintient des structures de commandement intégrées."

 ### G7
 io_g7_name: "Groupe des Sept"
 io_g7_abbreviation: "G7"
 io_g7_desc: "Le [concept_g7] est un [concept_financial_agreement] comprenant les plus grandes économies avancées du monde. Les membres coordonnent la politique budgétaire, la politique monétaire et la gouvernance économique. L'adhésion confère une importante influence diplomatique et une crédibilité financière."

 ### OPEC
 io_opec_name: "Organisation des pays exportateurs de pétrole"
 io_opec_abbreviation: "OPEP"
 io_opec_desc: "Le [concept_opec] est un [concept_free_trade_agreement] des principaux pays producteurs de pétrole qui coordonnent les politiques pétrolières entre les pays membres. L'OPEP s'efforce d'assurer la stabilisation des marchés pétroliers et des rendements équitables pour les pays producteurs."

 ### EEC
 io_eec_name: "Communauté économique européenne"
 io_eec_abbreviation: "CEE"
 io_eec_desc: "Le [concept_eec] est un [concept_free_trade_agreement] établissant un marché commun entre les États membres européens. Il réduit les barrières commerciales, harmonise les réglementations économiques et favorise la libre circulation des biens, des services, des capitaux et du travail entre les pays membres."
 
 ### Arab League
 io_arab_league_name: "Ligue arabe"
 io_arab_league_abbreviation: "LAS"
 io_arab_league_desc: "Le [concept_arab_league] est un [concept_cultural_pact] des nations arabes qui favorise la coopération politique, économique, culturelle et sociale entre ses membres. La Ligue coordonne les politiques sur les questions d'intérêt commun et sert de médiateur aux différends entre États arabes."

 ### IMF
 io_imf_name: "Fonds monétaire international"
 io_imf_abbreviation: "FMI"
 io_imf_desc: "Le [concept_imf] est un [concept_financial_agreement] qui favorise la coopération monétaire internationale, la stabilité des taux de change et les accords de change ordonnés. Il fournit une assistance financière et des conseils stratégiques aux pays membres confrontés à des difficultés de balance des paiements."

 ### ESA
 io_esa_name: "Agence spatiale européenne"
 io_esa_abbreviation: "SEC"
 io_esa_desc: "Le [concept_esa] est un [concept_cooperative_agreement] consacré à l'exploration et à l'utilisation de l'espace. Les États membres mettent en commun des ressources pour développer des lanceurs, des satellites et des missions scientifiques qu'aucune nation européenne ne pourrait réaliser seule."

 ### ASEAN
 io_asean_name: "Association des nations de l ' Asie du Sud-Est"
 io_asean_abbreviation: "ASEAN"
 io_asean_desc: "Le [concept_asean] est un [concept_cooperative_agreement] des nations de l'Asie du Sud-Est qui favorisent la croissance économique, le progrès social et le développement culturel. L ' ASEAN facilite la stabilité régionale et fournit un cadre au dialogue multilatéral dans la région Asie-Pacifique."

 ### WHO
 io_saarc_name: "Association sud-asiatique de coopération régionale"
 io_saarc_desc: "Le [concept_saarc] est un [concept_cooperative_agreement] parmi les nations d'Asie du Sud qui vise la coopération régionale, la coordination du développement et le dialogue multilatéral."

 io_cis_name: "Communauté d ' États indépendants"
 io_cis_desc: "Le [concept_cis] est un [concept_cooperative_agreement] parmi les États post-soviétiques axé sur la consultation régionale, la coordination économique et la coopération intergouvernementale pratique."

 io_who_name: "Organisation mondiale de la santé"
 io_who_abbreviation: "OMS"
 io_who_desc: "Le [concept_who] est un [concept_cooperative_agreement] qui dirige et coordonne la politique internationale en matière de santé. Il joue un rôle de chef de file en matière de santé mondiale, établit des normes et des règles, surveille les tendances en matière de santé et coordonne les interventions en cas d'urgence sanitaire internationale."

 ### ═══════════════════════════════════════
 ### TREATIES — Names & Descriptions
 ### ═══════════════════════════════════════

 io_treaty_geneva_name: "Conventions de Genève"
 io_treaty_geneva_desc: "Une série de traités appelés Conventions de Genève sont chargés d'établir des normes de droit international pour le traitement humanitaire en période de conflit armé. Les signataires du [concept_international_treaty] conviennent de protéger les soldats blessés, les prisonniers de guerre et les civils en temps de guerre."

 io_treaty_cwc_name: "Convention sur les armes chimiques"
 io_treaty_cwc_desc: "La Convention sur les armes chimiques est un [concept_international_treaty] qui interdit la mise au point, la production, l'acquisition, le stockage, la conservation, le transfert et l'utilisation d'armes chimiques. Les signataires conviennent de détruire les stocks existants sous vérification internationale."

 io_treaty_npt_name: "Traité sur la non-prolifération"
 io_treaty_npt_desc: "Le Traité sur la non-prolifération des armes nucléaires est un [concept_international_treaty] visant à prévenir la prolifération des armes nucléaires, à promouvoir le désarmement et à faciliter l'utilisation pacifique de l'énergie nucléaire sous les garanties internationales."

 io_treaty_bwc_name: "Convention sur les armes biologiques"
 io_treaty_bwc_desc: "La Convention sur les armes biologiques est une [concept_international_treaty] interdisant la mise au point, la production et le stockage d'armes biologiques et à toxines. C ' est le premier traité multilatéral de désarmement à interdire toute une catégorie d ' armes."

 io_treaty_cat_name: "Convention contre la torture"
 io_treaty_cat_desc: "La Convention contre la torture est un [concept_international_treaty] interdisant toutes les formes de torture et de peines ou traitements cruels, inhumains ou dégradants. Les signataires s'engagent à prendre des mesures efficaces pour prévenir la torture dans leur juridiction."

 ### ═══════════════════════════════════════
 ### NGOs — Names & Descriptions
 ### ═══════════════════════════════════════

 io_iaea_name: "Agence internationale de l'énergie atomique"
 io_iaea_abbreviation: "AIEA"
 io_iaea_desc: "L ' AIEA encourage l ' utilisation pacifique de l ' énergie nucléaire et s ' emploie à empêcher son utilisation à des fins militaires. Il effectue des inspections, fournit une assistance technique et établit des normes internationales de sûreté pour les installations nucléaires."

 io_redcross_name: "Croix-Rouge internationale"
 io_redcross_abbreviation: "CICR"
 io_redcross_desc: "La Croix-Rouge internationale fournit une aide humanitaire pendant les conflits armés et les catastrophes naturelles. Il surveille le respect des Conventions de Genève, visite les prisonniers de guerre et facilite la communication entre les membres de la famille séparés."

 io_amnesty_name: "Amnesty International"
 io_amnesty_abbreviation: "AI"
 io_amnesty_desc: "Amnesty International enquête et expose les violations des droits de l'homme dans le monde entier. Il milite en faveur de la libération des prisonniers politiques, de l ' abolition de la torture et de la peine de mort et de la protection des réfugiés et des migrants."

