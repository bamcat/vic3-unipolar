 io_igos_tab_desc: "Les organisations internationales sont des institutions multilatérales qui coordonnent les politiques entre les pays membres. Cliquez sur une organisation pour voir ses détails, ses membres et les actions disponibles."
 io_treaties_tab_desc: "Les traités internationaux sont des accords contraignants entre les nations. Votre pays peut devenir signataire pour obtenir des avantages, ou se retirer au prix de la position diplomatique."
 io_ngos_tab_desc: "[concept_nongovernmental_organization]s fonctionnent indépendamment au-delà des frontières. Toutes les nations sont affiliées par défaut. Vous pouvez choisir de les interdire ou de les subventionner, ce qui affecte leur opinion de votre pays."

 ### ═══════════════════════════════════════
 ### GAME CONCEPTS
 ### ═══════════════════════════════════════

 concept_international_organization: "Organisation internationale"
 concept_international_organization_desc: "Les organisations internationales sont des institutions qui opèrent au-delà des frontières nationales pour coordonner les politiques, promouvoir le commerce, assurer la sécurité collective ou favoriser les échanges culturels entre leurs pays membres. Elles se présentent sous plusieurs formes : [concept_free_trade_agreement]s, [concept_financial_agreement]s, [concept_military_defense_agreement]s, [concept_cultural_pact]s et [concept_cooperative_agreement]s."

 concept_intergovernmental_organization: "Organisation intergouvernementale"
 concept_intergovernmental_organization_desc: "Une organisation intergouvernementale est un [concept_international_organization] dont les membres sont des nations souveraines. Contrairement à [concept_nongovernmental_organization]s, les OIG doivent être officiellement membres et peuvent apporter d'importants avantages diplomatiques, économiques ou militaires."

 concept_nongovernmental_organization: "Organisation non gouvernementale"
 concept_nongovernmental_organization_desc: "Les organisations non gouvernementales sont des institutions indépendantes qui opèrent à l'échelle internationale sans être contrôlées par aucun gouvernement. Toutes les nations sont affiliées par défaut aux ONG. Les gouvernements peuvent choisir de les interdire, de les tolérer ou de les subventionner, ce qui nuit à l'opinion de l'ONG et aux avantages qu'elle offre."

 concept_international_treaty: "Traité international"
 concept_international_treaty_desc: "Un traité international est un accord officiel contraignant entre des nations souveraines. Contrairement aux traités [concept_intergovernmental_organization]s, les traités n'exigent pas l'adhésion permanente à l'organisation. Les signataires bénéficient d'avantages diplomatiques, tandis que le retrait entraîne des dommages-intérêts pour les relations avec d'autres signataires."

 international_treaty_type:0 "[concept_international_treaty]
 concept_free_trade_agreement: "Accord de libre-échange"
 concept_free_trade_agreement_desc: "Un accord de libre-échange est un [concept_international_organization] qui réduit les barrières commerciales entre les pays membres, favorisant l'échange de biens et la croissance économique."

 concept_financial_agreement: "Accord financier"
 concept_financial_agreement_desc: "Un accord financier est un [concept_international_organization] axé sur la coopération monétaire, le financement du développement et la stabilité financière entre ses membres. Les membres reçoivent +5% d'influence et +1 de réputation diplomatique."

 concept_military_defense_agreement: "Accord de défense militaire"
 concept_military_defense_agreement_desc: "Un accord de défense militaire est un [concept_international_organization] fondé sur le principe de la sécurité collective. Une attaque contre un membre est considérée comme une attaque contre tous."

 concept_cultural_pact: "Pacte culturel"
 concept_cultural_pact_desc: "Un pacte culturel est un [concept_international_organization] qui favorise le partage du patrimoine, de la langue et des échanges culturels entre ses membres."

 concept_cooperative_agreement: "Accord de coopération"
 concept_cooperative_agreement_desc: "Un accord de coopération est un [concept_international_organization] axé sur une diplomatie multilatérale élargie. Contrairement à d'autres types d'organismes, les accords de coopération ne fournissent pas directement de modifications. Leur influence est exercée par des résolutions et des initiatives."

 concept_united_nations: "Organisation des Nations Unies"
 concept_united_nations_desc: "Les Nations Unies sont un [concept_cooperative_agreement] des nations du monde, vouées au maintien de la paix, de la sécurité et de la coopération internationales."

 concept_nato: "OTAN"
 concept_nato_desc: "L'Organisation du Traité de l'Atlantique Nord est un [concept_military_defense_agreement] contraignant les nations nord-américaines et européennes dans la défense collective."

 concept_g7: "G7"
 concept_g7_desc: "Le Groupe des Sept est un [concept_financial_agreement] des plus grandes économies avancées du monde, coordonnant la politique budgétaire et monétaire."

 concept_opec: "OPEP"
 concept_opec_desc: "L'Organisation des pays exportateurs de pétrole est un [concept_free_trade_agreement] qui coordonne les politiques pétrolières des principaux pays producteurs de pétrole."

 concept_eec: "CEE"
 concept_eec_desc: "La Communauté économique européenne est un [concept_free_trade_agreement] établissant un marché commun entre les États membres européens."

 concept_arab_league: "Ligue arabe"
 concept_arab_league_desc: "La Ligue arabe est une [concept_cultural_pact] qui encourage la coopération entre les nations arabes."

 concept_imf: "FMI"
 concept_imf_desc: "Le Fonds monétaire international est un [concept_financial_agreement] qui favorise la coopération monétaire internationale et la stabilité financière."

 concept_esa: "SEC"
 concept_esa_desc: "L'Agence spatiale européenne est un [concept_cooperative_agreement] consacré à l'exploration et à l'utilisation de l'espace."

 concept_asean: "ASEAN"
 concept_asean_desc: "L'Association des nations de l'Asie du Sud-Est est un <xid=0/> qui favorise la croissance économique et la stabilité régionale en Asie du Sud-Est."

 concept_saarc: "SAARC"
 concept_saarc_desc: "L'Association sud-asiatique de coopération régionale est un [concept_cooperative_agreement] qui encourage la coopération régionale entre les États de l'Asie du Sud."

 concept_cis: "CEI"
 concept_cis_desc: "La Communauté des États indépendants est un [concept_cooperative_agreement] pour la coordination entre plusieurs États post-soviétiques."

 concept_who: "OMS"
 concept_who_desc: "L'Organisation mondiale de la santé dirige et coordonne la politique internationale en matière de santé."

 concept_iaea: "AIEA"
 concept_iaea_desc: "L'Agence internationale de l'énergie atomique est un [concept_nongovernmental_organization] qui favorise l'utilisation pacifique de l'énergie nucléaire et s'efforce de prévenir la prolifération nucléaire."

