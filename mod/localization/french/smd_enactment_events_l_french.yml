 lgbtq_law_enforcement_scope:0 "Portée de l'application"
 lgbtq_law_enforcement_scope_desc:0 "Le gouvernement s'est engagé à appliquer activement les restrictions, renforçant ainsi l'élan législatif de la loi."

 lgbtq_law_enforcement_cost:0 "Coûts d'exécution absorbés"
 lgbtq_law_enforcement_cost_desc:0 "L'application intégrale des restrictions est financée, ce qui exerce une pression supplémentaire sur les dépenses publiques."

 lgbtq_law_decrim_framing:0 "Décriminalisation encadrée"
 lgbtq_law_decrim_framing_desc:0 "Le gouvernement a soigneusement conçu la dépénalisation comme l'élimination de la peine plutôt qu'une approbation, facilitant la voie par le débat."

 lgbtq_law_quiet_passage:0 "Tentative de passage silencieux"
 lgbtq_law_quiet_passage_desc:0 "La décision d'éviter le débat public a ralenti le processus d'adoption de la loi au fur et à mesure que la réforme progresse sans le soutien public organisé."

 lgbtq_law_liberty_argument:0 "L'argument de la liberté"
