 lgbtq_law_religious_exemptions:0 "Exemptions religieuses offertes"
 lgbtq_law_religious_exemptions_desc:0 "Les institutions religieuses se sont vu offrir des exemptions pour les cérémonies de même sexe, ce qui ralentit la mise en œuvre mais adoucit l'opposition conservatrice."

 lgbtq_law_equality_mandate:0 "Mandat d'égalité déclaré"
 lgbtq_law_equality_mandate_desc:0 "Le gouvernement a officiellement déclaré que l'égalité des sexes était un jalon dans le domaine des droits civils, ce qui a suscité une forte dynamique politique en vue de sa promulgation."

 lgbtq_law_devout_empowered:0 "Devout Empowered"
 lgbtq_law_devout_empowered_desc:0 "La communauté religieuse a été officiellement intégrée dans le cadre législatif, renforçant sa position politique et approfondissant son engagement."

 lgbtq_law_devout_sidelined:0 "Sidérurgie Devout"
 lgbtq_law_devout_sidelined_desc:0 "Le gouvernement a gardé l'encadrement religieux hors de la justification, laissant le dévot désengagé et tranquillement frustré."

 lgbtq_law_conservatives_unconvinced:0 "Conservateurs non convaincus"
 lgbtq_law_conservatives_unconvinced_desc:0 "L'opposition conservatrice a entendu le cadrage du gouvernement et n'est toujours pas mise en doute, maintenant leur résistance à la réforme."

 lgbtq_law_conservatives_rebuked:0 "Conservateurs repoussés"
 lgbtq_law_conservatives_rebuked_desc:0 "Le gouvernement a publiquement contesté l'opposition conservatrice à l'égalité matrimoniale, embarrassant leur position mais aiguisant leur détermination."

 lgbtq_law_conservatives_placated:0 "Conservateurs Plaqués"
 lgbtq_law_conservatives_placated_desc:0 "Les exemptions religieuses ont réduit l'intensité immédiate de l'opposition conservatrice sans résoudre le désaccord sous-jacent."

 lgbtq_law_intelligentsia_engaged:0 "Intelligentsia engagés"
 lgbtq_law_intelligentsia_engaged_desc:0 "Les réformateurs et les juristes plaident activement en faveur des droits des LGBTQ, ce qui confère une autorité intellectuelle aux efforts de promulgation."

 lgbtq_law_intelligentsia_sidelined:0 "Intelligentsia Sidelined"
 lgbtq_law_intelligentsia_sidelined_desc:0 "Le gouvernement a choisi de maintenir la réforme sur des termes législatifs plutôt que philosophiques, laissant l'intelligentsia sans rôle formel dans le débat."

 abortion_law_moral_absolute:0 "Déclaration morale absolue"
 abortion_law_moral_absolute_desc:0 "Le fervent a réussi à définir l'interdiction de l'avortement comme un absolu moral, ce qui confère une autorité théologique à l'effort de promulgation."

 abortion_law_demographic_framing:0 "Cadre démographique adopté"
 abortion_law_demographic_framing_desc:0 "Le gouvernement a justifié l'interdiction de l'avortement pour des raisons démographiques et politiques, gardant la langue religieuse hors de la justification officielle."

 abortion_law_exceptions_debate:0 "Exceptions Débat résolu"
 abortion_law_exceptions_debate_desc:0 "Le gouvernement a adopté une position claire sur la question des exceptions, fournissant une base solide pour la poursuite du processus de promulgation."

 abortion_law_medical_exceptions:0 "Exceptions médicales autorisées"
 abortion_law_medical_exceptions_desc:0 "Des exceptions médicales étroites ont été inscrites dans la loi, ce qui ralentit le passage mais réduit l'opposition des modérés."

 abortion_law_autonomy_argument:0 "L'autonomie corporelle"
 abortion_law_autonomy_argument_desc:0 "L'intelligentsia a fait de l'autonomie corporelle la pièce maîtresse de l'affaire de l'avortement sans restriction, générant un fort soutien parmi les IG réformistes."

 abortion_law_healthcare_framing:0 "Cadre de soins de santé adopté"
 abortion_law_healthcare_framing_desc:0 "Le gouvernement a conçu l'avortement sans restriction comme une question de santé, élargissant son appel tout en évitant le débat philosophique plus profond."

 abortion_law_religious_opposition:0 "Opposition religieuse montée"
 abortion_law_religious_opposition_desc:0 "Le fervent bloque activement la libéralisation de la loi sur l'avortement, élevant l'opposition organisée qui met à l'épreuve la détermination du gouvernement."

 abortion_law_devout_empowered:0 "Devout Empowered"
 abortion_law_devout_empowered_desc:0 "La communauté religieuse a été placée au centre de la justification de l'interdiction d'avortement, renforçant considérablement sa position politique."

 abortion_law_devout_sidelined:0 "Sidérurgie Devout"
 abortion_law_devout_sidelined_desc:0 "Le gouvernement a maintenu le cadre religieux hors de l'interdiction de l'avortement, laissant le dévot présent mais sans rôle formel dans la justification."

 abortion_law_devout_rebuked:0 "Devout repoussé"
 abortion_law_devout_rebuked_desc:0 "Le gouvernement a directement affronté l'opposition religieuse à la libéralisation de l'avortement, affaiblissant la position politique du dévot mais radicalisant leur base."

 abortion_law_devout_appeased:0 "Dévide apaisé"
 abortion_law_devout_appeased_desc:0 "Les protections de conscience pour le personnel médical ont adouci l'opposition religieuse à la libéralisation de l'avortement sans satisfaire les exigences fondamentales du dévot."

 abortion_law_intelligentsia_engaged:0 "Intelligentsia engagés"
 abortion_law_intelligentsia_engaged_desc:0 "Les juristes et les réformateurs plaident activement en faveur des droits à l ' avortement, ce qui donne à l ' effort de promulgation une crédibilité intellectuelle et morale."

 abortion_law_intelligentsia_sidelined:0 "Intelligentsia Sidelined"
 abortion_law_intelligentsia_sidelined_desc:0 "La décision de considérer l'accès à l'avortement comme une question de santé a empêché l'intelligentsia du débat philosophique qu'ils voulaient mener."
