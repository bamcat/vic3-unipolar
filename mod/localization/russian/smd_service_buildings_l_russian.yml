l_russian:


 # BUILDINGS
 
 building_bank:0 "Коммерческий банк"
 building_bank_desc:0 "Финансовое учреждение, которое принимает депозиты, управляет кредитами и облегчает поток капитала по всей экономике. От скромных кредитных домов до разрастающихся цифровых сетей, банки являются основой современной торговли."

 building_food_service:0 "Продовольственные услуги"
 building_food_service_desc:0 "Розничные и столовые заведения, которые поставляют подготовленные и упакованные продукты питания населению в целом. Включает в себя все, от угловых продуктов до глобальных сетей быстрого питания, обеспечивая гражданам питание и удовлетворение."

 building_retail_services:0 "Розничные услуги"
 building_retail_services_desc:0 "Коммерческое учреждение, продающее мебель, одежду и инструменты непосредственно потребителям. Розничные магазины являются последним звеном в цепочке поставок, переводя промышленное производство в повседневные бытовые товары."

 building_advertising_agency:0 "Рекламные услуги"
 building_advertising_agency_desc:0 "Фирма, специализирующаяся на создании и распространении рекламного контента. Рекламные агентства формируют поведение потребителей и стимулируют спрос, развертывая все, от печатных листов до алгоритмически ориентированных цифровых кампаний."

 building_warehouse:0 "Склад"
 building_warehouse_desc:0 "Большой объект для хранения и распределения товаров. Склады служат логистическими центрами экономики, буферизуя спрос и предложение и обеспечивая эффективное движение продукции по всей стране."

 building_pharmaceutical_services:0 "Фармацевтические услуги"
 building_pharmaceutical_services_desc:0 "Учреждение, занимающееся распространением, исследованием и распространением лекарственных соединений. От аптечных счетчиков до передовых биотехнологических лабораторий фармацевтические услуги переводят сырые химические вещества в методы лечения, которые поддерживают здоровье населения."

 ####################
 # PRODUCTION METHOD GROUPS
 ####################

 ### BANKING

 pmg_base_banking:0 "Банковские операции"
 pmg_base_banking_desc:0 "Основные методы, с помощью которых банк принимает депозиты, выдает кредиты и проводит финансовые операции с клиентами и предприятиями."

 pmg_securities_trading:0 "Торговля ценными бумагами"
 pmg_securities_trading_desc:0 "Определяет, занимается ли банк торговлей и брокерской деятельностью финансовыми ценными бумагами, превращая вложенный капитал в расширенный кредит."

 pmg_automation_banking:0 "Банковская автоматизация"
 pmg_automation_banking_desc:0 "Степень, в которой банк использует автоматизированные системы — от механических кассиров до искусственного интеллекта — для обработки транзакций и снижения затрат на рабочую силу."

 ### FOOD SERVICES

 pmg_base_food_services:0 "Продуктовые операции"
 pmg_base_food_services_desc:0 "Основной формат розничной торговли, через который продукты продаются потребителям, начиная от небольших местных магазинов и заканчивая огромными онлайн-платформами."

 pmg_restaurant_type:0 "Тип ресторана"
 pmg_restaurant_type_desc:0 "Определяет, работает ли заведение также в ресторанах, и какого рода — от случайных местных закусочных до промышленных фастфудов."

 pmg_food_service_logistics:0 "Логистика продовольственной службы"
 pmg_food_service_logistics_desc:0 "Методы проверки и выполнения, используемые учреждениями общественного питания, включая трудосберегающие системы самообслуживания и инфраструктуру доставки."

 ### RETAIL

 pmg_base_retail:0 "Розничный формат"
 pmg_base_retail_desc:0 "Масштаб и формат розничной торговли, от небольших независимых магазинов до огромных магазинов и торговых центров."

 pmg_retail_specialization:0 "Розничная специализация"
 pmg_retail_specialization_desc:0 "Определяет, фокусируется ли розничный магазин на определенной категории товаров, таких как домашняя мебель, электроника или предметы роскоши."

 pmg_retail_logistics:0 "Розничная логистика"
 pmg_retail_logistics_desc:0 "Методы проверки и выполнения, используемые розничными предприятиями, включая терминалы самообслуживания, платформы электронной коммерции и автономную доставку."

 ### ADVERTISING

 pmg_base_advertising:0 "Рекламный средний"
 pmg_base_advertising_desc:0 "Основной канал, через который рекламное агентство распространяет свои кампании — печать, трансляция, прямая почта или вывески на открытом воздухе."

 pmg_digital_advertising:0 "Цифровая реклама"
 pmg_digital_advertising_desc:0 "Определяет, приняло ли агентство методы цифровой рекламы, от простых веб-баннеров до гипер-целевых кампаний, созданных ИИ."

 pmg_advertising_research:0 "Исследование рынка"
 pmg_advertising_research_desc:0 "Методы исследования, используемые для понимания и влияния на поведение потребителей, от традиционных фокус-групп до аналитики, основанной на машинном обучении."

 ### WAREHOUSING

 pmg_base_warehousing:0 "Складские операции"
 pmg_base_warehousing_desc:0 "Основные методы хранения и распределения склада, от базового ручного хранения до полностью автоматизированных центров обработки заказов."

 pmg_warehousing_logistics:0 "Управление запасами"
 pmg_warehousing_logistics_desc:0 "Системы, используемые для отслеживания и управления запасами на складе, от рукописных регистров до управления активами в режиме реального времени на основе ИИ."

 ### PHARMACEUTICAL SERVICES

 pmg_base_pharmaceutical_services:0 "Распределительные операции"
 pmg_base_pharmaceutical_services_desc:0 "Основной метод, с помощью которого фармацевтические соединения обрабатываются и выдаются пациентам, от традиционной аптекарской работы до рассылки по почте."

 pmg_pharmaceutical_research:0 "Исследования наркотиков"
 pmg_pharmaceutical_research_desc:0 "Определяет, инвестирует ли учреждение в фармацевтические исследования, ускоряя разработку новых методов лечения и стимулируя производство лекарственных средств."

 pmg_pharmaceutical_automation:0 "Автоматизация аптеки"
 pmg_pharmaceutical_automation_desc:0 "Степень автоматизации, используемой в процессе компаундирования и дозирования, от подготовленных вручную составов до полностью роботизированных аптечных систем."

 ####################
 # PRODUCTION METHODS
 ####################

 ### BANKING - BASE

 pm_basic_banking:0 "Стандартное кредитование"
 pm_basic_banking_desc:0 "Простая финансовая операция, предлагающая основные депозитные счета и личные кредиты, укомплектованные в основном клерками, управляющими бумажными книгами."

 pm_commercial_banking:0 "Коммерческий банкинг"
 pm_commercial_banking_desc:0 "Полностью чартерный коммерческий банк, предлагающий широкий спектр финансовых продуктов для бизнеса и потребителей, с расширенными возможностями для создания кредитов."

 pm_electronic_transfers:0 "Кредиты Payday"
 pm_electronic_transfers_desc:0 "Принятие электронных платежных систем и банковских переводов резко ускоряет движение капитала, уменьшая зависимость от физических документов."

 pm_online_banking:0 "Купить сейчас, заплатить позже"
 pm_online_banking_desc:0 "Полная цифровизация банковских операций позволяет клиентам управлять счетами и проводить транзакции удаленно, уменьшая накладные расходы филиала при массовом расширении охвата."

 ### BANKING - SECURITIES

 pm_no_securities_trading:0 "Нет торговли ценными бумагами"
 pm_no_securities_trading_desc:0 "Банк фокусируется исключительно на депозитных и кредитных операциях, без участия в финансовых рынках или ценных бумагах."

 pm_securities_brokerage:0 "Брокеры ценных бумаг"
 pm_securities_brokerage_desc:0 "Банк создает брокерскую контору, позволяющую клиентам покупать и продавать финансовые ценные бумаги. Потребляемые ценные бумаги направляются в расширенную кредитную генерацию."

 pm_derivatives_trading:0 "Хедж-фонды"
 pm_derivatives_trading_desc:0 "Банк торгует сложными финансовыми инструментами, полученными из базовых активов. Операции с высоким риском и высокой прибылью, которые резко увеличивают кредитный выпуск ценных бумаг."

 pm_algorithmic_trading:0 "Квантовая торговля"
 pm_algorithmic_trading_desc:0 "Алгоритмы машинного обучения выполняют сделки со сверхчеловеческой скоростью, максимизируя доходность портфеля ценных бумаг с минимальным вмешательством человека."

 ### BANKING - AUTOMATION

 pm_manual_tellers:0 "Руководящие указатели"
 pm_manual_tellers_desc:0 "Транзакции полностью обрабатываются кассирами-людьми за прилавком, что требует значительного клерикального персонала."

 pm_atm_network:0 "Сеть ATM"
 pm_atm_network_desc:0 "Сеть автоматизированных кассовых машин позволяет клиентам проводить базовые транзакции без персонала, сокращая штат клерикалов при одновременном расширении доступности услуг."

 pm_automated_banking_systems:0 "Автоматизированные банковские системы"
 pm_automated_banking_systems_desc:0 "Операции бэк-офиса компьютеризированы, что значительно снижает необходимость ручного ввода данных и обработки транзакций."

 pm_ai_financial_advisors:0 "Финансовые консультанты AI"
 pm_ai_financial_advisors_desc:0 "Робо-консультанты и инструменты финансового планирования, основанные на искусственном интеллекте, заменяют консультантов-людей для большинства клиентов, сокращая затраты на рабочую силу и увеличивая объем кредитования."

 ### FOOD SERVICES - BASE

 pm_corner_grocery:0 "Угловые продукты"
 pm_corner_grocery_desc:0 "Небольшие продуктовые магазины на уровне района, предлагающие ограниченный выбор основных товаров. Трудоемкий, но с низкими накладными расходами и сильными общественными связями."

 pm_supermarket:0 "Супермаркет"
 pm_supermarket_desc:0 "Крупные продуктовые магазины самообслуживания, предлагающие широкий ассортимент товаров под одной крышей, с эффективными цепочками поставок, обеспечивающими более высокую пропускную способность."

 pm_hypermarket:0 "Супермаркет"
 pm_hypermarket_desc:0 "Огромные комбинированные продуктовые и общие магазины товаров, привлекающие клиентов из широких водосборных районов и работающие в массовом масштабе."

 pm_online_grocery:0 "Онлайн-продукты"
 pm_online_grocery_desc:0 "Продукты заказываются в цифровом виде и выполняются из централизованных распределительных центров, что позволяет сократить физический след и расширить охват клиентов."

 ### FOOD SERVICES - RESTAURANT

 pm_no_restaurants:0 "Нет обеденных услуг"
 pm_no_restaurants_desc:0 "Заведение фокусируется исключительно на продуктовой рознице, без готовых продуктов питания или ресторанов."

 pm_local_restaurants:0 "Местные рестораны"
 pm_local_restaurants_desc:0 "Независимые рестораны подают готовые блюда местным клиентам, добавляя скромный объем продуктовых услуг в дополнение к продуктовым операциям."

 pm_fast_food_chains:0 "цепи быстрого питания"
 pm_fast_food_chains_desc:0 "Стандартизированные высокопроизводительные рестораны быстрого обслуживания, работающие в нескольких местах, резко увеличивают объемы производства продуктов питания с помощью методов промышленной подготовки."

 pm_fine_dining:0 "Отличная еда"
 pm_fine_dining_desc:0 "Масштабные ресторанные операции, обслуживающие более состоятельную клиентуру, генерируют премиальный продукт питания за счет квалифицированной рабочей силы и высококачественных ингредиентов."

 ### FOOD SERVICES - LOGISTICS

 pm_manual_food_checkout:0 "Ручная проверка"
 pm_manual_food_checkout_desc:0 "Все транзакции клиентов обрабатываются кассирами на укомплектованных кассах, что требует значительной рабочей силы для обслуживания пикового спроса."

 pm_self_checkout_food:0 "Терминалы самообслуживания"
 pm_self_checkout_food_desc:0 "Автоматизированные киоски самообслуживания уменьшают потребность в кассире, снижая затраты на рабочую силу и увеличивая пропускную способность в трудные периоды."

 pm_food_delivery_services:0 "Услуги доставки еды"
 pm_food_delivery_services_desc:0 "Создается сеть доставки, позволяющая клиентам получать продукты и готовую еду дома. Потребляет емкость хранилища для эффективного выполнения заказов."

 pm_drone_food_delivery:0 "Доставка дронов"
 pm_drone_food_delivery_desc:0 "Автономные беспилотные парки заменяют водителей доставки людей, резко сокращая затраты на рабочую силу, обеспечивая почти мгновенную доставку в зонах обслуживания."

 ### RETAIL - BASE

 pm_small_shops:0 "Маленькие магазины"
 pm_small_shops_desc:0 "Независимые розничные магазины, продающие небольшой ассортимент мебели, одежды и инструментов для местных клиентов. Простые операции с низкой накладной."

 pm_department_stores_retail:0 "Универмаги"
 pm_department_stores_retail_desc:0 "Крупные многоэтажные торговые заведения организованы в отделы, предлагающие под одной крышей широкий ассортимент товаров народного потребления."

 pm_big_box_retail:0 "Big-Box розничная торговля"
 pm_big_box_retail_desc:0 "Розничные магазины складского масштаба предлагают большие объемы товаров по конкурентоспособным ценам, опираясь на объемную покупательную способность и эффективную логистику."

 pm_outlet_retail:0 "Аутлет-центры"
 pm_outlet_retail_desc:0 "Выделенные торговые комплексы, где бренды продают избыточные и дисконтные акции непосредственно потребителям, концентрируя высокий торговый трафик в специально построенных направлениях."

 ### RETAIL - SPECIALIZATION

 pm_no_retail_specialization:0 "Общая розничная торговля"
 pm_no_retail_specialization_desc:0 "Магазин имеет широкий, недифференцированный ассортимент товаров без какой-либо конкретной категории."

 pm_home_goods_retail:0 "Home Товары Розничная торговля"
 pm_home_goods_retail_desc:0 "Магазин специализируется на мебели и домашней мебели, в том числе роскошных линиях, фиксируя более высокую маржу на желаемых бытовых покупках."

 pm_electronics_retail:0 "Электронная розничная торговля"
 pm_electronics_retail_desc:0 "Магазин специализируется на инструментах и бытовой электронике, требуя квалифицированного персонала и привлечения технически сложных клиентов."

 pm_luxury_retail:0 "Роскошная розничная торговля"
 pm_luxury_retail_desc:0 "Бутик-операция, занимающаяся роскошной одеждой и мебелью, управляя премиальными ценами от богатых потребителей и генерируя сильный розничный доход на единицу проданной."

 ### RETAIL - LOGISTICS

 pm_manual_retail_checkout:0 "Ручная проверка"
 pm_manual_retail_checkout_desc:0 "Все сделки купли-продажи обрабатываются в укомплектованных реестрах, что требует полного комплекта кассиров."

 pm_self_checkout_retail:0 "Терминалы самообслуживания"
 pm_self_checkout_retail_desc:0 "Платежные киоски самообслуживания позволяют клиентам обрабатывать собственные транзакции, уменьшая численность кассиров и улучшая пропускную способность магазина."

 pm_ecommerce_retail:0 "Электронная торговля"
 pm_ecommerce_retail_desc:0 "Интернет-магазин расширяет охват розничной торговли за пределы физических возможностей, требуя инфраструктуры хранения для постановки и выполнения цифровых заказов."

 pm_drone_retail_delivery:0 "Доставка дронов"
 pm_drone_retail_delivery_desc:0 "Автономная доставка дронов заменяет курьеров последней мили, резко сокращая затраты на доставку, ускоряя время выполнения онлайн-заказов."

 ### ADVERTISING - BASE

 pm_print_advertising:0 "Неприятные билборды"
 pm_print_advertising_desc:0 "Кампании распространялись через газеты, журналы и печатные материалы. Бумажные, но эффективные для охвата грамотной массовой аудитории."

 pm_broadcast_advertising:0 "Трансляция рекламы"
 pm_broadcast_advertising_desc:0 "Радио- и телереклама одновременно охватывает огромную аудиторию, требуя инвестиций в интеллектуальную собственность и таланты технического производства."

 pm_direct_mail_advertising:0 "Прямая почта"
 pm_direct_mail_advertising_desc:0 "Целевые рекламные материалы отправляются непосредственно на адреса потребителей. Высокое потребление бумаги, но допускает демографический таргетинг, невозможный для вещательных СМИ."

 pm_outdoor_advertising:0 "Электронные билборды"
 pm_outdoor_advertising_desc:0 "Рекламные щиты, плакаты и вывески, размещенные в районах с высоким трафиком, чтобы повысить узнаваемость бренда в масштабе. Требуется физический монтаж на широких площадях."

 ### ADVERTISING - DIGITAL

 pm_no_digital_advertising:0 "Нет цифровой рекламы"
 pm_no_digital_advertising_desc:0 "Агентство работает исключительно через традиционные медиаканалы и не применяет методы цифровой рекламы."

 pm_banner_advertising:0 "Реклама веб-баннеров"
 pm_banner_advertising_desc:0 "Статические и анимированные рекламные баннеры, размещенные на веб-сайтах, отмечают первые шаги агентства в экосистему цифровой рекламы."

 pm_social_media_advertising:0 "Реклама в социальных сетях"
 pm_social_media_advertising_desc:0 "Кампании, развернутые на платформах социальных сетей, охватывают огромную и высоко вовлеченную аудиторию, а интеллектуальная собственность становится основным драйвером затрат на бумагу."

 pm_algorithmic_targeted_ads:0 "Сбор данных"
 pm_algorithmic_targeted_ads_desc:0 "Алгоритмы машинного обучения анализируют данные потребителей для обслуживания индивидуально подобранных рекламных объявлений, максимизируя коэффициент конверсии и эффективность кампании в массовом масштабе."

 ### ADVERTISING - RESEARCH

 pm_focus_groups:0 "фокус-группы"
 pm_focus_groups_desc:0 "Небольшие группы репрезентативных потребителей собираются для тестирования сообщений и оценки реакций, обеспечивая качественную информацию для разработки кампании."

 pm_consumer_analytics:0 "Потребительская аналитика"
 pm_consumer_analytics_desc:0 "Систематический сбор данных и статистический анализ поведения потребителей заменяют догадки, позволяя совершенствовать кампании для максимального воздействия."

 pm_ai_ad_generation:0 "Созданный ИИ контент"
 pm_ai_ad_generation_desc:0 "Искусственный интеллект генерирует и оптимизирует рекламные копии, изображения и параметры таргетинга автономно, резко сокращая творческую рабочую силу, необходимую для увеличения производительности."

 ### WAREHOUSING - BASE

 pm_basic_warehousing:0 "Базовое хранение"
 pm_basic_warehousing_desc:0 "Простые складские помещения, укомплектованные ручными рабочими, потребляющие транспортные возможности для приема и отправки товаров."

 pm_climate_controlled_storage:0 "Хранение, контролируемое климатом"
 pm_climate_controlled_storage_desc:0 "Регулируемое по температуре и влажности хранение позволяет сохранить чувствительные товары, расширить ассортимент продуктов, которые можно хранить, и увеличить пропускную способность."

 pm_automated_warehouse:0 "Автоматический склад"
 pm_automated_warehouse_desc:0 "Роботизированные системы сбора и автоматизированные конвейеры заменяют ручной труд для основной части операций по хранению и извлечению, резко повышая производительность хранения на одного работника."

 pm_fulfillment_center:0 "Центр исполнения"
 pm_fulfillment_center_desc:0 "Высокопроизводительный логистический центр, оптимизированный для быстрой обработки и отправки заказов, интеграции хранения, сортировки, упаковки и доставки в единую бесшовную операцию."

 ### WAREHOUSING - LOGISTICS

 pm_manual_inventory:0 "Ручная инвентаризация"
 pm_manual_inventory_desc:0 "Запас отслеживается с использованием бумажных записей и физических подсчетов, что требует специального персонала для поддержания точности."

 pm_barcode_tracking:0 "Отслеживание штрих-кода"
 pm_barcode_tracking_desc:0 "Системы сканирования штрих-кода позволяют быстро и точно регистрировать движения запасов, уменьшая ошибки инвентаризации и клерикальный труд, необходимый для ведения записей."

 pm_rfid_tracking:0 "RFID отслеживание"
 pm_rfid_tracking_desc:0 "Радиочастотные идентификационные метки позволяют в режиме реального времени автоматически отслеживать каждый товар на складе без ручного сканирования, значительно повышая точность инвентаризации и пропускную способность."

 pm_ai_inventory_management:0 "Управление запасами ИИ"
 pm_ai_inventory_management_desc:0 "Искусственный интеллект постоянно оптимизирует уровень запасов, прогнозирует спрос и автоматизирует переупорядочение, сокращая отходы и устраняя необходимость в большинстве сотрудников по управлению запасами."

 ### PHARMACEUTICAL SERVICES - BASE

 pm_apothecary:0 "Фармацевт"
 pm_apothecary_desc:0 "Традиционный аптекарь вручную готовит и распределяет лекарственные соединения, полученные из сырых ботанических и химических веществ, включая препараты, полученные из опия."

 pm_pharmacy_dispensing:0 "Аптечная диспансеризация"
 pm_pharmacy_dispensing_desc:0 "Современная аптека, работающая по медицинскому регулированию, раздает стандартизированные фармацевтические продукты пациентам по рецепту."

 pm_hospital_pharmacy:0 "Больничная аптека"
 pm_hospital_pharmacy_desc:0 "Интегрированная аптечная операция, обслуживающая сеть больницы или клиники, обрабатывающая большие объемы сложных рецептов и специализированных рецептур."

 pm_mail_order_pharmacy:0 "Почтовая аптека"
 pm_mail_order_pharmacy_desc:0 "Рецепты выполняются централизованно и отправляются непосредственно пациентам по почте, обеспечивая широкий географический охват и большие объемы заказов с бережливым физическим следом."

 ### PHARMACEUTICAL SERVICES - RESEARCH

 pm_no_drug_research:0 "Нет исследовательской программы"
 pm_no_drug_research_desc:0 "Учреждение фокусируется исключительно на раздаче существующих соединений и не инвестирует в фармацевтические исследования или разработки."

 pm_clinical_trials:0 "РНК"
 pm_clinical_trials_desc:0 "Учреждение проводит контролируемые клинические испытания новых фармацевтических соединений, способствуя разработке лекарственных средств и расширению их продуктивной продукции."

 pm_biotech_research:0 "РНК"
 pm_biotech_research_desc:0 "Передовые методы биотехнологических исследований ускоряют открытие лекарств, что позволяет разрабатывать новые методы лечения и значительно увеличивать фармацевтическую продукцию."

 pm_gene_therapy:0 "Джин Редактировать"
 pm_gene_therapy_desc:0 "Передовые исследования по редактированию генов позволяют разрабатывать методы лечения, направленные на коренные генетические причины заболеваний, представляющие собой границу фармацевтической науки."

 ### PHARMACEUTICAL SERVICES - AUTOMATION

 pm_manual_compounding:0 "Ручное соединение"
 pm_manual_compounding_desc:0 "Фармацевты вручную готовят и измеряют каждый рецепт вручную, что является квалифицированным, но трудоемким процессом, требующим значительного персонала."

 pm_automated_dispensing:0 "Автоматическая раздача"
 pm_automated_dispensing_desc:0 "Автоматизированные раздаточные машины обрабатывают рутинное выполнение рецептов, освобождая персонал фармацевта, чтобы сосредоточиться на сложных случаях и снизить затраты на рабочую силу."

 pm_robotic_pharmacy:0 "Роботизированная аптека"
 pm_robotic_pharmacy_desc:0 "Полностью роботизированные системы дозирования обрабатывают подавляющее большинство рецептов с минимальным вмешательством человека, резко сокращая потребности в персонале и максимизируя производительность."
