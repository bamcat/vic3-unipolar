l_russian:

 # ==========================================
 # OLYMPICS — MODIFIERS
 # ==========================================

 olympics_hosting: "Олимпийский принимающая страна"
 olympics_hosting_desc: "Мир приближается к [ROOT.GetCountry.GetName]. Олимпийские игры продолжаются, привлекая внимание всего мира, туризм и престиж, а также значительные затраты и логистические потребности в проведении крупнейшего в мире спортивного мероприятия."

 olympics_hosting_prestige: "Олимпийский престиж"
 olympics_hosting_prestige_desc: "Проведение Олимпийских игр поставило [ROOT.GetCountry.GetName] в центр мирового внимания. Выгоды от дипломатии и мягкой силы значительны."

 olympics_recently_hosted: "Недавний олимпийский хозяин"
 olympics_recently_hosted_desc: "[ROOT.GetCountry.GetName] недавно принимал Олимпийские игры и не имеет права принимать их снова в течение нескольких лет."

 olympics_boycott_modifier: "Олимпийский бойкот"
 olympics_boycott_modifier_desc: "Решение бойкотировать Олимпийские игры было принято на международном уровне. Некоторые партнеры рассматривают это как принципиальную позицию, другие считают это ненужной провокацией."

 olympics_result_terrible: "Плохое олимпийское выступление"
 olympics_result_terrible_desc: "[ROOT.GetCountry.GetName] спортсмены вернулись с игр с небольшим количеством, чтобы показать это. Национальное настроение — это разочарование."

 olympics_result_modest: "Твердая олимпийская игра"
 olympics_result_modest_desc: "[ROOT.GetCountry.GetName] Спортсмены достойно оправдали себя на мировой арене."

 olympics_result_well: "Сильная олимпийская игра"
 olympics_result_well_desc: "[ROOT.GetCountry.GetName] спортсмены хорошо выступили на играх, принеся домой медали и национальную гордость."

 olympics_result_gold: "Доминирующее олимпийское выступление"
 olympics_result_gold_desc: "[ROOT.GetCountry.GetName] доминирует на Олимпийских играх. Медаль является источником огромной национальной гордости и повысила престиж страны во всем мире."

 olympics_doping_caught: "Олимпийский допинговый скандал"
 olympics_doping_caught_desc: "Спортсмены [ROOT.GetCountry.GetName] были пойманы с использованием препаратов, повышающих производительность. Медали были раздеты, чиновники подали в отставку, и страна сталкивается с международным осуждением. Ущерб национальному престижу серьезен."

 # ==========================================
 # EVENTS
 # ==========================================

 you_do_not_dope_athletes:0 "Вы будете играть справедливо"
 you_dope_your_athletes:0 "Вы даете своим спортсменам препараты, повышающие производительность, рискуя попасться."
 # olympics.1 — Host selection
 olympics.1.t: "Предложение провести Олимпиаду"
 olympics.1.d: "Международный олимпийский комитет обратился с предложением: провести следующие Олимпийские игры. Как стабильная демократия международного положения, [ROOT.GetCountry.GetName] соответствует критериям хостинга, а престиж и внимание, которые приходят с ним, значительны. Так же, как и затраты и требования организации крупнейшего в мире спортивного мероприятия."
 olympics.1.f: "Мир нуждается в сцене. Будет ли [ROOT.GetCountry.GetName] строить один?"
 olympics.1.a: "Примите — для нас большая честь принять"
 olympics.1.b: "Упадок — мы не можем взять на себя обязательства в это время"

 # olympics.3 — Participation offer
 olympics.3.t: "Олимпийские игры приближаются"
 olympics.3.d: "Следующие Олимпийские игры пройдут в формате [SCOPE.sCountry('olympics_host_scope').GetName]. Каждой стране мира предлагается отправить своих спортсменов на соревнования. Игры - это возможность для [ROOT.GetCountry.GetName] продемонстрировать свою силу, отпраздновать свой народ и занять свое место на мировой арене - или сделать политическое заявление, оставаясь в стороне."
 olympics.3.f: "Каждые четыре года мир наблюдает."
 olympics.3.a: "Пошлите наших спортсменов — мы будем соревноваться"
 olympics.3.b: "Бойкот: наше отсутствие говорит громче, чем наши спортсмены"

 # olympics.3b — Doping choice
 olympics.11.t: "Спортсмены готовятся"
 olympics.11.d: "До Олимпийских игр осталось несколько недель. Спортсмены [ROOT.GetCountry.GetName] усердно тренируются, но соревнования будут жесткими. Некоторые в рамках спортивной программы спокойно предполагают, что чистой конкуренции может быть недостаточно. Препараты, повышающие эффективность, могут дать спортсменам преимущество, в котором они нуждаются.\n\n Риск обнаружения реален. Последствия быть пойманным будут серьезными. Но последствия возвращения домой с пустыми руками могут быть хуже для некоторых."
 olympics.11.f: "У победы много отцов. Поражение не имеет ни одного."
 olympics.11.a: "Соревнуйтесь честно — наши спортсмены сделают все возможное"
 olympics.11.b: "Усильте их подготовку — мы играем на победу"

 # olympics.4 — Caught doping
 olympics.4.t: "Допинговый скандал потряс олимпийскую команду"
 olympics.4.d: "Международный олимпийский комитет объявил, что спортсмены из [ROOT.GetCountry.GetName] дали положительный результат на запрещенные вещества, повышающие производительность. Медали разбирают. Чиновников отстраняют. История является главным пунктом на каждом спортивном канале в мире.\n\n Опровержения правительства не принимаются во внимание. Репутационный ущерб является серьезным и потребуются годы для восстановления."
 olympics.4.f: "Золото тускнеет быстрее, чем светит."
 olympics.4.a: "Мы глубоко сожалеем об этой печальной ситуации."

 # olympics.5 — Terrible
 olympics.5.t: "Разочаровывающие Олимпийские игры"
 olympics.5.d: "Спортсмены [ROOT.GetCountry.GetName] соревновались и были в значительной степени завышены. Медаль скудная. Выступления были респектабельными в местах, смущающими в других. Дома спортивная пресса задает сложные вопросы о финансировании, подготовке и критериях отбора. Это не было шоу, на которое кто-то надеялся."
 olympics.5.d_doping: "Спортсмены соревновались с фармацевтической помощью — и все равно вернулись домой почти с пустыми руками. Допинговая программа принесла плохую пользу из-за значительного риска."
 olympics.5.f: "Всегда есть следующие игры."
 olympics.5.a: "Команда сделала все возможное"

 # olympics.6 — Modest
 olympics.6.t: "Респектабельное олимпийское выступление"
 olympics.6.d: "Спортсмены вернулись с игр со скромными, но реальными достижениями. Горстка медалей, несколько сильных индивидуальных выступлений и знание того, что страна может конкурировать на самом высоком уровне. Это не триумф, но и не разочарование."
 olympics.6.d_doping: "При некоторой фармацевтической помощи спортсменам [ROOT.GetCountry.GetName] удалось добиться респектабельного результата. Допинг, похоже, остался незамеченным — на этот раз."
 olympics.6.f: "Последовательно, если не эффектно."
 olympics.6.a: "Прочный показ для наших спортсменов"

 # olympics.7 — Well
 olympics.7.t: "Сильное олимпийское выступление"
 olympics.7.d: "[ROOT.GetCountry.GetName] Спортсмены вернулись домой к героям. Количество медалей впечатляет, выступления запоминаются, а национальное настроение плавучее. Несколько спортсменов стали именами нарицательными. Это действительно сильный результат, который хорошо отражается на стране и ее спортивной программе."
 olympics.7.d_doping: "[ROOT.GetCountry.GetName] спортсмены выступали сильно - с помощью, хотя общественность этого не знает, осторожной фармацевтической программы. Медали настоящие. Методы, которые их создали, менее достойны восхищения."
 olympics.7.f: "Сегодня нация немного выше."
 olympics.7.a: "Наши спортсмены заставили нас гордиться"

 # olympics.8 — Gold
 olympics.8.t: "Олимпийский триумф — [ROOT.GetCountry.GetName] Доминирует в играх"
 olympics.8.d: "Результаты были получены, и [ROOT.GetCountry.GetName] доминировал на Олимпийских играх. Таблица медалей рассказывает историю: больше золота, больше серебра, больше бронзы, чем почти любая другая нация. Спортсмены выступили сверх всех ожиданий, и страна празднует. На мировой арене [ROOT.GetCountry.GetName] оставил свой след."
 olympics.8.d_doping: "[ROOT.GetCountry.GetName] доминировал на Олимпийских играх, чему способствовала систематическая допинговая программа, которая до сих пор оставалась незамеченной. Медали настоящие. Праздник является подлинным. И секрет пока безопасен."
 olympics.8.f: "История запомнит это."
 olympics.8.a: "Наши спортсмены лучшие в мире"

 # olympics.9 — Closing ceremony
 olympics.9.t: "Олимпийский огонь погас"
 olympics.9.d: "Олимпийские игры в [SCOPE.sState('capital_scope').GetCityHubName] подошли к концу. Спортсмены вернулись домой. Стадионы затихают. Для [ROOT.GetCountry.GetName] это был необычный опыт — требовательный, дорогой и в конечном итоге стоящий того. Игры привели мир к двери [ROOT.GetCountry.GetName], и страна поднялась к этому случаю."
 olympics.9.f: "До следующего раза."
 olympics.9.a: "Для меня было честью принять мир."
