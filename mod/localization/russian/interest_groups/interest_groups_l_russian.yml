l_russian:

  # Base IGs
 ig_rural_folk:0 "Сельский народ"
 ig_rural_folk_only_icon:0 "@rural_folk!"
 ig_rural_folk_desc:0 "Люди в сельской местности, чьи политические интересы в основном совпадают с их аграрными средствами к существованию."
 ig_devout:0 "Религиозные фундаменталисты"
 ig_devout_only_icon:0 "@devout!"
 ig_devout_desc:0 "Наиболее преданные последователи религии большинства рассматривают ее как лучший источник нравственной и политической мудрости."
 ig_industrialists:0 "корпорации"
 ig_industrialists_only_icon:0 "@industrialists!"
 ig_industrialists_desc:0 "Инвесторы и акционеры, заинтересованные в технологическом развитии и промышленном росте."
 ig_landowners:0 "землевладельцы"
 ig_landowners_only_icon:0 "@landowners!"
 ig_landowners_desc:0 "Владельцы больших поместий и обширных плантаций, землевладельцы являются хранителями традиций и старых денег."
 ig_intelligentsia:0 "Академия"
 ig_intelligentsia_only_icon:0 "@intelligentsia!"
 ig_intelligentsia_desc:0 "Интеллектуалы, ведущие национальные тенденции в литературе, искусстве, музыке и театре. Также включает в себя общий класс менеджеров."
 ig_petty_bourgeoisie:0 "городские жители"
 ig_petty_bourgeoisie_only_icon:0 "@petty_bourgeoisie!"
 ig_petty_bourgeoisie_desc:0 "Малые предприятия, офисные клерки, бухгалтеры и другие лица, которые считаются между богатыми и бедными слоями."
 ig_armed_forces:0 "Вооружённые силы"
 ig_armed_forces_only_icon:0 "@armed_forces!"
 ig_armed_forces_desc:0 "Профессиональные солдаты и другие, чьи интересы тесно связаны с вооруженными силами страны."
 ig_trade_unions:0 "профсоюзы"
 ig_trade_unions_only_icon:0 "@trade_unions!"
 ig_trade_unions_desc:0 "Организованный труд, стремящийся организовать рабочих на шахтах, фабриках и полях и тем самым объединить силы разрозненных интересов в один голос."

  # Religious IGs
 ig_catholic_church:0 "Католическая церковь"
 ig_catholic_church_desc:0 "Католицизм является крупнейшей сектой христианства. Верующие считают, что архиепископ Рима, Папа, является непрерывным преемником власти Иисуса Христа через Святого Петра. Другие важные убеждения включают почитание святых и Девы Марии."
 ig_orthodox_church:0 "Православная Церковь"
 ig_orthodox_church_desc:0 "Православные церкви, как правило, являются восточными церквями, не находящимися в общении с Папой Римским."
 ig_oriental_orthodox_church:1 "Восточная православная церковь"
 ig_oriental_orthodox_church_desc:1 "Восточные православные церкви, как правило, являются ближневосточными церквями, не находящимися в общении с Папой Римским."
 ig_anglican_church:0 "Англиканская церковь"
 ig_anglican_church_desc:0 "Англиканская церковь была создана королем Генрихом VIII во время протестантской Реформации. Англиканцы считают, что Библия является главным авторитетом в христианской догме, отвергая Папу Римского, будучи менее радикальным, чем другие евангельские церкви."
 ig_evangelical_church:0 "Евангелическая церковь"
 ig_evangelical_church_desc:0 "Евангельские церкви были созданы в основном в Северной Европе во время протестантской Реформации. Евангелисты считают, что Библия является единственным авторитетом в христианской догме, отвергая Папу и рассматривая католическое почитание святых как граничащее с идолопоклонством."
 ig_rabbinical_council:0 "Раввинский совет"
 ig_rabbinical_council_desc:0 "Лидерство еврейского населения страны, как правило, хорошо образованные раввины с сильными традициями дебатов и учености."
 ig_sunni_madrasahs:1 "Суннитский Улема"
 ig_sunni_madrasahs_desc:1 "Суннитизм является крупнейшей сектой ислама. Верующие считают, что Мухаммед сменил на посту халифа ислама своего дядю Абу Бакра, в отличие от шиитского мнения о том, что его зять Али был законным преемником."
 ig_shia_madrasahs:1 "Шиитский Улема"
 ig_shia_madrasahs_desc:1 "Шиизм является второй по величине сектой ислама. Верующие считают, что Мухаммед сменил на посту халифа ислама своего зятя Али, в отличие от суннитского мнения о том, что его дядя Абу Бакр был законным преемником."
 ig_hindu_priesthood:0 "Индуистское священство"
 ig_hindu_priesthood_desc:0 "Вероятно, самая старая организованная религия, все еще существующая, индуизм считает, что разрыв цикла реинкарнации и достижение Нирваны требует приверженности кастовой системе, в которой люди играют роль, чтобы улучшить свою карму, так же как многие боги, которым поклоняются индусы, выполняют разные роли."
 ig_vajrayana_monks:0 "Монахи Ваджраяны"
 ig_vajrayana_monks_desc:0 "Буддизм Ваджраяны является самым сильным в Тибете и Монголии. Он подчеркивает использование медитации и самодисциплины."
 ig_mahayana_monks:0 "монахи Махаяны"
 ig_mahayana_monks_desc:0 "Махаяна буддизм является самым сильным в Китае, Вьетнаме и Корее. В ней подчеркивается, что каждый человек в обществе должен стремиться к просветлению через совершенство. Махаяна рассматривает Будду как богоподобную фигуру."
 ig_theravada_monks:0 "Монахи Тхеравады"
 ig_theravada_monks_desc:0 "Буддизм Тхеравады является самым сильным в Бирме, Сиаме, Камбодже и Цейлоне. Он уделяет большое внимание людям, ищущим Нирвану, чтобы разорвать цикл реинкарнации. Тхеравада рассматривает Будду не как Бога, а как просветленного человека, который показал всему человечеству путь к совершенству."
 ig_shinto_monks:0 "Монахи Синто"
 ig_shinto_monks_desc:0 "Синтоизм — это синкретическая вера, сочетающая буддийские концепции кармы и реинкарнации с поклонением и умиротворением ками, духов природы и умерших предков."
 ig_pagan_shamans:0 "Языческие шаманы"
 ig_pagan_shamans_desc:0 "Анимизм — это поклонение и умиротворение природных духов. Ритуалы, предпринятые анимистами, включают жертвоприношения пищи и скота, а также потребление галлюциногенных наркотиков для духовных путешествий самоанализа."

  # Taiping IGs
 ig_taiping_god_worshippers:0 "Общество богослужения"
 ig_taiping_god_worshippers_desc:0 "Богослужение, или Общество Поклонения Императору, является синкретической христианской верой, заметной среди Небесного Царства, поддерживая интерпретацию христианства, которое рассматривает всех верующих как сыновей и дочерей Бога."

  # British IGs
 ig_landed_gentry:0 "Посадочная Джентри"
 ig_landed_gentry_desc:0 "Владельцы больших поместий и обширных владений, помещичьи дворяне являются хранителями традиций и старых денег."

  # Prussian IGs
 ig_junkers:0 "Юнкеры"
 ig_junkers_desc:0 "Отступая от «юнгеров» (молодых лордов), которые последовали за тевтонскими завоеваниями языческой Балтики, чтобы поселить и христианизировать прусские земли, юнкеры являются дворянством Пруссии и крупными помещиками. Они, как правило, выступают против демократических движений как угрозы элитарному правлению."

  # USA IGs
 ig_southern_planters:0 "Домовладельцы"
 ig_southern_planters_desc:0 "В то время как жилье стало более дефицитным в последнее время, группы людей, претендующих на то, чтобы быть ассоциациями домовладельцев, занимающимися покупкой и продажей недвижимости с целью получения прибыли, искусственно завышали стоимость жизни."
 ig_evangelicals:0 "Выносливые христиане"
 ig_evangelicals_desc:0 "Выносливые христиане из удивительно широкого спектра протестантских деноминаций, все христиане согласны с тем, что нация должна найти свое собственное духовное пробуждение, чтобы спасти себя от роста секуляризма по всей стране."
 ig_yeoman_farmers:0 "Сельские жители Юга"
 ig_yeoman_farmers_desc:1 "Мелкий американский сельский класс, который многие отцы-основатели считали основой нации. Йоманский класс давно зарекомендовал себя как авангард американского сельского популизма."
 ig_wallstreet:0 "Уолл-стрит"
 ig_wallstreet_desc:0 "Инвестиционные банки на Уолл-стрит в Нью-Йорке являются основой американской финансовой системы, оказывая крайнее влияние на всю экономику."
 ig_silicon_valley:0 "Силиконовая долина"
 ig_silicon_valley_desc:0 "Программисты и компьютерные головоломки, которые управляют повседневной жизнью в Интернете."
 ig_american_middle_class:0 "Средняя Америка"
 ig_american_middle_class_desc:0 "Американский средний класс составляет большую часть потребительской базы страны, работая на рабочих местах, которые дают приемлемые зарплаты."
 ig_digital_activists:0 "Цифровые активисты"
 ig_digital_activists_desc:0 "Различные онлайн-влиятели имеют власть над нашим населением."
  # Ottoman IGs
 ig_local_governors:0 "Местные губернаторы"
 ig_local_governors_desc:0 "Правители провинций могут получить огромное влияние, создав местные сети покровительства. Династии могут стать настолько могущественными, что фактически являются независимыми государствами, только номинально связанными с империей."

  # Chinese IGs
 ig_literati:0 "Литература"
 ig_literati_desc:0 "Ученые в Китае играют важную роль как сторонники правительства, так и его критики."
 ig_scholar_officials:0 "Научные сотрудники"
 ig_scholar_officials_desc:0 "Помещичье дворянство в Китае на самом деле не является дворянством Китая. Они сохраняют свое богатство, покупая недвижимость, но они обязаны своей властью своим постам в правительстве."
 ig_confucian:0 "Конфуцианские ученые"
 ig_confucian_desc:0 "Конфуцианство, скорее, социальная традиция, сосуществует с множеством верований, но тем не менее требует социальной гармонии и сильной морали от тех, кто следует ей."

  # Papal IGs
 ig_roman_landowners:1 "Гражданское дворянство"
 ig_roman_landowners_desc:1 "Состоящий из благородных семей и земельных элит, предоставленных титулами Папы Римского, римское гражданское дворянство служит людьми богатства, влияния и временной власти на территориях Святого Престола."
 ig_roman_curia:0 "Римская курия"
 ig_roman_curia_desc:0 "Римская курия, или «Римский суд», как его иногда называют, является административным учреждением Святого Престола, осуществляющим как церковные, так и временные полномочия."

  # Japanese IGs
 ig_samurai:0 "Самураи"
 ig_samurai_desc:0 "Самураи являются наследственной военной знатью Японии, служа привилегированными слугами могущественного землевладельца Даймё и исполнителями воли своих феодальных хозяев."
 ig_shogunate:0 "сёгун"
 ig_shogunate_desc:0 "Сёгунат относится к военному правительству, которое управляло Японией от имени императора с 12-го века. Занявшись поддержкой могущественных феодалов, даймё, институция посвящена поддержанию традиционного японского порядка."
 ig_peasants:1 "Хаймин"
 ig_peasants_desc:0 "Хеймин обозначает японский класс простолюдинов, родившихся без каких-либо социальных привилегий и с политическими интересами, в первую очередь отражающими интересы сельских фермеров."
 ig_buddhist_monks:0 "буддийские монахи"
 ig_buddhist_monks_desc:0 "Существующий рядом и часто противоречащий местной японской вере в ками, буддизм 19-го века присутствовал в Японии более тысячелетия. Буддийские школы, которым покровительствовало государство на протяжении всей эпохи Эдо, подчеркивают синкретические отношения между ками и буддами."

  # Hawaiian IGs
 ig_christian_missionaries:0 "Христианские миссионеры"
 ig_christian_missionaries_desc:0 "Христианские миссионеры пришли на Гавайи всего несколько десятилетий назад, но уже вытеснили Кахуну как доминирующий клерикальный класс. Они выступают за торговлю с западными державами, привлечение мигрантов с Запада и обращение коренных гавайцев в христианство."
 ig_alii:0 "Али"
 ig_alii_desc:0 "Алии представляют меньшие дворяне Гавайев на службе правящего монарха. Они выступают за традиционные ценности и сохранение власти монархии."
 ig_maka_ainana:0 "Макаайнана"
 ig_maka_ainana_desc:0 "Макаинана представляет сельский класс Гавайев, часто работающий на плантациях и рыболовстве. Они выступают за традиционные ценности и постоянную экономическую зависимость Гавайев от сельскохозяйственного сектора."
 ig_hawaiian_democrats:0 "демократы"
 ig_hawaiian_democrats_desc:0 "Демократы представляют либеральных реформаторов Гавайев. Они выступают за отмену абсолютной власти монарха в пользу демократического режима и продолжения торговых отношений с западными державами."

  # Swedish IGs
 ig_church_of_sweden:0 "Церковь Швеции"
 ig_church_of_sweden_desc:0 "Церковь Швеции была спровоцирована королем Густавом Васа в 16 веке и является официальной государственной церковью Швеции. Будучи лютеранским учреждением, Церковь считает, что Библия является единственным авторитетом в христианской догме, таким образом отвергая авторитет Папы и такие традиции, как почитание святых."

  # Finnish IGs
 ig_church_of_finland: "Церковь Финляндии"
 ig_church_of_finland_desc: "Родившаяся после отделения Финляндии от Швеции в 1809 году, Церковь Финляндии была создана как официальная государственная церковь страны. Будучи лютеранским учреждением, Церковь считает, что Библия является единственным авторитетом в христианской догме, таким образом отвергая авторитет Папы и такие традиции, как почитание святых."

# Danish IGs
 ig_church_of_denmark: "Церковь Дании"
 ig_church_of_denmark_desc: "Основанная в 16 веке королем Кристианом III, Церковь Дании является официальной государственной церковью Дании. Будучи лютеранским учреждением, Церковь считает, что Библия является единственным авторитетом в христианской догме, таким образом отвергая авторитет Папы и такие традиции, как почитание святых."

# Norwegian IGs
 ig_aristocracy_of_officials: "Аристократия чиновников"
 ig_aristocracy_of_officials_desc: "Не имея сколько-нибудь значительного исторического дворянства, и с учреждением, формально упраздненным в 1821, высший класс Норвегии вместо этого состоит из государственных служащих, с адвокатами, священниками и врачами, занимающими позиции традиционного дворянства."
 ig_church_of_norway: "Церковь Норвегии"
 ig_church_of_norway_desc: "Церковь Норвегии была создана как отдельный орган от Римско-католической церкви и интегрирована с норвежским государством в 16 веке в результате протестантской Реформации. Будучи лютеранским учреждением, Церковь считает, что Библия является единственным авторитетом в христианской догме, таким образом отвергая авторитет Папы и такие традиции, как почитание святых."

  # Korean IGs
 ig_yangban:0 "Чиновники Янгбана"
 ig_yangban_desc:0 "Янгбан представляет собой помещичье и неземное дворянство Кореи, которые получают свои титулы и влияние с позиций внутри бюрократического аппарата страны. Являясь примером конфуцианских идеалов официального ученого, они являются стойкими защитниками традиционного порядка Кореи."

  # Russian IGs
 ig_gentry_assembly:0 "Гентри-ассамблея"
 ig_gentry_assembly_desc:0 "Гентрийское собрание является органом самоуправления, представляющим русскую аристократию. Получив официальный статус в 1785 году, Собрание с тех пор выступает за сохранение или расширение традиционных полномочий и привилегий дворян."

  # Australian IGs
 ig_squattocracy: "Сквоттократия"
 ig_squattocracy_desc: "«Скваттократия» представляет собой класс белых австралийских поселенцев, которые заняли большие участки земли с небольшими правовыми притязаниями. Часто первые поселенцы прибывают в данный район, скваттократия приобрела огромное богатство и социальное влияние главным образом за счет доходов от выращивания скота на своих территориях."

  # Austrian IGs
 austrian_aristocracy:0 "Австрийская аристократия"
 austrian_aristocracy_desc: "Австрийская аристократия представляет установленный благородный класс Австрии, исторически награжденный благородными титулами императорами Священной Римской империи Габсбургов и эрцгерцогами Австрии и обладающий большим влиянием в императорском дворе."

  # Misc Igs
 ig_red_army:0 "Красная Армия"
 ig_red_army_desc:0 "Красная Армия – это институт, посвященный защите и пропаганде революции, рожденный путем объединения традиционных вооруженных сил с пролетариатом и коммунистической идеологией."
 ig_fellahin: "Феллахин"
 ig_fellahin_desc: "Получив свое название от плуг, на которых они работают, и от полей, которые они обрабатывают, феллахи являются фермерами и крестьянами Египта."

  # Indian IGs
  ig_zamindars: "Заминдарс"
  ig_zamindars_desc: "Заминдары являются типичными наследственными владельцами крупных поместий. Они часто представляют собой остатки аристократии эпохи Моголов, которой предоставлено право собирать земельные доходы от имени своих правителей."

  ig_east_india_company: "Ост-Индская компания"
  ig_east_india_company_desc: "Ост-Индская компания является частной корпорацией, которой поручено управлять Индией под наблюдением британского парламента. После отмены своего коммерческого мандата в 1833 году он стал чисто административным органом."

  ig_presidency_armies: "Президентские армии"
  ig_presidency_armies_desc: "Вооруженные силы колониальной Индии, как правило, состоят из коренных индийских сипаев под командованием европейских офицеров."

  ig_indian_army: "Индийская армия"
  ig_indian_army_desc: "Индийская армия является основной вооруженной силой колониальной Индии, сформированной путем объединения президентских армий в единый орган. В основном состоит из индийских солдат под командованием европейских офицеров."

  ig_ryots: "Риотс"
  ig_ryots_desc: "Рьоты - традиционные фермеры и крестьяне Индии, как правило, без своей собственной земли. Их интересы в основном носят аграрный характер."

  ig_civil_servants: "Гражданские служащие"
  ig_civil_servants_desc: "Гражданские служащие охватывают интеллигенцию индейцев, которая развилась главным образом из различных органов индийской колониальной бюрократии. Они, как правило, занимают или занимали должности клерков или других администраторов низкого и среднего уровня."

  ig_government_of_india: "Правительство Индии"
  ig_government_of_india_desc: "Правительство Индии относится к европейской колониальной администрации, которой поручено продвигать интересы британской короны в Индии."

  ig_bhadralok: "Бхадралокс"
  ig_bhadralok_desc: "Бхадралок, или «джентльмены», охватывает денежный средний класс индийского общества. Эта группа в ее нынешнем виде возникла в Бенгалии, среди местных бенгальских торговцев, промышленников и финансистов, которые присоединились к Ост-Индской компании во время ее завоевания Индии."

  ig_kisanharu: "Кисанхару"
  ig_kisanharu_desc: "Кисанхару являются традиционными фермерами и крестьянами Непала, как правило, без какой-либо собственной земли. Их интересы в основном носят аграрный характер."
