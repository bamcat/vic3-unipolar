 # leaders
 
 ideology_marxist_leader: "марксист"
 ideology_marxist_leader_desc: "Революционные социалистические лидеры, которые выступают за правление совета, общественную собственность, коллективизированное сельское хозяйство и резкий разрыв с либеральным капитализмом."
 ideology_state_socialist_leader: "Социалистическое государство"
 ideology_state_socialist_leader_desc: "Централизация социалистических лидеров, предпочитающих однопартийное или технократическое государственное руководство, командную экономику и крупные общественные системы."
 ideology_left_wing_populist_leader: "Левый популист"
 ideology_left_wing_populist_leader_desc: "Лидеры антиэлитной массовой политики смешивают перераспределение, протекционизм, демократию и сильную враждебность к олигархическому правлению."
 ideology_democratic_socialist_leader: "Демократический социал-социалист"
 ideology_democratic_socialist_leader_desc: "Демократические левые лидеры, которые выступают за выборы, рабочую власть, социальную собственность, сильное благосостояние и гражданские свободы."
 ideology_green_leader: "зеленый"
 ideology_green_leader_desc: "Экологические демократические лидеры сосредоточились на экологическом регулировании, общественных благах, гражданских свободах и постиндустриальной реформе."
 ideology_state_capitalist_leader: "Государственный капитализм"
 ideology_state_capitalist_leader_desc: "Лидеры-разработчики, которые принимают рынки, но хотят сильного государства, стратегической промышленности, централизованного банковского дела и управляемых инвестиций."
 ideology_market_socialist_leader: "рыночный социал-социалист"
 ideology_market_socialist_leader_desc: "Децентрализованные социалистические лидеры, которые выступают за кооперативы, профсоюзы, благосостояние и рыночные механизмы под демократическим контролем."
 ideology_progressive_leader: "прогрессивный"
 ideology_progressive_leader_desc: "Реформистские лидеры сосредоточились на равных правах, расширении благосостояния, образовании, гражданских свободах и управляемой рыночной реформе."
 ideology_social_liberal_leader: "Социальный либерал"
 ideology_social_liberal_leader_desc: "Либерально-демократические лидеры, которые поддерживают рынки с благосостоянием, равным гражданством, образованием и регулируемым капитализмом."
 ideology_technocrat_leader: "технократ"
 ideology_technocrat_leader_desc: "Лидеры экспертного руководства, которые поддерживают секуляризм, административное планирование, государственный потенциал, регулируемые рынки и научное управление."
 ideology_liberal_leader: "либеральный"
 ideology_liberal_leader_desc: "Основные либеральные лидеры, которые поддерживают конституционные республики, гражданские свободы, свободную торговлю, частные рынки и юридическое равенство."
 ideology_moderate_leader: "умеренный"
 ideology_moderate_leader_desc: "Прагматичные лидеры истеблишмента, которые редко продвигают радикальные реформы и наиболее распространены в стабильных смешанных системах."
 ideology_neoliberal_leader: "неолиберальный"
 ideology_neoliberal_leader_desc: "Ориентированные на рынок либеральные лидеры, которые выступают за свободную торговлю, невмешательство, частное обеспечение, фискальную сдержанность и технократические институты."
 ideology_conservative_leader: "консерватор"
 ideology_conservative_leader_desc: "Правые лидеры, которые выступают за социальный порядок, ограниченные реформы, умеренную рыночную экономику, традиции и осторожный национализм."
 ideology_corporatist_leader: "капроратист"
 ideology_corporatist_leader_desc: "Капиталистические координационные лидеры, которые выступают за интервенционистский или невмешательственный капитализм, организованный через государственные учреждения."
 ideology_theocrat_leader: "теократ"
 ideology_theocrat_leader_desc: "Религиозные лидеры, которые хотят, чтобы государство, школы, суды и гражданство были организованы вокруг официальной религии."
 ideology_right_wing_libertarian_leader: "Правый либертарианец"
 ideology_right_wing_libertarian_leader_desc: "Лидеры антигосударственного рынка, которые выступают за частные институты, низкое благосостояние, свободные СМИ и слабую внутреннюю безопасность."
 ideology_classical_liberal_leader: "Классический либеральный"
 ideology_classical_liberal_leader_desc: "Старые либеральные конституционалисты, которые выступают за свободную торговлю, ограниченное правительство, права собственности, представительные институты и верховенство закона."
 ideology_neocon_leader: "неокон"
 ideology_neocon_leader_desc: "Милитаризованные либерально-консервативные лидеры, выступающие за профессиональные вооруженные силы, интервенцию за рубежом, капиталистические институты и национальную безопасность."
 ideology_jihadist_leader: "джихадист"
 ideology_jihadist_leader_desc: "Боевые религиозные лидеры, которые могут появиться только в странах исламского государства, находятся под радикальным давлением."
 ideology_minarchist_leader: "минархист"
 ideology_minarchist_leader_desc: "Экстремальные лидеры рынка малых государств, которые поддерживают laissez-faire, частные системы и почти полный отказ от государственной власти."
 ideology_right_wing_populist_leader: "Правый популист"
 ideology_right_wing_populist_leader_desc: "Антиэлитные национал-популистские лидеры, которые поднимаются в либеральных демократиях с высокими радикалами, смешивая шовинизм благосостояния, протекционизм и культурную негативную реакцию."
 ideology_authoritarian_capitalist_leader: "Авторитарный капиталист"
 ideology_authoritarian_capitalist_leader_desc: "Жесткие капиталистические лидеры, которые выступают за частный или управляемый капитализм при автократии, полицейской власти, цензуре и слабой оппозиции."
 ideology_monarchist_leader: "монархист"
 ideology_monarchist_leader_desc: "Династические лояльные лидеры, которые почти только появляются в монархиях и предпочитают наследственную власть, традицию, церковь и иерархию."
 ideology_fascist_leader: "фашистский"
 ideology_fascist_leader_desc: "Ультранационалистические авторитарные лидеры, которые выступают за милитаризацию, однопартийное правление, государственное насилие, закрытое общество и корпоративную национальную экономику."
 ideology_anarchist_leader: "анархист"
 ideology_anarchist_leader_desc: "Антиавторитарные социалистические лидеры, которые выступают за самоуправление без гражданства, кооперативную собственность, ополчение, свободу слова, отсутствие полиции и сильную местную автономию."
