l_russian:

  # Landowners IG Traits
 ig_trait_noblesse_oblige:0 "Благородная обязанность"
 ig_trait_noblesse_oblige_desc:0 "Мы лучше, чем обычные люди, а это значит, что мы обязаны заботиться о них. Их попытки организовать вещи для себя саморазрушительны и обречены на провал."
 ig_trait_family_ties:0 "Семейные узы"
 ig_trait_family_ties_desc:0 "В наше время мы все еще знаем ценность хорошего брака. Наши связи старше границ, которые они преодолевают, и переживут как альянсы, так и правительства."
 ig_trait_noble_privileges:0 "Благородные привилегии"
 ig_trait_noble_privileges_desc:0 "Что случилось с идеей, что дворянство должно быть оставлено для выполнения своих обязанностей без преследования сборщиками налогов? Пришло время вернуть эти дни."
 ig_trait_profitable_estates: "Прибыльная недвижимость"
 ig_trait_profitable_estates_desc: "Ты не знал? То, что хорошо для дворянства, хорошо и для нации — процветание просачивается."
 ig_trait_the_velvet_book: "Бархатная книга"
 ig_trait_the_velvet_book_desc: "Только самые смелые семьи могут вымолвить свои имена в этой почтенной книге. Мы знаем, кто принадлежит, а кто нет."
 ig_trait_bad_boyars: "Плохие бояре"
 ig_trait_bad_boyars_desc: "Так они хотят сказать, что доброго царя страны вводят в заблуждение его плохие бояре? Мы можем показать им, на что способны плохие бояре."
 ig_trait_latifundios: "Latifúndios"
 ig_trait_latifundios_desc: "Производительность и богатство наших поместий не имеют себе равных. Деньги текут через наши руки, как вода через пороги. Поистине, это золотые дни для всех нас."
 ig_trait_junkerdom: "юнкердом"
 ig_trait_junkerdom_desc: "Наша власть исходит из наших земель, и наши земли — могучие земли. Что бы мы ни решили сделать, народ последует за нами."
 ig_trait_patrician_philanthropy: "Патрисийская благотворительность"
 ig_trait_patrician_philanthropy_desc: "Настало время сделать что-то для нашего ближнего и убедиться, что наши имена были украшены тем, что в конечном итоге будет построено."
 ig_trait_wiener_walzer: "Винер Уолцер"
 ig_trait_wiener_walzer_desc: "У кого-то был нерв на последнем мяче, чтобы попросить сыграть в минуэт. Дорогая, мы делаем вальсы! Мы установили, что модно, и это #italic, а не #! minuet!"
 ig_trait_fazenda_ibicaba: "Фазенда Ибикаба"
 ig_trait_fazenda_ibicaba_desc: "Рабочая сила является постоянной проблемой для наших предприятий, и поэтому мы должны следовать всем возможным путем, чтобы получить необходимый нам труд."
 ig_trait_summon_no_zamindars: "Альбом: No Zamindars"
 ig_trait_summon_no_zamindars_desc: "Правители нашей страны продемонстрировали, что они не заинтересованы в переговорах или гибкости. Если это так, то они не должны пропустить более тонкие вещи, которые мы делаем, чтобы поддерживать порядок."
 ig_trait_famine_reserves: "Голодные резервы"
 ig_trait_famine_reserves_desc: "Наш долг — открывать запасы зерна, когда возникает острая необходимость. Какой лучший способ приобрести доброжелательность у наших арендаторов?"

  # Industrialists IG Traits
 ig_trait_job_creators:0 "Создатели работы"
 ig_trait_job_creators_desc:0 "Нужно тратить деньги, чтобы заработать деньги. До тех пор, пока правительству можно доверять, чтобы оно не вмешивалось в наши инвестиции, мы не будем ставить нашу прибыль выше экономического роста."
 ig_trait_engines_of_progress:0 "Двигатель прогресса"
 ig_trait_engines_of_progress_desc:0 "Посмотрите на чудеса современной эпохи! Нет времени для колебаний. Если он может быть продуман, спроектирован и запатентован, он должен быть построен, испытан и немедленно использован."
 ig_trait_tax_avoidance:0 "Избегание налогов"
 ig_trait_tax_avoidance_desc:0 "Кто знает, куда лучше всего потратить наши деньги? Не правительство, и уж точно не нынешнее. К счастью, их некомпетентность оставила налоговые лазейки, которые можно эффективно использовать."
 ig_trait_zaibatsu_cooperation: "Сотрудничество Zaibatsu"
 ig_trait_zaibatsu_cooperation_desc: "Здоровые отношения между промышленностью и правительством приносят пользу всем. В обоих наших интересах обеспечить сохранение этого дружественного положения дел."
 ig_trait_zaibatsu_withdrawal: "Зайбатсу уходит"
 ig_trait_zaibatsu_withdrawal_desc: "Наше финансовое здоровье выиграет больше всего благодаря переориентации на валютные спекуляции и внутренние реинвестиции. Государственная торговля, к сожалению для правительства, сейчас не является приоритетом."
 ig_trait_kommerskollegium: "Коммерсколлегия"
 ig_trait_kommerskollegium_desc: "Нам надлежит, поскольку масштабы наших коммерческих интересов продолжают расти, обеспечить справедливое управление заработанным богатством."
 ig_trait_ventilate_unify_beautify: "Вентиляция, объединение и красота"
 ig_trait_ventilate_unify_beautify_desc: "Ты видел, каково это там? Это мастерская болезней, место, где никогда не светит солнце, где гибнут растения, где нищета и чума работают сообща. Нам, конечно, приходится исправлять этот беспорядок."
 ig_trait_the_goods_must_flow: "Товары должны течь"
 ig_trait_the_goods_must_flow_desc: "Все хорошо и хорошо производить столько, сколько производит наша страна, но какая польза, если она не может выйти на рынки, на которых ее нужно продавать? Пришло время убедиться, что страна понимает, насколько необходим хороший транспорт."
 ig_trait_wounded_honor: "Раненная честь"
 ig_trait_wounded_honor_desc: "Мы — просвещенные немногие в стране, которая сопротивляется любому просветлению. Наши методы превосходят другие — любое расстройство является предательством, и предательство должно быть встречено самым суровым наказанием."
 ig_trait_stamped_and_signed: "Подписано и подписано"
 ig_trait_stamped_and_signed_desc: "Марки и бухгалтерские книги — это методы, которые мы используем для создания порядка из хаоса. Для управления Индией необходим океан бумаги, и наша задача — обеспечить его безупречное распространение."
 ig_trait_responsible_government: "Ответственное управление"
 ig_trait_responsible_government_desc: "Наша миссия состоит в том, чтобы распространить справедливость и цивилизацию на всех людей и, конечно, увековечить правило, которое позволяет это навсегда."

  # Armed Forces IG Traits
 ig_trait_patriotic_fervor:0 "Патриотический Фервор"
 ig_trait_patriotic_fervor_desc:0 "Независимо от того, насколько блестящая стратегия и как продвинутое оружие, некоторые битвы могут быть выиграны только с тяжелой работой и мужеством. Солдаты, которые действительно верят в то, за что выступает их страна, будут сражаться храбро, независимо от шансов."
 ig_trait_veteran_consultation:0 "Ветеранская консультация"
 ig_trait_veteran_consultation_desc:0 "Технологические достижения меняют лицо войны, но мы можем использовать их, только если поймем, как это сделать. К счастью, у тех из нас, кто имеет опыт из первых рук, должна быть идея."
 ig_trait_materiel_waste:0 "Материальные отходы"
 ig_trait_materiel_waste_desc:0 "Лояльность к нации — это не лояльность к правительству. Если мы не можем доверять ответственным людям, мы можем использовать то, что нам дано, как мы считаем нужным."
 ig_trait_elan_vital: "Элан Виталий"
 ig_trait_elan_vital_desc: "Несмотря на то, что новейшие виды оружия и вооружений хороши и хороши, путь к победе зависит от драйвового духа, который не склонится перед лицом невзгод. Солдаты, которые действительно верят в то, за что выступает нация, будут продвигаться смело, независимо от шансов."
 ig_trait_newly_created_army: "Недавно созданная армия"
 ig_trait_newly_created_army_desc: "Сердце современной армии лежит не в новейших винтовках или лучшей форме, а в организации и логистике. Чтобы обеспечить снабжение каждого солдата, чтобы поддерживать постоянный и надежный поток боеприпасов и пайков, чтобы каждый человек знал свою роль в огромной военной машине — вот как сделать армию стоящей чего-то."
 ig_trait_self_strengthening: "Самоукрепление"
 ig_trait_self_strengthening_desc: "Наш разум и мудрость обязательно превосходят тех, кто нас окружает. Таким образом, то, что мы должны узнать из-за рубежа, это только одно: солидные корабли и эффективные пушки."
 ig_trait_parochial_leadership: "приходское лидерство"
 ig_trait_parochial_leadership_desc: "В эти темные времена каждый сам за себя, и каждая провинция должна в первую очередь заботиться о своем благополучии. Неразумно ожидать, что каждый офицер будет с энтузиазмом вести далеко от дома, когда его собственный очаг может оказаться под угрозой."
 ig_trait_el_buen_jefe: "Эль-Буэн"
 ig_trait_el_buen_jefe_desc: "Каждый хороший солдат нуждается в хорошем офицере, чтобы вести его. В наше время всему народу нужен хороший офицер."
 ig_trait_clube_militar: "Клуб Милитар"
 ig_trait_clube_militar_desc: "Место, где офицеры и солдаты, подобные нам, могут отдыхать, расслабляться и организовываться в свободное время, наверняка будет безвредным. Во всяком случае, место, где мы все можем говорить и планировать вещи, может служить стране."
 ig_trait_coronelismo: "Коронелисмо"
 ig_trait_coronelismo_desc: "Вы видели последний указ правительства? Разве они не понимают, с кем имеют дело? Украшенный джентльмен, такой как я, со всеми моими людьми и поместьями, не должен быть пустой!"
 ig_trait_divided_ranks: "Разделенные ранги"
 ig_trait_divided_ranks_desc: "Между нашими солдатами и офицерами существует фундаментальный разрыв, который стал слишком широким, чтобы его игнорировать. Почему человек ставит свою жизнь на кон ради того, кто относится к его обычаям с презрением?"
 ig_trait_imperial_service: "Императорская служба"
 ig_trait_imperial_service_desc: "Носить униформу и расширять границы – большая честь, к которой стремятся миллионы людей. Им повезло, что всегда есть позиции для заполнения."
 ig_trait_veerta: "Верта"
 ig_trait_veerta_desc: "Наша армия завоевала всю Индию, производя бесконечный поток побед против всех врагов. Наша храбрость и дисциплина гарантируют, что этот почетный список никогда не закончится."

  # Rural Folk IG Traits
 ig_trait_farmers_markets:0 "Фермерские рынки"
 ig_trait_farmers_markets_desc:0 "Получение товаров, которые мы производим, людям, которые в них нуждаются, кажется большой проблемой в наши дни. При хороших обстоятельствах мы вполне способны доставить их туда, где они должны быть самими собой."
 ig_trait_honest_work:0 "Честная работа"
 ig_trait_honest_work_desc:0 "Мы зарабатываем на жизнь честным трудом и честным потом. Если это означает, что мы производим больше, чем нам нужно, это намного лучше."
 ig_trait_old_ways:0 "Старые способы"
 ig_trait_old_ways_desc:0 "Эти люди, управляющие страной, похоже, имеют всевозможные представления о том, как должно выглядеть будущее. Почему мы должны доверять им, когда они сделали подарок таким, какой он есть?"
 ig_trait_obshchina: "Щина"
 ig_trait_obshchina_desc: "Жизнь в нашей маленькой деревне не так уж и плоха. Разделить работу между всеми нами легко, и вдвойне распространяться вокруг продукта и прибыли."
 ig_trait_fellahin: "Феллахин"
 ig_trait_fellahin_desc: "Наша судьба в жизни - работать в этих областях как можно лучше. Иногда наша работа действительно окупается."
 ig_trait_nucleos_coloniais: "Nucleos Coloniais"
 ig_trait_nucleos_coloniais_desc: "Новый дом означает новый старт в жизни. Что в этом плохого? Давайте посмотрим, что может предложить новое поселение."
 ig_trait_plantation_work: "Плантационная работа"
 ig_trait_plantation_work_desc: "Мы усердно работаем день за днем и получаем то, что нам нужно. Однако в некоторые дни мы получаем больше, чем это, и мы дорожим этими днями."
 ig_trait_of_the_sovereign_alone: "О суверене в одиночку"
 ig_trait_of_the_sovereign_alone_desc: "То бремя, которое возлагают на нас те, кто владеет землей, невыносимо. Этим посредникам следует напомнить, что мы являемся риотами одного суверена, и они не имеют над нами законной власти."
 ig_trait_imandari: "Имандари"
 ig_trait_imandari_desc: "Наша земля богата, и мы работаем над ней с усердием. В хорошие времена мы можем производить то, что нам нужно, и даже больше."
 ig_trait_bazaar_bargains: "Торговля на базаре"
 ig_trait_bazaar_bargains_desc: "Это наши базары, которые обогащают наши города и привлекают посетителей с миль вокруг. Если процветание требует дополнительной организации, это цена, которую мы готовы заплатить."

  # Trade Unions IG Traits
 ig_trait_solidarity:0 "Солидарность"
 ig_trait_solidarity_desc:0 "Все, кто хочет работать, должны иметь работу! Никто не будет исключен или исключен. Мы должны поддерживать право друг друга на справедливо компенсированный труд."
 ig_trait_industrial_organizers:0 "Промышленные организаторы"
 ig_trait_industrial_organizers_desc:0 "Независимо от того, кто отвечает, то, как работники сотрудничают, в конечном итоге оказывает большее влияние на то, насколько хорошо работает завод, чем любые правила, передаваемые с высоты."
 ig_trait_work_to_rule:0 "Правило работы"
 ig_trait_work_to_rule_desc:0 "Кажется, что люди во главе хотят, чтобы мы просто заткнулись и сделали то, что нам говорят, а не думали для себя. Посмотрим, как им понравится, если мы применим эту философию к нашему «неквалифицированному» труду."
 ig_trait_bourse_du_travail: "Обсуждение Burse du Travail"
 ig_trait_bourse_du_travail_desc: "Организация не заканчивается в конце рабочего дня! Единый фронт требует помощи друг другу не только на заводе, но и в наших домах и общинах."

  # Intelligentsia IG Traits
 ig_trait_propagandists:0 "пропагандисты"
 ig_trait_propagandists_desc:0 "В нашей поэзии, в наших письмах и в наших политических манифестах мы должны прежде всего поддерживать прогресс, достигнутый в нашей родной стране, как пример того, что эта новая эпоха должна принести менее удачливым частям мира."
 ig_trait_avant_garde:0 "авангард"
 ig_trait_avant_garde_desc:0 "О чем другие не смеют даже думать, мы уже будем говорить вслух. Наше искусство и идеи разрежутся прямо в сердца и заставят открыть глаза, если не в изумлении, то в шоке!"
 ig_trait_social_criticism:0 "Социальная критика"
 ig_trait_social_criticism_desc:0 "Люди у власти часто думают, что их нельзя упрекнуть, но власть не делает чьи-то идеи интересными. У нас есть много интересных вещей, и мы точно знаем, о ком их говорить."
 ig_trait_restoration: "Восстановление"
 ig_trait_restoration_desc: "В эту эпоху великих вызовов и великих достижений мы гордимся нашим упорным стремлением вернуть нацию к ее старому величию. Необыкновенная работа подтвердила статус нашей цивилизации, и необычная работа выведет ее на еще большие высоты."
 ig_trait_crisis_of_identity: "Кризис идентичности"
 ig_trait_crisis_of_identity_desc: "Нация, которой мы служим, может быть не такой, какой мы есть на самом деле. Как много у нас общего с людьми, ответственными за это?"
 ig_trait_les_beaux_arts: "Les Beaux-Arts"
 ig_trait_les_beaux_arts_desc: "Наше искусство, наши выставки и наш творческий талант не имеют себе равных. Почему мы не должны хвастаться? Мы должны заставить других ревновать."
 ig_trait_brasilidade: "Брасилидада"
 ig_trait_brasilidade_desc: "Пойдем, друг, отпразднуем сегодня вечером! Здесь мы слышим самые красивые баллады под звездным светом с бутылкой в руках, а там — а, посмотрите, что он уже рисует! Разве это не жизнь?"
 ig_trait_bachareis: "Бахаре"
 ig_trait_bachareis_desc: "Мы знаем, что нужно стране! В конце концов, мы говорим за людей — что? Нет, мы не говорили, что говорим #italic людям."
 ig_trait_swaraj: "Сварадж"
 ig_trait_swaraj_desc: "Мы оказываемся как отчуждёнными, так и порабощенными государством. Наши правители отказывают нам в посредничестве, запрашивая наше необдуманное служение. Такая вещь обречена на провал, и при необходимости мы будем работать над тем, чтобы это произошло."
 ig_trait_westernisation: "вестернизация"
 ig_trait_westernisation_desc: "Наше нынешнее правительство служит представителем справедливости и прогресса, но большая часть нашей страны остается далекой от него. Мы должны стремиться к сокращению разрыва между государством и народом."

  # Petite-Bourgeoisie IG Traits
 ig_trait_treasury_bonds:0 "Казначейские облигации"
 ig_trait_treasury_bonds_desc:0 "До тех пор, пока правительству можно доверять выплату долгов, вкладывать наши с трудом заработанные сбережения в финансирование этой великой нации — это не только патриотическое, но и хорошее вложение."
 ig_trait_middle_managers:0 "Средние менеджеры"
 ig_trait_middle_managers_desc:0 "Мы не можем заставить всех делать все по книге, но мы можем, по крайней мере, сохранить то, что сделано по книгам. Кто-то должен помнить правильный способ делать вещи здесь."
 ig_trait_xenophobia:0 "ксенофобия"
 ig_trait_xenophobia_desc:0 "Мы все знаем, кто виноват в состоянии нашей страны, люди просто боятся это говорить. Между тем, они смеются за нашими спинами над тем, что мы позволяем им уйти. Кто-то должен действовать."
 ig_trait_bergsbrukens_valdistrikten: "Бергсбрюкенс Вальдистрикт"
 ig_trait_bergsbrukens_valdistrikten_desc: "Тесное сотрудничество между интересами горнодобывающей промышленности и мещанской недвижимостью означает, что в лучшие времена мы можем быть уверены, что государство получит поддержку, о которой другие страны могут только мечтать."
 ig_trait_effendi: "Эффенди"
 ig_trait_effendi_desc: "Серьезными привычками и честными средствами мы поднялись на вершину, и наши усилия справедливо хвалят все."
 ig_trait_reorganization: "Реорганизация"
 ig_trait_reorganization_desc: "Мы знаем, что при наличии правильных мандатов и департаментов мы так много реформируем. Просто скажи слово, и мы начнем."
 ig_trait_master_of_the_house: "Мастер дома"
 ig_trait_master_of_the_house_desc: "Пожалуйста! Садитесь. Мы стремимся усовершенствоваться здесь — быть слугами бедным, дворецкими великим, утешителями и философами нации."
 ig_trait_haute_finance: "Высокие финансы"
 ig_trait_haute_finance_desc: "В игре континентальных финансов мы стремимся быть победителями, будучи первыми, кто играет нам на руку."
 ig_trait_old_lady_of_threadneedle_street: "Старая леди с улицы Треднидл"
 ig_trait_old_lady_of_threadneedle_street_desc: "Если нация нуждается в помощи, есть старушка, которая благоразумна, безопасна и всегда может быть обращена в кризис: Банк Англии."
 ig_trait_civil_service: "Государственная служба"
 ig_trait_civil_service_desc: "У людей есть забавные представления о государственных служащих. Мы здесь, чтобы помочь вам сформулировать и реализовать вашу политику, вот и все."
 ig_trait_bah_humbug: "Ба Хумбуг"
 ig_trait_bah_humbug_desc: "Бедные и обездоленные в нужде, скажете вы. Неужели нет тюрем? Работают ли рабочие дома? Тогда оставь меня в покое! Те, кто плохо себя чувствует, должны идти туда."
 ig_trait_swadesh: "Свадеш"
 ig_trait_swadesh_desc: "Мы так же трудолюбивы, как и другие люди, но нам отказывают в кредитах и принуждают к рабству иностранные компании. Если наши правители хотят исключить нас из экономики, мы сделаем то же самое для них."
 ig_trait_lines_of_credit: "Кредитные линии"
 ig_trait_lines_of_credit_desc: "Если бы не кредит, предоставленный нашими адептами-финансистами, компания никогда бы не завоевала Индию. Если мы получим солидный бизнес-кейс, мы полностью готовы продолжать эти отношения."
 ig_trait_cooperative_agencies: "Кооперативные агентства"
 ig_trait_cooperative_agencies_desc: "Наши правители обладают обильным капиталом, но мало знают о нашей стране. Объединив их ресурсы и наш опыт, мы можем обогатить нашу родину гораздо больше, чем они когда-либо в одиночку."

  # Devout IG Traits
 ig_trait_be_fruitful_and_multiply:0 "Будьте плодовитыми и множественными"
 ig_trait_be_fruitful_and_multiply_desc:0 "Аскетизм хорош для немногих, кто посвящает свою жизнь духовным занятиям, но в простом народе наиболее важными ценностями, которые нужно привить, являются те, которые строят семью и заботятся о детях."
 ig_trait_divine_right:0 "Божественное право"
 ig_trait_divine_right_desc:0 "Мы верим, что в нашей жизни есть порядок. Общество может лучше или хуже отражать этот порядок. Пока правители добродетельны и их указы справедливы, мы можем гарантировать, что люди знают, почему."
 ig_trait_pious_fiction:0 "Благочестивая фантастика"
 ig_trait_pious_fiction_desc:0 "Сегодняшние ценности настолько отравлены, а литература настолько развращает, что само образование оказывает разрушающее воздействие на мораль. Лучше, чем учить людей тому, что нынешний истеблишмент считает «истинным», — это учить их тому, что должно быть правдой."
 ig_trait_work_ethic: "Этика работы"
 ig_trait_work_ethic_desc: "Помните, что деньги имеют генерирующую природу. Деньги порождают деньги; производство прибыли есть акт творения, почитания и прославления Божьего труда."
 ig_trait_asceticism: "аскетизм"
 ig_trait_asceticism_desc: "Воздерживаться от удовольствий этого мира — правильный путь. Не позволяйте себе слишком возмущаться материальными изменениями; они тоже пройдут."
 ig_trait_kar_seva: "Кар Сева"
 ig_trait_kar_seva_desc: "Бог с нами и среди нас. Следовательно, служение другим – это служение Богу и служение Богу. Нам всем надлежит заниматься честным трудом и делиться плодами этого труда с другими, и тем самым быть ближе к Богу."
 ig_trait_temporal_mandate: "Временный мандат"
 ig_trait_temporal_mandate_desc: "Линия между небом и землей часто размыта, так же как и линия между верой и правительством. Для управления светским миром требуются все виды управления — мы всегда можем найти способы заставить наши системы работать вместе."
 ig_trait_the_best_revenge: "Лучшая месть"
 ig_trait_the_best_revenge_desc: "Если вы хотите отомстить своему врагу, приобретите больше хороших качеств и идите по пути праведности. Таким образом, вы неизбежно отомстите своему врагу, потому что он будет огорчен вашими хорошими качествами, и он будет огорчен вашей хорошей репутацией."
 ig_trait_yeshivot: "Есиво"
 ig_trait_yeshivot_desc: "Изучение Сифрутского шазала является ключевой обязанностью каждого молодого человека. Если никто не ходил в школу, как можно было помнить и соблюдать наши законы?"
 ig_trait_traditsye: "Традиция"
 ig_trait_traditsye_desc: "Мир стремительно меняется вокруг нас. Как нам сохранить равновесие, если мы спешим после этого непознаваемого вихря перемен?"
 ig_trait_heavenly_sovereign: "Небесный Государь"
 ig_trait_heavenly_sovereign_desc: "Наследники императора Джимму имели тенденцию к одному из самых почтенных учреждений на земле. Этот шрифт традиции по праву заслуживает почитания, и как нация мы должны это признать."
 ig_trait_secular_shrine_theory: "Светская теория святынь"
 ig_trait_secular_shrine_theory_desc: "Святыни являются неотъемлемой верой японского народа; они существуют интуитивно для целей общественных ритуалов государства. Синтоизм идеологический: это выражение патриотизма, которого мы ожидаем от каждого гражданина."
 ig_trait_haibutsu_kishaku: "Хайбуцу Кишаку"
 ig_trait_haibutsu_kishaku_desc: "Иностранные религии должны быть упразднены, а их личности уничтожены. Посмотрите, какой хаос они вызвали! Войди в их святыни, их храмы, их лачуги и покажи им, что им здесь нет места!"
 ig_trait_da_wat: "Дават"
 ig_trait_da_wat_desc: "Мы должны выйти, пригласить других присоединиться к нам в вере и жить по воле Аллаха. Умма приветствует всех."
 ig_trait_sharia: "шариат"
 ig_trait_sharia_desc: "Правильная жизнь требует знания законов, определяющих, что правильно, а что нет. Толкование закона — одна из самых почетных и торжественных обязанностей, которые мы можем выполнить."
 ig_trait_mecelle: "Мечелла"
 ig_trait_mecelle_desc: "Основанный в ханафитской юриспруденции, Mecelle-i Ahkâm-ı Адлие гарантирует, что мы будем следовать кодексу, который удовлетворяет как нашу веру, так и наши ожидания светского права."

