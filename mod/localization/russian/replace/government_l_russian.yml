 gov_corporate_state_austrofascist_desc: "Это организованное по корпоративистским линиям, в рамках которого правительство официально служит посредником между различными социальными классами. Его возглавляет [Concept('concept_ruler','$RULER_TITLE_CHANCELLOR$')], который правит с диктаторскими полномочиями.\n\n$TRANSFER_OF_POWER_NAME_DESC$"

