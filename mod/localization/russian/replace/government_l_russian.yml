 gov_protestant_theocracy:0 "Протестантская теократия"
 gov_protestant_theocracy_desc:2 "A [concept_government_type] управляется государственной протестантской церковью. Его высшая власть называется [Concept('concept_ruler','$RULER_PRIMATE$')], который обладает как светской, так и духовной властью.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
