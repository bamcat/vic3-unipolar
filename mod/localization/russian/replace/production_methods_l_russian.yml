pm_the_projects: "Проекты"
pm_the_projects_desc: "Финансируемые государством высокоплотные башенные блоки и многоквартирное жилье. Базовый, функциональный и быстро построенный из дерева и сборных материалов. Производство недвижимости значительно увеличивается по мере того, как государство становится крупным застройщиком."
 
pm_affordable_construction: "Доступное строительство"
pm_affordable_construction_desc: "Комплексная программа государственного жилья с использованием качественного строительства — стальные каркасные здания, надлежащие фундаменты, прочные материалы. Производство недвижимости существенно растет. Инженеры и бюрократы управляют программой расширения."
 
pm_housing_for_all: "Жилье для всех"
pm_housing_for_all_desc: "Универсальное жилье в масштабе. Государство строит и поддерживает качественное жилье для всех граждан, потребляя значительные строительные ресурсы. Производство недвижимости достигает своего максимума. Большая рабочая сила рабочих, инженеров и бюрократов поддерживает программу."
