   #hereditary_aristocracy: "Hereditary Aristocracy"
  # Categories
  # Culture Technology
  # Economy Technology
  # Military Technology
  ### Technology Tooltips
  ##lenders_of_last_resort: "Lenders of Last Resort"
  ##lenders_of_last_resort_desc: "State-owned central banks are large enough to come to the rescue of smaller commercial banks, such as during bank runs. This can prevent a financial crisis spreading to other sectors of the economy. Often, even the promise of rescue in times of difficulty is enough to prevent bank runs occurring in the first place. Some 'critics' claim that such a promise will encourage risky behavior by the commercial banks, but these 'critics' are surely just anarchists looking to wreck the nation's economic security, as bankers are some of the most trustworthy people to walk the halls of power."
  ##limited_liability: "Limited Liability"
  ##limited_liability_desc: "A limited liability company draws a legal distinction between the company and its owners. This helps prevent the bankruptcy of a company ruining the personal lives of the investors, as creditors will not try to haul off the furniture of failed businessmen to recoup losses. This makes investing less risky, if perhaps less satisfying to watch from afar. As a separate legal entity, the company has its own finances that must be audited and taxed."
  ##marketing_desc: "Promotional schemes to grab more market share or create a new market from scratch were devised by Josiah Wedgwood, leader of the expanding pottery industry at the dawn of the Industrial Revolution."
  ##paper_money: "Paper Money"
  ##paper_money_desc: "A kind of promissory note issued by a bank, paper money allows private citizens to move and exchange large volumes of currency without the danger and discomfit of gold or silver coins which cannot be divided and are heavy to carry. Thus, commercial exchanges are easier and safer."
  ##regulated_private_notes: "Regulated Private Notes"
  ##regulated_private_notes_desc: "Bankers realized hundreds of years ago that their customers only rarely demand back their deposits all at once. By issuing loans in excess of their reserves in the form of private bank notes, bankers could make even more money from interest. Unfortunately, when all the bank's customers do demand their deposits at once, there will not be enough reserves. With better communications technology, these 'bank runs' become more frequent. To prevent bank runs, governments can restrict the issuance of private notes only to banks that meet certain criteria of fiduciary responsibility, such as being close personal friends to the finance minister."
  #alcohol: "Alcohol"
  #alcohol_desc: "An ancient technology, presumably discovered when a tribesman left some grain in a puddle and decided to drink it after a few months had passed, alcohol became central to the discipline of alchemy, and continues to serve men of reason in the field of chemistry in various processes, some of which do not involve drinking it."
  #atomic_theory_of_matter: "Atomic Theory of Matter"
  #atomic_theory_of_matter_desc: "Observations in chemistry seem to have disproven the notion held by supporters of phlogiston that matter is composed of the three fundamental essences of solidity, fluidity and inflammability. Air is not merely a void into which phlogiston flows during combustion - it contains oxygen, which combines with other matter during chemical reactions."
  #bankruptcy_law: "Bankruptcy Law"
  #bankruptcy_law_desc: "Having a legal framework for a company to declare bankruptcy allows investors and creditors to try to recoup losses via liquidation of assets. This makes investment less risky."
  #building_societies: "Building Societies"
  #building_societies_desc: "Originally set up within communities to help new families raise loans with which to buy homes and then disbanded once the members had all satisfied their requirements, building societies can also be permanent financial institutions that specialize in cheap mortgages."
  #census: "Census"
  #census_desc: "Knowing how many people we have in our country and roughly were they live is important so we know where to spend out money and how many men we will have if we have to fight. Should we be involved in that grubby business of having our lower orders actually having representation I suppose it will have a use for that as well."
  #chemical_batteries: "Chemical Batteries"
  #chemical_batteries_desc: "Electricity can be generated by exploiting the difference in charge as electrolytes pass through oxidation and reduction cells containing copper and zinc cathodes and annodes. Early experiments in this field took the form of a series of jars which had the appearance of a battery of artillery, hence the name."
  #civil_service: "Civil Service"
  #civil_service_desc: "The idea that the government should have a body of men on which they rely on to carry out administration is neither new nor necessarily efficient. The radical idea that people should be selected for these positions on merit and ability and that they should keep their positions if the government is changed are radical and leads to greater efficiency."
  #clinical_thermometer: "Clinical Thermometer"
  #clinical_thermometer_desc: "The mercury thermometer had been around since the mid 18th century. Its use for medical purposes were limited as they tended to be large (over a foot long) and could take over 20 minutes to measure someone's temperature. Now we have made the thermometer smaller and it only takes a few minutes to get a reading, making it truly useful for doctors."
  #commercial_banks: "Commercial Banks"
  #commercial_banks_desc: "Businesses need various financial services to operate normally. Payroll at the end of the month might require a short loan to cover a temporary shortfall. Expanding the business might likewise require borrowing, especially if the business is a limited liability company rather than a personal venture. Commercial banks offer financial services to these companies, as opposed to wealthy private individuals, middle-class savers or professional investors."
  #cooperatives: "Co-Operatives"
  #cooperatives_desc: "Intended as a mutually beneficial organization to help small businesses and workers buy basic necessities, a co-operative tends to be run democratically by its members to achieve social good rather than pure profit."
  #credit_unions: "Credit Unions"
  #credit_unions_desc: "Rather than being operated for the profit of an owner or shareholders, credit unions are a financial institution which tries to improve the welfare of its members through access to credit. They tend to be run democratically, with each member having a vote on the director of the credit union."
  #customs_tariffs: "Customs Tariffs"
  #customs_tariffs_desc: "Tariffs are a very important weapon in a government's arsenal. They can be used both to raise revenue and to 'guide' merchants and businesses into making choices beneficial to the national interest, as determined by the government. Tariffs can be charged on entry into a country, for the use of port facilities, or on the price of imported or exported goods. One important use for tariffs is in protecting native industries against more efficient foreign companies, which can give domestic firms time to catch up with their rivals abroad."
  #department_stores: "Department Stores"
  #department_stores_desc: "Having one large store that sells a huge variety of goods can be more convenient for customers and gives the retailer more buying-power over the distribution chains."
  #distribution_channels: "Distribution Channels"
  #distribution_channels_desc: "Companies can be structured to sell goods in a number of ways. Raw materials are generally sold to other industries; industries might then sell manufactured goods to wholesalers such as brokers; wholesalers then sell goods to retailers such as specific shops or chains of shops, and the retailer then sells the goods to the final customer. Innovations in this area include factory or outlet stores, which sell goods directly to customers from the factory complex, such as to workers and their families and community."
  #enclosure_acts: "Enclosure Acts"
  #enclosure_acts_desc: "Enclosure is the process of taking small strips of peasant land, passed down from father to son since the beginning of feudalism, and 'combining' them under one owner via Acts of Parliament. By merging these subsistence plots into enclosed fields, arable land can be turned into pasture, capital goods such as machinery can be invested in, and many small surpluses can be merged into a significant profit. Where the landless peasants go is up to them - am I my brother's keeper?"
  #espionage: "Espionage"
  #espionage_desc: "Know thy enemy. Knowledge of what is going on in places that could be hostile to us is vital if we are going to keep out country safe. This can be in the form of the mundane, like ensuring proper maps exist of areas we may end up being at war in to the significant like enemy forces and plans."
  #gold_standard: "Gold Standard"
  #hereditary_aristocracy_desc: "As a society becomes more productive enough food can be generated to allow people to specialize and do things that do not require you to farm. A military caste to protect yourself from hostile neighbors is a natural development and eventually they will entrench their position and hereditary aristocracy is born."
  #insurance: "Insurance"
  #insurance_desc: "Insurance against loss of property has existed for many hundreds of years, being especially important for merchant vessels traveling overseas. As global trade becomes more prevalent, the need for more secure maritime insurance increases. Lloyd's of London began as a specialist for maritime insurance but has expanded into other markets such as insuring properties against fire damage."
  #malthusianism: "Malthusianism"
  #malthusianism_desc: "Population is increasing much faster than our food supply. We must face the fact that if we allow this to continue we will face a catastrophe for our people. Further more we must face the face any such catastrophe will hurt the lower classes the most. The Tory ideal of paternalism is not good nor noble but instead will lead to a greater catastrophe on the least fortunate."
  #manifest_destiny: "Manifest Destiny"
  #manifest_destiny_desc: "If we are to spread our civilization to those less fortunate to have we must accept the fact that we have been uniquely blessed with virtues and institutions that others simply do not have. We have a mission to redeem the less fortunate by remaking them in our own image. It is no more that our destiny to do this."
  #oceanic_cablelaying: "Oceanic Cablelaying"
  #oceanic_cablelaying_desc: "With the technology of the telegraph, thought soon turned to how to lay a cable under bodies of water. Although it proved not technically difficult to lay cables of short stretches of water (like bays and straits), the wide oceans proved a greater challenge. Good news - after several false starts we have successfully mastered the techniques to lay such a cable so no longer must we rely on the good will of others."
  #ophthalmoscope: "Opthalmoscope"
  #ophthalmoscope_desc: "'every eye could be made luminous if the axis from a source of illumination directed towards a person's eye and the line of vision of the observer were coincident', this discovery revolutionized the treatment of eye problems. Creating a hand held device with a mirror that could shine the light, the ophthalmoscope, was made the doctor's life a lot easier."
  #positivism: "Positivism"
  #positivism_desc: "We we consider what knowledge is we know that there is certain knowledge. Information that comes from sensory experience and  then interpretation comes through logic and reason is the exclusive source of certain knowledge. We can extend this from the physical world to societies as a whole. Societies operate under general laws which if we took the time to analyze we would understand. Theology must be rejected because faith by its very nature denies reason and verification."
  #postal_banks: "Postal Banks"
  #postal_banks_desc: "Rural and otherwise isolated communities may not have access to a local bank branch. In such cases, a postal bank can operate to offer them financial services, such as savings and a current account, without the need to travel into a town or city."
  #savings_banks: "Savings Banks"
  #silver_standard: "Silver Standard"
  #vertical_filing_cabinet: "Vertical Filing Cabinet"
  #vertical_filing_cabinet_desc: "Gone but not forgotten"
 admiralty:0 "Современный радар"
 admiralty_desc:0 "Адмиралтейство представляет собой сложную систему рангов, связанных жесткой цепью командования, чтобы помочь флоту работать более эффективно."
 anaesthetics:0 "анестезия"
 anaesthetics_desc:0 "Анестетики являются седативными средствами или обезболивающими средствами, используемыми во время операции, чтобы пациенты не чувствовали ножи и инвазивное подталкивание медицинского персонала, что может быть неприятным."
 anarchism:0 "рыночный социализм"
 anarchism_desc:0 "Рыночный социализм — тип экономической системы, предполагающий социальную собственность на средства производства в рамках рыночной экономики. Существуют различные модели такой системы, обычно включающие кооперативные предприятия, а иногда и сочетание государственных или частных предприятий."
 aniline:0 "Алгоритм машинного обучения"
 aniline_desc:0 "Процесс или набор правил, которые должны соблюдаться в расчетах или других операциях по решению проблем, особенно компьютером. Используется компаниями социальных сетей для оценки желаний потребителей."
 anti_clericalism:0 "Антиклерикализм"
 anti_clericalism_desc:0 "Власть и религиозные институты не более защищены от этой коррупции, чем другие. Они могут утверждать, что предлагают спасение массам, но вместо этого стремятся окунуться в свои собственные гнезда и лишить прав тех, кого они считают недостойными. Мы должны убрать влияние организованной религии из нашей общественной сферы и оставить этот вопрос в качестве выбора для непросвещенных."
 antibiotics:0 "Искоренение рака"
 antibiotics_desc:0 "Редактирование генов позволяет создавать гены, незаметные для рака и других заболеваний."
 antiseptics:0 "Антисептики"
 antiseptics_desc:0 "Наука установила, что воздействие тепла уничтожит микробы. Проблема в том, что это не является правильным решением, когда дело доходит до живой ткани. Однако, когда эксперименты, в которых раны были покрыты прокладками, пропитаны раствором фенола, мы увидели, что случаи гангрены резко снижаются. Так родилась наука об антисептиках."
 arc_welding:0 "Межпланетная колонизация"
 arc_welding_desc:0 "Колонизация разных планет"
 army_reserves:0 "Еда, готовая к употреблению"
 army_reserves_desc:0 "Meal-Ready-to-Eat (MRE) - это военный рацион, предназначенный для длительного срока хранения, с большим разнообразием вариантов питания."
 art_patronage:0 "Художественный патронаж"
 art_patronage_desc:0 "Искусство несвободно, и для развития искусства и культуры нужно, чтобы богатые проявляли интерес и поддерживали искусство. В обмен на это они получают престиж за то, что вокруг них есть такие красивые вещи."
 art_silk:0 "Искусственная жизнь"
 art_silk_desc:0 "Создание организмов с синтетическими геномами или проектирование организмов с совершенно новыми, неестественными свойствами. Синтетические геномы были использованы для создания новых форм жизни с нуля, таких как первая синтетическая бактерия, созданная Крейгом Вентером и его командой в 2010 году."
 artificial_fertilisers:0 "Искусственные удобрения"
 assembly_line:0 "Линия сборки"
 assembly_line_desc:0 "Оптимизируя процесс создания вещей, чтобы каждое действие выполнялось правильно, можно создать гораздо более эффективную фабрику."
 atmospheric_engine:0 "Чистая энергия"
 atmospheric_engine_desc:0 "Методы производства чистой энергии, такие как ветряные мельницы, позволяют генерировать энергию, не вызывая загрязнения."
 automatic_bottle_blowers:0 "Микоремедиация"
 automatic_bottle_blowers_desc:0 "Это включает в себя использование грибов для деградации загрязнителей окружающей среды. Грибы могут использоваться для разрушения опасных материалов, таких как нефтепродукты и промышленные растворители."
 battlefleet_tactics:0 "Тактика космического флота"
 battlefleet_tactics_desc:0 "Управление большим боевым флотом может быть сложной задачей. Практикуя и изучая конкретную тактику флота, можно добиться большей производительности."
 battleship_tech:0 "Разрушитель дронов"
 battleship_tech_desc:0 "Ультрамассивные линкоры способны взрывать огромные участки океана"
 bessemer_process:0 "полимеры"
 bessemer_process_desc:0 "Синтетическая одежда и ткани позволяют массовое производство обычных товаров для менее удачливых."
 bessemer_steel:0 "Bessemer Steel"
 bessemer_steel_desc:0 "Процесс Бессемера взрывает холодный воздух в расплавленный чугун, сжигая углерод, кремний и марганец и создавая мягкую сталь. Это не такое высокое качество, как у тисков, но оно значительно дешевле, что позволяет использовать железные руды более низкого качества и позволяет массовое производство железнодорожных линий и железобетона."
 biological_determinism:0 "Биологический детерминизм"
 biological_determinism_desc:0 "Изучение генетики и наследования в природе открывает вопросы о том, насколько поведение человека определяется биологией."
 feminism:0 "Экологическая экономика"
 feminism_desc:0 "Экологизм или экологические права - это широкая философия, идеология и социальное движение о поддержке жизни, среды обитания и окружающей среды."
 blast_furnaces:0 "Взрывные печи"
 blast_furnaces_desc:0 "Взрывная печь используется для добавления дополнительного кислорода к металлургическим процессам, таким как плавка руды, первоначально с помощью рук или водяных колесных колокольчиков. Это приводит к тому, что печь достигает даже более высоких температур, чем печь на открытом воздухе, сжигая примеси и позволяя сплавы экзотических металлов. Взрывная печь особенно полезна для производства чугуна, который затем может быть превращен в кованое железо или мягкую сталь с использованием более совершенных процессов."
 bolt_action_rifles:0 "Кибернетика"
 bolt_action_rifles_desc:0 "Автономные солдаты должны были спасти реальные жизни в начале войны."
 chemical_bleaching:0 "Персональный компьютер"
 chemical_bleaching_desc:0 "Персональный компьютер появился в середине 1980-х годов, с такими продуктами, как Apple II, Macintosh и IBM PC, что делает вычисления доступными для частных лиц и малого бизнеса."
  # bone_china: "Bone China"
  # bone_china_desc: "Bone China is a form of porcelain which in part is made from bone ash, the greater strength of this type of porcelain makes it rather valuable."
 # artillery: "Artillery"	// There is already a loc key for this in Goods, require prefix to support unique localization
 artillery_desc:0 "Бомбардировка на большие расстояния тяжелыми боеприпасами запугивает и рассеивает силы противника, не рискуя собственными войсками. Неточный, медленный и дорогой, но важный компонент любой современной армии."
 breech_loading_artillery:0 "Длинная ракетная батарея"
 breech_loading_artillery_desc:0 "Ракетные батареи большой дальности, такие как HIMARS, облегчают уничтожение целей, находящихся далеко за пределами страны."
 tech_bureaucracy:0 "Социальный либерализм"
 tech_bureaucracy_desc:0 "Социальный либерализм - это идеология, которая выступает за свободный рынок с сильным правительственным влиянием и контролем, чтобы защитить менее удачливых."
 centralization:0 "Авторитарный капитализм"
 centralization_desc:0 "Связанный с государственным капитализмом, системой, в которой государство осуществляет коммерческую деятельность, авторитарный капитализм сочетает частную собственность и функционирование рыночных сил с ограничениями на инакомыслие."
 camera:0 "Старлайн"
 camera_desc:0 "Starlink - спутниковая интернет-созвездие, управляемая Starlink Services, LLC, международным телекоммуникационным провайдером, который является дочерней компанией американской аэрокосмической компании SpaceX."
 canals:0 "каналы"
 canals_desc:0 "Прибрежные и речные баржи являются очень эффективным способом транспортировки грузов. Перекопка каналов внутри страны расширяет покрытие этих барж, хотя это может быть дорогостоящим предложением, когда различные высоты должны быть соединены системами блокировки."
 canneries:0 "Ультраобработанная пища"
 canneries_desc:0 "Ультра-обработанные продукты (UPF) - это продукты, которые были значительно изменены из их первоначальной формы за счет использования промышленных процессов и добавления ингредиентов, обычно не встречающихся на домашней кухне."
 canning_jars:0 "Каннинг Джарс"
 canning_jars_desc:0 "Армии Французской революции нуждались в инновационных решениях своих проблем снабжения. Одним из решений было приготовление пищи в стеклянных банках, чтобы предотвратить смешение плохого юмора и миазмы с содержимым и тем самым испортить рацион. Расплавленный воск заливается в рот банки, чтобы действовать как печать против внешнего мира."
 canning_machines:0 "Каннинговые машины"
 canning_machines_desc:0 "Раннее производство консервов не было автоматизировано. Каналы закатывали и падали вручную. Использование машин для быстрого превращения жести в банки улучшает стандарты и увеличивает пропускную способность."
 carrier_tech:0 "Лазерная лодка"
 carrier_tech_desc:0 "Лазерные лодки - это суда, работающие на мощном лазере с целью быстрого устранения приближающихся дронов."
 catalytic_contact_process:0 "Каталитический контактный процесс"
 catalytic_contact_process_desc:0 "В 1831 году британский торговец уксусом Перегрин Филлипс изобрел процесс производства более концентрированной серной кислоты с использованием платины в качестве каталитического нейтрализатора. Хотя это не особенно полезно для производства золы или удобрений, это вскоре стало благом для производства органических красителей."
 chemical_isolation:0 "Химическая изоляция"
 chemical_isolation_desc:0 "Химические вещества могут быть очищены многими способами, такими как дистилляция, фильтрация и испарение. Качество процесса очистки, очевидно, повлияет на качество изолята."
 chemical_synthesis:0 "Химический синтез"
 chemical_synthesis_desc:0 "Моча собаки была синтезирована немецким химиком Фридрихом Вёлером в 1828 году. Это начало стирать границы между органической и неорганической химией, и по мере синтеза новых химических веществ открываются новые промышленные процессы."
 chemical_warfare:0 "Терроризм"
 chemical_warfare_desc:0 "Некоторые химические комбинации вызывают неблагоприятные или даже смертельные последствия, когда люди подвергаются их воздействию. Оружие привносит совершенно новый ужасный аспект в войну."
 civilizing_mission:0 "Редактирование генов CRISPR"
 civilizing_mission_desc:0 "Редактирование генов с помощью CRISPR позволяет людям выращивать новые органы."
 colonization:0 "Ультразвук"
 colonization_desc:0 "Достижения в области трансплантации органов в конце 20-го века, медицинской визуализации с помощью МРТ и КТ-сканирования, а также оптического оборудования позволили использовать более специализированные и обратные методы лечения для отдельных состояний."
 color_photography:0 "Цветная фотография"
 color_photography_desc:0 "Ранняя техника захвата фотографий в полный цвет, основанная на понимании того, как свет воспринимается глазом. Эффективно делая три изображения через различные цветовые фильтры, они могут быть объединены в одно изображение, воссоздающее исходные цвета."
 combination_acts:0 "Комбинированные акты"
 combination_acts_desc:0 "Собравшиеся вместе втайне и присягающие друг другу рабочие представляют собой угрозу безопасности государства и явно средство для радикального якобинца подорвать государственность. Это также может угрожать нашей способности защищаться от внешних врагов из-за угроз действий со стороны рабочих в критические моменты конфликта. Мы примем ряд законов, которые позволят нам регулировать такое поведение для общего блага."
 combustion_engine:0 "Нанопокрытия"
 combustion_engine_desc:0 "Они наносятся на различные поверхности, чтобы сделать их более устойчивыми к коррозии, износу и пятнам. Самоочищающиеся поверхности и антибактериальные нанопокрытия разрабатываются для применения в здравоохранении, электронике и строительстве."
 central_planning:0 "Цифровое управление"
 central_planning_desc:1 "Позволяет правительству работать через различные защищенные компьютерные системы."
 compound_microscopes:0 "Составные микроскопы"
 compound_microscopes_desc:0 "Линзы, используемые в оптике, требуют очень тонких навыков изготовления стекла. Одним из нововведений в этой области является использование двух объективов, один из которых фокусируется на объекте, а другой на первом объективе, чтобы увеличить увеличение. Такой микроскоп можно использовать для просмотра живых бактерий."
 compression_ignition:0 "Энергия из отходов"
 compression_ignition_desc:1 "Превращая отходы, хранящиеся на свалках, в энергию, наш мир может генерировать большое количество энергии."
 concrete_dockyards:0 "Искусственный испытательный диапазон"
 concrete_dockyards_desc:0 "Диапазоны тестирования, полностью сформированные в ИИ."
 concrete_fortifications:0 "Будущие укрепления"
 concrete_fortifications_desc:0 "Вводя бетон в укрепления, можно очень быстро сделать прочные укрепленные позиции."
 condensed_milk:0 "Конденсированное молоко"
 condensed_milk_desc:0 "Обычно молоко необходимо употреблять быстро после экструдирования из молочной железы крупного рогатого скота. Понижая давление внутри контейнера, например, вакуумной кастрюли, содержание воды в молоке испаряется, а сгущенное молоко затем можно консервировать и продавать."
 conspicuous_consumption:0 "Заметное потребление"
 conspicuous_consumption_desc:0 "Богатство имеет свой престиж. Демонстрация богатства может сделать человека более престижным и помочь продвигаться по социальным классам, открывая новые возможности для социального альпиниста, такие как контакты с бизнесменами и политиками. В материалистическом обществе легкомыслие и экстравагантность парадоксальным образом помогают человеку стать богаче."
 conveyors:0 "Автоматизированные заводы"
 conveyors_desc:0 "Применяя новейшие системы ИИ, можно создавать платформы, которые перемещают товары по ним без использования человеческого труда."
 cotton_gin:0 "Современные автомобили"
 cotton_gin_desc:0 "Автомобили позволяют быстро перевозить людей и товары по всей земле."
 crucible_steel:0 "Сплавная сталь"
 crucible_steel_desc:0 "Этот высокоуглеродистый сплав, производимый путем нанесения тепла на каменный тигель, содержащий порошкообразное железо и древесный уголь, считается похожим на дамасскую сталь, созданную в Индии и Персии примерно до 1750 года. Этот процесс производит сталь высокого качества, пригодную для использования в инструментах, пружинах и других сверхпрочных и дорогих предметах."
 law_enforcement:0 "Системный расизм"
 law_enforcement_desc:1 "Систематический расизм является формой институциональной дискриминации по признаку расы или этнической группы и может включать в себя политику и практику, которые существуют во всем обществе или организации, что приводит к и поддерживает несправедливое преимущество для некоторых людей и несправедливое или вредное обращение с другими."
 defense_in_depth:0 "Ориентация на ИИ"
 defense_in_depth_desc:0 "Сделав несколько линий обороны, можно растянуть и замедлить противника, а иногда даже окутать его."
 democracy:0 "Падение Восточного блока"
 democracy_desc:0 "В конце 1980-х — начале 1990-х годов ряд событий привел к краху коммунизма в Восточной Европе."
 distillation:0 "Приборы"
 distillation_desc:0 "Приборы включают использование печей, холодильников, микроволновых печей, смесителей, чайников и других предметов домашнего обихода, используемых в производстве продуктов питания."
 divine_revelation:0 "Божественное откровение"
 divine_revelation_desc:0 "Основу всех законов составляют наши священные писания. Только через послушание высшей власти наше общество может быть правильно упорядочено и гарантирована стабильность."
 watertube_boiler:0 "робототехника"
 watertube_boiler_desc:0 "Роботы были введены в сборочные линии, особенно в автомобильной промышленности, для повышения точности, скорости и безопасности."
 dreadnought_desc:0 "Беспилотники, подобные сегодняшним авианосцам, несут рои дронов и развязывают разрушительные атаки на наших врагов."
 dreadnought_tech:0 "Беспилотный перевозчик"
 dynamite:0 "Глубоководная добыча"
 dynamite_desc:0 "Развитие глубоководных горных технологий значительно продвинулось в 2000-х годах, когда компании начали исследовать добычу ценных минералов (например, полиметаллических конкреций, редкоземельных металлов) со дна океана."
 egalitarianism:0 "Война с террором"
 egalitarianism_desc:0 "Война с терроризмом, официально Глобальная война с терроризмом (GWOT), является глобальной военной кампанией, начатой Соединенными Штатами после нападений 11 сентября 2001 года."
 electric_arc_process:0 "Нейролинк"
 electric_arc_process_desc:0 "Такие компании, как Neuralink и Synchron, разрабатывают нейрокомпьютерные интерфейсы, которые обеспечивают прямую связь между мозгом и цифровыми устройствами. Эти интерфейсы могут революционизировать медицинские процедуры, в том числе помочь людям с параличом восстановить движение, повысить когнитивные способности и предложить новые способы взаимодействия с технологиями."
 electric_railway:0 "Массовый общественный транспорт"
 electric_railway_desc:0 "Поскольку автомобили неустойчивы, общественный транспорт между городами может работать в массовом порядке."
 electrical_generation:0 "квантовые вычисления"
 electrical_generation_desc:0 "Квантовые компьютеры, как ожидается, будут использоваться для сложных задач, которые в настоящее время трудноразрешимы для традиционных компьютеров, в том числе: открытие лекарств, моделирование материаловедения, передовая криптография, прогнозирование погоды, финансовое моделирование, развитие искусственного интеллекта и проблемы оптимизации в таких областях, как логистика и производство энергии, в первую очередь за счет использования их способности обрабатывать большие объемы данных и решать проблемы со многими переменными одновременно через квантовую суперпозицию и запутанность."
 elevator:0 "Подъемники"
 elevator_desc:0 "Транспортные контейнеры, похожие на лифты, которые могут перемещаться на высоких скоростях."
 empiricism:0 "World Wide Web"
 empiricism_desc:0 "Всемирная паутина (WWW или просто Интернет) - это информационная система, которая позволяет обмениваться контентом через Интернет с помощью удобных способов, предназначенных для привлечения пользователей за пределами ИТ-специалистов и любителей."
 enlightenment_thought:0 "Просветительская мысль"
 enlightenment_thought_desc:0 "В эпоху Разума старые догмы начали подвергаться сомнению. Больше не признавалось, что «бог желает этого», и власть имущие стали вынуждены оправдывать свое положение в обществе. Даже абсолютные монархи видели престиж этих новых идей, а «просвещенные деспоты» реформировали образовательную, правовую и экономическую системы Европы. Однако эти реформы не зашли достаточно далеко, и такие мыслители, как Джон Локк, Вольтер, Жан-Жак Руссо и Томас Пейн, возглавили атаку на истеблишмент, которая завершилась революциями в Америке и Франции, которые сами вдохновили либералов по всему миру."
 fascism:0 "Фашизм"
 fascism_desc:0 "Фашизм — это политическая система, в которой правительство строго контролирует все аспекты жизни общества."
 field_works:0 "Барьер ЭСКО"
 field_works_desc:0 "Барьеры HESCO могут быть установлены быстрее, чем мешки с песком, и обеспечивают большую защиту."
 film:0 "прямая пропаганда"
 film_desc:0 "Используя мозговые имплантаты, пропаганда может быть напрямую внедрена в наше население."
 flash_freezing:0 "Портативный морозильник"
 flash_freezing_desc:0 "Портативные морозильники для гражданского использования"
 floating_harbor:0 "Искусственные острова"
 floating_harbor_desc:0 "Искусственные острова - искусственные материки, обычно созданные для военных средств."
 food_sterilisation:0 "Пищевая стерилизация"
 food_sterilisation_desc:0 "Путем проб и ошибок бизнесмены открыли методы консервирования пищи, такие как нагревание молока при пастеризации или его конденсации в толстый сироп, маринование фруктов и овощей, консервирование мяса и супов. Общей нитью среди всех этих технологий является устранение микробов из консервированной пищи, концепция, не полностью понятая до открытия бактерий под микроскопами. При широком понимании этих идей стандарты в пищевой промышленности совершенствуются, а вместе с этим и здоровье населения."
 four_field_crop_rotation:0 "Четыре вращение поля"
 four_field_crop_rotation_desc:0 "Известный землевладелец Чарльз «Турнип» Таунсенд, использование азотных фиксаторов, таких как репа или клевер, позволяет фермерским угодьям оставаться в постоянном использовании, не будучи истощенными или не будучи оставленными в тени."
 fractional_distillation:0 "ГМО"
 fractional_distillation_desc:0 "Генетически модифицированные организмы (ГМО) являются искусственными методами изменения способа роста и появления растений и животных с целью производства продуктов питания."
 fruit_jars:0 "Фруктовые ягоды"
 fruit_jars_desc:0 "Идея сохранения мяса и супа в металлических банках приобрела популярность. Другие виды сохранения пищи также становятся широко распространенными, такие как сохранение фруктов и овощей в маринующих жидкостях или кипячение их в варенье."
 fulminates:0 "Фульминаторы"
 fulminates_desc:0 "Светящийся материал - это тот, который воспламеняется при резком ударе. К таким материалам относятся ионы ртути, серебра и калия. Они были впервые обнаружены Эдвардом Чарльзом Говардом в 1800 году, и их военное применение в системах ударных колпачков вскоре стало очевидным."
 functionalism:0 "функционализм"
 functionalism_desc:0 "Теоретическая основа, рассматривающая общество как систему компонентов, определяемых социальными функциями. Используя в качестве метафоры механические и биологические системы, она рассматривает структуры общества и их взаимозависимость как определяющие его устойчивость."
 gantry_cranes:0 "Тяжелые краны"
 gantry_cranes_desc:0 "Полезные в строительстве и транспортировке, тяжелые краны достаточно велики, чтобы преодолеть ширину корабля. Это дает им прочность, что означает, что они могут поднимать самые тяжелые грузы, которые может нести судно."
 general_staff:0 "Дроны"
 general_staff_desc:0 "Дроны — это беспилотные летательные аппараты, которые могут использоваться как для военных, так и для гражданских целей."
 germ_theory:0 "Теория микробов"
 germ_theory_desc:0 "Фукидид был первым человеком, который заявил, что болезни могут распространяться от человека к другому, и с древних времен мы считали, что миазмы были причинами таких заболеваний, как холера. Однако наука утверждает, что микроорганизмы, называемые микробами, ответственны за болезни."
 gunpowder:0 "порох"
 gunpowder_desc:0 "Химическое соединение, состоящее из серы, древесного угля и нитратов, порох быстро воспламеняется, расширяясь в газ, который может перемещать снаряды по трубам. Горение оставляет после себя большое количество дыма от серы и древесного угля, что делает мушкетирование грязным и ослепляющим бизнесом на поле боя. Пороховые заряды также имеют более гражданское использование в открытии земли для добычи полезных ископаемых и строительства. Китайцы изобрели порох за тысячу лет до этого и использовали его для праздничных фейерверков и осадной артиллерии."
 gunsmithing:0 "Штурмовая винтовка"
 gunsmithing_desc:0 "Штурмовые винтовки сочетают огневую мощь SMG и точность винтовки для создания мощной стрелковой платформы."
 gymnastics:0 "гимнастика"
 gymnastics_desc:0 "Для спартанцев гимнастика стала частью обучения военных новобранцев, а само слово стало обозначать с 1570-х годов спортивные упражнения. Теперь, хотя мы понимаем, что спартанцы были на чем-то, чтобы дисциплинировать ум, мы должны дисциплинировать тело. Педагоги разработали серию упражнений для мальчиков на различных аппаратах, чтобы помочь им развить самодисциплину. Некоторые радикалы даже предлагают распространить эти упражнения на девочек."
 gyroscopes:0 "Гироскопы"
 gyroscopes_desc:0 "Гироскоп создается путем объединения серии подвесок, которые являются просто вращающимися опорами. Один подвес вращается вертикально, а другой горизонтально, поэтому самый внутренний объект может свободно вращаться в любом направлении. Гироскопы полезны для поддержания устойчивости объекта во время движения его окружения, например, магнитный компас на подбрасывающем корабле."
 handcranked_machine_gun:0 "Антидронные системы"
 handcranked_machine_gun_desc:0 "Защитные системы, предназначенные для сбивания дешевых дронов."
 hydraulic_cranes:0 "Вертолетный перевозчик"
 hydraulic_cranes_desc:0 "Вертолетоносцы позволяют материально поддерживать войска"
 hydraulic_power:0 "Гидравлическая сила"
 hydraulic_power_desc:0 "Водяные колеса давно используются для измельчения зерна. Адаптация их к другим промышленным применениям, таким как питание машин, является логическим шагом вперед."
 hypodermic_syringes:0 "Гиподермические шприцы"
 hypodermic_syringes_desc:0 "Первоначально пациентам делали прививки, открывая кожу и втирая больной материал в рану. Идея использования полой иглы для введения жидкости пациенту, очевидно, более гигиенична, и она также имеет преимущество, позволяющее врачу вводить точные объемы. Ранние шприцы были сделаны из серебра, но стекло становится популярным, поскольку производственные процессы становятся более совершенными, что позволяет изготавливать более узкие иглы."
 idealism:0 "Идеализм"
 idealism_desc:0 "Ряд философий утверждает, что наше знание зависит от того, как мы воспринимаем вещи, что ограничивает нас знанием идеи вещи, а не вещи, как она есть на самом деле."
 identification_documents:0 "Цифровая идентификация"
 identification_documents_desc:0 "Цифровая идентификация - это электронное представление человека, которое позволяет ему получать доступ к онлайн-сервисам, совершать покупки и взаимодействовать с другими."
 impressionism:0 "импрессионизм"
 impressionism_desc:0 "Художественный стиль, ориентированный на техники, воссоздающие общее визуальное ощущение сцены. Та же художественная амбиция воссоздания чувства и переживания ситуации была применена и в художественных формах вне визуального."
 improved_fertilizer:0 "Микрокапсуляция"
 improved_fertilizer_desc:0 "Микрокапсуляция включает в себя активные ингредиенты, такие как витамины, ароматизаторы и пробиотики, в защитное покрытие. Эта технология стала широко использоваться в функциональных продуктах для улучшения доставки питательных веществ, срока хранения и стабильности чувствительных ингредиентов, предлагая новые возможности в производстве продуктов питания, включая обогащенные продукты и напитки."
 international_trade:0 "Неолиберализм"
 international_trade_desc:0 "Неолиберализм отличается от либерализма тем, что он не защищает экономическую политику laissez-faire, но вместо этого является высоко конструктивистским и выступает за сильное государство, чтобы осуществить рыночные реформы во всех аспектах общества."
 ironclad_tech:0 "Броненосец 21 века"
 ironclad_tech_desc:0 "Линкоры 21-го века способны противостоять огромным ракетным бомбардировкам."
 jeune_ecole:0 "Литторский боевой корабль"
 jeune_ecole_desc:0 "Автономные корабли — это лодки, которые по сути являются дронами в море. Кроме того, имея много небольших кораблей, а не несколько больших, можно сохранить определенный уровень маневренности, который в противном случае был бы невозможен."
 labor_movement:0 "Смартфон"
 labor_movement_desc:0 "Смартфон, часто называемый просто телефоном, представляет собой мобильное устройство, которое сочетает в себе функциональность традиционного мобильного телефона с расширенными вычислительными возможностями."
 land_reform:0 "Земельная реформа"
 land_reform_desc:0 "Собственность на землю и общество идут рука об руку. Земля является основным источником богатства и статуса в любой стране, и поэтому тот, кто получает землю, имеет богатство и статус. Если мы хотим создать общество, которое мы хотим, мы должны быть готовы коренным образом изменить того, кто владеет землей."
 lathe:0 "Производственные линии"
 lathe_desc:0 "Производственная линия - это собрание рабочих, каждый из которых имеет определенную задачу, которая позволяет упорядочить производство."
 lathes:0 "токарные станки"
 lathes_desc:0 "Токарный станок - это инструмент, который вращает материал, над которым работает инструмент, в отличие от сверла, который сам вращается против материала. Это уменьшает материал симметрично. Это имеет применение во многих отраслях промышленности, от кустарных подсвечников до скучных артиллерийских орудий. Ранние токарные станки работают от руки, лошади или водяного колеса, в зависимости от сферы промышленности."
 laws_of_physics:0 "Законы физики"
 laws_of_physics_desc:0 "Фундаментальные законы, управляющие движущимися органами, можно легко наблюдать с помощью телескопа. Сэр Исаак Ньютон был пионером в этой области благодаря своей технологии более высокого качества отражающего телескопа и строгому применению его наблюдений к существующим научным предсказаниям Иоганна Кеплера."
 crystal_glass:0 "Микропроцессор"
 crystal_glass_desc:0 "Микропроцессор является сердцем современных вычислений, позволяя компьютерам становиться меньше, быстрее и доступнее. Это привело к развитию персональных компьютеров и быстрой эволюции технологий."
 automatic_machine_guns:0 "Автономная башня"
 automatic_machine_guns_desc:0 "Продвинутые стационарные башни, способные автоматически фиксироваться на вражеских целях."
 malaria_prevention:0 "Стволовые клетки"
 malaria_prevention_desc:0 "Из-за экстремальных условий в космосе астронавты особенно уязвимы к инфекциям, учитывая, что космическое излучение, микрогравитация и психологический стресс, как правило, ставят под угрозу иммунную систему человека."
 manufacturies:0 "Производство"
 manufacturies_desc:0 "Гильдии контролировали методы и методы найма, которые мог использовать бизнес, ограничивая вход в рабочую силу и требуя, чтобы только высококвалифицированные и сертифицированные (по цеху, естественно) мастера выполняли определенные задачи. Все чаще промышленники покидали города и основывали новые площадки инноваций, свободные от взыскательных стандартов и высокой заработной платы мастеров гильдии."
 mass_communication:0 "Мобильники"
 mass_communication_desc:0 "Массовая коммуникация — это легкое распространение информации с использованием таких технологий, как мобильный телефон."
 mass_propaganda:0 "Автообразование"
 mass_propaganda_desc:0 "С помощью чип-имплантатов вся информация в мире может быть напрямую передана детям наших стран."
 mass_surveillance:0 "Массовая прямая демократия"
 mass_surveillance_desc:0 "Позволяет каждому гражданину голосовать в любое время, на чем угодно, через имплантированные мозгом микрочипы."
 mechanized_farming:0 "Межпланетная база"
 mechanized_farming_desc:0 "Базы на других планетах"
 mechanized_workshops:0 "Умные технологии"
 mechanized_workshops_desc:0 "Интеллектуальные технологии — это технологии, которые традиционно не контролируются компьютерами, но теперь находятся под их контролем."
 military:0 "Военный"
 military_aviation:0 "Орбитальный удар"
 military_aviation_desc:0 "Орбитальный удар — это спутник, предназначенный для стрельбы мощным снарядом по цели на Земле."
 mobile_armor:0 "мех"
 mobile_armor_desc:0 "Multi-Firepower-Platform (MFP) — тяжелая машина, похожая на танк, оснащенная по последнему слову техники для уничтожения автономных врагов."
 modern_nursing:0 "Стелс-самолет"
 modern_nursing_desc:0 "Стелс-самолеты - это самолеты, предназначенные для более низкой радиолокационной сигнатуры."
 modern_sewerage:0 "криптовалюта"
 modern_sewerage_desc:0 "Криптовалюта, криптовалюта или криптовалюта - это цифровая валюта, предназначенная для работы через компьютерную сеть, которая не зависит от какого-либо центрального органа, такого как правительство или банк, для ее поддержки или поддержания."
 currency_standards:0 "Онлайн-торговля"
 currency_standards_desc:0 "Интернет-магазины - это форма электронной коммерции, которая позволяет потребителям напрямую покупать товары или услуги у продавца через Интернет с помощью веб-браузера или мобильного приложения."
 monitor_tech:0 "Судно AI"
 monitor_tech_desc:0 "Корабли полностью контролируются искусственным интеллектом."
 musical_instruments:0 "Музыкальные инструменты"
 musical_instruments_desc:0 "Музыка является ключевой частью развития любой культуры и искусства. В этой связи эволюция музыкальных инструментов, создаваемых культурой, прежде всего оказывает эхом влияние на все будущие культурные события."
 napoleonic_warfare:0 "Прокси-война"
 napoleonic_warfare_desc:0 "Конфликты по доверенности — это войны за влияние двух противоборствующих держав, которые ведутся путем противопоставления двух более слабых держав друг другу."
 nationalism:0 "Терроризм"
 nationalism_desc:0 "Кто я такой? Это ключевой вопрос, который проникает в сердца личности человека. В прошлом люди говорили, что они из провинции, города или даже семьи. Появились новые идеи, которые выходят за рамки этих представлений и вместо этого рассматривают идентичность как нечто общее между нацией. Более того, нация должна быть объединена в единую страну."
 natural_selection:0 "Естественный отбор"
 natural_selection_desc:0 "Естественный отбор — это механизм, с помощью которого формы жизни развиваются, передавая наследственные черты будущим поколениям. Его открытие дает объяснение тому, как виды возникают и адаптируются в соответствии с окружающей средой."
 naval_theory:0 "Морская теория"
 naval_theory_desc:0 "Применяя некоторую стратегию к военно-морским движениям, можно сделать гораздо более эффективный флот."
 drydocks:0 "Современная верфь"
 drydocks_desc:0 "Создание закрытых зон, где суда могут быть пришвартованы на суше, позволяет упростить и более тщательно обслуживать грузовые суда и военные корабли."
 navigation:0 "Современное судостроение"
 navigation_desc:0 "С помощью различных методов, от звезд до карт, до компаса, можно правильно наметить курс по всему миру."
 neoclassicism:0 "неоклассицизм"
 neoclassicism_desc:0 "Классический период искусства, театра и музыки растянулся примерно с 1750 по 1820 год, с тех пор инновации были названы неоклассическими. Название также ссылается на классическую древность и, следовательно, сравнивает высокую культуру Запада с культурой Рима и Греции, тем самым устанавливая родословную правящего класса Европы как хозяев известного мира."
 nitrogen_fixation:0 "Astroid Mining"
 nitrogen_fixation_desc:0 "Добыча Astroid — это сбор ресурсов от астроидов в космосе."
 nitroglycerin:0 "Современные трубопроводы"
 nitroglycerin_desc:0 "Современные трубопроводы позволяют транспортировать уголь, нефть, СПГ и другие жидкости на огромные расстояния."
 open_hearth_furnace:0 "Открытая печь Hearth"
 open_hearth_furnace_desc:0 "Производство стали включает в себя удаление примесей из чугуна, а затем добавление других материалов для создания сорта стали, которую вы хотите. Для производства стали требуются очень высокие температуры, и печь открытого очага использует отработанный газ из печи для нагрева кирпичей и обратного потока топлива и воздуха проходит через эти кирпичи, чтобы нарастить тепло печи. Процесс медленнее, чем другие, но его легче контролировать и масштабировать, что позволяет производить большое количество стали в одной партии."
 open_hearth_process:0 "Ранняя 3D-печать"
 open_hearth_process_desc:0 "В то время как 3D-печать началась в 1980-х годах, в 2000-х годах она расширилась до полномасштабного производства. Технология, которая позволяет создавать материалы послойно, набрала обороты в таких отраслях, как аэрокосмическая, автомобильная и медицинская техника."
 opium_dens:0 "Опиумный ден"
 opium_dens_desc:0 "Опиумное логово - это просто место, где можно купить и выкурить опиум. Тем не менее, есть люди, которые обеспокоены тем, что эти логова имеют более зловещий уклон и являются источником моральной коррупции."
 paddle_steamer:0 "баллистика"
 paddle_steamer_desc:0 "Ракета всегда знает, где находится. Он знает это, потому что он знает, где его нет, вычитая, где его нет, или где его нет, откуда он есть, в зависимости от того, что больше, он получает разницу или отклонение."
 pan-nationalism:0 "Pan-nationalism"
 pan-nationalism_desc:0 "Through organizations like the EU, de-facto super-states can be formed through trade & economic relations."
 percussion_cap:0 "Тяжелая штурмовая винтовка"
 percussion_cap_desc:0 "Тяжелые винтовки, такие как SCAR-L, обеспечивают достаточную огневую мощь для специальных операций."
 percussion_caps:0 "Перкуссионные колпачки"
 percussion_caps_desc:0 "Ударные шапки берут ранее ненадежное огнестрельное оружие и дают возможность вести огонь в любую погоду."
 personal_liberty:0 "Личная свобода"
 personal_liberty_desc:0 "В дополнение к вопросу о том, как должно управляться общество, возникает также вопрос о том, что должно выходить за рамки управления. Установление индивидуальных свобод, на которые тирания большинства не может вторгаться, является важнейшей частью либеральных идеалов."
 social_media:0 "Социальные медиа"
 social_media_desc:0 "Социальные медиа - это набор технологий, которые позволяют пользователям обмениваться информацией, идеями и контентом через виртуальные сообщества и сети."
 policing_by_consent:0 "Политика с согласия"
 policing_by_consent_desc:0 "Сэр Роберт Пил, будучи министром внутренних дел, создал столичную полицию, отделенную от жандармерии континентальных тиранов, потому что они являются гражданскими лицами, действующими в общественных интересах, а не солдатами, подавляющими политических врагов."
 political_agitation:0 "Цифровые революции"
 political_agitation_desc:0 "Интернет-активизм теперь может подстегнуть крупные революции и исторические события."
 political_theory:0 "Политическая теория"
 political_theory_desc:0 "Как управлять страной - это вопрос, который многие начали задавать, и было разработано несколько теорий о том, как именно будет выглядеть лучший план для государства."
 popular_sovereignty:0 "Народный суверенитет"
 popular_sovereignty_desc:0 "Власть государства и расширение его власти могут быть созданы и поддержаны только с согласия его народа. В свободном правительстве правители являются слугами, а народ — их начальниками и государями."
 portland_cement:0 "Портлендский цемент"
 portland_cement_desc:0 "Этот цемент, названный так из-за его сходства с камнем, добытым на острове в Дорсете, Англия, является эффективным компонентом бетона, используемым для строительства больших сооружений. Он производится из известняка и других распространенных материалов, что делает его очень дешевым."
 potash:0 "Посуда"
 potash_desc:0 "Производимый путем сжигания древесины и осаждения пепла в горшок с водой, калий используется в химических процессах, таких как производство стекла, мыла, лая, пороха и удобрений. Он дает свое название элементу калия, который является активным ингредиентом в этих процессах."
 power_looms:0 "Power Looms"
 power_looms_desc:0 "Лум — это устройство для плетения шерсти, хлопка и других волокон. Ранние ткацкие станки использовали силу рук или ног для вращения нити. «Летающий шаттл», изобретенный в 1733 году, считается стимулом промышленной революции, а использование механической энергии в ткачестве позволяет менее опытным ткачам массово производить ткань. Дополнительные инновации включают ткацкий станок Jacquard, систему программируемых перфокарт, разработанную в 1804 году для автоматизации шаблонов."
 power_of_the_purse:0 "Проекция мощности"
 power_of_the_purse_desc:0 "Силовая проекция использует корабли для усиления силы в других странах посредством запугивания."
 pre_modern_warfare:0 "Предсовременная война"
 pre_modern_warfare_desc:0 "Конфликты прошлых лет бледнеют по сравнению с разрушительными последствиями современной войны, но они все еще были кровавыми делами сами по себе."
 production:0 "Производство"
 propaganda:0 "Пропаганда"
 propaganda_desc:0 "Во время революционных и наполеоновских войн правительства Европы создали пропагандистские крылья, чтобы получить общественную поддержку трудностей, с которыми сталкиваются простые люди. В городах распространялись политические памфлеты и сатирические карикатуры, а патриотические стихи писались под популярные мелодии."
 puddling_furnaces:0 "Пудинговые печи"
 puddling_furnaces_desc:0 "Печь для пудинга используется для производства кованого железа из чугуна. Кирпичная печь нагревается так, что железо плавится с сопутствующим шлаком, после чего смесь механически обрабатывается, например, с ломом, так что избыток углерода в железе вступает в контакт с воздухом, образуя монооксид углерода, в то время как сера и другие примеси уносятся более легким шлаком, который поднимается на поверхность. После двух часов ручной работы «лужи» из кованого железа могут быть удалены из оставшегося шлака. Это трудная, квалифицированная и, следовательно, дорогостоящая работа."
 quinine:0 "mRNA вакцина"
 quinine_desc:0 "Вакцина мРНК - это тип вакцины, который использует копию молекулы, называемой мессенджерной РНК (мРНК), для получения иммунного ответа."
 radio:0 "Межпланетная коммуникация"
 radio_desc:0 "Используя невидимые волны, можно передавать информацию на большое расстояние быстрее, чем радио."
 railways:0 "Высокоскоростные железные дороги"
 railways_desc:0 "Современные технологии позволяют осуществлять сверхбыстрые перевозки грузов и людей"
 rationalism:0 "Культурная революция"
 rationalism_desc:0 "Культурная революция 1960-х годов стимулировала изменение общественных отношений во всем мире."
 realism:0 "Цифровая камера"
 realism_desc:0 "Цифровая камера, также называемая дигикам, представляет собой камеру, которая фиксирует фотографии в цифровой памяти."
 reinforced_concrete:0 "Бим"
 reinforced_concrete_desc:0 "Информационное моделирование зданий (BIM), получившее широкое распространение в 2000-х годах, представляет собой цифровое представление физических и функциональных характеристик здания. Эта технология 3D-моделирования позволила более эффективно планировать, проектировать и строить."
 repeaters:0 "Лазеры"
 repeaters_desc:0 "Лазеры позволяют концентрировать энергию в определенных направлениях с целью ведения боя."
 rifling:0 "Легкая боевая винтовка"
 rifling_desc:0 "Новейшая легкая боевая винтовка позволяет нашей стране оснащать наших солдат максимально эффективной огневой мощью."
 romanticism:0 "Видеомагнитофон"
 romanticism_desc:0 "Видеомагнитофон (VCR) или видеомагнитофон - это электромеханическое устройство, которое записывает аналоговое аудио и аналоговое видео с широковещательного телевидения или других источников AV и может воспроизводить запись после перемотки."
 rotary_valve_engine:0 "Искусственный интеллект"
 rotary_valve_engine_desc:0 "Использование ИИ для массового производства товаров"
 rubber_recycling:0 "Утилизация резины"
 rubber_recycling_desc:0 "Использование мастикатора для пережевывания и реформирования старой резины позволяет нам перерабатывать и повторно использовать этот ценный материал."
 rubberised_fabrics:0 "Резиновые ткани"
 rubberised_fabrics_desc:0 "Используя натуральный каучук, чтобы склеить две ткани вместе или объединить растительные волокна в своего рода искусственную кожу, производят водонепроницаемые изделия, такие как пальто Mackintosh, или эластичную одежду, такую как подтяжки."
 rule_of_law:0 "Правопорядок"
 rule_of_law_desc:0 "Как правило, в системе государственного управления с письменной (как в Соединенных Штатах) или неписаной (как в Соединенном Королевстве) конституцией, Верховенство закона состоит из группы связанных идей по юриспруденции, таких как, что насилие государства быть предсказуемым, и, следовательно, можно избежать, имея правительство четко определило, что является незаконным и какое наказание за преступления будут; и что сами агенты государства подчиняются законам, которые они обеспечивают."
 screw_frigate:0 "Руководящий ракетный разрушитель"
 screw_frigate_desc:0 "Эсминец с управляемыми ракетами использует ракеты для поражения целей, прежде чем они даже узнают о существовании флота."
 sea_lane_strategies:0 "Будущая военно-морская стратегия"
 sea_lane_strategies_desc:0 "Будущие военно-морские стратегии, вероятно, будут вращаться вокруг ИИ."
 semaphore_signalling:0 "Сигнализация семафора"
 semaphore_signalling_desc:0 "Железнодорожные сигналы передают инструкции поездам, действующим на железнодорожных линиях, помогая направлять движение, даже когда локомотив находится в движении и вдали от персонала на станции. Использование семафорных сигналов, вдохновленных военной сигнальной системой, используемой армиями Наполеона, создает единую систему, которую могут использовать все железные дороги."
 separation_of_powers:0 "Разделение властей"
 separation_of_powers_desc:0 "Идея об отдельных ветвях власти с различными ролями, которые контролируют друг друга, чтобы предотвратить коррупцию и злоупотребления, стала гораздо более популярной после относительного успеха «великого американского эксперимента», с ее конституцией, расщепляющей правительство на исполнительную, законодательную и судебную ветви."
 sericulture:0 "Серикультура"
 sericulture_desc:0 "Древняя и тщательно охраняемая техника выращивания шелкопрядов для производства шелка."
 sewage_systems:0 "Канализационные системы"
 sewage_systems_desc:0 "Рост городов привел к тому, что реки захлебнулись сточными водами, они стали черными и пахнут смертью. Пришло время оглянуться назад на древних, которые строили канализационные системы для переноса этих грязных вод из города."
 shaft_mining:0 "Горные машины"
 shaft_mining_desc:0 "Благодаря развертыванию сверхмощной техники мы можем конкурировать на мировом рынке по добыче природных ресурсов."
 shell_gun:0 "Реактивная броня"
 shell_gun_desc:0 "Основной боевой танк (ОБТ), также известный как боевой танк или универсальный танк или просто танк, является танком, который выполняет роль бронезащитного прямого огня и маневра во многих современных армиях."
 slag_fertilisers:0 "Удобрения Slag"
 slag_fertilisers_desc:0 "Низкое значение pH отходов от доменных печей и стальных преобразователей делает его отличным дополнением к почве для сельскохозяйственных целей. Силикатный известковый шлак более растворим, чем натуральный известняк или доломит, увеличивая содержание фосфатов в почве."
 socialism:0 "Правый популизм"
 socialism_desc:0 "Правый популизм, также называемый национальным популизмом и правым популизмом, является политической идеологией, которая сочетает правую политику с популистской риторикой и темами."
 society:0 "Общество"
 enclosure:0 "Эффективное сельское хозяйство"
 enclosure_desc:0 "Участвуя в массовом сельском хозяйстве, с помощью системы, регулируемой правительством, мы можем увеличить производство настолько, чтобы конкурировать на мировом рынке."
 intensive_agriculture:0 "Пестициды"
 intensive_agriculture_desc:0 "Химические вещества, используемые в производстве продуктов питания, которые устраняют насекомых и бактерии."
 steam_donkey:0 "Устойчивое производство"
 steam_donkey_desc:0 "С повышением осведомленности о воздействии на окружающую среду производители начали внедрять более устойчивые методы производства."
 threshing_machine:0 "Коммерческий космический полет"
 threshing_machine_desc:0 "Повышает эффективность наших солнечных панелей, атомных станций и ветряных мельниц"
 steel_frame_buildings:0 "голограммы"
 steel_frame_buildings_desc:0 "Голография - это метод, который позволяет регистрировать волновой фронт и позже реконструировать его. Он наиболее известен как метод создания трехмерных изображений и имеет широкий спектр других применений, включая хранение данных, микроскопию и интерферометрию. В принципе, можно сделать голограмму для любого типа волны."
 steel_railway_cars:0 "Электрический автомобиль"
 steel_railway_cars_desc:0 "Исследования и разработки в области автономных транспортных средств ускорились в 2000-х годах. DARPA Grand Challenge (2004 и 2005), организованный Министерством обороны США, стал важной вехой, демонстрирующей ранние попытки беспилотных автомобилей."
 stormtroopers:0 "Специалист"
 stormtroopers_desc:0 "Человеческие войска обучены и оснащены специально для уничтожения ИИ и захвата подразделений."
 streamliners:0 "упорядочение"
 streamliners_desc:0 "Новые конструкции поездов, использующие современную тяговую мощность и новую конструкцию алюминиевого корпуса, позволяют железным дорогам надежно управлять большим количеством поездов на более высоких скоростях."
 submarine:0 "Будущие подводные лодки"
 submarine_desc:0 "Будущие подводные лодки управляются технологиями будущего, которые позволяют наносить разрушительные удары."
 multilateral_alliances:1 "крионика"
 multilateral_alliances_desc:0 "Рионика — это практика сохранения людей, которые юридически мертвы, замораживая их при очень низких температурах, с надеждой, что будущие медицинские технологии смогут оживить их и вылечить состояние, которое вызвало их смерть."
 synthetic_dye:0 "Синтетическая краска"
 synthetic_dye_desc:0 "Это включало химический процесс, который создавал различные типы красителей синтетическим способом. Это произвело революцию в окраске ткани и положило конец производству сельскохозяйственных красителей, которые стали слишком дорогими для производства."
 system_gin:0 "Автомобиль"
 system_gin_desc:0 "Автомобили позволяют быстро перевозить людей и товары по всей земле."
 telegraph:0 "Телеграф"
 telegraph_desc:0 "Электричество может использоваться для передачи сигналов по линиям почти мгновенно, например, с помощью кода Морзе. Главным источником задержки является человек-оператор, который должен быть хорошо обучен кодированию и декодированию сообщений, которые были переданы в виде коротких и длинных точек и полос шума."
 telephone:0 "Умный город"
 telephone_desc:0 "Интеграция IoT-устройств в городскую инфраструктуру позволяет городам контролировать и управлять такими ресурсами, как вода, электричество, трафик и отходы в режиме реального времени, повышая эффективность и устойчивость."
 telephones:0 "Телефоны"
 telephones_desc:0 "Теоретически мы знали, что идея говорящего телеграфа может быть возможной, но мы просто не были уверены, как. Достижения в области электроники сделали эту идею, наконец, возможной."
 tin_cans:0 "Оловянные банки"
 tin_cans_desc:0 "Концепция консервов восходит к стеклянным банкам, используемым армиями Французской революции. Вскоре идея распространилась и на гражданское использование. Мясо или суп, который был приготовлен внутри металлической банки, защищен от воздействия внешнего мира и может потребляться на досуге семьями среднего класса. Название происходит от жести, которая имеет тонкий слой олова вне железной или стальной пластины, чтобы защитить металл от ржавчины на открытом воздухе."
 trench_works:0 "Танк Recon"
 trench_works_desc:0 "Устройства, используемые для отправки ударных волн и подавления вражеских войск"
 triage:0 "VTOL Aircraft"
 triage_desc:0 "Вертикальный взлетно-посадочный самолет (VTOL) - это тип самолета, который может взлетать и садиться вертикально без необходимости взлетно-посадочной полосы."
 urban_planning:0 "Фиатная валюта"
 urban_planning_desc:0 "Фиатные валюты — это денежные запасы, которые не подкреплены золотом."
 urbanization:0 "Международные организации"
 urbanization_desc:0 "Международные организации, такие как Организация Объединенных Наций, стремятся сохранить мир и содействовать экономическому росту во всем мире."
 vaccination:0 "вакцинация"
 vaccination_desc:0 "Прививки людям, которые, как надеялись, были менее вирулентными формами заболевания, были известны на протяжении веков, но также были очень рискованными. Вакцинация, которая включала в себя использование менее опасного, но связанного с ним заболевания или лечение возбудителей заболеваний, чтобы они потеряли способность заражать, была намного безопаснее и намного надежнее."
 vacuum_canning:0 "бережливое производство"
 vacuum_canning_desc:0 "Концепция бережливого производства, появившаяся в 1990-х годах, направлена на сокращение отходов и повышение эффективности производственных систем. В нем подчеркивается постоянное улучшение процессов за счет устранения не добавляющей ценности деятельности, повышения качества и повышения удовлетворенности клиентов."
 vulcanization:0 "Автономные дроны"
 vulcanization_desc:0 "Дроны доставки вышли за рамки экспериментальных этапов, а такие компании, как Amazon и Wing, тестируют коммерческие системы доставки дронов, способные быстро и эффективно перемещать посылки в городских и сельских районах."
 wargaming:0 "Боевые симуляции"
 wargaming_desc:0 "Высмеивая воображаемые сценарии войны и практикуя стратегию, можно улучшить боевые способности офицеров."
 water_treatment:0 "Очистка воды"
 water_treatment_desc:0 "Было обнаружено, что вода несет болезни в наши дома. Тем не менее, у науки есть ответ, мы можем просто сделать воду чистой снова с помощью фильтрации и химической обработки."
 wood_pulp_papermaking:0 "Изготовление бумаги из целлюлозы"
 # gold_standard_desc: "This meant a currency system based on gold. Money was rather expensive to produce by the government and this could sometimes result in a low of money stock. However, the good thing was that the gold prices were rather stable and the trust in gold was high, making the currency stable."
 # savings_banks_desc: "The middle-class is growing larger and wealthier thanks to education and a strong work ethic. Many individuals wish to be part of railways through Africa; dams across the Nile; fleets of ocean Greyhounds; majestic, self-amortizing canals; plantations of ripening tea; all from tuppence prudently, fruitfully, frugally invested (to be specific) in the Dawes-Tomes-Mousely-Grubbs Fidelity Fiduciary Bank."
 # silver_standard_desc: "This meant a currency system based on silver. Money was cheaper to produce by the government which meant that there was rarely any lack of money in the country. However, the problem was that the silver prices had a tendency to be dominated by gold prices, which meant that foreign trade was often suffering."
#  acidic_and_basic_converters: "Acidic and Basic Converters"
#  acidic_and_basic_converters_desc: "The original Bessemer converters had a lining of insulating clay between the walls and the molten iron. The #clay is acidic and affects the composition of the resulting steel. By replacing the clay with basic (alkaline) materials such as magnesite, chromite or dolomite, or more acidic materials such as ganister, the process can be fine tuned to remove even more impurities, depending upon the content of the iron ore."
#  fluid_compressed_steel: "Fluid Compressed Steel"
#  fluid_compressed_steel_desc: "This process involves the use of a hydraulic forging press to put the steel under great pressure while still a #fluid. This squeezes the tiny pockets of gas impurities out of the cooling ingots, allowing for a much higher quality steel by preventing the #formation of blowholes and piping."
#  global_trade_desc: "By the end of the 18th century, the world-system had encompassed almost the entire globe, with raw materials being imported #from the colonies and peripheral nations and turned into finished goods in the global core, to be exported in turn."
#  guilds: "Guilds"
#  guilds_desc: "The guild system was a way of organizing labor which mandated participation in the guild and in advancing through its ranks in order #to practice the guild trade within a city. While it protected the living standards of the guild members and supposedly ensured better quality #work, it also raised prices and stymied innovation."
#  hydraulic_forging_press: "Hydraulic Forging Press"
#  hydraulic_forging_press_desc: "A hydraulic forging press applies applies massive force, up to thousands of pounds per square inch, to a material #that is being worked while hot. An engine drives water, air or hydraulic fluid through valves connected to a piston, which in turn presses the #die onto the material. The valves can be turned on and off by the operator, allowing the material to be manipulated and precise amounts of force #applied at will."
#  mutualism_desc: "An economic theory usually associated with anarchism, mutualism opposes capital interest but advocates free markets and advocates #the formation of  mutual savings banks as a method for loans."
#  news_agencies: "News Agencies"
#  news_agencies_desc: "Organizations which sell news reports to various media, such as newspapers. This allows for media to include reports of #events and developments beyond the reach of their own bureaus and international news to be reported even in local media."
#  one-nationism: "One-nationism"
#  one-nationism_desc: "A type of conservative politics wherein social obligation and responsibility towards the poor and needy is combined with #traditional conservative ideals. Opposed to class struggle, one-nation conservatives seek to create a hierarchy wherein the classes support each #other."
#  percussion_oil_drilling: "Percussion Oil Drilling"
#  percussion_oil_drilling_desc: "When using a percussion drill, the drill-bit is raised by hand and then released to bite into the earth under the #force of gravity. Depths of up to around thirty metres are possible using this technique."
#  private_banks: "Private Banks"
#  private_banks_desc: "The wealthy merchant families of city states, and the royal families of European monarchies, need somewhere safe to keep #their piles of gold and someone to look after their finances. The first banks were created with this goal in mind."
#  ricardian_economics: "Ricardian Economics"
#  ricardian_economics_desc: "David Ricardo formalized several concepts that made up the Classical School of Economics, such as economic rent, the #labor theory of value, and comparative advantage."
#  self_acting_looms_desc: "Gradual improvements in loom technology have transformed the weaving industry and vastly increased the output of fabrics #factories. By using mechanical power for more and more operations, the role of the weaver is reduced to merely keeping the machine running and #clearing blockages. Children are especially useful for this as they can crawl into smaller spaces than adults. Shutting the machines down while #such work is carried out has been judged to be less profitable than allowing for the occasional child to be mangled."
#  smithian_economics: "Smithian Economics"
#  smithian_economics_desc: "Building upon the ideas of the earlier Physiocrats, with their agrarian opposition to the 'unproductive labor' of the #feudal system, Adam Smith led an attack on mercantilism which founded the Classical School of Economics."
#  steam_engines: "Steam Engines"
#  steam_engines_desc: "Pioneers in steam technology usually had uses other than locomotion in mind. For example, Richard Trevithick built huge #engine houses that dot the Cornish landscape to keep the tin mines free from flooding."
#  steam_hammer: "Steam Hammer"
#  steam_hammer_desc: "Hammering out metals is useful for both shaping and alloying the material. When used on pig iron, this creates wrought iron or #mild steel, the difference being how much carbon is left in the alloy. The use of steam means both more efficiency and better precision than #hammering out the alloy by hand."
#  steam_lathes: "Steam Lathes"
#  steam_lathes_desc: "The lathe is a machine used for boring holes of various shapes and sizes into materials, or for otherwise whittling them down #symmetrically. Exploiting steam power to drive lathes allows industry to use more precision in engineering."
#  stock_exchanges: "Stock Exchanges"
#  stock_exchanges_desc: "Organized trading of financial instruments dates back to the Italian city states and the Dutch Republic. A stock exchange #brings together buyers and sellers of assets such as government debt and shares in companies."#
#  tunnelling_shields: "Tunnelling Shields"
#  tunnelling_shields_desc: "When digging a mine shaft or railway tunnel, supporting the vast weight of the earth above the workers is vital for the #integrity of the project. A tunnelling shield is a mobile structure made of steel that provides temporary support on the active site of digging. #As the tunnelling shield is moved along, such as on a railway track, a more permanent support is laid, such as brickwork or timbers. The first #use of such a device was in the construction of the Thames Tunnel in 1825 by Anglo-French engineer Marc Isambard Brunel, the father of the more #famous Isambard Kingdom Brunel."
# alienation: "Alienation"
# alienation_desc: "The creation of the capitalist means of production has fundamentally altered the relationship of the worker to his work. No longer is he the craftsmen who creates something unique or the farmer who gains a share of the produce. In his production he is able to objectify his individuality and his character. Now though the capitalist means of production estranges a person from their very humanity, they are no longer the director of their own actions and through that they gain a profound sense of alienation."
# experimental_psychology: "Experimental Psychology"
# experimental_psychology_desc: "The human mind is a very complicated things, what do people experience when they receive a sensory stimulus and is it the same for you as it is for me? Trying to measure these things is no easy manner, but the recent advancements in the field of psychology have created a new field called experimental psychology where tests can be done to see how people react to stimuli."
# global_trade: "Global Trade"
# historical_materialism: "Historical Materialism"
# historical_materialism_desc: "What is society? This is a complicated question but if we were to define society as the union of the productive capacity and the relationships people have to the means of production we can begin to analyze past societies and how they have developed and evolved over time. We call this methodological approach Historical Materialism."
# individualism_desc: "A philosophy focused on the interests, happiness and autonomy of the individual. This includes the right of the individual to pursue its own self-interest, conclude for itself what is true and false, to think and act independently of society."
# institutionalization: "Institutionalization"
# institutionalization_desc: "If we want to expand the role of the state we need to expands the means the state has to deliver these roles. The building up the institutions of the state are the means to doing this. This steadily institutionalization of functions that were previously in the private sphere also bring along profound societal changes as well."
# pragmatism: "Pragmatism"
# pragmatism_desc: "The problem with philosophers is that they seek knowledge for knowledge sake and they also seek to create a nice unchanging universe to suit their theories. Pragmatism explicitly rejects these two tenants. Knowledge should actually be viewed only from the point of view of what practical use it has and we should accept that the universe itself is ever changing."
# religion_of_humanity: "Religion of Humanity"
# religion_of_humanity_desc: "The rise of secularism has started to free our people from the chains of superstition that religion forces on people but at the same time we lost the societal cohesion that organized religion provided. The religion of humanity offers the social cohesion of organized religion without the superstition. The cynics describe at as Catholicism minus Christianity but it also offers all the things a religion should."
# self_acting_looms: "Self-Acting Looms"
# transcendentalism: "Transcendentalism"
# transcendetalism_desc: "Transcendentalism was a philosophical movement that was founded by the German philosopher Immanuel Kant in his book Critique of Pure Reason published in 1781. It has also been described as critical philosophy as it sees philosophy's role as that of criticism rather than justification of knowledge. The task of philosophy shifts for being about establishing theories about knowledge and instead subjecting these theories to critical review to see who valid they are."
