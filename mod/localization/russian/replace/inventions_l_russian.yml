#vitamins_desc: "By isolating certain nutrients that the body needs, it is possible to make sure that more people have a healthy and balanced diet."

 central_archives:0 "Цифровые архивы"
 central_archives_desc:1 "Цифровой архив - это веб-сайт, созданный с целью сохранения данных для последующего использования."
 steelworking:0 "Оффшорные НПЗ"
 steelworking_desc:1 "Переработка нефти позволяет создавать эффективное топливо для транспортных средств, электричества и пластика"
 prospecting:0 "Форекс"
 prospecting_desc:1 "Обмен иностранной валюты на прибыль."
 baking_powder:0 "Вегетарианские варианты"
 baking_powder_desc:1 "Растительное мясо позволяет нашему вегетарианскому населению процветать на некогда недоступных товарах."
 mechanical_tools:0 "Фермерское хозяйство"
 mechanical_tools_desc:1 "Фабричное земледелие позволяет производить массовое мясо с помощью жестокого обращения с животными"
 rubber_mastication:0 "Передовые геодезические технологии"
 rubber_mastication_desc:1 "Системы сканирования LiDAR (Light Detection and Ranging) использовались для создания высокоточных 3D-моделей строительных площадок, в то время как оборудование с поддержкой GPS помогло повысить точность раскопок, градации и других работ на площадке."
 pumpjacks:0 "Электрические грузы"
 pumpjacks_desc:1 "Подобно электромобилям, электрические контейнеровозы позволяют осуществлять доставку грузов в места назначения без выбросов."
 shift_work:0 "Блокчейн"
 shift_work_desc:1 "Блокчейн — это отслеживание происхождения товаров в цепочке поставок с помощью компьютерных технологий. Принятие блокчейна такими компаниями, как Walmart и IBM в конце 2000-х годов, помогло обеспечить прозрачность источников питания, повысив доверие потребителей."
 paved_roads:0 "Зеленый город"
 paved_roads_desc:1 "Зеленые и автоматизированные города"
 pasteurization:0 "выращенное в лаборатории мясо"
 pasteurization_desc:1 "Массовое производство выращенного в лаборатории мяса"
 pneumatic_tools:0 "Мегаструктуры"
 pneumatic_tools_desc:1 "Строительство мегаструктур с помощью ИИ, 3D-печати и Metaverse."
 steam_turbine:0 "Углеродно-нейтральный бетон"
 steam_turbine_desc:1 "Бетон, не вызывающий загрязнения"
 plastics:0 "Коботы"
 plastics_desc:1 "Коботы работают вместе с людьми в производственных условиях, помогая в таких задачах, как сборка, обработка материалов и проверка качества, что повышает производительность и снижает риски."
 dough_rollers:0 "3D-печатная еда"
 dough_rollers_desc:1 "Быстрое производство всех продуктов питания с помощью автоматизированных компьютеров"
 oil_turbine:0 "Биопластик"
 oil_turbine_desc:1 "Безопасные, экологически чистые пластиковые решения."
 standing_army:0 "Доктрина армии холодной войны"
 standing_army_desc:1 "Сложные вызовы внешней политики и внутренние беспорядки больше не могут быть решены поспешными ополченцами. Современные времена требуют военных, готовых действовать в любое время."
 mandatory_service:0 "Роторкрафт"
 mandatory_service_desc:1 "Изобретение вертолета позволяет осуществлять атаки на базе вертолета и варианты поддержки."
 military_drill:0 "Боевые учения"
 military_drill_desc:1 "Как говорится, «практика делает совершенным», и это так же верно для солдат, как и для музыкантов. Нет армии более ценимой генералами, чем армия, которая может реагировать на все команды мгновенно и без смущения."
 line_infantry:0 "Штурмовая пехота"
 line_infantry_desc:1 "Солдаты, оснащенные стандартизированным снаряжением и обученные стандартизированными методами, придают армии большую единообразие и тем самым придают ей большую надежность."
 logistics:0 "GPS"
 logistics_desc:1 "Глобальная система позиционирования (GPS) - это система спутников, которые обеспечивают критически важные возможности позиционирования для военных, гражданских и коммерческих пользователей по всему миру."
 electric_telegraph:0 "Нападающий пистолет"
 electric_telegraph_desc:1 "Современные штурмовые орудия могут использоваться аналогично БМП для оказания помощи пехотным операциям."
 enlistment_offices:0 "Спутник атаки"
 enlistment_offices_desc:1 "Атакующие спутники могут уничтожать другие спутники в боевых целях"
 military_statistics:0 "Автономный реактивный истребитель"
 military_statistics_desc:1 "Самолеты-истребители полностью контролируются искусственным интеллектом"
 self_propelled_torpedoes:0 "Автономная подводная лодка"
 self_propelled_torpedoes_desc:1 "Автономные подводные лодки - это тип судна, полностью контролируемого подводными лодками."
 war_propaganda:0 "Автоматическая пропаганда"
 war_propaganda_desc:1 "Убедить население посвятить свое время, свои ресурсы и свою кровь ради победы — это целая область работы."
 nco_training:0 "Автономный вертолет"
 nco_training_desc:1 "Вертолеты полностью управляются беспилотниками."
 destroyer:0 "Будущий разрушитель"
 destroyer_desc:1 "Более легкие суда, оснащенные торпедами и меньшими пушками, так же важны в современных флотах, как и капитальные корабли."
 landing_craft:0 "ИИ-интегрированные компьютерные системы"
 landing_craft_desc:1 "ИИ-интегрированные вычислительные системы для наших кораблей"
 flamethrowers:0 "Производитель Pathogens"
 flamethrowers_desc:1 "Произведенный патоген — это заболевание, созданное в лаборатории с целью убить как можно больше людей."
 banking:0 "Электронная почта"
 banking_desc:1 "Электронная почта (сокращение от электронной почты; альтернативно написанная электронная почта) - это способ передачи и приема сообщений с использованием электронных устройств."
 academia:0 "Цифровизация"
 academia_desc:1 "Цифровизация мира через достижения в области компьютерных информационных систем."
 international_relations:0 "Таблетка"
 international_relations_desc:1 "Таблетки или антибиотики являются расходными капсулами, которые направлены на обезболивание симптомов заболеваний. Таблетки часто относятся к изобретению биф-контроля, что позволяет увеличить рост населения."
 stock_exchange:0 "Экономическая глобализация"
 stock_exchange_desc:1 "Экономическая глобализация - это растущая интеграция экономик по всему миру, которая включает в себя обмен товарами, услугами, капиталом, технологиями и людьми."
 medical_degrees:0 "Компактный диск"
 medical_degrees_desc:1 "Компакт-диск (CD) - это формат хранения данных на цифровом оптическом диске, который был совместно разработан Philips и Sony для хранения и воспроизведения цифровых аудиозаписей."
 organized_sports:0 "Контртеррористические операции"
 organized_sports_desc:1 "Подготовка по вопросам борьбы с терроризмом (иногда называемая подготовкой по вопросам реагирования на терроризм или подготовкой к борьбе с терроризмом) направлена на устранение угрозы неминуемого террористического нападения путем обеспечения осведомленности, подготовки, предотвращения и методов реагирования."
 central_banking:0 "Современный левый"
 central_banking_desc:1 "Левая политика описывает диапазон политических идеологий, которые поддерживают и стремятся достичь социального равенства и эгалитаризма."
 corporate_charters: "Корпоративный либерализм"
 corporate_charters_desc: "Корпоративный либерализм является тезисом в историографии Соединенных Штатов и инструментом для его открытого империализма, в котором корпоративная элита становится как главными бенефициарами, так и главными лоббистами для якобы антибизнес-регулирования."
 joint_stock_companies: "Современная монетарная теория"
 joint_stock_companies_desc: "Современная денежная теория или современная денежная теория (MMT) - это неортодоксальная макроэкономическая теория, которая описывает валюту как государственную монополию и безработицу как свидетельство того, что валютный монополист чрезмерно ограничивает предложение финансовых активов, необходимых для уплаты налогов и удовлетворения сбережений."
 investment_banks: "Финансовые консультанты AI"
 investment_banks_desc: "Робо-советники используют алгоритмы и искусственный интеллект (ИИ) для предоставления услуг финансового планирования с минимальным вмешательством человека."
 corporate_management: "Управление Интернетом"
 corporate_management_desc: "Позволяет правительству захватить полный контроль над интернетом"
 dialectics:0 "влиятельные лица"
 dialectics_desc:1 "Влияние, также известное как влияние в социальных сетях, является типом интернет-знаменитости, которая является влиятельной и известной в социальных сетях. Современный референт термина обычно является платной ролью, в которой бизнес-субъект платит за деятельность в социальных сетях для продвижения своих продуктов и услуг, известную как маркетинг влияния."
 psychiatry:0 "мемы"
 psychiatry_desc:1 "Интернет-мем, или мем, является культурным элементом (например, идея, поведение или стиль), который распространяется через Интернет, в основном через платформы социальных сетей."
 postal_savings:0 "Ипотечные ценные бумаги"
 postal_savings_desc:1 "Субстандартная ипотека - это тип кредита, который предоставляется людям, которые не соответствуют типичным требованиям для ипотеки от традиционного банка или кредитного союза."
 human_rights:0 "Благосостояние животных"
 human_rights_desc:1 "Позиции защиты животных утверждают, что животные должны быть защищены от определенных видов деятельности человека."
 mutual_funds:0 "Гигекономика"
 mutual_funds_desc:1 "В январе 2021 года произошло короткое сжатие акций американского ритейлера видеоигр GameStop и других ценных бумаг, вызвавшее крупные финансовые последствия для некоторых хедж-фондов и большие потери для коротких продавцов."
 zeppelins:0 "Звездный корабль"
 zeppelins_desc:1 "Звёздные корабли позволяют быстро перевозить людей и грузы между планетами"
 international_exchange_standards:0 "Солнечный рынок"
 international_exchange_standards_desc:1 "Фондовый рынок расширился до внешнего пространства"
 psychoanalysis:0 "Нейропластика"
 psychoanalysis_desc:1 "Нейропластичность - это изучение того, как нейроны образуют связи в мозге."
 philosophical_pragmatism:0 "Кибервойна"
 philosophical_pragmatism_desc:1 "Кибервойна представляет собой серию кибератак или контратак между национальными государствами или международными организациями с целью нанесения ущерба или нарушения работы компьютеров, сетей или информационных систем другой страны."
 modern_financial_instruments:0 "Цифровой хеджфонд"
 modern_financial_instruments_desc:1 "Методы зарабатывания денег продолжают расти и распространяться. Некоторые методы могут включать в себя денежные потоки в пирамиде вверх, но все они включают в себя все больше и больше денег."
 macroeconomics:0 "Цифровая экономика"
 macroeconomics_desc:1 "Исследование экономики онлайн и экономики электронных услуг."
 behaviorism:0 "Психоделическая терапия"
 behaviorism_desc:1 "Исследования терапевтического потенциала психоделических веществ (таких как псилоцибин, МДМА и ЛСД) получили значительный импульс. Эти вещества изучаются на предмет их влияния на такие состояния, как посттравматическое стрессовое расстройство (ПТСР), депрессия, беспокойство и зависимость."
 analytical_philosophy:0 "Телетерапия"
 analytical_philosophy_desc:1 "Телетерапия и дистанционное консультирование: Телемедицина, которая взорвалась во время пандемии COVID-19, продолжает расти как удобный способ для людей получить удаленный доступ к терапии."
 electrical_capacitors:0 "Наноматериалы"
 electrical_capacitors_desc:0 "Способность манипулировать материалами на наноуровне (миллиардные доли метра) приводит к прорывам в нескольких отраслях. Графен, один слой атомов углерода, является одним из самых перспективных наноматериалов, предлагая исключительную прочность, проводимость и гибкость."
 corporatism:0 "Постнеолиберализм"
 corporatism_desc:0 "С окончанием неолиберализма общество стремится улучшить нынешнюю капиталистическую систему."
 drone_carrier:0 "Беспилотный перевозчик"
 drone_carrier_desc:0 "Беспилотники, подобные сегодняшним авианосцам, несут рои дронов и развязывают разрушительные атаки на наших врагов."
