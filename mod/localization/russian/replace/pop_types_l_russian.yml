l_russian:
 aristocrats:0 "@aristocrats! $aristocrats_no_icon$"
 aristocrats_only_icon:0 "@aristocrats!"
 aristocrats_no_icon:0 "аристократы"
 aristocrats_desc:1 "Богатые землевладельцы, старые деньги со старыми связями. Они работают исключительно на фермах и плантациях [GetBuildingType('building_manor_house').GetName] [Concept('concept_building', '$concept_buildings$')]. Они вносят часть своей прибыли в [concept_investment_pool]. Их политические интересы представлены как [GetInterestGroupVariant('ig_landowners',GetPlayer).GetNameWithCountryVariant]."
 bureaucrats:0 "@bureaucrats! $bureaucrats_no_icon$"
 bureaucrats_only_icon:0 "@bureaucrats!"
 bureaucrats_no_icon:0 "бюрократы"
 bureaucrats_desc:0 "Должностные лица, ответственные за управление государственными функциями и инфраструктурой. В политическом плане они, как правило, совпадают с интеллигенцией или мелкой буржуазией."
 capitalists:0 "@capitalists! $capitalists_no_icon$"
 capitalists_only_icon:0 "@capitalists!"
 capitalists_no_icon:0 "капиталисты"
 capitalists_desc:1 "Капитаны индустрии, новые деньги для новой эры. Они работают исключительно в [GetBuildingType('building_financial_district').GetName] [Concept('concept_building', '$concept_buildings$')], где они владеют шахтами и фабриками. Они вносят часть своей прибыли в [concept_investment_pool]. Их политические интересы представлены как [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetNameWithCountryVariant]."
 clergymen:0 "@clergymen! $clergymen_no_icon$"
 clergymen_only_icon:0 "@clergymen!"
 clergymen_no_icon:0 "духовенство"
 clergymen_desc:0 "Священники, ученые и другие религиозные деятели, заботящиеся о духовных нуждах сельского населения. Политически они являются основой Devout."
 clerks:0 "@clerks! $clerks_no_icon$"
 clerks_only_icon:0 "@clerks!"
 clerks_no_icon:0 "Белые воротнички"
 clerks_desc:0 "Нижние офисные работники, выполняющие административные задачи в органах власти, инфраструктуре и магазинах. Обычно часть Малой буржуазии, хотя некоторые присоединяются к профсоюзам."
 engineers:0 "@engineers! $engineers_no_icon$"
 engineers_only_icon:0 "@engineers!"
 engineers_no_icon:0 "Инженеры"
 engineers_desc:1 "Изобретатели и дизайнеры технических решений, работающие с передовыми машинами в таких секторах, как производство, добыча полезных ископаемых и строительство. Одни поддерживают промышленников или мелкой буржуазии, другие вступают в профсоюзы."
 farmers:0 "@farmers! $farmers_no_icon$"
 farmers_only_icon:0 "@farmers!"
 farmers_no_icon:0 "фермеры"
 farmers_desc:0 "Акционеры, мелкие фермеры и другие, которые делают стабильную, но скудную жизнь производством продуктов питания или выращиванием товарных культур. Большинство считает, что их интересы представляют сельские жители."
 peasants:0 "@peasants! $peasants_no_icon$"
 peasants_only_icon:0 "@peasants!"
 peasants_no_icon:0 "Крестьяне"
 peasants_desc:2 "Прожиточные фермеры встречаются только в [Concept('concept_subsistence_building', '$concept_subsistence_buildings$')], где они производят сельскохозяйственные и простые промышленные продукты, которые они используют в основном для своих собственных нужд. Они полагаются на [concept_subsistence_output] для выживания и играют лишь ограниченную роль в экономике [concept_market]. Они имеют тенденцию быть [Concept('concept_politically_unaligned_aligned', '$concept_politically_unaligned$')]."
 laborers:0 "@laborers! $laborers_no_icon$"
 laborers_only_icon:0 "@laborers!"
 laborers_no_icon:0 "Голубые воротнички"
 laborers_desc:0 "Дневные работники, фермеры и другие лица, практически не имеющие гарантий занятости, выполняют любую работу, доступную всему обществу. Они обычно не занимаются политикой, но могут участвовать через профсоюзы."
 officers:0 "@officers! $officers_no_icon$"
 officers_only_icon:0 "@officers!"
 officers_no_icon:0 "Офицеры"
 officers_desc:0 "Комиссионные офицеры, командующие вооруженными силами страны в армии и флоте. Политически они представляют высшие эшелоны Вооруженных Сил."
 academics:0 "@academics! $academics_no_icon$"
 academics_only_icon:0 "@academics!"
 academics_no_icon:0 "академики"
 academics_desc:0 "Исследователи, врачи, юристы и другие образованные специалисты, обучающиеся и преподающие в академических учреждениях. Политически они находятся на переднем крае интеллигенции."
 shopkeepers:0 "@shopkeepers! $shopkeepers_no_icon$"
 shopkeepers_only_icon:0 "@shopkeepers!"
 shopkeepers_no_icon:0 "Владельцы малого бизнеса"
 shopkeepers_desc:0 "Владельцы и менеджеры магазинов, продающие товары клиентам в городах. Они, как правило, относятся к мелкой буржуазии."
 slaves:0 "@slaves! $slaves_no_icon$"
 slaves_only_icon:0 "@slaves!"
 slaves_no_icon:0 "Рабы"
 slaves_desc:0 "Относится не как к личности, а как к собственности, выполняя принудительный труд в различных секторах в странах, где разрешено рабство. Из-за своего статуса они не допускаются к участию в политике."
 soldiers:1 "@soldiers! $soldiers_no_icon$"
 soldiers_only_icon:1 "@soldiers!"
 soldiers_no_icon:1 "Военнослужащие"
 soldiers_desc:0 "Солдаты и моряки составляют основную часть военнослужащих страны. Они обычно политически совпадают со своей ролью в составе вооруженных сил."
 machinists:0 "@machinists! $machinists_no_icon$"
 machinists_only_icon:0 "@machinists!"
 machinists_no_icon:0 "машинисты"
 machinists_desc:0 "Ручные работники со стабильной занятостью, эксплуатирующие машины на заводах, шахтах, механизированных фермах и в других секторах. С политической точки зрения они являются движущей силой профсоюзов."
  
 ACADEMICS_QUALIFICATIONS_DESC:0 "Только всплывающие окна с адекватным [concept_literacy] могут стать #v $academics$#!. Потенциал увеличивается с увеличением [concept_literacy] и [concept_wealth]. Попы, у которых [concept_culture] низкий [concept_acceptance], занимают гораздо больше времени. #v $clerks$ #! и #v $aristocrats$ #! имеют особенно легкое время становления #v $academics$ #!."
 ARISTOCRATS_QUALIFICATIONS_DESC:0 "Только всплывающие окна с адекватным [concept_wealth] могут стать #v $aristocrats$#!. Потенциал увеличивается с большим [concept_wealth] и в меньшей степени [concept_literacy]. Попы, у которых [concept_culture] низкий [concept_acceptance], занимают гораздо больше времени. #v $officers$ #! и #v $bureaucrats$ #! имеют особенно легкое время становления #v $aristocrats$ #!."
 BUREAUCRATS_QUALIFICATIONS_DESC:0 "Только всплывающие окна с адекватным [concept_literacy] могут стать #v $bureaucrats$#!. Потенциал увеличивается с увеличением [concept_literacy]. Всплывающие окна, у которых [concept_culture] низкий [concept_acceptance], занимают гораздо больше времени, в то время как для тех, у кого [concept_culture] и [concept_religion] с высоким $concept_acceptance$, он идет быстрее. #v $clerks$ #! и #v $clergymen$ #! особенно легко становится #v $bureaucrats$ #!."
 CAPITALISTS_QUALIFICATIONS_DESC:0 "Только всплывающие окна с адекватным [concept_wealth] могут стать #v $capitalists$#!. Потенциал увеличивается с увеличением [concept_wealth] и [concept_literacy]. Попы, у которых [concept_culture] низкий [concept_acceptance], занимают гораздо больше времени. #v $shopkeepers$ #! и #v $engineers$ #! имеют особенно легкое время становления #v $capitalists$ #!."
 CLERGYMEN_QUALIFICATIONS_DESC:0 "Только всплывающие окна с адекватным [concept_literacy] могут стать #v $clergymen$#!. Потенциал увеличивается с увеличением [concept_literacy]. Всплывающие окна, у которых [concept_religion] низкий [concept_acceptance], занимают гораздо больше времени, в то время как для тех, у кого [concept_religion] высокий $concept_acceptance$. #v $academics$ #! и #v $aristocrats$ #! особенно легко становится #v $clergymen$ #!."
 CLERKS_QUALIFICATIONS_DESC:0 "Любой поп может стать #v $clerks$#!. Потенциальное увеличение с большим [concept_literacy]. #v $laborers$ #! имеет особенно легкое время, становясь #v $clerks$ #!."
 ENGINEERS_QUALIFICATIONS_DESC:0 "Только всплывающие окна с адекватным [concept_literacy] могут стать #v $engineers$ #!. Потенциальное увеличение с большим [concept_literacy] и [concept_wealth]. #v $machinists$ #! и #v $clerks$ #! имеют особенно легкое время становления #v $engineers$ #!."
 FARMERS_QUALIFICATIONS_DESC:0 "Любой поп может стать #v $farmers$#!. Потенциальное увеличение с большим [concept_wealth]. #v $peasants$ #! и #v $laborers$ #! имеют особенно легкое время становления #v $farmers$ #!."
 MACHINISTS_QUALIFICATIONS_DESC:0 "Поп с минимальным значением [concept_literacy] может стать #v $machinists$#!. Потенциальное увеличение с большим [concept_literacy]. #v $laborers$ #! имеет особенно легкое время, становясь #v $machinists$ #!."
 OFFICERS_QUALIFICATIONS_DESC:0 "Только #v $soldiers$ #! или пики [concept_culture] с достаточно высоким [concept_acceptance] могут стать #v $officers$ #!. Потенциальное увеличение с большим [concept_literacy]. #v $aristocrats$ #! имеет особенно легкое время, становясь #v $officers$ #!."
 SHOPKEEPERS_QUALIFICATIONS_DESC:0 "Только всплывающие окна с некоторыми [concept_wealth] могут стать #v $shopkeepers$ #!. Потенциальное увеличение с большим [concept_wealth]. #v $clerks$ #! и #v $farmers$ #! имеют особенно легкое время становления #v $shopkeepers$ #!."
