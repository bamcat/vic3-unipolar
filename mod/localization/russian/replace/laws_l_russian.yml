l_russian:
  
  # Leader Ideologies
 ideology_moderate:0 "умеренный"
 ideology_moderate_desc:0 "#lore Этот лидер считается умеренным в своей группе интересов, без какой-либо собственной идеологии."
 
 ideology_traditionalist:0 "традиционалист"
 ideology_traditionalist_desc:0 "#lore Этот лидер верит в сохранение традиционных обычаев, рассматривая их как расширение естественных законов. #!"

 ideology_traditionalist_minoritarian: "Миноритарный традиционалист"
 ideology_traditionalist_minoritarian_desc:0 "#lore Этот лидер верит в сохранение традиционных обычаев, рассматривая их как расширение естественных законов. Хотя их страна остается под властью другой религии, они будут выступать против навязывания государственной религии населению. #!"

 ideology_atheist:1 "нигилист"
 ideology_atheist_desc:1 "#lore Этот лидер ставит во главу угла вопрос и отмену традиционалистского общественного порядка и институтов любой ценой, стремясь расчистить почву для всесторонне революционного общества. #!"

 ideology_republican_leader:0 "республиканец"
 ideology_republican_leader_desc:0 "#lore Этот лидер стремится создать республику, управляемую выборными должностными лицами. #!"

 ideology_radical:0 "радикальный"
 ideology_radical_desc:0 "#lore Этот лидер стремится к радикальным либеральным реформам, продвигающим демократические идеалы. #!"

 ideology_abolitionist:0 "аболиционист"
 ideology_abolitionist_desc:0 "#lore Этот лидер считает рабство отвратительным нарушением прав человека и стремится уничтожить его во всем мире. #!"

 ideology_slaver:0 "раб"
 ideology_slaver_desc:0 "#lore Этот лидер рассматривает рабство как естественную часть своего образа жизни и выступает против его отмены. #!"

 ideology_feminist:0 "феминистка"
 ideology_feminist_desc:0 "#lore Этот лидер считает, что женщины равны мужчинам и стремится к расширению своих прав как граждан."
 
 ideology_reformer:0 "реформатор"
 ideology_reformer_desc:0 "#lore Этот лидер хочет внести несколько постепенных изменений, чтобы сделать общество немного более равным. Но не слишком много.#!"

 ideology_pacifist:0 "пацифист"
 ideology_pacifist_desc:0 "#lore Этот лидер верит в ненасилие как в свой метод и в мир как в свою цель."

 ideology_jingoist_leader:0 "Джингоист"
 ideology_jingoist_leader_desc:0 "#lore Этот лидер выступает за агрессивную внешнюю политику, подчеркивая готовность идти на войну для продвижения своих амбиций. #!"

 ideology_royalist:0 "роялист"
 ideology_royalist_desc:0 "#lore Лояльность этого лидера к монархии и ее законному правителю."
 
 ideology_social_democrat:0 "социал-демократ"
 ideology_social_democrat_desc:0 "#lore Этот лидер верит в достижение социалистического общества через парламентскую реформу. #!"

 ideology_communist:0 "коммунистический"
 ideology_communist_desc:0 "#lore Этот лидер верит в то, что рабочий класс захватит политическую власть любыми необходимыми средствами. #!"

 ideology_vanguardist:0 "авангардист"
 ideology_vanguardist_desc:0 "#lore Этот лидер верит в достижение социалистического общества через передовую партию преданных радикалов. #!"

 ideology_fascist:0 "фашистский"
 ideology_fascist_desc:0 "#lore Этот лидер является ультранационалистом, который поддерживает возрождение традиционных авторитарных ценностей в современном контексте. #!"

 ideology_anarchist:0 "анархист"
 ideology_anarchist_desc:0 "#lore Этот лидер стремится к упразднению иерархии, власти и государства, оставляя людей управлять собой. #!"

 ideology_ethno_nationalist:0 "Этно-националистический"
 ideology_ethno_nationalist_desc:0 "#lore Этот лидер верит в нацию, определенную по этническому признаку. #!"

 ideology_theocrat:0 "теократ"
 ideology_theocrat_desc:0 "#lore Этот лидер верит в государство, управляемое церковью в соответствии с доктринальными ценностями."

 ideology_market_liberal:0 "Либеральный рынок"
 ideology_market_liberal_desc:0 "#lore Этот лидер считает, что невидимая рука свободного рынка должна быть направляющей силой экономики страны."
 
 ideology_liberal_leader:0 "либеральный"
 ideology_liberal_leader_desc:0 "#lore Этот лидер ставит во главу угла институт демократии и выступает против бесспорного господства над нацией. #!"

  # Interest Group Ideologies

 ideology_paternalistic:0 "патерналистский"
 ideology_paternalistic_desc:0 "#lore Эта группа мало верит в то, что население пытается управлять собой, считая, что им нужно руководство традиционной аристократии."
  
 ideology_patriarchal:0 "патриархальный"
 ideology_patriarchal_desc:0 "#lore Эта группа считает, что мужчины должны иметь политическую власть и что женщины должны подчиняться своим отцам и мужьям."
   
 ideology_republican:0 "республиканец"
 ideology_republican_desc:0 "#lore Эта группа считает, что лучшие лидеры избираются общественным голосованием и поддерживают республиканскую форму правления."
  
 ideology_populist:0 "популист"
 ideology_populist_desc:0 "#lore Эта группа верит в управление людьми и стремится расширить франшизу на все социальные классы."
  
 ideology_stratocratic:0 "Стратократический"
 ideology_stratocratic_desc:0 "#lore Эта группа выступает за сохранение иерархии в обществе посредством традиционных форм налогообложения и трудовых отношений."
  
 ideology_oligarchic:0 "олигархический"
 ideology_oligarchic_desc:0 "#lore Эта группа выступает за монополизацию власти в руках светского государства, контролируемого местными олигархиями."

 ideology_laissez_faire:0 "Лайсес Фэйр"
 ideology_laissez_faire_desc:0 "#lore Эта группа верит в свободный поток торговли и рабочей силы, одобряя суждение рынков над правительствами."
  
 ideology_individualist:0 "индивидуалист"
 ideology_individualist_desc:0 "#lore Эта группа считает, что каждый человек несет ответственность за свою собственную судьбу и выступает против правительственных программ по предоставлению услуг, которые могут быть оплачены человеком."
  
 ideology_pious:0 "благочестивый"
 ideology_pious_desc:0 "#lore Эта группа считает, что религиозные принципы являются первостепенными моральными истинами и что они должны пронизывать все общество."
  
 ideology_particularist:0 "Специалист"
 ideology_particularist_desc:0 "#lore Эта группа хочет, чтобы местная автономия в их работе, свободная от феодальных положений наложенного рабства."
  
 ideology_isolationist:0 "Изоляционист"
 ideology_isolationist_desc:0 "#lore Эта группа хочет, чтобы государство сосредоточилось на внутренних вопросах, противодействуя амбициям по расширению на иностранные земли, а также иммиграции из них."
  
 ideology_moralist:0 "моралист"
 ideology_moralist_desc:1 "#lore Эта группа имеет сильную веру в религиозный моральный порядок и рассматривает разнообразие мнений как угрозу этому порядку."
  
 ideology_jingoist:0 "Джингоист"
 ideology_jingoist_desc:0 "#lore Эта группа верит в агрессивную внешнюю политику и поддерживает армию, чтобы поддержать ее."

 ideology_loyalist:0 "лоялист"
 ideology_loyalist_desc:0 "#lore Эта группа считает, что каждый гражданин должен платить свои взносы для финансирования жизненно важных функций государства."
 
 ideology_meritocratic:0 "меритократический"
 ideology_meritocratic_desc:0 "#lore Эта группа считает, что успех достигнут и что те, кто его достиг, заслуживают сопутствующей ответственности и богатства."
   
 ideology_patriotic:0 "патриотический"
 ideology_patriotic_desc:0 "#lore Эта группа яростно предана своей стране и хочет жестких мер против тех, кто будет распространять инакомыслие."
  
 ideology_liberal:0 "либеральный"
 ideology_liberal_desc:0 "#lore Эта группа рассматривает свободу и юридическое равенство как важные ценности, которые необходимо защищать."
  
 ideology_anti_clerical:0 "Антиклерикальный"
 ideology_anti_clerical_desc:1 "#lore Эта группа выступает против влияния организованной религии на политическую и образовательную систему. Они считают, что рациональные умы должны быть на переднем крае управления.#!"
  
 ideology_proletarian:0 "пролетарский"
 ideology_proletarian_desc:0 "#lore Эта группа рассматривает политику через призму классовой борьбы и встает на сторону рабочих в этом конфликте."
  
 ideology_egalitarian:0 "эгалитарный"
 ideology_egalitarian_desc:0 "#lore Эта группа считает, что равное и гуманное обращение с людьми должно быть краеугольным камнем политической политики."
   
 ideology_anti_slavery:0 "Антирабство"
 ideology_anti_slavery_desc:0 "#lore Эта группа ненавидит рабство и рассматривает его как особенность варварского прошлого."
 
 ideology_pro_slavery:0 "Прорабство"
 ideology_pro_slavery_desc:0 "#lore Эта группа рассматривает рабство как необходимую часть хорошо функционирующего общества."
  
 ideology_reactionary:0 "реакционный"
 ideology_reactionary_desc:0 "#lore Эта группа ностальгирует по прошлому, реальному или воображаемому, где только короли правили единым обществом."
 
 ideology_plutocratic:0 "плутократический"
 ideology_plutocratic_desc:0 "#lore Эта группа считает, что богатые доказали свою ценность в качестве лиц, принимающих решения, и формируют интеллектуальную элиту, хорошо подходящую для установления курса общества."

 ideology_agrarian:0 "Аграрный"
 ideology_agrarian_desc:0 "#lore Эта группа считает, что экономическая политика должна быть сосредоточена на сельском хозяйстве и интересах фермеров."

 ideology_corporatist: "капроратист"
 ideology_corporatist_desc: "#lore Эта группа верит в разрешение конфликта между классами посредством применения религиозных принципов."

 ideology_corporatist_leader: "капроратист"
 ideology_corporatist_leader_desc: "#lore Этот лидер верит в разрешение классовых конфликтов путем уступок со стороны высшего класса и сотрудничества между различными социальными группами."

 ideology_agrarian_jeffersonian:0 "Джефферсон"
 ideology_agrarian_jeffersonian_desc:0 "#lore Эта группа считает, что класс мелких фермеров формирует основу страны, поддерживая агаризм как основу свободного общества."

  # flavor ideologies

 ideology_republican_paternalistic:0 "элитарист"
 ideology_republican_paternalistic_desc:0 "#lore Эта группа выступает за правление земельной элиты, но все еще поддерживает республиканскую форму правления."

 ideology_scholar_paternalistic:0 "Стипендиат"
 ideology_scholar_paternalistic_desc:0 "#lore Эта группа предпочла бы видеть страну, управляемую монархом, которому советуют мудрые и образованные."

 ideology_junker_paternalistic:0 "Юнкер"
 ideology_junker_paternalistic_desc:0 "#lore Эта группа считает, что помещичье дворянство лучше всего подходит для того, чтобы привести страну к ее будущему."

 ideology_papal_paternalistic:1 "барон"
 ideology_papal_paternalistic_desc:0 "#lore Эта группа поддерживает авторитет Папы и традиционную иерархию Святого Престола."

 ideology_confucian:0 "конфуцианский"
 ideology_confucian_desc:0 "#lore Эта группа верит в учение Конфуция, поддерживая социальный порядок, который, по их мнению, коренится в законах Небес."

 ideology_bakufu:0 "Бакуфу"
 ideology_bakufu_desc:0 "#lore Эта группа поддерживает сёгунат и считает, что власть принадлежит классу воинов."
 
 ideology_shinto_moralist:0 "Синтоистская благочестие"
 ideology_shinto_moralist_desc:0 "#lore Эта группа верит в божественность Императора и связывает эту веру со старым поклонением богам и духам."

 ideology_caudillismo:0 "Каудильизмо"
 ideology_caudillismo_desc:0 "#lore Эта группа, как правило, поддерживает сильных лидеров с военным прошлым по конституционному верховенству закона.#!"

 ideology_heavenly_kingdom_theocratic:0 "Поклоняющийся Богу"
 ideology_heavenly_kingdom_theocratic_desc:0 "#lore Эта группа поддерживает идею, что все люди становятся сыновьями и дочерьми Бога, когда искуплены Христом, и выступает за теократическую форму правления."

 ideology_papal_moralist:0 "папский"
 ideology_papal_moralist_desc:0 "#lore Эта группа твердо привержена сохранению как временных, так и церковных полномочий Католической Церкви.#!"

 ideology_liberal_modern: "либеральный"
 ideology_liberal_modern_desc: "#lore Эта группа рассматривает свободу и юридическое равенство как важные ценности, которые необходимо защищать."

 ideology_egalitarian_modern: "эгалитарный"
 ideology_egalitarian_modern_desc: "#lore Эта группа считает, что равное и гуманное обращение с людьми должно быть краеугольным камнем политической политики."

 ideology_enclavist: "анклавист"
 ideology_enclavist_desc: "#lore Интересы этой группы заключаются в том, чтобы сохранить свое положение колониального правящего класса, уединиться от своих подданных и сохранить свою власть с помощью сложной и неподотчетной бюрократической системы."

 ideology_malthusian: "мальтузианский"
 ideology_malthusian_desc: "#lore Эта группа придерживается экономических теорий, установленных Томасом Мальтусом, полагая, что любые усилия по облегчению бедности должны быть саморазрушительными из-за последующего роста населения."

 liberal_and_egalitarian_amended_tt: "Позиции [GetIdeology('ideology_liberal').GetName] и [GetIdeology('ideology_egalitarian').GetName] [Concept('concept_ideology','$concept_ideologies$')] на $lawgroup_rights_of_women$ изменятся"

 # Movement Ideologies

 ideology_royalist_movement: "роялист"
 ideology_royalist_movement_desc: "#lore Эта группа предана монархии и ее законному правителю.#!"

 ideology_absolutist_movement: "абсолютист"
 ideology_absolutist_movement_desc: "#lore Эта группа лояльна к институту монархии и поддерживает наделение его абсолютной властью."

 ideology_anarchist_movement: "анархист"
 ideology_anarchist_movement_desc: "#lore Эта группа стремится к отмене иерархии, власти и государства, оставляя людей управлять собой. #!"

 ideology_communist_movement: "коммунистический"
 ideology_communist_movement_desc: "#lore Эта группа верит в то, что рабочий класс захватит политическую власть любыми необходимыми средствами. #!"

 ideology_vanguardist_movement: "авангардист"
 ideology_vanguardist_movement_desc: "#lore Эта группа верит в достижение социалистического общества через передовую партию преданных радикалов. #!"

 ideology_radical_movement: "радикальный"
 ideology_radical_movement_desc:1 "#lore Эта группа стремится к радикальным либеральным реформам, продвигающим демократические идеалы. #!"

 ideology_liberal_movement: "либеральный"
 ideology_liberal_movement_desc: "#lore Эта группа ценит институт демократии и поддерживает обеспечение основных свобод для граждан. #!"

 ideology_pluralist_movement_1: "плюралист"
 ideology_pluralist_movement_1_desc: "#lore Эта группа желает сохранить свои культурные традиции, самобытность и язык. #!"

 ideology_pluralist_movement_2: "$ideology_pluralist_movement_1$"
 ideology_pluralist_movement_2_desc: "$ideology_pluralist_movement_1_desc$"

 ideology_pluralist_movement_3: "$ideology_pluralist_movement_1$"
 ideology_pluralist_movement_3_desc: "$ideology_pluralist_movement_1_desc$"

 ideology_pluralist_movement_4: "$ideology_pluralist_movement_1$"
 ideology_pluralist_movement_4_desc: "$ideology_pluralist_movement_1_desc$"

  # Government Principles group
 lawgroup_governance_principles:0 "Принципы управления"
 lawgroup_governance_principles_desc:0 "Основополагающие принципы и полномочия, которыми управляется ваша страна. Определяет, кто является главой государства."
  
 law_chiefdom:0 "Вождь"
 law_chiefdom_desc:0 "Иерархическая доиндустриальная политическая система, основанная на родстве с военачальником или старейшиной известной семьи во главе. Она неспособна к эффективному централизованному контролю над целыми государствами."
 law_monarchy:0 "монархия"
 law_monarchy_desc:0 "Форма правления, в которой аристократическая династия представляет национальную идентичность страны и передает исполнительные полномочия королевскому главе династии."
 law_presidential_republic:0 "Президентская республика"
 law_presidential_republic_desc:0 "Политическая система, в которой власть принадлежит народу и его избранным представителям. В качестве главы государства республики избираются или назначаются $RULER_TITLE_PRESIDENT$."
 law_parliamentary_republic:0 "Парламентская республика"
 law_parliamentary_republic_desc:0 "Политическая система, в которой власть принадлежит народу и его избранным представителям. Лидер законодательного органа выступает в качестве главы государства и называется $RULER_TITLE_CHANCELLOR$."
 law_theocracy:0 "теократия"
 law_theocracy_desc:0 "Правительство управляется духовенством и их толкованием священного писания. Глава государства номинально является человеком поклонения, хотя на практике мирским представителем, выбранным по заслугам, статусу или рождению."
 law_council_republic:0 "Совет Республики"
 law_council_republic_desc:0 "Политическая система, при которой рабочие избирают делегатов в местные советы. Расширяет концепции организации рабочего места до общего управления."
 law_corporate_state:0 "Корпоративное государство"
 law_corporate_state_desc:0 "Политическая система, основанная на институциональном сотрудничестве между официально признанными корпоративными группами. Государство служит форумом для переговоров между различными социальными классами."
 law_corporate_state_1:0 "Корпоративное государство"
 law_corporate_state_1_desc:0 "Политическая система, основанная на институциональном сотрудничестве между официально признанными корпоративными группами. Государство служит форумом для переговоров между различными социальными классами."
  # Free speech group
 lawgroup_free_speech:0 "Свобода слова"
 lawgroup_free_speech_desc:0 "Законы, регулирующие свободу слова и право на публичные собрания."
  
 law_outlawed_dissent:0 "Запрещенное несогласие"
 law_outlawed_dissent_desc:0 "Критика правительства считается изменой и незаконной."
 law_censorship:0 "Цензура"
 law_censorship_desc:0 "Существует активная цензура прессы и нет гарантированного права собраний."
 law_right_of_assembly:0 "Право Ассамблеи"
 law_right_of_assembly_desc:0 "Граждане пользуются правом на публичное собрание."
 law_protected_speech:0 "Защищенная речь"
 law_protected_speech_desc:0 "Защита свободы слова закреплена в законе."
  
  # Army Model group
 lawgroup_army_model:0 "Армейская модель"
 lawgroup_army_model_desc:0 "Как устроена и регулируется ваша армия."
  
 law_peasant_levies:0 "Крестьянские листья"
 law_peasant_levies_desc:0 "Основная сила армии исходит от призывной пехоты с нулевой до базовой подготовки."
 law_national_militia:0 "Национальная милиция"
 law_national_militia_desc:0 "Постоянная армия небольшая, но местные ополченцы могут быть активированы для защиты своих домов."
 law_mass_conscription:0 "Массовый призыв"
 law_mass_conscription_desc:0 "Большое количество призывников пехоты может быть задействовано по мере необходимости, чтобы дополнить профессиональную армию."
 law_professional_army:0 "Профессиональная армия"
 law_professional_army_desc:0 "Армия состоит из хорошо подготовленных, профессиональных завсегдатаев."
  
  # Distribution of Power group
 lawgroup_distribution_of_power:0 "Распределение власти"
 lawgroup_distribution_of_power_desc:0 "Как распределяется политическая власть. Определяет, кому подотчетен глава государства."
  
 law_autocracy:0 "автократия"
 law_autocracy_desc:0 "Власть главы государства абсолютна, и они не несут ответственности ни перед какой земной властью."
 law_oligarchy:0 "олигархия"
 law_oligarchy_desc:1 "Глава государства делит власть и ответственность с небольшой группой влиятельных, неизбранных лиц."
 law_landed_voting:0 "Наземное голосование"
 law_landed_voting_desc:0 "Те, кто владеет землей или капиталом, получают право голоса."
 law_wealth_voting:0 "Голосование за богатство"
 law_wealth_voting_desc:1 "Богатым гражданам предоставляется право голоса. Люди с большим богатством получают больше голосов."
 law_census_voting:0 "Избирательное право"
 law_census_voting_desc:0 "Грамотным людям особого статуса предоставляется право голоса."
 law_universal_suffrage:0 "Всеобщее избирательное право"
 law_universal_suffrage_desc:0 "Каждый взрослый мужчина имеет равное право голоса."
 law_elder_council:0 "Совет старейшин"
 law_elder_council_desc:0 "Самые почитаемые люди имеют право голоса в управлении страной."
 law_anarchy:0 "анархия"
 law_anarchy_desc:1 "Местные общины управляют своими собственными делами и направляют представителей на ограниченные сроки в более крупные кооперативные советы. При отсутствии формальной иерархии центральную власть трудно осуществлять."
 law_single_party_state: "Однопартийное государство"
 law_single_party_state_desc: "Государство управляется единственной легальной политической партией, которая обладает монополией на всю политическую деятельность в стране."
 ruler_in_party_tt: "[concept_ruler] этой нации является членом [concept_interest_group], который имеет активный политический [concept_party]"
 sps_no_party_tt: "В этой стране нет активного [Concept('concept_party', 'Political Parties')]"
 sps_government_reshuffle_tt: "[concept_government] Состав будет обновляться вместе с членами единого юридического [concept_party]"
  
  # Voting System group
 law_first_past_the_post:0 "Первое прошлое The Post"
 law_first_past_the_post_desc:0 "Эта система, также известная как Winner Takes All, выбирает единственного кандидата, который выигрывает наибольшее количество мест на региональных подвыборах. Она имеет тенденцию создавать однопартийные правительства с сильными мандатами, но уязвима для манипуляций."
 law_proportional_representation:0 "Пропорциональное представительство"
 law_proportional_representation_desc:0 "Эта система распределяет места в парламенте пропорционально количеству поданных голосов. Она имеет тенденцию создавать многопартийные коалиционные правительства, где компромисс является ключом к достижению чего-либо."
  
  # Workplace Safety group
 lawgroup_labor_rights:0 "Трудовые права"
 lawgroup_labor_rights_desc:0 "Права трудящихся."
  
 law_serfdom:0 "крепостное право"
 law_serfdom_desc:0 "Крестьяне привязаны к своей земле и должны выполнять труд своих феодальных хозяев."
 law_no_workers_rights:0 "Нет прав трудящихся"
 law_no_workers_rights_desc:0 "Работники не имеют особых трудовых прав, гарантированных государством."
 law_regulatory_bodies:0 "Органы регулирования"
 law_regulatory_bodies_desc:0 "Созданы государственные институты, регулирующие эксцессы работодателей."
 law_worker_protections:0 "Защита трудящихся"
 law_worker_protections_desc:0 "Работники пользуются широкой защитой, закрепленной в законе."
  
  # Children's Rights group
 lawgroup_childrens_rights:0 "Права детей"
 lawgroup_childrens_rights_desc:0 "Права и защита, предоставляемые детям."
  
 law_child_labor_allowed:0 "Детский труд разрешен"
 law_child_labor_allowed_desc:0 "Законодательные ограничения не распространяются на то, где могут работать дети."
 law_restricted_child_labor:0 "Ограниченный детский труд"
 law_restricted_child_labor_desc:0 "Ребёнок на заводе не допускается."
 law_compulsory_primary_school:0 "Обязательная начальная школа"
 law_compulsory_primary_school_desc:0 "Все дети должны посещать несколько лет начальной школы, в течение которых им запрещено работать."
  
  # Slavery group
 lawgroup_slavery:0 "Рабство"
 lawgroup_slavery_desc:0 "Люди как собственность."
  
 law_slavery_banned:0 "Рабство запрещено"
 law_slavery_banned_desc:0 "Ни один человек не может принадлежать другому."
 law_debt_slavery:0 "Долговое рабство"
 law_debt_slavery_desc:0 "Те, кто не может расплатиться с долгами, вместо этого лишаются своего лица в качестве имущества кредитора."
 law_slave_trade:0 "работорговля"
 law_slave_trade_desc:0 "Спрос на дешевую рабочую силу осуществляется посредством дегуманизирующей торговли иностранными организациями."
 law_legacy_slavery:0 "Наследие рабства"
 law_legacy_slavery_desc:0 "В качестве компромисса между аболиционистами и рабовладельцами институт рабства может продолжаться до тех пор, пока он не расширится."
  
  # Church and State group
 lawgroup_church_and_state:0 "Церковь и государство"
 lawgroup_church_and_state_desc:0 "Отношения между физическими и духовными правителями."
  
 law_state_religion:0 "Государственная религия"
 law_state_religion_desc:0 "Церковь является официальным органом государства. Все религии меньшинств подвергаются дискриминации."
 law_freedom_of_conscience:0 "Свобода совести"
 law_freedom_of_conscience_desc:0 "У государства есть официальная государственная религия, но люди могут выбирать, во что верить. Только особо экзотические религии подвергаются дискриминации."
 law_total_separation:0 "Полное разделение"
 law_total_separation_desc:0 "Никакая церковь или вера не могут вмешиваться в работу правительства. Никакая религия не может быть дискриминирована."
 law_atheist_state:0 "Атеистическое государство"
 law_atheist_state_desc:0 "Проповедь религиозной веры запрещена, а практика не одобряется. Все религии подвергаются дискриминации."
  
   # Citizenship group
 lawgroup_citizenship:0 "Гражданство"
 lawgroup_citizenship_desc:0 "Расширение прав гражданства."
  
 law_ethnostate:0 "Этногосударство"
 law_ethnostate_desc:1 "Государство считает себя неразрывно связанным с определенной этнической принадлежностью, с другими этносами, лишенными гражданства. Все иностранные культуры подвергаются дискриминации."
 law_national_supremacy:0 "Национальное превосходство"
 law_national_supremacy_desc:1 "Государство определяет своих граждан путем соблюдения определенной национальной идентичности, которая считается верховной над всеми другими. Иностранные культуры подвергаются дискриминации, если они не разделяют как наследие, так и язык (или другие обычаи)."
 law_racial_segregation:0 "Расовая сегрегация"
 law_racial_segregation_desc:1 "Государство считает, что гражданские права связаны с понятием общего расового наследия. Зарубежные культуры различного наследия подвергаются дискриминации."
 law_cultural_exclusion:0 "Культурное исключение"
 law_cultural_exclusion_desc:1 "Государство предлагает гражданские права людям всех культурных идентичностей, считая определенную официальную идентичность первостепенной. Иностранные культуры, не имеющие ничего общего с основными культурами, подвергаются дискриминации."
 law_multicultural:0 "Мультикультурализм"
 law_multicultural_desc:1 "Государство поддерживает равные гражданские права для людей всех культурных идентичностей и не предпринимает никаких попыток официально поддерживать определенную культуру над другими. Ни одна культура не подвергается дискриминации."
 law_subjecthood: "Субъектность"
 law_subjecthood_desc: "Государство определяет свой народ прежде всего как субъект суверена, прилагая мало усилий для поощрения любой официальной национальности. Культуры в значительной степени оставлены на произвол судьбы в пределах их собственных сообществ."

  # Caste Hegemony, a Social Stratification law group
 lawgroup_caste_hegemony: "Кастовая гегемония"
 lawgroup_caste_hegemony_desc: "Уничтожение прав членов общества на основе Британской индийской кастовой системы."
 law_hindu_caste_enforced: "Кастовая система в действии"
 law_hindu_caste_enforced_desc: "Кастовая иерархия обеспечивается законом и препятствует повышению социально-экономической мобильности."
 law_hindu_caste_codified: "Кодифицированная кастовая система"
 law_hindu_caste_codified_desc: "Кастовая иерархия признается и используется для ограничения социально-экономической мобильности."
 law_hindu_caste_not_enforced: "Каста не принуждается"
 law_hindu_caste_not_enforced_desc: "Социально-экономическая мобильность на основе касты юридически не ограничена, но дискриминация все еще может сохраняться."
 law_affirmative_action: "Позитивные действия"
 law_affirmative_action_desc: "Активные меры по созданию справедливой социально-экономической ситуации с уделением приоритетного внимания ранее маргинализированным группам."
  
  # Economic System group
 lawgroup_economic_system:0 "Экономическая система"
 lawgroup_economic_system_desc:0 "Основные принципы вашей экономики."

 law_traditionalism:0 "Традиционализм"
 law_traditionalism_desc:0 "Доиндустриальная натуральная экономика с небольшим центральным контролем."
 law_agrarianism:0 "Аграризм"
 law_agrarianism_desc:0 "Сельская экономика с акцентом на развитие сельского хозяйства и общин."
 law_cooperative_ownership:0 "Кооперативная собственность"
 law_cooperative_ownership_desc:0 "Экономическая система, основанная на концепции социальной собственности, где избыточное производство распределяется более равномерно среди рабочих."
 law_command_economy:0 "Командная экономика"
 law_command_economy_desc:0 "Внутренняя интервенционистская экономика, где правительство непосредственно управляет большинством аспектов производства."
 law_laissez_faire:0 "Лайсес Фэйр"
 law_laissez_faire_desc:0 "Либеральная экономика, основанная на принципах сравнительных преимуществ, и что меньшее количество государственных вмешательств означает больший рост."
 law_interventionism:0 "интервенционизм"
 law_interventionism_desc:0 "Чтобы обеспечить стабильность нашей страны, правительство должно обуздать худшие излишества частного бизнеса."

 # Trade Policy group
 lawgroup_trade_policy:0 "Торговая политика"
 lawgroup_trade_policy_desc:0 "Законы, регулирующие торговлю и обмен товарами через границы."
 
 law_free_trade:0 "Свободная торговля"
 law_free_trade_desc:1 "Нельзя препятствовать свободному обмену товарами, поскольку торговля выгодна всем."
 law_protectionism:0 "Протекционизм"
 law_protectionism_desc:0 "Наши отрасли промышленности должны быть защищены от грабежей со стороны иностранных участников рынка."
 law_isolationism:0 "Изоляционизм"
 law_isolationism_desc:0 "Экономика, ориентированная на удовлетворение потребностей страны внутри страны, избегая при этом дел других."
 law_mercantilism:0 "ориентированный на экспорт"
 law_mercantilism_desc:0 "Экономика, ориентированная на экспорт, с акцентом на сохранение положительного текущего счета и конкуренцию с другими странами."

  # Taxation Group
 lawgroup_taxation:0 "Налогообложение"
 lawgroup_taxation_desc:0 "Как государство увеличивает доходы, облагая налогами своих граждан."
 law_consumption_based_taxation:0 "Налогообложение на основе потребления"
 law_consumption_based_taxation_desc:0 "Налоговая система, в которой нет прямых доходов или налогов на душу населения, а вместо этого доходы увеличиваются за счет налогообложения потребления товаров."
 law_land_based_taxation:0 "Налог на землю"
 law_land_based_taxation_desc:0 "Традиционная форма земельного налогообложения, собираемая в основном из крестьянства."
 law_per_capita_based_taxation:0 "Регрессивное налогообложение"
 law_per_capita_based_taxation_desc:0 "Налоговая система, которая непропорционально облагает налогом бедных через комбинацию налогов на доход и на душу населения."
 law_proportional_taxation:0 "Пропорциональные налоги"
 law_proportional_taxation_desc:0 "Налоговая система, в основном основанная на доходах, которая пытается гарантировать, что каждый платит примерно равную долю своего дохода государству."
 law_graduated_taxation:0 "Прогрессивное налогообложение"
 law_graduated_taxation_desc:0 "Налоговая система, которая направлена на то, чтобы возложить бремя налогообложения в первую очередь на обеспеченных через высокие налоги на дивиденды."
  
  # Education System group
 lawgroup_education_system:0 "Система образования"
 lawgroup_education_system_desc:0 "Ведь когда дети заканчивают с трубочистными делами."
  
 law_no_schools:0 "Никаких школ"
 law_no_schools_desc:0 "Образование – это ответственность родителей. Только самые неторопливые граждане учатся читать и писать."
 law_religious_schools:0 "Религиозные школы"
 law_religious_schools_desc:0 "Позволение церкви заботиться о государственном образовании обеспечивает лояльное и морально здоровое население."
 law_private_schools:0 "Частные школы"
 law_private_schools_desc:0 "Образование лучше оставить частным интересам, которые могут обеспечить свободу выбора в образовании."
 law_public_schools:0 "Государственные школы"
 law_public_schools_desc:0 "Образование является обязанностью государства и должно быть стандартизировано и одинаково доступно для всех."
  
  # Health System group
 lawgroup_health_system:0 "Система здравоохранения"
 lawgroup_health_system_desc:1 "Законы об участии (или отсутствии) государства в оказании медицинской помощи гражданам."
  
 law_no_health_system:0 "Нет системы здравоохранения"
 law_no_health_system_desc:1 "Правительство не финансирует какую-либо систему здравоохранения."
 law_charitable_health_system:0 "Благотворительные больницы"
 law_charitable_health_system_desc:0 "Благотворительные организации, часто религиозные, оказывают некоторую помощь всем, кто болен или умирает."
 law_private_health_insurance:0 "Частное медицинское страхование"
 law_private_health_insurance_desc:0 "Здравоохранение населения управляется через систему частных больниц, оплачиваемых через частные программы медицинского страхования, обеспечивая благополучие тех, кто может себе это позволить с минимальным воздействием на государственную казну."
 law_public_health_insurance:0 "Государственное медицинское страхование"
 law_public_health_insurance_desc:0 "Правительство предоставляет финансируемую государством программу медицинского страхования, обеспечивающую равный доступ к медицинской помощи для всех."
 
  # Welfare group
 lawgroup_welfare:0 "благосостояние"
 lawgroup_welfare_desc:0 "Государственная помощь для лишенных доходов."
  
 law_no_social_security:0 "Нет социального обеспечения"
 law_no_social_security_desc:0 "Роль государства не в том, чтобы обеспечивать тех, кто не может обеспечить себя сам."
 law_poor_laws:0 "Плохие законы"
 law_poor_laws_desc:0 "Убрать бродяг и бродяг с наших улиц и в рабочие дома стоит того."
 law_wage_subsidies:1 "Субсидирование заработной платы"
 law_wage_subsidies_desc:1 "Все, кто хочет работать, имеют право на питание. Ни у кого не должно быть средств для обеспечения своей семьи."
 law_old_age_pension:0 "Пенсия по старости"
 law_old_age_pension_desc:0 "Существует практический предел тому возрасту, когда наша рабочая сила перестает быть эффективной, и их последующее благосостояние должно подпадать под сферу компетенции правительства."
 law_disability_insurance:0 "Страхование инвалидности"
 law_disability_insurance_desc:0 "Государство обязано заботиться о тех, кто не по своей вине не может работать."
  
  # Rights of Women group
 lawgroup_rights_of_women:0 "Права женщин"
 lawgroup_rights_of_women_desc:0 "Правовые нормы более справедливого пола."
  
 law_no_womens_rights:0 "Юридическое опекунство"
 law_no_womens_rights_desc:0 "Женщины по закону находятся под опекой мужчин и имеют очень мало прав."
 law_women_own_property:0 "Имущие женщины"
 law_women_own_property_desc:0 "Наследуемые или заработанные иным образом, даже женщины имеют право и обязанность владеть и дорожить своим имуществом."
 law_women_in_the_workplace:0 "Женщины на рабочем месте"
 law_women_in_the_workplace_desc:0 "Как мы сможем удержать печи прогресса в огне только с половиной потенциальной рабочей силы?"
 law_womens_suffrage:0 "Женское избирательное право"
 law_womens_suffrage_desc:0 "При налаживании нового порядка вещей мы, женщины, требуем равного голоса; меньшего мы не допустим."
  
  # Policing
 lawgroup_policing:0 "Политика"
 lawgroup_policing_desc:0 "Приоритеты национальной полиции."

 law_no_police:0 "Нет полиции"
 law_no_police_desc:0 "В этой стране не существует какой-либо структурированной полиции."
 law_local_police:0 "Местная полиция"
 law_local_police_desc:0 "В этой стране действуют местные полицейские силы."
 law_dedicated_police:0 "Посвященная полиция"
 law_dedicated_police_desc:0 "В этой стране есть специальные полицейские силы со стандартизированной подготовкой."
 law_militarized_police:0 "Милитаризованная полиция"
 law_militarized_police_desc:0 "Давая вашей полиции военную технику и военную подготовку, их эффективность при выполнении вашей воли возрастает."
  
  # Bureaucracy
 lawgroup_bureaucracy:0 "Бюрократия"
 lawgroup_bureaucracy_desc:0 "Как управляется ваша страна."

 law_hereditary_bureaucrats:0 "Наследственные бюрократы"
 law_hereditary_bureaucrats_desc:0 "Бюрократы занимают свою должность через традиционное наследование, передавая обязанности своим детям."
 law_appointed_bureaucrats:0 "Назначенные бюрократы"
 law_appointed_bureaucrats_desc:0 "Бюрократы назначаются правителями, чтобы служить интересам страны в обмен на высокую заработную плату."
 law_meritocratic_bureaucracy:0 "Меритократическая бюрократия"
 law_meritocratic_bureaucracy_desc:0 "Бюрократы борются за власть через заслуги. Со временем это создает огромные византийские администрации."
 law_elected_bureaucrats:0 "Избранные бюрократы"
 law_elected_bureaucrats_desc:0 "Местные губернаторы избираются своими избирателями, децентрализуя власть и облегчая управление гражданами."
  
  # Colonization
 lawgroup_colonization:0 "Колонизация"
 lawgroup_colonization_desc:0 "Ваша позиция по созданию колоний для вытеснения и завоевания [concept_decentralized_nation]"
  
 law_no_colonial_affairs:0 "Никаких колониальных дел"
 law_no_colonial_affairs_desc:0 "Страна не занимается никакой формальной колонизацией и не может создавать колонии."
 law_colonial_resettlement:0 "Колониальное переселение"
 law_colonial_resettlement_desc:0 "Колонии создаются для предоставления земли поселенцам из объединенных штатов страны."
 law_colonial_exploitation:0 "Колониальная эксплуатация"
 law_colonial_exploitation_desc:0 "Колонии создаются для того, чтобы эксплуатировать местность за ее природные ресурсы и дешевую рабочую силу."
  
  # Internal Security
 lawgroup_internal_security:0 "Внутренняя безопасность"
 lawgroup_internal_security_desc:0 "Сохраняйте свои дела в порядке."
  
 law_no_home_affairs:0 "Никаких домашних дел"
 law_no_home_affairs_desc:0 "Государство не предпринимает особых попыток остановить беспорядки и восстания."
 law_national_guard:0 "Национальная гвардия"
 law_national_guard_desc:0 "Государство может использовать военную силу для подавления внутренних беспорядков."
 law_secret_police:0 "Секретная полиция"
 law_secret_police_desc:0 "Секретная полиция внимательно следит за радикальными элементами и несогласными."
 law_guaranteed_liberties:0 "Гарантированные свободы"
 law_guaranteed_liberties_desc:1 "Бюро внутренних дел штата сосредоточено исключительно на решении жалоб граждан и ему запрещено расследовать или арестовывать их без уважительной причины."
  
  # Migration
 lawgroup_migration:0 "миграция"
 lawgroup_migration_desc:0 "Контролировать поток людей."
  
 law_no_migration_controls:0 "Миграционный контроль отсутствует"
 law_no_migration_controls_desc:0 "Страна не пытается контролировать передвижение через свои границы."
 law_migration_controls:0 "Миграционный контроль"
 law_migration_controls_desc:0 "Только люди культур и религий, не подвергающиеся дискриминации, могут мигрировать в страну или из нее."
 law_closed_borders:0 "Закрытые границы"
 law_closed_borders_desc:0 "Миграция в страну или из нее не допускается."

 liberate_slaves_tt:0 "Все [GetPopType('slaves').GetName] будут освобождены."
 enslave_discriminated_farm_workers_tt:0 "Все $laborers$ с низким [concept_acceptance] работающие на фермах, ранчо и плантациях в бывших рабовладельческих штатах будут [Concept('concept_slavery', '$concept_enslaved$')]."
 
 enact_law_radical_leftist_government_warning_desc:0 "@warning! Введение этого [concept_law] может привести к тому, что [Concept('concept_country', '$concept_countries$')] без аналогичной формы $lawgroup_governance_principles$ станет агрессивным по отношению к нам."
 enact_law_radical_leftist_economy_warning_desc:0 "@warning! Введение этого [concept_law] может привести к тому, что [Concept('concept_country', '$concept_countries$')] без аналогичной формы $lawgroup_economic_system$ станет агрессивным по отношению к нам."

 # Labour Associations
 lawgroup_labour_associations: "Трудовые ассоциации"
 lawgroup_labour_associations_desc: "Положение о рабочих и ремесленных ассоциациях."

 law_guild_system: "Гильдийская система"
 law_guild_system_desc: "Система, в которой право на трудоустройство в определенных областях зависит от членства в формализованной ремесленной или торговой гильдии."
 law_combination_acts: "Комбинированные акты"
 law_combination_acts_desc: "Формирование трудовых объединений любого рода запрещено законом."
 law_anti_strike_laws: "Законы против забастовок"
 law_anti_strike_laws_desc: "Допускается создание трудовых объединений, запрещены забастовки и отдельные формы коллективных переговоров."
 law_right_to_associate: "Право ассоциироваться"
 law_right_to_associate_desc: "Особых ограничений на формирование и деятельность трудовых объединений не установлено."
 law_corporatized_unions: "Корпоративные союзы"
 law_corporatized_unions_desc: "Трудовые объединения находятся под контролем государства либо путем обязательного объединения в единый национальный союз, либо путем включения существующих объединений в государственные функции."


# Luddites
 law_industry_banned: "Промышленность запрещена"
 law_industry_banned_desc: "Экономический взгляд, который отвергает тяжелую промышленность и автоматизацию, предпочитая плоды честного труда бездушным машинам."
 industry_banned_tt: "Больше не будет возможности построить #bold Тяжелая промышленность #! здания"
 industry_banned_destroy_tt: "@warning! Все #bold Тяжелая промышленность #! Здания в этой стране будут демонтированы"
 ideology_luddite: "луддит"
 ideology_luddite_desc: "Луддиты выступают против промышленной автоматизации, а в более крайних случаях против самой промышленности."

  
 law_extraction_economy: "Экономика экстракции"
 law_extraction_economy_desc: "Колониальная экономическая система, которая фокусируется на максимальном извлечении капитала на благо метрополии."

# Land Reform Laws
 lawgroup_land_reform: "Земельная реформа"
 lawgroup_land_reform_desc: "Законы, регулирующие сельскохозяйственные угодья и людей, которые на них работают."
 law_tenant_farmers: "Фермеры-арендаторы"
 law_tenant_farmers_desc: "Сельскохозяйственные земли принадлежат наследственным элитам. Рабочие не привязаны к земле и могут искать альтернативную работу."
 law_homesteading: "Усадьба"
 law_homesteading_desc: "Фермеры претендуют на участки земли, на которых они работают вместе со своими наемными рабочими."
 law_commercialized_agriculture: "Коммерциальное сельское хозяйство"
 law_commercialized_agriculture_desc: "Сельское хозяйство - это бизнес, как и любой другой, подчиняющийся рыночным силам и принадлежащий капиталу."
 law_collectivized_agriculture: "Коллективизированное сельское хозяйство"
 law_collectivized_agriculture_desc:1 "Сельскохозяйственные угодья организованы в участки, обрабатываемые группами фермеров как совместное предприятие."

 pm_homesteading: "Усадьба"
 pm_homesteading_building_subsistence: "Усадьба"
 pm_privately_owned_plantation: "принадлежащий частным"
 pm_publicly_traded_plantation: "публично торгуется"
 pm_government_run_plantation: "Правительственный бег"

 # Jacksonian Democrat
 ideology_jacksonian_democrat: "Джексоновский демократ"
 ideology_jacksonian_democrat_desc: "Этот характер выступает за более широкое участие общественности в правительстве — для определенного определения «общественности»."

