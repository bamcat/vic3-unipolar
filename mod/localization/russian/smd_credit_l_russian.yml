l_russian:

 # ==========================================
 # THE DOLLAR 
 # ==========================================

 je_the_dollar:0 "Доллар"
 je_the_dollar_reason:0 "Доллар США является мировой резервной валютой. [ROOT.GetCountry.GetName] экспортирует больше кредитов, чем любая другая страна, и при этом занимает позицию чрезвычайной финансовой власти.\n\n Когда финансовые районы других стран нуждаются в кредитах для поддержания своих операций, они обращаются к банкам для их обеспечения. Пока доллар течет, капиталисты этих стран могут строить, инвестировать и получать прибыль. Если [ROOT.GetCountry.GetName] решит ограничить этот поток — посредством санкций, эмбарго или преднамеренного сокращения — последствия для иностранных финансовых рынков будут немедленными и серьезными.\n\n@information! Экспорт кредитов – это не просто торговля. Это осуществление валютного суверенитета над странами, которые стали зависеть от финансовой инфраструктуры. Их финансовые районы нуждаются в кредитах. Если цена кредита поднимается выше цены ценных бумаг, их инвесторы начинают терять деньги. Если кредиты перестанут поступать в полном объеме, их банки должны будут бороться за производство достаточного количества товаров внутри страны — процесс, который может занять некоторое время."

 je_dollar_status_hegemonic_tt:0 "#bold Доллар является гегемоном.#! [ROOT.GetCountry.GetName] экспортирует более чем #v 20 000#! единиц кредита. Иностранные финансовые рынки глубоко интегрированы с банковской инфраструктурой. Сила, которую это дает, существенна."
 je_dollar_status_stronger_tt:0 "#bold Доллар является мощным.#! [ROOT.GetCountry.GetName] экспортирует более чем #v 10 000#! единиц кредита. Иностранные финансовые рынки глубоко интегрированы с банковской инфраструктурой. Сила, которую это дает, существенна."
 je_dollar_status_strong_tt:0 "#bold Доллар является влиятельным.#! [ROOT.GetCountry.GetName] экспортирует более #v 5000#! единиц кредита. Иностранные финансовые рынки глубоко интегрированы с банковской инфраструктурой. Сила, которую это дает, существенна."
 je_dollar_status_moderate_tt:0 "#bold Доллар хорошо зарекомендовал себя.#! [ROOT.GetCountry.GetName] экспортирует более #v 2500#! единиц кредита. Иностранная зависимость от кредита [ROOT.GetCountry.GetAdjective] реальна и растет."
 je_dollar_status_marginal_tt:0 "#bold Доллар формируется.#! [ROOT.GetCountry.GetName] экспортирует кредиты на международном уровне. Роль доллара как резервной валюты находится на ранней стадии, но фундамент закладывается."

 # ==========================================
 # THE RESERVE CURRENCY
 # ==========================================

 je_reserve_currency:0 "Резервная валюта"
 je_reserve_currency_reason:0 "[ROOT.GetCountry.GetName] экспортные кредиты на международном уровне, что делает банковский сектор [ROOT.GetCountry.GetAdjective] значительным игроком в глобальной финансовой системе.\n\n Когда финансовые районы других стран нуждаются в кредите для поддержания своей деятельности, они берут из банков [ROOT.GetCountry.GetAdjective]. Это создает форму структурного рычага: страны, которые импортируют кредит из [ROOT.GetCountry.GetName], становятся в определенной степени зависимыми от продолжающегося потока этого кредита для здоровья своих финансовых секторов.\n\n@information! Финансовые районы стран-импортеров нуждаются в кредитах для эффективной работы. Когда цена кредита поднимается выше цены ценных бумаг, их инвесторы теряют деньги на строительство и разработку. Внезапное сокращение объема кредитов — в результате санкций или эмбарго — вынудит эти страны производить кредиты внутри страны, что приведет к замедлению и удорожанию процесса."

 je_reserve_status_strong_tt:0 "#bold [ROOT.GetCountry.GetAdjective] кредит широко торгуется.#! Экспорт превышает #v 5000#! единиц. Иностранные финансовые рынки развили значительную зависимость от банковского предложения [ROOT.GetCountry.GetAdjective]."
 je_reserve_status_moderate_tt:0 "#bold [ROOT.GetCountry.GetAdjective] кредит является международным активом.#! Экспорт превышает #v 2500#! единиц. Значительная часть иностранной финансовой деятельности зависит от предложения [ROOT.GetCountry.GetAdjective]."
 je_reserve_status_marginal_tt:0 "#bold [ROOT.GetCountry.GetAdjective] кредит выходит на международные рынки.#! Экспорт превышает #v 1000#! единиц. Роль скромная, но растет."

 # ==========================================
 # THE FINANCIAL SYSTEM — je_financial_system
 # ==========================================

 je_financial_system:0 "Финансовая система"
 je_financial_system_reason:0 "Эта запись в журнале является совершенно необязательной — вам не нужно взаимодействовать с системой кредитов и ценных бумаг, чтобы играть в игру. Это ссылка для тех, кто хочет понять это.\n\n#bold Как работает система #!\n\n Коммерческие банки производят #bold кредит #!. Финансовые округа покупают кредиты и, по методу публично торгуемого производства, продают ценные бумаги #bold #!. Ценные бумаги дают инвесторам дополнительную прибыль при реинвестировании в новое строительство, но только тогда, когда цена ценных бумаг выше, чем цена кредита. Это означает, что существует естественное равновесие, к которому стремится рынок: \n\n• Когда #bold кредит дешевый #! по отношению к ценным бумагам, прибыль финансовых районов и инвесторы строят более агрессивно. Строительство ускоряется по всей экономике.\n\n• Когда #bold ценные бумаги дешевы#! относительно кредита, финансовые районы теряют деньги, покупая кредит, который они не могут выгодно конвертировать. Банки считают свой продукт менее ценным. Строительство замедляется.\n\n@information! Поэтому ценовая зависимость между кредитом и ценными бумагами является ключевым сигналом для наблюдения. Здоровый спред - ценные бумаги выше кредита - означает, что ваш финансовый сектор функционирует так, как задумано, и ваши капиталисты получают доход от инвестиций в строительство.\n\n@warning! Если кредит выше ценных бумаг, ваши финансовые районы работают с убытком на каждую единицу, которую они обрабатывают. Банки становятся прибыльными, но инвесторы замедляют свою деятельность, и ваша экономика растет менее динамично.\n\n#bold Центральный банк#!\n\n Вы можете использовать учреждение #bold Центральный банк #!, чтобы непосредственно влиять на производство ценных бумаг. Инвестирование в ЦБ увеличивает предложение ценных бумаг на вашем рынке, что снижает их цену по отношению к кредиту. Это будет #bold подрывать ваши коммерческие банки #!, которые считают, что их кредит менее выгоден для производства, но это будет #bold расширять промышленные инвестиции #!, сохраняя распространение кредитных ценных бумаг благоприятным для ваших капиталистов.\n \n Это преднамеренный компромисс: инвестиции Центрального банка способствуют промышленному росту за счет прибыльности банков. Стоит ли делать этот компромисс, зависит от вашей экономической стратегии."

 je_financial_credit_expensive_tt:0 "#bold Кредит торгуется выше базовой цены.#! Коммерческие банки прибыльны. Финансовые районы платят премию за кредит, что сжимает их маржу на производстве ценных бумаг. Инвесторы могут замедлить свою строительную деятельность, если спред станет неблагоприятным."
 je_financial_securities_expensive_tt:0 "#bold Ценные бумаги торгуются выше своей базовой цены.#! Финансовые районы прибыльны — они конвертируют кредит в ценные бумаги со здоровой маржей. Инвесторы получают хорошие доходы от строительства. Банки сталкиваются с умеренным давлением, поскольку их продукт оценивается ниже товаров, которые они кормят."
 je_financial_balanced_tt:0 "Кредиты и ценные бумаги торгуются вблизи своих базовых цен. Финансовая система находится в равновесии — банки являются малоприбыльными, а инвесторы получают умеренную прибыль."

 ### Great Recession

 je_subprime_mortgage_crisis:0 "Субстандартный ипотечный кризис"
 je_subprime_mortgage_crisis_reason:0 "Финансовые учреждения выпускают и упаковывают ценные бумаги, обеспеченные ипотекой, в масштабе - объединение субстандартных ипотечных кредитов в инструменты, продаваемые по всей глобальной финансовой системе. Ценные бумаги оцениваются как безопасные. Они небезопасны. Когда базовые ипотечные кредиты начинают дефолт, каждое учреждение, владеющее этими инструментами, одновременно обнаруживает, что их балансы построены на бесполезной бумаге.\n\n@warning! Если цена ценных бумаг существенно не поправится до наступления кризиса, банковская система [ROOT.GetCountry.GetAdjective] заморозится, и шок будет ощущаться каждой экономикой, имеющей существенные связи с [ROOT.GetCountry.GetName]."

 je_great_recession:0 "Великая рецессия"
 je_great_recession_reason:0 "Финансовая система США рухнула. Ипотечные ценные бумаги, которые хранятся в банках по всему миру, оказались почти бесполезными. Кредитные рынки замерзли. Банки не будут кредитовать друг друга, не говоря уже о бизнесе. Инвестиции иссякли. Строительство замедлилось. Рецессия носит глобальный характер.\n\n Рынок исправится. Это всегда так. Вопрос в том, сколько ущерба было нанесено до того, как он был нанесен."

 # Status descriptions
 subprime_je_danger_tt:0 "Цена ценных бумаг упала недостаточно. [ROOT.GetCountry.GetAdjective] обеспеченные ипотекой ценные бумаги все еще переоценены - рынок еще не оценил риск. Чем дольше это продолжается, тем более катастрофическим является возможное исправление."
 subprime_je_safe_tt:0 "#bold Ценные бумаги упали более чем на 35% ниже базовой цены.#! Рынок корректируется. Если это будет продолжаться, авария может быть предотвращена или, по крайней мере, смягчена."

 great_recession_je_usa_tt:0 "Банковская система [ROOT.GetCountry.GetAdjective] находится в кризисе. Кредитный кризис резко сокращает банковскую пропускную способность, замораживает инвестиции и строительство. Рецессия продлится до тех пор, пока рынок не исправится — примерно десять месяцев."
 great_recession_je_global_tt:0 "Существенные торговые связи [ROOT.GetCountry.GetName] с [SCOPE.sCountry('c:USA').GetName] перенесли финансовый шок. [ROOT.GetCountry.GetAdjective] банки подвержены воздействию финансовых инструментов [SCOPE.sCountry('c:USA').GetAdjective]. Кредиты ужесточаются, инвестиции замедляются, наступает рецессия."

 # ==========================================
 # MODIFIERS
 # ==========================================

 great_recession_credit_crunch:0 "Кредитный крах"
 great_recession_credit_crunch_desc:0 "Банковская система захватила. Банки отказываются давать кредиты — предприятиям, друг другу, кому угодно. Кредит испарился. Инвестиции рухнули. Строительство замедлилось. Экономика не восстановится, пока доверие не вернется к финансовой системе."
