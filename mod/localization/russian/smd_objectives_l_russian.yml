l_russian:
# ==========================================
 # OBJECTIVE
 # ==========================================
 
 objective_the_west: "Запад"
 objective_the_west_desc: "Либеральный международный порядок — демократия, свободная торговля, коллективная безопасность и права человека — должен поддерживаться и расширяться. [ROOT.GetCountry.GetName] находится в центре построенной системы. Задача состоит не только в том, чтобы сохранить то, что существует, но и в том, чтобы гарантировать, что когда наступит конец века, мировые великие державы либо окажутся внутри порядка, либо не смогут бросить ему вызов."
 
 # ==========================================
 # SUBGOAL NAMES AND DESCRIPTIONS
 # ==========================================
 
 sg_west_open_trade: "Резервная валюта статус"
 sg_west_open_trade_desc: "Западная финансовая система работает на кредите [ROOT.GetCountry.GetAdjective]. Установить [ROOT.GetCountry.GetName] в качестве доминирующего экспортера кредитов - более 1000 единиц - цементируя финансовую систему [ROOT.GetCountry.GetAdjective] в качестве основы мировой экономики."
 
 sg_west_alliances: "Сеть альянсов"
 sg_west_alliances_desc: "Западный порядок — это проект коллективной безопасности. Установите соглашения о военной помощи по крайней мере с четырьмя странами, создавая сеть альянса, которая сдерживает агрессию и проектирует власть через партнерство, а не оккупацию."
 
 sg_west_human_rights: "Либерально-демократические рамки"
 sg_west_human_rights_desc: "Запад определяется не только своим богатством, но и ценностями. Ввести всеобщее избирательное право, защиту трудящихся, отмену рабства и защищенную речь — институциональные основы либерально-демократического общества. Порядок [ROOT.GetCountry.GetName] должен быть достойным защиты."
 
 sg_west_education: "Образованный гражданин"
 sg_west_education_desc: "Демократическое участие и экономический динамизм зависят от образованного населения. Инвестируйте в школьную систему до уровня 5 и достигните уровня грамотности не менее 75%. Информированное население является наиболее прочной основой либерального порядка."
 
 sg_west_gdp: "Экономическое лидерство"
 sg_west_gdp_desc: "Западный порядок подкрепляется экономическим весом. [ROOT.GetCountry.GetName] должен составлять не менее 25% мирового ВВП, что делает [ROOT.GetCountry.GetAdjective] Экономика слишком большая и слишком центральная для глобальной системы, чтобы любой соперник мог достойно бросить вызов."
 
 sg_west_endgame: "Однополярный момент"
 sg_west_endgame_desc: "Последний вызов. И [SCOPE.sCountry('c:RUS').GetName], и [SCOPE.sCountry('c:CHI').GetName] должны быть приведены в порядок или неспособны угрожать ему. Для каждого: либо они демократизируются, принимают всеобщее избирательное право и подписывают оборонительный пакт с [ROOT.GetCountry.GetName], либо их власть падает ниже ранга крупной державы. Нет третьего варианта, который бы сохранил порядок."
 
 # ==========================================
 # JOURNAL ENTRY NAMES AND DESCRIPTIONS
 # ==========================================
 
 je_west_open_trade: "Финансовое доминирование"
 je_west_open_trade_reason: "Доллар — или что-то, что называется его валютой — является мировой резервной валютой. Другие страны держат его, улаживают торговлю и строят вокруг него свои финансовые системы. Экспорт более 1000 единиц кредита на международные рынки укрепляет эту позицию и дает структурные рычаги влияния на глобальную финансовую систему, которые никакая военная сила не может воспроизвести."
 
 je_west_alliances: "Коллективная безопасность"
 je_west_alliances_reason: "НАТО. Анзус. Партнерство в сфере безопасности, которое определяет западный блок, — это не просто военные договоренности, это политические обязательства. Разработать соглашения о военной помощи как минимум с четырьмя странами. Каждое партнерство расширяет охват [ROOT.GetCountry.GetAdjective] и снижает затраты на поддержание порядка."
 
 je_west_human_rights: "Институциональный фонд"
 je_west_human_rights_reason: "Всеобщее избирательное право. Защита работников. Отмена рабства. Защищенная речь. Это не факультативные дополнения к западной модели — это модель. Без них то, что защищает [ROOT.GetCountry.GetName], — это просто власть, а не принцип. Установить все четыре институциональные основы, необходимые либеральному порядку."
 
 je_west_education: "Образование для всех"
 je_west_education_reason: "Западная модель зависит от граждан, которые умеют читать, рассуждать и участвовать. Инвестируйте в школы до уровня 5 и достигните уровня грамотности 75%. Недостаточно иметь правильные законы — население должно быть достаточно образовано, чтобы их использовать."
 
 je_west_gdp: "5% мирового ВВП"
 je_west_gdp_reason: "Размер имеет значение. [ROOT.GetCountry.GetName] должен составлять не менее четверти мирового экономического производства. В этой шкале [ROOT.GetCountry.GetAdjective] Экономика не просто большая, она необходима. Мир торгует с [ROOT.GetCountry.GetName], заимствует у [ROOT.GetCountry.GetName] и не может позволить себе сделать [ROOT.GetCountry.GetName] врагом."
 
 je_west_endgame: "Конец истории"
 je_west_endgame_reason: "Вопрос возраста: могут ли как [SCOPE.sCountry('c:RUS').GetName], так и [SCOPE.sCountry('c:CHI').GetName] быть нейтрализованы как системные конкуренты западному порядку?\n\n Для каждой страны должно быть верно одно из следующих: \n• Они приняли демократическую республику, всеобщее избирательное право и подписали оборонительный пакт с [ROOT.GetCountry.GetName]\n• Их рейтинг мощности упал ниже, чем у основной мощности \n\n Когда выполняются оба условия, однополярный момент завершается."
 
 # ==========================================
 # PROGRESS TOOLTIPS
 # ==========================================
 
 je_west_open_trade_progressing_tt: "Экспорт кредитов растет - финансовая система расширяется на международном уровне"
 je_west_alliances_progressing_tt: "Сеть альянса формируется — нужно больше партнеров"
 je_west_human_rights_progressing_tt: "Существуют некоторые рамки прав — полный набор еще не принят."
 je_west_education_progressing_tt: "Развивается школьная система — 5 уровень инвестиций и 75% грамотности являются целевыми показателями."
 je_west_gdp_progressing_tt: "[ROOT.GetCountry.GetName] составляет более 15% мирового ВВП — цель составляет 25%"
 je_west_endgame_progressing_tt: "Один соперник был ослаблен или демократизирован, другой остается системным вызовом."
 
 # ==========================================
 # OBJECTIVE
 # ==========================================

 objective_the_east: "Восток"
 objective_the_east_desc: "Западный либеральный порядок — не единственный возможный мир. [ROOT.GetCountry.GetName] имеет другую модель — государственное направление, коллективную силу и суверенное развитие. Задача состоит в том, чтобы продемонстрировать, что эта модель может соответствовать Западу в экономической мощи и глобальном охвате, и построить мир, в котором [ROOT.GetCountry.GetName], а не США, определяет условия международного порядка."

 # ==========================================
 # SUBGOAL NAMES AND DESCRIPTIONS
 # ==========================================

 sg_east_state_industry: "Направленная промышленная база"
 sg_east_state_industry_desc: "Восточная модель опирается на способность государства направлять инвестиции в тяжелую промышленность. Поддерживать интервенционистскую или командную экономику, наращивать строительные мощности как минимум до 10 и развивать добычу железа как минимум до 5 уровня с высокой заполняемостью. Это экономическая основа, от которой зависит все остальное."

 sg_east_great_power: "Статус великой державы"
 sg_east_great_power_desc: "Восточный вызов западной гегемонии может быть поставлен только подлинно великой державой. Достигнуть звания великой державы — не вести переговоров с [SCOPE.sCountry('c:USA').GetName] как с равным с позиции слабости."

 sg_east_sphere: "Восточный блок"
 sg_east_sphere_desc: "Создайте сеть союзных государств, которые составляют сферу влияния [ROOT.GetCountry.GetName]. Установить соглашения о военной помощи как минимум с четырьмя странами. Альянсы — это не благотворительность, а инфраструктура проекции власти."

 sg_east_currency: "Восточная резервная валюта"
 sg_east_currency_desc: "Доминирование доллара является самым долгосрочным преимуществом Запада — оно позволяет Соединенным Штатам финансировать свою гегемонию за счет глобальной экономики. Бросьте вызов. Экспортировать более 1000 единиц кредита на международные рынки и держать ценные бумаги по конкурентоспособной цене для привлечения иностранных инвесторов. Восточная резервная валюта не только экономическая, но и геополитическая."

 sg_east_endgame: "Многополярный мир"
 sg_east_endgame_desc: "Последний вызов. Соединенные Штаты, Великобритания и Франция — три столпа западного порядка — должны быть нейтрализованы. Для каждого: либо их ранг власти падает ниже, чем у крупной державы, либо они подписывают оборонительный пакт с [ROOT.GetCountry.GetName]. Когда все три условия будут выполнены, мировой порядок изменится."

 je_east_state_industry: "Промышленный фонд"
 je_east_state_industry_reason: "Государство должно направлять инвестиции в тяжелую промышленность, а не оставлять ее на рынках. Поддерживать интервенционистскую или командную экономику, создавать строительные мощности не менее 10 и развивать значительные мощности по добыче железа при 75-процентной занятости или лучше. Без этой промышленной базы [ROOT.GetCountry.GetName] не сможет поддерживать военный и экономический вес, необходимый для восточного вызова."

 je_east_great_power: "Подъем к великой державе"
 je_east_great_power_reason: "Достичь звания великой державы. В настоящее время [ROOT.GetCountry.GetName] может быть одной из самых сильных стран в мире, но статус великой державы является формальным признанием того, что [ROOT.GetCountry.GetName] принадлежит комнате, где принимаются решения о глобальном порядке. Это предпосылка для всего, что следует."

 je_east_sphere: "Четыре военных партнера"
 je_east_sphere_reason: "Разработать соглашения о военной помощи как минимум с четырьмя странами. [ROOT.GetCountry.GetName] не может бросить вызов западной системе альянса в одиночку. Восточная сфера должна быть подлинным коллективом — состояниями, которые зависят от [ROOT.GetCountry.GetName] и от которых [ROOT.GetCountry.GetName] может зависеть взамен."

 je_east_currency: "Вызов доминированию доллара"
 je_east_currency_reason: "Резервная валюта доллара является структурным преимуществом, которое позволило Западу на протяжении десятилетий бить выше своего веса. Чтобы соответствовать этому, необходимо экспортировать более 1000 единиц кредита на международные рынки и держать ценные бумаги по цене менее 25% от их базовой стоимости, чтобы иностранные инвесторы нашли их привлекательными. Восточная финансовая система, которую охотно используют другие, — это не просто экономическое достижение. Это заявление о том, что доллар не единственный выбор."

 je_east_endgame: "Западные державы нейтрализованы"
 je_east_endgame_reason: "Мировой порядок меняется, когда его охранники больше не могут его охранять. Все три должны быть решены: \n\n• [SCOPE.sCountry('c:USA').GetName]: ниже крупного ранга власти, или подписан оборонительный пакт с [ROOT.GetCountry.GetName]\n• [SCOPE.sCountry('c:GBR').GetName]: ниже крупного ранга власти, или подписан оборонительный пакт с [ROOT.GetCountry.GetName]\n• [SCOPE.sCountry('c:FRA').GetName]: ниже крупного ранга власти, или подписан оборонительный пакт с [ROOT.GetCountry.GetName]\n\n Когда все три условия выполнены, [ROOT.GetCountry.GetName] не просто пережил западный порядок. Она его заменила."

 je_east_state_industry_progressing_tt: "Развивается промышленная база - строительные мощности и добыча железа пока не намечены"
 je_east_great_power_progressing_tt: "[ROOT.GetCountry.GetName] - это крупная держава - статус великой державы в пределах досягаемости"
 je_east_sphere_progressing_tt: "Растет сеть альянса — нужны четыре соглашения о военной помощи"
 je_east_currency_progressing_tt: "Экспорт кредитов растет - для установления статуса резервной валюты необходимо 1000 единиц"
 je_east_endgame_progressing_tt: "По крайней мере, одна западная держава была нейтрализована, остальные остаются."
 
 # ==========================================
 # OBJECTIVE
 # ==========================================

 objective_rising_powers: "Восходящие державы"
 objective_rising_powers_desc: "Мир не должен быть разделен между двумя блоками. Он отказывается выбирать между Вашингтоном и Москвой, между долларом и тем, что будет дальше, между одной империей и другой. Третий способ сложнее, чем любой из альтернатив. Это требует подлинного экономического веса, надежной военной мощи и дипломатического мастерства, чтобы сплотить коалицию государств, у которых есть только одна общая черта: они также отказываются выбирать."

 # ==========================================
 # SUBGOAL NAMES AND DESCRIPTIONS
 # ==========================================

 sg_rising_economy: "Экономические основы"
 sg_rising_economy_desc: "Постройте экономику, на долю которой приходится не менее 10% мирового ВВП, что достаточно существенно, чтобы закрепить третий блок, сохраняя при этом торговую зависимость от любого отдельного партнера ниже 40%. Суверенитет начинается с экономической независимости."

 sg_rising_sovereignty: "Полная суверенная независимость"
 sg_rising_sovereignty_desc: "Восходящая держава не может быть государством-клиентом. Достигните уровня главной власти, достигните престижа не менее 50 и убедитесь, что [ROOT.GetCountry.GetName] не является ни субъектом какой-либо власти, ни марионеткой [SCOPE.sCountry('c:USA').GetName] или [SCOPE.sCountry('c:RUS').GetName]. Третий путь начинается со свободы выбора."

 sg_rising_military: "Военная достоверность"
 sg_rising_military_desc: "Третий способ заслуживает доверия, только если он может защитить себя. Достичь звания великой державы и полевой армии не менее 100 единиц. Неприсоединившееся государство, которое не может защитить себя, не останется неприсоединившимся надолго."

 sg_rising_prestige: "Международное признание"
 sg_rising_prestige_desc: "Достигните глобального рейтинга страны 5 или лучше с престижем не менее 150. [ROOT.GetCountry.GetName] нельзя игнорировать — не только региональную державу, но и ту, которую великие державы должны учитывать в каждом произведенном ими расчете."

 sg_rising_endgame: "Третий блок"
 sg_rising_endgame_desc: "Возглавьте блок из восьми или более членов в качестве великой державы. Это доказательство концепции — третьего полюса в мировой политике, достаточно большого и заслуживающего доверия, чтобы ни Запад, ни Восток не могли его поглотить или отвергнуть. Когда [ROOT.GetCountry.GetName] возглавляет восемь стран, мир многополярен."

 je_rising_economy: "5% мирового ВВП"
 je_rising_economy_reason: "Создайте экономику до более чем 10% мирового производства и делайте это, не становясь экономически зависимыми от какой-либо одной державы. Цель - экономика, которая слишком велика, чтобы быть санкционированной на подчинение и слишком диверсифицированной, чтобы быть задушенной каким-либо одним эмбарго.\n\n@information! Торговая зависимость от одного партнера должна оставаться ниже 40% от общей рыночной активности."

 je_rising_sovereignty: "Суверенный и независимый"
 je_rising_sovereignty_reason: "Достигнуть крупного властного звания и престижа в 50 или лучше, оставаясь при этом полностью независимым — не подданным какой-либо страны, не марионеткой какой-либо иностранной державы. Полная суверенная независимость не является концом пути. Это начало."

 je_rising_military: "Достоверная сила"
 je_rising_military_reason: "Достичь великой державы разряда и полевой армии не менее 100 единиц. [ROOT.GetCountry.GetName] должен быть в состоянии защитить свой собственный выбор. Неприсоединившаяся страна, которая не может защитить себя, найдет свое решение, принятое другими."

 je_rising_prestige: "Топ-5: Неопровержимый"
 je_rising_prestige_reason: "Достичь мирового рейтинга страны 5 или лучше и престижа не менее 150. На этом уровне [ROOT.GetCountry.GetName] не является региональным любопытством — это мировая держава, чьи позиции нельзя игнорировать, чье выравнивание действительно оспаривается и чье одобрение стоит иметь."

 je_rising_endgame: "Возглавьте третий блок"
 je_rising_endgame_reason: "Возглавьте блок из восьми или более членов в качестве великой державы. Восемь стран, выбирающих организацию вокруг [ROOT.GetCountry.GetName], а не [SCOPE.sCountry('c:USA').GetName] или [SCOPE.sCountry('c:RUS').GetName], — это не просто дипломатическое достижение — это структурный факт международной политики. Третий путь существует. У него есть члены. У него есть лидер. Сверхдержавы должны будут ответить за это."

 # ==========================================
 # PROGRESS TOOLTIPS
 # ==========================================

 je_rising_economy_progressing_tt: "[ROOT.GetCountry.GetName] составляет более 2% мирового ВВП - 5% является целью"
 je_rising_sovereignty_progressing_tt: "[ROOT.GetCountry.GetName] является признанным и независимым — требуется высокий уровень власти и престиж 50."
 je_rising_military_progressing_tt: "Растет военный потенциал — мишенями становятся звания великой державы и численность армии 100 человек."
 je_rising_prestige_progressing_tt: "[ROOT.GetCountry.GetName] приближается к топ-5 — престиж 150 и глобальный рейтинг 5 необходимы"
 je_rising_endgame_progressing_tt: "Блок формируется — для достижения цели необходимо 8 членов."
