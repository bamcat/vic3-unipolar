l_russian:

 # ==========================================
 # ENACTMENT EVENT LOCALIZATION
 # ==========================================

 # drug_laws.1 — Cost of Prohibition
 drug_laws.1.t:0 "Стоимость запрета"
 drug_laws.1.d:0 "Кампания по запрещению всех опьяняющих веществ в [ROOT.GetCountry.GetName] уже началась, но ее реализация оказалась дорогостоящей. Полиция и прокуратура нуждаются в ресурсах. Необходимо следить за границами. Альтернатива — объявление запрета и надежда на соблюдение — не сработала нигде, где она была опробована.\n\n[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName] Правительство должно решить, насколько серьезно оно готово принять это."
 drug_laws.1.f:0 "Закон без принуждения — это предложение."
 drug_laws.1.a:0 "Полное правоприменение — без затрат"
 drug_laws.1.b:0 "Измерение правоприменения — построение соблюдения с течением времени"

 # drug_laws.2 — The Church Speaks
 drug_laws.2.t:0 "[SCOPE.sCharacter('devout_leader').GetPrimaryRoleTitle] Говорить"
 drug_laws.2.d:0 "[SCOPE.sCharacter('devout_leader').GetFullName], лидер [SCOPE.gsInterestGroup('devout_ig').GetName], выступил с публичным заявлением, одобряющим движение правительства к более строгому регулированию содержания. Фраза явно нравственна — опьянение как духовная развращенность, запрет как праведный труд государства. Вопрос заключается в том, следует ли принять это определение или сохранить светскую основу для законодательства."
 drug_laws.2.f:0 "Моральный авторитет и юридический авторитет — это не одно и то же, но они могут работать вместе."
 drug_laws.2.a:0 "Приветствуем их поддержку — единый фронт укрепляет закон"
 drug_laws.2.b:0 "Держите это светским вопросом - откажитесь от их обрамления"

 # drug_laws.3 — The Intelligentsia Makes Its Case
 drug_laws.3.t:0 "[SCOPE.sCharacter('intelligentsia_leader').GetFullName] Делает дело для доказательства"
 drug_laws.3.d:0 "[SCOPE.sCharacter('intelligentsia_leader').GetFullName], представляющий собой [SCOPE.gsInterestGroup('intelligentsia_ig').GetName], опубликовал подробный анализ политики декриминализации наркотиков из стран, которые уже приняли ее. Выводы однозначны: количество заключенных падает, смертность от передозировки падает, расходы на правоприменение падают. Доклад широко читается и подвергается нападкам со стороны консервативных кругов, которые утверждают, что доказательства не имеют отношения к делу."
 drug_laws.3.f:0 "Данные не волнуют дебаты."
 drug_laws.3.a:0 "Обратно в исследование — опубликуйте его и позвольте доказательствам привести"
 drug_laws.3.b:0 "Держите академиков подальше от политики"

 # drug_laws.4 — Medical Establishment
 drug_laws.4.t:0 "Врачи поддерживают снижение вреда"
 drug_laws.4.d:0 "Медицинское учреждение, возглавляемое должностными лицами общественного здравоохранения и специалистами по наркомании, официально поддержало предлагаемое законодательство о безопасном введении. Их аргумент прост: контролируемое потребление снижает смертность от передозировки, связывает пользователей с лечением и не увеличивает уровень употребления наркотиков. Доказательства из других стран убедительны. Политическая оппозиция со стороны религиозных и консервативных групп также предсказуема."
 drug_laws.4.f:0 "Медицина — это не мораль. Но жизнь есть жизнь."
 drug_laws.4.a:0 "Обратный медицинский консенсус — доказательства очевидны"
 drug_laws.4.b:0 "Сформулируйте это как моральный вопрос — у медицины нет всех ответов."

 # drug_laws.5 — International Condemnation
 drug_laws.5.t:0 "Мир наблюдает"
 drug_laws.5.d:0 "Перспектива легализации торговли наркотиками привлекла немедленное международное внимание. [SCOPE.sCountry('c:USA').GetName] выпустило официальное дипломатическое письмо, выражающее озабоченность. Многие другие правительства выразили свое недовольство. Международный консенсус по вопросу о запрещении наркотиков, хотя и несовершенно соблюдается, очевиден, и [ROOT.GetCountry.GetName] вот-вот выйдет за его пределы."
 drug_laws.5.f:0 "Суверенитет легко декларировать. Его последствия занимают больше времени."
 drug_laws.5.a:0 "Опровержение международного мнения — [ROOT.GetCountry.GetName] устанавливает свои собственные законы"
 drug_laws.5.b:0 "Действуйте тихо — не делайте заявлений, не приглашайте к конфронтации."

 # drug_laws.6 — Criminal Networks Resist
 drug_laws.6.t:0 "Картели борются с законом"
 drug_laws.6.d:0 "Предлагаемое законодательство о наркотиках угрожает существующей криминальной экономике. Сети, которые извлекают выгоду из нынешней серой зоны между терпимостью и запретом, начали активно работать против принятия закона — развращая местных чиновников, распространяя дезинформацию и в некоторых случаях запугивая законодателей. Отпор организован, хорошо финансируется и эффективен.\n\n[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName] должен решить, как реагировать."
 drug_laws.6.f:0 "Картели предпочитают законы, которые дают им возможность действовать."
 drug_laws.6.a:0 "Примите неудачу — двигайтесь более тщательно"
 drug_laws.6.b:0 "Эскалация правоприменения — искоренение сетей, сопротивляющихся закону"

 # ==========================================
 # ENACTMENT MODIFIER NAMES
 # ==========================================

 drug_law_prohibition_enforcement:0 "Кампания по обеспечению соблюдения запретов"
 drug_law_prohibition_enforcement_desc:0 "Хорошо финансируемая кампания по обеспечению соблюдения повышает шансы на принятие и соблюдение запрета."

 drug_law_enforcement_cost:0 "Расходы на обеспечение соблюдения"
 drug_law_enforcement_cost_desc:0 "Расходы на проведение кампании по борьбе с наркотиками предъявляют дополнительные требования к государственному бюджету."

 drug_law_religious_backing:0 "Религиозная поддержка"
 drug_law_religious_backing_desc:0 "Поддержка религиозного истеблишмента заключается в предоставлении морального авторитета законодательству и повышении его шансов на принятие."

 drug_law_devout_empowered:0 "Обсуждение The Drug Debate"
 drug_law_devout_empowered_desc:0 "Общественная ассоциация с законодательством о запрещении наркотиков укрепила политическую позицию этой группы."

 drug_law_academic_push:0 "Академическая доказательная кампания"
 drug_law_academic_push_desc:0 "Опубликованные исследования, поддерживающие декриминализацию, меняют условия обсуждения в пользу законодательства."

 drug_law_intelligentsia_engaged:0 "Интеллигенция вовлечена"
 drug_law_intelligentsia_engaged_desc:0 "Интеллигенция активно участвует в дебатах о наркополитике, повышая авторитет законодательной кампании."

 drug_law_intelligentsia_ignored:0 "Интеллигенция в стороне"
 drug_law_intelligentsia_ignored_desc:0 "Решение исключить академические голоса из дебатов о наркополитике расстроило интеллигенцию."

 drug_law_medical_backing:0 "Медицинский консенсус за законом"
 drug_law_medical_backing_desc:0 "Одобрение медицинского учреждения обеспечивает научное доверие к законодательству о снижении вреда."

 drug_law_moral_framing:0 "Мораль вместо медицинского обрамления"
 drug_law_moral_framing_desc:0 "Формирование политики в отношении наркотиков как морального, а не медицинского вопроса усложняет доказательную базу для сайтов безопасных инъекций."

 drug_law_international_pressure:0 "Международное осуждение"
 drug_law_international_pressure_desc:0 "Международное давление на предлагаемое законодательство усложняет его принятие и наносит ущерб репутации [ROOT.GetCountry.GetName]."

 drug_law_sovereignty_declared:0 "Суверенитет утвержден"
 drug_law_sovereignty_declared_desc:0 "[ROOT.GetCountry.GetName] публично заявил о своем праве устанавливать свою собственную политику в отношении наркотиков независимо от международного мнения."

 drug_law_criminal_pushback:0 "Преступные сети сопротивляются"
 drug_law_criminal_pushback_desc:0 "Организованная преступность активно работает над тем, чтобы не допустить принятия законодательства о наркотиках, которое угрожало бы ее деятельности."

 # disability_laws.1 — Employer Resistance
 disability_laws.1.t:0 "Работодатели выступают против размещения на рабочем месте"
 disability_laws.1.d:0 "Предлагаемое законодательство о размещении на рабочем месте получило организованный ответ от работодателей. [SCOPE.sCharacter('employer_leader').GetFullName], выступая за [SCOPE.gsInterestGroup('employer_ig').GetName], утверждает, что затраты на соблюдение нормативных требований являются невыполнимыми — что малые предприятия, в частности, не могут поглотить расходы на модификацию оборудования, корректировку обязанностей и реструктуризацию рабочих мест для размещения сотрудников с ограниченными возможностями.\n\n Правительство должно решить, как реагировать."
 disability_laws.1.f:0 "В каждой инклюзивной политике есть кто-то, кто утверждает, что затраты слишком высоки."
 disability_laws.1.a:0 "Держитесь твердо — соблюдение закона не является факультативным"
 disability_laws.1.b:0 "Предложение переходного периода — поэтапное соблюдение в течение нескольких лет"
 
 # disability_laws.2 — Construction Lobby
 disability_laws.2.t:0 "Объекты строительной отрасли"
 disability_laws.2.d:0 "Предлагаемое законодательство о доступной инфраструктуре вызвало официальное возражение со стороны строительной отрасли. Их аргумент: требование переоборудовать существующие здания для соответствия стандартам доступности технически сложно и непомерно дорого для многих владельцев недвижимости. Они призывают либо к пункту дедушки для существующих структур, либо к гораздо более длительному сроку реализации."
 disability_laws.2.f:0 "Каждое здание, построенное без пандуса, теперь является политической проблемой."
 disability_laws.2.a:0 "Строгие стандарты — полное соблюдение графика, без исключений"
 disability_laws.2.b:0 "Фазовое соответствие — дедушки существующих конструкций, новые стандарты для новых конструкций"
 
 # disability_laws.3 — Who Pays
 disability_laws.3.t:0 "Кто платит за доступную инфраструктуру?"
 disability_laws.3.d:0 "Законодательство о доступной инфраструктуре поднимает вопрос, которого авторы законопроекта до сих пор избегали: кто на самом деле платит за модернизацию? Если обязательство полностью ложится на владельцев частной собственности, мелкие арендодатели и предприятия будут непропорционально обременены. Если государство субсидирует работу, государственный бюджет получает удар. Законодательный орган зашел в тупик по этому вопросу."
 disability_laws.3.f:0 "Включение имеет цену. Спор идет о том, кто платит."
 disability_laws.3.a:0 "Государственная субсидия — правительство поглощает затраты на модернизацию, чтобы ускорить соблюдение требований"
 disability_laws.3.b:0 "Частные обязательства — владельцы недвижимости несут расходы на соблюдение"
 
 # disability_laws.4 — Medical Endorsement
 disability_laws.4.t:0 "[SCOPE.sCharacter('medical_leader').GetFullName] Одобряет лечение"
 disability_laws.4.d:0 "[SCOPE.sCharacter('medical_leader').GetFullName] из [SCOPE.gsInterestGroup('medical_ig').GetName] опубликовал официальное одобрение законодательства об общественном лечении, ссылаясь на доказательства того, что финансируемое государством лечение инвалидности обеспечивает измеримый рост участия в рабочей силе, снижает долгосрочные расходы на здравоохранение и улучшает результаты по всему населению. Поддержка используется сторонниками, чтобы утверждать, что это не благотворительность, а инвестиции."
 disability_laws.4.f:0 "Медицина не делает различий между достойными и недостойными больными."
 disability_laws.4.a:0 "Комиссия по общественному здравоохранению - пусть доказательства делают дело"
 disability_laws.4.b:0 "Сохраняйте политические рамки — это вопрос прав, а не медицинский."
 
 # disability_laws.5 — Fiscal Resistance
 disability_laws.5.t:0 "[SCOPE.sCharacter('fiscal_leader').GetFullName] Государство не может себе этого позволить"
 disability_laws.5.d:0 "[SCOPE.sCharacter('fiscal_leader').GetFullName], представляющий собой [SCOPE.gsInterestGroup('fiscal_ig').GetName], дал суровую оценку: текущая стоимость комплексного лечения инвалидности в обществе является неустойчивой. Государство уже растянуто. Этот закон, если он будет принят в полном объеме, потребует повышения или сокращения налогов в других местах. Вопрос не в том, хочет ли [ROOT.GetCountry.GetName] заботиться о своих гражданах-инвалидах, а в том, сможет ли он."
 disability_laws.5.f:0 "Бюджет – это моральный документ."
 disability_laws.5.a:0 "Держите линию — расходы — это моральное обязательство, а не выбор."
 disability_laws.5.b:0 "Фаза расходов — поэтапная реализация в течение нескольких лет"
 
 # disability_laws.6 — Advocates Rally
 disability_laws.6.t:0 "Адвокаты по инвалидности делают свое дело"
 disability_laws.6.d:0 "Коалиция организаций по защите прав инвалидов начала общественную кампанию в поддержку законопроекта. Их послание прямое: общество слишком долго исключало инвалидов из полноценного участия. Обсуждаемое законодательство не является благом — это исправление давней несправедливости. Кампания привлекла сочувственное освещение и меняет общественное мнение."
 disability_laws.6.f:0 "Ничего о нас без нас."
 disability_laws.6.a:0 "Формально принять их делегацию — дать кампанию официальной поддержки"
 disability_laws.6.b:0 "Признать кампанию, не усиливая ее"
 
 # disability_laws.7 — Conservative Opposition
 disability_laws.7.t:0 "[SCOPE.sCharacter('conservative_leader').GetFullName] Возглавляет оппозицию"
 disability_laws.7.d:0 "[SCOPE.sCharacter('conservative_leader').GetFullName] из [SCOPE.gsInterestGroup('conservative_ig').GetName] организовал общественную оппозиционную кампанию против законодательства об инвалидности. Аргумент знаком: государственная зависимость подрывает индивидуальный характер, что продуктивное население не может нести растущее бремя поддержки, и что существующей частной благотворительности достаточно. Фрейминг вызывает критику со стороны групп по правам инвалидов, но он находит отклик у части электората."
 disability_laws.7.f:0 "Аргумент против включения всегда касается чьего-то бремени."
 disability_laws.7.a:0 "Публичное опровержение — прямое моральное обоснование законодательства"
 disability_laws.7.b:0 "Не удостаивайте его ответом — нажмите вперед."
 
 # ==========================================
 # ENACTMENT MODIFIER NAMES
 # ==========================================
 
 disability_employer_pressure:0 "Кампания по соблюдению работодателя"
 disability_employer_pressure_desc:0 "Правительство решительно выступает против сопротивления работодателей. Законодательство будет действовать по графику."
 
 disability_compliance_delay:0 "Предоставлен переходный период работодателя"
 disability_compliance_delay_desc:0 "Работодателям было предоставлено дополнительное время для соблюдения требований к размещению на рабочем месте, что замедляет принятие закона."
 
 disability_construction_lobby:0 "Строительная отрасль вовлечена"
 disability_construction_lobby_desc:0 "Возражения строительной отрасли были устранены, что уменьшило активное противодействие законодательству о доступной инфраструктуре."
 
 disability_strict_standards:0 "Строгие стандарты соответствия"
 disability_strict_standards_desc:0 "Стандарты доступности фирм были установлены без дедушкиных оговорок. Соблюдение будет полным и по графику."
 
 disability_phased_compliance:0 "Соблюдение поэтапной инфраструктуры"
 disability_phased_compliance_desc:0 "Существующие структуры были разрушены. Новые стандарты распространяются только на новое строительство, замедляя более широкое воздействие закона."
 
 disability_funding_debate:0 "Созданы рамки финансирования"
 disability_funding_debate_desc:0 "Вопрос о том, кто платит за доступную инфраструктуру, решен, что устраняет серьезное препятствие для принятия закона."
 
 disability_state_subsidy:0 "Государственная субсидия на инфраструктуру"
 disability_state_subsidy_desc:0 "Государство напрямую поглощает затраты на модернизацию. Соответствие будет быстрее, но бюджет находится под дополнительным давлением."
 
 disability_medical_endorsement:0 "Медицинское учреждение одобряет лечение"
 disability_medical_endorsement_desc:0 "Общественное одобрение медицинской профессией лечения инвалидности в обществе придает научное доверие законодательству."
 
 disability_fiscal_resistance:0 "Фискальные консерваторы в деле"
 disability_fiscal_resistance_desc:0 "Была рассмотрена проблема бюджетного сопротивления государственному лечению инвалидности. Закон движется вперед."
 
 disability_phased_spending:0 "Стадиональные расходы на лечение инвалидности"
 disability_phased_spending_desc:0 "Государственное лечение инвалидности будет поэтапно поэтапно сокращать давление на бюджет за счет более медленного развертывания."
 
 disability_advocate_push:0 "Защитники инвалидности мобилизованы"
 disability_advocate_push_desc:0 "Общественная кампания организаций по защите прав инвалидов набирает политический импульс для принятия закона."
 
 disability_conservative_opposition:0 "Консервативная оппозиция выступила"
 disability_conservative_opposition_desc:0 "Консервативная оппозиция законодательству об инвалидности была частично нейтрализована."
 
 disability_public_rebuttal:0 "Публичное опровержение консервативной оппозиции"
 disability_public_rebuttal_desc:0 "Прямое опровержение правительством консервативных формулировок изменило условия дебатов в пользу законодательства."
 
  # environment_laws.1 — Industry Voluntary Compliance
 environment_laws.1.t:0 "[SCOPE.sCharacter('industry_leader').GetFullName] Предлагает добровольное соблюдение"
 environment_laws.1.d:0 "[SCOPE.sCharacter('industry_leader').GetFullName], выступая от имени [SCOPE.gsInterestGroup('industry_ig').GetName], сделал публичное предложение: если правительство согласится встроить механизмы добровольного соблюдения в экологическую структуру, а не предписывать принудительное исполнение, промышленность будет сотрудничать. Предложение преподносится как прагматичное партнерство. Критики утверждают, что это попытка стереть законодательство до его принятия."
 environment_laws.1.f:0 "Добровольное соблюдение является любимым видом индустрии ископаемого топлива."
 environment_laws.1.a:0 "Принять — встроить добровольное соблюдение в рамки"
 environment_laws.1.b:0 "Отказ — только принудительное исполнение, без вырезок"
 
 # environment_laws.2 — Scientific Backing
 environment_laws.2.t:0 "[SCOPE.sCharacter('science_leader').GetFullName] Опубликован отчет"
 environment_laws.2.d:0 "[SCOPE.sCharacter('science_leader').GetFullName] из [SCOPE.gsInterestGroup('science_ig').GetName] опубликовало всестороннее исследование, документирующее экологические и общественные расходы на здравоохранение по текущей траектории [ROOT.GetCountry.GetName]. Выводы однозначны: уровень загрязнения растет, смертность страдает, а экосистемы находятся в состоянии стресса. Предлагаемое законодательство, заключает доклад, не просто желательно — оно необходимо."
 environment_laws.2.f:0 "Данные не ждут политического удобства."
 environment_laws.2.a:0 "Комиссия официально ответила — опубликуйте выводы при поддержке правительства"
 environment_laws.2.b:0 "Признать доклад без его усиления"
 
 # environment_laws.3 — International Praise
 environment_laws.3.t:0 "Международное сообщество хвалит экологическое лидерство [ROOT.GetCountry.GetName]"
 environment_laws.3.d:0 "Предложенное экологическое законодательство [ROOT.GetCountry.GetName] достигло международного сообщества, и ответ был неожиданно теплым. Несколько стран выступили с заявлениями, восхваляющими правительство [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName] за его амбиции. Группы по защите окружающей среды называют [ROOT.GetCountry.GetName] моделью для других."
 environment_laws.3.f:0 "Лидерство легче утверждать, чем поддерживать."
 environment_laws.3.a:0 "Пользуйтесь моментом - проведение международных экологических переговоров"
 environment_laws.3.b:0 "Сохраняйте это внутри страны — избегайте чрезмерного выполнения международных обязательств"
 
 # environment_laws.4 — Compliance Cost Debate
 environment_laws.4.t:0 "Кто несет расходы на соблюдение экологических норм?"
 environment_laws.4.d:0 "Экологическое законодательство вызвало ожесточенные споры об ответственности. Промышленность утверждает, что затраты на соблюдение нормативных требований — модернизация заводов, изменение цепочек поставок, обновление управления отходами — будут непропорционально падать на производителей и, в конечном итоге, на потребителей. Экологические группы возражают, что эти затраты представляют собой истинную цену загрязнения, которое молчаливо несёт общественность в течение десятилетий."
 environment_laws.4.f:0 "Загрязнение всегда имело свою цену. Вопрос в том, кто платит."
 environment_laws.4.a:0 "Загрязнитель платит — промышленность несет расходы на собственное соответствие"
 environment_laws.4.b:0 "Государственная субсидия — правительство разделяет бремя соблюдения для ускорения принятия"
 
 # environment_laws.5 — Constitutional Challenge
 environment_laws.5.t:0 "[SCOPE.sCharacter('industry_opposition_leader').GetFullName] Оспорить законность прав природы"
 environment_laws.5.d:0 "[SCOPE.sCharacter('industry_opposition_leader').GetFullName] из [SCOPE.gsInterestGroup('industry_opposition_ig').GetName] объявил о формальном юридическом оспаривании предлагаемых гарантированных прав природного законодательства. Аргумент: предоставление правового статуса рекам, лесам и экосистемам представляет собой неконституционное вмешательство в права собственности и экономическую свободу. Эта задача получила значительную поддержку со стороны землевладельцев и промышленных кругов."
 environment_laws.5.f:0 "У природы нет адвокатов. Он должен одолжить наш."
 environment_laws.5.a:0 "Защищать рамки — пусть суды выносят решения по существу"
 environment_laws.5.b:0 "Ограничение сферы действия — переговоры, чтобы избежать длительной юридической битвы"
 
 # environment_laws.6 — Environmental Disaster
 environment_laws.6.t:0 "Экологическая катастрофа в [SCOPE.sState('disaster_state_scope').GetName]"
 environment_laws.6.d:0 "В то время как экологическое законодательство находится в стадии обсуждения, [SCOPE.sState('disaster_state_scope').GetName] был поражен экологическим кризисом - разливом заводов, загрязнением реки или инцидентом загрязнения достаточного масштаба, чтобы он достиг национальных новостей. Время является значительным. Сторонники утверждают, что это доказывает, что законодательство срочно необходимо. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName] Правительство должно решить, как реагировать."
 environment_laws.6.f:0 "Любая катастрофа – это тоже аргумент."
 environment_laws.6.a:0 "Используйте момент — требуйте срочного принятия экологического закона"
 environment_laws.6.b:0 "Сдерживайте историю — управляйте реакцией общественности без эскалации"
 
 env_voluntary_compliance:0 "Промышленное добровольное соблюдение"
 env_voluntary_compliance_desc:0 "Промышленность согласилась на добровольное соблюдение природоохранных рамок, снижение активной оппозиции и повышение шансов принятия закона."
 
 env_mandatory_enforcement:0 "Обязательные рамки правоприменения"
 env_mandatory_enforcement_desc:0 "Правительство отвергло добровольное соблюдение в пользу обязательного исполнения. Закон сильнее, а отраслевая оппозиция более решительна."
 
 env_scientific_backing:0 "Научное сообщество одобрило"
 env_scientific_backing_desc:0 "Опубликованный научный доклад, подтверждающий экологическое законодательство, меняет общественное и законодательное мнение в его пользу."
 
 env_international_praise:0 "Международная экологическая премия"
 env_international_praise_desc:0 "Международное признание экологического лидерства [ROOT.GetCountry.GetName] набирает обороты в законодательстве."
 
 env_diplomatic_push:0 "Экологическая дипломатическая инициатива"
 env_diplomatic_push_desc:0 "[ROOT.GetCountry.GetName] проводит международные экологические переговоры, добавляя дипломатический престиж к законодательному давлению."
 
 env_compliance_cost_debate:0 "Решена структура затрат на соблюдение"
 env_compliance_cost_debate_desc:0 "Дебаты о том, кто несет расходы на соблюдение экологических норм, были решены, устранив основное препятствие на пути законодательства."
 
 env_polluter_pays:0 "Загрязнитель платит принцип"
 env_polluter_pays_desc:0 "Промышленность несет ответственность за свои собственные затраты на соблюдение требований. Закон сильнее, оппозиция громче."
 
 env_state_subsidy:0 "Государственная субсидия на экологическое соответствие"
 env_state_subsidy_desc:0 "Государство субсидирует соблюдение экологических норм, чтобы уменьшить сопротивление промышленности и ускорить принятие."
 
 env_constitutional_challenge:0 "Конституционный вызов"
 env_constitutional_challenge_desc:0 "Юридический вызов законодательству о гарантированных правах природы замедлил его прохождение через законодательный орган."
 
 env_legal_defence:0 "Правовая защита прав природы"
 env_legal_defence_desc:0 "Правовая защита правительством естественных прав укрепила доверие к его конституционной действительности."
 
 env_disaster_response:0 "Катастрофа, используемая для законодательства"
 env_disaster_response_desc:0 "Правительство использовало экологическую катастрофу для срочной общественной и законодательной поддержки экологического законодательства."
 
 env_disaster_suppressed:0 "История катастрофы сдержана"
 env_disaster_suppressed_desc:0 "Экологической катастрофой управляют спокойно. Общественное давление не усилилось, как и законодательный импульс."
 
 env_disaster_state_modifier:0 "Экологическая катастрофа"
 env_disaster_state_modifier_desc:0 "Это государство пострадало от экологической катастрофы — разлива, загрязнения или экологического коллапса, что вызывает дополнительное загрязнение и повышает смертность."
 
 childrens_childcare.1.t:0 "Рынок знает лучше"
 childrens_childcare.1.d:0 "С началом дебатов о приватизированных дошкольных учреждениях деловые ассоциации стали активными сторонниками. Они утверждают, что частные поставщики будут конкурировать за качество, стимулируя инновации, которые государственная монополия никогда не сможет сделать. Критики, однако, предупреждают, что без значимого регулирования только семьи, которые могут позволить себе сборы, получат выгоду."
 childrens_childcare.1.f:0 "У рынка есть ответ на все вопросы. Будет ли он правильным здесь, еще предстоит выяснить."
 childrens_childcare.1.a:0 "Пусть рынок лидирует — конкуренция повысит качество."
 childrens_childcare.1.b:0 "Регулирование цен - частные поставщики должны гарантировать доступ."

 childrens_childcare.2.t:0 "Кто воспитывает ребенка?"
 childrens_childcare.2.d:0 "Религиозные и традиционные голоса стали беспокоить расширение формализованного дошкольного образования. Семья, настаивают они, является надлежащей колыбелью нравственного развития, и любой институт, каким бы благими намерениями он ни руководствовался, рискует разрушить основы гражданского общества."
 childrens_childcare.2.f:0 "За каждым политическим вопросом о детях стоит более глубокий: кому они принадлежат?"
 childrens_childcare.2.a:0 "Успокоить их — это поддерживает семьи, это их не заменяет."
 childrens_childcare.2.b:0 "Отбросьте беспокойство — раннее образование не является моральным вопросом."

 childrens_childcare.3.t:0 "Фискальный расчет"
 childrens_childcare.3.d:0 "Универсальный уход за детьми — это амбициозное и дорогостоящее обязательство. Фискальные консерваторы ухватились за прогнозируемые расходы, предупредив, что государство не может просто взять на себя право такого масштаба без последствий. Правительство должно решить: поглотить затраты и нажать вперед, или замедлить развертывание и выиграть время."
 childrens_childcare.3.f:0 "Каждая крупная социальная программа в конечном итоге встречает своего бухгалтера."
 childrens_childcare.3.a:0 "Финансируйте его — поглощайте затраты и двигайтесь вперед."
 childrens_childcare.3.b:0 "Поэтапность — отсрочка полного внедрения для управления бременем."

 childrens_childcare.4.t:0 "Освобождение или зависимость?"
 childrens_childcare.4.d:0 "Рабочее движение оказалось расколотым. Для многих работников всеобщий уход за детьми является освобождением, которое позволяет родителям, особенно матерям, входить в рабочую силу на равных условиях. Но скептически настроенная фракция утверждает, что предоставляемые государством льготы являются плохой заменой реальной заработной платы, и что принятие риска ухода за детьми отнимает давление у работодателей, чтобы фактически платить прожиточный минимум."
 childrens_childcare.4.f:0 "Не всякая реформа, которая помогает рабочим, является реформой рабочих."
 childrens_childcare.4.a:0 "Уход за детьми является проблемой труда — примите это как политику работников."
 childrens_childcare.4.b:0 "Заработная плата первая — держите движения отдельно."

 childrens_childcare.5.t:0 "Исследование говорит"
 childrens_childcare.5.d:0 "Экономисты и исследователи в области развития детей вступают в дискуссию с простым аргументом: инвестиции в раннем детстве приносят наибольшую долгосрочную отдачу от любых государственных расходов. Данные, говорят они, однозначны. Вопрос в том, хочет ли правительство сделать это публично, или оно предпочитает держать дебаты в политических, а не доказательных терминах."
 childrens_childcare.5.f:0 "Доказательства редко выигрывают дебаты сами по себе. Но это помогает."
 childrens_childcare.5.a:0 "Комиссия публичного отчета — пусть доказательства ведут."
 childrens_childcare.5.b:0 "Держите ученых вне законодательного процесса."
 
 childrens_rights_market_preschool_framing:0 "Поддержка частного сектора"
 childrens_rights_market_preschool_framing_desc:0 "Интересы бизнеса бросили свой вес за приватизированную модель дошкольного образования, придав импульс процессу принятия закона."

 childrens_rights_access_mandate:0 "Мандат доступа введен"
 childrens_rights_access_mandate_desc:0 "К закону были приложены правила ценообразования, требующие от частных поставщиков соблюдения стандартов доступа. Переговоры о соблюдении замедляют прохождение."

 childrens_rights_family_values_debate:0 "Семейное первенство признано"
 childrens_rights_family_values_debate_desc:0 "Правительство сформулировало расширение дошкольного образования как поддержку семей, а не замену, ослабив консервативное сопротивление закону."

 childrens_rights_fiscal_resistance:0 "Фискальное консервативное сопротивление"
 childrens_rights_fiscal_resistance_desc:0 "Противодействие прогнозируемым расходам на всеобщий уход за детьми задерживает законодательный процесс и подрывает позицию правительства по принятию закона."

 childrens_rights_funded_mandate:0 "Финансируемое обязательство государства"
 childrens_rights_funded_mandate_desc:0 "Правительство взяло на себя обязательство покрыть полную стоимость всеобщего ухода за детьми, укрепив аргументы в пользу принятия закона за счет государственных средств."

 childrens_rights_labour_framing:0 "Движение трудящихся мобилизовано"
 childrens_rights_labour_framing_desc:0 "Профсоюзы одобрили всеобщий уход за детьми как проблему трудящихся, добавив организованный политический вес к усилиям по принятию закона."

 childrens_rights_academic_endorsement:0 "Академическая поддержка"
 childrens_rights_academic_endorsement_desc:0 "Исследователи и экономисты публично поддержали всеобщий уход за детьми, придав очевидное доверие законодательному давлению правительства."

 childrens_rights_business_engaged:0 "Вовлечен частный сектор"
 childrens_rights_business_engaged_desc:0 "Владельцы бизнеса видят возможности на приватизированном рынке раннего образования и активно оказывают свое влияние на принятие закона."

 childrens_rights_devout_reassured:0 "Devout успокоился"
 childrens_rights_devout_reassured_desc:0 "Религиозные голоса успокаиваются признанием правительством того, что семья остается главным моральным институтом, а не государством."

 childrens_rights_devout_alienated:0 "Дискография Alienated"
 childrens_rights_devout_alienated_desc:0 "Отказ от традиционных семейных забот вызвал глубокое беспокойство относительно направления социальной политики правительства."

 childrens_rights_unions_mobilized:0 "Мобилизованные профсоюзы"
 childrens_rights_unions_mobilized_desc:0 "Профсоюзы сплотились за всеобщим уходом за детьми, назвав его продолжением борьбы рабочих за экономическое достоинство."

 childrens_rights_unions_skeptical:0 "Профсоюзы скептически"
 childrens_rights_unions_skeptical_desc:0 "Значительная фракция в рабочем движении считает, что государственные пособия не заменяют подлинный рост заработной платы, и отказывается от их полной поддержки."

 childrens_rights_intelligentsia_engaged:0 "Интеллигенция вовлечена"
 childrens_rights_intelligentsia_engaged_desc:0 "Ученые и исследователи активно выступают за всеобщий уход за детьми, ссылаясь на доказательства того, что ранние инвестиции приносят наибольшую долгосрочную социальную отдачу."

 childrens_rights_intelligentsia_sidelined:0 "Интеллигенция в стороне"
 childrens_rights_intelligentsia_sidelined_desc:0 "Академическое сообщество было исключено из законодательных дебатов, в результате чего интеллигенция была разочарована и отстранена от правительственной повестки дня."
 
 womens_rights_laws.1.t:0 "Письмо Закона"
 womens_rights_laws.1.d:0 "По мере формирования законодательства о правовой защите вспыхнули дебаты по поводу его охвата. Реформаторы в интеллигенции утверждают, что узкий закон будет обойден в течение одного поколения — защита должна быть вписана в каждое учреждение, иначе они ничего не будут значить. Их оппоненты предупреждают, что перенапряжение сейчас вызовет конституционный кризис, который похоронит все усилия."
 womens_rights_laws.1.f:0 "Каждый закон так же силен, как и воля к его исполнению, и смелость написать его достаточно широко, чтобы иметь значение."
 womens_rights_laws.1.a:0 "Напишите в общих чертах: защита должна быть обеспечена в каждом учреждении."
 womens_rights_laws.1.b:0 "Держите область узкой — сначала закрепите проход."

 womens_rights_laws.2.t:0 "Традиционное возражение"
 womens_rights_laws.2.d:0 "Консервативные голоса — землевладельцы, духовенство и их союзники — выступили против законопроекта о правовой защите, назвав его оскорблением естественного порядка общества. Их дело коренится не столько в практических возражениях, сколько в глубокой обеспокоенности тем, что представляет собой закон. Правительство должно решить, отвечать ли на этот вызов в открытых дебатах или позволить оппозиции исчерпать себя."
 womens_rights_laws.2.f:0 "Когда говорит традиция, она редко предлагает аргумент — только чувство."
 womens_rights_laws.2.a:0 "Встречайте их в открытых дебатах — публично опровергайте их дело."
 womens_rights_laws.2.b:0 "Пусть они возвещают свои обиды — не давайте им мученическую платформу."

 womens_rights_laws.3.t:0 "Работодатели возвращаются"
 womens_rights_laws.3.d:0 "Структурный эгалитаризм — это не просто вопрос прав, это вопрос управления бизнесом. Класс работодателей выступил с скоординированным возражением, утверждая, что уполномоченное представительство равносильно вмешательству государства в частные решения о найме. Они не против женщин на рабочем месте, они настаивают только на том, чтобы им точно сказали, сколько и в каких ролях."
 womens_rights_laws.3.f:0 "Каждому поколению реформаторов говорили, что сроки неверны. Время никогда не бывает неправильным для тех, кто выигрывает от задержки."
 womens_rights_laws.3.a:0 "Соответствие мандату — никаких исключений и никаких этапов."
 womens_rights_laws.3.b:0 "Предложите переходный период — дайте работодателям время на адаптацию."

 womens_rights_laws.4.t:0 "Женщины в общественной жизни"
 womens_rights_laws.4.d:0 "Профсоюзы проявляют большой интерес к законопроекту о структурном равенстве. Они утверждают, что работающие женщины всегда были в центре организованного труда — недоплаченного, недопредставленного и необходимого. Вопрос в том, будет ли правительство формально признавать этот союз, делая законопроект совместным делом, или сохранить реформу на своих условиях."
 womens_rights_laws.4.f:0 "Заводской этаж всегда знал, что парламент только начинает признавать."
 womens_rights_laws.4.a:0 "Сделайте это общим делом — работайте вместе с женщинами."
 womens_rights_laws.4.b:0 "Держите движения отчетливыми — закон стоит на своих достоинствах."

 womens_rights_laws.5.t:0 "Общество трансформировалось"
 womens_rights_laws.5.d:0 "Законопроект о матриархате вызвал реакцию, не похожую ни на что из недавней законодательной памяти. Его противники не просто возражают против политики, они возражают против того, что она сигнализирует о направлении этого общества. Реакция яростная и организованная. Правительство должно решить, стоит ли ему прямо противостоять или спокойно продвигаться вперед и позволить закону создать свое собственное дело после его принятия."
 womens_rights_laws.5.f:0 "Нет такой революции, которая бы не казалась смещенным людям концом."
 womens_rights_laws.5.a:0 "Противостоять негативной реакции — дуга истории наклоняется вперед."
 womens_rights_laws.5.b:0 "Погода буря спокойно — пусть закон говорит сам за себя."

 womens_rights_laws.6.t:0 "Старая гвардия сопротивляется"
 womens_rights_laws.6.d:0 "Помещики и набожные объединились в своем противостоянии законопроекту о матриархате с рвением, которое выходит за рамки обычного законодательного сопротивления. Для них это экзистенциальный вызов социальной ткани. Их сети мобилизуются, их кафедры и салоны превращаются в места оппозиции. Правительство должно решить, как решительно реагировать."
 womens_rights_laws.6.f:0 "Старая гвардия всегда была самой громкой в последние часы."
 womens_rights_laws.6.a:0 "Раздавить оппозицию — это правительство не станет заложником."
 womens_rights_laws.6.b:0 "Переговоры — предлагают культурные уступки, чтобы уменьшить трения."

 womens_rights_legal_scope:0 "Широкий правовой мандат"
 womens_rights_legal_scope_desc:0 "Интеллигенция успешно добивается широкомасштабной законодательной защиты, придает импульс и доверие усилиям по принятию закона."

 womens_rights_narrow_scope:0 "Навязанная узкая область"
 womens_rights_narrow_scope_desc:0 "Решение ограничить сферу действия закона осложнило процесс принятия закона, поскольку как сторонники, так и противники пересмотрели свои позиции."

 womens_rights_traditionalist_debate:0 "Традиционный вызов вовлечён"
 womens_rights_traditionalist_debate_desc:0 "Правительство вступило в публичные дебаты с консервативной оппозицией, изменив условия борьбы за принятие закона."

 womens_rights_employer_resistance:0 "Сопротивление лобби работодателя"
 womens_rights_employer_resistance_desc:0 "Организованная бизнес-оппозиция по отношению к представительству активно тормозит законодательный процесс."

 womens_rights_union_mobilization:0 "Движение трудящихся мобилизовано"
 womens_rights_union_mobilization_desc:0 "Профсоюзы бросили свой организованный вес за структурный эгалитаризм, стимулируя усилия по принятию закона."

 womens_rights_societal_backlash:0 "Социальная обратная реакция"
 womens_rights_societal_backlash_desc:0 "Масштаб изменений, предложенных законопроектом о матриархате, вызвал широкое и организованное сопротивление, которое замедляет законодательный процесс."

 womens_rights_vanguard_push:0 "Скриншоты Vanguard Push"
 womens_rights_vanguard_push_desc:0 "Правительство взяло на себя обязательство противостоять оппозиции напрямую, позиционируя себя как передовой край социальных преобразований."

 womens_rights_old_guard_opposition:0 "Старая гвардейская оппозиция"
 womens_rights_old_guard_opposition_desc:0 "Помещики и набожные объединились в организованном сопротивлении, задержав законопроект о матриархате и проверив решимость правительства."

 womens_rights_intelligentsia_engaged:0 "Интеллигенция вовлечена"
 womens_rights_intelligentsia_engaged_desc:0 "Академики и реформаторы активно предоставляют свои государственные полномочия для обеспечения широкой правовой защиты."

 womens_rights_intelligentsia_disappointed:0 "Интеллигенция разочарована"
 womens_rights_intelligentsia_disappointed_desc:0 "Решение сузить сферу действия закона разочаровало реформистских интеллектуалов, которые опасаются, что полумеры будут отменены в течение одного поколения."

 womens_rights_conservatives_rebuked:0 "Консерваторов упрекают"
 womens_rights_conservatives_rebuked_desc:0 "Публичное опровержение правительства смутило традиционалистскую оппозицию, хотя оно также обострило их решимость."

 womens_rights_conservatives_placated:0 "Консерваторы распустились"
 womens_rights_conservatives_placated_desc:0 "Позволяя оппозиции выражать свои претензии без прямой конфронтации, правительство сократило немедленные трения."

 womens_rights_employers_overruled:0 "Работодатели отказались"
 womens_rights_employers_overruled_desc:0 "Классу работодателей было сказано, что соблюдение является обязательным и не подлежащим обсуждению, порождая обиду, но очищая путь вперед."

 womens_rights_employers_appeased:0 "Работодатели успокоились"
 womens_rights_employers_appeased_desc:0 "Поэтапный переход смягчил противодействие бизнеса, уменьшив сопротивление ценой более медленной реализации."

 womens_rights_unions_allied:0 "Союзники"
 womens_rights_unions_allied_desc:0 "Профсоюзы формально объединились с движением эгалитаризма, добавив организованную политическую силу к усилиям по принятию закона."

 womens_rights_unions_neutral:0 "Нейтральные союзы"
 womens_rights_unions_neutral_desc:0 "Рабочее движение решило сохранить дистанцию от законопроекта об эгалитаризме, не предлагая ни активной поддержки, ни оппозиции."

 womens_rights_old_guard_suppressed:0 "Старая гвардия подавлена"
 womens_rights_old_guard_suppressed_desc:0 "Правительство решительно выступило против оппозиции старой гвардии, ослабив их политические позиции, но радикализировав их базу."

 womens_rights_old_guard_negotiated:0 "Старая гвардия обсуждается"
 womens_rights_old_guard_negotiated_desc:0 "Уступки старой гвардии притупили худшее из их оппозиции, хотя их фундаментальное несогласие с законом остается."
 
 ubi.1.t:0 "Стоимость безусловных"
 ubi.1.d:0 "Ценник всеобщего базового дохода стало невозможно игнорировать. Фискальные консерваторы воспользовались прогнозируемыми расходами, предупредив, что безусловная выплата каждому гражданину - занятому или нет, богатому или бедному - возложит непосильное бремя на государственные финансы. Правительство должно решить, взять ли на себя полное финансирование сейчас или выиграть время с поэтапным подходом."
 ubi.1.f:0 "Каждое обещание всеобщего обеспечения в конечном итоге отвечает одному и тому же вопросу: кто платит и сколько?"
 ubi.1.a:0 "Приверженность полному финансированию — поглощать затраты и продвигаться вперед."
 ubi.1.b:0 "Фаза платежей — задержка полного внедрения для управления затратами."

 ubi.2.t:0 "Кто-нибудь будет работать?"
 ubi.2.d:0 "Работодатели и землевладельцы столкнулись с призывом к всеобщему базовому доходу: если государство гарантирует доход независимо от усилий, зачем кому-то работать? Аргумент интуитивный и политически мощный, даже если доказательства более неоднозначны. Правительство должно сделать выбор между экономическим обоснованием для UBI по существу или уступить беспокойство, приложив минимальные требования к работе к платежам."
 ubi.2.f:0 "Страх того, что люди перестанут работать, если им дадут шанс, пережил все политики, которые доказали, что это неправильно."
 ubi.2.a:0 "Сделайте экономическое обоснование — безопасность обеспечивает производительность, а не праздность."
 ubi.2.b:0 "Прикрепите требования к работе — признайте заботу о снижении сопротивления."

 ubi.3.t:0 "Свобода от нужды"
 ubi.3.d:0 "Для профсоюзов всеобщий базовый доход — это не просто политика благосостояния, это выполнение самого старого требования рабочего движения: свобода от принуждения к бедности. С принятием закона профсоюзные лидеры стремятся заявить, что этот момент является их собственным, предоставляя организованную политическую силу усилиям по принятию закона. Правительство должно решить, принять ли этот альянс или сохранить развертывание в качестве тихого административного вопроса."
 ubi.3.f:0 "Право сказать «нет» плохой работе всегда было реальным требованием, стоящим за каждым спором о заработной плате."
 ubi.3.a:0 "Примите мандат — пусть профсоюзы возглавят общественную кампанию."
 ubi.3.b:0 "Держите это правительственной инициативой — избегайте чрезмерной политизации развертывания."

 welfare_ubi_fiscal_alarm:0 "Фискальная тревога возросла"
 welfare_ubi_fiscal_alarm_desc:0 "Фискальные консерваторы мобилизовались против прогнозируемой стоимости всеобщего базового дохода, задерживая процесс принятия закона и заставляя правительство защищаться."

 welfare_ubi_funded_commitment:0 "Финансируемое обязательство государства"
 welfare_ubi_funded_commitment_desc:0 "Правительство взяло на себя обязательство покрыть полную стоимость UBI, укрепив свои позиции по принятию закона за счет значительных расходов на государственный кошелек."

 welfare_ubi_labour_disincentive_debate:0 "Недовольство рабочей силой опровергнуто"
 welfare_ubi_labour_disincentive_desc:0 "Правительство открыто выражает озабоченность по поводу стимулов к труду, делая экономическое обоснование того, что финансовая безопасность позволяет, а не подрывает участие рабочей силы."

 welfare_ubi_work_requirements:0 "Требования к работе прилагаются"
 welfare_ubi_work_requirements_desc:0 "Минимальные условия труда были связаны с выплатами UBI, что замедляло внедрение, но уменьшало противодействие работодателя закону."

 welfare_ubi_popular_mandate:0 "Объявлен популярный мандат"
 welfare_ubi_popular_mandate_desc:0 "Профсоюзы публично объявили UBI кульминацией борьбы рабочего движения, добавив организованный политический импульс к усилиям по принятию закона."

 welfare_ubi_employers_unconvinced:0 "Работодатели неубедительные"
 welfare_ubi_employers_unconvinced_desc:0 "Несмотря на экономические аргументы правительства, класс работодателей по-прежнему скептически относится к тому, что безусловный доход не снизит предложение рабочей силы."

 welfare_ubi_employers_appeased:0 "Работодатели успокоились"
 welfare_ubi_employers_appeased_desc:0 "Требования к работе смягчили противодействие работодателя UBI, уменьшив их активное сопротивление принятию закона."

 welfare_ubi_unions_mobilized:0 "Мобилизованные профсоюзы"
 welfare_ubi_unions_mobilized_desc:0 "Профсоюзы активно выступают за всеобщий базовый доход, объявляя его окончательной победой в долгой борьбе за экономическую свободу трудящихся."

 welfare_ubi_unions_sidelined:0 "Союзы в стороне"
 welfare_ubi_unions_sidelined_desc:0 "Решение правительства сохранить UBI в качестве тихого административного развертывания привело к тому, что профсоюзы были разочарованы и отстранены от усилий по принятию закона."

 gun_laws.1.t:0 "Аргументы безопасности"
 gun_laws.1.d:0 "Реформаторы и защитники общественного здравоохранения воспользовались запретом на огнестрельное оружие как моментом, чтобы обосновать это: меньшее количество оружия в обращении означает меньше смертей. Данные, утверждают они, однозначны. Правительство должно решить, следует ли формально принять эту формулировку, придать запрету интеллектуальную достоверность или продолжать дебаты на условиях закона и порядка и оттеснить голоса общественного здравоохранения."
 gun_laws.1.f:0 "Самые безопасные общества не всегда самые вооруженные."
 gun_laws.1.a:0 "Примите рамки общественного здравоохранения — данные на нашей стороне."
 gun_laws.1.b:0 "Охарактеризуйте это как закон и порядок — не допускайте защитников общественного здравоохранения."

 # ==========================================
 # gun_laws.2 — The Armed Forces Weigh In
 # ==========================================
 gun_laws.2.t:0 "Вооруженные силы весят в"
 gun_laws.2.d:0 "Военное руководство заинтересовано в запрете огнестрельного оружия, который выходит за рамки политики. Разоруженное гражданское население труднее организовать против государства, его легче призвать на государственные условия и меньше шансов поддерживать мятеж. Их поддержка может быть решающей, но вовлечение военных во внутренние законодательные дебаты имеет свои собственные сложности."
 gun_laws.2.f:0 "Армия всегда знала, что самое опасное оружие — это не под ее командованием."
 gun_laws.2.a:0 "Приветствуйте их поддержку — разоруженное население упорядочено."
 gun_laws.2.b:0 "Держите военных вне внутреннего законодательства — это гражданское дело."

 # ==========================================
 # gun_laws.3 — Rural Resistance
 # ==========================================
 gun_laws.3.t:0 "Сельское сопротивление"
 gun_laws.3.d:0 "Сельская местность не прислушивается к аргументам, приводимым в столице. Для сельских общин огнестрельное оружие не является политическим заявлением — это инструменты, унаследованные вместе с землей, используемые для охоты, защиты скота и для базовой безопасности изолированных поселений. Ограничение их — это не политический вопрос, а личное оскорбление. Правительство должно решить, как твердо держать линию."
 gun_laws.3.f:0 "Людям, которые написали закон, никогда не приходилось ждать три часа констебля."
 gun_laws.3.a:0 "Держитесь твердо — городские законы применяются везде одинаково."
 gun_laws.3.b:0 "Предлагайте сельские исключения — охота и защита скота являются законным использованием."

 # ==========================================
 # gun_laws.4 — A Right, Not a Privilege
 # ==========================================
 gun_laws.4.t:0 "Право, а не привилегия"
 gun_laws.4.d:0 "Сторонники неограниченного огнестрельного оружия нашли свой аргумент и не отпускают его: право собственности — это право, а не привилегия, предоставляемая государством. Любая система лицензирования, любое требование регистрации, любое ограничение — это первый шаг на пути к тирании. Правительство должно решить, следует ли принять эту схему и политическую энергию, которую она генерирует, или сделать это более практичным."
 gun_laws.4.f:0 "Существует особый вид свободы, которую можно держать только под дулом пистолета."
 gun_laws.4.a:0 "Примите аргумент о свободе — вооруженное население является свободным."
 gun_laws.4.b:0 "Оформите его практически — сосредоточьтесь на самообороне и готовности к призыву."

 # ==========================================
 # gun_laws.5 — The Safety Lobby Fights Back
 # ==========================================
 gun_laws.5.t:0 "Лобби безопасности возвращается"
 gun_laws.5.d:0 "Интеллигенция и общественное здравоохранение, выступавшие против запрета на огнестрельное оружие, не замолчали — они перенаправили свою энергию на противодействие неограниченной собственности. Их аргументы знакомы: доказательства не подтверждают утверждение о том, что большее количество оружия создает более безопасные общества. Правительство должно решить, привлекать ли их к общественным дебатам или отказывать им в платформе."
 gun_laws.5.f:0 "Каждый аргумент в пользу неограниченного огнестрельного оружия в конечном итоге должен отвечать за тела."
 gun_laws.5.a:0 "Опровергнуть их публично — свобода несет свои риски."
 gun_laws.5.b:0 "Игнорируйте их — не удостаивайте оппозицию ответом."

 # ==========================================
 # gun_laws.6 — Licensing Is Not Freedom
 # ==========================================
 gun_laws.6.t:0 "Лицензирование – это не свобода"
 gun_laws.6.d:0 "Закон о лицензированном огнестрельном оружии позволил объединить обе стороны дебатов в оппозиции. Правозащитники рассматривают любое требование лицензирования как нарушение фундаментальной свободы. Сторонники безопасности рассматривают это как полумеру, которая не делает ничего значимого для снижения вреда. Правительство находит себя защищающим золотую середину, которую ни один фланг не хочет оккупировать."
 gun_laws.6.f:0 "Компромисс, который никого не удовлетворяет, может быть правильным ответом."
 gun_laws.6.a:0 "Защитить золотую середину — лицензирование разумно и соразмерно."
 gun_laws.6.b:0 "Признайте напряженность — обещайте пересмотр, как только закон вступит в силу."

 gun_law_safety_argument:0 "Дело в области общественного здравоохранения"
 gun_law_safety_argument_desc:0 "Правительство приняло решение о запрете на огнестрельное оружие, придав законодательству интеллектуальный авторитет и расширив его привлекательность."

 gun_law_military_position:0 "Военная поддержка"
 gun_law_military_position_desc:0 "Военное руководство публично поддержало гражданское разоружение, добавив институциональные полномочия к усилиям по принятию."

 gun_law_rural_resistance:0 "Сельское сопротивление"
 gun_law_rural_resistance_desc:0 "Сельские общины активно сопротивляются ограничениям на огнестрельное оружие, задерживая законодательный процесс и заставляя правительство оправдывать закон для своих наиболее пострадавших граждан."

 gun_law_rights_framing:0 "Либерти Фрейминг принят"
 gun_law_rights_framing_desc:0 "Правительство приняло аргумент о том, что владение оружием является фундаментальным правом, активизируя сторонников и предоставляя закону принципиальную основу."

 gun_law_practical_framing:0 "Практическое обрамление принято"
 gun_law_practical_framing_desc:0 "Случаи применения неограниченного огнестрельного оружия основывались на практических соображениях — самообороне и готовности к призыву, а не на идеологических соображениях."

 gun_law_safety_lobby_opposition:0 "Лоббистская оппозиция"
 gun_law_safety_lobby_opposition_desc:0 "Защитники общественного здравоохранения и интеллигенция усиливают организованную оппозицию неограниченному огнестрельному оружию, задерживая процесс принятия закона."

 gun_law_compromise_resistance:0 "Компромисс под огнем"
 gun_law_compromise_resistance_desc:0 "Закону о лицензированном огнестрельном оружии противостоят с обеих сторон — защитники прав на оружие считают его нарушением, а защитники безопасности считают его недостаточным."

 gun_law_compromise_defended:0 "Компромисс защищённый"
 gun_law_compromise_defended_desc:0 "Правительство сделало публичное дело для лицензированного огнестрельного оружия, отталкиваясь от оппозиции с обоих флангов."

 gun_law_intelligentsia_engaged:0 "Интеллигенция вовлечена"
 gun_law_intelligentsia_engaged_desc:0 "Исследователи общественного здравоохранения и реформаторы активно предоставляют свои полномочия в деле об ограничениях на огнестрельное оружие."

 gun_law_intelligentsia_sidelined:0 "Интеллигенция в стороне"
 gun_law_intelligentsia_sidelined_desc:0 "Правительство решило сформулировать запрет на огнестрельное оружие как вопрос закона и порядка, не допуская голоса общественного здравоохранения."

 gun_law_intelligentsia_rebuked:0 "Интеллигенция отвергла"
 gun_law_intelligentsia_rebuked_desc:0 "Лобби безопасности было публично оспорено, и их аргументы были отклонены, хотя это обострило их оппозицию."

 gun_law_intelligentsia_ignored:0 "Интеллигенция игнорируется"
 gun_law_intelligentsia_ignored_desc:0 "Правительство отказалось взаимодействовать с оппозицией лобби безопасности, лишив их платформы ценой углубления их разочарования."

 gun_law_military_backing:0 "Военная поддержка"
 gun_law_military_backing_desc:0 "Вооруженные силы публично поддержали гражданское разоружение, придав решающее институциональное значение усилиям по принятию."

 gun_law_military_sidelined:0 "Военные в стороне"
 gun_law_military_sidelined_desc:0 "Правительство держало военное руководство вне внутренних дебатов об огнестрельном оружии, оставляя вооруженные силы в стороне от законодательного процесса."

 gun_law_rural_folk_alienated:0 "Сельские люди отчуждены"
 gun_law_rural_folk_alienated_desc:0 "Единообразное применение ограничений на огнестрельное оружие заставляет сельские общины чувствовать себя мишенью правительства, которое не понимает их образ жизни."

 gun_law_rural_folk_appeased:0 "Сельские жители успокоились"
 gun_law_rural_folk_appeased_desc:0 "Освобождения от охоты и защиты скота смягчили сельское сопротивление ограничениям, не отказываясь от основного намерения закона."

 gun_law_rural_folk_energized:0 "Сельские жители энергичны"
 gun_law_rural_folk_energized_desc:0 "Свободное обрамление неограниченным огнестрельным оружием сильно резонировало с сельскими общинами, создавая сильную поддержку закона на низовом уровне."
 
  # ==========================================
 # lgbtq_laws.1 — The Church Demands Action
 # ==========================================
 lgbtq_laws.1.t:0 "Церковь требует действий"
 lgbtq_laws.1.d:0 "Набожные ясно дали понять: активное подавление гомосексуализма является не просто политическим предпочтением, а моральным обязательством. Религиозные лидеры требуют, чтобы правительство сформулировало законодательство в явно богословских терминах, придавая вес божественной власти закону. Правительство должно решить, принять ли это решение или сохранить оправдание на светских основаниях."
 lgbtq_laws.1.f:0 "Самые опасные законы — это те, которые считают, что они отвечают высшим властям."
 lgbtq_laws.1.a:0 "Примите моральные рамки — это вопрос божественного закона."
 lgbtq_laws.1.b:0 "Охарактеризуйте это как социальный порядок — не допускайте оправдания религии."

 # ==========================================
 # lgbtq_laws.2 — The Cost of Enforcement
 # ==========================================
 lgbtq_laws.2.t:0 "Стоимость исполнения"
 lgbtq_laws.2.d:0 "Закон против гомосексуализма так же эффективен, как и его применение. Вопрос, стоящий перед правительством, заключается не в том, следует ли ограничивать — эти дебаты улажены — а в том, насколько агрессивно государственный аппарат будет преследовать нарушения. Полный контроль является дорогостоящим и инвазивным. Пассивное правоприменение опирается на социальное давление и доносы. Каждый подход несет свои издержки."
 lgbtq_laws.2.f:0 "Государство, которое регулирует частное поведение, должно решить, насколько глубоко в частную жизнь оно готово проникнуть."
 lgbtq_laws.2.a:0 "Полное правоприменение — без затрат."
 lgbtq_laws.2.b:0 "Пассивное правоприменение — пусть социальное давление делает работу."

 # ==========================================
 # lgbtq_laws.3 — Decriminalization Is Not Endorsement
 # ==========================================
 lgbtq_laws.3.t:0 "Декриминализация не является одобрением"
 lgbtq_laws.3.d:0 "Консервативные голоса приветствовали законопроект о декриминализации с предсказуемой тревогой. Предпочтительный аргумент правительства — что снятие уголовных наказаний не является моральным одобрением — не удовлетворил их. Вопрос заключается в том, следует ли делать это публично и непосредственно или действовать тихо и избегать внимания, которое вызовет общественная дискуссия."
 lgbtq_laws.3.f:0 "Расстояние между терпимостью и одобрением никогда не было столь спорным."
 lgbtq_laws.3.a:0 "Сделайте дело ясным — декриминализация снимает наказание, а не одобрение."
 lgbtq_laws.3.b:0 "Сохраняйте спокойствие — пройдите реформу, не привлекая к ней внимания."

 # ==========================================
 # lgbtq_laws.4 — The Intelligentsia Makes Its Case
 # ==========================================
 lgbtq_laws.4.t:0 "Интеллигенция делает свое дело"
 lgbtq_laws.4.d:0 "Реформаторы и ученые-юристы вступили в дискуссию с прямым аргументом: государство не имеет законного интереса к частному поведению соглашающихся взрослых, а криминализация гомосексуализма является нарушением самых основных принципов личной свободы. Правительство должно решить, следует ли формально согласиться с этим аргументом или сохранить реформу на чисто законодательных условиях."
 lgbtq_laws.4.f:0 "Свобода, требующая разрешения от государства, вовсе не является свободой."
 lgbtq_laws.4.a:0 "Пусть они возглавят аргумент — личная свобода неотчуждаема."
 lgbtq_laws.4.b:0 "Держите его законодательным — избегайте философских дебатов."

 # ==========================================
 # lgbtq_laws.5 — Marriage Is a Social Institution
 # ==========================================
 lgbtq_laws.5.t:0 "Брак как социальный институт"
 lgbtq_laws.5.d:0 "Консерваторы нашли свой самый мощный аргумент против равенства брака: брак — это не просто юридическое соглашение, а социальный институт с корнями старше самого государства. Переопределить это значит разгадать что-то, что нельзя собрать воедино. Правительство должно выбирать между противостоянием этому аргументу или попыткой смягчить оппозицию с помощью религиозных исключений."
 lgbtq_laws.5.f:0 "Каждый институт когда-то был новым."
 lgbtq_laws.5.a:0 "Переформулируйте это: гражданский брак принадлежит государству, а не церкви."
 lgbtq_laws.5.b:0 "Предлагайте религиозные исключения — церкви могут отказаться от проведения церемоний."

 # ==========================================
 # lgbtq_laws.6 — Equal Before the Law
 # ==========================================
 lgbtq_laws.6.t:0 "Равные перед законом"
 lgbtq_laws.6.d:0 "Интеллигенция сформулировала брачное равенство как логическое завершение гражданских прав — общество, которое предоставляет некоторым гражданам права, которые оно отрицает другим на основе того, кого они любят, — это общество, которое еще не выполнило свои обещания. Правительство должно решить, относиться ли к этому моменту как к ориентиру или спокойно распространять права без веса декларации."
 lgbtq_laws.6.f:0 "Равенство, о котором нужно молчать, никогда не было равенством."
 lgbtq_laws.6.a:0 "Сделать это знаковым — равенство перед законом не допускает исключений."
 lgbtq_laws.6.b:0 "Держите его административным — спокойно продлевайте права без декларации."

 # ==========================================
 # abortion_laws.1 — Life Begins at Conception
 # ==========================================
 abortion_laws.1.t:0 "Жизнь начинается с зачатия"
 abortion_laws.1.d:0 "Набожные пришли к дискуссии об абортах с позицией, которая не допускает компромисса: жизнь начинается с зачатия, и государство морально обязано защищать его с этого момента. Их требование состоит не только в том, чтобы запретить аборты, но и в том, чтобы запрет был сформулирован в терминах, отражающих его моральную серьезность. Вместо этого правительство должно решить, принять ли это определение или обосновать закон по демографическим и политическим причинам."
 abortion_laws.1.f:0 "Наиболее абсолютные моральные позиции не оставляют места для самых трудных случаев."
 abortion_laws.1.a:0 "Примите моральные рамки: жизнь священна, и государство должно ее защищать."
 abortion_laws.1.b:0 "Охарактеризуйте это как демографическую политику — не допускайте оправдания религии."

 # ==========================================
 # abortion_laws.2 — The Exceptions Question
 # ==========================================
 abortion_laws.2.t:0 "Вопрос об исключениях"
 abortion_laws.2.d:0 "Как только законопроект вступил в силу, его противники нашли самую сложную почву для его оспаривания: случаи изнасилования, инцеста и медицинской необходимости. Это те случаи, которые превращают абстрактные моральные позиции в живые реалии. Правительство должно решить, придерживаться ли линии абсолютного запрета или вырезать узкие медицинские исключения, которые признают самые сложные обстоятельства."
 abortion_laws.2.f:0 "Абстрактные принципы становятся очень конкретными, когда они являются чьей-то жизнью."
 abortion_laws.2.a:0 "Никаких исключений — закон должен быть абсолютным, чтобы что-то значить."
 abortion_laws.2.b:0 "Разрешить узкие медицинские исключения — самые трудные случаи должны быть устранены."

 # ==========================================
 # abortion_laws.3 — The State Has No Place in This Decision
 # ==========================================
 abortion_laws.3.t:0 "Государству нет места в этом решении."
 abortion_laws.3.d:0 "Дело о неограниченных абортах нашло свою самую мощную формулировку на языке телесной автономии: ни одно государство не имеет права принуждать человека продолжать беременность против его воли. Интеллигенция выдвигает этот аргумент публично и со значительной силой. Правительство должно решить, принять ли его в качестве центрального элемента реформы или представить изменения как простой вопрос доступа к здравоохранению."
 abortion_laws.3.f:0 "Право на собственное тело либо универсально, либо вообще не является правом."
 abortion_laws.3.a:0 "Сделайте телесную автономию центральным элементом — ни одно государство не имеет права принуждать к беременности."
 abortion_laws.3.b:0 "Охарактеризуйте это как здравоохранение — не допускайте философского аргумента."

 # ==========================================
 # abortion_laws.4 — The Devout Will Not Yield
 # ==========================================
 abortion_laws.4.t:0 "The Devout не выйдет"
 abortion_laws.4.d:0 "Любое движение в сторону либерализации закона об абортах встречалось с организованной религиозной оппозицией, которая не проявляет никаких признаков смягчения. Набожные рассматривают это как вопрос, по которому компромисс невозможен, и они готовы использовать все имеющиеся политические инструменты, чтобы затормозить законодательство. Правительство должно решить, противостоять им напрямую или предложить защиту совести, которая смягчит их сопротивление, не удовлетворяя их требования."
 abortion_laws.4.f:0 "Оппозиция, которая считает, что она отвечает Богу, является самой трудной оппозицией для переговоров."
 abortion_laws.4.a:0 "Противостоять им напрямую — государство управляет, а не церковь."
 abortion_laws.4.b:0 "Предлагайте защиту совести — медицинский персонал может отказаться по моральным соображениям."

 # ==========================================
 # LGBTQ Enactment Modifier Localization
 # ==========================================
 lgbtq_law_religious_mandate:0 "Объявлен религиозный мандат"
 lgbtq_law_religious_mandate_desc:0 "Набожные публично обрисовали закон о угнетении как моральное и религиозное обязательство, предоставляя богословскую власть усилиям по принятию."

 lgbtq_law_enforcement_scope:0 "Сфера применения"
 lgbtq_law_enforcement_scope_desc:0 "Правительство взяло на себя обязательство активно применять ограничения, укрепляя законодательный импульс закона."

 lgbtq_law_enforcement_cost:0 "Расходы на исполнение поглощены"
 lgbtq_law_enforcement_cost_desc:0 "Финансирование полного соблюдения ограничений создает дополнительную нагрузку на государственные расходы."

 lgbtq_law_decrim_framing:0 "Декриминализация в рамках"
 lgbtq_law_decrim_framing_desc:0 "Правительство тщательно сформулировало декриминализацию как отмену наказания, а не одобрение, облегчая путь через дебаты."

 lgbtq_law_quiet_passage:0 "Тихий проход пытается"
 lgbtq_law_quiet_passage_desc:0 "Решение избежать публичных дебатов замедлило процесс принятия закона, поскольку реформа продолжается без организованной общественной поддержки."

 lgbtq_law_liberty_argument:0 "Аргументы свободы сделаны"
 lgbtq_law_liberty_argument_desc:0 "Интеллигенция публично назвала декриминализацию вопросом личной свободы, придав реформе философский авторитет."

 lgbtq_law_institution_debate:0 "Учрежденческие дебаты"
 lgbtq_law_institution_debate_desc:0 "Правительство вступило в публичные дебаты о природе брака как гражданского института, изменив условия борьбы за принятие закона."

 lgbtq_law_religious_exemptions:0 "Религиозные исключения предложены"
 lgbtq_law_religious_exemptions_desc:0 "Религиозным учреждениям предлагаются исключения из проведения однополых церемоний, что замедляет их проведение, но смягчает консервативную оппозицию."

 lgbtq_law_equality_mandate:0 "Объявлен мандат на равенство"
 lgbtq_law_equality_mandate_desc:0 "Правительство официально объявило равенство брака важной вехой в области гражданских прав, что дало мощный политический импульс для принятия закона."

 lgbtq_law_devout_empowered:0 "Обсуждение Empowered"
 lgbtq_law_devout_empowered_desc:0 "Религиозная община официально включена в законодательные рамки, укрепляя свои политические позиции и углубляя свое участие."

 lgbtq_law_devout_sidelined:0 "Обсуждение Sidelined"
 lgbtq_law_devout_sidelined_desc:0 "Правительство сохранило религиозные рамки из оправдания, оставив благочестивых разъединенными и тихо разочарованными."

 lgbtq_law_conservatives_unconvinced:0 "Консерваторы не убеждены"
 lgbtq_law_conservatives_unconvinced_desc:0 "Консервативная оппозиция услышала формулировки правительства и остается неубедительной, поддерживая свое сопротивление реформе."

 lgbtq_law_conservatives_rebuked:0 "Консерваторов упрекают"
 lgbtq_law_conservatives_rebuked_desc:0 "Правительство публично оспорило консервативную оппозицию равенству брака, смущая их позицию, но обостряя их решимость."

 lgbtq_law_conservatives_placated:0 "Консерваторы распустились"
 lgbtq_law_conservatives_placated_desc:0 "Религиозные исключения уменьшили немедленную интенсивность консервативной оппозиции, не урегулировав разногласия."

 lgbtq_law_intelligentsia_engaged:0 "Интеллигенция вовлечена"
 lgbtq_law_intelligentsia_engaged_desc:0 "Реформаторы и ученые-юристы активно выступают за права ЛГБТК, предоставляя интеллектуальные полномочия усилиям по принятию закона."

 lgbtq_law_intelligentsia_sidelined:0 "Интеллигенция в стороне"
 lgbtq_law_intelligentsia_sidelined_desc:0 "Правительство решило сохранить реформу на законодательном, а не на философском уровне, оставив интеллигенцию без формальной роли в дебатах."

 abortion_law_moral_absolute:0 "Моральный абсолют объявлен"
 abortion_law_moral_absolute_desc:0 "Набожные успешно сформулировали запрет абортов как моральный абсолют, предоставляя богословские полномочия для принятия закона."

 abortion_law_demographic_framing:0 "Принято демографическое обрамление"
 abortion_law_demographic_framing_desc:0 "Правительство оправдывает запрет на аборты по демографическим и политическим причинам, не допуская религиозного языка к официальному обоснованию."

 abortion_law_exceptions_debate:0 "Исключения разрешены"
 abortion_law_exceptions_debate_desc:0 "Правительство заняло четкую позицию по вопросу об исключениях, обеспечив прочную основу для продолжения процесса принятия."

 abortion_law_medical_exceptions:0 "Медицинские исключения разрешены"
 abortion_law_medical_exceptions_desc:0 "В законодательство были внесены небольшие медицинские исключения, замедляющие прохождение, но уменьшающие сопротивление со стороны умеренных."

 abortion_law_autonomy_argument:0 "Телесная автономия оспаривается"
 abortion_law_autonomy_argument_desc:0 "Интеллигенция сделала телесную автономию центральным элементом дела о неограниченных абортах, вызвав сильную поддержку среди реформистских ИГ."

 abortion_law_healthcare_framing:0 "Каркас здравоохранения принят"
 abortion_law_healthcare_framing_desc:0 "Правительство назвало неограниченный аборт вопросом здравоохранения, расширив его привлекательность, избегая более глубоких философских дебатов."

 abortion_law_religious_opposition:0 "Религиозная оппозиция нарастала"
 abortion_law_religious_opposition_desc:0 "Набожные активно тормозят либерализацию закона об абортах, усиливая организованную оппозицию, которая проверяет решимость правительства."

 abortion_law_devout_empowered:0 "Обсуждение Empowered"
 abortion_law_devout_empowered_desc:0 "Религиозная община была поставлена в центр оправдания запрета абортов, что значительно укрепило ее политические позиции."

 abortion_law_devout_sidelined:0 "Обсуждение Sidelined"
 abortion_law_devout_sidelined_desc:0 "Правительство сохранило религиозные рамки запрета на аборты, оставив благочестивого настоящего, но без формальной роли в оправдании."

 abortion_law_devout_rebuked:0 "Devout Rebuked скачать"
 abortion_law_devout_rebuked_desc:0 "Правительство напрямую противостояло религиозной оппозиции либерализации абортов, ослабляя политическую позицию набожного, но радикализируя их базу."

 abortion_law_devout_appeased:0 "Умиротворенный Devout"
 abortion_law_devout_appeased_desc:0 "Защита совести медицинского персонала смягчила религиозную оппозицию либерализации абортов без удовлетворения основных требований набожного."

 abortion_law_intelligentsia_engaged:0 "Интеллигенция вовлечена"
 abortion_law_intelligentsia_engaged_desc:0 "Ученые-юристы и реформаторы активно выступают за права абортов, придавая интеллектуальную и моральную достоверность усилиям по принятию закона."

 abortion_law_intelligentsia_sidelined:0 "Интеллигенция в стороне"
 abortion_law_intelligentsia_sidelined_desc:0 "Решение представить аборты в качестве медицинской проблемы не позволило интеллигенции вести философские дебаты."
