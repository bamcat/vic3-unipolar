 # ==========================================
 # OPENING EVENT — ndp_events.0
 # ==========================================

 ndp_events.0.t: "Начинается программа национального развития"
 ndp_events.0.d_industrial: "Правительство [ROOT.GetCountry.GetName] взяло на себя обязательство десятилетия промышленной экспансии. Инвестиции будут направлены на заводы, шахты и инфраструктуру, которая их соединяет. Этот план является амбициозным, а препятствия значительными, но видение ясно: создать производственные мощности, которые определят место [ROOT.GetCountry.GetName] в мире."
 ndp_events.0.d_military: "Правительство [ROOT.GetCountry.GetName] взяло на себя обязательство десятилетия военной экспансии. Будут построены казармы, обучены офицеры и реформированы доктрины. Независимо от того, является ли мотивация защитой, сдерживанием или амбициями, послание миру безошибочно: [ROOT.GetCountry.GetName] намерено восприниматься всерьез."
 ndp_events.0.d_resource: "Правительство [ROOT.GetCountry.GetName] взяло на себя обязательства по десятилетию развития ресурсной экономики. Сама земля — ее почвы и минералы — будет двигателем роста. Это ставка на то, что [ROOT.GetCountry.GetName] уже есть, и план сделать гораздо больше."
 ndp_events.0.d_service: "Правительство [ROOT.GetCountry.GetName] взяло на себя обязательства по десятилетию развития экономики услуг. Школы, банки и правительственные министерства будут получать инвестиции. Ставка заключается в том, что более умная, лучше управляемая страна в конечном итоге сильнее."
 ndp_events.0.f: "Десять лет. Одно направление."
 ndp_events.0.a: "Пусть программа начнется"

 # ==========================================
 # INDUSTRIAL PATH EVENTS
 # ==========================================

 ndp_events.1.t: "Промышленный вопрос"
 ndp_events.1.d: "Через два года после завершения программы развития необходимо уточнить направление промышленных инвестиций. Страна не может построить все сразу. Планировщики и промышленники разделены: некоторые выступают за сосредоточение ресурсов на тяжелой промышленности — железе, стали, угле. Другие утверждают, что легкое производство обеспечивает более быструю отдачу и более широкую занятость."
 ndp_events.1.f: "Сталь или ткань — народ должен выбирать."
 ndp_events.1.a: "Тяжелая промышленность — основа современной энергетики"
 ndp_events.1.b: "Легкое производство — приоритет занятости и потребительских товаров"

 ndp_events.2.t: "Инвестиционный драйв"
 ndp_events.2.d: "Промышленная программа набирает обороты, но темпы строительства зависят от того, откуда берется капитал. Государственные планировщики настаивают на прямых государственных инвестициях, направляя средства в приоритетные сектора без неопределенности рынка. Частные промышленники возражают, что стимулы к конкуренции и прибыли дадут лучшие результаты, чем бюрократическое распределение."
 ndp_events.2.f: "Рынок или план — дебаты так же стары, как сама промышленность."
 ndp_events.2.a: "Государственные инвестиции — правительство будет строить"
 ndp_events.2.b: "Частное предпринимательство: привлечь инвесторов и сделать шаг назад"

 ndp_events.3.t: "Трудовой вопрос"
 ndp_events.3.d: "Заводы работают, шахты производят, но рабочие, которые делают это возможным, требуют большего. Программа развития создала рабочие места, но она также породила ожидания. Владельцы заводов хотят больше времени и меньше ограничений. Организаторы хотят обратного. Правительство должно решить, на какой стороне этого аргумента оно стоит."
 ndp_events.3.f: "Двигатель работает на угле и на людях, которые его копают."
 ndp_events.3.a: "Повышение производительности — извлечение максимальной производительности из рабочей силы"
 ndp_events.3.b: "Инвестируйте в работников — лучшие условия означают стабильный, устойчивый рост"

 ndp_events.4.t: "Десятилетие промышленности"
 ndp_events.4.d: "Десять лет промышленного развития завершены. Строились заводы, прокладывались железные дороги, расширялись шахты — результаты реальные и видимые. [ROOT.GetCountry.GetName] вступает в следующее десятилетие с более прочной производственной базой, чем это было в начале программы. Вопрос теперь в том, что будет дальше."
 ndp_events.4.f: "Кузница выполнила свою работу."
 ndp_events.4.a: "Диаграмма следующего курса"
 ten_year_programme_concluded:0 "Десятилетняя программа завершилась."
 # ==========================================
 # MILITARY PATH EVENTS
 # ==========================================

 ndp_events.11.t: "Доктринный вопрос"
 ndp_events.11.d: "За два года военной экспансии появилось больше солдат, больше оружия и больше вариантов, но фундаментальный вопрос доктрины остается нерешенным. Генеральный штаб разделился. Одна фракция настаивает на сосредоточении внимания на сухопутной мощи: массовые армии, глубина обороны и континентальное господство. Другой утверждает, что военно-морская экспансия обеспечивает большую стратегическую гибкость и способность проецировать силу за пределы границ."
 ndp_events.11.f: "Меч или флот — каждое из них подразумевает различное видение силы."
 ndp_events.11.a: "Земельная доктрина: создайте армию, которой не сможет противостоять ни один сосед"
 ndp_events.11.b: "Морская доктрина — проектная мощь за горизонтом"

 ndp_events.12.t: "Обсуждение закупок"
 ndp_events.12.d: "Военные нуждаются в современной технике, но откуда она взялась? Внутреннее производство оружия позволит наращивать промышленный потенциал наряду с военной мощью, но потребуется время и инвестиции, чтобы созреть. Зарубежные закупки обеспечивают более быстрые результаты при финансовых затратах и создают зависимость от внешних поставщиков, что вызывает беспокойство у некоторых генералов."
 ndp_events.12.f: "Лучшее оружие — это то, которое вы можете использовать."
 ndp_events.12.a: "Строительство отечественных оружейных производств — инвестиции в самообеспечение"
 ndp_events.12.b: "Купить иностранный — принять стоимость за немедленную возможность"

 ndp_events.13.t: "Дух армии"
 ndp_events.13.d: "Через восемь лет после начала военной программы, аппаратура уже готова, но только аппаратура не выигрывает войны. Вопрос теперь в боевом духе сил. Некоторые офицеры выступают за националистическую моральную кампанию: призывы к патриотизму и национальной чести, которые заставят каждого солдата бороться сильнее. Другие выступают за инвестирование в профессионализм офицерского корпуса — руководство, тактику и институциональные знания."
 ndp_events.13.f: "Армия сражается со своим снаряжением и своей душой."
 ndp_events.13.a: "Запуск националистической кампании морального духа — разжигание боевого духа"
 ndp_events.13.b: "Профессионализируйте офицерский корпус — инвестируйте в лидерство"

 ndp_events.14.t: "Десятилетие военной экспансии"
 ndp_events.14.d: "Десять лет военного строительства завершены. Вооруженные силы [ROOT.GetCountry.GetName] больше, лучше оснащены и более способны, чем они были, когда программа началась. То, что они делают с этой возможностью и стоили ли инвестиции этих затрат, будет определяться следующими решениями."
 ndp_events.14.f: "Меч был выкован. Теперь он должен найти свое предназначение."
 ndp_events.14.a: "Диаграмма следующего курса"

 # ==========================================
 # RESOURCE ECONOMY PATH EVENTS
 # ==========================================

 ndp_events.21.t: "Награда за землю"
 ndp_events.21.d: "Через два года после начала ресурсной программы должен быть сделан фундаментальный выбор: какую ресурсную экономику будет строить [ROOT.GetCountry.GetName]? Сельское хозяйство — кормление растущего населения и производство экспортных культур — обеспечивает стабильность и широкую занятость. Добыча сырья — добыча полезных ископаемых, лесозаготовки, бурение — обеспечивает более быстрый доход, но является более волатильной и оставляет экономику подверженной колебаниям цен на сырьевые товары."
 ndp_events.21.f: "Земля дает то, что дает. Вопрос в том, что вы об этом спрашиваете."
 ndp_events.21.a: "Сельское хозяйство — построй хлебную корзину"
 ndp_events.21.b: "Извлечение — выкапывание богатства под"

 ndp_events.22.t: "Земельная политика"
 ndp_events.22.d: "Через пять лет перед ресурсной программой встанет главный земельный вопрос. Есть еще невостребованные или недоиспользуемые территории, которые могут быть введены в производство, но это требует инвестиций в инфраструктуру, поселенцев и правовые рамки. Альтернативой является интенсифицировать производство на существующих землях, выжимая больше продукции из уже отработанного."
 ndp_events.22.f: "Новая земля или более глубокие корни — вечная дилемма фермера."
 ndp_events.22.a: "Расширяйтесь в новые земли — откройте границу"
 ndp_events.22.b: "Интенсифицируйте существующее производство — получайте больше от того, что у нас есть"

 ndp_events.23.t: "Экспортный вопрос"
 ndp_events.23.d: "Через восемь лет после начала программы ресурсный сектор начинает производить, но кто выиграет, зависит от того, куда он пойдет. Поиск экспортных соглашений с иностранными рынками позволит увеличить выручку и интегрировать [ROOT.GetCountry.GetName] в глобальные торговые сети, но создаст зависимость от внешнего спроса. Приоритетное внимание к внутренним поставкам оградит страну от ценовых потрясений и укрепит продовольственную безопасность, но откажется от прибыли от экспорта."
 ndp_events.23.f: "Накормим мир или накормим нацию первыми."
 ndp_events.23.a: "Ищите экспортные рынки — продавайте излишки за границу"
 ndp_events.23.b: "Приоритет внутреннего предложения - продовольственная безопасность выше прибыли"

 ndp_events.24.t: "Десятилетие развития ресурсов"
 ndp_events.24.d: "Десять лет развития ресурсной экономики завершены. Фермы, шахты и места добычи [ROOT.GetCountry.GetName] Это больше, чем было в начале программы. Вопросы о том, были ли достигнуты справедливые результаты и была ли добыча устойчивой, будут решаться в следующем десятилетии."
 ndp_events.24.f: "Что дает земля, помнит земля."
 ndp_events.24.a: "Диаграмма следующего курса"

 # ==========================================
 # SERVICE ECONOMY PATH EVENTS
 # ==========================================

 ndp_events.31.t: "Сервисный вопрос"
 ndp_events.31.d: "Через два года после начала работы над программой необходимо уточнить направление. Два видения экономики услуг конкурируют за приоритет: финансовый сектор — банковское дело, страхование и торговля — который быстро генерирует богатство и привлекает инвестиции, или образование и бюрократия — школы, университеты и государственные учреждения — которые строят человеческий капитал и потенциал управления, которые лежат в основе всего остального."
 ndp_events.31.f: "Реестр или библиотека — оба являются основой современности."
 ndp_events.31.a: "Финансовый сектор — строительство банков и торговых домов"
 ndp_events.31.b: "Образование и бюрократия: как построить человеческий капитал"

 ndp_events.32.t: "Вопрос таланта"
 ndp_events.32.d: "Через пять лет экономика услуг растет, но для поддержания этого роста ей нужны квалифицированные люди. Один из вариантов заключается в привлечении иностранных талантов: откройте двери инженерам, финансистам и профессионалам из-за рубежа, признавая, что некоторые из достижений вернутся к посторонним. Другой вариант заключается в том, чтобы вкладывать значительные средства в отечественное образование — медленнее, но создавать возможности, которые остаются."
 ndp_events.32.f: "Лучшие умы идут туда, где их ценят."
 ndp_events.32.a: "Привлечение иностранных талантов — откройте двери"
 ndp_events.32.b: "Инвестировать в отечественное образование — строить изнутри"

 ndp_events.33.t: "Институциональные реформы"
 ndp_events.33.d: "Через восемь лет экономика услуг нуждается в том, чтобы ее институты созрели. Представляются два пути: либерализация — сокращение регулирования, сокращение бюрократии и более свободное функционирование рынков — или институциональное укрепление — инвестирование в верховенство закона, права собственности и надежность самого правительства. Обе страны могут обеспечить рост, но они производят разные виды стран."
 ndp_events.33.f: "Правила игры имеют такое же значение, как и игроки."
 ndp_events.33.a: "Либерализация рынков: дерегулирование и отступление"
 ndp_events.33.b: "Укрепление институтов — инвестиции в верховенство права"

 ndp_events.34.t: "Десятилетие развития сервиса"
 ndp_events.34.d: "Десять лет развития экономики услуг завершены. Банки более изощрены, школы лучше укомплектованы персоналом, правительство более способно, чем когда началась программа. Означает ли это широкое процветание, которое оправдывает инвестиции, это долгосрочный вопрос, на который начнет отвечать следующее десятилетие."
 ndp_events.34.f: "Инфраструктура ума превосходит все остальные."
 ndp_events.34.a: "Диаграмма следующего курса"

 # ==========================================
 # MODIFIERS
 # ==========================================

 ndp_modifier_industrial: "Путь развития промышленности"
 ndp_modifier_industrial_desc: "Национальные ресурсы направляются на расширение промышленности. Темпы строительства растут, а пропускная способность производства улучшается по всем направлениям."

 ndp_modifier_military: "Путь военной экспансии"
 ndp_modifier_military_desc: "Страна отдает приоритет военному развитию. Исследования сосредоточены на военных технологиях и вооруженных силах."

 ndp_modifier_resource: "Путь ресурсной экономики"
 ndp_modifier_resource_desc: "Национальные ресурсы направляются в сельскохозяйственные и добывающие отрасли. Земля будет работать."

 ndp_modifier_service: "Путь к экономике"
 ndp_modifier_service_desc: "Национальные ресурсы направляются на образование, бюрократию и финансовое развитие. Человеческий капитал является двигателем роста."

 ndp_modifier_industrial_heavy: "Фокус тяжелой промышленности"
 ndp_modifier_industrial_heavy_desc: "Инвестиции сосредоточены в железо, сталь и уголь — основы промышленной энергетики."

 ndp_modifier_industrial_light: "Светотехнический фокус"
 ndp_modifier_industrial_light_desc: "Инвестиции сосредоточены в производство текстиля и потребительских товаров."

 ndp_modifier_state_heavy_industry: "Зона тяжелой промышленности"
 ndp_modifier_state_heavy_industry_desc: "Это государство признано приоритетной зоной тяжелой промышленности."

 ndp_modifier_state_light_industry: "Зона легкой промышленности"
 ndp_modifier_state_light_industry_desc: "Это государство было определено как приоритетная зона легкого производства."

 ndp_modifier_industrial_state_investment: "Государственный инвестиционный драйв"
 ndp_modifier_industrial_state_investment_desc: "Правительство напрямую финансирует промышленное строительство."

 ndp_modifier_industrial_state_investment_cost: "Затраты на промышленные инвестиции"
 ndp_modifier_industrial_state_investment_desc: "Государственные инвестиции в промышленность напрягают бюджет."

 ndp_modifier_industrial_private_investment: "Частные инвестиционные стимулы"
 ndp_modifier_industrial_private_investment_desc: "Стимулы для частного капитала повышают эффективность инвестиционного пула."

 ndp_modifier_industrial_labour_push: "Интенсивная трудовая политика"
 ndp_modifier_industrial_labour_push_desc: "Рабочих сильно подталкивают — производительность растет, но растет и недовольство."

 ndp_modifier_industrial_labour_welfare: "Инвестиции в благосостояние работников"
 ndp_modifier_industrial_labour_welfare_desc: "Инвестиции в условия труда окупаются стабильностью и устойчивым ростом производства."

 ndp_modifier_military_army: "Земельная доктрина"
 ndp_modifier_military_army_desc: "Военная программа сосредоточена на сухопутной мощи — массовых армиях и континентальном доминировании."

 ndp_modifier_military_navy: "Морская доктрина"
 ndp_modifier_military_navy_desc: "Военная программа сосредоточена на военно-морской мощи и проекции силы."

 ndp_modifier_military_domestic_arms: "Отечественная военная промышленность"
 ndp_modifier_military_domestic_arms_desc: "Инвестиции в отечественное производство оружия приносят дивиденды по пропускной способности."

 ndp_modifier_military_foreign_arms: "Иностранные закупки"
 ndp_modifier_military_foreign_arms_desc: "Иностранная техника наращивает военный потенциал."

 ndp_modifier_military_foreign_arms_cost: "Затраты на иностранные закупки"
 ndp_modifier_military_foreign_arms_cost_desc: "Покупка иностранного оружия стоит дорого."

 ndp_modifier_military_nationalist_morale: "Националистическая моральная кампания"
 ndp_modifier_military_nationalist_morale_desc: "Призывы к национальной чести поднимают боевой дух вооруженных сил."

 ndp_modifier_military_professional_officers: "Профессиональный офицерский корпус"
 ndp_modifier_military_professional_officers_desc: "Инвестиции в обучение офицеров повышают тактические показатели."

 ndp_modifier_resource_agriculture: "Сельскохозяйственный фокус"
 ndp_modifier_resource_agriculture_desc: "Национальные ресурсы сосредоточены на развитии сельского хозяйства."

 ndp_modifier_resource_extraction: "Фокус экстракции"
 ndp_modifier_resource_extraction_desc: "Национальные ресурсы сосредоточены на добыче и добыче сырья."

 ndp_modifier_state_agriculture: "Сельскохозяйственная приоритетная зона"
 ndp_modifier_state_agriculture_desc: "Это государство было определено в качестве приоритетной сельскохозяйственной зоны."

 ndp_modifier_state_extraction: "Приоритетная зона экстракции"
 ndp_modifier_state_extraction_desc: "Это государство определено приоритетной зоной добычи сырья."

 ndp_modifier_resource_land_expansion: "Программа расширения земель"
 ndp_modifier_resource_land_expansion_desc: "Открываются новые земли для заселения и производства."

 ndp_modifier_resource_intensification: "Интенсификация производства"
 ndp_modifier_resource_intensification_desc: "Существующие сельскохозяйственные и горнодобывающие предприятия вытесняются на более высокую производительность."

 ndp_modifier_resource_export_markets: "Драйв экспортного рынка"
 ndp_modifier_resource_export_markets_desc: "Активное преследование внешних рынков повышает эффективность торговых путей."

 ndp_modifier_resource_domestic_supply: "Приоритет отечественного предложения"
 ndp_modifier_resource_domestic_supply_desc: "Приоритет внутренней продовольственной безопасности над экспортными поступлениями."

 ndp_modifier_service_finance: "Развитие финансового сектора"
 ndp_modifier_service_finance_desc: "Инвестиции в банковские и финансовые услуги увеличивают инвестиционный пул."

 ndp_modifier_service_education: "Образование и бюрократические инвестиции"
 ndp_modifier_service_education_desc: "Расширяются школы, университеты и государственные учреждения."

 ndp_modifier_service_foreign_talent: "Зарубежная политика талантов"
 ndp_modifier_service_foreign_talent_desc: "Открытые двери для квалифицированных иностранных работников ускоряют рост сектора услуг."

 ndp_modifier_service_domestic_talent: "Инвестиции в отечественное образование"
 ndp_modifier_service_domestic_talent_desc: "Инвестиции в отечественное образование создают долгосрочный человеческий капитал."

 ndp_modifier_service_liberalize: "Либерализация рынка"
 ndp_modifier_service_liberalize_desc: "Сокращение регулирования способствует повышению эффективности инвестиций и принятию законов."

 ndp_modifier_service_institutions: "Институциональное укрепление"
 ndp_modifier_service_institutions_desc: "Инвестиции в обеспечение верховенства права и укрепление потенциала государства способствуют повышению уровня управления и легитимности."

 ndp_modifier_abandoned: "Заброшенная программа развития"
 ndp_modifier_abandoned_desc: "Национальная программа развития была прекращена до ее завершения. Пострадало доверие к государственному планированию."

 ndp_foreign_investment_secured: "Иностранные инвестиции обеспечены"
 ndp_foreign_investment_secured_desc: "Соглашение об иностранных инвестициях открыло страну для внешнего капитала. Строительство ускоряется, а инвестиционный пул растет."

 ndp_foreign_investment_rejected: "Иностранные инвестиции отклонены"
 ndp_foreign_investment_rejected_desc: "Страна закрыла свои двери для иностранного капитала. Экономическая независимость сохраняется, но темпы роста замедляются."
