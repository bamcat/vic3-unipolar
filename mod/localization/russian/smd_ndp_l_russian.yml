 ndp_bar_industrial_mines_tt: "Создана база тяжелой промышленности"
 ndp_bar_industrial_factories_tt: "Производственный сектор растет"
 ndp_bar_military_army_tt: "Большая постоянная армия"
 ndp_bar_military_conscription_tt: "Массовая воинская повинность принята"
 ndp_bar_resource_farms_tt: "Сельскохозяйственная продукция сильная"
 ndp_bar_resource_extraction_tt: "Созданы экстракционные отрасли"
 ndp_bar_service_literacy_tt: "Высокая грамотность ускоряет развитие сферы услуг"
 ndp_bar_service_university_tt: "Инфраструктура университета"
 ndp_bar_turmoil_tt: "Высокая турбулентность замедляет развитие"
