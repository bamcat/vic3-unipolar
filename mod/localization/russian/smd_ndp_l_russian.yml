l_russian:

 je_national_development: "Путь национального развития"
 je_national_development_reason: "Каждая страна должна выбрать, на чем сосредоточить свою энергию. Национальный план развития концентрирует ресурсы, политику и политическую волю в рамках единого стратегического видения на десять лет. Выбирайте мудро — выбор не может быть отменен до завершения программы."

 je_foreign_investment: "Иностранные инвестиции"
 je_foreign_investment_reason: "Привлечение капитала от великих держав может ускорить развитие сверх того, что позволяют внутренние ресурсы. Договор об иностранных инвестициях откроет страну для внешних предприятий со всеми вытекающими отсюда возможностями и зависимостями."
 has_foreign_investment_or_trade_agreement_with_west_tt:0 "Подписать соглашение об иностранных инвестициях и торговле с США, Великобританией или Францией"
 
 ndp_status_industrial_tt: "Промышленная экспансия продолжается. Страна направляет ресурсы на создание своей производственной и тяжелой промышленности."
 ndp_status_military_tt: "Продолжается военная экспансия. Страна инвестирует в свои вооруженные силы, доктрину и оборонную промышленность."
 ndp_status_resource_tt: "Развитие ресурсной экономики продолжается. Страна сосредоточена на сельском хозяйстве и добыче сырья."
 ndp_status_service_tt: "Развитие сервисной экономики продолжается. Страна наращивает свой финансовый сектор, образование и государственный потенциал."
 ndp_status_none_tt: "В настоящее время нет активного пути развития. Выберите путь для начала десятилетней национальной программы развития."

 fi_status_seeking_tt: "Страна стремится заключить соглашение об иностранных инвестициях с великой державой. Подпишите инвестиционный договор, чтобы заполнить эту запись в журнале."
 fi_status_secured_tt: "Заключено соглашение об иностранных инвестициях. Приток иностранного капитала идет."

 ndp_button_industrial_name: "Промышленное расширение"
 ndp_button_industrial_desc: "Сосредоточьте национальные ресурсы на создании производственной базы. Повышает тяжелую промышленность, легкое производство и строительство. Выбор на 2-й год: тяжелая промышленность против легкого производства."

 ndp_button_military_name: "Военная экспансия"
 ndp_button_military_desc: "Приоритет отдается вооруженным силам. Повышает армию и флот, военные исследования и производство оружия. Подвыборы на 2-й год: сухопутная доктрина против наращивания флота."

 ndp_button_resource_name: "Ресурсная экономика"
 ndp_button_resource_desc: "Построить экономику вокруг земли. Повышает сельскохозяйственную и добывающую промышленность. Подвыбор на 2-й год: сельское хозяйство против добычи сырья."

 ndp_button_service_name: "Сервисная экономика"
 ndp_button_service_desc: "Развитие государственного потенциала, образования и финансового сектора. Повышает бюрократию, скорость исследований и инвестиций. Подвыборы на 2: финансовый сектор против образования и бюрократии."

 ndp_button_abandon_name: "Брошенный путь"
 ndp_button_abandon_desc: "Откажитесь от текущей программы развития. Все модификаторы активного пути будут удалены, а штраф за престиж и легитимность будет применяться в течение двух лет. Вы можете выбрать новый путь."

 fi_button_reject_name: "Отказ от иностранных инвестиций"
 fi_button_reject_desc: "Закройте двери для иностранного капитала. Это положит конец записи в журнале и применит долгосрочный инвестиционный штраф, но сохранит экономическую независимость и повысит авторитет."

