l_russian:
 # United Nations
 je_united_nations: "Организация Объединенных Наций"
 je_united_nations_reason: "\n\n Организация Объединенных Наций служит международным органом по дипломатии, поддержанию мира и гуманитарным усилиям.\n\n Постоянные члены Совета Безопасности:\n- [GetGlobalVariable('permanent_members_1').GetCountry.GetName]\n- [GetGlobalVariable('permanent_members_2').GetCountry.GetName]\n- [GetGlobalVariable('permanent_members_3').GetCountry.GetName]\n\n- [GetGlobalVariable('permanent_members_5').GetCountry.GetName]\n\n Организация Объединенных Наций служит международным органом для дипломатии, поддержания мира и гуманитарных усилий. Решения ООН, особенно Совета Безопасности, могут напрямую влиять на будущие события в вашей стране."

 # ── PROPOSE BUTTON ────────────────────────
 
 un_propose_motion_button: "Предложить резолюцию"
 un_propose_motion_button_desc: "Предложить резолюцию ООН для голосования всех государств-членов. Если резолюция будет принята, все страны получат ее последствия в течение пяти лет. Его можно предлагать только один раз в год."
 un_no_motion_active_tt: "В настоящее время ни одна резолюция не обсуждается."
 
 # ── VOTE BUTTONS ─────────────────────────
 
 un_vote_yay_button: "Голосование в пользу"
 un_vote_yay_button_desc: "Голосование [ROOT.GetCountry.GetName] в пользу нынешней резолюции. Постоянные члены Совета Безопасности голосуют в двойном весе."
 
 un_vote_nay_button: "Голосовать против"
 un_vote_nay_button_desc: "Голосование [ROOT.GetCountry.GetName] против действующей резолюции. Постоянные члены Совета Безопасности голосуют в двойном весе."
 
 # ── MOTION EVENTS ────────────────────────
 
 un_events.100.t: "Организация Объединенных Наций — предложить резолюцию"
 un_events.100.d: "В качестве члена Организации Объединенных Наций [ROOT.GetCountry.GetName] может предложить Генеральной Ассамблее резолюцию для голосования. Выберите резолюцию для обсуждения. Все государства-члены будут уведомлены и могут голосовать, используя кнопки в записи в журнале Организации Объединенных Наций."
 un_events.100.a: "Резолюция по охране окружающей среды"
 un_events.100.b: "Резолюция о мире во всем мире"
 un_events.100.c: "Резолюция об экономическом развитии"
 un_events.100.e: "Резолюция по технологии ЮНЕСКО"
 
 un_events.101.t: "ООН — резолюция под обсуждением"
 un_events.101.d: "В Генеральной Ассамблее Организации Объединенных Наций была предложена резолюция. [ROOT.GetCountry.GetName] может голосовать с помощью кнопок Yay или Nay в журнале Организации Объединенных Наций. Постоянные члены Совета Безопасности голосуют в двойном весе. Результат будет объявлен через 120 дней."
 un_events.101.a: "Поймите — мы обдумаем"
 
 # ── NOTIFICATIONS ─────────────────────────
 
 un_motion_passed: "Резолюция ООН принята"
 un_motion_passed_desc: "Была принята резолюция ООН. [ROOT.GetCountry.GetName] будет действовать в течение следующих пяти лет."
 
 un_motion_failed: "Резолюция ООН провалилась"
 un_motion_failed_desc: "Резолюция ООН не была принята. Это предложение не получило достаточной поддержки."
 
 # ── PROGRESS BAR ─────────────────────────
 
 un_je_no_motion_tt: "В настоящее время ни одна резолюция не обсуждается. Используйте #bold Предложить кнопку Резолюции #! для подачи предложения Генеральной Ассамблее."
 
 un_je_voting_environment_tt: "#bold Резолюция по охране окружающей среды — голосование продолжается.#! Государства-члены голосуют. Используйте кнопки Yay или Nay ниже, чтобы проголосовать. Результаты будут объявлены после закрытия периода голосования."
 
 un_je_voting_peace_tt: "#bold Резолюция о мире во всем мире — голосование продолжается.#! Государства-члены голосуют. Используйте кнопки Yay или Nay ниже, чтобы проголосовать. Результаты будут объявлены после закрытия периода голосования."
 
 un_je_voting_economy_tt: "#bold Резолюция об экономическом развитии — голосование продолжается.#! Государства-члены голосуют. Используйте кнопки Yay или Nay ниже, чтобы проголосовать. Результаты будут объявлены после закрытия периода голосования."
 
 un_je_voting_technology_tt: "#bold Резолюция по технологии ЮНЕСКО — голосование продолжается.#! Государства-члены голосуют. Используйте кнопки Yay или Nay ниже, чтобы проголосовать. Результаты будут объявлены после закрытия периода голосования."
 
 un_motion_progress_bar: "Резолюция Поддержка"
 un_motion_progress_bar_desc: "Благоприятная доля голосов: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%1]#! Голоса в пользу: ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|0])"
 un_motion_progress_bar_second_desc: ""
 un_motion_progress_from_yes_votes: ""
 
 # ── RESOLUTION MODIFIERS ─────────────────
 
 un_resolution_environment: "Резолюция ООН - Охрана окружающей среды"
 un_resolution_environment_desc: "ООН приняла резолюцию по охране окружающей среды. [ROOT.GetCountry.GetName] стремится к сокращению загрязнения и улучшению экологических стандартов в течение следующих пяти лет."
 
 un_resolution_peace: "Резолюция ООН - Мир во всем мире"
 un_resolution_peace_desc: "ООН приняла резолюцию о мире во всем мире. [ROOT.GetCountry.GetName] выгоды от снижения порочности и улучшения дипломатического положения в течение следующих пяти лет."
 
 un_resolution_economy: "Резолюция ООН - Экономическое развитие"
 un_resolution_economy_desc: "ООН приняла резолюцию по экономическому развитию. [ROOT.GetCountry.GetName] получает строительные и инвестиционные бонусы, отражающие международное экономическое сотрудничество на ближайшие пять лет."
 
 un_resolution_technology: "Резолюция ООН — технология ЮНЕСКО"
 un_resolution_technology_desc: "ООН приняла резолюцию о технологиях и образовании. [ROOT.GetCountry.GetName] выгоды от улучшения доступа к образованию и поп-квалификаций в течение следующих пяти лет."
 
 sb_request_peacekeepers: "Запрос миротворцев ООН"
 sb_request_peacekeepers_desc: "Призываем Организацию Объединенных Наций развернуть миротворческие силы для содействия урегулированию конфликтов."

 un_events.1.t: "Запрос миротворцев ООН"
 un_events.1.d: "Мы можем обратиться к Организации Объединенных Наций с призывом направить миротворцев для содействия прекращению нашего конфликта."
 un_events.1.a: "Отправьте запрос."
 un_events.1.b: "Не вовлекайте ООН."

 un_events.2.t: "Голосование Совета Безопасности ООН"
 un_events.2.d: "Совет Безопасности должен проголосовать за отправку миротворцев на [GetGlobalVariable('peacekeeper_requestor').GetCountry.GetName]"
 un_events.2.a: "Яай"
 un_events.2.b: "Воздерживаться"
 un_events.2.c: "Нет"
 un_events.2.e: "Вето [GetGlobalVariable('peacekeeper_requestor').GetCountry.GetName] Запрос на поддержание мира"

 un_events.3.t: "Миротворцы одобрили"
 un_events.3.d: "Совет Безопасности ООН проголосовал за отправку миротворцев."
 un_events.3.a: "Входите!"

 un_events.4.t: "Миротворцы отвергнуты"
 un_events.4.d: "Совет Безопасности ООН проголосовал против отправки нам миротворцев."
 un_events.4.a: "Мы сами по себе."

 un_events.10.t: "Избранный член Совета Безопасности"
 un_events.10.d: "Генеральная Ассамблея Организации Объединенных Наций избрала нового ротирующегося члена Совета Безопасности: [un_rotating_member.GetName]."
 un_events.10.a: "Отмечено."
 
 unsc_member: "Член СБ ООН"
 permanent_unsc_member: "Постоянный член СБ ООН"
 un_peacekeepers_vetoed: "Миротворцы отвергнуты"
 un_peacekeepers_deployed: "Миротворчество Организации Объединенных Наций"
 un_already_voting_on_peacekeeping: "Пожалуйста, подождите, пока ООН не закончит голосование по текущей миротворческой миссии."
 
 un_events.5.t: "Участвовать в миротворческой миссии [GetGlobalVariable('peacekeeper_requestor').GetCountry.GetName]?"
 un_events.5.d: "Совет Безопасности ООН проголосовал за отправку миротворческой миссии по адресу [GetGlobalVariable('peacekeeper_requestor').GetCountry.GetName]. Члены Генеральной Ассамблеи собрались вместе, чтобы обсудить, какие страны готовы отправить своих людей в бой в интересах глобального мира."
 un_events.5.a: "Отправим [SCOPE.sCharacter('peacekeeper_general_1').GetFullName]"
 un_events.5.b: "Не участвовать"
 
