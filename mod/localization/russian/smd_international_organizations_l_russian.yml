 # European Union
 
 je_european_union: "Европейский Союз"
 je_european_union_reason: "Европейский Союз является одним из самых амбициозных политических и экономических проектов современной эпохи.\n\n Построенный на принципах экономической интеграции, совместного управления и коллективной безопасности, ЕС предоставляет своим членам общий рынок, скоординированную торговую политику и место за столом в формировании будущего континента. Членство приносит обещание свободного перемещения товаров, услуг, капитала и людей — беспрецедентную возможность для процветания.\n\n Тем не менее, Союз не лишен своих вызовов. Члены должны вести сложные переговоры, соблюдать наднациональные правила и идти на компромисс по элементам национального суверенитета. Чем глубже растет интеграция, тем больше судьба каждого члена связана с судьбой коллектива.\n\n Процветает ли страна или борется в ЕС, зависит от ее способности сбалансировать национальные интересы с общим благом, прокладывая путь в рамках союза, который стремится быть больше, чем сумма его частей."

 eu_events.1.t: "Приглашение в Европейский Союз"
 eu_events.1.d: "Европейский Союз направил приглашение нашей стране вступить в качестве полноправного члена."
