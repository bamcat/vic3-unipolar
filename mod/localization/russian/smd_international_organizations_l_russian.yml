  ### ══════════════════════════════════════════
 ### AMNESTY INTERNATIONAL
 ### ══════════════════════════════════════════

 ngo_events.1.t: "Amnesty International осуждает нашу политику"
 ngo_events.1.d: "Amnesty International опубликовала ужасающий доклад о ситуации с правами человека в нашей стране, сославшись на наши нынешние законы как на систематическое нарушение основных свобод. Международное сообщество обратило на это внимание, и наше правительство сталкивается с растущим давлением, чтобы решить эти проблемы."
 ngo_events.1.a: "Критика ничего не меняет"
 ngo_events.1.b: "Мы рассмотрим их опасения"

 ngo_events.2.t: "Amnesty International приветствует реформы"
 ngo_events.2.d: "Наши недавние законодательные реформы были признаны Amnesty International значительным шагом вперед в области прав человека. Их ежегодный доклад подчеркивает наш прогресс, повышая международную репутацию нашей страны."
 ngo_events.2.a: "Мы гордимся нашим прогрессом"

 ngo_events.3.t: "Amnesty International сообщает о гражданских беспорядках"
 ngo_events.3.d: "Amnesty International опубликовала специальный доклад, в котором задокументированы массовые гражданские беспорядки, охватившие нашу страну. Они призывают наше правительство бороться с коренными причинами недовольства посредством значимых реформ, а не репрессий."
 ngo_events.3.a: "Будем рассматривать реформы"
 ngo_events.3.b: "Наши внутренние дела не их забота."

 ### ══════════════════════════════════════════
 ### RED CROSS
 ### ══════════════════════════════════════════

 ngo_events.10.t: "Красный Крест оказывает гуманитарную помощь"
 ngo_events.10.d: "Международный Красный Крест предложил направить гуманитарных работников для оказания помощи гражданским лицам, пострадавшим от продолжающегося конфликта. Их группы по оказанию помощи готовы предоставить медицинскую помощь, жилье и продовольствие перемещенным лицам в наших раздираемых войной регионах."
 ngo_events.10.a: "Мы приветствуем их помощь"
 ngo_events.10.b: "Мы не можем допустить иностранных рабочих в зону боевых действий."

 ngo_events.11.t: "Красный Крест критикует военное поведение"
 ngo_events.11.d: "Международный Красный Крест выступил с публичным заявлением, в котором выразил глубокую обеспокоенность поведением наших вооруженных сил. Сообщения о многочисленных жертвах среди гражданского населения и разрушении инфраструктуры в зонах конфликта привлекли международное внимание. Они призывают все стороны соблюдать Женевские конвенции."
 ngo_events.11.a: "Мы будем сотрудничать с их следователями."
 ngo_events.11.b: "Мы отрицаем эти обвинения."

 ngo_events.12.t: "Красный Крест спасает от кризиса"
 ngo_events.12.d: "Несмотря на отсутствие открытой войны, Международный Красный Крест выявил растущий гуманитарный кризис в наших границах. Широко распространенные гражданские беспорядки и экономические потрясения создали условия, требующие международной помощи. Они предлагают координировать усилия по оказанию помощи пострадавшему населению."
 ngo_events.12.a: "Мы принимаем их помощь"
 ngo_events.12.b: "Мы сами справимся."

 ### ══════════════════════════════════════════
 ### IAEA
 ### ══════════════════════════════════════════

 ngo_events.20.t: "МАГАТЭ требует проведения ядерной инспекции"
 ngo_events.20.d: "Международное агентство по атомной энергии официально запросило доступ к нашим ядерным объектам для всесторонней проверки безопасности и соответствия. Как неподписавший Договор о нераспространении ядерного оружия, наша ядерная программа привлекла повышенное внимание международного сообщества. МАГАТЭ уверяет нас, что инспекция является рутинной, но отказ пошлет четкий сигнал международному сообществу."
 ngo_events.20.a: "Наши объекты открыты для осмотра"
 ngo_events.20.b: "Наша ядерная программа – это суверенное дело."

 ngo_events.21.t: "МАГАТЭ подтверждает рекорды ядерной безопасности"
 ngo_events.21.d: "После пересмотра нашей ядерной программы Международное агентство по атомной энергии официально высоко оценило нашу приверженность стандартам безопасности и соблюдению нераспространения. Наша приверженность ДНЯО и сотрудничество с международными инспекторами укрепили наши позиции в мировом ядерном сообществе."
 ngo_events.21.a: "Мы по-прежнему привержены мирной ядерной энергии."

 ngo_events.22.t: "МАГАТЭ обеспокоено распространением"
 ngo_events.22.d: "Международное агентство по атомной энергии подняло тревогу по поводу направления нашей ядерной программы. Без членства в ДНЯО и при нашем постоянном отказе сотрудничать с инспекторами МАГАТЭ опубликовало официальное заявление, в котором выражается обеспокоенность по поводу возможной разработки оружия. Международное сообщество внимательно следит."
 ngo_events.22.a: "Мы открыты для диалога"
 ngo_events.22.b: "Мы отстаиваем наше суверенное право на ядерные технологии."

 ### ══════════════════════════════════════════
 ### MODIFIERS
 ### ══════════════════════════════════════════

 ngo_amnesty_scrutiny: "Под пристальным вниманием Amnesty"
 ngo_amnesty_scrutiny_desc: "Amnesty International внимательно следит за ситуацией с правами человека после недавней критики. Законность правительства находится под давлением."

 ngo_amnesty_reform_pressure: "Давление реформ"
 ngo_amnesty_reform_pressure_desc: "Доклад Amnesty International о гражданских беспорядках создал внутреннее и международное давление на реформы, но помог ослабить революционные настроения."

 ngo_redcross_aid: "Гуманитарная помощь Красного Креста"
 ngo_redcross_aid_desc: "Сотрудники Красного Креста оказывают гуманитарную помощь гражданским лицам в зонах конфликтов, снижая смертность и повышая нашу международную репутацию."

 ngo_redcross_cooperation: "Сотрудничество Красного Креста"
 ngo_redcross_cooperation_desc: "Наше сотрудничество с Красным Крестом в отношении поведения в военное время улучшило наше международное положение и уменьшило позор, порожденный нашими военными действиями."

 ngo_redcross_relief: "Кризис Красного Креста"
 ngo_redcross_relief_desc: "Красный Крест оказывает гуманитарную помощь в этот период гражданского кризиса, помогая стабилизировать пострадавшее население."

 ngo_iaea_inspectors: "Инспекторы МАГАТЭ представляют"
 ngo_iaea_inspectors_desc: "Инспекторы МАГАТЭ работают на наших ядерных объектах, обмениваясь техническими знаниями и знаниями в области безопасности. Их присутствие ускоряет передачу технологий и повышает нашу дипломатическую репутацию."
