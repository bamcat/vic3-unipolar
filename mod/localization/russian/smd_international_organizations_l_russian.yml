 io_eu_name: "Европейский Союз"
 io_eu_abbreviation: "ЕС"
 io_eu_desc: "Европейский Союз является политическим и экономическим союзом европейских государств, который сменил [concept_eec]. Она создает единый рынок, координирует внешнюю политику и политику безопасности и содействует совместному управлению через свои институты в Брюсселе. Члены пользуются преимуществами таможенного союза и гармонизации регулирования."
 
