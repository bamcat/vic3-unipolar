 ### ═══════════════════════════════════════
 ### TAB DESCRIPTIONS
 ### ═══════════════════════════════════════
 io_igos_tab_desc: "Международные организации являются многосторонними институтами, координирующими политику между государствами-членами. Нажмите на организацию, чтобы просмотреть ее детали, членов и доступные действия."
 io_treaties_tab_desc: "Международные договоры являются обязательными соглашениями между странами. Ваша страна может стать стороной, подписавшей соглашение, или выйти из него ценой дипломатического статуса."
 io_ngos_tab_desc: "[concept_nongovernmental_organization] работает независимо друг от друга. Все страны аффилированы по умолчанию. Вы можете запретить или субсидировать их, влияя на их мнение о вашей стране."

 ### ═══════════════════════════════════════
 ### GAME CONCEPTS
 ### ═══════════════════════════════════════

 concept_international_organization: "Международная организация"
 concept_international_organization_desc: "Международные организации - это учреждения, которые действуют через национальные границы для координации политики, содействия торговле, обеспечения коллективной безопасности или содействия культурному обмену между их странами-членами. Они бывают нескольких форм: [concept_free_trade_agreement]s, [concept_financial_agreement]s, [concept_military_defense_agreement]s, [concept_cultural_pact]s и [concept_cooperative_agreement]s."

 concept_intergovernmental_organization: "Межправительственная организация"
 concept_intergovernmental_organization_desc: "Межправительственная организация — это организация, члены которой являются суверенными государствами. В отличие от [concept_nongovernmental_organization], IGO требуют формального членства и могут обеспечить значительные дипломатические, экономические или военные выгоды."

 concept_nongovernmental_organization: "Неправительственная организация"
 concept_nongovernmental_organization_desc: "Неправительственные организации являются независимыми учреждениями, которые действуют на международном уровне и не контролируются никаким правительством. Все страны по умолчанию связаны с НПО. Правительства могут запретить, терпеть или субсидировать их, что влияет на мнение НПО и преимущества, которые они предоставляют."

 concept_international_treaty: "Международный договор"
 concept_international_treaty_desc: "Международный договор является обязательным соглашением между суверенными государствами. В отличие от [concept_intergovernmental_organization]s, договоры не требуют постоянного организационного членства — нация либо подписала, либо нет. Подписавшие стороны получают дипломатические выгоды, в то время как выход наносит ущерб отношениям с другими подписавшими сторонами."

 international_treaty_type:0 "[concept_international_treaty]
 concept_free_trade_agreement: "Соглашение о свободной торговле"
 concept_free_trade_agreement_desc: "Соглашение о свободной торговле - это соглашение о свободной торговле, которое уменьшает торговые барьеры между странами-членами, способствуя обмену товарами и экономическому росту."

 concept_financial_agreement: "Финансовое соглашение"
 concept_financial_agreement_desc: "Финансовое соглашение (англ. Financial Agreement) — это соглашение, ориентированное на денежно-кредитное сотрудничество, финансирование развития и финансовую стабильность среди его членов. Участники получают +5% влияния и +1 дипломатическую репутацию."

 concept_military_defense_agreement: "Соглашение о военной обороне"
 concept_military_defense_agreement_desc: "Соглашение о военной обороне — это соглашение, построенное на принципе коллективной безопасности. Нападение на одного человека считается нападением на всех."

 concept_cultural_pact: "Культурный пакт"
 concept_cultural_pact_desc: "Культурный пакт - это [concept_international_organization], который способствует совместному наследию, языку и культурному обмену между его членами."

 concept_cooperative_agreement: "Соглашение о сотрудничестве"
 concept_cooperative_agreement_desc: "Кооперативное соглашение — это соглашение, ориентированное на широкую многостороннюю дипломатию. В отличие от других типов организаций, кооперативные соглашения напрямую не предоставляют модификаторов. Их влияние осуществляется посредством резолюций и инициатив."

 concept_united_nations: "Организация Объединенных Наций"
 concept_united_nations_desc: "Организация Объединенных Наций является [concept_cooperative_agreement] стран мира, посвященных поддержанию международного мира, безопасности и сотрудничества."

 concept_nato: "НАТО"
 concept_nato_desc: "Организация Североатлантического договора (НАТО) является [concept_military_defense_agreement] обязательным для североамериканских и европейских стран в коллективной обороне."

 concept_g7: "G7"
 concept_g7_desc: "Группа Семи - это [concept_financial_agreement] крупнейших развитых экономик мира, координирующих фискальную и денежно-кредитную политику."

 concept_opec: "ОПЕК"
 concept_opec_desc: "Организация стран-экспортеров нефти — это организация, которая координирует нефтяную политику между крупными нефтедобывающими странами."

 concept_eec: "ЕЭК"
 concept_eec_desc: "Европейское Экономическое Сообщество (ЕЭС) - это [concept_free_trade_agreement] создание общего рынка между европейскими государствами-членами."

 concept_arab_league: "Лига арабских государств"
 concept_arab_league_desc: "Лига арабских государств (Лига арабских государств) - это [concept_cultural_pact] содействие сотрудничеству между арабоязычными странами."

 concept_imf: "МВФ"
 concept_imf_desc: "Международный валютный фонд (МВФ) является [concept_financial_agreement] содействующим международному валютному сотрудничеству и финансовой стабильности."

 concept_esa: "ЕКА"
 concept_esa_desc: "Европейское космическое агентство (ЕКА) — это программа, посвященная исследованию и использованию космоса."

 concept_asean: "АСЕАН"
 concept_asean_desc: "Ассоциация государств Юго-Восточной Азии (Association of Southeast Asian Nations) – это организация, которая способствует экономическому росту и региональной стабильности в Юго-Восточной Азии."

 concept_saarc: "СААРК"
 concept_saarc_desc: "Южноазиатская ассоциация регионального сотрудничества (англ. South Asian Association for Regional Cooperation) — это организация, продвигающая региональное сотрудничество между государствами Южной Азии."

 concept_cis: "СНГ"
 concept_cis_desc: "Содружество Независимых Государств (СНГ) является [concept_cooperative_agreement] для координации между несколькими постсоветскими государствами."

 concept_who: "ВОЗ"
 concept_who_desc: "Всемирная Организация Здравоохранения (ВОЗ) – это организация, которая направляет и координирует международную политику в области здравоохранения."

 concept_iaea: "МАГАТЭ"
 concept_iaea_desc: "Международное агентство по атомной энергии (МАГАТЭ) — это организация, которая способствует мирному использованию ядерной энергии и работает над предотвращением распространения ядерного оружия."

