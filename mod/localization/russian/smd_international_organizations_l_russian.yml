 ### ORGANIZATIONS — Names & Descriptions
 ### ═══════════════════════════════════════

 ### United Nations
 io_un_name: "Организация Объединенных Наций"
 io_un_abbreviation: "ООН"
 io_un_desc: "[concept_united_nations] - это [concept_cooperative_agreement], созданный для поддержания международного мира и безопасности, развития дружественных отношений между странами и содействия социальному прогрессу. В отличие от других [concept_intergovernmental_organization], ООН напрямую не предоставляет модификаторы своим членам. Его влияние осуществляется посредством дипломатических резолюций, миротворческих мандатов и глобальных инициатив."
 io_un_tooltip: "[concept_united_nations] является [concept_cooperative_agreement] стран мира.\n Нажмите, чтобы просмотреть детали."

 ### NATO
 io_nato_name: "Организация Североатлантического договора"
 io_nato_abbreviation: "НАТО"
 io_nato_desc: "[concept_nato] - это [concept_military_defense_agreement], созданный в 1949 году, связывающий североамериканские и европейские страны в коллективной обороне. Вооруженное нападение на одного из членов считается нападением на всех. НАТО координирует совместные военные учения, стандартизирует технику и поддерживает интегрированные командные структуры."

 ### G7
 io_g7_name: "Группа из семи"
 io_g7_abbreviation: "G7"
 io_g7_desc: "[concept_g7] представляет собой [concept_financial_agreement], включающий крупнейшие в мире страны с развитой экономикой. Члены координируют фискальную политику, денежно-кредитную политику и экономическое управление. Членство дает значительное дипломатическое влияние и финансовый авторитет."

 ### OPEC
 io_opec_name: "Организация стран-экспортеров нефти"
 io_opec_abbreviation: "ОПЕК"
 io_opec_desc: "[concept_opec] - это [concept_free_trade_agreement] основных нефтедобывающих стран, которые координируют нефтяную политику между странами-членами. ОПЕК стремится обеспечить стабилизацию нефтяных рынков и справедливую отдачу для стран-производителей."

 ### EEC
 io_eec_name: "Европейское экономическое сообщество"
 io_eec_abbreviation: "ЕЭК"
 io_eec_desc: "[concept_eec] - это [concept_free_trade_agreement] создание общего рынка между европейскими государствами-членами. Он снижает торговые барьеры, гармонизирует экономические правила и способствует свободному перемещению товаров, услуг, капитала и рабочей силы между странами-членами."
 
 ### Arab League
 io_arab_league_name: "Лига арабских государств"
 io_arab_league_abbreviation: "ЛАС"
 io_arab_league_desc: "[concept_arab_league] - это [concept_cultural_pact] арабоязычных стран, которые способствуют политическому, экономическому, культурному и социальному сотрудничеству между своими членами. Лига координирует политику по вопросам, представляющим общий интерес, и выступает посредником в спорах между арабскими государствами."

 ### IMF
 io_imf_name: "Международный валютный фонд"
 io_imf_abbreviation: "МВФ"
 io_imf_desc: "[concept_imf] - это [concept_financial_agreement], который способствует международному валютному сотрудничеству, стабильности обменного курса и упорядоченным валютным соглашениям. Он предоставляет финансовую помощь и политические консультации странам-членам, сталкивающимся с трудностями платежного баланса."

 ### ESA
 io_esa_name: "Европейское космическое агентство"
 io_esa_abbreviation: "ЕКА"
 io_esa_desc: "[concept_esa] - это [concept_cooperative_agreement], предназначенный для исследования и использования космического пространства. Государства-члены объединяют ресурсы для разработки ракет-носителей, спутников и научных миссий, которые ни одна европейская страна не может достичь в одиночку."

 ### ASEAN
 io_asean_name: "Ассоциация государств Юго-Восточной Азии"
 io_asean_abbreviation: "АСЕАН"
 io_asean_desc: "[concept_asean] - это [concept_cooperative_agreement] стран Юго-Восточной Азии, способствующих экономическому росту, социальному прогрессу и культурному развитию. АСЕАН способствует региональной стабильности и обеспечивает основу для многостороннего диалога в Азиатско-Тихоокеанском регионе."

 ### WHO
 io_saarc_name: "Южно-Азиатская ассоциация регионального сотрудничества"
 io_saarc_desc: "[concept_saarc] является [concept_cooperative_agreement] среди стран Южной Азии, направленным на региональное сотрудничество, координацию развития и многосторонний диалог."

 io_cis_name: "Содружество Независимых Государств"
 io_cis_desc: "[concept_cis] является [concept_cooperative_agreement] среди постсоветских государств, ориентированных на региональные консультации, экономическую координацию и практическое межправительственное сотрудничество."

 io_who_name: "Всемирная организация здравоохранения"
 io_who_abbreviation: "ВОЗ"
 io_who_desc: "[concept_who] является [concept_cooperative_agreement], направляющим и координирующим международную политику в области здравоохранения. Он обеспечивает лидерство по глобальным вопросам здравоохранения, устанавливает нормы и стандарты, отслеживает тенденции в области здравоохранения и координирует меры реагирования на международные чрезвычайные ситуации в области здравоохранения."

 ### ═══════════════════════════════════════
 ### TREATIES — Names & Descriptions
 ### ═══════════════════════════════════════

 io_treaty_geneva_name: "Женевские конвенции"
 io_treaty_geneva_desc: "Ряд договоров, известных как Женевские конвенции, отвечают за установление стандартов международного права в отношении гуманитарного обращения во время вооруженных конфликтов. Стороны, подписавшие документ, соглашаются защищать раненых солдат, военнопленных и гражданских лиц в военное время."

 io_treaty_cwc_name: "Конвенция о химическом оружии"
 io_treaty_cwc_desc: "Конвенция о запрещении химического оружия - это Конвенция о запрещении разработки, производства, приобретения, накопления, хранения, передачи и использования химического оружия. Подписавшие стороны соглашаются уничтожить существующие запасы под международной проверкой."

 io_treaty_npt_name: "Договор о нераспространении"
 io_treaty_npt_desc: "Договор о нераспространении ядерного оружия направлен на предотвращение распространения ядерного оружия, содействие разоружению и содействие мирному использованию ядерной энергии под международными гарантиями."

 io_treaty_bwc_name: "Конвенция о биологическом оружии"
 io_treaty_bwc_desc: "Конвенция о биологическом оружии (англ. Biological Weapons Convention) — Конвенция о запрещении разработки, производства и накопления биологического и токсинного оружия. Это был первый многосторонний договор о разоружении, запрещающий целую категорию оружия."

 io_treaty_cat_name: "Конвенция против пыток"
 io_treaty_cat_desc: "Конвенция против пыток — это Конвенция, запрещающая все формы пыток и жестокого, бесчеловечного или унижающего достоинство обращения и наказания. Подписавшие стороны обязуются принимать эффективные меры по предотвращению пыток в рамках своей юрисдикции."

 ### ═══════════════════════════════════════
 ### NGOs — Names & Descriptions
 ### ═══════════════════════════════════════

 io_iaea_name: "Международное агентство по атомной энергии"
 io_iaea_abbreviation: "МАГАТЭ"
 io_iaea_desc: "МАГАТЭ содействует мирному использованию ядерной энергии и работает над предотвращением ее использования в военных целях. Он проводит инспекции, оказывает техническую помощь и устанавливает международные стандарты безопасности для ядерных объектов."

 io_redcross_name: "Международный Красный Крест"
 io_redcross_abbreviation: "МККК"
 io_redcross_desc: "Международный Красный Крест оказывает гуманитарную помощь во время вооруженных конфликтов и стихийных бедствий. Она следит за соблюдением Женевских конвенций, посещает военнопленных и облегчает общение между разлученными членами семьи."

 io_amnesty_name: "Amnesty International"
 io_amnesty_abbreviation: "ИИ"
 io_amnesty_desc: "Amnesty International расследует и разоблачает нарушения прав человека во всем мире. Она выступает за освобождение политических заключенных, отмену пыток и смертной казни, а также защиту беженцев и мигрантов."

