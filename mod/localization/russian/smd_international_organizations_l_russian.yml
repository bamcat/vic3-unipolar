 # imf

 je_imf_loan: "Программа кредитования МВФ"
 je_imf_loan_reason: "Кредит Международного валютного фонда был продлен до [ROOT.GetCountry.GetName]. В обмен на экстренное финансирование страна приняла существенные условия: высокие процентные ставки, обязательную свободную торговлю и обязательства перед великими державами, которые финансируют фонд."

 imf_je_obligations_active_tt: "Обязательства великих держав все еще действуют. Иностранные кредиторы сохраняют рычаги влияния на ключевые решения экономической политики."
 imf_je_obligations_met_tt: "Обязательства в отношении великих держав были выполнены. Страна сохраняет полный экономический суверенитет, хотя условия кредитования остаются в силе."

 decision_leave_imf: "Оставить МВФ"
 decision_leave_imf_desc: "Выход из Международного валютного фонда. Страна больше не будет иметь право на поддержку кредита МВФ, если она приблизится к банкротству, но будет свободна от обязательств кредиторов и вмешательства. Это решение не может быть отменено.\n\n Примечание: Вы не можете уйти, имея активный кредит МВФ."
 imf_cannot_leave_while_indebted_tt: "Нельзя покидать МВФ, пока действует активный кредит"


 imf_button_pay_obligations_name: "Оплатить обязательства"
 imf_button_pay_obligations_desc: "Погасить оставшиеся обязательства великой державы досрочно. Затраты на золото составляют 500 долларов и требуют долга ниже 50%, но немедленно восстанавливает полный экономический суверенитет и улучшает отношения со всеми великими державами."
 imf_pay_obligations_cost_tt: "Долг должен быть меньше 50% и 500 золотых"
 imf_obligations_paid_tt: "Обязательства окупились досрочно. Улучшились отношения великих держав."

 # imf_events.1 — Loan offer
 imf_events.1.t: "Вмешательство МВФ"
 imf_events.1.d: "Казначейство [ROOT.GetCountry.GetName] находится в кризисе. Долг достиг такого уровня, что заставляет рынки нервничать, а кредиторов быть осторожными. Международный валютный фонд принял к сведению и направил делегацию для предоставления чрезвычайного финансирования.\n\n Условия не щедрые. Процентные ставки будут установлены на уровне наказания. Страна должна будет принять свободную торговлю, независимо от существующей экономической политики. И великие державы, которые финансируют фонд, будут ожидать выполнения определенных обязательств. Но альтернатива - приближение к прямому банкротству без страховки - может быть хуже."
 imf_events.1.f: "Суверенитет и платежеспособность редко доступны одновременно."
 imf_events.1.a: "Принять кредит — нам нужно финансирование"
 imf_events.1.b: "Откажитесь — мы сами будем управлять своими делами"

 # imf_events.2 — Great power notification
 imf_events.2.t: "Кредит МВФ продлен"
 imf_events.2.d: "[SCOPE.sCountry('imf_debtor_scope').GetName] принял кредитный пакет МВФ. Как одна из великих держав, андеррайтинг фонда, [ROOT.GetCountry.GetName] теперь имеет обязательства от страны-должника. Соглашение имеет как стратегические, так и финансовые последствия."
 imf_events.2.f: "Долг – это форма дипломатии."
 imf_events.2.a: "Хорошо, это дает нам рычаги"
 imf_events.2.b: "Несчастье — навязанные условия слишком суровы"

 # imf_events.3 — Loan complete
 imf_events.3.t: "Программа МВФ завершена"
 imf_events.3.d: "Через пять лет после получения кредита МВФ [ROOT.GetCountry.GetName] выполнил свои программные обязательства. Процентные платежи были произведены, условия выдержали, и кредиторы великой державы остались довольны. Страна выходит из опыта восстановления своего суверенитета — и, как можно надеяться, с его финансами в лучшем порядке, чем когда он начался."
 imf_events.3.f: "Реестр сбалансирован. Уроки сложнее измерить."
 imf_events.3.a: "Мы прошли через это"

 # imf_events.4 — Leaving
 imf_events.4.t: "Выход из МВФ"
 imf_events.4.d: "[ROOT.GetCountry.GetName] выходит из Международного валютного фонда. Решение отражает убежденность в том, что затраты на членство - условия, обязательства, потеря экономического суверенитета во время кризиса - перевешивают выгоды от доступа к чрезвычайному финансированию. Великие державы не будут довольны. И если [ROOT.GetCountry.GetName] когда-либо снова приблизится к банкротству, не будет никакой сети безопасности."
 imf_events.4.f: "Независимость имеет свою цену. И зависимость тоже."
 imf_events.4.a: "Мы остаемся одни — как и должны"

 # imf_events.5 — Great power notification of leaving
 imf_events.5.t: "Страна вышла из МВФ"
 imf_events.5.d: "[SCOPE.sCountry('imf_leaver_scope').GetName] вышел из Международного валютного фонда. Это решение является упреком международному финансовому порядку и сигнализирует о том, что [SCOPE.sCountry('imf_leaver_scope').GetName] Он намерен наметить свой собственный экономический курс, к лучшему или худшему."
 imf_events.5.f: "На одного должника меньше. На один рычаг меньше."
 imf_events.5.a: "Отмечено"

 # imf_events.10 — War bonds
 imf_events.10.t: "Военные облигации"
 imf_events.10.d: "В связи с напряженным состоянием казначейства и продолжающейся войной Министерство финансов предложило чрезвычайную меру: выпуск военных облигаций. Гражданам и инвесторам будет предложено кредитовать государство в обмен на будущие выплаты с процентами, обеспечивая немедленную денежную инъекцию для финансирования военных усилий. Облигации будут работать, но они являются долгами, и долги в военное время быстро растут. Потребление предложения будет расти по мере поступления денег в военную машину."
 imf_events.10.f: "Нация заимствует у своего будущего, чтобы защитить свое настоящее."
 imf_events.10.a: "Выпуск облигаций — деньги нужны уже сейчас"
 imf_events.10.b: "Спад — мы не будем закладывать наше будущее"

 imf_loan_modifier: "Условия кредитования МВФ"
 imf_loan_modifier_desc: "Имеется кредит МВФ. Процентные ставки наказуемо высоки, а свободная торговля обязательна. Иностранные инвестиции идут, но экономический суверенитет ограничен, а легитимность пострадала."

 imf_great_power_obligations: "Обязательства великой державы"
 imf_great_power_obligations_desc: "Великие державы, которые финансируют МВФ, держат обязательства перед этой страной в качестве условия кредита. Их влияние на экономическую политику реально."

 imf_refused_loan_modifier: "Кредит МВФ отказал"
 imf_refused_loan_modifier_desc: "Страна отказалась от помощи МВФ и будет управлять своим долгом в одиночку. В результате ухудшились условия кредитования."

 imf_post_loan_stability: "Постпрограммное восстановление"
 imf_post_loan_stability_desc: "Программа МВФ завершилась. Выполнив свои обязательства, правительство приобрело определенную степень доверия, и финансы страны находятся в лучшем состоянии."

 imf_left_modifier: "За пределами МВФ"
 imf_left_modifier_desc: "Эта страна вышла из МВФ. Она свободна от обязательств кредиторов, но отрезана от международного чрезвычайного финансирования. Сокращаются инвестиционные потоки."

 war_bonds_modifier: "Выпущены военные облигации"
 war_bonds_modifier_desc: "Для финансирования военных усилий были выпущены облигации чрезвычайной войны. Доходы растут, но долг растет, а потребление предложения увеличилось."

 war_bonds_refused_modifier: "Военные облигации снизились"
 war_bonds_refused_modifier_desc: "Правительство отказалось выпускать военные облигации. Фискальная дисциплина сохраняется, но армия чувствует щепотку."

 un_events.6.t: "Наши войска возвращаются из миссии ООН"
 un_events.6.d: "Силы завершили службу в миротворческой миссии ООН и возвращаются домой. Вклад был скромным с военной точки зрения, но значимым с дипломатической точки зрения — [ROOT.GetCountry.GetName] присутствовал, когда это имело значение. Генерал вернулся."
 un_events.6.a: "Добро пожаловать домой."
 
 un_peacekeeping_contribution: "Миротворческий вклад ООН"
 un_peacekeeping_contribution_desc: "[ROOT.GetCountry.GetName] внес вклад в миротворческую миссию ООН. Международное сообщество приняло это к сведению."
 
  # ── EVENT 300: RESOLUTION PASSED ─────────────────────────────────
 
 un_events.300.t: "Резолюция ООН принята"
 un_events.300.d: "Генеральная Ассамблея согласовала резолюцию для решения глобальных проблем и координации глобального сотрудничества по данной теме."
 un_events.300.f: "Эта резолюция несет в себе вес международного консенсуса — ради чего это стоит."
 un_events.300.a: "Отмечено"
 
 UN_RES_DESC_ENVIRONMENT: "#bold Резолюция по охране окружающей среды#!\n Государства-члены обязуются координировать экологические стандарты и устойчивое управление ресурсами.\n\n#tooltip_separator!\n@green_checkmark! Все страны получают модификатор #bold Экологической резолюции ООН #! в течение 12 месяцев."
 UN_RES_DESC_PEACE: "#bold Резолюция о мире во всем мире#!\n Генеральная Ассамблея подтверждает приверженность мирному разрешению споров и сокращению межгосударственных конфликтов.\n\n#tooltip_separator!\n@green_checkmark! Все страны в течение 12 месяцев получают модификатор #bold Резолюции ООН о мире #!."
 UN_RES_DESC_ECONOMY: "#bold Резолюция по экономическому развитию#!\n Государства-члены одобряют скоординированные инвестиции в развивающиеся экономики и снижение торговых барьеров.\n\n#tooltip_separator!\n@green_checkmark! Все страны в течение 12 месяцев получают модификатор #bold Резолюции ООН об экономическом развитии #!."
 UN_RES_DESC_TECHNOLOGY: "#bold Технологическая резолюция ЮНЕСКО#!\n Генеральная Ассамблея устанавливает рамки для обмена технологиями и совместных научных исследований между государствами-членами.\n\n#tooltip_separator!\n@green_checkmark! Все страны в течение 12 месяцев получают модификатор #bold Технологическая резолюция ООН #!."
 
 # ── EVENT 301: RESOLUTION FAILED ─────────────────────────────────
 
 un_events.301.t: "Резолюция ООН не принята"
 un_events.301.d: "Предложение, представленное Генеральной Ассамблее Организации Объединенных Наций, не обеспечило необходимого большинства. Резолюция была отклонена, и сессия была отложена безрезультатно.\n\n Никаких мер не будет реализовано. Делегация-спонсор выразила свое разочарование. Других нет."
 un_events.301.f: "Организация Объединенных Наций делает то, что она делает лучше всего."
 un_events.301.a: "Неудивительно"
 
 # ── EVENT 302: SANCTIONS (TARGET) ────────────────────────────────
 
 un_events.302.t: "[ROOT.GetCountry.GetName] Санкционировано Организацией Объединенных Наций"
 un_events.302.d: "Совет Безопасности ООН принял резолюцию о введении экономических санкций в отношении [ROOT.GetCountry.GetName]. Резолюция была поддержана требуемым большинством и вступает в силу немедленно.\n\n Сейчас действуют торговые ограничения. Дипломатическая изоляция углубляется. Государства-члены должны, хотя и не обязаны, соблюдать режим санкций.\n\n Санкции будут действовать в течение пяти лет, если Совет Безопасности не соберется для их пересмотра."
 un_events.302.f: "Суверенитет не изолирует страну от мирового мнения о ней."
 un_events.302.a: "Мы отвергаем эту резолюцию."
 
 # ── EVENT 303: CONDEMNATION (TARGET) ─────────────────────────────
 
 un_events.303.t: "[ROOT.GetCountry.GetName] Осуждение со стороны ООН"
 un_events.303.d: "Генеральная Ассамблея ООН приняла официальную резолюцию, осуждающую [ROOT.GetCountry.GetName]. Осуждение было одобрено большинством голосов после прений на полу.\n\n Осуждение не имеет обязательного механизма принуждения, но оно представляет собой официальное заявление о международном неодобрении и повлияет на статус дипломатического сообщества в течение многих лет."
 un_events.303.f: "Слова не являются оружием. Но они оставляют следы."
 un_events.303.a: "Мы не будем читать лекции"
 
 # ── EVENT 304: SANCTIONS/CONDEMNATION (OBSERVERS) ────────────────
 
 un_events.304.t: "Принята карательная резолюция ООН"
 un_events.304.d: "Совет Безопасности ООН принял резолюцию о введении санкций против другой страны. Они столкнутся с серьезными санкциями, поскольку мир координирует экономическое напряжение против них."
 un_events.304.f: "Механизм международного осуждения вращается медленно, но он вращается."
 un_events.304.a: "Отмечено"
 
 UN_304_DESC_SANCTIONS: "Совет Безопасности ООН проголосовал за введение экономических санкций против [global_var:un_sanction_target.GetName]. Резолюция, принятая требуемой маржой.\n\n[global_var:un_sanction_target.GetName] столкнется с торговыми ограничениями, дипломатической изоляцией и значительными экономическими штрафами в течение периода санкций. Ожидается, что страны-члены будут соблюдать ограничения."
 UN_304_DESC_CONDEMNATION: "Генеральная Ассамблея ООН официально осудила [global_var:un_sanction_target.GetName] большинством голосов. Резолюция представляет собой официальное заявление о международном неодобрении.\n\n В то время как осуждение не имеет обязательной силы, оно ставит поведение [global_var:un_sanction_target.GetAdjective] на учет и влияет на их международное положение."
 
