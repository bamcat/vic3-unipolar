 eu_call_summit_button: "Созыв саммита ЕС"
 eu_call_summit_button_desc: "Государствам-членам предлагается обсудить вопросы торговли, санкций и сотрудничества."

 eu_events.3.t: "Саммит Европейского Союза"
 eu_events.3.d: "Представители всех стран-членов ЕС собираются для обсуждения общих целей и задач."
 eu_events.3.a: "Углубление торговых связей"
 eu_events.3.b: "Координация санкций"
 eu_events.3.c: "Содействие культурному обмену"

 eu_sanctions_ready: "Готовы к санкциям"
 
 leave_eu: "Выход из Европейского Союза"
 leave_eu_desc: "Выход из ЕС, отказ от экономических выгод и политической интеграции."
 
 eu_member_state_is: "Государство-член ЕС"
 eu_member_state_is_no_longer: "больше не является членом ЕС"
 eu_deeper_trade_ties: "ЕС углубляет торговые связи"
 eu_deeper_trade_ties_desc: "Расширенная экономическая интеграция в рамках Европейского союза увеличила объемы торговли и улучшила доступ к рынкам между государствами-членами."

 eu_cultural_exchange: "Культурный обмен ЕС"
 eu_cultural_exchange_desc: "Членство в Европейском Союзе способствовало культурному пониманию, миграции и распространению новых идей и технологий."
 je_eu_membership_request: "Заявка на членство в ЕС"
 je_eu_membership_request_reason: "Ваше правительство подало официальную заявку на вступление в Европейский Союз.\n\n Этот процесс включает в себя длительные переговоры, политические реформы и согласование с законами и стандартами ЕС. В ближайшие годы ваша страна будет оцениваться по ее экономической стабильности, управлению, правам человека и приверженности демократическим принципам.\n\n Успешное присоединение предоставит вам:\n- Доступ к единому рынку ЕС \n- Свободное перемещение товаров, услуг, капитала и людей с другими государствами-членами \n - Участие в директивных органах ЕС \n \n Однако этот процесс является политически чувствительным и может столкнуться с сопротивлением как внутри страны, так и со стороны существующих членов ЕС."
 eu_membership_process: "Начало процесса вступления в ЕС"
 request_to_join_eu_decision: "Запрос на вступление в ЕС"
 request_to_join_eu_decision_desc: "Формально подать заявку на вступление в Европейский Союз."
 
 eu_events.0.t: "Вознесение в Европейский Союз"
 eu_events.0.d: "Нас официально приняли в Европейский Союз."
 
