 io_nato_defensive_pact_name: "Обязательство НАТО по взаимной обороне"
 
 ### ══════════════════════════════════════════
 ### UPDATED ORG DESCRIPTIONS reflecting mechanics
 ### ══════════════════════════════════════════
 
 io_nato_desc: "[concept_nato] - это [concept_military_defense_agreement] связывающий североамериканские и европейские страны в коллективной обороне. Вооруженное нападение на одного из членов считается нападением на всех. Вступление в НАТО автоматически создает договоры о взаимной обороне со всеми существующими государствами-членами."
 
 io_opec_desc: "[concept_opec] - организация крупных стран-экспортеров нефти, которая координирует политику добычи нефти. Государства-члены извлекают выгоду из ценообразования картеля, получая значительное торговое преимущество на экспорте нефти и улучшая пропускную способность добычи из скоординированных инвестиций."
 
 io_eec_desc: "[concept_eec] является [concept_free_trade_agreement], устанавливающим таможенный союз между европейскими государствами-членами. Члены имеют общий рынок со стандартизированными правилами продуктов и скоординированной торговой политикой, снижая барьеры для торговли через границы."
 
 io_arab_league_desc: "[concept_arab_league] - это [concept_cultural_pact] арабоязычных стран, которые способствуют политическому, экономическому, культурному и социальному сотрудничеству. Совместное наследие ускоряет обмен технологиями и идеями, а солидарность государств-членов помогает подавлять внутреннее революционное давление."
 
