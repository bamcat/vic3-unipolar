 # ── TREATY ARTICLES ──────────────────────
 
 defense_attache: "Отправить атташе обороны"
 defense_attache_desc: "Включите военных советников и офицеров связи в вооруженные силы страны-мишени. Цель получает опыт и снижает военные расходы; источник получает влияние и дипломатическое положение. Страна-источник должна поддерживать больший прогноз мощности, чем цель."
 
 cultural_exchange: "Культурный обмен"
 cultural_exchange_desc: "Создайте официальную программу культурного обмена — совместные выставки, академические программы и контакты между людьми. Обе страны приобретают престиж, влияние и становятся более привлекательными для мигрантов."
 
 research_partnership: "Исследовательское партнерство"
 research_partnership_desc: "Формальное соглашение о совместном использовании исследовательских программ и академических учреждений. Обе страны выигрывают от повышения скорости исследований и распространения технологий. Требует, чтобы обе стороны были как минимум признанными державами."
 
 human_development_collaboration: "Сотрудничество в области человеческого развития"
 human_development_collaboration_desc: "Более богатая страна финансирует программы развития в целевом направлении — здравоохранение, образование, социальное обеспечение. Источник оплачивает текущие расходы в обмен на влияние и престиж. Соглашение нарушается, если экономика страны-источника падает ниже целевой."
 
 research_partnership_rank_tt: "Обе страны должны быть по крайней мере признанными державами для вступления в научно-исследовательское партнерство."
 
 # ── DIPLOMATIC ACTIONS ───────────────────
 
 financial_sanctions: "Финансовые санкции"
 financial_sanctions_desc: "Отключите финансовые отношения [ROOT.GetCountry.GetName] с целью блокирования доступа к кредитным рынкам и ограничения торговли ценными бумагами. Значительно пострадают банковский и финансовый секторы."
 
 condemn: "осуждать"
 condemn_desc: "Публично осудить действия страны-мишени. Цель постоянно страдает от престижа, легитимности и дипломатической репутации. Требует от мишени значительного позора."
 condemn_action_notification_name: "[INITIATOR_COUNTRY.GetName] осуждает нас!"
 condemn_pact_desc: "[SCOPE.GetRootScope.GetDiplomaticPact.GetFirstCountry.GetName] осуждает [SCOPE.GetRootScope.GetDiplomaticPact.GetSecondCountry.GetName]!"
 condemn_action_notification_desc: "Мы были осуждены [INITIATOR_COUNTRY.GetName]!"
 condemn_break_name:0 "Отозвать осуждение"
 condemn_pact_desc:0 "Осудить действия этой страны."
 
 propose_un_sanctions: "Предложить санкции ООН"
 propose_un_sanctions_desc: "Как постоянный член Совета Безопасности мы можем предложить Организации Объединенных Наций официально санкционировать эту цель. Если голосование пройдет, цель столкнется с серьезными экономическими штрафами в течение пяти лет."
 propose_un_sanctions_action_notification_name: "[INITIATOR_COUNTRY.GetName] предложил санкции ООН против нас!"
 propose_un_sanctions_pact_desc: "[SCOPE.GetRootScope.GetDiplomaticPact.GetFirstCountry.GetName] ходатайствовало о международных санкциях против [SCOPE.GetRootScope.GetDiplomaticPact.GetSecondCountry.GetName]!"
 propose_un_sanctions_action_notification_desc:1 "[INITIATOR_COUNTRY.GetName] предложил ООН ввести против нас международные санкции!"
 
 propose_un_condemnation: "Осуждение ООН"
 propose_un_condemnation_desc: "Предлагаю Организации Объединенных Наций официально осудить цель. Если голосование пройдет, цель пострадает от длительного престижа и ущерба легитимности. Менее жесткие, чем санкции."
 propose_un_condemnation__action_notification_name:0 "[INITIATOR_COUNTRY.GetName] предложил осуждение ООН!"
 propose_un_condemnation_pact_desc:0 "[SCOPE.GetRootScope.GetDiplomaticPact.GetFirstCountry.GetName] ходатайствовал о международном осуждении [SCOPE.GetRootScope.GetDiplomaticPact.GetSecondCountry.GetName]!"
 propose_un_condemnation_action_notification_desc:0 "[INITIATOR_COUNTRY.GetName] выступил в Организации Объединенных Наций с предложением о международном осуждении нас!"
 
 condemn_requires_infamy_tt: "Цель должна иметь заметный позор"
 propose_un_sanctions_perm_member_tt: "Только постоянные члены Совета Безопасности могут предлагать санкции или осуждение ООН."
 
 # ── UN EVENTS ────────────────────────────
 
 un_events.102.t: "ООН: голосование по санкциям"
 un_events.102.d: "Постоянный член Совета Безопасности предложил резолюцию против государства-члена. [ROOT.GetCountry.GetName] может голосовать с помощью кнопок Yay или Nay в журнале Организации Объединенных Наций. Результат будет объявлен через 120 дней."
 un_events.102.a: "Мы будем тщательно обдумывать"
 
 # ── NOTIFICATIONS ─────────────────────────
 
 un_sanctions_passed: "Санкции ООН введены"
 un_sanctions_passed_desc: "Организация Объединенных Наций проголосовала за введение санкций против [ROOT.GetCountry.GetName]. Серьезные экономические санкции останутся в силе в течение пяти лет."
 
 un_condemnation_passed: "Осуждение ООН вынесено"
 un_condemnation_passed_desc: "Организация Объединенных Наций официально осудила [ROOT.GetCountry.GetName]. [ROOT.GetCountry.GetName] международное положение было значительно повреждено."
 
 # ── MODIFIERS ────────────────────────────
 
 financial_sanctions_target: "Под финансовыми санкциями"
 financial_sanctions_target_desc: "Иностранная держава ввела финансовые санкции в отношении [ROOT.GetCountry.GetName], блокируя доступ к международным кредитам и ограничивая финансовый сектор."
 
 condemned_modifier: "Международный осужденный"
 condemned_modifier_desc: "Иностранная держава официально осудила [ROOT.GetCountry.GetName]. Престиж и легитимность снижаются на время осуждения."
 
 un_sanctions_target: "Санкции ООН"
 un_sanctions_target_desc: "Организация Объединенных Наций проголосовала за введение санкций в отношении [ROOT.GetCountry.GetName]. Международная финансовая система фактически закрыта. Серьезные экономические санкции остаются в силе в течение пяти лет."
 
 un_condemnation_target: "Осуждение ООН"
 un_condemnation_target_desc: "Организация Объединенных Наций официально осудила [ROOT.GetCountry.GetName]. Престиж, легитимность и дипломатическая репутация пострадали. Осуждение остается рекордным в течение пяти лет."
 
 un_je_voting_sanctions_tt: "#bold Голосование по санкциям ООН — голосование продолжается.#! Постоянный член Совета Безопасности предложил ввести санкции против [GetGlobalVariable('un_sanction_target').GetCountry.GetName]. Используйте кнопки Yay или Nay ниже, чтобы проголосовать. Если предложение будет принято, цель будет подвергаться серьезным экономическим санкциям в течение пяти лет."
 
 un_je_voting_condemnation_tt: "#bold Голосование по осуждению ООН — голосование продолжается.#! Постоянный член Совета Безопасности предложил официально осудить [GetGlobalVariable('un_sanction_target').GetCountry.GetName]. Используйте кнопки Yay или Nay ниже, чтобы проголосовать. Если движение пройдет, цель понесет длительный ущерб ее престижу и легитимности."
 
 un_je_under_sanctions_tt: "@warning! #bold [ROOT.GetCountry.GetName] в настоящее время находится под санкциями Организации Объединенных Наций.#! Международное сообщество проголосовало за введение экономических санкций в отношении [ROOT.GetCountry.GetName]. Пропускная способность банков, инвестиции и строительство сильно ограничены. Санкции останутся в силе до истечения срока их действия."
 
 un_je_under_condemnation_tt: "@warning! #bold [ROOT.GetCountry.GetName] был официально осужден Организацией Объединенных Наций.#! Международное сообщество проголосовало за осуждение поведения [ROOT.GetCountry.GetName]. Престиж, легитимность и дипломатическая репутация снижаются. Осуждение остается в силе до тех пор, пока оно не истечет."
 
