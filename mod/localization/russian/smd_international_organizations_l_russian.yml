 io_financial_agreement_member_desc: "Членство в международном финансовом соглашении обеспечивает повышенное дипломатическое влияние и положение среди крупнейших экономик мира."
 
 io_free_trade_agreement_member: "Член Соглашения о свободной торговле"
 io_free_trade_agreement_member_desc: "Эта страна является участником таможенного союза с другими членами, уменьшая торговые барьеры и гармонизируя экономические правила."
 
