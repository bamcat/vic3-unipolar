 ### ══════════════════════════════════════════
 ### EVENTS
 ### ══════════════════════════════════════════

 opec_events.1.t: "Голосование ОПЕК инициировано"
 opec_events.1.d: "Страна-член призвала к голосованию в Организации стран-экспортеров нефти. Всем членам предлагается проголосовать через запись в журнале ОПЕК."
 opec_events.1.a: "Мы рассмотрим нашу позицию"

 opec_events.10.t: "Голосование ОПЕК завершилось"
 opec_events.10.d: "Голосование ОПЕК завершилось, и результаты подсчитываются."

 opec_events.11.t: "ОПЕК увеличивает добычу"
 opec_events.11.d: "Страны ОПЕК проголосовали за увеличение квот на добычу нефти. В следующем году все страны-члены выиграют от увеличения объемов добычи и улучшения торгового позиционирования для экспорта нефти."
 opec_events.11.a: "Краны открыты."

 opec_events.12.t: "ОПЕК сокращает добычу"
 opec_events.12.d: "Страны-члены ОПЕК проголосовали за сокращение квот на добычу нефти. В следующем году все страны-члены ограничат добычу нефти, чтобы ужесточить глобальные поставки и поддержать цены."
 opec_events.12.a: "Мы будем соблюдать"

 opec_events.13.t: "ОПЕК ввела эмбарго на нефть"
 opec_events.13.d: "Организация стран-экспортеров нефти проголосовала за введение нефтяного эмбарго. Государства-члены ОПЕК будут коллективно ограничивать экспорт нефти в целевую страну, серьезно нарушая их экономику."
 opec_events.13.a: "Это изменит мировую торговлю"

