 io_events.10.t: "Маастрихтский договор"
 io_events.10.d: "Государства-члены Европейского экономического сообщества договорились углубить свою интеграцию через Договор о Европейском союзе. ЕЭС будет официально преобразована в Европейский Союз, политический и экономический союз с расширенными компетенциями во внешней политике, правосудии и денежно-кредитных делах."
 io_events.10.a: "Новая эра для Европы"
 
 io_events.11.t: "Родился Европейский Союз"
 io_events.11.d: "Европейское экономическое сообщество было официально преобразовано в Европейский союз. Как государство-член, наша страна в настоящее время является частью беспрецедентного эксперимента в наднациональном управлении."
 io_events.11.a: "Начинается новая глава"
 
