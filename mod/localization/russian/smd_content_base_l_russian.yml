 # ==========================================
 # JOURNAL ENTRY
 # ==========================================
 
 je_covid_pandemic: "COVID-19 Пандемия"
 je_covid_pandemic_reason: "Новый респираторный коронавирус появился в [ROOT.GetCountry.GetName] и быстро распространяется по всему миру. COVID-19 распространяется быстрее, чем любой патоген в живой памяти, используя плотные сети торговли и путешествий, которые связывают современный мир вместе. Смертность сосредоточена среди пожилых людей и людей с ослабленным иммунитетом, но ее охват угрожает перегрузить системы здравоохранения в каждой стране, к которой она относится.\n\n Используйте #bold COVID-19 Response#! решение установить политику. Локдауны замедляют распространение, но ударяют по экономике. Маски и дистанцирование менее эффективны, но более устойчивы. Ничего не делать — это тоже выбор, который запомнится избирателям и погибшим."
 
 # ==========================================
 # covid.1 — PANDEMIC ARRIVES
 # ==========================================
 
 covid.1.t: "Новый коронавирус"
 covid.1.d: "Группа необычных случаев пневмонии была зарегистрирована в [SCOPE.sState('plague_origin_state').GetName], [ROOT.GetCountry.GetName]. Предварительный анализ, проведенный органами здравоохранения [ROOT.GetCountry.GetAdjective], показывает, что ранее неизвестный коронавирус — распространяющийся от человека к человеку, с инкубационным периодом достаточно длительным, чтобы носители были заразны, прежде чем они узнают, что они больны.\n\n Всемирная организация здравоохранения была уведомлена. Остается ли это локальной вспышкой или становится чем-то большим, зависит от решений, принятых в ближайшие недели."
 covid.1.f: "Новый патоген. Снова."
 covid.1.a: "Уведомить ВОЗ и начать отслеживание контактов"
 
 # ==========================================
 # covid.2 — SPREAD
 # ==========================================
 
 covid.2.t: "COVID-19 достигает [ROOT.GetCountry.GetName]"
 covid.2.d: "Случаи нового коронавируса, впервые идентифицированные в [SCOPE.sCountry('plague_originator_country').GetName], были подтверждены в [ROOT.GetCountry.GetName]. Вирус прибыл через путешественника, торговый маршрут или просто невидимые потоки связанного мира.\n\n[ROOT.GetCountry.GetAdjective] Органы здравоохранения активируют протоколы реагирования на пандемию. Используйте решение #bold COVID-19 Response#! для установки политики."
 covid.2.f: "Это был лишь вопрос времени."
 covid.2.a: "Активировать пандемические протоколы"
 
 # ==========================================
 # covid.3 — SUBSEQUENT WAVES
 # ==========================================
 
 covid.3.t: "Вариант Омикрона"
 covid.3.d: "Новый вариант вызвал свежую волну инфекций COVID-19. Органы здравоохранения пересматривают протоколы сдерживания."
 covid.3.f: "Вирус все еще с нами."
 
 # ==========================================
 # covid.4 — NOTIFICATION TO OTHER PLAYERS
 # ==========================================
 
 covid.4.t: "Новый вирус из Уханя, Китай"
 covid.4.a: "внимательно следить за ситуацией"
 
 # ==========================================
 # covid.5 — RESPONSE CHOICE
 # ==========================================
 
 covid.5.t: "Политика реагирования на COVID-19"
 covid.5.d: "Как реагировать на пандемию [ROOT.GetCountry.GetName]? Выбор будет определять экономический и социальный ландшафт следующих лет."
 covid.5.f: "Хороших вариантов нет. Только компромиссы."
 covid.5.a: "Полная блокировка — закрытие бизнеса, ограничение движения"
 covid.5.b: "Мандаты маски и руководящие принципы социального дистанцирования"
 covid.5.c: "Держите экономику открытой - отдавайте приоритет восстановлению"
 
 # ==========================================
 # covid.7 — WAR SUPPORT
 # ==========================================
 
 covid.7.t: "Пандемия подрывает военные усилия"
 covid.7.d: "Поскольку COVID-19 опустошает население [ROOT.GetCountry.GetName], [SCOPE.gsInterestGroup('pacifist_ig').GetName] — во главе с [SCOPE.sCharacter('pacifist_leader').GetFullName] — ставится вопрос о том, может ли страна, борющаяся с пандемией, поддерживать войну одновременно. Население исчерпано. Полевые больницы конкурируют с фронтовой логистикой за ресурсы."
 covid.7.f: "Боритесь с вирусом или с врагом. Делать и то, и другое трудно."
 covid.7.a: "Война продолжается — вирус не меняет этого."
 covid.7.b: "Используйте сообщения общественного здравоохранения для поддержания морального духа"
 covid.7.c: "Подавить пораженческий нарратив"
 
 # ==========================================
 # covid.8 — POVERTY AND EVICTIONS
 # ==========================================
 
 covid.8.t: "Экономический ущерб от пандемии"
 covid.8.d: "Пандемия стоила тысячам рабочих рабочих мест, а уровень безработицы превысил 20%. Семьи не могут платить аренду. Арендодатели, поддерживаемые [SCOPE.gsInterestGroup('landowner_ig').GetName], настаивают на праве выселения. Бедность концентрируется в районах, которые уже больше всего пострадали от вируса."
 covid.8.f: "Пандемия внутри пандемии."
 covid.8.a: "Ввести мораторий на замораживание арендной платы и выселение"
 covid.8.b: "Расширение социального обеспечения и пособий по безработице"
 covid.8.c: "Рынок разберется"
 
 # ==========================================
 # covid.9 — ANTI-MASK RESISTANCE
 # ==========================================
 
 covid.9.t: "Протесты против блокировки"
 covid.9.d: "[SCOPE.gsInterestGroup('anti_mask_ig').GetName], возглавляемый [SCOPE.sCharacter('anti_mask_ig_leader').GetFullName], организовал массовые протесты против пандемических ограничений [ROOT.GetCountry.GetName]. Их позиция: запреты и мандаты масок являются чрезмерным охватом правительства, экономический ущерб больше, чем риск для здоровья, и граждане имеют право делать свой собственный выбор.\n\n Протесты растут. Как реагирует [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName], создаст прецедент."
 covid.9.f: "Маски. Холм, который они выбрали."
 covid.9.a: "Держитесь твердо — ограничения остаются"
 covid.9.b: "Отступить — снять ограничения"
 covid.9.c: "Научные опровержения Комиссии и кампании общественного здравоохранения"
 
