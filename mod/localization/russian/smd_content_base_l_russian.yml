 great_polarization.1.f:0 "Все выборы становятся экзистенциальными. Каждый скандал становится доказательством. Каждая трагедия становится оружием."
 great_polarization.1.a:0 "Центр начинает трескаться."
 great_polarization.30.t:0 "Убийство Джорджа Флойда"
 great_polarization.30.d:0 "Убийство Джорджа Флойда полицией вызвало общенациональную волну протестов с требованиями подотчетности, реформы полиции и расовой справедливости."
