 great_polarization.38.t:0 "Капитолий США осаждён"
 great_polarization.38.d:0 "Толпа штурмовала Капитолий США после ожесточенно оспариваемых выборов, шокируя страну и усиливая опасения, что политический конфликт нарушает конституционные ограничения."
 great_polarization.38.f:0 "Ротонда становится полем битвы символов."
 great_polarization.38.a:0 "Республика дрожит."
 great_polarization.38.b:0 "Осудите нападение и восстановите доверие."
 
 ## other western countries
 
 je_rise_of_the_right:0 "Возвышение правых"
 je_rise_of_the_right_reason:0 "На Западе правые популистские движения набирают силу благодаря фрагментации СМИ, негативной реакции на миграцию, политике войны за культуру и недовольству истеблишментом. До 2035 года правые движения были сильнее, и правые популистские лидеры, скорее всего, появятся."

 rise_of_the_right_status_baseline:0 "Правые движения набирают силу."
 rise_of_the_right_status_strong:0 "Правый популистский всплеск меняет национальную политику."
 rise_of_the_right_completion_header:0 "Эта волна стихает после 2035 года."
 rise_of_the_right_ends_2035_tt:0 "Восхождение правых заканчивается после #bold 1 января 2035#!."
 rise_of_the_right_spawnrate_tt:0 "Популистский лидер правого толка растет. Точные веса нереста обрабатываются вручную в файлах нереста идеологии / символа."

 rise_of_the_right.1.t:0 "Возвышение правых"
 rise_of_the_right.1.d:0 "Новое правопопулистское течение вошло в национальную политику. Он черпает силу из недоверия к институтам, гнева на элиты, культурной реакции и фрагментированной медиа-среды."
 rise_of_the_right.1.f:0 "Старые партии продолжают занимать свои должности. Новая политика учится удерживать толпу."
 rise_of_the_right.1.a:0 "Политический центр больше не в безопасности."

 rise_of_the_right.10.t:0 "Алгоритмический гнев"
 rise_of_the_right.10.d:0 "Онлайн-политические сети усилили возмущение против истеблишмента, предоставив правым популистским движениям новые способы организации вне традиционных партий."
 rise_of_the_right.10.f:0 "Корм становится ралли. Жалоба становится платформой."
 rise_of_the_right.10.a:0 "Возмущение распространяется."
 rise_of_the_right.10.b:0 "Возвращайтесь к гражданским институтам."

 rise_of_the_right.11.t:0 "Миграционная реакция"
 rise_of_the_right.11.d:0 "Всплеск гнева по поводу иммиграции, интеграции и национальной идентичности усилил правые движения."
 rise_of_the_right.11.f:0 "Граница становится символом любого страха, на который старый порядок не может ответить."
 rise_of_the_right.11.a:0 "Реакция растет."
 rise_of_the_right.11.b:0 "Деэскалация дебатов."

 rise_of_the_right.12.t:0 "Популисты прорываются"
 rise_of_the_right.12.d:0 "Правая популистская фракция прорвала старую партийную систему, заставив основные партии реагировать на ее язык и повестку дня."
 rise_of_the_right.12.f:0 "Когда-то они были за пределами комнаты. Теперь комната построена вокруг них."
 rise_of_the_right.12.a:0 "Правильные скачки."
 rise_of_the_right.12.b:0 "Восстановить центр."

 rise_of_the_right.13.t:0 "Уличная политика"
 rise_of_the_right.13.d:0 "Демонстрации, контрдемонстрации и вирусные конфронтации усилили ощущение того, что политика вышла из парламента и вышла на улицы."
 rise_of_the_right.13.f:0 "Песня - это политика в ее личиночной форме."
 rise_of_the_right.13.a:0 "Улицы радикализируются."
 rise_of_the_right.13.b:0 "Охладите температуру."

 rise_of_the_right_baseline:0 "Возвышение правых"
 rise_of_the_right_baseline_desc:0 "Правые движения набирают силу в национальной политике."

 rise_of_the_right_populist_surge:0 "Правый популистский всплеск"
 rise_of_the_right_populist_surge_desc:0 "Правые популисты меняют политический ландшафт."

 rise_of_the_right_migration_backlash:0 "Миграционная реакция"
 rise_of_the_right_migration_backlash_desc:0 "Иммиграция и национальная идентичность стали основными движущими силами политической мобилизации."

 rise_of_the_right_online_radicalization:0 "Алгоритмический гнев"
 rise_of_the_right_online_radicalization_desc:0 "Возмущение в интернете ускоряет политическую мобилизацию правых."

 rise_of_the_right_establishment_response:0 "Реакция учреждения"
 rise_of_the_right_establishment_response_desc:0 "Основные институты пытаются поглотить или обезвредить популистский всплеск."

 rise_of_the_right_populist_leader_spawn_tooltip_modifier:0 "Открытие Правого Популиста"
 rise_of_the_right_populist_leader_spawn_tooltip_modifier_desc:0 "Популистский лидер правого толка растет. Реальная идеология нерестовых весов обрабатывается вручную."
 
