 great_polarization.130.t:0 "Голубая Америка?"
 great_polarization.130.d:0 "С раздробленными Соединенными Штатами либеральный или левоцентристский характер администрации ставит его ближе всего к Голубой Америке. Вы можете продолжать войну как Голубая Америка или остаться с остатками Соединенных Штатов."
 great_polarization.130.f:0 "Правительство может претендовать на преемственность, но власть следует за институтами, которые все еще подчиняются."
 great_polarization.130.a:0 "Переключитесь на Голубую Америку."
 great_polarization.130.b:0 "Оставайтесь Соединенными Штатами."

 great_polarization.131.t:0 "Красная Америка?"
 great_polarization.131.d:0 "С раздробленными Соединенными Штатами правый характер администрации ставит его ближе всего к Красной Америке. Вы можете продолжать войну как Красная Америка или остаться с остатками Соединенных Штатов."
 great_polarization.131.f:0 "Флаг такой же формы, но страна под ним изменилась."
 great_polarization.131.a:0 "Переход в Красную Америку."
 great_polarization.131.b:0 "Оставайтесь Соединенными Штатами."

