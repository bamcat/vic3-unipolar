 je_second_american_civil_war:0 "Вторая американская гражданская война"
 je_second_american_civil_war_reason:0 "США вступили в новую гражданскую войну. Эта запись в журнале является эшафотом для следующего дизайнерского прохода, где будут созданы и созданы региональные американские отколовшиеся страны для борьбы друг с другом."
 second_american_civil_war_status:0 "Союз распался."
 second_american_civil_war_placeholder_tt:0 "Создайте отколовшиеся американские страны, армии и войны в следующем переходе к реализации."

 great_polarization.1.t:0 "Великая поляризация"
 great_polarization.1.d:0 "Соединенные Штаты вступают в новую эру политической поляризации, движимой фрагментацией СМИ, политикой культурных войн и взаимным страхом между идеологическими блоками."
 great_polarization.1.f:0 "Все выборы становятся экзистенциальными. Каждый скандал становится доказательством. Каждая трагедия становится оружием."
 great_polarization.1.a:0 "Центр начинает трескаться."

 great_polarization.2.t:0 "Политически мотивированные массовые расстрелы"
 great_polarization.2.d:0 "Массовая стрельба, связанная с экстремистской политической риторикой, потрясла страну. Конкурирующие фракции немедленно спорят о вине, безопасности, гражданских свободах и идеологии."
 great_polarization.2.f:0 "Погибшие скорбят. Повествование ведется до начала похорон."
 great_polarization.2.a:0 "Негодование подпитывает раскол."
 great_polarization.2.b:0 "Ищите серьезный двухпартийный ответ."

 great_polarization.3.t:0 "Попытка убийства"
 great_polarization.3.d:0 "Попытка убийства политического деятеля вызвала опасения, что политическое насилие нормализуется."
 great_polarization.3.f:0 "Выстрел не попал в цель, но поразил республику."
 great_polarization.3.a:0 "Страна отступает."
 great_polarization.3.b:0 "Расширение защитной безопасности."

 great_polarization.4.t:0 "Алгоритмическое возмущение"
 great_polarization.4.d:0 "Платформы социальных сетей усилили политическое возмущение, подвергая миллионы радикальному контенту, сетям заговора и контрмобилизации, основанной на идентичности."
 great_polarization.4.f:0 "Корм не убеждает. Это обостряется."
 great_polarization.4.a:0 "Машина возмущения ускоряется."
 great_polarization.4.b:0 "Платформы давления умеренные."

 great_polarization.5.t:0 "Волна экспозиции"
 great_polarization.5.d:0 "Волна публичных обвинений в адрес влиятельных фигур вызвала общенациональную оценку злоупотреблений, пола и институционального лицемерия."
 great_polarization.5.f:0 "То, что было прошептано, теперь можно найти."
 great_polarization.5.a:0 "Расчет распространяется."
 great_polarization.5.b:0 "Создание институциональных каналов подотчетности."

 great_polarization.6.t:0 "Целевые меньшинства"
 great_polarization.6.d:0 "Всплеск враждебности по отношению к общинам меньшинств вызвал протесты, контрпротесты и возобновленные дебаты по поводу расизма, идентичности и национальной принадлежности."
 great_polarization.6.f:0 "Для некоторых это обратная реакция. Для других – это выживание."
 great_polarization.6.a:0 "Улицы снова заполняются."
 great_polarization.6.b:0 "Осудите негативную реакцию и понизьте температуру."

 great_polarization.20.t:0 "Температура падает"
 great_polarization.20.d:0 "Поляризация не исчезла, но прервалась самая опасная спираль. Политические институты восстановили свою легитимность."
 great_polarization.20.f:0 "Республика выживает не потому, что ее граждане согласны, а потому, что достаточное количество из них принимает проигрыш."
 great_polarization.20.a:0 "Союз продолжает существовать."

 great_polarization.21.t:0 "Разделение укоренилось"
 great_polarization.21.d:0 "Непосредственный кризис не перерос в гражданскую войну, но поляризация стала неотъемлемой частью американской политической жизни."
 great_polarization.21.f:0 "Лихорадка не сломалась. Это стало хроническим."
 great_polarization.21.a:0 "Новая норма."

 great_polarization.100.t:0 "Вторая американская гражданская война"
 great_polarization.100.d:0 "Революционный кризис разбил США. Федеральная власть оспаривается, и вооруженные группировки начинают разделять страну на конкурирующие правительства."
 great_polarization.100.f:0 "Первая гражданская война спросила, сможет ли союз выжить. Второй вопрос: что такое союз?"
 great_polarization.100.a:0 "Профсоюзный раскол."

 great_polarization_baseline:0 "Великая поляризация"
 great_polarization_baseline_desc:0 "Политическая атмосфера становится все более радикальной и реактивной."

 great_polarization_right_wing_president:0 "Председательство правого крыла"
 great_polarization_right_wing_president_desc:0 "Правый президент активизировал либеральные, социал-демократические, социалистические, коммунистические и оппозиционные движения правых меньшинств."

 great_polarization_left_wing_president:0 "Левое президентство"
 great_polarization_left_wing_president_desc:0 "Левый президент активизировал консервативные, либертарианские, традиционалистские, фашистские и оппозиционные движения религиозного большинства."

 great_polarization_divided_media:0 "Укрепленная поляризация"
 great_polarization_divided_media_desc:0 "Средства массовой информации изолируют политические лагеря друг от друга."

 great_polarization_attempted_assassination:0 "Попытка убийства"
 great_polarization_attempted_assassination_desc:0 "Политическое насилие поколебало общественное доверие."

 great_polarization_mass_shooting_aftermath:0 "Политически мотивированные массовые расстрелы"
 great_polarization_mass_shooting_aftermath_desc:0 "Политически мотивированная резня углубила социальный конфликт."

 great_polarization_reform_concessions:0 "Реформистские уступки"
 great_polarization_reform_concessions_desc:0 "Серьезный ответ на реформы снизил политическую напряженность."

 great_polarization_security_crackdown:0 "Безопасность Crackdown"
 great_polarization_security_crackdown_desc:0 "Расширенные меры безопасности усилили давление со стороны государства, рискуя вызвать негативную реакцию."

 great_polarization_online_radicalization:0 "Онлайн радикализация"
 great_polarization_online_radicalization_desc:0 "Социальные платформы ускоряют политическую мобилизацию и возмущение."

 great_polarization_minorities_targeted:0 "Целевые меньшинства"
 great_polarization_minorities_targeted_desc:0 "Общины меньшинств сталкиваются с повышенной враждебностью и организуются в ответ."

 great_polarization_metoo_mobilization:0 "Общественная оценка"
 great_polarization_metoo_mobilization_desc:0 "Волна публичного разоблачения мобилизовала либеральные и радикальные движения."

 second_american_civil_war_outbreak:0 "Вторая американская гражданская война"
 second_american_civil_war_outbreak_desc:0 "США впали в революционный конфликт."
 
