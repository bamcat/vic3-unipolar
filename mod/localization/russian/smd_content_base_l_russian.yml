 great_polarization.33.t:0 "Нет королей"
 great_polarization.33.d:0 "Массовые демонстрации под лозунгом «Нет королей» наполнили улицы по всей стране, выдаваемые сторонниками как защита демократии и противниками как дестабилизирующее сопротивление."
