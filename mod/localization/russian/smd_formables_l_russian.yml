#
dp_leadership_china:0 "Ведущий Китай"

 je_one_china_prc:0 "Политика одного Китая"
 je_one_china_prc_reason:0 "Есть один Китай. [ROOT.GetCountry.GetName] сохраняет эту позицию с 1949 года — что Народная Республика является единственным законным правительством всей китайской территории, и что претензия китайского Тайбэя на управление государством Формоза является временной аберрацией, которую исправит история. Воссоединение Формозы с материком — не просто стратегическая цель. Это разрешение незавершенной гражданской войны — окончательный акт национального восстановления. Когда Формоза находится под контролем [ROOT.GetCountry.GetAdjective], век унижений действительно заканчивается."
 
 one_china_prc_owns_formosa_tt:0 "#bold Формоза находится под контролем [ROOT.GetCountry.GetAdjective].#! Политика одного Китая была оправдана. [ROOT.GetCountry.GetName] является целым."
 one_china_prc_formosa_uncontrolled_tt:0 "[SCOPE.sState('STATE_FORMOSA').GetName] остается вне контроля [ROOT.GetCountry.GetAdjective]. [SCOPE.sCountry('c:ROC').GetName] продолжает претендовать на суверенитет над материком из своего островного редута. Воссоединение Китая не завершено."
 
 je_one_china_roc:0 "Политика одного Китая"
 je_one_china_roc_reason:0 "Есть один Китай. [ROOT.GetCountry.GetName] сохраняет эту позицию с 1949 года — что Китайская Республика является законным правительством всей китайской территории и что оккупация Китаем материка является временным отклонением, которое исправит история.\n\n Народная Республика должна быть приведена в конституционный порядок [ROOT.GetCountry.GetAdjective]. Когда Китайская Народная Республика становится субъектом [ROOT.GetCountry.GetName], начинается задача интеграции — поглощения обширного населения и территории материка в единое китайское государство под руководством [ROOT.GetCountry.GetAdjective]."
 
 one_china_roc_has_subject_tt:0 "#bold [SCOPE.sCountry('c:CHI').GetName] является субъектом [ROOT.GetCountry.GetName].#! Материк был приведен в конституционный порядок [ROOT.GetCountry.GetAdjective]. В настоящее время осуществляется интеграция обширной территории [SCOPE.sCountry('c:CHI').GetAdjective]."
 one_china_roc_no_subject_tt:0 "[SCOPE.sCountry('c:CHI').GetName] остается независимым при коммунистической партии. [ROOT.GetCountry.GetName] контролирует только [SCOPE.sState('STATE_FORMOSA').GetName] и его отдаленные территории. Воссоединение Китая под руководством [ROOT.GetCountry.GetAdjective] не завершено."

 one_china_reunification_bonus:0 "Китай воссоединился"
 one_china_reunification_bonus_desc:0 "Воссоединение Формозы с материком разрешило незаконченную гражданскую войну и исцелило вековую рану в национальном сознании. Авторитет, легитимность и престиж значительно улучшаются. Сепаратистские движения подавляются. Государство является целым."
 
 one_china_roc_integration_bonus:0 "Интеграция материка"
 one_china_roc_integration_bonus_desc:0 "[ROOT.GetCountry.GetName] включил бывшую Китайскую Народную Республику в свой конституционный порядок. Началась огромная задача интеграции территории и населения материка. Скорость инкорпорации резко ускоряется, поскольку государство расширяет свои институты по всему континенту."
