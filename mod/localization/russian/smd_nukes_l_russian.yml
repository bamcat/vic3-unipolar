l_russian:

 MILITARY_PANEL_TITLE_NUCLEAR:0 "Стратегическая война"
 NUCLEAR_WARHEADS_LABEL: "Ядерный арсенал"
 NUCLEAR_PROGRAMME_STATUS_LABEL: "Статус программы"
 NUCLEAR_PLANTS_HEADER: "Ядерная инфраструктура"
 URANIUM_ENRICHMENT_HEADER: "Обогащение урана"
 NUCLEAR_PRODUCTION_HEADER: "Производство Warhead"
 NUCLEAR_ARSENAL_HEADER: "Арсенал"
 MILITARY_PANEL_TAB_NUCLEAR_TOOLTIP: "Программа ядерного оружия"
 
 NUCLEAR_BEGIN_ENRICHMENT_TOOLTIP: "Запустить программу по обогащению урана. Требуется, по крайней мере, #bold 3 атомные станции #! на вашей территории и статус основной мощности. Программа займет несколько лет и привлечет международное внимание. \n #r Подписанты #b Договор о нераспространении #! не может обогащать уран. #!"
 NUCLEAR_BEGIN_PRODUCTION_TOOLTIP: "Изготовление ядерной боеголовки. Требуется по меньшей мере #bold 1 ядерный силос#!. быстрее, чем обогащение. Каждый завершенный производственный цикл добавляет одну боеголовку в ваш арсенал."
 NUCLEAR_ENRICHMENT_PROGRESS_TOOLTIP: "Прогресс в обогащении урана. Достигает 100 при полном обогащении и достижении ядерного потенциала."
 NUCLEAR_PRODUCTION_PROGRESS_TOOLTIP: "Прогресс в производстве боеголовок. Достигает 100, когда боеголовка завершена и добавлена в ваш арсенал."
 NUCLEAR_PLANTS_INFO: "Атомные станции в вашей стране: [GetPlayer.MakeScope.ScriptValue('nuclear_plant_count_sv')|v0] \n Требуется начать обогащение: #bold 3#!"
 NUCLEAR_WEAPONS:0 "[concept_nuclear_weapon]"
 NUCLEAR_WEAPONS_TOOLTIP:0 "Активные ядерные боеголовки: [Country.MakeScope.Var('nukes').GetValue]"
 
 building_nuclear_silo:0 "Ядерный силос"
 
 # ── JOURNAL ENTRIES ───────────────────────
 
 je_uranium_enrichment: "Программа обогащения урана"
 je_uranium_enrichment_reason: "[ROOT.GetCountry.GetName] инициировал программу обогащения урана. Центрифуги работают. Ученые работают. И мир, если узнает, захочет получить ответы.\n\n Программа продвигается каждый месяц. Дополнительные атомные станции ускоряют прогресс. Война разрушает его. По завершении работ [ROOT.GetCountry.GetName] будет обладать ядерным потенциалом — способностью производить оружейный материал."
 
 je_enrichment_early_tt: "Программа находится на ранних стадиях. Испытываются каскады центрифуг. Пройдут годы, прежде чем будет завершено обогащение."
 je_enrichment_mid_tt: "#bold Обогащение прогрессирует.#! Каскады работают на полную мощность. Научная команда находится на пути."
 je_enrichment_late_tt: "@warning! #bold Обогащение приближается к завершению.#! Оружейный уран почти готов."
 
 nuclear_enrichment_progress_bar: "Прогресс в области обогащения"
 nuclear_enrichment_progress_bar_desc: "Прогресс в области обогащения"
 nuclear_enrichment_progress_bar_tt: "Ежемесячное обогащение"
 
 je_nuclear_production: "Производство ядерных боеголовок"
 je_nuclear_production_reason: "[ROOT.GetCountry.GetName] производит первую ядерную боеголовку. Расщепляющийся материал готов. Инженерная команда собирает устройство. Производство идет быстрее обогащения — тяжелая работа уже сделана."
 
 je_production_early_tt: "Боеголовка находится на ранней сборке. Инженерная команда работает по графику."
 je_production_late_tt: "#bold Производство почти завершено.#! Проводятся окончательные сборки и проверки вооружения."
 
 nuclear_production_progress_bar: "Производственный прогресс"
 nuclear_production_progress_bar_desc: "Производственный прогресс"
 nuclear_production_progress_bar_tt: "Ежемесячный производственный прогресс"
 
 # ── EVENTS ───────────────────────────────
 
 nuclear_events.1.t: "Обогащение урана завершено"
 nuclear_events.1.d: "[ROOT.GetCountry.GetName] успешно обогащает уран до оружейной чистоты. Программа, проводимая в течение нескольких лет на объектах, построенных для этой цели, достигла своей технической цели.\n\n В настоящее время страна обладает научным и промышленным потенциалом для производства ядерного оружия. Вопрос о том, продолжать ли производство, является отдельным решением, но порог был пересечен. [ROOT.GetCountry.GetName] является ядерным пороговым состоянием."
 nuclear_events.1.f: "Трудная часть выполнена."
 nuclear_events.1.a: "Начните подготовку к производству боеголовок"
 
 nuclear_events.2.t: "Разведывательные службы: программа раскрыта"
 nuclear_events.2.d: "Иностранные разведывательные агентства, опираясь на спутниковые снимки, отчеты о перебежчиках и сигналы разведки, пришли к выводу с высокой степенью уверенности, что [ROOT.GetCountry.GetName] осуществляет тайную программу ядерного оружия.\n\n Результаты циркулируют среди союзных правительств. Совет Безопасности был проинформирован неофициально. [ROOT.GetCountry.GetName] может отрицать, объяснять или владеть им. Каждый путь имеет последствия."
 nuclear_events.2.f: "Ничто не остается секретом вечно."
 nuclear_events.2.a: "Отрицание — объекты являются чисто гражданской энергетической инфраструктурой"
 nuclear_events.2.b: "Признание — [ROOT.GetCountry.GetName] имеет право на сдерживание"
 
 nuclear_events.3.t: "Первая боеголовка произведена"
 nuclear_events.3.d: "[ROOT.GetCountry.GetName] произвел свою первую ядерную боеголовку. Устройство собирается, тестируется и хранится. Решение о том, где его развернуть — и в соответствии с какой доктриной — будет принято позже.\n\n На данный момент: [ROOT.GetCountry.GetName] вошел в ядерный клуб. Мир стал совсем другим, чем был сегодня утром."
 nuclear_events.3.f: "Боеголовка — это своего рода аргумент. Самый последовательный вид."
 nuclear_events.3.a: "Сдерживание устанавливается"
 
 # ── MODIFIERS ────────────────────────────
 
 nuclear_capable_modifier: "Государство ядерного порога"
 nuclear_capable_modifier_desc: "[ROOT.GetCountry.GetName] достиг ядерного потенциала — способности производить оружейный расщепляющийся материал. Укрепляется престиж и дипломатический статус. Теперь может начаться производство боеголовок."
 
 nuclear_programme_denied: "Программа отклонена"
 nuclear_programme_denied_desc: "[ROOT.GetCountry.GetName] официально отрицает наличие ядерной программы. Отрицание не является универсальным. Поколение позора увеличивается."
 
 nuclear_programme_acknowledged: "Признанная программа"
 nuclear_programme_acknowledged_desc: "[ROOT.GetCountry.GetName] признал свою ядерную программу, заявляя о праве на сдерживание. Отношения с крупными державами сильно пострадали."
 
 nuclear_warhead_produced_modifier: "Ядерная энергия"
 nuclear_warhead_produced_modifier_desc: "[ROOT.GetCountry.GetName] произвел свою первую ядерную боеголовку. Стратегическое сдерживание страны теперь реально."
 
 NUCLEAR_TARGETING_HEADER: "Ядерные цели"
 
 NUCLEAR_DEPLOY_10_TOOLTIP: "Разверните 10% своего ядерного арсенала. Самый маленький практический удар — хирургический и ограниченный по масштабу."
 NUCLEAR_DEPLOY_25_TOOLTIP: "Разверните 25% своего арсенала. Ограниченный ядерный обмен."
 NUCLEAR_DEPLOY_50_TOOLTIP: "Разверните половину своего арсенала. Крупный ядерный удар."
 NUCLEAR_DEPLOY_75_TOOLTIP: "Разверните 75% своего арсенала. Разрушительный первый удар."
 NUCLEAR_DEPLOY_100_TOOLTIP: "Разверните весь свой арсенал. Тотальная ядерная война."
 
 NUCLEAR_ADD_TARGET_TOOLTIP: "Добавьте это состояние в список ядерных целей."
 NUCLEAR_REMOVE_TARGET_TOOLTIP: "Удалите это государство из списка ядерных целей."
 NUCLEAR_CLEAR_TARGETLIST_TOOLTIP: "Очистить все целевые государства."
 NUCLEAR_CASUALTIES_TOOLTIP: "Оценка смертности среди гражданского населения во всех целевых государствах, основанная на развернутых боеголовках и населении штатов. Фактические потери будут варьироваться."
 
 NUCLEAR_FIRE_BUTTON_TOOLTIP: "Нанести ядерный удар по всем целевым государствам. Требуется хотя бы одна цель, хотя бы одна боеголовка и активная война. Вас попросят подтвердить это до начала забастовки."
 
 NUCLEAR_STATE_TARGETED_TOOLTIP: "Сейчас эта страна находится в списке ядерных целей."
 
 # ── EVENTS ───────────────────────────────
 
 nuclear_events.4.t: "Нанести ядерный удар?"
 nuclear_events.4.d: "Решение таргетинга заблокировано. [GetPlayer.MakeScope.ScriptValue('nuclear_warheads_to_use_sv')|v0] боеголовки (боеголовки) были присвоены [GetPlayer.MakeScope.ScriptValue('nuclear_target_count_sv')|v0] состоянию(ам).\n\n Предполагаемые жертвы среди гражданского населения: #R ~[GetPlayer.MakeScope.ScriptValue('nuclear_estimated_total_casualties_sv')|vD]#!\n\n Это действие необратимо. Боеголовки будут расходоваться. Государства будут уничтожены. Мир узнает, кто это сделал.\n\n Хотите продолжить?"
 nuclear_events.4.f: "Его нельзя вернуть."
 nuclear_events.4.a: "#R Подтвердить — запустить удар#!"
 nuclear_events.4.b: "Аборт — Stand Down"
 
 nuclear_events.5.t: "Ядерная атака"
 nuclear_events.5.d: "[ROOT.GetCountry.GetName] был поражен ядерным оружием.\n\n Несколько боеголовок взорвались на территории [ROOT.GetCountry.GetAdjective]. Города горят. Коммуникации в пострадавших регионах рухнули. Масштаб жертв пока неизвестен — ранние оценки предполагают, что число погибших катастрофическое.\n\n Нападение было совершено без предупреждения. Никакой декларации не было. Никаких ультиматумов. Ничего не было."
 nuclear_events.5.f: "Больше нечего сказать."
 nuclear_events.5.a: "Начать экстренное реагирование"
 
 
 # ── EVENT 6: IAEA REQUEST ─────────────────
 
 nuclear_events.6.t: "МАГАТЭ запросило доступ к инспекции"
 nuclear_events.6.d: "Международное агентство по атомной энергии официально запросило доступ к ядерным объектам. Запрос последовал за сообщениями разведки, которые в настоящее время широко распространены среди государств-членов, предполагающими существование программы обогащения оружия.\n\n Позиция МАГАТЭ однозначна: [ROOT.GetCountry.GetName] является участником обязательств по нераспространению. Отказ в доступе к инспекции будет представлять собой существенное нарушение. Разрешение этого потребует открытия объектов для международного мониторинга и почти наверняка прекращения программы вооружений.\n\n Инспекторы ждут ответа."
 nuclear_events.6.f: "Инспекторы вежливы. Запроса нет."
 nuclear_events.6.a: "Грантовый доступ — позволить МАГАТЭ инспектировать наши объекты"
 nuclear_events.6.b: "Отказ — [ROOT.GetCountry.GetName] не будет подаваться в зарубежную инспекцию"
 
 # ── EVENT 7: UN ULTIMATUM (via IAEA refusal) ──
 
 nuclear_events.7.t: "Совет Безопасности ООН: прекратить обогащение"
 nuclear_events.7.d: "Совет Безопасности ООН принял резолюцию с требованием немедленно прекратить программу по обогащению урана и представить ее на проверку МАГАТЭ. Голосование не было близким. Резолюция требует полного прекращения в течение тридцати дней и угрожает скоординированными санкциями, если [ROOT.GetCountry.GetName] откажется выполнять.\n\n Это не просьба. Это ультиматум."
 nuclear_events.7.f: "Совет Безопасности выступил. То, что теперь делает [ROOT.GetCountry.GetName], определит его место в мире."
 nuclear_events.7.a: "Соблюдайте — прекратите обогащение и подайте на мониторинг"
 nuclear_events.7.b: "Отказ — [ROOT.GetCountry.GetName] будет продолжаться независимо от последствий"
 
 # ── EVENT 8: UN ULTIMATUM (via acknowledgement) ──
 
 nuclear_events.8.t: "Совет Безопасности ООН: разоружиться или столкнуться с последствиями"
 nuclear_events.8.d: "Признав свою ядерную программу, [ROOT.GetCountry.GetName] не оставил Совету Безопасности никакой двусмысленности в работе. Принята резолюция, требующая немедленного прекращения деятельности по обогащению и демонтажу связанной с оружием инфраструктуры.\n\n Резолюция была принята в соответствии с главой VII, что означает, что военное принуждение не было исключено. [ROOT.GetCountry.GetName] имеет тридцать дней для выполнения."
 nuclear_events.8.f: "Честность не была вознаграждена. Ультиматум в любом случае одинаков."
 nuclear_events.8.a: "Соблюдайте — остановите программу и подайте на проверку"
 nuclear_events.8.b: "Отказ — [ROOT.GetCountry.GetName] не будет разоружаться под давлением"
 
 # ── EVENT 9: GREAT POWER RESPONSE ─────────
 
 nuclear_events.9.t: "Реакция на [SCOPE.sCountry('nuclear_state').GetName] Nuclear Defiance"
 nuclear_events.9.d: "[SCOPE.sCountry('nuclear_state').GetName] отказался от ультиматума Совета Безопасности ООН и продолжает обогащать уран в сторону чистоты оружия. Режим санкций действует.\n\n[ROOT.GetCountry.GetName] Теперь необходимо четко обозначить позицию. Страна в нашей стратегической сфере разрабатывает ядерное оружие вопреки международному порядку, который мы помогли построить. Вопрос в том, насколько сильно мы отвечаем."
 nuclear_events.9.f: "Слова были опробованы. Это момент, чтобы решить, что будет дальше."
 nuclear_events.9.a: "Вмешательство — запуск дипломатической игры для принуждения к разоружению"
 nuclear_events.9.b: "Угроза — проясните последствия без применения силы"
 
 # ── MODIFIERS ────────────────────────────
 
 nuclear_iaea_cooperation: "Соглашение о сотрудничестве МАГАТЭ"
 nuclear_iaea_cooperation_desc: "[ROOT.GetCountry.GetName] открыл свои ядерные объекты для мониторинга МАГАТЭ. В обмен на поддающееся проверке гражданское использование была расширена международная поддержка инфраструктуры ядерной энергетики."
 
 nuclear_iaea_defiance: "МАГАТЭ отказалось от доступа"
 nuclear_iaea_defiance_desc: "[ROOT.GetCountry.GetName] отказался от международной инспекции своих ядерных объектов. Дипломатический статус значительно ухудшился."
 
 nuclear_un_compliance: "Соблюдение требований ООН в области разоружения"
 nuclear_un_compliance_desc: "[ROOT.GetCountry.GetName] принял ультиматум ООН и остановил свою ядерную программу. Это решение было политически дорогостоящим."
 
 nuclear_un_sanctions: "Ядерные санкции ООН"
 nuclear_un_sanctions_desc: "Совет Безопасности ООН ввел санкции в ответ на отказ от прекращения своей ядерной программы. Торговля нарушается, углубляется дипломатическая изоляция."
 
 nuclear_military_ultimatum: "Выдан военный ультиматум"
 nuclear_military_ultimatum_desc: "Великая держава начала официальную дипломатическую игру с требованием разоружить свою ядерную программу. Военные действия по-прежнему возможны."
 
 nuclear_great_power_pressure: "Большое дипломатическое давление"
 nuclear_great_power_pressure_desc: "Одна или несколько великих держав выпустили официальные предупреждения по поводу ядерной программы. Престиж и легитимность страдают."
 
 nuclear_non_proliferation_war: "Вмешательство в нераспространение"
 nuclear_non_proliferation_desc: "[ROOT.GetCountry.GetName] начал дипломатическое вмешательство для предотвращения распространения ядерного оружия. Международное сообщество в целом приветствовало эту акцию."
 
 nuclear_non_intervention_caution: "Осторожность при выборе вмешательства"
 nuclear_non_intervention_caution_desc: "[ROOT.GetCountry.GetName] отказался от военного вмешательства против государства, обладающего ядерным оружием, выбрав вместо этого дипломатическое давление. Некоторые союзники поставили под сомнение решимость."
 
 # ── DIPLOMATIC PLAY LOC ──────────────────
 nuclear_non_proliferation_play: "Ультиматум ядерного разоружения"
 
 # ── MODIFIERS ────────────────────────────
 
 nuclear_strike_aftermath: "Последствия ядерного удара"
 nuclear_strike_aftermath_desc: "Это государство было поражено ядерным оружием. Инфраструктура разрушена, население разрушено, а радиация загрязняет землю."
 
 nuclear_strike_launched_modifier: "Ядерная пария"
 nuclear_strike_launched_modifier_desc: "[ROOT.GetCountry.GetName] в гневе применил ядерное оружие. Международное сообщество отреагировало с ужасом. Дипломатический статус и престиж серьезно пострадали."
 
 nuclear_strike_victim_modifier: "Ядерная жертва"
 nuclear_strike_victim_modifier_desc: "[ROOT.GetCountry.GetName] подвергся ядерной атаке. Национальная травма является глубокой и длительной. Восстановление займет целое поколение."
 
 nuclear_disarmament: "Захват ОМУ"
 nuclear_disarmament_desc: "Требуйте, чтобы страна-мишень полностью демонтировала свою ядерную программу и сдала свой существующий арсенал. В случае его применения все возможности по обогащению, запасы боеголовок и программные переменные будут устранены — страна должна начать с нуля."
 
 # ── EVENT ────────────────────────────────
 
 nuclear_events.10.t: "Программа ушла"
 nuclear_events.10.d: "Условия мира были выполнены. Международные инспекторы ввели объекты [ROOT.GetCountry.GetAdjective], демонтировали каскады центрифуг, убрали запасы и запечатали силосы.\n\n Годы научной работы, политические риски и национальные инвестиции были стерты за недели. Программы не существует. Знания остаются, но инфраструктура, материал и правовое положение, чтобы преследовать его ушли.\n\n[ROOT.GetCountry.GetName] может начаться снова, если он выберет. Это будет другое решение, принятое в разных обстоятельствах."
 nuclear_events.10.f: "Его можно восстановить. Это не будет забыто."
 nuclear_events.10.a: "Признать условия"
 
 # ── MODIFIERS ────────────────────────────
 
 nuclear_disarmament_enforced: "Насильственное разоружение"
 nuclear_disarmament_enforced_desc: "После военного поражения ядерная программа [ROOT.GetCountry.GetName] была насильственно демонтирована. Политические и научные последствия серьезны. Общественный гнев интенсивный."
 
 nuclear_disarmament_enforcer: "Победа в нераспространении"
 nuclear_disarmament_enforcer_desc: "[ROOT.GetCountry.GetName] успешно обеспечило ядерное разоружение в быстро развивающемся государстве. Значительно повышен международный престиж и дипломатический статус."
 
  # ── TREATY ARTICLE ───────────────────────
 
 host_military_bases: "Принимающие военные базы"
 host_military_bases_desc: "Разрешает размещать военные силы и оборудование на территории [scope:target_country.GetAdjective]. Расширяет диапазон обычных ракет до государств, граничащих с принимающей страной."
 
 military_base_host_modifier: "Размещение иностранных военных баз"
 military_base_host_modifier_desc: "Иностранные вооруженные силы размещены на территории страны в соответствии с соглашением о базировании. Некоторые внутренние трения возникают из-за иностранного военного присутствия."
 
 military_base_projector_modifier: "Военные базы за рубежом"
 military_base_projector_modifier_desc: "Эта страна имеет военные силы, размещенные на территории союзников, расширяя свой стратегический охват."
 
 # ── ICBM ─────────────────────────────────
 
 je_icbm_programme: "Программа развития МБР"
 je_icbm_programme_reason: "[ROOT.GetCountry.GetName] обладает ядерным потенциалом. Следующий рубеж — это доставка межконтинентальных баллистических ракет, способных без предупреждения достичь любой точки земного шара. Программа длительная — годы исследований ракет, разработки систем наведения и испытаний дальности, но стратегическая выгода абсолютна. Государство, способное нести МБР, не может сдерживаться географией."
 
 je_icbm_early_tt: "Программа МБР находится на ранней стадии разработки. Проводятся испытания систем руководства. Пройдут годы, прежде чем появится жизнеспособный межконтинентальный транспорт."
 je_icbm_late_tt: "#bold Разработка МБР приближается к завершению.#! В настоящее время проводятся окончательные испытания на дальность и точность."
 
 icbm_progress_bar: "Развитие МБР"
 icbm_progress_bar_desc: "Прогресс в направлении создания возможностей для доставки межконтинентальных баллистических ракет. На 100% ядерное оружие может быть нацелено по всему миру, независимо от близости."
 icbm_progress_bar_tt: "Ежемесячный прогресс в развитии МБР"
 
 icbm_capable_modifier: "МБР способна"
 icbm_capable_modifier_desc: "[ROOT.GetCountry.GetName] разработал межконтинентальные баллистические ракеты. Ядерное оружие теперь может быть нацелено на любое государство в мире, независимо от дальности."
 
 nuclear_events.11.t: "Программа МБР завершена"
 nuclear_events.11.d: "[ROOT.GetCountry.GetName] успешно испытал межконтинентальную баллистическую ракету. Устройство пролетело весь диапазон, продемонстрировало точность наведения терминала в пределах приемлемых параметров и расплескалось в обозначенной зоне.\n\n Стратегические последствия незамедлительны. [ROOT.GetCountry.GetName] ядерное сдерживание больше не ограничено географией. Любое состояние на планете в принципе является потенциальной целью.\n\n Международное сообщество примет к сведению это испытание. Это всегда так."
 nuclear_events.11.f: "Там нигде не осталось, чтобы быть вне диапазона."
 nuclear_events.11.a: "Сдерживание теперь действительно глобальное."
 
 # ── CONVENTIONAL MISSILES ─────────────────
 
 CONV_MISSILES_HEADER: "Обычные ракеты"
 CONV_TARGET_AIRPORT_TOOLTIP: "Аэропорты в отдельных штатах. Каждая ракета имеет 3% шанс уничтожить здание аэропорта."
 CONV_TARGET_BARRACKS_TOOLTIP: "Целевые казармы. Каждая ракета имеет 3-процентный шанс уничтожить казармы в каждом целевом государстве."
 CONV_TARGET_NAVAL_TOOLTIP: "Цель - военно-морские базы. Каждая ракета имеет 3% вероятности уничтожения военно-морской инфраструктуры."
 CONV_TARGET_NUCLEAR_PLANT_TOOLTIP: "Цель - атомные электростанции. Каждая ракета имеет 3% шанс уничтожить объект."
 CONV_TARGET_SILO_TOOLTIP: "Цель ядерные силосы. Каждая ракета имеет 3% шанс уничтожить силос."
 CONV_TARGET_GOVERNMENT_TOOLTIP: "Целевые правительственные здания. У каждой ракеты есть 3% шанс уничтожить их."
 CONV_TARGET_RAILWAY_TOOLTIP: "Целевая железнодорожная инфраструктура. Каждая ракета имеет 3% шанс уничтожить железную дорогу."
 CONV_ADD_TARGET_TOOLTIP: "Добавьте это состояние в список обычных ракетных ударов."
 CONV_REMOVE_TARGET_TOOLTIP: "Удалите это государство из списка обычных ракетных ударов."
 CONV_FIRE_TOOLTIP: "Нанести обычный ракетный удар по всем целевым государствам. Потребляет одну ракету на одно государство. Применяется 60-дневное охлаждение."
 
 # ── STRATEGIC BOMBING ─────────────────────
 
 STRAT_BOMBING_HEADER: "Стратегическая бомбардировка"
 BOMBING_ADD_TARGET_TOOLTIP: "Добавьте это состояние в список бомбардировок для следующего запуска."
 BOMBING_REMOVE_TARGET_TOOLTIP: "Удалите это государство из списка бомбардировок."
 BOMBING_EXECUTE_TOOLTIP: "Осуществить стратегическую бомбардировку всех целевых государств. Разрушения добавляются в зависимости от количества соответствующих воздушных образований. Применяется 30-дневное охлаждение."
 
 NUCLEAR_ICBM_PROGRESS_TOOLTIP: "Прогресс в развитии МБР. На 100% ядерное оружие может быть нацелено на любое государство в мире."
 NUCLEAR_ICBM_TOOLTIP: "Начинается разработка межконтинентальных баллистических ракет. Нужен ядерный потенциал. Это займет несколько лет. После завершения строительства ядерное оружие может быть нацелено на любое государство в мире, а не только на соседние государства."
 
 CONV_PRODUCE_MISSILES_TOOLTIP: "Изготовить залп из 5 обычных ракет. Небольшие текущие производственные затраты. Ракеты расходуются при стрельбе — по одной на цель."
 
 missile_production_cost:0 "Производство ракет"
 state_buy_orders_missiles_add:0 "Потребление ракет"
 
 CONV_DEPLOY_10_TOOLTIP: "Выстрел 10% ваших ракетных запасов против целевых государств."
 CONV_DEPLOY_25_TOOLTIP: "Выпустить 25% ваших ракетных запасов против целевых государств."
 CONV_DEPLOY_50_TOOLTIP: "Выстрел 50% ваших ракетных запасов против целевых государств."
 CONV_DEPLOY_75_TOOLTIP: "Выпустить 75% ваших ракетных запасов против целевых государств."
 CONV_DEPLOY_100_TOOLTIP: "Запускайте все свои ракетные запасы против целевых государств."
 
 CONV_BUILDING_CHANCE_TOOLTIP: "Каждая выпущенная ракета имеет 3% шанс уничтожить одно из следующих зданий в целевом состоянии, если оно присутствует: \n\n• Аэропорт\n• казармы\n• Военно-морская база\n• Атомная электростанция\n• Ядерный силос\n• Государственная администрация\n• Железнодорожный\n\n Все типы зданий перекатываются самостоятельно. Один ракетный залп может уничтожить несколько зданий в одном и том же состоянии, если он достаточно велик."
 
 nuclear_events.12.t: "Ракетный удар по [ROOT.GetName]"
 nuclear_events.12.d: "[SCOPE.sCountry('missile_attacker').GetName] нанес обычный ракетный удар по территории [ROOT.GetAdjective]. Поступают сообщения о воздействиях в состояниях [ROOT.GetAdjective] — оценивается ущерб инфраструктуре.\n\n Ракеты не были ядерными, но посыл ясен. [SCOPE.sCountry('missile_attacker').GetName] готов использовать против нас оружие дальнего действия."
 nuclear_events.12.f: "Кратеры уже есть. Вопрос в том, что мы будем делать дальше."
 nuclear_events.12.a: "Оцените ущерб и ответьте соответствующим образом"

 missile_strike_victim_modifier: "Обычный ракетный удар"
 missile_strike_victim_modifier_desc: "Наша территория подверглась обычному ракетному удару. Повреждение инфраструктуры и общественная тревога возросли."

 # ── EVENT 13: RETALIATION CHOICE ───────────

 nuclear_events.13.t: "Ядерное возмездие: решение необходимо"
 nuclear_events.13.d: "[SCOPE.sCountry('nuclear_attacker').GetName] запустил ядерное оружие против [ROOT.GetName]. Наши боеголовки вооружены. Коды запуска готовы.\n\n Ответный удар по территории [SCOPE.sCountry('nuclear_attacker').GetAdjective] поглотит 25% нашего арсенала и ударит по всем государствам [SCOPE.sCountry('nuclear_attacker').GetAdjective]. Забастовка не принесет никакого позора — мир поймет.\n\n Альтернативой является поглощение атаки. В выживании нет позора."
 nuclear_events.13.f: "Приказ нужно отдать только один раз."
 nuclear_events.13.a: "Retaliate — запуск 25% арсенала против [SCOPE.sCountry('nuclear_attacker').GetName]"
 nuclear_events.13.b: "Стоять — поглощать удар, сохранять арсенал"

 nuclear_first_strike_response: "Ядерная реакция (First Strike Response)"
 nuclear_first_strike_response_desc: "[ROOT.GetName] нанес ответный ядерный удар в ответ на неспровоцированную ядерную атаку на своей территории. Международное сообщество признает право на возмездие — значительно снижается порочащая выгода."

 nuclear_absorbed_first_strike: "Ядерный удар поглощен"
 nuclear_absorbed_first_strike_desc: "[ROOT.GetName] выдержал ядерный удар без возмездия. Ограничение было отмечено на международном уровне. Значительно повышается дипломатический статус и престиж."

 # ── EVENT 14: RETALIATION NOTIFICATION ─────

 nuclear_events.14.t: "Входящий ядерный ответ"
 nuclear_events.14.d: "Наш ядерный удар получил ответ. [ROOT.GetName] нанес ответный удар — боеголовки подтверждены входящие.\n\n Мы инициировали обмен. Последствия должны нести мы."
 nuclear_events.14.f: "Каждая забастовка приглашает следующую."
 nuclear_events.14.a: "Подготовка к удару"
