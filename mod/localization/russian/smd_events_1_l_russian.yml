 czh_federal_strain: "Федеральное напряжение"
 czh_federal_strain_desc: "Конституционный кризис ослабляет федеральные институты. Легитимность ослабевает, и принятие закона становится более сложным, поскольку обе половины федерации ставят под сомнение полномочия центра."
 
 czh_slovak_subsidy: "Словацкая программа экономической поддержки"
 czh_slovak_subsidy_desc: "Федеральные средства перенаправляются на поддержку экономики Словакии в переходный период. Дорого, но это повысило политическую температуру."
 
 czh_federal_authority_asserted: "Федеральный орган утвердил"
 czh_federal_authority_asserted_desc: "Федеральное правительство осудило словацкую декларацию и заявило о верховенстве федерального закона. Власть укрепилась, но словацкий гнев усилился."
 
 czh_autonomy_negotiations: "Переговоры об автономии"
 czh_autonomy_negotiations_desc: "В настоящее время ведутся официальные переговоры о предоставлении Словакии большей автономии в рамках федерации. Этот процесс улучшил политический климат."
 
 czh_confederation_talks: "Предложение Конфедерации"
 czh_confederation_talks_desc: "Ведутся переговоры о более свободной модели конфедерации. Обе стороны разговаривают. Результат неясен, но импульс к роспуску замедлился."
 
 czh_referendum_blocked: "Референдум подавлен"
 czh_referendum_blocked_desc: "Призыв к референдуму о независимости был отклонен. Словацкие политики и гражданское общество отреагировали гневом. Политическое давление не исчезло, ему было отказано в выходе."
 
 czh_federal_union_preserved: "Федеральный союз сохраняется"
 czh_federal_union_preserved_desc: "Конституционный кризис прошел. [ROOT.GetCountry.GetName] удерживается вместе. Переговорное урегулирование укрепило федеральные институты и доверие общественности к союзу."
 
 czc_new_republic_founding: "Чешская Республика"
 czc_new_republic_founding_desc: "Чешская Республика была создана как суверенное государство. Международное признание немедленно. Основы новой республики стабильны."
 
 svk_new_republic_founding: "Словацкая Республика"
 svk_new_republic_founding_desc: "Словацкая Республика была создана как суверенное государство. Первая в истории полностью независимая Словакия нашла свое место."
 
 attacked_on_home_soil:0 "Нападение на домашнюю почву"
 war_on_terror_campaign:0 "Война с террором"
 
