 io_accession_events.1.t:0 "Вступление ЕЭК завершено"
 io_accession_events.1.d:0 "Наши реформы удовлетворяют требованиям членства в ЕЭК. Мы вошли в европейскую экономическую систему."
 io_accession_events.1.a:0 "Присоединяйтесь к ЕЭС."

 io_accession_events.2.t:0 "Вступление в ЕС завершено"
 io_accession_events.2.d:0 "Наш процесс вступления завершен. Мы вступили в Европейский Союз и вошли в его политическую и экономическую структуру."
 io_accession_events.2.a:0 "Присоединяйтесь к Европейскому союзу."

 io_accession_events.3.t:0 "Вступление ЕЭК приостановлено"
 io_accession_events.3.d:0 "Процесс вступления в ЕЭС рухнул после того, как наше правительство отошло от демократических стандартов."
 io_accession_events.3.a:0 "Процесс закончен."

 io_accession_events.4.t:0 "Вступление в ЕС приостановлено"
 io_accession_events.4.d:0 "Процесс вступления в ЕС рухнул после того, как наше правительство отошло от демократических стандартов."
 io_accession_events.4.a:0 "Процесс закончен."

 io_accession_events.10.t:0 "Изгнан из НАТО"
 io_accession_events.10.d:0 "Принятие нами авторитарных законов сделало невозможным дальнейшее членство в НАТО. Альянс исключил нас, и наши оборонительные пакты с его членами были отозваны."
 io_accession_events.10.a:0 "Мы остаемся одни."

 io_accession_events.11.t:0 "Изгнан из ЕЭС"
 io_accession_events.11.d:0 "Принятие нами авторитарных законов нарушило политические ожидания европейского сотрудничества. Нас исключили из ЕЭК."
 io_accession_events.11.a:0 "Так тому и быть."

 io_accession_events.12.t:0 "Выслан из Европейского Союза"
 io_accession_events.12.d:0 "Принятие нами авторитарных законов нарушило демократические стандарты Европейского Союза. Мы были исключены из Союза."
 io_accession_events.12.a:0 "Союз отворачивается."

 io_accession_events.13.t:0 "Изгнан из G7"
 io_accession_events.13.d:0 "Принятие нами авторитарных законов сделало дальнейшее членство в G7 политически неприемлемым. Мы были исключены из группы."
 io_accession_events.13.a:0 "Дипломатическая неудача."

 io_accession_events.20.t:0 "Предупреждение о демократических стандартах НАТО"
 io_accession_events.20.d:0 "Наше правительство приняло авторитарные законы. Если эти законы останутся в силе, членство в НАТО будет отменено во время следующего пересмотра."
 io_accession_events.20.a:0 "Нас предупредили."

 io_accession_events.21.t:0 "Предупреждение демократических стандартов ЕЭК"
 io_accession_events.21.d:0 "Наше правительство приняло авторитарные законы. Если эти законы останутся в силе, членство в ЕЭК будет отменено во время следующего рассмотрения."
 io_accession_events.21.a:0 "Нас предупредили."

 io_accession_events.22.t:0 "Предупреждение демократических стандартов ЕС"
 io_accession_events.22.d:0 "Наше правительство приняло авторитарные законы. Если эти законы останутся в силе, членство в ЕС будет отменено во время следующего пересмотра."
 io_accession_events.22.a:0 "Нас предупредили."

 io_accession_events.23.t:0 "Демократические стандарты G7"
 io_accession_events.23.d:0 "Наше правительство приняло авторитарные законы. Если эти законы останутся в силе, членство в G7 будет отменено во время следующего рассмотрения."
 io_accession_events.23.a:0 "Нас предупредили."

 io_democratic_standards_warning:0 "Предупреждение демократических стандартов"
 io_democratic_standards_warning_desc:0 "Эта страна была предупреждена, что ее авторитарные законы могут угрожать членству в демократических международных организациях."

 io_expelled_from_democratic_org:0 "Изгнан из демократической организации"
 io_expelled_from_democratic_org_desc:0 "Эта страна была исключена из международной организации после принятия авторитарных законов."
 
 intifada_2005.1.t:0 "Вторая интифада утихла"
 intifada_2005.1.d:0 "После многих лет непрерывного насилия, истощения, мер безопасности, дипломатического давления и политических изменений восстание было прекращено."
 intifada_2005.1.f:0 "Конфликт не урегулирован, но фаза открытой интифады закончилась. Прекращение огня оставляет обе стороны в шрамах, подозрительно и неясно, что будет дальше."
 intifada_2005.1.a:0 "Прими белый мир."

 intifada_2005.2.t:0 "Вторая интифада утихла"
 intifada_2005.2.d:0 "Бои утихли, и восстание вступило в новую, более спокойную фазу."
 intifada_2005.2.f:0 "Окончательного урегулирования не достигнуто, но эскалация сгорела сама собой."
 intifada_2005.2.a:0 "Борьба продолжается другими средствами."

 intifada_2005_ceasefire:0 "Вторая интифада прекращает огонь"
 intifada_2005_ceasefire_desc:0 "Открытая фаза Второй интифады закончилась хрупким прекращением огня."
 
 arab_spring_jihadist_breakaways.1.t:0 "Возникает Исламское государство"
 arab_spring_jihadist_breakaways.1.d:0 "Хаос революции и крах государства позволили джихадистским силам объединить территорию под знаменем Исламского государства."
 arab_spring_jihadist_breakaways.1.f:0 "Старое государство борется с революцией. Революция борется со старым государством. В руинах между ними третья сила поднимает свой флаг."
 arab_spring_jihadist_breakaways.1.a:0 "Открывается новый фронт."

 arab_spring_jihadist_breakaways.2.t:0 "Возникают джихадистские анклавы"
 arab_spring_jihadist_breakaways.2.d:0 "По мере того, как Арабская весна дестабилизирует регион, джихадистские ячейки захватили разрозненную территорию и заявили о лояльности Исламскому государству."
 arab_spring_jihadist_breakaways.2.f:0 "Там, где государство уходит, вооруженные сети становятся администрациями."
 arab_spring_jihadist_breakaways.2.a:0 "Кризис распространяется."

 arab_spring_jihadist_breakaways.3.t:0 "Хуситы захватывают территорию"
 arab_spring_jihadist_breakaways.3.d:0 "Йеменская революция расколола страну, позволив движению хуситов захватить территорию и мобилизовать собственные силы."
 arab_spring_jihadist_breakaways.3.f:0 "Восстание породило не одну оппозицию, а множество."
 arab_spring_jihadist_breakaways.3.a:0 "Йемен раскололся."

