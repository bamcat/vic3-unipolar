 kurdistan_war.1.d:0 "Партизанская фаза конфликта уступила место решительной кампании. Сейчас обе стороны пытаются превратить накопленный импульс в победу."
 kurdistan_war.1.f:0 "То, что когда-то было рейдами, стычками и засадами, стало войной национальной выносливости."
