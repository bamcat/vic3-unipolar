 AFGHAN_CIVIL_WAR_OFFENSIVE_MINIMUM_SCORE:0 "Требуется очень высокий военный импульс или конфликт, продолжающийся до 1998 года."
 afghan_civil_war.1.t:0 "Решительная афганская кампания"
 afghan_civil_war.1.d:0 "Медленный партизанский этап уступил место более широкой кампании. После нескольких лет рейдов, засад и спорных долин обе стороны теперь пытаются превратить накопленный импульс в окончательный результат."
 afghan_civil_war.1.f:0 "В Афганистане армии не просто наступают. Они торгуются с местностью, погодой, запасами и лояльностью, которые смещают долину за долиной."
 afghan_civil_war.1.a:0 "Начните кампанию."
 afghan_civil_war.1.a.ana:0 "Толкай с севера."
 afghan_civil_war.2.t_afg:0 "Талибы преобладают"
 afghan_civil_war.2.t_ana:0 "Преобладает Северный альянс"
 afghan_civil_war.2.d_afg:0 "Гражданская война в Афганистане закончилась в пользу правительства талибов. Сейчас государство переходит к консолидации контроля над страной."
 afghan_civil_war.2.d_ana:0 "Гражданская война в Афганистане закончилась в пользу Северного альянса. Теперь коалиция должна превратить военное выживание в жизнеспособное государство."
 afghan_civil_war.2.f:0 "Боевые действия заканчиваются, но страна остается сформированной долгими годами войны."
 afghan_civil_war.2.a:0 "Война окончена."
 afghan_civil_war.5.t:0 "Давление талибов"
 afghan_civil_war.5.d:0 "Силы талибов исследуют позиции Северного альянса, ища слабые места в линиях снабжения и горной обороне."
 afghan_civil_war.5.f:0 "Фронт движется по риджлайнам и дорогам, а не по чистым стрелкам кадровых карт."
 afghan_civil_war.5.a:0 "Продолжайте давление."
 afghan_civil_war.6.t:0 "Сети Северного альянса"
 afghan_civil_war.6.d:0 "Командиры Северного альянса расширяют местные сети, используя местность, лояльность и внешние пути снабжения для поддержания войны."
 afghan_civil_war.6.f:0 "На севере маршрут снабжения может иметь такое же значение, как и батальон."
 afghan_civil_war.6.a:0 "Держи линию."
 acw_guerrilla_warfare:0 "Афганская партизанская война"
 acw_guerrilla_warfare_desc:0 "В войне доминируют горы, набеги, засады, смещение лояльности и фрагментированные фронты. Прогресс практически невозможен без подавляющего импульса."
 acw_taliban_security_push:0 "Кампания «Талибан»"
 acw_taliban_security_push_desc:0 "Талибы взяли на себя обязательство провести более широкую кампанию по прекращению войны на истощение."
 acw_northern_alliance_mountain_resistance:0 "Горное сопротивление"
 acw_northern_alliance_mountain_resistance_desc:0 "Северный альянс использует горную местность и локальные сети для противостояния обычным наступлениям."
 acw_taliban_supply_strain:0 "Движение «Талибан» перенапрягло поставки"
 acw_taliban_supply_strain_desc:0 "Устойчивое давление налагает тяжелое материально-техническое напряжение на силы талибов."
 acw_northern_alliance_supply_networks:0 "Сети снабжения Северного альянса"
 acw_northern_alliance_supply_networks_desc:0 "Северный альянс укрепляет свои локальные и внешние сети поставок."
 acw_afg_reward:0 "Афганистан консолидируется"
 acw_afg_reward_desc:0 "Правительство талибов вышло из гражданской войны с новым контролем."
 acw_ana_reward:0 "Вознесенный Альянс"
 acw_ana_reward_desc:0 "Северный альянс вышел из гражданской войны с новой легитимностью."
 
