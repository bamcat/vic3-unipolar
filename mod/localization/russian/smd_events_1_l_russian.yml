 ## war on terror again
 
 wot_coalition.2.t:0 "Статья 5 Ссылка"
 wot_coalition.2.d:0 "После нападения на Соединенные Штаты НАТО ссылается на статью 5. Теперь альянс рассматривает нападение как нападение на всех членов."
 wot_coalition.2.f:0 "Североатлантический альянс был создан для коллективной обороны. Первый призыв исходит не от танков, пересекающих границу, а от теракта."
 wot_coalition.2.a:0 "Оставайтесь с Соединенными Штатами."

 wot_coalition.10.t:0 "США требуют сотрудничества"
 wot_coalition.10.d:0 "США потребовали от Пакистана сотрудничества в войне с терроризмом. Вашингтон рассчитывает на военный доступ, права базирования, поддержку разведки и логистические маршруты в Афганистан."
 wot_coalition.10.f:0 "География Пакистана делает его незаменимым. Отказ, однако, вызвал бы обвинения в том, что Исламабад защищает терроризм."
 wot_coalition.10.a:0 "Сотрудничать с коалицией."
 wot_coalition.10.b:0 "Откажитесь от ультиматума."

 wot_coalition.11.t:0 "Пакистан сотрудничает"
 wot_coalition.11.d:0 "Пакистан согласился сотрудничать с Соединенными Штатами и партнерами по коалиции, предоставляя военный доступ и размещение военных баз для кампании в Афганистане."
 wot_coalition.11.f:0 "Дорога в Афганистан проходит через Пакистан."
 wot_coalition.11.a:0 "Обеспечьте безопасность маршрутов."

 wot_coalition.12.t:0 "Пакистан отказывается"
 wot_coalition.12.d:0 "Пакистан отказался от американских требований о сотрудничестве. Вашингтон теперь называет Пакистан соучастником терроризма и готовит прямые военные действия."
 wot_coalition.12.f:0 "Отказ превращает логистического партнера в цель."
 wot_coalition.12.a:0 "Они выбрали свою сторону."

 wot_article_5_join_war_tt:0 "Этот член НАТО присоединится к США в любой активной войне против Афганистана. Если война еще не началась, она присоединится, как только начнется война."
 wot_pakistan_cooperate_tt:0 "Пакистан подписывает 10-летние договоры с Соединенными Штатами и всеми партнерами по коалиции, предоставляя #bold Военный доступ #! и #bold Принимающие военные базы #!."
 wot_pakistan_refuse_tt:0 "Соединенные Штаты начинают войну против Пакистана и называют его соучастником терроризма."

 wot_pakistan_coalition_access_treaty_name:0 "Соглашение о доступе к коалиции по борьбе с терроризмом"
 operation_enduring_freedom_pakistan:0 "Операция «Несокрушимая свобода» в Пакистане"

 wot_article_5_commitment:0 "Статья 5 Обязательство"
 wot_article_5_commitment_desc:0 "Эта страна взяла на себя обязательства по реагированию НАТО после 11 сентября."

 wot_pakistan_cooperation:0 "Коалиционное сотрудничество"
 wot_pakistan_cooperation_desc:0 "Пакистан сотрудничает с США и партнерами по коалиции в войне с терроризмом."

 wot_pakistan_complicit:0 "Ярлык соучастника терроризма"
 wot_pakistan_complicit_desc:0 "Пакистан отказался от сотрудничества и в настоящее время рассматривается Соединенными Штатами как соучастник терроризма."

 wot_coalition.20.t:0 "Северный альянс присоединился к коалиции"
 wot_coalition.20.d:0 "Северный альянс захватил Кабул и присоединился к возглавляемой американцами кампании против режима талибов в Афганистане."
 wot_coalition.20.f:0 "Теперь талибы сталкиваются с внешней коалицией и внутренним врагом."
 wot_coalition.20.a:0 "Наступление на Кабул."

