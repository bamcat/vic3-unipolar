 kurdistan_war.5.t:0 "Охранный сигнал"
 kurdistan_war.5.d:0 "Турецкие силы безопасности расширяют операции в спорных курдских регионах, разрушая повстанческие сети, но увеличивая стоимость кампании."
 kurdistan_war.5.f:0 "Государство может держать дороги днем, но горы остаются неопределенными после заката."
 kurdistan_war.5.a:0 "Продолжайте операцию."
 kurdistan_war.6.t:0 "Партизанские сети расширяются"
 kurdistan_war.6.d:0 "Курдские партизанские силы расширяют свои сети, используя местность и местную поддержку, чтобы компенсировать военное преимущество Турции."
 kurdistan_war.6.f:0 "Горы делают армии медленными и слухи быстрыми."
 kurdistan_war.6.a:0 "Борьба продолжается."
 kurdistan_war_guerilla_warfare:0 "Партизанская война"
 kurdistan_war_guerilla_warfare_desc:0 "В войне преобладают засады, рейды и рассредоточенные операции, ограничивающие эффективность обычных формирований."
 kurdistan_war_trk_reward:0 "Консолидированная безопасность"
 kurdistan_war_trk_reward_desc:0 "Турция вышла из конфликта с более сильными институтами внутренней безопасности."
 kurdistan_war_kur_reward:0 "Момент освобождения"
 kurdistan_war_kur_reward_desc:0 "Курдистан вышел из конфликта с новой политической и военной легитимностью."
 trk_security_operation:0 "Операция по обеспечению безопасности"
 trk_security_operation_desc:0 "Турция проводит решительную кампанию по обеспечению безопасности."
 kur_mountain_resistance:0 "Горное сопротивление"
 kur_mountain_resistance_desc:0 "Курдские силы используют местность и местные сети для сопротивления обычным наступлениям."
 trk_counterinsurgency_expenses:0 "Расходы на борьбу с повстанцами"
 trk_counterinsurgency_expenses_desc:0 "Стоимость расширенных операций по обеспечению безопасности ложится на государство."
 kur_guerrilla_networks:0 "Партизанские сети"
 kur_guerrilla_networks_desc:0 "Рассредоточенные курдские сети усиливают повстанческое движение."
 
