 je_second_intifada: "Вторая интифада"
 je_second_intifada_reason: "Палестинские территории вспыхнули в массовом восстании против израильской оккупации. На узких улочках и плотно упакованных лагерях беженцев обычное военное превосходство почти ничего не значит. Мир наблюдает, как камни встречаются с танками в одном из самых асимметричных конфликтов в современной истории."

 je_intifada_complete_tt: "Одна из сторон была побеждена или аннексирована."

 je_intifada_status_uprising: "Интифада находится в фазе восстания #bold #!. Уличные столкновения, бросание камней и партизанское сопротивление доминируют в конфликте. Обычные военные операции на такой ограниченной территории практически невозможны."
 je_intifada_status_offensive: "Запущена основная операция #bold#!. Конфликт перерос в решающую фазу."

 je_intifada_score_bar: "Конфликтный счет"
 je_intifada_score_bar_desc: "Израильское преимущество"
 je_intifada_score_bar_second_desc: "Палестинское преимущество"

 intifada_startup_tt: "Началась вторая интифада. Палестинские территории восстают против израильской оккупации."

