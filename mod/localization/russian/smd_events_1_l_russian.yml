 je_demographic_crisis: "Демографический кризис"
 je_demographic_crisis_reason: "Наша страна переживает надвигающийся демографический кризис. Старение населения и снижение рождаемости угрожают сократить нашу рабочую силу и напрячь наши социальные системы. Мы должны принять всеобъемлющую пронаталистскую политику и поддерживать ее в течение десятилетия, чтобы переломить эту тенденцию до истечения временного демографического буфера."

 je_demographic_crisis_progressing_tt: "Действует пронаталистская политика и выполняются условия. Прогресс: #bold [Root.GetCountry.MakeScope.Var('demographic_months_sustained').GetValue|0]#! / 120 месяцев."
 je_demographic_crisis_stalling_tt: "#negative Пронаталистские условия больше не выполняются.#! Прогресс разлагается. Current: #bold [Root.GetCountry.MakeScope.Var('demographic_months_sustained').GetValue|0]#! / 120 месяцев. Вводить законы об уходе за детьми, здравоохранении, социальном обеспечении и жилье, сохраняя при этом уровень жизни выше 12."
 je_demographic_crisis_idle_tt: "Нет прогресса в урегулировании демографического кризиса. Введите пронаталистскую политику: законы об уходе за детьми, здравоохранении, благосостоянии и жилье. Поддерживать средний уровень жизни не менее 12."

 demographic_crisis_sustained_tt: "Пронаталистская политика проводится в течение 10 лет (120 месяцев)."

