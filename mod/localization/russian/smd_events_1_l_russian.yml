 # The Troubles

je_troubles_in_northern_ireland: "Проблемы в Северной Ирландии"
je_troubles_in_northern_ireland_reason: "Северная Ирландия стала очагом политического насилия между националистическими и профсоюзными сообществами, перерастая в вооруженный конфликт с участием военизированных групп, гражданских лиц и британской армии. Мы должны тщательно контролировать присутствие войск и политические меры реагирования для стабилизации региона."

je_troubles_increase_troop_button: "Увеличение присутствия войск"
je_troubles_increase_troop_button_desc: "Развернуть больше британских вооруженных сил в Северную Ирландию, чтобы усилить контроль и поддерживать порядок."

troubles_troop_strength_bar: "Присутствие войск в Северной Ирландии"
troubles_troop_strength_bar_desc: "Сила войск"
troubles_troop_strength_bar_monthly_desc: "Измеряет силу британских войск в Северной Ирландии."

troubles_events.1.t: "Бомбардировки в Белфасте"
troubles_events.1.d: "В Белфасте взорвалась автомобильная бомба, убивая мирных жителей и усиливая напряженность."
troubles_events.1.a: "Трагично."

troubles_events.2.t: "Войска под атакой"
troubles_events.2.d: "Британские солдаты попали под огонь повстанцев в Дерри."
troubles_events.2.a: "Мы должны ответить."

troubles_events.3.t: "Протест за гражданские права"
troubles_events.3.d: "Большой протест в Лондондерри перерос в насилие после столкновений с полицией."
troubles_events.3.a: "Тревожное развитие."

troubles_events.4.t: "Прибыли подкрепления"
troubles_events.4.d: "Свежие войска прибыли в Северную Ирландию, укрепляя наше присутствие."
troubles_events.4.a: "Хорошо."

troubles_events.5.t: "Боевики убивают мирных жителей в ирландском пабе"
troubles_events.5.d: "Смертельная стрельба в Северной Ирландии потрясла местные общины, что является печальным отражением насилия во время продолжающихся проблем."
troubles_events.5.a: "Путь к миру никогда не бывает прямым."
 
je_northern_ireland_peace_process: "Мирный процесс в Северной Ирландии"
je_northern_ireland_peace_process_reason: "После десятилетий конфликта, известного как «Неприятности», правительства Соединенного Королевства и Ирландии — наряду с политическими партиями Северной Ирландии — вступили в период переговоров. От Декларации Даунинг-стрит до многопартийных переговоров и потенциальных перемирий, эти обсуждения могут положить конец годам кровопролития. Результат будет зависеть от политической воли, общественного мнения и способности к компромиссу."

ni_peace_process_success_tt: "Мирный процесс увенчался успехом, укрепив стабильность в Северной Ирландии."

ni_peace_events.1.t: "Декларация Даунинг-стрит"
ni_peace_events.1.d: "Британское и ирландское правительства приняли совместную декларацию, подтверждающую право народа Северной Ирландии решать свое будущее."
ni_peace_events.1.a: "Значительный шаг вперед."

ni_peace_events.2.t: "Многопартийные переговоры начинаются"
ni_peace_events.2.d: "Впервые за столом переговоров встречаются представители большинства североирландских политических фракций."
ni_peace_events.2.a: "Диалог – это путь к миру."

ni_peace_events.3.t: "Соглашение Страстной пятницы"
ni_peace_events.3.d: "Военизированные группы в Северной Ирландии объявили о прекращении огня, открыв дверь к прочному миру после ряда позитивных переговоров между правительством Соединенного Королевства и Ирландией."
ni_peace_events.3.a: "Оружие замолчало."

ni_peace_events.5.t: "Британские войска выбиты из Северной Ирландии"
ni_peace_events.5.d: "Присутствие войск в Северной Ирландии сократилось до нуля, и британское правительство оказалось не в состоянии поддерживать контроль. Неожиданно правительство официально уступило Северную Ирландию Республике Ирландия."
ni_peace_events.5.a: "У нас нет выбора."
ni_peace_events.5.a.tt: "Северная Ирландия будет передана Ирландии."

ni_peace_events.6.t: "Воссоединение Ирландии"
ni_peace_events.6.d: "После десятилетий разделения Северная Ирландия официально присоединилась к Ирландской Республике. Улицы заполняются торжествами, поскольку нация смотрит в единое будущее."
ni_peace_events.6.a: "Выпей шампанское!"
reunification_pride: "Гордость объединения"
reunification_pride_desc: "Радость национального воссоединения укрепила общественное единство и авторитет правительства."

je_oil_titans:0 "Нефтяные титаны"
je_oil_titans_reason:0 "Залив находится на вершине крупнейших доказанных запасов нефти на планете. То, что [ROOT.GetCountry.GetName] сделает с этим наследием, определит грядущий век — для региона, для глобального энергетического рынка и для каждой страны, чья промышленность, транспорт и процветание работают на нефти.\n\n Цель состоит не только в добыче нефти. Он должен стать незаменимым — войти в тройку крупнейших производителей в мире, так что когда цена на нефть движется, она движется, потому что [ROOT.GetCountry.GetName] решил заставить ее двигаться."
 
oil_titans_top3_tt:0 "#bold [ROOT.GetCountry.GetName] входит в топ-3 мировых производителей нефти.#! Запись в журнале завершена — [ROOT.GetCountry.GetName] стал одним из незаменимых узлов глобальной энергетической системы."
oil_titans_top10_tt:0 "[ROOT.GetCountry.GetName] входит в топ-10 мировых производителей нефти и приближается к топ-3. Продолжающиеся инвестиции в добычу нефти закроют этот разрыв."
oil_titans_outside_tt:0 "[ROOT.GetCountry.GetName] пока не входит в топ-10 мировых производителей нефти. Необходимы значительные инвестиции в инфраструктуру добычи нефти."
 
oil_titans_bonus:0 "Нефть Титан"
oil_titans_bonus_desc:0 "[ROOT.GetCountry.GetName] входит в тройку крупнейших мировых производителей нефти. Доходы, которые это генерирует, поступают в государственную казну, финансируют строительство и дают [ROOT.GetCountry.GetName] степень геополитического влияния, которое только численность населения никогда не оправдает. Мир нуждается в нефти [ROOT.GetCountry.GetAdjective]. Эта потребность — власть."

bid_for_olympics_decision:0 "Объявить заявку на проведение Олимпиады"
bid_for_olympics_decision_desc:0 "Нам повезло, что Международный олимпийский комитет принял у себя следующие Олимпийские игры."
we_can_host_the_next_olympics_tt:0 "Мы можем провести следующие Олимпийские игры."

 je_korea_reunification_nrk:0 "Корейское воссоединение"
 je_korea_reunification_nrk_reason:0 "Корейская Народно-Демократическая Республика является единственным законным правительством корейской нации. Разделение полуострова на 38-й параллели — это искусственная рана, нанесенная иностранными державами — временное соглашение, которое [ROOT.GetCountry.GetName] стремится исправить.\n\n Воссоединение под руководством [ROOT.GetCountry.GetAdjective] восстановит корейскую нацию к целостности. Южная администрация Южной Кореи должна быть приведена в состояние [ROOT.GetCountry.GetAdjective] — силой, договором или весом [ROOT.GetCountry.GetAdjective] власти, делающей дальнейшее сопротивление невозможным."
 
 korea_nrk_complete_tt:0 "#bold Полуостров унифицирован под лидерством [ROOT.GetCountry.GetAdjective].#! Корея – это целое. Раздел 1945 года был исправлен."
 korea_nrk_subject_path_tt:0 "[SCOPE.sCountry('c:STK').GetName] является субъектом [ROOT.GetCountry.GetName]. Южная администрация была введена в состояние [ROOT.GetCountry.GetAdjective]. Полная интеграция полуострова продолжается."
 korea_nrk_incomplete_tt:0 "[SCOPE.sCountry('c:STK').GetName] управляет [SCOPE.sState('STATE_SEOUL').GetName], [SCOPE.sState('STATE_BUSAN').GetName] и [SCOPE.sState('STATE_YANGHO').GetName]. Воссоединение требует [ROOT.GetCountry.GetName] владеть всеми тремя — или иметь [SCOPE.sCountry('c:STK').GetName] в качестве субъекта."
 
 # ==========================================
 # SOUTH KOREA JE
 # ==========================================
 
 je_korea_reunification_stk:0 "Корейское воссоединение"
 je_korea_reunification_stk_reason:0 "Республика Корея является единственным законным правительством корейской нации. Разделение полуострова является наследием иностранной оккупации и соперничества в холодной войне — [ROOT.GetCountry.GetName] никогда не принимало его в качестве постоянного.\n\n Воссоединение под руководством [ROOT.GetCountry.GetAdjective] объединит корейский народ под демократическим конституционным порядком. Северная администрация Северной Кореи должна быть поглощена государством [ROOT.GetCountry.GetAdjective]. Власть режима Пхёньяна на севере — последнее препятствие."
 
 korea_stk_complete_tt:0 "#bold Полуостров унифицирован под лидерством [ROOT.GetCountry.GetAdjective].#! Корея – это целое. Раздел 1945 года был исправлен."
 korea_stk_subject_path_tt:0 "[SCOPE.sCountry('c:NRK').GetName] является субъектом [ROOT.GetCountry.GetName]. Северная администрация была введена в конституционный порядок [ROOT.GetCountry.GetAdjective]. Интеграция Севера идет полным ходом — это колоссальное начинание."
 korea_stk_incomplete_tt:0 "[SCOPE.sCountry('c:NRK').GetName] управляет [SCOPE.sState('STATE_PYONGYANG').GetName] и [SCOPE.sState('STATE_SARIWON').GetName]. Воссоединение требует [ROOT.GetCountry.GetName] владеть обоими — или иметь [SCOPE.sCountry('c:NRK').GetName] в качестве субъекта."
 
 # ==========================================
 # MODIFIERS
 # ==========================================
 
 korea_reunification_bonus:0 "Корея воссоединилась"
 korea_reunification_bonus_desc:0 "Деление Корейского полуострова было прекращено. Страна стала единой впервые с 1945 года. Авторитет, легитимность и престиж значительно улучшаются. Сепаратистское и революционное давление подавляется. Государство [ROOT.GetCountry.GetAdjective] может начать работу по интеграции единой Кореи."
 
 korea_stk_integration_bonus:0 "Северная интеграция"
 korea_stk_integration_bonus_desc:0 "[ROOT.GetCountry.GetName] поглощает прежнюю территорию [SCOPE.sCountry('c:NRK').GetAdjective]. Экономический и административный разрыв между севером и югом огромен — интеграция требует постоянных инвестиций и ускоренного включения. Расходы реальны, но цель - единая Корея."
 
 y2k_events.1.t: "Баг тысячелетия"
 y2k_events.1.d: "По мере приближения 2000 года тихая тревога охватила [ROOT.GetCountry.GetAdjective] Инженеры, бюрократы и ИТ-отделы. Так называемая проблема Y2K — открытие, что большинство компьютерных систем хранят год в виде двух цифр и поэтому интерпретируют «00» как 1900, а не 2000, — вызвала глобальную схватку. Некоторые говорят, что последствия могут быть катастрофическими: энергосистемы выходят из строя, банковские системы портятся, управление воздушным движением становится темным. Другие говорят, что беспокойство сильно преувеличено, и консультанты, продающие аудиты соответствия, просто разбогатели от паники. [ROOT.GetCountry.GetName] должен решить, насколько серьезно к этому относиться."
 y2k_events.1.f: "Полночь наступает. Останутся ли огни на месте - другой вопрос."
 
 y2k_events.1.a: "Инвестируйте в полное соответствие Y2K"
 y2k_events.1.a_tt: "Дорогостоящие, тщательные и, вероятно, ненужные, но если даже часть прогнозов верны, стоимость ничего не делать намного выше. [ROOT.GetCountry.GetName] будет финансировать программы по соблюдению требований в критически важной инфраструктуре."
 y2k_events.1.b: "Он явно раздут — игнорируйте его."
 y2k_events.1.b_tt: "Паника — это золотая жила консалтинговой индустрии и ничего больше. [ROOT.GetCountry.GetName] не будет тратить государственные средства на воображаемую проблему."
 
 # ── NEW YEAR 2000 ─────────────────────────
 
 y2k_events.2.t: "С Новым годом - добро пожаловать в 2000"
 y2k_events.2.d: "Часы проехали мимо полуночи 31 декабря 1999 года, и огни остались включенными.\n\n Самолеты продолжали летать. Банки открылись. Электрические сети гудели. Вода текла. Баг тысячелетия, самая ожидаемая катастрофа в истории вычислительной техники, прибыл с шепотом, а не взрывом — или, возможно, он вообще не прибыл, и миллиарды, потраченные на соблюдение, просто сработали. Через [ROOT.GetCountry.GetName] толпы заполнили улицы, фейерверки зажгли небо, и в течение одной ночи мир чувствовал, кратко, как будто это началось снова. Начался двадцать первый век. Что будет дальше, догадывается каждый."
 y2k_events.2.f: "Это 2000 год. Мир не закончился. Это, учитывая все обстоятельства, хорошая новость."
 
 y2k_events.2.a: "Новый век начинается"
 
 # ── MODIFIERS ────────────────────────────
 
 y2k_compliance_investment: "Программы соответствия Y2K"
 y2k_compliance_investment_desc: "[ROOT.GetCountry.GetName] вложил средства в комплексное соответствие Y2K в критически важной инфраструктуре. Стоимость реальна, но системы готовы к любой полночи."
 
 millennium_celebration: "Празднование тысячелетия"
 millennium_celebration_desc: "2000 год прошел без катастрофы. Общественное настроение бурно, улицы по-прежнему полны гуляк, и [ROOT.GetCountry.GetName] вступает в новый век с осторожным оптимизмом."
 
 y2k_minor_disruption: "Нарушение Y2K"
 y2k_minor_disruption_desc: "[ROOT.GetCountry.GetName] отбросил опасения по поводу Y2K и теперь сталкивается с незначительными, но реальными сбоями, поскольку неподготовленные системы вступают в новый год. Ничего катастрофического, но и критики были не совсем правы."
 
  # ── TAGENTOPOLI ──────────────────────

 je_tangentopoli: "Тангентополи"
 je_tangentopoli_reason: "Италия работает по системе откатов. Государственные контракты — строительство, инфраструктура, оборонные закупки, здравоохранение — идут фирмам, которые платят процент политическим партиям. Христианские демократы берут свою долю. Социалисты берут свои. Меньшие коалиционные партнеры берут свои. Все знают. Все участвуют. Так было со времен войны.\n\n Система называется #bold Tangentopoli#! — Город взяток. Он стабилен, эффективен и полностью коррумпирован. Вопрос только в том, сможет ли она выжить в контакте с судьей, который отказывается смотреть в другую сторону."

 je_mani_pulite: "Пулит Мани"
 je_mani_pulite_reason: "Расследование продолжается. Судья Антонио Ди Пьетро и миланский пул магистратов работают через сеть взяток и откатов, которая финансировала итальянскую политику с момента основания республики. Каждый арест приводит к признанию. Каждое признание приводит к имени. Каждое имя приводит к другому аресту.\n\n Политический класс сопротивляется. Чрезвычайные постановления, переводы судей, публичные нападения на судебную власть. Вопрос в том, сможет ли расследование прийти к своему выводу до того, как система найдет способ остановить его.\n\n@information! #bold строка расследования #! отслеживает прогресс магистратов. #bold бар сопротивления #! отслеживает способность политического класса закрыть их."

 # Status descs — tangentopoli
 je_tangentopoli_contained_tt: "Расследование находится на ранней стадии. Несколько мелких фигур были арестованы. Политический класс отвергает его как провинциальный вопрос."
 je_tangentopoli_spreading_tt: "#bold Расследование распространяется.#! Исповедь накапливается. Появляются имена. Судьи в Милане следуют за каждой нитью."
 je_tangentopoli_critical_tt: "@warning! #bold Система находится в точке разрыва.#! Масштаб Тангентополи становится неоспоримым. Неизбежен политический кризис."

 # Status descs — mani pulite
 je_mani_pulite_early_tt: "Расследование набирает обороты. Команда Ди Пьетро работает над уликами. Политический класс пока не организовал согласованного ответа."
 je_mani_pulite_winning_tt: "#bold Расследование выигрывает.#! Судьи опережают сопротивление. Имена падают быстрее, чем система может их содержать."
 je_mani_pulite_stalemate_tt: "@warning! Расследование и политическое сопротивление совпадают. Результат зависит от следующих шагов."
 je_mani_pulite_suppressed_tt: "@warning! #bold Политическое сопротивление набирает обороты.#! Система организуется. Следствие может быть похоронено до того, как оно придет к своему заключению."

 # Progress bars
 tangentopoli_exposure_bar: "Сетевая экспозиция"
 tangentopoli_exposure_bar_desc: "Как далеко проникла коррупционная сеть."
 tangentopoli_exposure_bar_second_desc: "Разоблачение растет органично, поскольку каждый арест приводит к большему количеству признаний."
 tangentopoli_bar_from_exposure: "Продолжающееся судебное разоблачение сети Тангентополи"

 investigation_progress_bar: "Прогресс в расследовании"
 investigation_progress_bar_desc: "Как далеко зашли судьи Ди Пьетро."
 investigation_bar_progress: "Судья продвигается через доказательства"

 political_resistance_bar: "Политическое сопротивление"
 political_resistance_bar_desc: "Сопротивление расследованию"
 political_resistance_bar_progress: "Политический класс выступает против магистратов"

 # ── EVENT TITLES AND TEXT ────────────────

 mani_pulite.1.t: "Бизнесмен пытается промыть двадцать миллионов лир"
 mani_pulite.1.d: "Марио Кьеза, председатель Pio Albergo Trivulzio, миланского дома престарелых, был арестован судьей Антонио Ди Пьетро при попытке смыть банкноты в туалет. Кьеза был пойман на получении 37 миллионов лир отката от клининговой компании.\n\n Социалисты немедленно отреклись от него. Их партийный секретарь Беттино Кракси называет Кьезу «вором» — не очень мудрый выбор слов, учитывая то, что Ди Пьетро найдет дальше. Арест незначительный. К чему это приведет - нет."
 mani_pulite.1.f: "Обычный арест. Или так казалось."
 mani_pulite.1.a: "Местное смущение. Система является безопасной."

 mani_pulite.2.t: "Первые исповеди"
 mani_pulite.2.d: "Столкнувшись с тюрьмой, мелкие функционеры начали разговаривать. Не в обмен на иммунитет — формальной сделки нет — а потому, что плотина сломалась и логика молчания больше не держится. Каждое имя ведет к другому. Каждое имя ведет к вечеринке. Каждая сторона ведет к министерству.\n\n Расследование больше не касается одного человека с туалетом, полным банкнот. Речь идет о всей финансовой архитектуре республики."
 mani_pulite.2.f: "Когда один человек говорит, все говорят."
 mani_pulite.2.a: "Пусть расследование продолжается — его сейчас не остановить"
 mani_pulite.2.b: "Используйте исполнительное давление, чтобы сдержать распространение"

 mani_pulite.5.t: "Мани Пулит - Италия узнает то, что знали все"
 mani_pulite.5.d: "Миланский пул магистратов — Ди Пьетро, Коломбо, Давиго, Боррелли — стал публичным. Накопленные ими доказательства делают масштаб неоспоримым: за последние десятилетия практически каждый публичный контракт в Италии шел с откатом. Партии, которые управляли Республикой, коллективно потребляли процент от каждой дороги, каждой больницы, каждой школы. У итальянских газет есть название: #bold Tangentopoli#!. Первая республика находится под следствием."
 mani_pulite.5.f: "Все знали. Теперь все знают, что все знали."
 mani_pulite.5.a: "Следствие пойдет туда, куда ведет"

 mani_pulite.6.t: "Аввиси ди Гарансия"
 mani_pulite.6.d: "Уведомления о расследовании поступают через [ROOT.GetCountry.GetName] — для бизнесменов, чиновников министерства, партийных казначеев, мэров. #italic avviso di garanzia#! — уведомление о том, что кто-то находится под следствием — стало сокращением для позора. Газеты печатают их на первой странице. Карьера заканчивается в одночасье.\n\n[SCOPE.gsInterestGroup('indicted_ig').GetName], среди прочего, получил уведомление. Расследование больше не ограничивается Миланом."
 mani_pulite.6.f: "Почтальон никогда не был так напуган."
 mani_pulite.6.a: "Сотрудничество — сопротивление только ухудшит ситуацию"
 mani_pulite.6.b: "Оказание исполнительного давления на судебную власть"

 mani_pulite.7.t: "Кракси и монеты"
 mani_pulite.7.d: "Беттино Кракси — бывший премьер-министр, секретарь Социалистической партии, самый влиятельный политик в Италии в течение десятилетия — вышел из отеля Raphael в Риме, чтобы встретиться с толпой из нескольких сотен граждан. Они забросали его монетами и помидорами. Монеты, потому что они знают, откуда пришли деньги.\n\n Кракси выступил с кратким заявлением в защиту системы партийного финансирования — «все знали, все участвовали» — и отступил внутрь. Через несколько месяцев он прилетит на свою виллу в Хаммамете, Тунис. Он никогда не вернется в Италию. Социалистическая партия, которую он построил, перестанет существовать."
 mani_pulite.7.f: "Человек, который украл у страны, изгнанный монетами."
 mani_pulite.7.a: "Старая система закончена — пусть она падает"
 mani_pulite.7.b: "Управляйте переходным периодом — принимайте ответственность, ищите реформы"

 mani_pulite.8.t: "Следствие добралось до юга"
 mani_pulite.8.d: "Тангентополи никогда не был просто северным явлением. В [SCOPE.sState('tangentopoli_south_state').GetName] и по всему Меццоджорно система отката была вплетена в сельскохозяйственные субсидии ЕС, проекты общественной инфраструктуры и сеть отношений между местной политикой и организованной преступностью.\n\n Расследование Ди Пьетро последовало за деньгами на юг. Политические сети в [SCOPE.sState('tangentopoli_south_state').GetName] старше и более глубоко укоренены, чем их северные аналоги. Они не разойдутся легко."
 mani_pulite.8.f: "Коррупция прошла весь путь вниз."
 mani_pulite.8.a: "Расширение расследования — без исключений"
 mani_pulite.8.b: "Сдерживайте расследование на Севере — Юг слишком сложен"

 mani_pulite.9.t: "Декрет Бионди"
 mani_pulite.9.d: "Министр юстиции Альфредо Бионди издал чрезвычайный указ, который запрещает использование следственных изоляторов для ряда финансовых преступлений, включая преступления, лежащие в основе Мани Пулит. Критики сразу же назвали его указом #italic salvaladri#!: закон «спасать воров».\n\n В течение 24 часов миланские магистраты объявили коллективную отставку в знак протеста. Реакция общественности подавляющая. Прокуроры по всей Италии получили письма поддержки от сотен тысяч граждан. Политические издержки производства становятся очевидными."
 mani_pulite.9.f: "Правительство, которое принимает закон о защите своих собственных преступников, не выживет долго."
 mani_pulite.9.a: "Протолкнуть указ — расследование должно быть сдержано"
 mani_pulite.9.b: "Отозвать указ — реакция общественности слишком сильна"

 mani_pulite.10.t: "Первая республика умерла"
 mani_pulite.10.d: "Все кончено. Христианская демократия - партия, которая управляла Италией без перерыва с 1948 года - распалась. Социалисты ушли. Меньшие коалиционные партии исчезли. Сорок пять лет Первой республики, демонтированной за два года группой магистратов в Милане, которые просто отказались смотреть в другую сторону. Более 1200 политиков и бизнесменов были осуждены. Пять тысяч были расследованы. Бывшие премьер-министры, министры кабинета министров и промышленники предстали перед судом.\n\n Что будет дальше для [ROOT.GetCountry.GetName], неизвестно. Но система, которая питала республику полвека, закончена."
 mani_pulite.10.f: "Судьи сделали то, что не смогли сделать выборы."
 mani_pulite.10.a: "Новая Италия — примите чистый перерыв"
 mani_pulite.10.b: "Управляемый переход — реформа без разрыва"

 mani_pulite.15.t: "Расследование похоронено"
 mani_pulite.15.d: "Политический класс победил. Судьи были переведены, дискредитированы или дефинансированы. Доказательства были запечатаны. Импульс был нарушен.\n\n Это не значит, что Тангентополи не было. Это означает, что люди, которые его построили, выжили. Коррупция не закончилась — она ушла в подполье, в новые формы и новые договоренности. [ROOT.GetCountry.GetName] Граждане знают, что было сделано. Они знают, что не были наказаны. Это знание не исчезает."
 mani_pulite.15.f: "Отсроченное правосудие отрицается. И все это знают."
 mani_pulite.15.a: "Система выживает — пока"

 # ── MODIFIERS ────────────────────────────

 tangentopoli_systemic_corruption: "Тангентополи"
 tangentopoli_systemic_corruption_desc: "Система отката, которая десятилетиями финансировала политику [ROOT.GetCountry.GetAdjective], встроена в каждый публичный контракт. Структурное ослабление легитимности. Система стоит денег и призывает к позору."

 tangentopoli_chiesa_arrest: "Дело Кьезы"
 tangentopoli_chiesa_arrest_desc: "Арест Марио Кьезы открыл первую трещину в системе. Политический класс отвергает его, но магистраты идут по этому пути."

 tangentopoli_ig_under_scrutiny: "Под следствием"
 tangentopoli_ig_under_scrutiny_desc: "Эта группа находится под судебным контролем в связи с коррупционной сетью Тангентополи. Его политическая сила и популярность значительно пострадали."

 tangentopoli_widening_investigation: "Широкое расследование"
 tangentopoli_widening_investigation_desc: "Расследование выходит за рамки первоначального масштаба. Каждое признание приводит к новому аресту. Политические издержки управления растут."

 tangentopoli_suppression_attempt: "Попытка подавления"
 tangentopoli_suppression_attempt_desc: "[ROOT.GetCountry.GetName] пытается подавить судебное расследование. Международное сообщество и внутренняя пресса отметили это."

 tangentopoli_party_collapse: "Падение партии"
 tangentopoli_party_collapse_desc: "Эта партия была уничтожена откровениями Тангентополи. Его руководство находится в изгнании или под обвинением. Его избиратели ушли в другое место."

 tangentopoli_legitimacy_crisis: "Кризис легитимности"
 tangentopoli_legitimacy_crisis_desc: "Обнаружение системной коррупции разрушило общественное доверие к институтам [ROOT.GetCountry.GetAdjective]. Радикализм растет. Власть ослабевает."

 tangentopoli_south_exposure: "Обнаружены южные сети"
 tangentopoli_south_exposure_desc: "Расследование Мани Пулит достигло Меццоджорно, обнажив отношения между южными политическими сетями и системой Тангентополи."

 mani_pulite_investigation_begins: "Мани Пулит Расследование"
 mani_pulite_investigation_begins_desc: "Миланский пул магистратов проводит полное расследование. [ROOT.GetCountry.GetName] международная репутация выигрывает от видимой приверженности подотчетности."

 mani_pulite_public_mandate: "Публичный мандат на правосудие"
 mani_pulite_public_mandate_desc: "Отмена указа под давлением общественности продемонстрировала широту народной поддержки расследования."

 mani_pulite_clean_hands_victory: "Чистые руки Победы"
 mani_pulite_clean_hands_victory_desc: "Мани Пулит преуспел. Коррумпированная партийная система Первой республики была демонтирована судебным процессом. «Вторая республика» начинается с более высокой легитимности, более чистой институциональной основы и международного признания, которое происходит от привлечения власти к ответственности."

 mani_pulite_cautious_transition: "Управляемый переход"
 mani_pulite_cautious_transition_desc: "Переход от Первой к Второй республике осуществляется осторожно — реформа без разрыва. Старые партии ушли, но институциональная преемственность сохраняется."

 mani_pulite_investigation_buried: "Расследование похоронено"
 mani_pulite_investigation_buried_desc: "Мани Пулит потерпел неудачу. Политический класс выжил. Граждане [ROOT.GetCountry.GetName] знают, что было сделано, и знают, что это не было наказано. Коррупция продолжается под поверхностью. Законность постоянно нарушается."

 amendment_events.1.t: "Федеральная программа здравоохранения для бедных"
 amendment_events.1.d: "Предложения находятся на рассмотрении Конгресса, чтобы создать федеральную программу медицинского страхования для американцев с низким доходом, пожилых людей и инвалидов. Сторонники утверждают, что частные рынки не могут и не будут обслуживать тех, кто не может позволить себе премии. Противники утверждают, что это неприемлемое расширение федерального участия в здравоохранении.\n\n Коалиция, поддерживающая законопроект, широка — профсоюзы, социальные реформаторы и значительная часть общественности. Будет ли действовать [ROOT.GetCountry.GetName] — вопрос политической воли."
 amendment_events.1.f: "Медицина не должна зависеть от того, можете ли вы себе это позволить."
 amendment_events.1.a: "Enact Medicaid — федеральное медицинское страхование для тех, кто в нем нуждается"
 amendment_events.1.b: "Отказ — здравоохранение — это личное дело"
 
 amendment_events.2.t: "Закон о доступной медицинской помощи"
 amendment_events.2.d: "Администрация выдвинула всеобъемлющую реформу здравоохранения — Закон о доступном медицинском обслуживании. Законопроект требует, чтобы все граждане имели медицинскую страховку, создавали регулируемые рынки, продлевали право на получение Medicaid и запрещали страховщикам отказывать в страховании по ранее существовавшим условиям. Индивидуальный мандат является весьма спорным. Сторонники говорят, что это единственный способ заставить страховые рынки функционировать. Оппозиция называет это чрезмерным вмешательством правительства. У законопроекта есть голоса, если коалиция будет."
 amendment_events.2.f: "Сорок миллионов незастрахованных американцев. У Конгресса есть шанс изменить это."
 amendment_events.2.a: "Подписать закон о доступном медицинском обслуживании"
 amendment_events.2.b: "Вето — мандат заходит слишком далеко"
 
 amendment_events.3.t: "Патриотический акт"
 amendment_events.3.d: "В течение нескольких недель после терактов 11 сентября Конгресс с необычайной быстротой принял Патриотический акт США, резко расширив внутренние органы надзора, сократив судебный надзор за разведывательными операциями и позволив беспрецедентному обмену информацией между правоохранительными органами. Законопроект имеет почти единодушную поддержку. Сторонники гражданских свобод предупреждают, что скорость прохождения и широта положений будет трудно вернуться. Страна все еще скорбит. Голосование состоится завтра."
 amendment_events.3.f: "Страх — это законодатель."
 amendment_events.3.a: "Подпись Патриотического акта: национальная безопасность требует этого"
 amendment_events.3.b: "Отказ — гражданские свободы не могут быть проданы в горе"
 
 amendment_events.4.t: "Федеральный запрет на штурмовое оружие"
 amendment_events.4.d: "Конгресс проголосует за десятилетний федеральный запрет на производство указанного полуавтоматического оружия и высокопроизводительных журналов для продажи гражданским лицам. Законопроект поддержан правоохранительными объединениями и семьями расстрелянных. Оружейное лобби потратило много сил против него.\n\n Десятилетний пункт о закате был добавлен для обеспечения окончательного голосования. Срок действия запрета истекает в 2004 году, если он не будет продлен, и политическая коалиция, которая его продлит, может его не провести."
 amendment_events.4.f: "Десять лет. Затем голосование повторяется."
 amendment_events.4.a: "Пройти запрет — десять лет — это начало"
 amendment_events.4.b: "Победить его — законопослушные граждане не должны платить за действия преступников"
 
 amendment_events.5.t: "Закон о борьбе с насильственными преступлениями и правоприменении"
 amendment_events.5.d: "Конгресс рассматривает крупнейший закон о преступлениях в истории [ROOT.GetCountry.GetName] — финансирование 100 000 новых полицейских, значительное расширение федеральной тюремной системы, новые обязательные минимальные наказания и Закон о насилии в отношении женщин в качестве гонщика. Политическая логика двухпартийна. Волна преступности конца 1980-х годов сделала политику правопорядка популярной по всей линии партии. Законопроект пройдет легко. Будет ли это работать, вопрос на потом."
 amendment_events.5.f: "Законопроект проходит легко. Последствия занимают больше времени."
 amendment_events.5.a: "Подпишите это — страна требует действий по борьбе с преступностью"
 amendment_events.5.b: "Отклонить его — обязательные минимумы и массовое заключение не являются ответом"
 
 amendment_events.6.t: "Реформа системы налогообложения"
 amendment_events.6.d: "Министр финансов Лю Цзихуа предложил самую значительную налоговую реформу с момента основания Народной Республики, заменив согласованные соглашения о налогообложении предприятий между Пекином и местными органами власти национальным налогом на добавленную стоимость и формальной формулой дохода. Реформа резко централизует фискальную власть, давая Пекину надежный и растущий поток доходов. Местные органы власти потеряют свободу действий, но получат ясность. Промышленные и коммерческие интересы, наладившие отношения с местными властями, спокойно противостоят."
 amendment_events.6.f: "Центр хочет того, что сохранили провинции."
 amendment_events.6.a: "Внедрение системы распределения налогов — централизация фискальных органов"
 amendment_events.6.b: "Сохраняйте существующие механизмы — не нарушайте, какие функции"
 
 amendment_events.7.t: "35-часовая рабочая неделя"
 amendment_events.7.d: "Министр труда Мартин Обри предложила ввести 35-часовую рабочую неделю для большинства работников, сократив стандартные часы с 39. Политика представлена как способ более широкого обмена работой: меньше часов на одного работника, больше работников.\n\n Профсоюзы полны энтузиазма. Федерация работодателей предупредила о кризисе конкурентоспособности. Экономисты разделились. Левая коалиция, избравшая это правительство, выполнила свое обещание. Вопрос в том, доставить ли его."
 amendment_events.7.f: "Тридцать пять часов. На два часа меньше. Политическая буря."
 amendment_events.7.a: "Закон Обри: рабочие заслуживают более коротких часов"
 amendment_events.7.b: "Бросьте его — экономические издержки слишком высоки"
 
 patriot_act_rejected_modifier: "Патриотический акт отклонен"
 patriot_act_rejected_modifier_desc: "Решение не принимать Патриотический акт оставило истеблишмент безопасности разочарованным, а политический консенсус после атаки напряженным."
 
 china_tax_reform_rejected_modifier: "Налоговая реформа остановлена"
 china_tax_reform_rejected_modifier_desc: "Неспособность централизовать налоговую систему привела к фрагментации налоговых органов. Местные органы власти продолжают вести переговоры о своих собственных соглашениях, сокращая доходы и полномочия центра."
 
 terrorism_a.1.t: "Всемирный торговый центр бомбят"
 terrorism_a.1.d: "Бомба взорвалась в подземном гараже Всемирного торгового центра в Нью-Йорке. В результате взрыва погибли шесть человек и более тысячи получили ранения. Здание не упало, но целью было снести одну башню на другую.\n\n Это первая крупная международная террористическая атака на почву [ROOT.GetCountry.GetName]. Преступники имеют связи с сетями, действующими за пределами Ближнего Востока и Центральной Азии. Расследование продолжается."
 terrorism_a.1.f: "Первая атака. Не последний."
 terrorism_a.1.a: "Мы найдем ответственных"
 
 terrorism_a.2.t: "Ураган Эндрю ударил"
 terrorism_a.2.d: "Ураган Эндрю — самый разрушительный атлантический ураган в истории — обрушился на Южную Флориду с ветрами, превышающими 165 миль в час. Ущерб катастрофический. В округе Майами-Дейд уничтожены целые общины. По предварительным оценкам, это будет одно из самых дорогостоящих стихийных бедствий в истории [ROOT.GetCountry.GetName]."
 terrorism_a.2.f: "Ураган не заботится о том, что было построено."
 terrorism_a.2.a: "Объявить федеральную катастрофу — мобилизовать помощь"
 
 terrorism_a.3.t: "Землетрясение Нортридж"
 terrorism_a.3.d: "Землетрясение магнитудой 6,7 произошло в долине Сан-Фернандо к северу от Лос-Анджелеса в 4:31 утра. Пятьдесят семь человек погибли, тысячи получили ранения, а ущерб инфраструктуре, особенно системе автострад и старым зданиям, уже превысил десятки миллиардов долларов. Землетрясение является самым дорогостоящим в истории [ROOT.GetCountry.GetName]."
 terrorism_a.3.f: "Калифорния трясется. Это всегда трясёт."
 terrorism_a.3.a: "Немедленно мобилизуйте федеральную помощь"
 
 terrorism_a.4.t: "Бомбардировки в Оклахома-Сити"
 terrorism_a.4.d: "Бомба грузовика уничтожила переднюю часть федерального здания Альфреда П. Мурры в Оклахома-Сити, убив 168 человек, в том числе 19 детей в детском саду. Это самый смертоносный теракт в истории [ROOT.GetCountry.GetName].\n\n Преступники не иностранные. Тимоти Маквей и Терри Николс — граждане, мотивированные антиправительственной идеологией. Страна сталкивается с реальностью того, что угроза может исходить изнутри."
 terrorism_a.4.f: "Враг не был на границе. Он уже был здесь."
 terrorism_a.4.a: "Это внутренний терроризм, мы ответим с полной силой."
 
 terrorism_a.5.t: "Посольства США бомбили в Восточной Африке"
 terrorism_a.5.d: "Одновременные взрывы грузовиков произошли за пределами посольств в Найроби, Кения и Дар-эс-Саламе, Танзания. В результате нападений погибло более 200 человек, большинство из которых были гражданскими лицами в Кении и Танзании, а еще тысячи получили ранения. Сеть, возглавляемая Усамой бен Ладеном, взяла на себя ответственность.\n\n Атаки являются заявлением о том, что [ROOT.GetCountry.GetAdjective] интересы во всем мире являются целями. Реакция [ROOT.GetCountry.GetName] определит форму борьбы с терроризмом на ближайшее десятилетие."
 terrorism_a.5.f: "Сначала война пришла в наши посольства."
 terrorism_a.5.a: "Это акт войны, мы ответим."
 
 terrorism_a.6.t: "[ROOT.GetCountry.GetAdjective] посольство Его бомбят"
 terrorism_a.6.d: "Бомба в грузовике взорвалась возле посольства США в Найроби, в результате чего погибло более 200 человек, большинство из которых [ROOT.GetCountry.GetAdjective] гражданских лиц, которые в то время находились рядом со зданием. Атака не была направлена на [ROOT.GetCountry.GetName]. [ROOT.GetCountry.GetName] все равно стоила."
 terrorism_a.6.f: "Бомба не делала различий между народами."
 terrorism_a.6.a: "Мы требуем справедливости для наших погибших."
 
 terrorism_a.7.t: "[ROOT.GetCountry.GetAdjective] Капитал разорился"
 terrorism_a.7.d: "Бомба взорвалась возле посольства США в Дар-эс-Саламе, убив одиннадцать человек в результате скоординированной атаки наряду с одновременным взрывом в Найроби, Кения. Жертвами были в основном гражданские лица. Атака потрясла страну."
 terrorism_a.7.f: "Терроризм достиг наших берегов через океан."
 terrorism_a.7.a: "Мы поддерживаем наш народ"
 
 terrorism_a.8.t: "USS Cole подвергся бомбардировке"
 terrorism_a.8.d: "Небольшая лодка со взрывчаткой взорвалась рядом с USS Cole, когда она заправлялась в порту Аден, Йемен. Семнадцать моряков были убиты и 39 ранены. Атака приписывается Аль-Каиде.\n\n Военный корабль [ROOT.GetCountry.GetAdjective] Военно-морской флот на обычной заправке в дружественном порту был атакован смертником в резиновой шлюпке. Военное руководство задается вопросом, как это могло произойти."
 terrorism_a.8.f: "Военно-морской флот должен быть трудной целью."
 terrorism_a.8.a: "Это не останется без ответа."
 
 terrorism_a.9.t: "Мост Крик-Мур Торнадо"
 terrorism_a.9.d: "Торнадо EF5, самый сильный из зарегистрированных по шкале Фудзиты, проложил путь через Бридж-Крик и Мур, штат Оклахома. Скорость ветра превышала 300 миль в час. Торнадо находился на земле в течение 85 минут и проложил путь полного разрушения через общины к югу от Оклахома-Сити. Тридцать шесть человек погибли."
 terrorism_a.9.f: "Там, где был торнадо, ничего не осталось."
 terrorism_a.9.a: "Развертывание помощи пострадавшим общинам"
 
 terrorism_a.10.t: "32 человека погибли в Virginia Tech"
 terrorism_a.10.d: "Боевик убил 32 студента и преподавателя Политехнического института Вирджинии в Блэксбурге, штат Вирджиния, прежде чем покончил с собой. Это самая смертоносная школьная стрельба в истории [ROOT.GetCountry.GetName]. Стрелок законно приобрел свое огнестрельное оружие, несмотря на историю проблем с психическим здоровьем, которые должны были дисквалифицировать его в соответствии с действующим законодательством. Провал системы фоновой проверки в настоящее время находится под пристальным вниманием."
 terrorism_a.10.f: "Он купил оружие легально."
 terrorism_a.10.a: "Немедленно пересмотреть процедуры проверки огнестрельного оружия"
 
 terrorism_a.11.t: "82 выстрела в театре «Аврора»"
 terrorism_a.11.d: "Стрелок открыл огонь во время полуночной премьеры крупного фильма в театре Century 16 в Авроре, штат Колорадо, убив 12 человек и ранив 70. Злоумышленник был вооружен полуавтоматической винтовкой, дробовиком и пистолетами — все они были законно приобретены за несколько недель до нападения."
 terrorism_a.11.f: "Ночь в кино. Двенадцать человек не вернулись домой."
 terrorism_a.11.a: "Трагедия, требующая размышлений"
 
 terrorism_a.12.t: "Стрелок убил 6 человек в храме Сикхов в Висконсине"
 terrorism_a.12.d: "Белый расист открыл огонь по храму сикхов Висконсина в Ок-Крик, убив шесть верующих, прежде чем был застрелен полицией. Нападавший был ветераном армии США со связями с неонацистскими организациями.\n\n Жертвы стали жертвами из-за своей религии и этнической принадлежности. Атака возобновила дебаты о внутреннем экстремизме, преступлениях на почве ненависти и неспособности контролировать белые националистические сети."
 terrorism_a.12.f: "Они пришли помолиться. Он пришел убить их за то, кем они были."
 terrorism_a.12.a: "Это преступление на почве ненависти — мы не будем игнорировать внутренний экстремизм."
 
 terrorism_a.13.t: "Трагедия в Сэнди-Хук"
 terrorism_a.13.d: "Боевик убил 20 детей в возрасте от шести до семи лет и шесть взрослых сотрудников начальной школы Сэнди Хук в Ньютауне, штат Коннектикут. Детей несколько раз расстреливали из автомата в штурмовом стиле.\n\n Адекватных слов нет. [ROOT.GetCountry.GetName] находится в трауре."
 terrorism_a.13.f: "Двадцать детей. Шесть лет."
 terrorism_a.13.a: "Страна скорбит"
 
 terrorism_a.14.t: "Резня в Данблане"
 terrorism_a.14.d: "Стрелок поступил в начальную школу Данблэйна в Шотландии и убил шестнадцать детей в возрасте пяти и шести лет и их учителя, прежде чем покончить с собой. Это самая смертоносная массовая стрельба в истории [ROOT.GetCountry.GetName].\n\n Национальный ответ ошеломляет. Выжившие, родители и общественность начали кампанию за полный запрет на владение оружием. Правительство столкнется с огромным давлением, чтобы действовать."
 terrorism_a.14.f: "Шестнадцать детей. Пять лет. Шотландия не забудет."
 terrorism_a.14.a: "Что-то должно измениться — страна требует этого."
 
 terrorism_a.15.t: "Наводнения в Янцзы"
 terrorism_a.15.d: "Река Янцзы и ее притоки затопили катастрофически после месяцев необычно сильных осадков. Наводнение затронуло 240 миллионов человек в центральных и южных районах: 14 провинций, 56 миллионов акров сельскохозяйственных угодий и тысячи населенных пунктов. Более 3000 человек погибли и 14 миллионов были перемещены.\n\n Государственная мобилизация была массовой. Военные развернули сотни тысяч военнослужащих для оказания помощи при наводнениях. Это крупнейшее стихийное бедствие в новейшей истории [ROOT.GetCountry.GetAdjective]."
 terrorism_a.15.f: "Река решила взять то, что обещали держать дамбы."
 terrorism_a.15.a: "Полные силы государства будут развернуты."
 
 terrorism_a.16.t: "Апартаменты взорвали в Москве"
 terrorism_a.16.d: "Серия бомбардировок многоквартирных домов в Москве и других российских городах унесла жизни почти 300 человек, пока они спали. Взрывы были приписаны чеченским сепаратистам, хотя некоторые наблюдатели оспаривают доказательства. Эти нападения создали огромное общественное давление для решительного военного ответа. Сейчас серьезно рассматривается новая военная кампания в Чечне. Политический деятель, который обещает сокрушить террористов, обнаружит, что общественность готова последовать за ним."
 terrorism_a.16.f: "Страх является мощным политическим инструментом. Как и горе."
 terrorism_a.16.a: "Это требует полного военного ответа."
 
 # ── MODIFIERS ────────────────────────────
 
 he_terror_attack_domestic: "Внутренний теракт"
 he_terror_attack_domestic_desc: "Террористическая атака на почву [ROOT.GetCountry.GetAdjective] подорвала доверие общественности и усилила радикализацию и беспорядки."
 
 he_terror_attack_foreign: "Террористическая атака за рубежом"
 he_terror_attack_foreign_desc: "Террористическая атака на интересы за рубежом нанесла ущерб престижу и дипломатическому положению."
 
 he_counterterrorism_push: "Борьба с терроризмом"
 he_counterterrorism_push_desc: "Ведется масштабная контртеррористическая кампания. Авторитет и легитимность укрепляются, но позора, порожденного агрессивными операциями за рубежом, потребуется время, чтобы разрушиться."
 
 he_natural_disaster_emergency: "Чрезвычайная ситуация в связи с стихийными бедствиями"
 he_natural_disaster_emergency_desc: "Стихийное бедствие спровоцировало федеральную чрезвычайную ситуацию. Стоимость значительна, а возможности правительства растянуты."
 
 he_disaster_zone: "Зона бедствий"
 he_disaster_zone_desc: "Это государство сильно пострадало от стихийного бедствия. Инфраструктура, смертность и миграция — все это негативно сказывается."
 
 he_domestic_extremism_response: "Реакция внутреннего экстремизма"
 he_domestic_extremism_response_desc: "После внутреннего террористического нападения [ROOT.GetCountry.GetName] был запущен значительный внутренний ответ безопасности, нацеленный на экстремистские сети."
 
 he_military_shock: "Военный шок"
 he_military_shock_desc: "Успешное нападение на военные активы пошатнуло вооруженные силы и повредило национальному престижу."
 
 he_mass_shooting: "Массовый расстрел"
 he_mass_shooting_desc: "Массовая стрельба усилила общественное беспокойство и политическую поляризацию по поводу политики в отношении огнестрельного оружия."
 
 he_mass_shooting_severe: "Массовая стрельба — национальная трагедия"
 he_mass_shooting_severe_desc: "Массовая стрельба исключительной жестокости вызвала глубокое национальное горе и сильное политическое давление. Под сомнение ставится легитимность существующей политики."
 
 he_hate_crime_shock: "Преступление на почве ненависти — национальный шок"
 he_hate_crime_shock_desc: "Целенаправленное нападение на почве ненависти потрясло страну и подчеркнуло угрозу внутреннего экстремизма, направленного на общины меньшинств."
 
 he_gun_reform_mandate: "Публичный мандат на реформу оружия"
 he_gun_reform_mandate_desc: "Общественное возмущение после массовой стрельбы создало сильный политический импульс для реформы огнестрельного оружия. Принятие закона проще, чем обычно."
 
 he_security_state_response: "Ответ государства безопасности"
 he_security_state_response_desc: "Крупный террористический акт вызвал общественную поддержку расширенных полномочий государственной безопасности. Укрепляются авторитет и легитимность."
 
 ## breakup of czechoslovakia
 je_velvet_divorce: "Бархатный развод"
 je_velvet_divorce_reason: "Федерация находится в напряжении. Переход от коммунизма выявил экономические и политические разломы между чешской и словацкой половинами государства. Словацкие политики во главе с Владимиром Мечиаром настаивают на большей автономии, а некоторые - на полной независимости. Чешская сторона во главе с Вацлавом Клаусом все чаще готова отпустить их.\n\n Сейчас в движении две силы. [ROOT.GetCountry.GetName] должен создать #bold федеральную сплоченность#! — путем переговоров, экономического компромисса и политического мастерства — до того, как #bold сепаратистское давление#! сделает роспуск необратимым.\n\n Если давление достигнет 100 до достижения сплоченности, федерация распадется. Мирно. Вот что значит «бархат»."
 
 je_velvet_divorce_stable_tt: "Федерация держится. Переговоры продолжаются. Результат все еще в руках правительства."
 je_velvet_divorce_tense_tt: "@warning! #bold Сепаратистское давление растет.#! Словацкие политики все больше уверены в том, что независимость возможна и желательна. Окно для урегулирования путем переговоров сужается."
 je_velvet_divorce_critical_tt: "@warning! #bold Федерация находится на переломном этапе.#! Политические условия для роспуска почти завершены. Без драматического вмешательства Чехословакия не переживет год."
 
 federal_cohesion_bar: "Федеральная сплоченность"
 federal_cohesion_bar_desc: "Федеральная сплоченность"
 federal_cohesion_bar_progress_tt: "Федеральный уровень сплоченности"
 
 separatist_pressure_bar: "Сепаратистское давление"
 separatist_pressure_bar_desc: "Сепаратистское давление"
 separatist_pressure_bar_progress_tt: "Сепаратистский импульс"
 
 # ── EVENTS ───────────────────────────────
 
 velvet_divorce.1.t: "Конституционный кризис начался"
 velvet_divorce.1.d: "Выборы в июне 1992 года дали невозможный результат. На чешских землях Гражданская демократическая партия Вацлава Клауса победила на платформе быстрой либерализации рынка. В Словакии Движение за демократическую Словакию победило на платформе более медленных реформ и большей словацкой автономии. Двое мужчин встретились в Брно и договорились об одном: нынешняя договоренность не может продолжаться. Они расходятся практически во всем. Президент Вацлав Гавел, который считает, что общественность будет голосовать за то, чтобы сохранить страну вместе, если его попросят, был отодвинут на второй план.\n\n Судьба [ROOT.GetCountry.GetName] теперь вопрос о том, что принесут следующие месяцы."
 velvet_divorce.1.f: "Два выборов. Два мандата. Одна страна."
 velvet_divorce.1.a: "Правительство будет работать над объединением федерации"
 
 velvet_divorce.2.t: "Словацкие экономические проблемы"
 velvet_divorce.2.d: "Экономика Словакии страдает от перехода от коммунизма сильнее, чем Богемия и Моравия. Словацкая промышленная база, построенная вокруг тяжелого производства и производства оружия для Варшавского договора, рухнула почти за одну ночь. Резко растет безработица. Словацкие политики обвиняют федеральную экономическую политику и требуют либо перераспределения, либо права устанавливать свой собственный курс. Разрыв между двумя половинами страны становится политически взрывоопасным."
 velvet_divorce.2.f: "Когда половина страны делает хорошо, а другая половина нет, вопрос о том, почему, становится вопросом о том, кто."
 velvet_divorce.2.a: "Перенаправить федеральные средства в регионы Словакии"
 velvet_divorce.2.b: "Рынок найдет свой уровень — никакого особого режима"
 
 velvet_divorce.3.t: "Словацкая декларация суверенитета"
 velvet_divorce.3.d: "Словацкий национальный совет принял декларацию о суверенитете Словакии. Документ не предусматривает провозглашения независимости, но утверждает, что словацкий закон заменяет федеральный закон на территории Словакии. Это конституционно неоднозначно и политически взрывоопасно. Президент Гавел осудил его и вскоре после этого подал в отставку со своего президентства в Чехословакии. Декларация еще не является разрывом, но это первый формальный шаг к нему."
 velvet_divorce.3.f: "Еще не независимость. Но направление ясное."
 velvet_divorce.3.a: "Осуждать декларацию — федеральный закон верховный"
 velvet_divorce.3.b: "Открытые переговоры — предлагают Словакии больше формальной автономии в составе федерации"
 
 velvet_divorce.4.t: "Мечиар и Клаус: два человека, два видения"
 velvet_divorce.4.d: "Владимир Мечиар и Вацлав Клаус снова встретились. Их переговорные позиции ужесточились. Клаус хочет жесткого федерального союза с единой экономической политикой. Мечиар хочет либо свободной конфедерации с почти полной словацкой внутренней автономией, либо независимости.\n\n Те, кто присутствовал на заседании, описывают его как гражданский, но непримиримый. Эти два человека не враги, но они хотят принципиально разных вещей, и один из них получит то, что хочет."
 velvet_divorce.4.f: "Два прагматика. Противоположные выводы."
 velvet_divorce.4.a: "Обратно в единую программу рыночных реформ — поддержка Клауса"
 velvet_divorce.4.b: "Предложите более свободную конфедерацию - дайте Мечиару что-то для работы с"
 
 velvet_divorce.5.t: "Призывы к референдуму"
 velvet_divorce.5.d: "Словацкие политики и гражданские группы призывают к референдуму о независимости. Предложение имеет значительную общественную поддержку в Словакии, где опросы показывают, что узкое большинство выступает за ту или иную форму разделения.\n\n Президент Гавел, все еще влиятельный, несмотря на свою отставку, выступил против референдума. Он считает, что сам процесс разожжет страсти и сделает рациональный исход невозможным. «Нации не решают отделить то, как собрание акционеров голосует за слияние», — сказал он. «Они чувствуют свой путь к нему или от него».\n\n Вопрос о том, проводить ли голосование, сам по себе является голосованием по тому, что [ROOT.GetCountry.GetName] считает таковым."
 velvet_divorce.5.f: "Референдум – это вопрос. Но некоторые вопросы меняют ответ."
 velvet_divorce.5.a: "Провести референдум — пусть люди говорят"
 velvet_divorce.5.b: "Блокируйте референдум — следуйте совету Гавела"
 
 velvet_divorce.10.t: "Чехословакия выжила"
 velvet_divorce.10.d: "Кризис прошел. Благодаря сочетанию экономического компромисса, политических переговоров и настойчивости федеральных институтов, [ROOT.GetCountry.GetName] держался вместе.\n\n Созданное соглашение не является федерацией 1990 года. У Словакии больше автономии. Экономические отношения между двумя сторонами были перебалансированы. Но состояние не повреждено, и флаг не изменен.\n\n История заметит, что это было не неизбежно, что это требовало активного выбора, и что этот выбор был сделан."
 velvet_divorce.10.f: "Бархатного развода не произошло. Это победа."
 velvet_divorce.10.a: "Чехословакия терпит"
 
 velvet_divorce.15.t: "Бархатный развод"
 velvet_divorce.15.d: "Все готово. 1 января 1993 года Чехословакия перестанет существовать.\n\n Роспуск был согласован федеральным парламентом, а не референдумом. Общественность никогда не спрашивали напрямую. Опросы в обеих половинах страны последовательно показывали поддержку большинства для сохранения некоторой формы общего государства, но политический класс — Клаус и Мечиар прежде всего — определили, что союз был неработоспособным. Раскол был мирным. Никаких выстрелов не было. Границы не оспаривались. Активы и пассивы федерации были разделены по формуле, основанной на численности населения. Армия была расколота. Валюта была разделена. Флаг был разделен.\n\n Чехословакия просуществовала семьдесят четыре года. Она родилась в революции и была распущена на парламентских выборах. Оба государства-преемника уже подали заявки на членство в ЕС и НАТО."
 velvet_divorce.15.f: "Семьдесят четыре года. Закончилось бумажной работой."
 velvet_divorce.15.a: "Роспуск продолжается"
 
 velvet_divorce.16.t: "Чехия родилась"
 velvet_divorce.16.d: "1 января 1993 года Чехия стала независимым государством. Территория Богемии, Моравии и Чешской Силезии — со столицей в Праге — образует одно из двух государств-преемников Чехословацкой федерации. Новое государство наследует более развитую половину старой экономики, функционирующую демократическую систему и немедленное международное признание. Путь в Европу открыт."
 velvet_divorce.16.f: "Новое государство. Старая нация."
 velvet_divorce.16.a: "Чешская Республика начинается"
 
 velvet_divorce.17.t: "Родилась Словацкая Республика"
 velvet_divorce.17.d: "1 января 1993 года Словацкая Республика стала независимым государством. Братислава является столицей страны, которая существует в этой форме ровно один день.\n\n Словакия наследует более тяжелое промышленное наследие, более высокую безработицу и более сложную политическую среду — стиль управления Мечиара скоро вызовет международную критику. Но государство суверенное, признанное и впервые в истории полностью независимое."
 velvet_divorce.17.f: "Впервые в своей истории: независимая Словакия."
 velvet_divorce.17.a: "Словацкая Республика начинается"
 
 velvet_divorce.18.t: "Что будет дальше?"
 velvet_divorce.18.d: "Чехословакия распадается. Его государства-преемники — Чехия и Словацкая Республика — принимают форму.\n\n Ты был лидером страны, которой больше нет. Вопрос в том, какую роль вы будете играть в том, что будет дальше."
 velvet_divorce.18.f: "Одна страна. Два будущего."
 velvet_divorce.18.a: "Продолжайте как Чехия"
 velvet_divorce.18.b: "Продолжайте как Словацкая Республика"
 velvet_divorce.18.c: "Оставайтесь и наблюдайте за распадом"
 
