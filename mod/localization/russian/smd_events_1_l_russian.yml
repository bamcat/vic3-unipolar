 je_kurdistan_war_score_bar_desc:0 "Турецкий импульс."
 je_kurdistan_war_score_bar_second_desc:0 "Курдский момент"
 je_kurdistan_war_spring_offensive:0 "Запуск весеннего наступления"
 je_kurdistan_war_spring_offensive_desc:0 "Курдистан может попытаться превратить партизанский успех в более широкое наступление."
 je_kurdistan_war_security_operation:0 "Запуск операций безопасности"
