 je_collapse_of_yugoslavia:0 "Нестабильная федерация"
 je_collapse_of_yugoslavia_reason:0 "Федерация находится под сильным давлением. \n Стабильность: #v [Country.MakeScope.Var('yugo_stability').GetValue] #! \n Давление сецессии: #v [Country.MakeScope.Var('yugo_secession_pressure').GetValue] #! \n Международное давление: #v [Country.MakeScope.Var('yugo_international_pressure').GetValue] #!."
 je_yugo_status_unstable:0 "Федерация нестабильна."
 je_yugo_status_collapse_near:0 "Дезинтеграция неминуема."
 je_yugo_status_salvage_possible:0 "Конфедеративное урегулирование находится в пределах досягаемости."

 je_reunify_yugoslavia:0 "Воссоединение Югославии"
 je_reunify_yugoslavia_reason:0 "Старая федерация распалась. Сербия может попытаться восстановиться путем завоевания, дипломатии или интеграции."

 je_yugoslav_wars_serbia:0 "Югославские войны"
 je_yugoslav_wars_serbia_reason:0 "Войны югославской преемственности продолжаются до тех пор, пока регион не перейдет в постфедеральный порядок."
 je_yugo_wars_status_general:0 "Региональный кризис продолжается."
 je_yugo_wars_status_bosnia:0 "Босния остается центром войны."
 je_yugo_wars_status_kosovo:0 "Косово стало центральным кризисом."

 yugoslav_collapse.1.t:0 "Фрагменты федерации"
 yugoslav_collapse.1.d:0 "Националистические правительства и разрушающаяся федеральная власть подтолкнули Югославию к краю распада."
 yugoslav_collapse.1.a:0 "Республики должны быть едины."
 yugoslav_collapse.1.b:0 "Предложите конфедеративное урегулирование."
 yugoslav_collapse.1.c:0 "Восстановление федеральной власти силой."

 yugoslav_collapse.2.t:0 "Хорватия уходит"
 yugoslav_collapse.2.d:0 "Хорватия движется к независимости, вынуждая Белград решить, бороться или признать разрыв."
 yugoslav_collapse.2.a:0 "Хорватская война за независимость."
 yugoslav_collapse.2.b:0 "Признать независимость Хорватии."

 yugoslav_collapse.3.t:0 "Босния провозглашает независимость"
 yugoslav_collapse.3.d:0 "Независимость Боснии создала конкурирующие претензии по всей республике, и сербские образования начали организовывать свою собственную территориальную власть."
 yugoslav_collapse.3.a:0 "Начинается Боснийская война."
 yugoslav_collapse.3.b:0 "Признать Боснию и добиваться урегулирования."

 yugoslav_collapse.4.t:0 "Международный ответ"
 yugoslav_collapse.4.d:0 "Иностранные правительства обсуждают миротворчество, санкции и посредничество по мере распространения югославского конфликта."
 yugoslav_collapse.4.a:0 "Необходима миротворческая миссия."
 yugoslav_collapse.4.b:0 "Это внутреннее дело."

 yugoslav_collapse.5.t:0 "Сербия требует воссоединения"
 yugoslav_collapse.5.d:0 "Белград попросил наше правительство вернуться в восстановленное югославское государство."
 yugoslav_collapse.5.a:0 "Примите воссоединение."
 yugoslav_collapse.5.b:0 "Отклонить требование."

 yugoslav_collapse.10.t:0 "Конфедеративные переговоры"
 yugoslav_collapse.10.d:0 "Более свободная югославская конфедерация может сохранить мир, но республики по-прежнему с подозрением относятся к намерениям Белграда."
 yugoslav_collapse.10.a:0 "Продолжайте реформы."
 yugoslav_collapse.10.b:0 "Процесс провалился."

 yugoslav_collapse.20.t:0 "Югославия сохранилась"
 yugoslav_collapse.20.d:0 "Благодаря компромиссу и сдержанности Югославия избежала полного распада и приняла конфедеративное урегулирование."
 yugoslav_collapse.20.a:0 "Федерация выживает."

 yugoslav_collapse.30.t:0 "Референдум в Черногории"
 yugoslav_collapse.30.d:0 "Черногория готовится решить, продолжать ли союз с Сербией или восстановить полную независимость."
 yugoslav_collapse.30.a:0 "Признать независимость Черногории."
 yugoslav_collapse.30.b:0 "Сохранить союз."

 srpskas.1.t:0 "Республика Сербская мобилизуется"
 srpskas.1.d:0 "Руководство боснийских сербов мобилизовалось для защиты территории от нового правительства Боснии."
 srpskas.1.a:0 "Начинайте войну."
 srpskas.1.b:0 "Принять автономию в Боснии."

 kosovo_events.1.t:0 "Косовский кризис"
 kosovo_events.1.d:0 "Растущие беспорядки и репрессии в Косово создали кризис, который может втянуть Албанию и НАТО в конфликт с Югославией."
 kosovo_events.1.a:0 "Пригнись."
 kosovo_events.1.b:0 "Обеспечить широкую автономию."

 kosovo_events.2.t:0 "Вмешательство в Косово?"
 kosovo_events.2.d:0 "Конфликт в Косово обострился. Правительства стран НАТО обсуждают военную интервенцию против Югославии."
 kosovo_events.2.a:0 "Начинайте кампанию бомбардировок."
 kosovo_events.2.b:0 "Избегайте эскалации."

