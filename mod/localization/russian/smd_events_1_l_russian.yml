 demographic_events.1.t: "Демографический кризис"
 demographic_events.1.d: "Эксперты предупреждают, что наша страна сталкивается с серьезным демографическим кризисом. Десятилетия снижения рождаемости привели к старению населения, которое вскоре переполнит нашу рабочую силу. Без устойчивых инвестиций в уход за детьми, здравоохранение, жилье и социальное обеспечение наша экономическая основа будет разрушаться, поскольку соотношение работников и иждивенцев рушится.\n\n Временный демографический буфер в настоящее время маскирует худшие последствия, но этот буфер будет разрушаться в течение следующих десятилетий. Мы должны провести и поддерживать всеобъемлющие пронаталистские реформы в течение как минимум десяти лет, чтобы обратить вспять эту тенденцию."
 demographic_events.1.a: "Мы должны действовать, пока не стало слишком поздно"

 demographic_events.2.t: "Демографическое восстановление"
 demographic_events.2.d: "После десятилетия устойчивых инвестиций в наш народ — всеобщий уход за детьми, доступное здравоохранение, всестороннее благосостояние и доступное жилье — уровень рождаемости в нашей стране стабилизировался. Демографический кризис, грозивший нанести ущерб нашей экономике, удалось предотвратить. В рабочую силу вступает новое поколение рабочих, и будущее выглядит светлым."
 demographic_events.2.a: "Наше терпение окупилось"

