# Cancer

cancer.1.t:0 "Лекарство от рака"
cancer.1.d:0 "На протяжении более века рак преследовал человечество — непредсказуемое заболевание, которое требовало миллионов и ускользало от каждого лекарства. Она не знала границ, не уважала никакого статуса и оставляла разрушения в каждой семье, к которой прикасалась. Но сегодня, после многих лет неустанных исследований, клинических испытаний и международного сотрудничества, ученые сделали невозможное: разработали универсальное, целенаправленное лечение. Эта прорывная терапия обнаруживает и уничтожает злокачественные клетки, не нанося вреда здоровой ткани, что делает ремиссию не только возможной, но и гарантированной."
cancer.1.a:0 "Триумф для всего человечества."
cancer_eradication_prestige:0 "Искорененный рак"

# 2004 Indian Ocean earthquake and tsunami

indian_ocean_tsunami.1.t: "Землетрясение ударило по Индийскому океану"
indian_ocean_tsunami.1.d: "Массивное подводное землетрясение вызвало катастрофическое цунами, опустошив прибрежные районы Южной и Юго-Восточной Азии. Ущерб беспрецедентный, и восстановление займет годы."
indian_ocean_tsunami.1.a: "Мы должны немедленно начать восстановление."
indian_ocean_tsunami.1.f: "В одной из самых страшных катастроф в истории разрушительное землетрясение и цунами разрушило наши прибрежные районы."

je_indian_ocean_tsunami: "Восстановление цунами"
je_indian_ocean_tsunami_reason: "Разрушительное цунами повредило береговую инфраструктуру и потрясло страну. Усилия по восстановлению имеют решающее значение для восстановления и стабильности."

tsunami_recovery_success_tt: "Вы успешно приступили к национальному восстановлению."

tsunami_disaster_struck: "Национальный ущерб от цунами"
tsunami_local_destruction: "Разрушение местного цунами"
tsunami_reconstruction_complete: "Реконструкция завершена"
  
indian_ocean_tsunami_recovery_title: "Усилия по восстановлению цунами"
indian_ocean_tsunami_recovery_desc: "Ваша страна пострадала от цунами в Индийском океане. Осуществлять помощь и восстановление для стабилизации населения и инфраструктуры."

tsunami_aid_title: "Оказание гуманитарной помощи"
tsunami_aid_desc: "Проводить реформы социального обеспечения или выделять финансовую помощь для восстановления пострадавших районов."

tsunami_disaster_struck: "Национальный ущерб от цунами"
tsunami_local_destruction: "Разрушение местного цунами"
tsunami_reconstruction_complete: "Успешные усилия по реконструкции"
tsunami_recovery_success_tt: "До декабря 2005 года в стране был принят закон о социальном обеспечении."
 
indian_ocean_tsunami.2.t: "Цунами опустошает Южную Азию"
indian_ocean_tsunami.2.d: "Массовое землетрясение и цунами обрушились на Индийский океан. Надвигается гуманитарная катастрофа. Мир наблюдает — будем ли мы действовать?"
indian_ocean_tsunami.2.f: "Исчезли все береговые линии. Срочно нужна помощь."
indian_ocean_tsunami.2.a: "Отправьте экстренную помощь."
indian_ocean_tsunami.2.b: "У нас есть свои приоритеты."

indian_ocean_tsunami.3.t: "Помощь получена"
indian_ocean_tsunami.3.d: "Иностранное государство направило гуманитарную помощь. Ваши люди благодарны."
indian_ocean_tsunami.3.a: "Слава Богу за глобальную солидарность."

tsunami_foreign_aid_sent: "Зарубежная помощь жертвам цунами"
countries_available_to_request_aid_from:0 "Страны могут обратиться за помощью к"
has_sent_iosa:0 "Уже направили помощь"

je_request_iosa_aid_button:0 "Запрос международной помощи"
je_request_iosa_aid_button_desc:0 "Просьба к международному сообществу о помощи в восстановлении после разрушительного землетрясения и цунами."

tsunami_disaster_struck: "Пострадали от землетрясения и цунами в Индийском океане в 2004 году"

# Iraq disarmament Crisis

je_iraq_disarmament_crisis: "Иракский кризис разоружения"
je_iraq_disarmament_crisis_reason: "После войны в Персидском заливе Ирак был связан резолюцией 687 Совета Безопасности Организации Объединенных Наций о ликвидации своих программ создания оружия массового уничтожения. Международное сообщество через ЮНСКОМ и МАГАТЭ стремилось проверить соблюдение, но препятствование Ирака и споры по инспекциям создали затяжное противостояние. Кризис угрожает разжечь конфликт по мере роста напряженности из-за отказа Ирака полностью сотрудничать с режимом разоружения."
iraq_disarmament_resolved_tt: "Иракский кризис разоружения был урегулирован."

je_us_iraq_disarmament: "Иракский кризис разоружения"
je_us_iraq_disarmament_reason: "Соединенные Штаты взяли на себя обязательство обеспечить соблюдение Ираком резолюции 687 Совета Безопасности Организации Объединенных Наций. Неоднократное препятствование Ираком инспекциям UNSCOM и МАГАТЭ подрывает глобальную безопасность и подпитывает напряженность в регионе Персидского залива. Дипломатические усилия продолжаются, но военные варианты остаются на столе, если инспекции не увенчаются успехом."

iraq_events.10.t: "Ирак отказался от самолетов UNSCOM"
iraq_events.10.d: "В смелом вызове Специальной комиссии Организации Объединенных Наций (ЮНСКОМ) Ирак отклонил предложения инспекторов использовать свои собственные самолеты для въезда в страну. Багдад настаивает на полном контроле над доступом и транспортировкой, что вызывает новые опасения по поводу его приверженности разоружению."
iraq_events.10.a: "Откажитесь от их условий — суверенитет Ирака на первом месте."
iraq_events.10.b: "Разрешить полеты — сотрудничество может ослабить напряженность."

us_events.10.t: "Ирак блокирует самолеты UNSCOM"
us_events.10.d: "Ирак отказался разрешить инспекторам ЮНСКОМ летать на своих собственных самолетах в страну, что еще больше затрудняет инспекционные усилия. Этот шаг рассматривается как прямой акт неповиновения ООН и неудача в усилиях по разоружению."
us_events.10.a: "Это не может остаться без ответа."
us_events.10.b: "Избегайте эскалации — пока."

################# COUNTRY-SPECIFIC ##############

# united states

rodney.1.t:0 "Полиция избивает Родни Кинга"
rodney.1.d:0 "Безоружный афроамериканец Родни Кинг был жестоко избит сотрудниками полицейского управления Лос-Анджелеса после высокоскоростной погони. Очевидец заснял нападение, обнажив жестокость полиции и вызвав национальное возмущение."
rodney.1.f:0 "Они окружили его и продолжали избивать дубинками. Он не сопротивлялся. Это было ужасно, как будто они хотели сделать из него пример."

rodney.1.a:0 "Это будет жаркое лето."

rodney.2.t:0 "Беспорядки в Лос-Анджелесе"
rodney.2.d:0 "После того, как сотрудники полиции, обвиняемые в применении чрезмерной силы при избиении Родни Кинга, были оправданы, огромные массы людей вышли на улицы, нанеся ущерб городу на сумму более 1 миллиарда долларов."
los_angeles_riots:0 "Бунты Родни Кинга"
rodney.2.a:0 "Они успокоятся сами по себе."
rodney.2.b:0 "Отправьте в Национальную гвардию!"

north_hollywood.1.t: "Стрельба в Северном Голливуде"
north_hollywood.1.d: "Два грабителя были одеты в бронежилеты и несли штурмовые винтовки. Оружейные офицеры должны были заимствовать оружие у местного оружейного магазина, чтобы эффективно реагировать."
north_hollywood.1.f: "Два вооруженных грабителя банков устроили длительную перестрелку с полицией Лос-Анджелеса, ранив нескольких офицеров и гражданских лиц. Инцидент потряс страну и вызвал вопросы о готовности полиции."
north_hollywood.1.a: "Ужасный день в истории правоохранительных органов."

north_hollywood_police_response:0 "Увеличение поддержки правоохранительных органов"

wtc_bombing.1.t: "1993 Бомбардировка Всемирного торгового центра"
wtc_bombing.1.d: "Мощная бомба взорвалась под Северной башней Всемирного торгового центра в Нью-Йорке, убив шесть человек и ранив более тысячи. Атака потрясла страну, выявив уязвимость перед терроризмом в пределах ее собственных границ."
wtc_bombing.1.a: "Повышение мер внутренней безопасности."
wtc_bombing.1.b: "Сохраняйте спокойствие и избегайте чрезмерной реакции."
heightened_security_measures: "Повышенные меры безопасности"
heightened_security_measures_desc: "В ответ на террористический акт правительство проводит более жесткую внутреннюю политику безопасности и координацию правоохранительных органов."
oklahoma_city_aftermath: "Оклахома-Сити бомбит после смерти"
oklahoma_city_aftermath_desc: "Разрушительная бомбардировка федерального здания Альфреда П. Мурры потрясла страну. Проблемы безопасности и политические последствия сохраняются, поскольку правительство ужесточает внутреннюю бдительность."
 
usa_events.1.t: "Первичные республиканские результаты"
usa_events.1.d: "После напряженного первичного сезона, наполненного дебатами и агитацией, Республиканская партия выбрала своего нового знаменосца. Джордж Буш-младший одержал победу, взяв бразды правления в руки мелкой буржуазии и пообещав партии новую смелую главу."
usa_events.1.a: "Номинация принадлежит ему."

usa_events.2.t: "Номинация Барака Обамы"
usa_events.2.d: "После напряженного первичного сезона, наполненного дебатами и агитацией, Демократическая партия выбрала своего нового знаменосца. Победу одержал Барак Хусейн Обама, взявший бразды правления Малой Буржуазией и пообещавший партии смелую новую главу."
usa_events.2.a: "Номинация принадлежит ему."

usa_events.3.t: "Номинация Дональда Трампа"
usa_events.3.d: "После напряженного первичного сезона, наполненного дебатами и агитацией, Республиканская партия выбрала своего нового знаменосца. Дональд Джон Трамп, особенно противоречивая фигура, одержал победу, взяв бразды правления профессионалами и пообещав смелую новую главу для партии."
usa_events.3.a: "Номинация принадлежит ему."

# Storm of the Century
american_disasters.1.t: "1993 Шторм века"
american_disasters.1.d: "Массивный циклонический шторм прокатился по восточной части Соединенных Штатов, принеся рекордные снегопады, ураганные ветры и сильные наводнения вдоль побережья. Миллионы людей остались без электричества, и число погибших растет с каждым днем."
american_disasters.1.a: "Мы должны выдержать гнев зимы."

# Great Flood of 1993
american_disasters.2.t: "Великий потоп!"
american_disasters.2.d: "Недели сильных дождей и насыщенной почвы привели к тому, что реки Миссисипи и Миссури разбухли далеко за их берегами, затопив обширные районы американского Среднего Запада. Все города находятся под водой, и ущерб беспрецедентный."
american_disasters.2.a: "Катастрофа для сердца."

great_flood_of_1993: "Великий потоп 1993 года"
storm_of_the_century: "1993 Шторм века"

# Columbine

columbine.1.t: "Резня в средней школе Колорадо"
columbine.1.d: "Два тяжело вооруженных студента совершили смертельное нападение в средней школе Колумбайн в Колорадо, убив и ранив многих, прежде чем покончить с собой. Это событие вызвало общенациональное горе и дебаты по поводу контроля над оружием, безопасности в школах и культурных влияний."
columbine.1.a: "Мысли и молитвы"
columbine.1.b: "Мы должны повысить безопасность в школах по всей стране."

