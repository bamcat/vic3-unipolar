 chechen_war.1.t: "Наступление начинается"
 chechen_war.1.d: "Началась решающая фаза войны. Партизанская война, определившая начало конфликта, уступает место прямой конфронтации. Горы Кавказа станут свидетелями последней борьбы за Чечню."
 chechen_war.1.a: "За Россию!"
 chechen_war.1.a.che: "За Ичкерию!"
 
 chechen_war.2.t_rus: "Победа России в Чечне"
 chechen_war.2.d_rus: "Чеченское сопротивление было сломлено. Российские войска восстановили контроль над отколовшейся республикой. Стоимость жизни и инфраструктуры огромна, но территориальная целостность Российской Федерации сохранена."
 chechen_war.2.t_che: "Чеченская независимость"
 chechen_war.2.d_che: "Несмотря ни на что, чеченские боевики одержали победу. Российские военные ушли, и Чеченская Республика Ичкерия выступает в качестве независимого государства. Цена свободы была ошеломляющей, но воля чеченского народа оказалась нерушимой."
 chechen_war.2.a: "История помнит этот день"
 
 chechen_war.5.t: "Горная засада"
 chechen_war.5.d: "Наши бойцы опознали российский конвой, движущийся по узкому горному перевалу. Местность идеально подходит для засады — крутые скалы с обеих сторон, ограниченное пространство для маневра и густой лес, обеспечивающий прикрытие для наших людей."
 chechen_war.5.a: "Удар с горных вершин"
 chechen_war.5.b: "Держите наши позиции"
 
 chechen_war.6.t: "Рейд по линиям снабжения"
 chechen_war.6.d: "Российские конвои снабжения двигались по низменностям с минимальным сопровождением. Наши истребители могут перехватить их, захватить ценные запасы и нарушить логистику противника, но операция будет стоить нам ресурсов и может вызвать ответные меры."
 chechen_war.6.a: "Направьте свои линии снабжения"
 chechen_war.6.b: "Слишком рискованно"
 
 chechen_war.7.t: "Война на Кавказе"
 chechen_war.7.d: "Чеченская Республика Ичкерия объявила о своей независимости, а Россия ответила военной силой. Северный Кавказ охвачен войной. Изрезанная горная местность дает чеченским партизанам естественное преимущество, но военная мощь России огромна."
 chechen_war.7.a: "Так начинается"
 
