 chechen_war_rus_reward_desc: "Победа России в чеченской войне сохранила ее территориальную целостность и продемонстрировала ее военную решимость."
 
 chechen_war_che_reward: "Независимость победила"
 chechen_war_che_reward_desc: "Чеченский народ завоевал свою независимость через кровь и жертвы. Новая нация гордится."
 
