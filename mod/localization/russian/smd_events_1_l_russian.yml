 kurdistan_war.2.t_kur:0 "Курдистан преобладает"
 kurdistan_war.2.d_trk:0 "Конфликт в Курдистане завершился в пользу Турции. Сейчас государство переходит к консолидации контроля."
 kurdistan_war.2.d_kur:0 "Конфликт в Курдистане закончился в пользу Курдистана. Новое государство должно укрепить свою независимость."
 kurdistan_war.2.f:0 "Война заканчивается, но ее последствия будут влиять на регион в течение многих лет."
