 je_first_chechen_war: "Первая чеченская война"
 je_first_chechen_war_reason: "Чеченская Республика Ичкерия провозгласила независимость от России. Москва ответила военной силой. Гористая местность Северного Кавказа благоприятствует чеченским партизанам, но Россия обладает подавляющей силой. Исход этой войны определит судьбу Чечни и проверит решимость Российской Федерации."
 
