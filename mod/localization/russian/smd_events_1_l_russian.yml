 chechen_storm_grozny: "Битва при Грозном"
 chechen_storm_grozny_desc: "Нападение на Грозный привело к разрушительным жертвам среди гражданского населения и разрушениям."
 
 chechen_war_devastation: "Разорванный войной Кавказ"
