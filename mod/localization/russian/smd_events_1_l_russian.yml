school_security_measures: "Школьные меры безопасности"

better_school_security: "Лучшая школьная безопасность"
thoughts_and_prayers: "Мысли и молитвы"
recent_mass_shooting: "Последние массовые расстрелы"

# September 11 Attacks 

ground_zero: "Наземный ноль"
  
je_war_on_terror: "Война с террором"
je_war_on_terror_reason: "Террористические нападения на Соединенные Штаты 11 сентября 2001 года ознаменовали начало устойчивой глобальной кампании против терроризма. После этих атак Соединенные Штаты начали так называемую «войну с терроризмом» — широкую стратегию, которая объединила военные операции, усилия разведки и внутренние меры безопасности. Последствия изменили внешнюю политику, дебаты о гражданских свободах и международные альянсы.\n\n"

usa_wot.1.t: "Америка под ударом"
usa_wot.1.d: "Скоординированные террористические атаки поразили Нью-Йорк и Вашингтон, округ Колумбия, уничтожив башни Всемирного торгового центра и серьезно повредив Пентагон. Тысячи были убиты или ранены. Страна в шоке и требует ответа."
usa_wot.1.a: "День, который будет жить в позоре."

usa_wot.2.t: "Война с террором"
usa_wot.2.d: "После терактов президент объявил глобальную кампанию против тех, кто планирует, поддерживает или укрывает террористические организации. Эта декларация приведет к усилению мер безопасности внутри страны и военным обязательствам за рубежом."
usa_wot.2.a: "Мы будем привлекать их к ответственности."

global_wot.1.t: "Нападение США: тысячи погибших"
global_wot.1.d: "Соединенные Штаты пострадали от разрушительных террористических атак. Мировые лидеры выразили соболезнования, и многие государства пересматривают свои меры безопасности."
global_wot.1.a: "Это трагедия для всего человечества."

global_wot.2.t: "США объявили войну терроризму"
global_wot.2.d: "После терактов 11 сентября Соединенные Штаты объявили глобальную «войну с терроризмом», призвав международное сообщество присоединиться к кампании против террористических групп и их сторонников."
global_wot.2.a: "Международный порядок меняется."

global_wot.3.t: "США ссылаются на статью 5"
global_wot.3.d: "После терактов 11 сентября и последующей военной кампании США в Афганистане впервые в истории была применена статья 5 Устава НАТО. Как государство-член, нас призывают присоединиться к военным усилиям."
global_wot.3.a: "Мы поддерживаем наших союзников."

usa_wot.3.t: "Атаки сибирской язвы терроризируют Америку"
usa_wot.3.d: "В течение нескольких недель после терактов 11 сентября анонимные письма, содержащие смертельные споры сибирской язвы, были отправлены новостным организациям и сенаторам США. Эти нападения посеяли страх по всей стране, вызвали массовые расследования и усилили опасения по поводу биологической войны."
usa_wot.3.a: "Справедливость будет обеспечена. И это будет быстро."
usa_wot.3.b: "Больше нет!"
  
je_hunt_for_bin_laden: "Охота за Усамой бен Ладеном"
je_hunt_for_bin_laden_reason: "После терактов 11 сентября 2001 года Соединенные Штаты начали обширный и глобальный поиск Усамы бен Ладена, лидера Аль-Каиды. Эта миссия будет охватывать границы, включая военные операции, сбор разведданных и дипломатическое давление.\n\n"
intensified_intelligence_operations: "Охота за Усамой бен Ладеном"

hunt_bin_laden_progress_bar: "Охотничий прогресс"
hunt_bin_laden_progress_bar_desc: "Поисковый прогресс"
osama_bar_completed: "Усама бен Ладен найден"

usa_wot.10.t: "Охота за Усамой бен Ладеном"
usa_wot.10.d: "С началом войны с терроризмом спецслужбы США и спецназ начали поиски Усамы бен Ладена по всему миру. Теперь решения определят интенсивность и масштаб операции."
usa_wot.10.a: "Выделите все необходимые ресурсы."
usa_wot.10.b: "Сосредоточиться на других приоритетах."

usa_wot.12.t: "Бен Ладен захвачен"
usa_wot.12.d: "После нескольких лет преследования Усама бен Ладен был обнаружен и нейтрализован. Соединенные Штаты празднуют значительную победу в войне с терроризмом."
usa_wot.12.a: "Правосудие отбыто."

usa_wot.11.t: "США убивают бен Ладена"
usa_wot.11.d: "После нескольких месяцев сбора и подготовки разведданных «морские котики» ВМС США начали дерзкий рейд на соединение в Абботтабаде, Пакистан. Цель: захватить или убить Усаму бен Ладена. Мир ждет результата."

usa_wot.11.a: "Трус до самого конца."

usa_wot.11.success_tt: "Усама бен Ладен был убит в Пакистане. Война с терроризмом вступает в новую фазу."

usa_wot.20.t: "Интеллектуальный прорыв"
usa_wot.20.d: "Оперативники ЦРУ раскрывают ценную информацию от захваченных боевиков, предоставляя новые сведения о возможном местонахождении бен Ладена."
usa_wot.20.a: "Отлично, вперед."
usa_wot.20.a.tt: "Прогресс в поисках бен Ладена увеличился."

usa_wot.21.t: "Бен Ладен выпустил видео"
usa_wot.21.d: "Месяцы отслеживания подозреваемого, предположительно связанного с бен Ладеном, оказались тупиком. Ресурсы были потрачены впустую. Что еще хуже, ближневосточный террорист выпустил видео для американской общественности."
usa_wot.21.a: "Неприятная неудача."
usa_wot.21.a.tt: "Прогресс в поисках бен Ладена снизился."

usa_wot.22.t: "Региональное сотрудничество"
usa_wot.22.d: "Пакистан и региональные союзники оказывают помощь в сборе разведданных, ускоряя охоту на бен Ладена."
usa_wot.22.a: "Это нам очень поможет."
usa_wot.22.a.tt: "Прогресс в поисках бен Ладена значительно увеличился."
 
accuse_iraq_wmds_button: "Обвинение Ирака в укрывательстве ОМУ"
accuse_iraq_wmds_button_desc: "Обвинить Ирак в тайной разработке или укрывательстве оружия массового уничтожения. Это усилит напряженность и может оправдать военные действия."

end_war_on_terror_button: "Окончание войны с террором"
end_war_on_terror_button_desc: "Объявить войну с террором официально оконченной, свернув международные операции. Это оставит затяжные последствия дома и за рубежом."

usa_wot.30.t: "Обвиняемый в укрывательстве ОМУ"
usa_wot.30.d: "Соединенные Штаты публично обвинили нас в тайной разработке и укрывательстве оружия массового уничтожения. Это знаменует собой значительную эскалацию напряженности и может приблизить конфликт."
usa_wot.30.a: "страшно"
  
osama_extradited: "Усама бен Ладен экстрадирован"
war_on_terror_stopped_tt: "Война с террором закончилась"
# War on TERROR

usa_wot.5.t: "Бен Ладен под стражей"
usa_wot.5.d: "В результате неожиданного дипломатического прорыва Афганистан согласился экстрадировать Усаму бен Ладена в Соединенные Штаты. Эта уступка знаменует собой значительную победу на ранних этапах войны с террором."
usa_wot.5.a: "Это большая дипломатическая победа."

usa_wot.6.t: "Афганистан отказался экстрадировать бен Ладена"
usa_wot.6.d: "Афганское правительство отказалось передать Усаму бен Ладена властям США. Напряженность растет, когда Вашингтон обсуждает свой следующий шаг."
usa_wot.6.a: "Вы либо с террористами, либо против них."
usa_wot.6.b: "Давайте не будем делать никаких резких действий, сейчас."

je_request_bin_laden_extradition_button: "Запрос на экстрадицию бен Ладена"
je_request_bin_laden_extradition_button_desc: "Формально попросите Афганистан экстрадировать Усаму бен Ладена в США для суда."

bin_laden_extradition_accepted_country: "Экстрадиция бен Ладена - принята"
bin_laden_extradition_accepted_country_desc: "Афганистан согласился выдать Усаму бен Ладена, повысив национальный моральный дух и повысив военную готовность."
  
bin_laden_extradition_accepted_ig_armed_forces: "Экстрадиция бен Ладена - принята"
bin_laden_extradition_accepted_ig_armed_forces_desc: "Вооруженные силы довольны дипломатическим успехом правительства в обеспечении экстрадиции бен Ладена."

bin_laden_extradition_rejected_country: "Экстрадиция бен Ладена - отклонена"
bin_laden_extradition_rejected_country_desc: "Афганистан отказался экстрадировать Усаму бен Ладена, нанося ущерб нашей военной готовности и истощая ресурсы."
  
bin_laden_extradition_rejected_ig_armed_forces: "Прочная свобода"
bin_laden_extradition_rejected_ig_armed_forces_desc: "Вооруженные силы возмущены неспособностью правительства обеспечить экстрадицию бен Ладена."

bin_laden_extradition_rejected_ig_armed_forces_2: "Не вторгались в Афганистан"
bin_laden_extradition_rejected_ig_armed_forces_2_desc: "Вооруженные силы возмущены неспособностью правительства обеспечить экстрадицию бен Ладена."

operation_enduring_freedom: "Операция «Несокрушимая свобода»"


limited_response: "Ограниченный ответ"
heightened_security_measures: "Высотные меры безопасности"

afghanistan.1.t: "США требуют экстрадиции бен Ладена"
afghanistan.1.d: "Соединенные Штаты официально попросили Афганистан передать Усаму бен Ладена, обвиняемого в организации терактов 11 сентября. Принятие этой просьбы может ослабить напряженность, но отказ может привести к серьезным последствиям."
afghanistan.1.a: "Соблюдайте просьбу."
afghanistan.1.b: "Откажитесь."

# 2003 Invasion of Iraq

iraq_war.1.t: "ООН созвала в Ираке заявления о ОМУ"
iraq_war.1.d: "США обвинили Ирак в укрывательстве оружия массового уничтожения. ООН созвала экстренную сессию для обсуждения этого вопроса и сбора международных ответов."
iraq_war.1.a: "Дискуссия начинается."

iraq_war.2.t: "Дебаты ООН по иракскому ОМУ"
iraq_war.2.d: "Международное сообщество обсуждает, как реагировать на обвинения США в адрес Ирака."
iraq_war.2.a: "Поддерживайте Соединенные Штаты."
iraq_war.2.b: "На стороне Ирака."
iraq_war.2.c: "Оставайтесь нейтральными."

iraq_war.3.t: "Ответ НАТО на обвинения США"
iraq_war.3.d: "Как союзники по НАТО, мы должны решить, поддерживать ли позицию Соединенных Штатов по предполагаемой иракской программе ОМУ."
iraq_war.3.a: "Мы будем поддерживать США."
iraq_war.3.b: "Мы не можем поддержать эту акцию."

iraq_war.4.t: "Ирак ответил на обвинения"
iraq_war.4.d: "Ирак обвиняется в укрывательстве ОМУ. Правительство должно реагировать на растущее давление из-за рубежа."
iraq_war.4.a: "Отрицать все и терпеть изоляцию."
iraq_war.4.b: "Осудить Запад и мобилизовать пропаганду."
  
iraq_war.5.t: "США призывают ООН"
iraq_war.5.d: "Соединенные Штаты представили свое дело в Организации Объединенных Наций, призвав поддержать военные действия против Ирака в связи с его предполагаемым оружием массового уничтожения. Мировые лидеры должны теперь решить, поддержать ли просьбу Вашингтона или сопротивляться интервенции."
iraq_war.5.b: "ООН зашла в тупик — мы должны действовать в одиночку"
iraq_war_us_lobby_tt: "США лоббируют ключевые державы за поддержку, корректируя дипломатические отношения."
iraq_war_unfail_tt: "Родился как раз вовремя, чтобы умереть на Ближнем Востоке."

iraq_war.6.t: "США решаются на войну"
iraq_war.6.d: "В условиях, когда ООН парализована расколом, Вашингтону предстоит принять важное решение: действовать в одиночку и противостоять Ираку в военном отношении или отступить и рисковать показаться слабым перед миром."
iraq_war.6.a: "Начать вторжение в Ирак"
iraq_war.6.b: "Отойдите назад и избегайте войны"
iraq_war_backdown_tt: "США отступают от интервенции, теряя международный престиж."
2003_invasion_of_iraq: "2003 Вторжение в Ирак"
iraq_condemned: "Ирак осудили"

