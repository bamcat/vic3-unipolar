 intifada_urban_uprising: "Городское восстание"
 intifada_urban_uprising_desc: "Боевые действия происходят в густонаселенных городских районах и лагерях беженцев, где обычные вооруженные силы не могут эффективно действовать. Крошечная территория делает масштабные маневры практически невозможными."

 intifada_isr_morale: "Моментум АОИ"
 intifada_isr_morale_desc: "Военные успехи укрепили решимость Израиля подавить восстание."

 intifada_popular_resistance: "Народное сопротивление"
 intifada_popular_resistance_desc: "Палестинский народ поднялся в массовом сопротивлении. Каждый район - оплот, каждый гражданский - потенциальный боец."

 intifada_stone_throwing: "Уличное сопротивление"
 intifada_stone_throwing_desc: "Устойчивые уличные столкновения и бросание камней сделали оккупированные районы чрезвычайно трудными для израильских сил."

 intifada_idf_crackdown: "Армия обороны Израиля"
 intifada_idf_crackdown_desc: "Израильские военные операции в гражданских районах приводят к значительным жертвам."

 intifada_devastation: "Уничтожение интифады"
 intifada_devastation_desc: "Боевые действия разрушили дома, инфраструктуру и средства к существованию по всей территории."

 intifada_raid_expenses: "Операции сопротивления"
 intifada_raid_expenses_desc: "Финансирование скоординированных операций сопротивления израильским военным позициям."

 intifada_international_pressure: "Международное давление"
 intifada_international_pressure_desc: "Глобальное освещение конфликта в СМИ нанесло ущерб международному положению и дипломатической репутации Израиля."

 intifada_isr_reward: "Интифада подавлена"
 intifada_isr_reward_desc: "Израиль подавил Вторую интифаду, восстановив военный контроль над палестинскими территориями."

 intifada_pal_reward: "Сопротивление победоносное"
 intifada_pal_reward_desc: "Палестинский народ победил благодаря народному сопротивлению, завоевав признание и уступки через жертвы."
 
 je_israel_palestine_peacetime:0 "Неудобное статус-кво"
 je_israel_palestine_peacetime_reason:0 "Нет открытой интифады или серьезной эскалации, но конфликт продолжается через координацию безопасности, закрытие, дипломатию, демонстрации и периодические инциденты."
 je_israel_palestine_tension_bar:0 "Конфликтная напряженность"
 je_israel_palestine_tension_bar_desc:0 "Региональная нестабильность"
 je_israel_palestine_tension_bar_second_desc:0 "Высокая напряженность может вызвать серьезное предупреждение об эскалации и может быть связана с вашей системой Второй интифады."

 je_ip_peacetime_status_calm:0 "Ситуация относительно спокойная. Координация безопасности, переговоры и международное посредничество сдерживают более широкую эскалацию."
 je_ip_peacetime_status_fragile:0 "Спокойствие хрупкое. Инциденты, рейды, закрытие, демонстрации или урегулирование споров могут быстро нарушить текущий баланс."
 je_ip_peacetime_status_crisis:0 "Ситуация находится на грани серьезной эскалации. Одного инцидента может быть достаточно, чтобы нарушить статус-кво."
 je_ip_peacetime_complete_tt:0 "Напряженность очень низкая, переговоры продвинуты, а координация в области безопасности прочна."

 je_ip_peacetime_security_coordination:0 "Координация в области безопасности"
 je_ip_peacetime_security_coordination_desc:0 "Расширить практическую координацию действий по недопущению того, чтобы локальные инциденты становились более масштабным кризисом. Это снижает напряженность, но может вызвать внутреннюю политическую реакцию."

 je_ip_peacetime_closure_policy:0 "Политика закрытия"
 je_ip_peacetime_closure_policy_desc:0 "Усилить контроль за движением и доступом, чтобы снизить риски безопасности. Это снижает краткосрочную напряженность, но наносит ущерб палестинской экономике и увеличивает международное давление."

 je_ip_peacetime_settlement_freeze:0 "Заморозка поселений"
 je_ip_peacetime_settlement_freeze_desc:0 "Объявить временное замораживание расширения поселений. Это улучшает переговоры и международное положение, но создает внутреннюю негативную реакцию."

 je_ip_peacetime_international_mediation:0 "Международное посредничество"
 je_ip_peacetime_international_mediation_desc:0 "Пригласить внешних посредников для стабилизации переговоров. Это улучшает динамику переговоров, но увеличивает внешний контроль."

 je_ip_peacetime_grassroots_outreach:0 "Пропаганда среди коренного населения"
 je_ip_peacetime_grassroots_outreach_desc:0 "Поддержка гражданского общества, местных организаций и ненасильственных политических инициатив. Это снижает напряжение, но может разозлить сторонников жесткой линии."

 je_ip_peacetime_mass_mobilization:0 "Массовая мобилизация"
 je_ip_peacetime_mass_mobilization_desc:0 "Направьте общественное разочарование в организованную мобилизацию. Это повышает международное давление, но рискует подтолкнуть ситуацию к эскалации."

 ip_uneasy_status_quo:0 "Неудобный статус-кво"
 ip_uneasy_status_quo_desc:0 "Открытые бои утихли, но конфликт по-прежнему формирует политику, дипломатию и повседневную администрацию."

 ip_security_coordination:0 "Координация в области безопасности"
 ip_security_coordination_desc:0 "Координация между силами безопасности ограничивает эскалацию, хотя это политически дорого."

 ip_closure_policy:0 "Политика закрытия"
 ip_closure_policy_desc:0 "Ограничения на передвижение снижают некоторые риски для безопасности и усиливают дипломатическое и гуманитарное давление."

 ip_economic_restrictions:0 "Экономические ограничения"
 ip_economic_restrictions_desc:0 "Ограничения на передвижение и доступ подрывают экономическую жизнь."

 ip_settlement_freeze:0 "Заморозка поселений"
 ip_settlement_freeze_desc:0 "Временная пауза в поселенческой деятельности улучшила дипломатические условия."

 ip_international_mediation:0 "Международное посредничество"
 ip_international_mediation_desc:0 "Внешние посредники пытаются сохранить политический процесс."

 ip_grassroots_outreach:0 "Пропаганда среди коренного населения"
 ip_grassroots_outreach_desc:0 "Гражданское общество и местные политические инициативы работают над тем, чтобы не допустить обострения ситуации."

 ip_mass_mobilization:0 "Массовая мобилизация"
 ip_mass_mobilization_desc:0 "Общественная мобилизация усиливает политическое давление, а также повышает риск конфронтации."

 ip_security_alert:0 "Предупреждение о безопасности"
 ip_security_alert_desc:0 "Силы безопасности находятся в состоянии повышенной готовности после недавних беспорядков."

 ip_international_scrutiny:0 "Международный контроль"
 ip_international_scrutiny_desc:0 "Иностранные правительства и СМИ внимательно следят за развитием событий."

 ip_political_backlash:0 "Политическая реакция"
 ip_political_backlash_desc:0 "Компромисс или координация разозлили внутренних противников."

 ip_stabilized_peace_process:0 "Стабилизированный мирный процесс"
 ip_stabilized_peace_process_desc:0 "Редкий период низкой напряженности и устойчивой координации создал более стабильную дипломатическую обстановку."

 ip_breakdown_of_calm:0 "Разрушение спокойствия"
 ip_breakdown_of_calm_desc:0 "Статус-кво мирного времени рухнул, и общественность готовится к эскалации."

 ip_peacetime.1.t:0 "Инцидент в контрольно-пропускном пункте"
 ip_peacetime.1.d:0 "Инцидент, связанный с местной безопасностью, привлек внимание общественности и усилил давление с целью принятия ответных мер."
 ip_peacetime.1.f:0 "Даже незначительные столкновения могут стать символами более широкого конфликта."
 ip_peacetime.1.a:0 "Ужесточить процедуры безопасности."
 ip_peacetime.1.b:0 "Тихая координация с местными властями."

 ip_peacetime.2.t:0 "Безопасность Crackdown"
 ip_peacetime.2.d:0 "Палестинские силы безопасности вынуждены действовать против боевиков и вооруженных группировок."
 ip_peacetime.2.f:0 "Сотрудничество может предотвратить эскалацию, но оно также может выглядеть как сотрудничество."
 ip_peacetime.2.a:0 "Двигайтесь против сетей."
 ip_peacetime.2.b:0 "Избегайте конфронтации."

 ip_peacetime.3.t:0 "Объявление об урегулировании"
 ip_peacetime.3.d:0 "Предложенное расширение стало горячей точкой в дипломатическом процессе."
 ip_peacetime.3.f:0 "Карты, разрешения и вершины холмов могут нести вес национальной стратегии."
 ip_peacetime.3.a:0 "Продолжайте с объявлением."
 ip_peacetime.3.b:0 "Отложить расширение."

 ip_peacetime.4.t:0 "Уличные протесты"
 ip_peacetime.4.d:0 "Демонстрации распространились по нескольким общинам, оспаривая нынешний политический баланс."
 ip_peacetime.4.f:0 "Улица может быть предохранительным клапаном или первым признаком чего-то большего."
 ip_peacetime.4.a:0 "Пусть мобилизация продолжается."
 ip_peacetime.4.b:0 "Призывайте к сдержанности."

 ip_peacetime.5.t:0 "Международный посланник"
 ip_peacetime.5.d:0 "Прибыл иностранный посланник с предложениями о возобновлении диалога."
 ip_peacetime.5.f:0 "Дипломатия редко решает конфликт сразу, но она может выиграть время."
 ip_peacetime.5.a:0 "Примите посланника."
 ip_peacetime.5.b:0 "Отказ от внешнего давления."

 ip_peacetime.6.t:0 "Конференция доноров"
 ip_peacetime.6.d:0 "Иностранные доноры предлагают новую поддержку, но взамен ожидают политических уступок."
 ip_peacetime.6.f:0 "Помощь может стабилизировать институты, но зависимость несет свои издержки."
 ip_peacetime.6.a:0 "Примите дипломатические рамки."
 ip_peacetime.6.b:0 "Требуйте меньше условий."

 ip_peacetime.10.t:0 "Спокойствие ломается"
 ip_peacetime.10.d:0 "Накопившееся давление рейдов, протестов, закрытий, политического срыва и неудачных переговоров поставило ситуацию на грань."
 ip_peacetime.10.f:0 "Язык управления уступает место языку чрезвычайного положения."
 ip_peacetime.10.a:0 "Готовьтесь к эскалации."
 ip_peacetime.10.b:0 "Сделайте последний экстренный толчок."

 ip_peacetime.20.t:0 "Долгосрочное спокойствие"
 ip_peacetime.20.d:0 "Редкое сочетание координации в области безопасности, политической сдержанности и дипломатического взаимодействия стабилизировало ситуацию."
 ip_peacetime.20.f:0 "Это не окончательный мир, а нечто большее, чем отсутствие войны."
 ip_peacetime.20.a:0 "Хрупкий успех."
 
 oslo_accords.1.t:0 "Соглашение Осло I"
 oslo_accords.1.d:0 "Израильские переговорщики достигли предложенной декларации принципов с палестинским руководством. Это предложение установит взаимное признание и временные рамки для палестинского самоуправления."
 oslo_accords.1.f:0 "Соглашение не устанавливает границы, Иерусалим, поселения, беженцев или окончательный суверенитет. Тем не менее, он предлагает поэтапный политический процесс."
 oslo_accords.1.a:0 "Предложить Декларацию принципов."
 oslo_accords.1.b:0 "Отложите соглашение."

 oslo_accords.10.t:0 "Израиль предложил соглашение Осло I"
 oslo_accords.10.d:0 "Израиль предложил декларацию принципов, устанавливающих взаимное признание и временные рамки палестинского самоуправления."
 oslo_accords.10.f:0 "Принятие приведет к началу нового политического процесса и прекращению формального подчинения Израилю, но многие вопросы окончательного статуса останутся нерешенными."
 oslo_accords.10.a:0 "Принять Декларацию принципов."
 oslo_accords.10.b:0 "Отклоните предложение."

 oslo_accords.11.t:0 "Палестина приняла Осло I"
 oslo_accords.11.d:0 "Палестинское руководство приняло Декларацию принципов. Начался промежуточный мирный процесс."
 oslo_accords.11.f:0 "Рукопожатие историческое, трудная работа только начинается."
 oslo_accords.11.a:0 "Процесс начинается."

 oslo_accords.12.t:0 "Палестина отвергает Осло I"
 oslo_accords.12.d:0 "Палестинское руководство отвергло предложенную Декларацию принципов."
 oslo_accords.12.f:0 "Без взаимного признания дипломатическое открытие закрывается."
 oslo_accords.12.a:0 "Переговоры провалились."

 oslo_accords.2.t:0 "Соглашение Осло II"
 oslo_accords.2.d:0 "Через два года после Декларации принципов израильские переговорщики подготовили временное соглашение о расширении палестинского самоуправления на Западном берегу и в Газе."
 oslo_accords.2.f:0 "Предложение делит власть на зоны палестинского контроля, общей ответственности и постоянного контроля Израиля."
 oslo_accords.2.a:0 "Предложите временное соглашение."
 oslo_accords.2.b:0 "Отложить дальнейшее перемещение."

 oslo_accords.20.t:0 "Израиль подписал соглашение Осло II"
 oslo_accords.20.d:0 "Израиль предложил временное соглашение о расширении палестинского самоуправления и организации Западного берега в области А, В и С."
 oslo_accords.20.f:0 "Соглашение обещает расширить полномочия, но также закрепляет фрагментированную карту пересекающихся юрисдикций."
 oslo_accords.20.a:0 "Принять Временное соглашение."
 oslo_accords.20.b:0 "Отклоните предложение."

 oslo_accords.21.t:0 "Палестина приняла Осло II"
 oslo_accords.21.d:0 "Палестинское руководство приняло Временное соглашение. Процесс в Осло переходит в следующую фазу."
 oslo_accords.21.f:0 "Больше полномочий передается, но окончательное урегулирование остается отдаленным."
 oslo_accords.21.a:0 "Выполнять соглашение."

 oslo_accords.22.t:0 "Палестина отвергает Осло II"
 oslo_accords.22.d:0 "Палестинское руководство отвергло предлагаемое Временное соглашение."
 oslo_accords.22.f:0 "Структура, построенная Осло I, сохранилась, но ее следующий шаг не удался."
 oslo_accords.22.a:0 "Процесс застопорился."

 oslo_i_peace_process:0 "Осло I Мирный процесс"
 oslo_i_peace_process_desc:0 "Декларация принципов открыла формальный промежуточный мирный процесс."

 oslo_i_palestinian_authority:0 "Создана Палестинская автономия"
 oslo_i_palestinian_authority_desc:0 "Временная палестинская власть приступила к гражданской ответственности."

 oslo_talks_delayed:0 "Переговоры отложены"
 oslo_talks_delayed_desc:0 "Дипломатический процесс застопорился, вызвав разочарование и неопределенность."

 oslo_ii_interim_agreement:0 "Временное соглашение Осло II"
 oslo_ii_interim_agreement_desc:0 "Временное соглашение расширило рамки палестинского самоуправления."

 oslo_ii_expanded_self_government:0 "Расширенное самоуправление"
 oslo_ii_expanded_self_government_desc:0 "Палестинские учреждения взяли на себя большую административную ответственность."

 oslo_ii_joint_security_framework:0 "Совместные рамки безопасности"
 oslo_ii_joint_security_framework_desc:0 "Обязанности в области безопасности координируются в рамках временных рамок."

 oslo_ii_administrative_fragmentation:0 "Административная фрагментация"
 oslo_ii_administrative_fragmentation_desc:0 "Территория регулируется фрагментированными и пересекающимися юрисдикциями."

 oslo_ii_delayed_redeployment:0 "Задержка с перераспределением"
 oslo_ii_delayed_redeployment_desc:0 "Дальнейшая передислокация задерживается, что подрывает доверие к процессу."

 oslo_accords.30.t:0 "Соглашение в Осло подписано"
 oslo_accords.30.d:0 "Израиль и Палестина приняли Декларацию принципов. Ожидается, что Соединенные Штаты поддержат новый мирный процесс и помогут сохранить временные рамки."
 oslo_accords.30.f:0 "Появилась дипломатическая возможность, но для этого потребуются гаранты, деньги, давление и терпение."
 oslo_accords.30.a:0 "Мониторинг процесса."

 oslo_accords.31.t:0 "Соглашение в Осло провалилось"
 oslo_accords.31.d:0 "Декларация принципов была отклонена. Дипломатическая церемония открытия завершилась до того, как были созданы временные рамки."
 oslo_accords.31.f:0 "Без взаимного согласия внешнее посредничество не может осуществлять процесс в одиночку."
 oslo_accords.31.a:0 "Отказ от посредничества."

 oslo_accords.32.t:0 "Подписано соглашение Осло II"
 oslo_accords.32.d:0 "Израиль и Палестина приняли Временное соглашение, расширив палестинское самоуправление и установив следующий этап процесса Осло."
 oslo_accords.32.f:0 "Соглашение имеет дипломатический успех, но его карту разделенной власти может оказаться трудно администрировать."
 oslo_accords.32.a:0 "Поддержка осуществления."

 oslo_accords.33.t:0 "Соглашение Осло II провалилось"
 oslo_accords.33.d:0 "Предложенное Временное соглашение было отклонено. Процесс в Осло остается незавершенным, а территориально-административные рамки в настоящее время неопределенны."
 oslo_accords.33.f:0 "Первого шага было недостаточно, чтобы гарантировать второй."
 oslo_accords.33.a:0 "Процесс застопорился."

 oslo_i_proposal_sent_tt:0 "Израиль предлагает соглашение Осло I с Палестиной. Договор не вступит в силу, если Палестина не примет его."
 oslo_i_israel_delay_tt:0 "Израиль отложил это предложение. Мирный процесс застопорился, и напряженность возросла."
 oslo_i_palestine_accept_tt:0 "Палестина принимает Осло I: Палестина становится независимой, отношения улучшаются, и Осло II будет предложено 720 дней спустя."
 oslo_i_palestine_reject_tt:0 "Палестина отвергает Осло I: последствия договора не имеют места, а мирный процесс застопорился."
 oslo_ii_proposal_sent_tt:0 "Израиль предложил Палестине временное соглашение Осло II. Договор не вступит в силу, если Палестина не примет его."
 oslo_ii_israel_delay_tt:0 "Израиль задерживает предложение Осло II. Дополнительные киоски для передислокации."
 oslo_ii_palestine_accept_tt:0 "Палестина принимает Осло II: применяется расширенное самоуправление, совместные меры безопасности и эффект заполнителя зоны А/В."
 oslo_ii_palestine_reject_tt:0 "Палестина отвергает Осло II: последствия Осло II не происходят, и промежуточный процесс застопорился."

 ip_temperature_increase_10_tt:0 "Температура в мирное время между Израилем и Палестиной повышается на #n 10#!."
 ip_temperature_increase_20_tt:0 "Температура в мирное время между Израилем и Палестиной повышается на #n 20#!."
 ip_temperature_decrease_15_tt:0 "Температура в мирное время между Израилем и Палестиной снижается на #p 15#!."
 ip_temperature_decrease_25_tt:0 "Температура в мирное время между Израилем и Палестиной снижается на #p 25#!."
 ip_negotiations_increase_25_tt:0 "Момент переговоров по мирному процессу увеличивается на #p 25#!."
 ip_negotiations_increase_35_tt:0 "Момент переговоров по мирному процессу увеличивается на #p 35#!."
 ip_negotiations_decrease_10_tt:0 "Момент переговоров по мирному процессу уменьшается на #n 10#!."
 ip_negotiations_decrease_20_tt:0 "Момент переговоров по мирному процессу уменьшается на #n 20#!."
 ip_security_coordination_increase_20_tt:0 "Координация безопасности увеличивается на #p 20#!."
 ip_international_pressure_decrease_10_tt:0 "Международное давление уменьшается на #p 10#!."

 oslo_usa_oslo_i_accepted_tt:0 "Мы получаем временный бонус за дипломатическую репутацию в качестве посредника в процессе Осло."
 oslo_usa_oslo_i_rejected_tt:0 "Мы переживаем временную дипломатическую неудачу после распада Осло I."
 oslo_usa_oslo_ii_accepted_tt:0 "Мы получаем более сильный временный дипломатический бонус за поддержку реализации Осло II."
 oslo_usa_oslo_ii_rejected_tt:0 "Мы переживаем временную дипломатическую неудачу после распада Осло II."

 oslo_us_broker:0 "Осло брокер"
 oslo_us_broker_desc:0 "Мы извлекаем дипломатическую выгоду из его поддержки процесса в Осло."

 oslo_us_failed_mediation:0 "Провал медиации в Осло"
