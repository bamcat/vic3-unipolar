l_russian:
#################### JE ####################
# The Internet

je_internet:0 "Интернет"
je_internet_reason:0 "Пришло время подключить нашу страну к интернету! Мы должны модернизировать нашу телекоммуникационную сеть, не ограничиваясь поддержкой простого телефонного трафика, и, наконец, познакомить наших граждан с чудесами Всемирной паутины!"

smd_tech.1.t:0 "[ROOT.GetCountry.GetName] Перейти в Интернет"
smd_tech.1.d:0 "На протяжении десятилетий наши коммуникации опирались на газеты, радио и телевидение. Но мир охватила тихая революция — огромная сеть взаимосвязанных компьютеров, известная как Интернет. Когда-то область ученых и военных исследователей, теперь она обещает изменить то, как наши граждане работают, учатся и соединяются."
smd_tech.1.f:0 "Диапазонный интернет: потому что ничто так не говорит о высоких технологиях, как крики и ожидание 5 минут, чтобы загрузить фотографию кошки."

smd_tech.1.a:0 "Возможно, другие технологии должны подключаться к Интернету!"
smd_tech.1.b:0 "Мы могли бы использовать интернет для контроля над общественным мнением."

government_run_wifi_modifier:0 "Вмешательство правительства в WiFi"

# Computer Science

je_computer_science:0 "Компьютерные науки"
je_computer_science_reason:0 "Компьютерные науки - это изучение того, как работают компьютеры, как их можно заставить решать проблемы и как мы можем использовать их эффективно и безопасно."

smd_tech.2.t:0 "Степени компьютерных наук"
smd_tech.2.d:0 "Представьте себе, что это наука о логическом мышлении и решении проблем, но с машинами, которые подчиняются каждой крошечной инструкции. Она абстрактна и практична, и она поддерживает почти все современные технологии вокруг нас, от смартфонов до самоуправляемых автомобилей."

# Pesticides

je_pesticides:0 "Гербициды"
je_pesticides_reason:0 "Пестициды — это вещества, которые используются для борьбы с вредителями. Они включают гербициды, инсектициды, нематициды, фунгициды и многие другие. Наиболее распространенными из них являются гербициды, на которые приходится около 50% всех пестицидов, используемых во всем мире. С этим новым изобретением мы столкнулись с обязанностью модернизировать наш сельскохозяйственный сектор, чтобы включить пестициды."

smd_tech.3.t:0 "Море мертвых вредителей"
smd_tech.3.d:0 "На протяжении тысячелетий насекомые и грызуны оставались неослабевающей угрозой для сельскохозяйственной деятельности человека. С недавним изобретением различных пищевых химикатов, которые отталкивают и убивают вредных насекомых, мы можем получить более обильный урожай, обеспечивая при этом большую продовольственную безопасность раз и навсегда!"

smd_tech.3.a:0 "Было бы лучше, если бы они нанесли меньше вреда окружающей среде."

# Globalization

je_globalization:0 "Глобализация"
je_globalization_reason:0 "Глобализация - это феномен конца 20-го века, определяемый большей взаимосвязанностью, свободным транзитом культуры, товаров, оружия и людей, каждый из которых вызван большими инициативами свободной торговли по всему миру."

je_asian_economic_reform: "Экономическая реформа"
je_asian_economic_reform_reason: "Китай и Индия уже давно связаны экономическими ограничениями. Мировая экономика стремительно движется к интеграции и свободной торговле. Устранив устаревшие ограничения, мы можем начать беспрецедентный рост. До тех пор наши рынки остаются ограниченными."

asian_economy_restrictions: "Экономические ограничения"
asian_economy_restrictions_desc: "Контролируемая государством неэффективность и протекционистские барьеры замедляют торговлю, снижая конкурентоспособность и международный доступ."

booming_trade_economy: "Бум торговой экономики"
booming_trade_economy_desc: "С снятием ограничений, иностранные и внутренние рынки процветают, что приводит к большему процветанию."

asia_reform.1.t: "Рынки открываются"
asia_reform.1.d: "Реформы были проведены, а ограничительная торговая политика отменена. Китай и Индия сейчас находятся на переднем крае экономической глобализации."
asia_reform.1.f: "Мы должны открыть наши рынки, потому что изоляция больше не является устойчивой."
asia_reform.1.a: "Начинается новая эра торговли."

# Starship

je_starships:0 "Звездолеты"
je_starships_reason:0 "Изобретение многоразовой ракеты быстро подтолкнуло к изобретению другого типа космических аппаратов, звездолета. Способный эффективно преодолевать межпланетные барьеры, приземляться на Марс и возвращаться на Землю, сохраняя при этом стабильное здоровье астронавтов, это революционная новая конструкция, которая заслуживает нашего признания."

# coming soon

