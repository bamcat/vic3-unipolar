rwandan_genocide: "Геноцид тутси"

je_rwandan_genocide: "Геноцид в Руанде"
je_rwandan_genocide_reason: "В апреле 1994 года был сбит самолет с президентами Руанды и Бурунди, вызвав один из самых ужасных геноцидов конца 20-го века.\n\n Экстремистские ополченцы при поддержке правительства начали массовые убийства, направленные против меньшинства тутси и умеренных хуту. Международная осведомленность росла медленно, но по мере распространения массовых убийств призывы к вмешательству усиливались.\n\n"

je_rwandan_genocide_progress_tt: "Прогресс увеличивается с течением времени и в результате насильственных событий. Вмешательство может снизить прогресс."

rwandan_genocide.1.t: "Геноцид начинается"
rwandan_genocide.1.d: "После убийства президента Хабиаримана экстремистские силы начали широкомасштабные убийства, направленные против меньшинства тутси."
rwandan_genocide.1.a: "Начинается темная глава."

rwandan_genocide.2.t: "Массовые убийства продолжаются"
rwandan_genocide.2.d: "В докладах из сельских районов описываются целые общины, уничтоженные в результате скоординированных нападений."
rwandan_genocide.2.a: "Насилие обостряется."

rwandan_genocide.3.t: "Международный протест"
rwandan_genocide.3.d: "Графические изображения и учетные записи выживших достигли мировых средств массовой информации, что вызвало срочные призывы к действиям ООН."
rwandan_genocide.3.a: "Запросить миротворцев."
rwandan_genocide.3.b: "Ничего не делай."

rwandan_genocide_request_peacekeepers_tt: "Это приведет к голосованию в ООН по вопросу о размещении миротворцев в Руанде."
rwandan_genocide_community_angry: "Это разозлит международное сообщество."

rwandan_genocide.4.t: "Голосование за миротворчество"
rwandan_genocide.4.d: "Совет Безопасности ООН созвал голосование по вопросу о направлении миротворческих сил в Руанду."

