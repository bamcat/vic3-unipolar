 je_kurdistan_war_status:0 "Война находится в своей партизанской фазе. Обе стороны пытаются создать достаточный импульс для решающей кампании."
 je_kurdistan_war_status_final_phase:0 "Война вступила в решающую фазу. Одна из сторон взяла на себя обязательство провести заключительную кампанию."
