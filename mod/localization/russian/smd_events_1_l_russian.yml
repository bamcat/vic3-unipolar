# canada

canada.1.t:0 "Шоссе Слез"
canada.1.d:0 "Шоссе 16 Британской Колумбии, обычно называемое Шоссе Слез, стало символом трагедии и несправедливости в Канаде, где десятки коренных женщин и девочек пропали без вести или были убиты с 1970-х годов. Находясь между принцем Джорджем и принцем Рупертом, в отдаленном районе долгое время не хватало общественного транспорта, что вынуждало многих путешествовать автостопом."
canada.1.f:0 "Они (власти) положили ее в стальной ящик. Это должен был быть закрытый гроб из-за того, как они нашли ее...». Он делает паузу, чтобы сдержать слезы, прежде чем заикаться словами: «Она... ухудшилась."

canada.1.a:0 "К сожалению, есть гораздо более насущные проблемы, стоящие перед этой страной."
canada.1.b:0 "Нам должно быть стыдно!"

je_indigenous_rights: "Права коренных народов"
je_indigenous_rights_reason: "Вопрос о правах коренных народов остается одним из наиболее значимых нерешенных вопросов во внутренней политике [ROOT.GetCountry.GetName]. Поколения лишений, принудительной ассимиляции и нарушенных договорных обязательств привели к глубокому структурному неравенству между коренным и некоренным населением. Прекращение этого разрыва потребует устойчивой политической воли и столкнется с сопротивлением со стороны тех, кто извлекает выгоду из статус-кво."


 indigenous_je_status_usa_tt: "По всей территории Соединенных Штатов более 570 федерально признанных племен занимают резервации, которые представляют собой часть их наследственных территорий. Ожидаемая продолжительность жизни, уровень образования и доход от резервирования значительно отстают от средних национальных показателей. Общепризнано, что федеральная доверительная ответственность — юридическое обязательство защищать племенной суверенитет и благосостояние — неадекватно выполняется."

 indigenous_je_status_can_tt: "Народы первых наций Канады, метисов и инуитов насчитывают более одного миллиона человек, живущих в системе резервов, установленной индийским законом 1876 года. Индийская система школ-интернатов, которая насильно забирала детей из их семей, чтобы «ассимилировать» их, действовала до 1996 года. Межпоколенческая травма этой системы продолжает формировать общины коренных народов и сегодня."

 indigenous_je_status_nzl_tt: "Народ маори — tangata whenua, народ земли — подписал Договор Вайтанги с британской короной в 1840 году. Этот договор никогда не был полностью соблюден. Конфискация земли в 19-м веке лишила общины маори большей части их территории, и новозеландцы продолжают сталкиваться со значительными различиями в уровне здоровья, доходах и тюремном заключении. Трибунал Вайтанги, созданный в 1975 году, продолжает рассматривать иски против Короны."

 indigenous_je_status_ast_tt: "Коренные народы Австралии и народы островов Торресова пролива являются старейшими в мире непрерывными культурами и одними из самых неблагополучных. «Украденные поколения» — дети-аборигены, насильственно изгнанные из своих семей в рамках государственной политики ассимиляции, которая продолжалась до 1970-х годов, — оставили раны, которые не зажили. Ожидаемая продолжительность жизни коренных австралийцев остается на десять лет ниже среднего показателя по стране. Решение Мабо 1992 года впервые признало родной титул, но его реализация была неравномерной."

 # indigenous.1 — Land Rights
 indigenous.1.t: "Права коренных народов на землю"
 indigenous.1.d_usa: "Коалиция племенных наций подала официальный иск, утверждая права на значительный участок федеральной земли, утверждая, что территория была незаконно взята в нарушение договорных обязательств. Претензия привлекла значительное освещение в средствах массовой информации и юридическую поддержку. Суды наблюдают за этим, как и более широкое сообщество коренных американцев."
 indigenous.1.d_can: "Группа Первых Наций утвердила право аборигенов на значительную часть земли Короны, утверждая, что ни один действительный договор не аннулировал их права на территорию. Иск поступил в федеральный суд. Эксперты по правовым вопросам отмечают, что канадская юриспруденция в отношении прав аборигенов значительно развивается, и ответ правительства создаст важный прецедент."
 indigenous.1.d_nzl: "Трибунал Вайтанги опубликовал доклад, в котором говорится, что Корона не выполнила Договор Вайтанги в управлении оспариваемой землей. Выводы не являются юридически обязательными, но имеют значительный моральный и политический вес. Общины маори призывают правительство действовать в соответствии с рекомендациями без дальнейших проволочек."
 indigenous.1.d_ast: "Федеральный суд поддержал иск о праве собственности на земельный участок, который в настоящее время сдается в аренду пастырским интересам. Постановление требует от правительства вести переговоры с группой заявителей о правах землепользования. Пасторальные отраслевые группы лоббируют правительство, чтобы обжаловать это решение."
 indigenous.1.f: "Земля всегда была их. Вопрос в том, скажет ли это закон."
 indigenous.1.a: "Переговоры об урегулировании — выполнить требование"
 indigenous.1.b: "Оспорить иск в суде — наша позиция оправдана"

 # indigenous.2 — Treaty Obligations
 indigenous.2.t: "Обязательства по договорам, подлежащим пересмотру"
 indigenous.2.d_usa: "В докладе Конгресса говорится, что федеральное правительство не выполняет свои договорные обязательства перед десятками племенных стран, недофинансируя здравоохранение, образование и инфраструктуру на миллиарды долларов ежегодно. Лидеры племен призывают к официальному пересмотру федеральной ответственности за доверие и обязательству закрыть дефицит финансирования."
 indigenous.2.d_can: "Парламентский комитет представил доклад с подробным описанием хронического недофинансирования общин первых наций в связи с обязательствами по историческим договорам. В докладе определены конкретные недостатки в жилье, водной инфраструктуре и образовании. Правительство должно решить, как реагировать, и выделять ли ресурсы, необходимые для того, чтобы договоры были целостными."
 indigenous.2.d_nzl: "Лидеры маори представили официальный меморандум правительству, утверждая, что ряд недавних политических решений нарушает принципы Договора Вайтанги. В записке приводятся конкретные нарушения в области управления ресурсами, здравоохранения и финансирования образования, а также содержится призыв к всестороннему обзору соблюдения договора во всех государственных ведомствах."
 indigenous.2.d_ast: "Организация по правам коренных народов опубликовала подробный анализ разрыва между заявленными обязательствами правительства перед общинами аборигенов и фактическим распределением ресурсов. В докладе делается вывод о том, что договорные и расчетные обязательства выполняются на уровне менее 60 центов за доллар. Руководители общин требуют официального аудита и обязательного соблюдения всех требований."
 indigenous.2.f: "Обещание, написанное на бумаге, так же хорошо, как и желание сохранить его."
 indigenous.2.a: "Полностью выполнять свои обязательства — выделять ресурсы"
 indigenous.2.b: "Признать недостатки — работа над постепенным улучшением"

 # indigenous.3 — Cultural Preservation
 indigenous.3.t: "Угроза языкам коренных народов"
 indigenous.3.d: "Лингвисты опубликовали доклад, предупреждающий, что десятки языков коренных народов в [ROOT.GetCountry.GetName] находятся на грани исчезновения. Во многих случаях остается лишь несколько свободно говорящих — все пожилые люди. После того, как эти языки потеряны, они не могут быть восстановлены. С ними идут устные истории, экологические знания, правовые традиции и способы понимания мира, которые больше нигде не существуют.\n\n Вопрос в том, готово ли правительство инвестировать ресурсы, необходимые для того, чтобы изменить эту траекторию, или оно будет наблюдать за тем, как история исчезнет в тишине."
 indigenous.3.f: "Язык – это мир. Его смерть необратима."
 indigenous.3.a: "Программа возрождения языков коренных народов"
 indigenous.3.b: "Это вопрос общин, а не правительства."

 # indigenous.4 — Health Crisis
 indigenous.4.t: "Кризис здоровья коренных народов"
 indigenous.4.d: "В национальном докладе о здравоохранении подчеркивается резкий разрыв между показателями здоровья коренных и некоренных народов в [ROOT.GetCountry.GetName]. Продолжительность жизни значительно ниже. Показатели диабета, наркомании и психических заболеваний, многие из которых коренятся в травмах между поколениями, значительно выше. Младенческая смертность в резервах и в отдаленных общинах в несколько раз превышает средний показатель по стране.\n\n Медицинское учреждение призывает к созданию надлежащих с точки зрения культуры и адекватно финансируемых медицинских услуг для коренных народов. Цена бездействия, измеряемая в жизнях, существенна."
 indigenous.4.f: "Неравенство в здравоохранении – это политический выбор."
 indigenous.4.a: "Инвестируйте в специализированные программы здравоохранения коренных народов"
 indigenous.4.b: "Существующая система здравоохранения доступна всем гражданам одинаково."

 # indigenous.5 — Reservation Conditions (USA/CAN)
 indigenous.5.t: "Условия в резервах"
 indigenous.5.d_usa: "В докладе федерального генерального инспектора было установлено, что условия жизни во многих резервациях коренных американцев значительно ниже национальных стандартов. Жилье переполнено и обветшало. Доступ к чистой питьевой воде ненадежен в десятках резерваций. Уровень безработицы во многих общинах превышает 50%. В докладе ситуация названа «кризисом федерального пренебрежения» и рекомендуется существенно увеличить финансирование Бюро по делам Индии."
 indigenous.5.d_can: "Правительственный аудит показал, что сотни сообществ первых наций находятся под рекомендацией кипящей воды. Жилье во многих заповедниках сильно переполнено. Услуги по охране психического здоровья в основном отсутствуют. Аудит пришел к выводу, что федеральное правительство тратит примерно на 30% меньше на душу населения на общины первых наций, чем на других канадцев за эквивалентные услуги."
 indigenous.5.f: "Резервная система была построена для сдерживания, а не для поддержки."
 indigenous.5.a: "Увеличение федерального финансирования резервных сообществ"
 indigenous.5.b: "Поддерживать текущий уровень финансирования — бюджет не позволяет больше"

 # indigenous.6 — Reservation Economic Development (USA/CAN)
 indigenous.6.t: "Экономическое развитие на землях коренных народов"
 indigenous.6.d_usa: "Несколько племенных стран предложили инициативы по экономическому развитию, включая игровые операции, партнерства по добыче ресурсов и туристические предприятия, которые принесут значительный доход сообществам резервирования. Предложения требуют федерального одобрения и сталкиваются с противодействием со стороны соседних правительств штатов и коммерческих интересов, которые рассматривают племенные предприятия как конкуренцию. Лидеры племен утверждают, что экономическая самодостаточность является единственным устойчивым путем выхода из бедности."
 indigenous.6.d_can: "Общины первых наций в богатых ресурсами районах стремятся вести переговоры о соглашениях о разделе доходов для добычи ресурсов на своих традиционных территориях или вблизи них. Несколько общин также предложили совместные предприятия с провинциальными правительствами для развития лесного хозяйства и энергетики. Предложения предлагают путь к экономической самодостаточности, но требуют, чтобы правительство разделило контроль и доходы, которые оно исторически утверждало полностью."
 indigenous.6.f: "Суверенитет без экономической базы - пустое слово."
 indigenous.6.a: "Поддержка экономического развития коренных народов — утверждение предложений"
 indigenous.6.b: "Приоритетность существующих ресурсных интересов — эти предложения создают сложности"

 # indigenous.20 — Ipperwash
 indigenous.20.t: "Кризис Ipperwash"
 indigenous.20.d: "Протестующие в Оджибве заняли провинциальный парк Ипперваш в Онтарио, утверждая, что земля, включая священное захоронение, была незаконно изъята у их общины во время Второй мировой войны для использования в качестве военной базы и никогда не возвращалась, как было обещано. Оккупация носит мирный характер, но провинциальная полиция Онтарио установила периметр и запрашивает указания о том, как действовать. Ситуация напряженная. Среди протестующих есть оружие. Есть также старейшины, семьи и законная жалоба, которая не рассматривалась в течение пятидесяти лет."
 indigenous.20.f: "Был взят могильник. Его так и не вернули."
 indigenous.20.a: "Приказать ОПП разогнать оккупацию — восстановить порядок"
 indigenous.20.b: "Направить ОПП в отставку — договориться о мирном урегулировании"

 # indigenous.21 — Last residential school
 indigenous.21.t: "Закрывается последняя жилая школа"
 indigenous.21.d: "Жилая школа Гордона в Пенничи, Саскачеван, закрыла свои двери — последняя федеральная индийская жилая школа в Канаде. С 1874 года система школ-интернатов насильно вывела примерно 150 000 детей аборигенов из их семей и поместила их в учреждения, где язык, культура и идентичность коренных народов активно подавлялись, а физическое и сексуальное насилие было широко распространено. Закрытие последней школы не является решением. Это признание того, что глава преднамеренного культурного разрушения наконец официально закончилась. Оставшиеся в живых продолжают жить со своими последствиями."
 indigenous.21.f: "Последняя школа была закрыта. Раны, которые он нанес, не были."
 indigenous.21.a: "Темная глава в истории Канады закончилась"

 # indigenous.22 — TRC
 indigenous.22.t: "Доклад Комиссии по установлению истины и примирению"
 indigenous.22.d: "Комиссия по установлению истины и примирению Канады опубликовала свой окончательный доклад, который стал кульминацией шести лет свидетельских показаний более 6500 выживших в индийской системе школ-интернатов. В докладе задокументированы систематические злоупотребления, культурный геноцид и травма для многих поколений, вызванная политикой принудительной ассимиляции. Комиссия выпустила 94 призыва к действиям — конкретные рекомендации по вопросам благосостояния детей, образования, языка, здравоохранения и правосудия. В докладе используется термин «культурный геноцид» для описания того, что было сделано. Теперь правительство должно решить, насколько серьезно относиться к работе Комиссии."
 indigenous.22.f: "Истина – это первый шаг. Примирение — это дело поколений."
 indigenous.22.a: "Формально примите призывы к действию — примите обязательство о примирении"
 indigenous.22.b: "Признайте доклад — внимательно изучите призывы к действию"

 indigenous.10.t: "Шаг к справедливости"
 indigenous.10.d_usa: "Принятие законодательства о позитивных действиях в Соединенных Штатах знаменует собой значительный шаг к устранению структурного неравенства, с которым сталкиваются общины коренных американцев, наряду с другими исторически маргинализированными группами. Это не является решением проблемы полного отчуждения коренных народов, но представляет собой осмысленную приверженность ликвидации пробелов, которые сохранялись на протяжении поколений."
 indigenous.10.d_can: "Канада приняла закон о позитивных действиях — официальное признание того, что системное неравенство требует системных средств правовой защиты. Для сообществ первых наций, метисов и инуитов эта мера является частью гораздо большей головоломки. Но это сигнализирует о политической готовности серьезно отнестись к вопросу о невыгодном положении коренных народов и поддержать эту готовность политикой."
 indigenous.10.d_nzl: "Новая Зеландия приняла законодательство о позитивных действиях, признавая, что неравенство между маори и пакехой новозеландцев является результатом не индивидуальной неудачи, а исторической политики. Для общин маори это важный шаг, хотя Трибунал Вайтанги отмечает, что многие из его рекомендаций остаются невыполненными."
 indigenous.10.d_ast: "Австралия приняла законодательство о позитивных действиях — значительный сдвиг в политике, который признает структурный характер неблагоприятного положения коренных народов. Для общин аборигенов и жителей островов Торресова пролива он представляет собой прогресс. Разрыв в продолжительности жизни, показателях здоровья и уровне образования не закроется в одночасье, но направление путешествий изменилось."
 indigenous.10.f: "Путь к правосудию долгий. Это шаг вперед."
 indigenous.10.a: "Это правильный поступок."

 indigenous_land_settlement: "Урегулирование земельных прав"
 indigenous_land_settlement_desc: "Переговорное урегулирование земельных прав улучшило отношения с общинами коренных народов и повысило легитимность правительства."

 indigenous_land_contested: "Земельные права оспариваются"
 indigenous_land_contested_desc: "Решение оспорить права коренных народов на землю в суде усилило напряженность в отношениях с коренными общинами."

 indigenous_treaty_honoured: "Заслуженные обязательства по договору"
 indigenous_treaty_honoured_desc: "Полное соблюдение договорных обязательств укрепило легитимность и улучшило положение правительства в общинах коренных народов."

 indigenous_treaty_partial: "Договорные обязательства частично"
 indigenous_treaty_partial_desc: "Частичное соблюдение договорных обязательств не удовлетворяет защитников прав коренных народов."

 indigenous_cultural_investment: "Культурные инвестиции коренных народов"
 indigenous_cultural_investment_desc: "Государственное финансирование языковых и культурных программ коренных народов поддерживает устойчивость общин."

 indigenous_health_investment: "Программы здравоохранения коренных народов"
 indigenous_health_investment_desc: "Специальные программы здравоохранения для коренных народов улучшают результаты в области здравоохранения в общинах коренных народов."

 indigenous_health_cost: "Стоимость программы здравоохранения коренных народов"
 indigenous_health_cost_desc: "Новые программы здравоохранения для коренных народов предъявляют дополнительные требования к бюджету здравоохранения."

 indigenous_health_neglect: "Здравоохранение коренных народов"
 indigenous_health_neglect_desc: "Неспособность устранить неравенство в отношении здоровья коренных народов вызывает постоянное недовольство."

 indigenous_reservation_investment: "Резервные инвестиции сообщества"
 indigenous_reservation_investment_desc: "Увеличение федерального финансирования резервных сообществ начинает сокращать разрыв в уровне жизни."

 indigenous_reservation_cost: "Затраты на резервное финансирование"
 indigenous_reservation_cost_desc: "Увеличение резервного финансирования сообщества напрягает федеральный бюджет."

 indigenous_reservation_neglect: "Резервное сообщество забывает"
 indigenous_reservation_neglect_desc: "Хроническое недофинансирование резервных сообществ продолжает вызывать недовольство и международную критику."

 indigenous_economic_development: "Экономическое развитие коренных народов"
 indigenous_economic_development_desc: "Поддержка инициатив в области экономического развития коренных народов приносит доход общинам и повышает самодостаточность."

 indigenous_economic_blocked: "Экономическое развитие коренных народов заблокировано"
 indigenous_economic_blocked_desc: "Отказ от предложений по экономическому развитию коренных народов нанес ущерб отношениям с общинами коренных народов."

 ipperwash_crackdown: "Ипперваш Крэкдаун"
 ipperwash_crackdown_desc: "Насильственное разгон протестующих коренных народов в Ипперваше вызвало значительную внутреннюю и международную критику."

 ipperwash_negotiation: "Ипперваш решен мирно"
 ipperwash_negotiation_desc: "Мирное разрешение противостояния Ипперваш повысило доверие правительства к коренным общинам."

 indigenous_residential_school_closed: "Последняя жилая школа закрыта"
 indigenous_residential_school_closed_desc: "Закрытие последней индийской школы-интерната знаменует собой формальный конец политики культурного разрушения."

 trc_accepted: "Признание истины и примирение"
 trc_accepted_desc: "Официальное принятие Канадой Призывов к действиям Комиссии по установлению истины и примирению представляет собой значительную приверженность решению проблемы наследия жилых школ."

 trc_enactment_bonus: "Мандат на примирение"
 trc_enactment_bonus_desc: "Активизация процесса установления истины и примирения облегчает принятие законодательства, касающегося прав коренных народов."

 trc_partial: "TRC признали"
 trc_partial_desc: "Правительство признало доклад Комиссии по установлению истины и примирению, но не взяло на себя обязательства по выполнению ее Призывов к действию."

 indigenous_rights_progress: "Законодательство о правах коренных народов"
 indigenous_rights_progress_desc: "Принятие законодательства о позитивных действиях представляет собой значительную приверженность решению проблем коренных народов. Разрыв не закроется в одночасье, но направление политики изменилось."


# japan

japan.1.t: "Ядерная катастрофа на Фукусиме"
japan.1.d: "После мощного землетрясения и цунами АЭС Фукусима Дайичи потерпела катастрофические сбои, выбросив радиоактивный материал в окружающую среду. Катастрофа потрясла мир, вызвав глобальные дебаты о ядерной безопасности и готовности к чрезвычайным ситуациям."
japan.1.a: "Национальная трагедия и глобальный призыв к пробуждению."

fukushima_nuclear_disaster: "Ядерная катастрофа на Фукусиме"
fukushima_nuclear_disaster_desc: "Серьезный ущерб, нанесенный заводу в Фукусиме, привел к радиоактивному загрязнению, разрушению инфраструктуры и долгосрочным усилиям по восстановлению страны."

# south sudan

southsudan.1.t: "Южносуданский референдум о независимости"
southsudan.1.d: "После десятилетий конфликта и решающего референдума южные штаты Судана отделились, чтобы сформировать Республику Южный Судан. Центральное правительство в Хартуме стоит перед судьбоносным выбором: принять новую нацию или пойти на войну, чтобы вернуть ее."
southsudan.1.a: "Мы не позволим разделить Судан."
southsudan.1.b: "Отпустите их ради мира."

# russia

first_chechen_war: "Первая чеченская война"

russia_parliament_resisting: "Парламент сопротивляется"
russia_military_loyality: "Военное участие"
russia_parliamentary_support: "Парламентская поддержка"
russia_constitution_crisis_resolved_mod: "Кризис предотвращен"

je_russian_constitutional_crisis: "Конституционный кризис в России"
je_russian_constitutional_crisis_reason: "1993 год поставил Россию на грань политического краха.\n\n Президент Борис Ельцин, стремясь консолидировать исполнительную власть, приказал распустить российский парламент, обвинив его членов в препятствовании реформам и сопротивлении демократизации. Парламент, в свою очередь, объявил указ Ельцина неконституционным, отказавшись распустить и сплотить сторонников к его делу.\n\n В течение нескольких недель напряженность нарастает, поскольку конкурирующие фракции получают поддержку различных элементов вооруженных сил, сил безопасности и широкой общественности. Правительственный аппарат ломается, лояльность к исполнительной или законодательной ветви власти определяет судьбу Российской Федерации.\n\n Эта конфронтация — больше, чем политический спор, это битва за саму природу управления Россией в постсоветскую эпоху. Если кризис выйдет из-под контроля, гражданское насилие в центре Москвы не только возможно, но и неизбежно."

je_russia_wild_nineties: "Дикие девяностые"
je_russia_wild_nineties_reason: "«Дикие девяностые» — термин с отрицательной оценочной коннотацией, характеризующий период переходного периода после распада Советского Союза и образования Российской Федерации в 1990-х годах. \n\n Бурный переход России от советской власти к капиталистической демократии вызвал волну нестабильности, коррупции и насилия. Ранние постсоветские годы были отмечены экономическим крахом, ростом олигархов, политическими разборками и всплеском организованной преступности. От обстрелов парламента до приватизационных скандалов каждый месяц, кажется, приносит новые потрясения. Страна балансирует между реформами и хаосом, и терпение народа истощается."

rus_events.0.t: "Конституционный кризис 1993 года в России начался"
rus_events.0.d: "Президент Борис Ельцин издал указ о роспуске российского парламента, обвинив его в препятствовании демократическим реформам и угрозе стабильности Федерации. Парламент объявил этот шаг неконституционным, призвав военных и граждан к сопротивлению.\n\n Москва готовится к конфронтации, поскольку конкурирующие фракции сплачивают своих сторонников. Судьба хрупкой российской демократии висит на волоске."
rus_events.0.a: "Нация затаила дыхание."

1993_russian_crisis_tt: "Кризис завершился"
rus_events.1.t: "Конституционный кризис"
rus_events.1.d: "Президент Ельцин объявил о роспуске парламента, но законодатели отказываются уходить в отставку, забаррикадировавшись в Белом доме. Напряженность быстро нарастает."
rus_events.1.a: "На стороне президента"
rus_events.1.a.tt: "Военные будут поддерживать исполнительную власть."
rus_events.1.b: "Поддержать парламент"
rus_events.1.b.tt: "Мы будем защищать законодательную власть."

rus_events.2.t: "Военные поддерживают президента"
rus_events.2.d: "Вооруженные силы взяли под контроль улицы, обстреливая здание парламента и обеспечив власть Ельцина."
rus_events.2.a: "Кризис закончился."

rus_events.3.t: "Парламентская победа"
rus_events.3.d: "Несмотря на давление со стороны исполнительной власти, парламент сплотил народную поддержку и сохранил свою власть."
rus_events.3.a: "Кризис закончился."

rus_events.4.t: "Штурм Белого дома"
rus_events.4.d: "Москва в хаосе. Пропрезидентские войска окружили российский Белый дом, где находится руководство парламента, и открыли огонь из танков и стрелкового оружия. Дым поднимается с верхних этажей, когда здание поджигается. Окончательное сопротивление рушится, когда военные силы захватывают контроль, что знаменует собой конец противостояния, но ценой жизней и политической невиновности страны."
rus_events.4.a: "Порядок восстановлен — на данный момент."

# chechnya

je_first_chechen_war_reason: "Первая чеченская война началась в конце 1994 года, когда Российская Федерация попыталась восстановить контроль над отколовшейся Чеченской Республикой Ичкерия. Конфликт дорого обойдется в жизни и ресурсах, с жестокими городскими боями в Грозном и широкомасштабными разрушениями на Северном Кавказе.\n\n Окончание войны без явной победы может нанести ущерб авторитету правительства, но продолжение борьбы может привести к длительной нестабильности."
je_first_chechen_war: "Чеченская война"
chechen_war_resolved: "Чеченская война решена"

chechen_events.1.t: "Война в Чечне"
chechen_events.1.d: "Российские войска вошли в Чечню, чтобы восстановить федеральный контроль, начав, как ожидается, быструю операцию. Однако горная местность и решительное местное сопротивление могли превратить это в затяжной конфликт."
chechen_events.1.a: "Мы восстановим порядок."

chechen_events.2.t: "Нападение на Грозный"
chechen_events.2.d: "Битва при Грозном началась с попытки российских войск захватить чеченскую столицу. Бои интенсивные, с большими потерями с обеих сторон."
chechen_events.2.a: "Нажмите вперед, независимо от стоимости."

chechen_events.3.t: "Мирные переговоры в Чечне"
chechen_events.3.d: "После нескольких месяцев боевых действий усталость от войны выросла с обеих сторон. На стол переговоров было вынесено предложение о прекращении огня, в котором предлагалось положить конец кровопролитию."
chechen_events.3.a: "Принять мир и вывести войска."
chechen_events.3.b: "Продолжайте войну до победы."

# haiti

uphold_democracy: "Операция «Поддержи демократию»"

haiti_events.1.t: "Операция «Поддержи демократию»"
haiti_events.1.d: "В сентябре 1994 Соединенные Штаты начали военную интервенцию в Гаити, чтобы восстановить демократически избранного президента Жана-Бертрана Аристида, свергнутого в перевороте 1991 года. Силы США при поддержке международных союзников обеспечили безопасность ключевых районов, проложив путь для возвращения Аристида."
haiti_events.1.a: "Развернуть силы для восстановления демократии."
haiti_events.1.b: "Мы будем готовиться к иностранным войскам."

haiti_events.2.t: "Прибыли иностранные войска"
haiti_events.2.d: "Американские войска высадились на Гаити, взяв под контроль стратегические объекты. Вмешательство оправдано как средство восстановления демократического управления, но оно поднимает вопросы о суверенитете и иностранном влиянии."
haiti_events.2.a: "Мы должны сотрудничать, чтобы избежать кровопролития."

je_haiti_political_crisis: "Политический кризис в Гаити"
je_haiti_political_crisis_reason: "После демократических выборов президента Жана-Бертрана Аристида в 1990 году Гаити испытала краткий момент оптимизма. Однако хрупкая стабильность была разрушена в сентябре 1991 года, когда военный переворот сверг Аристида, погрузив страну в политический хаос. Военный режим столкнулся с международным осуждением, поскольку нарушения прав человека и политические репрессии стали широко распространенными. Экономические санкции, введенные Организацией Объединенных Наций и Организацией американских государств, серьезно повлияли на и без того испытывающую трудности экономику Гаити.\n\n В течение 1992 и 1993 годов переговоры между военной хунтой и сторонниками Аристида зашли в тупик, а насилие в отношении политических оппонентов и населения в целом усилилось. Попытки Миссии Организации Объединенных Наций в Гаити (МООНГ) восстановить демократическое управление встречались с препятствиями.\n\n К 1994 году растущее давление со стороны международного сообщества, особенно Соединенных Штатов, подготовило почву для прямого вмешательства. Операция «Поддержка демократии», возглавляемая американскими войсками в сентябре 1994 года, была направлена на восстановление Аристида к власти и прекращение правления хунты."

# quebec
# [GetPlayer.MakeScope.GetVariable('quebec_happiness_var').GetValue|0]

je_quebec_happiness: "Ситуация в Квебеке"
je_quebec_happiness_reason: "Статус Квебека в Канаде был спорным вопросом на протяжении десятилетий. Отличительная культура, язык и история Квебека часто подпитывали дебаты об автономии и независимости. В годы, предшествовавшие референдуму в Квебеке в 1995 году, отношения между Квебеком и федеральным правительством Канады были отмечены напряженностью, переговорами и случайным всплеском националистических настроений. Провинция Квебек с ее уникальным франкоязычным большинством, отличной культурной идентичностью и долгой историей защиты автономии периодически стремилась переопределить свое место в канадской федерации. Некоторые квебекцы хотят полной независимости, другие хотят усиления провинциальных полномочий, в то время как многие все еще поддерживают сохранение единой Канады.\n\n Как премьер-министр, ваша задача - ориентироваться в этой деликатной ситуации. Вы должны сбалансировать национальное единство с уважением к культурным и политическим устремлениям Квебека. Каждое ваше решение, будь то по языковым законам, экономической политике или культурным инвестициям, будет влиять на счастье населения Квебека. Если уровень счастья в Квебеке останется высоким, референдум может закончиться голосованием за пребывание в Канаде. Но если недовольство станет слишком сильным, народ Квебека может проголосовать за независимость, навсегда изменив карту Северной Америки."
quebec_happiness_bar_desc: "Франко-канадское счастье"
quebec_happiness_monthly_tt: "Месячные перемены в Квебеке."
quebec_happiness_bar:0 "Поддержка независимости Квебека"
recently_pissed_quebec_off:0 "В последнее время Квебек не разозлился"

too_many_quebec_concessions: "Слишком много уступок; Квебекцы не впечатлены"
quebec_happiness_10: "#green Увеличивает #! Франко-канадское счастье на #green 5#! баллов"
quebec_happiness_minus_10: "#r Снижение #! Франко-канадское счастье по #r 5#! баллов"

quebec.6.t: "Самодовольство в Квебеке"
quebec.6.d: "С подавляющим удовлетворением Квебека федеральное правительство стало самодовольным. Оттава считает, что вопрос единства решен, но критики предупреждают, что такая самоуверенность может привести к пренебрежению другими важными вопросами."
quebec.6.a: "Табарнак!"

complacent_on_quebec: "Самодовольство в Квебеке"
complacent_on_quebec_desc: "С высокой поддержкой Квебека правительство стало самодовольным в своих переговорах и политическом внимании, что привело к растущей критике со стороны других фракций."
 
quebec_concessions_button: "Сделать уступки Квебеку"
quebec_concessions_button_desc: "Предлагайте политические и культурные уступки Квебеку, увеличивая их счастье."

quebec_ignore_button: "Игнорировать требования Квебека"
quebec_ignore_button_desc: "Откажитесь взаимодействовать с политическими требованиями Квебека, уменьшая их счастье."

quebec.1.t: "Напряжение в Квебеке"
quebec.1.d: "Политическая напряженность в Квебеке растет по мере того, как усиливаются дебаты по поводу автономии и языковых прав."
quebec.1.a: "Предложите гарантии Квебеку."
quebec.1.b: "Будьте тверды в национальном единстве."

quebec.2.t: "Квебекский референдум 1995 года"
quebec.2.d: "После многих лет дебатов Квебек голосует за то, оставаться ли частью Канады или стать независимым государством."
quebec.2.a: "Народ выбрал единство."
quebec.2.b: "Квебек проголосовал за независимость!"

quebec.3.t: "Споры на французском языке"
quebec.3.d: "Федеральное политическое предложение угрожает снизить статус французов в Квебеке, вызвав возмущение многих граждан."
quebec.3.a: "Защита французского языка любой ценой."
quebec.3.a.tt: "Счастье Квебека увеличится на #G +8#!."
quebec.3.b: "Поддерживайте текущую политику."
quebec.3.b.tt: "Счастье Квебека уменьшится на #R -5#!."
quebec.3.b.tt2: "Вам будет разрешено делать больше уступок."

quebec.4.t: "Федеральное финансирование сократилось до Квебека"
quebec.4.d: "Федеральное правительство сталкивается с бюджетным давлением, а финансирование Квебека для инфраструктуры и услуг находится на грани краха."
quebec.4.a: "Продолжайте с сокращениями."
quebec.4.a.tt: "Счастье Квебека уменьшится на #R -7#!."
quebec.4.b: "Меньше из Квебека."
quebec.4.b.tt: "Счастье Квебека уменьшится на #R -2#!."

quebec.5.t: "Культурный фестиваль Квебека"
quebec.5.d: "Массовое празднование культуры Квебека привлекает национальное и международное внимание, способствуя гордости и единству."
quebec.5.a: "Празднуйте и увеличивайте финансирование культуры."
quebec.5.a.tt: "Счастье Квебека увеличится на #G +10#!."
quebec.5.b: "Поздравляем организаторов, но дополнительного финансирования нет."
quebec.5.b.tt: "Счастье Квебека увеличится на #G +3#!."

# China

je_china_southern_tour: "Южный тур"
je_china_southern_tour_reason: "В начале 1992 года Дэн Сяопин отправился в свой знаменитый «Южный тур», отправившись в Шэньчжэнь, Чжухай, Гуанчжоу и Шанхай.\n\n Его выступления способствовали продолжению экономических реформ, либерализации рынка и расширению особых экономических зон. Тур оживил реформистский импульс в Коммунистической партии и заверил как внутренних, так и иностранных инвесторов, что «реформы и открытость» Китая будут продолжаться."
je_china_southern_tour_progress_tt: "Прогресс увеличивается с каждым месяцем и благодаря определенным событиям."

southern_tour_reforms: "Южный тур Экономическое наследие"
je_china_southern_tour_complete: "Дэн Сяопин завершил свой тур"
china_southern_tour.1.t: "Южный тур Дэн Сяопина"
china_southern_tour.1.d: "Дэн Сяопин начал широко разрекламированный тур по южному Китаю, посетив ключевые специальные экономические зоны и призвав чиновников продолжить реформы."
china_southern_tour.1.a: "Путешествие начинается."

china_southern_tour.2.t: "Призывы к рыночной реформе"
china_southern_tour.2.d: "В выступлениях во время Южного тура Дэн Сяопин призвал к возобновлению приверженности рыночным реформам."
china_southern_tour.2.a: "Поддержите толчок."
china_southern_tour.2.b: "Поддерживайте текущий темп."

china_southern_tour.3.t: "Внутрипартийное сопротивление"
china_southern_tour.3.d: "Консервативные элементы внутри партии выразили обеспокоенность темпами и масштабами экономической либерализации."
china_southern_tour.3.a: "Продвигайтесь вперед, несмотря ни на что."
china_southern_tour.3.b: "Переговоры о компромиссе."

# Rwanda

genocide_ended: "Геноцид завершился"
the_genocide_progresses_by_15: "Геноцид разогревается на 15 пунктов"
the_genocide_progresses_by_10: "Геноцид разогревается на 10 пунктов"
