 je_intifada_military_operation: "Операция «Оборонительный щит»"
 je_intifada_military_operation_desc: "Начать полномасштабную военную операцию на палестинских территориях. Силы ЦАХАЛа будут двигаться, чтобы вновь занять крупные населенные пункты, демонтировать инфраструктуру боевиков и подавить восстание силой."

 je_intifada_mass_resistance: "Массовое народное сопротивление"
 je_intifada_mass_resistance_desc: "Эскалация восстания в скоординированное массовое движение сопротивления. Всеобщие забастовки, массовые демонстрации и активные уличные бои будут бросать вызов израильскому контролю на всех фронтах."

 intifada_minimum_score_tt: "Требуется преимущество в конфликте не менее 5 баллов"

 ### ══════════════════════════════════════════
 ### EVENTS
 ### ══════════════════════════════════════════

 intifada_events.1.t: "Конфликт обостряется"
 intifada_events.1.d: "Восстание обострилось после уличных столкновений. То, что начиналось как камни и протесты, стало полной конфронтацией. В узких переулках и лагерях беженцев Палестины каждое здание является крепостью, а каждая улица — полем битвы."
 intifada_events.1.a: "Мы восстановим порядок"
 intifada_events.1.a.pal: "Мы никогда не перестанем сопротивляться."

 intifada_events.2.t_isr: "Интифада закончилась"
 intifada_events.2.d_isr: "Вторая интифада была подавлена. Израильские военные операции восстановили контроль над палестинскими территориями, хотя стоимость международной репутации и жизни палестинских гражданских лиц была огромной. Основные претензии остаются нерешенными."
 intifada_events.2.t_pal: "Палестинское сопротивление продолжается"
 intifada_events.2.d_pal: "Вторая интифада достигла того, что казалось невозможным. Благодаря своей решимости и самопожертвованию палестинский народ заставил Израиль сесть за стол переговоров. Мир стал свидетелем силы народного сопротивления оккупации."
 intifada_events.2.a: "Что будет дальше?"

 intifada_events.5.t: "Столкновения на улицах"
 intifada_events.5.d: "Молодые палестинцы собрались на израильских контрольно-пропускных пунктах, вооруженные камнями и горящими шинами. Узкие улочки переносят конфронтацию в ближнюю борьбу, где израильская бронетехника не может эффективно маневрировать. Телевизионные камеры со всего мира записывают сцены."
 intifada_events.5.a: "Усилить сопротивление"
 intifada_events.5.b: "Проявите сдержанность"

 intifada_events.6.t: "Рейды Checkpoint"
 intifada_events.6.d: "Израильские военные контрольно-пропускные пункты, разделяющие палестинские общины, представляют собой как символ оккупации, так и тактическую цель. Скоординированный удар может нарушить израильский контроль над движением в пределах территорий, хотя это вызовет суровые ответные меры."
 intifada_events.6.a: "Нанести удар по контрольно-пропускным пунктам"
 intifada_events.6.b: "Слишком опасно"

 intifada_events.8.t: "Международное освещение СМИ"
 intifada_events.8.d: "Международные СМИ транслируют образы восстания по всему миру. Сцены противостояния палестинских гражданских лиц израильским вооруженным силам вызвали протесты и осуждение в столицах по всему миру. Страны Лиги арабских государств поддерживают палестинское дело, в то время как Израиль сталкивается с растущим дипломатическим давлением."
 intifada_events.8.a: "Мир наблюдает"

 intifada_events.7.t: "Вторая интифада"
 intifada_events.7.d: "Вспыхнули палестинские территории. После многих лет неудачных мирных переговоров и продолжающегося расширения поселений разочарование палестинского народа переросло в открытое восстание. На тесных улицах Газы и на склонах холмов Западного берега новое поколение начинает борьбу."
 intifada_events.7.a: "Это определит поколение"

