objective_the_west_name_USA:0 "Единственная сверхдержава"
objective_the_west_name_GBR:0 "Проблемы"
objective_the_west_name_FRA:0 "Франция Миттерана"

objective_the_west_desc_USA:0 "Соединенные Штаты Америки находятся в уникальном положении на рубеже 21-го века. Будучи ведущей мировой сверхдержавой и самым сильным национальным государством, которое когда-либо видело человечество, Республика сталкивается с рядом сложных внешних и внутренних проблем. Несмотря на крах главного соперника Америки, Советский Союз, угроза терроризма, Китай и различные другие угрозы свободному миру ставят под сомнение причастность Америки. Станут ли США мировой сверхдержавой? Время покажет."
objective_the_west_desc_GBR:0 "В 1992 году Великобритания боролась с экономической неопределенностью и политической турбулентностью. Страна недавно вышла из глубокой рецессии, отмеченной высоким уровнем безработицы и падением доверия потребителей. Нестабильность в Северной Ирландии, теперь известной как «Неприятности», остается горячей темой дебатов. Как Британия переживет эти бурные времена?"
objective_the_west_desc_FRA:0 "Политический ландшафт Франции был отмечен растущей напряженностью из-за европейской интеграции и внутренних экономических проблем. Президент Франсуа Миттеран, социалист во время своего второго срока, столкнулся со снижением популярности, поскольку страна боролась с высокой безработицей и вялым экономическим ростом. Его правительство во главе с премьер-министром Пьером Береговой боролось с общественным недовольством мерами жесткой экономии, направленными на стабилизацию экономики. Политически Франция была глубоко разделена по Маастрихтскому договору, который направлен на укрепление европейской интеграции и прокладывание пути для евро. Есть ли у ЕС все необходимое для выживания в 21 веке?"

objective_the_east_name_RUS:0 "Падение Советского Союза"
objective_the_east_name_PRC:0 "Великая Народная Республика"
objective_the_east_name_IRQ:0 "Ирак Саддама Хусейна"

objective_the_east_desc_RUS:0 "Россия переживает драматические политические преобразования после распада Советского Союза в декабре 1991 года. Борис Ельцин, первый президент Российской Федерации, столкнулся с огромной проблемой руководства молодой демократией во время хаотического перехода от централизованной коммунистической системы к рыночной экономике. Внутри страны правительство Ельцина боролось с политической нестабильностью, ростом инфляции и широко распространенными социальными волнениями, поскольку экономические реформы, известные как «шоковая терапия», привели к трудностям для миллионов. Дипломатически Россия стремилась переопределить свою роль на мировой арене, налаживая новые отношения с западными державами, пытаясь сохранить влияние на бывшие советские республики."
objective_the_east_desc_PRC:0 "Китай осторожно выходит из международной изоляции и санкций со стороны западных стран. Политически страна находилась под жестким контролем Коммунистической партии Китая (КПК), при этом Дэн Сяопин сохранял значительное влияние, несмотря на то, что официально покинул руководящие должности. Его знаменитое «Южное турне» в начале 1992 года активизировало приверженность Китая экономическим реформам и открытости, сигнализируя о новом толчоке к рыночной политике и большей интеграции с мировой экономикой."
objective_the_east_desc_IRQ:0 "Reeling from a devastating loss in the Gulf War last year, and facing intense international isolation. Saddam Hussein remained firmly in power, maintaining an iron grip on the country through brutal repression of internal dissent, particularly against the Shi'a in the south and the Kurds in the north. Iraq truly has several paths going into the 2000s.

objective_rising_powers_name_IDA:0 "Индийский век"
objective_rising_powers_name_BRZ:0 "Рост доминирования Бразилии"
objective_rising_powers_name_VNM:0 "Восстание Вьетнама"

objective_rising_powers_desc_IDA:0 "Индия переживает период значительных политических и экономических изменений. Руководил страной премьер-министр Нарасимха Рао, который пришел к власти в 1991 году и инициировал ряд преобразующих экономических реформ, направленных на либерализацию экономики и ее более тесную интеграцию с мировым рынком."
objective_rising_powers_desc_BRZ:0 "В 1992 году Бразилия находилась в процессе политического перехода после окончания военного правления в 1985 году. Страна управлялась президентом Фернандо Коллором де Мелло, который вступил в должность в 1990 году как первый непосредственно избранный президент Бразилии за более чем 20 лет. Правительство Коллора началось с волны экономических реформ, направленных на стабилизацию экономики, но его администрация вскоре столкнулась с растущим разочарованием общественности из-за роста инфляции и обвинений в коррупции. К 1992 году Коллор был втянут в крупный коррупционный скандал, приведший к массовым протестам и призывам к его импичменту. В дипломатическом плане Бразилия сосредоточилась на улучшении своего международного имиджа и расширении своего влияния в Латинской Америке. Он также стремится к более тесным связям с западными странами, утверждая свою роль в глобальных вопросах, особенно в экологических вопросах, связанных с тропическими лесами Амазонки. Однако политическая нестабильность и экономические трудности продолжали доминировать в национальной повестке дня."
objective_rising_powers_desc_VNM:0 "Вьетнам постепенно реинтегрировался в международное сообщество после многих лет изоляции после окончания войны во Вьетнаме и суровых последствий экономических санкций. В 1992 Вьетнам нормализовал отношения с Соединенными Штатами и присоединился к Ассоциации государств Юго-Восточной Азии (АСЕАН), сигнализируя о сдвиге в сторону большего регионального сотрудничества и заинтересованности в улучшении отношений с Западом. Какой путь выберет Вьетнам? Это зависит от тебя."
