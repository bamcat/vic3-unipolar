l_russian:

##new smd

 concept_weapon_of_mass_destruction:0 "оружие массового поражения"
 concept_weapon_of_mass_destruction_desc:0 "$concept_weapon_of_mass_destruction$ — мощный инструмент, используемый $concept_armies$ для убийства огромных скоплений людей в короткие промежутки времени."
 concept_nuclear_weapon:0 "Ядерное оружие"
 concept_nuclear_weapon_desc:0 "$concept_nuclear_weapon$ - взрывные устройства и $concept_weapon_of_mass_destruction$, которые получают свою разрушительную силу от ядерных реакций, либо ядерного деления (деления или атомной бомбы), либо комбинации реакций деления и ядерного синтеза."
 concept_missile:0 "Ракеты"
 concept_missile_desc:0 "$concept_missile$ относится к любому оружию, доступному через панель стратегической войны, включая $concept_weapon_of_mass_destruction$."
