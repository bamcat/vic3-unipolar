  # Middle East
  YMN_FLAVOR_TEXT:0 "Усилия по удержанию власти пошли наперекосяк, и в Йемене разразилась война между Старым правительством, Переходным советом и хуситами. Эта жестокая война принесла с собой любопытные глаза держав в Аравии, натравливая их друг на друга, чтобы склонить Йемен в свою пользу. Должен ли Йемен терпеть порабощение со стороны своих соседей, или они смогут выйти на первое место?"
  HOU_FLAVOR_TEXT:0 "$YMN_FLAVOR_TEXT$"
