  SYR_FLAVOR_TEXT:0 "Сирия в настоящее время страдает от сложной гражданской войны, которая превратилась в опосредованную войну против нескольких держав. Регион остается чрезвычайно враждебным, и конфликты только обостряются между временными верующими в их право управлять и Рожавой, освобождающейся, чтобы сформировать более прогрессивную республику. Беженцы покидают Европу в поисках более безопасных земель для жизни. Положит ли Сирия конец войне и вернет свое быстро исчезающее население, или она обречена на провал и станет вакуумом для других держав?"
  SIG_FLAVOR_TEXT:0 "$SYR_FLAVOR_TEXT$"
