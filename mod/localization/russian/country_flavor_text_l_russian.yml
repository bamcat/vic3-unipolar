  IRA_FLAVOR_TEXT:0 "Иран находится на пороге собственной исламской революции, страна сидит с относительной стабильностью традиционного ислама и не пострадала от арабской весны. Однако последствия «арабской весны» не остались незамеченными молодым населением, и население стремится положить конец их экстремистским традиционным методам. Сможет ли Иран сохранить свои традиционные ценности? Или они будут свергнуты более мультикультурным населением?"
  
  # East Asia
  PRC_FLAVOR_TEXT:0 "Китайская Народная Республика является мировым экономическим гегемоном и финансирует менее удачливые страны. Тем не менее, схемы улавливания долга отступают, и зависимость от товаров китайского производства ослабляется их ближайшими соседями и автоматизацией. Может ли Китай восстановить свое экономическое господство? Или им суждено развалиться из-за внутренней напряженности?"
  NRK_FLAVOR_TEXT:0 "Северная Корея остается последним бастионом маоистской диктатуры на планете. Различные интеллектуальные игры и промывание мозгов нации остаются чрезвычайно эффективными, несмотря на то, насколько строги и смертельны их режим. Продержится ли 80-летний режим еще 80 лет? Или это воссоединение с соседом на юге и восстановление оттуда?"
  JPN_FLAVOR_TEXT:0 "Япония оставалась разоруженной страной с конца 2-й мировой войны, однако это не остановило их крайнего экономического контроля. Японские автомобили и электроника известны во всем мире и почитаются как лучшие из лучших. Но это не без жертвы... Страна имеет стареющее население и зажата между многими региональными державами. Что нужно, чтобы Япония оставалась независимой?"
  
  # Oceania
  AUZ_FLAVOR_TEXT:0 "Австралия, страна возможностей и мечты. В то время как позиция США колеблется, Австралия, несмотря на свои недостатки и более теплую окружающую среду, почитает название «Земля возможностей». Однако внутренние политические разногласия и потепление климата стремятся разрушить шанс Австралии стать бастионом процветания. Сможет ли Австралия успешно преодолеть современный мир?"
  
  # Balkans
  SRB_FLAVOR_TEXT:0 "Сербия является оплотом неудачного югославского эксперимента. Потеряв в последние годы Черногорию и Косово, страна жаждет победы. Вернет ли Сербия утраченную славу Югославии?"
  
  # Europe
  ENG_FLAVOR_TEXT:0 "Англия ревела в течение 20-го века, проявляя силу как великая держава, однако многочисленные спады, широкомасштабная политическая коррупция и ослабление легитимности поставили под сомнение акт союза. Сможет ли Англия сохранить контроль над своими владениями? Или уход с европейского рынка стал последней каплей?"
  SCO_FLAVOR_TEXT:0 "Шотландия оставалась относительно невредимой на протяжении рецессий начала 21-го века и продолжает процветать с момента передачи власти. Масштабная коррупция и отсутствие представительства в профсоюзе поставили под сомнение его место. Будет ли она процветающей после обретения независимости? Или это будет путь будущего?"
  NIR_FLAVOR_TEXT:0 "Последняя позиция британского империализма в Ирландии, Северная Ирландия, представляет собой пороховую бочку, ожидающую освещения. Проблемы могут быть преодолены, но вопрос о его суверенитете продолжает пронизывать молодое поколение, стремящееся к объединению со своими южными братьями и сестрами. Британцы держатся за Ирландию, пойдет ли она по пути монархов?"
  IRE_FLAVOR_TEXT:0 "Ирландия превратилась из страны под британским имперским сапогом в сияющий маяк англосферы, попытки возродить свой язык и дистанцироваться от британского оказались успешными, а усилия между собой и своим соседом на севере привели к желанию единства. Что будет дальше с Изумрудными островами?"
  UKR_FLAVOR_TEXT:0 "Усилия по вестернизации в Украине зашли далеко, и жизнь многих украинцев быстро улучшается, однако российское вторжение в Крым за 8 лет до этого отняло важный регион. Сепаратисты на востоке также дали России возможность проникнуть вглубь страны. Сможет ли Украина вернуть сепаратистов назад, или Украина станет следующей целью в растущих амбициях России?"
  CYP_FLAVOR_TEXT:0 "Кипр является островом, разделенным этническими группами, греками на юге, турками на севере. Однако формируется растущая кипрская идентичность, и может пройти не так много времени, прежде чем появятся призывы к объединению нации раз и навсегда. Сможет ли Кипр успешно объединиться, или им суждено всегда быть разделенными?"
  BYL_FLAVOR_TEXT:0 "Беларусь находится в начале политической революции, ее граждане активно выступают против правительства, а истинный глава государства проиграл выборы путем фальсифицированного голосования. Лукашенко подогревается к своему российскому соседу, чтобы защитить свой контроль. Удастся ли Лукашенко или белорусы положат конец его незаконному правительству?"
  SPA_FLAVOR_TEXT:0 "Испания переживает приятный бум после свержения фалангистского движения, это быстро модернизирующаяся страна, и прилагает усилия к большему будущему для своего народа. Однако не все согласны с их направлением, так как движение за независимость в Каталонии набирает обороты. Процветает ли Испания с Каталонией или без нее?"
  XSP_FLAVOR_TEXT:0 "Испания переживает приятный бум после свержения фалангистского движения, это быстро модернизирующаяся страна, и прилагает усилия к большему будущему для своего народа. Однако не все согласны с их направлением, так как движение за независимость в Каталонии набирает обороты. Процветает ли Испания с Каталонией или без нее?"
  NRW_FLAVOR_TEXT:0 "Норвегия остается одной из немногих стран, вступивших в 21-й век, более сильной страной, чем она была раньше, сильная система социальной безопасности и мощные ресурсы, которые она может продвигать на рынок, делают ее щедрым местом мечты. Однако по мере того, как мир отходит от нефти, может ли Норвегия успешно сохранить свое мастерство, или убывание нефти будет ее гибелью?"
  RSF_FLAVOR_TEXT:0 "Однако после распада Советского Союза Россия, государство-преемник, не смогла удержать ту же экономическую мощь и доблесть. Большинство его кампаний после падения союза были направлены на восстановление экономического господства. В Грузии в 2008 году и в Украине в 2014 году. Однако олигархи говорят об очередном походе на Украину, чтобы захватить земли к востоку от Днепра и сепаратистских районов востока. Это их путь в 21 веке, или они потерпят неудачу?"
  EUR_FLAVOR_TEXT:0 "Европейский Союз является детищем послевоенного восстановления после разрушений, вызванных WW2. С тех пор он развился, чтобы включать большую часть континента, за исключением некоторых стран, таких как Норвегия и Швейцария, или Западные Балканы и бывшие югославские государства. Союз только укрепился с тех пор, как Великобритания сделала необычный выбор, чтобы спастись от него, и большинство разговоров о выходе из него больше не воспринималось всерьез в большинстве стран, Союз очень сильно только усиливается отсюда, поскольку переговоры о федерации растут. Станет ли Европейский союз федерацией? Или Европейский Союз останется только в учебниках истории?"
  TRK_FLAVOR_TEXT:0 "Тюркие является главным барьером в морских амбициях России и имеет стратегическое влияние на многих ее соседей. Она активно участвует в конфликтах на юге, поддерживая Временное правительство Сирии и имея активные ополчения в Африке и на Ближнем Востоке. Положение Тюркие в анатолийском регионе дает ему большой контроль над регионами вокруг него и закрепляет амбиции османов перед ним. Удержит ли Тюркие свои амбиции? Или ему суждено потерпеть неудачу, как раньше османам?"
  
  # North America
  USS_FLAVOR_TEXT:0 "Соединенные Штаты имели процветающий 20-й век благодаря послевоенному экономическому буму и катапультировались как единственная сверхдержава к концу века. Однако широкомасштабная коррупция и скрытая тактика корпораций служат разрыву ткани в союзе. США отстают как в социальном, так и в экономическом плане. Что ждет Союз в будущем и смогут ли они вернуть себе былую славу?"
  MEX_FLAVOR_TEXT:0 "Наркокартели и американский империализм являются определяющими характеристиками Мексики 21-го века. Тем не менее, многие усилия были направлены на урегулирование картелей без участия США в войне на их территории. Что ждет мексиканцев в следующем столетии, и смогут ли они успешно избежать лап американского империализма?"
  CAN_FLAVOR_TEXT:0 "Канада ворвалась в 21-й век как стабильная страна, лишенная огромных проблем. Однако первые нации требуют уступок в отношении своего ужасного обращения с момента основания канадского королевства. Уступит ли Канада?"
  
  # Central Asia
  AFH_FLAVOR_TEXT:0 "Кладбище империй, Афганистан, успешно противостояло усилиям американского империализма и гарантировало его суверенитет как региональной державы. Однако конфликты между различными этническими группами и недоброжелатели веры угрожают традиционному образу жизни. Сможет ли Афганистан успешно преодолеть свои традиционные пути?"
  AZB_FLAVOR_TEXT:0 "Азербайджан является процветающей страной Кавказа, недавние открытия запасов нефти и газа сделали его важным союзником для Европы, однако конфликты в Арцахе и последующие пограничные войны с соседней Арменией не позволили им достичь своего самого большого. Сможет ли Азербайджан мирно разрешить этот кризис, или он перерастет в войну?"
  KZK_FLAVOR_TEXT:0 "Казахстан находится между различными лидерами и правительствами и находится в состоянии мягкой анархии. Его предыдущий лидер оставил огромный вакуум власти, и новые правители, похоже, пытаются направить Казахстан в очень хорошем направлении. Сможет ли Казахстан пережить внутреннюю борьбу за власть?"
  UZB_FLAVOR_TEXT:0 "Узбекистан изо всех сил пытался освободиться от диктатуры с момента своего отделения от СССР в 90-х годах, однако он успешно начал либерализацию и продолжает улучшать свое положение со своими соседями. Хотя ей по-прежнему повезло больше, то же самое нельзя сказать о некоторых ее соседях, и ей нужно будет провозгласить свой суверенитет, чтобы выжить."
  
  # Africa
  SAF_FLAVOR_TEXT:0 "Южная Африка — это страна, которая изо всех сил пытается найти свой путь, конфликты, которые определяют ее историю, привели к тому, что между различными этническими группами в лучшем случае возникла обида, эта напряженность только усугубилась из-за апартеида. Если Южная Африка намерена процветать, у нее есть нелегкий путь уступок, восстановления и политических реформ. Может ли Украина это сделать? Или ему суждено развалиться."
  SSD_FLAVOR_TEXT:0 "Южный Судан родился в результате конфликта этнических групп вдоль Нила, это новейшая страна, признанная Организацией Объединенных Наций, и ей предстоит пройти долгий путь, прежде чем ее можно будет считать успешной. Этническая напряженность держит страну в тупике, и необходимо будет предпринять осторожные маневры, чтобы гарантировать, что эта страна не проживет недолго. Он способен на это?"
  ETH_FLAVOR_TEXT:0 "Эфиопия - быстро модернизирующаяся страна, и ей удалось быть относительно нетронутой колониальными руками. Однако у страны все еще есть свои проблемы, поскольку этнические группы Сомали, Тигры и Оромия угрожают отделиться и втянуть Эфиопию в дорогостоящую гражданскую войну. Может ли Эфиопия продолжать процветать, несмотря на напряженность?"
  EGY_FLAVOR_TEXT:0 "Египет переживает демографический бум на фоне крайней нехватки воды и несостоявшегося традиционного правительства. Египтяне массово уезжают на лучшие земли, и Нил медленно высыхает. Сможет ли Украина найти выход из кризиса?"
  KYA_FLAVOR_TEXT:0 "Кения является структурно здоровой африканской страной в условиях успешной модернизации и быстрого повышения уровня жизни. Хотя Кения, возможно, в основном лишена серьезных проблем, ее соседям не так повезло. В настоящее время ведутся переговоры о создании Восточноафриканской сверхдержавы в политической сфере. Удастся ли Кении заложить основы для формирования африканской сверхдержавы? Или беспорядки в соседних странах повлияют на их собственные земли."
  MOR_FLAVOR_TEXT:0 "Марокко появилось в 21-м веке сильным и гордым после его умного покорения Сахарской республики и ее основных улучшений к ее экономическому неравенству. В настоящее время она стремится к партнерству с европейскими державами для дальнейшего развития своей экономической мобильности и стать крупным игроком на африканском континенте. Будут ли реализованы амбиции России?"
  GHA_FLAVOR_TEXT:0 "После жестокой военной хунты в 80-х годах по прозвищу «Холодный Чоп» экономическая ситуация в Гане начала массово рушиться. Однако после возвращения политических партий и выборов страна вернулась к периоду стабильности и экономического процветания и, по прогнозам, продолжит это делать. Однако климатический кризис и опустынивание Сахеля вновь угрожают нестабильности. Может ли Гана успешно ориентироваться в этих условиях?"
  
  # South Asia
  VNM_FLAVOR_TEXT:0 "Вьетнам является страной относительной стабильности после деколонизации. Будучи одной из немногих крайне левых рыночных экономик, она имеет свои преимущества, и в то время как ее граждане переносят относительный мир, туристы переполняют страну. Тщательный выбор и умная геополитика могут позволить ему преуспеть в 21 веке. Но сделает ли он этот выбор?"
  IDA_FLAVOR_TEXT:0 "Индия не только выжила, но и процветала с момента распада британской империи и окончания 400-летнего колониального правления. Однако некоторая постколониальная травма, связанная с отделением Мьянмы, Бангладеш и Пакистана, стала шрамом на достойном уровне. Однако рост напряженности в отношениях между Индией и Пакистаном из-за земель Джамму и Кашмира является основной причиной для беспокойства, а рост напряженности в отношениях с КНР из-за Арунчаль-Прадеша вызывает вооруженный конфликт. Сможет ли Индия успешно противостоять еще 100 годам империализма?"
  PAK_FLAVOR_TEXT:0 "Пакистан отделился от Раджа в 40-х и 50-х годах из-за религиозной напряженности между индуистами и мусульманами. Хотя многие считают, что конфликт близок к завершению, между различными этническими группами Пакистана назревает конфликт. Один неверный шаг, и может произойти коллапс государства, и с напряженностью как с Индией, так и с Афганистаном на их высоте, сможет ли Пакистан справиться с этими проблемами?"
  
  # South and Central America
  ARG_FLAVOR_TEXT:0 "Аргентина — это страна, которая после серьезного успеха в 20-м веке пошатнулась из-за вмешательства США и неудавшегося конфликта из-за Лас-Мальвинас. Споры между коренными мапуче, аргентинскими штатами и правительством в Буэнос-Айресе зашли в тупик. Сможет ли Аргентина восстановить свои ряды и вернуть свою страну к славе?"
  
  # Nonsense Countries
  GLI_FLAVOR_TEXT:2 "Галисия - небольшая и ничем не примечательная страна, населенная энтузиастами собора. Вернет ли Галиция былую славу?"
  GENERIC_FLAVOR_TEXT:0 "The 21st Century is a time of relative peace & prosperity, however exploitation by the wealthy, waning standards of living and global communication have brought with it a resurgence in political activism and societal shifts like none ever seen. What will this new wave of political expression bring?
