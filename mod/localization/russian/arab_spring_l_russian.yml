 arab_spring_liberal_victory_trigger: "Реформистские условия победы"
 arab_spring_islamist_victory_trigger: "Исламистско-националистические условия победы"
 arab_spring_valid_country_trigger: "Цель Арабской весны"
 tunisia_arab_spring_spark_trigger: "Тунис: Весенние условия"

 # ==========================================
 # SCRIPTED PROGRESS BAR TOOLTIPS
 # ==========================================

 arab_spring_reformists_in_govt_tt: "Реформистские группы интересов в правительстве"
 arab_spring_universal_suffrage_tt: "Было введено всеобщее избирательное право"
 arab_spring_census_voting_tt: "Проводится перепись населения"
 arab_spring_free_press_tt: "Защищенная речь поддерживает демократическую консолидацию"
 arab_spring_right_of_assembly_tt: "Право собраний поддерживает переход"
 arab_spring_high_literacy_tt: "Высокая грамотность ускоряет демократическую консолидацию"
 arab_spring_islamists_in_govt_tt: "Исламистские или националистические группы занимают места в правительстве"
 arab_spring_turmoil_tt: "Сильные беспорядки дестабилизируют новое правительство"
 arab_spring_authoritarian_laws_tt: "Авторитарные законы все еще действуют"
 arab_spring_at_war_tt: "Страна находится в состоянии войны"
 arab_winter_radical_movements_tt: "Исламистские или националистические движения набирают силу"
 arab_winter_military_opposition_tt: "Вооруженные силы находятся в оппозиции и становятся все более мощными."
 arab_winter_security_laws_tt: "Репрессивные законы о безопасности ускоряют репрессии"
 arab_winter_civil_war_tt: "Гражданская война создает хаос, который приносит пользу реакционным силам."
 arab_winter_high_turmoil_tt: "Высокая нестабильность подпитывает контрреволюционные настроения"
 arab_winter_strong_liberal_movements_tt: "Сильные реформистские движения сопротивляются репрессиям."
 arab_winter_universal_suffrage_entrenched_tt: "Универсальное избирательное право закреплено - его труднее отменить"
 arab_winter_elected_bureaucrats_tt: "Избранная бюрократия сопротивляется попыткам переворота"
 arab_winter_prepared_defence_tt: "Новое правительство подготовило оборонительные позиции"

 # ==========================================
 # SPARK EVENTS
 # ==========================================

 2011_protests.1.t: "Уличный торговец поджигает себя"
 2011_protests.1.d: "В провинциальном городе Сиди-Бузид молодой уличный торговец по имени Мохамед Буазизи поджег себя перед местными правительственными учреждениями после того, как полиция конфисковала его тележку и публично унизила его. Акт отчаяния стал громоотводом. В течение нескольких часов кадры его протеста распространились в социальных сетях. Толпы собрались не только в Сиди-Бузид, но и поперек [ROOT.GetCountry.GetName]. Накопленная ярость поколения — из-за коррупции, безработицы и мучительного веса авторитарного правления — нашла свой символ.\n\n Режим [SCOPE.GetRootScope.GetCountry.GetRuler.GetLastName] должен решать, как реагировать. Что бы это ни было, мир наблюдает."
 2011_protests.1.f: "Отчаяние одного человека стало национальным."
 2011_protests.1.a: "Разгром — разгоните демонстрации, прежде чем они распространится"
 2011_protests.1.b: "Предложить концессии — объявить о расследовании поведения полиции"

 2011_protests.2.t: "Тунисский тремор"
 2011_protests.2.d: "Беспорядки в Тунисе вызвали шок во всем арабском мире. Спутниковые каналы круглосуточно транслируют сцены из Туниса — и обычные люди в [ROOT.GetCountry.GetName] смотрят. Вопрос, который шепчут в кофейнях и социальных сетях, тот же самый, который сейчас задает себе каждый авторитарный режим в регионе: \n \n Может ли это произойти здесь?"
 2011_protests.2.f: "Каждый режим смотрит. Каждый диссидент делает заметки."
 2011_protests.2.a: "Тунис отличается — это не будет распространяться на [ROOT.GetCountry.GetName]"
 2011_protests.2.b: "Примите меры предосторожности — укрепите безопасность, прежде чем это выйдет из-под контроля."

 # ==========================================
 # MISSING STRUCTURAL MODIFIERS
 # ==========================================

 modifier_arab_spring_transition_cabinet: "Переходное правительство"
 modifier_arab_spring_transition_cabinet_desc: "После революции формируется новое правительство. Легитимность высока в эти первые дни, но она должна быть консолидирована до того, как контрреволюция обретет свою опору."

 modifier_arab_spring_kick_out_of_insurrection: "Стоять с баррикад"
 modifier_arab_spring_kick_out_of_insurrection_desc: "Революция достигла своих непосредственных целей. Эта группа отказывается от своей повстанческой позиции и вступает в формальную политическую жизнь, поддерживаемую доброй волей момента."

 modifier_arab_spring_regime_ig_defeated: "Побежденный революцией"
 modifier_arab_spring_regime_ig_defeated_desc: "Связь этой группы со старым режимом дорого обошлась ей. Он был вытеснен из правительства, и его политическая сила уменьшилась. Можно ли его восстановить с поля, еще предстоит выяснить."

# ==========================================
 # ARAB SPRING INTERNATIONAL EVENTS
 # ==========================================

 # ── arab_spring_intl.1 ───────────────────

 arab_spring_intl.1.t: "Арабский мир горит"
 arab_spring_intl.1.d: "Протесты вспыхнули по всему арабскому миру, начиная с Туниса. Десятилетия авторитарного правления, экономическая стагнация и политические репрессии вывели миллионы людей на улицы."
 arab_spring_intl.1.f: "История наблюдает за теми, кто смотрит историю."
 arab_spring_intl.1.a: "Встаньте вместе с протестующими — демократия и права человека требуют этого."
 arab_spring_intl.1.b: "Вернуть действующие режимы — стабильность и наши интересы на первом месте"
 arab_spring_intl.1.c: "Призыв к сдержанности со всех сторон — призыв к мирному урегулированию"

 # ── arab_spring_intl.2 ───────────────────

 arab_spring_intl.2.t: "Вопрос о вмешательстве"
 arab_spring_intl.2.d: "Ситуация в [scope:civil_war_country_scope.GetName] переросла в открытую гражданскую войну. Силы [scope:civil_war_country_scope.GetRuler.GetName] нападают на гражданское население, и есть достоверные сообщения о массовых убийствах. Международное сообщество призывает к ответу.\n\n[ROOT.GetName] ранее выражало поддержку протестным движениям. Теперь вопрос заключается в том, распространяется ли эта поддержка на действия и какой ценой."
 arab_spring_intl.2.f: "Слова и дела – это разные валюты."
 arab_spring_intl.2.a: "Обеспечение бесполетной зоны — защита гражданских лиц от воздушных ударов"
 arab_spring_intl.2.b: "Вооружить и поддержать оппозиционные силы на местах"
 arab_spring_intl.2.c: "Это не наша война — держитесь от нее подальше."

 # ── arab_spring_intl.3 ───────────────────

 arab_spring_intl.3.t: "Арабская весна: расчеты"
 arab_spring_intl.3.d_success: "«Арабская весна» привела к как минимум одному подлинному демократическому переходу. Это хрупкое достижение, которое легко обратить вспять, но оно реально. Для [ROOT.GetName], которые наблюдали, как эти события разворачивались издалека, есть спокойное удовлетворение, видя, что дуга истории может иногда склоняться к справедливости. Вопрос в том, как поддержать то, что было выиграно."
 arab_spring_intl.3.d_islamist: "Арабская весна закончилась, но не так, как надеялись архитекторы. По всему региону исламистские движения оказались лучше организованными, чем светские протестные коалиции, которые начали восстания. Для [ROOT.GetName] результат неприятен: демократия, которую он отстаивал, породила правительства, ценности которых резко отличаются от его собственных. Отношения с новым арабским порядком потребуют тщательной навигации."
 arab_spring_intl.3.d_failure: "Арабская весна была подавлена. Режимы, которые, казалось, трепетали, стабилизировались, их службы безопасности восстановились, их противники в изгнании или в тюрьме. Для [ROOT.GetName] эпизод является напоминанием о том, что моральная ясность легче моральной эффективности. Жалобы, которые вызвали восстания, не были решены. Они были только отложены."
 arab_spring_intl.3.f: "Мир движется дальше. Регион не забывает."
 arab_spring_intl.3.a: "Проанализируйте то, что произошло"

 # ==========================================
 # INTERNATIONAL MODIFIER NAMES
 # ==========================================

 arab_spring_intl_pro_democracy_stance: "Продемократическая позиция"
 arab_spring_intl_pro_democracy_stance_desc: "Эта страна публично присоединилась к протестным движениям Арабской весны. Его престиж среди демократических стран вырос, но отношения с действующими арабскими режимами охладели."

 arab_spring_intl_stability_first_stance: "Стабильность прежде всего"
 arab_spring_intl_stability_first_stance_desc: "Эта страна решила поддержать действующие арабские режимы в протестных движениях. Стратегические отношения в регионе прочнее, но ценой своей международной репутации."

 arab_spring_intl_neutral_stance: "Осторожная сдержанность"
 arab_spring_intl_neutral_stance_desc: "Эта страна призвала к мирному урегулированию без поддержки обеих сторон. Она сохранила свою дипломатическую гибкость, но пожертвовала влиянием на результат."

 arab_spring_intl_western_backing: "Западная поддержка"
 arab_spring_intl_western_backing_desc: "Это движение получило общественную поддержку со стороны западных правительств. Международное внимание усиливает его импульс и делает репрессии более дорогостоящими для режима."

 arab_spring_intl_regime_backing: "Поддержка западного режима"
 arab_spring_intl_regime_backing_desc: "Западные правительства больше поддерживают это правительство, чем протестующих. Внешняя проверка укрепляет авторитет и легитимность режима."

 arab_spring_intl_no_fly_zone: "Создание бесполетной зоны"
 arab_spring_intl_no_fly_zone_desc: "Военные средства используются для обеспечения бесполетной зоны над зоной конфликта. Вмешательство защищает гражданских лиц, но оно дорого обходится и привлекает международное внимание."

 arab_spring_intl_arming_rebels: "Вооружение оппозиционных сил"
 arab_spring_intl_arming_rebels_desc: "Оружие и техника направляются оппозиционным силам в конфликте. Политика скрыта, но не секретна, и долгосрочные последствия того, кто получает эту поддержку, остаются неясными."

 arab_spring_intl_intervention_costs: "Расходы на вмешательство"
 arab_spring_intl_intervention_costs_desc: "Военная интервенция за рубежом напрягает ресурсы и порождает внутриполитические дебаты. Затраты на богатство и политический капитал реальны."

 arab_spring_intl_non_interventionist: "неинтервенционист"
 arab_spring_intl_non_interventionist_desc: "Эта страна решила не вмешиваться в арабскую гражданскую войну. Это решение уменьшило его воздействие и сохранило внутренний политический капитал, хотя критики утверждают, что оно отказалось от своих заявленных ценностей."
