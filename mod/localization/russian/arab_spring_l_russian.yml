l_russian:

 # ==========================================
 # JOURNAL ENTRY NAMES & HEADERS
 # ==========================================

 je_arab_spring: "Арабская весна"
 je_arab_spring_reason: "Во всем арабском мире давно подавленное разочарование авторитарным правлением, коррупцией и экономической стагнацией переросло в массовые протесты. Начиная с Туниса, волна беспорядков распространяется, и ни один режим в регионе не может чувствовать себя в полной безопасности."

 je_arab_winter: "Арабская зима"
 je_arab_winter_reason: "Оптимизм Арабской весны уступил место ожесточённой борьбе за душу революции. Исламистские движения, военные группировки и иностранные державы борются за то, чтобы заполнить вакуум, оставленный падшими или ослабленными режимами. Судьба региона висит на волоске."

 # Completion headers
 je_arab_spring_complete_header: "Демократический переход"
 je_arab_spring_on_complete_header: "Новый рассвет"
 je_arab_spring_fail_header: "Революция подавлена"
 je_arab_spring_on_fail_header: "The Crackdown"

 # ==========================================
 # MODIFIER
 # ==========================================

 modifier_arab_spring: "Арабская весна"
 modifier_arab_spring_desc: "Народные восстания охватили арабский мир. Правительства сталкиваются с сильным давлением со стороны протестных движений, требующих демократических реформ, экономической справедливости и прекращения авторитарного правления."

 # ==========================================
 # TOOLTIPS
 # ==========================================

 # Possible condition
 arab_spring_underway_tt: "Арабская весна продолжается"

 # Completion conditions
 had_arab_spring_revolution_tt_no_scope: "Произошла революция во время Арабской весны"
 has_liberal_or_progressive_in_government_tt: "Либеральная или прогрессивная группа интересов находится в правительстве."
 has_census_voting_or_universal_suffrage_tt: "Установил перепись населения или всеобщее избирательное право"

 # Failure conditions
 no_protest_leaders_tt: "Никаких либеральных или прогрессивных политиков или агитаторов не осталось."
 arab_spring_timer_dummy_tt: "Протестное движение было подавлено за [GetMonthsText(12)]"
 all_protest_movements_crushed_tt: "Все протестные движения были подавлены и подавлены."

 # je_arab_winter status
 reformists_in_government_tt: "Реформистские фракции занимают места в правительстве — революция имеет политическую опору."
 reformists_out_of_government_tt: "Реформисты были вытеснены из правительства — революция теряет почву."

 # je_arab_winter completion
 arab_spring_liberal_victory_tt: "Либеральная и светская оппозиция победила"
 arab_spring_islamist_victory_tt: "Исламистские или националистические силы захватили власть"
 arab_winter_on_complete_tt: "Политическая борьба разрешилась — к лучшему или к худшему."

 # je_arab_winter failure
 arab_winter_fail_tt: "Контрреволюция полностью подавила восстание."

 # on_complete tooltips
 on_reformist_victory_tt: "Преобладает реформистская коалиция — начинается демократический переход."
 on_islamist_victory_tt: "Исламистские или военные силы консолидировали власть — революция закончилась."

 # ==========================================
 # EVENT OUTCOME DESCRIPTIONS
 # ==========================================

 event_effects_arab_spring.8_tt: "Восстание было подавлено. Силы безопасности, лояльные режиму, разогнали протестующих, арестовали лидеров оппозиции и восстановили авторитарный контроль. Окно реформ закрыто — на данный момент."

 event_effects_arab_spring.10_tt: "Несмотря ни на что, протестное движение увенчалось успехом. Старый режим пал или пошел на значительные уступки. Начинается хрупкий демократический переход, хотя путь вперед остается неопределенным."

 # ==========================================
 # SCRIPTED PROGRESS BARS
 # ==========================================

 arab_spring_progress_bar: "Революционный момент"
 arab_spring_progress_bar_desc: "Как далеко продвинулось протестное движение к своим целям?"

 arab_winter_crackdown_progress_bar: "Режим Crackdown"
 arab_winter_crackdown_progress_bar_desc: "Насколько эффективно правительство подавляет восстание? Если она достигнет 100%, революция будет подавлена."

 # ==========================================
 # SCRIPTED TRIGGER NAMES (for tooltips)
 # ==========================================

 arab_spring_liberal_victory_trigger: "Реформистские условия победы"
 arab_spring_islamist_victory_trigger: "Исламистско-националистические условия победы"

 # ==========================================
 # VARIABLES
 # ==========================================

 had_arab_spring_revolution: "Арабская весенняя революция"
 arab_winter_revolution_crushed: "Революция подавлена"

 # ==========================================
 # TUNISIA SPARK EVENT (arab_spring.1)
 # ==========================================

 arab_spring.1.t: "Улицы растут"
 arab_spring.1.d: "В [ROOT.GetCountry.GetName] люди вышли на улицы. То, что начиналось как разрозненные протесты против коррупции и безработицы, переросло в массовое движение, требующее прекращения правления [SCOPE.GetRootScope.GetCountry.GetRuler.GetLastName]. Силы безопасности изо всех сил пытаются сдержать демонстрации, и глаза арабского мира наблюдают.\n\n То, как правительство отреагирует в эти первые дни, будет определять не только судьбу этой страны, но и траекторию всего региона."
 arab_spring.1.a: "Развернуть силы безопасности, чтобы разогнать протестующих"
 arab_spring.1.b: "Открытый диалог с лидерами оппозиции"
 arab_spring.1.c: "Объявить об ограниченных реформах, чтобы выиграть время"

 # ==========================================
 # MONTHLY PULSE — SPREAD EVENT (arab_spring.2)
 # ==========================================

 arab_spring.2.t: "Волна распространяется"
 arab_spring.2.d: "Новости о восстаниях в соседних странах распространились через спутниковое телевидение и социальные сети. В [ROOT.GetCountry.GetName] активисты воодушевлены и режим все больше нервничает. Организаторы акций протеста обмениваются тактикой через границы в режиме реального времени, чего не могло сделать ни одно предыдущее поколение диссидентов."

 # ==========================================
 # RANDOM MONTHLY EVENTS (3–5)
 # ==========================================

 arab_spring.3.t: "Мобилизация социальных медиа"
 arab_spring.3.d: "Организаторы в [ROOT.GetCountry.GetName] использовали платформы социальных сетей для координации основной демонстрации в [ROOT.GetCapital.GetName]. Вышли тысячи, и кадры протестов распространяются по всему миру. Правительство сталкивается с растущим давлением — как изнутри, так и извне."
 arab_spring.3.a: "Это управляемый"
 arab_spring.3.b: "Отключить интернет"

 arab_spring.4.t: "Силы безопасности Waver"
 arab_spring.4.d: "До столицы дошли сообщения о том, что подразделения силовиков в столице отказались от приказов стрелять по протестующим. Офицеры, сочувствующие демонстрантам, были замечены в братстве с толпой. Лояльность военных уже не вызывает сомнений."
 arab_spring.4.a: "Приведите более надежные единицы"
 arab_spring.4.b: "Немедленно провести переговоры с лидерами протестов"

 arab_spring.5.t: "Горы иностранного давления"
 arab_spring.5.d: "Западные правительства и международные организации выступили с заявлениями, призывающими к сдержанности и уважению прав протестующих. Некоторые пригрозили санкциями, если репрессии продолжатся. Между тем, региональные державы внимательно следят за ситуацией — одни надеются, что беспорядки распространятся, другие отчаянно пытаются сдержать их."
 arab_spring.5.a: "Игнорировать международное сообщество"
 arab_spring.5.b: "Ответить дипломатически"

 # ==========================================
 # FAILURE EVENTS
 # ==========================================

 arab_spring.8.t: "The Crackdown"
 arab_spring.8.d: "Восстание в [ROOT.GetCountry.GetName] было нарушено. Силы безопасности, дополняемые там, где это необходимо, ополченцами-лоялистами, разогнали последние лагеря протеста, арестовали самых видных деятелей оппозиции и закрыли границы против внешних агитаторов. Государственные СМИ уже переписывают нарратив.\n\n Арабская весна пришла и ушла от [ROOT.GetCountry.GetName], оставив после себя только новые обиды."
 arab_spring.8.a: "Порядок был восстановлен"

 # ==========================================
 # SUCCESS EVENTS
 # ==========================================

 arab_spring.9.t: "Режим уступает"
 arab_spring.9.d: "Столкнувшись с протестами, которые не показывают никаких признаков ослабления, [SCOPE.GetRootScope.GetCountry.GetRuler.GetLastName] объявил о широких уступках, включая обещание свободных выборов и новой конституции. Будут ли эти обещания выполнены, еще предстоит выяснить, но протестное движение одержало историческую победу."
 arab_spring.9.a: "Начинается новая глава"

 arab_spring.10.t: "Революция победила"
 arab_spring.10.d: "Старый порядок упал в [ROOT.GetCountry.GetName]. После нескольких недель массовых протестов режим рухнул — будь то бегство правителя, дезертирство военных или переговорный переход. Впервые за поколение обычные люди в [ROOT.GetCountry.GetName] осмеливаются надеяться на что-то другое.\n\n Сейчас начинается тяжелая работа по созданию нового политического порядка."
 arab_spring.10.a: "Народ высказался"

 # ==========================================
 # ARAB WINTER EVENTS
 # ==========================================

 arab_spring.7.t: "Исламистские силы консолидируют власть"
 arab_spring.7.d: "Революция была захвачена. Исламистские движения — лучше организованные, лучше финансируемые и более глубоко укоренившиеся в обществе, чем светское протестное движение — превратили победы Арабской весны в свою пользу. Избирательная урна, когда-то самая большая надежда протестующих, вынесла вердикт, которого либеральная оппозиция никогда не ожидала.\n\n Арабская весна стала арабской зимой."
 arab_spring.7.a: "Горький исход"

 arab_spring.71.t: "Демократический переход"
 arab_spring.71.d: "«Арабская весна» выполнила хотя бы некоторые из своих обещаний. Произошла подлинная передача власти, и новое правительство, каким бы несовершенным и хрупким оно ни было, представляет собой настоящий разрыв с авторитарным прошлым. Это редкое яркое пятно в регионе, где такие переходы так часто были обращены вспять.\n\n Работа по консолидации демократии в [ROOT.GetCountry.GetName] потребует бдительности, компромисса и немалой удачи."
 arab_spring.71.a: "История смотрит"

 # ==========================================
 # MODIFIER NAMES (referenced in events)
 # ==========================================

 arab_spring_popular_dissident: "Голос восстания"
 arab_spring_popular_dissident_desc: "Этот лидер стал символом протестного движения. Их слова имеют вес на улицах, и иностранные правительства внимательно следят за ними."

 suppressing_protests: "Подавление протестов"
 suppressing_protests_desc: "Силы безопасности активно разгоняют демонстрации и арестовывают оппозиционеров. Это может сдержать волнения в краткосрочной перспективе, но рискует усилить народный гнев."

 arab_spring_reactionary_enactment: "Аварийная безопасность Push"
 arab_spring_reactionary_enactment_desc: "Правительство быстро отслеживает законодательство о безопасности в ответ на беспорядки."

 arab_spring_institution_speed: "Мобилизация аппарата безопасности"
 arab_spring_institution_speed_desc: "Ресурсы направляются во внутренние органы безопасности для сдерживания протестов."

 arab_spring_democratic_transition: "Демократический переход"
 arab_spring_democratic_transition_desc: "Старый режим пал, строится новый политический порядок. Оптимизм высок, но также высока и нестабильность — тяжелая работа по консолидации демократических завоеваний только началась."

 arab_winter_revolution_crushed: "Революция подавлена"
 arab_winter_revolution_crushed_desc: "Восстание было подавлено силой. Режим выжил, но недовольство, которое вывело людей на улицы, остается нерешенным. Недовольство гноится под поверхностью."

 arab_winter_islamist_consolidation: "Исламистская консолидация"
 arab_winter_islamist_consolidation_desc: "Исламистские движения вышли из Арабской весны в качестве доминирующей политической силы. Светские цели революции были отодвинуты на второй план, заменены новым порядком, основанным на религиозной власти."

 arab_spring_regional_contagion: "Региональные беспорядки"
 arab_spring_regional_contagion_desc: "Распространяется Арабская весна. Протестные движения в соседних странах ободряют внутреннюю оппозицию, и режим все больше нервничает по поводу заражения."

 # ==========================================
 # arab_spring.1 — The Streets Are Rising
 # ==========================================

 arab_spring.1.t: "Восстания по всей стране"
 arab_spring.1.d: "В [ROOT.GetCountry.GetName] люди вышли на улицы. То, что начиналось как разрозненные протесты против коррупции и безработицы, переросло в массовое движение, требующее прекращения правления [ROOT.GetRuler.GetFirstName]. Силы безопасности изо всех сил пытаются сдержать демонстрации, и глаза арабского мира наблюдают.\n\n То, как правительство отреагирует в эти первые дни, будет определять не только судьбу этой страны, но и траекторию всего региона."
 arab_spring.1.d_no_leader: "В [ROOT.GetCountry.GetName] улицы заполняются протестующими. Демонстрациям не хватает единой объединяющей фигуры, но обиды, вызывающие их — коррупция, безработица, изнурительный вес авторитарного правления — реальны и широко распространены. Режим должен решить, как реагировать, прежде чем ситуация выйдет из-под его контроля."
 arab_spring.1.f: "Перед правительством стоит выбор, который определит его наследие."
 arab_spring.1.a: "Разгонять демонстрации силой"
 arab_spring.1.b: "Открыть диалог с оппозицией"

 # ==========================================
 # arab_spring.2 — The Security Apparatus Responds
 # ==========================================

 arab_spring.2.t: "Аппарат безопасности отвечает"
 arab_spring.2.d: "Поскольку протесты продолжают кипеть через [ROOT.GetCountry.GetName], службы безопасности настаивают на том, чтобы правительство действовало решительно. Генералы и начальники разведки предупреждают, что колебания будут восприниматься как слабость, и что окно для эффективного сдерживания закрывается. Вопрос не в том, использовать ли принудительную силу государства, а в том, как."
 arab_spring.2.f: "Режим должен тщательно выбирать свои инструменты."
 arab_spring.2.a: "Расширение секретной полиции — наблюдение и задержание"
 arab_spring.2.b: "Разверните военных — удерживайте улицы силой"
 arab_spring.2.c: "Ждите и смотрите — не реагируйте слишком остро"

 # ==========================================
 # ADDITIONAL MODIFIERS (referenced in events)
 # ==========================================

 modifier_arab_spring_momentum: "Революционный момент"
 modifier_arab_spring_momentum_desc: "Протестное движение набирает силу и народную поддержку. Радикальные настроения распространяются по низшим и средним слоям общества."

 arab_spring_regime_collaborator: "Сотрудник Режима"
 arab_spring_regime_collaborator_desc: "Считается, что этот лидер приспособил власти. Их авторитет среди протестного движения пострадал."

 arab_spring_dissidents_within: "внутреннее несогласие"
 arab_spring_dissidents_within_desc: "Эта группа испытывает давление изнутри — молодые и более идеалистически настроенные члены настаивают на более жесткой линии против режима."

 arab_spring_spread_the_spring: "Экспорт революции"
 arab_spring_spread_the_spring_desc: "Эта группа активно обращается к оппозиционным движениям в соседних странах, воодушевленные событиями у себя дома."

 arab_spring_contained_movement: "Содержащееся движение"
 arab_spring_contained_movement_desc: "Руководство решило сосредоточить свою энергию внутри страны, а не рисковать провоцированием режима иностранными путями."

 modifier_arab_spring_transition_cabinet: "Переходное правительство"
 modifier_arab_spring_transition_cabinet_desc: "После революции формируется новое правительство. Старый порядок растворяется, но то, что его заменяет, остается неопределенным."

 modifier_arab_spring_kick_out_of_insurrection: "Отказ от баррикад"
 modifier_arab_spring_kick_out_of_insurrection_desc: "Революция достигла своих непосредственных целей. Движение отходит от своей повстанческой позиции и вступает в политический процесс."

 modifier_arab_spring_regime_ig_defeated: "Побежденный революцией"
 modifier_arab_spring_regime_ig_defeated_desc: "Связь этой группы со старым режимом дорого обошлась ей. Она маргинализирована в новом политическом порядке."

 # ==========================================
 # EVENTS 1–6 (additional keys)
 # ==========================================

 arab_spring.1.d_tunisia: "То, что началось в [ROOT.GetCapital.GetName] с самосожжения уличного торговца, стало чем-то, что никто не предсказывал — общенациональным восстанием, которое потрясло [ROOT.GetCountry.GetName] до основания. Режим [SCOPE.GetRootScope.GetCountry.GetRuler.GetLastName] шатается. Силы безопасности изо всех сил пытаются сдержать демонстрации, которые распространились из столицы в каждый крупный город.\n\n Мир наблюдает. И по всему арабскому миру другие правительства тоже наблюдают — с надеждой или с ужасом."
 arab_spring.1.f: "Первое домино упало."
 arab_spring.1.a: "Стой с движением"
 arab_spring.1.b: "Признайте обиды, но призывайте к спокойствию"

 arab_spring.2.t: "Зараза приходит"
 arab_spring.2.d: "Новости от [ROOT.GetCountry.GetName] пришли с ударной силой. Спутниковые каналы транслировали сцены из [ROOT.GetCapital.GetName] в гостиные по всему региону, и то, что люди видели, что-то взволновало. Лидер ИГ в [ROOT.GetCountry.GetName] публично выражает сочувствие протестующим, и режим должен решить, как реагировать на это доморощенное эхо иностранной весны."
 arab_spring.2.f: "Идеи не уважают границы."
 arab_spring.2.a: "Пусть вдохновение свободно распространяется"
 arab_spring.2.b: "Осудить иностранное вмешательство"

 arab_spring.3.t: "Новые голоса несогласия"
 arab_spring.3.d: "Протесты дали смелость голосам, которые ранее молчали. Цифры, которые когда-то держали свои реформистские симпатии в секрете, теперь говорят открыто — в университетах, в мечетях, в социальных сетях. Режим не может легко заставить замолчать их всех без мучеников."
 arab_spring.3.f: "Несогласие, однажды произнесенное вслух, трудно не выразить."
 arab_spring.3.a: "Превратить реформиста в лидера"
 arab_spring.3.b: "Пусть агитаторы действуют, но сохраняют лидерство изолированным"
 arab_spring.3.a.tt: "Новый либеральный лидер появится в [scope:inspired_ig.GetName]."

 arab_spring.4.t: "Волна распространяется"
 arab_spring.4.d: "Протестное движение в [ROOT.GetCountry.GetName] вступило в контакт с оппозиционными сетями через границу. Молодые активисты делятся тактикой, лозунгами и организационными моделями в социальных сетях в режиме реального времени. Вопрос в том, будет ли [ROOT.GetCountry.GetName] активно поощрять это распространение — или тихо позволить движению найти свой собственный путь."
 arab_spring.4.f: "Каждое восстание вдохновляет на следующее."
 arab_spring.4.a: "Активно обращайтесь к соседним оппозиционерам"
 arab_spring.4.b: "Сосредоточьтесь — не противодействуйте соседним режимам"

 arab_spring.5.t: "Подземные сети"
 arab_spring.5.d: "Поскольку протестное движение не может поддерживать открытые демонстрации перед лицом репрессий, организаторы ушли в подполье. Сотовые сети распространяют брошюры, координируют забастовки и картографируют лояльную инфраструктуру. Беспорядки распространяются — медленно, но неуклонно — далеко от столицы."
 arab_spring.5.f: "Огонь горит там, где его не видно."
 arab_spring.5.a: "В провинциях вспыхивают беспорядки"
 arab_spring.5.b: "Беспорядки достигают самой столицы"

 arab_spring.6.t: "Эра заканчивается"
 arab_spring.6.d: "Арабская весна — этот необычный сезон народных восстаний — прошёл свой путь в [ROOT.GetCountry.GetName]. Удалось ли это или было подавлено, выполнило ли оно свои обещания или было предано, мир, который оно оставляет, — это не тот мир, который оно нашло. Жалобы, которые заставляли людей выходить на улицы, не были разрешены. На них только ответили — пока."
 arab_spring.6.f: "История не прощает нерешенных вопросов."
 arab_spring.6.a: "Глава закрывается"
 arab_spring.6.a.tt: "Арабская весна закончилась. Все вовлеченные страны будут уведомлены."

 # ==========================================
 # EVENTS 7–10 (additional keys)
 # ==========================================

 arab_spring.7.f: "Революция была украдена."
 arab_spring.7.a: "Новый порядок служит вере — примите его."
 arab_spring.7.b: "Стабильность превыше всего — примите результат"

 arab_spring.71.f: "Самая трудная революция — та, которой нужно управлять."
 arab_spring.71.a: "Нажмите на полную демократическую реформу"
 arab_spring.71.b: "Консолидируйтесь осторожно — празднуйте, а затем управляйте"

 arab_spring.8.t: "Приказ восстановлен"
 arab_spring.8.d: "Восстание в [ROOT.GetCountry.GetName] было нарушено. Силы безопасности, дополненные, где это необходимо, лояльными военизированными формированиями и разведывательными подразделениями в штатском, разогнали последние лагеря протеста. Известные оппозиционные деятели были арестованы или бежали в изгнание. Государственные СМИ уже переписывают нарратив, называя протесты «вдохновленной извне мятежом».\n\n Арабская весна пришла и ушла от [ROOT.GetCountry.GetName]. То, что он оставил после себя — в горечи, в памяти, в неразрешенной обиде — будет иметь значение в течение длительного времени."
 arab_spring.8.f: "Молчание не то же самое, что мир."
 arab_spring.8.a: "Порядок восстановлен - празднуем"
 arab_spring.8.b: "Тихое облегчение — двигаться без триумфа"

 arab_spring.9.t: "Улицы заговорили"
 arab_spring.9.d: "Столица восстает. Протестующие взяли под контроль [scope:relevant_state.GetName], и силы безопасности раздроблены — подразделения отказывают в приказах, офицеры дезертируют, а власть режима скользит по часам. [scope:ruler_scope.GetName] сталкивается с невозможным выбором: уступить или перерасти в полную конфронтацию с людьми.\n\n Революция здесь. Теперь вопрос в том, какую форму он принимает."
 arab_spring.9.f: "Улица заговорила. Кто ответит?"
 arab_spring.9.a: "Примите революцию — полный демократический переход"
 arab_spring.9.b: "Переговоры о частичном переходе — голосование по переписи как компромисс"
 arab_spring.9.c: "Fight On — Push Гражданская война"

 arab_spring.10.t: "Арабская зима наступает"
 arab_spring.10.d: "Революция удалась, по крайней мере, на первом этапе. У него новое правительство, новые законы и новая надежда. Но тяжелая борьба только начинается. Силы реакции, традиции и религии не были побеждены — они наблюдали, организовывали и ждали.\n\n Приближается арабская зима. Заморозит ли она революцию или похоронит ее полностью, будет зависеть от того, что произойдет дальше."
 arab_spring.10.f: "Каждая весна должна встретить свою зиму."
 arab_spring.10.a: "Встретиться лицом к лицу с контрреволюцией"
 arab_spring.10.b: "Подготовьте оборонительные позиции — готовьтесь к ответной реакции"

 # Tooltip keys for arab_spring.10
 arab_winter_tt: "Начинается арабская зима — новая запись в журнале, отслеживающая борьбу между реформистами и контрреволюционными силами."
 arab_winter_counter_revolution_bonus_tt: "Новое правительство приняло оборонительные меры. Контрреволюционные силы столкнутся с более организованным сопротивлением."

