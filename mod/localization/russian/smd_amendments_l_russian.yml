l_russian:

 # ==========================================
 # UNITED STATES
 # ==========================================

 amendment_medicaid: "Медицина"
 amendment_medicaid_desc: "Федеральное и финансируемое государством медицинское страхование для американцев с низким доходом, пожилых людей и инвалидов. Медпомощь заполняет пробел, оставленный частными рынками, охватывая тех, кто не может позволить себе премии, и тех, чьи условия делают их незастрахованными. Программа является дорогостоящей и политически спорной, но ее последствия снижения смертности измеримы и реальны."

 amendment_affordable_care_act: "Закон о доступной медицинской помощи"
 amendment_affordable_care_act_desc: "Закон о доступном медицинском обслуживании, известный неофициально как Obamacare, требует, чтобы все граждане имели медицинскую страховку, создавали регулируемые рынки для частного покрытия и расширяли право на получение медицинской помощи. Страховщики не могут отказать в покрытии по ранее существовавшим условиям. Индивидуальный мандат является весьма спорным. Сторонники утверждают, что это единственный способ заставить страховые рынки функционировать. Оппоненты называют это чрезмерным вмешательством правительства в частные экономические решения."

 amendment_federal_assault_weapons_ban: "Федеральный запрет на штурмовое оружие"
 amendment_federal_assault_weapons_ban_desc: "Десятилетний федеральный запрет на производство указанного полуавтоматического оружия и высокопроизводительных журналов для гражданской продажи. Запрет оспаривается — его эффективность оспаривается оппонентами, его необходимость аргументируется сторонниками. Он истекает через десять лет, если не возобновляется. Политическая коалиция, прошедшая ее, хрупка, и оружейное лобби уже готовит свой ответ."

 amendment_authorization_military_force: "Разрешение на использование военной силы"
 amendment_authorization_military_force_desc: "Разрешение на использование военной силы предоставляет исполнительной власти широкие полномочия для использования военной силы против тех, кто несет ответственность за террористические атаки на [ROOT.GetCountry.GetName], и тех, кто укрывал их. Язык намеренно широк. Ученые-юристы будут десятилетиями спорить о его пределах или о том, есть ли у него какие-либо ограничения. На практике это снижает дипломатические издержки односторонних военных действий и расширяет охват на международной арене."

 amendment_patriot_act: "Патриотический акт"
 amendment_patriot_act_desc: "«Объединение и укрепление Америки путем предоставления соответствующих инструментов, необходимых для перехвата и пресечения терроризма», — известный как «Патриотический акт», — резко расширяет внутренние органы надзора. Правоохранительные органы могут контролировать коммуникации, отслеживать финансовые транзакции и обмениваться разведданными между агентствами с меньшим количеством судебных проверок, чем раньше. Смута и революционное давление падают. Сторонники гражданских свобод описывают это как наиболее значительное разрушение конституционной конфиденциальности в истории [ROOT.GetCountry.GetName]."

 amendment_crime_bill_1994: "Закон о борьбе с насильственными преступлениями и правоприменении"
 amendment_crime_bill_1994_desc: "Закон о преступлениях 1994 года является самым крупным уголовным законодательством в истории [ROOT.GetCountry.GetName]. Он финансирует десятки тысяч новых полицейских, расширяет федеральную тюремную систему, вводит обязательные минимальные наказания за ряд преступлений и создает Закон о насилии в отношении женщин в качестве всадника. Смятение падает. Общины, в наибольшей степени контролируемые ею, будут иметь другой взгляд на ее наследие."

 # ==========================================
 # CHINA
 # ==========================================

 amendment_china_tax_reform_1994: "Реформа системы налогообложения"
 amendment_china_tax_reform_1994_desc: "Налоговая реформа 1994 года заменила корпоративную фискальную систему, в которой местные органы власти договаривались о соглашениях о разделе доходов с Пекином, национальным налогом на добавленную стоимость и формальной формулой распределения доходов. Реформа резко централизовала фискальную власть. Пекин получил надежный и растущий поток доходов. Местные органы власти потеряли свободу действий, но получили ясность. Это основа современной фискальной архитектуры [ROOT.GetCountry.GetName]."

 amendment_one_child_policy: "Политика одного ребенка"
 amendment_one_child_policy_desc: "Государство обеспечивает ограничение в размере одного ребенка на семью путем сочетания финансовых стимулов, социального давления и в некоторых случаях принудительного вмешательства. Уровень рождаемости резко падает. В течение следующих десятилетий [ROOT.GetCountry.GetName] будет быстро стареть, и рабочая сила будет сокращаться. Эта политика осуществляется наиболее строго в городских районах и наиболее неравномерно в сельских. Международное сообщество и внутренние критики выступают против его методов."

 amendment_socialist_market_economy: "Социалистическая рыночная экономика"
 amendment_socialist_market_economy_desc: "Социалистическая рыночная экономика является теоретической основой, в рамках которой действует рыночный механизм, в то время как партия сохраняет окончательное экономическое и политическое направление. Частное предпринимательство разрешено и поощряется в пределах, установленных государством. Иностранные инвестиции приветствуются избирательно. Противоречия реальны и преднамеренны — структура предназначена для использования эффективности рынка без отказа от партийного контроля. Это работает, по-своему."

 # ==========================================
 # FRANCE
 # ==========================================

 amendment_35_hour_work_week: "35-часовая рабочая неделя"
 amendment_35_hour_work_week_desc: "Законы Обри предписывают 35-часовую рабочую неделю для большинства сотрудников, сокращая стандартные часы с 39. Эта политика представлена как способ более широкого распределения работы среди населения — меньшее количество часов на одного работника, больше работающих. Профсоюзы празднуют. Работодатели утверждают, что это увеличивает затраты и снижает гибкость. Дебаты о том, действительно ли это увеличивает занятость или просто перераспределяет существующую работу, не будут быстро разрешены."

 amendment_pasqua_law: "Закон Паскуа"
 amendment_pasqua_law_desc: "Закон Паскуа значительно ужесточает иммиграционные правила — ужесточает требования к натурализации, уменьшает права на воссоединение семьи, расширяет основания для депортации и новые ограничения на право оставаться для тех, кто въехал незаконно. Министр внутренних дел Чарльз Паскуа считает, что это вопрос национального порядка и культурной согласованности. Критики утверждают, что это преднамеренный отказ от традиции убежища и включения. Закон проходит при значительной общественной поддержке и значительных протестах."

 amendment_medicaid_modifier: "Медицина"
 amendment_medicaid_modifier_desc: "Федеральное медицинское страхование покрывает малообеспеченных граждан. Смертность снижается, особенно среди беднейших слоев населения."

 amendment_affordable_care_act_modifier: "Обама"
 amendment_affordable_care_act_modifier_desc: "Обязательная частная медицинская страховка с субсидиями и существующими защитными мерами. Смертность падает незначительно; расходы растут для работодателей со средним доходом и государства."

 amendment_federal_assault_weapons_ban_modifier: "Федеральный запрет на штурмовое оружие"
 amendment_federal_assault_weapons_ban_modifier_desc: "Запрещается гражданское производство и продажа указанного полуавтоматического оружия. Радикализация незначительно снижается."

 amendment_authorization_military_force_modifier: "Разрешение на использование военной силы"
 amendment_authorization_military_force_modifier_desc: "Широкая исполнительная власть, применяющая военную силу против негосударственных субъектов, снижает дипломатические издержки вмешательства и расширяет декларируемые интересы."

 amendment_patriot_act_modifier: "Патриотический акт"
 amendment_patriot_act_modifier_desc: "Расширенные органы внутреннего надзора подавляют беспорядки и революционную деятельность. Легитимность и дипломатическая репутация получили скромный удар."

 amendment_crime_bill_1994_modifier: "1994 Преступный Билл"
 amendment_crime_bill_1994_modifier_desc: "Расширение полиции и обязательные минимумы уменьшают беспорядки. Смертность от правоприменения выросла незначительно. Бюджет находится под давлением."

 amendment_china_tax_reform_1994_modifier: "Реформа системы налогообложения"
 amendment_china_tax_reform_1994_modifier_desc: "Централизованная система налога на добавленную стоимость улучшает финансовые доходы и сокращает отходы. Власть незначительно улучшается."

 amendment_one_child_policy_modifier: "Политика одного ребенка"
 amendment_one_child_policy_modifier_desc: "Государственные ограничения рождаемости резко снизили рождаемость. Популяция [ROOT.GetCountry.GetName] будет значительно стареть в ближайшие десятилетия."

 amendment_socialist_market_economy_modifier: "Социалистическая рыночная экономика"
 amendment_socialist_market_economy_modifier_desc: "Рыночные механизмы, действующие под партийным руководством, стимулируют частное строительство, улучшают пропускную способность и расширяют промышленные инвестиции. Сократилась поддержка коммунистического движения."

 amendment_35_hour_work_week_modifier: "35-часовая рабочая неделя"
 amendment_35_hour_work_week_modifier_desc: "Установленные законом ограничения на продолжительность рабочего времени значительно улучшили условия труда. Пропускная способность незначительно снижается. Профсоюзы довольны, работодатели - нет."

 amendment_pasqua_law_modifier: "Закон Паскуа"
 amendment_pasqua_law_modifier_desc: "Ужесточение иммиграционных требований привело к усилению ограничений и снижению миграционной тяги. Культурное признание неродного населения упало."
