 CB_POLICY_4_TOOLTIP: "#bold Расширенный #!\n#tooltip_separator! \n #header #!@red_cross! Пропускная способность коммерческого банка: #red -5% #! @red_cross! Финансовый район Пропускная способность: #green 5% #! \n #header Полный резерв:#!\n @green_checkmark! Процентная ставка: #red +1% #! @green_checkmark! Создание максимальных денежных резервов: #green +12,5% #!"
