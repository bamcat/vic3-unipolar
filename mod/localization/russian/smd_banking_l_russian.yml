 # Fractional Reserve variants
 CB_POLICY_1_FRAC: "#bold Центральный банк значительно ужесточает условия кредитования.\n\n@red_cross! Банковская пропускная способность #b+10%#! \n @red_cross! Финансовый район Пропускная способность #b-10%#!"
 CB_POLICY_2_FRAC: "#bold Сокращение — Дробный резерв#!\n#tooltip_separator!\n Центральный банк применяет умеренное ужесточение условий кредитования.\n\n@red_cross! Пропускная способность банка #b+5%#!\n@red_cross! Пропускная способность финансового района #b-5%#!"
 CB_POLICY_3_FRAC: "#bold Нейтральный — фракционный резерв#!\n#tooltip_separator!\n Центральный банк не занимает активной позиции. Модификаторы не применяются."
 CB_POLICY_4_FRAC: "#bold Экспансионное — Дробный резерв#!\n#tooltip_separator!\n Центральный банк облегчает условия кредитования для стимулирования кредитования.\n\n@green_checkmark! Пропускная способность банка #b-5%#!\n@green_checkmark! Пропускная способность финансового района #b+5%#!"
 CB_POLICY_5_FRAC: "#bold Наиболее экспансионистский — Дробный резерв#!\n#tooltip_separator!\n Центральный банк агрессивно стимулирует финансовый сектор.\n\n@green_checkmark! Пропускная способность банка #b-25%#!\n@green_checkmark! Пропускная способность финансового округа #b+25%#!"

 # Full Reserve variants
 CB_POLICY_1_FULL: "#bold Наибольшее сокращение — Полный резерв #!\n#tooltip_separator!\n Резервные требования максимизируются, резко снижая доступность кредитов.\n\n@green_checkmark! Кредитная процентная ставка #b-1%#!\n@green_checkmark! Денежные резервы #b+25%#!"
 CB_POLICY_2_FULL: "#bold Сокращение — Полный резерв#!\n#tooltip_separator!\n Требования к резервам ужесточаются умеренно.\n\n@green_checkmark! Кредитная процентная ставка #b-0,5%#!\n@green_checkmark! Денежные резервы #b+12,5%#!"
 CB_POLICY_3_FULL: "#bold Нейтральный — Полный резерв #!\n#tooltip_separator!\n Резервные требования остаются на минимальном уровне. Никаких дополнительных модификаторов не применялось."
 CB_POLICY_4_FULL: "#bold Расширение — Полный резерв #!\n#tooltip_separator!\n Резервные требования смягчаются, чтобы позволить большее кредитование.\n\n@red_cross! Кредитная процентная ставка #b+0,5%#!\n@red_cross! Денежные резервы #b-12,5%#!"
 CB_POLICY_5_FULL: "#bold Наибольшее расширение — Полный резерв #!\n#tooltip_separator!\n Требования к резервам сведены к минимуму для максимизации кредитоспособности.\n\n@red_cross! Кредитная процентная ставка #b+1%#!\n@red_cross! Cash Reserves #b-25%#!"

