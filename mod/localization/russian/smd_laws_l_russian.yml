l_russian:
 law_jihad:0 "джихадизм"
 law_jihad_desc:0 "Джихадистские вооруженные силы имеют явно религиозную цель в своей практике, обучении и организации."
 law_mixed_healthcare:0 "Смешанная система здравоохранения"
 law_mixed_healthcare_desc:0 "Здоровье населения управляется как частными, так и государственными планами медицинского страхования. Правительственные планы предлагаются нашим малообеспеченным гражданам для решения рыночных проблем частного медицинского страхования."
 law_affirmative_action:0 "Позитивные действия"
 law_affirmative_action_desc:0 "Различные меры защиты меньшинств стали обязательными. Это включает в себя котировки и различные системы для поощрения их участия в нашей нынешней системе, правовой защите и денежном финансировании."
 
 lawgroup_firearms:0 "Владение огнестрельным оружием"
 lawgroup_firearms_desc:0 "Вопросы, касающиеся права на ношение оружия."
 
 lawgroup_abortions:0 "Аборты"
 lawgroup_abortions_desc:0 "Разрешено или нет нашим гражданам делать аборты."
 
 lawgroup_unions:0 "профсоюзы"
 lawgroup_unions_desc:0 "Вопросы, касающиеся способности наших рабочих создавать профсоюзы."
 
 lawgroup_homosexuality:0 "Гомосексуализм"
 lawgroup_homosexuality_desc:0 "Вопросы, касающиеся движения ЛГБТК+ в нашей стране."
 
 law_canton_system:0 "Изоляционизм"
 
 law_unrestricted_firearms:0 "Неограниченное огнестрельное оружие"
 law_unrestricted_firearms_desc:0 "Наша страна является домом для крупной оружейной промышленности, созревшей для гражданского использования."
 
 law_licensed_firearms:0 "Лицензируемое огнестрельное оружие"
 law_licensed_firearms_desc:0 "Гражданам нужна лицензия на владение оружием в нашей стране."
 
 law_banned_firearms:0 "Запрещенное огнестрельное оружие"
 law_banned_firearms_desc:0 "Гражданское использование огнестрельного оружия строго запрещено."
 
 law_banned_unions:0 "Запрещенные союзы"
 law_banned_unions_desc:0 "Работникам не разрешается объединяться с целью получения пособий на рабочем месте."
 
 law_restricted_unions:0 "Ограниченные союзы"
 law_restricted_unions_desc:0 "Рабочим разрешено создавать профсоюзы, с некоторыми ограничениями, предназначенными для защиты наших инвесторов."
 
 law_unrestricted_unions:0 "Неограниченные союзы"
 law_unrestricted_unions_desc:0 "Работникам в полной мере рекомендуется объединяться в профсоюзы и добиваться полной выгоды для своего труда."
 
 law_banned_abortions:0 "Запрещены аборты"
 law_banned_abortions_desc:0 "Убийство детей строго запрещено нашими законами."
 
 law_restricted_abortion:0 "Ограниченные аборты"
 law_restricted_abortion_desc:0 "Гражданам разрешается делать аборты, когда жизнь матери находится под угрозой, или в случаях изнасилования и инцеста."
 
 law_unrestricted_abortions:0 "Неограниченные аборты"
 law_unrestricted_abortions_desc:0 "Граждане могут свободно осуществлять свое право на аборт по своему усмотрению."
 
 law_active_oppression:0 "Активное подавление"
 law_active_oppression_desc:0 "Граждане, которые открыто идентифицируют себя как члены ЛГБТ-сообщества, подвергаются угнетению, тюремному заключению или даже убиваются."
 
 law_restricted_lgbtq:0 "Криминализованная гомосексуальность"
 law_restricted_lgbtq_desc:0 "Гражданам грозит тюремное заключение за то, что они геи."
 
 law_decriminalized_gays:0 "Декриминализованная гомосексуальность"
 law_decriminalized_gays_desc:0 "Гражданам разрешается вступать в гомосексуальные отношения, конечно, за закрытыми дверями. Гомосексуальные отношения не будут санкционированы государством."
 
 law_gay_marriage:0 "Однополый брак"
 law_gay_marriage_desc:0 "Государство обязано санкционировать все виды браков, независимо от того, являются ли инициаторы однополыми."
 
  # immigration
  institution_immigration:0 "Иммиграционный контроль"
  institution_immigration_desc:0 "A government body has been formed to curb or encourage immigration into our country as we see fit.
  # dei

  institution_diversity_equity_inclusion:0 "Разнообразие, справедливость и инклюзивность"
  institution_diversity_equity_inclusion_desc:0 "Государственный департамент, который фокусируется на предоставлении обездоленным справедливой почвы в обществе."
  
  # spies
  
  institution_intelligence_agency:0 "Разведывательное управление"
  institution_intelligence_agency_desc:0 "Разведывательные агентства несут ответственность за тайные операции по всему миру."
  
  # laws below may be defunct.
  
  
  # New Laws Any Group
 law_equal_rights:0 "Равные права"
 law_equal_rights_desc:0 "Женщины могут рассчитывать на тот же уровень прав, что и их коллеги-мужчины."
 law_prison_slavery:0 "Тюремное рабство"
 law_prison_slavery_desc:0 "Заключенные и преступники вынуждены работать в течение долгих часов, практически не получая зарплату."
 law_restricted_police:0 "Ограниченная полиция"
 law_restricted_police_desc:0 "Полицейские полномочия были ограничены и подчиняются строгим правилам для обеспечения безопасности граждан, которых они готовы защищать."
 law_resettlement_enticement:0 "Заманчивое переселение"
 law_resettlement_enticement_desc:0 "В правительстве действуют программы, побуждающие людей переезжать на свои территории."
 
 # Rights of Minorities Group
 
 lawgroup_rights_of_minorities:0 "Права меньшинств"
 lawgroup_rights_of_minorities_desc:0 "Правовые положения и защита меньшинств."
 
 law_no_minority_rights:0 "Права меньшинств не"
 law_no_minority_rights_desc:0 "Меньшинства всех типов не будут пользоваться теми же правами, что и население в целом."
 law_segregation:0 "Законы о сегрегации"
 law_segregation_desc:0 "Меньшинства будут испытывать степень отделения от общего населения, часто получая объедки и остатки."
 law_apartheid:0 "Законы об апартеиде"
 law_apartheid_desc:0 "Меньшинства не будут испытывать того же самого общества общего населения, и часто будут удалены или перемещены (часто насильственно) в назначенную «землю»."
 law_unfulfilled_protections:0 "Невыполненная защита"
 law_unfulfilled_protections_desc:0 "Государство предпринимает усилия по устранению барьеров для меньшинств, но законы, регулирующие права меньшинств, остаются в значительной степени невыполненными."
 law_limited_protections:0 "Ограниченная защита"
 law_limited_protections_desc:0 "Меньшинства, принадлежащие к другой этнической или национальной принадлежности, будут пользоваться теми же правами, что и население в целом."
 law_encompassing_protections:0 "Охватывающая защита"
 law_encompassing_protections_desc:0 "Меньшинства, принадлежащие к другой этнической или национальной принадлежности, и инвалиды получат все права и защиту, которыми пользуется население в целом."
 law_universal_protections:0 "Универсальная защита"
 law_universal_protections_desc:0 "Все меньшинства, независимо от их этнической принадлежности, национальности, способностей, сексуальности или гендерной идентичности, получат те же права, которыми пользуется население в целом."
 
 # Union Laws Group
 
 lawgroup_union_laws:0 "Законы Союза"
 lawgroup_union_laws_desc:0 "Предрасположенность руководящего органа к профсоюзным действиям, таким как забастовки, забастовки, протесты, беспорядки и т. Д."
 law_unions_outlawed:0 "Запрещенное единство"
 law_unions_outlawed_desc:0 "Профсоюзы запрещены в этой стране, и преступники получат быстрое сопротивление."
 law_useless_unions:0 "Бесполезная бюрократия"
 law_useless_unions_desc:0 "Профсоюзы — это не что иное, как рабочая бюрократия, у которой нет необходимости функционировать и бороться без внешних сил."
 law_limited_action:0 "Ограниченное действие"
 law_limited_action_desc:0 "Профсоюзы сильно ограничены в том, чего им разрешено достичь, и им часто приходится преодолевать юридические лазейки, чтобы быть эффективными."
 law_craft_unions:0 "Ремесленные союзы"
 law_craft_unions_desc:0 "Профсоюзы ограничены в своих конкретных ролях и не имеют права навязывать союзу другие роли."
 law_permitted_unions:0 "Разрешенные действия"
 law_permitted_unions_desc:0 "Профсоюзы не являются ни законными, ни незаконными, они могут функционировать так, как им заблагорассудится, но практически не имеют защиты от руководящего органа."
 law_enterprise_unions:0 "Предприятия"
 law_enterprise_unions_desc:0 "Профсоюзы существуют для повышения эффективности работы своих сотрудников и сосредоточения внимания на потребностях своих членов. Они эффективно улучшают жизнь своих членов с помощью необходимых средств."
 law_backed_unions:0 "Поддерживаемая защита"
 law_backed_unions_desc:0 "Профсоюзы эффективно поддерживаются общественностью и закрепились как часть культуры стран. У них есть защита со стороны народа, и им предоставляется правовая защита для забастовки."
 law_empowered_unions:0 "Расширение прав и возможностей Союза"
 law_empowered_unions_desc:0 "Профсоюзы усилены полицией и имеют поддержку правительства. Эти профсоюзы способны эффективно выполнять свои требования, и при любых обстоятельствах их защищают и поощряют."
 
 # Corporate Authority Group
 
 lawgroup_corporate_authority:0 "Корпоративный орган"
 lawgroup_corporate_authority:0 "Правовые нормы в отношении корпораций и нелепо богатых включают в себя правила их политической власти и контроля, которые они способны осуществлять."
 law_completely_unregulated:0 "Полностью нерегулируемый"
 law_completely_unregulated_desc:0 "Действия корпораций и действия нелепо богатых ничем не сдерживаются. Часто в ущерб рабочим и людям, живущим там."
 law_political_lobbying:0 "Политическое лобби"
 law_political_lobbying_desc:0 "Любой человек с достаточно большой суммой средств может лоббировать правительство и оказывать на него давление с целью изменения законов в свою пользу."
 law_tax_haven:0 "Налоговая гавань"
 law_tax_haven_desc:0 "Корпорации и частные лица с абсурдным богатством считаются желанными гостями, и руководящий орган ввел законы, благоприятствующие им с меньшими налогами и большим количеством земли."
 law_feign_ignorance:0 "Притворное невежество"
 law_political_lobbying_desc:0 "Правящий орган решает сделать как можно меньше, чтобы ограничить власть корпораций и нелепо богатых, делая вид, что это не проблема."
 law_limited_restrictions:0 "Ограниченное ограничение"
 law_limited_restrictions_desc:0 "Активы корпораций и абсурдно богатых облагаются налогом независимо от того, находятся ли они в деньгах или удерживаются в инвестициях и акциях."
 law_progressive_restrictions:0 "Прогрессивное ограничение"
 law_progressive_restrictions_desc:0 "Любые активы абсурдно богатых и все прибыли корпораций, реализованные или не реализованные, облагаются налогом и используются для улучшения благосостояния населения по прогрессивной ставке."
 law_no_one_individual:0 "Ни один человек"
 law_no_one_individual_desc:0 "Абсурдно богатые обязаны налоговой системе руководящего органа, если они хотят вести там бизнес. Их богатство, созданное в стране, уменьшается и распределяется среди нуждающегося населения."
 law_corporate_redistribution:0 "Корпоративное перераспределение"
 law_corporate_redistribution_desc:0 "Любое богатство, созданное нелепо богатыми или корпорациями, уменьшается до максимально допустимой суммы. Затем это богатство перераспределяется по мере необходимости. Корпорации передаются общественности и состоят из совета, включающего выборных должностных лиц."
 
 law_serfdom:0 "Невыполненные трудовые права"
 law_serfdom_desc:0 "Либо нет установленных трудовых прав, либо установленные трудовые права полностью не соблюдаются."
 law_serfdom_banned:0 "Минимальная защита"
 law_serfdom_banned_desc:0 "Установлен минимальный уровень защиты."
 
 lawgroup_drug_regulations: "Регулирование наркотиков"
 lawgroup_drug_regulations_desc: "Правовой статус опьяняющих веществ — от полного запрета до полной легализации оборота. Наркополитика формирует смертность, государственную власть, расходы на правоприменение и силу сельскохозяйственных и преступных интересов."

 law_total_prohibition: "Тотальный запрет"
 law_total_prohibition_desc: "Все опьяняющие вещества, включая алкоголь и табак, запрещены законом. Государство претендует на моральный авторитет, чтобы регулировать то, что граждане вкладывают в свои тела, при поддержке религиозных и консервативных институтов. Черные рынки процветают в тех пробелах, которые невозможно заполнить."

 law_alcohol_tobacco_legal: "Алкоголь и табак легальны"
 law_alcohol_tobacco_legal_desc: "Алкоголь и табак законны и облагаются налогом. Все остальные вещества запрещены. Это базовая правовая база для большинства современных государств — прагматичный компромисс между экономическими интересами и моральным консерватизмом."

 law_marijuana_decriminalization: "Декриминализация марихуаны"
 law_marijuana_decriminalization_desc: "Личное владение и употребление каннабиса больше не является уголовным преступлением. Торговля остается незаконной, но правоприменение перенаправляется на более твердые вещества. Эта политика отражает растущий консенсус в отношении того, что лишение свободы не является эффективным ответом на употребление наркотиков в рекреационных целях."

 law_hard_drugs_decriminalized: "Декриминализация тяжелых наркотиков"
 law_hard_drugs_decriminalized_desc: "Владение всеми контролируемыми веществами, включая опиаты, кокаин и амфетамины, рассматривается как вопрос общественного здравоохранения, а не как уголовное дело. Пользователи обращаются к лечению, а не к преследованию. Эта политика является спорной, но данные, полученные от ранних последователей, свидетельствуют о том, что она снижает смертность от передозировки и освобождает ресурсы правоохранительных органов."

 law_safe_injection_sites: "Сайты безопасных инъекций"
 law_safe_injection_sites_desc: "Финансируемые правительством учреждения позволяют потребителям употреблять наркотики под медицинским наблюдением. Персонал может назначать лекарства от передозировки и подключать пользователей к программам лечения. Уровень смертности значительно падает. Религиозная и консервативная оппозиция ожесточена — политика рассматривается как принятие и даже разрешение употребления наркотиков."

 law_trafficking_allowed: "Допускается торговля людьми"
 law_trafficking_allowed_desc: "Торговля контролируемыми веществами полностью легализована и регулируется государством. Экономические выгоды являются немедленными и существенными — доходы от наркотиков поступают в формальную экономику и налоговую базу. Репутационные и социальные последствия серьезны. Большая часть мира будет рассматривать это как капитуляцию перед преступными сетями."

 law_total_prohibition_modifier: "Тотальный запрет"
 law_alcohol_tobacco_legal_modifier: "Алкоголь и табак легальны"
 law_marijuana_decriminalization_modifier: "Декриминализация марихуаны"
 law_hard_drugs_decriminalized_modifier: "Декриминализация тяжелых наркотиков"
 law_safe_injection_sites_modifier: "Сайты безопасных инъекций"
 law_trafficking_allowed_modifier: "Допускается торговля людьми"
 
 lawgroup_disability_rights: "Права инвалидов"
 lawgroup_disability_rights_desc: "Правовая база, регулирующая права граждан-инвалидов — от голого признания до активной государственной поддержки через лечение, инфраструктуру и интеграцию на рабочем месте. Более всеобъемлющие рамки расширяют участие рабочей силы, улучшают уровень жизни и снижают смертность, повышая стоимость для государства и работодателей."

 law_minimal_recognition: "Минимальное признание"
 law_minimal_recognition_desc: "Государство признает, что инвалиды существуют, но не предоставляет им жилья, поддержки или правовой защиты. Инвалиды в значительной степени исключены из официальной занятости и общественной жизни. Человеческие издержки значительны; фискальные издержки незначительны."
 
 law_workplace_accommodations: "Проживание на рабочем месте"
 law_workplace_accommodations_desc: "Работодатели по закону обязаны вносить разумные коррективы, чтобы позволить инвалидам участвовать в рабочей силе — модифицированное оборудование, скорректированные обязанности, доступные рабочие места. Эта политика приводит значимое население к продуктивной занятости. Работодатели несут расходы на корректировку, но рабочая сила расширяется."
 
 law_anti_ableist_architecture: "Антиаблистская архитектура"
 law_anti_ableist_architecture_desc: "Общественные здания, транспортные сети и инфраструктура должны быть доступны для инвалидов. Рампы, подъемники, тактильная тротуарная плитка, доступные вывески — физическая среда уже не должна исключать. Модернизация существующей инфраструктуры стоит дорого. Население, которое может полноценно участвовать в жизни общества, значительно расширяется."
 
 law_public_treatments: "Общественное обращение"
 law_public_treatments_desc: "Государство финансирует медицинские процедуры, вспомогательные устройства, протезы, терапию и текущие вспомогательные услуги для инвалидов, а не благотворительность. Смертность значительно падает. Уровень жизни растет по всему населению. Расходы на государственный бюджет значительны и продолжаются, но аргумент о том, что некоторые граждане имеют меньше прав на государственную поддержку, чем другие, официально отвергнут."
 
 law_minimal_recognition_modifier: "Минимальное признание инвалидности"
 law_minimal_recognition_modifier_desc: "Инвалиды не получают жилья от государства. Эффективная рабочая сила сокращается, а смертность выше, чем могла бы быть."
 
 law_workplace_accommodations_modifier: "Проживание на рабочем месте"
 law_workplace_accommodations_modifier_desc: "Работодатели обязаны принимать инвалидов. Рабочая сила является более широкой и более инклюзивной, при умеренных затратах на повышение производительности."
 
 law_anti_ableist_architecture_modifier: "Доступная инфраструктура"
 law_anti_ableist_architecture_modifier_desc: "Общественная инфраструктура стала доступной. Стоимость строительства выше, поскольку здания соответствуют стандартам доступности, но население, которое может в полной мере участвовать в жизни общества, значительно больше."
 
 law_public_treatments_modifier: "Лечение общественных инвалидов"
 law_public_treatments_modifier_desc: "Государство финансирует лечение и поддержку инвалидов. Смертность снижается, уровень жизни улучшается, а доступ к образованию шире — за значительные и текущие государственные расходы."
 
 institution_environmental_protection: "Агентство по охране окружающей среды"
 institution_environmental_protection_desc: "Государственное учреждение, занимающееся мониторингом и соблюдением экологических стандартов. Каждый уровень инвестиций представляет собой расширенный правоприменительный потенциал, более строгие правила и более широкие программы по сохранению окружающей среды."
 
 lawgroup_environmental_regulations: "Экологические правила"
 lawgroup_environmental_regulations_desc: "Правовая база, регулирующая отношения [ROOT.GetCountry.GetName] с природной средой — от нерегулируемой промышленной эксплуатации до конституционно гарантированных прав природы. Более прогрессивные рамки снижают загрязнение, снижают смертность и защищают экосистемы, увеличивая затраты на промышленную производительность и государственные расходы."
 
 law_no_environmental_regulations: "Никаких правил"
 law_no_environmental_regulations_desc: "Промышленность работает без экологических ограничений. Заводы, шахты и фермы могут загрязнять, извлекать и эксплуатировать без юридических ограничений. Выход максимизирован. Долгосрочные издержки — в смертности, деградации экосистем и общественном здравоохранении — несет население, а не производители."
 
 law_game_law: "Игровое право"
 law_game_law_desc: "Охота и рыболовство регулируются, чтобы предотвратить крах популяции дичи. Защищенные сезоны, лицензированная охота и ограничения на самые разрушительные методы добычи. Она служит интересам тех, кто достаточно богат, чтобы охотиться в рекреационных целях, но она устанавливает принцип, что государство заинтересовано в управлении природными ресурсами."
 
 law_national_recycling: "Национальная переработка"
 law_national_recycling_desc: "Национальная программа сбора и переработки перерабатываемых отходов. Промышленные и бытовые отходы сортируются, извлекаются и повторно используются там, где это возможно, уменьшая объем материала, поступающего на свалку и водные пути. Ресурсная эффективность незначительно повышается. Загрязнение снижается. Программа требует координации между муниципалитетами и отраслями."
 
 law_protection_agency: "Агентство защиты"
 law_protection_agency_desc: "Специальное правительственное учреждение, уполномоченное устанавливать, контролировать и обеспечивать соблюдение экологических стандартов во всех секторах экономики. Пределы выбросов, ограничения землепользования, правила промышленных отходов и охраняемые природные территории — все это входит в сферу его компетенции. В это агентство можно инвестировать — каждый дополнительный уровень финансирования расширяет его правоприменительный потенциал и еще больше снижает загрязнение окружающей среды."
 
 law_guaranteed_rights_of_nature: "Гарантированные права природы"
 law_guaranteed_rights_of_nature_desc: "Реки, леса, водно-болотные угодья и экосистемы имеют законное право не разрушаться, не загрязняться и не эксплуатироваться сверх их способности к восстановлению. Эти рамки представляют собой наиболее амбициозное экологическое законодательство, основанное на новых правовых традициях в странах, которые начали рассматривать природу как субъект прав, а не объект собственности. Значительно ограничена промышленная деятельность. Загрязнение резко падает. Агентство по охране окружающей среды работает с максимальной эффективностью."
 
 law_no_environmental_regulations_modifier: "Нерегулируемая промышленность"
 law_no_environmental_regulations_modifier_desc: "Нет экологических ограничений для промышленности. Пропускная способность растет, но загрязнение и смертность, как следствие, растут."
 
 law_game_law_modifier: "Игровое право"
 law_game_law_modifier_desc: "Регулируемая охота и рыболовство незначительно сократили деградацию окружающей среды. Минимальное, но реальное вмешательство."
 
 law_national_recycling_modifier: "Национальная программа утилизации"
 law_national_recycling_modifier_desc: "Национальная программа рециркуляции направлена на сокращение образования отходов и восстановления материалов, скромное улучшение загрязнения и эффективности строительства."
 
 law_protection_agency_modifier: "Агентство по охране окружающей среды"
 law_protection_agency_modifier_desc: "Агентство по охране окружающей среды устанавливает ограничения на выбросы и промышленные стандарты. Загрязнение падает, и учреждение может быть дополнительно инвестировано в расширение своего охвата."
 
 law_guaranteed_rights_of_nature_modifier: "Гарантированные права природы"
 law_guaranteed_rights_of_nature_modifier_desc: "Природе был предоставлен конституционный статус. Промышленность сталкивается со значительными ограничениями, но загрязнение резко сокращается, смертность падает, а продовольственная безопасность улучшается по мере защиты экосистем."
 
 # Institution modifier names
 country_institution_cost_institution_environmental_protection_mult: "Затраты на охрану окружающей среды"
 country_institution_environmental_protection_max_investment_add: "Агентство по охране окружающей среды Max Investment"
 country_institution_size_change_speed_institution_environmental_protection_mult: "Агентство по охране окружающей среды увеличивает скорость"
 
 # ==========================================
 # LAWGROUP
 # ==========================================
 
 lawgroup_subsidized_housing: "Субсидируемое жилье"
 lawgroup_subsidized_housing_desc: "Степень, в которой государство финансирует, строит и гарантирует жилье своим гражданам. Более прогрессивные рамки расширяют производство недвижимости в городских центрах, улучшают инфраструктуру и увеличивают миграционную тягу — при росте благосостояния и бюджетных затрат."
 
 # ==========================================
 # LAWS
 # ==========================================
 
 law_no_public_housing: "Общественного жилья нет"
 law_no_public_housing_desc: "Государство не оказывает жилищной поддержки. Укрытие - это частное дело - куплено, арендовано или ушло без. Рынок городского жилья работает без вмешательства общественности, и все, что рынок производит, это то, что получают граждане."
 
 law_housing_projects: "Жилищные проекты"
 law_housing_projects_desc: "Государство строит базовое высокоплотное государственное жилье в городских районах — башенные блоки, жилые ряды, функциональное и дешевое. Качество не всегда высокое и места не всегда желательны, но жилье есть. Городские центры теперь могут производить дополнительную недвижимость через государственные строительные программы."
 
 law_public_housing_program: "Государственная жилищная программа"
 law_public_housing_program_desc: "Комплексная государственная программа жилищного строительства со стандартами проектирования, смешанного использования и активного городского планирования. Правительство не просто строит укрытия, оно формирует город. Городские центры производят значительно больше недвижимости по мере расширения сектора государственного строительства, а инфраструктура улучшается в результате лучшего городского планирования."
 
 law_universal_housing: "Универсальное жилье"
 law_universal_housing_desc: "Жилье является гарантированным правом. Государство финансирует, строит и поддерживает жилье для каждого гражданина, который в нем нуждается — без тестирования, без зависимости от рынка, без чего-либо. Финансовые затраты значительны и продолжаются. Городские центры производят максимальный объем недвижимости. Города, запланированные вокруг всеобщего доступа, привлекают миграцию и улучшают инфраструктуру по всем направлениям."
 
 law_no_public_housing_modifier: "Общественного жилья нет"
 law_no_public_housing_modifier_desc: "Государство не оказывает жилищной поддержки. Рынок городского жилья полностью частный."
 
 law_housing_projects_modifier: "Жилищные проекты"
 law_housing_projects_modifier_desc: "Ведется базовое государственное жилищное строительство. Расходы на социальное обеспечение растут незначительно, поскольку государство субсидирует жилищный фонд."
 
 law_public_housing_program_modifier: "Государственная жилищная программа"
 law_public_housing_program_modifier_desc: "Комплексная программа государственного жилья расширяет предложение городской недвижимости и улучшает городскую инфраструктуру при значительных текущих затратах."
 
 law_universal_housing_modifier: "Универсальное жилье"
 law_universal_housing_modifier_desc: "Жилье является гарантированным правом. Расходы на социальное обеспечение высоки, но городская инфраструктура улучшается, миграция привлекается, а производство недвижимости максимизируется."
 
 institution_central_bank: "Центральный банк"
 institution_central_bank_desc: "Государственный валютный орган, который управляет денежной массой, устанавливает резервные требования и контролирует процентные ставки. Каждый уровень инвестиций ужесточает денежно-кредитную политику, ограничивая производство коммерческих кредитов, но расширяя потолок национального долга и повышая базовую процентную ставку. Центральный банк является механизмом, с помощью которого государство осуществляет прямой контроль над финансовой системой."
 
 lawgroup_central_banking: "Центральный банк"
 lawgroup_central_banking_desc: "Правовая база, регулирующая денежную систему [ROOT.GetCountry.GetName] — от отсутствия центрального денежного органа до полного государственного контроля денежной массы. Выбор банковской структуры определяет, как производятся кредиты и ценные бумаги и что государство может заимствовать."
 
 law_no_central_bank: "Нет центрального банка"
 law_no_central_bank_desc: "Нет центрального денежного органа. Банки действуют самостоятельно, устанавливая собственные коэффициенты резервов и кредитную политику. Денежная масса не координируется, и у государства нет механизма управления процентными ставками или условиями кредитования. Это нестабильный механизм, от которого отошли большинство современных экономик."
 
 law_fractional_reserve_banking: "Фракционный резервный банкинг"
 law_fractional_reserve_banking_desc: "Банки обязаны держать только часть своих депозитов в качестве резервов, предоставляя оставшуюся часть в экономику. Это расширяет денежную массу — финансовые районы производят больше ценных бумаг, поскольку через систему проходит многократный капитал, но производство коммерческого кредита несколько разбавлено кредитным плечом. Это стандарт для большинства современных экономик."
 
 law_full_reserve_banking: "Полный резервный банкинг"
 law_full_reserve_banking_desc: "Банки должны иметь 100% депозитов в качестве резервов, без частичного кредитования. Становится доступным институт ЦБ, позволяющий государству напрямую управлять денежно-кредитной политикой. Каждый уровень инвестиций Центрального банка повышает базовую процентную ставку на 1% и увеличивает максимальный кредитный лимит на 5%. Кредитная продукция коммерческих банков более стабильна. Производство ценных бумаг в финансовых районах падает, поскольку кредитное плечо удаляется из системы."

 law_no_central_bank_modifier: "Нет центрального банка"
 law_no_central_bank_modifier_desc: "Центрального денежного органа не существует. Денежная масса неуправляема."
 
 law_fractional_reserve_banking_modifier: "Фракционный резервный банкинг"
 law_fractional_reserve_banking_modifier_desc: "Фракционное резервное кредитование расширяет денежную массу. Производство ценных бумаг растет; производство коммерческих кредитов скромно сокращается из-за эффекта кредитного плеча."
 
 law_full_reserve_banking_modifier: "Полный резервный банкинг"
 law_full_reserve_banking_modifier_desc: "Действуют полные резервные требования. Кредитное производство стабильно и выше. Производство ценных бумаг сокращается. Учреждение Центрального банка доступно для управления процентными ставками и потолком государственного долга."
 
 institution_central_bank_modifier: "Центральный банк"
 institution_central_bank_modifier_desc: "Центральный банк активно управляет денежно-кредитной политикой. Каждый уровень инвестиций ужесточает кредитное предложение, повышает процентную ставку на 1% и увеличивает максимальный кредитный лимит на 5%."
 
 country_max_credit_limit_mult: "Максимальный кредитный лимит"
 country_institution_cost_institution_central_bank_mult: "Стоимость Центрального банка"
 country_institution_central_bank_max_investment_add: "Центральный банк Max Investment"
 country_institution_size_change_speed_institution_central_bank_mult: "Скорость расширения Центрального банка"
 building_group_bg_banking_throughput_add: "Пропускная способность банков"
 
 lawgroup_media_regulations: "Регламент СМИ"
 lawgroup_media_regulations_desc: "Правовая база, регулирующая информационную среду [ROOT.GetCountry.GetName] — от полностью нерегулируемых СМИ до контролируемой государством инфраструктуры связи. Более регулируемые структуры подавляют радикализацию политического движения и увеличивают государственную власть, в то время как нерегулируемая среда усиливает движения и ослабляет власть правительства в информационном пространстве."
 
 law_fully_unregulated_media: "Полностью нерегулируемый"
 law_fully_unregulated_media_desc: "Нет никакого регулирования СМИ или информационной среды. Новостные издания, онлайн-платформы и сети связи работают без какого-либо государственного надзора. Дезинформация распространяется свободно. Политические движения процветают в шуме. У государства нет механизма для формирования или управления информацией, которую потребляют его граждане, и нет полномочий, полученных от контроля над ней."
 
 law_digital_rights: "Цифровые права"
 law_digital_rights_desc: "Основные правовые гарантии регулируют информационную среду — гарантии конфиденциальности, антицензурные положения, законы о свободе информации. Граждане имеют законные средства правовой защиты от некоторых злоупотреблений в средствах массовой информации, но информационное пространство остается по существу свободным. Политические движения все еще находят благодатную почву. [ROOT.GetCountry.GetName] получает скромную репутационную выгоду от того, что является уважающим права государством."
 
 law_fairness_doctrine: "Доктрина справедливости"
 law_fairness_doctrine_desc: "Средства массовой информации по закону обязаны предоставлять сбалансированное освещение политических вопросов, предоставляя время и пространство для различных точек зрения, а не платформируя только одну. Самые крайние политические голоса теряют свой мегафон. Рекрутинг радикальных движений ослабевает. Государство позиционирует себя как справедливого арбитра, а не участника информационной войны, и получает авторитет от роли."
 
 law_government_content_moderators: "Модераторы правительственного контента"
 law_government_content_moderators_desc: "Государство активно модерирует онлайн-контент, удаляя дезинформацию, экстремистские материалы и контент, которые считаются вредными или дестабилизирующими. Политические движения теряют значительный охват, поскольку их наиболее эффективный материал для вербовки подавляется. Власть растет. Международное сообщество и внутренние критики свободы прессы отметят эту политику, и престиж [ROOT.GetCountry.GetName] пострадает соответственно."
 
 law_state_wifi: "Государственный WiFi"
 law_state_wifi_desc: "Государство напрямую управляет инфраструктурой связи. Доступ к Интернету является государственной услугой, полностью принадлежит, управляется и контролируется правительством. Информационная среда является государственным ресурсом — то, что граждане читают, смотрят и делятся, проходит через инфраструктуру. [ROOT.GetCountry.GetRuler.GetLastName] государственный контроль. Радикализация политического движения практически полностью подавлена. Стоимость, финансовая и репутационная, существенна."
 
 law_fully_unregulated_media_modifier: "Полностью нерегулируемые СМИ"
 law_fully_unregulated_media_modifier_desc: "Неуправляемая информационная среда усиливает политические движения и ослабляет государственную власть."
 
 law_digital_rights_modifier: "Цифровые права"
 law_digital_rights_modifier_desc: "Основные правовые гарантии регулируют информационную среду. Политические движения по-прежнему процветают, но [ROOT.GetCountry.GetName] получает некоторый престиж от своей позиции, уважающей права."
 
 law_fairness_doctrine_modifier: "Доктрина справедливости"
 law_fairness_doctrine_modifier_desc: "Сбалансированные требования к освещению в СМИ ослабляют вербовку радикальных движений и повышают легитимность государства."
 
 law_government_content_moderators_modifier: "Умеренность государственного контента"
 law_government_content_moderators_modifier_desc: "Активная модерация государственного содержания существенно подавляет радикализацию политического движения ценой престижа и легитимности."
 
 law_state_wifi_modifier: "Контролируемые государством коммуникации"
 law_state_wifi_modifier_desc: "[ROOT.GetCountry.GetName] непосредственно управляет инфраструктурой связи. Радикализация политического движения практически полностью подавлена. Власть высока. Страдает международная репутация."
 
 institution_courts: "Судебная система"
 institution_courts_desc: "Формальная судебная система, действующая через установленные суды и юридическую процедуру. Каждый уровень инвестиций расширяет охват судебной системы — больше судей, больше судов, более последовательное исполнение закона. Смятение падает, поскольку споры разрешаются по юридическим каналам, принятие закона становится более последовательным, и революционные движения находят правовой аппарат государства труднее преодолеть."
 
 lawgroup_judiciary: "Судебная власть"
 lawgroup_judiciary_desc: "Правовая философия, лежащая в основе судебной системы [ROOT.GetCountry.GetName] — как разрешаются споры, кто обладает юридической властью и какова цель правосудия. Выбор судебной власти формирует авторитет, легитимность, дипломатическое положение и стабильность общественного порядка."
 
 law_inquisitive_judiciary: "любознательный"
 law_inquisitive_judiciary_desc: "Государство расследует, преследует и судит — судебная власть является рычагом государственной власти, а не независимым институтом. Судьи являются агентами короны или правительства, которым поручено найти истину и обеспечить соблюдение закона от имени государства. Власть высока, и принятие государственной политики более гладко, но надлежащая правовая процедура слаба, и население знает это."
 
 law_customary_judiciary: "обычный"
 law_customary_judiciary_desc: "Споры разрешаются с помощью традиционных общинных норм, племенных советов, арбитража старейшин и местных обычаев. Нет формальных судов — правосудие осуществляется теми, кого сообщество признает своими властями, в соответствии с правилами, которые сообщество признает законными. Государство имеет ограниченный охват этой системы. Общины стабильны, верны своим традициям и устойчивы к внешним потрясениям."
 
 law_religious_judiciary: "Религиозное право"
 law_religious_judiciary_desc: "Священное Писание, религиозная юриспруденция и толкования церковных властей регулируют судопроизводство. Набожные получают огромную политическую власть как арбитры того, что означает закон и как он применяется. Религиозная легитимность глубоко укоренилась среди верующих. Те, кто вне веры или кто интерпретирует ее по-другому, могут найти систему менее гостеприимной."
 
 law_restorative_judiciary: "восстановительный"
 law_restorative_judiciary_desc: "Целью правосудия является не наказание, а восстановление — возмещение вреда, причиненного жертвам, реабилитация правонарушителей и реинтеграция в общество. Суды сосредоточены на посредничестве, примирении и исцелении сообщества. Смятение падает. Смертность от конфликтов снижается. Лоялисты растут. Государство отказывается от некоторой власти в обмен на население, которое доверяет системе, в которой оно живет."
 
 law_adversarial_judiciary: "состязательный"
 law_adversarial_judiciary_desc: "Обвинение и защита оспариваются независимым судьей или присяжными. Презумпция невиновности защищена. Правовое положение равно независимо от социального положения. Государство связано теми же правилами, что и его граждане. Международный престиж [ROOT.GetCountry.GetName] значительно повышается. Независимая судебная система ограничивает действия правительства, но правительство, которое может быть ограничено законом, — это то, которому население может доверять."
 
 law_inquisitive_judiciary_modifier: "Пытливая судебная система"
 law_inquisitive_judiciary_modifier_desc: "Судебная власть действует как рычаг государственной власти. Проведение политики проще, а беспорядки подавляются, но надлежащая правовая процедура слаба, а радикальное давление под поверхностью реально."
 
 law_customary_judiciary_modifier: "Обычное право"
 law_customary_judiciary_modifier_desc: "Традиционное общественное правосудие обеспечивает глубокую легитимность и социальную стабильность. Формальная власть государства ограничена, но доверие населения к системе является подлинным."
 
 law_religious_judiciary_modifier: "Религиозное право"
 law_religious_judiciary_modifier_desc: "Церковная власть управляет законом. Набожные [ROOT.GetCountry.GetAdjective] обладают огромной политической властью. Глубокая лояльность среди верующих и растущее недовольство среди тех, кто находится за ее пределами."
 
 law_restorative_judiciary_modifier: "Восстановительное правосудие"
 law_restorative_judiciary_modifier_desc: "Система правосудия фокусируется на реабилитации и примирении. Смятение и смертность падают, лоялисты растут, и [ROOT.GetCountry.GetName] завоевывает международное уважение к своему гуманному подходу."
 
 law_adversarial_judiciary_modifier: "состязательная судебная система"
 law_adversarial_judiciary_modifier_desc: "Независимая судебная система, функционирующая на основе надлежащей правовой процедуры и равного положения перед законом. Легитимность и престиж высоки. Государственная власть проверяется, но эта проверка делает систему надежной."
 
 institution_courts_modifier: "Судебная власть"
 institution_courts_modifier_desc: "Созданная судебная сеть уменьшает беспорядки, улучшает принятие законов и подавляет революционный импульс. Каждый дополнительный уровень расширяет охват судов через [ROOT.GetCountry.GetName]."
 
 country_institution_cost_institution_courts_mult: "Стоимость судебной системы"
 country_institution_courts_max_investment_add: "Судебная система Max Investment"
 country_institution_size_change_speed_institution_courts_mult: "Скорость расширения судебной системы"
 
 law_privatized_preschool_education:0 "Приватизированное дошкольное образование"
 law_privatized_preschool_education_desc:0 "Обучение детей младшего возраста осуществляется на регулируемом частном рынке. Поставщики конкурируют за регистрацию, при этом государство устанавливает минимальные стандарты, но оставляет доставку независимым операторам. Доступ в основном зависит от доходов домашних хозяйств, хотя субсидии могут компенсировать часть бремени для семей с более низким доходом."

 law_universal_childcare:0 "Универсальный детский сад"
 law_universal_childcare_desc:0 "Государство гарантирует доступный уход за детьми для всех семей независимо от дохода. Государственно финансируемые учреждения доступны по всей стране, что позволяет родителям участвовать в трудовой деятельности и гарантирует, что развитие детей раннего возраста не зависит от средств семьи."

 law_legal_protections:0 "Правовая защита"
 law_legal_protections_desc:0 "Государство кодифицировало формальное юридическое равенство между мужчинами и женщинами, закрепляя защиту от дискриминации в сфере занятости, собственности и общественной жизни. Права, которые ранее были обычными или выборочно соблюдались, теперь подкреплены силой закона."

 law_structural_egalitarianism:0 "Структурный эгалитаризм"
 law_structural_egalitarianism_desc:0 "Правительство вышло за рамки правового равенства, чтобы активно демонтировать институциональные структуры, которые увековечивают гендерное неравенство. Представительство в государственных учреждениях, профессиях и гражданских институтах является обязательным, и государство играет активную роль в обеспечении равных результатов, а не просто равных прав."

 law_matriarchy:0 "матриархат"
 law_matriarchy_desc:0 "Женщины занимают доминирующее положение в политической и социальной структуре страны. Женщины составят подавляющее большинство руководящих должностей."

 law_disability_cheques:0 "Чеки инвалидности"
 law_disability_cheques_desc:0 "Государство оказывает регулярную финансовую поддержку гражданам, нетрудоспособным по причине инвалидности или хронического заболевания. Платежи управляются через аппарат социального обеспечения и предназначены для обеспечения минимального уровня жизни для тех, кто не работает."

 law_student_coverage:0 "отпуск по беременности и родам"
 law_student_coverage_desc:0 "Женщинам предоставляется покрытие на беременность."

 law_universal_basic_income:0 "Универсальный базовый доход"
 law_universal_basic_income_desc:0 "Каждый гражданин получает безусловную периодическую выплату от государства, независимо от статуса занятости или средств. Политика представляет собой фундаментальное переосмысление отношений между трудом, благосостоянием и экономическим участием, гарантируя пол, под который никто не может упасть, повышая минимальные ожидания от всей работы."
 
 law_universal_college:0 "Универсальный колледж"
 law_universal_college_desc:0 "Государство гарантирует доступ к высшему образованию для всех граждан независимо от происхождения или средств. Университеты и колледжи финансируются государством, и их места открыты для заслуг, а не для богатства, создавая более образованную рабочую силу и более информированное население."

 education_laws.1.t:0 "Кто платит за степень?"
 education_laws.1.d:0 "Приверженность универсальному колледжу вызвала немедленный и острый вопрос у фискальных консерваторов: кто именно будет платить за это? Финансирование высшего образования для каждого гражданина, который его ищет, представляет собой значительное увеличение государственных расходов, и противники громко высказывают свои возражения. Правительство должно решить, взять ли на себя обязательство по полному государственному финансированию или ввести модель, которая ограничивает бремя."
 education_laws.1.f:0 "Вопрос о том, кто платит за образование, всегда был вопросом о том, для кого образование."
 education_laws.1.a:0 "Полное государственное финансирование — высшее образование является общественным благом."
 education_laws.1.b:0 "Ввести проверенные на средства субсидии — финансировать бедных, а не богатых."

 education_laws.2.t:0 "Возражение Меритократии"
 education_laws.2.d:0 "Богатые интересы нашли свой предпочтительный аргумент против универсального колледжа: стандарты. Если каждый может присутствовать, предупреждают они, то степень становится бесполезной — институты подлинного совершенства будут тянуть вниз, чтобы приспособиться к неподготовленным. Правительство должно выбирать между принципиальной защитой всеобщего доступа или предложением караута, который сохраняет элитные институты наряду с общественной системой."
 education_laws.2.f:0 "Каждое расширение доступа было встречено одинаковым предупреждением о стандартах. Стандарты всегда выживают."
 education_laws.2.a:0 "Защищайте всеобщий доступ — превосходство не является прерогативой богатых."
 education_laws.2.b:0 "Сохранение элитных институтов наряду с всеобщим доступом."

 education_laws.3.t:0 "Интеллигенция говорит"
 education_laws.3.d:0 "Академическое сообщество вступило в дискуссию с характерной убежденностью. Универсальный колледж, утверждают они, является не просто социальным благом, а экономической необходимостью — нация, которая ограничивает высшее образование теми, кто может себе это позволить, — это нация, выбирающая преднамеренное невежество. Правительство должно решить, приглашать ли свой голос в законодательный спор или вести дебаты в строго политических терминах."
 education_laws.3.f:0 "Университет всегда был местом, где общества решали, какое будущее они хотят. Теперь он должен решить, кому позволено помочь его построить."
 education_laws.3.a:0 "Пригласите их в дискуссию — пусть ученые возглавят спор."
 education_laws.3.b:0 "Держите это политическим решением — ученые советуют, они не управляют."

 education_college_fiscal_resistance:0 "Фискальное сопротивление"
 education_college_fiscal_resistance_desc:0 "Фискальные консерваторы активно выступают против государственной стоимости универсального колледжа, задерживая процесс принятия закона и заставляя правительство оправдывать свои обязательства по расходам."

 education_college_public_funded:0 "Обязательство, финансируемое государством"
 education_college_public_funded_desc:0 "Правительство взяло на себя обязательство покрыть все расходы на всеобщее высшее образование, укрепив импульс принятия закона за значительные средства."

 education_college_meritocracy_debate:0 "Обсуждение Meritocracy"
 education_college_meritocracy_debate_desc:0 "Правительство публично защищало всеобщий доступ от заявлений о том, что он разбавит академические стандарты, изменив условия обсуждения законопроекта."

 education_college_elite_carveout:0 "Elite Carveout предлагается"
 education_college_elite_carveout_desc:0 "Было предложено сохранить элитные частные институты наряду с государственной системой, замедляя реализацию, но уменьшая богатую оппозицию."

 education_college_academic_endorsement:0 "Академическая поддержка"
 education_college_academic_endorsement_desc:0 "Интеллигенция публично одобрила универсальный колледж, предоставляя научный авторитет и организованную поддержку усилиям по принятию закона."

 education_college_elites_rebuked:0 "Элиты упрекают"
 education_college_elites_rebuked_desc:0 "Богатые интересы были публично оспорены на их аргументах меритократии, смущая их позицию, но обостряя их решимость."

 education_college_elites_appeased:0 "Элиты успокоились"
 education_college_elites_appeased_desc:0 "Предложение элитной институциональной выкройки смягчило богатую оппозицию универсальному колледжу."

 education_college_intelligentsia_engaged:0 "Интеллигенция вовлечена"
 education_college_intelligentsia_engaged_desc:0 "Ученые и исследователи активно выступают за всеобщее высшее образование, придавая интеллектуальное доверие усилиям по принятию закона."

 education_college_intelligentsia_sidelined:0 "Интеллигенция в стороне"
 education_college_intelligentsia_sidelined_desc:0 "Решение о том, чтобы не допустить ученых в законодательные дебаты, оставило интеллигенцию разочарованной и оторванной от правительственной образовательной программы."
