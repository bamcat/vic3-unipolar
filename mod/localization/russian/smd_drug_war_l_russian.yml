l_russian:

 l_russian:

 je_drug_trafficking:0 "Торговля наркотиками"
 je_drug_trafficking_reason:0 "Сети наркоторговли глубоко укоренились в политической и экономической жизни страны. Картели перемещают миллиарды по стране — коррумпируя чиновников, финансируя частные армии и заполняя вакуум, оставленный государством. Правительство [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName] стоит перед суровым выбором: работать с сетями, которые стали почти такими же мощными, как само государство, или тратить то, что власть остается, пытаясь их уничтожить. Это может быть достигнуто путем замедления потока наркотиков и изъятия оружия у преступных синдикатов."

 je_fighting_cartels:0 "Борьба с картелями"
 je_fighting_cartels_reason:0 "Сети незаконной торговли проникли внутрь. После нескольких лет неудачной политики правительство решило предпринять прямые военные действия против картелей. Генерал должен быть развернут, чтобы возглавить контркартельные операции. Это будет нелегко, и это не будет быстро."

 cartel_je_working_with_tt:0 "Правительство [ROOT.GetCountry.GetName] установило рабочее соглашение с картелями. Авторитет и легитимность выросли, но отношения несут огромный репутационный риск."
 cartel_je_cracking_down_tt:0 "Правительство активно борется с незаконным оборотом наркотиков. Кампания истощает авторитет, но улучшает международное положение [ROOT.GetCountry.GetName]."
 cartel_je_no_policy_tt:0 "Политика не была установлена. Используйте кнопки ниже, чтобы выбрать, как [ROOT.GetCountry.GetName] будет обрабатывать картели."
 cartel_fight_je_commander_needed_tt:0 "Ни один командир не был развернут. Используйте кнопку ниже, чтобы отправить генерала в поле."
 cartel_fight_je_commander_active_tt:0 "[SCOPE.sCharacter('cartel_general_storage').GetFullName] является ведущим контркартелем в [ROOT.GetCountry.GetName]."

 mdw_events.7:0 "Испытательный тест"
 
 cartel_button_cooperate_name:0 "Работа с картелями"
 cartel_button_cooperate_desc:0 "Установить рабочее соглашение с наркосетями. Мощное повышение авторитета, легитимности и защиты, но существенное позорище и напряженные отношения с [SCOPE.sCountry('c:USA').GetName]."

 cartel_button_crackdown_name:0 "Прекратить торговлю людьми"
 cartel_button_crackdown_desc:0 "Запустить активную кампанию против сетей наркоторговли. Затраты 200 авторитетов и запрет на торговлю опиумом, но улучшение международного положения и престижа."
 cartel_crackdown_authority_cost_tt:0 "Требуется 200 полномочий"

 cartel_button_stop_crackdown_name:0 "Приостановить разгон"
 cartel_button_stop_crackdown_desc:0 "Прекратить кампанию по борьбе с торговлей людьми, чтобы сохранить власть. Запрет на опиум будет снят, а международная добрая воля пострадает."

 cartel_button_deploy_general_name:0 "Развернуть командира"
 cartel_button_deploy_general_desc:0 "Выберите генерала для ведения контркартельных операций в [ROOT.GetCountry.GetName]."
 cartel_need_general_tt:0 "Требуется по крайней мере один доступный"

 cartel_suppression_bar:0 "Подавление картеля"
 cartel_suppression_bar_desc:0 "Прогресс подавления: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/100)"
 cartel_bar_general_active_tt:0 "Активные военные действия против картелей"
 cartel_bar_turmoil_tt:0 "Сильные беспорядки препятствуют операциям контркартеля в [ROOT.GetCountry.GetName]"
 cartel_bar_at_war_tt:0 "Военные ресурсы направляются на активную войну."

 # ==========================================
 # EVENTS
 # ==========================================

 # cartel.1 — Escobar Captured
 cartel.1.t:0 "Пабло Эскобар умер"
 cartel.1.d:0 "После многих лет охоты и насилия основатель и лидер картеля Медельина был отслежен в безопасном доме в Медельине и убит силами безопасности. Смерть Пабло Эскобара является самым значительным ударом, когда-либо нанесенным по торговле наркотиками [ROOT.GetCountry.GetAdjective] - конец одной эпохи и неопределенное начало другой.\n\n Картель Медельина разрушен. Но Картель Кали и другие будут двигаться, чтобы заполнить вакуум. Война еще не закончилась. Но эта битва была выиграна."
 cartel.1.f:0 "Самый разыскиваемый человек в мире умер."
 cartel.1.a:0 "[ROOT.GetCountry.GetName] нанес исторический удар по наркотерроризму"

 # cartel.2 — El Chapo Captured
 cartel.2.t:0 "Эль Чапо захвачен"
 cartel.2.d:0 "В драматическом рейде, скоординированном между силами безопасности и международной разведкой, Хоакин Эль Чапо Гусман — глава картеля Синалоа и самый могущественный наркобарон в мире — был захвачен. Арест является крупной победой для [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName] контркартельная кампания и значительный удар по операциям картеля Синалоа.\n\nEl Сейчас Чапо находится в центре максимальной безопасности. Остается ли он там - другое дело."
 cartel.2.f:0 "Самый разыскиваемый человек в Америке находится за решеткой."
 cartel.2.a:0 "Правосудие отбыто — пока"

 # cartel.3 — El Chapo Escapes
 cartel.3.t:0 "Эль Чапо сбежал"
 cartel.3.d:0 "Невозможное случилось. Хоакин «Эль Чапо» Гусман сбежал из тюрьмы строгого режима Альтиплано через туннель, вырытый непосредственно в его камере — инженерный подвиг, который занял месяцы и включал соучастие охранников, подрядчиков и должностных лиц на нескольких уровнях. Побег - это международное унижение. Правительство [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName] нанесло катастрофический удар по его авторитету. И где-то на территории [ROOT.GetCountry.GetAdjective] самый могущественный наркобарон в мире свободен."
 cartel.3.f:0 "Он всегда собирался сбежать. Вопрос только в том, когда."
 cartel.3.a:0 "Это возмутительно — головы покатятся"

 # cartel.4 — Mexico Turf Division
 cartel.4.t:0 "Картели делятся [ROOT.GetCountry.GetName]"
 cartel.4.d:0 "Годы неудачной или отсутствующей государственной политики оставили вакуум. Крупные организации картеля теперь — через насилие, переговоры и избирательную коррупцию местных властей — установили признанные территориальные сферы влияния на всей территории. CJNG контролирует центр и запад. Картель Персидского залива держит северо-восточное побережье. Картель Синалоа доминирует на северо-западе. Северо-восточный картель создал собственную территорию в Коауиле и Закатекасе. Государство [ROOT.GetCountry.GetAdjective] фактически уступило суверенитет над частями своей собственной страны.\n\n@warning! Этого не может быть."
 cartel.4.f:0 "Государство, которое не может защитить свою территорию, не является государством."
 cartel.4.a:0 "Мы должны вернуть то, что было потеряно."

 # cartel.5 — Assassination
 cartel.5.t:0 "Убийство картеля"
 cartel.5.d_crackdown:0 "Высокопоставленный полицейский или военный чиновник, возглавляющий контркартельскую кампанию, был убит — целенаправленное убийство, призванное запугать государство и сигнализировать, что картели могут связаться с кем угодно. Завтра похороны. Следствие уже выявило подозреваемых. Вопрос в том, является ли [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName] у правительства есть желание их преследовать."
 cartel.5.d_cooperation:0 "Конкурирующий картель убил одного из ключевых лейтенантов ваших криминальных партнеров, и ответный удар падает на правительство [ROOT.GetCountry.GetName]. Убийство было совершено среди бела дня в крупном городе. Становится невозможным делать вид, что государство не имеет ничего общего с теми, кто это сделал."
 cartel.5.d_default:0 "Видная фигура — политик, журналист или судья — была убита связанными с картелем боевиками в [ROOT.GetCountry.GetName]. Убийство наглое. Послание ясно: картели действуют без страха перед государством."
 cartel.5.f:0 "Безнаказанность - величайшее оружие картеля."
 cartel.5.a:0 "Мы найдем ответственных"

 # cartel.6 — Money Laundering
 cartel.6.t:0 "Отмывание денег картелем раскрыто"
 cartel.6.d_crackdown:0 "Подразделение финансовой разведки обнаружило доказательства того, что деньги картеля текут через законные предприятия - строительные компании, рестораны, автосалоны - в [ROOT.GetCountry.GetCapital.GetCityHubName]. Масштаб операции по отмыванию предполагает глубокое проникновение в формальную экономику. Следовать по тропе будет дорого, политически опасно и может привести к неудобным местам."
 cartel.6.d_cooperation:0 "Международные финансовые следователи отметили подозрительные транзакции, проходящие через учреждения с известными связями с правительством. Связь между [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName] администрирование и финансирование картеля становится все труднее скрыть. Это может стать серьезным дипломатическим инцидентом."
 cartel.6.d_default:0 "Журналисты-расследователи опубликовали доказательства масштабного отмывания денег через банковский сектор [ROOT.GetCountry.GetName] — предположительно, доходы картеля очищаются за счет инвестиций в недвижимость и бизнес. Центральный банк призывает провести расследование."
 cartel.6.f:0 "Грязные деньги есть везде, если знать, где искать."
 cartel.6.a:0 "Провести расследование, куда бы оно ни вело"
 cartel.6.b:0 "Стабильность банковского сектора должна быть защищена, оставьте ее."

 # cartel.7 — US Pressure
 cartel.7.t:0 "Вашингтон Смотреть"
 cartel.7.d:0 "[SCOPE.sCountry('c:USA').GetName] Госдепартамент официально запросил встречу с министром иностранных дел [ROOT.GetCountry.GetName]. Повестка дня, о которой сообщается в частном порядке, касается незаконного оборота наркотиков — в частности, оценка правительства о том, что [SCOPE.sCountry('c:USA').GetAdjective] не делает достаточно, чтобы нарушить поток наркотиков на север. Существует предположение, что помощь [SCOPE.sCountry('c:USA').GetAdjective] — финансовая, разведывательная и, возможно, военная — может быть оказана, если [ROOT.GetCountry.GetName] будет более активно сотрудничать."
 cartel.7.f:0 "[SCOPE.sCountry('c:USA').GetName] имеет рычаг. Вопрос в том, можно ли его использовать."
 cartel.7.a:0 "Примите сотрудничество [SCOPE.sCountry('c:USA').GetAdjective] — нам нужна поддержка"
 cartel.7.b:0 "Снижение — [ROOT.GetCountry.GetName] будет заниматься своими делами"

 # cartel.8 — Cartel Retaliation
 cartel.8.t:0 "Картели возмещают"
 cartel.8.d:0 "Репрессии пролили кровь, и теперь картели рисуют свои собственные. Скоординированная серия нападений через [ROOT.GetCountry.GetName] была направлена на полицейские участки, военные контрольно-пропускные пункты и гражданские районы в общинах, которые, как известно, поддерживают [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName] кампания. Атаки - это послание: картели нельзя уничтожить без цены. [ROOT.GetCountry.GetName] должен решить, как реагировать."
 cartel.8.f:0 "Каждый удар - это удар, приглашающий к возвращению."
 cartel.8.a:0 "Эскалация — нас не запугать"
 cartel.8.b:0 "Вернуться назад — Защита гражданского населения"

 # cartel.9 — Completion
 cartel.9.t:0 "Торговля наркотиками идет своим чередом"
 cartel.9.d_crackdown:0 "Кампания по подавлению достигла своих непосредственных целей. Рынок опиума значительно ужесточился, что является прямым следствием постоянного давления на сети незаконного оборота. Картели ослаблены. Международный статус [ROOT.GetCountry.GetName] улучшился. Бой еще далек от завершения, но этот раунд принадлежит государству."
 cartel.9.d_cooperation:0 "Договоренность выполнила то, что было обещано. Власть неповреждена, государственные функции, и картели, в основном, придерживаются своей стороны сделки. Вопрос о том, будет ли это управление или капитуляция, будет обсуждаться историками. Рынок опиума рассказывает свою историю."
 cartel.9.d_default:0 "Торговля наркотиками эволюционировала — к лучшему или к худшему — остается неясным. Опиумный рынок значительно отошел от базовой цены. Выбор, сделанный [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName] в этот период, определит, что будет дальше."
 cartel.9.f:0 "Любая политика заканчивается. Каждый выбор имеет последствия."
 cartel.9.a:0 "Глава закрывается"

 # cartel.100 — Timeout
 cartel.100.t:0 "Окно закрылось"
 cartel.100.d:0 "Годы безрезультатной политики в отношении незаконного оборота наркотиков [ROOT.GetCountry.GetName] не привели ни к серьезным репрессиям, ни к стабильному соглашению с наркосетями. Картели хорошо использовали время. Потребуется более прямой подход."
 cartel.100.f:0 "Бездействие — это выбор, и картели это знают."
 cartel.100.a:0 "Мы должны принять прямые меры"

 # cartel.10 — Escobar news for Americas
 cartel.10.t:0 "Пабло Эскобар умер"
 cartel.10.d:0 "Новости от [SCOPE.sCountry('c:CLM').GetName]: Пабло Эскобар, основатель Медельинского картеля и человек, который определил возраст наркотерроризма в Латинской Америке, был убит силами безопасности. Самый разыскиваемый человек в западном полушарии мертв. Последствия ряби в торговле наркотиками в регионе будут ощущаться годами."
 cartel.10.f:0 "Эпоха великого наркоторговца закончилась. Последующее может быть хуже."
 cartel.10.a:0 "Начинается новая эра"

 # ==========================================
 # CARTEL FIGHT EVENTS
 # ==========================================

 cartel_fight.0.t:0 "Кто возглавит кампанию против картелей?"
 cartel_fight.0.d:0 "Правительство [ROOT.GetCountry.GetName] приняло решение предпринять прямые действия против сетей картелей. Генерал должен быть выбран и развернут — тот, кто обладает компетенцией и желанием преследовать врага, который сражается грязно, прячется среди гражданских лиц и покупает чиновников так же легко, как покупает пули."
 cartel_fight.0.f:0 "Правильный подход меняет все."
 cartel_fight.0.a:0 "Развертывание [SCOPE.sCharacter('cartel_general_1').GetFullName]"
 cartel_fight.0.b:0 "Развертывание [SCOPE.sCharacter('cartel_general_2').GetFullName]"
 cartel_fight.0.c:0 "Развертывание [SCOPE.sCharacter('cartel_general_3').GetFullName]"

 cartel_fight.1.t:0 "Главный бюст картеля"
 cartel_fight.1.d:0 "[SCOPE.sCharacter('cartel_general').GetFullName] сообщает об успешной операции: была демонтирована крупная распределительная сеть картеля, изъято значительное количество наркотиков и арестован ряд фигур картеля среднего уровня. Это хорошая недельная работа. Импульсом является правительство [ROOT.GetCountry.GetName]."
 cartel_fight.1.f:0 "Прогресс уже достигнут."
 cartel_fight.1.a:0 "Поддерживайте давление"

 cartel_fight.2.t:0 "Войска попали в засаду"
 cartel_fight.2.d:0 "Подразделение под командованием [SCOPE.sCharacter('cartel_general').GetFullName] попало в засаду боевиков картеля в сельской местности. Нападение было хорошо скоординировано и предполагает, что картели имеют разведданные о военных передвижениях. Есть жертвы. Мораль пошатнулась."
 cartel_fight.2.f:0 "Картели сражаются, как армия, когда хотят."
 cartel_fight.2.a:0 "Перегруппироваться и продолжить"

 cartel_fight.3.t:0 "Информатор обеспечивает ключевой интеллект"
 cartel_fight.3.d:0 "Информатор, мотивированный деньгами, личным недовольством или страхом, предоставил [SCOPE.sCharacter('cartel_general').GetFullName] подробную информацию о безопасных домах картеля, маршрутах поставок и персонале. Эта информация позволяет провести ряд точных операций, которые значительно снижают оперативный потенциал картелей в регионе."
 cartel_fight.3.f:0 "Величайшая уязвимость картелей — друг друга."
 cartel_fight.3.a:0 "Действовать по разведке немедленно"

 cartel_fight.10.t:0 "Картели были разрушены"
 cartel_fight.10.d:0 "Кампания закончилась. [SCOPE.sCharacter('cartel_general').GetFullName] сообщает, что организованная деятельность картеля в [ROOT.GetCountry.GetName] была демонтирована до степени оперативной неактуальности. Ключевые фигуры мертвы или находятся под стражей. Сети фрагментированы. Государство восстановило свою территорию.\n\n Это была ужасная борьба. Но она была выиграна."
 cartel_fight.10.f:0 "Государство продемонстрировало, что может сделать, когда берет на себя обязательства."
 cartel_fight.10.a:0 "С трудом заработанная победа"

 # ==========================================
 # MODIFIERS
 # ==========================================

 cartel_cooperation_modifier:0 "Организация картеля"
 cartel_cooperation_modifier_desc:0 "Неявное соглашение с наркосетями принесло значительные ресурсы и стабильность к [ROOT.GetCountry.GetName] — с высокой ценой для легитимности и международной репутации."

 cartel_crackdown_modifier:0 "Антиторговая кампания"
 cartel_crackdown_modifier_desc:0 "[ROOT.GetCountry.GetName] активно преследует сети картелей. Власть потребляется, но международное положение улучшается, а торговля опиумом подавляется."

 cartel_crackdown_abandoned:0 "Заброшенный Crackdown"
 cartel_crackdown_abandoned_desc:0 "Кампания по борьбе с торговлей людьми [ROOT.GetCountry.GetName] приостановлена. Международное сообщество отметило этот разворот."

 cartel_escobar_captured:0 "Эскобар мертв"
 cartel_escobar_captured_desc:0 "Смерть Пабло Эскобара разрушила картель Медельина и трансформирует торговлю наркотиками. Международное положение [ROOT.GetCountry.GetName] значительно улучшилось."

 cartel_el_chapo_captured:0 "Эль Чапо захвачен"
 cartel_el_chapo_captured_desc:0 "Захват Хоакина Гусмана нанес значительный удар по картелю Синалоа и улучшил положение [ROOT.GetCountry.GetName] на международном уровне."

 cartel_el_chapo_escaped:0 "Эль Чапо сбежал"
 cartel_el_chapo_escaped_desc:0 "Бегство самого разыскиваемого наркобарона в мире из тюрьмы строгого режима - это катастрофический позор для тюрьмы строгого режима. [ROOT.GetCountry.GetRuler.GetLastName] правительство."

 cartel_narco_state:0 "Нарко государство"
 cartel_narco_state_desc:0 "Картельные организации установили эффективный территориальный контроль над значительными частями [ROOT.GetCountry.GetName]. Государство [ROOT.GetCountry.GetAdjective] утратило монополию на насилие в этих областях."

 cartel_cjng_controlled:0 "Территория CJNG"
 cartel_cjng_controlled_desc:0 "Халиско Картель нового поколения контролирует криминальную экономику этого штата. Насилие, вымогательство и картельное управление вытеснили государственную власть."

 cartel_gulf_controlled:0 "Картельская территория Персидского залива"
 cartel_gulf_controlled_desc:0 "Картель Персидского залива установил здесь территориальное господство. [ROOT.GetCountry.GetAdjective] Государственный орган является номинальным."

 cartel_sinaloa_controlled:0 "Картель Синалоа"
 cartel_sinaloa_controlled_desc:0 "Картель Синалоа установил здесь территориальное господство. Его влияние на местную экономику и правительство распространено."

 cartel_northeast_controlled:0 "Северо-восточная территория Картеля"
 cartel_northeast_controlled_desc:0 "Картель дель Норест установил здесь господство, вытеснив государственную власть с ее собственным насильственным управлением."

 cartel_crackdown_success:0 "Контр-Нарко Успех"
 cartel_crackdown_success_desc:0 "Большой успех в кампании по борьбе с торговлей людьми повысил легитимность и престиж правительства."

 cartel_assassination_aftermath:0 "Убийство картеля"
 cartel_assassination_aftermath_desc:0 "Широко известное убийство пошатнуло доверие общественности к [ROOT.GetCountry.GetName] и усилило беспорядки."

 cartel_laundering_investigation:0 "Расследование отмывания денег"
 cartel_laundering_investigation_desc:0 "Активное расследование отмывания денег картеля улучшает антикоррупционные полномочия [ROOT.GetCountry.GetName]."

 cartel_laundering_ignored:0 "Отмывание денег забыто"
 cartel_laundering_ignored_desc:0 "Решение о прекращении расследования отмывания денег вызвало удивление на международном уровне."

 cartel_us_cooperation_bonus:0 "Контрнаркотическое сотрудничество США"
 cartel_us_cooperation_bonus_desc:0 "Активное сотрудничество с антинаркотической программой [SCOPE.sCountry('c:USA').GetAdjective] принесло разведывательную поддержку и дипломатические выгоды [ROOT.GetCountry.GetName]."

 cartel_us_rejection:0 "Давление США отвергнуто"
 cartel_us_rejection_desc:0 "[ROOT.GetCountry.GetName] снизилось сотрудничество по борьбе с наркотиками [SCOPE.sCountry('c:USA').GetAdjective]. Внутренний авторитет сохраняется, но отношения с [SCOPE.sCountry('c:USA').GetName] охладились."

 cartel_retaliation_escalate:0 "Эскалация против картелей"
 cartel_retaliation_escalate_desc:0 "Решение об эскалации после картельного возмездия усилило беспорядки в [ROOT.GetCountry.GetName], но сигнализирует о решении правительства."

 cartel_retaliation_pullback:0 "Сдержанный ответ"
 cartel_retaliation_pullback_desc:0 "Правительство [ROOT.GetCountry.GetName] отступило, чтобы защитить гражданских лиц после картельного возмездия."

 cartel_fight_ambush:0 "Войска попали в засаду"
 cartel_fight_ambush_desc:0 "Боевики картеля устроили засаду на воинскую часть [ROOT.GetCountry.GetAdjective], что привело к жертвам и на мгновение замедлило контркартельную кампанию."

 cartel_fight_victory:0 "Сломанные картели"
 cartel_fight_victory_desc:0 "Военная кампания против картелей [ROOT.GetCountry.GetAdjective] увенчалась успехом. Сети раздроблены, восстановлена государственная власть."
 
 # ==========================================
 # JOURNAL ENTRIES
 # ==========================================
 
 je_mexican_drug_war:0 "Мексиканская война с наркотиками"
 je_mexican_drug_war_reason:0 "Картели разделили [ROOT.GetCountry.GetName] между собой. CJNG, Картель Залива, Картель Синалоа и Картель дель Норесте контролируют каждую территорию, где правительственный приказ слаб или отсутствует. Отрасли замедлились. Люди уходят. Насилие носит эндемический характер.\n\n Правительство [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName] еще не взяло на себя обязательство непосредственно противостоять картелям. Но ситуацию нельзя оставлять на неопределенный срок — территория картеля все еще расширяется, и каждый месяц бездействия усложняет расплату."
 
 je_us_mexico_drug_war_support:0 "Поддержка Мексики"
 je_us_mexico_drug_war_support_desc:0 "[SCOPE.sCountry('c:MEX').GetName] ведет экзистенциальную борьбу против наркокартелей, захвативших контроль над значительной частью страны. [ROOT.GetCountry.GetName] имеет прямой интерес к результату: поток наркотиков на север, стабильность южной границы и целостность состояния [SCOPE.sCountry('c:MEX').GetAdjective] - все на кону.\n\n Подписание соглашения о военной помощи с [SCOPE.sCountry('c:MEX').GetName] обеспечит ресурсы, разведданные и легитимность [SCOPE.sCountry('c:MEX').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCountry('c:MEX').GetRuler.GetLastName] правительство — и углубить двусторонние отношения способами, которые выходят далеко за рамки войны с наркотиками."
 
 # Status descriptions
 mdw_je_not_declared_tt:0 "Правительство [ROOT.GetCountry.GetName] еще не объявило войну картелям. Ситуация ухудшается — сети картелей активно расширяют свой территориальный контроль. Используйте кнопку ниже, чтобы включить [ROOT.GetCountry.GetAdjective] в кампанию."
 mdw_je_commander_needed_tt:0 "Война была объявлена. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName] должен теперь развернуть командира для ведения операций на территории, удерживаемой картелями."
 mdw_je_active_tt:0 "[SCOPE.sCharacter('mdw_commander_storage').GetFullName] ведет операции против картелей [ROOT.GetCountry.GetAdjective]. Территория картеля все еще оспаривается — все контролируемые государства должны быть очищены до того, как война будет объявлена выигранной."
 
 us_mdw_je_no_pact_tt:0 "Соглашение о военной помощи не было подписано с [SCOPE.sCountry('c:MEX').GetName]. Перейдите на экран дипломатии, чтобы предложить договор о военной помощи с [SCOPE.sCountry('c:MEX').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCountry('c:MEX').GetRuler.GetLastName] правительство."
 us_mdw_je_pact_active_tt:0 "Соглашение о военной помощи действует с [SCOPE.sCountry('c:MEX').GetName]. [ROOT.GetCountry.GetAdjective] Поддержка помогает поддерживать [SCOPE.sCountry('c:MEX').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCountry('c:MEX').GetRuler.GetLastName] контркартельскую кампанию."
 
 # ==========================================
 # SCRIPTED BUTTONS
 # ==========================================
 
 mdw_button_declare_war_name:0 "Объявить войну картелям"
 mdw_button_declare_war_desc:0 "Привлеките военных к прямой кампании против сетей картелей. Стоит 100 авторитетов и начинает кампанию против картеля всерьез. Бары не будут двигаться, пока не будет сделано это заявление."
 
 mdw_button_deploy_commander_name:0 "Развернуть командира"
 mdw_button_deploy_commander_desc:0 "Выберите генерала для ведения контркартельных операций на территории [ROOT.GetCountry.GetAdjective]."
 mdw_need_general_tt:0 "Требуется по крайней мере один доступный"
 
 # ==========================================
 # PROGRESS BARS
 # ==========================================
 
 mdw_suppression_bar:0 "Прогресс кампании"
 mdw_suppression_bar_desc:0 "Операция Прогресс: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/100)"
 
 mdw_peril_bar:0 "Командор Перри"
 mdw_peril_bar_desc:0 "Операционная опасность: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#!"
 
 mdw_bar_commander_active_tt:0 "Активные [ROOT.GetCountry.GetAdjective] военные операции"
 mdw_bar_multiple_states_tt:0 "Многократные картельные состояния — операции [ROOT.GetCountry.GetAdjective] распределены тонко"
 mdw_bar_us_aid_tt:0 "[SCOPE.sCountry('c:USA').GetAdjective] военная помощь обеспечивает разведывательную и материально-техническую поддержку"
 mdw_bar_excess_authority_tt:0 "Сильный государственный потенциал ускоряет кампанию"
 mdw_bar_legitimacy_tt:0 "Высокая общественная поддержка поддерживает боевой дух [ROOT.GetCountry.GetAdjective]"
 mdw_bar_good_commander_tt:0 "Тактическое мастерство командира ускоряет операции"
 mdw_bar_at_war_tt:0 "Военные ресурсы направляются на активную войну."
 mdw_bar_turmoil_tt:0 "Высокая национальная нестабильность препятствует [ROOT.GetCountry.GetAdjective] кампания"
 mdw_peril_base_tt:0 "Устойчивые операции на территории картеля несут постоянный риск"
 mdw_peril_multiple_states_tt:0 "Работа на многих фронтах увеличивает экспозицию командира."
 mdw_peril_us_aid_tt:0 "[SCOPE.sCountry('c:USA').GetAdjective] разведка снижает способность картелей нацеливаться на командира"
 mdw_peril_cautious_tt:0 "Осторожный подход командира снижает личный риск"
 
 # ==========================================
 # EVENTS
 # ==========================================
 
 # mdw_events.1 — War Declared
 mdw_events.1.t:0 "[ROOT.GetCountry.GetName] Объявляет войну картелям"
 mdw_events.1.d:0 "После многих лет ползучего расширения картеля и неудачных полумер [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] Правительство [ROOT.GetCountry.GetRuler.GetLastName] официально обязало военных [ROOT.GetCountry.GetAdjective] проводить кампанию против наркосетей. Декларация значительна — не только оперативно, но и символически. Состояние [ROOT.GetCountry.GetAdjective] утверждает, что оно не примет статус-кво.\n\n Картели ответят. Военные должны быть готовы."
 mdw_events.1.f:0 "Государство проводит свою линию."
 mdw_events.1.a:0 "[ROOT.GetCountry.GetName] вернет то, что ему принадлежит"
 
 # mdw_events.2 — Commander Selection
 mdw_events.2.t:0 "Кто возглавит кампанию?"
 mdw_events.2.d:0 "Декларация была сделана. Теперь должен быть выбран командир — тот, кто готов принять бой на контролируемой картелем территории, где противник знает землю, имеет местных информаторов и готов делать то, что армия не может. Это будет грязная борьба."
 mdw_events.2.f:0 "Правильный подход меняет все."
 mdw_events.2.a:0 "Развертывание [SCOPE.sCharacter('mdw_commander_1').GetFullName]"
 mdw_events.2.b:0 "Развертывание [SCOPE.sCharacter('mdw_commander_2').GetFullName]"
 mdw_events.2.c:0 "Развертывание [SCOPE.sCharacter('mdw_commander_3').GetFullName]"
 
 # mdw_events.3 — Combat Patrol
 mdw_events.3.t:0 "Контакт в [SCOPE.sState('mdw_active_state').GetName]"
 mdw_events.3.d:0 "[SCOPE.sCharacter('mdw_commander').GetFullName] сообщает о серии столкновений с силами картеля в [SCOPE.sState('mdw_active_state').GetName]. Картели сражаются, чтобы удержать свою территорию — используя блокпосты, снайперов и СВУ на подходах к известным опорным пунктам. Прогресс достигнут, но затраты времени и ресурсов значительны."
 mdw_events.3.f:0 "Каждый километр расчищенной дороги - это километр, который картели не могут использовать."
 mdw_events.3.a:0 "Тяните жёстко — захватывайте территорию быстро"
 mdw_events.3.b:0 "Продвижение методично — обезопасьте каждую позицию, прежде чем двигаться дальше."
 
 # mdw_events.4 — State Cleared
 mdw_events.4.t:0 "[SCOPE.sState('mdw_active_state').GetName] Очищено"
 mdw_events.4.d:0 "Значительный операционный успех: [SCOPE.sCharacter('mdw_commander').GetFullName] сообщает, что силы картеля в [SCOPE.sState('mdw_active_state').GetName] были разбиты. Их командная структура была демонтирована, их логистика сокращена, а ключевые фигуры мертвы или находятся под стражей. [ROOT.GetCountry.GetAdjective] Военные оккупационные силы движутся, чтобы удерживать землю.\n\n Один штат вернулся под контроль правительства. Осталось больше."
 mdw_events.4.f:0 "Карта меняется."
 mdw_events.4.a:0 "Переходим к следующему — сохраняем импульс"
 
 # mdw_events.5 — Ambush
 mdw_events.5.t:0 "Засада — [SCOPE.sCharacter('mdw_commander').GetFullName] Колонна находится под атакой"
 mdw_events.5.d:0 "Боевики картеля устроили засаду на военную колонку [ROOT.GetCountry.GetAdjective] в [SCOPE.sState('mdw_active_state').GetName]. Атака была скоординирована — несколько огневых позиций, заранее спланированные маршруты отвода и знание движений колонны, что предполагает наличие информатора внутри военной цепочки командования. Есть жертвы. [SCOPE.sCharacter('mdw_commander').GetFullName] — управление взаимодействием."
 mdw_events.5.f:0 "Картели сражаются, как армия, когда хотят."
 mdw_events.5.a:0 "Сражайтесь — преследуйте и уничтожайте их"
 mdw_events.5.b:0 "Разорвать контакт — перегруппироваться и убрать позже"
 
 # mdw_events.6 — Commander Under Fire
 mdw_events.6.t:0 "[SCOPE.sCharacter('mdw_commander').GetFullName] В опасности"
 mdw_events.6.d:0 "Разведка подтвердила то, что предполагали полевые отчеты: картели определили [SCOPE.sCharacter('mdw_commander').GetFullName] в качестве приоритетной цели. Против них была создана профессиональная группа по убийству. Угроза заслуживает доверия. Возвращение командира к [ROOT.GetCountry.GetCapital.GetCityHubName] уменьшит риск, но остановит ход кампании в критический момент."
 mdw_events.6.f:0 "Картели изучают своих врагов."
 mdw_events.6.a:0 "Вытяните [SCOPE.sCharacter('mdw_commander').GetFullName] назад — кампания может подождать"
 mdw_events.6.b:0 "Нажмите — [SCOPE.sCharacter('mdw_commander').GetFullName] принимает риск"
 
 # mdw_events.10 — Victory
 mdw_events.10.t:0 "Война с наркотиками выиграна"
 mdw_events.10.d:0 "[SCOPE.sCharacter('mdw_commander').GetFullName] отправляет окончательный оперативный отчет: территориальный контроль картеля был нарушен через [ROOT.GetCountry.GetName]. Последние опорные пункты расчищены. Военная оккупация продолжается. Сети картелей все еще существуют - они будут восстанавливаться в течение многих лет в ослабленной форме - но государство подтвердило суверенитет над своей собственной территорией. Это не было неизбежным. Это потребовало политической воли, военных обязательств и, во многом, удачи. То, что выиграл [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName], - это время - время для решения условий, которые сделали возможными картели."
 mdw_events.10.f:0 "[ROOT.GetCountry.GetName] вернул то, что принадлежит ей."
 mdw_events.10.a:0 "Тяжелая победа и начало"
 
 # mdw_events.11 — Commander Killed
 mdw_events.11.t:0 "[SCOPE.sCharacter('mdw_commander').GetFullName] Был убит"
 mdw_events.11.d:0 "Худшее случилось. Операция по убийству картеля удалась. [SCOPE.sCharacter('mdw_commander').GetFullName] погибает в результате атаки, которую службы безопасности не смогли предотвратить, несмотря на заслуживающие доверия предупреждения. Новости становятся публичными в течение нескольких часов. Картели открыто празднуют на улицах городов, которые они контролируют.\n\n Кампания еще не закончена. Но он получил удар, от которого потребуются месяцы, чтобы оправиться. Необходимо найти нового командира, и картели будут использовать время для консолидации."
 mdw_events.11.f:0 "Картели нанесли свой самый значительный удар."
 mdw_events.11.a:0 "Мы не будем сломлены этим - борьба продолжается"
 
 # mdw_events.20 — US Aid
 mdw_events.20.t:0 "[SCOPE.sCountry('c:USA').GetName] Подписал соглашение о военной помощи"
 mdw_events.20.d:0 "[SCOPE.sCountry('c:USA').GetCapital.GetCityHubName] сдвинулся. [SCOPE.sCountry('c:USA').GetName] официально подписал соглашение о военной помощи с [ROOT.GetCountry.GetName] — выделение разведывательных ресурсов, консультативного персонала, оборудования и материально-технического обеспечения для контркартельной кампании. Соглашение является значительным политическим развитием: оно сигнализирует о том, что [SCOPE.sCountry('c:USA').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCountry('c:USA').GetRuler.GetLastName] Администрация рассматривает стабильность [ROOT.GetCountry.GetName] как вопрос прямого национального интереса.\n\n Для [ROOT.GetCountry.GetName] практические выгоды незамедлительны: власть восстановлена, техника течет, и картели теперь сталкиваются с противником с полным разведывательным аппаратом [SCOPE.sCountry('c:USA').GetName], работающим против них."
 mdw_events.20.f:0 "Когда [SCOPE.sCountry('c:USA').GetName] фиксируется, баланс смещается."
 mdw_events.20.a:0 "Это полностью меняет ход кампании."
 
 # ==========================================
 # MODIFIERS
 # ==========================================
 
 mdw_war_declared_modifier:0 "Мексиканская война с наркотиками — активная кампания"
 mdw_war_declared_modifier_desc:0 "[ROOT.GetCountry.GetName] взял на себя обязательство вести прямую кампанию против наркокартелей. Власть потребляется, и военные участвуют, но государство утверждает себя."
 
 mdw_us_aid_modifier:0 "Военная помощь США"
 mdw_us_aid_modifier_desc:0 "Активное соглашение о военной помощи с [SCOPE.sCountry('c:USA').GetName] обеспечивает разведку, логистику и оборудование для контркартельной кампании [ROOT.GetCountry.GetName]."
 
 mdw_victory_modifier:0 "Война с наркотиками победила"
 mdw_victory_modifier_desc:0 "[ROOT.GetCountry.GetName] выиграл войну с наркотиками. Территориальный контроль картеля был нарушен, и государство подтвердило суверенитет. Условия, которые создали картели, остаются, но эта битва была выиграна."
 
 mdw_commander_killed_modifier:0 "Командующий погиб в бою"
 mdw_commander_killed_modifier_desc:0 "Убийство командира контркартеля пошатнуло общественное доверие к [ROOT.GetCountry.GetName] и ободрило картели."
 
 mdw_troops_ambushed:0 "Войска попали в засаду"
 mdw_troops_ambushed_desc:0 "Военная колонна [ROOT.GetCountry.GetAdjective] попала в засаду картелей, что привело к жертвам и временному сокращению наступательных возможностей."
 
 # Cartel territory modifier descriptions (MDW context)
 cartel_cjng_controlled:0 "Территория CJNG"
 cartel_cjng_controlled_desc:0 "Халиско Картель нового поколения контролирует криминальную экономику этого штата. Промышленная активность нарушена, инфраструктура ухудшается, и люди покидают территорию [ROOT.GetCountry.GetAdjective]."
 
 cartel_gulf_controlled:0 "Картельская территория Персидского залива"
 cartel_gulf_controlled_desc:0 "Картель Персидского залива установил здесь территориальное господство. Экономическая деятельность подавляется и [ROOT.GetCountry.GetAdjective] государственный орган является номинальным."
 
 cartel_sinaloa_controlled:0 "Картель Синалоа"
 cartel_sinaloa_controlled_desc:0 "Картель Синалоа контролирует этот штат. Сельскохозяйственная продукция была нарушена, и местная экономика работает под надзором картеля."
 
 cartel_northeast_controlled:0 "Северо-восточная территория Картеля"
 cartel_northeast_controlled_desc:0 "Картель дель Норест установил здесь господство. Инфраструктура и производительность зданий в [ROOT.GetCountry.GetName] страдают."
 
 # usa war on drugs

 je_war_on_drugs:0 "Война с наркотиками"
 je_war_on_drugs_reason:0 "Поток наркотиков в [ROOT.GetCountry.GetName] является национальным кризисом. Кокаин, героин и другие вещества, производимые в основном в Латинской Америке и контрабандой через границы [ROOT.GetCountry.GetAdjective], являются разрушительными сообществами, разжигающими насильственные преступления и развращающими государственные учреждения.\n\n[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] Администрация [ROOT.GetCountry.GetRuler.GetLastName] взяла на себя обязательства по проведению всеобъемлющей кампании: налаживанию международных партнерских отношений в целях удушения предложения в источнике, обеспечению внутреннего правоприменения в целях закрытия границ и осуществлению социальных инвестиций в целях удовлетворения спроса. Кампания не обходится без затрат — ресурсы, которые она требует, оказывают давление на более широкую экономику, — но альтернативой является страна, все более зависимая от иностранных преступных сетей.\n\n@information! В Мексике может расшириться территория картеля Соглашение о военной помощи с правительством Мексики является краеугольным камнем международного компонента этой кампании."

 narco_economy_plantation_bonus:0 "Наркоэкономика"
 narco_economy_plantation_bonus_desc:0 "Торговля наркотиками встроилась в сельскохозяйственную экономику [ROOT.GetCountry.GetName]. Производство плантаций, особенно опиума, превышает нормальные уровни, поддерживаемые спросом картелей и разлагающим потоком наркотических средств в сельские общины."

 war_on_drugs_active_modifier:0 "Война с наркотиками"
 war_on_drugs_active_modifier_desc:0 "Правительство «x id = 0» взяло на себя обязательства по проведению всеобъемлющей кампании по борьбе с незаконным оборотом наркотиков. Усилия по обеспечению правопорядка — внутренняя полиция, операции по пресечению и международное сотрудничество — привлекают ресурсы со всей экономики и накладывают скромные, но реальные издержки на национальную производительность."

 war_on_drugs_victory_modifier:0 "Война с наркотиками — победа"
 war_on_drugs_victory_modifier_desc:0 "[ROOT.GetCountry.GetAdjective] Война с наркотиками достигла поставленных целей. Поставки были пресечены, границы соблюдены, и институциональные рамки созданы. Кампания укрепила авторитет и престиж [ROOT.GetCountry.GetName], хотя основные условия, которые обеспечивают спрос на наркотики, не были решены."

