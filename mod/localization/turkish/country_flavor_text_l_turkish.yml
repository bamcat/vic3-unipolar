  SYR_FLAVOR_TEXT:0 "Suriye şu anda birkaç güçe karşı bir proxy savaşa dönüşen karmaşık bir sivil savaştan acı çekiyor. Bölge son derece düşman kalır ve çatışmalar sadece yönetim hakkına inanan Interim arasında yükselir ve Rojava daha ilerici bir cumhuriyet oluşturmak için özgürleşiyor. Mülteciler, Avrupa'yı daha güvenli toprakları yaşamak için aramak için terk ediyor ve batarm. Suriye savaşı bitirecek ve hızlı bir şekilde filosunu geri getirecek mi, yoksa başarısız olmak ve diğer güçler için bir vakum haline gelmek mi istiyor?"
  SIG_FLAVOR_TEXT:0 "$SYR_FLAVOR_TEXT$"
  ROJ_FLAVOR_TEXT:0 "$SYR_FLAVOR_TEXT$"
  IRA_FLAVOR_TEXT:0 "İran kendi İslam devriminin odak noktasında, ülke geleneksel islam'ın göreceli istikrarıyla oturuyor ve arab ilkbaharından etkilenmedi. Ancak Arap Baharı'nın etkileri daha genç populace tarafından yok edilmedi ve nüfus yılları aşırılık yollarına son verdi. İran geleneksel değerlerine devam edebilir mi? Yoksa daha çok kültürlü bir populace tarafından yok edilecekler mi?"
  
  # East Asia
  PRC_FLAVOR_TEXT:0 "Çin Halk Cumhuriyeti küresel bir ekonomik hegemon olarak oturuyor ve daha az şanslı milletler için finanse ediyor. Ancak borç tuzakları geri döndü ve Çin yapımı mallarına güvenmek yakın komşular ve otomasyonları tarafından zayıflatılıyor. Çin ekonomik egemenliklerini yeniden kurdu. Ya da iç gerilimler nedeniyle ayrı kalmak için mi kaderyorlar?"
  NRK_FLAVOR_TEXT:0 "Kuzey Kore, gezegendeki maoist diktatörlüğün son kalesi olarak kalır. Ülkenin çeşitli zihin oyunları ve beyin yıkanması, rejimlerinin ne kadar katı ve ölümcül olmasına rağmen tamamen etkili olmaya devam ediyor. 80 yıllık rejim başka 80 yıl sürecek mi? Yoksa komşuyla güneye ve oradan yeniden inşa etmek mi?"
  JPN_FLAVOR_TEXT:0 "Japonya, WW2’nin sonundan beri silahsız bir ulus olarak kaldı, ancak bu aşırı ekonomik kontrolü durdurmadı. Japon otomotivları ve Japon elektronikleri dünyanın en iyileri olarak bilinir ve saygı gösterir. Ama bu kurban olmadan değil... Ülkenin yaşlanma nüfusu vardır ve birçok bölgesel güç arasında sandviç yapılır. Japonya için bağımsız kalmak için ne alacak?"
  
  # Oceania
  AUZ_FLAVOR_TEXT:0 "Avustralya, fırsat ülkesi ve ‘Dream.’ ABD sahtekarlarının konumu olsa da, Avustralya, eksikliklerine ve daha sıcak ortamına rağmen, kıtadaki ülke “The Land Of Opportunity” adını verdi. Bununla birlikte, iç siyasi bölünmeler ve ısınma iklimi Avustralya'nın refahın kalesi olma şansını mahvetmek istiyor. Avustralya, modern dünyayı başarıyla takip edebilir mi?"
  
  # Balkans
  SRB_FLAVOR_TEXT:0 "Sırbistan, başarısız Yugoslav deneyinin rump eyaleti ve son kalıntıları olarak oturuyor. Son birkaç yılda hem Montenegro hem de Kosova'yı kaybettikten sonra, ulus bir zafer için uzunlar. Sırbistan, Yugoslavya'nın kayıp ihtişamını yeniden kazanacak mı?"
  
  # Europe
  ENG_FLAVOR_TEXT:0 "İngiltere, 20. yüzyılda büyük bir güç olarak zorlanmış, ancak birden fazla durgunluk, geniş ölçekli siyasi yolsuzluk ve meşruiyet, sendika eyleminin sorgulanması olarak adlandırılmıştır. İngiltere kendi egemenliği üzerinde kontrolünü tutabilir mi? Ya da Avrupa pazarının son saman olduğunu mı bıraktı?"
  SCO_FLAVOR_TEXT:0 "İskoçya, 21. yüzyılın başlarındaki durgunluk boyunca nispeten değersiz kaldı ve devrim verildiğinden beri gelişmeye devam etti. Büyük ölçekli yolsuzluk ve sendika içindeki temsil başarısızlığı, yerini sorgulamaya çağırdı. Bir zamanlar bağımsızlık kazanacak mı? Yoksa sendika geleceğin yolu olacak mı?"
  NIR_FLAVOR_TEXT:0 "British Imperialism'in İrlanda'daki son standı, Kuzey İrlanda, litre olmak için bekleyen bir toz keg. Sorunlar sona erebilir, ancak egemenliğin sorusu, güney kardeşleriyle birleşmek için daha genç nesil yılları olarak permeate olmaya devam ediyor... Britanya İrlanda'da kalıyor, monarşilerin yoluna gidecek mi?"
  IRE_FLAVOR_TEXT:0 "İrlanda kendini bir ülkeden tunç emperyal çizmesi altında dönüştürdü, aglosphere'in parlatılması için çaba sarf etti ve İngiltere'nin kendi aralarında başarılı ve çaba gösterdi. Emerald Isles için bir sonraki ne gelecek?"
  UKR_FLAVOR_TEXT:0 "Ukrayna'daki Batılılaşma çabaları gitti ve birçok Ukraynalının hayatı hızla gelişiyor, ancak Kırım 8 yıl önce bir Rus işgali önemli bir bölgeye götürüldü. Doğudaki Separatistler de Rusya'ya kalplerine bir açılış verdi. Ukrayna, ayrılıkçıları kat altında geri getirebilir veya Ukrayna Rusya'nın büyüyen hırslarında bir sonraki hedeftir."
  CYP_FLAVOR_TEXT:0 "Kıbrıs etnik gruplar tarafından bölünmüş bir ada olarak, güneydeki Yunanlılar, kuzeydeki Türkler. Ancak büyüyen bir Kıbrıs kimliği oluşur ve bir kez ulusu bir kez ve herkes için onaylamaya çağrılmadan önce uzun olmayabilir. Kıbrıs başarılı bir şekilde birleştirebilecek mi, yoksa her zaman bölünmüş olacaklar mı?"
  BYL_FLAVOR_TEXT:0 "Belarus, siyasi bir devrimin başında, vatandaşların hükümete karşı aktif olarak ve devletin gerçek başkanı oy kullanarak seçimi kaybetmişti. Lukashenko, kontrolünü korumak için Rus komşularına ısınıyor. Lukashenko başarılı olacak mı yoksa Belaruslılar yasadışı hükümetine son verecek mi?"
  SPA_FLAVOR_TEXT:0 "İspanya, Falangist hareketin dehşetini takip eden hoş bir patlamadır, hızla modernleşmiş bir ülkedir ve halkı için daha büyük bir geleceğe yönelik çabalar yaratıyor. Ancak hepsi kendi yönleriyle aynı fikirde değil, Katalonya'daki bir bağımsızlık hareketi buharlaşır. İspanya Katalonya olmadan veya Katalonya olmadan gelişecek mi?"
  XSP_FLAVOR_TEXT:0 "İspanya, Falangist hareketin dehşetini takip eden hoş bir patlamadır, hızla modernleşmiş bir ülkedir ve halkı için daha büyük bir geleceğe yönelik çabalar yaratıyor. Ancak hepsi kendi yönleriyle aynı fikirde değil, Katalonya'daki bir bağımsızlık hareketi buharlaşır. İspanya Katalonya olmadan veya Katalonya olmadan gelişecek mi?"
  NRW_FLAVOR_TEXT:0 "Norveç, 21. yüzyıldan önce olduğundan daha güçlü bir ulusa giren birkaç ülkeden biri olmaya devam ediyor, güçlü bir sosyal güvenlik sistemi ve piyasaya itebileceği güçlü kaynaklar bunu hayallerin lavish yeri haline getirebilir. Bununla birlikte, petrolden uzaklaşan dünya geçişleri, Norveç prowes'lerini başarılı bir şekilde tutabilir veya petrolün kaldırılması onun demise olacak mı?"
  RSF_FLAVOR_TEXT:0 "Sovyetler Birliği'nin çöküşünden bu yana, Rusya, bu, aynı ekonomik güce ve proweslere sahip olmak için canlandı. Sendikanın düşmesinden bu yana kampanyalarının çoğu ekonomik egemenliği yeniden kurmaktı. Georgia'da 2008 yılında ve 2014'te Ukrayna'da Bununla birlikte, Ukrayna'ya başka bir kampanyadan söz ediyor, dnieper ve doğudaki ayrılıkçı bölgelerin doğusunu almak. Bu onların 21. yüzyıldaki yolu mu yoksa başarısız olacak mı?"
  EUR_FLAVOR_TEXT:0 "Avrupa Birliği, WW2 tarafından getirilen devastation sonrası yeniden inşa etmenin beynidir. O zamandan beri kıtanın çoğunu, Norveç ve İsviçre gibi bazı uluslar veya Batı Balkanlar ve eski yugoslav eyaletlerini içerecek şekilde gelişti. Sendika sadece İngiltere'nin ondan kurtarması için alışılmadık bir seçimden beri güçlendirdi ve çoğu terk etmek artık çoğu ülkede ciddiye alınmadı, Birlik, sadece bir federasyonun konuşmasıyla burada güçlendirildi. Avrupa Birliği Avrupa Federasyonu'na gelişecek mi? Yoksa Avrupa Birliği yalnızca tarih kitaplarında bahsedilecek mi?"
  TRK_FLAVOR_TEXT:0 "Türkiye Rusya'nın deniz değerli hırslarında ana bariyer olarak oturuyor ve komşularının birçoğu üzerinde stratejik bir kanca tutuyor. Suriye'nin Interim hükümetini desteklemek ve orta doğuda aktif milislere sahip olmak. Türkiye'nin aatolian bölgesinde konumu, etrafındaki bölgelerde büyük bir kontrol sunuyor ve Osmans’in hırslarını daha önce yok ediyor. Türkiye hırslarına dayanacak mı? Ya da daha önce Osmanlılar gibi başarısız olmaya mahkum edilir mi?"
  
  # North America
  USS_FLAVOR_TEXT:0 "Amerika Birleşik Devletleri, savaş sonrası ekonomik patlama sayesinde zengin bir 20. yüzyıla sahipti ve yüzyılın sonuna kadar tek süper güç olarak kategorize edildi. Bununla birlikte, geniş ölçekli yolsuzluk ve şirketler tarafından ele geçirilen taktikler, kumaşı ayrı ayrı bir şekilde yırtılmaya hizmet eder. ABD hem sosyal hem de ekonomik olarak geride kalır. Gelecek Birlik için ne tutar ve eski ihtişamını yeniden bekleyebilecekler?"
  MEX_FLAVOR_TEXT:0 "Uyuşturucu kartelleri ve Amerikan emperyalizmi 21. yüzyılın Meksika'nın belirleyici özellikleridir. Ancak birçok çaba, ABD'nin topraklarında bir savaşla mücadele etmeden kartelleri çözmeye başladı. Sonraki yüzyılda mexico'nun mağazası var ve ABD emperyalizminin pençelerinden başarıyla kaçabiliyorlar."
  CAN_FLAVOR_TEXT:0 "Kanada 21. yüzyılda büyük sorunlardan yoksun istikrarlı bir ulus olarak boğuldu. Ancak First Nations, kanadian alanının kurulmasından bu yana korkunç tedavilerini talep ediyor. Kanada kabul edecek mi?"
  
  # Central Asia
  AFH_FLAVOR_TEXT:0 "İmparatorluğun mezarlığı, Afganistan, Amerikan İmparatorlukizmi çabalarını başarıyla karşılamıştır ve bölgesel bir güç olarak egemenliği garanti etmiştir. Ancak çeşitli etnik gruplar ve inançtan gelen çatışmalar, yaşamın geleneksel yolunu tehdit ediyor. Afganistan, geleneksel yollarını başarıyla geçebilir mi?"
  AZB_FLAVOR_TEXT:0 "Azerbaycan, zengin bir caucasus ulusu olarak oturuyor, Petrol ve Gaz rezervlerinin son keşifleri bunu Avrupa'ya önemli bir müttefik haline getirdi, ancak Sanatakh çatışmaları ve komşu Ermenistan ile sonraki sınır savaşları büyüklerine ulaşmalarını engelliyor. Azerbaycan bu krizi barışçıl bir şekilde çözebilir mi yoksa savaşa karışacak mı?"
  KZK_FLAVOR_TEXT:0 "Kazakistan farklı liderlikler ve hükümetler arasında ve hafif anarşiye düştü. Önceki lideri büyük bir güç boşluğu bıraktı ve yeni yöneticiler Kazakistan'ı çok güzel bir yönde denemek ve yönlendirmek için ortaya çıktı. Kazakistan iç güç mücadelesini hayatta kalabilir mi?"
  UZB_FLAVOR_TEXT:0 "Özbekistan, 90'lı yıllardan beri kendini diktatörlükten özgürleştirmek için mücadele etti, ancak başarılı bir şekilde liberalleşmeye başladı ve komşularıyla durumunu geliştirmeye devam etti. Daha şanslı olmaya devam ederken, aynısı komşularından bazılarının söylenemez ve hayatta kalmak için egemenliğini ilan etmesi gerekecek..."
  
  # Africa
  SAF_FLAVOR_TEXT:0 "Güney Afrika, yolunu bulmak için mücadele eden bir ulusdur, tarihini tanımlayan çatışmalar çeşitli etnik gruplar arasında en iyi şekilde kızgınlığa yol açtı, bu gerginlik sadece apartheidden daha kötü hale getirildi. Güney Afrika başarılı olmayı planlıyorsa, yapmak için yeniden inşa etmek ve siyasi reform yapmak için kaba bir yol vardır. Güney Afrika bunu yapabilir mi? Ya da parçalanmaya mahkumdur."
  SSD_FLAVOR_TEXT:0 "Güney Sudan, Nile boyunca etnik grupların ortaya çıkan çatışmasından doğdu, Birleşmiş Milletler tarafından tanınmak için en yeni ülke ve bir başarı olarak kabul edilebilir. Etnik gerginlikler, bir standtill'de ülkeyi tutar ve dikkatli manevraların bu ulusun kısa yaşamamasını sağlamak için yapılması gerekir. Bu mümkün mü?"
  ETH_FLAVOR_TEXT:0 "Etiyopya hızla modern bir ulustur ve sömürge eller tarafından nispeten değersiz olmayı başardı. Bununla birlikte, ulus hala sorunlarına sahiptir, çünkü Somali, tigray & veyaomia etnik gruplar gizliliğe ve Etiyopya'yı pahalı bir iç savaşa sürükler. Etiyopya gerginlike rağmen gelişmeye devam edebilir mi?"
  EGY_FLAVOR_TEXT:0 "Mısır aşırı bir su sıkıntısının ortasında bir nüfus patlaması yaşıyor ve başarısız bir geleneksel hükümet. Mısırlılar daha iyi topraklar için sürdüler ve Nile yavaş yavaş kuruyor. Mısır krize gitmenin bir yolunu bulabilir mi?"
  KYA_FLAVOR_TEXT:0 "Kenya, başarılı modernleşme çabalarının ortasındaki yapısal bir ses afrika ülkesidir ve hızla yaşam standartlarını geliştiriyor. Kenya çoğunlukla ciddi sorunlardan yoksun olsa da, komşuları çok şanslı değil. Siyasi alanda bir Doğu Afrika Superpower oluşturmak için görüşmeler var. Kenya, bir afrika süper güç oluşturmak için zeminleri başarıyla koruyacak mı? Ya da komşularının içindeki karmaşa kendi topraklarını etkiler."
  MOR_FLAVOR_TEXT:0 "Fas 21. yüzyıla güçlü ve akıllı sübvansiyonunu takip ederek gurur duyuyor ve ekonomik ayrımına büyük gelişmelerdi. Şimdi, Avrupa güçlerinin ekonomik hareketliliğini daha da ileri götürmek ve afrika kıtasında büyük bir oyuncu olmak istiyor. Fas'ın hırsları elde edilecek mi?"
  GHA_FLAVOR_TEXT:0 "80'li yıllarda vahşi bir askeri junta'nın ardından 'Cold Chop' Ghana'nın ekonomik durumu büyük ölçüde ortadan kalktı. Ancak siyasi partilerin ve ülkenin geri dönüşü bir istikrar ve ekonomik refah dönemine döndükten ve bunu yapmaya devam etmek için projelendirilmiştir. Ancak iklim krizi ve çölleşme, bir kez daha istikrarsızlığı tehdit ediyor. Ghana bu koşulları başarıyla gezebilir mi?"
  
  # South Asia
  VNM_FLAVOR_TEXT:0 "Vietnam, sömürgeleştirilmesinden bu yana göreceli bir istikrar ülkesi olarak oturuyor. Birkaç uzakta kalan pazar ekonomilerinden biri onun perks vardır ve vatandaşlar göreceli barışa maruz kalırken, turistler ülkeyi abartır. Dikkatli seçimler ve akıllı geopolitics 21. yüzyılda son derece iyi başarılı olmasını sağlayabilir. Ancak, bu seçimleri yapacak mı?"
  IDA_FLAVOR_TEXT:0 "Hindistan sadece hayatta kalmadı, ancak tutish raj ve 400 yıllık sömürge kuralının dağılmasından bu yana gelişti. Bununla birlikte, Myanmar, Bangladeş ve Pakistan'ın ayrılması ile bazı post-kolonyal travma başka türlü iyi bir kayıtta bir yara olmuştur. Hindistan ve Pakistan'ın Jammu ve Keşmir toprakları üzerinde yükselen gerilimler, ancak endişe için büyük bir nedendir ve Arunchal Pradesh'in üzerindeki PRC ile yükselen gerginlikler silahlı çatışmaları oyuna çağırıyor. Hindistan, 100 yıldan daha fazla İmparatorlukizme karşı başarılı bir şekilde direnebilir mi?"
  PAK_FLAVOR_TEXT:0 "Pakistan, Raj'dan 40'larda ve 50'lerde, hindus & muslimler arasındaki dini gerilimler üzerine ayrıldı. Birçoğu çatışmanın görüşte son olduğuna inanıyorken, Pakistan çatışmasının çeşitli etnik grupları birayak. Bir yanlış hareket ve devletin çöküşü olabilir ve her iki Hindistan ve Afganistan'la yüksekliklerinde gerginlikler olabilir, Pakistan bu sorunları bekleyebilir mi?"
  
  # South and Central America
  ARG_FLAVOR_TEXT:0 "Arjantin, 20. yüzyılda ciddi bir başarı yaşadıktan sonra, ABD müdahalesi nedeniyle çarpıştı ve Las Malvinas üzerinde başarısız bir çatışma oldu. Yerli Mapuche arasındaki anlaşmazlıklar, Arjantin devletleri ve Buenos Aires'teki hükümet birçok değişiklik yaptı. Arjantin rütbeleri geri alabilir ve ülkelerini ihtişama geri getirebilir mi?"
  
  # Nonsense Countries
  GLI_FLAVOR_TEXT:2 "Galicia, katedral meraklıları tarafından barındırılan küçük ve işaretsiz bir ülke. Galicia geçmiş ihtişamını yeniden kazanacak mı?"
  GENERIC_FLAVOR_TEXT:0 "The 21st Century is a time of relative peace & prosperity, however exploitation by the wealthy, waning standards of living and global communication have brought with it a resurgence in political activism and societal shifts like none ever seen. What will this new wave of political expression bring?
  REV_GENERIC_FLAVOR_TEXT:1 "Bu sözde organize hükümetin aldığı yönle memnun kaldı, bu devrimciler onu devirmeye karar verdiler. Güç ayırarak başarılı olacak mı yoksa geçmişin çok unutulmuş devrimleri gibi ezilecekler mi?"
  DECENTRALIZED_FLAVOR_TEXT:0 "Daha organize güçler tarafından ayrılmış, bu ülke bağımsızlıklarını korumak için mücadele eder. Yeni bir yüzyılın şafağını görecekler ya da onların adı yalnızca tarih kitaplarında hayatta kalacak mı?"
