  # Middle East
  YMN_FLAVOR_TEXT:0 "Güç tutmak için çaba sarf etmek, Eski Hükümet, Geçiş Konseyi ve Houthi'nin Yemen'de patlak verdi. Bu vahşi savaş, Arabistan'daki güçlerin gözleriyle getirildi, onları kendi lehine sallamak için birbirlerine karşı itti. Yemen komşuları tarafından subjugasyona katlanmak zorunda kalacak mı, yoksa üst üste çıkabilecekler mi?"
