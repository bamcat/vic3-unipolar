 # PROGRESS TOOLTIPS
 # ==========================================

 je_rising_economy_progressing_tt: "[ROOT.GetCountry.GetName] küresel GSYİH'nin% 2'sinden fazlası için hesaplar -% 5 hedef hedef"
 je_rising_sovereignty_progressing_tt: "[ROOT.GetCountry.GetName] tanınır ve bağımsızdır - büyük güç rütbesi ve prestiji 50 gereklidir"
 je_rising_military_progressing_tt: "Askeri kapasite büyüyor - büyük güç rütbesi ve ordu büyüklüğü 100 hedefler"
 je_rising_prestige_progressing_tt: "[ROOT.GetCountry.GetName] en üst 5'e yaklaşıyor - prestij 150 ve küresel sıralama 5'e ihtiyaç duyuluyor"
 je_rising_endgame_progressing_tt: "Blok oluşur - 8 üye hedefi tamamlamak için gereklidir"
