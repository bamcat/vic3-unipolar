 cartel_button_deploy_general_name:0 "Bir Komutan"
 cartel_button_deploy_general_desc:0 "[ROOT.GetCountry.GetName] karşı-kartel operasyonlarına liderlik etmek için genel olarak seçin."
 cartel_need_general_tt:0 "Mevcut en az bir general gerektirir"

 cartel_suppression_bar:0 "Cartel Suppression"
 cartel_suppression_bar_desc:0 "Suppression Progress: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/100)"
 cartel_bar_general_active_tt:0 "Kartellere karşı aktif askeri operasyonlar"
 cartel_bar_turmoil_tt:0 "Yüksek karışıklık [ROOT.GetCountry.GetName]"
 cartel_bar_at_war_tt:0 "Askeri kaynaklar aktif bir savaşa yönlendiriliyor"

 # ==========================================
 # EVENTS
 # ==========================================

 # cartel.1 — Escobar Captured
 cartel.1.t:0 "Pablo Escobar Ölü"
 cartel.1.d:0 "Yıllar sonra manhunt ve artan şiddet, Medellín Cartel'in kurucusu ve lideri Medellín'de güvenli bir ev takip edildi ve [ROOT.GetCountry.GetAdjective] güvenlik güçleri tarafından öldürüldü. Pablo Escobar'ın ölümü, [ROOT.GetCountry.GetAdjective] uyuşturucu ticaretine karşı en önemli darbedir - bir dönemin sonu ve başka bir şeyin belirsiz başlangıcıdır.\n\n Medellín Cartel parçalandı. Ama Cali Cartel ve diğerleri boşluğu doldurmak için hareket edecek. Savaş bitmiyor. Ama bu savaş kazandı."
 cartel.1.f:0 "Dünyanın en çok aranan adam öldü."
 cartel.1.a:0 "[ROOT.GetCountry.GetName] narko-terörizme karşı tarihi bir darbe vurdu"

 # cartel.2 — El Chapo Captured
 cartel.2.t:0 "El Chapo Yakalandı"
 cartel.2.d:0 "[ROOT.GetCountry.GetAdjective] güvenlik güçleri ve uluslararası istihbarat arasında koordineli bir saldırıda Joaquín 'El Chapo' Guzmán - Sinaloa Cartel ve dünyadaki en güçlü ilaç lordu başkanı - yakalandı. tutuklama, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] için büyük bir zaferdir. [ROOT.GetCountry.GetRuler.GetLastName]'s counter-cartel kampanyası ve Sinaloa Cartel'in operasyonlarına önemli bir darbe.\n\nEl Chapo şimdi maksimum güvenlik tesislerinde. Orada kalsa başka bir konudur."
 cartel.2.f:0 "Amerika'daki en çok aranan adam barların arkasında."
 cartel.2.a:0 "Adalet servis edildi - şimdilik"

 # cartel.3 — El Chapo Escapes
 cartel.3.t:0 "El Chapo Escaped"
 cartel.3.d:0 "imkansız oldu. Joaquín 'El Chapo' Guzmán, Altiplano maksimum güvenlik hapishanesinden doğrudan hücresine doğru bir tünel yoluyla kaçtı - aylarca süren ve birçok seviyedeki sorumluları tamamlamak için bir mühendislik feat.\n kaçış uluslararası bir aşağılamadır. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName] hükümeti güvenilirliğine felaket bir darbe aldı. Ve [ROOT.GetCountry.GetAdjective] bölgesinde bir yerde, dünyanın en güçlü uyuşturucu efendisi ücretsizdir."
 cartel.3.f:0 "Her zaman kaçacaktı. Tek soru ne zaman oldu."
 cartel.3.a:0 "Bu bir öfke - kafalar yuvarlayacak"

 # cartel.4 — Mexico Turf Division
 cartel.4.t:0 "Karteller [ROOT.GetCountry.GetName]"
 cartel.4.d:0 "Başarısız veya mevcut olmayan devlet politikası bir vakum bıraktı. Büyük kartel örgütleri şimdi var - şiddet, müzakere ve yerel otoritelerin seçici yolsuzlukları - [ROOT.GetCountry.GetAdjective] bölge üzerindeki etkisini tanıdı.\n\n CJNG merkezi ve batıyı kontrol eder. Gulf Cartel kuzeydoğu kıyılarına sahiptir. Sinaloa Cartel kuzeybatıda baskındır. Kuzeydoğu Cartel, Coahuila ve Zacatecas'daki kendi topraklarını arabalandırdı. [ROOT.GetCountry.GetAdjective] Devletin etkisi, kendi ülkesinin kısımları üzerinde egemenlik kabul etti.\n\n@warning! Bu duramaz."
 cartel.4.f:0 "Bölgesini koruyamayan bir devlet bir devlet değildir."
 cartel.4.a:0 "Kaybettiğimiz şeyi yeniden ifade etmeliyiz"

 # cartel.5 — Assassination
 cartel.5.t:0 "A Cartel Assassination"
 cartel.5.d_crackdown:0 "Üst düzey bir polis veya askeri yetkili [ROOT.GetCountry.GetName]'nin karşı-kartel kampanyası suikaste uğradı - kartellerin herkese ulaşabileceği durumu ve sinyali tekrarlamak için tasarlanmış bir cinayet. cenaze yarındır. Soruşturma zaten şüphelileri tespit etti. Soru [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName] hükümeti onları takip edecek."
 cartel.5.d_cooperation:0 "Rakip bir kartel, suçlu ortaklarınızın anahtar yalanlarından birini suikaste uğrattı ve darbe [ROOT.GetCountry.GetName] hükümetine çıktı. Cinayet büyük bir şehirde geniş gün ışığında yapıldı. Devletin bunu yapan erkeklerle hiçbir ilgisi olmadığını iddia etmek imkansız hale geliyor."
 cartel.5.d_default:0 "Ünlü bir rakam - politikacı, gazeteci veya yargıç - [ROOT.GetCountry.GetName] kartel-linked gunmen tarafından öldürüldü. Cinayet brazen'dir. Mesaj açıktır: karteller devletin korkusu olmadan çalışır."
 cartel.5.f:0 "Impunity, kartel'in en büyük silahıdır."
 cartel.5.a:0 "Bu sorumluları bulacağız"

 # cartel.6 — Money Laundering
 cartel.6.t:0 "Cartel Money Laundering Exposed"
 cartel.6.d_crackdown:0 "[ROOT.GetCountry.GetAdjective] finansal istihbarat ünitesi, kartel paranın meşru işletmeler aracılığıyla aktığı kanıtları ortaya çıkardı - inşaat şirketleri, restoranlar, araba satıcıları - [ROOT.GetCountry.GetCapital.GetCityHubName]. Laundering operasyonunun ölçeği, resmi ekonominin derin nüfuzunu göstermektedir. Yol pahalı, politik olarak tehlikeli olacak ve rahatsız yerlere yol açabilir."
 cartel.6.d_cooperation:0 "Uluslararası finansal araştırmacılar, [ROOT.GetCountry.GetName] hükümeti ile bilinen kurumlar aracılığıyla akan şüpheli işlemlere sahiptir. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] arasındaki bağlantılar [ROOT.GetCountry.GetRuler.GetLastName] yönetimi ve kartel finansmanı gizlemek için daha zor hale geliyor. Bu büyük bir diplomatik olay olabilir."
 cartel.6.d_default:0 "Araştırmacı gazeteciler, [ROOT.GetCountry.GetName] bankacılık sektörü aracılığıyla büyük ölçekli paranın kanıtlarını yayınladılar - arabatel gerçek gayrimenkul ve iş yatırımlarından temizlenmeden şüphelendi. Merkez bankası bir soruşturma çağrısında bulunuyor."
 cartel.6.f:0 "Kirli para, nereye bakacağınızı biliyorsanız her yerdedir."
 cartel.6.a:0 "Nereden gelen soruşturmaya devam ederse,"
 cartel.6.b:0 "bankacılık sektörü istikrarı korunmalıdır - bırakın"

 # cartel.7 — US Pressure
 cartel.7.t:0 "Washington Washington Watching"
 cartel.7.d:0 "[SCOPE.sCountry('c:USA').GetName] Dışişleri Bakanlığı resmi olarak [ROOT.GetCountry.GetName] Dışişleri Bakanı ile bir toplantı talep etti. Gündelik, özel olarak iletişim kurmak, uyuşturucu kaçakçılığıyla ilgilidir - özellikle [SCOPE.sCountry('c:USA').GetAdjective] hükümetin [ROOT.GetCountry.GetName], narkotik kuzeye akışını bozmak için yeterli değildir. [SCOPE.sCountry('c:USA').GetAdjective] yardım - finansal, istihbarat ve muhtemelen askeri - [ROOT.GetCountry.GetName] daha aktif işbirliği halinde gelecek."
 cartel.7.f:0 "[SCOPE.sCountry('c:USA').GetName] kaldıraçlıdır. Soru, kullanılmış olmasına izin vermek."
 cartel.7.a:0 "[SCOPE.sCountry('c:USA').GetAdjective] işbirliğini kabul edin - desteğe ihtiyacımız var"
 cartel.7.b:0 "Decline – [ROOT.GetCountry.GetName] kendi işlerini idare edecek"

 # cartel.8 — Cartel Retaliation
 cartel.8.t:0 "Kartels Retaliate"
 cartel.8.d:0 "Çarpıcı kan çekti - ve şimdi karteller kendi çizimlerini yapıyor. [ROOT.GetCountry.GetName] ile koordineli bir dizi saldırı, polis istasyonları, askeri kontrol noktaları ve toplumdaki sivil alanları [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] desteklemek için bilinen [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName]'ın kampanyası. Saldırılar bir mesaj: karteller bir fiyat olmadan yok edilemez. [ROOT.GetCountry.GetName] nasıl cevap vereceğine karar vermelidir."
 cartel.8.f:0 "Her darbe indi, davetli bir geri dönüş."
 cartel.8.a:0 "Escalate – biz korkutucu olmayacak"
 cartel.8.b:0 "Şimdi geri dönün - sivil nüfusun korunması"

 # cartel.9 — Completion
 cartel.9.t:0 "Uyuşturucu Ticareti onun görevini yerine getiriyor"
 cartel.9.d_crackdown:0 "Çarpıcı kampanyası derhal hedeflerine ulaştı. Afium pazarı önemli ölçüde sıkıştı - [ROOT.GetCountry.GetName]'nin ticaret ağlarında sürekli baskının doğrudan bir sonucu. Karteller zayıflar. [ROOT.GetCountry.GetName]'nin uluslararası duruşu geliştirildi. Savaş sona erdi, ancak bu tur devlete ait."
 cartel.9.d_cooperation:0 "Düzenleme ne vaat edildiğini teslim etti. Otorite sağlam, devlet işlevleri ve karteller var - çoğunlukla - pazarlık onların yanında. Bu yönetim veya kapitülasyon, tarihçilerin tartışacağı bir sorudur. opium pazarı kendi hikayesini anlatıyor."
 cartel.9.d_default:0 "İlaç ticareti gelişti - daha iyi veya daha kötüsü belirsiz kalır. opium pazarı temel fiyatından önemli ölçüde taşındı. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName] Bu dönemde yapılan seçimler, gelecekleri şekillendirecektir."
 cartel.9.f:0 "Her politika biter. Her seçimin sonuçları vardır."
 cartel.9.a:0 "Bir bölüm yakınlar"

 # cartel.100 — Timeout
 cartel.100.t:0 "Pencere Kapalı"
 cartel.100.d:0 "[ROOT.GetCountry.GetName] uyuşturucu kaçakçılığıyla ilgili her yıl anlamlı bir çatlak veya narco ağları ile istikrarlı bir düzenleme vermedi. Karteller zamanı iyi kullandı. Daha doğrudan bir yaklaşım gerekli olacaktır."
 cartel.100.f:0 "Inaction bir seçimdir - ve karteller bunu bilir."
 cartel.100.a:0 "Doğrudan harekete geçmeliyiz"

 # cartel.10 — Escobar news for Americas
 cartel.10.t:0 "Pablo Escobar Ölü"
 cartel.10.d:0 "[SCOPE.sCountry('c:CLM').GetName] Haber: Pablo Escobar, Medellín Cartel'in kurucusu ve Latin Amerika'daki narko-terörizm yaşını tanımlayan adam, [SCOPE.sCountry('c:CLM').GetAdjective] güvenlik güçleri tarafından öldürüldü. Batı hemisphere'deki en çok aranan adam öldü. Bölgenin uyuşturucu ticaretindeki dalgalanma etkileri yıllar boyunca hissedilecektir."
 cartel.10.f:0 "Büyük narkonun yaşı bitti. Ne takip daha kötü olabilir."
 cartel.10.a:0 "Yeni bir dönem başlar"

 # ==========================================
 # CARTEL FIGHT EVENTS
 # ==========================================

 cartel_fight.0.t:0 "Kim Counter-Cartel kampanyasına liderlik edecek?"
 cartel_fight.0.d:0 "[ROOT.GetCountry.GetName] hükümeti, kartel ağlara karşı doğrudan harekete geçmeyi çözdü. Genel olarak seçilmelidir ve dağıtılmalıdır - yetkinliğe sahip biri ve kirli mücadele eden bir düşmanı takip etmek, siviller arasında gizler ve mermi satın alırken yetkililer satın almak."
 cartel_fight.0.f:0 "Doğru genel her şeyi değiştirir."
 cartel_fight.0.a:0 "Deploy [SCOPE.sCharacter('cartel_general_1').GetFullName]"
 cartel_fight.0.b:0 "Deploy [SCOPE.sCharacter('cartel_general_2').GetFullName]"
 cartel_fight.0.c:0 "Deploy [SCOPE.sCharacter('cartel_general_3').GetFullName]"

 cartel_fight.1.t:0 "A Major Cartel Bust"
 cartel_fight.1.d:0 "[SCOPE.sCharacter('cartel_general').GetFullName] başarılı bir operasyon rapor eder: büyük bir kartel dağıtım ağı sönmüş, önemli miktarda narkotik ele geçirilmiş ve tutuklanan orta düzey kartel rakamlar. İyi bir hafta işi. Hız [ROOT.GetCountry.GetName] hükümeti ile."
 cartel_fight.1.f:0 "İlerleme yapılır."
 cartel_fight.1.a:0 "Baskıyı tut"

 cartel_fight.2.t:0 "Troops Ambushed"
 cartel_fight.2.d:0 "[SCOPE.sCharacter('cartel_general').GetFullName]'nin komutası altında bir birim, bir kırsal alanda kartel tabancası tarafından pudralandı. Saldırı iyi koordine edildi ve kartellerin [ROOT.GetCountry.GetAdjective] askeri hareketler hakkında istihbarat olduğunu gösteriyor. Ölümler var. Morale sallanıyor."
 cartel_fight.2.f:0 "Karteller, seçtikleri zaman bir ordu gibi savaşırlar."
 cartel_fight.2.a:0 "Regroup ve devam"

 cartel_fight.3.t:0 "Informant Anahtar İstihbaratı Sağlıyor"
 cartel_fight.3.d:0 "Bir bilgi sahibi - para, kişisel şikayetler veya korku tarafından motive edilen - [SCOPE.sCharacter('cartel_general').GetFullName] kartel güvenli evler, tedarik rotaları ve personel hakkında ayrıntılı bilgi verdi. Bilgi, bölgedeki kartellerin operasyonel kapasitelerini önemli ölçüde bozan bir dizi hassas işlem sağlar."
 cartel_fight.3.f:0 "Otomobilellerin en büyük kırılganlığı birbirleridir."
 cartel_fight.3.a:0 "İstihbarat Yasası hemen hemen"

 cartel_fight.10.t:0 "Karteller Kırık Oldu"
 cartel_fight.10.d:0 "Kampanya bitti. [SCOPE.sCharacter('cartel_general').GetFullName] [ROOT.GetCountry.GetName] Organize kartel aktivitesinin operasyonel irrelevance noktasına kaldırıldı. Anahtar rakamlar öldü veya gözaltında. Ağlar parçalandı. Devlet kendi topraklarını yeniden ilan etti.\n\n Bu çirkin bir savaş oldu. Ama kazandı."
 cartel_fight.10.f:0 "Devlet, taahhüt ettiğinde ne yapabileceğini göstermiştir."
 cartel_fight.10.a:0 "Sert bir zafer"

 # ==========================================
 # MODIFIERS
 # ==========================================

 cartel_cooperation_modifier:0 "Cartel Arrangement"
 cartel_cooperation_modifier_desc:0 "Narco ağları ile kapalı bir düzenleme, [ROOT.GetCountry.GetName]'ye önemli kaynaklar ve istikrar getirdi - meşruiyet ve uluslararası üne açık bir maliyet."

 cartel_crackdown_modifier:0 "Anti-Trafficking Kampanyası"
 cartel_crackdown_modifier_desc:0 "[ROOT.GetCountry.GetName] aktif olarak kartel ağları takip ediyor. Otorite tüketiliyor, ancak uluslararası ayakta duruyor ve afyon ticareti bastırılıyor."

 cartel_crackdown_abandoned:0 "Crackdown Abandoned"
 cartel_crackdown_abandoned_desc:0 "[ROOT.GetCountry.GetName] anti-trafficking kampanyası durduruldu. Uluslararası topluluk geri dönüşünü belirtti."

 cartel_escobar_captured:0 "Escobar Ölü"
 cartel_escobar_captured_desc:0 "Pablo Escobar'ın ölümü Medellín Cartel'i parçaladı ve [ROOT.GetCountry.GetAdjective] uyuşturucu ticaretini dönüştürüyor. [ROOT.GetCountry.GetName]'nin uluslararası duruşu dramatik bir şekilde gelişmiştir."

 cartel_el_chapo_captured:0 "El Chapo Yakalandı"
 cartel_el_chapo_captured_desc:0 "Joaquín Guzmán'in yakalaması Sinaloa Cartel'e önemli bir darbe yaptı ve [ROOT.GetCountry.GetName] uluslararası düzeyde ayakta duran [ROOT.GetCountry.GetName]"

 cartel_el_chapo_escaped:0 "El Chapo Escaped"
 cartel_el_chapo_escaped_desc:0 "Dünyanın en çok aranan uyuşturucu lordunun [ROOT.GetCountry.GetAdjective] maksimum güvenlik hapishanesinin kaçışı [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName] hükümeti."

 cartel_narco_state:0 "Narco State"
 cartel_narco_state_desc:0 "Cartel örgütleri, [ROOT.GetCountry.GetName] önemli porsiyonlar üzerinde etkili bir bölgesel kontrol kurdular. [ROOT.GetCountry.GetAdjective] devlet, bu alanlarda şiddet üzerine tekelini kaybetti."

 cartel_cjng_controlled:0 "CJNG Bölgesi"
 cartel_cjng_controlled_desc:0 "Jalisco New Generation Cartel bu devletin suçlu ekonomisini kontrol ediyor. Şiddet, extortion ve kartel yönetimi, [ROOT.GetCountry.GetAdjective] devlet otoritesini terk etti."

 cartel_gulf_controlled:0 "Gulf Cartel Bölgesi"
 cartel_gulf_controlled_desc:0 "Gulf Cartel burada bölgesel egemenliği kurdu. [ROOT.GetCountry.GetAdjective] devlet otoritesi nominaldir."

 cartel_sinaloa_controlled:0 "Sinaloa Cartel Bölgesi"
 cartel_sinaloa_controlled_desc:0 "Sinaloa Cartel burada bölgesel egemenliği kurdu. Yerel ekonomi ve [ROOT.GetCountry.GetAdjective] hükümet pervask."

 cartel_northeast_controlled:0 "Kuzeydoğu Cartel Bölgesi"
 cartel_northeast_controlled_desc:0 "Cartel del Noreste burada egemenlik kurdu, [ROOT.GetCountry.GetAdjective] Kendi şiddet yönetimi ile devlet otoritesini atladı."

 cartel_crackdown_success:0 "Counter-Narco Success"
 cartel_crackdown_success_desc:0 "[ROOT.GetCountry.GetName]'nin karşı-trafficking kampanyasında büyük bir başarı, hükümetin meşruiyetini ve prestijisini güçlendirdi."

 cartel_assassination_aftermath:0 "Cartel Assassination"
 cartel_assassination_aftermath_desc:0 "Yüksek profilli bir suikast, [ROOT.GetCountry.GetName] ve daha fazla karmaşaya duyulan kamu güvenini sarsmıştır."

 cartel_laundering_investigation:0 "Para Laundering Research"
 cartel_laundering_investigation_desc:0 "Cartel para laundering için aktif bir soruşturma [ROOT.GetCountry.GetName]'nin anti-korruption bilgilerini geliştiriyor."

 cartel_laundering_ignored:0 "Para Laundering Overlooked"
 cartel_laundering_ignored_desc:0 "Laundering soruşturmasını bırakma kararı uluslararası kaşlar yükseltti."

 cartel_us_cooperation_bonus:0 "US Counter-Narcotics İşbirliği"
 cartel_us_cooperation_bonus_desc:0 "[SCOPE.sCountry('c:USA').GetAdjective] anti-drug programları ile aktif işbirliği, [ROOT.GetCountry.GetName] için istihbarat desteği ve diplomatik faydalar getirdi."

 cartel_us_rejection:0 "ABD Baskı Rejected"
 cartel_us_rejection_desc:0 "[ROOT.GetCountry.GetName] [SCOPE.sCountry('c:USA').GetAdjective] anti-narcotics işbirliğini reddetti. Yurtiçi otorite korunmuştur, ancak [SCOPE.sCountry('c:USA').GetName] ile ilişkiler serinlendi."

 cartel_retaliation_escalate:0 "Cartels'e Karşı Açıklama"
 cartel_retaliation_escalate_desc:0 "Cartel retaliation'ı takip etme kararı [ROOT.GetCountry.GetName] ancak hükümet çözülür."

 cartel_retaliation_pullback:0 "Restrained Response"
 cartel_retaliation_pullback_desc:0 "[ROOT.GetCountry.GetName] hükümeti, kartel retaliasyon sonrası sivilleri korumak için geri çekildi."

 cartel_fight_ambush:0 "Troops Ambushed"
 cartel_fight_ambush_desc:0 "Cartel tabancası bir [ROOT.GetCountry.GetAdjective] askeri üniteyi rahatlatır, kayıplara ve şu anda karşı-kartel kampanyasını yavaşlatır."

 cartel_fight_victory:0 "Cartels Broken"
 cartel_fight_victory_desc:0 "Kartellere karşı [ROOT.GetCountry.GetAdjective] askeri kampanya başarılı oldu. Ağlar parçalanmış ve devlet otoritesi restore edilmiştir."
 
 # ==========================================
 # JOURNAL ENTRIES
 # ==========================================
 
 je_mexican_drug_war:0 "Meksikalı Uyuşturucu Savaşı"
 je_mexican_drug_war_reason:0 "Karteller aralarında [ROOT.GetCountry.GetName] bölünmüşlerdir. CJNG, Gulf Cartel, Sinaloa Cartel ve Cartel del Noreste her kontrol bölgesi hükümetin hırsızı zayıf veya yoksundur. Endüstriler yavaşladı. İnsanlar ayrılıyor. Şiddet endemik.\n\n [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName] Henüz kartellerle yüzleşmeye karar vermedi. Ancak durum sonsuza kadar festere bırakılamaz – kartel bölgesi hala genişliyor ve her ay tepki verme olayı daha zor bir şekilde hesaplıyor."
 
 je_us_mexico_drug_war_support:0 "Meksika'yı desteklemek"
 je_us_mexico_drug_war_support_desc:0 "[SCOPE.sCountry('c:MEX').GetName], ülkenin önemli porsiyonlarının kontrolünü ele alan narco-cartel ağlarına karşı varoluşsal bir mücadele ile ilgilidir. [ROOT.GetCountry.GetName] sonucu doğrudan ilgiye sahiptir: narkotik kuzeye, güney sınırının istikrarı ve [SCOPE.sCountry('c:MEX').GetAdjective] devletin bütünlüğü tehlikededir.\n [SCOPE.sCountry('c:MEX').GetName] ile bir askeri yardım anlaşması imzalamak, kaynaklar, istihbarat ve [SCOPE.sCountry('c:MEX').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCountry('c:MEX').GetRuler.GetLastName] hükümeti - ve uyuşturucu savaşın ötesinde iyi bir şekilde ikili ilişkiyi derinleştirmek."
 
 # Status descriptions
 mdw_je_not_declared_tt:0 "[ROOT.GetCountry.GetName] hükümeti henüz kartellerde savaş ilan etmedi. Durum kötüleşiyor - kartel ağları aktif olarak bölgesel kontrollerini genişletiyor. [ROOT.GetCountry.GetAdjective] kampanyaya askeri uygulamak için aşağıdaki düğmeyi kullanın."
 mdw_je_commander_needed_tt:0 "Savaş ilan edildi. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName] Şimdi kartel tutulan bölgede operasyonları yürütmek için bir komutan dağıtmalıdır."
 mdw_je_active_tt:0 "[SCOPE.sCharacter('mdw_commander_storage').GetFullName], [ROOT.GetCountry.GetAdjective] kartellere karşı operasyonlardır. Cartel bölgesi hala rekabet ediliyor - tüm kontrollü devletler savaş ilan edilmeden önce temizlenmelidir."
 
 us_mdw_je_no_pact_tt:0 "[SCOPE.sCountry('c:MEX').GetName] ile hiçbir askeri yardım anlaşması imzalandı. [SCOPE.sCountry('c:MEX').GetRuler.GetPrimaryRoleTitle] ile bir askeri yardım anlaşması önermek için diplomasi ekranından Navigate to the diplomasi screen to offer a askeri yardım anlaşması with [SCOPE.sCountry('c:MEX').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCountry('c:MEX').GetRuler.GetLastName] hükümeti."
 us_mdw_je_pact_active_tt:0 "Bir askeri yardım anlaşması [SCOPE.sCountry('c:MEX').GetName] ile etkileniyor. [ROOT.GetCountry.GetAdjective] desteği, [SCOPE.sCountry('c:MEX').GetRuler.GetLastName] karşı-kartel kampanyasına yardımcı oluyor."
 
