 je_drug_trafficking:0 "Uyuşturucu Ticareti"
 je_drug_trafficking_reason:0 "Narco-trafficking ağları, [ROOT.GetCountry.GetName]'nin siyasi ve ekonomik yaşamında derinden gömülü hale geldi. Karteller ülke aracılığıyla milyarlarca hareket eder - yolsuzluk yetkilileri, özel ordular finanse eder ve devlet tarafından bırakılan bir vakum doldurun. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName] bir yıldızk seçeneği ile karşı karşıya: devlet kendisi kadar güçlü olan ağlarla çalışmak veya otoritenin onları yok etmeye çalıştığını harcamak. Bu, Uyuşturucu akışını yavaşlatarak elde edilebilir ve suçlu sindicates'ten vazgeçebilir."

 je_fighting_cartels:0 "Cartels ile savaşmak"
 je_fighting_cartels_reason:0 "Ticaret ağları içinde dug var. Başarısız bir politikanın ardından, [ROOT.GetCountry.GetName] hükümeti, kartellere karşı doğrudan askeri eyleme girmeye karar verdi. Genel olarak, karşı-kartel operasyonlarına liderlik etmek için dağıtılmalıdır. Kolay olmayacak - ve hızlı olmayacak."

 cartel_je_working_with_tt:0 "[ROOT.GetCountry.GetName] hükümeti, kartellerle çalışan bir düzenleme kurdu. Otorite ve meşruiyet artıyor - ama ilişki muazzam bir itibar riski taşıyor."
 cartel_je_cracking_down_tt:0 "Hükümet aktif olarak uyuşturucu kaçakçılığı üzerine çöküyor. Kampanya otoriteyi yok ediyor ancak [ROOT.GetCountry.GetName] uluslararası ayakta."
 cartel_je_no_policy_tt:0 "Hiçbir politika belirlenmedi. [ROOT.GetCountry.GetName]'nin kartelleri nasıl idare edeceğini seçmek için aşağıdaki düğmeleri kullanın."
 cartel_fight_je_commander_needed_tt:0 "Hiçbir komutan konuşamamıştır. Alana genel göndermek için aşağıdaki düğmeyi kullanın."
 cartel_fight_je_commander_active_tt:0 "[SCOPE.sCharacter('cartel_general_storage').GetFullName] [ROOT.GetCountry.GetName]'de önde gelen karşı-kartel işlemleridir."

