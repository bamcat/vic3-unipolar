 cartel_button_cooperate_name:0 "Cartels ile çalışmak"
 cartel_button_cooperate_desc:0 "Narco ağları ile çalışan bir düzenleme kurmak. Güçlü yetkiye, meşruiyete ve savunmaya güç verir - ancak önemli infamy ve [SCOPE.sCountry('c:USA').GetName] ile ilişkileri zayıflatır."

 cartel_button_crackdown_name:0 "Crack Down on Trafficking"
 cartel_button_crackdown_desc:0 "Uyuşturucu kaçakçılığı ağlarına karşı aktif bir kampanya başlat. 200 otorite ve afyon ticaretini yasaklar, ancak [ROOT.GetCountry.GetName]'nin uluslararası ayakta ve prestijini geliştirir."
