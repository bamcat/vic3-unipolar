 # ==========================================
 # EVENTS
 # ==========================================
 
 # mdw_events.1 — War Declared
 mdw_events.1.t:0 "[ROOT.GetCountry.GetName] Kartels Savaşı"
 mdw_events.1.d:0 "Yıllar süren ürpertici karel genişleme ve yarı-measures başarısız olduktan sonra [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName] hükümeti resmi olarak [ROOT.GetCountry.GetAdjective] askerini narco ağlarına karşı kampanyaya adamış durumda. Açıklama önemlidir - sadece operasyonel olarak değil, sembolik olarak. [ROOT.GetCountry.GetAdjective] devlet, durumu kabul etmeyecektir.\n\n Karteller cevap verecektir. Askeri hazır olmalıdır."
 mdw_events.1.f:0 "Devlet onun çizgisini çizmiştir."
 mdw_events.1.a:0 "[ROOT.GetCountry.GetName] buna ait olanları yeniden kabul edecek"
 
 # mdw_events.2 — Commander Selection
 mdw_events.2.t:0 "Kampanyayı kim yönetecek?"
 mdw_events.2.d:0 "Açıklama yapıldı. Şimdi bir kumandan seçilmelidir - bir kişi savaşı kartel kaplı bölgeye götürmeye istekli, düşmanın zemini bildiği yerde, yerel bilişimcilere sahip ve orduyu yapmaya isteklidir. Bu kirli bir savaş olacak."
 mdw_events.2.f:0 "Doğru genel her şeyi değiştirir."
 mdw_events.2.a:0 "Deploy [SCOPE.sCharacter('mdw_commander_1').GetFullName]"
 mdw_events.2.b:0 "Deploy [SCOPE.sCharacter('mdw_commander_2').GetFullName]"
 mdw_events.2.c:0 "Deploy [SCOPE.sCharacter('mdw_commander_3').GetFullName]"
 
 # mdw_events.3 — Combat Patrol
 mdw_events.3.t:0 "[SCOPE.sState('mdw_active_state').GetName]"
 mdw_events.3.d:0 "[SCOPE.sCharacter('mdw_commander').GetFullName] [SCOPE.sState('mdw_active_state').GetName]'de kartel güçlerle bir dizi ilişki bildiriyor. Karteller bölgelerini tutmak için savaşıyor - yolblocks, keskin nişancılar kullanarak ve güçlü inançlarla ilgili yaklaşımlarda IEDs. İlerleme yapılır, ancak zaman ve kaynaklardaki maliyet önemlidir."
 mdw_events.3.f:0 "Her kilometre yol temizlendi, kartellerin kullanabileceği bir kilometre."
 mdw_events.3.a:0 "Sıkıntı - bölgeyi çabucak alın"
 mdw_events.3.b:0 "Gelişmiş yöntemsel olarak – hareket etmeden önce her pozisyonu güvenli"
 
 # mdw_events.4 — State Cleared
 mdw_events.4.t:0 "[SCOPE.sState('mdw_active_state').GetName] Cleared"
 mdw_events.4.d:0 "Önemli bir operasyonel başarı: [SCOPE.sCharacter('mdw_commander').GetFullName] [SCOPE.sState('mdw_active_state').GetName]'daki kartel kuvvetlerin kırılması. Onların komuta yapısı ortadan kaldırıldı, lojistik kesti ve anahtar rakamları öldü veya gözaltında. [ROOT.GetCountry.GetAdjective] askeri işgal güçleri zemini tutmak için hareket eder.\n\n Bir devlet hükümet kontrolü altında geri döndü. Daha fazla kalır."
 mdw_events.4.f:0 "Harita değişiyor."
 mdw_events.4.a:0 "Sonrakine devam edin – ivmeyi tut"
 
 # mdw_events.5 — Ambush
 mdw_events.5.t:0 "Ambush – [SCOPE.sCharacter('mdw_commander').GetFullName]'s Column Is Under Attack"
 mdw_events.5.d:0 "Cartel tabancası [ROOT.GetCountry.GetAdjective] [SCOPE.sState('mdw_active_state').GetName] askeri sütunu pusulaladı. Saldırı koordine edildi - birden fazla ateş pozisyonu, önceden planlanan geri çekilme rotaları ve sütunun hareketlerinin bilgisi [ROOT.GetCountry.GetAdjective] askeri komuta zinciri içinde bilgi. Ölümler var. [SCOPE.sCharacter('mdw_commander').GetFullName] nişanı yönetiyor."
 mdw_events.5.f:0 "Karteller, seçtikleri zaman bir ordu gibi savaşırlar."
 mdw_events.5.a:0 "Savaş - onları takip et ve yok et"
 mdw_events.5.b:0 "Break contact – regrup ve süpür later"
 
 # mdw_events.6 — Commander Under Fire
 mdw_events.6.t:0 "[SCOPE.sCharacter('mdw_commander').GetFullName] Tehlikededir"
 mdw_events.6.d:0 "İstihbarat, saha raporlarının önerdiği şeyi doğruladı: karteller [SCOPE.sCharacter('mdw_commander').GetFullName] öncelikli hedef olarak tespit edildi. Profesyonel bir suikast ekibi onlara karşı görevlendirilmiştir. Tehdit güvenilirdir. Komutanı [ROOT.GetCountry.GetCapital.GetCityHubName]'ye geri çekmek riski azaltacaktır - ancak kampanyanın kritik bir anda ivmesini durduracaktır."
 mdw_events.6.f:0 "Karteller düşmanlarını inceliyor."
 mdw_events.6.a:0 "Pull [SCOPE.sCharacter('mdw_commander').GetFullName] geri - kampanya bekleyebilir"
 mdw_events.6.b:0 "Basın - [SCOPE.sCharacter('mdw_commander').GetFullName] riski kabul eder"
 
 # mdw_events.10 — Victory
 mdw_events.10.t:0 "İlaç Savaşı Kazandı"
 mdw_events.10.d:0 "[SCOPE.sCharacter('mdw_commander').GetFullName] son operasyonel raporu gönderir: kartel bölgesel kontrol [ROOT.GetCountry.GetName] arasında kırıldı. Son güçlü inançlar temizlendi. Askeri işgal yerindedir. Cartel ağları hala var - zayıf formda yıllarca yeniden kurulacaklardır - ancak [ROOT.GetCountry.GetAdjective] durumu kendi topraklarında yeniden ifade etti.\n\n Bu kaçınılmaz değildi. Siyasi irade, askeri taahhüt ve birçok yönden şansa ihtiyaç duyacaktır. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName] kazandı - ilk etapta otomobilelleri mümkün kılan koşulları ele almak için zaman."
 mdw_events.10.f:0 "[ROOT.GetCountry.GetName] onun ne olduğunu yeniden dile getirdi."
 mdw_events.10.a:0 "Sert bir zafer - ve bir başlangıç"
 
 # mdw_events.11 — Commander Killed
 mdw_events.11.t:0 "[SCOPE.sCharacter('mdw_commander').GetFullName] Öldürüldü"
 mdw_events.11.d:0 "En kötüsü oldu. Cartel suikast operasyonu başarılı oldu. [SCOPE.sCharacter('mdw_commander').GetFullName] öldü - [ROOT.GetCountry.GetAdjective] güvenlik hizmetlerinin güvenilir uyarılara rağmen engellemediği bir saldırıda öldürüldü. Haber saatler içinde halktır. Karteller, kontrol ettikleri kasabalarda açıkça kutluyorlar.\n\n Kampanya bitmiyor. Ama ondan kurtarmak için aylar alacak bir darbe yaşadı. Yeni bir komutan bulunmalıdır - ve karteller konsolide etmek için zaman kullanacaklar."
 mdw_events.11.f:0 "Karteller henüz en önemli darbelerini vurdu."
 mdw_events.11.a:0 "Bu arada kırılmayacağız – savaş devam ediyor"
 
 # mdw_events.20 — US Aid
 mdw_events.20.t:0 "[SCOPE.sCountry('c:USA').GetName] Askeri Yardım Anlaşmasını İmzaladı"
 mdw_events.20.d:0 "[SCOPE.sCountry('c:USA').GetCapital.GetCityHubName] taşındı. [SCOPE.sCountry('c:USA').GetName] resmi olarak [ROOT.GetCountry.GetName] ile bir askeri yardım anlaşması imzaladı - istihbarat kaynakları, danışmanlık personeli, ekipman ve karşı-kartel kampanyasına lojistik destek. Anlaşma önemli bir siyasi gelişmedir: [SCOPE.sCountry('c:USA').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCountry('c:USA').GetRuler.GetLastName] [ROOT.GetCountry.GetName] Doğrudan ulusal ilgi meselesi olarak, \n\n [ROOT.GetCountry.GetName] için, pratik faydalar hemen: Otorite restore edilir, ekipman akandır ve carteller artık [SCOPE.sCountry('c:USA').GetName]'nin tam istihbarat aygıtı ile bir düşmanla yüz yüze gelirler."
 mdw_events.20.f:0 "[SCOPE.sCountry('c:USA').GetName] işlandığında, denge değişir."
 mdw_events.20.a:0 "Bu, kampanyası tamamen değiştiriyor"
 
 # ==========================================
 # MODIFIERS
 # ==========================================
 
 mdw_war_declared_modifier:0 "Meksikalı Uyuşturucu Savaşı - Aktif Kampanya"
 mdw_war_declared_modifier_desc:0 "[ROOT.GetCountry.GetName] askerini narco-cartellere karşı doğrudan bir kampanyaya adamış. Otorite tüketiliyor ve askeri meşgul, ancak [ROOT.GetCountry.GetAdjective] devlet kendini iddia ediyor."
 
 mdw_us_aid_modifier:0 "ABD Askeri Yardım"
 mdw_us_aid_modifier_desc:0 "[SCOPE.sCountry('c:USA').GetName] ile aktif bir askeri yardım anlaşması istihbarat, lojistik ve ekipman [ROOT.GetCountry.GetName] karşı-kartel kampanyasına veriyor."
 
 mdw_victory_modifier:0 "Uyuşturucu Savaşı Kazandı"
 mdw_victory_modifier_desc:0 "[ROOT.GetCountry.GetName] İlaç Savaşını kazandı. Cartel bölgesel kontrol bozuldu ve [ROOT.GetCountry.GetAdjective] devlet yeniden ifade edilen egemenliği yeniden ortaya çıkardı. Otomobilelleri üreten koşullar kalır - ancak bu savaş kazanılmıştır."
 
 mdw_commander_killed_modifier:0 "Komutan Eylemde Öldürdü"
 mdw_commander_killed_modifier_desc:0 "Karşı-kartel komutanının suikastı, [ROOT.GetCountry.GetName] ve kartellere olan güvenini sarsmıştır."
 
 mdw_troops_ambushed:0 "Troops Ambushed"
 mdw_troops_ambushed_desc:0 "[ROOT.GetCountry.GetAdjective] askeri sütun, zararlara neden olan ve geçici olarak saldırgan yetenekleri azaltan kartel kuvvetleri tarafından pusulandı."
 
 # Cartel territory modifier descriptions (MDW context)
 cartel_cjng_controlled:0 "CJNG Bölgesi"
 cartel_cjng_controlled_desc:0 "Jalisco New Generation Cartel bu devletin suçlu ekonomisini kontrol ediyor. Endüstriyel aktivite bozulur, altyapı bozuluyor ve insanlar [ROOT.GetCountry.GetAdjective] bölgeyi terk ediyor."
 
 cartel_gulf_controlled:0 "Gulf Cartel Bölgesi"
 cartel_gulf_controlled_desc:0 "Gulf Cartel burada bölgesel egemenliği kurdu. Ekonomik aktivite bastırılır ve [ROOT.GetCountry.GetAdjective] devlet otoritesi nominaldir."
 
 cartel_sinaloa_controlled:0 "Sinaloa Cartel Bölgesi"
 cartel_sinaloa_controlled_desc:0 "Sinaloa Cartel bu durumu kontrol eder. Tarımsal çıktı bozuldu ve yerel ekonomi kartel gözetim altında çalışır."
 
 cartel_northeast_controlled:0 "Kuzeydoğu Cartel Bölgesi"
 cartel_northeast_controlled_desc:0 "Cartel del Noreste burada egemenlik kurdu. [ROOT.GetCountry.GetName]'de altyapı ve bina verimliliği acı çekiyor."
 
 # usa war on drugs

 je_war_on_drugs:0 "Uyuşturucular Savaşı"
 je_war_on_drugs_reason:0 "Narkotik akışı [ROOT.GetCountry.GetName] ulusal bir krizdir. Cocaine, kahraman ve diğer maddeler - büyük ölçüde Latin Amerika'da ve [ROOT.GetCountry.GetAdjective] sınırlarında üretilen - yıkıcı toplumlar, şiddetli suçlar ve kamu kurumlarını yozlaştırmak.\n\n[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName] yönetimi kapsamlı bir kampanyaya karar verdi: Kaynakta tedariki güçlendirmek için uluslararası ortaklıklar, sınırları kapatmak ve talep etmek için yerel uygulama. Kampanya maliyetsiz değildir - daha geniş ekonomide ağırlık gerektiren kaynaklar - ancak alternatif yabancı suçlu ağların merhametinde giderek artan bir ülkedir.\n\n@information! Cartel bölgesi Meksika'da genişleyebilir. Meksika hükümeti ile bir askeri yardım anlaşması bu kampanyanın uluslararası bileşeninin temel taşıdır."

 narco_economy_plantation_bonus:0 "Narco Ekonomi"
 narco_economy_plantation_bonus_desc:0 "İlaç ticareti kendisini [ROOT.GetCountry.GetName] tarım ekonomisine taşıdı. Plantasyon çıktısı - özellikle afyon - normal seviyelerin üzerinde çalışıyor, kartel talebi ile devam ediyor ve kırsal topluluklara narko-paranın yozlaşması akışı."

 war_on_drugs_active_modifier:0 "Uyuşturucularda Savaş"
 war_on_drugs_active_modifier_desc:0 "[ROOT.GetCountry.GetAdjective] hükümet uyuşturucu kaçakçılığına karşı kapsamlı bir kampanyaya karar verdi. Uygulamalı çaba - evcil polislik, interdiction operasyonları ve uluslararası işbirliği - ekonomi genelinden gelen kaynakları çizmek ve ulusal verimlilik konusunda mütevazı ama gerçek bir maliyet."

 war_on_drugs_victory_modifier:0 "Uyuşturucularda Savaş - Kazandı"
 war_on_drugs_victory_modifier_desc:0 "[ROOT.GetCountry.GetAdjective] Uyuşturucular üzerindeki savaş, belirtilen hedeflerine ulaştı. Tedarik bastırıldı, sınırlar uygulanır ve kurumsal çerçeve yerindedir. Kampanya, [ROOT.GetCountry.GetName]'nin otoritesini ve prestijini güçlendirdi - ilaç talebi üreten temel koşullar çözülmedi."

 wod_je_status_active:0 "Kampanya devam ediyor."
 wod_je_status_ready:0 "Kampanya sona erdirmeye hazır."

 wod_completion_mexico_tt:0 "#bold Askeri Yardım#! Meksika ile pact."
 wod_completion_enforcement_tt:0 "Ya #bold Ulusal Muhafız #! veya #bold Gizli Polis#!"
 wod_completion_opium_price_tt:0 "Uyuşturucuların en az #bold% 65 pricier#! Amerikan pazarında."
 wod_completion_schools_tt:0 "#bold Okullar#! seviye #bold 5#! veya daha yüksek."
 wod_completion_border_tt:0 "#bold Migration Controls#! veya #bold Kapalı Sınırlar#!"
 wod_completion_no_safe_injection_tt:0 "#bold Güvenli Enjeksiyon Siteleri#! yok."
 wod_completion_no_trafficking_allowed_tt:0 "#bold Trafik İzinli#! yok."
 wod_completion_no_hard_drugs_decriminalized_tt:0 "#bold Hard Drugs Decriminalized#! yok."
