 io_nato_desc: "[concept_nato] [concept_military_defense_agreement] Kuzey Amerika ve Avrupa ülkeleri kolektif savunmada bağlayıcıdır. Bir üyeye karşı silahlı bir saldırı, her şeye karşı bir saldırı olarak kabul edilir. NATO'ya katılmak, mevcut her üye devletle karşılıklı savunma anlaşması yaratır."
 
 io_opec_desc: "[concept_opec], petrol üretim politikalarını koordine eden büyük petrol kaynaklı ulusların bir organizasyonudur. Üye devletler kartel fiyatlandırma gücünden yararlanır, petrol ihracatında önemli bir ticaret avantajı kazanır ve koordineli yatırımdan gelen ekstraksiyonu geliştirir."
 
 io_eec_desc: "[concept_eec] Avrupa üye ülkeleri arasında bir gümrük birliği kurmak [concept_free_trade_agreement] Üyeler standart ürün düzenlemeleri ve koordineli ticaret politikaları ile ortak bir pazarı paylaşıyor, sınırların sınırları boyunca ticaret engelleri azaltır."
 
 io_arab_league_desc: "[concept_arab_league] Arap konuşan ulusların siyasi, ekonomik, kültürel ve sosyal işbirliğini teşvik eden bir [concept_cultural_pact]. Ortak miras teknoloji ve fikirlerin değişimini hızlandırır, üye devletlerin dayanışması içsel devrimci baskıları bastırmaya yardımcı olur."
 
