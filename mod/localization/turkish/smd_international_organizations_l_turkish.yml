 ngo_amnesty_scrutiny: "A Af Scrutiny Altında"
 ngo_amnesty_scrutiny_desc: "Af International, son eleştiriyi takip eden insan hakları kayıtlarımızı yakından takip ediyor. Hükümet meşruiyeti baskı altında."

 ngo_amnesty_reform_pressure: "Reform Baskı"
 ngo_amnesty_reform_pressure_desc: "Uluslararası sivil huzursuzluk raporu, reform için yerli ve uluslararası baskı yarattı, ancak devrimci duygulara yardımcı oldu."

 ngo_redcross_aid: "Red Cross Humanitarian Aid Aid"
 ngo_redcross_aid_desc: "Red Cross işçileri çatışma bölgelerinde sivillere insani yardım sağlıyor, ölümleri azaltıyor ve uluslararası itibarımızı artırıyor."

 ngo_redcross_cooperation: "Red Cross İşbirliği"
 ngo_redcross_cooperation_desc: "Red Cross ile savaş süresi davranışı ile olan işbirliğimiz, uluslararası duruşumuzu geliştirdi ve askeri eylemlerimiz tarafından üretilen infamy'yi azalttı."

 ngo_redcross_relief: "Red Cross Crisis Relief"
 ngo_redcross_relief_desc: "Red Cross bu sivil kriz döneminde insani yardım sağlıyor, etkilenen popülasyonları stabilize etmeye yardımcı oluyor."

 ngo_iaea_inspectors: "IAEA Inspectors Present"
 ngo_iaea_inspectors_desc: "IAEA denetçileri Nükleer tesislerimizde çalışıyor, teknik uzmanlığı ve güvenlik bilgilerini paylaşıyor. Onların varlığı teknoloji transferini hızlandırıyor ve diplomatik itibarımızı geliştiriyor."
