 ### GAME CONCEPTS
 ### ═══════════════════════════════════════

 concept_international_organization: "Uluslararası Organizasyon"
 concept_international_organization_desc: "Uluslararası Organizasyonlar, politikayı koordine etmek, ticareti teşvik etmek, kolektif güvenlik sağlamak veya üye ülkeler arasında kültürel değişimi teşvik etmek için ulusal sınırlar arasında faaliyet gösteren kurumlardır. Birkaç formda geliyorlar: [concept_free_trade_agreement]s, [concept_financial_agreement]s, [concept_military_defense_agreement]s, [concept_cultural_pact]s ve [concept_cooperative_agreement]s."

 concept_intergovernmental_organization: "Hükümetlerarası Organizasyon"
 concept_intergovernmental_organization_desc: "Hükümetlerarası bir organizasyon, üyelerin egemen uluslar olduğu [concept_international_organization]. [concept_nongovernmental_organization]s aksine, IGO'lar resmi üyelik gerektirir ve önemli diplomatik, ekonomik veya askeri faydalar sağlayabilir."

 concept_nongovernmental_organization: "Olmayan Kuruluş"
 concept_nongovernmental_organization_desc: "Hiçbir hükümet tarafından kontrol edilmeden uluslararası faaliyet gösteren bağımsız kurumlardır. Tüm uluslar NGO'lara varsayılan olarak bağlıdır. Hükümetler, NGO'nun görüşünü ve sağladığı faydaları etkileyen onları yasaklamayı, tolere etmeyi veya desteklemeyi seçebilirler."

 concept_international_treaty: "Uluslararası Anlaşma"
 concept_international_treaty_desc: "Bir Uluslararası Anlaşma, egemen ülkeler arasında resmi bir bağlayıcı anlaşmadır. [concept_intergovernmental_organization]s'in aksine, anlaşmalar devam eden organizasyon üyeliği gerektirmez - bir ulus ya bir işaretleyicidir veya değil. Signatories diplomatik faydalar alır, diğer işaretleyicilerle ilgili zararları geri alırken."

 international_treaty_type:0 "[concept_international_treaty]
 concept_free_trade_agreement: "Ücretsiz Ticaret Anlaşması"
 concept_free_trade_agreement_desc: "Ücretsiz Ticaret Anlaşması, Üye Ülkeler arasındaki ticari engelleri azaltır ve malların ve ekonomik büyüme değişimini teşvik eder."

 concept_financial_agreement: "Finansal Anlaşma"
 concept_financial_agreement_desc: "Bir Finansal Anlaşma [concept_international_organization], üyeleri arasında para işbirliği, geliştirme finansmanı ve finansal istikrar üzerine odaklanmıştır. Üyeler +5% Influence and +1 Diplomatic Reputation alırlar."

 concept_military_defense_agreement: "Askeri Savunma Anlaşması"
 concept_military_defense_agreement_desc: "Askeri Savunma Anlaşması, kolektif güvenlik ilkesi üzerine inşa edilen [concept_international_organization]. Bir üyeye yapılan bir saldırı her şeye bir saldırı olarak kabul edilir."

 concept_cultural_pact: "Kültür Pakt"
 concept_cultural_pact_desc: "Kültürel Bir Pact, ortak mirası, dilini ve üyeleri arasında kültürel değişimi teşvik eden bir [concept_international_organization]."

 concept_cooperative_agreement: "Kooperatif Anlaşma"
 concept_cooperative_agreement_desc: "Bir Kooperatif Anlaşması [concept_international_organization] geniş multilateral diplomasiye odaklandı. Diğer organizasyon türlerinin aksine, Kooperatif Anlaşmalar doğrudan modifier sağlar. Onların etkisi kararlar ve girişimler yoluyla gerçekleştirilir."

 concept_united_nations: "Birleşmiş Milletler"
 concept_united_nations_desc: "Birleşmiş Milletler dünya ülkelerinin [concept_cooperative_agreement], uluslararası barışı, güvenliği ve işbirliğini sürdürmek için adanmıştır."

