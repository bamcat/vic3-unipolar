 ### United Nations
 io_un_name: "Birleşmiş Milletler"
 io_un_abbreviation: "Birleşmiş Milletler"
 io_un_desc: "[concept_united_nations], uluslararası barışı ve güvenliği korumak için kurulmuş bir [concept_cooperative_agreement], uluslar arasında dostça ilişkiler geliştirmek ve sosyal ilerlemeleri teşvik etmektir. Diğer [concept_intergovernmental_organization]s'in aksine, UN doğrudan üyelerine modifier sağlar. Onun etkisi diplomatik kararlar, barış koruma görevleri ve küresel girişimler yoluyla gerçekleştirilir."
 io_un_tooltip: "[concept_united_nations] dünyanın uluslarının [concept_cooperative_agreement] Ayrıntıları görüntülemek için tıklayın."

 ### NATO
 io_nato_name: "Kuzey Atlantik Antlaşması Organizasyonu"
 io_nato_abbreviation: "NATO NATO NATO"
 io_nato_desc: "[concept_nato] 1949 yılında kurulan [concept_military_defense_agreement], kolektif savunmada Kuzey Amerika ve Avrupa uluslarını bağlayıcıdır. Bir üyeye karşı silahlı bir saldırı, her şeye karşı bir saldırı olarak kabul edilir. NATO ortak askeri egzersizleri koordine eder, ekipmanlarını standartlaştırır ve entegre komuta yapıları korur."

 ### G7
 io_g7_name: "Grup 7"
 io_g7_abbreviation: "G7"
 io_g7_desc: "[concept_g7] dünyanın en büyük gelişmiş ekonomilerini içeren bir [concept_financial_agreement]. Üyeler mali politikası, para politikası ve ekonomik yönetişimi koordine ederler. Üyelik önemli diplomatik etkiler ve finansal güvenilirlik sağlar."

 ### OPEC
 io_opec_name: "Petrol İhracat Ülkeleri Örgütü"
 io_opec_abbreviation: "OPEC"
 io_opec_desc: "[concept_opec], üye ülkeler arasında petrol politikalarını koordine eden önemli petrol üreten ulusların [concept_free_trade_agreement]'dir. OPEC, petrol piyasalarının stabilizasyonu ve ülkeleri üretmek için adil geri dönüşler sağlamayı amaçlamaktadır."

 ### EEC
 io_eec_name: "Avrupa Ekonomik Topluluğu"
 io_eec_abbreviation: "EEC"
 io_eec_desc: "[concept_eec], Avrupa üye ülkeleri arasında ortak bir pazar kurmak için [concept_free_trade_agreement] Ticaret bariyerlerini azaltır, ekonomik düzenlemeleri harmonize eder ve üye ülkeler arasında ücretsiz mal, hizmet, sermaye ve iş hareketini teşvik eder."
 
 ### Arab League
 io_arab_league_name: "Arap Ligi"
 io_arab_league_abbreviation: "LAS"
 io_arab_league_desc: "[concept_arab_league] Arap konuşan uluslarının üyeleri arasında siyasi, ekonomik, kültürel ve sosyal işbirliğini teşvik eden bir [concept_cultural_pact] Lig, Arap ülkeleri arasındaki ortak ilgi ve arabuluculuk anlaşmazlıkları konusunda politikaları koordine ediyor."

 ### IMF
 io_imf_name: "Uluslararası Para Fonu"
 io_imf_abbreviation: "IMF"
 io_imf_desc: "[concept_imf], uluslararası para işbirliğini teşvik eden bir [concept_financial_agreement], değişim oranı istikrarı ve düzenle değişim düzenlemeleridir. Ödeme zorluklarının dengesine karşı üye ülkelere finansal yardım ve politika tavsiyesi sağlar."

 ### ESA
 io_esa_name: "Avrupa Uzay Ajansı"
 io_esa_abbreviation: "ESA"
 io_esa_desc: "[concept_esa] [concept_cooperative_agreement] Dış alanın keşif ve kullanımına adanmıştır. Üye devletler, tek bir Avrupa ulusunun tek başına elde edemeyeceği fırlatma araçları, uydular ve bilimsel görevleri geliştirmek için havuz kaynakları sunmaktadır."

 ### ASEAN
 io_asean_name: "Güneydoğu Asya Birliği"
 io_asean_abbreviation: "ASEAN"
 io_asean_desc: "[concept_asean] Güneydoğu Asya ülkelerinin ekonomik büyümeyi, sosyal ilerlemeyi ve kültürel gelişimini teşvik eden bir [concept_cooperative_agreement]. ASEAN bölgesel istikrarı kolaylaştırır ve Asya-Pasifik bölgesinde çok taraflı diyalog için bir çerçeve sunar."

 ### WHO
 io_saarc_name: "Güney Asya Bölge İşbirliği Derneği"
 io_saarc_desc: "[concept_saarc] Güney Asya ülkeleri arasında bölgesel işbirliği, geliştirme koordinasyonu ve multilateral diyalog amaçlanmıştır."

 io_cis_name: "Bağımsız Devletler Topluluğu"
 io_cis_desc: "[concept_cis] [concept_cooperative_agreement] Sovyet sonrası devletler arasında bölgesel danışmanlık, ekonomik koordinasyon ve sivil toplum işbirliğine odaklandı."

 io_who_name: "Dünya Sağlık Örgütü"
 io_who_abbreviation: "WHO"
 io_who_desc: "[concept_who] [concept_cooperative_agreement] Uluslararası sağlık politikasını yönlendirmek ve koordine etmektir. Küresel sağlık konularında liderlik sağlar, normlar ve standartlar, sağlık trendlerini izler ve uluslararası sağlık acil durumlara cevap verir."

 ### ═══════════════════════════════════════
 ### TREATIES — Names & Descriptions
 ### ═══════════════════════════════════════

 io_treaty_geneva_name: "Cenevre Konvansiyonları"
 io_treaty_geneva_desc: "Cenevre Konvansiyonları olarak bilinen bir dizi anlaşma, silahlı çatışma sırasında insani tedavi için uluslararası hukuk standartlarının oluşturulmasından sorumludur. [concept_international_treaty] yaralı askerler, savaş esirlerini ve savaş zamanında sivilleri korumak için oturumlar."

 io_treaty_cwc_name: "Kimyasal Silahlar Konvansiyonu"
 io_treaty_cwc_desc: "Kimyasal Silahlar Konvansiyonu, geliştirme, üretim, satın alma, stoklama, saklama, transfer ve kimyasal silah kullanımı yasaklayan bir [concept_international_treaty] Signatories, uluslararası doğrulama altında mevcut stokları yok etmeyi kabul ediyor."

 io_treaty_npt_name: "Proliferation Antlaşması"
 io_treaty_npt_desc: "Nükleer Silahların Ortamına Dair Anlaşma, nükleer silahların yayılmasını önlemek, silahsızlanmayı teşvik etmek ve uluslararası koruma altındaki nükleer enerjinin barışçıl kullanımını kolaylaştırmak amacıyla bir [concept_international_treaty]"

 io_treaty_bwc_name: "Biyolojik Silahlar Konvansiyonu"
 io_treaty_bwc_desc: "Biyolojik Silahlar Konvansiyonu [concept_international_treaty] Biyolojik ve tokuç silahlarını yasaklamak. Tüm silah kategorisini yasaklamak için ilk çok taraflı silahsızlanma anlaşmasıydı."

 io_treaty_cat_name: "İşkenceye Karşı Sözleşme"
 io_treaty_cat_desc: "İşkenceye Karşı Sözleşme [concept_international_treaty] Tüm işkence ve zulüm biçimlerini, insanlık dışı veya cezayı yasaklamaktır. Signatories, kendi yargılarında işkenceyi önlemek için etkili önlemlere sahiptir."

