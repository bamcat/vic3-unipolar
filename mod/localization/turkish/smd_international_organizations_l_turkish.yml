 # European Union
 
 je_european_union: "Avrupa Birliği"
 je_european_union_reason: "Avrupa Birliği modern çağın en hırslı siyasi ve ekonomik projelerinden biri olarak duruyor.\n\n Ekonomik entegrasyon ilkeleri üzerine inşa edilen, paylaşılan yönetişim ve kolektif güvenlik, AB üyelerinin ortak bir piyasa, koordineli ticaret politikası ve kıtanın geleceğini şekillendirmede masada bir koltuk sağlar. Üyelik, malların, hizmetlerin, sermayenin ve insanların serbest hareket vaadini getiriyor - refah için eşsiz bir fırsat.\n\n Ancak, Birlik zorlukları olmadan değil. Üyeler karmaşık görüşmelere devam etmeli, uluslar arası düzenlemelere uymalı ve ulusal egemenliğin unsurlarına karşı uzlaşmalıdır. Daha derin entegrasyon büyür, her üyenin kaderi, kolektifinkine bağlıdır.\n\n Bir ülke AB içindeki mücadeleler veya mücadeleler ortak iyi ulusal çıkarları dengeleme yeteneğine bağlıdır, bu da parçaları toplamından daha fazla olmayı amaçlayan bir birlik içinde bir yol kurmaktır."

