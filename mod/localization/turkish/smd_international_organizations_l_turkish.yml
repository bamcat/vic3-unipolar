 opec_events.10.t: "OPEC Oylama"
 opec_events.10.d: "OPEC oylaması sona erdi ve sonuçlar müttefiktir."

 opec_events.11.t: "OPEC Arttırıyor"
 opec_events.11.d: "OPEC üyesi devletler petrol üretim kotalarını artırmak için oy kullandı. Gelecek yıl boyunca, tüm üye ülkeler petrol ihracatı için daha yüksek ekstraksiyondan yararlanacak ve gelişmiş ticaret konumlarından yararlanacak."
 opec_events.11.a: "Taplar açık"

 opec_events.12.t: "OPEC Cuts Production"
 opec_events.12.d: "OPEC üyesi devletler petrol üretim kotalarını kesmeye oy verdiler. Gelecek yıl boyunca, tüm üye ülkeler petrol üretimini küresel tedarik ve destek fiyatlarının artırılması için kısıtlayacaktır."
 opec_events.12.a: "Biz itaat edeceğiz"

 opec_events.13.t: "OPEC Oil Embargo Imposed"
 opec_events.13.d: "Petrol İhracat Ülkeleri Örgütü, bir petrol ambargosu oluşturmaya oy verdi. OPEC üyesi devletler, petrol ihracatını hedeflenen ülkeye toplu olarak kısıtlayacaklar, ekonomilerini ciddi bir şekilde bozacaktır."
