 eu_cultural_exchange: "AB Kültür Değişimi"
 eu_cultural_exchange_desc: "Avrupa Birliği'ne üye kültürel anlayış, göç ve yeni fikirlerin ve teknolojilerin yayılmasını teşvik etti."
 je_eu_membership_request: "AB üyeliği için başvuru"
 je_eu_membership_request_reason: "Hükümetiniz Avrupa Birliği'ne katılmak için resmi bir uygulama sundu.\n\n Bu süreç uzun süren görüşmeler, politika reformları ve AB yasaları ve standartları ile uyum içerir. Önümüzdeki yıllarda, ülkeniz ekonomik istikrar, yönetim, insan hakları ve demokratik ilkelere bağlı olarak değerlendirilecektir.\n\nBaşarılı katılım size verir:\n AB tek pazarına erişim\n Ürünler, hizmetler, sermaye ve diğer üye ülkelerle olan insanlar \n AB karar verme organlarına katılım \n\n Bununla birlikte, süreç politik olarak hassastır ve hem iç hem de mevcut AB üyelerinden direnişle karşılaşabilir."
 eu_membership_process: "AB Üyelik Sürecine Başlayın"
 request_to_join_eu_decision: "AB'ye katılmak için istek"
 request_to_join_eu_decision_desc: "Formal olarak Avrupa Birliği'ne katılmak için geçerlidir."
 
