 io_events.10.d: "Avrupa Ekonomik Topluluğunun üye ülkeleri Avrupa Birliği Antlaşması aracılığıyla entegrasyonlarını genişletmeyi kabul etti. EEC resmi olarak Avrupa Birliği'ne dönüştürülecek, dış politika, adalet ve para konularında genişleyen bir siyasi ve ekonomik birlik."
