  ### ══════════════════════════════════════════
 ### AMNESTY INTERNATIONAL
 ### ══════════════════════════════════════════

 ngo_events.1.t: "Af International Condemns Our Policy"
 ngo_events.1.d: "Af International, ulusumuzun insan hakları kaydı hakkında lanet bir rapor yayınladı, şu anki yasalarımızı temel özgürlüklerin sistematik bir ihlali olarak teşvik etti. Uluslararası topluluk fark etti ve hükümetimiz bu endişeleri ele almak için baskıya maruz kaldı."
 ngo_events.1.a: "Onların eleştirileri hiçbir şey değişmez"
 ngo_events.1.b: "Endişelerini inceleyeceğiz"

 ngo_events.2.t: "Uluslararası Af Örgütü Reformları"
 ngo_events.2.d: "Son yasama reformlarımız, İnsan Hakları için önemli bir adım olarak Af International tarafından kabul edilmiştir. Yıllık rapor ilerlememizi vurgulamaktadır, ulusumuzun uluslararası itibarını artırmak."
 ngo_events.2.a: "İlerlememizden gurur duyuyoruz"

 ngo_events.3.t: "Sivil Unrest'teki Af Raporları"
 ngo_events.3.d: "Af International, ulusumuzu işgal eden yaygın sivil kargaşayı belgeleyen özel bir rapor yayınladı. Hükümetimizi baskı yerine anlamlı reform yoluyla hoşnutsuzluk nedenlerini ele almak için çağırıyorlar."
 ngo_events.3.a: "Reformları dikkate alacağız"
 ngo_events.3.b: "İç ilişkilerimiz onların endişeleri değil"

 ### ══════════════════════════════════════════
 ### RED CROSS
 ### ══════════════════════════════════════════

 ngo_events.10.t: "Red Cross, İnsani Yardım Ediyor"
 ngo_events.10.d: "Uluslararası Kızıl Haç, devam eden çatışmalardan etkilenen sivillere yardım etmek için insani işçileri dağıtmayı teklif etti. Onların yardım ekipleri, savaş-torn bölgelerimizde yerlerinden edilmiş topluluklara tıbbi bakım, barınak ve yiyecek sunmaya hazırdır."
 ngo_events.10.a: "Yardımlarını memnuniyetle karşıladık"
 ngo_events.10.b: "Yabancı işçilere savaş bölgesinde izin veremeyiz"

 ngo_events.11.t: "Red Cross Criticizes Wartime Making"
 ngo_events.11.d: "Uluslararası Kızıl Haç, silahlı güçlerimizin yürütülmesi konusunda derin endişe ifade eden bir kamu ifadesi yayınladı. Çatışma bölgelerinde kapsamlı sivil kayıplar ve altyapı yıkımı raporları uluslararası dikkat çekti. Tüm tarafların Cenevre Konvansiyonlarına saygı duymasını istiyorlar."
 ngo_events.11.a: "Araştırmacılarla işbirliği yapacağız"
 ngo_events.11.b: "Bu iddiaları inkâr ediyoruz"

 ngo_events.12.t: "Red Cross Kriz Yardımı Teklif Ediyor"
 ngo_events.12.d: "Açık savaş yokluğuna rağmen, Uluslararası Kızıl Haç, sınırlarımız dahilinde büyüyen bir insani kriz belirledi. Sivil huzursuzluk ve ekonomik kesintiye rağmen uluslararası yardım gerektiren koşullar yarattı. Etkilenen toplumlar için rahatlama çabalarını koordine etmeyi teklif ediyorlar."
 ngo_events.12.a: "Onların yardımlarını kabul ediyoruz"
 ngo_events.12.b: "Bunu kendimiz halledebiliriz"

 ### ══════════════════════════════════════════
 ### IAEA
 ### ══════════════════════════════════════════

 ngo_events.20.t: "IAEA Requests Nükleer Muayene"
 ngo_events.20.d: "Uluslararası Atom Enerji Ajansı, kapsamlı bir güvenlik ve uyumluluk denetimi için nükleer tesislerimize resmen erişim talep etti. Proliferation Antlaşması'nın imzalayıcısı olarak, nükleer programımız uluslararası incelemeyi artırmıştır. IAEA bizi incelemenin rutin olduğunu garanti ediyor, ancak reddedilme uluslararası topluma açık bir sinyal gönderirdi."
 ngo_events.20.a: "Tesislerimiz denetime açık"
 ngo_events.20.b: "Nükleer programımız egemen bir konudur"

 ngo_events.21.t: "IAEA Commends Nükleer Güvenlik Kaydı"
 ngo_events.21.d: "Nükleer programımızın gözden geçirilmesinden sonra, Uluslararası Atom Enerji Ajansı, güvenlik standartları ve yaygın olmayan uyum taahhüdümüzü resmen kabul etti. NPT'ye olan bağlılığımız ve uluslararası denetçilerle işbirliğimiz, küresel nükleer toplulukta ayakta durmamızı güçlendirdi."
 ngo_events.21.a: "Biz barışçıl nükleer enerjiye kararlı kalırız"

 ngo_events.22.t: "IAEA Proliferasyon Endişelerini Yükseltiyor"
 ngo_events.22.d: "Uluslararası Atom Enerji Ajansı nükleer programımızın yönünde alarm yükseltti. NPT üyeliği olmadan ve denetçilerle işbirliğine devam ettikten sonra, IAEA olası silah geliştirme konusunda endişe ifade eden resmi bir açıklama yayınladı. Uluslararası topluluk yakından izliyor."
 ngo_events.22.a: "Biz diyaloga açık"
 ngo_events.22.b: "Egemenliğimizin nükleer teknolojiye doğru doğru olduğunu iddia ediyoruz"

