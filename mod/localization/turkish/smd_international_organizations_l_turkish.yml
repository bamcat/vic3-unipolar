 opec_events.1.t: "OPEC Oy Teşvik Edildi"
 opec_events.1.d: "Bir üye ulus, Petrol İhracat Ülkeleri Teşkilatı içinde bir oy çağrısında bulundu. Tüm üyeler, OPEC dergi girişi aracılığıyla oylarını almaya davet edilir."
