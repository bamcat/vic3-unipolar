 # imf

 je_imf_loan: "IMF Kredi Programı Programı"
 je_imf_loan_reason: "Uluslararası Para Fonu kredisi [ROOT.GetCountry.GetName] genişletilmiştir. Acil finansman karşılığında, ülke önemli koşullar kabul etti: yüksek faiz oranları, zorunlu ücretsiz ticaret ve fonu yazan büyük güçler için yükümlülükler."

 imf_je_obligations_active_tt: "Büyük güç yükümlülükleri hala etkilidir. Yabancı kreditörler önemli ekonomik politika kararları üzerinde tasarruf sağlar."
 imf_je_obligations_met_tt: "Büyük güç yükümlülükleri deşarj edildi. Ülke tam ekonomik egemenliği koruyor - kredi koşulları yürürlükte kalır."

 decision_leave_imf: "IMF'yi bırak"
 decision_leave_imf_desc: "Uluslararası Para Fonu'ndan alındı. Ülke, iflasa yaklaşırken IMF kredi desteği için artık uygun olmayacak, ancak kredi veya yükümlülüklerden ve müdahaleden özgür olacak. Bu karar terslanamaz.\n\n Not: Aktif bir IMF kredisi alırken ayrılamazsınız."
 imf_cannot_leave_while_indebted_tt: "IMF'den ayrılamazken aktif bir kredi yerindedir."


 imf_button_pay_obligations_name: "Pay Off O Borçlar"
 imf_button_pay_obligations_desc: "Kalan büyük güç yükümlülüklerini erken ödeyin. 500 altın maliyeti ve% 50'nin altında borç gerektirir, ancak hemen tüm ekonomik egemenliği geri yükler ve tüm büyük güçlerle ilişkileri geliştirir."
 imf_pay_obligations_cost_tt: "Yüzde 50 ve 500 altın altında ölçeklenmiş borç gerektirir"
 imf_obligations_paid_tt: "Borçlar erkenden ödedi. Büyük güç ilişkileri gelişmiştir."

 # imf_events.1 — Loan offer
 imf_events.1.t: "IMF Intervention"
 imf_events.1.d: "[ROOT.GetCountry.GetName] treasury krizdedir. Borç, piyasaları sinir ve kredi verenleri ihtiyat eden bir seviyeye ulaştı. Uluslararası Para Fonu fark etti - ve acil finansman sunmak için bir delegasyon gönderdi.\n\n Şartlar cömert değildir. İlgi oranları, seviyeleri cezalandırmak için belirlenecektir. Ülke, mevcut ekonomik politikasından bağımsız olarak serbest ticaret yapmak için gerekli olacaktır. Ve fonu yazan büyük güçler, belli yükümlülüklerin karşılanmasını bekler. Ancak alternatif - güvenlik ağı olmadan doğru bir iflasa yaklaş - daha kötü olabilir."
 imf_events.1.f: "Egemenlik ve çözünürlük aynı anda nadiren mevcuttur."
 imf_events.1.a: "Krediyi kabul et - finansmana ihtiyacımız var"
 imf_events.1.b: "Reddet - kendi işlerimizi yöneteceğiz"

 # imf_events.2 — Great power notification
 imf_events.2.t: "IMF Kredisi Genişletilmiş"
 imf_events.2.d: "[SCOPE.sCountry('imf_debtor_scope').GetName] bir IMF kredi paketi kabul etti. fonun altında büyük güçlerin biri olarak, [ROOT.GetCountry.GetName] şimdi borç veya ulustan gelen yükümlülükleri tutar. Düzenleme, finansal etkiler kadar stratejik geliyor."
 imf_events.2.f: "Borç bir diplomasi biçimidir."
 imf_events.2.a: "İyi - bu bize avantaj sağlıyor"
 imf_events.2.b: "Ne yazık ki, uygulanan terimler çok sert"

 # imf_events.3 — Loan complete
 imf_events.3.t: "IMF Programı Concluded"
 imf_events.3.d: "IMF kredisi kabul ettikten beş yıl sonra [ROOT.GetCountry.GetName] programı yükümlülüklerini yerine getirdi. İlgi ödemeleri yapıldı, koşullar katlandı ve büyük güç alacakları memnundu. Ülke, egemenliğinin yeniden inşa ettiği deneyimden ortaya çıkıyor - ve bir umut, başladığından daha iyi bir şekilde finanslarıyla."
 imf_events.3.f: "Lider dengeleniyor. Dersler ölçmek daha zordur."
 imf_events.3.a: "Biz onun üzerinden geldik"

 # imf_events.4 — Leaving
 imf_events.4.t: "IMF'den vazgeçmek"
 imf_events.4.d: "[ROOT.GetCountry.GetName] Uluslararası Para Fonu'ndan çekilir. Karar, üyeliğin maliyetlerinin - bir kriz sırasında ekonomik egemenliğin kaybı - acil finansmana erişimin faydalarına bağlı olarak \n\n Büyük güçler memnun olmayacak. Ve [ROOT.GetCountry.GetName] bir daha iflasa yaklaşmalı, güvenlik ağı olmayacak."
 imf_events.4.f: "Bağımsızlık bir fiyata sahiptir. Bu yüzden bağımlılık yapar."
 imf_events.4.a: "Yalnız duruyoruz – gerektiği gibi"

 # imf_events.5 — Great power notification of leaving
 imf_events.5.t: "Bir Ülke IMF'den ayrıldı"
 imf_events.5.d: "[SCOPE.sCountry('imf_leaver_scope').GetName] Uluslararası Para Fonu'ndan geri çekildi. Karar, uluslararası finansal düzenine geri dönüşmektedir - ve [SCOPE.sCountry('imf_leaver_scope').GetName] Kendi ekonomik dersini daha iyi veya daha kötüsü için yayınlamayı amaçlamaktadır."
 imf_events.5.f: "Daha az borçlu. Daha az kaba."
 imf_events.5.a: "Noted"

 # imf_events.10 — War bonds
 imf_events.10.t: "Savaş Bonds"
 imf_events.10.d: "treasury ve devam eden savaşla, Maliye Bakanlığı acil bir önlem önerdi: savaş tahvillerinin ihraç edilmesi. Vatandaşlar ve yatırımcılar gelecekteki geri ödeme için ülkeye para vermeye davet edilecek, savaş çabasını finanse etmek için acil bir nakit enjeksiyonu sağlayacaktır.\n\n tahviller çalışacak - ama onlar borçtur ve savaş zamanında bileşiklerde borç hızla. Tedarik tüketimi, para askeri makineye kadar yükselecektir."
 imf_events.10.f: "Bir ulus, bugünküni savunmak için geleceğine karşı ödünç alır."
 imf_events.10.a: "tahviller - şimdi paraya ihtiyacımız var"
 imf_events.10.b: "Decline – geleceğimizi ipoteklemeyeceğiz"

 imf_loan_modifier: "IMF Kredi Koşulları"
 imf_loan_modifier_desc: "Bir IMF kredisi yerindedir. İlgi oranları oldukça yüksek ve ücretsiz ticaret zorunludur. Yabancı yatırımlar akıyor, ancak ekonomik egemenlik kısıtlanıyor ve meşruiyet acı çekiyor."

 imf_great_power_obligations: "Büyük Güç Borçları"
 imf_great_power_obligations_desc: "IMF'yi yazan büyük güçler, kredi koşulu olarak bu ülkeden yükümlülükleri tutuyor. Ekonomik politika üzerindeki kaldıraçları gerçek."

 imf_refused_loan_modifier: "IMF Kredisi Refüzyon"
 imf_refused_loan_modifier_desc: "Ülke IMF yardımını reddetti ve borçlarını tek başına yönetecek. Kredi koşulları bir sonuç olarak kötüleşti."

 imf_post_loan_stability: "Post-Programme Recovery"
 imf_post_loan_stability_desc: "IMF programı sona erdi. Borçlarını karşıladıktan sonra, hükümet bir güvenilirlik ölçüsü kazandı - ve ülkenin finansları daha iyi bir düzende."

 imf_left_modifier: "IMF dışında"
 imf_left_modifier_desc: "Bu ülke IMF'den geri çekildi. Kredi veya yükümlülükler ücretsizdir, ancak uluslararası acil finans finansmanından kesintiye uğrar. Yatırım akışları azaltılır."

 war_bonds_modifier: "War Bonds Issued"
 war_bonds_modifier_desc: "Savaş çabasını finanse etmek için acil savaş bağları yayınlandı. Gelir yükseliyor, ancak borç büyüyor ve tedarik tüketimi arttı."

 war_bonds_refused_modifier: "Savaş Bonds Declined"
 war_bonds_refused_modifier_desc: "Hükümet savaş bağlarını sorunca reddetti. Fiscal disiplini korunuyor, ancak ordu pinch hissediyor."

 un_events.6.t: "Güçlerimiz Birleşmiş Milletler Misyonundan Geri Döndü"
 un_events.6.d: "[ROOT.GetCountry.GetAdjective] güçler BM Barışgücü görevinde hizmetlerini tamamladı ve eve dönüyorlar. Katkı askeri açıdan mütevazıydı, ancak anlamlı bir diplomatik olarak - [ROOT.GetCountry.GetName] önemli olduğunda mevcuttu. Genel geri döndü."
 un_events.6.a: "Hoşgeldiniz eve hoş geldiniz"
 
 un_peacekeeping_contribution: "Birleşmiş Milletler Barışgücü Contribution"
 un_peacekeeping_contribution_desc: "[ROOT.GetCountry.GetName] Birleşmiş Milletler barışgücü misyonuna güç katkıda bulundu. Uluslararası topluluk not aldı."
 
  # ── EVENT 300: RESOLUTION PASSED ─────────────────────────────────
 
 un_events.300.t: "Birleşmiş Milletler Kararı Geçti"
 un_events.300.d: "Genel Kurul, dünya sorunlarını ele almak ve belirli bir konuyla ilgili küresel işbirliğini koordine etmek için bir karar üzerinde anlaştı."
 un_events.300.f: "Karar uluslararası konsensüsün ağırlığını taşır - buna değer olan şey için."
 un_events.300.a: "Noted"
 
 UN_RES_DESC_ENVIRONMENT: "#bold Çevre Koruma Üzerine Karar#!\nMember devletler çevre standartlarını ve sürdürülebilir kaynak yönetimini koordine etmek için taahhüt ederler.\n\n#tooltip_separator!\n@green_checkmark!@green_checkmark! Tüm ülkeler #bold BM Çevre Kararı#! 12 ay boyunca modifier alırlar."
 UN_RES_DESC_PEACE: "#bold Dünya Barışı Üzerine Karar #!\n Genel Kurul, anlaşmazlıkların barışçıl çözümüne ve Interstate çatışmanın azaltılmasına ilişkin taahhütleri tekrar teyit eder.\n\n#tooltip_separator!\n@green_checkmark!@green_checkmark! Tüm ülkeler #bold BM Barış Kararı#! 12 ay boyunca modifier alırlar."
 UN_RES_DESC_ECONOMY: "#bold Ekonomik Kalkınma Üzerine Karar#!\nMember devletler gelişmekte olan ekonomilerde ve ticaret engellerinin daha düşüklüğünü onaylar.\n#tooltip_separator!\n@green_checkmark! Tüm ülkeler #bold UN Economic Development Çözümü#! 12 ay boyunca modifier alırlar."
 UN_RES_DESC_TECHNOLOGY: "#bold UNESCO Teknoloji Kararı#!\n Genel Kurul, üye ülkeler arasındaki teknoloji paylaşımı ve işbirliği bilimsel araştırma için çerçeveler oluşturur.\n#tooltip_separator!\n\n@green_checkmark! Tüm ülkeler #bold UN Technology Çözümü #! 12 ay boyunca modifier alırlar."
 
 # ── EVENT 301: RESOLUTION FAILED ─────────────────────────────────
 
 un_events.301.t: "Birleşmiş Milletler Kararı Geçmiyor"
 un_events.301.d: "Birleşmiş Milletler Genel Kurulu'ndan önceki hareket, gerekli çoğunlukları güvence altına almamıştır. Karar yenilgiye uğratıldı ve sonuç olmadan oturum açtı.\n\nHiçbir önlemler uygulanacak. Sponsorluk delegasyonu hayal kırıklığını dile getirdi. Diğerleri yok."
 un_events.301.f: "Birleşmiş Milletler, Birleşmiş Milletlerin en iyi yaptığı şeyi yapıyor."
 un_events.301.a: "Şaşırtıcı olmayan"
 
 # ── EVENT 302: SANCTIONS (TARGET) ────────────────────────────────
 
 un_events.302.t: "[ROOT.GetCountry.GetName] Birleşmiş Milletler tarafından Sanctioned"
 un_events.302.d: "Birleşmiş Milletler Güvenlik Konseyi, [ROOT.GetCountry.GetName] Ekonomik yaptırımlar konusunda bir karar çıkardı. Karar gerekli çoğunluk tarafından desteklendi ve hemen etki aldı.\n\n Ticaret kısıtlamaları artık yürürlükte. Diplomatik izolasyon derinleşiyor. Üye devletler bekleniyor - ancak buna rağmen - yaptırımlar rejimine uymak.\n\n yaptırımlar, Güvenlik Konseyi'nin onları gözden geçirmeleri için beş yıl boyunca etkilenecek."
 un_events.302.f: "Egemenlik, dünyanın görüşünden bir ülkeyi yaratmaz."
 un_events.302.a: "Bu kararı reddediyoruz"
 
 # ── EVENT 303: CONDEMNATION (TARGET) ─────────────────────────────
 
 un_events.303.t: "[ROOT.GetCountry.GetName] Birleşmiş Milletler tarafından kınandı"
 un_events.303.d: "Birleşmiş Milletler Genel Kurulu, [ROOT.GetCountry.GetName] kınayan resmi bir kararla geçti. Kırklama, zemindeki tartışmaları takip eden çoğunluk oylaması tarafından onaylanmıştır.\n\n Bir mahkumiyet bağlayıcı bir uygulama mekanizması taşımaz, ancak uluslararası disapproval'ın resmi bir açıklamasını temsil eder ve önümüzdeki yıllarda diplomatik toplulukta duran [ROOT.GetCountry.GetAdjective]'yi etkileyecektir."
 un_events.303.f: "Kelimeler silahlar değildir. Ama işaretler bırakıyorlar."
 un_events.303.a: "Biz ders almayacağız"
 
 # ── EVENT 304: SANCTIONS/CONDEMNATION (OBSERVERS) ────────────────
 
 un_events.304.t: "UN Punggle Çözümü Geçti"
 un_events.304.d: "Birleşmiş Milletler Güvenlik Konseyi, başka bir ülkeye karşı bir karar tasarısını geçti. Dünya onlara karşı ekonomik baskıyı koordine ettiği gibi şiddetli cezalarla karşılaşacaklar."
 un_events.304.f: "Uluslararası censure makineleri yavaş yavaş döner, ama döner."
 un_events.304.a: "Noted"
 
 UN_304_DESC_SANCTIONS: "Birleşmiş Milletler Güvenlik Konseyi, [global_var:un_sanction_target.GetName] Ekonomik yaptırımlar koymaya oy verdi. Karar gerekli marj tarafından geçti.\n\n[global_var:un_sanction_target.GetName] Ticaret kısıtlamaları, diplomatik izolasyon ve yaptırımların süresi için önemli ekonomik cezalar. Üye devletlerin kısıtlamalara uyması bekleniyor."
 UN_304_DESC_CONDEMNATION: "Birleşmiş Milletler Genel Kurulu, oy çoğunluğu tarafından [global_var:un_sanction_target.GetName]'i resmen kınadı. Karar, uluslararası disapprovalın resmi bir ifadesidir.\n\n Bir mahkumiyet bağlayıcı bir uygulama taşımazken, [global_var:un_sanction_target.GetAdjective] rekorta çalışır ve uluslararası duruşlarını etkiler."
 
