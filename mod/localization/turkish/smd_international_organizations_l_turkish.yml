 # ── TREATY ARTICLES ──────────────────────
 
 defense_attache: "Mesaj Gönder"
 defense_attache_desc: "Hedef ülkenin silahlı güçleri ile askeri danışmanları ve irtibat görevlileri. Hedef deneyim kazanır ve askeri maliyetleri azaltır; kaynak kazanımlar etkisi ve diplomatik ayakta kalır. Kaynak ülkesi hedeften daha büyük bir güç projeksiyonunu sağlamalıdır."
 
 cultural_exchange: "Kültürel Değişim"
 cultural_exchange_desc: "Geleneksel bir kültürel değişim programı oluşturun - paylaşılan sergiler, akademik programlar ve insanlar-insanlar temas. Her iki ülke de prestij, etki kazanır ve göçmenler için daha çekici hale gelir."
 
 research_partnership: "Araştırma Ortaklığı"
 research_partnership_desc: "Araştırma programları ve akademik kurumları paylaşmak için resmi bir anlaşma. Her iki ülke de gelişmiş araştırma hızı ve teknoloji yayılmasından yararlanır. Her iki tarafın da en az tanınan güçler olması gerekir."
 
 human_development_collaboration: "İnsan Gelişimi İşbirliği İşbirliği İşbirliği İşbirliği"
 human_development_collaboration_desc: "Zengin ülke hedefteki gelişim programları finanse ediyor - sağlık, eğitim, refah. Kaynak, etki ve prestiji karşılığında devam eden maliyetler öder. Anlaşma, kaynak ülkenin ekonomisini hedefin altında düşerse kırılır."
 
 research_partnership_rank_tt: "Her iki ülke de bir araştırma ortaklığına girmek için en az tanınan güçler olmalıdır"
 
