 io_iaea_desc: "IAEA, nükleer enerjinin barışçıl kullanımını teşvik eder ve askeri amaçlar için kullanımını önlemek için çalışır. Denetimler yapar, teknik yardım sağlar ve nükleer tesisler için uluslararası güvenlik standartlarını düzenler."

 io_redcross_name: "International Red Cross"
 io_redcross_abbreviation: "ICRC"
 io_redcross_desc: "Uluslararası Kızıl Haç, silahlı çatışmalar ve doğal afetler sırasında insani yardım sağlar. Cenevre Konvansiyonlarına uyum sağlar, savaş mahkumlarını ziyaret eder ve ayrı aile üyeleri arasındaki iletişimi kolaylaştırır."

