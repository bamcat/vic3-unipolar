 # leaders
 
 ideology_marxist_leader: "Marksist Marksist Marksist Marksist Marksist"
 ideology_marxist_leader_desc: "Konsey kuralını destekleyen devrimci sosyalist liderler, kamu mülkiyeti, tarımı topladılar ve liberal kapitalizmle keskin bir mola."
 ideology_state_socialist_leader: "Devlet Sosyalistliği"
 ideology_state_socialist_leader_desc: "Bir parti veya teknokratik devlet yönünü tercih eden sosyalist liderler, ekonomi ve büyük halk sistemlerini komuta ederler."
 ideology_left_wing_populist_leader: "Left-Wing Populist"
 ideology_left_wing_populist_leader_desc: "Yeniden dağıtım, korumacılık, demokrasi ve oligarşik kurala karşı güçlü düşmanlıkları karıştıran anti-elite kitlesel-politik liderler."
 ideology_democratic_socialist_leader: "Demokratik Sosyalist"
 ideology_democratic_socialist_leader_desc: "Demokratik seçim, işçi gücü, sosyal mülkiyet, güçlü refah ve sivil özgürlükleri destekleyen liderler bıraktı."
 ideology_green_leader: "Yeşil Yeşil Yeşil"
 ideology_green_leader_desc: "Çevresel demokratik liderler ekolojik düzenlemeler, halk malları, sivil özgürlükler ve endüstri sonrası reforma odaklandılar."
 ideology_state_capitalist_leader: "Devlet Kapitalist"
 ideology_state_capitalist_leader_desc: "Pazarları kabul eden gelişim liderleri, güçlü bir devlet, stratejik endüstri, merkezileştirilmiş bankacılık ve yatırım yapmak istiyorlar."
 ideology_market_socialist_leader: "Market Sosyalist"
 ideology_market_socialist_leader_desc: "Kooperatifleri, sendikaları, refah ve piyasa mekanizmaları demokratik gözetim altında destekleyen merkezi sosyalist liderler."
 ideology_progressive_leader: "Progresif Progresif"
 ideology_progressive_leader_desc: "Reformist liderler eşit haklar, refah genişlemesi, eğitim, sivil özgürlükler ve piyasa reformunu yönetti."
 ideology_social_liberal_leader: "Sosyal Liberal Liberal"
 ideology_social_liberal_leader_desc: "piyasaları refah, eşit vatandaşlık, eğitim ve kapitalizmle destekleyen liberal-demokratik liderler."
 ideology_technocrat_leader: "Technocrat"
 ideology_technocrat_leader_desc: "laikliği, idari planlamayı, devlet kapasitelerini, organize piyasaları ve bilimsel yönetişimi destekleyen uzman liderler."
 ideology_liberal_leader: "Liberal Liberal Liberal Liberal"
 ideology_liberal_leader_desc: "Anayasa cumhuriyetlerini, sivil özgürlükleri, özgür ticaret, özel piyasaları ve yasal eşitliği destekleyen ana akım liberal liderler."
 ideology_moderate_leader: "Moderate"
 ideology_moderate_leader_desc: "Nadiren radikal reformları zorlayan Pragmatik kuruluş liderleri ve çoğu stabil karışık sistemlerde yaygındır."
 ideology_neoliberal_leader: "Neoliberal"
 ideology_neoliberal_leader_desc: "Ücretsiz ticaret, laissez-faire, özel hüküm, mali kısıtlamalar ve teknokratik kurumlara tercih eden piyasa odaklı liberal liderler."
 ideology_conservative_leader: "Muhafazakar Muhafazakar Muhafazakar Muhafazakar Muhafazakar"
 ideology_conservative_leader_desc: "Sosyal düzeni destekleyen doğru liderler, sınırlı reform, orta piyasa ekonomisi, gelenek ve ihtiyatlı milliyetçilik."
 ideology_corporatist_leader: "Corporatist"
 ideology_corporatist_leader_desc: "Devlet-ticaret-labour kurumları tarafından organize edilen müdahaleci veya laissez-faire kapitalizmini destekleyen sermaye koordinasyon liderleri."
 ideology_theocrat_leader: "Theocrat"
 ideology_theocrat_leader_desc: "Devlet, okullar, mahkemeler ve vatandaşlık isteyen dini liderler resmi dinin etrafında sipariş ettiler."
 ideology_right_wing_libertarian_leader: "Doğru-Wing Libertarian"
 ideology_right_wing_libertarian_leader_desc: "Özel kurumları, düşük refah, özgür medyayı ve zayıf iç güvenliği destekleyen anti-state market liderleri."
 ideology_classical_liberal_leader: "Klasik Liberal Liberal"
 ideology_classical_liberal_leader_desc: "Serbest ticaret, sınırlı hükümet, mülk hakları, temsilci kurumlar ve hukuk kuralına sahip eski liberal anayasalistler."
 ideology_neocon_leader: "Neocon Neocon"
 ideology_neocon_leader_desc: "Profesyonel silahlı kuvvetlere, yurtdışında, kapitalist kurumlara ve ulusal güvenlike destek veren liberal muhafazakar liderlere destek verdi."
 ideology_jihadist_leader: "Cihadist"
 ideology_jihadist_leader_desc: "Sadece radikal baskı altında İslam devlet-religion ülkelerinden ortaya çıkabilecek dini liderler."
 ideology_minarchist_leader: "Minarchististist"
 ideology_minarchist_leader_desc: "Laissez-faire, özel sistemleri destekleyen aşırı küçük devlet piyasa liderleri ve kamu otoritesinin hemen hemen yanında."
 ideology_right_wing_populist_leader: "Haklı Populist"
 ideology_right_wing_populist_leader_desc: "Liberal demokrasilerde yüksek radikallerle yükselen ulusal-popülist liderler, refah chauvinizmi, korumacılığı ve kültürel backlash'ı karıştırıyor."
 ideology_authoritarian_capitalist_leader: "Yazarlar"
 ideology_authoritarian_capitalist_leader_desc: "Özel veya kapitalizmi otokrasi, polis gücü, sansür ve zayıf muhalefet altında destekleyen kapitalist liderler."
 ideology_monarchist_leader: "Monarchist"
 ideology_monarchist_leader_desc: "Neredeyse sadece monarşilerde görünen ve onuneditary otoritesini, geleneği, kiliseyi ve hiyerarşisini destekleyen mistik sadık liderler."
 ideology_fascist_leader: "Fascist"
 ideology_fascist_leader_desc: "Militarizasyon, tek parti kuralı, devlet şiddeti, kapalı toplum ve kurumsal-ulusal ekonomi destekleyen küresel otoriter liderler."
 ideology_anarchist_leader: "Anarşist"
 ideology_anarchist_leader_desc: "Devletsiz öz-devlet, kooperatif mülkiyeti, milis, özgür konuşma, polis ve güçlü yerel özerkliği destekleyen anti-toriter sosyalist liderler."
