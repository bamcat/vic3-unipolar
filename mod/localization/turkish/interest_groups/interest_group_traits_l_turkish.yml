l_turkish:

  # Landowners IG Traits
 ig_trait_noblesse_oblige:0 "Noblesse Oblige"
 ig_trait_noblesse_oblige_desc:0 "Ortak halktan daha iyiyiz, bu da onlara bakmak için bir görevimiz olduğu anlamına gelir. Kendileri için şeyler organize etme girişimleri kendi kendini tahrip ediyor ve başarısızlık için hayal kırıklığına uğrattı."
 ig_trait_family_ties:0 "Family Ties"
 ig_trait_family_ties_desc:0 "Bu değişen zamanlarda, iyi bir evliliğin değerini hala biliyoruz. Bağlantılarımız, aştıkları sınırlardan daha yaşlı ve hem ittifaklar hem de hükümetler çıkacak."
 ig_trait_noble_privileges:0 "Noble Privileges"
 ig_trait_noble_privileges_desc:0 "Hiçbirbilitenin vergi toplayıcıları tarafından vurulmadan görevlerini yerine getirmesi gerektiği fikrine ne oldu? O günleri geri getirmek zamanı."
 ig_trait_profitable_estates: "Karılabilir Emlak"
 ig_trait_profitable_estates_desc: "Bilmedin mi? Hiçbirbilite için iyi olan şey ulus için iyidir - üst üste hileler."
 ig_trait_the_velvet_book: "The Velvet Book"
 ig_trait_the_velvet_book_desc: "Sadece en august aileler bu venerable kitaptaki isimlerini takip edebilir. Kimin ait olduğunu ve kim olmadığını biliyoruz."
 ig_trait_bad_boyars: "Kötü Boyars"
 ig_trait_bad_boyars_desc: "Bu yüzden ülkenin İyi Tsar'ı kötü boyacılar tarafından yanlış mı söylemek istiyorlar? Oh, onlara kötü boyacıların yeteneğine sahip olduklarını gösterebiliriz."
 ig_trait_latifundios: "Latifúndios"
 ig_trait_latifundios_desc: "Mülklerimizin üretkenliği ve zenginlikleri eşsizdir. Para hızla su gibi ellerimiz aracılığıyla akıyor. Gerçekten, bunlar hepimiz için altın günler."
 ig_trait_junkerdom: "Junkerdom"
 ig_trait_junkerdom_desc: "Bizim gücümüz topraklarımızdan geliyor ve topraklarımız güçlü topraklar. Ne yaparsak yapalım, ulus takip edecek."
 ig_trait_patrician_philanthropy: "Patrician Philanthropy"
 ig_trait_patrician_philanthropy_desc: "Bu bizim dostumuz için bir şey yaptık - ve isimlerimizin ne kadar sona erdiğini, elbette."
 ig_trait_wiener_walzer: "Wiener Walzer"
 ig_trait_wiener_walzer_desc: "Birisi son topda bir minuet oynamak için sinire sahipti. Sevgilim, waltzes yapıyoruz! Ne moda olduğunu belirledik ve #italic#! minuet!"
 ig_trait_fazenda_ibicaba: "Fazenda Ibicaba"
 ig_trait_fazenda_ibicaba_desc: "Manpower, işletmelerimiz için sürekli bir konudur ve bu yüzden ihtiyaç duyduğumuz işi almak için mümkün olan her yolu takip etmeliyiz."
 ig_trait_summon_no_zamindars: "Summon No Zamindars"
 ig_trait_summon_no_zamindars_desc: "Ülkemizin yöneticileri, müzakere veya esneklikle ilgilenmediklerini göstermiştir. Eğer bu böyleyse, sipariş tutmak için yaptığımız daha ince şeyleri kaçırmayın."
 ig_trait_famine_reserves: "Famine Rezervleri"
 ig_trait_famine_reserves_desc: "Bir acil ihtiyaç ortaya çıktığında tahıl mağazalarımızı açma görevimizdir. kiracılarımızdan iyi niyet satın almak için daha iyi bir yol nedir?"

  # Industrialists IG Traits
 ig_trait_job_creators:0 "İş Yaratıcıları"
 ig_trait_job_creators_desc:0 "Biri para kazanmak için para harcamak zorundadır. Hükümet yatırımlarımıza müdahale etmemeye güvenebileceği sürece, kârlarımızı ekonomik büyümeye karşı koymak yerine koymadık."
 ig_trait_engines_of_progress:0 "İlerleme Motorları"
 ig_trait_engines_of_progress_desc:0 "Modern çağın muhteşemlerini tut! tereddüt için zaman yoktur. Eğer düşünülebilirse, tasarlanmış ve patentli, inşa edilmeli, test edilmeli ve derhal kullanıma koyulmalıdır."
 ig_trait_tax_avoidance:0 "Vergi Kaçması"
 ig_trait_tax_avoidance_desc:0 "Paramızın nerede harcanması gerektiğini kim bilir? Hükümet değil ve kesinlikle mevcut değil. Neyse ki, onların beceriksizlik iyi kullanım için koyabilecek vergi boşlukları bıraktı."
 ig_trait_zaibatsu_cooperation: "Zaibatsu İşbirliği"
 ig_trait_zaibatsu_cooperation_desc: "Endüstri ve hükümet arasındaki sağlıklı bir ilişki herkese fayda sağlar. Her iki ilgi alanımız da bu eşsiz iş durumlarının devam etmesini sağlamaktır."
 ig_trait_zaibatsu_withdrawal: "Zaibatsu Withdrawal"
 ig_trait_zaibatsu_withdrawal_desc: "Finansal sağlığımız, para spekülasyonları ve içsel yeniden yapılanma konusunda en çok fayda sağlayacaktır. Kamu ticareti ne yazık ki hükümet için, şu anda bir öncelik değil."
 ig_trait_kommerskollegium: "Kommerskollegium"
 ig_trait_kommerskollegium_desc: "Ticari çıkarlarımızın ölçeği büyümeye devam ettikçe, elde edilen servetin makul bir şekilde yönetilmesini sağlamak için bizi destekliyor."
 ig_trait_ventilate_unify_beautify: "Ventilate, Unify, ve Beautify"
 ig_trait_ventilate_unify_beautify_desc: "Orada neye benzediğini gördünüz mü? Bu bir hastalık atölyesi, güneşin asla parlamadığı bir yer, bitkilerin viskisi ve yok olduğu yer ve nerede sefalet ve konserde çalışmak. Elbette bu karmaşayı düzeltmek için bize düşüyor."
 ig_trait_the_goods_must_flow: "İyiler Akış Etmeli"
 ig_trait_the_goods_must_flow_desc: "Ülkemizin yaptığı kadar çok üretmek iyi ve iyidir, ancak piyasalara satılmaması gereken pazarlara ulaşamıyorsa? Şimdi ülke iyi ulaşımın nasıl gerekli olduğunu anlamasını sağlamak için zaman."
 ig_trait_wounded_honor: "Yaralanan Onur"
 ig_trait_wounded_honor_desc: "Herhangi bir aydınlanmaya direnen bir ülkede aydınlanmış birkaç kişiyiz. Yöntemlerimiz üstündür - herhangi bir bozukluk ihanettir ve ihanet en sert yaptırımla karşılanmalıdır."
 ig_trait_stamped_and_signed: "Stamped ve Signed"
 ig_trait_stamped_and_signed_desc: "Stamps ve liderlik edenler, kaosdan vazgeçmek için kullandığımız yöntemlerdir. Hindistan'ın yönetimi, bir kağıt okyanusu gerektirir ve kusursuz bir şekilde dolaşımlarını sağlamak bizim görevimizdir."
 ig_trait_responsible_government: "Sorumlu Yönetim"
 ig_trait_responsible_government_desc: "Misyonumuz, adalet ve medeniyeti tüm erkeklere genişletmektir - ve elbette, bunu sonsuza dek izin veren kuralı yerine getirmektir."

  # Armed Forces IG Traits
 ig_trait_patriotic_fervor:0 "Patriotic Fervor"
 ig_trait_patriotic_fervor_desc:0 "Stratejiyi ne kadar parlak ve silahları nasıl gelişmiş olursa olsun, bazı savaşlar sadece zor iş ve bağırsaklarla kazanılabilir. Ülkelerinin karşı karşıya kaldığı şeye gerçekten inanan askerler, oranlardan bağımsız olarak savaşacak."
 ig_trait_veteran_consultation:0 "Gazi Danışmanlık"
 ig_trait_veteran_consultation_desc:0 "Teknolojik ilerlemeler savaşın yüzünü değiştiriyor, ancak biz sadece nasıl anladığımızı anlayabiliriz. Neyse ki, ilk el deneyimi olanlarımız bir fikir olmalıdır."
 ig_trait_materiel_waste:0 "Materiel Atık"
 ig_trait_materiel_waste_desc:0 "Ülkeye sadakat hükümete sadakat değildir. Eğer sorumlu insanlara güvenemeyizse, uygun gördüklerimizi de kullanabiliriz."
 ig_trait_elan_vital: "Élan Vital"
 ig_trait_elan_vital_desc: "En son silah ve yeraltılar iyi ve iyi olsa da, zafer yolundaki yol, düşmanlığın karşısında eğilmeyecek bir sürüş ruhuna bağlıdır. Ulusun ne için durduğunu gerçekten inanan askerler cesur bir şekilde ilerletecek, oranlardan bağımsız olarak."
 ig_trait_newly_created_army: "Newly-Created Army"
 ig_trait_newly_created_army_desc: "Modern bir ordunun kalbi son tüfeklerde veya en iyi üniformalarda değil, organizasyon ve lojistikte yatıyor. Her asker tedarik etmek için, munitions ve rasyonların akışını düzenli ve güvenilir tutmak için, her erkeğin büyük askeri makinedeki rolünü bildiğinden emin olmak - bu nasıl bir orduya değer verecek."
 ig_trait_self_strengthening: "Self-Strengthening"
 ig_trait_self_strengthening_desc: "Bizim istihbarat ve bilgelik, bizi çevreleyenlara mutlaka üstündür. Böylece, yurtdışından öğrenmemiz gereken tek bir şeydir: sağlam gemiler ve etkili silahlar."
 ig_trait_parochial_leadership: "Parochial Leadership"
 ig_trait_parochial_leadership_desc: "Bu karanlık zamanlarda, her insan kendisi için ve her eyalet ilk ve en önemlisi kendi refahına bakmak zorundadır. Her subayın evden coşkulu bir şekilde uzaklaşmasını beklemek mümkün değildir, kendi kalbi tehdit altında olabilir."
 ig_trait_el_buen_jefe: "El Buen Jefe"
 ig_trait_el_buen_jefe_desc: "Her iyi askerin ihtiyacı ona liderlik etmek için iyi bir subay. Bu zamanlarda bütün ulusun ihtiyaç duyduğu şey iyi bir subay."
 ig_trait_clube_militar: "Clube Militar"
 ig_trait_clube_militar_desc: "Bizim gibi memurların ve askerlerin dinlenebileceği bir yer, rahatlamak ve yedek zamanlarında organize etmek zararsız olduğundan emin. Eğer her şey olursa, her şeyin konuşabileceği ve planlayabildiğimiz bir yer ülkeyi biraz iyi hizmet edebilir."
 ig_trait_coronelismo: "Coronelismo"
 ig_trait_coronelismo_desc: "Hükümetten en son kararnameyi gördünüz mü? Kiminle uğraştığını fark etmiyorlar mı? Benim gibi dekore edilmiş bir beyefendi, tüm erkekler ve mülklerimle, trifled değil!"
 ig_trait_divided_ranks: "Bölünmüş Ranks"
 ig_trait_divided_ranks_desc: "Askerlerimiz ve subaylarımız arasında temel bir tehdit var, biri görmezden gelmek için çok geniş büyüdü. Bir adam, geleneklerini hor gören biri için hayatını neden koyar?"
 ig_trait_imperial_service: "Imperial Service"
 ig_trait_imperial_service_desc: "Üniformamızı giymek ve sınırlarımızı genişletmek büyük bir onurtur, milyonlarca kişi buna karşı çabalamaktadır. Onlar için her zaman doldurma pozisyonları olduğu için şanslı."
 ig_trait_veerta: "Veerta"
 ig_trait_veerta_desc: "Bizimki, tüm Hindistan'ı fetheden ordudur, tüm düşmanlara karşı zaferlerin akışını üretir. Cesurlığımız ve disiplinimiz, bu onurun bu rulounun asla sona ermeyeceğini garanti eder."

  # Rural Folk IG Traits
 ig_trait_farmers_markets:0 "Farmer's Markets"
 ig_trait_farmers_markets_desc:0 "Onlara ihtiyaç duyan insanlara ürettiğimiz malları almak bugünlerde büyük bir endişe gibi görünüyor. İyi koşullar altında, onları kendimize ihtiyaç duydukları yere götürmeye oldukça yetenekliyiz."
 ig_trait_honest_work:0 "Dürüst İş"
 ig_trait_honest_work_desc:0 "Hayatımızı dürüst çalışma ve dürüst terle yaparız. Bu, ihtiyaçlarımızdan daha fazlasını üretsek, çok daha iyi."
 ig_trait_old_ways:0 "Eski Yollar"
 ig_trait_old_ways_desc:0 "Ülkeyi çalışan bu insanlar, geleceğin neye benzediği hakkında her türlü fikir sahibi gibi görünüyor. Bugün ne olduğunu yapanlar olduğunda neden onlara güvenmeliyiz?"
 ig_trait_obshchina: "Obshchina"
 ig_trait_obshchina_desc: "Küçük köyümüzde hayat çok kötü değil. Bizim aramızdaki işi yapmak kolay ve ürün ve kârların çevresinde yayılıyor."
 ig_trait_fellahin: "Fellahin"
 ig_trait_fellahin_desc: "Hayatta çok şey bu alanları elimizden gelen en iyi şekilde çalışmak. Bazen işimiz aslında bizim için para ödüyor."
 ig_trait_nucleos_coloniais: "Núcleos Coloniais"
 ig_trait_nucleos_coloniais_desc: "Yeni bir ev, hayatta yeni bir başlangıç anlamına gelir. Bu konuda ne sevmek değil? Hadi gel, yeni yerleşimin sunabileceği şeyi görelim."
 ig_trait_plantation_work: "Plantation Work"
 ig_trait_plantation_work_desc: "Günden sonra zor gün çalışıyoruz ve ne elde etmemiz gerektiğini alıyoruz. Bazı günler, bundan daha fazlasını alıyoruz ve o günleri değerliyiz."
 ig_trait_of_the_sovereign_alone: "Egemenliğin Yalnızlığı"
 ig_trait_of_the_sovereign_alone_desc: "Araziye sahip olanlar tarafından bize verilen yük dayanılmazdır. Bu aracılar, tek başına egemenlerin ryots olduğunu hatırlatılmalıdır ve bizim üzerinde doğru bir güce sahip değiller."
 ig_trait_imandari: "Imandari"
 ig_trait_imandari_desc: "Arazimiz zengin bir kişidir ve bunu özenle çalışırız. İyi zamanlarda, ihtiyacımız olanı ve daha fazlasını üretebiliriz."
 ig_trait_bazaar_bargains: "Bazaar Bargains"
 ig_trait_bazaar_bargains_desc: "Şehirlerimizi zenginleştiren ve yaklaşık milden gelen ziyaretçileri çeken alışverişimiz var. Eğer refah ekstra bir organizasyon gerektiriyorsa, bu ödemeye istekli olduğumuz bir fiyat."

  # Trade Unions IG Traits
 ig_trait_solidarity:0 "Dayanışma"
 ig_trait_solidarity_desc:0 "Çalışmak isteyen herkes çalışmalıdır! Hiç kimse dışlanmış veya dışarıda bırakılamaz. Birbirimizin adil bir şekilde telafi çalışmasına destek olmalıyız."
 ig_trait_industrial_organizers:0 "Industrial Organizers"
 ig_trait_industrial_organizers_desc:0 "Sorumlulukta olan önemli değil, işçilerin işbirliği yolu, bir fabrikanın yüksekten verilen herhangi bir kuraldan nasıl iyi çalıştığını daha büyük bir etkiye sahiptir."
 ig_trait_work_to_rule:0 "Work-to-rule"
 ig_trait_work_to_rule_desc:0 "Bu, sorumlu insanlar bizi sadece kapatmamızı ve kendimize düşünmek yerine ne söylediğimizi yapmak istiyor gibi görünüyor. Gerçekten de bu felsefeyi ‘yerarlı’ işimize uygularsak nasıl sevdiklerini görelim."
 ig_trait_bourse_du_travail: "Bourse du Travail"
 ig_trait_bourse_du_travail_desc: "Organizasyon iş günü sonunda bitmiyor! Birleşmiş cephe, sadece fabrika zemininde değil, evlerimizde ve toplumlarımızda da yardım gerektirir."

  # Intelligentsia IG Traits
 ig_trait_propagandists:0 "Peragandists"
 ig_trait_propagandists_desc:0 "Şiirimizde, mektuplarımız ve siyasi manifestolarımız, bu yeni çağın dünyanın daha az şanslı bölgelerine getirmek zorunda kaldığımız bir örnek olarak, evimizdeki tüm ilerlemeleri korumalıyız."
 ig_trait_avant_garde:0 "Avant-garde"
 ig_trait_avant_garde_desc:0 "Başkaları bile düşünmemeye cesaret edemiyor, zaten aloud'la konuşacağız. Sanat ve fikirlerimiz doğrudan kalplere ve açık gözlere kesecektir, eğer astonishment’te değilse, o zaman şok olur!"
 ig_trait_social_criticism:0 "Sosyal Eleştiri"
 ig_trait_social_criticism_desc:0 "Güçteki insanlar genellikle reproach’un ötesinde olduklarını düşünürler, ancak otorite birinin fikirlerini ilginç yapmaz. Söylemek için çok ilginç şeyler var ve onları tam olarak kim söyleyeceğimizi biliyoruz."
 ig_trait_restoration: "Restorasyon Restorasyonu"
 ig_trait_restoration_desc: "Bu büyük zorluklar ve büyük başarılar çağımızda, ulusu eski büyüklüğüne geri yüklememize gurur duyuyoruz. Olağanüstü çalışma, medeniyetimizin statüsünü yeniden teyit etti ve olağanüstü çalışma bunu daha da yüksekliğe getirecektir."
 ig_trait_crisis_of_identity: "Kimlik Krizi"
 ig_trait_crisis_of_identity_desc: "Hizmet ettiğimiz ulus gerçekten olduğumuz ulus olmayabilir. Gerçekten sorumlu insanlarla ortak ne kadar var?"
 ig_trait_les_beaux_arts: "Les Beaux-Arts"
 ig_trait_les_beaux_arts_desc: "Sanatımız, sergilerimiz ve yaratıcı yeteneğimiz hiçbiri için ikinci. Neden göstermeliyiz? Başkalarını kıskanmayı hak ediyoruz."
 ig_trait_brasilidade: "Brasil"
 ig_trait_brasilidade_desc: "Hadi dostum, bu gece kutlamayalım! Burada, ellerimizde bir şişe ile yıldız ışığı altında en güzel topadları duyabiliriz ve orada -ah, zaten resmin ne olduğuna bak! Bu hayat değil mi?"
 ig_trait_bachareis: "Bacharéis"
 ig_trait_bachareis_desc: "Ulusun neye ihtiyacı olduğunu biliyoruz! Sonuçta, insanlar için konuşuyoruz – ne? Hayır, #italic'yi #! insanlarla konuşmamızı söylemedik."
 ig_trait_swaraj: "Swaraj"
 ig_trait_swaraj_desc: "Kendimizi hem de devlet tarafından köleleştirilmiş buluruz. Yöneticilerimiz bizi düşünmeden hizmetimizi talep ederken ajansı inkar ediyor. Böyle bir şey başarısız oldu - ve gerekirse, bunu sağlamak için çalışacağız."
 ig_trait_westernisation: "Batılılaşma"
 ig_trait_westernisation_desc: "Bugünkü hükümetimiz adalet ve ilerlemenin temsilcisi olarak hizmet ediyor, ancak ülkemizin çoğu bundan uzak kalıyor. Devlet ve insanlar arasındaki ayrımı azaltmaya çalışmalıyız."

  # Petite-Bourgeoisie IG Traits
 ig_trait_treasury_bonds:0 "Hazine Bonds"
 ig_trait_treasury_bonds_desc:0 "Hükümetin borçlarını ödemek için güvenebileceği sürece, bu büyük ulusu finanse etmeye yönelik sert tasarruflarımızı sadece vatansever değil, iyi bir yatırım."
 ig_trait_middle_managers:0 "Orta Müdürler"
 ig_trait_middle_managers_desc:0 "Herkes kitabı tarafından her şeyi yapamıyoruz, ancak en azından kitaplarda ne yaptıklarını tutabiliriz. Birisi burada şeyler yapmak için doğru yolu hatırlamalıdır."
 ig_trait_xenophobia:0 "Xenfobi"
 ig_trait_xenophobia_desc:0 "Ülkemizin durumu için kimin suçlayacağını hepimiz biliyoruz, insanlar bunu söylemekten korkuyorlar. Bu arada, sırtlarımızın arkasında gülüyorlar, onlarla kaçmasına izin veriyoruz. Birisi harekete geçmeli."
 ig_trait_bergsbrukens_valdistrikten: "Bergsbrukens Valdistrikt"
 ig_trait_bergsbrukens_valdistrikten_desc: "Madencilik çıkarları ve burgher mülkleri arasındaki yakın işbirliği daha iyi zamanlarda devletin sadece hayal edebileceğinden emin olabiliriz."
 ig_trait_effendi: "Effendi"
 ig_trait_effendi_desc: "Ciddi alışkanlıklar ve dürüst yollarla, en üst seviyeye yükseldik ve çabalarımız her şeyden haklı çıkarılmıştır."
 ig_trait_reorganization: "Yeniden örgütlenme"
 ig_trait_reorganization_desc: "Doğru görev ve bölümlerle, çok fazla reform yaptığımızı biliyoruz. Sadece sözcüğü söyle ve başlıyoruz."
 ig_trait_master_of_the_house: "Evinin efendisi"
 ig_trait_master_of_the_house_desc: "Lütfen! Kendini aşağı otur. Burada düzeltmeye çalışıyoruz - yoksullara hizmet etmek için, ama millete büyük, rahatlatıcı ve filozoflara."
 ig_trait_haute_finance: "Haute Finance"
 ig_trait_haute_finance_desc: "kontinental finans oyununda, elimizi ilk oynamak için victor olmayı amaçlıyoruz."
 ig_trait_old_lady_of_threadneedle_street: "The Old Lady of Threadneedle Street"
 ig_trait_old_lady_of_threadneedle_street_desc: "Eğer ulus yardıma ihtiyaç duyarsa, etrafta yaşlı bir bayan var, güvende ve her zaman bir krize dönüşebilir: İngiltere Bankası."
 ig_trait_civil_service: "Sivil Servis"
 ig_trait_civil_service_desc: "İnsanlar sivil hizmetçiler hakkında komik fikirlere sahiptir. Politikalarınızı formüle etmenize ve uygulamanıza yardımcı olmak için buradayız, hepsi bu."
 ig_trait_bah_humbug: "Bah Humbug"
 ig_trait_bah_humbug_desc: "Zavallı ve destitude isteyerek, diyorsunuz. Cezaevi yok mu? İşevleri hala ameliyatta mı? Sonra beni yalnız bırak! Kötü olanlar oraya gitmeliler."
 ig_trait_swadesh: "Swadesh"
 ig_trait_swadesh_desc: "Başka bir insan olarak industriousuz, ancak krediyi inkar ediyoruz ve yabancı işletmeler tarafından korunuyoruz. Eğer yöneticilerimiz bizi ekonomiden dışlamak istiyorsa, onlar için aynı şeyi yapacağız."
 ig_trait_lines_of_credit: "Kredi Hatları"
 ig_trait_lines_of_credit_desc: "Kendi hayırseverlerimiz tarafından sağlanan kredi için değildi, Şirket asla Hindistan'ı fethedemedi. Katı bir iş davası verildiğimizde, bu ilişkiyi sürdürmek tamamen hazırız."
 ig_trait_cooperative_agencies: "Kooperatif Ajans"
 ig_trait_cooperative_agencies_desc: "Yöneticilerimiz bol miktarda sermayeye sahiptir, ancak ülkemizin az bilgisi vardır. Kaynaklarını ve uzmanlığımızı havuzlayarak, vatanımızı her zaman yalnız olduklarından çok daha zenginleştirebiliriz."

  # Devout IG Traits
 ig_trait_be_fruitful_and_multiply:0 "Meyveli ve Çok"
 ig_trait_be_fruitful_and_multiply_desc:0 "Asceticism, hayatlarını ruhsal arayışlara adamış birkaç kişi için iyidir, ancak ortak insanlarda, aşılamanın en önemli değerleri bir aile inşa etmek ve çocuklar için araba kullanmaktır."
 ig_trait_divine_right:0 "Tanrı hakkı"
 ig_trait_divine_right_desc:0 "Yaşamlarımıza bir düzen olduğuna inanıyoruz. Toplum bu düzeni daha iyi veya daha kötüsü yansıtabilir. Yöneticilerin virtüz olduğu sürece ve onların kararnameleri sadece insanların neden bildiğini garanti edebiliriz."
 ig_trait_pious_fiction:0 "Pious Theory"
 ig_trait_pious_fiction_desc:0 "Bugünün değerleri o kadar zehirlidir ve literatür bu yüzden eğitimin kendisini ahlak üzerine bir eroding etkisine sahiptir. Mevcut kuruluş ‘gerçek’ ne olursa olsun insanlara öğretmekten daha iyi, onlara gerçek olması gerektiğini öğretmektir."
 ig_trait_work_ethic: "Ethic"
 ig_trait_work_ethic_desc: "Unutmayın, para bir üretim doğasına sahiptir. Para para alır; kâr üretimi bir yaratı eylemidir, Tanrı'nın kendi çalışmalarının onur ve yüceltilmesidir."
 ig_trait_asceticism: "Asceticism"
 ig_trait_asceticism_desc: "Bu dünyanın zevklerinden kaçınmak doğru yoldur. Kendinize maddi değişikliklerle çok fazla perturbed olmasına izin vermeyin; bunlar da geçer."
 ig_trait_kar_seva: "Kar Seva"
 ig_trait_kar_seva_desc: "Tanrı bizimle ve aramızda. Başkalarına hizmet etmek için, Tanrı'nın yaratılmasına hizmet etmek ve Tanrı'ya hizmet etmektir. Hepimiz dürüst bir çalışmaya katılmak ve bu işin meyvelerini başkaları ile paylaşmak biziz ve bu da Tanrı'ya daha yakın demektir."
 ig_trait_temporal_mandate: "Temporal Mandate"
 ig_trait_temporal_mandate_desc: "Gökler ve dünya arasındaki çizgi genellikle bulanıkdır; bu yüzden inanç ve hükümet arasındaki çizgi de budur. Bu, seküler dünyayı yönetmek için her türlü türü alır – sistemlerimizi birlikte yapmanın yollarını her zaman bulabiliriz."
 ig_trait_the_best_revenge: "En İyi İntikam"
 ig_trait_the_best_revenge_desc: "Düşmanınıza intikam almak istiyorsanız, daha iyi nitelikler edin ve doğru yolda yürüyün. Bu yüzden, kaçınılmaz olarak düşmanınıza karşı intikam alacaksınız, çünkü iyi niteliklerinize zarar verecek ve iyi şöhretinize üzülecektir."
 ig_trait_yeshivot: "Evethivot"
 ig_trait_yeshivot_desc: "Sifrut Chazal'ı incelemek her gençliğin önemli bir görevidir. Hiç kimse okula gitmediyse, yasalarımız nasıl hatırlanabilir ve saklanabilir?"
 ig_trait_traditsye: "Traditsye"
 ig_trait_traditsye_desc: "Dünya hızla etrafımızda değişiyor. Bu öngörülemeyen değişimden sonra acele edersek dengemizi nasıl korumak istiyoruz?"
 ig_trait_heavenly_sovereign: "Cennete Egemen"
 ig_trait_heavenly_sovereign_desc: "İmparator Jimmu'nun mirasçıları, yeryüzündeki en değerli kurumlarından birine eğilimliydiler. Bu tür gelenek doğru bir şekilde hak ediyor ve bir ulus olarak bunu kabul etmeliyiz."
 ig_trait_secular_shrine_theory: "Secular Shrine Teorisi"
 ig_trait_secular_shrine_theory_desc: "Shrines, Japon halkının doğal bir inancıdır; devletin halk ritüellerinin amacı için haklıdırlar. Shintoism ideolojiktir: Her vatandaşı beklediğimiz vatanseverlik ifadesidir."
 ig_trait_haibutsu_kishaku: "Haibutsu Kishaku"
 ig_trait_haibutsu_kishaku_desc: "Yabancı dinler ulustan ve onların figürlerinden silinmelidir. Sebeplerine baktıklarına bak! Onların Firavunlarına, tapınaklarına, onların şafağa gidin ve burada hiçbir yer olmadığını göster!"
 ig_trait_da_wat: "Da'wat"
 ig_trait_da_wat_desc: "Biz dışarı çıkmalıyız, başkalarına inançta katılmak ve Allah'ın iradesine göre yaşamak için davet etmeliyiz. Asma her şeyi karşılar."
 ig_trait_sharia: "Sharia"
 ig_trait_sharia_desc: "Doğru yaşamak, neyin doğru olduğunu ve neyin olmadığını tanımlayan yasaları bilmek gerektirir. Yasanın yorumu, gerçekleştirebileceğimiz en şerefli ve görevlerden biridir."
 ig_trait_mecelle: "Mecelle"
 ig_trait_mecelle_desc: "Hanafi jurisprudence, Mecelle-i Ahkâm-ı Adliye, hem inançlarımızı hem de laik hukuk beklentilerini karşılayan bir kodu takip edeceğimizi garanti eder."

