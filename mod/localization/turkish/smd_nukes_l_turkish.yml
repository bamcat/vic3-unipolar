 nuclear_events.12.t: "Füze Grevi [ROOT.GetName]"
 nuclear_events.12.d: "[SCOPE.sCountry('missile_attacker').GetName] [ROOT.GetAdjective] bölgeye karşı geleneksel bir füze grevi başlattı. Raporlar [ROOT.GetAdjective] devletler üzerinde etkiler geliyor - altyapı hasarı değerlendiriliyor.\n\n Füzeler nükleer değildi, ancak mesaj açık. [SCOPE.sCountry('missile_attacker').GetName] bize karşı uzun menzilli silahları kullanmaya isteklidir."
 nuclear_events.12.f: "kraterler zaten orada. Soru bir sonraki yaptığımız şeydir."
 nuclear_events.12.a: "Hasarları değerlendirin ve buna göre yanıt verin"

 missile_strike_victim_modifier: "Konvansiyonel Füze Grevi"
 missile_strike_victim_modifier_desc: "Bölgemiz geleneksel bir füze grevi tarafından hedef alındı. Altyapı hasarı ve halk kaygısı yüksek."

 # ── EVENT 13: RETALIATION CHOICE ───────────

 nuclear_events.13.t: "Nükleer Retaliasyon - Karar Gerekli"
 nuclear_events.13.d: "[SCOPE.sCountry('nuclear_attacker').GetName] [ROOT.GetName] karşı nükleer silahlar başlattı. Savaşlarımız silahlı. Tanıtım kodları hazır.\n\n [SCOPE.sCountry('nuclear_attacker').GetAdjective] bölge, tüm [SCOPE.sCountry('nuclear_attacker').GetAdjective] eyaletlerimizi vuracaktır. Grev hiçbir infamy taşıyacaktı - dünya anlayacak.\n\n Alternatif saldırıyı absorbe etmektir. Hayatta kalmakta bir yemek yoktur."
 nuclear_events.13.f: "Sipariş sadece bir kez verilmesi gerekir."
 nuclear_events.13.a: "Retaliate - [SCOPE.sCountry('nuclear_attacker').GetName] karşı cephanenin% 25'ini başlat"
 nuclear_events.13.b: "Ayağa kalk - grevi absorbe et, cephaneyi korumak"

 nuclear_first_strike_response: "Nükleer Retaliasyon (First Strike Response)"
 nuclear_first_strike_response_desc: "[ROOT.GetName], kendi topraklarında sınırlı olmayan bir nükleer saldırıya yanıt olarak nükleer bir karşıt başlattı. Uluslararası topluluk yeniden birleşme hakkını tanır - infamy kazancı önemli ölçüde azaltılır."

 nuclear_absorbed_first_strike: "Nükleer Grev Absorbed"
 nuclear_absorbed_first_strike_desc: "[ROOT.GetName] retaliating olmadan bir nükleer greve dayandı. Sınırlama uluslararası olarak kaydedildi. Diplomatik ayakta ve prestij oldukça gelişmiştir."

 # ── EVENT 14: RETALIATION NOTIFICATION ─────

 nuclear_events.14.t: "Nükleer Retaliation Inbound"
 nuclear_events.14.d: "Nükleer grevimiz cevaplandı. [ROOT.GetName] bir retaliatory grevi başlattı - savaş kafaları sınır dışı edildi.\n\n Değişimi başlattık. Sonuçlar bizimkidir."
 nuclear_events.14.f: "Her grev bir sonrakisini davet eder."
 nuclear_events.14.a: "Brace for effect"
