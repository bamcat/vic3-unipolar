 oslo_accords.30.t:0 "Oslo I Anlaşması İmzalandı"
 oslo_accords.30.d:0 "İsrail ve Filistin, İlkelerin Deklarasyonunu kabul etti. Amerika Birleşik Devletleri şimdi yeni barış sürecini desteklemek ve geçici çerçeveyi sürdürmek için bekleniyor."
 oslo_accords.30.f:0 "Diplomatik bir açılış ortaya çıktı, ancak guaranlara, paraya, baskıya ve sabırya ihtiyaç duyacaktır."
