 chechen_war.1.t: "The Offensive Starts"
 chechen_war.1.d: "Savaşın belirleyici aşaması başladı. Erken çatışmayı tanımlayan gerilla savaşı doğrudan bir çatışmaya yol verir. Kafkasya dağları Chechnya için son mücadeleye tanık olacak."
 chechen_war.1.a: "Rusya için!"
 chechen_war.1.a.che: "Ichkeria için!"
 
 chechen_war.2.t_rus: "Rus Zaferi Chechnya"
 chechen_war.2.d_rus: "Chechen direnişi kırıldı. Rus güçleri kırılmış cumhuriyetin üzerinde yeniden kontrol etti. Yaşam ve altyapıdaki maliyet çok büyük, ancak Rusya Federasyonu'nun bölgesel bütünlüğü korunmuştur."
 chechen_war.2.t_che: "Chechen Bağımsızlık"
 chechen_war.2.d_che: "Tüm oranlara karşı, Chechen savaşçıları galip geldi. Rus ordusu çekildi ve Ichkeria Çeçen Cumhuriyeti bağımsız bir ulus olarak duruyor. Özgürlük maliyeti şaşırtıcıydı, ancak Chechen halkının iradesi kırılmadı."
 chechen_war.2.a: "Tarih bu gün hatırlayacak"
 
 chechen_war.5.t: "Dağ Ambush"
 chechen_war.5.d: "Savaşçılarımız, dar bir dağ geçişi aracılığıyla Rus konvoyunu tespit ettiler. Arazi bir ambush için mükemmel - her iki tarafta dik uçurumlar, manevrak için sınırlı oda ve erkeklerimiz için kapak sağlayan yoğun orman."
 chechen_war.5.a: "Dağlardan grev"
 chechen_war.5.b: "Pozisyonumuzu tut"
 
 chechen_war.6.t: "Timd on Supply Lines"
 chechen_war.6.d: "Rus tedarik konvoyları düşük alanlardan en az eskortla hareket ediyor. Savaşçılarımız onları ele geçirebilir, değerli malzemeleri ele geçirebilir ve düşmanın lojistiklerini bozabilir - ancak operasyon bize kaynakları mal olacak ve retaliasyon davet edebilir."
 chechen_war.6.a: "Onların tedarik hatları"
 chechen_war.6.b: "Çok riskli"
 
 chechen_war.7.t: "Kafkasya'da Savaş"
 chechen_war.7.d: "Ichkeria Çeçen Cumhuriyeti bağımsızlığını ilan etti ve Rusya askeri güçle yanıt verdi. Kuzey Kafkasya savaşta besleniyor. Katı dağ arazisi Chechen gerillaları doğal bir avantaj sağlar, ancak Rusya'nın ordusu dayanılmaz olabilir."
 chechen_war.7.a: "Bu yüzden başlar"
 
