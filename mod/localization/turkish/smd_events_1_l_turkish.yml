 # ── EVENTS ───────────────────────────────
 
 velvet_divorce.1.t: "Anayasa Krizi Başlıyor"
 velvet_divorce.1.d: "Haziran 1992 seçimleri imkansız bir sonuç üretti. Çek topraklarında, Václav Klaus'un Civic Demokratik Partisi hızlı bir piyasa liberalleşme platformunda kazandı. Slovakya'da, Vladimír Mečiar'ın Demokratik Slovakya için hareketi daha yavaş reform ve daha fazla Slovak özerkliği platformunda kazandı.\n\n İki adam Brno'da tanıştı ve bir şey üzerinde anlaştı: mevcut düzenleme devam edemez. Neredeyse her şeyde aynı fikirde değiller. Başkan Václav Havel - halkın sorduysa ülkeyi bir araya getirme oy vereceğini inanan - yandı.\n\n [ROOT.GetCountry.GetName]'nin kaderi şimdi bir sonraki ayın getirdiği bir soru."
 velvet_divorce.1.f: "İki seçim. İki görev. Bir ülke."
 velvet_divorce.1.a: "Hükümet federasyonu birlikte tutmak için çalışacak"
 
 velvet_divorce.2.t: "Slovak Ekonomik Grievances"
 velvet_divorce.2.d: "Slovakya'nın ekonomisi, komünizmden Bohemia ve Moravia'dan daha çok acı çekiyor. Slovak endüstriyel üssü - Varşova Paktı için ağır üretim ve silah üretimi üzerine inşa edildi - neredeyse bir gecede çöktü. İşsizlik keskin bir şekilde yükseliyor. Slovak politikacılar federal ekonomik politikayı suçluyor ve ya yeniden dağıtım talep ediyor ya da kendi kurslarını belirleme hakkına sahiptir.\n\n\n Ülkenin iki yarısı arasındaki boşluk politik olarak anlaşılabilir hale geliyor."
 velvet_divorce.2.f: "Bir ülkenin yarısı iyi olduğunda ve diğer yarısı değil, neden kimin sorusu haline geliyor."
 velvet_divorce.2.a: "Slovak bölgelerine karşı Emekli federal fonlar"
 velvet_divorce.2.b: "Piyasa seviyesini bulacaktır - özel bir tedavi"
 
 velvet_divorce.3.t: "Slovak Egemenlik Bildirgesi"
 velvet_divorce.3.d: "Slovak Ulusal Konseyi, Slovakya'nın egemenliğini ilan etti. Belge bağımsızlık ilan etmeyi bıraktı, ancak Slovak kanununun Slovak topraklarında federal yasayı süperlediğini iddia ediyor.\n\n Bu anayasal olarak belirsiz ve politik olarak patlayıcıdır. Başkan onu mahkum etti ve kısa bir süre sonra Çekoslovak başkanlıkını terk etti. Açıklama henüz bir rupture değil - ama bire doğru ilk resmi adımdır."
 velvet_divorce.3.f: "Henüz bağımsızlık değil. Ama yön açık."
 velvet_divorce.3.a: "Açıklamayı Condemn - federal hukuk en yüce"
 velvet_divorce.3.b: "Açık görüşmeler – Slovakya'ya federasyon içinde daha resmi bir özerklik sunmak"
 
 velvet_divorce.4.t: "Mečiar ve Klaus: İki Adam, İki Vizyon"
 velvet_divorce.4.d: "Vladimír Mečiar ve Václav Klaus tekrar tanıştı. Onların müzakere pozisyonları sertleşti. Klaus, birleşik ekonomik politika ile sıkı federal bir birlik istiyor. Mečiar ya yakın toplam Slovak yerli özerkliği veya bağımsızlığı ile gevşek bir konfederasyon ister.\n\n Toplantıya katılanlar bunu sivil ama irreconcilable olarak tanımlıyorlar. İki adam düşman değildir - ama temel olarak farklı şeyler istiyorlar ve bunlardan biri istediğini alacak."
 velvet_divorce.4.f: "İki pragmatistler. Opposite sonuçları."
 velvet_divorce.4.a: "birleşik piyasa reform programına geri dönün – Klaus'u destekliyor"
 velvet_divorce.4.b: "Bir gevşek konfederasyon - Mečiar ile çalışmak için bir şey verin"
 
 velvet_divorce.5.t: "Bir Referendum için çağrılar"
 velvet_divorce.5.d: "Slovak politikacılar ve sivil gruplar bağımsızlık üzerine bir referandum çağrısında bulunuyor. Öneri Slovakya'da önemli bir kamu desteğine sahiptir, anketler dar bir çoğunluk ayrımı önerir.\n\n\n Başkan Havel - hala istifasına rağmen etkili - bir referanduma karşı tartışmıştır. Sürecin kendisi tutkulara inanıyor ve rasyonel bir sonuç imkansız hale getiriyor. "Nations, bir birleşmede bir paydaş toplantısının oylarını ayırmaya karar vermez" dedi. “Onlar onun yolunda hissediyorlar ya da ondan uzaklar.”\n\n Bir oylamaya sahip olup olmadığı sorusu, [ROOT.GetCountry.GetName]'nin inandığına dair bir oylamadır."
 velvet_divorce.5.f: "Bir referandum bir sorudur. Ancak bazı sorular cevabı değiştirir."
 velvet_divorce.5.a: "referandumu tutun - insanların konuşmalarına izin verin"
 velvet_divorce.5.b: "referandumu Blok - Havel'in danışmanı"
 
 velvet_divorce.10.t: "Çekoslovakya Yaşamları"
 velvet_divorce.10.d: "Kriz geçti. Ekonomik uzlaşma, siyasi müzakere ve federal kurumların kalıcılığı ile birlikte [ROOT.GetCountry.GetName] bir araya geldi.\n\n Ortaya çıkan düzenleme 1990 federasyonu değil. Slovakya daha fazla özerkliğe sahiptir. İki yarısı arasındaki ekonomik ilişki yeniden dengelendi. Ama devlet sağlam, ve bayrak değişmemiştir.\n\n Tarih bunun kaçınılmaz olmadığını not edecektir - bu gerekli aktif seçimler ve bu seçimler yapıldı."
 velvet_divorce.10.f: "Velvet boşanması gerçekleşmedi. Bu bir zaferdir."
 velvet_divorce.10.a: "Çekoslovakya katlanır"
 
 velvet_divorce.15.t: "The Velvet Boşanma"
 velvet_divorce.15.d: "Bu yapılır. 1 Ocak 1993'te, Çekoslovakya var olmaya son verecek.\n\n\n Sonuç federal parlamento tarafından kabul edildi - referandumla değil. Halk asla doğrudan sorulmuyordu. Ülkenin her iki yarısı da ortak bir devletin bir kısmını korumak için çoğunluk desteğini gösterdi, ancak siyasi sınıf - Klaus ve Mečiar en başta - sendikanın işe yaramaz olduğunu belirledi.\n\n\n Bölünmüş barışçılydı. Hiçbir çekim kovuldu. Hiçbir sınır itiraz edilmedi. Federasyonun malları ve yükümlülükleri, nüfusun temelinde bir formüle göre bölünmüştü. Ordu bölünmüştü. Para bölünmüştü. Bayrak bölünmüştü.\n\nCzechoslovakia yedi yıldır var. Devrimde doğdu ve parlamento oylamasında çözüldü. Her iki yeni devlet de zaten AB ve NATO üyeliği için uygulanır."
 velvet_divorce.15.f: "Yedi yıl. Kağıt işleri tarafından sona erdi."
 velvet_divorce.15.a: "Boşluk devam eder"
 
 velvet_divorce.16.t: "Çek Cumhuriyeti doğdu"
 velvet_divorce.16.d: "1 Ocak 1993'te Çek Cumhuriyeti bağımsız bir devlet haline gelir. Bohemia, Moravia ve Çek Silesia bölgesi - başkenti olarak Prag ile - Çekoslovak federasyona iki ardıl devletten birini oluşturur.\n\n Yeni devlet, eski ekonominin daha gelişmiş yarısını, işleyen bir demokratik sistemi ve hemen uluslararası tanımayı miras alır. Avrupa'ya giden yol açık."
 velvet_divorce.16.f: "Yeni bir devlet. Eski bir ulus."
 velvet_divorce.16.a: "Çek Cumhuriyeti başlar"
 
 velvet_divorce.17.t: "Slovak Cumhuriyeti doğdu"
 velvet_divorce.17.d: "1 Ocak 1993'te Slovak Cumhuriyeti bağımsız bir devlet haline gelir. Bratislava, tam bir gün için bu formda var olan bir ülkenin başkentidir.\n\nSlovakia, daha ağır bir endüstriyel mirası, daha yüksek işsizlik ve daha karmaşık bir siyasi ortamı miras alır - Mečiar'ın yönetim tarzı yakında uluslararası eleştiriler çizecektir. Fakat devlet egemen, tanınır ve tarihte ilk kez tamamen bağımsızdır."
 velvet_divorce.17.f: "Tarihinde ilk kez: bağımsız bir Slovakya."
 velvet_divorce.17.a: "Slovak Cumhuriyeti başlar"
 
 velvet_divorce.18.t: "What Comes Next?"
 velvet_divorce.18.d: "Çekoslovakya çözülüyor. Önceki devletleri - Çek Cumhuriyeti ve Slovak Cumhuriyeti - şekilleniyor.\n\n Artık var olmayan bir ülkenin lideriydin. Şimdi soru, bir sonraki hangi noktada oynayacağınız rol."
 velvet_divorce.18.f: "Bir ülke. İki gelecek."
 velvet_divorce.18.a: "Çek Cumhuriyeti olarak devam et"
 velvet_divorce.18.b: "Slovak Cumhuriyeti olarak devam et"
 velvet_divorce.18.c: "Geri kalan ve dağılması gözlemleyin"
 
