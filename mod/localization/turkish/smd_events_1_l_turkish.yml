# canada

canada.1.t:0 "Tears"
canada.1.d:0 "İngiliz Columbia'nın Yolu 16'nın bir kısmı, çoğunlukla Tears'ın otoyolu olarak anıldı, Kanada'da bir trajedi ve adaletsizliğin sembolü haline geldi, onlarca Yerli kadın ve kız 1970'lerden beri kayıp ya da öldürüldü. Prens George ve Prince Rupert arasında yer alan, uzak alan uzun süredir kamu taşımacılığından yoksundur ve birçok kişiyi vurmaya zorlar - ölümcül sonuçlarla."
canada.1.f:0 "Onu bir çelik kutuya koydular. Onu buldukları yol nedeniyle kapalı bir casket olması gerekiyordu... ” O gözyaşlarını geri tutmak için duraklar, kelimelerden önce, “şe ... bozuldu."

canada.1.a:0 "Ne yazık ki, bu ülke ile karşı karşıya olan çok daha acil sorunlar var."
canada.1.b:0 "utanmalıyız!"

je_indigenous_rights: "Indigenous Rights"
je_indigenous_rights_reason: "Indigenous haklarının sorusu, [ROOT.GetCountry.GetName]'nin iç politikasındaki en önemli çözülmemiş sorunlardan biridir. Ayrılma, asimilasyona zorlanılan ve kırılmış anlaşma yükümlülükleri Indigenous ve non-Indigenous popülasyonları arasındaki derin yapısal eşitsizlikleri terk etti. Bu boşluğu kapatmak, sürekli siyasi irade gerektirecektir - ve statükodan yararlananlardan direnişle karşı karşıya kalacaktır."


 indigenous_je_status_usa_tt: "Amerika Birleşik Devletleri'nde, 570'in üzerinde federal olarak tanınan kabileler, onların soy bölgelerinin bir kısmını temsil eden rezervasyon toprakları işgal etmişlerdir. Yaşam beklentisi, eğitim kazanımları ve rezervasyonlarda gelir ulusal ortalamaların çok geride kalır. Federal güven sorumluluğu - kabile egemenliğini ve refahı korumak yasal yükümlülüğü - yetersiz yerine getirilmesi kabul edilir."

 indigenous_je_status_can_tt: "Kanada'nın İlk Birleşmiş Milletler, Montis ve Inuit insanları 1876 Hindistan Yasası tarafından kurulan bir rezerv sistemi altında yaşayan bir milyondan fazla insan. Hint konut okulu sistemi – ki bu, Indigenous çocukları ailelerinden “assimilate” kendilerine – 1996 yılına kadar işletti, son okul kapanışı sadece son zamanlarda sona erdi. Bu sistemin kuşak travması bugün Yerli toplulukları şekillendirmeye devam ediyor."

 indigenous_je_status_nzl_tt: "Māori halkı – tangata whenua, the people of the land – 1840 yılında İngiliz Crown ile Waitangi Antlaşmasını imzaladı. Bu anlaşma asla tam olarak onurlandırılmamıştır. 19. yüzyılda topraklarının çoğu Māori topluluklarını terk etti ve Māori New Zealanders sağlık, gelir ve incarcerasyon oranlarında önemli eşitsizliklerle yüzleşmeye devam ediyor. 1975 yılında kurulan Waitangi Mahkemesi, Crown'a karşı iddiaları duymaya devam ediyor."

 indigenous_je_status_ast_tt: "Avustralya'nın Aborijin ve Torres Strait Islander insanları dünyanın en eski sürekli kültürleri – ve en dezavantajlıları arasında. “Stolen Nesiller” – Aborijin çocukları 1970'lere kadar devam eden devlet asimilasyon politikaları altından uzaklaştırdı – iyileşmemiş yaraları bıraktı. Indigenous Avustralyalılar için yaşam beklentisi, ulusal ortalamanın altında on yıldan fazladır. 1992 Mabo kararı ilk kez yerli unvanı tanıdı, ancak uygulama eşitsizdi."

 # indigenous.1 — Land Rights
 indigenous.1.t: "Yerli Haklar Davası"
 indigenous.1.d_usa: "Kabil ulusların koalisyonu, federal bir arazinin önemli bir yolunu iddia eden resmi bir iddia açtı, bölgenin anlaşma yükümlülüklerine aykırı olarak alındığını iddia etti. Talep önemli medya kapsamı ve yasal desteği çekti. Mahkemeler izliyor ve bu yüzden daha geniş Amerikan topluluğu."
 indigenous.1.d_can: "İlk Birleşmiş Milletler grubu, Aborijin ünvanını önemli bir Crown topraklarına iddia etti, geçerli bir antlaşmanın bölgeye haklarını yaydığını iddia etti. Dava federal mahkemeye ulaştı. Yasal uzmanlar, Kanada'nın Aborijin unvanı üzerindeki jurisprudence'ın önemli bir şekilde geliştiğini ve hükümetin cevabı önemli bir önceki haline gelecektir."
 indigenous.1.d_nzl: "Waitangi Mahkemesi, Crown'un yarışma arazisinde Waitangi Antlaşması'nı onurlandırmadığı bir rapor yayınladı. Bulgular yasal olarak bağlayıcı değildir, ancak önemli ahlaki ve politik ağırlık taşır. Māori toplulukları hükümete daha gecikmeden önerilerde bulunmalarını çağırıyor."
 indigenous.1.d_ast: "Federal Mahkeme şu anda papazlık çıkarlarına kiralanan bir arazi üzerinde yerel bir başlık iddia etti. Karar, hükümetin arazi kullanım hakları üzerinde iddia edilen grupla pazarlık etmesini gerektirir. Pastoral endüstri grupları, hükümetin kararı temyiz etmesi için lobi yapıyor."
 indigenous.1.f: "Arazi her zaman onlarındı. Soru, yasanın bunu söyleyeceğidir."
 indigenous.1.a: "Bir yerleşimi negotiate - iddiayı onurlandırın"
 indigenous.1.b: "Mahkemede iddia edilen rekabet - pozisyonumuz defensible"

 # indigenous.2 — Treaty Obligations
 indigenous.2.t: "Anlaşmaya İlişkin Borçlar"
 indigenous.2.d_usa: "Kongre raporu, federal hükümetin onlarca kabile ülkesine anlaşma yükümlülüklerini yerine getirmediğini buldu - sağlık, eğitim ve yıllık milyarlarca dolar rezervasyonlarında altyapı. Tribal liderler federal güven sorumluluğunun resmi bir incelemesini ve finansman boşluğuna yakın bir taahhütü çağırmaktadır."
 indigenous.2.d_can: "Bir parlamento komitesi, tarihi anlaşmalar altında yükümlülüklere bağlı olarak ilkleşmiş Milletler topluluklarının kronik desteklerini ayrıntılı bir rapor yayınladı. Rapor konut, su altyapısı ve eğitimdeki belirli düşüşleri tanımlar. Hükümet nasıl cevap vereceğine karar vermeli - ve tüm anlaşmaları yapmak için gerekli kaynakları taahhüt etmeye karar vermelidir."
 indigenous.2.d_nzl: "Māori liderleri hükümete bir dizi son politika kararının Waitangi Antlaşması'nın prensiplerini ihlal ettiğini iddia etti. Memo, kaynak yönetimi, sağlık ve eğitim finansmanı alanlarında belirli ihlallere maruz kalıyor ve tüm hükümet departmanlarında anlaşmayla ilgili kapsamlı bir inceleme çağrısında bulunuyor."
 indigenous.2.d_ast: "An Indigenous hakları örgütü, hükümetin Aborijin topluluklara ve gerçek kaynak tahsislerine ilişkin açık bir analiz yayınladı. Rapor, anlaşmanın ve yerleşim taahhütlerinin dolardaki 60 sentden daha az bir şekilde karşılandığı sonucuna varır. Topluluk liderleri tam uyum için resmi bir denetim ve bağlayıcı taahhüt talep ediyorlar."
 indigenous.2.f: "Kağıt üzerinde yazılmış bir söz sadece onu tutmak için iyi."
 indigenous.2.a: "Borçlarımızı tamamen onurlandırmak - kaynakları taahhüt etmek"
 indigenous.2.b: "Kısalığı kabul edin – kademeli iyileşmeye yönelik çalışmalar"

 # indigenous.3 — Cultural Preservation
 indigenous.3.t: "Indigenous Languages Tehdit"
 indigenous.3.d: "Linguists, [ROOT.GetCountry.GetName]'deki düzinelerce Indigenous dilinin, yok olmanın eşiğinde olduğuna dair bir rapor yayınladı. Birçok durumda, sadece bir avuç akıcı konuşmacı kalır - tüm yaşlılar. Kaybettikten sonra, bu diller kurtarılamaz. Onlarla oral histories, ekolojik bilgi, yasal gelenekler ve başka hiçbir yerde olmayan dünyayı anlama yolları.\n\n Soru, hükümetin bu yörüngeyi tersine çevirmek için gereken kaynakları yatırım yapmaya hazır olup olmadığıdır - ya da tarihin sessizliğinde kaybolacağını izlemektir."
 indigenous.3.f: "Bir dil bir dünyadır. Onun ölümü geri dönüşümlüdür."
 indigenous.3.a: "Fund Indigenous language revitalizasyon programları"
 indigenous.3.b: "Bu topluluklar için bir konudur – hükümet değil"

 # indigenous.4 — Health Crisis
 indigenous.4.t: "Yerli Sağlık Krizi"
 indigenous.4.d: "Ulusal bir sağlık raporu, Indigenous ve non-Indigenous sağlık sonuçları [ROOT.GetCountry.GetName] arasındaki yıldız boşluğu vurguladı. Yaşam beklentisi önemli ölçüde daha düşük. Diyabet, bağımlılık ve zihinsel hastalık oranları - birçokları nesiller arası travmaya dayanıyor - dramatik olarak daha yüksek. Rezervlerde ve uzaktan toplumlarda bebek ölümleri, ulusal ortalamanın birden fazlasıdır.\n\n Tıp kuruluşu kültürel olarak uygun, yeterli derecede finanse edilen Indigenous sağlık hizmetleri için çağrıda bulunuyor. Inaction maliyeti - hayatta ölçülen - önemli."
 indigenous.4.f: "Sağlıkta Eşitlik siyasi bir seçimdir."
 indigenous.4.a: "Indigenous sağlık programlarına yatırım yapmak"
 indigenous.4.b: "Mevcut sağlık sistemi tüm vatandaşlar için eşit olarak mevcuttur"

 # indigenous.5 — Reservation Conditions (USA/CAN)
 indigenous.5.t: "Rezervlerdeki koşullar"
 indigenous.5.d_usa: "Federal bir müfettiş generalin raporu, birçok Yerli Amerikan rezervasyonlarında yaşayan koşulların ulusal standartların altında önemli olduğunu buldu. Konut aşırı kalabalık ve dilsizdir. Temiz içme suyu erişim onlarca rezervasyonda güvenilmez. İşsizlik oranları birçok toplumda% 50'yi aşıyor. Rapor, durumu “ federal ihmal krizi” olarak adlandırıyor ve Hint İşleri finansmanı Bürosunda önemli bir artış öneriyor."
 indigenous.5.d_can: "Bir hükümet denetimi, yüzlerce First Nations topluluğunun kaynar su danışmanları altında olduğunu buldu - bazıları on yıldan fazla. Birçok rezervlerin üzerinde konut ciddi bir şekilde aşırı kalabalıktır. Zihinsel sağlık hizmetleri büyük ölçüde yok. Denetim, federal hükümetin, eşdeğer hizmetler için diğer Kanadalılardan daha az capita'da yaklaşık% 30 daha az harcadığı sonucuna varır."
 indigenous.5.f: "Rezerv sistemi içerecek şekilde inşa edilmiştir - destek için değil."
 indigenous.5.a: "rezerv toplulukları için federal finansman artırmak"
 indigenous.5.b: "Mevcut finansman seviyelerini korumak - bütçe daha fazla izin vermiyor"

 # indigenous.6 — Reservation Economic Development (USA/CAN)
 indigenous.6.t: "Yerli Topraklarda Ekonomik Kalkınma"
 indigenous.6.d_usa: "Çeşitli kabile ülkeleri, oyun operasyonları, kaynak çıkarma ortaklıkları ve turizm girişimleri dahil olmak üzere ekonomik gelişim inisiyatiflerini önerdiler - bu rezervasyon toplulukları için önemli bir gelir yaratır. Teklifler federal onay gerektirir ve kabile devlet hükümetlerinden ve kabile işletmelerini rekabet olarak gören ticari çıkarlardan karşı karşıyadır. Tribal liderler ekonomik öz yeterliliğinin yoksulluktan sadece sürdürülebilir bir yol olduğunu savunuyorlar."
 indigenous.6.d_can: "Kaynak zengin bölgelerdeki ilk Nations toplulukları, geleneksel toprakların üzerinde veya yakınında kaynak çıkarma anlaşmaları için gelir paylaşımı anlaşmalarını müzakere etmek istiyor. Birkaç topluluk ayrıca ormancılık ve enerji gelişimi için il hükümetlerle ortak girişimler önerdi. Teklifler ekonomik öz yeterliliğe doğru bir yol sunar - ancak hükümetin tarihsel olarak iddia ettiği kontrol ve gelirleri paylaşmasını gerektirir."
 indigenous.6.f: "Ekonomik bir üs olmadan egemenlik boş bir kelimedir."
 indigenous.6.a: "Destek Yerli ekonomik gelişme - önerileri onaylayın"
 indigenous.6.b: "Mevcut kaynak çıkarlarını önceliklendirmek – bu teklifler komplikasyonlar yaratır"

 # indigenous.20 — Ipperwash
 indigenous.20.t: "Ipperwash Krizi"
 indigenous.20.d: "Stoney Point Ojibwe göstericileri, Ipperwash İll Park'ı Ontario'da işgal etti, toprağın kutsal bir mezar da dahil olduğunu iddia etti - II. Dünya Savaşı sırasında toplumlarından yasadışı olarak ele geçirildi ve hiçbir zaman söz verilen olarak geri dönmedi. Meslek huzurlu, ancak Ontario İll Polisi bir perimeter kurdu ve nasıl devam edeceğini talep ediyor.\n\n Durum gergindir. Protestocular arasında silahlar var. Ayrıca yaşlılar, aileler ve elli yıldır rakipsiz olan meşru bir şikayet var."
 indigenous.20.f: "Burial zemin alındı. Asla geri verilmemişti."
 indigenous.20.a: "OPP'yi işgali dağıtmak için sipariş edin - siparişi geri yükleme"
 indigenous.20.b: "Doğrudan OPP ayağa kalkmak – huzurlu bir çözüm müzakere"

 # indigenous.21 — Last residential school
 indigenous.21.t: "The Last Residential School Closes"
 indigenous.21.d: "Gordon Residential School in Punnichy, Saskatchewan kapılarını kapattı - son federal olarak Kanada'da Hint konut okulu işletti. 1874'ten bu yana, konut okulu sistemi, Indigenous dili, kültürü ve kimliği aktif olarak bastırılmış olan kurumlarda tahmin edilen 150.000 Aborijin çocuğu ortadan kaldırdı ve onları Indigenous dili, kültürü ve kimliğin aktif olarak bastırıldığı kurumlara yerleştirdi.\n\n Son okulun kapatılması bir karar değildir. Bu, kasıtlı kültürel yıkımın bir bölümünün nihayet resmen sona erdiğini kabul ediyor. Hayatta kalanlar hala sonuçlarıyla yaşıyor."
 indigenous.21.f: "Son okul kapalı. Yarattığı yaralar yoktu."
 indigenous.21.a: "Kanada tarihinin karanlık bir bölümü bitti"

 # indigenous.22 — TRC
 indigenous.22.t: "Gerçek ve Reconciliasyon Komisyonu Raporları"
 indigenous.22.d: "Kanada'nın Gerçek ve Reconciliasyon Komisyonu son raporunu yayınladı - Hint konut okul sisteminin 6.500'den fazla hayatta kalan tanıktan altı yıllık bir tanıklıktan vazgeçme. Rapor, sistematik istismar, kültürel soykırım ve çok nesil travma, zorla asimilasyon politikası tarafından gerçekleştirilir.\n\n Komisyon 94 Calls to Action - çocuk refahı, eğitim, dil, sağlık ve adalet alanlarında özel öneriler yayınladı. Rapor, ne yapıldığını tanımlamak için “kültürel soykırım” terimini kullanır. Hükümet şimdi Komisyon'un çalışmasını ciddiye almaya karar vermelidir."
 indigenous.22.f: "Gerçek ilk adımdır. Reconciliasyon nesillerin işidir."
 indigenous.22.a: "Formal olarak Çağrıları Eyleme Kabul Ediyor - uzlaşmaya taahhüt"
 indigenous.22.b: "Raporu Tanıyın - Çağrıları dikkatlice gözden geçirin"

 indigenous.10.t: "Eşitliğe Doğru Bir Adım"
 indigenous.10.d_usa: "Amerika Birleşik Devletleri'ndeki olumlu eylem mevzuatının uygulanması, Yerli Amerikan topluluklarının karşı karşıya kaldığı yapısal eşitsizlikleri ele almak için önemli bir adımdır - diğer tarihsel olarak marjinalleştirilmiş gruplarla birlikte. Indigenous dispossession'ın tam kapsamı için bir çözüm değil, ancak nesiller için devam eden boşlukları kapatmak için anlamlı bir taahhüt temsil ediyor."
 indigenous.10.d_can: "Kanada olumlu eylem yasasını kaldırdı - bu sistemik eşitsizliğin sistemsel bir çare gerektirdiğini resmi bir kabul. First Nations, Métis ve Inuit toplulukları için, ölçüm çok daha büyük bir bulmacanın bir parçası. Ancak Indigenous dezavantaj sorusunu ciddiye almak için siyasi bir istekliyi işaret eder ve bu konudaki istekliliği geri döndürür."
 indigenous.10.d_nzl: "Yeni Zelanda, Māori ve Pākehā New Zealanders arasındaki eşitsizliklerin bireysel başarısızlığın ürünü olmadığını kabul etti, ancak tarihi politika. Māori toplulukları için, anlamlı bir adımdır - Waitangi Mahkemesi önerilerinin çoğunun basit olmadığını not eder."
 indigenous.10.d_ast: "Avustralya, Indigenous dezavantajlarının yapısal doğasını kabul eden önemli bir politika değişikliğini onayladı. Aborijin ve Torres Strait Islander toplulukları için, ilerlemeyi temsil eder. Yaşam beklentisi, sağlık sonuçları ve eğitim kazanımları bir gecede kapanmayacak, ancak seyahat yönü değişti."
 indigenous.10.f: "Adalet yolu uzundur. Bu bir adım ileri."
 indigenous.10.a: "Bunu yapmak için doğru şeydir"

 indigenous_land_settlement: "Arazi Hakları Çözüm"
 indigenous_land_settlement_desc: "Bir pazarlık arazi hakları yerleşimi Indigenous topluluklarla ilişkiler geliştirdi ve hükümetin meşruiyetini geliştirdi."

 indigenous_land_contested: "Toprak Hakları Yarışmalandı"
 indigenous_land_contested_desc: "Mahkemede Indigenous arazi hakları yarışması kararı, Indigenous topluluklarla gerginlikler arttı."

 indigenous_treaty_honoured: "Anlaşma Borçları Yemin Etti"
 indigenous_treaty_honoured_desc: "Anlaşma yükümlülüklerine tam uyum, hükümetin Yerli topluluklarla ayakta kalmasını güçlendirdi."

 indigenous_treaty_partial: "Anlaşma Borçları Kısmen Met"
 indigenous_treaty_partial_desc: "Anlaşma yükümlülüklerine katılmak, Indigenous hakları savunucularından memnun değildir."

 indigenous_cultural_investment: "Yerli Yatırım"
 indigenous_cultural_investment_desc: "Yerli dil ve kültürel programlar için hükümet finansmanı topluluk direncini destekliyor."

 indigenous_health_investment: "Yerli Sağlık Programları"
 indigenous_health_investment_desc: "Özel Yerli sağlık programları Indigenous topluluklarında sağlık sonuçlarını geliştiriyor."

 indigenous_health_cost: "Yerli Sağlık Programı Maliyetleri"
 indigenous_health_cost_desc: "Yeni Yerli sağlık programları sağlık bütçesine ek talepler koyuyor."

 indigenous_health_neglect: "Indigenous Health Neglect"
 indigenous_health_neglect_desc: "Yerli sağlık eşitsizliklerine hitap etme başarısızlığı devam eden hoşnutsuzluk yaratıyor."

 indigenous_reservation_investment: "Reserve Community Investment"
 indigenous_reservation_investment_desc: "rezerv toplulukları için artan federal finansman, yaşam standartlarındaki boşluğu kapatmak için başlıyor."

 indigenous_reservation_cost: "Rezerv Fonuing Costs"
 indigenous_reservation_cost_desc: "Artan rezerv topluluğu finansmanı federal bütçeyi güçlendiriyor."

 indigenous_reservation_neglect: "Rezerv Topluluğu Neglect"
 indigenous_reservation_neglect_desc: "Rezerv topluluklarının kronik istilası hoşnutsuzluk ve uluslararası eleştiri üretmeye devam ediyor."

 indigenous_economic_development: "Yerli Ekonomik Kalkınma"
 indigenous_economic_development_desc: "Indigenous ekonomik gelişim girişimleri için destek, topluluklar için gelir üretmek ve kendini yetersiz geliştirmektir."

 indigenous_economic_blocked: "Yerli Ekonomik Kalkınma Blokedildi"
 indigenous_economic_blocked_desc: "Indigenous ekonomik kalkınma önerilerinin reddedilmesi, First Nations topluluklarıyla ilişkileri zarar gördü."

 ipperwash_crackdown: "Ipperwash Crackdown"
 ipperwash_crackdown_desc: "Ipperwash'daki Indigenous göstericilerin şiddetli dispersalları önemli yerli ve uluslararası eleştiriler yarattı."

 ipperwash_negotiation: "Ipperwash Yeniden Çözüldü"
 ipperwash_negotiation_desc: "Ipperwash standoff'un barışçıl çözümü hükümetin Indigenous topluluklarla güvenilirliğini geliştirdi."

 indigenous_residential_school_closed: "Son Konut Okulu Kapalı"
 indigenous_residential_school_closed_desc: "Son Hint konut okulunun kapatılması, kültürel yıkımın bir politikasının resmi sonunu işaret ediyor – ancak sonuçları devam ediyor."

 trc_accepted: "Gerçek ve Reconciliasyon Kabul Edildi"
 trc_accepted_desc: "Kanada'nın Gerçek ve Reconciliation Komisyonu'nun Eylem Çağrılarının resmi kabulü, konut okullarının mirasını ele almak için önemli bir taahhüdü temsil ediyor."

 trc_enactment_bonus: "Reconciliation Mandate"
 trc_enactment_bonus_desc: "Gerçek ve Reconciliasyon sürecinin ivmesi, Indigenous hakları ile ilgili yasaları geçmek daha kolay hale getiriyor."

 trc_partial: "TRC Tanıdı"
 trc_partial_desc: "Hükümet, Gerçek ve Reconciliation Komisyonu'nun raporunu kabul etti, ancak Çağrılarını Eyleme Uygulamayı taahhüt etmedi."

 indigenous_rights_progress: "Yerli Hakları"
 indigenous_rights_progress_desc: "Onaylayıcı eylem mevzuatının uygulanması, Indigenous dezavantajlılığı ele almak için anlamlı bir taahhüt anlamına gelir. Boşluk bir gecede kapanmayacak - ancak politika yönü değişti."


# japan

japan.1.t: "Fukushima Nükleer Afet"
japan.1.d: "Büyük bir deprem ve tsunamiden sonra, Fukushima Daiichi Nükleer Güç Santrali felaket başarısızlıkları yaşadı, radyoaktif materyali çevreye serbest bıraktı. Afet dünyayı şok etti, nükleer güvenlik ve acil durum hazırlıklılığı hakkında küresel tartışmalara yol açtı."
japan.1.a: "Ulusal bir trajedi - ve küresel bir uyandırma çağrısı."

fukushima_nuclear_disaster: "Fukushima Nükleer Afet"
fukushima_nuclear_disaster_desc: "Fukushima Daiichi tesisine ciddi zarar, altyapının kesintisine ve uzun vadeli bir ulusal kurtarma çabasına yol açtı."

# south sudan

southsudan.1.t: "Güney Sudan Bağımsızlık Referendum"
southsudan.1.d: "On yıllar süren çatışma ve belirleyici bir referandumdan sonra, Sudan'ın güney eyaletleri Güney Sudan Cumhuriyeti'ni oluşturmaya karar verdi. Khartoum'daki merkezi hükümet kaderli bir seçimle karşı karşıya: yeni ulusu kabul etmek ya da onu geri almak için savaşa gitmek."
southsudan.1.a: "Sudan'ın bölünmüş olmasına izin vermeyeceğiz."
southsudan.1.b: "Onlara git, barış uğruna."

