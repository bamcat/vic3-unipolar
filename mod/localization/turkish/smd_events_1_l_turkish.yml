 ### EVENTS
 ### ══════════════════════════════════════════

 intifada_events.1.t: "The Conflict Escalates"
 intifada_events.1.d: "Ayaklanma sokak çatışmalarının ötesine geçti. Taşlar ve protestolar olarak başlayan şey tam bir çatışma haline geldi. Filistin'in dar bölgelerinde, her bina bir kale ve her sokak bir savaş alanıdır."
 intifada_events.1.a: "siparişi geri getireceğiz"
 intifada_events.1.a.pal: "Asla direnmeyi bırakmayacağız"

 intifada_events.2.t_isr: "Intifada Ends"
 intifada_events.2.d_isr: "İkinci Intifada bastırıldı. İsrail askeri operasyonları, Filistin topraklarının üzerinde kontrol etti, ancak uluslararası itibarın ve Filistinli sivil yaşamın maliyeti büyük oldu. Altta yatan şikayetler çözülmemiş kalır."
 intifada_events.2.t_pal: "Filistinli Direniş Prevails"
 intifada_events.2.d_pal: "İkinci Intifada imkansız görünüyordu. Oer kararlılık ve fedakarlık sayesinde, Filistinliler İsrail'i müzakere masasına zorladılar. Dünya, işgale karşı popüler direniş gücüne tanık oldu."
 intifada_events.2.a: "Sonraki ne geliyor?"

 intifada_events.5.t: "Sokak kavgaları"
 intifada_events.5.d: "Genç Filistinliler İsrail kontrol noktalarının kenarlarında toplandılar, taşlarla silahlı ve yanıyor lastik. Dar sokaklar, İsrail zırhlı araçların etkili bir şekilde manevradığı yakın merkezlere karşı çatışmayı kanallaştırıyor. Dünya çapındaki televizyon kameraları sahneleri kaydeder."
 intifada_events.5.a: "Direnişi Değiştirin"
 intifada_events.5.b: "Show constraint"

 intifada_events.6.t: "Checkpoint Raids"
 intifada_events.6.d: "İsrail askeri kontrol noktaları Filistin topluluklarının hem bir işgal sembolü hem de taktik bir hedef sunuyor. koordineli bir grev, İsrail'in bölgedeki hareket kontrolünü bozabilir, ancak sert retaliasyon davet edecektir."
 intifada_events.6.a: "Kontrol noktaları grev"
 intifada_events.6.b: "Çok tehlikeli"

 intifada_events.8.t: "International Media Coverage"
 intifada_events.8.d: "Uluslararası medya kuruluşları dünyadaki isyanın yayın görüntüleridir. İsrail askeri güçleri ile karşı karşıya kalan Filistinli sivillerin sahneleri, dünya çapında başkentlerde protestolara yol açtı ve kınadı. Arap Ligi ülkeleri Filistin'in arkasındaki protesto ediliyor, oysa İsrail diplomatik baskıya maruz kalıyor."
 intifada_events.8.a: "Dünya izliyor"

 intifada_events.7.t: "İkinci Intifada"
 intifada_events.7.d: "Filistin toprakları patlak verdi. Yıllar süren başarısız barış görüşmelerinden sonra ve yerleşim genişlemesine devam ettikten sonra, Filistinli insanların hayal kırıklığı açık ayaklanmaya yol açtı. Gazze'nin ve Batı Bankası'nın tepeleri karşısında, yeni bir nesil mücadeleyi alır."
 intifada_events.7.a: "Bu bir nesil tanımlayacak"

