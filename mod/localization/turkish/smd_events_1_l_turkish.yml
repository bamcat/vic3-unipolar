 # ── EVENT TITLES AND TEXT ────────────────

 mani_pulite.1.t: "Bir Businessman, Flush Twenty Milyon Lire'ye Tries"
 mani_pulite.1.d: "Mario Chiesa, Pio Albergo Trivulzio'nun başkanı - Milan bir emeklilik evi - bir Milan emeklilik evi yargıç Antonio Di Pietro tarafından tutuklandı ve bir tuvaletin üzerine banknotlar çıkarmaya çalışırken. Chiesa bir temizlik firmasından 37 milyon lire tekme aldı.\n\n\n Sosyalistler hemen ona aitti. Parti sekreteri Bettino Craxi, Chiesa 'a hırsızı' çağırıyor - sözlerin çok bilge bir seçimi değil, Di Pietro'nun bir sonraki ne bulacağını verdi. tutuklama küçük. Hangisine yol açacak."
 mani_pulite.1.f: "Rutin bir tutuklama. Ya da öyle görünüyordu."
 mani_pulite.1.a: "Yerel bir utanç. Sistem güvenlidir."

 mani_pulite.2.t: "İlk Confessions"
 mani_pulite.2.d: "Hapishane ile yüz yüze, küçük fonksiyonerler konuşmaya başladı. Bağışlama karşılığında değil - resmi bir anlaşma yoktur - ancak baraj kırıldı ve sessizlik mantığı artık tutmadı. Her isim başka bir şeye yol açar. Diğer her isim bir partiye yol açar. Her parti bir bakanlıka yol açıyor.\n\n Soruşturma artık banknotlarla dolu bir tuvaletle ilgili değildir. Cumhuriyet'in tüm finansal mimarisi ile ilgilidir."
 mani_pulite.2.f: "Bir adam konuştuğunda, hepsi konuşurlar."
 mani_pulite.2.a: "Soruşturma devam edelim – şimdi durdurmuyor"
 mani_pulite.2.b: "spreadleri içerecek şekilde yönetim basıncı kullanın"

 mani_pulite.5.t: "Mani Pulite – İtalya Herkes Knews"
 mani_pulite.5.d: "Milano magistrates havuzu - Di Pietro, Colombo, Davigo, Borrelli - halka gitti. Birikmiş oldukları kanıt ölçeklenebilir hale getirir: son on yıllar boyunca, İtalya'daki hemen hemen hemen her kamu sözleşmesi bir geri dönüşle geldi. Cumhuriyet'i öldüren partiler her yolun bir yüzdesi, her hastane, her okul.\n\n İtalya'nın gazeteleri bunun için bir adı var: #bold Tangentopoli#! Bribe City. İlk Cumhuriyet denemede."
 mani_pulite.5.f: "Herkes biliyordu. Şimdi herkes herkesin bildiğini biliyor."
 mani_pulite.5.a: "Soruşturma nereye yol açtığına gidecek"

 mani_pulite.6.t: "Avvisi di Garanzia"
 mani_pulite.6.d: "Soruşturma notları [ROOT.GetCountry.GetName]'e ulaşıyor - işadamları, bakanlık yetkilileri, parti hazineleri, belediye başkanları için. #italic avviso di garanzia#! - soruşturma altında olan bir bildirim - utanç için kısa bir el haline geldi. Gazeteler onları ön sayfada yazdırdı. Kariyerler bir gecede sona erer.\n\n[SCOPE.gsInterestGroup('indicted_ig').GetName], diğerleri arasında fark vardır. Soruşturma artık Milano ile sınırlı değildir."
 mani_pulite.6.f: "Postman asla bu kadar dehşet verici olmamıştır."
 mani_pulite.6.a: "Cooperate – direniş sadece daha kötü hale getirecek"
 mani_pulite.6.b: "Yargı baskısını yargıya uygulayın"

 mani_pulite.7.t: "Craxi ve Coins"
 mani_pulite.7.d: "Bettino Craxi - eski Başbakan, sosyalist parti sekreteri, on yıl boyunca İtalya'daki en güçlü politikacı - Roma'daki Hotel Rafael'den birkaç yüz vatandaşıyla karşılaşmak için ortaya çıktı.\n\n Onu para ve domatesle süslediler. Coins, çünkü paranın nereden geldiğini biliyorlar.\n\n Craxi, parti finansmanı sistemini savunmak için kısa bir açıklama verdi - herkes biliyordu - ve içeride geri çekildi. Aylar içinde Hammamet'deki villasına uçacak, Tunus. İtalya'ya asla dönmeyecek. Sosyalistler, inşa ettiği parti, var olmaya son verecek."
 mani_pulite.7.f: "Bir ülkeden çalan bir adam, paralar tarafından yönlendirildi."
 mani_pulite.7.a: "Eski sistem bitti - düşmesine izin ver"
 mani_pulite.7.b: "Geçişi Yönetin - sorumluluğu kabul et, reform arama"

 mani_pulite.8.t: "Araştırma Güney'e ulaşıyor"
 mani_pulite.8.d: "Tangentopoli asla sadece kuzey bir fenomen değildi. [SCOPE.sState('tangentopoli_south_state').GetName] ve Mezzogiorno'da, geri dönüş sistemi AB tarım sübvansiyonları, kamu altyapı projeleri ve yerel politika ve organize suç arasındaki ilişkiler ağı.\n\nDi Pietro'nun soruşturması, parayı güneye takip etti. [SCOPE.sState('tangentopoli_south_state').GetName]'deki siyasi ağlar, kuzey meslektaşlarından daha eski ve daha derin bir şekilde dayanıyor. Kolayca ayrı gelmeyecekler."
 mani_pulite.8.f: "Yol bütün yol aşağı gitti."
 mani_pulite.8.a: "Soruşturmayı uzat - istisnalar yok"
 mani_pulite.8.b: "Kuzeydeki soruşturmayı mahvediyor - Güney çok karmaşık"

 mani_pulite.9.t: "Biondi Decree"
 mani_pulite.9.d: "Adalet Bakanı Alfredo Biondi, Mani Pulite'nin kalbindeki suçların da dahil olmak üzere bir dizi finansal suç için yatırımevinin kullanımını yasaklayacak bir acil karar verdi. Eleştirmenler hemen #italic salvaladri#! “save-thieves yasası.\n\n 24 saat içinde Milano magistrates protestoda kolektif istifalarını açıkladı. Halk yanıtı ezici. İtalya'daki savcılar yüzlerce binlerce vatandaşın desteğini aldı. Siyasi ilerleme maliyeti görünür hale geliyor."
 mani_pulite.9.f: "Kendi suçlularını korumak için bir yasa çıkaran bir hükümet, denemeyi uzun süre hayatta bırakmaz."
 mani_pulite.9.a: "Kararname ile itin - soruşturma bulunmalıdır"
 mani_pulite.9.b: "Kararnameyi çizin – halk tepkisi çok güçlü"

 mani_pulite.10.t: "İlk Cumhuriyet Ölüyor"
 mani_pulite.10.d: "Bu bitti. Christian Demokrasi – İtalya’yı 1948'den beri kesintisiz yöneten parti – çözüldü. Sosyalistler gitti. Daha küçük koalisyon partileri gitti. İlk Cumhuriyetin Kırk beş yılı, iki yıl içinde Milano’daki bir magistrates grubu tarafından ele alındı, sadece diğer şekilde bakmayı reddetti.\n\n 1.200'den fazla politikacı ve iş adamı mahkum edildi. Beş bin tanesi araştırıldı. Eski başbakanlar, kabine bakanları ve sanayiciler duruşmayla karşı karşıya kaldılar.\n\n [ROOT.GetCountry.GetName] için bir sonraki şey belirsizdir. Fakat yarım yüzyıl boyunca Cumhuriyet'de besleyen sistem tamamlandı."
 mani_pulite.10.f: "Yargıçlar hiçbir zaman seçim yapamayacağını yaptı."
 mani_pulite.10.a: "Yeni bir İtalya – Temiz molayı kucaklayın"
 mani_pulite.10.b: "yönetilen bir geçiş - rupture olmadan reform"

 mani_pulite.15.t: "İnceleme Buried"
 mani_pulite.15.d: "Siyasi sınıf kazandı. Magistrates transfer edildi, kredisiz ya da finanse edildi. Kanıtlar mühürlendi. Hız kırıldı.\n\n Bu, Tangentopoli'nin gerçekleşmediği anlamına gelmez. Bu, onu inşa eden insanların hayatta kalmasının anlamına gelir. Yolsuzluk sona ermedi - yeni formlara ve yeni düzenlemelere gitti. [ROOT.GetCountry.GetName] Vatandaşları neyin yapıldığını biliyor. Bunun cezalandırılmadığını biliyorlar. Bu bilgi yok değildir."
 mani_pulite.15.f: "Adalet ertelenmiş adalet inkar edilir. Ve herkes bunu biliyor."
 mani_pulite.15.a: "Sistem hayatta kalır - şimdilik"

 # ── MODIFIERS ────────────────────────────

 tangentopoli_systemic_corruption: "Tangentopoli"
 tangentopoli_systemic_corruption_desc: "[ROOT.GetCountry.GetAdjective] Yıllardır finanse edilen geri dönüş sistemi her kamu sözleşmesinde yer almaktadır. Legitimacy yapısal olarak zayıftır. Sistem paraya mal olur ve infamy davet eder."

 tangentopoli_chiesa_arrest: "Chiesa Affair"
 tangentopoli_chiesa_arrest_desc: "Mario Chiesa'nın tutuklanması sistemdeki ilk çatlakları açtı. Siyasi sınıf onu işten çıkarır, ancak magistrates konuyu takip eder."

 tangentopoli_ig_under_scrutiny: "Araştırma altında"
 tangentopoli_ig_under_scrutiny_desc: "Bu grup Tangentopoli yolsuzluk ağı ile bağlantılı olarak yargılıdır. Siyasi gücü ve popüler itirazı önemli ölçüde zarar görür."

 tangentopoli_widening_investigation: "Genişleme Soruşturması"
 tangentopoli_widening_investigation_desc: "Soruşturma ilk kapsamının ötesinde genişliyor. Her itiraf yeni bir tutuklamaya yol açıyor. Yönetim politik maliyeti artıyor."

 tangentopoli_suppression_attempt: "Suppression"
 tangentopoli_suppression_attempt_desc: "[ROOT.GetCountry.GetName] yargı soruşturmasını bastırmaya çalıştı. Uluslararası topluluk ve yerli basın bunu belirtti."

 tangentopoli_party_collapse: "Parti Collap"
 tangentopoli_party_collapse_desc: "Bu parti Tangentopoli’nin vahiyleri tarafından yok edildi. Liderliği sürgünde veya iddia altında. Seçmeleri başka yerlere gitti."

 tangentopoli_legitimacy_crisis: "Tartışma Krizi"
 tangentopoli_legitimacy_crisis_desc: "Sistemsel yolsuzlukların ortaya çıkışı, [ROOT.GetCountry.GetAdjective] kurumlara kamu güvenini parçaladı. Radikalizm yayılıyor. Otorite zayıftır."

 tangentopoli_south_exposure: "Güney Networks Exposed"
 tangentopoli_south_exposure_desc: "Mani Pulite soruşturması Mezzogiorno'ya ulaştı, güney siyasi ağları ve Tangentopoli sistemi arasındaki ilişkiyi ortaya çıkardı."

 mani_pulite_investigation_begins: "Mani Pulite Soruşturması"
 mani_pulite_investigation_begins_desc: "Milano magistrates havuzu tam bir soruşturma yürütüyor. [ROOT.GetCountry.GetName]'nin uluslararası itibarı, hesap verme taahhüdünden yararlanır."

 mani_pulite_public_mandate: "Adalet İçin Halk"
 mani_pulite_public_mandate_desc: "Kamu basıncı altındaki kararnamenin geri çekilmesi, soruşturma için popüler desteğin genişliğini göstermiştir."

 mani_pulite_clean_hands_victory: "Temiz Eller Zaferi"
 mani_pulite_clean_hands_victory_desc: "Mani Pulite başarılı oldu. İlk Cumhuriyet'in yozlaşmış parti sistemi yargı süreci tarafından kaldırıldı. [ROOT.GetCountry.GetName] İkinci Cumhuriyeti daha yüksek bir meşruiyetle başlar, daha temiz bir kurumsal temel ve güç sorumlu tutmaktan gelen uluslararası tanıma."

 mani_pulite_cautious_transition: "Yönetilen Geçiş"
 mani_pulite_cautious_transition_desc: "First to Second Republic'in geçiş dikkatle yönetiliyor - rupture olmadan reform. Eski partiler gitti, ancak kurumsal süreklilik korunmuştur."

 mani_pulite_investigation_buried: "Araştırma Buried"
 mani_pulite_investigation_buried_desc: "Mani Pulite başarısız oldu. Siyasi sınıf hayatta kaldı. [ROOT.GetCountry.GetName] vatandaşlar ne yapıldığını biliyor ve bunun cezalandırılmadığını biliyor. Yolsuzluk yüzeyin altında devam ediyor. Legitimacy kalıcı olarak hasar görür."

 amendment_events.1.t: "Zavallı Sağlık Programı"
 amendment_events.1.d: "Proposals, düşük gelirli Amerikalılar, yaşlılar ve engelliler için federal finanse edilen bir sağlık sigortası programı oluşturmak için Kongreden öncedir. Destekçiler, özel pazarların premiumları ödeyemeyenlere hizmet edemeyeceğini iddia ediyorlar. Opponents, federal katılımın sağlıkta kabul edilemez bir genişlemesi olduğunu iddia ediyor.\n\n Faturayı geri getiren koalisyon geniştir - sendikalar, sosyal reformcular ve halkın önemli bir kısmı. [ROOT.GetCountry.GetName] hareket, siyasi iradenin bir sorusu olacaktır."
 amendment_events.1.f: "Tıp bunu karşılayabileceğinize bağlı olmamalıdır."
 amendment_events.1.a: "Enact Medicaid - ihtiyacı olanlara federal sağlık kapsamı"
 amendment_events.1.b: "Reject it – sağlık özel bir konudur"
 
 amendment_events.2.t: "Affordable Care Act"
 amendment_events.2.d: "Yönetim kapsamlı sağlık reformunu ileri sürdü - Uygun Bakım Yasası. Tüm vatandaşların sağlık sigortası taşıdığının, düzenlenmiş pazarları oluşturduğunu, Medicaid uygunluklarını genişletdiğini ve önceden mevcut koşullar için teminat altına almayı inkar eden barları garanti eder.\n\n Bireysel görev derinden tartışmalıdır. Destekçiler, sigorta piyasalarının işlevini yapmanın tek yoludur. Muhalefet, hükümete genişliyor. Faturanın oyları var - koalisyon tutarsa."
 amendment_events.2.f: "Kırk milyon sigortalı Amerikalı. Kongre bunu değiştirme şansına sahiptir."
 amendment_events.2.a: "Affordable Care Act'ı yasa haline getirin"
 amendment_events.2.b: "Veto it - görev çok uzak"
 
 amendment_events.3.t: "PATRIOT Yasası"
 amendment_events.3.d: "11 Eylül saldırılarından sonra, Kongre, ABD PATRIOT Yasasını geçmek için olağanüstü bir hızla taşındı - çarpıcı şekilde yerel gözetim otoritelerini genişletmek, istihbarat operasyonlarının yargı gözetimini azaltmak ve yasa uygulama ajanslarında daha önce görülmemiş bilgi paylaşımı sağlamak.\n\n Faturanın yakın uyumlu desteğine sahiptir. Sivil özgürlükler pasajın hızını ve hükümlerin genişliğinin geri dönmek zor olacağını uyarır. Ülke hala acı çekiyor. Oy yarındır."
 amendment_events.3.f: "Korku bir kanundur."
 amendment_events.3.a: "PATRIOT Yasası'nı imzalayın - ulusal güvenlik gerektirir"
 amendment_events.3.b: "Refuse – sivil özgürlükler üzüntü içinde pazarlık edilemez"
 
 amendment_events.4.t: "Federal Saldırı Silahları Yasakladı"
 amendment_events.4.d: "Kongre, sivil satış için belirtilen yarı otomatik silah ve yüksek kapasiteli dergilerin imalatında on yıllık federal bir yasağı oylamaktadır. Fatura kanun uygulama dernekleri ve atış kurbanları aileleri tarafından destekleniyor. Silah lobisi buna karşı ağır bir şekilde harcamıştır.\n\n Son oyları güvence altına almak için on yıllık gün batım şartı eklendi. Yasak 2004 yılında yenilenmeden sona erecek - ve siyasi koalisyon bunu yenilemeyecek."
 amendment_events.4.f: "On yıl. Sonra oylama tekrar olur."
 amendment_events.4.a: "yasağı geç - on yıl bir başlangıç"
 amendment_events.4.b: "Bunu başarmak - vatandaşların suçluların eylemleri için ödeme yapması gerekir"
 
 amendment_events.5.t: "Violent Crime Control ve Law Execution Act"
 amendment_events.5.d: "Kongre, [ROOT.GetCountry.GetName]'nin tarihindeki en büyük suç mevzuatını göz önünde bulundurmaktadır - 100.000 yeni polis memuru için finansman, federal hapishane sisteminin önemli bir genişlemesi, yeni zorunlu cümleler ve kadınlara karşı şiddet bir sürücü olarak.\n\n Siyasal mantık iki taraftır. 1980'lerin sonundaki suç dalgası, parti hatları boyunca popüler hukuk ve sipariş politikası yapmıştır. Fatura kolayca geçecek. Çalışmak daha sonra bir soru olacaktır."
 amendment_events.5.f: "Fatura kolayca geçer. Sonuçlar daha uzun sürer."
 amendment_events.5.a: "İmzalayın - ülke suçla ilgili eylem talep ediyor"
 amendment_events.5.b: "Reject it – zorunlu minimumlar ve kitlesel incarcerasyon cevap değil"
 
 amendment_events.6.t: "Tax-Sharing System Reform"
 amendment_events.6.d: "Maliye Bakanı Liu Jihua, Halk Cumhuriyeti'nin kurulmasından bu yana en önemli mali reformunu önerdi - Pekin ve yerel hükümetler arasında ulusal değere eklenmiş vergi ve resmi bir gelir formülü ile pazarlık etti.\n\n Reform, mali gücü dramatik bir şekilde merkezileştirecek, Pekin'e güvenilir ve büyüyen bir gelir akışı sağlayacaktır. Yerel hükümetler takdiri kaybedecek, ancak açıklık kazanacaklar. Yerel yetkililerle ilişkiler inşa eden endüstriyel ve ticari ilgi sessizce karşılanır."
 amendment_events.6.f: "Merkez, illerin ne sakladığını istiyor."
 amendment_events.6.a: "Vergi paylaşımı sistemini uygulamak - mali otoriteyi merkezileştirmek"
 amendment_events.6.b: "Mevcut düzenlemeleri koruyun - hangi işlevleri bozmayın"
 
 amendment_events.7.t: "35 Saat Çalışma Haftası"
 amendment_events.7.d: "İşçi Bakanı Martine Aubry, çoğu çalışan için 35 saatlik bir yasal çalışma haftasını talep etti - 39'dan standart saati azalttı. Politika daha geniş bir şekilde iş paylaşmanın bir yolu olarak sunuldu: işçi başına daha az saat, daha fazla işçi istihdam edildi.\n\n Sendikalar heveslidir. İşverenlerin federasyonu rekabetçi bir kriz konusunda uyardı. Ekonomistler bölünmüşlerdir. Bu hükümetin seçtiği sol koalisyon söz üzerine koştu. Soru, onu teslim edecek olup olmadığıdır."
 amendment_events.7.f: "Otuz beş saat. İki saat daha az. Siyasi bir yangın fırtınası."
 amendment_events.7.a: "Aubry Yasasını geç - işçiler daha kısa saatler hak ediyor"
 amendment_events.7.b: "Bunu bırakın - ekonomik maliyet çok yüksek"
 
 patriot_act_rejected_modifier: "PATRIOT Act Rejected"
 patriot_act_rejected_modifier_desc: "PATRIOT Yasasını geçme kararı, sinir bozucu ve saldırı sonrası siyasi uzlaşmayı terk etti."
 
 china_tax_reform_rejected_modifier: "Vergi Reformu Stalled"
 china_tax_reform_rejected_modifier_desc: "Vergi sistemini merkezileştirme başarısızlığı mali otorite parçalandı. Yerel hükümetler kendi düzenlemeleri müzakere etmeye devam ediyor, merkezin gelirlerini ve otoritesini azaltıyor."
 
 terrorism_a.1.t: "Dünya Ticaret Merkezi Bombalandı"
 terrorism_a.1.d: "Bir bomba, New York'taki Dünya Ticaret Merkezi'nin yeraltı park garajında patladı. Patlama altı kişiyi öldürdü ve binlerce kişiyi yaraladı. Bina düşmedi - ama niyet diğerine bir kule getirmekti.\n\n \n [ROOT.GetCountry.GetName] Toprak üzerinde ilk büyük uluslararası terörist saldırı. Suçluların Orta Doğu ve Orta Asya'dan faaliyet gösteren ağlara bağlantıları vardır. Soruşturma devam ediyor."
 terrorism_a.1.f: "İlk saldırı. Son değil."
 terrorism_a.1.a: "Bu sorumluları bulacağız"
 
 terrorism_a.2.t: "Hurricane Andrew Strikes"
 terrorism_a.2.d: "Hurricane Andrew – en yıkıcı Atlantik kasırgası zamanında rekora ulaştı – saatte 165 milden fazla rüzgarla Güney Florida'da kara yağış yaptı. Hasar felakettir. Miami-Dade County'deki entire topluluklar yok edildi. Preliminary tahminler bunun [ROOT.GetCountry.GetName] tarihinin en pahalı doğal afetlerden biri olacağını gösteriyor."
 terrorism_a.2.f: "Kasırga ne inşa edildiği için hiçbir şey umursamıyor."
 terrorism_a.2.a: "federal bir felaketi Aralık - rahatlamak"
 
 terrorism_a.3.t: "Kuzeyridge Depremi"
 terrorism_a.3.d: "Büyük bir 6.7 deprem sabah 4:31'de San Fernando Valley kuzeyine çarptı. Elli insanlar öldü, binlerce yaralı ve altyapıya zarar - özellikle ücretsiz sistem ve eski binalar - zaten on milyarlarca dolar aştı. Deprem [ROOT.GetCountry.GetName]'nin tarihinde en pahalı olanıdır."
 terrorism_a.3.f: "Kaliforniya sarsıyor. Her zaman titrer."
 terrorism_a.3.a: "federal rahatlamayı hemen harekete geçirin"
 
 terrorism_a.4.t: "Oklahoma City'de Bombalama"
 terrorism_a.4.d: "Bir kamyon bombası Alfred P. Murrah Federal Binası'nın ön yüzünü Oklahoma'da yok etti, 168 kişiyi öldürdü - binadaki günlük bakım merkezinde 19 çocuk da dahil. [ROOT.GetCountry.GetName]'nin tarihindeki en ölümcül yerli terörist saldırıdır.\n\n Suçlular yabancı değildir. Timothy McVeigh ve Terry Nichols [ROOT.GetCountry.GetAdjective] hükümet ideolojisi tarafından motive edilen vatandaşlardır. Ülke, tehditin içeriden gelebileceği gerçeğiyle karşı karşıyadır."
 terrorism_a.4.f: "Düşman sınırda değildi. Zaten buradaydı."
 terrorism_a.4.a: "Bu iç terörizmdir - tam güçle yanıt vereceğiz"
 
 terrorism_a.5.t: "U.S. Embassies Doğu Afrika'da Bombalandı"
 terrorism_a.5.d: "Simultane kamyon bombaları [ROOT.GetCountry.GetAdjective] Nairobi, Kenya ve Dar es Salaam dışında patladı. 200'den fazla insanı öldürdü - çoğu Kenyalı ve Tanzanyalı sivil - ve binlerce kişiyi yaraladı. Osama bin Laden tarafından yönetilen bir ağ sorumluluk iddia etti.\n\n Saldırılar [ROOT.GetCountry.GetAdjective] dünya çapındaki ilgilerin hedefler olduğu konusunda bir bildirimdir. [ROOT.GetCountry.GetName] yanıt önümüzdeki on yıl boyunca terörle mücadele şeklini tanımlayacaktır."
 terrorism_a.5.f: "Savaş ilk önce elçilerimize geldi."
 terrorism_a.5.a: "Bu bir savaş eylemidir - yanıt vereceğiz"
 
 terrorism_a.6.t: "[ROOT.GetCountry.GetAdjective] Büyükelçiliği Büyükelçiliği Bombalanmış mı"
 terrorism_a.6.d: "Bir kamyon bombası ABD Büyükelçiliği dışında Nairobi'de patladı, 200'den fazla insanı öldürdü - bunların çoğu [ROOT.GetCountry.GetAdjective] Binaya zamanında yakın olan siviller. Saldırı [ROOT.GetCountry.GetName]. [ROOT.GetCountry.GetName] yine de maliyetine yol açmadı."
 terrorism_a.6.f: "Bomba uluslar arasında ayrım yapmadı."
 terrorism_a.6.a: "Ölülerimiz için adalet talep ediyoruz"
 
 terrorism_a.7.t: "[ROOT.GetCountry.GetAdjective] Capital Is Struck"
 terrorism_a.7.d: "Bir bomba ABD Dar es Salaam'daki Büyükelçiliği'ne yakın patladı, Nairobi, Kenya'da eşzamanlı bir bombalamanın yanı sıra koordineli bir saldırı olduğu ortaya çıktı. Kurbanlar öncelikle [ROOT.GetCountry.GetAdjective] sivillerdi. Saldırı ülkeyi sardı."
 terrorism_a.7.f: "Terörizm bir okyanus boyunca kıyılarımıza ulaştı."
 terrorism_a.7.a: "Biz halkımızla birlikte duruyoruz"
 
 terrorism_a.8.t: "ABD Cole Bombalandı"
 terrorism_a.8.d: "ABD Cole'un yanında patlayıcı taşıyan küçük bir tekne, Aden, Yemen limanında yeniden yakıtlandırıldığı için. Yedi [ROOT.GetCountry.GetAdjective] denizci öldürüldü ve 39 yaralı. Saldırı El Kaide'ye atfedilir.\n\n [ROOT.GetCountry.GetAdjective] Deniz Kuvvetleri, samimi bir limanda rutin bir yeniden yakıt duraklama durağında, bir kauçuk sıkışıklığı içinde intihar bombacısı tarafından saldırıya uğradı. Askeri liderlik, bunun nasıl gerçekleşmesine izin verildiğini soruyor."
 terrorism_a.8.f: "Donanmanın zor hedef olması gerekiyor."
 terrorism_a.8.a: "Bu cevapsız gitmeyecek"
 
 terrorism_a.9.t: "Bridge Creek-Moore Tornado"
 terrorism_a.9.d: "EF5 tornado - Fujita ölçeğinde kaydedilen en güçlü - Bridge Creek ve Moore ile bir yol kesti. Rüzgar hızları saatte 300 mil aştı. Tordo 85 dakika boyunca zemindeydi ve Oklahoma City'nin güneyindeki topluluklar aracılığıyla toplam yıkımın bir mil boyunca sürdü. Otuz altı kişi öldü."
 terrorism_a.9.f: "Tordo'nun nerede olduğundan hiçbir şey kalmadı."
 terrorism_a.9.a: "Etkilenen topluluklar için iş yardımı"
 
 terrorism_a.10.t: "32 Virginia Tech'de Ölü"
 terrorism_a.10.d: "Bir tabanca, Virginia Polytechnic Enstitüsü'ndeki 32 öğrenci ve fakülteyi kendi hayatını almadan önce öldürdü. En ölümcül okul [ROOT.GetCountry.GetName] tarihinde çekim. Atıcı yasal olarak silahlarını, mevcut yasa altında onu ayırt etmesi gereken zihinsel sağlık kaygılarına rağmen satın aldı.\n\n Arka kontrol sisteminin başarısızlığı şimdi scrutiny altındadır."
 terrorism_a.10.f: "Silahı yasal olarak satın aldı."
 terrorism_a.10.a: "Silahlar arka plan kontrol prosedürleri hemen"
 
 terrorism_a.11.t: "82 Numara Aurora Tiyatrosu"
 terrorism_a.11.d: "Bir tabanca, Aurora'daki 16. Yüzyılda büyük bir filmin gece yarısı galası sırasında ateş açtı, Colorado 12 kişiyi öldürdü ve 70 kişiyi yaraladı. Saldırgan yarı otomatik tüfek, atışcı ve elguns ile silahlıydı - saldırıdan önceki haftalarda yasal olarak satın alındı.\n\n Colorado ve ülke şokta."
 terrorism_a.11.f: "Filmlerde bir gece. 12 kişi eve gitmedi."
 terrorism_a.11.a: "yansıma gerektiren bir trajedi"
 
 terrorism_a.12.t: "Gunman Wisconsin Sikh Temple'da 6 Öldür"
 terrorism_a.12.d: "Beyaz bir supremacist, Oak Creek'teki Wisconsin Tapınağı'nda yangın açtı, polis tarafından vurulmadan önce altı ibadeti öldürdü. Saldırıcı, neo-Nazi örgütlerine bağlantılarla ABD Ordusu'ydu.\n\n Kurbanlar dini ve etnik kökenleri nedeniyle hedef alındı. Saldırı, yerli extremizm, nefret suçu ve beyaz milliyetçi ağları izleme başarısızlığıyla ilgili tartışmalara yol açtı."
 terrorism_a.12.f: "Onlar dua etmeye geldiler. Onları kim oldukları için öldürmeye geldi."
 terrorism_a.12.a: "Bu nefret suçundan nefret ediyor - evcil extremizmi görmezden gelmeyeceğiz"
 
 terrorism_a.13.t: "Sandy Hook'ta Tragedy"
 terrorism_a.13.d: "Bir tabanca altı ve yedi yaş arasında 20 çocuğu öldürdü ve altı yetişkin personel, Newtown'daki Sandy Hook İlky Okulu'nda, Connecticut. Çocuklar bir saldırı tarzı tüfekle birden çok kez vuruldu.\n\n Yeterli kelimeler yoktur. [ROOT.GetCountry.GetName] yalamada."
 terrorism_a.13.f: "Yirmi çocuk. Altı yaşında."
 terrorism_a.13.a: "Ülke acıyor"
 
 terrorism_a.14.t: "Dunblane Katliamı"
 terrorism_a.14.d: "Bir tabanca İskoçya'daki Dunblane Primary School'a girdi ve beş ve altı yaşlarındaki on altı çocuğu öldürdü ve öğretmeni kendi hayatını almadan önce. [ROOT.GetCountry.GetName] tarihindeki en ölümcül kütle atıştır.\n\n Ulusal yanıt ezici. Hayatta kalanlar, ebeveynler ve halk özel elgun mülkiyet üzerinde toplam yasak için bir kampanya başlattı. Hükümet hareket etmek için muazzam baskı ile karşı karşıya kalacaktır."
 terrorism_a.14.f: "Sixteen çocuk. Beş yaşında. İskoçya unutmayacak."
 terrorism_a.14.a: "Bir şey değişmeli - ülke bunu talep ediyor"
 
 terrorism_a.15.t: "Yangtze Sels"
 terrorism_a.15.d: "Yangtze Nehri ve tributaries, alışılmadık derecede ağır yağışların aylar sonra felakete maruz kaldı. Sualtı, merkezi ve güney [ROOT.GetCountry.GetName] arasında 240 milyon insanı etkiledi - 14 il, 56 milyon dolarlık tarım arazisi ve binlerce yerleşim. 3000'den fazla insan öldü ve 14 milyon yerinden edildi.\n\n Devlet seferberliği büyük. Askeri, yüzlerce binlerce askeri sel rahatlamaya dağıtmıştır. Bu, son [ROOT.GetCountry.GetAdjective] tarihindeki en büyük doğal felakettir."
 terrorism_a.15.f: "Nehir, diklerin devam etmeye söz verdiği şeyi almaya karar verdi."
 terrorism_a.15.a: "Devletin tam gücü dağıtılacaktır"
 
 terrorism_a.16.t: "Daire Binaları Moskova'da Bombalandı"
 terrorism_a.16.d: "Moskova ve diğer Rus kentlerindeki apartman binalarında bir dizi bomba saldırısı, uyurken neredeyse 300 kişiyi öldürdü. Bombalamalar Chechen separatists'e atfedildi - kanıtlar bazı gözlemciler tarafından karşılanırsa.\n\n Saldırılar belirleyici bir askeri yanıt için muazzam bir halk baskısı yarattı. Chechnya'da yeni bir askeri kampanya şimdi ciddi bir düşünce altında. Teröristleri ezmeyi vaat eden siyasi rakam halkın onu takip etmeye hazır olduğunu bulacak."
 terrorism_a.16.f: "Korku güçlü bir siyasi araçtır. Bu yüzden kederdir."
 terrorism_a.16.a: "Bu tam bir askeri yanıt gerektirir"
 
