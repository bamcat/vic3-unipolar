# Cancer

cancer.1.t:0 "Kanser Için Merak"
cancer.1.d:0 "Yüzyıldan fazla bir süredir, kanser insanlığı mahvedmiştir - milyonlarca ve her tedaviyi iddia eden öngörülemeyen bir varlık. Hiçbir sınır tanımıyordu, hiçbir statüye saygı duymuyordu ve dokunduğu her ailede harap oldu. Ancak bugün, yıllarca süren araştırmalardan sonra, klinik çalışmalar ve uluslararası işbirliği, bilim insanları imkansız olanı yaptı: evrensel, hedefli bir tedavi geliştirdi. Bu atılım terapisi, sağlıklı dokuya zarar vermeden malign hücreleri tespit eder ve yok eder, sadece mümkün değil, garantilidir."
cancer.1.a:0 "Bütün insanlık için bir zafer."
cancer_eradication_prestige:0 "Perioddikated Kanser"

# 2004 Indian Ocean earthquake and tsunami

indian_ocean_tsunami.1.t: "Deprem Hint Okyanusu Grevleri"
indian_ocean_tsunami.1.d: "Büyük bir deniz depremi, Güney ve Güneydoğu Asya'daki yıkıcı bir tsunamiyi tetikledi. Hasar daha önce görülmemiştir ve kurtarma yıllar alacaktır."
indian_ocean_tsunami.1.a: "Hemen yeniden inşa etmeye başlamalıyız."
indian_ocean_tsunami.1.f: "Kayıtta en kötü felaketlerden birinde, yıkıcı bir deprem ve tsunami kıyı bölgelerimizi yok etti"

je_indian_ocean_tsunami: "Tsunami Recovery"
je_indian_ocean_tsunami_reason: "yıkıcı bir tsunami, kıyı altyapınıza zarar verdi ve ülkeyi sardı. Yeniden inşa çabaları kurtarma ve istikrar için önemlidir."

tsunami_recovery_success_tt: "Başarılı bir şekilde ulusal kurtarma başlattınız."

tsunami_disaster_struck: "Ülke çapında Tsunami Hasarı"
tsunami_local_destruction: "Yerel Tsunami Devastation"
tsunami_reconstruction_complete: "Yeniden inşa Tamamlandı"
  
indian_ocean_tsunami_recovery_title: "Tsunami Recovery Efforts"
indian_ocean_tsunami_recovery_desc: "Ülkeniz Hint Okyanusu Tsunami tarafından vuruldu. Nüfusunuzu ve altyapınızı stabilize etmek için yardım ve kurtarma."

tsunami_aid_title: "İnsani Yardım Vermek"
tsunami_aid_desc: "refah reformları veya etkilenen alanları yeniden inşa etmeye yardımcı olmak için tüm finansal yardımlar."

tsunami_disaster_struck: "Ülke çapında Tsunami Hasarı"
tsunami_local_destruction: "Yerel Tsunami Devastation"
tsunami_reconstruction_complete: "Başarılı Yeniden İnşa Edildi"
tsunami_recovery_success_tt: "Ülke Aralık 2005 tarihinden önce sosyal refah kanununu yürürlüğe koydu."
 
indian_ocean_tsunami.2.t: "Tsunami Devastates Güney Asya"
indian_ocean_tsunami.2.d: "Büyük bir deprem ve tsunami Hint Okyanusunu vurdu. İnsani felaketler. Dünya izliyor – hareket edecek miyiz?"
indian_ocean_tsunami.2.f: "Entire kıyıları yok oldu. Yardım acilen gereklidir."
indian_ocean_tsunami.2.a: "Acil yardım gönderin."
indian_ocean_tsunami.2.b: "Kendi önceliklerimiz var."

indian_ocean_tsunami.3.t: "Yardım Kabul Edildi"
indian_ocean_tsunami.3.d: "Yabancı bir ulus insani yardım gönderdi. Halkınız minnettardır."
indian_ocean_tsunami.3.a: "Küresel dayanışma için Tanrıya şükürler olsun."

tsunami_foreign_aid_sent: "Sent Foreign Aid to Tsunami Victims"
countries_available_to_request_aid_from:0 "Ülkeler yardım talep etmek için kullanılabilir"
has_sent_iosa:0 "Zaten yardım gönderdi"

je_request_iosa_aid_button:0 "Uluslararası Yardım İste"
je_request_iosa_aid_button_desc:0 "Yıkıcı deprem ve tsunamiden kurtulmaya yardımcı olmak için uluslararası topluluğun yardımı talep edin."

tsunami_disaster_struck: "2004 Hint Okyanusu Deprem & Tsunami tarafından Etkilendi"

# Iraq disarmament Crisis

je_iraq_disarmament_crisis: "Irak Silahsız Krizi"
je_iraq_disarmament_crisis_reason: "Gulf War'dan sonra, Irak, Birleşmiş Milletler Güvenlik Konseyi Kararı 687 tarafından kitlesel imha programlarının silahlarını parçalamak için kuruldu. Uluslararası topluluk, BMCOM ve IAEA aracılığıyla, uyum doğrulamayı istedi, ancak Irak'ın gözetimi ve denetimleri üzerindeki anlaşmazlıkların protrat bir standoff yarattı.\n\n Kriz, Irak'ın silahsızlanma rejimleriyle tamamen işbirliği yapmayı reddetmesi olarak çatışmayı ortadan kaldırmayı tehdit ediyor."
iraq_disarmament_resolved_tt: "Irak Silahsız Krizi çözüldü."

je_us_iraq_disarmament: "Irak Silahsız Krizi"
je_us_iraq_disarmament_reason: "Amerika Birleşik Devletleri, Irak'ın Birleşmiş Milletler Güvenlik Konseyi Kararına uyum sağlamak için kendini taahhüt etti. Irak'ı tekrarladı ve IAEA denetimleri, Körfez bölgesinde küresel güvenlik ve yakıt gerilimlerini zayıflatır.\n\n Diplomatik çabalar devam eder, ancak askeri seçenekler muayene başarısız olursa masada kalır."

iraq_events.10.t: "Irak Kararlarını Reddetiyor"
iraq_events.10.d: "Birleşmiş Milletler Özel Komisyonu (UNSCOM) için cesur bir meydan okumada Irak, kendi uçaklarını ülkeye girmek için denetimciler için önerilerini reddetti. Bağdat, erişim ve ulaşım üzerindeki tam kontrol üzerinde ısrar ediyor ve silahsızlanma taahhüdü hakkında taze endişeler getiriyor."
iraq_events.10.a: "Onların koşullarını geri al - Irak'ın egemenliği ilk gelir."
iraq_events.10.b: "Uçuşlara izin verin - işbirliği gerginlikleri hafifletebilir."

us_events.10.t: "Irak Blokları"
us_events.10.d: "Irak, BMCOM denetçilerinin kendi uçaklarını ülkeye uçmalarına izin vermeyi reddetti, denetim çabalarını daha da engelledi. Bu hareket, BM'ye ve silahsızlanma çabaları için bir geri dönüş olarak görülüyor."
us_events.10.a: "Bu cevapsız gidemez."
us_events.10.b: "escalasyondan kaçının - şimdilik."

################# COUNTRY-SPECIFIC ##############

# united states

rodney.1.t:0 "Polis Rodney King'i yendi"
rodney.1.d:0 "Silahsız bir Afrikalı-Amerikalı, Rodney King, Los Angeles Polis Departmanının görevlileri tarafından yüksek hızlı bir kovalamadan şiddetle dövüldü. Bir kişi saldırıyı filme düşürdü, polis zalimliği açığa çıkardı ve ulusal öfkeyi tetikledi."
rodney.1.f:0 "Onu kuşattılar ve onu yaralarla dövdüler. O geri savaşmıyordu. Bu dehşet vericiydi - ondan bir örnek yapmak istediler."

rodney.1.a:0 "Sıcak bir yaz olacak."

rodney.2.t:0 "Los Angeles'ta Riots"
rodney.2.d:0 "Polis memurlarının uyanması, Rodney King'in dövülmesinde aşırı güç kullanmakla suçlanıyorlar, insanların büyük yaraları sokaklara götürüldü, şehre 1 milyar dolar zarar verdi"
los_angeles_riots:0 "Rodney King Riots"
rodney.2.a:0 "Kendi başlarına çökecekler."
rodney.2.b:0 "Ulusal Muhafızlarda gönderin!"

north_hollywood.1.t: "Kuzey Hollywood'da ateş"
north_hollywood.1.d: "Vücut zırhında iki soyguncu ve saldırı tüfeği taşıdı. Outgunned memurları, etkili bir şekilde yanıt vermek için yerel bir silah mağazasından silah ödünç almak zorunda kaldılar."
north_hollywood.1.f: "Los Angeles polisi ile uzun bir çekim yapan iki ağır silahlı banka soyguncusu, birkaç memur ve sivil yaralandı. Olay ulusu şok etti ve polis hazırlıklılığı hakkında sorular yükseltti."
north_hollywood.1.a: "Yasal bir tarihte soğuk bir gün."

north_hollywood_police_response:0 "Artan Hukuk Uygulama Destek Desteği"

wtc_bombing.1.t: "1993 World Trade Center Bombing"
wtc_bombing.1.d: "Güçlü bir kamyon bombası, New York City'deki Dünya Ticaret Merkezi'nin altında patladı, altı kişiyi öldürdü ve binlerce kişiyi yaraladı. Saldırı ulusu şok etti, kendi sınırları içinde terörizme açık güvenlikler ortaya çıkardı."
wtc_bombing.1.a: "Yerli güvenlik önlemleri artırın."
wtc_bombing.1.b: "Sakin ol ve aşırı tepkiden kaçının."
heightened_security_measures: "Artan Güvenlik Önlemleri"
heightened_security_measures_desc: "Terörist bir saldırıya yanıt olarak, hükümet daha güçlü iç güvenlik politikaları ve kanun uygulama koordinasyonu uyguladı."
oklahoma_city_aftermath: "Oklahoma City Bombing Aftermath"
oklahoma_city_aftermath_desc: "Alfred P. Murrah Federal Binası'nın yıkıcı bombardımanı ulus salak bıraktı. Güvenlik endişeleri ve siyasi repercussiyonlar hükümet kendi yerli vigilasyonunu sıkılaştırıyor."
 
usa_events.1.t: "Cumhuriyetçi İlk Sonuçlar"
usa_events.1.d: "Tartışmalar ve kampanyalarla dolu ısıtmalı bir birincil sezondan sonra, Cumhuriyetçi Parti yeni standart taşımacısını seçti. George W. Bush zafer kazandı, Petite Bourgeoisie'nin reinlerini aldı ve parti için cesur bir yeni bölüm vaat etti."
usa_events.1.a: "Adaylık onun."

usa_events.2.t: "Barack Obama'nın Yokluğu"
usa_events.2.d: "Tartışmalar ve kampanyalarla dolu ısıtmalı bir birincil sezondan sonra, Demokratik Parti yeni standart taşıyıcısını seçti. Barack Hüseyin Obama zafer kazandı, Petite Bourgeoisie'nin geri kalanını aldı ve parti için cesur bir yeni bölüm vaat etti."
usa_events.2.a: "Adaylık onun."

usa_events.3.t: "Donald Trump"
usa_events.3.d: "Tartışmalar ve kampanyalarla dolu ısıtmalı bir birincil sezondan sonra, Cumhuriyetçi Parti yeni standart taşımacısını seçti. Donald John Trump, özellikle tartışmalı bir rakam, galip geldi, Profesyonellerin reinlerini aldı ve parti için cesur bir yeni bölüm vaat etti."
usa_events.3.a: "Adaylık onun."

# Storm of the Century
american_disasters.1.t: "1993 Yüzyılın Fırtınası"
american_disasters.1.d: "Büyük bir cyclonik fırtına doğu Amerika Birleşik Devletleri'nde süpürüldü, rekor kar yağışı, kasırga kuvveti rüzgarları getirdi ve kıyılar boyunca şiddetli selâm. Milyonlarca kişi iktidar olmadan bırakılır ve ölüm günlük yükselecektir."
american_disasters.1.a: "Kışın gazabına dayanmalıyız."

# Great Flood of 1993
american_disasters.2.t: "Büyük Taş!"
american_disasters.2.d: "Ağır yağmur ve doymamış topraklar Mississippi ve Missouri nehirlerinin bankalarının çok ötesinde, Amerikan Midwest'in geniş alanlarını altüst etmelerine neden oldu. Entire kasabaları su altındadır ve zararlar daha önce görülmemiştir."
american_disasters.2.a: "Kalp için bir felaket."

great_flood_of_1993: "Great Sel of 1993"
storm_of_the_century: "1993 Yüzyılın Fırtınası"

# Columbine

columbine.1.t: "Colorado High School Katliamı"
columbine.1.d: "İki ağır silahlı öğrenci, Colorado'daki Columbine High School'da ölümcül bir saldırı gerçekleştirdi, kendi hayatlarını almadan önce birçok kişiyi öldürüyordu. Olay ülke çapında keder ve silah kontrolü, okul güvenliği ve kültürel etkiler üzerine tartışmalar başlattı."
columbine.1.a: "Düşünceler ve dualar"
columbine.1.b: "Ülkemizdeki okullarda güvenliği artırmalıyız."

national_mourning_school_shooting: "Mourning School Shooting"
school_security_measures: "Okul Güvenlik Önlemleri"

better_school_security: "Daha İyi Okul Güvenliği"
thoughts_and_prayers: "Düşünceler ve dualar"
recent_mass_shooting: "Son zamanlarda Kitlesel Atışı"

# September 11 Attacks 

ground_zero: "Ground Zero"
  
je_war_on_terror: "Terörle Savaş"
je_war_on_terror_reason: "11 Eylül 2001 ABD'deki terör saldırıları terörizme karşı sürekli bir küresel kampanyanın başlangıcını işaretledi.\n\n Saldırıların ardından, Amerika Birleşik Devletleri, "teröre karşı savaş" olarak adlandırdığı şeyi başlattı - birleşik askeri operasyonlar, istihbarat çabaları ve iç güvenlik önlemleri. Sonuçlar dış politika, sivil özgürlük tartışmalarını ve uluslararası ittifakları yeniden şekillendirir.\n\n"

usa_wot.1.t: "Amerika Under Attack"
usa_wot.1.d: "Terör saldırıları, New York ve Washington'u, D.C.'yi güçlendirdi, Dünya Ticaret Merkezi kulelerini yok etti ve Pentagon'a ciddi şekilde zarar verdi. Binlerce kişi öldürüldü veya yaralandı. Ulus şokta ve bir yanıt talep etmektedir."
usa_wot.1.a: "Infamy'de yaşayacak bir gün."

usa_wot.2.t: "Teröre Karşı Bir Savaş"
usa_wot.2.d: "Saldırıların ardından Başkan, planlayanlara karşı küresel bir kampanya ilan etti veya terörist örgütlere liman etti. Bu bildirim, yurtdışındaki askeri taahhütlerde güvenlik önlemleri almaya yol açacaktır."
usa_wot.2.a: "Onları adalete getireceğiz."

global_wot.1.t: "U.S Saldırıladı; Binlerce Ölü Ölü"
global_wot.1.d: "Amerika Birleşik Devletleri yıkıcı terör saldırıları geçirdi. Dünya liderleri karşılıklılık teklif ettiler ve birçok eyalet güvenlik düzenlemelerini yeniden ele alıyor."
global_wot.1.a: "Bütün insanlık için bir trajedi."

global_wot.2.t: "Amerika Birleşik Devletleri Terörle Mücadele Savaşı"
global_wot.2.d: "11 Eylül saldırılarından sonra, Amerika Birleşik Devletleri, terör gruplarına ve destekçilerine karşı bir kampanyaya katılmak için uluslararası topluluğuna çağrı yaptı."
global_wot.2.a: "Uluslararası düzen değişiyor."

global_wot.3.t: "U.S Invokes Madde 5"
global_wot.3.d: "11 Eylül saldırıları ve Afganistan'daki sonraki ABD askeri kampanyasından sonra, NATO charter'in 5. maddesi tarihte ilk kez çağrılmıştır. Üye bir devlet olarak, savaş çabasına katılmak için çağrılıyız."
global_wot.3.a: "Müttefiklerimizle duruyoruz."

usa_wot.3.t: "Anthrax Amerika'yı Terörize Ediyor"
usa_wot.3.d: "11 Eylül saldırıları sonrasında, ölümcül antrax sporları içeren anonim mektuplar haber organizasyonlarına ve ABD Senatörlerine postalandı. Saldırıların ülke genelinde korkuları var, büyük soruşturmalar yolladı ve biyolojik savaş hakkında daha fazla endişelendi."
usa_wot.3.a: "Adalet teslim edilecektir. Ve hızlı olacak."
usa_wot.3.b: "Tekrar değil!"
  
je_hunt_for_bin_laden: "Osama Bin Laden için Hunt"
je_hunt_for_bin_laden_reason: "11 Eylül 2001 saldırılarının ardından Amerika Birleşik Devletleri, El Kaide lideri Osama bin Laden için geniş ve küresel bir arama başlattı. Bu görev, askeri operasyonları, istihbarat toplantısını ve diplomatik baskıyı içeren sınırları aşacaktır.\n\n"
intensified_intelligence_operations: "Osama Bin Laden için Hunt"

hunt_bin_laden_progress_bar: "Hunt Progress"
hunt_bin_laden_progress_bar_desc: "Search Progress"
osama_bar_completed: "Osama Bin Laden bulundu"

usa_wot.10.t: "Osama Bin Laden için Hunt"
usa_wot.10.d: "Terör altındaki Savaşla, ABD istihbarat ajansları ve özel kuvvetler, Osama bin Laden için dünya çapında bir arama başlattı. Kararlar şimdi işlemin yoğunluğunu ve kapsamını belirleyecektir."
usa_wot.10.a: "Tüm gerekli kaynakları birleştirin."
usa_wot.10.b: "Diğer önceliklere odaklanın."

usa_wot.12.t: "Bin Laden Yakalandı"
usa_wot.12.d: "Yıllarca süren arayıştan sonra, Osama bin Laden ve nötrize edilmiştir. ABD, Savaşta Terörle Mücadelede önemli bir zafer kutluyor."
usa_wot.12.a: "Adalet servis edildi."

usa_wot.11.t: "ABD Bin Laden Öldürüyor"
usa_wot.11.d: "Aylar süren istihbarat toplantısı ve hazırlığından sonra, ABD Donanması SEALs, Abbottabad, Pakistan'da bir bileşik üzerinde bir baskı başlattı. Amaç: Osama Bin Laden'ı yakalamak veya öldürmek. Dünya sonucu bekliyor."

usa_wot.11.a: "Çok sonuna kadar."

usa_wot.11.success_tt: "Osama Bin Laden Pakistan'da öldürüldü. Terör Savaşı yeni bir aşamaya girer."

usa_wot.20.t: "Zeka"
usa_wot.20.d: "CIA operatifleri, yakalanan militanlardan değerli istihbaratı ortaya çıkarır, Bin Laden'in nerede olduğu mümkün."
usa_wot.20.a: "Mükemmel, ileri itin."
usa_wot.20.a.tt: "Bin Laden'i bulmaya yönelik ilerleme arttı."

usa_wot.21.t: "Bin Laden Videoları"
usa_wot.21.d: "Bin Laden ile bağlantılı olduğuna dair şüpheli bir takip aylarca ölü bir son olarak ortaya çıktı. Kaynaklar boşa harcandı. Daha da kötüsü, orta Doğu teröristi Amerikan halkı için bir video yayınladı."
usa_wot.21.a: "Frusting setback."
usa_wot.21.a.tt: "Bin Laden'i bulmaya yönelik ilerleme azaldı."

usa_wot.22.t: "Bölgesel İşbirliği Bölgesel İşbirliği"
usa_wot.22.d: "Pakistan ve bölgesel müttefikleri, Bin Laden için avlanmayı hızlandırdı."
usa_wot.22.a: "Bu bize çok yardımcı olacaktır."
usa_wot.22.a.tt: "Bin Laden'i bulmaya yönelik ilerleme önemli ölçüde arttı."
 
accuse_iraq_wmds_button: "Irak, WMDs"
accuse_iraq_wmds_button_desc: "Irak'ı gizlice geliştirmek veya kitlesel yıkım silahlarını limanlaştırmak. Bu gerginlikler yükselecek ve askeri eylemi haklı çıkarabilir."

end_war_on_terror_button: "Teröre Karşı Savaş"
end_war_on_terror_button_desc: "Terörle Mücadele Savaşı resmi olarak sona erdi, uluslararası operasyonları hızlandırdı. Bu, evde ve yurt dışında dinlenme sonuçları bırakacaktır."

usa_wot.30.t: "WMDs'leri Limanlaştırmak"
usa_wot.30.d: "Amerika Birleşik Devletleri bizi gizlice geliştirmek ve kitlesel imha silahları limanlaştırmakla suçladı. Bu, gerilimlerde önemli bir düşüş anlamına gelir ve çatışmayı daha da yaklaştırabilir."
usa_wot.30.a: "Scary"
  
osama_extradited: "Osama Bin Laden ekstra olmuştur"
war_on_terror_stopped_tt: "Terörle Savaş sona erdi"
# War on TERROR

usa_wot.5.t: "Bin Laden In Custody"
usa_wot.5.d: "Şaşırtıcı bir diplomatik atılımda, Afganistan Amerika Birleşik Devletleri'ne Ekstradite Osama bin Laden'ı kabul etti. Bu taviz, Savaşın ilk aşamalarında Terör üzerine önemli bir zafer anlamına gelir."
usa_wot.5.a: "Bu büyük bir diplomatik kazanç."

usa_wot.6.t: "Afganistan Ekstradite Bin Laden'ı Reddetiyor"
usa_wot.6.d: "Afgan hükümeti Osama bin Laden'ı ABD yetkililerine teslim etmeyi reddetti. Gerçler Washington’un bir sonraki hareketini tartıştığı gibi yükselmektedir."
usa_wot.6.a: "Ya teröristlerle ya da onlara karşısınız."
usa_wot.6.b: "Herhangi bir brash eylemi almayalım, şimdi."

je_request_bin_laden_extradition_button: "Dilek Bin Laden'in Ekstradition"
je_request_bin_laden_extradition_button_desc: "Formal olarak Afganistan'ın ABD'ye duruşma için ekstra Osama bin Laden'i talep ediyor."

bin_laden_extradition_accepted_country: "Bin Laden Ekstradition - Kabul Edildi"
bin_laden_extradition_accepted_country_desc: "Afganistan, Osama bin Laden'i dışlamaya ve askeri hazırlığı arttırmaya karar verdi."
  
bin_laden_extradition_accepted_ig_armed_forces: "Bin Laden Ekstradition - Kabul Edildi"
bin_laden_extradition_accepted_ig_armed_forces_desc: "Silahlı Kuvvetler, Bin Laden'in ekstrazmasını sağlamak için hükümetin diplomatik başarısından memnun."

bin_laden_extradition_rejected_country: "Bin Laden Ekstradition - Rejected"
bin_laden_extradition_rejected_country_desc: "Afganistan, Osama bin Laden'i dışlamayı reddetti, askeri hazırlıklılığımızı ve kaynaklarını incitti."
  
bin_laden_extradition_rejected_ig_armed_forces: "Özgürlük"
bin_laden_extradition_rejected_ig_armed_forces_desc: "Silahlı Kuvvetler hükümetin Bin Laden'in ekstrazmasını sağlamak için öfkelenir."

bin_laden_extradition_rejected_ig_armed_forces_2: "Afganistan'ı işgal etmedi"
bin_laden_extradition_rejected_ig_armed_forces_2_desc: "Silahlı Kuvvetler hükümetin Bin Laden'in ekstrazmasını sağlamak için öfkelenir."

operation_enduring_freedom: "Enduring Freedom"


limited_response: "Sınırlı Yanıt"
heightened_security_measures: "Yüksek Güvenlik Önlemleri"

afghanistan.1.t: "U.S. Bin Laden'in Ekstralaştırılmasını talep ediyor"
afghanistan.1.d: "Amerika Birleşik Devletleri, 11 Eylül saldırılarına hakim olan Osama bin Laden üzerinden Afganistan elini resmen talep etti. Bu talebi kabul etmek gerginlikleri hafifletebilir - ancak reddedilme ciddi sonuçlar doğurabilir."
afghanistan.1.a: "Talep ile birlikte."
afghanistan.1.b: "Refuse."

# 2003 Invasion of Iraq

iraq_war.1.t: "Irak'ta UN Convenes"
iraq_war.1.d: "Amerika Birleşik Devletleri, Irak'ı kitlesel yıkım silahlarını limanlaştırmakla suçladı. Birleşmiş Milletler sorunu tartışmak ve uluslararası yanıtlar toplamak için acil bir oturum hazırladı."
iraq_war.1.a: "Tartışma başlar."

iraq_war.2.t: "Irak'ta UN Debate"
iraq_war.2.d: "Uluslararası topluluk, Irak'a karşı ABD suçlamalarına nasıl cevap vereceğini tartışır."
iraq_war.2.a: "Amerika Birleşik Devletleri'ne destek."
iraq_war.2.b: "Irak ile Side."
iraq_war.2.c: "Kalan Neutral."

iraq_war.3.t: "NATO ABD'ye Yanıt"
iraq_war.3.d: "NATO müttefikleri olarak, ABD'nin Irak'ın iddia edilen WMD programına destek olup olmadığına karar verdik."
iraq_war.3.a: "ABD ile karşı karşıya kalacağız."
iraq_war.3.b: "Bu eylemi destekleyemeyiz."

iraq_war.4.t: "Irak Accusations'a yanıt veriyor"
iraq_war.4.d: "Irak, WMD'leri limanlamakla suçlanıyor. Hükümet yurtdışından baskı kaldırmaya cevap vermelidir."
iraq_war.4.a: "Her şeyi özle ve izolasyona katlayın."
iraq_war.4.b: "Batıyı Condemn ve propagandayı seferber edin."
  
iraq_war.5.t: "U.S. Pleads to the UN"
iraq_war.5.d: "Amerika Birleşik Devletleri, ABD'den önce davasını sundu, Irak'a karşı askeri eylem için destek çağrısında bulundu. Dünya liderleri artık Washington'un savunmasını ya da müdahaleye direnmeye karar vermelidir."
iraq_war.5.b: "UN öldü - yalnız hareket etmeliyiz"
iraq_war_us_lobby_tt: "ABD, diplomatik ilişkileri ayarlamak için destek için anahtar yetkileri savunuyor."
iraq_war_unfail_tt: "Orta doğuda ölmek için sadece zamanında doğdu."

iraq_war.6.t: "ABD Savaşa Karar Verdi"
iraq_war.6.d: "Birleşmiş Milletler bölünme tarafından para cezasına çarptırıldı, Washington şu anda bir kararla karşı karşıyadır: Irak'ı askeri olarak hareket etmek ya da dünyadan önce zayıf görünmek için."
iraq_war.6.a: "Irak'ın Invasion'ı başlatın"
iraq_war.6.b: "Step back and avoid war"
iraq_war_backdown_tt: "ABD müdahaleden geri çekilir, uluslararası prestij kaybeder."
2003_invasion_of_iraq: "2003 Irak'ın invasion of Irak"
iraq_condemned: "Irak Condemed"

