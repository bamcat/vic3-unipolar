 ip_peacetime.6.a:0 "Diplomatik çerçeveyi kabul edin."
 ip_peacetime.6.b:0 "Daha az koşul talep edin."

 ip_peacetime.10.t:0 "Calm Breaks"
 ip_peacetime.10.d:0 "Saldırıların, protestoların, kapanışların, siyasi kesintinin birikmiş baskısı ve başarısız görüşmelerin durumu eşiğine getirdi."
