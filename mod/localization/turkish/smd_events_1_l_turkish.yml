russia_constitution_crisis_resolved_mod: "Kriz Averted"

je_russian_constitutional_crisis: "Rus Anayasa Krizi"
je_russian_constitutional_crisis_reason: "1993 yılı Rusya'yı siyasi çöküşün eşiğinde getirdi.\n\n Başkan Boris Yeltsin, yönetim yetkisini sağlamlaştırmak için, Rus parlamentosunun dağılmasını emretti, reformları engelleme ve demokratikleşmeye direnme üyelerini suçladı. Parlamento, sırayla, Yeltsin'in kararnamesini reddettiğini ve destekçilerini gerekçesine vurmasını ilan etti.\n\n Haftalar boyunca, rakip gruplar olarak gerilimler askeri, güvenlik güçleri ve genel halkın farklı elementlerini geri kazanmaktadır. Hükümet, Rusya Federasyonu'nun kaderini belirlemek için yönetici veya yasama şubesine sadakatle kırılır.\n\n Bu çatışma politik bir tartışmadan daha fazlasıdır - Rusya'nın Sovyet sonrası dönemdeki yönetiminin doğası üzerinde bir savaştır. Kriz kontrolden çıkmalı, Moskova'nın kalbindeki sivil şiddet sadece mümkün değil, kaçınılmaz."

je_russia_wild_nineties: "Vahşi Dokuzlar"
je_russia_wild_nineties_reason: "“Yaşlı dokuzlar” (Rus:  the ,, Likhiye Devyanostyye) 1990'larda Sovyet Birliği ve Rusya Federasyonu'nun oluşumundan sonra geçiş dönemi karakterize eden olumsuz bir uzlaşma ile bir dönemdir. \n\n Rusya'nın Sovyetler Birliği'nden kapitalist bir demokrasiye geçiş, istikrarsızlık, yolsuzluk ve şiddet dalgası açığa çıkardı. Sovyet sonrası yıllar ekonomik çöküşle işaretlendi, oligarşilerin yükselişi, siyasi gösteriler ve organize suçta bir artış.\n\n Parlamentodan özelleştirme skandallarına kadar her ay yeni yükselişler getiriyor gibi görünüyor. Ülke reform ve kaos arasındaki teeterler ve insanların sabrı ince giyer."

rus_events.0.t: "1993 Rus Anayasa Krizi Başlıyor"
rus_events.0.d: "Başkan Boris Yeltsin, Rusya parlamentosunu çözmeyi, demokratik reformları engellemeyi ve Federasyonun istikrarını tehdit etmeyi reddetti. Parlamento, askeri ve vatandaşlara karşı direnmeyi çağıran hareketi ilan etti.\n\nMoscow, rakip gruplar olarak çatışmayı destekliyor. Rusya'nın kırılgan demokrasisinin kaderi şimdi dengede asılı."
rus_events.0.a: "Ulus nefesini tutar."

1993_russian_crisis_tt: "Kriz sona erdi"
rus_events.1.t: "Anayasa Krizi"
rus_events.1.d: "Başkan Yeltsin, parlamentonun dağılmasını duyurdu, ancak kanun koyucular Beyaz Saray'da kendilerini kınamayı reddederler. Gerilmeler hızla artıyor."
rus_events.1.a: "Başkan ile Side"
rus_events.1.a.tt: "Askeri yöneticiyi geri getirecek."
rus_events.1.b: "Parlamentoyu Destekleyin"
rus_events.1.b.tt: "legislature'nin otoritesini savunacağız."

rus_events.2.t: "Askeri Başkan"
rus_events.2.d: "Silahlı kuvvetler sokakların kontrolünü ele geçirdi, parlamento binasını bombaladı ve Yeltsin'in otoritesini güvence altına aldı."
rus_events.2.a: "Kriz bitti."

rus_events.3.t: "Parlamento Zaferi"
rus_events.3.d: "Yönetimden baskıya rağmen, parlamento popüler desteği topladı ve gücünü korudu."
rus_events.3.a: "Kriz bitti."

rus_events.4.t: "Beyaz Saray'ın Fırtınası"
rus_events.4.d: "Moskova kaos içindedir. Pro-presidential birlikleri, Rus Beyaz Saray'ı, parlamentonun liderliğini kuşatmış ve tanklar ve küçük silahlarla ateş açtı. Bina olarak üst katlardan gelen duman billows birblaze. Son direniş askeri güçlerin kontrolü ele alıyor, standoff'un sonunu işaret ediyor - ancak yaşam maliyeti ve ülkenin siyasi masumiyeti."
rus_events.4.a: "Sipariş restore edilir - şimdilik."

# chechnya

je_first_chechen_war_reason: "İlk Chechen Savaşı, 1994 yılının sonlarında Rusya Federasyonu, Ichkeria'nın ayrılıkçı Çeçen Cumhuriyeti'ni yeniden kontrol etmeye çalıştı.\n\n Çatışma, Kuzey Kafkasya'daki Grozny ve yaygın devastation'taki şiddetli kentsel mücadele ile yaşam ve kaynaklarda pahalıya mal olacaktı.\n\n Savaşı net zafer olmadan sonlandırmak hükümet güvenilirliğine zarar verebilir, ancak savaş risklerini uzun süre devam ettirebilir."
je_first_chechen_war: "Chechen War"
chechen_war_resolved: "Chechen War Re çözülmedi"

chechen_events.1.t: "Çeçenya Savaşı"
chechen_events.1.d: "Rus kuvvetleri, Chechnya'ya federal kontrolü geri yüklemek için girdi, hızlı bir operasyon olması bekleniyor. Ancak, dağ arazisi ve yerel direniş bunu uzun bir çatışmaya dönüştürebilir."
chechen_events.1.a: "Siparişi geri getireceğiz."

chechen_events.2.t: "Grozny"
chechen_events.2.d: "Grozny Savaşı başladı, Chechen başkentine girmeye çalışan Rus güçleri ile. Savaş yoğun, her iki tarafta ağır kayıplarla."
chechen_events.2.a: "Push forward, maliyeti önemli değil."

chechen_events.3.t: "Chechnya'da Barış Konuşmaları"
chechen_events.3.d: "Savaş aylar sonra, savaş aşınması her iki tarafta da büyüdü. Bir ateşkes önerisi masaya yerleştirildi, kan dökmeye son verdi."
chechen_events.3.a: "Barışı kabul et ve güçleri geri al."
chechen_events.3.b: "Zafere kadar savaşa devam edin."

# haiti

uphold_democracy: "Operasyon Uphold Demokrasi"

haiti_events.1.t: "Operasyon Uphold Demokrasi"
haiti_events.1.d: "Eylül 1994'te Amerika Birleşik Devletleri, demokratik olarak seçilmiş Başkan Jean-Bertrand Aristide'yi restore etmek için Haiti'de bir askeri müdahale başlattı. ABD güçleri, uluslararası müttefikler tarafından desteklenen, güvenli anahtar alanlar, Aristide'nin geri dönüşü için yol açtı."
haiti_events.1.a: "Demokrasiyi restore etmek için iş gücü."
haiti_events.1.b: "Yabancı birlikleri hazırlayacağız."

haiti_events.2.t: "Yabancı Troops geliyor"
haiti_events.2.d: "Amerikan güçleri Haiti'ye indi, stratejik konumların kontrolünü ele geçirdi. Müdahale demokratik yönetimi geri getirmek için bir yol olarak haklı çıkar, ancak egemenlik ve yabancı etkiler hakkında sorular ortaya koyar."
haiti_events.2.a: "Kan dökmekten kaçınmak için işbirliği yapmalıyız."

je_haiti_political_crisis: "Haiti Siyasi Kriz"
je_haiti_political_crisis_reason: "1990 yılında Başkan Jean-Bertr ve Aristide'nin demokratik seçimlerini takiben Haiti kısa bir iyimserlik anı yaşadı. Bununla birlikte, kırılgan istikrar Eylül 1991'de bir askeri darbe, ülkeyi siyasi kaosa sokmak için parçalandı.\n\n Askeri rejim uluslararası mahkumiyetle karşı karşıya kaldı, insan hakları ihlalleri ve siyasi baskı yaygınlaştı. Birleşmiş Milletler ve Amerikan Örgütü tarafından uygulanan ekonomik yaptırımlar, Haiti’nin zaten mücadele ekonomisini ciddi şekilde etkiledi.\n\n 1992 ve 1993 yılları arasında, askeri junta ve Aristide’nin destekçileri arasındaki görüşmeler, siyasi muhaliflere ve genel nüfusuna karşı şiddet ortaya çıktı. Haiti'deki Birleşmiş Milletler Misyonu (UNMIH) tarafından demokratik yönetişim engellendi.\n\n 1994 yılına kadar, uluslararası topluluğun baskısını, özellikle de ABD, doğrudan müdahale için sahneyi belirledi. Eylül 1994'te ABD güçleri tarafından yönetilen Demokrasi Operasyonu, Aristide'yi iktidara geri yüklemek ve junta'nun kuralına son vermek amaçlanmıştır."

