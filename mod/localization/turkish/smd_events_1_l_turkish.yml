 ip_peacetime.10.a:0 "Denge için hazırlanın."
 ip_peacetime.10.b:0 "Son bir acil müdahale yapın."

 ip_peacetime.20.t:0 "Bir Dayanıklı Calm"
 ip_peacetime.20.d:0 "Güvenlik koordinasyonunun nadir bir kombinasyonu, siyasi kısıtlamalar ve diplomatik katılım durumu stabilize etti."
 ip_peacetime.20.f:0 "Son bir barış değil, ama savaşın yokluğundan daha fazlası."
 ip_peacetime.20.a:0 "kırılgan bir başarı."
 
 oslo_accords.1.t:0 "Oslo I Anlaşması"
 oslo_accords.1.d:0 "İsrail negotiators Filistin liderliği ile önerilen ilkelere ulaştı. Öneri, Filistinli kendi hükümet için karşılıklı tanıma ve geçici bir çerçeve kuracaktır."
 oslo_accords.1.f:0 "Anlaşma sınırları, Kudüs, yerleşimleri, mülteciler veya nihai egemenliği yerine getirmez. Bununla birlikte, bir sahneli siyasi süreç sunar."
 oslo_accords.1.a:0 "İlkelerin Değerlendirilmesi."
 oslo_accords.1.b:0 "Anlaşmayı geciktir."

 oslo_accords.10.t:0 "İsrail, Oslo'yu I Anlaşmasını Yasakladı"
 oslo_accords.10.d:0 "İsrail, karşılıklı tanıma ve geçici bir Filistinli kendi hükümet çerçevesi kurma ilkelerinin bir açıklamasını önerdi."
 oslo_accords.10.f:0 "Kabul, İsrail'e yeni bir siyasi süreç başlayacak ve resmi bir kesintiye son verecekti, ancak birçok son devlet sorunu çözülmemiş olacaktı."
 oslo_accords.10.a:0 "İlkelerin Dekrasyonunu Kabul edin."
 oslo_accords.10.b:0 "Öneriyi reject."

 oslo_accords.11.t:0 "Filistin Oslo Kabul Ediyor"
 oslo_accords.11.d:0 "Filistinli liderlik, İlkelerin Deklarasyonunu kabul etti. Barış süreci başladı."
 oslo_accords.11.f:0 "Elhake tarihidir; zor iş sadece başlıyor."
 oslo_accords.11.a:0 "Süreç başlar."

 oslo_accords.12.t:0 "Filistin Rejects Oslo I"
 oslo_accords.12.d:0 "Filistinli liderlik, önerilen İlkelerin Değerlendirilmesi'ni reddetti."
 oslo_accords.12.f:0 "Karşılıklı kabul olmadan, diplomatik açılış kapanıyor."
 oslo_accords.12.a:0 "Konuşmalar çöktü."

 oslo_accords.2.t:0 "Oslo II Anlaşması"
 oslo_accords.2.d:0 "Prensiplerin Deklarasyonundan iki yıl sonra, İsrailli negotiators, Batı Bankası ve Gazze'de Filistin'i genişleyen bir anlaşma hazırladı."
 oslo_accords.2.f:0 "Öneri, Filistin kontrolünün bölgelerine otoriteyi ayırır ve İsrail kontrolünü sürdürdü."
 oslo_accords.2.a:0 "Interim Anlaşmasını Yıkın."
 oslo_accords.2.b:0 "Gecikme daha da işe yarar."

 oslo_accords.20.t:0 "İsrail Oslo II Anlaşmasını Yasakladı"
 oslo_accords.20.d:0 "İsrail, İsrail'in kendi hükümetlerini genişletip Batı Bankası'nı A, B ve C Bölgelerine örgütlemesini önerdi."
 oslo_accords.20.f:0 "Anlaşma genişletilmiş otorite vaat ediyor, ancak aynı zamanda, kontraseptif yargıların parçalanmış bir haritasını da ortaya koyuyor."
 oslo_accords.20.a:0 "Interim Anlaşmasını Kabul Etmek."
 oslo_accords.20.b:0 "Öneriyi reject."

 oslo_accords.21.t:0 "Filistin Oslo II Kabul Ediyor"
 oslo_accords.21.d:0 "Filistinli liderlik Interim Anlaşmasını kabul etti. Oslo süreci bir sonraki aşamaya taşınır."
 oslo_accords.21.f:0 "Daha fazla otorite transfer edilir, ancak son yerleşim uzak kalır."
 oslo_accords.21.a:0 "Anlaşmayı uygulama."

 oslo_accords.22.t:0 "Filistin Rejects Oslo II"
 oslo_accords.22.d:0 "Filistinli liderlik önerilen Interim Anlaşmasını reddetti."
 oslo_accords.22.f:0 "Oslo tarafından inşa edilen yapı hayatta kalır, ancak bir sonraki adım başarısız oldu."
 oslo_accords.22.a:0 "Süreç tezgahları."

