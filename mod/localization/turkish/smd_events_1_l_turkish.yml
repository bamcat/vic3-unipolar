#################### JE ####################
# The Internet

je_internet:0 "İnternet Internet"
je_internet_reason:0 "Ülkemizi internete bağlamanın zamanı! Basit telefon trafiğini desteklemenin ötesinde telekomünikasyon ağımızı yükseltmeliyiz ve sonunda vatandaşlarımızı Dünya Wide Web'in harikalarına tanıtmalıyız!"

smd_tech.1.t:0 "[ROOT.GetCountry.GetName] Goes Online"
smd_tech.1.d:0 "On yıllardır, iletişimimiz gazetelere, radyoya ve televizyona dayanıyordu. Ancak sessiz bir devrim dünyayı süpürüyor - internet olarak bilinen geniş bir bağlantı ağı. Akademik ve askeri araştırmacıların domaini bir kez, şimdi vatandaşlarımızın nasıl çalıştığını, öğreneceğini ve bağlantı kurmasını vaat ediyor."
smd_tech.1.f:0 "Dial-up internet: Çünkü hiçbir şey “yüksek teknoloji” çığlıkları gibi diyor ve bir kedinin resmini çekmek için 5 dakika bekliyor."

smd_tech.1.a:0 "Belki de diğer teknolojiler web aswell'e bağlanmalıdır!"
smd_tech.1.b:0 "Kamu görüşü üzerinde kontrol etmek için interwebs kullanabiliriz"

government_run_wifi_modifier:0 "Hükümet Wifi'da Geçici"

# Computer Science

je_computer_science:0 "Bilgisayar Bilimi"
je_computer_science_reason:0 "Bilgisayar bilimi, bilgisayarların nasıl çalıştığı, sorunları çözmek için nasıl yapılır ve onları nasıl verimli ve güvenli bir şekilde kullanabiliriz."

smd_tech.2.t:0 "Bilgisayar Bilimi Dereceleri"
smd_tech.2.d:0 "Mantıklı düşünme ve problemleri çözme bilimi olarak düşünün – ancak her küçük talimata uymaya çalışan makinelerle. Hem soyut hem de pratik, hem de çevremizdeki her modern teknolojiyi, akıllı telefonlardan kendi arabalarına kadar güçlendiriyor."

# Pesticides

je_pesticides:0 "Herbisit"
je_pesticides_reason:0 "Pestisitler, zararlıları kontrol etmek için kullanılan maddelerdir. Onunbikitler, inseksler, nematikler, mantarlar ve diğerleri içerir. Bunların en yaygınları herbisittir, bu da tüm pestisitlerin yaklaşık% 50'sini küresel olarak kullanmaktadır. Bu yeni icatla, tarım sektörümizi pestisitleri içerecek şekilde modernize etme göreviyle karşı karşıyayız."

smd_tech.3.t:0 "Ölü Pests Denizi"
smd_tech.3.d:0 "Binlerce yıl boyunca, böcekler ve kemirgenler insan tarım faaliyetleri için tehlikeli bir tehdit olarak kalmıştır. Çeşitli gıda-güvenli kimyasalların son icadıyla, zararlı böcekleri öldüren, bir kez ve herkes için daha iyi gıda güvenliğini garanti ederken daha iyi hasat elde edebiliriz!"

smd_tech.3.a:0 "Muhtemelen daha az çevresel hasarlar yapmış olsaydı daha iyi olurdu..."

# Globalization

je_globalization:0 "Küreselleşme Küreselleşme"
je_globalization_reason:0 "Küreselleşme, daha büyük bir birbirine bağlılık tarafından tanımlanan 20. yüzyıl fenomenidir, kültür, mallar, silahlar ve insanlar, her biri dünya çapında daha fazla serbest ticaret inisiyatifleri tarafından yönlendirildi."

je_asian_economic_reform: "Ekonomik Reform"
je_asian_economic_reform_reason: "Çin ve Hindistan uzun zamandır ekonomik kısıtlamalarla bağlantılıydı. Küresel ekonomi hızla entegrasyon ve serbest ticarete doğru ilerliyor. Eski kısıtlamaları ortadan kaldırmak için, daha önce görülmemiş bir büyüme içindeyiz. O zamana kadar pazarlarımız kısıtlanıyor."

asian_economy_restrictions: "Ekonomik Dirençler"
asian_economy_restrictions_desc: "Devlet tarafından kontrol edilen inefficiencies ve korumacı engeller ticareti yavaşlatır, rekabet ve uluslararası erişimi azaltır."

booming_trade_economy: "Booming Trade Economy"
booming_trade_economy_desc: "kısıtlamalar kaldırıldı, yabancı ve yerli pazarlar gelişti, daha büyük refaha yol açtı."

asia_reform.1.t: "Markets Open Up Up"
asia_reform.1.d: "Reformlar kaldırıldı ve kısıtlayıcı ticaret politikaları kaldırıldı. Çin ve Hindistan şimdi ekonomik küreselleşmenin ön saflarında duruyor."
asia_reform.1.f: "“Pazarlarımızı açmalıyız, çünkü izolasyon artık sürdürülebilir değil.”"
asia_reform.1.a: "Yeni bir ticaret dönemi başlar."

# Starship

je_starships:0 "Starries"
je_starships_reason:0 "Reusable roketin icadı, başka bir uzay aracının icadına, yıldız gemisine hızlı bir şekilde teşvik etti. Uçak dışı engelleri etkili bir şekilde ihlal edebilir, mars'a iniş yapın ve dünyaya geri dönerken, tüm astronotları istikrarlı bir sağlıkta tutarken, tanımamızı hak eden bir yeni tasarım."

# coming soon

