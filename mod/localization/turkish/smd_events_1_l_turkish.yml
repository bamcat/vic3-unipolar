 intifada_2005.1.t:0 "İkinci Intifada Winds Down"
 intifada_2005.1.d:0 "Yıllarca devam eden şiddet, egzoz, güvenlik önlemleri, diplomatik baskı ve siyasi değişim, isyanı yakınlaştırdı."
 intifada_2005.1.f:0 "Çatışma çözülmez, ancak açık intifada'nın aşaması sona erdi. Bir ateşkes her iki tarafın da yaralandığını, şüpheli ve bir sonraki şeyin belirsizliğini terk eder."
 intifada_2005.1.a:0 "Beyaz bir barış kabul et."

 intifada_2005.2.t:0 "İkinci Intifada Winds Down"
 intifada_2005.2.d:0 "Savaş bastırdı ve ayaklanma yeni, sessiz bir aşamaya girdi."
 intifada_2005.2.f:0 "Son yerleşim ulaşmadı, ancak escalation kendini yaktı."
 intifada_2005.2.a:0 "Mücadele diğer yollarla devam ediyor."

 intifada_2005_ceasefire:0 "İkincisi Intifada Ceasefire"
