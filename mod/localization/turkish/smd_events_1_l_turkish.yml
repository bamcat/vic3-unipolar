je_quebec_happiness: "Quebec durumu"
je_quebec_happiness_reason: "Kanada'daki Quebec durumu yıllardır tartışmalı bir konudur. Quebec'in farklı kültürü, dili ve tarihi genellikle özerklik ve bağımsızlık hakkındaki tartışmaları yakıtlandırdı.\n\n 1995 Quebec Referendum'a kadar geçen yıllarda, Quebec ve Kanada federal hükümeti arasındaki ilişki gerginlik, müzakere ve milliyetçi duyguların sıralanmasıyla işaretlenmiştir.\n\n Quebec şehri, eşsiz Fransızca konuşan çoğunluk, farklı kültürel kimlik ve özerklik için uzun tarih ile, periyodik olarak Kanada federasyonu içindeki yerini yeniden tanımlamak istedi. Bazı Quebecois arzunun tamamen bağımsız olmasını istiyor, diğerleri hala birleşik bir Kanada'da kalıyorken.\n\n Başbakan olarak göreviniz bu hassas durumu gezinmek. Quebec'in kültürel ve siyasi arzularına saygı ile ulusal birliğini dengelemeniz gerekir. Yaptığın her karar - dil yasaları, ekonomik politika veya kültürel yatırım - Quebecois nüfusunun mutluluğu etkileyecektir.\n\n Quebec Mutluluk puanı yüksek olursa, referandum Kanada'da kalmak için bir oylamayla sona erebilir. Ama eğer hoşnutsuzluk çok güçlü büyürse, Quebec halkı bağımsızlık için oy verebilir, Kuzey Amerika haritasını sonsuza dek değiştirir."
