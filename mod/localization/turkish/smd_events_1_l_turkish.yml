 wot_coalition.2.t:0 "5. Madde"
 wot_coalition.2.d:0 "Amerika Birleşik Devletleri'ndeki saldırılardan sonra, NATO 5. madde talep etti. ittifak şimdi tüm üyelere bir saldırı olarak saldırıya uğrar."
 wot_coalition.2.f:0 "Kuzey Atlantik ittifakı kolektif savunma için inşa edildi. İlk invokasyon, tanklardan bir sınırı geçmemek değil, bir terörist saldırıdan geliyor."
 wot_coalition.2.a:0 "Amerika Birleşik Devletleri ile durun."

 wot_coalition.10.t:0 "Amerika Birleşik Devletleri işbirliği talep ediyor"
 wot_coalition.10.d:0 "Amerika Birleşik Devletleri, Savaşta Pakistan işbirliği talep etti. Washington askeri erişimi, hakları, istihbarat desteği ve Afganistan'a lojistik rotaları bekliyor."
 wot_coalition.10.f:0 "Pakistan'ın coğrafyası onu vazgeçilmez kılar. Bununla birlikte, Refusal, İslamabad'ın terörizmi koruduğu suçlamaları davet eder."
 wot_coalition.10.a:0 "koalisyonla işbirliği yapın."
 wot_coalition.10.b:0 "ultimatum'u tekrarlayın."

 wot_coalition.11.t:0 "Pakistan Cooperates"
 wot_coalition.11.d:0 "Pakistan, ABD ve koalisyon ortaklarıyla işbirliği yapmayı kabul etti, Afganistan'daki kampanya için askeri erişim ve barındırma askeri üsler verdi."
 wot_coalition.11.f:0 "Afganistan'a giden yol şimdi Pakistan'dan geçiyor."
 wot_coalition.11.a:0 "Yollar güvenli."

 wot_coalition.12.t:0 "Pakistan Refuses"
 wot_coalition.12.d:0 "Pakistan, Amerikan işbirliğini reddetti. Washington şimdi Pakistan'ı terörizmle ilişkilendirir ve doğrudan askeri eyleme hazırlar."
 wot_coalition.12.f:0 "Refusal bir lojistik ortağı bir hedef haline getirir."
 wot_coalition.12.a:0 "Onların tarafını seçtiler."

 wot_article_5_join_war_tt:0 "Bu NATO üyesi ABD'ye Afganistan'a karşı herhangi bir aktif savaşta katılacak. Savaş henüz başlamamışsa, savaş başladığında bir kez katılacak."
 wot_pakistan_cooperate_tt:0 "Pakistan, Amerika Birleşik Devletleri ve tüm koalisyon ortaklarıyla 10 yıllık antlaşmayı işaret ediyor, #bold Askeri Erişim#! ve #bold Host Askeri Bases#!"
 wot_pakistan_refuse_tt:0 "Amerika Birleşik Devletleri Pakistan'a karşı bir rejim değişikliği savaşı başlattı ve terörizmle uyumlu etiketleri yayınladı."

