 arab_spring_jihadist_breakaways.1.t:0 "İslam Devleti Gelişiyor"
 arab_spring_jihadist_breakaways.1.d:0 "Devrim ve devlet çöküşünün kaosu, İslam Devleti'nin bayrağı altında bölgeyi konsolide etmeye izin verdi."
 arab_spring_jihadist_breakaways.1.f:0 "Eski devlet devrimle savaşıyor. Devrim eski devletle savaşıyor. Aralarındaki harabelerde, üçüncü bir kuvvet bayrağını yükseltir."
 arab_spring_jihadist_breakaways.1.a:0 "Yeni bir cephe açılır."

 arab_spring_jihadist_breakaways.2.t:0 "Jihadist Enclaves Emerge"
 arab_spring_jihadist_breakaways.2.d:0 "Arap Baharı bölgenin istikrarsızlaştırılması olarak, jihadist hücreler dağınık bölgeyi ele geçirdi ve İslam Devleti'ne sadakat ilan etti."
 arab_spring_jihadist_breakaways.2.f:0 "Devletin nereye çekildiği, silahlı ağlar yönetimler haline gelir."
 arab_spring_jihadist_breakaways.2.a:0 "Kriz yayılıyor."

 arab_spring_jihadist_breakaways.3.t:0 "Houthis Seize Bölgesi"
 arab_spring_jihadist_breakaways.3.d:0 "Yemen devrimi ülkeyi kırmıştır, Houthi hareketinin bölgeye girmesine ve kendi güçlerini seferber etmesine izin verdi."
 arab_spring_jihadist_breakaways.3.f:0 "Ayaklanma tek bir muhalefet yaratmadı, ancak çoğu."
 arab_spring_jihadist_breakaways.3.a:0 "Yemen splinters."

