 je_korea_reunification_stk:0 "Kore Reunification"
 je_korea_reunification_stk_reason:0 "Kore Cumhuriyeti Kore ulusunun tek meşru hükümetidir. Çiftliğin bölünmesi yabancı bir işgal ve Soğuk Savaş rekabetinin mirasıdır - [ROOT.GetCountry.GetName] bunu asla kalıcı olarak kabul etmedi.\n\n [ROOT.GetCountry.GetAdjective] Liderliği, Kore halkını demokratik bir anayasal düzen altında bir araya getirecekti. Kuzey Kore'nin kuzey yönetimi [ROOT.GetCountry.GetAdjective] durumuna absorbe edilmelidir. Pyonyang rejiminin kuzeydeki gücü son engeldir."
 
 korea_stk_complete_tt:0 "#bold Bir çiftliği [ROOT.GetCountry.GetAdjective] liderlik altında birleştirilmiştir.#! Kore bütündür. 1945'in bölünmesi düzeltildi."
 korea_stk_subject_path_tt:0 "[SCOPE.sCountry('c:NRK').GetName] [ROOT.GetCountry.GetName] bir konudur. Kuzey yönetimi [ROOT.GetCountry.GetAdjective] anayasal düzen içinde getirildi. Kuzey'in bütünleşmesi – muazzam bir taahhüt."
