 demographic_events.1.t: "Demografik Kriz"
 demographic_events.1.d: "Uzmanlar, ulusumuzun ciddi bir demografik krizle karşı karşıya kaldığı konusunda uyardılar. Yaşlanan doğum oranlarının on yılları, yakında işgücümüzü aşacak bir yaşlanma nüfusu üretti. Çocuk bakımı, sağlık, konut ve sosyal refah için sürekli yatırım olmadan, ekonomik temelimiz önümüzdeki on yıllar boyunca işçilerin oranı olarak erode olacaktır.\n\n Geçici bir demografik buffer şu anda en kötü etkileri maskeler, ancak bu tampon önümüzdeki on yıllar boyunca çürüyecektir. Trendyi tersine çevirmek ve en az on yıl boyunca kapsamlı pro-natalist reformları sürdürmek zorundayız."
 demographic_events.1.a: "Çok geç olmadan hareket etmeliyiz"

 demographic_events.2.t: "Demographic Recovery"
 demographic_events.2.d: "halkımızda on yıl boyunca devam eden yatırımdan sonra - evrensel çocuk bakımı, erişilebilir sağlık, kapsamlı refah ve uygun fiyatlı konut - ulusumuz doğum oranı stabilize oldu. Ekonomimizi bozmak için tehdit eden demografik kriz bir engel olmuştur. Yeni bir nesil işçiler iş gücüne giriyor ve gelecek parlak görünüyor."
 demographic_events.2.a: "sabrımız ödenmiş"

