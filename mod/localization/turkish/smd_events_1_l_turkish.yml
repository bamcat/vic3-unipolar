 yugoslav_collapse.1.t:0 "Federasyon Fractures"
 yugoslav_collapse.1.d:0 "Milliyetçi hükümetler ve federal otoriteler Yugoslavya'yı dağılmasın kenarına ittiler."
 yugoslav_collapse.1.a:0 "Cumhuriyetler birlikte yapılmalıdır."
 yugoslav_collapse.1.b:0 "Konfederal bir yerleşim sağlar."
 yugoslav_collapse.1.c:0 "Federal otoriteyi kuvvetle geri yükleyin."

 yugoslav_collapse.2.t:0 "Hırvatistan Breaks Away"
 yugoslav_collapse.2.d:0 "Hırvatistan bağımsızlığa doğru taşındı, Belgrad'ı savaşmak veya molayı tanımaya zorlamaya zorladı."
 yugoslav_collapse.2.a:0 "Hırvatistan Bağımsızlık Savaşını başlat."
 yugoslav_collapse.2.b:0 "Hırvatistan bağımsızlığını tanır."

 yugoslav_collapse.3.t:0 "Bosna Declares"
 yugoslav_collapse.3.d:0 "Bosna'nın bağımsızlığı, cumhuriyet boyunca rakip iddialar yarattı ve Sırp varlıklar kendi bölgesel otoritelerini düzenlemeye başladı."
 yugoslav_collapse.3.a:0 "Bosna Savaşı başlar."
 yugoslav_collapse.3.b:0 "Bosna'yı tanır ve bir yerleşim arar."

 yugoslav_collapse.4.t:0 "Uluslararası Yanıt"
 yugoslav_collapse.4.d:0 "Yabancı hükümetler barışı korumayı, yaptırımları ve Yugoslav çatışmalarının yayıldığı gibi arabuluculuğu tartışıyorlar."
 yugoslav_collapse.4.a:0 "Barışgücü görevi gereklidir."
 yugoslav_collapse.4.b:0 "Bu içsel bir konudur."

 yugoslav_collapse.5.t:0 "Sırbistan İstekleri Reunification"
 yugoslav_collapse.5.d:0 "Belgrad hükümetimizi restore edilmiş bir Yugoslav durumuna geri dönmemizi istedi."
 yugoslav_collapse.5.a:0 "Yeniden birleşmeyi kabul edin."
 yugoslav_collapse.5.b:0 "Talepi geri al."

 yugoslav_collapse.10.t:0 "Confederal Negotiations"
 yugoslav_collapse.10.d:0 "Bir gevşek Yugoslav konfederasyon barışı koruyabilir, ancak cumhuriyetler Belgrad'ın niyetlerinden şüpheli kalır."
 yugoslav_collapse.10.a:0 "Reformlara devam edin."
 yugoslav_collapse.10.b:0 "Süreç başarısız olur."

 yugoslav_collapse.20.t:0 "Yugoslavya Korumalı"
 yugoslav_collapse.20.d:0 "uzlaşma ve kısıtlama yoluyla, Yugoslavya tam parçalanmadan kaçındı ve bir konfederal yerleşim kabul etti."
 yugoslav_collapse.20.a:0 "Federasyon hayatta kalır."

 yugoslav_collapse.30.t:0 "Montenegro'nun Referendum"
 yugoslav_collapse.30.d:0 "Montenegro, Sırbistan ile birlik olup tam bağımsızlığı geri yüklemeye karar vermeye hazırlanıyor."
 yugoslav_collapse.30.a:0 "Montenegro'nun bağımsızlığını tanır."
 yugoslav_collapse.30.b:0 "Sendikayı koru."

 srpskas.1.t:0 "Republika Srpska Hareketliizes"
 srpskas.1.d:0 "Bosnalı Sırp liderliği Bosna'nın yeni hükümetine karşı güvenli bölgeye seferber oldu."
 srpskas.1.a:0 "Savaşı başlat."
 srpskas.1.b:0 "Bosna'da özerkliği kabul edin."

 kosovo_events.1.t:0 "Kosova Krizi"
 kosovo_events.1.d:0 "Kosova'da yükselen huzursuzluk ve baskı, Arnavutluk ve NATO'yu Yugoslavya ile çatışmaya sokabilecek bir kriz yarattı."
 kosovo_events.1.a:0 "Crack down."
 kosovo_events.1.b:0 "Geniş özerklik sağlar."

 kosovo_events.2.t:0 "Kosova'da Müdahale?"
 kosovo_events.2.d:0 "Kosova çatışması yükseldi. NATO hükümetleri Yugoslavya'ya karşı askeri müdahaleyi tartışıyorlar."
 kosovo_events.2.a:0 "Bombalama kampanyasına başlayın."
 kosovo_events.2.b:0 "Dengeden kaçının."

 kosovo_events.3.t:0 "NATO Bombalama Başlıyor"
 kosovo_events.3.d:0 "NATO uçakları, Yugoslav hedeflerine çarpıcı bir şekilde başladı. Belgrad, Kosova'dan çekilmeyi veya direnmeyi seçmeli."
 kosovo_events.3.a:0 "Kosova'dan çekildi."
 kosovo_events.3.b:0 "NATO'ya diren."

 kosovo_events.4.t:0 "Kosova'nın Durumu"
 kosovo_events.4.d:0 "Yugoslav güçleri geri çekildi ve uluslararası yönetim yerinde Kosova'nın durumu çözülmeli."
 kosovo_events.4.a:0 "Kosova bağımsız hale gelir."
 kosovo_events.4.b:0 "Kosova özerk kalır."

 yugoslav_war_crimes.1.t:0 "Saraybosna'nın Kaderi"
 yugoslav_war_crimes.1.d:0 "Saraybosna'dan gelen raporlar kabuklu, açlık ve kuşatma koşullarındaki sivil acıları tanımlar."
 yugoslav_war_crimes.1.a:0 "Deny sorumluluğu ve devam."
 yugoslav_war_crimes.1.b:0 "Bir soruşturma açın."

 yugoslav_war_crimes.2.t:0 "Srebrenica"
 yugoslav_war_crimes.2.d:0 "Srebrenica yakınlarındaki kitlesel öldürme raporları uluslararası öfkeye neden oldu."
 yugoslav_war_crimes.2.a:0 "suçlamaları geri al."
 yugoslav_war_crimes.2.b:0 "Araştırmacılarla işbirliği."

 yugoslav_war_crimes.3.t:0 "Sarajevo'ya Cevap"
 yugoslav_war_crimes.3.d:0 "kuşatma uluslararası eylem için gerekli talepleri içeriyor."
 yugoslav_war_crimes.3.a:0 "Condemn Belgrad."
 yugoslav_war_crimes.3.b:0 "Sınırlı bir protesto."

 yugoslav_war_crimes.4.t:0 "Srebrenica'ya yanıt verin"
 yugoslav_war_crimes.4.d:0 "katliamı, savaşa karşı uluslararası ruh halini değiştirdi."
 yugoslav_war_crimes.4.a:0 "Talep hesabı."
 yugoslav_war_crimes.4.b:0 "Daha fazla katılımı önlemek."

 yugoslav_war_crimes.5.t:0 "Ulusal Grief"
 yugoslav_war_crimes.5.d:0 "Önden gelen haberler ülkeyi şok etti ve savaşın yaralarını derinleştirdi."
 yugoslav_war_crimes.5.a:0 "Ya da biz."

