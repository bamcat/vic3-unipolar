troubles_events.5.t: "Gunmen İrlandalı Pub'da Sivilleri Öldür"
troubles_events.5.d: "Kuzey İrlanda'da ölümcül bir atış, devam eden sıkıntılar sırasında şiddetin üzücü bir yansımasıdır."
troubles_events.5.a: "Barışa giden yol asla düz değildir."
 
je_northern_ireland_peace_process: "Kuzey İrlanda Barış Süreci"
je_northern_ireland_peace_process_reason: "On yıllar süren çatışmadan sonra, “The Troubles”, Birleşik Krallık ve İrlanda hükümetleri - Kuzey İrlanda'nın siyasi partileri ile - müzakereler dönemine girdiler.\n\n Downing Street Deklarasyonundan çok partili görüşmelere ve potansiyel ateşkeslere kadar, bu tartışmalar kan dökme yıllarını engelleyebilir.\n\n Sonuç siyasi iradeye, halk görüşüne ve uzlaşma yeteneğine bağlı olacaktır."

ni_peace_process_success_tt: "Barış süreci Kuzey İrlanda'da istikrar artırmayı başardı."

ni_peace_events.1.t: "Downing Street Declaration"
ni_peace_events.1.d: "İngiliz ve İrlandalı hükümetler Kuzey İrlanda halkının geleceğine karar verme hakkını doğrulayan ortak bir açıklama yayınladı."
ni_peace_events.1.a: "Önemli bir adım ileri."

ni_peace_events.2.t: "Çok partili Konuşmalar Başlıyor"
ni_peace_events.2.d: "İlk kez, Kuzey İrlandalı siyasi grupların temsilcileri müzakere masasında buluşmaktadır."
ni_peace_events.2.a: "Diyalog barış yolundadır."

ni_peace_events.3.t: "İyi Cuma Anlaşması"
ni_peace_events.3.d: "Kuzey İrlanda'daki paramiliter gruplar bir ateşkes ilan etti, kalıcı bir barışa kapıyı açtı, Birleşik Krallık ve İrlanda Hükümeti arasında olumlu bir görüşme izledi."
ni_peace_events.3.a: "Silahlar sessiz kalır."

ni_peace_events.5.t: "İngiliz Troops Kuzey İrlanda'dan Kicked"
ni_peace_events.5.d: "Kuzey İrlanda'daki troop varlığı hiçbir şeye indirgenmedi, İngiliz hükümeti kendini kontrol edemiyor. Sürpriz bir harekette, hükümet resmen İrlanda Cumhuriyeti'ne Kuzey İrlanda'yı mezarlıyor."
ni_peace_events.5.a: "Seçimimiz yok."
ni_peace_events.5.a.tt: "Kuzey İrlanda İrlanda'ya transfer edilecek."

ni_peace_events.6.t: "İrlanda'nın yeniden birleşme"
ni_peace_events.6.d: "On yıllar sonra, Kuzey İrlanda resmen İrlanda Cumhuriyeti'ne katıldı. Sokaklar ulus olarak kutlamalarla dolu bir geleceğe bakıyor."
ni_peace_events.6.a: "Pop şampanya!"
reunification_pride: "Reunification Pride"
reunification_pride_desc: "Ulusal yeniden birleşmenin sevinci kamu birliğini güçlendirdi ve hükümetin ayakta kalmasını güçlendirdi."

je_oil_titans:0 "Petrol Titanları"
je_oil_titans_reason:0 "Gulf, gezegendeki en büyük kanıtlanmış petrol rezervleri üzerinde oturuyor. [ROOT.GetCountry.GetName] Bu miras ile ilgili olan şey gelecek yüzyılı tanımlayacaktır - bölge için, küresel enerji pazarı için ve her ülke için endüstri, ulaşım ve refah petrol üzerinde çalışır.\n\n\n Hedef sadece petrol çıkarmak değildir. Bu vazgeçilmez hale gelmek - dünyadaki en iyi üç üretici arasında olmak, bu yüzden petrol fiyat hareket ettiğinde hareket eder, çünkü [ROOT.GetCountry.GetName] hareket etmeyi seçti."
 
oil_titans_top3_tt:0 "#bold [ROOT.GetCountry.GetName] en iyi 3 global petrol üreticisidir.#! Dergi girişi tamamlandı - [ROOT.GetCountry.GetName] küresel enerji sisteminin vazgeçilmez düğümlerinden biri haline geldi."
oil_titans_top10_tt:0 "[ROOT.GetCountry.GetName] en iyi 10 global petrol üreticisidir ve üst 3'e yaklaşıyor. Petrol ekstraksiyonunda devam edilen yatırım boşluğu kapatacaktır."
oil_titans_outside_tt:0 "[ROOT.GetCountry.GetName] henüz ilk 10 küresel petrol üreticisi arasında değil. Petrol çıkarma altyapısında önemli yatırımlar gereklidir."
 
oil_titans_bonus:0 "Petrol Titanı"
oil_titans_bonus_desc:0 "[ROOT.GetCountry.GetName] dünyanın en iyi üç petrol üreticisinden biridir. Bu gelirler devlet treasury'ye, inşaata ve [ROOT.GetCountry.GetName] tek başına nüfusun büyüklüğünün asla haklı çıkmayacağını gösteriyor. Dünya [ROOT.GetCountry.GetAdjective] petrole ihtiyaç duyar. Bu ihtiyaç güçtir."

bid_for_olympics_decision:0 "Olimpiyatları tutmak için kaydolun"
bid_for_olympics_decision_desc:0 "Bir sonraki Olimpiyat Oyunlarının ev sahibi olmak için Uluslararası Olimpiyatları Komitesi tarafından kabul edilmesi için şanslıyız."
we_can_host_the_next_olympics_tt:0 "Bir sonraki Olimpiyat oyunlarına ev sahipliği yapabiliriz."

 je_korea_reunification_nrk:0 "Kore Reunification"
 je_korea_reunification_nrk_reason:0 "Demokratik Halk Kore Cumhuriyeti Kore ulusunun tek meşru hükümetidir. 38. paralelinde yarımadanın bölünmesi, yabancı güçler tarafından verilen yapay bir yaradır - [ROOT.GetCountry.GetName] doğrulamaya karar verir.\n\nReunification under [ROOT.GetCountry.GetAdjective] liderlik Kore ulusunu bütünlüğe geri getirecek. Güney Kore'nin güney yönetimi [ROOT.GetCountry.GetAdjective] devlet içinde getirilmelidir - anlaşma ile veya [ROOT.GetCountry.GetAdjective] güç ağırlığının imkânsız hale getirilmesiyle."
 
 korea_nrk_complete_tt:0 "#bold Bir çiftliği [ROOT.GetCountry.GetAdjective] liderlik altında birleştirilmiştir.#! Kore bütündür. 1945'in bölünmesi düzeltildi."
 korea_nrk_subject_path_tt:0 "[SCOPE.sCountry('c:STK').GetName] [ROOT.GetCountry.GetName] bir konudur. Güney yönetimi [ROOT.GetCountry.GetAdjective] eyalet içinde getirildi. Çiftliğin tam entegrasyonu aşağıdadır."
 korea_nrk_incomplete_tt:0 "[SCOPE.sCountry('c:STK').GetName] [SCOPE.sState('STATE_SEOUL').GetName], [SCOPE.sState('STATE_BUSAN').GetName] ve [SCOPE.sState('STATE_YANGHO').GetName] Reunification, [ROOT.GetCountry.GetName] tüm üçe sahip olmak veya bir konu olarak [SCOPE.sCountry('c:STK').GetName]'ye sahip olmak gerektirir."
 
