 korea_reunification_bonus:0 "Kore Yeniden Onaylandı"
 korea_reunification_bonus_desc:0 "Kore yarımadasının bölünmesi sona erdi. Ulus 1945'ten beri ilk kez bütündür. Otorite, meşruiyet ve prestij dramatik olarak gelişmiştir. Separatist ve devrimci baskılar bastırılıyor. [ROOT.GetCountry.GetAdjective] devlet, birleşik bir Kore'yi bütünleştirme çalışmasına başlayabilir."
 
 korea_stk_integration_bonus:0 "Kuzey entegrasyon"
 korea_stk_integration_bonus_desc:0 "[ROOT.GetCountry.GetName] eski [SCOPE.sCountry('c:NRK').GetAdjective] bölgeyi absorbe ediyor. Kuzey ve güney arasındaki ekonomik ve idari boşluk geniştir - entegrasyon devam eden yatırım ve hızlandırılmış birleşme gerektirir. Maliyetler gerçek, ancak hedef birleşik bir Kore."
 
 y2k_events.1.t: "Millennium Bug"
 y2k_events.1.d: "Yıl 2000 yaklaşırken, sessiz bir kaygı [ROOT.GetCountry.GetAdjective] mühendisler, bürokratlar ve IT departmanları. sözde Y2K sorunu - çoğu bilgisayar sistemlerinin yılın iki basamak olarak depoladığı keşif ve bu nedenle 2000'den fazla '00'ı yorumlayacak - küresel bir kovalama tetikledi.\n\n Bazıları sonuçları felaket olabileceğini söylüyor: güç şebekeleri başarısız, bankacılık sistemleri yolsuzluk, hava trafik kontrolü karanlık gidiyor. Diğerleri endişenin vahşice aşırı abartıldığını ve uyumluluk denetimlerini satan danışmanların sadece panikten zengin olduğunu söylüyorlar. [ROOT.GetCountry.GetName] Bunu ne kadar ciddiye almaya karar vermelidir."
 y2k_events.1.f: "Midnight geliyor. Işıklar başka bir soruysa."
 
 y2k_events.1.a: "Tam Y2K uyumluluğuna yatırım"
 y2k_events.1.a_tt: "Pahalı, titiz ve muhtemelen gereksiz - ancak tahminlerin bir kısmı doğruysa, hiçbir şeyin maliyeti çok daha yüksek değildir. [ROOT.GetCountry.GetName] kritik altyapıdaki uyumluluk programları finanse edecektir."
 y2k_events.1.b: "Açıkçası aşırı büyü - görmezden"
 y2k_events.1.b_tt: "Panik bir danışmanlık endüstrisi altın madeni ve daha fazlası değildir. [ROOT.GetCountry.GetName], hayali bir problem üzerine kamu fonları israf etmeyecektir."
 
 # ── NEW YEAR 2000 ─────────────────────────
 
 y2k_events.2.t: "Mutlu Yeni Yıl - 2000 hoş geldiniz"
 y2k_events.2.d: "Saatler 31 Aralık 1999'da gece yarısına ulaştı ve ışıklar kaldı.\n\n Uçaklar uçuyordu. Bankalar açıldı. Power grids hummed. Su aktı. Binyıl otobüsü, bilişim tarihinde en çok beklenen felaket, bir patlamadan ziyade bir fısıltı ile geldi - ya da belki de hiçbir zaman tek başına işe yaramadı.\n\n [ROOT.GetCountry.GetName]'de kalabalıklar sokakları doldurdu, itfaiyeciler gökyüzünü yaktı ve bir gece boyunca dünya tekrar başladı gibi hissetti. Yirmi birinci yüzyıl başladı. Bir sonraki gelen şey herkesin tahminidir."
 y2k_events.2.f: "Yıl 2000. Dünya sona ermedi. Bu, kabul edilen her şey iyi bir haber."
 
 y2k_events.2.a: "Yeni bir yüzyıl başlıyor"
 
