 y2k_compliance_investment: "Y2K Uyum Programları"
 y2k_compliance_investment_desc: "[ROOT.GetCountry.GetName] kritik altyapıya kapsamlı Y2K uyumluluğuna yatırım yaptı. Maliyet gerçek, ancak sistemler gece yarısının getirdiği her şeye hazırdır."
 
 millennium_celebration: "Millennium kutlamaları"
 millennium_celebration_desc: "2000 yılı felaket olmadan geldi. Halk ruh hali hala reveler dolu ve [ROOT.GetCountry.GetName] yeni yüzyıla ihtiyatlı bir iyimserliğe girer."
 
 y2k_minor_disruption: "Y2K Disruption"
 y2k_minor_disruption_desc: "[ROOT.GetCountry.GetName] Y2K endişelerini reddetti ve şimdi yeni yıla hazırlıksız sistemler olarak küçük ama gerçek kesintilerle karşı karşıya. Hiçbir felaket değil - ama eleştirmenler tamamen yanlış değildi."
 
  # ── TAGENTOPOLI ──────────────────────

 je_tangentopoli: "Tangentopoli"
 je_tangentopoli_reason: "İtalya bir geri dönüş sistemi üzerinde çalışır. Kamu sözleşmeleri - inşaat, altyapı, savunma tedariki, sağlık - siyasi partilere bir yüzde ödeyen firmalara gidin. Hıristiyan Demokratlar paylarını alırlar. Sosyalistler onlarınkini alır. Daha küçük koalisyon ortakları onları alır. Herkes bilir. Herkes katılır. Savaştan beri bu şekilde olmuştur.\n\n Sistem #bold Tangentopoli#! – Bribe City denir. istikrarlı, verimli ve tamamen yozlaşmıştır. Tek soru, başka bir şekilde görünmeyi reddeden bir yargıçla temasa geçebilecek olup olmadığıdır."

 je_mani_pulite: "Mani Pulite"
 je_mani_pulite_reason: "Soruşturma çalışıyor. Yargıç Antonio Di Pietro ve Milan magistrates havuzu, Cumhuriyet kurulduğundan beri İtalyan siyasetini finanse eden rüşvetler ve tekmeler ağı üzerinden çalışıyor. Her tutuklama bir itirafa yol açar. Her itiraf bir isime yol açar. Her isim başka bir tutuklamaya yol açar.\n\n Siyasi sınıf geri savaşıyor. Acil kararnameler, magistrates transferleri, yargıdaki halk saldırıları. Soru, sistemin onu durdurmanın bir yolunu bulabileceğinden önce soruşturmanın sonucuna varıp ulaşmanın bir yolu olup olmadığıdır.\n@information!@information! #bold soruşturma bar#! magistrates'in ilerlemesini izler. #bold direniş bar#! politik sınıfın onları kapatma yeteneğini izler."

 # Status descs — tangentopoli
 je_tangentopoli_contained_tt: "Soruşturma ilk aşamalarındadır. Bir avuç küçük figür tutuklandı. Siyasi sınıf onu bir il meselesi olarak reddeder."
 je_tangentopoli_spreading_tt: "#bold Soruşturma yayılıyor.#! Confessions are cumulating. İsimler ortaya çıkıyor. Milano'daki magistrates her ipi takip ediyor."
 je_tangentopoli_critical_tt: "@warning! #bold Sistem kırılma noktasında.#! Tangentopoli ölçeği güvenilmez hale geliyor. Siyasi bir kriz yakın."

 # Status descs — mani pulite
 je_mani_pulite_early_tt: "Soruşturma ivme yaratıyor. Di Pietro'nun ekibi kanıtlarla çalışıyor. Siyasi sınıf henüz tutarlı bir yanıt organize etmedi."
 je_mani_pulite_winning_tt: "#bold Soruşturma kazanıyor.#! Büyüler direnişin önündedir. İsimler sistemden daha hızlı düşüyorlar."
 je_mani_pulite_stalemate_tt: "@warning! Soruşturma ve siyasi direniş bile eşleştirilir. Sonuç bir sonraki hareketlere bağlıdır."
 je_mani_pulite_suppressed_tt: "@warning! #bold Siyasi direniş üst el kazanıyor.#! Sistem organize edilir. Soruşturma, sonucuna varmadan önce gömülebilir."

