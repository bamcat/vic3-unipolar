 ## breakup of czechoslovakia
 je_velvet_divorce: "The Velvet Boşanma"
 je_velvet_divorce_reason: "Federasyon güç altında. Komünizmden gelen geçiş, devletin Çek ve Slovak yarısı arasındaki ekonomik ve politik hata hatlarına maruz kaldı. Vladimír Mečiar tarafından yönetilen Slovak politikacılar, daha büyük bir özerkliğe ve bazı bağımsızlıklara itiyorlar. Václav Klaus tarafından yönetilen Çek tarafı, onlara gitmelerine izin vermek için giderek daha isteklidir.\n\n İki güç şimdi hareket halindedir. [ROOT.GetCountry.GetName] #bold federal kohesion#! - müzakere yoluyla, ekonomik uzlaşma ve politik yetenek - #bold separatist baskı#! dissolution irreversible.\n\n\n\n\n Baskı, kohesion yapmadan 100'e ulaşırsa, federasyon çözülecektir. Selam olsun. Bu, ‘büyük’ anlamına geliyor."
 
 je_velvet_divorce_stable_tt: "Federasyon tutuyor. Negotiations devam ediyor. Sonuç hala hükümetin elindedir."
 je_velvet_divorce_tense_tt: "@warning! #bold Separatist baskı artıyor.#! Slovak politikacılar bağımsızlık mümkün ve arzu edilenden daha fazla emin. pazarlık edilen bir yerleşim için pencere daralıyor."
 je_velvet_divorce_critical_tt: "@warning! #bold Federasyon kırılma noktasındadır.#! Ayrılma için siyasi koşullar neredeyse tamamlanmış. Dramatik bir müdahale olmadan, Çekoslovakya yıl hayatta kalmayacaktır."
 
