 intifada_urban_uprising: "Urban Upence"
 intifada_urban_uprising_desc: "Savaş yoğun olarak dolu kentsel alanlarda ve geleneksel askeri güçlerin etkili bir şekilde çalışamayacağı mülteci kamplarında gerçekleşir. Küçük bölge büyük ölçekli manevralar neredeyse imkansızdır."

 intifada_isr_morale: "IDF Momentum"
 intifada_isr_morale_desc: "Askeri başarılar, İsrail'in isyanı bastırmayı güçlendirdi."

 intifada_popular_resistance: "Popüler Direniş"
 intifada_popular_resistance_desc: "Filistinli insanlar kitlesel direnişte yükseldi. Her mahalle güçlü bir iştir, her sivil potansiyel bir savaşçıdır."

 intifada_stone_throwing: "Sokak Direnişi"
 intifada_stone_throwing_desc: "Sustained sokak çatışmaları ve taş fırlatmaları İsrail kuvvetlerinin kontrolü için son derece zor bir şekilde işgal edildi."

 intifada_idf_crackdown: "IDF Crackdowndown"
 intifada_idf_crackdown_desc: "Sivil alanlarda İsrail askeri operasyonları önemli kayıplara neden oluyor."

 intifada_devastation: "Intifada Destruction"
 intifada_devastation_desc: "Savaş harap evler, altyapı ve bölge genelinde geçim kaynakları var."

 intifada_raid_expenses: "Direniş Operasyonları"
 intifada_raid_expenses_desc: "İsrail askeri pozisyonlarına karşı koordineli direniş operasyonları finanse etmek."

 intifada_international_pressure: "Uluslararası Baskı"
 intifada_international_pressure_desc: "Çatışmanın küresel medya kapsamı İsrail'in uluslararası ayakta ve diplomatik itibarına zarar verdi."

 intifada_isr_reward: "Intifada Suped"
 intifada_isr_reward_desc: "İsrail İkinci Intifada'yı bastırdı, Filistinlilerin topraklarının üzerinde askeri kontrolü dile getirdi."

 intifada_pal_reward: "Direniş Victorious"
 intifada_pal_reward_desc: "Filistinli insanlar popüler direniş, tanıma ve tavizler fedakarlık yoluyla kabul ettiler."
 
 je_israel_palestine_peacetime:0 "Rahatsız Durum Konağı"
 je_israel_palestine_peacetime_reason:0 "Açık intifada veya büyük bir escalasyon yoktur, ancak çatışma güvenlik koordinasyonu, kapatmalar, diplomasi, gösteriler ve periyodik olaylarla devam etmektedir."
 je_israel_palestine_tension_bar:0 "Çatışma Gerilme"
 je_israel_palestine_tension_bar_desc:0 "Bölgesel Instability"
 je_israel_palestine_tension_bar_second_desc:0 "Yüksek gerilim büyük bir escalasyon uyarısını tetikleyebilir ve İkinci Intifada sisteminize bağlanabilir."

 je_ip_peacetime_status_calm:0 "Durum nispeten sakin. Güvenlik koordinasyonu, görüşmeler ve uluslararası arabuluculuk, koyunda daha geniş bir eskalasyon tutuyor."
 je_ip_peacetime_status_fragile:0 "Sakinliği kırılgandır. Olaylar, baskınlar, kapanışlar, gösteriler veya yerleşim anlaşmazlıkları, mevcut dengeyi hızla geri alabilir."
 je_ip_peacetime_status_crisis:0 "Durum büyük bir escalasyon kenarında. Tek bir olay statükoyu kırmak için yeterli olabilir."
 je_ip_peacetime_complete_tt:0 "Gerginlik çok düşük, görüşmeler gelişmiştir ve güvenlik koordinasyonu kalıcıdır."

 je_ip_peacetime_security_coordination:0 "Güvenlik Koordinasyonu"
 je_ip_peacetime_security_coordination_desc:0 "Yerel olayların daha geniş bir kriz haline gelmesini önlemek için pratik koordinasyonu genişletin. Bu daha düşük gerilim, ancak yerli siyasi backlash yaratabilir."

 je_ip_peacetime_closure_policy:0 "Closure Policy"
 je_ip_peacetime_closure_policy_desc:0 "Daren hareketi ve acil güvenlik risklerini azaltmak için kontrollere erişim. Bu kısa vadeli gerginlik, ancak Filistin ekonomisini zarar verir ve uluslararası baskıyı arttırır."

 je_ip_peacetime_settlement_freeze:0 "Çözüm Freeze"
 je_ip_peacetime_settlement_freeze_desc:0 "yerleşim genişlemesinde geçici bir donatmayı açıklayın. Bu, müzakereleri ve uluslararası ayakta geliştirir, ancak yerli backlash yaratır."

 je_ip_peacetime_international_mediation:0 "Uluslararası Mediasyon"
 je_ip_peacetime_international_mediation_desc:0 "Dış medyacılar dışında görüşmeleri stabilize etmek. Bu müzakere ivmesini geliştirir, ancak scrutiny dışında artırır."

 je_ip_peacetime_grassroots_outreach:0 "Grassroots Outreach"
 je_ip_peacetime_grassroots_outreach_desc:0 "Sivil toplumun desteklenmesi, yerel örgütlenme ve şiddet içermeyen siyasi girişimler. Bu daha düşük gerilim ama sertleri öfkeleyebilir."

 je_ip_peacetime_mass_mobilization:0 "Mass Mobilization"
 je_ip_peacetime_mass_mobilization_desc:0 "Kanal kamusal hayal kırıklığı organize seferberlik. Bu, uluslararası baskıyı ortaya çıkarır, ancak durumu escalasyona zorlama riskini arttırır."

 ip_uneasy_status_quo:0 "Sıkıntısız Durum Teklifi"
 ip_uneasy_status_quo_desc:0 "Açık savaş müdahale etti, ancak çatışma hala siyaset, diplomasi ve günlük yönetim şekillendiriyor."

 ip_security_coordination:0 "Güvenlik Koordinasyonu"
 ip_security_coordination_desc:0 "Güvenlik güçleri arasındaki koordinasyon, escalation'ı sınırlandırır, ancak politik olarak maliyetlidir."

 ip_closure_policy:0 "Closure Policy"
 ip_closure_policy_desc:0 "Hareket kısıtlamaları, diplomatik ve insani baskıyı artırarak bazı güvenlik risklerini azaltır."

 ip_economic_restrictions:0 "Ekonomik Dirençler"
 ip_economic_restrictions_desc:0 "Hareket ve erişim üzerindeki kısıtlamalar ekonomik yaşamı bozar."

 ip_settlement_freeze:0 "Çözüm Freeze"
 ip_settlement_freeze_desc:0 "Yerleşim faaliyetlerinde geçici bir duraklama diplomatik koşullar geliştirdi."

 ip_international_mediation:0 "Uluslararası Mediasyon"
 ip_international_mediation_desc:0 "Dış medyacılar siyasi süreci canlı tutmak için çalışıyorlar."

 ip_grassroots_outreach:0 "Grassroots Outreach"
 ip_grassroots_outreach_desc:0 "Sivil toplum ve yerel siyasi girişimler durumu spirallemek için çalışıyor."

 ip_mass_mobilization:0 "Mass Mobilization"
 ip_mass_mobilization_desc:0 "Halk seferberliği siyasi baskıyı artırıyor ancak aynı zamanda çatışma riskini de artırıyor."

 ip_security_alert:0 "Güvenlik Uyarısı"
 ip_security_alert_desc:0 "Güvenlik güçleri sonsuzluktan sonra daha yüksek uyarıda bulunuyor."

 ip_international_scrutiny:0 "International Scrutiny"
 ip_international_scrutiny_desc:0 "Yabancı hükümetler ve medya, gelişmeleri yakından izliyor."

 ip_political_backlash:0 "Siyasi Backlash"
