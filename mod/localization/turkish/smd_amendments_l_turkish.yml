l_turkish:

 # ==========================================
 # UNITED STATES
 # ==========================================

 amendment_medicaid: "Medicaid"
 amendment_medicaid_desc: "Federal ve devlet finanse edilen sağlık sigortası düşük gelirli Amerikalılar, yaşlılar ve engelliler için finanse edildi. Medicaid, özel pazarlar tarafından bırakılan boşluğu doldurur - primleri ödeyemeyenleri ve koşullarını sağlayanları kapsar. Program pahalı ve politik olarak karşılanıyor, ancak ölüm azaltımı etkileri ölçülebilir ve gerçek."

 amendment_affordable_care_act: "Affordable Care Act"
 amendment_affordable_care_act_desc: "Affordable Care Act - Obamacare olarak bilinen - tüm vatandaşların sağlık sigortası taşıdığını, özel kapsama için düzenlenmiş pazarlar yaratır ve Medicaid uygunluk genişletir. Sigortacılar önceden gelişmekte olan koşullar için kapsamazlar. Bireysel görev derinden tartışmalıdır. Destekçiler, sigorta piyasalarının işlevini yapmanın tek yoludur. Muhalefetler hükümete özel ekonomik kararlara ulaşmalarını istiyor."

 amendment_federal_assault_weapons_ban: "Federal Saldırı Silahları Ban"
 amendment_federal_assault_weapons_ban_desc: "Sivil satış için belirtilen yarı otomatik silah ve yüksek kapasiteli dergilerin üretimine on yıllık federal bir yasak. Yasak karşılanır - rakipler tarafından tartışılan etkinliği, destekçileri tarafından tartışılması. Yenilenmeden on yıl sonra sona erer. Onu geçen siyasi koalisyon kırılgandır ve silah lobisi zaten yanıtını hazırlıyor."

 amendment_authorization_military_force: "Askeri Kuvvet Kullanımı için Yetki"
 amendment_authorization_military_force_desc: "Askeri Kuvvetlerin Kullanımının Yetkisi, [ROOT.GetCountry.GetName]'deki terör saldırılarına karşı askeri kuvvet kullanma yetkisini verir ve onları liman edenler. Dil kasıtlı olarak geniştir. Yasal akademisyenler sınırları hakkında on yıllar boyunca tartışacaktır - ya da sahip olup olmadığını. Pratikte, tek taraflı askeri eylemin diplomatik maliyetini azaltır ve [ROOT.GetCountry.GetName] uluslararası arenaya ulaşır."

 amendment_patriot_act: "PATRIOT Yasası"
 amendment_patriot_act_desc: "Amerika'yı Appropriate Tools'u Intercept ve Obstruct Terörizm Yasası için gerekli kılan ve güçlendirerek - PATRIOT Yasası olarak bilinen - aile gözetim otoritelerini dramatik bir şekilde genişletir. Hukuk uygulanması iletişimi izleyebilir, finansal işlemleri takip edebilir ve daha öncekinden daha az yargı kontrolleri olan ajanslarla istihbarat paylaşabilirsiniz. Turmoil ve devrimci baskı düşer. Sivil özgürlükler bunu [ROOT.GetCountry.GetName] tarihinde anayasal mahremiyetin en önemli erozyonu olarak tanımlamaktadır."

 amendment_crime_bill_1994: "Violent Crime Control ve Law Execution Act"
 amendment_crime_bill_1994_desc: "1994 Crime Bill, [ROOT.GetCountry.GetName]'nin tarihindeki en büyük suç yasasıdır. On binlerce yeni polis memuru finanse ediyor, federal hapishane sistemini genişletiyor, bir dizi suç için zorunlu asgari cümleleri tanıtıyor ve kadınlara karşı şiddet yaratıyor. Turmoil düşer. Altında en ağır polis toplulukları mirasının farklı bir görüşüne sahip olacaktır."

 # ==========================================
 # CHINA
 # ==========================================

 amendment_china_tax_reform_1994: "Tax-Sharing System Reform"
 amendment_china_tax_reform_1994_desc: "1994 vergi reformu, kurumsal tabanlı mali sistemi değiştirdi - hangi yerel hükümetler Pekin ile gelir paylaşımı düzenlemeleri müzakere etti - ulusal bir değere dayalı vergi ve resmi bir gelir paylaşımı formülü ile. Reform dramatik bir şekilde finansal gücü merkezileştirmiştir. Pekin güvenilir ve büyüyen bir gelir akışı kazandı. Yerel hükümetler takdiri kaybetti, ancak açıklık kazandılar. [ROOT.GetCountry.GetName] modern mali mimarisinin temelidir."

 amendment_one_child_policy: "Bir çocuk politikası"
 amendment_one_child_policy_desc: "Devlet, finansal teşviklerin, sosyal baskının bir kombinasyonu aracılığıyla aile başına bir çocuğun limitini uygular ve bazı durumlarda kakao müdahalesini uygular. Doğum oranı keskin bir şekilde düşüyor. Sonraki yıllarda, [ROOT.GetCountry.GetName] hızla yaşlanır ve işgücü sözleşmeyecektir. Politika, kentsel alanlarda en katı ve kırsal kesimlerde en eşitsiz şekilde uygulanır. Uluslararası topluluk ve yerli eleştirmenler her iki yöntemine itiraz ederler."

 amendment_socialist_market_economy: "Sosyalist Pazar Ekonomisi"
 amendment_socialist_market_economy_desc: "Sosyalist piyasa ekonomisi, [ROOT.GetCountry.GetName]'nin nihai ekonomik ve politik yönü koruduğu teorik çerçevedir. Özel işletmeye izin verilir ve devlet tarafından belirlenen sınırlar içinde teşvik edilir. Yabancı yatırım seçici olarak karşılandı. çelişkiler gerçek ve kasıtlıdır - çerçeve, parti kontrolü olmadan piyasa verimliliğini kullanmak için tasarlanmıştır. Bu, kendi tarzında çalışır."

 # ==========================================
 # FRANCE
 # ==========================================

 amendment_35_hour_work_week: "35- Saat İş Haftası"
 amendment_35_hour_work_week_desc: "Aubry Yasaları, çoğu çalışan için yasal 35 saatlik bir çalışma haftası, 39'dan standart saati azaltır. Politika, nüfusun üzerinde daha geniş bir şekilde iş paylaşmanın bir yolu olarak sunuldu - işçi başına daha az saat, daha fazla işçi istihdam etti. Sendikalar kutluyor. İşverenler maliyetleri artırıyor ve esnekliği azaltır. Aslında istihdamı artırıp yalnızca mevcut işleri yeniden dağıtmayacağı tartışma hızla çözülmeyecek."

 amendment_pasqua_law: "Pasqua Law"
 amendment_pasqua_law_desc: "Pasqua Yasası, göç düzenlemeleri önemli ölçüde sıkılaştırıyor – doğallaştırma gereksinimleri, aile yenidenlaştırma haklarını azaltıyor ve yasadışı olarak girenler için kalma hakkı için yeni kısıtlamalar genişletti. İçişleri Bakanı Charles Pasqua, ulusal düzen ve kültürel tutarlılık meselesi olarak çerçeveliyor. Eleştirmenler, [ROOT.GetCountry.GetName]'nin iltica geleneğini ve dahil edilmesini kasıtlı olarak iddia ediyor. Kanun önemli kamu desteği ve önemli protestolarla geçer."

 amendment_medicaid_modifier: "Medicaid"
 amendment_medicaid_modifier_desc: "Federal sağlık sigortası düşük gelirli vatandaşları kapsar. Ölüm, özellikle en fakir tabaka arasında azaltılır."

 amendment_affordable_care_act_modifier: "Obamacare"
 amendment_affordable_care_act_modifier_desc: "Mandated özel sağlık kapsamı sübvansiyonlar ve önceden mevcut durum korumaları ile ilgili. Ölüm mütevazı düşüyor; orta gelirli işverenler ve devlet için maliyetler yükseliyor."

 amendment_federal_assault_weapons_ban_modifier: "Federal Saldırı Silahları Ban"
 amendment_federal_assault_weapons_ban_modifier_desc: "Belirtilen yarı otomatik silahların işlenmesi ve satışı yasaktır. Radikalleşme marjinal olarak azaltılır."

 amendment_authorization_military_force_modifier: "Askeri Kuvvet Kullanımı için Yetki"
 amendment_authorization_military_force_modifier_desc: "Devlet dışı aktörlere karşı askeri güç kullanmak için genel yönetim, diplomatik müdahale maliyetini azaltır ve [ROOT.GetCountry.GetName]'nin ilan edilen çıkarları genişletir."

 amendment_patriot_act_modifier: "PATRIOT Yasası"
 amendment_patriot_act_modifier_desc: "İç gözetim otoritelerini genişletmek, karmaşa ve devrimci aktiviteyi bastırıyor. Legitimacy ve diplomatik itibarı mütevazı bir hit aldı."

 amendment_crime_bill_1994_modifier: "1994 Crime Bill"
 amendment_crime_bill_1994_modifier_desc: "Genişleme ve zorunlu minimumlar karmaşayı azaltır. İcra ölümleri mütevazı bir şekilde yükseldi. Bütçe baskı altında."

 amendment_china_tax_reform_1994_modifier: "Tax-Sharing System Reform"
 amendment_china_tax_reform_1994_modifier_desc: "Merkezileştirilmiş bir değere dayalı vergi sistemi mali geliri artırmak ve atıkları azaltmaktır. Otorite marjinal olarak gelişmiştir."

 amendment_one_child_policy_modifier: "Bir çocuk politikası"
 amendment_one_child_policy_modifier_desc: "Devlet destekli doğum sınırları doğum oranını keskin bir şekilde azaltmıştır. [ROOT.GetCountry.GetName] nüfusunun önümüzdeki yıllarda önemli ölçüde yaşlanacağı."

 amendment_socialist_market_economy_modifier: "Sosyalist Pazar Ekonomisi"
 amendment_socialist_market_economy_modifier_desc: "Parti yönünde faaliyet gösteren piyasa mekanizmaları, özel inşaatın artırılması ve endüstriyel yatırımları artırmaktır. Komünist hareket desteği mütevazı bir şekilde azaltılır."

 amendment_35_hour_work_week_modifier: "35- Saat İş Haftası"
 amendment_35_hour_work_week_modifier_desc: "Çalışma saatleri üzerinde yasal sınırlar, çalışma koşullarını önemli ölçüde geliştirdi. Forput marjinal olarak azaltılır. Sendikalar memnun; işverenler değil."

 amendment_pasqua_law_modifier: "Pasqua Law"
 amendment_pasqua_law_modifier_desc: "Darer göçmen gereksinimleri kısıtlayıcılığı artırdı ve göçü azalttı. Evsiz popülasyonların kültürel kabulü düştü."
