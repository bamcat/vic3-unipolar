objective_the_west_name_USA:0 "Sole Superpower"
objective_the_west_name_GBR:0 "Sorunlar"
objective_the_west_name_FRA:0 "Mitterrand'ın Fransa"

objective_the_west_desc_USA:0 "Amerika Birleşik Devletleri, 21. yüzyılın başında eşsiz bir konumda kendini bulur. Dünyanın ilk süper gücü olmak ve en güçlü ulus devleti insanlık hiç görülmedi, Cumhuriyet zor dış ve iç konulardan oluşan bir dizi karşı karşıyadır. Amerika'nın ana rakibinin çöküşüne rağmen, Sovyetler Birliği, terörizm tehdidi, Çin ve Amerika'nın özgür dünyaya yönelik diğer tehditler sorgulanıyor. Amerika Birleşik Devletleri dünya süper gücü kalacak mı? Zaman söyleyecek."
objective_the_west_desc_GBR:0 "1992 yılında, Birleşik Krallık ekonomik belirsizlik ve siyasi çalkantılarla doludur. Ülke yakın zamanda yüksek işsizlik ve tüketici güveninde bir kesintiyle ortaya çıktı. Kuzey İrlanda'daki İngiliz woes, istikrarsızlık eklemek için, şimdi 'The Troubles' sıcak bir tartışma konusu olmaya devam ediyor. Britannia bu çalkantılı zamanlarda nasıl hayatta kalacak?"
objective_the_west_desc_FRA:0 "Fransa'nın siyasi manzarası, Avrupa entegrasyonu ve iç ekonomik zorluklar üzerinde gerginlik ile işaretlendi. Başkan François Mitterrand, ikinci döneminde bir sosyalist, ülke yüksek işsizlik ve sluggish ekonomik büyüme ile mücadele ettiği gibi popülerlikle karşı karşıya kaldı. Başbakan Pierre Bérégovoy tarafından yönetilen hükümeti, ekonomiyi stabilize etmeyi amaçlayan bir kamu hoşnutsuzluk önlemleriyle karşı karşıya kaldı. Siyasi olarak, Fransa, Avrupa entegrasyonunu güçlendirmek ve Euro için yol açmayı amaçlayan Maastricht Antlaşması üzerinde derinden bölünmüştü. AB 21. yüzyılda hayatta kalmak için gerekenlere sahip midir?"

objective_the_east_name_RUS:0 "Sovyetler Birliği'nin Sonbaharı"
objective_the_east_name_PRC:0 "Büyük Halk Cumhuriyeti"
objective_the_east_name_IRQ:0 "Saddam Hüseyin Irak"

objective_the_east_desc_RUS:0 "Rusya, 1991 Aralık ayında Sovyetler Birliği'nin dağılmasını takiben dramatik bir siyasi dönüşüm geçiriyor. Boris Yeltsin, Rusya Federasyonu'nun ilk başkanı, merkezi bir komünist sistemden piyasa ekonomisine kadar kaotik geçiş yaparken kaçan bir demokrasinin son derece meydan okumasıyla karşı karşıya kaldı. Yerli olarak, Yeltsin hükümeti siyasi istikrarsızlıkla, yükselen enflasyonla ve yaygın sosyal huzursuzluklarla mücadele etti, “şock terapisi” olarak bilinen ekonomik reformlar milyonlarca zorlukla başa çıktı. Diplomatik olarak, Rusya, eski Sovyet cumhuriyetleri üzerindeki etkisini sürdürmek için Batı güçleriyle yeni ilişkileri yeniden tanımlamak istedi."
objective_the_east_desc_PRC:0 "Çin, Batı ülkelerinden uluslararası izolasyondan ve yaptırımlardan ihtiyatlı olarak ortaya çıkıyor. Siyasi olarak, ülke, Çin Komünist Partisi'nin (CCP) kontrolünün altındaydı ve Deng Xiaoping, liderlik pozisyonlarından resmen emekli olmasına rağmen önemli etkiyi sürdürüyordu. 1992'nin başlarındaki ünlü "Güney Tour", Çin'in ekonomik reforma olan ve açılmaya olan taahhüdünü yeniden canlandırdı ve piyasa odaklı politikalara ve küresel ekonomi ile daha büyük entegrasyona yol açtı."
objective_the_east_desc_IRQ:0 "Reeling from a devastating loss in the Gulf War last year, and facing intense international isolation. Saddam Hussein remained firmly in power, maintaining an iron grip on the country through brutal repression of internal dissent, particularly against the Shi'a in the south and the Kurds in the north. Iraq truly has several paths going into the 2000s.

objective_rising_powers_name_IDA:0 "Hint Yüzyılı"
objective_rising_powers_name_BRZ:0 "Brezilya'nın Dominance Yükselişi"
objective_rising_powers_name_VNM:0 "Vietnam'ın Yükselişi"

objective_rising_powers_desc_IDA:0 "Hindistan, önemli siyasi ve ekonomik değişimin bir dönemini sarsıyor. Ülke, 1991'de iktidara gelen Başbakan P.V. Narasimha Rao tarafından yönetiliyordu ve ekonomiyi liberalleştirmek ve küresel piyasayla daha yakınlaştırmayı amaçlayan bir dizi dönüştürücü ekonomik reform başlattı."
objective_rising_powers_desc_BRZ:0 "1992'de Brezilya, 1985'te askeri kuralın sonunu takip eden bir siyasi geçişin ortasındaydı. Ülke, 1990 yılında Brezilya'nın ilk doğrudan 20 yıl içinde seçilmiş başkanı olarak görev yapan Başkan Fernando Collor de Mello tarafından yönetiliyordu. Collor'un hükümeti, ekonomiyi stabilize etmeyi amaçlayan bir ekonomik reform dalgasıyla başladı, ancak yönetimi yakında artan enflasyon ve yolsuzluk suçlamaları nedeniyle kamu hayal kırıklığıyla karşı karşıya kaldı. 1992'ye kadar Collor büyük bir yolsuzluk skandalına maruz kaldı, kitlesel protestolara yol açtı ve onun çaresizliği çağrısında bulundu. Diplomatik olarak, Brezilya uluslararası imajını geliştirmeye ve Latin Amerika'daki etkisini genişletmeye odaklandı. Ayrıca, küresel konularda rolünü iddia ederken Batı ülkeleri ile daha yakın ilişkiler arıyordu, özellikle Amazon yağmurları ile ilgili çevresel konularda. Bununla birlikte, siyasi istikrarsızlık ve ekonomik zorluklar ulusal gündemi ele almaya devam etti."
objective_rising_powers_desc_VNM:0 "Vietnam, Vietnam Savaşı'nın sonunda ve ekonomik yaptırımların sert etkilerini takip eden uluslararası topluluğa giderek geri döndü. 1992'de Vietnam, Birleşik Devletler ile normal ilişkiler kurdu ve Güneydoğu Asya Birliği (ASEAN) Birliği'ne katıldı, Batı ile ilişkileri geliştirmek için daha fazla bölgesel işbirliğine ve bir ilgiye işaret ediyor. Vietnam hangi yolu alacak? Size kalmış."
