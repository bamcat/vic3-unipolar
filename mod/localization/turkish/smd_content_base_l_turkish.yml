 great_polarization.38.t:0 "U.S Capitol Besieged"
 great_polarization.38.d:0 "Bir kalabalık, Amerika Birleşik Devletleri'ne acı bir seçimden sonra fırtına açtı, ülkeyi şok etti ve siyasi çatışmanın anayasal kısıtlamalarla kırıldığı korkuları derinleştirdi."
 great_polarization.38.f:0 "Zounda bir simge alanı haline gelir."
 great_polarization.38.a:0 "Cumhuriyet titriyor."
 great_polarization.38.b:0 "Saldırıyı Condemn ve güven yeniden inşa edin."
 
