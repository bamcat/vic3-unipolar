 great_polarization.130.t:0 "Blue America'yı mı arıyorsunuz?"
 great_polarization.130.d:0 "Amerika Birleşik Devletleri kırıldı, yönetimin liberal veya merkezi sol karakteri, Blue America'ya en yakın yerde duruyor. Mavi Amerika olarak savaşa devam edebilir veya Amerika Birleşik Devletleri'nin kalıntılarıyla kalabilirsiniz."
 great_polarization.130.f:0 "Bir hükümet sürekliliği iddia edebilir, ancak güç hala itaat eden kurumları takip eder."
 great_polarization.130.a:0 "Blue America'ya geçiş."
 great_polarization.130.b:0 "Amerika Birleşik Devletleri olarak kal."

 great_polarization.131.t:0 "Red America'yı mı arıyorsunuz?"
 great_polarization.131.d:0 "Amerika Birleşik Devletleri kırıldı, yönetim sağ kanat Kırmızı Amerika'ya en yakın yerlerdir. Savaş Red America olarak devam edebilir veya Amerika Birleşik Devletleri'nin kalıntılarıyla kalabilirsiniz."
 great_polarization.131.f:0 "Bayrak aynı şekilde, ancak altındaki ülke değişti."
 great_polarization.131.a:0 "Red America'ya geçiş."
 great_polarization.131.b:0 "Amerika Birleşik Devletleri olarak kal."

