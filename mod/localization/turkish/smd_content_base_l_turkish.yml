 je_rise_of_the_right:0 "Sağın Yükselişi"
 je_rise_of_the_right_reason:0 "Batı'da, sağ popülist hareketler medya parçalanması, göç backlash, kültür savaş politikası ve anti-fikreasyonla güç kazanıyor. 2035'e kadar, sağ kanat hareketleri daha güçlü ve sağ popülist liderler ortaya çıkma olasılığı daha yüksektir."

 rise_of_the_right_status_baseline:0 "Doğru hareketler güç kazanıyor."
 rise_of_the_right_status_strong:0 "Sağ popülist bir dalgalanma, ulusal siyaseti yeniden şekillendiriyor."
 rise_of_the_right_completion_header:0 "Bu dalga 2035'ten sonra azalır."
 rise_of_the_right_ends_2035_tt:0 "The Rise of the Right end after #bold 1 Ocak 2035#!"
 rise_of_the_right_spawnrate_tt:0 "Sağ popülist lider spawn oranı arttı. Tam spawn ağırlıkları ideoloji/karacter spawn dosyalarında elle ele alınır."

 rise_of_the_right.1.t:0 "Sağın Yükselişi"
 rise_of_the_right.1.d:0 "Yeni bir sağ popülist akım ulusal politikaya girdi. Bu, kurumların güvensizliklerinden, elitlerdeki öfkeden, kültürel arkadanştan ve parçalanmış bir medya ortamından güç alır."
 rise_of_the_right.1.f:0 "Eski partiler hala ofisleri tutuyor. Yeni politika kalabalığın nasıl tutulmasını öğreniyor."
 rise_of_the_right.1.a:0 "Siyasi merkez artık güvenli değil."

 rise_of_the_right.10.t:0 "Algoritma"
 rise_of_the_right.10.d:0 "Online siyasi ağlar, geleneksel partiler dışında organize etmenin doğru soluklu popülist hareketler vermek için geliştirilmiş bir anti-fikre sahiptir."
 rise_of_the_right.10.f:0 "Bir yem bir ralli olur. Bir şikayetler bir platform haline gelir."
 rise_of_the_right.10.a:0 "Outrage yayılıyor."
 rise_of_the_right.10.b:0 "Sivil kurumlar aracılığıyla geri dönün."

 rise_of_the_right.11.t:0 "Migration Backlash"
 rise_of_the_right.11.d:0 "Göçmen, entegrasyon ve ulusal kimlik üzerindeki öfke artışı sağ kanatlarını güçlendirdi."
 rise_of_the_right.11.f:0 "Sınır, eski düzenin cevap veremeyeceği her korku için bir sembolü haline gelir."
 rise_of_the_right.11.a:0 "Arkalash büyür."
 rise_of_the_right.11.b:0 "Tartışmayı genişletin."

 rise_of_the_right.12.t:0 "Populists Break Through"
 rise_of_the_right.12.d:0 "Sağ popülist bir gerçekleme eski parti sistemi aracılığıyla kırıldı, ana partileri diline ve gündemine yanıt vermeye zorladı."
 rise_of_the_right.12.f:0 "Bir zamanlar odanın dışındaydılar. Şimdi oda etraflarında inşa edilmiştir."
 rise_of_the_right.12.a:0 "Doğru dalgalanmalar."
 rise_of_the_right.12.b:0 "Merkezi yeniden inşa edin."

 rise_of_the_right.13.t:0 "Street Politika"
 rise_of_the_right.13.d:0 "Şeytanlar, karşı mücadeleler ve viral çatışmalar, politikanın parlamentodan ve sokaklara geçtiği hissi derinleştirdi."
 rise_of_the_right.13.f:0 "chant, Larl formunda politikadır."
 rise_of_the_right.13.a:0 "Sokaklar radikalleşti."
 rise_of_the_right.13.b:0 "Cool the temperature."

