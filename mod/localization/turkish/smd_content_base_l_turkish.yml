 great_polarization.1.t:0 "Büyük Polarizasyon"
 great_polarization.1.d:0 "Amerika Birleşik Devletleri yeni bir siyasi kutuplaşma çağına giriyor, medya parçalanması, kültür savaş politikası ve ideolojik bloklar arasındaki karşılıklı korku."
 great_polarization.1.f:0 "Her seçim varoluşsal hale gelir. Her skandal kanıt olur. Her trajedi bir silah haline gelir."
 great_polarization.1.a:0 "Merkez çatmaya başlar."

 great_polarization.2.t:0 "Siyasi olarak Motivated Mass Shooting"
 great_polarization.2.d:0 "Aşırı politik retoriye bağlı bir kitlesel atış ülkeyi şok etti. Rakip gruplar derhal suç, güvenlik, sivil özgürlükler ve ideolojiyi tartışırlar."
 great_polarization.2.f:0 "Ölüler yatırılır. Hikaye cenazelerin başlamasından önce sona erdi."
 great_polarization.2.a:0 "Outrage bölmeyi besliyor."
 great_polarization.2.b:0 "Ciddi bir iki partili yanıt gör."

 great_polarization.3.t:0 "Araştırmacı"
 great_polarization.3.d:0 "Bir siyasi figüre yapılan bir suikast, siyasi şiddetin normalleştiğinden korkuyor."
 great_polarization.3.f:0 "atış hedefini kaçırdı, ancak cumhuriyeti vurdu."
 great_polarization.3.a:0 "Ülke Geri Döndü."
 great_polarization.3.b:0 "Koruyucu güvenliği genişletin."

 great_polarization.4.t:0 "Algoritma"
 great_polarization.4.d:0 "Sosyal medya platformları, milyonlarca radikal içeriğe, komplo ağlarına ve kimlik odaklı bir karşı-mobilizasyona maruz kalıyor."
 great_polarization.4.f:0 "Beslenme ikna edici değildir. Büyüyor."
 great_polarization.4.a:0 "Outrage makinesi hızlanıyor."
 great_polarization.4.b:0 "Baskı platformları ılımlı."

 great_polarization.5.t:0 "A Wave of Exposure"
 great_polarization.5.d:0 "Güçlü rakamlara karşı kamu iddialarının dalgası, istismar, cinsiyet ve kurumsal ikiyüzlülüğün ulusal bir hesabını tetikledi."
 great_polarization.5.f:0 "Ne fısıldandı şimdi aramalanabilir."
 great_polarization.5.a:0 "Hesap yayıyor."
 great_polarization.5.b:0 "Sorumluluk için kurumsal kanallar oluşturun."

 great_polarization.6.t:0 "Azınlıklar Hedeflendi"
 great_polarization.6.d:0 "Azınlık topluluklarına karşı düşmanlık artışı protestoları, karşı-protestleri ve ırkçılık, kimlik ve ulusal aidiyet üzerine yeni bir tartışma başlattı."
 great_polarization.6.f:0 "Bazıları için, geri döndü. Başkaları için, hayatta kalmaktır."
 great_polarization.6.a:0 "Sokaklar tekrar dolduruyor."
 great_polarization.6.b:0 "Gerici ve sıcaklığı daha düşük."

 great_polarization.20.t:0 "Sıcaklık Falls"
 great_polarization.20.d:0 "Polarizasyon ortadan kayboldu, ancak en tehlikeli spiral kesildi. Siyasi kurumlar bazı meşruiyeti geri kazandılar."
 great_polarization.20.f:0 "Bir cumhuriyet değil, çünkü vatandaşları aynı fikirde, ancak yeterlileri kaybetmeyi kabul ederler."
 great_polarization.20.a:0 "Sendika katlandı."

 great_polarization.21.t:0 "Bölünmüş"
 great_polarization.21.d:0 "Acil kriz sivil savaşa yol açmadı, ancak kutuplaşma Amerikan siyasi yaşamında gömülü hale geldi."
 great_polarization.21.f:0 "Ateş kırılmadı. Kronik oldu."
 great_polarization.21.a:0 "Yeni normal."

 great_polarization.100.t:0 "İkinci Amerikan İç Savaşı"
 great_polarization.100.d:0 "Bir devrimci kriz Amerika Birleşik Devletleri'ni kırdı. Federal otorite karşılanıyor ve silahlı gruplar ülkeyi rakip hükümetlere taşımaya başlıyor."
 great_polarization.100.f:0 "İlk sivil savaş, sendikanın hayatta kalabileceğini sordu. İkincisi, sendikanın bile ne olduğunu sorar."
 great_polarization.100.a:0 "Sendika kırıkları."

