 # ==========================================
 # JOURNAL ENTRY
 # ==========================================
 
 je_covid_pandemic: "1956-19 Pandemik"
 je_covid_pandemic_reason: "Yeni bir solunum koro virüsü [ROOT.GetCountry.GetName] ile ortaya çıktı ve dünya çapında hızla yayılıyor. Amman-19, canlı hafızadaki herhangi bir patojenden daha hızlı yayılır, birlikte modern dünyayı birbirine bağlayan yoğun ticaret ve seyahat ağlarını kullanın. Ölüm yaşlılar ve immünkompromasyonlar arasında yoğunlaşır - ancak oer her ülkede aşırı sağlık sistemlerini ele almak için tehdit eder.\n\n #bold AutoCAD-19< Responsex id=4/> Lockdowns ekonomiyi yavaşlatır ama çekiç eder. Maskeler ve distancing daha az etkili ama daha sürdürülebilir. Hiçbir şey yapmamak da bir seçimdir – bir seçmenler ve ölüler hatırlayacaktır."
 
 # ==========================================
 # covid.1 — PANDEMIC ARRIVES
 # ==========================================
 
 covid.1.t: "Bir Roman Coronavirüs"
 covid.1.d: "Sıra dışı zat vakalarının bir kümesi [SCOPE.sState('plague_origin_state').GetName], [ROOT.GetCountry.GetName] rapor edilmiştir. [ROOT.GetCountry.GetAdjective] sağlık yetkilileri daha önce bilinmeyen bir koronavirüs öneriyor - insan-insanı yaymak, taşıyıcıların hasta olduklarını bilmeden önce bulaşıcı olduğunu yeterince uzun süre.\n Dünya Sağlık Örgütü bilgilendirildi. Bu yerel bir salgın olarak kalır veya bir şey daha önümüzdeki haftalarda yapılan kararlara bağlıdır."
 covid.1.f: "Yeni bir patojen. Yine."
 covid.1.a: "WHO'yu değil ve temasa geçmeye başlar"
 
 # ==========================================
 # covid.2 — SPREAD
 # ==========================================
 
 covid.2.t: "AutoCAD-19 [ROOT.GetCountry.GetName]"
 covid.2.d: "İlk olarak [SCOPE.sCountry('plague_originator_country').GetName]'de tespit edilen roman koronavirüs vakaları [SCOPE.sCountry('plague_originator_country').GetName] [ROOT.GetCountry.GetName] ile doğrulandı. Virüs geldi - bir gezgin, bir ticaret rotası veya sadece bağlantılı bir dünyanın görünmez akımları.\n\n[ROOT.GetCountry.GetAdjective] sağlık yetkilileri salgın yanıt protokolleri uyguluyor. #bold Amman-19 Cevap#! politikayı belirleme kararı."
 covid.2.f: "Sadece zaman meselesiydi."
 covid.2.a: "Activate salgın protokolleri"
 
 # ==========================================
 # covid.3 — SUBSEQUENT WAVES
 # ==========================================
 
 covid.3.t: "Omicron Variant"
 covid.3.d: "Yeni bir değişken, yeni bir ultrason-19 enfeksiyonları dalgasına neden oldu. Sağlık yetkilileri kapsayıcı protokolleri yeniden değerlendiriyor."
 covid.3.f: "Virüs hala bizimle."
 
 # ==========================================
 # covid.4 — NOTIFICATION TO OTHER PLAYERS
 # ==========================================
 
 covid.4.t: "Wuhan'dan Yeni Virüs, Çin"
 covid.4.a: "Durumu yakından takip edin"
 
 # ==========================================
 # covid.5 — RESPONSE CHOICE
 # ==========================================
 
 covid.5.t: "Helsing-19 Yanıt Politikası"
 covid.5.d: "[ROOT.GetCountry.GetName] salgına nasıl cevap vermeli? Seçim önümüzdeki yıllarda ekonomik ve sosyal peyzajı tanımlayacaktır."
 covid.5.f: "İyi seçenekler yoktur. Sadece ticaret."
 covid.5.a: "Full Lockdown – yakın işletmeler, hareketi kısıtlar"
 covid.5.b: "Maske görevleri ve sosyal ayrışma yönergeleri"
 covid.5.c: "Ekonomiyi açık tutun – kurtarmaya öncelik verin"
 
 # ==========================================
 # covid.7 — WAR SUPPORT
 # ==========================================
 
 covid.7.t: "The Pandemic Undermines the War Effort"
 covid.7.d: "Amman-19 ravaging [ROOT.GetCountry.GetName] nüfusu ile [SCOPE.gsInterestGroup('pacifist_ig').GetName] - [SCOPE.sCharacter('pacifist_leader').GetFullName] tarafından yönetilen - bir ülke bir salgınla savaş aynı anda devam edebilir mi sorgulanır. Nüfus tükenmiştir. Alan hastaneleri kaynaklar için ön-line lojistik ile yarışıyor."
 covid.7.f: "Virüsle savaşmak veya düşmanla savaşmak. Her ikisi de zor."
 covid.7.a: "Savaş devam ediyor - virüs bunu değiştirmiyor"
 covid.7.b: "Ahlaki korumak için halk sağlığı mesajlaşmasını kullanın"
 covid.7.c: "Suppress the yenilgiist anlatı"
 
 # ==========================================
 # covid.8 — POVERTY AND EVICTIONS
 # ==========================================
 
 covid.8.t: "Pandemik Toll"
 covid.8.d: "pandeminin binlerce [ROOT.GetCountry.GetAdjective] işine mal oldu ve [SCOPE.sState('plague_poverty_state').GetName] işsizlik %20 aştı. Aileler kiralayamaz. Landlords - [SCOPE.gsInterestGroup('landowner_ig').GetName] tarafından desteklenen - ev sağına itiliyor. Yoksulluk zaten virüs tarafından en zor olan alanlarda yoğunlaşıyor."
 covid.8.f: "salgın içinde bir salgın."
 covid.8.a: "Bir kirayı dondurdu ve moratorium"
 covid.8.b: "Sosyal güvenlik ve işsizlik yararları"
 covid.8.c: "Pazar bunu sıralayacak"
 
 # ==========================================
 # covid.9 — ANTI-MASK RESISTANCE
 # ==========================================
 
 covid.9.t: "Anti-Lockdown Protestoları"
 covid.9.d: "[SCOPE.gsInterestGroup('anti_mask_ig').GetName], [SCOPE.sCharacter('anti_mask_ig_leader').GetFullName] tarafından yönetilen, [ROOT.GetCountry.GetName]'nin salgın kısıtlamalarına karşı kitlesel protestolar düzenledi. Onların pozisyonu: kilitler ve maske görevleri hükümete aşırı erişim, ekonomik hasar sağlık riskinden daha büyüktür ve vatandaşlar kendi seçimlerini yapma hakkına sahiptir.\n\n Protestolar büyüyor. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName] yanıtlar bir önceki ayarlanacaktır."
 covid.9.f: "Maskeler. seçtikleri tepe."
 covid.9.a: "Keep firm - kısıtlamalar kalır"
 covid.9.b: "Ayağa kalk - kısıtlamaları kaldırın"
 covid.9.c: "Komisyon bilimsel rebuttals ve halk sağlığı kampanyaları"
 
