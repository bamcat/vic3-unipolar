l_turkish:
 aristocrats:0 "@aristocrats! $aristocrats_no_icon$"
 aristocrats_only_icon:0 "@aristocrats!"
 aristocrats_no_icon:0 "Aristoteles"
 aristocrats_desc:1 "Zengin toprak sahipleri, eski bağlantıları olan eski para. Sadece [GetBuildingType('building_manor_house').GetName] [Concept('concept_building', '$concept_buildings$')], kendi çiftlikleri ve fabrikaları var. Bazı kârlarına [concept_investment_pool] katkıda bulunurlar. Onların siyasi çıkarları [GetInterestGroupVariant('ig_landowners',GetPlayer).GetNameWithCountryVariant] olarak temsil edilir."
 bureaucrats:0 "@bureaucrats! $bureaucrats_no_icon$"
 bureaucrats_only_icon:0 "@bureaucrats!"
 bureaucrats_no_icon:0 "Bürokrats"
 bureaucrats_desc:0 "Hükümet işlevleri ve altyapı yönetiminden sorumlu yetkililer. Politik olarak, Smartsia veya Petite Bourgeoisie ile uyumlu olma eğilimindedirler."
 capitalists:0 "@capitalists! $capitalists_no_icon$"
 capitalists_only_icon:0 "@capitalists!"
 capitalists_no_icon:0 "Kapitalistler"
 capitalists_desc:1 "Sektör Kaptanları, yeni bir dönem için yeni para. Sadece [GetBuildingType('building_financial_district').GetName] [Concept('concept_building', '$concept_buildings$')], madenleri ve manufacturies sahip oldukları yerde çalışırlar. Bazı kârlarına [concept_investment_pool] katkıda bulunurlar. Onların siyasi çıkarları [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetNameWithCountryVariant] olarak temsil edilir."
 clergymen:0 "@clergymen! $clergymen_no_icon$"
 clergymen_only_icon:0 "@clergymen!"
 clergymen_no_icon:0 "Clergymen"
 clergymen_desc:0 "Rahipler, akademisyenler ve diğer dini liderler kırsal nüfusun manevi ihtiyaçlarına eğilimlidir. Siyasi olarak, Devout'ın arka kemiğidir."
 clerks:0 "@clerks! $clerks_no_icon$"
 clerks_only_icon:0 "@clerks!"
 clerks_no_icon:0 "Beyaz-Collar İşçileri"
 clerks_desc:0 "Alt düzey ofis işçileri hükümet, altyapı ve dükkanlarda idari görevleri yerine getirir. Petite Bourgeoisie'nin ortak bir parçası, ancak bazıları Sendikalara katılır."
 engineers:0 "@engineers! $engineers_no_icon$"
 engineers_only_icon:0 "@engineers!"
 engineers_no_icon:0 "Mühendisler Mühendisler"
 engineers_desc:1 "Teknik çözümlerin öncüleri ve tasarımcıları, üretim, madencilik ve inşaat gibi sektörlerde gelişmiş makinelerle çalışmak. Bazıları Industrialists veya Petty Bourgeoisie'yi desteklerken, diğerleri Sendikalara katılırken."
 farmers:0 "@farmers! $farmers_no_icon$"
 farmers_only_icon:0 "@farmers!"
 farmers_no_icon:0 "Çiftçiler"
 farmers_desc:0 "Sharecroppers, küçük pay sahipleri ve istikrarlı ama gıda veya büyüyen nakit bitkileri üreten diğerleri. Çoğu ilgi alanlarını Kırsal Halk olarak temsil ediyor."
 peasants:0 "@peasants! $peasants_no_icon$"
 peasants_only_icon:0 "@peasants!"
 peasants_no_icon:0 "Peasants"
 peasants_desc:2 "Subsistence çiftçiler sadece [Concept('concept_subsistence_building', '$concept_subsistence_buildings$')], çoğunlukla kendi ihtiyaçları için kullandıkları tarımsal ve basit üretilen ürünler ürettiler. Hayatta kalmak için [concept_subsistence_output]'ye güveniyorlar ve sadece [concept_market] ekonomisinde sınırlı bir rol oynarlar. [Concept('concept_politically_unaligned_aligned', '$concept_politically_unaligned$')] olma eğilimindedirler."
 laborers:0 "@laborers! $laborers_no_icon$"
 laborers_only_icon:0 "@laborers!"
 laborers_no_icon:0 "Blue-Collar İşçileri"
 laborers_desc:0 "Gün işçileri, çiftlik elleri ve diğerleri iş güvenliğine az, toplum boyunca herhangi bir iş mevcut değildir. Genellikle siyasetle meşgul değiller, ancak Sendikalar aracılığıyla katılabilirler."
 officers:0 "@officers! $officers_no_icon$"
 officers_only_icon:0 "@officers!"
 officers_no_icon:0 "Memurlar"
 officers_desc:0 "Komisyon görevlileri, ulusun ordu ve donanmadaki askeri güçleri komuta etti. Siyasi olarak, silahlı güçlerin üst echelonlarını temsil ediyorlar."
 academics:0 "@academics! $academics_no_icon$"
 academics_only_icon:0 "@academics!"
 academics_no_icon:0 "Akademik Akademik"
 academics_desc:0 "Araştırmacılar, doktorlar, avukatlar ve diğer eğitimli profesyoneller akademik kurumlarda okuyor ve öğretiyorlar. Politik olarak, Akıllıya'nın ön saflarındalar."
 shopkeepers:0 "@shopkeepers! $shopkeepers_no_icon$"
 shopkeepers_only_icon:0 "@shopkeepers!"
 shopkeepers_no_icon:0 "Küçük İşletme Sahipleri"
 shopkeepers_desc:0 "Mağaza sahipleri ve yöneticileri, şehirlerdeki müşterilere savaş satıyorlar. Genellikle Petite Bourgeoisie siyasi olarak düşerler."
 slaves:0 "@slaves! $slaves_no_icon$"
 slaves_only_icon:0 "@slaves!"
 slaves_no_icon:0 "Köleler"
 slaves_desc:0 "Bir kişi olarak değil, mülk olarak, kölenin izin verildiği ülkelerdeki çeşitli sektörlerde zorla iş yapmak. Onların statüsü nedeniyle, politikaya katılmalarına izin verilmez."
 soldiers:1 "@soldiers! $soldiers_no_icon$"
 soldiers_only_icon:1 "@soldiers!"
 soldiers_no_icon:1 "Servismen"
 soldiers_desc:0 "Askerler ve denizciler ülkenin askeri personelinin toplularını oluşturuyorlar. Silahlı Kuvvetlerin bir parçası olarak siyasi olarak rollerini birleştirirler."
 machinists:0 "@machinists! $machinists_no_icon$"
 machinists_only_icon:0 "@machinists!"
 machinists_no_icon:0 "Machinists"
 machinists_desc:0 "Manufacturies, mayınlar, mekanik çiftlikler ve diğer sektörlerde istikrarlı iş makineleri olan manuel işçiler. Siyasi olarak, Sendikalarda bir sürüş kuvveti olma eğilimindedirler."
  
 ACADEMICS_QUALIFICATIONS_DESC:0 "Sadece yeterli [concept_literacy] ile pops #v $academics$#! Potansiyel daha büyük [concept_literacy] ve [concept_wealth] ile artar. [concept_culture]'nin düşük [concept_acceptance] çok daha uzun bir süre alması. #v $clerks$#! ve #v $aristocrats$#! özellikle kolay bir zaman #v $academics$#!"
 ARISTOCRATS_QUALIFICATIONS_DESC:0 "Sadece yeterli [concept_wealth] ile pops #v $aristocrats$#! Potansiyel daha büyük [concept_wealth] ve daha az derece [concept_literacy] ile artar. [concept_culture]'nin düşük [concept_acceptance] çok daha uzun bir süre alması. #v $officers$#! ve #v $bureaucrats$#! özellikle kolay bir zaman #v $aristocrats$#!"
 BUREAUCRATS_QUALIFICATIONS_DESC:0 "Sadece yeterli [concept_literacy] ile pops #v $bureaucrats$#! Potansiyel daha büyük [concept_literacy] ile artar. [concept_culture] düşük [concept_acceptance] çok daha uzun bir zaman alır, her iki [concept_culture] ve [concept_religion] yüksek $concept_acceptance$ #v $clerks$< id=12/> ve #v $clergymen$#! özellikle kolay bir zaman #v #v $bureaucrats$<x=18/>"
 CAPITALISTS_QUALIFICATIONS_DESC:0 "Sadece yeterli [concept_wealth] ile pops #v $capitalists$#! Potansiyel daha büyük [concept_wealth] ve [concept_literacy] ile artar. [concept_culture]'nin düşük [concept_acceptance] çok daha uzun bir süre alması. #v $shopkeepers$#! ve #v $engineers$#! özellikle kolay bir zaman #v $capitalists$#!"
 CLERGYMEN_QUALIFICATIONS_DESC:0 "Sadece yeterli [concept_literacy] ile pops #v $clergymen$#! Potansiyel daha büyük [concept_literacy] ile artar. [concept_religion] düşük [concept_acceptance] çok daha uzun bir zaman alır, [concept_religion] yüksek $concept_acceptance$ #v $academics$<x=11/> ve $aristocrats$$aristocrats$#! özellikle kolay zaman #v #v $clergymen$$clergymen$$clergymen$$clergymen$"
 CLERKS_QUALIFICATIONS_DESC:0 "Herhangi bir pop #v $clerks$#! Potansiyel daha büyük [concept_literacy] #v $laborers$#! #v $clerks$#!"
 ENGINEERS_QUALIFICATIONS_DESC:0 "Sadece yeterli [concept_literacy] ile pops #v $engineers$#! ve [concept_wealth] #v $machinists$#! ve #v#!#!#! özellikle kolay bir zaman [concept_wealth] $engineers$ $engineers$<x id=>#!"
 FARMERS_QUALIFICATIONS_DESC:0 "Herhangi bir pop #v $farmers$#! Potansiyel daha büyük [concept_wealth] #v $peasants$#! ve #v $laborers$#! özellikle kolay bir zaman #v $farmers$#!#!"
 MACHINISTS_QUALIFICATIONS_DESC:0 "En az [concept_literacy] ile Pops #v $machinists$#! Potansiyel daha büyük [concept_literacy] #v $laborers$#! #v $machinists$#!"
 OFFICERS_QUALIFICATIONS_DESC:0 "#v $soldiers$#! veya [concept_culture] yeterince yüksek [concept_acceptance] #v $officers$$officers$ Potansiyel daha büyük [concept_literacy] #v $aristocrats$#! #v $officers$#!"
 SHOPKEEPERS_QUALIFICATIONS_DESC:0 "Sadece bazı [concept_wealth] ile pops #v $shopkeepers$#! Potansiyel daha fazla [concept_wealth] #v $clerks$#! ve #v $farmers$#! #v $shopkeepers$#!"
