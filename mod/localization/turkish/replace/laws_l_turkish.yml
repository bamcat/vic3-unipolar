l_turkish:
  
  # Leader Ideologies
 ideology_moderate:0 "Moderate"
 ideology_moderate_desc:0 "#lore Bu lider, ilgi Grubunda, kendi ideolojisi ile ılımlı olarak kabul edilir.#!"
 
 ideology_traditionalist:0 "Gelenekselist"
 ideology_traditionalist_desc:0 "#lore Bu lider geleneksel gümrükleri korumakta, onları doğal yasaların bir uzantısı olarak görmektedir. #!"

 ideology_traditionalist_minoritarian: "Minoritarian Traditionalist"
 ideology_traditionalist_minoritarian_desc:0 "#lore Bu lider geleneksel gümrükleri korumakta, onları doğal yasaların bir uzantısı olarak görmektedir. Ülkeleri farklı bir dinin kuralı altında kalırken, halk dinini populace'e karşı hapsedecekler. #!"

 ideology_atheist:1 "Nihilist"
 ideology_atheist_desc:1 "#lore Bu lider, geleneksel sosyal düzenin ve kurumların tüm maliyetlerdeki sorgulamaya ve ayrımına öncelik veriyor, kapsamlı bir devrimci toplum için zemini temizlemek istiyor. #!"

 ideology_republican_leader:0 "Cumhuriyetçi Cumhuriyetçi Cumhuriyetçi Cumhuriyetçi"
 ideology_republican_leader_desc:0 "#lore Bu lider seçilmiş yetkililer tarafından yönetilen bir cumhuriyet kurmak istiyor. #!"

 ideology_radical:0 "Radikal Radikal Radikal Radikal"
 ideology_radical_desc:0 "#lore Bu lider demokratik idealleri ilerleten radikal liberal reformlar için çabalamaktadır. #!"

 ideology_abolitionist:0 "Abolitionist"
 ideology_abolitionist_desc:0 "#lore Bu lider, köleyi insan haklarına aykırı bulur ve dünyayı ortadan kaldırmaya çalışır. #!"

 ideology_slaver:0 "Slav"
 ideology_slaver_desc:0 "#lore Bu lider, köleyi yaşam tarzının doğal bir parçası olarak görüyor ve ortadan kaldırmasına karşı çıkıyor. #!"

 ideology_feminist:0 "Feminist Feminist Feminist"
 ideology_feminist_desc:0 "#lore Bu lider, kadınların erkeklere eşit olduğunu ve haklarının vatandaşları olarak genişletilmesi için çabalamaktadır.#!"
 
 ideology_reformer:0 "Reformer"
 ideology_reformer_desc:0 "#lore Bu lider, toplumu biraz daha eşit hale getirmek için birkaç artış değişikliği yapmak istiyor. Ama çok fazla değil.#!"

 ideology_pacifist:0 "Pacifist"
 ideology_pacifist_desc:0 "#lore Bu lider, onların yöntemi ve barışı hedef olarak kabul etmiyor.#!"

 ideology_jingoist_leader:0 "Jingoist"
 ideology_jingoist_leader_desc:0 "#lore Bu lider agresif bir dış politikayı savunuyor, hırslarını ilerletmek için savaşa hazırlanmak için hazırlık yapıyor. #!"

 ideology_royalist:0 "Royalist"
 ideology_royalist_desc:0 "#lore Bu liderin sadıkları monarşiye ve onun haklı yöneticisine aittir.#!"
 
 ideology_social_democrat:0 "Sosyal Demokrat"
 ideology_social_democrat_desc:0 "#lore Bu lider, parlamento reformu yoluyla sosyalist bir topluma ulaşmaya inanıyor. #!"

 ideology_communist:0 "Komünist Komünist Komünist"
 ideology_communist_desc:0 "#lore Bu lider, işçi sınıfında gerekli olan her ne anlama geldiği konusunda inanıyor. #!"

 ideology_vanguardist:0 "Vanguardist"
 ideology_vanguardist_desc:0 "#lore Bu lider, özel radikallerin bir vanguard partisi aracılığıyla sosyalist bir topluma ulaşmaya inanıyor. #!"

 ideology_fascist:0 "Fascist"
 ideology_fascist_desc:0 "#lore Bu lider, modern bir bağlamda algılanan geleneksel, otoriter değerlerin yeniden canlanmasını sağlayan ultra milliyetçidir. #!"

 ideology_anarchist:0 "Anarşist"
 ideology_anarchist_desc:0 "#lore Bu lider hiyerarşinin, otoritenin ve devletin ortadan kaldırılmasını istiyor, insanları kendilerini yönetmelerini sağlıyor. #!"

 ideology_ethno_nationalist:0 "Ethno-Nationalist"
 ideology_ethno_nationalist_desc:0 "#lore Bu lider, etnik nedenlerle tanımlanmış bir ulusa inanıyor. #!"

 ideology_theocrat:0 "Theocrat"
 ideology_theocrat_desc:0 "#lore Bu lider, kilise tarafından dokrinal değerlere uygun bir durumda olduğuna inanıyor.#!"

 ideology_market_liberal:0 "Market Liberal"
 ideology_market_liberal_desc:0 "#lore Bu lider, özgür pazarın görünmez elinin ulusun ekonomisinin rehberlik gücü olması gerektiğine inanıyor."
 
 ideology_liberal_leader:0 "Liberal Liberal Liberal Liberal"
 ideology_liberal_leader_desc:0 "#lore Bu lider demokrasi kurumuna öncelik verir ve ulus üzerinde kanıtlanmamış bir kurala karşıdır. #!"

  # Interest Group Ideologies

 ideology_paternalistic:0 "Paternalist"
 ideology_paternalistic_desc:0 "#lore Bu grubun kendisini yönetmeye çalışan populuslara küçük inancı var, geleneksel bir aristokrasi rehberliğine ihtiyaçları var.#!"
  
 ideology_patriarchal:0 "Patlayıcı"
 ideology_patriarchal_desc:0 "#lore Bu grup, erkeklerin siyasi otoriteye sahip olması gerektiğine ve kadınların babalarına ve kocalarına uyması gerektiğine inanıyor.#!"
   
 ideology_republican:0 "Cumhuriyetçi Cumhuriyetçi Cumhuriyetçi Cumhuriyetçi"
 ideology_republican_desc:0 "#lore Bu grup en iyi liderlerin halk oylaması tarafından seçildiğine ve bir cumhuriyetçi hükümet biçimini desteklediğine inanıyor.#!"
  
 ideology_populist:0 "Populist"
 ideology_populist_desc:0 "#lore Bu grup insanlar tarafından yönetişime inanıyor ve franchise'ı tüm sosyal sınıflara genişletmeye çalışıyor.#!"
  
 ideology_stratocratic:0 "Stratocratic"
 ideology_stratocratic_desc:0 "#lore Bu grup, toplumdaki bir hiyerarşiyi geleneksel vergilendirme ve iş ilişkileri yoluyla sürdürmeyi tercih eder.#!"
  
 ideology_oligarchic:0 "Oligarşiic"
 ideology_oligarchic_desc:0 "#lore Bu grup, yerel oligarşiler tarafından kontrol edilen seküler bir devletin elindeki gücü tamamen destekliyor.#!"

 ideology_laissez_faire:0 "Laissez-Faire"
 ideology_laissez_faire_desc:0 "#lore Bu grup, ticaret ve iş kuvvetlerinin serbest akışına inanıyor, hükümetlerin üzerinde piyasaların yargısını destekliyor.#!"
  
 ideology_individualist:0 "Bireysel"
 ideology_individualist_desc:0 "#lore Bu grup, her kişinin kendi kaderlerinden sorumlu olduğuna ve hükümet programlarına bireysel olarak ödeme yapabilecek hizmetler sunacağına inanıyor.#!"
  
 ideology_pious:0 "Pious"
 ideology_pious_desc:0 "#lore Bu grup, dini ilkelerin ahlaki gerçeklere dayandığına ve tüm toplumun eşitleştirilmesi gerektiğine inanıyor.#!"
  
 ideology_particularist:0 "Katılımcı"
 ideology_particularist_desc:0 "#lore Bu grup, işlerinde yerel özerklik istiyor, indentured servitude hükümlerini ücretsiz.#!"
  
 ideology_isolationist:0 "Isolationistist"
 ideology_isolationist_desc:0 "#lore Bu grup, devletin yerli konulara odaklanmasını istiyor, yabancı toprakları da onlardan göç etmek için karşıt hırslar.#!"
  
 ideology_moralist:0 "Moralist"
 ideology_moralist_desc:1 "#lore Bu grubun dini bir ahlaki düzende güçlü bir inancı vardır ve bu düzen için bir tehdit olarak çeşitli görüşleri vardır.#!"
  
 ideology_jingoist:0 "Jingoist"
 ideology_jingoist_desc:0 "#lore Bu grup agresif bir dış politikaya inanıyor ve bir orduyu geri almaya devam ediyor.#!"

 ideology_loyalist:0 "Loyalist"
 ideology_loyalist_desc:0 "#lore Bu grup her vatandaşın devletin hayati işlevlerini finanse etmesi gerektiğine inanıyor.#!"
 
 ideology_meritocratic:0 "Meritocratic"
 ideology_meritocratic_desc:0 "#lore Bu grup başarı elde edilmiş ve elde edilenlerin, eşlik eden sorumluluğu ve serveti hak ettiğine inanıyor.#!"
   
 ideology_patriotic:0 "Patriotic"
 ideology_patriotic_desc:0 "#lore Bu grup ülkesine şiddetle adamış ve dissent yayılacak olanlara karşı sert önlemler istiyor.#!"
  
 ideology_liberal:0 "Liberal Liberal Liberal Liberal"
 ideology_liberal_desc:0 "#lore Bu grup, korumanın önemli değerleri olarak özgürlük ve yasal eşitliği görüyor.#!"
  
 ideology_anti_clerical:0 "Anti-Clerical"
 ideology_anti_clerical_desc:1 "#lore Bu grup, siyasi ve eğitim sisteminde organize dinin etkisini karşılamaktadır. rasyonel zihinlerin yönetişimin ön safında olması gerektiğine inanıyorlar.#!"
  
 ideology_proletarian:0 "Proletarian"
 ideology_proletarian_desc:0 "#lore Bu grup, bu çatışmadaki işçilerle sınıf mücadelesinin ve tarafların lensi aracılığıyla siyaseti görüyor.#!"
  
 ideology_egalitarian:0 "Egalitarian"
 ideology_egalitarian_desc:0 "#lore Bu grup, insanların eşit ve insan tedavisinin siyasi politikanın temel taşı olması gerektiğine inanıyor.#!"
   
 ideology_anti_slavery:0 "Anti-Slavery"
 ideology_anti_slavery_desc:0 "#lore Bu grup köleliği ve onu barbar bir geçmişin bir özelliği olarak görüyor.#!"
 
 ideology_pro_slavery:0 "Pro-Slavery"
 ideology_pro_slavery_desc:0 "#lore Bu grup köleyi iyi işleyen bir toplumun gerekli bir parçası olarak görüyor.#!"
  
 ideology_reactionary:0 "Reaksiyon"
 ideology_reactionary_desc:0 "#lore Bu grup geçmiş, gerçek ya da hayal kırıklığına uğratmak için nostaljik değildir, sadece krallar tek bir toplum üzerinde hükmedmiştir.#!"
 
 ideology_plutocratic:0 "Plutocratic"
 ideology_plutocratic_desc:0 "#lore Bu grup, zenginlerin karar vericiler olarak değerini kanıtladığını ve toplumun seyrini belirlemek için entelektüel bir elit oluşturduğunu düşünüyor.#!"

 ideology_agrarian:0 "Agrarian"
 ideology_agrarian_desc:0 "#lore Bu grup ekonomik politikanın odaklanmasının tarım ve çiftçilerin menfaatleri üzerinde olması gerektiğine inanıyor.#!"

 ideology_corporatist: "Corporatist"
 ideology_corporatist_desc: "#lore Bu grup, sınıfların dini ilkeleri uygulama yoluyla çözümüne inanıyor.#!"

 ideology_corporatist_leader: "Corporatist"
 ideology_corporatist_leader_desc: "#lore Bu lider, sınıf çatışmalarının üst sınıfından ve farklı sosyal gruplar arasındaki işbirliği ile çözümüne inanıyor.#!"

 ideology_agrarian_jeffersonian:0 "Jeffersonian"
 ideology_agrarian_jeffersonian_desc:0 "#lore Bu grup, küçük çiftçi sınıfının ülkenin temelini teşkil ettiğine inanıyor, özgür bir toplum için temel olarak birgarlık destekliyor.#!"

