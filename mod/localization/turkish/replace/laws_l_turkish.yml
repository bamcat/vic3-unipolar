 law_militarized_police:0 "Militarize Polis Kuvvetleri"
 law_militarized_police_desc:0 "Polisinizin askeri ekipman ve askeri eğitimini vererek, sizin iradenizi yerine getirmeye yönelik etkinliğini artırır."
  
