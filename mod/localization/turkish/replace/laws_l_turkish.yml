 law_private_health_insurance:0 "Özel Sağlık Sigortası"
 law_private_health_insurance_desc:0 "Nüfus sağlığı, özel sağlık sigortası programları aracılığıyla ödenen özel hastanelerin bir sistemi aracılığıyla yönetilir ve bunu hükümet treasury üzerinde en az etkiye sahip olanların refahını sağlar."
 law_public_health_insurance:0 "Halk Sağlığı Sigortası"
 law_public_health_insurance_desc:0 "Hükümet, herkese eşit erişim sağlamak için kamu tarafından finanse edilen bir sağlık sigortası programı sunar."
 
