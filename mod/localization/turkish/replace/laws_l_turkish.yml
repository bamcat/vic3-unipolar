 law_public_schools:0 "Halk Okulları"
 law_public_schools_desc:0 "Okul devletin sorumluluğudur ve her şeye eşit olarak erişilebilir olmalıdır."
  
  # Health System group
 lawgroup_health_system:0 "Sağlık Sistemi"
 lawgroup_health_system_desc:1 "Hükümetin katılımını (veya eksikliği) vatandaşları için sağlık sağlama yasaları."
  
 law_no_health_system:0 "Sağlık Sistemi Hayır"
 law_no_health_system_desc:1 "Hükümet herhangi bir sağlık sistemini finanse etmiyor."
