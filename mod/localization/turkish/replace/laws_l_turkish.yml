 ideology_confucian_desc:0 "#lore Bu grup, Cennet kanunlarına ait olarak gördükleri bir sosyal düzenin desteklenmesine inanıyor.#!"

 ideology_bakufu:0 "Bakufu"
 ideology_bakufu_desc:0 "#lore Bu grup shogunate'yi destekliyor ve gücün savaşçı sınıfın ellerine ait olduğuna inanıyor.#!"
 
 ideology_shinto_moralist:0 "Shinto Piousness"
 ideology_shinto_moralist_desc:0 "#lore Bu grup İmparator'un divinitesine ve bu inancı Tanrıların ve ruhların eski ibadetine bağlar.#!"

 ideology_caudillismo:0 "Caudillismo"
 ideology_caudillismo_desc:0 "#lore Bu grup, yasanın anayasal kuralı üzerinde askeri arka planlarla güçlü liderleri desteklemeye eğilimlidir.#!"

 ideology_heavenly_kingdom_theocratic:0 "Allah'a kulluk"
 ideology_heavenly_kingdom_theocratic_desc:0 "#lore Bu grup, tüm insanların İsa tarafından kurtarıldığında Tanrı'nın oğulları ve kızları haline geldiği fikrini destekliyor ve bir hükümet biçimi destekliyor.#!"

 ideology_papal_moralist:0 "Pontifical"
 ideology_papal_moralist_desc:0 "#lore Bu grup, hem Katolik Kilisesi'nin geçici ve ecclesiastical güçlerini korumak için güçlü bir bağlılıka sahiptir.#!"

 ideology_liberal_modern: "Liberal Liberal Liberal Liberal"
 ideology_liberal_modern_desc: "#lore Bu grup, korumanın önemli değerleri olarak özgürlük ve yasal eşitliği görüyor.#!"

 ideology_egalitarian_modern: "Egalitarian"
 ideology_egalitarian_modern_desc: "#lore Bu grup, insanların eşit ve insan tedavisinin siyasi politikanın temel taşı olması gerektiğine inanıyor.#!"

 ideology_enclavist: "Enclavist"
 ideology_enclavist_desc: "#lore Bu grubun ilgi alanları, sömürge bir yönetici sınıfı olarak konumunu korumakta, kendi meselelerinden vazgeçerek gücünü karmaşık ve hesapsız bir bürokratik sistemle korumada yatıyor.#!"

 ideology_malthusian: "Malthusian"
 ideology_malthusian_desc: "#lore Bu grup Thomas Malthus tarafından kurulmuş olan ekonomik teorilere abone oluyor, yoksulluğun eşit nüfus büyümesi nedeniyle kendi kendini gerçekleştirmesini sağlamak için herhangi bir çabaya inanıyor.#!"

 liberal_and_egalitarian_amended_tt: "[GetIdeology('ideology_liberal').GetName] ve [GetIdeology('ideology_egalitarian').GetName] [Concept('concept_ideology','$concept_ideologies$')] $lawgroup_rights_of_women$ [GetIdeology('ideology_liberal').GetName] Değişecek"

