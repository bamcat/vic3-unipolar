 law_disability_insurance:0 "Engellilik Sigortası"
 law_disability_insurance_desc:0 "Devletin kendi hatalarından, kendilerini çalışamayacağına bakmak sorumluluğudur."
  
  # Rights of Women group
 lawgroup_rights_of_women:0 "Kadınların Hakları"
 lawgroup_rights_of_women_desc:0 "Adil seksin yasal düzenlemeleri."
  
 law_no_womens_rights:0 "Legal Guardianship"
 law_no_womens_rights_desc:0 "Kadınlar yasal olarak erkeklerin koruyucusu altında ve çok az haktan keyif alıyor."
 law_women_own_property:0 "Propertied Women"
 law_women_own_property_desc:0 "Ya miras olsun ya da başka türlü kazanılmış olsun, hatta kadınlar kendi mülklerini sahibi olmak için doğru ve göreve sahiptir."
 law_women_in_the_workplace:0 "İşyerinde Kadınlar"
 law_women_in_the_workplace_desc:0 "Potansiyel işgücünün sadece yarısıyla ilerleme fırınlarını nasıl koruyabiliriz?"
 law_womens_suffrage:0 "Kadınlar Suffrage"
 law_womens_suffrage_desc:0 "Yeni şeylerin düzeninde kadınlar eşit bir ses talep ediyorlar; daha az şey kabul edeceğiz."
  
  # Policing
 lawgroup_policing:0 "Policing"
 lawgroup_policing_desc:0 "Ulusal polis gücünün öncelikleri."

 law_no_police:0 "Hiçbir polis yok"
 law_no_police_desc:0 "Herhangi bir yapılandırılmış polis kuvveti bu ülkede mevcut değildir."
 law_local_police:0 "Yerel Polis Kuvvetleri"
 law_local_police_desc:0 "Bu ülke yerel polis kuvvetlerine sahiptir."
 law_dedicated_police:0 "Özel Polis Kuvvetleri"
