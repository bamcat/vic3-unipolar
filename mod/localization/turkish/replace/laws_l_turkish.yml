 law_wage_subsidies_desc:1 "Çalışmaya istekli olan herkes yemek için bir hakkına sahiptir. Hiçbir insan ailesi için sağlamak için anlamamalıdır."
 law_old_age_pension:0 "Eski Yaş Pension"
