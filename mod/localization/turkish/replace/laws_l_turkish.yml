 ideology_republican_paternalistic:0 "Elitist"
 ideology_republican_paternalistic_desc:0 "#lore Bu grup indi elitler tarafından hükmediyor, ancak yine de bir cumhuriyetçi hükümet biçimini destekliyor.#!"

 ideology_scholar_paternalistic:0 "Scholar-Gentry"
 ideology_scholar_paternalistic_desc:0 "#lore Bu grup, bilge ve eğitimli bir monarşi tarafından yönetilen ülkeyi görmeyi tercih eder.#!"

 ideology_junker_paternalistic:0 "Junker"
 ideology_junker_paternalistic_desc:0 "#lore Bu grup, ülkenin geleceğine liderlik etmek için en uygun olduğuna inanıyor.#!"

