  # Government Principles group
 lawgroup_governance_principles:0 "Yönetim İlkeleri"
 lawgroup_governance_principles_desc:0 "Ülkenizin yönettiği temel ilkeler ve otorite. Devlet Başkanının kim olduğunu belirler."
  
 law_chiefdom:0 "Şefdom"
 law_chiefdom_desc:0 "Kriyoloji öncesi politik bir sistem, bir savaşla veya kafadaki tanınmış bir ailenin büyükleriyle. Tüm devletler üzerinde verimli merkezileştirilmiş kontrolden acizdir."
 law_monarchy:0 "Monarchy"
 law_monarchy_desc:0 "Bir aristokratik bir hanedanlığın ülkenin ulusal kimliğini temsil ettiği ve hanedanlığın kraliyet başkanına yönetici güç verdiği bir yönetim biçimi."
 law_presidential_republic:0 "Presidential Republic"
 law_presidential_republic_desc:0 "İktidarın insanlar ve seçilmiş temsilcileri tarafından yapıldığı siyasi bir sistem. Cumhuriyetler, Devlet Başkanı olarak seçilmiş veya adaylanmış $RULER_TITLE_PRESIDENT$"
 law_parliamentary_republic:0 "Parlamento Cumhuriyeti"
 law_parliamentary_republic_desc:0 "İktidarın insanlar ve seçilmiş temsilcileri tarafından yapıldığı siyasi bir sistem. legislature'nin lideri devlet başkanı olarak hareket eder ve $RULER_TITLE_CHANCELLOR$ olarak adlandırılır."
 law_theocracy:0 "Theocracy"
 law_theocracy_desc:0 "Hükümet bir clergy tarafından yönetilir ve kutsal kitapların yorumu. Devlet Başkanı nominal olarak ibadetin kişidir, ancak bir dünyaca temsili temel, statü veya doğum tarafından seçilir."
 law_council_republic:0 "Konsey Cumhuriyeti"
 law_council_republic_desc:0 "İşçilerin yerel konseylere delegedikleri siyasi bir sistem. İşyeri organizasyonunun genel yönetim için kavramlarını genişletin."
 law_corporate_state:0 "Kurumsal Devlet"
 law_corporate_state_desc:0 "Resmi olarak tanınan kurumsal gruplar arasında kurumsallaşmış bir işbirliğine dayanan bir siyasi sistem. Devlet farklı sosyal sınıflar arasındaki müzakere için bir forum olarak hizmet eder."
 law_corporate_state_1:0 "Kurumsal Devlet"
 law_corporate_state_1_desc:0 "Resmi olarak tanınan kurumsal gruplar arasında kurumsallaşmış bir işbirliğine dayanan bir siyasi sistem. Devlet farklı sosyal sınıflar arasındaki müzakere için bir forum olarak hizmet eder."
  # Free speech group
 lawgroup_free_speech:0 "Özgür Konuşma"
 lawgroup_free_speech_desc:0 "Özgür konuşma ve halk meclisine doğru düzenleme yasaları."
  
 law_outlawed_dissent:0 "Ölmüş Dissent"
 law_outlawed_dissent_desc:0 "Hükümeti eleştirmek, hain ve yasadışı olarak kabul edilir."
 law_censorship:0 "Censorship"
 law_censorship_desc:0 "Basının aktif bir sansürü var ve montaj hakkı garanti edilmez."
 law_right_of_assembly:0 "Meclis hakkı"
 law_right_of_assembly_desc:0 "Vatandaşlar kamu meclisine doğru zevk alırlar."
 law_protected_speech:0 "Korumalı Konuşma"
 law_protected_speech_desc:0 "Serbest konuşmanın korunması kanunda düzenlenir."
  
  # Army Model group
 lawgroup_army_model:0 "Ordu Modeli"
 lawgroup_army_model_desc:0 "Ordunuz nasıl organize edilir ve düzenlenir."
  
 law_peasant_levies:0 "Papasant Levies"
 law_peasant_levies_desc:0 "Ordunun ana gücü, temel eğitime sıfırdan sıfırdan gelen yazıttan gelir."
 law_national_militia:0 "Ulusal Militia"
 law_national_militia_desc:0 "Ayaklanan ordu küçük, ancak yerel mililer evlerini savunmak için aktif olabilirler."
 law_mass_conscription:0 "Mass Conscription"
 law_mass_conscription_desc:0 "Büyük sayıda piyade konscripts, profesyonel orduyu tamamlamak için ihtiyaç duyulabilir."
 law_professional_army:0 "Profesyonel Ordu"
 law_professional_army_desc:0 "Ordu iyi eğitimli, profesyonel normallerden oluşur."
  
  # Distribution of Power group
 lawgroup_distribution_of_power:0 "Güç Dağıtımı"
 lawgroup_distribution_of_power_desc:0 "Siyasi güç nasıl dağıtılır. Devlet Başkanının kimden sorumlu olduğunu belirler."
  
 law_autocracy:0 "Autocracy"
 law_autocracy_desc:0 "Devlet iktidarının başkanı mutlakdır ve dünyaca hiçbir güçten sorumlu tutuluyorlar."
 law_oligarchy:0 "Oligarchy"
 law_oligarchy_desc:1 "Devlet Başkanı, küçük bir güçlü, seçilmiş bireylerle güç ve sorumluluğu paylaşıyor."
 law_landed_voting:0 "Topraklı Voting"
 law_landed_voting_desc:0 "Arazi veya sermaye mülkiyetine sahip olanlar bir oy verilir."
 law_wealth_voting:0 "Zengin Voting"
 law_wealth_voting_desc:1 "Zengin vatandaşlar oy verilir. Daha fazla zenginlik erkekler daha fazla oy verilir."
 law_census_voting:0 "Census Suffrage"
 law_census_voting_desc:0 "Özel statülerin okurları bir oy verilir."
 law_universal_suffrage:0 "Universal Suffrage"
 law_universal_suffrage_desc:0 "Her yetişkin adam eşit bir oy verilir."
 law_elder_council:0 "Elder Council"
 law_elder_council_desc:0 "En venerated erkekler ülkenin yönetiminde bir söze sahiptir."
 law_anarchy:0 "Anarşiy"
 law_anarchy_desc:1 "Yerel topluluklar kendi işlerini yönetiyor ve temsilcileri daha büyük kooperatif konseyleri konusunda sınırlı şartlar gönderiyorlar. Hiçbir resmi hiyerarşik merkezi otorite egzersiz yapmak zordur."
 law_single_party_state: "Single-Party State"
 law_single_party_state_desc: "Devlet, ulus içindeki tüm siyasi faaliyetlerde tekele sahip tek bir yasal siyasi parti tarafından yönetilir."
 ruler_in_party_tt: "Bu ulusun [concept_ruler], aktif bir siyasi [concept_party] olan bir [concept_interest_group] üyesidir."
 sps_no_party_tt: "Bu ulus aktif [Concept('concept_party', 'Political Parties')]"
 sps_government_reshuffle_tt: "[concept_government] kompozisyon tek yasal [concept_party] üyeleri ile güncellenecektir."
  
  # Voting System group
 law_first_past_the_post:0 "İlk Geçmiş The Post"
 law_first_past_the_post_desc:0 "Ayrıca, kazanan Takes All olarak da bilinir, bu sistem bölgesel alt-elections'teki en çok sayıda sandalyeyi kazanan tek adayı seçer. Güçlü görevlerle tek parti hükümetleri yaratmaya eğilimlidir, ancak gerrymandering için savunmasızdır."
 law_proportional_representation:0 "Proportional Representation"
 law_proportional_representation_desc:0 "Bu sistem, oy sayısına göre parlamento koltuklarını dağıtır. Bu, uzlaşmanın bir şey yapmasının anahtarı olduğu çok partili koalisyon hükümetlerini yaratma eğilimindedir."
  
  # Workplace Safety group
 lawgroup_labor_rights:0 "İşçi Hakları"
 lawgroup_labor_rights_desc:0 "İşçilerin hakları."
  
 law_serfdom:0 "Serfdom"
 law_serfdom_desc:0 "Peasantlar kendi topraklarına bağlanır ve feodal ustaları için iş yapmalıdırlar."
 law_no_workers_rights:0 "Hiçbir işçi Hakları"
 law_no_workers_rights_desc:0 "İşçilerin devlet tarafından garanti edilen özel iş hakları yoktur."
 law_regulatory_bodies:0 "Düzenleme"
 law_regulatory_bodies_desc:0 "Hükümet kurumları işverenlerin aşırılarını düzenlemek için yaratıldı."
 law_worker_protections:0 "İşçilerin Korumaları"
 law_worker_protections_desc:0 "İşçiler kanunda en çok korunan kapsamlı korumalardan keyif alıyor."
  
  # Children's Rights group
 lawgroup_childrens_rights:0 "Çocuk Hakları"
 lawgroup_childrens_rights_desc:0 "Çocuklara verilen haklar ve korumalar."
  
 law_child_labor_allowed:0 "Çocuk İşçisi İzin Verildi"
 law_child_labor_allowed_desc:0 "Hiçbir yasal kısıtlama, çocukların nerede çalışabileceğine yerleştirilir."
 law_restricted_child_labor:0 "Çocuk İşçisi"
 law_restricted_child_labor_desc:0 "Hiçbir çocuk fabrika katında izin verilmez."
 law_compulsory_primary_school:0 "Zorunlu İlkokul"
 law_compulsory_primary_school_desc:0 "Tüm çocuklar çalışmalarından yasaklandıkları birkaç yıllık birincil okula katılmak zorundadır."
  
  # Slavery group
 lawgroup_slavery:0 "Kölelik"
 lawgroup_slavery_desc:0 "İnsanlar mülk olarak."
  
 law_slavery_banned:0 "Kölelik Yasaklandı"
 law_slavery_banned_desc:0 "Hiçbir insan başka bir şeye sahip olmayabilir."
 law_debt_slavery:0 "Borç Köleliği"
 law_debt_slavery_desc:0 "Borçlarını yerine kredi veya mülkleri olarak açıklayabilecek olanlar."
 law_slave_trade:0 "Köle Ticareti"
 law_slave_trade_desc:0 "Ucuz iş için talep, yabancı bedenlerdeki insanlık dışı bir ticaret yoluyla yerine getirilir."
 law_legacy_slavery:0 "Miras Köleliği"
 law_legacy_slavery_desc:0 "Müttefikler ve köle sahipleri arasında bir uzlaşma olarak, kölelik kurumu genişlemediği sürece devam edebilir."
  
  # Church and State group
 lawgroup_church_and_state:0 "Kilise ve Devlet"
 lawgroup_church_and_state_desc:0 "Fiziksel ve ruhsal valiler arasındaki ilişki."
  
 law_state_religion:0 "Devlet dini"
 law_state_religion_desc:0 "Kilise devletin resmi bir organıdır. Tüm azınlık dinleri karşı ayrımcıdır."
 law_freedom_of_conscience:0 "Conscience"
 law_freedom_of_conscience_desc:0 "Devletin resmi bir devlet dini var, ancak insanlar neye inanmayı seçebilirler. Sadece özellikle egzotik dinler karşı ayrımcıdır."
 law_total_separation:0 "Toplam Ayrılık"
 law_total_separation_desc:0 "Kilise veya inanç hükümet işlevlerine müdahale edemez. Hiçbir dini karşı ayrımcı olmayabilir."
 law_atheist_state:0 "Atheist State"
 law_atheist_state_desc:0 "Dini inanışın korunması yasaklanmıştır ve birinin uygulanması üzerine aittir. Bütün dinler karşı ayrımcıdır."
  
   # Citizenship group
 lawgroup_citizenship:0 "Vatandaşlık Vatandaşlığı"
 lawgroup_citizenship_desc:0 "vatandaşlığın haklarını genişletmek."
  
 law_ethnostate:0 "Ethnostate"
 law_ethnostate_desc:1 "Devlet kendini belli bir etnikliğe bağlı olarak görüyor, diğer etnik kökenler vatandaşlıktan besleniyor. Tüm yabancı kültürler karşı ayrımcıdır."
 law_national_supremacy:0 "Ulusal Supremacy"
 law_national_supremacy_desc:1 "Devlet, vatandaşlarını belirli bir ulusal kimlike uygun olarak tanımlar, bu da tüm diğerlerinden üstündür. Yabancı kültürler, her iki mirası ve dili (veya diğer gümrükleri) paylaşmadıkça ayrımcılığa karşı ayrımcıdırlar."
 law_racial_segregation:0 "Racial Segregation"
 law_racial_segregation_desc:1 "Devlet, paylaşılan ırksal mirası kavramına bağlı olmak için vatandaşlık haklarını düşünüyor. Farklı mirasın dış kültürleri karşı ayrımcıdır."
 law_cultural_exclusion:0 "Kültür Exclusion"
 law_cultural_exclusion_desc:1 "Devlet, tüm kültürel kimliklerin insanlara vatandaşlık hakları sunuyor, ancak belli bir resmi kimlik dikkate alındığında. Yabancı kültürler birincil kültürlerinizle ortak olan hiçbir şey karşı ayrımcıdır."
 law_multicultural:0 "Çok kültürlülük"
 law_multicultural_desc:1 "Devlet tüm kültürel kimliklerin insanları için eşit vatandaşlık haklarına sahiptir ve başkalarında resmi olarak belirli bir kültürü korumaya çalışmaz. Hiçbir kültür karşı ayrımcı değildir."
 law_subjecthood: "Konu"
 law_subjecthood_desc: "Devlet, halkı, herhangi bir resmi vatandaşlığı teşvik etmek için en başta bir egemenlik konusu olarak tanımlamaktadır. Kültürler büyük ölçüde kendi topluluklarındaki kendi cihazlarına bırakılır."

  # Caste Hegemony, a Social Stratification law group
 lawgroup_caste_hegemony: "Caste Hegemony"
 lawgroup_caste_hegemony_desc: "İngiliz Hint Caste Sistemine dayanan toplum üyeleri arasındaki haklarının incelenmesi."
 law_hindu_caste_enforced: "Caste System Enforced"
 law_hindu_caste_enforced_desc: "Caste hiyerarşisi yasal olarak uygulanır ve sosyoekonomik hareketliliği engeller."
 law_hindu_caste_codified: "Caste System Codified"
 law_hindu_caste_codified_desc: "Caste hiyerarşisi, sosyoekonomik hareketliliği kısıtlamak için tanınır ve kullanılır."
 law_hindu_caste_not_enforced: "Caste Not Enforced"
 law_hindu_caste_not_enforced_desc: "Taklit temelinde sosyoekonomik hareketlilik yasal olarak kısıtlanmamıştır, ancak ayrımcılık hala devam edebilir."
 law_affirmative_action: "Affirmative Action"
 law_affirmative_action_desc: "Eşitsiz bir sosyoekonomik durum oluşturmak için aktif önlemler, daha önce marjinalleştirilmiş gruplara öncelik vermek."
  
  # Economic System group
 lawgroup_economic_system:0 "Ekonomik Sistem"
 lawgroup_economic_system_desc:0 "Ekonominizin temel ilkeleri."

 law_traditionalism:0 "Gelenekselizm"
 law_traditionalism_desc:0 "Pre-endüstriyel subsistence economy with little central control."
 law_agrarianism:0 "Agrarianism"
 law_agrarianism_desc:0 "Kırsal bir ekonomi tarımsal gelişimi ve topluluğu taklit ediyor."
 law_cooperative_ownership:0 "Kooperatif Sahipliği"
 law_cooperative_ownership_desc:0 "Sosyal mülkiyet kavramına dayanan bir ekonomik sistem, üretimin işçiler arasında daha fazla dağıtılması."
 law_command_economy:0 "Komut Ekonomisi"
 law_command_economy_desc:0 "Hükümetin doğrudan üretimin en yönlerini yönetdiği bir inward- odaklı müdahaleci ekonomi."
 law_laissez_faire:0 "Laissez-Faire"
 law_laissez_faire_desc:0 "Karşılaştırmalı avantaj ilkeleri üzerine kurulan liberal ekonomi ve daha az hükümet müdahalesi daha büyük büyüme anlamına gelir."
 law_interventionism:0 "Müdahaleizm"
 law_interventionism_desc:0 "Ülkemizin istikrarını sağlamak için, hükümet özel işletmelerin en kötü aşırılarını durdurmalıdır."

 # Trade Policy group
 lawgroup_trade_policy:0 "Ticaret Politikası"
 lawgroup_trade_policy_desc:0 "Ticareti ve sınırların içindeki malların değişimini düzenleyen yasalar."
 
 law_free_trade:0 "Ücretsiz Ticaret"
 law_free_trade_desc:1 "Malların ücretsiz değişimi engellenmemelidir, çünkü ticaret her şeyin yararınadır."
 law_protectionism:0 "Korumacılık"
 law_protectionism_desc:0 "endüstrilerimiz yabancı piyasa aktörlerinin depredations’tan korunmalıdır."
 law_isolationism:0 "Dayanıklılık"
 law_isolationism_desc:0 "Bir ekonomi, ulusun ihtiyaçlarını içsel olarak tedarik etmeye odaklanırken, başkalarının işlerini korurken."
 law_mercantilism:0 "İhracat-Focused"
 law_mercantilism_desc:0 "Olumlu bir mevcut hesabı tutmak ve diğer uluslarla rekabet etmek için bir ihracat odaklı ekonomi."

  # Taxation Group
 lawgroup_taxation:0 "Vergi"
 lawgroup_taxation_desc:0 "Devlet, vatandaşlarına vergi vererek gelir nasıl yükseltir."
 law_consumption_based_taxation:0 "Tüketime dayalı Vergi"
 law_consumption_based_taxation_desc:0 "Doğrudan gelir veya per-capita vergileri olmayan bir vergi sistemi ve bunun yerine gelir malların tüketimine vergi ile yükseltilir."
 law_land_based_taxation:0 "Land-Based Taxation"
 law_land_based_taxation_desc:0 "Özellikle köylülükten toplanan geleneksel bir toprak bazlı vergi formu."
 law_per_capita_based_taxation:0 "Regreive Taxation"
 law_per_capita_based_taxation_desc:0 "Azal olarak yoksulları gelir ve per-capita vergilerinin bir kombinasyonuyla finanse eden bir vergi sistemi."
 law_proportional_taxation:0 "Proportional Taxation"
 law_proportional_taxation_desc:0 "Temel olarak gelir bazlı vergi sistemi herkesin ülkeye gelirlerinin yaklaşık eşit payı ödemesini sağlamaya çalışır."
 law_graduated_taxation:0 "Progresif Vergilendirme"
 law_graduated_taxation_desc:0 "Vergilendirme yükünü öncelikle yüksek bölünme vergileri yoluyla koymayı amaçlayan bir vergi sistemi."
  
  # Education System group
 lawgroup_education_system:0 "Eğitim Sistemi"
 lawgroup_education_system_desc:0 "Çocuklar chimney süpürücü koleralarla yapıldığında."
  
 law_no_schools:0 "Okullar yok"
 law_no_schools_desc:0 "Eğitim ebeveynlerin sorumluluğudur. Sadece en sakin vatandaşlar okumayı ve yazmayı öğrenir."
 law_religious_schools:0 "Dini Okullar"
 law_religious_schools_desc:0 "Kilisenin devlet eğitimine dikkat etmesi, sadık ve ahlaki olarak sağlıklı bir nüfus sağlar."
 law_private_schools:0 "Özel Okullar"
