 lawgroup_bureaucracy:0 "Bürokrasi"
 lawgroup_bureaucracy_desc:0 "Ülkeniz nasıl uygulanır."

 law_hereditary_bureaucrats:0 "Hereditary Bureaucrats"
 law_hereditary_bureaucrats_desc:0 "Bürokratlar, geleneksel miras yoluyla pozisyonlarını tutarlar, çocuklarına sorumluluklar geçerler."
 law_appointed_bureaucrats:0 "Tanımlanmış bürokratlar"
 law_appointed_bureaucrats_desc:0 "Bürokratlar, yüksek ücretler karşılığında ülkenin en iyi çıkarlarına hizmet etmek için yöneticiler tarafından atanır."
 law_meritocratic_bureaucracy:0 "Meritocratic Bürosucracy"
 law_meritocratic_bureaucracy_desc:0 "Bürokrats, güç pozisyonları için hak yoluyla titrer. Zamanla bu muazzam yaratır, Byzantine yönetimleri."
 law_elected_bureaucrats:0 "Elected Bureaucrats"
 law_elected_bureaucrats_desc:0 "Yerel valiler seçmenler tarafından seçilir, vatandaşları yönetmek için daha kolay hale getirirken merkezileştirme gücü."
  
