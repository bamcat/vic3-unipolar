 lawgroup_internal_security:0 "İç Güvenlik"
 lawgroup_internal_security_desc:0 "Kendi işlerini sırayla tut."
  
 law_no_home_affairs:0 "Hayır Ev İşleri"
 law_no_home_affairs_desc:0 "Devlet, huzursuzluk ve isyanlara bir son vermek için özel bir girişim yapmaz."
 law_national_guard:0 "Ulusal Muhafız"
 law_national_guard_desc:0 "Devlet, iç kargaşayı bastırmak için askeri güç kullanabilir."
