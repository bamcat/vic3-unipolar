 lawgroup_colonization:0 "Kolonizasyon"
 lawgroup_colonization_desc:0 "kolonileri dikmek ve [concept_decentralized_nation] fethetmek hakkındaki duruşunuz."
  
 law_no_colonial_affairs:0 "Hiçbir Koloni İşler"
 law_no_colonial_affairs_desc:0 "Ülke resmi bir tür kolonizasyona katılmaz ve koloniler kuramaz."
 law_colonial_resettlement:0 "Kolonial resettlement"
 law_colonial_resettlement_desc:0 "Kolonlar ülke dahil devletlerden yerleşimcilere toprak sağlamak için kurulmuştur."
 law_colonial_exploitation:0 "Kolonial Exploitation"
 law_colonial_exploitation_desc:0 "Kolonlar bölgeyi doğal kaynakları ve ucuz işi için kullanmak için kurulmuştur."
  
