 international_exchange_standards:0 "Solar Market"
 international_exchange_standards_desc:1 "Borsa dış uzay alanına genişletildi"
 psychoanalysis:0 "Nöroplastiklik"
 psychoanalysis_desc:1 "Nöroplastiklik, nöronların beyindeki bağlantıların çalışmadır."
 philosophical_pragmatism:0 "Cyberwarfare"
 philosophical_pragmatism_desc:1 "Cyberwarfare, ulus devletleri veya uluslararası kuruluşlar arasında bir dizi siber saldırı veya karşı saldırıdır, başka bir ulusun bilgisayarlarını, ağlarını veya bilgi sistemlerini bozmak veya bozmak için başka bir ulusun bilgisayarlarını, ağlarını veya bilgi sistemlerini bozmak için."
 modern_financial_instruments:0 "Digital Hedgefund"
 modern_financial_instruments_desc:1 "Paramaking yöntemleri büyümeye ve proliferatejiye devam ediyor. Bazı yöntemler bir piramit yukarısında akan para içerebilir, ancak hepsi her zaman daha fazla para içerir."
 macroeconomics:0 "Digital-Economics"
 macroeconomics_desc:1 "Ekonomi eğitimi online ve e-servis ekonomileri."
 behaviorism:0 "Psychedelic Terapi"
 behaviorism_desc:1 "Psychedelic maddelerinin tedavi potansiyelini araştırın (örneğin psilocybin, MDMA ve LSD) önemli bir ivme kazandı. Bu maddeler post-traumatic stres bozukluğu (PTSD), depresyon, kaygı ve bağımlılık gibi koşullardaki etkileri için incelenmektedir."
 analytical_philosophy:0 "Teleterapi"
 analytical_philosophy_desc:1 "Teleterapi ve Uzaktan Danışmanlık: Telefon-19 salgın sırasında patladı olan Telehealth, insanlara uzaktan tedaviye erişmenin uygun bir yolu olarak büyümeye devam ediyor."
 electrical_capacitors:0 "Nanomalzemeler"
 electrical_capacitors_desc:0 "Bir nanoscale üzerinde malzemeleri manipüle etme yeteneği (bir metrenin milyarlarca) birkaç endüstride atılımlara yol açıyor. Graphene, tek bir karbon atomu tabakası, olağanüstü güç, iletkenlik ve esneklik sunan en umut verici nanomalzemelerden biridir."
 corporatism:0 "Post-Neoliberalizm"
 corporatism_desc:0 "Neoliberalizmin sonunda toplum mevcut kapitalist sistem üzerinde gelişmeyi hedefliyor."
 drone_carrier:0 "Drone Carrier"
 drone_carrier_desc:0 "Drone taşıyıcıları, bugün uçak taşıyıcılarına benzer, drone swarms taşır ve düşmanlarımızın yıkıcı saldırıları açığa çıkarır."
