   #hereditary_aristocracy: "Hereditary Aristocracy"
  # Categories
  # Culture Technology
  # Economy Technology
  # Military Technology
  ### Technology Tooltips
  ##lenders_of_last_resort: "Lenders of Last Resort"
  ##lenders_of_last_resort_desc: "State-owned central banks are large enough to come to the rescue of smaller commercial banks, such as during bank runs. This can prevent a financial crisis spreading to other sectors of the economy. Often, even the promise of rescue in times of difficulty is enough to prevent bank runs occurring in the first place. Some 'critics' claim that such a promise will encourage risky behavior by the commercial banks, but these 'critics' are surely just anarchists looking to wreck the nation's economic security, as bankers are some of the most trustworthy people to walk the halls of power."
  ##limited_liability: "Limited Liability"
  ##limited_liability_desc: "A limited liability company draws a legal distinction between the company and its owners. This helps prevent the bankruptcy of a company ruining the personal lives of the investors, as creditors will not try to haul off the furniture of failed businessmen to recoup losses. This makes investing less risky, if perhaps less satisfying to watch from afar. As a separate legal entity, the company has its own finances that must be audited and taxed."
  ##marketing_desc: "Promotional schemes to grab more market share or create a new market from scratch were devised by Josiah Wedgwood, leader of the expanding pottery industry at the dawn of the Industrial Revolution."
  ##paper_money: "Paper Money"
  ##paper_money_desc: "A kind of promissory note issued by a bank, paper money allows private citizens to move and exchange large volumes of currency without the danger and discomfit of gold or silver coins which cannot be divided and are heavy to carry. Thus, commercial exchanges are easier and safer."
  ##regulated_private_notes: "Regulated Private Notes"
  ##regulated_private_notes_desc: "Bankers realized hundreds of years ago that their customers only rarely demand back their deposits all at once. By issuing loans in excess of their reserves in the form of private bank notes, bankers could make even more money from interest. Unfortunately, when all the bank's customers do demand their deposits at once, there will not be enough reserves. With better communications technology, these 'bank runs' become more frequent. To prevent bank runs, governments can restrict the issuance of private notes only to banks that meet certain criteria of fiduciary responsibility, such as being close personal friends to the finance minister."
  #alcohol: "Alcohol"
  #alcohol_desc: "An ancient technology, presumably discovered when a tribesman left some grain in a puddle and decided to drink it after a few months had passed, alcohol became central to the discipline of alchemy, and continues to serve men of reason in the field of chemistry in various processes, some of which do not involve drinking it."
  #atomic_theory_of_matter: "Atomic Theory of Matter"
  #atomic_theory_of_matter_desc: "Observations in chemistry seem to have disproven the notion held by supporters of phlogiston that matter is composed of the three fundamental essences of solidity, fluidity and inflammability. Air is not merely a void into which phlogiston flows during combustion - it contains oxygen, which combines with other matter during chemical reactions."
  #bankruptcy_law: "Bankruptcy Law"
  #bankruptcy_law_desc: "Having a legal framework for a company to declare bankruptcy allows investors and creditors to try to recoup losses via liquidation of assets. This makes investment less risky."
  #building_societies: "Building Societies"
  #building_societies_desc: "Originally set up within communities to help new families raise loans with which to buy homes and then disbanded once the members had all satisfied their requirements, building societies can also be permanent financial institutions that specialize in cheap mortgages."
  #census: "Census"
  #census_desc: "Knowing how many people we have in our country and roughly were they live is important so we know where to spend out money and how many men we will have if we have to fight. Should we be involved in that grubby business of having our lower orders actually having representation I suppose it will have a use for that as well."
  #chemical_batteries: "Chemical Batteries"
  #chemical_batteries_desc: "Electricity can be generated by exploiting the difference in charge as electrolytes pass through oxidation and reduction cells containing copper and zinc cathodes and annodes. Early experiments in this field took the form of a series of jars which had the appearance of a battery of artillery, hence the name."
  #civil_service: "Civil Service"
  #civil_service_desc: "The idea that the government should have a body of men on which they rely on to carry out administration is neither new nor necessarily efficient. The radical idea that people should be selected for these positions on merit and ability and that they should keep their positions if the government is changed are radical and leads to greater efficiency."
  #clinical_thermometer: "Clinical Thermometer"
  #clinical_thermometer_desc: "The mercury thermometer had been around since the mid 18th century. Its use for medical purposes were limited as they tended to be large (over a foot long) and could take over 20 minutes to measure someone's temperature. Now we have made the thermometer smaller and it only takes a few minutes to get a reading, making it truly useful for doctors."
  #commercial_banks: "Commercial Banks"
  #commercial_banks_desc: "Businesses need various financial services to operate normally. Payroll at the end of the month might require a short loan to cover a temporary shortfall. Expanding the business might likewise require borrowing, especially if the business is a limited liability company rather than a personal venture. Commercial banks offer financial services to these companies, as opposed to wealthy private individuals, middle-class savers or professional investors."
  #cooperatives: "Co-Operatives"
  #cooperatives_desc: "Intended as a mutually beneficial organization to help small businesses and workers buy basic necessities, a co-operative tends to be run democratically by its members to achieve social good rather than pure profit."
  #credit_unions: "Credit Unions"
  #credit_unions_desc: "Rather than being operated for the profit of an owner or shareholders, credit unions are a financial institution which tries to improve the welfare of its members through access to credit. They tend to be run democratically, with each member having a vote on the director of the credit union."
  #customs_tariffs: "Customs Tariffs"
  #customs_tariffs_desc: "Tariffs are a very important weapon in a government's arsenal. They can be used both to raise revenue and to 'guide' merchants and businesses into making choices beneficial to the national interest, as determined by the government. Tariffs can be charged on entry into a country, for the use of port facilities, or on the price of imported or exported goods. One important use for tariffs is in protecting native industries against more efficient foreign companies, which can give domestic firms time to catch up with their rivals abroad."
  #department_stores: "Department Stores"
  #department_stores_desc: "Having one large store that sells a huge variety of goods can be more convenient for customers and gives the retailer more buying-power over the distribution chains."
  #distribution_channels: "Distribution Channels"
  #distribution_channels_desc: "Companies can be structured to sell goods in a number of ways. Raw materials are generally sold to other industries; industries might then sell manufactured goods to wholesalers such as brokers; wholesalers then sell goods to retailers such as specific shops or chains of shops, and the retailer then sells the goods to the final customer. Innovations in this area include factory or outlet stores, which sell goods directly to customers from the factory complex, such as to workers and their families and community."
  #enclosure_acts: "Enclosure Acts"
  #enclosure_acts_desc: "Enclosure is the process of taking small strips of peasant land, passed down from father to son since the beginning of feudalism, and 'combining' them under one owner via Acts of Parliament. By merging these subsistence plots into enclosed fields, arable land can be turned into pasture, capital goods such as machinery can be invested in, and many small surpluses can be merged into a significant profit. Where the landless peasants go is up to them - am I my brother's keeper?"
  #espionage: "Espionage"
  #espionage_desc: "Know thy enemy. Knowledge of what is going on in places that could be hostile to us is vital if we are going to keep out country safe. This can be in the form of the mundane, like ensuring proper maps exist of areas we may end up being at war in to the significant like enemy forces and plans."
  #gold_standard: "Gold Standard"
  #hereditary_aristocracy_desc: "As a society becomes more productive enough food can be generated to allow people to specialize and do things that do not require you to farm. A military caste to protect yourself from hostile neighbors is a natural development and eventually they will entrench their position and hereditary aristocracy is born."
  #insurance: "Insurance"
  #insurance_desc: "Insurance against loss of property has existed for many hundreds of years, being especially important for merchant vessels traveling overseas. As global trade becomes more prevalent, the need for more secure maritime insurance increases. Lloyd's of London began as a specialist for maritime insurance but has expanded into other markets such as insuring properties against fire damage."
  #malthusianism: "Malthusianism"
  #malthusianism_desc: "Population is increasing much faster than our food supply. We must face the fact that if we allow this to continue we will face a catastrophe for our people. Further more we must face the face any such catastrophe will hurt the lower classes the most. The Tory ideal of paternalism is not good nor noble but instead will lead to a greater catastrophe on the least fortunate."
  #manifest_destiny: "Manifest Destiny"
  #manifest_destiny_desc: "If we are to spread our civilization to those less fortunate to have we must accept the fact that we have been uniquely blessed with virtues and institutions that others simply do not have. We have a mission to redeem the less fortunate by remaking them in our own image. It is no more that our destiny to do this."
  #oceanic_cablelaying: "Oceanic Cablelaying"
  #oceanic_cablelaying_desc: "With the technology of the telegraph, thought soon turned to how to lay a cable under bodies of water. Although it proved not technically difficult to lay cables of short stretches of water (like bays and straits), the wide oceans proved a greater challenge. Good news - after several false starts we have successfully mastered the techniques to lay such a cable so no longer must we rely on the good will of others."
  #ophthalmoscope: "Opthalmoscope"
  #ophthalmoscope_desc: "'every eye could be made luminous if the axis from a source of illumination directed towards a person's eye and the line of vision of the observer were coincident', this discovery revolutionized the treatment of eye problems. Creating a hand held device with a mirror that could shine the light, the ophthalmoscope, was made the doctor's life a lot easier."
  #positivism: "Positivism"
  #positivism_desc: "We we consider what knowledge is we know that there is certain knowledge. Information that comes from sensory experience and  then interpretation comes through logic and reason is the exclusive source of certain knowledge. We can extend this from the physical world to societies as a whole. Societies operate under general laws which if we took the time to analyze we would understand. Theology must be rejected because faith by its very nature denies reason and verification."
  #postal_banks: "Postal Banks"
  #postal_banks_desc: "Rural and otherwise isolated communities may not have access to a local bank branch. In such cases, a postal bank can operate to offer them financial services, such as savings and a current account, without the need to travel into a town or city."
  #savings_banks: "Savings Banks"
  #silver_standard: "Silver Standard"
  #vertical_filing_cabinet: "Vertical Filing Cabinet"
  #vertical_filing_cabinet_desc: "Gone but not forgotten"
 admiralty:0 "Modern Radar"
 admiralty_desc:0 "Amiralty, donanmanın daha verimli çalışmasına yardımcı olmak için katı bir komuta zinciri ile bağlantılı karmaşık bir yönetim sistemidir."
 anaesthetics:0 "Anaesthetics"
 anaesthetics_desc:0 "Anaesthetics ameliyat sırasında kullanılan sedatifler veya ağrı kesiciler, hastaların bıçakları hissetmelerini ve tıbbi personelin invaz edilmesini engellemek için kullanılır."
 anarchism:0 "Pazar Sosyalizmi"
 anarchism_desc:0 "Pazar sosyalizmi, piyasa ekonomisi çerçevesinde üretim araçlarının sosyal mülkiyetini içeren bir tür ekonomik sistemdir. Böyle bir sistem için çeşitli modeller, genellikle kooperatif şirketleri ve bazen kamu veya özel işletmeler içeren bir karışım içerir."
 aniline:0 "Machine-Learning Algorithm"
 aniline_desc:0 "Bir işlem veya hesaplamalarda veya diğer problem çözme operasyonlarında takip edilecek kurallar kümesi, özellikle bir bilgisayar tarafından. Tüketicinin arzularının değerlendirilmesi için sosyal medya şirketleri tarafından kullanılır."
 anti_clericalism:0 "Anti-Clericalism"
 anti_clericalism_desc:0 "Güç yozları ve dini kurumlar, diğerlerinden daha bu yolsuzluk için daha fazla bağışıklık yoktur. Kitlelere kurtuluşlar sunmak iddia edebilir, ancak bunun yerine kendi yuvalarını örtmeye ve değersiz olanlara haklarını inkar ederler. Halk alanımızdan organize dinin etkisini süpürmeliyiz ve bu konuyu daha da artırıcı bir seçim olarak terk etmeliyiz."
 antibiotics:0 "Kanser Eradikasyon"
 antibiotics_desc:0 "Gen düzenleme, genlerin kanser ve diğer hastalıklar için düşünülemez yaratılmasına izin verir."
 antiseptics:0 "Antiseptics"
 antiseptics_desc:0 "Bilim, ısıya maruz kalmanın mikropları yok edeceğini belirledi. Sorun şu ki bu, canlı dokuya geldiğinde geçerli bir çözüm değil. Bununla birlikte, yaraların pedlerle kaplı olduğu deneyler, gangrene olaylarının dramatik bir şekilde azaldığını gördük. Bu anti-sceptics bilimi doğdu."
 arc_welding:0 "Inter-Planetary Colonization"
 arc_welding_desc:0 "Farklı gezegenlerin kolonileştirilmesi"
 army_reserves:0 "Meal, Ready-to-Eat"
 army_reserves_desc:0 "Bir Meal-Ready-to-Eat (MRE) uzun bir raf ömrü için tasarlanmış bir askeri rasyondur, yüksek çeşitlilik gıda seçenekleri ile."
 art_patronage:0 "Art Patronage"
 art_patronage_desc:0 "Sanat özgür değildir ve sanat ve kültür geliştirmek, ilgi ve sanat desteklemek için zenginliğe ihtiyacınız var. Bunu yapmak için karşılığında, etraflarında böyle güzel şeylere sahip olmak için prestij kazanıyorlar."
 art_silk:0 "Yapay Yaşam"
 art_silk_desc:0 "sentetik genomlarla organizmalar yaratmak veya tamamen yeni, doğal olmayan özelliklerle organizmalar tasarlamak. Sentetik genomlar, 2010 yılında Craig Venter ve ekip tarafından yaratılan ilk sentetik bakteri gibi yeni yaşam biçimleri oluşturmak için kullanılmıştır."
 artificial_fertilisers:0 "Yapay Maddeler"
 assembly_line:0 "Assembly Line"
 assembly_line_desc:0 "Yapıların sürecini yayınlayarak, böylece her eylem bir diğer eylemden sonra daha verimli bir fabrika yapılabilir."
 atmospheric_engine:0 "Temiz Enerji Temiz Enerji"
 atmospheric_engine_desc:0 "Rüzgar değirmenleri gibi temiz enerji üretim yöntemleri kirliliğine sebep olmadan enerji üretimine izin verir"
 automatic_bottle_blowers:0 "Mycoremediation"
 automatic_bottle_blowers_desc:0 "Bu, mantarları çevresel kirleticileri ortadan kaldırmak için kullanıyor. Fungi, petrol ürünleri ve endüstriyel çözücüler gibi tehlikeli malzemeleri kırmak için kullanılabilir."
 battlefleet_tactics:0 "Spacefleet-Battlefleet Tactics"
 battlefleet_tactics_desc:0 "Büyük bir savaş çalıştırmak zor bir görev olabilir. Belirli taktikleri bir filo olarak pratik ve öğrenerek, daha büyük performans elde edilebilir."
 battleship_tech:0 "Guided-Drone Destroyer"
 battleship_tech_desc:0 "Ultra-massive savaş gemileri, okyanusun büyük batlarını havaya uçurabilecek"
 bessemer_process:0 "Polimerler"
 bessemer_process_desc:0 "Sentetik kıyafetler ve kumaşlar, daha az rahatsız edici için ortak malların kitlesel üretimine izin verir."
 bessemer_steel:0 "Bessemer Steel"
 bessemer_steel_desc:0 "Bessemer Process soğuk havayı molten domuz demirine, karbondan, silikondan ve mangandan yanar ve hafif çelik yaratır. Bu, crucibles'te üretilen kadar yüksek kaliteli değil, ancak çok daha ucuz, daha düşük derece demir veyalerin kullanımına izin veriyor ve demiryolu hatlarının kitlesel üretimine ve betonu güçlendiriyor."
 biological_determinism:0 "Biyolojik Determinism"
 biological_determinism_desc:0 "Doğadaki genetik ve miras çalışması, insan davranışının biyoloji tarafından ne kadar belirlendiği hakkında sorular açıyor."
 feminism:0 "Çevreci Ekonomi"
 feminism_desc:0 "Çevrecilik veya çevre hakları, yaşam, habitatlar ve çevreleri destekleme konusunda geniş bir felsefe, ideoloji ve sosyal harekettir."
 blast_furnaces:0 "Blasters"
 blast_furnaces_desc:0 "Bir fırın patlama, başlangıçta el ile veya su bazlı bellows gibi metalurjik süreçlere ekstra oksijen eklemek için kullanılır. Bu, fırının açık hava fırınından daha da büyük sıcaklıklara ulaşmasına ve egzotik metallerin alaşımlarına izin vermesine neden olur. Fırın patlama özellikle daha gelişmiş süreçleri kullanarak demir ya da hafif çelik üretimi için faydalıdır."
 bolt_action_rifles:0 "Cybernetics"
 bolt_action_rifles_desc:0 "Özerk askerler savaş salgınında gerçek hayatları kurtarmak anlamına geliyordu."
 chemical_bleaching:0 "Kişisel Bilgisayar"
 chemical_bleaching_desc:0 "Kişisel bilgisayar, Apple II, Macintosh ve IBM PC gibi ürünlerle, bireylere ve küçük işletmelere erişilebilir hesaplamalar yaptı."
  # bone_china: "Bone China"
  # bone_china_desc: "Bone China is a form of porcelain which in part is made from bone ash, the greater strength of this type of porcelain makes it rather valuable."
 # artillery: "Artillery"	// There is already a loc key for this in Goods, require prefix to support unique localization
 artillery_desc:0 "Ağır mühimmatlarla uzun menzilli bombalar ve düşman güçlerini kendi birliklerinizi riske atmadan dağıtıyor. Inaccurate, yavaş-moving, ve pahalı, ancak herhangi bir modern orduda önemli bir bileşen."
 breech_loading_artillery:0 "Long-Range Füze Battery"
 breech_loading_artillery_desc:0 "HIMARS gibi uzun menzilli füze bataryaları, yabancı bölgeye şimdiye kadar hedeflerin yıkımını hafifletti."
 tech_bureaucracy:0 "Sosyal Liberalizm"
 tech_bureaucracy_desc:0 "Sosyal liberalizm, daha az rahatsız edici korumak için güçlü bir hükümet etkisi ve kontrolü savunan bir ideolojidir."
 centralization:0 "Authoritarian Capitalism"
 centralization_desc:0 "Devlet kapitalizmine bağlı olarak, devletin ticari faaliyetleri üstlendiği bir sistem, otoriter kapitalizm özel mülkleri birleştirir ve piyasa güçlerinin dissent üzerindeki kısıtlamalarla çalışmasını birleştirir."
 camera:0 "Starlink"
 camera_desc:0 "Starlink, Starlink Services, LLC tarafından işletilen bir uydu internet seti, Amerikan havacılık şirketinin tamamen sahip bir iştiraki olan bir uluslararası telekomünikasyon sağlayıcısıdır."
 canals:0 "Canals"
 canals_desc:0 "Coastal ve nehir barges, malları taşımak için çok verimli bir yöntemdir. Bir ülkenin iç kısmı bu barges'in kapsamını genişletiyor, ancak farklı yüksekliklerin kilit sistemler tarafından köprülenmesi gerektiğinde pahalı bir öneri olabilir."
 canneries:0 "Ultra-Processed Food"
 canneries_desc:0 "Ultra işlemeli yiyecekler (UPFs), orijinal formlarından endüstriyel süreçlerden önemli ölçüde değiştirildi ve malzemelerin eki genellikle bir ev mutfağında bulamadı."
 canning_jars:0 "Canning Jars"
 canning_jars_desc:0 "Fransız Devrimi orduları tedarik sorunları için yenilikçi çözümler gerektiriyordu. Bir çözüm cam kavanozlar içinde yemek pişirmek, hasta mizahları önlemek ve miasma içeriği ile karıştırmak ve böylece rasyonları şımartmak. Molten balmumu kavanozun ağzından dış dünyaya karşı bir mühür olarak hareket etmek için dökülüyor."
 canning_machines:0 "Canning Machines"
 canning_machines_desc:0 "Erken canlanmış gıda üretimi otomasyondan yoksundur. Cans getirildi ve el tarafından satıldı. Makinelerin hızlı bir şekilde teneke plakasına dönüştürmek için kullanımı standartları geliştirir ve bunu artırır."
 carrier_tech:0 "Laserboat"
 carrier_tech_desc:0 "Lazer tekneleri, gelen droneları hızlı bir şekilde ortadan kaldırmak için yüksek güç lazerini alan gemilerdir."
 catalytic_contact_process:0 "Catalytic Contact Process"
 catalytic_contact_process_desc:0 "1831'de İngiliz Şirket tüccarı Peregrine Phillips, platini bir katalitik dönüştürücü olarak kullanarak daha yoğun sulfik asit üretmek için bir süreç icat etti. Ash soda veya gübre üretimi için özellikle yararlı olmasa da, bu yakında organik boya üretimine bir boon oldu."
 chemical_isolation:0 "Kimyasal izolasyon"
 chemical_isolation_desc:0 "Kimyasallar, distillasyon, filtrasyon ve buharlaşma gibi birçok şekilde temizlenebilir. Su arıtma sürecinin kalitesi açıkça izolein kalitesini etkileyecektir."
 chemical_synthesis:0 "Kimyasal Synthesis"
 chemical_synthesis_desc:0 "Köpek idrarı 1828 yılında Alman kimyager Friedrich Wöhler tarafından ünlü bir şekilde sentezlendi. Bu organik ve inorganik kimya arasındaki sınırları bulanıklaştırmaya başladı ve daha fazla kimyasal sentezlenmiş yeni endüstriyel süreçler ortaya çıkıyor."
 chemical_warfare:0 "AI-Terrorism"
 chemical_warfare_desc:0 "Bazı kimyasal kombinasyonlar, insanlar onlara maruz kaldıklarında olumsuz veya hatta ölümcül etkiler üretir. Bunun silahlanması, savaşa yeni korkunç bir yön getiriyor."
 civilizing_mission:0 "CRISPR Gene Editing"
 civilizing_mission_desc:0 "CRISPR aracılığıyla gen düzenleme, insanların yeni organlar yetiştirmesine izin verir."
 colonization:0 "Ultrasound"
 colonization_desc:0 "20. yüzyılın sonlarında organ nakli, MRG ve CT taraması ile tıbbi görüntüleme ve optik makine bireysel koşullar için daha özel ve ters tedavilere izin verdi."
 color_photography:0 "Renk Fotoğrafçılığı"
 color_photography_desc:0 "Fotoğrafları tam renkte yakalamak için erken teknik, göz tarafından ışık nasıl algılanır. Farklı renkli filtreler aracılığıyla üç resim etkin bir şekilde alarak, bunlar orijinal renkleri yeniden canlandıran bir görüntü haline getirilebilir."
 combination_acts:0 "Kombinasyon Yasası"
 combination_acts_desc:0 "İnsanlar gizli bir araya geldiler ve birbirlerine yemin ederler, devletin güvenliğine bir tehdittir ve radikal Jacobin'in devlete boyun eğdirmesi anlamına gelir. Ayrıca, iş adamları tarafından çatışmanın kritik anlarında eylem tehditleri nedeniyle dış düşmanlardan kendimizi savunma yeteneğimiz için bir tehdit olabilir. Ortak iyi için bu tür davranışları düzenlememize izin verecek bir dizi yasayı geçeceğiz."
 combustion_engine:0 "Nanocoatings"
 combustion_engine_desc:0 "Bunlar onları korozyona, aşınmaya ve lekelere daha dayanıklı hale getirmek için çeşitli yüzeylere uygulanır. Kendi temizleme yüzeyleri ve anti-bakteriyel nanocoatingler sağlık, elektronik ve inşaat uygulamaları için geliştirilmektedir."
 central_planning:0 "Dijital Yönetim"
 central_planning_desc:1 "Hükümetin çeşitli güvenli bilgisayar sistemleri aracılığıyla çalışmasını sağlar."
 compound_microscopes:0 "Bileşik Mikroskoplar"
 compound_microscopes_desc:0 "Optiklerde kullanılan lensler çok iyi cammaking becerileri gerektirir. Bu alanda bir yenilik iki lens kullanmak, bir nesneye odaklanmış ve diğer ilk lense odaklanmış, magnification artırmak. Böyle bir mikroskop canlı bakterileri görmek için kullanılabilir."
 compression_ignition:0 "Atıklardan Enerji"
 compression_ignition_desc:1 "Atıkları enerjiye atarak, dünyamız yüksek güç üretebilir"
 concrete_dockyards:0 "Yapay Test Aralığı"
 concrete_dockyards_desc:0 "Test aralıkları tamamen AI içinde üretilir."
 concrete_fortifications:0 "Future Fortifications"
 concrete_fortifications_desc:0 "Betonu pekiştirmelere tanıtarak, çok hızlı güçlü aydınlatıcı pozisyonları yapmak mümkündür."
 condensed_milk:0 "Condensed Milk"
 condensed_milk_desc:0 "Ordinly, süt bir bovine mammary bezinden sonra çabuk tüketilmelidir. Bir konteynerin içindeki baskıyı azaltırken, bir vakum panı gibi, süt buharlarının su içeriği ve kondüktif süt daha sonra beklenebilir ve satılabilir."
 conspicuous_consumption:0 "Sürekli tüketim"
 conspicuous_consumption_desc:0 "Zenginliğin hepsinin bir prestiji vardır. Zenginlerin görüntülenmesi, sosyal sınıflar aracılığıyla daha prestijli ve yardımcı olabilir, işadamları ve politikacılarla temaslar gibi sosyal tırmanma fırsatları açabilir. Bir materyalist toplumda, frivolite ve ekstravagance paradoksal olarak bir kişinin zengin olmasına yardımcı olur."
 conveyors:0 "Otomatik Faktörler"
 conveyors_desc:0 "En son AI sistemlerini uygulayarak, insan emeğinin kullanımı olmadan malları hareket eden platformlar oluşturmak mümkündür."
 cotton_gin:0 "Modern Otomobiller"
 cotton_gin_desc:0 "Otomobiller, topraklar boyunca insanların ve malların hızlı taşınmasına izin verir."
 crucible_steel:0 "Crucible Steel"
 crucible_steel_desc:0 "Tozlu demir ve karkoal içeren bir taşa ısı uygulayarak, bu yüksek karbon alaşımı, Hindistan ve Persia'da 1750'ye kadar yaratılan ‘Damascus çelik’a benzer olduğunu düşünüyor. Bu süreç, araçlar, ilkbaharlar ve diğer ekstra-hard ve pahalı nesneler için uygun yüksek bir derece çelik üretir."
 law_enforcement:0 "Sistemik Racism"
 law_enforcement_desc:1 "Sistemik ırkçılık, ırk veya etnik gruba dayanan bir kurumsal ayrımcılığın bir biçimidir ve sonuç olarak tüm bir toplum veya organizasyon boyunca var olan politikaları ve uygulamaları içerebilir ve diğer bazı insanlara ve haksız veya zararlı muameleye devam etmektedir."
 defense_in_depth:0 "AI-Driven Targetting"
 defense_in_depth_desc:0 "Birden fazla savunma hattı yaparak, düşmanı yaymak ve hatta bazen onları geliştirmek mümkündür."
 democracy:0 "Doğu Bloc"
 democracy_desc:0 "1980'lerin sonlarında 1990'ların sonunda, Doğu Avrupa'daki komünizmin çökmesine yol açan bir dizi olay ortaya çıkıyor."
 distillation:0 "Ürünler"
 distillation_desc:0 "Ekipmanlar, fırınların, refridgeratörlerin, mikrodalgaların, karıştırıcıların, suların ve diğer ev eşyalarının gıda üretiminde kullanılmasını içerir."
 divine_revelation:0 "Kutsal Vahiy"
 divine_revelation_desc:0 "Tüm yasanın temeli kutsal yazılarımıza ait. Sadece daha yüksek bir güce olan itaat sayesinde toplumumuz düzgün bir şekilde sipariş edilebilir ve istikrar garanti edilebilir."
 watertube_boiler:0 "Robotics"
 watertube_boiler_desc:0 "Robotlar özellikle otomobil endüstrisinde, hassas, hız ve güvenlik geliştirmek için montaj hatlarına tanıtıldı."
 dreadnought_desc:0 "Drone taşıyıcıları, bugün uçak taşıyıcılarına benzer, drone swarms taşır ve düşmanlarımızın yıkıcı saldırıları açığa çıkarır."
 dreadnought_tech:0 "Drone Carrier"
 dynamite:0 "Deep-Sea Mining"
 dynamite_desc:0 "Derin deniz maden teknolojilerinin gelişimi 2000'lerde önemli ölçüde ilerledi, çünkü şirketler değerli minerallerin çıkarılmasını keşfetmeye başladı (örneğin, polimetallic nodules, nadir toprak metalleri) okyanus zemininden."
 egalitarianism:0 "Terörle Mücadele Savaşı"
 egalitarianism_desc:0 "Terörle Mücadele Savaşı, Terörizme İlişkin Küresel Savaş (GWOT), [3] ABD tarafından 2001'de 11 saldırıyı takip eden küresel bir askeri kampanyadır."
 electric_arc_process:0 "Neuralink"
 electric_arc_process_desc:0 "Neuralink ve Synchron gibi şirketler, beyin ve dijital cihazlar arasındaki doğrudan iletişime izin veren beyin-bilgisayar arayüzlerini geliştiriyor. Bu arayüzler tıbbi tedavileri devrimleştirebilir, bireylerin yeniden hareket etmelerine, bilişsel yetenekleri artırmak ve teknoloji ile etkileşim kurmanın yeni yollarını sunabilir."
 electric_railway:0 "Mass Public Transport"
 electric_railway_desc:0 "Arabalar güvenilmez, şehirler arasındaki toplu ulaşım en-mass çalıştırılabilir"
 electrical_generation:0 "Kuantum Hesaplama"
 electrical_generation_desc:0 "Kuantum bilgisayarları, şu anda geleneksel bilgisayarlar için yetersiz olan karmaşık sorunlar için kullanılması bekleniyor: uyuşturucu keşfi, malzeme bilimi simülasyonları, gelişmiş kriptografi, hava tahminleri, finansal modelleme, yapay zeka gelişimi ve özellikle de lojistik ve enerji üretimi gibi alanlarda optimizasyon problemleri, aynı anda birçok değişkenle aynı anda kuantum süperpozisyon ve entanglement yoluyla sorunları çözme yeteneğinden yararlanarak."
 elevator:0 "Seçimleri"
 elevator_desc:0 "Pods, yüksek hızlarda hareket edebilecek asansörlere benzer."
 empiricism:0 "World Wide Web"
 empiricism_desc:0 "World Wide Web (WWWWWW veya sadece Web), İnternet üzerinden kullanıcı dostu yollarla içerik paylaşımının kullanıcılarına BT uzmanları ve hobileri ötesinde hitap etmesini sağlayan bir bilgi sistemidir."
 enlightenment_thought:0 "Aydınlanma Düşüncesi"
 enlightenment_thought_desc:0 "Sebep Çağı sırasında, yaşlı dogmalar sorgulanmaya başladı. Artık “Tanrı bunu yapacak” kabul edilmedi ve iktidardakiler toplumdaki konumunu haklı çıkarmaya başladılar. mutlak monarşiler bile bu yeni fikirlerin prestijini gördü ve “En yüksek Despots” Avrupa'nın eğitim, yasal ve ekonomik sistemlerini reforme uğrattı. Bununla birlikte, bu reformlar John Locke, Voltaire, Jean-Jacques Rousseau ve Thomas Paine gibi düşünürler, Amerika ve Fransa'daki devrimlere yönelik bir saldırıya yol açtılar."
 fascism:0 "Faşizm"
 fascism_desc:0 "Faşizm, hükümetin toplumun tüm yönleri üzerinde sıkı bir kontrole sahip olduğu siyasi bir sistemdir."
 field_works:0 "Ey"
 field_works_desc:0 "HESCO bariyerleri kum torbalarından daha hızlı inşa edilebilir ve daha fazla koruma sağlayabilir."
 film:0 "Doğrudan Propaganda"
 film_desc:0 "Beyin implantlarını kullanarak, propaganda doğrudan nüfusumuza eklenebilir"
 flash_freezing:0 "Portre Freeze-Dryer"
 flash_freezing_desc:0 "Sivil kullanım için portatif Freeze-kurucular"
 floating_harbor:0 "Yapay Adalar"
 floating_harbor_desc:0 "Yapay adalar insan yapımı araziler, genellikle askeri araçlar için yaratılmıştır"
 food_sterilisation:0 "Gıda Sterilizasyon"
 food_sterilisation_desc:0 "Deneme ve hatayla, işadamları gıdayı koruma yöntemlerini keşfetti, örneğin pastörizasyonda süt ısıtması veya kalın rup içine kondensasyon, meyve ve sebzelerin toplanması ve etlerin ve çorbaların kanlanması gibi. Tüm bu teknoloji arasındaki ortak iplik, korunmuş yiyeceklerden mikropların ortadan kaldırılmasıdır, mikroskop altındaki bakteri keşfine kadar tam olarak anlaşılmaz. Bu fikirlerin yaygın anlayışıyla, gıda endüstrisinde standartlar gelişiyor ve halkın sağlığı ile."
 four_field_crop_rotation:0 "Four Field Crop Rotation"
 four_field_crop_rotation_desc:0 "Arazi sahibi Charles 'Turnip' Townsend tarafından açıkça ortaya çıktı, turnips veya pever gibi, çiftlikland'ın tükenmeden sürekli kullanımda kalmasına izin veriyor veya sonbaharda kalmasına izin veriyor."
 fractional_distillation:0 "GMOs"
 fractional_distillation_desc:0 "Genetik olarak değiştirilmiş Organizmler, (GMOs) bitkilerin ve hayvanların büyüme ve gıda üretiminin amacı için ortaya çıkan insan yapımı yöntemleridir."
 fruit_jars:0 "Meyve Jars"
 fruit_jars_desc:0 "Metal içinde et ve çorbanın korunması fikri popülerlik kazanmıştır. Diğer gıda koruma türleri de yaygın hale geliyor, örneğin meyve ve sebzeleri seçici sıvılarda korumak veya onları reçellere kaynatmak gibi."
 fulminates:0 "Fulminates"
 fulminates_desc:0 "İyileşen bir malzeme, keskin bir şekilde vurduğunda ateş eden kişidir. Bu tür malzemeler paracury, gümüş ve potasyum iyonları içerir. İlk olarak 1800 yılında Edward Charles Howard tarafından keşfedildiler ve percussion cap sistemlerindeki askeri uygulamaları yakında ortaya çıktı."
 functionalism:0 "Fonksiyonelizm"
 functionalism_desc:0 "Teorik bir çerçeve toplumu sosyal fonksiyonlar tarafından belirlenen bir bileşen sistemi olarak görür. Mekanik ve biyolojik sistemleri metafor olarak kullanarak, toplumun yapılarını ve kararlılıklarını kararlılıklarını belirlemek olarak karşılaştırır."
 gantry_cranes:0 "Ağır Cranes"
 gantry_cranes_desc:0 "İnşaat ve ulaşımda kullanışlı, ağır vinçler bir geminin genişliğini daraltmak için yeterince büyüktür. Bu onlara bir geminin muhtemelen taşıyabileceği en ağır yükleri kaldırabilecekleri anlamına gelir."
 general_staff:0 "Drones"
 general_staff_desc:0 "Drones, hem askeri hem de sivil uygulamalar için kullanılabilecek insansız uçaklardır."
 germ_theory:0 "Germ Teorisi"
 germ_theory_desc:0 "Thucydis, hastalıkların kişiden diğerine yayılabileceğini ve eski zamanlardan beri miasmas'ın kolera gibi hastalıkların nedenleri olduğuna inandığını belirtmek için ilk kişiydi. Ancak bilim, mikroplar denilen mikroorganizmaların, hastalıktan sorumludur."
 gunpowder:0 "Gunpowder"
 gunpowder_desc:0 "Sulfur, karcoal ve nitratlardan oluşan kimyasal bir bileşik, tabancalar hızla, boruları yayabilecek bir gaza genişledi. Yanan, savaş alanında kirli ve kör bir iş yapan sulfur ve karcoal'dan çok fazla dumanın geride bırakıyor. Gunpowder suçlamaları ayrıca madencilik ve inşaat için yer açmak için daha sivil kullanımlara sahiptir. Çinliler binlerce yıl önce silahlarını icat etti ve onu celebratory yangın işleri ve kuşatma topçusu için kullandı."
 gunsmithing:0 "Saldırı Bulucu"
 gunsmithing_desc:0 "Saldırı tüfekleri bir SMG'nin yangın gücünü birleştirir ve güçlü küçük hava platformu oluşturmak için bir tüfekin doğruluğu."
 gymnastics:0 "Gymnastics"
 gymnastics_desc:0 "Spartalıs spor salonunastics, askeri personellerin eğitiminin bir parçası oluşturdu ve kelimenin kendisi, 1570'den bu yana atletik egzersizlere atıfta bulunmak için etrafındaydı. Şimdi Spartalılar'ın bir şey üzerinde olduğunu fark etsek de, bedeni disipline etmeliyiz. Eğitim öncüleri, kendi disiplini geliştirmelerine yardımcı olmak için çeşitli cihazlarda çocuklar için bir dizi egzersiz geliştirdiler. Bazı radikaller bile bu egzersizleri kızlara genişletmeyi öneriyorlar."
 gyroscopes:0 "Gyroskops"
 gyroscopes_desc:0 "Bir gyroskop, sadece geri dönüş desteği olan bir dizi gimbals birleştirerek yapılır. Bir gimbal dikey ve başka bir yatay olarak döner, bu yüzden içsel en çok desteklenen nesne herhangi bir yönde özgürce dönebilir. Gyroskoplar, çevresi hareket ederken bir nesneyi sabit tutmak için faydalıdır, örneğin bir tossing gemisinde manyetik bir pupass gibi."
 handcranked_machine_gun:0 "Anti-Drone Systems"
 handcranked_machine_gun_desc:0 "Savunma sistemleri ucuz droneları vurmak için tasarlanmıştır."
 hydraulic_cranes:0 "Helikopter Carrier"
 hydraulic_cranes_desc:0 "Helikopter taşıyıcıları birlikleri lojistik olarak desteklemeye izin verir"
 hydraulic_power:0 "Hidrolik Gücü"
 hydraulic_power_desc:0 "Su tekerlekleri uzun zamandır değirmen tahıl için kullanılmıştır. Onları güç makineleri gibi diğer endüstriyel kullanımlara adapte etmek, mantıksal bir adımdır."
 hypodermic_syringes:0 "Hipodermik Faktörler"
 hypodermic_syringes_desc:0 "Inoculations başlangıçta yaradaki deri ve ovma hastalıklı materyali açarak hastalara verildi. Bir hastaya sıvıları enjekte etmek için boş bir iğne kullanmanın fikri açıkça daha hijyeniktir ve aynı zamanda doktor tarafından uygulanacak hassas hacimlerin de faydası vardır. Erken siringler gümüşten yapılmış, ancak cam üretim süreçleri daha rafine hale geliyor, dar iğnelerin yapılmasına izin veriyor."
 idealism:0 "İdealizm"
 idealism_desc:0 "Bilgimizin şeyleri nasıl algıladığımıza bağlı olduğunu tutan bir dizi felsefe, aslında olduğu gibi bir şeyden ziyade, bir şeyin fikrini bilmek bizi sınırlamaktadır."
 identification_documents:0 "Dijital Tanımlama"
 identification_documents_desc:0 "Dijital kimlik, online servislere erişmelerine izin veren bir kişinin elektronik gösterimidir, satın alımlar yapmak ve başkalarıyla etkileşim kurmaktır."
 impressionism:0 "Emperyalizm"
 impressionism_desc:0 "Bir sanat tarzı, bir sahnenin genel görsel hissini yeniden ortaya çıkarmak için tekniklere odaklandı. Bir durumun hissini ve deneyimini yeniden gözden geçirmenin aynı sanatsal hırsı da görselin ötesinde sanat formlarında uygulandı."
 improved_fertilizer:0 "Mikroencapsulation"
 improved_fertilizer_desc:0 "Mikroencapsulation, koruyucu bir kaplamada vitaminler, lezzetler ve probiyotikler gibi aktif malzemeler içerir. Bu teknoloji, besin teslimatını, raf ömrünü geliştirmek için işlevsel yiyeceklerde yaygın olarak kullanılmıştır ve hassas malzemelerin istikrarı, sertifikalı yiyecekler ve içecekler de dahil olmak üzere gıda üretiminde yeni olanaklar sunuyor."
 international_trade:0 "Neoliberalizm"
 international_trade_desc:0 "Neoliberalizm liberalizmden farklı, çünkü laissez-faire ekonomik politikayı savunmuyor, ancak bunun yerine, toplumun her alanında piyasa benzeri reformlar getirmek için oldukça güçlü bir devlet savunuyor."
 ironclad_tech:0 "21. Yüzyıl Savaşı"
 ironclad_tech_desc:0 "21. Yüzyıl savaş gemileri büyük füze bombardımanlarına dayanabiliyor."
 jeune_ecole:0 "Littoral Combat Ship"
 jeune_ecole_desc:0 "Özerk gemiler aslında denizde uçaklar olan teknelerdir. Ayrıca, birkaç büyükten ziyade çok daha küçük gemilere sahip olmak, aksi takdirde imkansız olacak belirli bir manevra kabiliyetine sahip olmak mümkündür."
 labor_movement:0 "Akıllı telefonlar"
 labor_movement_desc:0 "Genellikle bir telefon olarak adlandırılan bir akıllı telefon, gelişmiş bilgisayar yetenekleri ile geleneksel bir cep telefonunun işlevselliğini birleştiren bir mobil cihazdır."
 land_reform:0 "Toprak Reformu"
 land_reform_desc:0 "Arazi sahipliği ve toplum el ele geçer. Arazi herhangi bir ülkede birincil kaynak ve zenginlik ve statüdür ve bu nedenle araziye sahip olmak zenginlik ve statüye sahip. İstediğimiz toplumu yaratmak istiyorsak, toprağın sahibi olan temel olarak değiştirmek için hazırlıklı olmalıyız."
 lathe:0 "Production Lines"
 lathe_desc:0 "Bir üretim hattı, görevlendirilen bir görevle her biri, üretim akışını sağlar."
 lathes:0 "Lathes"
 lathes_desc:0 "Bir lathe, malzemenin üzerinde çalıştığı bir araçtır, bir matkapa karşı olduğu gibi, bu da materyale karşı döner. Bu bir simetrik modadaki malzemeyi kırıyor. Bu, birçok endüstride, sanatisanal mumyalarından topçu parçalarının sıkıcılarına uygulamaları vardır. Erken lathes, at tarafından ya da sanayi kapsamına bağlı olarak su yakalanarak güçleniyor."
 laws_of_physics:0 "Fizik yasaları"
 laws_of_physics_desc:0 "Hareketdeki vücutları yöneten temel yasalar bir teleskop kullanımı ile kolayca gözlemlenebilir. Sir Isaac Newton bu alanda öncüydü, daha yüksek kaliteli bir yansıtıcı teleskop teknolojisi ve Johannes Kepler tarafından mevcut bilimsel tahminlere olan gözlemlerinin titiz uygulanması sayesinde."
 crystal_glass:0 "Mikroişlemci"
 crystal_glass_desc:0 "Mikroişlemci modern hesaplamanın kalbidir, bilgisayarların daha küçük, daha hızlı ve daha uygun hale gelmesine izin verir. Kişisel bilgisayarların ve teknolojinin hızlı gelişimine yol açtı."
 automatic_machine_guns:0 "Özerk Turret"
 automatic_machine_guns_desc:0 "Gelişmiş istasyonlar otomatik olarak düşman hedeflerine kilitlenebilir."
 malaria_prevention:0 "STEM Hücreleri"
 malaria_prevention_desc:0 "Uzaydaki aşırı koşullar nedeniyle, astronotlar özellikle kozmik radyasyon, mikrogravity ve psikolojik stresin insan bağışıklık sistemini tehlikeye atmaya eğilimlidir."
 manufacturies:0 "Manufacturing Manufacturing Manufacturing Manufacturing"
 manufacturies_desc:0 "Koilds, bir işletmedeki yöntemleri ve işe alım uygulamalarını kontrol etti, işgücüne giriş sınırlamak ve sadece yüksek yetenekli ve sertifikalı (gömen, doğal olarak) zanaatçılar belirli görevleri yerine getiriyor. Giderek artan bir şekilde, sanayiciler şehirleri terk etti ve yeni inovasyon siteleri kurdular, tam standartlardan ve yüksek maaşlardan ücretsiz olarak."
 mass_communication:0 "Cep telefonları"
 mass_communication_desc:0 "Mass Communication bu, cep telefonu gibi teknolojileri kullanan kolay bilgi yayılması."
 mass_propaganda:0 "Autoeducation"
 mass_propaganda_desc:0 "çip implantları sayesinde, dünyadaki tüm bilgiler doğrudan milletlerimize aktarılabilir."
 mass_surveillance:0 "Mass Doğrudan Demokrasi"
 mass_surveillance_desc:0 "Her vatandaşın herhangi bir zamanda oy vermesine izin verin, her şeyde, beyinli mikroçipler aracılığıyla."
 mechanized_farming:0 "Interplanetary-Base"
 mechanized_farming_desc:0 "Diğer gezegenlerde Bases"
 mechanized_workshops:0 "Akıllı Teknoloji"
 mechanized_workshops_desc:0 "Akıllı teknolojiler geleneksel olarak bilgisayarlar tarafından kontrol edilmeyen teknolojilerdir, ancak şimdi."
 military:0 "Askeri Askeri Askeri Askeri"
 military_aviation:0 "Orbital Strike"
 military_aviation_desc:0 "Bir yörünge grevi, yeryüzünde bir hedefte yüksek güç projesini ateş etmek için tasarlanmış bir uydudur."
 mobile_armor:0 "Mech"
 mobile_armor_desc:0 "Multi-Firepower-Platform (MFP) bir tanka benzer ağır bir araç, otonom düşmanları çıkarmak için en son teknoloji ile donatılmış."
 modern_nursing:0 "Stealth Aircraft"
 modern_nursing_desc:0 "Stealth uçakları daha düşük radar imzasına sahip olmak için tasarlanmış uçaklardır."
 modern_sewerage:0 "Cryptocurrency"
 modern_sewerage_desc:0 "Bir kripto, kripto yeterlilik veya kripto, bir hükümet veya banka gibi herhangi bir merkezi otoriteye bağlı olmayan bir bilgisayar ağı aracılığıyla çalışmak için tasarlanmış bir dijital paradır."
 currency_standards:0 "Online Ticaret"
 currency_standards_desc:0 "Online alışveriş, tüketicilerin bir web tarayıcısı veya mobil uygulama kullanarak internet üzerinden bir satıcıdan doğrudan mal veya hizmet almalarına izin veren bir elektronik ticaret şeklidir."
 monitor_tech:0 "AI Gemisi"
 monitor_tech_desc:0 "Gemiler yapay zeka tarafından tamamen kontrol edilir."
 musical_instruments:0 "Müzik Aletleri"
 musical_instruments_desc:0 "Müzik herhangi bir kültürün ve sanatın gelişiminin önemli bir parçasıdır. Bu bağlamda, müzik aletlerinin evrimi bir kültürün ilk olarak gelecekteki tüm kültürel gelişmeler üzerinde yankı etkisi vardır."
 napoleonic_warfare:0 "Proxy War"
 napoleonic_warfare_desc:0 "Proxy çatışmaları iki karşıt güç tarafından etki için savaşıyor, birbirlerine karşı iki zayıf güce sahip oldu."
 nationalism:0 "Terörizm"
 nationalism_desc:0 "Kimyim? Bir kişinin kimliğine çalışan önemli bir sorudur. Geçmişte insanlar bir ilden, bir kasabadan veya hatta bu kimliğin ifadesi olarak bir aile olduklarını söylediler. Yeni bir fikir, bu kavramları aşmak ve bunun yerine ulus arasında paylaşılan bir şey olarak kimlik görmek için gelişmiştir. Dahası, ulus tek bir ülkeye birlik olmalıdır."
 natural_selection:0 "Doğal Seçim"
 natural_selection_desc:0 "Doğal seçim, yaşam formlarının gelecekteki nesillere devredilerek evrimleştiği bir mekanizmadır. Onun keşfi, türlerin nasıl ortaya çıktığını ve çevrelerine göre nasıl adapte edileceğine dair bir açıklama sağlar."
 naval_theory:0 "Deniz Teorisi"
 naval_theory_desc:0 "Deniz hareketlerine bazı strateji uygulayarak, çok daha etkili bir Donanma yapmak mümkündür."
 drydocks:0 "Modern Shipyard"
 drydocks_desc:0 "Gemilerin kuru arazi üzerinde dolanabileceği kapalı alanlar oluşturmak, aynı zamanda daha kolay ve daha kapsamlı kargo gemilerinin ve savaş gemilerinin bakımına olanak sağlar."
 navigation:0 "Modern Gemi İnşaı"
 navigation_desc:0 "Çeşitli farklı yöntemlerle, yıldızlardan, haritalara, bir pupasse, dünya çapında bir kurs doğru bir şekilde grafik yapmak mümkündür."
 neoclassicism:0 "Neoklasikizm"
 neoclassicism_desc:0 "Klasik sanat dönemi, tiyatro ve müzik yaklaşık 1750'den 1820'ye kadar, o zamandan beri Neoklasik olarak etiketlendi. Adı aynı zamanda Klasik Antiquity'ye de hayranlar ve bu nedenle Batı'nın yüksek kültürünü Roma ve Yunanistan'a kıyasla karşılaştırır, böylece Avrupa'nın egemen sınıfında bilinen dünyanın ustaları olarak bilinir."
 nitrogen_fixation:0 "Astroloji"
 nitrogen_fixation_desc:0 "Astroid madenciliği, uzaydaki astroidlerden kaynak koleksiyonudur"
 nitroglycerin:0 "Modern Borular"
 nitroglycerin_desc:0 "Modern boru hatları kömür, petrol, LNG (Liquified Natural Gas) ve geniş mesafelerdeki diğer sıvılara izin verir."
 open_hearth_furnace:0 "Açık Kalp"
 open_hearth_furnace_desc:0 "Çelik üretimi domuz demirinden uzaklaştırma boşluklarını içerir ve sonra sizden sonraki çelik notunu oluşturmak için diğer malzemeler de ekliyor. Çelik üretmek için çok yüksek sıcaklıklar gerektirir ve açık kalp fırından ısı tuğlalarını ısıtmak ve bu tuğlaların enerjisini fırının ısıtmak için geçer. Süreç diğerlerinden daha yavaştır, ancak büyük miktarda çelikin tek bir topluda üretilmesine izin vermek daha kolaydır."
 open_hearth_process:0 "Erken 3D Baskı"
 open_hearth_process_desc:0 "3D baskı 1980'lerde başladığında, 2000'ler genişlemesini tam ölçekli üretime gördü. Katman katmanlı malzeme inşaatına izin veren teknoloji, havacılık, otomotiv ve tıbbi cihazlar gibi endüstrilerde ivme kazandı."
 opium_dens:0 "Opium Dens"
 opium_dens_desc:0 "Bir Opium den sadece bir yer opium satın alınabilir ve sigara içilir. Bununla birlikte, bu denlerin daha günahçı bir iyilik olduğuna ve ahlaki bir yolsuzluk kaynağıdır."
 paddle_steamer:0 "Ballistics"
 paddle_steamer_desc:0 "Füze her zaman nerede olduğunu bilir. Bunu biliyor çünkü nerede olmadığını biliyor, nerede olduğunu, nerede olmadığını, nerede olmadığını ya da nerede olmadığını, hangisinden daha büyük olduğunu, bir fark edin, ya da sapma elde ediyor."
 pan-nationalism:0 "Pan-nationalism"
 pan-nationalism_desc:0 "Through organizations like the EU, de-facto super-states can be formed through trade & economic relations."
 percussion_cap:0 "Ağır Saldırı Tipi"
 percussion_cap_desc:0 "SCAR-L gibi ağır tüfekler özel operasyonlar için geniş ateş gücü sağlar."
 percussion_caps:0 "Percussion Caps"
 percussion_caps_desc:0 "Percussion caps daha önce güvenilmez ateşli silahlar alır ve herhangi bir havada ateş etmek için mümkün kılar."
 personal_liberty:0 "Kişisel Özgürlük"
 personal_liberty_desc:0 "Toplumun nasıl yönetileceği sorusuna ek olarak, yönetişimin ötesinde ne olması gerektiği sorusu da vardır. Büyük çoğunluğun tirazının liberal ideallerin önemli bir parçasıdır."
 social_media:0 "Sosyal Medya"
 social_media_desc:0 "Sosyal medya, kullanıcıların bilgi, fikir ve içeriği sanal topluluklar ve ağlar aracılığıyla paylaşmalarına izin veren bir teknoloji koleksiyonudur."
 policing_by_consent:0 "Policing Tarafından Consent"
 policing_by_consent_desc:0 "Sir Robert Peel, Home Sekreter olarak hizmet ederken, Metropolitan Polisi yarattı, Avrupa tyrants'ın genciliğinden ayrı ayrı bir şekilde, çünkü askerler siyasi düşmanları bastırmak yerine halk ilgisini çekiyorlar."
 political_agitation:0 "Dijital Devrimler"
 political_agitation_desc:0 "İnternet aktivizmi şimdi büyük devrimlere ve tarihsel olaylara ayak uydurma gücüne sahiptir."
 political_theory:0 "Siyaset Teorisi"
 political_theory_desc:0 "Bir ülke nasıl çalıştırmak birçok soru sormaya başladı ve bir devlet için tam olarak en iyi mavi baskının neye benzeyeceğine dair birkaç teori hazırlandı."
 popular_sovereignty:0 "Popüler Egemenlik"
 popular_sovereignty_desc:0 "Bir devletin otoritesi ve hükümetin uzatılması sadece halkın onayı aracılığıyla oluşturulabilir ve devam edebilir. Özgür bir hükümette yöneticiler hizmetkârlar ve halkları üstün ve egemenliklerdir."
 portland_cement:0 "Portland Çimento"
 portland_cement_desc:0 "Bu nedenle, Dorset'teki bir adadan taşa benzeyen bir araya gelmek için adlandırılmıştır, İngiltere, bu çimento büyük yapılar inşa etmek için kullanılan betonda etkili bir bileşendir. Limestone ve diğer ortak malzemelerden üretilir, çok ucuz hale getirir."
 potash:0 "Potash"
 potash_desc:0 "Ahşap yakmak ve külleri bir su bardağına yatırmak suretiyle, cam, sabun, lye, tabanca ve gübre üretimi gibi kimyasal süreçlerde kullanılır. İsmini bu süreçlerdeki aktif madde olan element potasyuma ödünç verir."
 power_looms:0 "Power Looms"
 power_looms_desc:0 "Bir ekran, yün, pamuk ve diğer fiberler için bir cihazdır. Erken ortaya çıkanlar, ipi döndürmek için el veya ayak gücünü kullandı. 1733'te icat edilen 'flying servisi', endüstriyel devrimi teşvik ediyor ve sahip olduğumuz mekanik güç kullanımı daha az yetenekli weavers to mass production cloth. Ek yenilikler Jacquard, 1804'te otomatik modellere gelişmiş bir programlanabilir yumruk kart sistemi içerir."
 power_of_the_purse:0 "Power Projection"
 power_of_the_purse_desc:0 "Güç projeksiyonu, diğer ülkelerdeki heer intimidasyon yoluyla gemiler kullanır."
 pre_modern_warfare:0 "Pre-Modern Savaş"
 pre_modern_warfare_desc:0 "Modern savaşın ravajlarına kıyasla geçen yıl solun çatışmaları henüz kendi sağlarında kanlı işlerdi."
 production:0 "Prodüksiyon Prodüksiyon"
 propaganda:0 "Propaganda"
 propaganda_desc:0 "Devrimci ve Napolyon savaşları sırasında, Avrupa hükümetleri, ortak insanlar tarafından karşı karşıya kalan zorluklar için kamu desteğini almak için propaganda kanatlarını kurdular. Siyasi broşürler ve satirical karikatürler şehirlerde dağıtıldı, vatanseverce metinler popüler melodiler için güneş için yazılmıştır."
 puddling_furnaces:0 "Puddling Fırınlar"
 puddling_furnaces_desc:0 "Bir puddling fırın, domuz demirinden demir üretmek için kullanılır. Bir tuğla fırın ısıtılır, böylece demir, eşlik eden cinder ile eriyir, bu karışımın mekanik olarak çalıştığından sonra, bir kargabar ile olduğu gibi, demirdeki aşırı karbon, hava ile temasa getirilir, karbon monoksit oluştururken, sulfur ve diğer sıkıntılar yüzeye yükselir. El tarafından iki saat sonra, "puddle balls" sert demir formunun oluşturulması ve kalan çamurdan kaldırılabilir. Bu zor, yetenekli ve bu nedenle pahalı bir iştir."
 quinine:0 "mRNA Vaccine"
 quinine_desc:0 "Bir mRNA aşısı, bir bağışıklık yanıtı üretmek için adı verilen bir molekülün kopyasını kullanan bir aşı türüdür."
 radio:0 "Interplanetary Communication"
 radio_desc:0 "Görünmez ‘ dalgalar’ı kullanarak, radyodan çok daha hızlı bilgi almak mümkündür."
 railways:0 "Yüksek Hızlı Demiryolular"
 railways_desc:0 "Son teknolojiler ürünlerin ve insanların ultra hızlı ulaşımını sağlar"
 rationalism:0 "Kültür Devrimi"
 rationalism_desc:0 "1960'ların kültürel devrimi, dünya çapında toplumsal tutumlarda bir değişikliğe yol açtı."
 realism:0 "Dijital Kamera"
 realism_desc:0 "Bir dijital kamera, aynı zamanda bir kazma olarak da adlandırılan bir kamera, dijital hafızada fotoğraflarını çeken bir kameradır."
 reinforced_concrete:0 "BIM"
 reinforced_concrete_desc:0 "2000'lerde yaygın olarak kabul edilen Bilgi Modelleme (BIM), bir binanın fiziksel ve işlevsel özelliklerinin dijital bir gösterimidir. Bu 3D modelleme teknolojisi daha verimli planlama, tasarım ve inşaat için izin verdi."
 repeaters:0 "Lazerler"
 repeaters_desc:0 "Lazerler, savaş amacı için belirli yönlerde enerji konsantrasyonuna izin verir"
 rifling:0 "Hafif Savaş Tırnak"
 rifling_desc:0 "Son hafif savaş tüfeği, ülkemizin askerlerini mümkün olan en verimli ateş gücü ile donmasını sağlar."
 romanticism:0 "Videocassette Recorder"
 romanticism_desc:0 "Videocassette Recorder (VCR) veya video kaydedici, yayın televizyonu veya diğer AV kaynaklarından analog ses ve analog video kayıtlarını kayıt eden bir elektromekanik cihazdır ve kayıtları tekrar kaydırdıktan sonra tekrar oynayabilir."
 rotary_valve_engine:0 "Yapay Zeka"
 rotary_valve_engine_desc:0 "AI'nın kitlesel ürün üretmek için kullanımı"
 rubber_recycling:0 "Kauçuk geri dönüşüm"
 rubber_recycling_desc:0 "Eski kauçukları çiğnemek ve reform yapmak için bir ‘masticator’ kullanımı, bu değerli materyali geri dönüştürmemizi ve yeniden kullanmamızı sağlar."
 rubberised_fabrics:0 "Kauçukized Fabrics"
 rubberised_fabrics_desc:0 "İki kumaşı birlikte tutmak için doğal kauçuk kullanmak veya bitki fiberleri bir tür yapay deriye birleştirmek, Mackintosh ceketi veya askıya alınanlar gibi elastik kıyafetler gibi su geçirmez makaleler üretir."
 rule_of_law:0 "Hukuk Kuralı"
 rule_of_law_desc:0 "Genellikle bir hükümet sistemi içinde yazılı (ABD'de olduğu gibi) veya yazılı olmayan (Birleşik Krallık'ta olduğu gibi) bir yasa, kanunun ajanlarının kendileri, devlet şiddetinin öngörülebilir olduğu gibi, bu nedenle yasadışı ve suçların cezasının ne olacağını açıkça ortaya koyarlar."
 screw_frigate:0 "Guided Füze Destroyer"
 screw_frigate_desc:0 "Rotalı füze imha edici, bir filosun varlığından bile önce hedeflerine vurmak için füze kullanıyor"
 sea_lane_strategies:0 "Gelecek Deniz Stratejisi"
 sea_lane_strategies_desc:0 "Gelecek deniz stratejileri muhtemelen AI etrafında dönüyor."
 semaphore_signalling:0 "Semaphore Signalling"
 semaphore_signalling_desc:0 "Demiryolu sinyalleri, demiryolu hatlarında aktif olarak trenlere talimat verir, bir lokomotif hareket halinde olduğundan ve bir istasyondaki personelden uzaktır. Sepmaphore sinyallerinin kullanımı, Napolyon'un orduları tarafından kullanılan bir askeri sinyal sistemi tarafından ilham verilen, tüm demiryoluların kullanabileceği tek bir sistem yaratır."
 separation_of_powers:0 "Güçlerin Ayrılığı"
 separation_of_powers_desc:0 "Farklı hükümet dallarının, yolsuzluk ve istismarın önlenmesini engelleyen farklı rollerle ilgili fikri çok daha popüler hale geldi, çünkü Anayasa hükümeti yönetici, yasama ve yargı dallarına ayırdı."
 sericulture:0 "Sericulture"
 sericulture_desc:0 "Eski ve yakından, ipek üretimi için ipek solucanları yetiştirme tekniği."
 sewage_systems:0 "Sewage Systems"
 sewage_systems_desc:0 "Kentlerin büyümesi nehirlere kanalizasyonla yol açtı, siyah ve ölüm gibi kokladılar. Bu foul suları şehirden taşımak için kanalizasyon sistemleri inşa eden eskilere bakmak için zaman."
 shaft_mining:0 "Madencilik Machinery"
 shaft_mining_desc:0 "Ağır üretim makinelerinin dağıtımı sayesinde, doğal kaynakların üretimi için küresel pazarda rekabet edebiliriz."
 shell_gun:0 "Reaktif Zırh"
 shell_gun_desc:0 "Bir savaş tankı (MBT), aynı zamanda bir savaş tankı veya evrensel tank veya sadece tank olarak da bilinen bir tank, birçok modern orduda zırh ve manevra rolünü dolduran bir tanktır."
 slag_fertilisers:0 "Slag gübres"
 slag_fertilisers_desc:0 "Patlama fırınlarından ve çelik dönüştürücülerden gelen atıkların düşük pH değeri, tarım amaçlı toprak için mükemmel bir ek yapar. Silicate lime slag doğal limestone veya dolomite'den daha belirgindir, toprağın fosfat içeriğini arttırır."
 socialism:0 "Doğru - Populism"
 socialism_desc:0 "Doğru popülizm, aynı zamanda ulusal popülizm ve doğru popülizm olarak da adlandırılır, popülist retori ve temalarla doğru siyasi bir ideolojidir."
 society:0 "Toplum Topluluğu"
 enclosure:0 "Verimli Çiftçilik"
 enclosure_desc:0 "Kitle üzerinde çiftçilik yaparak, bir hükümet tarafından yönetilen bir sistemin yardımıyla, dünya pazarında rekabet etmek için yeterli çıktımızı artırabiliriz."
 intensive_agriculture:0 "Pestisitler"
 intensive_agriculture_desc:0 "Kimyasallar, böcekleri ve bakterileri ortadan kaldıran gıda üretiminde kullanılır."
 steam_donkey:0 "Sürdürülebilir Üretim"
 steam_donkey_desc:0 "Çevre etkisinin artan farkındalığıyla, üreticiler daha sürdürülebilir üretim yöntemlerini benimsemeye başladı."
 threshing_machine:0 "Ticari Uzay"
 threshing_machine_desc:0 "Güneş pannellerimizin, nükleer santrallerimizin ve rüzgarmilllerinin efficency'i arttırır"
 steel_frame_buildings:0 "Hologramlar"
 steel_frame_buildings_desc:0 "Holografi, bir dalgasın kaydedilmesine ve daha sonra yeniden inşa edilmesine olanak sağlayan bir tekniktir. Üç boyutlu görüntüler üretmek için en iyi bilinen ve veri depolama, mikroscopy ve interferometry dahil olmak üzere geniş bir kullanım yelpazesine sahiptir. Prensip olarak, herhangi bir dalga türü için bir hologram yapmak mümkündür."
 steel_railway_cars:0 "Elektrikli Otomobil"
 steel_railway_cars_desc:0 "2000'lerde hızlanan otonom araçlara araştırma ve geliştirme. ABD Savunma Bakanlığı tarafından organize edilen DARPA Grand Challenge (2004 ve 2005), büyük bir dönüm noktasıydı, kendi arabalarında erken denemeler yaptı."
 stormtroopers:0 "Uzman Uzmanı"
 stormtroopers_desc:0 "İnsan birliklerine sahip olmak, özellikle AI’nın yıkımı ve birimleri yakalaması için eğitilmiş ve donanımlıydı."
 streamliners:0 "Akışkanlar"
 streamliners_desc:0 "Modern traktif güç ve yeni alüminyum inşaat kullanarak yeni tren tasarımları, demiryoluların daha yüksek hızlarda daha fazla tren çalıştırmasını sağlar."
 submarine:0 "Future Submarines"
 submarine_desc:0 "Geleceğin denizaltıları, yıkıcı grevlere izin veren gelecekteki teknoloji tarafından yönlendirilmektedir."
 multilateral_alliances:1 "Ağonikler"
 multilateral_alliances_desc:0 "ryonikler, onları çok düşük sıcaklıklarda donanarak yasal olarak ölen bireyleri korumak, gelecekteki tıbbi teknolojinin onları yeniden canlandırabilme ve ölümlerine neden olan durumu tedavi edebilmeleridir."
 synthetic_dye:0 "Sentetik Dye"
 synthetic_dye_desc:0 "Bu, farklı boya türlerini sentetik bir şekilde yaratan kimyasal bir süreçtir. Kumaş rengini devrime uğrattı ve tarım boyalarının üretimine son verdi, bu da üretmek için çok pahalı oldu."
 system_gin:0 "Otomobil"
 system_gin_desc:0 "Otomobiller, topraklar boyunca insanların ve malların hızlı taşınmasına izin verir."
 telegraph:0 "Telegraph"
 telegraph_desc:0 "Elektrik neredeyse anında, Morse kodu ile gibi sinyalleri azaltmak için kullanılabilir. Gecikme kaynağı insan operatöründe, kısa ve uzun ‘dotlar’ ve ‘dashes’ gürültü şeklinde transfer edilen mesajları kod ve kodlama için iyi eğitilmeli."
 telephone:0 "Akıllı Şehir"
 telephone_desc:0 "IoT cihazlarının şehir altyapısına entegrasyonu, şehirlerin su, elektrik, trafik ve atık gibi kaynakları gerçek zamanlı olarak izlemelerini ve yönetmelerini sağlar."
 telephones:0 "Telefonlar"
 telephones_desc:0 "Teoride, konuşma telgrafının fikrinin mümkün olabileceğini biliyoruz, ancak sadece nasıl emin değildik. Elektronik alanında ilerlemeler bu fikri nihayet mümkün kıldı ve telefon doğdu."
 tin_cans:0 "Tin Cans"
 tin_cans_desc:0 "Gıda tarihleri, Fransız Devrimi orduları tarafından kullanılan cam kavanozlara geri döndü. Yakında, fikir sivil kullanıma yayılıyor. Bir metal içinde pişirilen et veya çorba dış dünyaya maruz kalmaktan korunabilir ve orta sınıf aileler tarafından eğlencede tüketilebilir. Adı, açık havadaki metali korumak için demir veya çelik plakanın dışında ince bir teneke katmanına sahiptir."
 trench_works:0 "Recon Tank"
 trench_works_desc:0 "Şok dalgaları ve jam düşman birlikleri göndermek için kullanılan cihazlar"
 triage:0 "VTOL Uçakları"
 triage_desc:0 "Dikey Takeoff ve Landing Uçakları (VTOL), bir runway ihtiyacı olmadan dikey olarak dışarı çıkabilecek bir uçak türüdür."
 urban_planning:0 "Fiat Döviz"
 urban_planning_desc:0 "Fiat para birimleri altın tarafından desteklenmeyen para malzemeleridir."
 urbanization:0 "Uluslararası Organizasyonlar"
 urbanization_desc:0 "Birleşmiş Milletler gibi uluslararası kuruluşlar barışı korumak ve dünya çapında ekonomik büyümeyi teşvik etmeyi amaçlıyor."
 vaccination:0 "Vaccination"
 vaccination_desc:0 "İnsanların, bir hastalığın daha az virulent formlarının yüzyıllarca bilindiğini umuyordu ancak aynı zamanda oldukça riskliydi. Daha az tehlikeli ama ilgili bir hastalık kullanarak ya da hastalıkların ajanlarını tedavi ederek, bu nedenle enfekte olma yeteneğini kaybettiler, çok daha güvenli ve çok daha güvenilirdi."
 vacuum_canning:0 "Lean Manufacturing"
 vacuum_canning_desc:0 "Lean üretimi, 1990'larda ortaya çıkan bir konsept, üretim sistemlerinde atıkları azaltmaya ve verimliliği geliştirmeye odaklanır. Değersiz aktiviteleri ortadan kaldırmak, kaliteyi geliştirmek ve müşteri memnuniyetini artırmakla süreçlerin sürekli gelişimini vurgulamaktadır."
 vulcanization:0 "Özerk Drones"
 vulcanization_desc:0 "Teslimat droneları, Amazon ve Wing test ticari drone teslimat sistemleri gibi şirketlerle, hızla ve kırsal alanlarda etkin bir şekilde paketler kurma yeteneğine sahiptir."
 wargaming:0 "Combat Simülasyons"
 wargaming_desc:0 "hayali savaş senaryolarını alay etmek ve strateji uygulamakla, memurların savaş yeteneklerini geliştirmek mümkündür."
 water_treatment:0 "Su Tedavisi"
 water_treatment_desc:0 "Su, hastalıkları evimize taşımak için bulundu. Yine de bilimin cevabı var, suları filtreleme ve kimyasal tedavilerin uygulanmasıyla tekrar temizleyebiliriz."
 wood_pulp_papermaking:0 "Wood Pulp Papermaking"
 # gold_standard_desc: "This meant a currency system based on gold. Money was rather expensive to produce by the government and this could sometimes result in a low of money stock. However, the good thing was that the gold prices were rather stable and the trust in gold was high, making the currency stable."
 # savings_banks_desc: "The middle-class is growing larger and wealthier thanks to education and a strong work ethic. Many individuals wish to be part of railways through Africa; dams across the Nile; fleets of ocean Greyhounds; majestic, self-amortizing canals; plantations of ripening tea; all from tuppence prudently, fruitfully, frugally invested (to be specific) in the Dawes-Tomes-Mousely-Grubbs Fidelity Fiduciary Bank."
 # silver_standard_desc: "This meant a currency system based on silver. Money was cheaper to produce by the government which meant that there was rarely any lack of money in the country. However, the problem was that the silver prices had a tendency to be dominated by gold prices, which meant that foreign trade was often suffering."
#  acidic_and_basic_converters: "Acidic and Basic Converters"
#  acidic_and_basic_converters_desc: "The original Bessemer converters had a lining of insulating clay between the walls and the molten iron. The #clay is acidic and affects the composition of the resulting steel. By replacing the clay with basic (alkaline) materials such as magnesite, chromite or dolomite, or more acidic materials such as ganister, the process can be fine tuned to remove even more impurities, depending upon the content of the iron ore."
#  fluid_compressed_steel: "Fluid Compressed Steel"
#  fluid_compressed_steel_desc: "This process involves the use of a hydraulic forging press to put the steel under great pressure while still a #fluid. This squeezes the tiny pockets of gas impurities out of the cooling ingots, allowing for a much higher quality steel by preventing the #formation of blowholes and piping."
#  global_trade_desc: "By the end of the 18th century, the world-system had encompassed almost the entire globe, with raw materials being imported #from the colonies and peripheral nations and turned into finished goods in the global core, to be exported in turn."
#  guilds: "Guilds"
#  guilds_desc: "The guild system was a way of organizing labor which mandated participation in the guild and in advancing through its ranks in order #to practice the guild trade within a city. While it protected the living standards of the guild members and supposedly ensured better quality #work, it also raised prices and stymied innovation."
#  hydraulic_forging_press: "Hydraulic Forging Press"
#  hydraulic_forging_press_desc: "A hydraulic forging press applies applies massive force, up to thousands of pounds per square inch, to a material #that is being worked while hot. An engine drives water, air or hydraulic fluid through valves connected to a piston, which in turn presses the #die onto the material. The valves can be turned on and off by the operator, allowing the material to be manipulated and precise amounts of force #applied at will."
#  mutualism_desc: "An economic theory usually associated with anarchism, mutualism opposes capital interest but advocates free markets and advocates #the formation of  mutual savings banks as a method for loans."
#  news_agencies: "News Agencies"
#  news_agencies_desc: "Organizations which sell news reports to various media, such as newspapers. This allows for media to include reports of #events and developments beyond the reach of their own bureaus and international news to be reported even in local media."
#  one-nationism: "One-nationism"
#  one-nationism_desc: "A type of conservative politics wherein social obligation and responsibility towards the poor and needy is combined with #traditional conservative ideals. Opposed to class struggle, one-nation conservatives seek to create a hierarchy wherein the classes support each #other."
#  percussion_oil_drilling: "Percussion Oil Drilling"
#  percussion_oil_drilling_desc: "When using a percussion drill, the drill-bit is raised by hand and then released to bite into the earth under the #force of gravity. Depths of up to around thirty metres are possible using this technique."
#  private_banks: "Private Banks"
#  private_banks_desc: "The wealthy merchant families of city states, and the royal families of European monarchies, need somewhere safe to keep #their piles of gold and someone to look after their finances. The first banks were created with this goal in mind."
