 medical_degrees:0 "Compact Disc"
 medical_degrees_desc:1 "Kompakt disk (CD) Philips ve Sony'nin dijital ses kayıtlarını depolamak ve oynamak için geliştirilmiş dijital optik disk veri depolama formatıdır."
 organized_sports:0 "Terörle Mücadele"
 organized_sports_desc:1 "Terörizm eğitimi (bazen terörizme müdahale eğitimi veya terörle mücadele hazırlığı) farkındalık, hazırlık, önleme ve yanıt yöntemleri sağlayarak yakın bir terörist saldırı tehdidini ele alır."
 central_banking:0 "Modern Solizm"
 central_banking_desc:1 "Sol sağ politika, destek veren siyasi ideolojilerin aralıklarını ve sosyal eşitliği ve eşitlikçiliği elde etmek için aramayı anlatıyor."
 corporate_charters: "Kurumsal liberalizm"
 corporate_charters_desc: "Kurumsal liberalizm, Amerika Birleşik Devletleri'nde onuntoriyografisinde ve kurumsal elitlerin hem de sözde anti-iş düzenlemeleri için başlıca lobiciler haline geldiği açık kapı emperyalizmi için bir araçtır."
 joint_stock_companies: "Modern Para Teorisi"
 joint_stock_companies_desc: "Modern para teorisi veya modern para teorisi (MMT), parasal bir tekel olarak tanımlayan heterodox makroekonomik teoridir ve parasal tekelin vergileri ödemek ve tasarruf arzularını karşılamak için gereken finansal varlıkların tedarikini kısıtladığı kanıt olarak işsizliktir."
 investment_banks: "AI Financial Advisors"
 investment_banks_desc: "Robo-advisors, minimum insan müdahalesi ile finansal planlama hizmetleri sağlamak için algoritmaları ve yapay zekayı kullanır."
 corporate_management: "İnternet Yöneti"
 corporate_management_desc: "Hükümetin internetin tam kontrolünü ele alması için izinler"
 dialectics:0 "Influencers"
 dialectics_desc:1 "Sosyal medya influencerı olarak da bilinen bir influencer, sosyal medyada etkili ve iyi bilinen bir internet ünlüsidir. Modern terimin referansı, bir işletme varlığının sosyal medya etkisi için üçüncü faaliyet için ürünlerini ve hizmetlerini teşvik etmek için ödediği ücretli bir roldür."
 psychiatry:0 "Memeler"
 psychiatry_desc:1 "Bir internet meme veya meme, kültürel bir öğedir (örneğin internetteki, öncelikle sosyal medya platformları aracılığıyla yayılan bir fikir, davranış veya stil gibi)."
 postal_savings:0 "Mortgage-Backed Securities"
 postal_savings_desc:1 "Bir altprime ipotek, geleneksel bir banka veya kredi birliği ile bir ipotek için tipik gereklilikleri karşılamayan insanlara verilen bir kredi türüdür."
 human_rights:0 "Animal Welfare"
 human_rights_desc:1 "Hayvan refahı pozisyonları, hayvanların belirli insan davranışlarından korunması gerektiğini iddia ediyor."
 mutual_funds:0 "Gigeconomy"
 mutual_funds_desc:1 "Ocak 2021'de, Amerikan video oyununun perakendeci Game Dur ve diğer menkul kıymetlerin stoklarının kısa bir sıkıştırılması, belirli koruma fonları ve kısa satıcılar için büyük finansal sonuçlara neden oldu."
 zeppelins:0 "Starship"
