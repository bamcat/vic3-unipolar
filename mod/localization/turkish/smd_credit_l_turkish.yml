 great_recession_credit_crunch_desc:0 "bankacılık sistemi ele alındı. Bankalar ödünç almayı reddediyor - işletmelere, birbirlerine, herkese. Kredi buharlaştı. Yatırım çöktü. İnşaat yavaşladı. Ekonomi finansal sisteme geri dönene kadar geri kazanmayacaktır."
