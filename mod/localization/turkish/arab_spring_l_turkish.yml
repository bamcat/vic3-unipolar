 # ==========================================
 # SPARK EVENTS
 # ==========================================

 2011_protests.1.t: "A Street Vendor kendini Alight"
 2011_protests.1.d: "Sidi Bouzid'in il kasabasında, Muhammed Bouazizi adında genç bir sokak satıcısı kendisini polis arabasından sonra yerel hükümet ofislerinin önünde ateş açtı ve onu açıkça aşağıladı.\n\n Desperasyon eylemi bir yıldırım çubuğu haline geldi. Saatler içinde protestolarının görüntüleri sosyal medyada yayıldı. Kalabalıklar sadece Sidi Bouzid'de değil, [ROOT.GetCountry.GetName] arasında bir araya geldiler. Bir nesilin birikti - yolsuzluk, işsizlik ve otoriter kuralın taşlama ağırlığı - sembolünü buldu.\n\n [SCOPE.GetRootScope.GetCountry.GetRuler.GetLastName] rejim nasıl cevap vereceğine karar vermelidir. Ne yaparsa, dünya izliyor."
 2011_protests.1.f: "Bir erkeğin çaresizliği bir ulus haline geldi."
 2011_protests.1.a: "Crack down - yayılmadan önce gösteriler dağıtın"
 2011_protests.1.b: "Teklif imtiyazları - polis davranışlarına bir soruşturma ilan"

 2011_protests.2.t: "Tunus Tremor"
 2011_protests.2.d: "Tunus'taki huzursuzluk Arap dünyasında şok dalgası gönderdi. Uydu kanalları saat boyunca Tunis'ten sahneleri yayınlıyor - ve [ROOT.GetCountry.GetName] sıradan insanlar izliyor. Kahve dükkanlarında ve sosyal medyada fısıldanan soru şu anda bölgedeki her otoriter rejimin kendisini soruyor:\n\n Burada olabilir mi?"
 2011_protests.2.f: "Her rejim izliyor. Her dissident not alıyor."
 2011_protests.2.a: "Tunus farklıdır - bu [ROOT.GetCountry.GetName]"
 2011_protests.2.b: "önlemler alın – bu işten çıkmadan önce sıkı güvenlik"

 # ==========================================
 # MISSING STRUCTURAL MODIFIERS
 # ==========================================

 modifier_arab_spring_transition_cabinet: "Geçiş Hükümeti"
 modifier_arab_spring_transition_cabinet_desc: "Yeni bir hükümet devrimin uyanmasında kuruldu. Legitimacy bu erken günlerde yüksektir - ancak karşı-revrimin ayak bulduğundan önce konsolide edilmesi gerekir."

 modifier_arab_spring_kick_out_of_insurrection: "Barricades'ten aşağı"
 modifier_arab_spring_kick_out_of_insurrection_desc: "Devrim, derhal hedeflerine ulaştı. Bu grup, sigortacı duruşunu terk ediyor ve resmi siyasi hayata giriyor - şu an iyi niyetle yola çıktı."

 modifier_arab_spring_regime_ig_defeated: "Devrim Tarafından Tanımlandı"
 modifier_arab_spring_regime_ig_defeated_desc: "Bu grubun eski rejimle olan ilişkisi, sevgiliye mal oldu. Hükümetten kovuldu ve siyasi gücü azaldı. Ayılardan yeniden inşa edilebilir olsun görülmek için kalır."

# ==========================================
 # ARAB SPRING INTERNATIONAL EVENTS
 # ==========================================

 # ── arab_spring_intl.1 ───────────────────

 arab_spring_intl.1.t: "Arap Dünyası Yanıyor"
 arab_spring_intl.1.d: "Protestolar, Tunus'ta başlayan Arap dünyasında patlak verdi. On yıl otoriter kuralı, ekonomik durgunluk ve siyasi baskı milyonlarca sokaklara yol açtı."
 arab_spring_intl.1.f: "Tarih tarihi izleyenleri izliyor."
 arab_spring_intl.1.a: "Protestocularla ayağa kalkın – demokrasi ve insan hakları bunu talep ediyor"
 arab_spring_intl.1.b: "İncumbent rejimleri geri dönün - istikrar ve ilgilerimiz ilk önce gelir"
 arab_spring_intl.1.c: "Tüm taraflarda kısıtlamalar için çağrı - barışçıl bir çözüm çağrısı"

 # ── arab_spring_intl.2 ───────────────────

 arab_spring_intl.2.t: "Intervention Sorusu"
 arab_spring_intl.2.d: "[scope:civil_war_country_scope.GetName] durumundaki durum açık sivil savaşa yol açtı. [scope:civil_war_country_scope.GetRuler.GetName]'nin güçleri sivil topluluklara saldırıyor ve katliamın güvenilir raporları var. Uluslararası topluluk bir yanıt arıyor.\n\n[ROOT.GetName] Daha önce protesto hareketleri için destek ifade etti. Şimdi soru, bu desteğin harekete geçip ne pahasına olursa olsun."
 arab_spring_intl.2.f: "Kelimeler ve işler farklı para birimleridir."
 arab_spring_intl.2.a: "No-fly bir bölgeyi zorlamak - hava grevlerinden sivilleri korumak"
 arab_spring_intl.2.b: "Ordu ve muhalefet güçlerini zeminde destekliyor"
 arab_spring_intl.2.c: "Bu bizim savaşımız değil - bunun dışında kalmak"

 # ── arab_spring_intl.3 ───────────────────

 arab_spring_intl.3.t: "Arap Baharı: Bir Reckoning"
 arab_spring_intl.3.d_success: "Arap Baharı en az bir gerçek demokratik geçiş yaptı. Bu kırılgan bir başarıdır, kolayca terslenir - ama gerçek. [ROOT.GetName] Bu olayları uzaktan izleyen, tarihin yayının bazen adalete doğru eğilebileceğini görmekte sessiz bir tatmin vardır. Şimdi soru, ne kazandığını nasıl destekleyecektir."
 arab_spring_intl.3.d_islamist: "Arap Baharı sona erdi - ve mimarları umduğu gibi değil. Bölgede, İslamcı hareketler isyanlara başlayan laik protesto koalisyonlarından daha iyi organize etmişlerdir. [ROOT.GetName] için, sonuç rahatsız: şampiyonu olan demokrasi, kendi değerlerinden farklı olan hükümetler üretti. Yeni Arap düzeni ile olan ilişki dikkatli bir navigasyon gerektirecektir."
 arab_spring_intl.3.d_failure: "Arap Baharı söndü. Affetmek gibi görünen rejimler, güvenlik hizmetleri yeniden kuruldu, sürgündeki veya cezaevindeki rakipleri. [ROOT.GetName] için, bölüm ahlaki açıklıkların ahlaki aktiviteden daha kolay olduğuna dair bir hatırlatmadır. Ayaklanmaları uyandıran şikayetler çözülmedi. Onlar sadece ertelendi."
 arab_spring_intl.3.f: "Dünya hareket eder. Bölge unutmaz."
 arab_spring_intl.3.a: "Ne olduğunu stoklayın"

 # ==========================================
 # INTERNATIONAL MODIFIER NAMES
 # ==========================================

 arab_spring_intl_pro_democracy_stance: "Pro-Demokracy Stance"
 arab_spring_intl_pro_democracy_stance_desc: "Bu ülke, Arap Baharı'nın protesto hareketleriyle kendini halka açık bir şekilde karşılamıştır. Demokratik uluslar arasındaki prestiji yükseldi - ancak Arap rejimleri ile ilişkiler serinledi."

 arab_spring_intl_stability_first_stance: "Stability First"
 arab_spring_intl_stability_first_stance_desc: "Bu ülke, protesto hareketlerinin üzerinden Arap rejimlerine geri dönmek için seçildi. Bölgedeki stratejik ilişkiler daha güçlüdür - ancak uluslararası itibarına maliyetle."

 arab_spring_intl_neutral_stance: "Cautious Restraint"
 arab_spring_intl_neutral_stance_desc: "Bu ülke, her iki tarafa geri dönmeden barışçıl bir karar için çağrıda bulunuyor. Diplomasi esnekliğini korudu - ancak sonucun üzerindeki etkisini feda etti."

 arab_spring_intl_western_backing: "Western Backing"
 arab_spring_intl_western_backing_desc: "Bu hareket batı hükümetlerinden halk desteği aldı. Uluslararası dikkat, momentumuna ekleniyor ve rejim için daha pahalı baskı yapıyor."

 arab_spring_intl_regime_backing: "Western Regime Support"
 arab_spring_intl_regime_backing_desc: "Batı hükümetleri, protestoculardan ziyade bu hükümetin ağırlığını attılar. Dış doğrulama, rejimin otoritesini ve meşruiyetini güçlendiriyor."

 arab_spring_intl_no_fly_zone: "No-Fly Zone"
 arab_spring_intl_no_fly_zone_desc: "Askeri varlıklar çatışma bölgesinde hiçbir fly bölgesi uygulamak için dağıtılıyor. Müdahale sivilleri koruyor - ancak pahalı ve uluslararası scrutiny çekiyor."

 arab_spring_intl_arming_rebels: "Opposition Güçleri"
 arab_spring_intl_arming_rebels_desc: "Silahlar ve ekipman çatışmadaki muhalif kuvvetlere kanallanıyor. Politika gizleniyor ama sır değil – ve bu desteği alan uzun vadeli sonuçlar belirsiz kalıyor."

 arab_spring_intl_intervention_costs: "Intervention Maliyetleri"
 arab_spring_intl_intervention_costs_desc: "Yurtdışındaki askeri müdahale kaynakları güçlendiriyor ve yerli siyasi tartışma yaratıyor. Hazine ve siyasi başkentteki maliyetler gerçek."

 arab_spring_intl_non_interventionist: "Non-Interventionist"
 arab_spring_intl_non_interventionist_desc: "Bu ülke Arap sivil savaşa müdahale etmeyi seçmedi. Karar, maruziyetini azalttı ve yerli siyasi başkenti korudu - eleştirmenler bunun belirtilen değerleri terk ettiğini iddia etti."
