 je_national_development: "Ulusal Kalkınma Yolu"
 je_national_development_reason: "Her ulusun enerjilerine nerede odaklanmasını seçmesi gerekir. Ulusal bir gelişme planı kaynakları, politikası ve siyasi on yıl boyunca tek bir stratejik vizyonun arkasında yoğunlaşır. Akıllı seçin - seçim program sona erinceye kadar terslanamaz."

 je_foreign_investment: "Dış Yatırım"
 je_foreign_investment_reason: "Büyük güçlerden sermaye çekmek, yerli kaynakların izin verdiğinin ötesine geçebilir. Yabancı bir yatırım anlaşması ülkeyi dış ticaret dışında açacaktı - tüm fırsatlarla ve entaillere bağlı bağımlılıklarla."
 has_foreign_investment_or_trade_agreement_with_west_tt:0 "Amerika Birleşik Devletleri, Birleşik Krallık veya Fransa ile yabancı bir yatırım ve ticaret anlaşması imzalayın"
 
 ndp_status_industrial_tt: "Endüstriyel genişleme devam ediyor. Ülke, üretim ve ağır sanayi üssünü inşa etmeye yönelik kaynakları yönetiyor."
 ndp_status_military_tt: "Askeri genişleme devam ediyor. Ülke silahlı kuvvetlere, doktrinine ve savunma endüstrilerine yatırım yapıyor."
 ndp_status_resource_tt: "Kaynak ekonomisi gelişimi devam ediyor. Ülke tarıma ve ham materyal ekstraksiyona odaklanıyor."
 ndp_status_service_tt: "Hizmet Ekonomisi gelişimi devam ediyor. Ülke finansal sektör, eğitim ve devlet kapasitelerini inşa ediyor."
 ndp_status_none_tt: "Hiçbir gelişim yolu şu anda aktif değildir. On yıllık bir ulusal gelişim programına başlamak için bir yol seçin."

 fi_status_seeking_tt: "Ülke büyük bir güçle yabancı bir yatırım anlaşması arıyor. Bu dergi girişi tamamlamak için bir yatırım anlaşması imzalayın."
 fi_status_secured_tt: "Yabancı bir yatırım anlaşması güvence altına alındı. Yabancı sermaye akıyor."

 ndp_button_industrial_name: "Endüstriyel genişleme"
 ndp_button_industrial_desc: "Üretim üssünü inşa etmek için ulusal kaynaklara odaklanın. Ağır endüstri, ışık üretimi ve inşaat. Yıl 2: ağır endüstri vs ışık üretimi."

 ndp_button_military_name: "Askeri Genişleme"
 ndp_button_military_desc: "Silahlı güçleri önceliklendirmek. Ordu ve donanma, askeri araştırma ve silah üretimi. Yıl 2: Arazi doktrini ve deniz inşası."

 ndp_button_resource_name: "Kaynak Ekonomisi"
 ndp_button_resource_desc: "Arazinin etrafındaki ekonomiyi inşa edin. Tarım ve ekstraktif endüstrileri güçlendirin. Yıl 2: tarım vs ham malzeme ekstraksiyon."

 ndp_button_service_name: "Hizmet Ekonomisi"
 ndp_button_service_desc: "Devlet kapasitesi, eğitim ve finansal sektör geliştirin. Bürokrasi, araştırma hızı ve yatırım. Yıl 2: finansal sektör vs eğitim ve bürokrasi."

 ndp_button_abandon_name: "Abandon Path"
 ndp_button_abandon_desc: "Abandon mevcut geliştirme programı. Tüm aktif yol değiştiricileri kaldırılacak ve iki yıl boyunca prestijli ve meşru bir ceza uygulanacak. Daha sonra yeni bir yol seçebilirsiniz."

 fi_button_reject_name: "Emekli Yabancı Yatırım"
 fi_button_reject_desc: "Kapıyı yabancı sermayeye kapatın. Bu, dergi girişi sona erecek ve uzun vadeli bir yatırım cezası uygulanacak, ancak ekonomik bağımsızlığı koruyacak ve otoriteyi güçlendirecektir."

