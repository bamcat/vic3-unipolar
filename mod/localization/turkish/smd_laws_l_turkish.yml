  # New Laws Any Group
 law_equal_rights:0 "eşit haklar"
 law_equal_rights_desc:0 "Kadınlar aynı haklar seviyesini erkek meslektaşları olarak deneyimleyebilirler."
 law_prison_slavery:0 "Cezaevi Kölelik"
 law_prison_slavery_desc:0 "Mahkumlar ve Cezalar, cezaları sırasında ödeme yapmamak için uzun saatler çalışmak zorunda kalıyorlar."
 law_restricted_police:0 "Polis memuru"
 law_restricted_police_desc:0 "Polis kuvveti tarafından sunulan güç kısıtlandı ve korumak için hazır oldukları vatandaşların güvenliğini sağlamak için katı düzenlemelere tabidir."
 law_resettlement_enticement:0 "Enticing"
 law_resettlement_enticement_desc:0 "Hükümet, insanları kendi topraklarına taşımak için ikna etmek için programları sunmaktadır."
 
 # Rights of Minorities Group
 
 lawgroup_rights_of_minorities:0 "Azınlık Hakları"
 lawgroup_rights_of_minorities_desc:0 "Azınlık popülasyonlarında yasal düzenlemeler ve korumalar."
 
 law_no_minority_rights:0 "Hiçbir Azınlık Hakları"
 law_no_minority_rights_desc:0 "Tüm türlerin azınlıkları, genel populace’in sahip olduğu gibi aynı haklara sahip olmayacaktır."
 law_segregation:0 "Segregation Law"
 law_segregation_desc:0 "Azınlıklar genel populace'den ayrılma derecelerini deneyimleyecek, sık sık kazıları ve solları alacak."
 law_apartheid:0 "Apartheid Yasaları"
 law_apartheid_desc:0 "Azınlıklar genel populace'nin aynı toplumunu deneyimlemeyecektir ve genellikle belirli bir 'kara'ya taşınır veya taşınır olacaktır."
 law_unfulfilled_protections:0 "Unful Protections"
 law_unfulfilled_protections_desc:0 "Devlet azınlıklar için engelleri kaldırmak için çaba sarf etti, ancak azınlıkların haklarını düzenleyen yasalar büyük ölçüde zorlamadı."
 law_limited_protections:0 "Sınırlı Korumalar"
 law_limited_protections_desc:0 "Farklı bir etnik veya vatandaşlıktan olan azınlıklar, genel nüfusun zevk aldığı aynı haklardan çok memnun kalacaklar."
 law_encompassing_protections:0 "Koruma Korumaları"
 law_encompassing_protections_desc:0 "Farklı bir etnik veya vatandaşlıktan olan azınlıklar ve engelliler tüm hakları ve korumaları genel nüfusun keyfini çıkaracaklar."
 law_universal_protections:0 "Evrensel Korumalar"
 law_universal_protections_desc:0 "Tüm Azınlıklar, etnik kökenlerine bakılmaksızın, vatandaşlık, yetenek, cinsellik veya cinsiyet kimliği genel nüfusun zevk aldığı aynı haklara sahip olacaktır."
 
 # Union Laws Group
 
 lawgroup_union_laws:0 "Union Law Law"
 lawgroup_union_laws_desc:0 "Yönetim organının grevler, yürüyüşler, protestolar, isyanlar ve başka türlü iş birliği eylemlerine yönelik etkileri."
 law_unions_outlawed:0 "Yasadışı Birlik"
 law_unions_outlawed_desc:0 "Sendikalar bu ülkede yasa dışı bırakılır ve failler hızlı bir direnişi yeniden değerlendirecektir."
 law_useless_unions:0 "Kullanımsız Bürokrasi"
 law_useless_unions_desc:0 "Sendikalar, işçiler bürokrasiden daha fazlası değildir ve dış güçler olmadan işlev ve savaşmak için ihtiyaçlar yoktur."
 law_limited_action:0 "Sınırlı Eylem"
 law_limited_action_desc:0 "Sendikalar, elde etmelerine izin verildiğinde ağır bir şekilde kısıtlanır ve genellikle etkili olmak için yasal boşlukları gezinmeleri gerekir."
 law_craft_unions:0 "Craft Unions"
 law_craft_unions_desc:0 "Sendikalar belirli rolleri ile sınırlandırılır ve diğer rollerin sendikaları ile bağlılıklarını tamamlamaları engellenir."
 law_permitted_unions:0 "İzinli Eylem"
 law_permitted_unions_desc:0 "Birlikler ne yasal ne de yasa dışı, onlar lütfen ama yönetim organından korunmak için az şey yapabilirler."
 law_enterprise_unions:0 "Enterprises"
 law_enterprise_unions_desc:0 "Sendikalar, çalışanlarının çalışma performansını geliştirmek ve üyelerinin ihtiyaçlarına odaklanmak için oradadır. Üyelerinin yaşamlarını gerekli araçlarla geliştirmekte etkilidirler."
 law_backed_unions:0 "Backed Protections"
 law_backed_unions_desc:0 "Sendikalar halk tarafından etkin bir şekilde destekleniyor ve kendisini ülkelerin kültürünün bir parçası olarak güçlendirdi. İnsanlar tarafından korumaları ve çarpıcı eyleme doğru yasal korumalar verilir."
 law_empowered_unions:0 "Union Empowerment"
 law_empowered_unions_desc:0 "Sendikalar polis tarafından ağır bir şekilde güçlendiriliyor ve hükümet geri döndü. Bu sendikalar taleplerini etkili bir şekilde elde edebilmektedirler ve her koşulda korunuyor ve heyecanlanıyor."
 
 # Corporate Authority Group
 
 lawgroup_corporate_authority:0 "Kurumsal Yetki"
 lawgroup_corporate_authority:0 "Şirketlere ve saçma zenginlere karşı yasal düzenlemeler, bunlar, uygulayabilecek siyasi güç ve kontrollerinin düzenlemeleri içerir."
 law_completely_unregulated:0 "Tamamen Unregated"
 law_completely_unregulated_desc:0 "Şirketlerin ve saçma zenginlerin eylemleri herhangi bir şekilde engellenmemektedir. Çoğu zaman orada yaşayan işçilerin ve insanların beslenmesi."
 law_political_lobbying:0 "Siyasi Lobicilik"
 law_political_lobbying_desc:0 "Yeterli miktarda fonu olan herkes hükümete lobi edebilir ve onları kendi lehine yasaları değiştirmeye baskı yapabilirler."
 law_tax_haven:0 "Vergi Havennn"
 law_tax_haven_desc:0 "Şirketler ve saçma zenginlikleri olan bireyler hoş kabul edilir ve yönetim organı onları daha az vergi ve daha fazla toprakla desteklemeye karar verdi."
 law_feign_ignorance:0 "Feigned Ignorance"
 law_political_lobbying_desc:0 "Yönetim organı, şirketlerin gücünü kısıtlamak için mümkün olduğunca az şey yapmayı tercih eder ve bunun bir problem olmadığı gibi saçma zengindir."
 law_limited_restrictions:0 "Sınırlı Sorumluluk"
 law_limited_restrictions_desc:0 "Şirketlerin ve saçma varlıkların varlıkları para içinde olup olmadıkları veya yatırımlarda ve stoklarda tutulacağına bakılmaksızın vergilendirilir."
 law_progressive_restrictions:0 "Protrictance"
 law_progressive_restrictions_desc:0 "Korkunç zengin ve tüm şirket kârlarının herhangi bir varlık fark edilir veya vergilendirilmez ve ilerici bir oranda populaceden daha iyi kullanılır."
 law_no_one_individual:0 "Kimse"
 law_no_one_individual_desc:0 "Aptalca zenginler orada iş yapmayı tercih ettikleri takdirde yönetim organının vergi sistemine bakıyorlar. Ülkedeki zenginlikleri azaltılırken ve ihtiyaç duyulan populace'a dağıtılır."
 law_corporate_redistribution:0 "Kurumsal Yeniden dağıtım"
 law_corporate_redistribution_desc:0 "Aptalca zengin veya şirketler tarafından yaratılan herhangi bir zenginlik en fazla izin verilen miktara indirgeniyor. Bu zenginlik daha sonra gerektiği gibi yeniden dağıtılır. Şirketler halka teslim edilir ve seçilmiş yetkililer de dahil olmak üzere bir yönetim kurulundan oluşur."
 
 law_serfdom:0 "İşsiz İş Hakları"
 law_serfdom_desc:0 "Ya kurulmuş bir iş hakları ya da yerleşik işgücü hakları tamamen zorlamaz."
 law_serfdom_banned:0 "Bare Asgari Koruma"
 law_serfdom_banned_desc:0 "Özel minimum koruma kuruldu."
 
 lawgroup_drug_regulations: "İlaç Düzenlemeleri"
 lawgroup_drug_regulations_desc: "İronik maddelerin yasal statüsü - ticareti tamamen yasallaştırma yasağından. İlaç politikası ölüm, devlet otoritesi, uygulama maliyetleri ve tarım ve suç çıkarlarının gücü şekillendiriyor."

 law_total_prohibition: "Total Prohibition"
 law_total_prohibition_desc: "Alkol ve tütün de dahil olmak üzere tüm toksik maddeler yasa tarafından yasaklanmıştır. Devlet, vatandaşların bedenlerine ne koyduğunu, dini ve muhafazakar kurumlar tarafından desteklenen ahlaki otoriteyi iddia ediyor. Siyah piyasalar boşluğun uygulanmasında gelişemez."

 law_alcohol_tobacco_legal: "Alkol ve Tütün Yasal"
 law_alcohol_tobacco_legal_desc: "Alkol ve tütün yasal ve vergilendirilir. Diğer tüm maddeler yasak kalır. Bu, modern devletler için temel yasal çerçevedir - ekonomik ilgi ve ahlaki muhafazakarlık arasında pragmatik bir uzlaşma."

 law_marijuana_decriminalization: "Marijuana Decriminalization"
 law_marijuana_decriminalization_desc: "Kişisel mülk ve esrar kullanımı artık bir suçlu suç değildir. Ticaret yasadışı kalır, ancak uygulama daha zor maddelere yönlendirilir. Politika, incarcerasyonun rekreatif uyuşturucu kullanımı için etkili bir yanıt olmadığını büyüyen bir fikir yansıtıyor."

 law_hard_drugs_decriminalized: "Hard Drug Decriminalization"
 law_hard_drugs_decriminalized_desc: "Tüm kontrollü maddelere izin verin - opiates, kokain ve amphetamins dahil - bir suçlu yerine halk sağlığı meselesi olarak muamele edilir. Kullanıcılar yargılamadan ziyade tedaviye yönlendirilir. Politika tartışmalıdır, ancak erken kabul edilenlerden kanıtlar aşırı derecede ölümleri azaltdığını ve uygulama kaynaklarını serbest bıraktığını göstermektedir."

 law_safe_injection_sites: "Güvenli-Injeksiyon Siteleri"
 law_safe_injection_sites_desc: "Hükümet tarafından finanse edilen tesisler, kullanıcıların tıbbi gözetim altında uyuşturucu kullanmalarına izin verir. Personel aşırı derecede ters tedavi ilaçları yönetebilir ve kullanıcıların tedavi programları ile bağlantı kurabilir. Ölüm oranları önemli ölçüde düşer. Dini ve muhafazakar muhalefet şiddetlidir - politika kabul olarak görülür ve hatta uyuşturucu kullanımı sağlar."

 law_trafficking_allowed: "Trafik İzin Verilmiş"
 law_trafficking_allowed_desc: "Kontrol edilen maddelerdeki ticaret, devlet tarafından tamamen yasallaştırılır ve düzenlenir. Ekonomik faydalar hemen ve önemli - uyuşturucu geliri resmi ekonomiye ve vergi üssüne akmaktadır. Ünlü ve sosyal sonuçlar ciddidir. Dünyanın çoğu bunu suç ağları için bir kapitülasyon olarak görecek."

 law_total_prohibition_modifier: "Total Prohibition"
 law_alcohol_tobacco_legal_modifier: "Alkol ve Tütün Yasal"
 law_marijuana_decriminalization_modifier: "Marijuana Decriminalization"
 law_hard_drugs_decriminalized_modifier: "Hard Drug Decriminalization"
 law_safe_injection_sites_modifier: "Güvenli-Injeksiyon Siteleri"
 law_trafficking_allowed_modifier: "Trafik İzin Verilmiş"
 
 lawgroup_disability_rights: "Engelli Hakları"
 lawgroup_disability_rights_desc: "Engelli vatandaşların haklarını düzenleyen yasal çerçeve - tedavi, altyapı ve işyeri dahil olmak üzere aktif devlet desteği kabul etmekten. Daha kapsamlı çerçeveler, işgücü katılımını genişletir, yaşam standartlarını geliştirir ve ölüm azaltır, devlete ve işverenlere artan maliyetle."

 law_minimal_recognition: "Minimal Recognition"
 law_minimal_recognition_desc: "Devlet, engelli vatandaşların var olduğunu kabul eder, ancak onlar için konaklama, destek veya yasal koruma sağlar. Engelli insanlar çoğunlukla resmi iş ve halk hayatından dışlanırlar. İnsan maliyeti önemlidir; mali maliyet ihmal edilebilir."
 
 law_workplace_accommodations: "İşyeri Konaklamaları"
 law_workplace_accommodations_desc: "İşverenler, engelli işçilerin işgücüne katılmalarına izin vermek için yasal olarak gereklidir - değiştirilmiş ekipman, ayarlanabilir görevler, erişilebilir iş istasyonları. Politika, üretken bir istihdama anlamlı bir nüfus getiriyor. İşverenler ayarlama maliyetlerini taşır, ancak işgücü genişletir."
 
 law_anti_ableist_architecture: "Anti-Ableist Mimari"
 law_anti_ableist_architecture_desc: "Halk binaları, ulaşım ağları ve altyapı engelli vatandaşlar için erişilebilir olması gerekir. Ramps, asansörler, tactile paving, erişilebilir işaret - fiziksel çevre artık dışlamamalıdır. Mevcut altyapıyı optimize etmek pahalı. Topluma tamamen katılabilir olan nüfus önemli ölçüde genişliyor."
 
 law_public_treatments: "Public Treatments"
 law_public_treatments_desc: "Devlet tıbbi tedaviler, yardımcı cihazlar, prosthetics, terapi ve engelli vatandaşlar için yardım hizmetleri, hayırseverlik yerine doğru bir şekilde destekliyor. Ölüm önemli ölçüde düşüyor. Yaşam Standardı nüfus boyunca yükselir. Kamu bütçesine maliyet önemli ve devam ediyor - ancak bazı vatandaşlar diğerlerinden daha az devlet desteği hakkına sahip olduğu tartışma resmi olarak reddedildi."
 
 law_minimal_recognition_modifier: "Disability of Disability"
 law_minimal_recognition_modifier_desc: "Engelli vatandaşlar devletten konaklamazlar. Etkili işgücü azaltılır ve ölüm bunun ne olabileceği üzerindedir."
 
 law_workplace_accommodations_modifier: "İşyeri Konaklamaları"
 law_workplace_accommodations_modifier_desc: "İşverenler engelli işçileri karşılamak için gereklidir. İşgücü daha geniş ve daha kapsayıcı, mütevazı maliyet verimlilik inşa etmek için."
 
 law_anti_ableist_architecture_modifier: "Erişilebilir Altyapı"
 law_anti_ableist_architecture_modifier_desc: "Kamu altyapısı erişilebilir hale getirildi. İnşaat maliyetleri binalar erişilebilirlik standartları ile karşılaştırıldığında daha yüksektir, ancak topluma tamamen katılabilir olan nüfus önemli ölçüde daha büyük."
 
 law_public_treatments_modifier: "Public Disability Treatments"
 law_public_treatments_modifier_desc: "Devlet, engelli vatandaşlar için tedavi ve destek vermektedir. Ölüm azalır, yaşam standardı geliştirilir ve eğitim erişimi daha geniştir - önemli ve devam eden kamu pahasına."
 
 institution_environmental_protection: "Çevre Koruma Ajansı"
 institution_environmental_protection_desc: "Çevre standartlarını izleme ve büyütmeye adanmış bir hükümet ajansı. Her yatırım seviyesi genişletilmiş uygulama kapasitesi, daha sıkı düzenlemeler ve daha geniş koruma programları temsil eder - tüm eyaletlerde kirliliğin üretimini azaltır."
 
 lawgroup_environmental_regulations: "Çevre Düzenlemeleri"
 lawgroup_environmental_regulations_desc: "[ROOT.GetCountry.GetName] Doğal çevre ile olan ilişkisi - yasa dışı endüstriyel sömürüden doğanın haklarını anayasal olarak garanti altına almak için. Daha ilerici çerçeveler kirliliği, daha düşük ölümleri azaltır ve ekosistemleri korur, giderek artan sanayi throughput ve halk harcamalarına mal olur."
 
 law_no_environmental_regulations: "Yönetmelik yok"
 law_no_environmental_regulations_desc: "Endüstri çevresel kısıtlamalar olmadan çalışır. Fabrikalar, madenler ve çiftlikler yasal limit olmadan kirletici, ekstraksiyon ve sömürülebilir. Çıktı maksimuma çıkar. Uzun vadeli maliyet - ölüm, ekosistem bozulması ve halk sağlığı - nüfus tarafından doğar, üreticiler değil."
 
 law_game_law: "Oyun Yasası"
 law_game_law_desc: "Avcılık ve balıkçı, oyun popülasyonlarının çökmesini önlemek için düzenlenir. Korumalı mevsimler, lisanslı avlanma ve en yıkıcı ekstraksiyon yöntemleri üzerinde kısıtlamalar. Bu, öncelikle rekreasyonel olarak avlamak için yeterince zengin olanların çıkarlarına hizmet eden bir koruma çerçevesidir - ancak devletin doğal kaynakları yönetme konusunda bir ilgisi vardır."
 
 law_national_recycling: "Ulusal Geri Dönüşüm"
 law_national_recycling_desc: "Yeniden kullanılabilir atıkların toplanması ve işlenmesi için ulusal bir program. Endüstriyel ve ev içi atıklar, kurtarılır ve mümkün olduğu yerde yeniden kullanılabilir, toprak doldurma ve su yollarına giren malzemenin hacmini azaltır. Kaynak verimliliği mütevazı bir şekilde geliştirir. Kirlilik düşer. Program belediye ve endüstriler arasında koordinasyon gerektirir."
 
 law_protection_agency: "Koruma Ajansı"
 law_protection_agency_desc: "Özel bir hükümet ajansı, ekonominin tüm sektörlerinde çevresel standartları belirlemek ve uygulamak. Emisyonlar sınırları, arazi kısıtlamaları, endüstriyel atık düzenlemeleri kullanır ve tüm doğal alanları yeniden denge içinde korur. Ajans yatırım yapabilir - her ek finansman seviyesi uygulama kapasitesini genişletir ve kirliliği daha da azaltır."
 
 law_guaranteed_rights_of_nature: "Doğa Hakları"
 law_guaranteed_rights_of_nature_desc: "Nehirler, ormanlar, ıslak bölgeler ve ekosistemler yasal olarak ayaktadır - yok edilme, kirletilme veya kurtarma kapasitelerinin ötesinde sömürülmelidir. Çerçeve mümkün olan en hırslı çevresel mevzuattır, gelişmekte olan yasal geleneklerden doğayı mülkiyet nesnesi yerine bir hak konusu olarak tedavi etmeye başlayan ülkeler için çizilir. Endüstriyel aktivite önemli ölçüde kısıtlanır. Kirlilik keskin bir şekilde düşüyor. Çevre Koruma Ajansı en yüksek olası etkinliğinde çalışır."
 
 law_no_environmental_regulations_modifier: "Unregated Industry"
 law_no_environmental_regulations_modifier_desc: "Endüstride çevresel kısıtlamalar yok. Forput yukarı, ancak kirliliği ve ölüm bir sonuç olarak yükseliyor."
 
 law_game_law_modifier: "Oyun Yasası"
 law_game_law_modifier_desc: "Regated avlanma ve balıkçılık marjinal olarak çevresel bozulmayı azaltmıştır. En az ama gerçek bir müdahale."
 
 law_national_recycling_modifier: "Ulusal Geri Dönüşüm Programı"
 law_national_recycling_modifier_desc: "Ulusal geri dönüşüm programı, atık nesillerini azaltır ve malzemeleri kurtarıyor, alçakgönüllü olarak kirliliği ve inşaat verimliliğini geliştiriyor."
 
 law_protection_agency_modifier: "Çevre Koruma Ajansı"
 law_protection_agency_modifier_desc: "Çevre Koruma Ajansı emisyon sınırlarını ve endüstriyel standartları teşvik ediyor. Kirlilik düşüyor ve kurum erişimini genişletmek için daha fazla yatırım yapabilir."
 
 law_guaranteed_rights_of_nature_modifier: "Doğa Hakları"
 law_guaranteed_rights_of_nature_modifier_desc: "Doğaya anayasal bir duruş verildi. Endüstri önemli kısıtlamalarla karşı karşıyadır, ancak kirliliği keskin bir şekilde azaltılır, ölüm düşer ve gıda güvenliği ekosistemler olarak geliştirir."
 
 # Institution modifier names
 country_institution_cost_institution_environmental_protection_mult: "Çevre Koruma Ajansı Maliyet"
 country_institution_environmental_protection_max_investment_add: "Çevre Koruma Ajansı Max Investment"
 country_institution_size_change_speed_institution_environmental_protection_mult: "Çevre Koruma Ajansı Hız Genişleme"
 
 # ==========================================
 # LAWGROUP
 # ==========================================
 
 lawgroup_subsidized_housing: "Konaklama tesisi"
 lawgroup_subsidized_housing_desc: "Devlet fonlarının inşa ettiği ve vatandaşları için konut garanti ettiği diploma. Daha ilerici çerçeveler kentsel merkezlerde gayrimenkul üretimini genişletiyor, altyapıyı geliştiriyor ve göçü artırıyor - artan refah ve bütçe maliyetlerinde."
 
 # ==========================================
 # LAWS
 # ==========================================
 
 law_no_public_housing: "No Public Housing"
 law_no_public_housing_desc: "Devlet konut desteği sağlamamaktadır. Barınma özel bir konudur - satın alındı, kiraladı veya olmadan gitti. Kentsel konut piyasası kamu müdahalesi olmadan çalışır ve piyasa ne olursa olsun vatandaşların elde ettiği şeydir."
 
 law_housing_projects: "Konut Projeleri"
 law_housing_projects_desc: "Devlet kentsel alanlarda temel yüksek kaliteli kamu konutları inşa ediyor - kule blokları, onement sıraları, fonksiyonel ve ucuz. Kaliteli her zaman yüksek değildir ve yerler her zaman arzu edilmez, ancak konut var. Kentsel merkezler artık devlet inşaat programları aracılığıyla ek gayrimenkul üretebilir."
 
 law_public_housing_program: "Kamu Konut Programı"
 law_public_housing_program_desc: "Tasarım standartları, karışık kullanım gelişimi ve aktif kentsel planlama ile kapsamlı bir devlet konut programı. Hükümet sadece barınak inşa etmiyor - şehri şekillendiriyor. Kentsel merkezler kamu inşaatı sektörü genişliyor ve altyapı daha iyi şehir planlamasının bir sonucu olarak gelişiyor."
 
 law_universal_housing: "Evrensel Konut"
 law_universal_housing_desc: "Konut garantili bir haktır. Devlet fonları, inşa eder ve ihtiyacı olan her vatandaş için barınak tutar - test anlamına gelmez, piyasa bağımlılığı yok, hayır. Mali maliyet önemli ve devam etmektedir. Kentsel merkezler maksimum emlak çıktısı üretmektedir. Şehirler evrensel erişimin etrafında planlandı ve gemideki altyapıyı geliştirdi."
 
 law_no_public_housing_modifier: "No Public Housing"
 law_no_public_housing_modifier_desc: "Devlet konut desteği sağlamamaktadır. Kentsel konut pazarı tamamen özeldir."
 
 law_housing_projects_modifier: "Konut Projeleri"
 law_housing_projects_modifier_desc: "Temel devlet konut inşaatı devam ediyor. Welfare maliyetleri, konut stoklarının devlet sübvansiyonları olarak mütevazidir."
 
 law_public_housing_program_modifier: "Kamu Konut Programı"
 law_public_housing_program_modifier_desc: "Kapsamlı bir kamu konut programı, kentsel gayrimenkul tedarikini genişletiyor ve şehir altyapısını önemli devam eden maliyetle geliştiriyor."
 
 law_universal_housing_modifier: "Evrensel Konut"
 law_universal_housing_modifier_desc: "Konut garantili bir haktır. Welfare maliyetleri yüksektir, ancak kentsel altyapı geliştiriliyor, göç çekiliyor ve gayrimenkul çıktı maksimum hale geliyor."
 
 institution_central_bank: "Merkez Bankası"
 institution_central_bank_desc: "Para tedarikini yöneten bir devlet para otoritesi, rezerv gereksinimleri düzenler ve faiz oranlarını kontrol eder. Her yatırım seviyesi para politikası sıkıyor - ticari kredi üretimini kısıtlıyor, ancak ulusal borç tavanını genişletiyor ve karşılaştırma faiz oranını yükseltiyor. Merkez Bankası, devletin finansal sistem üzerinde doğrudan kontrol ettikleri mekanizmadır."
 
 lawgroup_central_banking: "Merkez Bankacılık Merkezi"
 lawgroup_central_banking_desc: "[ROOT.GetCountry.GetName] Para sistemini yöneten yasal çerçeve - para tedarikinin tam devlet kontrolüne merkezi olmayan parasal otoriteden. bankacılık çerçevesi seçimi kredi ve menkul kıymetlerin nasıl üretildiğini ve devletin ne ödünç alabileceğini belirler."
 
 law_no_central_bank: "Hayır Merkez Bankası"
 law_no_central_bank_desc: "Merkezi para yetkisi yoktur. Bankalar bağımsız olarak çalışır, kendi rezerv oranları ve kredilendirme politikalarını düzenler. Para tedariki koordine edilmez ve devlet faiz oranlarını veya kredi koşullarını yönetmek için bir mekanizmaya sahiptir. Bu, modern ekonomilerin çoğunun vefat ettiği dengesiz bir düzenlemedir."
 
 law_fractional_reserve_banking: "Fractional Reserve Bankacılık"
 law_fractional_reserve_banking_desc: "Bankalar sadece yataklarının bir kısmını rezerv olarak tutmak, geri kalanını ekonomiye ödünç vermek için gereklidir. Bu, para tedarikini genişletiyor - finansal bölgeler sistem aracılığıyla çoğaltılan sermaye akışları olarak daha fazla para üretiyor, ancak ticari kredi üretimi, kaldıraç ile biraz dillenmiş durumda. Bu, çoğu modern ekonomi için standart düzenlemedir."
 
 law_full_reserve_banking: "Full Reserve Bankacılık"
 law_full_reserve_banking_desc: "Bankalar% 100 depozitoyu rezerv olarak tutmalıdır - kesik ödünç alma. Merkez Bankası kurumu, devletin doğrudan para politikasını yönetmesine izin veriyor. Merkez Bankası yatırımının her seviyesi,% 1 oranındaki karşılaştırma faiz oranını artırır ve% 5 oranında maksimum kredi limitini artırır. Ticari bankalardan kredi üretimi daha istikrarlı. Finansal ilçelerden gelen eksiklikler sistemden kaldırıldı."

 law_no_central_bank_modifier: "Hayır Merkez Bankası"
 law_no_central_bank_modifier_desc: "Merkezi para otoritesi yoktur. Para tedariki yönetilmiyor."
 
 law_fractional_reserve_banking_modifier: "Fractional Reserve Bankacılık"
 law_fractional_reserve_banking_modifier_desc: "Fractional rezerv kredisi para arzını genişletiyor. Securities üretimi artıyor; ticari kredi üretimi, kaldıraç etkisi tarafından mütevazı bir şekilde azaltılıyor."
 
 law_full_reserve_banking_modifier: "Full Reserve Bankacılık"
 law_full_reserve_banking_modifier_desc: "Tam rezerv gereksinimleri etkilidir. Kredi üretimi istikrarlı ve daha yüksek. Securities üretimi azaltılır. Merkez Bankası kurumu ilgi oranlarını ve ulusal borç tavanını yönetmek için mevcuttur."
 
 institution_central_bank_modifier: "Merkez Bankası"
 institution_central_bank_modifier_desc: "Merkez Bankası aktiftir ve para politikasını yönetir. Her yatırım seviyesi kredi tedarikini sıkılaştırıyor ve faiz oranını% 1 artırdı ve% 5 oranında maksimum kredi limitini artırır."
 
 country_max_credit_limit_mult: "Maksimum Kredi Sınırı"
 country_institution_cost_institution_central_bank_mult: "Merkez Bankası Maliyet Maliyeti"
 country_institution_central_bank_max_investment_add: "Merkez Bankası Max Investment"
 country_institution_size_change_speed_institution_central_bank_mult: "Merkez Bankası Hız Genişliyor"
 building_group_bg_banking_throughput_add: "Bankacılık Throughput"
 
 lawgroup_media_regulations: "Media Regulations"
 lawgroup_media_regulations_desc: "[ROOT.GetCountry.GetName]'nin bilgi ortamına ilişkin yasal çerçeve - tamamen düzenlenmemiş medyadan devlet kontrollü iletişim altyapısına. Daha fazla düzenleme çerçeveleri siyasi hareketi radikalleştirmeyi ve devlet otoritesini artırırken, düzenlenmemiş ortamlar hareketleri basitleştirir ve hükümetin bilgi alanı üzerindeki gücünü zayıflatır."
 
 law_fully_unregulated_media: "Tamamen Unregated"
 law_fully_unregulated_media_desc: "Medya veya bilgi ortamının bir düzenlemesi yoktur. Haberler, online platformlar ve iletişim ağları herhangi bir hükümet gözetimi olmadan çalışır. Farklı bilgiler özgürce yayılır. Siyasi hareketler gürültüde gelişiyor. Devletin vatandaşlarının tükettiği bilgileri şekillendirme veya yönetme mekanizması yoktur - ve onu kontrol eden hiçbir otorite yoktur."
 
 law_digital_rights: "Dijital Haklar"
 law_digital_rights_desc: "Temel yasal korumalar bilgi ortamını yönetir - gizlilik garantileri, anti-censorship hükümleri, bilgi yasaları özgürlüğü. Vatandaşların medyadaki bazı istismarlara karşı yasal tazminatları vardır, ancak bilgi alanı önemli ölçüde ücretsizdir. Siyasi hareketler hala verimli bir zemin bulur. [ROOT.GetCountry.GetName], bir hak saygı durumu olmaktan mütevazı bir üne sahiptir."
 
 law_fairness_doctrine: "Fairness Doctrine"
 law_fairness_doctrine_desc: "Medya kuruluşları, siyasi konuların dengeli bir kapsamı sunmak için yasal olarak gereklidir - sadece bir platform oluşturmak yerine zaman ve alan vermek. En aşırı siyasi sesler megafonlarını kaybeder. Radikal hareket işe alımları daşifre edilir. Devlet kendini bilgi savaşında bir katılımcıdan ziyade adil bir hakem olarak konumlandırıyor ve rolden yetki alıyor."
 
 law_government_content_moderators: "İçerik Hükümet Moderatörler"
 law_government_content_moderators_desc: "Devlet aktif olarak online içerik yönetiyor - bilgi, aşırılıkçı materyali ortadan kaldırmak ve zararlı veya istikrarsız olarak kabul edilen içerik. Siyasi hareketler en etkili işe alım malzemelerinin bastırıldığı kadar önemli erişimi kaybeder. Otorite yükselir. Uluslararası topluluk ve basın özgürlüğünün yerli eleştirmenleri politikayı ve [ROOT.GetCountry.GetName]'in prestijine göre acı çekecektir."
 
 law_state_wifi: "Devlet WiFi"
 law_state_wifi_desc: "Devlet iletişim altyapısını doğrudan işletiyor. İnternet erişimi kamu yararı, tamamen sahip, işletilmiş ve hükümet tarafından takip edilmektedir. Bilgi ortamı bir devlet kaynağıdır - vatandaşların okudukları, saati ve paylaşma altyapısı [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName] hükümet kontrolleri. Siyasi hareket radikalleşme yakın bir şekilde bastırılır. Maliyet, finansal ve şöhret önemlidir."
 
 law_fully_unregulated_media_modifier: "Tamamen Unregated Media"
 law_fully_unregulated_media_modifier_desc: "Bir ungoverned bilgi ortamı politik hareketleri basitleştirmek ve devlet otoritesini zayıflatmaktır."
 
 law_digital_rights_modifier: "Digital Rights Framework"
 law_digital_rights_modifier_desc: "Temel yasal korumalar bilgi ortamını yönetir. Siyasi hareketler hala gelişiyor ancak [ROOT.GetCountry.GetName] hakları saygı duruşundan bazı prestij kazanır."
 
 law_fairness_doctrine_modifier: "Fairness Doctrine"
 law_fairness_doctrine_modifier_desc: "Dengeli medya kapsama gereksinimleri radikal hareket işe alımlarını ve devlet meşruluğunu geliştirmektir."
 
 law_government_content_moderators_modifier: "İçerik Yönetimi"
 law_government_content_moderators_modifier_desc: "Aktif devlet içerik modurasyonu siyasi hareketi radikalleştirmeyi önemli ölçüde bastırıyor, prestiji ve meşruiyet pahasına."
 
 law_state_wifi_modifier: "Devlet Kontrollü İletişim"
 law_state_wifi_modifier_desc: "[ROOT.GetCountry.GetName] iletişim altyapısını doğrudan kontrol eder. Siyasi hareket radikalleşme yakın bir şekilde bastırılır. Otorite yüksek. Uluslararası itibarı acı çekiyor."
 
 institution_courts: "Mahkeme Sistemi"
 institution_courts_desc: "Oluşturulmuş mahkemeler ve yasal prosedürle çalışan resmi bir yargı. Her yatırım seviyesi mahkeme sistemini genişletiyor - daha fazla yargıç, daha fazla mahkeme, kanunun daha tutarlı uygulanması. Turmoil, yasal kanallarla çözülebilir, kanun daha tutarlı hale gelir ve devrimci hareketler devletin yasal aygıtını aşmak için daha zor bulur."
 
 lawgroup_judiciary: "Judiciary"
 lawgroup_judiciary_desc: "Yasal felsefe [ROOT.GetCountry.GetName] mahkeme sistemi altında - anlaşmazlıkların nasıl çözülür, yasal otoriteye sahip olan ve adalet amacının ne olması gerekir. Yargı seçimi otorite, meşruiyet, diplomatik ayakta ve sosyal düzenin istikrarıdır."
 
 law_inquisitive_judiciary: "Inquisitive"
 law_inquisitive_judiciary_desc: "Devlet araştırır, yargılar ve yargıçlar - yargı bağımsız bir kurumdan ziyade hükümet otoritesinin bir koludur. Yargıçlar taç veya hükümet ajanlarıdır, gerçeği bulmak ve devletin adına yasayı güçlendirmekle görevlendirilmiştir. Otorite yüksek ve hükümet politikasına aykırıdır, ancak süreç zayıftır ve nüfus bunu bilir."
 
 law_customary_judiciary: "Özel"
 law_customary_judiciary_desc: "Anlaşmazlıklar geleneksel topluluk normları, kabile konseyleri, yaşlı tahkim ve yerel özel olarak çözülebilir. Resmi mahkemeler yoktur - toplum yetkilileri olarak kabul edilenler tarafından, topluluğun meşru olarak kabul ettiği kurallara göre adalet teslim edilir. Devlet bu sisteme sınırlı. Topluluklar, geleneklerine sadık ve dış kesintiye karşı dayanıklıdırlar."
 
 law_religious_judiciary: "Dini Yasalar"
 law_religious_judiciary_desc: "Kitap, dini inanç ve clerical otoritelerin yorumları yasal işlemleri yönetir. Devout, kanunun ne anlama geldiği ve nasıl uygulandığı konusunda muazzam bir siyasi güç kazanır. Dini meşruiyet sadıklar arasında derindir. İnanç dışında olanlar veya farklı olarak yorumlayanlar, sistemi daha az karşılama bulabilirler."
 
 law_restorative_judiciary: "Restorative"
 law_restorative_judiciary_desc: "Adaletin amacı ceza değildir, ancak restorasyon değildir - kurbanlara yapılan zararları tamir etmek, suçluları rehabilite etmek ve her ikisini topluma geri getirmektir. Mahkemeler arabuluculuk, uzlaşma ve topluluk iyileşmeye odaklanır. Turmoil düşer. Çatışmadan ölüm azalır. Loyalistler büyürler. Devlet, altında yaşadığı sisteme güvenen bir nüfus karşılığında bazı yetki verir."
 
 law_adversarial_judiciary: "Tartışma"
 law_adversarial_judiciary_desc: "Bağımsız bir yargıç veya jüri önünde savunma ve savunma yarışması. Masumiyetin varsayımı korunuyor. Yasal ayakta, sosyal pozisyondan bağımsız olarak eşittir. Devlet aynı kurallara vatandaşları olarak bağlıdır. [ROOT.GetCountry.GetName]'nin uluslararası prestij önemli ölçüde yükselir. Bağımsız yargılar hükümet eylemi – ancak yasa tarafından kısıtlanabilecek bir hükümet nüfusun güvenebileceğidir."
 
 law_inquisitive_judiciary_modifier: "Inquisitive Judiciary"
 law_inquisitive_judiciary_modifier_desc: "Yargı bir devlet otoritesi kolu olarak hareket eder. Politikanın çözümü daha kolaydır ve karışıklık bastırılır - ancak süreç zayıf ve yüzeyin altındaki radikal baskı binası gerçek."
 
 law_customary_judiciary_modifier: "Özel Hukuk"
 law_customary_judiciary_modifier_desc: "Geleneksel topluluk adaleti derin meşruiyet ve sosyal istikrar sağlar. Devletin resmi otoritesi sınırlıdır, ancak nüfusun sisteme olan güveni gerçek."
 
 law_religious_judiciary_modifier: "Dini Yasalar"
 law_religious_judiciary_modifier_desc: "Clerical otorite yasayı yönetir. [ROOT.GetCountry.GetAdjective] Devout büyük siyasi güç tutuyor. sadıklar arasındaki derin sadakat - ve dışarıdakiler arasında kızgınlık büyüyor."
 
 law_restorative_judiciary_modifier: "Restorative Justice"
 law_restorative_judiciary_modifier_desc: "Adalet sistemi rehabilitasyon ve uzlaşmaya odaklanır. Turmoil ve ölüm düşer, sadıkistler büyür ve [ROOT.GetCountry.GetName] insan yaklaşımı için uluslararası saygı kazanır."
 
 law_adversarial_judiciary_modifier: "Adversarial Judiciary"
 law_adversarial_judiciary_modifier_desc: "Süreç nedeniyle faaliyet gösteren ve yasadan önce eşit bir bağımsız yargı. Legitimacy ve prestij yüksek. Devlet otoritesi kontrol edilir - ancak bu kontrol sistemi güvenilir kılan şeydir."
 
 institution_courts_modifier: "Judiciary"
 institution_courts_modifier_desc: "Oluşturulmuş bir mahkeme ağı karışıklığı azaltıyor, yasayı güçlendiriyor ve devrimci ivme bastırıyor. Her ek seviye mahkemelerin [ROOT.GetCountry.GetName] ile daha da genişletilebilir."
 
 country_institution_cost_institution_courts_mult: "Mahkeme Sistemi Maliyet"
 country_institution_courts_max_investment_add: "Mahkeme Sistemi Max Investment"
 country_institution_size_change_speed_institution_courts_mult: "Mahkeme Sistemi Hızlandı"
 
 law_privatized_preschool_education:0 "Okul Öncesi Eğitimi"
 law_privatized_preschool_education_desc:0 "Erken çocukluk eğitimi, düzenlenmiş bir özel pazar aracılığıyla sağlanır. Sağlayıcılar kayıt için yarışıyor, devlet minimum standartları oluşturuyor ancak bağımsız operatörlere teslimat bırakıyor. Erişim büyük ölçüde ev gelirine bağlıdır, ancak sübvansiyonlar daha düşük aileler için bazı yükü dengeleyebilir."

 law_universal_childcare:0 "Evrensel Çocuk Bakımı"
 law_universal_childcare_desc:0 "Devlet, gelire bakılmaksızın tüm aileler için uygun fiyatlı çocuk bakımı garanti eder. Kamusal olarak finanse edilen tesisler ülke çapında mevcuttur, ebeveynlere işgücüne katılmak ve erken çocukluk gelişiminin aile adına uygun olmadığını sağlamak."

 law_legal_protections:0 "Yasal Korumalar"
 law_legal_protections_desc:0 "Devlet, erkekler ve kadınlar arasındaki resmi yasal eşitliği pekiştirdi, istihdam, mülk ve kamusal yaşamda ayrımcılığa karşı korumaları. Daha önce özel ya da seçici olarak uygulanan haklar şimdi kanun gücü tarafından destekleniyor."

 law_structural_egalitarianism:0 "Yapısal Egalitarianism"
 law_structural_egalitarianism_desc:0 "Hükümet, cinsiyet eşitsizliğine engel olan kurumsal yapıları aktif olarak ortadan kaldırmak için yasal eşitliğin ötesine geçti. Kamu bürolarında, mesleklerde ve sivil kurumlarda temsil etmek görevlendirilmiştir ve devlet sadece eşit haklara sahip olmak yerine eşit sonuçlar elde etmek için aktif bir rol alır."

 law_matriarchy:0 "Matriarchy"
 law_matriarchy_desc:0 "Kadınlar ülkenin siyasi ve sosyal yapısında hakim bir pozisyona sahiptir. Kadınlar liderlik pozisyonlarının büyük çoğunluğunu oluşturur."

 law_disability_cheques:0 "Disability Cheques"
 law_disability_cheques_desc:0 "Devlet, engelli veya kronik hastalık nedeniyle çalışamadığı vatandaşlara düzenli finansal destek sağlar. Ödemeler sosyal güvenlik aygıtı aracılığıyla yapılır ve işgücü dışındakiler için minimum yaşam standartlarını garanti etmek amaçlanmaktadır."

 law_student_coverage:0 "Maternity Leave"
 law_student_coverage_desc:0 "Kadınlar pregnanciler için teminat verilir."

 law_universal_basic_income:0 "Universal Basic Income"
 law_universal_basic_income_desc:0 "Her vatandaş devletten koşulsuz bir ödeme alır, istihdam statüsüne bakılmaksızın veya anlam ifade eder. Politika, işgücü, refah ve ekonomik katılım arasındaki ilişkinin temel bir yeniden gözden geçirilmesini temsil eder - kimsenin tüm işlerin asgari beklentilerini yükseltebileceği bir zemin garanti eder."
 
 law_universal_college:0 "Universal College"
 law_universal_college_desc:0 "Devlet, arka plan veya anlamadan bağımsız tüm vatandaşlar için daha yüksek eğitime erişimi garanti eder. Üniversiteler ve kolejler kamuya açık olarak finanse ediliyor ve zenginlikten ziyade, daha eğitimli bir işgücü ve daha bilgili bir vatandaş üretiyor."

 education_laws.1.t:0 "Kim diploma için öder?"
 education_laws.1.d:0 "Evrensel koleje olan bağlılık, mali muhafazakarlardan derhal ve işaretli bir soru yöneltti: tam olarak kim ödeyecek? Kamu harcamalarının önemli bir genişlemesini temsil eden her vatandaş için daha yüksek eğitim finanse etmek ve rakipler itirazlarını yüksek ölçüde yapıyor. Hükümet, kamu fonlarıyla tam olarak taahhüt edip, yükü sınırlandıran bir model tanıtmak için karar vermelidir."
 education_laws.1.f:0 "Eğitim için ödeme yapanların sorusu, eğitimin kim için olduğu sorusu olmuştur."
 education_laws.1.a:0 "Tamamen kamu finansmanına bağlı olarak - daha yüksek eğitim bir halk iyidir."
 education_laws.1.b:0 "Tanınmış sübvansiyonlar - yoksulları finanse edin, zengin değil."

 education_laws.2.t:0 "Meritocracy Objection"
 education_laws.2.d:0 "Zengin ilgi alanları evrensel koleje karşı tercih edilen argümanlarını buldular: standartlar. Eğer herkes katılabilirse, o zaman derece değersiz hale gelir - gerçek mükemmeliyet kurumları hazırlıksız kalmak için sürüklenecektir. Hükümet, evrensel erişimi ilke olarak savunmak veya kamu sistemi ile birlikte elit kurumları koruyan bir karveout sunmak arasında seçim yapmalıdır."
 education_laws.2.f:0 "Her erişim genişlemesi standartların aynı uyarı ile karşılandı. Standartlar her zaman hayatta kalır."
 education_laws.2.a:0 "Evrensel erişimi savun - mükemmellik zenginlerin korunması değildir."
 education_laws.2.b:0 "Evrensel erişimin yanı sıra elit kurumları koruyun."

 education_laws.3.t:0 "Akıllıya Konuşuyor"
 education_laws.3.d:0 "Akademik topluluk, karakteristik inançla tartışmaya girdi. Evrensel kolej, sadece sosyal bir iyi değil, ekonomik bir zorunluluktur - karşılayabilenlere daha yüksek eğitimin sınırlayan bir ulus, bilinçliliği tercih eden bir ulus. Hükümet, seslerini resmi olarak yasama argümanına davet edip tartışmayı kesinlikle siyasi açıdan sürdürmeye karar vermelidir."
 education_laws.3.f:0 "Üniversite her zaman toplumların ne tür bir gelecek istediklerini karar verdiği yerdir. Şimdi onu inşa etmeye kimin izin verdiğine karar vermelidir."
 education_laws.3.a:0 "Onları tartışmaya davet edin - akademisyenler tartışmaya liderlik etsinler."
 education_laws.3.b:0 "Siyasi bir karar tutun - akademisyenler tavsiye ediyorlar, yönetmezler."

 education_college_fiscal_resistance:0 "Fiscal Direniş"
 education_college_fiscal_resistance_desc:0 "Fiscal muhafazakarlar, evrensel kolejin kamu maliyetini aktif olarak karşılamaktadır ve hükümete harcama taahhütlerini haklı çıkarmaya zorlamaktadır."

 education_college_public_funded:0 "Kamusal Foned Commitment"
 education_college_public_funded_desc:0 "Hükümet, evrensel yüksek öğrenimin tam maliyetini absorbe etmeye karar verdi, önemli maliyetle kuvvetlendirme ivmesini güçlendirdi."

 education_college_meritocracy_debate:0 "Meritocracy Debate Engaged"
 education_college_meritocracy_debate_desc:0 "Hükümet genel olarak evrensel erişimi, enactment tartışma koşullarını değiştireceğini iddia etmeye karşı savundu."

 education_college_elite_carveout:0 "Elite Carveout Teklifed"
 education_college_elite_carveout_desc:0 "Kamu sistemi ile birlikte seçkin özel kurumları korumak, yavaşlaştırmak, zengin muhalefeti azaltmak."

 education_college_academic_endorsement:0 "Akademik Endorsement"
 education_college_academic_endorsement_desc:0 "Zekizi evrensel koleji halka açık bir şekilde destekledi, akademik otoriteyi ödünç aldı ve enactment çabasına destek verdi."

 education_college_elites_rebuked:0 "Elites Rebuked"
 education_college_elites_rebuked_desc:0 "Zengin ilgi alanları, onların erdemli tartışmalarına, pozisyonlarını utanç verici ama çözümlerini keskinleştirmiştir."

 education_college_elites_appeased:0 "Elites Appeased"
 education_college_elites_appeased_desc:0 "Elit bir kurumsal karveout teklifi evrensel üniversiteye karşı zengin muhalefeti yumuşatmıştır."

 education_college_intelligentsia_engaged:0 "Akıllısia Engaged"
 education_college_intelligentsia_engaged_desc:0 "Akademikler ve araştırmacılar, evrensel yüksek eğitim için kamu davasını aktif olarak yapıyorlar, enactment çabasına entelektüel güvenilirliğini ödünç alıyorlar."

 education_college_intelligentsia_sidelined:0 "Akıllısia Sidelined"
 education_college_intelligentsia_sidelined_desc:0 "Akademikleri yasama tartışmadan uzak tutma kararı, hükümetin eğitim gündeminden hayal kırıklığına uğratılmış ve ortadan kaldırılmıştır."
