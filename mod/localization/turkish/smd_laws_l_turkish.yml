l_turkish:
 law_jihad:0 "Cihadism"
 law_jihad_desc:0 "Cihadist militerler uygulamaları, eğitim ve organizasyonlarında ayrı bir dini amacı vardır."
 law_mixed_healthcare:0 "Karma Sağlık Sistemi"
 law_mixed_healthcare_desc:0 "Nüfusun sağlığı hem özel hem de hükümet sağlık sigortası planları tarafından yönetiliyor. Hükümet planları, özel sağlık sigortasının piyasa başarısızlıklarını çözmek için düşük gelirli vatandaşlarımıza sunulmaktadır."
 law_affirmative_action:0 "Affirmative Action"
 law_affirmative_action_desc:0 "azınlıklar için çeşitli korumalar zorunlu hale getirildi. Bu, mevcut sistemimizde katılımını teşvik etmek için alıntılar ve çeşitli sistemler içerir, yasal korumalar ve para finansmanı."
 
 lawgroup_firearms:0 "Firearm Ownership"
 lawgroup_firearms_desc:0 "Kolları taşıma hakkı ile ilgili maddeler."
 
 lawgroup_abortions:0 "Abortions"
 lawgroup_abortions_desc:0 "Vatandaşlarımız kürtajlara izin verilmez ya da olmasın."
 
 lawgroup_unions:0 "Unions"
 lawgroup_unions_desc:0 "İşçilerin sendikaları kurma yeteneğimizle ilgili konular."
 
 lawgroup_homosexuality:0 "Eşcinsellik"
 lawgroup_homosexuality_desc:0 "Ülkemizde LGBTQ+ hareketi ile ilgili konular."
 
 law_canton_system:0 "Dayanıklılık"
 
 law_unrestricted_firearms:0 "Unrestricted Firearms"
 law_unrestricted_firearms_desc:0 "Ülkemiz büyük bir silah endüstrisine ev sahipliği yapmaktadır, sivil kullanım için olgunlaşır."
 
 law_licensed_firearms:0 "Lisanslı Firearms"
 law_licensed_firearms_desc:0 "Vatandaşlar ülkemizde silah sahibi olmak için bir lisans gerektirir."
 
 law_banned_firearms:0 "Baned Firearm"
 law_banned_firearms_desc:0 "Silahların sivil kullanımı kesinlikle yasaktır."
 
 law_banned_unions:0 "Banned Unions"
 law_banned_unions_desc:0 "İşçiler, işyeri faydalarını kazanma niyetiyle birleşmeye izin verilmez."
 
 law_restricted_unions:0 "Restricted Unions"
 law_restricted_unions_desc:0 "İşçiler sendikaları oluşturmak için izin verilir, yatırımcılarımızı korumak için tasarlanmış bazı kısıtlamalarla."
 
 law_unrestricted_unions:0 "Tartışmasız Birlikler"
 law_unrestricted_unions_desc:0 "İşçiler tamamen sendikaya teşvik edilir ve onların işgücü için tam fayda ararlar."
 
 law_banned_abortions:0 "Abortions Prohibited"
 law_banned_abortions_desc:0 "Bebeklerin öldürülmesi yasalarımızın altında kesinlikle yasaktır."
 
 law_restricted_abortion:0 "Abortions"
 law_restricted_abortion_desc:0 "Vatandaşlar annenin hayatı tehdit edildiğinde veya tecavüz ve enst vakalarında kürtaja izin verilir."
 
 law_unrestricted_abortions:0 "Unrestricted Abortions"
 law_unrestricted_abortions_desc:0 "Vatandaşlar, istedikleri gibi bir kürtaj için haklarını özgürce egzersiz yapabilirler."
 
 law_active_oppression:0 "Aktif Oppression"
 law_active_oppression_desc:0 "LGBTQ topluluğunun üyeleri olarak açıklanamayan vatandaşlar ezilir, hapsedilir veya hatta öldürülüyor."
 
 law_restricted_lgbtq:0 "Suçluluk"
 law_restricted_lgbtq_desc:0 "Vatandaşlar eşcinsel olmak için hapsedilmiş olabilir."
 
 law_decriminalized_gays:0 "Decriminalized Homoseksüelity"
 law_decriminalized_gays_desc:0 "Vatandaşların eşcinsel ilişkilerde bulunmalarına izin verilir, elbette kapalı kapılar ardında. Homoseksüel ilişkiler devlet tarafından cezalandırılmayacaktır."
 
 law_gay_marriage:0 "Aynı-Sex Evlilik"
 law_gay_marriage_desc:0 "Devlet, tüm evlilik türlerini cezalandırmak için gereklidir, başlatıcıların aynı cinsiyetten olup olmadığına bakılmaksızın."
 
