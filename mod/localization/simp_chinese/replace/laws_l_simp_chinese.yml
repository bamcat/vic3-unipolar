l_simp_chinese:
  
  # Leader Ideologies
 ideology_moderate:0 "温和"
 ideology_moderate_desc:0 "#lore (中文(简体) ). 这个领袖在他们的利益集团中被认为是温和的,没有他们自己的特定意识形态. #!"
 
 ideology_traditionalist:0 "传统主义者"
 ideology_traditionalist_desc:0 "#lore (中文(简体) ). 这位领导人相信维持传统习俗,视之为自然法则的延伸. #! (中文(简体) )."

 ideology_traditionalist_minoritarian: "少数派传统主义者"
 ideology_traditionalist_minoritarian_desc:0 "#lore (中文(简体) ). 这位领导人相信维持传统习俗,视之为自然法则的延伸. 虽然他们的国家仍然处于不同宗教的统治之下,但他们将反对将国家宗教强加于人民。 #! (中文(简体) )."

 ideology_atheist:1 "无名主义者"
 ideology_atheist_desc:1 "#lore (中文(简体) ). 这位领导人将不惜一切代价质疑和推翻传统主义社会秩序和机构作为优先事项,为全面革命社会打下基础. #! (中文(简体) )."

 ideology_republican_leader:0 "共和党人"
 ideology_republican_leader_desc:0 "#lore (中文(简体) ). 这位领导人寻求建立一个由民选官员统治的共和国. #! (中文(简体) )."

 ideology_radical:0 "激进"
 ideology_radical_desc:0 "#lore (中文(简体) ). 这位领导人努力进行激进的自由改革,推动民主理想。 #! (中文(简体) )."

 ideology_abolitionist:0 "废奴主义者"
 ideology_abolitionist_desc:0 "#lore (中文(简体) ). 这位领导人认为奴隶制是对人权的可憎侵犯并试图从世界上废除它。 #! (中文(简体) )."

 ideology_slaver:0 "奴隶"
 ideology_slaver_desc:0 "#lore (中文(简体) ). 这位领袖将奴隶制视为他们生活方式的自然组成部分并反对废除. #! (中文(简体) )."

 ideology_feminist:0 "女权主义者"
 ideology_feminist_desc:0 "#lore (中文(简体) ). 这位领导人认为妇女与男子平等,并努力扩大她们作为公民的权利。"
 
 ideology_reformer:0 "改革者"
 ideology_reformer_desc:0 "#lore (中文(简体) ). 这位领袖想做一些渐进的改变,让社会更加平等一点. 但不太多。#!"

 ideology_pacifist:0 "和平主义者"
 ideology_pacifist_desc:0 "#lore (中文(简体) ). 这位领导人相信非暴力是他们的方法,和平是他们的目标。"

 ideology_jingoist_leader:0 "金戈主义"
 ideology_jingoist_leader_desc:0 "#lore (中文(简体) ). 这位领导人主张采取侵略性的外交政策,强调准备出战以推进其野心. #! (中文(简体) )."

 ideology_royalist:0 "皇家勋爵"
 ideology_royalist_desc:0 "#lore (中文(简体) ). 这位领袖的忠于君主制及其合法统治者. #!"
 
 ideology_social_democrat:0 "社会民主党"
 ideology_social_democrat_desc:0 "#lore (中文(简体) ). 这位领导人相信通过议会改革实现社会主义社会. #! (中文(简体) )."

 ideology_communist:0 "共产党"
 ideology_communist_desc:0 "#lore (中文(简体) ). 这位领袖相信工人阶级通过任何必要的手段来夺取政治权力. #! (中文(简体) )."

 ideology_vanguardist:0 "先驱者"
 ideology_vanguardist_desc:0 "#lore (中文(简体) ). 这位领导人相信通过一个由执着的激进分子组成的先锋党来实现社会主义社会. #! (中文(简体) )."

 ideology_fascist:0 "法西斯主义"
 ideology_fascist_desc:0 "#lore (中文(简体) ). 这位领袖是一位极端民族主义者,他支持在现代背景下恢复所认为的传统和专制价值观。 #! (中文(简体) )."

 ideology_anarchist:0 "无政府主义者"
 ideology_anarchist_desc:0 "#lore (中文(简体) ). 这位领导人寻求废除等级制度、权威和国家,让人民自行治理。 #! (中文(简体) )."

 ideology_ethno_nationalist:0 "民族-民族主义者"
 ideology_ethno_nationalist_desc:0 "#lore (中文(简体) ). 这位领导人相信一个以种族理由界定的国家。 #! (中文(简体) )."

 ideology_theocrat:0 "主题"
 ideology_theocrat_desc:0 "#lore (中文(简体) ). 这位领袖相信教会按照教义价值管理的国家。"

 ideology_market_liberal:0 "市场自由"
 ideology_market_liberal_desc:0 "#lore (中文(简体) ). 这位领导人认为,自由市场的无形之手应该是国家经济的指导力量."
 
 ideology_liberal_leader:0 "自由主义"
 ideology_liberal_leader_desc:0 "#lore (中文(简体) ). 这位领导人把民主制度放在优先地位,反对对全国的无争议统治。 #! (中文(简体) )."

  # Interest Group Ideologies

 ideology_paternalistic:0 "爱国主义"
 ideology_paternalistic_desc:0 "#lore (中文(简体) ). 这个团体对民粹主义者试图治理自己缺乏信心,认为他们需要传统贵族的引导.#!"
  
 ideology_patriarchal:0 "父权制"
 ideology_patriarchal_desc:0 "#lore (中文(简体) ). 这个团体认为,男人应该有政治权威,妇女应该服从父亲和丈夫。"
   
 ideology_republican:0 "共和党人"
 ideology_republican_desc:0 "#lore (中文(简体) ). 这个团体认为最好的领导人通过公开投票选出,并支持共和制政府形式. #!"
  
 ideology_populist:0 "民粹主义者"
 ideology_populist_desc:0 "#lore (中文(简体) ). 这个团体相信人民的治理,并寻求将选举权扩大到所有社会阶层。"
  
 ideology_stratocratic:0 "专制"
 ideology_stratocratic_desc:0 "#lore (中文(简体) ). 这个群体主张通过传统的税收形式和劳资关系来维持社会等级。"
  
 ideology_oligarchic:0 "奥利加奇克"
 ideology_oligarchic_desc:0 "#lore (中文(简体) ). 这个团体倾向于在被当地寡头控制的世俗国家手中垄断权力. #!"

 ideology_laissez_faire:0 "莱塞-法尔"
 ideology_laissez_faire_desc:0 "#lore (中文(简体) ). 这个集团相信贸易和劳动力的自由流动,赞成市场对政府的判断。"
  
 ideology_individualist:0 "个人主义"
 ideology_individualist_desc:0 "#lore (中文(简体) ). 这个团体认为每个人对自己的命运负责,反对政府计划提供个人可以支付的服务.#!"
  
 ideology_pious:0 "虔诚"
 ideology_pious_desc:0 "#lore (中文(简体) ). 这个团体认为宗教原则是最重要的道德真理,应该渗透到整个社会。"
  
 ideology_particularist:0 "专 有"
 ideology_particularist_desc:0 "#lore (中文(简体) ). 这个团体希望他们在工作中实现地方自治,不受契约奴役的封建规定的约束。"
  
 ideology_isolationist:0 "孤立主义者"
 ideology_isolationist_desc:0 "#lore (中文(简体) ). 这个团体希望国家关注国内事务,反对向外国土地扩张以及移民的野心。"
  
 ideology_moralist:0 "莫拉利斯特语Name"
 ideology_moralist_desc:1 "#lore (中文(简体) ). 这个群体坚信宗教道德秩序,认为观点多样性是对这一秩序的威胁. #!"
  
 ideology_jingoist:0 "金戈主义"
 ideology_jingoist_desc:0 "#lore (中文(简体) ). 这个团体相信侵略性的外交政策,并维持一支军队支持它。"

 ideology_loyalist:0 "忠诚人士"
 ideology_loyalist_desc:0 "#lore (中文(简体) ). 该团体认为每个公民都应该缴纳会费,为国家的重要职能提供资金。"
 
 ideology_meritocratic:0 "功绩"
 ideology_meritocratic_desc:0 "#lore (中文(简体) ). 该集团认为,成功是赢得的,已经取得成功的人应当承担相应的责任和财富。"
   
 ideology_patriotic:0 "爱国"
 ideology_patriotic_desc:0 "#lore (中文(简体) ). 这个团体热心于国家,希望对那些散布不同意见的人采取严厉措施。"
  
 ideology_liberal:0 "自由主义"
 ideology_liberal_desc:0 "#lore (中文(简体) ). 这一群体认为自由和法律平等是需要保障的重要价值观。"
  
 ideology_anti_clerical:0 "反证书"
 ideology_anti_clerical_desc:1 "#lore (中文(简体) ). 这个团体反对有组织宗教对政治和教育系统的影响. 他们认为理性的思想应该处于治理的最前沿. #!"
  
 ideology_proletarian:0 "无产阶级"
 ideology_proletarian_desc:0 "#lore (中文(简体) ). 这个团体通过阶级斗争的视角看待政治,并且与这场冲突中的工人站在一边. #!"
  
 ideology_egalitarian:0 "平等主义"
 ideology_egalitarian_desc:0 "#lore (中文(简体) ). 该集团认为,平等和人道地对待人民应当是政治政策的基石。"
   
 ideology_anti_slavery:0 "反奴隶制"
 ideology_anti_slavery_desc:0 "#lore (中文(简体) ). 这个团体憎恶奴隶制,视之为野蛮过去的特点. #!"
 
 ideology_pro_slavery:0 "亲奴隶制"
 ideology_pro_slavery_desc:0 "#lore (中文(简体) ). 这一群体认为奴隶制是一个运作良好的社会的必要部分。"
  
 ideology_reactionary:0 "反应"
 ideology_reactionary_desc:0 "#lore (中文(简体) ). 这个团体对过去,真实的或想象的,正义的国王统治着一个统一的社会来说是怀旧的. #!"
 
 ideology_plutocratic:0 "冥王星型"
 ideology_plutocratic_desc:0 "#lore (中文(简体) ). 这个团体认为,富人证明了他们作为决策者的价值,并形成了一个非常适合确定社会路线的知识精英。"

 ideology_agrarian:0 "农业"
 ideology_agrarian_desc:0 "#lore (中文(简体) ). 该集团认为,经济政策的重点应放在农业和农民的利益上。"

 ideology_corporatist: "法人"
 ideology_corporatist_desc: "#lore (中文(简体) ). 这个团体相信通过运用宗教原则解决各阶级之间的冲突。"

 ideology_corporatist_leader: "法人"
 ideology_corporatist_leader_desc: "#lore (中文(简体) ). 这位领导人相信通过上层阶级的让步和不同社会群体之间的协作来解决阶级冲突. #!"

 ideology_agrarian_jeffersonian:0 "杰斐逊式"
 ideology_agrarian_jeffersonian_desc:0 "#lore (中文(简体) ). 这一群体认为,小农阶级构成国家的基础,支持将农业作为自由社会的基础。"

  # flavor ideologies

 ideology_republican_paternalistic:0 "精英主义"
 ideology_republican_paternalistic_desc:0 "#lore (中文(简体) ). 这个团体倾向于由登陆精英统治,但仍支持共和政体. #!"

 ideology_scholar_paternalistic:0 "学者"
 ideology_scholar_paternalistic_desc:0 "#lore (中文(简体) ). 这个集团更希望看到由一位君主统治的国家受到有智慧和受过教育者的建议. #!"

 ideology_junker_paternalistic:0 "军克"
 ideology_junker_paternalistic_desc:0 "#lore (中文(简体) ). 这个团体认为登陆贵族最适合带领国家走向未来. #!"

 ideology_papal_paternalistic:1 "男爵制"
 ideology_papal_paternalistic_desc:0 "#lore (中文(简体) ). 该集团支持教宗的权威和罗马教廷的传统等级.#!"

 ideology_confucian:0 "儒学"
 ideology_confucian_desc:0 "#lore (中文(简体) ). 这个团体相信孔子的教义,支持他们认为根植于"天法"的社会秩序. #!"

 ideology_bakufu:0 "巴库福"
 ideology_bakufu_desc:0 "#lore (中文(简体) ). 这个团体支持shogunate并相信权力属于战士阶级手中. #!"
 
 ideology_shinto_moralist:0 "神道虔诚"
 ideology_shinto_moralist_desc:0 "#lore (中文(简体) ). 这个团体相信皇帝的神通,并将这种信仰同神灵的旧崇拜联系起来. #!"

 ideology_caudillismo:0 "卡多利斯莫语Name"
 ideology_caudillismo_desc:0 "#lore (中文(简体) ). 这个团体倾向于支持有军事背景的强人领袖而不是宪法法治. #!"

 ideology_heavenly_kingdom_theocratic:0 "虔诚的上帝"
 ideology_heavenly_kingdom_theocratic_desc:0 "#lore (中文(简体) ). 这个团体支持在基督赎回后所有人都会成为上帝的子孙的想法,并且倾向于一种神权式的政府.#!"

 ideology_papal_moralist:0 "宗座权"
 ideology_papal_moralist_desc:0 "#lore (中文(简体) ). 该团体坚决致力于保持天主教会的时间权力和教会权力。"

 ideology_liberal_modern: "自由主义"
 ideology_liberal_modern_desc: "#lore (中文(简体) ). 这一群体认为自由和法律平等是需要保障的重要价值观。"

 ideology_egalitarian_modern: "平等主义"
 ideology_egalitarian_modern_desc: "#lore (中文(简体) ). 该集团认为,平等和人道地对待人民应当是政治政策的基石。"

 ideology_enclavist: "飞船"
 ideology_enclavist_desc: "#lore (中文(简体) ). 该集团的利益在于维护其作为殖民统治阶级的地位,使其与臣民隔绝,并通过复杂和不负责任的官僚制度来维护其权力。"

 ideology_malthusian: "马尔萨斯语Name"
 ideology_malthusian_desc: "#lore (中文(简体) ). 该集团赞同托马斯·马尔瑟斯所建立的经济理论,认为任何减贫努力都因随之而来的人口增长而自取灭亡。"

 liberal_and_egalitarian_amended_tt: "[GetIdeology('ideology_liberal').GetName]和 [GetIdeology('ideology_egalitarian').GetName] [Concept('concept_ideology','$concept_ideologies$')]在 $lawgroup_rights_of_women$上的立场将发生变化。"

 # Movement Ideologies

 ideology_royalist_movement: "皇家勋爵"
 ideology_royalist_movement_desc: "#lore (中文(简体) ). 这个团体忠于君主及其合法统治者. #!"

 ideology_absolutist_movement: "绝对主义者"
 ideology_absolutist_movement_desc: "#lore (中文(简体) ). 这个团体忠于君主制体制,支持赋予它绝对的权力. #!"

 ideology_anarchist_movement: "无政府主义者"
 ideology_anarchist_movement_desc: "#lore (中文(简体) ). 这个团体寻求废除等级制度,权威和国家,让人民自行治理. #! (中文(简体) )."

 ideology_communist_movement: "共产党"
 ideology_communist_movement_desc: "#lore (中文(简体) ). 这个集团相信工人阶级通过任何必要的手段来夺取政治权力. #! (中文(简体) )."

 ideology_vanguardist_movement: "先驱者"
 ideology_vanguardist_movement_desc: "#lore (中文(简体) ). 这个集团相信通过一个由有献身精神的激进分子组成的先锋党来实现社会主义社会. #! (中文(简体) )."

 ideology_radical_movement: "激进"
 ideology_radical_movement_desc:1 "#lore (中文(简体) ). 这个团体致力于推动民主理想的激进自由主义改革。 #! (中文(简体) )."

 ideology_liberal_movement: "自由主义"
 ideology_liberal_movement_desc: "#lore (中文(简体) ). 这一群体重视民主制度,支持保障公民的基本自由。 #! (中文(简体) )."

 ideology_pluralist_movement_1: "复数"
 ideology_pluralist_movement_1_desc: "#lore (中文(简体) ). 这一群体希望保护他们的文化传统、特性和语言。 #! (中文(简体) )."

 ideology_pluralist_movement_2: "$ideology_pluralist_movement_1$"
 ideology_pluralist_movement_2_desc: "$ideology_pluralist_movement_1_desc$"

 ideology_pluralist_movement_3: "$ideology_pluralist_movement_1$"
 ideology_pluralist_movement_3_desc: "$ideology_pluralist_movement_1_desc$"

 ideology_pluralist_movement_4: "$ideology_pluralist_movement_1$"
 ideology_pluralist_movement_4_desc: "$ideology_pluralist_movement_1_desc$"

  # Government Principles group
 lawgroup_governance_principles:0 "治理原则"
 lawgroup_governance_principles_desc:0 "指导贵国的基本原则和权威。 确定谁是国家元首。"
  
 law_chiefdom:0 "酋长领地"
 law_chiefdom_desc:0 "以亲属关系为主的分级工前政治制度,由军阀或显要家族的长者出任领导. 它无法有效地集中控制整个州。"
 law_monarchy:0 "君主制"
 law_monarchy_desc:0 "一种由贵族王朝代表国家民族特征并赋予王朝王室首领行政权力的治理形式."
 law_presidential_republic:0 "共和国总统"
 law_presidential_republic_desc:0 "人民及其民选代表掌握权力的政治制度。 共和国选举或提名 " x id=0 " 为国家元首。"
 law_parliamentary_republic:0 "议会共和国"
 law_parliamentary_republic_desc:0 "人民及其民选代表掌握权力的政治制度。 立法会领袖出任国家元首,被称作"x id=0"."
 law_theocracy:0 "专制"
 law_theocracy_desc:0 "政府由一个神职人员统治,以及他们对圣经的解释. 国家元首名义上是崇拜者,但实际上根据功绩、地位或出生情况选出世界代表。"
 law_council_republic:0 "理事会"
 law_council_republic_desc:0 "一种由工人选举地方议会代表的政治制度。 将工作场所组织的概念扩大到一般治理。"
 law_corporate_state:0 "公司国家"
 law_corporate_state_desc:0 "一种以官方认可的公司集团之间的制度化协作为基础的政治制度。 国家是不同社会阶层之间进行谈判的论坛。"
 law_corporate_state_1:0 "公司国家"
 law_corporate_state_1_desc:0 "一种以官方认可的公司集团之间的制度化协作为基础的政治制度。 国家是不同社会阶层之间进行谈判的论坛。"
  # Free speech group
 lawgroup_free_speech:0 "自由发言"
 lawgroup_free_speech_desc:0 "关于言论自由和公共集会权的法律。"
  
 law_outlawed_dissent:0 "缺席"
 law_outlawed_dissent_desc:0 "批评政府被认为是叛国和非法的."
 law_censorship:0 "审查"
 law_censorship_desc:0 "媒体受到积极的审查,集会权没有保障。"
 law_right_of_assembly:0 "集会权"
 law_right_of_assembly_desc:0 "公民享有公开集会的权利。"
 law_protected_speech:0 "受保护的语句"
 law_protected_speech_desc:0 "法律保护言论自由。"
  
  # Army Model group
 lawgroup_army_model:0 "陆军型号"
 lawgroup_army_model_desc:0 "你们的军队是如何组织和管理的."
  
 law_peasant_levies:0 "农民税"
 law_peasant_levies_desc:0 "陆军的主力部队由被征召的零到基本训练的步兵."
 law_national_militia:0 "国家民兵"
 law_national_militia_desc:0 "常备军规模较小,但当地民兵可以发动来保卫家园."
 law_mass_conscription:0 "大规模征兵"
 law_mass_conscription_desc:0 "可根据需要启动大量步兵义务兵来补充专业军队."
 law_professional_army:0 "职业兵"
 law_professional_army_desc:0 "军队由训练有素,专业的正规军组成."
  
  # Distribution of Power group
 lawgroup_distribution_of_power:0 "权力分配"
 lawgroup_distribution_of_power_desc:0 "政治权力如何分配. 确定国家元首对谁负责。"
  
 law_autocracy:0 "专制"
 law_autocracy_desc:0 "国家元首的权力是绝对的,他们对没有土生土长的权力负责。"
 law_oligarchy:0 "奥利加希"
 law_oligarchy_desc:1 "国家元首与少数有权有势、未经选举产生的个人分享权力和责任。"
 law_landed_voting:0 "陆上投票"
 law_landed_voting_desc:0 "拥有土地或资本财产的人获得投票权。"
 law_wealth_voting:0 "财富表决"
 law_wealth_voting_desc:1 "财富公民获得投票权。 财富较多的男性获得更多的选票."
 law_census_voting:0 "人口普查"
 law_census_voting_desc:0 "具有特殊地位的识字男子获得投票权。"
 law_universal_suffrage:0 "通用过滤器"
 law_universal_suffrage_desc:0 "每个成年男子都获得平等的投票权。"
 law_elder_council:0 "长老理事会"
 law_elder_council_desc:0 "最受尊贵之人有国家治理权."
 law_anarchy:0 "无政府主义"
 law_anarchy_desc:1 "地方社区管理自己的事务并派代表有限地在较大的合作社理事会任职。 由于没有正式的等级制度,中央权力难以行使。"
 law_single_party_state: "单一缔约方国家"
 law_single_party_state_desc: "国家由单一的合法政党管理,该政党垄断了国内所有政治活动."
 ruler_in_party_tt: "这个民族的"x id=0"是"x id=1/"的成员,具有活跃的政治色彩"x id=2/"."
 sps_no_party_tt: "这个民族没有活动 [Concept('concept_party', 'Political Parties')]"
 sps_government_reshuffle_tt: "[concept_government] 组成将更新为单一法律 [concept_party] 的成员。"
  
  # Voting System group
 law_first_past_the_post:0 "首个过去的文章"
 law_first_past_the_post_desc:0 "也叫"Winner Takes All",这个制度选出在地区分选中赢得最多席位的单身候选人. 它倾向于建立具有强大授权的一党制政府,但易受到打猎."
 law_proportional_representation:0 "比例代表"
 law_proportional_representation_desc:0 "这一制度按照所投票数的比例分配议会席位。 它倾向于建立多党联合政府,其中妥协是做任何事情的关键."
  
  # Workplace Safety group
 lawgroup_labor_rights:0 "劳工权利"
 lawgroup_labor_rights_desc:0 "工人的权利。"
  
 law_serfdom:0 "奴隶"
 law_serfdom_desc:0 "农民被捆绑在地上,必须为其封建主干活活活."
 law_no_workers_rights:0 "无工人权利"
 law_no_workers_rights_desc:0 "工人没有国家保障的具体劳动权利。"
 law_regulatory_bodies:0 "管理机构"
 law_regulatory_bodies_desc:0 "建立了政府机构,以管制雇主的过度行为。"
 law_worker_protections:0 "工人保护"
 law_worker_protections_desc:0 "工人享有法律规定的广泛保护。"
  
  # Children's Rights group
 lawgroup_childrens_rights:0 "儿童权利"
 lawgroup_childrens_rights_desc:0 "向儿童提供的权利和保护。"
  
 law_child_labor_allowed:0 "允许的童工"
 law_child_labor_allowed_desc:0 "在儿童可以工作的地方没有法律限制。"
 law_restricted_child_labor:0 "限制童工"
 law_restricted_child_labor_desc:0 "工厂里不允许有任何儿童。"
 law_compulsory_primary_school:0 "义务小学"
 law_compulsory_primary_school_desc:0 "所有儿童都必须上几年小学,在此期间被禁止工作."
  
  # Slavery group
 lawgroup_slavery:0 "奴隶制"
 lawgroup_slavery_desc:0 "人为地产."
  
 law_slavery_banned:0 "被禁奴隶制"
 law_slavery_banned_desc:0 "任何人不得由他人拥有。"
 law_debt_slavery:0 "债务 奴役"
 law_debt_slavery_desc:0 "那些无法清偿债务的人却将自己的人身作为债权人的财产而予以没收。"
 law_slave_trade:0 "贩卖奴隶"
 law_slave_trade_desc:0 "对廉价劳动力的需求是通过外国机构的非人道贸易来满足的。"
 law_legacy_slavery:0 "奴隶制"
 law_legacy_slavery_desc:0 "作为废奴者和奴隶持有者之间的妥协,奴役制度只要不扩大,就可能继续存在."
  
  # Church and State group
 lawgroup_church_and_state:0 "教会和国家"
 lawgroup_church_and_state_desc:0 "体能和精神督导之间的关系."
  
 law_state_religion:0 "国教"
 law_state_religion_desc:0 "该教堂是国家的官方机关. 所有少数宗教都受到歧视。"
 law_freedom_of_conscience:0 "良心自由"
 law_freedom_of_conscience_desc:0 "国家有正式的国教,但人民可以选择信仰什么. 只有特别异国情调的宗教受到歧视。"
 law_total_separation:0 "离职共计"
 law_total_separation_desc:0 "任何教会或信仰不得干涉政府职能. 不得歧视任何宗教。"
 law_atheist_state:0 "无神论国家"
 law_atheist_state_desc:0 "禁止传播宗教信仰,而实行这种信仰则令人发指。 所有宗教都受到歧视。"
  
   # Citizenship group
 lawgroup_citizenship:0 "公民身份"
 lawgroup_citizenship_desc:0 "扩大公民权。"
  
 law_ethnostate:0 "民族国家"
 law_ethnostate_desc:1 "国家认为自己与某个族裔有着千丝万缕的联系,而其他族裔则被禁止公民身份。 所有外国文化都受到歧视。"
 law_national_supremacy:0 "国家优势"
 law_national_supremacy_desc:1 "国家通过遵守某种民族特征来界定其公民,该民族特征被认为高于所有其他民族。 外国文化受到歧视,除非它们同时拥有遗产和语言(或其他习俗)。"
 law_racial_segregation:0 "种族隔离"
 law_racial_segregation_desc:1 "国家认为公民权与共有种族遗产的概念有关。 不同遗产的外国文化受到歧视。"
 law_cultural_exclusion:0 "文化排斥"
 law_cultural_exclusion_desc:1 "国家赋予具有各种文化特征的人公民权,同时认为某种官方身份至关重要。 与你们的主要文化没有共同意义的外国文化受到歧视。"
 law_multicultural:0 "多文化主义"
 law_multicultural_desc:1 "国家维护具有各种文化特征的人的平等公民权利,不试图正式维护某种文化而不是其他文化。 没有任何文化受到歧视。"
 law_subjecthood: "主题"
 law_subjecthood_desc: "国家首先将本国人民定义为君主的臣民,很少努力鼓励任何官方国籍. 文化在他们自己的社区内基本上由他们自己使用。"

  # Caste Hegemony, a Social Stratification law group
 lawgroup_caste_hegemony: "种姓酋长"
 lawgroup_caste_hegemony_desc: "在英属印度种姓制度基础上,剥夺社会成员的权利。"
 law_hindu_caste_enforced: "种姓制度"
 law_hindu_caste_enforced_desc: "种姓等级制度在法律上得到实施,并阻止向上的社会经济流动。"
 law_hindu_caste_codified: "编成的种姓系统"
 law_hindu_caste_codified_desc: "种姓等级制度得到承认并被用来限制向上的社会经济流动。"
 law_hindu_caste_not_enforced: "未执行的种姓"
 law_hindu_caste_not_enforced_desc: "基于种姓的社会经济流动不受法律限制,但歧视可能仍然存在。"
 law_affirmative_action: "平权行动"
 law_affirmative_action_desc: "采取积极措施创造公平的社会经济状况,优先考虑以前被边缘化的群体。"
  
  # Economic System group
 lawgroup_economic_system:0 "经济体系"
 lawgroup_economic_system_desc:0 "经济的基本原则。"

 law_traditionalism:0 "传统主义"
 law_traditionalism_desc:0 "工业前自给经济,中央控制很少."
 law_agrarianism:0 "农业"
 law_agrarianism_desc:0 "以农业发展和社区为重点的农村经济。"
 law_cooperative_ownership:0 "合作社所有权"
 law_cooperative_ownership_desc:0 "以社会所有制概念为基础的经济制度,剩余生产在工人中分配更为均衡。"
 law_command_economy:0 "命令经济"
 law_command_economy_desc:0 "内向式干预主义经济,政府直接管理生产的大部分方面."
 law_laissez_faire:0 "莱塞-法尔"
 law_laissez_faire_desc:0 "建立在比较优势原则基础上的自由经济,政府干预减少意味着更大的增长"
 law_interventionism:0 "干预主义"
 law_interventionism_desc:0 "为了确保我们国家的稳定,政府必须制止私营企业最恶劣的过分行为。"

 # Trade Policy group
 lawgroup_trade_policy:0 "贸易政策"
 lawgroup_trade_policy_desc:0 "关于跨界贸易和货物交换的法律。"
 
 law_free_trade:0 "自由贸易"
 law_free_trade_desc:1 "不应阻碍货物自由交换,因为贸易有利于所有人。"
 law_protectionism:0 "保护主义"
 law_protectionism_desc:0 "我们的工业必须受到保护,不受外国市场行为者的掠夺。"
 law_isolationism:0 "孤立主义"
 law_isolationism_desc:0 "经济的重点是在内部满足国家需要,同时远离他国事务。"
 law_mercantilism:0 "导出焦点"
 law_mercantilism_desc:0 "以出口为重点的经济,强调保持积极的经常账户并与其他国家竞争。"

  # Taxation Group
 lawgroup_taxation:0 "税务"
 lawgroup_taxation_desc:0 "国家如何通过对公民征税来提高收入."
 law_consumption_based_taxation:0 "基于消费的税收"
 law_consumption_based_taxation_desc:0 "税收制度没有直接收入或人均税收,而是通过对货物消费征税来提高收入。"
 law_land_based_taxation:0 "地税"
 law_land_based_taxation_desc:0 "以土地为主的传统征税形式,主要向农民征收."
 law_per_capita_based_taxation:0 "退税"
 law_per_capita_based_taxation_desc:0 "一种通过收入和人均税相结合,对穷人过度征税的税收制度。"
 law_proportional_taxation:0 "按比例征税"
 law_proportional_taxation_desc:0 "主要是基于收入的税收制度,试图确保每个人向国家支付大致相等的收入份额。"
 law_graduated_taxation:0 "累进税"
 law_graduated_taxation_desc:0 "一种税收制度,旨在通过高额分税将税收负担主要由富裕阶层承担。"
  
  # Education System group
 lawgroup_education_system:0 "教育系统"
 lawgroup_education_system_desc:0 "等孩子们做完烟囱打扫的活"
  
 law_no_schools:0 "无学校"
 law_no_schools_desc:0 "教育是父母的责任。 只有最闲暇的公民才能学会读书写作."
 law_religious_schools:0 "宗教学校"
 law_religious_schools_desc:0 "让教会负责国家教育,确保一个忠诚和道德健康的人口。"
 law_private_schools:0 "私立学校"
 law_private_schools_desc:0 "教育最好留给私人利益集团,他们可以保证在教育中自由选择。"
 law_public_schools:0 "公立学校"
 law_public_schools_desc:0 "上学是国家的责任,应当标准化,人人平等入学。"
  
  # Health System group
 lawgroup_health_system:0 "卫生系统"
 lawgroup_health_system_desc:1 "关于政府参与(或缺乏)为其公民提供保健的法律。"
  
 law_no_health_system:0 "无卫生系统"
 law_no_health_system_desc:1 "政府不资助任何保健系统。"
 law_charitable_health_system:0 "慈善医院"
 law_charitable_health_system_desc:0 "慈善组织——常常是宗教组织——向任何生病或死亡的人提供一定的帮助,达到他们所能达到的程度."
 law_private_health_insurance:0 "私人健康保险"
 law_private_health_insurance_desc:0 "人口保健通过私营医院系统进行管理,通过私营健康保险方案支付费用,确保那些负担得起的人的福祉,对政府财政的影响最小。"
 law_public_health_insurance:0 "公共卫生保险"
 law_public_health_insurance_desc:0 "政府提供公共资助的健康保险方案,确保人人平等获得护理。"
 
  # Welfare group
 lawgroup_welfare:0 "福利"
 lawgroup_welfare_desc:0 "政府对被剥夺收入者的援助。"
  
 law_no_social_security:0 "无社会保障"
 law_no_social_security_desc:0 "国家的作用不是养活那些不能养活自己的人。"
 law_poor_laws:0 "贫穷的法律"
 law_poor_laws_desc:0 "让流浪汉和流浪汉离开我们的街道 进入工作屋是值得付出的代价的"
 law_wage_subsidies:1 "工资补贴"
 law_wage_subsidies_desc:1 "所有愿意工作的人都有吃饭的权利。 任何人都不应缺乏供养家人的手段。"
 law_old_age_pension:0 "养老金"
 law_old_age_pension_desc:0 "我们的劳动力不再有效率,他们随后的福利必须属于政府的职权范围。"
 law_disability_insurance:0 "残疾保险"
 law_disability_insurance_desc:0 "国家有责任照顾那些没有因自己的过错而无法工作的人。"
  
  # Rights of Women group
 lawgroup_rights_of_women:0 "妇女权利"
 lawgroup_rights_of_women_desc:0 "更公平的性别的法律规定。"
  
 law_no_womens_rights:0 "法定监护人"
 law_no_womens_rights_desc:0 "妇女在法律上受男子监护,并享有极少数权利。"
 law_women_own_property:0 "适当妇女"
 law_women_own_property_desc:0 "无论是继承的还是以其他方式获得的,甚至妇女都有拥有和珍惜其财产的权利和义务。"
 law_women_in_the_workplace:0 "工作场所的妇女"
 law_women_in_the_workplace_desc:0 "我们怎样才能使进步之炉燃烧起来,而潜在的劳动力只有一半?"
 law_womens_suffrage:0 "妇女的滋味"
 law_womens_suffrage_desc:0 "在调整新的事物秩序时,我们妇女要求有平等的声音;我们将接受同样的声音。"
  
  # Policing
 lawgroup_policing:0 "警务"
 lawgroup_policing_desc:0 "国家警察部队的优先事项。"

 law_no_police:0 "没有警察"
 law_no_police_desc:0 "这个国家不存在任何有组织的警察部队。"
 law_local_police:0 "地方警察部队"
 law_local_police_desc:0 "这个国家有地方警察部队开展活动。"
 law_dedicated_police:0 "专职警察部队"
 law_dedicated_police_desc:0 "该国有一支受过标准化培训的专职警察部队。"
 law_militarized_police:0 "军事警察部队"
 law_militarized_police_desc:0 "通过给你们的警察部队提供军事装备和军事训练,提高你们执行意志的效力。"
  
  # Bureaucracy
 lawgroup_bureaucracy:0 "官僚主义"
 lawgroup_bureaucracy_desc:0 "如何管理贵国。"

 law_hereditary_bureaucrats:0 "宗教官员"
 law_hereditary_bureaucrats_desc:0 "官僚通过传统继承来维持自己的地位,将责任传给子女."
 law_appointed_bureaucrats:0 "任命官员"
 law_appointed_bureaucrats_desc:0 "官僚由统治者任命,为国家的最大利益服务以换取高工资."
 law_meritocratic_bureaucracy:0 "精英官僚主义"
 law_meritocratic_bureaucracy_desc:0 "官僚通过功绩争夺权力地位。 随着时间的推移,这创造了庞大的拜占庭政府。"
 law_elected_bureaucrats:0 "当选的官僚"
 law_elected_bureaucrats_desc:0 "地方省长由选民选举产生,下放权力,同时使公民更容易管理。"
  
  # Colonization
 lawgroup_colonization:0 "殖民"
 lawgroup_colonization_desc:0 "你的立场是建立殖民地来取代和征服[concept_decentralized_nation]。"
  
 law_no_colonial_affairs:0 "无殖民地事务"
 law_no_colonial_affairs_desc:0 "该国不从事任何正式的殖民活动,不能建立殖民地。"
 law_colonial_resettlement:0 "殖民地重新安置"
 law_colonial_resettlement_desc:0 "建立殖民地是为了向来自该国各注册州的定居者提供土地。"
 law_colonial_exploitation:0 "殖民统治"
 law_colonial_exploitation_desc:0 "建立殖民地是为了开采该地区的自然资源和廉价劳动力。"
  
  # Internal Security
 lawgroup_internal_security:0 "国内安全"
 lawgroup_internal_security_desc:0 "保持你自己的事务秩序。"
  
 law_no_home_affairs:0 "无内政"
 law_no_home_affairs_desc:0 "国家没有特别试图制止动乱和起义."
 law_national_guard:0 "国民警卫队"
 law_national_guard_desc:0 "国家可能动用军事力量来镇压国内动乱."
 law_secret_police:0 "秘密警察组织"
 law_secret_police_desc:0 "秘密警察严密追踪激进分子和持不同政见者."
 law_guaranteed_liberties:0 "保障自由"
 law_guaranteed_liberties_desc:1 "州内事务局只注重解决公民的冤情,禁止无故调查或逮捕."
  
  # Migration
 lawgroup_migration:0 "移徙"
 lawgroup_migration_desc:0 "控制人流."
  
 law_no_migration_controls:0 "无移民管制"
 law_no_migration_controls_desc:0 "该国没有试图控制其跨界流动。"
 law_migration_controls:0 "移徙管制"
 law_migration_controls_desc:0 "只有没有歧视的文化和宗教人士才能出入境。"
 law_closed_borders:0 "关闭边界"
 law_closed_borders_desc:0 "不准入境或出境。"

 liberate_slaves_tt:0 "所有 [GetPopType('slaves').GetName] 将被解放"
 enslave_discriminated_farm_workers_tt:0 "在前奴隶国的农场、牧场和种植园工作的所有$laborers$ 低[concept_acceptance]将[Concept('concept_slavery', '$concept_enslaved$')]。"
 
 enact_law_radical_leftist_government_warning_desc:0 "@warning! 发布此 [concept_law] 可能导致 [Concept('concept_country', '$concept_countries$')] 没有类似形式的 $lawgroup_governance_principles$ 变得对我们具有攻击性。"
 enact_law_radical_leftist_economy_warning_desc:0 "@warning! 发布此 [concept_law] 可能导致 [Concept('concept_country', '$concept_countries$')] 没有类似形式的 $lawgroup_economic_system$ 变得对我们具有攻击性。"

 # Labour Associations
 lawgroup_labour_associations: "劳工协会"
 lawgroup_labour_associations_desc: "对工人和工匠协会的规定。"

 law_guild_system: "关节系统"
 law_guild_system_desc: "在某些领域就业的资格取决于正式的工艺或商行成员身份的制度。"
 law_combination_acts: "合并行为"
 law_combination_acts_desc: "法律禁止成立任何种类的劳工协会。"
 law_anti_strike_laws: "反冲击法"
 law_anti_strike_laws_desc: "虽然允许成立劳工协会,但禁止罢工和某些形式的集体谈判。"
 law_right_to_associate: "结社权"
 law_right_to_associate_desc: "对劳工协会的组建和活动没有特别的限制。"
 law_corporatized_unions: "工会"
 law_corporatized_unions_desc: "劳工协会被置于国家控制之下,要么强制合并为单一的国家联盟,要么将现有协会纳入国家职能。"


# Luddites
 law_industry_banned: "禁止的工业"
 law_industry_banned_desc: "一个拒绝重工业和自动化的经济观点,偏好诚实劳动的果实而不是无灵魂的机械."
 industry_banned_tt: "将无法再构建 #bold 重工业 #! 建筑"
 industry_banned_destroy_tt: "@warning! 所有 #bold 全国重工业#!建筑将被拆除"
 ideology_luddite: "鲁地特"
 ideology_luddite_desc: "路德派反对工业自动化,或在更极端的情况下反对工业本身."

  
 law_extraction_economy: "采掘经济"
