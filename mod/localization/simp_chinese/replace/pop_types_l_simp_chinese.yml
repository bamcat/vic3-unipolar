l_simp_chinese:
 aristocrats:0 "@aristocrats! $aristocrats_no_icon$"
 aristocrats_only_icon:0 "@aristocrats!"
 aristocrats_no_icon:0 "贵族"
 aristocrats_desc:1 "财富地主,旧有关系的人 它们专门在[GetBuildingType('building_manor_house').GetName][Concept('concept_building', '$concept_buildings$')]工作,在那里拥有农场和种植园。 它们将部分利润贡献给 " x id=2/ " 。 他们的政治利益作为`x id=3/'的代表。"
 bureaucrats:0 "@bureaucrats! $bureaucrats_no_icon$"
 bureaucrats_only_icon:0 "@bureaucrats!"
 bureaucrats_no_icon:0 "官僚"
 bureaucrats_desc:0 "负责管理政府职能和基础设施的官员。 在政治上,他们倾向于与智者或小资产阶级结盟."
 capitalists:0 "@capitalists! $capitalists_no_icon$"
 capitalists_only_icon:0 "@capitalists!"
 capitalists_no_icon:0 "资本家"
 capitalists_desc:1 "工业队长,新时代的新钱. 他们完全在[GetBuildingType('building_financial_district').GetName][Concept('concept_building', '$concept_buildings$')]工作,在那里他们拥有地雷和手工业。 它们将部分利润贡献给 " x id=2/ " 。 他们的政治利益作为`x id=3/'的代表。"
 clergymen:0 "@clergymen! $clergymen_no_icon$"
 clergymen_only_icon:0 "@clergymen!"
 clergymen_no_icon:0 "教士们"
 clergymen_desc:0 "祭司,学者等宗教领袖关注农村人口的精神需要. 在政治上,它们是德意志派的骨干."
 clerks:0 "@clerks! $clerks_no_icon$"
 clerks_only_icon:0 "@clerks!"
 clerks_no_icon:0 "白帮工人"
 clerks_desc:0 "在政府、基础设施和商店执行行政任务的低级办公室工作人员。 通常属于小布尔吉斯人的一部分,尽管有些人加入了工会."
 engineers:0 "@engineers! $engineers_no_icon$"
 engineers_only_icon:0 "@engineers!"
 engineers_no_icon:0 "工程师"
 engineers_desc:1 "技术解决方案的发明者和设计者,与制造业,矿业和建筑业等部门的先进机械合作. 一些人支持实业家或小资产阶级,而另一些人则加入工会."
 farmers:0 "@farmers! $farmers_no_icon$"
 farmers_only_icon:0 "@farmers!"
 farmers_no_icon:0 "农民"
 farmers_desc:0 "种植者、小农户和其他生计稳定但很少的人生产粮食或种植经济作物。 大多数人认为他们的利益是农村民俗。"
 peasants:0 "@peasants! $peasants_no_icon$"
 peasants_only_icon:0 "@peasants!"
 peasants_no_icon:0 "农民"
 peasants_desc:2 "生计农民只在 " x id=0 " 中发现,他们生产农业和简单的制成品,主要用于满足自己的需要。 它们依靠[concept_subsistence_output]生存,只在[concept_market]经济中起有限的作用. 它们往往为[Concept('concept_politically_unaligned_aligned', '$concept_politically_unaligned$')]。"
 laborers:0 "@laborers! $laborers_no_icon$"
 laborers_only_icon:0 "@laborers!"
 laborers_no_icon:0 "蓝领工人"
 laborers_desc:0 "日工、农场工人和其他几乎无就业保障的人,从事全社会一切工作。 他们通常不参与政治,但可能通过工会参与。"
 officers:0 "@officers! $officers_no_icon$"
 officers_only_icon:0 "@officers!"
 officers_no_icon:0 "主席团成员"
 officers_desc:0 "在陆军和海军中指挥国家军队的受命军官. 在政治上,他们代表了武装部队的上层。"
 academics:0 "@academics! $academics_no_icon$"
 academics_only_icon:0 "@academics!"
 academics_no_icon:0 "学者"
 academics_desc:0 "研究人员、医生、律师和其他受过教育的专业人员在学术机构学习和教学。 从政治上讲,他们处于情报界的前列."
 shopkeepers:0 "@shopkeepers! $shopkeepers_no_icon$"
 shopkeepers_only_icon:0 "@shopkeepers!"
 shopkeepers_no_icon:0 "小企业业主"
 shopkeepers_desc:0 "店主和经理,向城市的顾客出售商品. 他们通常在政治上属于小资产阶级。"
 slaves:0 "@slaves! $slaves_no_icon$"
 slaves_only_icon:0 "@slaves!"
 slaves_no_icon:0 "奴隶"
 slaves_desc:0 "在允许奴役的国家,不是作为个人而是作为财产对待,在各个部门从事强迫劳动。 因其地位,不得参政."
 soldiers:1 "@soldiers! $soldiers_no_icon$"
 soldiers_only_icon:1 "@soldiers!"
 soldiers_no_icon:1 "军人"
 soldiers_desc:0 "士兵和水手构成全国军人的主体. 他们通常在政治上符合其作为武装部队一部分的作用。"
 machinists:0 "@machinists! $machinists_no_icon$"
 machinists_only_icon:0 "@machinists!"
 machinists_no_icon:0 "弯刀手"
 machinists_desc:0 "在制造业、矿山、机械化农场等部门拥有稳定就业操作机械的体力工人。 在政治上,他们往往成为工会的驱动力."
  
