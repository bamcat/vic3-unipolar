 BUREAUCRATS_QUALIFICATIONS_DESC:0 "只有具有充分[concept_literacy]的流行能成为#v$bureaucrats$#!. 潜在增加值大于[concept_literacy]。 其[concept_culture]的出血率低[concept_acceptance]需要更长的时间,而对于[concept_culture]和[concept_religion]的出血率高$concept_acceptance$的出血率则要快得多. #v的出血率高<x id=11/××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××"
 CAPITALISTS_QUALIFICATIONS_DESC:0 "只有具有充分[concept_wealth]的流行能成为#v$capitalists$#!. 潜在增加值大于[concept_wealth]和[concept_literacy]。 其[concept_culture]有低[concept_acceptance]的流行需要更长的时间。 #v <x id=9/×××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××"
 CLERGYMEN_QUALIFICATIONS_DESC:0 "只有具有充分[concept_literacy]的流行能成为#v$clergymen$#!. 潜在增加值大于[concept_literacy]。 其[concept_religion]的口音为[concept_acceptance]的口音需要更长的时间,而对于[concept_religion]的口音为$concept_acceptance$. #v的口音为<x id=10×××××××××11/>和#v的口音为<x id=13×××××××××××××××××14/>的口音,口音为#v的口音为<x id=16×××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××"
 CLERKS_QUALIFICATIONS_DESC:0 "任何流行都可以成为#v $clerks$#!. 以较大的[concept_literacy]. #v $laborers$#!增加潜力,尤其容易成为#v $clerks$#!."
 ENGINEERS_QUALIFICATIONS_DESC:0 "只有有充足 [concept_literacy] 的弹出能成为 #v $engineers$#!. 潜在增量随着较大的 [concept_literacy] 和 [concept_wealth]. #v $machinists$#! 和 #v id=10/>#! ,其时间特别容易成为 #v $engineers$#!."
 FARMERS_QUALIFICATIONS_DESC:0 "任何流行都可以成为#v $farmers$#!. 以较大的[concept_wealth]. #v. $peasants$#!和#v. $laborers$#! 的潜在增加时间特别容易成为#v. $farmers$#!."
 MACHINISTS_QUALIFICATIONS_DESC:0 "有最小 [concept_literacy] 的流行可变为 #v $machinists$#!. 在较大的[concept_literacy]. #v $laborers$#! 中,潜在增加的时间特别容易成为#v $machinists$#!."
 OFFICERS_QUALIFICATIONS_DESC:0 "只有#v $soldiers$#!或有足够高的[concept_culture]的流行能成为#v $officers$#!. 以较大的[concept_literacy]来增加潜力. #v <x id=10-××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××××"
