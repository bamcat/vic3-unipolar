  # Categories
  # Culture Technology
  # Economy Technology
  # Military Technology
  ### Technology Tooltips
  ##lenders_of_last_resort: "Lenders of Last Resort"
  ##lenders_of_last_resort_desc: "State-owned central banks are large enough to come to the rescue of smaller commercial banks, such as during bank runs. This can prevent a financial crisis spreading to other sectors of the economy. Often, even the promise of rescue in times of difficulty is enough to prevent bank runs occurring in the first place. Some 'critics' claim that such a promise will encourage risky behavior by the commercial banks, but these 'critics' are surely just anarchists looking to wreck the nation's economic security, as bankers are some of the most trustworthy people to walk the halls of power."
  ##limited_liability: "Limited Liability"
  ##limited_liability_desc: "A limited liability company draws a legal distinction between the company and its owners. This helps prevent the bankruptcy of a company ruining the personal lives of the investors, as creditors will not try to haul off the furniture of failed businessmen to recoup losses. This makes investing less risky, if perhaps less satisfying to watch from afar. As a separate legal entity, the company has its own finances that must be audited and taxed."
  ##marketing_desc: "Promotional schemes to grab more market share or create a new market from scratch were devised by Josiah Wedgwood, leader of the expanding pottery industry at the dawn of the Industrial Revolution."
  ##paper_money: "Paper Money"
  ##paper_money_desc: "A kind of promissory note issued by a bank, paper money allows private citizens to move and exchange large volumes of currency without the danger and discomfit of gold or silver coins which cannot be divided and are heavy to carry. Thus, commercial exchanges are easier and safer."
  ##regulated_private_notes: "Regulated Private Notes"
  ##regulated_private_notes_desc: "Bankers realized hundreds of years ago that their customers only rarely demand back their deposits all at once. By issuing loans in excess of their reserves in the form of private bank notes, bankers could make even more money from interest. Unfortunately, when all the bank's customers do demand their deposits at once, there will not be enough reserves. With better communications technology, these 'bank runs' become more frequent. To prevent bank runs, governments can restrict the issuance of private notes only to banks that meet certain criteria of fiduciary responsibility, such as being close personal friends to the finance minister."
  #alcohol: "Alcohol"
  #alcohol_desc: "An ancient technology, presumably discovered when a tribesman left some grain in a puddle and decided to drink it after a few months had passed, alcohol became central to the discipline of alchemy, and continues to serve men of reason in the field of chemistry in various processes, some of which do not involve drinking it."
  #atomic_theory_of_matter: "Atomic Theory of Matter"
  #atomic_theory_of_matter_desc: "Observations in chemistry seem to have disproven the notion held by supporters of phlogiston that matter is composed of the three fundamental essences of solidity, fluidity and inflammability. Air is not merely a void into which phlogiston flows during combustion - it contains oxygen, which combines with other matter during chemical reactions."
  #bankruptcy_law: "Bankruptcy Law"
  #bankruptcy_law_desc: "Having a legal framework for a company to declare bankruptcy allows investors and creditors to try to recoup losses via liquidation of assets. This makes investment less risky."
  #building_societies: "Building Societies"
  #building_societies_desc: "Originally set up within communities to help new families raise loans with which to buy homes and then disbanded once the members had all satisfied their requirements, building societies can also be permanent financial institutions that specialize in cheap mortgages."
  #census: "Census"
  #census_desc: "Knowing how many people we have in our country and roughly were they live is important so we know where to spend out money and how many men we will have if we have to fight. Should we be involved in that grubby business of having our lower orders actually having representation I suppose it will have a use for that as well."
  #chemical_batteries: "Chemical Batteries"
  #chemical_batteries_desc: "Electricity can be generated by exploiting the difference in charge as electrolytes pass through oxidation and reduction cells containing copper and zinc cathodes and annodes. Early experiments in this field took the form of a series of jars which had the appearance of a battery of artillery, hence the name."
  #civil_service: "Civil Service"
  #civil_service_desc: "The idea that the government should have a body of men on which they rely on to carry out administration is neither new nor necessarily efficient. The radical idea that people should be selected for these positions on merit and ability and that they should keep their positions if the government is changed are radical and leads to greater efficiency."
  #clinical_thermometer: "Clinical Thermometer"
  #clinical_thermometer_desc: "The mercury thermometer had been around since the mid 18th century. Its use for medical purposes were limited as they tended to be large (over a foot long) and could take over 20 minutes to measure someone's temperature. Now we have made the thermometer smaller and it only takes a few minutes to get a reading, making it truly useful for doctors."
  #commercial_banks: "Commercial Banks"
  #commercial_banks_desc: "Businesses need various financial services to operate normally. Payroll at the end of the month might require a short loan to cover a temporary shortfall. Expanding the business might likewise require borrowing, especially if the business is a limited liability company rather than a personal venture. Commercial banks offer financial services to these companies, as opposed to wealthy private individuals, middle-class savers or professional investors."
  #cooperatives: "Co-Operatives"
  #cooperatives_desc: "Intended as a mutually beneficial organization to help small businesses and workers buy basic necessities, a co-operative tends to be run democratically by its members to achieve social good rather than pure profit."
  #credit_unions: "Credit Unions"
  #credit_unions_desc: "Rather than being operated for the profit of an owner or shareholders, credit unions are a financial institution which tries to improve the welfare of its members through access to credit. They tend to be run democratically, with each member having a vote on the director of the credit union."
  #customs_tariffs: "Customs Tariffs"
  #customs_tariffs_desc: "Tariffs are a very important weapon in a government's arsenal. They can be used both to raise revenue and to 'guide' merchants and businesses into making choices beneficial to the national interest, as determined by the government. Tariffs can be charged on entry into a country, for the use of port facilities, or on the price of imported or exported goods. One important use for tariffs is in protecting native industries against more efficient foreign companies, which can give domestic firms time to catch up with their rivals abroad."
  #department_stores: "Department Stores"
  #department_stores_desc: "Having one large store that sells a huge variety of goods can be more convenient for customers and gives the retailer more buying-power over the distribution chains."
  #distribution_channels: "Distribution Channels"
  #distribution_channels_desc: "Companies can be structured to sell goods in a number of ways. Raw materials are generally sold to other industries; industries might then sell manufactured goods to wholesalers such as brokers; wholesalers then sell goods to retailers such as specific shops or chains of shops, and the retailer then sells the goods to the final customer. Innovations in this area include factory or outlet stores, which sell goods directly to customers from the factory complex, such as to workers and their families and community."
  #enclosure_acts: "Enclosure Acts"
  #enclosure_acts_desc: "Enclosure is the process of taking small strips of peasant land, passed down from father to son since the beginning of feudalism, and 'combining' them under one owner via Acts of Parliament. By merging these subsistence plots into enclosed fields, arable land can be turned into pasture, capital goods such as machinery can be invested in, and many small surpluses can be merged into a significant profit. Where the landless peasants go is up to them - am I my brother's keeper?"
  #espionage: "Espionage"
  #espionage_desc: "Know thy enemy. Knowledge of what is going on in places that could be hostile to us is vital if we are going to keep out country safe. This can be in the form of the mundane, like ensuring proper maps exist of areas we may end up being at war in to the significant like enemy forces and plans."
  #gold_standard: "Gold Standard"
  #hereditary_aristocracy_desc: "As a society becomes more productive enough food can be generated to allow people to specialize and do things that do not require you to farm. A military caste to protect yourself from hostile neighbors is a natural development and eventually they will entrench their position and hereditary aristocracy is born."
  #insurance: "Insurance"
  #insurance_desc: "Insurance against loss of property has existed for many hundreds of years, being especially important for merchant vessels traveling overseas. As global trade becomes more prevalent, the need for more secure maritime insurance increases. Lloyd's of London began as a specialist for maritime insurance but has expanded into other markets such as insuring properties against fire damage."
  #malthusianism: "Malthusianism"
  #malthusianism_desc: "Population is increasing much faster than our food supply. We must face the fact that if we allow this to continue we will face a catastrophe for our people. Further more we must face the face any such catastrophe will hurt the lower classes the most. The Tory ideal of paternalism is not good nor noble but instead will lead to a greater catastrophe on the least fortunate."
  #manifest_destiny: "Manifest Destiny"
  #manifest_destiny_desc: "If we are to spread our civilization to those less fortunate to have we must accept the fact that we have been uniquely blessed with virtues and institutions that others simply do not have. We have a mission to redeem the less fortunate by remaking them in our own image. It is no more that our destiny to do this."
  #oceanic_cablelaying: "Oceanic Cablelaying"
  #oceanic_cablelaying_desc: "With the technology of the telegraph, thought soon turned to how to lay a cable under bodies of water. Although it proved not technically difficult to lay cables of short stretches of water (like bays and straits), the wide oceans proved a greater challenge. Good news - after several false starts we have successfully mastered the techniques to lay such a cable so no longer must we rely on the good will of others."
  #ophthalmoscope: "Opthalmoscope"
  #ophthalmoscope_desc: "'every eye could be made luminous if the axis from a source of illumination directed towards a person's eye and the line of vision of the observer were coincident', this discovery revolutionized the treatment of eye problems. Creating a hand held device with a mirror that could shine the light, the ophthalmoscope, was made the doctor's life a lot easier."
  #positivism: "Positivism"
  #positivism_desc: "We we consider what knowledge is we know that there is certain knowledge. Information that comes from sensory experience and  then interpretation comes through logic and reason is the exclusive source of certain knowledge. We can extend this from the physical world to societies as a whole. Societies operate under general laws which if we took the time to analyze we would understand. Theology must be rejected because faith by its very nature denies reason and verification."
  #postal_banks: "Postal Banks"
  #postal_banks_desc: "Rural and otherwise isolated communities may not have access to a local bank branch. In such cases, a postal bank can operate to offer them financial services, such as savings and a current account, without the need to travel into a town or city."
  #savings_banks: "Savings Banks"
  #silver_standard: "Silver Standard"
  #vertical_filing_cabinet: "Vertical Filing Cabinet"
  #vertical_filing_cabinet_desc: "Gone but not forgotten"
 admiralty:0 "现代雷达"
 admiralty_desc:0 "海军上将是一个复杂的军衔体系,由僵硬的指挥系统相接来帮助海军更有效地工作."
 anaesthetics:0 "麻醉术"
 anaesthetics_desc:0 "麻醉剂是指在外科手术中用于防止患者感觉刀具和医护人员侵入性打发的镇静剂或止痛药,这可能不适."
 anarchism:0 "市场社会主义"
 anarchism_desc:0 "市场社会主义是市场经济框架内涉及生产资料社会所有制的一种经济制度. 这种制度有各种模式,通常涉及合作企业,有时包括公营或私营企业。"
 aniline:0 "机器学习算法"
 aniline_desc:0 "在计算或其他解决问题的操作中,特别是计算机要遵循的程序或一套规则。 被社交媒体公司用来评估消费者的欲望."
 anti_clericalism:0 "反咒语主义"
 anti_clericalism_desc:0 "权力腐败者和宗教机构不能比任何其他机构更免于这种腐败。 他们可能声称为大众提供救赎,而是试图给自己的巢穴起羽并剥夺他们认为不值得的人的权利。 我们必须将有组织的宗教的影响从我们的公共领域抹去,把这个问题留给那些没有被启蒙的人。"
 antibiotics:0 "根除癌症"
 antibiotics_desc:0 "基因编辑可以创造出对癌症和其他疾病无法接受的基因."
 antiseptics:0 "解毒剂"
 antiseptics_desc:0 "科学已经确定,受热会摧毁细菌。 问题是,对于活体组织来说,这不是有效的解决方案. 然而,当在伤口被垫子所覆盖的实验中溶出苯酚溶液时,我们看到了坏疽事件急剧下降。 这种抗菌理学诞生了."
 arc_welding:0 "行星际殖民"
 arc_welding_desc:0 "不同星球的殖民化"
 army_reserves:0 "进食准备"
 army_reserves_desc:0 "食用餐配给(英語:A Meal-Ready-to-Eat (MRE))是一种军用配给,为长架寿命所设计,食物选择种类多."
 art_patronage:0 "艺术赞助"
 art_patronage_desc:0 "艺术不是自由的,为了发展艺术和文化,你需要富人去关注和支持艺术。 作为回报 他们拥有如此美丽的事物 因而赢得了声望"
 art_silk:0 "人工生活"
 art_silk_desc:0 "以合成基因组创造出生物体或设计出具有全新的,非自然性质的生物体. 合成基因组被用来从零开始创造出新的生命形式,比如2010年由Craig Venter和团队创造出的第一个合成细菌."
 artificial_fertilisers:0 "人工化肥"
 assembly_line:0 "组合行"
 assembly_line_desc:0 "通过精简建设过程,使每一项行动在彼此行动之后都正确进行,可以建立一个效率高得多的工厂。"
 atmospheric_engine:0 "清洁能源"
 atmospheric_engine_desc:0 "清洁能源生产方法,如风车,允许在不造成污染的情况下产生能源"
 automatic_bottle_blowers:0 "我的核心调解"
 automatic_bottle_blowers_desc:0 "这涉及使用真菌来降解环境污染物. 真菌可用于分解有害物质,如石油产品和工业溶剂."
 battlefleet_tactics:0 "航天- 战舰战术"
 battlefleet_tactics_desc:0 "操作大型战列舰可能是一项艰巨的任务. 通过作为舰队练习并学习特定战术,可以实现更大的性能."
 battleship_tech:0 "引导- Drone 破坏器"
 battleship_tech_desc:0 "能够炸出大片海洋的超大型战列舰"
 bessemer_process:0 "聚合物"
 bessemer_process_desc:0 "合成服装和织物允许为较不富有的人大规模地生产普通商品."
 bessemer_steel:0 "贝塞默钢铁"
 bessemer_steel_desc:0 "贝塞默工艺将冷空气炸成熔化的生铁,从碳、硅和锰中燃烧出,并制造出温和的钢材。 这不像用十字架生产的质量那么高,但价格却非常便宜,允许使用下等铁矿石并使得铁路线和钢筋混凝土能够大规模生产."
 biological_determinism:0 "生物决定因素"
 biological_determinism_desc:0 "对自然界遗传学和继承学的研究开启了人类行为有多少是由生物学决定的问题."
 feminism:0 "环保经济学"
 feminism_desc:0 "环境主义或环境权利是一个广泛的哲学,意识形态,以及支持生命,栖息地和周围环境的社会运动."
 blast_furnaces:0 "爆破起火炉"
 blast_furnaces_desc:0 "用起爆炉为冶金工艺添加了额外的氧气,例如矿石的冶炼,最初是用手来做,或者用水轮动力的活塞. 这导致高炉达到比露天高炉更大的温度,燃烧出杂质并允许异地金属合金. 起爆炉对生猪铁的生产特别有用,再用更先进的工艺将生猪铁制成成成铁或温和的钢。"
 bolt_action_rifles:0 "网络电脑"
 bolt_action_rifles_desc:0 "自主出兵是为了在战争爆发时挽救实际生命."
 chemical_bleaching:0 "个人计算机"
 chemical_bleaching_desc:0 "个人电脑于1980年代中期出现,有Apple II,Macintosh等产品和IBM PC等产品,使个人和小企业都能使用计算机."
  # bone_china: "Bone China"
  # bone_china_desc: "Bone China is a form of porcelain which in part is made from bone ash, the greater strength of this type of porcelain makes it rather valuable."
 # artillery: "Artillery"	// There is already a loc key for this in Goods, require prefix to support unique localization
 artillery_desc:0 "用重型弹药进行远程轰炸,恐吓并驱散敌军而不危及自己的部队。 不准确,缓慢地移动, 和昂贵, 但却是任何现代军队的关键成分。"
 breech_loading_artillery:0 "远程导弹电池"
 breech_loading_artillery_desc:0 "远程导弹电池,如HIMARS,使目标被摧毁到外国领土。"
 tech_bureaucracy:0 "社会自由主义"
 tech_bureaucracy_desc:0 "社会自由主义是一种意识形态,主张建立一个具有强大政府影响力和控制的自由市场来保护不幸的人."
 centralization:0 "专制资本主义"
 centralization_desc:0 "与国家资本主义有关并与之相重叠,这种制度是国家从事商业活动,专制资本主义将私有财产和市场力量的运作与限制异议结合起来."
 camera:0 "星际链接"
 camera_desc:0 "Starlink是一个由Starlink Services, LLC运营的卫星互联网星座,是一个国际电信供应商,是美国航空航天公司SpaceX的全资子公司."
 canals:0 "运河"
 canals_desc:0 "沿海和河道驳船是运输货物的一种非常有效的方法。 挖出一条通入一国内地的运河可以扩大这些驳船的覆盖范围,尽管当不同的高地需要用锁系统来接通时,这可能是个昂贵的命题."
 canneries:0 "超加工食品"
 canneries_desc:0 "超加工食品(UPFs)是指通过使用工业加工,并添加家庭厨房中一般不会发现的成分,使其与原型相去甚远的食品."
 canning_jars:0 "罐头贾斯"
 canning_jars_desc:0 "法国大革命的军队需要创新地解决他们的供给问题. 一个解决办法是在玻璃罐内做饭,防止不幽默和与内装物相混合并从而破坏口粮。 熔蜡被倒入罐口以起封印作用来对抗外道."
 canning_machines:0 "罐头机"
 canning_machines_desc:0 "早期被罐装食品生产缺乏自动化. 罐子被卷起并用手焊接. 使用机器将锡板迅速转化为罐头可以提高标准并增加吞吐量."
 carrier_tech:0 "激光艇"
 carrier_tech_desc:0 "激光艇(Laserboat)是指为迅速消灭来袭的无人机而架起高功率激光器的船只."
 catalytic_contact_process:0 "催化联系进程"
 catalytic_contact_process_desc:0 "1831年,英国醋商Peregrine Phillips发明出一种用铂作催化转化器来生产更浓缩的硫酸的过程. 虽然对于出产灰汽水或化肥并不特别有用,但这很快成为了有机染料出产的好兆头."
 chemical_isolation:0 "化学隔离"
 chemical_isolation_desc:0 "化学品可以通过多种方式得到净化,如蒸馏,过滤和蒸发等. 净化过程的质量显然会影响隔离的质量."
 chemical_synthesis:0 "化学合成"
 chemical_synthesis_desc:0 "狗尿由德国化学家弗里德里希·沃克勒于1828年出名地合成. 这开始模糊了有机化学和无机化学的界限,随着更多的化学物质被合成出新的工业过程正在打开."
 chemical_warfare:0 "AI-恐怖主义"
 chemical_warfare_desc:0 "某些化学组合在人类接触时会产生不良甚至致命的影响. 武器化给战争带来了全新的可怕方面。"
 civilizing_mission:0 "CRISPR 基因编辑"
 civilizing_mission_desc:0 "通过CRISPR进行基因编辑,可以让人类生长出新的器官."
 colonization:0 "超声波"
 colonization_desc:0 "20世纪后期在器官移植、通过核磁共振和CT扫描进行医学成像以及光学机械方面的进步,使得能够针对个别情况进行更专业化和反向的治疗"
 color_photography:0 "彩相摄影"
 color_photography_desc:0 "早期的捕捉全色相片技术,基于对光被眼睛所感知的洞察. 通过不同颜色过滤器有效拍摄出三幅相片,这些相片可以被组合成一幅图像来再现出原来的相色."
 combination_acts:0 "合并行为"
 combination_acts_desc:0 "工人们秘密相会并互相宣誓,这是对国家安全的威胁,显然是激进的雅各宾颠覆国家的手段. 由于工人在冲突关键时刻威胁采取行动,这也可能对我们抵御外部敌人的能力构成威胁。 我们将通过一系列法律,使我们能够为了共同利益管制这种行为。"
 combustion_engine:0 "纳米花"
 combustion_engine_desc:0 "这些药被应用到各种表面,使其更能抵抗腐蚀、磨损和污点。 正在开发自净表面和抗细菌纳米标签,用于保健、电子和建筑。"
 central_planning:0 "数字治理"
 central_planning_desc:1 "允许政府通过各种安全的计算机系统运行."
 compound_microscopes:0 "复合显微镜"
 compound_microscopes_desc:0 "光学中使用的镜头需要非常精细的玻璃制作技能. 这个领域的一个创新是使用两个镜头,一个聚焦于一个物体,另一个聚焦于第一个镜头,以增加放大. 这种显微镜可用于查看活生生的细菌."
 compression_ignition:0 "来自废物的能源"
 compression_ignition_desc:1 "通过将垃圾填埋场储存的废物转化为能源,我们的世界可以产生高电量"
 concrete_dockyards:0 "人工测试范围"
 concrete_dockyards_desc:0 "测试范围在AI内部完全生成."
 concrete_fortifications:0 "未来防御工事"
 concrete_fortifications_desc:0 "通过在防御工事中引入混凝土,可以很快地形成牢固的立场。"
 condensed_milk:0 "浓缩牛奶"
 condensed_milk_desc:0 "通常,牛奶必须在被牛乳腺挤出后迅速被消费. 通过降低容器内部的压力,如真空锅,牛奶的含水量会蒸发出水分,再将被凝固的牛奶罐装上并出售."
 conspicuous_consumption:0 "显著消费"
 conspicuous_consumption_desc:0 "财富有自己的威望。 财富的显现可以使一个人显得更有名并有助于通过社会阶层的进步,为社会登山者提供新的机会,例如与商人和政治家的接触。 在一个唯物主义社会中,狂热和奢侈自相矛盾地帮助人们变得更富。"
 conveyors:0 "自动化工厂"
 conveyors_desc:0 "通过应用最新的AI系统,可以创建平台,在不使用人类劳动力的情况下沿它们移动货物."
 cotton_gin:0 "现代汽车"
 cotton_gin_desc:0 "汽车可以在整个土地上快速运送人员和货物。"
 crucible_steel:0 "关键钢"
 crucible_steel_desc:0 "这种高碳合金通过将热量放入含粉末铁和木炭的石头十字架来制取,被认为类似于"大马士革钢",它在印度和波斯制造,直到1750年左右. 这种工艺生产出适合用于工具,弹簧等外硬而昂贵物体的高品位钢."
 law_enforcement:0 "系统种族主义"
 law_enforcement_desc:1 "系统性种族主义是一种基于种族或族裔群体的体制性歧视形式,可包括整个社会或组织中存在的政策和做法,这些政策和做法导致和支持某些人继续获得不公平的好处并不公平或有害地对待其他人。"
 defense_in_depth:0 "AI - Driven 目标设定"
 defense_in_depth_desc:0 "通过制造多条防线,可以分散出并减慢敌人的速度,有时甚至会被包围."
 democracy:0 "东部集团的倒塌"
 democracy_desc:0 "1980年代末至1990年代初,一系列事件导致东欧共产主义倒闭."
 distillation:0 "应用程序"
 distillation_desc:0 "工具包括使用烤箱、再生炉、微波炉、搅拌器、水壶等食品生产中使用的家用物品。"
 divine_revelation:0 "神通启示录"
 divine_revelation_desc:0 "一切法之所由出自于我等圣经. 只有通过服从高权重,我们社会才能正确秩序,稳定才能得到保障."
 watertube_boiler:0 "机器人学"
 watertube_boiler_desc:0 "机器人被引入组装线,特别是在汽车工业,以提高精度、速度和安全性。"
 dreadnought_desc:0 "无人机航空母舰与今天的航空母舰类似,运载了无人机群并对我们的敌人发动毁灭性的攻击."
 dreadnought_tech:0 "无人驾驶载体"
 dynamite:0 "深海采矿"
 dynamite_desc:0 "2000年代,随着公司开始探索从洋底取出有价值矿物(如多金属结核,稀土金属等),深海采矿技术的发展取得了显著进展."
 egalitarianism:0 "反恐战争"
 egalitarianism_desc:0 "反恐战争(英語:War of terrorism (GWOT),"x id=0")是美国在2001年九一一袭击事件后发起的全球军事行动."
 electric_arc_process:0 "纽拉林克"
 electric_arc_process_desc:0 "Neuralink和Synchron等公司正在开发大脑-计算机接口,允许大脑与数字设备直接通信. 这些界面可以使治疗发生革命性的变化,包括帮助瘫痪者恢复运动,增强认知能力,以及提供与技术互动的新方法."
 electric_railway:0 "大众公共交通"
 electric_railway_desc:0 "由于汽车不可持续,城市之间的公共交通可以进行大规模运营"
 electrical_generation:0 "量子计算"
 electrical_generation_desc:0 "预计量子计算机将被用于目前传统计算机难以解决的复杂问题,包括:药物发现,材料科学模拟,高级密码学,天气预报,金融模型,人工智能开发等,以及物流和能源生产等领域的优化问题,主要通过利用它们处理大量数据的能力,通过量子叠加和缠绕同时解决许多变量的问题."
 elevator:0 "升华点"
 elevator_desc:0 "交通波德,与电梯相类似,可以高速行走."
 empiricism:0 "万维网"
 empiricism_desc:0 "万维网(WWW或简称Web)是一个信息系统,它通过方便用户的方式,通过互联网分享内容,吸引信息技术专家和爱好者以外的用户。"
 enlightenment_thought:0 "启蒙思想"
 enlightenment_thought_desc:0 "在理性时代,老教条开始被质疑. 不再有人接受"上帝的意愿",当权者开始不得不为自己在社会中的地位辩护. 即使是绝对君主也看到了这些新思想的威望,"启蒙派"改革了欧洲的教育,法律和经济制度. 然而,这些改革还远远不够,约翰·洛克,伏尔泰,让-雅克斯·卢梭和托马斯·培恩等思想家领导了对这个机构的攻击,最终导致美国和法国的革命,这些革命本身启发了世界各地的自由主义者."
 fascism:0 "法西斯主义"
 fascism_desc:0 "法西斯主义是一种政府严格控制社会各方面的政治制度."
 field_works:0 "埃塞克障碍"
 field_works_desc:0 "与沙袋相比,HESCO障碍物可以更快地被竖起,并提供更多的保护."
 film:0 "直接宣传"
 film_desc:0 "利用大脑植入,可以直接插入到我们的人群中"
 flash_freezing:0 "便携式冻结-干燥器"
 flash_freezing_desc:0 "民用便携式冷冻干燥机"
 floating_harbor:0 "人工岛屿"
 floating_harbor_desc:0 "人工岛屿是人造地块,通常为军事手段所创造"
 food_sterilisation:0 "食品消毒"
 food_sterilisation_desc:0 "商人通过尝试和错误发现了保存食物的方法,如将牛奶在消毒过程中加热或将乳汁凝结为厚糖浆,取出水果和蔬菜,并取出肉汤等. 所有这些技术的共同线索就是从保存的食物中去除细菌,这个概念直到显微镜下发现细菌才被完全理解. 随着对这些思想的广泛理解,食品工业的标准正在提高,随之而来的是公众的健康."
 four_field_crop_rotation:0 "四地作物旋转"
 four_field_crop_rotation_desc:0 "由地主Charles 'Turnip' Townsend 的名声阐释,使用氮固剂,如土豆或丁香等,可以使农田持续使用,而无需耗尽或被留下倒叶."
 fractional_distillation:0 "转基因生物"
 fractional_distillation_desc:0 "转基因生物(GMOs)是改变植物和动物生长方式并用于粮食生产的人工方法。"
 fruit_jars:0 "果酱"
 fruit_jars_desc:0 "在金属罐子内保存肉和汤的想法得到欢迎。 其他种类的食品保存也正在被广泛推广,例如将水果和蔬菜保存在腌取液中或将其沸成果酱."
 fulminates:0 "失败"
 fulminates_desc:0 "起爆材料在被猛烈击中时会起爆。 这些材料包括汞离子、银和钾等。 它们由爱德华·查尔斯·霍华德于1800年首次发现,它们的军事应用在打击帽系统中很快变得明显."
 functionalism:0 "职能主义"
 functionalism_desc:0 "将社会视为社会功能所定义的组成部分体系的理论框架. 它以机械和生物系统作为比喻,认为社会的结构及其相互依存性决定了社会的稳定。"
 gantry_cranes:0 "重型起重机"
 gantry_cranes_desc:0 "重起重机在建筑和交通方面很有用,能跨出一艘船的宽度。 这使得它们具有坚韧性,这意味着它们可以抬起一艘船可能承载的最重载."
 general_staff:0 "无人机"
 general_staff_desc:0 "无人驾驶飞机,可用于军事和民用两种用途"
 germ_theory:0 "格姆理论"
 germ_theory_desc:0 "Thucydides是第一个指出疾病可能从人向人扩散的人,自古以来,我们认为,麻疹是霍乱等疾病的根源。 然而,科学认为微生物,即细菌,是造成疾病的原因。"
 gunpowder:0 "火药"
 gunpowder_desc:0 "由硫磺,木炭和硝酸盐组成的化学化合物,火药火药火药迅速发作,膨胀成能把射弹推倒管子的气体. 燃烧后留下了硫磺和木炭的大量烟雾,这使得贻贝成为战场上肮脏而盲目的活计. 火药收费在为开采和建筑而开挖地块时也有较多的民用. 中国人早在一千年前就发明了火药,并用它来进行庆功焰火和围城炮."
 gunsmithing:0 "突击步枪"
 gunsmithing_desc:0 "突击步枪结合了一发SMG的火力,一发步枪的精度,创造了强大的小武器平台."
 gymnastics:0 "体操"
 gymnastics_desc:0 "对于斯巴达人的体操运动,是你们新兵训练的一部分,自1570年代起,这个词本身就一直被用在运动操上. 现在,虽然我们意识到斯巴达人 正在做一些事情, 纪律思想 我们必须纪律的身体。 教育先驱们为男孩们在各种仪器上进行了一系列练习,帮助他们发展自律。 一些激进分子甚至建议将这些练习扩大到女孩。"
 gyroscopes:0 "陀螺仪"
 gyroscopes_desc:0 "陀螺仪是通过组合一系列的 gi来制取的,这些 gi只是旋转的支撑. 一个基姆巴尔自旋垂直而另一个水平自旋,因此最内受支持的对象可以任意方向自由自旋. 陀螺仪有助于在物体周围移动时使其保持平稳,如在抛掷船上有磁性罗盘."
 handcranked_machine_gun:0 "反德龙系统"
 handcranked_machine_gun_desc:0 "用于击落廉价无人机的防御系统."
 hydraulic_cranes:0 "直升机运载机"
 hydraulic_cranes_desc:0 "允许直升机运输车为部队提供后勤支持"
 hydraulic_power:0 "水力发电"
 hydraulic_power_desc:0 "水轮被长期用于碾磨谷物. 使它们适应其他工业用途,例如动力机,是合乎逻辑的前进一步."
 hypodermic_syringes:0 "假体活塞"
 hypodermic_syringes_desc:0 "接种最初是给病人的,方法是打开外皮并给伤口中被打磨出病的材料. 使用空心针头向病人注入液体的想法显然比较卫生,它也有让医生进行精确的体积管理的好处. 早期的注射器由银制成,但随着制造工艺的更精细化,玻璃也逐渐被流行,可以更窄地做出针."
 idealism:0 "理想主义"
 idealism_desc:0 "一些哲学家认为,我们的知识取决于我们如何看待事物,这限制了我们了解事物的理念,而不是事物的本质。"
 identification_documents:0 "数字识别"
 identification_documents_desc:0 "数字身份是个人的电子代表,使他们能够获得在线服务,购买,并与他人互动."
 impressionism:0 "印象主义"
 impressionism_desc:0 "一种艺术风格侧重于技术重新创造一个场景的一般视觉感觉. 在视觉之外的艺术形式中,也应用了同样的艺术雄心,重新创造对一种情况的感觉和经验。"
 improved_fertilizer:0 "微封装"
 improved_fertilizer_desc:0 "微封装包括将维生素、口味和活生素等活性成分装入防护涂层。 这一技术被广泛用于实用食品,以改善营养品的提供、储存寿命和敏感成分的稳定性,为食品生产提供了新的可能性,包括强化食品和饮料。"
 international_trade:0 "新自由主义"
 international_trade_desc:0 "新自由主义不同于自由主义,因为它不提倡自由放任的经济政策,而是具有高度的建构主义,主张建立一个强大的国家,在社会的各个方面进行类似于市场的改革."
 ironclad_tech:0 "21世纪战列舰"
 ironclad_tech_desc:0 "21世纪战列舰能承受巨大的导弹轰炸."
 jeune_ecole:0 "沿岸战舰"
 jeune_ecole_desc:0 "自主船舶是海上基本上为无人驾驶飞机的船只. 此外,由于拥有许多更小的船舶,而不是几艘更大的船舶,因此有可能保持一定的可操纵性,否则是不可能的。"
 labor_movement:0 "智能手机"
 labor_movement_desc:0 "智能手机(英語:smart phone),常被简称为"简单的手机",是将传统手机的功能与高级计算能力相结合的移动设备."
 land_reform:0 "土地改革"
 land_reform_desc:0 "土地所有权和社会是相辅相成的。 土地是任何国家的主要来源、财富和地位,因此谁拥有土地,谁拥有财富和地位。 如果我们希望建立我们希望的社会,我们必须准备从根本上改变谁拥有土地。"
 lathe:0 "生产线"
 lathe_desc:0 "生产线是工人的集合,每个都有分配的任务,可以精简生产."
 lathes:0 "带子"
 lathes_desc:0 "平板是用来旋转工具所用材料的工具,而不是一个自来自来自来自来自去的材料。 这以对称的方式把材料压下. 这在许多行业都有应用,从手工蜡烛手到无聊的炮口. 早期由手,马,或由水轮提供动力,视行业范围而定."
 laws_of_physics:0 "物理法则"
 laws_of_physics_desc:0 "通过使用望远镜,可以很容易地观测到管理流动机构的基本法。 艾萨克·牛顿爵士是该领域的先驱,得益于他拥有更高质量的反射望远镜技术,以及约翰内斯·开普勒(Johannes Kepler)将他的观测严格应用于现有的科学预测."
 crystal_glass:0 "微处理器"
 crystal_glass_desc:0 "微处理器是现代计算的核心,允许计算机变小,变快,更能负担得起. 它导致了个人计算机的发展和技术的迅速发展."
 automatic_machine_guns:0 "自动涡轮"
 automatic_machine_guns_desc:0 "能够自动锁定敌人目标的先进固定炮塔."
 malaria_prevention:0 "STEM 单元格"
 malaria_prevention_desc:0 "由于太空的极端条件,宇航员尤其容易受到感染,因为宇宙辐射,微重力,心理压力往往会损害人类免疫系统."
 manufacturies:0 "制造业"
 manufacturies_desc:0 "盾控制着企业可以使用的方法和雇用做法,限制了加入劳动力队伍,要求只有高技能的、经认证(自然是盾)的工匠才能完成某些任务。 越来越多的实业家离开城市,建立了新的创新场所,没有苛刻的标准和盾牌大师的高工资."
 mass_communication:0 "手机"
 mass_communication_desc:0 "大众传播就是利用手机等技术轻易地传播信息。"
 mass_propaganda:0 "自动教育"
 mass_propaganda_desc:0 "通过芯片植入,世界上所有的信息都可以直接传递给我们各国的儿童。"
 mass_surveillance:0 "大众直接民主"
 mass_surveillance_desc:0 "允许每个公民在任何时间投票,通过脑植入微芯片。"
 mechanized_farming:0 "行星间基团"
 mechanized_farming_desc:0 "以其他行星为基地"
 mechanized_workshops:0 "智能技术"
 mechanized_workshops_desc:0 "智能技术是传统上不由计算机控制,但现在已经是了."
 military:0 "军事"
 military_aviation:0 "轨道攻击"
 military_aviation_desc:0 "轨道打击是一颗卫星,旨在向地球上的某个目标发射一发高能射弹."
 mobile_armor:0 "金属"
 mobile_armor_desc:0 "多火力-Platform (MFP) 是一款重活车,类似于坦克,配备了消灭自主敌人的最新技术."
 modern_nursing:0 "隐形飞机"
 modern_nursing_desc:0 "隐形飞机是设计为雷达信号较低的飞机."
 modern_sewerage:0 "密码货币"
 modern_sewerage_desc:0 "加密货币、加密货币或加密货币是一种数字货币,目的是通过计算机网络运作,而计算机网络不依赖任何中央当局,例如政府或银行来维护或维护这种货币。"
 currency_standards:0 "在线商务"
 currency_standards_desc:0 "网上购物是电子商务的一种形式,消费者可以通过网络浏览器或移动应用程序通过互联网直接从销售商处购买商品或服务."
 monitor_tech:0 "AI 船只"
 monitor_tech_desc:0 "船舶完全由人工智能控制."
 musical_instruments:0 "乐器"
 musical_instruments_desc:0 "音乐是任何文化和艺术发展的关键部分. 在这方面,一种文化创造的乐器的演变首先对今后所有文化发展产生回响性的影响。"
 napoleonic_warfare:0 "代理战争"
 napoleonic_warfare_desc:0 "代理冲突是指两个对立势力为了影响力而展开的战争,通过使两个弱势力互相对抗来进行."
 nationalism:0 "恐怖主义"
 nationalism_desc:0 "我是谁? 这是一个关键的问题,它贯穿于一个人的身份的心脏。 过去人们曾说过他们来自一个省、一个城镇甚至一个家庭,以表达这种身份。 已经形成了一种超越这些概念的新思想,而是将身份视为民族之间共有的东西。 此外,国家应该统一为一个国家。"
 natural_selection:0 "自然选择"
 natural_selection_desc:0 "自然选择是通过将可遗传的特质传给后世来演化出生命形态的一种机制. 它的发现为物种的产生和适应环境提供了解释."
 naval_theory:0 "海军理论"
 naval_theory_desc:0 "通过对海军运动采取某种战略,可以使海军更加有效。"
 drydocks:0 "现代造船厂"
 drydocks_desc:0 "建立封闭区,使船舶能够停靠在干地上,使货船和军舰都更容易和更彻底地维修。"
 navigation:0 "现代造船业"
 navigation_desc:0 "通过各种不同的方法,从恒星,地图,到指南针,可以正确绘制出一幅横跨世界的航道."
 neoclassicism:0 "新经典主义"
 neoclassicism_desc:0 "古典艺术,戏剧和音乐的时期从1750年左右到1820年,此后的创新被贴上"新古典主义"的标签. 该名也指古典古代,并因此将西方高文化与罗马和希腊相提并论,从而将欧洲统治阶级的行人确立为已知世界的主人公."
 nitrogen_fixation:0 "小行星采矿公司"
 nitrogen_fixation_desc:0 "小行星开采是收集太空中小行星的资源"
 nitroglycerin:0 "现代管道"
 nitroglycerin_desc:0 "现代管线可以将煤炭,石油,LNG(液化天然气)等液体运输到相去甚远的地方."
 open_hearth_furnace:0 "打开地狱之火"
 open_hearth_furnace_desc:0 "钢的生产涉及从生铁中去除杂质,再加入到其他材料中来创造出你所追求的钢的分级. 生产钢需要非常高的温度,露天的耳炉会用出炉的废气来取出砖块取暖并扭转燃料和空气流过这些砖块来积蓄出炉子的热量. 该工艺比其他工艺要慢,但更容易控制和规模化,允许一批一批地出产大量钢材."
 open_hearth_process:0 "早期 三维打印"
 open_hearth_process_desc:0 "在3D印刷始于1980年代的同时,2000年代出现了其被扩展为全面生产. 该技术允许对材料进行分层建造,在航空航天、汽车和医疗器械等行业获得了势头。"
 opium_dens:0 "鸦片地"
 opium_dens_desc:0 "鸦片之地只是一个可以购买并吸烟的地方。 然而,有些人担心这些巢穴是更邪恶的弯曲,是道德腐败的根源。"
 paddle_steamer:0 "弹道"
 paddle_steamer_desc:0 "导弹随时知道在哪里 它之所以知道这一点,是因为它知道它在哪里,通过减去它在哪里,它在哪里,它在哪里,它在哪里,它在哪里,它在哪里,谁更大,它得到了区别,或者偏差。"
 pan-nationalism:0 "Pan-nationalism"
 pan-nationalism_desc:0 "Through organizations like the EU, de-facto super-states can be formed through trade & economic relations."
 percussion_cap:0 "重型突击步枪"
 percussion_cap_desc:0 "SCAR-L等重型步枪为特种行动提供了充足的火力."
 percussion_caps:0 "冲击盖"
 percussion_caps_desc:0 "打击帽取出以前不可靠的火器,使其有可能在任何天气下开火."
 personal_liberty:0 "个人自由"
 personal_liberty_desc:0 "除了社会应该如何治理的问题之外,还有什么应该超越治理的问题. 建立多数人的暴政不得侵犯的个人自由是自由主义理想的一个关键部分。"
 social_media:0 "社会媒体"
 social_media_desc:0 "社交媒体是一个技术集,用户可以通过虚拟社区和网络分享信息,想法和内容."
 policing_by_consent:0 "通过同意维持治安"
 policing_by_consent_desc:0 "罗伯特·皮尔爵士在担任内政大臣时,创立了"大都市区警察"(Metropolitan Police),一个不同于大陆暴君宪兵队的警察,因为他们是为公共利益行事的平民,而不是镇压政治敌人的士兵."
 political_agitation:0 "数字革命"
 political_agitation_desc:0 "现在,互联网积极性具有推动重大革命和历史事件的力量。"
 political_theory:0 "政治理论"
 political_theory_desc:0 "如何管理一个国家是许多人开始提出的问题,"
 popular_sovereignty:0 "人民主权"
 popular_sovereignty_desc:0 "国家的权威及其政府的延伸只能通过人民的同意才能建立和维持。 在自由政府中,统治者是仆人和人民,他们的上司和君主."
 portland_cement:0 "波特兰水泥"
 portland_cement_desc:0 "以与从英国多塞特的一个岛屿上取出石块的相似性而取名, 这种水泥是混凝土中的一个有效成分, 用于建造大型建筑。 它由石灰岩和其他常见材料所出产,使其非常便宜."
 potash:0 "波塔什语Name"
 potash_desc:0 "由活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活 其名称取自元素钾,而元素钾是这些过程中活性成分."
 power_looms:0 "电源"
 power_looms_desc:0 "织布机是一种织出羊毛,棉花等纤维的装置. 早期隐形人用手或脚力来旋转线. 1733年发明的"飞行穿梭"被归功于刺激了工业革命,在编织中使用了机械动力使得技术不高的编织者可以大量出产布料. 其他的革新包括Jacquard loom,这是1804年开发的一种可编程的出击卡系统,用于将图案自动化."
 power_of_the_purse:0 "电源投影"
 power_of_the_purse_desc:0 "电力投射利用船只通过纯粹的恐吓向其他国家发动武力."
 pre_modern_warfare:0 "现代战争前"
 pre_modern_warfare_desc:0 "与现代战争的破坏相比,过去的冲突是苍白的,但它们本身仍然是血腥的事务。"
 production:0 "生产"
 propaganda:0 "宣传"
 propaganda_desc:0 "在革命和拿破仑战争期间,欧洲各国政府建立了宣传翼,以争取公众对普通人民所面临困难的支持。 在城市里散发了政治小册子和讽刺漫画,而爱国诗歌则被唱出流行曲子。"
 puddling_furnaces:0 "毛绒毛"
 puddling_furnaces_desc:0 "推土炉用来从生铁中出产成铁。 砖炉被加热后使铁与伴生的活煤渣一起融化,后用铁棍等机械活化,使铁中过量的碳与空气相接,形成一氧化碳,而硫等杂质由升入地表的更轻的炉渣承接. 经过两个小时的人工工作, “坑球”形成铁质, 这是一项困难、熟练和昂贵的工作。"
 quinine:0 "mRNA 疫苗"
 quinine_desc:0 "mRNA疫苗是一类使用称为信使RNA(mRNA)的分子副本来产生免疫反应的疫苗."
 radio:0 "行星际通信"
 radio_desc:0 "通过使用隐形"波",可以比收音机更快地传递信息."
 railways:0 "高架铁路"
 railways_desc:0 "最近的技术允许货物和人员的超快运输"
 rationalism:0 "文化大革命"
 rationalism_desc:0 "1960年代的文化革命促使全世界社会态度的改变。"
 realism:0 "数码相机"
 realism_desc:0 "数码相机(英語:digicam)也叫"数码相机"(digicam),是拍摄数码内存中相片的相机."
 reinforced_concrete:0 "银行"
 reinforced_concrete_desc:0 "建筑信息建模(BIM)在2000年代被广泛采用,是一栋建筑物理和功能特征的数字化体现. 这种三维建模技术可以提高规划、设计和施工的效率。"
 repeaters:0 "激光"
 repeaters_desc:0 "激光可以将能量集中到某些方向,用于作战"
 rifling:0 "轻型战斗步枪"
 rifling_desc:0 "最新的轻量级战斗步枪使我国能够为我们的士兵配备尽可能高效的火力."
 romanticism:0 "录像带录音机"
 romanticism_desc:0 "Videocasette Recorder(VCR)或Victory Recorder(VCR)是一种从广播电视或其他AV来源录制模拟音频和模拟视频的机电设备,在倒放后可以回放录音."
 rotary_valve_engine:0 "人工智能"
 rotary_valve_engine_desc:0 "利用人工智能生产商品"
 rubber_recycling:0 "橡胶回收"
 rubber_recycling_desc:0 "使用"塑胶器"来咀嚼和改造旧橡胶,使我们能够再利用和再利用这种有价值的材料."
 rubberised_fabrics:0 "橡胶制品"
 rubberised_fabrics_desc:0 "使用天然橡胶将两块织物粘在一起,或将植物纤维结合成一类人造皮革,可出产防水物品如麦金托什外衣,或悬浮剂等弹性服装."
 rule_of_law:0 "法治"
 rule_of_law_desc:0 "法治通常存在于有成文(如美国)或无文(如英国)宪法的政府体系中,法治由一系列有关判例的相关思想组成,如国家暴力是可预测的,因此是可以避免的,让政府明确规定什么是非法的,对犯罪的惩罚是什么;国家代理人本身必须遵守他们执行的法律."
 screw_frigate:0 "由导导弹摧毁器"
 screw_frigate_desc:0 "制导导弹驱逐舰使用导弹攻击目标 在他们不知道舰队存在之前"
 sea_lane_strategies:0 "未来的海军战略"
 sea_lane_strategies_desc:0 "未来的海军战略很可能围绕AI展开."
 semaphore_signalling:0 "司马发信号"
 semaphore_signalling_desc:0 "铁路信号向在铁路线上活跃的列车传递指示,即使有机车在动并远离车站人员,也会帮助直通交通. 在拿破仑军队使用的军事信号系统所启发下使用司马发信号,形成了一种所有铁路都能使用的统一的系统."
 separation_of_powers:0 "权力分离"
 separation_of_powers_desc:0 "自“大美国实验”相对成功以来, 拥有不同作用、互相监督以防止腐败和滥用的政府不同部门的想法已变得广为人知,"
 sericulture:0 "养生业"
 sericulture_desc:0 "古代和严密戒备的为出产丝绸而种植丝虫的技术."
 sewage_systems:0 "污水系统"
 sewage_systems_desc:0 "城市的成长导致河流被污水淹没,变黑而有死亡的味道. 是时候回首那些建造下水道系统的古代人 从城市里运出这些肮脏的水了"
 shaft_mining:0 "采矿机械"
 shaft_mining_desc:0 "通过部署重型机械,我们可以在全球市场上竞争自然资源生产。"
 shell_gun:0 "活性装甲"
 shell_gun_desc:0 "主战坦克(MBT)也称战坦克或通用坦克或简单的坦克,是在许多现代军队中充斥有装甲保护的直接射击和操控作用的坦克."
 slag_fertilisers:0 "渣肥料"
 slag_fertilisers_desc:0 "爆破炉和钢材转换器产生的废物的pH值低,使它为耕作目的对土壤作了出色的添加。 硅酸盐石灰渣比天然石灰岩或多洛米特更易溶解,使土壤中磷酸含量增加."
 socialism:0 "右翼民粹主义"
 socialism_desc:0 "右派民粹主义又称"民族民粹"和"右派",是将右派政治与民粹主义言论和主题相结合的政治意识形态."
 society:0 "社会"
 enclosure:0 "高效耕作"
 enclosure_desc:0 "在政府监管制度的帮助下,通过大规模耕作,我们可以增加产出,足以在世界市场上竞争。"
 intensive_agriculture:0 "农药"
 intensive_agriculture_desc:0 "用于食品生产消除昆虫和细菌的化学品。"
 steam_donkey:0 "可持续制造业"
 steam_donkey_desc:0 "随着人们日益认识到环境影响,制造商开始采用更可持续的生产方法。"
 threshing_machine:0 "商业空间飞行"
 threshing_machine_desc:0 "提高太阳管、核电站和风车的效率"
 steel_frame_buildings:0 "全息图"
 steel_frame_buildings_desc:0 "浩劫法是一种技术,可以使一波前作被记录后再被重建. 它最被称作生成三维图像的方法,并具有广泛的其他用途,包括数据存储,显微镜,干涉测量等. 原则上,可以制作任何类型波的全息图."
 steel_railway_cars:0 "电动汽车"
 steel_railway_cars_desc:0 "2000年代加快了自主车辆研发. 美国国防部组织的DARPA大挑战(2004年和2005年)是一个重要的里程碑,展示了早期自驾汽车的尝试."
 stormtroopers:0 "专家"
 stormtroopers_desc:0 "配备专门用来摧毁AI和俘虏部队的人类部队。"
 streamliners:0 "流线"
 streamliners_desc:0 "新的列车设计利用了现代的牵引动力和新的铝体构造,使铁路能够可靠地以更高的速度运行更多的列车."
 submarine:0 "未来的潜艇"
 submarine_desc:0 "未来的潜艇是由未来技术驱动的,这些技术允许进行毁灭性的打击."
 multilateral_alliances:1 "密码"
 multilateral_alliances_desc:0 "ryonics是一种通过在非常低的温度下将合法死亡的人冻结来保存个人的做法,希望未来的医疗技术能够使他们复活并治愈导致他们死亡的状况."
 synthetic_dye:0 "合成 Dye"
 synthetic_dye_desc:0 "这包含了一种以合成方式产生出不同类型染料的化学过程. 它使织物的花色发生了革命性的变化并结束了农业染料的生产,这些染料变得过于昂贵而无法出产."
 system_gin:0 "汽车"
 system_gin_desc:0 "汽车可以在整个土地上快速运送人员和货物。"
 telegraph:0 "电报"
 telegraph_desc:0 "电能几乎可以立刻通过下行信号,例如用摩尔斯电码. 延迟的主要来源是人类操作者,他们需要受过良好训练,能够编码和解码以短而长的"dots"和"dashes"噪声形式传输的信息."
 telephone:0 "聪明的城市"
 telephone_desc:0 "将IOT设备纳入城市基础设施,使城市能够实时监测和管理水、电、交通和废物等资源,提高效率和可持续性。"
 telephones:0 "电话"
 telephones_desc:0 "在理论上,我们知道 讲解电报的想法是可能的, 但我们只是不确定如何。 电子学领域的进步使得这个想法最终成为可能,电话也诞生了."
 tin_cans:0 "锡罐"
 tin_cans_desc:0 "罐装食品的概念可以追溯到法国大革命军队使用的玻璃罐. 不久,这个想法被推广到民用. 金属内部已经煮熟的肉或汤可以防止与外界接触,也可以由中产阶级家庭休闲消费. 该名称出自锡板,锡板在铁或钢板外有薄层锡来保护金属在露天生锈."
 trench_works:0 "侦察坦克"
 trench_works_desc:0 "用来发送冲击波和干扰敌军的装置"
 triage:0 "VTOL 飞机"
 triage_desc:0 "垂直起降飞机(VTOL)是一类无需跑道即可垂直起降的飞机."
 urban_planning:0 "菲亚特货币"
 urban_planning_desc:0 "菲亚特货币是没有黄金支持的货币供给."
 urbanization:0 "国际组织"
 urbanization_desc:0 "联合国等国际组织旨在维护和平并在全世界促进经济增长。"
 vaccination:0 "接种疫苗"
 vaccination_desc:0 "人们已经知道几个世纪以来,对人们进行希望不那么有害的疾病形式的接种,但也非常危险。 接种疫苗要么是使用危险性较小但与此有关的疾病,要么是治疗疾病的毒剂,使他们丧失感染的能力,这更加安全可靠。"
 vacuum_canning:0 "精益制造业"
 vacuum_canning_desc:0 "精益制造是20世纪90年代出现的一个概念,其重点是减少浪费和提高生产系统的效率. 它强调通过取消非增值活动、提高质量和提高客户满意度来不断改进流程。"
 vulcanization:0 "自动无人机"
 vulcanization_desc:0 "交付无人机已经超越了实验阶段,亚马逊和翼等公司测试了商业无人机交付系统,能够快速高效地在城乡地区移动包裹."
 wargaming:0 "战斗模拟"
 wargaming_desc:0 "通过嘲笑假想的战争情景和练习策略,可以提高军官的战斗能力."
 water_treatment:0 "水处理"
 water_treatment_desc:0 "人们发现水将疾病带入我们的家园。 科学还是有答案的, 我们可以简单地通过过滤和化学处理 使水再次清洁。"
 wood_pulp_papermaking:0 "木浆造纸"
 # gold_standard_desc: "This meant a currency system based on gold. Money was rather expensive to produce by the government and this could sometimes result in a low of money stock. However, the good thing was that the gold prices were rather stable and the trust in gold was high, making the currency stable."
 # savings_banks_desc: "The middle-class is growing larger and wealthier thanks to education and a strong work ethic. Many individuals wish to be part of railways through Africa; dams across the Nile; fleets of ocean Greyhounds; majestic, self-amortizing canals; plantations of ripening tea; all from tuppence prudently, fruitfully, frugally invested (to be specific) in the Dawes-Tomes-Mousely-Grubbs Fidelity Fiduciary Bank."
 # silver_standard_desc: "This meant a currency system based on silver. Money was cheaper to produce by the government which meant that there was rarely any lack of money in the country. However, the problem was that the silver prices had a tendency to be dominated by gold prices, which meant that foreign trade was often suffering."
