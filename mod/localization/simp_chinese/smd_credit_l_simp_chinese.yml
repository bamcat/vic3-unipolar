l_simp_chinese:

 # ==========================================
 # THE DOLLAR 
 # ==========================================

 je_the_dollar:0 "美元数"
 je_the_dollar_reason:0 "美元是世界储备货币. [ROOT.GetCountry.GetName] 出口的信贷比任何其他国家都多—— 在这样做时, 拥有非凡的财政实力。 \n\n 当其他国家的金融区需要信贷来维持其业务时,它们指望银行提供信贷。 只要美元流通,这些国家的资本家就能够建立,投资,获利. 如果[ROOT.GetCountry.GetName]选择通过制裁、禁运或蓄意收缩来限制这种流动,则对外国金融市场的后果将是立即而严重的。\n\n@information! 出口信贷不仅仅是贸易。 正是对依赖 " x id=8/ " 金融基础设施的国家行使货币主权。 它们的金融区需要信贷。 如果信贷价格高于证券价格,其投资者开始亏损. 如果信贷完全停止流动,它们的银行就必须奔走,在国内生产足够的产品——这一过程可能不需要时间。"

 je_dollar_status_hegemonic_tt:0 "#bold (中文(简体) ). 美元为霸权. #! [ROOT.GetCountry.GetName] 出口量大于 #v 20,000 #! 信用单位. 外国金融市场与 [ROOT.GetCountry.GetAdjective]银行基础设施深度融合。 这提供了巨大的杠杆作用。"
 je_dollar_status_stronger_tt:0 "#bold (中文(简体) ). 美元很强. #! [ROOT.GetCountry.GetName]出口量大于 #v 10,000 #! 信用单位. 外国金融市场与 [ROOT.GetCountry.GetAdjective]银行基础设施深度融合。 这提供了巨大的杠杆作用。"
 je_dollar_status_strong_tt:0 "#bold (中文(简体) ). 美元具有影响力. #! [ROOT.GetCountry.GetName] 出口量超过 #v 5000 #!信用单位. 外国金融市场与 [ROOT.GetCountry.GetAdjective]银行基础设施深度融合。 这提供了巨大的杠杆作用。"
 je_dollar_status_moderate_tt:0 "#bold (中文(简体) ). 美元已经确定。 #! [ROOT.GetCountry.GetName]出口量超过 #v 2 500 #!信用单位。 外国对[ROOT.GetCountry.GetAdjective]信用的依赖是真实的并不断增长的."
 je_dollar_status_marginal_tt:0 "#bold (中文(简体) ). 美元正在出现。 #! [ROOT.GetCountry.GetName]正在在国际上出口信贷。 美元作为储备货币的作用尚处于初期阶段——但基础正在奠定."

 # ==========================================
 # THE RESERVE CURRENCY
 # ==========================================

 je_reserve_currency:0 "储备货币"
 je_reserve_currency_reason:0 "[ROOT.GetCountry.GetName] 出口国际信贷——使[ROOT.GetCountry.GetAdjective] 银行部门成为全球金融系统中的重要角色. \n\n 当其他国家的金融区需要信贷以维持其业务时,它们从[ROOT.GetCountry.GetAdjective]银行取出。 这创造了一种结构性杠杆:从[ROOT.GetCountry.GetName] 进口信贷的国家在某种程度上要依靠该信贷的持续流动来维持其金融部门的健康。 进口国的金融区需要信贷才能有效运作。 当信用价格高于证券价格时,其投资者会因建设和发展而损失资金. 通过制裁或禁运,信贷突然收缩,将迫使这些国家在国内生产信贷,这是一个更缓慢和更昂贵的过程。"

 je_reserve_status_strong_tt:0 "#bold [ROOT.GetCountry.GetAdjective] 信用被广泛交易. #! 出口超过 #v 5000 #! 单位. 外国金融市场在很大程度上依赖 " x id=5 " 银行供应。"
 je_reserve_status_moderate_tt:0 "#bold [ROOT.GetCountry.GetAdjective]信用国际活跃. #! 出口超过 #v 2500 #!单位. 外国金融活动的一个重要部分取决于[ROOT.GetCountry.GetAdjective]的供应。"
 je_reserve_status_marginal_tt:0 "#bold [ROOT.GetCountry.GetAdjective] 信用进入国际市场. #! 出口超过 #v 1000 #! 单位. 这一角色虽然不大,但越来越大。"

 # ==========================================
 # THE FINANCIAL SYSTEM — je_financial_system
 # ==========================================

 je_financial_system:0 "金融系统"
 je_financial_system_reason:0 "这个日记条目是完全可选的——你不需要与信用和证券系统接触来玩游戏. 它在此作为想要理解它的人的参考. \n\n#bold 系统如何工作#!\n\n商业银行生产#bold信用#!. 金融区购入信贷,并采用上市交易生产方法销售#bold证券#!. 证券在再投资到新建筑时给予投资者额外的利润——但只有在证券价格高于信贷价格时才有. 这意味着市场所寻求的自然平衡:\n\n•> 当#bold信贷相对于证券来说是便宜的#!时,金融区利润和投资者的建设更加活跃。 建设加快跨越经济. \n\n•. 当#bold证券相对于信贷而言是便宜的#!时,金融区将失去无法盈利转换的货币购买信贷。 银行发现他们的产品价值较低. 构造慢. \n\n@information! 因此,信用和证券之间的价格关系是需要注意的关键信号。 健康分布——信贷之上的证券——意味着你的金融部门正在按计划运作,你的资本家正在获得建筑投资收益。 \n\n@warning! 如果信贷高于证券,你的金融区的运作在它们处理的每一个单位都亏损了。 银行变得有利可图,但投资者减慢了活动,你的经济增长也变少了. \n\n#bold 中央银行#!\n\n 您可以使用 #bold 中央银行 #! 机构直接影响证券生产。 对中央银行的投资增加了你们市场上的证券供应——这驱使它们相对于信贷的价格下降。 这将#bold削弱你的商业银行#!,它们发现其信贷对生产来说利润较低,但通过保持信贷证券对资本家的有利分布,它会#bold扩大工业投资#!。<x id=36/X id=37/> 这是一种刻意取舍:中央银行投资有利于工业增长而牺牲银行盈利能力。 这种权衡是否值得取决于你的经济策略."

 je_financial_credit_expensive_tt:0 "#bold 信用交易高于其基准价格。 #! 商业银行利润丰厚. 金融区正在支付信贷溢价,这挤压了它们在证券生产方面的利润。 如果利差变得不利,投资者可能会减缓其建筑活动。"
 je_financial_securities_expensive_tt:0 "#bold 证券交易高于其基准价格。 #! 金融区是有利可图的,它们正在以健康的利润将信贷转换成证券。 投资者正在获得良好的建筑收益。 银行面临着微小的压力,因为其产品的价格低于其饲料。"
 je_financial_balanced_tt:0 "信贷和证券交易接近其基准价格。 金融系统处于平衡状态——银行利润微薄,投资者得到的收益不大。"

 ### Great Recession

 je_subprime_mortgage_crisis:0 "次级抵押危机"
 je_subprime_mortgage_crisis_reason:0 "[ROOT.GetCountry.GetAdjective] 金融机构正在大规模发行抵押贷款支持的证券,并将次级贷款捆绑成全球金融系统出售的证券。 证券被评为安全证券. 他们不安全。 当基本抵押贷款开始违约时,持有这些票据的每个机构都会同时发现其资产负债表是建立在毫无价值的纸上. \n\n@warning! 如果证券价格在危机成熟前没有明显纠正,则[ROOT.GetCountry.GetAdjective]银行系统会被冻结——与[ROOT.GetCountry.GetName]有实质关系的每一个经济体都会感受到这种冲击."

 je_great_recession:0 "大衰退"
 je_great_recession_reason:0 "美国金融系统已经崩溃. 全球各银行持有的抵押担保被披露为无价值证券。 信贷市场已经冻结。 银行不会互相出借,更不会向企业出借. 投资已经枯竭。 建设进度放慢. 衰退是全球性的. \n\n 市场会纠正的 总是如此 问题是,在损害发生之前,损害有多大。"

 # Status descriptions
 subprime_je_danger_tt:0 "证券价格并未充分下跌. [ROOT.GetCountry.GetAdjective] 抵押支持的证券仍然被高估——市场尚未在风险中定价. 这种状况持续的时间越长,最终纠正就越具有灾难性。"
 subprime_je_safe_tt:0 "#bold 证券比基准价下跌了35%以上。 #! 市场正在纠正。 如果这种情况持续下去,坠机事件可以避免——或至少被软化."

 great_recession_je_usa_tt:0 "[ROOT.GetCountry.GetAdjective] 银行系统陷入危机。 信贷紧缩使银行吞吐量急剧下降,使投资和建筑业受到冻结。 衰退将持续到市场纠正——大约十个月。"
 great_recession_je_global_tt:0 "[ROOT.GetCountry.GetName] 与 [SCOPE.sCountry('c:USA').GetName] 的实质性贸易联系已传递出金融冲击。 [ROOT.GetCountry.GetAdjective] 银行接触到 [SCOPE.sCountry('c:USA').GetAdjective] 金融工具。 信贷收紧,投资放缓,衰退已经到来."

 # ==========================================
 # MODIFIERS
 # ==========================================

 great_recession_credit_crunch:0 "信用盘"
 great_recession_credit_crunch_desc:0 "银行系统被查封了 银行拒绝向企业、彼此和任何人提供贷款。 信用已经蒸发了。 投资已经崩溃。 建设进度放慢. 除非恢复金融体系的信心,否则经济不会恢复。"
