 je_eu_membership_request_reason: "您的政府提交了加入欧盟的正式申请。\n\n 这一进程涉及漫长的谈判、政策改革以及符合欧盟法律和标准。 在未来几年里,将对贵国的经济稳定、治理、人权和遵守民主原则的情况进行评估。 进入欧盟单一市场\n- 与其他成员国的货物、服务、资本和人员的自由流动\n- 参与欧盟决策机构\n\n 然而,这一进程具有政治敏感性,可能在国内和在欧盟现有成员国遇到抵制。"
 eu_membership_process: "开始加入欧盟的进程"
 request_to_join_eu_decision: "加入欧盟的申请"
 request_to_join_eu_decision_desc: "正式申请加入欧洲联盟。"
 
 eu_events.0.t: "阿森松加入欧洲联盟"
 eu_events.0.d: "我们已被正式接纳加入欧洲联盟"
 
 # NATO
 
 allow_leave_nato: "让你在未来几个月内离开"
 left_nato: "离开北约"
 leave_nato: "离开北约"
 leave_nato_desc: "恢复我们加入北约,允许军方作为独立力量,不受美国影响."

 # imf

 je_imf_loan: "货币基金组织贷款方案"
 je_imf_loan_reason: "国际货币基金组织的贷款已延长至[ROOT.GetCountry.GetName]。 作为紧急融资的交换条件,国家接受了一些重大条件:高利率、强制性自由贸易和对承接基金的大国的义务。"

 imf_je_obligations_active_tt: "大国义务仍然有效。 外国债权人保持对关键经济政策决定的影响力。"
 imf_je_obligations_met_tt: "大国义务已经履行。 该国保留充分的经济主权——尽管贷款条件仍然有效。"

 decision_leave_imf: "离开货币基金组织"
 decision_leave_imf_desc: "退出国际货币基金组织. 如果该国面临破产,将不再有资格获得货币基金组织的贷款支助,但将不受债权人义务和干涉。 此决定不能被倒转 。 <x id=0/\\\ x id=1> 注:持有IMF现行贷款时不能离开."
 imf_cannot_leave_while_indebted_tt: "在有贷款时不能离开IMF"


 imf_button_pay_obligations_name: "支付债务"
 imf_button_pay_obligations_desc: "提前还清剩余的大国债务. 耗资500金并需要低于50%的债务,但立即恢复了完全的经济主权并改善了同所有大国的关系."
 imf_pay_obligations_cost_tt: "要求债务额低于50%和500金"
 imf_obligations_paid_tt: "债务提前偿还。 大权力关系改善."

 # imf_events.1 — Loan offer
 imf_events.1.t: "货币基金组织的干预"
 imf_events.1.d: "[ROOT.GetCountry.GetName] 的金库处于危机之中。 债务已达到使市场紧张和债权人谨慎的水平。 国际货币基金组织已注意到——并已派遣一个代表团提供紧急融资。 条件并不慷慨。 利率将定为惩罚性水平。 不论现行经济政策如何,该国都必须实行自由贸易。 而承接基金的大国会期望某些义务得到履行. 但是,替代办法——在没有安全网的情况下走向彻底破产——可能更糟。"
 imf_events.1.f: "主权和偿付能力很少同时存在。"
 imf_events.1.a: "接受贷款——我们需要资金。"
 imf_events.1.b: "拒绝——我们将管理自己的事务"

 # imf_events.2 — Great power notification
 imf_events.2.t: "货币基金组织贷款延期"
 imf_events.2.d: "[SCOPE.sCountry('imf_debtor_scope').GetName]已接受基金组织的一揽子贷款。 作为支持该基金的大国之一, " x id=1/ " 现在承担债务国的义务。 这一安排既涉及战略问题,也涉及经费问题。"
 imf_events.2.f: "债务是一种外交形式。"
 imf_events.2.a: "好,这让我们有影响力"
 imf_events.2.b: "不幸——强加的条件太苛刻了."

 # imf_events.3 — Loan complete
 imf_events.3.t: "货币基金组织方案完成"
 imf_events.3.d: "在接受货币基金组织贷款五年后, " x id=0 " 已履行其方案义务。 利息已经支付,条件已经维持,大国债权人也满意。 该国从恢复主权的经验中脱颖而出,人们所希望的是,其财政比其开始时更有秩序。"
 imf_events.3.f: "分类账是平衡的。 教训更难衡量。"
 imf_events.3.a: "我们通过它"

 # imf_events.4 — Leaving
 imf_events.4.t: "退出货币基金组织"
 imf_events.4.d: "[ROOT.GetCountry.GetName]正在退出国际货币基金组织。 该决定反映了一种信念,即成员资格的代价——危机期间的条件、义务、经济主权的丧失——超过获得紧急融资的好处。 诸大国不乐. 如果[ROOT.GetCountry.GetName]再接近破产,就不会有安全网。"
 imf_events.4.f: "独立是有代价的。 依赖性也是"
 imf_events.4.a: "我们孤立无援——我们应该"

 # imf_events.5 — Great power notification of leaving
 imf_events.5.t: "一个国家离开了货币基金组织"
 imf_events.5.d: "[SCOPE.sCountry('imf_leaver_scope').GetName]已退出国际货币基金组织。 这一决定是对国际金融秩序的斥责——并表明`x id=1' 无论好坏,都打算规划自己的经济道路。"
 imf_events.5.f: "少一个债务人。 少一个杠杆。"
 imf_events.5.a: "已注意到"

 # imf_events.10 — War bonds
 imf_events.10.t: "战争债券"
 imf_events.10.d: "随着国库紧张和战争不断,财政部提出了紧急措施:发行战争债券。 将邀请公民和投资者向国家出借资金,以换取未来用利息还款,并立即提供现金注入,以资助战争努力。 债券将起作用——但它们是债务,而债务在战时很快会化为乌有。 随着资金流入军事机器,供应消耗会增加。"
 imf_events.10.f: "一国借取取取其后来来保卫其现在."
 imf_events.10.a: "发行债券,我们现在需要钱"
 imf_events.10.b: "衰落——我们不会抵押我们的未来"

 imf_loan_modifier: "货币基金组织贷款条件"
 imf_loan_modifier_desc: "货币基金组织贷款到位。 利率高得要命,自由贸易是强制性的。 外国投资流入,但经济主权受到限制,合法性受到损害。"

 imf_great_power_obligations: "大国义务"
 imf_great_power_obligations_desc: "作为贷款条件,承接货币基金组织的大国从该国承担债务。 它们对经济政策的影响力是真实的。"

 imf_refused_loan_modifier: "货币基金组织贷款被拒绝"
 imf_refused_loan_modifier_desc: "该国拒绝了货币基金组织的援助,并将单独管理其债务。 信贷条件因此恶化。"

 imf_post_loan_stability: "方案后恢复"
 imf_post_loan_stability_desc: "货币基金组织的方案已经结束。 在履行其义务后,政府获得了一定程度的信誉——国家财政状况较好."

 imf_left_modifier: "基金组织外"
 imf_left_modifier_desc: "该国已退出货币基金组织。 它没有债权人义务,但与国际紧急融资隔绝。 投资流量减少。"

 war_bonds_modifier: "发行的战争债券"
 war_bonds_modifier_desc: "紧急战争债券已经发行,以资助战争努力. 收入增加,但债务增加,供应消费增加。"

 war_bonds_refused_modifier: "战争债券减少"
 war_bonds_refused_modifier_desc: "政府拒绝发行战争债券. 财政纪律得以维持,但军队感到紧张。"

 un_events.6.t: "我们的部队从联合国特派团返回"
 un_events.6.d: "[ROOT.GetCountry.GetAdjective]部队已完成在联合国维持和平特派团的服务,正在回国。 这一贡献在军事上是有限的,但在外交上是有意义的—— " x id=1/ " 。 将军归来."
 un_events.6.a: "欢迎回家"
 
 un_peacekeeping_contribution: "联合国维持和平贡献"
 un_peacekeeping_contribution_desc: "[ROOT.GetCountry.GetName] 向联合国维持和平特派团派遣部队。 国际社会已注意到这一点。"
 
  # ── EVENT 300: RESOLUTION PASSED ─────────────────────────────────
 
 un_events.300.t: "联合国决议获得通过"
 un_events.300.d: "大会已商定一项决议,以解决世界性问题并协调关于特定专题的全球合作。"
 un_events.300.f: "该决议具有国际共识的份量——就价值而言。"
 un_events.300.a: "已注意到"
 
 UN_RES_DESC_ENVIRONMENT: "#bold 关于环境保护的分辨率 #!\n 成员国承诺协调环境标准和可持续资源管理. \n\n#tooltip_separator!\n@green_checkmark! 所有国家都收到#bold联合国环境溶液#!修改剂,为期12个月。"
 UN_RES_DESC_PEACE: "#bold 关于世界和平的决议 #!\n 大会重申对和平解决争端和减少国家间冲突的承诺. \n\n#tooltip_separator!\n@green_checkmark! 所有国家都得到#bold联合国和平决议#!修改文本,为期12个月。"
 UN_RES_DESC_ECONOMY: "#bold 关于经济发展的解决方案 #!\n 成员国支持对发展中经济体的协调投资和降低贸易壁垒. \n\n#tooltip_separator!\n@green_checkmark! 所有国家都收到#bold联合国经济发展决议#!修改文本,为期12个月。"
 UN_RES_DESC_TECHNOLOGY: "#bold UNESCO Technology resolution #!<x id=2/ 大会为成员国之间的技术共享和合作科学研究建立了框架. \n\n#tooltip_separator!\n@green_checkmark! 所有国家都得到#bold联合国技术分辨率#!修改器,为期12个月。"
 
 # ── EVENT 301: RESOLUTION FAILED ─────────────────────────────────
 
 un_events.301.t: "联合国决议未能通过"
 un_events.301.d: "提交联合国大会的动议未能获得必要的多数。 决议被否决,届会休会后无结果。\n\n不执行任何措施。 提案国代表团已表示失望。 其他人没有。"
 un_events.301.f: "联合国尽其所能。"
 un_events.301.a: "无惊无怪"
 
 # ── EVENT 302: SANCTIONS (TARGET) ────────────────────────────────
 
 un_events.302.t: "[ROOT.GetCountry.GetName] (中文(简体) ). 联合国制裁"
 un_events.302.d: "联合国安理会通过决议,对"x id=0"实施经济制裁. 决议得到了法定多数的支持并立即生效。\n\n 贸易限制现已生效。 外交孤立加深. 期望会员国遵守制裁制度,但并非强迫。 除非安全理事会开会审查制裁,否则制裁将持续五年。"
 un_events.302.f: "主权不能使一个国家脱离世界对其的看法。"
 un_events.302.a: "我们拒绝这个决议"
 
 # ── EVENT 303: CONDEMNATION (TARGET) ─────────────────────────────
 
 un_events.303.t: "[ROOT.GetCountry.GetName] (中文(简体) ). 被联合国谴责"
 un_events.303.d: "联合国大会通过正式决议,谴责"x id=0". 谴责在辩论结束后以多数票通过。 谴责没有有约束力的执行机制,但它是国际不赞同的正式声明,将影响今后在外交界的地位。"
 un_events.303.f: "言语不是武器。 但他们留下了痕迹。"
 un_events.303.a: "我们不会被训导"
 
 # ── EVENT 304: SANCTIONS/CONDEMNATION (OBSERVERS) ────────────────
 
 un_events.304.t: "联合国惩罚性决议通过"
 un_events.304.d: "联合国安理会通过决议对他国实施制裁. 随着世界协调对它们的经济压力,他们将面临严厉的惩罚。"
 un_events.304.f: "国际训斥机制慢慢地转了过来,但又转了过来。"
 un_events.304.a: "已注意到"
 
 UN_304_DESC_SANCTIONS: "联合国安理会投票决定对"x id=0"实施经济制裁. 决议按规定差值通过.\n\n[global_var:un_sanction_target.GetName]将在制裁期间面临贸易限制,外交孤立和重大经济处罚. 会员国应遵守这些限制。"
 UN_304_DESC_CONDEMNATION: "联合国大会以多数票正式谴责了"x id=0". 决议代表国际不赞成的官方声明. \n\n 虽然谴责没有有约束力的执行,但它将 " x id=3/ " 行为记录在案并影响其国际地位。"
 
