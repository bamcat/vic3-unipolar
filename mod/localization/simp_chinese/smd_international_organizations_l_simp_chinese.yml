 io_treaty_geneva_name: "《日内瓦四公约》"
 io_treaty_geneva_desc: "一系列被称为"日内瓦公约"的条约负责为武装冲突期间的人道主义待遇制定国际法标准. 签署者同意在战时保护受伤的士兵、战俘和平民。"

 io_treaty_cwc_name: "《化学武器公约》"
 io_treaty_cwc_desc: "《化学武器公约》是一项禁止发展、生产、获取、储存、保留、转让和使用化学武器的 " x id=0 " 公约。 签署国同意在国际核查下销毁现有储存。"

 io_treaty_npt_name: "不扩散条约"
 io_treaty_npt_desc: "《不扩散核武器条约》是一项 " x id=0 " ,旨在防止核武器扩散,促进裁军并便利在国际保障监督下和平利用核能。"

 io_treaty_bwc_name: "《生物武器公约》"
 io_treaty_bwc_desc: "《生物武器公约》禁止发展、生产和储存生物和毒素武器。 这是第一个禁止一整类武器的多边裁军条约。"

 io_treaty_cat_name: "禁止酷刑公约"
 io_treaty_cat_desc: "《禁止酷刑公约》禁止一切形式的酷刑和残忍、不人道或有辱人格的待遇或处罚。 签署国承诺在其管辖范围内采取有效措施防止酷刑。"

