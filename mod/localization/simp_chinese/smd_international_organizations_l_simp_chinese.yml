 ngo_amnesty_scrutiny: "受大赦审查"
 ngo_amnesty_scrutiny_desc: "在最近受到批评之后,大赦国际正在密切监测我们的人权记录。 政府的合法性受到压力。"

 ngo_amnesty_reform_pressure: "改革压力"
 ngo_amnesty_reform_pressure_desc: "大赦国际关于内乱的报告为改革带来了国内和国际压力,但有助于抑制革命情绪。"

 ngo_redcross_aid: "红十字会人道主义援助"
 ngo_redcross_aid_desc: "红十字会工作人员正在向冲突地区的平民提供人道主义援助,降低死亡率并增进我们的国际声誉。"

 ngo_redcross_cooperation: "红十字会合作"
 ngo_redcross_cooperation_desc: "我们在战时行为方面同红十字会的合作提高了我们的国际地位并减少了由我们军事行动造成的耻辱。"

 ngo_redcross_relief: "红十字会危机救济"
 ngo_redcross_relief_desc: "在这一国内危机期间,红十字会正在提供人道主义救济,帮助稳定受影响人口。"

 ngo_iaea_inspectors: "原子能机构检查专员"
 ngo_iaea_inspectors_desc: "原子能机构视察员正在我们的核设施内运作,分享技术专长和安全知识。 它们的存在加快了技术转让,提高了我们的外交声誉。"
