 ### ═══════════════════════════════════════

 concept_international_organization: "国际组织"
 concept_international_organization_desc: "国际组织是跨国界运作的机构,目的是协调政策、促进贸易、确保集体安全或促进成员国之间的文化交流。 它们有几种形式:[concept_free_trade_agreement]s,[concept_financial_agreement]s,[concept_military_defense_agreement]s,[concept_cultural_pact]s,和[concept_cooperative_agreement]."

 concept_intergovernmental_organization: "政府间组织"
 concept_intergovernmental_organization_desc: "政府间组织是其成员为主权国家的 " x id=0 " 。 与 " x id=1/ " 不同,政府间组织需要正式成员资格,能够提供重大的外交、经济或军事利益。"

 concept_nongovernmental_organization: "非政府组织"
 concept_nongovernmental_organization_desc: "非政府组织是独立的机构,在国际上运作,不受任何政府控制。 所有国家默认都附属于非政府组织。 政府可选择禁止、容忍或补贴这些影响非政府组织的意见和它们提供的利益。"

 concept_international_treaty: "国际条约"
 concept_international_treaty_desc: "国际条约是主权国家之间具有约束力的正式协定。 与 " x id=0 " 不同,条约并不要求持续组织成员资格——一个国家不是签署国就是不是。 签字者享受外交利益,而退出则会损害与其他签字者的关系."

 international_treaty_type:0 "[concept_international_treaty]
 concept_free_trade_agreement: "自由贸易协定"
