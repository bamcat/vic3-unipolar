  ### ══════════════════════════════════════════
 ### AMNESTY INTERNATIONAL
 ### ══════════════════════════════════════════

 ngo_events.1.t: "大赦国际谴责我们的政策"
 ngo_events.1.d: "大赦国际发表了关于我国人权记录的可耻报告,指出我国现行法律是对基本自由的蓄意侵犯。 国际社会已经注意到,我国政府面临着解决这些关切的越来越大的压力。"
 ngo_events.1.a: "他们的批评丝毫没有改变"
 ngo_events.1.b: "我们将审查他们的关切"

 ngo_events.2.t: "大赦国际赞扬改革"
 ngo_events.2.d: "大赦国际认为,我们最近的立法改革是朝着人权迈出的重要一步。 他们的年度报告突出了我们的进展,提高了我国的国际声誉。"
 ngo_events.2.a: "我们为我们的进步而自豪"

 ngo_events.3.t: "关于民事不惩罚的大赦报告"
 ngo_events.3.d: "大赦国际发表了一份特别报告,其中记录了困扰我国的广泛内乱。 他们呼吁我国政府通过有意义的改革而不是镇压来解决不满的根源。"
 ngo_events.3.a: "我们将考虑改革"
 ngo_events.3.b: "我们的内政与他们无关"

 ### ══════════════════════════════════════════
 ### RED CROSS
 ### ══════════════════════════════════════════

 ngo_events.10.t: "红十字会提供人道主义援助"
 ngo_events.10.d: "国际红十字会已提出部署人道主义工作人员,以协助受正在发生的冲突影响的平民。 他们的援助小组准备向我们受战争蹂躏地区的流离失所者提供医疗、住所和食物。"
 ngo_events.10.a: "我们欢迎他们的协助"
 ngo_events.10.b: "我们不能允许外国工人进入战区"

 ngo_events.11.t: "红十字会批评战时行为"
 ngo_events.11.d: "国际红十字会发表公开声明,对我国武装部队的行为深表关切. 关于冲突地区大量平民伤亡和基础设施被破坏的报告已引起国际注意。 他们敦促各方尊重日内瓦四公约。"
 ngo_events.11.a: "我们会和他们的调查员合作"
 ngo_events.11.b: "我们否认这些指控"

 ngo_events.12.t: "红十字会提供危机救济组织"
 ngo_events.12.d: "尽管没有公开战争,但国际红十字会已查明我国境内日益严重的人道主义危机。 广泛的内乱和经济混乱创造了需要国际援助的条件。 它们提出协调对受影响人口的救济工作。"
 ngo_events.12.a: "我们接受他们的帮助"
 ngo_events.12.b: "我们能自己搞定的"

 ### ══════════════════════════════════════════
 ### IAEA
 ### ══════════════════════════════════════════

 ngo_events.20.t: "原子能机构要求进行核检查"
 ngo_events.20.d: "国际原子能机构已正式要求进入我们的核设施,以便进行全面的安全和遵守情况检查。 作为《不扩散条约》的非签署国,我国的核计划已受到更严格的国际监督。 原子能机构向我们保证,视察是例行公事,但拒绝视察将向国际社会发出明确信号。"
 ngo_events.20.a: "我们的设施是开放检查的"
 ngo_events.20.b: "我们的核计划是主权问题"

 ngo_events.21.t: "原子能机构赞扬核安全记录"
 ngo_events.21.d: "在审查了我们的核计划后,国际原子能机构正式赞扬了我们对安全标准和遵守不扩散的承诺。 我们遵守《不扩散条约》并与国际视察员合作,加强了我们在全球核界的地位。"
 ngo_events.21.a: "我们仍然致力于和平核能"

 ngo_events.22.t: "原子能机构提出扩散问题"
 ngo_events.22.d: "国际原子能机构已对我们的核计划的方向发出警报。 没有《不扩散条约》成员以及我们继续拒绝同视察员合作,原子能机构发表了一项正式声明,对可能的武器发展表示关切。 国际社会正在密切注视。"
 ngo_events.22.a: "我们愿意进行对话"
 ngo_events.22.b: "我们主张对核技术的主权"

