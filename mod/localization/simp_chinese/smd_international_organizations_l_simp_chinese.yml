 # European Union
 
 je_european_union: "欧洲联盟"
 je_european_union_reason: "欧洲联盟是现代最雄心勃勃的政治和经济项目之一。 欧盟以经济一体化、共同治理和集体安全等原则为基础,为其成员国提供了共同市场、协调的贸易政策以及决定非洲大陆未来的席位。 成员资格带来了商品、服务、资本和人员自由流动的希望——一个前所未有的繁荣机会。 然而,欧盟并非没有挑战。 各成员必须主持复杂的谈判,遵守超国家规章,并妥协国家主权要素。 更深入地融合,每个成员的命运与集体的命运联系得越多.\n\n 一个国家能否在欧盟内兴起或斗争,取决于它能否在国家利益与共同利益之间取得平衡,在联盟内形成一条旨在超越其各部分之和的道路。"

