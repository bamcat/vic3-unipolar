 # leaders
 
 ideology_marxist_leader: "马克思主义"
 ideology_marxist_leader_desc: "主张政务会治,公有制,集体农业的革命社会主义领导人,同自由资本主义的尖锐决裂."
 ideology_state_socialist_leader: "社会主义国家"
 ideology_state_socialist_leader_desc: "集中偏好一党制或技术官僚国家方向,指挥经济学,以及大型公有制的社会主义领导人."
 ideology_left_wing_populist_leader: "左翼流行音乐家"
 ideology_left_wing_populist_leader_desc: "将再分配,保护主义,民主混为一谈的反精英群众政治领袖,对寡头统治的强烈敌意."
 ideology_democratic_socialist_leader: "民主社会主义者"
 ideology_democratic_socialist_leader_desc: "民主左翼领导人赞成选举、工人权力、社会所有权、强有力的福利和公民自由。"
 ideology_green_leader: "绿色"
 ideology_green_leader_desc: "环境民主领袖注重生态调控,公益,公民自由,后工业改革."
 ideology_state_capitalist_leader: "国家资本主义"
 ideology_state_capitalist_leader_desc: "发展主义领导人接受市场,但希望有一个强大的国家,战略工业,集中银行,以及引导投资."
 ideology_market_socialist_leader: "社会主义市场"
 ideology_market_socialist_leader_desc: "在民主监督下,分散支持合作社、工会、福利和市场机制的社会主义领导人。"
 ideology_progressive_leader: "渐进式"
 ideology_progressive_leader_desc: "改革派领导人注重平等权利、扩大福利、教育、公民自由和有管理的市场改革。"
 ideology_social_liberal_leader: "社会自由"
 ideology_social_liberal_leader_desc: "以福利、平等公民权、教育和管理资本主义支持市场的自由民主领导人。"
 ideology_technocrat_leader: "技术专家"
 ideology_technocrat_leader_desc: "支持政教分离、行政规划、国家能力、规范市场和科学治理的专家规则领导人。"
 ideology_liberal_leader: "自由主义"
 ideology_liberal_leader_desc: "将支持立宪共和国、公民自由、自由贸易、私人市场和法律平等的自由领袖纳入主流。"
 ideology_moderate_leader: "温和"
 ideology_moderate_leader_desc: "实事求是的机构领导人很少推动激进的改革,而且在稳定的混合制度中最为常见."
 ideology_neoliberal_leader: "新自由主义"
 ideology_neoliberal_leader_desc: "以市场为导向的自由领袖,他们赞成自由贸易、放任、私人提供、财政约束和技术官僚机构。"
 ideology_conservative_leader: "保守党"
 ideology_conservative_leader_desc: "主张社会秩序,有限改革,温和市场经济,传统,谨慎民族主义的右派地位领袖."
 ideology_corporatist_leader: "法人"
 ideology_corporatist_leader_desc: "支持干预主义或自由放任资本主义的资本主义协调领导人通过国家企业劳动机构组织起来."
 ideology_theocrat_leader: "主题"
 ideology_theocrat_leader_desc: "宗教统治领袖想要国家、学校、法院和公民权,"
 ideology_right_wing_libertarian_leader: "右翼自由主义者"
 ideology_right_wing_libertarian_leader_desc: "反国家市场领袖偏好民营机构,福利低,媒体自由,国内治安薄弱."
 ideology_classical_liberal_leader: "古典自由主义"
 ideology_classical_liberal_leader_desc: "主张自由贸易,限制政府,产权,代表机构,法治的老自由宪政主义者."
 ideology_neocon_leader: "尼欧康"
 ideology_neocon_leader_desc: "军事化的倾向专业武装,干预国外,资本主义机构和国家安全的自由派保守派领导人."
 ideology_jihadist_leader: "圣战者"
 ideology_jihadist_leader_desc: "在极端压力下,只有伊斯兰国家宗教国家才能出现的军事宗教领袖。"
 ideology_minarchist_leader: "实权主义者"
 ideology_minarchist_leader_desc: "极端的小国市场领袖,他们支持自由放任、私营系统,以及几乎完全收回公共权力。"
 ideology_right_wing_populist_leader: "右翼流行音乐家"
 ideology_right_wing_populist_leader_desc: "反精英的民族人民主义领袖,在自由民主制中崛起,有高激进分子,混合福利沙文主义,保护主义和文化反弹."
 ideology_authoritarian_capitalist_leader: "专制资本主义"
 ideology_authoritarian_capitalist_leader_desc: "在专制、警察权力、审查制度和弱小的反对下支持私有或引导资本主义的强硬资本主义领导人。"
 ideology_monarchist_leader: "君主制主义者"
 ideology_monarchist_leader_desc: "狂热的忠诚主义领袖,他们几乎只出现在君主制国家中并倾向于世袭权威,传统,教会和等级."
 ideology_fascist_leader: "法西斯主义"
 ideology_fascist_leader_desc: "极端民族主义的专制领袖,他们赞成军事化,一党统治,国家暴力,封闭社会,以及企业-国家经济学."
 ideology_anarchist_leader: "无政府主义者"
 ideology_anarchist_leader_desc: "拥护无国籍自治,合作社所有制,民兵,言论自由,没有警察的反专制社会主义领导人,地方自治力量强大."
