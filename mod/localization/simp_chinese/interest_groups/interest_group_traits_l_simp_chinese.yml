l_simp_chinese:

  # Landowners IG Traits
 ig_trait_noblesse_oblige:0 "贵族义务"
 ig_trait_noblesse_oblige_desc:0 "我们比普通人好,这意味着我们有责任照顾他们。 他们为自己组织事物的企图是自毁的,注定会失败."
 ig_trait_family_ties:0 "家庭联系"
 ig_trait_family_ties_desc:0 "在这些变化的时代,我们仍然知道好婚姻的价值. 我们的联系比它们超越的边界要长,而且将超越联盟和政府。"
 ig_trait_noble_privileges:0 "贵族特权"
 ig_trait_noble_privileges_desc:0 "贵族应该任由他们去履行职责,而不受收税者的追逐,这个想法到底怎么了? 现在是把那些日子带回来的时候了。"
 ig_trait_profitable_estates: "经济财产"
 ig_trait_profitable_estates_desc: "你不知道吗? 给贵族带来好处的,是给国家带来好处的——繁荣的花花公子."
 ig_trait_the_velvet_book: "天鹅绒书"
 ig_trait_the_velvet_book_desc: "只有最尊贵的家族才能在这部可口的书中刻出自己的名字. 我们知道谁属于谁不属于谁。"
 ig_trait_bad_boyars: "坏波雅尔"
 ig_trait_bad_boyars_desc: "所以他们想说这个国家的好沙皇 被他的坏小子误导了? 哦,我们可以让他们知道什么是坏男孩的能力。"
 ig_trait_latifundios: "拉蒂福恩迪奥斯"
 ig_trait_latifundios_desc: "我们庄园的生产力和财富是无与伦比的. 金钱通过我们的手 像水流过快。 确实,这对我们大家来说都是黄金的日子。"
 ig_trait_junkerdom: "混乱"
 ig_trait_junkerdom_desc: "我们的力量来自我们的土地,我们的土地是强大的土地。 无论我们选择做什么,国家都会随之而来."
 ig_trait_patrician_philanthropy: "帕特里夏慈善事业"
 ig_trait_patrician_philanthropy_desc: "我们该为同胞做点什么了,"
 ig_trait_wiener_walzer: "维纳·瓦尔泽"
 ig_trait_wiener_walzer_desc: "有人有勇气在最后一个球 要求一个小米被玩。 亲爱的,我们做华尔兹! 我们设定什么是时髦的,它是一个"x id=0",而不是"x id=1/"!"
 ig_trait_fazenda_ibicaba: "法赞达·伊比卡巴"
 ig_trait_fazenda_ibicaba_desc: "人力对于我们企业来说是一个常有的问题,所以我们必须尽一切可能争取到我们需要的劳动力."
 ig_trait_summon_no_zamindars: "无扎明达尔人"
 ig_trait_summon_no_zamindars_desc: "我国的统治者已经表明,他们对谈判或灵活性毫无兴趣。 如果是这样,那么他们不应该错过我们为维持秩序而做的更微妙的事情。"
 ig_trait_famine_reserves: "饥荒准备金"
 ig_trait_famine_reserves_desc: "我们有责任在出现紧迫需要时开放我们的谷物储存。 还有什么更好的办法能从房客那里买到善意?"

  # Industrialists IG Traits
 ig_trait_job_creators:0 "任务创建者"
 ig_trait_job_creators_desc:0 "一个人必须花钱赚钱。 只要相信政府不会干涉我们的投资,我们宁可把利润投向经济增长."
 ig_trait_engines_of_progress:0 "进步引擎"
 ig_trait_engines_of_progress_desc:0 "看现代的奇迹! 没有时间犹豫。 能够思想,设计,申请专利的,应当建设,检验并立即投入使用."
 ig_trait_tax_avoidance:0 "避税"
 ig_trait_tax_avoidance_desc:0 "谁知道我们的钱应该花在哪里? 不是政府,当然也不是现在的 所幸的是,他们的无能留下了可以很好地利用的税收漏洞."
 ig_trait_zaibatsu_cooperation: "Zaibatsu合作组织"
 ig_trait_zaibatsu_cooperation_desc: "工业与政府之间的健康关系使每个人都受益。 确保这种友好状态继续下去符合我们双方的利益。"
 ig_trait_zaibatsu_withdrawal: "扎巴松退出"
 ig_trait_zaibatsu_withdrawal_desc: "我们的金融健康将通过重新关注货币投机和内部再投资而受益最大。 公共交易对于政府来说是可悲的,现在不是优先事项。"
 ig_trait_kommerskollegium: "缩写"
 ig_trait_kommerskollegium_desc: "随着我们商业利益的规模继续扩大,我们必须确保所赚取的财富得到公平的管理。"
 ig_trait_ventilate_unify_beautify: "通风、统一和美容"
 ig_trait_ventilate_unify_beautify_desc: "你看到外面是什么样了吗? 它是一个疾病作坊,一个阳光从不发光的地方,植物在什么地方被枯萎,苦难和瘟疫在协调中发挥作用. 当然,我们有责任解决这烂摊子。"
 ig_trait_the_goods_must_flow: "货物必须流动"
 ig_trait_the_goods_must_flow_desc: "生产量和我国一样好,但是如果无法进入需要销售的市场,有什么用? 现在是确保国家了解如何需要良好运输的时候了。"
 ig_trait_wounded_honor: "受伤的荣誉"
 ig_trait_wounded_honor_desc: "在一个拒绝任何启蒙的地方,我们是一个开明的少数人。 我们的方法是优越的——任何混乱都是背叛,背叛必须得到最严厉的制裁。"
 ig_trait_stamped_and_signed: "印章并签名"
 ig_trait_stamped_and_signed_desc: "邮票和分类账是我们用来制造秩序 摆脱混乱的方法 印度的治理需要一出一出一出纸,我们的任务是确保它畅通无阻地流通。"
 ig_trait_responsible_government: "负责任的治理"
 ig_trait_responsible_government_desc: "我们的使命是将正义和文明扩大到所有人——当然,还要使允许这种统治永久地持续下去。"

  # Armed Forces IG Traits
 ig_trait_patriotic_fervor:0 "爱国者"
 ig_trait_patriotic_fervor_desc:0 "无论战略多么辉煌,武器多么先进,有些战斗只能用艰苦的努力和勇气来取胜. 真正相信自己国家所代表的信念的士兵们,将不顾各种可能,勇敢地战斗."
 ig_trait_veteran_consultation:0 "退伍军人咨询"
 ig_trait_veteran_consultation_desc:0 "技术进步正在改变战争的面貌,但是我们只有懂得如何才能利用它们. 幸运的是,我们这些有第一手经验的人应该有一个想法。"
 ig_trait_materiel_waste:0 "物质废物"
 ig_trait_materiel_waste_desc:0 "忠于国家不是忠于政府. 如果我们不能信任那些负责的人,我们也许可以像我们所认为的那样使用我们得到的."
 ig_trait_elan_vital: "埃兰生命号"
 ig_trait_elan_vital_desc: "虽然最新的武器和军备都很好,但取得胜利的道路取决于一种不会在逆境下屈服的驱动精神。 真正相信国家所主张的战士们,无论机率如何,都将勇敢地前进."
 ig_trait_newly_created_army: "新组建的军队"
 ig_trait_newly_created_army_desc: "现代军队的核心不在于最新的步枪,或最好的制服,而在于组织和后勤. 保持每个士兵的供给,保持弹药和口粮的正常和可靠流动,确保每个人知道自己在庞大的军事机器中的作用——这就是如何使一支军队有价值。"
 ig_trait_self_strengthening: "自我强化"
 ig_trait_self_strengthening_desc: "我们的智慧和智慧必然高于我们周围的人。 因此,我们必须从国外学到的只有一件事:固体船只和有效枪。"
 ig_trait_parochial_leadership: "教区领导"
 ig_trait_parochial_leadership_desc: "在这种黑暗的时代,每个人都为自己着想,每个行省都必须首先着眼于自己的福利. 指望每个军官都热情地领导远离家乡,而他自己的灵柩可能受到威胁,这是不合理的."
 ig_trait_el_buen_jefe: "艾尔·布恩杰夫"
 ig_trait_el_buen_jefe_desc: "每个好士兵都需要一个好军官来领导他. 在这个时代,全国需要的是一个好军官."
 ig_trait_clube_militar: "军事俱乐部"
 ig_trait_clube_militar_desc: "我们这样的军官和士兵可以休息、放松和在业余时间组织起来的地方,是无害的。 如果有的话,一个我们可以一起讨论和计划的地方 可能会为国家带来一些好处。"
 ig_trait_coronelismo: "科罗内利斯莫"
 ig_trait_coronelismo_desc: "你看过政府的最新法令吗? 他们不知道自己在和谁打交道吗? 像我这样的有徽章的绅士,带着我所有的人和地产,是不应该被欺负的!"
 ig_trait_divided_ranks: "分级"
 ig_trait_divided_ranks_desc: "我们的士兵和军官之间存在着根本的分歧,这种分歧已经变得太广,不容忽视。 为什么一个人要为一个以蔑视的态度对待其风俗的人而把自己的性命置于一线?"
 ig_trait_imperial_service: "帝国服务"
 ig_trait_imperial_service_desc: "穿着我们的制服,扩大我们的疆域,是一种伟大的荣誉,数百万人为此而奋斗。 他们感到幸运的是,总是有职位需要填补。"
 ig_trait_veerta: "维埃塔"
 ig_trait_veerta_desc: "我们的军队征服了整个印度 对所有敌人的胜利无休止 我们的勇气和纪律确保了这道荣誉之行永无止境."

  # Rural Folk IG Traits
 ig_trait_farmers_markets:0 "农民市场"
 ig_trait_farmers_markets_desc:0 "将我们生产的商品提供给需要这些商品的人,这年头似乎是一个大问题. 在好的情况下,我们完全有能力 让他们需要我们自己。"
 ig_trait_honest_work:0 "诚实的工作"
 ig_trait_honest_work_desc:0 "我们靠诚实的工作和诚实的出汗来谋生. 如果这意味着我们生产的数量超过我们所需要的数量,那么就更好了。"
 ig_trait_old_ways:0 "旧方法"
 ig_trait_old_ways_desc:0 "这些掌管国家的人似乎对未来应该是什么有着各种各样的想法. 我们为什么要相信他们 当他们是谁 谁做了现在是什么?"
 ig_trait_obshchina: "奥布什奇纳"
 ig_trait_obshchina_desc: "我们小村子里的生活没那么糟 分散我们大家之间的工作是容易的,在产品和利润上分散一倍。"
 ig_trait_fellahin: "费拉欣"
 ig_trait_fellahin_desc: "我们的命中注定要尽我们所能地在这些领域工作。 有时候,我们的工作会为我们带来回报"
 ig_trait_nucleos_coloniais: "科洛尼亚群岛"
 ig_trait_nucleos_coloniais_desc: "新的家意味着生活的新开端. 有什么不爱的吗? 来吧,让我们看看 新的解决方案能提供什么。"
 ig_trait_plantation_work: "种植工程"
 ig_trait_plantation_work_desc: "我们日复一日地努力工作,得到我们需要的。 但是,有些时候,我们得到的不止这些,我们珍惜那些日子。"
 ig_trait_of_the_sovereign_alone: "独自一人的君主"
 ig_trait_of_the_sovereign_alone_desc: "拥有土地的人给我们带来的负担是无法忍受的。 必须提醒这些中间人,我们是主权一方的走狗,他们对我们没有合法权力。"
 ig_trait_imandari: "伊曼达里"
 ig_trait_imandari_desc: "我们的土地是富裕的,我们勤奋工作。 在美好时期,我们可以产生我们所需要的更多。"
 ig_trait_bazaar_bargains: "巴扎尔交易"
 ig_trait_bazaar_bargains_desc: "正是我们的集市丰富了我们的城镇,吸引了几英里外的游客。 如果繁荣需要一些额外的组织,那就是我们愿意付出的代价."

  # Trade Unions IG Traits
 ig_trait_solidarity:0 "团结"
 ig_trait_solidarity_desc:0 "所有想要工作的人都应该有工作! 任何人都不会被排除在外或被排除在外。 我们必须相互支持对方获得公平补偿劳动的权利."
 ig_trait_industrial_organizers:0 "工业组织者"
 ig_trait_industrial_organizers_desc:0 "无论由谁负责,工人的合作方式最终对工厂运作情况的影响大于从高层颁布的任何规则。"
 ig_trait_work_to_rule:0 "工作与规则"
 ig_trait_work_to_rule_desc:0 "看来负责人希望我们闭嘴 照我们的话去做 而不是为自己着想 让我们看看他们如何喜欢 如果我们真的应用这个哲学 对我们的"不熟练"的劳动。"
 ig_trait_bourse_du_travail: "特拉维尔大道"
 ig_trait_bourse_du_travail_desc: "组织不是在工作日结束时结束的! 一个统一战线要求不仅在工厂地板上,而且在我们的家园和社区中互相帮助。"

  # Intelligentsia IG Traits
 ig_trait_propagandists:0 "宣传者"
 ig_trait_propagandists_desc:0 "在我们的诗歌、信件和政治宣言中,我们首先必须维护我们祖国所取得的进步,作为这个新时代给世界不太幸运的地区带来什么的例子。"
 ig_trait_avant_garde:0 "阿凡特 -加尔德"
 ig_trait_avant_garde_desc:0 "别人甚至不敢想的,我们已经在大声说话了。 我们的艺术和思想将直接切入心灵,并强迫睁开眼睛,如果不是令人惊讶,那么就会被震惊!"
 ig_trait_social_criticism:0 "社会批评"
 ig_trait_social_criticism_desc:0 "掌权者往往认为自己是无可指责的,但权威并不能使某人的想法变得有趣. 我们有很多有趣的事情要说, 而且我们知道到底该说谁。"
 ig_trait_restoration: "恢复"
 ig_trait_restoration_desc: "在这个面临巨大挑战和取得巨大成就的时代,我们为自己坚持不懈地努力使国家恢复其旧的伟大而感到自豪。 非凡的工作重申了我们文明的地位,非凡的工作将使它达到更大的高度."
 ig_trait_crisis_of_identity: "身份危机"
 ig_trait_crisis_of_identity_desc: "我们所服务的国家也许不是我们真正的国家。 我们和负责人有什么共同之处?"
 ig_trait_les_beaux_arts: "莱斯波艺术公司"
 ig_trait_les_beaux_arts_desc: "我们的艺术,我们的展览, 我们的创造才华,是次于无。 为什么我们不应该炫耀? 我们应该让别人嫉妒"
 ig_trait_brasilidade: "巴西语Name"
 ig_trait_brasilidade_desc: "来吧,朋友,让我们庆祝今晚! 在这里,我们可以听到星光下最美的芭蕾舞曲, 手里拿着一瓶酒, 在那里,啊,看看他已经画了什么! 这不是生活吗?"
 ig_trait_bachareis: "巴沙雷斯语Name"
 ig_trait_bachareis_desc: "我们知道国家需要什么! 毕竟,我们为人民说话——什么? 不,我们没有说,我们说话#italic 到#!人民。"
 ig_trait_swaraj: "斯瓦莱"
 ig_trait_swaraj_desc: "我们发现自己被国家疏远和奴役。 我们的统治者拒绝我们的代理 却要求我们的无心服务 这种事情注定要失败——如果需要,我们将努力确保这样做。"
 ig_trait_westernisation: "西方化"
 ig_trait_westernisation_desc: "我们本届政府是正义和进步的代表,然而我国大部分地区仍然远离它。 我们必须努力减少国家与人民之间的分化。"

  # Petite-Bourgeoisie IG Traits
 ig_trait_treasury_bonds:0 "国库债券"
 ig_trait_treasury_bonds_desc:0 "只要政府能被信任来偿还债务,把我们辛辛苦苦得到的储蓄用来资助这个伟大的国家,不仅是爱国主义的,而且是良好的投资."
 ig_trait_middle_managers:0 "中级管理人员"
 ig_trait_middle_managers_desc:0 "我们不能让每个人都按本子做一切事情,但至少可以把书上做过的事保留下来. 有人需要记住 正确的方式 在这里做事情。"
 ig_trait_xenophobia:0 "仇外心理"
 ig_trait_xenophobia_desc:0 "我们都知道谁应该怪罪我们国家的状况,人们只是不敢说. 同时,他们还背着我们笑着说我们让他们逃脱了什么. 有人需要行动。"
 ig_trait_bergsbrukens_valdistrikten: "贝格斯布鲁克斯·瓦尔德斯克克特"
 ig_trait_bergsbrukens_valdistrikten_desc: "矿业利益集团和汉堡地产之间的密切合作意味着,在更好的时期,我们可以确保国家得到其他国家只能梦想得到的那种支持."
 ig_trait_effendi: "爱芬迪"
 ig_trait_effendi_desc: "通过真诚的习惯和诚实的手段,我们登上顶峰,我们的努力受到所有人的赞扬。"
 ig_trait_reorganization: "重组"
 ig_trait_reorganization_desc: "我们知道,有了正确的授权和部门,我们就进行了如此多的改革。 只要说出来,我们就开始。"
 ig_trait_master_of_the_house: "馆主"
 ig_trait_master_of_the_house_desc: "请! 请坐 我们渴望在这里得到完善——成为穷人的仆人,成为伟大的、慰藉的和国家的哲学家的管家。"
 ig_trait_haute_finance: "上层财务"
 ig_trait_haute_finance_desc: "在大陆金融的游戏中,我们的目标是首先发挥我们的手,从而成为胜利者。"
 ig_trait_old_lady_of_threadneedle_street: "丝妮特街的老太太"
 ig_trait_old_lady_of_threadneedle_street_desc: "如果国家需要帮助,身边有一个老太太是谨慎的,安全的,在危机中总是可以求助于:英格兰银行."
 ig_trait_civil_service: "公务员"
 ig_trait_civil_service_desc: "人们的确对公务员有有趣的想法. 我们在这里帮助你制定和执行你的政策,仅此而已。"
 ig_trait_bah_humbug: "Bah Humbug (英语)."
 ig_trait_bah_humbug_desc: "你说穷人和绝望的人 都缺钱了 没有监狱吗? 工作室还在营业吗? 那就别烦我! 离开的人必须去那里。"
 ig_trait_swadesh: "斯威士兰"
 ig_trait_swadesh_desc: "我们同任何其他人一样勤奋,但我们却得不到信贷,被迫被外国企业奴役。 如果我们的统治者试图把我们排除在经济之外,我们将为他们做同样的事情。"
 ig_trait_lines_of_credit: "信贷额度"
 ig_trait_lines_of_credit_desc: "如果不是我们自己的好金融家提供的信贷 公司不可能征服印度 如果我们得到一个扎实的商业案例,我们完全愿意继续这种关系。"
 ig_trait_cooperative_agencies: "合作社机构"
 ig_trait_cooperative_agencies_desc: "我们的统治者拥有丰富的资本,但对我国却知之甚少. 通过汇集他们的资源和我们的专门知识,我们可能比他们单独更加丰富我们的祖国。"

  # Devout IG Traits
 ig_trait_be_fruitful_and_multiply:0 "果实相乘"
 ig_trait_be_fruitful_and_multiply_desc:0 "少数将自己的生命献给精神追求的人可以接受Asbethism,但在普通人中,灌输的最重要价值观是建立家庭和照顾孩子。"
 ig_trait_divine_right:0 "右侧"
 ig_trait_divine_right_desc:0 "我们认为,我们的生命是有秩序的。 社会可以更好或更坏地反映这种秩序。 只要统治者是善良的,他们的法令是公正的,我们就能确保人民知道原因。"
 ig_trait_pious_fiction:0 "虔诚的虚构"
 ig_trait_pious_fiction_desc:0 "今天的价值观如此被毒害,而文学如此腐败,以致教育本身对道德产生侵蚀作用。 比教人更好的,不管现在的机构认为“真”是教他们什么是真。"
 ig_trait_work_ethic: "工作环境"
 ig_trait_work_ethic_desc: "记住,钱有产生的性质。 金钱得到金钱;利润的产生是一种创造行为,是对上帝自己作品的荣誉和颂扬."
 ig_trait_asceticism: "乙酸主义"
 ig_trait_asceticism_desc: "弃去今世所取之乐是正道. 不要让自己太受物质变化的困扰;这些变化也将通过。"
 ig_trait_kar_seva: "卡尔·塞瓦"
 ig_trait_kar_seva_desc: "上帝与我们并肩作战。 因此,无私地服务于他人就是服务于上帝的创造并服务于上帝. 我们所有人都应当从事诚实的工作,同他人分享劳动的成果,并通过这些手段更接近上帝。"
 ig_trait_temporal_mandate: "临时任务"
 ig_trait_temporal_mandate_desc: "天地之分界线往往模糊;信仰同政府之分界线也一样. 管理世俗世界需要各种类型——我们总是能够找到办法使我们的体系共同运作。"
 ig_trait_the_best_revenge: "最好的复仇计划"
 ig_trait_the_best_revenge_desc: "如果你想报复你的敌人,获得更多的好品质,走在正义的道路上. 在这样做的时候,你将不可避免地报复你的敌人,因为他会为你的良好品质而悲伤,他也会为你的良好声誉而悲伤."
 ig_trait_yeshivot: "叶希沃特"
 ig_trait_yeshivot_desc: "学习"西弗鲁特查扎尔"是每个青年的关键职责. 如果没有人上学,我们的法律怎么能被记住和保存呢?"
 ig_trait_traditsye: "特雷迪赛"
 ig_trait_traditsye_desc: "世界正在迅速改变。 如果我们在这场不可知的变革后匆匆赶来,我们如何维持我们的平衡?"
 ig_trait_heavenly_sovereign: "天国"
 ig_trait_heavenly_sovereign_desc: "占木皇帝的继承人一直倾向于世界上最有威望的机构之一. 这一传统字体理应受到赞扬,作为一个国家,我们应当承认这一点。"
 ig_trait_secular_shrine_theory: "世俗圣迹理论"
 ig_trait_secular_shrine_theory_desc: "神道是日本人民的固有信仰;它们存在体制上是为了国家公开仪式的目的. 神道会是意识形态:这是我们期望每个公民的爱国主义的表现."
 ig_trait_haibutsu_kishaku: "岸口海布"
 ig_trait_haibutsu_kishaku_desc: "外国宗教必须从国家中被废除,其人物被毁灭. 看看他们造成的破坏! 入其神道,入其神道,入其地道,入其地道,出其地道之所出也!"
 ig_trait_da_wat: "达瓦特"
 ig_trait_da_wat_desc: "我们必须出去,邀请其他人加入我们的信仰,按照真主的意愿生活。 ummah欢迎所有人。"
 ig_trait_sharia: "伊斯兰教法"
 ig_trait_sharia_desc: "正确生活需要了解定义正确和不正确的法律。 对法律的诠释,是我们所能履行的最被尊崇和庄严的职责之一."
 ig_trait_mecelle: "梅尔"
 ig_trait_mecelle_desc: "根据哈纳菲判例,Mecelle-i Ahkâm-ı 阿德利耶确保我们遵循的守则既能满足我们的信仰,又能满足我们对世俗法律的期望."

