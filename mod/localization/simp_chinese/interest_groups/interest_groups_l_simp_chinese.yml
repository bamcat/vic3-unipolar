l_simp_chinese:

  # Base IGs
 ig_rural_folk:0 "农村民俗"
 ig_rural_folk_only_icon:0 "@rural_folk!"
 ig_rural_folk_desc:0 "农村人民的政治利益与其农业生计基本一致。"
 ig_devout:0 "宗教原教旨主义者"
 ig_devout_only_icon:0 "@devout!"
 ig_devout_desc:0 "多数宗教最敬业的信徒,视之为道德和政治智慧的最佳源泉."
 ig_industrialists:0 "公司"
 ig_industrialists_only_icon:0 "@industrialists!"
 ig_industrialists_desc:0 "对技术进步和工业增长感兴趣的投资者和股东。"
 ig_landowners:0 "地主"
 ig_landowners_only_icon:0 "@landowners!"
 ig_landowners_desc:0 "大庄园和广大种植园的地主,地主是传统和旧钱的保管人."
 ig_intelligentsia:0 "学术界"
 ig_intelligentsia_only_icon:0 "@intelligentsia!"
 ig_intelligentsia_desc:0 "知识分子在文学,艺术,音乐和戏剧方面领导着全国的趋势. 还包括共同管理阶层/"
 ig_petty_bourgeoisie:0 "城市居民"
 ig_petty_bourgeoisie_only_icon:0 "@petty_bourgeoisie!"
 ig_petty_bourgeoisie_desc:0 "小企业、办公室职员、会计师和其他被视为贫富阶层之间的个人。"
 ig_armed_forces:0 "武装部队"
 ig_armed_forces_only_icon:0 "@armed_forces!"
 ig_armed_forces_desc:0 "专业士兵和其他利益与国家军事关系密切的人。"
 ig_trade_unions:0 "工会"
 ig_trade_unions_only_icon:0 "@trade_unions!"
 ig_trade_unions_desc:0 "组织劳工试图组织矿场、工厂和田地的工人,从而将不同利益集团的优势集中到一个声音中。"

  # Religious IGs
 ig_catholic_church:0 "天主教会"
 ig_catholic_church_desc:0 "天主教是基督教中最大的教派. 信众认为罗马大主教,教宗,是耶稣基督通过圣彼得不断继承权威的接班人. 其他重要信仰包括圣人和圣母玛利亚的虔诚."
 ig_orthodox_church:0 "东正教会"
 ig_orthodox_church_desc:0 "东正教会往往为东方教会,而不是同教宗的圣餐会."
 ig_oriental_orthodox_church:1 "东方东正教会"
 ig_oriental_orthodox_church_desc:1 "东方正教会往往是中东的教堂,而不是与教宗的圣餐会."
 ig_anglican_church:0 "英国圣公会"
 ig_anglican_church_desc:0 "圣公会由国王亨利八世在新教改革期间所创建. 英国圣公会认为"圣经"是基督教教条的主要权威,拒绝教宗,同时比起其他福音会的教条更加激进."
 ig_evangelical_church:0 "福音教会"
 ig_evangelical_church_desc:0 "福音会教堂多是新教改革期间创建于北欧. 福音派认为"圣经"是对基督教教条的唯一权威,拒绝教宗,并视天主教对圣徒的虔诚为与以偶像为界."
 ig_rabbinical_council:0 "犹太教理事会"
 ig_rabbinical_council_desc:0 "国家犹太民众的领导者往往受过良好教育,具有强烈的辩论和奖学金传统。"
 ig_sunni_madrasahs:1 "逊尼派乌里玛派"
 ig_sunni_madrasahs_desc:1 "逊尼派是伊斯兰教中最大的教派. 信徒们认为,穆罕默德被他的叔叔阿布·巴克尔继承为伊斯兰教的卡利夫,而不是什叶派认为他的女婿阿里是合法继承人的观点。"
 ig_shia_madrasahs:1 "乌里玛岛"
 ig_shia_madrasahs_desc:1 "什叶派是伊斯兰教的第二大教派. 信众认为,穆罕默德被他的女婿阿里继承为伊斯兰教的卡利夫,而逊尼派认为他的叔叔阿布·巴克尔是合法继承人。"
 ig_hindu_priesthood:0 "印度教牧师会"
 ig_hindu_priesthood_desc:0 "印度教认为,要打破转世的循环并实现Nirvana, 就必须坚持种姓制度,"
 ig_vajrayana_monks:0 "瓦杰拉亚纳僧侣"
 ig_vajrayana_monks_desc:0 "活佛佛教在西藏和蒙古最强. 它强调使用冥想和自律。"
 ig_mahayana_monks:0 "马哈亚纳僧侣"
 ig_mahayana_monks_desc:0 "马哈亚纳佛教在中国,越南和韩国最为强大. 它强调,应鼓励社会中的每一个人通过完善寻求启蒙。 马哈亚纳视佛为神通相."
 ig_theravada_monks:0 "塞拉瓦达僧侣"
 ig_theravada_monks_desc:0 "斯拉瓦达佛教在缅甸,暹罗,柬埔寨和锡兰最为强大. 它十分重视寻求尼尔瓦纳来打破转世循环的个人. 斯拉瓦达将佛陀看成不是神,而是一个开明的人,他向人类的其他人展示了通向完美的道路."
 ig_shinto_monks:0 "神道僧侣"
 ig_shinto_monks_desc:0 "神道教是一种同步的信仰,将佛教的因果观和转世观同对克米,自然之灵和已死的祖先的崇拜和安抚结合起来."
 ig_pagan_shamans:0 "帕格纳·沙曼斯"
 ig_pagan_shamans_desc:0 "活泼是崇拜和安抚自然精神. 动画家们的礼仪包括牺牲食物和牲畜,以及用致幻药物进行入想的精神旅程."

  # Taiping IGs
 ig_taiping_god_worshippers:0 "神巫会"
 ig_taiping_god_worshippers_desc:0 "神巫会,即皇帝巫师会,是一个在天国中突出的同步基督教信仰,支持对基督教的解释,将所有信徒视为上帝的儿女."

  # British IGs
 ig_landed_gentry:0 "着陆的Gentry"
 ig_landed_gentry_desc:0 "拥有大庄园和大片地产的 落地的甘地是传统和旧钱的保管人"

  # Prussian IGs
 ig_junkers:0 "瘾君子"
 ig_junkers_desc:0 "顺克家族是普鲁士的贵族和主要地主。 他们往往反对民主运动,认为这是对精英统治的威胁。"

  # USA IGs
 ig_southern_planters:0 "房屋拥有者"
 ig_southern_planters_desc:0 "虽然近年来住房越来越少,但声称自己是房屋所有者协会的一群人为了利润而买卖地产,人为地夸大了生活费用。"
 ig_evangelicals:0 "辩证基督徒"
 ig_evangelicals_desc:0 "基督教徒都同意国家需要找到自己的精神觉醒,"
 ig_yeoman_farmers:0 "南方农村居民"
 ig_yeoman_farmers_desc:1 "美国农村阶级的小国,被许多开国元勋视为国家的基石. 尧曼阶级长期确立自己是美国农村民粹主义的先锋."
 ig_wallstreet:0 "华尔街"
 ig_wallstreet_desc:0 "纽约华尔街的投资银行是美国金融系统的支柱,体现了对整个经济的极端影响."
 ig_silicon_valley:0 "硅谷"
 ig_silicon_valley_desc:0 "管理互联网上日常生活的程序员和在家工作的电脑微震。"
 ig_american_middle_class:0 "中美洲"
 ig_american_middle_class_desc:0 "美国中产阶级占该国消费基础的大多数,他们从事的工作可产生可活的工资。"
 ig_digital_activists:0 "数字活动家"
 ig_digital_activists_desc:0 "各种网络影响者对我们的人民拥有权力。"
  # Ottoman IGs
 ig_local_governors:0 "地方州长"
 ig_local_governors_desc:0 "各省的统治者可以通过建立当地的赞助网络来获得巨大的影响力. 诸王朝可以变得如此强大,它们实际上都是独立国家,只是名义上与帝国联系在一起."

  # Chinese IGs
 ig_literati:0 "文学"
 ig_literati_desc:0 "在中国的学者既作为政府的支持者,又作为政府的批评者,起着重要的作用."
 ig_scholar_officials:0 "学者-官员"
 ig_scholar_officials_desc:0 "在中国登陆的甘地其实不是中国的贵族. 他们通过购买地产来保存自己的财富,但他们将权力归功于他们在政府中的地位."
 ig_confucian:0 "儒家学者"
 ig_confucian_desc:0 "更是一种社会传统,儒家主义与多种信仰和谐地并存,但要求遵循儒家主义的人实现社会和谐和强烈的道德."

  # Papal IGs
 ig_roman_landowners:1 "公民贵族"
 ig_roman_landowners_desc:1 "罗马公民贵族由教宗授予的贵族家族和拥有土地的精英组成,是整个罗马教廷领土拥有财富、影响力和时间权力的人。"
 ig_roman_curia:0 "罗马库里亚"
 ig_roman_curia_desc:0 "罗马库里亚(Roman Curia),或"罗马法院",有时也称"罗马法院",是教廷的行政机构,既行使教会权力,也行使时间权力."

  # Japanese IGs
 ig_samurai:0 "武士队"
 ig_samurai_desc:0 "武士是日本世袭的军事贵族,是拥有大明的强大土地的特权保留者,也是其封建主人意志的执行者。"
 ig_shogunate:0 "幕府"
 ig_shogunate_desc:0 "幕府指自12世纪起以天皇之名统治日本的军政府. 在强大的封建领主戴兆尧的支持下安心,不屈不挠地致力于维护日本的传统秩序."
 ig_peasants:1 "He"
 ig_peasants_desc:0 "海民指日本平民阶级,生来没有任何社会特权,政治利益主要反映农村农民的利益."
 ig_buddhist_monks:0 "佛教僧侣"
 ig_buddhist_monks_desc:0 "到19世纪,佛教在日本存在已有一个多世纪,而且往往与日本本土对卡米的信仰相悖。 整个江户时代,国家赞助的佛教学校强调kami和buddha之间的同步关系。"

  # Hawaiian IGs
 ig_christian_missionaries:0 "基督教传教士"
 ig_christian_missionaries_desc:0 "基督教传教士仅仅在几十年前来到了哈瓦伊,但已经取代了卡胡纳人成为了哈瓦伊的主要文书阶层。 他们主张同西方列强进行贸易,从西方吸引移民,并让夏威夷原住民皈依基督教."
 ig_alii:0 "阿里伊语Name"
 ig_alii_desc:0 "阿里代表哈瓦伊的下等贵族, 他们主张传统价值观并维护君主制统治."
 ig_maka_ainana:0 "马卡伊娜娜"
 ig_maka_ainana_desc:0 "Makañinana代表Hawai的农村阶层, 他们主张传统价值观,主张哈瓦伊继续经济依赖农业部门。"
 ig_hawaiian_democrats:0 "民主党"
 ig_hawaiian_democrats_desc:0 "民主党代表哈瓦伊的自由派改革者. 他们主张去除君主的绝对权力,主张建立一个民主政权并维持同西方列强的贸易关系."

  # Swedish IGs
 ig_church_of_sweden:0 "瑞典教会"
 ig_church_of_sweden_desc:0 "瑞典会堂由16世纪的古斯塔夫·瓦萨国王所策动,是瑞典官方的国家会堂. 作为一个路德会机构,教会认为"圣经"是对基督教教条的唯一权威,因此否定了教宗的权威和圣人复仇等传统."

  # Finnish IGs
 ig_church_of_finland: "芬兰教会"
 ig_church_of_finland_desc: "1809年从芬兰从瑞典分离而来,芬兰教会被确立为该国官方的国家教会. 作为一个路德会机构,教会认为"圣经"是对基督教教条的唯一权威,因此否定了教宗的权威和圣人复仇等传统."

# Danish IGs
 ig_church_of_denmark: "丹麦教会"
 ig_church_of_denmark_desc: "丹麦会堂由国王克里斯蒂安三世于16世纪所建立,是丹麦官方的国家会堂. 作为一个路德会机构,教会认为"圣经"是对基督教教条的唯一权威,因此否定了教宗的权威和圣人复仇等传统."

# Norwegian IGs
 ig_aristocracy_of_officials: "官员的贵族政治"
 ig_aristocracy_of_officials_desc: "挪威缺乏任何重要的历史贵族地位,而且该机构在1821年被正式废除,挪威的上层阶层则由公务员组成,律师、牧师和医生占据着传统贵族的地位。"
 ig_church_of_norway: "挪威教会"
 ig_church_of_norway_desc: "挪威会堂是作为独立于罗马天主教会的机构而建立的,并由于新教改革而于16世纪与挪威国家合并. 作为一个路德会机构,教会认为"圣经"是对基督教教条的唯一权威,因此否定了教宗的权威和圣人复仇等传统."

  # Korean IGs
 ig_yangban:0 "杨班官员"
 ig_yangban_desc:0 "杨班人代表着朝鲜的登陆地和未登陆地, 他们是朝鲜传统秩序的坚定捍卫者。"

  # Russian IGs
 ig_gentry_assembly:0 "动工组装"
 ig_gentry_assembly_desc:0 "银河议会(Gentry Assembly)是代表俄罗斯贵族政府的自治机构. 1785年获得官方地位,此后议会一直主张保留或扩大贵族的传统权力和特权."

  # Australian IGs
 ig_squattocracy: "独裁"
 ig_squattocracy_desc: "澳大利亚白人定居者占领了大片土地, 通常最早到达某一地区的定居者,占地制主要通过在其领土上饲养牲畜的收入而获得巨大的财富和社会影响。"

  # Austrian IGs
 austrian_aristocracy:0 "奥地利贵族"
 austrian_aristocracy_desc: "奥地利贵族代表奥地利已确立的贵族阶层,历史上由奥地利的哈布斯堡神圣罗马皇帝和大公授予贵族头衔,并拥有帝国宫廷内的巨大影响力."

  # Misc Igs
 ig_red_army:0 "红军"
 ig_red_army_desc:0 "红军是专门保卫并宣传革命的机构,由传统武装力量与无产阶级和共产党思想相融合而生."
 ig_fellahin: "费拉欣"
 ig_fellahin_desc: "从他们工作的犁地和他们耕到的田地中取出他们的名字, 村长就是埃及的农民和农民。"

  # Indian IGs
  ig_zamindars: "扎明达尔人"
  ig_zamindars_desc: "扎明达尔人通常是大庄园的世袭地主. 他们常常代表莫卧儿时代的贵族统治的后遗症,被授予代表其统治者收取土地收入的权利."

  ig_east_india_company: "东印度公司"
  ig_east_india_company_desc: "东印度公司是在英国议会监督下负责统治印度的私营公司. 在1833年撤销其商业任务后,它成为一个纯粹的行政机构."

  ig_presidency_armies: "总统军队"
  ig_presidency_armies_desc: "总统府军队是殖民印度的武装部队,通常由由由欧洲军官所指挥的本土印度人所组成."

  ig_indian_army: "印度陆军"
  ig_indian_army_desc: "印度军队是殖民印度的主要武装力量,通过将总统府军队统一为一个单一机构而形成. 它主要由由欧洲军官所指挥的印度本土士兵所组成."

  ig_ryots: "瑞奥"
  ig_ryots_desc: "雷奥特人是印度的传统农民和农民,一般没有自己的土地. 他们的利益基本上是农业性质的。"

  ig_civil_servants: "公务员"
  ig_civil_servants_desc: "公务员包括印度本土的知识分子,这种知识分子主要来自印度殖民官僚机构的各个机关。 他们通常担任或曾经担任过书记员或其他中低级管理人员。"

  ig_government_of_india: "印度政府"
  ig_government_of_india_desc: "印度政府指负责推进英王在印度的利益的欧洲殖民政府."

  ig_bhadralok: "巴德拉罗克"
  ig_bhadralok_desc: "Bhadralok,或"gentlemen"包括了印度社会中有钱的中产阶级. 目前形式的这一群体起源于孟加拉人,包括本土孟加拉商人、实业家和在征服印度期间与东印度公司结盟的金融家。"

  ig_kisanharu: "克桑哈鲁"
  ig_kisanharu_desc: "克桑哈鲁人是尼泊尔的传统农民和农民,一般没有自己的土地. 他们的利益基本上是农业性质的。"
