l_simp_chinese:
 
  # Middle East
  YMN_FLAVOR_TEXT:0 "在也门,旧政府、过渡委员会和胡塞派之间爆发了战争。 这场残酷的战争带来了阿拉伯列强的目光,使他们相互对峙,为也门谋取利益。 也门必须忍受其邻国的征服,还是能够从上面出来?"
  HOU_FLAVOR_TEXT:0 "$YMN_FLAVOR_TEXT$"
  STC_FLAVOR_TEXT:0 "$YMN_FLAVOR_TEXT$"
  SYR_FLAVOR_TEXT:0 "叙利亚目前正遭受一场复杂的内战之苦,这场战争已变成针对几个大国的代理战争. 该地区仍然极具敌意, 临时政府相信他们有权统治, 难民离开并聚集了欧洲,寻找更安全的土地来生活。 叙利亚是否会结束战争, 并把他们迅速消散的人口带回来, 还是注定要失败,"
  SIG_FLAVOR_TEXT:0 "$SYR_FLAVOR_TEXT$"
  ROJ_FLAVOR_TEXT:0 "$SYR_FLAVOR_TEXT$"
  IRA_FLAVOR_TEXT:0 "伊朗正处在伊斯兰革命的边缘, 然而,青年民众并未忽视阿拉伯之春的影响,民众渴望结束其极端主义的传统方式。 伊朗能否坚持其传统价值观? 还是要被更多文化的民众所推翻?"
  
  # East Asia
  PRC_FLAVOR_TEXT:0 "中华人民共和国坐落于全球经济霸道中,一直为不太幸运的国家做金融家. 然而,债务陷阱计划正在反射出,对中国制造商品的依赖正被邻近邻国和自动化削弱。 中国能否重新确立经济主导地位. 还是他们注定会因为内部紧张而解体?"
  NRK_FLAVOR_TEXT:0 "朝鲜仍是地球上最后的毛泽东独裁政权堡垒. 国家的各种思维游戏和洗脑仍然非常有效, 80年的政权还会延续80年吗? 还是要和南边的邻居团聚?"
  JPN_FLAVOR_TEXT:0 "自二战结束以来,日本一直是一个被解除武装的国家,但这并没有阻止它们极端的经济控制。 日本汽车与日本电子相通被誉为"世界一流"并被誉为"最优秀". 但这不是没有牺牲... 该国人口老化,许多区域强国之间纷争不休。 日本要保持独立需要什么?"
  
  # Oceania
  AUZ_FLAVOR_TEXT:0 "澳大利亚 机会之地 梦想 澳洲虽有缺点, 环境更温暖, 但国内政治分歧和气候变暖, 澳大利亚能否成功穿越现代世界?"
  
  # Balkans
  SRB_FLAVOR_TEXT:0 "塞尔维亚坐落为平庸国家并是南斯拉夫实验失败后的最后残余. 在过去几年中失去了黑山和科索沃,国家渴望取得胜利。 塞尔维亚会重新获得南斯拉夫失去的光荣吗?"
  
  # Europe
  ENG_FLAVOR_TEXT:0 "英格兰在20世纪一直以大国的威力咆哮,无论有多起经济衰退,广泛的政治腐败和合法性的削弱都使联合行为受到质疑. 英格兰能否保留对自己的统治权的控制? 还是离开欧洲市场是最后的稻草?"
  SCO_FLAVOR_TEXT:0 "在21世纪初的经济衰退中,苏格兰一直相对没有受到破坏,自移交权力以来继续繁荣。 工会内部的大规模腐败和代表性的失败引起了人们的质疑。 它一旦获得独立会繁荣吗? 还是说联合是未来的道路?"
  NIR_FLAVOR_TEXT:0 "大英帝国主义在爱尔兰的最后一个站,北爱尔兰是一个等待被点燃的火药桶. 麻烦可能已经解决了,但随着年轻一代渴望与南方同胞团聚,主权问题继续渗透...... 英国对爱尔兰的控制,它会走君主之路吗?"
  IRE_FLAVOR_TEXT:0 "爱尔兰已经从英国帝国主义的后台下的国家转变为盎格鲁派的光辉明亮的灯塔,重新燃起自己语言并远离联合王国的努力已经证明是成功的,爱尔兰和其北方邻国之间的努力导致了团结的愿望。 接下来翡翠岛会怎么样?"
  UKR_FLAVOR_TEXT:0 "乌克兰国内的西化努力已经取得了很大进展,许多乌克兰人的生活正在迅速改善,然而俄罗斯8年前对克里米亚的入侵夺走了一个重要的地区. 东部的分裂主义者也给俄罗斯开辟了进入心脏地带. 乌克兰能否让分离主义者重新陷入困境,"
  CYP_FLAVOR_TEXT:0 "塞浦路斯坐落于由各族群分出的一个岛屿上,南部为希腊人,北部为土耳其人. 然而,塞浦路斯的特性正在日益形成,而且可能不久就有人要求彻底统一国家。 塞浦路斯是否能够成功地统一,还是注定永远分裂?"
  BYL_FLAVOR_TEXT:0 "白俄罗斯正处于一场政治革命的开端, 卢克申科正向俄国邻居取暖,以保护他的控制权. 卢卡申科会成功,还是白俄罗斯人会结束他的非法政府?"
  SPA_FLAVOR_TEXT:0 "西班牙在法朗主义运动被推翻后正在经历一个令人愉快的繁荣,它是一个迅速现代化的国家,并正在努力为其人民争取更大的未来。 然而,并不是所有人都同意他们的方向,因为加泰罗尼亚的独立运动得到了蒸汽. 西班牙能否与加泰罗尼亚并存?"
  XSP_FLAVOR_TEXT:0 "西班牙在法朗主义运动被推翻后正在经历一个令人愉快的繁荣,它是一个迅速现代化的国家,并正在努力为其人民争取更大的未来。 然而,并不是所有人都同意他们的方向,因为加泰罗尼亚的独立运动得到了蒸汽. 西班牙能否与加泰罗尼亚并存?"
  NRW_FLAVOR_TEXT:0 "挪威仍然是进入21世纪的少数几个国家之一,它是一个比以前更强大的国家,一个强大的社会安全体系和强大的资源,它可以推向市场,使它成为梦想的奢侈地。 然而,随着世界从石油向外过渡,挪威能否成功地保持其实力,或者石油的消亡将是其消亡?"
  RSF_FLAVOR_TEXT:0 "然而,自苏联倒台以来,作为继承国的俄罗斯一直未能保持同样的经济实力和实力。 自工会倒台以来,它的大部分活动都是重建经济支配地位. 2008年在格鲁吉亚境内,2014年在乌克兰境内. 然而寡头党却说到另一起进入乌克兰的运动, 这是他们在21世纪的路线,还是他们要失败?"
  EUR_FLAVOR_TEXT:0 "欧洲联盟是二战造成破坏后战后重建的智囊团。 此后逐渐发展为包括了大陆的大部分地区,禁止了挪威和瑞士等一些国家,或西巴尔干半岛和前尤戈斯拉夫国家. 自从英国非同寻常地选择脱离联盟后, 欧洲联盟会演变成欧洲联邦吗? 或者说,欧洲联盟最后会只在历史书上被提及吗?"
  TRK_FLAVOR_TEXT:0 "蒂尔基耶坐落于俄罗斯适航野心中的主要屏障上,在众多邻国上握有战略钩. 它积极参与其南部的冲突,支持叙利亚临时政府,并在非洲和中东部有活跃的民兵。 蒂尔基耶在安纳托利亚地区的地位为它提供了对周围地区的极大控制,并巩固了之前奥斯曼人的野心. Türkiye会坚持它的野心吗? 还是注定要像奥斯曼人那样失败?"
  
  # North America
  USS_FLAVOR_TEXT:0 "由于战后经济繁荣,美国拥有了繁荣的20世纪,到本世纪末,美国已发展成为唯一的超级大国。 然而,企业的大规模腐败和下手策略却使工会内部的布局四分五裂。 美国在社会和经济上都落后。 未来对邦联有何牵制,他们是否能够收复旧有的荣耀?"
  MEX_FLAVOR_TEXT:0 "毒品卡特尔和美帝国主义是21世纪墨西哥的决定性特征. 然而,为了解决卡特尔问题,美国已经做出了许多努力,但没有在它们的土地上发动战争。 下个世纪墨西哥有什么 能够成功逃脱美帝国主义的魔掌"
  CAN_FLAVOR_TEXT:0 "加拿大作为一个没有重大问题的稳定国家,在21世纪肆虐。 然而,自加拿大王国建立以来,第一民族要求对其可怕的待遇作出让步。 加拿大会承认吗?"
  
  # Central Asia
  AFH_FLAVOR_TEXT:0 "阿富汗帝国墓地成功抵抗了美帝国主义的努力,并保证了它作为一个地区强国的主权. 然而,不同族裔群体和诋毁信仰者之间的冲突威胁到了传统生活方式。 阿富汗能否成功地摆脱其传统做法?"
  AZB_FLAVOR_TEXT:0 "阿塞拜疆是一个繁荣的可口可乐国家,最近发现的石油和天然气储备使它成为欧洲的重要盟友,然而阿尔察克冲突,以及随后同邻国亚美尼亚的边境战争一直阻碍它们达到其最伟大的地步。 阿塞拜疆能和平解决这场危机,还是会陷入战争?"
  KZK_FLAVOR_TEXT:0 "哈萨克斯坦处于不同领导层和政府之间,已经陷入温和的无政府状态。 其前领导人留下了巨大的权力真空, 哈萨克斯坦能活下来吗?"
  UZB_FLAVOR_TEXT:0 "乌兹别克斯坦自90年代从苏联分离以来,一直在努力摆脱独裁统治,然而,它成功地开始自由化,并继续改善与邻国的关系。 虽然它继续变得更加幸运,但不能说它的一些邻国也是如此,它需要宣布它的主权才能活下来. ."
  
  # Africa
  SAF_FLAVOR_TEXT:0 "南非是一个正在努力寻找自己道路的国家,确定南非历史的冲突导致它们充其量是各族裔群体之间的怨恨,而这种紧张关系却因种族隔离而恶化。 如果南非打算繁荣,它有一条艰难的让步、重建和政治改革的道路。 南非能做到这一点吗? 或者它注定要崩溃。"
  SSD_FLAVOR_TEXT:0 "南苏丹是尼罗河沿岸各族裔群体冲突所生,是联合国承认的最新国家,离取得成功还有很长的路要走。 种族关系紧张使国家陷于停滞,必须谨慎行事,确保国家不短命。 它有能力吗?"
  ETH_FLAVOR_TEXT:0 "埃塞俄比亚是一个迅速现代化的国家,它设法相对没有被殖民者所清除。 然而,由于索马利族、蒂格雷族和奥罗米亚族威胁要将埃塞俄比亚分离并拖入一场代价高昂的内战,埃塞俄比亚仍然有麻烦。 尽管局势紧张,埃塞俄比亚能否继续繁荣?"
  EGY_FLAVOR_TEXT:0 "埃及在极度缺水的情况下, 尼罗河逐渐干涸。 埃及能否找到应对危机的办法?"
  KYA_FLAVOR_TEXT:0 "肯尼亚是一个结构健全的非洲国家,正在成功地进行现代化努力并迅速提高生活水平。 虽然肯尼亚大多没有严重的问题, 在政治领域有组建东非超级大国的会谈。 肯尼亚能否成功地为形成非洲超级大国奠定基础? 邻国内部的动乱也会影响自己的土地。"
  MOR_FLAVOR_TEXT:0 "摩洛哥在巧妙地征服了萨拉维共和国并大大改善了经济差距之后,已发展到21世纪。 它现在寻求欧洲列强的伙伴关系,以促进其经济流动性,并成为非洲大陆上的一个主要角色。 摩洛哥的雄心能否实现?"
  GHA_FLAVOR_TEXT:0 "在80年代一个残暴的军政府绰号"克德肖普"后,加纳的经济状况开始大规模地分崩离析. 然而,自政党回归和选举以来,该国已恢复到稳定和经济繁荣的时期,预计将继续这样做。 然而,萨赫勒地区的气候危机和荒漠化再次威胁到不稳定。 加纳能否成功地导航这些条件?"
  
  # South Asia
  VNM_FLAVOR_TEXT:0 "越南自非殖民化以来就是一个相对稳定的国家。 作为少数几个极左的市场经济经济体之一,它有其好处,虽然它的公民忍受着相对的和平,但游客却压倒了该国。 谨慎的选择和聪明的地缘政治可以使它在21世纪非常成功. 然而,它会作出这些选择吗?"
  IDA_FLAVOR_TEXT:0 "印度不仅活了下来,而且自英国拉伊和400年殖民统治结束后繁荣起来。 然而,由于缅甸、孟加拉国和巴基斯坦的分离,一些后殖民时期的创伤在本来体面的记录中是一个疤痕。 印度和巴基斯坦之间关于查谟和克什米尔地的紧张局势不断加剧,这是引起人们关注的一个主要原因,在阿伦恰尔邦问题上,与中华人民共和国的紧张关系不断加剧,正在使武装冲突发挥作用。 印度能成功地再抵抗100年帝国主义吗?"
  PAK_FLAVOR_TEXT:0 "巴基斯坦在40-50年代因后卫与穆斯林之间的宗教紧张关系而与拉杰分道扬镳. 虽然许多人认为冲突即将结束,但巴基斯坦各族裔群体之间的冲突正在酝酿之中。 巴基斯坦是否能够驾驭这些问题?"
  
