  ARG_FLAVOR_TEXT:0 "阿根廷经历了20世纪的重大成功之后,由于美国的干预和关于马尔维纳斯群岛的冲突失败而动摇了。 当地马普切人、阿让廷州和布宜诺斯艾利斯政府之间的争端, 阿根廷能否重新提升国家地位,"
  
