objective_the_west_name_USA:0 "独一超能力"
objective_the_west_name_GBR:0 "问题"
objective_the_west_name_FRA:0 "密特朗的法国"

objective_the_west_desc_USA:0 "美利坚合众国在21世纪之交处于独特的地位。 作为世界第一超级大国,也是人类所见过的最强大的民族国家,共和国面临着一系列困难的外在和内部问题。 尽管美国的主要对手苏联解体了,恐怖主义的威胁,中国,以及对自由世界的各种其他威胁,都称美国卷入了质疑. 美国会仍然是世界超级大国吗? 时间会告诉我们的。"
objective_the_west_desc_GBR:0 "1992年,联合王国正努力应对经济不稳定和政治动荡。 该国最近摆脱了以高失业率和消费者信心下降为特征的深度衰退。 加上英国的忧患, 北爱尔兰的不稳定, 大不列颠如何活过这些动荡的时代?"
objective_the_west_desc_FRA:0 "法国政治格局的特点是,由于欧洲一体化和国内经济挑战而日益紧张。 总统弗朗索瓦·密特朗(François Mitterrand)在第二个任期内是一名社会主义者,随着该国面临高失业率和经济增长缓慢而面临受欢迎程度下降. 他的政府由皮埃尔·贝雷戈沃伊总理领导,正努力解决公众对旨在稳定经济的紧缩措施的不满。 在政治上,法国对"马斯特里赫特条约"存在深刻分歧,该条约旨在加强欧洲一体化,为欧元铺平道路. 欧盟有在21世纪生存所需的条件吗?"

objective_the_east_name_RUS:0 "苏联解体"
objective_the_east_name_PRC:0 "大人民共和国"
objective_the_east_name_IRQ:0 "萨达姆·侯赛因的伊拉克"

objective_the_east_desc_RUS:0 "1991年12月苏联解体后,俄罗斯正经历一场戏剧性的政治变革. 俄罗斯联邦第一任总统鲍里斯·叶利钦面临巨大挑战,即领导新生的民主,同时引导从集中的共产主义制度向市场经济的混乱过渡。 在国内,叶利钦政府挣扎于政治不稳定,通货膨胀上升,以及广泛的社会动荡,如经济改革,被称作"冲击疗法",导致数百万人陷入困境. 在外交上,俄罗斯试图重新定义自己在世界舞台上的作用,同西方列强建立新的关系,同时试图保持对前苏联各共和国的影响力."
objective_the_east_desc_PRC:0 "中国正在从国际孤立和西方国家的制裁中谨慎地崛起. 从政治上讲,国家牢牢地处于中共控制之下,邓小平虽然正式从领导岗位上退休,但仍保持着显著的影响力. 他于1992年初出名的"南方之旅"重振了中国对经济改革和开放的承诺,标志着中国重新向面向市场的政策推进,并与全球经济进一步融合."
objective_the_east_desc_IRQ:0 "Reeling from a devastating loss in the Gulf War last year, and facing intense international isolation. Saddam Hussein remained firmly in power, maintaining an iron grip on the country through brutal repression of internal dissent, particularly against the Shi'a in the south and the Kurds in the north. Iraq truly has several paths going into the 2000s.

objective_rising_powers_name_IDA:0 "印度世纪"
objective_rising_powers_name_BRZ:0 "巴西的崛起"
objective_rising_powers_name_VNM:0 "越南的崛起"

objective_rising_powers_desc_IDA:0 "印度正在经历一个重大政治和经济变革的时期。 国家由总理P.V.Narasimha Rao领导,他于1991年上台,并发起了一系列改革经济改革,旨在使经济自由化并更紧密地融入全球市场。"
objective_rising_powers_desc_BRZ:0 "1992年,巴西正处在1985年军事统治结束后的政治过渡中. 国家由费尔南多·科洛尔·德梅洛总统执政,他于1990年就任巴西20多年来第一位直接当选总统. 科洛尔的政府开始于一波旨在稳定经济的经济改革,但很快他的政府由于通货膨胀上升和腐败指控而面临公众日益失望. 到1992年,科洛尔被卷入了一起重大的腐败丑闻,导致群众抗议并号召他弹劾. 在外交方面,巴西注重改善其国际形象并扩大其在拉丁美洲的影响力。 它还在寻求与西方国家建立更紧密的联系,同时在全球问题上,特别是在与亚马孙雨林有关的环境问题上维护其作用。 然而,政治不稳定和经济困难继续主导着国家议程。"
objective_rising_powers_desc_VNM:0 "越南在越南战争结束后,经过多年的孤立和经济制裁的严厉影响,越南逐渐重新融入了国际社会。 1992年,越南同美国实现关系正常化并加入东南亚国家联盟(东盟),这标志着向扩大区域合作的转变,以及改善同西方关系的兴趣. 越南会走什么路? 这取决于你。"
