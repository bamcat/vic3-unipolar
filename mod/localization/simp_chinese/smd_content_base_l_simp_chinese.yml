 great_polarization.5.f:0 "现在可以搜索那些小声的"
 great_polarization.5.a:0 "稽算相散."
 great_polarization.5.b:0 "建立制度性问责渠道."

 great_polarization.6.t:0 "少数群体"
 great_polarization.6.d:0 "对少数群体的敌意激增,引发了抗议、反抗议和关于种族主义、身份认同和民族归属的重新辩论。"
 great_polarization.6.f:0 "对一些人来说,这是反弹。 对其他人来说,这是生存。"
 great_polarization.6.a:0 "街道又填满了。"
 great_polarization.6.b:0 "谴责反弹并降低温度。"

 great_polarization.20.t:0 "温地瀑布"
 great_polarization.20.d:0 "极化并没有消失,但最危险的螺旋被中断. 政治机构已经恢复了一些合法性。"
 great_polarization.20.f:0 "一个共和国之所以能活下来,不是因为它的公民同意,而是因为他们中有足够的人接受失败。"
 great_polarization.20.a:0 "工会是忍耐的"

 great_polarization.21.t:0 "鸿沟"
 great_polarization.21.d:0 "即刻的危机并未被爆发为内战,但两极分化已植入了美国的政治生活."
 great_polarization.21.f:0 "发烧没有破裂。 它变得慢性。"
 great_polarization.21.a:0 "新寻常."

 great_polarization.100.t:0 "第二次美国内战"
 great_polarization.100.d:0 "一场革命性危机已经打破了美国. 联邦权力受到争议,武装派别开始将国家划入敌对政府."
 great_polarization.100.f:0 "第一次国共内战时,询问该联盟是否能够活下来. 第二问如何是工会."
 great_polarization.100.a:0 "工会骨折."

