 # ==========================================
 # JOURNAL ENTRY
 # ==========================================
 
 je_covid_pandemic: "COVID-19 大流行病"
 je_covid_pandemic_reason: "在[ROOT.GetCountry.GetName]中出现了一种新型的呼吸道冠状病毒,并正在迅速向全世界扩散。 COVID-19在活的记忆中传播的速度比任何病原体都要快,利用将现代世界联系在一起的密集贸易和旅行网络. 死亡率集中在老年人和免疫妥协者身上——但是,其影响范围很广,有可能使其所接触的每个国家的保健系统不堪重负。 封锁减缓了传播速度,但打击了经济。 面具和相距相去甚远,效果较低,但更可持续。 无所事事也是一种选择——选民和死者都会记得。"
 
 # ==========================================
 # covid.1 — PANDEMIC ARRIVES
 # ==========================================
 
 covid.1.t: "小说科罗纳病毒"
 covid.1.d: "在[SCOPE.sState('plague_origin_state').GetName],[ROOT.GetCountry.GetName]中报告了一组异常肺炎病例。 由[ROOT.GetCountry.GetAdjective]卫生当局进行的初步分析表明,一种以前未知的冠状病毒——会传播人与人,孵化期足够长,使携带者在知道自己生病之前传染。\n\n世界卫生组织已经得到通知。 这是否仍然是一场局部爆发,还是成为更多取决于今后几周作出的决定。"
 covid.1.f: "一种新的病原体。 再来"
 covid.1.a: "通知世卫组织并开始联系追踪"
 
 # ==========================================
 # covid.2 — SPREAD
 # ==========================================
 
 covid.2.t: "COVID-19 到达 [ROOT.GetCountry.GetName]"
 covid.2.d: "最初在[SCOPE.sCountry('plague_originator_country').GetName]中发现的新冠病毒病例在[ROOT.GetCountry.GetName]中得到证实。 该病毒已经到来——通过旅行者,贸易路线,或仅仅是连接世界的隐形电流. \n\n[ROOT.GetCountry.GetAdjective]卫生主管部门正在激活大流行病响应协议. 使用 #bold COVID-19反应#!决定设置政策."
 covid.2.f: "这只是时间问题。"
 covid.2.a: "激活大流行病协议"
 
 # ==========================================
 # covid.3 — SUBSEQUENT WAVES
 # ==========================================
 
 covid.3.t: "缩略语变体"
 covid.3.d: "新变体已引起一股新浪COVID-19感染. 卫生当局正在重新评估控制协议。"
 covid.3.f: "病毒还在我们身边"
 
 # ==========================================
 # covid.4 — NOTIFICATION TO OTHER PLAYERS
 # ==========================================
 
 covid.4.t: "来自中国武汉的新病毒"
 covid.4.a: "密切监测局势"
 
 # ==========================================
 # covid.5 — RESPONSE CHOICE
 # ==========================================
 
 covid.5.t: "COVID-19 应对政策"
 covid.5.d: "[ROOT.GetCountry.GetName] 应如何应对这一流行病? 选择将确定今后几年的经济和社会状况。"
 covid.5.f: "没有好的选择。 唯取取取舍."
 covid.5.a: "全面封锁——关闭企业,限制出行."
 covid.5.b: "蒙面任务和社会分离准则"
 covid.5.c: "保持经济开放——优先恢复."
 
 # ==========================================
 # covid.7 — WAR SUPPORT
 # ==========================================
 
 covid.7.t: "瘟疫会破坏战争的努力"
 covid.7.d: "随着COVID-19破坏[ROOT.GetCountry.GetName]人口,由[SCOPE.sCharacter('pacifist_leader').GetFullName]领导的[SCOPE.gsInterestGroup('pacifist_ig').GetName]正在质疑一个国家能否同时维持一场战争。 人口已尽. 战地医院与一线后勤竞争资源."
 covid.7.f: "对抗病毒或与敌人战斗. 两者都很难"
 covid.7.a: "战争仍在继续——病毒并没有改变"
 covid.7.b: "用公共卫生信息保持士气"
 covid.7.c: "镇压败坏的叙事"
 
 # ==========================================
 # covid.8 — POVERTY AND EVICTIONS
 # ==========================================
 
 covid.8.t: "大流行的经济代价"
 covid.8.d: "这种流行病使数千名工人付出了工作代价;在[SCOPE.sState('plague_poverty_state').GetName]中,失业率已超过20%。 家庭无法支付房租。 地主们正在推动驱逐权。 贫穷集中在已经受到这种病毒最严重影响的地区。"
 covid.8.f: "该大流行病内部的流行病。"
 covid.8.a: "暂停租房和驱逐"
 covid.8.b: "扩大社会保障和失业福利"
 covid.8.c: "市场会解决的"
 
 # ==========================================
 # covid.9 — ANTI-MASK RESISTANCE
 # ==========================================
 
 covid.9.t: "反摇篮抗议运动"
 covid.9.d: "由[SCOPE.gsInterestGroup('anti_mask_ig').GetName]领导,组织群众抗议[ROOT.GetCountry.GetName]的大流行病限制. 他们的立场:封鎖和口罩任务为政府超限,经济损失大于健康风险,公民有权做出自己的选择. \n\n. 抗议活动不断增加. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName]的答复将开创先例。"
 covid.9.f: "口罩. 他们选择的山"
 covid.9.a: "坚持不懈——限制措施"
 covid.9.b: "退后——取消限制"
 covid.9.c: "委员会的科学反驳和公共卫生运动"
 
