 # ==========================================
 # SPARK EVENTS
 # ==========================================

 2011_protests.1.t: "街上卖家自己点燃"
 2011_protests.1.d: "在省会Sidi Bouzid镇,一个名叫Mohamed Bouazizi的街头小贩在警察没收他的推车并公开羞辱他后,在地方政府办公室前放火自焚。 绝望的行为变成了一丝电击棒. 数小时内,他抗议的镜头就传遍了社交媒体. 民众不仅聚集在Sidi Bouzid, 一代人所积累的愤怒——关于腐败、失业和专制统治的磨重——找到了它的象征。 [SCOPE.GetRootScope.GetCountry.GetRuler.GetLastName]的制度必须决定如何应对。 不管它做什么,世界都在看着。"
 2011_protests.1.f: "一个人的绝望变成了一个国家的绝望."
 2011_protests.1.a: "在示威活动蔓延之前驱散示威活动"
 2011_protests.1.b: "提供特许权——宣布调查警察行为"

 2011_protests.2.t: "突尼斯人Tremor"
 2011_protests.2.d: "突尼斯的动乱使阿拉伯世界受到冲击。 卫星频道全天候从突尼斯广播场景——普通人以"x id=0"观看. 在咖啡店和社交媒体上低语的问题与该地区每个独裁政权现在都问自己:\n\n 会不会发生在这里?"
 2011_protests.2.f: "每个政权都在监视着 每个持不同政见者都在做笔记."
 2011_protests.2.a: "突尼斯是不同的,不会蔓延到[ROOT.GetCountry.GetName]。"
 2011_protests.2.b: "采取预防措施——加强安全,以免失控"

 # ==========================================
 # MISSING STRUCTURAL MODIFIERS
