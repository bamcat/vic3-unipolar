 modifier_arab_spring_transition_cabinet: "过渡政府"
 modifier_arab_spring_transition_cabinet_desc: "革命后正在组建新政府. 正当性在这些早期是很高的——但是在反革命找到立足点之前,必须巩固它."

 modifier_arab_spring_kick_out_of_insurrection: "站起起身来,从营起"
 modifier_arab_spring_kick_out_of_insurrection_desc: "革命实现了眼前的目标. 这个集团正在放弃其叛乱姿态并进入正式的政治生活,而此时的善意使这种姿态更加活跃。"

 modifier_arab_spring_regime_ig_defeated: "革命失败"
 modifier_arab_spring_regime_ig_defeated_desc: "这个团体与旧政权的联系付出了高昂的代价. 它被推出政府,其政治力量被削弱。 它是否能够从边缘重建,仍有待观察。"

# ==========================================
 # ARAB SPRING INTERNATIONAL EVENTS
 # ==========================================

 # ── arab_spring_intl.1 ───────────────────

 arab_spring_intl.1.t: "阿拉伯世界正在燃烧"
 arab_spring_intl.1.d: "从突尼斯开始, 数十年的专制统治、经济停滞和政治镇压使数百万人走上街头。"
 arab_spring_intl.1.f: "历史观察者看历史。"
 arab_spring_intl.1.a: "与抗议者站在一起——民主和人权要求"
 arab_spring_intl.1.b: "支持现政权——稳定和我们的利益优先"
 arab_spring_intl.1.c: "要求各方力行克制——敦促和平解决"

 # ── arab_spring_intl.2 ───────────────────

 arab_spring_intl.2.t: "干预问题"
 arab_spring_intl.2.d: "[scope:civil_war_country_scope.GetName] 的情况已恶化为公开内战。 [scope:civil_war_country_scope.GetRuler.GetName]的部队正在攻击平民,有可信的关于屠杀的报告。 国际社会呼吁做出回应。 现在的问题是,这种支持是否扩大到行动——以及以何种代价。"
 arab_spring_intl.2.f: "口相与行相为相异."
 arab_spring_intl.2.a: "实施禁飞区——保护平民免受空袭"
 arab_spring_intl.2.b: "武装和支持当地反对派部队"
 arab_spring_intl.2.c: "这不是我们的战争,不要插手"

 # ── arab_spring_intl.3 ───────────────────

 arab_spring_intl.3.t: "阿拉伯之春:一个反思"
 arab_spring_intl.3.d_success: "阿拉伯之春至少促成了一次真正的民主过渡。 这是一项脆弱的成就,很容易逆转——但它是真实的。 对于从远处目睹这些事件的[ROOT.GetName]来说,人们宁静地满意地看到,历史的弧能有时向正义弯曲。 现在的问题是,如何支持已经赢得的东西。"
 arab_spring_intl.3.d_islamist: "阿拉伯之春已经结束,而不是像其建筑师所希望的那样。 在整个地区,伊斯兰运动已经证明比起发动起义的世俗抗议联盟更有组织. 对[ROOT.GetName]来说,结果令人不自在:它所倡导的民主产生了政府,其价值与自己的价值截然不同。 与阿拉伯新秩序的关系需要谨慎地航行。"
 arab_spring_intl.3.d_failure: "阿拉伯之春被扑灭. 似乎颤抖的政权已经稳定下来,他们的安全部门已经重组,他们的反对派正在流亡或被监禁。 对于[ROOT.GetName],该集提醒人们,道德清晰比道德有效性容易. 引发起义的冤情尚未解决. 它们只被推迟。"
 arab_spring_intl.3.f: "世界在继续前进。 该地区没有忘记。"
 arab_spring_intl.3.a: "盘点一下发生了什么"

 # ==========================================
 # INTERNATIONAL MODIFIER NAMES
 # ==========================================

 arab_spring_intl_pro_democracy_stance: "支持民主的阵营"
 arab_spring_intl_pro_democracy_stance_desc: "该国公开赞同阿拉伯之春的抗议运动。 它在民主国家中的威望已经提高,但同现任阿拉伯政权的关系已经缓和。"

 arab_spring_intl_stability_first_stance: "稳定第一"
 arab_spring_intl_stability_first_stance_desc: "这个国家选择支持现任的阿拉伯政权反对抗议运动。 该区域的战略关系更加牢固——但代价是损害其国际声誉。"

 arab_spring_intl_neutral_stance: "谨慎限制"
 arab_spring_intl_neutral_stance_desc: "该国呼吁在不支持任何一方的情况下和平解决问题。 它保持了外交灵活性,但牺牲了对结果的影响。"

 arab_spring_intl_western_backing: "西后卫"
 arab_spring_intl_western_backing_desc: "这一运动得到了西方政府的公共支持. 国际关注正在增加其势头,使镇压给该政权造成更大的代价。"

 arab_spring_intl_regime_backing: "西部政权支助"
 arab_spring_intl_regime_backing_desc: "西方政府把重心抛到这个政府后面,而不是示威者身上. 外部验证正在加强该政权的权威和合法性。"

 arab_spring_intl_no_fly_zone: "执行禁飞区"
 arab_spring_intl_no_fly_zone_desc: "正在部署军事资产,以便在冲突区上空实施禁飞区。 这种干预是保护平民,但代价高昂,需要国际监督。"

 arab_spring_intl_arming_rebels: "武装反对派力量"
 arab_spring_intl_arming_rebels_desc: "武器和装备正被输送给冲突中的反对派部队。 这项政策是隐蔽的,但不是秘密的,谁得到这种支持的长期后果仍然不明确。"

 arab_spring_intl_intervention_costs: "干预费用"
 arab_spring_intl_intervention_costs_desc: "在国外的军事干预正在使资源紧张并引起国内政治辩论。 财富和政治资本的成本是真实的。"

 arab_spring_intl_non_interventionist: "非干扰者"
 arab_spring_intl_non_interventionist_desc: "这个国家选择不干预阿拉伯内战. 该决定减少了曝光率并保留了国内政治资本——尽管批评者认为,它放弃了其公开的价值观。"
