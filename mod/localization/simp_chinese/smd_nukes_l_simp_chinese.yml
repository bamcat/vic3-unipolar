 nuclear_events.12.t: "导弹攻击 [ROOT.GetName]"
 nuclear_events.12.d: "[SCOPE.sCountry('missile_attacker').GetName]已经对 [ROOT.GetAdjective]领土发动了常规导弹攻击。 有报告显示在[ROOT.GetAdjective]州受到冲击——正在评估基础设施损坏。\n\n 导弹不是核武器,但信息很清楚。 [SCOPE.sCountry('missile_attacker').GetName]愿意对我们使用远程武器。"
 nuclear_events.12.f: "陨坑已经在那里。 问题是我们下一步要做什么。"
 nuclear_events.12.a: "评估损害并作出相应反应"

 missile_strike_victim_modifier: "常规导弹攻击"
 missile_strike_victim_modifier_desc: "我国领土一直是常规导弹袭击的目标。 基础设施受损和公众焦虑情绪上升."

 # ── EVENT 13: RETALIATION CHOICE ───────────

 nuclear_events.13.t: "核报复——必须作出的决定"
 nuclear_events.13.d: "[SCOPE.sCountry('nuclear_attacker').GetName]已针对 [ROOT.GetName]发射了核武器。 我们的弹头有武器 发射代码已经准备好。\n\n 对[SCOPE.sCountry('nuclear_attacker').GetAdjective]领土的报复性打击将消耗25%的武库,并打击所有[SCOPE.sCountry('nuclear_attacker').GetAdjective]州。 罢工不会带来任何耻辱——世界会理解。 另一种方法是吸收攻击. 生存是没有耻辱的。"
 nuclear_events.13.f: "顺序只需一次."
 nuclear_events.13.a: "retaliate — 发射25%的军火库来对付[SCOPE.sCountry('nuclear_attacker').GetName]"
 nuclear_events.13.b: "退下——吸收打击,保存武库."

 nuclear_first_strike_response: "核报复(第一次打击反应)"
 nuclear_first_strike_response_desc: "[ROOT.GetName]针对其领土无端被核攻击,发动了核反击. 国际社会承认报复权——恶名昭彰的收益被大大减少。"

 nuclear_absorbed_first_strike: "核打击吸收"
 nuclear_absorbed_first_strike_desc: "[ROOT.GetName] 经受了没有报复的核打击。 国际上已经注意到这种克制。 外交地位和声望得到显著提高。"

 # ── EVENT 14: RETALIATION NOTIFICATION ─────

 nuclear_events.14.t: "核报复入境"
 nuclear_events.14.d: "我们的核打击得到了回应。 [ROOT.GetName] 发动了报复性打击—— 弹头已确认入境。 \n\n 我们启动了交换。 后果是我们的"
 nuclear_events.14.f: "每次罢工都会邀请下一场"
 nuclear_events.14.a: "设定要撞击"
