 l_simp_chinese:

 je_drug_trafficking:0 "毒品贸易"
 je_drug_trafficking_reason:0 "贩毒网络已深深地植入了[ROOT.GetCountry.GetName]的政治和经济生活。 卡特尔通过国家流动了数十亿——腐败官员,资助私人军队,并填补国家留下的真空. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName]的政府面临一个严峻的选择:与国家本身几乎一样强大的网络合作,或花掉当局仍在试图摧毁的网络。 这可以通过减缓毒品流动和从犯罪集团中夺取武器来实现。"

 je_fighting_cartels:0 "打击卡特尔"
 je_fighting_cartels_reason:0 "贩运网络已经挖出。 在多年政策失败后, " x id=0 " 政府决心对卡特尔采取直接军事行动。 必须部署一名将军领导反卡特尔行动。 这样做并不容易,而且不会很快。"

 cartel_je_working_with_tt:0 "[ROOT.GetCountry.GetName]政府与卡特尔建立了工作安排。 权威和合法性正在提高——但这种关系具有巨大的声誉风险。"
 cartel_je_cracking_down_tt:0 "政府积极打击贩毒. 这场运动正在耗尽权力,但提高了[ROOT.GetCountry.GetName]的国际地位。"
 cartel_je_no_policy_tt:0 "未制定任何政策。 使用下面的按钮来选择[ROOT.GetCountry.GetName]将如何处理卡特尔。"
 cartel_fight_je_commander_needed_tt:0 "没有部署指挥官。 使用下面的按钮将一个将军送入球场."
 cartel_fight_je_commander_active_tt:0 "[SCOPE.sCharacter('cartel_general_storage').GetFullName]在[ROOT.GetCountry.GetName]中领先反卡特尔操作."

 mdw_events.7:0 "测试测试"
 
 cartel_button_cooperate_name:0 "与卡特尔合作"
 cartel_button_cooperate_desc:0 "与毒品网络建立工作安排。 强大的促进权威、合法性和国防——但与[SCOPE.sCountry('c:USA').GetName]关系严重不光彩和紧张。"

 cartel_button_crackdown_name:0 "打击贩运活动"
 cartel_button_crackdown_desc:0 "积极开展打击贩毒网络运动. 耗资200项权力并禁止鸦片贸易,但提高了[ROOT.GetCountry.GetName]的国际地位和声望。"
 cartel_crackdown_authority_cost_tt:0 "需要200项授权"

 cartel_button_stop_crackdown_name:0 "停止崩溃"
 cartel_button_stop_crackdown_desc:0 "停止反贩运运动以维护权威。 鸦片禁令将取消,国际善意将受到损害。"

 cartel_button_deploy_general_name:0 "部署一名指挥官"
 cartel_button_deploy_general_desc:0 "选择一个在 [ROOT.GetCountry.GetName] 中引导反卡特尔操作的常规 。"
 cartel_need_general_tt:0 "需要至少一个可用的通用"

 cartel_suppression_bar:0 "卡特尔抑制"
 cartel_suppression_bar_desc:0 "平息进度: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#!([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/100)"
 cartel_bar_general_active_tt:0 "针对卡特尔的主动军事行动"
 cartel_bar_turmoil_tt:0 "高度动荡正在阻碍[ROOT.GetCountry.GetName]的反卡特尔业务"
 cartel_bar_at_war_tt:0 "军事资源被转用于战争"

 # ==========================================
 # EVENTS
 # ==========================================

 # cartel.1 — Escobar Captured
 cartel.1.t:0 "巴勃罗·埃斯科瓦尔已去世"
 cartel.1.d:0 "麦德林卡特尔的创始人和领导人被跟踪到麦德林的一个安全屋并被 " x id=0 " 安全部队杀害。 巴勃罗·埃斯科瓦尔的逝世是有史以来对"x id=1/"毒品交易所打击的最重大打击——一个时代的结束,另一个时代的不确定开端. \n\n 麦德林卡特尔破碎了 但卡利卡特尔等人会移动以填补真空. 战争还没结束 但这场战役已取胜."
 cartel.1.f:0 "世上最通缉的人死了"
 cartel.1.a:0 "[ROOT.GetCountry.GetName] 打击了毒品-恐怖主义的历史性打击"

 # cartel.2 — El Chapo Captured
 cartel.2.t:0 "查普被俘虏了"
 cartel.2.d:0 "在由"x id=0"安全部队和国际情报部门协调的戏剧性突袭中,被俘获了"El Chapo" Guzmán——辛那罗卡特尔的首领和世界上最强大的毒枭. 逮捕是[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]的重大胜利。 [ROOT.GetCountry.GetRuler.GetLastName]的反卡特尔运动和对锡那罗亚卡特尔业务的重大打击. \n\nEl 查波现在在最高安全级别 他是否留在那里是另一个问题。"
 cartel.2.f:0 "美洲最被通缉的人在监狱里"
 cartel.2.a:0 "正义得到了伸张——目前"

 # cartel.3 — El Chapo Escapes
 cartel.3.t:0 "埃尔·查波逃跑了"
 cartel.3.d:0 "这不可能发生 Joaquín 'El Chapo' Guzmán通过直接挖入牢房的地道从Altiplano最高警戒监狱逃出——这一工程成就花了几个月时间才完成,涉及多个级别的警卫、承包商和官员的串通。 越狱是国际的耻辱 [永久失效連結] (中文(简体) ). [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [x id=3/>] 政府对其公信力造成了灾难性打击. 而在"x id=4/"地盘上某地,世界上最强大的毒枭是自由的."
 cartel.3.f:0 "他总是会逃跑的 唯一的问题是什么时候"
 cartel.3.a:0 "令人愤慨的是,"

 # cartel.4 — Mexico Turf Division
 cartel.4.t:0 "卡特尔分割[ROOT.GetCountry.GetName]"
 cartel.4.d:0 "多年的失败或缺席的国家政策留下了真空. 主要的卡特尔组织现在通过暴力、谈判和地方当局的有选择地腐败,在[ROOT.GetCountry.GetAdjective]地区建立了公认的领土势力范围。 CJNG控制了中部和西部. 海湾卡特尔占据了东北海岸. 锡那罗亚卡特尔在西北地区占主导地位. 东北卡特尔在科阿韦拉和萨卡特卡斯划出自己的地盘. [ROOT.GetCountry.GetAdjective]国家实际上放弃了对本国部分领土的主权。 \n\n@warning! 这是不能容忍的。"
 cartel.4.f:0 "不能保护其领土的国家不是国家。"
 cartel.4.a:0 "我们必须收回失去的东西"

 # cartel.5 — Assassination
 cartel.5.t:0 "卡特尔暗杀"
 cartel.5.d_crackdown:0 "领导"x id=0"反卡特尔运动的高级警察或军官被暗杀了——这次定点清除是为了恐吓国家,并暗示卡特尔可以接触到任何人. 葬礼是明天 调查已经查明嫌疑人。 问题是[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName]政府有追求他们的意志."
 cartel.5.d_cooperation:0 "一个竞争的卡特尔已经暗杀了你的犯罪伙伴之一 关键中尉, 打击正在降落在[ROOT.GetCountry.GetName]的政府。 屠杀是在大城市的光天化日之下进行的。 假想国家与凶手毫无关系,"
 cartel.5.d_default:0 "著名人物——政治家、记者或法官——在[ROOT.GetCountry.GetName]被与卡特尔有联系的枪手所暗杀。 杀戮是无耻的。 信息是明确的:卡特尔的运作不惧怕国家。"
 cartel.5.f:0 "有罪不罚是卡特尔最大的武器。"
 cartel.5.a:0 "我们会找到责任人"

 # cartel.6 — Money Laundering
 cartel.6.t:0 "卡特尔 洗钱"
 cartel.6.d_crackdown:0 "一个 " x id=0 " 的金融情报单位发现,有证据表明,卡特尔资金通过合法企业 -- -- 建筑公司、餐馆、汽车经销商 -- -- 在 " x id=1 " 中流动。 洗钱行动的规模表明正规经济深入人心。 追随小道会很昂贵,政治上很危险,可能导致不适之地."
 cartel.6.d_cooperation:0 "国际金融调查员标明了通过已知与政府有联系的机构进行的可疑交易。 [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] 之间的链接 [ROOT.GetCountry.GetRuler.GetLastName] 管理和卡特尔融资越来越难隐瞒。 这可能成为重大外交事件。"
 cartel.6.d_default:0 "调查记者公布了通过[ROOT.GetCountry.GetName]的银行部门进行大规模洗钱的证据——涉嫌通过房地产和商业投资清洗卡特尔所得收益。 央行要求调查."
 cartel.6.f:0 "脏钱无处不在,如果你知道在哪里看。"
 cartel.6.a:0 "随时随地进行调查"
 cartel.6.b:0 "银行部门的稳定必须得到保护——不要这样"

 # cartel.7 — US Pressure
 cartel.7.t:0 "华盛顿 是观看"
 cartel.7.d:0 "[SCOPE.sCountry('c:USA').GetName] (韩语). 国务院正式要求会见"××"的外相. 私下宣传的议程涉及贩毒问题——特别是政府关于`x id=2/>在扰乱麻醉品向北流动方面做得不够的评估。 有人建议,如果 " x id=5 " 更加积极地合作,就可以提供 " x id=4 " 援助——金融、情报和可能的军事援助。"
 cartel.7.f:0 "[SCOPE.sCountry('c:USA').GetName]有杠杆. 问题在于是否允许使用。"
 cartel.7.a:0 "接受 [SCOPE.sCountry('c:USA').GetAdjective] 合作——我们需要支持"
 cartel.7.b:0 "下降- [ROOT.GetCountry.GetName] 将处理自己的事务"

 # cartel.8 — Cartel Retaliation
 cartel.8.t:0 "卡特尔革命"
 cartel.8.d:0 "镇压已经招来鲜血——现在卡特尔正在招来自己的血. 一系列跨越 " x id=0 " 的协同攻击针对警察局、军事检查站和已知支持 " x id=1 " 的社区的平民地区。 [ROOT.GetCountry.GetRuler.GetLastName]的竞选活动。 这些攻击是一个信息:没有代价,卡特尔就无法被摧毁。 [ROOT.GetCountry.GetName] 必须决定如何响应。"
 cartel.8.f:0 "每一次被击倒都是一击而返"
 cartel.8.a:0 "升级——我们不会被恐吓"
 cartel.8.b:0 "暂时撤出——保护平民"

 # cartel.9 — Completion
 cartel.9.t:0 "毒品贸易一直在运行"
 cartel.9.d_crackdown:0 "镇压运动已经实现了眼前的目标。 鸦片市场大幅度收紧——这是[ROOT.GetCountry.GetName]对贩运网络的持续压力的直接后果。 卡特尔被削弱。 国际地位已有所改善。 争相相相去相去相去相去相去相去相去相去相去相去相去相去相去相去相去相去相去相去相去相去相去相去相去相去相去相去相去相去相去相去相去相去相去相去相去相去相去相去相去相去相去相去相去相去相去相去相去相去相去相去相去相去相去相去相去相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相相"
 cartel.9.d_cooperation:0 "这一安排实现了承诺。 当局是完好无损的,国家行使职能,卡特尔大多站在他们一边。 这是治理还是投降是历史学家会争论的一个问题. 鸦片市场讲述了自己的故事."
 cartel.9.d_default:0 "毒品贸易已经发展——无论是好还是坏,仍然不清楚。 鸦片市场已大大偏离了其基本价格。 这个时期由[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName]作出的选择将决定接下来会发生什么."
 cartel.9.f:0 "每个政策都结束了。 每一种选择都有后果。"
 cartel.9.a:0 "结束一章"

 # cartel.100 — Timeout
 cartel.100.t:0 "窗口已关闭"
 cartel.100.d:0 "多年来对 " x id=0 " 的贩毒政策没有结果,既未产生有意义的镇压,也未与毒品网络达成稳定安排。 卡特尔很好地利用了时间。 需要采取更直接的办法。"
 cartel.100.f:0 "不采取行动是一种选择——卡特尔知道这一点。"
 cartel.100.a:0 "我们必须直接行动"

 # cartel.10 — Escobar news for Americas
 cartel.10.t:0 "巴勃罗·埃斯科瓦尔已去世"
 cartel.10.d:0 "消息来自[SCOPE.sCountry('c:CLM').GetName] : 巴勃罗·埃斯科瓦尔(Pablo Escobar)是麦德林卡特尔的创始人,也是确定拉丁美洲毒品-恐怖主义年龄的人,被安全部队杀害。 西半球最通缉犯死了 该区域毒品贸易的连锁作用将持续多年。"
 cartel.10.f:0 "大毒药之岁已出. 下面的情况可能更糟。"
 cartel.10.a:0 "新时代开始了"

 # ==========================================
 # CARTEL FIGHT EVENTS
 # ==========================================

 cartel_fight.0.t:0 "谁领导反卡特尔运动?"
 cartel_fight.0.d:0 "[ROOT.GetCountry.GetName] 政府决心对卡特尔网络采取直接行动。 必须挑选并部署一个将军——一个有能力和意志去追击一个与肮脏战斗,隐藏在平民中,买官同买子弹一样容易的敌人."
 cartel_fight.0.f:0 "正确的将军会改变一切"
 cartel_fight.0.a:0 "部署 [SCOPE.sCharacter('cartel_general_1').GetFullName]"
 cartel_fight.0.b:0 "部署 [SCOPE.sCharacter('cartel_general_2').GetFullName]"
 cartel_fight.0.c:0 "部署 [SCOPE.sCharacter('cartel_general_3').GetFullName]"

 cartel_fight.1.t:0 "大型卡特尔快克"
 cartel_fight.1.d:0 "[SCOPE.sCharacter('cartel_general').GetFullName] 报告一项成功行动:一个主要的卡特尔分销网络被摧毁,大量毒品被缉获,一些中级卡特尔人士被拘捕。 这是一个很好的一周的工作。 势头与"x id=1/"的政府相伴."
 cartel_fight.1.f:0 "正在取得进展。"
 cartel_fight.1.a:0 "保持压力"

 cartel_fight.2.t:0 "埋伏部队"
 cartel_fight.2.d:0 "由"x id=0"指挥下的一个单位在农村被卡特尔枪手所伏击. 袭击经过了良好的协调,表明卡特尔掌握了[ROOT.GetCountry.GetAdjective]军事运动的情报。 有人员伤亡。 道德被动摇。"
 cartel_fight.2.f:0 "卡特尔在他们选择的时候像军队一样战斗."
 cartel_fight.2.a:0 "重新组合并继续进行"

 cartel_fight.3.t:0 "线人提供关键情报"
 cartel_fight.3.d:0 "以金钱、个人冤情或恐惧为动机的线人向 " x id=0 " 提供了有关卡特尔安全屋、供应路线和人员的详细情报。 这些信息使得一系列精确的行动大大地削弱了卡特尔在该地区的业务能力。"
 cartel_fight.3.f:0 "卡特尔的最大弱点是彼此。"
 cartel_fight.3.a:0 "立即对情报采取行动"

 cartel_fight.10.t:0 "卡特尔已经断裂"
 cartel_fight.10.d:0 "竞选结束. [SCOPE.sCharacter('cartel_general').GetFullName] 报告称,在 [ROOT.GetCountry.GetName] 中组织卡特尔活动已拆除至与业务无关的程度。 关键人物已死亡或被羁押。 网络支离破碎。 国家已收回领土。 这是一个丑陋的战斗。 但已经赢了"
 cartel_fight.10.f:0 "国家已经显示它能做什么 当它做出。"
 cartel_fight.10.a:0 "来之不易的胜利"

 # ==========================================
 # MODIFIERS
 # ==========================================

 cartel_cooperation_modifier:0 "卡特尔安排"
 cartel_cooperation_modifier_desc:0 "与麻醉品网络的隐含安排给 " x id=0 " 带来了大量资源和稳定性,对合法性和国际声誉造成了巨大损失。"

 cartel_crackdown_modifier:0 "打击贩运运动"
 cartel_crackdown_modifier_desc:0 "[ROOT.GetCountry.GetName]正在积极寻求卡特尔网络。 当局正在被消耗,但国际地位正在提高,鸦片贸易被压制。"

 cartel_crackdown_abandoned:0 "已废弃"
 cartel_crackdown_abandoned_desc:0 "禁止贩卖人口的运动已经停止。 国际社会注意到了这一逆转。"

 cartel_escobar_captured:0 "埃斯科瓦尔死了"
 cartel_escobar_captured_desc:0 "Pablo Escobar的死粉碎了麦德林卡特尔, [ROOT.GetCountry.GetName] 国际地位得到显著提高."

 cartel_el_chapo_captured:0 "查普被抓获"
 cartel_el_chapo_captured_desc:0 "华金·古斯曼被俘事件给锡那罗亚卡特尔带来重大打击并提升了"x id=0"的国际地位."

 cartel_el_chapo_escaped:0 "埃尔·查波逃跑了"
 cartel_el_chapo_escaped_desc:0 "世界最被通缉的毒枭从"x id=0""最高警戒监狱"越狱,对"x id=1"来说是一个灾难性的尴尬. [ROOT.GetCountry.GetRuler.GetLastName] 的政务."

 cartel_narco_state:0 "纳科州"
 cartel_narco_state_desc:0 "卡特尔组织对[ROOT.GetCountry.GetName]的很大一部分建立了有效的领土控制。 [ROOT.GetCountry.GetAdjective] 国家已经丧失了对这些地区暴力的垄断。"

 cartel_cjng_controlled:0 "CJNG地区"
 cartel_cjng_controlled_desc:0 "哈利斯科新一代卡特尔特工控制着这个国家的犯罪经济. 暴力、敲诈和卡特尔治理已经取代了国家权力。"

 cartel_gulf_controlled:0 "海湾卡特尔领地"
 cartel_gulf_controlled_desc:0 "海湾卡特尔在此建立了领地统治地位. [ROOT.GetCountry.GetAdjective] 国家权力是名义上的。"

 cartel_sinaloa_controlled:0 "锡那罗亚卡特尔领地"
 cartel_sinaloa_controlled_desc:0 "锡那罗亚卡特尔在此建立了领地统治地位. 它对当地经济和 " x id=0 " 政府的影响是普遍的。"

 cartel_northeast_controlled:0 "东北卡特尔地区"
 cartel_northeast_controlled_desc:0 "诺雷斯特卡特尔在此建立了统治地位,取代了以暴力治理的国家权力。"

 cartel_crackdown_success:0 "反纳科成功"
 cartel_crackdown_success_desc:0 "在"x id=0"的反贩运运动中取得的重大成功,提升了政府的合法性和声望."

 cartel_assassination_aftermath:0 "卡特尔暗杀"
 cartel_assassination_aftermath_desc:0 "一场引人注目的暗杀动摇了公众对 " x id=0 " 的信心并加剧了动荡。"

 cartel_laundering_investigation:0 "洗钱调查"
 cartel_laundering_investigation_desc:0 "对卡特尔洗钱活动的积极调查正在改进“x id=0”的反腐败资格。"

 cartel_laundering_ignored:0 "被忽略的洗钱活动"
 cartel_laundering_ignored_desc:0 "撤销洗钱调查的决定在国际上引起人们的注意。"

 cartel_us_cooperation_bonus:0 "美国禁毒合作组织"
