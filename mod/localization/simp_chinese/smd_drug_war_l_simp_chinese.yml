 mdw_war_declared_modifier:0 "墨西哥毒品战争——积极运动"
 mdw_war_declared_modifier_desc:0 "[ROOT.GetCountry.GetName] 已承诺其军队直接打击毒贩。 当局正在被消耗,军方正在介入,但 " x id=1/ " 状态在坚持自己的立场。"
 
 mdw_us_aid_modifier:0 "美国军事援助"
 mdw_us_aid_modifier_desc:0 "一项与[SCOPE.sCountry('c:USA').GetName]的活跃军事援助协定正在为[ROOT.GetCountry.GetName]的反卡特尔运动提供情报、后勤和装备。"
 
 mdw_victory_modifier:0 "药战元"
 mdw_victory_modifier_desc:0 "[ROOT.GetCountry.GetName]已经赢得了毒品战争. 卡特尔领土控制被打破, " x id=1/ " 国家已重申主权。 产生卡特尔的条件依然存在——但这场战斗已经取胜。"
 
 mdw_commander_killed_modifier:0 "指挥官阵亡"
 mdw_commander_killed_modifier_desc:0 "反卡特尔指挥官被暗杀,动摇了公众对 " x id=0 " 的信心,使卡特尔胆大妄为。"
 
 mdw_troops_ambushed:0 "埋伏部队"
 mdw_troops_ambushed_desc:0 "一支 [ROOT.GetCountry.GetAdjective] 军事纵队被卡特尔部队伏击,造成人员伤亡并暂时减少进攻能力。"
 
 # Cartel territory modifier descriptions (MDW context)
 cartel_cjng_controlled:0 "CJNG地区"
 cartel_cjng_controlled_desc:0 "哈利斯科新一代卡特尔特工控制着这个国家的犯罪经济. 工业活动被打乱,基础设施正在恶化,人们正在离开 " x id=0 " 领土。"
 
 cartel_gulf_controlled:0 "海湾卡特尔领地"
 cartel_gulf_controlled_desc:0 "海湾卡特尔在此建立了领地统治地位. 经济活动受到压制,[ROOT.GetCountry.GetAdjective]国家权力是名义上的。"
 
 cartel_sinaloa_controlled:0 "锡那罗亚卡特尔领地"
 cartel_sinaloa_controlled_desc:0 "锡那罗亚卡特尔控制着这个状态. 农业产量被中断,当地经济在卡特尔的监督下运作。"
 
 cartel_northeast_controlled:0 "东北卡特尔地区"
 cartel_northeast_controlled_desc:0 "诺雷斯特卡特尔在此建立了统治地位. 在[ROOT.GetCountry.GetName]中,基础设施和建筑生产力正在受苦受难。"
 
 # usa war on drugs

 je_war_on_drugs:0 "禁毒战争"
 je_war_on_drugs_reason:0 "麻醉品流入 " x id=0 " 是全国性危机。 可卡因、海洛因和其他物质——主要在拉丁美洲生产并走私到[ROOT.GetCountry.GetAdjective]边境——是破坏性的社区,助长暴力犯罪并腐蚀公共机构。 `x id=5/>政府承诺开展全面运动:国际伙伴关系扼杀源头供应,国内执法关闭边境,社会投资解决需求。 这场运动不是没有代价的——它所需要的资源在更广泛的经济中所占有比重——但另一种选择是越来越受外国犯罪网络支配的国家。 墨西哥的卡特尔领土可能正在扩大。 与墨西哥政府达成的军事援助协定是这一运动的国际组成部分的基石。"

 narco_economy_plantation_bonus:0 "纳克经济"
 narco_economy_plantation_bonus_desc:0 "毒品贸易已嵌入了[ROOT.GetCountry.GetName]的农业经济。 种植产出——特别是鸦片——超过了正常水平,因为卡特尔的需求和毒品资金流入农村社区的腐化。"

 war_on_drugs_active_modifier:0 "禁毒战争"
 war_on_drugs_active_modifier_desc:0 "政府承诺开展打击贩毒的全面运动。 执法努力——国内治安、阻截行动和国际合作——正在从整个经济中汲取资源,给国家生产力带来适度而实际的代价。"

 war_on_drugs_victory_modifier:0 "禁毒战争——元"
 war_on_drugs_victory_modifier_desc:0 "[ROOT.GetCountry.GetAdjective] (韩语). 禁毒战争实现了既定目标。 供应受到压制,边界被强制,体制框架已经到位。 该运动加强了`x id=1/>的权威和威望,尽管产生药物需求的基本条件尚未解决。"

 wod_je_status_active:0 "竞选活动仍在继续。"
 wod_je_status_ready:0 "运动即将结束。"

 wod_completion_mexico_tt:0 "与墨西哥签订《军事援助协定》。"
 wod_completion_enforcement_tt:0 "采用#bold 国民警卫队#! 或#bold 秘密警察#!。"
 wod_completion_opium_price_tt:0 "在药物在美国市场至少达到 #bold 65%的pricier #!之前,禁止国际药物供应。"
 wod_completion_schools_tt:0 "将 #bold 学校 #! 机构提升到 #bold 5 #!或更高一级。"
 wod_completion_border_tt:0 "采用 #bold 迁移控制 #! 或 #bold 关闭边界 #!。"
 wod_completion_no_safe_injection_tt:0 "没有 #bold 安全注射站点 #!."
 wod_completion_no_trafficking_allowed_tt:0 "没有 #bold 允许的贩运 #!。"
 wod_completion_no_hard_drugs_decriminalized_tt:0 "没有 #bold 硬药去刑事化 #!。"
