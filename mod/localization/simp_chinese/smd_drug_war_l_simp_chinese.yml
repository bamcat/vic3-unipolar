 # mdw_events.1 — War Declared
 mdw_events.1.t:0 "[ROOT.GetCountry.GetName] 宣布对卡特尔的战争"
 mdw_events.1.d:0 "经过多年的卡特尔扩张和半计量失败,[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] ×××××××××××××××××××××××××××政府正式承诺用"×××"军事力量开展打击"贩毒网络"的运动. 宣言意义重大——不仅是在操作上,而且在象征上。 [ROOT.GetCountry.GetAdjective]状态主张不接受现状. \n\n 卡特尔将作出反应。 军队必须准备好。"
 mdw_events.1.f:0 "并州已下分出."
 mdw_events.1.a:0 "[ROOT.GetCountry.GetName] 将回收属于它的东西"
 
 # mdw_events.2 — Commander Selection
 mdw_events.2.t:0 "谁领导这场运动?"
 mdw_events.2.d:0 "宣说已. 现在必须选择一个指挥官——一个愿意把战斗带入卡特尔控制的领土的人,在那里敌人知道地面,有当地的线人,并且愿意做军队不能做的事情. 这将是一场肮脏的战斗。"
 mdw_events.2.f:0 "正确的将军会改变一切"
 mdw_events.2.a:0 "部署 [SCOPE.sCharacter('mdw_commander_1').GetFullName]"
 mdw_events.2.b:0 "部署 [SCOPE.sCharacter('mdw_commander_2').GetFullName]"
 mdw_events.2.c:0 "部署 [SCOPE.sCharacter('mdw_commander_3').GetFullName]"
 
 # mdw_events.3 — Combat Patrol
 mdw_events.3.t:0 "联系方式为[SCOPE.sState('mdw_active_state').GetName]"
 mdw_events.3.d:0 "[SCOPE.sCharacter('mdw_commander').GetFullName]在[SCOPE.sState('mdw_active_state').GetName]中报告了一系列与卡特尔势力的交战。 卡特尔正在为控制其领土而战斗——使用路障、狙击手和简易爆炸装置接近已知据点。 正在取得进展,但时间和资源方面的成本很高。"
 mdw_events.3.f:0 "清理的每公里道路都是卡特尔无法使用的一公里。"
 mdw_events.3.a:0 "用力推,快夺地盘"
 mdw_events.3.b:0 "预先有条不紊地——在前进前确保每个职位的安全"
 
 # mdw_events.4 — State Cleared
 mdw_events.4.t:0 "[SCOPE.sState('mdw_active_state').GetName] 已经清除"
 mdw_events.4.d:0 "一个重大的行动成功:[SCOPE.sCharacter('mdw_commander').GetFullName]报告说,[SCOPE.sState('mdw_active_state').GetName]中的卡特尔力量被打破。 他们的指挥结构被拆除,后勤被切断,他们的关键人物已经死亡或被拘留。 [ROOT.GetCountry.GetAdjective] 军事占领部队正在移动以守住地面。 \n\n 一个州又被政府控制了 还有更多"
 mdw_events.4.f:0 "地图有变."
 mdw_events.4.a:0 "继续前进——保持势头"
 
 # mdw_events.5 — Ambush
 mdw_events.5.t:0 "埋伏 — [SCOPE.sCharacter('mdw_commander').GetFullName] 的列正受到攻击"
 mdw_events.5.d:0 "卡特尔枪手在[ROOT.GetCountry.GetAdjective]中伏击了[SCOPE.sState('mdw_active_state').GetName]的军事纵队。 袭击经过了协调——多个射击阵地,预先计划撤退路线,以及知道纵队的行踪,表明在"x id=2/"军事指挥链内有线人. 有人员伤亡。 [SCOPE.sCharacter('mdw_commander').GetFullName]正在管理业务约定。"
 mdw_events.5.f:0 "卡特尔在他们选择的时候像军队一样战斗."
 mdw_events.5.a:0 "通过——追击并摧毁它们"
 mdw_events.5.b:0 "中断接触——稍后重新组合并进行扫荡"
 
 # mdw_events.6 — Commander Under Fire
 mdw_events.6.t:0 "[SCOPE.sCharacter('mdw_commander').GetFullName] (中文(简体) ). 危险"
 mdw_events.6.d:0 "情报部门证实了实地报告所暗示的:卡特尔将 " x id=0 " 确定为优先目标。 一个专业的暗杀小组负责对付他们。 这种威胁是可信的。 将指挥官调回 " x id=1 " 将降低风险,但在关键时刻将停止竞选势头。"
 mdw_events.6.f:0 "卡特尔研究他们的敌人。"
 mdw_events.6.a:0 "将 [SCOPE.sCharacter('mdw_commander').GetFullName] 调回 — 竞选活动可以等"
 mdw_events.6.b:0 "按-[SCOPE.sCharacter('mdw_commander').GetFullName] 接受风险"
 
 # mdw_events.10 — Victory
 mdw_events.10.t:0 "毒品战争是元"
 mdw_events.10.d:0 "[SCOPE.sCharacter('mdw_commander').GetFullName] 发送最后业务报告:卡特尔领土控制已被突破 [ROOT.GetCountry.GetName] 。 最后的据点已经清空. 军事占领已经到位。 卡特尔网络仍然存在——它们将多年来以被削弱的形式重组——但[ROOT.GetCountry.GetAdjective]国家已重申对本国领土的主权。\n\n 这不是不可避免的。 这需要政治意愿、军事承诺以及许多方面的运气。 [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName]赢得的是时间——解决使卡特尔成为可能的条件。"
 mdw_events.10.f:0 "[ROOT.GetCountry.GetName]已经收回她的东西。"
 mdw_events.10.a:0 "艰难的胜利——和开始"
 
 # mdw_events.11 — Commander Killed
 mdw_events.11.t:0 "[SCOPE.sCharacter('mdw_commander').GetFullName] > 已被杀死"
 mdw_events.11.d:0 "最糟糕的情况发生了。 卡特尔暗杀行动成功. [SCOPE.sCharacter('mdw_commander').GetFullName] 已经死亡—— 在一次袭击中被杀死,尽管发出了可信的警告,但 [ROOT.GetCountry.GetAdjective] 安全部门未能阻止袭击。 新闻在数小时内公开. 卡特尔在其控制的城镇街道上公开庆祝。 竞选还没结束 但是,它遭受了一次需要几个月才能恢复的打击。 必须找到新的指挥官——卡特尔将利用时间加以巩固。"
 mdw_events.11.f:0 "卡特尔遭受了最严重的打击。"
 mdw_events.11.a:0 "我们不会因此被打破,战斗仍在继续"
 
 # mdw_events.20 — US Aid
 mdw_events.20.t:0 "[SCOPE.sCountry('c:USA').GetName] 已签署军事援助协定"
 mdw_events.20.d:0 "[SCOPE.sCountry('c:USA').GetCapital.GetCityHubName]已经移动。 [SCOPE.sCountry('c:USA').GetName]与 [ROOT.GetCountry.GetName]正式签署军事援助协定——承诺向反卡特尔运动提供情报资源、咨询人员、设备和后勤支助。 该协议是一个重大的政治发展:它表明[SCOPE.sCountry('c:USA').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCountry('c:USA').GetRuler.GetLastName]行政部门将[ROOT.GetCountry.GetName]的稳定视为直接国家利益。\n\n 就[ROOT.GetCountry.GetName]而言,实际好处是直接的:权威得到恢复,设备在流动,卡特尔现在面临一个敌人,其完全的情报机构是[SCOPE.sCountry('c:USA').GetName],正在对付他们。"
 mdw_events.20.f:0 "当[SCOPE.sCountry('c:USA').GetName] 承诺时,余额会转移。"
 mdw_events.20.a:0 "这完全改变了运动"
 
