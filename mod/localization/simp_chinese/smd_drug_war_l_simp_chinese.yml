 # ==========================================
 # JOURNAL ENTRIES
 # ==========================================
 
 je_mexican_drug_war:0 "墨西哥毒品战争"
 je_mexican_drug_war_reason:0 "卡特尔相互之间划分了[ROOT.GetCountry.GetName]。 CJNG,海湾卡特尔,锡那罗亚卡特尔,以及诺雷斯特卡特尔 每一个政府令令薄弱或缺席的控制权地区. 工业减速了 人们要走了。 暴力是地方性的。\n\n[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle][ROOT.GetCountry.GetRuler.GetLastName]政府尚未承诺直接打击卡特尔。 但是,这种情况不能无限期地恶化——卡特尔领土仍在扩大,每个月不采取行动都会使最终的清算变得更加困难。"
 
 je_us_mexico_drug_war_support:0 "支助墨西哥"
 je_us_mexico_drug_war_support_desc:0 "[SCOPE.sCountry('c:MEX').GetName]正在同夺取该国大部分控制权的贩毒卡特尔网络进行生存斗争。 [ROOT.GetCountry.GetName] 与结果有直接关系:麻醉品向北流动,南部边界稳定,[SCOPE.sCountry('c:MEX').GetAdjective]状态的完整性都处于危险之中. \n\n 与 " x id=5 " 签署军事援助协定将为 " x id=6 " 提供资源、情报和合法性。 \x id=7\>政府——以远远超出毒品战争的方式深化双边关系."
 
 # Status descriptions
 mdw_je_not_declared_tt:0 "`x id=0'的政府尚未向卡特尔宣战。 情况正在恶化——卡特尔网络正在积极扩大其领土控制。 使用下面的按钮将 [ROOT.GetCountry.GetAdjective] 军事投入到战役中."
 mdw_je_commander_needed_tt:0 "战事已宣. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName]现在必须部署一名指挥官,领导在卡特尔控制地的行动。"
 mdw_je_active_tt:0 "[SCOPE.sCharacter('mdw_commander_storage').GetFullName] 正在领导针对卡特尔的行动。 卡特尔领土仍然在争论之中——所有被控制的国家必须在宣布战争取胜之前被清除."
 
 us_mdw_je_no_pact_tt:0 "没有与[SCOPE.sCountry('c:MEX').GetName]签署任何军事援助协定。 导航到外交屏幕上,提出以 [SCOPE.sCountry('c:MEX').GetRuler.GetPrimaryRoleTitle] 为标准的军事援助条约 [SCOPE.sCountry('c:MEX').GetRuler.GetLastName] 的政务."
 us_mdw_je_pact_active_tt:0 "一项军事援助协定已生效,内容为[SCOPE.sCountry('c:MEX').GetName]。[ROOT.GetCountry.GetAdjective] 支持有助于维持[SCOPE.sCountry('c:MEX').GetRuler.GetPrimaryRoleTitle][SCOPE.sCountry('c:MEX').GetRuler.GetLastName]的反卡特尔运动。"
 
