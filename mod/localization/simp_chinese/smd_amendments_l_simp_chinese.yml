l_simp_chinese:

 # ==========================================
 # UNITED STATES
 # ==========================================

 amendment_medicaid: "医疗补助"
 amendment_medicaid_desc: "联邦和国家资助的低收入美国人,老年人,残疾人的医疗保险. 医疗补助弥补了私人市场留下的缺口——包括那些负担不起保险费的人和那些条件使其无法保险的人。 该方案费用昂贵,政治上有争议,但其降低死亡率的效果是可衡量的,是真实的。"

 amendment_affordable_care_act: "《负担得起的照料法》"
 amendment_affordable_care_act_desc: "《负担得起的护理法》——非正式地称为“奥巴马护理”,规定所有公民都必须持有健康保险,为私人保险建立受管制的市场,并扩大医疗补助的资格。 保险人不能拒绝为先前存在的情况提供保险。 个别任务引起很大争议。 支持者认为,这是使保险市场发挥作用的唯一途径。 反对者称政府过度介入私人经济决策."

 amendment_federal_assault_weapons_ban: "联邦禁止攻击武器"
 amendment_federal_assault_weapons_ban_desc: "联邦10年禁止制造特定的半自动武器和供平民销售的高容量弹匣。 禁令受到质疑——其有效性受到反对者的质疑,其必要性受到支持者的质疑。 除非延期,否则十年后失效。 通过它的政治联盟是脆弱的,而枪支游说团已经在准备作出反应。"

 amendment_authorization_military_force: "授权使用军队"
 amendment_authorization_military_force_desc: "《使用武装部队授权》授权行政当局对`x id=0'的恐怖袭击责任人和窝藏他们的人使用军事力量。 语言刻意宽放. 法律学者将花费数十年的时间来争论其限度——或者它是否有限制. 在实践中,它降低了单方面军事行动的外交成本并扩大了"x id=1/"在国际舞台上的影响力."

 amendment_patriot_act: "《爱国者法》"
 amendment_patriot_act_desc: "《通过提供拦截和阻止恐怖主义所需的适当工具来团结和加强美国法》——称为《爱国者法》——大大地扩大了国内监测当局。 执法部门可以监测通信、追踪金融交易并分享各机构的情报,司法检查比以前少。 涡轮和革命压力下降。 公民自由的倡导者形容这是"x id=0"历史上宪法隐私被最严重的侵蚀."

 amendment_crime_bill_1994: "暴力犯罪控制和执法法"
 amendment_crime_bill_1994_desc: "1994年犯罪法案是"x id=0"历史上最大的犯罪立法. 它资助了数以万计的新警察,扩大了联邦监狱系统,对一系列罪行规定了强制性最低刑罚,并制定了《暴力侵害妇女行为法》作为骑警。 涡轮倒地. 最受它管理的社区将对其遗产有不同的看法。"

 # ==========================================
 # CHINA
 # ==========================================

 amendment_china_tax_reform_1994: "税收分担制度改革"
 amendment_china_tax_reform_1994_desc: "1994年的税收改革取代了以企业为基础的财政制度——地方政府在其中与北京谈判了收入分担安排——以国家增值税和正式的收入分担公式取而代之. 改革大大集中了财政力量. 北京获得可靠且不断增长的收入流. 地方政府丧失了酌处权,但变得更加明确。 它是"x id=0"现代财政架构的基础."

 amendment_one_child_policy: "独生子女政策"
 amendment_one_child_policy_desc: "国家通过经济奖励、社会压力以及在某些情况下的强制干预,对每个家庭实施一个孩子的限制。 出生率急剧下降。 在随后的几十年中, " x id=0 " 将迅速老化,劳动力将萎缩。 政策在城市地区执行最为严格,在农村地区执行最为不均。 国际社会和国内批评者都反对它的方法。"

 amendment_socialist_market_economy: "社会主义市场经济"
 amendment_socialist_market_economy_desc: "社会主义市场经济是[ROOT.GetCountry.GetName]运行市场机制,而党则坚持最终经济和政治方向的理论框架. 在国家规定的限度内允许和鼓励私营企业。 有选择地欢迎外国投资。 矛盾是真实的,是刻意的——这个框架旨在利用市场效率,而不放弃党的控制. 它的工作,在它的方式。"

 # ==========================================
 # FRANCE
 # ==========================================

 amendment_35_hour_work_week: "35小时工作周"
 amendment_35_hour_work_week_desc: "《奥布里法》规定,大多数雇员每周工作35小时,标准工时从39个缩短。 该政策被提出来作为更广泛地分担工作的一种方式——每名工人的工作时间减少,就业工人增加。 工会庆祝. 雇主认为它增加了成本并降低了灵活性。 关于它是否实际增加就业或只是重新分配现有工作的辩论不会很快得到解决。"

 amendment_pasqua_law: "帕斯夸法"
 amendment_pasqua_law_desc: "《帕斯夸法》大大地收紧了移民条例——更严格的入籍要求,减少了家庭团聚的权利,扩大了驱逐的理由,并对非法入境者的居留权施加了新的限制。 内政部长查尔斯·帕斯克(Charles Pasqua)将它视为国家秩序和文化一致性问题。 批评者认为,这是对`x id=0'的庇护和包容传统的蓄意回放。 这项法律的通过得到了公众的大力支持和重大的抗议。"

 amendment_medicaid_modifier: "医疗补助"
 amendment_medicaid_modifier_desc: "联邦医疗保险覆盖低收入公民. 死亡率下降,特别是在最贫穷阶层。"

 amendment_affordable_care_act_modifier: "奥巴马护理"
 amendment_affordable_care_act_modifier_desc: "规定私人健康保险有补贴和原有的条件保护。 死亡率略有下降;中等收入雇主和国家的成本上升。"

 amendment_federal_assault_weapons_ban_modifier: "联邦禁止攻击武器"
 amendment_federal_assault_weapons_ban_modifier_desc: "禁止制造和销售特定的半自动武器。 激进化略有减少。"

 amendment_authorization_military_force_modifier: "授权使用军队"
 amendment_authorization_military_force_modifier_desc: "对非国家行为者使用军事力量的广泛行政权力会降低干预的外交成本并扩展"x id=0"的所宣称的利益."

 amendment_patriot_act_modifier: "《爱国者法》"
 amendment_patriot_act_modifier_desc: "扩大的国内监视当局正在镇压动乱和革命活动。 合法性和外交声誉受到轻而易举的打击。"

 amendment_crime_bill_1994_modifier: "1994年《犯罪法案》"
 amendment_crime_bill_1994_modifier_desc: "扩大警力和强制最低警力正在减少动乱。 执法死亡率略有上升。 预算面临压力。"

 amendment_china_tax_reform_1994_modifier: "税收分担制度改革"
 amendment_china_tax_reform_1994_modifier_desc: "一个集中的增值税制度正在改善财政收入并减少浪费。 权威略有改善。"

 amendment_one_child_policy_modifier: "独生子女政策"
 amendment_one_child_policy_modifier_desc: "国家强制的生育限制使出生率急剧下降。 [ROOT.GetCountry.GetName] 人口在未来几十年中将显著老化。"

 amendment_socialist_market_economy_modifier: "社会主义市场经济"
 amendment_socialist_market_economy_modifier_desc: "在党政指导下运作的市场机制正在推进民营建设,提高吞吐量,扩大产业投资. 共产党运动的支持被适度地减少."

 amendment_35_hour_work_week_modifier: "35小时工作周"
 amendment_35_hour_work_week_modifier_desc: "法定的工作时间限制大大改善了工作条件。 吞吐量略有减少。 工会满意;雇主不满意。"

 amendment_pasqua_law_modifier: "帕斯夸法"
 amendment_pasqua_law_modifier_desc: "更严格的移民要求增加了限制性,减少了移民的牵引力. 对非家园居民的文化接受程度已经下降。"
