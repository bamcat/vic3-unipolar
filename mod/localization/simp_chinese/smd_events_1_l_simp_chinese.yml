 wot_coalition.2.t:0 "第5条"
 wot_coalition.2.d:0 "美国遭受袭击后,北约援引了第五条. 该联盟现在将这次攻击视为对所有成员的攻击."
 wot_coalition.2.f:0 "北大西洋联盟是为集体防御而建立的. 其第一次援引并非来自跨越边界的坦克,而是来自恐怖袭击。"
 wot_coalition.2.a:0 "与美国站在一起。"

 wot_coalition.10.t:0 "美国要求合作"
 wot_coalition.10.d:0 "美国要求巴基斯坦在反恐战争中进行合作。 华盛顿期望军队能进入阿富汗,建立权利,提供情报支持,以及进入阿富汗的后勤路线."
 wot_coalition.10.f:0 "巴基斯坦的地理学使它不可或缺。 然而,拒绝会招致关于伊斯兰堡正在庇护恐怖主义的指控。"
 wot_coalition.10.a:0 "与联盟合作."
 wot_coalition.10.b:0 "拒绝通牒."

 wot_coalition.11.t:0 "巴基斯坦合作组织"
 wot_coalition.11.d:0 "巴基斯坦已同意同美国和联盟伙伴合作,允许军事进入,并为在阿富汗的运动提供军事基地。"
 wot_coalition.11.f:0 "通往阿富汗的公路现在通向巴基斯坦。"
 wot_coalition.11.a:0 "封锁路线"

 wot_coalition.12.t:0 "巴基斯坦拒绝"
 wot_coalition.12.d:0 "巴基斯坦拒绝了美国的合作要求. 华盛顿现在把巴基斯坦同恐怖主义勾结起来,并准备直接的军事行动。"
 wot_coalition.12.f:0 "拒绝将后勤伙伴转变为目标。"
 wot_coalition.12.a:0 "他们选择了自己的一方。"

 wot_article_5_join_war_tt:0 "这个北约成员将加入美国,参与任何针对阿富汗的积极战争. 如果战争还没有开始,它就会在战争开始后加入."
