  # ── TAGENTOPOLI ──────────────────────

 je_tangentopoli: "坦根托波利语Name"
 je_tangentopoli_reason: "意大利实行回扣制. 公共合同——建筑、基础设施、国防采购、保健——由向政党支付一定比例的公司签订。 基督教民主党占了他们的份额. 社会党夺去他们的 较小的联盟伙伴拿走了他们的 每个人都知道。 每个人都参加。 战争以来就一直如此。 该系统叫作"x id=2/""Tangentopoli""x id=3/""-布里贝城". 它稳定、高效和完全腐败。 唯一的问题就是它是否能够活下来与拒绝另眼相看的法官接触."

 je_mani_pulite: "马尼·普利特"
 je_mani_pulite_reason: "调查正在进行中。 Antonio Di Pietro法官和米兰地方法官通过贿赂和回扣网络开展工作,这些网络自共和国成立以来资助了意大利的政治。 每次逮捕都会招供 每忏能通出名来. 每个名字都会导致另一个逮捕。\n\n 政治阶级正在反击. 紧急法令、地方法官的调动、对司法机构的公开攻击。 问题是调查能否在系统找到阻止的方法之前得出结论. \n\n@information! #bold 调查栏 #! 跟踪治安法官的进展情况。 id=7"抵抗"bar"x"id=8""跟踪政治阶层关闭的能力."

