 # ── EVENTS ───────────────────────────────
 
 velvet_divorce.1.t: "宪政危机开始"
 velvet_divorce.1.d: "1992年6月的选举产生了不可能的结果。 在捷克地盘上,瓦茨拉夫·克劳斯的公民民主党在快速市场自由化的平台上获胜. 在斯洛伐克,Vladimír Mečiar's Movement for a Democracy Slovakia在较慢的改革和更大的斯洛伐克自治纲领上获胜. \n\n 两人在布尔诺相会并商定一件事:目前的安排不能继续下去. 他们几乎对其它一切意见不一。 总统瓦茨拉夫·哈维尔(Václav Havel)认为民众会投票, `x id=4'的命运现在是今后几个月带来什么的问题。"
 velvet_divorce.1.f: "两次选举。 两项任务。 一国."
 velvet_divorce.1.a: "政府将努力维持联邦"
 
 velvet_divorce.2.t: "斯洛伐克经济冤情"
 velvet_divorce.2.d: "斯洛伐克的经济正遭受着比波希米亚和摩拉维亚更严厉的共产主义转型. 斯洛伐克工业基地——围绕《华沙条约》的重型制造和武器生产——几乎一夜之间崩溃了。 失业率急剧上升。 斯洛伐克政治人物指责联邦经济政策,要求重新分配或有权制定自己的路线。 国家两分之一的差距在政治上变得可以燃起。"
 velvet_divorce.2.f: "当半个国家表现良好,而另一半国家表现不佳时,为什么问题就变成了谁的问题."
 velvet_divorce.2.a: "将联邦基金转向斯洛伐克地区"
 velvet_divorce.2.b: "市场将找到其水平——没有特殊待遇"
 
 velvet_divorce.3.t: "斯洛伐克主权宣言"
 velvet_divorce.3.d: "斯洛伐克全国委员会通过斯洛伐克主权宣言. 文件没有宣布独立,但声称斯洛伐克法律取代了斯洛伐克领土上的联邦法律。 这在宪法上模棱两可,在政治上具有爆炸性。 哈维尔总统对此予以谴责并不久后辞去捷克斯洛伐克总统职务. 宣言尚未破裂——但这是朝着宣言迈出的第一个正式步骤。"
 velvet_divorce.3.f: "尚未独立. 但方向是明确的。"
 velvet_divorce.3.a: "谴责这一宣言——联邦法律是最高法律。"
 velvet_divorce.3.b: "公开会谈——向斯洛伐克提供联邦内更正式的自治权"
 
 velvet_divorce.4.t: "Mečiar和克勞斯: 二人两相相想"
 velvet_divorce.4.d: "弗拉迪米尔·梅契亚尔和瓦茨拉夫·克劳斯再次相遇. 他们的谈判立场更加强硬。 克勞斯想建立一个有统一经济政策的紧密联邦联盟. Mečiar想要的不是拥有几乎完全斯洛伐克国内自治权的松散的联盟,就是独立。 与会人员称其为"民间而不可调和". 两人不是敌人——但他们想要的是根本不同的东西,其中一人会得到他想要的东西."
 velvet_divorce.4.f: "二从行相. 相对结论。"
 velvet_divorce.4.a: "支持统一市场改革方案——支持克勞斯."
 velvet_divorce.4.b: "提供更松散的联盟——给Mečiar一些工作"
 
 velvet_divorce.5.t: "要求举行全民投票"
 velvet_divorce.5.d: "斯洛伐克政治家和民间团体呼吁举行独立公投. 提案在斯洛伐克得到公众的大力支持, 民意测验显示, 哈维尔总统尽管辞职,但仍具有影响力,他反对全民投票。 他认为这一过程本身会激起激情,使理性的结果变得不可能. 他说,“关于合并的股东会议表决方式, '他们感觉到他们走向它,或者远离它。'\n\n 是否进行表决的问题本身就是对`x id=4/> 所认为的进行表决。"
 velvet_divorce.5.f: "公民投票是一个问题。 但问一些问题会改变答案。"
 velvet_divorce.5.a: "举行全民投票——让人民发言"
 velvet_divorce.5.b: "阻止公民投票——听从哈维尔的律师"
 
 velvet_divorce.10.t: "捷克斯洛伐克幸存者"
 velvet_divorce.10.d: "危机已经过去。 通过经济妥协,政治谈判,以及联邦机构的坚持,[ROOT.GetCountry.GetName] 一直维持在一起.\n\n 出现的安排不是1990年的联邦。 斯洛伐克拥有更多的自治权。 两半经济关系再平衡. 但该州保存完好,旗帜不变. \n\n 历史将指出,这并不是不可避免的——它需要积极的选择,这些选择是作出的。"
 velvet_divorce.10.f: "丝绒离婚没有发生. 这是一个胜利。"
 velvet_divorce.10.a: "捷克斯洛伐克忍耐"
 
 velvet_divorce.15.t: "天鹅绒离婚案"
 velvet_divorce.15.d: "结束了 1993年1月1日,捷克斯洛伐克将不复存在。 联邦议会同意解散,而不是全民投票。 公众从未被直接询问。 全国两地的民意调查始终表明多数人支持维持某种形式的共同国家,但政治阶层——克劳斯和梅契亚尔首先——确定该联盟不可行。 分裂是和平的。 没有开枪。 没有边界争议。 联邦的资产和负债按以人口为基础的公式划分。 军被分出. 货币被分割. 国旗被拆分. \n\n 捷克斯洛伐克存在了74年. 它生于革命中,被议会投票解散. 两个继承国已经申请加入欧盟和北约。"
 velvet_divorce.15.f: "七十四岁. 以文书作结."
 velvet_divorce.15.a: "解散过程"
 
 velvet_divorce.16.t: "捷克共和国出生"
 velvet_divorce.16.d: "1993年1月1日,捷克成为一个独立国家. 以布拉格为首都的波希米亚,摩拉维亚和捷克西里西亚等地组成了捷克斯洛伐克联邦的两个继承国之一. \n\n 新国家继承了更发达的半个旧经济,一个正常运作的民主制度,并立即得到国际承认. 通往欧洲的道路是开放的。"
 velvet_divorce.16.f: "一个新州. 一个古老的国家。"
 velvet_divorce.16.a: "捷克共和国开始"
 
 velvet_divorce.17.t: "斯洛伐克共和国诞生"
 velvet_divorce.17.d: "1993年1月1日,斯洛伐克共和国成为一个独立国家. 布拉迪斯拉发是一个以这种形式存在了整整一天的国家的首都. \n\n 斯洛伐克继承了更重的工业遗产,更高的失业率,以及更复杂的政治环境-梅契亚尔的治理风格很快会引起国际批评. 但国家是主权的,得到承认的,并且历史上第一次完全独立."
 velvet_divorce.17.f: "历史上第一次:独立的斯洛伐克."
 velvet_divorce.17.a: "斯洛伐克共和国开始"
 
 velvet_divorce.18.t: "接下来是什么?"
 velvet_divorce.18.d: "捷克斯洛伐克正在解体。 其继承国——捷克共和国和斯洛伐克共和国——正在形成。 你是一个不再存在的国家的领袖。 现在的问题是,你将在接下来的工作中发挥什么作用。"
 velvet_divorce.18.f: "一国. 二未来相."
 velvet_divorce.18.a: "继续作为捷克共和国"
 velvet_divorce.18.b: "继续作为斯洛伐克共和国"
 velvet_divorce.18.c: "保留和观察解散情况"
 
