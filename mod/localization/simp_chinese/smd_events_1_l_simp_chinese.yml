 ip_peacetime.1.t:0 "检查站事件"
 ip_peacetime.1.d:0 "当地一起安全事件引起了公众的注意并引发了回应的压力."
 ip_peacetime.1.f:0 "甚至小规模的对抗也可能成为更广泛冲突的象征。"
