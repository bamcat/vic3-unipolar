troubles_troop_strength_bar_desc: "兵力"
troubles_troop_strength_bar_monthly_desc: "测量英国在北爱尔兰的兵力部署."

troubles_events.1.t: "在贝尔法斯特的轰炸"
troubles_events.1.d: "一枚汽车炸弹在贝尔法斯特爆炸,炸死平民并加剧了紧张局势。"
troubles_events.1.a: "悲剧."

troubles_events.2.t: "受攻击部队"
troubles_events.2.d: "英国士兵在德利遭到起义军的射击."
troubles_events.2.a: "我们必须作出反应。"

troubles_events.3.t: "民权抗议"
troubles_events.3.d: "伦敦德里的一次大规模抗议在与警方发生冲突后演变为暴力."
troubles_events.3.a: "一个令人担忧的事态发展。"

troubles_events.4.t: "抵达"
troubles_events.4.d: "新的部队已抵达北爱尔兰,加强了我们的存在。"
troubles_events.4.a: "不错。"

troubles_events.5.t: "枪手在爱尔兰Pub杀害平民"
troubles_events.5.d: "北爱尔兰的一起致命枪击事件震撼了当地社区,这可悲地反映了持续动乱期间的暴力。"
troubles_events.5.a: "通向和平的道路永远不是正路。"
 
je_northern_ireland_peace_process: "北爱尔兰和平进程"
je_northern_ireland_peace_process_reason: "几十年的冲突被称为"麻烦"后,英国和爱尔兰政府——同北爱尔兰的政党一道——进入了一个谈判时期. \n\n 从"唐宁街宣言"到多党会谈和可能的停火,这些讨论可能结束多年的流血. \n\n 结果将取决于政治意愿、公众舆论和妥协能力。"

ni_peace_process_success_tt: "和平进程已取得成功,增加了北爱尔兰的稳定。"

ni_peace_events.1.t: "唐宁街宣言"
ni_peace_events.1.d: "英国和爱尔兰政府发表联合声明,申明北爱尔兰人民有权决定他们的未来。"
ni_peace_events.1.a: "向前迈出了一大步。"

ni_peace_events.2.t: "多方会谈开始"
ni_peace_events.2.d: "爱尔兰北部大多数政治派别的代表第一次在谈判桌上开会。"
ni_peace_events.2.a: "对话是通向和平的道路。"

ni_peace_events.3.t: "耶稣受难日协议"
ni_peace_events.3.d: "在联合王国政府同爱尔兰进行了一系列积极会谈之后,北爱尔兰的准军事团体宣布停火,为持久和平打开了大门。"
ni_peace_events.3.a: "枪声不响"

ni_peace_events.5.t: "英国部队从北爱尔兰被踢出"
ni_peace_events.5.d: "随着在北爱尔兰的驻军减少到一无所有,英国政府发现自己无法维持控制. 在出人意料的举动中,政府正式将北爱尔兰割让给爱尔兰共和国."
ni_peace_events.5.a: "我们别无选择。"
ni_peace_events.5.a.tt: "北爱尔兰将划入爱尔兰."

ni_peace_events.6.t: "爱尔兰统一"
ni_peace_events.6.d: "经过几十年的分裂后,北爱尔兰正式加入爱尔兰共和国. 随着国家走向统一的未来,街道充满了庆祝活动。"
ni_peace_events.6.a: "开香槟!"
reunification_pride: "统一荣耀"
reunification_pride_desc: "国家统一的喜悦增强了公众团结,加强了政府的地位."

je_oil_titans:0 "石油巨头"
je_oil_titans_reason:0 "海湾是地球上 最大的石油储量。 " x id=0 " 的继承将决定下一个世纪——对该区域、全球能源市场以及工业、运输和繁荣以石油为生的每个国家而言。 目标不仅仅是取出石油。 它必须成为不可或缺的——成为世界前三名生产国之一,这样,当石油价格变动时,它就会移动,因为[ROOT.GetCountry.GetName]选择让它移动。"
 
oil_titans_top3_tt:0 "#bold [ROOT.GetCountry.GetName]是全球石油生产国中前3名. #! 日记条目是完整的——[ROOT.GetCountry.GetName]已经成为全球能源系统不可或缺的节点之一."
oil_titans_top10_tt:0 "[ROOT.GetCountry.GetName]是全球前10名并接近前3名的石油生产国. 继续投资于石油开采将缩小差距。"
oil_titans_outside_tt:0 "[ROOT.GetCountry.GetName]尚不是全球前十名石油生产国之一。 石油开采基础设施需要大量投资。"
 
oil_titans_bonus:0 "石油巨头"
oil_titans_bonus_desc:0 "[ROOT.GetCountry.GetName]是世界前三名石油生产国之一. 由此产生的收入流入国库,为建设提供资金,并给予 " x id=1/ " 一定程度的地缘政治影响,而仅靠人口规模是无法证明的。 世界需要[ROOT.GetCountry.GetAdjective]石油。 需要的是权力。"

bid_for_olympics_decision:0 "宣布参加奥运"
bid_for_olympics_decision_desc:0 "我们非常幸运地被国际奥林匹克委员会视为下届奥林匹克运动会的主办者。"
we_can_host_the_next_olympics_tt:0 "我们可以主办下届奥运会比赛."

 je_korea_reunification_nrk:0 "韩国统一"
 je_korea_reunification_nrk_reason:0 "朝鲜民主主义人民共和国是朝鲜民族的唯一合法政府。 北纬38度分出半岛是外国势力造成的人为伤害——这种临时安排[ROOT.GetCountry.GetName]致力于纠正.\n\n 在[ROOT.GetCountry.GetAdjective]领导下实现统一,将使朝鲜民族恢复完整. 韩国的南方政府必须进入"x id=4/"状态——通过武力,条约,或"x id=5/"力量的重量,使得进一步抵抗无法进行."
 
 korea_nrk_complete_tt:0 "#bold半岛统一为 [ROOT.GetCountry.GetAdjective]领导. #! 韩国是完整的。 1945年的划分已经改正."
 korea_nrk_subject_path_tt:0 "[SCOPE.sCountry('c:STK').GetName]是[ROOT.GetCountry.GetName]的一个学科. 南部行政已纳入 " x id=2/ " 州。 半岛的全面一体化正在进行。"
 korea_nrk_incomplete_tt:0 "[SCOPE.sCountry('c:STK').GetName]控制 [SCOPE.sState('STATE_SEOUL').GetName],[SCOPE.sState('STATE_BUSAN').GetName],[SCOPE.sState('STATE_YANGHO').GetName]. 统一要求[ROOT.GetCountry.GetName]拥有所有三个——或将[SCOPE.sCountry('c:STK').GetName]作为主体."
 
