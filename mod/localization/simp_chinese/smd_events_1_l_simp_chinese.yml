 arab_spring_jihadist_breakaways.1.t:0 "伊斯兰国兴起"
 arab_spring_jihadist_breakaways.1.d:0 "革命和国家崩溃的混乱使圣战势力得以巩固伊斯兰国旗下的领土."
 arab_spring_jihadist_breakaways.1.f:0 "老州抗革命. 革命打倒了旧州. 在他们之间的废墟中,第三支部队升起它的旗帜."
 arab_spring_jihadist_breakaways.1.a:0 "一个新的前锋打开。"

 arab_spring_jihadist_breakaways.2.t:0 "圣战者飞地"
 arab_spring_jihadist_breakaways.2.d:0 "随着"阿拉伯之春"破坏该地区的稳定,圣战组织细胞已经夺取了分散的领土并宣布效忠伊斯兰国."
 arab_spring_jihadist_breakaways.2.f:0 "国家撤出的地方,武装网络成为行政当局。"
 arab_spring_jihadist_breakaways.2.a:0 "危机蔓延."

 arab_spring_jihadist_breakaways.3.t:0 "胡塞斯扣押地"
 arab_spring_jihadist_breakaways.3.d:0 "也门革命使国家四分五裂,使胡塞运动能够夺取领土并调动自己的力量."
 arab_spring_jihadist_breakaways.3.f:0 "这次起义没有产生一个反对派,而是产生了许多反对派."
 arab_spring_jihadist_breakaways.3.a:0 "也门分裂。"

