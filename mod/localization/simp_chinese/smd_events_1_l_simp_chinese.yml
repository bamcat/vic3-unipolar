 ## breakup of czechoslovakia
 je_velvet_divorce: "天鹅绒离婚案"
 je_velvet_divorce_reason: "联邦面临压力。 从共产主义的过渡暴露了捷克和斯洛伐克两半国家之间的经济和政治分界线. 由Vladimír Mečiar领导的斯洛伐克政治人物正在推动更大的自治,有些人则要求完全独立。 捷克方面由瓦茨拉夫·克勞斯(Václav Klaus)为首,越来越愿意放走他们. \n\n 现在有两支部队在动 [ROOT.GetCountry.GetName]必须建立 #bold 联邦凝聚力 #! ——通过谈判、经济妥协和政治技巧,在 #bold 分裂主义压力 #!之前,使解散变得不可逆转. \n\n 如果压力在凝聚之前达到100,联邦就会解散. 平静的 这就是"天鹅绒"的意思."
 
 je_velvet_divorce_stable_tt: "联邦正在举行。 谈判仍在继续。 结果仍由政府掌握."
 je_velvet_divorce_tense_tt: "@warning! #bold 隔离压力正在上升。 #! 斯洛伐克政治家们越来越相信独立是可能和可取的. 谈判解决的窗口正在缩小。"
 je_velvet_divorce_critical_tt: "@warning! #bold 联邦正处于断点。#! 解散的政治条件已接近完成. 没有戏剧性的干预,捷克斯洛伐克将无法活过一年。"
 
