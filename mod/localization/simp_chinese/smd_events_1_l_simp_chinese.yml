 ip_peacetime.2.t:0 "安全崩溃"
 ip_peacetime.2.d:0 "巴勒斯坦安全部队面临打击好战分子和武装派别的压力。"
 ip_peacetime.2.f:0 "合作可以防止升级,但也可以看起来像合作。"
