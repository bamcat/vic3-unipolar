 demographic_events.1.t: "人口危机"
 demographic_events.1.d: "专家们警告说,我国面临严重的人口危机。 几十年来出生率下降,导致人口老化,不久将使我们的劳动力不堪重负。 如果不在儿童保育、保健、住房和社会福利方面持续投资,我们的经济基础将随着工人与受抚养人的比例倒闭而削弱。\n\n目前暂时的人口缓冲掩盖了最坏的影响,但这一缓冲将在未来几十年内衰败。 为了扭转这一趋势,我们必须实行和维持至少十年的全面的产前改革。"
 demographic_events.1.a: "在为时已晚之前我们必须行动"

 demographic_events.2.t: "人口恢复"
 demographic_events.2.d: "在对我国人民进行十年持续投资——普及儿童保育、普及保健、全面福利和负担得起的住房——之后,我国的出生率已经稳定。 有可能使我们的经济瘫痪的人口危机已经得到避免。 新一代的工人正在进入劳动力队伍,未来看起来很光明."
 demographic_events.2.a: "我们的耐心已经得到回报"

