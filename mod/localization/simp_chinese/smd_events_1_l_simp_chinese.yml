 je_ip_peacetime_international_mediation_desc:0 "请外部调解人稳定会谈。 这改善了谈判势头,但增加了外部审查。"

 je_ip_peacetime_grassroots_outreach:0 "基层外联"
 je_ip_peacetime_grassroots_outreach_desc:0 "支持民间社会、地方组织和非暴力政治举措。 这会降低紧张度,但会激怒强硬派。"

 je_ip_peacetime_mass_mobilization:0 "大规模动员"
