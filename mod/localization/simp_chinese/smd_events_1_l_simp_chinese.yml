 intifada_urban_uprising: "城市起义"
 intifada_urban_uprising_desc: "战斗发生在人口稠密的城市地区和难民营,在那里常规军事力量无法有效运作。 狭小的领土使得大规模的行动几乎不可能。"

 intifada_isr_morale: "以色列国防军"
 intifada_isr_morale_desc: "军事上的成功加强了以色列镇压起义的决心."

 intifada_popular_resistance: "民众抵抗"
 intifada_popular_resistance_desc: "巴勒斯坦人民在大规模抵抗中崛起。 每个街区都是据点 每个平民都是潜在的战士"

 intifada_stone_throwing: "街头抵抗运动"
 intifada_stone_throwing_desc: "持续的街头冲突和投掷石块使被以色列占领的地区极其难以控制。"

 intifada_idf_crackdown: "以色列国防军"
 intifada_idf_crackdown_desc: "以色列在平民地区的军事行动正在造成重大伤亡。"

 intifada_devastation: "起义销毁"
 intifada_devastation_desc: "战斗摧毁了整个领土的家园、基础设施和生计。"

 intifada_raid_expenses: "抵抗行动"
 intifada_raid_expenses_desc: "资助针对以色列军事阵地的协调抵抗行动。"

 intifada_international_pressure: "国际压力"
 intifada_international_pressure_desc: "全球媒体对冲突的报道损害了以色列的国际地位和外交声誉。"

 intifada_isr_reward: "起义"
 intifada_isr_reward_desc: "以色列镇压了第二次起义,重申对巴勒斯坦领土的军事控制。"

 intifada_pal_reward: "抵抗组织"
 intifada_pal_reward_desc: "巴勒斯坦人民通过民众抵抗、赢得承认和牺牲而取得让步而占上风。"
 
 je_israel_palestine_peacetime:0 "不稳定状态Quo"
 je_israel_palestine_peacetime_reason:0 "没有公开的起义或重大升级,但冲突继续通过安全协调、关闭、外交、示威和定期事件来进行。"
 je_israel_palestine_tension_bar:0 "冲突紧张"
 je_israel_palestine_tension_bar_desc:0 "区域不稳定"
 je_israel_palestine_tension_bar_second_desc:0 "高度紧张可能会引发重大升级警告,并可以连接到你的第二次起义系统."

 je_ip_peacetime_status_calm:0 "局势相对平静。 安全协调、谈判和国际调解正在使更广泛的升级停滞不前。"
 je_ip_peacetime_status_fragile:0 "平静是脆弱的。 事件、突袭、关闭、示威或解决纠纷可能很快使目前的平衡化为乌有。"
