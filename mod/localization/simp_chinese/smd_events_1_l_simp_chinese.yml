l_simp_chinese:
#################### JE ####################
# The Internet

je_internet:0 "互联网"
je_internet_reason:0 "是时候把我们的国家和互联网连接起来了! 我们必须升级我们的电信网络, 超越支持简单的电话交通,"

smd_tech.1.t:0 "[ROOT.GetCountry.GetName] 在线"
smd_tech.1.d:0 "几十年来,我们的通信一直依靠报纸、广播和电视。 但一场静悄悄的革命正在席卷世界——一个被称为"互联网"的互联互通的庞大计算机网络. 一旦成为学者和军事研究者,它现在承诺改变我们公民的工作、学习和联系方式。"
smd_tech.1.f:0 "拨号网络:因为没有任何东西说"高科技",比如叫喊叫叫声等了5分钟才装上猫的照片."

smd_tech.1.a:0 "也许其他技术应该连接到网络上!"
smd_tech.1.b:0 "我们可以利用网络控制舆论"

government_run_wifi_modifier:0 "政府干预Wifi"

# Computer Science

je_computer_science:0 "计算机科学"
je_computer_science_reason:0 "计算机科学是研究计算机如何工作,如何制造来解决问题,以及我们如何高效和安全地使用它们."

smd_tech.2.t:0 "计算机科学学位"
smd_tech.2.d:0 "把它想象成是逻辑思考和解决问题的科学——但用遵守每一个小指令的机器. 从智能手机到自驾车,"

# Pesticides

je_pesticides:0 "除草剂"
je_pesticides_reason:0 "农药是用来控制害虫的物质. 其中包括除草剂、杀虫剂、肾上腺素、杀真菌剂等。 其中最常见的是除草剂,约占全球农药用途的50%。 有了这个新的发明,我们面临着我们农业部门现代化,包括杀虫剂的义务."

smd_tech.3.t:0 "死虫之海 死虫之海 死虫之海"
smd_tech.3.d:0 "数千年来,昆虫和啮齿动物一直是对人类农业活动的无情威胁。 最近发明了各种食品安全化学品,驱除并杀死了有害的昆虫,我们可以产生更丰收的收成,同时一劳永逸地确保更大的粮食安全!"

smd_tech.3.a:0 "最好能减少环境破坏..."

# Globalization

je_globalization:0 "全球化"
je_globalization_reason:0 "全球化是20世纪后期的一种现象,其定义是更大的相互联系、文化、货物、武器和人民的自由过境,每一种现象都由全球范围内更大的自由贸易倡议所激发。"

je_asian_economic_reform: "经济改革"
je_asian_economic_reform_reason: "中国和印度长期受到经济限制. 全球经济正在迅速走向一体化和自由贸易。 通过取消过时的限制,我们可能带来前所未有的增长。 在此之前,我们的市场仍然受到限制。"

asian_economy_restrictions: "经济限制"
asian_economy_restrictions_desc: "国家控制的低效率和保护主义壁垒减缓了贸易,降低了竞争力和国际准入。"

booming_trade_economy: "刺激贸易经济"
booming_trade_economy_desc: "随着限制的解除,国内外市场蓬勃发展,导致更大的繁荣."

asia_reform.1.t: "市场开放"
asia_reform.1.d: "改革已经颁布,限制性贸易政策已经取消。 中国和印度现在站在经济全球化的前列。"
asia_reform.1.f: "“我们必须开放市场,"
asia_reform.1.a: "新的贸易时代开始了。"

# Starship

je_starships:0 "星舰"
je_starships_reason:0 "重用火箭的发明迅速刺激了另一种航天器即"星舰"的发明. 能够高效地突破行星际障碍 降落在火星上 回到地上 在保持宇航员身体稳定的同时 这是一种革命性的新设计 值得我们承认"

# coming soon

################ others ###########

# Cancer

cancer.1.t:0 "癌症的治疗"
cancer.1.d:0 "一个多世纪以来,癌症一直困扰着人类——一种无法预测的痛苦,夺走了数百万人的生命,并且未能治愈一切。 它不分国界,不尊重任何地位,在它所接触的每一个家庭都留下了灾难。 但今天,经过多年不懈的研究,临床试验,以及国际协作,科学家们已经做了不可能的事:开发出一种通用的,有针对性的治疗方法. 这种突破性疗法在不伤害健康组织的情况下检测并摧毁了恶性细胞,从而不仅可以缓解,而且可以保证."
cancer.1.a:0 "全人类的胜利"
cancer_eradication_prestige:0 "消除癌症"

# 2004 Indian Ocean earthquake and tsunami

indian_ocean_tsunami.1.t: "印度洋地震"
indian_ocean_tsunami.1.d: "一场大规模的海底地震已引发了灾难性的海啸,使南亚和东南亚的沿海地区遭受了毁灭性的破坏. 破坏是前所未有的,恢复需要几年时间。"
indian_ocean_tsunami.1.a: "我们必须立即开始重建。"
indian_ocean_tsunami.1.f: "一场毁灭性的地震和海啸摧毁了我们的沿海地区。"

je_indian_ocean_tsunami: "海啸灾后复苏"
je_indian_ocean_tsunami_reason: "一场毁灭性的海啸破坏了你们的沿海基础设施并震撼了该国。 重建努力对恢复和稳定至关重要。"

tsunami_recovery_success_tt: "你成功地启动了国家恢复。"

tsunami_disaster_struck: "全国海啸损害"
tsunami_local_destruction: "当地海啸灾害"
tsunami_reconstruction_complete: "重建完成"
  
indian_ocean_tsunami_recovery_title: "海啸灾后复原工作"
indian_ocean_tsunami_recovery_desc: "你的国家遭受了印度洋海啸的袭击。 实施援助和恢复,以稳定人口和基础设施。"

tsunami_aid_title: "提供人道主义援助"
tsunami_aid_desc: "开展福利改革或分配财政援助来帮助重建受影响地区。"

tsunami_disaster_struck: "全国海啸损害"
tsunami_local_destruction: "当地海啸灾害"
tsunami_reconstruction_complete: "成功的重建努力"
tsunami_recovery_success_tt: "国家在2005年12月之前颁布了一项社会福利法。"
 
indian_ocean_tsunami.2.t: "南亚海啸灾害"
indian_ocean_tsunami.2.d: "印度洋遭遇了大地震和海啸。 人道主义灾难迫在眉睫。 全世界都看着我们行动起来吗?"
indian_ocean_tsunami.2.f: "整个海岸线都消失了 迫切需要援助。"
indian_ocean_tsunami.2.a: "发送紧急援助。"
indian_ocean_tsunami.2.b: "我们有自己的优先事项。"

indian_ocean_tsunami.3.t: "收到的援助"
indian_ocean_tsunami.3.d: "一个外国提供了人道主义救济。 你的人感激不尽"
indian_ocean_tsunami.3.a: "感谢上帝的全球声援。"

tsunami_foreign_aid_sent: "向海啸受害者提供的外援"
countries_available_to_request_aid_from:0 "各国可请求"
has_sent_iosa:0 "已经发送援助"

je_request_iosa_aid_button:0 "请求国际援助"
je_request_iosa_aid_button_desc:0 "请国际社会提供援助,帮助从毁灭性地震和海啸中恢复。"

tsunami_disaster_struck: "受2004年印度洋地震和海啸影响"

# Iraq disarmament Crisis

je_iraq_disarmament_crisis: "伊拉克裁军危机"
je_iraq_disarmament_crisis_reason: "海湾战争后,伊拉克被联合国安全理事会第687号决议所约束,必须拆除其大规模毁灭性武器方案. 国际社会通过特委会和原子能机构努力核查遵守情况,但伊拉克的阻挠和视察争端造成了旷日持久的僵局。 由于伊拉克拒绝同裁军制度充分合作,紧张局势加剧,危机有可能重新引发冲突。"
iraq_disarmament_resolved_tt: "伊拉克裁军危机已经解决。"

je_us_iraq_disarmament: "伊拉克裁军危机"
je_us_iraq_disarmament_reason: "美国已承诺迫使伊拉克遵守联合国安全理事会第687号决议。 伊拉克一再阻挠特委会和原子能机构的视察,破坏了全球安全并加剧了海湾地区的紧张局势。 外交努力仍在继续,但如果视察失败,军事选择仍然摆在桌面上。"

iraq_events.10.t: "伊拉克拒绝特委会的飞机"
iraq_events.10.d: "在对联合国特别委员会(特委会)的大胆挑战中,伊拉克拒绝了视察员使用自己的飞机进入伊拉克的提议。 巴格达坚持全面控制进出和运输,令人对其裁军承诺重新感到关切。"
iraq_events.10.a: "拒绝他们的条件——伊拉克的主权首先。"
iraq_events.10.b: "允许飞行——合作可以缓和紧张局势。"

us_events.10.t: "特委会飞机"
us_events.10.d: "伊拉克拒绝允许特委会视察员驾驶自己的飞机进入该国,这进一步阻碍了视察工作。 这一举动被视为对联合国的直接蔑视和裁军努力的挫折。"
us_events.10.a: "这一点是无法解答的。"
us_events.10.b: "避免升级——目前。"

################# COUNTRY-SPECIFIC ##############

# united states

rodney.1.t:0 "警察殴打Rodney King"
rodney.1.d:0 "一名手无寸铁的非裔美国人罗德尼·金(Rodney King)在高速追逐后被洛杉矶警察局的警官暴力殴打. 一名旁观者拍摄了这次袭击,揭露了警察的暴行并引发了全国的愤怒."
rodney.1.f:0 "他们包围他,继续用警棍打他。 他没有反击。 令人惊骇的是,他们想以他为榜样。"

rodney.1.a:0 "这会是一个炎热的夏天.."

rodney.2.t:0 "洛杉矶暴动"
rodney.2.d:0 "警方被指控过度使用武力 殴打罗德尼·金后 大批民众走上街头"
los_angeles_riots:0 "罗德尼·金暴动"
rodney.2.a:0 "他们会自己安顿下来"
rodney.2.b:0 "派出国民警卫队!"

north_hollywood.1.t: "北好莱坞枪击案"
north_hollywood.1.d: "两名被劫匪身穿盔甲并携带突击步枪。 被枪杀的军官不得不从当地一家枪械店借来武器,以作出有效反应。"
north_hollywood.1.f: "两名全副武装的银行劫匪与洛杉矶警方进行了长时间的枪战,打伤了多名军官和平民. 该事件震撼了全国,并引发了警察备战问题."
north_hollywood.1.a: "执法史上令人寒心的一天."

north_hollywood_police_response:0 "加强执法支助"

wtc_bombing.1.t: "1993年 世界贸易中心轰炸"
wtc_bombing.1.d: "纽约市世贸中心北塔下方有一枚威力强大的卡车炸弹爆炸,造成6人死亡,1000多人受伤. 这次袭击震惊了该国,暴露出该国境内易受恐怖主义伤害的脆弱性。"
wtc_bombing.1.a: "增加国内安全措施。"
wtc_bombing.1.b: "保持冷静,避免过度反应。"
heightened_security_measures: "加强安全措施"
heightened_security_measures_desc: "为应对恐怖袭击,政府实施了更强有力的国内安全政策和执法协调."
oklahoma_city_aftermath: "俄克拉荷马城轰炸"
oklahoma_city_aftermath_desc: "Alfred P. Murrah联邦大楼被毁灭性地轰炸,使全国动荡不安。 随着政府加强国内警惕,安全问题和政治影响依然存在。"
 
usa_events.1.t: "共和国主要成果"
usa_events.1.d: "在充满了辩论和竞选的热门第一季之后,共和党选择了新的标准持有者. 乔治·W·布什取得了胜利,夺取了小资产阶级的统治权,并为该党承诺了一个大胆的新篇章。"
usa_events.1.a: "提名是他的。"

usa_events.2.t: "巴拉克·奥巴马的提名"
usa_events.2.d: "在充满了辩论和竞选的激烈的第一季之后,民主党选择了新的标准制定者。 巴拉克·侯赛因·奥巴马获得了胜利,掌握了小资产阶级的统治权,并许诺该党将有一个大胆的新篇章。"
usa_events.2.a: "提名是他的。"

usa_events.3.t: "唐纳德·特朗普的提名"
usa_events.3.d: "在充满了辩论和竞选的热门第一季之后,共和党选择了新的标准持有者. 特别有争议人物唐纳德·约翰·特朗普(Donald John Trump)出现了胜利之地,掌握了专业人士的统治权,并给党带来了大胆的新篇章."
usa_events.3.a: "提名是他的。"

# Storm of the Century
american_disasters.1.t: "1993年世纪风暴"
american_disasters.1.d: "一场大规模的环球风暴席卷了美国东部,带来了创纪录的降雪,飓风强度的风,并沿海岸出现严重洪灾. 数百万人没有电力,死亡人数每天都在上升。"
american_disasters.1.a: "我们必须忍受冬天的愤怒。"

# Great Flood of 1993
american_disasters.2.t: "大洪灾!"
american_disasters.2.d: "数周的暴雨和饱和土壤使密西西比河和密苏里河相继膨胀到其岸外,淹没了美国中西部的广大地区. 整个城镇都在水下,破坏是前所未有的."
american_disasters.2.a: "心地之灾."

great_flood_of_1993: "1993年大水灾"
storm_of_the_century: "1993年世纪风暴"

# Columbine

columbine.1.t: "科罗拉多高中大屠杀"
columbine.1.d: "两名全副武装的学生在科罗拉多州Columbine中学进行了致命袭击,造成多人死亡和多人受伤。 这一事件引发了全国对枪支管制、学校安全和文化影响的悲痛和辩论。"
columbine.1.a: "思想和祈祷"
columbine.1.b: "我们必须加强全国学校的安全。"

national_mourning_school_shooting: "感动学校射击"
school_security_measures: "学校安全措施"

better_school_security: "改善学校安全"
thoughts_and_prayers: "想法和祈祷"
recent_mass_shooting: "最近的大规模射击"

# September 11 Attacks 

ground_zero: "地面零"
  
je_war_on_terror: "反恐战争"
je_war_on_terror_reason: "2001年9月11日对美国的恐怖袭击标志着全球持续打击恐怖主义运动的开始。 袭击发生后,美国发动了所谓的"反恐战争"——一项将军事行动,情报工作,国内安全措施相结合的广泛战略. 结果改变了外交政策、公民自由辩论和国际联盟。"

usa_wot.1.t: "美国受到攻击"
usa_wot.1.d: "协调一致的恐怖袭击袭击了纽约市和华盛顿特区,摧毁了世界贸易中心的塔楼并严重破坏了五角大楼. 数千人伤亡。 国家震惊了,要求作出响应."
usa_wot.1.a: "一天将活在耻辱中。"

usa_wot.2.t: "反恐战争"
usa_wot.2.d: "在袭击发生后,总统宣布对策划、支持或窝藏恐怖组织的人开展全球运动。 这项宣言将增加国内安全措施和国外的军事承诺。"
usa_wot.2.a: "我们将将他们绳之以法。"

global_wot.1.t: "美国被攻击;数千人死亡"
global_wot.1.d: "美国遭受了毁灭性的恐怖主义袭击。 世界领导人表示哀悼,许多国家正在重新考虑其安全安排。"
global_wot.1.a: "全人类的悲剧。"

global_wot.2.t: "美国宣布反恐战争"
global_wot.2.d: "9·11袭击事件后,美国宣布了全球"反恐战争"——呼吁国际社会加入反对恐怖集团及其支持者的运动."
global_wot.2.a: "国际秩序发生了变化。"

global_wot.3.t: "第5条"
global_wot.3.d: "在"九一一"袭击后以及随后美国在阿富汗的军事行动后,北约宪章第五条在历史上首次被援引. 作为一个成员国,我们被要求加入战争努力。"
global_wot.3.a: "我们与我们的盟友站在一起。"

usa_wot.3.t: "炭疽袭击 恐怖美国"
usa_wot.3.d: "在"9·11"袭击事件后几周,包含致命炭疽孢子的匿名信被邮寄给新闻组织和美国参议员. 袭击在全国各地造成了恐惧,引发了大规模的调查,并加剧了对生物武器的关切。"
usa_wot.3.a: "正义将得到伸张。 它会很快的。"
usa_wot.3.b: "又来了!"
  
je_hunt_for_bin_laden: "乌萨马·本·拉丹的狩猎"
je_hunt_for_bin_laden_reason: "在2001年9月11日的袭击之后,美国对基地组织领导人乌萨马·本·拉丹进行了广泛的全球搜索。 该任务将跨越边界,涉及军事行动、情报收集以及外交压力。"
intensified_intelligence_operations: "乌萨马·本·拉丹的狩猎"

hunt_bin_laden_progress_bar: "亨特进步"
hunt_bin_laden_progress_bar_desc: "搜索进度"
osama_bar_completed: "发现乌萨马·本·拉丹"

usa_wot.10.t: "乌萨马·本·拉丹的狩猎"
usa_wot.10.d: "随着反恐战争的进行,美国情报机构和特种部队开始在全世界搜索乌萨马·本·拉丹。 现在的决定将决定行动的强度和范围。"
usa_wot.10.a: "承诺提供所有必要资源。"
usa_wot.10.b: "注重其他优先事项。"

usa_wot.12.t: "本·拉登被俘获"
usa_wot.12.d: "经过多年的追捕,乌萨马·本·拉丹被找到并被消灭。 美国庆祝反恐战争取得重大胜利."
usa_wot.12.a: "正义得到了伸张。"

usa_wot.11.t: "美国杀死本·拉登"
usa_wot.11.d: "经过数月的情报收集和准备,美国海军海豹突击队对巴基斯坦阿博塔巴德的一处大院发动了大胆的突袭. 目标:抓捕或杀害乌萨马·本·拉丹。 世界正在等待结果。"

usa_wot.11.a: "胆小到最后。"

usa_wot.11.success_tt: "乌萨马·本·拉丹在巴基斯坦被害. 反恐战争进入了一个新的阶段。"

usa_wot.20.t: "情报突破"
usa_wot.20.d: "中央情报局特工从俘虏的好战分子那里发现了有价值的情报,为本·拉登可能的下落提供了新的线索."
usa_wot.20.a: "好极了,往前推"
usa_wot.20.a.tt: "寻找本·拉登的进展有所增加。"

usa_wot.21.t: "本·拉登发布视频"
usa_wot.21.d: "几个月的追踪 疑似与本·拉登有关联的嫌疑人 证明是死路一条 资源被浪费了。 更糟糕的是,中东部恐怖分子已经发布了一个视频,供美国公众观看."
usa_wot.21.a: "令人沮丧的挫折。"
usa_wot.21.a.tt: "找到本·拉登的进展已经减少。"

usa_wot.22.t: "区域合作"
usa_wot.22.d: "巴基斯坦和区域盟国在情报收集方面提供援助,加快了对本·拉登的追捕."
usa_wot.22.a: "这将极大地帮助我们。"
usa_wot.22.a.tt: "寻找本·拉登的进展已大大增加。"
 
accuse_iraq_wmds_button: "占领伊拉克的大规模毁灭性武器"
accuse_iraq_wmds_button_desc: "利用伊拉克秘密开发或窝藏大规模毁灭性武器。 这将加剧紧张局势并可能为军事行动辩护。"

end_war_on_terror_button: "结束反恐战争"
end_war_on_terror_button_desc: "宣布反恐战争正式结束,结束国际行动。 这将给国内外留下遗留的后果。"

usa_wot.30.t: "关于窝藏大规模毁灭性武器的指控"
usa_wot.30.d: "美国公开指责我们秘密地发展和窝藏大规模毁灭性武器。 这标志着紧张局势严重升级并可能使冲突更加接近。"
usa_wot.30.a: "吓人"
  
osama_extradited: "乌萨马·本·拉丹已被引渡"
war_on_terror_stopped_tt: "反恐战争已经结束"
# War on TERROR

usa_wot.5.t: "本·拉登被羁押"
usa_wot.5.d: "令人惊讶的外交突破是,阿富汗同意将乌萨马·本·拉丹引渡到美国。 这一让步标志着反恐战争初期的重大胜利。"
usa_wot.5.a: "这是一个重大的外交胜利。"

usa_wot.6.t: "阿富汗拒绝引渡本·拉丹"
usa_wot.6.d: "阿富汗政府拒绝将乌萨马·本·拉丹交给美国当局. 随着华盛顿辩论其下一步行动,紧张局势上升。"
usa_wot.6.a: "你要么和恐怖分子在一起,要么反对他们。"
usa_wot.6.b: "让我们不要采取任何草率的行动,现在..."

je_request_bin_laden_extradition_button: "请求引渡本·拉丹"
je_request_bin_laden_extradition_button_desc: "正式要求阿富汗将乌萨马·本·拉丹引渡到美国受审."

bin_laden_extradition_accepted_country: "本·拉丹 引渡 - 接受"
bin_laden_extradition_accepted_country_desc: "阿富汗已同意引渡乌萨马·本·拉丹,提高国家士气并改进军事准备。"
  
bin_laden_extradition_accepted_ig_armed_forces: "本·拉丹 引渡 - 接受"
bin_laden_extradition_accepted_ig_armed_forces_desc: "武装部队对政府在确保本·拉登被引渡方面的外交成功感到高兴."

bin_laden_extradition_rejected_country: "B. 本·拉丹引渡 - 被拒绝"
bin_laden_extradition_rejected_country_desc: "阿富汗拒绝引渡乌萨马·本·拉丹,损害了我们的军事准备和紧张的资源。"
  
bin_laden_extradition_rejected_ig_armed_forces: "持久自由"
bin_laden_extradition_rejected_ig_armed_forces_desc: "武装部队对政府未能确保本·拉登被引渡感到愤怒."

bin_laden_extradition_rejected_ig_armed_forces_2: "没有入侵阿富汗"
bin_laden_extradition_rejected_ig_armed_forces_2_desc: "武装部队对政府未能确保本·拉登被引渡感到愤怒."

