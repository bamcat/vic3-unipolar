 je_ip_peacetime_complete_tt:0 "紧张局势非常低,谈判得到推进,安全协调是持久的。"

 je_ip_peacetime_security_coordination:0 "安保协调"
 je_ip_peacetime_security_coordination_desc:0 "扩大实际协调,防止地方事件成为更大规模的危机. 这会降低紧张,但会造成国内政治反弹."

 je_ip_peacetime_closure_policy:0 "关闭政策"
 je_ip_peacetime_closure_policy_desc:0 "强化出行和出行控制,降低即时安全风险. 这降低了短期紧张局势,但损害了巴勒斯坦经济并增加了国际压力。"

 je_ip_peacetime_settlement_freeze:0 "冻结定居点"
