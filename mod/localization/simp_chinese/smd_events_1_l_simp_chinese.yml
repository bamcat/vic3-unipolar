 ip_peacetime.20.f:0 "这不是最终的和平,但不仅仅是没有战争。"
 ip_peacetime.20.a:0 "一个脆弱的成功。"
 
 oslo_accords.1.t:0 "《奥斯陆协议一》"
 oslo_accords.1.d:0 "以色列谈判者同巴勒斯坦领导人达成了一项拟议的原则宣言。 该提案将为巴勒斯坦自治建立相互承认和临时框架。"
 oslo_accords.1.f:0 "该协定不解决边界、耶路撒冷、定居点、难民或最终主权问题。 然而,它确实提供了一个分阶段的政治进程。"
 oslo_accords.1.a:0 "提出原则宣言。"
 oslo_accords.1.b:0 "推迟协议"

 oslo_accords.10.t:0 "以色列提出奥斯陆协议"
 oslo_accords.10.d:0 "以色列提出了一项建立相互承认的原则宣言和巴勒斯坦临时自治框架。"
 oslo_accords.10.f:0 "接受将开始一个新的政治进程并结束对以色列的正式从属关系,但许多最终地位问题仍将得不到解决。"
 oslo_accords.10.a:0 "接受原则宣言。"
 oslo_accords.10.b:0 "否决提案。"

 oslo_accords.11.t:0 "巴勒斯坦接受奥斯陆一号协议"
 oslo_accords.11.d:0 "巴勒斯坦领导人接受了《原则宣言》。 临时和平进程已经开始。"
 oslo_accords.11.f:0 "握手是历史性的;艰难的工作才刚刚开始。"
 oslo_accords.11.a:0 "过程开始了。"

 oslo_accords.12.t:0 "巴勒斯坦拒绝奥斯陆一号"
 oslo_accords.12.d:0 "巴勒斯坦领导人拒绝了拟议的《原则宣言》。"
 oslo_accords.12.f:0 "未经双方接受,外交开放即告结束."
 oslo_accords.12.a:0 "会谈破裂了"

 oslo_accords.2.t:0 "《奥斯陆协定二》"
 oslo_accords.2.d:0 "在《原则宣言》发表两年后,以色列谈判人员已拟订一项临时协定,扩大巴勒斯坦在西岸和加沙的自治。"
 oslo_accords.2.f:0 "该提案将权力划分为巴勒斯坦控制区、共同责任区和以色列继续控制区。"
 oslo_accords.2.a:0 "提出临时协定。"
 oslo_accords.2.b:0 "进一步调动延迟。"

 oslo_accords.20.t:0 "以色列提出奥斯陆协定二"
 oslo_accords.20.d:0 "以色列提出了一项临时协定,扩大巴勒斯坦自治,将西岸组织为A、B和C区。"
 oslo_accords.20.f:0 "该协定承诺扩大权力,但也巩固了重叠管辖权的零散分布图。"
 oslo_accords.20.a:0 "接受临时协议。"
 oslo_accords.20.b:0 "否决提案。"

 oslo_accords.21.t:0 "巴勒斯坦接受《奥斯陆协定二》"
 oslo_accords.21.d:0 "巴勒斯坦领导人接受了《临时协定》。 奥斯陆进程已进入下一阶段。"
 oslo_accords.21.f:0 "更多的权力被转移,但最终解决办法仍然遥远。"
 oslo_accords.21.a:0 "执行协议。"

 oslo_accords.22.t:0 "巴勒斯坦拒绝奥斯陆II"
 oslo_accords.22.d:0 "巴勒斯坦领导人拒绝了拟议的《临时协定》。"
 oslo_accords.22.f:0 "奥斯陆一世所建造的结构幸存了下来,但其下一步却失败了."
 oslo_accords.22.a:0 "过程的停顿。"

 oslo_i_peace_process:0 "奥斯陆第一和平进程"
 oslo_i_peace_process_desc:0 "《原则宣言》开启了正式的临时和平进程。"

 oslo_i_palestinian_authority:0 "巴勒斯坦权力机构成立"
 oslo_i_palestinian_authority_desc:0 "巴勒斯坦临时当局已开始承担民事责任。"

 oslo_talks_delayed:0 "会谈已延迟"
 oslo_talks_delayed_desc:0 "外交进程停滞不前,令人沮丧和不确定。"

 oslo_ii_interim_agreement:0 "奥斯陆协定二"
 oslo_ii_interim_agreement_desc:0 "临时协定扩大了巴勒斯坦自治框架。"

 oslo_ii_expanded_self_government:0 "扩大的自治政府"
 oslo_ii_expanded_self_government_desc:0 "巴勒斯坦机构承担了更大的行政责任。"

 oslo_ii_joint_security_framework:0 "联合安全框架"
 oslo_ii_joint_security_framework_desc:0 "目前正在临时框架内协调安全责任。"

 oslo_ii_administrative_fragmentation:0 "行政分裂"
 oslo_ii_administrative_fragmentation_desc:0 "领土通过分散和重叠的管辖管理。"

 oslo_ii_delayed_redeployment:0 "延迟调动"
 oslo_ii_delayed_redeployment_desc:0 "进一步的重新部署被推迟,破坏了对这一进程的信心。"

 oslo_accords.30.t:0 "《奥斯陆一号协定》已经签署"
 oslo_accords.30.d:0 "以色列和巴勒斯坦接受了《原则宣言》。 预期美国现在将支持新的和平进程并帮助维持临时框架。"
 oslo_accords.30.f:0 "外交开放已经出现,但它需要担保人、金钱、压力和耐心。"
 oslo_accords.30.a:0 "监测进程。"

 oslo_accords.31.t:0 "《奥斯陆协议一》失败"
 oslo_accords.31.d:0 "拟议的《原则宣言》遭到拒绝。 在建立临时框架之前,外交开放已经结束。"
 oslo_accords.31.f:0 "没有相互接受,外部调解就不能单独进行这一进程。"
 oslo_accords.31.a:0 "调解的挫折。"

 oslo_accords.32.t:0 "《奥斯陆协定二》已经签署"
 oslo_accords.32.d:0 "以色列和巴勒斯坦接受了《临时协定》,扩大了巴勒斯坦的自治并建立了奥斯陆进程的下一阶段。"
 oslo_accords.32.f:0 "该协定在外交上是成功的,但其权力划分的地图可能难以管理。"
 oslo_accords.32.a:0 "支持执行。"

