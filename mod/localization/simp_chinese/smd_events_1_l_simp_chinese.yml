 ip_mass_mobilization:0 "大规模动员"
 ip_mass_mobilization_desc:0 "公共动员正在增加政治压力,但也增加了对抗的风险。"

 ip_security_alert:0 "安全警报"
 ip_security_alert_desc:0 "安全部队在最近动乱后处于高度戒备状态。"

 ip_international_scrutiny:0 "国际审查"
 ip_international_scrutiny_desc:0 "外国政府和媒体正在密切注视事态发展。"

 ip_political_backlash:0 "政治反弹"
