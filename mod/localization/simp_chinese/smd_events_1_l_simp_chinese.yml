# canada

canada.1.t:0 "泪水高速公路"
canada.1.d:0 "不列颠哥伦比亚16号高速公路的一段被通称为"眼泪之道"(the Highway of Tears),已经成为加拿大悲剧和不公正的象征,自1970年代以来,加拿大有数十名土著妇女和女童失踪或被谋杀. 在乔治王子和鲁珀特王子之间,偏远地区长期缺乏公共交通,迫使许多人搭便车——往往造成致命的后果。"
canada.1.f:0 "他们(当局)把她放进钢箱。 这一定是个封闭的棺材 因为他们找到她的方式... ... 他停下来止住眼泪,然后把话说出“她......恶化了”。"

canada.1.a:0 "不幸的是,这个国家面临着更紧迫的问题."
canada.1.b:0 "我们应该感到羞愧!"

je_indigenous_rights: "土著权利"
je_indigenous_rights_reason: "土著权利问题仍然是国内政治中最重要的未决问题之一。 代代相传的剥夺、强迫同化和违背条约义务,造成了土著和非土著人口之间的严重结构性不平等。 缩小这一差距需要持续的政治意愿——并面临那些从现状中受益的人的抵制。"


 indigenous_je_status_usa_tt: "在整个美国,570多个联邦承认的部落占据了占其祖先领地一小部分的保留地. 预期寿命、受教育程度和保留地的收入远远落后于国家平均水平。 人们普遍承认,联邦信托责任——保护部落主权和福利的法律义务——没有得到充分履行。"

 indigenous_je_status_can_tt: "加拿大的第一民族梅蒂斯人和因努伊特人超过一百万,生活在由1876年"印第安人法"所建立的保留地制度下. 印度寄宿学校制度——强迫土著儿童离开家庭,以“同化”他们——一直运作到1996年,直到最近才关闭最后一所学校。 这一体系的世代相传的创伤今天继续影响着土著社区。"

 indigenous_je_status_nzl_tt: "毛利人——Tangata winua,即当地人民——于1840年同英国王室签署了《怀唐伊条约》。 该条约从未得到充分遵守。 19世纪没收土地剥夺了大部分领地的毛利人社区,毛利人新西兰人的健康、收入和监禁率继续面临巨大差距。 1975年设立的威坦哲法庭继续审理对王国政府的指控。"

 indigenous_je_status_ast_tt: "澳大利亚的土著居民和托雷斯海峡岛民是世界上最古老的连续文化,也是其处境最不利的文化之一。 ‘斯多伦一代'——土著儿童根据一直持续到1970年代的州同化政策被强行带离家庭——留下了尚未痊愈的伤口. 土著澳大利亚人的预期寿命仍然低于全国平均水平十几年。 1992年的马博决定首次承认了土著产权,但执行情况参差不齐。"

 # indigenous.1 — Land Rights
 indigenous.1.t: "土著土地权利要求"
 indigenous.1.d_usa: "部落民族联盟提出正式要求,主张对大片联邦土地拥有权利,认为非法夺取该领土违反了条约义务。 这一指控得到了媒体的大量报道和法律支持。 法院正在监视,更广泛的美洲原住民社区也在监视。"
 indigenous.1.d_can: "一个原住民乐队声称土著对大片王室土地拥有所有权,声称任何有效的条约都没有取消他们对该领土的权利。 申诉已经提交联邦法院。 法律专家指出,加拿大关于土著所有权的判例正在发生重大变化,政府的回应将开创一个重要的先例。"
 indigenous.1.d_nzl: "怀唐伊法庭发表了一份报告,认为王国政府在管理有争议的土地时没有遵守《怀唐伊条约》。 调查结果没有法律约束力,但具有重大的道德和政治意义。 毛利人社区正在呼吁政府立即就这些建议采取行动。"
 indigenous.1.d_ast: "联邦法院维持了对目前租给牧民利益集团的一个地块的土著产权要求。 裁决要求政府就土地使用权与索赔集团进行谈判。 牧业团体正极力游说政府上诉这一决定."
 indigenous.1.f: "土地永远属于他们。 所问法相会否."
 indigenous.1.a: "谈判一项解决办法——满足索赔要求"
 indigenous.1.b: "在法庭上争权夺利——我们的立场是站得住脚的"

 # indigenous.2 — Treaty Obligations
 indigenous.2.t: "审议中的条约义务"
 indigenous.2.d_usa: "一份国会报告发现,联邦政府没有履行其对数十个部落国家的条约义务——每年为保留地提供的保健、教育和基础设施不足数十亿美元。 部落领导人呼吁对联邦信托责任进行正式审查,并承诺缩小资金缺口。"
 indigenous.2.d_can: "一个议会委员会提交了一份报告,详细介绍了原住民社区在历史条约下的义务方面长期资金不足的情况。 该报告指出了住房、水基础设施和教育方面的具体不足。 政府必须决定如何作出反应,以及是否投入必要的资源,使条约完整。"
 indigenous.2.d_nzl: "毛利人领导人向政府提交了一份正式备忘录,认为最近的一系列政策决定违反了《怀唐伊条约》的原则。 备忘录列举了资源管理、保健和教育资金领域的具体违反情况,并呼吁对所有政府部门遵守条约的情况进行全面审查。"
 indigenous.2.d_ast: "一个土著权利组织发表了一份详细分析,说明政府对土著社区所作承诺和实际资源分配之间的差距。 报告的结论是,以不到60分的美元兑现条约和解决承诺。 社区领导人要求进行正式审计并作出全面遵守的有约束力的承诺。"
 indigenous.2.f: "写在纸上的承诺 只能和保留它的意愿一样好"
 indigenous.2.a: "充分履行我们的义务——承诺提供资源"
 indigenous.2.b: "确认不足之处——逐步改进工作"

 # indigenous.3 — Cultural Preservation
 indigenous.3.t: "对土著语言的威胁"
 indigenous.3.d: "语言学家发表了一份报告,警告说用 " x id=0 " 的几十种土著语言濒临灭绝。 在许多情况下,只有少数讲流利的话者——都是老年人。 一旦丢失,这些语言就无法恢复. 包括口述历史、生态知识、法律传统, 问题是政府是否准备投入必要的资源来扭转这一轨迹——或者它是否将默默地目睹历史的消失."
 indigenous.3.f: "语言是世界. 它的死亡是不可逆转的。"
 indigenous.3.a: "资助土著语言振兴方案"
 indigenous.3.b: "这是社区的问题,而不是政府的问题。"

 # indigenous.4 — Health Crisis
 indigenous.4.t: "土著健康危机"
 indigenous.4.d: "一份国家卫生报告强调,在[ROOT.GetCountry.GetName]中,土著和非土著卫生成果之间存在巨大差距。 预期寿命大大降低。 糖尿病、吸毒成瘾和精神疾病——其中许多是植根于世代相传的创伤——的比率要高得多。 保留地和偏远社区的婴儿死亡率是全国平均水平的多倍。 医疗机构要求提供文化上适当、资金充足的土著保健服务。 不作为的代价——以生命来衡量——是巨大的。"
 indigenous.4.f: "健康不平等是一种政治选择。"
 indigenous.4.a: "投资于专门的土著保健方案"
 indigenous.4.b: "所有公民均可平等享受现有的保健制度。"

 # indigenous.5 — Reservation Conditions (USA/CAN)
 indigenous.5.t: "准备金的条件"
 indigenous.5.d_usa: "一名联邦监察长的报告发现,许多美洲原住民保留地的生活条件大大低于国家标准. 住房过于拥挤和破旧不堪。 在几十个保留地上,获得清洁饮用水是不可靠的。 许多社区的失业率超过50%。 报告称情况为"联邦忽视危机",并建议大幅增加印第安事务局的资金."
 indigenous.5.d_can: "政府的一项审计发现,数百个原住民社区正在接受煮取水的咨询——其中一些社区已经十多年了。 许多保留地的住房严重拥挤。 精神保健服务基本上不存在。 审计结论是,联邦政府用于原住民社区的人均开支大约比其他加拿大人用于同等服务的开支低30%。"
 indigenous.5.f: "储备系统是用来控制而不是支持的。"
 indigenous.5.a: "增加联邦对保留社区的供资"
 indigenous.5.b: "维持目前的供资水平——预算不允许增加"

 # indigenous.6 — Reservation Economic Development (USA/CAN)
 indigenous.6.t: "土著土地的经济发展"
 indigenous.6.d_usa: "一些部落国家提出了经济发展倡议,包括游戏业务、资源开采伙伴关系和旅游企业,这将为保留地社区带来大量收入。 这些提案需要联邦批准,并面临相邻州政府和商业利益的反对,他们视部落企业为竞争. 部落领导人认为,经济自给自足是摆脱贫困的唯一可持续途径。"
 indigenous.6.d_can: "资源丰富的地区的原住民社区正在寻求就传统领土上或附近资源开采的收入分享协定进行谈判。 一些社区还提议与省级政府建立林业和能源开发合资企业。 这些建议为经济自给自足提供了一条道路——但要求政府分享它历来完全声称的控制和收入。"
 indigenous.6.f: "没有经济基础的主权是一个空话。"
 indigenous.6.a: "支持土著经济发展——核准提案"
 indigenous.6.b: "优先考虑现有资源利益——这些建议造成复杂情况"

 # indigenous.20 — Ipperwash
 indigenous.20.t: "Ipperwash危机"
 indigenous.20.d: "Stoney Point Ojibwe抗议者占领了安大略的Ipperwash省公园,声称该地——包括一个神圣的墓地——在二战期间被从他们的社区被非法没收用作军事基地,并且从未按照承诺归还. 占领是和平的,但安大略省警察已经建立了警戒线,要求指导如何进行。 局势很紧张。 抗议者中有武器。 还有长者、家人和50年来一直得不到解决的合法冤情。"
 indigenous.20.f: "一座墓地被取走。 它从来没有被还回来。"
 indigenous.20.a: "命令人民党驱散占领——恢复秩序"
 indigenous.20.b: "指示人民党下台——谈判和平解决"

 # indigenous.21 — Last residential school
 indigenous.21.t: "最后一所寄宿学校关闭"
 indigenous.21.d: "萨斯喀彻温普尼希的戈登寄宿学校已经关闭了大门——这是加拿大最后一所联邦运营的印度寄宿学校. 自1874年以来,寄宿学校系统强迫大约150 000名土著儿童离开其家庭,将他们安置在积极压制土著语言、文化和身份的机构——身体和性虐待非常普遍。 关闭最后一所学校不是解决办法。 承认蓄意文化破坏的一章终于正式结束。 生还者还活在它的后果中."
 indigenous.21.f: "最后的学校已经关闭。 它造成的伤没有。"
 indigenous.21.a: "加拿大历史上的黑暗篇章已经结束"

 # indigenous.22 — TRC
 indigenous.22.t: "真相与和解委员会的报告"
 indigenous.22.d: "加拿大真相与和解委员会已经发表了最后报告,这是印度寄宿学校系统6 500多名幸存者六年来作证的高潮。 报告记录了系统虐待、文化种族灭绝和强迫同化政策造成的多代人创伤。 委员会发出了94个行动呼吁——关于儿童福利、教育、语言、卫生和司法等领域的具体建议。 报告使用"文化种族灭绝"一词来描述所做的. 政府现在必须决定如何认真对待委员会的工作。"
 indigenous.22.f: "真理是第一步。 和解是几代人的工作。"
 indigenous.22.a: "正式接受行动呼吁——承诺实现和解"
 indigenous.22.b: "确认报告——认真审查行动呼吁"

 indigenous.10.t: "走向平等的步骤"
 indigenous.10.d_usa: "美国颁布平权行动立法是朝着解决美洲原住民社区与其他历史上被边缘化的群体所面临的结构性不平等迈出的重要一步。 它不是解决土著剥夺土地问题的全面办法,而是对弥合世代相传的差距作出有意义的承诺。"
 indigenous.10.d_can: "加拿大已颁布了平权行动立法——正式承认制度性不平等需要系统补救。 对于原住民,梅蒂斯人,和因努伊特人社区来说,这个衡量标准是一个大得多的谜题的一部分. 但是,它表明一种政治意愿,即认真对待土著人处于不利地位的问题,并以政策支持这种意愿。"
 indigenous.10.d_nzl: "新西兰颁布了平权行动立法,承认毛利人和新西兰人之间的差距不是个人失败的结果,而是历史政策的产物。 对毛利人社区来说,这是一个有意义的步骤——尽管怀唐伊法庭指出,它的许多建议仍未得到执行。"
 indigenous.10.d_ast: "澳大利亚已颁布了平权行动立法,这是一项重大的政策转变,承认土著不利地位的结构性质。 对土著和托雷斯海峡岛民社区来说,这是进步。 预期寿命、健康结果和教育程度方面的差距不会一夜之间就结束,但旅行方向已经改变。"
 indigenous.10.f: "通通正法之道为道. 这是向前迈出的一步。"
 indigenous.10.a: "这是正确的事情"

 indigenous_land_settlement: "土地权的解决"
 indigenous_land_settlement_desc: "通过谈判解决土地权利问题改善了与土著社区的关系并增强了政府的合法性。"

 indigenous_land_contested: "土地权利争议"
 indigenous_land_contested_desc: "在法庭上对土著土地权利提出质疑的决定加剧了与土著社区的紧张关系。"

 indigenous_treaty_honoured: "条约义务"
 indigenous_treaty_honoured_desc: "充分遵守条约义务加强了合法性并增强了政府对土著社区的地位。"

 indigenous_treaty_partial: "部分履行的条约义务"
 indigenous_treaty_partial_desc: "部分遵守条约义务并未使土著权利倡导者满意。"

 indigenous_cultural_investment: "土著文化投资"
 indigenous_cultural_investment_desc: "政府资助土著语言和文化方案,支持社区的复原力。"

 indigenous_health_investment: "土著保健方案"
 indigenous_health_investment_desc: "专门的土著保健方案正在改善土著社区的保健成果。"

 indigenous_health_cost: "土著保健方案费用"
 indigenous_health_cost_desc: "新的土著保健方案对保健预算提出了额外要求。"

 indigenous_health_neglect: "土著保健忽视"
 indigenous_health_neglect_desc: "未能解决土著健康差距正在引起持续的不满。"

 indigenous_reservation_investment: "储备社区投资"
 indigenous_reservation_investment_desc: "联邦为保留地社区增加的资金开始缩小生活水平的差距。"

 indigenous_reservation_cost: "准备金供资费用"
 indigenous_reservation_cost_desc: "社区储备资金的增加使联邦预算紧张。"

 indigenous_reservation_neglect: "被忽略的社区"
 indigenous_reservation_neglect_desc: "储备社区长期资金不足继续引起不满和国际批评。"

 indigenous_economic_development: "土著经济发展"
 indigenous_economic_development_desc: "支持土著经济发展倡议正在为社区创造收入并改进自给自足。"

 indigenous_economic_blocked: "土著经济发展受阻"
 indigenous_economic_blocked_desc: "土著经济发展提案遭到拒绝,损害了与原住民社区的关系。"

 ipperwash_crackdown: "Ipperwash 崩溃"
 ipperwash_crackdown_desc: "土著抗议者在Ipperwash遭到暴力驱散,"

 ipperwash_negotiation: "Ipperwash 和平解决"
 ipperwash_negotiation_desc: "和平解决Ipperwash对峙提高了政府对土著社区的信誉。"

 indigenous_residential_school_closed: "最后一所寄宿学校关闭"
 indigenous_residential_school_closed_desc: "印度最后一所寄宿学校的关闭标志着文化破坏政策的正式结束——尽管其后果是持久的。"

 trc_accepted: "真相与和解委员会"
 trc_accepted_desc: "加拿大正式接受真相与和解委员会的“行动呼吁”,这是对解决寄宿学校遗留问题的重大承诺。"

 trc_enactment_bonus: "和解任务"
