 ### ══════════════════════════════════════════
 
 chechen_war.1.t: "进攻性的开始"
 chechen_war.1.d: "战争的决定性阶段已经开始。 确定早期冲突的游击战让位于直接对抗。 高加索山脉将见证车臣的最后斗争。"
 chechen_war.1.a: "为了俄罗斯!"
 chechen_war.1.a.che: "为了伊克里亚!"
 
 chechen_war.2.t_rus: "车臣的俄罗斯胜利"
 chechen_war.2.d_rus: "车臣抵抗运动已经被打破. 俄军已经重新控制了分离的共和国. 生命和基础设施的损失是巨大的,但俄罗斯联邦的领土完整得到了维护。"
 chechen_war.2.t_che: "车臣独立"
 chechen_war.2.d_che: "车臣战士无所不包地取得了胜利。 俄罗斯军队已经撤出,车臣共和国伊克里亚作为一个独立国家站立. 自由的代价是惊人的,但车臣人民的意愿已证明是不可打破的。"
 chechen_war.2.a: "历史将记住这一天"
 
 chechen_war.5.t: "山地埋伏"
 chechen_war.5.d: "我们的战士已经确认了一个俄国车队 穿过一个狭窄的山口 地形适合埋伏——两侧有陡峭的悬崖,机动空间有限,森林茂密,为我们的人提供掩护."
 chechen_war.5.a: "从山上出击"
 chechen_war.5.b: "守住阵地"
 
 chechen_war.6.t: "对供应线的突击检查"
 chechen_war.6.d: "俄罗斯补给车队在极少护卫的情况下穿过低地. 我们的战斗机可以拦截他们,抓取宝贵的物资并打乱敌人的后勤——但这次行动会耗去我们的资源并可能引起报复."
 chechen_war.6.a: "搜查了他们的补给线"
 chechen_war.6.b: "太危险了"
 
 chechen_war.7.t: "高加索战争"
 chechen_war.7.d: "伊克里亚车臣共和国已宣布独立,而俄罗斯则以出兵反击. 北高加索被战争吞没. 崎岖的山地地形使车臣游击队拥有了天生的优势,但俄罗斯的军事实力是巨大的."
 chechen_war.7.a: "就这样开始了"
 
