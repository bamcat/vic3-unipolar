 intifada_2005.1.a:0 "接受一个白色的和平。"

 intifada_2005.2.t:0 "第二次起义风向下"
 intifada_2005.2.d:0 "战斗已经平息,起义已经进入了一个新的更安静的阶段."
 intifada_2005.2.f:0 "尚未达成最后解决办法,但升级已自焚。"
 intifada_2005.2.a:0 "斗争继续以其他方式进行."

 intifada_2005_ceasefire:0 "第二次起义停火"
