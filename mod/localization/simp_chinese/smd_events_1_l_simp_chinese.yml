# japan

japan.1.t: "福岛核灾难"
japan.1.d: "在大规模地震和海啸后,福岛第一核电站遭受了灾难性故障,将放射性材料释放到环境中。 这场灾难震惊了世界,引发了全球关于核安全和应急准备的辩论。"
japan.1.a: "一场民族悲剧——一场全球警钟."

fukushima_nuclear_disaster: "福岛核灾难"
fukushima_nuclear_disaster_desc: "福岛第一核电站受到的严重破坏已导致放射性污染、基础设施被破坏以及国家的长期恢复努力。"

# south sudan

southsudan.1.t: "南苏丹独立公投"
southsudan.1.d: "经过几十年的冲突和决定性的公投后,苏丹南部各州分道扬镳,组成了南苏丹共和国. 喀土穆的中央政府面临命运的选择:接受新国家或去打仗以收复新国家."
southsudan.1.a: "我们不允许苏丹分裂。"
southsudan.1.b: "放了他们 为了和平"

# russia

first_chechen_war: "第一次车臣战争"

russia_parliament_resisting: "议会抵制"
russia_military_loyality: "军事共犯"
russia_parliamentary_support: "议会支助"
russia_constitution_crisis_resolved_mod: "危机已扭转"

je_russian_constitutional_crisis: "俄罗斯宪政危机"
je_russian_constitutional_crisis_reason: "1993年使俄罗斯处于政治崩溃的边缘。 总统鲍里斯·叶利钦想巩固行政权力,下令解散俄罗斯议会,指责其成员阻挠改革并抵制民主化. 议会又宣布叶利钦的法令违宪,拒绝解散并动员支持者拥护其事业. \n\n 几个星期来,随着敌对派别获得不同军事、安全部队和公众的支持,紧张局势加剧。 政府机构骨折,对决定俄罗斯联邦命运的行政或立法部门忠诚。 这种对峙不仅仅是一场政治争端——这是一场关于后苏联时代俄罗斯治理本质的战斗. 如果危机升级失控,莫斯科心脏地区的国内暴力不仅是可能的,而且是不可避免的。"

je_russia_wild_nineties: "狂野的90年代"
je_russia_wild_nineties_reason: "`野生90年代'(俄語:Лихие Лихие, Likhiye devyanostyye)是一个带有负面评价含义的名词,取自1990年代苏联和俄罗斯联邦解体后过渡时期的特点. \n\n 俄罗斯从苏联统治向资本主义民主的动荡过渡引发了不稳定、腐败和暴力浪潮。 后苏维埃初期的特点是经济崩溃,寡头主义兴起,政治出众,有组织犯罪激增. \n\n 从对议会的炮击到私有化丑闻,每个月似乎都带来新的动荡. 国家在改革与混乱之间摇摆不定,人民耐心消瘦."

rus_events.0.t: "1993年俄罗斯宪法危机开始"
rus_events.0.d: "总统鲍里斯·叶利钦颁布法令解散了俄罗斯议会,指责它阻碍民主改革并威胁联邦的稳定. 议会宣布此举违宪,呼吁军方和公民抵制。 俄罗斯脆弱的民主的命运现在悬在平衡之中。"
rus_events.0.a: "国家屏息."

1993_russian_crisis_tt: "危机已经结束"
rus_events.1.t: "宪政危机"
rus_events.1.d: "叶利钦总统已经宣布解散议会,但立法者拒绝下台,把自己堵入白宫. 紧张局势正在迅速升级。"
rus_events.1.a: "与总统并肩作战"
rus_events.1.a.tt: "军方会支持行政部门的"
rus_events.1.b: "支持议会"
rus_events.1.b.tt: "我们将捍卫立法机构的权威。"

rus_events.2.t: "军方支持总统"
rus_events.2.d: "武装部队已经控制了街道,炮击了议会大楼并保障了叶利钦的权威."
rus_events.2.a: "危机已经结束。"

rus_events.3.t: "议会胜利"
rus_events.3.d: "尽管政府施加了压力,但议会赢得了民众的支持并保留了权力。"
rus_events.3.a: "危机已经结束。"

rus_events.4.t: "袭击白宫"
rus_events.4.d: "莫斯科陷入了混乱. 亲总统的军队已经包围了俄罗斯白宫,是议会领导层的所在地,并用坦克和小武器开火. 烟斗从上层,随着大楼被点燃。 最终的抵抗随着军队夺取控制权而倒闭,标志着对峙的结束——但牺牲了生命和国家的政治清白."
rus_events.4.a: "现在恢复秩序。"

# chechnya

je_first_chechen_war_reason: "第一次车臣战争始于1994年末,当时俄罗斯联邦试图重新控制被分裂的车臣共和国伊克里亚. \n\n 冲突将造成生命和资源损失,格罗兹尼发生激烈的城市战斗,北高加索地区受到广泛破坏。 在没有明确胜利的情况下结束战争可能会损害政府的信誉,但继续战斗有可能长期不稳定。"
je_first_chechen_war: "车臣战争"
chechen_war_resolved: "车臣战争得到解决"

chechen_events.1.t: "车臣战争"
chechen_events.1.d: "俄罗斯部队已经进入车臣,以恢复联邦控制,开始预期的迅速行动。 然而,山区地势和坚决的当地抵抗可能使冲突演变为长期冲突。"
chechen_events.1.a: "我们将恢复秩序。"

chechen_events.2.t: "袭击格罗兹尼"
chechen_events.2.d: "格罗兹尼战役已经开始,俄军试图夺取车臣首都. 战斗激烈,双方伤亡惨重."
chechen_events.2.a: "继续前进,不管付出多少代价。"

chechen_events.3.t: "车臣和平谈判"
chechen_events.3.d: "经过数月的战斗后,双方的战争疲惫程度已经增加. 停火建议已经摆在桌面上,从而结束了流血。"
chechen_events.3.a: "接受和平并撤出部队。"
chechen_events.3.b: "继续战争直到胜利."

# haiti

uphold_democracy: "维护民主行动"

haiti_events.1.t: "维护民主行动"
haiti_events.1.d: "1994年9月,美国对海地发动了军事干预,以恢复1991年政变中被推翻的民选总统让-贝特朗·阿里斯蒂德. 美军在国际同盟军的支持下,守卫了关键地区,为阿里斯蒂德的回归铺平了道路."
haiti_events.1.a: "部署部队以恢复民主。"
haiti_events.1.b: "我们将准备外国军队。"

haiti_events.2.t: "外国部队抵达"
haiti_events.2.d: "美国部队已登陆海地,控制了战略地点。 这种干预是恢复民主治理的手段,但会引起主权和外国影响的问题。"
haiti_events.2.a: "我们必须合作避免流血。"

je_haiti_political_crisis: "海地政治危机"
je_haiti_political_crisis_reason: "1990年让-贝特朗·阿里斯蒂德总统民主当选后,海地经历了短暂的乐观。 然而,1991年9月,一场军事政变推翻了阿里斯蒂德,使该国陷入了政治混乱之中。 随着侵犯人权行为和政治镇压的蔓延,军事政权受到国际谴责。 联合国和美洲国家组织实施的经济制裁严重影响了海地本已艰难的经济。 在整个1992年和1993年,军政府同阿里斯蒂德支持者之间的谈判动摇了,而针对政治反对派和普通民众的暴力却在加剧。 联合国海地特派团(联海特派团)恢复民主治理的努力受到阻碍。 到1994年,国际社会特别是美国的压力越来越大,为直接干预奠定了基础。 由美军于1994年9月领导的"维持民主行动"(Uphold Democracy),旨在让阿里斯蒂德重新掌权并结束军政府统治."

# quebec
# [GetPlayer.MakeScope.GetVariable('quebec_happiness_var').GetValue|0]

je_quebec_happiness: "魁北克局势"
je_quebec_happiness_reason: "魁北克在加拿大境内的地位几十年来一直是有争议的问题. 魁北克独特的文化、语言和历史经常激起关于自治和独立的辩论。 在1995年魁北克公投之前的几年里,魁北克与加拿大联邦政府的关系一直以紧张,谈判为特征,民族主义情绪偶尔会爆发. \n\n 魁北克省以其独特的法语多数、独特的文化特征以及倡导自治的悠久历史,定期寻求重新界定其在加拿大联邦中的地位。 一些魁北克人渴望完全独立,另一些人则希望增加省级权力,而许多人仍然支持留在统一的加拿大.\n\n 作为总理,你的任务是渡过这一微妙的局面. 你们必须在民族团结与尊重魁北克的文化和政治愿望之间取得平衡。 你所做的每一项决定——无论是关于语言法、经济政策还是文化投资的决定——都将影响魁北克人的幸福。 如果魁北克幸福得分仍然很高,公投可能会以投票决定留在加拿大而结束. 但是如果不满情绪过于强烈,魁北克人民可以投票支持独立,永远地改变北美的地图."
