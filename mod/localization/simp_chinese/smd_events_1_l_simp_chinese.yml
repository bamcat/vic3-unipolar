 ### ══════════════════════════════════════════

 je_intifada_military_operation: "防御盾牌行动"
 je_intifada_military_operation_desc: "向巴勒斯坦领土发动全面军事行动。 以色列国防军部队将重新占领主要的人口中心,拆除好战的基础设施并以武力镇压起义。"

 je_intifada_mass_resistance: "大众抵抗运动"
 je_intifada_mass_resistance_desc: "将起义升级为协调群众抵抗运动. 全面打击、群众示威和街头激烈战斗将挑战以色列在各个战线的控制。"

 intifada_minimum_score_tt: "要求冲突分数优势至少为5"

 ### ══════════════════════════════════════════
 ### EVENTS
 ### ══════════════════════════════════════════

 intifada_events.1.t: "冲突升级"
 intifada_events.1.d: "起义升级,超越了街头冲突. 开始的石头和抗议变成了一场全面对抗。 在巴勒斯坦狭窄的巷道和难民营中,每栋建筑都是要塞,每条街都是战场."
 intifada_events.1.a: "我们会恢复秩序的"
 intifada_events.1.a.pal: "我们永远不会停止抵抗"

 intifada_events.2.t_isr: "起义结束"
 intifada_events.2.d_isr: "第二次起义被镇压. 以色列的军事行动已再次对巴勒斯坦领土实行控制,尽管国际声誉和巴勒斯坦平民生命的损失是巨大的。 潜在的冤情仍未得到解决。"
 intifada_events.2.t_pal: "巴勒斯坦抵抗运动"
 intifada_events.2.d_pal: "第二次起义取得了似乎不可能的成就。 通过坚定的决心和牺牲,巴勒斯坦人民迫使以色列走上谈判桌。 世界目睹了人民抵抗占领的力量。"
 intifada_events.2.a: "接下来呢?"

 intifada_events.5.t: "街头冲突"
 intifada_events.5.d: "年轻的巴勒斯坦人聚集在以色列检查站的边缘,被用石头和燃烧的轮胎武装起来。 狭窄的街道将冲突引向近乎四分之一的争斗,以色列装甲车辆无法有效地操作。 环球电视相机录相."
 intifada_events.5.a: "加强抵抗"
 intifada_events.5.b: "显示约束"

 intifada_events.6.t: "检查点突袭"
 intifada_events.6.d: "分割巴勒斯坦社区的以色列军事检查站既是占领的象征,也是战术目标。 协调一致的打击可能破坏以色列对领土内行动的控制,尽管这将招来严厉的报复。"
 intifada_events.6.a: "打出检查站"
 intifada_events.6.b: "太危险了"

 intifada_events.8.t: "国际媒体报道"
 intifada_events.8.d: "国际媒体正在全世界广播起义的画面。 以色列军队面对的巴勒斯坦平民的情景在世界各地的首都引起了抗议和谴责。 阿拉伯联盟各国正在支持巴勒斯坦事业,而以色列则面临越来越大的外交压力。"
 intifada_events.8.a: "世界在看着"

 intifada_events.7.t: "第二次起义"
 intifada_events.7.d: "巴勒斯坦领土已经爆发。 经过多年的和平谈判和持续的定居点扩张失败后,巴勒斯坦人民的沮丧情绪已经升级为公开起义。 在加沙和西岸山坡的拥挤的街道上,新一代人开始斗争。"
 intifada_events.7.a: "这将定义一代"

