 korea_reunification_bonus:0 "韩国统一"
 korea_reunification_bonus_desc:0 "朝鲜半岛的分裂已经结束. 1945年以来,全国第一次实现全面. 权威、合法性和声望得到显著提高。 分裂主义和革命压力被压制. [ROOT.GetCountry.GetAdjective] 状态可以启动整合统一的韩国的工作."
 
 korea_stk_integration_bonus:0 "北方一体化"
 korea_stk_integration_bonus_desc:0 "[ROOT.GetCountry.GetName]正在吸收前作"x id=1/"的领土. 南北之间的经济和行政差距很大——一体化需要持续投资和加速一体化。 成本是真实的,但目标是统一的韩国."
 
 y2k_events.1.t: "千年臭虫"
 y2k_events.1.d: "随着2000年的到来,一种宁静的焦虑笼罩了[ROOT.GetCountry.GetAdjective] 工程师 官僚 信息技术部门 所谓的"Y2K"问题——发现大多数计算机系统存储年份为两位数,因此会将"00"解释为"1900"而不是"2000"——引发了全球性的拼接. \n\n 有人说后果可能是灾难性的:电网失效,银行系统腐败,空中交通管制变得暗淡. 也有人表示, [ROOT.GetCountry.GetName] 必须决定如何认真对待。"
 y2k_events.1.f: "午夜就要来了 灯光是否保持是另一个问题。"
 
 y2k_events.1.a: "投资完全Y2K合规"
 y2k_events.1.a_tt: "昂贵、彻底和可能不必要的——但是,如果哪怕有一小部分的预测是正确的,则无所事事的代价要高得多。 [ROOT.GetCountry.GetName]将资助关键基础设施的合规方案。"
 y2k_events.1.b: "它显然过于夸张——忽略它"
 y2k_events.1.b_tt: "恐慌是一种咨询行业的金矿,仅此而已。 [ROOT.GetCountry.GetName] 不会将公共资金浪费在一个想象中的问题上。"
 
 # ── NEW YEAR 2000 ─────────────────────────
 
 y2k_events.2.t: "新年快乐-欢迎来到2000年"
 y2k_events.2.d: "1999年12月31日午夜时分过后,灯已经亮起。 飞机一直飞着 银行开了 电网响起 取出水来. 千年虫是计算历史中最预期到的灾难,它只是悄悄地赶来,而不是一阵大爆炸,也许它根本就没有到来,而花费在遵守方面的数十亿只是起作用了。 纵观[ROOT.GetCountry.GetName], 人群充斥街道, 烟花点燃了天空, 二十一世纪已经开始。 接下来是别人的猜测"
 y2k_events.2.f: "今年是2000年。 世界并没有结束。 这,所有的事情,都是好消息。"
 
 y2k_events.2.a: "新世纪开始了"
 
