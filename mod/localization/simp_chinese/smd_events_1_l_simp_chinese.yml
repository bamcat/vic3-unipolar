 yugoslav_collapse.1.t:0 "联邦断裂"
 yugoslav_collapse.1.d:0 "民族主义政府和垮台的联邦当局将南斯拉夫推向解体的边缘。"
 yugoslav_collapse.1.a:0 "共和国必须团结在一起。"
 yugoslav_collapse.1.b:0 "提供邦联和解."
 yugoslav_collapse.1.c:0 "以武力恢复联邦权力。"

 yugoslav_collapse.2.t:0 "克罗地亚解体"
 yugoslav_collapse.2.d:0 "克罗地亚已走向独立,迫使贝尔格莱德决定是战斗还是承认休息。"
 yugoslav_collapse.2.a:0 "发动克羅地亞独立战争."
 yugoslav_collapse.2.b:0 "承认克罗地亚独立。"

 yugoslav_collapse.3.t:0 "波斯尼亚宣布独立"
 yugoslav_collapse.3.d:0 "波斯尼亚的独立在全共和国引起了相互竞争的主张,塞族实体开始组织自己的领土权力."
 yugoslav_collapse.3.a:0 "波斯尼亚战争开始了。"
 yugoslav_collapse.3.b:0 "承认波斯尼亚并寻求解决办法。"

 yugoslav_collapse.4.t:0 "国际反应"
 yugoslav_collapse.4.d:0 "随着南斯拉夫冲突的蔓延,外国政府就维持和平、制裁和调解进行辩论。"
 yugoslav_collapse.4.a:0 "维持和平特派团是必要的。"
 yugoslav_collapse.4.b:0 "这是一个内部问题。"

 yugoslav_collapse.5.t:0 "塞尔维亚要求统一"
 yugoslav_collapse.5.d:0 "贝尔格莱德要求我们政府回到一个恢复的南斯拉夫国家."
 yugoslav_collapse.5.a:0 "接受统一。"
 yugoslav_collapse.5.b:0 "拒绝要求"

 yugoslav_collapse.10.t:0 "邦联谈判"
 yugoslav_collapse.10.d:0 "一个松散的南斯拉夫联盟可能维护和平,但各共和国仍然怀疑贝尔格莱德的意图."
 yugoslav_collapse.10.a:0 "继续推进改革."
 yugoslav_collapse.10.b:0 "进程失败 。"

 yugoslav_collapse.20.t:0 "南斯拉夫保留"
 yugoslav_collapse.20.d:0 "通过妥协和克制,南斯拉夫避免了完全分裂,接受了邦联解决办法。"
 yugoslav_collapse.20.a:0 "联邦幸存."

 yugoslav_collapse.30.t:0 "黑山的全民投票"
 yugoslav_collapse.30.d:0 "黑山正准备决定是否继续与塞尔维亚结盟或恢复完全独立。"
 yugoslav_collapse.30.a:0 "承认黑山的独立。"
 yugoslav_collapse.30.b:0 "保住会盟."

 srpskas.1.t:0 "塞族共和国动员"
 srpskas.1.d:0 "波斯尼亚塞族领导人已动员起来,争取领土安全,反对波斯尼亚新政府。"
 srpskas.1.a:0 "发动战争"
 srpskas.1.b:0 "接受波斯尼亚境内的自治。"

 kosovo_events.1.t:0 "科索沃危机"
 kosovo_events.1.d:0 "科索沃不断加剧的动乱和镇压造成了一场危机,可能使阿尔巴尼亚和北约与南斯拉夫发生冲突。"
 kosovo_events.1.a:0 "崩溃。"
 kosovo_events.1.b:0 "提供广泛的自主权。"

 kosovo_events.2.t:0 "干预科索沃?"
 kosovo_events.2.d:0 "科索沃冲突已经升级。 北约政府就对南斯拉夫的军事干预进行辩论."
 kosovo_events.2.a:0 "开始轰炸行动"
 kosovo_events.2.b:0 "避免升级。"

 kosovo_events.3.t:0 "北约轰炸"
 kosovo_events.3.d:0 "北约飞机开始攻击南斯拉夫目标。 贝尔格莱德必须选择是撤出科索沃还是反抗。"
 kosovo_events.3.a:0 "撤出科索沃。"
 kosovo_events.3.b:0 "抵抗北约."

 kosovo_events.4.t:0 "科索沃的地位"
 kosovo_events.4.d:0 "随着南斯拉夫部队的撤出和国际行政当局的建立,科索沃的地位必须得到解决。"
 kosovo_events.4.a:0 "科索沃独立。"
 kosovo_events.4.b:0 "科索沃仍然自治。"

 yugoslav_war_crimes.1.t:0 "围攻萨拉热窝"
 yugoslav_war_crimes.1.d:0 "来自萨拉热窝的报告描述了炮击、饥饿和被围困的平民的痛苦。"
 yugoslav_war_crimes.1.a:0 "否认责任并继续下去。"
 yugoslav_war_crimes.1.b:0 "开始调查"

 yugoslav_war_crimes.2.t:0 "斯雷布雷尼察"
 yugoslav_war_crimes.2.d:0 "关于斯雷布雷尼察附近大规模屠杀的报告引起了国际愤怒。"
 yugoslav_war_crimes.2.a:0 "驳回指控"
 yugoslav_war_crimes.2.b:0 "与调查人员合作。"

 yugoslav_war_crimes.3.t:0 "答复萨拉热窝"
 yugoslav_war_crimes.3.d:0 "围困加强了对国际行动的要求。"
 yugoslav_war_crimes.3.a:0 "谴责贝尔格莱德。"
 yugoslav_war_crimes.3.b:0 "发表有限抗议."

 yugoslav_war_crimes.4.t:0 "答复斯雷布雷尼察"
 yugoslav_war_crimes.4.d:0 "这场大屠杀改变了国际上对战争的情绪。"
 yugoslav_war_crimes.4.a:0 "要求问责制。"
 yugoslav_war_crimes.4.b:0 "避免进一步参与。"

 yugoslav_war_crimes.5.t:0 "国家悲伤"
 yugoslav_war_crimes.5.d:0 "来自前线的消息震惊了国家并加深了战争的伤疤."
 yugoslav_war_crimes.5.a:0 "我们哀悼。"

