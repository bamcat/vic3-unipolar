 # ── EVENT TITLES AND TEXT ────────────────

 mani_pulite.1.t: "一个商人Tris to Flush 二千万里拉"
 mani_pulite.1.d: "Pio Albergo Trivulzio——一个米兰退休之家——的主席Mario Chiesa在试图将钞票冲入厕所时被法官Antonio Di Pietro逮捕。 Chiesa被抓到从一家清洁公司得到3 700万里拉回扣。 社会党立即与他断绝关系. 他们的党委书记贝蒂诺·克拉克西(Bettino Craxi)称奇萨为"小偷"——鉴于迪皮埃特罗接下来会找到什么,这不是一个非常明智的文字选择. 逮捕是轻微的。 它将导致的不是。"
 mani_pulite.1.f: "一个例行逮捕。 看来是这样"
 mani_pulite.1.a: "当地的尴尬。 系统是安全的。"

 mani_pulite.2.t: "第一次认罪"
 mani_pulite.2.d: "面对监狱,小职员开始说话. 不以豁免为交换条件——没有正式交易——而是因为大坝已经断裂而沉默的逻辑不再存在. 每个名字都会导致另一个。 各取相名通入一会. 每一党都领导一个部。\n\n 调查不再涉及一个人,他有一个充满钞票的厕所. 它涉及共和国的整个金融结构。"
 mani_pulite.2.f: "当一个人说话,他们都说话。"
 mani_pulite.2.a: "让调查继续下去——现在没有停止。"
 mani_pulite.2.b: "使用行政压力控制扩散"

 mani_pulite.5.t: "马尼·普利特——意大利学习人人皆知的知识"
 mani_pulite.5.d: "米兰的治安法官队伍——迪皮耶特罗、科伦坡、达维戈、博雷利——已经公开。 他们积累的证据使得这个规模不可否认:在过去几十年里,意大利几乎所有的公开合同都带有回扣. 管理共和国的政党集体消耗了每条道路、每所医院、每所学校的一定比例。 意大利的报纸有它的名字:#boldTangentopoli#!. 布里贝城. 第一共和国正在受审。"
 mani_pulite.5.f: "每个人都知道。 现在每个人都知道 每个人都知道。"
 mani_pulite.5.a: "调查会到哪里去"

 mani_pulite.6.t: "阿维西·迪·加兰齐亚"
 mani_pulite.6.d: "正在向商人、部委官员、党务主管、市长发出调查通知。 " x id=1/ " avviso di garanzia " x id=2/ " ——通知某人正在接受调查——已成为耻辱的简称。 报纸刊登在头版。 事业结束一夕. \n\n[SCOPE.gsInterestGroup('indicted_ig').GetName]等已接到通知. 调查不再局限于米兰."
 mani_pulite.6.f: "邮差从没这么害怕过"
 mani_pulite.6.a: "合作 抵抗只会更糟"
 mani_pulite.6.b: "对司法机构施加行政压力"

 mani_pulite.7.t: "克赖克和克赖克"
 mani_pulite.7.d: "贝蒂诺·克拉克西(Bettino Craxi)——前总理,社会党党委书记,意大利十几年来最有势力的政治家——从罗马的拉斐尔酒店(Hotel Raphael)涌出,面对数百名市民. \n\n 他们用硬币和番茄砸了他 硬币,因为他们知道钱的来源。 \n\n 克拉克西作了简短声明,为党的筹资制度辩护——"大家都知道,每个人都参与"——并退入党内. 几个月内他就会飞去突尼斯哈马特的别墅 他永远不会回到意大利 他所建的政党社会党将不复存在."
 mani_pulite.7.f: "一个从一个国家偷来,被硬币赶出去的人."
 mani_pulite.7.a: "旧制度已经完成——让它倒下"
 mani_pulite.7.b: "管理过渡——承担责任并寻求改革"

 mani_pulite.8.t: "调查深入南方"
 mani_pulite.8.d: "坦根托波利从来就不仅仅是一个北方现象. 在[SCOPE.sState('tangentopoli_south_state').GetName] 和整个Mezzogiorno中,回扣系统被编成欧盟农业补贴、公共基础设施项目以及地方政治与有组织犯罪关系网络。\n\nDi Pietro的调查跟随了南钱。 " x id=3/ " 中的政治网络比北方的政治网络更老、更根深蒂固。 他们不会轻易分裂。"
 mani_pulite.8.f: "贪道相去相去."
 mani_pulite.8.a: "扩大调查范围——无例外"
 mani_pulite.8.b: "在北方遏制调查——南方太复杂了"

 mani_pulite.9.t: "Biondi法令"
 mani_pulite.9.d: "司法部长阿尔弗雷多·比翁迪颁布了一项紧急法令,禁止对一系列金融犯罪使用调查性拘留——确切地说,包括马尼·普利特的核心罪行。 批评家们立即将它命名为"x id=0""salvaladri""x id=1/"法令:"save-thieves"之法. \n<x id=3/" 24小时内,米兰地方法官宣布集体辞职以示抗议. 公众的反应是压倒性的。 意大利各地的检察官收到了数十万公民的支持信。 诉讼的政治代价越来越明显。"
 mani_pulite.9.f: "一个通过法律来保护自己的罪犯的政府不会长久地活下来。"
 mani_pulite.9.a: "推动执行法令——调查必须加以遏制"
 mani_pulite.9.b: "撤销法令——公众反应太强烈."

 mani_pulite.10.t: "第一共和国已经死了"
 mani_pulite.10.d: "结束了 基督教民主派——自1948年以来不间断地统治意大利的政党已经解散. 社会主义者已去. 较小的联盟党都走了 民国四十五年,由米兰一群地方法官在两年后拆除,他们干脆拒绝另眼相看.\n\n 1200多位政治家和商人被判罪. 五千人被调查. 前总理、内阁部长和实业家面临审判。 [ROOT.GetCountry.GetName] 接下来要做什么是不确定的。 但是,半个世纪以来向共和国提供食物的体系已经结束."
 mani_pulite.10.f: "法官们做了永远无法完成的选举。"
 mani_pulite.10.a: "新的意大利——拥抱干净的休息"
 mani_pulite.10.b: "管理下的过渡——改革不破裂"

 mani_pulite.15.t: "调查被掩埋"
 mani_pulite.15.d: "政治阶级获胜了. 地方法官被调离、抹黑或解职。 证据已被封存. 气势已断. \n\n 这并不意味着坦根托波利没有发生. 这意味着建造它的人幸免于难。 腐败并没有结束——它进入地下,以新的形式和新的安排。 [ROOT.GetCountry.GetName] 的公民知道做了什么。 他们知道没有受到惩罚。 这种知识不会消失。"
 mani_pulite.15.f: "推迟司法就是拒绝司法。 且诸人皆知."
 mani_pulite.15.a: "该系统得以生存——目前"

 # ── MODIFIERS ────────────────────────────

 tangentopoli_systemic_corruption: "坦根托波利语Name"
 tangentopoli_systemic_corruption_desc: "几十年来为[ROOT.GetCountry.GetAdjective]政治提供资金的回扣制度植入了每一个公共合同。 合法性在结构上受到削弱。 该系统花费了钱,邀请了丑闻。"

 tangentopoli_chiesa_arrest: "奇萨事件"
 tangentopoli_chiesa_arrest_desc: "对马里奥·奇萨的逮捕开启了系统的第一个裂口. 政治阶层正在予以驳回,但地方法官却在跟踪线索。"

 tangentopoli_ig_under_scrutiny: "正在调查中"
 tangentopoli_ig_under_scrutiny_desc: "该集团正在接受与坦根托波利腐败网络有关的司法监督。 其政治力量和民众的号召力被严重破坏."

 tangentopoli_widening_investigation: "扩大调查"
 tangentopoli_widening_investigation_desc: "调查范围正在扩大。 每一个供词都会导致新的逮捕。 治理的政治成本正在上升。"

 tangentopoli_suppression_attempt: "制止企图"
 tangentopoli_suppression_attempt_desc: "[ROOT.GetCountry.GetName]试图压制司法调查。 国际社会和国内新闻界已经注意到这一点。"

 tangentopoli_party_collapse: "党的折叠"
 tangentopoli_party_collapse_desc: "这个政党已经被坦根托波利的启示所摧毁. 其领导人流亡或被起诉。 其选民已去别处."

 tangentopoli_legitimacy_crisis: "合法性危机"
 tangentopoli_legitimacy_crisis_desc: "系统腐败的揭露打破了公众对机构的信任。 激进主义抬头了。 权力被削弱。"

 tangentopoli_south_exposure: "南方网络曝光"
 tangentopoli_south_exposure_desc: "马尼·普利特调查已经到达了梅佐吉奥尔诺,揭露了南方政治网络与坦根托波利系统之间的关系."

 mani_pulite_investigation_begins: "马尼·普利特调查"
 mani_pulite_investigation_begins_desc: "米兰治安法官队伍正在进行全面调查。 [ROOT.GetCountry.GetName] 国际声誉得益于对问责制的明显承诺。"

 mani_pulite_public_mandate: "司法的公共任务"
 mani_pulite_public_mandate_desc: "该法令在公众压力下被撤销,这表明了民众对调查的广泛支持."

 mani_pulite_clean_hands_victory: "干净的手取胜"
 mani_pulite_clean_hands_victory_desc: "马尼·普利特成功. 第一共和国的腐败政党制度被司法程序所瓦解. [ROOT.GetCountry.GetName] 以更高的合法性、更清洁的体制基础以及由权力问责产生的国际承认开始其第二共和国。"

 mani_pulite_cautious_transition: "管理下的过渡"
 mani_pulite_cautious_transition_desc: "从第一共和国到第二共和国的过渡正在得到认真管理——改革没有中断。 旧党已去,但机构连续性得到保留."

 mani_pulite_investigation_buried: "调查掩埋"
 mani_pulite_investigation_buried_desc: "马尼·普利特失败. 政治阶层幸存了下来. [ROOT.GetCountry.GetName] 的公民知道做了什么,知道没有受到惩罚。 腐败在地表之下继续存在。 合法性永久受损."

 amendment_events.1.t: "联邦穷人保健方案"
 amendment_events.1.d: "国会收到提案,为低收入美国人、老年人和残疾人建立一个联邦资助的医疗保险方案。 支持者认为,私人市场不能也不会为那些负担不起保险费的人服务。 反对者认为,这是联邦参与医疗保健的不可接受的扩大。 支持该法案的联盟是广泛的——工会、社会改革者和相当一部分的公众。 [ROOT.GetCountry.GetName] 是否采取行动是一个政治意愿问题。"
 amendment_events.1.f: "药物不应该取决于你是否负担得起。"
 amendment_events.1.a: "颁布医疗补助——向需要的人提供联邦健康保险"
 amendment_events.1.b: "拒绝——保健是私事"
 
 amendment_events.2.t: "《负担得起的照料法》"
 amendment_events.2.d: "政府已提出全面保健改革——《负担得起的护理法》。 该法案规定,所有公民必须持有健康保险,建立受管制的市场,扩大医疗补助的资格,并禁止保险商拒绝为先前存在的情况提供保险。 个别任务引起很大争议。 支持者说,这是使保险市场发挥作用的唯一途径。 反对派称其为"政府过度介入". 法案有票数——如果联盟维持."
 amendment_events.2.f: "4000万没有保险的美国人。 国会有机会改变这一点。"
 amendment_events.2.a: "签署《负担得起的照料法》成为法律"
 amendment_events.2.b: "Veto——任务走得太远"
 
 amendment_events.3.t: "《爱国者法》"
 amendment_events.3.d: "在"9·11"袭击后几周,国会以超乎寻常的速度通过"美国爱国者法案"——大幅扩大国内监视当局,减少对情报行动的司法监督,并促成执法机构之间前所未有的信息共享. \n\n. 该法案得到了近乎一致的支持. 公民自由的倡导者警告说,通过的速度和条款的广度将难以走回头路. 国还悲. 投票是明天。"
 amendment_events.3.f: "恐惧是立法者。"
 amendment_events.3.a: "签署《爱国者法》——国家安全要求"
 amendment_events.3.b: "拒绝——公民自由不能在悲痛中妥协"
 
 amendment_events.4.t: "联邦禁止攻击武器"
 amendment_events.4.d: "国会正在表决一项为期十年的联邦禁令,禁止制造特定的半自动武器和供平民销售的高容量杂志. 该法案得到执法协会和枪击受害者家属的支持。 枪械大堂对它投入了很大精力。 十年日落条款被加入,以保证最终票数. 除非延长禁令——延长禁令的政治联盟可能无法维持,否则禁令将于2004年到期。"
 amendment_events.4.f: "十年.. 然后,投票又发生了。"
 amendment_events.4.a: "通过禁令——十年是一个开始"
 amendment_events.4.b: "失败——守法公民不应为罪犯的行为付出代价"
 
 amendment_events.5.t: "《暴力犯罪控制和执法法》"
 amendment_events.5.d: "国会正在审议在[ROOT.GetCountry.GetName]历史上最大的犯罪立法——为10万名新警官提供资金,联邦监狱系统大幅扩大,新的法定最低刑罚,以及作为骑手的《暴力侵害妇女行为法》。 政治逻辑是两党的. 20世纪80年代后期的犯罪浪潮使法律和秩序政治超越了党派界限而流行. 法案很容易通过 它是否会奏效是以后的一个问题。"
 amendment_events.5.f: "法案很容易通过。 后果需要更长的时间。"
 amendment_events.5.a: "签字——国家要求对犯罪采取行动"
 amendment_events.5.b: "拒绝——法定最低刑期和大规模监禁不是答案"
 
 amendment_events.6.t: "税收分担制度改革"
 amendment_events.6.d: "财政部长刘继华提出自人民共和国成立以来最重要的财政改革——以国家增值税和正式收入公式来取代北京与地方政府谈判达成的企业分税安排. \n\n 改革将大幅度地集中财政力量,使北京获得可靠和不断增长的收入。 地方政府将失去自由裁量权,但变得明确。 与地方当局建立关系的工业和商业利益受到悄悄地反对。"
 amendment_events.6.f: "中心想要的是各省一直保存的东西。"
 amendment_events.6.a: "实行分税制——集中财政事权."
 amendment_events.6.b: "维持现有安排——不干扰哪些职能"
 
 amendment_events.7.t: "35小时工作周"
 amendment_events.7.d: "劳工部长Martine Aubry提出立法,规定大多数雇员每周的法定工作时间为35小时——将标准工时从39小时缩短。 该政策是更广泛地分担工作的一种方式:每名工人的工作时间减少,就业工人增加。 工会很热情. 雇主联合会警告说,将出现竞争力危机。 经济学人分为两部分. 选举产生了这个政府的左翼联盟兑现了诺言. 问题在于是否交付."
 amendment_events.7.f: "35小时 少了两个小时 一场政治风暴。"
 amendment_events.7.a: "通过《奥布里法》——工人应缩短工作时间"
 amendment_events.7.b: "放弃吧,经济成本太高了"
 
 patriot_act_rejected_modifier: "《爱国法》"
 patriot_act_rejected_modifier_desc: "不通过《爱国者法》的决定使安全机构受挫,攻击后的政治共识紧张。"
 
 china_tax_reform_rejected_modifier: "税制改革"
 china_tax_reform_rejected_modifier_desc: "税收制度未能集中,使财政权力支离破碎。 地方政府继续谈判自己的安排,减少了中心的收入和权力."
 
 terrorism_a.1.t: "世界贸易中心遭到轰炸"
 terrorism_a.1.d: "纽约世界贸易中心地下停车场发生炸弹爆炸. 爆炸造成6人死亡,1 000多人受伤。 该建筑并未倒塌——但意图是将一塔倒到另一塔上.\n\n这是对[ROOT.GetCountry.GetName]土壤的第一次重大国际恐怖袭击. 肇事者与在中东和中亚以外运作的网络有联系。 调查仍在进行中。"
 terrorism_a.1.f: "初一发相. 不是最后一个"
 terrorism_a.1.a: "我们会找到责任人"
 
 terrorism_a.2.t: "飓风安德鲁"
 terrorism_a.2.d: "飓风安德鲁(英語:Hurricane Andrew)是当时有纪录以来最具破坏性的大西洋飓风,已登陆南佛罗里达州,阵风时速已超过165英里. 破坏是灾难性的。 迈阿密-达德县的全部社区被摧毁. 初步估计表明,这将是[ROOT.GetCountry.GetName]历史上最昂贵的自然灾害之一。"
 terrorism_a.2.f: "飓风对已经建成的东西毫不关心."
 terrorism_a.2.a: "宣布联邦灾难——动员救济"
 
 terrorism_a.3.t: "北里奇地震"
 terrorism_a.3.d: "洛杉矶以北的圣费尔南多河谷于凌晨4:31发生6.7级地震. 57人死亡,数千人受伤,对基础设施——特别是高速公路系统和旧建筑——的破坏已经超过数百亿美元。 本次地震是"x id=0"历史最昂贵的地震."
 terrorism_a.3.f: "加州摇. 常有摇动."
 terrorism_a.3.a: "立即动员联邦救济"
 
 terrorism_a.4.t: "俄克拉何马城的轰炸"
 terrorism_a.4.d: "一枚卡车炸弹摧毁了俄克拉荷马城阿尔弗雷德·P·穆拉赫联邦大楼的前身,造成168人死亡——包括该大楼的日托中心有19名儿童. 这是[ROOT.GetCountry.GetName]历史上最致命的国内恐怖袭击。\n\n 肇事者不是外国人。 Timothy McVeigh和Terry Nichols都是以反政府意识形态为动机的公民。 该国面临着威胁可能来自内部的现实。"
 terrorism_a.4.f: "敌人不在边境 他已经在这里了"
 terrorism_a.4.a: "这是国内恐怖主义,我们将全力作出反应。"
 
 terrorism_a.5.t: "美国驻东非使馆被轰炸"
 terrorism_a.5.d: "同时发生的卡车炸弹爆炸发生在肯尼亚内罗毕和坦桑尼亚达累斯萨拉姆的大使馆外。 袭击造成200多人死亡,其中大多数是肯尼亚和坦桑尼亚平民,并造成数千人受伤。 由乌萨马·本·拉丹领导的网络声称对此负责。 这些攻击是一次声明,宣称全世界 " x id=3/ " 利益成为目标。 [ROOT.GetCountry.GetName]的答复将确定今后十年的反恐形式。"
 terrorism_a.5.f: "战争先到我们的大使馆"
 terrorism_a.5.a: "这是一个战争行为——我们将作出反应。"
 
 terrorism_a.6.t: "[ROOT.GetCountry.GetAdjective] (韩语). 大使馆 是炸弹"
 terrorism_a.6.d: "一枚卡车炸弹在美国驻内罗毕大使馆外爆炸,造成200多人死亡,其中大多数人被炸死。 当时碰巧靠近大楼的平民. 攻击目标不是 " x id=1/ " 。 " x id=2/ " 承担了费用。"
 terrorism_a.6.f: "炸弹没有区分国家。"
 terrorism_a.6.a: "我们要求为死者伸张正义"
 
 terrorism_a.7.t: "[ROOT.GetCountry.GetAdjective] (韩语). 首都是斯特拉克"
 terrorism_a.7.d: "一枚炸弹在美国驻达累斯萨拉姆大使馆附近爆炸,造成11人死亡,这似乎与肯尼亚内罗毕同时发生的一起爆炸同时发生。 受害者主要是 " x id=0 " 平民。 袭击震撼了国家."
 terrorism_a.7.f: "恐怖主义从一大洋进入我们的海岸。"
 terrorism_a.7.a: "我们和我们的人民站在一起"
 
 terrorism_a.8.t: "美国军舰科尔被轰炸了"
 terrorism_a.8.d: "一艘载有炸药的小船在也门亚丁港加油时与"科尔号"号一起被引爆. 17名 [ROOT.GetCountry.GetAdjective]水手被击毙,39人受伤. 攻击归于基地组织。\n\n 海军在友好港口的例行加油站上被一名自杀炸弹手用橡皮丁香袭击. 军事领导人正在问如何允许这种情况发生。"
 terrorism_a.8.f: "海军应该是目标"
 terrorism_a.8.a: "这不会被解答的"
 
 terrorism_a.9.t: "桥溪-摩尔龙卷风"
 terrorism_a.9.d: "一场EF5级龙卷风——富士塔规模上记录得最强的龙卷风——通过俄克拉荷马州布里克克克克和摩尔(Bridge Creek)切断了一条路径. 风速超过每小时300英里. 龙卷风在地上持续了85分钟,并刻出一条全长一英里的通向俄克拉何马城以南社区的全面毁灭道. 三十六相生灭."
 terrorism_a.9.f: "龙卷风原地一无所有"
 terrorism_a.9.a: "向受影响社区提供救济"
 
 terrorism_a.10.t: "32死在弗吉尼亚理工"
 terrorism_a.10.d: "一名枪手杀死了弗吉尼亚州布莱克斯堡的弗吉尼亚理工学院的32名学生和教职员工后才自杀. 这是"x id=0"历史上最致命的学校枪击. 枪手合法地购买了枪械,尽管有精神健康问题的历史,但根据现行法律,枪手本应取消他的资格。 现在正在审查背景调查制度的失败。"
 terrorism_a.10.f: "他合法地买了枪"
 terrorism_a.10.a: "立即审查枪支背景调查程序"
 
 terrorism_a.11.t: "82 在奥罗拉剧院被枪杀"
 terrorism_a.11.d: "一名枪手在科罗拉多州奥罗拉的"世纪16"大电影院午夜首映时开火,造成12人死亡,70人受伤. 攻击者配备了半自动步枪,猎枪和手枪——都在攻击前几周合法购买.\n\n Colorado和该国受到震惊."
 terrorism_a.11.f: "晚上看电影。 12人没有回家。"
 terrorism_a.11.a: "一个需要反思的悲剧"
 
 terrorism_a.12.t: "枪手在威斯康辛锡克寺杀6人"
 terrorism_a.12.d: "一名白人至上主义者向奥克克溪的威斯康辛锡克神庙开火,杀死了6名礼拜者后被警察枪杀. 攻击者是一名美国陆军老兵,与新纳粹组织有联系。 受害者因其宗教和族裔而成为攻击目标。 这次袭击引发了国内极端主义,仇恨犯罪,以及未能监控白人民族主义网络等争论."
 terrorism_a.12.f: "他们来祈祷。 他来是为了杀他们"
 terrorism_a.12.a: "这是仇恨犯罪——我们不会忽视国内极端主义"
 
 terrorism_a.13.t: "桑迪·胡克的悲剧"
 terrorism_a.13.d: "一名枪手在康涅狄格州Newtown的Sandy Hook小学杀害了20名6至7岁的儿童和6名成年工作人员。 这些儿童多次被用冲锋枪射击。 没有足够的话。 [ROOT.GetCountry.GetName]正在哀悼中。"
 terrorism_a.13.f: "二十个孩子 六岁."
 terrorism_a.13.a: "国家悲哀"
 
 terrorism_a.14.t: "邓布兰大屠杀"
 terrorism_a.14.d: "一名枪手进入了苏格兰的邓布兰小学,并杀死了16名5至6岁的儿童和他们的老师后,才自杀. 这是[ROOT.GetCountry.GetName]历史中最致命的大规模射击.\n\n 国家的反应是压倒一切的。 幸存者、父母和公众发起了全面禁止私人拥有手枪的运动。 政府将面临巨大的行动压力."
 terrorism_a.14.f: "十六子孙. 五岁. 苏格兰不会忘记的。"
 terrorism_a.14.a: "事情必须改变——国家要求改变"
 
 terrorism_a.15.t: "长江洪水"
 terrorism_a.15.d: "长江及其支流在连续数月的异常强降雨后被灾难性地淹没. 洪水已影响到中部和南部的2.4亿人 -- -- 14个省、5 600万英亩农田和数千个定居点。 3 000多人死亡,1 400万人流离失所。 国家动员规模大. 军方已出动数十万部队进行洪灾救援. 这是近代"x id=3/"历史上最大的自然灾害."
 terrorism_a.15.f: "河上决定取下堤克们承诺要保留的东西."
 terrorism_a.15.a: "全州部队将部署"
 
 terrorism_a.16.t: "在莫斯科被炸的公寓大楼"
 terrorism_a.16.d: "莫斯科等俄罗斯城市的公寓楼被一连串炸弹袭击,近300人在入睡时被炸死. 爆炸是车臣分离主义分子干的——尽管一些观察者对证据提出质疑。 这些袭击给公众造成了巨大的压力,要求他们作出果断的军事反应。 目前正在认真考虑在车臣开展新的军事行动。 承诺粉碎恐怖分子的政治人物会找到公众,准备跟随他."
 terrorism_a.16.f: "恐惧是一个强大的政治工具。 悲伤也一样。"
 terrorism_a.16.a: "这需要军方全力响应"
 
