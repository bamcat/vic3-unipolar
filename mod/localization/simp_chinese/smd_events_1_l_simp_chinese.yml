afghanistan.1.t: "美国要求引渡本·拉丹"
afghanistan.1.d: "美国已正式要求阿富汗交出被指控为9月11日袭击的策划者乌萨马·本·拉丹。 接受这一要求可以缓和紧张局势——但拒绝可能会引起严重后果。"
afghanistan.1.a: "遵从所请."
afghanistan.1.b: "拒绝"

# 2003 Invasion of Iraq

iraq_war.1.t: "联合国伊拉克大规模毁灭性武器索赔问题会议"
iraq_war.1.d: "美国指责伊拉克窝藏了大规模毁灭性武器。 联合国召开了一次紧急会议来讨论这一问题并收集国际反应。"
iraq_war.1.a: "辩论开始。"

iraq_war.2.t: "联合国关于伊拉克大规模毁灭性武器的辩论"
iraq_war.2.d: "国际社会就如何回应美国对伊拉克的指控展开辩论."
iraq_war.2.a: "支持美国。"
iraq_war.2.b: "与伊拉克并肩作战。"
iraq_war.2.c: "保持中立。"

iraq_war.3.t: "北约对美国指控的回应"
iraq_war.3.d: "作为北约盟国,我们必须决定是否支持美国对伊拉克所谓的大规模毁灭性武器计划的立场。"
iraq_war.3.a: "我们将与美国站在一起。"
iraq_war.3.b: "我们不能支持这一行动。"

iraq_war.4.t: "伊拉克对指控的反应"
iraq_war.4.d: "伊拉克被指控窝藏大规模毁灭性武器。 政府必须应对来自国外越来越大的压力。"
iraq_war.4.a: "否认一切 忍受孤立"
iraq_war.4.b: "谴责西方并发动宣传."
  
iraq_war.5.t: "美国向联合国提出的诉状"
iraq_war.5.d: "美国已向联合国提出其理由,敦促支持对伊拉克采取军事行动,反对其所谓的大规模毁灭性武器。 世界领导人现在必须决定是否支持华盛顿的恳求或抵制干预。"
iraq_war.5.b: "联合国陷入僵局——我们必须单独行动。"
iraq_war_us_lobby_tt: "美国游说支持的关键力量,调整外交关系."
iraq_war_unfail_tt: "生来恰好活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活活"

iraq_war.6.t: "美国决定战争"
iraq_war.6.d: "在联合国因分裂而瘫痪的情况下,华盛顿面临一项重大决定:单独行动,与伊拉克进行军事对抗,或退缩并面临在世界面前显得软弱的风险。"
iraq_war.6.a: "发动入侵伊拉克"
iraq_war.6.b: "退后,避免战争"
iraq_war_backdown_tt: "美国从干预中后退,丧失了国际声望."
2003_invasion_of_iraq: "2003年伊拉克被入侵"
iraq_condemned: "伊拉克受到谴责"

