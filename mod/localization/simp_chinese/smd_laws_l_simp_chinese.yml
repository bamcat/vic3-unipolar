 law_marijuana_decriminalization_modifier: "大麻非刑罪化"
 law_hard_drugs_decriminalized_modifier: "硬毒品非刑罪化"
 law_safe_injection_sites_modifier: "安全注射地点"
 law_trafficking_allowed_modifier: "允许的贩运"
 
 lawgroup_disability_rights: "残疾人权利"
 lawgroup_disability_rights_desc: "规范残疾公民权利的法律框架——从完全承认到国家通过治疗、基础设施和工作场所包容提供积极支持。 更全面的框架扩大了劳动力的参与,提高了生活水平并降低了死亡率,增加了国家和雇主的成本。"

 law_minimal_recognition: "最小识别"
 law_minimal_recognition_desc: "国家承认残疾公民的存在,但没有为他们提供住宿、支助或法律保护。 残疾人基本上被排除在正式就业和公共生活之外。 人的代价是巨大的;财政成本微不足道。"
 
 law_workplace_accommodations: "工作场所住宿"
 law_workplace_accommodations_desc: "雇主必须依法进行合理调整,允许残疾工人参加劳动队伍——修改设备,调整职责,无障碍工作站. 该政策为生产性就业带来了有意义的人口。 雇主承担调整费用,但劳动力增加。"
 
 law_anti_ableist_architecture: "反资产主义建筑"
 law_anti_ableist_architecture_desc: "公共建筑、交通网络和基础设施必须方便残疾公民使用。 斜坡,升降机,触觉铺设,无障碍的标志——物质环境决不能再排除了. 改造现有基础设施费用高昂。 可以充分参与社会的人口大为增加。"
 
 law_public_treatments: "公共治疗"
 law_public_treatments_desc: "国家向残疾公民的医疗、辅助装置、假肢、治疗和持续支助服务提供资金,作为一项权利而不是慈善。 死亡率大幅下降。 整个人口的生活水平都有所提高。 公共预算的费用相当高而且持续,但关于一些公民比另一些公民更无权获得国家支助的论点已被正式驳回。"
 
 law_minimal_recognition_modifier: "最低程度承认残疾"
 law_minimal_recognition_modifier_desc: "残疾公民无法从国家获得住宿。 有效的劳动力减少,死亡率高于其所能达到的水平。"
 
 law_workplace_accommodations_modifier: "工作场所住宿"
 law_workplace_accommodations_modifier_desc: "雇主必须接纳残疾工人。 劳动力更加广泛,更具包容性,对生产力建设成本不高。"
 
 law_anti_ableist_architecture_modifier: "无障碍基础设施"
 law_anti_ableist_architecture_modifier_desc: "公共基础设施已经开放。 由于建筑物符合无障碍标准,建筑成本较高,但能够充分参与社会的人口要大得多."
 
 law_public_treatments_modifier: "公共残疾治疗"
 law_public_treatments_modifier_desc: "国家资助残疾公民的治疗和支助。 死亡率降低,生活水平得到提高,教育机会更加广泛——需要大量和持续的公共开支。"
 
 institution_environmental_protection: "环境保护局"
 institution_environmental_protection_desc: "专门负责监测和执行环境标准的政府机构。 每一级投资都代表着执法能力的扩大、更严格的条例和更广泛的养护方案——减少所有各州的污染产生。"
 
 lawgroup_environmental_regulations: "环境条例"
 lawgroup_environmental_regulations_desc: "关于[ROOT.GetCountry.GetName]与自然环境关系的法律框架——从不受管制的工业剥削到宪法保障的自然权利。 更进步的框架减少污染、降低死亡率并保护生态系统,从而增加工业吞吐量和公共开支的成本。"
 
 law_no_environmental_regulations: "无条例"
 law_no_environmental_regulations_desc: "工业的运作不受环境限制。 工厂、矿场和农场可以不受法律限制地污染、取出和开采。 输出是最大化的。 长期的代价——死亡率、生态系统退化和公共卫生——由人口而不是生产者承担。"
 
 law_game_law: "游戏法"
 law_game_law_desc: "狩猎和捕鱼受到管制,以防止游戏种群倒闭. 保护季节、特许狩猎以及对最具破坏性的取出方法的限制。 它是一个保护框架,主要为那些富人的利益服务,可以休闲地打猎——但它确立了国家有兴趣管理自然资源的原则。"
 
 law_national_recycling: "国家再循环"
 law_national_recycling_desc: "可回收废物的收集和处理国家方案。 尽可能对工业和家庭废物进行分类、回收和再利用,减少进入填埋地和水道的材料量。 资源使用效率略有提高. 污染下降。 该方案需要各市镇和行业之间的协调。"
 
 law_protection_agency: "保护机构"
 law_protection_agency_desc: "一个专门的政府机构,有权制定、监测和在所有经济部门执行环境标准。 排放限制、土地使用限制、工业废物管制和自然保护区都属于其职权范围。 该机构可以投资——每一额外资金水平将扩大其执法能力并进一步减少污染。"
 
 law_guaranteed_rights_of_nature: "自然权利的保障"
 law_guaranteed_rights_of_nature_desc: "河流、森林、湿地和生态系统都具有法律地位——即有权不被破坏、被污染或被超出其恢复能力的范围所开发。 该框架是可能最雄心勃勃的环境立法,它取自那些开始将自然视为权利主体而不是所有权对象的国家新出现的法律传统。 工业活动受到严重限制。 污染急剧下降。 环境保护局以尽可能高的效率运作。"
 
 law_no_environmental_regulations_modifier: "无管制工业"
 law_no_environmental_regulations_modifier_desc: "对工业没有环境限制。 产量上升,但污染和死亡率因此上升。"
 
 law_game_law_modifier: "游戏法"
 law_game_law_modifier_desc: "受管制的狩猎和捕鱼活动略为减少了环境退化。 最低限度但真正的干预。"
 
 law_national_recycling_modifier: "国家再循环方案"
 law_national_recycling_modifier_desc: "国家回收利用方案正在减少废物产生和回收材料,适度地提高污染和建筑效率。"
 
 law_protection_agency_modifier: "环境保护局"
 law_protection_agency_modifier_desc: "环境保护局正在执行排放限制和工业标准。 污染正在减少,该机构可以进一步投资扩大其覆盖范围。"
 
 law_guaranteed_rights_of_nature_modifier: "自然权利的保障"
 law_guaranteed_rights_of_nature_modifier_desc: "自然已获得宪法地位。 工业面临重大制约,但污染急剧减少,死亡率下降,随着生态系统的保护,粮食安全得到改善。"
 
