 # ==========================================
 # LAWGROUP
 # ==========================================
 
 lawgroup_subsidized_housing: "补贴住房"
 lawgroup_subsidized_housing_desc: "国家资助、建设和保障公民住房的程度。 更进步的框架扩大了城市中心的房地产生产,改进了基础设施并增加了移徙的拉动,增加了福利和预算成本。"
 
 # ==========================================
 # LAWS
 # ==========================================
 
 law_no_public_housing: "无公共住房"
 law_no_public_housing_desc: "国家不提供住房支持。 住房是私人事务——买下、租下或没有住房。 城市住房市场的运作没有公共干预,无论市场生产什么,公民都能得到什么。"
 
 law_housing_projects: "住房项目"
 law_housing_projects_desc: "国家建设城市基本高密度公共住房——塔楼,地租行,功能和廉价. 质量并不总是很高,地点也不总是可取,但住房是存在的。 城市中心现在可以通过国家建设方案生产更多的地产。"
 
 law_public_housing_program: "公共住房方案"
 law_public_housing_program_desc: "制定具有设计标准、混合用途发展和积极城市规划的综合国家住房方案。 政府不仅在建造避难所, 随着公共建筑部门的扩大,城市中心的房地产产量大大增加,基础设施也因城市规划的改善而得到改善。"
 
 law_universal_housing: "全民住房"
 law_universal_housing_desc: "住房是一项得到保障的权利。 国家基金、建设和维持每个需要住房的公民的住所——没有经济来源、没有市场依赖、没有。 财政费用是巨大的,而且持续不断。 城市中心产生最大的房地产产出。 围绕普遍获得服务规划的城市吸引移徙,全面改善基础设施。"
 
 law_no_public_housing_modifier: "无公共住房"
 law_no_public_housing_modifier_desc: "国家不提供住房支持。 城市住房市场是完全私有的。"
 
 law_housing_projects_modifier: "住房项目"
 law_housing_projects_modifier_desc: "国家基本住房建设正在进行中。 随着国家补贴住房储备,福利费用略有上升。"
 
 law_public_housing_program_modifier: "公共住房方案"
 law_public_housing_program_modifier_desc: "一项综合公共住房方案正在扩大城市房地产供应并不断改善城市基础设施,费用高昂。"
 
 law_universal_housing_modifier: "全民住房"
 law_universal_housing_modifier_desc: "住房是一项有保障的权利。 福利成本高,但城市基础设施改善,移民吸引,地产产出最大化."
 
 institution_central_bank: "中央银行"
 institution_central_bank_desc: "一个管理货币供应、规定储备要求并控制利率的国家货币当局。 每一级投资都收紧了货币政策——制约了商业信贷生产,但扩大了国家债务上限并提高了基准利率. 中央银行是国家直接控制金融系统的机制。"
 
 lawgroup_central_banking: "中央银行"
 lawgroup_central_banking_desc: "规范"x id=0"货币体系的法律框架——从没有中央货币当局到国家全面控制货币供应. 银行框架的选择决定了信贷和证券的产生方式以及国家可以借到什么。"
 
 law_no_central_bank: "无中央银行"
 law_no_central_bank_desc: "没有中央货币当局。 银行独立运作,制定自己的储备比率和贷款政策. 货币供应缺乏协调,国家没有管理利率或信贷条件的机制。 这是一种不稳定的安排,大多数现代经济体已经摆脱了这种安排。"
 
 law_fractional_reserve_banking: "小额储备银行"
 law_fractional_reserve_banking_desc: "银行只须持有一小部分存款作为储备,其余部分放入经济。 这扩大了货币供应——金融区随着资本的乘以整个系统的流量而生产出更多的证券,但商业信贷生产却被杠杆部分冲淡了. 这是大多数现代经济体的标准安排。"
 
 law_full_reserve_banking: "全额储备银行业务"
 law_full_reserve_banking_desc: "银行必须持有100%的存款作为储备——不提供分期贷款。 中央银行机构可供利用,使国家能够直接管理货币政策。 中央银行的各级投资将基准利率提高1%,将最高信贷限额提高5%。 商业银行的信贷生产较为稳定. 金融区的证券生产随着系统的杠杆化而下降。"

 law_no_central_bank_modifier: "无中央银行"
 law_no_central_bank_modifier_desc: "没有中央货币当局。 货币供应没有管理。"
 
 law_fractional_reserve_banking_modifier: "小额储备银行"
 law_fractional_reserve_banking_modifier_desc: "小额储备贷款正在扩大货币供应。 证券产量上升;受杠杆效应影响,商业信用产量略有下降."
 
 law_full_reserve_banking_modifier: "全额储备银行业务"
 law_full_reserve_banking_modifier_desc: "准备金所需经费已全部到位。 信用生产稳定而高. 证券生产减少. 中央银行机构可以管理利率和国家债务上限。"
 
 institution_central_bank_modifier: "中央银行"
 institution_central_bank_modifier_desc: "中央银行积极管理货币政策。 每一级投资都收紧信贷供应,将利率提高1%,将最高信贷限额提高5%。"
 
 country_max_credit_limit_mult: "最大信用限额"
 country_institution_cost_institution_central_bank_mult: "中央银行费用"
 country_institution_central_bank_max_investment_add: "中央银行"
 country_institution_size_change_speed_institution_central_bank_mult: "中央银行扩展速度"
 building_group_bg_banking_throughput_add: "银行业务流量"
 
 lawgroup_media_regulations: "媒体条例"
 lawgroup_media_regulations_desc: "规范"x id=0"信息环境的法律框架——从完全不受监管的媒体到国家控制的通信基础设施. 更规范的框架抑制了政治运动激进化并增加了国家权威,而无监管的环境会扩大运动并削弱政府对信息空间的控制."
 
 law_fully_unregulated_media: "完全无管制"
 law_fully_unregulated_media_desc: "对媒体或信息环境没有规定。 新闻媒体、在线平台和通信网络的运作不受任何政府监督。 信息传播自由。 政治运动在噪音中蓬勃发展。 国家没有塑造或管理公民所消费信息的机制,也没有从控制信息中获得的权力。"
 
 law_digital_rights: "数字权利"
 law_digital_rights_desc: "基本法律保护规范信息环境——隐私保障,反审查规定,信息自由法. 公民可以对某些滥用媒体的行为诉诸法律,但信息空间在很大程度上仍然自由。 政治运动仍然有肥沃的土壤。 [ROOT.GetCountry.GetName] 是一个尊重权利的国家,从中得益不大。"
 
 law_fairness_doctrine: "公平原则"
 law_fairness_doctrine_desc: "法律要求媒体对政治问题进行均衡报道,为多种观点提供时间和空间,而不是只提出一种观点。 最极端的政治声音失去了他们的扩音器. 激进运动的招募受到抑制。 国家将自己定位为公平裁判而非信息战的参与者,并从角色中获得权威."
 
 law_government_content_moderators: "政府内容主持人"
 law_government_content_moderators_desc: "国家积极调和在线内容——去除虚假信息、极端主义材料和被认为有害或破坏稳定的内容。 政治运动由于最有效的招募材料被压制而失去了很大的影响力。 权相起起. 国际社会和国内对新闻自由的批评者将注意到这项政策,因此,`x id=0'的声望会因此受损。"
 
 law_state_wifi: "状态无线"
 law_state_wifi_desc: "国家直接运营通信基础设施。 互联网接入是公用设施,由政府完全拥有,经营,监督. 信息环境是一种国家资源——公民读取、观看和分享通过基础设施[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName]政府控制. 政治运动激进化几乎被完全镇压. 费用、财务和声誉都很高。"
 
 law_fully_unregulated_media_modifier: "完全无管制媒体"
 law_fully_unregulated_media_modifier_desc: "一个不受管理的信息环境正在扩大政治运动并削弱国家权威。"
 
 law_digital_rights_modifier: "数字权利框架"
 law_digital_rights_modifier_desc: "基本法律保护规范了信息环境. 政治运动仍然蓬勃发展,但 " x id=0 " 从尊重权利的立场中获得一些声望。"
 
 law_fairness_doctrine_modifier: "公平原则"
 law_fairness_doctrine_modifier_desc: "平衡的媒体报道要求正在抑制激进运动的招募并增强国家的合法性。"
 
 law_government_content_moderators_modifier: "政府内容"
 law_government_content_moderators_modifier_desc: "积极的国家内容节制正在以威望和合法性为代价,大力压制政治运动激进化。"
 
 law_state_wifi_modifier: "国家控制的通信"
 law_state_wifi_modifier_desc: "[ROOT.GetCountry.GetName] 直接控制通信基础设施。 政治运动激进化几乎完全被镇压. 权威很高。 国际声誉受损."
 
 institution_courts: "法院系统"
 institution_courts_desc: "通过常设法院和法律程序运作的正式司法机构。 每一层次的投资都扩大了法院系统的范围——更多的法官,更多的法院,更一致地执法. 随着争端通过法律渠道解决,法律的颁布更加一致,革命运动发现国家的法律机器更难克服,涡轮崩塌."
 
 lawgroup_judiciary: "司法机构"
 lawgroup_judiciary_desc: "支持"x id=0"法院系统的法律哲学——如何解决争端,谁拥有法律权威,司法的目的是什么. 司法机构的选择决定了权威、合法性、外交地位和社会秩序的稳定。"
 
 law_inquisitive_judiciary: "问讯"
 law_inquisitive_judiciary_desc: "国家调查、起诉和法官——司法机构是政府权力的一个分支,而不是一个独立的机构。 法官是王室或政府的代理人,负责寻找真相并代表国家执法. 权威地位高,政府政策的制定较为平稳,但正当程序薄弱,人民知道."
 
 law_customary_judiciary: "习惯"
 law_customary_judiciary_desc: "争端通过传统社区规范、部落委员会、长老仲裁和地方习俗解决。 没有正式的法院——按照社区承认为合法的规则,由社区承认为当局的人伸张正义。 国家进入这一系统的范围有限。 社区是稳定的,忠于其传统,抵御外部干扰。"
 
 law_religious_judiciary: "宗教法"
 law_religious_judiciary_desc: "圣经、宗教判例和文书当局的解释指导法律程序。 虔诚者作为法律的含义及其适用方式的仲裁者获得了巨大的政治权力. 宗教合法性在信徒中具有深远的意义。 信仰之外的人,或者对信仰有不同解释的人,可能会发现制度不那么受欢迎."
 
 law_restorative_judiciary: "恢复性"
 law_restorative_judiciary_desc: "司法的目的不是惩罚,而是恢复——修复对受害者的伤害,改造罪犯并重新融入社会。 法院注重调解、和解和社区愈合。 涡轮倒地. 冲突造成的死亡率下降。 忠诚主义者不断增长。 国家放弃了某些权力,以换取一个信任它所居住的制度的人口."
 
 law_adversarial_judiciary: "负面"
 law_adversarial_judiciary_desc: "检方和辩方向独立法官或陪审团提出异议。 无罪推定受到保护。 无论社会地位如何,法律地位都是平等的。 国家受与公民相同的规则约束. [ROOT.GetCountry.GetName] 国际声望大幅提升. 独立的司法机构制约着政府的行动——但一个可以受到法律制约的政府是人民可以信任的。"
 
 law_inquisitive_judiciary_modifier: "调查司法机构"
 law_inquisitive_judiciary_modifier_desc: "司法机构是国家权力的一个分支。 颁布政策比较容易,而动乱被压制——但正当程序薄弱,地表下的激进压力建设是真实的."
 
 law_customary_judiciary_modifier: "习惯法"
 law_customary_judiciary_modifier_desc: "传统的社区司法提供了深刻的合法性和社会稳定。 国家的正式权力有限,但人民对该制度的信任是真实的。"
 
 law_religious_judiciary_modifier: "宗教法"
 law_religious_judiciary_modifier_desc: "法律由书记官管辖。 虔诚者拥有巨大的政治权力。 忠心深厚的信徒——外人日益怨恨."
 
 law_restorative_judiciary_modifier: "恢复性司法"
 law_restorative_judiciary_modifier_desc: "司法系统的重点是康复与和解。 暴风雨和死亡率下降,忠于职守者增加, " x id=0 " 得到国际上对其人道做法的尊重。"
 
 law_adversarial_judiciary_modifier: "司法机构"
 law_adversarial_judiciary_modifier_desc: "独立的司法机构以正当程序运作,在法律面前享有平等地位。 合法性和声望很高。 国家权力受到检查——但这种检查使该系统具有公信力。"
 
 institution_courts_modifier: "司法机构"
 institution_courts_modifier_desc: "已经建立的法院网络正在减少动乱,改进法律颁布,并抑制革命势头。 每个额外的级别将法院的伸展范围扩大到[ROOT.GetCountry.GetName]。"
 
 country_institution_cost_institution_courts_mult: "法院系统费用"
 country_institution_courts_max_investment_add: "法院系统最大投资"
 country_institution_size_change_speed_institution_courts_mult: "法院系统扩展速度"
 
 law_privatized_preschool_education:0 "学前教育"
 law_privatized_preschool_education_desc:0 "幼儿教育是通过受管制的私营市场提供的。 供应商竞相争取入学,国家规定最低标准,但将交付交给独立的经营者。 获得补贴主要取决于家庭收入,尽管补贴可能抵消低收入家庭的部分负担。"

 law_universal_childcare:0 "普及儿童保育"
 law_universal_childcare_desc:0 "国家保障所有家庭不论收入如何都能负担得起儿童保育费用。 全国有公共资助的设施,使父母能够自由参加工作,并确保幼儿发展不取决于家庭手段。"

 law_legal_protections:0 "法律保护"
 law_legal_protections_desc:0 "国家编纂了正式的男女法律平等,规定了在就业、财产和公共生活方面不受歧视的保护措施。 以前习惯或有选择地执行的权利现在得到法律效力的支持。"

 law_structural_egalitarianism:0 "结构不平等主义"
 law_structural_egalitarianism_desc:0 "政府超越了法律上的平等,积极拆除了使性别不平等永久化的体制结构。 公共职务、专业和公民机构的代表是法定的,国家在执行平等结果方面发挥积极作用,而不仅仅是平等权利。"

 law_matriarchy:0 "母权制"
 law_matriarchy_desc:0 "妇女在国家的政治和社会结构中占有主导地位。 妇女在领导岗位中占绝大多数。"

 law_disability_cheques:0 "残疾支票"
 law_disability_cheques_desc:0 "国家定期向因残疾或慢性疾病而不能工作的公民提供财政支持. 津贴通过社会保障机构管理,旨在保障劳动力以外的人的最低标准。"

 law_student_coverage:0 "产假"
 law_student_coverage_desc:0 "妇女可享受怀孕保险。"

 law_universal_basic_income:0 "普遍基本收入"
 law_universal_basic_income_desc:0 "每个公民都从国家得到无条件的定期报酬,而不论其就业状况或手段如何。 这项政策是对劳动、福利和经济参与之间关系的根本反思——保证一个任何人都不能跌倒的下限,同时提高所有工作的最低期望。"
 
 law_universal_college:0 "大学"
 law_universal_college_desc:0 "国家保障所有公民,不论其背景或手段如何,都能接受高等教育。 大学和学院得到公共资助,其位置是值得称道的,而不是富裕的,从而产生一支教育程度较高的劳动力队伍和更加知情的公民。"

 education_laws.1.t:0 "谁付学位费?"
 education_laws.1.d:0 "对普世大学的承诺引发了财政保守派的即时而尖锐的问题:到底是谁会为此付出代价? 为寻求高等教育的每个公民提供高等教育的资金是公共开支的大幅增长,反对者正在大声表示反对。 政府必须决定是否承诺提供全额公共资金,或采用一种经济情况调查模式来限制负担。"
 education_laws.1.f:0 "由谁支付教育费用的问题,始终是教育为谁服务的问题。"
 education_laws.1.a:0 "承诺提供全额公共资金——高等教育是一项公益。"
 education_laws.1.b:0 "实行经济调查补贴——为穷人而不是为富人提供资金。"

 education_laws.2.t:0 "精英主义反对"
 education_laws.2.d:0 "财富利益集团认为他们倾向于反对普遍大学:标准。 如果每个人都能出席,他们就会警告,那么学位就变得毫无价值了——真正优秀的机构将被拖下水去容纳准备不足的人. 政府必须选择在原则上捍卫普遍获得服务,或提供一种与公共系统一起保护精英机构的例外。"
 education_laws.2.f:0 "每次扩大准入都受到同样标准的警告。 标准总是存在的。"
 education_laws.2.a:0 "捍卫普遍获得服务——优秀不是富人所独有的。"
 education_laws.2.b:0 "保护精英机构,同时普及服务。"

 education_laws.3.t:0 "智者说"
 education_laws.3.d:0 "学术界以特有的信念进入辩论。 他们认为,世界性大学不仅是一种社会福利,而且是一种经济需要——一个将高等教育限制在那些有能力负担的人的国家是一个选择故意无知的国家。 政府必须决定是否正式邀请他们的声音参与立法辩论,还是严格从政治角度保持辩论."
 education_laws.3.f:0 "大学总是由社会决定他们想要什么样的未来。 现在它必须决定谁可以帮助建造它。"
 education_laws.3.a:0 "请他们参加辩论——让学术界带头。"
 education_laws.3.b:0 "坚持政治决策——学者建议,他们不治."

 education_college_fiscal_resistance:0 "财政抵制"
 education_college_fiscal_resistance_desc:0 "财政保守派积极反对普及大学的公共成本,拖延了颁布过程并迫使政府为其支出承诺辩解."

 education_college_public_funded:0 "公开供资的承诺"
 education_college_public_funded_desc:0 "政府承诺承担普及高等教育的全部费用,以大笔费用加强颁布的势头。"

 education_college_meritocracy_debate:0 "参与的精英辩论"
