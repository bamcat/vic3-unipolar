  # New Laws Any Group
 law_equal_rights:0 "平等权利"
 law_equal_rights_desc:0 "妇女可望享有与男性同等的权利。"
 law_prison_slavery:0 "监狱奴役"
 law_prison_slavery_desc:0 "囚犯和罪犯被迫长时间工作,在服刑期间工资很少或没有报酬。"
 law_restricted_police:0 "限制性警察"
 law_restricted_police_desc:0 "警察的权力受到限制,并受到严格的管制,以确保他们准备保护的公民的安全。"
 law_resettlement_enticement:0 "重新安置"
 law_resettlement_enticement_desc:0 "政府制定了方案,促使人们迁移到自己的领地。"
 
 # Rights of Minorities Group
 
 lawgroup_rights_of_minorities:0 "少数群体的权利"
 lawgroup_rights_of_minorities_desc:0 "关于少数民族人口的法规和保护。"
 
 law_no_minority_rights:0 "无少数人权利"
 law_no_minority_rights_desc:0 "各类少数群体不会重新享有与普通民众相同的权利。"
 law_segregation:0 "隔离法"
 law_segregation_desc:0 "少数群体将经历与一般民众隔离的程度,往往得到残片和残片。"
 law_apartheid:0 "种族隔离法"
 law_apartheid_desc:0 "少数群体不会经历普通民众的同一社会,他们往往被迁移或迁移(常常是强迫的)到指定的“土地”。"
 law_unfulfilled_protections:0 "未实现的保护"
 law_unfulfilled_protections_desc:0 "国家已努力消除少数群体的障碍,但有关少数群体权利的法律基本上仍未得到执行。"
 law_limited_protections:0 "有限保护"
 law_limited_protections_desc:0 "属于不同族裔或国籍的少数群体将重新享有一般民众享有的许多相同权利。"
 law_encompassing_protections:0 "包含的保护"
 law_encompassing_protections_desc:0 "属于不同族裔或国籍的少数群体和残疾人将收回普通民众享有的所有权利和保护。"
 law_universal_protections:0 "普遍保护"
 law_universal_protections_desc:0 "所有少数群体,不论其族裔、国籍、能力、性能力或性别认同如何,都将重新享有与一般人口相同的权利。"
 
 # Union Laws Group
 
 lawgroup_union_laws:0 "工会法"
 lawgroup_union_laws_desc:0 "理事机构对工会行动(如罢工、退出、抗议、暴乱等)的处置。"
 law_unions_outlawed:0 "无效团结"
 law_unions_outlawed_desc:0 "工会在这个国家被宣布为非法,而肇事者将迅速恢复抵抗。"
 law_useless_unions:0 "无用官僚主义"
 law_useless_unions_desc:0 "工会只不过是工人的官僚主义,"
 law_limited_action:0 "有限行动"
 law_limited_action_desc:0 "工会在所允许的方面受到严重限制,往往必须克服法律漏洞才能有效。"
 law_craft_unions:0 "手工业工会"
 law_craft_unions_desc:0 "工会仅限于其具体作用,不得与其他作用的工会结盟。"
 law_permitted_unions:0 "允许的行动"
 law_permitted_unions_desc:0 "工会既不合法,也不非法,它们可以随意运作,但几乎得不到管理机构的保护。"
 law_enterprise_unions:0 "企业"
 law_enterprise_unions_desc:0 "工会可以改进其雇员的工作业绩,并注重其成员的需要。 它们有效地通过必要手段改善其成员的生活。"
 law_backed_unions:0 "后置保护"
 law_backed_unions_desc:0 "工会得到公众的有效支持,并巩固了自己,成为国家文化的一部分。 他们受到人民的保护,并受到法律的保护,以便采取引人注目的行动。"
 law_empowered_unions:0 "赋予联盟权力"
 law_empowered_unions_desc:0 "工会得到警方的大力加强,并得到政府的支持。 这些工会能够有效地满足其要求,在每一种情况下都受到保护和欢呼。"
 
 # Corporate Authority Group
 
 lawgroup_corporate_authority:0 "公司管理局"
 lawgroup_corporate_authority:0 "对公司的法律规章和荒谬的富人的法律规章包括他们能够行使的政治权力和控制条例。"
 law_completely_unregulated:0 "完全无管制"
 law_completely_unregulated_desc:0 "公司的行动和荒谬的富人的行动没有任何阻碍。 往往对生活在那里的工人和人民不利。"
 law_political_lobbying:0 "政治游说"
 law_political_lobbying_desc:0 "任何拥有足够多资金的人,都可以游说政府,迫使他们修改有利于他们的法律。"
 law_tax_haven:0 "避税港"
 law_tax_haven_desc:0 "拥有荒谬财富的公司和个人被认为是受欢迎的。 管理机构制定了有利于它们的法律,减少了税收,增加了土地。"
 law_feign_ignorance:0 "虚构的无知"
 law_political_lobbying_desc:0 "理事机构选择尽可能少地限制公司和荒谬的富人的权力,选择假装这不是问题。"
 law_limited_restrictions:0 "有限限制"
 law_limited_restrictions_desc:0 "公司和富人的资产无论是否为金钱或持有投资和股票,都要征税。"
 law_progressive_restrictions:0 "渐进限制"
 law_progressive_restrictions_desc:0 "任何荒谬的富人资产和公司实现或不实现的所有利润都被征税并用于以累进利率改善人民的生活。"
 law_no_one_individual:0 "无个人"
 law_no_one_individual_desc:0 "荒谬的富人如果选择在那里做生意,就会求助于管理机构的税收制度。 他们在国内创造的财富减少,并分配给需要帮助的人民。"
 law_corporate_redistribution:0 "企业再分配"
 law_corporate_redistribution_desc:0 "任何由荒谬的富人或公司创造的财富都减少到允许的最高数额。 这种财富随后按需要重新分配。 公司移交给公众,由包括民选官员在内的董事会组成。"
 
 law_serfdom:0 "未实现的劳工权利"
 law_serfdom_desc:0 "要么没有既定的劳动权利,要么完全没有既定的劳动权利。"
 law_serfdom_banned:0 "最低限度保护"
 law_serfdom_banned_desc:0 "已经建立了最低限度的保护。"
 
 lawgroup_drug_regulations: "药品条例"
 lawgroup_drug_regulations_desc: "中毒物质的法律地位——从全面禁止贩运到完全合法化。 毒品政策决定了死亡率、国家权力、执法成本以及农业和犯罪利益的力量。"

 law_total_prohibition: "禁止总数"
 law_total_prohibition_desc: "所有有毒物质——包括酒精和烟草——被法律所禁止。 国家要求有道德权威来规范公民在宗教和保守机构的支持下将什么投入其身体。 黑市蓬勃发展是因为执法不力。"

 law_alcohol_tobacco_legal: "酒精和烟草法"
 law_alcohol_tobacco_legal_desc: "酒精和烟草是合法的,并征税。 所有其他物质仍然被禁止。 这是大多数现代国家的基线法律框架——经济利益和道德保守主义之间的务实妥协."

 law_marijuana_decriminalization: "大麻非刑罪化"
 law_marijuana_decriminalization_desc: "个人拥有和使用大麻已不再是刑事犯罪。 贸易仍然是非法的,但执法方向却转向更硬的物质。 这项政策反映了一种日益得到的共识,即监禁不是对娱乐性吸毒的有效对策。"

 law_hard_drugs_decriminalized: "硬毒品非刑罪化"
 law_hard_drugs_decriminalized_desc: "拥有所有受管制物质——包括阿片剂、可卡因和安非他明——被视为公共卫生事项,而不是刑事事项。 用户被转送到治疗而不是起诉。 该政策存在争议,但早期收养者的证据表明,该政策降低了过量死亡率并释放出执法资源。"

 law_safe_injection_sites: "安全注射地点"
 law_safe_injection_sites_desc: "政府资助的设施允许使用者在医疗监督下消费药物。 工作人员可以管理过量倒置药物,并将使用者与治疗方案联系起来。 死亡率大幅下降。 宗教和保守派的反对是激烈的——这项政策被视为接受甚至允许使用毒品。"

 law_trafficking_allowed: "允许的贩运"
 law_trafficking_allowed_desc: "受管制物质的贸易完全合法化并由国家管理。 经济利益是直接和巨大的——毒品收入流入正规经济和税收基础。 声誉和社会后果是严重的。 世界上大多数国家都将认为这是对犯罪网络的投降。"

 law_total_prohibition_modifier: "禁止总数"
