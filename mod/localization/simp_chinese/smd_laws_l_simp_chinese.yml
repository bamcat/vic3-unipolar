l_simp_chinese:
 law_jihad:0 "圣战"
 law_jihad_desc:0 "圣战军团在实践、训练和组织方面有着明显的宗教目标。"
 law_mixed_healthcare:0 "混合保健系统"
 law_mixed_healthcare_desc:0 "人口的健康由私营和政府健康保险计划管理。 政府向我国低收入公民提供计划,以解决私人健康保险的市场失灵问题。"
 law_affirmative_action:0 "平权行动"
 law_affirmative_action_desc:0 "对少数群体的各种保护是强制性的。 这包括引用各种制度,鼓励他们参与我们目前的制度、法律保护和货币资助。"
 
 lawgroup_firearms:0 "枪支所有权"
 lawgroup_firearms_desc:0 "与携带武器权有关的事项。"
 
 lawgroup_abortions:0 "堕胎"
 lawgroup_abortions_desc:0 "是否允许我国公民堕胎。"
 
 lawgroup_unions:0 "工会"
 lawgroup_unions_desc:0 "关于我们工人组建工会能力的问题。"
 
 lawgroup_homosexuality:0 "同性恋"
 lawgroup_homosexuality_desc:0 "我们国家LGBTQQ运动相关事宜."
 
 law_canton_system:0 "孤立主义"
 
 law_unrestricted_firearms:0 "不受限制火器"
 law_unrestricted_firearms_desc:0 "我国是大型火器工业的家园,为民用所成熟。"
 
 law_licensed_firearms:0 "持有执照的火器"
 law_licensed_firearms_desc:0 "在我国,公民拥有枪支需要许可证。"
 
 law_banned_firearms:0 "被禁火器"
 law_banned_firearms_desc:0 "严禁平民使用枪支."
 
 law_banned_unions:0 "被禁工会"
 law_banned_unions_desc:0 "不允许工人为了获得工作场所福利而参加工会。"
 
 law_restricted_unions:0 "限制性工会"
 law_restricted_unions_desc:0 "允许工人组成工会,但有一些旨在保护投资者的限制。"
 
 law_unrestricted_unions:0 "无限制工会"
 law_unrestricted_unions_desc:0 "充分鼓励工人参加工会,为其劳动争取全部福利。"
 
 law_banned_abortions:0 "禁止堕胎"
 law_banned_abortions_desc:0 "我国法律严格禁止杀害婴儿。"
 
 law_restricted_abortion:0 "限制堕胎"
 law_restricted_abortion_desc:0 "如果母亲的生命受到威胁,或者在被强奸和乱伦的情况下,公民有权堕胎。"
 
 law_unrestricted_abortions:0 "无限制堕胎"
 law_unrestricted_abortions_desc:0 "公民可自由行使堕胎权。"
 
 law_active_oppression:0 "活动压迫"
 law_active_oppression_desc:0 "公开认同为LGBTQ社区成员的公民被压迫,监禁,甚至被杀死."
 
 law_restricted_lgbtq:0 "同性恋犯罪"
 law_restricted_lgbtq_desc:0 "公民可能因为是同性恋而面临监禁。"
 
 law_decriminalized_gays:0 "同性恋行为"
 law_decriminalized_gays_desc:0 "公民被允许进行同性恋关系,当然是在封闭的门后。 同性恋关系不会受到国家的制裁。"
 
 law_gay_marriage:0 "同性婚姻"
 law_gay_marriage_desc:0 "国家必须制裁所有类型的婚姻,无论发起者是否同性。"
 
