 education_college_elite_carveout:0 "精英专辑"
 education_college_elite_carveout_desc:0 "除了公共系统之外,还提供了保护精英私营机构的例外,这减缓了执行速度,但减少了富裕的反对。"

 education_college_academic_endorsement:0 "学术认可"
