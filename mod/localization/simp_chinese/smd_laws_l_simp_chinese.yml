 education_college_elites_appeased:0 "爱丽丝受惊"
 education_college_elites_appeased_desc:0 "提供精英机构例外,使富裕的反对普遍大学的人变得温和."

 education_college_intelligentsia_engaged:0 "智能游戏"
 education_college_intelligentsia_engaged_desc:0 "学者和研究人员正积极公开普及高等教育,使颁布工作具有思想信誉。"

 education_college_intelligentsia_sidelined:0 "边线"
