l_japanese:
  
  # Leader Ideologies
 ideology_moderate:0 "モデレート"
 ideology_moderate_desc:0 "#lore このリーダーは、自分の興味のグループでは適度と見なされます。#!"
 
 ideology_traditionalist:0 "伝統家"
 ideology_traditionalist_desc:0 "#lore このリーダーは、伝統的な習慣を維持し、自然法の延長としてそれらを表示することを信じています。 #!"

 ideology_traditionalist_minoritarian: "民主主義の伝統主義者"
 ideology_traditionalist_minoritarian_desc:0 "#lore このリーダーは、伝統的な習慣を維持し、自然法の延長としてそれらを表示することを信じています。 彼らの国は、異なる宗教の規則の下に残っています, 彼らは、ポップレースに州の宗教を反対します. #!"

 ideology_atheist:1 "ニヒリスト"
 ideology_atheist_desc:1 "#lore このリーダーは、すべてのコストで伝統主義の社会秩序や機関の疑問とオーバーターンを優先し、包括的な革命的な社会のために地面をクリアしようとします。 #!"

 ideology_republican_leader:0 "公益社団法人"
 ideology_republican_leader_desc:0 "#lore このリーダーは、選出された公式によって規定される公的機関の確立を目指しています。 #!"

 ideology_radical:0 "ラジカル"
 ideology_radical_desc:0 "#lore このリーダーは、民主主義の理想を高める根本的な自由改革に努めます。 #!"

 ideology_abolitionist:0 "アボルディショニスト"
 ideology_abolitionist_desc:0 "#lore このリーダーは、人権の侵害を主張し、世界からそれを廃止しようとしています。 #!"

 ideology_slaver:0 "スラバー"
 ideology_slaver_desc:0 "#lore このリーダーは、人生の自然な部分としてスレーブを眺め、その廃止を反対します。 #!"

 ideology_feminist:0 "フェミニスト"
 ideology_feminist_desc:0 "#lore このリーダーは、女性が男性と同等であることを保持し、市民としての権利の延長に努めます。#!"
 
 ideology_reformer:0 "リフォーム"
 ideology_reformer_desc:0 "#lore このリーダーは、社会をもう少し等しくするために、いくつかの増分的な変化をしたいと思っています。 しかしあまりありません。#!"

 ideology_pacifist:0 "パシフィスト"
 ideology_pacifist_desc:0 "#lore このリーダーは、その方法と平和としての非暴力を信じています。#!"

 ideology_jingoist_leader:0 "ジンゴイスト"
 ideology_jingoist_leader_desc:0 "#lore このリーダーは、攻撃的な外交政策を提唱し、その野望を前進させるために戦争に行くための準備を強調しています。 #!"

 ideology_royalist:0 "ロイヤルリスト"
 ideology_royalist_desc:0 "#lore このリーダーの忠誠性は、モンキーとその正当な定規です。#!"
 
 ideology_social_democrat:0 "社会民主主義"
 ideology_social_democrat_desc:0 "#lore このリーダーは、議会改革を通じて社会主義社会を実現することを信じています。 #!"

 ideology_communist:0 "コミュニティ"
 ideology_communist_desc:0 "#lore このリーダーは、必要なあらゆる手段を通じて政治力を占有するワーキングクラスを信じています。 #!"

 ideology_vanguardist:0 "ヴァンガードスト"
 ideology_vanguardist_desc:0 "#lore このリーダーは、専用のラジカルのファンガードパーティーを通じて、社会主義者社会を実現することを信じています。 #!"

 ideology_fascist:0 "ファシスト"
 ideology_fascist_desc:0 "#lore このリーダーは、現代の文脈の中で知覚された伝統的、権威主義的な価値観の復活をespouseする超国籍者です。 #!"

 ideology_anarchist:0 "アニメーション"
 ideology_anarchist_desc:0 "#lore このリーダーは、階層、権限、状態の廃止を求め、人々自身を支配します。 #!"

 ideology_ethno_nationalist:0 "エスノ・パニスト"
 ideology_ethno_nationalist_desc:0 "#lore このリーダーは民族の地で定義されている国を信じています。 #!"

 ideology_theocrat:0 "テオクラット"
 ideology_theocrat_desc:0 "#lore このリーダーは、doctrinalの値に沿って教会によって実行される状態を信じています。#!"

 ideology_market_liberal:0 "マーケットリベラル"
 ideology_market_liberal_desc:0 "#lore このリーダーは、自由市場の目に見えない手が国の経済の指導力であるべきだと信じています。"
 
 ideology_liberal_leader:0 "リベラル"
 ideology_liberal_leader_desc:0 "#lore このリーダーは、民主主義の機関を優先し、諸国に未確認の規則に反対します。 #!"

  # Interest Group Ideologies

 ideology_paternalistic:0 "パタンタリスティック"
 ideology_paternalistic_desc:0 "#lore このグループは、彼らが伝統的な貴族の指導を必要とすると信じて、それ自体を支配しようとする人口のほとんど信仰を持っています。#!"
  
 ideology_patriarchal:0 "パティオ"
 ideology_patriarchal_desc:0 "#lore このグループは、男性が政治権威を持つべきだと信じ、女性は父親と夫に従うべきだと信じています。#!"
   
 ideology_republican:0 "公益社団法人"
 ideology_republican_desc:0 "#lore このグループは、公共の投票で最高のリーダーが選出され、政府の共和国の様式をサポートしています。#!"
  
 ideology_populist:0 "ポピュリスト"
 ideology_populist_desc:0 "#lore このグループは、人々によってガバナンスを信じ、すべての社会的クラスにフランチャイズを拡大しようとします。#!"
  
 ideology_stratocratic:0 "ストラトクラティック"
 ideology_stratocratic_desc:0 "#lore このグループは、従来の税務と労務関係の形態で社会の階層を維持しています。#!"
  
 ideology_oligarchic:0 "オリエンテーション"
 ideology_oligarchic_desc:0 "#lore このグループは、局所oligarchies.#! によって制御される世俗的な状態の手で力を独占しています"

 ideology_laissez_faire:0 "ラワシーズ・フェール"
 ideology_laissez_faire_desc:0 "#lore このグループは、貿易と労働力の自由の流れを信じ、政府のそれに対する市場の判断を支持しています。#!"
  
 ideology_individualist:0 "個別指導"
 ideology_individualist_desc:0 "#lore このグループは、各人が自分の運命に責任を負い、政府のプログラムに反対して、個人が支払うことができるサービスを提供することを信じています。#!"
  
 ideology_pious:0 "パワフル"
 ideology_pious_desc:0 "#lore このグループは、宗教的な原則が道徳的真実であり、すべての社会を害するべきだと信じています。#!"
  
 ideology_particularist:0 "パーソナリスト"
 ideology_particularist_desc:0 "#lore このグループは、自分の仕事でローカル自律性を望んでいます, 未デンタルのservitude.#!"
  
 ideology_isolationist:0 "アイソレーション"
 ideology_isolationist_desc:0 "#lore このグループは、国家が国内問題に焦点を当てるのを望んでいます, 反対の野心は、外国の土地に拡大するだけでなく、それらからの移民.#!"
  
 ideology_moralist:0 "モーラリスト"
 ideology_moralist_desc:1 "#lore このグループは、この秩序に対する脅威として、宗教的な道徳的な秩序と意見の多様性を見直す強い信念を持っています。#!"
  
 ideology_jingoist:0 "ジンゴイスト"
 ideology_jingoist_desc:0 "#lore このグループは、積極的な外国政策を信じ、それをバックアップする軍隊を維持する。#!"

 ideology_loyalist:0 "ログイン"
 ideology_loyalist_desc:0 "#lore このグループは、各市民が州の重要な機能に資金を供給するために彼らのデュースを支払うべきだと信じています。#!"
 
 ideology_meritocratic:0 "メリトクラティック"
 ideology_meritocratic_desc:0 "#lore このグループは、成功が獲得され、それを達成した人々は、それに付随する責任と富に値すると信じています。#!"
   
 ideology_patriotic:0 "パティオ"
 ideology_patriotic_desc:0 "#lore このグループは、その国に忠実に専念し、不在を広める人に対して厳しい対策を望んでいます。#!"
  
 ideology_liberal:0 "リベラル"
 ideology_liberal_desc:0 "#lore このグループビューは、保護されるべき重要な値として、自由で法的平等です。#!"
  
 ideology_anti_clerical:0 "反円錐"
 ideology_anti_clerical_desc:1 "#lore このグループは、政治と教育システムに関する組織的宗教の影響を反対しています。 彼らは合理的心がガバナンスの最前線にあるべきだと信じています。#!"
  
 ideology_proletarian:0 "プロレタリアン"
 ideology_proletarian_desc:0 "#lore このグループでは、クラス闘争のレンズとこの紛争の労働者との側面を通して政治を閲覧しています。#!"
  
 ideology_egalitarian:0 "行政書士"
 ideology_egalitarian_desc:0 "#lore このグループは、人々の平等で人間的治療が政治政策の礎となるべきだと信じています。#!"
   
 ideology_anti_slavery:0 "アンチスラブリー"
 ideology_anti_slavery_desc:0 "#lore このグループabhors スレーブ と 見ます それ の機能 の barbarous 過去。#!"
 
 ideology_pro_slavery:0 "プロスラヴァリー"
 ideology_pro_slavery_desc:0 "#lore このグループビューは、機能的な社会の必要な部分としてスレーブを閲覧します。#!"
  
 ideology_reactionary:0 "リアクション"
 ideology_reactionary_desc:0 "#lore このグループは、一斉社会を追い越したばかりの王様が、過去、本物、あるいは想像するノスタルジックです。#!"
 
 ideology_plutocratic:0 "プルトクラティック"
 ideology_plutocratic_desc:0 "#lore このグループは、富裕層が意思決定者として価値を実証し、社会のコースを設定するために適している知的エリートを形成していると信じています。#!"

 ideology_agrarian:0 "アグラリアン"
 ideology_agrarian_desc:0 "#lore このグループは、経済政策の焦点が農業や農家の利益にあるべきだと信じています。#!"

 ideology_corporatist: "コーポラティスト"
 ideology_corporatist_desc: "#lore このグループは、宗教的な原則の適用を通じて、クラス間の紛争の解決を信じています。#!"

 ideology_corporatist_leader: "コーポラティスト"
 ideology_corporatist_leader_desc: "#lore このリーダーは、異なるソーシャルグループ間の上位クラスとコラボレーションによるクラス対立の解像度を信じています。#!"

 ideology_agrarian_jeffersonian:0 "ジェファーソニアン"
 ideology_agrarian_jeffersonian_desc:0 "#lore このグループは、小規模な農家クラスが国の土台を形成し、自由社会の基盤として農業主義を支援していると信じています。#!"

  # flavor ideologies

 ideology_republican_paternalistic:0 "エリタイスト"
 ideology_republican_paternalistic_desc:0 "#lore このグループは、土地のエリートによって規則を好むが、まだ政府の共和国の形態をサポートしています。#!"

 ideology_scholar_paternalistic:0 "スカラーゲントリー"
 ideology_scholar_paternalistic_desc:0 "#lore このグループは、賢明で教育を受けている僧侶によって支配される国を見ることを好みます。#!"

 ideology_junker_paternalistic:0 "ジュンカー"
 ideology_junker_paternalistic_desc:0 "#lore このグループは、土地の貴族は、その未来に国を導くのに最適なと信じています。#!"

 ideology_papal_paternalistic:1 "バロニアル"
 ideology_papal_paternalistic_desc:0 "#lore このグループは、聖なるSee.#!のPopeと伝統的な階層の権威をサポートしています"

 ideology_confucian:0 "コンピシャン"
 ideology_confucian_desc:0 "#lore このグループは、天の法則に根ざした社会秩序を支持し、Conuciusの教えを信じています。#!"

 ideology_bakufu:0 "バクーフ"
 ideology_bakufu_desc:0 "#lore このグループは、戦士クラスの手にある力が属する将軍と信じる力をサポートしています。#!"
 
 ideology_shinto_moralist:0 "信藤のこだわり"
 ideology_shinto_moralist_desc:0 "#lore このグループは、天皇の尊心を信じ、神と霊の古い崇拝にこの信念を結ぶ。#!"

 ideology_caudillismo:0 "クラウディシモ"
 ideology_caudillismo_desc:0 "#lore このグループは、法律の憲法上の軍事的背景を持つ強靭な指導者をサポートする傾向があります。#!"

 ideology_heavenly_kingdom_theocratic:0 "神様の崇拝者"
 ideology_heavenly_kingdom_theocratic_desc:0 "#lore このグループは、すべての人がキリストによって償還したときに神の子と娘になるという考えをサポートし、政府の権威ある形態を支持しています。#!"

 ideology_papal_moralist:0 "ポンフィサー"
 ideology_papal_moralist_desc:0 "#lore このグループは、カトリック教会の天道と風力の両方を維持するための強い献身を持っています。#!"

 ideology_liberal_modern: "リベラル"
 ideology_liberal_modern_desc: "#lore このグループビューは、保護されるべき重要な値として、自由で法的平等です。#!"

 ideology_egalitarian_modern: "行政書士"
 ideology_egalitarian_modern_desc: "#lore このグループは、人々の平等で人間的治療が政治政策の礎となるべきだと信じています。#!"

 ideology_enclavist: "スタッフ"
 ideology_enclavist_desc: "#lore このグループの関心は、そのポジションをコロニアル・ルーリング・クラスとして保存し、その主題からそれ自体を分離し、その能力を複雑で無数のバールトクラティック・システムによって維持することにあります。#!"

 ideology_malthusian: "マルティシャン"
 ideology_malthusian_desc: "#lore このグループは、トーマス・マルタスによって確立された経済理論を購読します。, その結果、人口増加による自敗を作るために貧困を緩和する努力を信じています。.#!"

 liberal_and_egalitarian_amended_tt: "[GetIdeology('ideology_liberal').GetName] および [GetIdeology('ideology_egalitarian').GetName] [Concept('concept_ideology','$concept_ideologies$')] の stances は $lawgroup_rights_of_women$ で変更します"

 # Movement Ideologies

 ideology_royalist_movement: "ロイヤルリスト"
 ideology_royalist_movement_desc: "#lore このグループのロイヤリティは、モンキーとその正当なルーラーです。#!"

 ideology_absolutist_movement: "アブソリューティスト"
 ideology_absolutist_movement_desc: "#lore このグループは、僧侶の機関に忠実であり、絶対的な力でそれをvestingサポートしています。#!"

 ideology_anarchist_movement: "アニメーション"
 ideology_anarchist_movement_desc: "#lore このグループは、階層、権限、状態の廃止を求め、人々自身を支配します。 #!"

 ideology_communist_movement: "コミュニティ"
 ideology_communist_movement_desc: "#lore このグループは、必要とあらゆる手段を通じて政治力を占有するワーキングクラスを信じています。 #!"

 ideology_vanguardist_movement: "ヴァンガードスト"
 ideology_vanguardist_movement_desc: "#lore 当社グループは、専用のラジカルの防護会を通じて、社会主義者社会の実現を目指しています。 #!"

 ideology_radical_movement: "ラジカル"
 ideology_radical_movement_desc:1 "#lore このグループは、民主主義の理想を高める根本的な自由改革に努めます。 #!"

 ideology_liberal_movement: "リベラル"
 ideology_liberal_movement_desc: "#lore このグループは民主主義の施設を大切にし、市民にとって不可欠な自由を保証します。 #!"

 ideology_pluralist_movement_1: "ポリカルタリスト"
 ideology_pluralist_movement_1_desc: "#lore このグループは、文化的伝統、アイデンティティ、言語を守ることを望んでいます。 #!"

 ideology_pluralist_movement_2: "$ideology_pluralist_movement_1$"
 ideology_pluralist_movement_2_desc: "$ideology_pluralist_movement_1_desc$"

 ideology_pluralist_movement_3: "$ideology_pluralist_movement_1$"
 ideology_pluralist_movement_3_desc: "$ideology_pluralist_movement_1_desc$"

 ideology_pluralist_movement_4: "$ideology_pluralist_movement_1$"
 ideology_pluralist_movement_4_desc: "$ideology_pluralist_movement_1_desc$"

  # Government Principles group
 lawgroup_governance_principles:0 "ガバナンス原則"
 lawgroup_governance_principles_desc:0 "あなたの国が支配される基礎原則および権限。 状態の頭が誰であるかを決定します。"
  
 law_chiefdom:0 "チーフダム"
 law_chiefdom_desc:0 "キンシップに基づいて、階層的なプレインダストリアルな政治システム, 頭の著名な家族の戦主や高齢者. 全州にわたる効率的な集中制御が不可欠です。"
 law_monarchy:0 "モナーキー"
 law_monarchy_desc:0 "貴族の王朝が国の国民的アイデンティティを表す統制の形態であり、王立の王女に執行力をもたらす。"
 law_presidential_republic:0 "代表取締役社長"
 law_presidential_republic_desc:0 "人々やその選択された代表者が力を保持する政治システム。 共和国は、国家の頭に $RULER_TITLE_PRESIDENT$ を選択またはノミネートされています。"
 law_parliamentary_republic:0 "議会の共和国"
 law_parliamentary_republic_desc:0 "人々やその選択された代表者が力を保持する政治システム。 立法のリーダーは国家の頭として機能し、$RULER_TITLE_CHANCELLOR$と呼ばれます。"
 law_theocracy:0 "ザクラシー"
 law_theocracy_desc:0 "政府は、悲観と聖霊の解釈によって支配される。 国家の頭は正式に礼拝の人です。しかし、慈悲、状態、または出生によって選択された世界的に代表的な練習で。"
 law_council_republic:0 "評議会議員"
 law_council_republic_desc:0 "労働者が地方議会に委任する政治制度。 職場の組織の概念を一般的なガバナンスに拡張します。"
 law_corporate_state:0 "コーポレート・ステート"
 law_corporate_state_desc:0 "正式に認定された企業グループ間の機関化コラボレーションに基づく政治システム。 状態は、異なるソーシャルクラス間の交渉のためのフォーラムとして機能します。"
 law_corporate_state_1:0 "コーポレート・ステート"
 law_corporate_state_1_desc:0 "正式に認定された企業グループ間の機関化コラボレーションに基づく政治システム。 状態は、異なるソーシャルクラス間の交渉のためのフォーラムとして機能します。"
  # Free speech group
 lawgroup_free_speech:0 "無料スピーチ"
 lawgroup_free_speech_desc:0 "無料のスピーチと公開アセンブリの権利を規制する法律。"
  
 law_outlawed_dissent:0 "不法行為"
 law_outlawed_dissent_desc:0 "政府の批判は、有害かつ違法と見なされます。"
 law_censorship:0 "メンソールシップ"
 law_censorship_desc:0 "プレスのアクティブ検閲とアセンブリの保証の権利はありません。"
 law_right_of_assembly:0 "アセンブリの権利"
 law_right_of_assembly_desc:0 "市民は、公共アセンブリの権利を楽しんでいます。"
 law_protected_speech:0 "保護されたスピーチ"
 law_protected_speech_desc:0 "無料のスピーチの保護は法律で禁じられています。"
  
  # Army Model group
 lawgroup_army_model:0 "軍隊モデル"
 lawgroup_army_model_desc:0 "あなたの軍隊が組織され、調整される方法。"
  
 law_peasant_levies:0 "Peasant Levies, オーストラリア"
 law_peasant_levies_desc:0 "軍の主力は、ゼロから基礎的な訓練まで記述された乳幼児から来ます。"
 law_national_militia:0 "ナショナル・ミリトリア"
 law_national_militia_desc:0 "立っている軍隊は小さいですが、地元のミリタスは自分の家を守るために活性化することができます。"
 law_mass_conscription:0 "マスコンポジション"
 law_mass_conscription_desc:0 "乳幼児の脚本は、プロの軍隊を補うために必要に応じて活性化することができます。"
 law_professional_army:0 "プロの軍隊"
 law_professional_army_desc:0 "軍隊はよく訓練された、専門の規則から成っています。"
  
  # Distribution of Power group
 lawgroup_distribution_of_power:0 "電力の配分"
 lawgroup_distribution_of_power_desc:0 "政治力が分配される方法。 状態の頭が考慮できるかを決定します。"
  
 law_autocracy:0 "オートクラシー"
 law_autocracy_desc:0 "国家の電力の頭は絶対であり、彼らは地球の力に無責任に責任を負います。"
 law_oligarchy:0 "Oligarchy(オリガシー)"
 law_oligarchy_desc:1 "国家の頭は、強力な無選択の個人を小グループと力と責任を共有します。"
 law_landed_voting:0 "土地投票"
 law_landed_voting_desc:0 "土地または資本財産を所有する者は、投票を行います。"
 law_wealth_voting:0 "ウェルス投票"
 law_wealth_voting_desc:1 "裕福な市民は投票を付与されます。 より多くの富の男性はより多くの投票を付与されます."
 law_census_voting:0 "Census サッフル"
 law_census_voting_desc:0 "特定のステータスの文学者には投票が与えられています。"
 law_universal_suffrage:0 "ユニバーサル・サッフル"
 law_universal_suffrage_desc:0 "すべての大人の男は等しい投票を与えられます。"
 law_elder_council:0 "高齢者協議会"
 law_elder_council_desc:0 "最悪の男性は、国の統治で発言しています。"
 law_anarchy:0 "アナーキー"
 law_anarchy_desc:1 "地域社会は、自らの業務を統括し、より大きな協力協議会に限られた条件を提供する代理人を派遣します。 正式な階層の中央権限がないと運動が困難です。"
 law_single_party_state: "単一パーティ状態"
 law_single_party_state_desc: "国家は、国家内のすべての政治活動に独占している単一の法的政治党によって支配されます。"
 ruler_in_party_tt: "この国の [concept_ruler] は、積極的な政治 [concept_party] を持つ [concept_interest_group] のメンバーです。"
 sps_no_party_tt: "この国は活動的な [Concept('concept_party', 'Political Parties')] を持っていません"
 sps_government_reshuffle_tt: "[concept_government] 構成は単一の法的[concept_party]のメンバーと更新されます"
  
  # Voting System group
 law_first_past_the_post:0 "第一次投稿"
 law_first_past_the_post_desc:0 "また、勝者テイク・オールとして知られるこのシステムは、地域のサブセクションで最も多くの席を獲得する単一の候補を選出します。 相手の政府を強固なマンデートで作る傾向はありますが、食料調達に脆弱です。"
 law_proportional_representation:0 "比例した表現"
 law_proportional_representation_desc:0 "このシステムは、投票回数に比例して議会の席を配布します。 妥協が何かを成し遂げるのが鍵となる、マルチパーティの石炭政府を作る傾向にあります。"
  
  # Workplace Safety group
 lawgroup_labor_rights:0 "労働権利"
 lawgroup_labor_rights_desc:0 "労働者の権利。"
  
 law_serfdom:0 "セルフダム"
 law_serfdom_desc:0 "農民は彼らの土地に縛られ、彼らの致命的なマスターのための労働を実行しなければなりません。"
 law_no_workers_rights:0 "労働者の権利なし"
 law_no_workers_rights_desc:0 "労働者は州によって保証される特定の労働権を持っていません。"
 law_regulatory_bodies:0 "レギュレーションボディ"
 law_regulatory_bodies_desc:0 "政府機関は雇用主の過剰を規制するために作成されています。"
 law_worker_protections:0 "労働者の保護"
 law_worker_protections_desc:0 "労働者は、法律で祀られている広範な保護を楽しむことができます。"
  
  # Children's Rights group
 lawgroup_childrens_rights:0 "子どもの権利"
 lawgroup_childrens_rights_desc:0 "子どもに余裕のある権利と保護"
  
 law_child_labor_allowed:0 "児童労働許可"
 law_child_labor_allowed_desc:0 "児童が就労する際の法的制限はありません。"
 law_restricted_child_labor:0 "児童労働の制限"
 law_restricted_child_labor_desc:0 "工場内はお子様の同伴はできません。"
 law_compulsory_primary_school:0 "必須小学校"
 law_compulsory_primary_school_desc:0 "就労を禁止する小学校に通学するお子様は数年間在籍しなければなりません。"
  
  # Slavery group
 lawgroup_slavery:0 "スラヴァリー"
 lawgroup_slavery_desc:0 "人の財産。"
  
 law_slavery_banned:0 "スラヴァリー禁止"
 law_slavery_banned_desc:0 "人間が他人に留まらない"
 law_debt_slavery:0 "デボットスラヴァリー"
 law_debt_slavery_desc:0 "債務をクリアできない者は、債権者としての財産を損なう代わりに、その債務をクリアすることはできません。"
 law_slave_trade:0 "スレーブトレード"
 law_slave_trade_desc:0 "外国人の体内での取引を徹底し、安価に労力を発揮します。"
 law_legacy_slavery:0 "レガシースラヴァリー"
 law_legacy_slavery_desc:0 "廃止者とスレーブホルダーの妥協として、スレーブの機関は拡大しない限り続くことがあります。"
  
  # Church and State group
 lawgroup_church_and_state:0 "教会と国家"
 lawgroup_church_and_state_desc:0 "物理的および精神的な知事間の関係。"
  
 law_state_religion:0 "国家宗教"
 law_state_religion_desc:0 "教会は、州の正式な臓器です。 すべての少数民族の宗教は差別化されています。"
 law_freedom_of_conscience:0 "科学の自由"
 law_freedom_of_conscience_desc:0 "国家は公式の国家の宗教を持っていますが、人々は信じるものを選ぶかもしれません。 特にエキゾチックな宗教だけが差別化されています。"
 law_total_separation:0 "総分離"
 law_total_separation_desc:0 "教会や信仰は政府の機能を妨げることはできません。 宗教が差別化される可能性はありません。"
 law_atheist_state:0 "アテジスト州"
 law_atheist_state_desc:0 "宗教的な信念を伝えることは禁止され、実践する人は侵害されています。 すべての宗教は差別化されています。"
  
   # Citizenship group
 lawgroup_citizenship:0 "市民権"
 lawgroup_citizenship_desc:0 "市民権の権利の拡大"
  
 law_ethnostate:0 "エトノステート"
 law_ethnostate_desc:1 "状態は、市民権から禁止されている他の民族性を持つ、特定の民族性に厳格に結び付けられていること自体を考慮する。 外国の文化は全て差別化されています。"
 law_national_supremacy:0 "国民のSupremacy"
 law_national_supremacy_desc:1 "国家は、特定の国民のアイデンティティを順守することによって、市民を定義します。これは、他のすべての人々を支持するために保持されます。 外国の文化は、伝統と言語(または他の習慣)の両方を共有しない限り、差別化されます。"
 law_racial_segregation:0 "地方の分離"
 law_racial_segregation_desc:1 "国家は、共有遺族の遺産の概念に縛られる市民権を考慮する。 異なる伝統の異文化は差別化されています。"
 law_cultural_exclusion:0 "文化的除外"
 law_cultural_exclusion_desc:1 "国家は、特定の正式なアイデンティティを考慮しながら、すべての文化的アイデンティティの人々への市民権を提供しています。 あなたの第一次文化と共通して何もない外国の文化は差別化されています。"
 law_multicultural:0 "多文化主義"
 law_multicultural_desc:1 "国家は、すべての文化的アイデンティティの人々のための等しい市民権を支持し、他の人に特定の文化を正式に見立てる試みをしません。 文化が差別化されていない"
 law_subjecthood: "テーマ"
 law_subjecthood_desc: "状態は、国民性を促すために少し努力し、その人々を最優先的に決定します。 文化は、自分のコミュニティ内で自分のデバイスに大きく残っています。"

  # Caste Hegemony, a Social Stratification law group
 lawgroup_caste_hegemony: "キャストヘゲモニー"
 lawgroup_caste_hegemony_desc: "ブリティッシュ・インディッシュ・カスティー・システムに基づく社会人の間での権利の確保"
 law_hindu_caste_enforced: "カスティーシステム強化"
 law_hindu_caste_enforced_desc: "Caste hierarchy は、法的に強制され、社会経済的モビリティの高度化を防ぎます。"
 law_hindu_caste_codified: "キャスターシステム 統合"
 law_hindu_caste_codified_desc: "キャスター階層は、上向きの社会経済的モビリティを制限するために認識され、使用されます。"
 law_hindu_caste_not_enforced: "Caste 強化されていない"
 law_hindu_caste_not_enforced_desc: "キャスターに基づく社会経済的モビリティは法的に制限されていませんが、差別は依然として持続する可能性があります。"
 law_affirmative_action: "肯定的な行動"
 law_affirmative_action_desc: "公平な社会経済的状況を作成するための積極的な対策, 以前にマージンされたグループを優先します."
  
  # Economic System group
 lawgroup_economic_system:0 "経済システム"
 lawgroup_economic_system_desc:0 "あなたの経済の基本原則。"

 law_traditionalism:0 "伝統主義"
 law_traditionalism_desc:0 "小規模な集中制御で、前産業省の経済。"
 law_agrarianism:0 "アグラリアリズム"
 law_agrarianism_desc:0 "農村経済は農業の発展とコミュニティを強調しています。"
 law_cooperative_ownership:0 "協同組合所有権"
 law_cooperative_ownership_desc:0 "社会的所有権の概念に基づいて経済システム, 余剰生産は、労働者の間でより均等に配布されます."
 law_command_economy:0 "コマンドエコノミー"
 law_command_economy_desc:0 "政府が生産のほとんどの側面を直接管理する中向きの介入者経済。"
 law_laissez_faire:0 "ラワシーズ・フェール"
 law_laissez_faire_desc:0 "比較優位の原則に基づいて設立された、政府の介入がより大きな成長を意味します"
 law_interventionism:0 "インターベンティム"
 law_interventionism_desc:0 "国の安定性を確保するために、政府は民間企業の最悪の過剰を抑制しなければなりません。"

 # Trade Policy group
 lawgroup_trade_policy:0 "貿易政策"
 lawgroup_trade_policy_desc:0 "取引と国境を越えて商品を交換する法律。"
 
 law_free_trade:0 "フリートレード"
 law_free_trade_desc:1 "取引がすべての利益のためにあるので、商品の無料交換は禁止されなければなりません。"
 law_protectionism:0 "保護主義"
 law_protectionism_desc:0 "当社の業界は、外国の市場俳優の決定から保護する必要があります。"
 law_isolationism:0 "イソリシズム"
 law_isolationism_desc:0 "国民のニーズを内部で供給することに焦点を当てた経済, 他の人の事務を離れながら."
 law_mercantilism:0 "輸出販売"
 law_mercantilism_desc:0 "正の現在のアカウントを維持し、他の国と競争することに重点を置いた輸出中心の経済。"

  # Taxation Group
 lawgroup_taxation:0 "税理士事務所"
 lawgroup_taxation_desc:0 "市民を課税することにより、状態が収益を上げる方法。"
 law_consumption_based_taxation:0 "消費税込み"
 law_consumption_based_taxation_desc:0 "直接所得や一人当たりの税金がなく、商品の消費を課税することによって収入が増加する税制。"
 law_land_based_taxation:0 "土地ベースの税務"
 law_land_based_taxation_desc:0 "主に農民から収集された土地ベースの納税の伝統的な形態。"
 law_per_capita_based_taxation:0 "帰還税"
 law_per_capita_based_taxation_desc:0 "所得税と1カピタ税の併用により、不当に税金を払う税制。"
 law_proportional_taxation:0 "地方税"
 law_proportional_taxation_desc:0 "誰もが収入のほぼ等しい株式を州に支払うことを確認するためにしようとする所得ベースの税制."
 law_graduated_taxation:0 "進歩的な税務"
 law_graduated_taxation_desc:0 "主に納税の負担を高配当税を通る目的の税制。"
  
  # Education System group
 lawgroup_education_system:0 "教育システム"
 lawgroup_education_system_desc:0 "お子様がチムニー・スイーピング・コールで行われるとき。"
  
 law_no_schools:0 "スクールなし"
 law_no_schools_desc:0 "教育は両親の責任です。 最も寛大な市民だけが読み書きすることを学びます。"
 law_religious_schools:0 "宗教学校"
 law_religious_schools_desc:0 "教会が国家教育の世話をすると、忠実で道徳的に健康な人口を確保します。"
 law_private_schools:0 "プライベートスクール"
 law_private_schools_desc:0 "教育は、教育の選択肢の自由を保証することができるプライベートな興味に最も残っています。"
 law_public_schools:0 "公立学校"
 law_public_schools_desc:0 "教育は、状態の責任であり、すべての人に標準化され、等しくアクセスする必要があります。"
  
  # Health System group
 lawgroup_health_system:0 "健康システム"
 lawgroup_health_system_desc:1 "政府の関与に関する法律(またはその欠如)は、市民に医療を提供する。"
  
 law_no_health_system:0 "健康システムなし"
 law_no_health_system_desc:1 "政府は、ヘルスケアのあらゆるシステムに資金を供給しません。"
 law_charitable_health_system:0 "チャリティー病院"
 law_charitable_health_system_desc:0 "慈善団体 - 多くの場合、宗教的なもの - 病気や死ぬ誰かに助けを借りて、彼らができるようにします。"
 law_private_health_insurance:0 "健康保険"
 law_private_health_insurance_desc:0 "人口の健康は、民間の健康保険プログラムを通じて支払った民間の病院のシステムを介して管理され、政府の財務への影響を最小限に抑えることができる人の幸福を保証します。"
 law_public_health_insurance:0 "公衆健康保険"
 law_public_health_insurance_desc:0 "政府は、すべての世話に等しいアクセスを保証する公的に資金を積んだ健康保険プログラムを提供します。"
 
  # Welfare group
 lawgroup_welfare:0 "社会招聘"
 lawgroup_welfare_desc:0 "所得控除のための政府の援助。"
  
 law_no_social_security:0 "社会保障なし"
 law_no_social_security_desc:0 "自分で提供できない人のために提供するための状態の役割ではありません。"
 law_poor_laws:0 "労働法"
 law_poor_laws_desc:0 "路面電車に乗ると、私たちの街を離れて、仕事場に行くことは、コストに値する価値があります。"
 law_wage_subsidies:1 "賃金補助金"
 law_wage_subsidies_desc:1 "仕事に喜んでいる人は、食べる権利があります。 男は彼の家族のために提供するための手段を欠いてはいけません。"
 law_old_age_pension:0 "旧年金"
 law_old_age_pension_desc:0 "労働力が有効でなければならず、その後の福利厚生が政府の財産下に落ちなければならない年齢には、実用的な限界があります。"
 law_disability_insurance:0 "障害保険"
 law_disability_insurance_desc:0 "自分のせいもなく、自分のせいで、仕事ができない状態の責任です。"
  
  # Rights of Women group
 lawgroup_rights_of_women:0 "女性の権利"
 lawgroup_rights_of_women_desc:0 "公正性の法的規則。"
  
 law_no_womens_rights:0 "法的ガーディアンシップ"
 law_no_womens_rights_desc:0 "女性は男性の守護の下で合法的に、非常に少数の権利を楽しんでいます。"
 law_women_own_property:0 "適切な女性"
 law_women_own_property_desc:0 "受け継がれているか否かにかかわらず、女性でも所有権を所有し、大事にする権利と義務があります。"
 law_women_in_the_workplace:0 "職場の女性"
 law_women_in_the_workplace_desc:0 "潜在的な労働力が半分に限らず、進捗状況を把握できるのはどうすればよいですか?"
 law_womens_suffrage:0 "女性の不足"
 law_womens_suffrage_desc:0 "物事の新しい秩序の調整では、女性は平等な声を要求します。私たちは何も受け入れません。"
  
  # Policing
 lawgroup_policing:0 "ポライシング"
 lawgroup_policing_desc:0 "国民の警察の優先順位。"

 law_no_police:0 "警察なし"
 law_no_police_desc:0 "この国では、構造化された警察の力は存在しません。"
 law_local_police:0 "局所警察部隊"
 law_local_police_desc:0 "この国には、局所警戒部隊が稼働しています。"
 law_dedicated_police:0 "専用の警察部隊"
 law_dedicated_police_desc:0 "この国は、標準化された訓練で専用の警察力を持っています。"
 law_militarized_police:0 "緩和された警察の力"
 law_militarized_police_desc:0 "警察の軍用機器と軍事訓練を与えることによって、あなたの意志を運ぶことで、その有効性が増加します。"
  
  # Bureaucracy
 lawgroup_bureaucracy:0 "事務局員"
 lawgroup_bureaucracy_desc:0 "あなたの国が管理される方法。"

 law_hereditary_bureaucrats:0 "遺伝局員"
 law_hereditary_bureaucrats_desc:0 "局員は、子供たちに責任を負う、伝統的な相続を通して自分の立場を保持しています。"
 law_appointed_bureaucrats:0 "任命局員"
 law_appointed_bureaucrats_desc:0 "事務局員は、高い賃金のための交換に国の最高の利益を提供する定規によって任命されます。"
 law_meritocratic_bureaucracy:0 "メリトクラティック・ビューロークラシー"
 law_meritocratic_bureaucracy_desc:0 "局員は、水路を介して電力の位置のためのビーを打ちます. 時間が経つにつれて、これは巨大でビザンチンの投与を生み出します。"
 law_elected_bureaucrats:0 "選挙局員"
 law_elected_bureaucrats_desc:0 "地元の知事は、市民が管理しやすくするために、その構成員、分散力によって選出されます。"
  
  # Colonization
 lawgroup_colonization:0 "コロニゼーション"
 lawgroup_colonization_desc:0 "[concept_decentralized_nation] を移植および征服するためにコロニーを確立するあなたのスタンス。"
  
 law_no_colonial_affairs:0 "コロニアル問題"
 law_no_colonial_affairs_desc:0 "国は、正式な植民地化の型に従事せず、コロニーを確立することはできません。"
 law_colonial_resettlement:0 "コロニアル・レシート"
 law_colonial_resettlement_desc:0 "コロニーは、国の定住者に土地を供与するために設立されました。"
 law_colonial_exploitation:0 "コロニアルの搾取"
 law_colonial_exploitation_desc:0 "コロニーは、自然の資源と安価な労働のために地域を悪用するために設立されています。"
  
  # Internal Security
 lawgroup_internal_security:0 "内部セキュリティ"
 lawgroup_internal_security_desc:0 "注文して自分の仕事を続けましょう。"
  
 law_no_home_affairs:0 "総務省"
 law_no_home_affairs_desc:0 "状態は、止まりと上りに特別な試みをしません。"
 law_national_guard:0 "国民の監視"
 law_national_guard_desc:0 "状態は、軍力を使用して、国内のアンレストを抑制することができます。"
 law_secret_police:0 "秘密の警察"
 law_secret_police_desc:0 "秘密の警察は、根本的な要素とdissentersの近いトラックを維持します。"
 law_guaranteed_liberties:0 "リベリティー保証"
 law_guaranteed_liberties_desc:1 "州の総務局は、市民の悲しみに対処することに専念し、原因なしでそれらを調査または逮捕することから禁じられています。"
  
  # Migration
 lawgroup_migration:0 "マイグレーション"
 lawgroup_migration_desc:0 "人の流れを制御する。"
  
 law_no_migration_controls:0 "移行制御なし"
 law_no_migration_controls_desc:0 "国境を越えた動きをコントロールしようとする国はいません。"
 law_migration_controls:0 "移行制御"
 law_migration_controls_desc:0 "文化や宗教の人々は、差別化されていない限り、国や地域で移住することができます。"
 law_closed_borders:0 "クローズドボーダー"
 law_closed_borders_desc:0 "国外への移行はできません。"

