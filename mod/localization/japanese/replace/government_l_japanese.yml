 gov_falangist_state: "ファランジスト州"
 gov_falangist_state_desc: "これは、ラジカルな民族主義によって特徴付けられ、状態の合計権威に重点を置いた、corporatistラインに沿って編成された[concept_government_type]です。 [Concept('concept_ruler','$RULER_TITLE_JEFE$')]\n\n$TRANSFER_OF_POWER_NAME_DESC$"
