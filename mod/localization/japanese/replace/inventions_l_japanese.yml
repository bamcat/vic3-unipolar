 corporate_management: "インターネット・ガバナンス"
 corporate_management_desc: "政府がインターネットを完全に制御できるようにする"
 dialectics:0 "インフルエンサー"
 dialectics_desc:1 "ソーシャルメディアインフルエンサーとしても知られるインフルエンサーは、ソーシャルメディアに影響を及ぼし、よく知られているインターネット有名人の一種です。 用語の近代的な言及は、一般的に、事業体は、インフルエンサーマーケティングとして知られる製品やサービスを促進するために、ソーシャルメディアのインフルエンサーの影響を受ける活動のために支払う有料の役割です。"
 psychiatry:0 "メメス"
 psychiatry_desc:1 "インターネットのミーム、またはミームは、主にソーシャルメディアプラットフォームを介して、インターネット全体に広がる文化的アイテム(アイデア、行動、スタイルなど)です。"
 postal_savings:0 "モーゲージ・バック・証券"
