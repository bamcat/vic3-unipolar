   #hereditary_aristocracy: "Hereditary Aristocracy"
  # Categories
  # Culture Technology
  # Economy Technology
  # Military Technology
  ### Technology Tooltips
  ##lenders_of_last_resort: "Lenders of Last Resort"
  ##lenders_of_last_resort_desc: "State-owned central banks are large enough to come to the rescue of smaller commercial banks, such as during bank runs. This can prevent a financial crisis spreading to other sectors of the economy. Often, even the promise of rescue in times of difficulty is enough to prevent bank runs occurring in the first place. Some 'critics' claim that such a promise will encourage risky behavior by the commercial banks, but these 'critics' are surely just anarchists looking to wreck the nation's economic security, as bankers are some of the most trustworthy people to walk the halls of power."
  ##limited_liability: "Limited Liability"
  ##limited_liability_desc: "A limited liability company draws a legal distinction between the company and its owners. This helps prevent the bankruptcy of a company ruining the personal lives of the investors, as creditors will not try to haul off the furniture of failed businessmen to recoup losses. This makes investing less risky, if perhaps less satisfying to watch from afar. As a separate legal entity, the company has its own finances that must be audited and taxed."
  ##marketing_desc: "Promotional schemes to grab more market share or create a new market from scratch were devised by Josiah Wedgwood, leader of the expanding pottery industry at the dawn of the Industrial Revolution."
  ##paper_money: "Paper Money"
  ##paper_money_desc: "A kind of promissory note issued by a bank, paper money allows private citizens to move and exchange large volumes of currency without the danger and discomfit of gold or silver coins which cannot be divided and are heavy to carry. Thus, commercial exchanges are easier and safer."
  ##regulated_private_notes: "Regulated Private Notes"
  ##regulated_private_notes_desc: "Bankers realized hundreds of years ago that their customers only rarely demand back their deposits all at once. By issuing loans in excess of their reserves in the form of private bank notes, bankers could make even more money from interest. Unfortunately, when all the bank's customers do demand their deposits at once, there will not be enough reserves. With better communications technology, these 'bank runs' become more frequent. To prevent bank runs, governments can restrict the issuance of private notes only to banks that meet certain criteria of fiduciary responsibility, such as being close personal friends to the finance minister."
  #alcohol: "Alcohol"
  #alcohol_desc: "An ancient technology, presumably discovered when a tribesman left some grain in a puddle and decided to drink it after a few months had passed, alcohol became central to the discipline of alchemy, and continues to serve men of reason in the field of chemistry in various processes, some of which do not involve drinking it."
  #atomic_theory_of_matter: "Atomic Theory of Matter"
  #atomic_theory_of_matter_desc: "Observations in chemistry seem to have disproven the notion held by supporters of phlogiston that matter is composed of the three fundamental essences of solidity, fluidity and inflammability. Air is not merely a void into which phlogiston flows during combustion - it contains oxygen, which combines with other matter during chemical reactions."
  #bankruptcy_law: "Bankruptcy Law"
  #bankruptcy_law_desc: "Having a legal framework for a company to declare bankruptcy allows investors and creditors to try to recoup losses via liquidation of assets. This makes investment less risky."
  #building_societies: "Building Societies"
  #building_societies_desc: "Originally set up within communities to help new families raise loans with which to buy homes and then disbanded once the members had all satisfied their requirements, building societies can also be permanent financial institutions that specialize in cheap mortgages."
  #census: "Census"
  #census_desc: "Knowing how many people we have in our country and roughly were they live is important so we know where to spend out money and how many men we will have if we have to fight. Should we be involved in that grubby business of having our lower orders actually having representation I suppose it will have a use for that as well."
  #chemical_batteries: "Chemical Batteries"
  #chemical_batteries_desc: "Electricity can be generated by exploiting the difference in charge as electrolytes pass through oxidation and reduction cells containing copper and zinc cathodes and annodes. Early experiments in this field took the form of a series of jars which had the appearance of a battery of artillery, hence the name."
  #civil_service: "Civil Service"
  #civil_service_desc: "The idea that the government should have a body of men on which they rely on to carry out administration is neither new nor necessarily efficient. The radical idea that people should be selected for these positions on merit and ability and that they should keep their positions if the government is changed are radical and leads to greater efficiency."
  #clinical_thermometer: "Clinical Thermometer"
  #clinical_thermometer_desc: "The mercury thermometer had been around since the mid 18th century. Its use for medical purposes were limited as they tended to be large (over a foot long) and could take over 20 minutes to measure someone's temperature. Now we have made the thermometer smaller and it only takes a few minutes to get a reading, making it truly useful for doctors."
  #commercial_banks: "Commercial Banks"
  #commercial_banks_desc: "Businesses need various financial services to operate normally. Payroll at the end of the month might require a short loan to cover a temporary shortfall. Expanding the business might likewise require borrowing, especially if the business is a limited liability company rather than a personal venture. Commercial banks offer financial services to these companies, as opposed to wealthy private individuals, middle-class savers or professional investors."
  #cooperatives: "Co-Operatives"
  #cooperatives_desc: "Intended as a mutually beneficial organization to help small businesses and workers buy basic necessities, a co-operative tends to be run democratically by its members to achieve social good rather than pure profit."
  #credit_unions: "Credit Unions"
  #credit_unions_desc: "Rather than being operated for the profit of an owner or shareholders, credit unions are a financial institution which tries to improve the welfare of its members through access to credit. They tend to be run democratically, with each member having a vote on the director of the credit union."
  #customs_tariffs: "Customs Tariffs"
  #customs_tariffs_desc: "Tariffs are a very important weapon in a government's arsenal. They can be used both to raise revenue and to 'guide' merchants and businesses into making choices beneficial to the national interest, as determined by the government. Tariffs can be charged on entry into a country, for the use of port facilities, or on the price of imported or exported goods. One important use for tariffs is in protecting native industries against more efficient foreign companies, which can give domestic firms time to catch up with their rivals abroad."
  #department_stores: "Department Stores"
  #department_stores_desc: "Having one large store that sells a huge variety of goods can be more convenient for customers and gives the retailer more buying-power over the distribution chains."
  #distribution_channels: "Distribution Channels"
  #distribution_channels_desc: "Companies can be structured to sell goods in a number of ways. Raw materials are generally sold to other industries; industries might then sell manufactured goods to wholesalers such as brokers; wholesalers then sell goods to retailers such as specific shops or chains of shops, and the retailer then sells the goods to the final customer. Innovations in this area include factory or outlet stores, which sell goods directly to customers from the factory complex, such as to workers and their families and community."
  #enclosure_acts: "Enclosure Acts"
  #enclosure_acts_desc: "Enclosure is the process of taking small strips of peasant land, passed down from father to son since the beginning of feudalism, and 'combining' them under one owner via Acts of Parliament. By merging these subsistence plots into enclosed fields, arable land can be turned into pasture, capital goods such as machinery can be invested in, and many small surpluses can be merged into a significant profit. Where the landless peasants go is up to them - am I my brother's keeper?"
  #espionage: "Espionage"
  #espionage_desc: "Know thy enemy. Knowledge of what is going on in places that could be hostile to us is vital if we are going to keep out country safe. This can be in the form of the mundane, like ensuring proper maps exist of areas we may end up being at war in to the significant like enemy forces and plans."
  #gold_standard: "Gold Standard"
  #hereditary_aristocracy_desc: "As a society becomes more productive enough food can be generated to allow people to specialize and do things that do not require you to farm. A military caste to protect yourself from hostile neighbors is a natural development and eventually they will entrench their position and hereditary aristocracy is born."
  #insurance: "Insurance"
  #insurance_desc: "Insurance against loss of property has existed for many hundreds of years, being especially important for merchant vessels traveling overseas. As global trade becomes more prevalent, the need for more secure maritime insurance increases. Lloyd's of London began as a specialist for maritime insurance but has expanded into other markets such as insuring properties against fire damage."
  #malthusianism: "Malthusianism"
  #malthusianism_desc: "Population is increasing much faster than our food supply. We must face the fact that if we allow this to continue we will face a catastrophe for our people. Further more we must face the face any such catastrophe will hurt the lower classes the most. The Tory ideal of paternalism is not good nor noble but instead will lead to a greater catastrophe on the least fortunate."
  #manifest_destiny: "Manifest Destiny"
  #manifest_destiny_desc: "If we are to spread our civilization to those less fortunate to have we must accept the fact that we have been uniquely blessed with virtues and institutions that others simply do not have. We have a mission to redeem the less fortunate by remaking them in our own image. It is no more that our destiny to do this."
  #oceanic_cablelaying: "Oceanic Cablelaying"
  #oceanic_cablelaying_desc: "With the technology of the telegraph, thought soon turned to how to lay a cable under bodies of water. Although it proved not technically difficult to lay cables of short stretches of water (like bays and straits), the wide oceans proved a greater challenge. Good news - after several false starts we have successfully mastered the techniques to lay such a cable so no longer must we rely on the good will of others."
  #ophthalmoscope: "Opthalmoscope"
  #ophthalmoscope_desc: "'every eye could be made luminous if the axis from a source of illumination directed towards a person's eye and the line of vision of the observer were coincident', this discovery revolutionized the treatment of eye problems. Creating a hand held device with a mirror that could shine the light, the ophthalmoscope, was made the doctor's life a lot easier."
  #positivism: "Positivism"
  #positivism_desc: "We we consider what knowledge is we know that there is certain knowledge. Information that comes from sensory experience and  then interpretation comes through logic and reason is the exclusive source of certain knowledge. We can extend this from the physical world to societies as a whole. Societies operate under general laws which if we took the time to analyze we would understand. Theology must be rejected because faith by its very nature denies reason and verification."
  #postal_banks: "Postal Banks"
  #postal_banks_desc: "Rural and otherwise isolated communities may not have access to a local bank branch. In such cases, a postal bank can operate to offer them financial services, such as savings and a current account, without the need to travel into a town or city."
  #savings_banks: "Savings Banks"
  #silver_standard: "Silver Standard"
  #vertical_filing_cabinet: "Vertical Filing Cabinet"
  #vertical_filing_cabinet_desc: "Gone but not forgotten"
 admiralty:0 "現代レーダー"
 admiralty_desc:0 "Admiralty は、コマンドの堅いチェーンによって接続されるランクの複雑なシステムで、より効率的に海軍の作業を支援します。"
 anaesthetics:0 "アネティックス"
 anaesthetics_desc:0 "麻酔薬は、手術中に使用される鎮静剤または鎮痛剤であり、患者が不適切な医療スタッフのナイフや侵襲的なプロディングを感じるのを防ぐことができます。"
 anarchism:0 "市場社会主義"
 anarchism_desc:0 "市場社会主義は、市場経済の枠組みの中での生産手段の社会的所有権を関与するタイプの経済システムです。 そのようなシステムのためのさまざまなモデルは、通常、協力的な企業を関与し、時には公共または民間企業を含むミックスが存在します。"
 aniline:0 "機械学習アルゴリズム"
 aniline_desc:0 "特にコンピュータによる計算または他の問題解決操作で従う規則のプロセスまたはセット。 消費者の欲求の評価のためにソーシャルメディア会社によって使用される。"
 anti_clericalism:0 "反臨床主義"
 anti_clericalism_desc:0 "パワーコルプトや宗教的な機関は、他の人よりも、この腐敗にこれ以上の免疫はありません。 彼らは大量に救済を提供すると主張するかもしれませんが、代わりに、自分の巣を羽ばせようとし、彼らは無価値を認める人々に権利を否定しようとします。 私たちは、私たちの公共の球から組織された宗教の影響を掃引し、非啓発に選択としてその物質を残す必要があります。"
 antibiotics:0 "がん治療"
 antibiotics_desc:0 "遺伝子の編集は、遺伝子をがんや他の病気に容認できないものにすることができます。"
 antiseptics:0 "防腐剤"
 antiseptics_desc:0 "科学は熱への暴露が細菌を破壊することを確立しました。 問題は、それが生きている組織に来るとき、これは有効な解決策ではないことです。 しかし、傷がパッドで覆われた実験がフェノールの溶液を浸したとき、ガングレインの事件は劇的に低下した。 アンチセプティックスの科学が誕生しました。"
 arc_welding:0 "インタープランタリ化"
 arc_welding_desc:0 "異なる惑星の植民地化"
 army_reserves:0 "食事、準備に食べる"
 army_reserves_desc:0 "食事 - 準備が整った (MRE) は、長い棚命のために設計された軍事的な配給です, 食品のオプションの高い多様性を持ちます."
 art_patronage:0 "芸術の Patronage"
 art_patronage_desc:0 "芸術は自由ではなく、あなたが興味と支援芸術を取るために富裕層を必要とする芸術や文化を開発する。 こうすることで、その周りの美しいものを持たせるための威信を得る。"
 art_silk:0 "人工的な生命"
 art_silk_desc:0 "合成ゲノムやまったく新しい、不自然な特性で生物を設計する生物を作成します。 合成ゲノムは、2010年にクレイグ・ヴェンターとチームによって作られた最初の合成バクテリアのような、ゼロから新しい生命の形態を作成するために使用されます。"
 artificial_fertilisers:0 "人工的な肥料"
 assembly_line:0 "組立ライン"
 assembly_line_desc:0 "建物の工程を合理化することで、各アクションが各アクションの直後に、より効率的な工場を作ることができます。"
 atmospheric_engine:0 "クリーンエネルギー"
 atmospheric_engine_desc:0 "風車のようなきれいなエネルギー生産方法は汚染を起こさないでエネルギーの生成を可能にします"
 automatic_bottle_blowers:0 "マイコアメディア"
 automatic_bottle_blowers_desc:0 "環境汚染物質の劣化に真菌を使用。 石油製品や工業用溶剤などの有害物質を破壊するために使用することができる。"
 battlefleet_tactics:0 "Spacefleet-Battlefleet 戦術"
 battlefleet_tactics_desc:0 "大きい戦闘艦隊を操作することは困難な仕事である場合もあります。 特定の戦術を艦隊として練習し、学ぶことによって、より大きい性能は達成することができます。"
 battleship_tech:0 "ガイド付き - ドローンデストライサー"
 battleship_tech_desc:0 "海の巨大な岩を吹くことができる超巨大戦闘船"
 bessemer_process:0 "ポリマー"
 bessemer_process_desc:0 "総合的な衣服及び生地は不幸のための共通の商品の大量生産を可能にします。"
 bessemer_steel:0 "Bessemerの鋼鉄"
 bessemer_steel_desc:0 "Bessemer プロセスは低温空気を溶かした豚の鉄に送風し、カーボン、ケイ素およびマンガンを燃やし、穏やかな鋼鉄を作成します。 これは、残酷剤で生産されるほど高品質ではありませんが、それは広く安く、より低い等級の鉄鉱石の使用を可能にし、鉄道線の量産を可能にし、コンクリートを強化する。"
 biological_determinism:0 "生物学的決定主義"
 biological_determinism_desc:0 "自然の中で遺伝学と相続の学習は、生物学によってどれだけの人間の行動が決定されるかについての質問を開きます。"
 feminism:0 "環境主義の経済学"
 feminism_desc:0 "環境主義または環境的権利は、生活、生息地、周囲の支持に関する幅広い哲学、病態学、社会的運動です。"
 blast_furnaces:0 "ブラスト炉"
 blast_furnaces_desc:0 "ブラスト炉は、鉱石の製錬などの冶金プロセスに余分な酸素を追加するために使用されます。, もともと手で - または水輪式ベローズ. これにより、炉は、オープンエア炉よりも高温に達し、不純物を燃焼させ、エキゾチックな金属を合金にすることができます。 ブラスト炉は豚の鉄の生産のために特に有用です、そしてより高度プロセスを使用して錬鉄か穏やかな鋼鉄に作ることができます。"
 bolt_action_rifles:0 "サイバーネティックス"
 bolt_action_rifles_desc:0 "自動兵士は、戦争の発生時に実際の命を救うことを意味しました。"
 chemical_bleaching:0 "パーソナルコンピュータ"
 chemical_bleaching_desc:0 "パーソナルコンピュータは1980年代半ばに出現し、Apple II、Macintosh、およびIBM PCのような製品で、個人や中小企業にコンピュータをアクセスできるようにしました。"
  # bone_china: "Bone China"
  # bone_china_desc: "Bone China is a form of porcelain which in part is made from bone ash, the greater strength of this type of porcelain makes it rather valuable."
 # artillery: "Artillery"	// There is already a loc key for this in Goods, require prefix to support unique localization
 artillery_desc:0 "自軍を危険にさらすことなく、重い銃器を刺激し、敵を攻撃するロングレンジの爆弾。 不正確で低迷、高価な、しかし、現代の軍隊の重要な成分。"
 breech_loading_artillery:0 "ロングランゲミサイルバッテリー"
 breech_loading_artillery_desc:0 "HIMARSのような長期ミサイル電池は外国の領域に遠くにターゲットの破壊を促進します。"
 tech_bureaucracy:0 "社会解放主義"
 tech_bureaucracy_desc:0 "社会的リベラリズムは、政府の強力な影響力と制御で自由市場を提唱するイデオロギーで、不幸を防止します。"
 centralization:0 "権威ある資本主義"
 centralization_desc:0 "州の資本主義、州が商業活動を実施するシステムに関連して、権威資本主義は、非公開の制限と市場力の機能を兼ね備えています。"
 camera:0 "スターリンク"
 camera_desc:0 "Starlinkは、アメリカの航空宇宙会社SpaceXの完全子会社である国際通信事業者であるStarlink Services, LLCによって運営されている衛星インターネットの星です"
 canals:0 "キャナル"
 canals_desc:0 "海岸および河川の包丁は商品を運ぶことの非常に有効な方法です。 国のインテリアに運河を掘ると、ロックシステムによって橋渡しする必要があるとき、それは高価な提案であることができますが、これらのバージのカバレッジを拡大します。"
 canneries:0 "超加工食品"
 canneries_desc:0 "超加工食品(UPF)は、工業プロセスの活用や、家庭の厨房では見られない成分の添加により、元の形態から著しく変化してきた食品です。"
 canning_jars:0 "缶詰ジャー"
 canning_jars_desc:0 "フランスの革命の軍隊は、供給の問題に対する革新的なソリューションを必要としていました。 ガラス瓶内の食品を調理し、病気のユーモアやミアスマがコンテンツと混合し、それによって配給を台無しにするのを防ぐための1つのソリューションでした。 モルテンワックスを瓶の口に注ぎ、外側の世界へのシールとして機能します。"
 canning_machines:0 "缶詰機械"
 canning_machines_desc:0 "早期缶詰食品生産の欠如自動化。 手で巻き、はんだ付け。 缶にブリキをすぐに変える機械の使用は標準を改善し、スループットを高めます。"
 carrier_tech:0 "レーザーボート"
 carrier_tech_desc:0 "Laserboatsは、ドローンの着脱を素早く排除する目的で高出力レーザーを成形する船舶です。"
 catalytic_contact_process:0 "触媒接触プロセス"
 catalytic_contact_process_desc:0 "1831年、英国の酢商人のペグリン・フィリップスは、触媒コンバーターとしてプラチナを使用して、より濃縮硫酸を製造するためのプロセスを発明しました。 灰ソーダや肥料の生産に特に有用ではありませんが、これはすぐに有機染料の生産にboonになりました。"
 chemical_isolation:0 "化学分離"
 chemical_isolation_desc:0 "化学薬品は蒸留、ろ過および蒸発のような多くの方法で、浄化することができます。 浄化プロセスの質は明らかに分離の質に影響を与えます。"
 chemical_synthesis:0 "化学合成"
 chemical_synthesis_desc:0 "犬の尿は、1828年にドイツの化学者Friedrich Wöhlerによって有名に合成されました。 有機化学と無機化学の境界線を膨らみ始め、より化学品が合成された新しい産業プロセスが開口します。"
 chemical_warfare:0 "AI-テロリズム"
 chemical_warfare_desc:0 "特定の化学の組み合わせは、人間がそれらにさらされるときに有害または致命的な効果をもたらす。 これにより、戦争に対する新たな恐ろしい側面が生まれます。"
 civilizing_mission:0 "CRISPR Gene 編集"
 civilizing_mission_desc:0 "CRISPRによるGene編集では、人間が新しい臓器を育てることを可能にします。"
 colonization:0 "超音波"
 colonization_desc:0 "臓器移植、MRIおよびCTスキャンによる医療画像処理、および個々の条件に対するより専門的かつ悪意のある治療を可能にする光学機械の20世紀の進歩"
 color_photography:0 "カラー撮影"
 color_photography_desc:0 "視線で光を捉え、フルカラーで写真を撮る初期技術。 異なるカラーフィルタで3枚の写真を効果的に撮ることで、元の色を再現する1枚の画像に組み合わせることができます。"
 combination_acts:0 "コンビネーション法"
 combination_acts_desc:0 "互いに秘密と誓う誓いで一緒に会うワーキング男性は、状態のセキュリティに対する脅威であり、明らかに根本的なジェイコブインが状態に戻すための手段です。 また、競合の重要な瞬間に働く男性による行動の脅威による外部の敵から自分自身を守る能力の脅威である可能性があります。 私たちは、共通の善のためにそのような行動を規制することを可能にする一連の法律を渡します。"
 combustion_engine:0 "ナノコーティング"
 combustion_engine_desc:0 "これらは腐食、摩耗および汚れに対してより抵抗力があるそれらを作るためにさまざまな表面に加えられます。 セルフクリーニング面や抗菌ナノコートは、医療、電子機器、建設用途向けに開発されています。"
 central_planning:0 "デジタル・ガバナンス"
 central_planning_desc:1 "政府がさまざまなセキュアなコンピュータシステムを介して実行できるようにします。"
 compound_microscopes:0 "複合顕微鏡"
 compound_microscopes_desc:0 "光学に使用されるレンズは、非常に微細なガラス製造技術を必要とします。 この分野の1つの革新は2つのレンズ、目的および第一レンズに焦点を合わせる1つ、拡大を高めるために焦点を合わせることです。 生きた細菌を見るために、このような顕微鏡を使用することができます。"
 compression_ignition:0 "廃棄物からのエネルギー"
 compression_ignition_desc:1 "埋め立ての廃棄物をエネルギーに変えることで、世界は高い電力量を生成できます。"
 concrete_dockyards:0 "人工的なテスト範囲"
 concrete_dockyards_desc:0 "AI内で発生する範囲のテスト"
 concrete_fortifications:0 "未来の要塞"
 concrete_fortifications_desc:0 "コンクリートを鍛造材に導入することで、強固なエントレンチ位置を素早く作れます。"
 condensed_milk:0 "凝縮ミルク"
 condensed_milk_desc:0 "経口的に、牛乳は、牛の哺乳類から押し出された後すぐに消費されなければなりません。 容器内の圧力を下げることにより、真空鍋、ミルクの含水率、凝縮ミルクは缶詰にし、販売することができます。"
 conspicuous_consumption:0 "目立たない消費"
 conspicuous_consumption_desc:0 "Wealth には、独自の威信があります。 富のディスプレイは、より権威あるものを作り、社会的なクラスを通して進歩し、ビジネスマンや政治家との接触など、社会的なクライマーの新しい機会を開くことができます。 物質主義社会では、豊かさと豊かさが根本的に助ける人はより豊かになります。"
 conveyors:0 "自動工場"
 conveyors_desc:0 "最新AIシステムを応用することで、人件費を使わずに商品を移動するプラットフォームを作ることができます。"
 cotton_gin:0 "現代の自動車"
 cotton_gin_desc:0 "自動車は、土地全体の人々と商品の迅速な輸送を可能にします。"
 crucible_steel:0 "可燃性鋼鉄"
 crucible_steel_desc:0 "粉末鉄と炭炭を含有する石屑に熱を加えることで、この高炭素合金は「ダマスカス鋼」と似ていると考え、インドとペルシャで1750年頃まで作成されます。 工具、ばね、その他の余分な硬質および高価な物品での使用に適した高グレードの鋼を製造します。"
 law_enforcement:0 "全身のラシズム"
 law_enforcement_desc:1 "全身のラシズムは、レースや民族のグループに基づいて、機関の差別の形態であり、社会全体や組織全体に存在する政策や慣行を含み、その結果、他の人の何人かの人々や不公平または有害な治療に継続的な不公平な利点をサポートすることができます。"
 defense_in_depth:0 "AI駆動型ターゲティング"
 defense_in_depth_desc:0 "複数の防衛線を作ることで、敵を拡散して減速し、時にはそれらを包み込むことができます。"
 democracy:0 "東ブロックの滝"
 democracy_desc:0 "1980年代後半から1990年代にかけては、東ヨーロッパにおけるコミュニズムの崩壊につながる一連のイベントが挙げられます。"
 distillation:0 "家電製品"
 distillation_desc:0 "アプライアンスには、オーブン、冷蔵庫、電子レンジ、ミキサー、ケトル、食品製造に使用されるその他の家庭用品の使用が含まれます。"
 divine_revelation:0 "ダイバインの変革"
 divine_revelation_desc:0 "すべての法律の基本は、聖なる聖書に由来しています。 強烈な力で社会を適切に注文し、安定性を保証することができます。"
 watertube_boiler:0 "ロボティクス"
 watertube_boiler_desc:0 "ロボットは、自動車業界において特に組立ラインに導入され、精度、スピード、安全を改善しました。"
 dreadnought_desc:0 "ドローンキャリアは、今日の航空機のキャリアと同様に、ドローンの群れを運び、敵上の攻撃を破壊しません。"
 dreadnought_tech:0 "ドローンキャリア"
 dynamite:0 "深海鉱山"
 dynamite_desc:0 "2000年代に先進的な深海採掘技術の開発は、企業が海底から価値ある鉱物(例えば、ポリメタリック・ノーズ、希土類金属)の抽出物を探求し始めたからです。"
 egalitarianism:0 "テロの戦争"
 egalitarianism_desc:0 "テロに関する戦争は、テロリズム(GWOT)のグローバル・ウォーを正式に、[3]は、2001年9月11日以降、米国が主導する世界的な軍事キャンペーンです。"
 electric_arc_process:0 "ネラリンク"
 electric_arc_process_desc:0 "NeuralinkやSynchronなどの企業は、脳とデジタルデバイス間の直接通信を可能にする脳コンピュータインタフェースを開発しています。 これらのインターフェイスは、麻痺の回復運動を支援し、認知能力を強化し、技術と相互作用するための新しい方法を提供するなど、医療処置を革命化することができます。"
 electric_railway:0 "マス公共交通"
 electric_railway_desc:0 "街間の公共の交通機関は、不測の車で、"
 electrical_generation:0 "Quantumコンピューティング"
 electrical_generation_desc:0 "Quantumコンピュータは、現在、伝統的なコンピュータに有利である複雑な問題に活用されることが期待されます。例えば、薬物発見、材料科学シミュレーション、高度な暗号化、天気予報、金融モデリング、人工知能開発、および物流やエネルギー生産などの分野における最適化の問題、主に大量のデータを処理する能力を活用し、量子のスーパーポジションとエンゲージを介して同時に多くの変数の問題を解決することができます。"
 elevator:0 "関連するPod"
 elevator_desc:0 "交通ポッド、エレベーターに似ています。高速で移動できます。"
 empiricism:0 "ワールドワイドウェブ"
 empiricism_desc:0 "ワールドワイドウェブ(WWWまたは単にWeb)は、ITスペシャリストやホビエストを超えてユーザーにアピールするためのユーザーフレンドリーな方法で、インターネット上でコンテンツ共有を可能にする情報システムです。"
 enlightenment_thought:0 "啓発思考"
 enlightenment_thought_desc:0 "理由の時代には、老犬が疑問に答え始めた。 「神はそれだろう」と認めなくなり、その力は社会で自分の立場を正当化し始めた。 絶対的なモナークでさえ、これらの新しいアイデアの威信を見ました。そして、欧州の教育的、法的および経済システムを「啓発されたデスポット」が改革しました。 これらの改革は、ジョン・ロック、ヴォルテール、ジャン=ジャックス・ルーソー、トーマス・ペインチェなど、十分ではなかったが、アメリカやフランスで革命を起こし、世界中にリベラルスを刺激したという設立に対する攻撃を主導しました。"
 fascism:0 "ファシシズム"
 fascism_desc:0 "ファシズムは、政府が社会のあらゆる側面を厳しく制御している政治システムです。"
 field_works:0 "HESCOの障壁"
 field_works_desc:0 "HESCOの障壁は砂袋より速く建てられ、より多くの保護を提供できます。"
 film:0 "直接プロパガンダ"
 film_desc:0 "脳インプラントを使用して、プロパガンダは直接私たちの人口に投入することができます"
 flash_freezing:0 "ポータブル凍結乾燥機"
 flash_freezing_desc:0 "民間人の使用のためのポータブル凍結乾燥機"
 floating_harbor:0 "人工島"
 floating_harbor_desc:0 "人工島は人造の土地で、通常軍隊の手段のために作成されます"
 food_sterilisation:0 "食品殺菌"
 food_sterilisation_desc:0 "試行錯誤によって、ビジネスマンは、殺菌のミルクの加熱や濃厚なシロップへの凝縮、果物や野菜の漬け物、肉やスープの缶詰などの食品を節約する方法を発見しました。 これらすべての技術の共通糸は、保存された食品から細菌の除去であり、顕微鏡の細菌の発見まで完全に理解されていない概念です。 これらのアイデアを広く理解することで、食品業界における規格が改善され、この公衆衛生が認められています。"
 four_field_crop_rotation:0 "四フィールドクロップ回転"
 four_field_crop_rotation_desc:0 "有名な土地所有者チャールズ「Turnip' Townsend」によって露出, などの窒素フィックスターの使用, ターンピーやクローバーなど, ファームランドは、排出されるか、落下を残さずに、一定の使用を維持することができます."
 fractional_distillation:0 "GMOス"
 fractional_distillation_desc:0 "遺伝子組み換え組織(GMO)は、植物や動物が成長し、食品生産の目的のために表示される方法を変更する人造の方法です。"
 fruit_jars:0 "フルーツジャー"
 fruit_jars_desc:0 "金属の缶内の肉とスープの保存の考え方は人気で得ています。 果物や野菜を漬物に保存したり、ジャムに茹でるなど、他の種類の食品保存も普及しています。"
 fulminates:0 "フラミン酸塩"
 fulminates_desc:0 "シャープに打たれたときの素晴らしな素材です。 そのような材料は水銀、銀およびカリウムのイオンを含んでいます。 1800年にエドワード・チャールズ・ハワードが最初に発見され、パーカッション・キャップ・システムにおける軍用アプリケーションはすぐに明らかになりました。"
 functionalism:0 "機能主義"
 functionalism_desc:0 "社会的機能によって定義される構成要素のシステムとして理論的枠組みの視聴社会。 メタファーとして機械的および生物学的システムを使用して、社会の構造とその安定性を決定するための相互依存性を見ます。"
 gantry_cranes:0 "ヘビークレーン"
 gantry_cranes_desc:0 "建設と輸送に便利な大型クレーンは、船の幅をトレースするのに十分です。 これは、彼らが船を運ぶことができる最も重い負荷を持ち上げることができることを意味し、それらに頑丈を与えます。"
 general_staff:0 "ドローン"
 general_staff_desc:0 "ドローンは、軍と民間のアプリケーションに使用できる無人航空機です"
 germ_theory:0 "ガーム理論"
 germ_theory_desc:0 "Thucydidesは、病気が人から他人に広める可能性があると述べる最初の人でした。そして、古代の時代から、私たちはmiasmasがコレラのような病気の原因だったと考えました。 しかし、科学は、細菌と呼ばれる微生物が病気に責任を負います。"
 gunpowder:0 "ガンパウダー"
 gunpowder_desc:0 "硫黄、木炭および硝酸塩、Gunpowder で構成される化学混合物は管を延ばすことができるガスに急速に、拡大します。 燃焼は、戦場の汚れたブラインドビジネスをmusketryする硫黄や炭から大量の煙の背後にある。 ガンプウダーの料金は、鉱業や建設のために地球を開放するためにより市民的な用途を持っています。 中国の発明された銃粉は千年前に、祝祭とふるまいのためのそれを使用しました。"
 gunsmithing:0 "アサルト・ライフル"
 gunsmithing_desc:0 "攻撃リフレは、SMGの火力とライフルの精度を組み合わせ、強力な小さなアームプラットフォームを作成します。"
 gymnastics:0 "ジムナスティックス"
 gymnastics_desc:0 "Spartans Gymnasticsは、軍のリクルートのトレーニングの一部を形成し、1570年代以降、単語自体は運動の練習を参照しています。 今では、スパルタンが何かに入ったことを実感していますが、私たちが体を解体しなければならないという考え方を解くために。 教育先駆者は、さまざまな装置で男の子のための一連の演習を開発しました。 一部のラジカルは、これらの演習を少女に拡張することを提案しています。"
 gyroscopes:0 "ジャイロスコープ"
 gyroscopes_desc:0 "ジャイロスコープは、単純に回転する一連のジンバルを組み合わせて作られています。 1つのジンバルは縦にそして別の横に回ります、従って最も支持される目的はあらゆる方向で自由に回ることができます。 ジャイロスコープは、トーシングシップの磁気コンパスなど、周囲が移動している間、オブジェクトを着実に保つのに便利です。"
 handcranked_machine_gun:0 "アンチドローンシステム"
 handcranked_machine_gun_desc:0 "安価なドローンを撮影するために設計された防衛システム。"
 hydraulic_cranes:0 "ヘリコプターキャリア"
 hydraulic_cranes_desc:0 "ヘリコプターのキャリアは、軍を物流的にサポートすることができます"
 hydraulic_power:0 "油圧力"
 hydraulic_power_desc:0 "穀物を製粉するために水車輪が長い間使用されていました。 動力を与えられた機械のような他の産業使用にそれらを合わせることは、論理的なステップ前進です。"
 hypodermic_syringes:0 "低刺激性シンリンジ"
 hypodermic_syringes_desc:0 "創薬は、もともと皮膚を開き、創傷の病状物質をこすことによって患者に与えられました。 中空針を使用して患者に液体を注入するという考え方は明らかにより衛生的であり、医師によって管理されるべき正確な容積を可能にする利点もあります。 初期のシリンジはシルバーから作られていますが、製造工程がより洗練されたためガラスが人気になってきています。"
 idealism:0 "理想主義"
 idealism_desc:0 "私たちの知識が私たちが物事を知覚する方法に依存していることを保持する哲学の数, それが実際にあることではなく、物事のアイデアを知るために私たちを制限."
 identification_documents:0 "デジタル識別"
 identification_documents_desc:0 "デジタル識別は、オンラインサービスにアクセスし、購入を行い、他の人とやり取りすることを可能にする人の電子表現です。"
 impressionism:0 "印象主義"
 impressionism_desc:0 "シーンの一般的な視覚感覚を再現する技術に焦点を当てたアートスタイル。 状況の感触と経験を再現するのと同じ芸術的な雰囲気も、視覚を超えたアートフォームに応用されました。"
 improved_fertilizer:0 "マイクロカプセル化"
 improved_fertilizer_desc:0 "Microencapsulationは保護コーティングのビタミン、味およびprobioticsのような活動的な原料を囲うことを含みます。 この技術は、栄養デリバリー、棚ライフ、そして敏感な成分の安定性を向上させるために、機能性食品に広く使用され、飼料や飲料を含む食品生産の新しい可能性を提供します。"
 international_trade:0 "ネオリベラリズム"
 international_trade_desc:0 "Neoliberalismは、ライザフェールの経済政策を提唱していないため、リベラリズムとは異なるが、高度に建設主義者であり、社会のあらゆる側面で市場のような改革をもたらす強力な状態を提唱しています。"
 ironclad_tech:0 "21世紀戦艦"
 ironclad_tech_desc:0 "21世紀の戦闘船は、巨大なミサイル爆弾に耐えることができます。"
 jeune_ecole:0 "リトタルコンバット船"
 jeune_ecole_desc:0 "無人船は、海で本質的にドローンである船です。 また、少数の大きな船ではなく、多くの小型船を持つことで、そうでなければ不可能であろう一定の操縦性を保つことができます。"
 labor_movement:0 "スマートフォン"
 labor_movement_desc:0 "スマートフォンは、しばしば単に電話と呼ばれる、従来の携帯電話の機能と高度なコンピューティング機能を組み合わせたモバイルデバイスです。"
 land_reform:0 "土地改革"
 land_reform_desc:0 "土地の所有権と社会が手に入ります。 土地は、任意の国で第一次ソースと富と地位であり、したがって、土地を所有するために取得し、富と状態を持っている人です。 土地を所有する人々を根本的に変えるために、私たちが望む社会を作りたいなら。"
 lathe:0 "生産ライン"
 lathe_desc:0 "生産ラインは、生産の合理化を可能にする、割り当てられたタスクを持つ労働者の組み立てです。"
 lathes:0 "ラテス"
 lathes_desc:0 "旋盤は、ツールが動作している材料を回転させるツールです。ドリルとは対照的に、材料に対して回転する。 素材を対称ファッションで焼く。 職人のキャンドルホルダーから造形品のボーリングに至るまで、多くの産業に応用されています。 初期の旋盤は、業界の範囲に応じて、手、馬、または水輪によって供給されます。"
 laws_of_physics:0 "物理学の法則"
 laws_of_physics_desc:0 "運動中の体を支配する基本法は、望遠鏡の使用により容易に観察することができます。 サイ・イサック・ニュートンは、ヨハネス・ケプラーによる既存の科学予測への高い品質反射望遠鏡と厳しい応用の彼の技術のおかげで、この分野で先駆者でした。"
 crystal_glass:0 "マイクロプロセッサ"
 crystal_glass_desc:0 "マイクロプロセッサは、コンピュータがより小さく、より速く、より手頃な価格になることを可能にする、現代のコンピューティングの心臓です。 パーソナルコンピュータの開発と技術の急速な進化につながっています。"
 automatic_machine_guns:0 "自動タレット"
 automatic_machine_guns_desc:0 "敵のターゲットに自動的にロックできる高度な固定タレット。"
 malaria_prevention:0 "STEMセル"
 malaria_prevention_desc:0 "空間の極端な条件のために、アストロノウツは、特に宇宙放射線、マイクログラビティ、心理的ストレスが人間の免疫システムを妥協する傾向があると与えられた感染に脆弱です"
 manufacturies:0 "製造業"
 manufacturies_desc:0 "ギルドは、方法と雇用慣行を管理し、労働力への参入を制限し、高度に熟練した認定された(自然にギルドによって)職人だけが特定のタスクを実行し、要求するビジネスを使用することができます。 産業家は都市を去り、革新の新しい場所を創設しましたり、ギルドのマスターの厳密な標準そして高い賃金から放します。"
 mass_communication:0 "携帯電話"
 mass_communication_desc:0 "マスコミュニケーションは、携帯電話などの技術を活用した情報発信が容易です。"
 mass_propaganda:0 "オート教育"
 mass_propaganda_desc:0 "チップインプラントでは、世界の全ての情報は、各国の子どもたちに直接送信することができます。"
 mass_surveillance:0 "集団直接民主主義"
 mass_surveillance_desc:0 "あらゆる市民がいつでも、脳に植えられたマイクロチップを通して投票できるようにします。"
 mechanized_farming:0 "インタープレーナリーベース"
 mechanized_farming_desc:0 "他の惑星の基盤"
 mechanized_workshops:0 "スマートテクノロジー"
 mechanized_workshops_desc:0 "スマートテクノロジーは、コンピュータによって伝統的に制御されていない技術ですが、今ではあります。"
 military:0 "軍隊"
 military_aviation:0 "軌道ストライク"
 military_aviation_desc:0 "軌道のストライキは、地球上のターゲットで高出力の投影を発射するように設計された衛星です。"
 mobile_armor:0 "メニュー"
 mobile_armor_desc:0 "マルチパワープラットフォーム(MFP)は、タンクと同様の大型車両で、自動運転を行なうための最新の技術が搭載されています。"
 modern_nursing:0 "ステルス航空機"
 modern_nursing_desc:0 "ステルス航空機は、より低いレーダーの署名を持つように設計された平面です。"
 modern_sewerage:0 "暗号通貨"
 modern_sewerage_desc:0 "暗号通貨、暗号通貨、または暗号通貨は、政府や銀行などの中央機関に依存しないコンピュータネットワークを介して動作するように設計されたデジタル通貨です。"
 currency_standards:0 "オンライン取引"
 currency_standards_desc:0 "オンラインショッピングは、消費者がウェブブラウザやモバイルアプリを使用してインターネット上の売り手から直接商品やサービスを購入することを可能にする電子商取引の一種です。"
 monitor_tech:0 "AIの容器"
 monitor_tech_desc:0 "人工知能によって完全に制御される船。"
 musical_instruments:0 "音楽楽器"
 musical_instruments_desc:0 "音楽は、あらゆる文化や芸術の発展の重要な部分です。 楽器の進化に関して、文化は、まず将来の文化的発展に大きな影響を与える。"
 napoleonic_warfare:0 "プロキシ戦争"
 napoleonic_warfare_desc:0 "プロキシの競合は、互いに2つの反対の力の影響のために求められている戦争です。"
 nationalism:0 "テロリズム"
 nationalism_desc:0 "私は誰ですか? 人のアイデンティティの心に動く重要な質問です。 過去の人々は、そのアイデンティティの表現として、州、町、または家族からいると述べています。 新しいアイデアは、これらの概念を継承し、国家間で共有されているものとしてアイデンティティを見ることで発展しました。 さらに、国は一つの国に統一されるべきです。"
 natural_selection:0 "ナチュラルセレクション"
 natural_selection_desc:0 "自然な選択は、未来の世代に、その特性を渡すことで、ライフフォームが進化する仕組みです。 その発見は、種が自分の環境に応じて上昇し、適応する方法の説明を提供します。"
 naval_theory:0 "海軍の理論"
 naval_theory_desc:0 "海軍の動きにいくつかの戦略を適用することで、より効果的な海軍を作ることができます。"
 drydocks:0 "現代造船所"
 drydocks_desc:0 "乾燥地に船を積み込むことができる密閉されたエリアを作ることで、貨物船や艦船の保守が容易でより徹底的に確保できます。"
 navigation:0 "近代造船"
 navigation_desc:0 "星から地図まで、さまざまな異なる方法で、世界中にコースを正しくチャートにすることができます。"
 neoclassicism:0 "ネオクラシックス"
 neoclassicism_desc:0 "1750年頃から1820年にかけて伸びる芸術、演劇、音楽の古典的時代は、ネオクラシカルにラベルを貼り、革新を続けてきました。 クラシック・アンティキティにも名を馳せ、西のハイカルチャーをローマとギリシャに比較し、ヨーロッパのルーリングクラスのペディグを知られた世界のマスターとして確立しました。"
 nitrogen_fixation:0 "アンドロイドマイニング"
 nitrogen_fixation_desc:0 "Astroidマイニングは宇宙飛行士のリソースのコレクションです"
 nitroglycerin:0 "現代のパイプライン"
 nitroglycerin_desc:0 "近代的なパイプラインは、石炭、石油、LNG(液化天然ガス)などの液体の輸送を広大な距離で実現します。"
 open_hearth_furnace:0 "オープン炉"
 open_hearth_furnace_desc:0 "鋼の生産は、豚の鉄から除去不純物を伴って、その後、あなたが後にいる鋼の等級を作成するために他の材料に追加します。 鋼鉄を作り出すためには高温を要求し、炉からの開いた炉炉炉は熱煉瓦に廃物のガスを使用し、燃料および空気の流れは炉の熱を造り上げるためにこれらの煉瓦を渡ります。 プロセスは他のものよりも遅くなりますが、大量の鋼を単一のバッチで生産できるように制御およびスケールが容易です。"
 open_hearth_process:0 "早期3D印刷"
 open_hearth_process_desc:0 "1980年代に3Dプリンティングが始まり、2000年代は本格生産に進出しました。 航空宇宙、自動車、医療機器などの産業において、材料の層別層構造を可能にした技術。"
 opium_dens:0 "オピウムデンズ"
 opium_dens_desc:0 "「オピオムデン」は、オピオムが購入・喫煙できる場所です。 しかし、これらのデンがより罪人であるという心配があり、道徳的な腐敗の源です。"
 paddle_steamer:0 "バリスティックス"
 paddle_steamer_desc:0 "ミサイルは、それが常にある場所を知っている。 どこから、それがない場所、またはその場所から、それがどこにいないか、それがどこからなのか、それがどこからでも、それが大きいのか、それが違い、または偏差を得るので、それが知っているので、これは知っています。"
 pan-nationalism:0 "Pan-nationalism"
 pan-nationalism_desc:0 "Through organizations like the EU, de-facto super-states can be formed through trade & economic relations."
 percussion_cap:0 "ヘビーアサルトライフル"
 percussion_cap_desc:0 "SCAR-Lのような重いライフルは、特別な操作のための十分な火力を提供します。"
 percussion_caps:0 "パーカッションキャップ"
 percussion_caps_desc:0 "パーカッションキャップは、以前に信頼できない防火器をとり、どんな天候でも防火することを可能にします。"
 personal_liberty:0 "個人的な自由"
 personal_liberty_desc:0 "社会の統治に関する質問に加えて、ガバナンスを超えたべきことの質問もあります。 過半数のチラニーが本質的な理想の重要な部分ではないかもしれない個々の自由を確立する。"
 social_media:0 "ソーシャルメディア"
 social_media_desc:0 "ソーシャルメディアは、ユーザーが仮想コミュニティやネットワークを通じて情報、アイデア、コンテンツを共有することを可能にする技術の集約です。"
 policing_by_consent:0 "一貫したこだわり"
 policing_by_consent_desc:0 "サー・ロバート・ピーエルは、ホーム・事務局長を務めながら、首都の警察を創設しました。彼らは、兵士が政治敵を抑圧するのではなく、公共の利益で演じている市民であるため、大陸の亡命者とは対照的です。"
 political_agitation:0 "デジタル革命"
 political_agitation_desc:0 "インターネットアクティビズムは、大きな革命や歴史的出来事を乗り越える力を持っています。"
 political_theory:0 "政治理論"
 political_theory_desc:0 "国を運営する方法は、多くの人が尋ね始めた質問であり、いくつかの理論は、州の最高の青写真が何であるかについて正確に描画されています。"
 popular_sovereignty:0 "人気 sovereignty"
 popular_sovereignty_desc:0 "国家の権限と政府の拡張によってのみ、その人の同意を通じて作成し、維持することができます。 無料の政府では、定規は、司令者であり、その優れた人々とその支持者です。"
 portland_cement:0 "ポートランドセメント"
 portland_cement_desc:0 "だから、ドーセット、イングランドの島から採取された石への再建のために命名され、このセメントは、大規模な構造を構築するために使用されるコンクリートで効果的なコンポーネントです。 それは石灰岩および他の共通材料から作り出されます、非常に安いです。"
 potash:0 "ポテトチップス"
 potash_desc:0 "木を焼くことによって生成され、灰を水の鍋に堆積させ、カボッシュは、ガラス、石鹸、ライ麦、ガンパウダー、肥料の生産などの化学プロセスで使用されます。 これらのプロセスの有効成分である要素カリウムにその名前を貸します。"
 power_looms:0 "パワーローム"
 power_looms_desc:0 "織機は、ウール、コットンなどの繊維を織る装置です。 初期の織機は、手や足の力を使って糸を紡ぐ。 1733年に発明された「フライングシャトル」は、産業革命を浄化し、織機の機械的電力の使用により、熟練したウェーバーが大量に布を生成することができます。 追加のイノベーションには、1804年に開発されたプログラム可能なパンチカードのシステムであるJacquard loomが組み込まれています。"
 power_of_the_purse:0 "パワープロジェクション"
 power_of_the_purse_desc:0 "パワープロジェクションは、船を他の国に侵入させ、船の侵入を促します。"
 pre_modern_warfare:0 "プレモーダーン・ウォーファーレ"
 pre_modern_warfare_desc:0 "現代の戦争の危機と比較して、Yesteryearの光の競合は、彼らはまだ自分の権利で血行の仕事をしていた。"
 production:0 "生産工程"
 propaganda:0 "プロパガンダ"
 propaganda_desc:0 "革命とナポレオニック戦争の間、ヨーロッパの政府は、共通の人々に直面したハードシップのための公的なサポートを飾るために宣伝翼を確立しました。 政治のパンフレットやサティカルな漫画が都市に配布されましたが、パトリオティックの詩は人気の曲に歌われるように書かれていました。"
 puddling_furnaces:0 "プディング炉"
 puddling_furnaces_desc:0 "豚の鉄から錬鉄を作り出すのにカビの炉が使用されています。 レンガ炉は、鉄が空気と接触し、二酸化炭素を形成し、硫黄と他の不純物が表面に上昇するより軽いラグによって運ばれる間、鉄の過剰なカーボンが空気と接触するために、機械的に働いた後、結合シリンダーと溶融するので加熱されます。 手作業で2時間作業した後は、錬鉄の「玉玉」の形態で、残りのスラグから取り外すことができます。 難しく、熟練しており、高価な仕事をしています。"
 quinine:0 "mRNAワクチン"
 quinine_desc:0 "mRNAワクチンは、免疫反応を出すために、メスセンジャーRNA(mRNA)と呼ばれる分子のコピーを使用するワクチンの一種です。"
 radio:0 "インタープレーンコミュニケーション"
 radio_desc:0 "目に見えない「波」を使うことで、ラジオよりも大きい距離で情報を渡すことができます。"
 railways:0 "高速鉄道"
 railways_desc:0 "最近の技術は、商品や人々の超高速輸送を可能にする"
 rationalism:0 "文化革命"
 rationalism_desc:0 "1960年代の文化的革命は、世界の社会的な態度の変化に拍手しました。"
 realism:0 "デジタル カメラ"
 realism_desc:0 "ジカムとも呼ばれるデジタルカメラは、デジタルメモリの写真をキャプチャするカメラです。"
 reinforced_concrete:0 "ログイン"
 reinforced_concrete_desc:0 "ビル情報モデリング(BIM)は、2000年代に広く普及した採用を得て、建物の物理的および機能的特性のデジタル表現です。 この3Dモデリング技術は、より効率的な計画、設計、施工を可能にしました。"
 repeaters:0 "レーザー"
 repeaters_desc:0 "レーザーは、戦闘の目的のために一定の方向にエネルギーの濃度を可能にします"
 rifling:0 "軽量コンバットライフル"
 rifling_desc:0 "最新の軽量戦闘ライフルは、私たちの国が最も効率的な消防力で私たちの兵士を装備することができます。"
 romanticism:0 "ビデオカセットレコーダー"
 romanticism_desc:0 "Videocassetteレコーダー(VCR)またはビデオレコーダーは、放送テレビや他のAVソースからアナログオーディオとアナログビデオを記録し、巻き戻した後録画を再生することができる電気機械装置です"
 rotary_valve_engine:0 "人工知能"
 rotary_valve_engine_desc:0 "モノを量産するAIの活用"
 rubber_recycling:0 "ゴムリサイクル"
 rubber_recycling_desc:0 "古き良きゴムを巻き上げ、改良する「マジテーター」の使用により、この貴重な素材をリサイクル・再利用することができます。"
 rubberised_fabrics:0 "ゴム加工織物"
 rubberised_fabrics_desc:0 "天然ゴムを使用して、2つの布地を一緒に接着したり、植物繊維を一種の人工皮革に結合したり、マキントッシュコートなどの防水品やスモーダなどの伸縮性のある服を生成します。"
 rule_of_law:0 "法律のルール"
 rule_of_law_desc:0 "通常、法律の規則は、州の暴力が予測可能であるなど、管轄裁判所の関連したアイデアのグループで構成され、政府は、違法と犯罪に対する罰が何であるかを明確に設定することにより、政府は、その州の暴力が予測可能であるというような、およびそれゆえに、犯罪に対する罰が起こるかを明らかにし、それ自体が強制執行する法律の対象となると述べている。"
 screw_frigate:0 "ガイド付きミサイル破壊者"
 screw_frigate_desc:0 "ガイドされたミサイルの破壊者は、フリートの存在を知る前にミサイルを使用してターゲットを打つ"
 sea_lane_strategies:0 "将来の海軍戦略"
 sea_lane_strategies_desc:0 "将来の海軍戦略は、AIを中心に展開する可能性が高い。"
 semaphore_signalling:0 "セマフォア信号"
 semaphore_signalling_desc:0 "鉄道信号は、鉄道線上でアクティブに訓練するための指示を伝えます, 機関車が動いて、駅の人員から離れた場合でも、直接のトラフィックを支援. ナポレオンの軍隊が利用する軍事信号システムに触発されたセマフォア信号の使用は、すべての鉄道が使用できる均一なシステムを作成します。"
 separation_of_powers:0 "パワーの分離"
 separation_of_powers_desc:0 "腐敗や虐待を防止するために、別の役割を監督し、政府の異なる役割を持つ別の枝のアイデアは、「偉大なアメリカの実験」の相対的な成功以来、広く普及しています。彼女の憲法は、政府を役員、法定および司法の枝に分割しました。"
 sericulture:0 "セリカルチャー"
 sericulture_desc:0 "絹の製造のために絹を耕作する古代と密接に守られた技術。"
 sewage_systems:0 "下水道システム"
 sewage_systems_desc:0 "街の成長は、下水で刻まれた川につながる, 彼らは黒と死のような匂いを回しました. 市からこれらの葉水を運ぶために下水道システムを構築する古代に戻ってみる時間。"
 shaft_mining:0 "鉱山機械"
 shaft_mining_desc:0 "大型機械の展開を通じて、天然資源の産生のために世界市場で競争することができます。"
 shell_gun:0 "反応鎧"
 shell_gun_desc:0 "主戦車(MBT)は、戦車や普遍的なタンクとしても知られており、単にタンクは、武装保護直火と操縦者の多くの近代兵器の役割を埋めるタンクです。"
 slag_fertilisers:0 "スラグ肥料"
 slag_fertilisers_desc:0 "ブラスト炉やスチールコンバーターからの廃棄物のpH値が低いため、農業目的の土壌に優れています。 アリケートライムスラグは、天然石やドロマイトよりも溶性が高く、土壌のリン酸含有量が増加します。"
 socialism:0 "右翼ポプリズム"
 socialism_desc:0 "右翼のポピュリズム, また、国家のポピュリズムと右ポピュリズムと呼ばれます, 右の翼政治とポピュリズムとテーマを組み合わせる政治学です"
 society:0 "社会招聘"
 enclosure:0 "効率的な農業"
 enclosure_desc:0 "大量に農業を営むことで、政府規制制度の援助により、世界市場で競争するのに十分な出力を増加させることができます。"
 intensive_agriculture:0 "殺虫剤"
 intensive_agriculture_desc:0 "昆虫や細菌を除去する食品生産で使用される化学物質。"
 steam_donkey:0 "持続可能な製造"
 steam_donkey_desc:0 "環境への影響の意識を高め、メーカーはより持続可能な生産方法を採用し始めました。"
 threshing_machine:0 "商業Spaceflight"
 threshing_machine_desc:0 "太陽のパンネル、原子力プラント、風車の効力を増加"
 steel_frame_buildings:0 "ホログラム"
 steel_frame_buildings_desc:0 "ホログラフィーは、波面を録音して再構築できる技術です。 3次元画像を生成する方法として最もよく知られており、データストレージ、マイクロコピー、インターフェメトリーなど、さまざまな用途があります。 原則、あらゆるタイプの波のホログラムを作ることは可能です。"
 steel_railway_cars:0 "電気自動車"
 steel_railway_cars_desc:0 "2000年代に加速する自動車の研究開発 米国の防衛省が主催するDARPAグランドチャレンジ(2004年と2005年)は、主要なマイルストーンで、自己運転車を早期に試みる。"
 stormtroopers:0 "スペシャリスト"
 stormtroopers_desc:0 "AIの破壊やユニットの捕獲のために特に訓練され、装備されている人間の軍隊を持つ。"
 streamliners:0 "ストリームライナー"
 streamliners_desc:0 "現代的なトラクション力と新しいアルミニウムボディ構造を活かした新しい列車設計により、鉄道はより高速で確実に列車を実行することができます。"
 submarine:0 "将来の潜水艦"
 submarine_desc:0 "未来の潜水艦は未来の技術によって運転され、それは壊滅的な殴打を可能にします。"
 multilateral_alliances:1 "クリオニクス"
 multilateral_alliances_desc:0 "ryonicsは、非常に低温でそれらを凍結することによって合法的に死んでいる個人を予約する習慣であり、将来の医療技術はそれらを復活させ、死を引き起こした状態を治すことができる可能性があることを願っています。"
 synthetic_dye:0 "合成染料"
 synthetic_dye_desc:0 "これは、合成方法で染料の異なる種類を作成した化学プロセスを組み込まれています。 生地の着色に革命を起こし、農産物に高価な農業染料の生産に終わる。"
 system_gin:0 "自動車"
 system_gin_desc:0 "自動車は、土地全体の人々と商品の迅速な輸送を可能にします。"
 telegraph:0 "テレグラフ"
 telegraph_desc:0 "モースコードなど、ほぼ瞬時に信号を下すために電気を使用することができます。 遅延のチーフソースは、人間オペレータで、コードによく訓練され、不足分と長い「点」と「ダッシュ」の形で転送されたメッセージをデコードする必要があります。"
 telephone:0 "スマートシティ"
 telephone_desc:0 "IoTデバイスを都市インフラに統合することで、都市は、水、電力、トラフィック、廃棄物などのリソースをリアルタイムで監視し、効率と持続可能性を向上させることができます。"
 telephones:0 "電話番号"
 telephones_desc:0 "理論的には、話している電信の考え方は可能かもしれないと知ったが、私たちは確かにそうではありませんでした。 電子分野の進歩は、この考えを最終的に可能にし、電話は生まれました。"
 tin_cans:0 "缶缶缶"
 tin_cans_desc:0 "缶詰の食品の概念は、フランスの革命の軍隊によって使用されるガラス瓶に戻ります。 すぐに、民俗的な使用に広がるアイデア。 金属内で調理された肉やスープは、外の世界への暴露から保護され、中流家庭でレジャーで消費することができます。 錫版から派生する名前は、鉄や鋼板の外側に薄い層があり、開いた空気の錆から金属を保護する。"
 trench_works:0 "レコンタンク"
 trench_works_desc:0 "衝撃波および妨害の敵の軍隊を送るのに使用される装置"
 triage:0 "VTOL 航空機"
 triage_desc:0 "縦型離陸機と着陸機(VTOL)は、滑走路を必要としずに垂直に降りて着陸できる航空機の一種です"
 urban_planning:0 "フィアット通貨"
 urban_planning_desc:0 "フィアット通貨は金で返されていない金銭用品です。"
 urbanization:0 "国際機関"
 urbanization_desc:0 "国連などの国際機関は、平和を維持し、世界の経済成長を促進することを目指しています。"
 vaccination:0 "予防接種"
 vaccination_desc:0 "何世紀にもわたって、病気の脆弱な形態が知られていたが、非常に危険だったことを望んでいた人々を誘発しました。 ワクチン接種は、危険なものではなく、関連性疾患または病気の薬を治療することによって、感染する能力を失いました。はるかに安全であり、はるかに信頼性が高くなります。"
 vacuum_canning:0 "リーン製造"
 vacuum_canning_desc:0 "1990年代に誕生した「リーン製造」は、廃棄物の削減と生産システムの効率化に重点を置いています。 付加価値のない活動を排除し、品質を向上させ、顧客の満足度を高めることで、プロセスの継続的な改善を強調します。"
 vulcanization:0 "自動ドローン"
 vulcanization_desc:0 "デリバリードローンは、実験段階を超えて進んでおり、AmazonやWingテストの商用ドローン配信システムのような企業で、都市や農村地域で荷物を迅速かつ効率的に移動することができます。"
 wargaming:0 "戦闘シミュレーション"
 wargaming_desc:0 "想像力のある戦場シナリオをモックアップし、戦略を実践することで、役員の戦闘能力を向上させることができます。"
 water_treatment:0 "水処理"
