 corporate_charters: "企業リベラリズム"
 corporate_charters_desc: "コーポレート・リベラリズムは、米国の歴史とオープン・ドア・インペリアルズムのツールで、コーポレート・ライトがチーフ・ベネファリティーのチーフ・ベネファリズムと、ビジネス・規制のチーフ・ロベリストのチーフ・ベネフィニストの両者になる。"
 joint_stock_companies: "現代の通貨理論"
 joint_stock_companies_desc: "現代の金銭理論または現代のお金理論(MMT)は、通貨単価と失業としての通貨を公の独占と失業として表すヘテロドックスのマクロ経済論です。通貨単価は、税金を支払う必要があり、節約の欲求を満たす財務資産の供給を過度に制限しています。"
 investment_banks: "AIファイナンシャルアドバイザー"
