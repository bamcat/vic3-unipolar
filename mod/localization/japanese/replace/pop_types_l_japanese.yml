 CAPITALISTS_QUALIFICATIONS_DESC:0 "十分な [concept_wealth] のポップアップのみ #v $capitalists$#! になります。 より大きい [concept_wealth] および [concept_literacy] の潜在的な増加。 [concept_culture] が低い [concept_acceptance] が長い時間を取るポップアップ。 #v $shopkeepers$#! および #v $engineers$#! は、特に #v $capitalists$#! になる簡単な時間を持っています。"
 CLERGYMEN_QUALIFICATIONS_DESC:0 "十分な [concept_literacy] のポップアップのみ #v $clergymen$#! になります。 より大きい [concept_literacy] で潜在的な増加。 [concept_religion] が低い [concept_acceptance] がより長い時間を要するポップアップは、[concept_religion] の $concept_acceptance$ がより速くなります。 #v $academics$#! および #v $aristocrats$#! は、特に簡単な時間 #v が #v id=16/> になるのは #v id=16/> です。$clergymen$ id=16/>"
 CLERKS_QUALIFICATIONS_DESC:0 "任意のポップアップは #v $clerks$#! になることができます。 より大きい [concept_literacy] で潜在的な増加。 #v $laborers$#! は #v $clerks$#! になる非常に容易な時間がある。"
 ENGINEERS_QUALIFICATIONS_DESC:0 "十分な [concept_literacy] のポップアップのみ #v $engineers$#! になります。 より大きい [concept_literacy] と [concept_wealth] で増加する可能性があります。 #v #! と #v $clerks$ $clerks$#v は、#v は、#v は #v id=14/> は、#v は #! id=14/> id=14/> は、<x は #v id=12/> id=12/> id=12/> id=14/> id=12/> は <x は #v id=12/> id="
 FARMERS_QUALIFICATIONS_DESC:0 "任意のポップアップは #v $farmers$#! になることができます。 より大きい [concept_wealth] で潜在的な増加。 #v $peasants$#! および #v $laborers$#! は #v $farmers$#! になる、特に簡単な時間がある。"
 MACHINISTS_QUALIFICATIONS_DESC:0 "最小限の [concept_literacy] のポップアップは #v $machinists$#! になります。 より大きい [concept_literacy] で潜在的な増加。 #v $laborers$#! は、特に #v $machinists$#! になる簡単な時間を持っています。"
 OFFICERS_QUALIFICATIONS_DESC:0 "#v $soldiers$#! または [concept_culture] のポップアップのみ [concept_acceptance] は #v $officers$#! になることができます。 より大きい [concept_literacy] で潜在的な増加。 #v $aristocrats$#! は #v $officers$#! になる非常に容易な時間を持っています。"
