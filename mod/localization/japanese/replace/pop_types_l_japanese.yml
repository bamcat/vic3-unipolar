l_japanese:
 aristocrats:0 "@aristocrats! $aristocrats_no_icon$"
 aristocrats_only_icon:0 "@aristocrats!"
 aristocrats_no_icon:0 "アリストクラッツ"
 aristocrats_desc:1 "古き良き土地所有者、古き良きお金。 それらは [GetBuildingType('building_manor_house').GetName] [Concept('concept_building', '$concept_buildings$')] でのみ動作し、農場や植林を所有しています。 [concept_investment_pool] に利益の一部を貢献します。 彼らの政治的関心は、[GetInterestGroupVariant('ig_landowners',GetPlayer).GetNameWithCountryVariant] として表されます。"
 bureaucrats:0 "@bureaucrats! $bureaucrats_no_icon$"
 bureaucrats_only_icon:0 "@bureaucrats!"
 bureaucrats_no_icon:0 "事務局員"
 bureaucrats_desc:0 "政府機能およびインフラの管理責任者 基本的には、彼らは、インテリジェントジアまたはプチボゲロシーと整列する傾向があります。"
 capitalists:0 "@capitalists! $capitalists_no_icon$"
 capitalists_only_icon:0 "@capitalists!"
 capitalists_no_icon:0 "マーケティング"
 capitalists_desc:1 "業界のキャプテン、新しい時代の新しいお金。 それらは [GetBuildingType('building_financial_district').GetName] [Concept('concept_building', '$concept_buildings$')] でのみ動作し、鉱山や製造所を所有しています。 [concept_investment_pool] に利益の一部を貢献します。 彼らの政治的関心は、[GetInterestGroupVariant('ig_industrialists',GetPlayer).GetNameWithCountryVariant] として表されます。"
 clergymen:0 "@clergymen! $clergymen_no_icon$"
 clergymen_only_icon:0 "@clergymen!"
 clergymen_no_icon:0 "クレイジーメン"
 clergymen_desc:0 "祭司、学者および他の宗教指導者は、農村人口の精神的なニーズに傾向があります。  Politically は Devout の背骨です。"
 clerks:0 "@clerks! $clerks_no_icon$"
 clerks_only_icon:0 "@clerks!"
 clerks_no_icon:0 "ホワイトカラーワーカー"
 clerks_desc:0 "政府、インフラ、店舗の管理業務を行うオフィスワーカーの低ランク化 いくつかは、トレードユニオンに参加しているにもかかわらず、Ptite Bourgeoisieの一般的な部分。"
 engineers:0 "@engineers! $engineers_no_icon$"
 engineers_only_icon:0 "@engineers!"
 engineers_no_icon:0 "エンジニア"
 engineers_desc:1 "製造業、鉱山および構造のようなセクターの高度の機械類と働いた技術的な解決の発明者そしてデザイナー。 他の人がトレードユニオンに参加しながら、インダストリアルリストやペティ・ボアホシーをサポートしている人もいます。"
 farmers:0 "@farmers! $farmers_no_icon$"
 farmers_only_icon:0 "@farmers!"
 farmers_no_icon:0 "ファーマー"
 farmers_desc:0 "食品を生産したり、現金作物を成長させたりする安定したけれどスキャントを作るのは、Sharecroppers、小株主および他の。 ほとんどの場合、農村民として表された自分の興味を参照してください。"
 peasants:0 "@peasants! $peasants_no_icon$"
 peasants_only_icon:0 "@peasants!"
 peasants_no_icon:0 "ペンダント"
 peasants_desc:2 "[Concept('concept_subsistence_building', '$concept_subsistence_buildings$')] に限らず、農作物や単純製造品を生産している農家は、主に独自のニーズのために使用しています。 彼らは生存のために[concept_subsistence_output]に依存し、[concept_market]経済で限られた役割を果たします。 [Concept('concept_politically_unaligned_aligned', '$concept_politically_unaligned$')] になる傾向があります。"
 laborers:0 "@laborers! $laborers_no_icon$"
 laborers_only_icon:0 "@laborers!"
 laborers_no_icon:0 "ブルーカラーワーカー"
 laborers_desc:0 "日系労働者、農手、雇用保障がほとんどなく、社会全体でどんな仕事が利用できるかを実践する。 彼らは通常、政治に従事していないが、貿易連合を通じて関与する可能性があります。"
 officers:0 "@officers! $officers_no_icon$"
 officers_only_icon:0 "@officers!"
 officers_no_icon:0 "執行役員"
 officers_desc:0 "軍と海軍の国家の軍部隊を指揮する委嘱役員。 ポリティカルに、彼らは軍の上部のエスケロンを表します。"
 academics:0 "@academics! $academics_no_icon$"
 academics_only_icon:0 "@academics!"
 academics_no_icon:0 "アカデミック"
 academics_desc:0 "研究者、医師、弁護士、その他の教育専門家が学術機関で勉強し、教える。 ポリティカルに、彼らはインテリジェントジアの最前線にあります。"
 shopkeepers:0 "@shopkeepers! $shopkeepers_no_icon$"
 shopkeepers_only_icon:0 "@shopkeepers!"
 shopkeepers_no_icon:0 "中小企業経営者"
 shopkeepers_desc:0 "店舗のオーナーやマネージャー、市内の顧客に商品を販売しています。 彼らは通常、政治的にプチ・ボアホシーの中に落ちます."
 slaves:0 "@slaves! $slaves_no_icon$"
 slaves_only_icon:0 "@slaves!"
 slaves_no_icon:0 "スラブ"
 slaves_desc:0 "人としてではなく、プロパティとして扱われ、スレーブが許可されている国のさまざまなセクターで強制労働を実行します。 彼らの状態のために、彼らは政治に参加することはできません。"
 soldiers:1 "@soldiers! $soldiers_no_icon$"
 soldiers_only_icon:1 "@soldiers!"
 soldiers_no_icon:1 "サービスマン"
 soldiers_desc:0 "兵士やセーラーは、国の軍人員のバルクを作る。 彼らは一般的に軍の部分として自分の役割で政治的に整列します。."
 machinists:0 "@machinists! $machinists_no_icon$"
 machinists_only_icon:0 "@machinists!"
 machinists_no_icon:0 "マケニスト"
 machinists_desc:0 "製造業、鉱山、機械化された農場および他のセクターの安定した雇用の機械類が付いている手動労働者。 政治的に、彼らは貿易連合の運転力になる傾向があります。"
  
 ACADEMICS_QUALIFICATIONS_DESC:0 "十分な [concept_literacy] のポップアップのみ #v $academics$#! になります。 より大きい [concept_literacy] および [concept_wealth] の潜在的な増加。 [concept_culture] が低い [concept_acceptance] が長い時間を取るポップアップ。 #v $clerks$#! および #v $aristocrats$#! は、特に #v $academics$#! になる簡単な時間を持っています。"
 ARISTOCRATS_QUALIFICATIONS_DESC:0 "十分な [concept_wealth] のポップアップのみ #v $aristocrats$#! になります。 より大きい [concept_wealth] およびより低い程度 [concept_literacy] への潜在的な増加。 [concept_culture] が低い [concept_acceptance] が長い時間を取るポップアップ。 #v $officers$#! および #v $bureaucrats$#! は、特に #v $aristocrats$#! になる簡単な時間を持っています。"
