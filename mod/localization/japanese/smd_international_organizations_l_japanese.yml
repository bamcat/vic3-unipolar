 # European Union
 
 je_european_union: "欧州連合"
 je_european_union_reason: "欧州連合は、現代の年齢の最も野心的な政治と経済プロジェクトの一つとして立っています。\n\n 経済統合、共有ガバナンス、および集団セキュリティの原則に基づいて構築されたEUは、そのメンバーに共通の市場、調整された取引方針、および大陸の未来を形づけるテーブルの席を提供します。 メンバーシップは、商品、サービス、資本金、および人々 の自由な動きの約束をもたらします。 繁栄のための非前例のない機会。\n\n しかし、連合は、その課題がないわけではありません。 会員は、複雑な交渉を行なう必要があります。, supranational 規制によって遵守, 国家の社会の要素に妥協. より深い統合が成長し、各メンバーの運命はコレクティブのそれに拘束されます。\n\n 国の繁栄やEU内の闘争は、共通の利益と国民の利益のバランスをとる能力に依存しているかどうか、その部分の合計よりもあることを目指している組合内のパスを鍛造します。"

 eu_events.1.t: "欧州連合への招待状"
 eu_events.1.d: "欧州連合は、フルメンバーとして参加するために、当社の国への招待状を拡張しました。"
 eu_events.1.a: "オファーを受け入れる"
 eu_events.1.b: "決行をしなければならない"

 eu_events.2.t: "EU会員に対する議論"
 eu_events.2.d: "政治上の事実は、EUにとどまるかどうかに関する決定を求めています。"
 eu_events.2.a: "ユニオンを残す"
 eu_events.2.b: "ユニオンに残ります"

 modifier_eu_member_state: "EU加盟国"
 eu_membership_accept_tt: "あなたは、経済と外交上の利益を得る、欧州連合のメンバーになります。"
 eu_member_state: "EU加盟国"
 is_eu_member_state: "EU加盟国"
 
 eu_call_summit_button: "EUサミットへの参加"
 eu_call_summit_button_desc: "Summonのメンバーは、取引、制裁、協力について議論するために述べています。"

 eu_events.3.t: "欧州連合サミット"
 eu_events.3.d: "すべてのEU加盟国からの代表者が共通の目標と課題について議論するために集まります。"
 eu_events.3.a: "ディープエントトレードタイズ"
 eu_events.3.b: "座標制裁"
 eu_events.3.c: "文化交流の推進"

 eu_sanctions_ready: "サンクションの準備"
 
 leave_eu: "欧州連合の出口"
 leave_eu_desc: "欧州連合(EU)から撤退し、経済上の利点と政治の統合を推進します。"
 
 eu_member_state_is: "EU加盟国"
 eu_member_state_is_no_longer: "EU加盟国がなくなった"
 eu_deeper_trade_ties: "EUの深い貿易タイ"
 eu_deeper_trade_ties_desc: "欧州連合内の経済統合を拡大し、加盟国間の取引量を高め、市場アクセスを改善しました。"

 eu_cultural_exchange: "EU文化交流"
 eu_cultural_exchange_desc: "欧州連合(EU)の会員は、文化的理解、移住、新たな発想と技術の普及を促進してきました。"
 je_eu_membership_request: "EU会員の申請"
 je_eu_membership_request_reason: "政府は欧州連合(EU)に正式な申請書を提出しました。\n\n このプロセスは、EUの法律と規格との長い交渉、政策改革、およびアライメントを含みます。 今後数年間にわたり、あなたの国は、経済の安定性、ガバナンス、人権、および民主主義の原則に従うことに評価されます。\n\n成功的なアクセスは、あなたに付与されます。\n- EUの単一市場へのアクセス\n- 他のメンバーの状態の物品、サービス、資本金、そして人々を自由に動かす\n - EUの意思決定機関への参加\n\n しかし、このプロセスは政治的に敏感であり、国内および既存のEUのメンバーから両方の抵抗に遭遇する可能性があります。"
 eu_membership_process: "EU加盟プロセスを開始"
 request_to_join_eu_decision: "EUへの参加申請"
 request_to_join_eu_decision_desc: "欧州連合(EU)への参加申請"
 
 eu_events.0.t: "欧州連合へのアセンション"
 eu_events.0.d: "私達は欧州連合に正式に受け入れられます"
 
