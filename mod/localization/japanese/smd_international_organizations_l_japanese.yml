 ### UPDATED ORG DESCRIPTIONS reflecting mechanics
 ### ══════════════════════════════════════════
 
 io_nato_desc: "[concept_nato] は、集合防衛の北米と欧州諸国を結合する [concept_military_defense_agreement] です。 1人のメンバーに対する武装攻撃は、すべての攻撃と見なされます。 NATO に加わると、既存のメンバーの状態ごとに、相互の防衛策を自動生成します。"
 
 io_opec_desc: "[concept_opec] は、石油生産政策を調整する主要な石油輸出国の組織です。 加盟国は、カルテル価格設定の電力から恩恵を受け、石油輸出に著しい取引優位性を獲得し、調整された投資から抽出スループットを改善しました。"
 
 io_eec_desc: "[concept_eec] は [concept_free_trade_agreement] で、欧州の加盟州間での習慣の連合を確立する。 会員は、標準化された製品規則と調整された取引方針で共通の市場を共有し、境界線を横断する取引の障壁を減らします。"
 
 io_arab_league_desc: "[concept_arab_league] は、政治、経済、文化、社会的協力を促進するアラブ圏諸国の [concept_cultural_pact] です。 シェアド・ヘリテージは、技術やアイデアの交換を加速し、メンバーの状態の連鎖性は内部革命的な圧力を抑制するのに役立ちます。"
 
