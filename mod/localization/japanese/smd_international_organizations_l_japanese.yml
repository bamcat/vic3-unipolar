 un_events.300.t: "UNの決断 渡される"
 un_events.300.d: "ゼネラル・アセンブリは、世界各地の課題に対応し、特定のトピックに関するグローバルな連携を調整する決議に合意しました。"
 un_events.300.f: "解像度は国際的なコンセンサスの重量を運ぶ - それは価値があるもののために。"
 un_events.300.a: "インフォメーション"
 
 UN_RES_DESC_ENVIRONMENT: "#bold 環境保護に関する決議#!\n会員状態は、環境基準と持続可能な資源管理の調整にコミットしています。\n\n#tooltip_separator!\n@green_checkmark! すべての国は、12か月の#bold UNの環境の決断#!修飾語を受け取ります。"
 UN_RES_DESC_PEACE: "#bold 世界の平和に対する決議#!\n総会は、紛争の平和な解決と、州間紛争の減少に対するコミットメントを再確認する。\n\n#tooltip_separator!\n@green_checkmark! すべての国は、12か月の#bold国連平和決議#!修飾子を受け取ります。"
 UN_RES_DESC_ECONOMY: "#bold 経済発展に関する決議#!\n会員状態は、経済発展と貿易障壁の低下に関する投資を支持した。\n\n#tooltip_separator!\n@green_checkmark! すべての国は、12か月の#bold国連経済開発の決議#!修飾子を受け取ります。"
 UN_RES_DESC_TECHNOLOGY: "#bold ユネスコ・テクノロジー・リゾリューション#!\nThe General Assembly は、会員間の技術共有と共同研究のためのフレームワークを確立しています。\n\n#tooltip_separator!\n@green_checkmark! すべての国は、12か月の#bold UNの技術の決断#!修飾語を受け取ります。"
 
 # ── EVENT 301: RESOLUTION FAILED ─────────────────────────────────
 
 un_events.301.t: "UNの決断 渡る失敗"
 un_events.301.d: "国連総会前の運動は、必要な過半数の確保に失敗しました。 分解能が破棄され、結果なしで指定したセッションが経過しました。\n\nは、対策は実施されません。 スポンサーの委任は、その失望を表明しました。 その他は使用していません。"
 un_events.301.f: "国連は、国連が最善を尽くします。"
 un_events.301.a: "保険会社"
 
 # ── EVENT 302: SANCTIONS (TARGET) ────────────────────────────────
 
 un_events.302.t: "[ROOT.GetCountry.GetName] 国連の制裁"
 un_events.302.d: "国連安全保障評議会は、[ROOT.GetCountry.GetName]に経済の制裁を指摘する決議を通過しました。 解像度は、必要な過半数でサポートされ、すぐに効果をとります。\n\n 取引制限は、現在進行中です。 分裂分離が深まる。 会員状態が予想される — 未対応 — sanctions regime.\n\n に従う 制裁は、セキュリティ評議会がそれらを確認するために招く場合を除き、5年間有効に残ります。"
 un_events.302.f: "全世界の意見から国を絶縁しない。"
 un_events.302.a: "この解決を拒絶する"
 
 # ── EVENT 303: CONDEMNATION (TARGET) ─────────────────────────────
 
 un_events.303.t: "[ROOT.GetCountry.GetName] 国連によって非難"
 un_events.303.d: "国連総会は正式な決議を通過しました [ROOT.GetCountry.GetName]. 非難は、床の議論の後に大多数の投票によって承認されました。\n\n 非難は結合の執行メカニズムを運びませんが、それは国際的なdisapprovalの正式な声明を表し、何年もの間外交のコミュニティで立っている[ROOT.GetCountry.GetAdjective]に影響を与えます。"
 un_events.303.f: "ワードは武器ではありません。 しかし、彼らはマークを残します."
 un_events.303.a: "講演は行いません"
 
 # ── EVENT 304: SANCTIONS/CONDEMNATION (OBSERVERS) ────────────────
 
 un_events.304.t: "国連Punitiveの決断は渡しました"
 un_events.304.d: "国連安全保障評議会は、別の国に対する依存の制裁を通過しました。 彼らは、世界が経済の緊張を彼らに調整するにつれて、重度の罰に直面します。"
 un_events.304.f: "国際的な検閲の機械類はゆっくり変わりますが、それは変わります。"
 un_events.304.a: "インフォメーション"
 
 UN_304_DESC_SANCTIONS: "国連安全保障評議会は、[global_var:un_sanction_target.GetName]で経済の制裁を課すことに投票しました。 必要なマージンで渡された解像度。\n\n[global_var:un_sanction_target.GetName] は、取引制限、外交分離、および制裁期間の長さの重要な経済罰に直面します。 会員状態は、制限事項を遵守しることが期待されます。"
 UN_304_DESC_CONDEMNATION: "国連総会は、大多数の投票で正式に[global_var:un_sanction_target.GetName]を非難しました。 解像度は、国際disapproval.\n\nの公式ステートメントを表しています。 非難は結合の執行を運びませんが、[global_var:un_sanction_target.GetAdjective] は記録に従事し、国際的な地位に影響を及ぼします。"
 
