 ### ═══════════════════════════════════════
 ### GAME CONCEPTS
 ### ═══════════════════════════════════════

 concept_international_organization: "国際機関"
 concept_international_organization_desc: "国際機関は、国家の国境を越えて運営する機関で、政策の調整、取引の推進、集団的セキュリティの確保、または加盟国の文化的交流の推進を行っています。 [concept_free_trade_agreement]s、[concept_financial_agreement]s、[concept_military_defense_agreement]s、[concept_cultural_pact]s、[concept_cooperative_agreement]s など、いくつかの形式に渡します。"

 concept_intergovernmental_organization: "組織体制"
 concept_intergovernmental_organization_desc: "政府間機関は、そのメンバーが独立国家である [concept_international_organization] である。 [concept_nongovernmental_organization]s とは異なり、IGO は正式なメンバーシップを必要とし、著しい外交、経済、または軍事的利益を提供することができます。"

 concept_nongovernmental_organization: "非政府機関"
 concept_nongovernmental_organization_desc: "非政府機関は、政府によって管理されずに国際的に運営する独立した機関です。 すべての国は、デフォルトでNGOと提携しています。 政府は、NGOの意見やその恩恵に影響を及ぼす、それらを禁止、許容、または補助することを選ぶことができます。"

 concept_international_treaty: "国際条約"
 concept_international_treaty_desc: "国際条約は、社会国家間の正式な結合協定です。 [concept_intergovernmental_organization]s とは異なり、条約は継続的組織のメンバーシップを必要としません。国は署名者であるか、それとも署名ではありません。 署名者は、他の署名者との関係を撤退しながら、外交上の利益を受け取ります。"

 international_treaty_type:0 "[concept_international_treaty]
 concept_free_trade_agreement: "自由貿易協定"
 concept_free_trade_agreement_desc: "無料の取引契約は、加盟国の貿易障壁を削減し、商品や経済成長の交換を促進する [concept_international_organization] です。"

 concept_financial_agreement: "金融協定"
 concept_financial_agreement_desc: "金融契約は、会員間での金銭的協力、開発資金、財政的安定性に焦点を当てた[concept_international_organization]です。 会員は、+5%のインフルエンサーおよび+1の外交的評判を受け取ります。"

 concept_military_defense_agreement: "軍事防衛協定"
 concept_military_defense_agreement_desc: "軍事防衛協定は、集団セキュリティの原則に基づいて構築された[concept_international_organization]です。 1人の会員に対する攻撃は、全ての攻撃と見なされます。"

 concept_cultural_pact: "文化的事実"
 concept_cultural_pact_desc: "文化的事実は、会員間で共有された伝統、言語、文化的交流を促進する[concept_international_organization]です。"

 concept_cooperative_agreement: "協力協定"
 concept_cooperative_agreement_desc: "協同協定は、幅広い多国間外交に重点を置いた [concept_international_organization] です。 他の組織タイプとは異なり、協同協定は直接修飾子を提供しません。 彼らの影響は、解像度とイニシアチブを通して運動されます。"

 concept_united_nations: "国連"
 concept_united_nations_desc: "国連は、国際平和、安全保障、協力を維持することに専念し、世界の国の[concept_cooperative_agreement]です。"

 concept_nato: "佐藤 仁"
 concept_nato_desc: "ノース・アトランティック・トリーティー・オーガナイゼーションは、[concept_military_defense_agreement] 結合の北米と欧州諸国の集団防衛機関です。"

