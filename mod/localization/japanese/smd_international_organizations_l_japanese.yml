 leave_nato_desc: "軍が独立力として行動することを可能にするNATOの私達のメンバーシップを再考し、アメリカ人の影響から自由に。"

 # imf

 je_imf_loan: "IMFローンプログラム"
 je_imf_loan_reason: "[ROOT.GetCountry.GetName] に国際通貨基金融資を延長しました。 緊急資金の交換では、国は重要な条件を受け入れています:高い金利、必須の取引、および資金を上書きする大きな電力に対する義務。"

 imf_je_obligations_active_tt: "優れた電力義務は依然として効果があります。 外国の債権者は、主要な経済政策決定にレバレッジを維持します。"
 imf_je_obligations_met_tt: "力強い義務は排出されました。 国は完全な経済社会を維持しています。しかし、融資条件は強制的に残っています。"

 decision_leave_imf: "IMFを離れる"
 decision_leave_imf_desc: "国際通貨基金から撤退 途上国は、倒産に近づくと、もはやIMF融資サポートの対象になりませんが、債権義務と干渉の自由になります。 この決定は逆にできません。\n\n 注意: アクティブなIMFローンを保持している間は、退場できません。"
 imf_cannot_leave_while_indebted_tt: "有効な融資が所定の場所にある間IMFを離れることができません"


 imf_button_pay_obligations_name: "義務の支払い"
 imf_button_pay_obligations_desc: "残った大きな力の義務を早めに払って下さい。 コスト500金を削減し、50%未満の債務を必要としますが、すぐに完全な経済社会を回復し、すべての偉大な力との関係を改善します。"
 imf_pay_obligations_cost_tt: "50%以下および500金未満の規模の債務が必要"
 imf_obligations_paid_tt: "早期に支払われる義務。 パワーリレーションが向上しました。"

 # imf_events.1 — Loan offer
 imf_events.1.t: "IMFの介入"
 imf_events.1.d: "[ROOT.GetCountry.GetName]の反論は危機にあります。 Debtは、市場を緊張させ、信用を慎重にするレベルに達しました。 国際通貨基金は、通知をとり、緊急融資を提供する委任を派遣しました。\n\n 条件は寛大ではありません。 有利率は罰レベルで設定されます。 国は、既存の経済政策に関係なく、無料の取引を採用する必要があります。 そして、資金を上書きする大きな力は、一定の義務が満たされていると期待します。 しかし、代替 - 安全ネットなしで直立した破産に近づいている - 悪化する可能性があります。"
 imf_events.1.f: "相続性と解体は、同時に利用できません。"
 imf_events.1.a: "融資を受け入れる — 融資が必要"
 imf_events.1.b: "個人情報の管理"

 # imf_events.2 — Great power notification
 imf_events.2.t: "IMF融資拡張"
 imf_events.2.d: "[SCOPE.sCountry('imf_debtor_scope').GetName] は、IMF 融資パッケージを受け入れています。 資金を下書きする大きな力の一つとして、[ROOT.GetCountry.GetName] 債務者国の義務を負います。 アレンジは、戦略的かつ金融的インプリケーションが付属しています。"
 imf_events.2.f: "Debtは外交の形態です。"
 imf_events.2.a: "お役に立てる"
 imf_events.2.b: "不幸 — 課される用語はあまりにも厳しい"

 # imf_events.3 — Loan complete
 imf_events.3.t: "IMFプログラム"
 imf_events.3.d: "IMFローン受入後5年、[ROOT.GetCountry.GetName]はプログラムの義務を果たしました。 利息の支払いが行われました, 条件が保証され, 偉大な電力の債権者満足. この国は、その創意工夫を凝らした経験から生まれます。そして、それが始まった時よりも、その資金をより良い注文で願っています。"
 imf_events.3.f: "レジャーはバランスが取れています。 レッスンは難しいです。"
 imf_events.3.a: "お問い合わせ"

 # imf_events.4 — Leaving
 imf_events.4.t: "IMFからの撤退"
 imf_events.4.d: "[ROOT.GetCountry.GetName] は国際通貨基金から撤退します。 決定は、会員の費用 - 条件、義務、危機中に経済社会の喪失 - 緊急融資へのアクセスの利点を上回る。\n\n 素晴らしい力は満足しません。 そして、[ROOT.GetCountry.GetName]は、再び破産に近づくべきで、安全網はありません。"
 imf_events.4.f: "独立性は価格を持っています。 依存関係をします。"
 imf_events.4.a: "私たちは一人で立っています。"

 # imf_events.5 — Great power notification of leaving
 imf_events.5.t: "IMFを離れる国"
 imf_events.5.d: "[SCOPE.sCountry('imf_leaver_scope').GetName] は国際通貨基金から撤退しました。 決定は、国際金融秩序に反するものであり、[SCOPE.sCountry('imf_leaver_scope').GetName] というシグナル 自分の経済コースをグラフ化し、より良く、または悪化させる。"
 imf_events.5.f: "債務者を1つ減らします。 1つのより少ないレバー。"
 imf_events.5.a: "インフォメーション"

 # imf_events.10 — War bonds
 imf_events.10.t: "戦争ボンド"
 imf_events.10.d: "強靭な緊張と戦争が進行して、財務省は、戦争債券の発行を緊急対策を提案しました。 市民や投資家は、将来の返済のための交換の州にお金を借りるために招待され、戦争の努力に資金を供給するための即時現金注射を提供します。\n\n 債券は機能しますが、債務であり、戦時化合物の債務は迅速に行われます。 供給の消費は軍機械にお金の流れとして上がります。"
 imf_events.10.f: "国民は、現在を守るために、その未来に対して借りています。"
 imf_events.10.a: "債券を発行 — 今のお金が必要"
 imf_events.10.b: "Decline — 私たちは未来を解決しません"

 imf_loan_modifier: "IMF融資条件"
 imf_loan_modifier_desc: "IMFローンが設置されています。 有利率は罰せられる高く、自由な貿易は必須です。 外国投資が流れていますが、経済社会は禁忌であり、正当な被害を受けています。"

 imf_great_power_obligations: "偉大な電力の義務"
 imf_great_power_obligations_desc: "融資条件として、IMF がこの国の義務を負う偉大な力。 経済政策の活用は本物です。"

 imf_refused_loan_modifier: "IMF融資拒否"
 imf_refused_loan_modifier_desc: "国は、IMFの援助を拒否し、単独でその債務を管理します。 その結果、クレジット条件が悪化しています。"

 imf_post_loan_stability: "後プログラムの回復"
 imf_post_loan_stability_desc: "IMFプログラムが終了いたしました。 政府は、その義務を満たしたとおり、信頼性の尺度が高まっています。そして、国の金融はより良い注文です。"

 imf_left_modifier: "IMFの外"
 imf_left_modifier_desc: "この国はIMFから撤退しました。 信用義務の自由ですが、国際緊急融資から切断されます。 投資フローの低減"

 war_bonds_modifier: "戦争債券発行"
 war_bonds_modifier_desc: "緊急戦争の債券は、戦争の努力を金融するために発行されました。 収入は上昇していますが、借金は成長し、消費量は増加しました。"

 war_bonds_refused_modifier: "戦争のボンドはDeclined"
 war_bonds_refused_modifier_desc: "戦争債券を発行する政府は減少しました。 財政状態は維持されますが、軍隊はピンチを感じます。"

 un_events.6.t: "国連ミッションから受け継がれてきた力"
 un_events.6.d: "[ROOT.GetCountry.GetAdjective] 部隊は、国連の平和管理ミッションでサービスを完了し、帰国しています。 貢献は、軍事用語で控えめに行われていましたが、その問題が起きたときには、[ROOT.GetCountry.GetName]が提示されました。 一般が戻ってきます。"
 un_events.6.a: "ウェルカムホーム"
 
 un_peacekeeping_contribution: "国連平和保全の貢献"
 un_peacekeeping_contribution_desc: "[ROOT.GetCountry.GetName] 国連平和管理の使命に寄与 国際的なコミュニティが注目しています。"
 
