 ### AMNESTY INTERNATIONAL
 ### ══════════════════════════════════════════

 ngo_events.1.t: "アムネスティ・インターナショナルがポリシーを非難"
 ngo_events.1.d: "アムネスティ・インターナショナルは、国家の人権記録に関する有害な報告を公表し、現在の法律を根本的な自由の体系的な違反と引用しています。 各国のコミュニティが気づいて、政府は、これらの懸念に対処するための取り付け圧力に直面しています。"
 ngo_events.1.a: "彼らの批判は何も変更しません"
 ngo_events.1.b: "懸念事項を調べる"

 ngo_events.2.t: "Amnesty International Praisesの改革"
 ngo_events.2.d: "最近の立法改革は、人類の人権への大きな一歩としてアムネスティ国際によって認められています。 彼らの年次報告書は、私たちの進歩を強調し、私たちの国の国際的な評判を高める。"
 ngo_events.2.a: "私たちは、私たちの進歩を誇りに思っています"

 ngo_events.3.t: "市民の不快な報告"
 ngo_events.3.d: "アムネスティ・インターナショナルは、我が国を追い越す広範囲にわたる市民の秘密を文書化した特別報告を発表しました。 政府は、抑圧ではなく、有意義な改革を通じて、不満の根本原因に対処するために呼びます。"
 ngo_events.3.a: "改革を考える"
 ngo_events.3.b: "当社の内部業務は、その心配ではありません"

 ### ══════════════════════════════════════════
 ### RED CROSS
 ### ══════════════════════════════════════════

 ngo_events.10.t: "赤十字は人道援助を提供します"
 ngo_events.10.d: "国際赤十字社は、人道的な労働者を雇用し、進行中の紛争の影響を受ける市民を支援するために提供しました。 彼らの援助チームは、私たちの戦績地域で人口を分散させるために医療、避難所、食料を提供する準備ができています。"
 ngo_events.10.a: "お問い合わせ"
 ngo_events.10.b: "戦場での外国人労働者は許可できません"

 ngo_events.11.t: "赤い十字架は、戦争の行動を批判"
 ngo_events.11.d: "国際赤十字架は、武力に対する深い懸念を表明する公告を発しました。 紛争領域における広範な市民の不快さとインフラ破壊のレポートは、国際的に注目されています。 ジュネーブ条約を尊重するために、すべての関係者を対象としています。"
 ngo_events.11.a: "弊社では、投資家の皆様のご協力を賜りますようお願い申し上げます。"
 ngo_events.11.b: "これらの疑惑を否定する"

 ngo_events.12.t: "赤十字は危機救済を約束します"
 ngo_events.12.d: "国際赤十字は、開戦の欠如にもかかわらず、私たちの国境の中で成長する人道危機を識別しました。 広範囲にわたる市民の不快さと経済の混乱は、国際援助を必要とする条件を作成しました。 被災した人口に対する救済活動の調整を図っています。"
 ngo_events.12.a: "お問い合わせ"
 ngo_events.12.b: "これを自分で処理できる"

 ### ══════════════════════════════════════════
 ### IAEA
 ### ══════════════════════════════════════════

 ngo_events.20.t: "IAEA 原子力検査の依頼"
 ngo_events.20.d: "国際原子エネルギー機関は、核施設へのアクセスを総合安全・コンプライアンス検査に正式に要請しました。 非増殖条約の非署名として、核プログラムは高度化した国際スカルチニを誘致しました。 IAEAは検査がルーチンであることを保証しますが、拒否は国際コミュニティに明確な信号を送ります。"
 ngo_events.20.a: "工場見学・検査"
 ngo_events.20.b: "私たちの核プログラムは、社会的な問題です"

 ngo_events.21.t: "IAEAは、原子力安全記録を表彰"
 ngo_events.21.d: "国際原子エネルギー機関は、原子力プログラムの見直しに続き、安全基準と非増殖コンプライアンスへのコミットメントを正式に約束しました。 NPTの遵守と国際検査官との協力により、世界核地域における地位を強化しています。"
 ngo_events.21.a: "私たちは、平和な原子力エネルギーにコミットしています"

 ngo_events.22.t: "IAEAは、拡散の懸念を上げます"
 ngo_events.22.d: "国際原子エネルギー機関は、原子力プログラムの方向にアラームを上げました。 IAEAは、NPT会員なしで、引き続き審査官と連携し、可能な武器開発に懸念を表明した正式な声明を発表しました。 国際地域は密接に見守っています。"
 ngo_events.22.a: "対話が開かれる"
 ngo_events.22.b: "核技術にふさわしい行動を主張する"

 ### ══════════════════════════════════════════
 ### MODIFIERS
 ### ══════════════════════════════════════════

 ngo_amnesty_scrutiny: "アンダー アムネスティ Scrutiny"
 ngo_amnesty_scrutiny_desc: "アムネスティ・インターナショナルは、最近の批判に従った人権記録を密接に監視しています。 政府の正当性は圧力下にあります。"

 ngo_amnesty_reform_pressure: "圧力を変形させます"
 ngo_amnesty_reform_pressure_desc: "市民の不規則に対するアンネスティ・インターナショナルの報告は、改革のための国内および国際的な圧力を作成しましたが、革命的な感情を弱めるのを助けました。"

 ngo_redcross_aid: "赤十字人道援助"
 ngo_redcross_aid_desc: "レッド・クロス・ワーカーは、国際的評判を高めることで死亡率を削減し、紛争地帯の市民に人道支援をしています。"

 ngo_redcross_cooperation: "赤十字協力"
 ngo_redcross_cooperation_desc: "戦時行動に関するレッド・クロスとの協力により、国際的地位を向上し、軍の行動によって発生する不断を削減しました。"

 ngo_redcross_relief: "赤十字危機救済"
 ngo_redcross_relief_desc: "レッドクロスは、市民危機のこの期間中に人道支援を提供し、影響を受けた人口の安定化を支援しています。"

 ngo_iaea_inspectors: "IAEAインスペクタープレゼント"
 ngo_iaea_inspectors_desc: "IAEAの検査官は、原子力施設内での運用、技術的専門知識と安全知識を共有しています。 彼らの存在は技術移転を加速し、私たちの外交的な評判を高めます。"
