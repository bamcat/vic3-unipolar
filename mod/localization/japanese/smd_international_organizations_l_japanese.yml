 ### United Nations
 io_un_name: "国連"
 io_un_abbreviation: "ログイン"
 io_un_desc: "[concept_united_nations] は、国際平和と安全保障を維持し、国家間の友好関係を発展させ、社会的進歩を促進するために設立された [concept_cooperative_agreement] です。 他の [concept_intergovernmental_organization]s とは異なり、UN は直接そのメンバーに修飾子を提供しません。 その影響は、外交的解像度、平和維持管理、およびグローバルな取り組みを通じて行われています。"
 io_un_tooltip: "[concept_united_nations] は、世界の国の [concept_cooperative_agreement] です。\n クリックして詳細を表示します。"

 ### NATO
 io_nato_name: "北大西洋条約機関"
 io_nato_abbreviation: "佐藤 仁"
 io_nato_desc: "[concept_nato] は、1949 年に設立された [concept_military_defense_agreement] で、北米および欧州諸国の集団防衛に拘束されています。 1人のメンバーに対する武装攻撃は、すべての攻撃と見なされます。 NATOは、ジョイントの軍事演習を調整し、機器を標準化し、統合されたコマンド構造を維持します。"

 ### G7
 io_g7_name: "セブングループ"
 io_g7_abbreviation: "G7の特長"
 io_g7_desc: "[concept_g7] は、世界最大の先進の経済を網羅する [concept_financial_agreement] です。 会員は、会計方針、金融政策、経済統治の調整を行います。 会員は、著名な外交の影響と金融の信頼性を告白します。"

 ### OPEC
 io_opec_name: "石油輸出国の組織"
 io_opec_abbreviation: "オペック"
 io_opec_desc: "[concept_opec] は、加盟国間で石油政策を調整する主要な油産国における [concept_free_trade_agreement] です。 OPECは、石油市場の安定化と国民の産生のための公正なリターンを確保することを目指しています。"

 ### EEC
 io_eec_name: "欧州経済コミュニティ"
 io_eec_abbreviation: "EECとは"
 io_eec_desc: "[concept_eec] は、欧州の加盟国間で共通の市場を確立する [concept_free_trade_agreement] です。 貿易障壁を削減し、経済規則を調和させ、加盟国を横断する商品、サービス、資本、労働の自由な動きを促進します。"
 
 ### Arab League
 io_arab_league_name: "アラブリーグ"
 io_arab_league_abbreviation: "ガラス"
 io_arab_league_desc: "[concept_arab_league] は、アラブ圏の国家の [concept_cultural_pact] で、メンバー間の政治、経済、文化、そして社会的協力を促進する。 リーグは、アラブ州間の共通利息と仲介争議の問題に関する方針を調整します。"

 ### IMF
 io_imf_name: "国際通貨基金"
 io_imf_abbreviation: "メニュー"
 io_imf_desc: "[concept_imf] は、国際通貨の協力、為替レートの安定性、秩序な取引アレンジを促進する [concept_financial_agreement] です。 決済困難の残高に直面している加盟国への金融支援や政策アドバイスを提供します。"

 ### ESA
 io_esa_name: "欧州宇宙庁"
 io_esa_abbreviation: "ESAについて"
 io_esa_desc: "[concept_esa] は、外部空間の探索と利用に専念する [concept_cooperative_agreement] です。 会員は、ローンチ車、衛星、および単一のヨーロッパ諸国が単独で達成できない科学的使命を開発するためのプールリソースを述べています。"

 ### ASEAN
 io_asean_name: "東南アジア諸国連合会"
 io_asean_abbreviation: "アセアン"
 io_asean_desc: "[concept_asean] は、経済成長、社会の進歩、文化的発展を促進する東南アジア諸国の [concept_cooperative_agreement] です。 ASEANは、地域の安定性を促進し、アジア太平洋地域における多国間対話の枠組みを提供します。"

 ### WHO
 io_saarc_name: "南アジア地域協力協会"
 io_saarc_desc: "[concept_saarc] は、地域協力、開発協調、多国間対話を目的とする南アジア諸国の [concept_cooperative_agreement] です。"

 io_cis_name: "独立系米国連邦"
 io_cis_desc: "[concept_cis] は、地域協議、経済協調、および実用的な断続的な連携に焦点を当てたポスト・ソビエト州間の [concept_cooperative_agreement] です。"

 io_who_name: "世界保健機関"
 io_who_abbreviation: "お問い合わせ"
 io_who_desc: "[concept_who] は [concept_cooperative_agreement] で国際医療政策の指示と調整です。 グローバルな健康問題、規範、基準のリーダーシップを提供し、健康の傾向を監視し、国際的な健康緊急事態に対する応答を調整します。"

 ### ═══════════════════════════════════════
 ### TREATIES — Names & Descriptions
 ### ═══════════════════════════════════════

 io_treaty_geneva_name: "ジュネーブ条約"
 io_treaty_geneva_desc: "ジュネーブ条約と呼ばれる一連の条約は、武装紛争中に人道的治療のための国際法の基準を確立する責任があります。 [concept_international_treaty] への署名者は、戦時における傷ついた兵士、戦争の囚人、そして市民を保護することに同意します。"

 io_treaty_cwc_name: "ケミカルウェポン条約"
 io_treaty_cwc_desc: "化学兵器条約は、化学兵器の開発、生産、買収、株式の取得、保持、移転、使用を禁止する[concept_international_treaty]です。 署名者は、国際認証の下で既存の株式を破壊することに同意します。"

 io_treaty_npt_name: "非拡散条約"
 io_treaty_npt_desc: "核兵器の非増殖に関する条約は、核兵器の普及を防止し、解体を促進し、国際保護の下で核エネルギーの平和的な使用を促進することを目的とした[concept_international_treaty]です。"

 io_treaty_bwc_name: "生物的武器条約"
 io_treaty_bwc_desc: "生物学的武器条約は、生物学的および毒素の武器の開発、生産、および貯蔵を禁止する[concept_international_treaty]です。 武器のカテゴリー全体を禁止する最初の多国間分泌条約でした。"

 io_treaty_cat_name: "トーチャーに対する条約"
 io_treaty_cat_desc: "トーチャーに対する条約は、すべての形態のトーチャと残酷、インフマン、または治療または罰を劣化させることを禁止する[concept_international_treaty]です。 署名者は、その管轄区域内の侵入を防ぐための効果的な対策を講じます。"

 ### ═══════════════════════════════════════
 ### NGOs — Names & Descriptions
 ### ═══════════════════════════════════════

 io_iaea_name: "国際原子エネルギー機関"
 io_iaea_abbreviation: "イアヤ"
 io_iaea_desc: "IAEAは、原子力エネルギーの平和な使用を促進し、軍事目的のためにの使用を防止するために働きます。 検査を実施し、技術支援を行い、原子力施設の国際安全基準を設定。"

 io_redcross_name: "国際赤十字"
 io_redcross_abbreviation: "インフォメーション"
 io_redcross_desc: "国際赤十字は、武装した紛争と自然災害における人道支援を提供します。 ジュネーブ条約の遵守を監視し、戦争の囚人を訪問し、分離された家族間の通信を容易にします。"

 io_amnesty_name: "アムネスティ・インターナショナル"
 io_amnesty_abbreviation: "ツイート"
 io_amnesty_desc: "アムネスティ・インターナショナルは、世界中の人権侵害を調査し、調査します。 政治囚人の解放のためのキャンペーン, 骨格の廃止と死刑, 難民や移住者の保護."

