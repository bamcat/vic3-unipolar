 # ── TREATY ARTICLES ──────────────────────
 
 defense_attache: "防衛アタッチ"
 defense_attache_desc: "ターゲット国の武力を持つ軍事顧問およびアリソン役員を埋め込む。 ターゲットは、軍事コストを経験し、削減します。 ソースは、影響力と外交の立っています。 ソースの国は、ターゲットよりも大きい電力投影を維持しなければなりません。"
 
 cultural_exchange: "文化交流"
 cultural_exchange_desc: "文化交流の正式なプログラムを確立 — 展覧会、学術プログラム、そして人々から人々へコンタクト。 両方の国は、移住者に威信、影響力、そしてより魅力的なものを得ます。"
 
 research_partnership: "リサーチ・パートナーシップ"
 research_partnership_desc: "研究プログラムや学術機関の共有に関する正式な合意 両国は、改良された研究スピードと技術の普及から恩恵を受けています。 少なくとも認められた力であるために両者を要求します。"
 
 human_development_collaboration: "人材育成のコラボレーション"
 human_development_collaboration_desc: "医療、教育、福祉など、ターゲットの富裕層国資金開発プログラム。 ソースは、影響と威信の交換で継続的なコストを支払います。 本契約は、原発国の経済がターゲットの下落した場合に破棄します。"
 
 research_partnership_rank_tt: "両国は、研究のパートナーシップを入力する少なくとも認められた力でなければなりません"
 
 # ── DIPLOMATIC ACTIONS ───────────────────
 
 financial_sanctions: "金融制裁"
 financial_sanctions_desc: "[ROOT.GetCountry.GetName] のターゲットとの金融関係を遮断し、クレジット市場へのアクセスをブロックし、証券取引を制限します。 目標の銀行・金融部門が著しく苦しむ。"
 
 condemn: "コンテンツ"
 condemn_desc: "対象となる国の行動を正式に非難する。 ターゲットは、プレステージ、立法、および外交的な評判に永続的なヒットを苦しむ。 重要な親友を持っているターゲットが必要です。"
 condemn_action_notification_name: "[INITIATOR_COUNTRY.GetName] は私たちを非難しました!"
 condemn_pact_desc: "[SCOPE.GetRootScope.GetDiplomaticPact.GetFirstCountry.GetName] は [SCOPE.GetRootScope.GetDiplomaticPact.GetSecondCountry.GetName] を非難しました!"
 condemn_action_notification_desc: "[INITIATOR_COUNTRY.GetName] で非難しました!"
 condemn_break_name:0 "引き込みの非難"
 condemn_pact_desc:0 "この国の行動を非難する。"
 
 propose_un_sanctions: "国連制裁"
 propose_un_sanctions_desc: "永続保安評議会会員として、国連が正式に標的を制裁することを提案する。 投票が通過すると、ターゲットは5年間の厳しい経済罰に直面します。"
 propose_un_sanctions_action_notification_name: "[INITIATOR_COUNTRY.GetName] は私たちに対して国連の制裁を提案しました!"
 propose_un_sanctions_pact_desc: "[SCOPE.GetRootScope.GetDiplomaticPact.GetFirstCountry.GetName] は、[SCOPE.GetRootScope.GetDiplomaticPact.GetSecondCountry.GetName] に対する国際的な制裁のために動きました!"
 propose_un_sanctions_action_notification_desc:1 "[INITIATOR_COUNTRY.GetName] は、国連で行動し、私たちに対する国際制裁を提案しました!"
 
 propose_un_condemnation: "国連非難の反対"
 propose_un_condemnation_desc: "国連は、正式にターゲットを非難することを約束します。 投票が通過した場合、ターゲットは永続的な威信と正当な損害に苦しむ。 制裁よりも厳しい。"
 propose_un_condemnation__action_notification_name:0 "[INITIATOR_COUNTRY.GetName] は、国連の非難の利益を私たちに提案しました!"
 propose_un_condemnation_pact_desc:0 "[SCOPE.GetRootScope.GetDiplomaticPact.GetFirstCountry.GetName] は [SCOPE.GetRootScope.GetDiplomaticPact.GetSecondCountry.GetName] に対する国際的な非難のために動きました!"
