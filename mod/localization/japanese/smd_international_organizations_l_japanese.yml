l_japanese:
 # United Nations
 je_united_nations: "国連"
 je_united_nations_reason: "\n\n国連は、外交、平和、人道的努力のための国際機関として機能します。\n\n永続的セキュリティカウンシルメンバー:\n - [GetGlobalVariable('permanent_members_1').GetCountry.GetName]\n - [GetGlobalVariable('permanent_members_2').GetCountry.GetName]\n\n\n\n[GetGlobalVariable('permanent_members_1').GetCountry.GetName][GetGlobalVariable('permanent_members_1').GetCountry.GetName]\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n<x 国連は外交、平和、人道的な努力のための国際機関として機能します。 国連による決定 — 特にセキュリティ評議会 — あなたの国の将来のイベントに直接影響することができます。"

 # ── PROPOSE BUTTON ────────────────────────
 
 un_propose_motion_button: "決断を提案して下さい"
 un_propose_motion_button_desc: "すべてのメンバーの状態が投票する国連の決議を行います。 解像度が通過すると、すべての国は5年間効果を受け取ります。 年に一度だけ提案できます。"
 un_no_motion_active_tt: "現在、議論中です。"
 
 # ── VOTE BUTTONS ─────────────────────────
 
 un_vote_yay_button: "お気に入り"
 un_vote_yay_button_desc: "[ROOT.GetCountry.GetName] の投票を現在の解像度のお気に入りにキャストします。 恒久的なセキュリティ協議会のメンバーは、ダブルウェイト投票をキャスト."
 
 un_vote_nay_button: "投票する"
 un_vote_nay_button_desc: "現在の解像度に対する[ROOT.GetCountry.GetName]の投票をキャストします。 恒久的なセキュリティ協議会のメンバーは、ダブルウェイト投票をキャスト."
 
 # ── MOTION EVENTS ────────────────────────
 
 un_events.100.t: "国連—決議を申し立てる"
 un_events.100.d: "国連の会員として、[ROOT.GetCountry.GetName] は、総会の決議を決議する場合があります。 議論のために提出する解像度を選択します。 会員の全ての州は、国連ジャーナルのエントリのボタンを使用して通知され、投票することができます。"
 un_events.100.a: "環境保護の決断"
 un_events.100.b: "世界の平和に対する決議"
 un_events.100.c: "経済発展の決議"
 un_events.100.e: "ユネスコ技術に関する決議"
 
 un_events.101.t: "国連 - 議論に基づく決議"
 un_events.101.d: "国連総会で決議を申し立てました。 [ROOT.GetCountry.GetName] は、国連ジャーナルエントリの Yay または Nay ボタンを使って投票をすることができます。 恒久的なセキュリティ協議会のメンバーは、ダブルウェイト投票をキャスト. 結果は120日間で発表されます。"
