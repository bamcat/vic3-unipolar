# canada

canada.1.t:0 "涙の高速道路"
canada.1.d:0 "ブリティッシュコロンビア州のハイウェイ16のストレッチは、一般的に涙のハイウェイと呼ばれ、カナダの悲劇と不幸の象徴となっています。数十人の先住民女性と少女が1970年代から逃れたり、殺害されたりしています。 プリンス・ジョージとプリンス・ルーパートの間にあるリモート・エリアは、長い公共の交通機関が欠如し、多くの人々をヒッチハイクへ向かう - 致命的な結果をもたらします。"
canada.1.f:0 "彼らは(当局)スチールボックスに彼女を置く。 彼らが彼女を発見した方法のために閉鎖した小箱でなければなりません...」 「彼女は...」という言葉を消毒する前に、彼は彼の涙を戻すために一時停止しました。"

canada.1.a:0 "残念ながら、この国に直面する問題はもっと多くあります。"
canada.1.b:0 "お問い合わせ"

je_indigenous_rights: "先住民の権利"
je_indigenous_rights_reason: "先住民の権利の質問は、[ROOT.GetCountry.GetName]の国内政治における最も重要な未解決の問題の1つです。 処分の生成, 強制同化, および壊れた条約の義務は、先住民と非先住民の集団間の深い構造の不等性を残しています. このギャップを閉じると、持続的な政治的意志が必要になります。そして、ステータスのquoの恩恵を受ける人々からの抵抗に直面します。"


 indigenous_je_status_usa_tt: "米国を渡る, 以上 570 連邦公認の部族は、彼らの祖先の亜辞を表す予約土地を占めています. 国民の平均から遠く離れた予約上の生活の期待、教育の達成、および収入。 連邦の信頼責任 — 地方創生と福祉を保護する法的義務 — 十分に満たされていると広く認められています。"

 indigenous_je_status_can_tt: "カナダ初の国連、メティス、およびInuitの人々は、1886年にインド法によって設立された予備のシステムの下に住んでいます。 インドの住宅学校システム — 家族の先住民の子供を強制的に削除し、「同化」する - 1996年まで運営され、最後の学校は最近閉鎖しています。 先天の地形は、今日の先住民のコミュニティを形成し続けています。"

 indigenous_je_status_nzl_tt: "モーリの人々 — タンガタ・アフア、土地の人々 - 1840年にイギリスの王冠とウェイチャンギの条約を署名しました。 決して、その御馳走は完全に名誉を与えられていませんでした。 19世紀の土地の禁忌は、その領土の大部分のマオリのコミュニティを除去し、マオリ・ニュージーランドの人々は、健康、所得、および曝気率の重要な格差に直面しています。 1975年に設立されたWendangi Tribunalは、クラウンに対するクレームを引き続き聞いています。"

 indigenous_je_status_ast_tt: "オーストラリアのアボリジニとトーレス・ストライト・アイランドの人々は、世界最古の連続文化であり、その最も欠点があります。 「ストレンジェネレーションズ」は、1970年代まで続く状態の同化政策の下で、アボリジニの子供たちが強制的に家族から取り除かれました。 先住民族のオーストラリア人のための生活の期待は、全国平均の10年以上残っています。 1992年 マボの決定は、初めてネイティブタイトルを認識しましたが、実装は不均一です。"

 # indigenous.1 — Land Rights
 indigenous.1.t: "先住民族の土地の権利クレーム"
 indigenous.1.d_usa: "部族諸国の石炭は、連邦の土地の重要な魅力への正式な主張権を提出しました, 領土は、条約の義務に反して取られたと主張しています. 請求は、実質的なメディア報道と法的サポートを引き寄せています。 裁判所は見守られているので、より広いネイティブアメリカンコミュニティです。"
 indigenous.1.d_can: "ファースト・ユニオン・バンドは、アボリジニのタイトルを冠地の実質的な領域に主張し、有効な条約が領土への権利を放棄されていないと主張しています。 クレームは連邦裁判所に達しました。 法的専門家は、アボリジニのタイトルに関するカナダの陪審員が著しく進化しており、政府の応答は重要な優先順位が設定されていることに注意してください。"
 indigenous.1.d_nzl: "ウエスタンギー・トリビュナルは、コンテストされた土地の管理において、ウエスタンギーの条約を称えることができないという報告を発行しました。 結果は法的拘束力がないが、重要な道徳的および政治的な重量を運ぶ。 モーオリのコミュニティは、政府がさらなる遅延なく勧告に行動するために呼び出されます。"
 indigenous.1.d_ast: "連邦裁判所は、現在、牧畜の利益にリースされている土地の領域にネイティブのタイトルクレームを侵害しました。 判決は、政府が土地使用権上の主張グループと交渉する必要があります。 牧畜産業グループは、政府が決定を訴えるために懸命に横たわっています。"
 indigenous.1.f: "土地はいつも自分のものでした。 法律がそう言うかどうか質問です。"
 indigenous.1.a: "決済を交渉 — 請求を促す"
 indigenous.1.b: "裁判所でのクレームをコンテスト — 私たちの立場は守秘的です"

 # indigenous.2 — Treaty Obligations
 indigenous.2.t: "レビューに基づく条約の義務"
 indigenous.2.d_usa: "議会報告書は、連邦政府は、毎年数十億ドルの国に条約の義務を満たしていないことが判明しました。 トライバルのリーダーは、連邦の信頼責任と資金ギャップを閉じるコミットメントの正式な見直しを求めています。"
 indigenous.2.d_can: "議会委員会は、歴史的条約の下で義務を負うために、最初の国家のコミュニティの慢性の資金不足を詳述する報告書を表しました。 レポートは、住宅、水インフラ、教育の特定の不足を識別します。 政府は、対応方法を決定しなければなりません。そして、条約全体を作るために必要なリソースをコミットするかどうか。"
 indigenous.2.d_nzl: "モーリのリーダーは、最近の政策決定のシリーズがウエスタンギーの条約の原則に反すると主張する政府に正式な覚書を提示しました。 メモは、リソース管理、ヘルスケア、教育資金の分野における特定の違反を挙げ、すべての政府部門にわたる条約の順守に関する包括的な見直しを求めています。"
 indigenous.2.d_ast: "先住民の権利組織は、政府の発言した約束と実際の資源配分に対するギャップの詳細な分析を発表しました。 報告書は、条約と決済の約束がドルに60セント未満で満たされていると結論付けます。 コミュニティリーダーは、正式な監査と完全コンプライアンスへの結合のコミットメントを要求しています。"
 indigenous.2.f: "紙に書かれている約束は、それを維持する意志と同じくらい良いです。"
 indigenous.2.a: "私たちの義務を完全にほんとう — リソースをコミット"
 indigenous.2.b: "ショートフォールの理解 - 段階的な改善に取り組む"

 # indigenous.3 — Cultural Preservation
 indigenous.3.t: "先住民語への脅威"
 indigenous.3.d: "Linguists は、[ROOT.GetCountry.GetName] の先住民言語の数十人が絶滅の危機に瀕しているという報告警告を公開しています。 多くのケースでは、流暢なスピーカーのみが残っています。 失われたと、これらの言語は回復できません。 それらが口腔の履歴、生態学的知識、法的な伝統、他に存在しない世界を理解する方法に行く。\n\n 問題は、政府がこの軌跡を逆転させるために必要なリソースを投資する準備が整っているかどうかです。"
 indigenous.3.f: "言語は世界です。 その死は不可逆である。"
 indigenous.3.a: "資金調達 先住民言語再生プログラム"
 indigenous.3.b: "これは、政府ではなく、コミュニティのための問題です"

 # indigenous.4 — Health Crisis
 indigenous.4.t: "先住民の健康危機"
 indigenous.4.d: "国民の健康レポートは、[ROOT.GetCountry.GetName] における先住民および非先住民の健康的結果間のスタークギャップを強調しました。 寿命は大幅に下がります。 糖尿病、中毒、精神的な病気の料金 - それらの多くは、世代間外傷に根ざしています - 劇的に高いです。 リザーブとリモートコミュニティの不当な死亡率は、全国平均数が複数回あります。\n\n 医療施設は、文化的に適切で十分な資金を積んだ先住民の健康サービスを求めています。 人生で測定されるインアクションの費用は相当です。"
 indigenous.4.f: "健康の不平等は政治的な選択です。"
 indigenous.4.a: "専用のIndigenousヘルスケアプログラムへの投資"
 indigenous.4.b: "既存の健康システムはすべての市民に均等に利用できます"

 # indigenous.5 — Reservation Conditions (USA/CAN)
 indigenous.5.t: "予約条件"
 indigenous.5.d_usa: "連邦検査官の一般の報告書は、多くのネイティブアメリカン予約の居住条件が国家基準の下の著しいことがわかりました。 ハウジングは覆い、おおいたです。 清潔な飲料水へのアクセスは、何十もの予約に信頼できません。 多くの地域で失業率が50%を超える 報告書は「連邦のネグレクトの危機」という状況を呼び出し、インド局の資金の実質的な増加を勧めます。"
 indigenous.5.d_can: "政府の監査は、何十年にもわたって、最初の国連コミュニティの何百人もの熱湯の顧問下にあると明らかにした。 多大なる埋蔵量は厳重に過ちです。 メンタルヘルスサービスは、大まかに存在します。 監査は、連邦政府は、同等なサービスのために他のカナダ人よりも、ファースト・ユニオン・コミュニティの1人当たり約30%の低さを費やしていると結論付けています。"
 indigenous.5.f: "リザーブシステムが組み込まれたため、サポートしていません。"
 indigenous.5.a: "準備コミュニティのための連邦融資の増加"
 indigenous.5.b: "現在の資金調達レベルを維持 — 予算が許さない"

 # indigenous.6 — Reservation Economic Development (USA/CAN)
 indigenous.6.t: "先住民の土地の経済発展"
 indigenous.6.d_usa: "いくつかの部族の国は、ゲーム運営、リソース抽出パートナーシップ、および観光ベンチャーを含む経済発展のイニシアチブを提案しました。これは、予約コミュニティにとって重要な収益を生み出します。 提案は、連邦の承認を必要とし、隣接する州政府や競争相手を見ている民間の利益から反対に直面しています。 トリバルのリーダーは、経済自給が貧困の唯一の持続可能な道であると主張しています。"
 indigenous.6.d_can: "資源に富んだ地域におけるファースト・ネーション・コミュニティは、資源の抽出に関する収益共有契約を交渉し、その伝統的な地域の近くで検討しています。 いくつかのコミュニティは、林業やエネルギー開発のための地方政府と共同ベンチャーを提案しました。 提案は、経済自給率への道を提供します。しかし、政府が完全に主張した制御と収益を共有するように要求します。"
 indigenous.6.f: "経済基盤のない貧困は空の単語です。"
 indigenous.6.a: "先住民の経済発展をサポート — 提案を承認"
 indigenous.6.b: "既存のリソースの利益を優先する — これらの提案は合併症を作成します"

 # indigenous.20 — Ipperwash
 indigenous.20.t: "Ipperwashの危機"
 indigenous.20.d: "Stoney Point Ojibwe プロテスターは、オンタリオ州にIpperwash Provincial Parkを占拠し、神聖な埋葬地を含む土地を主張しています。これは、軍事基地として使用し、約束どおりに返さなかったために、World War IIのコミュニティから違法に魅了されました。 職業は平和ですが、オンタリオ州の地方の警察は周囲を確立し、進む方法の指導を要求しています。\n\n 状況は緊張しています。 プロテスターの中には武器があります。 また、高齢者、家族、正当な悲しみがあり、50年以上も守られていない。"
 indigenous.20.f: "埋葬地を取った。 戻ったことはなかった。"
 indigenous.20.a: "OPPを注文して占領を分散させる - 注文を復元"
 indigenous.20.b: "OPPを指示して目立つ - 平和な解像度を交渉"

 # indigenous.21 — Last residential school
 indigenous.21.t: "最後の住宅学校は閉鎖します"
 indigenous.21.d: "プンニシャのゴードン・レジデンシャル・スクール, サスカチュワンは、そのドアを閉鎖しました — カナダの最後の連邦政府の住宅学校. 1874年以来、住宅の学校システムは、家族から推定150,000のアボリジニの子供を強制的に削除し、先住民の言語、文化、アイデンティティが積極的に抑制された施設に置き、物理的および性的虐待が広まっていた。\n\n 最後の学校の閉鎖は解像度ではありません。 故意の文化的破壊の章がついに正式に終了したことを認識しています。 生存者はまだその結果と生きています。"
 indigenous.21.f: "最終校は休館日です。 創られた創傷はいません。"
 indigenous.21.a: "カナダの歴史の暗い章は終わっています"

 # indigenous.22 — TRC
 indigenous.22.t: "真実と合意委員会報告"
 indigenous.22.d: "カナダの真実と和解委員会は、その最終報告書を発表しました — インドの住宅学校システムの6,500以上の生存者からの6年間の証言の計算。 報告書は、強制的な同化の政策によって注入された系統的虐待、文化的虐殺、および多世代性外傷を文書化した。\n\n 委員会は、児童福祉、教育、言語、健康、正義の分野における特定の推奨事項を、94の行動へのコールを発行しました。 報告書は「文化の生殖」という用語を使用して、何をしたかを記述します。 政府は、委員会の作業を真剣に受け止めなければならない。"
 indigenous.22.f: "真実は最初のステップです。 信頼は、世代の働きです。"
 indigenous.22.a: "正式にコールをアクションに受け入れる — 調整をコミットする"
 indigenous.22.b: "レポートを承認 — 慎重に行動するコールをレビューする"

 indigenous.10.t: "エクイティに向けてのステップ"
 indigenous.10.d_usa: "米国における肯定的な行動法の制定は、ネイティブアメリカンコミュニティが直面する構造的な不等性に対処するための重要なステップを示しています。 先住民の処分の全範囲への解決策ではありませんが、世代のために永続したギャップを閉じるという有意義なコミットメントを表しています。"
 indigenous.10.d_can: "カナダは肯定的な行動の法律を制定しました — 体系的な不平等が全身の救済を必要とする正式な承認。 ファースト・ユニオン、メティス、イヌイット・コミュニティは、より大きなパズルの1つです。 しかし、それは、先住民の不利な問題の質問を真剣に受け止め、そして政策への意欲を取り戻すために政治的な意思を伝えます。"
 indigenous.10.d_nzl: "ニュージーランドは、MāoriとPākehā New Zealandersの相違点が個々の故障ではなく、歴史的政策の製品ではないことを認め、肯定的な行動法則を制定しました。 Māoriコミュニティにとって、それは意味のあるステップです。しかし、Wendangi Tribunalは、その勧告の多くが未導入のままであるという指摘です。"
 indigenous.10.d_ast: "オーストラリアは肯定的な行動の法律を制定しました — 先住民の欠点の構造的性質を認識する重要な政策シフト。 アボリジニとトーレス・ストライト・アイランド・コミュニティにとっては、進行状況を表しています。 人生の期待、健康的結果、および教育的達成のギャップは一晩閉鎖しませんが、旅行の方向は変更されました。"
 indigenous.10.f: "正義への道は長い。 一歩先を行く。"
 indigenous.10.a: "それは正しいことです"

 indigenous_land_settlement: "土地の権利の決済"
 indigenous_land_settlement_desc: "交渉された土地権の決済は、先住民のコミュニティとの関係を改善し、政府の立法を強化しました。"

 indigenous_land_contested: "土地権利コンテスト"
 indigenous_land_contested_desc: "裁判所の先住民族の土地権を争う決定は、先住民のコミュニティとの緊張が増加しました。"

 indigenous_treaty_honoured: "条約の義務 Honoured"
 indigenous_treaty_honoured_desc: "条約の義務の完全順守は、先住民のコミュニティに立っている政府の立法を強化し、改善しました。"

 indigenous_treaty_partial: "条約の義務部分的にメット"
 indigenous_treaty_partial_desc: "条約の義務に対する部分的なコンプライアンスは、先住民の権利擁護者に満足していません。"

 indigenous_cultural_investment: "先住民文化投資"
 indigenous_cultural_investment_desc: "先住民の言語と文化プログラムのための政府の資金調達は、コミュニティレジリエンスをサポートしています。"

 indigenous_health_investment: "先住民の健康プログラム"
 indigenous_health_investment_desc: "先住民の医療プログラムは、先住民のコミュニティにおける健康的成果を改善しています。"

 indigenous_health_cost: "先住民保健プログラム費用"
 indigenous_health_cost_desc: "新規の先住民医療プログラムは、健康予算に関する追加の要求を配置しています。"

 indigenous_health_neglect: "先住民の健康のNeglect"
 indigenous_health_neglect_desc: "先住民の健康の格差に対処することができないことは、継続的な不満を発生させます。"

 indigenous_reservation_investment: "準備コミュニティ投資"
 indigenous_reservation_investment_desc: "リザーブコミュニティの連邦融資の増加は、生活基準のギャップを閉じ始めています。"

 indigenous_reservation_cost: "資金調達費用の確保"
 indigenous_reservation_cost_desc: "増加された予備コミュニティの資金は、連邦予算を負担している."

 indigenous_reservation_neglect: "準備コミュニティネグレクト"
 indigenous_reservation_neglect_desc: "準備コミュニティの慢性的な資金不足は、不満と国際批判を生成し続けています。"

 indigenous_economic_development: "先住民経済発展"
 indigenous_economic_development_desc: "先住民の経済発展への取り組みのサポートは、コミュニティの収益を創出し、自給能力を向上させることです。"

 indigenous_economic_blocked: "先住民経済発展ブロック"
 indigenous_economic_blocked_desc: "先住民の経済発展の提案の拒絶反応は、ファースト・ネーション・コミュニティとの関連性が損なわれています。"

 ipperwash_crackdown: "Ipperwashのクラックダウン"
 ipperwash_crackdown_desc: "Ipperwashの先駆者の激しい分散は、国内および国際評論家を生成しました。"

 ipperwash_negotiation: "Ipperwashは平和に解決しました"
 ipperwash_negotiation_desc: "イッパーウォッシュスタンドオフの平和な解像度は、先住民のコミュニティとの政府の信頼性を高めています。"

 indigenous_residential_school_closed: "最終住宅学校閉鎖"
 indigenous_residential_school_closed_desc: "最後のインドの住宅学校の閉鎖は、文化的な破壊の政策の正式な終わりをマークします。"

 trc_accepted: "真実と承諾された承諾"
 trc_accepted_desc: "カナダの真実と合意委員会の行動への適合の正式な受諾は、住宅学校の遺産に対処するための重要なコミットメントを表しています。"

 trc_enactment_bonus: "コンプライアンス宣言"
 trc_enactment_bonus_desc: "真実と和解プロセスの勢力は、先住民の権利に関する法律を渡すことが容易になります。"

 trc_partial: "TRC 承認済み"
 trc_partial_desc: "政府は、真実と合意委員会の報告を認めていますが、行動へのコールの実装にコミットしていません。"

 indigenous_rights_progress: "先住民の権利の法律"
 indigenous_rights_progress_desc: "肯定的な行動法の制定は、先住民の欠点に対処するための有意義なコミットメントを表しています。 ギャップは一晩閉じませんが、ポリシーの方向は変更されました。"


# japan

japan.1.t: "福島原発事故"
japan.1.d: "福島第一原子力発電所は、大震災と津波に続いて、環境に放射性物質を放出し、大災害に遭った。 災害は、原子力安全と緊急の準備に関する世界的な議論を促し、世界に衝撃を与えました。"
japan.1.a: "国家の悲劇 — グローバルなウェイクアップコール。"

fukushima_nuclear_disaster: "福島原発事故"
fukushima_nuclear_disaster_desc: "福島第一工場へのダメージは、放射性汚染、インフラの破壊、長期にわたる国家の復興につながっています。"

# south sudan

southsudan.1.t: "南スーダン独立紹介"
southsudan.1.d: "何十年にもわたって、紛争と決定的な国民投票の後、スーダンの南州は、南スーダン共和国を形成するために分かち合っています。 Khartoumの中央政府は、致命的な選択に直面しています:新しい国を受け入れるか、それを復活させるために戦争に行く。"
southsudan.1.a: "Sudanは分割できません。"
southsudan.1.b: "平和の日本酒のために、行く。"

# russia

first_chechen_war: "最初のチェチェン戦争"

russia_parliament_resisting: "議会の抵抗"
russia_military_loyality: "軍隊のComplicit"
russia_parliamentary_support: "議会支援"
russia_constitution_crisis_resolved_mod: "クリシス・アバート"

je_russian_constitutional_crisis: "ロシア憲法危機"
je_russian_constitutional_crisis_reason: "1993年(1993年)はロシアを政治崩壊の危機に陥りました。\n\n ボリス・イェルツシン大統領は、執行機関を集約しようとすると、ロシア議会の解散を注文し、改革を妨害し、民主化に抵抗するメンバーを非難しました。 議会は、順番に、Yeltsinの不法を宣言し、その原因に対する支持者を捨て、ラリーすることを拒否しました。\n\n 数週間にわたって, ライバルの事実としてマウント張力は、軍事のさまざまな要素の裏付けを得ます, セキュリティの力, 一般的な公共. 政府の器具は、ロシア連邦の運命を決定する執行または立法的な枝のいずれかに忠誠で、骨折を、。\n\n この対面は政治争議よりも大きい — ソ連時代のロシアの統治の非常に性質上の戦いです。 モスクワの心臓の危機は、制御不能で、市民の暴力は可能であるだけでなく、避けられない。"

je_russia_wild_nineties: "野生のネタイ"
je_russia_wild_nineties_reason: "「野生のニネシーズ」(ロシア: Лиедевяностые、Likhiye devyanostyye)は、ネガティブな評価の観点から、1990年代のソ連とロシア連邦の形成の崩壊後の移行期間を特徴とする用語です。 \n\n ソ連のルールから資本主義の民主主義へのロシアの乱流は、不安定性、腐敗、暴力の波を解明しました。 初期のポスト・ソビエトの年は、経済崩壊、オリグアークの上昇、政治のショーダウン、および組織犯罪のサージによってマークされています。\n\n パーリアメントの殻からプリバタイゼーションスキャンダルまで、毎月新しい重宝をもたらすようです。 改革とカオスの国テター、そして人々の忍耐は薄く身に着けています。"

rus_events.0.t: "1993 ロシア憲法危機の始まり"
rus_events.0.d: "プレジデント・ボリス・イェルツシンは、ロシアの議会を解明し、民主的な改革を妨害し、連盟の安定性を脅かすことを非難しました。 議会は、軍と市民が抵抗するために、無条件の移動を宣言しました。\n\nMoscowは、ライバルのファクションラリー彼らの支持者として対立するための支柱です。 ロシアの脆弱な民主主義の運命は今バランスでぶら下がります。"
rus_events.0.a: "国民は息を呑む。"

1993_russian_crisis_tt: "危機は終了しました"
rus_events.1.t: "憲法危機"
rus_events.1.d: "イェルツシン大統領は議会の解散を発表しましたが、法律家は、ステップダウンを拒否し、ホワイトハウスで自分自身をbarricading。 テンシオンは急速に拡大しています。"
rus_events.1.a: "社長とともに"
rus_events.1.a.tt: "軍は、役員を取り戻します。"
rus_events.1.b: "議会を支援"
rus_events.1.b.tt: "レギュスラチュアルの権威を守ります。"

rus_events.2.t: "軍隊は大統領を支持します"
rus_events.2.d: "武装した力は通りの制御を取られた、議会の建物を殻で覆い、Yeltsinの権限を保障しました。"
rus_events.2.a: "危機は終わっています。"

rus_events.3.t: "議会の勝利"
rus_events.3.d: "執行者からの圧力にもかかわらず、議会は人気のあるサポートを誘発し、その力を保持しています。"
rus_events.3.a: "危機は終わっています。"

rus_events.4.t: "ホワイトハウスの収納"
rus_events.4.d: "モスクワは混乱しています。 プロの軍は、議会のリーダーシップに家、ロシアの白い家を囲んで、タンクと小さな腕で火を開いた。 上層階から建物が覆いになっているため、スモークの廊下。 最終的な抵抗は、軍事力がコントロールを押下し、スタンドオフの端をマークするにつれて崩壊します。しかし、生活のコストと国の政治の無知性で。"
rus_events.4.a: "注文は復元されます。"

# chechnya

je_first_chechen_war_reason: "第一チェチェン戦争は、ロシア連邦がイチェチェン共和国の断片を再び制御しようとすると、1994年後半に始まりました。\n\n 紛争は、北Caucasus.\n\nのGuznyとワイドスプレッド・デバステーションの激しい都市の戦闘で、生活とリソースに高価であることを証明します。 明確な勝利なしで戦争を終わらせることは、政府の信頼性を損なう可能性がありますが、戦いのリスクを延ばすことは、不安定性を延ばすことができます。"
je_first_chechen_war: "チェチェン戦争"
chechen_war_resolved: "チェチェン戦争は解決しました"

chechen_events.1.t: "チェチェンヤの戦争"
chechen_events.1.d: "ロシア軍は、連邦政府の制御を回復するためにチェチェンヤに入りました, 迅速な操作であることが期待されているものから始まります. しかし、山の地形と局所の抵抗は、これを長期にわたる対立に変える可能性がある。"
chechen_events.1.a: "注文を復元します。"

chechen_events.2.t: "Groznyの攻撃"
chechen_events.2.d: "Groznyの戦いは始まりました。ロシア軍はチェチェンの首都を台無しにしようとしています。 戦力は強烈で、両面に重厚なカジュアル性があります。"
chechen_events.2.a: "費用に関係なく、転送を押します。"

chechen_events.3.t: "Chechnyaの平和トーク"
chechen_events.3.d: "戦後、両面で戦力が育つ。 消火炎の提案は、テーブルの上に置かれ、血流に終端を提供します。"
chechen_events.3.a: "平和を受け入れ、力を引き出します。"
chechen_events.3.b: "勝利まで戦争を続ける。"

# haiti

uphold_democracy: "稼働率の民主主義"

haiti_events.1.t: "稼働率の民主主義"
haiti_events.1.d: "1994年9月、米国は、1991年、ジャン・ベルトランド・アリストイド大統領の民主的に選出された大統領を復元するために、ハイチの軍事介入を開始しました。 米国軍は、国際同盟国、保護されたキー領域によって支持され、アリスドのリターンのための方法を残す。"
haiti_events.1.a: "民主主義を回復するために力を配備して下さい。"
haiti_events.1.b: "外国の軍隊の準備をします。"

haiti_events.2.t: "外国トロップ到着"
haiti_events.2.d: "アメリカ軍は、戦略的な場所の制御を取る、ハイチに上陸しました。 介入は民主主義のガバナンスを回復する手段として正当化されますが、それは社会と外国の影響に関する質問を提起します。"
haiti_events.2.a: "脱血を避けるために協力しなければなりません。"

je_haiti_political_crisis: "ハイチ政治危機"
je_haiti_political_crisis_reason: "1990年にJean-Bertrand Aristide大統領の民主選挙の後、Haitiは楽観主義の短い瞬間を経験しました。 しかしながら、軍のクープが国家を政治的混乱に陥るときに、脆弱な安定性は1991年9月に粉砕されました。\n\n 軍事政権は、人権の乱用や政治的抑圧が広まっているため、国際的な非難に直面しました。 国連とアメリカの組織によって課される経済の制裁は、ハイチのすでに苦労している経済に深刻な影響を与えました。\n\n 1992年から1993年にかけて、軍のユンタとアリストディドの支持者の間で交渉を行い、政治相手に対する暴力と一般人口の激化が進んでいます。 ハイチの国連ミッション(UNMIH)によって、民主主義のガバナンスを取り戻すための試み。\n\n 1994年、国際コミュニティからの圧力を取り付け、特に米国は、直接介入のためのステージを設定します。 オペレーション・アップホールド・民主主義は、1994年9月に米国軍によって主導され、権威を回復し、ジャンタの規則に終端をもたらすことを目的としています。"

# quebec
# [GetPlayer.MakeScope.GetVariable('quebec_happiness_var').GetValue|0]

je_quebec_happiness: "ケベック州の状況"
je_quebec_happiness_reason: "カナダ内のケベック州の州は、数十年にわたり文脈問題となっている。 ケベックの異なる文化、言語、歴史は、自律性と独立性に関する議論が頻繁に行われています。\n\n 1995年のケベック・レファレンダムに通じる年、カナダのケベックと連邦政府の関係は、緊張、交渉、そして国家主の感情の時折欠陥によってマークされています。\n\n ケベック州の州, そのユニークなフランス語圏の大半と異なる文化的アイデンティティを持ちます, 自治のために提唱の長い歴史, 定期的にカナダの連盟内の場所を再定義する必要があります. 一部のケベックオイスは、完全な独立性を望む, 他の人は、増大した地方の電力を望む, 多くはまだ統一されたカナダで残っているサポート.\n\n首相として, あなたのタスクは、この繊細な状況をナビゲートすることです. あなたは、ケベックの文化的および政治的願望を尊重して、国家の団結をバランスしなければなりません。 言語の法律、経済政策、文化的投資に関するあらゆる決定は、ケベックオイスの人口の幸福に影響を及ぼします。\n\n ケベック・ハッピネスのスコアが高かった場合、カナダに滞在する投票で国民投票が終わることがあります。 しかし、不満が強すぎると、ケベックの人々は、北米の地図を永遠に変えるために、独立のために投票することができます。"
quebec_happiness_bar_desc: "フランコ・カナディアン・幸福"
quebec_happiness_monthly_tt: "ケベックの幸福の月間変化。"
quebec_happiness_bar:0 "ケベックの独立性のサポート"
recently_pissed_quebec_off:0 "最近はケベックを怒らせていない"

too_many_quebec_concessions: "あまりにも多くの凹凸; ケベック人ユニプレス"
quebec_happiness_10: "#green #! Franco-Canadian Happiness #green 5#! ポイント"
quebec_happiness_minus_10: "#r Decreases#! #r 5#! ポイントによる Franco-Canadian Happiness"

quebec.6.t: "ケベック州での対応"
quebec.6.d: "ケベック州の圧倒的な満足度で、連邦政府は多岐に渡ります。 オタワは、統一的な質問が解決されていると信じています, しかし、そのような過信は、他の重要な問題の無視につながる可能性があると批判."
quebec.6.a: "タマナック!"

complacent_on_quebec: "ケベック州での対応"
complacent_on_quebec_desc: "ケベック州の高い支援により、政府は交渉と政策の注意に集中し、他の事実から批判を成長させました。"
 
quebec_concessions_button: "ケベックに必要を作る"
quebec_concessions_button_desc: "ケベックに政治的かつ文化的な譲歩を提供し、幸福度を高めます。"

quebec_ignore_button: "ケベックの需要を無視"
quebec_ignore_button_desc: "ケベックの政治的要求に従事し、幸福を減少させます。"

quebec.1.t: "ケベック州のテニオン"
quebec.1.d: "政治の緊張は、自律性と言語の権利に対する議論としてケベックで上昇します。"
quebec.1.a: "ケベックへの保証を提供します。"
quebec.1.b: "国民の団結の立場の会社。"

quebec.2.t: "1995年 ケベック・レジェンダム"
quebec.2.d: "議論の年後、ケベックはカナダの一部を残したり、独立した国になるかどうかを投票します。"
quebec.2.a: "人格が統一されています。"
quebec.2.b: "ケベックは独立のために投票!"

quebec.3.t: "フランスの言語争訟"
quebec.3.d: "連邦政策の提案は、多くの市民から離れる、ケベックのフランス語のステータスを減らすために脅迫します。"
quebec.3.a: "すべての費用でフランス語の言語を保護します。"
quebec.3.a.tt: "ケベックの幸福は #G +8#! によって増加します。"
quebec.3.b: "現在の方針を維持して下さい。"
quebec.3.b.tt: "ケベック 幸福は #R -5#! で減少します。"
quebec.3.b.tt2: "より多くの必要を作るために許可されます"

quebec.4.t: "連邦資金調達はケベックにカット"
quebec.4.d: "連邦政府は予算の圧力に直面し、インフラとサービスのケベックの資金は、刻印ブロックにあります。"
quebec.4.a: "切口で受ける。"
