 wot_coalition.2.t:0 "第5条 請求"
 wot_coalition.2.d:0 "米国での攻撃を受けて、NATOは第5条に違反しました。 同盟は、すべてのメンバーに攻撃として攻撃を処理します。"
 wot_coalition.2.f:0 "北大西洋連合は、集団防衛のために建てられました。 その最初の呼び出しは、国境を越えるタンクではなく、テロ攻撃から来る。"
 wot_coalition.2.a:0 "アメリカに立ち向かう"

 wot_coalition.10.t:0 "米国は協力を求めています"
 wot_coalition.10.d:0 "米国はテロの戦争でパキスタンの協力を要求しました。 ワシントンは、軍事アクセス、権利のバッシング、インテリジェンスサポート、およびアフガニスタンへの物流ルートを期待しています。"
 wot_coalition.10.f:0 "パキスタンの地理は欠かせません。 しかし、イスラーマバードがテロリズムを遮るという告発を招きます。"
 wot_coalition.10.a:0 "石炭との協業"
 wot_coalition.10.b:0 "ultimatum を再利用します。"

 wot_coalition.11.t:0 "パキスタン協力"
 wot_coalition.11.d:0 "パキスタンは、アフガニスタンのキャンペーンの軍事アクセスと軍事基地を付与し、米国と連合のパートナーと協力して合意しました。"
 wot_coalition.11.f:0 "アフガニスタンへの道は今パキスタンを経由して走っています。"
 wot_coalition.11.a:0 "ルートの確保"

 wot_coalition.12.t:0 "パキスタンリユース"
 wot_coalition.12.d:0 "パキスタンは、アメリカの協力要請を拒否しました。 ワシントンは今、テロのパキスタンのコンプリシットをラベル付け、直接軍事行動を準備します。"
 wot_coalition.12.f:0 "Refusal は、ロジスティックパートナーをターゲットに変換します。"
 wot_coalition.12.a:0 "自分の側に選ばれました。"

 wot_article_5_join_war_tt:0 "このNATO会員は、アフガニスタンに対する活動的な戦争で米国に加わります。 戦争がまだ始まっていない場合は、戦争が始まると参加します。"
 wot_pakistan_cooperate_tt:0 "パキスタンは、米国とすべての石炭のパートナーと10年間の条約を結び、#bold軍事アクセス#!と#boldホスト軍基地#!を付与します。"
 wot_pakistan_refuse_tt:0 "米国は、パキスタンに対する政令変更戦争を発足し、テロリズムにそれを適合させるラベルを発足させました。"

 wot_pakistan_coalition_access_treaty_name:0 "テロ条件アクセス協定の戦争"
 operation_enduring_freedom_pakistan:0 "運用終了の自由 - パキスタン"

 wot_article_5_commitment:0 "第5条 約束"
 wot_article_5_commitment_desc:0 "この国は、9月11日以降、NATOの応答に取り組みました。"

 wot_pakistan_cooperation:0 "教育協力"
 wot_pakistan_cooperation_desc:0 "パキスタンは、テロの戦争で米国と連合のパートナーと協力しています。"

 wot_pakistan_complicit:0 "テロリズムのラベル付きコンプリート"
 wot_pakistan_complicit_desc:0 "パキスタンは、協力を拒否し、米国テロリズムのコンプリシットとして扱われています。"

 wot_coalition.20.t:0 "ノーザン・アライアンスがコーディションに参加"
 wot_coalition.20.d:0 "ノーザン・アライアンスは、アフガニスタンのタリバン政権に対するカブールを配備し、アメリカン主導のキャンペーンに参加しました。"
 wot_coalition.20.f:0 "タリバンは現在、外部の石炭と国内の敵を一度に直面しています。"
 wot_coalition.20.a:0 "カブールのアドバンス。"

