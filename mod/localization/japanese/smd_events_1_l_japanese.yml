 je_io_eec_membership_process_reason:0 "EECに参加するには、通常のメンバーシップ投票が必要です。 申請者は、欧州規格の貿易、行政、民主機関を揃えなければなりません。"
 io_eec_membership_status_reforming:0 "変形は進行中です。"
 io_eec_membership_status_ready:0 "アクセス要件を満たしています。"

 je_io_eu_membership_process:0 "EUアクセスプロセス"
 je_io_eu_membership_process_reason:0 "EUへの参加には、通常の国際機関よりも深いアクセスプロセスが必要です。 応募者は、民主主義、市民権、市場、行政基準を満たす必要があります。"
 io_eu_membership_status_reforming:0 "変形は進行中です。"
 io_eu_membership_status_ready:0 "アクセス要件を満たしています。"

