 intifada_events.1.t: "紛争エスカレート"
 intifada_events.1.d: "アップリスイングは、ストリートラッシュを超えてエスカレーションしています。 ストーンやプロテスとして始まったのは、完全な対立です。 パレスチナの狭い路地と避難所では、すべての建物は要塞であり、すべての通りは戦場です。"
 intifada_events.1.a: "注文を取り戻す"
 intifada_events.1.a.pal: "抵抗を止めない"

 intifada_events.2.t_isr: "Intifada 終了"
 intifada_events.2.d_isr: "第2回Intifadaが抑制されました。 イスラエル軍の手術はパレスチナの領土の上に再調整されていますが、国際的な評判とパレスチナ人の市民生活のコストは巨大でした。 根本的な悲嘆は未解決のままです。"
 intifada_events.2.t_pal: "パレスチナの抵抗の Prevails"
 intifada_events.2.d_pal: "第2回 Intifada は不可能なものを達成しました。 貧しい決意と犠牲を通して、パレスチナ人はイスラエルに交渉テーブルを強制しています。 世界は、職業に対する人気の抵抗のパワーを目撃しました。"
 intifada_events.2.a: "次は?"

 intifada_events.5.t: "ストリートクラッシュ"
 intifada_events.5.d: "イスラエルのチェックポイントの端に若いパレスチナ人が集まりました。石と燃えるタイヤで武装しています。 狭い通りは、イスラエルの装甲車両が効果的に操縦できない、近隣の闘争に対峙する。 世界中からのテレビカメラがシーンを記録しました。"
 intifada_events.5.a: "抵抗を増強して下さい"
 intifada_events.5.b: "拘束を表示する"

 intifada_events.6.t: "チェックポイントレイド"
 intifada_events.6.d: "イスラエル軍は、パレスチナのコミュニティを分割し、職業のシンボルと戦術的なターゲットを提示します。 調整されたストライキは、過酷な再帰を招くであろうが、地域内の移動のイスラエル制御を混乱させる可能性があります。"
 intifada_events.6.a: "チェックポイントを打つ"
 intifada_events.6.b: "トオ危険な"

 intifada_events.8.t: "国際メディアカバレッジ"
 intifada_events.8.d: "国際メディアアウトレットは、世界中に広がる放送映像です。 イスラエル軍部隊に立ち向かうパレスチナ市民の情景は、世界中の首都で実証と非難を浴びています。 アラブリーグの国家はパレスチナ原因の背後にあるラリーであり、イスラエルは外交的な圧力を取り付けている。"
 intifada_events.8.a: "世界が観ている"

 intifada_events.7.t: "第2回イニファダ"
 intifada_events.7.d: "パレスチナの領土は噴火しました。 絶え間ない平和交渉と継続的な決済拡大の年後、パレスチナ人の不満は、開放的な危機に瀕しています。 ガザと西銀行の丘陵地帯の窮屈な通りに、新たな世代が闘争を起こします。"
 intifada_events.7.a: "これは世代を定義します"

