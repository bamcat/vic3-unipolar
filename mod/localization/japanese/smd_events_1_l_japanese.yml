 io_accession_events.1.t:0 "EECアクセス完了"
 io_accession_events.1.d:0 "弊社の改革は、EEC会員の要件を満たしています。 欧州経済枠組みに入りました。"
 io_accession_events.1.a:0 "EECにご参加ください。"

 io_accession_events.2.t:0 "EUアクセス完了"
 io_accession_events.2.d:0 "当社のアクセスプロセスが完了します。 欧州連合に加盟し、政治と経済の枠組みに入りました。"
 io_accession_events.2.a:0 "欧州連合にご参加ください。"

 io_accession_events.3.t:0 "EECアクセスハライド"
 io_accession_events.3.d:0 "EECアクセスプロセスは、政府が民主的な基準から離れられた後に崩壊しました。"
 io_accession_events.3.a:0 "プロセスは終わる。"

 io_accession_events.4.t:0 "EUのAccessionのHalted"
 io_accession_events.4.d:0 "政府が民主主義の基準から離れられた後、EUアクセスプロセスが崩壊しました。"
 io_accession_events.4.a:0 "プロセスは終わる。"

 io_accession_events.10.t:0 "NATOから抜粋"
 io_accession_events.10.d:0 "権威ある法律の採用により、NATOの会員資格の継続は不可能となりました。 アライアンスは、メンバーと私たちを誹謗中傷させ、防御的な行動を撤退しました。"
 io_accession_events.10.a:0 "一人で立ち寄ります。"

 io_accession_events.11.t:0 "EEC から抜粋"
 io_accession_events.11.d:0 "権威ある法律の採用は、欧州の協力の政治的期待に反しています。 EECからのお知らせ"
 io_accession_events.11.a:0 "です。"

 io_accession_events.12.t:0 "欧州連合(EU)より抜粋"
 io_accession_events.12.d:0 "権威ある法律の採用は、欧州連合の民主的基準に違反しています。 弊社はユニオンよりお買い求めいただいております。"
 io_accession_events.12.a:0 "ユニオンは消えます。"

 io_accession_events.13.t:0 "G7から脱出"
 io_accession_events.13.d:0 "権威ある法律の採用は、G7の政治的に受け入れられない継続的会員となりました。 グループから削除しました。"
 io_accession_events.13.a:0 "ディプロマチックセットバック。"

 io_accession_events.20.t:0 "NATO民主主義標準警告"
 io_accession_events.20.d:0 "政府は権威ある法律を採用しています。 これらの法律が残っている場合、NATO会員は、次の審査時に再発します。"
 io_accession_events.20.a:0 "わたしたちは警告をしました。"

 io_accession_events.21.t:0 "EEC民主主義標準警告"
 io_accession_events.21.d:0 "政府は権威ある法律を採用しています。 これらの法律が残っている場合は、次のレビュー中にEEC会員が退会します。"
 io_accession_events.21.a:0 "わたしたちは警告をしました。"

 io_accession_events.22.t:0 "EUの民主主義の標準的な警告"
 io_accession_events.22.d:0 "政府は権威ある法律を採用しています。 これらの法律が残っている場合、EUの会員は、次の審査中に再発されます。"
 io_accession_events.22.a:0 "わたしたちは警告をしました。"

 io_accession_events.23.t:0 "G7民主的標準警告"
 io_accession_events.23.d:0 "政府は権威ある法律を採用しています。 これらの法律が残っている場合、G7 会員は、次の審査中に再発されます。"
 io_accession_events.23.a:0 "わたしたちは警告をしました。"

 io_democratic_standards_warning:0 "民主主義の標準的な警告"
 io_democratic_standards_warning_desc:0 "この国は、その権威ある法律が民主的国際機関の会員を脅かす可能性があると警告しています。"

 io_expelled_from_democratic_org:0 "民主団体からのお知らせ"
 io_expelled_from_democratic_org_desc:0 "この国は、権威ある法律を採用した後、国際機関から暴露されています。"
 
 intifada_2005.1.t:0 "第2回イニファダウインドダウン"
 intifada_2005.1.d:0 "持続的な暴力、疲労、セキュリティ対策、外交的な圧力、政治的変化の年後、クローズアップに追いつく。"
 intifada_2005.1.f:0 "紛争は解決しませんが、オープン・インティファダのフェーズは終了しました。 火災は、次のものの傷つき、疑わしい、そして不確実な両側を残します。"
 intifada_2005.1.a:0 "白い平和を受け入れる。"

 intifada_2005.2.t:0 "第2回イニファダウインドダウン"
 intifada_2005.2.d:0 "戦いはあふれ、上りは新しく、より静かな段階に入りました。"
 intifada_2005.2.f:0 "最終決済に達していないが、エスカレーションはそれ自体を焼く。"
 intifada_2005.2.a:0 "闘争は他の手段によって続く。"

 intifada_2005_ceasefire:0 "セカンド・イニファダ・セファイヤー"
 intifada_2005_ceasefire_desc:0 "第2回 Intifada のオープンフェーズは、壊れやすいストップファイヤーで終了しました。"
 
 arab_spring_jihadist_breakaways.1.t:0 "イスラムの州のエマージ"
 arab_spring_jihadist_breakaways.1.d:0 "革命と状態の崩壊の混乱は、イスラーム州の旗の下に領土を集約するジハディストの力を許可しました。"
 arab_spring_jihadist_breakaways.1.f:0 "古い状態は革命と戦う。 革命は古い状態と戦う。 それらの間の遺跡では、第三の力は、そのフラグを上げます。"
 arab_spring_jihadist_breakaways.1.a:0 "新しいフロントが開きます。"

 arab_spring_jihadist_breakaways.2.t:0 "ジハディスト・エンクレーブ・エマーン"
 arab_spring_jihadist_breakaways.2.d:0 "アラビアの春は地域を悪化させるにつれて、ジハディスト細胞は散らばる領域を分離し、イスラム国家に忠誠を宣言しました。"
 arab_spring_jihadist_breakaways.2.f:0 "状態が引き出すと、武装したネットワークが管理されます。"
 arab_spring_jihadist_breakaways.2.a:0 "危機は広がります。"

 arab_spring_jihadist_breakaways.3.t:0 "ホウシス・セイズ・テリトリー"
 arab_spring_jihadist_breakaways.3.d:0 "イェメニの革命は、国を破壊し、ホティの動きが領域を分離し、独自の力を動員できるようにしました。"
 arab_spring_jihadist_breakaways.3.f:0 "アップライシングは、反対の1つを生成しなかったが、多く。"
 arab_spring_jihadist_breakaways.3.a:0 "イェメンのスプリンター。"

