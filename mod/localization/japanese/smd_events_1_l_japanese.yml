 czh_federal_strain: "連邦株"
 czh_federal_strain_desc: "憲法危機は、連邦の機関を弱める。 レギュティマシーは、侵食と法律の制定は、フェデレーションの質問の半分が中心の権威であるほど困難です。"
 
 czh_slovak_subsidy: "スロバキア経済支援プログラム"
 czh_slovak_subsidy_desc: "連邦資金は、移行を通じてSlovak経済をサポートするためにリダイレクトされています。 高価 — しかし、それは政治的温度を改善しました。"
 
 czh_federal_authority_asserted: "連邦当局は、"
 czh_federal_authority_asserted_desc: "連邦政府は、Slovak宣言を非難し、連邦法のsupremacyを主張しました。 権威は圧倒されるが、Slovakの怒りは強化された。"
 
 czh_autonomy_negotiations: "自律性交渉"
 czh_autonomy_negotiations_desc: "フォーマルな話は、フェデレーション内でスロバキアのより大きな自律性を提供する途中です。 プロセスは政治的気候を改善しました。"
 
 czh_confederation_talks: "会議の提案"
 czh_confederation_talks_desc: "ゆるみの告白モデルは交渉されています。 両側は話しています。 結果は不確実ですが、解散に向けた勢いは遅くなっています。"
 
 czh_referendum_blocked: "紹介 プレス"
 czh_referendum_blocked_desc: "独立宣言書の呼び出しは拒否されました。 政治家や市民社会が怒りに反応した。 政治的な圧力が消えていない - それは出口を拒否されています。"
 
 czh_federal_union_preserved: "連邦連合保存"
 czh_federal_union_preserved_desc: "憲法上の危機が亡くなりました。 [ROOT.GetCountry.GetName] を一緒に保持しました。 交渉された決済は、連邦政府機関と組合における公共の自信を強化しました。"
 
 czc_new_republic_founding: "チェコ共和国"
 czc_new_republic_founding_desc: "チェコ共和国は、独立国家として設立されました。 国際的な認識はすぐにあります。 新たに公開する基礎は安定しています。"
 
 svk_new_republic_founding: "スロバキア共和国"
 svk_new_republic_founding_desc: "Slovak Republicは、社会的な状態として設立されました。 歴史の中で最初の完全に独立したスロバキアは、その足を見つけることです。"
 
