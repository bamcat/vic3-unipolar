 je_israel_palestine_peacetime:0 "不安なステータスキュー"
 je_israel_palestine_peacetime_reason:0 "開口部や主要なエスカレーションはありませんが、セキュリティのコーディネート、閉鎖、外交、実証、定期的なインシデントを通じて対立が続きます。"
 je_israel_palestine_tension_bar:0 "紛争の緊張"
 je_israel_palestine_tension_bar_desc:0 "地域不安定性"
 je_israel_palestine_tension_bar_second_desc:0 "高張力は、主要なエスカレーション警告をトリガーし、第二のIntifadaシステムに接続することができます。"

 je_ip_peacetime_status_calm:0 "状況は比較的落ち着きます。 セキュリティの調整、交渉、および国際的仲介は、湾でより広いエスカレーションを維持しています。"
 je_ip_peacetime_status_fragile:0 "落ち着きは壊れやすい。 インシデント、レイド、クロージャ、デモンストレーション、または決済の紛争は、現在の残高をすぐに解除できます。"
 je_ip_peacetime_status_crisis:0 "状況は主要なエスカレーションの端にあります。 ステータスのクオを破るには、単一のインシデントが十分かもしれません。"
 je_ip_peacetime_complete_tt:0 "張力は非常に低く、交渉は高度であり、保証調整は耐久です。"

 je_ip_peacetime_security_coordination:0 "セキュリティコーディネート"
 je_ip_peacetime_security_coordination_desc:0 "地域の事故がより広い危機になるのを防ぐため、実用的な調整を拡大します。 これは緊張を下げますが、国内の政治バックラッシュを作成することができます。"

 je_ip_peacetime_closure_policy:0 "閉鎖ポリシー"
 je_ip_peacetime_closure_policy_desc:0 "動きを締め、即時のセキュリティリスクを減らすために制御にアクセスして下さい。 短期集中力が低下しますが、パレスチナの経済を損なうため、国際圧が増加します。"

 je_ip_peacetime_settlement_freeze:0 "決済フリーズ"
 je_ip_peacetime_settlement_freeze_desc:0 "決済拡大に関する一時的な凍結を発表。 交渉力を高め、国際的に立っているが、国内のバックラッシュを作る。"

 je_ip_peacetime_international_mediation:0 "国際メディエーション"
 je_ip_peacetime_international_mediation_desc:0 "社外監査役に招き、トークを安定させる。 これは、交渉の勢いを改善します, しかし、スカルチニ外の増加."

 je_ip_peacetime_grassroots_outreach:0 "草の根 アウトリーチ"
 je_ip_peacetime_grassroots_outreach_desc:0 "市民社会、地方自治体、非暴力的な政治活動をサポートします。 これは緊張を下げるが、ハードライナーを危険にすることができます。"

 je_ip_peacetime_mass_mobilization:0 "量産化"
 je_ip_peacetime_mass_mobilization_desc:0 "組織された動員に公共の不満を運びます。 国際的な圧力を上げますが、エスカレーションの状況をプッシュする危険性が高まります。"

 ip_uneasy_status_quo:0 "不安なステータスキュー"
 ip_uneasy_status_quo_desc:0 "開放的な戦いは潜在しているが、紛争はまだ政治、外交、日常的な管理を形作ります。"

 ip_security_coordination:0 "セキュリティコーディネート"
 ip_security_coordination_desc:0 "セキュリティ部隊間の調整は、政治的にコストがかかりますが、エスカレーションを制限しています。"

 ip_closure_policy:0 "閉鎖ポリシー"
 ip_closure_policy_desc:0 "運動制限は、外交的および人道的な圧力を増加させながら、いくつかのセキュリティリスクを軽減しています。"

 ip_economic_restrictions:0 "経済規制"
 ip_economic_restrictions_desc:0 "動きやアクセスの制限は、経済生活を混乱させています。"

 ip_settlement_freeze:0 "決済フリーズ"
 ip_settlement_freeze_desc:0 "決済活動の一時的な一時停止は、外交条件を改善しました。"

 ip_international_mediation:0 "国際メディエーション"
 ip_international_mediation_desc:0 "外部の仲介者は、政治的なプロセスを生き生き続けることを試みています。"

 ip_grassroots_outreach:0 "草の根 アウトリーチ"
 ip_grassroots_outreach_desc:0 "市民社会と地方の政治活動は、スパイラルの状況を防止するために働いています。"

 ip_mass_mobilization:0 "量産化"
 ip_mass_mobilization_desc:0 "公共の動員は、政治的な圧力を増加させるだけでなく、対立のリスクを上げています。"

 ip_security_alert:0 "セキュリティアラート"
 ip_security_alert_desc:0 "最近の不規則の後の保証力は高められた警報にあります。"

 ip_international_scrutiny:0 "国際スクルーティニー"
 ip_international_scrutiny_desc:0 "外国政府やメディアは発展を間近に見守っています。"

 ip_political_backlash:0 "政治バックラッシュ"
 ip_political_backlash_desc:0 "妥協または調整は、国内の相手を危険にさらす。"

 ip_stabilized_peace_process:0 "安定的な平和プロセス"
 ip_stabilized_peace_process_desc:0 "低い張力と持続的な調整のまれな期間は、より安定した外交環境を作成しました。"

 ip_breakdown_of_calm:0 "カルムの破壊"
 ip_breakdown_of_calm_desc:0 "平和状態のquoが破壊され、公開はエスカレーションの支柱です。"

 ip_peacetime.1.t:0 "チェックポイント インシデント"
 ip_peacetime.1.d:0 "ローカルセキュリティインシデントは、公的な注意と応答のための圧力を上げました。"
 ip_peacetime.1.f:0 "マイナーな対立でさえ、より広い対立のシンボルになることができます。"
 ip_peacetime.1.a:0 "セキュリティの手順を締めます。"
 ip_peacetime.1.b:0 "地方自治体と密接にコーディネート"

 ip_peacetime.2.t:0 "セキュリティクラックダウン"
 ip_peacetime.2.d:0 "パレスチナの保安部隊は、移住者や武装事実に対して行動するために圧力に直面しています。"
 ip_peacetime.2.f:0 "エスカレーションを防ぐことができますが、コラボレーションのように見えることもあります。"
 ip_peacetime.2.a:0 "ネットワークから移動します。"
 ip_peacetime.2.b:0 "対立を避けてください。"

 ip_peacetime.3.t:0 "決済について"
 ip_peacetime.3.d:0 "提案された拡張は、外交プロセスのフラッシュポイントになりました。"
 ip_peacetime.3.f:0 "地図、許可、丘の上は国の戦略の重量を運ぶことができます。"
 ip_peacetime.3.a:0 "発表予定。"
 ip_peacetime.3.b:0 "拡大を遅らせて下さい。"

 ip_peacetime.4.t:0 "ストリートプロテスト"
 ip_peacetime.4.d:0 "宣言は、現在の政治的バランスに挑戦し、いくつかのコミュニティを通じて普及しています。"
 ip_peacetime.4.f:0 "通りは安全弁、またはより大きい何かの最初の印である場合もあります。"
 ip_peacetime.4.a:0 "動員を続けましょう。"
 ip_peacetime.4.b:0 "拘束のための電話."

 ip_peacetime.5.t:0 "国際エンボイ"
 ip_peacetime.5.d:0 "外国の封筒は、更新された対話のための提案が届きました。"
 ip_peacetime.5.f:0 "ディプロマシーは、一度に紛争を解決するのではなく、時間を買うことができます。"
 ip_peacetime.5.a:0 "封筒を受け取る。"
 ip_peacetime.5.b:0 "外部圧力を注入して下さい。"

 ip_peacetime.6.t:0 "ドナー会議"
 ip_peacetime.6.d:0 "外国の寄付者は、新しいサポートを提供していますが、リターンで政治的な譲歩を期待しています。"
 ip_peacetime.6.f:0 "Aidは機関を安定させることができますが、依存性は独自のコストを運ぶことができます。"
 ip_peacetime.6.a:0 "外交枠組みを受け入れます。"
 ip_peacetime.6.b:0 "より少ない条件を要求して下さい。"

 ip_peacetime.10.t:0 "カルムブレイク"
 ip_peacetime.10.d:0 "レイド、抗議、閉鎖、政治的破壊、失敗した話の蓄積された圧力は、しわに状況をもたらしました。"
 ip_peacetime.10.f:0 "行政の言語は、緊急の言語に役立ちます。"
 ip_peacetime.10.a:0 "エスカレーションの準備"
 ip_peacetime.10.b:0 "1つの最後の緊急の押しを作って下さい。"

 ip_peacetime.20.t:0 "耐久性のあるカルム"
 ip_peacetime.20.d:0 "セキュリティの調整、政治的拘束、および外交的な関与のまれな組み合わせは、状況を安定させました。"
 ip_peacetime.20.f:0 "最終的な平和ではありませんが、戦争の欠如以上です。"
 ip_peacetime.20.a:0 "脆弱な成功。"
 
 oslo_accords.1.t:0 "オスロIアコード"
 oslo_accords.1.d:0 "イスラエルの交渉者はパレスチナのリーダーシップと原則の提案された宣言に達しました。 提案は、パレスチナ自政府のための相互認識と中間フレームワークを確立します。"
 oslo_accords.1.f:0 "合意は、国境、エルサレム、集落、避難所、または最終的な勧告を解決しません。 しかし、段階的な政治プロセスを提供します。"
 oslo_accords.1.a:0 "原則の宣言を提唱する。"
 oslo_accords.1.b:0 "契約を解除します。"

 oslo_accords.10.t:0 "イスラエルはオスロIアコードを約束"
 oslo_accords.10.d:0 "イスラエルは、相互認識と中間のパレスチナ自己政府の枠組みを確立する原則の宣言を提案しました。"
 oslo_accords.10.f:0 "受諾は、イスラエルに新しい政治プロセスを開始し、正式な崇高を終了しますが、多くの最終的な統計問題は未解決のままです。"
 oslo_accords.10.a:0 "原則の宣言を受け入れます。"
 oslo_accords.10.b:0 "提案を拒絶して下さい。"

 oslo_accords.11.t:0 "パレスチナはオスロIを受け入れます"
 oslo_accords.11.d:0 "パレスチナのリーダーシップは、原則の宣言を受け入れています。 暫定平和プロセスが始まりました。"
 oslo_accords.11.f:0 "握手は歴史上にあります。難しい作業は始まります。"
 oslo_accords.11.a:0 "プロセスが始まります。"

 oslo_accords.12.t:0 "パレスチナはオスロIを注入します"
 oslo_accords.12.d:0 "パレスチナのリーダーシップは、提案された原則宣言を拒否しました。"
 oslo_accords.12.f:0 "相互受諾なしで、diplomaticの入り口は閉まります。"
 oslo_accords.12.a:0 "トークは崩壊します。"

 oslo_accords.2.t:0 "オスロIIアコード"
 oslo_accords.2.d:0 "イスラエルのネゴシエーターは、原則宣言の2年後、西銀行とガザでパレスチナ州の自己政府を拡大する暫定的な合意を調製しました。"
 oslo_accords.2.f:0 "提案は、パレスチナの制御、共有責任、継続的なイスラエルの制御のゾーンに権限を分割します。"
 oslo_accords.2.a:0 "暫定的な合意を提起する。"
 oslo_accords.2.b:0 "さらなる再雇用を遅らせます。"

 oslo_accords.20.t:0 "イスラエルはオスロIIのアコードを約束します"
 oslo_accords.20.d:0 "イスラエルは、パレスチナの自己政府を拡大し、西銀行をエリアA、B、Cに組織する暫定的な合意を提案しました。"
 oslo_accords.20.f:0 "合意は、拡張された権限を約束しますが、また、重複する管轄区域の断片マップをエントレンチします。"
 oslo_accords.20.a:0 "暫定契約を承諾する。"
 oslo_accords.20.b:0 "提案を拒絶して下さい。"

 oslo_accords.21.t:0 "パレスチナはオスロIIを受け入れます"
 oslo_accords.21.d:0 "Palestinianのリーダーシップは、Interimの合意を受け入れています。 オスロプロセスは、次のフェーズに移動します。"
 oslo_accords.21.f:0 "より多くの権限が移されますが、最終的な決済は遠いままです。"
 oslo_accords.21.a:0 "契約書の実装"

 oslo_accords.22.t:0 "パレスチナはオスロIIを注入します"
 oslo_accords.22.d:0 "Palestinianのリーダーシップは、提案されたInterim協定を拒否しました。"
 oslo_accords.22.f:0 "オスロによって建てられた構造は生き残っていますが、次のステップは失敗しました。"
 oslo_accords.22.a:0 "工程の屋台。"

 oslo_i_peace_process:0 "オスロIピースプロセス"
 oslo_i_peace_process_desc:0 "原則の宣言は、正式な暫定的な平和プロセスを開始しました。"

 oslo_i_palestinian_authority:0 "パレスチナの権限を確立"
 oslo_i_palestinian_authority_desc:0 "暫定的なパレスチナの権威は、市民の責任を主張し始めています。"

 oslo_talks_delayed:0 "トーク 遅延"
 oslo_talks_delayed_desc:0 "外交プロセスは、不満を発生させ、不確実性を上げました。"

 oslo_ii_interim_agreement:0 "オスロII 暫定合意"
 oslo_ii_interim_agreement_desc:0 "暫定的な合意は、パレスチナ自政府の枠組みを拡大しました。"

 oslo_ii_expanded_self_government:0 "拡張された自己政府"
 oslo_ii_expanded_self_government_desc:0 "パレスチナの機関は、より行政的な責任を想定しています。"

 oslo_ii_joint_security_framework:0 "共同セキュリティフレームワーク"
 oslo_ii_joint_security_framework_desc:0 "セキュリティの責任は、暫定フレームワークの下で調整されています。"

 oslo_ii_administrative_fragmentation:0 "専門分野"
 oslo_ii_administrative_fragmentation_desc:0 "領土は、断片的および重複する管轄区域によって支配されます。"

 oslo_ii_delayed_redeployment:0 "遅延した退職"
 oslo_ii_delayed_redeployment_desc:0 "さらなる再雇用は、プロセスの自信を損なう、遅れてきました。"

 oslo_accords.30.t:0 "オスロIアコードは署名されています"
 oslo_accords.30.d:0 "イスラエルとパレスチナは、原則の宣言を受け入れています。 米国は、新しい平和プロセスをサポートし、暫定フレームワークを維持することを期待しています。"
 oslo_accords.30.f:0 "外交的な開口部が現れていますが、保証人、お金、圧力、忍耐が必要です。"
 oslo_accords.30.a:0 "プロセスを監視します。"

 oslo_accords.31.t:0 "オスロIアコードフェイル"
 oslo_accords.31.d:0 "原則の宣言は拒否されました。 暫定的な枠組みが確立される前に外交の開口部は閉鎖しました。"
 oslo_accords.31.f:0 "受入がなければ、外部の仲介はプロセスを単独で運ぶことができません。"
 oslo_accords.31.a:0 "メディア処理のセットバック。"

 oslo_accords.32.t:0 "オスロIIのアコードは署名されます"
 oslo_accords.32.d:0 "イスラエルとパレスチナは、インシム協定を採択し、パレスチナ州の自己政府を拡大し、オスロプロセスの次の段階を確立しました。"
 oslo_accords.32.f:0 "合意は外交的な成功ですが、分割された権限のそのマップは、管理が困難であることを証明することができます。"
 oslo_accords.32.a:0 "導入支援"

 oslo_accords.33.t:0 "オスロIIアコードフェイル"
 oslo_accords.33.d:0 "提案されたInterim契約は拒否されました。 オスロのプロセスは不完全であり、地理的管理フレームワークは現在不確実です。"
 oslo_accords.33.f:0 "最初のステップは、秒を保証することができませんでした。"
 oslo_accords.33.a:0 "工程の屋台。"

 oslo_i_proposal_sent_tt:0 "イスラエルはオスロIアコードをパレスチナに提案する。 パレスチナが受け入れない限り、条約は影響を受けません。"
