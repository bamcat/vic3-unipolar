 yugoslav_collapse.1.t:0 "フェデレーションの練習"
 yugoslav_collapse.1.d:0 "国家主政府と連邦当局の衝突は、解散の端にユーゴスラビアをプッシュしました。"
 yugoslav_collapse.1.a:0 "再公開は一緒に行われる必要があります。"
 yugoslav_collapse.1.b:0 "葬儀の支払いを行います。"
 yugoslav_collapse.1.c:0 "強制的に連邦当局を復元します。"

 yugoslav_collapse.2.t:0 "クロアチアはとにかくブレイク"
 yugoslav_collapse.2.d:0 "クロアチアは独立に向かって進んでおり、ベオグラードを強制し、休憩を戦うか認識するかどうかを決定しました。"
 yugoslav_collapse.2.a:0 "独立性のクロアチア戦争を開始。"
 yugoslav_collapse.2.b:0 "クロアチア独立性を認識する。"

 yugoslav_collapse.3.t:0 "ボスニアは独立性を宣言します"
 yugoslav_collapse.3.d:0 "ボスニアの独立性は、共和国全体で有能な主張を生み出し、セルブ・エンティティティティは、独自の領土当局に組織し始めています。"
 yugoslav_collapse.3.a:0 "ボスニア戦争が始まります。"
 yugoslav_collapse.3.b:0 "ボスニアを認識し、決済を求める。"

 yugoslav_collapse.4.t:0 "国際対応"
 yugoslav_collapse.4.d:0 "外国政府は、ユーゴスラフの紛争が広がると平和、制裁、および媒介を議論する。"
 yugoslav_collapse.4.a:0 "安心のミッションが必要です。"
 yugoslav_collapse.4.b:0 "これは内部の問題です。"

 yugoslav_collapse.5.t:0 "セルビアの要求の再会"
 yugoslav_collapse.5.d:0 "ベオグラードは、回復したユーゴスラフ州に戻るために政府に尋ねました。"
 yugoslav_collapse.5.a:0 "再会を承諾して下さい。"
 yugoslav_collapse.5.b:0 "要求を注入して下さい。"

 yugoslav_collapse.10.t:0 "葬儀交渉"
 yugoslav_collapse.10.d:0 "ユゴスラフの告白は平和を維持することができますが、共和国はベオグラードの意図の疑わしいままです。"
 yugoslav_collapse.10.a:0 "改革を続けましょう。"
 yugoslav_collapse.10.b:0 "プロセスは失敗します。"

 yugoslav_collapse.20.t:0 "Yugoslavia 保存済み"
 yugoslav_collapse.20.d:0 "妥協と拘束を通して、ユーゴスラビアは完全な崩壊を避け、告発された決済を受け入れました。"
 yugoslav_collapse.20.a:0 "連盟は生き残ります。"

 yugoslav_collapse.30.t:0 "モンテネグロの紹介"
 yugoslav_collapse.30.d:0 "モンテネグロは、セルビアとの連合を継続するか、完全な独立を回復するかを決定する準備をしています。"
 yugoslav_collapse.30.a:0 "モンテネグロの独立性を認識する。"
 yugoslav_collapse.30.b:0 "ユニオンを保存します。"

