 oslo_usa_oslo_i_accepted_tt:0 "私たちは、オスロプロセスのブローカーとして一時的な外交的評判のボーナスを得ます。"
 oslo_usa_oslo_i_rejected_tt:0 "オスロIの崩壊から一時的二次元のセックバックに苦しむ。"
