 y2k_events.1.t: "ミレニアムバグ"
 y2k_events.1.d: "2000年のアプローチとして、静かな不安は[ROOT.GetCountry.GetAdjective]を握っています エンジニア、バーホール、IT部門。 いわゆる Y2K の問題 — ほとんどのコンピューター システムが 1 年を 2 つの数字として保存し、したがって 2000 ではなく 1900 として '00' を解釈する発見は、グローバル スクランブルをトリガーしました。\n\n いくつかは、結果が壊滅的である可能性があると言う: 電源グリッドが故障し、銀行システムが破損し、航空トラフィック制御が暗くなると言います。 他の人は、懸念は野生のオーバーブローダウンであり、コンプライアンス監査を販売するコンサルタントは、単にパニックを離れて取得しています。 [ROOT.GetCountry.GetName] は真剣にそれを取る方法を決定しなければなりません。"
 y2k_events.1.f: "深夜が来る。 照明に滞在するかどうかは、別の質問です。"
 
 y2k_events.1.a: "完全なY2Kの遵守に投資"
 y2k_events.1.a_tt: "期待的、徹底的、そしておそらく不必要です。しかし、予測のほんの一部が正しい場合でも、何もする費用ははるかに高いです。 [ROOT.GetCountry.GetName] は、重要なインフラを横断するコンプライアンスプログラムに資金を供給します。"
 y2k_events.1.b: "それは明らかに上書きである — 無視する"
 y2k_events.1.b_tt: "パニックは、コンサルティング業界である金峰であり、他にはない。 [ROOT.GetCountry.GetName] は、未公開の資金を不正に処理しません。"
 
 # ── NEW YEAR 2000 ─────────────────────────
 
 y2k_events.2.t: "ハッピーニューイヤー - 2000年へようこそ"
 y2k_events.2.d: "時計は1999年12月31日深夜に刻まれ、ライトは点灯します。\n\n 飛行機は飛んでいました。 銀行がオープンしました。 パワーグリッド hummed. 水の流れ。 ミレニアムのバグ、計算履歴の最も予想される大惨事、バングではなくウィスパーに着いたり、おそらくそれは全く到着しず、コンプライアンスに費やした億は単に働いた。\n\n [ROOT.GetCountry.GetName] を渡って、群衆は通りを埋め、花火は空を照らし、世界が感じた1泊のために、簡単に、それは再び始まりました。 20世紀初頭。 次は誰が推測するのか。"
 y2k_events.2.f: "2000年(平成12年) 世界は終わらない。 つまり、すべての事柄は良い知らせです。"
 
 y2k_events.2.a: "新世紀が始まります"
 
 # ── MODIFIERS ────────────────────────────
 
 y2k_compliance_investment: "Y2Kコンプライアンスプログラム"
 y2k_compliance_investment_desc: "[ROOT.GetCountry.GetName] は、重要なインフラ全体で包括的な Y2K コンプライアンスに投資しました。 料金は本物ですが、深夜を問わずシステムが準備されています。"
 
 millennium_celebration: "ミレニアムのお祝い"
 millennium_celebration_desc: "年 2000 年は catastrophe なしで着きました。 公共の気分は浮力していますが、通りはまだ黙想者でいっぱいであり、[ROOT.GetCountry.GetName]は、慎重な楽観主義で新しい世紀に入ります。"
 
 y2k_minor_disruption: "Y2K 破壊"
 y2k_minor_disruption_desc: "[ROOT.GetCountry.GetName] は Y2K の懸念を却下し、未準備のシステムが新しい年に追いつくにつれて、マイナーだが実質的な混乱に直面しています。 何も壊滅的ではありませんが、批評家は完全に間違っていました。"
 
  # ── TAGENTOPOLI ──────────────────────

 je_tangentopoli: "タンジェントポリ"
 je_tangentopoli_reason: "イタリアはキックバックのシステム上で動作します。 公共契約 — 建設、インフラ、防衛調達、医療 — 政党に比率を払う会社に行く。 キリスト教の民主主義は、彼らのシェアを取る. 社会主義者は自分のことを連れて行く。 より小さい石炭のパートナーは彼らを連れて行きます。 誰もが知っている。 全員参加。 war.\n\n システムは、#bold タンゲントポリ#! - ブライブ市と呼ばれます。 それは安定した、有効であり、そして時機を得た破損です。 唯一の質問は、他の方法を見ることを拒否する裁判官に連絡を生き残ることができるかどうかです。"

 je_mani_pulite: "マニピュライト"
 je_mani_pulite_reason: "調査は実行されます。 ジュッジアントニオ・ディ・ピエトロとミランの魔法のプールは、共和国が設立以来、イタリアの政治に資金を積んだ賄賂とキックバックのネットワークを介して働いています。 すべての逮捕は告白につながる. すべての告白は名前につながります。 すべての名前は別の逮捕につながります。\n\n 政治的なクラスは後退します。 緊急の法令、magistratesの転送、司法上の公的攻撃。 問題は、システムがそれを止める方法を見つける前に調査が結論に達することができるかどうかです。\n\n@information! #bold 調査バー#! は magistrates の進捗状況を追跡します。 #bold 抵抗バー#! は、それらをシャットダウンする政治クラスの能力を追跡します。"

 # Status descs — tangentopoli
 je_tangentopoli_contained_tt: "調査は初期段階にあります。 軽微な人物が逮捕されました。 政治的なクラスは、その事実を、その先物として却下しています。"
 je_tangentopoli_spreading_tt: "#bold 調査は普及しています。#! 告白が蓄積されています。 名称が誕生しました。 ミラノのマジストレートは、すべてのスレッドに従います。"
 je_tangentopoli_critical_tt: "@warning! #bold システムが壊れるポイントです。#! タンジェントポリのスケールは否定できません。 政治的危機は重要である。"

 # Status descs — mani pulite
 je_mani_pulite_early_tt: "調査は建物の勢いです。 ディ・ピエトロのチームは証拠を通して働いています。 政治的クラスはまだ一貫性のある応答を組織していません。"
 je_mani_pulite_winning_tt: "#bold 調査は勝ちます。#! 耐震性は、耐衝撃性に優れています。 システムがそれらを含んでいることができるより名前はより速く落ちます。"
 je_mani_pulite_stalemate_tt: "@warning! 調査および政治的抵抗は均等に一致します。 結果は、次の動きに依存します。"
 je_mani_pulite_suppressed_tt: "@warning! #bold 政治的抵抗は上手を獲得しています。#! システムは組織化しています。 その結論に達する前に調査は埋葬されるかもしれません。"

 # Progress bars
 tangentopoli_exposure_bar: "ネットワーク露光"
 tangentopoli_exposure_bar_desc: "腐敗ネットワークが貫通されるまで"
 tangentopoli_exposure_bar_second_desc: "各逮捕がより多くの告白をもたらすので、露出は有機的に成長します。"
 tangentopoli_bar_from_exposure: "タンゲントポリネットワークの司法暴露"

 investigation_progress_bar: "調査の進捗"
 investigation_progress_bar_desc: "ディ・ピエトロの魔術師の魔術師は、どのくらいの時間を費やしました。"
 investigation_bar_progress: "証拠を通した魔法は進歩します"

 political_resistance_bar: "政治的抵抗"
 political_resistance_bar_desc: "調査への抵抗"
 political_resistance_bar_progress: "政治的クラスは、魔法使いに対する組織"

 # ── EVENT TITLES AND TEXT ────────────────

 mani_pulite.1.t: "ビジネスマンが20億リットルをフラッシュする"
 mani_pulite.1.d: "ミラノの退職家であるピオス・アルベルゴ・トリヴルツィオのチェアマン、マリオ・チエスアは、トイレを洗い流すために、アントニオ・ディ・ピエトロが逮捕されました。 Chiesaは、クリーニング会社から37百万リットルのキックバックを受けました。\n\n 社会主義者は、すぐに彼を認めています。 彼らのパーティーの秘書, Bettino Craxi, Chiesa 'a thief' を呼び出します。 — 言葉の非常に賢明な選択ではありません。, Di Pietro が次のものを見つけます. 逮捕は未成年です。 それにつながることはないです。"
 mani_pulite.1.f: "定期的な逮捕。 か、そう思える。"
 mani_pulite.1.a: "地元の恥ずかしがり屋。 システムが安全です。"

 mani_pulite.2.t: "最初の告白"
 mani_pulite.2.d: "刑務所に直面して、マイナーな機能論は話し始めています。 免疫の交換ではなく、正式な取引はありませんが、ダムが壊れているため、沈黙の論理はもはや保持されません。 各名前は別の名前につながります。 他の名前はパーティーにつながります。 各パーティーはministry.\n\n につながります。 調査は、銀行券の完全なトイレと1人の男についてもはやありません。 それは、共和国の財務アーキテクチャ全体についてです。"
 mani_pulite.2.f: "1人の男が話すとき、彼らはすべての話します。"
 mani_pulite.2.a: "調査が進むように — 今は止まらない"
 mani_pulite.2.b: "スプレッドを含む役員圧力を使用する"

 mani_pulite.5.t: "マニ・ピュライト - イタリアは、すべてのKnewを知っています"
 mani_pulite.5.d: "ディピエトロ、コロンボ、ダビゴ、ボルレリ - magistratesのミラノプールが公開されました。 蓄積した証拠は、スケールを否定できません。過去10年間に、イタリアで事実上すべての公共契約はキックバックに来ました。 共和党は、すべての道路、すべての病院、すべての学校の割合を総計的に消費しました。\n\n イタリアの新聞には、#bold Tangentopoli#!の名前があります。 ブライブ市。 ファースト・リパブリックはトライアルです。"
 mani_pulite.5.f: "誰もが知っていた。 誰もが知っていたことを誰もが知っている。"
 mani_pulite.5.a: "調査はそれが導く場所に行く"

 mani_pulite.6.t: "Avvisi di Garanzia, オーストラリア"
 mani_pulite.6.d: "調査の通知は、ビジネスマン、ミニストリーの公式、パーティーの宝庫、市長のために[ROOT.GetCountry.GetName]を渡って到着しています。 #italic avviso di garanzia#! — 1 つが調査中であることの通知 — は、disgrace の欠点になりました。 新聞は、フロントページで印刷します。 キャリアは一晩終わります。\n\n[SCOPE.gsInterestGroup('indicted_ig').GetName]は、とりわけ通知を受け取ります。 ミラノへの調査はもはや完了しません。"
 mani_pulite.6.f: "ポストマンは、そういったことがなかった。"
 mani_pulite.6.a: "協力 — 抵抗はそれを悪化させるだけ"
 mani_pulite.6.b: "審査官の圧力を適用する"

 mani_pulite.7.t: "クレイシーとコイン"
 mani_pulite.7.d: "Bettino Craxi — 元首相、社会主義者の党秘書、イタリアで最も強力な政治家は10年間、ローマのHotel Raphaelから数百人の市民の群衆に直面しています。\n\n 彼らはコインとトマトで彼を殺しました。 彼らがお金がどこから来たかを知っているので、コイン。\n\n クレイシーは、パーティーの資金調達のシステムを守る簡単な声明を与えました - 「誰もが知っていました、誰もが参加しました」 - そして内部にリトリートしました。 数ヶ月以内に彼はハムマメット、チュニジアで彼のヴィラに飛ぶでしょう。 イタリアに戻りません。 社会主義者、彼が建てたパーティーは、存在しなくなる。"
 mani_pulite.7.f: "硬貨によって運転される国から盗まれた人。"
 mani_pulite.7.a: "古いシステムが完成しました。"
 mani_pulite.7.b: "移行の管理 — 責任を受け入れる、改革を求める"

 mani_pulite.8.t: "調査は南を回復"
 mani_pulite.8.d: "タンゲントポリは北の現象だけではありませんでした。 [SCOPE.sState('tangentopoli_south_state').GetName] と Mezzogiorno を渡って、Kickback システムは EU 農業補助金、公共インフラプロジェクト、およびローカル政治と組織犯罪の関係のネットワークに編まれました。\n\nDi Pietro の調査は南に続いています。 [SCOPE.sState('tangentopoli_south_state').GetName] の政治ネットワークは、北部の反対よりも深く根ざしています。 決して離れて来ません。"
 mani_pulite.8.f: "腐敗は、すべての道を下回りました。"
 mani_pulite.8.a: "調査を延長 — 例外なし"
 mani_pulite.8.b: "北部の調査を含む — 南は複雑すぎる"

 mani_pulite.9.t: "Biondiの法令"
 mani_pulite.9.d: "ジャスティス大臣アルフレド・ビオンディは、マニ・プルライトの心臓部における犯罪を正確に含んだ、さまざまな金融犯罪のために調査的な組織の使用を禁止する緊急の法令を発足しました。 批評家はすぐに #italic salvaladri#! に名前をつけました: 'save-thieves' の法律。\n\n 24時間以内に、ミラノの魔法瓶は、その集団辞典を抗議で発表しました。 パブリックレスポンスは圧倒的です。 イタリア全国の検察官は、何百万人もの市民からのサポートを受けています。 進行の政治的コストが見えるようになりました。"
 mani_pulite.9.f: "自分の犯罪者を保護するために法律を通過する政府は、もはや試みを生き延ばしません。"
 mani_pulite.9.a: "法令を通す—調査は含まれている必要があります"
 mani_pulite.9.b: "法令の撤退 — 公的な反応が強すぎる"

 mani_pulite.10.t: "第一共和国は死にます"
 mani_pulite.10.d: "以上です。 キリスト教民主主義—1948年以降中断することなくイタリアを統治した党は、解散した。 社会主義者は消えています。 小規模な石炭の締約国がなくなった。 最初の共和国の40年は、単に他の方法を見てを拒否したミラノの魔法のグループによって2年で解体しました。\n\n 1,200人を超える政治家やビジネスマンが立ち向かう。 5千万件の調査結果 旧プライム・ミニスター、キャビネット・ミニスター、およびインダストリアル・リストは試験に直面しています。\n\n [ROOT.GetCountry.GetName] の次のものが不確実です。 しかし、半世紀の共和国に供給されたシステムが完成しました。"
 mani_pulite.10.f: "裁判官は決してできない選挙をした。"
 mani_pulite.10.a: "新しいイタリア - 清潔な休憩を"
 mani_pulite.10.b: "管理された移行 — 破裂のない改革"

 mani_pulite.15.t: "調査が埋め込まれている"
 mani_pulite.15.d: "政治クラスは勝ちました。 magistratesは、譲渡、廃棄、または返金されています。 証拠は密封されています。 の勢いは壊れました。\n\n これは、タンゲントポリが起こらないという意味ではありません。 生き残った人たちが生き生き残っていることを意味する。 腐敗は終わらない — 地下に行き、新しい形と新しいアレンジに。 [ROOT.GetCountry.GetName]の市民は何をしたのかを知っています。 彼らはそれが罰されなかったことを知っています。 その知識は消えません。"
 mani_pulite.15.f: "正義は正義を拒否されます。 誰もが知っている。"
 mani_pulite.15.a: "システムが生き残ります。"

 # ── MODIFIERS ────────────────────────────

 tangentopoli_systemic_corruption: "タンジェントポリ"
 tangentopoli_systemic_corruption_desc: "[ROOT.GetCountry.GetAdjective] 年数の政治は、すべての公共契約に埋め込まれています。 Legitimacy は構造的に弱まる。 システムはお金を要し、親友を招待します。"

 tangentopoli_chiesa_arrest: "シーザー・アフェア"
 tangentopoli_chiesa_arrest_desc: "マリオ・チエスアの逮捕は、システムの最初の亀裂を開けました。 政治的なクラスはそれを却下していますが、魔法はスレッドに続いています。"

 tangentopoli_ig_under_scrutiny: "調査中"
 tangentopoli_ig_under_scrutiny_desc: "このグループは、タンゲントポリ腐敗ネットワークに関連して司法書士の下にあります。 政治的な強さと人気な魅力は著しく損なわれています。"

 tangentopoli_widening_investigation: "幅広い調査"
 tangentopoli_widening_investigation_desc: "当初の規模を超えて調査が拡大しています。 すべての告白は、新しい逮捕につながる. ガバナンスの政治的コストが高まっています。"

 tangentopoli_suppression_attempt: "スプレッションアテンプ"
 tangentopoli_suppression_attempt_desc: "[ROOT.GetCountry.GetName] は、司法調査を抑制しようとしました。 国際的なコミュニティと国内プレスが指摘しています。"

 tangentopoli_party_collapse: "パーティー 崩壊"
 tangentopoli_party_collapse_desc: "タンゲントポリの変容によってこのパーティーは破壊されました。 そのリーダーシップは、亡命的または予測下にあります。 その投票者は、他の場所で行っていません。"

 tangentopoli_legitimacy_crisis: "レギュティマシー・クリスシス"
 tangentopoli_legitimacy_crisis_desc: "体系的な腐敗の復活は、[ROOT.GetCountry.GetAdjective] 機関における公衆の信頼を粉砕しました。 ラジシズムは急成長しています。 権限が弱まる。"

 tangentopoli_south_exposure: "南ネットワーク博覧会"
 tangentopoli_south_exposure_desc: "マニ・パルタイト調査は、南政治ネットワークとタンジェントポリシステムとの関係を提起し、メッツォーニョに至りました。"

 mani_pulite_investigation_begins: "マニ・プルライト調査"
 mani_pulite_investigation_begins_desc: "ミラノの魔法のプールは、完全な調査を実施しています。 [ROOT.GetCountry.GetName] の国際的な評判は、目に見える約束から説明責任への恩恵を受けています。"

 mani_pulite_public_mandate: "正義のための公正な義務"
 mani_pulite_public_mandate_desc: "公圧下における法令の撤退は、調査のための一般的な支持のパンスを実証しました。"

 mani_pulite_clean_hands_victory: "きれいな手の勝利"
 mani_pulite_clean_hands_victory_desc: "マニ・ピライトが成功しました。 第一共和国の腐敗パーティーシステムは、司法プロセスによって解体されています。 [ROOT.GetCountry.GetName] はセカンド・リパブリック(Second Republic)を始め、より高い合法性、クリーンな機関基盤、およびパワー・アドバイザブルを保有する国際的な認識が始まります。"

 mani_pulite_cautious_transition: "管理された移行"
 mani_pulite_cautious_transition_desc: "第一・第二共和国への移行は、慎重に管理されています。破裂することなく改革します。 古いパーティーは消えていますが、施設の継続性は維持されます。"

 mani_pulite_investigation_buried: "調査埋葬"
 mani_pulite_investigation_buried_desc: "マニピュライトが失敗しました。 政治のクラスは生き残っています。 [ROOT.GetCountry.GetName] の市民は何をしたのかを知り、罰せられなかったことを知っています。 腐敗は表面の下に続く。 Legitimacyは永久に破損しています。"

 amendment_events.1.t: "貧乏のための連邦保健プログラム"
 amendment_events.1.d: "議会は、低所得のアメリカ人、高齢者、および障害者のための連邦に資金を供給された健康保険プログラムを作成する前に、提案されます。 民間の市場が不可能で、プレミアムを手に入れることができない人には対応しないと主張するサポーター。 Opponentsは、ヘルスケアにおける連邦政府の関与の受け入れ不可能な拡大であると主張しています。\n\n 法案の裏付けは広く、貿易組合、社会改革者、公の重要な部分です。 [ROOT.GetCountry.GetName] が政治的意志の質問であるかどうか。"
 amendment_events.1.f: "薬は、あなたがそれを買うことができるかどうかに依存しないでください。"
 amendment_events.1.a: "有効なメディケイド — 必要な人のための連邦保健カバレッジ"
 amendment_events.1.b: "それを拒絶する - 医療は民間の問題です"
 
 amendment_events.2.t: "手頃な価格のケア法"
 amendment_events.2.d: "行政は、包括的な医療改革を推進しています。 すべての市民が健康保険を運ぶ、規制された市場を生成し、メディケイドの適格性を拡張し、既存の条件のカバレッジを否定するバーの保険会社を構成する法案。\n\n 個人が深く論争しています。 サポーターは保険市場機能を作る唯一の方法です。 反対論は、政府の過負荷を呼びます。 法案には、石炭が保持されている場合、投票があります。"
 amendment_events.2.f: "数百万の未経験のアメリカ人。 議会は、その変更のチャンスを持っている."
 amendment_events.2.a: "Affordable Care法を法律に署名する"
 amendment_events.2.b: "それをVeto — マンデートは遠くない"
 
 amendment_events.3.t: "PATRIOT法"
 amendment_events.3.d: "9月11日の攻撃から数週間で, 議会は、米国PATRIOT法を通過するために異常な速度で移動しました — 劇的に国内監視当局に拡大, 知能操作の司法的な監督を軽減, そして、法執行機関全体で非前例の情報共有を有効にします.\n\n 請求書は、ほぼ非衛生的なサポートを持っています。 民事訴訟は、通路の速度と規定のパンスが歩くのが難しいと警告する。 国はまだ悲しみです。 投票は明日です。"
 amendment_events.3.f: "恐怖はレギュレーターです。"
 amendment_events.3.a: "PATRIOT法に署名する - 国家のセキュリティが必要です"
 amendment_events.3.b: "拒否 — 民事的な自由は悲嘆に逃げることができません"
 
 amendment_events.4.t: "連邦アサルト武器禁止"
 amendment_events.4.d: "議会は、民間販売のための指定された半自動兵器と高容量の雑誌の製造に10年間の連邦禁止に投票しています。 法執行組合と被害者を撮影する家族が法案を取り戻す。 銃のロビーはそれに対して大きく過ごしました。\n\n 最終投票を確保するために10年目の日没節が追加されました。 禁止は2004年に更新されない限り期限が切れます。また、新たに更新する政令の調停は保持できません。"
 amendment_events.4.f: "10年。 その後、投票は再び起こります。"
 amendment_events.4.a: "禁止を渡して下さい — 10年は始まりです"
 amendment_events.4.b: "それを敗北させる - 法律上の市民は犯罪行為のために支払うべきではありません"
 
 amendment_events.5.t: "暴力犯罪管理と法執行法"
 amendment_events.5.d: "議会は、[ROOT.GetCountry.GetName]の履歴で最大の犯罪法を検討しています。100,000の新しい警察官のための資金、連邦刑務所システムの大きな拡大、新しい必須の最低文、および暴力はライダーとして女性法に反対しています。\n\n 政治ロジックはバイパルトマンです。 1980年代後半の犯罪波は、パーティーラインで人気の法律と秩序の政治を作った。 請求書は簡単に通過します。 後続の質問です。"
 amendment_events.5.f: "請求書は簡単に渡します。 結果は長くなります。"
 amendment_events.5.a: "それを署名 — 犯罪に対する国の要求行動"
 amendment_events.5.b: "それを拒絶する - 必須の最小値と質量の焼成は答えではありません"
 
 amendment_events.6.t: "税務システム改革"
 amendment_events.6.d: "ユ・ジワの財務大臣は、人々の共和国の創設以来、最も重要な財政改革を提案しました — 国家付加価値税と正式な収益式で、北京と地方政府間の交渉された企業の税務整理を交換しました。\n\n 改革は、北京に信頼性と成長した収益ストリームを与える、財政力を飛躍的に集中させます。 地方政府は裁量を失うが、明快さを得る。 地方自治体との関係を築き上げた産業および商業的関心は静かに反対しています。"
 amendment_events.6.f: "中心は、地域が維持されていることを望んでいます。"
 amendment_events.6.a: "税務システムの導入 — 財務省"
 amendment_events.6.b: "既存の配置を維持する — 関数を混乱させない"
 
 amendment_events.7.t: "週35時間のワーク"
 amendment_events.7.d: "労働大臣Martine Aubryは、ほとんどの従業員のために35時間の法定労働時間を管理し、39から標準時間を減らすことを提案しました。 本方針は、作業者の労働時間が少なく、作業員が雇用する作業員が増えるまで、より広く作業をシェアする方法として提示されます。\n\n 貿易組合は熱心です。 雇用主の連盟は競争力の危機に警告しました。 エコノミストは分けられます。 この政府が約束に調印した左翼の石炭火。 質問は、それを配信するかどうかです。"
 amendment_events.7.f: "所要時間:約30分 2時間以内 政治家。"
 amendment_events.7.a: "Aubry Lawを渡す - 労働者は短時間に値する"
 amendment_events.7.b: "それをドロップする - 経済コストが高すぎる"
 
 patriot_act_rejected_modifier: "PATRIOT法の拒否"
 patriot_act_rejected_modifier_desc: "PATRIOT法を通過しない決定は、セキュリティの確立の不満を残し、ポストアタックの政治合意が緊張しました。"
 
 china_tax_reform_rejected_modifier: "税制改革"
 china_tax_reform_rejected_modifier_desc: "税務システムを一元化しても、会計事務所の断片が残っている。 地方政府は、自らのアレンジを交渉し、センターの収益と権限を削減します。"
 
 terrorism_a.1.t: "世界貿易センターが爆破"
 terrorism_a.1.d: "ニューヨークのワールドトレードセンターの地下駐車場に爆弾が爆発しました。 爆発は6人で死亡し、千人以上を巻きました。 建物は落ちませんでした。しかし、その意図はもう1つのタワーをもう1つのタワーに引き上げることでした。\n\nそれは[ROOT.GetCountry.GetName]土壌の最初の主要な国際テロリスト攻撃です。 パーペレータは、中東と中央アジアのネットワークを網羅しています。 調査は進行中です。"
 terrorism_a.1.f: "最初の攻撃。 最後にはありません。"
 terrorism_a.1.a: "私たちは、その責任を見つける"
 
 terrorism_a.2.t: "ハリケーン・アンドリュー・ストライク"
 terrorism_a.2.d: "ハリケーン・アンドリュー — 当時の記録に最も破壊的な大西洋のハリケーン — 風が 1 時間 165 マイルを超える南フロリダ州に造られました。 ダメージは大惨事です。 マイアミ・ド・カウンティのコミュニティが破壊されました。 予備の見積もりは、[ROOT.GetCountry.GetName] の歴史の中で最も費用対効果の高い自然災害の1つです。"
 terrorism_a.2.f: "ハリケーンは、建設されたものは何もありません。"
 terrorism_a.2.a: "連邦災害を宣言 — 救済を動員"
 
 terrorism_a.3.t: "ノースリッジ地震"
 terrorism_a.3.d: "朝4時31分にロサンゼルスのサン・フェルナンド・バレーを襲った標高6.7の地震。 偽りなく、数千人の負傷者とインフラの損傷 - 特に高速道路システムと古い建物 - すでに数十億ドルを超える。 地震は、[ROOT.GetCountry.GetName] の履歴に相当する費用です。"
 terrorism_a.3.f: "カリフォルニアの揺れ。 常に揺れる。"
 terrorism_a.3.a: "すぐに連邦救済を安定化"
 
 terrorism_a.4.t: "オクラホマシティで爆破"
 terrorism_a.4.d: "トラック爆弾は、オクラホマシティのアルフレッドP.マラー連邦ビルの前面を破壊しました, 殺害 168 人 - 含めて 19 建物の保育センターの子供. [ROOT.GetCountry.GetName] の履歴でデッドリートな国内テロリスト攻撃です。\n\n 人形劇は外国ではありません。 Timothy McVeigh と Terry Nichols は [ROOT.GetCountry.GetAdjective] 市民が反政府の病理によって動機づけられます。 国は、脅威が内部から来ることができる現実に直面しています。"
 terrorism_a.4.f: "敵は境界線ではなかった。 お問い合わせ"
 terrorism_a.4.a: "これは国内テロ主義であり、全力で対応します。"
 
 terrorism_a.5.t: "米国大使館が東アフリカで爆破"
 terrorism_a.5.d: "Nairobi、Kenken、Dar es Salaam、タンザニアの[ROOT.GetCountry.GetAdjective]大使館の外に同時トラック爆弾が爆発しました。 200人を超える人々を殺した攻撃 - それらのほとんどは、ケニアとタンザニアの市民 - そして数千以上を巻きました。 Osama bin Laden によって導かれるネットワークは責任を主張しました。\n\n 攻撃は、[ROOT.GetCountry.GetAdjective] の利息がターゲットであるという宣言です。 [ROOT.GetCountry.GetName] の応答は、今後数十年にわたって反乱の形状を定義します。"
 terrorism_a.5.f: "戦争は私たちの大使館に最初に来ました。"
 terrorism_a.5.a: "これは戦争の行動です。"
 
 terrorism_a.6.t: "[ROOT.GetCountry.GetAdjective] スタッフ 爆弾"
 terrorism_a.6.d: "ナイロビの米国大使館の外にトラック爆弾が爆発し、200人を超える人々を殺す - それらの大半 [ROOT.GetCountry.GetAdjective] 当時の建物の近くで起きた市民。 攻撃は、[ROOT.GetCountry.GetName] を目的としていません。 [ROOT.GetCountry.GetName] は、とにかくコストを負担します。"
 terrorism_a.6.f: "爆弾は国間で区別しませんでした。"
 terrorism_a.6.a: "死者の正義を要求します"
 
 terrorism_a.7.t: "[ROOT.GetCountry.GetAdjective] 資本金はスタック"
 terrorism_a.7.d: "爆弾は、ダーエス・サラームの米国大使館の近くに爆発しました, ナイロビの同時爆撃と一緒に調整された攻撃であることが表示されます11人の人々を殺害, ケニア. 犠牲者は主に [ROOT.GetCountry.GetAdjective] 民間人であった。 攻撃は国を揺さぶる。"
 terrorism_a.7.f: "テロリズムは、海を渡って私たちの海岸に到達しました。"
 terrorism_a.7.a: "わたしたちは、"
 
 terrorism_a.8.t: "米国コールが爆破される"
 terrorism_a.8.d: "Aden、Yemenの港で油を差したUSSのコールと漂流する爆薬を運ぶ小さいボート。 セブンティーン [ROOT.GetCountry.GetAdjective] セーラーは殺され、39 負傷した。 攻撃は al-Qaeda.\n\n[ROOT.GetCountry.GetAdjective] の warship に起因します。 海軍は、フレンドリーな港で定期的な給油停止で、ゴムの消火で自殺爆撃者によって攻撃されました。 軍事的リーダーシップは、これが起こることを許されたかを尋ねています。"
 terrorism_a.8.f: "ネイビーは、ハードターゲットになるはずである。"
 terrorism_a.8.a: "これは、解禁を行わない"
 
 terrorism_a.9.t: "ブリッジクリーク-モーアトルネード"
 terrorism_a.9.d: "EF5 トルネード — フジタのスケールで記録された最強 — は、オクラホマ州ブリッジクリークとムーアのパスをカットしました。 風速は毎時300マイルを超える。 トルナドは、85分間地上にいたし、オクラホマシティの南部のコミュニティを通じて、総破壊のマイルワイドなパスを彫刻しました。 Thirty-sixの人々は死にます。"
 terrorism_a.9.f: "トルネードがいたところは残らない。"
 terrorism_a.9.a: "影響を受けるコミュニティへの救済の展開"
 
 terrorism_a.10.t: "バージニアテックの32デッド"
 terrorism_a.10.d: "ガンマンは、バージニア州ブラックスブルクにあるバージニア・ポリテクニック研究所で32人の学生と教員を殺しました。 [ROOT.GetCountry.GetName] の履歴にある致命的な学校の撮影です。 シューターは、既存の法律で彼を失格させるべきである精神的な健康問題の歴史にもかかわらず、彼の銃器を合法的に購入しました。\n\n バックグラウンドチェックシステムの故障は、今では失礼中です。"
 terrorism_a.10.f: "銃を合法的に買った。"
 terrorism_a.10.a: "ファイアウォールの背景チェック手順をすぐに確認"
 
 terrorism_a.11.t: "82 オーロラ・シアターで撮影"
 terrorism_a.11.d: "オーロラ、コロラド州のセンチュリー16劇場でメジャー映画の真夜中初演中に銃門が開幕し、12人の人々を殺し、70を創る。 攻撃者は、半自動ライフル、ショットガン、およびハンドガンで武装していました。攻撃の1週間前に合法的に購入しました。\n\nColoradoと国は衝撃的です。"
 terrorism_a.11.f: "映画の夜。 何人かの人が家を出さない。"
 terrorism_a.11.a: "反射を要求する悲劇"
 
 terrorism_a.12.t: "銃師はウィスコンシン・シーク寺院で6を殺す"
 terrorism_a.12.d: "オーククリークのウィスコンシン寺院で白いsupremacistが火災を開き、警察によって撮影される前に6人の礼拝者を殺します。 攻撃者は、Neo-Nazi組織へのリンクを持つ米国軍のベテランでした。\n\n 犠牲者は、宗教や民族性のために標的されました。 攻撃は、国内の暴行、憎悪犯罪、および白の国民主義のネットワークを監視する失敗について議論を再発しました。"
 terrorism_a.12.f: "祈りに来た。 誰がいたかを殺して来た。"
 terrorism_a.12.a: "これは憎悪の犯罪です — 私たちは、国内の暴行を無視しません"
 
 terrorism_a.13.t: "Sandyのホックのtragedy"
 terrorism_a.13.d: "ガンマンは、6歳から7歳にかけて20人の子供を殺し、ニュータウンのサンディ・ホック・小学校で6人の大人のスタッフを、コネチカット州で殺しました。 子供たちは、攻撃スタイルのライフルで何度も撮影されました。\n\n 十分な言葉はありません。 [ROOT.GetCountry.GetName] は mourning にあります。"
 terrorism_a.13.f: "20代のお子様 6歳。"
 terrorism_a.13.a: "国の悲嘆"
 
 terrorism_a.14.t: "ダンブレン・マッサージ"
 terrorism_a.14.d: "ガンマンは、スコットランドでダンブレン小学校に入学し、5歳から6歳までの16人の子供を殺し、自分の人生を身につける。 [ROOT.GetCountry.GetName] の履歴でデッドリートマス撮影です。\n\n 国民の反応は圧倒的です。 生存者、両親、および公共は、私的手始めの所有権に関する総禁止のためのキャンペーンを開始しました。 政府は行為に巨大な圧力に直面します。"
 terrorism_a.14.f: "16 人の子供。 5歳から スコットランドは忘れません。"
 terrorism_a.14.a: "何かは変化しなければなりません — 国はそれを要求します"
 
 terrorism_a.15.t: "陽気な洪水"
 terrorism_a.15.d: "陽気な川とそのトリビュータは、異常に重い降雨の月後に壊滅的に洪水した。 洪水は、中央と南の [ROOT.GetCountry.GetName] - 14 州、農地の 56 万エーカー、および数千の決済に遭遇しました。 3,000人以上が死亡し、14万人が変位しました。\n\n 状態の動員は巨大です。 軍隊は洪水の救済に何千もの軍隊を配備しました。 最近の[ROOT.GetCountry.GetAdjective]史上最大の自然災害です。"
 terrorism_a.15.f: "川は、酒が約束したことを取ることにした。"
 terrorism_a.15.a: "状態の完全な力が展開されます"
 
 terrorism_a.16.t: "モスクワに爆弾のアパート"
 terrorism_a.16.d: "モスクワのアパートメントビルやロシアの都市の爆弾攻撃のシリーズは、彼らは眠りながら、ほぼ300人殺しました。 爆弾はチェチェン・セパリストに起因していますが、証拠はいくつかのオブザーバーによって競争されています。\n\n 攻撃は、決定的な軍事的反応のための巨大な公共圧力を作成しました。 チェチェンヤの新たな軍事キャンペーンは、今では深刻な検討中です。 テロリストをつぶすことを約束する政治数字は、公共が彼に従う準備ができている見つけるでしょう。"
 terrorism_a.16.f: "恐怖は強力な政治ツールです。 だから悲しみです。"
 terrorism_a.16.a: "これは、完全な軍事的反応を必要とする"
 
 # ── MODIFIERS ────────────────────────────
 
 he_terror_attack_domestic: "国内テロ攻撃"
 he_terror_attack_domestic_desc: "[ROOT.GetCountry.GetAdjective] 土壌に対するテロ攻撃は、公共の自信を揺らせ、過激化と亀裂を増加させました。"
 
 he_terror_attack_foreign: "海外テロ攻撃"
 he_terror_attack_foreign_desc: "[ROOT.GetCountry.GetAdjective] の利息に対するテロリスト攻撃は、海外のプレステージとディプロマティックスタントを傷つけています。"
 
 he_counterterrorism_push: "テロ対策対応"
 he_counterterrorism_push_desc: "主要な反乱キャンペーンが搭載されています。 権限と正当性は廃止されます。しかし、海外の積極的な操作によって生成された親友は、決定に時間がかかるでしょう。"
 
 he_natural_disaster_emergency: "自然災害緊急事態"
 he_natural_disaster_emergency_desc: "主要な自然災害は、連邦の緊急対応をトリガーしました。 費用は重要で、政府の能力は伸びています。"
 
 he_disaster_zone: "災害ゾーン"
 he_disaster_zone_desc: "この状態は、自然災害に深刻な被害を受けています。 インフラ、死亡率、マイグレーションプルはすべて負の影響を受けます。"
 
 he_domestic_extremism_response: "国内過激症対応"
 he_domestic_extremism_response_desc: "国内テロ攻撃の後、[ROOT.GetCountry.GetName]は、ネットワークをターゲットとする重要な内部セキュリティ応答を開始しました。"
 
 he_military_shock: "軍の衝撃"
 he_military_shock_desc: "[ROOT.GetCountry.GetAdjective] 軍事資産の攻撃は、武装した力と損傷した国家の威信を揺さげています。"
 
 he_mass_shooting: "マス撮影"
 he_mass_shooting_desc: "銃器政策に対する公共の不安と政治的偏光が増加しました。"
 
 he_mass_shooting_severe: "マスシューティング - 国家トラージ"
 he_mass_shooting_severe_desc: "絶妙な重症の大量撮影は、深い国家悲嘆と激しい政治的圧力を作成しました。 既存の方針の正当性が疑われています。"
 
 he_hate_crime_shock: "憎悪犯罪 - 国家の衝撃"
 he_hate_crime_shock_desc: "標的の憎悪犯罪攻撃は、国家にショックを与え、少数民族のコミュニティに向けられた国内の運動の脅威を強調した。"
 
 he_gun_reform_mandate: "銃改革のための公正な義務"
 he_gun_reform_mandate_desc: "大量射撃後の公共の不足は、防火薬改革のための強力な政治勢力を作成しました。 法律の制定は、通常よりも簡単です。"
 
 he_security_state_response: "セキュリティ状態の応答"
 he_security_state_response_desc: "主要なテロ攻撃は、拡張された状態のセキュリティパワーに対するパブリックサポートを生成しました。 権限と正当性は廃止されます。"
 
 ## breakup of czechoslovakia
 je_velvet_divorce: "ベルベットの離婚"
 je_velvet_divorce_reason: "フェデレーションは緊張下にあります。 コミュニズムからの移行は、チェコとスロバキアの半分の間の経済と政治の欠陥線を暴露しました。 Vladimír Mečiarによって導かれるSlovakの政治家 - より大きな自律性のためにプッシュされ、完全な独立のためのいくつか。 Václav Klausによって導かれるチェコの側面は、それらが行くことを許可するためにますます喜んでいます。\n\n 2つの力が動きます。 [ROOT.GetCountry.GetName] は #bold 連邦コヒーション#! をビルドしなければなりません。 #bold の separatist 圧力#! は、dissolution irreversible となります。\n\n 結束前の圧力が100に達すると、フェデレーションは溶解します。 平和。 それは「ベルベット」の意味です。"
 
 je_velvet_divorce_stable_tt: "連盟は保持しています。 交渉は続行します。 政府の手の中にも、その成果が残っています。"
 je_velvet_divorce_tense_tt: "@warning! #bold セパラチスト圧力が上昇します。#! スロバキアの政治家は、依存性が可能で望ましいと確信しています。 交渉された決済のウィンドウが狭くなります。"
 je_velvet_divorce_critical_tt: "@warning! #bold federation はブレークポイントです。#! 解散の政治条件はほぼ完了です。 劇的な介入がなければ、チェコスロバキアは年を生き残ることはありません。"
 
 federal_cohesion_bar: "連邦凝集"
 federal_cohesion_bar_desc: "連邦凝集"
 federal_cohesion_bar_progress_tt: "連邦凝集レベル"
 
 separatist_pressure_bar: "分離器圧力"
 separatist_pressure_bar_desc: "分離器圧力"
 separatist_pressure_bar_progress_tt: "セパラティストのモーメント"
 
 # ── EVENTS ───────────────────────────────
 
 velvet_divorce.1.t: "憲法危機の始まり"
 velvet_divorce.1.d: "1992年6月の選挙は不可能な結果を生み出しました。 チェコの土地では、Václav Klausの市民民主党は急速な市場解放のプラットホームで勝ちました。 スロバキアでは、Vladimír Mečiarの民主スロバキアの動きは、より遅い改革とより大きなSlovak自律性のプラットフォームで勝ちました。\n\n 2人の男性はブルノで会い、1つのことに合意しました。現在のアレンジは続行できません。 彼らは他のほとんどすべてで同意します。 大統領Václav Havel — 国民が尋ねたと一緒に国を維持するために投票すると信じている人 - 並列されている。\n\n [ROOT.GetCountry.GetName] の運命は、次の月が来るものの質問です。"
 velvet_divorce.1.f: "2つの選挙。 2つの日付。 1つの国。"
 velvet_divorce.1.a: "政府は一緒に連盟を保持するために働きます"
 
 velvet_divorce.2.t: "スロバキア経済グリーバンス"
 velvet_divorce.2.d: "スロバキアの経済はボヘミアとモラビアよりもコミュニケーションの難しさからの移行に苦しんでいます。 Slovak産業拠点 — ワルシャワ・パクトの重い製造と腕の生産を中心に構築され、ほぼ一晩崩壊しました。 失業が急激に進んでいます。 スロバキアの政治家は、連邦経済政策を非難し、再配布または独自のコースを設定する権利を要求しています。\n\n 国の2つの半分の間のギャップは政治的に可燃性になっています。"
 velvet_divorce.2.f: "半分の国がうまくいかないと、もう半分が誰の質問になるのかという質問はそうではありません。"
 velvet_divorce.2.a: "スロバキア地域への連邦資金の送金"
 velvet_divorce.2.b: "市場は、そのレベルを見つける - 特別な治療はありません"
 
 velvet_divorce.3.t: "SovereigntyのSlovak宣言"
 velvet_divorce.3.d: "スロバキア国民議会は、スロバキアの主権の宣言を通過しました。 文書は独立を宣言するのを短く停止しますが、Slovak法がSlovak領土の連邦法を上回ると主張しています。\n\n これは、組織的に曖昧で政治的に爆発的です。 ヘブル大統領はそれを非難し、すぐに彼のチェコスロバキア大統領を辞任しました。 宣言はまだ破裂ではありませんが、それは最初の正式なステップです。"
 velvet_divorce.3.f: "まだ独立していません。 しかし、方向は明確です。"
 velvet_divorce.3.a: "宣言を非難 — 連邦の法律はsupremeです"
 velvet_divorce.3.b: "オープントーク — スロバキアはフェデレーション内のより正式な自律性を提供します"
 
 velvet_divorce.4.t: "MečiarとKlaus: 2人の男性、2つのビジョン"
 velvet_divorce.4.d: "Vladimír Mečiar と Václav Klaus が再び会った. 交渉ポジションが硬化しました。 クラウスは、統一された経済政策と緊密な連邦連合を望んでいます。 Mečiar は、近くの Slovak 国産自律性、または独立性の緩い告白を望む。\n\n 会議に出席した者は、市民として説明するが、不可解である。 2人の男性は敵ではありませんが、根本的に異なることを望んでおり、そのうちの1つは彼が望むものを得るでしょう。"
 velvet_divorce.4.f: "2つのフレーズ 反対の結論。"
 velvet_divorce.4.a: "ユニファイド市場改革プログラムをバックアップ — Klausをサポート"
 velvet_divorce.4.b: "ゆるみの告白を提供 — Mečiar に何かを働かせてください。"
 
 velvet_divorce.5.t: "紹介のためのコール"
 velvet_divorce.5.d: "Slovak 政治家や市民グループが独立に関する紹介を求めています。 提案は、投票がいくつかの分離の形式を支持する狭い大部分を提案するスロバキアで重要な公共サポートを持っています。\n\n ヘブル大統領は、辞任にもかかわらず、依然として影響力があります。 プロセス自体が情熱を損なうと合理的結果が不可能になると信じています。 「ニシオンは、株主総会が合併に投票する方法を分離することを決定しない」と彼は言いました。 '彼らはそれに向かって、またはそれから離れて感じます。'\n\n 投票権を保持するかどうかの質問は、それが信じる[ROOT.GetCountry.GetName]についての投票です。"
 velvet_divorce.5.f: "紹介は質問です。 しかし、質問に答えが変更されるように要求します。"
 velvet_divorce.5.a: "レファレンダムを保持 — 人が話すように"
 velvet_divorce.5.b: "紹介文をブロックする — フォローする ハヴェルのカウンセリング"
 
 velvet_divorce.10.t: "チェコ語oslovakia Survives"
 velvet_divorce.10.d: "危機は通過しました。 経済の妥協、政治交渉、および連邦機関の持続性を組み合わせて、[ROOT.GetCountry.GetName]は一緒に開催しました。\n\n 出てきたアレンジは1990年の連盟ではありません。 スロバキアはより自律性を持っています。 2つの半分間の経済関係はバランスが取れています。 しかし、状態はそのままで、フラグは変更されません。\n\n 歴史は、これは避けられないことではありませんでした。それはアクティブな選択肢が必要であり、それらの選択肢は作られました。"
 velvet_divorce.10.f: "ベルベットの離婚は起こりませんでした。 それは勝利です。"
 velvet_divorce.10.a: "チェコ語oslovakia endures"
 
 velvet_divorce.15.t: "ベルベットの離婚"
 velvet_divorce.15.d: "完了です。 1993年1月1日、チェコスロバキアは存在しません。\n\n 解散は、連邦議会によって合意された - 参照によるものではありません。 直接聞かれなかった。 国の半分のPollsは一貫して一般的な状態のいくつかのフォームを保存するための過半数のサポートを示しました, しかし、政治的クラス — クラウスとMečiarの最優先 — unionが動作不能であることを決定しました.\n\n スプリットは平和でした。 ショットが消火されました。 国境を越えない 群れの資産と負債は、人口に基づいて数式に応じて分けられました。 軍隊は分裂しました。 通貨は分割されました。 フラグが分割されました。\n\nCzechoslovakia は 7 年間存在しました。 議会の投票で革命的に生まれ、解散しました。 EU、NATOの会員には、後継者の状態が適用されています。"
 velvet_divorce.15.f: "七五年。 書類作成終了"
 velvet_divorce.15.a: "溶解が進む"
 
 velvet_divorce.16.t: "チェコ共和国が生まれた"
 velvet_divorce.16.d: "1993年1月1日、チェコ共和国は独立した状態になります。 ボヘミア、モラビア、チェコのシレスアの領土 - プラハは首都として - チェコスロバキア連盟に2つの後継者の状態の1を形成します。\n\n 新しい状態は、古い経済、機能的な民主的システム、即時の国際認識の半分を継承します。 ヨーロッパへの道は開いています。"
 velvet_divorce.16.f: "新しい状態。 旧国。"
 velvet_divorce.16.a: "チェコ共和国が始まります"
 
 velvet_divorce.17.t: "スロバキア共和国が生まれた"
 velvet_divorce.17.d: "1993年1月1日、スラブ共和国は独立州となります。 Bratislava は、このフォームに正確に 1 日間存在していた国の首都です。\n\nSlovakia は、より重い産業遺産、より高い失業、より複雑な政治環境を継承しています。Mečiar のガバナンスのスタイルは、すぐに国際的批判を描画します。 しかし、状態は、歴史の最初の時間のために、完全に独立して、容認され、認識されます。"
 velvet_divorce.17.f: "歴史の中で初めて:独立したスロバキア。"
 velvet_divorce.17.a: "スロバキア共和国が始まります"
 
 velvet_divorce.18.t: "これからは?"
 velvet_divorce.18.d: "チェコ語oslovakia は 溶解. その後継者の状態 — チェコ共和国とスロバキア共和国 — 形をとっています。\n\n もはや存在しない国のリーダーでした。 質問は、次のもので再生する役割です。"
 velvet_divorce.18.f: "1つの国。 2つの未来。"
 velvet_divorce.18.a: "チェコ共和国として継続"
 velvet_divorce.18.b: "スロバキア共和国"
 velvet_divorce.18.c: "解散を再開し観察する"
 
