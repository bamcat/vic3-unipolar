 je_demographic_crisis: "デモグラフィック危機"
 je_demographic_crisis_reason: "わたしたちの国は、絶え間ない人口統計危機に直面しています。 私たちの労働力を縮小し、私たちの社会システムを負担するために脅迫される老化人口と低下の出産率。 私たちは、包括的なプロ・ナタリストのポリシーを制定し、一時的な人口統計バッファが期限切れる前に、この傾向を反転するために10年間それらを維持しなければなりません。"

 je_demographic_crisis_progressing_tt: "プロナタリストの方針は効果があり、条件は満たされています。 進捗状況:#bold [Root.GetCountry.MakeScope.Var('demographic_months_sustained').GetValue|0]#!/120か月。"
 je_demographic_crisis_stalling_tt: "#negative Pro-natalist 条件が満たされなくなった。#! 進捗は決定されます。 現在の: #bold [Root.GetCountry.MakeScope.Var('demographic_months_sustained').GetValue|0]#!/120か月。 児童養護施設、ヘルスケア、福祉、住宅法を制定し、生活水準の維持を図っています。"
 je_demographic_crisis_idle_tt: "人口統計危機を解決するための進歩はありません。 育児・医療・福祉・住宅法の実務家政策 少なくとも12のリビングの平均基準を維持します。"

 demographic_crisis_sustained_tt: "プロ・ナタリストの方針は10年連続(120か月)持続しました。"

