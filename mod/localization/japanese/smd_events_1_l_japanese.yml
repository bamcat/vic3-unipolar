 je_chechen_war_status_guerilla: "戦争は、#bold guerrillaphase#!にあります。 チェチェンの戦闘機は、山を使用してヒットアンドラン攻撃を実行します。 戦いは、戦争のスコアをシフトし、主要な攻撃をアンロックします。"
 je_chechen_war_status_offensive: "#bold の主要な攻撃#! が起動しました。 戦争は、その決定的なフェーズに入りました。"
 
 je_chechen_war_score_bar: "戦争スコア"
 je_chechen_war_score_bar_desc: "ロシアの利点"
 je_chechen_war_score_bar_second_desc: "Chechenの利点"
 
 chechen_war_startup_tt: "最初のチェチェン戦争が始まりました。 ロシアとチェチェン軍の間の戦いは、戦争のスコアをシフトします。 十分な勢いが構築されると、決定的な攻撃性が起動できます。"
 
