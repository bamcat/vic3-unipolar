 demographic_events.1.t: "デモグラフィック危機"
 demographic_events.1.d: "専門家は、国が厳しい人口統計危機に直面していると警告しています。 降下出生率のデカデドは、すぐに私たちの労働力を圧倒する老化人口を生成しました。 育児、医療、住宅、社会福祉への投資を支持することなく、当社の経済基盤は、従属する労働者の比率が崩壊するにつれて発生します。\n\n仮の人口統計バッファは現在、最悪の効果をマスクしますが、このバッファは今後数十年にわたって崩壊します。 トレンドを逆転させるために、少なくとも10年間、包括的なプロナタリストの改革を制定し維持しなければなりません。"
 demographic_events.1.a: "遅すぎる前に行動しなければなりません"

 demographic_events.2.t: "デモグラフィックの回復"
 demographic_events.2.d: "ユニバーサル・チャイルド・ケア、アクセシブル・ヘルスケア、包括的な福祉、手頃な価格の住宅など、当社の国民の出産率は安定しています。 私たちの経済を破棄するために脅迫された人口統計危機は逆転しました。 新しい世代の労働者が労働力に入り、未来は明るく見えます。"
 demographic_events.2.a: "私たちの忍耐は払いました"

