 io_accession_not_subject_tt:0 "応募者は、対象外とはなりません。"
 io_accession_democratic_government_tt:0 "民主的な憲法枠組みを持っています: 大統領共和国、議会、または議決権を持つ憲法の僧侶。"
 io_accession_no_authoritarian_laws_tt:0 "Autocracy、Oligarchy、Single-Party State、No Voting、Landed Voting、Appointed Bureaucrats、またはOutlawed Dissentなどの権威ある法律はありません。"
 io_accession_voting_rights_tt:0 "Censusの投票か普遍的なsuffrageを持って下さい。"
