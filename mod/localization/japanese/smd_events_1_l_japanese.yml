 chechen_war.1.t: "攻撃的な始まり"
 chechen_war.1.d: "戦争の決定フェーズが始まりました。 初期の競合を定義したゲリラ戦場は、直接対立する方法を提供します。 カウカスの山々は、チェチェンヤの最後の闘争を目撃します。"
 chechen_war.1.a: "ロシア向け!"
 chechen_war.1.a.che: "Ichkeriaに!"
 
 chechen_war.2.t_rus: "チェチェンヤのロシアの勝利"
 chechen_war.2.d_rus: "チェチェンの抵抗は壊れました。 ロシア軍は、断片の共和国の上に安心の制御を持っています。 生活インフラの費用は密かですが、ロシア連邦の領土の完全性は維持されています。"
 chechen_war.2.t_che: "チェチェン独立"
 chechen_war.2.d_che: "再びすべてのオッズ, チェチェンの戦闘機は、捕虜. ロシア軍は撤退し、イッケリア州のチェチェン共和国は独立した国として立っています。 自由の費用は驚くべきものでしたが、チェチェンの人々は信じられないことを証明しました。"
 chechen_war.2.a: "歴史は、この日を思い出します"
 
 chechen_war.5.t: "マウンテンアンブス"
 chechen_war.5.d: "私たちの戦闘機は、狭い山のパスを介して移動ロシアの詐欺を特定しました。 地形はアンブスに最適です。両側の急な崖、マヌーバーに限られた部屋、そして男性のためのカバーを提供する密な森。"
 chechen_war.5.a: "山々からの突撃"
 chechen_war.5.b: "ポジションを保持する"
 
 chechen_war.6.t: "供給ラインのレイド"
 chechen_war.6.d: "ロシア供給コンボは、最低限の護衛で低地を通って移動してきました。 私たちの戦闘機は、貴重な供給を捕捉し、敵の物流を破壊する可能性があるが、操作は私たちにリソースを費やし、再帰を招く可能性があります。"
 chechen_war.6.a: "供給ラインをレイド"
 chechen_war.6.b: "トオリスク"
 
 chechen_war.7.t: "カウカスの戦争"
 chechen_war.7.d: "イクカーリア州チェチェン共和国は独立を宣言し、ロシアは軍事力に応答しました。 ノース・カウカスは戦争に耐えられる。 険しい山地形は、チェチェン・ゲリラに天然の優位性を与えますが、ロシア軍は恐ろしいかもしれません。"
 chechen_war.7.a: "それでは始まります"
 
