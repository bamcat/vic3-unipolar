 oslo_ii_proposal_sent_tt:0 "イスラエルは、オスロIIの中間合意をパレスチナに提案する。 パレスチナが受け入れない限り、条約は影響を受けません。"
 oslo_ii_israel_delay_tt:0 "イスラエルはオスロIIの提案を遅らせます。 さらなる再雇用の屋台。"
 oslo_ii_palestine_accept_tt:0 "パレスチナはオスロIIを受け入れます:自己政府、共同保証の整理および区域A/Bのプレースホルダの効果は加えられます。"
 oslo_ii_palestine_reject_tt:0 "パレスチナはオスロIIを拒絶します:オスロIIの影響は発生せず、中間プロセスは停止します。"

