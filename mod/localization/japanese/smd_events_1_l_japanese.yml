l_japanese:
#################### JE ####################
# The Internet

je_internet:0 "インターネット"
je_internet_reason:0 "我が国をインターネットに接続する時間です! 簡単な電話トラフィックをサポートし、最終的には世界ワイドウェブの不思議に私たちの市民を紹介し、当社の通信ネットワークをアップグレードしなければなりません!"

smd_tech.1.t:0 "[ROOT.GetCountry.GetName] オンラインで行く"
smd_tech.1.d:0 "何十年もの間、新聞、ラジオ、テレビなどでのコミュニケーションが取れています。 しかし、静かな革命は、インターネットとして知られる相互接続されたコンピュータの広大なネットワークである、世界を魅了しています。 学術や軍事研究者の領域が始まったら、市民がどのように働き、学び、そしてつながるかを変えることを約束します。"
smd_tech.1.f:0 "ダイヤルアップインターネット:猫の写真をロードするために5分待って、ビープを叫ぶような「ハイテク」は言うまでもありません。"

smd_tech.1.a:0 "おそらく、他の技術は、Webをうまく接続する必要があります!"
smd_tech.1.b:0 "私たちは、パブリックな意見をコントロールするために、インターウェブを使用することができます"

government_run_wifi_modifier:0 "Wifiの政府の干渉"

# Computer Science

je_computer_science:0 "コンピュータサイエンス"
je_computer_science_reason:0 "コンピュータサイエンスは、コンピュータの仕組み、問題の解決方法、そして効率的にそして安全に使用できる方法の研究です。"

smd_tech.2.t:0 "コンピュータサイエンス学位"
smd_tech.2.d:0 "論理的に考え、問題を解決する科学として想像してみてください。しかし、すべての小さな指示に従う機械で。 それは抽象的かつ実用的であり、それは私たちの周りのほぼすべての近代的な技術に動力を与えます, スマートフォンから自己運転車へ."

# Pesticides

je_pesticides:0 "除草剤"
je_pesticides_reason:0 "農薬は害虫を制御するために使用される物質です。 それらは除草剤、殺虫剤、nematicides、殺菌剤および他の多くの他を含んでいます。 これらの最も一般的なのは、世界中ですべての農薬の使用の約50%を占める除草剤です。 この新しい発明により、農薬を含む農業分野を近代化する義務に直面しています。"

smd_tech.3.t:0 "死者の害虫の海"
smd_tech.3.d:0 "ミレニアムでは、昆虫やげっ歯類は、人間の農業活動に対する不寛大な脅威を保っています。 有害昆虫を駆除し殺すさまざまな食品安全化学物質の最近の発明により、より多くの自発的な収穫を収穫することができますが、一度、そしてすべてのためにより大きな食品安全性を確保します!"

smd_tech.3.a:0 "環境被害が少なくなれば、おそらく良いでしょう..."

# Globalization

je_globalization:0 "グローバル化"
je_globalization_reason:0 "グローバリゼーションは、20世紀後半の現象で、より大きな相互接続、文化、商品、兵器、そして人々の自由な乗り継ぎによって定義され、世界中に広がるフリートレードのイニシアチブが一堂に会しています。"

je_asian_economic_reform: "経済改革"
je_asian_economic_reform_reason: "中国とインドは、経済規制に拘束されてきました。 グローバル経済は、統合と無料取引に急速に変化しています。 未曾有の制限を外すことで、未曾有の成長期を迎えることもあります。 それまで、当社の市場は禁忌です。"

asian_economy_restrictions: "経済規制"
asian_economy_restrictions_desc: "国家制御の非効率性および保護主義の障壁は貿易を遅くし、競争力および国際的なアクセスを減らします。"

booming_trade_economy: "ブーム貿易経済"
booming_trade_economy_desc: "限界を持ち上げる、外国および国内市場は繁栄し、より大きい繁栄に導きます。"

asia_reform.1.t: "市場オープンアップ"
asia_reform.1.d: "改革が制定され、制限的な取引方針が削除されました。 中国とインドは、経済のグローバル化の最前線に立っています。"
asia_reform.1.f: "「私たちは市場をオープンしなければいけません。"
asia_reform.1.a: "取引の新たな時代が始まります。"

# Starship

je_starships:0 "スターシップ"
je_starships_reason:0 "再使用可能なロケットの発明は、宇宙船、星船の別のタイプの発明にすぐに拍手しました。 機内の障壁を効果的に侵害し、火星に着陸し、地球に戻り、安定した健康を維持しながら、それは私たちの認識に値する革命的な新しいデザインです。"

# coming soon

################ others ###########

# Cancer

cancer.1.t:0 "がんの治療"
cancer.1.d:0 "1世紀以上にわたって、がんは人類を害してしまいました。何百万を主張し、すべての治療法を除外する予測不可能な苦難。 国境がなく、状況を尊重し、触れた家族全員に退去した。 しかし、今日、無数の研究、臨床試験、および国際コラボレーションの年後、科学者は不可能なことを行っている:普遍的な、ターゲティングされた治療法を開発しました。 このブレークスルー療法は、健康な組織に害を及ぼすことなく、悪性細胞を検出し、破壊するだけでなく、保証された。"
cancer.1.a:0 "すべての人類のための勝利。"
cancer_eradication_prestige:0 "放射線癌"

# 2004 Indian Ocean earthquake and tsunami

indian_ocean_tsunami.1.t: "震災はインド洋を襲う"
indian_ocean_tsunami.1.d: "南・南・東南アジアの沿岸地域を破壊し、大惨事な津波を発足させました。 ダメージは未曾有であり、回復は何年もかかります。"
indian_ocean_tsunami.1.a: "早急に再建をし始める必要があります。"
indian_ocean_tsunami.1.f: "史上最悪の災害のうちの1つに、壊滅的な地震と津波が沿岸地域を破壊しました。"

je_indian_ocean_tsunami: "津波の回復"
je_indian_ocean_tsunami_reason: "津波を壊すと、海岸のインフラを壊し、国を揺るがしました。 復興の努力は、回復と安定性に不可欠です。"

tsunami_recovery_success_tt: "あなたは首尾よく国家の回復を開始しました."

tsunami_disaster_struck: "全国津波被害"
tsunami_local_destruction: "ローカル津波の破壊"
tsunami_reconstruction_complete: "再建完了"
  
indian_ocean_tsunami_recovery_title: "津波復興の取り組み"
indian_ocean_tsunami_recovery_desc: "インド洋津波に襲われた国。 あなたの人口とインフラを安定させるために援助と回復を実施します。"

tsunami_aid_title: "人道援助を提供して下さい"
tsunami_aid_desc: "福祉改革の有効化や、影響を受けた地域を再構築するための財政援助の割り当て。"

tsunami_disaster_struck: "全国津波被害"
tsunami_local_destruction: "ローカル津波の破壊"
tsunami_reconstruction_complete: "成功した復興の努力"
tsunami_recovery_success_tt: "2005年12月以前に社会福祉法を制定しました。"
 
indian_ocean_tsunami.2.t: "津波が南アジアを破壊"
indian_ocean_tsunami.2.d: "インド洋を襲った大震災と津波。 人道的な大災害の織機。 世界の時計は、私たちが行動しますか?"
indian_ocean_tsunami.2.f: "海岸線は消えています。 Aidは緊急に必要です。"
indian_ocean_tsunami.2.a: "緊急の援助を送って下さい。"
indian_ocean_tsunami.2.b: "私達に私達の自身の優先順位があります。"

indian_ocean_tsunami.3.t: "受付開始"
indian_ocean_tsunami.3.d: "外国の国家は人道援助を送られました。 皆様のお越しをお待ちしております。"
indian_ocean_tsunami.3.a: "世界の強固な神に感謝します。"

tsunami_foreign_aid_sent: "津波被害に遭遇"
countries_available_to_request_aid_from:0 "援助を要求する国は利用できます"
has_sent_iosa:0 "既に援助を送信しました"

je_request_iosa_aid_button:0 "国際援助を求める"
je_request_iosa_aid_button_desc:0 "震災や津波から復興するために、国際社会からの支援を依頼。"

tsunami_disaster_struck: "2004年インド洋大震災と津波の影響"

# Iraq disarmament Crisis

je_iraq_disarmament_crisis: "イラク 割 危機"
je_iraq_disarmament_crisis_reason: "イラクは、イラク戦争に続いて、国連安全保障評議会決議687に拘束され、大量破壊プログラムの武器を解体しました。 UNSCOM と IAEA を通じて、国際コミュニティは、コンプライアンスを検証する必要がありますが、イラクの指示と検査に関する紛争は、有望なスタンドオフを作成しました。\n\n 危機は、イラクの拒否を上回る緊張として衝突を無視し、断層的な政令に完全に協力することを脅迫します。"
iraq_disarmament_resolved_tt: "イラク政府の危機は解決しました。"

je_us_iraq_disarmament: "イラク 割 危機"
je_us_iraq_disarmament_reason: "米国は、国連安全保障評議会の決議687にイラクの遵守を強化することに専念しています。 UNSCOMおよびIAEA検査の繰り返しイラクの閉塞は、湾岸地域のグローバルセキュリティと燃料緊張を損なう。\n\n 外交的な努力は続いていますが、検査が失敗すると軍の選択肢はテーブルに残ります。"

iraq_events.10.t: "イラクはUNSCOM航空機を注入します"
iraq_events.10.d: "国連特別委員会(UNSCOM)への大胆な挑戦では、イラクは、検察官が自分の航空機を使用して国に入るための提案を拒否しました。 バガダは、アクセスと輸送を完全に制御して主張し、その約束について新しい懸念を上げる。"
iraq_events.10.a: "自分の言葉を拒絶する — イラクの悲嘆は最初に来ます。"
iraq_events.10.b: "フライトを許可 — 連携は緊張を緩和することができます。"

us_events.10.t: "イラクブロックUNSCOM航空機"
us_events.10.d: "イラクは、UNSCOMの検査官が自分の航空機を国に飛んで、さらなる点検努力を妨げることを拒否しました。 この動きは、国連に対する失調の直接的な行為として見られ、不断の努力の対決である。"
us_events.10.a: "未解凍はできません。"
us_events.10.b: "エスカレーションを避けましょう。"

################# COUNTRY-SPECIFIC ##############

# united states

rodney.1.t:0 "ロドニーキングの警察のビート"
rodney.1.d:0 "途上国アフリカ系アメリカ人のロドニー・キングは、ロサンゼルスの警察署の役員に激しく打ち負かされました。 監督は、攻撃を撮影しました, 警察の残忍性と国家の不足をスパーク."
rodney.1.f:0 "彼らは彼を囲んで、彼をバトンで飼っていた。 戦っていなかった。 それは恐ろしいことだった - 彼らは彼から例を作りたかったような."

rodney.1.a:0 "暑い夏ですね。"

rodney.2.t:0 "ロサンゼルスのリオッツ"
rodney.2.d:0 "警察官の目覚めでは、ロドニーキングの賭博で過度の力を使用して、大幅な人々が街に連れて行かなければならない、原因都市への損傷で10億ドル以上"
los_angeles_riots:0 "Rodney キング リオッツ"
rodney.2.a:0 "自分で解決します。"
rodney.2.b:0 "国民の監視を送って下さい!"

north_hollywood.1.t: "ノースハリウッドで撮影"
north_hollywood.1.d: "2つの強盗は、体装甲に覆われ、アサルトの破片を運んだ。 アウトガンされた役員は、現地の銃店から武器を借りて効果的に反応しなければなりませんでした。"
north_hollywood.1.f: "ロサンゼルスの警察と長いシューティングに従事し、複数の役員や市民を傷つける2つの重ねた銀行強盗。 事件は、国家に衝撃を与え、警察の準備に関する質問を提起しました。"
north_hollywood.1.a: "法執行の歴史の冷やす日。"

north_hollywood_police_response:0 "法執行支援の強化"

wtc_bombing.1.t: "1993年 世界貿易センター爆破"
wtc_bombing.1.d: "強力なトラック爆弾は、ニューヨーク市のワールドトレードセンターの北タワーの下に爆発し、6人の人々を殺し、千を上回る。 攻撃は、国家に衝撃を与え、テロに対する脆弱性を独自の国境内で明らかにしました。"
wtc_bombing.1.a: "国内セキュリティ対策を強化"
wtc_bombing.1.b: "落ち着きを保ち、過度の反応を避けます。"
heightened_security_measures: "強化されたセキュリティ対策"
heightened_security_measures_desc: "テロ攻撃に対応するため、政府は強力な内部セキュリティポリシーと法執行の調整を実施しました。"
oklahoma_city_aftermath: "オクラホマシティ爆破後"
oklahoma_city_aftermath_desc: "Alfred P. Murrah Federal Buildingの破壊爆弾は、国家の揺れを残しています。 政府が国内の警戒を締めるにつれて、セキュリティ上の懸念と政治の非難のリンガー。"
 
usa_events.1.t: "共和党第一次予選結果"
usa_events.1.d: "議論やキャンペーンで満たされた熱心な第一シーズンの後、共和党は、その新しい標準ベアラーを選びました。 ジョージW.ブッシュは、プチ・ボゲソイジーの遺跡を取り、パーティーのために大胆な新しい章を提唱して、勝利を収めました。"
usa_events.1.a: "ノミネーションは彼のものです。"

usa_events.2.t: "バラクオバマの指名"
usa_events.2.d: "議論やキャンペーンで満たされた熱心な第一次シーズンの後、民主党は、その新しい標準ベアラーを選びました。 バラック・フセイン・オバマは、プティ・ボゲロシーの遺跡を取り、パーティーの大胆な新しい章を提唱し、勝利を収めました。"
usa_events.2.a: "ノミネーションは彼のものです。"

usa_events.3.t: "ドナルド・トランプの指名"
usa_events.3.d: "議論やキャンペーンで満たされた熱心な第一シーズンの後、共和党は、その新しい標準ベアラーを選びました。 特に論争の人物であるドナルド・ジョン・トランプは、専門家の遺跡をとり、パーティーのために大胆な新しい章を提唱し、勝利を収めました。"
usa_events.3.a: "ノミネーションは彼のものです。"

# Storm of the Century
american_disasters.1.t: "1993 世紀の嵐"
american_disasters.1.d: "巨大なサイクロン・ストームは、アメリカ東部に広がり、記録的な降雪、ハリケーン・フォース・ウィンド、そして海岸沿いの重度の洪水をもたらします。 数百万が残され、死が毎日上昇する。"
american_disasters.1.a: "冬期の誓いを終わらなければならない。"

# Great Flood of 1993
american_disasters.2.t: "大洪水!"
american_disasters.2.d: "豪雨と飽和土壌の週は、ミシシッピ川とミズーリ川が、その銀行をはるかに超え、アメリカのミッドウェストの広大なエリアを潜水させました。 未曾有の町は水中で、被害は未曾有です。"
american_disasters.2.a: "被災地の被災者"

great_flood_of_1993: "1993年の大洪水"
storm_of_the_century: "1993 世紀の嵐"

# Columbine

columbine.1.t: "コロラド高校のマッサージ師"
columbine.1.d: "コロラド州コロバニン高校で2名の武装した学生が死亡した攻撃を受け、自分の命を奪う前に多くの人を殺し、創傷しました。 全国の悲嘆と銃の制御、学校の安全、文化的影響に対する議論を盛り上げました。"
columbine.1.a: "思考と祈り"
columbine.1.b: "全国の学校でセキュリティを強化しなければなりません。"

national_mourning_school_shooting: "モーニングスクール撮影"
school_security_measures: "学校のセキュリティ対策"

better_school_security: "より良い学校のセキュリティ"
thoughts_and_prayers: "思考と祈り"
recent_mass_shooting: "最近のマス撮影"

# September 11 Attacks 

ground_zero: "グラウンドゼロ"
  
je_war_on_terror: "テロの戦争"
je_war_on_terror_reason: "2001年9月11日 米国テロ攻撃は、テロに対する持続的なグローバルキャンペーンの始まりをマークしました。\n\n 米国は、攻撃に続いて、軍事業務、知能活動、国内のセキュリティ対策を組み合わせた広範な戦略である「テロワール」と呼ばれるものを発表しました。 その結果は、外国の政策、民事訴訟の議論、国際的アライアンスを再考する。\n\n"

usa_wot.1.t: "アメリカアンダー攻撃"
usa_wot.1.d: "世界貿易センタータワーを破壊し、ペンタゴンを傷つける、ニューヨーク市とワシントンD.C.を襲ったテロリスト攻撃。 数千人が殺されたり負傷したりしました。 国家はショックで応答を要求しています。"
usa_wot.1.a: "親愛なる日。"

usa_wot.2.t: "テロの戦争"
usa_wot.2.d: "攻撃の終了後、社長は、テロ組織を計画、支援、またはハーバルする人々に対して、グローバルキャンペーンを発表しました。 この宣言は、海外での家庭や軍事的な約束でセキュリティ対策を強化する。"
usa_wot.2.a: "それらを正義に届けます。"

global_wot.1.t: "U.S攻撃; 千人の死"
global_wot.1.d: "米国はテロ攻撃に苦しんでいる。 ワールド・リーダーは、そのセキュリティ・アレンジを取り巻くことで、多くの州が共存しています。"
global_wot.1.a: "あらゆる人類の悲劇。"

global_wot.2.t: "アメリカ合衆国はテロに戦争を宣言"
global_wot.2.d: "9月11日以降、米国は「テロワール」のグローバル「ウォー」を宣言しました。国際コミュニティに電話をかけ、テロリストグループやサポーターに対するキャンペーンに参加しています。"
global_wot.2.a: "国際オーダーシフト"

global_wot.3.t: "米国の請求書 第5条"
global_wot.3.d: "9月11日以降、アフガニスタンでの米国軍のキャンペーンを実施し、NATO憲章の第5条は、史上初めて開催されました。 会員の立場で発言し、戦争の努力に加わります。"
global_wot.3.a: "私たちの味方に立ち寄ります。"

usa_wot.3.t: "Anthrax 攻撃 テロ アメリカ"
usa_wot.3.d: "9月11日以降の攻撃では、致命的なアントラックス胞子を含む匿名の手紙は、ニュース組織と米国セーターに郵送されました。 攻撃は、全国の恐怖を襲い、大規模な調査をスパークし、生物学的な戦争に関する懸念を高めました。"
usa_wot.3.a: "正義が届きます。 そして、それは速くなります。"
usa_wot.3.b: "お問い合わせ"
  
je_hunt_for_bin_laden: "オサマ・ビン・ラデンのハント"
je_hunt_for_bin_laden_reason: "2001年9月11日、米国は、オサマ・ビン・ラデン、アル・カエダのリーダーの広範な&グローバル検索を開始しました。 このミッションは、軍事的操作、知能収集、および外交的な圧力を関与する境界線を横断します。\n\n"
intensified_intelligence_operations: "オサマ・ビン・ラデンのハント"

hunt_bin_laden_progress_bar: "ハント・プログレッシブ"
hunt_bin_laden_progress_bar_desc: "検索の進捗"
osama_bar_completed: "オサマ・ビン・ラデンが発見されました"

usa_wot.10.t: "オサマ・ビン・ラデンのハント"
usa_wot.10.d: "テロ・アンダーウェイの戦争で、米国諜報機関や特殊部隊は、オサマ・ビン・ラデンの世界的な検索を開始しました。 決定は、操作の強度と範囲を決定します。"
usa_wot.10.a: "必要なリソースをすべてコミットします。"
usa_wot.10.b: "その他の優先事項に焦点を当てます。"

usa_wot.12.t: "ビン・ラデン・キャプチャー"
usa_wot.12.d: "長年に渡るオサマ・ビン・ラデンが設立され、中和されています。 米国は、テロ上の戦争で大きな勝利を祝います。"
usa_wot.12.a: "ジャスティスが提供されました。"

usa_wot.11.t: "U.Sはビンラデンを殺します"
usa_wot.11.d: "米国海軍SEALSは、アメリカ・アボットタバッド、パキスタンの化合物でダーリングレードを発売しました。 目的:オサマ・ビン・ラデンを捕獲または殺します。 世界は成果を待っています。"

usa_wot.11.a: "非常に端への臆病。"

usa_wot.11.success_tt: "オサマ・ビン・ラデンがパキスタンで殺されました。 テロ上の戦争は新しいフェーズに入ります。"

usa_wot.20.t: "インテリジェンスブレークスルー"
usa_wot.20.d: "CIAは、捕獲された移住者から貴重な知能を明らかにし、ビン・ラデンの可能な場所にある新しいリードを提供します。"
usa_wot.20.a: "優秀、前進を押して下さい。"
usa_wot.20.a.tt: "ビン・ラデンの調査結果が増加しました。"

usa_wot.21.t: "ビン・ラデンがビデオを発表"
usa_wot.21.d: "ビン・ラデンに繋がると疑われる月の追跡は、デッドエンドであることが判明しました。 リソースを無駄にしました。 問題が悪化するために、中央東部のテロリストは、アメリカ人が視聴するためのビデオをリリースしました。"
usa_wot.21.a: "挫折のセットバック。"
usa_wot.21.a.tt: "ビン・ラデンの買収が減少しました。"

usa_wot.22.t: "地域協力"
usa_wot.22.d: "パキスタンと地域の同盟は、ビン・ラデンのハントを加速し、知能収集を支援します。"
usa_wot.22.a: "大変お世話になりました。"
usa_wot.22.a.tt: "ビン・ラデンの調査結果が大幅に増加しました。"
 
accuse_iraq_wmds_button: "WMDを運ぶのAccuseイラク"
accuse_iraq_wmds_button_desc: "密接に開発または大量破壊の武器を抱くイラク。 これは、エスカレート緊張し、軍事的な行動を正当化する可能性があります。"

end_war_on_terror_button: "テロで戦争を終了"
end_war_on_terror_button_desc: "テロの戦争を正式に宣言し、国際業務を風化させます。 国内外での食育の結果を残します。"

usa_wot.30.t: "ハーバーリングWMD"
usa_wot.30.d: "米国は、大量破壊の武器を密接に開発し、ハーバーリングすることを公に認めています。 これは、緊張の重要なエスカレーションをマークし、競合を近づける可能性があります。"
usa_wot.30.a: "スカーディ"
  
osama_extradited: "Osama ビン ラデン が extradited"
war_on_terror_stopped_tt: "テロの戦争は終了しました"
# War on TERROR

usa_wot.5.t: "ビン Laden で Custody"
usa_wot.5.d: "Afghanistanは驚くべき外交の進歩で、米国に余分なオサマ・ビン・ラデンに合意しました。 テロ上の戦争の初期段階で、この譲歩は大きな勝利をマークします。"
usa_wot.5.a: "これは大きな外交の勝利です。"

usa_wot.6.t: "アフガニスタン 禁忌 へ Extradite Bin Laden"
usa_wot.6.d: "アフガニスタン政府は、オサマ・ビン・ラデンを米国当局に譲渡することを拒否しました。 テニオンはワシントンが次の動きを議論するように上昇します。"
usa_wot.6.a: "テロリスト、またはそれらに対するどちらかです。"
usa_wot.6.b: "今、ブラッシュのアクションを取らないようにしましょう。"

je_request_bin_laden_extradition_button: "リクエストビン・ラデンの追加料金"
je_request_bin_laden_extradition_button_desc: "Afghanistan extradite Osama bin Laden を米国にリクエストして試用をしてください。"

bin_laden_extradition_accepted_country: "Bin Laden Extradition - 受け入れられる"
bin_laden_extradition_accepted_country_desc: "アフガニスタンは、オサマ・ビン・ラデンの過度に合意し、国民の道徳を後押しし、軍の幸福を改善しました。"
  
bin_laden_extradition_accepted_ig_armed_forces: "Bin Laden Extradition - 受け入れられる"
bin_laden_extradition_accepted_ig_armed_forces_desc: "武装した部隊は、ビン・ラデンの遠征を追跡する政府の外交的な成功に満足しています。"

bin_laden_extradition_rejected_country: "ビン・ラデン エキストラディション - 拒否"
bin_laden_extradition_rejected_country_desc: "アフガニスタンは、私たちの軍事的な準備と緊張リソースを傷つけ、余計なオサマビンラデンを拒否しました。"
  
bin_laden_extradition_rejected_ig_armed_forces: "フリーダム"
bin_laden_extradition_rejected_ig_armed_forces_desc: "軍隊は、政府がビン・ラデンの過分を防止することができないことによって危険です。"

bin_laden_extradition_rejected_ig_armed_forces_2: "アフガニスタンに侵入しなかった"
bin_laden_extradition_rejected_ig_armed_forces_2_desc: "軍隊は、政府がビン・ラデンの過分を防止することができないことによって危険です。"

operation_enduring_freedom: "業務終了 フリーダム"


limited_response: "限られた応答"
heightened_security_measures: "高度セキュリティ対策"

afghanistan.1.t: "米国はビン・ラデンの特大需要"
afghanistan.1.d: "米国は、9月11日の攻撃を認めたオサマ・ビン・ラデンにアフガニスタンの手渡すことを正式に要求しました。 このリクエストを受け入れると緊張を緩和できますが、拒否は深刻な結果を引き起こす可能性があります。"
afghanistan.1.a: "リクエストを伴います。"
afghanistan.1.b: "参考."

# 2003 Invasion of Iraq

iraq_war.1.t: "イラクのWMDクレームに関する国連条約"
iraq_war.1.d: "米国は、大量破壊の兵器を抱くのイラクを認定しました。 国連は、問題について議論し、国際的反応を収集するために緊急セッションを招きました。"
iraq_war.1.a: "議論が始まります。"

iraq_war.2.t: "国連イラクWMDの議論"
iraq_war.2.d: "国際コミュニティは、イラクに対する米国の告訴にどのように対応するかを議論します。"
iraq_war.2.a: "米国を支援"
iraq_war.2.b: "イラクの側。"
iraq_war.2.c: "ドメイン中立。"

iraq_war.3.t: "NATO 米国アクカッションへの対応"
iraq_war.3.d: "NATO同盟は、イラクの疑わしいWMDプログラムで米国の位置を支持するかどうかを決定しなければなりません。"
iraq_war.3.a: "米国に立ち向かう"
iraq_war.3.b: "このアクションをサポートすることはできません。"

iraq_war.4.t: "イラクはアカスケーションに対応"
iraq_war.4.d: "イラクは、WMDの港に認定されました。 政府は、海外からの取り付け圧力に応答しなければなりません。"
iraq_war.4.a: "すべてを否定し、病気を終わらせます。"
iraq_war.4.b: "ウエストを非難し、プロパガンダを固定します。"
  
iraq_war.5.t: "米国はUNに逃げる"
iraq_war.5.d: "米国は、国連の前にその事件を提示しました, イラクに対する軍事行動に対する支援を抱く質量破壊の武器の上に. ワールド・リーダーは、ワシントンのプレやレジストの介入を支持するかどうかを決定しなければなりません。"
iraq_war.5.b: "UNはデッドロックされています。"
iraq_war_us_lobby_tt: "米国のlobbiesはサポートのための主力、diplomaticの関係を調節します。"
iraq_war_unfail_tt: "中東で死ぬ時だけに生まれた。"

iraq_war.6.t: "米国の戦争上の決定"
iraq_war.6.d: "国連は、部門によってパラリンジドされ、ワシントンは瞬間的な決定に直面しています。イラク単独で行動し、イラクを緩和したり、世界の前に弱く現れたり、危険にさらされたりします。"
iraq_war.6.a: "イラクの侵入を開始"
iraq_war.6.b: "戻るステップと戦争を避ける"
iraq_war_backdown_tt: "米国は介入から退去し、国際的な威信を失う。"
2003_invasion_of_iraq: "2003 イラクの侵略"
iraq_condemned: "イラク 非難"

