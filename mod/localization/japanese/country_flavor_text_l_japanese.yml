l_japanese:
 
  # Middle East
  YMN_FLAVOR_TEXT:0 "権力を保持する努力は、古い政府間のイエメン、トランジション・カウンシル、フティの内で怒っていると戦争が壊れています。 この残酷な戦争は、アラビアの権力の詮索的な目を持ってきました, その好意でイエメンをスイングするために互いにそれらをピット. イェメンは、その隣人によって潜伏を耐えなければならないか、彼らは上に行くことができるだろうか?"
