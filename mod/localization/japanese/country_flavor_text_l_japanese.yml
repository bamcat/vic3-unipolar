  SYR_FLAVOR_TEXT:0 "シリアは現在、いくつかの力に対してプロキシ戦争に変わった複雑な市民戦争に苦しんでいます。 地域は、非常に敵対的であり、対立は、その権利を信じるInterimの唯一のエスカレーションであり、Rojavaは、より進歩的な再公開を形成する自由を壊します。 避難者は、安全な土地を検索してヨーロッパを離れ、上に住むために群れ. シリアは戦争を終わらせ、急激な集団を取り戻すか、失敗し、他の電力の真空になるか?"
  SIG_FLAVOR_TEXT:0 "$SYR_FLAVOR_TEXT$"
  ROJ_FLAVOR_TEXT:0 "$SYR_FLAVOR_TEXT$"
  IRA_FLAVOR_TEXT:0 "イランは自分のイスラム革命のカスプにある、この国は伝統的なイスラムの相対的な安定性に座っていて、アラブスプリングの影響を受けませんでした。 しかし、アラブスプリングの効果は、若いポチュレースに気づかれていないこと、そして人口は彼らの過激な方法に終わっていません。 イランは伝統的な価値観を保ちますか? または、彼らはより多文化的なポップレースで上書きされますか?"
  
  # East Asia
  PRC_FLAVOR_TEXT:0 "中国の人民共和国は、世界的な経済のヘッジモンとして座り、不幸な国のために財務者として座っています。 しかし、債務のトラップスキームは、バックファイリングであり、中国製物品の信頼性は、近隣の近隣の近隣の近隣業者や自動化によって弱まっています。 中国は経済優位性を再確立することができます。 または、内部の張力のために落ちるためにdestinedか。"
  NRK_FLAVOR_TEXT:0 "北朝鮮は、惑星の悪意の最後の要塞として残っています。 各国のマインドゲームや洗脳は、厳密で致命的な体制にもかかわらず、絶え間なく効果的です。 80年の政令は別の80を去りますか? または、そこから南に隣接しているか、そこから再建するのか?"
  JPN_FLAVOR_TEXT:0 "日本は、WW2の終端から途上国のままに留まっていますが、これは極端な経済統制を停止していません。 日本の自動車・日本電子機器は、世界中を知らず、最高のものとして残っています。 しかし、これは犠牲を許さないものではありません... 全国には高齢化人口があり、多くの地方の力に挟まれています。 日本が独立していけるのは?"
  
  # Oceania
  AUZ_FLAVOR_TEXT:0 "オーストラリア、機会の土地と「夢」。 米国のフルター、オーストラリア、その欠点とより暖かい環境にもかかわらず、大陸のスパンニング国は「オポチュニティの土地」の名前を反転しています。 しかし、内部の政治的分裂と温暖化の気候は、オーストラリアの繁栄のbastionであるチャンスを台無しにしようとしています。 オーストラリアは、近代的な世界をうまく横断することができますか?"
  
  # Balkans
  SRB_FLAVOR_TEXT:0 "セルビアは、失敗したユーゴスラフ実験のrump状態と最終的な残留剤として座っています。 モンテネグロとコソボを数年前に失い、国家は勝利のために長くします。 セルビアはユーゴスラビアの失われた栄光を取り戻しますか?"
  
  # Europe
  ENG_FLAVOR_TEXT:0 "イングランドは20世紀に及ぶ電力を大きな電力として供給してきましたが、多岐にわたる政治的腐敗と正当な義務を負い、正当性が疑わせてきたのです。 イングランドは、その支配人を引き継ぐことができますか? またはヨーロッパの市場が最終ストローだったまま?"
  SCO_FLAVOR_TEXT:0 "スコットランドは、21世紀初頭の引退を続け、崩壊が許されたため、繁栄し続けています。 ユニオン内の表現の大規模な腐敗と失敗は、その場所を質問に呼び出しました。 独立性を得ると、それは繁栄するだろうか? それとも、その未来の道を行くのか?"
  NIR_FLAVOR_TEXT:0 "アイルランドのイギリス帝国主義の最後のスタンド、北アイルランドは、光るのを待っている粉末樽です。 問題は終わっているかもしれませんが、その鎮静の質問は、南部の兄弟と統一するための若い世代の年月として浸透し続けています... アイルランドにイギリスを抱え、モンアーチの道を行く?"
  IRE_FLAVOR_TEXT:0 "アイルランドはイギリス帝国のブーツの下の国から、宇宙の輝くビーコンに変身しました。英国から言語を再生し、自分自身を離れる努力は、それ自体と北の隣人の間で成功と努力を証明しました。 エメラルド・アイルズの隣には何が来ますか?"
  UKR_FLAVOR_TEXT:0 "ウクライナ内での西洋化の取り組みは、多くのウクライナ人の生活は急速に改善されていますが、ロシアは犯罪者のための侵略を8年前に重要な領域を奪われました。 東部のセパラティストもロシアにハートランドへの開口部を与えています。 ウクライナは、ロシアの成長する野望の次のターゲットである、またはウクライナの折り目の下にセパリストを戻すことができます"
  CYP_FLAVOR_TEXT:0 "キプロスは民族のグループ、南のギリシャ、北のタークによって分けられた島として坐ります。 しかし、成長しているCypriotのアイデンティティは形成され、国を一度も統一するために呼び出される前に長くはないかもしれません。 キプロスは、成功に統一することができます。, または、彼らは常に分割されることをdestined?"
  BYL_FLAVOR_TEXT:0 "ベラルーシは政治的革命の始まりで、その市民は政府に積極的に参加し、国家の真の頭は、険しい投票を通して選挙を失いました。 Lukashenkoは、彼のコントロールを保護するために、ロシアの隣人まで温まる. ルカシェンコは成功するのか、ベラルーシは、彼の非政府に終端を置きますか?"
  SPA_FLAVOR_TEXT:0 "スペインは、ファランジストの動きの揺れを追って、急速に近代化した国であり、その人にとってより大きな未来に向けて努力しています。 しかし、カタルーニャ州の独立運動として、その方向にすべて同意するわけではありません。 スペインは、カタロニアの有無にかかわらず繁栄しますか?"
  XSP_FLAVOR_TEXT:0 "スペインは、ファランジストの動きの揺れを追って、急速に近代化した国であり、その人にとってより大きな未来に向けて努力しています。 しかし、カタルーニャ州の独立運動として、その方向にすべて同意するわけではありません。 スペインは、カタロニアの有無にかかわらず繁栄しますか?"
  NRW_FLAVOR_TEXT:0 "ノルウェーは、以前よりも21世紀に強い国に入った少数の国の1つに留まらず、強力な社会安全システムと強力なリソースで、市場投入を促し、夢の豪華な場所を作ることができます。 しかし、世界が油から離れるにつれて、ノルウェーは首尾よくその長所を維持したり、油のワウンディングがその約束になることができますか?"
  RSF_FLAVOR_TEXT:0 "ソビエト連邦の崩壊以来、ロシア、それは後継者の状態です、しかし、同じ経済力と畏敬の念を抱えています。 組合の秋が経済優位性を再確立してきたので、そのキャンペーンのほとんど。 2008年ジョージア州内、2014年ウクライナ内 しかし、オリグアーツはウクライナに別のキャンペーンを話します, ドニパーの東の土地を取るために & 東のセパリスト地域. 21世紀のこの道は、彼らが失敗するか?"
  EUR_FLAVOR_TEXT:0 "欧州連合(EU)は、WW2によって運ばれた退廃後、戦後の再建の脳の子供です。 その後、大陸、ノルウェー、スイス、西洋バルカン、旧ユーゴスラフ州など多くの国を含むように進化しました。 連合は、英国がそれを回避するための珍しい選択以来だけ強化され、それを残すほとんどの話は、もはやほとんどの国で真剣に受け止めていない、連合は非常に多くの連盟は、連盟が成長の話として、ここから強化されます。 欧州連合は欧州連合に進化しますか? 欧州連合は、歴史書にのみ言及されるのでしょうか?"
  TRK_FLAVOR_TEXT:0 "Türkiyeは、ロシアの耐航性のある野望の重要な障壁として座り、その近隣の多くの人々に戦略的ホックを保持しています。 シリアの暫定政府をサポートし、アフリカと中東で活動的なミリタスを持つ、その南への紛争に積極的に関与しています。 アナトリア地域におけるTürkiyeの立場は、その周りの領域を大きく制御し、その前にオスマンの野望をもたらします。 Türkiyeは、その野心に抱かれますか? それとも、オットマンのように失敗するの?"
  
  # North America
  USS_FLAVOR_TEXT:0 "米国は、戦後の経済ブームのおかげで20世紀の繁栄を続け、100年代末までに唯一のスーパーパワーとして宣言しました。 しかし、企業による広範囲の腐敗および中古の戦術は、ユニオンを離れて生地を裂きます。 米国は、社会的・経済的に両立した後、さらに下落する。 ユニオンの未来の持ち株は何か、そして彼らは彼らの古い栄光を返すことができるでしょう?"
  MEX_FLAVOR_TEXT:0 "カルテル&アメリカン・インペリアルズムは、メキシコの21世紀の定義特性です。 しかし、多くの努力は、米国が自分の土壌に戦争を戦うことなく、カルテルを解決に入れてきました。 メキシコは、次の世紀のために店に持っているもの、そして、彼らは成功したアメリカの帝国主義のクラッチをエスケープすることができます"
  CAN_FLAVOR_TEXT:0 "カナダは、巨大な問題の欠如として21世紀に育ちました。 しかし、最初の国家は、カンダディアン・レルムの創始以来、その群馬治療上の譲歩を要求しています。 カナダはコンセド?"
  
  # Central Asia
  AFH_FLAVOR_TEXT:0 "帝国の墓地, アフガニスタン, 成功したアメリカの帝国主義の努力に抵抗し、それが地域の電力として社会であることを保証しました. しかし、信仰のさまざまな民族グループと決意者との間の競合は、伝統的な生活様式を脅かす。 アフガニスタンは、伝統的な方法で成功的にプッシュすることができますか?"
  AZB_FLAVOR_TEXT:0 "アゼルバイジャンは、精巧なカカカスの国として座っています, オイル&ガスリザーブの最近の発見は、欧州に重要な同盟国になりました, しかし、アーサークは対立します, そして、彼らの近隣のアルメニアとのその後の国境の戦争は、彼らの壮大な到達からそれらを防ぐされています. アゼルバイジャンは、この危機を平和的に解決したり、戦争に巻き込まれることはできますか?"
  KZK_FLAVOR_TEXT:0 "カザフスタンは、異なるリーダーシップと政府間にあり、穏やかな階層に落ちています。 その前のリーダーは、非常に素晴らしい方向に、大規模な電力の真空&新しい定規が試してみると現れています。 カザフスタンは、それが内部の電力の闘争を生き延びることができますか?"
  UZB_FLAVOR_TEXT:0 "Uzbekistanは、90年代のソ連からの分離以来、ディクテーションからそれ自体を解放するために苦労していますが、それはうまく解放し始め、その近隣の人たちとの状況を改善し続けています。 幸いにもなり続ける一方で、その近隣の人たちと言えるのも同じで、生き残るためにその容赦を宣言する必要があります。"
  
  # Africa
  SAF_FLAVOR_TEXT:0 "南アフリカは、その道を見つけるために苦労している国です, その歴史を定義する紛争は、様々な民族グループの間で最善に彼らの存在の憤りにつながりました, この緊張は、離れてから悪化しました. 南アフリカが繁栄しようとすると、それは譲歩の荒い道を持っている場合, 再構築 & 政治改革を行うために. 南アフリカはこれを行うことはできますか? または、それは離れて落ちるためにdestined。"
  SSD_FLAVOR_TEXT:0 "南スーダンはナイルに沿って民族グループの結果としての競合から生まれ、それは国連によって認識される最新の国であり、それが成功と考えることができる前に行くための長い方法を持っています。 エスニックの緊張は、国を立ち向かうと慎重な操縦者は、この国が短期間に住んでいないことを確認する必要があります。 可能ですか?"
  ETH_FLAVOR_TEXT:0 "Ethiopiaは急速に近代化している国であり、コロニアル手によって比較的解散されることが管理されています。 しかし、国はまだ、ソマリ、ティグレイ、オロマイアの民族グループは、エチオピアを高価な市民戦争に阻止し、ドラッグするために脅迫し、その問題があります。 Ethiopiaは緊張にもかかわらず、繁栄し続けることができますか?"
  EGY_FLAVOR_TEXT:0 "エジプトは、極端な水不足の中で人口のブームを経験し、伝統的な政府に失敗します。 エジプト人は、より良い土地のためにドロフスに残っています。ナイルはゆっくりと乾燥しています。 エジプトは危機をナビゲートする方法を見つけることができますか?"
  KYA_FLAVOR_TEXT:0 "ケニアは、近代化の成功の最中にある構造的に健全なアフリカ諸国であり、急速に生活水準を改善しています。 ケニアは大抵深刻な問題が欠如するかもしれませんが、その近隣住民はそれほど幸運ではありません。 政治圏内で東アフリカのスーパーパワーを形成する話があります。 ケニアは、アフリカのスーパーパワーを形成するために地場をうまく配置しますか? またはその近隣のターモイルは、独自の土地に影響を与えます。"
  MOR_FLAVOR_TEXT:0 "モロッコは21世紀に強固で誇りを持ち、サハローリ共和国の巧妙なサブジュグレーションと経済格差の大きな改善に続いています。 今、欧州の電力のパートナーシップを探し、その経済性をさらに高め、アフリカ大陸の主要なプレーヤーになります。 モロッコの野望が達成されますか?"
  GHA_FLAVOR_TEXT:0 "80年代の「冷たいチョップのガーナの経済状況」の残酷な軍事ジャンタに続いて、巨大に陥りました。 しかし、政党の帰還と国選挙が安定と経済の繁栄の時代に戻ってきたので、今後も継続していく予定です。 しかし、sahelの気候危機と砂漠化は、より一層の不安定性を脅かす。 ガーナは、これらの条件を正常にナビゲートできますか?"
  
  # South Asia
  VNM_FLAVOR_TEXT:0 "ベトナムは、その装飾以来、相対的な安定性の国として座っています。 少数の市場の経済の1つであることは、その特典を持っており、市民は相対平和を耐えながら、観光客は国を追い越しています。 厳選されたスマートな地政学は、21世紀に非常にうまく成功することを可能にします。 しかし、これらの選択肢は?"
  IDA_FLAVOR_TEXT:0 "インドは生き残っているだけでなく、400年の植民地規則の残骸と終端の解散以来繁栄しました。 しかし、ミャンマー、バングラデシュ、パキスタンの分離による後列のトラウマは、他のまともな記録に怖がっています。 ジャム&カシミールの土地の上にインドとパキスタン間の上昇の緊張は、懸念のための主要な原因であるが、Arunchal Pradesh上のPRCに対する上昇の緊張は、戦闘に武装した競合を呼び出しています。 インドは100年以上の帝国主義に成功できますか?"
  PAK_FLAVOR_TEXT:0 "パキスタンは、ヒンズー教徒とイスラム教徒の間で宗教的な緊張の上に40秒と50秒でラジから分離しました。 多くの場合、競合が視線で終わっていると信じていますが、パキスタンの競合のさまざまな民族グループ間で醸造しています。 1つの間違った動きと状態の崩壊があり、その高さでインドとアフガニスタンの緊張で、パキスタンはこれらの問題をナビゲートすることができますか?"
  
  # South and Central America
  ARG_FLAVOR_TEXT:0 "アルゼンチンは20世紀を超越した経験を経て、米国介入とラス・マルビナスの不当な紛争に苦しんでいる国です。 ブエノスアイレスのアルゼンチンの州と政府のネイティブ・マカウチェ間の紛争は、多くの変化をグリッドロックしています。 アルゼンチンはランクを再建し、自分の国を栄光に戻すことはできますか?"
  
  # Nonsense Countries
  GLI_FLAVOR_TEXT:2 "ガリシアは、大聖堂の愛好家によってポップな小さくて注目すべき国です。 ガリシアは過去の栄光を取り戻しますか?"
  GENERIC_FLAVOR_TEXT:0 "The 21st Century is a time of relative peace & prosperity, however exploitation by the wealthy, waning standards of living and global communication have brought with it a resurgence in political activism and societal shifts like none ever seen. What will this new wave of political expression bring?
  REV_GENERIC_FLAVOR_TEXT:1 "いわゆる組織された政府が取られた方向に不満を抱え、この革命者たちはそれを追い越すために腕を取ることにしました。 パワーを消すことに成功するか、過去の多くの忘れられた革命のように押しつぶされますか?"
  DECENTRALIZED_FLAVOR_TEXT:0 "この国は、より組織された力で、自治を維持するために苦労しています。 新世紀の夜明けを見たり、歴史の本だけに名前が残っているのでしょうか?"
