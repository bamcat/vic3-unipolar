objective_the_west_name_USA:0 "ソールスーパーパワー"
objective_the_west_name_GBR:0 "トラブル"
objective_the_west_name_FRA:0 "Mitterrand's フランス"

objective_the_west_desc_USA:0 "米国は、21世紀の回転でユニークな位置で自分自身を見つける。 世界有数のスーパーパワーであり、最も強い国家国家の人類はかつて見たことがあると、共和国は、困難な外部と内部の問題のセットに直面しています。 アメリカの主なライバルの崩壊にもかかわらず、ソビエト連邦、テロリズムの脅威、中国、そしてアメリカの無料の世界へのさまざまな脅威は、アメリカの質問に関与しています。 米国のスーパーパワーは世界中に残っていますか? 時刻がわかります。"
objective_the_west_desc_GBR:0 "1992年、イギリスは経済不確実性と政治の乱流に苦しんでいる。 最近は、高失業と消費者の信頼のスラムプによってマークされ、深い引退から出現しました。 英国の雑草に加えるために, 北アイルランドの不安定性, 今「トラブル」として知られている議論の熱い話題のまま. ブリタニアは、これらの乱暴な時間をどのように生きますか?"
objective_the_west_desc_FRA:0 "フランスの政治的な風景は、ヨーロッパの統合と国内経済の課題に対する緊張を増大させることによってマークされました。 フランソワ・ミッテルラン大統領は、第2期社会主義者で、高失業と悲しみの経済成長に苦しむ国として、絶え間ない人気に直面した。 彼の政府は、ピエール・ベレゴヴォイ首相によって導かれ、経済の安定化を目的とする官能的な措置に対する公共の不満に悲嘆しました。 ポリティカルに、フランスはマストリッヒ・トリーティに深く分けられ、欧州の統合を強化し、ユーロの道を舗装することを目的としていました。 EUは21世紀に生き残るために何が必要?"

objective_the_east_name_RUS:0 "ソ連の秋"
objective_the_east_name_PRC:0 "グランド ピープルズ共和国"
objective_the_east_name_IRQ:0 "Saddam Husseinのイラク"

objective_the_east_desc_RUS:0 "ロシアは、1991年12月にソ連の解散に続く劇的な政治的変換を受けています。 ロシア連邦の最初の大統領であるボリス・イェルツシンは、中央化されたコミュニスト・システムから市場経済への飛躍的な移行をナビゲートしながら、逃げる民主主義を主導するという巨大な挑戦に直面しました。 国内では、Yeltsinの政府は政治的不安定性、上昇のインフレ、および「ショック療法」として知られる経済改革として広範囲にわたる社会的不規則と闘争しました。 外交的に、ロシアは、元ソ連の共和国に対する影響を維持しようとすると、西洋の電力との新しい関係を鍛造し、世界ステージ上の役割を赤化しようとしました。"
objective_the_east_desc_PRC:0 "中国は、西洋諸国からの国際分離と制裁から慎重に新興しています。 ポリティカルな国は、中国のコミュニティパーティー(CCP)の制御の下でしっかりと行われ、Deng Xiaopingはリーダーシップポジションから正式に退職したにもかかわらず、重要な影響を維持しました。 1992年初頭に有名な「サウス・ツアー」は、中国の経済改革と開口部へのコミットメントを再考し、市場指向の政策とグローバルな経済とのより大きな統合に向けて新たなプッシュを促しました。"
objective_the_east_desc_IRQ:0 "Reeling from a devastating loss in the Gulf War last year, and facing intense international isolation. Saddam Hussein remained firmly in power, maintaining an iron grip on the country through brutal repression of internal dissent, particularly against the Shi'a in the south and the Kurds in the north. Iraq truly has several paths going into the 2000s.

objective_rising_powers_name_IDA:0 "インドの世紀"
objective_rising_powers_name_BRZ:0 "ブラジルの優位性"
objective_rising_powers_name_VNM:0 "ベトナムのライズ"

objective_rising_powers_desc_IDA:0 "インドは重要な政治と経済変化の時代を航海しています。 1991年に電力に来た奈良シマ・ラオ首相が主導し、経済を解放し、グローバル市場とより密接に統合することを目的とする変革経済改革のシリーズを開始しました。"
objective_rising_powers_desc_BRZ:0 "1992年、ブラジルは1985年の軍事規則の終端に続く政治的移行の真っ只中にあった。 1990年にブラジルで初めて20年以上大統領に就任したフェルナンド・コラー・ド・メッロ大統領に就任。 コラーの政府は、経済の安定化を目指した経済改革の波を開始しました, しかし、彼の管理は、上昇インフレーションと腐敗の課題のために、すぐに公共の普及に直面しました. 1992年までに、コラーは大きな腐敗スキャンダルで刺繍され、大量に抗議し、彼の含浸のための呼び出しにつながりました。 ブラジルは、国際的イメージの改善とラテンアメリカにおける影響の拡大に重点を置いています。 特にアマゾン熱帯雨林に関連した環境問題において、グローバルな課題に反する一方で、欧米諸国との緊密な関係を求めていました。 しかし、政治の不安定性と経済的困難は、国家の議題を支配し続けた。"
objective_rising_powers_desc_VNM:0 "ベトナムは、ベトナム戦争の終端と経済の制裁の過酷な効果に続く隔離の年後、国際社会に徐々に統合されました。 1992年、ベトナムは米国と関係を正常化し、東南アジア諸国連合(ASEAN)に加盟し、地域連携の拡大と西西との関係の改善への関心の関心へのシフトを表明しました。 ベトナムはどのような経路をとりますか? あなた次第です。"
