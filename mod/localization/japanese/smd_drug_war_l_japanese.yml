 # usa war on drugs

 je_war_on_drugs:0 "薬物の戦争"
 je_war_on_drugs_reason:0 "[ROOT.GetCountry.GetName] への麻薬の流れは国家危機です。 カイン、ヘロイン、およびその他の物質 — 主にラテンアメリカで生成され、[ROOT.GetCountry.GetAdjective] 国境を越えた密輸された — は、コミュニティの破壊、激しい犯罪の燃料化、および公的機関の破損です。\n\n[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName] の運営は包括的なキャンペーンにコミットしています: 供給源、国境を閉じる国内の執行機関、および社会的投資を解決するための国際パートナーシップ。 キャンペーンは費用がかかりません。そのリソースはより広い経済を重ねる必要がありますが、代替手段は、外国の犯罪ネットワークの慈悲でますますます国です。\n\n@information! メキシコではカルテルの領土が拡大する場合があります。 メキシコ政府との軍事援助協定は、このキャンペーンの国際的なコンポーネントの礎です。"

 narco_economy_plantation_bonus:0 "ナルコ経済"
 narco_economy_plantation_bonus_desc:0 "薬物取引は、[ROOT.GetCountry.GetName]の農業経済に埋め込まれています。 植栽出力 — 特にオピオムは、カルテルの需要とナルコマネーの腐敗の流れを農村のコミュニティに維持し、通常のレベルで実行されます。"

 war_on_drugs_active_modifier:0 "医薬品戦争"
 war_on_drugs_active_modifier_desc:0 "[ROOT.GetCountry.GetAdjective] 政府は薬物のトラフィックに対する包括的なキャンペーンにコミットしています。 執行の努力 — 国内の政治、予測の操作、国際協力 — は、経済全体からリソースを描画し、国家の生産性に最も適しているが、実質のコストを課しています。"

 war_on_drugs_victory_modifier:0 "医薬品戦争 — ウォン"
 war_on_drugs_victory_modifier_desc:0 "[ROOT.GetCountry.GetAdjective] 医薬品戦争は、その目的を達成しました。 供給が抑制され、境界線が強化され、機関フレームワークが配置されています。 キャンペーンは [ROOT.GetCountry.GetName] の権威と威信を強化しましたが、薬物需要を生成する根本的な条件は解決されていません。"

