l_japanese:

 # ==========================================
 # UNITED STATES
 # ==========================================

 amendment_medicaid: "メディケイド"
 amendment_medicaid_desc: "低所得のアメリカ人、高齢者、および障害者のための連邦および州費補助医療保険。 メディケイドは、プライベート市場で残っているギャップを埋めます。プレミアムを手に入れることができない人や、その条件が不当になれる人をカバーしています。 プログラムは高価で政治的に競争していますが、その死亡率の減少効果は測定可能で現実的です。"

 amendment_affordable_care_act: "手頃な価格のケア法"
 amendment_affordable_care_act_desc: "手頃な価格のケア法 — 肥満として公式に知られている — すべての市民が健康保険を運ぶmandates、民間のカバレッジのための規制されたマーケットプレイスを作成し、メディケイドの適格性を拡張します。 保険業者は、既存の条件のカバレッジを拒否することはできません。 個人が深く論争しています。 サポーターは、保険市場機能を作る唯一の方法です。 政府が民間経済の決定に反するという対応"

 amendment_federal_assault_weapons_ban: "連邦アサルト武器禁止"
 amendment_federal_assault_weapons_ban_desc: "民間販売のための特定半自動兵器や高容量雑誌の製造に関する10年間の連邦禁止。 禁止は、相手が紛争したその有効性、支持者が主張する必需品です。 何十年も経ちません。 それを渡した政治連合は壊れやすく、銃のロビーは既にその反応を準備しています。"

 amendment_authorization_military_force: "軍用部隊の使用許可"
 amendment_authorization_military_force_desc: "軍事部隊の使用権の承認は、執行機関が、[ROOT.GetCountry.GetName]のテロ攻撃に責任を負う者に対して、軍部隊を使用する権限を付与し、それらにかかわる者を付与します。 言語は意図的に広いです。 法的学者は、その限界について議論する10年を費やします。 実際には、一方的な軍事行動の外交コストを削減し、国際アリーナで[ROOT.GetCountry.GetName]のリーチを拡大します。"

 amendment_patriot_act: "PATRIOT法"
 amendment_patriot_act_desc: "PATRIOT法として知られるテロ行為を傍受し、妨害するために必要な適切なツールを提供することで、アメリカのユニット化と強化 - 劇的に国内監視当局に拡大します。 法執行機関は、通信を監視し、金融取引を追跡し、以前よりも少数の司法チェックを持つ代理店間でインテリジェンスを共有することができます。 タービンおよび革命的な圧力降下。 民事訴訟は、[ROOT.GetCountry.GetName] の履歴において、憲法上のプライバシーの最も重要な侵食として記述する。"

 amendment_crime_bill_1994: "暴力犯罪管理と法執行法"
 amendment_crime_bill_1994_desc: "1994年犯罪法案は、[ROOT.GetCountry.GetName]の史上最大の犯罪法です。 数千の新警察官に資金を投入し、連邦政府の刑務所システムを拡大し、犯罪の範囲の必須最小文を導入し、Viollence Against Women Actをライダーとして作成します。 ターモイルは落ちます。 コミュニティは、その遺産の異なるビューを持って、最も重大に警戒します。"

 # ==========================================
 # CHINA
 # ==========================================

 amendment_china_tax_reform_1994: "税務システム改革"
 amendment_china_tax_reform_1994_desc: "1994年 税制改革は、地方政府が北京で収益分配契約を交渉し、国家付加価値税と正式な収益分配式を組み入れた企業ベースの会計システムを置き換えました。 飛躍的に一元化した財政力。 北京は、信頼性が高く成長する収益ストリームを獲得しました。 地方政府は裁量を失ったが、明快さを得ました。 [ROOT.GetCountry.GetName]の近代的な会計アーキテクチャの基礎です。"

 amendment_one_child_policy: "ワンチャイルドポリシー"
 amendment_one_child_policy_desc: "国家は、財政上のインセンティブ、社会的な圧力、そして場合によっては、共生的な介入の組み合わせを通じて、家族1人の子供を強制します。 出生率は急激に下がります。 以下10年以上にわたり、[ROOT.GetCountry.GetName]は急速に年齢を上げ、労働力は契約します。 本方針は、都市部や農村部のほとんどが厳しく施行されています。 国際的なコミュニティと国内評論家は、両方のオブジェクトをその方法に批判します。"

 amendment_socialist_market_economy: "社会主義市場経済"
 amendment_socialist_market_economy_desc: "社会主義的な市場経済は、[ROOT.GetCountry.GetName]が市場メカニズムを運営する理論的フレームワークであり、党は究極の経済と政治的方向を維持しています。 民間企業は、州によって設定された境界内で許可され、奨励されます。 外国投資は、選択的に歓迎されます。 矛盾は現実的であり、審美的です。フレームワークは、パーティーコントロールを監視することなく、市場の効率性を活用するように設計されています。 それは、その方法で動作します。"

 # ==========================================
 # FRANCE
 # ==========================================

 amendment_35_hour_work_week: "35時間勤務週"
 amendment_35_hour_work_week_desc: "Aubry Lawsは、ほとんどの従業員に35時間の労働週を義務付け、39から標準時間を削減しています。 本方針は、労働者が雇用する労働者の労働時間が少ない、人口全体でより広範な作業を共有する方法として提示されます。 貿易組合は祝います。 雇用主はコストを増加させ、柔軟性を減らします。 実際に雇用を増加させるか、単に既存の仕事を再分配するのかについての議論はすぐに解決しません。"

 amendment_pasqua_law: "パスク法"
 amendment_pasqua_law_desc: "パスク・ローは、移民規制を大幅に強化 — 厳しい自然化要件、家族の再会の権利の減少、報告のための拡大された地面、および違法に入った人々のために残る権利の新たな制限。 内部大臣チャールズ・パスクは、国家の秩序と文化的コヒーレンスの問題としてそれを組み立てます。 クリティカルズは、[ROOT.GetCountry.GetName]のアシラムと包摂の伝統の意図的なロールバックであると主張しています。 法律は重要な公共サポートと重要な試験で通過します。"

 amendment_medicaid_modifier: "メディケイド"
 amendment_medicaid_modifier_desc: "連邦保健保険は、低所得市民をカバーしています。 死亡率が減少し、特に最も貧しい strata の中で。"

 amendment_affordable_care_act_modifier: "オバマケア"
 amendment_affordable_care_act_modifier_desc: "補助金および既存の状態の保護の個人の健康の適用範囲。 死亡率は控えめに落ちる; 中所得雇用主と状態のコスト上昇。"

 amendment_federal_assault_weapons_ban_modifier: "連邦アサルト武器禁止"
 amendment_federal_assault_weapons_ban_modifier_desc: "特定半自動兵器の製造・販売は禁止します。 放射状化を極端に低減"

 amendment_authorization_military_force_modifier: "軍用部隊の使用許可"
 amendment_authorization_military_force_modifier_desc: "州外者に対して軍事力を使用する広範な執行機関は、介入の外交コストを削減し、[ROOT.GetCountry.GetName]の宣言された利益を拡大します。"

 amendment_patriot_act_modifier: "PATRIOT法"
 amendment_patriot_act_modifier_desc: "拡張された国内監視当局は、トルコや革命的な活動を抑制しています。 立法と外交の評判は控えめなヒットを取った."

 amendment_crime_bill_1994_modifier: "1994 犯罪ビル"
 amendment_crime_bill_1994_modifier_desc: "拡張されたポリシングと必須最小限は、ターモイルを減らす。 強制死亡死亡率は控えめに上昇しました。 予算は圧力下にあります。"

 amendment_china_tax_reform_1994_modifier: "税務システム改革"
 amendment_china_tax_reform_1994_modifier_desc: "集中化した付加価値税システムは、会計収益の向上と廃棄物削減に取り組みます。 権限が大幅に改善されます。"

 amendment_one_child_policy_modifier: "ワンチャイルドポリシー"
 amendment_one_child_policy_modifier_desc: "出産制限が急激に減少しました。 [ROOT.GetCountry.GetName] の人口は、数十年前に著しい年齢になります。"

 amendment_socialist_market_economy_modifier: "社会主義市場経済"
 amendment_socialist_market_economy_modifier_desc: "パーティの方向で動作する市場メカニズムは、プライベートな構造を高め、スループットを改善し、産業投資を拡大しています。 コミュニティの動きのサポートは、控えめに減少します。"

 amendment_35_hour_work_week_modifier: "35時間勤務週"
 amendment_35_hour_work_week_modifier_desc: "就業時間制限が大幅に改善されました。 スループットを極端に減らします。 貿易組合は満たされています。雇用主はいません。"

 amendment_pasqua_law_modifier: "パスク法"
 amendment_pasqua_law_modifier_desc: "より堅い移民条件は高められた限定性および減らされたマイグレーションの引きを持っています。 在宅非人口の文化的受け入れが落ちています。"
