 lawgroup_subsidized_housing: "助成対象住宅"
 lawgroup_subsidized_housing_desc: "国家の資金、建設、市民のための住宅を保証する程度。 より進歩的なフレームワークは、都市の中心で不動産の生産を拡大し、インフラを改善し、移行プルを増加させます。"
 
 # ==========================================
 # LAWS
 # ==========================================
 
 law_no_public_housing: "公設住宅なし"
 law_no_public_housing_desc: "状態はハウジング サポートを提供しません。 シェルターは、購入、レンタル、または使用せずに購入、プライベートな問題です。 都市型住宅市場は、公共の介入なしに運営され、市場が生成するものは、市民が得るものです。"
 
 law_housing_projects: "住宅プロジェクト"
 law_housing_projects_desc: "州は都市部の基本的な高密度の公共住宅を造る - タワーブロック、セメント行、機能的および安い。 常に高い品質ではなく、場所は常に望ましいわけではありませんが、ハウジングが存在します。 アーバンセンターは、州立建設プログラムを通じて、不動産を生産できるようになりました。"
 
 law_public_housing_program: "公共住宅プログラム"
 law_public_housing_program_desc: "設計基準、混合用途開発、アクティブ都市計画の包括的な状態住宅プログラム。 政府は避難所を建てるだけでなく、街の形成です。 アーバンセンターは、公共の建設部門が拡大し、インフラがより良い都市計画の結果として向上するにつれて、より不動産を大きく生成します。"
 
 law_universal_housing: "ユニバーサルハウジング"
 law_universal_housing_desc: "ハウジングは保証された権利です。 ステートファンド、ビルド、およびそれを必要とするすべての市民のための避難所を維持します。つまり、テスト、市場依存性なし、行かない。 年度の費用は実質的かつ継続的です。 アーバンセンターは、最大不動産出力を実現します。 ユニバーサルアクセスの周りの都市は、移動を誘致し、ボード上のインフラを改善します。"
 
 law_no_public_housing_modifier: "公設住宅なし"
 law_no_public_housing_modifier_desc: "状態はハウジング サポートを提供しません。 都市型住宅市場は完全にプライベートです。"
 
 law_housing_projects_modifier: "住宅プロジェクト"
 law_housing_projects_modifier_desc: "基本的な状態のハウジングの構造は進行中です。 住宅在庫を落とす状態として、福祉費は適度にアップします。"
 
 law_public_housing_program_modifier: "公共住宅プログラム"
 law_public_housing_program_modifier_desc: "都会の不動産供給と都市インフラの整備を一層推進する総合住宅プログラム。"
 
 law_universal_housing_modifier: "ユニバーサルハウジング"
 law_universal_housing_modifier_desc: "ハウジングは保証された権利です。 福祉費は高くなりますが、都市インフラが改善され、移住が引き寄せられ、不動産の出力が最大化されます。"
 
 institution_central_bank: "中央銀行"
 institution_central_bank_desc: "お金の供給を管理する状態の金銭的な権限, 準備の要件を設定し、金利を制御する. 投資の各レベルは、金銭政策を締める - 商業信用生産を制約するが、国の債務の天井を拡大し、ベンチマーク金利を上げる。 中央銀行は、州が金融機関を直接制御する仕組みです。"
 
 lawgroup_central_banking: "中央銀行"
 lawgroup_central_banking_desc: "[ROOT.GetCountry.GetName] の金銭制度を規定する法的枠組みは、中央の金銭的な権威から完全な州管理までです。 銀行フレームワークの選択は、クレジットと有価証券がどのように生成され、どのような状態が借りることができるかを決定します。"
 
 law_no_central_bank: "中央銀行"
 law_no_central_bank_desc: "中央通貨の権限はありません。 銀行は独立して運営し、独自のリザーブ比率と融資方針を設定しています。 お金の供給は調整されず、州は金利または信用条件を管理するメカニズムを持っていません。 最も近代的な経済が離れてしまったという不安定なアレンジです。"
 
 law_fractional_reserve_banking: "よくある質問"
 law_fractional_reserve_banking_desc: "銀行は、預金のほんの一部を予約として保持し、残りを経済に貸す必要があります。 これにより、金融供給が拡大します。金融地区は、システムを通じた多岐にわたる資本の流れとして、より有価証券を生み出していますが、商業信用生産はレバレッジによってやや希釈されます。 最も近代的な経済の標準的なアレンジです。"
 
 law_full_reserve_banking: "フルリザーブ銀行"
 law_full_reserve_banking_desc: "銀行は、預金の100%を予約として保持しなければなりません。 中央銀行の機関が利用可能になり、状態が金銭政策を直接管理できるようにします。 中央銀行投資の各レベルは、1%のベンチマーク金利を上げ、最大クレジット限度額を5%増加させます。 商業銀行からのクレジット生産はより安定しています。 金融地区からの有価証券生産は、システムからレバレッジが解除されるため落ちます。"

 law_no_central_bank_modifier: "中央銀行"
 law_no_central_bank_modifier_desc: "中央の金銭的な権限が存在しません。 お金の供給は管理されていません。"
 
 law_fractional_reserve_banking_modifier: "よくある質問"
 law_fractional_reserve_banking_modifier_desc: "資金供給を拡充し、 有価証券生産が立ち上がり、レバレッジ効果により商業信用生産が適度に減少します。"
 
 law_full_reserve_banking_modifier: "フルリザーブ銀行"
 law_full_reserve_banking_modifier_desc: "完全な予約条件は効果です。 クレジット生産が安定し、より高い。 有価証券の生産は減ります。 中央銀行の機関は、金利および国債の天井を管理することができます。"
 
 institution_central_bank_modifier: "中央銀行"
 institution_central_bank_modifier_desc: "中央銀行は、金融政策を積極的に管理しています。 各投資レベルは、クレジット供給を強化し、1%の金利を上げ、最大クレジット限度額を5%増加させます。"
 
 country_max_credit_limit_mult: "最大クレジット限度額"
 country_institution_cost_institution_central_bank_mult: "中央銀行コスト"
 country_institution_central_bank_max_investment_add: "中央銀行マックス投資"
 country_institution_size_change_speed_institution_central_bank_mult: "中央銀行拡張速度"
 building_group_bg_banking_throughput_add: "銀行のスループット"
 
 lawgroup_media_regulations: "メディア規制"
 lawgroup_media_regulations_desc: "[ROOT.GetCountry.GetName] の情報を網羅する法的枠組みは、完全に規制されていないメディアからステートコントロールされた通信インフラまでです。 より規制されたフレームワークは、政治的な動きの根本化を抑制し、州の権限を増加させながら、規制されていない環境は動きを増幅し、情報空間の政府のグリップを弱める。"
 
 law_fully_unregulated_media: "完全無規制"
 law_fully_unregulated_media_desc: "メディアや情報環境の規制はありません。 ニュース・アウトレット、オンライン・プラットフォーム、通信ネットワークは、政府の監督なしに運営しています。 変形は自由に広がります。 ノイズで繁栄する政治的動き。 状態は、その市民が消費する情報を形づけたり管理したりするメカニズムはありません。そして、その制御から派生した権限はありません。"
 
 law_digital_rights: "デジタル著作権"
 law_digital_rights_desc: "基本的な法的保護は、情報環境を管理します。 — プライバシーの保証、検閲の規定、情報法の自由。 市民は、メディアの特定の虐待に対して法的リコースを持っていますが、情報空間は実質的に自由です。 政治的動きは、まだ肥沃な地面を見つける。 [ROOT.GetCountry.GetName] は、権利尊重状態であることから最も評判の高い利益を得る。"
 
 law_fairness_doctrine: "フェアネスDoctrine"
 law_fairness_doctrine_desc: "メディアアウトレットは、政治的な問題のバランスの取れたカバレッジを提示するために法的に必要です。時間と空間を複数の視点にし、一つだけをプラットフォーム化します。 最も極端な政治的声は、自分のメガホンを失う。 ラジカルな動きの採用は減ります。 状態は、情報戦争の参加者ではなく、公正なレフリーとして位置し、役割から権限を得る。"
 
 law_government_content_moderators: "政府コンテンツモデレーター"
 law_government_content_moderators_desc: "状態は、オンラインコンテンツを積極的に強化します。 — 変容、過激な素材を削除し、有害な、または不安定とみなされるコンテンツ。 理論的な動きは最も有効な採用材料が抑制されると同時に重要な範囲を失います。 権限は上昇します。. プレスの自由の国際コミュニティと国内評論者は、ポリシーと[ROOT.GetCountry.GetName]の威信はそれに応じて苦しむでしょう。"
 
 law_state_wifi: "州のWiFi"
 law_state_wifi_desc: "通信インフラを直接運用しています。 インターネットアクセスは、政府が完全に所有、運営、監視する公共のユーティリティです。 情報環境は、市民がインフラ[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]を通し、読み、見、共有するステートリソースです。 [ROOT.GetCountry.GetRuler.GetLastName] の政府制御。 理論的な動きの根本化はほぼ完全に抑制されます。 コスト、財務、評判は大幅です。"
 
 law_fully_unregulated_media_modifier: "完全無規制メディア"
 law_fully_unregulated_media_modifier_desc: "政治的な動きを増幅し、国家の権限を弱めるような情報環境です。"
 
 law_digital_rights_modifier: "デジタル権利フレームワーク"
 law_digital_rights_modifier_desc: "情報環境に関する基本的な法的保護。 政治的な動きはまだ繁栄していますが、[ROOT.GetCountry.GetName]は、その権利尊重のスタンスからいくつかの威信を得ます。"
 
 law_fairness_doctrine_modifier: "フェアネスDoctrine"
 law_fairness_doctrine_modifier_desc: "バランスの取れたメディアカバレッジの要件は、根本的な動きの採用を抑え、州立法を改善しています。"
 
 law_government_content_moderators_modifier: "政府コンテンツのモデレーション"
 law_government_content_moderators_modifier_desc: "活動的な状態のコンテンツの適度化は、偽りと正当性のコストで、政治的な動きの根本化を著しく抑制しています。"
 
 law_state_wifi_modifier: "国家制御通信"
 law_state_wifi_modifier_desc: "[ROOT.GetCountry.GetName] は通信インフラを直接制御します。 政治運動のラジカル化は、ほぼ完全に抑制されます。 権限が高い。 国際的な評判は苦しむ。"
 
 institution_courts: "コートシステム"
 institution_courts_desc: "確立された裁判所および法的な手順による正式な司法業務。 各投資レベルは、裁判所制度のリーチを拡大する - より多くの裁判官、より多くの裁判所、より一貫した法執行。 法的なチャネルによって紛争が解決されると、法的な制定がより一貫しなり、革命的な動きは、国家の法的装置が克服しにくいことを見つける。"
 
 lawgroup_judiciary: "審査委員"
 lawgroup_judiciary_desc: "[ROOT.GetCountry.GetName] の裁判所制度に基づく法的哲学 — 紛争の解決方法、法的な権限を保持する者、正義の目的が保持されていること。 司法書士、立法、外交、社会秩序の安定性の選択。"
 
 law_inquisitive_judiciary: "よくある質問"
 law_inquisitive_judiciary_desc: "州は、独立した機関ではなく、政府機関の軍隊である、国家調査、検分、および裁判官である。 裁判官は、王冠または政府の代理人であり、真実を見つけ、国家の代わって法律を強化する任務です。 官公庁は、政府の政策の高度と制定がスムーズですが、デュースプロセスは弱く、人口はそれを知っています。"
 
 law_customary_judiciary: "カスタム"
 law_customary_judiciary_desc: "紛争は、伝統的なコミュニティ規範、部族評議会、高齢者仲裁、およびローカルカスタムによって解決されます。 正式な裁判所はありません - 正義は、コミュニティが正当なものとして認識する規則によると、その当局として認識する人々によって配信されます。 状態は、このシステムに限られた範囲を持っています。 コミュニティは安定した、伝統に忠実であり、外部の混乱に耐性があります。"
 
 law_religious_judiciary: "宗教法"
 law_religious_judiciary_desc: "聖書、宗教的な陪審員、および事務当局の解釈は、法的手続を支配します。 devout は、法律の意味と適用方法の仲裁人として巨大な政治力を獲得します。. 宗教的な正当性は忠実に深く動く。 信仰の外にいる人、またはそれを別々に解釈する人、より少ない歓迎するシステムを見つけるかもしれません。"
 
 law_restorative_judiciary: "回復力"
 law_restorative_judiciary_desc: "正義の目的は罰ではなく、修復ではなく、被害者に行われた害を修復し、犯罪者を回復し、両方の社会に統合する。 裁判所は、調停、和解、地域社会の癒しに重点を置きます。 ターモイルは落ちます。 衝突による死亡率は減少します。 ロヤリストは成長しています。 状態は、それが住んでいるシステムを信頼する人口のための交換のいくつかの権限を与えます。"
 
 law_adversarial_judiciary: "インタビュー"
 law_adversarial_judiciary_desc: "独立した裁判官または陪審の前に迫害および防衛コンテスト。 侵入の前提は保護されます。 社会的立場に関係なく、法的地位が等しい。 国家は市民と同じルールに拘束されます。 [ROOT.GetCountry.GetName] の国際的な威信は大幅に上昇します。 独立した司法省は政府の行動を禁じていますが、法律で禁忌になる政府は、人口は信頼できます。"
 
 law_inquisitive_judiciary_modifier: "必須の審査"
 law_inquisitive_judiciary_modifier_desc: "司法は国家権威の腕として機能します。 政策の制定が容易で、ターモイルは抑制されますが、プロセスが弱く、表面の下に根本的な圧力の建物は本物です。"
 
 law_customary_judiciary_modifier: "カスタム法"
 law_customary_judiciary_modifier_desc: "伝統的なコミュニティ正義は、深い正当性と社会的安定性を提供します。 国家の正式な権限は限られていますが、システムの人口の信頼は本物です。"
 
 law_religious_judiciary_modifier: "宗教法"
 law_religious_judiciary_modifier_desc: "法令の定める場合 [ROOT.GetCountry.GetAdjective] devout は巨大な政治力を保持します。 忠実に深い忠誠心—そしてそれの外側の人々の間で高められた憤り。"
 
 law_restorative_judiciary_modifier: "復活正義"
 law_restorative_judiciary_modifier_desc: "正義システムは、リハビリテーションと再調整に焦点を当てています。 ターモイルと死亡率が下落し、ロイヤリストが成長し、[ROOT.GetCountry.GetName]は、その人的アプローチの国際的尊重を得る。"
 
 law_adversarial_judiciary_modifier: "事務弁護士"
 law_adversarial_judiciary_modifier_desc: "法律の前に、デュー・プロセスおよび等しい地位で作動する独立した司法。 Legitimacy と prestige は高い。 状態の権限はチェックされますが、そのチェックはシステムが信頼できるものです。"
 
 institution_courts_modifier: "審査委員"
 institution_courts_modifier_desc: "確立された裁判所ネットワークは、芝刈り機を減らし、法制定を改善し、革命的な勢いを抑制します。 各追加レベルは、[ROOT.GetCountry.GetName] を渡るコートのリーチをさらに拡張します。"
 
 country_institution_cost_institution_courts_mult: "裁判所システムコスト"
 country_institution_courts_max_investment_add: "コートシステムマックス投資"
 country_institution_size_change_speed_institution_courts_mult: "裁判所システム拡張速度"
 
 law_privatized_preschool_education:0 "プリバタイズプリスクール教育"
 law_privatized_preschool_education_desc:0 "幼少期の教育は、規制された民間市場を通じて提供されます。 プロバイダは、最低限の基準を設定し、独立したオペレータへの配送を残して、登録のために競争します。 アクセスは世帯の収入に大きく依存しますが、補助金は下降家族のための負担の一部を相殺する可能性があります。"

 law_universal_childcare:0 "ユニバーサル保育"
 law_universal_childcare_desc:0 "収入に関係なく、すべての家族のための手頃な価格の保育を保証します。 公共施設は全国で利用可能で、親が労働力に参加し、初期の幼年期の発達が家族の手段に関与していないことを確実にするために解放します。"

 law_legal_protections:0 "法的保護"
 law_legal_protections_desc:0 "州は男性と女性の間で正式な法的平等を確立し、雇用、財産、公生活の差別に対する保護を強化しています。 以前、慣習的または選択的に施行された権利は、法律の力によって支えられています。"

 law_structural_egalitarianism:0 "構造の伝道主義"
 law_structural_egalitarianism_desc:0 "政府は、法的平等を超えて積極的に男女平等を貫通する機関構造を解体するようになりました。 公共オフィス、職業、市民機関の代表は委任され、状態は等しい権利ではなく、等しい結果を高めるための積極的な役割を担います。"

 law_matriarchy:0 "マトリアーキー"
 law_matriarchy_desc:0 "女性は国の政治と社会的構造で優勢な地位を保持しています。 女性はリーダーシップのポジションの大部分を形成します。"

 law_disability_cheques:0 "障がいの咀嚼"
 law_disability_cheques_desc:0 "障がい・慢性疾患により、就労できない市民に対して定期的な財政支援を行います。 支払いは、社会保障機器を介して管理され、労働力以外の人のための生活の最小標準を保証するために意図されています。"

 law_student_coverage:0 "マタニティ 葉"
 law_student_coverage_desc:0 "女性は妊娠のためのカバレッジを付与されます。"

 law_universal_basic_income:0 "ユニバーサル基本所得"
 law_universal_basic_income_desc:0 "すべての市民は、雇用状況や手段に関係なく、州から無条件の定期的な支払いを受け取ります。 本方針は、労働、福祉、経済参加の関係の根本的な見直しを表しています。すべての作業の最小期待を上げながら、誰も落ちることができない床を保証します。"
 
 law_universal_college:0 "ユニバーサル・カレッジ"
 law_universal_college_desc:0 "状態は、背景や手段に関係なく、すべての市民のための高等教育へのアクセスを保証します。 大学や大学は公に資金を供給され、その場所は、富ではなく、慈悲に開いています, より多くの教育された労働力とより情報的な市民を生成します."

 education_laws.1.t:0 "誰が学位を支払うか?"
 education_laws.1.d:0 "ユニバーサル・カレッジへのコミットメントは、決算短信から即時かつ指摘された質問を求めています。誰が正確にそれを支払うでしょう? 公共支出の大きな拡大を表すすべての市民のための高等教育を資金提供し、相手は自分の異議を大きくする。 政府は、完全な公的資金にコミットするか、または負担を制限する手段テストモデルを導入するかを決定しなければならない。"
 education_laws.1.f:0 "教育のために支払う人の質問は、常に本当に教育が誰であるかの質問でした。"
 education_laws.1.a:0 "高等教育は公益です。"
 education_laws.1.b:0 "手段テストされた補助金を導入 — 貧しい資金を、富裕層ではありません。"

 education_laws.2.t:0 "Meritocracy オブジェクト"
 education_laws.2.d:0 "Wealthy の興味は普遍的な大学に対する彼らの好まれた引数を見つけました: 標準。 誰もが出席できるならば、彼らは警告し、学位は無価値になります - 本物の卓越性の機関は、準備が整うためにドラッグダウンします。 政府は、原則上の普遍的なアクセスを守るか、公的なシステムと一緒にエリート機関を保全する車いすを提供するかを選ぶ必要があります。"
 education_laws.2.f:0 "各アクセスの拡大は、基準に関する同じ警告と一致しています。 基準は常に生き残ります。"
 education_laws.2.a:0 "普遍的なアクセスを防衛 — 卓越性は裕福の保存ではありません。"
 education_laws.2.b:0 "ユニバーサルアクセスとともに、エリート機関を予約します。"

 education_laws.3.t:0 "インテリジェントジアのピーク"
 education_laws.3.d:0 "学術コミュニティは、特徴的な信念で議論に入りました。 普遍的な大学, 彼らは議論, 単なる社会的良いだけでなく、経済必需品ではありません — それは故意の無視を選ぶ国である余裕を持つ人々に高い教育を制限する国. 政府は、正式に彼らの声を法定的な引数に招待するか、厳密に政治条件で議論を維持するかどうかを決定しなければなりません。"
 education_laws.3.f:0 "大学は、社会がどのような未来を望むかを判断したところ常に存在しています。 誰がそれをビルドするのに役立つかを決める必要があります。"
 education_laws.3.a:0 "それらを議論に招待する — 学術は引数を導きます。"
 education_laws.3.b:0 "政治の決定を保ちましょう。学術は助言します。"

 education_college_fiscal_resistance:0 "財政の抵抗"
 education_college_fiscal_resistance_desc:0 "財政保護は、積極的に普遍的な大学の公費を反対しています, 制定プロセスを延期し、政府が支出の約束を正当化する."

 education_college_public_funded:0 "公共ファンドのコミットメント"
 education_college_public_funded_desc:0 "政府は普遍的な高等教育の完全な費用を吸収し、重要な費用の制定の運動量を増強することを託しました。"

 education_college_meritocracy_debate:0 "Meritocracy 議論 Engaged"
 education_college_meritocracy_debate_desc:0 "政府は、公に、それが学術基準を希釈し、制定議論の条件をシフトするという主張に対して普遍的なアクセスを防衛しました。"

 education_college_elite_carveout:0 "エリートキャバレーオファー"
 education_college_elite_carveout_desc:0 "公共システムと並んでエリート民間機関を予約する車いすが提供され、実装を遅くするが、裕福な反対論を減らす。"

 education_college_academic_endorsement:0 "アカデミック・エクステンダーメント"
 education_college_academic_endorsement_desc:0 "インテリジェントジアは、公に普遍的な大学を支持しています, 明確に権威を貸し、制定の努力にサポートを組織しました."

 education_college_elites_rebuked:0 "エリートリバウンド"
 education_college_elites_rebuked_desc:0 "裕福な関心は、彼らの立場を恥ずかしがりかしがらせながら、その決議を鋭くすること、彼らの慈悲の引数に公正に挑戦されています。"

 education_college_elites_appeased:0 "エリートが認める"
 education_college_elites_appeased_desc:0 "エリートの機関車車の提供は普遍的な大学に裕福な反対論を軟化しました。"

 education_college_intelligentsia_engaged:0 "インテリジェントジアエンゲージ"
 education_college_intelligentsia_engaged_desc:0 "アカデミックと研究者は、普遍的な高等教育のための公的ケースを積極的に作成しています。, 知的財産の信頼性を啓発活動に貸与."

 education_college_intelligentsia_sidelined:0 "インテリジェントジア サイドライン"
 education_college_intelligentsia_sidelined_desc:0 "立法的な議論から学術を維持するための決定は、政府の教育議題から不満と失望したインテリジェントジアを残しています。"
