l_japanese:
 law_jihad:0 "ジハディズム"
 law_jihad_desc:0 "ジハディスト・マイリトリーズは、実践、訓練、組織の明確な宗教的目的を持っています。"
 law_mixed_healthcare:0 "混合健康システム"
 law_mixed_healthcare_desc:0 "住民の健康は、民間・政府の健康保険の計画によって管理されます。 政府の計画は、民間保険の市場故障を解決するために、当社の下所得市民に提供されます。"
 law_affirmative_action:0 "肯定的な行動"
 law_affirmative_action_desc:0 "未成年者のさまざまな保護が必須となります。 これは、当社の現在のシステム、法的保護、および金銭的資金への関与を促進するために引用符とさまざまなシステムを含みます。"
 
 lawgroup_firearms:0 "Firearmの所有権"
 lawgroup_firearms_desc:0 "腕を負担する権利に関する事項。"
 
 lawgroup_abortions:0 "コンサルティング"
 lawgroup_abortions_desc:0 "私たちの市民が中絶を許さないかどうか。"
 
 lawgroup_unions:0 "ユニオン"
 lawgroup_unions_desc:0 "労働者の組合を形成する能力に関する事項。"
 
 lawgroup_homosexuality:0 "ホモ性愛"
 lawgroup_homosexuality_desc:0 "我が国のLGBTQ+運動に関する事項"
 
 law_canton_system:0 "イソリシズム"
 
 law_unrestricted_firearms:0 "制限なしの防火具"
 law_unrestricted_firearms_desc:0 "私たちの国は、民間人の使用のために熟した大規模な消防士産業に家です。"
 
 law_licensed_firearms:0 "認可された火薬"
 law_licensed_firearms_desc:0 "市民は、私たちの国の銃を所有するライセンスが必要です。"
 
 law_banned_firearms:0 "禁止された火薬"
 law_banned_firearms_desc:0 "防火器の使用は固く禁じられています。"
 
 law_banned_unions:0 "禁止された連合"
 law_banned_unions_desc:0 "労働者は、職場の利益を得るという意思で組合化することはできません。"
 
 law_restricted_unions:0 "制限された連合"
 law_restricted_unions_desc:0 "労働者は、投資家を保護するためにいくつかの制限を伴って、組合を形成することができます。"
 
 law_unrestricted_unions:0 "制限なしの連合"
 law_unrestricted_unions_desc:0 "労働者は、労働のために最大限の利益を享受し、求めるために十分に奨励されます。"
 
 law_banned_abortions:0 "禁止事項"
 law_banned_abortions_desc:0 "赤ちゃんの殺害は、法律で禁止されています。"
 
 law_restricted_abortion:0 "制限事項"
 law_restricted_abortion_desc:0 "市民は、母親の人生が脅迫されるとき、または治療や害虫の場合には、認可された中絶です。"
 
 law_unrestricted_abortions:0 "制限なし"
 law_unrestricted_abortions_desc:0 "市民は、自由に中絶の権利を行使することができます。"
 
 law_active_oppression:0 "アクティブオプレッション"
 law_active_oppression_desc:0 "LGBTQコミュニティのメンバーとしてオープンに識別する市民は、抑圧、脱獄、さらには殺されます。"
 
 law_restricted_lgbtq:0 "犯罪性ホモ性"
 law_restricted_lgbtq_desc:0 "市民はゲイであるために刑務所に直面する可能性があります。"
 
 law_decriminalized_gays:0 "Decriminalized Homosexuality(仮称)"
 law_decriminalized_gays_desc:0 "市民は、コースの閉鎖したドアの背後にある同性愛関係に従事することができます。 ホモセクシャル関係は、状態によって制裁されることはありません。"
 
 law_gay_marriage:0 "同じ 性別 結婚"
 law_gay_marriage_desc:0 "状態は、イニスターが同じ性別であるかにかかわらず、すべてのタイプの結婚を制裁する必要があります。"
 
  # immigration
  institution_immigration:0 "入国管理"
  institution_immigration_desc:0 "A government body has been formed to curb or encourage immigration into our country as we see fit.
  # dei

  institution_diversity_equity_inclusion:0 "ダイバーシティ、エクイティ&インクルージョン"
  institution_diversity_equity_inclusion_desc:0 "社会の公正な地盤を解散することに焦点を当てた政府部門。"
  
  # spies
  
  institution_intelligence_agency:0 "インテリジェンス・エージェンシー"
  institution_intelligence_agency_desc:0 "インテリジェンスエージェンシーは、世界各地のカバート業務を担当しています。"
  
  # laws below may be defunct.
  
  
  # New Laws Any Group
 law_equal_rights:0 "Equalの権利"
 law_equal_rights_desc:0 "女性は男性対向として同じレベルの権利を体験することができます。"
 law_prison_slavery:0 "刑務所スラブリー"
 law_prison_slavery_desc:0 "囚人や刑事は、自分の文章の間にお金を払わないために少しで長時間働かなければならない。"
 law_restricted_police:0 "制限された警察"
 law_restricted_police_desc:0 "警察の力によって提示された力は制限され、保護するために気付く市民の安全を保障するために厳密な規則の対象となる。"
 law_resettlement_enticement:0 "Resettlementの彫版"
 law_resettlement_enticement_desc:0 "政府は、人々が自分の領土に移住することを促すプログラムを備えています。"
 
 # Rights of Minorities Group
 
 lawgroup_rights_of_minorities:0 "未成年者の権利"
 lawgroup_rights_of_minorities_desc:0 "未成年の人口に対する法的規制と保護。"
 
 law_no_minority_rights:0 "少数の権利"
 law_no_minority_rights_desc:0 "すべてのタイプの少数民族は、一般的なポップアップのそれらと同じ権利を見直しません。"
 law_segregation:0 "委任法"
 law_segregation_desc:0 "少数民族は、多くの場合、スクラップ&残余を得る一般的なポップアップから分離の度を経験します。"
 law_apartheid:0 "有利な法律"
 law_apartheid_desc:0 "少数民族は、一般的な人口の同じ社会を経験しず、指定された「土地」にしばしば削除または再配置されることはありません。"
 law_unfulfilled_protections:0 "不完全な保護"
 law_unfulfilled_protections_desc:0 "国家は、未成年者のための障壁を除去する努力をしていますが、未成年者の権利を支配する法律は、ほとんど施行されていないままです。"
 law_limited_protections:0 "限られた保護"
 law_limited_protections_desc:0 "異なる民族性または国籍の人は、一般の人口が享受する同じ権利の多くを占めます。"
 law_encompassing_protections:0 "保護を回避する"
 law_encompassing_protections_desc:0 "異なる民族性または国籍の少数民族であり、障害者は、一般的な人口が享受するすべての権利と保護を回復します。"
 law_universal_protections:0 "普遍的な保護"
 law_universal_protections_desc:0 "民族性、国籍、能力、性的性、または性的アイデンティティに関係なく、一般の人口が享受する同じ権利を再考します。"
 
 # Union Laws Group
 
 lawgroup_union_laws:0 "ユニオン法律事務所"
 lawgroup_union_laws_desc:0 "ストライク、ウォークアウト、プロテス、暴動などの労働組合の行動に対する身体の処分。"
 law_unions_outlawed:0 "外部リンク"
 law_unions_outlawed_desc:0 "ユニオンは、この国とパーペレータに不法で、迅速な抵抗を回復します。"
 law_useless_unions:0 "無用局員"
 law_useless_unions_desc:0 "ユニオンは、労働者の官僚的ではありません & 外部の力なしで機能し、戦うために必需品を欠如."
 law_limited_action:0 "限定アクション"
 law_limited_action_desc:0 "連合は、彼らが達成することができ、多くの場合、有効であるために、法的なループホールをナビゲートしなければならないものに厳しく制限されています。"
 law_craft_unions:0 "クラフトユニオン"
 law_craft_unions_desc:0 "ユニオンは特定の役割に制限され、他のロールのユニオンで同盟国を鍛造することを防ぐ。"
 law_permitted_unions:0 "許可された行為"
 law_permitted_unions_desc:0 "ユニオンは、法的も違法ではありませんが、規制機関からの保護がほとんどないため、機能することができます。"
 law_enterprise_unions:0 "エンタープライズ"
 law_enterprise_unions_desc:0 "ユニオンは、従業員の作業性能を改善し、メンバーのニーズに焦点を合わせることがあります。 必要な手段で、メンバーの生活を改善することで効果的です。"
 law_backed_unions:0 "バックアップ保護"
 law_backed_unions_desc:0 "ユニオンは、公共によって効果的に支持され、国の文化の一部としてそれ自体をセメントでセメントで処理されています。 彼らは人々によって保護を持っており、窒息行動に対する法的保護が与えられます。"
 law_empowered_unions:0 "ユニオンエンパワーメント"
 law_empowered_unions_desc:0 "警察によって大きく補強され、政府の裏付けがあります。 これらのユニオンは、その要求を効果的に得ることができます, すべての状況下で保護されています & 応援しています."
 
 # Corporate Authority Group
 
 lawgroup_corporate_authority:0 "経営体制"
 lawgroup_corporate_authority:0 "法人と実質的に裕福な企業に対する法的規制、これらには、政治的な力と管理の規制が含まれており、彼らは絶え間なくすることができます。"
 law_completely_unregulated:0 "完全無規制"
 law_completely_unregulated_desc:0 "企業の行動と行動は、あらゆる方法で妨げられません。 そこに住む労働者と人々の苦しみにしばしば。"
 law_political_lobbying:0 "政治ロビー"
 law_political_lobbying_desc:0 "十分な資金の合計を持つ誰もが、政府をロビーにし、彼らの好意で法律を変えることに圧力をかけることができます。"
 law_tax_haven:0 "税制"
 law_tax_haven_desc:0 "公益社団法人や個人は歓迎と見なされます & 統治体は、より少ない税金とより多くの土地でそれらを支持するために法律を入れています."
 law_feign_ignorance:0 "無視されたイグノー"
 law_political_lobbying_desc:0 "統治体は、企業が持つ力と、それが問題ではないことを前提にすることで、有益性を制限するためにできるだけ少ないことを選択します。"
 law_limited_restrictions:0 "限定規制"
 law_limited_restrictions_desc:0 "法人の資産及び資産は、彼らがお金にいるか、投資および株式で保持されているかにかかわらず、課税されます。"
 law_progressive_restrictions:0 "進歩的な制限"
 law_progressive_restrictions_desc:0 "実質的に富裕福なすべての資産 & 企業のすべての利益が実現または課税されていない & 進歩的な速度でポップアップオフに使用."
 law_no_one_individual:0 "お一人様"
 law_no_one_individual_desc:0 "確かに富裕福は、そこにビジネスを行うために選ぶならば、その統治体の税制に留まっています。 国内で生成された富は減り、必要に応じてポップアップに配布されます。"
 law_corporate_redistribution:0 "企業再配布"
 law_corporate_redistribution_desc:0 "堅牢な富裕福な企業や法人が最大限の許された金額に還元する資産。 この資産は、必要に応じて再配布されます。 法人は、選出された公式を含むボードから一般に引き渡されます。"
 
 law_serfdom:0 "労働許可申請"
 law_serfdom_desc:0 "労働権が確立されていない、または労働権が完全に執行されていない。"
 law_serfdom_banned:0 "最小限の保護"
 law_serfdom_banned_desc:0 "最低限の保護が確立されました。"
 
 lawgroup_drug_regulations: "薬物規制"
 lawgroup_drug_regulations_desc: "有毒物質の法的状態 - 総禁止からトラフィックの完全合法化まで。 薬物政策は死亡率、国家権威、執行コスト、および農業および犯罪的利益の力を形作る。"

 law_total_prohibition: "総禁止事項"
 law_total_prohibition_desc: "アルコールやタバコを含むすべての中毒物質は、法律で禁止されています。 国家は、市民が自分の体に入ったものを調整するための道徳的な権限を主張します, 宗教的で保守的な機関によって支持. ギャップの執行で繁栄する黒い市場は満たすことができません。"

 law_alcohol_tobacco_legal: "アルコールとタバコ 法的"
 law_alcohol_tobacco_legal_desc: "アルコール・タバコは、法律・税金です。 他の全ての物質は禁止されています。 これは、最も近代的な状態のためのベースラインの法的フレームワークです。 - 経済利益と道徳的保守主義間の実用的妥協。"

 law_marijuana_decriminalization: "マリファナの決定"
 law_marijuana_decriminalization_desc: "大麻の個人的な所有権と使用はもはや犯罪ではありません。 取引は違法であるが、執行はより硬い物質にリダイレクトされます。 本方針は、焼却がレクリエーション薬の使用に対する効果的な反応ではない、成長するコンセンサスを反映しています。"

 law_hard_drugs_decriminalized: "堅い薬剤のDecriminalization"
 law_hard_drugs_decriminalized_desc: "犯罪者、カイン、およびアンフェタミンを含むすべての制御物質の所有物は、犯罪者ではなく公衆衛生として扱われます。 ユーザーは、予防ではなく治療と呼ばれます。 政策は論争ですが、早期採用者からの証拠は、それが過剰摂取死亡率を削減し、執行資源を解放することを示唆しています。"

 law_safe_injection_sites: "安全な注入の場所"
 law_safe_injection_sites_desc: "政府出資施設では、医療従事者のもとに薬を消費することができます。 スタッフは、逆転薬を投与し、治療プログラムでユーザーを接続することができます。 死亡率が大幅に下がります。 宗教的かつ保守的な反対論は確かです。この方針は受容として見られ、可能であっても、薬物の使用が認められています。"

 law_trafficking_allowed: "交通アクセス許可"
 law_trafficking_allowed_desc: "制御物質の取引は、完全に合法化され、状態によって規制されます。 経済上の利点は、即時かつ実質的です。薬物の収益は、正式な経済と税務基盤に流れます。 評判と社会的影響は厳しいです。 世界のほとんどは、犯罪ネットワークへのキャピュレーションとしてこれを尊重します。"

 law_total_prohibition_modifier: "総禁止事項"
 law_alcohol_tobacco_legal_modifier: "アルコールとタバコ 法的"
 law_marijuana_decriminalization_modifier: "マリファナの決定"
 law_hard_drugs_decriminalized_modifier: "堅い薬剤のDecriminalization"
 law_safe_injection_sites_modifier: "安全な注入の場所"
 law_trafficking_allowed_modifier: "交通アクセス許可"
 
 lawgroup_disability_rights: "障害者の権利"
 lawgroup_disability_rights_desc: "障害者の市民の権利を支配する法的枠組み - ベアレジデントから治療、インフラ、職場の包含を通じて活動的な国家サポートまで。 より包括的なフレームワークは、労働力の参加を拡大し、生活の基準を改善し、死亡率を削減し、州や雇用者にコストを増加させます。"

 law_minimal_recognition: "最小限の認識"
 law_minimal_recognition_desc: "状態は、障がいのある市民が存在しているが、宿泊施設、サポート、またはそれらに対する法的保護を提供しないことを認識しています。 障がいのある人は、正式な雇用と公生活からほとんど排除されます。 人件費が著しく、財政費は必須です。"
 
 law_workplace_accommodations: "職場の宿泊施設"
 law_workplace_accommodations_desc: "雇用主は、障害者労働者が労働力に参加できるように合理的な調整を行うために法的に必要である - 修正された機器、調整された業務、アクセス可能なワークステーション。 本方針は、生産的な雇用に有意義な人口をもたらします。 雇用主は調整コストを負担しますが、労働力は拡大します。"
 
 law_anti_ableist_architecture: "抗力士建築"
 law_anti_ableist_architecture_desc: "公共ビル、輸送ネットワーク、インフラは、障がいのある市民にアクセスできる必要があります。 ランプ、上昇、蝕知の舗装、アクセス可能な表記 — 物理的な環境はもはや除外してはならない。 既存インフラの改造は高価です。 社会に十分に参加できる人口は大きく拡大します。"
 
 law_public_treatments: "公共治療"
 law_public_treatments_desc: "国家資金の医療処置, 支援機器, 審美, 治療, そして、慈善ではなく右の問題として障害者市民のための継続的なサポートサービス. 死亡率が著しい。 人口を越えた生活水準が上昇する。 公共の予算への費用は実質的かつ進行中です。しかし、一部の市民は、他の人が正式に拒否されたよりもサポートを述べる資格が低いという引数です。"
 
 law_minimal_recognition_modifier: "障害の最小認識"
 law_minimal_recognition_modifier_desc: "障がいのある市民は、州から宿泊施設を受け取りません。 効果的な労働力は減少し、死亡率はそれができるものの上にあります。"
 
 law_workplace_accommodations_modifier: "職場の宿泊施設"
 law_workplace_accommodations_modifier_desc: "障がい者対応の雇用主は、障がい者対応が必要です。 ワークフォースは、生産性を向上するために最もコストで、より広く、包括的です。"
 
 law_anti_ableist_architecture_modifier: "アクセス可能なインフラ"
 law_anti_ableist_architecture_modifier_desc: "公共インフラはアクセス可能になりました。 建物がアクセシビリティ基準を満たしているため、建設費は高くなりますが、社会に十分に参加できる人口は大きくなります。"
 
 law_public_treatments_modifier: "公共の障がいの治療"
 law_public_treatments_modifier_desc: "障がいのある市民のための州の資金処理と支援 死亡率が減少し、生活水準が向上し、教育アクセスが広まっています。"
 
 institution_environmental_protection: "環境保護庁"
 institution_environmental_protection_desc: "環境基準のモニタリングと強化に専念する政府機関。 各投資レベルは、拡張された執行能力、より厳しい規制、およびより広範な保全プログラムを表しています。すべての州の汚染発生を削減します。"
 
 lawgroup_environmental_regulations: "環境規制"
 lawgroup_environmental_regulations_desc: "[ROOT.GetCountry.GetName] の自然環境との関連性を規定する法的枠組みは、規制されていない産業利用から自然環境の憲法上の保証された権利までです。 より進歩的なフレームワークは、汚染を減らし、死亡率を下げ、生態系を保護し、コストを増加させ、産業のスループットと公共の支出につながります。"
 
 law_no_environmental_regulations: "規制なし"
 law_no_environmental_regulations_desc: "環境制約なしに業界を運営 工場、鉱山および農場は法的限界なしで汚染し、抽出し、悪用するかもしれません。 出力は最高です。 長期費用 — 死亡率、生態系の劣化、公衆衛生における — は、生産者ではなく、人口によって生まれます。"
 
 law_game_law: "ゲーム法"
 law_game_law_desc: "ゲーム人口の崩壊を防ぐため狩猟と釣りが規制されています。 保護された季節、ライセンスされた狩猟、および最も破壊的な抽出方法の制限。 主にそれらの富裕層の利益を娯楽的にハントするのに役立つ保存フレームワークです。しかし、状態が天然資源の管理に興味を持っているという原則を確立します。"
 
 law_national_recycling: "全国リサイクル"
 law_national_recycling_desc: "リサイクル廃棄物の回収・処理のための全国プログラム 産業廃棄物と国内廃棄物は、埋立物や水路に入った材料の量を減らす、可能な限り選別、回収、再利用されます。 資源の効率性は適度に改善します。 汚染は落ちます。 市町村・市町村・市町村・市町村・市町村・市町村・市町村・市町村・市町村・市町村・市町村・市町村・市町村・市町村・市町村・市町村・市町村・市町村・市町村・市町村・市町村・市町村・市町村・市町村・市町村・市・市町村・市町村・市町村・市町村・市町村・市・市町村・市町村・市町村・市町村・市・市町村・市町村・市町村・市町村・市町村・市"
 
 law_protection_agency: "保護機関"
 law_protection_agency_desc: "経済のあらゆる分野にわたって環境基準を設定、監視、強化する権限を持つ政府機関。 排出量は制限、土地利用制限、産業廃棄物規制、保護された自然領域を制限します。 代理店は投資することができます。 - 資金の各追加レベルは、その執行能力を拡大し、汚染をさらに削減します。"
 
 law_guaranteed_rights_of_nature: "自然保護に関する権利"
 law_guaranteed_rights_of_nature_desc: "河川、森林、湿原、生態系は法的地位を付与されます。破壊、汚染、または回復する能力を超えて悪用される権利。 フレームワークは、所有権の対象ではなく、自然を権利の対象として扱うために始めた国の新興法的な伝統から引き出される、最も野心的な環境法です。 産業活動は著しく禁忌です。 汚染は急激に落ちます。 環境保護庁は、最大限の効果を発揮します。"
 
 law_no_environmental_regulations_modifier: "規制産業"
 law_no_environmental_regulations_modifier_desc: "業界に環境制約はありません。 スループットは上昇していますが、汚染と死亡率はその結果として上昇しています。"
 
 law_game_law_modifier: "ゲーム法"
 law_game_law_modifier_desc: "規制された狩猟と釣りは、環境の劣化を著しく低減しました。 最小限だが、実際の介入。"
 
 law_national_recycling_modifier: "全国リサイクルプログラム"
 law_national_recycling_modifier_desc: "廃棄物の発生を抑制し、材料を回復し、汚染および建設効率を適度に改善します。"
 
 law_protection_agency_modifier: "環境保護庁"
 law_protection_agency_modifier_desc: "環境保護庁は、排出量制限と産業基準を強化しています。 汚染は落ち、その到達範囲を拡大するために、機関はさらに投資することができます。"
 
 law_guaranteed_rights_of_nature_modifier: "自然保護に関する権利"
 law_guaranteed_rights_of_nature_modifier_desc: "自然は憲法の地位を与えられました。 業界は重要な制約に直面していますが、汚染は急激に減少し、死亡率が低下し、食品安全保障は生態系が保護されるにつれて向上します。"
 
 # Institution modifier names
 country_institution_cost_institution_environmental_protection_mult: "環境保護庁コスト"
 country_institution_environmental_protection_max_investment_add: "環境保護庁最高投資"
 country_institution_size_change_speed_institution_environmental_protection_mult: "環境保護庁の拡大の速度"
 
