 CONV_BUILDING_CHANCE_TOOLTIP: "各ミサイルは、対象となる州の次の建物の1つを破壊する3%のチャンスを巻きます。\n\n•空港\n• バラックス\n• 海軍基地\n• 原子力発電所\n• 核Silo\n• 政府行政\n• id=8/>• 鉄道\n すべての建物タイプは独立して転がされます。 単一のミサイルサルボは、十分な大きさであれば、同じ状態で複数の建物を破壊することができます。"
 
 nuclear_events.12.t: "[ROOT.GetName] のミサイル ストライク"
 nuclear_events.12.d: "[SCOPE.sCountry('missile_attacker').GetName] は、[ROOT.GetAdjective] 領域に対する従来のミサイルストを発足しました。 レポートは、[ROOT.GetAdjective] の状態に影響を及ぼすため、インフラの損傷が評価されます。\n\n ミサイルは核ではなく、メッセージはクリアです。 [SCOPE.sCountry('missile_attacker').GetName] は、弊社に対して長距離兵器を使用する意思です。"
 nuclear_events.12.f: "すでにクレーターがいます。 質問は、次のことを行います。"
 nuclear_events.12.a: "ダメージを評価し、それに応じて対応"

 missile_strike_victim_modifier: "慣習的なミサイルの殴打"
 missile_strike_victim_modifier_desc: "従来のミサイルのストライキを狙った領土。 インフラの損傷や公共の不安が高まっています。"

 # ── EVENT 13: RETALIATION CHOICE ───────────

 nuclear_events.13.t: "核再帰 - 決定が必要"
 nuclear_events.13.d: "[SCOPE.sCountry('nuclear_attacker').GetName] は [ROOT.GetName] に対する核兵器を発売しました。 わたしたちの警戒は武装しています。 起動コードは準備が整います。\n\n[SCOPE.sCountry('nuclear_attacker').GetAdjective] 領域に対するレタリトリートストライキは、アセンシャルの25%を消費し、すべての [SCOPE.sCountry('nuclear_attacker').GetAdjective] 状態をストライキさせます。 ストライキは不敬を運ぶだろう — 世界は理解します。\n\n 代替は攻撃を吸収することです。 生存に不名誉はありません。"
 nuclear_events.13.f: "注文は一度だけ必要です。"
 nuclear_events.13.a: "Retaliate — [SCOPE.sCountry('nuclear_attacker').GetName] に対する arsenal の 25% を起動"
 nuclear_events.13.b: "スタンドダウン — ストライキを吸収し、アセンシャルを維持"

 nuclear_first_strike_response: "核再帰(第一ストライク応答)"
 nuclear_first_strike_response_desc: "[ROOT.GetName] は、その領土に未曾有の核攻撃に反応して核対抗者を発足しました。 国際的なコミュニティは、再帰の権利を認識する - 親愛なる利益は大幅に削減されます。"

 nuclear_absorbed_first_strike: "核殴打吸収"
 nuclear_absorbed_first_strike_desc: "[ROOT.GetName] は、再配布せずに原子力ストライキを保証しました。 拘束は国際的に認められています。 精巧な地位および威信はかなり高められます。"

 # ── EVENT 14: RETALIATION NOTIFICATION ─────

 nuclear_events.14.t: "核再帰化インバウンド"
 nuclear_events.14.d: "原子力ストライキは答えています。 [ROOT.GetName] は、リタリタリストを立ち上げました。警告は、inbound.\n\n で確認されています。 結果は、私たちの負担です。"
 nuclear_events.14.f: "それぞれのストライキが次のいずれかを招待します。"
 nuclear_events.14.a: "衝撃のための支柱"
