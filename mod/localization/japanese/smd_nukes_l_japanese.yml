 CONV_TARGET_GOVERNMENT_TOOLTIP: "政府管理棟を標的。 各ミサイルは、それらを破壊する3%のチャンスを持っています。"
 CONV_TARGET_RAILWAY_TOOLTIP: "ターゲット鉄道インフラ。 各ミサイルは、鉄道を破壊する3%のチャンスを持っています。"
