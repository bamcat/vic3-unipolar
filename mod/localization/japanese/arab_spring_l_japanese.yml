 arab_spring_reformists_in_govt_tt: "改革派の関心グループは政府にいます"
 arab_spring_universal_suffrage_tt: "ユニバーサル・サッフルが制定されました"
 arab_spring_census_voting_tt: "Censusの投票は制定されました"
 arab_spring_free_press_tt: "保護されたスピーチは民主的な統合をサポートしています"
 arab_spring_right_of_assembly_tt: "アセンブリの権利は転移を支えます"
 arab_spring_high_literacy_tt: "高リテラシーが民主的統合を加速"
 arab_spring_islamists_in_govt_tt: "イスラム教徒または国民主義のグループが政府の席を保持する"
 arab_spring_turmoil_tt: "新たな政府を解明する高いターモイル"
 arab_spring_authoritarian_laws_tt: "権威ある法律は依然として所定の場所にある"
 arab_spring_at_war_tt: "国は戦争にあります"
 arab_winter_radical_movements_tt: "イスラム教徒または民族主義の運動は強さを得ています"
 arab_winter_military_opposition_tt: "武装した力は反対であり、強力に成長しています"
 arab_winter_security_laws_tt: "抑圧セキュリティ法は、亀裂を加速する"
 arab_winter_civil_war_tt: "市民戦争は、反作用力に利益をもたらす混乱を生む"
 arab_winter_high_turmoil_tt: "高いターモイルは燃料カウンターの弾力性感情です"
 arab_winter_strong_liberal_movements_tt: "強い改良主義の動きはひび割れに抵抗しています"
 arab_winter_universal_suffrage_entrenched_tt: "普遍的なsuffrageはentrenched - 逆に困難です"
 arab_winter_elected_bureaucrats_tt: "選択された官僚的レジストカップリングの試み"
 arab_winter_prepared_defence_tt: "新しい政府は、防御的な立場を準備しました"

 # ==========================================
 # SPARK EVENTS
 # ==========================================

 2011_protests.1.t: "通りのベンダーは、自分自身の光を置きます"
 2011_protests.1.d: "シディ・ブズィッドの地方の町では、モハメド・ブズィジという名前の若いストリート・ベンダーは、警察が彼のカートを非難し、彼を公に屈辱めた後、地方政府の事務所の前で火をつけて置きました。\n\n 絶望の行為は落雷棒になりました。 数時間以内に、彼の抗議の映像はソーシャルメディアで普及しています。 Sidi Bouzid だけでなく、[ROOT.GetCountry.GetName] を越えたクラウドが集まりました。 相続、失業、および権威主義者の規則の粉砕重量の上に、世代の蓄積された流星は、そのシンボルを見つけました。\n\n [SCOPE.GetRootScope.GetCountry.GetRuler.GetLastName] の政権は、どのように反応するかを決定する必要があります。 どんなことでも、世界は見ている。"
 2011_protests.1.f: "一人の男の絶望は、国の人になりました。"
 2011_protests.1.a: "亀裂 - 彼らが広がる前に実証を分散させる"
 2011_protests.1.b: "損害賠償の申し出 — 警察への調査を発表"

 2011_protests.2.t: "チュニジアの振戦"
 2011_protests.2.d: "チュニジアのアンレストは、アラブの世界に衝撃波を送りました。 衛星チャンネルは、時計の周りのチュニスからシーンを放送しています — そして、通常の人々 [ROOT.GetCountry.GetName] 見ている. コーヒーショップやソーシャルメディアで困っている質問は、地域のすべての権威ある政権が今それ自体を尋ねているのと同じです:\n\n お問い合わせ"
 2011_protests.2.f: "あらゆる政権を見守っています。 あらゆる事態はメモをとっています。"
 2011_protests.2.a: "チュニジアは異なる — これは [ROOT.GetCountry.GetName] に普及しません"
 2011_protests.2.b: "注意を払ってください。これは手元から抜け出す前にセキュリティを強化します"

 # ==========================================
 # MISSING STRUCTURAL MODIFIERS
 # ==========================================

 modifier_arab_spring_transition_cabinet: "政府機関"
 modifier_arab_spring_transition_cabinet_desc: "新たな政府が革命のきっかけに形成されています。 レギュティマシーは、これらの初期に高まっていますが、反発が足を見つける前に連結する必要があります。"

 modifier_arab_spring_kick_out_of_insurrection: "バリケードから立ち下る"
 modifier_arab_spring_kick_out_of_insurrection_desc: "革命は、すぐにゴールを達成しました。 このグループは、その不法な姿勢を放棄し、正式な政治生活に入ることです。その瞬間の善意によって浮上しました。"

 modifier_arab_spring_regime_ig_defeated: "革命によって敗退"
 modifier_arab_spring_regime_ig_defeated_desc: "旧政権と同団体の関連付けは、それによって明らかに費用がかかります。 政府の力と政治の力から押し出されてきました。 証拠金から再建できるかどうかは見つかります。"

# ==========================================
 # ARAB SPRING INTERNATIONAL EVENTS
 # ==========================================

 # ── arab_spring_intl.1 ───────────────────

 arab_spring_intl.1.t: "アラブの世界は燃えている"
 arab_spring_intl.1.d: "試験は、チュニジアで始まり、アラブの世界を駆け抜けています。 権威主義的なルールのデカデス, 経済の停滞, 政治的抑圧は、通りに百万を駆動しました."
 arab_spring_intl.1.f: "歴史を見守る人を見守る歴史"
 arab_spring_intl.1.a: "抗議者 - 民主主義と人権はそれを要求する"
 arab_spring_intl.1.b: "負のレジムを戻す - 安定性と私たちの利益は最初に来ます"
 arab_spring_intl.1.c: "すべての側面に拘束のための電話 - 平和な解像度を促す"

 # ── arab_spring_intl.2 ───────────────────

 arab_spring_intl.2.t: "介入の質問"
 arab_spring_intl.2.d: "[scope:civil_war_country_scope.GetName] の状況は、開いた市民戦争に悪化しています。 [scope:civil_war_country_scope.GetRuler.GetName] の力は市民の人口を攻撃し、虐殺の信頼できるレポートがあります。 国際的なコミュニティは、以前は、protest の動きのサポートを表明した response.\n\n[ROOT.GetName] を呼び出します。 質問は、そのサポートが行動に及ぶかどうかです。"
 arab_spring_intl.2.f: "単語とデドは異なる通貨です。"
 arab_spring_intl.2.a: "ノフライゾーンを強化 — エアストライキから市民を守る"
 arab_spring_intl.2.b: "地面の腕および支持の反対の力"
 arab_spring_intl.2.c: "これは私たちの戦争ではありません。"

 # ── arab_spring_intl.3 ───────────────────

 arab_spring_intl.3.t: "アラビアの春: 驚くべき"
 arab_spring_intl.3.d_success: "アラブスプリングは、少なくとも1つの本物の民主的移行を生成しました。 脆弱な業績で、簡単に逆転するが、それは本物です。 [ROOT.GetName] では、これらのイベントが距離から展開されていないと見なすと、歴史のアークが正反対に曲がることができるように、静かな満足感があります。 今、質問は、勝つものをサポートする方法です。"
 arab_spring_intl.3.d_islamist: "アラブ春は終わりました。そして、その建築家は期待していません。 地域全体で、イスラム教徒の動きは、上昇を開始した世俗的な抗議の調合よりも優れた組織を実証しました。 [ROOT.GetName] の場合、結果は不快です: 主演の民主性は、その値が自分のものとは異なる政府を生成しました。 新しいアラビアの注文との関係は、注意深いナビゲーションが必要になります。"
 arab_spring_intl.3.d_failure: "春はアラブの春がやってきました。 反発すると思われるレジメスは、安定化し、セキュリティサービスを再構成し、敵全体または刑務所で対戦しています。 [ROOT.GetName] では、道徳的な明快さが道徳的な効果よりも容易であることをエピソードは思い出させる。 アップリッスを塗ったグリーバンスは解決されていない。 彼らはただ延期されました。"
 arab_spring_intl.3.f: "世界へ。 地域は忘れません。"
 arab_spring_intl.3.a: "何が起こったのかの株式を取る"

 # ==========================================
 # INTERNATIONAL MODIFIER NAMES
 # ==========================================

 arab_spring_intl_pro_democracy_stance: "プロデモクラシー・スタンス"
 arab_spring_intl_pro_democracy_stance_desc: "この国は、アラブスプリングの抗議運動で公に整列しています。 民主主義国家のその威信は上昇しています - しかし、親密なアラブのレジムとの関係は冷却されています。"

 arab_spring_intl_stability_first_stance: "安定性ファースト"
 arab_spring_intl_stability_first_stance_desc: "この国は、抗議運動を上回るアラビアのレジメスを支持するために選ばれました。 地域における戦略的関係はより強く、国際的な評判へのコストで。"

 arab_spring_intl_neutral_stance: "慎重な拘束"
 arab_spring_intl_neutral_stance_desc: "この国は、両側を裏返さずに平和な決断を求めています。 それは、その外交的柔軟性を維持しました。しかし、結果に対する犠牲的な影響。"

 arab_spring_intl_western_backing: "西洋裏面"
 arab_spring_intl_western_backing_desc: "西洋政府から公共支援を受けました。 国際的注目は、その勢いに加わって、政令のためにより高価な抑圧を作ることです。"

 arab_spring_intl_regime_backing: "西洋政権サポート"
 arab_spring_intl_regime_backing_desc: "西洋政府は、プロテスターではなく、この政府の背後にある体重を投げました。 外部の検証は、政権の権限と正当性を強化しています。"

 arab_spring_intl_no_fly_zone: "ノーフライゾーンへの挑戦"
 arab_spring_intl_no_fly_zone_desc: "軍事的資産は、競合ゾーンのノーフライゾーンを強化するために展開されています。 介入は民間人を保護していますが、それは高価であり、国際スルティニーを描画します。"

 arab_spring_intl_arming_rebels: "武装の反対の力"
 arab_spring_intl_arming_rebels_desc: "武器と装置は、競合の反対の力にチャネル化されています。 本方針は隠されていませんが、秘密ではありません。このサポートを受けている長期的な結果は不明です。"

 arab_spring_intl_intervention_costs: "介入コスト"
 arab_spring_intl_intervention_costs_desc: "海外の軍事介入は、資源を緊張し、国内の政治議論を生成しています。 宝と政治資本のコストは本物です。"

 arab_spring_intl_non_interventionist: "非発明者"
 arab_spring_intl_non_interventionist_desc: "この国は、アラブの市民戦争に介入しないように選ばれた。 決定は、その暴露を削減し、国内の政治資本を維持しましたが、批評家は、その記述された値を放棄しました。"
