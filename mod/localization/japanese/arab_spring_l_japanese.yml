 arab_spring_liberal_victory_trigger: "Reformist Victory 条件 Met"
 arab_spring_islamist_victory_trigger: "イスラム教徒/国家主義者の勝利条件メット"
 arab_spring_valid_country_trigger: "有効なアラブスプリングターゲット"
 tunisia_arab_spring_spark_trigger: "チュニジア:春のコンディションメット"

