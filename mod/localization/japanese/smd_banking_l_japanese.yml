 CB_POLICY_2_FULL: "#bold 契約 — フルリザーブ#!\n#tooltip_separator!\nリザーブの要件を堅くします。\n\n@green_checkmark! Loan 金利 #b-0.5%#!\n\n\n\n@green_checkmark! @green_checkmark!"
