 CB_POLICY_4_FRAC: "#bold 拡張 — 僅かな Reserve#!\n#tooltip_separator!\n 中央銀行は、融資を刺激するクレジット条件を緩和します。\n\n@green_checkmark! 銀行スループット #b-5%#!\n@green_checkmark! 金融地区スループット #b+5%#!"
 CB_POLICY_5_FRAC: "#bold ほとんどの拡張 — フラクショナル・リザーブ#!\n#tooltip_separator!\n中央銀行は積極的に金融セクターを刺激します。\n\n@green_checkmark! 銀行のスループット #b-25%#!\n\n\n@green_checkmark! <x 25% <x 25% @green_checkmark!<x 25% <x "><x 25% @green_checkmark! <x 25% @green_checkmark!"

