 # Fractional Reserve variants
 CB_POLICY_1_FRAC: "#bold ほとんどの契約 — 僅かな予約#!\n#tooltip_separator!\n中央銀行は信用条件をかなりきつく締めます。\n\n@red_cross! 銀行のスループット #b+10%#!\n\n\n\n@red_cross!"
