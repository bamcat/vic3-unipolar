 great_polarization.1.t:0 "極性偏光"
 great_polarization.1.d:0 "米国は、メディアの断片化、文化戦争の政治、および異質圏間の相互の恐怖によって運転される政治的偏光の新しい時代に入ります。"
 great_polarization.1.f:0 "それぞれの選挙は存在します。 あらゆるスキャンダルが証明されます。 すべての悲劇が武器になります。"
 great_polarization.1.a:0 "中心は割れ始めます。"
 great_polarization.30.t:0 "ジョージ・フロイドの殺害"
 great_polarization.30.d:0 "警察によるジョージ・フロイドの殺害は、説明責任、政治的な正義の要求と全国の抗議波を引き起こしました。"
 great_polarization.30.f:0 "ビデオはローカルに滞在しません。 国民の指示になります。"
 great_polarization.30.a:0 "通りの噴火。"
 great_polarization.30.b:0 "深刻な変革を約束します。"
 great_polarization.31.t:0 "チャップ/チャズ"
 great_polarization.31.d:0 "シアトルに占有されたプロテクションゾーンが形成され、反ポリス活動主義と状態の回復の恐れの国民の象徴となっています。"
 great_polarization.31.f:0 "コミュニティ・セルフ・ルレです。 相手に、ミニチュアで倒れます。"
 great_polarization.31.a:0 "スタンドオフをプレイしましょう。"
 great_polarization.31.b:0 "ゾーンをクリアします。"
 great_polarization.32.t:0 "バトラーの暗殺を試みる"
 great_polarization.32.d:0 "ペンシルバニア州ブトラのラリーでドナルド・トランプの思いやりを試みたペンシルバニア州は政治的暴力と復讐の恐怖を脅かしています。"
 great_polarization.32.f:0 "画像は事実よりも速く移動します。"
 great_polarization.32.a:0 "怒りの正しい性格。"
 great_polarization.32.b:0 "国民の落ち着きのためのアピール。"
 great_polarization.33.t:0 "キングスなし"
 great_polarization.33.d:0 "スローガン「ノーキングス」の下の質量デモンストレーションは、全国のストリートを埋め、サポーターが民主主義の防衛と対戦相手によってデ安定化抵抗として組み込まれています。"
 great_polarization.33.f:0 "それが違いを忘れてしまったことを恐れている共和国でmonarchyに対する群衆のチャント。"
 great_polarization.33.a:0 "動きは広がります。"
 great_polarization.33.b:0 "対向を防衛する。"
 great_polarization.34.t:0 "ミネソタ州ローメーカーがターゲット"
 great_polarization.34.d:0 "ミネソタ州の法律事務所を対象とするシューティングは、政治争議が組織的な暴力に立ち向かう国民の恐れを深めています。"
 great_polarization.34.f:0 "ドアステップはフロントラインになります。"
 great_polarization.34.a:0 "セキュリティは政治になります。"
 great_polarization.34.b:0 "スペクトルを横断して政治的暴力を非難する。"
 great_polarization.35.t:0 "チャーリー・カーク・アサイン"
 great_polarization.35.d:0 "パブリックイベントで話しながら、チャーリー・カークの暗唱は、アメリカのエスケープ政治危機のフラッシュポイントとなっています。"
 great_polarization.35.f:0 "マイクがサイレントに落ち、動きが大きくなる。"
 great_polarization.35.a:0 "正しいラジカル。"
 great_polarization.35.b:0 "殺害を非難し、温度を下げます。"
 great_polarization.36.t:0 "アイスシューティング"
 great_polarization.36.d:0 "連邦移民エージェント関与の致命的な射撃は、反ICE の抗議をトリガーしました。, 国家の不足, 連邦電力上の激しい引数."
 great_polarization.36.f:0 "バッジは引数になります。"
 great_polarization.36.a:0 "抗議が広がる。"
 great_polarization.36.b:0 "業務の中断と調査"
