 great_polarization.130.t:0 "鉛ブルーアメリカ?"
 great_polarization.130.d:0 "米国では、政権の自由または中心左の文字がブルーアメリカに最も近いところにある。 あなたは、ブルーアメリカとして戦争を続けるか、アメリカ合衆国の残骸に残っている可能性があります。"
 great_polarization.130.f:0 "政府は継続を主張することができますが、まだ従う機関に電力が従います。"
 great_polarization.130.a:0 "ブルーアメリカへの切り替え"
 great_polarization.130.b:0 "米国に在住。"

 great_polarization.131.t:0 "リードレッドアメリカ?"
 great_polarization.131.d:0 "米国では、連邦政府の右翼の文字がRed Americaに最も近いところにある。 戦争を継続する可能性があります。 レッド・アメリカ またはアメリカ合衆国の居住者と残っている。"
 great_polarization.131.f:0 "フラグは同じ形状ですが、変更した国は同じです。"
 great_polarization.131.a:0 "レッドアメリカへの切り替え"
 great_polarization.131.b:0 "米国に在住。"

 great_polarization_switch_blue_tt:0 "#bold Blue America#! に国を切り替えます。"
 great_polarization_switch_red_tt:0 "国を #bold Red America#! に切り替えます。"
 great_polarization_stay_usa_tt:0 "米国のままにします。"

 great_polarization_complete_header:0 "危機が悪用される場合、または米国が市民戦争に崩壊した場合、大きな偏光は終わります。"
 
 great_polarization.38.t:0 "U.S キャピトル 包囲された"
 great_polarization.38.d:0 "群衆は、苦しく競争された選挙の後、米国のカピトールを歪め、国を衝撃し、政治的な紛争が憲法上の拘束によって破壊される恐れを深めています。"
 great_polarization.38.f:0 "ルーンダはシンボルの戦場になります。"
 great_polarization.38.a:0 "パブリック・トレンブルズ"
 great_polarization.38.b:0 "攻撃を非難し、信頼を再構築する。"
 
 ## other western countries
 
 je_rise_of_the_right:0 "右側の上昇"
 je_rise_of_the_right_reason:0 "ウェスト全体で、右翼のポピュリストの動きは、メディアの断片、移行のバックラッシュ、文化戦争の政治、および抗establishmentの回復を通して強さを得ています。 2035年までに、右翼の動きは強く、右翼のポピュリストのリーダーは出現する可能性が高い。"

 rise_of_the_right_status_baseline:0 "右翼の動きは強さを得ています。"
 rise_of_the_right_status_strong:0 "右翼のポピリストサージは、国家の政治を再構築しています。"
 rise_of_the_right_completion_header:0 "2035年以降は、この波のサブサイド。"
 rise_of_the_right_ends_2035_tt:0 "#bold 1月 1, 2035#! の後の右端の上昇。"
 rise_of_the_right_spawnrate_tt:0 "右翼のポピュリストのリーダーのスプーン率が増加しました。 正確なスプーン重量は、イドロジー/キャラクタースプーンファイルで手動で処理されます。"

 rise_of_the_right.1.t:0 "右側の上昇"
 rise_of_the_right.1.d:0 "右翼のポピリスト電流が全国の政治に入りました。 機関の不信、エリツ、文化的バックラッシュ、および断片メディア環境での怒りから強さを引き出します。"
 rise_of_the_right.1.f:0 "古き良きパーティーはオフィスを構えています。 新たな政治は、クラウドの保持方法を学習しています。"
 rise_of_the_right.1.a:0 "政治センターはもはや安全ではありません。"

 rise_of_the_right.10.t:0 "アルゴリスミック・アナガー"
 rise_of_the_right.10.d:0 "オンライン政治ネットワークは、反establishmentの不足を増幅し、右の翼のポピリストの動きを伝統的なパーティーの外部を整理する新しい方法を与えます。"
 rise_of_the_right.10.f:0 "フィードはラリーになります。 グリーヴァンスはプラットフォームとなります。"
 rise_of_the_right.10.a:0 "時代は広がります。"
 rise_of_the_right.10.b:0 "市民の機関を経由して戻ってプッシュ."

 rise_of_the_right.11.t:0 "移行バックラッシュ"
 rise_of_the_right.11.d:0 "移民、統合、国家のアイデンティティに対する怒りの衝動は、正しい動きを強化しました。"
 rise_of_the_right.11.f:0 "境界は、古い秩序が答えられないすべての恐怖のシンボルになります。"
 rise_of_the_right.11.a:0 "バックラッシュは成長します。"
 rise_of_the_right.11.b:0 "議論をデエスカレート."

 rise_of_the_right.12.t:0 "ポピュラーズブレイクスルー"
 rise_of_the_right.12.d:0 "右翼のポピリストファクションは、その言語とアジェンダに応答するために主流のパーティーを強制し、古いパーティーシステムを介して壊れています。"
 rise_of_the_right.12.f:0 "お部屋の外に一度はありました。 そもそもそもそもそも部屋が建てられています。"
 rise_of_the_right.12.a:0 "正しいサージ。"
 rise_of_the_right.12.b:0 "センターを再構築します。"

 rise_of_the_right.13.t:0 "ストリート政治"
 rise_of_the_right.13.d:0 "宣言、対称の儀式、およびウイルスの対立は、政治が議会や通りに出て移動してきた感覚を深化しました。"
 rise_of_the_right.13.f:0 "チャントは、その幼い形のポリシーです。"
 rise_of_the_right.13.a:0 "通りは根本化します。"
 rise_of_the_right.13.b:0 "温度を冷却して下さい。"

 rise_of_the_right_baseline:0 "右側の上昇"
 rise_of_the_right_baseline_desc:0 "右翼の動きは、全国の政治の強みを身につけています。"

 rise_of_the_right_populist_surge:0 "右翼ポピュリストサージ"
 rise_of_the_right_populist_surge_desc:0 "右翼のポピュリストは政治的な風景を再構築しています。"

 rise_of_the_right_migration_backlash:0 "移行バックラッシュ"
 rise_of_the_right_migration_backlash_desc:0 "移民と国家のアイデンティティは、政治動員の中央のドライバーになりました."

 rise_of_the_right_online_radicalization:0 "アルゴリスミック・アナガー"
 rise_of_the_right_online_radicalization_desc:0 "オンライン外傷は、右翼の政治動員を加速しています。"

 rise_of_the_right_establishment_response:0 "営業体制"
 rise_of_the_right_establishment_response_desc:0 "主流機関は、ポップアップサージを吸収または無効化しようとしています。"

 rise_of_the_right_populist_leader_spawn_tooltip_modifier:0 "右翼ポピリストオープニング"
 rise_of_the_right_populist_leader_spawn_tooltip_modifier_desc:0 "右翼のポピュリストのリーダーのスプーン率が増加しました。 実際のイデオロギーは、手動で処理されます。"
 
