 je_second_american_civil_war_reason:0 "米国は新しい市民戦争に入った。 このジャーナルエントリは、次のデザインパスの足場です, 地域のアメリカのブレイクアウト途上国が作成され、互いに戦うために作られます."
 second_american_civil_war_status:0 "ユニオンは、防腐剤です。"
 second_american_civil_war_placeholder_tt:0 "プレースホルダ:次の実装パスでブレイクアウトしたアメリカの国、軍隊、戦争を作成します。"

 great_polarization.1.t:0 "極性偏光"
 great_polarization.1.d:0 "米国は、メディアの断片化、文化戦争の政治、および異質圏間の相互の恐怖によって運転される政治的偏光の新しい時代に入ります。"
 great_polarization.1.f:0 "それぞれの選挙は存在します。 あらゆるスキャンダルが証明されます。 すべての悲劇が武器になります。"
 great_polarization.1.a:0 "中心は割れ始めます。"

 great_polarization.2.t:0 "ポリチカルモチベーションマス撮影"
 great_polarization.2.d:0 "政治の錬術に縛られた大量撮影は、国をショックしました。 競争の事実はすぐに非難、保証、市民の自由、およびideologyに論じます。"
 great_polarization.2.f:0 "死者が喪失する。 葬儀が始まる前に、物語が求められます。"
 great_polarization.2.a:0 "アウトレイジは分割をフィードします。"
 great_polarization.2.b:0 "深刻なバイパルトマンの反応を見てください。"

 great_polarization.3.t:0 "アッセンシングを試みる"
 great_polarization.3.d:0 "政治的な人物の暗示が政治的暴力が正常化される恐れを提起しました。"
 great_polarization.3.f:0 "ショットは、そのターゲットを逃したが、共和国を襲った。"
 great_polarization.3.a:0 "国のリコイル。"
 great_polarization.3.b:0 "保護セキュリティの拡大"

 great_polarization.4.t:0 "Algorithmic Outrage(アルゴリズム)"
 great_polarization.4.d:0 "ソーシャルメディアプラットフォームは、政治的な攻撃を増幅し、何百万を根本的なコンテンツ、陰謀ネットワーク、およびアイデンティティ主導の対向動を発揮しています。"
 great_polarization.4.f:0 "飼料は説得しません。 エスカレーター。"
 great_polarization.4.a:0 "残留機械が加速します。"
 great_polarization.4.b:0 "圧力プラットフォームを適度に。"

 great_polarization.5.t:0 "万博の波"
 great_polarization.5.d:0 "強力な数字に対する公序良俗の波は、虐待、性別、および機関的な偽りに対する国民の反論を引き起こしました。"
 great_polarization.5.f:0 "ウィスパードが検索できるようになりました。"
 great_polarization.5.a:0 "リコーニングは広がります。"
 great_polarization.5.b:0 "説明責任のための機関チャネルを構築します。"

 great_polarization.6.t:0 "対象となる少数民族"
 great_polarization.6.d:0 "少数民族のコミュニティに対する敵意のサージは、抗議、対抗議、そして危機主義、アイデンティティ、および国の持ち物に対する更新された議論をトリガーしました。"
 great_polarization.6.f:0 "いくつかはバックラッシュです。 他の人にとって、それは生存です。"
 great_polarization.6.a:0 "道路は再び埋めます。"
 great_polarization.6.b:0 "バックラッシュを非難し、温度を下げます。"

 great_polarization.20.t:0 "温度の滝"
 great_polarization.20.d:0 "偏光は消えていませんが、最も危険なスパイラルが中断されています。 政治機関は、いくつかの合法性を取り戻しました."
 great_polarization.20.f:0 "市民が同意するので、市民が生き残っているが、それらが十分に失うを受け入れるため。"
 great_polarization.20.a:0 "ユニオンの耐えます。"

 great_polarization.21.t:0 "ダイド・エントレンケ"
 great_polarization.21.d:0 "即時危機は市民戦争に爆発していませんが、偏光はアメリカの政治生活に埋め込まれています。"
 great_polarization.21.f:0 "発熱は壊れませんでした。 慢性になりました。"
 great_polarization.21.a:0 "新しいノーマル。"

 great_polarization.100.t:0 "第二アメリカの市民戦争"
 great_polarization.100.d:0 "革命的な危機は米国を破壊しました。 連邦当局は競争し、武装事実は、国をライバル政府に追いつくために始まります。"
 great_polarization.100.f:0 "組合が生き残る可能性があるかどうかを尋ねた最初の市民戦争。 2 番目はユニオンが何であるかを尋ねます。"
 great_polarization.100.a:0 "ユニオンのひび。"

 great_polarization_baseline:0 "極性偏光"
 great_polarization_baseline_desc:0 "政治的な雰囲気はますます激化し、反応する。"

 great_polarization_right_wing_president:0 "右翼の在留資格"
 great_polarization_right_wing_president_desc:0 "右翼の社長は、精力化されたリベラル、社会主義者、コミュニスト、そして少数民族の権益運動を持っています。"

 great_polarization_left_wing_president:0 "左翼の残留"
 great_polarization_left_wing_president_desc:0 "左翼の社長は、精力的な保守的、自由主義者、伝統主義者、名声主義者、宗教的悪性反対運動を持っています。"

 great_polarization_divided_media:0 "拡張偏光"
 great_polarization_divided_media_desc:0 "メディア環境は、政治的なキャンプを互いに隔離し続けます。"

 great_polarization_attempted_assassination:0 "アッセンシングを試みる"
 great_polarization_attempted_assassination_desc:0 "政治の暴力は、公共の信頼を揺さげています。"

 great_polarization_mass_shooting_aftermath:0 "ポリチカルモチベーションマス撮影"
 great_polarization_mass_shooting_aftermath_desc:0 "政治的なモチベーションのマスカレーは社会的な葛藤を深くしました。"

 great_polarization_reform_concessions:0 "フォームの必要"
 great_polarization_reform_concessions_desc:0 "重大な改革反応は政治的緊張を下げました。"

 great_polarization_security_crackdown:0 "セキュリティクラックダウン"
 great_polarization_security_crackdown_desc:0 "拡張されたセキュリティ対策は、バックラッシュを危険にしながら、状態の圧力が増加しました。"

 great_polarization_online_radicalization:0 "オンラインラジカル化"
 great_polarization_online_radicalization_desc:0 "社会的プラットフォームは、政治的動員と不足を加速しています。"

 great_polarization_minorities_targeted:0 "対象となる少数民族"
 great_polarization_minorities_targeted_desc:0 "少数民族のコミュニティは、高い敵性を高め、応答を整理しています。"

 great_polarization_metoo_mobilization:0 "パブリックレッカー"
 great_polarization_metoo_mobilization_desc:0 "公共の露出の波は動員された口径および根本的な動きを備えています。"

 second_american_civil_war_outbreak:0 "第二アメリカの市民戦争"
 second_american_civil_war_outbreak_desc:0 "米国は革命的な紛争に陥りました。"
 
