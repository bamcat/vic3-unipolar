 # transit rights
 
 je_transit_rights: "ランドロック!"
 je_transit_rights_reason: "[ROOT.GetCountry.GetName] は海岸線がありません。 国際市場へのアクセスは、近隣諸国の善意に完全に依存します。 取引と戦略的な柔軟性のために、少なくとも1つとトランジットの権利協定を守ることは不可欠です。"
 secure_transit_rights_treaty:0 "任意の近隣の非上陸国とトランジットの権利条約に署名します。"
 # ==========================================
 # JOURNAL ENTRY
 # ==========================================
 
 je_covid_pandemic: "COVID-19 パンデミック"
 je_covid_pandemic_reason: "[ROOT.GetCountry.GetName] に新たに登場し、世界中に急速に広がっています。 COVID-19は、生活メモリの任意の病原体よりも速く広がります, 一緒に近代的な世界を結ぶ貿易と旅行の密なネットワークを活用. 死亡率は高齢者と免疫成分に集中していますが、そのせん断は接触するすべての国の圧倒的な健康システムに脅迫します。\n\nポリシーを設定するには、#bold COVID-19 Response#!の決定を使用します。 ロックダウンはスプレッドを遅くしますが、経済を槌で打ちます。 マスクや散乱は効果が低いが、より持続可能である。 何もしないのは、あまりにも選択です - electorateと死者は思い出します。"
 
 # ==========================================
 # covid.1 — PANDEMIC ARRIVES
 # ==========================================
 
 covid.1.t: "新型コロナウイルス"
 covid.1.d: "[SCOPE.sState('plague_origin_state').GetName]、[ROOT.GetCountry.GetName] で異常な肺症例のクラスターが報告されています。 [ROOT.GetCountry.GetAdjective] 保健当局による予備分析は、以前に未知のコロナウイルスを示唆しています。これは、孵化期の期間で、彼らは病気であることを知っている前に、キャリアが伝染していることが十分にあります。\n\n世界保健機関は通知されています。 ローカルのアウトブレイクが残っているか、または次の週に行われた決定により、何かが起こるか。"
 covid.1.f: "新しい病原体。 お問い合わせ"
 covid.1.a: "WHOを通知し、連絡先のトレースを開始"
 
 # ==========================================
 # covid.2 — SPREAD
 # ==========================================
 
 covid.2.t: "COVID-19 キャッシュ [ROOT.GetCountry.GetName]"
 covid.2.d: "[SCOPE.sCountry('plague_originator_country').GetName] で最初に識別された新型コロナウイルスの症例は [ROOT.GetCountry.GetName] で確認されています。 ウイルスは、旅行者、取引ルート、または単に接続された世界の目に見えない流れを介して到着しました。\n\n[ROOT.GetCountry.GetAdjective]医療当局は、パンデミック応答プロトコルを活性化しています。 #bold COVID-19 Response#! ポリシーを設定する決定を使用してください。"
 covid.2.f: "時間が経ちました。"
 covid.2.a: "パンデミックプロトコルの有効化"
 
 # ==========================================
 # covid.3 — SUBSEQUENT WAVES
 # ==========================================
 
 covid.3.t: "オミクロンバリアント"
 covid.3.d: "COVID-19感染の新鮮な波を引き起こした新しい変形。 保健機関は、封入プロトコルを再評価しています。"
 covid.3.f: "ウイルスは、まだ私たちと一緒にいます。"
 
 # ==========================================
 # covid.4 — NOTIFICATION TO OTHER PLAYERS
 # ==========================================
 
 covid.4.t: "ウーハン、中国からの新ウイルス"
 covid.4.a: "状況を密接に監視"
 
 # ==========================================
 # covid.5 — RESPONSE CHOICE
 # ==========================================
 
 covid.5.t: "COVID-19対応方針"
 covid.5.d: "[ROOT.GetCountry.GetName] はパンデミックにどのように反応するか? 選択は、次の年の経済と社会的な風景を定義します。"
 covid.5.f: "オプションはありません。 トレードオフのみ。"
 covid.5.a: "完全なロックダウン — 企業を閉じ、動きを制限する"
 covid.5.b: "マスクの日付と社会的分散ガイドライン"
 covid.5.c: "経済を開放し、回復を優先します"
 
 # ==========================================
 # covid.7 — WAR SUPPORT
 # ==========================================
 
 covid.7.t: "パンデミックは戦争の努力を損なう"
 covid.7.d: "COVID-19 は [ROOT.GetCountry.GetName] の人口を重ね、 [SCOPE.gsInterestGroup('pacifist_ig').GetName] — は [SCOPE.sCharacter('pacifist_leader').GetFullName] によって導かれ、パンデミックと戦う国が同時に戦争を持続できるかどうかを疑問に思います。 人口は排出されます。 フィールド病院は、リソースのフロントラインの物流と競合しています。"
 covid.7.f: "ウイルスを戦うか、敵と戦う。 どちらも難しい。"
 covid.7.a: "戦争は続いています。ウイルスは変化しません"
 covid.7.b: "道徳を維持するために公衆衛生のメッセージングを使用する"
 covid.7.c: "敗北者物語を抑制"
 
 # ==========================================
 # covid.8 — POVERTY AND EVICTIONS
 # ==========================================
 
 covid.8.t: "パンデミックの経済料金"
 covid.8.d: "パンデミックは、数千の [ROOT.GetCountry.GetAdjective] の労働者の仕事を費やし、 [SCOPE.sState('plague_poverty_state').GetName] では、失業率は20%を超えています。 宿泊料金の支払いはできません。 [SCOPE.gsInterestGroup('landowner_ig').GetName] で返された家主は、必然的な権利をプッシュしています。 ウイルスに感染した領域では、貧困が集中しています。"
 covid.8.f: "パンデミック内のパンデミック。"
 covid.8.a: "賃貸料の凍結と脱退モレチウムを課す"
 covid.8.b: "社会的セキュリティと失業のメリットを拡大"
 covid.8.c: "市場はそれを整理します"
 
 # ==========================================
 # covid.9 — ANTI-MASK RESISTANCE
 # ==========================================
 
 covid.9.t: "アンチロックダウンプロテスト"
 covid.9.d: "[SCOPE.gsInterestGroup('anti_mask_ig').GetName] は [SCOPE.sCharacter('anti_mask_ig_leader').GetFullName] によって導かれる、[ROOT.GetCountry.GetName] のパンデミックの制限に対する大量プロテスを組織しました。 自分の立場:ロックダウンとマスクの義務は政府の過度であり、経済的被害は健康上のリスクよりも大きい、そして市民は自分の選択肢を作る権利を持っています。\n\n プロテスは成長しています。 [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName] の応答が優先されます。"
 covid.9.f: "マスク。 選んだ丘。"
 covid.9.a: "保有会社 — 制限滞在"
 covid.9.b: "スタンドダウン — 制限を解除"
 covid.9.c: "委員会の科学的再生と公衆衛生キャンペーン"
 
 # ==========================================
 # DECISION
 # ==========================================
 
 covid_response: "COVID-19 応答"
 covid_response_desc: "[ROOT.GetCountry.GetName] のポリシーを設定し、COVID-19 パンデミックを管理します。 状況が変化するにつれて、この決定は6ヶ月ごとに方針を調整することができます。"
 
