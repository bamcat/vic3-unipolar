l_japanese:

 # ==========================================
 # THE DOLLAR 
 # ==========================================

 je_the_dollar:0 "ドル"
 je_the_dollar_reason:0 "アメリカドルは、世界標準通貨です。 [ROOT.GetCountry.GetName] は他の国よりも多くのクレジットをエクスポートします。そうすることで、卓越した財務力の位置を保持します。\n\n 他の国の財政地区は、その運営を維持するためにクレジットを必要とするとき、彼らはそれを供給するために、[ROOT.GetCountry.GetAdjective]銀行を見ます。 ドルが流れている限り、それらの国の資本主義者は、ビルド、投資、利益を得ることができます。 [ROOT.GetCountry.GetName] は、そのフローを制限することを選択します。 — sanctions や embargo 、または deliberate の収縮により、外国の金融市場に対する結果は即時かつ厳重になります。\n\n@information! クレジットのエクスポートは単なる取引ではありません。 [ROOT.GetCountry.GetAdjective] の金融インフラに依存し、来ている国における金融社会の運動です。 金融地区はクレジットが必要です。 クレジットの価格は、有価証券の価格よりも上昇すると、投資家はお金を失います。 クレジットが完全に流れ落ちるのを止めた場合、彼らの銀行は十分な国内産物を生産するためにスクランブルしなければなりません - 彼らは持っていない時間を取るプロセス。"

 je_dollar_status_hegemonic_tt:0 "#bold ドルは hegemonic.#! [ROOT.GetCountry.GetName] は #v 20,000#! 単位以上のクレジットをエクスポートしています。 外部金融市場は、[ROOT.GetCountry.GetAdjective] 銀行インフラと深く統合されています。 この利点の活用は実質的です。"
 je_dollar_status_stronger_tt:0 "#bold ドルは強力です。#! [ROOT.GetCountry.GetName] は #v 10,000#! 単位のクレジットを輸出しています。 外部金融市場は、[ROOT.GetCountry.GetAdjective] 銀行インフラと深く統合されています。 この利点の活用は実質的です。"
 je_dollar_status_strong_tt:0 "#bold ドルは影響力があります。#! [ROOT.GetCountry.GetName] は #v 5,000#! 単位のクレジットを輸出しています。 外部金融市場は、[ROOT.GetCountry.GetAdjective] 銀行インフラと深く統合されています。 この利点の活用は実質的です。"
 je_dollar_status_moderate_tt:0 "#bold ドルは十分に確立されます。#! [ROOT.GetCountry.GetName] は #v 2,500#! 単位のクレジットを輸出しています。 [ROOT.GetCountry.GetAdjective] のクレジットに対する外部依存は現実的かつ成長しています。"
 je_dollar_status_marginal_tt:0 "#bold ドルが新しくなりました。#! [ROOT.GetCountry.GetName] は国際的にクレジットをエクスポートしています。 リザーブ通貨としてのドルの役割は初期段階にありますが、基礎は敷設されています。"

 # ==========================================
 # THE RESERVE CURRENCY
 # ==========================================

 je_reserve_currency:0 "予約通貨"
 je_reserve_currency_reason:0 "[ROOT.GetCountry.GetName] は、国際的にクレジットをエクスポートします。[ROOT.GetCountry.GetAdjective] 銀行セクターは、グローバル金融システムにおいて重要なプレーヤーとなります。\n\n 他の国の財政地区は、その運営を維持するためにクレジットを必要とする場合、彼らは[ROOT.GetCountry.GetAdjective]銀行から引く。 これにより、[ROOT.GetCountry.GetName] からクレジットをインポートする国は、財務セクターの健康のためのそのクレジットの継続的な流れに依存します。\n\n@information! 輸入国の金融地区は、効率的な運用を行うためのクレジットが必要です。 クレジットの価格は、有価証券の価格は上昇すると、投資家は建設と開発にお金を失う。 突然のクレジットの契約 — sanctions や embargo を通じて、これらの国が国内でクレジットを生成し、より遅く、より高価なプロセスを強制します。"

 je_reserve_status_strong_tt:0 "#bold [ROOT.GetCountry.GetAdjective] クレジットは広く取引されます。#! エクスポートは #v 5,000#! 単位を超えた。 外国の金融市場は、[ROOT.GetCountry.GetAdjective] 銀行供給に著しい信頼性を開発しています。"
 je_reserve_status_moderate_tt:0 "#bold [ROOT.GetCountry.GetAdjective] クレジットは国際的に有効です。#! エクスポートは #v 2,500#! 単位を超えた。 外国の財政活動の意義のある部分は、[ROOT.GetCountry.GetAdjective]の供給に依存します。"
 je_reserve_status_marginal_tt:0 "#bold [ROOT.GetCountry.GetAdjective] クレジットは国際市場に入ります。#! エクスポートは #v 1,000#! 単位を超えた。 役割は控えめで成長しています。"

 # ==========================================
 # THE FINANCIAL SYSTEM — je_financial_system
 # ==========================================

 je_financial_system:0 "金融システム"
 je_financial_system_reason:0 "このジャーナルのエントリーは完全にオプションです。クレジットや証券システムにゲームを再生する必要はありません。 理解したい人のための参考としてここにあります。\n\n#bold システムがどのように機能するか#!\n\n商用銀行は#boldクレジット#!を生成します。 ファイナンシャル・ディストリクトは、パブリックトレード・プロダクション・メソッドでクレジットを購入し、#bold証券#!を販売します。 証券は、新しい建設に投資する際、投資家に余分な利益を与えます。しかし、有価証券の価格は、クレジットの価格よりも高くなります。 これは、市場が求める自然な平衡があることを意味します:\n\n• #bold クレジットが安い場合#! 有価証券、金融地区の利益および投資家がより積極的に構築します。 建設は経済全体で加速します。\n\n• #bold の有価証券が安い場合#! クレジットに相対的に、財政的な地区は利益的に転換するクレジットを購入するお金を失う。 銀行は、その製品がより価値のあるものを見つけます。 構造は遅くなります。\n\n@information! 信用と有価証券間の価格の関係は、したがって、見るべき重要な信号です。 健全なスプレッド — クレジット上の有価証券 — あなたの金融セクターは意図どおりの機能であり、あなたの資本主義者は建設投資のリターンを受け取ります。\n\n@warning! クレジットが有価証券を上回る場合は、その処理単位の損失で金融地区が運用されます。 銀行は収益性が高くなりますが、投資家は活動が遅くなり、経済はよりダイナミックに成長します。\n\n#bold 中央銀行#!\n\n #bold 中央銀行#! 機関を使用して、直接有価証券の生産に影響を与えることができます。 中央銀行に投資すると、市場での有価証券の供給が増加し、その価格をクレジットに引き下げます。 これにより、#bold は商業銀行#! をアンダーカットし、そのクレジットが生成できる利益が低いが、#bold は、お客様の資本主義者にとって有利なクレジット証券化を保ち、産業投資を #! 拡大します。\n これは、非審議トレードオフです:中央銀行投資は、銀行の収益性を犠牲にして、産業成長を支持します。 トレードオフが経済戦略に依存する価値があるかどうか。"

 je_financial_credit_expensive_tt:0 "#bold クレジットは、ベース価格の上の取引です。#! 商業銀行は収益性があります。 金融地区は、クレジットのプレミアムを支払っています。これは、証券生産の利益を絞っています。 スプレッドが不利な場合、投資家は建設活動を遅くする可能性があります。"
 je_financial_securities_expensive_tt:0 "#bold 証券は、ベース価格の上の取引です。#! 金融地区は収益性が高いため、クレジットを証券化して健全なマージンで証券化しています。 投資家は、建設に良いリターンを受けています。 銀行は彼らのプロダクトが供給する商品の下で価格がであるので控えめな圧力に直面します。"
 je_financial_balanced_tt:0 "クレジットと証券は、そのベース価格に近い取引です。 金融システムは平衡にあります。銀行は利益率が高く、投資家は適度なリターンを受け取ります。"

 ### Great Recession

 je_subprime_mortgage_crisis:0 "サブプライム モーゲージ 危機"
 je_subprime_mortgage_crisis_reason:0 "[ROOT.GetCountry.GetAdjective] 金融機関は、グローバル金融システムで販売されている機器にサブプライム・ホーム・ローンを束ねる、スケールで抵当金を発行し、パッケージ化しています。 証券は安全と評価されます。 安全ではありません。 基礎的な抵触がデフォルトに始まるとき、これらの機器を保持するすべての機関は、バランスシートが価値のある紙の上に構築されていることを同時に発見します。\n\n@warning! 危機が成熟する前に有価証券の価格が著しく修正されていない場合、[ROOT.GetCountry.GetAdjective] 銀行システムが凍結し、[ROOT.GetCountry.GetName] に相当する関係を持つすべての経済によって衝撃が感じられます。"

 je_great_recession:0 "偉大な成功"
 je_great_recession_reason:0 "米国金融システムが崩壊しました。 世界各地の銀行が保有する「Mortgage-backed Securities」は、ほぼ無事に明らかにされています。 クレジット市場は凍結しています。 銀行はそれぞれに貸与しません。 投資は乾燥しました。 構造は遅くなっています。 recession はグローバルです。\n\n 市場は正しいです。 常にやる。 問題は、その前にどれだけのダメージが行われるかです。"

 # Status descriptions
 subprime_je_danger_tt:0 "有価証券の価格は十分に落ちません。 [ROOT.GetCountry.GetAdjective] mortgage-backed の有価証券は依然として過大評価されます — 市場はまだリスクに値していません。 長いこの迫害者、より壊滅的な事件修正。"
 subprime_je_safe_tt:0 "#bold 有価証券は、ベース価格の35%以上下落しています。#! 市場は正しいです。 これが保持されている場合は、クラッシュが反転するか、または少なくとも軟化する可能性があります。"

 great_recession_je_usa_tt:0 "[ROOT.GetCountry.GetAdjective] 銀行システムは危機に瀕しています。 クレジットカードは、銀行のスループットを鋭く削減し、投資や建設を凍結します。 市場が修正されるまで、約10か月の収益が持続します。"
 great_recession_je_global_tt:0 "[ROOT.GetCountry.GetName] の [SCOPE.sCountry('c:USA').GetName] との実質的な取引関係は、金融ショックを送信します。 [ROOT.GetCountry.GetAdjective] 銀行は [SCOPE.sCountry('c:USA').GetAdjective] 金融商品にさらされています。 クレジットがきつく、投資が遅くなり、引退が来た。"

 # ==========================================
 # MODIFIERS
 # ==========================================

 great_recession_credit_crunch:0 "クレジット クランチ"
 great_recession_credit_crunch_desc:0 "銀行制度は押下しました。 銀行は、企業に対して、誰にでも、貸与拒否されます。 クレジットが蒸発しました。 投資が崩壊しました。 構造は遅くなっています。 経済は、信用が金融システムに戻るまで回復しません。"
