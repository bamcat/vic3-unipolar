l_japanese:

  # Landowners IG Traits
 ig_trait_noblesse_oblige:0 "ノブレス義務"
 ig_trait_noblesse_oblige_desc:0 "私たちは、共通の人々よりも優れています, つまり、我々は彼らに世話をする義務を持っています. 自分自身のために物事を整理しようとする彼らの試みは、自己破壊的であり、失敗に支配される。"
 ig_trait_family_ties:0 "家族のタイ"
 ig_trait_family_ties_desc:0 "こうした時代は、今でも良い結婚の価値を知っています。 当社の接続は、上を上回る境界よりも古いものであり、アライアンスと政府の両方を発信します。"
 ig_trait_noble_privileges:0 "ノーブル・プリビレッジ"
 ig_trait_noble_privileges_desc:0 "貴族が税のコレクターによって隠されることなく、その職務を実行するために残るべきであるという考えに何が起こったのか? 日を戻す時間です。"
 ig_trait_profitable_estates: "収益性の高い不動産"
 ig_trait_profitable_estates_desc: "お問い合わせ 貴族にとって良いのは、国にとっては良いことです。繁栄のトリル。"
 ig_trait_the_velvet_book: "ベルベットブック"
 ig_trait_the_velvet_book_desc: "最上級の家族だけが、この素晴らしい本で自分の名前をエッチングすることができます。 誰が所属しているか、誰がいないかを知っています。"
 ig_trait_bad_boyars: "悪い Boyars"
 ig_trait_bad_boyars_desc: "そこで、彼らは、国の良いツサーが彼の悪い男の子に誤解されていると言いたいですか? まあ、悪い男の子が何でできるかを案内します。"
 ig_trait_latifundios: "ラティフンディオ"
 ig_trait_latifundios_desc: "不動産の生産性と豊かさは比類のないものです。 急流で水のような手を流します。 本当に、これらは私たちにとって黄金の日です。"
 ig_trait_junkerdom: "ジュンカルド"
 ig_trait_junkerdom_desc: "大地のパワーは、私たちの土地から来ています。 私たちが選んだのは、国が従わなければならない。"
 ig_trait_patrician_philanthropy: "パトリシア フィランソロピー"
 ig_trait_patrician_philanthropy_desc: "私たちが仲間の男のために何かをしたのは、私たちの名前が構築されているものについて、何の端でエブラゾンされたかを確かめました。"
 ig_trait_wiener_walzer: "ワイナー ウォルザー"
 ig_trait_wiener_walzer_desc: "誰かが最後のボールで神経を持っていたし、演じるべきマイナスを求める。 わたしの親愛なる、わたしたちはワルツをしています! ファッショナブルなものをセットし、#italic ではない#! のマイナスです!"
 ig_trait_fazenda_ibicaba: "ファゼンダ イビカバ"
 ig_trait_fazenda_ibicaba_desc: "マンパワーは、当社の企業にとって一定の問題です。そのため、必要な労力を得るためのあらゆるパスを追求しなければなりません。"
 ig_trait_summon_no_zamindars: "Summon の Zamindars 無し"
 ig_trait_summon_no_zamindars_desc: "私たちの国の定規は、交渉や柔軟性に関心がないことを実証しています。 これがそうなら、注文を続けるために私たちが行うより微妙な事をお見逃しなく。"
 ig_trait_famine_reserves: "飢餓保護区"
 ig_trait_famine_reserves_desc: "プレスの必要性が出現したときに穀物の店を開ける私達の義務です。 テナントから親善を購入できる方法は何ですか?"

  # Industrialists IG Traits
 ig_trait_job_creators:0 "仕事のクリエイター"
 ig_trait_job_creators_desc:0 "お金を作るためにお金を使う必要があります。 政府が当社の投資を妨害しないように信頼できる限り、経済成長に向けてではなく、利益を置く場所はありません。"
 ig_trait_engines_of_progress:0 "進歩のエンジン"
 ig_trait_engines_of_progress_desc:0 "現代の年齢の驚異を見守ろう! 躊躇する時間はありません。 それが考え、設計され、特許を取られることができれば、それはすぐに使用するために造られ、テストされ、置くべきです。"
 ig_trait_tax_avoidance:0 "租税回避策"
 ig_trait_tax_avoidance_desc:0 "私たちのお金が費やされるべき場所を知っている人は誰ですか? 政府ではなく、現役者ではない。 幸いなことに、その不快感は良い使用に置くことができる税金のループホールを残しています。"
 ig_trait_zaibatsu_cooperation: "Zaibatsuの協力"
 ig_trait_zaibatsu_cooperation_desc: "業界と政府間の健全な関係は、誰もが恩恵を受ける。 両社の利益は、この動的な状況が続くことを保証することです。"
 ig_trait_zaibatsu_withdrawal: "Zaibatsu 出典"
 ig_trait_zaibatsu_withdrawal_desc: "当社の財務健全性は、通貨の調停と内部再投資に重点を置いたことで最も利益をもたらします。 公正な取引は、政府にとって悲しいことです。今は優先順位ではありません。"
 ig_trait_kommerskollegium: "コメルコルギウム"
 ig_trait_kommerskollegium_desc: "私たちの商業利益の規模が成長し続けているので、利益が均等に管理されていることを確実にするために、私たちを歓迎します。"
 ig_trait_ventilate_unify_beautify: "Ventilate、Unify、Beautify"
 ig_trait_ventilate_unify_beautify_desc: "こんな感じで見ましたか? 日差しが光る場所である病気のワークショップで、植物が優しく、そしてコンサートで不幸と疫病が働く場所です。 この混乱を修正するために、もちろん、私たちに落ちます。"
 ig_trait_the_goods_must_flow: "物品は流れなければならない"
 ig_trait_the_goods_must_flow_desc: "わたしたちの国がやっている限り、うまくいくのは良いことですが、それが販売する必要がある市場に到達できないのであれば、どのような用途ですか? 今、国が必要な良い輸送方法を理解する時間です。"
 ig_trait_wounded_honor: "ウォンド名誉"
 ig_trait_wounded_honor_desc: "どんな環境にも抵抗する土地に数少ない光景です。 私たちの方法は、優れたです。無秩序は裏切りであり、裏腹は最も過酷な制裁に会わなければなりません。"
 ig_trait_stamped_and_signed: "スタンプと署名"
 ig_trait_stamped_and_signed_desc: "スタンプとレジャーは、私たちが混乱から注文を作成するために使用する方法です。 インドの統治は、紙の海を必要とします。そして、それは完璧に循環するように私たちの仕事です。"
 ig_trait_responsible_government: "責任あるガバナンス"
 ig_trait_responsible_government_desc: "私たちの使命は、すべての男性に正義と文明を拡張することです。もちろん、これは永遠に許すルールを貫通します。"

  # Armed Forces IG Traits
 ig_trait_patriotic_fervor:0 "パトリオティック・フェロー"
 ig_trait_patriotic_fervor_desc:0 "どんなに戦略と武器の高度化、いくつかの戦いは、ハードワークやガッツでのみ勝つことができます。 本当に彼らの国が何を意味するかを信じている兵士たちは、オッズに関係なく勇敢に戦うでしょう。"
 ig_trait_veteran_consultation:0 "ベテランの相談"
 ig_trait_veteran_consultation_desc:0 "技術の進歩は戦争の顔を変えていますが、どのように理解すれば、それらを利用することができます。 幸いなことに、初めての経験を積んだ人達は考えるべきです。"
 ig_trait_materiel_waste:0 "マトリエル廃棄物"
 ig_trait_materiel_waste_desc:0 "国民への忠誠は、政府に忠実ではありません。 担当者を信頼できない場合は、その人に合ったものをご使用ください。"
 ig_trait_elan_vital: "Élan ヴィタール"
 ig_trait_elan_vital_desc: "最新腕と装甲は、すべてが良くて良いですが、勝利への道は、逆境の顔で弓にならない運転精神に依存します。 国の立場で真に信じる兵士たちは、オッズに関係なく、勇敢に進んでいきます。"
 ig_trait_newly_created_army: "新しく作られた軍隊"
 ig_trait_newly_created_army_desc: "現代の軍隊の心臓は、最新のリフや最高級のユニフォームではなく、組織や物流にいます。 すべての兵士が供給したままにするため、銃弾と合理の流れを定期的かつ信頼できるものにし、すべての人が広大な軍事機械で彼の役割を知っています。つまり、軍隊を何か価値のあるものにする方法です。"
 ig_trait_self_strengthening: "セルフストレッチ"
 ig_trait_self_strengthening_desc: "私たちの知性と知恵は、私たちを取り巻く人々にとって必ずしも優れています。 そのため、海外から学ぶ必要があるのは、確かな船舶と効果的な銃の1つだけです。"
 ig_trait_parochial_leadership: "Parochial リーダーシップ"
 ig_trait_parochial_leadership_desc: "これらの暗い時間では、それは自分自身のためにすべての人です、そしてすべての州は、最初に、そして最大限の自分の福祉を見る必要があります。 自分の心が脅威にさらされる可能性があるとき、家から熱心に遠く離れたすべての役員を期待することは不当です。"
 ig_trait_el_buen_jefe: "エル・ブエン・ジェフェ"
 ig_trait_el_buen_jefe_desc: "すべての良い兵士のニーズは、彼を導くために良い役員です。 こういった時、国全体が必要とするのは良い役員です。"
 ig_trait_clube_militar: "Clube Militar, オーストラリア"
 ig_trait_clube_militar_desc: "当社のような役員や兵士が休むことができる場所, リラックスし、彼らの予備時間で整理することは、必ず無害であることを確認してください. 何かあれば、私たちが話して物事を計画できる場所は、国に良いサービスを提供するかもしれません。"
 ig_trait_coronelismo: "コルネリスモ"
 ig_trait_coronelismo_desc: "政府から最新の法令をご存知ですか? 誰が対処しているのか気にしないでください? 紳士のような装飾品で、男性や財産の全てが一気に入らない!"
 ig_trait_divided_ranks: "配当ランク"
 ig_trait_divided_ranks_desc: "私たちの兵士と当社の役員の間で根本的な儀式があります。 なぜ男は、彼の習慣を念頭に置いた人のためのラインに彼の人生を置きますか?"
 ig_trait_imperial_service: "帝国サービス"
 ig_trait_imperial_service_desc: "私達のユニフォームを身につけ、私達のフロンティアを拡張するために大きい名誉、百万が努力する1です。 常に記入する位置があることは幸いです。"
 ig_trait_veerta: "ヴェールタ"
 ig_trait_veerta_desc: "私たちの人たちは、すべてのインドを征服し、敵のすべての問題に対する勝利の源を作り出している軍隊です。 私たちの勇気と規律は、この名誉のロールが終わらないことを保証します。"

  # Rural Folk IG Traits
 ig_trait_farmers_markets:0 "ファーマーズマーケット"
 ig_trait_farmers_markets_desc:0 "必要のある人々に出産する物品は、これらの日は大きな関心事だそうです。 良い状況下では、自分自身が必要であるためにそれらを得ることは非常に可能です。"
 ig_trait_honest_work:0 "正直な仕事"
 ig_trait_honest_work_desc:0 "正直な仕事と正直な汗で生活をしています。 つまり、私たちが必要とするものよりも多く生成されるのであれば、とても良いでしょう。"
 ig_trait_old_ways:0 "古い方法"
 ig_trait_old_ways_desc:0 "この国の人々 は、将来がどのように見えるべきかについての考えのすべての種類を持っているようです。. 現状を作った人なら、なぜ信頼してもらえますか?"
 ig_trait_obshchina: "バングラデシュ"
 ig_trait_obshchina_desc: "小さな村での生活は悪くありません。 弊社間での作業を容易にし、生産や利益を一堂に広げます。"
 ig_trait_fellahin: "ファラヒン"
 ig_trait_fellahin_desc: "人生の私達の多くは、私たちができる限り、これらの分野に取り組むことです。 時々、私たちの仕事は実際に私たちのために払います。"
 ig_trait_nucleos_coloniais: "Núcleos Coloniais, オーストラリア"
 ig_trait_nucleos_coloniais_desc: "新しい家は、新しい人生の始まりを意味します。 好きではないの? 今後、新しい決済が提供しなければならないものを見てみましょう。"
 ig_trait_plantation_work: "プラント工事"
 ig_trait_plantation_work_desc: "日々頑張っていきましょう。 日が経ちますが、数日以上経ちます。"
 ig_trait_of_the_sovereign_alone: "孤独の"
 ig_trait_of_the_sovereign_alone_desc: "土地を所有する方々の負担は耐えられない。 これらの仲介者は、私たちが単独で唯一の権威の儀式であることを思い出させなければなりません, そして、彼らは私たちの上で正しい力を持っていません."
 ig_trait_imandari: "インダリ"
 ig_trait_imandari_desc: "私たちの土地は裕福な土地であり、私たちは、勤勉とそれを働かせます。 時代と共に、私たちが必要とするものをもっと作り出すことができます。"
 ig_trait_bazaar_bargains: "バザーバーゲン"
 ig_trait_bazaar_bargains_desc: "街を豊かにし、周りのマイルから訪問者を引き出すバザールです。 繁栄が余計な組織を必要とするならば、それは我々が支払うことを喜んでいる価格です。"

  # Trade Unions IG Traits
 ig_trait_solidarity:0 "ソリッド"
 ig_trait_solidarity_desc:0 "仕事をしたい人全員が、仕事で働こう! 誰も除外または退去しません。 互いの権利を公正に補償する。"
 ig_trait_industrial_organizers:0 "産業組織"
 ig_trait_industrial_organizers_desc:0 "誰が充電中であっても、労働者が最終的に働く方法は、工場が高額から手渡されたルールよりもどれだけうまく機能するかに大きな影響を与えます。"
 ig_trait_work_to_rule:0 "ワークツールール"
 ig_trait_work_to_rule_desc:0 "自分を考えてみるのではなく、私たちをシャットアップし、何を言っているのかを、担当の人のように思える。 私たちが実際にその哲学を私たちの'unskilled'の労働に適用するならば、彼らがそれをどのように好きかを見てみましょう。"
 ig_trait_bourse_du_travail: "Bourse du Travail, オーストラリア"
 ig_trait_bourse_du_travail_desc: "組織は仕事の最後に終わらない! ユニットフロントは、工場の床だけでなく、家庭やコミュニティにも、お互いに向き合います。"

  # Intelligentsia IG Traits
 ig_trait_propagandists:0 "プロパガンディスト"
 ig_trait_propagandists_desc:0 "私たちの詩では、私たちの手紙と私たちの政治マニフェストは、この新しい年齢が世界の幸いな部分に持って来る必要があるものの例として、私たちの国で達成された進捗状況を上回る必要があります。"
 ig_trait_avant_garde:0 "アバントガード"
 ig_trait_avant_garde_desc:0 "他の人が考えるのではないか、私たちはすでに声を上げます。 私たちの芸術とアイデアは、心に直接カットし、オープンな目を強制します, ないで、, その後、ショックで!"
 ig_trait_social_criticism:0 "社会批判"
 ig_trait_social_criticism_desc:0 "パワーの人々は、彼らがレパートリーを超えていると思うが、権威は誰かのアイデアを興味深いものにしません。 面白いことがたくさんありますし、そのことを言うのは誰なのかを正確に知っています。"
 ig_trait_restoration: "レクリエーション"
 ig_trait_restoration_desc: "偉大な挑戦と大きな成果のこの時代、私たちは、その昔の偉大さに国を回復させるという私たちの苦難の追求に誇りを持っています。 余計な仕事は私達の文明の状態を思い出させましたり、異常な仕事はより大きい高さにそれを持って来ます。"
 ig_trait_crisis_of_identity: "アイデンティティの危機"
 ig_trait_crisis_of_identity_desc: "私たちが仕える国は、私たちが真の国ではないかもしれません。 担当者との共通点はどれくらいありますか?"
 ig_trait_les_beaux_arts: "レス・ボークス・アート"
 ig_trait_les_beaux_arts_desc: "私たちのアート、私たちの展覧会、そして私たちの創造的な才能は誰にも負けません。 なぜ私たちが披露すべきではありませんか? 他人の嫉妬をしてはならない。"
 ig_trait_brasilidade: "ブラジル人"
 ig_trait_brasilidade_desc: "是非、友達に会いましょう! ここまでは、星空の下にある最も美しいバラードを手元にボトルで聴くことができます。そこで、彼はすでに絵画のことを見てみましょう。 人生じゃないですか?"
 ig_trait_bachareis: "バチャーレ"
 ig_trait_bachareis_desc: "各国が必要とするものを知っています! 結局のところ、私たちは人々のために話しています。 いいえ、#italic を #! に話せませんでした。"
 ig_trait_swaraj: "スワラジ"
 ig_trait_swaraj_desc: "わたしたちは、国家から異人化し、そしてその国に精通したのです。 私達の定規は私達のunthinkingサービスを要求する間私達に代理店をdeny。 そのようなことは失敗するのを疑っています。必要であれば、そのことを確実にするために働きます。"
 ig_trait_westernisation: "ウエディング"
 ig_trait_westernisation_desc: "現行の政府は正義と進展の代表として機能しますが、私たちの国の多くは遠くに残っています。 私たちは、国家と人々の分離を削減しようとしなければなりません。"

  # Petite-Bourgeoisie IG Traits
 ig_trait_treasury_bonds:0 "Treasury ボンド"
 ig_trait_treasury_bonds_desc:0 "政府は、その債務を支払うために信頼することができる限り、, この偉大な国への資金への私たちの苦労した節約を置くことは、パトリオティックだけでなく、良い投資."
 ig_trait_middle_managers:0 "ミドルマネージャー"
 ig_trait_middle_managers_desc:0 "全員が本ですべてを行うことはできませんが、少なくとも本で何をやっているかを守ることができます。 誰かがここで物事を行うための適切な方法を覚えておく必要があります。"
 ig_trait_xenophobia:0 "エノフォビア"
 ig_trait_xenophobia_desc:0 "わたしたちは、わたしたちの国の状態を誰が責めようとしているかを知っています。 一方、背中の後ろに笑いながら、逃げていきましょう。 誰かが行動する必要があります。"
 ig_trait_bergsbrukens_valdistrikten: "Bergsbrukens ヴァルディストリック"
 ig_trait_bergsbrukens_valdistrikten_desc: "マイニングの利息とハンバーガーの不動産間の密接なコラボレーションは、より良い時間で、私たちは、国家が他の国だけ夢を叶えるようにすることができます。"
 ig_trait_effendi: "エフェンディ"
 ig_trait_effendi_desc: "最悪の習慣と正直な手段によって、私たちはトップに上昇しました。そして、私たちの努力はまさにすべてによって明らかにされます。"
 ig_trait_reorganization: "組織再編"
 ig_trait_reorganization_desc: "私たちは、その場で正しい正式な経営陣と部署で、多くのことを改革することを知っています。 言葉を言うだけで、始まります。"
 ig_trait_master_of_the_house: "家のマスター"
 ig_trait_master_of_the_house_desc: "お問い合わせ 自分を倒します。 わたしたちは、ここを洗練し、貧しい人たちに奉仕し、大衆に慰めと哲学者を守ろうとしています。"
 ig_trait_haute_finance: "オートファイナンス"
 ig_trait_haute_finance_desc: "コンチネンタル・ファイナンスの試合では、第一弾として活躍し、バイクターを目指します。"
 ig_trait_old_lady_of_threadneedle_street: "糸針通りの古い女性"
 ig_trait_old_lady_of_threadneedle_street_desc: "国民が助けを必要とするならば、プルーデント、安全、そして常に危機に向けることができるのは、イングランド銀行です。"
 ig_trait_civil_service: "市民サービス"
 ig_trait_civil_service_desc: "民俗芸能人について面白いアイデアをしています。 私たちは、あなたの方針を策定し、実行するのに役立ちます。"
 ig_trait_bah_humbug: "Bah Humbug, オーストラリア"
 ig_trait_bah_humbug_desc: "貧しい態度は、あなたが言う。 刑務所はありませんか? 作業室は稼働中ですか? あとは自分だけを離れる! 悪意のある方は必ず行ってください。"
 ig_trait_swadesh: "スワデッシュ"
 ig_trait_swadesh_desc: "私たちは、他の人々と無事に関係していますが、外国の企業による信用を否定し、サービスに強制されます。 私たちのルールが経済から排除しようとすると、我々はそれらと同じを行います。"
 ig_trait_lines_of_credit: "クレジットライン"
 ig_trait_lines_of_credit_desc: "弊社は、インドを征服したことがなかった、独自の逸脱フランチャイズによって提供されるクレジットについては、保証しません。 強固なビジネスケースを与えられた場合、私たちはこの関係を継続するつもりです。"
 ig_trait_cooperative_agencies: "協同組合の代理店"
 ig_trait_cooperative_agencies_desc: "豊富な資本金を持っていますが、私たちの国の知識はほとんどありません。 自分のリソースと専門知識をプールすることで、これまで以上に故郷を豊かにすることができます。"

  # Devout IG Traits
 ig_trait_be_fruitful_and_multiply:0 "フルーツとマルチプライ"
 ig_trait_be_fruitful_and_multiply_desc:0 "アセチシズムは、精神的探求に命を捧げる少数のために罰金が科されますが、一般的な人々では、インスティルへの最も重要な値は、家族を構築し、子供のために世話をするものです。"
 ig_trait_divine_right:0 "ダイバインの権利"
 ig_trait_divine_right_desc:0 "わたしたちは、私たちの命の秩序があると信じています。 社会は、より良い注文や悪化を反映することができます. 定規が激しく、その守備がある限り、私たちは人々がなぜ知っているようにすることができます。"
 ig_trait_pious_fiction:0 "Pious フィクション"
 ig_trait_pious_fiction_desc:0 "今日の価値は、その教育そのものが道徳に対する侵食効果を持っているので、毒され、文学です。 現在の確立が「真」と考えている人々を教えるよりも優れています。"
 ig_trait_work_ethic: "仕事倫理"
 ig_trait_work_ethic_desc: "覚えておいてください、お金は生成された性質を持っています。 お金はお金を賭けます。利益の産生は、創造の行動であり、神自身の仕事の名誉と栄光です。"
 ig_trait_asceticism: "アスレチック"
 ig_trait_asceticism_desc: "この世界の喜びから逃れるためには、正しい道です。 素材変更により、自分自身をあまりにも過ごせないでください。これらも通過しなければなりません。"
 ig_trait_kar_seva: "カルセバ"
 ig_trait_kar_seva_desc: "神は私たちと私たちと一緒です。 他人を自在に奉仕するためには、神の創造物を提供し、神に奉仕することです。 私たちは、誠実な仕事に従事し、他の人とその労働の果物を共有し、それらによって神に近いことを意味します。"
 ig_trait_temporal_mandate: "Temporal マンデート"
 ig_trait_temporal_mandate_desc: "天国と地球の間の線はしばしばぼやけています。そのため、信仰と政府間の線です。 世俗的な世界を管理するためにすべてのタイプをとり、システムが一緒に働く方法を見つけます。"
 ig_trait_the_best_revenge: "最高の復讐"
 ig_trait_the_best_revenge_desc: "敵に対して復讐を取りたいと思うなら、より優れた資質を身につけ、義の道を歩かせる。 このようにして、あなたは必然的に、彼はあなたの良い資質に苦しむことになるために、あなたの敵にあなたの敵にあなたの敵に迷惑をとります、そして彼はあなたの良い評判の上に悲しむでしょう。"
 ig_trait_yeshivot: "Yeshivot, キプロス"
 ig_trait_yeshivot_desc: "Sifrut Chazalの勉強は、すべての若者の重要な義務です。 誰が学校に行っていないなら、私たちの法律はどのように記憶され、保存されるか?"
 ig_trait_traditsye: "トラディティ"
 ig_trait_traditsye_desc: "世界中で急速に変化しています。 変化の未知の旋風が続くと、バランスを保ちたいという想いは?"
 ig_trait_heavenly_sovereign: "ヘブンリー・スヴァージョン"
 ig_trait_heavenly_sovereign_desc: "ジム皇帝への相続人は、地球上で最も飼育可能な機関の1つに傾向があります。 伝統のこのフォントは、正式にベニアルに値します。そして、私たちがそれを認めるべき国として。"
 ig_trait_secular_shrine_theory: "世俗神社論"
 ig_trait_secular_shrine_theory_desc: "神社は、日本人の本質的な信念であり、国家の公序良俗の目的のために組織的に存在します。 神道主義とは、私たちがすべての市民に期待する神道主義の表現です。"
 ig_trait_haibutsu_kishaku: "ハイブツキシャク"
 ig_trait_haibutsu_kishaku_desc: "外国の宗教は、国から廃止され、その数字が破壊されなければならない。 何が起きたのかを見て! 御社殿、御社殿、御社殿、御社屋、御社屋、御社屋、御社屋、御社屋、御社屋、御社屋、御社屋、御社屋、御社屋、御社屋、御社屋、御社屋、御社屋、御社屋、御社屋、御社屋、御社屋、御社屋、御社屋、御社屋、御社屋、御社屋、御社屋、御社屋、御社、御社屋、御社、御社屋、御社、御社、御社、御社屋、御社、御社屋敷、御社、御社、御社、御社、御社、御社、御社、御社、御社、御社屋、御社、御社屋、御社、御社、御社、御社、御社、御社屋、御社屋敷、御社、御社、御社、御社、御社、御社、御社、御社、御社、御社、御社、御社、御社、御社、御社、御"
 ig_trait_da_wat: "ダワット"
 ig_trait_da_wat_desc: "わたしたちは、信仰の中で私たちを招待し、アッラーの意志に従って生きるために、他者を招待してはならない。 ummahは、すべてを歓迎します。"
 ig_trait_sharia: "シャリア"
 ig_trait_sharia_desc: "正しく生きるには、正しいものを定義する法律や、そうでないものを知っている必要があります。 法律の解釈は、私たちが実行できる最も名誉ある唯一の義務の一つです。"
 ig_trait_mecelle: "メセル"
 ig_trait_mecelle_desc: "Hanafi jurisprudence、Mecelle-i Ahkâm-ı に基づく Adliyeは、私たちが私たちの信仰と世俗的な法律の私達の期待の両方を満たすコードに従うことを保証します。"

