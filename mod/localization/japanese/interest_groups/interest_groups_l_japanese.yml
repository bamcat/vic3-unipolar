l_japanese:

  # Base IGs
 ig_rural_folk:0 "農村民俗"
 ig_rural_folk_only_icon:0 "@rural_folk!"
 ig_rural_folk_desc:0 "政治の関心が主に彼らの農業の生き物と並ぶ田舎にいる人々。"
 ig_devout:0 "宗教的基礎主義者"
 ig_devout_only_icon:0 "@devout!"
 ig_devout_desc:0 "大半の宗教の最も熱心な信者は、道徳的および政治的知恵の最高の源としてそれを見る。"
 ig_industrialists:0 "会社案内"
 ig_industrialists_only_icon:0 "@industrialists!"
 ig_industrialists_desc:0 "技術の進歩と産業成長に関心のある投資家や株主。"
 ig_landowners:0 "ランドローダ"
 ig_landowners_only_icon:0 "@landowners!"
 ig_landowners_desc:0 "土地所有者は、伝統と古いお金のカストディアンです。"
 ig_intelligentsia:0 "アカデミア"
 ig_intelligentsia_only_icon:0 "@intelligentsia!"
 ig_intelligentsia_desc:0 "文学、芸術、音楽、演劇の国家のトレンドをリードする知的。 また、一般的な管理クラス/"
 ig_petty_bourgeoisie:0 "アーバンサイト"
 ig_petty_bourgeoisie_only_icon:0 "@petty_bourgeoisie!"
 ig_petty_bourgeoisie_desc:0 "小規模な企業、オフィス・クローク、会計士、その他、富裕層と貧弱なストラタの間で考慮されている個人。"
 ig_armed_forces:0 "武装した力"
 ig_armed_forces_only_icon:0 "@armed_forces!"
 ig_armed_forces_desc:0 "国の軍隊に強い関心を持つプロの兵士や他の人。"
 ig_trade_unions:0 "労働組合"
 ig_trade_unions_only_icon:0 "@trade_unions!"
 ig_trade_unions_desc:0 "鉱山、工場、フィールドの労働者を整理しようとする組織の労働者を編成し、その中で1つの声に分散利息の強さをプールします。"

  # Religious IGs
 ig_catholic_church:0 "カトリック教会"
 ig_catholic_church_desc:0 "カトリック教はキリスト教の最大の昆虫です。 信じる人は、ローマのアーキビショップ、ポペ、セント・ペテロによるイエス・キリストの権威に対する無中断の成功者であることを保持しています。 その他の重要な信念には、聖人と聖母マリアのお祝いが含まれます。"
 ig_orthodox_church:0 "正教会"
 ig_orthodox_church_desc:0 "正統派の教会は、プーペと通信していない東の教会になる傾向があります。"
 ig_oriental_orthodox_church:1 "オリエンタル整形外科教会"
 ig_oriental_orthodox_church_desc:1 "東洋正教会は、ポペと通信していない中東の教会になる傾向があります。"
 ig_anglican_church:0 "アングリカン教会"
 ig_anglican_church_desc:0 "アングリカン教会は、プロテスタント改革中にヘンリーVIII王によって作成されました。 Anglicansは、聖書はキリスト教のドマの主権であり、他のエヴァンゲル教会よりも根本的なものではないままポペを拒否すると信じています。"
 ig_evangelical_church:0 "エヴァンゲル教会"
 ig_evangelical_church_desc:0 "エヴァンゲル教会は、プロテスタント改革中に北欧で主に作成されました。 Evangelicalsは、聖書はキリスト教の犬馬の唯一の権威であり、教皇を拒否し、偶像の上にボーダーとして聖人のカトリックの奉納を見て信じています。"
 ig_rabbinical_council:0 "ラビニカル協議会"
 ig_rabbinical_council_desc:0 "国のユダヤ教皇のリーダーシップは、議論と奨学金の強い伝統を持つよく教育されたウサギである傾向があります。"
 ig_sunni_madrasahs:1 "サンニ・ウルマ"
 ig_sunni_madrasahs_desc:1 "サンニズムはイスラムの最大の昆虫です。 信じる人は、ムハンマドが彼の叔父によってイスラームのカリフとして成功していたことを保ちました, アブ・バーク, 彼の息子イン・ロー・アリが正当な成功者だったというシのビューとは対照的に、."
 ig_shia_madrasahs:1 "ユエマ"
 ig_shia_madrasahs_desc:1 "シイズムはイスラームの第2位の昆虫です。 信じる人は、ムハンマドは、彼の息子の律法によってイスラム教のカリフとして成功していたことを保持しました, アリ, 彼の叔父アブ・バークが正当な成功者だったサンニビューとは対照的に、."
 ig_hindu_priesthood:0 "ヒンズー教の原則"
 ig_hindu_priesthood_desc:0 "おそらく最も古い組織された宗教はまだ存在して、ヒンドゥー教は、再発のサイクルを破壊し、ニルバナを達成するために、個人が彼らのカルマを改善するための役割を果たす、単にヒンズー教徒によって崇拝された多くの神が異なる役割を果たすために、キャストシステムに従わなければならないことを保持しています。"
 ig_vajrayana_monks:0 "ヴァイラナ・モンクス"
 ig_vajrayana_monks_desc:0 "ヴァイラナ仏教は、チベットとモンゴルで最も強くなっています。 瞑想と自己規律の使用を強調します。"
 ig_mahayana_monks:0 "マヤナ・モンクス"
 ig_mahayana_monks_desc:0 "マハヤナ仏教は、中国、ベトナム、韓国で最強です。 社会の誰もが、完璧に啓蒙を求めることを奨励すべきだと強調しています。 マハヤナは、仏を神のような姿で見ています。"
 ig_theravada_monks:0 "Theravada 僧侶"
 ig_theravada_monks_desc:0 "Theravada Buddhismは、ブルマ、サイアム、カンボジア、セイロンで最強です。 ニルバナを探し、再発のサイクルを壊す個人に大きな重点を置いています。 仏は神としてではなく、人類の残りの部分を完璧に示した悟りの人として見る。"
 ig_shinto_monks:0 "信藤モンク"
 ig_shinto_monks_desc:0 "神道主義は、カルマの仏教の概念を組み合わせて、神の崇拝と漆喰、自然と死者の精神を組み合わせて、共生の信仰です。"
 ig_pagan_shamans:0 "パガン・シャーマンズ"
 ig_pagan_shamans_desc:0 "アニミズムは自然の霊の崇拝と預言です。 アニミストによる儀式には、食品や畜産の犠牲や、内分泌の精神的旅のための幻覚薬の消費が含まれます。"

  # Taiping IGs
 ig_taiping_god_worshippers:0 "神聖な社会"
 ig_taiping_god_worshippers_desc:0 "神の崇拝、または天皇崇拝協会は、すべての信者を神の息子や娘として見渡すキリスト教の解釈をサポートし、天国の間で著名な共感のキリスト教の信仰です。"

  # British IGs
 ig_landed_gentry:0 "地理学"
 ig_landed_gentry_desc:0 "偉大な不動産や広大なプロパティの所有者は、土地の兵器は伝統と古いお金のカストディアンです。"

  # Prussian IGs
 ig_junkers:0 "ジャンカーズ"
 ig_junkers_desc:0 "プーシアンの土地を定着し、キリスト教化するパガン・バルトのテュトニック征服の目覚めに従った「ジュンカーズ」(ユン・主人公)から、ジュンカーズはプルーシャの貴族と主人公です。 彼らはエリートルールへの脅威として民主主義に向かって動きを反対する傾向があります。"

  # USA IGs
 ig_southern_planters:0 "ホームオーナー"
 ig_southern_planters_desc:0 "住宅は、近年、より希少なものになっていますが、住宅所有者協会が利益の目的のために不動産の購入と販売に従事していると主張している人々のグループは、人工的に生活のコストを膨脹させました。"
 ig_evangelicals:0 "アーデントクリスチャン"
 ig_evangelicals_desc:0 "キリスト教徒は、意外に多種多様な長所の逸脱からキリスト教徒を祀っています。この国は、全国の世俗主義の上昇から自分自身を救うために、独自の精神的な目覚めを見つける必要があることに同意します。"
 ig_yeoman_farmers:0 "農村サナーズ"
 ig_yeoman_farmers_desc:1 "国家の岩盤として、父の多くから見なす、アメリカの農村クラス。 ヨーマンのクラスは、アメリカの農村のポピュリズムの防護として長く確立しました。"
 ig_wallstreet:0 "ウォールストリート"
 ig_wallstreet_desc:0 "ニューヨーク州ウォールストリートの投資銀行は、アメリカの金融システムのバックボーンであり、経済全体の極端な影響を発揮します。"
 ig_silicon_valley:0 "シリコンバレー"
 ig_silicon_valley_desc:0 "インターネット上の日常生活を管理するプログラマと仕事からホームコンピュータのウィズ。"
 ig_american_middle_class:0 "中南米"
 ig_american_middle_class_desc:0 "アメリカン・ミドル・クラスは、国の消費者基盤の大部分を占め、生存可能な給与をもたらす働きがいを築きます。"
 ig_digital_activists:0 "デジタル活動家"
 ig_digital_activists_desc:0 "様々なオンラインインフルエンサーは、私たちのポップレース上のパワーをwield."
  # Ottoman IGs
 ig_local_governors:0 "地方知事"
 ig_local_governors_desc:0 "地方自治体の定規は、地方自治体のネットワークを構築することで大きな影響を受けることができます。 ダイナシティは、彼らが効果的に独立した状態になることができるので、エンパイアに公正に縛られます。"

  # Chinese IGs
 ig_literati:0 "リテラティー"
 ig_literati_desc:0 "中国の学者は、政府の支持者とそれの批判として、重要な役割を果たしています。"
 ig_scholar_officials:0 "スカラー公式"
 ig_scholar_officials_desc:0 "中国で上陸した gentry は、本当に中国の貴族ではありません。 彼らは購入特性を介して自分の富を維持します, しかし、彼らは、政府の立場に自分の力を借ります."
 ig_confucian:0 "コンピュイアン・ショラ"
 ig_confucian_desc:0 "社会的伝統の多く、信仰の多岐に渡り、安楽に共存するコンファニズムは、それに従う人々からの社会的調和と強い道徳を要求します。"

  # Papal IGs
 ig_roman_landowners:1 "市民の能性"
 ig_roman_landowners_desc:1 "貴族の家族と土地のエリツの構成は、ポペによってタイトルを付与しました, ローマの市民の貴族は、富の人々として機能します, 影響, 聖なる参照の領土を渡る気道力."
 ig_roman_curia:0 "ルーマニア キュリア"
 ig_roman_curia_desc:0 "ローマのカーリア、または「ローマのコート」は時々知られているように、聖なる参照の行政機関です。"

  # Japanese IGs
 ig_samurai:0 "サムライ"
 ig_samurai_desc:0 "サムライは、日本の軍用貴族であり、強力な土地所有者に特権保持者として奉仕し、その女将の意志の執行者である。"
 ig_shogunate:0 "焼酎"
 ig_shogunate_desc:0 "将軍は12世紀以降に天皇の名で日本を支配している軍政府を指します。 日本伝統の秩序を取り巻く「大名」の力強い主役である「大名」の支持のもと、"
 ig_peasants:1 "ハイミン"
 ig_peasants_desc:0 "Heiminは、あらゆる種類の社会的特権なしで生まれ、主に農村農家の人々を反映させる政治的興味を持つ、日本の庶民のクラスを指摘しています。"
 ig_buddhist_monks:0 "仏教僧侶"
 ig_buddhist_monks_desc:0 "19世紀の仏教が日本にミレニアムを上回る仏教のなかで、日本人の信念を持つオッズと並んでいます。 江戸時代を経た仏教学校は、神と仏の共和性を強調しています。"

  # Hawaiian IGs
 ig_christian_missionaries:0 "キリスト教の宣教師"
 ig_christian_missionaries_desc:0 "キリスト教の宣教師は、ほんの数年前にハワイに来ましたが、すでにカフナをハワイの公正なクラスとしました。 西洋の力で取引し、西の移住者を引き付け、ハワイのネイティブ・ハワイアンの変換をキリスト教に提唱。"
 ig_alii:0 "アリイ"
 ig_alii_desc:0 "Ali'i は、再発する僧侶のサービスで Hawai'i のより低い貴族を表します。 伝統的な価値観を提唱し、僧侶のルールを守ります。"
 ig_maka_ainana:0 "マカ・アインナ"
 ig_maka_ainana_desc:0 "Maka'āinanaはハワイの農村クラスを代表し、植林や漁師で働くことが多い。 伝統の価値観と、ハワイの農業分野に対する継続的な経済依存性を支持しています。"
 ig_hawaiian_democrats:0 "デモクラッツ"
 ig_hawaiian_democrats_desc:0 "民主主義はハワイの自由改革者を表しています。 彼らは民主的政権と西洋の電力との継続的な貿易関係の支持で、僧侶の絶対力を除去するために提唱します。"

  # Swedish IGs
 ig_church_of_sweden:0 "スウェーデンの教会"
 ig_church_of_sweden_desc:0 "スウェーデンの教会は16世紀のグスタフ・ヴァサ王によって考案され、スウェーデンの公式教会です。 ルーザーン機関であること, 教会は、聖書はキリスト教のドマの唯一の権威であることを保持しています, したがって、詩や聖人の行使などの伝統の権威を拒否."

  # Finnish IGs
 ig_church_of_finland: "フィンランドの教会"
 ig_church_of_finland_desc: "1809年にスウェーデンのフィンランドの分離から生まれたフィンランドの教会は、国の公式の国家教会として設立されました。 ルーザーン機関であること, 教会は、聖書はキリスト教のドマの唯一の権威であることを保持しています, したがって、詩や聖人の行使などの伝統の権威を拒否."

# Danish IGs
 ig_church_of_denmark: "デンマークの教会"
 ig_church_of_denmark_desc: "16世紀にデンマークの王クリスチャン3世によって設立されました。 ルーザーン機関であること, 教会は、聖書はキリスト教のドマの唯一の権威であることを保持しています, したがって、詩や聖人の行使などの伝統の権威を拒否."

# Norwegian IGs
 ig_aristocracy_of_officials: "公式サイト"
 ig_aristocracy_of_officials_desc: "1821年に正式に廃止された機関と重要な歴史的貴族を欠如させると、ノルウェーのトップクラスは、伝統的な貴族の地位を占める弁護士、司祭、医師と市民のservantsで構成されています。"
 ig_church_of_norway: "ノルウェーの教会"
 ig_church_of_norway_desc: "ノルウェーの教会は、ローマのカトリック教会から別の体として設立され、16世紀のノルウェーのノルウェー国家とプロテスタント改革の結果として統合されました。 ルーザーン機関であること, 教会は、聖書はキリスト教のドマの唯一の権威であることを保持しています, したがって、詩や聖人の行使などの伝統の権威を拒否."

  # Korean IGs
 ig_yangban:0 "ヤンバンオフィシャル"
 ig_yangban_desc:0 "ヤンバンは、国の官僚的な装置内の位置から自分のタイトルや影響を導き出す韓国の土地で、無地のgentryを表しています。 韓国の伝統の秩序の守護者である聖人の公式のコンフォシャンの理想を増大させる。"

  # Russian IGs
 ig_gentry_assembly:0 "Gentryアセンブリ"
 ig_gentry_assembly_desc:0 "ゲントリアセンブリは、ロシア・アリストクラシーを代表する自己成長型ボディです。 1785年に正式な地位を付与されたアセンブリは、貴族の伝統的な力と特権の保持または拡張のために提唱されているので、これまで存在してきました。"

  # Australian IGs
 ig_squattocracy: "スカットクラシー"
 ig_squattocracy_desc: "'Squattocracy' は、少しまたは法的主張なしで土地の大きな魅力を占めている白いオーストラリアの定住者のクラスを表しています。 多くの場合、特定のエリアに到着する最初の定住者, スクートクラシーは、主に自分の領土に家畜を調達する収入を介して、巨大な富と社会的影響を得ています."

  # Austrian IGs
 austrian_aristocracy:0 "オーストリアの貴族"
 austrian_aristocracy_desc: "オーストリアのAristocracyは、オーストリアの確立された貴族のクラスを表し、ハブスブルク聖ローマ皇帝とオーストリアのアーチデュケスによって貴族のタイトルを歴史的に授与され、帝国裁判所内で大きな影響を与えています。"

  # Misc Igs
 ig_red_army:0 "赤軍"
 ig_red_army_desc:0 "レッド・アーミーは、預言者と共産主義の占領によって生まれ、革命の防衛と伝播に専念する機関です。"
 ig_fellahin: "ファラヒン"
 ig_fellahin_desc: "彼らが働く耕作物やそれらが耕作するフィールドから自分の名前を得る、落書きはエジプトの農家や農民です。"

  # Indian IGs
  ig_zamindars: "ザミンダーズ"
  ig_zamindars_desc: "Zamindarsは、典型的な大規模な不動産の遺伝的所有者です。 それらは、多くの場合、Mughal-era aristocracyの残骸を表し、彼らの定規に代わって土地収入を集める権利を与えました。"

  ig_east_india_company: "東インド会社"
  ig_east_india_company_desc: "イースト・インディア・カンパニーは、英国議会の監修のもと、インドの判決を受けた民間企業です。 1833年に商務の取消に続き、純粋に行政機関になりました。"

  ig_presidency_armies: "緊急の軍隊"
  ig_presidency_armies_desc: "残留軍兵は、通常、ヨーロッパの役員の命令の下でネイティブインドの敗北で構成されているコロニアルインドの軍隊です。"

  ig_indian_army: "インド軍"
  ig_indian_army_desc: "インド軍は、正体軍を単体に統一することによって形成されたコロニアルインドの第一次軍です。 欧州役員の命令のもと、インドのネイティブの兵士を中心に構成されています。"

  ig_ryots: "ログイン"
  ig_ryots_desc: "リョッツは、インドの伝統的な農家や農民です。 自分の興味は、大自然に恵まれています。"

  ig_civil_servants: "市民のサービング"
  ig_civil_servants_desc: "民事サーヴァントは、主にインドのコロニアルの官僚主義のさまざまな臓器から発展してきたネイティブインドのインテリジェントジアを包囲しています。 彼らは通常、クロークまたは他の低レベルの管理者としての役割を保持または保有しています。"

  ig_government_of_india: "インド政府"
  ig_government_of_india_desc: "インドの政府は、インドの英国の王冠の利益を高めることに取り組むヨーロッパの植民地管理を指しています。"

  ig_bhadralok: "バハドロックス"
  ig_bhadralok_desc: "Bhadralok、または「gentlemen」は、インド社会のマネージド・ミドルクラスを網羅しています。 本グループは、インドの征服中に東インドの会社と整合したネイティブ・ベンガル商人、産業家、およびフィンナーチェスの間で、ベンガルに発祥の地です。"

  ig_kisanharu: "Kisanharuさん"
  ig_kisanharu_desc: "Kisanharuは、ネパールの伝統的な農家や農民です。 自分の興味は、大自然に恵まれています。"
