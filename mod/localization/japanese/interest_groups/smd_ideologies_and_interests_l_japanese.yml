 # leaders
 
 ideology_marxist_leader: "マークシスト"
 ideology_marxist_leader_desc: "評議会の規則、公共の所有権、集団農業、そして自由資本主義との急激な休憩を支持する革命的な社会主義のリーダー。"
 ideology_state_socialist_leader: "社会主義者"
 ideology_state_socialist_leader_desc: "ソーシャルメディアのリーダーを一元化し、一方のパーティや技術面の国家の方向性、コマンド経済性、大規模な公共システムを好む。"
 ideology_left_wing_populist_leader: "左翼ポピリスト"
 ideology_left_wing_populist_leader_desc: "再頒布、保護主義、民主主義、そしてオリグエンシャル規則への強い敵意を混合する反エリートのマス政治のリーダー。"
 ideology_democratic_socialist_leader: "民主社会主義者"
 ideology_democratic_socialist_leader_desc: "選挙、労働力、社会的所有権、強靭な福祉、民主的な自由を支持する民主党左の指導者。"
 ideology_green_leader: "グリーン"
 ideology_green_leader_desc: "環境の民主主義のリーダーは、生態規制、公財、市民の自由、および産後の改革に焦点を当てました。"
 ideology_state_capitalist_leader: "国家資本主義者"
 ideology_state_capitalist_leader_desc: "市場を受け入れるが、強力な国家、戦略的産業、集中銀行、およびガイドされた投資を望む開発リーダー。"
 ideology_market_socialist_leader: "市場社会主義者"
 ideology_market_socialist_leader_desc: "民主的な監督の下で協力、貿易組合、福祉、および市場メカニズムを支持する分散型社会主義のリーダー。"
 ideology_progressive_leader: "進捗状況"
 ideology_progressive_leader_desc: "平等な権利、福祉の拡大、教育、市民の自由、および管理された市場改革に焦点を合わせた改革家。"
 ideology_social_liberal_leader: "社会解放"
 ideology_social_liberal_leader_desc: "福祉、平等な市民権、教育、規制資本主義の市場を支援する自由民主指導者。"
 ideology_technocrat_leader: "テクノクラット"
 ideology_technocrat_leader_desc: "世俗主義、管理計画、国家能力、規制市場、および科学的ガバナンスをサポートする専門家主導者。"
 ideology_liberal_leader: "リベラル"
 ideology_liberal_leader_desc: "憲法の共和国、市民の自由、自由な貿易、民間市場および法的平等を支える主流の審議的な指導者。"
 ideology_moderate_leader: "モデレート"
 ideology_moderate_leader_desc: "根本的な改革を圧迫し、安定した混合システムで最も一般的なのは、実用的確立のリーダー。"
 ideology_neoliberal_leader: "ネオリベラル"
 ideology_neoliberal_leader_desc: "自由貿易、ラワシーズ・フェール、プライベート・プロビジョニング、会計拘束、技術機関を支持する市場指向の自由指導者。"
 ideology_conservative_leader: "コンテンツ"
 ideology_conservative_leader_desc: "社会的秩序、限られた改革、適度な市場経済、伝統、慎重な国民主義を支持するステータス・キオの右リーダー。"
 ideology_corporatist_leader: "コーポラティスト"
 ideology_corporatist_leader_desc: "州のビジネス・ラボ機関によって組織される介入者またはラシズ・フェールの資本主義を支持する資本主義の調整のリーダー。"
 ideology_theocrat_leader: "テオクラット"
 ideology_theocrat_leader_desc: "国家、学校、裁判所、市民権を求める宗教的な指導者は、公式の宗教の周りに注文しました。"
 ideology_right_wing_libertarian_leader: "右翼リバタリアン"
 ideology_right_wing_libertarian_leader_desc: "民間機関、低福祉、フリーメディア、および弱い内部セキュリティを支持する反国家市場リーダー。"
 ideology_classical_liberal_leader: "クラシックリベラル"
 ideology_classical_liberal_leader_desc: "自由貿易、限られた政府、財産権、代表者機関、および法律の規則を支持する旧正式な憲法者。"
 ideology_neocon_leader: "ネオコン"
 ideology_neocon_leader_desc: "プロフェッショナルな武力、海外の介入、資本機関、および国家安全保障を支持する緩和された指導者を緩和しました。"
 ideology_jihadist_leader: "ジハディスト"
 ideology_jihadist_leader_desc: "過激な圧力下にあるイスラム国家宗教諸国からしか出られない宗教指導者。"
 ideology_minarchist_leader: "ミンアーキスト"
 ideology_minarchist_leader_desc: "公共の権限のラッシズ・フェール、プライベート・システム、および近くのロールバックを支える極端に小さい州の市場リーダー。"
 ideology_right_wing_populist_leader: "右翼ポピリスト"
 ideology_right_wing_populist_leader_desc: "反エリート国民のポピュリストの指導者は、高精細で審美的な民俗に上昇し、福祉チャボイニズム、保護主義、文化的なバックラッシュを混合します。"
 ideology_authoritarian_capitalist_leader: "権威ある資本主義者"
 ideology_authoritarian_capitalist_leader_desc: "自家的または指導的資本主義を自民主主義、警察力、検閲、および弱い反対下で支持するハードオーダーの資本主義者。"
 ideology_monarchist_leader: "モナークリスト"
 ideology_monarchist_leader_desc: "ほとんどがモンキーに表示され、遺伝的権威、伝統、教会、および階層を支持するダイナスティック・ロイヤリスト・リーダー。"
 ideology_fascist_leader: "ファシスト"
 ideology_fascist_leader_desc: "移民、単一パーティのルール、国家の暴力、クローズド・社会、および企業国家の経済を支持する超国籍の権威あるリーダー。"
 ideology_anarchist_leader: "アニメーション"
 ideology_anarchist_leader_desc: "自国、協力的所有権、ミリタス、無料スピーチ、警察、および強力な局所自律性を享受する反権威ある社会主義のリーダー。"
