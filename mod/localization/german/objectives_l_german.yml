objective_the_west_name_USA:0 "Der Sole Superpower"
objective_the_west_name_GBR:0 "Die Probleme"
objective_the_west_name_FRA:0 "Mitterrand's France"

objective_the_west_desc_USA:0 "Die Vereinigten Staaten von Amerika finden sich in einer einzigartigen Position an der Wende des 21. Jahrhunderts. Als die weltweit führende Supermacht, und die stärkste Nationstaaten-Menschen je gesehen hat, steht die Republik vor einer Reihe schwieriger äußerer und interner Fragen. Trotz des Zusammenbruchs Amerikas Hauptrivalen nennen die Sowjetunion, die Bedrohung des Terrorismus, China und verschiedene andere Bedrohungen der freien Welt Amerikas in Frage. Werden die Vereinigten Staaten die Welt Supermacht bleiben? Die Zeit wird es sagen."
objective_the_west_desc_GBR:0 "1992 wuchs das Vereinigte Königreich mit wirtschaftlicher Unsicherheit und politischer Turbulenz. Das Land war vor kurzem aus einer tiefen Rezession hervorgegangen, die durch eine hohe Arbeitslosigkeit und das Vertrauen der Verbraucher gekennzeichnet war. Zu den britischen Bienen, der Instabilität in Nordirland, die heute als "The Troubles" bekannt ist, hinzukommen, bleibt ein heißes Thema der Debatte. Wie wird Britannia diese turbulenten Zeiten überleben?"
objective_the_west_desc_FRA:0 "Die politische Landschaft Frankreichs war geprägt von wachsender Spannung über die europäische Integration und die inländischen wirtschaftlichen Herausforderungen. Der Präsident François Mitterrand, ein Sozialist in seiner zweiten Amtszeit, hatte eine sinkende Popularität, als das Land mit hoher Arbeitslosigkeit und schleppendem Wirtschaftswachstum kämpfte. Seine Regierung, unter der Leitung von Premierminister Pierre Bérégovoy, hat sich mit der öffentlichen Unzufriedenheit über Sparmaßnahmen zur Stabilisierung der Wirtschaft auseinandergesetzt. Politischerweise war Frankreich tief über den Vertrag von Maastricht geteilt, der die europäische Integration stärken und den Weg für den Euro ebnete. Hat die EU, was sie braucht, um das 21. Jahrhundert zu überleben?"

objective_the_east_name_RUS:0 "Fall der Sowjetunion"
objective_the_east_name_PRC:0 "Die Große Volksrepublik"
objective_the_east_name_IRQ:0 "Saddam Husseins Irak"

objective_the_east_desc_RUS:0 "Russland ist nach der Auflösung der Sowjetunion im Dezember 1991 eine dramatische politische Transformation. Boris Yeltsin, der erste Präsident der Russischen Föderation, stand vor der immensen Herausforderung, eine fledgling-demokratie zu führen und den chaotischen Übergang von einem zentralisierten kommunistischen System in eine Marktwirtschaft zu navigieren. Im Inland kämpfte die Regierung von Jelzin mit politischer Instabilität, steigender Inflation und weit verbreiteter sozialer Unruhe als Wirtschaftsreformen, bekannt als „Schocktherapie“, zu einer Härte für Millionen. Diplomatisch versuchte Russland, seine Rolle auf der Weltbühne neu zu definieren und neue Beziehungen zu den westlichen Mächten zu knüpfen, während er versuchte, Einfluss auf die ehemaligen Sowjetrepubliken zu erhalten."
objective_the_east_desc_PRC:0 "China entsteht vorsichtig aus internationaler Isolation und Sanktionen aus westlichen Nationen. Politisch war das Land fest unter der Kontrolle der Kommunistischen Partei Chinas (KPCh), wobei Deng Xiaoping einen erheblichen Einfluss aufrechterhielt, obwohl er formal von Führungspositionen zurückgezogen war. Seine berühmte "Southern Tour" hat Anfang 1992 das Engagement Chinas für die Wirtschaftsreform und die Öffnung wiederbelebt, was einen erneuten Schub in Richtung marktorientierter Politik und eine stärkere Integration mit der globalen Wirtschaft signalisiert."
objective_the_east_desc_IRQ:0 "Reeling from a devastating loss in the Gulf War last year, and facing intense international isolation. Saddam Hussein remained firmly in power, maintaining an iron grip on the country through brutal repression of internal dissent, particularly against the Shi'a in the south and the Kurds in the north. Iraq truly has several paths going into the 2000s.

objective_rising_powers_name_IDA:0 "Das indische Jahrhundert"
objective_rising_powers_name_BRZ:0 "Brasiliens Aufstieg zum Dominance"
objective_rising_powers_name_VNM:0 "Aufstieg von Vietnam"

objective_rising_powers_desc_IDA:0 "Indien navigiert eine Periode bedeutender politischer und wirtschaftlicher Veränderungen. Das Land wurde von Premierminister P.V. Narasimha Rao geleitet, der 1991 an die Macht kam und eine Reihe von transformativen Wirtschaftsreformen initiierte, die darauf abzielen, die Wirtschaft zu liberalisieren und sie enger mit dem globalen Markt zu integrieren."
objective_rising_powers_desc_BRZ:0 "1992 war Brasilien mitten in einem politischen Übergang nach Ende der Militärherrschaft 1985. Das Land wurde von Präsident Fernando Collor de Mello geleitet, der 1990 als erster direkt gewählter Präsident Brasiliens in über 20 Jahren fungierte. Collor’s Regierung begann mit einer Welle von Wirtschaftsreformen, die darauf abzielten, die Wirtschaft zu stabilisieren, aber seine Verwaltung konfrontierte bald eine wachsende öffentliche Missachtung aufgrund steigender Inflation und Korruptionsvorwürfe. Bis 1992 wurde Collor in einem großen Korruptionsskandal eingeweiht, der zu Massenprotesten führt und seine Vergebung fordert. Diplomatisch konzentrierte sich Brasilien auf die Verbesserung seines internationalen Images und den Ausbau seines Einflusses in Lateinamerika. Es war auch auf der Suche nach engeren Beziehungen zu den westlichen Ländern und behauptete seine Rolle in globalen Fragen, insbesondere in Umweltfragen im Zusammenhang mit dem Amazon-Regenwald. Die politische Instabilität und wirtschaftliche Schwierigkeiten haben jedoch weiterhin die nationale Agenda dominiert."
objective_rising_powers_desc_VNM:0 "Vietnam wurde nach jahrelanger Isolation nach Ende des Vietnamkrieges und den harten Auswirkungen wirtschaftlicher Sanktionen allmählich wieder in die internationale Gemeinschaft eingebunden. Im Jahr 1992 normalisierte Vietnam die Beziehungen zu den Vereinigten Staaten und trat der Assoziation der südostasiatischen Nationen (ASEAN) bei, die eine Verschiebung auf eine größere regionale Zusammenarbeit und ein Interesse an der Verbesserung der Beziehungen zum Westen signalisiert. Welchen Weg wird Vietnam nehmen? Es liegt an dir."
