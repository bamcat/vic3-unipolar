  ### ══════════════════════════════════════════
 ### AMNESTY INTERNATIONAL
 ### ══════════════════════════════════════════

 ngo_events.1.t: "Amnesty International Condemns Unsere Richtlinien"
 ngo_events.1.d: "Amnesty International hat einen verdammten Bericht über die Menschenrechtsakte unserer Nation veröffentlicht und unsere aktuellen Gesetze als systematische Verletzung der Grundfreiheiten bezeichnet. Die internationale Gemeinschaft hat sich bemerkbar gemacht, und unsere Regierung steht vor Druck, diese Bedenken anzugehen."
 ngo_events.1.a: "Ihre Kritik ändert nichts"
 ngo_events.1.b: "Wir werden ihre Bedenken überprüfen"

 ngo_events.2.t: "Amnesty International Praises Reform"
 ngo_events.2.d: "Unsere jüngsten Gesetzesreformen wurden von Amnesty International als bedeutender Fortschritt für die Menschenrechte anerkannt. Ihr Jahresbericht unterstreicht unsere Fortschritte und fördert den internationalen Ruf unserer Nation."
 ngo_events.2.a: "Wir sind stolz auf unseren Fortschritt"

 ngo_events.3.t: "Amnesty Reports über Bürgerliche Unruhe"
 ngo_events.3.d: "Amnesty International hat einen Sonderbericht veröffentlicht, in dem die weit verbreiteten zivilen Unruhen, die unsere Nation erobern, dokumentiert werden. Sie fordern unsere Regierung auf, die Ursachen der Unzufriedenheit durch eine sinnvolle Reform und nicht durch Repression anzugehen."
 ngo_events.3.a: "Wir werden Reformen berücksichtigen"
 ngo_events.3.b: "Unsere inneren Angelegenheiten sind nicht ihre Sorge"

 ### ══════════════════════════════════════════
 ### RED CROSS
 ### ══════════════════════════════════════════

 ngo_events.10.t: "Rotes Kreuz Angebote Humanitäre Hilfe"
 ngo_events.10.d: "Das Internationale Rote Kreuz hat den Einsatz humanitärer Helfer zur Unterstützung von Zivilisten angeboten, die durch den anhaltenden Konflikt betroffen sind. Ihre Hilfsteams sind bereit, medizinische Versorgung, Schutz und Nahrung für vertriebene Bevölkerungsgruppen in unseren Kriegsregionen zu bieten."
 ngo_events.10.a: "Wir begrüßen ihre Unterstützung"
 ngo_events.10.b: "Wir können ausländischen Arbeitern in einer Kriegszone nicht erlauben"

 ngo_events.11.t: "Red Cross Criticizes Wartime Conduct"
 ngo_events.11.d: "Das Internationale Rote Kreuz hat eine öffentliche Erklärung abgegeben, die tiefe Besorgnis über das Verhalten unserer Streitkräfte zum Ausdruck bringt. Berichte über umfangreiche zivile Opfer und Infrastrukturvernichtung in den Konfliktzonen haben internationale Aufmerksamkeit erregt. Sie fordern alle Parteien auf, die Genfer Konventionen zu respektieren."
 ngo_events.11.a: "Wir werden mit ihren Ermittlern zusammenarbeiten"
 ngo_events.11.b: "Wir leugnen diese Behauptungen"

 ngo_events.12.t: "Rotes Kreuz Angebote Krise Relief"
 ngo_events.12.d: "Trotz fehlender offener Kriegsführung hat das Internationale Rote Kreuz eine wachsende humanitäre Krise innerhalb unserer Grenzen festgestellt. Weit verbreitete zivile Unruhen und wirtschaftliche Störungen haben Bedingungen geschaffen, die internationale Hilfe erfordern. Sie bieten die Koordinierung von Hilfsmaßnahmen für betroffene Bevölkerungsgruppen."
 ngo_events.12.a: "Wir akzeptieren ihre Hilfe"
 ngo_events.12.b: "Wir können das selbst bewältigen"

 ### ══════════════════════════════════════════
 ### IAEA
 ### ══════════════════════════════════════════

 ngo_events.20.t: "IAEA fordert nukleare Inspektion"
 ngo_events.20.d: "Die Internationale Atomenergieagentur hat formell den Zugang zu unseren Atomanlagen für eine umfassende Sicherheits- und Compliance-Prüfung beantragt. Als Nichtunterzeichner des Nichtverbreitungsvertrages hat unser Atomprogramm die internationale Kontrolle verstärkt. Die IAEO versichert uns, dass die Inspektion Routine ist, aber die Ablehnung würde ein klares Signal an die internationale Gemeinschaft senden."
 ngo_events.20.a: "Unsere Einrichtungen sind offen für die Inspektion"
 ngo_events.20.b: "Unser Atomprogramm ist eine souveräne Angelegenheit"

 ngo_events.21.t: "IAEO unterstützt nukleare Sicherheit"
 ngo_events.21.d: "Nach einer Überprüfung unseres Atomprogramms hat die Internationale Atomenergie-Agentur unser Engagement für Sicherheitsstandards und die Einhaltung der Nichtverbreitung offiziell gewürdigt. Unsere Einhaltung der NPT und die Zusammenarbeit mit internationalen Inspektoren haben unsere Position in der globalen Atomgemeinschaft gestärkt."
 ngo_events.21.a: "Wir sind weiterhin für friedliche Kernenergie engagiert"

 ngo_events.22.t: "IAEO erhebt Proliferationsbelange"
 ngo_events.22.d: "Die Internationale Atomenergieagentur hat Alarm über die Richtung unseres Atomprogramms ausgelöst. Ohne NPT-Mitgliedschaft und mit unserer fortgesetzten Weigerung, mit Inspektoren zusammenzuarbeiten, hat die IAEO eine formelle Erklärung abgegeben, die Besorgnis über mögliche Waffenentwicklung zum Ausdruck bringt. Die internationale Gemeinschaft beobachtet genau."
 ngo_events.22.a: "Wir sind offen für den Dialog"
 ngo_events.22.b: "Wir behaupten unser souveränes Recht auf Kerntechnologie"

 ### ══════════════════════════════════════════
 ### MODIFIERS
 ### ══════════════════════════════════════════

 ngo_amnesty_scrutiny: "Unter Amnesty Scrutin"
 ngo_amnesty_scrutiny_desc: "Amnesty International überwacht unsere Menschenrechtsakte nach neuer Kritik. Die Legitimität der Regierung steht unter Druck."

 ngo_amnesty_reform_pressure: "Reformdruck"
 ngo_amnesty_reform_pressure_desc: "Amnesty Internationals Bericht über die zivile Unruhe hat den inländischen und internationalen Druck für die Reform geschaffen, hat aber dazu beigetragen, die revolutionäre Stimmung zu dämpfen."

 ngo_redcross_aid: "Humanitäre Hilfe des Roten Kreuzes"
 ngo_redcross_aid_desc: "Rote Kreuzarbeiter leisten humanitäre Hilfe für Zivilisten in Konfliktzonen, reduzieren die Sterblichkeit und verbessern unseren internationalen Ruf."

 ngo_redcross_cooperation: "Zusammenarbeit mit dem Roten Kreuz"
 ngo_redcross_cooperation_desc: "Unsere Zusammenarbeit mit dem Roten Kreuz hinsichtlich des Kriegsverhaltens hat unsere internationale Haltung verbessert und die von unseren militärischen Aktionen erzeugte Scham verringert."

 ngo_redcross_relief: "Rotes Kreuz Crisis Relief"
 ngo_redcross_relief_desc: "Das Rote Kreuz bietet humanitäre Hilfe in dieser Zeit der zivilen Krise und hilft, die betroffenen Bevölkerungen zu stabilisieren."

 ngo_iaea_inspectors: "IAEA Inspektoren präsentieren"
 ngo_iaea_inspectors_desc: "IAEA-Inspektoren arbeiten in unseren Kernanlagen und teilen technisches Know-how und Sicherheitswissen. Ihre Präsenz beschleunigt den Technologietransfer und erhöht unseren diplomatischen Ruf."
