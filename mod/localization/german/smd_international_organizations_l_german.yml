 io_iaea_name: "Internationale Atomenergieagentur"
 io_iaea_abbreviation: "IAEO"
 io_iaea_desc: "Die IAEO fördert die friedliche Nutzung von Kernenergie und arbeitet daran, ihren Einsatz für militärische Zwecke zu verhindern. Sie führt Inspektionen durch, leistet technische Hilfe und setzt internationale Sicherheitsstandards für Kernkraftwerke."

 io_redcross_name: "Internationales Rotes Kreuz"
 io_redcross_abbreviation: "ICRC"
 io_redcross_desc: "Das Internationale Rote Kreuz bietet humanitäre Hilfe bei bewaffneten Konflikten und Naturkatastrophen. Es überwacht die Einhaltung der Genfer Konventionen, besucht Kriegsgefangene und erleichtert die Kommunikation zwischen getrennten Familienmitgliedern."

 io_amnesty_name: "Amnesty International"
 io_amnesty_abbreviation: "KI"
 io_amnesty_desc: "Amnesty International untersucht und enthüllt Menschenrechtsverletzungen weltweit. Es geht um die Freilassung politischer Gefangener, die Abschaffung von Folter und die Todesstrafe sowie den Schutz von Flüchtlingen und Migranten."

