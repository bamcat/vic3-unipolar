 ### ═══════════════════════════════════════
 ### GAME CONCEPTS
 ### ═══════════════════════════════════════

 concept_international_organization: "Internationale Organisation"
 concept_international_organization_desc: "Internationale Organisationen sind Institutionen, die über nationale Grenzen hinweg tätig sind, um Politik zu koordinieren, Handel zu fördern, kollektive Sicherheit zu gewährleisten oder den kulturellen Austausch zwischen ihren Mitgliedstaaten zu fördern. Sie kommen in mehreren Formen: [concept_free_trade_agreement]s, [concept_financial_agreement]s, [concept_military_defense_agreement]s, [concept_cultural_pact]s und [concept_cooperative_agreement]s."

 concept_intergovernmental_organization: "Regierungsorganisation"
 concept_intergovernmental_organization_desc: "Eine zwischenstaatliche Organisation ist eine [concept_international_organization], deren Mitglieder souveräne Nationen sind. Im Gegensatz zu [concept_nongovernmental_organization]s benötigen IGOs eine formelle Mitgliedschaft und können erhebliche diplomatische, wirtschaftliche oder militärische Vorteile bieten."

 concept_nongovernmental_organization: "Nichtregierungsorganisation"
 concept_nongovernmental_organization_desc: "Nicht-Governmental Organizations sind unabhängige Institutionen, die international tätig sind, ohne von jeder Regierung kontrolliert zu werden. Alle Nationen sind standardmäßig mit NRO verbunden. Regierungen können wählen, sie zu verbieten, zu tolerieren oder zu subventionieren, was die Meinung der NGO und die Vorteile, die sie bieten, betrifft."

 concept_international_treaty: "Internationaler Vertrag"
 concept_international_treaty_desc: "Ein internationaler Vertrag ist ein formelles verbindliches Abkommen zwischen souveränen Nationen. Im Gegensatz zu [concept_intergovernmental_organization]s erfordern Verträge keine laufende Organisationsmitgliedschaft — eine Nation ist entweder ein Unterzeichner oder sie ist es nicht. Die Unterzeichner erhalten diplomatische Vorteile, während der Rücktritt die Beziehungen zu anderen Unterzeichnern beschädigt."

 international_treaty_type:0 "[concept_international_treaty]
 concept_free_trade_agreement: "Freihandelsabkommen"
 concept_free_trade_agreement_desc: "Ein Freihandelsabkommen ist ein [concept_international_organization], das Handelshemmnisse zwischen den Mitgliedstaaten verringert, den Warenaustausch und das Wirtschaftswachstum fördert."

 concept_financial_agreement: "Finanzabkommen"
 concept_financial_agreement_desc: "Ein Finanzabkommen ist ein [concept_international_organization], das sich auf die monetäre Zusammenarbeit, die Entwicklungsfinanzierung und die finanzielle Stabilität seiner Mitglieder konzentriert. Mitglieder erhalten +5% Einfluss und +1 Diplomatische Reputation."

 concept_military_defense_agreement: "Abkommen über die militärische Verteidigung"
 concept_military_defense_agreement_desc: "Ein militärisches Verteidigungsabkommen ist eine [concept_international_organization], die auf dem Prinzip der kollektiven Sicherheit aufgebaut ist. Ein Angriff auf ein Mitglied gilt als Angriff auf alle."

 concept_cultural_pact: "Kulturpakt"
 concept_cultural_pact_desc: "Ein kultureller Pakt ist ein [concept_international_organization], der das gemeinsame Erbe, die Sprache und den kulturellen Austausch zwischen seinen Mitgliedern fördert."

 concept_cooperative_agreement: "Kooperationsabkommen"
 concept_cooperative_agreement_desc: "Ein kooperatives Abkommen ist ein [concept_international_organization], das sich auf eine breite multilaterale Diplomatie konzentriert. Im Gegensatz zu anderen Organisationstypen, kooperative Vereinbarungen nicht direkt bieten Modifikatoren. Ihr Einfluss wird durch Entschließungen und Initiativen ausgeübt."

 concept_united_nations: "Vereinte Nationen"
 concept_united_nations_desc: "Die Vereinten Nationen sind eine [concept_cooperative_agreement] der Weltnationen, die sich der Aufrechterhaltung des internationalen Friedens, der Sicherheit und der Zusammenarbeit widmen."

 concept_nato: "NATO"
 concept_nato_desc: "Die Nordatlantik-Vertragsorganisation ist eine [concept_military_defense_agreement] bindende nordamerikanische und europäische Nationen in der kollektiven Verteidigung."

 concept_g7: "G7"
 concept_g7_desc: "Die Gruppe der Sieben ist eine [concept_financial_agreement] der größten fortgeschrittenen Volkswirtschaften der Welt, die die Finanz- und Geldpolitik koordiniert."

 concept_opec: "OPEC"
 concept_opec_desc: "Die Organisation der Petroleum exportierenden Länder ist eine [concept_free_trade_agreement], die die Erdölpolitik unter den großen ölproduzierenden Nationen koordiniert."

 concept_eec: "EWG"
 concept_eec_desc: "Die Europäische Wirtschaftsgemeinschaft ist eine [concept_free_trade_agreement] zur Schaffung eines gemeinsamen Marktes unter den europäischen Mitgliedstaaten."

 concept_arab_league: "Arabische Liga"
 concept_arab_league_desc: "Die Arabische Liga ist eine [concept_cultural_pact] Förderung der Zusammenarbeit zwischen arabischsprachigen Nationen."

 concept_imf: "IWF"
 concept_imf_desc: "Der Internationale Währungsfonds ist ein [concept_financial_agreement] zur Förderung der internationalen Währungskooperation und der Finanzstabilität."

 concept_esa: "ESA"
 concept_esa_desc: "Die Europäische Raumfahrtagentur ist eine [concept_cooperative_agreement], die der Raumexploration und -nutzung gewidmet ist."

 concept_asean: "ASEAN"
 concept_asean_desc: "Der Verband der südostasiatischen Nationen ist ein [concept_cooperative_agreement] zur Förderung des Wirtschaftswachstums und der regionalen Stabilität in Südostasien."

 concept_saarc: "SAARC"
 concept_saarc_desc: "Die südasiatische Vereinigung für regionale Zusammenarbeit ist eine [concept_cooperative_agreement] Förderung der regionalen Zusammenarbeit zwischen südasiatischen Staaten."

 concept_cis: "GUS"
 concept_cis_desc: "Die Commonwealth of Independent States ist eine [concept_cooperative_agreement] für die Koordination zwischen mehreren Post-Sowjet-Staaten."

 concept_who: "Wer"
 concept_who_desc: "Die Weltgesundheitsorganisation ist eine [concept_cooperative_agreement], die die internationale Gesundheitspolitik koordiniert."

 concept_iaea: "IAEO"
 concept_iaea_desc: "Die International Atomic Energy Agency ist eine [concept_nongovernmental_organization], die den friedlichen Einsatz von Kernenergie fördert und die Atomverbreitung verhindert."

