 # European Union
 
 je_european_union: "Europäische Union"
 je_european_union_reason: "Die Europäische Union gehört zu den ehrgeizigsten politischen und wirtschaftlichen Projekten des modernen Zeitalters.\nx id=1/> Aufbauend auf den Grundsätzen der wirtschaftlichen Integration, der gemeinsamen Governance und der kollektiven Sicherheit bietet die EU ihren Mitgliedern einen gemeinsamen Markt, eine koordinierte Handelspolitik und einen Sitz am Tisch bei der Gestaltung der Zukunft des Kontinents. Die Mitgliedschaft bringt das Versprechen des freien Waren-, Dienstleistungs-, Kapital- und Personenverkehrs — eine beispiellose Möglichkeit zum Wohlstand.\nx id=3/> Die Union ist jedoch nicht ohne ihre Herausforderungen. Die Mitglieder müssen komplexe Verhandlungen, die Einhaltung supranationaler Vorschriften und Kompromisse zu Elementen nationaler Souveränität navigieren. Die tiefere Integration wächst, je mehr das Schicksal jedes Mitglieds an das des Kollektivs gebunden ist.\nx id=5/> Ob ein Land in der EU gedeiht oder kämpft, hängt von seiner Fähigkeit ab, nationale Interessen mit dem Gemeinwohl auszugleichen und einen Weg innerhalb einer Union zu formulieren, die mehr als die Summe ihrer Teile sein soll."

