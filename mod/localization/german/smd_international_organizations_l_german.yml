 ### ═══════════════════════════════════════
 ### ORGANIZATIONS — Names & Descriptions
 ### ═══════════════════════════════════════

 ### United Nations
 io_un_name: "Vereinte Nationen"
 io_un_abbreviation: "UN"
 io_un_desc: "Die [concept_united_nations] ist eine [concept_cooperative_agreement] gegründet, um den internationalen Frieden und die Sicherheit zu erhalten, freundliche Beziehungen zwischen Nationen zu entwickeln und den sozialen Fortschritt zu fördern. Im Gegensatz zu anderen [concept_intergovernmental_organization]s gibt die UN ihren Mitgliedern keine direkten Modifikatoren. Sein Einfluss wird durch diplomatische Entschließungen, friedenserhaltende Mandate und globale Initiativen ausgeübt."
 io_un_tooltip: "Die [concept_united_nations] ist ein [concept_cooperative_agreement] der Weltnationen.\n Klicken Sie, um Details anzuzeigen."

 ### NATO
 io_nato_name: "Organisation des Nordatlantikvertrags"
 io_nato_abbreviation: "NATO"
 io_nato_desc: "Die [concept_nato] ist eine [concept_military_defense_agreement], die 1949 gegründet wurde und die nordamerikanische und europäische Nationen in der kollektiven Verteidigung bindet. Ein bewaffneter Angriff auf ein Mitglied gilt als Angriff gegen alle. Die NATO koordiniert gemeinsame militärische Übungen, vereinheitlicht die Ausrüstung und hält integrierte Kommandostrukturen aufrecht."

 ### G7
 io_g7_name: "Gruppe von Sieben"
 io_g7_abbreviation: "G7"
 io_g7_desc: "Die [concept_g7] ist eine [concept_financial_agreement] mit den weltweit größten fortgeschrittenen Volkswirtschaften. Die Mitglieder koordinieren die Steuerpolitik, die Geldpolitik und die Wirtschaftspolitik. Die Mitgliedschaft verleiht erheblichem diplomatischen Einfluss und finanzielle Glaubwürdigkeit."

 ### OPEC
 io_opec_name: "Organisation der Petroleum exportierenden Länder"
 io_opec_abbreviation: "OPEC"
 io_opec_desc: "Die <x id=========================================================================================================================================================================================================================================================== Die OPEC will eine Stabilisierung der Ölmärkte und faire Renditen für die Produktion von Nationen gewährleisten."

 ### EEC
 io_eec_name: "Europäische Wirtschaftsgemeinschaft"
 io_eec_abbreviation: "EWG"
 io_eec_desc: "Die [concept_eec] ist eine [concept_free_trade_agreement] zur Schaffung eines gemeinsamen Marktes unter den europäischen Mitgliedstaaten. Es reduziert Handelshemmnisse, harmonisiert die wirtschaftlichen Vorschriften und fördert den freien Waren-, Dienstleistungs-, Kapital- und Arbeitsverkehr in den Mitgliedstaaten."
 
 ### Arab League
 io_arab_league_name: "Arabische Liga"
 io_arab_league_abbreviation: "LAS"
 io_arab_league_desc: "Die [concept_arab_league] ist eine [concept_cultural_pact] arabischsprachiger Nationen, die die politische, wirtschaftliche, kulturelle und soziale Zusammenarbeit ihrer Mitglieder fördert. Die Liga koordiniert Politik in Fragen von gemeinsamem Interesse und vermittelt Streitigkeiten zwischen arabischen Staaten."

 ### IMF
 io_imf_name: "Internationale Währungsfonds"
 io_imf_abbreviation: "IWF"
 io_imf_desc: "Die [concept_imf] ist eine [concept_financial_agreement], die die internationale monetäre Zusammenarbeit, die Wechselkursstabilität und die geordneten Wechselkursmechanismen fördert. Es bietet finanzielle Unterstützung und politische Beratung für die Mitgliedstaaten, die Schwierigkeiten bei der Zahlungsbilanz haben."

 ### ESA
 io_esa_name: "Europäische Raumfahrtagentur"
 io_esa_abbreviation: "ESA"
 io_esa_desc: "Die [concept_esa] ist eine [concept_cooperative_agreement], die der Erforschung und Nutzung des Weltraums gewidmet ist. Die Mitgliedstaaten bündeln Ressourcen, um Startfahrzeuge, Satelliten und wissenschaftliche Missionen zu entwickeln, die keine einzige europäische Nation allein erreichen könnte."

 ### ASEAN
 io_asean_name: "Vereinigung der südostasiatischen Nationen"
 io_asean_abbreviation: "ASEAN"
 io_asean_desc: "Die <x id=========================================================================================================================================================================================================================================================== Die ASEAN erleichtert die regionale Stabilität und bietet einen Rahmen für den multilateralen Dialog in der Region Asien-Pazifik."

 ### WHO
 io_saarc_name: "Südasiatischer Verband für regionale Zusammenarbeit"
 io_saarc_desc: "Die [concept_saarc] ist eine [concept_cooperative_agreement] unter südasiatischen Nationen, die auf die regionale Zusammenarbeit, die Entwicklungszusammenarbeit und den multilateralen Dialog abzielen."

 io_cis_name: "Gemeinsamkeit unabhängiger Staaten"
 io_cis_desc: "Die <x id==========================================================================================================================================================================================================================================================="

 io_who_name: "Weltgesundheitsorganisation"
 io_who_abbreviation: "Wer"
 io_who_desc: "Die [concept_who] ist eine [concept_cooperative_agreement] gerichtete und koordinierte internationale Gesundheitspolitik. Es bietet Führung in globalen Gesundheitsfragen, setzt Normen und Standards, überwacht Gesundheitstrends und koordiniert Antworten auf internationale Gesundheitsnotfälle."

 ### ═══════════════════════════════════════
 ### TREATIES — Names & Descriptions
 ### ═══════════════════════════════════════

 io_treaty_geneva_name: "Genfer Konventionen"
 io_treaty_geneva_desc: "Eine Reihe von Verträgen, die als Genfer Konventionen bekannt sind, sind für die Festlegung von Normen des Völkerrechts für die humanitäre Behandlung während des bewaffneten Konflikts verantwortlich. Unterzeichner der [concept_international_treaty] verpflichten sich, verwundete Soldaten, Kriegsgefangene und Zivilisten in Kriegszeiten zu schützen."

 io_treaty_cwc_name: "Übereinkommen über chemische Waffen"
 io_treaty_cwc_desc: "Das Chemical Weapons Convention ist ein [concept_international_treaty], das die Entwicklung, Produktion, Akquisition, Lagerhaltung, Retention, Übertragung und Verwendung chemischer Waffen verbietet. Die Unterzeichner verpflichten sich, bestehende Lagerbestände unter internationaler Kontrolle zu zerstören."

 io_treaty_npt_name: "Nichtverbreitungsvertrag"
 io_treaty_npt_desc: "Der Vertrag über die Nichtverbreitung von Kernwaffen ist eine [concept_international_treaty], die darauf abzielt, die Verbreitung von Kernwaffen zu verhindern, die Abrüstung zu fördern und den friedlichen Einsatz von Kernenergie unter internationalen Schutzmaßnahmen zu erleichtern."

 io_treaty_bwc_name: "Biologische Waffenkonvention"
 io_treaty_bwc_desc: "Das Biologische Waffenübereinkommen ist ein [concept_international_treaty], das die Entwicklung, Produktion und Lagerhaltung von biologischen und Giftwaffen untersagt. Es war der erste multilaterale Abrüstungsvertrag, um eine ganze Kategorie von Waffen zu verbieten."

 io_treaty_cat_name: "Übereinkommen gegen Folter"
 io_treaty_cat_desc: "Das Übereinkommen gegen Folter ist eine [concept_international_treaty], die alle Formen von Folter und grausamer, unmenschlicher oder erniedrigender Behandlung oder Strafe untersagt. Die Unterzeichner verpflichten sich zu wirksamen Maßnahmen, um Folter innerhalb ihrer Zuständigkeit zu verhindern."

