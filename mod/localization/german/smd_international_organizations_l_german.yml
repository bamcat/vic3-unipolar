 io_nato_desc: "Die [concept_nato] ist eine [concept_military_defense_agreement] bindende nordamerikanische und europäische Nationen in der kollektiven Verteidigung. Ein bewaffneter Angriff auf ein Mitglied gilt als Angriff gegen alle. Die Teilnahme an der NATO schafft automatisch gegenseitige Verteidigung Pakt Verträge mit jedem bestehenden Mitgliedstaat."
 
 io_opec_desc: "Die [concept_opec] ist eine Organisation von großen Erdölexportierenden Nationen, die die Ölproduktionspolitik koordiniert. Die Mitgliedstaaten profitieren von Kartellpreisen, gewinnen einen erheblichen Handelsvorteil bei Ölexporten und einen verbesserten Extraktionsdurchsatz von koordinierten Investitionen."
 
 io_eec_desc: "Die <x id=========================================================================================================================================================================================================================================================== Die Mitglieder teilen einen gemeinsamen Markt mit standardisierten Produktvorschriften und koordinierten Handelspolitiken, wodurch Handelshemmnisse über Grenzen hinweg reduziert werden."
 
 io_arab_league_desc: "Die [concept_arab_league] ist eine [concept_cultural_pact] arabischsprachiger Nationen, die politische, wirtschaftliche, kulturelle und soziale Zusammenarbeit fördert. Gemeinsames Erbe beschleunigt den Austausch von Technologie und Ideen, während die Solidarität der Mitgliedsstaaten hilft, innere revolutionäre Drücke zu unterdrücken."
 
