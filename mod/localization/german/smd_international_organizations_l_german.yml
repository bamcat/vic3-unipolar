 # United Nations
 je_united_nations: "Vereinte Nationen"
 je_united_nations_reason: "\nx id=1/>Die Vereinten Nationen dienen als internationales Gremium für Diplomatie, Friedenssicherung und humanitäre Anstrengungen.\nx id=3/Permanent Security Council Members:\nx [GetGlobalVariable('permanent_members_1').GetCountry.GetName]x id=6/>x id=7/>x id=8/>x Die Vereinten Nationen dienen als internationales Gremium für Diplomatie, Friedenssicherung und humanitäre Bemühungen. Die Entscheidungen der Vereinten Nationen, insbesondere der Sicherheitsrat, können unmittelbar zukünftige Ereignisse in Ihrem Land beeinflussen."

