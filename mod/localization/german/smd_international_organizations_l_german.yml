 # ── TREATY ARTICLES ──────────────────────
 
 defense_attache: "Verteidigungsattaché senden"
 defense_attache_desc: "Einbettung von Militärberatern und Verbindungsbeamten mit den Streitkräften des Ziellands. Das Ziel gewinnt Erfahrung und senkt die militärischen Kosten; die Quelle gewinnt Einfluss und diplomatischen Stand. Das Quellland muss eine größere Stromprojektion als das Ziel beibehalten."
 
 cultural_exchange: "Kulturaustausch"
 cultural_exchange_desc: "Gründung eines formalen Programms des kulturellen Austauschs — gemeinsame Ausstellungen, akademische Programme und Personen-zu-Personen-Kontakt. Beide Länder gewinnen Ansehen, Einfluss und werden attraktiver für Migranten."
 
 research_partnership: "Forschungspartnerschaft"
 research_partnership_desc: "Eine formale Vereinbarung, Forschungsprogramme und akademische Institutionen zu teilen. Beide Länder profitieren von einer verbesserten Forschungsgeschwindigkeit und Technologieausbreitung. Erfordert beide Parteien, zumindest anerkannte Befugnisse zu sein."
 
 human_development_collaboration: "Zusammenarbeit im Bereich Human Development"
 human_development_collaboration_desc: "Die reichen Länderfonds-Entwicklungsprogramme im Ziel — Gesundheitswesen, Bildung, Wohlfahrt. Die Quelle zahlt laufende Kosten im Austausch für Einfluss und Prestige. Die Vereinbarung bricht, wenn die Wirtschaft des Herkunftslandes unter das Ziel fällt."
 
 research_partnership_rank_tt: "Beide Länder müssen zumindest anerkannte Befugnisse zur Teilnahme an einer Forschungspartnerschaft haben"
 
