 ### ══════════════════════════════════════════

 opec_events.1.t: "OPEC Vote Initiiert"
 opec_events.1.d: "Ein Mitgliedsland hat eine Abstimmung innerhalb der Organisation der Petroleum exportierenden Länder gefordert. Alle Mitglieder sind eingeladen, ihre Stimmen über den OPEC-Journaleintrag abzugeben."
 opec_events.1.a: "Wir werden unsere Position prüfen"

 opec_events.10.t: "OPEC Vote inklusive"
 opec_events.10.d: "Die Abstimmung über die OPEC ist abgeschlossen und die Ergebnisse werden verhandelt."

 opec_events.11.t: "OPEC steigert Produktion"
 opec_events.11.d: "Die OPEC-Mitgliedstaaten haben zur Erhöhung der Ölproduktionsquoten gestimmt. Für das nächste Jahr werden alle Mitgliedstaaten von einem höheren Extraktionsdurchsatz und einer verbesserten Handelspositionierung für Erdölexporte profitieren."
 opec_events.11.a: "Die Armaturen sind offen"

 opec_events.12.t: "OPEC Schneidet Produktion"
 opec_events.12.d: "Die OPEC-Mitgliedstaaten haben zur Senkung der Ölproduktionsquoten gestimmt. Für das nächste Jahr werden alle Mitgliedstaaten ihre Ölproduktion einschränken, um die globalen Angebots- und Förderpreise zu verschärfen."
 opec_events.12.a: "Wir werden"

 opec_events.13.t: "OPEC Öl Embargo Imponiert"
 opec_events.13.d: "Die Organisation der Petroleum exportierenden Länder hat beschlossen, ein Ölembargo zu verhängen. Die OPEC-Mitgliedstaaten werden die Erdölausfuhren gemeinsam in das Zielland einschränken und ihre Wirtschaft stark stören."
 opec_events.13.a: "Dies wird den globalen Handel neu gestalten"

