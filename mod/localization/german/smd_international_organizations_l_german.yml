 eu_cultural_exchange_desc: "Die Mitgliedschaft in der Europäischen Union hat das kulturelle Verständnis, die Migration und die Verbreitung neuer Ideen und Technologien gefördert."
 je_eu_membership_request: "Antrag auf EU-Mitgliedschaft"
 je_eu_membership_request_reason: "Ihre Regierung hat einen förmlichen Antrag auf Beitritt zur Europäischen Union gestellt.\nx id=1/> Dieser Prozess umfasst langwierige Verhandlungen, politische Reformen und die Angleichung an EU-Gesetze und -Standards. In den kommenden Jahren wird Ihr Land auf seiner wirtschaftlichen Stabilität, Governance, Menschenrechte und Einhaltung demokratischer Prinzipien bewertet.\nx id=3/>Erfolgreicher Beitritt würde Ihnen gewähren:\n Zugang zum EU-Binnenmarkt\n- Freier Waren-, Dienstleistungs-, Kapital- und Personenverkehr mit anderen Mitgliedstaaten<x id=>6/- Beteiligung an EU-Entscheidungsgremien\nx id=8/> Der Prozess ist jedoch politisch sensibel und kann sowohl im Inland als auch in den bestehenden EU-Mitgliedern Widerstand leisten."
 eu_membership_process: "Beginnt der EU-Mitgliedschaftsprozess"
 request_to_join_eu_decision: "Antrag auf Beitritt zur EU"
 request_to_join_eu_decision_desc: "förmlich für den Beitritt zur Europäischen Union gelten."
 
 eu_events.0.t: "Beitritt zur Europäischen Union"
 eu_events.0.d: "Wir wurden formell in die Europäische Union aufgenommen"
 
 # NATO
 
 allow_leave_nato: "Erlaubt Ihnen, nato in den nächsten Monaten zu verlassen"
 left_nato: "Die NATO verlassen"
 leave_nato: "Lassen Sie die NATO"
 leave_nato_desc: "Unsere NATO-Mitgliedschaft wurde zurückgewiesen, so dass das Militär als unabhängige Kraft fungieren kann, frei von amerikanischem Einfluss."

 # imf

 je_imf_loan: "IWF Darlehensprogramm"
 je_imf_loan_reason: "Ein Darlehen des Internationalen Währungsfonds wurde auf [ROOT.GetCountry.GetName] ausgeweitet. Im Gegenzug zur Notfinanzierung hat das Land erhebliche Bedingungen akzeptiert: hohe Zinsen, obligatorischer Freihandel und Verpflichtungen gegenüber den großen Befugnissen, die den Fonds unterschreiben."

 imf_je_obligations_active_tt: "Große Machtverpflichtungen sind noch in Kraft. Ausländische Gläubiger halten Druck auf wichtige wirtschaftspolitische Entscheidungen."
 imf_je_obligations_met_tt: "Große Leistungsverpflichtungen wurden entbunden. Das Land behält volle wirtschaftliche Souveränität — obwohl die Kreditbedingungen in Kraft bleiben."

 decision_leave_imf: "Lassen Sie den IWF"
 decision_leave_imf_desc: "Rücktritt vom Internationalen Währungsfonds. Das Land wird nicht mehr für IWF-Darlehen unterstützt werden, wenn es sich um einen Konkurs handelt, sondern frei von Gläubigerverpflichtungen und Störungen sein wird. Diese Entscheidung kann nicht rückgängig gemacht werden.\nx id=1/> Hinweis: Sie können während eines aktiven IWF-Darlehens nicht gehen."
 imf_cannot_leave_while_indebted_tt: "Kann den IWF nicht verlassen, während ein aktives Darlehen vorhanden ist"


 imf_button_pay_obligations_name: "Auszahlungspflichten"
 imf_button_pay_obligations_desc: "Bezahlen Sie die verbleibenden großen Machtverpflichtungen früh. Kosten 500 Gold und erfordert Schulden unter 50%, aber sofort wieder volle wirtschaftliche Souveränität und verbessert die Beziehungen zu allen großen Mächten."
 imf_pay_obligations_cost_tt: "Erfordert skalierte Schulden unter 50 % und 500 Gold"
 imf_obligations_paid_tt: "Verpflichtungen werden früh ausgezahlt. Große Machtverhältnisse verbesserten sich."

 # imf_events.1 — Loan offer
 imf_events.1.t: "IWF Intervention"
 imf_events.1.d: "Die Schatzkammer von [ROOT.GetCountry.GetName] ist in der Krise. Schulden haben ein Niveau erreicht, das Märkte nervös macht und Gläubiger vorsichtig. Der Internationale Währungsfonds hat eine Delegation zur Notfinanzierung versandt.\nx id=2/> Die Bedingungen sind nicht großzügig. Die Zinssätze werden auf Strafebene festgesetzt. Das Land wird verpflichtet sein, den freien Handel unabhängig von seiner bestehenden Wirtschaftspolitik zu übernehmen. Und die großen Befugnisse, die den Fonds unterschreiben, erwarten, dass bestimmte Verpflichtungen erfüllt werden. Aber die Alternative, die sich ohne Sicherheitsnetz auf einen unrechtmäßigen Konkurs nähert, kann schlimmer sein."
 imf_events.1.f: "Souveränität und Solvenz sind selten gleichzeitig verfügbar."
 imf_events.1.a: "Annahme des Darlehens — wir brauchen die Finanzierung"
 imf_events.1.b: "Verweigerung — wir werden unsere eigenen Angelegenheiten verwalten"

 # imf_events.2 — Great power notification
 imf_events.2.t: "IWF-Darlehen erweitert"
 imf_events.2.d: "[SCOPE.sCountry('imf_debtor_scope').GetName] hat ein IWF-Darlehenpaket akzeptiert. Als eine der großen Befugnisse, die den Fonds unterschreiben, hält [ROOT.GetCountry.GetName] jetzt Verpflichtungen aus dem Schuldnerstaat. Die Vereinbarung kommt mit strategischen und finanziellen Auswirkungen."
 imf_events.2.f: "Schulden sind eine Form der Diplomatie."
 imf_events.2.a: "Gut - das gibt uns Hebel"
 imf_events.2.b: "Unglücklicherweise — die auferlegten Bedingungen sind zu hart"

 # imf_events.3 — Loan complete
 imf_events.3.t: "IWF-Programm abgeschlossen"
 imf_events.3.d: "Fünf Jahre nach Übernahme eines IWF-Darlehens hat [ROOT.GetCountry.GetName] seine Programmverpflichtungen erfüllt. Die Zinszahlungen wurden geleistet, die Bedingungen sind ausgedauert, und die großen Macht Gläubiger zufrieden. Das Land entsteht aus der Erfahrung mit seiner Souveränität wiederhergestellt — und man hofft, mit seinen Finanzen in besserer Ordnung als wenn es begann."
 imf_events.3.f: "Die Führung ist ausgewogen. Die Lektionen sind schwerer zu messen."
 imf_events.3.a: "Wir haben es geschafft"

 # imf_events.4 — Leaving
 imf_events.4.t: "Rücktritt vom IWF"
 imf_events.4.d: "[ROOT.GetCountry.GetName] wird vom Internationalen Währungsfonds zurückgezogen. Die Entscheidung spiegelt die Überzeugung wider, dass die Kosten der Mitgliedschaft — die Bedingungen, die Verpflichtungen, der Verlust der wirtschaftlichen Souveränität während einer Krise — die Vorteile des Zugangs zur Notfinanzierung überwiegen.\nx id=2/> Die großen Mächte werden nicht zufrieden sein. Und sollte [ROOT.GetCountry.GetName] immer wieder in Konkurs gehen, es wird kein Sicherheitsnetz geben."
 imf_events.4.f: "Unabhängigkeit hat einen Preis. Und auch Abhängigkeit."
 imf_events.4.a: "Wir stehen allein."

 # imf_events.5 — Great power notification of leaving
 imf_events.5.t: "Ein Land hat den IWF verlassen"
 imf_events.5.d: "[SCOPE.sCountry('imf_leaver_scope').GetName] hat sich aus dem Internationalen Währungsfonds zurückgezogen. Die Entscheidung ist ein Rückschlag auf die internationale Finanzordnung und Signale, die [SCOPE.sCountry('imf_leaver_scope').GetName] beabsichtigt, seinen eigenen wirtschaftlichen Kurs, besser oder schlechter."
 imf_events.5.f: "Ein weniger Schuldner. Ein kleiner Hebel."
 imf_events.5.a: "Notierte"

 # imf_events.10 — War bonds
 imf_events.10.t: "War Bonds"
 imf_events.10.d: "Mit der Verhaftung und dem Krieg hat das Finanzministerium eine Sofortmaßnahme vorgeschlagen: die Ausgabe von Kriegsanleihen. Bürgerinnen und Bürger und Investoren würden aufgefordert, dem Staat im Gegenzug für die künftige Rückzahlung Zinsen zu gewähren und eine sofortige Bargeldinjektion zur Finanzierung der Kriegsanstrengung bereitzustellen.\nx id=1/> Die Anleihen werden funktionieren - aber sie sind Schulden und Schulden in Kriegszeiten Verbindungen schnell. Der Verbrauch wird steigen, da das Geld in die Militärmaschine fließt."
 imf_events.10.f: "Eine Nation leiht sich gegen ihre Zukunft, um ihre Gegenwart zu verteidigen."
 imf_events.10.a: "Ausgeben der Anleihen — wir brauchen jetzt Geld"
 imf_events.10.b: "Dezline — wir werden unsere Zukunft nicht vernichten"

 imf_loan_modifier: "IWF Kreditbedingungen"
 imf_loan_modifier_desc: "Ein IWF-Darlehen ist vorhanden. Zinssätze sind strafrechtlich hoch und der freie Handel ist obligatorisch. Ausländische Investitionen fließen ein, aber die wirtschaftliche Souveränität ist eingeschränkt und die Legitimität gelitten hat."

 imf_great_power_obligations: "Große Machtverpflichtungen"
 imf_great_power_obligations_desc: "Die großen Befugnisse, die den IWF unterschreiben, halten Verpflichtungen aus diesem Land als Bedingung des Darlehens. Ihr Einfluss auf die Wirtschaftspolitik ist real."

 imf_refused_loan_modifier: "IWF-Verbindlichkeiten"
 imf_refused_loan_modifier_desc: "Das Land lehnte die IWF-Hilfe ab und wird seine Schulden allein verwalten. Die Kreditbedingungen haben sich dadurch verschlechtert."

 imf_post_loan_stability: "Rückforderung nach dem Programm"
 imf_post_loan_stability_desc: "Das IWF-Programm ist abgeschlossen. Nach Erfüllung seiner Verpflichtungen hat die Regierung ein Maß an Glaubwürdigkeit gewonnen — und die Finanzen des Landes sind in besserer Ordnung."

 imf_left_modifier: "Außerhalb des IWF"
 imf_left_modifier_desc: "Dieses Land wurde vom IWF zurückgezogen. Es ist frei von Gläubigerverpflichtungen, aber von der internationalen Notfallfinanzierung abgeschnitten. Die Investitionsströme werden reduziert."

 war_bonds_modifier: "War Bonds Ausgestellt"
 war_bonds_modifier_desc: "Notkriegsanleihen wurden ausgegeben, um die Kriegsanstrengung zu finanzieren. Die Einnahmen sind gestiegen, aber die Schulden wachsen und der Verbrauch der Versorgung ist gestiegen."

 war_bonds_refused_modifier: "War Bonds dekoriert"
 war_bonds_refused_modifier_desc: "Die Regierung lehnte die Ausgabe von Kriegsanleihen ab. Die fiskale Disziplin wird aufrechterhalten, aber die Armee fühlt die Prise."

 un_events.6.t: "Unsere Kräfte Rückkehr aus der UN-Mission"
 un_events.6.d: "[ROOT.GetCountry.GetAdjective] Kräfte haben ihren Dienst in der UN-Friedensmission abgeschlossen und sind nach Hause zurückgekehrt. Der Beitrag war in militärischer Hinsicht bescheiden, aber aussagekräftig diplomatisch — [ROOT.GetCountry.GetName] war anwesend, wenn es darum ging. Der General ist zurück."
 un_events.6.a: "Willkommen zu Hause"
 
 un_peacekeeping_contribution: "Beitrag der Vereinten Nationen zur Friedenssicherung"
 un_peacekeeping_contribution_desc: "[ROOT.GetCountry.GetName] trugen zu einer UN-Friedensmission bei. Die internationale Gemeinschaft hat zur Kenntnis genommen."
 
  # ── EVENT 300: RESOLUTION PASSED ─────────────────────────────────
 
 un_events.300.t: "UN-Resolution Passiert"
 un_events.300.d: "Die Generalversammlung hat sich auf eine Entschließung zur Bewältigung weltweiter Fragen und zur Koordinierung der globalen Zusammenarbeit zu einem bestimmten Thema geeinigt."
 un_events.300.f: "Die Entschließung trägt das Gewicht des internationalen Konsenses — für das, was das wert ist."
 un_events.300.a: "Notierte"
 
 UN_RES_DESC_ENVIRONMENT: "#bold Resolution of Environmental Protection#!x id=2/>Die Mitgliedstaaten verpflichten sich zu koordinierten Umweltstandards und nachhaltigem Ressourcenmanagement.\nx id=4/>x id=5/>x id=6/>x id=7/> Alle Länder erhalten den #bold UN-Umweltresolution<x id=>9/ modifier für 12 Monate."
 UN_RES_DESC_PEACE: "#bold Resolution on World Peace#!x id=2/>Die Generalversammlung bekräftigt erneut die Verpflichtung zur friedlichen Beilegung von Streitigkeiten und zur Verringerung des interstaatlichen Konflikts.\nx id=4/>x id=5/>x id=6/>x id=7/>x id=7/> Alle Länder erhalten den #bold UN Peace Resolution<x id=>9/ modifier für 12 Monate."
 UN_RES_DESC_ECONOMY: "#bold Resolution on Economic Development#!x id=2/>Die Mitgliedstaaten befürworten koordinierte Investitionen in Entwicklungsländer und die Senkung der Handelshemmnisse.\nx id=4/>x id=5/>x id=6/>x id=7/> Alle Länder erhalten den #bold UN Economic Development Resolution#! Modifier für 12 Monate."
 UN_RES_DESC_TECHNOLOGY: "#bold UNESCO-Technologie-Resolution#!x id=2/>Die Generalversammlung stellt Rahmen für den Technologieaustausch und die kooperative wissenschaftliche Forschung zwischen Mitgliedsstaaten fest.\nx id=4/>x id=5/>x id=6/>x id=7/> Alle Länder erhalten den #bold UN Technology Resolution<x id=>9/ modifier für 12 Monate."
 
 # ── EVENT 301: RESOLUTION FAILED ─────────────────────────────────
 
 un_events.301.t: "UN-Resolution verfehlt"
 un_events.301.d: "Der Antrag vor der Generalversammlung der Vereinten Nationen hat die notwendige Mehrheit nicht gesichert. Die Entschließung wurde besiegt und die Sitzung ohne Ergebnis unterbrochen.\nx id=1/>No Maßnahmen werden umgesetzt. Die Sponsoring-Delegation hat ihre Enttäuschung zum Ausdruck gebracht. Andere haben es nicht."
 un_events.301.f: "Die Vereinten Nationen tun, was die Vereinten Nationen am besten tun."
 un_events.301.a: "Schadensersatz"
 
 # ── EVENT 302: SANCTIONS (TARGET) ────────────────────────────────
 
 un_events.302.t: "[ROOT.GetCountry.GetName] Sanktionen der Vereinten Nationen"
 un_events.302.d: "Der Sicherheitsrat der Vereinten Nationen hat eine Entschließung verabschiedet, in der wirtschaftliche Sanktionen auf [ROOT.GetCountry.GetName] verhängt werden. Die Entschließung wurde mit der erforderlichen Mehrheit unterstützt und wirkt sofort.\nx id=2/> Handelsbeschränkungen sind jetzt in Kraft. Diplomatische Isolation vertieft sich. Die Mitgliedstaaten werden - wenn auch nicht erzwungen - zur Einhaltung der Sanktionsregelung erwartet.\nx id=4/> Die Sanktionen bleiben für fünf Jahre in Kraft, es sei denn, der Sicherheitsrat veranlasst, diese zu überprüfen."
 un_events.302.f: "Souveränität isoliert kein Land aus der Meinung der Welt."
 un_events.302.a: "Wir lehnen diese Entschließung ab."
 
 # ── EVENT 303: CONDEMNATION (TARGET) ─────────────────────────────
 
 un_events.303.t: "[ROOT.GetCountry.GetName] von den Vereinten Nationen verurteilt"
 un_events.303.d: "Die Generalversammlung der Vereinten Nationen hat eine förmliche Entschließung verabschiedet, in der [ROOT.GetCountry.GetName] verurteilt wird. Die Verurteilung wurde im Anschluss an die Aussprache über den Boden mit Mehrheitsentscheidung genehmigt.\nx id=2/> Eine Verurteilung führt keinen verbindlichen Durchsetzungsmechanismus, sondern stellt eine formelle Erklärung der internationalen Unzulänglichkeiten dar und wird sich auf [ROOT.GetCountry.GetAdjective] auswirken, die seit Jahren in der diplomatischen Gemeinschaft stehen."
 un_events.303.f: "Worte sind keine Waffen. Aber sie hinterlassen Spuren."
 un_events.303.a: "Wir werden nicht unterrichtet"
 
 # ── EVENT 304: SANCTIONS/CONDEMNATION (OBSERVERS) ────────────────
 
 un_events.304.t: "UN Punitive Resolution Passed"
 un_events.304.d: "Der Sicherheitsrat der Vereinten Nationen hat eine Entschließung verabschiedet, in der Sanktionen gegen ein anderes Land erhoben werden. Sie werden schwere Strafen erleiden, da die Welt die wirtschaftliche Belastung gegen sie koordiniert."
 un_events.304.f: "Die Maschinerie der internationalen Zensur dreht sich langsam, aber es dreht sich um."
 un_events.304.a: "Notierte"
 
 UN_304_DESC_SANCTIONS: "Der Sicherheitsrat der Vereinten Nationen hat zur Verhängung wirtschaftlicher Sanktionen gegen [global_var:un_sanction_target.GetName] gestimmt. Die Entschließung, die durch die erforderliche Marge verabschiedet wurde.\nx id=2/>x id=3/> wird den Handelsbeschränkungen, der diplomatischen Isolation und erheblichen wirtschaftlichen Sanktionen für die Dauer des Sanktionszeitraums entgegenstehen. Die Mitgliedstaaten sollen die Beschränkungen einhalten."
 UN_304_DESC_CONDEMNATION: "Die Generalversammlung der Vereinten Nationen hat mit Mehrheitsabstimmung formell [global_var:un_sanction_target.GetName] verurteilt. Die Entschließung stellt eine offizielle Erklärung der internationalen Unzulänglichkeiten dar.\n>x id=2/> Während eine Verurteilung keine verbindliche Vollstreckung trägt, stellt sie [global_var:un_sanction_target.GetAdjective] auf dem Datensatz durch und beeinflusst ihren internationalen Stand."
 
