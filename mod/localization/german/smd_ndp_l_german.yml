 # ==========================================
 # OPENING EVENT — ndp_events.0
 # ==========================================

 ndp_events.0.t: "Ein nationales Entwicklungsprogramm beginnt"
 ndp_events.0.d_industrial: "Die Regierung von [ROOT.GetCountry.GetName] hat sich zu einem Jahrzehnt der industriellen Expansion verpflichtet. Die Investitionen fließen in Fabriken, Minen und die Infrastruktur, die sie verbindet. Der Plan ist ehrgeizig - und die Hindernisse beträchtlich - aber die Vision ist klar: die Produktionskapazität zu bauen, die [ROOT.GetCountry.GetName]'s Platz in der Welt definiert."
 ndp_events.0.d_military: "Die Regierung von [ROOT.GetCountry.GetName] hat sich zu einem Jahrzehnt der militärischen Expansion verpflichtet. Baracken werden gebaut, Offiziere trainiert und Lehren reformiert. Ob die Motivation Verteidigung, Abschreckung oder Ehrgeiz ist, die Botschaft an die Welt ist unverkennbar: [ROOT.GetCountry.GetName] will ernst genommen werden."
 ndp_events.0.d_resource: "Die Regierung von [ROOT.GetCountry.GetName] hat sich zu einem Jahrzehnt der Ressourcenwirtschaftsentwicklung verpflichtet. Das Land selbst — seine Böden und Mineralien — wird der Wachstumsmotor sein. Es ist eine Wette auf das, was [ROOT.GetCountry.GetName] bereits hat, und einen Plan, um viel mehr davon zu machen."
 ndp_events.0.d_service: "Die Regierung von [ROOT.GetCountry.GetName] hat sich zu einem Jahrzehnt der Entwicklung der Dienstleistungswirtschaft verpflichtet. Schulen, Banken und Regierungsministerien werden alle Investitionen sehen. Die Wette ist, dass ein intelligenteres, besser geführtes Land letztendlich stärker ist."
 ndp_events.0.f: "Zehn Jahre. Eine Richtung."
 ndp_events.0.a: "Beginn des Programms"

 # ==========================================
 # INDUSTRIAL PATH EVENTS
 # ==========================================

 ndp_events.1.t: "Die industrielle Frage"
 ndp_events.1.d: "Zwei Jahre in das Entwicklungsprogramm, die Richtung der industriellen Investitionen muss geklärt werden. Das Land kann nicht alles auf einmal aufbauen. Planer und Industrielle sind geteilt: einige befürworten die Konzentration der Ressourcen auf die Schwerindustrie — Eisen, Stahl, Kohle — die Süden der modernen Macht. Andere argumentieren, dass leichte Fertigung schnellere Rückkehr und breitere Beschäftigung bietet."
 ndp_events.1.f: "Stahl oder Stoff — die Nation muss wählen."
 ndp_events.1.a: "Schwere Industrie — bauen die Grundlagen der modernen Macht"
 ndp_events.1.b: "Leichtbau — Priorisierung von Beschäftigung und Konsumgütern"

 ndp_events.2.t: "Der Investment Drive"
 ndp_events.2.d: "Das industrielle Programm gewinnt an Dynamik, aber das Tempo des Baus hängt davon ab, woher die Hauptstadt kommt. Die Regierungsplaner drängen auf direkte staatliche Investitionen, indem sie Mittel auf vorrangige Sektoren ohne Marktunsicherheit lenken. Die privaten Industriellen behaupten, dass Wettbewerbs- und Gewinnanreize bessere Ergebnisse bringen werden als die bürokratische Zuweisung."
 ndp_events.2.f: "Der Markt oder der Plan — die Aussprache ist so alt wie die Industrie selbst."
 ndp_events.2.a: "Staatliche Investitionen — die Regierung wird bauen"
 ndp_events.2.b: "Private Unternehmen – Investoren anziehen und zurücktreten"

 ndp_events.3.t: "Die Arbeitsfrage"
 ndp_events.3.d: "Die Fabriken laufen und die Minen produzieren - aber die Arbeiter, die es möglich machen, fordern mehr. Das Entwicklungsprogramm hat Arbeitsplätze geschaffen, hat aber auch Erwartungen geschaffen. Fabrikbesitzer wollen längere Stunden und weniger Einschränkungen. Arbeitsorganisatoren wollen das Gegenteil. Die Regierung muss entscheiden, auf welcher Seite dieses Arguments sie steht."
 ndp_events.3.f: "Der Motor läuft auf Kohle — und auf die Menschen, die es graben."
 ndp_events.3.a: "Push-Produktivität — max."
 ndp_events.3.b: "Investitionen in Arbeitnehmer — bessere Bedingungen bedeuten stabiles, anhaltendes Wachstum"

 ndp_events.4.t: "Ein Jahrzehnt der Industrie"
 ndp_events.4.d: "Zehn Jahre industrielle Entwicklung sind abgeschlossen. Die Fabriken gebaut, die Eisenbahn verlegt, die Minen erweitert — die Ergebnisse sind real und sichtbar. <x id=========================================================================== Die Frage ist nun, was als nächstes kommt."
 ndp_events.4.f: "Die Schmiede hat ihre Arbeit getan."
 ndp_events.4.a: "Diagramm des nächsten Kurses"
 ten_year_programme_concluded:0 "Das Zehnjahresprogramm ist abgeschlossen."
 # ==========================================
 # MILITARY PATH EVENTS
 # ==========================================

 ndp_events.11.t: "Die Frage der Lehre"
 ndp_events.11.d: "Zwei Jahre Militärexpansion haben mehr Soldaten, mehr Waffen und mehr Optionen produziert – aber die grundlegende Frage der Lehre bleibt ungelöst. Das Generalstab ist geteilt. Eine Fraktion drückt für einen Fokus auf Landkraft: Massenarmeen, Verteidigungstiefe und kontinentale Dominanz. Eine andere argumentiert, dass die Schiffsausweitung eine größere strategische Flexibilität und die Fähigkeit bietet, Strom über die Grenzen [ROOT.GetCountry.GetName] hinaus zu projizieren."
 ndp_events.11.f: "Das Schwert oder die Flotte — jede impliziert eine andere Vision der Macht."
 ndp_events.11.a: "Landlehre — Bau der Armee, die kein Nachbar herausfordern kann"
 ndp_events.11.b: "Navale Doktrin — Projektmacht über den Horizont hinaus"

 ndp_events.12.t: "Die Beschaffungsschuld"
 ndp_events.12.d: "Das Militär braucht moderne Ausrüstung — aber woher sollte es kommen? Inländische Rüstungsproduktion würde neben militärischer Stärke industrielle Kapazität aufbauen, wird aber Zeit und Investitionen brauchen, um zu reifen. Ausländische Beschaffung bietet schnellere Ergebnisse zu finanziellen Kosten und schafft eine Abhängigkeit von externen Lieferanten, die einige Generäle beunruhigen."
 ndp_events.12.f: "Die beste Waffe ist die, die Sie tatsächlich felden können."
 ndp_events.12.a: "Bauen inländische Rüstungsindustrien — Investitionen in Selbstversorgung"
 ndp_events.12.b: "Ausland kaufen — die Kosten für sofortige Fähigkeit akzeptieren"

 ndp_events.13.t: "Der Geist der Armee"
 ndp_events.13.d: "Acht Jahre in das Militärprogramm, die Hardware ist vorhanden - aber Hardware allein gewinnt keine Kriege. Die Frage ist nun der Kampfgeist der Kraft. Einige Offiziere argumentieren für eine nationalistische Moralkampagne: Aufrufe an Patriotismus und nationale Ehre, die jeden Soldaten Kampf härter machen. Andere befürworten die Investition in die Professionalität des Offizierskorps — Führung, Taktik und institutionelle Kenntnisse."
 ndp_events.13.f: "Eine Armee kämpft mit ihrer Ausrüstung – und ihrer Seele."
 ndp_events.13.a: "Starten Sie eine nationalistische Moralkampagne — rühren Sie den Kampfgeist"
 ndp_events.13.b: "Professionalisieren Sie die Offizierskorps – investieren Sie in Führung"

 ndp_events.14.t: "Eine Dekade der militärischen Expansion"
 ndp_events.14.d: "Zehn Jahre militärische Entwicklung sind abgeschlossen. Die Streitkräfte von [ROOT.GetCountry.GetName] sind größer, besser ausgerüstet und leistungsfähiger als bei Beginn des Programms. Was sie mit dieser Fähigkeit tun — und ob die Investition die Kosten wert war — wird durch die folgenden Entscheidungen bestimmt."
 ndp_events.14.f: "Das Schwert wurde geschmiedet. Jetzt muss er seinen Zweck finden."
 ndp_events.14.a: "Diagramm des nächsten Kurses"

 # ==========================================
 # RESOURCE ECONOMY PATH EVENTS
 # ==========================================

 ndp_events.21.t: "Das Land Bounty"
 ndp_events.21.d: "Zwei Jahre in das Ressourcenprogramm, die grundlegende Wahl muss getroffen werden: Welche Art von Ressourcenwirtschaft wird [ROOT.GetCountry.GetName] bauen? Die Landwirtschaft — die Ernährung einer wachsenden Bevölkerung und die Erzeugung von Exportpflanzen — bietet Stabilität und breite Beschäftigung. Rohmaterialgewinnung — Bergbau, Protokollierung, Bohrungen — bietet schnellere Einnahmen, ist jedoch volatiler und lässt die Wirtschaft den Preisschwankungen ausgesetzt."
 ndp_events.21.f: "Die Erde gibt, was sie gibt. Die Frage ist, was Sie darüber stellen."
 ndp_events.21.a: "Landwirtschaft — Brotkorb bauen"
 ndp_events.21.b: "Extraktion — den Reichtum untergraben"

 ndp_events.22.t: "Die Landpolitik"
 ndp_events.22.d: "Fünf Jahre lang steht das Ressourcenprogramm seiner zentralen Landfrage gegenüber. Es gibt noch nicht beanspruchtes oder untergenutztes Gebiet, das in Produktion gebracht werden könnte, aber dies erfordert Investitionen in Infrastruktur, Siedler und Rechtsrahmen. Die Alternative besteht darin, die Produktion auf bestehendem Land zu intensivieren und mehr Output aus dem, was bereits funktioniert."
 ndp_events.22.f: "Neues Land oder tiefere Wurzeln — das ewige Dilemma des Bauern."
 ndp_events.22.a: "Erweitern in neues Land — öffnen Sie die Grenze"
 ndp_events.22.b: "Intensivierung der bestehenden Produktion — mehr von dem, was wir haben"

 ndp_events.23.t: "Die Ausfuhrfrage"
 ndp_events.23.d: "Acht Jahre in das Programm, der Ressourcensektor produziert - aber wer profitiert davon, wo er hingeht. Die Suche nach Exportverträgen mit ausländischen Märkten würde Umsatz ausbauen und [ROOT.GetCountry.GetName] in globale Handelsnetze integrieren, schafft aber Abhängigkeit von der Außennachfrage. Die Priorisierung der heimischen Versorgung würde das Land von Preisschocks isolieren und die Lebensmittelsicherheit stärken, aber die Gewinne des Exports verbieten."
 ndp_events.23.f: "Füttern Sie die Welt oder füttern Sie die Nation zuerst."
 ndp_events.23.a: "Seek-Exportmärkte — Verkauf des Überschusses im Ausland"
 ndp_events.23.b: "Vorrangige Inlandsversorgung — Nahrungsmittelsicherheit über Gewinn"

 ndp_events.24.t: "Ein Jahrzehnt der Ressourcenentwicklung"
 ndp_events.24.d: "Zehn Jahre Ressourcenwirtschaftsentwicklung sind abgeschlossen. Betriebe, Minen und Entnahmestellen von [ROOT.GetCountry.GetName] mehr produzieren als sie es taten, als das Programm begann. Ob die Gewinne ziemlich geteilt wurden - und ob die Extraktion nachhaltig war - sind Fragen im nächsten Jahrzehnt."
 ndp_events.24.f: "Was das Land nachgibt, erinnert sich das Land."
 ndp_events.24.a: "Diagramm des nächsten Kurses"

 # ==========================================
 # SERVICE ECONOMY PATH EVENTS
 # ==========================================

 ndp_events.31.t: "Die Servicefrage"
 ndp_events.31.d: "Zwei Jahre in das Dienstprogramm, die Richtung muss geklärt werden. Zwei Visionen einer Dienstleistungswirtschaft stehen im Vordergrund: der Finanzsektor — Banken, Versicherungen und Handel — der schnell Reichtum erzeugt und Investitionen anzieht oder Bildung und Bürokratie — Schulen, Universitäten und staatliche Institutionen —, die die Fähigkeit des Humankapitals und der Governance, die alles andere untermauert, baut."
 ndp_events.31.f: "Der Leiter oder die Bibliothek — beide sind Grundlagen der Moderne."
 ndp_events.31.a: "Finanzsektor — Aufbau der Banken und Handelshäuser"
 ndp_events.31.b: "Bildung und Bürokratie — Aufbau der Humankapital"

 ndp_events.32.t: "Die Talentfrage"
 ndp_events.32.d: "Fünf Jahre in der Dienstleistungswirtschaft wächst - aber es braucht qualifizierte Menschen, um dieses Wachstum zu erhalten. Eine Option ist, ausländische Talente zu gewinnen: öffnen Sie die Türen für Ingenieure, Finanziers und Profis aus dem Ausland, akzeptieren, dass einige der Gewinne wieder zu Außenseitern fließen. Der andere ist, in die häusliche Bildung zu investieren — langsamer, aber Baufähigkeiten, die bleiben."
 ndp_events.32.f: "Die besten Köpfe gehen, wo sie geschätzt werden."
 ndp_events.32.a: "Attrakt ausländisches Talent — öffnen Sie die Türen"
 ndp_events.32.b: "Investitionen in die häusliche Bildung — von innen"

 ndp_events.33.t: "Institutionelle Reform"
 ndp_events.33.d: "Acht Jahre lang braucht die Dienstleistungswirtschaft ihre Institutionen zu reifen. Zwei Wege stehen sich vor: Liberalisierung — Reduzierung von Vorschriften, Reduzierung von Bürokratie und freiere und institutionelle Stärkung der Märkte — Investitionen in Rechtsstaatlichkeit, Eigentumsrechte und die Zuverlässigkeit der Regierung selbst. Beide können Wachstum produzieren, aber sie produzieren verschiedene Arten von Ländern."
 ndp_events.33.f: "Die Regeln des Spiels sind genauso wichtig wie die Spieler."
 ndp_events.33.a: "Liberalisierung der Märkte — Deregulierung und Rückschritt"
 ndp_events.33.b: "Stärkung der Institutionen — Investitionen in Rechtsstaatlichkeit"

 ndp_events.34.t: "Ein Jahrzehnt der Serviceentwicklung"
 ndp_events.34.d: "Zehn Jahre Entwicklung der Dienstleistungswirtschaft sind abgeschlossen. Die Banken sind anspruchsvoller, die Schulen besser besetzt, die Regierung fähiger als wenn das Programm begann. Ob dies in die Art des breiten Wohlstands übergeht, der die Investition rechtfertigt, ist eine langfristige Frage — eine, die im nächsten Jahrzehnt zu beantworten beginnt."
 ndp_events.34.f: "Die Infrastruktur des Geistes überdauert alle anderen."
 ndp_events.34.a: "Diagramm des nächsten Kurses"

