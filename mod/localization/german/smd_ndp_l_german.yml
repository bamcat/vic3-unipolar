l_german:

 je_national_development: "Nationaler Entwicklungspfad"
 je_national_development_reason: "Jede Nation muss wählen, wo sie ihre Energien konzentrieren. Ein nationaler Entwicklungsplan konzentriert sich auf Ressourcen, Politik und politischen Willen für zehn Jahre. — die Wahl kann erst nach Abschluß des Programms rückgängig gemacht werden."

 je_foreign_investment: "Auslandsinvestitionen"
 je_foreign_investment_reason: "Kapital von großen Mächten zu gewinnen, kann die Entwicklung über das hinaus beschleunigen, was Haushaltsmittel erlauben. Ein ausländischer Investitionsvertrag würde das Land außerhalb des Unternehmens öffnen — mit allen Möglichkeiten und Abhängigkeiten, die mit sich bringen."
 has_foreign_investment_or_trade_agreement_with_west_tt:0 "Unterzeichnung eines ausländischen Investitions- und Handelsabkommens mit den Vereinigten Staaten, Großbritannien oder Frankreich"
 
 ndp_status_industrial_tt: "Industrielle Expansion ist im Gange. Das Land leitet Ressourcen für den Aufbau seiner Produktions- und Schwerindustriebasis."
 ndp_status_military_tt: "Militärische Expansion ist im Gange. Das Land investiert in seine Streitkräfte, Lehre und Verteidigungsindustrie."
 ndp_status_resource_tt: "Die Entwicklung der Ressourcenwirtschaft ist im Gange. Das Land konzentriert sich auf die Landwirtschaft und die Rohstoffgewinnung."
 ndp_status_service_tt: "Die Entwicklung der Service Economy ist im Gange. Das Land baut seinen Finanzsektor, seine Bildung und seine Staatskapazität auf."
 ndp_status_none_tt: "Derzeit ist kein Entwicklungspfad aktiv. Wählen Sie einen Weg, um ein zehnjähriges nationales Entwicklungsprogramm zu beginnen."

 fi_status_seeking_tt: "Das Land sucht ein ausländisches Investitionsabkommen mit großer Macht. Unterzeichnen Sie einen Investitionsvertrag, um diesen Journaleintrag abzuschließen."
 fi_status_secured_tt: "Ein ausländisches Investitionsabkommen wurde gesichert. Auslandskapital fließt ein."

 ndp_button_industrial_name: "Industrielle Expansion"
 ndp_button_industrial_desc: "Konzentrieren Sie sich auf nationale Ressourcen, um die Produktionsbasis aufzubauen. Steigert schwere Industrie, leichte Fertigung und Konstruktion. Sub-Auswahlen im Jahr 2: schwere Industrie vs leichte Herstellung."

 ndp_button_military_name: "Militärische Expansion"
 ndp_button_military_desc: "Priorisieren Sie die Streitkräfte. Erhöht Armee und Marine, Militärforschung und Waffenproduktion. Sub-Auswahlen im Jahr 2: Landlehre vs naval buildup."

 ndp_button_resource_name: "Ressourcenwirtschaft"
 ndp_button_resource_desc: "Bauen Sie die Wirtschaft um das Land. Steigert die Agrar- und Extraktivindustrie. Teilentscheidungen zum Jahr 2: Landwirtschaft vs Rohstoffgewinnung."

 ndp_button_service_name: "Service Economy"
 ndp_button_service_desc: "Entwicklung staatlicher Kapazitäten, Bildung und Finanzsektor. Steigert Bürokratie, Forschungsgeschwindigkeit und Investitionen. Teilentscheidungen zum Jahr 2: Finanzsektor gegen Bildung und Bürokratie."

 ndp_button_abandon_name: "Abandon Path"
 ndp_button_abandon_desc: "Verlassen Sie das aktuelle Entwicklungsprogramm. Alle aktiven Pfad-Modifier werden entfernt, und eine Prestige- und Legitimitätsstrafe wird für zwei Jahre gelten. Sie können dann einen neuen Pfad auswählen."

 fi_button_reject_name: "Ausländische Investitionen"
 fi_button_reject_desc: "Schließen Sie die Tür zu ausländischem Kapital. Dies wird den Journaleintrag beenden und eine langfristige Investitionsstrafe anwenden, wird jedoch die wirtschaftliche Unabhängigkeit und die Stärkung der Autorität erhalten."

