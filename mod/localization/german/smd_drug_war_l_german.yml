 mdw_button_declare_war_name:0 "Declare War auf den Kartellen"
 mdw_button_declare_war_desc:0 "Beauftragen Sie das [ROOT.GetCountry.GetAdjective] Militär auf eine direkte Kampagne gegen Kartellnetze. Kosten 100 Autorität und beginnt die Gegenkarte Kampagne im Ernst. Die Balken werden sich erst bewegen, wenn diese Erklärung abgegeben wird."
 
 mdw_button_deploy_commander_name:0 "Bereitstellung eines Commanders"
 mdw_button_deploy_commander_desc:0 "Wählen Sie einen General aus, um Gegenkarte Operationen über [ROOT.GetCountry.GetAdjective] Gebiet zu führen."
 mdw_need_general_tt:0 "Erfordert mindestens einen allgemeinen"
 
