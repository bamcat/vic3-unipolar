 mdw_peril_bar_desc:0 "Operation Peril: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]x id=2/>"
 
 mdw_bar_commander_active_tt:0 "Aktive [ROOT.GetCountry.GetAdjective] militärische Operationen"
 mdw_bar_multiple_states_tt:0 "Mehrere Kartellzustände — [ROOT.GetCountry.GetAdjective] Operationen werden dünn verteilt"
 mdw_bar_us_aid_tt:0 "[SCOPE.sCountry('c:USA').GetAdjective] militärische Hilfe liefert Intelligenz und logistische Unterstützung"
 mdw_bar_excess_authority_tt:0 "Starke Staatskapazität beschleunigt die Kampagne"
 mdw_bar_legitimacy_tt:0 "Hohe öffentliche Unterstützung hält [ROOT.GetCountry.GetAdjective] militärische Moral"
 mdw_bar_good_commander_tt:0 "Die taktische Fähigkeit des Commanders beschleunigt die Operationen"
 mdw_bar_at_war_tt:0 "Militärische Ressourcen werden in einen aktiven Krieg umgeleitet"
 mdw_bar_turmoil_tt:0 "Hohe nationale Turbulenzen behindern die [ROOT.GetCountry.GetAdjective] Kampagne"
 mdw_peril_base_tt:0 "In Kartellgebieten gehaltene Tätigkeiten tragen ständiges Risiko"
 mdw_peril_multiple_states_tt:0 "Über viele Fronten zu operieren, erhöht die Belichtung des Befehlshabers"
 mdw_peril_us_aid_tt:0 "[SCOPE.sCountry('c:USA').GetAdjective] Intelligenz reduziert die Fähigkeit der Kartelle, den Befehlshaber anzusprechen"
 mdw_peril_cautious_tt:0 "Der vorsichtige Ansatz des Commanders verringert das persönliche Risiko"
 
 # ==========================================
 # EVENTS
 # ==========================================
 
 # mdw_events.1 — War Declared
 mdw_events.1.t:0 "[ROOT.GetCountry.GetName] Erklärt den Krieg auf den Kartellen"
 mdw_events.1.d:0 "Nach Jahren der schleichenden Kartellausdehnung und gescheiterten Halbmaßen, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName]'s Regierung hat formell das [ROOT.GetCountry.GetAdjective] Militär zu einer Kampagne gegen die Narco-Netzwerke verübt. Die Erklärung ist bedeutsam — nicht nur betriebsbereit, sondern symbolisch. Der [ROOT.GetCountry.GetAdjective]-Zustand behauptet, dass er den Status quo.\nx id=5/> nicht akzeptiert. Die Kartelle werden antworten. Das Militär muss bereit sein."
 mdw_events.1.f:0 "Der Zustand hat seine Linie gezogen."
 mdw_events.1.a:0 "[ROOT.GetCountry.GetName] reklamiert, was ihm gehört"
 
 # mdw_events.2 — Commander Selection
 mdw_events.2.t:0 "Wer wird die Kampagne führen?"
 mdw_events.2.d:0 "Die Erklärung ist abgegeben worden. Jetzt muss ein Kommandant gewählt werden — man will den Kampf in Kartell-Gebiet nehmen, wo der Feind den Boden kennt, lokale Informanten hat, und ist bereit, Dinge zu tun, die die Armee nicht kann. Es wird ein schmutziger Kampf sein."
 mdw_events.2.f:0 "Der richtige General ändert alles."
 mdw_events.2.a:0 "Einsatz [SCOPE.sCharacter('mdw_commander_1').GetFullName]"
 mdw_events.2.b:0 "Einsatz [SCOPE.sCharacter('mdw_commander_2').GetFullName]"
 mdw_events.2.c:0 "Einsatz [SCOPE.sCharacter('mdw_commander_3').GetFullName]"
 
 # mdw_events.3 — Combat Patrol
 mdw_events.3.t:0 "Kontakt in [SCOPE.sState('mdw_active_state').GetName]"
 mdw_events.3.d:0 "[SCOPE.sCharacter('mdw_commander').GetFullName] meldet eine Reihe von Eingriffen mit Kartellkräften in [SCOPE.sState('mdw_active_state').GetName]. Die Kartelle kämpfen, um ihr Gebiet zu halten — mit Straßensperren, Scharfschützen und IEDs auf Ansätzen zu bekannten Festungen. Es werden Fortschritte erzielt, aber die Kosten in der Zeit und die Ressourcen sind beträchtlich."
 mdw_events.3.f:0 "Jeder Kilometer der Straße ist ein Kilometer entfernt, die Kartelle können nicht verwenden."
 mdw_events.3.a:0 "Drücken Sie hart — nehmen Sie das Gebiet schnell"
 mdw_events.3.b:0 "Advance methodisch — sichern Sie jede Position, bevor Sie weiter"
 
 # mdw_events.4 — State Cleared
 mdw_events.4.t:0 "[SCOPE.sState('mdw_active_state').GetName] Wird gelöscht"
 mdw_events.4.d:0 "Ein signifikanter operativer Erfolg: [SCOPE.sCharacter('mdw_commander').GetFullName] meldet, dass Kartellkräfte in [SCOPE.sState('mdw_active_state').GetName] gebrochen wurden. Ihre Befehlsstruktur wurde abgebaut, deren Logistikschnitt und ihre Schlüsselzahlen sind tot oder in Gewahrsam. [ROOT.GetCountry.GetAdjective] militärische Besatzungskräfte bewegen sich ein, um den Boden zu halten.\nx id=4/> Ein Staat ist wieder unter Kontrolle der Regierung. Noch mehr."
 mdw_events.4.f:0 "Die Karte ändert sich."
 mdw_events.4.a:0 "Weiter zum nächsten — halten Sie die Dynamik"
 
 # mdw_events.5 — Ambush
 mdw_events.5.t:0 "Ambush — [SCOPE.sCharacter('mdw_commander').GetFullName]'s Column Is Under Attack"
 mdw_events.5.d:0 "Kartellkanonen haben eine [ROOT.GetCountry.GetAdjective] Militärsäule in [SCOPE.sState('mdw_active_state').GetName] überfallen. Der Angriff wurde koordiniert — mehrere Schusspositionen, vorgeplante Abzugswege und Kenntnisse der Bewegungen der Spalte, die einen Informanten innerhalb der Kommandokette [ROOT.GetCountry.GetAdjective] andeuten. Es gibt Opfer. [SCOPE.sCharacter('mdw_commander').GetFullName] verwaltet das Engagement."
 mdw_events.5.f:0 "Die Karpulen kämpfen wie eine Armee, wenn sie wählen."
 mdw_events.5.a:0 "Kampf durch — verfolgen und zerstören sie"
 mdw_events.5.b:0 "Bruchkontakt — erneute Gruppe und spätere Wiederholung"
 
 # mdw_events.6 — Commander Under Fire
 mdw_events.6.t:0 "[SCOPE.sCharacter('mdw_commander').GetFullName] Ist in Danger"
 mdw_events.6.d:0 "Intelligenz hat bestätigt, was Feldberichte vorschlagen: Die Kartelle haben [SCOPE.sCharacter('mdw_commander').GetFullName] als Prioritätsziel identifiziert. Ein professionelles Attentatteam wurde gegen sie beauftragt. Die Bedrohung ist glaubwürdig. Das Zurückziehen des Befehlshabers auf [ROOT.GetCountry.GetCapital.GetCityHubName] würde das Risiko verringern, aber die Dynamik der Kampagne in einem kritischen Moment stoppen."
 mdw_events.6.f:0 "Die Karpulen studieren ihre Feinde."
 mdw_events.6.a:0 "Pull [SCOPE.sCharacter('mdw_commander').GetFullName] zurück — die Kampagne kann warten"
 mdw_events.6.b:0 "Drücken auf — [SCOPE.sCharacter('mdw_commander').GetFullName] akzeptiert das Risiko"
 
 # mdw_events.10 — Victory
 mdw_events.10.t:0 "Der Drogenkrieg ist gewebt"
 mdw_events.10.d:0 "[SCOPE.sCharacter('mdw_commander').GetFullName] sendet den endgültigen operationellen Bericht: Kartelle territoriale Kontrolle wurde über [ROOT.GetCountry.GetName] gebrochen. Die letzten Festungen wurden geklärt. Militärische Besatzung ist vorhanden. Die Kartellnetze bestehen noch — sie werden sich über Jahre in Schwächung wiederfinden — aber der [ROOT.GetCountry.GetAdjective]-Zustand hat die Souveränität über sein eigenes Gebiet wiedererobert.\nx id=4/> Das war nicht unvermeidlich. Es erforderte politischen Willen, militärisches Engagement und in vielerlei Hinsicht Glück. Was [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName] gewonnen hat, ist Zeit — Zeit, um die Bedingungen zu adressieren, die die Kartelle überhaupt möglich machten."
 mdw_events.10.f:0 "<x id==================================="
 mdw_events.10.a:0 "Ein harter Sieg – und ein Anfang"
 
 # mdw_events.11 — Commander Killed
 mdw_events.11.t:0 "[SCOPE.sCharacter('mdw_commander').GetFullName] Wurde getötet"
 mdw_events.11.d:0 "Das Schlimmste ist passiert. Der Kartell-Assassinationsbetrieb gelang. [SCOPE.sCharacter('mdw_commander').GetFullName] ist tot - bei einem Angriff getötet, dass die [ROOT.GetCountry.GetAdjective] Sicherheitsdienste trotz glaubwürdiger Warnungen nicht verhindern konnten. Die Nachrichten sind innerhalb von Stunden öffentlich. Die Kartelle feiern offen in den Straßen der Städte, die sie kontrollieren.\nx id=3/> Die Kampagne ist nicht vorbei. Aber es hat einen Schlag erlitten, der Monate dauern wird, um sich zu erholen. Ein neuer Kommandant muss gefunden werden — und die Kartelle werden die Zeit zur Konsolidierung nutzen."
 mdw_events.11.f:0 "Die Karpulen haben noch ihren wichtigsten Schlag getroffen."
 mdw_events.11.a:0 "Wir werden dadurch nicht gebrochen — der Kampf geht weiter"
 
 # mdw_events.20 — US Aid
 mdw_events.20.t:0 "[SCOPE.sCountry('c:USA').GetName] Hat ein militärisches Assistenzabkommen unterzeichnet"
 mdw_events.20.d:0 "[SCOPE.sCountry('c:USA').GetCapital.GetCityHubName] hat sich bewegt. [SCOPE.sCountry('c:USA').GetName] hat formell ein militärisches Assistenzabkommen mit [ROOT.GetCountry.GetName] unterzeichnet, das Geheimdienste, Beratungspersonal, Ausrüstung und logistische Unterstützung für die Gegenkarteskampagne begeht. Das Abkommen ist eine bedeutende politische Entwicklung: es signalisiert, dass [SCOPE.sCountry('c:USA').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCountry('c:USA').GetRuler.GetLastName]'s Administration hält die Stabilität von <x id=>5/ in Bezug auf direktes nationales Interesse.\nx id=7/> Für [ROOT.GetCountry.GetName] sind die praktischen Vorteile unmittelbar: die Autorität wird wiederhergestellt, die Ausrüstung fließt, und die Kartelle stehen nun einem Feind mit der vollen Intelligenz Apparat von [SCOPE.sCountry('c:USA').GetName] gegen sie arbeiten."
 mdw_events.20.f:0 "Wenn [SCOPE.sCountry('c:USA').GetName] begeht, verschiebt sich das Gleichgewicht."
 mdw_events.20.a:0 "Dies ändert die Kampagne ganz"
 
 # ==========================================
 # MODIFIERS
 # ==========================================
 
 mdw_war_declared_modifier:0 "Mexikanischer Drogenkrieg — Aktive Kampagne"
 mdw_war_declared_modifier_desc:0 "[ROOT.GetCountry.GetName] hat sein Militär zu einer direkten Kampagne gegen die Narco-Karten verübt. Die Behörde wird verzehrt und das Militär verlobt, aber der [ROOT.GetCountry.GetAdjective] Zustand behauptet sich selbst."
 
 mdw_us_aid_modifier:0 "Militärische Hilfe"
 mdw_us_aid_modifier_desc:0 "Eine aktive militärische Assistenzvereinbarung mit [SCOPE.sCountry('c:USA').GetName] bietet Intelligenz, Logistik und Ausrüstung zu [ROOT.GetCountry.GetName]'s Gegenkarte Kampagne."
 
 mdw_victory_modifier:0 "Drogenkrieg Wod"
 mdw_victory_modifier_desc:0 "[ROOT.GetCountry.GetName] hat den Drogenkrieg gewonnen. Die territoriale Kontrolle des Kartells wurde gebrochen, und der Staat hat die Souveränität wiedererobert. Die Bedingungen, die die Kartelle produzierten, bleiben — aber diese Schlacht wurde gewonnen."
 
 mdw_commander_killed_modifier:0 "Befehlshaber getötet in Aktion"
 mdw_commander_killed_modifier_desc:0 "Die Ermordung des Gegenkartellkommandos hat das öffentliche Vertrauen in [ROOT.GetCountry.GetName] geschüttelt und die Karpulen eingeprägt."
 
 mdw_troops_ambushed:0 "Trophäen betrunken"
 mdw_troops_ambushed_desc:0 "Eine [ROOT.GetCountry.GetAdjective] Militärsäule wurde von Kartellkräften überfallen, was zu Verletzten und vorübergehend zu einer Verringerung der Offensive führt."
 
 # Cartel territory modifier descriptions (MDW context)
 cartel_cjng_controlled:0 "CJNG-Gebiet"
 cartel_cjng_controlled_desc:0 "Jalisco New Generation Kartell-Agenten kontrollieren die kriminelle Wirtschaft dieses Staates. Die industrielle Aktivität wird gestört, die Infrastruktur verschlechtert sich und die Menschen verlassen [ROOT.GetCountry.GetAdjective] Gebiet."
 
 cartel_gulf_controlled:0 "Golfkarte Gebiet"
 cartel_gulf_controlled_desc:0 "Das Golfkartell hat hier eine territoriale Dominanz etabliert. Wirtschaftliche Aktivität wird unterdrückt und [ROOT.GetCountry.GetAdjective] staatliche Autorität ist nominell."
 
 cartel_sinaloa_controlled:0 "Sinaloa Kartellgebiet"
 cartel_sinaloa_controlled_desc:0 "Das Sinaloa Kartell kontrolliert diesen Zustand. Die landwirtschaftliche Produktion wurde gestört und die lokale Wirtschaft unter Aufsicht von Kartell."
 
 cartel_northeast_controlled:0 "Nordostkarte Gebiet"
 cartel_northeast_controlled_desc:0 "Das Kartell von Noreste hat hier Dominanz etabliert. Infrastruktur und Bauproduktivität in [ROOT.GetCountry.GetName] leiden."
 
 # usa war on drugs

 je_war_on_drugs:0 "Der Krieg gegen Drogen"
 je_war_on_drugs_reason:0 "Der Fluss der Drogen in [ROOT.GetCountry.GetName] ist eine nationale Krise. Kokain, Heroin und andere Stoffe — größtenteils in Lateinamerika hergestellt und über [ROOT.GetCountry.GetAdjective] grenzen hinweg geschmuggelt — sind verheerende Gemeinschaften, gewaltsame Straftaten und korrumpierende öffentliche Institutionen.\nx id=3/>x id=4/> [ROOT.GetCountry.GetRuler.GetLastName]'s Administration hat sich einer umfassenden Kampagne verpflichtet: internationale Partnerschaften, die das Angebot an der Quelle verschärfen, nationale Durchsetzung, um die Grenzen zu schließen, und soziale Investitionen zur Bewältigung der Nachfrage. Die Kampagne ist nicht ohne Kosten — die Ressourcen, die sie benötigt, um die breitere Wirtschaft abzuwägen —, aber die Alternative ist ein Land, das zunehmend mit fremden kriminellen Netzwerken betraut wird.\nx id=7/>x id=8/> Kartellgebiet kann sich in Mexiko ausweiten. Ein militärisches Assistenzabkommen mit der mexikanischen Regierung ist der Grundstein der internationalen Komponente dieser Kampagne."

 narco_economy_plantation_bonus:0 "Narco Economy"
 narco_economy_plantation_bonus_desc:0 "Der Drogenhandel hat sich in die landwirtschaftliche Wirtschaft von [ROOT.GetCountry.GetName] eingebettet. Die Pflanzleistung — vor allem Opium — läuft über normalem Niveau, das durch Kartellnachfrage und den korrupten Fluss des Narco-Gelds in die ländlichen Gemeinden gestützt wird."

 war_on_drugs_active_modifier:0 "Krieg gegen Drogen"
 war_on_drugs_active_modifier_desc:0 "Die [ROOT.GetCountry.GetAdjective] Regierung hat sich einer umfassenden Kampagne gegen Drogenhandel verpflichtet. Die Durchsetzungsbemühungen — häusliche Polizei-, Interdiktions- und internationale Zusammenarbeit — bilden Ressourcen aus der ganzen Wirtschaft und stellen eine bescheidene, aber reale Kosten für die nationale Produktivität dar."

 war_on_drugs_victory_modifier:0 "Krieg gegen Drogen — Won"
 war_on_drugs_victory_modifier_desc:0 "[ROOT.GetCountry.GetAdjective] Der Drogenkrieg hat seine erklärten Ziele erreicht. Das Angebot wurde unterdrückt, die Grenzen werden durchgesetzt, und der institutionellen Rahmen ist vorhanden. Die Kampagne hat [ROOT.GetCountry.GetName]'s Authority and prestige - obwohl die zugrunde liegenden Bedingungen, die die Drogennachfrage erzeugen, nicht gelöst wurden."

 wod_je_status_active:0 "Die Kampagne geht weiter."
 wod_je_status_ready:0 "Die Kampagne ist zum Abschluss bereit."

 wod_completion_mexico_tt:0 "Haben Sie einen #bold Military Assistance#! Pakt mit Mexiko."
 wod_completion_enforcement_tt:0 "Entspricht entweder #bold National Guard#! oder #bold Secret Police#!."
 wod_completion_opium_price_tt:0 "Suppress internationale Drogenversorgung, bis Drogen mindestens #bold 65% pricier#! auf dem amerikanischen Markt ist."
 wod_completion_schools_tt:0 "Erhöhen Sie die #bold Schulen#! Institution auf Ebene #bold 5#! oder höher."
 wod_completion_border_tt:0 "Entweder #bold Migrationskontrollen#! oder #bold Geschlossene Borders#!"
 wod_completion_no_safe_injection_tt:0 "Sie haben nicht #bold Safe Injection Sites#!."
 wod_completion_no_trafficking_allowed_tt:0 "Haben nicht #bold Trafficking Erlaubt#!."
 wod_completion_no_hard_drugs_decriminalized_tt:0 "Nicht haben #bold Hard Drugs Decriminalized#!."
