 great_polarization.130.t:0 "Lead Blue America?"
 great_polarization.130.d:0 "Mit den Vereinigten Staaten brach, die Regierung liberal oder Mitte-links Charakter platziert es am nächsten Blue America. Sie können den Krieg als Blue America fortsetzen oder bei den Überresten der Vereinigten Staaten bleiben."
 great_polarization.130.f:0 "Eine Regierung kann Kontinuität behaupten, aber die Macht folgt den Institutionen, die noch gehorchen."
 great_polarization.130.a:0 "Wechseln Sie nach Blue America."
 great_polarization.130.b:0 "Bleibt wie die Vereinigten Staaten."

 great_polarization.131.t:0 "Lead Red America?"
 great_polarization.131.d:0 "Mit den Vereinigten Staaten brach, die rechte Charakter der Verwaltung legt sie am nächsten an Red America. Sie können den Krieg als Red America fortsetzen oder bei den Überresten der Vereinigten Staaten bleiben."
 great_polarization.131.f:0 "Die Flagge ist die gleiche Form, aber das Land darunter hat sich geändert."
 great_polarization.131.a:0 "Wechseln Sie nach Red America."
 great_polarization.131.b:0 "Bleibt wie die Vereinigten Staaten."

 great_polarization_switch_blue_tt:0 "Sie wechseln Land auf #bold Blue America#!."
 great_polarization_switch_red_tt:0 "Sie wechseln Land auf #bold Red America#!."
 great_polarization_stay_usa_tt:0 "Sie bleiben wie die Vereinigten Staaten."

 great_polarization_complete_header:0 "Die Große Polarisierung endet, wenn die Krise entschärft wird, oder wenn die Vereinigten Staaten in den Bürgerkrieg einstürzen."
 
 great_polarization.38.t:0 "U.S. Capitol belagert"
 great_polarization.38.d:0 "Eine Menge stürmte die Vereinigten Staaten Capitol nach einer bitter bestrittenen Wahl, schockierte das Land und vertiefte Ängste, dass der politische Konflikt durch konstitutionelle Einschränkungen bricht."
 great_polarization.38.f:0 "Die Rotunda wird ein Schlachtfeld von Symbolen."
 great_polarization.38.a:0 "Die Republik zittert."
 great_polarization.38.b:0 "Den Angriff verurteilen und Vertrauen wieder aufbauen."
 
 ## other western countries
 
 je_rise_of_the_right:0 "Der Aufstieg der Rechten"
 je_rise_of_the_right_reason:0 "Im Westen gewinnen rechte populistische Bewegungen durch Medienfragmentation, Migrationsrückschlag, Kultur-Kriegs-Politik und Anti-Gründer-Resentment an Stärke. Bis 2035 sind rechte Bewegungen stärker und rechtspopulistische Führer werden wahrscheinlicher auftreten."

 rise_of_the_right_status_baseline:0 "Rechtsbewegungen gewinnen Kraft."
 rise_of_the_right_status_strong:0 "Ein rechter populistischer Aufschwung verändert die nationale Politik."
 rise_of_the_right_completion_header:0 "Diese Welle schaltet nach 2035 ab."
 rise_of_the_right_ends_2035_tt:0 "Die Höhe der Rechten endet nach #bold 1. Januar 2035#!."
 rise_of_the_right_spawnrate_tt:0 "Die rechte populistische Spitzenleistung wird erhöht. Die exakten Laichgewichte werden manuell in der Ideologie/Charakter Laichdateien behandelt."

 rise_of_the_right.1.t:0 "Der Aufstieg der Rechten"
 rise_of_the_right.1.d:0 "Eine neue rechtspopulistische Strömung ist in die nationale Politik eingetreten. Es zeichnet Stärke aus dem Misstrauen der Institutionen, dem Zorn der Eliten, dem kulturellen Zusammenspiel und einem fragmentierten Medienumfeld."
 rise_of_the_right.1.f:0 "Die alten Parteien halten immer noch die Büros. Die neue Politik lernt die Menge zu halten."
 rise_of_the_right.1.a:0 "Das politische Zentrum ist nicht mehr sicher."

 rise_of_the_right.10.t:0 "Algorithmischer Zorn"
 rise_of_the_right.10.d:0 "Online-politische Netzwerke haben verstärkte Anti-Erstellungs-Outrage und geben rechtspopulistische Bewegungen neue Wege, um außerhalb der traditionellen Parteien zu organisieren."
 rise_of_the_right.10.f:0 "Ein Feed wird zu einer Rallye. Eine Traurigkeit wird eine Plattform."
 rise_of_the_right.10.a:0 "Der Ausbruch breitet sich aus."
 rise_of_the_right.10.b:0 "Zurück durch bürgerliche Institutionen."

 rise_of_the_right.11.t:0 "Migration Backlash"
 rise_of_the_right.11.d:0 "Ein Zorn über Einwanderung, Integration und nationale Identität hat die Rechtsbewegungen verstärkt."
 rise_of_the_right.11.f:0 "Die Grenze wird ein Symbol für jede Angst, die alte Ordnung nicht beantworten kann."
 rise_of_the_right.11.a:0 "Der Kampf wächst."
 rise_of_the_right.11.b:0 "Deeskalieren Sie die Aussprache."

 rise_of_the_right.12.t:0 "Populisten durchbrechen"
 rise_of_the_right.12.d:0 "Eine rechtspopulistische Fraktion hat das alte Parteisystem durchbrochen und die Mainstream-Parteien dazu gezwungen, auf seine Sprache und Agenda zu reagieren."
 rise_of_the_right.12.f:0 "Sie waren einmal draußen. Jetzt ist das Zimmer um sie herum gebaut."
 rise_of_the_right.12.a:0 "Die richtigen Stöße."
 rise_of_the_right.12.b:0 "Das Zentrum wieder aufbauen."

 rise_of_the_right.13.t:0 "Street Politics"
 rise_of_the_right.13.d:0 "Demonstrationen, Gegendemonstrationen und virale Konfrontationen haben den Sinn vertieft, dass die Politik aus dem Parlament und in die Straßen gezogen ist."
 rise_of_the_right.13.f:0 "Der Chor ist eine Politik in seiner Larvalform."
 rise_of_the_right.13.a:0 "Die Straßen radikalisieren."
 rise_of_the_right.13.b:0 "Kühle die Temperatur."

