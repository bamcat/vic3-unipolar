 # JOURNAL ENTRY
 # ==========================================
 
 je_covid_pandemic: "COVID-19 Pandemie"
 je_covid_pandemic_reason: "Ein neuartiges respiratorisches Coronavirus ist in [ROOT.GetCountry.GetName] entstanden und verbreitet sich weltweit schnell. COVID-19 breitet sich schneller aus als jeder Erreger im lebendigen Gedächtnis und nutzt die dichten Netze des Handels und der Reise, die die moderne Welt zusammen binden. Die Mortalität konzentriert sich auf ältere Menschen und die immunkompromierte — aber ihre Reichweite droht in jedem Land, das sie berührt, überwältigende Gesundheitssysteme. Lockdowns verlangsamen die Ausbreitung, aber hämmern die Wirtschaft. Masken und Distancing sind weniger effektiv, aber nachhaltiger. Nichts zu tun ist auch eine Wahl – eine der Wähler und die Toten wird sich erinnern."
 
 # ==========================================
 # covid.1 — PANDEMIC ARRIVES
 # ==========================================
 
 covid.1.t: "A Novel Coronavirus"
 covid.1.d: "Ein Cluster ungewöhnlicher Lungenentzündungen wurde in [SCOPE.sState('plague_origin_state').GetName], [ROOT.GetCountry.GetName] gemeldet. Vorläufige Analyse von [ROOT.GetCountry.GetAdjective] Gesundheitsbehörden schlägt vor, dass ein bisher unbekanntes Coronavirus — Verbreitung von Mensch zu Mensch, mit einer Inkubationszeit lang genug, dass Träger ansteckend sind, bevor sie wissen, dass sie krank sind.\nx id=4/>Die Weltgesundheitsorganisation wurde gemeldet. Ob dies ein lokaler Ausbruch bleibt oder etwas mehr wird, hängt von den Entscheidungen der nächsten Wochen ab."
 covid.1.f: "Ein neuer Erreger. Noch mal."
 covid.1.a: "Benachrichtigen Sie die WHO und beginnen Sie Kontaktverfolgung"
 
 # ==========================================
 # covid.2 — SPREAD
 # ==========================================
 
 covid.2.t: "COVID-19 Reaches [ROOT.GetCountry.GetName]"
 covid.2.d: "Fälle des ersten in [SCOPE.sCountry('plague_originator_country').GetName] identifizierten neuen Coronavirus wurden in [ROOT.GetCountry.GetName] bestätigt. Das Virus ist angekommen - durch einen Reisenden, eine Handelsroute oder einfach die unsichtbaren Ströme einer angeschlossenen Welt.\nx id=3/>x id=4/> Gesundheitsbehörden aktivieren pandemische Antwortprotokolle. Verwenden Sie die #bold COVID-19 Response#! Entscheidung zur Festlegung der Politik."
 covid.2.f: "Es war nur eine Frage der Zeit."
 covid.2.a: "Pandemie-Protokolle aktivieren"
 
 # ==========================================
 # covid.3 — SUBSEQUENT WAVES
 # ==========================================
 
 covid.3.t: "Die Omicron Variante"
 covid.3.d: "Eine neue Variante hat eine neue Welle von COVID-19-Infektionen verursacht. Gesundheitsbehörden überprüfen die Eindämmungsprotokolle neu."
 covid.3.f: "Das Virus ist immer noch bei uns."
 
 # ==========================================
 # covid.4 — NOTIFICATION TO OTHER PLAYERS
 # ==========================================
 
 covid.4.t: "Der neue Virus aus Wuhan, China"
 covid.4.a: "Die Situation genau überwachen"
 
 # ==========================================
 # covid.5 — RESPONSE CHOICE
 # ==========================================
 
 covid.5.t: "COVID-19 Antwortpolitik"
 covid.5.d: "Wie sollte [ROOT.GetCountry.GetName] auf die Pandemie reagieren? Die Wahl wird die wirtschaftliche und soziale Landschaft der nächsten Jahre definieren."
 covid.5.f: "Es gibt keine guten Optionen. Nur Trade-offs."
 covid.5.a: "Vollständige Schließung — Unternehmen schließen, Bewegung einschränken"
 covid.5.b: "Maskenmandate und soziale Distancing-Richtlinien"
 covid.5.c: "Halten Sie die Wirtschaft offen — priorisieren Sie die Erholung"
 
 # ==========================================
 # covid.7 — WAR SUPPORT
 # ==========================================
 
 covid.7.t: "Die Pandemie untergräbt das Kriegsglück"
 covid.7.d: "Bei der COVID-19-Ravaging [ROOT.GetCountry.GetName]'s Population stellt [SCOPE.gsInterestGroup('pacifist_ig').GetName] — geführt von [SCOPE.sCharacter('pacifist_leader').GetFullName] — die Frage, ob ein Land, das eine Pandemie bekämpft, gleichzeitig einen Krieg führen kann. Die Bevölkerung ist erschöpft. Feldkliniken konkurrieren mit der Front-Line-Logistik für Ressourcen."
 covid.7.f: "Kampf gegen den Virus oder Kampf gegen den Feind. Beides zu tun ist hart."
 covid.7.a: "Der Krieg geht weiter - das Virus ändert sich nicht,"
 covid.7.b: "Verwenden Sie die öffentliche Gesundheit Messaging, um Moral zu halten"
 covid.7.c: "Unterdrücke die besiegte Erzählung"
 
 # ==========================================
 # covid.8 — POVERTY AND EVICTIONS
 # ==========================================
 
 covid.8.t: "Die wirtschaftliche Maut der Pandemie"
 covid.8.d: "Die Pandemie hat Tausende von <x id=======                                                                                                                                                                                                                                               Familien können keine Miete zahlen. Vermieter — unterstützt durch [SCOPE.gsInterestGroup('landowner_ig').GetName] — drücken das Recht auf evict. Poverty konzentriert sich in den Bereichen, die bereits am stärksten vom Virus getroffen."
 covid.8.f: "Eine Pandemie in der Pandemie."
 covid.8.a: "Impose a rent freeze and eviction moratorium"
 covid.8.b: "Ausbau der Sozial- und Arbeitslosenunterstützung"
 covid.8.c: "Der Markt wird es aussortieren"
 
 # ==========================================
 # covid.9 — ANTI-MASK RESISTANCE
 # ==========================================
 
 covid.9.t: "Anti-Lockdown-Proteste"
 covid.9.d: "[SCOPE.gsInterestGroup('anti_mask_ig').GetName], geführt von [SCOPE.sCharacter('anti_mask_ig_leader').GetFullName], hat Massenproteste gegen [ROOT.GetCountry.GetName]'s pandemic Restriktionen organisiert. Ihre Position: Die Abschlüsse und Maskenmandate sind Regierungsüberschreitung, der wirtschaftliche Schaden ist größer als das Gesundheitsrisiko, und die Bürger haben das Recht, ihre eigenen Entscheidungen zu treffen.\nx id=4/> Die Proteste wachsen. Wie [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName] reagiert, wird ein Präzedenzfall gesetzt."
 covid.9.f: "Masken. Der Hügel, den sie gewählt haben."
 covid.9.a: "Festhalten — die Beschränkungen bleiben"
 covid.9.b: "Stand down — heben Sie die Beschränkungen"
 covid.9.c: "Wissenschaftliche Rebuttale der Kommission und öffentliche Gesundheitskampagnen"
 
