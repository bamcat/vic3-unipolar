 rise_of_the_right_populist_surge_desc:0 "Rechtspopulisten gestalten die politische Landschaft um."

 rise_of_the_right_migration_backlash:0 "Migration Backlash"
 rise_of_the_right_migration_backlash_desc:0 "Immigration und nationale Identität sind zu zentralen Treibern der politischen Mobilisierung geworden."

