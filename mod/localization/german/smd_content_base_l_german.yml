 great_polarization.1.t:0 "Die große Polarisierung"
 great_polarization.1.d:0 "Die Vereinigten Staaten treten in eine neue Ära der politischen Polarisation ein, die durch Medienfragmentierung, Kultur-Kriegs-Politik und gegenseitige Angst zwischen ideologischen Blöcken getrieben wird."
 great_polarization.1.f:0 "Jede Wahl wird existentielle. Jeder Skandal wird Beweis. Jede Tragödie wird eine Waffe."
 great_polarization.1.a:0 "Das Zentrum beginnt zu knacken."

 great_polarization.2.t:0 "Politische Motivierte Massenschießung"
 great_polarization.2.d:0 "Eine Masse, die an extremistische politische Rhetorik gebunden ist, schockiert das Land. Gegen Fraktionen argumentieren sofort über Schuld, Sicherheit, bürgerliche Freiheiten und Ideologie."
 great_polarization.2.f:0 "Die Toten werden getraut. Die Erzählung wird gekämpft, bevor die Beerdigungen beginnen."
 great_polarization.2.a:0 "Der Ausfall speist die Teilung."
 great_polarization.2.b:0 "Sehen Sie eine ernste bipartisane Antwort."

 great_polarization.3.t:0 "Versuchte Ermordung"
 great_polarization.3.d:0 "Eine versuchte Ermordung einer politischen Figur hat Angst erhoben, dass politische Gewalt normalisiert wird."
 great_polarization.3.f:0 "Der Schuss verfehlte sein Ziel, aber schlug die Republik."
 great_polarization.3.a:0 "Das Land rückt zurück."
 great_polarization.3.b:0 "Erweitern Sie die Schutzsicherheit."

 great_polarization.4.t:0 "Algorithmisches Outrage"
 great_polarization.4.d:0 "Social-Media-Plattformen haben politischen Aufwand verstärkt, Millionen von radikalen Inhalten, Verschwörungsnetzwerken und identitätsgetriebene Gegenmobilisierung."
 great_polarization.4.f:0 "Das Futter übertrifft nicht. Eskaliert."
 great_polarization.4.a:0 "Die Außenmaschine beschleunigt."
 great_polarization.4.b:0 "Druckplattformen zu moderieren."

 great_polarization.5.t:0 "Eine Welle der Exposition"
 great_polarization.5.d:0 "Eine Welle öffentlicher Behauptungen gegen mächtige Zahlen hat eine nationale Einschätzung über Missbrauch, Geschlecht und institutionelle Heuchelei ausgelöst."
 great_polarization.5.f:0 "Was geflüstert worden war, ist jetzt durchsuchbar."
 great_polarization.5.a:0 "Die Berechnung breitet sich aus."
 great_polarization.5.b:0 "Aufbau institutioneller Kanäle für die Rechenschaftspflicht."

 great_polarization.6.t:0 "Gezielte Minderheiten"
 great_polarization.6.d:0 "Ein Anstieg der Feindseligkeit gegenüber Minderheiten hat Proteste, Gegenproteste und eine erneute Debatte über Rassismus, Identität und nationale Zugehörigkeit ausgelöst."
 great_polarization.6.f:0 "Für einige ist es Backlash. Für andere ist es das Überleben."
 great_polarization.6.a:0 "Die Straßen füllen wieder."
 great_polarization.6.b:0 "Kondensieren Sie den Rückschlag und senken Sie die Temperatur."

 great_polarization.20.t:0 "Die Temperaturfälle"
 great_polarization.20.d:0 "Die Polarisierung ist nicht verschwunden, aber die gefährlichste Spirale wurde unterbrochen. Politische Institutionen haben wieder eine gewisse Legitimität erlangt."
 great_polarization.20.f:0 "Eine Republik überlebt nicht, weil ihre Bürger zustimmen, sondern weil genug von ihnen verlieren."
 great_polarization.20.a:0 "Die Gewerkschaft hält."

 great_polarization.21.t:0 "Der Tauchplatz"
 great_polarization.21.d:0 "Die unmittelbare Krise ist nicht in den Bürgerkrieg explodiert, aber die Polarisierung ist in das amerikanische politische Leben eingebettet."
 great_polarization.21.f:0 "Das Fieber brach nicht. Es wurde chronisch."
 great_polarization.21.a:0 "Das neue Normal."

 great_polarization.100.t:0 "Der zweite amerikanische Bürgerkrieg"
 great_polarization.100.d:0 "Eine revolutionäre Krise hat die Vereinigten Staaten gebrochen. Die Bundesbehörde wird angeklagt, und bewaffnete Fraktionen beginnen, das Land in Rivalenregierungen zu verführen."
 great_polarization.100.f:0 "Der erste Bürgerkrieg fragte, ob die Union überleben könnte. Der zweite fragt, was die Gewerkschaft überhaupt ist."
 great_polarization.100.a:0 "Die Gewerkschaftsbrüche."

 great_polarization_baseline:0 "Die große Polarisierung"
 great_polarization_baseline_desc:0 "Die politische Atmosphäre wird zunehmend radikalisiert und reaktiv."

 great_polarization_right_wing_president:0 "Rechtlicher Vorsitz"
 great_polarization_right_wing_president_desc:0 "Ein rechter Präsident hat liberale, sozialdemokratische, sozialistische, kommunistische und Minderheitsrechte Oppositionsbewegungen erregt."

 great_polarization_left_wing_president:0 "Vorsitz im linken Flügel"
 great_polarization_left_wing_president_desc:0 "Ein linksgerichteter Präsident hat konservative, libertäre, traditionelle, faschistische und religiös-majoristische Oppositionsbewegungen erregt."

 great_polarization_divided_media:0 "Entschlüsselte Polarisation"
 great_polarization_divided_media_desc:0 "Das Medienumfeld hält politische Lager voneinander isoliert."

 great_polarization_attempted_assassination:0 "Versuchte Ermordung"
 great_polarization_attempted_assassination_desc:0 "Politische Gewalt hat das öffentliche Vertrauen erschüttert."

 great_polarization_mass_shooting_aftermath:0 "Politische Motivierte Massenschießung"
 great_polarization_mass_shooting_aftermath_desc:0 "Ein politisch motiviertes Massaker hat den sozialen Konflikt vertieft."

 great_polarization_reform_concessions:0 "Reformprozesse"
 great_polarization_reform_concessions_desc:0 "Eine ernsthafte Reformreaktion hat die politischen Spannungen verringert."

 great_polarization_security_crackdown:0 "Sicherheit Crackdown"
