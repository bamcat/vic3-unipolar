 je_chechen_war_storm_grozny: "Storm Grozny"
 je_chechen_war_storm_grozny_desc: "Starten Sie einen umfassenden Angriff auf die tschetschenische Hauptstadt. Dies beendet die Guerillaphase und verpflichtet russische Kräfte zum entscheidenden Stadtkampf."
 
 je_chechen_war_mountain_offensive: "Bergzähleroffensive"
 je_chechen_war_mountain_offensive_desc: "Starten Sie eine große Gegenoffensive aus den Bergen, auffallend russische Positionen über den Kaukasus. Dies beendet die Guerillaphase und gefährdet alles auf einem entscheidenden Engagement."
 
