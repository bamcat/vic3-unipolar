 ## war on terror again
 
 wot_coalition.2.t:0 "Artikel 5 aufgerufen"
 wot_coalition.2.d:0 "Nach den Angriffen auf die Vereinigten Staaten hat die NATO Artikel 5 aufgerufen. Die Allianz behandelt nun den Angriff als Angriff auf alle Mitglieder."
 wot_coalition.2.f:0 "Die Nordatlantik-Allianz wurde für kollektive Verteidigung gebaut. Seine erste Invokation kommt nicht von Panzern über eine Grenze, sondern von einem Terroranschlag."
 wot_coalition.2.a:0 "Stehen Sie mit den Vereinigten Staaten."

 wot_coalition.10.t:0 "Die USA fordern Zusammenarbeit"
 wot_coalition.10.d:0 "Die Vereinigten Staaten haben die pakistanische Zusammenarbeit im Krieg gegen den Terrorismus gefordert. Washington erwartet militärischen Zugang, Basingrechte, Geheimdienst und logistische Routen in Afghanistan."
 wot_coalition.10.f:0 "Pakistans Geographie macht es unverzichtbar. Verweigerung würde jedoch die Anschuldigung einladen, dass Islamabad den Terrorismus schützt."
 wot_coalition.10.a:0 "Mit der Koalition kooperieren."
 wot_coalition.10.b:0 "Verweigern Sie das Ultimatum."

 wot_coalition.11.t:0 "Pakistan kooperiert"
 wot_coalition.11.d:0 "Pakistan hat sich bereit erklärt, mit den Vereinigten Staaten und Koalitionspartnern zusammenzuarbeiten, militärischen Zugang zu den Militärstützpunkten für die Kampagne in Afghanistan zu gewähren."
 wot_coalition.11.f:0 "Der Weg nach Afghanistan läuft nun durch Pakistan."
 wot_coalition.11.a:0 "Sichern Sie die Strecken."

 wot_coalition.12.t:0 "Pakistan verweigert"
 wot_coalition.12.d:0 "Pakistan hat die amerikanischen Forderungen nach Zusammenarbeit abgelehnt. Washington bekennt nun Pakistan gegen den Terrorismus und bereitet direkte militärische Maßnahmen vor."
 wot_coalition.12.f:0 "Refusal verwandelt einen logistischen Partner in ein Ziel."
 wot_coalition.12.a:0 "Sie haben ihre Seite gewählt."

 wot_article_5_join_war_tt:0 "Dieses NATO-Mitglied wird den Vereinigten Staaten in jedem aktiven Krieg gegen Afghanistan beitreten. Wenn der Krieg noch nicht begonnen hat, wird er sich anschließen, sobald der Krieg beginnt."
 wot_pakistan_cooperate_tt:0 "Pakistan unterzeichnet 10-jährige Verträge mit den Vereinigten Staaten und allen Koalitionspartnern, die #bold Military Access#! und #bold Host Military Bases#! gewähren."
 wot_pakistan_refuse_tt:0 "Die Vereinigten Staaten starten einen Regime-Wechsel-Krieg gegen Pakistan und bekennen ihn im Terrorismus."

 wot_pakistan_coalition_access_treaty_name:0 "Krieg gegen den Terrorismus Koalition Access Agreement"
 operation_enduring_freedom_pakistan:0 "Operation Ending Freedom — Pakistan"

 wot_article_5_commitment:0 "Artikel 5 Verpflichtung"
 wot_article_5_commitment_desc:0 "Dieses Land hat die NATO-Antwort nach dem 11. September begangen."

 wot_pakistan_cooperation:0 "Zusammenarbeit bei der Koalition"
 wot_pakistan_cooperation_desc:0 "Pakistan kooperiert mit den Vereinigten Staaten und Koalitionspartnern im Krieg gegen den Terror."

 wot_pakistan_complicit:0 "Gekennzeichneter Konflikt im Terrorismus"
 wot_pakistan_complicit_desc:0 "Pakistan hat die Zusammenarbeit abgelehnt und wird nun von den Vereinigten Staaten als Komplizen im Terrorismus behandelt."

 wot_coalition.20.t:0 "Die Nördliche Allianz tritt der Koalition bei"
 wot_coalition.20.d:0 "Die Nördliche Allianz ergriff Kabul und trat der amerikanisch geführten Kampagne gegen das Taliban-Regime in Afghanistan bei."
 wot_coalition.20.f:0 "Die Taliban stehen nun einer externen Koalition und einem heimischen Feind auf einmal gegenüber."
 wot_coalition.20.a:0 "Vorwärts auf Kabul."

