limited_response: "Begrenzte Antwort"
heightened_security_measures: "Höhere Sicherheitsmaßnahmen"

afghanistan.1.t: "US fordert Auslieferung von Bin Laden"
afghanistan.1.d: "Die Vereinigten Staaten haben förmlich gefordert, dass Afghanistan Osama bin Laden übergeben, beschuldigt Mastermind der Angriffe vom 11. September. Die Annahme dieses Antrags könnte Spannungen erleichtern — aber die Ablehnung kann schwere Konsequenzen hervorrufen."
afghanistan.1.a: "Entspricht der Anfrage."
afghanistan.1.b: "Verweigern."

# 2003 Invasion of Iraq

iraq_war.1.t: "Die UN-Konvenen zu irakischen Massenvernichtungsansprüchen"
iraq_war.1.d: "Die Vereinigten Staaten haben Irak angeklagt, Waffen der Massenvernichtung zu lagern. Die Vereinten Nationen haben eine Notfallsitzung einberufen, um das Thema zu diskutieren und internationale Antworten zu sammeln."
iraq_war.1.a: "Die Aussprache beginnt."

iraq_war.2.t: "UN-Debatte über Irak-WMDs"
iraq_war.2.d: "Die internationale Gemeinschaft diskutiert, wie man auf die US-Beschuldigungen gegen den Irak reagieren kann."
iraq_war.2.a: "Unterstützung der Vereinigten Staaten."
iraq_war.2.b: "Seite mit Irak."
iraq_war.2.c: "Bleiben Sie neutral."

iraq_war.3.t: "NATO Antwort auf U.S. Anschuldigungen"
iraq_war.3.d: "Als NATO-Verbündete müssen wir entscheiden, ob wir die Position der Vereinigten Staaten zum angeblichen WMD-Programm des Irak unterstützen."
iraq_war.3.a: "Wir stehen mit den USA."
iraq_war.3.b: "Wir können diese Aktion nicht unterstützen."

iraq_war.4.t: "Irak reagiert auf Anschuldigungen"
iraq_war.4.d: "Der Irak wurde beschuldigt, WMDs zu lagern. Die Regierung muss auf den Druck aus dem Ausland reagieren."
iraq_war.4.a: "Deny alles und ertragen Isolation."
iraq_war.4.b: "Verurteilen Sie den Westen und mobilisieren Sie Propaganda."
  
iraq_war.5.t: "Die U.S. Pleads an die UN"
iraq_war.5.d: "Die Vereinigten Staaten haben ihren Fall vor den Vereinten Nationen vorgelegt und die Unterstützung für militärische Maßnahmen gegen den Irak über die angeblichen Massenvernichtungswaffen gefordert. Die Führer der Welt müssen jetzt entscheiden, ob sie Washingtons Appell unterstützen oder sich der Intervention widersetzen sollen."
iraq_war.5.b: "Die UNO ist versperrt — wir müssen allein handeln"
iraq_war_us_lobby_tt: "Die U.S. hebt Schlüsselbefugnisse für die Unterstützung und Anpassung diplomatischer Beziehungen auf."
iraq_war_unfail_tt: "Geboren nur rechtzeitig, um im mittleren Osten zu sterben."

iraq_war.6.t: "Die US-Dezides zum Krieg"
iraq_war.6.d: "Mit den von der Spaltung gelähmten Vereinten Nationen steht Washington vor einer augenblicklichen Entscheidung: den Irak militärisch zu bekämpfen, oder den Irak abzulehnen und das Risiko vor der Welt schwach zu erscheinen."
iraq_war.6.a: "Starten Sie die Invasion des Irak"
iraq_war.6.b: "Zurücktreten und Krieg vermeiden"
iraq_war_backdown_tt: "Die USA ziehen sich vor Intervention zurück und verlieren internationales Prestige."
2003_invasion_of_iraq: "2003 Invasion des Irak"
iraq_condemned: "Irak verurteilt"

