 # SOUTH KOREA JE
 # ==========================================
 
 je_korea_reunification_stk:0 "Koreanische Wiedervereinigung"
 je_korea_reunification_stk_reason:0 "Die Republik Korea ist die einzige legitime Regierung der koreanischen Nation. Die Aufteilung der Halbinsel ist ein Vermächtnis ausländischer Besetzung und die rivalisierende Kalte Kriege — [ROOT.GetCountry.GetName] hat sie nie als dauerhaft akzeptiert.\nx id=2/>Reunification under [ROOT.GetCountry.GetAdjective] Leadership würde das koreanische Volk unter demokratischer Verfassungsordnung zusammenführen. Nordkoreas nördliche Verwaltung muss in den [ROOT.GetCountry.GetAdjective]-Zustand aufgenommen werden. Der Grip des Pyonyang-Regimes im Norden ist das letzte Hindernis."
 
 korea_stk_complete_tt:0 "#bold Die Halbinsel ist unter [ROOT.GetCountry.GetAdjective] Leadership unified.#! Korea ist ganz. Die Division von 1945 wurde korrigiert."
 korea_stk_subject_path_tt:0 "[SCOPE.sCountry('c:NRK').GetName] ist Gegenstand von [ROOT.GetCountry.GetName]. Die nördliche Verwaltung wurde in der Verfassungsordnung [ROOT.GetCountry.GetAdjective] eingeführt. Die Integration des Nordens ist im Gange — ein immenses Unternehmen."
 korea_stk_incomplete_tt:0 "[SCOPE.sCountry('c:NRK').GetName] Kontrollen [SCOPE.sState('STATE_PYONGYANG').GetName] und [SCOPE.sState('STATE_SARIWON').GetName]. Die Wiedervereinigung erfordert [ROOT.GetCountry.GetName], um beides zu besitzen — oder haben [SCOPE.sCountry('c:NRK').GetName] als Subjekt."
 
 # ==========================================
 # MODIFIERS
 # ==========================================
 
 korea_reunification_bonus:0 "Korea vereinigt"
 korea_reunification_bonus_desc:0 "Die Teilung der koreanischen Halbinsel ist beendet. Die Nation ist zum ersten Mal seit 1945 ganz. Autorität, Legitimität und Prestige sind dramatisch verbessert. Separatistische und revolutionäre Drücke werden unterdrückt. Der Zustand [ROOT.GetCountry.GetAdjective] kann die Arbeit der Integration eines einheitlichen Koreas beginnen."
 
 korea_stk_integration_bonus:0 "Nordische Integration"
 korea_stk_integration_bonus_desc:0 "[ROOT.GetCountry.GetName] absorbiert das ehemalige [SCOPE.sCountry('c:NRK').GetAdjective] Gebiet. Die wirtschaftliche und administrative Kluft zwischen Nord und Süd ist gewaltig — Integration erfordert nachhaltige Investitionen und beschleunigte Einbindung. Die Kosten sind real, aber das Ziel ist ein einheitliches Korea."
 
 y2k_events.1.t: "Der Millennium Bug"
 y2k_events.1.d: "Wie sich das Jahr 2000 nähert, hat eine ruhige Angst [ROOT.GetCountry.GetAdjective] gegriffen Ingenieure, Bürokraten und IT-Abteilungen. Das so genannte Y2K-Problem — die Entdeckung, dass die meisten Computersysteme das Jahr als zwei Ziffern speichern und daher "00" als 1900 anstatt 2000 interpretieren werden — hat einen globalen Scramble ausgelöst.\nx id=2/> Einige sagen, die Konsequenzen könnten katastrophal sein: Stromnetze scheitern, Bankensysteme korrumpieren, Luftverkehrskontrolle wird dunkel. Andere sagen, die Sorge ist wild überblown und die Berater verkaufen Compliance Audits sind einfach reich an der Panik. [ROOT.GetCountry.GetName] muss entscheiden, wie ernst es zu nehmen ist."
 y2k_events.1.f: "Mitternacht kommt. Ob die Lichter bleiben, ist eine weitere Frage."
 
 y2k_events.1.a: "Investieren Sie in volle Y2K-Compliance"
 y2k_events.1.a_tt: "Aufwändig, gründlich und wahrscheinlich unnötig — aber wenn sogar ein Bruchteil der Vorhersagen richtig ist, sind die Kosten für nichts wesentlich höher. [ROOT.GetCountry.GetName] wird Compliance-Programme in kritischer Infrastruktur finanzieren."
 y2k_events.1.b: "Es ist offensichtlich überblown — ignorieren es"
 y2k_events.1.b_tt: "Die Panik ist eine Beratungsindustrie Goldmin und nichts mehr. [ROOT.GetCountry.GetName] wird öffentliche Mittel nicht auf ein imaginäres Problem verschwenden."
 
 # ── NEW YEAR 2000 ─────────────────────────
 
 y2k_events.2.t: "Frohes neues Jahr — Willkommen im Jahr 2000"
 y2k_events.2.d: "Die am 31. Dezember 1999 vor Mitternacht angekreuzten Uhren und die Lichter blieben auf.\n>x id=1/> Die Flugzeuge flogen weiter. Die Banken öffneten sich. Stromnetze gedemütigt. Wasser fließt. Der Millennium-Bug, die am meisten erwartete Katastrophe in der Computing-Geschichte, kam mit einem Whisper statt einem Bang — oder vielleicht nie angekommen, und die Milliarden, die für die Compliance ausgegeben wurden einfach gearbeitet.\nx id=3/> Across [ROOT.GetCountry.GetName], Massen gefüllt die Straßen, Feuerwerk beleuchtet den Himmel, und für eine Nacht fühlte sich die Welt kurz, wie es wieder begann. Das 21. Jahrhundert hat begonnen. Was als Nächstes kommt, ist jeder erraten."
 y2k_events.2.f: "Das Jahr ist 2000. Die Welt ist nicht beendet. Das sind gute Nachrichten."
 
 y2k_events.2.a: "Ein neues Jahrhundert beginnt"
 
 # ── MODIFIERS ────────────────────────────
 
 y2k_compliance_investment: "Y2K Compliance Programme"
 y2k_compliance_investment_desc: "[ROOT.GetCountry.GetName] hat in umfassende Y2K-Compliance in kritischer Infrastruktur investiert. Die Kosten sind real, aber die Systeme sind bereit für was Mitternacht bringt."
 
 millennium_celebration: "Millennium Feiern"
 millennium_celebration_desc: "Das Jahr 2000 ist ohne Katastrophe angekommen. Die öffentliche Stimmung ist buoyant, die Straßen sind noch voller Offenbarungen, und [ROOT.GetCountry.GetName] tritt in das neue Jahrhundert mit einem vorsichtigen Optimismus."
 
 y2k_minor_disruption: "Y2K Disruption"
 y2k_minor_disruption_desc: "[ROOT.GetCountry.GetName] abgewiesen Y2K betrifft und stellt nun kleinere, aber reale Störungen als unvorbereitete Systeme ins neue Jahr ein. Nichts katastrophales — aber die Kritiker waren auch nicht völlig falsch."
 
  # ── TAGENTOPOLI ──────────────────────

 je_tangentopoli: "Tangopol"
 je_tangentopoli_reason: "Italien läuft auf einem System von Rückschlägen. Öffentliche Aufträge — Bau, Infrastruktur, Verteidigungsbeschaffung, Gesundheitsversorgung — gehen zu Unternehmen, die einen Prozentsatz an die politischen Parteien zahlen. Die Christdemokraten nehmen ihren Anteil. Die Sozialisten nehmen ihre. Die kleineren Koalitionspartner nehmen ihre. Jeder weiß es. Jeder beteiligt sich. Dies ist seit dem Krieg der Fall.\nx id=1/> Das System wird als #bold Tangentopoli<x id=3/ — Bribe City bezeichnet. Es ist stabil, effizient und absolut korrupt. Die einzige Frage ist, ob sie den Kontakt mit einem Richter überleben kann, der sich weigert, den anderen Weg zu sehen."

 je_mani_pulite: "Mani Pulite"
 je_mani_pulite_reason: "Die Untersuchung läuft. Richter Antonio Di Pietro und der Mailänder Magistratspool arbeiten durch das Netzwerk von Bestechungen und Rückschlägen, die die italienische Politik seit der Gründung der Republik finanziert haben. Jede Verhaftung führt zu einem Geständnis. Jedes Geständnis führt zu einem Namen. Jeder Name führt zu einer anderen Verhaftung.\nx id=1/> Die politische Klasse kämpft zurück. Notfalldekrete, Übertragungen von Richtern, öffentliche Angriffe auf die Justiz. Die Frage ist, ob die Untersuchung ihren Abschluss erreichen kann, bevor das System einen Weg findet, es zu stoppen.\nx id=3/>x id=4/> Die #bold-Untersuchung bar#! verfolgt den Fortschritt der Magistrate. Der #bold Widerstand bar#! verfolgt die Fähigkeit der politischen Klasse, sie abzuschalten."

 # Status descs — tangentopoli
 je_tangentopoli_contained_tt: "Die Untersuchung befindet sich in ihren frühen Phasen. Eine Handvoll kleiner Zahlen wurde verhaftet. Die politische Klasse lässt sie als Provinzial ab."
 je_tangentopoli_spreading_tt: "#bold Die Untersuchung breitet sich aus.#! Konflikte sammeln sich. Namen entstehen. Die Magistrate in Mailand folgt jedem Faden."
 je_tangentopoli_critical_tt: "@warning! #bold Das System ist an der Bruchstelle.#! Die Größe von Tangentopoli wird unbestreitbar. Eine politische Krise ist unmittelbar bevorstehenden."

 # Status descs — mani pulite
 je_mani_pulite_early_tt: "Die Untersuchung ist ein Momentum. Di Pietros Team arbeitet durch die Beweise. Die politische Klasse hat noch keine kohärente Antwort organisiert."
 je_mani_pulite_winning_tt: "#bold Die Untersuchung gewinne.#! Die Magistraten sind vor dem Widerstand. Namen fallen schneller, als das System sie enthalten kann."
 je_mani_pulite_stalemate_tt: "@warning! Die Untersuchung und der politische Widerstand sind gleichmäßig aufeinander abgestimmt. Das Ergebnis hängt von den nächsten Schritten ab."
 je_mani_pulite_suppressed_tt: "@warning! #bold Der politische Widerstand gewinnt die obere Hand.#! Das System organisiert. Die Untersuchung kann begraben werden, bevor sie ihren Abschluss erreicht."

 # Progress bars
 tangentopoli_exposure_bar: "Netzwerkexposition"
 tangentopoli_exposure_bar_desc: "Wie weit das Korruptionsnetzwerk eingedrungen ist."
 tangentopoli_exposure_bar_second_desc: "Die Exposition wächst organisch, da jede Verhaftung zu mehr Geständnissen führt."
 tangentopoli_bar_from_exposure: "Fortlaufende gerichtliche Exposition des Tangentopoli-Netzwerks"

 investigation_progress_bar: "Untersuchungsfortschritt"
 investigation_progress_bar_desc: "Wie weit sind die Magistraten von Di Pietro gekommen."
 investigation_bar_progress: "Die Magistraten gehen durch die Beweise voran"

 political_resistance_bar: "Politischer Widerstand"
 political_resistance_bar_desc: "Widerstand gegen die Untersuchung"
 political_resistance_bar_progress: "Die politische Klasse organisiert gegen die Richter"

 # ── EVENT TITLES AND TEXT ────────────────

 mani_pulite.1.t: "Ein Geschäftsmann versucht, Flush 20 Millionen Lire"
 mani_pulite.1.d: "Mario Chiesa, Vorsitzender des Pio Albergo Trivulzio — ein Mailänder Ruhestandshaus — wurde von Richter Antonio Di Pietro verhaftet und versucht, Banknoten nach unten zu spülen. Chiesa hatte von einer Reinigungsfirma einen 37 Millionen Lire-Kickback bekommen.\nx id=1/> Die Sozialisten haben ihn sofort entführt. Ihre Parteisekretärin Bettino Craxi, nennt Chiesa 'ein Dieb' - nicht eine sehr kluge Wahl der Worte, angesichts dessen, was Di Pietro als nächstes finden wird. Die Verhaftung ist gering. Was es dazu führen wird, ist nicht."
 mani_pulite.1.f: "Eine routinemäßige Verhaftung. Oder so schien es."
 mani_pulite.1.a: "Eine lokale Verlegenheit. Das System ist sicher."

 mani_pulite.2.t: "Die ersten Konfessionen"
 mani_pulite.2.d: "Angesichts des Gefängnisses haben kleinere Funktionäre begonnen zu reden. Nicht gegen die Immunität — es gibt keinen formalen Deal —, sondern weil der Damm gebrochen ist und die Logik der Stille nicht mehr hält. Jeder Name führt zu einem anderen. Jeder andere Name führt zu einer Party. Jede Partei führt zu einem Ministerium.\nx id=1/> Die Untersuchung geht nicht mehr um einen Mann mit einer Toilette voller Banknoten. Es geht um die gesamte Finanzarchitektur der Republik."
 mani_pulite.2.f: "Wenn ein Mann redet, reden sie alle."
 mani_pulite.2.a: "Der Präsident. — Die Aussprache ist geschlossen."
 mani_pulite.2.b: "Verwenden Sie den Exekutivdruck, um die Verbreitung zu enthalten"

 mani_pulite.5.t: "Mani Pulite — Italien lernt, was jeder Knew"
 mani_pulite.5.d: "Der Mailand-Pool der Magistrates — Di Pietro, Colombo, Davigo, Borrelli — ist öffentlich geworden. Die Beweise, die sie angesammelt haben, machen die Skala unbestreitbar: In den letzten Jahrzehnten kam praktisch jeder öffentliche Vertrag in Italien mit einem Rückschlag. Die Parteien, die die Republik fuhren, verbrauchten gemeinsam einen Prozentsatz jeder Straße, jedes Krankenhaus, jede Schule.\n>x id=1/> Italiens Zeitungen haben einen Namen dafür: #bold Tangentopoli#!. Bribe City. Die Erste Republik ist vor Gericht."
 mani_pulite.5.f: "Jeder wusste es. Jetzt weiß jeder, dass jeder wusste."
 mani_pulite.5.a: "Die Untersuchung wird dahin gehen, wohin sie führt"

 mani_pulite.6.t: "Avvisi di Garanzia"
 mani_pulite.6.d: "Die Untersuchungshinweise kommen über [ROOT.GetCountry.GetName] — für Geschäftsleute, Beamte des Ministeriums, Parteischätzer, Bürgermeister. Die #italic avviso di garanzia#! — eine Mitteilung, die einer Untersuchung unterzogen wird — ist zur Schande kurz geworden. Zeitungen drucken sie auf der Vorderseite. Die Pfleger enden über Nacht.\nx id=4/>x id=5/>, unter anderem, hat eine Mitteilung erhalten. Die Untersuchung beschränkt sich nicht mehr auf Mailand."
 mani_pulite.6.f: "Der Postbote war noch nie so aufgebläht."
 mani_pulite.6.a: "Zusammenarbeit — Widerstand wird es nur noch schlimmer machen"
 mani_pulite.6.b: "Anwenden von Exekutivdruck auf die Justiz"

 mani_pulite.7.t: "Craxi und die Münzen"
 mani_pulite.7.d: "Bettino Craxi — ehemaliger Premierminister, sozialistische Parteisekretär, der mächtigste Politiker in Italien seit einem Jahrzehnt — ist aus dem Hotel Raphael in Rom hervorgegangen, um einer Menge von mehreren hundert Bürgern gegenüber zu stehen.\nx id=1/> Sie schlugen ihn mit Münzen und Tomaten. Münzen, weil sie wissen, woher das Geld kam.\nx id=3/> Craxi gab eine kurze Erklärung, die das System der Parteifinanzierung verteidigte - "jeder wusste, jeder nahm teil" - und zog sich innen zurück. Innerhalb von Monaten fliegt er zu seiner Villa in Hammamet, Tunesien. Er wird nie nach Italien zurückkehren. Die Sozialisten, die Partei, die er aufgebaut hat, werden aufhören zu existieren."
 mani_pulite.7.f: "Ein Mann, der aus einem Land stahl, getrieben von Münzen."
 mani_pulite.7.a: "Das alte System ist fertig — lass es fallen"
 mani_pulite.7.b: "Verwalten des Übergangs — Verantwortung übernehmen, Reform suchen"

 mani_pulite.8.t: "Die Untersuchung rückt den Süden"
 mani_pulite.8.d: "Tangentopoli war nie nur ein nördliches Phänomen. In [SCOPE.sState('tangentopoli_south_state').GetName] und im gesamten Mezzogiorno wurde das Rückschlagsystem in die EU-Agrarsubventionen, öffentliche Infrastrukturprojekte und das Netz der Beziehungen zwischen der lokalen Politik und der organisierten Kriminalität gewebt.\n>x id=2/>Di Pietros Untersuchung ist dem Geld nach Süden gefolgt. Die politischen Netzwerke in [SCOPE.sState('tangentopoli_south_state').GetName] sind älter und tiefer verwurzelt als ihre nördlichen Gegenparteien. Sie werden nicht leicht auseinander kommen."
 mani_pulite.8.f: "Die Korruption ging den ganzen Weg runter."
 mani_pulite.8.a: "Prüfung — keine Ausnahmen"
 mani_pulite.8.b: "Die Untersuchung im Norden — der Süden ist zu kompliziert"

 mani_pulite.9.t: "Der Biondi Dekret"
 mani_pulite.9.d: "Justizminister Alfredo Biondi hat eine Notverordnung erlassen, die die Verwendung von investigativem Sorgerecht für eine Reihe von finanziellen Straftaten verbieten würde – auch die Verbrechen im Herzen von Mani Pulite. Die Kritiken haben sie sofort als #italic salvaladri#! Dekret bezeichnet: das 'save-thieves' Gesetz.\nx id=3/> Innerhalb von 24 Stunden haben die Mailänder Richter ihren kollektiven Rücktritt im Protest angekündigt. Die öffentliche Antwort ist überwältigend. Die Staatsanwälte in ganz Italien erhielten Unterstützungsschreiben von Hunderttausenden von Bürgern. Die politischen Kosten des Verfahrens werden sichtbar."
 mani_pulite.9.f: "Eine Regierung, die ein Gesetz über den Schutz ihrer eigenen Verbrecher übergibt, überlebt nicht lange den Versuch."
 mani_pulite.9.a: "Durch das Dekret drücken — die Untersuchung muss enthalten sein"
 mani_pulite.9.b: "Die öffentliche Reaktion ist zu stark"

 mani_pulite.10.t: "Die erste Republik ist tot"
 mani_pulite.10.d: "Es ist vorbei. Die Christdemokratie — die Partei, die Italien seit 1948 ohne Unterbrechung regierte — hat sich aufgelöst. Die Sozialisten sind weg. Die kleineren Koalitionsparteien sind weg. Fünfundvierzig Jahre der Ersten Republik, in zwei Jahren von einer Gruppe von Magistraten in Mailand abgebaut, die sich einfach weigerten, die andere Weise zu sehen.\nx id=1/> Über 1.200 Politiker und Geschäftsleute wurden verurteilt. Fünftausend wurden untersucht. Ehemalige Ministerpräsidenten, Kabinettsminister und Industrielle haben sich vor Gericht gestellt.\nx id=3/> Was als nächstes für [ROOT.GetCountry.GetName] kommt, ist unsicher. Aber das System, das seit einem halben Jahrhundert in der Republik gefüttert wird, ist beendet."
 mani_pulite.10.f: "Die Richter taten, was Wahlen nie konnten."
 mani_pulite.10.a: "Ein neues Italien – umarmen Sie die saubere Pause"
 mani_pulite.10.b: "Ein geführter Übergang — Reform ohne Bruch"

 mani_pulite.15.t: "Die Untersuchung ist begraben"
 mani_pulite.15.d: "Die politische Klasse hat gewonnen. Die Richter wurden übertragen, diskreditiert oder zurückerstattet. Die Beweise wurden versiegelt. Der Moment ist gebrochen.\nx id=1/> Dies bedeutet nicht, dass Tangentopoli nicht passiert ist. Es bedeutet, dass die Menschen, die es gebaut haben, es überlebt haben. Die Korruption endete nicht — sie ging unter Tage, in neue Formen und neue Vereinbarungen. Die Bürger wissen, was getan wurde. Sie wissen, dass es nicht bestraft wurde. Dieses Wissen verschwindet nicht."
 mani_pulite.15.f: "Gerechtigkeit wird verwehrt. Und jeder weiß es."
 mani_pulite.15.a: "Das System überlebt — jetzt"

 # ── MODIFIERS ────────────────────────────

 tangentopoli_systemic_corruption: "Tangopol"
 tangentopoli_systemic_corruption_desc: "Das Kickback-System, das seit Jahrzehnten [ROOT.GetCountry.GetAdjective] Politik finanziert hat, ist in jeden öffentlichen Vertrag eingebettet. Legitimität ist strukturell geschwächt. Das System kostet Geld und lädt infamy ein."

 tangentopoli_chiesa_arrest: "Die Chiesa Affäre"
 tangentopoli_chiesa_arrest_desc: "Die Verhaftung von Mario Chiesa hat den ersten Riß im System eröffnet. Die politische Klasse wird sie entlassen, aber die Richter verfolgen den Faden."

 tangentopoli_ig_under_scrutiny: "Unter der Untersuchung"
 tangentopoli_ig_under_scrutiny_desc: "Diese Gruppe steht unter gerichtlicher Kontrolle im Zusammenhang mit dem Korruptionsnetzwerk von Tangentopoli. Seine politische Stärke und sein populärer Appell sind deutlich beschädigt."

 tangentopoli_widening_investigation: "Erweiterung der Untersuchung"
 tangentopoli_widening_investigation_desc: "Die Untersuchung erweitert sich über ihren ursprünglichen Umfang hinaus. Jedes Geständnis führt zu einer neuen Verhaftung. Die politischen Kosten der Governance steigen."

 tangentopoli_suppression_attempt: "Suppression Attemp"
 tangentopoli_suppression_attempt_desc: "[ROOT.GetCountry.GetName] hat versucht, die gerichtliche Untersuchung zu unterdrücken. Die internationale Gemeinschaft und die heimische Presse haben es bemerkt."

 tangentopoli_party_collapse: "Parteizusammenbruch"
 tangentopoli_party_collapse_desc: "Diese Partei wurde durch die Tangentopoli Offenbarungen zerstört. Seine Führung ist im Exil oder unter Anklage. Seine Wähler sind an anderer Stelle gegangen."

 tangentopoli_legitimacy_crisis: "Legitimitätskrise"
 tangentopoli_legitimacy_crisis_desc: "Die Enthüllung systemischer Korruption hat das öffentliche Vertrauen in [ROOT.GetCountry.GetAdjective] Institutionen zerstört. Der Radikalismus geht über. Die Behörde wird geschwächt."

 tangentopoli_south_exposure: "Südliche Netzwerke"
 tangentopoli_south_exposure_desc: "Die Mani Pulite-Untersuchung hat das Mezzogiorno erreicht, das die Beziehung zwischen den südlichen politischen Netzwerken und dem Tangentopoli-System darstellt."

 mani_pulite_investigation_begins: "Mani Pulite Untersuchung"
 mani_pulite_investigation_begins_desc: "Der Milan-Pool der Magistrates führt eine vollständige Untersuchung durch. [ROOT.GetCountry.GetName]s internationales Ansehen profitiert von der sichtbaren Verpflichtung zur Rechenschaftspflicht."

 mani_pulite_public_mandate: "Öffentliches Mandat für die Justiz"
 mani_pulite_public_mandate_desc: "Der Rückzug des Dekrets unter öffentlichem Druck hat die Breite der populären Unterstützung für die Untersuchung gezeigt."

 mani_pulite_clean_hands_victory: "Saubere Hände Sieg"
 mani_pulite_clean_hands_victory_desc: "Mani Pulite gelang es. Das korrupte Parteisystem der Ersten Republik wurde durch gerichtliche Verfahren abgebaut. <x id============================================================"

 mani_pulite_cautious_transition: "Managed Transition"
 mani_pulite_cautious_transition_desc: "Der Übergang von der ersten in die zweite Republik wird sorgfältig verwaltet — Reform ohne Bruch. Die alten Parteien sind weg, aber die institutionelle Kontinuität bleibt erhalten."

 mani_pulite_investigation_buried: "Untersuchung begraben"
 mani_pulite_investigation_buried_desc: "Mani Pulite hat versagt. Die politische Klasse überlebte. [ROOT.GetCountry.GetName]s Bürger wissen, was getan wurde und wissen, dass es nicht bestraft wurde. Die Korruption geht unter der Oberfläche weiter. Legitimität ist dauerhaft beschädigt."

 amendment_events.1.t: "Ein Bundesgesundheitsprogramm für die Armen"
 amendment_events.1.d: "Die Vorschläge sind vor dem Kongress zur Schaffung eines föderal finanzierten Krankenversicherungsprogramms für einkommensschwache Amerikaner, ältere Menschen und Behinderte. Unterstützer argumentieren, dass private Märkte nicht und nicht denjenigen dienen können, die keine Prämien leisten können. Opponents argumentieren, dass es eine inakzeptable Erweiterung der föderalen Beteiligung am Gesundheitswesen ist.\nx id=1/> Die Koalition, die die Rechnung unterstützt, ist breit — Gewerkschaften, Sozialreformer und ein bedeutender Teil der Öffentlichkeit. Ob [ROOT.GetCountry.GetName] handelt, ist eine Frage des politischen Willens."
 amendment_events.1.f: "Medizin sollte nicht davon abhängen, ob Sie es sich leisten können."
 amendment_events.1.a: "Enact Medicaid — Bundesgesundheitsversorgung für diejenigen, die es brauchen"
 amendment_events.1.b: "Die Gesundheitsversorgung ist eine private Angelegenheit"
 
 amendment_events.2.t: "The Affordable Care Act"
 amendment_events.2.d: "Die Verwaltung hat eine umfassende Gesundheitsreform vorgelegt — das Affordable Care Act. Der Gesetzentwurf verpflichtet, dass alle Bürger eine Krankenversicherung tragen, regulierte Marktplätze schaffen, Medicaid-Lieferbarkeit verlängern, und Bars Versicherer von der Leugnung für bestehende Bedingungen.\nx id=1/> Das individuelle Mandat ist zutiefst umstritten. Unterstützer sagen, es ist der einzige Weg, um Versicherungsmärkte funktionieren. Die Opposition nennt es Regierungsüberschreitung. Die Abstimmung findet in der Abstimmungsstunde statt."
 amendment_events.2.f: "40 Millionen unversicherte Amerikaner. Der Kongress hat die Chance, das zu ändern."
 amendment_events.2.a: "Unterzeichnen Sie das Affordable Care Act in Recht"
 amendment_events.2.b: "Das Mandat ist zu weit gegangen."
 
 amendment_events.3.t: "Das PATRIOT-Gesetz"
 amendment_events.3.d: "In den Wochen nach den Angriffen vom 11. September hat sich der Kongress mit außergewöhnlicher Geschwindigkeit bewegt, um das US-PATRIOT-Gesetz zu übergeben — dramatisch expandieren häusliche Überwachungsbehörden, reduzieren die gerichtliche Aufsicht über die Geheimdienste und ermöglichen eine beispiellose Informationsaustausch über Strafverfolgungsbehörden.\nx id=1/> Die Rechnung hat Nah-unanimous Unterstützung. Bürgerliche Freiheiten befürworten warnen, dass die Geschwindigkeit der Passage und die Breite der Bestimmungen schwierig sein, zurück zu gehen. Das Land ist immer noch traurig. Die Abstimmung ist morgen."
 amendment_events.3.f: "Angst ist ein Gesetzgeber."
 amendment_events.3.a: "Unterzeichnen Sie das PATRIOT-Gesetz — nationale Sicherheit erfordert es"
 amendment_events.3.b: "Verweigerung — bürgerliche Freiheiten können nicht in Trauer verhandelt werden"
 
 amendment_events.4.t: "Ein Bundesangriffswaffenverbot"
 amendment_events.4.d: "Der Kongress stimmt über ein zehnjähriges Bundesverbot für die Herstellung von bestimmten halbautomatischen Waffen und Hochleistungsmagazinen für den zivilen Verkauf. Die Rechnung wird von Strafverfolgungsverbänden und den Familien der Schießopfer unterstützt. Die Kanonenlobby hat stark gegen sie ausgegeben.\nx id=1/> Die zehnjährige Sonnenuntergangsklausel wurde hinzugefügt, um die endgültigen Stimmen zu sichern. Das Verbot wird im Jahr 2004 ablaufen, es sei denn, es wird erneuert, und die politische Koalition, sie zu erneuern, darf nicht bestehen."
 amendment_events.4.f: "Zehn Jahre. Dann geschieht die Abstimmung wieder."
 amendment_events.4.a: "Das Verbot übergehen — zehn Jahre ist ein Start"
 amendment_events.4.b: "Besiegen Sie es — gesetzwidrige Bürger sollten nicht für kriminelle Handlungen zahlen"
 
 amendment_events.5.t: "Das Gesetz über die Gewaltverhütung und Strafverfolgung"
 amendment_events.5.d: "Der Kongress erwägt die größte Kriminalitätsgesetzgebung in der Geschichte [ROOT.GetCountry.GetName] — Finanzierung von 100.000 neuen Polizeibeamten, eine signifikante Erweiterung des Bundesgefängnissystems, neue verbindliche Mindeststrafen und die Gewalt gegen das Frauengesetz als Fahrer.\nx id=2/> Die politische Logik ist bipartisan. Die kriminelle Welle der späten 1980er Jahre hat die Politik der Rechts- und Ordnungspolitik in Parteilinien populär gemacht. Die Rechnung wird leicht passieren. Ob es später funktionieren wird, ist eine Frage."
 amendment_events.5.f: "Die Rechnung geht leicht. Die Folgen dauern länger."
 amendment_events.5.a: "Das Land fordert Maßnahmen zur Kriminalität"
 amendment_events.5.b: "Reject it — obligatorische Mindest- und Masseninhaftierung sind nicht die Antwort"
 
 amendment_events.6.t: "Die Reform der Steuerbeteiligung"
 amendment_events.6.d: "Finanzminister Liu Jihua hat die bedeutendste Steuerreform seit der Gründung der Volksrepublik vorgeschlagen — die ausgehandelten steuerlichen Vereinbarungen zwischen Peking und den lokalen Regierungen durch eine nationale Mehrwertsteuer und eine formale Umsatzformel zu ersetzen.\nx id=1/> Die Reform würde die Steuerkraft dramatisch zentralisieren und Peking einen zuverlässigen und wachsenden Umsatzstrom geben. Lokale Regierungen werden Diskretion verlieren, aber Klarheit gewinnen. Die industriellen und kommerziellen Interessen, die Beziehungen zu den lokalen Behörden aufgebaut haben, sind ruhig entgegengesetzt."
 amendment_events.6.f: "Das Zentrum will, was die Provinzen gehalten haben."
 amendment_events.6.a: "Umsetzung des Steuerteilungssystems — Zentralisierung der Steuerbehörde"
 amendment_events.6.b: "Bewahren der bestehenden Regelungen — nicht stören, welche Funktionen"
 
 amendment_events.7.t: "Die 35-Stunden-Woche"
 amendment_events.7.d: "Die Arbeitsministerin Martine Aubry hat Rechtsvorschriften vorgeschlagen, die eine 35-stündige gesetzliche Arbeitswoche für die meisten Arbeitnehmer belegen — die Standardstunden ab 39 reduzieren. Die Politik wird als eine Möglichkeit dargestellt, die Arbeit weiter zu teilen: weniger Stunden pro Arbeitnehmer, mehr Beschäftigte.\nx id=1/> Gewerkschaften sind begeistert. Der Arbeitgeberverband hat vor einer Wettbewerbskrise gewarnt. Ökonomen sind geteilt. Die linke Koalition, die diese Regierung gewählt hat, lief auf das Versprechen. Die Frage ist, ob sie geliefert werden soll."
 amendment_events.7.f: "25 Stunden. Zwei Stunden weniger. Ein politischer Feuersturm."
 amendment_events.7.a: "Die Arbeiter verdienen kürzere Stunden"
 amendment_events.7.b: "Die wirtschaftlichen Kosten sind zu hoch"
 
 patriot_act_rejected_modifier: "PATRIOT-Gesetz abgelehnt"
 patriot_act_rejected_modifier_desc: "Die Entscheidung, das PATRIOT-Gesetz nicht zu übergeben, hat die Sicherheitseinrichtung frustriert und den politischen Konsens nach dem Angriff belastet."
 
 china_tax_reform_rejected_modifier: "Steuerreform Stalled"
 china_tax_reform_rejected_modifier_desc: "Das Versäumnis, das Steuersystem zu zentralisieren, hat die Steuerbehörde zersplittert. Die lokalen Regierungen verhandeln weiterhin ihre eigenen Vereinbarungen, was die Einnahmen und Befugnisse des Zentrums reduziert."
 
 terrorism_a.1.t: "Das World Trade Center ist bombed"
 terrorism_a.1.d: "Eine Bombe ist in der Tiefgarage des World Trade Center in New York explodiert. Die Explosion tötete sechs Menschen und verwundete über tausend. Das Gebäude fiel nicht – aber die Absicht war, einen Turm auf den anderen zu bringen.\n>x id=1/>Es ist der erste große internationale Terroranschlag auf [ROOT.GetCountry.GetName] Boden. Die Täter haben Verbindungen zu Netzwerken aus dem Nahen Osten und Zentralasien. Die Untersuchung läuft."
 terrorism_a.1.f: "Der erste Angriff. Nicht zuletzt."
 terrorism_a.1.a: "Wir werden die Verantwortlichen finden"
 
 terrorism_a.2.t: "Hurricane Andrew Strikes"
 terrorism_a.2.d: "Hurricane Andrew — der zerstörerischste atlantische Hurrikan zu der Zeit — hat Landfall in Süd-Florida mit Winden über 165 Meilen pro Stunde gemacht. Der Schaden ist katastrophal. Ganze Gemeinden im Bezirk Miami-Dade wurden zerstört. Vorläufige Schätzungen deuten darauf hin, dass dies eine der teuersten Naturkatastrophen in [ROOT.GetCountry.GetName]s Geschichte sein wird."
 terrorism_a.2.f: "Der Hurrikan kümmert sich um nichts, was gebaut wurde."
 terrorism_a.2.a: "Eine Bundeskatastrophe erklären — Erleichterung mobilisieren"
 
 terrorism_a.3.t: "Northridge Erdbeben"
 terrorism_a.3.d: "Ein Erdbeben in Höhe von 6.7 schlug das San Fernando Valley nördlich von Los Angeles um 4:31 Uhr morgens. 50-seven Menschen sind tot, Tausende verletzt, und die Schäden an der Infrastruktur - vor allem das Autobahnsystem und ältere Gebäude - hat bereits über zehn Milliarden von Dollar. Das Erdbeben ist die teuerste in [ROOT.GetCountry.GetName]'s Geschichte."
 terrorism_a.3.f: "Kalifornien schüttelt. Es schüttelt immer."
 terrorism_a.3.a: "Bundesrelief sofort mobilisieren"
 
 terrorism_a.4.t: "Bomben in Oklahoma City"
 terrorism_a.4.d: "Eine Lkw-Bombe hat die Front des Alfred P. Murrah Federal Building in Oklahoma City zerstört und 168 Menschen getötet – darunter 19 Kinder im Kindertageszentrum. Es ist der tödlichste heimische Terroranschlag in [ROOT.GetCountry.GetName]'s history.\nx id=2/> Die Täter sind nicht fremd. Timothy McVeigh und Terry Nichols sind [ROOT.GetCountry.GetAdjective] Bürger, die von Anti-Regierungs-Ideologie motiviert sind. Das Land ist mit der Realität konfrontiert, dass die Bedrohung von innen kommen kann."
 terrorism_a.4.f: "Der Feind war nicht an der Grenze. Er war schon hier."
 terrorism_a.4.a: "Das ist der heimische Terrorismus, wir werden mit voller Kraft reagieren"
 
 terrorism_a.5.t: "US Botschaften in Ostafrika bombardiert"
 terrorism_a.5.d: "Simultane Lkw-Bomben haben außerhalb der [ROOT.GetCountry.GetAdjective] Botschaften in Nairobi, Kenia und Dar es Salaam, Tansania explodiert. Die Angriffe tötete über 200 Menschen – die meisten von ihnen kenianische und tansanianische Zivilisten – und verwundeten Tausende mehr. Ein Netz unter der Leitung von Osama bin Laden hat die Verantwortung übernommen.\nx id=2/> Die Angriffe sind eine Erklärung, dass [ROOT.GetCountry.GetAdjective] Interessen weltweit Ziele sind. [ROOT.GetCountry.GetName]'s Antwort wird die Form des Gegenterrorismus für die kommenden Jahrzehnte definieren."
 terrorism_a.5.f: "Der Krieg kam zuerst zu unseren Botschaften."
 terrorism_a.5.a: "Dies ist ein Akt des Krieges — wir werden antworten"
 
 terrorism_a.6.t: "[ROOT.GetCountry.GetAdjective] Botschaft Ist gefeuert"
 terrorism_a.6.d: "Eine Lkw-Bombe ist außerhalb der US-Botschaft in Nairobi explodiert und hat mehr als 200 Menschen getötet — die meisten davon [ROOT.GetCountry.GetAdjective] Zivilisten, die damals in der Nähe des Gebäudes waren. Der Angriff richtete sich nicht an [ROOT.GetCountry.GetName]. [ROOT.GetCountry.GetName], da er die Kosten ohnehin nicht trug."
 terrorism_a.6.f: "Die Bombe unterscheidet nicht zwischen Nationen."
 terrorism_a.6.a: "Wir fordern Gerechtigkeit für unsere Toten"
 
 terrorism_a.7.t: "[ROOT.GetCountry.GetAdjective] Kapital ist Struck"
 terrorism_a.7.d: "Eine Bombe ist in der Nähe der US-Botschaft in Dar es Salaam explodiert und tötete elf Menschen in einem koordinierten Angriff neben einer gleichzeitigen Bombardierung in Nairobi, Kenia. Die Opfer waren in erster Linie [ROOT.GetCountry.GetAdjective] Zivilisten. Der Angriff hat das Land erschüttert."
 terrorism_a.7.f: "Der Terrorismus erreichte unsere Küsten von einem Ozean."
 terrorism_a.7.a: "Wir stehen mit unseren Leuten"
 
 terrorism_a.8.t: "Die USS Cole ist bombed"
 terrorism_a.8.d: "Ein kleines Boot mit Sprengstoff, das neben der USS Cole detoniert wurde, während es im Hafen von Aden, Jemen, betankt. Siebenzehn [ROOT.GetCountry.GetAdjective] Matrosen wurden getötet und 39 verletzt. Der Angriff wird auf al-Qaeda.\n>x id=2/>A Warship of the [ROOT.GetCountry.GetAdjective] Navy, auf einer routinemäßigen Tankstelle in einem freundlichen Hafen, wurde von einem Selbstmordattentäter in einem Gummi-Dinghy angegriffen. Die militärische Führung fragt, wie das geschehen darf."
 terrorism_a.8.f: "Die Marine soll das harte Ziel sein."
 terrorism_a.8.a: "Dies wird nicht unbeantwortet gehen"
 
 terrorism_a.9.t: "Die Brücke Creek–Moore Tornado"
 terrorism_a.9.d: "Ein EF5 Tornado — der stärkste auf der Fujita-Skala aufgezeichnet — hat einen Weg durch Bridge Creek und Moore, Oklahoma geschnitten. Windgeschwindigkeiten über 300 Meilen pro Stunde. Der Tornado war 85 Minuten auf dem Boden und schnitzte einen mile-weiten Weg der totalen Zerstörung durch Gemeinden südlich von Oklahoma City. 36 Menschen sind tot."
 terrorism_a.9.f: "Es gibt nichts mehr, wo der Tornado war."
 terrorism_a.9.a: "Hilfe für betroffene Gemeinden bereitstellen"
 
 terrorism_a.10.t: "32 Tote bei Virginia Tech"
 terrorism_a.10.d: "Ein Schütze hat 32 Studenten und Fakultät am Virginia Polytechnic Institute in Blacksburg, Virginia getötet, bevor er sein eigenes Leben. Es ist die tödlichste Schulaufnahme in der Geschichte [ROOT.GetCountry.GetName]. Der Schütze kaufte seine Schusswaffen trotz einer Geschichte der psychischen Gesundheit Bedenken, die ihn nach geltendem Recht disqualifiziert hätten.\nx id=2/> Der Ausfall des Hintergrund-Check-Systems ist jetzt unter Kontrolle."
 terrorism_a.10.f: "Er kaufte die Waffe legal."
 terrorism_a.10.a: "Überprüfen Sie die Feuerwaffen Hintergrundprüfverfahren sofort"
 
 terrorism_a.11.t: "82 Shot in Aurora Theater"
 terrorism_a.11.d: "Ein Schütze eröffnete während einer Mitternachtspremiere einen großen Film im Century 16 Theater in Aurora, Colorado, Tötung von 12 Menschen und Verwundung 70. Der Angreifer war bewaffnet mit einem halbautomatischen Gewehr, Schrotflinte und Handfeuerwaffen — alle in den Wochen vor dem Angriff legal erworben.\nx id=1/>Colorado und das Land sind in Schock."
 terrorism_a.11.f: "Eine Nacht im Kino. Zwölf Leute gingen nicht nach Hause."
 terrorism_a.11.a: "Eine Tragödie, die Reflexion verlangt"
 
 terrorism_a.12.t: "Gunman Kills 6 bei Wisconsin Sikh Temple"
 terrorism_a.12.d: "Im Sikh-Tempel von Wisconsin in Oak Creek eröffnete ein weißer Supremacist das Feuer und tötete sechs Anbeter, bevor er von der Polizei erschossen wurde. Der Angreifer war ein US Army Veteran mit Links zu Neonazi-Organisationen.\nx id=1/> Die Opfer wurden wegen ihrer Religion und ethnischen Zugehörigkeit gezielt. Der Angriff hat die Debatte über den Inlandsextremismus, Hasskriminalität und das Scheitern weißer nationalistischer Netzwerke regiert."
 terrorism_a.12.f: "Sie kamen zu beten. Er kam, um sie zu töten, für wen sie waren."
 terrorism_a.12.a: "Das ist Hasskriminalität — wir werden den inneren Extremismus nicht ignorieren"
 
 terrorism_a.13.t: "Tragödie in Sandy Hook"
 terrorism_a.13.d: "Ein Schütze tötete 20 Kinder zwischen sechs und sieben Jahren und sechs erwachsene Mitarbeiter an der Grundschule Sandy Hook in Newtown, Connecticut. Die Kinder wurden mehrmals mit einem Sturmgewehr geschossen.\nx id=1/> Es gibt keine ausreichenden Worte. [ROOT.GetCountry.GetName] ist in Trauer."
 terrorism_a.13.f: "Zwanzig Kinder. Sechs Jahre alt."
 terrorism_a.13.a: "Das Land trauert"
 
 terrorism_a.14.t: "The Dunblane Massacre"
 terrorism_a.14.d: "Ein Geschütz betrat die Dunblane Primary School in Schottland und tötete sechzehn Kinder im Alter von fünf und sechs Jahren und ihren Lehrer, bevor er sein eigenes Leben nahm. Es ist die tödlichste Massenaufnahme in [ROOT.GetCountry.GetName]'s history.\nx id=2/> Die nationale Antwort ist überfordert. Überlebende, Eltern und die Öffentlichkeit haben eine Kampagne für ein totales Verbot des Privateigentums gestartet. Die Regierung wird enormen Druck ausüben."
 terrorism_a.14.f: "16 Kinder. Fünf Jahre alt. Schottland wird nicht vergessen."
 terrorism_a.14.a: "Es muss sich etwas ändern — das Land fordert es"
 
 terrorism_a.15.t: "Die Yangtze Floods"
 terrorism_a.15.d: "Der Yangtze-Fluss und seine Nebenflüsse haben nach Monaten ungewöhnlich schwerer Niederschläge katastrophal geflutet. Die Überschwemmung hat 240 Millionen Menschen über Zentral- und Südstaaten betroffen [ROOT.GetCountry.GetName] — 14 Provinzen, 56 Millionen Hektar Land und Tausende von Siedlungen. Über 3.000 Menschen sind tot und 14 Millionen sind verschoben worden.\nx id=2/> Die staatliche Mobilisierung ist massiv. Das Militär hat Hunderttausende Truppen zur Überschwemmung eingesetzt. Dies ist die größte Naturkatastrophe der jüngsten [ROOT.GetCountry.GetAdjective] Geschichte."
 terrorism_a.15.f: "Der Fluss entschied sich, zu nehmen, was die Deiche versprochen hatten, zu halten."
 terrorism_a.15.a: "Die volle Kraft des Staates wird eingesetzt"
 
 terrorism_a.16.t: "Wohnung Gebäude in Moskau bombardiert"
 terrorism_a.16.d: "Eine Reihe von Bombenangriffen auf Wohnungsbauten in Moskau und anderen russischen Städten hat fast 300 Menschen getötet, während sie schliefen. Die Bombardierungen wurden Tschetschenischen Separatisten zugeschrieben — obwohl die Beweise von einigen Beobachtern angefochten werden.\nx id=1/> Die Angriffe haben enormen öffentlichen Druck für eine entscheidende militärische Reaktion geschaffen. Eine neue militärische Kampagne in Tschetschenien wird jetzt ernst genommen. Die politische Figur, die die Terroristen verspricht, wird die Öffentlichkeit finden, ist bereit, ihm zu folgen."
 terrorism_a.16.f: "Angst ist ein mächtiges politisches Instrument. So ist Trauer."
 terrorism_a.16.a: "Dies erfordert eine volle militärische Antwort"
 
 # ── MODIFIERS ────────────────────────────
 
 he_terror_attack_domestic: "Angriff auf den Terrorismus"
 he_terror_attack_domestic_desc: "Ein terroristischer Angriff auf [ROOT.GetCountry.GetAdjective] Boden hat das öffentliche Vertrauen geschüttelt und die Radikalisierung und die Turbulenzen erhöht."
 
 he_terror_attack_foreign: "Overses Terrorangriff"
 he_terror_attack_foreign_desc: "Ein terroristischer Angriff auf [ROOT.GetCountry.GetAdjective] Interessen im Ausland hat Prestige und diplomatisches Stehen beschädigt."
 
 he_counterterrorism_push: "Antwort der Gegenpartei"
 he_counterterrorism_push_desc: "Es wird eine große Gegenterrorismuskampagne durchgeführt. Die Autorität und die Legitimität werden gestärkt, aber die Scham, die durch aggressive Operationen im Ausland erzeugt wird, wird Zeit zum Verfall nehmen."
 
 he_natural_disaster_emergency: "Natürliche Katastrophe Notfall"
 he_natural_disaster_emergency_desc: "Eine große Naturkatastrophe hat die Bundesnotstandsreaktion ausgelöst. Die Kosten sind beträchtlich und die Kapazität der Regierung wird erweitert."
 
 he_disaster_zone: "Zone des Katastrophenschutzes"
 he_disaster_zone_desc: "Dieser Zustand wurde durch eine Naturkatastrophe schwer beschädigt. Infrastruktur, Sterblichkeit und Migrationszug sind alle negativ betroffen."
 
 he_domestic_extremism_response: "Inlandsextremismus Reaktion"
 he_domestic_extremism_response_desc: "Nach einem heimischen Terrorangriff hat [ROOT.GetCountry.GetName] eine signifikante interne Sicherheitsreaktion auf extremistische Netzwerke gestartet."
 
 he_military_shock: "Militärschock"
 he_military_shock_desc: "Ein erfolgreicher Angriff auf [ROOT.GetCountry.GetAdjective] Militärgüter hat die Streitkräfte geschüttelt und das nationale Prestige beschädigt."
 
 he_mass_shooting: "Massenschießen"
 he_mass_shooting_desc: "Ein Massenschießen hat die öffentliche Angst und politische Polarisierung gegenüber der Schusswaffenpolitik verstärkt."
 
 he_mass_shooting_severe: "Massenschießen — Nationale Tragödie"
 he_mass_shooting_severe_desc: "Eine Massenaufnahme von außergewöhnlicher Schwere hat tiefe nationale Trauer und intensiven politischen Druck geschaffen. Die Legitimität der bestehenden Politik wird in Frage gestellt."
 
 he_hate_crime_shock: "Hat Kriminalität — National Shock"
 he_hate_crime_shock_desc: "Ein gezielter Hass-Kriminalitäts-Angriff hat die Nation erschüttert und die Bedrohung des inländischen Extremismus, der auf Minderheitengemeinschaften gerichtet ist, hervorgehoben."
 
 he_gun_reform_mandate: "Öffentliches Mandat für Waffenreform"
 he_gun_reform_mandate_desc: "Der öffentliche Ausbruch nach einem Massenschießen hat eine starke politische Dynamik für die Waffenreform geschaffen. Das Gesetz ist einfacher als üblich."
 
 he_security_state_response: "Antwort des Sicherheitsstaats"
 he_security_state_response_desc: "Ein großer Terrorangriff hat öffentliche Unterstützung für erweiterte Staatssicherheitskräfte erzeugt. Autorität und Legitimität werden gestärkt."
 
 ## breakup of czechoslovakia
 je_velvet_divorce: "Der Velvet Divorce"
 je_velvet_divorce_reason: "Der Verband ist unter Spannung. Der Übergang vom Kommunismus hat die wirtschaftlichen und politischen Fehlerlinien zwischen der tschechischen und der slowakischen Staatshälften freigelegt. Die slowakischen Politiker — unter der Leitung von Vladimír Mečiar — drängen auf eine größere Autonomie, und einige für die volle Unabhängigkeit. Die tschechische Seite, unter der Leitung von Václav Klaus, ist zunehmend bereit, sie gehen zu lassen.\n>x id=1/> Zwei Kräfte sind jetzt in Bewegung. [ROOT.GetCountry.GetName] muss bauen #bold föderale Kohäsion#! — durch Verhandlungen, wirtschaftliche Kompromisse und politische Fähigkeiten — vor #bold Wenn der Druck 100 erreicht, bevor der Zusammenhalt erreicht, wird sich der Verband auflösen. Friedlich. Das bedeutet 'welches'."
 
 je_velvet_divorce_stable_tt: "Die Föderation hält. Verhandlungen gehen weiter. Das Ergebnis ist noch in den Händen der Regierung."
 je_velvet_divorce_tense_tt: "@warning! #bold Separatist Druck steigt.#! Slowakische Politiker sind zunehmend zuversichtlich, dass Unabhängigkeit möglich und wünschenswert ist. Das Fenster für eine ausgehandelte Siedlung verengt sich."
 je_velvet_divorce_critical_tt: "@warning! #bold Die Fütterung liegt an der Bruchstelle.#! Die politischen Bedingungen für die Auflösung sind fast vollständig. Ohne eine dramatische Intervention wird die Tschechoslowakei das Jahr nicht überleben."
 
 federal_cohesion_bar: "Bundeskohäsion"
 federal_cohesion_bar_desc: "Bundeskohäsion"
 federal_cohesion_bar_progress_tt: "Bundeskohäsionsniveau"
 
 separatist_pressure_bar: "Separatistdruck"
 separatist_pressure_bar_desc: "Separatistdruck"
 separatist_pressure_bar_progress_tt: "Separatistische Dynamik"
 
 # ── EVENTS ───────────────────────────────
 
 velvet_divorce.1.t: "Die Verfassungskrise beginnt"
 velvet_divorce.1.d: "Die Wahlen vom Juni 1992 haben zu einem unmöglichen Ergebnis geführt. In den tschechischen Ländern gewann Václav Klaus's Civic Democratic Party auf einer Plattform der schnellen Marktliberalisierung. In der Slowakei gewann die Bewegung von Vladimír Mečiar für eine demokratische Slowakei auf einer Plattform der langsameren Reform und der größeren slowakischen Autonomie.\nx id=1/> Die beiden Männer trafen sich in Brünn und vereinbarten eine Sache: die derzeitige Anordnung kann nicht weitergehen. Sie widersprechen fast alles andere. Der Präsident Václav Havel, der der Meinung ist, daß die Öffentlichkeit das Land bei der Anfrage zusammenhalten wird, ist abgeändert.\nx id=3/> Das Schicksal von [ROOT.GetCountry.GetName] stellt nun eine Frage, was die nächsten Monate bringen."
 velvet_divorce.1.f: "Zwei Wahlen. Zwei Mandate. Ein Land."
 velvet_divorce.1.a: "Die Regierung wird die Föderation zusammenhalten"
 
 velvet_divorce.2.t: "Slowakische Wirtschaft"
 velvet_divorce.2.d: "Die slowakische Wirtschaft leidet am Übergang vom Kommunismus härter als Böhmen und Mähren. Die slowakische Industriebasis, die sich um schwere Herstellung und Rüstungsproduktion für den Warschauer Pakt erstreckt, ist fast über Nacht zusammengebrochen. Die Arbeitslosigkeit nimmt stark zu. Slowakische Politiker beschuldigen die Bundeswirtschaftspolitik und fordern entweder eine Umverteilung oder ein Recht auf eigene Kurse.\nx id=1/> Die Kluft zwischen den beiden Landeshälften wird politisch brennbar."
 velvet_divorce.2.f: "Wenn ein halbes Land gut und die andere Hälfte nicht tut, wird die Frage, warum eine Frage von wem."
 velvet_divorce.2.a: "Umgeleitete Bundesmittel in die slowakischen Regionen"
 velvet_divorce.2.b: "Der Markt wird sein Niveau finden — keine besondere Behandlung"
 
 velvet_divorce.3.t: "Die slowakische Erklärung der Souveränität"
 velvet_divorce.3.d: "Der slowakische Nationalrat hat eine Erklärung der Souveränität der Slowakei abgegeben. Das Dokument hört nicht auf, die Unabhängigkeit zu erklären, sondern behauptet, dass das slowakische Recht das Bundesrecht auf slowakischem Gebiet übertrifft.\nx id=1/> Dies ist konstitutionell mehrdeutig und politisch explosiv. Präsident Havel verurteilte es und trat seine tschechische Präsidentschaft kurz darauf zurück. Die Erklärung ist noch kein Bruch — aber sie ist der erste formale Schritt in Richtung eines."
 velvet_divorce.3.f: "Noch nicht Unabhängigkeit. Aber die Richtung ist klar."
 velvet_divorce.3.a: "Die Erklärung zu verurteilen — das Bundesrecht ist höchste"
 velvet_divorce.3.b: "Offene Gespräche — bieten der Slowakei mehr formale Autonomie innerhalb der Föderation"
 
 velvet_divorce.4.t: "Mečiar und Klaus: Zwei Männer, zwei Visionen"
 velvet_divorce.4.d: "Vladimír Mečiar und Václav Klaus haben sich wieder getroffen. Ihre Verhandlungspositionen sind ausgehärtet. Klaus will eine enge Bundesunion mit einer einheitlichen Wirtschaftspolitik. Mečiar will entweder eine lose Konföderation mit nahezu slowakischer häuslicher Autonomie oder Unabhängigkeit.\nx id=1/> Diejenigen, die an diesem Treffen teilnahmen, beschreiben es als zivil, aber unvereinbar. Die beiden Männer sind keine Feinde – aber sie wollen grundlegend verschiedene Dinge, und einer von ihnen wird bekommen, was er will."
 velvet_divorce.4.f: "Zwei Pragmatiker. Gegen Schlussfolgerungen."
 velvet_divorce.4.a: "Zurück zum einheitlichen Marktreformprogramm – Unterstützung Klaus"
 velvet_divorce.4.b: "Angebot einer lockereren Konföderation — geben Sie Mečiar etwas mit"
 
 velvet_divorce.5.t: "Anrufe für ein Referendum"
 velvet_divorce.5.d: "Slowakische Politiker und Bürgergruppen fordern ein Referendum über die Unabhängigkeit. Der Vorschlag hat eine beträchtliche öffentliche Unterstützung in der Slowakei, in der Umfragen nahelegen, dass eine enge Mehrheit eine gewisse Form der Trennung befürwortet. Der Präsident Havel — trotz seines Rücktritts noch einflussreich — hat gegen ein Referendum argumentiert. Er glaubt, der Prozess selbst würde Leidenschaften entzünden und ein rationales Ergebnis unmöglich machen. „Nationen beschließen nicht, die Art und Weise, wie eine Aktionärsversammlung über eine Fusion abstimmt", sagte er. „Sie fühlen sich zu ihr hin oder weg von ihr." Die Frage, ob eine Abstimmung stattfinden soll, ist selbst eine Abstimmung über das, was [ROOT.GetCountry.GetName] glaubt, es ist."
 velvet_divorce.5.f: "Ein Referendum ist eine Frage. Aber einige Fragen zu stellen ändert die Antwort."
 velvet_divorce.5.a: "Halten Sie das Referendum — lassen Sie die Menschen sprechen"
 velvet_divorce.5.b: "Blockieren Sie das Referendum — folgen Sie Havels Rat"
 
 velvet_divorce.10.t: "Tschechoslowakei überleben"
 velvet_divorce.10.d: "Die Krise ist vergangen. Durch eine Kombination von wirtschaftlichen Kompromissen, politischen Verhandlungen und der Beharrlichkeit der Bundesorgane hat [ROOT.GetCountry.GetName] zusammengehalten.\nx id=2/> Die sich ergebende Anordnung ist nicht die Föderation von 1990. Die Slowakei hat mehr Autonomie. Die wirtschaftliche Beziehung zwischen den beiden Hälften wurde wieder ausgeglichen. Aber der Zustand ist intakt und die Flagge ist unverändert.\nx id=4/> Die Geschichte wird feststellen, dass dies nicht unvermeidlich war, dass es aktive Entscheidungen erforderte und dass diese Entscheidungen getroffen wurden."
 velvet_divorce.10.f: "Die Samtscheide ist nicht passiert. Das ist ein Sieg."
 velvet_divorce.10.a: "Tschechoslowakei hält"
 
 velvet_divorce.15.t: "Der Velvet Divorce"
 velvet_divorce.15.d: "Es ist erledigt. Am 1. Januar 1993 wird die Tschechoslowakei nicht mehr existieren.\nx id=1/> Die Auflösung wurde vom Bundestag vereinbart – nicht durch Referendum. Die Öffentlichkeit wurde nie direkt gefragt. Die Polls in beiden Landeshälften zeigten konsequent Mehrheitsbefürwortung für die Erhaltung einiger Form des gemeinsamen Staates, aber die politische Klasse - Klaus und Mečiar vor allem - stellte fest, dass die Union unarbeitbar war.\nx id=3/> Die Spaltung war friedlich. Keine Schüsse wurden gefeuert. Es wurden keine Grenzen angefochten. Die Vermögenswerte und Verbindlichkeiten des Verbandes wurden nach einer auf der Bevölkerung basierenden Formel aufgeteilt. Die Armee wurde geteilt. Die Währung wurde geteilt. Die Flagge wurde geteilt.\nx id=5/>Czechoslovakia existierte für siebzig-vier Jahre. Es wurde in Revolution geboren und in einer parlamentarischen Abstimmung aufgelöst. Beide Nachfolgestaaten haben sich bereits für die EU und die NATO-Mitgliedschaft beworben."
 velvet_divorce.15.f: "Vierundsiebzig Jahre. Endet durch Papierarbeit."
 velvet_divorce.15.a: "Die Auflösung verläuft"
 
 velvet_divorce.16.t: "Die Tschechische Republik ist geboren"
 velvet_divorce.16.d: "Am 1. Januar 1993 wird die Tschechische Republik zum unabhängigen Staat. Das Gebiet der Böhmen, Mähren und der tschechischen Schlesien - mit Prag als Hauptstadt - bildet einen der beiden Nachfolgestaaten der Tschechoslowakischen Föderation.\nx id=1/> Der neue Staat erbt die stärker entwickelte Hälfte der alten Wirtschaft, ein funktionierendes demokratisches System und sofortige internationale Anerkennung. Der Weg nach Europa ist offen."
 velvet_divorce.16.f: "Ein neuer Staat. Eine alte Nation."
 velvet_divorce.16.a: "Die Tschechische Republik beginnt"
 
 velvet_divorce.17.t: "Die Slowakische Republik ist geboren"
 velvet_divorce.17.d: "Am 1. Januar 1993 wird die Slowakische Republik zum unabhängigen Staat. Bratislava ist die Hauptstadt eines Landes, das in dieser Form für genau einen Tag existiert hat.\n>x id=1/>Slovakia erbt ein schweres industrielles Erbe, höhere Arbeitslosigkeit und ein komplizierteres politisches Umfeld – Mečiars Regierungsstil wird bald internationale Kritik ziehen. Aber der Staat ist souverän, anerkannt und zum ersten Mal in der Geschichte völlig unabhängig."
 velvet_divorce.17.f: "Zum ersten Mal in seiner Geschichte: eine unabhängige Slowakei."
 velvet_divorce.17.a: "Slowakische Republik beginnt"
 
 velvet_divorce.18.t: "Was kommt als Nächstes?"
 velvet_divorce.18.d: "Tschechoslowakei löst sich auf. Seine Nachfolgestaaten - die Tschechische Republik und die Slowakische Republik - nehmen Gestalt an.\nx id=1/> Sie waren der Anführer eines Landes, das nicht mehr existiert. Die Frage ist nun, welche Rolle Sie in dem, was als nächstes kommt spielen werden."
 velvet_divorce.18.f: "Ein Land. Zwei Zukunften."
 velvet_divorce.18.a: "Weiter als die Tschechische Republik"
 velvet_divorce.18.b: "Weiter als Slowakische Republik"
 velvet_divorce.18.c: "Bleiben und beobachten Sie die Auflösung"
 
