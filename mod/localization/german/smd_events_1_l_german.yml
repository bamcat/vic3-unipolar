 ### SECOND INTIFADA
 ### ══════════════════════════════════════════

 je_second_intifada: "Die zweite Intifada"
 je_second_intifada_reason: "Die Palästinenser haben sich in einem Massenaufstand gegen israelische Besatzung niedergeschlagen. In den engen Gassen und dicht gepackten Flüchtlingslagern zählt die konventionelle militärische Überlegenheit fast nichts. Die Welt Uhren als Steine treffen Panzer in einem der asymmetrischsten Konflikte in der modernen Geschichte."

 je_intifada_complete_tt: "Eine Seite wurde besiegt oder angegliedert."

 je_intifada_status_uprising: "Die Intifada befindet sich in ihrer #bold aufsteigenden Phase#!. Street-Clashes, Steinwurf und Guerilla Widerstand dominieren den Konflikt. Die konventionellen militärischen Operationen sind in diesem begrenzten Gebiet fast unmöglich."
 je_intifada_status_offensive: "Es wurde eine #bold Großbetrieb #! gestartet. Der Konflikt ist in seine entscheidende Phase getreten."

 je_intifada_score_bar: "Konfliktpunkte"
 je_intifada_score_bar_desc: "Israelischer Vorteil"
 je_intifada_score_bar_second_desc: "Palästinensische Autonomiebehörde"

 intifada_startup_tt: "Die zweite Intifada hat begonnen. Die palästinensischen Gebiete brechen im Widerstand gegen die israelische Besatzung auf."

 ### ══════════════════════════════════════════
 ### SCRIPTED BUTTONS
 ### ══════════════════════════════════════════

 je_intifada_military_operation: "Operation Defensive Shield"
 je_intifada_military_operation_desc: "Starten Sie eine umfassende militärische Operation in die palästinensischen Gebiete. IDF-Kräfte werden sich bewegen, um die großen Bevölkerungszentren wieder zu besetzen, militante Infrastruktur zu zerlegen und den Aufstand durch Gewalt zu unterdrücken."

 je_intifada_mass_resistance: "Masse populären Widerstand"
 je_intifada_mass_resistance_desc: "Eskalieren Sie den Aufstand in eine koordinierte Massenwiderstandsbewegung. Generalstreiks, Massendemonstrationen und verstärkte Straßenkämpfe werden die israelische Kontrolle an jeder Front herausfordern."

 intifada_minimum_score_tt: "Erfordert einen Konflikt-Score-Vorteil von mindestens 5"

 ### ══════════════════════════════════════════
 ### EVENTS
 ### ══════════════════════════════════════════

 intifada_events.1.t: "Der Konflikt Eskaliert"
 intifada_events.1.d: "Der Aufstand hat sich jenseits von Straßenschlägen eskaliert. Was als Steine und Proteste begann, ist zu einer vollen Konfrontation geworden. In den engen Gassen und Flüchtlingslagern Palästinas ist jedes Gebäude eine Festung und jede Straße ein Schlachtfeld."
 intifada_events.1.a: "Wir werden die Bestellung wiederherstellen"
 intifada_events.1.a.pal: "Wir werden nie aufhören zu widerstehen"

 intifada_events.2.t_isr: "Die Intifada endet"
 intifada_events.2.d_isr: "Die zweite Intifada wurde unterdrückt. Die israelischen Militäroperationen haben die Kontrolle über die Palästinensischen Territorien bestätigt, obwohl die Kosten des internationalen Rufs und des palästinensischen zivilen Lebens enorm waren. Die zugrunde liegenden Traurigkeiten bleiben ungelöst."
 intifada_events.2.t_pal: "Palästinensischer Widerstand"
 intifada_events.2.d_pal: "Die zweite Intifada hat erreicht, was unmöglich schien. Durch schiere Entschlossenheit und Opfer hat das palästinensische Volk Israel zum Verhandlungstisch gezwungen. Die Welt hat die Macht des Volkswiderstandes gegen die Besatzung gesehen."
 intifada_events.2.a: "Was kommt als nächstes?"

 intifada_events.5.t: "Street Clashes"
 intifada_events.5.d: "Junge Palästinenser haben sich an den Rändern israelischer Checkpoints versammelt, bewaffnet mit Steinen und brennenden Reifen. Die engen Straßen kanalisieren die Konfrontation in einen Nahkampf, wo israelische Panzerfahrzeuge nicht effektiv manövrieren können. Fernsehkameras aus der ganzen Welt zeichnen die Szenen auf."
 intifada_events.5.a: "Verstärkung des Widerstandes"
 intifada_events.5.b: "Zurückhaltung"

 intifada_events.6.t: "Checkpoint Raids"
 intifada_events.6.d: "Die israelischen Militärkontrollstellen, die die palästinensischen Gemeinschaften unterteilen, stellen sowohl ein Symbol der Besatzung als auch ein taktisches Ziel dar. Ein koordinierter Streik könnte die israelische Kontrolle der Bewegung innerhalb der Territorien stören, obwohl er harte Vergeltung einladen wird."
 intifada_events.6.a: "Streichen der Checkpoints"
 intifada_events.6.b: "Zu gefährlich"

 intifada_events.8.t: "International Media Covering"
 intifada_events.8.d: "Internationale Medienstellen übertragen Bilder des Aufstands auf der ganzen Welt. Szenen von palästinensischen Zivilisten, die sich mit israelischen Militärkräften konfrontiert haben, haben Proteste und Verurteilungen in den Kapitalen weltweit ausgelöst. Arabische Liga-Nationen versammeln sich hinter der palästinensischen Ursache, während Israel vor dem diplomatischen Druck steht."
 intifada_events.8.a: "Die Welt beobachtet"

 intifada_events.7.t: "Die zweite Intifada"
 intifada_events.7.d: "Die Palästinensischen Gebiete sind ausgerottet. Nach jahrelangen gescheiterten Friedensverhandlungen und fortgesetzter Siedlungsausweitung ist die Frustration des palästinensischen Volkes zu einem offenen Aufstand übergegangen. In den zerklüfteten Straßen von Gaza und den Hügeln des Westjordanlands nimmt eine neue Generation den Kampf auf."
 intifada_events.7.a: "Dies wird eine Generation definieren"

