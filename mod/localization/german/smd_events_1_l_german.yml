 je_demographic_crisis_idle_tt: "Keine Fortschritte bei der Lösung der demographischen Krise. Umsetzung pronatalistischer Politiken: Kinder-, Gesundheits-, Sozial- und Wohnungsgesetze. Erhalten Sie einen durchschnittlichen Standard des Lebens von mindestens 12."

