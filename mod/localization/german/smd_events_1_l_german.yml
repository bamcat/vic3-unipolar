l_german:
#################### JE ####################
# The Internet

je_internet:0 "Das Internet"
je_internet_reason:0 "Es ist Zeit, unser Land mit dem Internet zu verbinden! Wir müssen unser Telekommunikationsnetz über die Unterstützung des einfachen Telefonverkehrs aufrüsten und unsere Bürger schließlich den Wundern des World Wide Web vorstellen!"

smd_tech.1.t:0 "[ROOT.GetCountry.GetName] Gos Online"
smd_tech.1.d:0 "Seit Jahrzehnten haben wir uns auf Zeitungen, Radio und Fernsehen verlassen. Aber eine ruhige Revolution fegt die Welt — ein riesiges Netz von miteinander verbundenen Computern bekannt als das Internet. Sobald die Domäne von Wissenschaftlern und Militärforschern, es verspricht jetzt, zu ändern, wie unsere Bürger arbeiten, lernen und verbinden."
smd_tech.1.f:0 "Dial-up-Internet: weil nichts sagt 'High-Tech' wie schreiende Piepen und warten 5 Minuten, um ein Bild einer Katze zu laden."

smd_tech.1.a:0 "Vielleicht sollten andere Technologien mit dem Web aswell verbinden!"
smd_tech.1.b:0 "Wir könnten die Interwebs nutzen, um die Kontrolle über die öffentliche Meinung auszuüben"

government_run_wifi_modifier:0 "Regierungsinterferenz in Wifi"

# Computer Science

je_computer_science:0 "Informatik"
je_computer_science_reason:0 "Informatik ist die Studie, wie Computer arbeiten, wie sie gemacht werden können, um Probleme zu lösen, und wie wir sie effizient und sicher verwenden können."

smd_tech.2.t:0 "Informatik Grad"
smd_tech.2.d:0 "Stellen Sie es als die Wissenschaft des Denkens logisch und lösen Probleme - aber mit Maschinen, die jeder winzigen Anweisung gehorchen. Es ist sowohl abstrakt als auch praktisch, und es macht fast jede moderne Technologie um uns herum, von Smartphones bis zu selbstfahrenden Autos."

# Pesticides

je_pesticides:0 "Herbizide"
je_pesticides_reason:0 "Schädlingsbekämpfungsmittel sind Substanzen, die zur Bekämpfung von Schädlingen verwendet werden. Dazu gehören Herbizide, Insektizide, Nematizide, Fungizide und viele andere. Die häufigsten davon sind Herbizide, die rund 50% aller Pestizide weltweit verwenden. Mit dieser neuen Erfindung stehen wir vor der Pflicht, unseren Agrarsektor auf Pestizide zu modernisieren."

smd_tech.3.t:0 "Ein Meer der Toten Schädlinge"
smd_tech.3.d:0 "Seit Jahrtausenden sind Insekten und Nagetiere eine unrelierende Bedrohung für die menschliche landwirtschaftliche Tätigkeit. Mit der jüngsten Erfindung verschiedener lebensmittelsicherer Chemikalien, die schädliche Insekten abstoßen und töten, können wir mehr schädliche Ernten liefern, während wir für mehr Lebensmittelsicherheit ein für alle Mal sorgen!"

smd_tech.3.a:0 "Es wäre besser, wenn sie weniger Umweltschäden verursachten..."

# Globalization

je_globalization:0 "Globalisierung"
je_globalization_reason:0 "Die Globalisierung ist eine Phänomene aus dem späten 20. Jahrhundert, die durch eine größere Vernetzung, den freien Verkehr von Kultur, Gütern, Waffen und Menschen definiert sind, die durch größere Freihandelsinitiativen auf der ganzen Welt ausgelöst wurden."

je_asian_economic_reform: "Wirtschaftsreform"
je_asian_economic_reform_reason: "China und Indien sind seit langem durch wirtschaftliche Beschränkungen gebunden. Die globale Wirtschaft bewegt sich schnell in Richtung Integration und Freihandel. Durch die Beseitigung veralteter Einschränkungen können wir uns an einem beispiellosen Wachstum beteiligen. Bis dahin bleiben unsere Märkte eingeschränkt."

asian_economy_restrictions: "Wirtschaftliche Beschränkungen"
asian_economy_restrictions_desc: "Staatskontrollierte Ineffizienzen und protektionistische Barrieren verlangsamen den Handel, verringern die Wettbewerbsfähigkeit und den internationalen Zugang."

booming_trade_economy: "Booming Trade Economy"
booming_trade_economy_desc: "Mit gehobenen Beschränkungen blühen die ausländischen und inländischen Märkte, was zu einem größeren Wohlstand führt."

asia_reform.1.t: "Märkte öffnen"
asia_reform.1.d: "Die Reformen wurden erlassen und restriktive Handelspolitiken aufgehoben. China und Indien stehen nun an der Spitze der wirtschaftlichen Globalisierung."
asia_reform.1.f: "„Wir müssen unsere Märkte öffnen, denn Isolation ist nicht mehr nachhaltig.“"
asia_reform.1.a: "Eine neue Ära des Handels beginnt."

# Starship

je_starships:0 "Starships"
je_starships_reason:0 "Die Erfindung der wiederverwendbaren Rakete hat sich bei der Erfindung einer anderen Art von Raumfahrzeugen, dem Raumschiff, schnell angestoßen. Es ist ein revolutionäres neues Design, das unsere Anerkennung verdient, dass es möglich ist, interplanetäre Barrieren effizient zu verletzen, auf den Mars zu landen und wieder auf die Erde zurückzukehren."

# coming soon

################ others ###########

# Cancer

cancer.1.t:0 "Die Heilung für Krebs"
cancer.1.d:0 "Seit über einem Jahrhundert hat Krebs die Menschheit heimgesucht – eine unvorhersehbare Affliktion, die Millionen behauptete und jede Heilung eluierte. Es kannte keine Grenzen, respektierte keinen Status und ließ Verwüstung in jeder Familie, die sie berührte. Aber heute, nach Jahren der unerbittlichen Forschung, klinischen Studien und der internationalen Zusammenarbeit, haben die Wissenschaftler das Unmögliche getan: eine universelle, gezielte Heilung entwickelt. Diese Durchbruch-Therapie erkennt und zerstört maligne Zellen, ohne gesundes Gewebe zu schaden, so dass Remission nicht nur möglich, sondern garantiert."
cancer.1.a:0 "Ein Triumph für alle Menschen."
cancer_eradication_prestige:0 "Eradicated Cancer"

# 2004 Indian Ocean earthquake and tsunami

indian_ocean_tsunami.1.t: "Erdbeben schlägt den Indischen Ozean"
indian_ocean_tsunami.1.d: "Ein massives Unterwasser-Erdbeben hat einen katastrophalen Tsunami ausgelöst, verheerende Küstenregionen in Süd- und Südostasien. Der Schaden ist beispiellos, und die Erholung wird Jahre dauern."
indian_ocean_tsunami.1.a: "Wir müssen sofort wieder aufbauen."
indian_ocean_tsunami.1.f: "In einer der schlimmsten Katastrophen auf Rekord hat ein verheerendes Erdbeben & Tsunami unsere Küstenregionen zerstört"

je_indian_ocean_tsunami: "Tsunami Erholung"
je_indian_ocean_tsunami_reason: "Ein verheerender Tsunami hat Ihre Küsteninfrastruktur beschädigt und das Land geschüttelt. Wiederaufbaumaßnahmen sind entscheidend für Erholung und Stabilität."

tsunami_recovery_success_tt: "Sie haben die nationale Erholung erfolgreich initiiert."

tsunami_disaster_struck: "Nationwide Tsunami Schaden"
tsunami_local_destruction: "Lokale Tsunami Devastation"
tsunami_reconstruction_complete: "Rekonstruktion komplett"
  
indian_ocean_tsunami_recovery_title: "Tsunami Erholung Efforts"
indian_ocean_tsunami_recovery_desc: "Ihr Land wurde vom Indischen Ozean Tsunami getroffen. Implementieren Sie Hilfe und Erholung, um Ihre Bevölkerung und Infrastruktur zu stabilisieren."

tsunami_aid_title: "Humanitäre Hilfe leisten"
tsunami_aid_desc: "Umsetzung von Sozialreformen oder Gewährung von Finanzhilfen für den Wiederaufbau betroffener Gebiete."

tsunami_disaster_struck: "Nationwide Tsunami Schaden"
tsunami_local_destruction: "Lokale Tsunami Devastation"
tsunami_reconstruction_complete: "Erfolgreicher Wiederaufbau"
tsunami_recovery_success_tt: "Das Land hat vor Dezember 2005 ein Sozialschutzgesetz erlassen."
 
indian_ocean_tsunami.2.t: "Tsunami Devastates Südasien"
indian_ocean_tsunami.2.d: "Ein massives Erdbeben und Tsunami haben den Indischen Ozean getroffen. Humanitäre Katastrophenweber. Die Weltuhren – werden wir handeln?"
indian_ocean_tsunami.2.f: "Die gesamte Küste ist verschwunden. Es wird dringend Hilfe benötigt."
indian_ocean_tsunami.2.a: "Soforthilfe senden."
indian_ocean_tsunami.2.b: "Wir haben unsere eigenen Prioritäten."

indian_ocean_tsunami.3.t: "Beihilfe erhalten"
indian_ocean_tsunami.3.d: "Eine fremde Nation hat humanitäre Hilfe geschickt. Deine Leute sind dankbar."
indian_ocean_tsunami.3.a: "Gott sei Dank für die globale Solidarität."

tsunami_foreign_aid_sent: "Gesendete ausländische Hilfe für Tsunami Opfer"
countries_available_to_request_aid_from:0 "Länder stehen zur Verfügung, um Hilfe von"
has_sent_iosa:0 "Hat bereits Beihilfe geschickt"

je_request_iosa_aid_button:0 "International Aid"
je_request_iosa_aid_button_desc:0 "Ersuchen Sie Hilfe von der internationalen Gemeinschaft, um sich von dem verheerenden Erdbeben und Tsunami zu erholen."

tsunami_disaster_struck: "Betroffen von 2004 Indian Ocean Earthquake & Tsunami"

# Iraq disarmament Crisis

je_iraq_disarmament_crisis: "Irakische Abrüstungskrise"
je_iraq_disarmament_crisis_reason: "Im Anschluss an den Golfkrieg wurde der Irak durch die Resolution 687 des Sicherheitsrates der Vereinten Nationen gebunden, um seine Massenvernichtungswaffen zu zerlegen. Die internationale Gemeinschaft, über UNSCOM und die IAEO, versuchte, die Einhaltung zu überprüfen, aber die Behinderung des Irak und die Streitigkeiten über Inspektionen haben einen protraktierten Standoff.\nx id=1/> Die Krise bedroht den herrschenden Konflikt, da Spannungen über die Weigerung des Irak wachsen, mit dem Abrüstungsregime vollständig zusammenzuarbeiten."
iraq_disarmament_resolved_tt: "Die Irakische Abrüstungskrise wurde behoben."

je_us_iraq_disarmament: "Irakische Abrüstungskrise"
je_us_iraq_disarmament_reason: "Die Vereinigten Staaten haben sich dazu verpflichtet, die Einhaltung der Resolution 687 des Sicherheitsrates der Vereinten Nationen zu zwingen. Wiederholte irakische Behinderung von UNSCOM- und IAEO-Inspektionen untergräbt globale Sicherheits- und Kraftstoffspannungen in der Golfregion.\nx id=1/> Die diplomatischen Bemühungen laufen weiter, aber militärische Optionen bleiben auf dem Tisch, wenn Inspektionen scheitern."

iraq_events.10.t: "Irak rejects UNSCOM Aircraft"
iraq_events.10.d: "In einer mutigen Herausforderung an die Sonderkommission der Vereinten Nationen (UNSCOM) hat der Irak Vorschläge für Inspektoren abgelehnt, ihre eigenen Flugzeuge in das Land einzubeziehen. Baghdad besteht darauf, die volle Kontrolle über den Zugang und den Transport zu gewährleisten und neue Sorgen über sein Engagement für die Abrüstung zu machen."
iraq_events.10.a: "Reject ihre Begriffe — Die Souveränität des Irak kommt zuerst."
iraq_events.10.b: "Lassen Sie die Flüge — Zusammenarbeit kann Spannungen zu erleichtern."

us_events.10.t: "Irak blockiert UNSCOM Flugzeug"
us_events.10.d: "Der Irak hat sich geweigert, UNSCOM-Inspektoren zuzulassen, ihr eigenes Flugzeug ins Land zu fliegen und die Inspektionsbemühungen weiter zu behindern. Dieser Schritt wird als ein direkter Akt der Unzulänglichkeit gegenüber der UNO und als Rückschlag für Abrüstungsbemühungen gesehen."
us_events.10.a: "Das kann nicht unbeantwortet bleiben."
us_events.10.b: "Vermeiden Sie eskalation — für jetzt."

################# COUNTRY-SPECIFIC ##############

# united states

rodney.1.t:0 "Die Polizei schlägt Rodney King"
rodney.1.d:0 "Ein unbewaffneter Afro-Amerikaner, Rodney King, wurde nach einer Hochgeschwindigkeitsjagd von Polizisten der Polizeiabteilung Los Angeles gewaltsam geschlagen. Ein Verteidiger filmte den Angriff, enthüllte Polizeibrutalität und entzündete die nationale Empörung."
rodney.1.f:0 "Sie umzingelten ihn und schlugen ihn mit Batons. Er kämpfte nicht zurück. Es war schrecklich — wie sie ein Beispiel aus ihm machen wollten."

rodney.1.a:0 "Es wird ein heißer Sommer."

rodney.2.t:0 "Tierärzte in Los Angeles"
rodney.2.d:0 "Auf Grund der Polizeibeamten, die beschuldigt wurden, übermäßige Gewalt in der schlagenden Rodney-Königs zu verwenden, die freigesprochen wurde, haben riesige Schwänze von Menschen auf die Straße gebracht, was zu mehr als 1 Milliarde Dollar Schaden an der Stadt verursacht"
los_angeles_riots:0 "Rodney King Riots"
rodney.2.a:0 "Sie werden sich allein niederlassen."
rodney.2.b:0 "Schicken Sie die Nationalgarde!"

north_hollywood.1.t: "Schießen in North Hollywood"
north_hollywood.1.d: "Zwei Räuber waren in Körperpanzer und trugen Angriffsgewehre. Um effektiv zu reagieren, mussten verzweifelte Offiziere Waffen aus einem lokalen Waffenlager ausleihen."
north_hollywood.1.f: "Zwei schwer bewaffnete Bankräuber verlobten eine lange Schießerei mit der Polizei von Los Angeles und verwundeten mehrere Offiziere und Zivilisten. Der Vorfall hat die Nation geschockt und Fragen über die Polizei vorbereitet."
north_hollywood.1.a: "Ein kühlender Tag in der Strafverfolgungsgeschichte."

north_hollywood_police_response:0 "Erhöhte gesetzliche Durchsetzungsunterstützung"

wtc_bombing.1.t: "1993 World Trade Center Bombing"
wtc_bombing.1.d: "Unter dem Nordturm des World Trade Centers in New York City ist eine kraftvolle Lkw-Bombe explodiert, sechs Menschen getötet und über tausend verletzt. Der Angriff schockiert die Nation und offenbarte Schwachstellen für den Terrorismus innerhalb seiner eigenen Grenzen."
wtc_bombing.1.a: "Erhöhung der nationalen Sicherheitsmaßnahmen."
wtc_bombing.1.b: "Bleiben Sie ruhig und vermeiden Sie Überreaktion."
heightened_security_measures: "Erhöhte Sicherheitsmaßnahmen"
heightened_security_measures_desc: "Als Reaktion auf einen Terroranschlag hat die Regierung stärkere interne Sicherheitspolitiken und die Koordinierung der Strafverfolgungsbehörden umgesetzt."
oklahoma_city_aftermath: "Oklahoma City Bombing Aftermath"
oklahoma_city_aftermath_desc: "Die verheerende Bombardierung des Alfred P. Murrah Federal Building hat die Nation geschüttelt. Die Sicherheitsbedenken und die politischen Auswirkungen verschlechtern sich, da die Regierung ihre häusliche Wachsamkeit verschärft."
 
usa_events.1.t: "Republikanische Primärergebnisse"
usa_events.1.d: "Nach einer beheizten Hauptsaison, die mit Debatten und Kampagnen gefüllt ist, hat die Republikanische Partei ihren neuen Standard-Bearer gewählt. George W. Bush ist siegreich geworden, nimmt die Zügel der Petite Bourgeoisie und verspricht ein mutiges neues Kapitel für die Partei."
usa_events.1.a: "Die Nominierung ist seine."

usa_events.2.t: "Die Nominierung von Barack Obama"
usa_events.2.d: "Nach einer beheizten Hauptsaison, die mit Debatten und Kampagnen gefüllt ist, hat die Demokratische Partei ihren neuen Standard-Bearer gewählt. Barack Hussein Obama ist siegreich geworden, nimmt die Zügel der Petite Bourgeoisie und verspricht ein mutiges neues Kapitel für die Partei."
usa_events.2.a: "Die Nominierung ist seine."

usa_events.3.t: "Die Nominierung von Donald Trump"
usa_events.3.d: "Nach einer beheizten Hauptsaison, die mit Debatten und Kampagnen gefüllt ist, hat die Republikanische Partei ihren neuen Standard-Bearer gewählt. Donald John Trump, eine besonders umstrittene Figur, ist siegreich geworden, nimmt die Zügel der Profis und verspricht ein mutiges neues Kapitel für die Partei."
usa_events.3.a: "Die Nominierung ist seine."

# Storm of the Century
american_disasters.1.t: "1993 Sturm des Jahrhunderts"
american_disasters.1.d: "Ein massiver Zyklonsturm hat in den östlichen Vereinigten Staaten geschwommen und Rekordschnee, Hurrikan-Kraftwinde und starke Überschwemmungen entlang der Küste gebracht. Millionen bleiben ohne Macht, und die Todesmaut steigt täglich."
american_disasters.1.a: "Wir müssen den Zorn des Winters ertragen."

# Great Flood of 1993
american_disasters.2.t: "Die große Flut!"
american_disasters.2.d: "Die Wochen des starken Regens und der gesättigten Erde haben die Flüsse Mississippi und Missouri dazu gebracht, weit über ihre Ufer zu quellen und weite Gebiete des amerikanischen Mittleren Westens einzutauchen. Ganze Städte sind unter Wasser, und der Schaden ist beispiellos."
american_disasters.2.a: "Eine Katastrophe für das Land."

great_flood_of_1993: "Große Flut von 1993"
storm_of_the_century: "1993 Sturm des Jahrhunderts"

# Columbine

columbine.1.t: "Colorado High School Massacre"
columbine.1.d: "Zwei schwer bewaffnete Studenten haben einen tödlichen Angriff an der Columbine High School in Colorado durchgeführt, viele getötet und verwundet, bevor sie ihr eigenes Leben nehmen. Die Veranstaltung hat bundesweite Trauer und Debatte über Waffenkontrolle, Schulsicherheit und kulturelle Einflüsse ausgelöst."
columbine.1.a: "Gedanken & Gebete"
columbine.1.b: "Wir müssen die Sicherheit an Schulen in unserer ganzen Nation erhöhen."

national_mourning_school_shooting: "Mourning School Shooting"
school_security_measures: "Maßnahmen der Schulsicherheit"

better_school_security: "Bessere Schulsicherheit"
thoughts_and_prayers: "Gedanken und Gebete"
recent_mass_shooting: "Jüngste Messe Schießen"

# September 11 Attacks 

ground_zero: "Boden Null"
  
je_war_on_terror: "Krieg gegen den Terror"
je_war_on_terror_reason: "Die Terroranschläge von September 11, 2001 auf die Vereinigten Staaten markierten den Beginn einer anhaltenden globalen Kampagne gegen den Terrorismus.\n>x id=1/> Nach den Anschlägen haben die Vereinigten Staaten die sogenannte "Krieg gegen den Terror" gestartet – eine breite Strategie, die militärische Operationen, Geheimdienste und nationale Sicherheitsmaßnahmen kombiniert. Die Folgen für die Außenpolitik, die Debatten über die bürgerlichen Freiheiten und die internationalen Bündnisse.\nx id=3/>"

usa_wot.1.t: "Amerika unter Angriff"
usa_wot.1.d: "Koordinierte Terroranschläge schlugen New York City und Washington, D.C., um die Türme des World Trade Centers zu zerstören und das Pentagon schwer zu beschädigen. Tausende wurden getötet oder verletzt. Die Nation ist schockiert und fordert eine Antwort."
usa_wot.1.a: "Ein Tag, der in Scham leben wird."

usa_wot.2.t: "Ein Krieg gegen den Terror"
usa_wot.2.d: "Nach den Anschlägen hat der Präsident eine globale Kampagne gegen diejenigen angekündigt, die terroristische Organisationen planen, unterstützen oder hafen. Diese Erklärung wird zu verstärkten Sicherheitsmaßnahmen im In- und Ausland führen."
usa_wot.2.a: "Wir werden sie zur Gerechtigkeit bringen."

global_wot.1.t: "US angegriffen; Tausende tot"
global_wot.1.d: "Die Vereinigten Staaten haben verheerende Terroranschläge erlitten. Weltführer haben Kondolenz angeboten und viele Staaten respektieren ihre Sicherheitsvereinbarungen."
global_wot.1.a: "Eine Tragödie für alle Menschen."

global_wot.2.t: "USA erklärt Krieg gegen Terror"
global_wot.2.d: "Nach den Angriffen vom 11. September haben die Vereinigten Staaten einen globalen "Krieg gegen den Terror" erklärt, der die internationale Gemeinschaft auffordert, sich einer Kampagne gegen terroristische Gruppen und ihre Anhänger anzuschließen."
global_wot.2.a: "Die internationale Ordnung geht um."

global_wot.3.t: "US ruft Artikel 5 an"
global_wot.3.d: "Nach dem 11. September und der anschließenden US-Militärkampagne in Afghanistan wurde zum ersten Mal in der Geschichte Artikel 5 der NATO-Charter aufgerufen. Als Mitgliedsstaat werden wir aufgerufen, der Kriegsbemühung beizutreten."
global_wot.3.a: "Wir stehen mit unseren Verbündeten."

usa_wot.3.t: "Anthrax Attacks Terrorisieren Amerika"
usa_wot.3.d: "In den Wochen nach dem 11. September wurden anonyme Briefe mit tödlichen Anthrax-Sporen an Nachrichtenorganisationen und US-SenatorInnen verschickt. Die Angriffe haben Angst im ganzen Land gesät, massive Untersuchungen ausgelöst, und erhöhte Besorgnis über die biologische Kriegsführung."
usa_wot.3.a: "Die Justiz wird ausgeliefert. Und es wird schnell sein."
usa_wot.3.b: "Nicht wieder!"
  
je_hunt_for_bin_laden: "Die Jagd nach Osama Bin Laden"
je_hunt_for_bin_laden_reason: "Nach den Anschlägen vom 11. September 2001 haben die Vereinigten Staaten eine umfassende und globale Suche nach Osama bin Laden, dem Leiter der al-Qaida, gestartet. Diese Mission wird sich über Grenzen hinweg erstrecken, wobei militärische Operationen, Geheimdienste und diplomatischen Druck eingebunden werden.\nx id=1/>"
intensified_intelligence_operations: "Die Jagd nach Osama Bin Laden"

hunt_bin_laden_progress_bar: "Hunt Progress"
hunt_bin_laden_progress_bar_desc: "Suche nach Fortschritt"
osama_bar_completed: "Osama Bin Laden wurde gefunden"

usa_wot.10.t: "Die Jagd nach Osama Bin Laden"
usa_wot.10.d: "Mit dem Krieg gegen den Terror haben US-Geheimdienststellen und Spezialkräfte eine weltweite Suche nach Osama bin Laden begonnen. Die Entscheidungen werden nun die Intensität und den Umfang der Operation bestimmen."
usa_wot.10.a: "Benötigen Sie alle notwendigen Ressourcen."
usa_wot.10.b: "Konzentrieren Sie sich auf andere Prioritäten."

usa_wot.12.t: "Bin Laden gefangen"
usa_wot.12.d: "Nach jahrelanger Verfolgung wurde Osama bin Laden lokalisiert und neutralisiert. Die Vereinigten Staaten feiern einen bedeutenden Sieg im Krieg gegen den Terror."
usa_wot.12.a: "Es wurde Gerechtigkeit gedient."

usa_wot.11.t: "USA Kills Bin Laden"
usa_wot.11.d: "Nach monatelangen Treffen und Vorbereitungen der US-Navy SEALs startete eine wagemutige Razzia auf eine Verbindung in Abbottabad, Pakistan. Das Ziel: Osama Bin Laden erfassen oder töten. Die Welt erwartet das Ergebnis."

usa_wot.11.a: "Feigling bis zum Ende."

usa_wot.11.success_tt: "Osama Bin Laden wurde in Pakistan getötet. Der Krieg gegen den Terror tritt eine neue Phase ein."

usa_wot.20.t: "Nachrichtenübermittlung"
usa_wot.20.d: "CIA-Agenten entdecken wertvolle Intelligenz von gefangenen Militanten und bieten neue Leads auf Bin Ladens möglichen Aufenthaltsort."
usa_wot.20.a: "Hervorragend, nach vorne."
usa_wot.20.a.tt: "Die Fortschritte bei der Suche nach Bin Laden sind gestiegen."

usa_wot.21.t: "Bin Laden veröffentlicht Video"
usa_wot.21.d: "Monate der Verfolgung eines Verdächtigen, der glaubte, mit Bin Laden verbunden zu sein, stellte sich als ein totes Ende heraus. Ressourcen wurden verschwendet. Um es noch schlimmer zu machen, hat der Mittelost-Terror ein Video für die amerikanische Öffentlichkeit veröffentlicht, um zu beobachten."
usa_wot.21.a: "Frustrierende Rückschläge."
usa_wot.21.a.tt: "Die Fortschritte bei der Suche nach Bin Laden sind zurückgegangen."

usa_wot.22.t: "Regionale Zusammenarbeit"
usa_wot.22.d: "Pakistan und die regionalen Verbündeten unterstützen das Informationstreffen, beschleunigen die Jagd nach Bin Laden."
usa_wot.22.a: "Das wird uns sehr helfen."
usa_wot.22.a.tt: "Die Fortschritte bei der Suche nach Bin Laden haben deutlich zugenommen."
 
accuse_iraq_wmds_button: "Accuse Iraq of Harboring WMDs"
accuse_iraq_wmds_button_desc: "Beschuldigen Sie den Irak, die Waffen der Massenzerstörung heimlich zu entwickeln oder zu lagern. Dies wird Spannungen eskalieren und militärische Maßnahmen rechtfertigen."

end_war_on_terror_button: "Krieg gegen den Terror beenden"
end_war_on_terror_button_desc: "Erklären Sie den Krieg gegen den Terror offiziell und verschärfen die internationalen Operationen. Dies wird verweilende Folgen im In- und Ausland hinterlassen."

usa_wot.30.t: "Angeklagte Bohrgestänge"
usa_wot.30.d: "Die Vereinigten Staaten haben uns öffentlich vorgeworfen, Waffen der Massenzerstörung heimlich zu entwickeln und zu lagern. Dies markiert eine signifikante Eskalation in Spannungen und kann Konflikte näher bringen."
usa_wot.30.a: "Angst"
  
osama_extradited: "Osama Bin Laden wurde extradiziert"
war_on_terror_stopped_tt: "Der Krieg gegen den Terror ist beendet"
# War on TERROR

usa_wot.5.t: "Bin Laden in Haft"
usa_wot.5.d: "In einem überraschenden diplomatischen Durchbruch hat Afghanistan vereinbart, Osama bin Laden an die Vereinigten Staaten zu verteilen. Diese Konzession markiert einen bedeutenden Sieg in den frühen Stadien des Krieges gegen den Terror."
usa_wot.5.a: "Das ist ein großer diplomatischer Sieg."

usa_wot.6.t: "Afghanistan verweist auf Extradite Bin Laden"
usa_wot.6.d: "Die afghanische Regierung weigerte sich, Osama bin Laden an US-Behörden zu übergeben. Die Spannungen steigen, wenn Washington seinen nächsten Schritt debattiert."
usa_wot.6.a: "Sie sind entweder mit den Terroristen oder gegen sie."
usa_wot.6.b: "Lassen Sie keine brash Aktionen, jetzt.."

je_request_bin_laden_extradition_button: "Die Auslieferung von Bin Laden anfordern"
je_request_bin_laden_extradition_button_desc: "Förmlich fordern Sie, dass Afghanistan Osama bin Laden an die Vereinigten Staaten ausliefert."

bin_laden_extradition_accepted_country: "Bin Laden Auslieferung - Akzeptiert"
bin_laden_extradition_accepted_country_desc: "Afghanistan hat vereinbart, Osama bin Laden zu extraditieren, die nationale Moral zu stärken und die militärische Bereitschaft zu verbessern."
  
bin_laden_extradition_accepted_ig_armed_forces: "Bin Laden Auslieferung - Akzeptiert"
bin_laden_extradition_accepted_ig_armed_forces_desc: "Die Streitkräfte freuen sich über den diplomatischen Erfolg der Regierung, Bin Ladens Auslieferung zu sichern."

bin_laden_extradition_rejected_country: "Bin Laden Auslieferung - Rejected"
bin_laden_extradition_rejected_country_desc: "Afghanistan hat sich geweigert, Osama bin Laden zu extraditieren und unsere militärische Bereitschaft und unsere Ressourcen zu belasten."
  
bin_laden_extradition_rejected_ig_armed_forces: "Ausdauer der Freiheit"
bin_laden_extradition_rejected_ig_armed_forces_desc: "Die Streitkräfte werden von der Regierung verärgert, Bin Ladens Auslieferung zu sichern."

bin_laden_extradition_rejected_ig_armed_forces_2: "Hat Afghanistan nicht eingedrungen"
bin_laden_extradition_rejected_ig_armed_forces_2_desc: "Die Streitkräfte werden von der Regierung verärgert, Bin Ladens Auslieferung zu sichern."

