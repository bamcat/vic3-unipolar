 demographic_events.1.t: "Die demographische Krise"
 demographic_events.1.d: "Experten haben gewarnt, dass unsere Nation einer schweren demographischen Krise gegenübersteht. Dekaden sinkender Geburtenraten haben eine alternde Bevölkerung erzeugt, die bald unsere Belegschaft überfordert. Ohne nachhaltige Investitionen in Kinderbetreuung, Gesundheitswesen, Wohnungswesen und Soziales wird unsere wirtschaftliche Grundlage als Verhältnis von Arbeitnehmern zu abhängigen Kollaps erode.\nx id=1/>Ein temporärer demografischer Puffer maskiert derzeit die schlimmsten Auswirkungen, aber dieser Puffer wird in den kommenden Jahrzehnten abklingen. Wir müssen für mindestens zehn Jahre umfassende pronatalistische Reformen einführen und unterstützen, um den Trend umzukehren."
 demographic_events.1.a: "Wir müssen handeln, bevor es zu spät ist."

 demographic_events.2.t: "Demographische Erholung"
 demographic_events.2.d: "Nach einem Jahrzehnt anhaltender Investitionen in unsere Menschen — universelle Kinderbetreuung, zugängliche Gesundheitsversorgung, umfassendes Wohlergehen und erschwingliches Wohnen — hat sich die Geburtenrate unserer Nation stabilisiert. Die demografische Krise, die unserer Wirtschaft drohte, wurde abgewendet. Eine neue Generation von Arbeitern tritt in die Arbeitskraft ein, und die Zukunft sieht hell aus."
 demographic_events.2.a: "Unsere Geduld hat sich ausgezahlt"

