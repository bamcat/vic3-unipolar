 chechen_war.1.t: "Die Offensive beginnt"
 chechen_war.1.d: "Die entscheidende Phase des Krieges hat begonnen. Die Guerilla-Kriegsführung, die den frühen Konflikt definierte, gibt eine direkte Konfrontation. Die Berge des Kaukasus werden den letzten Kampf für Tschetschenien bezeugen."
 chechen_war.1.a: "Für Russland!"
 chechen_war.1.a.che: "Für Ichkeria!"
 
 chechen_war.2.t_rus: "Russischer Sieg in Tschetschenien"
 chechen_war.2.d_rus: "Der tschetschenische Widerstand wurde gebrochen. Die russischen Truppen haben die Kontrolle über die Fluchtrepublik wieder aufgenommen. Die Kosten für Leben und Infrastruktur waren enorm, aber die territoriale Integrität der Russischen Föderation wurde erhalten."
 chechen_war.2.t_che: "Tschetschenische Unabhängigkeit"
 chechen_war.2.d_che: "Vor allem haben sich die tschetschenischen Kämpfer durchgesetzt. Das russische Militär ist zurückgezogen, und die Tschetschenische Republik Ichkerien steht als unabhängige Nation. Die Kosten für die Freiheit waren übertrieben, aber der Wille des tschetschenischen Volkes hat sich als unzerstörbar erwiesen."
 chechen_war.2.a: "Geschichte wird sich heute erinnern"
 
 chechen_war.5.t: "Berg Ambush"
 chechen_war.5.d: "Unsere Kämpfer haben einen russischen Konvoi identifiziert, der sich durch einen schmalen Bergpass bewegt. Das Gelände ist perfekt für einen Hinterhalt — steile Klippen auf beiden Seiten, begrenzten Raum zum Manöver und dichten Wald, der Abdeckung für unsere Männer."
 chechen_war.5.a: "Strike aus den Bergen"
 chechen_war.5.b: "Position halten"
 
 chechen_war.6.t: "Raid on Supply Lines"
 chechen_war.6.d: "Russische Lieferkonvois haben sich mit minimaler Begleitung durch das Tiefland bewegt. Unsere Kämpfer könnten sie abfangen, wertvolle Vorräte aufnehmen und die Logistik des Feindes stören – aber die Operation wird uns Ressourcen kosten und Vergeltung einladen."
 chechen_war.6.a: "Rachen Sie ihre Zuleitungen"
 chechen_war.6.b: "Zu riskant"
 
 chechen_war.7.t: "Krieg im Kaukasus"
 chechen_war.7.d: "Die Tschetschenische Republik Ichkerien hat ihre Unabhängigkeit erklärt, und Russland hat mit militärischer Kraft reagiert. Der Nordkaukasus ist im Krieg verschlungen. Das robuste Gebirgsgelände gibt den Tschetschenischen Guerrillas einen natürlichen Vorteil, aber das Militär Russlands ist vielleicht formidabel."
 chechen_war.7.a: "So beginnt es"
 
