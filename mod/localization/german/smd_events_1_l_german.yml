 intifada_urban_uprising: "Stadtaufstand"
 intifada_urban_uprising_desc: "Die Kämpfe finden in dicht gepackten Stadtgebieten und Flüchtlingslagern statt, in denen konventionelle militärische Kräfte nicht effektiv funktionieren können. Das winzige Gebiet macht große Manöver fast unmöglich."

 intifada_isr_morale: "IDF Momentum"
 intifada_isr_morale_desc: "Militärische Erfolge haben die israelische Entschlossenheit gestärkt, den Aufstand zu unterdrücken."

 intifada_popular_resistance: "Populärer Widerstand"
 intifada_popular_resistance_desc: "Das palästinensische Volk ist im Massenwiderstand aufgestiegen. Jedes Viertel ist eine Festung, jeder Zivilist ein potenzieller Kämpfer."

 intifada_stone_throwing: "Street Resistance"
 intifada_stone_throwing_desc: "Inhaftierte Straßenschläge und Steinwurf haben die besetzten Gebiete für die israelischen Kräfte extrem schwierig gemacht, zu kontrollieren."

 intifada_idf_crackdown: "IDF Crackdown"
 intifada_idf_crackdown_desc: "Die israelischen Militäroperationen in Zivilgebieten verursachen erhebliche Opfer."

 intifada_devastation: "Intifada Zerstörung"
 intifada_devastation_desc: "Die Kämpfe haben Häuser, Infrastruktur und Lebensgrundlagen auf dem ganzen Gebiet zerstört."

 intifada_raid_expenses: "Operationen des Widerstands"
 intifada_raid_expenses_desc: "Unterstützung koordinierter Widerstandsoperationen gegen israelische militärische Positionen."

 intifada_international_pressure: "Internationaler Druck"
 intifada_international_pressure_desc: "Die globale Mediendeckung des Konflikts hat den internationalen Ruf Israels und den diplomatischen Ruf geschädigt."

 intifada_isr_reward: "Intifada unterdrückt"
 intifada_isr_reward_desc: "Israel hat die Zweite Intifada unterdrückt und die militärische Kontrolle über die Palästinensergebiete bestärkt."

 intifada_pal_reward: "Widerstand Siegreich"
 intifada_pal_reward_desc: "Das palästinensische Volk hat sich durch den Volkswiderstand, die Anerkennung und Zugeständnisse durch Opfer durchgesetzt."
 
 je_israel_palestine_peacetime:0 "Der uneasy Status Quo"
 je_israel_palestine_peacetime_reason:0 "Es gibt keine offene Intifada oder große Eskalation, aber der Konflikt setzt sich fort durch Sicherheitskoordination, Schließungen, Diplomatie, Demonstrationen und periodische Zwischenfälle."
 je_israel_palestine_tension_bar:0 "Konfliktspannung"
 je_israel_palestine_tension_bar_desc:0 "Regionale Instabilität"
 je_israel_palestine_tension_bar_second_desc:0 "Hohe Spannung kann eine große Eskalationswarnung auslösen und kann mit Ihrem Second Intifada System verbunden werden."

 je_ip_peacetime_status_calm:0 "Die Situation ist relativ ruhig. Die Sicherheitskoordination, die Verhandlungen und die internationale Mediation halten eine größere Eskalation in Schach."
 je_ip_peacetime_status_fragile:0 "Die Ruhe ist zerbrechlich. Incidents, Raids, Schließungen, Demonstrationen oder Beilegungsstreitigkeiten könnten die aktuelle Bilanz schnell rückgängig machen."
 je_ip_peacetime_status_crisis:0 "Die Situation liegt am Rande einer großen Eskalation. Ein einziger Zwischenfall kann ausreichen, um den Status quo zu brechen."
 je_ip_peacetime_complete_tt:0 "Die Spannung ist sehr gering, die Verhandlungen sind fortgeschritten, und die Sicherheitskoordination ist dauerhaft."

 je_ip_peacetime_security_coordination:0 "Sicherheitskoordination"
 je_ip_peacetime_security_coordination_desc:0 "Erweitern Sie die praktische Koordinierung, um zu verhindern, dass lokale Vorfälle zu einer größeren Krise werden. Dies senkt die Spannung, kann aber einen politischen Rückschlag schaffen."

 je_ip_peacetime_closure_policy:0 "Schließungspolitik"
 je_ip_peacetime_closure_policy_desc:0 "Achtzehn Bewegungs- und Zugangskontrollen, um unmittelbare Sicherheitsrisiken zu reduzieren. Dies senkt die kurzfristige Spannung, schädigt die palästinensische Wirtschaft und erhöht den internationalen Druck."

 je_ip_peacetime_settlement_freeze:0 "Abrechnung Freeze"
 je_ip_peacetime_settlement_freeze_desc:0 "Verkündigen Sie einen vorübergehenden Frost auf Siedlungserweiterung. Dies verbessert die Verhandlungen und das internationale Stehen, schafft aber heimische Rückschläge."

 je_ip_peacetime_international_mediation:0 "Internationale Mediation"
 je_ip_peacetime_international_mediation_desc:0 "Laden Sie externe Vermittler ein, um Gespräche zu stabilisieren. Dies verbessert die Verhandlungsdynamik, erhöht aber außerhalb der Kontrolle."

 je_ip_peacetime_grassroots_outreach:0 "Grassroots Outreach"
 je_ip_peacetime_grassroots_outreach_desc:0 "Unterstützung der Zivilgesellschaft, der lokalen Organisation und gewaltfreien politischen Initiativen. Dies senkt die Spannung, kann aber auch hartnäckiger werden."

 je_ip_peacetime_mass_mobilization:0 "Massenmobilisierung"
 je_ip_peacetime_mass_mobilization_desc:0 "Kanal öffentliche Frustration in organisierte Mobilisierung. Dies erhöht den internationalen Druck, aber Risiken, die die Situation in Richtung Eskalation treiben."

 ip_uneasy_status_quo:0 "Uneasy Status Quo"
 ip_uneasy_status_quo_desc:0 "Offene Kämpfe haben abgenommen, aber der Konflikt formt immer noch Politik, Diplomatie und alltägliche Verwaltung."

 ip_security_coordination:0 "Sicherheitskoordination"
 ip_security_coordination_desc:0 "Die Koordinierung zwischen Sicherheitskräften beschränkt die Eskalation, obwohl sie politisch kostspielig ist."

 ip_closure_policy:0 "Schließungspolitik"
 ip_closure_policy_desc:0 "Bewegungsbeschränkungen reduzieren einige Sicherheitsrisiken und erhöhen gleichzeitig den diplomatischen und humanitären Druck."

 ip_economic_restrictions:0 "Wirtschaftliche Beschränkungen"
 ip_economic_restrictions_desc:0 "Einschränkungen bei Bewegung und Zugang stören das wirtschaftliche Leben."

 ip_settlement_freeze:0 "Abrechnung Freeze"
 ip_settlement_freeze_desc:0 "Eine vorübergehende Pause in der Siedlungstätigkeit hat die diplomatischen Bedingungen verbessert."

 ip_international_mediation:0 "Internationale Mediation"
 ip_international_mediation_desc:0 "Außenvermittler versuchen, den politischen Prozess am Leben zu halten."

 ip_grassroots_outreach:0 "Grassroots Outreach"
 ip_grassroots_outreach_desc:0 "Die Zivilgesellschaft und die lokalen politischen Initiativen arbeiten daran, die Situation zu verschärfen."

 ip_mass_mobilization:0 "Massenmobilisierung"
 ip_mass_mobilization_desc:0 "Die öffentliche Mobilisierung erhöht den politischen Druck, erhöht aber auch das Risiko der Konfrontation."

 ip_security_alert:0 "Sicherheitsalarm"
 ip_security_alert_desc:0 "Sicherheitskräfte sind nach der jüngsten Unruhe auf erhöhtem Alarm."

 ip_international_scrutiny:0 "International Scrutiny"
 ip_international_scrutiny_desc:0 "Ausländische Regierungen und Medien beobachten die Entwicklungen."

 ip_political_backlash:0 "Politischer Kampf"
 ip_political_backlash_desc:0 "Kompromisse oder Koordinierung haben nationale Gegner verärgert."

 ip_stabilized_peace_process:0 "Stabiler Friedensprozeß"
 ip_stabilized_peace_process_desc:0 "Eine seltene Zeit mit geringer Spannung und anhaltender Koordination hat ein stabileres diplomatisches Umfeld geschaffen."

 ip_breakdown_of_calm:0 "Aufschlüsselung der Beruhigung"
 ip_breakdown_of_calm_desc:0 "Der Friedensstatus quo hat sich aufgelöst und die Öffentlichkeit setzt sich für die Eskalation ein."

 ip_peacetime.1.t:0 "Checkpoint Incident"
 ip_peacetime.1.d:0 "Ein lokaler Sicherheitsvorfall hat die öffentliche Aufmerksamkeit erregt und Druck auf eine Antwort erhoben."
 ip_peacetime.1.f:0 "Selbst kleinere Konfrontationen können Symbole des größeren Konflikts werden."
 ip_peacetime.1.a:0 "Achtzehn Sicherheitsverfahren."
 ip_peacetime.1.b:0 "Ganz ruhig mit den lokalen Behörden koordiniert."

 ip_peacetime.2.t:0 "Sicherheit Crackdown"
 ip_peacetime.2.d:0 "Palästinensische Sicherheitskräfte stehen vor Druck, gegen Militante und bewaffnete Fraktionen zu handeln."
 ip_peacetime.2.f:0 "Zusammenarbeit kann Eskalation verhindern, aber es kann auch wie Zusammenarbeit aussehen."
 ip_peacetime.2.a:0 "Bewegt euch gegen die Netzwerke."
 ip_peacetime.2.b:0 "Vermeiden Sie eine Konfrontation."

 ip_peacetime.3.t:0 "Kündigungsfrist"
 ip_peacetime.3.d:0 "Eine vorgeschlagene Erweiterung ist im diplomatischen Prozess ein Flashpoint geworden."
 ip_peacetime.3.f:0 "Karten, Genehmigungen und Hügel können das Gewicht der nationalen Strategie tragen."
 ip_peacetime.3.a:0 "Mit der Ankündigung."
 ip_peacetime.3.b:0 "Verzögern Sie die Expansion."

 ip_peacetime.4.t:0 "Street Proteste"
 ip_peacetime.4.d:0 "Vorführungen haben sich durch mehrere Gemeinschaften verbreitet, die das aktuelle politische Gleichgewicht herausfordern."
 ip_peacetime.4.f:0 "Die Straße kann ein Sicherheitsventil oder das erste Zeichen von etwas größer sein."
 ip_peacetime.4.a:0 "Lassen Sie die Mobilisierung weitergehen."
 ip_peacetime.4.b:0 "Bitte um Zurückhaltung."

 ip_peacetime.5.t:0 "Internationale Reise"
 ip_peacetime.5.d:0 "Ein ausländischer Gesandter hat Vorschläge für einen erneuten Dialog vorgelegt."
 ip_peacetime.5.f:0 "Diplomatie löst selten den Konflikt auf einmal, aber es kann Zeit kaufen."
 ip_peacetime.5.a:0 "Empfangen Sie den Gesandten."
 ip_peacetime.5.b:0 "Aussendruck abwerfen."

 ip_peacetime.6.t:0 "Donor Konferenz"
 ip_peacetime.6.d:0 "Ausländische Spender bieten neue Unterstützung, erwarten aber im Gegenzug politische Zugeständnisse."
 ip_peacetime.6.f:0 "Die Hilfe kann die Institutionen stabilisieren, aber die Abhängigkeit trägt ihre eigenen Kosten."
 ip_peacetime.6.a:0 "Akzeptieren Sie den diplomatischen Rahmen."
 ip_peacetime.6.b:0 "weniger Bedingungen verlangen."

 ip_peacetime.10.t:0 "The Calm Breaks"
 ip_peacetime.10.d:0 "Der akkumulierte Druck von Razzien, Protesten, Schließungen, politischem Zusammenbruch und gescheiterten Gesprächen hat die Situation zum Rande gebracht."
 ip_peacetime.10.f:0 "Die Sprache der Verwaltung gibt die Sprache des Notfalls."
 ip_peacetime.10.a:0 "Bereiten Sie sich auf Eskalation vor."
 ip_peacetime.10.b:0 "Machen Sie einen letzten Notschub."

 ip_peacetime.20.t:0 "Eine dauerhafte Ruhe"
 ip_peacetime.20.d:0 "Eine seltene Kombination aus Sicherheitskoordination, politischer Zurückhaltung und diplomatischem Engagement hat die Situation stabilisiert."
 ip_peacetime.20.f:0 "Es ist kein endgültiger Frieden, aber es ist mehr als das Fehlen von Krieg."
 ip_peacetime.20.a:0 "Ein zerbrechlicher Erfolg."
 
 oslo_accords.1.t:0 "Das Oslo I Accord"
 oslo_accords.1.d:0 "Die israelischen Verhandlungsführer haben eine vorgeschlagene Grundsatzerklärung mit der palästinensischen Führung erreicht. Der Vorschlag würde die gegenseitige Anerkennung und einen Zwischenrahmen für die palästinensische Selbstverwaltung schaffen."
 oslo_accords.1.f:0 "Das Abkommen schließt keine Grenzen, Jerusalem, Siedlungen, Flüchtlinge oder Endsouveränität ein. Sie bietet jedoch einen inszenierten politischen Prozess."
 oslo_accords.1.a:0 "Ersetzen Sie die Grundsatzerklärung."
 oslo_accords.1.b:0 "Verzögern Sie die Vereinbarung."

 oslo_accords.10.t:0 "Israel veranlasst die Oslo I Accord"
 oslo_accords.10.d:0 "Israel hat eine Erklärung von Grundsätzen vorgeschlagen, die die gegenseitige Anerkennung und einen zwischenstaatlichen palästinensischen Selbstverwaltungsrahmen festsetzen."
 oslo_accords.10.f:0 "Die Akzeptanz würde einen neuen politischen Prozess beginnen und die formale Unterordnung zu Israel beenden, aber viele abschließende Statusfragen würden ungelöst bleiben."
 oslo_accords.10.a:0 "Akzeptieren Sie die Grundsatzerklärung."
 oslo_accords.10.b:0 "Ablehnung des Vorschlags."

 oslo_accords.11.t:0 "Palästina nimmt Oslo I"
 oslo_accords.11.d:0 "Die palästinensische Führung hat die Grundsatzerklärung angenommen. Der Zwischenfriedensprozess hat begonnen."
 oslo_accords.11.f:0 "Der Handshake ist historisch; die schwierige Arbeit beginnt erst."
 oslo_accords.11.a:0 "Der Prozess beginnt."

 oslo_accords.12.t:0 "Palästina rejects Oslo I"
 oslo_accords.12.d:0 "Die palästinensische Führung hat die vorgeschlagene Grundsatzerklärung abgelehnt."
 oslo_accords.12.f:0 "Ohne gegenseitige Anerkennung schließt die diplomatische Eröffnung."
 oslo_accords.12.a:0 "Die Gespräche brechen zusammen."

 oslo_accords.2.t:0 "Das Oslo II-Abkommen"
 oslo_accords.2.d:0 "Zwei Jahre nach der Grundsatzerklärung haben israelische Unterhändler ein Interimsabkommen vorbereitet, das die palästinensische Selbstverwaltung im Westjordanland und im Gazastreifen ausweitet."
 oslo_accords.2.f:0 "Der Vorschlag teilt die Autorität in Zonen der palästinensischen Kontrolle, der gemeinsamen Verantwortung und der fortgesetzten israelischen Kontrolle."
 oslo_accords.2.a:0 "Das Interimsabkommen auslösen."
 oslo_accords.2.b:0 "Verzögern Sie weitere Neueinstellungen."

 oslo_accords.20.t:0 "Israel veranlasst das Oslo II-Abkommen"
 oslo_accords.20.d:0 "Israel hat ein Interimsabkommen vorgeschlagen, das die palästinensische Selbstverwaltung erweitert und die Westbank in die Gebiete A, B und C organisiert."
 oslo_accords.20.f:0 "Die Vereinbarung verspricht erweiterte Autorität, aber auch eine fragmentierte Karte überschneidender Gerichtsbarkeiten."
 oslo_accords.20.a:0 "Akzeptieren Sie das Interimsabkommen."
 oslo_accords.20.b:0 "Ablehnung des Vorschlags."

 oslo_accords.21.t:0 "Palästina akzeptiert Oslo II"
 oslo_accords.21.d:0 "Die palästinensische Führung hat das Interimsabkommen angenommen. Der Oslo-Prozess geht in seine nächste Phase."
 oslo_accords.21.f:0 "Mehr Autorität wird übertragen, aber die endgültige Siedlung bleibt entfernt."
 oslo_accords.21.a:0 "Umsetzung der Vereinbarung."

 oslo_accords.22.t:0 "Palästinensische Rejekte Oslo II"
 oslo_accords.22.d:0 "Die palästinensische Führung hat das vorgeschlagene Interimsabkommen abgelehnt."
 oslo_accords.22.f:0 "Die von Oslo gebaute Struktur überlebte ich, aber ihr nächster Schritt ist gescheitert."
 oslo_accords.22.a:0 "Der Prozess stoppt."

 oslo_i_peace_process:0 "Oslo I Friedensprozess"
 oslo_i_peace_process_desc:0 "Die Grundsatzerklärung hat einen formellen Zwischenfriedensprozess eröffnet."

 oslo_i_palestinian_authority:0 "Palästinensische Autonomiebehörde"
 oslo_i_palestinian_authority_desc:0 "Eine zwischenzeitliche palästinensische Autorität hat begonnen, zivile Verantwortung zu übernehmen."

 oslo_talks_delayed:0 "Reden verzögert"
 oslo_talks_delayed_desc:0 "Der diplomatische Prozess hat gestoppt, Frustration und Unsicherheit erhöht."

 oslo_ii_interim_agreement:0 "Interimsabkommen von Oslo II"
 oslo_ii_interim_agreement_desc:0 "Das Interimsabkommen hat den Rahmen für die palästinensische Selbstverwaltung erweitert."

 oslo_ii_expanded_self_government:0 "Erweiterung der Selbstverwaltung"
 oslo_ii_expanded_self_government_desc:0 "Palästinensische Institutionen haben größere administrative Verantwortung übernommen."

 oslo_ii_joint_security_framework:0 "Gemeinsamer Sicherheitsrahmen"
 oslo_ii_joint_security_framework_desc:0 "Sicherheitsverantwortungen werden im Rahmen des Interimsrahmens koordiniert."

 oslo_ii_administrative_fragmentation:0 "Verwaltungsfragment"
 oslo_ii_administrative_fragmentation_desc:0 "Das Gebiet wird durch fragmentierte und überschneidende Zuständigkeiten geregelt."

 oslo_ii_delayed_redeployment:0 "Verzögerte Beschäftigung"
 oslo_ii_delayed_redeployment_desc:0 "Eine weitere Wiedereingliederung wurde verzögert und das Vertrauen in den Prozess schädigt."

 oslo_accords.30.t:0 "Das Oslo I-Abkommen ist unterzeichnet"
 oslo_accords.30.d:0 "Israel und Palästina haben die Grundsatzerklärung angenommen. Die Vereinigten Staaten sollen nun den neuen Friedensprozess unterstützen und den Interimsrahmen unterstützen."
 oslo_accords.30.f:0 "Es ist eine diplomatische Eröffnung entstanden, aber sie braucht Garantien, Geld, Druck und Geduld."
 oslo_accords.30.a:0 "Überwachen Sie den Prozess."

 oslo_accords.31.t:0 "Die Oslo I Accord Fails"
 oslo_accords.31.d:0 "Die vorgeschlagene Grundsatzerklärung wurde abgelehnt. Die diplomatische Eröffnung ist geschlossen, bevor ein Zwischenrahmen geschaffen werden konnte."
 oslo_accords.31.f:0 "Ohne gegenseitige Akzeptanz kann die äußere Mediation den Prozess nicht allein tragen."
 oslo_accords.31.a:0 "Ein Rückschlag für die Mediation."

 oslo_accords.32.t:0 "Das Oslo II-Abkommen ist unterzeichnet"
 oslo_accords.32.d:0 "Israel und Palästina haben das Interimsabkommen angenommen, die palästinensische Selbstverwaltung erweitert und die nächste Stufe des Oslo-Prozesses geschaffen."
 oslo_accords.32.f:0 "Das Abkommen ist ein diplomatischer Erfolg, aber seine Karte der geteilten Autorität kann sich als schwierig erweisen."
 oslo_accords.32.a:0 "Implementierung unterstützen."

 oslo_accords.33.t:0 "Das Oslo-II-Akkord scheitert"
 oslo_accords.33.d:0 "Das vorgeschlagene Interimsabkommen wurde abgelehnt. Der Oslo-Prozess bleibt unvollständig und der territorial-administrative Rahmen ist jetzt unsicher."
 oslo_accords.33.f:0 "Der erste Schritt war nicht genug, um die zweite zu garantieren."
 oslo_accords.33.a:0 "Der Prozess stoppt."

