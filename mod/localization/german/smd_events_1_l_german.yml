# canada

canada.1.t:0 "Autobahn von Tears"
canada.1.d:0 "Eine Strecke von British Columbia’s Highway 16, gemeinhin als der Highway of Tears bezeichnet, ist ein Symbol für Tragödie und Ungerechtigkeit in Kanada geworden, wo Dutzende von indigenen Frauen und Mädchen seit den 1970er Jahren verschwunden oder ermordet wurden. Zwischen Fürst George und Prinz Rupert hat die Ferne längst keine öffentlichen Verkehrsmittel mehr, die viele zum Aufschlag zwingen – oft mit tödlichen Folgen."
canada.1.f:0 "Sie (die Behörden) brachten sie in eine Stahlbox. Es musste ein geschlossener Sarg sein, weil sie sie gefunden haben ...“ Er hält an, seine Tränen zurückzuhalten, bevor er die Worte „sie ... verschlechtert wurde."

canada.1.a:0 "Leider gibt es viel dringendere Probleme, die diesem Land gegenüber stehen."
canada.1.b:0 "Wir sollten uns schämen!"

je_indigenous_rights: "Indigene Rechte"
je_indigenous_rights_reason: "Die Frage der indigenen Rechte ist nach wie vor eine der bedeutendsten ungelösten Probleme in der inländischen Politik. Die Generationen der Dispossession, der Zwangsasimilation und der gebrochenen Vertragspflichten haben tiefe strukturelle Ungleichheiten zwischen indigenen und nicht indigenen Bevölkerungen hinterlassen. Die Schließung dieser Lücke erfordert einen anhaltenden politischen Willen und steht vor dem Widerstand derjenigen, die vom Status Quo profitieren."


 indigenous_je_status_usa_tt: "In den Vereinigten Staaten besetzen über 570 föderal anerkannte Stämme Vorbehaltsgebiete, die einen Bruchteil ihrer Ahnengebiete darstellen. Die Lebenserwartung, das Bildungsniveau und das Einkommen auf Reservierungen liegen weit hinter den nationalen Durchschnittswerten zurück. Die Vertrauensverantwortung des Bundes — die gesetzliche Verpflichtung zum Schutz der Stammeshoheit und des Wohlergehens — ist weithin als unzureichend anerkannt."

 indigenous_je_status_can_tt: "Kanadas erste Nationen, Métis und Inuit-Volkszahl über eine Million, die unter einem System von Reserven, das durch das indische Gesetz von 1876 gegründet wurde, leben. Das indische Wohnschulsystem, das die indigenen Kinder von ihren Familien zwangsweise entfernt hat, um sie zu "assimilieren" — wurde bis 1996 betrieben, seine letzte Schule erst kürzlich abgeschlossen. Das generationenübergreifende Trauma dieses Systems prägt heute indigene Gemeinschaften."

 indigenous_je_status_nzl_tt: "Das Volk von Māori — tangata wannua, das Volk des Landes — unterzeichnete 1840 den Vertrag von Waitangi mit der britischen Krone. Dieser Vertrag wurde noch nie voll geehrt. Die Landbeschlagnahmen im 19. Jahrhundert haben die Māori-Gemeinde der meisten ihrer Gebiete gestoppt, und Māori Neuseelander stehen weiterhin vor erheblichen Unterschiede in den Gesundheits-, Einkommens- und Inhaftierungsraten. Das 1975 gegründete Waitangi Tribunal hört weiterhin Forderungen gegen die Krone."

 indigenous_je_status_ast_tt: "Australiens Aboriginal- und Torres Strait Islander Völker sind die ältesten kontinuierlichen Kulturen der Welt – und unter den am meisten benachteiligten. Die „Stolen Generations" — Aboriginalkinder, die ihre Familien unter staatlichen Assimilationspolitiken, die bis in die 1970er Jahre fortdauerten, zwangsweise entfernt haben, haben Wunden hinterlassen, die nicht geheilt sind. Die Lebenserwartung für Indigene Australier bleibt über ein Jahrzehnt unter dem nationalen Durchschnitt. Die Mabo-Entscheidung von 1992 hat zum ersten Mal den Muttertitel anerkannt, aber die Umsetzung ist uneben."

 # indigenous.1 — Land Rights
 indigenous.1.t: "Indigene Landrechte"
 indigenous.1.d_usa: "Eine Koalition der Stammesnationen hat eine formelle Forderung eingereicht, die Rechte auf einen bedeutenden Zug des Bundeslandes geltend macht, und argumentiert, dass das Gebiet unrechtmäßig unter Verletzung der Vertragspflichten genommen wurde. Der Anspruch hat eine erhebliche Medienberichterstattung und rechtliche Unterstützung angezogen. Die Gerichte beobachten, und so ist die breitere Native American Community."
 indigenous.1.d_can: "Eine First Nations-Band hat Aboriginal Titel zu einem wesentlichen Gebiet von Crown Land behauptet, dass kein gültiger Vertrag ihre Rechte auf das Gebiet gelöscht. Die Forderung ist Bundesgericht. Juristische Experten weisen darauf hin, dass sich die kanadische Rechtsprechung zum Aboriginaltitel deutlich weiterentwickelt hat und die Reaktion der Regierung einen wichtigen Präzedenzfall festlegt."
 indigenous.1.d_nzl: "Das Waitangi Tribunal hat einen Bericht veröffentlicht, in dem festgestellt wurde, dass die Krone den Vertrag von Waitangi in ihrer Verwaltung von bestrittenem Land nicht zu ehren. Die Ergebnisse sind nicht rechtsverbindlich, sondern tragen ein erhebliches moralisches und politisches Gewicht. Māori-Gemeinschaften fordern die Regierung auf, unverzüglich auf die Empfehlungen zu reagieren."
 indigenous.1.d_ast: "Der Bundesgerichtshof hat einen Urtitelanspruch über eine Region, die derzeit an pastorale Interessen gemietet wird, erhalten. Das Urteil fordert die Regierung auf, mit der antragstellenden Gruppe über Landnutzungsrechte zu verhandeln. Pastorale Industriegruppen Lobbying hart für die Regierung, um die Entscheidung zu appellieren."
 indigenous.1.f: "Das Land war immer ihr. Die Frage ist, ob das Gesetz das sagen wird."
 indigenous.1.a: "Verhandeln einer Regelung — Ehre der Forderung"
 indigenous.1.b: "Bestreiten Sie die Forderung vor Gericht — unsere Position ist defensibel"

 # indigenous.2 — Treaty Obligations
 indigenous.2.t: "Vertragspflichten nach Überprüfung"
 indigenous.2.d_usa: "Ein Kongressbericht hat festgestellt, dass die Bundesregierung ihre Vertragspflichten gegenüber Dutzenden von Stammesnationen nicht erfüllt — die Gesundheitsversorgung, Bildung und Infrastruktur auf Reservierungen um Milliarden von Dollar jährlich. Stammesführer fordern eine förmliche Überprüfung der Vertrauensverantwortung des Bundes und eine Verpflichtung zur Schließung der Finanzierungslücke."
 indigenous.2.d_can: "Ein parlamentarischer Ausschuss hat einen Bericht vorgelegt, in dem eine chronische Unterfinanzierung der Gemeinden der Ersten Nationen in Bezug auf Verpflichtungen aus historischen Verträgen beschrieben wird. Der Bericht identifiziert spezifische Defizite in den Bereichen Wohnungswesen, Wasserinfrastruktur und Bildung. Die Regierung muss entscheiden, wie man reagieren kann – und ob man die Mittel begeht, die für die gesamte Vertragsgestaltung benötigt werden."
 indigenous.2.d_nzl: "Māori-Führer haben der Regierung ein formelles Memorandum vorgelegt, in dem behauptet wird, dass eine Reihe neuer politischer Entscheidungen gegen die Grundsätze des Vertrags von Waitangi verstößt. Die memo zitiert spezifische Verstöße in Bereichen Ressourcenmanagement, Gesundheitsversorgung und Bildungsförderung und fordert eine umfassende Überprüfung der Einhaltung des Vertrags in allen Regierungsbereichen."
 indigenous.2.d_ast: "Die indigene Rechteorganisation hat eine detaillierte Analyse der Lücke zwischen den angegebenen Verpflichtungen der Regierung gegenüber den Aboriginalgemeinden und der tatsächlichen Ressourcenzuweisung veröffentlicht. Der Bericht kommt zu dem Schluss, dass Vertrags- und Abwicklungsverpflichtungen mit weniger als 60 Cent auf dem Dollar eingehalten werden. Die Führungspersönlichkeiten der Gemeinschaft fordern eine förmliche Prüfung und verbindliche Verpflichtung zur Vollständigkeit."
 indigenous.2.f: "Ein auf Papier geschriebenes Versprechen ist nur so gut wie der Wille, es zu behalten."
 indigenous.2.a: "Unsere Verpflichtungen in vollem Umfang wahrnehmen — die Mittel begehen"
 indigenous.2.b: "Anerkennung der Mängel — Arbeit zur schrittweisen Verbesserung"

 # indigenous.3 — Cultural Preservation
 indigenous.3.t: "Die Bedrohung der indigenen Sprachen"
 indigenous.3.d: "Linguisten haben einen Bericht veröffentlicht, in dem darauf hingewiesen wird, dass Dutzende indigener Sprachen in [ROOT.GetCountry.GetName] auf dem Rand des Aussterbens sind. In vielen Fällen bleibt nur eine Handvoll fließender Redner — alle älteren Menschen. Einmal verloren, können diese Sprachen nicht wiederhergestellt werden. Mit ihnen gehen mündliche Geschichten, ökologisches Wissen, rechtliche Traditionen und Wege des Verständnisses der Welt, die sonst nirgendwo existieren.\nx id=2/> Die Frage ist, ob die Regierung bereit ist, die Ressourcen zu investieren, die für die Umkehr dieser Trajektorie erforderlich sind, oder ob sie die Geschichte im Schweigen verschwinden sehen wird."
 indigenous.3.f: "Eine Sprache ist eine Welt. Sein Tod ist irreversibel."
 indigenous.3.a: "Fonds Indigene Sprachrevitalisierungsprogramme"
 indigenous.3.b: "Dies ist eine Angelegenheit der Gemeinschaften — nicht der Regierung"

 # indigenous.4 — Health Crisis
 indigenous.4.t: "Indigene Gesundheitskrise"
 indigenous.4.d: "Ein nationaler Gesundheitsbericht hat die starke Kluft zwischen indigenen und nicht indigenen Gesundheitsergebnissen in [ROOT.GetCountry.GetName] hervorgehoben. Die Lebenserwartung ist deutlich geringer. Diabetes-, Sucht- und psychische Erkrankungen - viele von ihnen verwurzelt im generationenübergreifenden Trauma - sind dramatisch höher. Infant Sterblichkeit auf Reserven und in abgelegenen Gemeinschaften ist mehrfach der nationale Durchschnitt.\n>x id=2/> Die medizinische Einrichtung fordert kulturell angemessene, ausreichend finanzierte indigene Gesundheitsdienste. Die Kosten der Untätigkeit — gemessen in Leben — sind beträchtlich."
 indigenous.4.f: "Ungleichheit in der Gesundheit ist eine politische Wahl."
 indigenous.4.a: "Investieren Sie in engagierte indigene Gesundheitsprogramme"
 indigenous.4.b: "Das bestehende Gesundheitssystem steht allen Bürgern gleichermaßen zur Verfügung"

 # indigenous.5 — Reservation Conditions (USA/CAN)
 indigenous.5.t: "Bedingungen auf den Reserven"
 indigenous.5.d_usa: "Ein Bundesinspektor-Generalbericht hat festgestellt, dass die Lebensbedingungen bei vielen Native American Reservierungen deutlich unter nationalen Standards liegen. Das Gehäuse ist überfüllt und verfallen. Der Zugang zu sauberem Trinkwasser ist auf Dutzenden von Reservierungen unzuverlässig. Die Arbeitslosenquoten überschreiten in vielen Gemeinden 50 %. Der Bericht nennt die Situation 'eine Krise der Bundesvernachlässigung' und empfiehlt eine beträchtliche Erhöhung der Finanzierung des Büros für indische Angelegenheiten."
 indigenous.5.d_can: "Eine Regierungsprüfung hat festgestellt, dass Hunderte von First Nations-Communities unter Seewasser-Beratungen stehen – einige seit über einem Jahrzehnt. Die Wohnung auf vielen Reserven ist stark überfüllt. Psychische Gesundheitsdienste sind weitgehend abwesend. Die Prüfung kommt zu dem Schluss, dass die Bundesregierung etwa 30% weniger pro Kopf für die First Nations-Communities ausgibt als für andere Kanadier für gleichwertige Dienstleistungen."
 indigenous.5.f: "Das Reservesystem wurde gebaut, um zu enthalten — nicht zu unterstützen."
 indigenous.5.a: "Bundesfinanzierung für Reservegemeinden erhöhen"
 indigenous.5.b: "Bewahrung der aktuellen Finanzierungsebenen — der Haushalt erlaubt nicht mehr"

 # indigenous.6 — Reservation Economic Development (USA/CAN)
 indigenous.6.t: "Wirtschaftsentwicklung indigenen Ländern"
 indigenous.6.d_usa: "Mehrere Stammesnationen haben wirtschaftliche Entwicklungsinitiativen vorgeschlagen - einschließlich Gaming-Operationen, Ressourcen-Extraktionspartnerschaften und Tourismusunternehmen -, die erhebliche Einnahmen für Reservierungsgemeinden generieren würden. Die Vorschläge bedürfen der föderalen Zustimmung und der Opposition von Nachbarstaaten und kommerziellen Interessen, die Stammesunternehmen als Wettbewerb sehen. Stammesführer argumentieren, dass die wirtschaftliche Selbstversorgung der einzige nachhaltige Weg aus der Armut ist."
 indigenous.6.d_can: "Erste Völkergemeinschaften in ressourcenreichen Gebieten versuchen, Einkommensverteilungsvereinbarungen für die Rohstoffgewinnung auf oder in der Nähe ihrer traditionellen Gebiete auszuhandeln. Mehrere Gemeinden haben auch Gemeinschaftsunternehmen mit Provinzregierungen für die Forstwirtschaft und Energieentwicklung vorgeschlagen. Die Vorschläge bieten einen Weg hin zur wirtschaftlichen Selbstversorgung — erfordern aber die Regierung, Kontrolle und Einnahmen zu teilen, die sie historisch vollständig beansprucht hat."
 indigenous.6.f: "Souveränität ohne wirtschaftliche Grundlage ist ein leeres Wort."
 indigenous.6.a: "Unterstützung der indigenen wirtschaftlichen Entwicklung — Billigung der Vorschläge"
 indigenous.6.b: "Vorrangige vorhandene Ressourceninteressen — diese Vorschläge schaffen Komplikationen"

 # indigenous.20 — Ipperwash
 indigenous.20.t: "Die Ipperwash Crisis"
 indigenous.20.d: "Stoney Point Ojibwe Demonstranten haben Ipperwash Provincial Park in Ontario besetzt, behauptet, dass das Land - einschließlich einer heiligen Begräbnisstätte - während des Zweiten Weltkriegs unrechtmäßig aus ihrer Gemeinschaft für die Verwendung als Militärbasis beschlagnahmt wurde und nie wie versprochen zurückkehrte. Die Besatzung ist friedlich, aber die Provinzpolizei Ontario hat einen Umkreis errichtet und eine Anleitung zur Vorgehensweise verlangt.\nx id=1/> Die Situation ist angespannt. Es gibt Waffen unter den Demonstranten. Es gibt auch Älteste, Familien und eine legitime Traurigkeit, die seit fünfzig Jahren unbekleidet ist."
 indigenous.20.f: "Ein Grabgrund wurde genommen. Es wurde nie zurückgegeben."
 indigenous.20.a: "Die OPP zu dispergieren der Besatzung — Ordnung wiederherzustellen"
 indigenous.20.b: "Direkt zum OPP — Aushandeln einer friedlichen Lösung"

 # indigenous.21 — Last residential school
 indigenous.21.t: "Die letzte Wohnschule schließt"
 indigenous.21.d: "Gordon Residential School in Punnichy, Saskatchewan hat seine Türen geschlossen — die letzte föderal betriebene indische Wohnschule in Kanada. Seit 1874 entfernte das Wohnschulsystem gewaltsam schätzungsweise 150.000 aboriginale Kinder aus ihren Familien und platzierte sie in Institutionen, in denen indigene Sprache, Kultur und Identität aktiv unterdrückt wurden — und wo körperlicher und sexueller Missbrauch weit verbreitet war.\nx id=1/> Die Schließung der letzten Schule ist keine Entschließung. Es ist eine Anerkennung, dass ein Kapitel bewusster kultureller Zerstörung endlich offiziell beendet ist. Die Überlebenden leben immer noch mit ihren Folgen."
 indigenous.21.f: "Die letzte Schule ist geschlossen. Die entstandenen Wunden haben es nicht."
 indigenous.21.a: "Ein dunkles Kapitel der kanadischen Geschichte ist vorbei"

 # indigenous.22 — TRC
 indigenous.22.t: "Die Kommission für Wahrheit und Versöhnung berichtet"
 indigenous.22.d: "Die Wahrheits- und Versöhnungskommission von Kanada hat ihren endgültigen Bericht veröffentlicht — die Würdigung von sechs Jahren Zeugnis von über 6.500 Überlebenden des indischen Wohnschulsystems. Der Bericht dokumentiert systematischen Missbrauch, kulturelles Genozid und das multigenerationale Trauma, das durch eine Politik der Zwangsasimilation hervorgerufen wird.\nx id=1/> Die Kommission hat 94 Aufrufe zur Aktion veröffentlicht — spezifische Empfehlungen in den Bereichen Kinderschutz, Bildung, Sprache, Gesundheit und Gerechtigkeit. Der Bericht verwendet den Begriff "Kulturgenozid", um zu beschreiben, was getan wurde. Die Regierung muss jetzt entscheiden, wie ernst die Arbeit der Kommission ist."
 indigenous.22.f: "Die Wahrheit ist der erste Schritt. Versöhnung ist die Arbeit der Generationen."
 indigenous.22.a: "formelle Annahme der Aufrufe zur Aktion — Verpflichtung zur Aussöhnung"
 indigenous.22.b: "Anerkennung des Berichts — Überprüfung der Aufrufe zur Aktion sorgfältig"

 indigenous.10.t: "Ein Schritt nach vorn Aktien"
 indigenous.10.d_usa: "Die Einführung von bejahenden Handlungsgesetzen in den Vereinigten Staaten markiert einen bedeutenden Schritt in Richtung der strukturellen Ungleichheiten, denen die Native American Communities gegenüberstehen - neben anderen historisch marginalisierten Gruppen. Es ist keine Lösung für den vollen Umfang der indigenen Dispossession, aber es ist eine sinnvolle Verpflichtung, Lücken zu schließen, die seit Generationen bestehen."
 indigenous.10.d_can: "Kanada hat bejahende Handlungsgesetze erlassen — eine formale Bestätigung, dass systemische Ungleichheit systemische Mittel erfordert. Für die First Nations, Métis und Inuit-Gemeinschaften ist die Maßnahme ein Stück eines viel größeren Puzzles. Aber es signalisiert eine politische Bereitschaft, die Frage des indigenen Nachteils ernst zu nehmen und diese Bereitschaft mit der Politik zu unterstützen."
 indigenous.10.d_nzl: "Neuseeland hat eine bejahende Handlungsgesetzgebung erlassen, in der festgestellt wird, dass die Unterschiede zwischen Māori und Pākehā Neuseelandern nicht das Produkt des individuellen Scheiterns, sondern der historischen Politik sind. Für Māori-Gemeinschaften ist es ein sinnvoller Schritt — obwohl das Waitangi Tribunal feststellt, dass viele seiner Empfehlungen nicht umgesetzt bleiben."
 indigenous.10.d_ast: "Australien hat bejahende Handlungsgesetze erlassen — eine bedeutende politische Verschiebung, die den strukturellen Charakter des indigenen Nachteils anerkennt. Für die Aboriginal- und Torres Strait Islander-Gemeinschaften stellt sie Fortschritt dar. Die Lücke in der Lebenserwartung, der Gesundheitsergebnisse und der Bildungserreichung wird nicht über Nacht schließen, aber die Reiserichtung hat sich geändert."
 indigenous.10.f: "Der Weg zur Gerechtigkeit ist lang. Das ist ein Schritt nach vorn."
 indigenous.10.a: "Es ist die richtige Sache zu tun"

 indigenous_land_settlement: "Landrechte Ansiedlung"
 indigenous_land_settlement_desc: "Eine ausgehandelte Landrechtsregelung hat die Beziehungen zu den indigenen Gemeinschaften verbessert und die Legitimität der Regierung verbessert."

 indigenous_land_contested: "Land Rights Contested"
 indigenous_land_contested_desc: "Die Entscheidung, indigene Landrechte vor Gericht zu bestreiten, hat die Spannungen mit indigenen Gemeinschaften erhöht."

 indigenous_treaty_honoured: "Vertragspflichten Geehrt"
 indigenous_treaty_honoured_desc: "Die uneingeschränkte Einhaltung der Vertragspflichten hat die Legitimität gestärkt und die Regierung mit indigenen Gemeinschaften gestärkt."

 indigenous_treaty_partial: "Vertragspflichten Teilweise erfüllt"
 indigenous_treaty_partial_desc: "Die teilweise Einhaltung der Vertragspflichten hat die indigenen Rechte Befürworter nicht erfüllt."

 indigenous_cultural_investment: "Indigene kulturelle Investitionen"
 indigenous_cultural_investment_desc: "Die Finanzierung der Regierung für indigene Sprache und Kulturprogramme unterstützt die Widerstandsfähigkeit der Gemeinschaft."

 indigenous_health_investment: "Indigene Gesundheitsprogramme"
 indigenous_health_investment_desc: "Dedizierte indigene Gesundheitsprogramme verbessern die Gesundheitsergebnisse in indigenen Gemeinschaften."

 indigenous_health_cost: "Kosten des indigenen Gesundheitsprogramms"
 indigenous_health_cost_desc: "Neue indigene Gesundheitsprogramme stellen zusätzliche Anforderungen an das Gesundheitsbudget."

 indigenous_health_neglect: "Indigene Gesundheit Neglect"
 indigenous_health_neglect_desc: "Das Versäumnis, die indigenen gesundheitlichen Ungleichheiten anzugehen, erzeugt anhaltende Unzufriedenheit."

 indigenous_reservation_investment: "Investitionen der Gemeinschaft"
 indigenous_reservation_investment_desc: "Die verstärkte Bundesfinanzierung für Reservegemeinden beginnt, die Lücke in den Lebensstandards zu schließen."

 indigenous_reservation_cost: "Reservefondskosten"
 indigenous_reservation_cost_desc: "Erhöhte Reserve-Community-Förderung belastet den Bundeshaushalt."

 indigenous_reservation_neglect: "Reserve Gemeinschaft Neglect"
 indigenous_reservation_neglect_desc: "Chronische Unterfinanzierung von Reservegemeinschaften erzeugt weiterhin Unzufriedenheit und internationale Kritik."

 indigenous_economic_development: "Indigene wirtschaftliche Entwicklung"
 indigenous_economic_development_desc: "Die Unterstützung indigener Wirtschaftsentwicklungsinitiativen erzeugt Einnahmen für Gemeinschaften und verbessert die Selbstversorgung."

 indigenous_economic_blocked: "Indigene wirtschaftliche Entwicklung blockiert"
 indigenous_economic_blocked_desc: "Die Ablehnung der indigenen Wirtschaftsentwicklungsvorschläge hat die Beziehungen zu den Gemeinschaften der Ersten Nationen geschädigt."

 ipperwash_crackdown: "Ipperwash Crackdown"
 ipperwash_crackdown_desc: "Die gewaltsame Zerstreuung der indigenen Demonstranten bei Ipperwash hat zu einer bedeutenden heimischen und internationalen Kritik geführt."

 ipperwash_negotiation: "Ipperwash Friedlich aufgelöst"
 ipperwash_negotiation_desc: "Die friedliche Lösung des Ipperwash-Standoffs hat die Glaubwürdigkeit der Regierung mit indigenen Gemeinschaften verbessert."

 indigenous_residential_school_closed: "Letzte Wohnschule geschlossen"
 indigenous_residential_school_closed_desc: "Die Schließung der letzten indischen Wohnschule markiert das formale Ende einer Politik der kulturellen Vernichtung - obwohl ihre Folgen ertragen."

 trc_accepted: "Wahrheit und Versöhnung angenommen"
 trc_accepted_desc: "Kanadas formale Annahme der Aufrufe der "Wahrhaftigkeits- und Versöhnungskommission" stellt ein bedeutendes Engagement dar, das Vermächtnis von Wohnschulen anzusprechen."

 trc_enactment_bonus: "Versöhnungsmandat"
 trc_enactment_bonus_desc: "Der Moment des Prozesses der Wahrheit und Versöhnung macht es einfacher, Gesetze im Zusammenhang mit indigenen Rechten zu erlassen."

 trc_partial: "TRC Anerkennung"
 trc_partial_desc: "Die Regierung hat den Bericht der Wahrheits- und Versöhnungskommission anerkannt, hat sich aber nicht dazu verpflichtet, ihre Aufrufe zur Aktion umzusetzen."

 indigenous_rights_progress: "Indigene Rechte Gesetzgebung"
 indigenous_rights_progress_desc: "Die Umsetzung von bejahenden Handlungsgesetzen stellt eine aussagekräftige Verpflichtung dar, den indigenen Nachteil anzugehen. Die Lücke wird nicht über Nacht schließen, aber die politische Richtung hat sich geändert."


# japan

japan.1.t: "Fukushima Nukleare Katastrophe"
japan.1.d: "Nach einem massiven Erdbeben und Tsunami erlitt das Kernkraftwerk Fukushima Daiichi katastrophale Ausfälle und löste radioaktives Material in die Umwelt. Die Katastrophe hat die Welt erschüttert und globale Debatten über die nukleare Sicherheit und Notfallbereitschaft ausgelöst."
japan.1.a: "Eine nationale Tragödie — und ein globaler Weckruf."

fukushima_nuclear_disaster: "Fukushima Nukleare Katastrophe"
fukushima_nuclear_disaster_desc: "Schwere Schäden an der Fukushima Daiichi-Anlage haben zu radioaktiven Kontaminationen, Störungen der Infrastruktur und einem langfristigen nationalen Erholungsaufwand geführt."

# south sudan

southsudan.1.t: "Südsudanesische Unabhängigkeit Referendum"
southsudan.1.d: "Nach Jahrzehnten des Konflikts und einem entscheidenden Referendum haben die Südstaaten des Sudan die Republik Südsudan gebildet. Die Zentralregierung in Khartoum steht vor einer schicksalhaften Wahl: die neue Nation akzeptieren oder in den Krieg gehen, um sie zurückzufordern."
southsudan.1.a: "Wir werden nicht zulassen, dass der Sudan geteilt wird."
southsudan.1.b: "Lasst sie gehen, um des Friedens willen."

# russia

first_chechen_war: "Erster tschetschenischer Krieg"

russia_parliament_resisting: "Europäisches Parlament"
russia_military_loyality: "Militärische Komplikation"
russia_parliamentary_support: "Parlamentarische Unterstützung"
russia_constitution_crisis_resolved_mod: "Krise abgewendet"

je_russian_constitutional_crisis: "Russische Verfassungskrise"
je_russian_constitutional_crisis_reason: "Das Jahr 1993 hat Russland zum Rande des politischen Zusammenbruchs gebracht.\nx id=1/> Präsident Boris Yeltsin, der die Exekutive konsolidieren möchte, hat die Auflösung des russischen Parlaments befohlen, seine Mitglieder der Blockierung von Reformen und der Demokratisierung zu beschuldigen. Das Parlament wiederum hat Yeltsins Dekret verfassungswidrig erklärt, sich weigert, die Unterstützer zu ihrer Ursache zu entziehen und zu verkürzen.\nx id=3/> Seit Wochen gewinnen Spannungen als Rivalen-Fraktionen die Unterstützung verschiedener Elemente des Militärs, der Sicherheitskräfte und der Allgemeinheit. Der Regierungsapparat bricht zusammen mit der Loyalität entweder der Exekutive oder der Rechtsabteilung, die das Schicksal der Russischen Föderation bestimmt.\nx id=5/> Diese Konfrontation ist mehr als ein politischer Streit – es ist ein Kampf um die Natur der russischen Regierung in der postsowjetischen Ära. Sollte die Krise aus der Kontrolle herauskommen, ist zivile Gewalt im Herzen von Moskau nicht nur möglich, sondern unvermeidlich."

je_russia_wild_nineties: "Die wilden Neuheiten"
je_russia_wild_nineties_reason: "Die „Wild-Neunziger“ (Russisch: Лихие девяностые, Likhiye devyanostyye) ist ein Begriff mit negativer evaluativer Konnotation, der die Periode der Übergangszeit nach dem Zusammenbruch der Sowjetunion und der russischen Föderation in den 1990er Jahren charakterisiert. \nx id=1/> Russlands turbulenter Übergang von der Sowjetherrschaft zu einer kapitalistischen Demokratie hat eine Welle der Instabilität, Korruption und Gewalt ausgelöst. Die frühen postsowjetischen Jahre sind geprägt von einem wirtschaftlichen Zusammenbruch, dem Anstieg der Oligarchen, politischen Showdowns und einem Anstieg der organisierten Kriminalität.\nx id=3/> Von der Eindämmung des Parlaments bis zu den Privatisierungsskandale scheint jeder Monat neue Umbrüche zu bringen. Das Land streift zwischen Reform und Chaos, und die Geduld des Volkes trägt dünn."

rus_events.0.t: "Die russische Verfassungskrise von 1993 beginnt"
rus_events.0.d: "Präsident Boris Yeltsin hat eine Verordnung zur Lösung des russischen Parlaments erlassen, die es beschuldigt, demokratische Reformen zu behindern und die Stabilität der Föderation zu gefährden. Das Parlament hat die Bewegung verfassungswidrig erklärt und fordert das Militär und die Bürger auf, sich zu widersetzen. Das Schicksal der zerbrechlichen Demokratie Russlands hängt jetzt im Gleichgewicht."
rus_events.0.a: "Die Nation hat ihren Atem."

1993_russian_crisis_tt: "Die Krise ist geschlossen"
rus_events.1.t: "Die Verfassungskrise"
rus_events.1.d: "Präsident Jeltsin hat die Auflösung des Parlaments angekündigt, aber die Gesetzgeber weigern sich, sich zu stürzen und sich im Weißen Haus zu verbarriktieren. Die Spannungen beschleunigen sich schnell."
rus_events.1.a: "Seite mit dem Präsidenten"
rus_events.1.a.tt: "Das Militär wird die Exekutive unterstützen."
rus_events.1.b: "Unterstützung des Parlaments"
rus_events.1.b.tt: "Wir werden die Autorität der Gesetzgeber verteidigen."

rus_events.2.t: "Militär unterstützt den Präsidenten"
rus_events.2.d: "Die Streitkräfte haben die Kontrolle über die Straßen genommen, das Parlamentsgebäude beschützt und Jelzins Autorität gesichert."
rus_events.2.a: "Die Krise ist vorbei."

rus_events.3.t: "Parlamentarischer Sieg"
rus_events.3.d: "Trotz des Drucks von der Exekutive hat das Parlament populäre Unterstützung und seine Macht behalten."
rus_events.3.a: "Die Krise ist vorbei."

rus_events.4.t: "Storming des Weißen Hauses"
rus_events.4.d: "Moskau ist im Chaos. Pro-Präsidenten Truppen haben das russische Weiße Haus umgeben, Heimat der Führung des Parlaments, und öffnete Feuer mit Panzern und kleinen Armen. Smoke billows aus den oberen Stockwerken, wie das Gebäude ist ablaze gesetzt. Der endgültige Widerstand kollabiert, als militärische Kräfte die Kontrolle erobern und das Ende der Abrüstung markieren, aber zu den Kosten des Lebens und der politischen Unschuld des Landes."
rus_events.4.a: "Die Bestellung wird wiederhergestellt — für jetzt."

# chechnya

je_first_chechen_war_reason: "Der erste Tschetschenische Krieg begann Ende 1994, als die Russische Föderation versuchte, die Kontrolle über die brachliegende Tschetschenische Republik Ichkeria.\nx id=1/> Der Konflikt würde sich in Leben und Ressourcen kostspielig erweisen, mit heftigem städtischen Kampf in Grozny und weit verbreiteter Verwüstung im Nordkaukasus.\nx id=3/ Die Beendigung des Krieges ohne klaren Sieg könnte der Regierung Glaubwürdigkeit schaden, aber die Fortsetzung der Kampfrisiken verlängerte Instabilität."
je_first_chechen_war: "Tschetschenischer Krieg"
chechen_war_resolved: "Tschetschenischer Krieg aufgelöst"

chechen_events.1.t: "Krieg in Tschetschenien"
chechen_events.1.d: "Die russischen Truppen sind in Tschetschenien eingetreten, um die föderale Kontrolle wiederherzustellen, was erwartet wird, dass es eine schnelle Operation sein wird. Das gebirgige Gelände und der entschlossene lokale Widerstand könnten dies jedoch zu einem längeren Konflikt machen."
chechen_events.1.a: "Wir werden die Bestellung wieder herstellen."

chechen_events.2.t: "Angriff auf Grozny"
chechen_events.2.d: "Die Schlacht von Grozny hat begonnen, mit russischen Kräften versucht, die tschetschenische Hauptstadt zu erobern. Die Kämpfe sind intensiv, mit schweren Opfern auf beiden Seiten."
chechen_events.2.a: "Vorwärts drücken, egal, welche Kosten."

chechen_events.3.t: "Friedensgespräche in Tschetschenien"
chechen_events.3.d: "Nach monatelangen Kämpfen ist die Kriegsliebe auf beiden Seiten angewachsen. Ein Vorschlag für einen Waffenstillstand wurde auf den Tisch gelegt und dem Blutvergießen ein Ende bereitet."
chechen_events.3.a: "Akzeptiere den Frieden und entziehe Kräfte."
chechen_events.3.b: "Den Krieg bis zum Sieg fortsetzen."

# haiti

uphold_democracy: "Operation Uping Democracy"

haiti_events.1.t: "Operation Uping Democracy"
haiti_events.1.d: "Im September 1994 starteten die Vereinigten Staaten eine militärische Intervention in Haiti, um den demokratisch gewählten Präsidenten Jean-Bertrand Aristide wiederherzustellen. US-Kräfte, unterstützt von internationalen Verbündeten, gesicherte Schlüsselbereiche, ebnet den Weg für Aristides Rückkehr."
haiti_events.1.a: "Einsatzkräfte zur Wiederherstellung der Demokratie."
haiti_events.1.b: "Wir werden uns auf fremde Truppen vorbereiten."

haiti_events.2.t: "Ausländische Truppen Ankunft"
haiti_events.2.d: "Amerikanische Truppen sind in Haiti gelandet und haben die Kontrolle über strategische Standorte. Die Intervention ist als Mittel zur Wiederherstellung der demokratischen Governance gerechtfertigt, aber sie stellt Fragen über Souveränität und fremden Einfluss."
haiti_events.2.a: "Wir müssen zusammenarbeiten, um Blutvergießen zu vermeiden."

je_haiti_political_crisis: "Politische Krise in Haiti"
je_haiti_political_crisis_reason: "Nach der demokratischen Wahl des Präsidenten Jean-Bertrand Aristide im Jahr 1990 erlebte Haiti einen kurzen Moment des Optimismus. Die zerbrechliche Stabilität wurde jedoch im September 1991 zerstreut, als ein militärischer Putsch Aristide einstürzte, das Land in politisches Chaos stürzte.\nx id=1/> Das Militärregime konfrontierte internationale Verurteilung, da Menschenrechtsverletzungen und politische Unterdrückung weit verbreitet wurden. Wirtschaftssanktionen, die von den Vereinten Nationen und der Organisation amerikanischer Staaten auferlegt wurden, wirkten sich stark auf die bereits anstrengende Wirtschaft Haitis aus.\nx id=3/> Die Verhandlungen zwischen der Militärjunta und den Anhängern von Aristide haben sich im Laufe der Jahre 1992 und 1993 verschlechtert, während die Gewalt gegen politische Gegner und die allgemeine Bevölkerung verstärkt wurde. Versuche der Mission der Vereinten Nationen in Haiti (UNMIH) zur Wiederherstellung der demokratischen Staatsführung trafen sich mit Behinderung.\nx id=5/> Bis 1994 setzte der Druck der internationalen Gemeinschaft, insbesondere der Vereinigten Staaten, die Etappe der direkten Intervention. Operation Uphold Democracy, geführt von US-Kräften im September 1994, zielte darauf ab, Aristide der Macht wiederherzustellen und ein Ende der Herrschaft der Junta zu bringen."

# quebec
# [GetPlayer.MakeScope.GetVariable('quebec_happiness_var').GetValue|0]

je_quebec_happiness: "Die Quebec Situation"
je_quebec_happiness_reason: "Der Status von Quebec in Kanada ist seit Jahrzehnten ein bedauerliches Thema. Quebecs ausgeprägte Kultur, Sprache und Geschichte haben oft Debatten über Autonomie und Unabhängigkeit geführt.\n>x id=1/> In den Jahren, die bis zum Quebec Referendum 1995 führten, wurde die Beziehung zwischen Quebec und der Regierung Kanadas durch Spannung, Verhandlung und gelegentliches Flare-up nationalistischer Stimmung gekennzeichnet.\nx id=3/> Die Provinz Quebec, mit ihrer einzigartigen französischsprachigen Mehrheit, einer ausgeprägten kulturellen Identität und einer langen Geschichte, die für die Autonomie plädiert, hat in regelmäßigen Abständen versucht, ihren Platz innerhalb der kanadischen Föderation neu zu definieren. Einige Quebecois wünschen vollständige Unabhängigkeit, andere wünschen sich verstärkte Provinzmächte, während viele noch in einem vereinigten Kanada bleiben.\nx id=5/>Als Premierminister ist Ihre Aufgabe, diese heikle Situation zu navigieren. Sie müssen die nationale Einheit im Hinblick auf die kulturellen und politischen Ziele von Quebec ausgleichen. Jede Entscheidung, die Sie treffen — ob zu Sprachgesetzen, Wirtschaftspolitik oder kulturellen Investitionen — wird das Glück der Quebecois-Bevölkerung beeinflussen.\nx id=7/> Wenn die Québec-Happiness-Score weiterhin hoch ist, kann das Referendum mit einer Stimme enden, um in Kanada zu bleiben. Aber wenn Unzufriedenheit zu stark wächst, kann das Volk von Quebec für Unabhängigkeit stimmen, für immer die Karte von Nordamerika ändern."
quebec_happiness_bar_desc: "Französisch-Kanadische Glückseligkeit"
quebec_happiness_monthly_tt: "Monatliche Veränderung in Quebec Happiness."
quebec_happiness_bar:0 "Unterstützung der Unabhängigkeit von Quebec"
recently_pissed_quebec_off:0 "Hat nicht kürzlich Quebec angeärgert"

too_many_quebec_concessions: "Zu viele Konzessionen; Quebecers Unimpressed"
quebec_happiness_10: "#green Erhöhungen#! Franco-Canadian Happiness by #green 5#! points"
quebec_happiness_minus_10: "#r Decreases#! Franco-Canadian Happiness by #r 5#! points"

quebec.6.t: "Kompetenz in Quebec"
quebec.6.d: "Mit Quebecs überwältigender Zufriedenheit ist die Bundesregierung gewachsen. Ottawa glaubt, dass die Einheitsfrage geklärt ist, aber Kritiker warnen, dass solche Überschuldung zu Vernachlässigung anderer wichtiger Fragen führen kann."
quebec.6.a: "Tabarnak!"

complacent_on_quebec: "Kompetenz auf Quebec"
complacent_on_quebec_desc: "Mit der hohen Unterstützung von Quebec ist die Regierung in ihren Verhandlungen und der politischen Aufmerksamkeit zu einer wachsenden Kritik anderer Fraktionen geworden."
 
quebec_concessions_button: "Konzessionen zu Quebec machen"
quebec_concessions_button_desc: "Bieten Sie politische und kulturelle Zugeständnisse an Quebec und steigern Sie ihr Glück."

quebec_ignore_button: "Die Nachfragen von Quebec ignorieren"
quebec_ignore_button_desc: "Verweigern Sie sich, sich mit den politischen Forderungen von Quebec zu engagieren und ihr Glück zu verringern."

quebec.1.t: "Spannungen in Quebec"
quebec.1.d: "Politische Spannungen steigen in Quebec, da die Debatten über Autonomie und Sprachrechte verstärkt werden."
quebec.1.a: "Angebot Versicherungen an Quebec."
quebec.1.b: "Stehen Sie fest auf nationaler Einheit."

quebec.2.t: "1995 Quebec Referendum"
quebec.2.d: "Nach jahrelanger Debatte stimmt Quebec darüber ab, ob sie Teil Kanadas bleiben oder eine unabhängige Nation werden soll."
quebec.2.a: "Das Volk hat die Einheit gewählt."
quebec.2.b: "Quebec stimmt für Unabhängigkeit!"

quebec.3.t: "Französische Sprache Streit"
quebec.3.d: "Ein föderaler Politikvorschlag droht, den Status von Franzosen in Quebec zu reduzieren, der von vielen Bürgern ausgeht."
quebec.3.a: "Schützen Sie die französische Sprache zu allen Kosten."
quebec.3.a.tt: "Quebec Happiness erhöht sich um #G +8#!."
quebec.3.b: "Behalten Sie die aktuelle Politik."
quebec.3.b.tt: "Quebec Happiness wird um #R -5#! abnehmen."
quebec.3.b.tt2: "Sie dürfen mehr Zugeständnisse machen"

quebec.4.t: "Bundesförderschnitte nach Quebec"
quebec.4.d: "Die Bundesregierung steht vor Budgetdrucken, und die Finanzierung von Quebec für Infrastruktur und Dienstleistungen ist auf dem Häckselblock."
quebec.4.a: "Gehen Sie mit den Schnitten."
quebec.4.a.tt: "Quebec Happiness wird um #R -7#! abnehmen."
quebec.4.b: "Schneiden Sie weniger von Quebec."
quebec.4.b.tt: "Quebec Happiness wird um #R -2#! abnehmen."

quebec.5.t: "Kulturfestival von Quebec"
quebec.5.d: "Ein massives Fest der Quebecois-Kultur zieht nationale und internationale Aufmerksamkeit und fördert Stolz und Einheit."
quebec.5.a: "Feiern und fördern die Kultur."
quebec.5.a.tt: "Quebec Happiness erhöht sich um #G +10#!."
quebec.5.b: "Herzlichen Glückwunsch an die Organisatoren, aber keine zusätzliche Finanzierung."
quebec.5.b.tt: "Quebec Happiness erhöht sich um #G +3#!."

# China

je_china_southern_tour: "Südtour"
je_china_southern_tour_reason: "Anfang 1992 startete Deng Xiaoping seine berühmte "Southern Tour", reiste nach Shenzhen, Zhuhai, Guangzhou und Shanghai.\nx id=1/> Seine Reden förderten die weitere Wirtschaftsreform, die Marktliberalisierung und den Ausbau spezieller Wirtschaftszonen. Die Tour revitalisierte die reformistische Dynamik innerhalb der Kommunistischen Partei und versicherte sowohl inländische als auch ausländische Investoren, dass Chinas "Reform und Öffnung" weitergehen würde.\n"
je_china_southern_tour_progress_tt: "Die Fortschritte steigen jeden Monat und durch bestimmte Ereignisse."

southern_tour_reforms: "Wirtschaftliches Erbe der Südtour"
je_china_southern_tour_complete: "Deng Xiaoping hat seine Tour abgeschlossen"
china_southern_tour.1.t: "Deng Xiaoping's Southern Tour"
china_southern_tour.1.d: "Deng Xiaoping hat eine hochveröffentlichte Tour durch das Südchinesische begonnen, um wichtige spezielle Wirtschaftszonen zu besuchen und Beamte zu zwingen, Reformen fortzusetzen."
china_southern_tour.1.a: "Die Reise beginnt."

china_southern_tour.2.t: "Aufrufe zur Marktreform"
china_southern_tour.2.d: "In Vorträgen während der Southern Tour forderte Deng Xiaoping ein erneutes Engagement für marktorientierte Reformen."
china_southern_tour.2.a: "Unterstützt den Push."
china_southern_tour.2.b: "Halten Sie das aktuelle Tempo."

china_southern_tour.3.t: "Widerstand der inneren Partei"
china_southern_tour.3.d: "Konservative Elemente innerhalb der Partei haben Bedenken über das Tempo und den Umfang der wirtschaftlichen Liberalisierung geäußert."
china_southern_tour.3.a: "Ganz gleich."
china_southern_tour.3.b: "Verhandeln Sie einen Kompromiss."

