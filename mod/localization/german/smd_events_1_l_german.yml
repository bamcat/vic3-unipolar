 chechen_storm_grozny: "Schlacht von Grozny"
 chechen_storm_grozny_desc: "Der Angriff auf Grozny hat verheerende zivile Opfer und Zerstörung verursacht."
 
 chechen_war_devastation: "War-Torn Kaukasus"
 chechen_war_devastation_desc: "Die Kämpfe haben diese Region zerstört, Infrastruktur zerstört und Zivilisten getötet."
 
 chechen_war_raid_expenses: "Guerrilla Raid Kosten"
 chechen_war_raid_expenses_desc: "Finanzierung von Guerilla-Operationen gegen russische Versorgungsleitungen."
 
 chechen_war_rus_reward: "Victor of Chechnya"
 chechen_war_rus_reward_desc: "Russlands Sieg im Tschetschenischen Krieg hat seine territoriale Integrität bewahrt und seine militärische Entschlossenheit demonstriert."
 
 chechen_war_che_reward: "Independence Won"
 chechen_war_che_reward_desc: "Die Tschetschenen haben ihre Unabhängigkeit durch Blut und Opfer gewonnen. Die neue Nation steht stolz."
 
