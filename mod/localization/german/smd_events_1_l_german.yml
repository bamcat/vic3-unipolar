 je_first_chechen_war: "Der erste Tschetschenische Krieg"
 je_first_chechen_war_reason: "Die Tschetschenische Republik Ichkerien hat die Unabhängigkeit von Russland erklärt. Moskau hat mit militärischer Kraft reagiert. Das bergige Gelände des Nordkaukasus begünstigt die tschetschenischen Guerillakämpfer, aber Russland bringt überwältigende konventionelle Stärke. Das Ergebnis dieses Krieges wird das Schicksal von Tschetschenien bestimmen – und die Entschlossenheit der Russischen Föderation testen."
 
 je_chechen_war_complete_tt: "Eine Seite wurde besiegt oder angegliedert."
 
 je_chechen_war_status_guerilla: "Der Krieg liegt in seiner #bold guerilla phase#!. Tschetschenische Kämpfer benutzen die Berge, um Angriffe zu führen. Schlachten verlagern den Krieg und entsperren große Offensive."
 je_chechen_war_status_offensive: "Es wurde eine #bold große Offensive#! gestartet. Der Krieg ist in seine entscheidende Phase eingetreten."
 
 je_chechen_war_score_bar: "War Score"
 je_chechen_war_score_bar_desc: "Russischer Vorteil"
 je_chechen_war_score_bar_second_desc: "tschetschen Vorteil"
 
 chechen_war_startup_tt: "Der erste tschetschenische Krieg hat begonnen. Schlachten zwischen russischen und tschetschenischen Kräften werden die Kriegsergebnisse verschieben. Wenn genug Dynamik entsteht, kann eine entscheidende Offensive gestartet werden."
 
