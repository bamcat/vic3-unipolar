 kosovo_events.2.t:0 "Intervention im Kosovo?"
 kosovo_events.2.d:0 "Der Kosovo-Konflikt hat eskaliert. Die NATO-Regierungen debattieren militärische Interventionen gegen Jugoslawien."
 kosovo_events.2.a:0 "Beginnen Sie die Bombenkampagne."
 kosovo_events.2.b:0 "Vermeiden Sie Eskalation."

