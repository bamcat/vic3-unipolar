 # The Troubles

je_troubles_in_northern_ireland: "Die Probleme in Nordirland"
je_troubles_in_northern_ireland_reason: "Nordirland hat sich zu einem Flammpunkt politischer Gewalt zwischen nationalistischen und gewerkschaftlichen Gemeinschaften entwickelt, der in bewaffneten Konflikten mit paramilitärischen Gruppen, Zivilisten und der britischen Armee mündet.\nx id=1/> Wir müssen die Präsenz der Truppen und die politischen Antworten sorgfältig verwalten, um die Region zu stabilisieren."

je_troubles_increase_troop_button: "Troop-Präsenz erhöhen"
je_troubles_increase_troop_button_desc: "Mehr Britische Armee Truppen in Nordirland einsetzen, um die Kontrolle zu verstärken und Ordnung zu erhalten."

troubles_troop_strength_bar: "Troop Präsenz in Irland"
troubles_troop_strength_bar_desc: "Tropffestigkeit"
troubles_troop_strength_bar_monthly_desc: "Messt die Stärke des britischen Truppeneinsatzes in Nordirland."

troubles_events.1.t: "Bomben in Belgien"
troubles_events.1.d: "Eine Autobombe explodierte in Belfast, tötete Zivilisten und erhöhte Spannungen."
troubles_events.1.a: "Tragisch."

troubles_events.2.t: "Trophäen unter Angriff"
troubles_events.2.d: "Britische Soldaten kamen von Aufständischen in Derry unter Brand."
troubles_events.2.a: "Wir müssen antworten."

troubles_events.3.t: "Bürgerrechte Protest"
troubles_events.3.d: "Ein großer Protest in Londonderry wandte sich nach dem Zusammenstoß mit der Polizei."
troubles_events.3.a: "Eine beunruhigende Entwicklung."

troubles_events.4.t: "Verstärkungen Ankunft"
troubles_events.4.d: "Frische Truppen sind in Nordirland angekommen, um unsere Präsenz zu stärken."
troubles_events.4.a: "Gut."

troubles_events.5.t: "Gunmen töten Zivilisten im irischen Pub"
troubles_events.5.d: "Eine tödliche Erschießung in Nordirland hat lokale Gemeinschaften erschüttert, eine traurige Reflexion der Gewalt während der andauernden Probleme."
troubles_events.5.a: "Der Weg zum Frieden ist nie gerade."
 
je_northern_ireland_peace_process: "Friedensprozess in Nordirland"
je_northern_ireland_peace_process_reason: "Nach Jahrzehnten des Konflikts, bekannt als 'The Troubles', haben die Regierungen des Vereinigten Königreichs und Irlands - neben den politischen Parteien Nordirlands - eine Verhandlungsperiode abgeschlossen.\nx id=1/> Von der Downing Street-Erklärung bis hin zu Mehrparteiengesprächen und potenziellen Waffenstillstand könnten diese Diskussionen Jahre des Blutvergießens beenden.\nx id=3/> Das Ergebnis hängt vom politischen Willen, der öffentlichen Meinung und der Fähigkeit, Kompromisse zu erzielen."

ni_peace_process_success_tt: "Der Friedensprozess ist erfolgreich, die Stabilität in Nordirland zu erhöhen."

ni_peace_events.1.t: "Downing Street Erklärung"
ni_peace_events.1.d: "Die britischen und irischen Regierungen gaben eine gemeinsame Erklärung ab, in der das Recht der Menschen in Nordirland bekräftigt wurde, ihre Zukunft zu bestimmen."
ni_peace_events.1.a: "Ein wichtiger Schritt nach vorn."

ni_peace_events.2.t: "Mehrparteigespräche beginnen"
ni_peace_events.2.d: "Zum ersten Mal treffen sich Vertreter der meisten nordirischen politischen Fraktionen am Verhandlungstisch."
ni_peace_events.2.a: "Dialog ist der Weg zum Frieden."

ni_peace_events.3.t: "Der gute Freitagsvertrag"
ni_peace_events.3.d: "Paramilitärische Gruppen in Nordirland haben einen Waffenstillstand angekündigt, der die Tür zu einem dauerhaften Frieden öffnet, nachdem eine Reihe positiver Gespräche zwischen der Regierung des Vereinigten Königreichs und Irlands stattgefunden haben."
ni_peace_events.3.a: "Die Waffen fallen still."

ni_peace_events.5.t: "Britische Truppen aus Nordirland"
ni_peace_events.5.d: "Die britische Regierung ist nicht in der Lage, die Kontrolle aufrechtzuerhalten. In einer Überraschungsbewegung zwingt die Regierung Nordirland förmlich zur Republik Irland."
ni_peace_events.5.a: "Wir haben keine Wahl."
ni_peace_events.5.a.tt: "Nordirland wird nach Irland übertragen."

ni_peace_events.6.t: "Wiedervereinigung Irlands"
ni_peace_events.6.d: "Nach Jahrzehnten der Division ist Nordirland offiziell der Republik Irland beigetreten. Straßen füllen mit Feiern, wie die Nation in eine vereinte Zukunft sieht."
ni_peace_events.6.a: "Trink den Champagner!"
reunification_pride: "Wiedervereinigung Pride"
reunification_pride_desc: "Die Freude der nationalen Wiedervereinigung hat die öffentliche Einheit gestärkt und die Regierung gestärkt."

je_oil_titans:0 "Öl Titanen"
je_oil_titans_reason:0 "Der Golf sitzt auf den größten nachgewiesenen Ölreserven auf dem Planeten. Was [ROOT.GetCountry.GetName] mit dieser Vererbung das kommende Jahrhundert definiert - für die Region, für den globalen Energiemarkt und für jedes Land, dessen Industrie, Verkehr und Wohlstand auf Erdöl abläuft.\nx id=2/> Das Ziel ist nicht nur Öl zu extrahieren. Es ist unabdingbar zu werden — unter den drei Top-Produzenten der Welt zu sein, so dass, wenn sich der Preis des Öls bewegt, es bewegt, weil [ROOT.GetCountry.GetName] gewählt, um es zu bewegen."
 
oil_titans_top3_tt:0 "#bold [ROOT.GetCountry.GetName] ist ein Top 3 globaler Ölproduzent.#! Der Journaleintrag ist abgeschlossen — [ROOT.GetCountry.GetName] ist zu einem der unverzichtbaren Knoten des globalen Energiesystems geworden."
oil_titans_top10_tt:0 "[ROOT.GetCountry.GetName] ist ein Top 10 globaler Ölproduzent und nähert sich dem Top 3. Weitere Investitionen in die Ölgewinnung werden die Lücke schließen."
oil_titans_outside_tt:0 "[ROOT.GetCountry.GetName] ist noch nicht unter den Top 10 der globalen Ölproduzenten. Wesentliche Investitionen in die Ölgewinnungsinfrastruktur sind erforderlich."
 
oil_titans_bonus:0 "Öl Titan"
oil_titans_bonus_desc:0 "[ROOT.GetCountry.GetName] ist einer der weltweit führenden drei Ölproduzenten. Die Einnahmen, die dadurch entstehen, fließen in die Staatskasse, den Fondsaufbau und geben [ROOT.GetCountry.GetName] einen geopolitischen Einfluss, den seine Bevölkerungsgröße allein nie rechtfertigen würde. Die Welt braucht [ROOT.GetCountry.GetAdjective] Öl. Das braucht Macht."

bid_for_olympics_decision:0 "Ankündigen Bid, die Olympischen Spiele zu halten"
bid_for_olympics_decision_desc:0 "Wir sind glücklich genug, dass wir vom Internationalen Olympischen Komitee als Gastgeber der nächsten Olympischen Spiele betrachtet wurden."
we_can_host_the_next_olympics_tt:0 "Wir können die nächsten Olympischen Spiele hosten."

 je_korea_reunification_nrk:0 "Koreanische Wiedervereinigung"
 je_korea_reunification_nrk_reason:0 "Die Demokratische Volksrepublik Korea ist die einzige legitime Regierung der koreanischen Nation. Die Aufteilung der Halbinsel auf die 38. Parallele ist eine künstliche Wunde, die durch fremde Kräfte hervorgerufen wird — eine vorübergehende Anordnung, die [ROOT.GetCountry.GetName] zur Korrektur verpflichtet ist.\nx id=2/>Reunification under [ROOT.GetCountry.GetAdjective] Leader wird die koreanische Nation zur Vollständigkeit wiederherstellen. Die südkoreanische Verwaltung muss in den [ROOT.GetCountry.GetAdjective]-Zustand gebracht werden — durch Kraft, durch Vertrag oder durch das Gewicht der [ROOT.GetCountry.GetAdjective]-Leistung, die einen weiteren Widerstand unmöglich macht."
 
 korea_nrk_complete_tt:0 "#bold Die Halbinsel ist unter [ROOT.GetCountry.GetAdjective] Leadership unified.#! Korea ist ganz. Die Division von 1945 wurde korrigiert."
 korea_nrk_subject_path_tt:0 "[SCOPE.sCountry('c:STK').GetName] ist Gegenstand von [ROOT.GetCountry.GetName]. Die südliche Verwaltung wurde in den Zustand [ROOT.GetCountry.GetAdjective] gebracht. Die vollständige Integration der Halbinsel ist im Gange."
 korea_nrk_incomplete_tt:0 "[SCOPE.sCountry('c:STK').GetName] Kontrollen [SCOPE.sState('STATE_SEOUL').GetName], [SCOPE.sState('STATE_BUSAN').GetName] und [SCOPE.sState('STATE_YANGHO').GetName]. Wiedervereinigung erfordert [ROOT.GetCountry.GetName], um alle drei zu besitzen — oder haben [SCOPE.sCountry('c:STK').GetName] als Subjekt."
 
