 yugoslav_collapse.1.t:0 "Die Föderation Frakturen"
 yugoslav_collapse.1.d:0 "Die nationalistischen Regierungen und die zusammenfallende Bundesregierung haben Jugoslawien zum Rande der Auflösung geschoben."
 yugoslav_collapse.1.a:0 "Die Republiken müssen zusammengehalten werden."
 yugoslav_collapse.1.b:0 "Angebot einer konföderalen Siedlung."
 yugoslav_collapse.1.c:0 "Restore Bundesbehörde durch Gewalt."

 yugoslav_collapse.2.t:0 "Kroatien bricht Weg"
 yugoslav_collapse.2.d:0 "Kroatien hat sich in Richtung Unabhängigkeit bewegt und Belgrad dazu gezwungen, sich zu entscheiden, ob sie den Bruch bekämpfen oder erkennen."
 yugoslav_collapse.2.a:0 "Starten Sie den kroatischen Unabhängigkeitskrieg."
 yugoslav_collapse.2.b:0 "Erkennen kroatische Unabhängigkeit."

 yugoslav_collapse.3.t:0 "Bosnien erklärt Unabhängigkeit"
 yugoslav_collapse.3.d:0 "Die Unabhängigkeit Bosniens hat konkurrierende Forderungen in der ganzen Republik geschaffen, und die serbischen Organisationen haben begonnen, ihre eigene territoriale Autorität zu organisieren."
 yugoslav_collapse.3.a:0 "Der bosnische Krieg beginnt."
 yugoslav_collapse.3.b:0 "Erkenne Bosnien und suche eine Siedlung."

 yugoslav_collapse.4.t:0 "Internationale Antwort"
 yugoslav_collapse.4.d:0 "Ausländische Regierungen diskutieren Friedenssicherung, Sanktionen und Mediation, da sich der jugoslawische Konflikt verbreitet."
 yugoslav_collapse.4.a:0 "Eine Friedensmission ist notwendig."
 yugoslav_collapse.4.b:0 "Das ist eine interne Angelegenheit."

 yugoslav_collapse.5.t:0 "Serbien fordert Wiedervereinigung"
 yugoslav_collapse.5.d:0 "Belgrad hat unsere Regierung gebeten, in einen restaurierten jugoslawischen Staat zurückzukehren."
 yugoslav_collapse.5.a:0 "Akzeptanz der Wiedervereinigung."
 yugoslav_collapse.5.b:0 "Reject die Nachfrage."

 yugoslav_collapse.10.t:0 "Konföderale Verhandlungen"
 yugoslav_collapse.10.d:0 "Eine lockerere jugoslawische Konföderation kann Frieden bewahren, aber die Republiken verdächtigen Belgrads Absichten."
 yugoslav_collapse.10.a:0 "Weiter die Reformen."
 yugoslav_collapse.10.b:0 "Der Prozess scheitert."

 yugoslav_collapse.20.t:0 "Jugoslawien erhalten"
 yugoslav_collapse.20.d:0 "Durch Kompromisse und Zurückhaltungen hat Jugoslawien den vollständigen Zerfall vermieden und eine konföderale Lösung akzeptiert."
 yugoslav_collapse.20.a:0 "Die Föderation überlebt."

 yugoslav_collapse.30.t:0 "Montenegros Referendum"
 yugoslav_collapse.30.d:0 "Montenegro bereitet sich darauf vor, zu entscheiden, ob die Union mit Serbien fortgesetzt oder die volle Unabhängigkeit wiederhergestellt wird."
 yugoslav_collapse.30.a:0 "Erkennen Sie Montenegros Unabhängigkeit."
 yugoslav_collapse.30.b:0 "Reservieren Sie die Gewerkschaft."

