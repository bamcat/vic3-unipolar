 je_afghan_civil_war:0 "Afghanischer Bürgerkrieg"
 je_afghan_civil_war_reason:0 "Die Taliban-Regierung und die afghanische Nördliche Allianz sind in einem extrem langsamen Guerillakrieg eingeschlossen. Bergkrieg, schlechte Infrastruktur und verteilte Fronten machen entscheidende Fortschritte selten."
 je_afghan_civil_war_status:0 "Der Krieg bleibt in einer schleifenden Guerillaphase. Die Vorwürfe sind schmerzhaft langsam, und beide Seiten versuchen, genügend Dynamik für eine entscheidende Kampagne zu sammeln."
 je_afghan_civil_war_status_final_phase:0 "Der afghanische Bürgerkrieg ist in eine entscheidende Phase eingetreten. Eine Seite hat sich einer breiteren Kampagne verpflichtet."
 je_afghan_civil_war_complete:0 "Die Taliban-Regierung oder die Nordallianz existiert nicht mehr."
 je_afghan_civil_war_score_bar:0 "Afghan War Momentum"
 je_afghan_civil_war_score_bar_desc:0 "Afghanistan"
 je_afghan_civil_war_score_bar_second_desc:0 "Nordallianz"
 je_afghan_civil_war_northern_offensive:0 "Start der Northern Offensive"
 je_afghan_civil_war_northern_offensive_desc:0 "Die Nordallianz kann versuchen, akkumulierte Guerilla-Momente in eine breitere Kampagne zu verwandeln."
 je_afghan_civil_war_taliban_campaign:0 "Start der Taliban-Kampagne"
 je_afghan_civil_war_taliban_campaign_desc:0 "Die Taliban können versuchen, den langsamen Kriegs des Attentats mit einer entscheidenden Kampagne zu brechen."
 AFGHAN_CIVIL_WAR_OFFENSIVE_MINIMUM_SCORE:0 "Erfordert sehr hohe Kriegsmomente oder den bis 1998 andauernden Konflikt."
 afghan_civil_war.1.t:0 "Die dezente afghanische Kampagne"
 afghan_civil_war.1.d:0 "Die langsame Guerillaphase hat eine breitere Kampagne ermöglicht. Nach jahrelangen Razzien, Hinterhalt und bestrittenen Tälern versuchen beide Seiten nun, angesammelte Dynamik in ein endgültiges Ergebnis zu verwandeln."
 afghan_civil_war.1.f:0 "In Afghanistan gehen Armeen nicht einfach voran. Sie verhandeln mit Gelände, Wetter, Versorgung und Loyalitäten, die Tal nach Tal verschieben."
 afghan_civil_war.1.a:0 "Beginnen Sie die Kampagne."
 afghan_civil_war.1.a.ana:0 "Drücken Sie von Norden."
 afghan_civil_war.2.t_afg:0 "Die Taliban-Prävailen"
 afghan_civil_war.2.t_ana:0 "Die Nördliche Allianz prevails"
 afghan_civil_war.2.d_afg:0 "Der afghanische Bürgerkrieg endete in den Gunsten der Taliban. Der Staat wird nun die Kontrolle über das Land festigen."
 afghan_civil_war.2.d_ana:0 "Der afghanische Bürgerkrieg ist in der Gunst der Nördlichen Allianz beendet. Die Koalition muss nun militärisches Überleben in einen lebensfähigen Staat verwandeln."
 afghan_civil_war.2.f:0 "Die Kämpfe enden, aber das Land bleibt von den langen Jahren des Krieges geprägt."
 afghan_civil_war.2.a:0 "Der Krieg ist vorbei."
 afghan_civil_war.5.t:0 "Druck der Taliban"
 afghan_civil_war.5.d:0 "Taliban-Kräfte Sonde Nördliche Allianz Positionen, Suche nach Schwachstellen in Versorgungsleitungen und Bergverteidigungen."
 afghan_civil_war.5.f:0 "Die Front bewegt sich mit den Bergrücken und Straßen, nicht durch die sauberen Pfeile der Personalkarten."
 afghan_civil_war.5.a:0 "Weiter den Druck."
 afghan_civil_war.6.t:0 "Nördliche Allianz Netzwerke"
 afghan_civil_war.6.d:0 "Die Kommandanten von Northern Alliance erweitern lokale Netzwerke mit Gelände, Loyalität und externen Versorgungswegen, um den Krieg zu unterstützen."
 afghan_civil_war.6.f:0 "Im Norden kann eine Versorgungsroute genauso wichtig sein wie ein Bataillon."
 afghan_civil_war.6.a:0 "Halte die Leitung."
 acw_guerrilla_warfare:0 "Afghan Guerrilla Warfare"
 acw_guerrilla_warfare_desc:0 "Der Krieg wird von Bergen, Razzien, Hinterbliebenen, wandelnden Loyalitäten und fragmentierten Fronten dominiert. Der Aufstieg ist fast unmöglich ohne überwältigende Dynamik."
 acw_taliban_security_push:0 "Taliban-Kampagne"
 acw_taliban_security_push_desc:0 "Die Taliban verpflichteten sich zu einer breiteren Kampagne, um den Krieg des Attentats zu brechen."
 acw_northern_alliance_mountain_resistance:0 "Widerstand der Berge"
 acw_northern_alliance_mountain_resistance_desc:0 "Die Nördliche Allianz nutzt Berggelände und lokale Netzwerke, um konventionelle Offensive zu widerstehen."
 acw_taliban_supply_strain:0 "Versorgungsmenge der Taliban"
 acw_taliban_supply_strain_desc:0 "Der anhaltende Druck stellt schwere logistische Belastungen für Taliban-Kräfte dar."
 acw_northern_alliance_supply_networks:0 "Nördliche Allianz Versorgungsnetze"
 acw_northern_alliance_supply_networks_desc:0 "Die Nordallianz verstärkt ihre lokalen und externen Versorgungsnetze."
 acw_afg_reward:0 "Afghanistan konsolidiert"
 acw_afg_reward_desc:0 "Die Taliban-Regierung ist aus dem Bürgerkrieg mit neuer Kontrolle entstanden."
 acw_ana_reward:0 "Allianz Ascendant"
 acw_ana_reward_desc:0 "Die Nordallianz ist aus dem Bürgerkrieg mit neuer Legitimität entstanden."
 
