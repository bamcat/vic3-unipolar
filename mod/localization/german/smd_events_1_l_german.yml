 je_demographic_crisis: "Demographische Krise"
 je_demographic_crisis_reason: "Unsere Nation steht vor einer drohenden demografischen Krise. Eine alternde Bevölkerung und sinkende Geburtenraten bedrohen, unsere Belegschaft zu schrumpfen und unsere sozialen Systeme zu belasten. Wir müssen umfassende pronatalistische Politiken einführen und sie für ein Jahrzehnt aufrecht erhalten, um diesen Trend vor Ablauf des temporären demographischen Puffers zu rückgängig zu machen."

 je_demographic_crisis_progressing_tt: "Pro-natalistische Politiken sind in Kraft und Bedingungen werden erfüllt. Fortschritt: #bold [Root.GetCountry.MakeScope.Var('demographic_months_sustained').GetValue|0]x id=2/> / 120 Monate."
