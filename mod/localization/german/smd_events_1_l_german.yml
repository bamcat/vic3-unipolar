 io_accession_events.1.t:0 "EWG-Beitritt abgeschlossen"
 io_accession_events.1.d:0 "Unsere Reformen haben die Voraussetzungen für die EWG-Mitgliedschaft erfüllt. Wir sind in den europäischen Wirtschaftsrahmen eingetreten."
 io_accession_events.1.a:0 "Mitglied der EWG."

 io_accession_events.2.t:0 "EU-Beitritt abgeschlossen"
 io_accession_events.2.d:0 "Unser Beitrittsprozess ist abgeschlossen. Wir sind der Europäischen Union beigetreten und haben ihren politischen und wirtschaftlichen Rahmen betreten."
 io_accession_events.2.a:0 "Mitglied der Europäischen Union."

 io_accession_events.3.t:0 "EWG-Zugang Halted"
 io_accession_events.3.d:0 "Der EWG-Beitrittsprozeß ist zusammengebrochen, nachdem unsere Regierung von demokratischen Normen weggezogen ist."
 io_accession_events.3.a:0 "Der Prozess ist vorbei."

 io_accession_events.4.t:0 "EU-Beitritt Halted"
 io_accession_events.4.d:0 "Der EU-Beitrittsprozess ist zusammengebrochen, nachdem unsere Regierung von demokratischen Standards weggezogen ist."
 io_accession_events.4.a:0 "Der Prozess ist vorbei."

 io_accession_events.10.t:0 "Ausgetrieben von der NATO"
 io_accession_events.10.d:0 "Unsere Verabschiedung autoritärer Gesetze hat die NATO-Mitgliedschaft unmöglich gemacht. Die Allianz hat uns vertrieben und unsere Verteidigungspakte mit ihren Mitgliedern wurden zurückgezogen."
 io_accession_events.10.a:0 "Wir stehen allein."

 io_accession_events.11.t:0 "Ausgetrieben aus der EWG"
 io_accession_events.11.d:0 "Unsere Verabschiedung autoritärer Gesetze hat die politischen Erwartungen der europäischen Zusammenarbeit verletzt. Wir sind aus der EWG vertrieben worden."
 io_accession_events.11.a:0 "Also sei es."

 io_accession_events.12.t:0 "Ausgetrieben aus der Europäischen Union"
 io_accession_events.12.d:0 "Unsere Verabschiedung autoritärer Gesetze hat die demokratischen Standards der Europäischen Union verletzt. Wir wurden aus der Union vertrieben."
 io_accession_events.12.a:0 "Die Union dreht sich ab."

 io_accession_events.13.t:0 "Ausgetrieben von der G7"
 io_accession_events.13.d:0 "Unsere Verabschiedung autoritärer Gesetze hat die Mitgliedschaft in der G7 politisch inakzeptabel gemacht. Wir wurden von der Gruppe entfernt."
 io_accession_events.13.a:0 "Ein diplomatischer Rückschlag."

 io_accession_events.20.t:0 "NATO demokratische Standards Warnung"
 io_accession_events.20.d:0 "Unsere Regierung hat autoritäre Gesetze erlassen. Wenn diese Gesetze bestehen bleiben, wird die NATO-Mitgliedschaft während der nächsten Überprüfung widerrufen."
 io_accession_events.20.a:0 "Wir wurden gewarnt."

 io_accession_events.21.t:0 "EWG-Demokratische Normen Warnung"
 io_accession_events.21.d:0 "Unsere Regierung hat autoritäre Gesetze erlassen. Wenn diese Gesetze bestehen bleiben, wird die EWG-Mitgliedschaft während der nächsten Überprüfung widerrufen."
 io_accession_events.21.a:0 "Wir wurden gewarnt."

 io_accession_events.22.t:0 "EU-Demokratische Normen Warnung"
 io_accession_events.22.d:0 "Unsere Regierung hat autoritäre Gesetze erlassen. Wenn diese Gesetze bestehen bleiben, wird die EU-Mitgliedschaft während der nächsten Überprüfung widerrufen."
 io_accession_events.22.a:0 "Wir wurden gewarnt."

 io_accession_events.23.t:0 "G7 Demokratische Normen Warnung"
 io_accession_events.23.d:0 "Unsere Regierung hat autoritäre Gesetze erlassen. Wenn diese Gesetze bestehen bleiben, wird die G7-Mitgliedschaft während der nächsten Überprüfung widerrufen."
 io_accession_events.23.a:0 "Wir wurden gewarnt."

 io_democratic_standards_warning:0 "Warnung der demokratischen Normen"
 io_democratic_standards_warning_desc:0 "Dieses Land wurde gewarnt, dass seine autoritären Gesetze die Mitgliedschaft in demokratischen internationalen Organisationen gefährden könnten."

 io_expelled_from_democratic_org:0 "Ausgetrieben von der Demokratischen Organisation"
 io_expelled_from_democratic_org_desc:0 "Dieses Land wurde nach dem Erlass autoritärer Gesetze von einer internationalen Organisation vertrieben."
 
 intifada_2005.1.t:0 "Die zweite Intifada windet sich nach unten"
 intifada_2005.1.d:0 "Nach Jahren anhaltender Gewalt, Erschöpfung, Sicherheitsmaßnahmen, diplomatischem Druck und politischem Wandel haben der Aufstand zu einem Ende gebracht."
 intifada_2005.1.f:0 "Der Konflikt ist nicht gelöst, aber die Phase der offenen Intifada ist beendet. Ein Waffenstillstand lässt beide Seiten verängstigt, verdächtig und unsicher, was als nächstes kommt."
 intifada_2005.1.a:0 "Akzeptiere einen weißen Frieden."

 intifada_2005.2.t:0 "Die zweite Intifada windet sich nach unten"
 intifada_2005.2.d:0 "Die Kämpfe haben abgebrochen, und der Aufstand hat eine neue, ruhigere Phase erreicht."
 intifada_2005.2.f:0 "Es wurde keine endgültige Siedlung erreicht, aber die Eskalation hat sich herausgebrannt."
 intifada_2005.2.a:0 "Der Kampf geht auf andere Weise weiter."

 intifada_2005_ceasefire:0 "Intifada Ceasefire"
 intifada_2005_ceasefire_desc:0 "Die offene Phase der zweiten Intifada ist in einem zerbrechlichen Waffenstillstand beendet."
 
 arab_spring_jihadist_breakaways.1.t:0 "Der Islamische Staat Emerges"
 arab_spring_jihadist_breakaways.1.d:0 "Das Chaos der Revolution und des Staatszusammenbruchs hat es den jihadistischen Kräften ermöglicht, das Gebiet unter dem Banner des Islamischen Staates zu konsolidieren."
 arab_spring_jihadist_breakaways.1.f:0 "Der alte Staat kämpft gegen die Revolution. Die Revolution kämpft gegen den alten Staat. In den Ruinen zwischen ihnen erhöht eine dritte Kraft ihre Flagge."
 arab_spring_jihadist_breakaways.1.a:0 "Eine neue Front öffnet sich."

 arab_spring_jihadist_breakaways.2.t:0 "Dschihadist Enclavs Emerge"
 arab_spring_jihadist_breakaways.2.d:0 "Als der arabische Frühling die Region destabilisiert, haben jihadistische Zellen zerstreutes Gebiet ergriffen und Loyalität gegenüber dem islamischen Staat erklärt."
 arab_spring_jihadist_breakaways.2.f:0 "Wenn der Staat zurückzieht, werden bewaffnete Netzwerke Verwaltungen."
 arab_spring_jihadist_breakaways.2.a:0 "Die Krise breitet sich aus."

 arab_spring_jihadist_breakaways.3.t:0 "Das Houthis Seize Gebiet"
 arab_spring_jihadist_breakaways.3.d:0 "Die Jemeni-Revolution hat das Land gebrochen, so dass die Houthi-Bewegung das Gebiet zu ergreifen und seine eigenen Kräfte zu mobilisieren."
 arab_spring_jihadist_breakaways.3.f:0 "Der Aufstand produzierte keine Opposition, sondern viele."
 arab_spring_jihadist_breakaways.3.a:0 "Jemensplitter."

