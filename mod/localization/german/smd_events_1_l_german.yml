je_rwandan_genocide: "Ruanda Genozid"
je_rwandan_genocide_reason: "Im April 1994 wurde ein Flugzeug mit den Präsidenten von Ruanda und Burundi erschossen, das eine der schrecklichsten Genozide des späten 20. Jahrhunderts auslöste.\n>x id=1/>Extremist militias, mit staatlicher Unterstützung, begann Massenmörder, die auf die Tutsi-Minderheit und moderate Hutus ausgerichtet waren. Das internationale Bewusstsein war langsam zu bauen, aber als sich die Massaker ausbreiten, fordert die Intervention auf.\nx id=3/>"

je_rwandan_genocide_progress_tt: "Der Fortschritt steigt im Laufe der Zeit und durch gewaltsame Ereignisse. Die Intervention kann den Fortschritt verringern."

rwandan_genocide.1.t: "Der Genozid beginnt"
rwandan_genocide.1.d: "Nach der Ermordung von Präsident Habyarimana haben extremistische Kräfte weit verbreitete Morde an der Tutsi-Minderheit begonnen."
rwandan_genocide.1.a: "Ein dunkles Kapitel beginnt."

rwandan_genocide.2.t: "Massaker weiter"
rwandan_genocide.2.d: "Berichte aus ländlichen Regionen beschreiben ganze Gemeinschaften, die in koordinierten Angriffen ausgelöscht wurden."
rwandan_genocide.2.a: "Die Gewalt eskaliert."

rwandan_genocide.3.t: "International Outrry"
rwandan_genocide.3.d: "Grafik-Bilder und Survivor-Konten haben die globalen Medien erreicht und fordern dringend die Vereinten Nationen auf, zu handeln."
rwandan_genocide.3.a: "Fordern Sie Friedenstruppen an."
rwandan_genocide.3.b: "Tu nichts."

rwandan_genocide_request_peacekeepers_tt: "Dies wird eine UN-Abstimmung über die Bereitstellung von Friedenstruppen nach Ruanda auslösen."
rwandan_genocide_community_angry: "Dies wird die internationale Gemeinschaft ärgern"

rwandan_genocide.4.t: "UN-Friedenswahl"
rwandan_genocide.4.d: "Der Sicherheitsrat der Vereinten Nationen hat beschlossen, darüber abzustimmen, ob die Friedenstruppen nach Ruanda geschickt werden sollen."

