 czh_federal_strain: "Bundesstraße"
 czh_federal_strain_desc: "Die Verfassungskrise schwächt die Bundesinstitutionen. Die Legitimität ist erodierend, und die Gesetzgebung ist schwieriger, da beide Hälften der Föderationsfrage die Autorität des Zentrums haben."
 
 czh_slovak_subsidy: "Slowakische Wirtschaftsförderung"
 czh_slovak_subsidy_desc: "Bundesgelder werden durch den Übergang zur Unterstützung der slowakischen Wirtschaft umgeleitet. Der Präsident. — Die Aussprache ist geschlossen."
 
 czh_federal_authority_asserted: "Föderale Behörde unterstützt"
 czh_federal_authority_asserted_desc: "Die Bundesregierung hat die slowakische Erklärung verurteilt und die Vorherrschaft des Bundesrechts geltend gemacht. Die Behörde wird geschädigt, aber die slowakische Wut hat sich verstärkt."
 
 czh_autonomy_negotiations: "Autonome Verhandlungen"
 czh_autonomy_negotiations_desc: "Formale Gespräche sind im Gange, um der Slowakei eine größere Autonomie innerhalb der Föderation zu bieten. Der Prozess hat das politische Klima verbessert."
 
 czh_confederation_talks: "Vorschlag der Kommission"
 czh_confederation_talks_desc: "Ein lockereres Konföderationsmodell wird ausgehandelt. Beide Seiten reden. Das Ergebnis ist unsicher, aber die Dynamik zur Auflösung hat sich verlangsamt."
 
 czh_referendum_blocked: "Referendum unterdrückt"
 czh_referendum_blocked_desc: "Die Forderung nach einem Unabhängigkeitsreferendum wurde abgelehnt. Slowakische Politiker und Zivilgesellschaft haben mit Wut reagiert. Der politische Druck ist nicht verschwunden — er hat einen Ausgang verweigert."
 
 czh_federal_union_preserved: "Bundesrepublik Deutschland"
 czh_federal_union_preserved_desc: "Die Verfassungskrise ist vergangen. [ROOT.GetCountry.GetName] zusammengehalten. Die ausgehandelte Siedlung hat Bundeseinrichtungen und das Vertrauen der Öffentlichkeit in die Union gestärkt."
 
 czc_new_republic_founding: "Tschechische Republik"
 czc_new_republic_founding_desc: "Die Tschechische Republik wurde als souveräner Staat gegründet. Internationale Anerkennung ist sofort möglich. Die Grundlagen der neuen Republik sind stabil."
 
 svk_new_republic_founding: "Slowakische Republik"
 svk_new_republic_founding_desc: "Die Slowakische Republik wurde als souveräner Staat gegründet. Die erste völlig unabhängige Slowakei in der Geschichte findet ihren Fuß."
 
