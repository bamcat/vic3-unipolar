 law_safe_injection_sites_modifier: "Sicherheits-Injektions-Sites"
 law_trafficking_allowed_modifier: "Verkehr erlaubt"
 
 lawgroup_disability_rights: "Behinderungsrechte"
 lawgroup_disability_rights_desc: "Der Rechtsrahmen für die Rechte behinderter Bürger – von der bloßen Anerkennung bis zur aktiven staatlichen Unterstützung durch Behandlung, Infrastruktur und Arbeitsplatzinklusion. Mehr umfassende Rahmenbedingungen erweitern die Erwerbsbeteiligung, verbessern den Lebensstandard und verringern die Sterblichkeit, erhöhen die Kosten für Staat und Arbeitgeber."

 law_minimal_recognition: "Minimale Anerkennung"
 law_minimal_recognition_desc: "Der Staat erkennt an, dass behinderte Bürger existieren, aber keine Unterkunft, Unterstützung oder Rechtsschutz für sie bietet. Behinderte sind weitgehend von der formalen Beschäftigung und dem öffentlichen Leben ausgeschlossen. Die menschlichen Kosten sind beträchtlich; die Steuerkosten sind vernachlässigbar."
 
 law_workplace_accommodations: "Unterkünfte am Arbeitsplatz"
 law_workplace_accommodations_desc: "Die Arbeitgeber sind gesetzlich verpflichtet, angemessene Anpassungen vorzunehmen, um behinderten Arbeitnehmern die Teilnahme an der Belegschaft zu ermöglichen — modifizierte Ausrüstung, angepasste Aufgaben, zugängliche Arbeitsplätze. Die Politik bringt eine sinnvolle Bevölkerung in produktive Beschäftigung. Arbeitgeber tragen Anpassungskosten, aber die Belegschaft erweitert sich."
 
 law_anti_ableist_architecture: "Anti-Ableist Architektur"
 law_anti_ableist_architecture_desc: "Öffentliche Gebäude, Verkehrsnetze und Infrastruktur sind für Behinderte zugänglich. Lampen, Aufzüge, taktile Pflaster, zugängliche Schilder — die physische Umgebung darf nicht mehr ausschließen. Die Umrüstung bestehender Infrastruktur ist teuer. Die Bevölkerung, die sich voll an der Gesellschaft beteiligen kann, erweitert sich erheblich."
 
 law_public_treatments: "Öffentliche Behandlungen"
 law_public_treatments_desc: "Der Staat finanziert medizinische Behandlungen, Assistenzgeräte, Prothetik, Therapie und laufende Unterstützungsdienste für behinderte Bürger als Sache der Rechten und nicht der Nächstenliebe. Die Mortalität fällt deutlich. Der Lebensstandard steigt über die Bevölkerung. Die Kosten für den öffentlichen Haushalt sind beträchtlich und laufend — aber das Argument, dass einige Bürger weniger Anspruch auf staatliche Unterstützung haben als andere, wurde formal abgelehnt."
 
 law_minimal_recognition_modifier: "Minimale Erkennung von Behinderungen"
 law_minimal_recognition_modifier_desc: "Behinderte Bürger erhalten keine Unterkunft aus dem Staat. Die effektive Belegschaft wird reduziert und die Mortalität liegt über dem, was sie sein könnte."
 
 law_workplace_accommodations_modifier: "Unterkünfte am Arbeitsplatz"
 law_workplace_accommodations_modifier_desc: "Die Arbeitgeber müssen behinderte Arbeitnehmer aufnehmen. Die Belegschaft ist breiter und integrativer, zu bescheidenen Kosten für den Aufbau der Produktivität."
 
 law_anti_ableist_architecture_modifier: "Barrierefreie Infrastruktur"
 law_anti_ableist_architecture_modifier_desc: "Die öffentliche Infrastruktur wurde zugänglich gemacht. Die Baukosten sind höher, da Gebäude Zugänglichkeitsstandards erfüllen, aber die Bevölkerung, die voll an der Gesellschaft teilnehmen kann, ist deutlich größer."
 
 law_public_treatments_modifier: "Behandlungen der öffentlichen Behinderung"
 law_public_treatments_modifier_desc: "Die staatlichen Mittel dienen der Behandlung und Unterstützung behinderter Bürger. Die Mortalität wird reduziert, der Lebensstandard verbessert und der Zugang zu Bildung ist breiter – auf erheblichen und laufenden öffentlichen Kosten."
 
 institution_environmental_protection: "Umweltagentur"
 institution_environmental_protection_desc: "Eine Regierungsstelle für die Überwachung und Durchsetzung von Umweltstandards. Jedes Investitionsniveau stellt eine erweiterte Durchsetzungskapazität, strengere Vorschriften und umfassendere Schutzprogramme dar – die Verringerung der Umweltverschmutzung in allen Staaten."
 
 lawgroup_environmental_regulations: "Umweltvorschriften"
 lawgroup_environmental_regulations_desc: "Der Rechtsrahmen für das Verhältnis von <x id========                                                                                                                                                                                                                                              Mehr fortschrittliche Rahmenbedingungen reduzieren die Umweltverschmutzung, senken die Sterblichkeit und schützen Ökosysteme, erhöhen die Kosten für den industriellen Durchsatz und die öffentlichen Ausgaben."
 
 law_no_environmental_regulations: "Keine Verordnungen"
 law_no_environmental_regulations_desc: "Die Industrie arbeitet ohne Umweltbeschränkung. Faktoren, Minen und Farmen können ohne gesetzliche Begrenzung verschmutzen, extrahieren und ausbeuten. Die Leistung wird maximiert. Die langfristigen Kosten – in der Sterblichkeit, dem Ökosystemabbau und der öffentlichen Gesundheit – werden von der Bevölkerung getragen, nicht von den Erzeugern."
 
 law_game_law: "Spielrecht"
 law_game_law_desc: "Jagd und Fischerei sind reguliert, um den Zusammenbruch der Spielpopulationen zu verhindern. Geschützte Jahreszeiten, lizenzierte Jagd und Einschränkungen auf die zerstörerischsten Extraktionsverfahren. Es handelt sich um einen Erhaltungsrahmen, der vor allem den Interessen derjenigen dient, die reich genug sind, um Erholung zu jagen — aber es stellt das Prinzip fest, dass der Staat ein Interesse an der Verwaltung natürlicher Ressourcen hat."
 
 law_national_recycling: "Nationales Recycling"
 law_national_recycling_desc: "Ein nationales Programm zur Sammlung und Verarbeitung recycelbarer Abfälle. Industrie- und Hausmüll wird sortiert, zurückgewonnen und gegebenenfalls wiederverwendet, wodurch das Materialvolumen in Deponien und Wasserstraßen reduziert wird. Ressourceneffizienz verbessert sich bescheiden. Die Verschmutzung fällt. Das Programm erfordert eine Koordinierung zwischen Kommunen und Industrien."
 
 law_protection_agency: "Schutzagentur"
 law_protection_agency_desc: "Eine engagierte Regierungsstelle mit der Behörde, Umweltstandards in allen Wirtschaftsbereichen festzulegen, zu überwachen und durchzusetzen. Emissionsgrenzwerte, Flächennutzungsbeschränkungen, industrielle Abfallvorschriften und geschützte Naturgebiete gehören alle zu ihrer Verantwortung. Die Agentur kann investiert werden — jedes zusätzliche Finanzierungsniveau erweitert seine Durchsetzungsfähigkeit und verringert die Verschmutzung weiter."
 
 law_guaranteed_rights_of_nature: "Gewährte Naturrechte"
 law_guaranteed_rights_of_nature_desc: "Flüsse, Wälder, Feuchtgebiete und Ökosysteme erhalten Rechtsstand — das Recht, nicht zerstört, verschmutzt oder über ihre Fähigkeit hinaus genutzt zu werden. Der Rahmen ist die ehrgeizigste Umweltgesetzgebung, die aus aufstrebenden Rechtstraditionen in Ländern, die begonnen haben, die Natur als Gegenstand von Rechten zu behandeln, statt als Eigentumsgegenstand. Die industrielle Tätigkeit ist erheblich eingeschränkt. Die Verschmutzung fällt stark. Die Umweltschutzagentur arbeitet mit höchstmöglicher Wirksamkeit."
 
 law_no_environmental_regulations_modifier: "Unregulierte Industrie"
 law_no_environmental_regulations_modifier_desc: "Keine Umweltzwänge in der Industrie. Die Durchdringung ist gewachsen, aber Verschmutzung und Sterblichkeit steigen als Folge."
 
 law_game_law_modifier: "Spielrecht"
 law_game_law_modifier_desc: "Regulierte Jagd und Fischerei haben den Abbau der Umwelt geringfügig verringert. Ein minimaler, aber realer Eingriff."
 
 law_national_recycling_modifier: "Nationales Recyclingprogramm"
 law_national_recycling_modifier_desc: "Ein nationales Recyclingprogramm reduziert die Abfallerzeugung und -rückgewinnung, verbessert die Umweltverschmutzung und die Baueffizienz."
 
 law_protection_agency_modifier: "Umweltagentur"
 law_protection_agency_modifier_desc: "Die Umweltschutzagentur stärkt Emissionsgrenzwerte und industrielle Standards. Die Verschmutzung sinkt und die Institution kann weiter investiert werden, um ihre Reichweite zu erweitern."
 
 law_guaranteed_rights_of_nature_modifier: "Gewährte Naturrechte"
 law_guaranteed_rights_of_nature_modifier_desc: "Die Natur wurde verfassungsrechtlich begründet. Die Industrie steht vor erheblichen Einschränkungen, aber die Verschmutzung wird stark reduziert, die Sterblichkeit sinkt und die Ernährungssicherheit verbessert sich, da Ökosysteme geschützt sind."
 
 # Institution modifier names
 country_institution_cost_institution_environmental_protection_mult: "Kosten für den Umweltschutz"
