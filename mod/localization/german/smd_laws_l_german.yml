 # ==========================================
 # LAWGROUP
 # ==========================================
 
 lawgroup_subsidized_housing: "Wohnungsbau"
 lawgroup_subsidized_housing_desc: "Der Grad, in dem die staatlichen Mittel, baut und garantiert Wohnungen für seine Bürger. Mehr fortschrittliche Rahmenbedingungen erweitern die Immobilienproduktion in städtischen Zentren, verbessern die Infrastruktur und erhöhen den Migrationszug – bei steigenden Sozial- und Haushaltskosten."
 
 # ==========================================
 # LAWS
 # ==========================================
 
 law_no_public_housing: "Keine öffentliche Wohnung"
 law_no_public_housing_desc: "Der Zustand bietet keinen Gehäuseträger. Shelter ist eine private Angelegenheit — gekauft, gemietet oder ohne gegangen. Der städtische Wohnungsmarkt funktioniert ohne öffentliche Intervention, und was auch immer der Markt produziert, ist, was die Bürger bekommen."
 
 law_housing_projects: "Wohnprojekte"
 law_housing_projects_desc: "Der Staat baut grundlegende hochdichte öffentliche Wohnung in städtischen Gebieten — Turmblöcke, Mietreihen, funktional und billig. Die Qualität ist nicht immer hoch und die Stellen sind nicht immer wünschenswert, sondern das Gehäuse besteht. Urban Zentren können nun zusätzliche Immobilien durch staatliche Bauprogramme produzieren."
 
 law_public_housing_program: "Öffentliches Wohnprogramm"
 law_public_housing_program_desc: "Ein umfassendes staatliches Wohnprogramm mit Designstandards, Mischnutzungsentwicklung und aktiver Stadtplanung. Die Regierung baut nicht nur Unterschlupf – sie formt die Stadt. Stadtzentren produzieren deutlich mehr Immobilien, da der öffentliche Bausektor expandiert, und Infrastruktur verbessert sich als Folge einer besseren Stadtplanung."
 
 law_universal_housing: "Universal Gehäuse"
 law_universal_housing_desc: "Wohnen ist ein garantiertes Recht. Die staatlichen Mittel, bauen und pflegen Schutz für jeden Bürger, der es braucht - keine Mittel, um zu testen, keine Marktabhängigkeit, ohne zu gehen. Die Steuerkosten sind beträchtlich und laufend. Stadtzentren produzieren maximale Immobilienleistung. Städte rund um den universellen Zugang ziehen Migration an und verbessern die Infrastruktur im gesamten Board."
 
 law_no_public_housing_modifier: "Keine öffentliche Wohnung"
 law_no_public_housing_modifier_desc: "Der Zustand bietet keinen Gehäuseträger. Der städtische Wohnungsmarkt ist völlig privat."
 
 law_housing_projects_modifier: "Wohnprojekte"
 law_housing_projects_modifier_desc: "Die Grundkonstruktion des Zustands ist im Gange. Die Sozialkosten sind bescheiden, da der Staat den Wohnungsbestand subventioniert."
 
 law_public_housing_program_modifier: "Öffentliches Wohnprogramm"
 law_public_housing_program_modifier_desc: "Ein umfassendes öffentliches Wohnungsprogramm erweitert die städtische Immobilienversorgung und verbessert die Stadtinfrastruktur zu erheblichen laufenden Kosten."
 
 law_universal_housing_modifier: "Universal Gehäuse"
 law_universal_housing_modifier_desc: "Wohnen ist ein garantiertes Recht. Die Sozialkosten sind hoch, aber die städtische Infrastruktur wird verbessert, die Migration angezogen und die Immobilienproduktion wird maximiert."
 
 institution_central_bank: "Zentralbank"
 institution_central_bank_desc: "Eine staatliche Geldbehörde, die die Geldversorgung verwaltet, Reserveanforderungen festlegt und Zinssätze kontrolliert. Jedes Investitionsniveau verschärft die Geldpolitik — die Förderung der kommerziellen Kreditproduktion, aber die Ausweitung der nationalen Schuldenobergrenze und die Erhöhung des Referenzzinssatzes. Die Zentralbank ist der Mechanismus, mit dem der Staat die direkte Kontrolle über das Finanzsystem ausübt."
 
 lawgroup_central_banking: "Zentralbanken"
 lawgroup_central_banking_desc: "Der Rechtsrahmen für das monetäre System von <x id========================================================================== Die Wahl des Bankenrahmens bestimmt, wie Kredite und Wertpapiere produziert werden und was der Staat ausleihen kann."
 
 law_no_central_bank: "Keine Zentralbank"
 law_no_central_bank_desc: "Es gibt keine zentrale Geldbehörde. Die Banken arbeiten unabhängig und setzen ihre eigenen Reservequoten und Darlehenspolitiken ein. Die Geldversorgung ist unkoordiniert und der Staat hat keinen Mechanismus zur Verwaltung von Zinsen oder Kreditbedingungen. Dies ist eine instabile Vereinbarung, von der die meisten modernen Volkswirtschaften weggegangen sind."
 
 law_fractional_reserve_banking: "fraktionierte Reservebanking"
 law_fractional_reserve_banking_desc: "Die Banken sind verpflichtet, nur einen Bruchteil ihrer Einlagen als Reserven zu halten und den Rest in die Wirtschaft zu überführen. Dies erweitert die Geldversorgung — Finanzbezirke produzieren mehr Wertpapiere als das multiplizierte Kapital fließt durch das System, aber die kommerzielle Kreditproduktion wird etwas durch die Hebelwirkung verdünnt. Dies ist die Standardanordnung für die meisten modernen Volkswirtschaften."
 
 law_full_reserve_banking: "Vollständige Reserve Banking"
 law_full_reserve_banking_desc: "Die Banken müssen 100 % der Einlagen als Reserven halten — keine fraktionierte Kreditvergabe. Das Institut der Zentralbank wird zur Verfügung gestellt, so dass der Staat die Geldpolitik direkt verwalten kann. Jedes Niveau der Investitionen der Zentralbank erhöht den Richtzinssatz um 1% und erhöht die maximale Kreditgrenze um 5%. Die Kreditproduktion von Geschäftsbanken ist stabiler. Die Wertpapierproduktion aus Finanzbezirken fällt, wenn die Hebelwirkung aus dem System entfernt wird."

 law_no_central_bank_modifier: "Keine Zentralbank"
 law_no_central_bank_modifier_desc: "Es gibt keine zentrale Geldbehörde. Das Geldangebot ist nicht verwaltet."
 
 law_fractional_reserve_banking_modifier: "fraktionierte Reservebanking"
 law_fractional_reserve_banking_modifier_desc: "Die fraktionierte Reservevergabe erweitert das Geldangebot. Die Wertpapierproduktion ist aufwärts; die kommerzielle Kreditproduktion wird durch den Hebeleffekt bescheiden reduziert."
 
 law_full_reserve_banking_modifier: "Vollständige Reserve Banking"
 law_full_reserve_banking_modifier_desc: "Volle Reserveanforderungen sind in Kraft. Die Kreditproduktion ist stabil und höher. Die Wertpapierproduktion wird reduziert. Das Institut der Zentralbank steht zur Verfügung, um Zinssätze und die nationale Schuldenobergrenze zu verwalten."
 
 institution_central_bank_modifier: "Zentralbank"
 institution_central_bank_modifier_desc: "Die Zentralbank ist aktiv und verwaltet die Geldpolitik. Jedes Investitionsniveau verschärft die Kreditversorgung, erhöht den Zinssatz um 1% und erhöht die maximale Kreditgrenze um 5%."
 
