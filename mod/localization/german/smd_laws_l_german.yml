l_german:
 law_jihad:0 "Dschihad"
 law_jihad_desc:0 "Jihadistische Militaristen haben ein deutlich religiöses Ziel in ihren Praktiken, Ausbildung und Organisation."
 law_mixed_healthcare:0 "Gemischtes Gesundheitssystem"
 law_mixed_healthcare_desc:0 "Die Gesundheit der Bevölkerung wird von privaten und staatlichen Krankenversicherungsplänen verwaltet. Die Regierungspläne werden unseren Niedrigeinkommensbürgern zur Lösung der Marktversagen der privaten Krankenversicherung angeboten."
 law_affirmative_action:0 "Affirmation Aktion"
 law_affirmative_action_desc:0 "Es wurden verschiedene Minderheitenschutze vorgeschrieben. Dazu gehören Zitate und verschiedene Systeme, um ihre Beteiligung an unserem derzeitigen System, Rechtsschutz und Geldmittel zu fördern."
 
 lawgroup_firearms:0 "Eigentümer von Feuerwaffen"
 lawgroup_firearms_desc:0 "Fragen zum Recht auf Tragen von Armen."
 
 lawgroup_abortions:0 "Abtreibung"
 lawgroup_abortions_desc:0 "Ob unsere Bürger Abtreibungen haben dürfen oder nicht."
 
 lawgroup_unions:0 "Union"
 lawgroup_unions_desc:0 "Es geht um die Fähigkeit unserer Arbeitnehmer, Gewerkschaften zu bilden."
 
 lawgroup_homosexuality:0 "Homosexualität"
 lawgroup_homosexuality_desc:0 "Fragen zur LGBTQ+-Bewegung in unserem Land."
 
 law_canton_system:0 "Isolierung"
 
 law_unrestricted_firearms:0 "Unbeschränkte Feuerwaffen"
 law_unrestricted_firearms_desc:0 "Unser Land ist Heimat einer großen Schusswaffenindustrie, die für zivile Zwecke reif ist."
 
 law_licensed_firearms:0 "Lizenzierte Feuerwaffen"
 law_licensed_firearms_desc:0 "Bürger benötigen eine Lizenz, um eine Waffe in unserem Land zu besitzen."
 
 law_banned_firearms:0 "Feuerwaffen verboten"
 law_banned_firearms_desc:0 "Der zivile Gebrauch von Schusswaffen ist streng verboten."
 
 law_banned_unions:0 "Verbotene Unionen"
 law_banned_unions_desc:0 "Die Arbeitnehmer dürfen sich nicht mit der Absicht vereinigen, die Leistungen am Arbeitsplatz zu erhalten."
 
 law_restricted_unions:0 "Eingeschränkte Union"
 law_restricted_unions_desc:0 "Arbeitnehmer können Gewerkschaften bilden, mit einigen Einschränkungen, um unsere Investoren zu schützen."
 
 law_unrestricted_unions:0 "Nichteinschränkte Unionen"
 law_unrestricted_unions_desc:0 "Die Arbeitnehmer werden in vollem Umfang dazu ermutigt, sich zu vereinigen und ihre Arbeit voll zu nutzen."
 
 law_banned_abortions:0 "Beschuldigte Abtreibungen"
 law_banned_abortions_desc:0 "Das Töten von Babys ist streng unter unseren Gesetzen verboten."
 
 law_restricted_abortion:0 "Eingeschränkte Abtreibungen"
 law_restricted_abortion_desc:0 "Die Bürger sind berechtigte Abtreibungen, wenn das Leben der Mutter bedroht ist, oder in Fällen von Vergewaltigung und Inzest."
 
 law_unrestricted_abortions:0 "Unbegrenzte Abtreibungen"
 law_unrestricted_abortions_desc:0 "Die Bürger können ihr Recht auf Abtreibung frei ausüben, wie es ihnen gefällt."
 
 law_active_oppression:0 "Aktive Unterdrückung"
 law_active_oppression_desc:0 "Bürger, die sich offen als Mitglieder der LGBTQ-Gemeinschaft identifizieren, werden unterdrückt, inhaftiert oder sogar getötet."
 
 law_restricted_lgbtq:0 "Kriminelle Homosexualität"
 law_restricted_lgbtq_desc:0 "Die Bürgerinnen und Bürger können vor der Gefängniszeit stehen, weil sie schwul sind."
 
 law_decriminalized_gays:0 "Entkriminalisierte Homosexualität"
 law_decriminalized_gays_desc:0 "Die Bürger dürfen selbstverständlich in homosexuelle Beziehungen hinter verschlossenen Türen eingreifen. Homosexuelle Beziehungen werden nicht vom Staat sanktioniert."
 
 law_gay_marriage:0 "Gleiche Ehe"
 law_gay_marriage_desc:0 "Der Staat ist verpflichtet, alle Arten von Ehen zu sanktionieren, unabhängig davon, ob die Initiatoren des gleichen Geschlechts sind."
 
  # immigration
  institution_immigration:0 "Immigration Controls"
  institution_immigration_desc:0 "A government body has been formed to curb or encourage immigration into our country as we see fit.
  # dei

  institution_diversity_equity_inclusion:0 "Diversity, Equity & Inclusion"
  institution_diversity_equity_inclusion_desc:0 "Eine Regierungsabteilung, die darauf abzielt, den benachteiligten Platz in der Gesellschaft zu geben."
  
  # spies
  
  institution_intelligence_agency:0 "Nachrichtenagentur"
  institution_intelligence_agency_desc:0 "Nachrichtenagenturen sind für verdeckte Operationen auf der ganzen Welt verantwortlich."
  
