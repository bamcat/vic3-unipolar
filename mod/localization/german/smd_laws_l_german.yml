  # New Laws Any Group
 law_equal_rights:0 "Gleiche Rechte"
 law_equal_rights_desc:0 "Frauen können erwarten, das gleiche Niveau der Rechte wie ihre männlichen Gegenparteien zu erleben."
 law_prison_slavery:0 "Gefängnis Sklaverei"
 law_prison_slavery_desc:0 "Gefangene und Verbrecher sind gezwungen, lange Stunden mit wenig bis ohne Bezahlung während ihres Satzes zu arbeiten."
 law_restricted_police:0 "Geschränkte Polizei"
 law_restricted_police_desc:0 "Die von der Polizei vorgelegte Macht wurde eingeschränkt und unterliegt strengen Vorschriften, um die Sicherheit der Bürger zu gewährleisten, die sie zum Schutz bereit sind."
 law_resettlement_enticement:0 "Wiedereingliederung"
 law_resettlement_enticement_desc:0 "Die Regierung verfügt über Programme, um Menschen zu verlocken, um in ihre Gebiete zu bewegen."
 
 # Rights of Minorities Group
 
 lawgroup_rights_of_minorities:0 "Rechte der Minderheiten"
 lawgroup_rights_of_minorities_desc:0 "Die gesetzlichen Vorschriften und Schutzmaßnahmen für Minderheiten."
 
 law_no_minority_rights:0 "Keine Minderheitsrechte"
 law_no_minority_rights_desc:0 "Minderheiten aller Arten werden nicht die gleichen Rechte wie die der allgemeinen Bevölkerung zurückerhalten."
 law_segregation:0 "Segregationsgesetze"
 law_segregation_desc:0 "Minoritäten werden Grad der Trennung von der allgemeinen Bevölkerung erleben, oft erhalten die Schrott & Reste."
 law_apartheid:0 "Gesetze der Apartheid"
 law_apartheid_desc:0 "Minderheiten werden nicht die gleiche Gesellschaft des allgemeinen Papstes erleben und werden oft entfernt oder (oft kraftvoll) in ein bestimmtes "Land" verlegt werden."
 law_unfulfilled_protections:0 "Unvollendete Schutzmaßnahmen"
 law_unfulfilled_protections_desc:0 "Der Staat hat Anstrengungen unternommen, um Hindernisse für Minderheiten zu beseitigen, aber die Gesetze über die Rechte von Minderheiten bleiben weitgehend unbefugt."
 law_limited_protections:0 "Begrenzte Schutzmaßnahmen"
 law_limited_protections_desc:0 "Minderheiten, die eine unterschiedliche Ethnizität oder Nationalität haben, werden viele der gleichen Rechte haben, die die allgemeine Bevölkerung genießt."
 law_encompassing_protections:0 "Schutzmaßnahmen"
 law_encompassing_protections_desc:0 "Minderheiten, die von einer anderen Ethnizität oder Nationalität sind, und diejenigen, die behindert sind, werden alle Rechte und Schutz, die die allgemeine Bevölkerung genießt."
 law_universal_protections:0 "Universalschutz"
 law_universal_protections_desc:0 "Alle Minderheiten, unabhängig von ihrer Ethnizität, Nationalität, Fähigkeit, Sexualität oder Geschlechtsidentität, werden die gleichen Rechte haben, die die allgemeine Bevölkerung genießt."
 
 # Union Laws Group
 
 lawgroup_union_laws:0 "Unionsrecht"
 lawgroup_union_laws_desc:0 "Die Disposition des Regierenden Körpers gegenüber Gewerkschaftsaktionen wie Streiks, Walkouts, Proteste, Ritus und sonst."
 law_unions_outlawed:0 "Verkündigte Einheit"
 law_unions_outlawed_desc:0 "Unionen sind in dieser Nation verboten und Täter werden einen schnellen Widerstand zurückhalten."
 law_useless_unions:0 "Nützliche Bürokratie"
 law_useless_unions_desc:0 "Gewerkschaften sind nichts anderes als Arbeiterbürokratie und mangelt an der Notwendigkeit, ohne äußere Kräfte zu funktionieren und zu kämpfen."
 law_limited_action:0 "Begrenzte Aktion"
 law_limited_action_desc:0 "Gewerkschaften sind stark eingeschränkt, was sie erreichen dürfen und müssen oft Rechtsschlupflöcher navigieren, um wirksam zu sein."
 law_craft_unions:0 "Handwerksverbände"
 law_craft_unions_desc:0 "Die Gewerkschaften sind auf ihre spezifischen Rollen beschränkt und werden daran gehindert, die Treue mit Gewerkschaften anderer Rollen zu schmieden."
 law_permitted_unions:0 "Zulässige Aktion"
 law_permitted_unions_desc:0 "Gewerkschaften sind weder legal noch illegal, sie können so funktionieren, wie sie sich wünschen, aber haben wenig bis keinen Schutz vor der Regierungsstelle."
 law_enterprise_unions:0 "Unternehmen"
 law_enterprise_unions_desc:0 "Die Gewerkschaften sind dabei, die Arbeitsleistung ihrer Mitarbeiter zu verbessern und sich auf die Bedürfnisse ihrer Mitglieder zu konzentrieren. Sie sind wirksam, um das Leben ihrer Mitglieder durch notwendige Mittel zu verbessern."
 law_backed_unions:0 "Backed Protections"
 law_backed_unions_desc:0 "Die Union wird von der Öffentlichkeit effektiv unterstützt und hat sich als Teil der Länderkultur zementiert. Sie haben Schutz durch die Menschen und erhalten Rechtsschutz gegen auffällige Handlungen."
 law_empowered_unions:0 "Unionsermächtigung"
 law_empowered_unions_desc:0 "Gewerkschaften werden durch die Polizei verstärkt und haben Regierungsunterstützung. Diese Gewerkschaften sind in der Lage, ihre Forderungen effektiv zu bekommen, und sind unter allen Umständen geschützt und betrogen."
 
 # Corporate Authority Group
 
 lawgroup_corporate_authority:0 "Unternehmen"
 lawgroup_corporate_authority:0 "Die gesetzlichen Vorschriften gegenüber den Konzernen und den absurd wohlhabenden, dies sind Regelungen ihrer politischen Macht und Kontrolle, die sie ausüben können."
 law_completely_unregulated:0 "Vollständig unreguliert"
 law_completely_unregulated_desc:0 "Die Handlungen der Konzerne und die Handlungen der absurd wohlhabenden sind in keiner Weise behindert. Oft zum Nachteil der dort lebenden Arbeiter und Menschen."
 law_political_lobbying:0 "Politische Lobbyarbeit"
 law_political_lobbying_desc:0 "Jeder mit einer großen Summe von Geldern kann die Regierung Lobby und Druck sie in wechselnde Gesetze zu ihren Gunsten."
 law_tax_haven:0 "Steuer Haven"
 law_tax_haven_desc:0 "Unternehmen und Einzelpersonen mit absurdem Reichtum werden als willkommen betrachtet und der regierende Körper hat Gesetze eingeführt, die sie mit weniger Steuern und mehr Land begünstigen."
 law_feign_ignorance:0 "Feigned Ignoranz"
 law_political_lobbying_desc:0 "Der regierende Körper entscheidet, so wenig wie möglich zu tun, um die Macht der Konzerne und die absurd wohlhabend zu begrenzen, indem er sich dafür entscheidet, so zu tun, als sei es kein Problem."
 law_limited_restrictions:0 "Begrenzte Einschränkung"
 law_limited_restrictions_desc:0 "Die Vermögenswerte der Konzerne & der absurd wohlhabenden werden besteuert, unabhängig davon, ob sie in Geld sind oder in Investitionen & Aktien gehalten werden."
 law_progressive_restrictions:0 "Progressive Einschränkung"
 law_progressive_restrictions_desc:0 "Alle Vermögenswerte der absurd wohlhabenden & alle Gewinne des Konzerns realisiert oder nicht, wird besteuert & verwendet, um die Bevölkerung zu einem progressiven Satz zu bessern."
 law_no_one_individual:0 "Keine Einzelperson"
 law_no_one_individual_desc:0 "Die absurd wohlhabenden sind auf das Steuersystem des regierenden Körpers zu achten, wenn sie dort Geschäfte machen wollen. Ihr Reichtum erzeugt, während im Land reduziert wird & wird an die Bevölkerung in Not verteilt."
 law_corporate_redistribution:0 "Corporate Redistribut"
 law_corporate_redistribution_desc:0 "Jeder Reichtum, der von den absurd wohlhabenden oder Konzernen erzeugt wird, wird auf den maximal zulässigen Betrag reduziert. Dieser Reichtum wird dann nach Bedarf umverteilt. Unternehmen werden an die Öffentlichkeit übergeben und bestehen aus einem Vorstand einschließlich gewählter Beamte"
 
 law_serfdom:0 "Unvollendete Arbeitsrechte"
 law_serfdom_desc:0 "Entweder gibt es keine etablierten Arbeitsrechte, oder die etablierten Arbeitsrechte sind völlig unbefugt."
 law_serfdom_banned:0 "Bare Mindestschutz"
 law_serfdom_banned_desc:0 "Das bloße Mindestmaß an Schutz wurde festgelegt."
 
 lawgroup_drug_regulations: "Drogenverordnungen"
 lawgroup_drug_regulations_desc: "Der Rechtsstatus von betrügerischen Stoffen — vom Verbot der vollständigen Legalisierung des Handels. Die Drogenpolitik prägt Mortalität, staatliche Autorität, Durchsetzungskosten und die Macht der landwirtschaftlichen und kriminellen Interessen."

 law_total_prohibition: "Verbot insgesamt"
 law_total_prohibition_desc: "Alle berauschenden Stoffe, einschließlich Alkohol und Tabak, sind gesetzlich verboten. Der Staat behauptet, die moralische Autorität zu regulieren, was die Bürger in ihren Körper stecken, unterstützt von religiösen und konservativen Institutionen. Schwarze Märkte, die in den Lücken durchgesetzt werden, können nicht ausfüllen."

 law_alcohol_tobacco_legal: "Alkohol &amp; Tabak Legal"
 law_alcohol_tobacco_legal_desc: "Alkohol und Tabak sind legal und besteuert. Alle anderen Stoffe bleiben verboten. Dies ist der grundlegende Rechtsrahmen für die meisten modernen Staaten – ein pragmatischer Kompromiss zwischen wirtschaftlichem Interesse und moralischem Konservatismus."

 law_marijuana_decriminalization: "Marihuana Dekriminalisierung"
 law_marijuana_decriminalization_desc: "Der persönliche Besitz und die Verwendung von Cannabis ist keine Straftat mehr. Handel bleibt illegal, aber die Durchsetzung wird auf härtere Substanzen umgeleitet. Die Politik spiegelt einen wachsenden Konsens wider, dass die Inhaftierung keine wirksame Reaktion auf den Drogenkonsum in der Freizeit ist."

 law_hard_drugs_decriminalized: "Schwere Drogendekriminalisierung"
 law_hard_drugs_decriminalized_desc: "Die Besessenheit aller kontrollierten Stoffe - einschließlich Opiaten, Kokain und Amphetaminen - wird als eine öffentliche Gesundheit und nicht als kriminelle behandelt. Benutzer werden auf die Behandlung anstatt auf die Strafverfolgung verwiesen. Die Politik ist kontrovers, aber die Beweise von frühen Adoptern legen nahe, dass sie die Überdosierung der Mortalität reduziert und die Durchsetzungsressourcen freisetzt."

 law_safe_injection_sites: "Sicherheits-Injektions-Sites"
 law_safe_injection_sites_desc: "Regierungsgeförderte Einrichtungen ermöglichen es Benutzern, Drogen unter medizinischer Aufsicht zu konsumieren. Das Personal kann überdosiertes Umkehrmedikament verabreichen und Benutzer mit Behandlungsprogrammen verbinden. Die Mortalitätsraten sinken deutlich. Religiöse und konservative Opposition ist heftig — die Politik wird als akzeptieren und sogar ermöglichen, Drogenkonsum gesehen."

 law_trafficking_allowed: "Verkehr erlaubt"
 law_trafficking_allowed_desc: "Der Handel mit kontrollierten Stoffen wird durch den Staat voll legalisiert und geregelt. Die wirtschaftlichen Vorteile sind unmittelbar und beträchtlich — die Drogeneinnahmen fließen in die formale Wirtschaft und die Steuerbasis. Die guten und sozialen Folgen sind schwer. Die meisten der Welt werden dies als Kapitulation für kriminelle Netzwerke betrachten."

