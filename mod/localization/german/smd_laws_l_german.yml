 lawgroup_media_regulations: "Medienregulationen"
 lawgroup_media_regulations_desc: "Der Rechtsrahmen für die Informationsumgebung von [ROOT.GetCountry.GetName] — von voll unregulierten Medien bis zur staatlich kontrollierten Kommunikationsinfrastruktur. Regelmäßigere Rahmen unterdrücken die Radikalisierung der politischen Bewegung und erhöhen die staatliche Autorität, während unregulierte Umgebungen die Bewegungen verstärken und den Einfluss der Regierung auf den Informationsraum schwächen."
 
 law_fully_unregulated_media: "Voll unreguliert"
 law_fully_unregulated_media_desc: "Es gibt keine Regulierung der Medien- oder Informationsumgebung. Nachrichten, Online-Plattformen und Kommunikationsnetze funktionieren ohne Regierungsaufsicht. Disinformation verbreitet sich frei. Politische Bewegungen blühen im Lärm. Der Staat hat keinen Mechanismus, um die Informationen zu formen oder zu verwalten, die seine Bürger verbrauchen, und keine Autorität, die von der Kontrolle abgeleitet ist."
 
 law_digital_rights: "Digitale Rechte"
 law_digital_rights_desc: "Grundlegende Rechtsschutze regeln das Informationsumfeld — Datenschutzgarantien, Anti-Censorship-Bestimmungen, Informationsfreiheit. Die Bürgerinnen und Bürger haben einen rechtlichen Rückgriff auf bestimmte Medienmissbrauch, aber der Informationsraum bleibt im Wesentlichen frei. Politische Bewegungen finden immer noch fruchtbare Böden. <x id=========================================="
 
 law_fairness_doctrine: "Fairness Doctrin"
 law_fairness_doctrine_desc: "Medienstellen sind gesetzlich verpflichtet, eine ausgewogene Abdeckung politischer Fragen zu präsentieren – Zeit und Raum für mehrere Perspektiven zu geben, anstatt nur eine Plattform. Die extremsten politischen Stimmen verlieren ihr Megaphon. Radikale Bewegung Rekrutierung wird gedämpft. Der Staat positioniert sich als fairer Schiedsrichter anstatt als Teilnehmer im Informationskrieg und gewinnt Autorität von der Rolle."
 
 law_government_content_moderators: "Regierung Inhalt Moderatoren"
 law_government_content_moderators_desc: "Der Staat moderiert Online-Inhalte aktiv – Beseitigung von Desinformation, extremistischem Material und Inhalt als schädlich oder destabilisierend. Politische Bewegungen verlieren beträchtliche Reichweite, da ihr effektivstes Personal unterdrückt wird. Die Behörde steigt. Die internationale Gemeinschaft und die einheimischen Kritiker der Pressefreiheit werden die Politik beachten und [ROOT.GetCountry.GetName]'s Prestige entsprechend leiden."
 
 law_state_wifi: "State WiFi"
 law_state_wifi_desc: "Der Staat betreibt die Kommunikationsinfrastruktur direkt. Internetzugang ist ein öffentliches Dienstprogramm, das vollständig im Besitz, betrieben und von der Regierung überwacht wird. Die Informationsumgebung ist eine staatliche Ressource — was Bürger lesen, beobachten und teilen durch Infrastruktur [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName]'s Regierungskontrollen. Die Radikalisierung der politischen Bewegung wird fast vollständig unterdrückt. Die Kosten, Finanzen und Reputation sind beträchtlich."
 
 law_fully_unregulated_media_modifier: "Volle ungeregelte Medien"
 law_fully_unregulated_media_modifier_desc: "Ein unübertroffenes Informationsumfeld verstärkt politische Bewegungen und schwächt die staatliche Autorität."
 
 law_digital_rights_modifier: "Digital Rights Framework"
 law_digital_rights_modifier_desc: "Grundlegende Rechtsschutze regeln das Informationsumfeld. Die politischen Bewegungen haben noch gedeihen, aber [ROOT.GetCountry.GetName] gewinnt von ihrer rechtlich respektierenden Haltung ein gewisses Ansehen."
 
 law_fairness_doctrine_modifier: "Fairness Doctrin"
 law_fairness_doctrine_modifier_desc: "Balanced Media Berichterstattung Anforderungen sind die Dämpfung radikaler Bewegung Rekrutierung und Verbesserung der staatlichen Legitimität."
 
 law_government_content_moderators_modifier: "Regierung Inhalt Moderation"
 law_government_content_moderators_modifier_desc: "Die Active State Content Moderation unterdrückt die Radikalisierung der politischen Bewegung erheblich, auf Kosten von Prestige und Legitimität."
 
 law_state_wifi_modifier: "staatlich kontrollierte Kommunikation"
 law_state_wifi_modifier_desc: "[ROOT.GetCountry.GetName] steuert die Kommunikationsinfrastruktur direkt an. Die Radikalisierung der politischen Bewegung wird nahezu unterdrückt. Die Behörde ist hoch. Der internationale Ruf leidet."
 
 institution_courts: "Gerichtshof"
 institution_courts_desc: "Eine förmliche Rechtsprechung, die durch etablierte Gerichte und Rechtsverfahren tätig ist. Jedes Investitionsniveau erweitert die Reichweite des Gerichtssystems – mehr Richter, mehr Gerichte, konsequentere Durchsetzung des Gesetzes. Turmoil fällt, da Streitigkeiten durch rechtliche Kanäle gelöst werden, wird die Gesetzesermittlung konsequenter, und revolutionäre Bewegungen finden den Rechtsapparat des Staates schwerer zu überwinden."
 
 lawgroup_judiciary: "Justiz"
 lawgroup_judiciary_desc: "Die Rechtsphilosophie, die unter dem Gerichtssystem <x id======================================================================== Die Wahl der Justiz formt Autorität, Legitimität, diplomatische Stellung und die Stabilität der sozialen Ordnung."
 
 law_inquisitive_judiciary: "Inquisition"
 law_inquisitive_judiciary_desc: "Der Staat untersucht, verfolgt und beurteilt — die Justiz ist ein Arm der Regierungsbehörde und nicht eine unabhängige Institution. Richter sind Agenten der Krone oder Regierung, die mit der Suche nach der Wahrheit und der Durchsetzung des Gesetzes im Auftrag des Staates beauftragt sind. Die Autorität ist hoch und die Umsetzung der Regierungspolitik ist glatter, aber der Prozess ist schwach und die Bevölkerung weiß es."
 
 law_customary_judiciary: "Zoll"
 law_customary_judiciary_desc: "Streitigkeiten werden durch traditionelle Gemeinschaftsnormen, Stammesräte, Ältere Schlichtung und lokale Gewohnheiten gelöst. Es gibt keine formellen Gerichte — die Gerechtigkeit wird von denen ausgeliefert, die die Gemeinschaft als ihre Behörden anerkennt, nach Regeln erkennt die Gemeinschaft als legitim an. Der Zustand ist in dieses System beschränkt. Gemeinschaften sind stabil, treu zu ihren Traditionen und beständig gegen äußere Störungen."
 
 law_religious_judiciary: "Religiöses Recht"
 law_religious_judiciary_desc: "Die Schrift, die religiöse Rechtsprechung und die Auslegungen der kirchlichen Behörden regeln das Gerichtsverfahren. Der Verteidiger gewinnt enorme politische Macht als Schiedsrichter dessen, was das Gesetz bedeutet und wie es gilt. Religiöse Legitimität verläuft tief unter den Gläubigen. Diejenigen außerhalb des Glaubens, die es anders interpretieren, können das System weniger begrüßen."
 
 law_restorative_judiciary: "Restaurierung"
 law_restorative_judiciary_desc: "Der Zweck der Gerechtigkeit ist nicht die Strafe, sondern die Wiederherstellung des Schadens, der den Opfern, der Rehabilitierung von Tätern und der Wiedereingliederung in die Gesellschaft geleistet wird. Gerichte konzentrieren sich auf Mediation, Versöhnung und Gemeinschaft Heilung. Turmoil fällt. Die Mortalität aus Konflikten nimmt ab. Loyalisten wachsen. Der Staat gibt eine gewisse Autorität im Austausch für eine Bevölkerung, die dem System vertraut, unter dem sie lebt."
 
 law_adversarial_judiciary: "Adversarial"
 law_adversarial_judiciary_desc: "Strafverfolgung und Verteidigungswettbewerb vor einem unabhängigen Richter oder Jury. Die Vermutung der Unschuld ist geschützt. Der Rechtsstand ist unabhängig von der sozialen Position gleich. Der Staat ist durch die gleichen Regeln wie seine Bürger gebunden. [ROOT.GetCountry.GetName]'s internationales Prestige steigt deutlich an. Die unabhängige Justiz erzwingt staatliche Maßnahmen, aber eine Regierung, die durch Gesetz eingeschränkt werden kann, ist eine der Bevölkerung vertrauen kann."
 
 law_inquisitive_judiciary_modifier: "Inquisitionelles Gericht"
 law_inquisitive_judiciary_modifier_desc: "Die Justiz fungiert als Arm der staatlichen Autorität. Die Umsetzung der Politik ist einfacher und die Turbulenzen werden unterdrückt, aber der Prozess ist schwach und der radikale Druckaufbau unter der Oberfläche ist real."
 
 law_customary_judiciary_modifier: "Zollrecht"
 law_customary_judiciary_modifier_desc: "Traditionelle Gemeinschaft Gerechtigkeit bietet tiefe Legitimität und soziale Stabilität. Die formale Autorität des Staates ist begrenzt, aber das Vertrauen der Bevölkerung in das System ist echt."
 
 law_religious_judiciary_modifier: "Religiöses Recht"
 law_religious_judiciary_modifier_desc: "Clerical Authority regelt das Gesetz. Die [ROOT.GetCountry.GetAdjective] devout halten enorme politische Macht. Die tiefe Loyalität unter den Gläubigen – und die zunehmende Reue unter den Äußeren."
 
 law_restorative_judiciary_modifier: "Restaurierte Gerechtigkeit"
 law_restorative_judiciary_modifier_desc: "Das Justizsystem konzentriert sich auf Rehabilitation und Versöhnung. Turmoil und Mortalität fallen, Loyalität wächst und [ROOT.GetCountry.GetName] gewinnt internationalen Respekt für seinen humanen Ansatz."
 
 law_adversarial_judiciary_modifier: "Schiedsrichter"
 law_adversarial_judiciary_modifier_desc: "Ein unabhängiges Gericht, das auf dem ordnungsgemäßen Verfahren und dem gleichen Stand vor dem Gesetz tätig ist. Legitimität und Prestige sind hoch. Die staatliche Behörde wird überprüft — aber diese Kontrolle macht das System glaubwürdig."
 
 institution_courts_modifier: "Justiz"
 institution_courts_modifier_desc: "Ein etabliertes gerichtliches Netzwerk reduziert die Turbulenzen, verbessert die Gesetzesermittlung und unterdrückt revolutionäre Dynamik. Jede zusätzliche Ebene erstreckt sich über die gerichtliche Reichweite weiter über [ROOT.GetCountry.GetName]."
 
 country_institution_cost_institution_courts_mult: "Kosten des Verfahrens"
 country_institution_courts_max_investment_add: "System Max Investment"
 country_institution_size_change_speed_institution_courts_mult: "Erweiterungsgeschwindigkeit des Systems"
 
 law_privatized_preschool_education:0 "Privater Vorschulunterricht"
 law_privatized_preschool_education_desc:0 "Die frühkindliche Bildung wird über einen geregelten Privatmarkt angeboten. Anbieter konkurrieren um die Registrierung, mit dem Zustand setzen Mindeststandards, aber die Lieferung an unabhängige Betreiber. Der Zugang hängt weitgehend vom Haushaltseinkommen ab, wobei die Subventionen einen Teil der Belastung für minderjährige Familien ausgleichen können."

 law_universal_childcare:0 "Universal Kinderbetreuung"
 law_universal_childcare_desc:0 "Der Staat garantiert eine erschwingliche Kinderbetreuung für alle Familien unabhängig vom Einkommen. Die öffentlich geförderten Einrichtungen sind bundesweit verfügbar, die Eltern befreien, an der Belegschaft teilzunehmen und sicherzustellen, dass die frühkindliche Entwicklung nicht auf die Mittel der Familie beschränkt ist."

 law_legal_protections:0 "Rechtsschutz"
 law_legal_protections_desc:0 "Der Staat hat die formale rechtliche Gleichheit zwischen Männern und Frauen kodifiziert, indem er Schutz vor Diskriminierung in Beschäftigung, Eigentum und öffentlichem Leben festlegt. Rechte, die zuvor gebräuchlich oder selektiv durchgesetzt wurden, werden nun von der Rechtskraft unterstützt."

 law_structural_egalitarianism:0 "Strukturelle Gleichheit"
 law_structural_egalitarianism_desc:0 "Die Regierung hat sich über die rechtliche Gleichheit hinaus bewegt, um die institutionellen Strukturen, die die Ungleichheit der Geschlechter beständig machen, aktiv zu zerlegen. Die Vertretung in den öffentlichen Ämtern, Berufen und öffentlichen Institutionen wird beauftragt, und der Staat nimmt eine aktive Rolle bei der Durchsetzung gleicher Ergebnisse und nicht nur gleicher Rechte."

 law_matriarchy:0 "Matriarchie"
 law_matriarchy_desc:0 "Frauen haben eine beherrschende Stellung in der politischen und sozialen Struktur des Landes. Frauen werden die überwiegende Mehrheit der Führungspositionen bilden."

 law_disability_cheques:0 "Schecks für Behinderte"
 law_disability_cheques_desc:0 "Der Staat leistet regelmäßig finanzielle Unterstützung für Bürger, die aufgrund von Behinderungen oder chronischer Krankheit nicht arbeiten können. Die Zahlungen werden über das Sozialversicherungsgerät verwaltet und sollen einen Mindeststandard des Lebens für Personen außerhalb der Belegschaft gewährleisten."

 law_student_coverage:0 "Mutterschaftsurlaub"
 law_student_coverage_desc:0 "Frauen werden für Schwangerschaften abgedeckt."

 law_universal_basic_income:0 "Universal Basic Einkommen"
 law_universal_basic_income_desc:0 "Jeder Bürger erhält eine bedingungslose regelmäßige Zahlung aus dem Staat, unabhängig vom Status der Beschäftigung oder der Mittel. Die Politik stellt ein grundlegendes Umdenken des Verhältnisses zwischen Arbeit, Wohlfahrt und wirtschaftlicher Beteiligung dar – die Gewährleistung eines Bodens, unter dem niemand fallen kann, während die Mindesterwartungen aller Arbeit erhöht werden."
 
 law_universal_college:0 "Universal College"
 law_universal_college_desc:0 "Der Staat garantiert den Zugang zu Hochschulbildung für alle Bürger unabhängig von Hintergrund oder Mitteln. Universitäten und Hochschulen werden öffentlich gefördert und ihre Plätze sind offen für Verdienste und nicht für Reichtum, wodurch eine gebildetere Arbeitskräfte und eine informiertere Bürgerschaft."

 education_laws.1.t:0 "Wer bezahlt den Abschluss?"
 education_laws.1.d:0 "Das Engagement für das universale College hat eine unmittelbare und zielgerichtete Frage von Finanzkonservativen ausgelöst: Wer wird dafür genau bezahlen? Die Förderung der Hochschulbildung für jeden Bürger, der sie sucht, stellt eine erhebliche Ausweitung der öffentlichen Ausgaben dar, und Gegner machen ihre Einwände laut. Die Regierung muss entscheiden, ob sie sich zur vollen öffentlichen Finanzierung verpflichtet oder ein Mittel-geprüftes Modell einführt, das die Belastung begrenzt."
 education_laws.1.f:0 "Die Frage, wer für Bildung zahlt, war schon immer wirklich eine Frage, wer für Bildung ist."
 education_laws.1.a:0 "Mittel für die vollständige öffentliche Finanzierung — Hochschulbildung ist ein öffentliches Gut."
 education_laws.1.b:0 "Einführung von Mittel-geprüften Subventionen — Fonds die Armen, nicht die Reichen."

 education_laws.2.t:0 "The Meritocracy Objection"
 education_laws.2.d:0 "Wohlhabende Interessen haben ihr bevorzugtes Argument gegen universales College gefunden: Standards. Wenn jeder anwesend sein kann, warnen sie, dann wird der Abschluss wertlos — Institutionen der wirklichen Exzellenz wird nach unten gezogen, um die untervorbereitet. Die Regierung muss zwischen der Verteidigung des universellen Zugangs zum Prinzip wählen oder ein Carveout bieten, das Elite-Institutionen neben dem öffentlichen System bewahrt."
 education_laws.2.f:0 "Jede Erweiterung des Zugangs wurde mit der gleichen Warnung über Standards erfüllt. Die Standards überleben immer."
 education_laws.2.a:0 "Verteidigen Sie den universellen Zugang — Exzellenz ist nicht die Erhaltung der wohlhabenden."
 education_laws.2.b:0 "Bewahren Sie Elite-Institute neben universellem Zugang."

 education_laws.3.t:0 "Die Intelligentsia spricht"
 education_laws.3.d:0 "Die akademische Gemeinschaft ist mit charakteristischer Überzeugung in die Debatte eingetreten. Universal College, sie argumentieren, ist nicht nur ein soziales Gut, sondern eine ökonomische Notwendigkeit - eine Nation, die die Hochschulbildung auf diejenigen beschränkt, die es leisten können, ist eine Nation, die bewusste Unwissenheit wählt. Die Regierung muss entscheiden, ob sie formal ihre Stimme in das Legislativargument einladen oder die Debatte streng politisch halten soll."
 education_laws.3.f:0 "Die Universität war immer dort, wo Gesellschaften entscheiden, welche Art von Zukunft sie wollen. Jetzt muss es entscheiden, wer es bauen darf."
 education_laws.3.a:0 "In die Debatte einladen — lassen Sie die Wissenschaftler das Argument führen."
 education_laws.3.b:0 "Es ist eine politische Entscheidung — Wissenschaften beraten, sie nicht regieren."

 education_college_fiscal_resistance:0 "Fiskaler Widerstand"
 education_college_fiscal_resistance_desc:0 "Fiskale Konservativen sind aktiv gegen die öffentlichen Kosten des Universal-Colleges, die den Enactment-Prozess abhalten und die Regierung zwingen, ihre Ausgabenverpflichtungen zu rechtfertigen."

 education_college_public_funded:0 "Öffentliche Mittelbindung"
 education_college_public_funded_desc:0 "Die Regierung hat sich verpflichtet, die vollen Kosten für die allgemeine Hochschulbildung zu absorbieren, wodurch die Einführungsdynamik zu erheblichen Kosten verstärkt wird."

 education_college_meritocracy_debate:0 "Meritocracy Debate Engaged"
 education_college_meritocracy_debate_desc:0 "Die Regierung hat öffentlich den universellen Zugang gegen Behauptungen verteidigt, dass sie die akademischen Standards verwässern und die Bedingungen der Umsetzungsdebatte verschieben wird."

 education_college_elite_carveout:0 "Elite Carveout Angebot"
 education_college_elite_carveout_desc:0 "Es wurde ein Carveout angeboten, der neben dem öffentlichen System Elite-Privateinrichtungen bewahrt und die Umsetzung verlangsamt, aber die wohlhabende Opposition reduziert."

 education_college_academic_endorsement:0 "Akademische Endpunkte"
 education_college_academic_endorsement_desc:0 "Die Intelligenz hat öffentlich das Universal-College unterstützt, wissenschaftliche Autorität vergeben und die Bemühungen um die Umsetzung organisiert."

 education_college_elites_rebuked:0 "Eliten Rebuked"
