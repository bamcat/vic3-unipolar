l_german:

  # Landowners IG Traits
 ig_trait_noblesse_oblige:0 "Noblesse Obligation"
 ig_trait_noblesse_oblige_desc:0 "Wir sind besser als das gemeinsame Volk, was bedeutet, dass wir für sie eine Pflicht haben. Ihre Versuche, Dinge für sich zu organisieren, sind selbstzerstörerisch und zum Scheitern verurteilt."
 ig_trait_family_ties:0 "Familienbindungen"
 ig_trait_family_ties_desc:0 "In diesen wechselnden Zeiten kennen wir immer noch den Wert einer guten Ehe. Unsere Verbindungen sind älter als die Grenzen, die sie übertreffen und werden sowohl Allianzen als auch Regierungen überstehen."
 ig_trait_noble_privileges:0 "Noble Privilegien"
 ig_trait_noble_privileges_desc:0 "Was geschah mit der Idee, dass der Adel gelassen werden sollte, um seine Aufgaben zu erfüllen, ohne von Steuersammlern gehoert zu werden? Es ist an der Zeit, diese Tage zurückzubringen."
 ig_trait_profitable_estates: "Profitable Estates"
 ig_trait_profitable_estates_desc: "Wussten Sie das nicht? Was gut für die Adel ist, ist gut für die Nation – Wohlstand kniffelt."
 ig_trait_the_velvet_book: "Das Buch Velvet"
 ig_trait_the_velvet_book_desc: "Nur die augustreichsten Familien können ihre Namen in diesem ehrwürdigen Buch ätzen. Wir wissen, wer gehört und wer nicht."
 ig_trait_bad_boyars: "Bad Boyars"
 ig_trait_bad_boyars_desc: "Also wollen sie sagen, dass der gute Zar des Landes von seinen bösen Knaben gefehlt wird? Oh, wir können ihnen zeigen, wozu böse Boyars fähig sind."
 ig_trait_latifundios: "Latifúndios"
 ig_trait_latifundios_desc: "Die Produktivität und der Reichtum unserer Immobilien ist unvergleichlich. Geld fließt durch unsere Hände wie Wasser durch Stromschnellen. Wahrlich, das sind goldene Tage für uns alle."
 ig_trait_junkerdom: "Junkerium"
 ig_trait_junkerdom_desc: "Unsere Macht kommt aus unserem Land, und unsere Länder sind mächtige Länder. Was auch immer wir beschlossen haben, das Volk wird folgen."
 ig_trait_patrician_philanthropy: "Patricia Philanthrop"
 ig_trait_patrician_philanthropy_desc: "Es ist höchste Zeit, dass wir etwas für unseren Mitmenschen getan haben – und dafür sorgten, dass unsere Namen auf alles verkörpert wurden, was am Ende steht, natürlich."
 ig_trait_wiener_walzer: "Wiener Walzer"
 ig_trait_wiener_walzer_desc: "Jemand hatte den Nerv am letzten Ball, um nach einer Münzstätte zu fragen. Meine Liebe, wir machen Walzer! Wir setzen das modische, und es ist #italic nicht#! das Minuet!"
 ig_trait_fazenda_ibicaba: "In den Warenkorb"
 ig_trait_fazenda_ibicaba_desc: "Manpower ist ein ständiges Problem für unsere Unternehmen, und so müssen wir jeden Weg verfolgen, der möglich ist, um die Arbeit zu erhalten, die wir brauchen."
 ig_trait_summon_no_zamindars: "Summon No Zamindars"
 ig_trait_summon_no_zamindars_desc: "Die Herrscher unseres Landes haben gezeigt, dass sie kein Interesse an Verhandlungen oder Flexibilität haben. Wenn das so ist, dann sollten sie die subtileren Dinge nicht verpassen, die wir tun, um Ordnung zu halten."
 ig_trait_famine_reserves: "Hungerreserven"
 ig_trait_famine_reserves_desc: "Es ist unsere Pflicht, unsere Getreidelager zu öffnen, wenn ein dringender Bedarf entsteht. Welchen besseren Weg gibt es, den guten Willen unserer Mieter zu erwerben?"

  # Industrialists IG Traits
 ig_trait_job_creators:0 "Job Creators"
 ig_trait_job_creators_desc:0 "Man muss Geld ausgeben, um Geld zu verdienen. Solange man der Regierung vertrauen kann, dass sie unsere Investitionen nicht einschränken kann, gibt es nirgendwo unsere Gewinne als auf das Wirtschaftswachstum hin."
 ig_trait_engines_of_progress:0 "Motoren des Fortschritts"
 ig_trait_engines_of_progress_desc:0 "Siehe die Wunder des modernen Zeitalters! Es gibt keine Zeit für Zögern. Wenn es gedacht, entworfen und patentiert werden kann, sollte es gebaut, getestet und sofort verwendet werden."
 ig_trait_tax_avoidance:0 "Steuervermeidung"
 ig_trait_tax_avoidance_desc:0 "Wer weiß, wo unser Geld ausgegeben werden soll? Nicht die Regierung, und sicherlich nicht die aktuelle. Glücklicherweise hat ihre Inkompetenz Steuerschleifen hinterlassen, die gut genutzt werden können."
 ig_trait_zaibatsu_cooperation: "Zaibatsu Zusammenarbeit"
 ig_trait_zaibatsu_cooperation_desc: "Eine gesunde Beziehung zwischen Industrie und Regierung profitiert jedem. Es liegt in unseren beiden Interessen, dafür zu sorgen, dass dieser amüsante Zustand weitergeht."
 ig_trait_zaibatsu_withdrawal: "Zaibatsu Rücknahme"
 ig_trait_zaibatsu_withdrawal_desc: "Unsere finanzielle Gesundheit würde am meisten durch eine Neuorientierung auf Währungsspekulation und interne Reinvestition profitieren. Der öffentliche Handel ist leider für die Regierung nicht gerade eine Priorität."
 ig_trait_kommerskollegium: "Kommerskolleg"
 ig_trait_kommerskollegium_desc: "Es drängt uns, wie die Größe unserer kommerziellen Interessen weiter wächst, um sicherzustellen, dass der verdiente Reichtum gerecht verwaltet wird."
 ig_trait_ventilate_unify_beautify: "Lüftung, Unify und Verschönerung"
 ig_trait_ventilate_unify_beautify_desc: "Hast du gesehen, wie es da draußen ist? Es ist eine Werkstatt der Krankheit, ein Ort, wo die Sonne nie leuchtet, wo Pflanzen flüstern und verderben, und wo Elend und Pest in Konzert arbeiten. Es fällt uns natürlich an, dieses Chaos zu beheben."
 ig_trait_the_goods_must_flow: "Die Güter müssen fließen"
 ig_trait_the_goods_must_flow_desc: "Es ist alles gut und gut, so viel wie unsere Nation zu produzieren, aber was ist es, wenn es nicht die Märkte erreichen kann, an denen sie verkauft werden muss? Jetzt ist die Zeit, um sicherzustellen, dass das Land versteht, wie notwendig guter Transport ist."
 ig_trait_wounded_honor: "Verwundete Ehre"
 ig_trait_wounded_honor_desc: "Wir sind ein aufgeklärtes paar in einem Land, das jeder Erleuchtung widersteht. Unsere Methoden sind überlegen – jede Störung ist ein Verrat, und Verrat muss mit der härtesten Sanktion erfüllt werden."
 ig_trait_stamped_and_signed: "Gestempelt und signiert"
 ig_trait_stamped_and_signed_desc: "Briefmarken und Leisten sind die Methoden, die wir verwenden, um Ordnung aus Chaos zu schaffen. Die Regierungsführung Indiens erfordert ein Papiermeer, und es ist unsere Aufgabe, sicherzustellen, dass es lückenlos zirkuliert."
 ig_trait_responsible_government: "Verantwortliche Governance"
 ig_trait_responsible_government_desc: "Unsere Mission ist es, Gerechtigkeit und Zivilisation auf alle Menschen auszudehnen – und natürlich, um die Herrschaft zu verewigen, die dies für immer mehr erlaubt."

  # Armed Forces IG Traits
 ig_trait_patriotic_fervor:0 "Patriotischer Fervor"
 ig_trait_patriotic_fervor_desc:0 "Egal wie brillant die Strategie und wie fortgeschritten die Waffen, einige Kämpfe können nur mit harter Arbeit und Darm gewonnen werden. Soldaten, die wirklich daran glauben, wofür ihr Land steht, werden trotz der Chancen mutig kämpfen."
 ig_trait_veteran_consultation:0 "Veteranische Beratung"
 ig_trait_veteran_consultation_desc:0 "Technologische Fortschritte verändern das Antlitz des Krieges, aber wir können sie nur nutzen, wenn wir verstehen, wie. Glücklicherweise sollten die von uns mit Erfahrung aus erster Hand eine Idee haben."
 ig_trait_materiel_waste:0 "Was ist das?"
 ig_trait_materiel_waste_desc:0 "Loyalität gegenüber der Nation ist nicht Loyalität gegenüber der Regierung. Wenn wir den Verantwortlichen nicht vertrauen können, können wir auch das benutzen, was wir bekommen, wie wir es sehen."
 ig_trait_elan_vital: "Elan Vital"
 ig_trait_elan_vital_desc: "Während die neuesten Arme und Armeen alle gut und gut sind, hängt der Weg zum Sieg von einem treibenden Geist ab, der sich nicht im Angesicht der Not beugen wird. Soldaten, die wirklich an das glauben, wofür die Nation steht, werden mutig voranschreiten, unabhängig von den Chancen."
 ig_trait_newly_created_army: "New-Created Army"
 ig_trait_newly_created_army_desc: "Das Herz einer modernen Armee liegt nicht in den neuesten Gewehren oder den feinsten Uniformen, sondern in Organisation und Logistik. Um jeden Soldaten zu versorgen, den Fluss der Munition und Rationen regelmäßig und zuverlässig zu halten, um sicherzustellen, dass jeder Mann seine Rolle in der riesigen militärischen Maschine kennt – das ist, wie eine Armee etwas wert zu machen."
 ig_trait_self_strengthening: "Selbstverstärkung"
 ig_trait_self_strengthening_desc: "Unsere Intelligenz und Weisheit sind notwendigerweise denen überlegen, die uns umgeben. Was wir also aus dem Ausland lernen müssen, ist nur eine Sache: solide Schiffe und effektive Waffen."
 ig_trait_parochial_leadership: "Parochial Leadership"
 ig_trait_parochial_leadership_desc: "In diesen dunklen Zeiten ist es jeder Mann für sich selbst, und jede Provinz muss auf ihr eigenes Wohl in erster Linie schauen. Es ist unangemessen zu erwarten, dass jeder Offizier enthusiastisch weit von zu Hause weg führt, wenn sein eigenes Herz unter Bedrohung sein könnte."
 ig_trait_el_buen_jefe: "El Buen Jefe"
 ig_trait_el_buen_jefe_desc: "Was jeder gute Soldaten braucht, ist ein guter Offizier, um ihn zu führen. In diesen Zeiten ist das, was die ganze Nation braucht, ein guter Offizier."
 ig_trait_clube_militar: "Club Militar"
 ig_trait_clube_militar_desc: "Ein Ort, wo Offiziere und Soldaten wie wir in ihrer Freizeit ruhen, entspannen und organisieren können, ist sicher, harmlos zu sein. Wenn überhaupt, ein Ort, wo wir alle reden und planen können, kann dem Land etwas Gutes dienen."
 ig_trait_coronelismo: "Coronelismo"
 ig_trait_coronelismo_desc: "Hast du das letzte Dekret der Regierung gesehen? Wissen sie nicht, mit wem sie es zu tun haben? Ein dekorierter Gentleman wie ich, mit all meinen Männern und Nachkommen, ist nicht zu triflieren!"
 ig_trait_divided_ranks: "Geteilte Ranks"
 ig_trait_divided_ranks_desc: "Es gibt einen Grundriss zwischen unseren Soldaten und unseren Offizieren, der zu weit gewachsen ist, um zu ignorieren. Warum sollte ein Mann sein Leben auf die Linie für jemanden setzen, der seine Sitten mit Verachtung behandelt?"
 ig_trait_imperial_service: "Kaiserlicher Service"
 ig_trait_imperial_service_desc: "Um unsere Uniform zu tragen und unsere Grenze zu erweitern, ist eine große Ehre, die Millionen anstreben. Es ist für sie Glück, dass es immer Positionen zu füllen."
 ig_trait_veerta: "Gemüse"
 ig_trait_veerta_desc: "Unseres ist die Armee, die ganz Indien erobert und einen unaufhörlichen Siegestrom gegen alle Feinde produziert. Unsere Tapferkeit und Disziplin sorgen dafür, dass diese Rolle der Ehre niemals zum Ende kommt."

  # Rural Folk IG Traits
 ig_trait_farmers_markets:0 "Bauernmärkte"
 ig_trait_farmers_markets_desc:0 "Die Waren zu bekommen, die wir den Menschen, die sie brauchen, produzieren, scheint heutzutage eine große Sorge zu sein. Unter guten Umständen sind wir in der Lage, sie zu bekommen, wo sie selbst sein müssen."
 ig_trait_honest_work:0 "Honest Work"
 ig_trait_honest_work_desc:0 "Wir machen unser Leben mit ehrlicher Arbeit und ehrlichem Schweiß. Wenn das bedeutet, dass wir mehr produzieren als wir brauchen, so viel besser."
 ig_trait_old_ways:0 "Alte Wege"
 ig_trait_old_ways_desc:0 "Diese Leute, die das Land führen, scheinen alle möglichen Ideen zu haben, wie die Zukunft aussehen sollte. Warum sollten wir ihnen vertrauen, wenn sie die sind, die das Geschenk gemacht haben, was es ist?"
 ig_trait_obshchina: "Obshchina"
 ig_trait_obshchina_desc: "Das Leben in unserem kleinen Dorf ist nicht so schlimm. Die Aufteilung der Arbeit zwischen uns allen ist einfach, und die Verbreitung um die Produkte und Gewinne doppelt so."
 ig_trait_fellahin: "Fellahin"
 ig_trait_fellahin_desc: "Unsere Menge im Leben ist, diese Felder so gut wie möglich zu arbeiten. Manchmal zahlt sich unsere Arbeit tatsächlich für uns aus."
 ig_trait_nucleos_coloniais: "Núcleos Coloniais"
 ig_trait_nucleos_coloniais_desc: "Ein neues Zuhause bedeutet einen neuen Lebensanfang. Was soll das nicht lieben? Komm, wir sehen, was diese neue Siedlung zu bieten hat."
 ig_trait_plantation_work: "Pflanzwerk"
 ig_trait_plantation_work_desc: "Wir arbeiten harten Tag für Tag und bekommen, was wir brauchen, um vorbei zu kommen. Einige Tage, aber wir bekommen mehr als das, und wir schätzen diese Tage."
 ig_trait_of_the_sovereign_alone: "Von der Souveränen Einsamkeit"
 ig_trait_of_the_sovereign_alone_desc: "Die Last, die uns von denen, die das Land besitzen, auferlegt wird, ist unerträglich. Diese Vermittler müssen daran erinnert werden, dass wir allein an den Souverän sind, und sie haben keine rechtmäßige Macht über uns."
 ig_trait_imandari: "Imandari"
 ig_trait_imandari_desc: "Unser Land ist eine wohlhabende und wir arbeiten es mit Sorgfalt. In guten Zeiten können wir produzieren, was wir brauchen und mehr."
 ig_trait_bazaar_bargains: "Bazaar Bargains"
 ig_trait_bazaar_bargains_desc: "Es sind unsere Basaren, die unsere Städte bereichern und Besucher aus Meilen umherziehen. Wenn Wohlstand eine zusätzliche Organisation erfordert, sind wir bereit zu zahlen."

  # Trade Unions IG Traits
 ig_trait_solidarity:0 "Solidarität"
 ig_trait_solidarity_desc:0 "Alle, die Arbeit wollen, sollten Arbeit haben! Niemand wird ausgeschlossen oder ausgelassen. Wir müssen uns gegenseitig das Recht unterstützen, die Arbeit fair zu kompensieren."
 ig_trait_industrial_organizers:0 "Industrielle Organizer"
 ig_trait_industrial_organizers_desc:0 "Unabhängig davon, wer verantwortlich ist, hat die Art und Weise, wie die Arbeitnehmer letztlich zusammenarbeiten, einen größeren Einfluss darauf, wie gut eine Fabrik funktioniert, als alle Regeln, die von oben aufgegeben werden."
 ig_trait_work_to_rule:0 "Arbeitsunfälle"
 ig_trait_work_to_rule_desc:0 "Es scheint, als ob die Verantwortlichen wollen, dass wir einfach die Klappe halten und tun, was wir gesagt haben, anstatt für uns selbst zu denken. Mal sehen, wie sie es mögen, wenn wir diese Philosophie tatsächlich auf unsere 'unskilled' Arbeit anwenden."
 ig_trait_bourse_du_travail: "Bourse du Travail"
 ig_trait_bourse_du_travail_desc: "Organisation endet nicht am Ende des Arbeitstages! Eine vereinigte Front erfordert die gegenseitige Hilfe nicht nur auf dem Fabrikboden, sondern auch in unseren Häusern und Gemeinden."

  # Intelligentsia IG Traits
 ig_trait_propagandists:0 "Propagandisten"
 ig_trait_propagandists_desc:0 "In unserer Poesie, unseren Briefen und unserem politischen Manifest müssen wir vor allem die Fortschritte in unserem Heimatland als ein Beispiel dafür aufrecht erhalten, was dieses neue Zeitalter zu weniger glücklichen Teilen der Welt bringen muss."
 ig_trait_avant_garde:0 "Avantgarde"
 ig_trait_avant_garde_desc:0 "Was andere nicht einmal denken, werden wir schon laut reden. Unsere Kunst und Ideen werden direkt zu Herzen schneiden und offene Augen drängen, wenn nicht in Erstaunen, dann in Schock!"
 ig_trait_social_criticism:0 "Sozialkritik"
 ig_trait_social_criticism_desc:0 "Menschen in der Macht denken oft, dass sie über Vorwürfe hinaus sind, aber Autorität macht nicht jemand Ideen interessant. Wir haben viele interessante Dinge zu sagen, und wir wissen genau, wer sie zu sagen hat."
 ig_trait_restoration: "Restaurierung"
 ig_trait_restoration_desc: "In dieser Ära großer Herausforderungen und großer Errungenschaften sind wir stolz darauf, dass wir die Nation wieder in ihre alte Größe bringen. Außerordentliche Arbeit hat den Status unserer Zivilisation bestätigt, und außergewöhnliche Arbeit wird es zu noch größeren Höhen bringen."
 ig_trait_crisis_of_identity: "Identitätskrise"
 ig_trait_crisis_of_identity_desc: "Die Nation, die wir dienen, darf nicht die Nation sein, die wir wirklich sind. Wie viel haben wir wirklich gemeinsam mit den Verantwortlichen?"
 ig_trait_les_beaux_arts: "Les Beaux-Arts"
 ig_trait_les_beaux_arts_desc: "Unsere Kunst, unsere Ausstellungen und unser kreatives Talent sind keinesfalls. Warum sollten wir nicht auftauchen? Wir verdienen es, andere eifersüchtig zu machen."
 ig_trait_brasilidade: "Brasilidad"
 ig_trait_brasilidade_desc: "Komm, Freund, wir feiern heute Abend! Hier drüben können wir die schönsten Balladen unter dem Sternenlicht mit einer Flasche in unseren Händen und darüber hören – siehe, was er schon malt! Ist das nicht das Leben?"
 ig_trait_bachareis: "In den Warenkorb"
 ig_trait_bachareis_desc: "Wir wissen, was die Nation braucht! Schließlich sprechen wir für das Volk – was? Nein, wir haben nicht gesagt, wir sprechen #italicx id=1/> die Menschen."
 ig_trait_swaraj: "Swaraj"
 ig_trait_swaraj_desc: "Wir finden uns beide entfremdet vom Staat und versklavt. Unsere Herrscher leugnen uns Agentur, während wir unseren undenkenden Service fordern. Eine solche Sache ist zum Scheitern verurteilt – und wenn nötig werden wir daran arbeiten, dafür zu sorgen, dass sie es tut."
 ig_trait_westernisation: "Westliche"
 ig_trait_westernisation_desc: "Unsere gegenwärtige Regierung dient als Vertreter der Gerechtigkeit und des Fortschritts, doch bleibt viel von unserem Land entfernt. Wir müssen versuchen, die Trennung zwischen Staat und Menschen zu reduzieren."

  # Petite-Bourgeoisie IG Traits
 ig_trait_treasury_bonds:0 "Schuldverschreibungen"
 ig_trait_treasury_bonds_desc:0 "Solange die Regierung vertrauen kann, ihre Schulden zu zahlen, unsere hart verdienten Einsparungen gegenüber der Finanzierung dieser großen Nation ist nicht nur patriotisch, sondern eine gute Investition."
 ig_trait_middle_managers:0 "Mittlere Manager"
 ig_trait_middle_managers_desc:0 "Wir können nicht alle alles durch das Buch machen, aber wir können zumindest behalten, was auf den Büchern getan wird. Jemand muss sich an den richtigen Weg erinnern, Dinge hier zu tun."
 ig_trait_xenophobia:0 "Xenophob"
 ig_trait_xenophobia_desc:0 "Wir alle wissen, wer für den Zustand unseres Landes verantwortlich ist, die Leute haben nur Angst, es zu sagen. In der Zwischenzeit lachen sie hinter unserem Rücken, mit dem wir sie entkommen lassen. Jemand muss handeln."
 ig_trait_bergsbrukens_valdistrikten: "Bergsbrukens Valdistrikt"
 ig_trait_bergsbrukens_valdistrikten_desc: "Die enge Zusammenarbeit zwischen Bergbau-Interessen und Burger-Nachlass bedeutet, dass wir in besseren Zeiten sicherstellen können, dass der Staat eine Art Unterstützung erhält, von anderen Ländern nur träumen kann."
 ig_trait_effendi: "Effendi"
 ig_trait_effendi_desc: "Durch ernsthafte Gewohnheiten und ehrliche Mittel sind wir auf die Spitze gestiegen, und unsere Bemühungen sind zu Recht von allen gelobt."
 ig_trait_reorganization: "Reorganisation"
 ig_trait_reorganization_desc: "Wir wissen, dass wir mit den richtigen Mandaten und Abteilungen so viel reformieren. Sagen Sie einfach das Wort, und wir werden anfangen."
 ig_trait_master_of_the_house: "Meister des Hauses"
 ig_trait_master_of_the_house_desc: "Bitte! Setz dich. Wir streben hier eine Verfeinerung an – Diener für die Armen zu sein, Butler für die großen, Troster und Philosophen für die Nation."
 ig_trait_haute_finance: "Haute Finance"
 ig_trait_haute_finance_desc: "Im Spiel der kontinentalen Finanzen wollen wir die Sieger sein, indem wir der Erste sind, der unsere Hand spielt."
 ig_trait_old_lady_of_threadneedle_street: "Die alte Dame von Threadneedle Street"
 ig_trait_old_lady_of_threadneedle_street_desc: "Wenn die Nation Hilfe braucht, gibt es eine alte Dame um die prudent ist, sicher und kann immer in einer Krise verwandelt werden: die Bank of England."
 ig_trait_civil_service: "Zivildienst"
 ig_trait_civil_service_desc: "Die Leute haben lustige Ideen über Beamte. Wir sind hier, um Ihnen bei der Formulierung und Umsetzung Ihrer Richtlinien zu helfen."
 ig_trait_bah_humbug: "Bahamas"
 ig_trait_bah_humbug_desc: "Die Armen und Vergnügungen wollen, sagen Sie. Gibt es keine Gefängnisse? Sind die Arbeitsplätze noch in Betrieb? Dann lass mich in Ruhe! Die, die schlecht weg sind, müssen dorthin."
 ig_trait_swadesh: "Vietnam"
 ig_trait_swadesh_desc: "Wir sind so fleißig wie alle anderen Menschen, aber wir sind verleugnet Kredit und gezwungen, von ausländischen Unternehmen in Rechnung zu stellen. Wenn unsere Herrscher uns von der Wirtschaft ausschließen wollen, werden wir dasselbe tun."
 ig_trait_lines_of_credit: "Kreditlinien"
 ig_trait_lines_of_credit_desc: "Wäre es nicht für Kredit von unseren eigenen adept financiers, das Unternehmen hätte nie Indien erobert. Wenn wir einen soliden Geschäftsfall erhalten, sind wir bereit, diese Beziehung fortzusetzen."
 ig_trait_cooperative_agencies: "Genossenschaften"
 ig_trait_cooperative_agencies_desc: "Unsere Herrscher besitzen reichlich Kapital, haben aber wenig Wissen über unser Land. Durch die Bündelung ihrer Ressourcen und unserer Expertise können wir unsere Heimat weit mehr bereichern, als sie jemals allein wären."

  # Devout IG Traits
 ig_trait_be_fruitful_and_multiply:0 "Seien Sie fruchtbar und vielseitig"
 ig_trait_be_fruitful_and_multiply_desc:0 "Der Asketentum ist gut für die wenigen, die ihr Leben den spirituellen Verfolgungen widmen, aber im gemeinsamen Volk sind die wichtigsten Werte, um zu instillieren, diejenigen, eine Familie zu bauen und für Kinder zu sorgen."
 ig_trait_divine_right:0 "Göttliche Rechte"
 ig_trait_divine_right_desc:0 "Wir glauben, dass es einen Befehl zu unserem Leben gibt. Die Gesellschaft kann diese Ordnung besser oder schlechter reflektieren. Solange die Herrscher tugendhaft und ihre Dekrete sind, können wir sicherstellen, dass die Menschen wissen, warum."
 ig_trait_pious_fiction:0 "Gefährliche Fiktion"
 ig_trait_pious_fiction_desc:0 "Die Werte von heute sind so vergiftet und die Literatur so korrumpiert, dass Bildung selbst eine erodierende Wirkung auf die Moral hat. Besser als Menschen zu lehren, was auch immer die gegenwärtige Einrichtung für "wahr" hält, ist, ihnen beizubringen, was wahr sein sollte."
 ig_trait_work_ethic: "Arbeit Ethik"
 ig_trait_work_ethic_desc: "Denken Sie daran, Geld hat eine erzeugende Natur. Geld beget Geld; die Produktion von Profiten ist ein Akt der Schöpfung, eine Ehre und Verherrlichung der eigenen Arbeit Gottes."
 ig_trait_asceticism: "Asceten"
 ig_trait_asceticism_desc: "Die Freuden dieser Welt zu bewahren, ist der richtige Weg. Lassen Sie sich nicht zu durch materielle Veränderungen beunruhigt sein; auch diese werden passieren."
 ig_trait_kar_seva: "Kar Seva"
 ig_trait_kar_seva_desc: "Gott ist bei uns und unter uns. Selbstlos anderen zu dienen, ist es dann, Gottes Schöpfung zu dienen und Gott zu dienen. Es ermutigt uns alle, sich in ehrliche Arbeit zu engagieren und die Früchte dieser Arbeit mit anderen zu teilen, und auf diese Weise näher an Gott zu sein."
 ig_trait_temporal_mandate: "Vorübergehendes Mandat"
 ig_trait_temporal_mandate_desc: "Die Linie zwischen Himmel und Erde ist oft verschwommen; so ist auch die Linie zwischen Glauben und Regierung. Es braucht alle Arten, um die weltliche Welt zu verwalten – wir können immer Wege finden, um unsere Systeme zusammenzuarbeiten."
 ig_trait_the_best_revenge: "Die beste Rache"
 ig_trait_the_best_revenge_desc: "Wenn Sie Rache gegen Ihren Feind nehmen wollen, erwerben Sie mehr gute Qualitäten und gehen auf dem Weg der Gerechtigkeit. Dabei wirst du unweigerlich Rache gegen deinen Feind nehmen, denn er wird über deine guten Qualitäten beunruhigt sein, und er wird über deinen guten Ruf betrübt werden."
 ig_trait_yeshivot: "Jahivot"
 ig_trait_yeshivot_desc: "Das Studium der Sifrut Chazal ist eine Hauptaufgabe jeder Jugend. Wenn niemand zur Schule ging, wie konnten unsere Gesetze erinnert und aufbewahrt werden?"
 ig_trait_traditsye: "Traditsy"
 ig_trait_traditsye_desc: "Die Welt verändert sich schnell um uns herum. Wie sollen wir unser Gleichgewicht beibehalten, wenn wir nach diesem unwissenden Wirbelwind des Wandels eilen?"
 ig_trait_heavenly_sovereign: "Himmelreich"
 ig_trait_heavenly_sovereign_desc: "Die Erben von Kaiser Jimmu haben zu einer der ehrwürdigsten Institutionen auf Erden neigt. Diese Traditionsschrift verdient zu Recht Verehrung, und als Nation sollten wir das anerkennen."
 ig_trait_secular_shrine_theory: "Secular Shrine Theory"
 ig_trait_secular_shrine_theory_desc: "Schreine sind ein inhärenter Glaube des japanischen Volkes; sie existieren institutiv zum Zweck öffentlicher Rituale des Staates. Shintoismus ist ideologisch: Es ist ein Ausdruck des Patriotismus, den wir von jedem Bürger erwarten."
 ig_trait_haibutsu_kishaku: "Haibutsu Kishaku"
 ig_trait_haibutsu_kishaku_desc: "Ausländische Religionen müssen von der Nation abgeschafft und ihre Figuren zerstört werden. Sieh dir an, was sie verursacht haben! Gehe in ihre Heiligtümer, ihre Tempel, ihre Scharen und zeige ihnen, dass sie hier keinen Platz haben!"
 ig_trait_da_wat: "Dawt"
 ig_trait_da_wat_desc: "Wir müssen hinausgehen, andere einladen, uns im Glauben zu begleiten und nach dem Willen Allahs zu leben. Der Ummah begrüßt alles."
 ig_trait_sharia: "Sharry"
 ig_trait_sharia_desc: "Das richtige Leben erfordert die Kenntnis der Gesetze, die definieren, was richtig ist und was nicht. Die Auslegung des Gesetzes ist eine der ehrenvollsten und feierlichen Pflichten, die wir erfüllen können."
 ig_trait_mecelle: "Mecelle"
 ig_trait_mecelle_desc: "Basierend auf Hanafi-Jurisprudence, der Mecelle-i Ahkâm-ı Adliye stellt sicher, dass wir einem Code folgen, der sowohl unseren Glauben als auch unsere Erwartungen an säkulares Recht erfüllt."

