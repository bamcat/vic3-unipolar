 # leaders
 
 ideology_marxist_leader: "Marxist"
 ideology_marxist_leader_desc: "Revolutionäre sozialistische Führer, die Ratsherrschaft, öffentliches Eigentum, kollektivierte Landwirtschaft und einen scharfen Bruch mit dem liberalen Kapitalismus befürworten."
 ideology_state_socialist_leader: "Sozialistische Partei"
 ideology_state_socialist_leader_desc: "Zentralisierung sozialistischer Führer, die eine Partei oder technokratische Staatsrichtung bevorzugen, befiehlt Wirtschaftlichkeit und große öffentliche Systeme."
 ideology_left_wing_populist_leader: "Linker Populist"
 ideology_left_wing_populist_leader_desc: "Antielite-Massenpolitikführer, die Umverteilung, Protektionismus, Demokratie und starke Feindseligkeit der oligarchischen Herrschaft mischen."
 ideology_democratic_socialist_leader: "Sozialistische Fraktion"
 ideology_democratic_socialist_leader_desc: "Demokratische linke Führer, die Wahlen, Arbeitermacht, soziales Eigentum, starkes Wohlergehen und bürgerliche Freiheiten bevorzugen."
 ideology_green_leader: "Grün"
 ideology_green_leader_desc: "Umweltdemokratische Führer konzentrierten sich auf ökologische Regulierung, öffentliche Güter, bürgerliche Freiheiten und postindustrielle Reformen."
 ideology_state_capitalist_leader: "Staatskapital"
 ideology_state_capitalist_leader_desc: "Entwicklungsführer, die Märkte akzeptieren, aber eine starke staatliche, strategische Industrie, zentralisiertes Bankgeschäft und geführte Investitionen wollen."
 ideology_market_socialist_leader: "Marktsozialisten"
 ideology_market_socialist_leader_desc: "Dezentrale sozialistische Führer, die Genossenschaften, Gewerkschaften, Sozial- und Marktmechanismen unter demokratischer Aufsicht unterstützen."
 ideology_progressive_leader: "Progressive"
 ideology_progressive_leader_desc: "Reformisten konzentrierten sich auf Gleichberechtigung, Wohlstandserweiterung, Bildung, bürgerliche Freiheiten und verwaltete Marktreformen."
 ideology_social_liberal_leader: "Sozial Liberale"
 ideology_social_liberal_leader_desc: "Liberaldemokratische Führer, die Märkte mit Wohlfahrt, Gleichbürgerschaft, Bildung und reguliertem Kapitalismus unterstützen."
 ideology_technocrat_leader: "Technokratie"
 ideology_technocrat_leader_desc: "Experten-Regelführer, die Säkularismus, Verwaltungsplanung, staatliche Kapazität, regulierte Märkte und wissenschaftliche Governance unterstützen."
 ideology_liberal_leader: "Liberale Fraktion"
 ideology_liberal_leader_desc: "Mainstream liberale Führer, die Verfassungsrepubliken, bürgerliche Freiheiten, Freihandel, Privatmärkte und Rechtsgleichheit unterstützen."
 ideology_moderate_leader: "Moderation"
 ideology_moderate_leader_desc: "Pragmatische Führungskräfte, die selten radikale Reformen vorantreiben und in stabilen Mischsystemen am häufigsten vorkommen."
 ideology_neoliberal_leader: "Neoliberal"
 ideology_neoliberal_leader_desc: "Marktorientierte liberale Führer, die freien Handel, laissez-faire, private Versorgung, steuerliche Einschränkungen und technokratische Institutionen begünstigen."
 ideology_conservative_leader: "Konservierungsmittel"
 ideology_conservative_leader_desc: "Status-quo-Rechtsführer, die soziale Ordnung, begrenzte Reform, moderate Marktwirtschaft, Tradition und vorsichtigen Nationalismus bevorzugen."
 ideology_corporatist_leader: "Corporat"
 ideology_corporatist_leader_desc: "Kapitalistische Koordinationsführer, die den interventionistischen oder laissez-faire Kapitalismus befürworten, der durch staatliche Einrichtungen organisiert wird."
 ideology_theocrat_leader: "Theocrat"
 ideology_theocrat_leader_desc: "Religiös-Regelführer, die den Staat, Schulen, Gerichte und Staatsbürgerschaft um offizielle Religion bestellt wollen."
 ideology_right_wing_libertarian_leader: "Rechtsstaatlichkeit"
 ideology_right_wing_libertarian_leader_desc: "Anti-Staat-Marktführer, die private Institutionen, niedriges Wohlfahrt, freie Medien und schwache innere Sicherheit befürworten."
 ideology_classical_liberal_leader: "Klassische Liberale"
 ideology_classical_liberal_leader_desc: "Alte liberale Verfassungsisten, die Freihandel, begrenzte Regierung, Eigentumsrechte, repräsentative Institutionen und Rechtsstaatlichkeit begünstigen."
 ideology_neocon_leader: "Neopren"
 ideology_neocon_leader_desc: "Militarisierte liberal-konservative Führer, die professionelle Streitkräfte, Intervention im Ausland, kapitalistische Institutionen und nationale Sicherheit befürworten."
 ideology_jihadist_leader: "Dschihad"
 ideology_jihadist_leader_desc: "Militante religiöse Führer, die nur aus islamischen Staatsreligionsländern unter radikalem Druck entstehen können."
 ideology_minarchist_leader: "Minarchist"
 ideology_minarchist_leader_desc: "Extrem kleine Marktführer, die laissez-faire, private Systeme und fast-total Rollback der öffentlichen Autorität unterstützen."
 ideology_right_wing_populist_leader: "Rechtspopulist"
 ideology_right_wing_populist_leader_desc: "Antielite national-populistische Führer, die in liberalen Demokratien mit hohen Radikalen aufsteigen, Sozialchauvinismus, Protektionismus und kulturelle Gegenreaktion vermischen."
 ideology_authoritarian_capitalist_leader: "Autoritärer Kapitalist"
 ideology_authoritarian_capitalist_leader_desc: "Feste kapitalistische Führer, die privaten oder geführten Kapitalismus unter Autokratie, Polizeimacht, Zensur und schwache Opposition befürworten."
 ideology_monarchist_leader: "Monarchist"
 ideology_monarchist_leader_desc: "Dynastische treue Führer, die fast nur in Monarchien erscheinen und Erbschaft, Tradition, Kirche und Hierarchie bevorzugen."
 ideology_fascist_leader: "Faschist"
 ideology_fascist_leader_desc: "Ultra-nationalistische autoritäre Führer, die Militarisierung, Einparteienregel, Staatsgewalt, geschlossene Gesellschaft und Corporate-nationale Wirtschaft bevorzugen."
 ideology_anarchist_leader: "Anarchist"
 ideology_anarchist_leader_desc: "Antiautoritäre sozialistische Führer, die staatliche Selbstverwaltung, kooperatives Eigentum, Milizen, freie Rede, keine Polizei und starke lokale Autonomie befürworten."
