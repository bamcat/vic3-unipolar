l_german:

  # Base IGs
 ig_rural_folk:0 "Ländliches Volk"
 ig_rural_folk_only_icon:0 "@rural_folk!"
 ig_rural_folk_desc:0 "Menschen auf dem Land, deren politische Interessen meist mit ihren agrarischen Lebensgrundlagen übereinstimmen."
 ig_devout:0 "Religiöse Fundamentalisten"
 ig_devout_only_icon:0 "@devout!"
 ig_devout_desc:0 "Die engagiertsten Anhänger der Mehrheitsreligion, sie als die beste Quelle der moralischen und politischen Weisheit betrachten."
 ig_industrialists:0 "Unternehmen"
 ig_industrialists_only_icon:0 "@industrialists!"
 ig_industrialists_desc:0 "Investoren und Aktionäre mit einem Interesse an technologischem Fortschritt und industriellem Wachstum."
 ig_landowners:0 "Landbesitzer"
 ig_landowners_only_icon:0 "@landowners!"
 ig_landowners_desc:0 "Die Besitzer von großen Gutshäusern und riesigen Plantagen sind die Gutsbesitzer der Tradition und des alten Geldes."
 ig_intelligentsia:0 "Academia"
 ig_intelligentsia_only_icon:0 "@intelligentsia!"
 ig_intelligentsia_desc:0 "Die Intellektuellen führen die Trends der Nation in Literatur, Kunst, Musik und Theater. Auch die gemeinsame Managerklasse/"
 ig_petty_bourgeoisie:0 "Städte"
 ig_petty_bourgeoisie_only_icon:0 "@petty_bourgeoisie!"
 ig_petty_bourgeoisie_desc:0 "Kleine Unternehmen, Büroangestellte, Buchhalter und andere Personen, die zwischen den reichen und armen Schichten betrachtet werden."
 ig_armed_forces:0 "Streitkräfte"
 ig_armed_forces_only_icon:0 "@armed_forces!"
 ig_armed_forces_desc:0 "Berufssoldaten und andere, deren Interesse stark an das Militär des Landes gebunden ist."
 ig_trade_unions:0 "Gewerkschaften"
 ig_trade_unions_only_icon:0 "@trade_unions!"
 ig_trade_unions_desc:0 "Organisierte Arbeit versucht, Arbeiter in den Minen, Fabriken und Feldern zu organisieren und dabei die Stärken der unterschiedlichen Interessen in eine Stimme zu bündeln."

  # Religious IGs
 ig_catholic_church:0 "Kirche"
 ig_catholic_church_desc:0 "Der Katholizismus ist die größte Sekte des Christentums. Die Gläubigen halten fest, dass der Erzbischof von Rom, der Papst, der ununterbrochene Nachfolger der Autorität Jesu Christi über den Heiligen Petrus ist. Andere wichtige Überzeugungen sind die Verehrung der Heiligen und der Jungfrau Maria."
 ig_orthodox_church:0 "Orthodoxe Kirche"
 ig_orthodox_church_desc:0 "Die orthodoxen Kirchen sind östliche Kirchen, nicht in der Gemeinschaft mit dem Papst."
 ig_oriental_orthodox_church:1 "Oriental Orthodoxe Kirche"
 ig_oriental_orthodox_church_desc:1 "Die orientalisch-orthodoxen Kirchen neigen dazu, die Kirchen des Nahen Ostens nicht in der Gemeinschaft mit dem Papst zu sein."
 ig_anglican_church:0 "Anglikanische Kirche"
 ig_anglican_church_desc:0 "Die anglikanische Kirche wurde von König Heinrich VIII. während der protestantischen Reformation geschaffen. Anglikaner glauben, dass die Bibel die wichtigste Autorität des christlichen Dogmas ist und den Papst zurücklehnt, während sie weniger radikal ist als andere evangelische Kirchen."
 ig_evangelical_church:0 "Evangelische Kirche"
 ig_evangelical_church_desc:0 "Die evangelischen Kirchen wurden größtenteils in Nordeuropa während der protestantischen Reformation geschaffen. Evangelische glauben, dass die Bibel die einzige Autorität des christlichen Dogmas ist, den Papst zurückzuweisen und die katholische Verehrung der Heiligen als Grenze zu Götzendienst zu sehen."
 ig_rabbinical_council:0 "Rabbiner Rat"
 ig_rabbinical_council_desc:0 "Die Führung der jüdischen Bevölkerung eines Landes ist in der Regel gut ausgebildet Rabbis mit starken Traditionen der Debatte und des Stipendiums."
 ig_sunni_madrasahs:1 "Sunni Ulema"
 ig_sunni_madrasahs_desc:1 "Der Sunnismus ist die größte Sekte des Islam. Die Gläubigen halten, dass Muhammad als Kalif des Islam von seinem Onkel Abu Bakr erfolgreich war, im Gegensatz zu der Shi’a Ansicht, dass sein Schwiegersohn Ali der legitime Nachfolger war."
 ig_shia_madrasahs:1 "Shi’a Ulema"
 ig_shia_madrasahs_desc:1 "Shi’ism ist die zweitgrößte Sekte des Islam. Die Gläubigen halten, dass Muhammad als Kalif des Islam von seinem Schwiegersohn Ali erfolgreich war, im Gegensatz zu der Sunni Ansicht, dass sein Onkel Abu Bakr der legitime Nachfolger war."
 ig_hindu_priesthood:0 "Hindu Priests"
 ig_hindu_priesthood_desc:0 "Wahrscheinlich die älteste organisierte Religion noch in der Existenz, Hinduismus hält, dass das Brechen des Zyklus der Reinkarnation und das Erreichen Nirvana erfordert die Einhaltung eines Kaste-Systems, wodurch Einzelpersonen dienen eine Rolle, um ihr Karma zu verbessern, ebenso wie die vielen Götter, die Hindus angebetet haben, verschiedene Rollen dienen."
 ig_vajrayana_monks:0 "Vajrayana Monks"
 ig_vajrayana_monks_desc:0 "Der Buddhismus von Vajrayana ist in Tibet und der Mongolei am stärksten. Es betont die Verwendung von Meditation und Selbstdisziplin."
 ig_mahayana_monks:0 "Mahayana Mons"
 ig_mahayana_monks_desc:0 "Mahayana Buddhismus ist am stärksten in China, Vietnam und Korea. Es betont, dass jeder in der Gesellschaft ermutigt werden sollte, die Erleuchtung durch Vollkommenheit zu suchen. Mahayana sieht Buddha als eine gottähnliche Figur."
 ig_theravada_monks:0 "Theravada Monks"
 ig_theravada_monks_desc:0 "Theravada Buddhismus ist am stärksten in Burma, Siam, Kambodscha und Ceylon. Es legt großen Wert auf Personen, die Nirvana suchen, um den Zyklus der Reinkarnation zu brechen. Theravada sieht Buddha nicht als Gott, sondern als erleuchteter Mensch, der dem Rest der Menschheit den Weg zur Vollkommenheit gezeigt hat."
 ig_shinto_monks:0 "Glänzende Mönche"
 ig_shinto_monks_desc:0 "Shintoismus ist ein synkreter Glaube, der buddhistische Konzepte von Karma und Reinkarnation mit Anbetung und Plakation von Kami, den Geistern der Natur und toten Vorfahren kombiniert."
 ig_pagan_shamans:0 "Pagan Shamans"
 ig_pagan_shamans_desc:0 "Der Animismus ist die Anbetung und Plakation von natürlichen Geistern. Rituale, die von Animisten durchgeführt werden, umfassen Opfer von Nahrung und Vieh, und Konsum von halluzinogenen Medikamenten für spirituelle Fahrten der Introspektion."

  # Taiping IGs
 ig_taiping_god_worshippers:0 "Gottesdienst-Gesellschaft"
 ig_taiping_god_worshippers_desc:0 "Die Gott-Worshipping- oder Kaiser-Worshipping-Gesellschaft ist ein synkreter christlicher Glaube, der unter dem himmlischen Reich prominent ist und eine Interpretation des Christentums unterstützt, das alle Gläubigen als Söhne und Töchter Gottes ansieht."

  # British IGs
 ig_landed_gentry:0 "Gelandet Gentry"
 ig_landed_gentry_desc:0 "Die Besitzer von großen Gutsgegenständen und riesigen Eigenschaften, die gelandete Gattung sind Kustoden der Tradition und des alten Geldes."

  # Prussian IGs
 ig_junkers:0 "Junkers"
 ig_junkers_desc:0 "Von den ’jung-Herren’ (junge Lords), die nach den Teutonic Eroberungen der heidnischen Ostsee folgten, um die preußischen Länder zu begleichen und zu christisieren, sind die Junkers Prussias Adel und Hauptgrundbesitzer. Sie neigen dazu, den Bewegungen gegenüber der Demokratie als Bedrohung für die Eliteherrschaft entgegenzuwirken."

  # USA IGs
 ig_southern_planters:0 "Hausbesitzer"
 ig_southern_planters_desc:0 "Während das Wohnen in den letzten Zeiten immer knapper geworden ist, haben Gruppen von Menschen, die behaupten, zu Hauseigentümerverbänden, die in den Kauf und Verkauf von Immobilien für die Zwecke der Gewinne beschäftigt sind, künstlich die Lebenshaltungskosten aufgeblasen."
 ig_evangelicals:0 "Eingeweihte Christen"
 ig_evangelicals_desc:0 "Die christlichen Christen aus einer überraschend großen Vielfalt protestantischer Konfessionen sind sich alle darin einig, dass die Nation ihre eigene spirituelle Erweckung finden muss, um sich vor einem Anstieg des Säkularismus in der ganzen Nation zu retten."
 ig_yeoman_farmers:0 "Ländliche Südliche"
 ig_yeoman_farmers_desc:1 "Die kleinhaltende amerikanische ländliche Klasse, die von vielen der Gründungsväter als das Gestein der Nation angesehen wird. Die Yoman-Klasse hat sich längst als Vorhut des amerikanischen ländlichen Populismus etabliert."
 ig_wallstreet:0 "Wall Street"
 ig_wallstreet_desc:0 "Die Investmentbanken auf der Wall Street in New York sind das Rückgrat des amerikanischen Finanzsystems, das extremen Einfluss auf die gesamte Wirtschaft ausübt."
 ig_silicon_valley:0 "Silikon-Tal"
 ig_silicon_valley_desc:0 "Die Programmierer und Work-from-home Computer wizzes, die den Alltag im Internet verwalten."
 ig_american_middle_class:0 "Mittelamerika"
 ig_american_middle_class_desc:0 "Die American Middle Class stellt die Mehrheit der Verbraucherbasis des Landes dar, Arbeitsplätze, die lebensfähige Gehälter liefern."
 ig_digital_activists:0 "Digitale Aktivisten"
 ig_digital_activists_desc:0 "Verschiedene Online-Influencer haben Macht über unsere Bevölkerung."
  # Ottoman IGs
 ig_local_governors:0 "Lokale Gouverneure"
 ig_local_governors_desc:0 "Die Herrscher der Provinzen können enormen Einfluss durch den Aufbau lokaler Schutznetze erwerben. Dynastien können so mächtig werden, dass sie effektiv unabhängige Staaten sind nur nominal gebunden an das Reich."

  # Chinese IGs
 ig_literati:0 "Literat"
 ig_literati_desc:0 "Scholars in China dienen einer wichtigen Rolle, sowohl als Unterstützer der Regierung als auch als Kritiker davon."
 ig_scholar_officials:0 "Stipendiaten"
 ig_scholar_officials_desc:0 "Die gelandete Genie in China ist nicht wirklich Chinas Adel. Sie erhalten ihren Reichtum durch Kaufimmobilien, aber sie schulden ihre Macht an ihre Positionen in der Regierung."
 ig_confucian:0 "Konfuzian Scholars"
 ig_confucian_desc:0 "Mehr einer sozialen Tradition, der Konfuzianismus koexistiert bequem mit einer Vielzahl von Glauben, aber dennoch fordert soziale Harmonie und starke Moral von denen, die es folgen."

  # Papal IGs
 ig_roman_landowners:1 "Civic Nosility"
 ig_roman_landowners_desc:1 "Die römische Bürgerfeindlichkeit dient als Volk des Reichtums, des Einflusses und der zeitlichen Macht über die Gebiete des Heiligen Stuhls."
 ig_roman_curia:0 "Roman Curia"
 ig_roman_curia_desc:0 "Die römische Kurie, oder "Court of Rome", wie sie manchmal bekannt ist, ist die administrative Institution des Heiligen Stuhls, die sowohl kirchliche als auch zeitliche Kräfte ausübt."

  # Japanese IGs
 ig_samurai:0 "Samurai"
 ig_samurai_desc:0 "Die Samurai sind die erbliche militärische Adel Japans, die als privilegierte Bewahrer der mächtigen Landbesitzer Daimyo und als Vollstrecker ihrer feudalen Meisterwillen dienen."
 ig_shogunate:0 "Shogun"
 ig_shogunate_desc:0 "Die Shogunate bezieht sich auf die Militärregierung, die Japan im Namen des Kaisers seit dem 12. Jahrhundert regierte. In der Unterstützung mächtiger Feudalherren, der Daimyo, ist die Insitution der Erhaltung der traditionellen Ordnung Japans gewidmet."
 ig_peasants:1 "Heimkehr"
 ig_peasants_desc:0 "Heimin bezeichnet die japanische Klasse der Commoners, die ohne jede Art von sozialen Privilegien geboren wird, und mit politischen Interessen, die in erster Linie die der ländlichen Bauern widerspiegeln."
 ig_buddhist_monks:0 "buddhistische Mönche"
 ig_buddhist_monks_desc:0 "Der Buddhismus aus dem 19. Jahrhundert ist in Japan seit über einem Jahrtausend anwesend. Die buddhistischen Schulen, die durch den Staat in der gesamten Edo-Ära geschmälert wurden, unterstreichen die synkrete Beziehung zwischen kami und buddhas."

  # Hawaiian IGs
 ig_christian_missionaries:0 "Christliche Missionen"
 ig_christian_missionaries_desc:0 "Die christlichen Missionare kamen vor ein paar Jahrzehnten nach Hawai’i, haben aber die Kahuna bereits als Hawai’i dominierende Klerikerklasse geschuppt. Sie befürworten den Handel mit den westlichen Mächten, ziehen Migranten aus dem Westen und die Umwandlung von heimischen Hawaiianern zum Christentum an."
 ig_alii:0 "Ali’i"
 ig_alii_desc:0 "Die Ali’i repräsentieren die weniger Adligen von Hawai’i im Dienst des herrschenden Monarchen. Sie befürworten traditionelle Werte und bewahren die Herrschaft der Monarchie."
 ig_maka_ainana:0 "Makainana"
 ig_maka_ainana_desc:0 "Die Maka’āinana repräsentiert die ländliche Klasse von Hawai, die oft in Plantagen und Fischerei arbeitet. Sie befürworten traditionelle Werte und die anhaltende wirtschaftliche Abhängigkeit von der Landwirtschaft von Hawai."
 ig_hawaiian_democrats:0 "Demokraten"
 ig_hawaiian_democrats_desc:0 "Die Demokraten vertreten die liberalen Reformer von Hawai. Sie befürworten die Abschaffung der absoluten Macht des Monarchen zugunsten eines demokratischen Regimes und der fortgesetzten Handelsbeziehungen mit den westlichen Mächten."

  # Swedish IGs
 ig_church_of_sweden:0 "Kirche von Schweden"
 ig_church_of_sweden_desc:0 "Die schwedische Kirche wurde vom König Gustav Vasa im 16. Jahrhundert gegründet und ist die offizielle Staatskirche Schwedens. Als lutherische Institution hält die Kirche fest, dass die Bibel die einzige Autorität des christlichen Dogmas ist und somit die Autorität des Papstes und der Traditionen wie die Verehrung der Heiligen ablehnt."

  # Finnish IGs
 ig_church_of_finland: "Kirche von Finnland"
 ig_church_of_finland_desc: "Aus der Trennung von Finnland aus Schweden im Jahre 1809 wurde die finnische Kirche als offizielle Staatskirche gegründet. Als lutherische Institution hält die Kirche fest, dass die Bibel die einzige Autorität des christlichen Dogmas ist und somit die Autorität des Papstes und der Traditionen wie die Verehrung der Heiligen ablehnt."

# Danish IGs
 ig_church_of_denmark: "Kirche von Dänemark"
 ig_church_of_denmark_desc: "Im 16. Jahrhundert von König Christian III gegründet, ist die Kirche Dänemarks die offizielle Staatskirche Dänemarks. Als lutherische Institution hält die Kirche fest, dass die Bibel die einzige Autorität des christlichen Dogmas ist und somit die Autorität des Papstes und der Traditionen wie die Verehrung der Heiligen ablehnt."

# Norwegian IGs
 ig_aristocracy_of_officials: "Aristokratie der Beamten"
 ig_aristocracy_of_officials_desc: "Ohne eine signifikante historische Adel und die Institution, die im Jahre 1821 formal abgeschafft wird, besteht die Oberklasse Norwegens aus Beamten, mit Anwälten, Priestern und Ärzten, die die Positionen eines traditionellen Adels besetzen."
 ig_church_of_norway: "Kirche von Norwegen"
 ig_church_of_norway_desc: "Die norwegische Kirche wurde als separater Körper von der römisch-katholischen Kirche gegründet und im 16. Jahrhundert durch die protestantische Reformation in den norwegischen Staat integriert. Als lutherische Institution hält die Kirche fest, dass die Bibel die einzige Autorität des christlichen Dogmas ist und somit die Autorität des Papstes und der Traditionen wie die Verehrung der Heiligen ablehnt."

  # Korean IGs
 ig_yangban:0 "Offizielle von Yangban"
 ig_yangban_desc:0 "Die Yangban repräsentiert die gelandete und unverlandete Gattung Koreas, die ihre Titel und Einfluss von Positionen innerhalb der bürokratischen Apparatur des Landes ableiten. Die konfuzianischen Ideale des Scholar-Officials zu exemplazieren, sind sie skrupellose Verteidiger der traditionellen Ordnung Koreas."

  # Russian IGs
 ig_gentry_assembly:0 "Generelle Versammlung"
 ig_gentry_assembly_desc:0 "Die Gentry Assembly ist der selbstverwaltete Körper, der die russische Aristokratie repräsentiert. Die Versammlung hat sich seit 1785 für die Beibehaltung oder Erweiterung der traditionellen Mächte und Privilegien der Adligen eingesetzt."

  # Australian IGs
 ig_squattocracy: "Squatcracy"
 ig_squattocracy_desc: "Die „Squattocracy“ stellt die Klasse der weißen australischen Siedler dar, die große Wege von Land mit wenig oder ohne Rechtsanspruch besetzt haben. Oft sind die ersten Siedler, die in einem bestimmten Gebiet ankommen, die Squatokratie hat enormen Reichtum und sozialen Einfluss in erster Linie durch die Erlöse der Viehzucht auf ihren Gebieten gewonnen."

  # Austrian IGs
 austrian_aristocracy:0 "Österreichische Aristokratie"
 austrian_aristocracy_desc: "Die österreichische Aristokratie repräsentiert die etablierte Edelklasse Österreichs, die historisch mit edlen Titeln der Habsburger-Heiligen römischen Kaiser und Erzherzöge Österreichs ausgezeichnet wurde und einen großen Einfluss innerhalb des kaiserlichen Hofes besitzt."

  # Misc Igs
 ig_red_army:0 "Rote Armee"
 ig_red_army_desc:0 "Die Rote Armee ist eine Institution, die der Verteidigung und Verbreitung der Revolution gewidmet ist, die durch die Verschmelzung der traditionellen Streitkräfte mit dem Proletariat und der kommunistischen Ideologie geboren wird."
 ig_fellahin: "Fellahin"
 ig_fellahin_desc: "Sie haben ihren Namen von den Pflügen, die sie arbeiten, und den Feldern, die sie bis dahin haben, bekommen, sind die Bauern und Bauern von Ägypten."

  # Indian IGs
  ig_zamindars: "Zamindars"
  ig_zamindars_desc: "Die Zamindars sind die typisch erblichen Eigentümer von großen Immobilien. Sie repräsentieren oft die Überreste der Aristokratie der Mughal-era, die das Recht gewährt, Landeinnahmen im Namen ihrer Herrscher zu sammeln."

  ig_east_india_company: "East India Company"
  ig_east_india_company_desc: "Die East India Company ist das private Unternehmen, das unter Aufsicht des britischen Parlaments mit der Regierung Indiens beauftragt ist. Nach dem Widerruf seines kommerziellen Mandats im Jahre 1833 ist es eine rein administrative Einrichtung geworden."

  ig_presidency_armies: "Präsidentschaftsbewaffnung"
  ig_presidency_armies_desc: "Die Präsidentschaftsarmeen sind die Streitkräfte des Kolonialindiens, die typischerweise unter dem Befehl europäischer Offiziere aus einheimischen indischen Verarmungen bestehen."

  ig_indian_army: "Indian Army"
  ig_indian_army_desc: "Die indische Armee ist die primäre bewaffnete Kraft des kolonialen Indiens, die durch die Vereinigung der Präsidentschaftsarmeen zu einem einzigartigen Körper gebildet wird. Es besteht weitgehend aus einheimischen indischen Soldaten unter dem Befehl europäischer Offiziere."

  ig_ryots: "Ryots"
  ig_ryots_desc: "Die Ryots sind die traditionellen Bauern und Bauern Indiens, in der Regel ohne eigenes Land. Ihre Interessen sind in der Natur weitgehend agrar."

  ig_civil_servants: "Zivilisten"
  ig_civil_servants_desc: "Die Zivilisten umfassen die einheimische indische Intelligenz, die sich vor allem aus den verschiedenen Organen der indischen Kolonialbürokratie entwickelt hat. In der Regel halten oder haben sie Rollen als Angestellte oder andere Low-to-Mid-Level-Administratoren gehalten."

  ig_government_of_india: "Regierung von Indien"
  ig_government_of_india_desc: "Die Regierung Indiens bezieht sich auf die europäische Kolonialverwaltung, die die Interessen der britischen Krone in Indien voranbringt."

  ig_bhadralok: "Bhadraloks"
  ig_bhadralok_desc: "Der Bhadralok, oder "Gentlemen" umfassen die Mittelschichten der indischen Gesellschaft. Diese Gruppe in ihrer jetzigen Form stammte aus Bengalen, unter gebürtigen Bengali-Händlern, Industriellen und Finanziers, die sich bei ihrer Eroberung Indiens mit der East India Company einigten."

  ig_kisanharu: "Kisanharu"
  ig_kisanharu_desc: "Die Kisanharu sind die traditionellen Bauern und Bauernhöfe von Nepal, in der Regel ohne eigenes Land. Ihre Interessen sind in der Natur weitgehend agrar."
