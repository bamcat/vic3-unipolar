 # ==========================================
 # SPARK EVENTS
 # ==========================================

 2011_protests.1.t: "Ein Street Vendor setzt sich selbst leicht"
 2011_protests.1.d: "In der Provinzstadt Sidi Bouzid hat sich ein junger Straßenverkäufer namens Mohamed Bouazizi vor den örtlichen Regierungsbüros niedergelassen, nachdem die Polizei seinen Wagen beschlagnahmt und ihn öffentlich demütigt hat.\nx id=1/> Der Akt der Verzweiflung ist zu einer Blitzstange geworden. Innerhalb von Stunden hat sich sein Protest über soziale Medien verbreitet. Crowds haben sich nicht nur in Sidi Bouzid, sondern über [ROOT.GetCountry.GetName] versammelt. Die akkumulierte Wut einer Generation — über Korruption, Arbeitslosigkeit und das Schleifgewicht der autoritären Regel — hat ihr Symbol gefunden.\nx id=4/> Die Regelung von [SCOPE.GetRootScope.GetCountry.GetRuler.GetLastName] muss entscheiden, wie zu antworten ist. Was auch immer es tut, die Welt beobachtet."
 2011_protests.1.f: "Die Verzweiflung eines Mannes ist zu einer Nation geworden."
 2011_protests.1.a: "Crack nach unten — dispergieren die Demonstrationen, bevor sie verbreiten"
 2011_protests.1.b: "Angebotskonzessionen — eine Untersuchung des Polizeiverhaltens bekanntgeben"

 2011_protests.2.t: "Der tunesische Tremor"
 2011_protests.2.d: "Die Unruhe in Tunesien hat eine Schockwelle in der arabischen Welt geschickt. Satelliten-Kanäle werden die Szenen von Tunis um die Uhr ausgestrahlt - und gewöhnliche Menschen in [ROOT.GetCountry.GetName] werden beobachtet. Die Frage, die in Coffeeshops und auf sozialen Medien geflüstert wird, ist die gleiche, dass jedes autoritäre Regime in der Region sich jetzt fragt:\nx id=2/> Könnte es hier passieren?"
 2011_protests.2.f: "Jedes Regime beobachtet. Jeder Dissident nimmt Notizen."
 2011_protests.2.a: "Tunesien ist anders — dies wird sich nicht auf [ROOT.GetCountry.GetName] verteilen"
 2011_protests.2.b: "Vorsichtsmaßnahmen — straffen Sie die Sicherheit, bevor dies aus der Hand kommt"

 # ==========================================
 # MISSING STRUCTURAL MODIFIERS
 # ==========================================

 modifier_arab_spring_transition_cabinet: "Übergangsregierung"
 modifier_arab_spring_transition_cabinet_desc: "Nach der Revolution entsteht eine neue Regierung. Die Legitimität ist in diesen frühen Tagen hoch — aber sie muss konsolidiert werden, bevor die Konterrevolution ihren Fuß findet."

 modifier_arab_spring_kick_out_of_insurrection: "Zurück von den Barrikaden"
 modifier_arab_spring_kick_out_of_insurrection_desc: "Die Revolution hat ihre unmittelbaren Ziele erreicht. Diese Gruppe verzichtet auf ihre Auferstehungshaltung und tritt in das formelle politische Leben ein – vom Wohlwollen des Augenblicks getragen."

 modifier_arab_spring_regime_ig_defeated: "Besiegt von der Revolution"
 modifier_arab_spring_regime_ig_defeated_desc: "Die Vereinigung dieser Gruppe mit dem alten Regime hat es teuer gekostet. Es wurde aus der Regierung geschoben und seine politische Stärke ist abgeschwächt. Ob es aus den Margen wieder aufgebaut werden kann, bleibt zu sehen."

# ==========================================
 # ARAB SPRING INTERNATIONAL EVENTS
 # ==========================================

 # ── arab_spring_intl.1 ───────────────────

 arab_spring_intl.1.t: "Die arabische Welt brennt"
 arab_spring_intl.1.d: "Proteste sind in der ganzen arabischen Welt, beginnend in Tunesien. Jahrzehnte der autoritären Herrschaft, der wirtschaftlichen Stagnation und der politischen Repression haben Millionen in die Straße getrieben."
 arab_spring_intl.1.f: "Geschichte beobachtet diejenigen, die Geschichte beobachten."
 arab_spring_intl.1.a: "Die Demonstranten stehen im Zeichen der Demokratie und der Menschenrechte"
 arab_spring_intl.1.b: "Zurück zu den geltenden Regimen — Stabilität und unsere Interessen kommen zuerst"
 arab_spring_intl.1.c: "Forderung nach Zurückhaltung auf allen Seiten — Dringlichkeit einer friedlichen Lösung"

 # ── arab_spring_intl.2 ───────────────────

 arab_spring_intl.2.t: "Die Frage der Intervention"
 arab_spring_intl.2.d: "Die Situation in [scope:civil_war_country_scope.GetName] hat sich in den offenen Bürgerkrieg verschlechtert. [scope:civil_war_country_scope.GetRuler.GetName]'s Truppen greifen Zivilbevölkerung an, und es gibt glaubwürdige Berichte über Massaker. Die internationale Gemeinschaft fordert eine Antwort auf.\nx id=3/>x id=4/>, die zuvor zur Unterstützung der Protestbewegungen geäußert wurde. Die Frage ist nun, ob diese Unterstützung sich auf Maßnahmen erstreckt - und zu welchen Kosten."
 arab_spring_intl.2.f: "Wörter und Taten sind verschiedene Währungen."
 arab_spring_intl.2.a: "Durchsetzung einer Flugverbotszone — Schutz von Zivilisten vor Luftangriffen"
 arab_spring_intl.2.b: "Arm und unterstützen Oppositionskräfte auf dem Boden"
 arab_spring_intl.2.c: "Das ist nicht unser Krieg."

 # ── arab_spring_intl.3 ───────────────────

 arab_spring_intl.3.t: "Der arabische Frühling: Ein Reckoning"
 arab_spring_intl.3.d_success: "Der Arabische Frühling hat zumindest einen echten demokratischen Übergang hergestellt. Es ist eine zerbrechliche Leistung, leicht umgekehrt — aber es ist real. Für [ROOT.GetName], die diese Ereignisse aus der Ferne entfaltet sah, gibt es eine ruhige Zufriedenheit, wenn man sieht, dass der Bogen der Geschichte manchmal in Richtung Gerechtigkeit biegen kann. Die Frage ist nun, wie man das unterstützt, was gewonnen wurde."
 arab_spring_intl.3.d_islamist: "Der Arabische Frühling ist beendet – und nicht wie seine Architekten hofften. In der ganzen Region haben sich islamistische Bewegungen besser organisiert als die weltlichen Protestkoalitionen, die die Aufstände begannen. Für [ROOT.GetName] ist das Ergebnis unbequem: Die von ihr gemeisterte Demokratie hat Regierungen hervorgebracht, deren Werte sich stark von ihren eigenen unterscheiden. Die Beziehung zu der neuen arabischen Ordnung erfordert eine sorgfältige Navigation."
 arab_spring_intl.3.d_failure: "Der Arabische Frühling wurde gelöscht. Die Regime, die zu zittern schienen, haben sich stabilisiert, ihre Sicherheitsdienste rekonstituiert, ihre Gegner im Exil oder im Gefängnis. Für [ROOT.GetName] ist die Folge eine Erinnerung daran, dass moralische Klarheit einfacher ist als moralische Wirksamkeit. Die Traurigkeiten, die die Aufstände gezündet haben, wurden nicht gelöst. Sie wurden nur verschoben."
 arab_spring_intl.3.f: "Die Welt bewegt sich weiter. Die Region vergisst nicht."
 arab_spring_intl.3.a: "Nehmen Sie die Aktie von dem, was passiert ist"

 # ==========================================
 # INTERNATIONAL MODIFIER NAMES
 # ==========================================

 arab_spring_intl_pro_democracy_stance: "Pro-Democracy Stance"
 arab_spring_intl_pro_democracy_stance_desc: "Dieses Land hat sich öffentlich mit den Protestbewegungen des Arabischen Frühlings ausgerichtet. Sein Ansehen unter den demokratischen Nationen ist gestiegen — aber die Beziehungen zu den umliegenden arabischen Regimen haben sich gekühlt."

 arab_spring_intl_stability_first_stance: "Erster Schritt"
 arab_spring_intl_stability_first_stance_desc: "Dieses Land hat sich entschlossen, die arabischen Regime über die Protestbewegungen zurückzubehalten. Strategische Beziehungen in der Region sind stärker — aber zu einem Preis für ihren internationalen Ruf."

 arab_spring_intl_neutral_stance: "Cautious Restrainage"
 arab_spring_intl_neutral_stance_desc: "Dieses Land hat eine friedliche Lösung gefordert, ohne beide Seiten zu unterstützen. Es hat seine diplomatische Flexibilität erhalten — aber den Einfluss auf das Ergebnis geopfert."

 arab_spring_intl_western_backing: "Western Backing"
 arab_spring_intl_western_backing_desc: "Diese Bewegung wurde von den westlichen Regierungen öffentlich unterstützt. Internationale Aufmerksamkeit stärkt seine Dynamik und macht Repressionen kostspieliger für das Regime."

 arab_spring_intl_regime_backing: "Unterstützung des westlichen Regimes"
 arab_spring_intl_regime_backing_desc: "Die westlichen Regierungen haben ihr Gewicht hinter diese Regierung und nicht die Demonstranten gelegt. Die externe Validierung stärkt die Autorität und Legitimität des Regimes."

 arab_spring_intl_no_fly_zone: "Erstellung einer No-Fly-Zone"
 arab_spring_intl_no_fly_zone_desc: "Die militärischen Vermögenswerte werden zur Durchsetzung einer Flugverbotszone über die Konfliktzone eingesetzt. Die Intervention beschützt die Zivilbevölkerung — sie ist kostspielig und zieht internationale Kontrolle."

 arab_spring_intl_arming_rebels: "Streitkräfte"
 arab_spring_intl_arming_rebels_desc: "Waffen und Geräte werden im Konflikt zu Oppositionskräften geleitet. Die Politik ist verdeckt, aber nicht geheim, und die langfristigen Konsequenzen, die diese Unterstützung erhalten, bleiben unklar."

 arab_spring_intl_intervention_costs: "Interventionskosten"
 arab_spring_intl_intervention_costs_desc: "Militärische Interventionen im Ausland belasten Ressourcen und erzeugen inländische politische Debatten. Die Kosten für Schatz und politische Hauptstadt sind real."

 arab_spring_intl_non_interventionist: "Nichtinterventionist"
 arab_spring_intl_non_interventionist_desc: "Dieses Land hat sich entschlossen, nicht in den arabischen Bürgerkrieg einzugreifen. Die Entscheidung hat ihre Exposition verringert und das inländische politische Kapital erhalten — obwohl Kritiker argumentieren, dass es seine angegebenen Werte aufgegeben hat."
