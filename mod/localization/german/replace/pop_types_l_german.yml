l_german:
 aristocrats:0 "@aristocrats! $aristocrats_no_icon$"
 aristocrats_only_icon:0 "@aristocrats!"
 aristocrats_no_icon:0 "Aristokraten"
 aristocrats_desc:1 "Wealthy Landbesitzer, altes Geld mit alten Verbindungen. Sie arbeiten ausschließlich in [GetBuildingType('building_manor_house').GetName] [Concept('concept_building', '$concept_buildings$')], wo sie Farmen und Plantagen besitzen. Sie tragen einen Teil ihrer Gewinne zum [concept_investment_pool] bei. Ihre politischen Interessen sind als [GetInterestGroupVariant('ig_landowners',GetPlayer).GetNameWithCountryVariant] dargestellt."
 bureaucrats:0 "@bureaucrats! $bureaucrats_no_icon$"
 bureaucrats_only_icon:0 "@bureaucrats!"
 bureaucrats_no_icon:0 "Bürokraten"
 bureaucrats_desc:0 "Beamte, die für die Verwaltung von Regierungsfunktionen und Infrastruktur verantwortlich sind. Politisch neigen sie dazu, sich mit der Intelligenz oder Petite Bourgeoisie auszurichten."
 capitalists:0 "@capitalists! $capitalists_no_icon$"
 capitalists_only_icon:0 "@capitalists!"
 capitalists_no_icon:0 "Kapital"
 capitalists_desc:1 "Captains der Industrie, neues Geld für eine neue Ära. Sie arbeiten ausschließlich in [GetBuildingType('building_financial_district').GetName] [Concept('concept_building', '$concept_buildings$')], wo sie Minen und Manufakturen besitzen. Sie tragen einen Teil ihrer Gewinne zum [concept_investment_pool] bei. Ihre politischen Interessen sind als [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetNameWithCountryVariant] dargestellt."
 clergymen:0 "@clergymen! $clergymen_no_icon$"
 clergymen_only_icon:0 "@clergymen!"
 clergymen_no_icon:0 "Klerusfrüchte"
 clergymen_desc:0 "Priester, Gelehrte und andere religiöse Führer neigen zu den geistigen Bedürfnissen der ländlichen Bevölkerung. Politisch sind sie das Rückgrat der Devout."
 clerks:0 "@clerks! $clerks_no_icon$"
 clerks_only_icon:0 "@clerks!"
 clerks_no_icon:0 "Weiß-Kollar-Arbeiter"
 clerks_desc:0 "Niederrangige Büroarbeiter, die administrative Aufgaben in Regierung, Infrastruktur und Geschäften ausüben. Im allgemeinen Teil der Petite Bourgeoisie, obwohl einige bei Trade Unions."
 engineers:0 "@engineers! $engineers_no_icon$"
 engineers_only_icon:0 "@engineers!"
 engineers_no_icon:0 "Ingenieure"
 engineers_desc:1 "Erfinder und Designer von technischen Lösungen, die mit fortschrittlichen Maschinen in Sektoren wie Produktion, Bergbau und Bau arbeiten. Einige unterstützen die Industriellen oder Petty Bourgeoisie, während andere Trade Unions beitreten."
 farmers:0 "@farmers! $farmers_no_icon$"
 farmers_only_icon:0 "@farmers!"
 farmers_no_icon:0 "Bauern"
 farmers_desc:0 "Sharecropper, Kleinanleger und andere, die ein stabiles, aber skeptisches Leben machen, das Lebensmittel oder wachsende Cash-Kulturen produziert. Die meisten sehen ihre Interessen als die ländlichen Folk vertreten."
 peasants:0 "@peasants! $peasants_no_icon$"
 peasants_only_icon:0 "@peasants!"
 peasants_no_icon:0 "Erbsen"
 peasants_desc:2 "Subsistenzbauern fanden nur in [Concept('concept_subsistence_building', '$concept_subsistence_buildings$')], wo sie landwirtschaftliche und einfache hergestellte Produkte produzieren, die sie meist für ihre eigenen Bedürfnisse verwenden. Sie verlassen sich auf [concept_subsistence_output] für das Überleben und spielen nur eine begrenzte Rolle in der [concept_market] Wirtschaft. Sie neigen zu [Concept('concept_politically_unaligned_aligned', '$concept_politically_unaligned$')]."
 laborers:0 "@laborers! $laborers_no_icon$"
 laborers_only_icon:0 "@laborers!"
 laborers_no_icon:0 "Blue-Collar-Arbeiter"
 laborers_desc:0 "Tagarbeiter, Farmhands und andere mit wenig bis keine Arbeitssicherheit, die Durchführung, was auch immer Arbeit in der gesamten Gesellschaft zur Verfügung steht. Sie sind in der Regel nicht in der Politik, sondern können sich durch Gewerkschaften einmischen."
 officers:0 "@officers! $officers_no_icon$"
 officers_only_icon:0 "@officers!"
 officers_no_icon:0 "Offiziere"
 officers_desc:0 "Angeklagte Offiziere, die die militärischen Kräfte der Nation in der Armee und in der Marine befehlen. Politisch vertreten sie die oberen Echelonen der Streitkräfte."
 academics:0 "@academics! $academics_no_icon$"
 academics_only_icon:0 "@academics!"
 academics_no_icon:0 "Wissenschaft"
 academics_desc:0 "Wissenschaftler, Doktoren, Anwälte und andere ausgebildete Fachleute studieren und in akademischen Institutionen lehren. Politisch sind sie an der Spitze der Intelligentsia."
 shopkeepers:0 "@shopkeepers! $shopkeepers_no_icon$"
 shopkeepers_only_icon:0 "@shopkeepers!"
 shopkeepers_no_icon:0 "Kleinunternehmer"
 shopkeepers_desc:0 "Eigentümer und Manager von Geschäften, Verkauf von Waren an Kunden in Städten. Sie fallen normalerweise politisch in die Petite Bourgeoisie."
 slaves:0 "@slaves! $slaves_no_icon$"
 slaves_only_icon:0 "@slaves!"
 slaves_no_icon:0 "Sklaven"
 slaves_desc:0 "Behandelt nicht als Person, sondern als Eigentum, Zwangsarbeit in verschiedenen Sektoren in Ländern, in denen Sklaverei erlaubt ist. Aufgrund ihres Status dürfen sie nicht an der Politik teilnehmen."
 soldiers:1 "@soldiers! $soldiers_no_icon$"
 soldiers_only_icon:1 "@soldiers!"
 soldiers_no_icon:1 "Dienstleistungen"
 soldiers_desc:0 "Soldaten und Matrosen bilden den Großteil des Militärpersonals der Nation. Sie richten sich gemeinsam politisch an ihre Rolle als Teil der Streitkräfte."
 machinists:0 "@machinists! $machinists_no_icon$"
 machinists_only_icon:0 "@machinists!"
 machinists_no_icon:0 "Maschinen"
 machinists_desc:0 "Arbeiter mit stabilen Arbeitsmaschinen in Manufakturen, Minen, mechanisierten Betrieben und anderen Sektoren. Politisch neigen sie zu einer treibenden Kraft in den Gewerkschaften."
  
 ACADEMICS_QUALIFICATIONS_DESC:0 "Nur Pops mit ausreichend [concept_literacy] können zu #v $academics$x id=3/> werden. Potentialerhöhungen mit größer [concept_literacy] und [concept_wealth]. Pops, deren [concept_culture] niedrig [concept_acceptance] haben, nehmen eine viel längere Zeit. #v $clerks$x id=10/> und #v $aristocrats$x id=13/> haben eine besonders einfache Zeit zu #v $academics$x id=16/>"
 ARISTOCRATS_QUALIFICATIONS_DESC:0 "Nur Pops mit ausreichend [concept_wealth] können zu #v $aristocrats$x id=3/> werden. Potentialerhöhungen mit größer [concept_wealth] und in geringerem Maße [concept_literacy]. Pops, deren [concept_culture] niedrig [concept_acceptance] haben, nehmen eine viel längere Zeit. #v $officers$x id=10/> und #v $bureaucrats$x id=13/> haben eine besonders einfache Zeit zu #v $aristocrats$x id=16/>"
 BUREAUCRATS_QUALIFICATIONS_DESC:0 "Nur Pops mit ausreichend [concept_literacy] können zu #v $bureaucrats$x id=3/> werden. Potentialerhöhungen mit größer [concept_literacy]. Pops, deren [concept_culture] niedrig [concept_acceptance] haben, nehmen eine viel längere Zeit, während es für die beiden [concept_culture] und [concept_religion] mit hoch $concept_acceptance$ #v #v1/>x id=12/>==============="
 CAPITALISTS_QUALIFICATIONS_DESC:0 "Nur Pops mit ausreichend [concept_wealth] können zu #v $capitalists$x id=3/> werden. Potentialerhöhungen mit größer [concept_wealth] und [concept_literacy]. Pops, deren [concept_culture] niedrig [concept_acceptance] haben, nehmen eine viel längere Zeit. #v $shopkeepers$x id=10/> und #v $engineers$x id=13/> haben eine besonders einfache Zeit zu #v $capitalists$x id=16/>"
 CLERGYMEN_QUALIFICATIONS_DESC:0 "Nur Pops mit ausreichend [concept_literacy] können zu #v $clergymen$x id=3/> werden. Potentialerhöhungen mit größer [concept_literacy]. Pops, deren [concept_religion] niedrig [concept_acceptance] haben, nehmen eine viel längere Zeit, während es für diejenigen von [concept_religion] mit hoch $concept_acceptance$ #v $academics$x id=11/> und #v $aristocrats$x id=14/>"
 CLERKS_QUALIFICATIONS_DESC:0 "Jeder Pop kann #v $clerks$>x id=2/> werden. Potentialerhöhungen mit größer [concept_literacy] #v $laborers$x id=6/> haben eine besonders einfache Zeit, die #v $clerks$x id=9/> wird."
 ENGINEERS_QUALIFICATIONS_DESC:0 "Nur Päckchen mit ausreichend [concept_literacy] können zu #v $engineers$x id=3/> werden."
 FARMERS_QUALIFICATIONS_DESC:0 "Jeder Pop kann #v $farmers$>x id=2/> werden. Potenzielle Erhöhungen mit größer [concept_wealth] #v $peasants$x id=6/> und #v $laborers$x id=9/> haben eine besonders einfache Zeit zu #v $farmers$x id=12/>"
 MACHINISTS_QUALIFICATIONS_DESC:0 "Pops mit minimalem [concept_literacy] können zu #v $machinists$x id=3/> werden. Potenzielle Erhöhungen mit größer [concept_literacy] #v $laborers$x id=7/> haben eine besonders einfache Zeit #v $machinists$x id=10/>"
 OFFICERS_QUALIFICATIONS_DESC:0 "Nur #v $soldiers$x id=>=2/ oder Pops von [concept_culture] mit hoch genug [concept_acceptance] können #v $officers$x id=7/> werden. Potenzielle Erhöhungen mit größer [concept_literacy] #v $aristocrats$>x id=11/> haben eine besonders einfache Zeit, die #v $officers$x id=14/> wird."
 SHOPKEEPERS_QUALIFICATIONS_DESC:0 "Nur Pops mit einigen [concept_wealth] können zu #v $shopkeepers$x id=3/>. Potentieller Anstieg mit größer [concept_wealth] <x id=5/ $clerks$x id=7/>x und #v $farmers$x id=10/> haben eine besonders einfache Zeit"
