pm_no_public_housing_desc: "Der Zustand bietet keinen Gehäuseträger. Stadtzentren produzieren nur die Immobilien, die durch private Marktaktivitäten erzeugt werden."
 
pm_the_projects: "Die Projekte"
pm_the_projects_desc: "Staatsfinanzierte Hochdichte-Turmblöcke und Mietwohnungen. Basic, funktional und schnell aus Holz und vorgefertigten Materialien gebaut. Die Immobilienleistung steigt deutlich an, da der Zustand zu einem großen Konstrukteur wird."
 
pm_affordable_construction: "Erschwinglicher Bau"
pm_affordable_construction_desc: "Ein umfassendes öffentliches Wohnprogramm mit Qualitätsbau — Stahlrahmenbauten, ordentliche Fundamente, langlebige Materialien. Die Immobilienproduktion steigt deutlich an. Ingenieure und Bürokraten verwalten das Erweiterungsprogramm."
 
pm_housing_for_all: "Gehäuse für alle"
pm_housing_for_all_desc: "Universalgehäuse im Maßstab geliefert. Der Staat baut und pflegt hochwertige Wohnungen für alle Bürger, die erhebliche Baueingänge benötigen. Die Immobilienleistung erreicht ihr Maximum. Eine große Belegschaft von Arbeitern, Ingenieuren und Bürokraten unterstützt das Programm."
