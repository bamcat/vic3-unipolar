   #hereditary_aristocracy: "Hereditary Aristocracy"
  # Categories
  # Culture Technology
  # Economy Technology
  # Military Technology
  ### Technology Tooltips
  ##lenders_of_last_resort: "Lenders of Last Resort"
  ##lenders_of_last_resort_desc: "State-owned central banks are large enough to come to the rescue of smaller commercial banks, such as during bank runs. This can prevent a financial crisis spreading to other sectors of the economy. Often, even the promise of rescue in times of difficulty is enough to prevent bank runs occurring in the first place. Some 'critics' claim that such a promise will encourage risky behavior by the commercial banks, but these 'critics' are surely just anarchists looking to wreck the nation's economic security, as bankers are some of the most trustworthy people to walk the halls of power."
  ##limited_liability: "Limited Liability"
  ##limited_liability_desc: "A limited liability company draws a legal distinction between the company and its owners. This helps prevent the bankruptcy of a company ruining the personal lives of the investors, as creditors will not try to haul off the furniture of failed businessmen to recoup losses. This makes investing less risky, if perhaps less satisfying to watch from afar. As a separate legal entity, the company has its own finances that must be audited and taxed."
  ##marketing_desc: "Promotional schemes to grab more market share or create a new market from scratch were devised by Josiah Wedgwood, leader of the expanding pottery industry at the dawn of the Industrial Revolution."
  ##paper_money: "Paper Money"
  ##paper_money_desc: "A kind of promissory note issued by a bank, paper money allows private citizens to move and exchange large volumes of currency without the danger and discomfit of gold or silver coins which cannot be divided and are heavy to carry. Thus, commercial exchanges are easier and safer."
  ##regulated_private_notes: "Regulated Private Notes"
  ##regulated_private_notes_desc: "Bankers realized hundreds of years ago that their customers only rarely demand back their deposits all at once. By issuing loans in excess of their reserves in the form of private bank notes, bankers could make even more money from interest. Unfortunately, when all the bank's customers do demand their deposits at once, there will not be enough reserves. With better communications technology, these 'bank runs' become more frequent. To prevent bank runs, governments can restrict the issuance of private notes only to banks that meet certain criteria of fiduciary responsibility, such as being close personal friends to the finance minister."
  #alcohol: "Alcohol"
  #alcohol_desc: "An ancient technology, presumably discovered when a tribesman left some grain in a puddle and decided to drink it after a few months had passed, alcohol became central to the discipline of alchemy, and continues to serve men of reason in the field of chemistry in various processes, some of which do not involve drinking it."
  #atomic_theory_of_matter: "Atomic Theory of Matter"
  #atomic_theory_of_matter_desc: "Observations in chemistry seem to have disproven the notion held by supporters of phlogiston that matter is composed of the three fundamental essences of solidity, fluidity and inflammability. Air is not merely a void into which phlogiston flows during combustion - it contains oxygen, which combines with other matter during chemical reactions."
  #bankruptcy_law: "Bankruptcy Law"
  #bankruptcy_law_desc: "Having a legal framework for a company to declare bankruptcy allows investors and creditors to try to recoup losses via liquidation of assets. This makes investment less risky."
  #building_societies: "Building Societies"
  #building_societies_desc: "Originally set up within communities to help new families raise loans with which to buy homes and then disbanded once the members had all satisfied their requirements, building societies can also be permanent financial institutions that specialize in cheap mortgages."
  #census: "Census"
  #census_desc: "Knowing how many people we have in our country and roughly were they live is important so we know where to spend out money and how many men we will have if we have to fight. Should we be involved in that grubby business of having our lower orders actually having representation I suppose it will have a use for that as well."
  #chemical_batteries: "Chemical Batteries"
  #chemical_batteries_desc: "Electricity can be generated by exploiting the difference in charge as electrolytes pass through oxidation and reduction cells containing copper and zinc cathodes and annodes. Early experiments in this field took the form of a series of jars which had the appearance of a battery of artillery, hence the name."
  #civil_service: "Civil Service"
  #civil_service_desc: "The idea that the government should have a body of men on which they rely on to carry out administration is neither new nor necessarily efficient. The radical idea that people should be selected for these positions on merit and ability and that they should keep their positions if the government is changed are radical and leads to greater efficiency."
  #clinical_thermometer: "Clinical Thermometer"
  #clinical_thermometer_desc: "The mercury thermometer had been around since the mid 18th century. Its use for medical purposes were limited as they tended to be large (over a foot long) and could take over 20 minutes to measure someone's temperature. Now we have made the thermometer smaller and it only takes a few minutes to get a reading, making it truly useful for doctors."
  #commercial_banks: "Commercial Banks"
  #commercial_banks_desc: "Businesses need various financial services to operate normally. Payroll at the end of the month might require a short loan to cover a temporary shortfall. Expanding the business might likewise require borrowing, especially if the business is a limited liability company rather than a personal venture. Commercial banks offer financial services to these companies, as opposed to wealthy private individuals, middle-class savers or professional investors."
  #cooperatives: "Co-Operatives"
  #cooperatives_desc: "Intended as a mutually beneficial organization to help small businesses and workers buy basic necessities, a co-operative tends to be run democratically by its members to achieve social good rather than pure profit."
  #credit_unions: "Credit Unions"
  #credit_unions_desc: "Rather than being operated for the profit of an owner or shareholders, credit unions are a financial institution which tries to improve the welfare of its members through access to credit. They tend to be run democratically, with each member having a vote on the director of the credit union."
  #customs_tariffs: "Customs Tariffs"
  #customs_tariffs_desc: "Tariffs are a very important weapon in a government's arsenal. They can be used both to raise revenue and to 'guide' merchants and businesses into making choices beneficial to the national interest, as determined by the government. Tariffs can be charged on entry into a country, for the use of port facilities, or on the price of imported or exported goods. One important use for tariffs is in protecting native industries against more efficient foreign companies, which can give domestic firms time to catch up with their rivals abroad."
  #department_stores: "Department Stores"
  #department_stores_desc: "Having one large store that sells a huge variety of goods can be more convenient for customers and gives the retailer more buying-power over the distribution chains."
  #distribution_channels: "Distribution Channels"
  #distribution_channels_desc: "Companies can be structured to sell goods in a number of ways. Raw materials are generally sold to other industries; industries might then sell manufactured goods to wholesalers such as brokers; wholesalers then sell goods to retailers such as specific shops or chains of shops, and the retailer then sells the goods to the final customer. Innovations in this area include factory or outlet stores, which sell goods directly to customers from the factory complex, such as to workers and their families and community."
  #enclosure_acts: "Enclosure Acts"
  #enclosure_acts_desc: "Enclosure is the process of taking small strips of peasant land, passed down from father to son since the beginning of feudalism, and 'combining' them under one owner via Acts of Parliament. By merging these subsistence plots into enclosed fields, arable land can be turned into pasture, capital goods such as machinery can be invested in, and many small surpluses can be merged into a significant profit. Where the landless peasants go is up to them - am I my brother's keeper?"
  #espionage: "Espionage"
  #espionage_desc: "Know thy enemy. Knowledge of what is going on in places that could be hostile to us is vital if we are going to keep out country safe. This can be in the form of the mundane, like ensuring proper maps exist of areas we may end up being at war in to the significant like enemy forces and plans."
  #gold_standard: "Gold Standard"
  #hereditary_aristocracy_desc: "As a society becomes more productive enough food can be generated to allow people to specialize and do things that do not require you to farm. A military caste to protect yourself from hostile neighbors is a natural development and eventually they will entrench their position and hereditary aristocracy is born."
  #insurance: "Insurance"
  #insurance_desc: "Insurance against loss of property has existed for many hundreds of years, being especially important for merchant vessels traveling overseas. As global trade becomes more prevalent, the need for more secure maritime insurance increases. Lloyd's of London began as a specialist for maritime insurance but has expanded into other markets such as insuring properties against fire damage."
  #malthusianism: "Malthusianism"
  #malthusianism_desc: "Population is increasing much faster than our food supply. We must face the fact that if we allow this to continue we will face a catastrophe for our people. Further more we must face the face any such catastrophe will hurt the lower classes the most. The Tory ideal of paternalism is not good nor noble but instead will lead to a greater catastrophe on the least fortunate."
  #manifest_destiny: "Manifest Destiny"
  #manifest_destiny_desc: "If we are to spread our civilization to those less fortunate to have we must accept the fact that we have been uniquely blessed with virtues and institutions that others simply do not have. We have a mission to redeem the less fortunate by remaking them in our own image. It is no more that our destiny to do this."
  #oceanic_cablelaying: "Oceanic Cablelaying"
  #oceanic_cablelaying_desc: "With the technology of the telegraph, thought soon turned to how to lay a cable under bodies of water. Although it proved not technically difficult to lay cables of short stretches of water (like bays and straits), the wide oceans proved a greater challenge. Good news - after several false starts we have successfully mastered the techniques to lay such a cable so no longer must we rely on the good will of others."
  #ophthalmoscope: "Opthalmoscope"
  #ophthalmoscope_desc: "'every eye could be made luminous if the axis from a source of illumination directed towards a person's eye and the line of vision of the observer were coincident', this discovery revolutionized the treatment of eye problems. Creating a hand held device with a mirror that could shine the light, the ophthalmoscope, was made the doctor's life a lot easier."
  #positivism: "Positivism"
  #positivism_desc: "We we consider what knowledge is we know that there is certain knowledge. Information that comes from sensory experience and  then interpretation comes through logic and reason is the exclusive source of certain knowledge. We can extend this from the physical world to societies as a whole. Societies operate under general laws which if we took the time to analyze we would understand. Theology must be rejected because faith by its very nature denies reason and verification."
  #postal_banks: "Postal Banks"
  #postal_banks_desc: "Rural and otherwise isolated communities may not have access to a local bank branch. In such cases, a postal bank can operate to offer them financial services, such as savings and a current account, without the need to travel into a town or city."
  #savings_banks: "Savings Banks"
  #silver_standard: "Silver Standard"
  #vertical_filing_cabinet: "Vertical Filing Cabinet"
  #vertical_filing_cabinet_desc: "Gone but not forgotten"
 admiralty:0 "Modernes Radar"
 admiralty_desc:0 "Die Admiralität ist ein komplexes System von Rängen verbunden durch eine starre Kette von Befehl, um die Marine Arbeit effizienter zu helfen."
 anaesthetics:0 "Anästhesie"
 anaesthetics_desc:0 "Anästhetiken sind Beruhigungsmittel oder Schmerzmittel, die während der Operation verwendet werden, um zu verhindern, dass Patienten die Messer und invasive Prodding des medizinischen Personals fühlen, die zersetzt werden könnten."
 anarchism:0 "Marktsozialismus"
 anarchism_desc:0 "Der Marktsozialismus ist eine Art Wirtschaftssystem, das das soziale Eigentum an den Produktionsmitteln im Rahmen einer Marktwirtschaft einschließt. Es gibt verschiedene Modelle für ein solches System, in der Regel kooperative Unternehmen und manchmal eine Mischung, die öffentliche oder private Unternehmen umfasst."
 aniline:0 "Algorithm für Machine-Learning"
 aniline_desc:0 "ein Verfahren oder eine Reihe von Regeln, die bei Berechnungen oder anderen Problemlösungsoperationen, insbesondere durch einen Computer, zu beachten sind. Verwendet von Social Media-Unternehmen für die Beurteilung der Wünsche des Verbrauchers."
 anti_clericalism:0 "Anti-Klerik"
 anti_clericalism_desc:0 "Machtverderber und religiöse Institutionen sind nicht mehr immun gegen diese Korruption als andere. Sie können beanspruchen, den Massen Heile zu bieten, sondern den Versuch, ihre eigenen Nester zu federn und die Rechte denen zu leugnen, die sie für unwürdig halten. Wir müssen den Einfluss der organisierten Religion von unserer öffentlichen Sphäre wegfegen und diese Materie als eine Wahl für die Unbeleuchteten lassen."
 antibiotics:0 "Krebserkrankungen"
 antibiotics_desc:0 "Gene Editing ermöglicht die Erstellung von Genen, die für Krebs und andere Krankheiten unannehmbar sind."
 antiseptics:0 "Antiseptika"
 antiseptics_desc:0 "Die Wissenschaft hat festgestellt, dass die Exposition gegenüber Hitze Keime zerstören wird. Das Problem ist, dass dies keine gültige Lösung ist, wenn es um lebendes Gewebe geht. Als jedoch Experimente, in denen Wunden mit Pads bedeckt waren, eine Lösung von Phenol getränkten, sahen wir Zwischenfälle von Gangren dramatisch ab. Diese Wissenschaft der Antiskeptiker wurde geboren."
 arc_welding:0 "Interplanetäre Kolonisierung"
 arc_welding_desc:0 "Die Kolonisierung verschiedener Planeten"
 army_reserves:0 "Essen, fertig"
 army_reserves_desc:0 "Ein Meal-Ready-to-Eat (MRE) ist eine militärische Ration für eine lange Haltbarkeit, mit einer hohen Vielfalt an Lebensmitteloptionen."
 art_patronage:0 "Kunstpatronin"
 art_patronage_desc:0 "Kunst ist nicht frei und Kunst und Kultur zu entwickeln, die Sie brauchen, um ein Interesse zu nehmen und Kunst zu unterstützen. Im Gegenzug dafür gewinnen sie Ansehen für so schöne Dinge um sie herum."
 art_silk:0 "Künstliches Leben"
 art_silk_desc:0 "Kreieren von Organismen mit synthetischen Genomen oder Entwerfen von Organismen mit völlig neuen, unnatürlichen Eigenschaften. Synthetische Genome wurden verwendet, um neue Lebensformen von Grund auf zu schaffen, wie das erste synthetische Bakterium von Craig Venter und Team im Jahr 2010."
 artificial_fertilisers:0 "Künstliche Dünger"
 assembly_line:0 "Montagelinie"
 assembly_line_desc:0 "Durch die Verschlankung des Prozesses des Bauens von Dingen, so dass jede Aktion richtig nacheinander durchgeführt wird, kann eine viel effizientere Fabrik gemacht werden."
 atmospheric_engine:0 "Saubere Energie"
 atmospheric_engine_desc:0 "Saubere Energieerzeugungsverfahren, wie Windmühlen, ermöglichen die Energieerzeugung ohne Verschmutzung"
 automatic_bottle_blowers:0 "Mycoremediation"
 automatic_bottle_blowers_desc:0 "Dies beinhaltet die Verwendung von Pilzen zur Abbau von Umweltschadstoffen. Fungi kann verwendet werden, um gefährliche Materialien, wie Erdölprodukte und industrielle Lösungsmittel abzubrechen."
 battlefleet_tactics:0 "Spacefleet-Battlefleet Tactics"
 battlefleet_tactics_desc:0 "Die Bedienung einer großen Schlachtflotte kann eine schwierige Aufgabe sein. Durch das Üben und Lernen bestimmter Taktiken als Flotte kann eine größere Leistung erreicht werden."
 battleship_tech:0 "Guided-Drone Destroyer"
 battleship_tech_desc:0 "Ultra-massive Schlachtschiffe in der Lage, riesige Sümpfe des Ozeans zu sprengen"
 bessemer_process:0 "Polymere"
 bessemer_process_desc:0 "Synthetische Kleidung und Stoffe ermöglichen die Massenproduktion von gemeinsamen Waren für die weniger bedauerlichen."
 bessemer_steel:0 "Bessemer Stahl"
 bessemer_steel_desc:0 "Der Bessemer Prozess strahlt kalte Luft in geschmolzenes Roheisen, brennt aus Kohlenstoff, Silizium und Mangan und schafft milden Stahl. Dies ist nicht so hochwertig, wie es in Tiegeln hergestellt wird, aber es ist weitaus billiger, so dass die Verwendung von Eisenerz niedrigerer Qualität und ermöglicht die Massenproduktion von Bahnlinien und Stahlbeton."
 biological_determinism:0 "Biologische Bestimmung"
 biological_determinism_desc:0 "Die Untersuchung von Genetik und Erbschaft in der Natur eröffnet Fragen, wie viel menschliches Verhalten von der Biologie bestimmt wird."
 feminism:0 "Umweltökonomie"
 feminism_desc:0 "Umwelt- oder Umweltrechte sind eine breite Philosophie, Ideologie und soziale Bewegung über die Unterstützung von Leben, Lebensräumen und Umgebung."
 blast_furnaces:0 "Blastöfen"
 blast_furnaces_desc:0 "Ein Hochofen wird verwendet, um metallurgischen Prozessen, wie der Erzschmelzung, ursprünglich mit Hand- oder Wasser-Rad-Balge, zusätzlichen Sauerstoff zuzusetzen. Dadurch erreicht der Ofen noch höhere Temperaturen als ein offener Luftofen, brennt Verunreinigungen ab und ermöglicht Legierungen aus exotischen Metallen. Der Hochofen eignet sich besonders für die Herstellung von Roheisen, die dann mit fortschrittlicheren Verfahren zu Schmiedeeisen oder Weichstahl hergestellt werden können."
 bolt_action_rifles:0 "Die Zukunft der Welt"
 bolt_action_rifles_desc:0 "Autonome Soldaten wollten beim Ausbruch des Krieges das Leben retten."
 chemical_bleaching:0 "Personal Computer"
 chemical_bleaching_desc:0 "Der Personalcomputer entstand Mitte der 1980er Jahre, mit Produkten wie dem Apple II, Macintosh und dem IBM PC, wodurch Computer für Einzelpersonen und kleine Unternehmen zugänglich gemacht werden."
  # bone_china: "Bone China"
  # bone_china_desc: "Bone China is a form of porcelain which in part is made from bone ash, the greater strength of this type of porcelain makes it rather valuable."
 # artillery: "Artillery"	// There is already a loc key for this in Goods, require prefix to support unique localization
 artillery_desc:0 "Langstrecken-Bombardierung mit schweren Munition einschüchtert und zerstreut feindliche Kräfte, ohne Ihre eigenen Truppen zu riskieren. Ungenau, langsam und teuer, dennoch ein entscheidender Bestandteil in jeder modernen Armee."
 breech_loading_artillery:0 "Raketenbatterie mit langer Reichweite"
 breech_loading_artillery_desc:0 "Langstreckenraketenbatterien wie die HIMARS erleichtern die Zerstörung von Zielen weit ins Ausland."
 tech_bureaucracy:0 "Soziale Liberalismus"
 tech_bureaucracy_desc:0 "Der Sozialliberalismus ist eine Ideologie, die sich für einen freien Markt mit starkem Einfluss und Kontrolle der Regierung einsetzt, um das Unglück zu schützen."
 centralization:0 "Autoritärer Kapitalismus"
 centralization_desc:0 "In Verbindung mit dem Staatskapitalismus, einem System, in dem der Staat kommerziell tätig ist, verbindet der autoritäre Kapitalismus das Privateigentum und das Funktionieren der Marktkräfte mit Einschränkungen der Unzufriedenheit."
 camera:0 "Starlink"
 camera_desc:0 "Starlink ist eine Satelliten-Internet-Konstellation betrieben von Starlink Services, LLC, einem internationalen Telekommunikationsanbieter, der eine hundertprozentige Tochtergesellschaft des amerikanischen Luftfahrtunternehmens SpaceX ist"
 canals:0 "Kanäle"
 canals_desc:0 "Küsten- und Flussschiffe sind eine sehr effiziente Methode des Transports von Waren. Das Einweichen von Kanälen in das Innere eines Landes erweitert die Abdeckung dieser Räume, obwohl es eine teure Vorgabe sein kann, wenn verschiedene Höhen durch Schleusensysteme überbrückt werden müssen."
 canneries:0 "Lebensmittel"
 canneries_desc:0 "Ultraverarbeitete Lebensmittel (UPFs) sind Lebensmittel, die durch den Einsatz von industriellen Prozessen und die Zugabe von Inhaltsstoffen, die in der Regel nicht in einer Hausküche gefunden wurden, deutlich von ihrer ursprünglichen Form verändert wurden."
 canning_jars:0 "Canning Jars"
 canning_jars_desc:0 "Die Armeen der Französischen Revolution benötigten innovative Lösungen für ihre Versorgungsprobleme. Eine Lösung bestand darin, innerhalb von Glasdosen Lebensmittel zu kochen, um zu verhindern, dass kranke Humor und Miasma mit dem Inhalt vermischt werden und dadurch die Rationen verwöhnen. Moltenwachs wird in den Mund des Glases gegossen, um als Dichtung gegen die Außenwelt zu wirken."
 canning_machines:0 "Canning Maschinen"
 canning_machines_desc:0 "Frühe Dosenproduktion fehlte Automatisierung. Dosen wurden von Hand gerollt und gelötet. Der Einsatz von Maschinen zur schnellen Verzinkung in Dosen verbessert die Standards und erhöht den Durchsatz."
 carrier_tech:0 "Laserboot"
 carrier_tech_desc:0 "Laserboote sind Gefäße, die einen Hochleistungslaser felden, um eingehende Drohnen schnell zu beseitigen."
 catalytic_contact_process:0 "Katalytischer Kontaktprozess"
 catalytic_contact_process_desc:0 "1831 erfand der britische Essighändler Peregrine Phillips ein Verfahren zur Herstellung von konzentrierterer Schwefelsäure unter Verwendung von Platin als Katalysator. Obwohl nicht besonders nützlich für die Herstellung von Asche Soda oder Dünger, wurde dies bald ein Bolon zur organischen Farbstoffproduktion."
 chemical_isolation:0 "Chemische Isolierung"
 chemical_isolation_desc:0 "Chemikalien können auf vielfältige Weise gereinigt werden, wie Destillation, Filtration und Eindampfen. Die Qualität des Reinigungsverfahrens wird offensichtlich die Qualität des Isolats beeinflussen."
 chemical_synthesis:0 "Chemische Synthese"
 chemical_synthesis_desc:0 "Der Hundeurin wurde 1828 vom deutschen Chemiker Friedrich Wöhler berühmt synthetisiert. Dies begann, die Grenzen zwischen organischer und anorganischer Chemie zu verschwimmen, und da mehr Chemikalien synthetisiert werden, öffnen sich neue industrielle Prozesse."
 chemical_warfare:0 "AI-Terrorismus"
 chemical_warfare_desc:0 "Bestimmte chemische Kombinationen bewirken negative oder sogar tödliche Auswirkungen, wenn Menschen ihnen ausgesetzt sind. Die Weaponisierung bringt einen ganz neuen schrecklichen Aspekt in den Krieg."
 civilizing_mission:0 "CRISPR Gene Editing"
 civilizing_mission_desc:0 "Genbearbeitung durch CRISPR ermöglicht es Menschen, neue Organe zu wachsen."
 colonization:0 "Der Ultraschall"
 colonization_desc:0 "Ende des 20. Jahrhunderts Fortschritte in der Organtransplantation, medizinische Bildgebung durch MRT- und CT-Scanning und optische Maschinen erlaubt für mehr spezialisierte und umgekehrte Behandlungen für individuelle Bedingungen"
 color_photography:0 "Farbfotografie"
 color_photography_desc:0 "Frühe Technik, Fotos in voller Farbe zu erfassen, basierend auf Einblicken, wie Licht vom Auge wahrgenommen wird. Durch die effektive Aufnahme von drei Bildern durch verschiedene Farbfilter können diese zu einem Bild kombiniert werden, das die ursprünglichen Farben wiedergibt."
 combination_acts:0 "Kombinationsgesetze"
 combination_acts_desc:0 "Männer, die sich im Geheimen treffen und sich gegenseitig Eids schwören, sind eine Bedrohung für die Sicherheit des Staates und eindeutig ein Mittel für den radikalen Jacobin, zum Staat zu unterwerfen. Es könnte auch eine Bedrohung für unsere Fähigkeit sein, uns vor fremden Feinden zu verteidigen, weil die Arbeiter in einem kritischen Moment des Konflikts von Handlungsbedrohungen bedroht sind. Wir werden eine Reihe von Gesetzen bestehen, die es uns ermöglichen, dieses Verhalten für das Gemeinwohl zu regeln."
 combustion_engine:0 "Nanobeschichtungen"
 combustion_engine_desc:0 "Diese werden auf verschiedenen Oberflächen aufgebracht, um sie widerstandsfähiger gegen Korrosion, Verschleiß und Flecken zu machen. Selbstreinigende Oberflächen und antibakterielle Nanobeschichtungen werden für Anwendungen im Gesundheitswesen, in der Elektronik und im Bau entwickelt."
 central_planning:0 "Digital Governance"
 central_planning_desc:1 "Erlaubt der Regierung, durch verschiedene sichere Computersysteme laufen."
 compound_microscopes:0 "Mischmikroskope"
 compound_microscopes_desc:0 "Die Linsen, die in der Optik verwendet werden, erfordern sehr feine Glasherstellung Fähigkeiten. Eine Innovation in diesem Bereich besteht darin, zwei Objektive zu verwenden, die auf ein Objekt fokussiert sind und die andere auf das erste Objektiv fokussiert ist, um die Vergrößerung zu erhöhen. Ein solches Mikroskop kann zum Betrachten lebender Bakterien verwendet werden."
 compression_ignition:0 "Energie aus Abfall"
 compression_ignition_desc:1 "Durch die Umwandlung von in Deponien gespeicherten Abfällen in Energie kann unsere Welt hohe Strommengen erzeugen"
 concrete_dockyards:0 "Künstlicher Prüfbereich"
 concrete_dockyards_desc:0 "Testbereiche, die innerhalb von AI vollständig generiert werden."
 concrete_fortifications:0 "Zukunftserweiterungen"
 concrete_fortifications_desc:0 "Durch die Einführung von Beton in Befestigungsanlagen ist es möglich, starke Einspannpositionen sehr schnell zu machen."
 condensed_milk:0 "Kondensierte Milch"
 condensed_milk_desc:0 "Normalerweise muss Milch schnell verbraucht werden, nachdem sie aus einer Rindermammage extrudiert wurde. Durch Absenken des Drucks innerhalb eines Behälters, wie einer Vakuumwanne, verdampft der Wassergehalt der Milch und die kondensierte Milch kann dann verkannt und verkauft werden."
 conspicuous_consumption:0 "Verbrauch"
 conspicuous_consumption_desc:0 "Reichtum hat ein Prestige alle seine eigenen. Die Darstellungen des Reichtums können einen prestigeträchtiger erscheinen lassen und helfen, durch die sozialen Klassen voranzukommen und neue Möglichkeiten für den sozialen Bergsteiger wie Kontakte mit Geschäftsleuten und Politikern zu eröffnen. In einer materialistischen Gesellschaft helfen Frivolitäten und Extravaganz paradoxerweise, reicher zu werden."
 conveyors:0 "Automatisierte Faktoren"
 conveyors_desc:0 "Durch die Anwendung der neuesten KI-Systeme ist es möglich, Plattformen zu schaffen, die Waren entlang ihnen bewegen, ohne die menschliche Arbeit zu verwenden."
 cotton_gin:0 "Moderne Automobile"
 cotton_gin_desc:0 "Automobile ermöglichen den schnellen Transport von Menschen und Waren im gesamten Land."
 crucible_steel:0 "Rohstahl"
 crucible_steel_desc:0 "Produziert durch Wärme auf einen Steintiegel mit pulverisiertem Eisen und Holzkohle, wird diese kohlenstoffreiche Legierung als ähnlich wie 'Damaskus Stahl' gedacht, erstellt in Indien und Persia bis etwa 1750. Dieses Verfahren produziert Stahl von einer hohen Qualität, die für den Einsatz in Werkzeugen, Federn und anderen extraharten und teuren Gegenständen geeignet ist."
 law_enforcement:0 "Systemischer Rassismus"
 law_enforcement_desc:1 "Der systematische Rassismus ist eine Form institutioneller Diskriminierung, die auf Rasse oder ethnischer Gruppe basiert, und kann Politiken und Praktiken einschließen, die in einer ganzen Gesellschaft oder Organisation existieren, die dazu führen und einen weiterhin unlauteren Vorteil für manche Menschen und eine unlautere oder schädliche Behandlung anderer unterstützen."
 defense_in_depth:0 "KI-gesteuertes Targeting"
 defense_in_depth_desc:0 "Durch die Herstellung mehrerer Verteidigungslinien ist es möglich, den Feind auszubreiten und zu verlangsamen und manchmal sogar zu umhüllen."
 democracy:0 "Fall des Ostblocks"
 democracy_desc:0 "In den späten 1980er-ersten 1990er-Jahren führt eine Reihe von Veranstaltungen zum Zusammenbruch des Kommunismus in Osteuropa."
 distillation:0 "Geräte"
 distillation_desc:0 "Geräte sind die Verwendung von Öfen, Kühlschrankn, Mikrowellen, Mixern, Wasserkochern und anderen Haushaltsgegenständen, die in der Lebensmittelproduktion verwendet werden."
 divine_revelation:0 "Göttliche Offenbarung"
 divine_revelation_desc:0 "Die Grundlage aller Gesetze wird auf unseren heiligen Schriften abgeleitet. Nur durch den Gehorsam einer höheren Macht kann unsere Gesellschaft richtig bestellt und Stabilität garantiert werden."
 watertube_boiler:0 "Roboter"
 watertube_boiler_desc:0 "In Montagelinien, insbesondere in der Automobilindustrie, wurden Roboter eingeführt, um Präzision, Geschwindigkeit und Sicherheit zu verbessern."
 dreadnought_desc:0 "Drohnenträger, ähnlich wie die Flugzeugträger von heute, tragen Drohnenschwarmen und entfesseln verheerende Angriffe auf unsere Feinde."
 dreadnought_tech:0 "Drohne Träger"
 dynamite:0 "Tiefseebergbau"
 dynamite_desc:0 "Die Entwicklung von Tiefsee-Mining-Technologien entwickelte sich in den 2000er Jahren deutlich, da die Unternehmen begannen, die Gewinnung von wertvollen Mineralien (z.B. polymetallische Nodules, Seltenerdmetalle) aus dem Meeresboden zu erkunden."
 egalitarianism:0 "Krieg gegen den Terror"
 egalitarianism_desc:0 "Der Krieg gegen den Terror, offiziell der Globale Krieg gegen den Terrorismus (GWOT),[3] ist eine globale militärische Kampagne, die von den Vereinigten Staaten nach den Angriffen vom 11. September 2001 initiiert wurde."
 electric_arc_process:0 "Neuralink"
 electric_arc_process_desc:0 "Unternehmen wie Neuralink und Synchron entwickeln Gehirn-Computer-Schnittstellen, die eine direkte Kommunikation zwischen Gehirn und digitalen Geräten ermöglichen. Diese Schnittstellen könnten medizinische Behandlungen revolutionieren, einschließlich der Unterstützung von Personen mit der Paralyse-Regain-Bewegung, die Verbesserung der kognitiven Fähigkeiten und bietet neue Möglichkeiten, mit der Technologie zu interagieren."
 electric_railway:0 "Messe Öffentliche Verkehrsmittel"
 electric_railway_desc:0 "Mit Autos, die nicht dauerhaft sind, können öffentliche Verkehrsmittel zwischen Städten laufen en-mass"
 electrical_generation:0 "Quantum Computing"
 electrical_generation_desc:0 "Quantum-Computer werden für komplexe Probleme erwartet, die derzeit für traditionelle Computer unbrauchbar sind, darunter: Drogenentdeckung, Materialwissenschaftssimulationen, fortgeschrittene Kryptographie, Wettervorhersage, Finanzmodellierung, künstliche Intelligenzentwicklung und Optimierungsprobleme in Bereichen wie Logistik und Energieproduktion, vor allem durch die Nutzung ihrer Fähigkeit, große Datenmengen zu verarbeiten und Probleme mit vielen Variablen gleichzeitig durch Quantenüberlagerung und Verschränkung zu lösen."
 elevator:0 "Elevation Pods"
 elevator_desc:0 "Transport Pods, ähnlich wie Aufzüge, die sich mit hohen Geschwindigkeiten bewegen können."
 empiricism:0 "World Wide Web"
 empiricism_desc:0 "Das World Wide Web (WWW oder einfach das Web) ist ein Informationssystem, das den Inhaltsaustausch über das Internet durch benutzerfreundliche Möglichkeiten ermöglicht, um Nutzern jenseits von IT-Spezialisten und Hobbyisten zu appellieren."
 enlightenment_thought:0 "Aufklärung Gedanken"
 enlightenment_thought_desc:0 "Im Zeitalter der Vernunft begannen alte Dogmen zu hinterfragen. Es wurde nicht mehr angenommen, dass 'Gott will es', und die Macht begann ihre Position in der Gesellschaft zu rechtfertigen. Sogar die absoluten Monarchen sahen das Ansehen dieser neuen Ideen, und die "Enlightened Despots" reformierten die Bildungs-, Rechts- und Wirtschaftssysteme Europas. Diese Reformen gingen jedoch nicht weit genug, und Denker wie John Locke, Voltaire, Jean-Jacques Rousseau und Thomas Paine führten einen Angriff auf die Einrichtung, die in Revolutionen in Amerika und Frankreich gipfelte, die selbst Liberale auf der ganzen Welt inspirierten."
 fascism:0 "Faschismus"
 fascism_desc:0 "Faschismus ist ein politisches System, in dem die Regierung strenge Kontrolle über alle Aspekte der Gesellschaft hat."
 field_works:0 "HESCO Barrier"
 field_works_desc:0 "HESCO Barriers können schneller als Sandbeutel errichtet werden und bieten mehr Schutz."
 film:0 "Direkte Propaganda"
 film_desc:0 "Mit Gehirnimplantaten kann Propaganda direkt in unsere Bevölkerung eingefügt werden"
 flash_freezing:0 "Portable Freeze-Dryer"
 flash_freezing_desc:0 "Tragbare Gefriertrockner für zivile Zwecke"
 floating_harbor:0 "Künstliche Inseln"
 floating_harbor_desc:0 "Künstliche Inseln sind künstliche Landmassen, in der Regel für militärische Mittel geschaffen"
 food_sterilisation:0 "Lebensmittel Sterilisation"
 food_sterilisation_desc:0 "Durch Versuch und Irrtum haben Geschäftsleute Methoden der Erhaltung von Lebensmitteln entdeckt, wie die Erhitzung von Milch in der Pasteurisierung oder seine Kondensation in dicken Sirup, die Beizung von Obst und Gemüse, und die Konservierung von Fleisch und Suppen. Der gemeinsame Faden unter all diesen Technologien ist die Beseitigung von Keimen aus der erhaltenen Nahrung, ein Konzept nicht vollständig verstanden, bis die Entdeckung von Bakterien unter Mikroskopen. Mit dem weit verbreiteten Verständnis dieser Ideen verbessern sich die Standards in der Lebensmittelindustrie und damit die Gesundheit der Öffentlichkeit."
 four_field_crop_rotation:0 "Vier Feld Crop Rotation"
 four_field_crop_rotation_desc:0 "Berühmt durch den Gutsbesitzer Charles 'Turnip' Townsend, die Verwendung von Stickstofffixierern, wie Rüben oder Klee, ermöglicht Farmland in ständigem Gebrauch zu bleiben, ohne erschöpft zu sein oder zu verlassen Fallow."
 fractional_distillation:0 "GVO"
 fractional_distillation_desc:0 "Genetisch veränderte Organismen, (GVO) sind künstliche Methoden zur Veränderung der Art, wie Pflanzen & Tiere wachsen & zum Zwecke der Lebensmittelproduktion erscheinen."
 fruit_jars:0 "Obst Jars"
 fruit_jars_desc:0 "Die Idee der Erhaltung von Fleisch und Suppe in Metalldosen hat in der Popularität gewonnen. Andere Arten der Lebensmittelkonservierung werden auch verbreitet, wie die Erhaltung von Obst und Gemüse in Beizflüssigkeiten oder sie in Marmeladen kochen."
 fulminates:0 "Fulminate"
 fulminates_desc:0 "Ein Füllmaterial ist ein Füllmaterial, das bei scharfem Schlag zündet. Solche Materialien umfassen Ionen von Quecksilber, Silber und Kalium. Sie wurden erst 1800 von Edward Charles Howard entdeckt, und ihre militärische Anwendung in Schlagkappensystemen wurde bald sichtbar."
 functionalism:0 "Funktionalisierung"
 functionalism_desc:0 "Eine theoretische Rahmenbeobachtungsgesellschaft als System von Komponenten, die durch die sozialen Funktionen definiert werden. Mit mechanischen und biologischen Systemen als Metapher betrachtet sie die Strukturen der Gesellschaft und ihre gegenseitige Abhängigkeit als Bestimmung ihrer Stabilität."
 gantry_cranes:0 "Schwere Krane"
 gantry_cranes_desc:0 "Schwere Krane sind groß genug, um die Breite eines Schiffes zu verlagern. Dies gibt ihnen eine Robustheit, die bedeutet, dass sie die schwersten Lasten anheben können, die ein Schiff möglicherweise tragen kann."
 general_staff:0 "Drohnen"
 general_staff_desc:0 "Drohnen sind unbemannte Luftfahrzeuge, die sowohl für militärische als auch für zivile Anwendungen verwendet werden können"
 germ_theory:0 "In den Warenkorb"
 germ_theory_desc:0 "Thucydides war die erste Person, die behauptete, dass Krankheiten von Mensch zu Mensch verbreitet werden könnten und seit der Antike glaubten wir, dass Miasmas die Ursachen für Krankheiten wie Cholera seien. Die Wissenschaft hat jedoch Provinz, dass Mikroorganismen, sogenannte Keime, für Krankheiten verantwortlich sind."
 gunpowder:0 "Gunpowder"
 gunpowder_desc:0 "Eine chemische Verbindung, bestehend aus Schwefel, Kohle und Nitrate, schwebt schnell zu einem Gas, das die Geschosse absenkt. Die Verbrennung hinterlässt große Mengen Rauch aus dem Schwefel und der Kohle, was Musketier zu einem schmutzigen und blendenden Geschäft auf dem Schlachtfeld macht. Gunpowder Gebühren haben auch mehr zivile Verwendung bei der Öffnung der Erde für Bergbau und Bau. Die Chinesen erfand Schießpulver tausend Jahre zuvor und nutzten es für Berühmtheit Feuerwerk und Belagerung Artillerie."
 gunsmithing:0 "Angriffsflache"
 gunsmithing_desc:0 "Angriffsgewehre kombinieren die Feuerkraft eines SMG und die Genauigkeit eines Gewehres, um eine leistungsfähige Kleinwaffenplattform zu schaffen."
 gymnastics:0 "Gymnastik"
 gymnastics_desc:0 "Für die Spartans Gymnastik bildete sich ein Teil der Ausbildung von euch Militärrekruten, und das Wort selbst ist seit den 1570er Jahren auf sportliche Übungen zu beziehen. Nun, obwohl wir erkennen, dass die Spartans auf etwas waren, um den Geist zu disziplinieren, den wir den Körper disziplinieren müssen. Pädagogische Pioniere haben eine Reihe von Übungen für Jungen auf verschiedenen Geräten entwickelt, um ihnen dabei zu helfen, selbstdisziplin zu entwickeln. Einige Radikale schlagen sogar vor, diese Übungen auf Mädchen zu verlängern."
 gyroscopes:0 "Gyroskope"
 gyroscopes_desc:0 "Ein Gyroskop wird durch die Kombination einer Reihe von Gimbals hergestellt, die einfach rotierende Stützen sind. Ein Gimbal dreht sich vertikal und ein weiteres horizontal, so dass das innerste unterstützte Objekt in jeder Richtung frei drehen kann. Gyroskope sind nützlich, um ein Objekt stabil zu halten, während seine Umgebung sich bewegt, wie ein magnetischer Kompass auf einem tossing Schiff."
 handcranked_machine_gun:0 "Anti-Drone-Systeme"
 handcranked_machine_gun_desc:0 "Verteidigungssysteme für die Erschießung billiger Drohnen."
 hydraulic_cranes:0 "Helicopter Carrier"
 hydraulic_cranes_desc:0 "Hubschrauber-Träger ermöglichen die logistische Unterstützung von Truppen"
 hydraulic_power:0 "Hydraulische Leistung"
 hydraulic_power_desc:0 "Wasserräder werden seit langem zum Mahlen von Getreide verwendet. Die Anpassung an andere industrielle Anwendungen, wie z.B. Powering-Maschinen, ist ein logischer Schritt nach vorne."
 hypodermic_syringes:0 "Hypodermic Syrings"
 hypodermic_syringes_desc:0 "Inokulationen wurden ursprünglich Patienten durch Öffnen der Haut und Reiben von Krankheitsmaterial in der Wunde gegeben. Die Idee, eine Hohlnadel zu verwenden, um Flüssigkeiten in einen Patienten einzuspritzen, ist offensichtlich hygienisch, und es hat auch den Vorteil, dass präzise Volumina vom Arzt verabreicht werden. Frühspritzen wurden aus Silber hergestellt, aber Glas wird immer beliebter, da Fertigungsprozesse verfeinert werden, so dass engere Nadeln hergestellt werden."
 idealism:0 "Ideal"
 idealism_desc:0 "Eine Reihe von Philosophien, die halten, dass unser Wissen davon abhängig ist, wie wir Dinge wahrnehmen, die uns einschränken, die Idee einer Sache zu kennen, anstatt das, was es tatsächlich ist."
 identification_documents:0 "Digitale Identifizierung"
 identification_documents_desc:0 "Digitale Identifikation ist die elektronische Darstellung einer Person, die es ihnen ermöglicht, auf Online-Dienste zuzugreifen, Kauf zu tätigen und mit anderen zu interagieren."
 impressionism:0 "Impressionismus"
 impressionism_desc:0 "Ein Kunststil konzentrierte sich auf Techniken, die das allgemeine visuelle Gefühl einer Szene rekrutieren. Das gleiche künstlerische Ehrgeiz, das Gefühl und die Erfahrung einer Situation wiederherzustellen, wurde auch in Kunstformen jenseits des Bildes angewendet."
 improved_fertilizer:0 "Mikroverkapselung"
 improved_fertilizer_desc:0 "Mikroverkapselung beinhaltet die Aufnahme von Wirkstoffen wie Vitaminen, Aromen und Probiotika in einer Schutzbeschichtung. Diese Technologie wurde in funktionellen Lebensmitteln weit verbreitet, um die Nährstoffversorgung, Haltbarkeit und die Stabilität sensibler Inhaltsstoffe zu verbessern, bietet neue Möglichkeiten in der Lebensmittelproduktion, einschließlich befestigter Lebensmittel und Getränke."
 international_trade:0 "Neoliberalismus"
 international_trade_desc:0 "Der Neoliberalismus unterscheidet sich vom Liberalismus insofern, als er die laissez-faire Wirtschaftspolitik nicht befürwortet, sondern ist hochkonstruktivistisch und befürwortet einen starken Staat, um marktähnliche Reformen in jedem Aspekt der Gesellschaft herbeizuführen."
 ironclad_tech:0 "Schlachtschiff des 21. Jahrhunderts"
 ironclad_tech_desc:0 "Schlachtschiffe aus dem 21. Jahrhundert sind in der Lage, riesige Raketenbombardierungen zu widerstehen."
 jeune_ecole:0 "Littorische Kampfschiff"
 jeune_ecole_desc:0 "Autonome Schiffe sind Boote, die im Wesentlichen Drohnen auf See sind. Darüber hinaus ist es möglich, durch viele kleinere Schiffe anstelle von einigen großen Schiffen ein gewisses Maß an Manövrierfähigkeit zu halten, das sonst unmöglich wäre."
 labor_movement:0 "Smartphone"
 labor_movement_desc:0 "Ein Smartphone, oft nur ein Telefon genannt, ist ein mobiles Gerät, das die Funktionalität eines traditionellen Mobiltelefons mit erweiterten Rechenfunktionen kombiniert."
 land_reform:0 "Landreform"
 land_reform_desc:0 "Landbesitz und Gesellschaft gehen Hand in Hand. Land ist die primäre Quelle und Reichtum und Status in jedem Land und damit, wer das Land zu besitzen bekommt, ist der, der Reichtum und Status hat. Wenn wir die Gesellschaft schaffen wollen, die wir wollen, müssen wir bereit sein, grundlegend zu verändern, wer das Land besitzt."
 lathe:0 "Produktionslinien"
 lathe_desc:0 "Eine Produktionslinie ist eine Baugruppe von Arbeitnehmern, die jeweils eine zugeordnete Aufgabe haben, die die Produktionsabläufe ermöglicht."
 lathes:0 "Drehmaschinen"
 lathes_desc:0 "Eine Drehmaschine ist ein Werkzeug, das das Material dreht, an dem das Werkzeug arbeitet, im Gegensatz zu einem Bohrer, der selbst gegen das Material gedreht wird. Dies pfeift das Material symmetrisch nach unten. Dies hat Anwendungen in vielen Branchen, von handwerklichen Kerzenhaltern bis zum Bohren von Artilleriestücken. Die frühen Drehmaschinen werden von Hand, von Pferd oder von Wasser-Rad angetrieben, je nach Umfang der Industrie."
 laws_of_physics:0 "Gesetze der Physik"
 laws_of_physics_desc:0 "Die Grundgesetze, die Körper in Bewegung regieren, lassen sich mit dem Einsatz eines Teleskops leicht beobachten. Sir Isaac Newton war ein Pionier in diesem Bereich, dank seiner Technologie eines hochwertigen reflektierenden Teleskops und der strengen Anwendung seiner Beobachtungen auf bestehende wissenschaftliche Vorhersagen von Johannes Kepler."
 crystal_glass:0 "Mikroprozessor"
 crystal_glass_desc:0 "Der Mikroprozessor ist das Herz des modernen Computers, so dass Computer kleiner, schneller und erschwinglicher werden. Es führte zur Entwicklung von Personalcomputern und zur schnellen Entwicklung der Technologie."
 automatic_machine_guns:0 "Autonomer Turm"
 automatic_machine_guns_desc:0 "Fortgeschrittene stationäre Revolver, die sich automatisch auf feindliche Ziele sperren können."
 malaria_prevention:0 "STEM-Zellen"
 malaria_prevention_desc:0 "Aufgrund der extremen Bedingungen im Raum sind Astronauten besonders anfällig für Infektionen, da kosmische Strahlung, Mikrogravität und psychische Belastung tendenziell dazu neigen, das menschliche Immunsystem zu gefährden"
 manufacturies:0 "Herstellung"
 manufacturies_desc:0 "Die Gilden kontrollierten die Methoden und Einstellung Praktiken, die ein Unternehmen verwenden könnte, begrenzen den Eintritt in die Arbeitskraft und fordern, dass nur hochqualifizierte und zertifizierte (von der Gilde, natürlich) Handwerker bestimmte Aufgaben erfüllen. Zunehmend verließen die Industriellen die Städte und gründeten neue Standorte der Innovation, frei von den exakten Standards und hohen Löhnen der Gildenmeister."
 mass_communication:0 "Handys"
 mass_communication_desc:0 "Massenkommunikation dies die einfache Verbreitung von Informationen mit Technologien wie dem Handy."
 mass_propaganda:0 "Autoedukation"
 mass_propaganda_desc:0 "Durch Chipimplantate können alle Informationen der Welt direkt an die Kinder unserer Nationen übermittelt werden."
 mass_surveillance:0 "Maß Direkte Demokratie"
 mass_surveillance_desc:0 "Erlaubt, dass jeder Bürger jederzeit über alles, über Gehirn-implantierte Mikrochips abstimmen kann."
 mechanized_farming:0 "Interplanetary-Base"
 mechanized_farming_desc:0 "Basen auf anderen Planeten"
 mechanized_workshops:0 "Smart Technologies"
 mechanized_workshops_desc:0 "Smart-Technologien sind Technologien, die nicht traditionell von Computern kontrolliert werden, sondern sind jetzt."
 military:0 "Militär"
 military_aviation:0 "Orbital Strike"
 military_aviation_desc:0 "Ein Orbitalstreik ist ein Satellit, der ein Hochenergieprojektil an einem Ziel auf der Erde feuert."
 mobile_armor:0 "Mecken"
 mobile_armor_desc:0 "Multi-Firepower-Platform (MFP) ist ein schweres Fahrzeug, ähnlich einem Tank, ausgestattet mit der neuesten Technologie zur Herausnahme autonomer Feinde"
 modern_nursing:0 "Stealth Aircraft"
 modern_nursing_desc:0 "Stealth-Flugzeuge sind Flugzeuge, die eine untere Radarsignatur aufweisen."
 modern_sewerage:0 "Kryptowährung"
 modern_sewerage_desc:0 "Eine Kryptowährung, Kryptowährung oder Krypto ist eine digitale Währung, die durch ein Computernetzwerk zu arbeiten, das nicht auf einer zentralen Behörde, wie einer Regierung oder Bank angewiesen ist, um es zu halten oder zu pflegen"
 currency_standards:0 "Online-Handel"
 currency_standards_desc:0 "Online-Shopping ist eine Form des elektronischen Geschäftsverkehrs, die den Verbrauchern erlaubt, direkt Waren oder Dienstleistungen von einem Verkäufer über das Internet mit einem Webbrowser oder einer mobilen App zu kaufen."
 monitor_tech:0 "AI-Schiff"
 monitor_tech_desc:0 "Schiffe, die vollständig von künstlicher Intelligenz kontrolliert werden."
 musical_instruments:0 "Musikinstrumente"
 musical_instruments_desc:0 "Musik ist ein wesentlicher Bestandteil der Entwicklung jeder Kultur und Kunst. In diesem Zusammenhang hat die Entwicklung musikalischer Instrumente eine Kultur zunächst einen Echoeffekt auf alle zukünftigen kulturellen Entwicklungen."
 napoleonic_warfare:0 "Proxy War"
 napoleonic_warfare_desc:0 "Proxy-Konflikte sind Kriege, die durch zwei gegensätzliche Mächte gekämpft werden, die über zwei schwächere Mächte gegen einander gekämpft werden."
 nationalism:0 "Terrorismus"
 nationalism_desc:0 "Wer bin ich? Es ist eine Schlüsselfrage, die zu den Herzen der Identität einer Person führt. In der Vergangenheit haben die Menschen gesagt, dass sie aus einer Provinz, einer Stadt oder sogar einer Familie als Ausdruck dieser Identität sind. Eine neue Idee hat sich entwickelt, die diese Vorstellungen überträgt und stattdessen Identität als etwas sieht, das unter der Nation geteilt wird. Darüber hinaus sollte die Nation in ein einziges Land vereint werden."
 natural_selection:0 "Natürliche Auswahl"
 natural_selection_desc:0 "Natürliche Selektion ist ein Mechanismus, mit dem sich Lebensformen entwickeln, indem sie an die künftigen Generationen ihreitable Eigenschaften weitergeben. Seine Entdeckung gibt eine Erklärung, wie Arten entstehen und sich entsprechend ihrer Umgebung anpassen."
 naval_theory:0 "Naval Theorie"
 naval_theory_desc:0 "Durch die Anwendung einer Strategie auf Marinebewegungen ist es möglich, eine viel effektivere Marine zu machen."
 drydocks:0 "Moderne Schiffswerft"
 drydocks_desc:0 "Die Schaffung von umschlossenen Gebieten, in denen Schiffe auf trockenem Boden angelagert werden können, ermöglicht eine einfachere und gründlichere Wartung von Frachtschiffen und Kriegsschiffen gleichermaßen."
 navigation:0 "Moderne Schiffbau"
 navigation_desc:0 "Durch verschiedene Methoden, von Sternen, zu Karten, zu einem Kompass, ist es möglich, einen Kurs auf der ganzen Welt richtig zu Diagrammen."
 neoclassicism:0 "Neoklassizismus"
 neoclassicism_desc:0 "Die klassische Zeit der Kunst, des Theaters und der Musik erstreckte sich von 1750 bis 1820, mit Innovationen seitdem als Neoklassiker bezeichnet. Der Name schließt sich auch der klassischen Antike an und vergleicht damit die hohe Kultur des Westens mit der von Rom und Griechenland, wodurch der Stammbaum der herrschenden Klasse Europas als Meister der bekannten Welt geschaffen wird."
 nitrogen_fixation:0 "Astroid Mining"
 nitrogen_fixation_desc:0 "Astroid Bergbau ist die Sammlung von Ressourcen von Astroiden im Raum"
 nitroglycerin:0 "Moderne Pipelines"
 nitroglycerin_desc:0 "Moderne Pipelines ermöglichen den Transport von Kohle, Öl, LNG (Liquified Natural Gas) und anderen Flüssigkeiten über weite Strecken."
 open_hearth_furnace:0 "Open Hearth Furnace"
 open_hearth_furnace_desc:0 "Die Herstellung von Stahl beinhaltet die Beseitigung von Verunreinigungen aus Roheisen und dann in anderen Materialien, um die Qualität von Stahl zu schaffen, die Sie sind nach. Für die Herstellung von Stahl sind sehr hohe Temperaturen erforderlich und der offene Herdofen verwendet das Abgas aus dem Ofen, um Steine zu erhitzen und den Brennstoff- und Luftstrom über diese Steine umzukehren, um die Wärme des Ofens aufzubauen. Das Verfahren ist langsamer als andere, ist aber einfacher zu kontrollieren und zu skaliert, so dass große Mengen Stahl in einem einzigen Ansatz hergestellt werden können."
 open_hearth_process:0 "Frühe 3D-Drucke"
 open_hearth_process_desc:0 "Während der 3D-Druck in den 1980er-Jahren begann, haben die 2000er-Jahre ihre Expansion in die Vollproduktion gesehen. Die Technologie, die den schichtweisen Bau von Materialien ermöglicht, hat sich in Industrien wie Luft- und Raumfahrt, Automotive und Medizinprodukten stark entwickelt."
 opium_dens:0 "Opium Dens"
 opium_dens_desc:0 "Ein Opium den ist einfach ein Ort, wo opium gekauft und geräuchert werden kann. Es gibt jedoch Menschen, die sich Sorgen machen, dass diese Dens von einer sünderen Verbiegung sind und eine Quelle moralischer Korruption sind."
 paddle_steamer:0 "Ballistik"
 paddle_steamer_desc:0 "Die Rakete weiß, wo sie ist. Es weiß das, weil es weiß, wo es nicht ist, durch Subtraktion, wo es ist, von wo es nicht ist, oder wo es nicht ist, von wo aus es ist, je größer ist, erhält es einen Unterschied oder eine Abweichung."
 pan-nationalism:0 "Pan-nationalism"
 pan-nationalism_desc:0 "Through organizations like the EU, de-facto super-states can be formed through trade & economic relations."
 percussion_cap:0 "Schweres Angriffsgewehr"
 percussion_cap_desc:0 "Schwere Gewehre, wie die SCAR-L bieten viel Feuerkraft für spezielle Operationen."
 percussion_caps:0 "Schlagkappen"
 percussion_caps_desc:0 "Schlagkappen nehmen vorher unzuverlässige Schusswaffen und ermöglichen es ihnen, bei jedem Wetter zu feuern."
 personal_liberty:0 "Persönliche Freiheit"
 personal_liberty_desc:0 "Neben der Frage, wie die Gesellschaft regiert werden soll, besteht auch die Frage, was über Governance hinausgehen sollte. Die Schaffung individueller Freiheiten, auf die die Tyrannei der Mehrheit nicht eindringt, ist ein wesentlicher Bestandteil liberaler Ideale."
 social_media:0 "Soziale Medien"
 social_media_desc:0 "Social Media ist eine Sammlung von Technologien, die es Nutzern ermöglichen, Informationen, Ideen und Inhalte über virtuelle Gemeinschaften und Netzwerke zu teilen."
 policing_by_consent:0 "Politik der Zustimmung"
 policing_by_consent_desc:0 "Sir Robert Peel, als Innenminister, schuf die Metropolitan Police, eine Konstabularie, die sich von der Gendarmerie der kontinentalen Tyrannen unterscheidet, weil sie Zivilisten sind, die im öffentlichen Interesse handeln, anstatt Soldaten, die politische Feinde unterdrücken."
 political_agitation:0 "Digitale Revolutionen"
 political_agitation_desc:0 "Internet-Aktivismus hat nun die Macht, auf große Revolutionen und historische Ereignisse zu stoßen."
 political_theory:0 "Politische Theorie"
 political_theory_desc:0 "Wie man ein Land betreibt, ist eine Frage, die viele zu fragen begonnen haben, und mehrere Theorien wurden erstellt, was genau der beste Blaupause für einen Staat aussehen würde."
 popular_sovereignty:0 "Beliebte Souveränität"
 popular_sovereignty_desc:0 "Die Autorität eines Staates und durch Erweiterung seiner Regierung kann nur durch die Zustimmung seines Volkes geschaffen und erhalten werden. In einer freien Regierung sind die Herrscher die Diener und das Volk ihre Vorgesetzten und Souveränen."
 portland_cement:0 "Portland Cement"
 portland_cement_desc:0 "So benannt nach seiner Ähnlichkeit zu Stein von einer Insel in Dorset, England, ist dieser Zement eine effektive Komponente in Beton, verwendet für den Bau großer Strukturen. Es wird aus Kalkstein und anderen gängigen Materialien hergestellt, so dass es sehr billig."
 potash:0 "Kartoffeln"
 potash_desc:0 "Produziert durch Brennen von Holz und Ablagerung der Asche in einen Topf von Wasser, Potash wird in chemischen Prozessen wie die Herstellung von Glas, Seife, Lye, Gunpowder und Dünger verwendet. Es verleiht dem Element Kalium seinen Namen, das in diesen Prozessen der Wirkstoff ist."
 power_looms:0 "Power Looms"
 power_looms_desc:0 "Ein Webstuhl ist ein Gerät zum Weben von Wolle, Baumwolle und anderen Fasern. Frühe Webstühle benutzten Hand- oder Fußkraft, um den Faden zu drehen. Der 1733 erfundene "fliegende Shuttle" wird mit der industriellen Revolution gewürdigt, und der Einsatz von mechanischer Kraft in der Weberei ermöglicht weniger qualifizierte Weber, Stoff zu produzieren. Weitere Neuerungen sind die Jacquard-Loom, ein System von programmierbaren Stempelkarten entwickelt 1804, um Muster zu automatisieren."
 power_of_the_purse:0 "Energieprojektion"
 power_of_the_purse_desc:0 "Die Power-Projektion nutzt Schiffe, um Gewalt auf andere Länder durch schiere Einschüchterung zu erpressen."
 pre_modern_warfare:0 "Pre-Modern Warfare"
 pre_modern_warfare_desc:0 "Die Konflikte von Jateryear Pale im Vergleich zu den Überwindungen des modernen Krieges, aber sie waren immer noch blutige Angelegenheiten in ihrem eigenen Recht."
 production:0 "Produktion"
 propaganda:0 "Propaganda"
 propaganda_desc:0 "Während der revolutionären und napoleonischen Kriege haben die Regierungen Europas Propaganda-Flügel geschaffen, um die öffentliche Unterstützung für die Härten, denen das gemeinsame Volk gegenübersteht, zu verschleiern. Politische Broschüren und satirische Karikaturen wurden in den Städten verteilt, während patriotische Verse geschrieben wurden, um auf beliebte Melodien gesungen zu werden."
 puddling_furnaces:0 "Plüschtiere"
 puddling_furnaces_desc:0 "Zur Herstellung von Schmiedeeisen aus Roheisen wird ein Pfützenofen verwendet. Ein Ziegelofen wird so erhitzt, daß das Eisen mit Begleitspülung schmilzt, wonach das Gemisch mechanisch, wie z.B. mit einem Brecheisen, bearbeitet wird, so daß überschüssiger Kohlenstoff im Eisen mit der Luft in Kontakt gebracht wird, wobei Kohlenmonoxid bildet, während Schwefel und andere Verunreinigungen durch leichtere Schlacke abgeführt werden, die zur Oberfläche ansteigt. Nach zwei Stunden Handarbeit können "Puddle Bälle" aus Schmiedeeisenform und aus der restlichen Schlacke entfernt werden. Dies ist eine schwierige, kompetente und daher teure Aufgabe zu erfüllen."
 quinine:0 "mRNA Vaccine"
 quinine_desc:0 "Ein mRNA-Impfstoff ist eine Art Impfstoff, der eine Kopie eines Moleküls namens Messenger RNA (mRNA) verwendet, um eine Immunantwort zu erzeugen."
 radio:0 "Interplanetäre Kommunikation"
 radio_desc:0 "Durch die Verwendung von unsichtbaren 'Wellen' ist es möglich, Informationen über eine große Entfernung schneller als Radio zu übergeben."
 railways:0 "Hochgeschwindigkeitszüge"
 railways_desc:0 "Neue Technologien ermöglichen den ultraschnellen Transport von Waren & Personen"
 rationalism:0 "Kulturrevolution"
 rationalism_desc:0 "Die kulturelle Revolution der 1960er-Jahre hat zu einer Veränderung der gesellschaftlichen Einstellungen weltweit geführt."
 realism:0 "Digitalkamera"
 realism_desc:0 "Eine Digitalkamera, auch als Digicam bezeichnet, ist eine Kamera, die Fotos im digitalen Gedächtnis erfasst."
 reinforced_concrete:0 "BIM"
 reinforced_concrete_desc:0 "Building Information Modeling (BIM) wurde während der 2000er Jahre weit verbreitet, ist eine digitale Darstellung der physikalischen und funktionalen Eigenschaften eines Gebäudes. Diese 3D-Modellierungstechnologie ermöglichte eine effizientere Planung, Konstruktion und Konstruktion."
 repeaters:0 "Laser"
 repeaters_desc:0 "Laser ermöglichen die Konzentration von Energie in bestimmte Richtungen zum Kampf"
 rifling:0 "Leichte Combat Rifl"
 rifling_desc:0 "Das neueste leichte Kampfgewehr ermöglicht es unserem Land, unsere Soldaten mit der bestmöglichen Feuerkraft auszurüsten."
 romanticism:0 "Videocassette Recorder"
 romanticism_desc:0 "Der Videocassette Recorder (VCR) oder Videorecorder ist ein elektromechanisches Gerät, das analoges Audio- und analoges Video aus Rundfunk- oder anderen AV-Quellen aufzeichnet und nach dem Umspulen die Aufnahme zurückspielen kann"
 rotary_valve_engine:0 "Künstliche Intelligenz"
 rotary_valve_engine_desc:0 "Verwendung von KI zur Massenproduktion von Waren"
 rubber_recycling:0 "Gummi-Recycling"
 rubber_recycling_desc:0 "Die Verwendung eines 'Masticators' zum Kauen und zur Reform des alten Gummis ermöglicht es uns, dieses wertvolle Material wiederzuverwenden."
 rubberised_fabrics:0 "Gummistoff"
 rubberised_fabrics_desc:0 "Mit Naturkautschuk, um zwei Gewebe zusammen zu kleben, oder Pflanzenfasern zu einer Art Kunstleder zu kombinieren, produziert wasserdichte Artikel wie den Mackintosh Mantel, oder elastische Kleidung wie Hosenträger."
 rule_of_law:0 "Rechtsstaatlichkeit"
 rule_of_law_desc:0 "In der Regel in einem Regierungssystem mit entweder einer schriftlichen (wie in den Vereinigten Staaten) oder ungeschriebenen (wie im Vereinigten Königreich) Verfassung, Regel of Law besteht aus einer Gruppe von verwandten Ideen über Gerechtigkeit, wie dass die Gewalt des Staates vorhersehbar und daher vermeidbar, indem die Regierung klar festgelegt, was illegal ist und was die Strafe für Verbrechen sein wird; und dass die Agenten des Staates selbst den Gesetzen unterliegen, die sie durchsetzen."
 screw_frigate:0 "Geführtes Missile Destroyer"
 screw_frigate_desc:0 "Der geführte Raketenzerstörer nutzt Raketen, um Ziele zu treffen, bevor sie sogar von der Existenz einer Flotte kennen"
 sea_lane_strategies:0 "Zukunftsziele"
 sea_lane_strategies_desc:0 "Künftige Marinestrategien werden sich wahrscheinlich um KI drehen."
 semaphore_signalling:0 "Semaphore Signaling"
 semaphore_signalling_desc:0 "Bahnsignale vermitteln Anweisungen für Züge, die auf Bahnlinien aktiv sind und den direkten Verkehr auch dann unterstützen, wenn eine Lokomotive in Bewegung ist und vom Personal an einer Station weg ist. Die Verwendung von Semaphore-Signalen, inspiriert von einem militärischen Signalsystem, das von Napoleons Armeen genutzt wird, schafft ein einheitliches System, das alle Eisenbahnen nutzen können."
 separation_of_powers:0 "Trennung der Kräfte"
 separation_of_powers_desc:0 "Die Idee unterschiedlicher Regierungszweige mit unterschiedlichen Rollen, die sich gegenseitig beaufsichtigen, um Korruption und Missbrauch zu verhindern, ist seit dem relativen Erfolg des "großen amerikanischen Experiments" enorm populär geworden, und ihre Verfassung teilt die Regierung in Exekutiv-, Gesetzgebungs- und Justizzweige."
 sericulture:0 "Weinbau"
 sericulture_desc:0 "Die alte und eng bewachte Technik der Kultivierung von Seidenraupen für die Herstellung von Seide."
 sewage_systems:0 "Abwassersysteme"
 sewage_systems_desc:0 "Das Wachstum der Städte führt zu Flüssen, die mit Abwasser gestopft sind, sie sind schwarz geworden und riechen wie der Tod. Zeit, zurück zu den Antike, die Kanalsysteme bauen, um diese schmutzigen Gewässer aus der Stadt zu tragen."
 shaft_mining:0 "Bergbaumaschinen"
 shaft_mining_desc:0 "Durch den Einsatz von Schwerlastmaschinen können wir auf dem Weltmarkt für die Produktion natürlicher Ressourcen konkurrieren."
 shell_gun:0 "Reactive Armor"
 shell_gun_desc:0 "Ein Hauptkampftank (MBT), auch als Schlachttank oder Universaltank oder einfach nur Tank bekannt, ist ein Tank, der die Rolle des Panzers geschützten direkten Feuers und Manöver in vielen modernen Armeen erfüllt."
 slag_fertilisers:0 "Schlackendünger"
 slag_fertilisers_desc:0 "Der niedrige pH-Wert der Abfälle aus Hochöfen und Stahlkonvertern macht es zu einem ausgezeichneten Bodenzusatz für landwirtschaftliche Zwecke. Silikatkalkschlacke ist löslicher als Naturkalk oder Dolomit, wodurch der Phosphatgehalt des Bodens erhöht wird."
 socialism:0 "Rechter Populismus"
 socialism_desc:0 "Rechtspopulismus, auch Nationalpopulismus und Rechtspopulismus genannt, ist eine politische Ideologie, die Rechtspolitik mit populistischer Rhetorik und Themen verbindet"
 society:0 "Gesellschaft"
 enclosure:0 "Effiziente Landwirtschaft"
 enclosure_desc:0 "Indem wir mit Hilfe eines regierungsgeregelten Systems die Massenzucht betreiben, können wir unsere Produktion genug steigern, um auf dem Weltmarkt zu konkurrieren."
 intensive_agriculture:0 "Pestizid"
 intensive_agriculture_desc:0 "Chemikalien, die in der Lebensmittelproduktion verwendet werden, die Insekten und Bakterien beseitigen."
 steam_donkey:0 "Nachhaltige Fertigung"
 steam_donkey_desc:0 "Mit zunehmendem Bewusstsein für Umweltauswirkungen begannen die Hersteller, nachhaltigere Produktionsmethoden zu entwickeln."
 threshing_machine:0 "Kommandant Spaceflight"
 threshing_machine_desc:0 "Erhöht die Wirksamkeit unserer Solarpannels, Kernkraftwerke und Windmühlen"
 steel_frame_buildings:0 "Hologramme"
 steel_frame_buildings_desc:0 "Holographie ist eine Technik, die eine Wellenfront aufgezeichnet und später rekonstruiert. Es ist am besten als Verfahren zur Erzeugung dreidimensionaler Bilder bekannt und verfügt über eine breite Palette anderer Anwendungen, einschließlich Datenspeicherung, Mikroskopie und Interferometrie. Grundsätzlich ist es möglich, ein Hologramm für jede Art von Welle zu machen."
 steel_railway_cars:0 "Elektroautos"
 steel_railway_cars_desc:0 "Forschung und Entwicklung in autonome Fahrzeuge beschleunigten sich in den 2000er Jahren. Die DARPA Grand Challenge (2004 und 2005), die vom US-Verteidigungsministerium organisiert wurde, war ein wichtiger Meilenstein, der frühe Versuche an selbstfahrenden Autos zeigte."
 stormtroopers:0 "Spezialist"
 stormtroopers_desc:0 "Menschen Truppen trainiert und speziell für die Zerstörung von KI und die Aufnahme von Einheiten ausgestattet."
 streamliners:0 "Streamliner"
 streamliners_desc:0 "Neue Zugkonstruktionen mit moderner Zugkraft und neuer Aluminium-Körper-Konstruktion ermöglichen es Railroads, mit höheren Geschwindigkeiten zuverlässiger zu fahren."
 submarine:0 "Weitere U-Boote"
 submarine_desc:0 "Künftige U-Boote werden von Zukunftstechnologie angetrieben, die verheerende Streiks ermöglichen."
 multilateral_alliances:1 "Cryonics"
 multilateral_alliances_desc:0 "ryonics ist die Praxis, Personen zu bewahren, die legal tot sind, indem sie bei sehr niedrigen Temperaturen eingefroren werden, mit der Hoffnung, dass zukünftige medizinische Technologie in der Lage sein kann, sie zu revidieren und die Bedingung zu heilen, die ihren Tod verursacht."
 synthetic_dye:0 "Synthetische Färbung"
 synthetic_dye_desc:0 "Dies führte zu einem chemischen Prozess, der verschiedene Arten von Farbstoffen synthetisch erzeugte. Es revolutionierte die Färbung von Gewebe und brachte ein Ende der Herstellung von landwirtschaftlichen Farbstoffen, die zu teuer zu produzieren."
 system_gin:0 "Das Auto"
 system_gin_desc:0 "Automobile ermöglichen den schnellen Transport von Menschen und Waren im gesamten Land."
 telegraph:0 "Telegraf"
 telegraph_desc:0 "Strom kann verwendet werden, um Signale fast sofort, wie mit Morse-Code. Die Hauptverzögerungsquelle ist der menschliche Bediener, der gut ausgebildet sein muss, um die Nachrichten zu codieren und zu decodieren, die in Form von kurzen und langen "Punkten" und "Dashes" des Lärms übertragen wurden."
 telephone:0 "Smart City"
 telephone_desc:0 "Durch die Integration von IoT-Geräten in die Stadtinfrastruktur können Städte Ressourcen wie Wasser, Strom, Verkehr und Abfall in Echtzeit überwachen und verwalten, Effizienz und Nachhaltigkeit verbessern."
 telephones:0 "Telefone"
 telephones_desc:0 "In der Theorie haben wir gewusst, dass die Idee des Sprechtelegrafen möglich sein könnte, aber wir waren uns einfach nicht sicher, wie. Fortschritte im Bereich der Elektronik haben diese Idee endlich möglich gemacht und das Telefon wird geboren."
 tin_cans:0 "Blechdosen"
 tin_cans_desc:0 "Das Konzept des Konservenfutters stammt aus Glasgläsern, die von Armeen der Französischen Revolution verwendet werden. Bald verbreitete sich die Idee auf den zivilen Gebrauch. Fleisch oder Suppe, die innerhalb eines Metalls gekocht wurde, ist vor der Exposition gegenüber der Außenwelt geschützt und kann in der Freizeit von Mittelstandshaushalten verbraucht werden. Der Name leitet sich von einer Zinnplatte ab, die eine dünne Zinnschicht außerhalb der Eisen- oder Stahlplatte aufweist, um das Metall vor Rost in der offenen Luft zu schützen."
 trench_works:0 "Recon Tank"
 trench_works_desc:0 "Geräte, die verwendet werden, um Stoßwellen und Marmelade feindlichen Truppen zu senden"
 triage:0 "VTOL Flugzeug"
 triage_desc:0 "Vertical Takeoff and Landing Aircraft (VTOL) ist eine Art von Flugzeugen, die abfahren und vertikal landen können, ohne dass eine Landebahn erforderlich ist"
 urban_planning:0 "Fiat Währung"
 urban_planning_desc:0 "Fiat-Währungen sind Geldmittel, die nicht von Gold unterstützt werden."
 urbanization:0 "Internationale Organisationen"
 urbanization_desc:0 "Internationale Organisationen wie die Vereinten Nationen wollen den Frieden bewahren und das Wirtschaftswachstum weltweit fördern."
 vaccination:0 "Impfung"
 vaccination_desc:0 "Die Inokulation von Menschen mit den erwarteten weniger virulenten Formen einer Krankheit war seit Jahrhunderten bekannt, war aber auch sehr riskant. Die Impfung, die entweder eine weniger gefährliche, aber verwandte Krankheit oder durch die Behandlung der Erreger der Krankheiten, so dass sie die Fähigkeit zu infizieren verloren, war viel sicherer und viel zuverlässiger."
 vacuum_canning:0 "Leasing"
 vacuum_canning_desc:0 "Lean Manufacturing, ein Konzept, das in den 1990er Jahren entstand, konzentriert sich auf die Reduzierung von Abfällen und die Verbesserung der Effizienz in Produktionssystemen. Es betont die kontinuierliche Verbesserung der Prozesse durch die Beseitigung von nicht-werterhaltenden Aktivitäten, die Verbesserung der Qualität und die Steigerung der Kundenzufriedenheit."
 vulcanization:0 "Autonome Drohnen"
 vulcanization_desc:0 "Lieferung Drohnen haben über experimentelle Stufen hinaus fortgeschritten, mit Unternehmen wie Amazon und Wing testen kommerzielle Drohnen-Liefersysteme, in der Lage, Pakete schnell und effizient in städtischen und ländlichen Gebieten zu bewegen."
 wargaming:0 "Kampfsimulationen"
 wargaming_desc:0 "Durch die Verspottung imaginärer Kriegsführungszenarien und die Praxisstrategie ist es möglich, Offiziere Kampffähigkeiten zu verbessern."
 water_treatment:0 "Wasseraufbereitung"
 water_treatment_desc:0 "Wasser wurde gefunden, um Krankheiten in unsere Häuser zu tragen. Dennoch hat die Wissenschaft die Antwort, wir können einfach das Wasser wieder reinigen durch Anwendung von Filtration und chemischen Behandlungen."
 wood_pulp_papermaking:0 "Pulp Papierindustrie"
 # gold_standard_desc: "This meant a currency system based on gold. Money was rather expensive to produce by the government and this could sometimes result in a low of money stock. However, the good thing was that the gold prices were rather stable and the trust in gold was high, making the currency stable."
 # savings_banks_desc: "The middle-class is growing larger and wealthier thanks to education and a strong work ethic. Many individuals wish to be part of railways through Africa; dams across the Nile; fleets of ocean Greyhounds; majestic, self-amortizing canals; plantations of ripening tea; all from tuppence prudently, fruitfully, frugally invested (to be specific) in the Dawes-Tomes-Mousely-Grubbs Fidelity Fiduciary Bank."
 # silver_standard_desc: "This meant a currency system based on silver. Money was cheaper to produce by the government which meant that there was rarely any lack of money in the country. However, the problem was that the silver prices had a tendency to be dominated by gold prices, which meant that foreign trade was often suffering."
#  acidic_and_basic_converters: "Acidic and Basic Converters"
#  acidic_and_basic_converters_desc: "The original Bessemer converters had a lining of insulating clay between the walls and the molten iron. The #clay is acidic and affects the composition of the resulting steel. By replacing the clay with basic (alkaline) materials such as magnesite, chromite or dolomite, or more acidic materials such as ganister, the process can be fine tuned to remove even more impurities, depending upon the content of the iron ore."
#  fluid_compressed_steel: "Fluid Compressed Steel"
#  fluid_compressed_steel_desc: "This process involves the use of a hydraulic forging press to put the steel under great pressure while still a #fluid. This squeezes the tiny pockets of gas impurities out of the cooling ingots, allowing for a much higher quality steel by preventing the #formation of blowholes and piping."
#  global_trade_desc: "By the end of the 18th century, the world-system had encompassed almost the entire globe, with raw materials being imported #from the colonies and peripheral nations and turned into finished goods in the global core, to be exported in turn."
#  guilds: "Guilds"
#  guilds_desc: "The guild system was a way of organizing labor which mandated participation in the guild and in advancing through its ranks in order #to practice the guild trade within a city. While it protected the living standards of the guild members and supposedly ensured better quality #work, it also raised prices and stymied innovation."
#  hydraulic_forging_press: "Hydraulic Forging Press"
#  hydraulic_forging_press_desc: "A hydraulic forging press applies applies massive force, up to thousands of pounds per square inch, to a material #that is being worked while hot. An engine drives water, air or hydraulic fluid through valves connected to a piston, which in turn presses the #die onto the material. The valves can be turned on and off by the operator, allowing the material to be manipulated and precise amounts of force #applied at will."
#  mutualism_desc: "An economic theory usually associated with anarchism, mutualism opposes capital interest but advocates free markets and advocates #the formation of  mutual savings banks as a method for loans."
#  news_agencies: "News Agencies"
#  news_agencies_desc: "Organizations which sell news reports to various media, such as newspapers. This allows for media to include reports of #events and developments beyond the reach of their own bureaus and international news to be reported even in local media."
#  one-nationism: "One-nationism"
#  one-nationism_desc: "A type of conservative politics wherein social obligation and responsibility towards the poor and needy is combined with #traditional conservative ideals. Opposed to class struggle, one-nation conservatives seek to create a hierarchy wherein the classes support each #other."
#  percussion_oil_drilling: "Percussion Oil Drilling"
#  percussion_oil_drilling_desc: "When using a percussion drill, the drill-bit is raised by hand and then released to bite into the earth under the #force of gravity. Depths of up to around thirty metres are possible using this technique."
#  private_banks: "Private Banks"
#  private_banks_desc: "The wealthy merchant families of city states, and the royal families of European monarchies, need somewhere safe to keep #their piles of gold and someone to look after their finances. The first banks were created with this goal in mind."
#  ricardian_economics: "Ricardian Economics"
#  ricardian_economics_desc: "David Ricardo formalized several concepts that made up the Classical School of Economics, such as economic rent, the #labor theory of value, and comparative advantage."
#  self_acting_looms_desc: "Gradual improvements in loom technology have transformed the weaving industry and vastly increased the output of fabrics #factories. By using mechanical power for more and more operations, the role of the weaver is reduced to merely keeping the machine running and #clearing blockages. Children are especially useful for this as they can crawl into smaller spaces than adults. Shutting the machines down while #such work is carried out has been judged to be less profitable than allowing for the occasional child to be mangled."
#  smithian_economics: "Smithian Economics"
#  smithian_economics_desc: "Building upon the ideas of the earlier Physiocrats, with their agrarian opposition to the 'unproductive labor' of the #feudal system, Adam Smith led an attack on mercantilism which founded the Classical School of Economics."
#  steam_engines: "Steam Engines"
#  steam_engines_desc: "Pioneers in steam technology usually had uses other than locomotion in mind. For example, Richard Trevithick built huge #engine houses that dot the Cornish landscape to keep the tin mines free from flooding."
#  steam_hammer: "Steam Hammer"
#  steam_hammer_desc: "Hammering out metals is useful for both shaping and alloying the material. When used on pig iron, this creates wrought iron or #mild steel, the difference being how much carbon is left in the alloy. The use of steam means both more efficiency and better precision than #hammering out the alloy by hand."
#  steam_lathes: "Steam Lathes"
#  steam_lathes_desc: "The lathe is a machine used for boring holes of various shapes and sizes into materials, or for otherwise whittling them down #symmetrically. Exploiting steam power to drive lathes allows industry to use more precision in engineering."
#  stock_exchanges: "Stock Exchanges"
#  stock_exchanges_desc: "Organized trading of financial instruments dates back to the Italian city states and the Dutch Republic. A stock exchange #brings together buyers and sellers of assets such as government debt and shares in companies."#
#  tunnelling_shields: "Tunnelling Shields"
#  tunnelling_shields_desc: "When digging a mine shaft or railway tunnel, supporting the vast weight of the earth above the workers is vital for the #integrity of the project. A tunnelling shield is a mobile structure made of steel that provides temporary support on the active site of digging. #As the tunnelling shield is moved along, such as on a railway track, a more permanent support is laid, such as brickwork or timbers. The first #use of such a device was in the construction of the Thames Tunnel in 1825 by Anglo-French engineer Marc Isambard Brunel, the father of the more #famous Isambard Kingdom Brunel."
# alienation: "Alienation"
# alienation_desc: "The creation of the capitalist means of production has fundamentally altered the relationship of the worker to his work. No longer is he the craftsmen who creates something unique or the farmer who gains a share of the produce. In his production he is able to objectify his individuality and his character. Now though the capitalist means of production estranges a person from their very humanity, they are no longer the director of their own actions and through that they gain a profound sense of alienation."
# experimental_psychology: "Experimental Psychology"
# experimental_psychology_desc: "The human mind is a very complicated things, what do people experience when they receive a sensory stimulus and is it the same for you as it is for me? Trying to measure these things is no easy manner, but the recent advancements in the field of psychology have created a new field called experimental psychology where tests can be done to see how people react to stimuli."
# global_trade: "Global Trade"
# historical_materialism: "Historical Materialism"
# historical_materialism_desc: "What is society? This is a complicated question but if we were to define society as the union of the productive capacity and the relationships people have to the means of production we can begin to analyze past societies and how they have developed and evolved over time. We call this methodological approach Historical Materialism."
# individualism_desc: "A philosophy focused on the interests, happiness and autonomy of the individual. This includes the right of the individual to pursue its own self-interest, conclude for itself what is true and false, to think and act independently of society."
# institutionalization: "Institutionalization"
# institutionalization_desc: "If we want to expand the role of the state we need to expands the means the state has to deliver these roles. The building up the institutions of the state are the means to doing this. This steadily institutionalization of functions that were previously in the private sphere also bring along profound societal changes as well."
# pragmatism: "Pragmatism"
# pragmatism_desc: "The problem with philosophers is that they seek knowledge for knowledge sake and they also seek to create a nice unchanging universe to suit their theories. Pragmatism explicitly rejects these two tenants. Knowledge should actually be viewed only from the point of view of what practical use it has and we should accept that the universe itself is ever changing."
# religion_of_humanity: "Religion of Humanity"
# religion_of_humanity_desc: "The rise of secularism has started to free our people from the chains of superstition that religion forces on people but at the same time we lost the societal cohesion that organized religion provided. The religion of humanity offers the social cohesion of organized religion without the superstition. The cynics describe at as Catholicism minus Christianity but it also offers all the things a religion should."
# self_acting_looms: "Self-Acting Looms"
# transcendentalism: "Transcendentalism"
# transcendetalism_desc: "Transcendentalism was a philosophical movement that was founded by the German philosopher Immanuel Kant in his book Critique of Pure Reason published in 1781. It has also been described as critical philosophy as it sees philosophy's role as that of criticism rather than justification of knowledge. The task of philosophy shifts for being about establishing theories about knowledge and instead subjecting these theories to critical review to see who valid they are."
##marketing: "Marketing"
#individualism: "Individualism"
#mutualism: "Mutualism"
#vitamins: "Vitamins"
#vitamins_desc: "By isolating certain nutrients that the body needs, it is possible to make sure that more people have a healthy and balanced diet."

 central_archives:0 "Digital Archives"
 central_archives_desc:1 "Ein digitales Archiv ist eine Website, die zum Zweck der Speicherung von Daten für eine spätere Nutzung erstellt wird."
 steelworking:0 "Offshore-Erfrischungen"
 steelworking_desc:1 "Raffinieren von Öl ermöglicht die Schaffung effizienter Kraftstoffe für Fahrzeuge, Strom und Kunststoff"
 prospecting:0 "FÜR"
 prospecting_desc:1 "Der Wechselkurs der Fremdwährungen für einen Gewinn."
 baking_powder:0 "Vegetarische Optionen"
 baking_powder_desc:1 "Pflanzenhaltiges Fleisch erlaubt es unserer vegetarischen Bevölkerung, auf einstweiligen Gütern zu leben"
 mechanical_tools:0 "Fabrikbau"
 mechanical_tools_desc:1 "Fabriklandwirtschaft erlaubt das Massenprodukt von Fleisch durch Tier Grausamkeit"
 rubber_mastication:0 "Advanced Surveying Technologies"
 rubber_mastication_desc:1 "LiDAR (Light Detection and Ranging) Scan-Systeme wurden verwendet, um hochgenaue 3D-Modelle von Baustellen zu erstellen, während GPS-fähige Geräte geholfen, die Genauigkeit der Ausgrabung, Grading und andere Baustellenarbeiten zu verbessern."
 pumpjacks:0 "Stromfracht"
 pumpjacks_desc:1 "Ähnlich wie Elektroautos ermöglichen Elektro-Container-Lkw die emissionsfreie Lieferung von Waren an Standorte"
 shift_work:0 "Blockchain"
 shift_work_desc:1 "Blockchains sind die Spuren des Ursprungs von Waren in einer Lieferkette über die Computertechnologie. Die Annahme von Blockchain durch Unternehmen wie Walmart und IBM in den späten 2000er Jahren half, Transparenz in der Lebensmittelbeschaffung zu gewährleisten, das Verbrauchervertrauen zu verbessern."
 paved_roads:0 "Grüne Stadt"
 paved_roads_desc:1 "Grüne und automatisierte Städte"
 pasteurization:0 "Lab-Grown Meats"
 pasteurization_desc:1 "Die Massenproduktion von Lab-gewachsenen Fleisch"
 pneumatic_tools:0 "Megastrukturen"
 pneumatic_tools_desc:1 "Der Aufbau von Megastrukturen über AI, 3D Printing und das Metaverse."
 steam_turbine:0 "Carbon-Neutral Beton"
 steam_turbine_desc:1 "Beton, der keine Verschmutzung erzeugt"
 plastics:0 "Co-Bots"
 plastics_desc:1 "Collaborative Robots (Cobots): Cobots arbeiten zusammen mit Menschen in Fertigungseinstellungen und unterstützen Aufgaben wie Montage, Materialhandling und Qualitätskontrolle, was die Produktivität erhöht und Risiken reduziert."
 dough_rollers:0 "3D-Printed Food"
 dough_rollers_desc:1 "Die schnelle Produktion aller Lebensmittel über automatisierte Computer"
 oil_turbine:0 "Biokunststoffe"
 oil_turbine_desc:1 "Sichere, umweltbasierte Kunststofflösungen."
 standing_army:0 "Kalte Kriegsarmee Doktrin"
 standing_army_desc:1 "Die komplexen Herausforderungen der Außenpolitik und der Inlandsunruhe können nicht mehr von mühsamen Milizen behandelt werden. Moderne Zeiten erfordern ein Militär zu jeder Zeit bereit zu handeln."
 mandatory_service:0 "Rotor"
 mandatory_service_desc:1 "Die Erfindung des Hubschraubers ermöglicht Helikopter-basierte Angriffs- und Unterstützungsmöglichkeiten."
 military_drill:0 "Kampfübungen"
 military_drill_desc:1 "Wie das Sprichwort sagt: "Praxis macht perfekt", und das gilt für Soldaten wie für Musiker. Es gibt keine Armee mehr von Generalen als eine Armee, die auf alle Befehle sofort und ohne Verwirrung reagieren kann."
 line_infantry:0 "Angriff Infanterie"
 line_infantry_desc:1 "Soldaten, die mit standardisiertem Getriebe ausgestattet und mit standardisierten Methoden geschult sind, geben einer Armee eine größere Gleichmäßigkeit und damit eine größere Zuverlässigkeit."
 logistics:0 "GPS"
 logistics_desc:1 "Das Global Positioning System (GPS) ist ein System von Satelliten, die kritische Positionierungsfähigkeiten für militärische, zivile und kommerzielle Nutzer weltweit bieten."
 electric_telegraph:0 "Angriffspistole"
 electric_telegraph_desc:1 "Moderne Angriffswaffen können ähnlich wie ein IFV verwendet werden, um Infanterieoperationen zu unterstützen."
 enlistment_offices:0 "Angriff"
 enlistment_offices_desc:1 "Angriffssatelliten können andere Satelliten für Kampfzwecke zerstören"
 military_statistics:0 "Autonomer Jet-Fighter"
 military_statistics_desc:1 "Jet Kämpfer voll kontrolliert durch künstliche Intelligenz"
 self_propelled_torpedoes:0 "Autonomes U-Boot"
 self_propelled_torpedoes_desc:1 "Autonome U-Boote sind eine Art Schiff, das vollständig von U-Booten kontrolliert wird."
 war_propaganda:0 "Autogenerierte Propaganda"
 war_propaganda_desc:1 "Eine Bevölkerung zu überzeugen, ihre Zeit zu begehen, ihre Ressourcen und ihr Blut, alles um des Sieges willen, ist ein ganzes Feld der Arbeit auf sich selbst."
 nco_training:0 "Autonomer Hubschrauber"
 nco_training_desc:1 "Hubschrauber, die von Drohnen voll kontrolliert werden."
 destroyer:0 "Die Zukunft der Zukunft"
 destroyer_desc:1 "Leichtere Schiffe, ausgestattet mit Torpedos und kleineren Waffen, sind ebenso wichtig in modernen Schiffen wie Kapitalschiffe."
 landing_craft:0 "KI-Intergratierte Computersysteme"
 landing_craft_desc:1 "KI-Intergratierte Rechensysteme für unsere Schiffe"
 flamethrowers:0 "Hergestellte Pathogene"
 flamethrowers_desc:1 "Ein hergestellter Krankheitserreger ist eine Krankheit, die in einem Labor mit dem Ziel erstellt wird, möglichst viele Menschen zu töten."
 banking:0 "E-Mail"
 banking_desc:1 "E-Mail (kurz für elektronische Post; alternativ buchstabierte E-Mail) ist ein Verfahren zum Senden und Empfangen von Nachrichten mit elektronischen Geräten."
 academia:0 "Digitalisierung"
 academia_desc:1 "Die Digitalisierung der Welt durch Fortschritte in der Informatik-Systemtechnologie."
 international_relations:0 "Die Pille"
 international_relations_desc:1 "Pillen oder Antibiotika sind konsumierbare Kapseln, die die Symptome von medizinischen Erkrankungen betäuben wollen. Die Pille bezieht sich oft auf die Erfindung der Bisskontrolle, die ein höheres Bevölkerungswachstum ermöglicht."
 stock_exchange:0 "Wirtschaftliche Globalisierung"
 stock_exchange_desc:1 "Die wirtschaftliche Globalisierung ist die zunehmende Integration von Volkswirtschaften auf der ganzen Welt, die den Austausch von Waren, Dienstleistungen, Kapital, Technologie und Menschen beinhaltet."
 medical_degrees:0 "Kompakte Scheibe"
 medical_degrees_desc:1 "Die Compact Disc (CD) ist ein digitales optisches Datenspeicherformat, das von Philips und Sony gemeinsam entwickelt wurde, um digitale Audioaufnahmen zu speichern und abzuspielen."
 organized_sports:0 "Arbeitseinsatz"
 organized_sports_desc:1 "Gegenterrorismus-Training (manchmal als Terrorismus-Reaktions-Training oder Gegen-Terror-Präparation bezeichnet) thematisiert die Bedrohung eines bevorstehenden Terrorangriffs durch die Bereitstellung von Sensibilisierung, Vorbereitung, Prävention und Reaktionsmethoden."
 central_banking:0 "Moderne Links"
 central_banking_desc:1 "Die linke Politik beschreibt das Spektrum der politischen Ideologien, die die soziale Gleichheit und Gleichheit unterstützen und versuchen."
 corporate_charters: "Wirtschaftsliberalismus"
 corporate_charters_desc: "Corporate Liberalism ist eine These in der US-Geschichte und ein Werkzeug für seinen offenen Türimperialismus, in dem die Unternehmenselite sowohl die Hauptbegünstigten als auch die Hauptlobbyisten für die angeblichen Anti-Business-Verordnungen werden"
 joint_stock_companies: "Moderne monetäre Theorie"
 joint_stock_companies_desc: "Moderne monetäre Theorie oder moderne Geldtheorie (MMT) ist eine heterodoxe makroökonomische Theorie, die Währung als öffentliches Monopol und Arbeitslosigkeit beschreibt als Beweis, dass ein Währungsmonopolist übermäßig die Versorgung der finanziellen Vermögenswerte einschränkt, die benötigt werden, um Steuern zu zahlen und Sparwünsche zu befriedigen."
 investment_banks: "KI Finanzberater"
 investment_banks_desc: "Robo-Advisors nutzen Algorithmen und künstliche Intelligenz (KI), um Finanzplanungsdienste mit minimaler menschlicher Intervention anzubieten"
 corporate_management: "Online-Government"
 corporate_management_desc: "Erlaubt der Regierung, die volle Kontrolle des Internets zu ergreifen"
 dialectics:0 "Einflussfaktoren"
 dialectics_desc:1 "Ein Influencer, auch Social Media Influencer genannt, ist eine Art Internet-Berühmtheit, die einflussreich und bekannt auf Social Media ist. Der moderne Referent des Begriffs ist in der Regel eine bezahlte Rolle, in der ein Unternehmen für die Social Media-Influence-for-hire-Aktivitäten zahlt, um seine Produkte und Dienstleistungen zu fördern, bekannt als Influencer-Marketing."
 psychiatry:0 "Meme"
 psychiatry_desc:1 "Eine Internet-Meme oder Meme ist ein kulturelles Element (wie eine Idee, Verhalten oder Stil), das sich über das Internet verbreitet, vor allem durch Social Media-Plattformen."
 postal_savings:0 "Mortgage-Backed Securities"
 postal_savings_desc:1 "Eine subprime Hypothek ist eine Art von Darlehen, die Menschen, die nicht die typischen Anforderungen für eine Hypothek von einer traditionellen Bank oder Kreditgewerkschaft."
 human_rights:0 "Tierschutz"
 human_rights_desc:1 "Tierschutzpositionen behaupten, dass Tiere vor bestimmten menschlichen Aktiviten geschützt werden sollten."
 mutual_funds:0 "Gigeconomy"
 mutual_funds_desc:1 "Im Januar 2021 fand eine kurze Quetschung des Bestands des amerikanischen Videospiel-Händlers GameStop und anderer Wertpapiere statt, was zu erheblichen finanziellen Folgen für bestimmte Hedgefonds und großen Verlusten für kurze Verkäufer führte."
 zeppelins:0 "Stern"
 zeppelins_desc:1 "Raumschiffe ermöglichen den schnellen Transport von Menschen und Gütern zwischen Planeten"
 international_exchange_standards:0 "Solarmarkt"
 international_exchange_standards_desc:1 "Der Aktienmarkt wurde in den Außenraum erweitert"
 psychoanalysis:0 "Neuroplastik"
 psychoanalysis_desc:1 "Neuroplastizität ist die Studie, wie Neuronen Verbindungen im Gehirn bilden."
 philosophical_pragmatism:0 "Cyberwarfare"
 philosophical_pragmatism_desc:1 "Cyberwarfare ist eine Reihe von Cyberangriffen oder Gegenangriffen zwischen Nationalstaaten oder internationalen Organisationen, um Computer, Netzwerke oder Informationssysteme anderer Nation zu beschädigen oder zu stören"
 modern_financial_instruments:0 "Digital Hedgefund"
 modern_financial_instruments_desc:1 "Die Methoden der Geldherstellung wachsen weiter und vermehren sich. Einige Methoden können Geld in eine Pyramide nach oben fließen, aber alle von ihnen beinhalten mehr und mehr Geld fließen die ganze Zeit."
 macroeconomics:0 "Digital-Economics"
 macroeconomics_desc:1 "Die Studie der Wirtschaften online und E-Service-Wirtschaften."
 behaviorism:0 "Psychedelic Therapie"
 behaviorism_desc:1 "Die Erforschung des therapeutischen Potenzials psychedelischer Substanzen (z.B. psilocybin, MDMA und LSD) hat erhebliche Dynamik erlangt. Diese Substanzen werden für ihre Auswirkungen auf Zustände wie posttraumatische Stressstörung (PTSD), Depression, Angst und Sucht untersucht."
 analytical_philosophy:0 "Teletherapie"
 analytical_philosophy_desc:1 "Teletherapie und Remote Counseling: Telehealth, die während der COVID-19 Pandemie explodierte, wächst weiterhin als bequemer Weg für Einzelpersonen, die Therapie fernzugreifen."
 electrical_capacitors:0 "Nanomaterialien"
 electrical_capacitors_desc:0 "Die Fähigkeit, Materialien auf einem Nanometer zu manipulieren, führt zu Durchbrüchen in mehreren Branchen. Graphene, eine einzige Schicht von Kohlenstoffatomen, ist eine der vielversprechendsten Nanomaterialien, die außergewöhnliche Stärke, Leitfähigkeit und Flexibilität bieten."
 corporatism:0 "Post-Neoliberalismus"
 corporatism_desc:0 "Mit dem Ende des Neoliberalismus will die Gesellschaft das aktuelle kapitalistische System verbessern."
 drone_carrier:0 "Drohne Träger"
 drone_carrier_desc:0 "Drohnenträger, ähnlich wie die Flugzeugträger von heute, tragen Drohnenschwarmen und entfesseln verheerende Angriffe auf unsere Feinde."
