 gov_danubian_federation: "Danubische Föderation"
 gov_danubian_federation_desc: "Dies ist eine [concept_government_type], in der der Staat in eine Vielzahl von Bundeseinheiten organisiert wird, die nach ethnischen Linien gezogen werden. Die [Concept('concept_ruler','$RULER_TITLE_EMPEROR$')] oder [Concept('concept_ruler','$RULER_TITLE_EMPRESS$')] dient als [concept_head_of_state], aber [Concept('concept_votes','$concept_voting$')] und eine Verfassung diktiert die [Concept('concept_law','$concept_laws$')]x id=6/>x id=7/>x id=8/>"
 gov_danubian_federation_technocratic: "Danubische Föderation"
 gov_danubian_federation_technocratic_desc: "Dies ist eine [concept_government_type], in der der Staat in eine Vielzahl von Bundeseinheiten organisiert wird, die nach ethnischen Linien gezogen werden. Zentrale Macht ruht mit der [Concept('concept_ruler','$RULER_TITLE_EMPEROR$')] oder [Concept('concept_ruler','$RULER_TITLE_EMPRESS$')] und einer Klasse von erleuchteten Gelehrten-Aristokratie.\nx id=4/>x id=5/>"
 gov_danubian_federation_absolutist: "Danubische Föderation"
