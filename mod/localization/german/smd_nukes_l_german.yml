 nuclear_events.12.t: "Missile Strike auf [ROOT.GetName]"
 nuclear_events.12.d: "[SCOPE.sCountry('missile_attacker').GetName] hat einen konventionellen Raketenschlag gegen [ROOT.GetAdjective] Gebiet eingeleitet. Berichte werden von Auswirkungen auf [ROOT.GetAdjective]-Zustand gemeldet — Infrastrukturschäden werden bewertet.\nx id=4/> Die Raketen waren nicht nuklear, aber die Botschaft ist klar. [SCOPE.sCountry('missile_attacker').GetName] ist bereit, langfristige Waffen gegen uns zu verwenden."
 nuclear_events.12.f: "Die Krater sind schon da. Die Frage ist, was wir als nächstes tun."
 nuclear_events.12.a: "Schadenersatz und entsprechend reagieren"

 missile_strike_victim_modifier: "Konventioneller Raketenschlag"
 missile_strike_victim_modifier_desc: "Unser Territorium wurde durch einen konventionellen Raketenschlag gezielt. Infrastrukturschäden und öffentliche Angst werden erhöht."

 # ── EVENT 13: RETALIATION CHOICE ───────────

 nuclear_events.13.t: "Nukleare Vergeltung — Entscheidung erforderlich"
 nuclear_events.13.d: "[SCOPE.sCountry('nuclear_attacker').GetName] hat Atomwaffen gegen [ROOT.GetName] gestartet. Unsere Sprengköpfe sind bewaffnet. Die Startcodes sind bereit.\nx id=3/>A Vergeltungsstreik gegen [SCOPE.sCountry('nuclear_attacker').GetAdjective] Gebiet würde 25 % unseres Arsenals verbrauchen und alle <x id=>5/ Staaten treffen. Der Streik würde keine Schande tragen — die Welt wird verstehen.<x id=6/\n Die Alternative besteht darin, den Angriff aufzunehmen. Es gibt keine Unehrlichkeit im Überleben."
 nuclear_events.13.f: "Die Bestellung muss nur einmal erteilt werden."
 nuclear_events.13.a: "Retaliate — Start 25% des Arsenals gegen [SCOPE.sCountry('nuclear_attacker').GetName]"
 nuclear_events.13.b: "Stehen Sie nach unten — absorbieren Sie den Schlag, bewahren Sie den Arsenal"

 nuclear_first_strike_response: "Nukleare Vergeltung (Erste Schlagantwort)"
 nuclear_first_strike_response_desc: "[ROOT.GetName] hat einen nuklearen Gegenschlag als Reaktion auf einen unvorhergesehenen nuklearen Angriff auf sein Hoheitsgebiet eingeleitet. Die internationale Gemeinschaft erkennt das Recht auf Vergeltung an – der Misserfolg wird deutlich reduziert."

 nuclear_absorbed_first_strike: "Kernstrebe absorbiert"
 nuclear_absorbed_first_strike_desc: "[ROOT.GetName] erlitten einen Atomschlag ohne Vergeltung. Die Zurückhaltung wurde international anerkannt. Diplomatisches Stehen und Prestige werden erheblich verbessert."

 # ── EVENT 14: RETALIATION NOTIFICATION ─────

 nuclear_events.14.t: "Nukleare Vergeltung Inbound"
 nuclear_events.14.d: "Unser Atomstreik wurde beantwortet. [ROOT.GetName] hat einen Vergeltungsstreik gestartet — Warheads werden inbound bestätigt.\nx id=2/>Wir haben den Austausch initiiert. Die Folgen sind unsere zu tragen."
 nuclear_events.14.f: "Jeder Streik lädt den nächsten ein."
 nuclear_events.14.a: "Aufschlagsicherung"
