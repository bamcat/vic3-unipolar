l_german:

 # ==========================================
 # UNITED STATES
 # ==========================================

 amendment_medicaid: "Arzneiwaren"
 amendment_medicaid_desc: "Bundes- und staatlich finanzierte Krankenversicherung für einkommensschwache Amerikaner, ältere Menschen und Behinderte. Medicaid füllt die Lücke, die von privaten Märkten übrigbleibt, und deckt diejenigen ab, die keine Prämien leisten können und deren Bedingungen sie unsicher machen. Das Programm ist teuer und politisch bestritten, aber seine Absenkungseffekte sind messbar und real."

 amendment_affordable_care_act: "Affordable Care Act"
 amendment_affordable_care_act_desc: "Das Affordable Care Act – bekannt als Obamacare – beauftragt, dass alle Bürgerinnen und Bürger eine Krankenversicherung tragen, regulierte Marktplätze für die private Deckung schafft und die Medicaid-Förderbarkeit verlängert. Die Versicherer können die Deckung für bestehende Bedingungen nicht leugnen. Das individuelle Mandat ist zutiefst umstritten. Unterstützer argumentieren, es ist der einzige Weg, um Versicherungsmärkte funktionieren. Die Einsprechenden nennen die Regierung, die in private wirtschaftliche Entscheidungen übergeht."

 amendment_federal_assault_weapons_ban: "Bundesangriff Waffen Ban"
 amendment_federal_assault_weapons_ban_desc: "Ein zehnjähriges Bundesverbot für die Herstellung spezifizierter halbautomatischer Waffen und Hochleistungsmagazine für zivilen Verkauf. Das Verbot wird angefochten — seine Wirksamkeit, die von Gegnern bestritten wird, seine Notwendigkeit von Unterstützern argumentiert. Sie läuft nach einem Jahrzehnt aus, es sei denn erneuert. Die politische Koalition, die sie bestand, ist zerbrechlich, und die Waffenlobby bereitet bereits ihre Antwort vor."

 amendment_authorization_military_force: "Genehmigung für den Einsatz militärischer Kräfte"
 amendment_authorization_military_force_desc: "Die Bewilligung für die Verwendung von Militärkräften gewährt der Exekutive, die die militärische Gewalt gegen die Verantwortlichen für terroristische Angriffe auf [ROOT.GetCountry.GetName], und diejenigen, die sie hafen. Die Sprache ist bewusst breit. Juristische Gelehrte werden jahrzehntelang über ihre Grenzen streiten – oder ob es irgendwelche hat. In der Praxis reduziert sie die diplomatischen Kosten einseitiger militärischer Maßnahmen und erweitert die Reichweite [ROOT.GetCountry.GetName] in der internationalen Arena."

 amendment_patriot_act: "Das PATRIOT-Gesetz"
 amendment_patriot_act_desc: "Die Vereinheitlichung und Stärkung Amerikas durch die Bereitstellung geeigneter Tools, die auf das Terrorgesetz (PATRIOT-Gesetz) „Intercept and Obstruct Terrorism Act“ – bekannt als PATRIOT – erforderlich sind – erforderlich sind, erweitert die nationalen Überwachungsbehörden dramatisch. Die Strafverfolgung kann Kommunikation überwachen, Finanztransaktionen verfolgen und Informationen über Agenturen mit weniger gerichtlichen Kontrollen als bisher teilen. Turmöl und revolutionärer Druck fallen. Zivile Freiheiten befürworten es als die bedeutendste Erosion der verfassungsrechtlichen Privatsphäre in der Geschichte [ROOT.GetCountry.GetName]."

 amendment_crime_bill_1994: "Gewaltakte und Strafverfolgungsgesetz"
 amendment_crime_bill_1994_desc: "Das Verbrechensgesetz von 1994 ist die größte Kriminalitätsgesetzgebung in der Geschichte [ROOT.GetCountry.GetName]. Es finanziert Zehntausende neuer Polizeibeamte, erweitert das Bundesgefängnissystem, führt verbindliche Mindeststrafen für eine Reihe von Straftaten ein und schafft die Gewalt gegen Frauengesetz als Reiter. Turmoil fällt. Die unter ihnen am stärksten polizeilichen Gemeinschaften werden einen anderen Blick auf ihr Vermächtnis haben."

 # ==========================================
 # CHINA
 # ==========================================

 amendment_china_tax_reform_1994: "Reform der Steuerbeteiligung"
 amendment_china_tax_reform_1994_desc: "Die Steuerreform von 1994 ersetzte das unternehmensbasierte Steuersystem, in dem die lokalen Regierungen mit Peking eine Vereinbarung über die Einkommensverteilung ausgehandelt haben, mit einer nationalen Mehrwertsteuer und einer formellen Umsatzerteilungsformel. Die Reform ist dramatisch zentralisiert. Peking gewann einen zuverlässigen und wachsenden Umsatzstrom. Lokale Regierungen verlor Diskretion, erlangten aber Klarheit. Es ist die Grundlage der modernen Fiskalarchitektur von [ROOT.GetCountry.GetName]."

 amendment_one_child_policy: "Ein-Kind-Politik"
 amendment_one_child_policy_desc: "Der Staat erzwingt eine Grenze von einem Kind pro Familie durch eine Kombination von finanziellen Anreizen, sozialen Druck und in einigen Fällen koerzitive Intervention. Die Geburtenrate fällt stark. In den folgenden Jahrzehnten wird [ROOT.GetCountry.GetName] schnell altern, und die Belegschaft wird sich zusammenziehen. Die Politik wird in städtischen Gebieten und in ländlichen Gebieten am strengsten durchgesetzt. Die internationale Gemeinschaft und die einheimischen Kritiker stoßen auf ihre Methoden."

 amendment_socialist_market_economy: "Soziale Marktwirtschaft"
 amendment_socialist_market_economy_desc: "Die sozialistische Marktwirtschaft ist der theoretische Rahmen, unter dem [ROOT.GetCountry.GetName] Marktmechanismen betreibt, während die Partei die ultimative wirtschaftliche und politische Richtung behält. Das private Unternehmen ist innerhalb der vom Staat gesetzten Grenzen erlaubt und gefördert. Ausländische Investitionen werden selektiv begrüßt. Die Widersprüche sind real und absichtlich – der Rahmen soll die Markteffizienz nutzen, ohne Parteikontrolle zu übergeben. Es funktioniert auf seine Weise."

 # ==========================================
 # FRANCE
 # ==========================================

 amendment_35_hour_work_week: "Arbeitswoche 35 Stunden"
 amendment_35_hour_work_week_desc: "Die Aubry Laws beauftragen eine gesetzliche 35-Stunden-Arbeitswoche für die meisten Mitarbeiter und reduzieren die Standardstunden ab 39. Die Politik wird als eine Möglichkeit dargestellt, die Arbeit breiter über die Bevölkerung zu teilen — weniger Stunden pro Arbeitnehmer, mehr Beschäftigte. Gewerkschaften feiern. Arbeitgeber argumentieren, es erhöht Kosten und reduziert Flexibilität. Die Debatte darüber, ob sie tatsächlich die Beschäftigung erhöht oder die bestehende Arbeit nur neu verteilt, wird nicht schnell gelöst."

 amendment_pasqua_law: "Pasqua Law"
 amendment_pasqua_law_desc: "Das Pasqua-Gesetz verschärft die Einwanderungsvorschriften deutlich — strengere Einbürgerungsanforderungen, reduzierte Familienzusammenführungsrechte, erweiterte Abschiebungsgründe und neue Beschränkungen des Rechts auf illegale Einreise. Innenminister Charles Pasqua rahmen es als eine Frage nationaler Ordnung und kultureller Kohärenz. Kritiker argumentieren, dass es sich um einen bewussten Rückschlag von [ROOT.GetCountry.GetName]'s Tradition von Asyl und Aufnahme handelt. Das Gesetz geht mit bedeutender öffentlicher Unterstützung und bedeutenden Protesten."

 amendment_medicaid_modifier: "Arzneiwaren"
 amendment_medicaid_modifier_desc: "Die Bundeskrankenversicherung umfasst einkommensschwache Bürger. Die Mortalität wird reduziert, insbesondere unter den ärmsten Schichten."

 amendment_affordable_care_act_modifier: "!"
 amendment_affordable_care_act_modifier_desc: "Erforderliche private Gesundheitsversorgung mit Subventionen und vorbestehenden Schutzmaßnahmen. Die Mortalität fällt bescheiden; die Kosten steigen für mittlere Arbeitgeber und Staat."

 amendment_federal_assault_weapons_ban_modifier: "Bundesangriff Waffen Ban"
 amendment_federal_assault_weapons_ban_modifier_desc: "Zivile Herstellung und Verkauf von bestimmten halbautomatischen Waffen ist verboten. Die Radikalisierung wird geringfügig reduziert."

 amendment_authorization_military_force_modifier: "Genehmigung für den Einsatz militärischer Kräfte"
 amendment_authorization_military_force_modifier_desc: "Die breite Exekutivbehörde, militärische Gewalt gegen nichtstaatliche Akteure zu verwenden, reduziert die diplomatischen Kosten der Intervention und erweitert [ROOT.GetCountry.GetName]'s erklärte Interessen."

 amendment_patriot_act_modifier: "Das PATRIOT-Gesetz"
 amendment_patriot_act_modifier_desc: "Erweiterte häusliche Überwachungsbehörden unterdrücken Turbulenzen und revolutionäre Aktivitäten. Legitimität und diplomatischen Ruf haben einen bescheidenen Hit."

 amendment_crime_bill_1994_modifier: "1994 Strafgesetzbuch"
 amendment_crime_bill_1994_modifier_desc: "Expanded policing und obligatorische Minimums reduzieren Turbulenzen. Die Durchsetzung der Mortalität ist bescheiden gestiegen. Der Haushalt steht unter Druck."

 amendment_china_tax_reform_1994_modifier: "Reform der Steuerbeteiligung"
 amendment_china_tax_reform_1994_modifier_desc: "Ein zentralisiertes Mehrwertsteuersystem verbessert die Steuereinnahmen und reduziert Abfälle. Die Behörde wird geringfügig verbessert."

 amendment_one_child_policy_modifier: "Ein-Kind-Politik"
 amendment_one_child_policy_modifier_desc: "Die staatlich begrenzten Geburtengrenzen haben die Geburtenrate stark reduziert. [ROOT.GetCountry.GetName]'s Bevölkerung wird in den nächsten Jahrzehnten deutlich altern."

 amendment_socialist_market_economy_modifier: "Soziale Marktwirtschaft"
 amendment_socialist_market_economy_modifier_desc: "Marktmechanismen, die unter Parteirichtung operieren, fördern den privaten Bau, verbessern den Durchsatz und erweitern industrielle Investitionen. Die Unterstützung der kommunistischen Bewegung wird bescheiden reduziert."

 amendment_35_hour_work_week_modifier: "Arbeitswoche 35 Stunden"
 amendment_35_hour_work_week_modifier_desc: "Die gesetzliche Begrenzung der Arbeitszeit hat die Arbeitsbedingungen deutlich verbessert. Durchsatz wird geringfügig reduziert. Gewerkschaften sind zufrieden; Arbeitgeber sind nicht."

 amendment_pasqua_law_modifier: "Pasqua Law"
 amendment_pasqua_law_modifier_desc: "Die strengeren Einwanderungsanforderungen haben eine erhöhte Restriktion und einen reduzierten Migrationszug. Die kulturelle Akzeptanz der nicht-heimischen Bevölkerung ist gefallen."
