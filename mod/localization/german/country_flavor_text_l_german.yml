l_german:
 
  # Middle East
  YMN_FLAVOR_TEXT:0 "Die Bemühungen, die Macht aufrecht zu erhalten, sind in Jemen zwischen der alten Regierung, dem Transition Council und dem Houthi's ausgebrochen. Dieser brutale Krieg hat die schreienden Augen der Mächte in Arabien mit sich gebracht und sie gegeneinander geschlagen, um Jemen zu seiner Gunst zu schwingen. Müssen Jemen die Unterwerfung durch seine Nachbarn ertragen oder können sie oben herauskommen?"
  HOU_FLAVOR_TEXT:0 "$YMN_FLAVOR_TEXT$"
  STC_FLAVOR_TEXT:0 "$YMN_FLAVOR_TEXT$"
  SYR_FLAVOR_TEXT:0 "Syrien leidet derzeit an einem komplexen Bürgerkrieg, der sich in einen Proxykrieg gegen mehrere Mächte verwandelt hat. Die Region bleibt extrem feindselig und die Konflikte nur eskalieren zwischen den Interim glauben an ihr Recht zu regieren, und Rojava brechen frei, um eine progressivere Republik zu bilden. Flüchtlinge verlassen und schwarmen Europa auf der Suche nach sicheren Ländern zu leben. Wird Syrien den Krieg beenden und ihre schnell flüchtige Bevölkerung zurückbringen, oder ist es bestimmt, zu scheitern und ein Vakuum für die anderen Mächte zu werden?"
  SIG_FLAVOR_TEXT:0 "$SYR_FLAVOR_TEXT$"
  ROJ_FLAVOR_TEXT:0 "$SYR_FLAVOR_TEXT$"
  IRA_FLAVOR_TEXT:0 "Der Iran ist an der Spitze ihrer eigenen islamischen Revolution, Das Land hat mit der relativen Stabilität des traditionellen Islam sitzen und nicht von der arabischen Quelle betroffen. Die Auswirkungen des arabischen Frühlings sind jedoch nicht unbemerkt von der jüngeren Bevölkerung verschwunden, und die Bevölkerung sehnt sich nach einem Ende ihrer extremistischen traditionellen Wege. Kann der Iran seine traditionellen Werte festhalten? Oder werden sie von einer mehr multikulturellen Bevölkerung überwachsen?"
  
  # East Asia
  PRC_FLAVOR_TEXT:0 "Die Volksrepublik China sitzt als globaler Wirtschaftshegemon und ist als Finanzierer für weniger glückliche Nationen. Allerdings sind die Schuldenerlasssysteme zurückhaltend, und die Abhängigkeit von chinesischen Waren wird durch ihre nahe gelegenen Nachbarn und Automatisierung geschwächt. Kann China ihre wirtschaftliche Herrschaft wieder einrichten. Oder sollen sie durch innere Spannungen auseinanderfallen?"
  NRK_FLAVOR_TEXT:0 "Nordkorea bleibt als letzte Bastion maoistischer Diktatur auf dem Planeten. Die verschiedenen Denkspiele und Gehirnwäsche der Nation bleiben trotz der strengen und tödlichen Regimes exkrutierend wirksam. Wird das 80-jährige Regime weitere 80 Jahre dauern? oder ist es, wieder zu vereinen mit ihm ist Nachbar im Süden und wieder aufbauen von dort?"
  JPN_FLAVOR_TEXT:0 "Japan ist seit Ende der WW2 eine entwaffnete Nation geblieben, die jedoch ihre extreme wirtschaftliche Kontrolle nicht aufgehalten hat. Japanische Automobile und japanische Elektronik sind weltweit bekannt und als das Beste der Besten revered. Aber das ist nicht ohne Opfer... Das Land hat eine alternde Bevölkerung und ist zwischen vielen regionalen Mächten eingebunden. Was wird Japan dazu bringen, unabhängig zu bleiben?"
  
  # Oceania
  AUZ_FLAVOR_TEXT:0 "Australien, das Land der Gelegenheit und der 'Dream'. Während die Position der US-Falter, Australien, trotz seiner Mängel und wärmeren Umgebung hat der Kontinent, der das Land überspannt, den Namen "Das Land der Opportunität". Doch interne politische Spaltungen und das erwärmende Klima versuchen Australiens Chance zu ruinieren, eine Bastion des Wohlstands zu sein. Kann Australien die moderne Welt erfolgreich durchqueren?"
  
  # Balkans
  SRB_FLAVOR_TEXT:0 "Serbien sitzt als Rump-Staat und letzte Überreste des gescheiterten jugoslawischen Experiments. Sowohl Montenegro als auch Kosovo in den letzten Jahren verloren, die Nation sehnt sich nach einem Sieg. Wird Serbien die verlorene Herrlichkeit Jugoslawiens wiedererlangen?"
  
  # Europe
  ENG_FLAVOR_TEXT:0 "England hat durch das 20. Jahrhundert Gewalt als große Macht ausgeübt, aber mehrere Rezessionen, große politische Korruption und aufwühlende Legitimität haben den Akt der Union in Frage gerufen. Kann England seine Kontrolle über seine Herrschaft behalten? Oder ist der europäische Markt das letzte Stroh?"
  SCO_FLAVOR_TEXT:0 "Schottland ist während der Rezessionen des frühen 21. Jahrhunderts relativ unbefangen geblieben und ist weiterhin wohlhabend, da die Devolution gewährt wurde. Große Korruption und Versagen der Vertretung innerhalb der Union haben ihren Platz in Frage gestellt. Wird es wohlhabend sein, wenn es einmal Unabhängigkeit gewinnt? Oder wird die Union der Weg der Zukunft sein?"
  NIR_FLAVOR_TEXT:0 "Der letzte Stand des britischen Imperialismus in Irland, Nordirland, ist ein Pulverfass, das darauf wartet, beleuchtet zu werden. Die Probleme sind vielleicht vorbei, aber die Frage seiner Souveränität geht weiter, da die jüngere Generation nach der Vereinigung mit ihren südlichen Geschwistern sehnt... Britisch in Irland, wird es den Weg der Monarchen gehen?"
  IRE_FLAVOR_TEXT:0 "Irland hat sich von einem Land unter dem britisch-imperialen Stiefel verwandelt, zum leuchtenden Leuchtfeuer der Anglosphäre, die Bemühungen, ihre Sprache wieder zu entfachen und sich von dem des Vereinigten Königreichs zu distanzieren, haben sich bewährt und die Anstrengungen zwischen sich und seinem Nachbar im Norden haben zu einem Wunsch nach Einheit geführt. Was kommt als nächstes zu den Emerald Isles?"
  UKR_FLAVOR_TEXT:0 "Die westlichen Anstrengungen in der Ukraine sind weit gegangen und das Leben vieler Ukrainer verbessert sich schnell, aber eine russische Invasion für die Krim 8 Jahre zuvor hat eine wichtige Region weggenommen. Auch die Separatisten im Osten haben Russland eine Öffnung ins Herzland gegeben. Kann die Ukraine die Separatisten wieder unter die Falte bringen, oder ist die Ukraine das nächste Ziel in Russlands wachsenden Ambitionen"
  CYP_FLAVOR_TEXT:0 "Zypern sitzt als Insel, geteilt durch die ethnischen Gruppen, Griechen im Süden, Türken im Norden. Jedoch bildet sich eine wachsende zypriotische Identität, und es kann nicht lange dauern, bis es Forderungen gibt, die Nation ein für alle Mal zu vereinigen. Wird Zypern in der Lage sein, erfolgreich zu vereinen oder sind sie dazu bestimmt, immer geteilt zu werden?"
  BYL_FLAVOR_TEXT:0 "Weißrussland ist zu Beginn einer politischen Revolution, seine Bürger sind aktiv gegen die Regierung und der wahre Staatschef hatte die Wahl durch eine harte Stimme verloren. Lukashenko erwärmt sich auf ihren russischen Nachbarn, um seine Kontrolle zu schützen. Wird Lukaschenko Erfolg haben oder werden die Belarussen seiner illegitimen Regierung ein Ende setzen?"
  SPA_FLAVOR_TEXT:0 "Spanien hält einen angenehmen Aufschwung nach der Beschwörung der falangistischen Bewegung, Es ist ein schnell modernisierendes Land und bemüht sich um eine größere Zukunft für sein Volk. Doch nicht alle stimmen mit ihrer Richtung überein, da eine Unabhängigkeitsbewegung in Katalonien Dampf gewinnt. Wird Spanien mit oder ohne Katalonien flüstern?"
  XSP_FLAVOR_TEXT:0 "Spanien hält einen angenehmen Aufschwung nach der Beschwörung der falangistischen Bewegung, Es ist ein schnell modernisierendes Land und bemüht sich um eine größere Zukunft für sein Volk. Doch nicht alle stimmen mit ihrer Richtung überein, da eine Unabhängigkeitsbewegung in Katalonien Dampf gewinnt. Wird Spanien mit oder ohne Katalonien flüstern?"
  NRW_FLAVOR_TEXT:0 "Norwegen bleibt eines der wenigen Länder, die im 21. Jahrhundert eine stärkere Nation als zuvor eintraten, ein starkes soziales Sicherheitssystem und mächtige Ressourcen, die es auf den Markt bringen kann, machen es zum verwüsten Ort der Träume. Wie die Welt jedoch von Öl abgeht, kann Norwegen seine Vorherrschaft erfolgreich behalten, oder wird der Aufschwung von Öl sein Niedergang sein?"
  RSF_FLAVOR_TEXT:0 "Seit dem Sturz der Sowjetunion, Russland, Es ist Nachfolgestaat, hat sich auf die gleiche wirtschaftliche Macht und Prowess jedoch zu halten. Die meisten ihrer Kampagnen seit dem Sturz der Union waren die Wiederherstellung der wirtschaftlichen Dominanz. Innerhalb Georgiens im Jahr 2008 und innerhalb der Ukraine im Jahr 2014. Jedoch sprechen die Oligarchen von einer anderen Kampagne in die Ukraine, um die Länder östlich der Dnieper & die separatistischen Regionen des Ostens zu nehmen. Ist das ihr Weg im 21. Jahrhundert, oder werden sie scheitern?"
  EUR_FLAVOR_TEXT:0 "Die Europäische Union ist das Gehirn-Kind des Nachkriegs-Wiederaufbaus nach der Verwüstung von WW2. Seither hat es sich weiterentwickelt, den größten Teil des Kontinents einzubeziehen, einige Nationen wie Norwegen und die Schweiz oder die westlichen Balkanstaaten und ehemalige jugoslawische Staaten. Die Gewerkschaft hat erst seit der ungewöhnlichen Wahl des Vereinigten Königreichs gefestigt, aus ihr zu fliehen, und die meisten Gespräche davon, sie zu verlassen, wurden in den meisten Ländern nicht mehr ernst genommen, die Union wird von hier nur noch verstärkt, als die Gespräche über einen Verband wachsen. Wird sich die Europäische Union in die Europäische Föderation entwickeln? Oder wird die Europäische Union nur in den Geschichtsbüchern erwähnt werden?"
  TRK_FLAVOR_TEXT:0 "Türkiye sitzt als wichtigste Barriere in Russlands seetüchtigen Ambitionen und hält einen strategischen Haken über viele seiner Nachbarn. Sie ist aktiv in den Konflikten im Süden entbunden und unterstützt die Interimsregierung Syriens und hat aktive Milizen in Afrika & im mittleren Osten. Die Position von Türkiye in der anatolischen Region bietet ihm eine große Kontrolle über die Regionen um sie herum und hebt die Ambitionen der Osmanen vor. Wird Türkiye seine Ambitionen aufhalten? Oder ist es bestimmt, wie die Ottomanen vorher zu scheitern?"
  
  # North America
  USS_FLAVOR_TEXT:0 "Die Vereinigten Staaten hatten dank des Konjunkturbooms nach dem Krieg ein wohlhabendes 20. Jahrhundert und sie hat bis Ende des Jahrhunderts als einzige Supermacht katapultiert. Jedoch dienen große Korruption und unterhändige Taktiken von Unternehmen dazu, den Stoff in der Gewerkschaft auseinander zu reißen. Da die USA sowohl sozial als auch wirtschaftlich weiter zurückfallen. Was hält die Zukunft für die Union, und werden sie ihre alte Herrlichkeit wiedererlangen können?"
  MEX_FLAVOR_TEXT:0 "Drogenkartelle und US-amerikanischer Imperialismus sind die bestimmenden Merkmale des Mexiko aus dem 21. Jahrhundert. Es wurden jedoch viele Anstrengungen unternommen, die Kartelle zu lösen, ohne dass die USA einen Krieg auf ihrem Boden bekämpfen. Was hat mexico für das nächste Jahrhundert im Lager, und können sie erfolgreich den Kupplungen des US-Imperialismus entkommen"
  CAN_FLAVOR_TEXT:0 "Kanada brüllte in das 21. Jahrhundert als eine stabile Nation ohne große Probleme. Allerdings fordern die Ersten Nationen seit der Gründung des kanadischen Reiches Zugeständnisse über ihre schreckliche Behandlung. Wird Kanada zustimmen?"
  
  # Central Asia
  AFH_FLAVOR_TEXT:0 "Der Friedhof der Reiche, Afghanistan, hat den Bemühungen des amerikanischen Imperialismus erfolgreich Widerstand geleistet und seine Souveränität als regionale Macht garantiert. Konflikte zwischen den verschiedenen ethnischen Gruppen und Ablenkern vom Glauben bedrohen jedoch die traditionelle Lebensweise. Kann Afghanistan seine traditionellen Wege erfolgreich vorantreiben?"
  AZB_FLAVOR_TEXT:0 "Aserbaidschan sitzt als eine wohlhabende Kaukasusnation, die jüngsten Entdeckungen der Öl- und Gasreserven haben es zu einem wichtigen Verbündeten für Europa gemacht, aber die Artakh-Konflikte, und die anschließenden Grenzkriege mit ihrem Nachbar Armenien haben sie daran gehindert, ihre Größten zu erreichen. Kann Aserbaidschan diese Krise friedlich lösen oder wird sie sich zum Krieg entwickeln?"
  KZK_FLAVOR_TEXT:0 "Kasachstan ist zwischen verschiedenen Führungen und Regierungen und ist in milde Anarchie gefallen. Sein früherer Anführer verließ ein massives Power-Vakuum und neue Herrscher erschienen, um zu versuchen, Kasachstan in einer sehr schönen Richtung zu steuern. Kann Kasachstan den inneren Machtkampf überleben?"
  UZB_FLAVOR_TEXT:0 "Usbekistan hat sich seit seiner Trennung von der UdSSR in den 90er Jahren von der Diktatur befreit, hat jedoch erfolgreich begonnen, seine Situation mit seinen Nachbarn zu liberalisieren und weiter zu verbessern. Während es weiterhin glücklicher wird, kann das gleiche nicht von einigen seiner Nachbarn gesagt werden, und es wird seine Souveränität verkünden müssen, um zu überleben..."
  
  # Africa
  SAF_FLAVOR_TEXT:0 "Südafrika ist eine Nation, die sich bemüht, ihren Weg zu finden, die Konflikte, die seine Geschichte definieren, haben zu ihrem Wesen Resentment im besten Fall zwischen den verschiedenen ethnischen Gruppen geführt, diese Spannung wurde nur noch schlechter von der Apartheid gemacht. Wenn Südafrika Erfolg haben will, hat es einen groben Weg von Konzessionen, Wiederaufbau und politische Reform zu tun. Kann Südafrika das tun? Oder ist es bestimmt, auseinander zu fallen."
  SSD_FLAVOR_TEXT:0 "Südsudan wurde aus dem daraus resultierenden Konflikt der ethnischen Gruppen entlang des Nils geboren, Es ist das neueste Land, das von den Vereinten Nationen anerkannt wird, und hat einen langen Weg zu gehen, bevor es als ein Erfolg betrachtet werden kann. Ethnische Spannungen halten das Land still und vorsichtig Manöver müssen gemacht werden, um sicherzustellen, dass diese Nation nicht kurz gelebt wird. Ist es dazu fähig?"
  ETH_FLAVOR_TEXT:0 "Äthiopien ist eine schnell modernisierende Nation und hat es geschafft, relativ unbeschnitten von kolonialen Händen. Jedoch hat die Nation noch ihre Schwierigkeiten, wie die somali, tigray & oromia ethnische Gruppen droht, Äthiopien in einen kostspieligen Bürgerkrieg zu ziehen. Kann Äthiopien trotz der Spannung weiter flüstern?"
  EGY_FLAVOR_TEXT:0 "Ägypten erlebt einen Bevölkerungsboom inmitten eines extremen Wassermangels und einer fehlgeschlagenen traditionellen Regierung. Ägypter gehen in Fahrten für bessere Länder und der Nil wird langsam trocknen. Kann Ägypten einen Weg finden, die Krise zu navigieren?"
  KYA_FLAVOR_TEXT:0 "Kenia ist eine strukturell solide afrikanische Nation inmitten erfolgreicher Modernisierungsbemühungen und rascher Verbesserung der Lebensstandards. Während Kenia vor allem ohne ernste Probleme sein kann, sind seine Nachbarn nicht so glücklich. Es gibt Gespräche, um eine ostafrikanische Supermacht in der politischen Sphäre zu bilden. Wird Kenia erfolgreich die Fundamente für eine afrikanische Supermacht legen? Oder wird der Aufruhr in seinen Nachbarn sein eigenes Land beeinflussen."
  MOR_FLAVOR_TEXT:0 "Marokko ist in das 21. Jahrhundert stark und stolz nach seiner klugen Unterwerfung der Saharawi-Republik und seinen großen Verbesserungen an seiner wirtschaftlichen Ungleichheit entstanden. Sie sucht nun die Partnerschaft der europäischen Mächte, um ihre wirtschaftliche Mobilität weiter zu fördern und zu einem großen Akteur auf dem afrikanischen Kontinent zu werden. Werden die Bestrebungen Marokkos erreicht?"
  GHA_FLAVOR_TEXT:0 "Nach einer brutalen Militärjunta in den 80er Jahren, die den "Cold Chop" nannte, begann Ghanas wirtschaftliche Lage massiv auseinander zu fallen. Seit der Rückkehr der politischen Parteien und Wahlen ist das Land jedoch in eine Zeit der Stabilität und des wirtschaftlichen Wohlstands zurückgekehrt und wird damit fortgeführt. Doch die Klimakrise und die Wüstenbildung des Sahels bedrohen erneut Instabilität. Kann Ghana diese Bedingungen erfolgreich navigieren?"
  
  # South Asia
  VNM_FLAVOR_TEXT:0 "Vietnam sitzt als Nation der relativen Stabilität seit seiner Dekolonialisierung. Als eine der wenigen weit linken Marktwirtschaften hat ihre Vorteile, und während die Bürger den relativen Frieden ertragen, werden Touristen das Land überwunden. Sorgfältige Entscheidungen und intelligente Geopolitik können es im 21. Jahrhundert extrem erfolgreich sein. Wird es diese Entscheidungen treffen?"
  IDA_FLAVOR_TEXT:0 "Indien hat nicht nur überlebt, sondern gedeiht seit der Auflösung des british raj & Ende 400 Jahre Kolonialherrschaft. Jedoch einige postkoloniale Traumata mit der Trennung von Myanmar, Bangladesch & Pakistan waren eine Narbe auf einem ansonsten anständigen Rekord. Die steigenden Spannungen zwischen Indien und Pakistan über die Länder von Jammu & Kaschmir sind jedoch ein wichtiger Grund für Besorgnis und steigende Spannungen mit der VR China über Arunchal Pradesh rufen bewaffneten Konflikt ins Spiel. Kann Indien erfolgreich 100 Jahre Imperialismus widerstehen?"
  PAK_FLAVOR_TEXT:0 "Pakistan trennte sich von der Raj in den 40er und 50er Jahren über die religiösen Spannungen zwischen Hindus & Muslims. Während viele glauben, dass der Konflikt ein Ende in Sicht hat, aber zwischen den verschiedenen ethnischen Gruppen von Pakistan-Konflikt braut. Eine falsche Bewegung & es kann einen Zusammenbruch des Staates geben, und mit Spannungen mit Indien und Afghanistan auf ihrer Höhe, kann Pakistan diese Probleme navigieren?"
  
  # South and Central America
  ARG_FLAVOR_TEXT:0 "Argentinien ist eine Nation, die nach einem erfolgreichen 20. Jahrhundert durch US-Intervention und einen gescheiterten Konflikt über Las Malvinas gebremst hat. Die Streitigkeiten zwischen der einheimischen Mapuche, den argentinischen Staaten und der Regierung in Buenos Aires haben viele Veränderungen blockiert. Kann Argentinien die Ränge wiederbeleben und ihr Land wieder in Ruhm bringen?"
  
  # Nonsense Countries
  GLI_FLAVOR_TEXT:2 "Galicia ist ein kleines und unschätzbares Land, das von Domliebhabern bewohnt wird. Wird Galicia seine vergangene Herrlichkeit wiedererlangen?"
  GENERIC_FLAVOR_TEXT:0 "The 21st Century is a time of relative peace & prosperity, however exploitation by the wealthy, waning standards of living and global communication have brought with it a resurgence in political activism and societal shifts like none ever seen. What will this new wave of political expression bring?
  REV_GENERIC_FLAVOR_TEXT:1 "Unzufrieden mit der Richtung, die die so genannte organisierte Regierung einnahm, haben diese Revolutionäre beschlossen, Waffen aufzunehmen, um sie zu überstürzen. Werden sie es schaffen, Macht zu erlangen oder werden sie wie so viele vergessene Revolutionen der Vergangenheit zerquetscht?"
  DECENTRALIZED_FLAVOR_TEXT:0 "Ergriffen durch mehr organisierte Mächte, kämpft dieses Land um ihre Autonomie. Werden sie die Morgendämmerung eines neuen Jahrhunderts sehen, oder wird ihr Name nur in Geschichtsbüchern überleben?"
