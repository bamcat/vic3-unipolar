  # New Laws Any Group
 law_equal_rights:0 "Direitos iguais"
 law_equal_rights_desc:0 "As mulheres podem esperar experimentar o mesmo nível de direitos que os seus homólogos masculinos."
 law_prison_slavery:0 "Escravidão na prisão"
 law_prison_slavery_desc:0 "Prisioneiros e criminosos são forçados a trabalhar por longas horas com pouco a nenhum salário durante sua sentença."
 law_restricted_police:0 "Polícia restrita"
 law_restricted_police_desc:0 "O poder apresentado pela força policial foi restringido e está sujeito a regulamentos rigorosos para garantir a segurança dos cidadãos que estão dispostos a proteger."
 law_resettlement_enticement:0 "Ativação de reinstalação"
 law_resettlement_enticement_desc:0 "O governo apresenta programas para atrair as pessoas para se mudarem para seus territórios."
 
 # Rights of Minorities Group
 
 lawgroup_rights_of_minorities:0 "Direitos das Minorias"
 lawgroup_rights_of_minorities_desc:0 "Os regulamentos legais e as proteções às populações minoritárias."
 
 law_no_minority_rights:0 "Sem direitos de minoria"
 law_no_minority_rights_desc:0 "As minorias de todos os tipos não receberão os mesmos direitos que os da população geral."
 law_segregation:0 "Leis de Segregação"
 law_segregation_desc:0 "Minorias experimentarão graus de separação da população geral, muitas vezes recebendo os restos e sobras."
 law_apartheid:0 "Leis do Apartheid"
 law_apartheid_desc:0 "As minorias não experimentarão a mesma sociedade da população em geral, e muitas vezes serão removidas ou deslocadas (muitas vezes com força) para uma "terra" designada."
 law_unfulfilled_protections:0 "Proteçãos não cumpridas"
 law_unfulfilled_protections_desc:0 "O Estado tem feito esforços para eliminar as barreiras para as minorias, mas as leis que regem os direitos das minorias continuam em grande parte sem força."
 law_limited_protections:0 "Protecçãos Limitadas"
 law_limited_protections_desc:0 "As minorias de etnia ou nacionalidade diferente receberão grande parte dos mesmos direitos que a população em geral goza."
 law_encompassing_protections:0 "Proteçãos Incomparantes"
 law_encompassing_protections_desc:0 "As minorias de etnias ou nacionalidades diferentes, bem como as deficientes, receberão todos os direitos e protecção de que goza a população em geral."
 law_universal_protections:0 "Protecção Universal"
 law_universal_protections_desc:0 "Todas as minorias, independentemente de sua etnia, nacionalidade, habilidade, sexualidade ou identidade de gênero, receberão os mesmos direitos que a população em geral."
 
 # Union Laws Group
 
 lawgroup_union_laws:0 "Direito da União"
 lawgroup_union_laws_desc:0 "A disposição do corpo governante em relação às ações sindicais de trabalho, tais como greves, greves, protestos, motins e outros."
 law_unions_outlawed:0 "Unidade Proibida"
 law_unions_outlawed_desc:0 "Os sindicatos são proibidos nesta nação e os criminosos irão receber resistência rápida."
 law_useless_unions:0 "Burocracia Inútil"
 law_useless_unions_desc:0 "Sindicatos não são nada mais do que burocracia dos trabalhadores e falta as necessidades para funcionar e lutar sem forças externas."
 law_limited_action:0 "Acção Limitada"
 law_limited_action_desc:0 "As uniões são fortemente restritas no que lhes é permitido alcançar e, muitas vezes, têm de navegar por lacunas legais para serem eficazes."
 law_craft_unions:0 "Sindicatos de artesanato"
 law_craft_unions_desc:0 "Os sindicatos estão restritos aos seus papéis específicos, e são impedidos de forjar alianças com sindicatos de outros papéis."
 law_permitted_unions:0 "Acção Permitida"
 law_permitted_unions_desc:0 "Os sindicatos não são nem legais nem ilegais, podem funcionar como quiserem, mas têm pouca ou nenhuma protecção contra o organismo governante."
 law_enterprise_unions:0 "Empresas"
 law_enterprise_unions_desc:0 "Os sindicatos estão lá para melhorar o desempenho de trabalho de seus funcionários e focar nas necessidades de seus membros. São eficazes na melhoria da vida dos seus membros através dos meios necessários."
 law_backed_unions:0 "Proteções Apoiadas"
 law_backed_unions_desc:0 "Os sindicatos são efectivamente apoiados pelo público e têm-se cimentado como parte da cultura dos países. Têm protecção por parte das pessoas e são-lhes concedidas protecção jurídica no sentido de agirem de forma decisiva."
 law_empowered_unions:0 "Empoderamento da União"
 law_empowered_unions_desc:0 "Os sindicatos são fortemente reforçados pela polícia e têm apoio do governo. Estes sindicatos são capazes de obter suas demandas de forma eficaz, e estão sob todas as circunstâncias são protegidos e aplaudidos."
 
 # Corporate Authority Group
 
 lawgroup_corporate_authority:0 "Autoridade Corporativa"
 lawgroup_corporate_authority:0 "Os regulamentos legais para as corporações e os absurdamente ricos, estes incluem regulamentos de seu poder político e controle que eles são capazes de exercer."
 law_completely_unregulated:0 "Completamente não regulado"
 law_completely_unregulated_desc:0 "As ações das corporações e as ações dos absurdamente ricos não são impedidas de forma alguma. Muitas vezes em detrimento dos trabalhadores e pessoas que vivem lá."
 law_political_lobbying:0 "Lobby político"
 law_political_lobbying_desc:0 "Qualquer pessoa com uma grande soma de fundos pode pressionar o governo e pressioná-los a mudar as leis a seu favor."
 law_tax_haven:0 "Habitação fiscal"
 law_tax_haven_desc:0 "Corporações e indivíduos com riqueza absurda são considerados bem-vindos e o corpo governante colocou leis em vigor favorecendo-os com menos impostos e mais terra."
 law_feign_ignorance:0 "Ignorância Fingida"
 law_political_lobbying_desc:0 "O corpo governante escolhe fazer o mínimo possível para restringir o poder das corporações e dos absurdamente ricos, escolhendo fingir que não é um problema."
 law_limited_restrictions:0 "Restrição limitada"
 law_limited_restrictions_desc:0 "Os ativos das corporações e dos absurdamente ricos são tributados, independentemente de estarem em dinheiro ou serem mantidos em investimentos e ações."
 law_progressive_restrictions:0 "Restrição progressiva"
 law_progressive_restrictions_desc:0 "Todos os ativos dos absurdamente ricos e todos os lucros da empresa realizada ou não é tributado e usado para melhorar a população a uma taxa progressiva."
 law_no_one_individual:0 "Nenhum indivíduo"
 law_no_one_individual_desc:0 "Os absurdamente ricos estão em dívida com o sistema fiscal do órgão governante se optarem por fazer negócios lá. Sua riqueza gerada enquanto no país é reduzida e é distribuída à população em necessidade."
 law_corporate_redistribution:0 "Redistribuibilidade Corporativa"
 law_corporate_redistribution_desc:0 "Qualquer riqueza gerada pelos absurdamente ricos, ou corporações é reduzida ao máximo permitido. Esta riqueza é então redistribuída conforme necessário. Corporações são entregues ao público e consistem em um conselho, incluindo funcionários eleitos"
 
 law_serfdom:0 "Direitos trabalhistas não cumpridos"
 law_serfdom_desc:0 "Ou não há direitos laborais estabelecidos, ou os direitos laborais estabelecidos são completamente não aplicados."
 law_serfdom_banned:0 "Proteção Mínimo nu"
 law_serfdom_banned_desc:0 "O mínimo de proteções foi estabelecido."
 
 lawgroup_drug_regulations: "Regulamentos sobre drogas"
 lawgroup_drug_regulations_desc: "O estatuto jurídico das substâncias intoxicantes — da proibição total à legalização total do tráfico. A política de drogas molda a mortalidade, a autoridade estatal, os custos de execução e o poder dos interesses agrícolas e criminais."

 law_total_prohibition: "Proibição total"
 law_total_prohibition_desc: "Todas as substâncias intoxicantes — incluindo o álcool e o tabaco — são proibidas por lei. O Estado reivindica a autoridade moral para regular o que os cidadãos colocam em seus corpos, apoiado por instituições religiosas e conservadoras. Os mercados negros prosperam nas lacunas que a aplicação não pode preencher."

 law_alcohol_tobacco_legal: "Legal de Álcool e Tabaco"
 law_alcohol_tobacco_legal_desc: "O álcool e o tabaco são legais e tributados. Todas as outras substâncias continuam proibidas. Este é o quadro jurídico de base para a maioria dos Estados modernos — um compromisso pragmático entre o interesse económico e o conservadorismo moral."

 law_marijuana_decriminalization: "Descriminalização da maconha"
 law_marijuana_decriminalization_desc: "A posse pessoal e o uso de cannabis deixaram de ser crime. O comércio continua a ser ilegal, mas a aplicação é reorientada para substâncias mais duras. A política reflecte um consenso crescente de que o encarceramento não constitui uma resposta eficaz ao consumo de drogas recreativas."

 law_hard_drugs_decriminalized: "Decriminalização de drogas duras"
 law_hard_drugs_decriminalized_desc: "A posse de todas as substâncias controladas — incluindo opiáceos, cocaína e anfetaminas — é tratada como uma questão de saúde pública, em vez de criminosa. Os usuários são encaminhados para tratamento em vez de acusação. A política é controversa, mas as evidências dos primeiros adotivos sugerem que reduz a mortalidade por overdose e liberta recursos de execução."

 law_safe_injection_sites: "Sites de Injecção Segura"
 law_safe_injection_sites_desc: "Instalações financiadas pelo governo permitem aos usuários consumir medicamentos sob supervisão médica. Os funcionários podem administrar medicamentos de inversão de overdose e conectar usuários com programas de tratamento. As taxas de mortalidade caem significativamente. A oposição religiosa e conservadora é feroz — a política é vista como aceitando, e até mesmo possibilitando, o uso de tóxicos."

 law_trafficking_allowed: "Tráfico permitido"
 law_trafficking_allowed_desc: "O comércio de substâncias regulamentadas é totalmente legalizado e regulamentado pelo Estado. Os benefícios económicos são imediatos e substanciais — a receita de droga flui para a economia formal e para a base fiscal. As consequências reputacionais e sociais são graves. A maioria do mundo considerará isso como uma capitulação para as redes criminosas."

 law_total_prohibition_modifier: "Proibição total"
 law_alcohol_tobacco_legal_modifier: "Legal de Álcool e Tabaco"
 law_marijuana_decriminalization_modifier: "Descriminalização da maconha"
 law_hard_drugs_decriminalized_modifier: "Decriminalização de drogas duras"
 law_safe_injection_sites_modifier: "Sites de Injecção Segura"
 law_trafficking_allowed_modifier: "Tráfico permitido"
 
 lawgroup_disability_rights: "Direitos de deficiência"
 lawgroup_disability_rights_desc: "O quadro jurídico que rege os direitos dos cidadãos com deficiência — desde o reconhecimento à ajuda estatal activa através do tratamento, das infra-estruturas e da inclusão no local de trabalho. Quadros mais abrangentes ampliam a participação da força de trabalho, melhoram o nível de vida e reduzem a mortalidade, a um custo crescente para o Estado e os empregadores."

 law_minimal_recognition: "Reconhecimento Mínimo"
 law_minimal_recognition_desc: "O Estado reconhece que os cidadãos com deficiência existem, mas não lhes proporciona alojamento, apoio ou protecção jurídica. As pessoas com deficiência são em grande parte excluídas do emprego formal e da vida pública. O custo humano é significativo; o custo fiscal é negligenciável."
 
 law_workplace_accommodations: "Alojamentos no local de trabalho"
 law_workplace_accommodations_desc: "Os empregadores são legalmente obrigados a efectuar ajustamentos razoáveis para permitir que os trabalhadores com deficiência participem na mão-de-obra — equipamento modificado, tarefas ajustadas, postos de trabalho acessíveis. A política traz uma população significativa para o emprego produtivo. Os empregadores suportam custos de ajustamento, mas a força de trabalho se expande."
 
 law_anti_ableist_architecture: "Arquitetura Anti-Abélica"
 law_anti_ableist_architecture_desc: "Os edifícios públicos, as redes de transporte e as infra-estruturas devem ser acessíveis aos cidadãos com deficiência. Rampas, elevadores, pavimentação tátil, sinalização acessível — o ambiente físico não deve mais excluir. A reforma da infra-estrutura existente é cara. A população que pode participar plenamente da sociedade se expande consideravelmente."
 
 law_public_treatments: "Tratamentos Públicos"
 law_public_treatments_desc: "O Estado financia tratamentos médicos, dispositivos de assistência, próteses, terapia e serviços de apoio contínuo para cidadãos com deficiência como uma questão de direito em vez de caridade. A mortalidade cai significativamente. O padrão de vida aumenta em toda a população. O custo para o orçamento público é substancial e contínuo — mas o argumento de que alguns cidadãos têm menos direito ao apoio estatal do que outros foi formalmente rejeitado."
 
 law_minimal_recognition_modifier: "Reconhecimento Mínimo da Deficiência"
 law_minimal_recognition_modifier_desc: "Os cidadãos deficientes não recebem alojamento do Estado. A força de trabalho eficaz é reduzida e a mortalidade está acima do que poderia ser."
 
 law_workplace_accommodations_modifier: "Alojamentos no local de trabalho"
 law_workplace_accommodations_modifier_desc: "Os empregadores são obrigados a acomodar trabalhadores com deficiência. A força de trabalho é mais ampla e mais inclusiva, a um custo modesto para a construção da produtividade."
 
 law_anti_ableist_architecture_modifier: "Infra-estruturas acessíveis"
 law_anti_ableist_architecture_modifier_desc: "As infra-estruturas públicas foram tornadas acessíveis. Os custos de construção são mais elevados à medida que os edifícios cumprem os padrões de acessibilidade, mas a população que pode participar plenamente na sociedade é significativamente maior."
 
 law_public_treatments_modifier: "Tratamentos de Deficiência Pública"
 law_public_treatments_modifier_desc: "O Estado financia o tratamento e o apoio aos cidadãos com deficiência. A mortalidade é reduzida, o nível de vida é melhorado, e o acesso à educação é mais amplo — a um custo público significativo e contínuo."
 
 institution_environmental_protection: "Agência de Protecção do Ambiente"
 institution_environmental_protection_desc: "Uma agência governamental dedicada ao monitoramento e aplicação de normas ambientais. Cada nível de investimento representa capacidade de execução ampliada, regulamentos mais rigorosos e programas de conservação mais amplos — reduzindo a geração de poluição em todos os estados."
 
 lawgroup_environmental_regulations: "Regulamentos ambientais"
 lawgroup_environmental_regulations_desc: "O quadro jurídico que rege a relação do [ROOT.GetCountry.GetName] com o ambiente natural — da exploração industrial não regulamentada aos direitos de natureza constitucionalmente garantidos. Quadros mais progressivos reduzem a poluição, reduzem a mortalidade e protegem os ecossistemas, a um custo crescente para a produção industrial e para as despesas públicas."
 
 law_no_environmental_regulations: "Sem Regulamentos"
 law_no_environmental_regulations_desc: "A indústria opera sem restrições ambientais. Fábricas, minas e fazendas podem poluir, extrair e explorar sem limite legal. A saída está maximizada. O custo a longo prazo — em mortalidade, degradação do ecossistema e saúde pública — é suportado pela população, não pelos produtores."
 
 law_game_law: "Lei do Jogo"
 law_game_law_desc: "Caça e pesca são reguladas para evitar o colapso das populações de caça. Estações protegidas, caça licenciada e restrições aos métodos de extração mais destrutivos. É um quadro de conservação que serve principalmente os interesses dos ricos o suficiente para caçar recreativamente — mas estabelece o princípio de que o Estado tem interesse em gerir os recursos naturais."
 
 law_national_recycling: "Reciclagem Nacional"
 law_national_recycling_desc: "Um programa nacional de recolha e tratamento de resíduos recicláveis. Os resíduos industriais e domésticos são classificados, recuperados e reutilizados sempre que possível, reduzindo o volume de materiais que entram nos aterros e vias navegáveis. A eficiência dos recursos melhora modestamente. A poluição cai. O programa requer coordenação entre municípios e indústrias."
 
 law_protection_agency: "Agência de Protecção"
 law_protection_agency_desc: "Uma agência governamental dedicada com autoridade para definir, monitorar e aplicar padrões ambientais em todos os setores da economia. Os limites das emissões, as restrições ao uso do solo, as regulamentações em matéria de resíduos industriais e as áreas naturais protegidas são da sua competência. A agência pode ser investida — cada nível adicional de financiamento amplia sua capacidade de execução e reduz ainda mais a poluição."
 
 law_guaranteed_rights_of_nature: "Direitos da Natureza garantidos"
 law_guaranteed_rights_of_nature_desc: "Os rios, as florestas, as zonas húmidas e os ecossistemas beneficiam de uma posição jurídica — o direito de não serem destruídos, poluídos ou explorados para além da sua capacidade de recuperação. O quadro é a legislação ambiental mais ambiciosa possível, proveniente de tradições jurídicas emergentes em países que começaram a tratar a natureza como um sujeito de direitos e não como um objeto de propriedade. A actividade industrial é significativamente limitada. A poluição cai acentuadamente. A Agência de Protecção do Ambiente funciona com a máxima eficácia possível."
 
 law_no_environmental_regulations_modifier: "Indústria não regulamentada"
 law_no_environmental_regulations_modifier_desc: "Sem restrições ambientais para a indústria. O rendimento é elevado, mas a poluição e a mortalidade estão a aumentar em consequência."
 
 law_game_law_modifier: "Lei do Jogo"
 law_game_law_modifier_desc: "A caça e a pesca regulamentadas reduziram marginalmente a degradação ambiental. Uma intervenção mínima, mas real."
 
 law_national_recycling_modifier: "Programa Nacional de Reciclagem"
 law_national_recycling_modifier_desc: "Um programa nacional de reciclagem está a reduzir a produção e recuperação de resíduos, melhorando modestamente a poluição e a eficiência da construção."
 
 law_protection_agency_modifier: "Agência de Protecção do Ambiente"
 law_protection_agency_modifier_desc: "A Agência de Protecção do Ambiente está a impor limites de emissões e normas industriais. A poluição está caindo e a instituição pode ser investida para ampliar seu alcance."
 
 law_guaranteed_rights_of_nature_modifier: "Direitos da Natureza garantidos"
 law_guaranteed_rights_of_nature_modifier_desc: "Foi concedida à natureza uma posição constitucional. A indústria enfrenta restrições significativas, mas a poluição é drasticamente reduzida, a mortalidade cai e a segurança alimentar melhora à medida que os ecossistemas são protegidos."
 
