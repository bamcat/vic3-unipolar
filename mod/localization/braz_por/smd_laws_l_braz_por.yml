l_braz_por:
 law_jihad:0 "Jihadismo"
 law_jihad_desc:0 "Militares jihadistas têm um objetivo claramente religioso em suas práticas, treinamento e organização."
 law_mixed_healthcare:0 "Sistema de Saúde Misto"
 law_mixed_healthcare_desc:0 "A saúde da população é gerida por planos de saúde privados e governamentais. Planos governamentais são oferecidos aos nossos cidadãos de menor renda para resolver as falhas de mercado do seguro privado de saúde."
 law_affirmative_action:0 "Acção Afirmativa"
 law_affirmative_action_desc:0 "Várias proteções para as minorias foram tornadas obrigatórias. Isso inclui citações e vários sistemas para incentivar seu envolvimento em nosso sistema atual, proteções legais e financiamento monetário."
 
 lawgroup_firearms:0 "Propriedade de armas de fogo"
 lawgroup_firearms_desc:0 "Questões relativas ao direito de porte de armas."
 
 lawgroup_abortions:0 "Abortos"
 lawgroup_abortions_desc:0 "Se os nossos cidadãos podem ou não fazer abortos."
 
 lawgroup_unions:0 "União"
 lawgroup_unions_desc:0 "Questões relativas à capacidade dos nossos trabalhadores para formar sindicatos."
 
 lawgroup_homosexuality:0 "Homossexualidade"
 lawgroup_homosexuality_desc:0 "Questões relativas ao movimento LGBTQ+ em nosso país."
 
 law_canton_system:0 "Isolacionismo"
 
 law_unrestricted_firearms:0 "Armas de fogo sem restrições"
 law_unrestricted_firearms_desc:0 "O nosso país é o lar de uma grande indústria de armas de fogo, pronta para uso civil."
 
 law_licensed_firearms:0 "Armas de fogo licenciadas"
 law_licensed_firearms_desc:0 "Os cidadãos exigem uma licença para possuir uma arma no nosso país."
 
 law_banned_firearms:0 "Armas de fogo proibidas"
 law_banned_firearms_desc:0 "O uso civil de armas de fogo é estritamente proibido."
 
 law_banned_unions:0 "Sindicatos Proibidos"
 law_banned_unions_desc:0 "Os trabalhadores não são autorizados a sindicalizar com a intenção de ganhar benefícios no local de trabalho."
 
 law_restricted_unions:0 "Uniões restritas"
 law_restricted_unions_desc:0 "Os trabalhadores são autorizados a formar sindicatos, com algumas restrições destinadas a proteger os nossos investidores."
 
 law_unrestricted_unions:0 "União sem restrições"
 law_unrestricted_unions_desc:0 "Os trabalhadores são plenamente encorajados a sindicalizar e buscar plenos benefícios para o seu trabalho."
 
 law_banned_abortions:0 "Abortos Proibidos"
 law_banned_abortions_desc:0 "A morte de bebés é estritamente proibida pelas nossas leis."
 
 law_restricted_abortion:0 "Abortos Restritos"
 law_restricted_abortion_desc:0 "Os cidadãos são autorizados a abortos quando a vida da mãe é ameaçada, ou nos casos de estupro e incesto."
 
 law_unrestricted_abortions:0 "Abortos Livres"
 law_unrestricted_abortions_desc:0 "Os cidadãos podem exercer livremente o seu direito a um aborto conforme quiserem."
 
 law_active_oppression:0 "Opressão Activa"
 law_active_oppression_desc:0 "Cidadãos que se identificam abertamente como membros da comunidade LGBTQ são oprimidos, presos ou até mortos."
 
 law_restricted_lgbtq:0 "Homossexualidade criminalizada"
 law_restricted_lgbtq_desc:0 "Os cidadãos podem enfrentar a prisão por serem gays."
 
 law_decriminalized_gays:0 "Homossexualidade descriminalizada"
 law_decriminalized_gays_desc:0 "Os cidadãos podem envolver-se em relações homossexuais, à porta fechada, é claro. As relações homossexuais não serão sancionadas pelo Estado."
 
 law_gay_marriage:0 "Casamento Mesmo Sexo"
 law_gay_marriage_desc:0 "O Estado é obrigado a sancionar todos os tipos de casamentos, independentemente de os iniciadores serem ou não do mesmo sexo."
 
  # immigration
  institution_immigration:0 "Controles de Imigração"
  institution_immigration_desc:0 "A government body has been formed to curb or encourage immigration into our country as we see fit.
  # dei

  institution_diversity_equity_inclusion:0 "Diversidade, Equidade e Inclusão"
  institution_diversity_equity_inclusion_desc:0 "Um departamento do governo que se concentra em dar aos desfavorecidos um terreno justo na sociedade."
  
  # spies
  
  institution_intelligence_agency:0 "Agência de Informação"
  institution_intelligence_agency_desc:0 "As agências de inteligência são responsáveis por operações secretas em todo o mundo."
  
