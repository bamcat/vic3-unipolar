 country_institution_cost_institution_environmental_protection_mult: "Custo da Agência de Protecção Ambiental"
 country_institution_environmental_protection_max_investment_add: "Agência de Proteção Ambiental Max Investimento"
 country_institution_size_change_speed_institution_environmental_protection_mult: "Agência de Proteção Ambiental Velocidade de expansão"
 
 # ==========================================
 # LAWGROUP
 # ==========================================
 
 lawgroup_subsidized_housing: "Habitação Subsidiada"
 lawgroup_subsidized_housing_desc: "O grau em que o Estado financia, constrói e garante a habitação para seus cidadãos. Quadros mais progressivos expandem a produção imobiliária em centros urbanos, melhoram a infraestrutura e aumentam a atração migratória — com o aumento do bem-estar e dos custos orçamentários."
 
 # ==========================================
 # LAWS
 # ==========================================
 
 law_no_public_housing: "Nenhuma habitação pública"
 law_no_public_housing_desc: "O estado não oferece apoio à habitação. O abrigo é um assunto privado — comprado, alugado ou não. O mercado da habitação urbana funciona sem intervenção pública, e o que o mercado produz é o que os cidadãos obtêm."
 
 law_housing_projects: "Projectos de Habitação"
 law_housing_projects_desc: "O estado constrói habitação pública básica de alta densidade em áreas urbanas — blocos de torre, cordões, funcional e barato. A qualidade nem sempre é alta e os locais nem sempre são desejáveis, mas a habitação existe. Os centros urbanos agora podem produzir imóveis adicionais através de programas de construção do estado."
 
 law_public_housing_program: "Programa de Habitação Pública"
 law_public_housing_program_desc: "Um programa abrangente de habitação estatal com padrões de design, desenvolvimento de uso misto e planejamento urbano ativo. O governo não está apenas construindo abrigos — está moldando a cidade. Os centros urbanos produzem significativamente mais imóveis à medida que o setor de construção pública se expande, e a infraestrutura melhora como consequência de um melhor planejamento urbano."
 
 law_universal_housing: "Moradia Universal"
 law_universal_housing_desc: "A habitação é um direito garantido. O Estado financia, constrói e mantém abrigo para todos os cidadãos que precisam — sem meios para testar, sem dependência do mercado, sem sair. O custo fiscal é substancial e contínuo. Os centros urbanos produzem o máximo de produção imobiliária. As cidades planeadas em torno do acesso universal atraem a migração e melhoram a infra-estrutura."
 
 law_no_public_housing_modifier: "Nenhuma habitação pública"
 law_no_public_housing_modifier_desc: "O estado não oferece apoio à habitação. O mercado da habitação urbana é inteiramente privado."
 
 law_housing_projects_modifier: "Projectos de Habitação"
 law_housing_projects_modifier_desc: "Construção básica de habitação estadual está em andamento. Os custos de assistência social aumentam modestamente à medida que o Estado subsidia o parque habitacional."
 
 law_public_housing_program_modifier: "Programa de Habitação Pública"
 law_public_housing_program_modifier_desc: "Um programa de habitação pública abrangente está expandindo o abastecimento imobiliário urbano e melhorando a infraestrutura da cidade, a um custo contínuo significativo."
 
 law_universal_housing_modifier: "Moradia Universal"
 law_universal_housing_modifier_desc: "A habitação é um direito garantido. Os custos de assistência social são elevados, mas a infra-estrutura urbana é melhorada, a migração é atraída e a produção imobiliária é maximizada."
 
 institution_central_bank: "Banco Central"
 institution_central_bank_desc: "Uma autoridade monetária estatal que gere a oferta de dinheiro, fixa reservas e controla as taxas de juro. Cada nível de investimento reforça a política monetária — limitando a produção comercial de crédito, mas aumentando o limite máximo da dívida nacional e aumentando a taxa de juro de referência. O Banco Central é o mecanismo pelo qual o Estado exerce controle direto sobre o sistema financeiro."
 
 lawgroup_central_banking: "Banco Central"
 lawgroup_central_banking_desc: "O quadro legal que rege o sistema monetário [ROOT.GetCountry.GetName] — desde nenhuma autoridade monetária central até o controle total do estado da oferta monetária. A escolha do quadro bancário determina como o crédito e os títulos são produzidos e o que o Estado pode pedir emprestado."
 
 law_no_central_bank: "Nenhum Banco Central"
 law_no_central_bank_desc: "Não existe uma autoridade monetária central. Os bancos operam de forma independente, definindo os seus próprios rácios de reserva e políticas de concessão de empréstimos. A oferta de dinheiro é descoordenada e o Estado não tem nenhum mecanismo para gerir taxas de juro ou condições de crédito. Este é um arranjo instável do qual a maioria das economias modernas se afastaram."
 
 law_fractional_reserve_banking: "Banco de Reserva Fraccional"
 law_fractional_reserve_banking_desc: "Os bancos são obrigados a deter apenas uma fração de seus depósitos como reservas, emprestando o restante para a economia. Isto expande a oferta de dinheiro — distritos financeiros produzem mais títulos à medida que os fluxos de capital multiplicados através do sistema, mas a produção de crédito comercial é um pouco diluída pela alavancagem. Este é o acordo padrão para a maioria das economias modernas."
 
 law_full_reserve_banking: "Banco de Reserva Cheia"
 law_full_reserve_banking_desc: "Os bancos devem deter 100% dos depósitos como reservas — sem empréstimos fraccionados. A instituição do Banco Central fica disponível, permitindo que o Estado gerencie diretamente a política monetária. Cada nível de investimento do Banco Central eleva a taxa de juro de referência em 1% e aumenta o limite máximo de crédito em 5%. A produção de crédito dos bancos comerciais é mais estável. A produção de títulos de distritos financeiros cai como alavancagem é removida do sistema."

 law_no_central_bank_modifier: "Nenhum Banco Central"
 law_no_central_bank_modifier_desc: "Nenhuma autoridade monetária central existe. O fornecimento de dinheiro não é gerido."
 
 law_fractional_reserve_banking_modifier: "Banco de Reserva Fraccional"
 law_fractional_reserve_banking_modifier_desc: "O empréstimo de reserva fraccional está a expandir a oferta de dinheiro. A produção de títulos está em alta; a produção de crédito comercial é modestamente reduzida pelo efeito de alavanca."
 
 law_full_reserve_banking_modifier: "Banco de Reserva Cheia"
 law_full_reserve_banking_modifier_desc: "Estão em vigor reservas completas. A produção de crédito é estável e superior. A produção de títulos é reduzida. A instituição do Banco Central está disponível para gerir as taxas de juro e o limite máximo da dívida nacional."
 
 institution_central_bank_modifier: "Banco Central"
 institution_central_bank_modifier_desc: "O Banco Central está activo e a gerir a política monetária. Cada nível de investimento reforça a oferta de crédito, aumenta a taxa de juro em 1% e aumenta o limite máximo de crédito em 5%."
 
 country_max_credit_limit_mult: "Limite máximo de crédito"
 country_institution_cost_institution_central_bank_mult: "Custo do Banco Central"
 country_institution_central_bank_max_investment_add: "Banco Central Max Investimento"
 country_institution_size_change_speed_institution_central_bank_mult: "Velocidade de expansão do banco central"
 building_group_bg_banking_throughput_add: "Produção Bancária"
 
 lawgroup_media_regulations: "Regras relativas aos meios de comunicação social"
 lawgroup_media_regulations_desc: "O quadro legal que rege o ambiente de informação [ROOT.GetCountry.GetName] — desde os meios de comunicação totalmente não regulamentados até às infra-estruturas de comunicações controladas pelo Estado. Quadros mais regulamentados suprimem a radicalização do movimento político e aumentam a autoridade estatal, enquanto ambientes não regulamentados ampliam os movimentos e enfraquecem a aderência do governo ao espaço da informação."
 
 law_fully_unregulated_media: "Totalmente Não Regulado"
 law_fully_unregulated_media_desc: "Não há regulação dos meios de comunicação social ou do ambiente da informação. Notícias, plataformas online e redes de comunicações operam sem qualquer supervisão governamental. A desinformação espalha-se livremente. Movimentos políticos prosperam no ruído. O Estado não tem nenhum mecanismo para moldar ou gerenciar a informação que seus cidadãos consomem — e nenhuma autoridade derivada de controlá-la."
 
 law_digital_rights: "Direitos digitais"
 law_digital_rights_desc: "As protecções jurídicas fundamentais regem o ambiente da informação — garantias de privacidade, disposições anticensura, leis de liberdade de informação. Os cidadãos recorrem legalmente a certos abusos dos meios de comunicação social, mas o espaço da informação permanece substancialmente livre. Os movimentos políticos ainda encontram terreno fértil. [ROOT.GetCountry.GetName] ganha um modesto benefício reputacional de ser um estado respeitador dos direitos."
 
 law_fairness_doctrine: "Doutrina da Justiça"
 law_fairness_doctrine_desc: "Os meios de comunicação social são legalmente obrigados a apresentar uma cobertura equilibrada das questões políticas — dando tempo e espaço a múltiplas perspectivas, em vez de colocar apenas uma plataforma. As vozes políticas mais extremas perdem seu megafone. O recrutamento de movimentos radicais está atenuado. O estado posiciona-se como um juiz justo em vez de um participante na guerra da informação, e ganha autoridade do papel."
 
 law_government_content_moderators: "Moderadores de Conteúdo do Governo"
 law_government_content_moderators_desc: "O Estado modera ativamente o conteúdo online — removendo desinformação, material extremista e conteúdo considerado prejudicial ou desestabilizador. Os movimentos políticos perdem um alcance significativo à medida que seu material de recrutamento mais eficaz é suprimido. A autoridade aumenta. A comunidade internacional e os críticos nacionais da liberdade de imprensa notarão a política e o prestígio de [ROOT.GetCountry.GetName] sofrerão de acordo."
 
 law_state_wifi: "Estado WiFi"
 law_state_wifi_desc: "O Estado opera diretamente a infraestrutura de comunicação. O acesso à Internet é um serviço público, totalmente de propriedade, operado e monitorado pelo governo. O ambiente de informação é um recurso estatal — o que os cidadãos lêem, observam e partilham passa pela infra-estrutura [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName] controles do governo. A radicalização do movimento político é quase completamente suprimida. O custo, financeiro e de reputação, é substancial."
 
 law_fully_unregulated_media_modifier: "Mídia Totalmente Não Regulada"
 law_fully_unregulated_media_modifier_desc: "Um ambiente de informação desgovernado está a ampliar os movimentos políticos e a enfraquecer a autoridade estatal."
 
 law_digital_rights_modifier: "Quadro dos direitos digitais"
 law_digital_rights_modifier_desc: "As protecções jurídicas básicas regem o ambiente da informação. Os movimentos políticos ainda prosperam, mas [ROOT.GetCountry.GetName] ganha algum prestígio de sua postura respeitadora dos direitos."
 
 law_fairness_doctrine_modifier: "Doutrina da Justiça"
 law_fairness_doctrine_modifier_desc: "Os requisitos de cobertura dos meios de comunicação social equilibrados estão a atenuar o recrutamento de movimentos radicais e a melhorar a legitimidade do Estado."
 
 law_government_content_moderators_modifier: "Moderação de Conteúdo do Governo"
 law_government_content_moderators_modifier_desc: "A moderação do conteúdo do estado ativo está suprimindo significativamente a radicalização do movimento político, ao custo de prestígio e legitimidade."
 
 law_state_wifi_modifier: "Comunicações Controladas pelo Estado"
 law_state_wifi_modifier_desc: "[ROOT.GetCountry.GetName] controla diretamente a infraestrutura de comunicações. A radicalização do movimento político é quase totalmente suprimida. A autoridade está alta. A reputação internacional sofre."
 
 institution_courts: "Sistema judicial"
 institution_courts_desc: "Um sistema judicial formal que opera através de tribunais e procedimentos jurídicos estabelecidos. Cada nível de investimento amplia o alcance do sistema judicial — mais juízes, mais tribunais, mais execução consistente da lei. Turmoil cai à medida que as disputas são resolvidas através de canais legais, a promulgação da lei torna-se mais consistente, e os movimentos revolucionários encontram o aparato jurídico do Estado mais difícil de superar."
 
 lawgroup_judiciary: "Judiciário"
 lawgroup_judiciary_desc: "A filosofia jurídica subjacente ao sistema judicial de [ROOT.GetCountry.GetName] — como as disputas são resolvidas, quem detém a autoridade jurídica e qual é o propósito da justiça. A escolha do poder judiciário molda a autoridade, a legitimidade, a posição diplomática e a estabilidade da ordem social."
 
 law_inquisitive_judiciary: "Inquisidor"
 law_inquisitive_judiciary_desc: "O Estado investiga, processa e julga — o poder judiciário é um braço de autoridade do governo em vez de uma instituição independente. Os juízes são agentes da coroa ou do governo, encarregados de encontrar a verdade e aplicar a lei em nome do Estado. A autoridade é alta e a implementação da política governamental é mais suave, mas o devido processo é fraco e a população sabe disso."
 
 law_customary_judiciary: "Personalizado"
 law_customary_judiciary_desc: "As disputas são resolvidas através das normas tradicionais da comunidade, conselhos tribais, arbitragem de idosos e costumes locais. Não há tribunais formais — a justiça é feita por aqueles que a comunidade reconhece como suas autoridades, de acordo com regras que a comunidade reconhece como legítima. O Estado tem alcance limitado neste sistema. As comunidades são estáveis, leais às suas tradições e resistentes à ruptura externa."
 
 law_religious_judiciary: "Lei Religiosa"
 law_religious_judiciary_desc: "Escritura, jurisprudência religiosa, e as interpretações das autoridades clericais regem os processos judiciais. Os devotos ganham enorme poder político como árbitros do que a lei significa e como ela se aplica. A legitimidade religiosa é profunda entre os fiéis. Aqueles fora da fé, ou que a interpretam de forma diferente, podem achar o sistema menos acolhedor."
 
 law_restorative_judiciary: "Restaurador"
 law_restorative_judiciary_desc: "O objetivo da justiça não é punição, mas restauração — reparar os danos causados às vítimas, reabilitar os infratores e reintegrar ambos na sociedade. Os tribunais focam na mediação, reconciliação e cura comunitária. O Turmoil cai. A mortalidade por conflitos diminui. Os lealistas crescem. O Estado dá alguma autoridade em troca de uma população que confia no sistema em que vive."
 
 law_adversarial_judiciary: "Adversário"
 law_adversarial_judiciary_desc: "Processo e concurso de defesa perante um juiz ou júri independente. A presunção de inocência é protegida. A situação jurídica é igual independentemente da posição social. O Estado está vinculado pelas mesmas regras que os seus cidadãos. [ROOT.GetCountry.GetName] o prestígio internacional aumenta significativamente. O judiciário independente restringe a ação governamental — mas um governo que pode ser restringido pela lei é um governo em que a população pode confiar."
 
 law_inquisitive_judiciary_modifier: "Judiciário Inquisitivo"
 law_inquisitive_judiciary_modifier_desc: "O judiciário atua como um braço de autoridade estatal. A aplicação da política é mais fácil e a turbulência é suprimida — mas o devido processo é fraco e a pressão radical que se constrói sob a superfície é real."
 
 law_customary_judiciary_modifier: "Direito Personalizado"
 law_customary_judiciary_modifier_desc: "A justiça comunitária tradicional proporciona profunda legitimidade e estabilidade social. A autoridade formal do Estado é limitada, mas a confiança da população no sistema é genuína."
 
 law_religious_judiciary_modifier: "Lei Religiosa"
 law_religious_judiciary_modifier_desc: "A autoridade clerical governa a lei. O [ROOT.GetCountry.GetAdjective] devoto detém enorme poder político. Profunda lealdade entre os fiéis — e crescente ressentimento entre os de fora dela."
 
 law_restorative_judiciary_modifier: "Justiça Restaurativa"
 law_restorative_judiciary_modifier_desc: "O sistema judiciário centra-se na reabilitação e reconciliação. A queda de turmo e mortalidade, o crescimento dos leais, e [ROOT.GetCountry.GetName] ganha respeito internacional pela sua abordagem humana."
 
 law_adversarial_judiciary_modifier: "Judiciário Adversário"
 law_adversarial_judiciary_modifier_desc: "Um poder judicial independente que opera em devido processo e igualdade de posição perante a lei. A legitimidade e o prestígio são elevados. A autoridade do Estado é controlada — mas esse controlo é o que torna o sistema credível."
 
 institution_courts_modifier: "Judiciário"
 institution_courts_modifier_desc: "Uma rede judicial estabelecida está reduzindo o tumulto, melhorando a promulgação da lei e suprimindo o impulso revolucionário. Cada nível adicional estende o alcance dos tribunais mais longe em [ROOT.GetCountry.GetName]."
 
 country_institution_cost_institution_courts_mult: "Custo do sistema judicial"
 country_institution_courts_max_investment_add: "Sistema judicial Investimento máximo"
 country_institution_size_change_speed_institution_courts_mult: "Velocidade de expansão do sistema judicial"
 
 law_privatized_preschool_education:0 "Educação Privatizada Pré-escolar"
 law_privatized_preschool_education_desc:0 "A educação infantil é proporcionada através de um mercado privado regulamentado. Os provedores competem pela matrícula, com o estado definindo padrões mínimos, mas deixando entrega para operadores independentes. O acesso depende em grande parte do rendimento das famílias, embora os subsídios possam compensar alguns dos encargos para as famílias com rendimentos mais baixos."

 law_universal_childcare:0 "Universal Childcare"
 law_universal_childcare_desc:0 "O Estado garante um acolhimento de crianças acessível para todas as famílias, independentemente da renda. Instalações financiadas publicamente estão disponíveis em todo o país, libertando os pais para participar da força de trabalho e garantindo que o desenvolvimento da primeira infância não esteja dependente dos meios da família."

 law_legal_protections:0 "Protecção jurídica"
 law_legal_protections_desc:0 "O Estado codificou a igualdade jurídica formal entre homens e mulheres, consagrando proteções contra a discriminação no emprego, na propriedade e na vida pública. Os direitos que antes eram habituais ou selectivamente aplicados são agora apoiados pela força da lei."

 law_structural_egalitarianism:0 "Equalitarismo Estrutural"
 law_structural_egalitarianism_desc:0 "O governo ultrapassou a igualdade jurídica para desmantelar ativamente as estruturas institucionais que perpetuam a desigualdade de gênero. A representação em cargos públicos, profissões e instituições cívicas é mandatada, e o Estado assume um papel ativo na aplicação de resultados iguais em vez de apenas direitos iguais."

 law_matriarchy:0 "Matriarquia"
 law_matriarchy_desc:0 "As mulheres ocupam uma posição dominante na estrutura política e social do país. As mulheres formam a grande maioria dos cargos de liderança."

 law_disability_cheques:0 "Cheques de Incapacidade"
 law_disability_cheques_desc:0 "O Estado fornece apoio financeiro regular aos cidadãos incapazes de trabalhar por deficiência ou doença crônica. Os pagamentos são efectuados através do aparelho de segurança social e destinam-se a garantir um nível mínimo de vida para os trabalhadores não assalariados."

 law_student_coverage:0 "Licença de maternidade"
 law_student_coverage_desc:0 "As mulheres recebem cobertura para as gestações."

 law_universal_basic_income:0 "Renda Básica Universal"
 law_universal_basic_income_desc:0 "Cada cidadão recebe um pagamento periódico incondicional do Estado, independentemente do estatuto de emprego ou dos meios. A política representa uma reflexão fundamental sobre a relação entre o trabalho, o bem-estar e a participação económica — garantindo um espaço sob o qual ninguém pode cair, aumentando as expectativas mínimas de todo o trabalho."
 
 law_universal_college:0 "Colégio Universal"
 law_universal_college_desc:0 "O Estado garante o acesso ao ensino superior para todos os cidadãos, independentemente de antecedentes ou meios. Universidades e faculdades são financiadas publicamente e seus lugares abertos ao mérito em vez de riqueza, produzindo uma força de trabalho mais educada e uma cidadania mais informada."

 education_laws.1.t:0 "Quem paga o diploma?"
 education_laws.1.d:0 "O compromisso com a faculdade universal tem suscitado uma pergunta imediata e apontada dos conservadores fiscais: quem exatamente vai pagar por isso? O financiamento do ensino superior para cada cidadão que o procura representa uma expansão significativa das despesas públicas, e os opositores estão a fazer as suas objecções em voz alta. O governo deve decidir se deve se comprometer com o financiamento público completo ou introduzir um modelo testado por meios que limite o fardo."
 education_laws.1.f:0 "A questão de quem paga a educação sempre foi uma questão de quem é a educação."
 education_laws.1.a:0 "Comprometer-se com financiamento público total — o ensino superior é um bem público."
 education_laws.1.b:0 "Introduzir subsídios testados por meios — financiar os pobres, não os ricos."

 education_laws.2.t:0 "A Objeção da Meritocracia"
 education_laws.2.d:0 "Interesses ricos encontraram seu argumento preferido contra a faculdade universal: padrões. Se todos puderem assistir, advertem, então o grau se torna inútil — instituições de genuína excelência serão arrastadas para baixo para acomodar os mal preparados. O governo deve escolher entre defender o acesso universal por princípio, ou oferecer um esculpir que preserva as instituições de elite ao lado do sistema público."
 education_laws.2.f:0 "Cada expansão do acesso foi recebida com o mesmo aviso sobre normas. Os padrões sobrevivem sempre."
 education_laws.2.a:0 "Defender o acesso universal — a excelência não é a preservação dos ricos."
 education_laws.2.b:0 "Preservar instituições de elite ao lado do acesso universal."

 education_laws.3.t:0 "A Inteligência Fala"
 education_laws.3.d:0 "A comunidade acadêmica entrou no debate com convicção característica. A faculdade universal, argumentam, não é meramente um bem social, mas uma necessidade econômica — uma nação que limita o ensino superior aos que podem dar - se ao luxo dela é uma nação que escolhe ignorância deliberada. O governo deve decidir se deve convidar formalmente a sua voz para o argumento legislativo ou para manter o debate em termos estritamente políticos."
 education_laws.3.f:0 "A universidade sempre foi onde as sociedades decidem que tipo de futuro querem. Agora tem de decidir quem pode ajudar a construí - la."
 education_laws.3.a:0 "Convide-os para o debate — deixe que os académicos liderem o argumento."
 education_laws.3.b:0 "Mantenha - a uma decisão política — os acadêmicos aconselham, não governam."

 education_college_fiscal_resistance:0 "Resistência Fiscal"
 education_college_fiscal_resistance_desc:0 "Os conservadores fiscais estão ativamente se opondo ao custo público da faculdade universal, atrasando o processo de promulgação e forçando o governo a justificar seus compromissos de gastos."

 education_college_public_funded:0 "Compromisso financiado publicamente"
 education_college_public_funded_desc:0 "O governo comprometeu-se a absorver o custo total do ensino superior universal, reforçando o ímpeto de promulgação a custos significativos."

 education_college_meritocracy_debate:0 "Debate sobre a Meritocracia"
 education_college_meritocracy_debate_desc:0 "O governo tem defendido publicamente o acesso universal contra as alegações de que irá diluir os padrões acadêmicos, alterando os termos do debate de promulgação."

 education_college_elite_carveout:0 "Elite Carveout oferecido"
 education_college_elite_carveout_desc:0 "Foi oferecido um esculpir preservando as instituições privadas de elite ao lado do sistema público, retardando a implementação, mas reduzindo a oposição rica."

 education_college_academic_endorsement:0 "Endosso Acadêmico"
 education_college_academic_endorsement_desc:0 "A intelligentsia endossou publicamente o colégio universal, concedendo autoridade científica e organizando apoio ao esforço de promulgação."

 education_college_elites_rebuked:0 "Elites Rebuked"
 education_college_elites_rebuked_desc:0 "Interesses ricos têm sido publicamente contestados em seus argumentos de meritocracia, envergonhando sua posição, mas aguçando sua determinação."

 education_college_elites_appeased:0 "Elites Apagadas"
 education_college_elites_appeased_desc:0 "A oferta de um esculpir institucional de elite amoleceu a oposição rica à faculdade universal."

 education_college_intelligentsia_engaged:0 "Intelligentsia Engajada"
 education_college_intelligentsia_engaged_desc:0 "Acadêmicos e pesquisadores estão fazendo ativamente o caso público para o ensino superior universal, dando credibilidade intelectual ao esforço de promulgação."

 education_college_intelligentsia_sidelined:0 "Intelligentsia Sidelined"
 education_college_intelligentsia_sidelined_desc:0 "A decisão de manter os acadêmicos fora do debate legislativo deixou a intelligentsia frustrada e desligada da agenda de educação do governo."
