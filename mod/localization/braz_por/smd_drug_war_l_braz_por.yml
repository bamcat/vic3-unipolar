 mdw_button_declare_war_desc:0 "Compromete os militares [ROOT.GetCountry.GetAdjective] a uma campanha direta contra redes de cartéis. Custa 100 autoridade e começa a campanha contra-cartel em sério. As barras não se moverão até que esta declaração seja feita."
 
 mdw_button_deploy_commander_name:0 "Lançar um Comandante"
 mdw_button_deploy_commander_desc:0 "Selecione um general para liderar as operações de contracartel em todo o território [ROOT.GetCountry.GetAdjective]."
 mdw_need_general_tt:0 "Requer pelo menos uma geral disponível"
 
