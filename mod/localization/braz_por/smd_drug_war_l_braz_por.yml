 # ==========================================
 # EVENTS
 # ==========================================
 
 # mdw_events.1 — War Declared
 mdw_events.1.t:0 "[ROOT.GetCountry.GetName] Declara Guerra aos Cartéis"
 mdw_events.1.d:0 "Após anos de expansão do cartel e meias medidas falhadas, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] O governo de [ROOT.GetCountry.GetRuler.GetLastName] comprometeu formalmente o [ROOT.GetCountry.GetAdjective] militar a uma campanha contra as redes de narcóticos. A declaração é significativa — não apenas operacionalmente, mas sim simbolicamente. O estado [ROOT.GetCountry.GetAdjective] afirma que não aceitará o status quo.\n\n Os cartéis vão responder. Os militares devem estar prontos."
 mdw_events.1.f:0 "O Estado traçou a sua linha."
 mdw_events.1.a:0 "[ROOT.GetCountry.GetName] irá recuperar o que lhe pertence"
 
 # mdw_events.2 — Commander Selection
 mdw_events.2.t:0 "Quem liderará a campanha?"
 mdw_events.2.d:0 "A declaração foi feita. Agora, um comandante deve ser escolhido — um disposto a levar a luta para o território controlado pelo cartel, onde o inimigo conhece o terreno, tem informantes locais, e está disposto a fazer coisas que o exército não pode. Será uma luta suja."
 mdw_events.2.f:0 "O general certo muda tudo."
 mdw_events.2.a:0 "Implantar [SCOPE.sCharacter('mdw_commander_1').GetFullName]"
 mdw_events.2.b:0 "Implantar [SCOPE.sCharacter('mdw_commander_2').GetFullName]"
 mdw_events.2.c:0 "Implantar [SCOPE.sCharacter('mdw_commander_3').GetFullName]"
 
 # mdw_events.3 — Combat Patrol
 mdw_events.3.t:0 "Contacto em [SCOPE.sState('mdw_active_state').GetName]"
 mdw_events.3.d:0 "[SCOPE.sCharacter('mdw_commander').GetFullName] relata uma série de compromissos com as forças do cartel em [SCOPE.sState('mdw_active_state').GetName]. Os cartéis estão lutando para manter seu território — usando bloqueios de estradas, atiradores e IEDs em aproximação a fortalezas conhecidas. Estão a ser feitos progressos, mas o custo do tempo e dos recursos é significativo."
 mdw_events.3.f:0 "Cada quilómetro de estrada limpa é um quilómetro que os cartéis não podem utilizar."
 mdw_events.3.a:0 "Empurre forte — tome o território rapidamente"
 mdw_events.3.b:0 "Avançar metodicamente — proteger cada posição antes de prosseguir"
 
 # mdw_events.4 — State Cleared
 mdw_events.4.t:0 "[SCOPE.sState('mdw_active_state').GetName] Foi Limpa"
 mdw_events.4.d:0 "Um sucesso operacional significativo: [SCOPE.sCharacter('mdw_commander').GetFullName] relata que as forças do cartel em [SCOPE.sState('mdw_active_state').GetName] foram quebradas. A sua estrutura de comando foi desmantelada, a sua logística cortada e as suas figuras-chave estão mortas ou sob custódia. [ROOT.GetCountry.GetAdjective] Forças de ocupação militares estão se movendo para manter o chão.\n\n Um estado está novamente sob controlo do governo. Restam mais."
 mdw_events.4.f:0 "O mapa está a mudar."
 mdw_events.4.a:0 "Avance para o próximo — mantenha o ímpeto"
 
 # mdw_events.5 — Ambush
 mdw_events.5.t:0 "Emboscada — [SCOPE.sCharacter('mdw_commander').GetFullName] A coluna está sob ataque"
 mdw_events.5.d:0 "Os atiradores do cartel emboscaram uma coluna militar [ROOT.GetCountry.GetAdjective] em [SCOPE.sState('mdw_active_state').GetName]. O ataque foi coordenado – múltiplas posições de disparo, rotas de retirada pré-planejadas e conhecimento dos movimentos da coluna que sugerem um informante dentro da cadeia de comando militar [ROOT.GetCountry.GetAdjective]. Há baixas. [SCOPE.sCharacter('mdw_commander').GetFullName] está gerenciando o engajamento."
 mdw_events.5.f:0 "Os cartéis lutam como um exército quando escolhem."
 mdw_events.5.a:0 "Lutar — persegui-los e destruí-los"
 mdw_events.5.b:0 "Interromper o contacto — reagrupar e varrer mais tarde"
 
 # mdw_events.6 — Commander Under Fire
 mdw_events.6.t:0 "[SCOPE.sCharacter('mdw_commander').GetFullName] Está em perigo"
 mdw_events.6.d:0 "A inteligência confirmou o que os relatórios de campo têm sugerido: os cartéis identificaram [SCOPE.sCharacter('mdw_commander').GetFullName] como alvo prioritário. Uma equipa de assassínio profissional foi incumbida deles. A ameaça é credível. Puxar o comandante de volta para [ROOT.GetCountry.GetCapital.GetCityHubName] reduziria o risco — mas iria parar o impulso da campanha em um momento crítico."
 mdw_events.6.f:0 "Os cartéis estudam os inimigos."
 mdw_events.6.a:0 "Puxe [SCOPE.sCharacter('mdw_commander').GetFullName] para trás — a campanha pode esperar"
 mdw_events.6.b:0 "Pressionar — [SCOPE.sCharacter('mdw_commander').GetFullName] aceita o risco"
 
 # mdw_events.10 — Victory
 mdw_events.10.t:0 "A guerra das drogas é ganha"
 mdw_events.10.d:0 "[SCOPE.sCharacter('mdw_commander').GetFullName] envia o relatório operacional final: o controle territorial do cartel foi quebrado em [ROOT.GetCountry.GetName]. As últimas fortalezas foram limpas. Ocupação militar está no lugar. As redes de cartéis ainda existem — irão reconstituir ao longo dos anos de forma enfraquecida — mas o Estado [ROOT.GetCountry.GetAdjective] reafirmou a soberania sobre o seu próprio território.\n\n Isto não era inevitável. Exigia vontade política, compromisso militar e, em muitos aspectos, sorte. O que [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName] ganhou foi o tempo — tempo para enfrentar as condições que tornaram os cartéis possíveis em primeiro lugar."
 mdw_events.10.f:0 "[ROOT.GetCountry.GetName] recuperou o que é dela."
 mdw_events.10.a:0 "Uma vitória dura — e um começo"
 
 # mdw_events.11 — Commander Killed
 mdw_events.11.t:0 "[SCOPE.sCharacter('mdw_commander').GetFullName] Foi Morto"
 mdw_events.11.d:0 "Aconteceu o pior. A operação de assassinato do cartel foi bem sucedida. [SCOPE.sCharacter('mdw_commander').GetFullName] está morto — morto num ataque que os serviços de segurança [ROOT.GetCountry.GetAdjective] não conseguiram evitar apesar de avisos credíveis. As notícias são públicas dentro de horas. Os cartéis estão celebrando abertamente nas ruas das cidades que controlam.\n\n A campanha ainda não acabou. Mas sofreu um golpe que levará meses para se recuperar. Um novo comandante tem de ser encontrado — e os cartéis usarão o tempo para consolidar."
 mdw_events.11.f:0 "Os cartéis deram o seu golpe mais importante."
 mdw_events.11.a:0 "Não seremos quebrados por isso — a luta continua"
 
 # mdw_events.20 — US Aid
 mdw_events.20.t:0 "[SCOPE.sCountry('c:USA').GetName] Assina um Acordo de Assistência Militar"
 mdw_events.20.d:0 "[SCOPE.sCountry('c:USA').GetCapital.GetCityHubName] moveu- se. [SCOPE.sCountry('c:USA').GetName] assinou formalmente um acordo de assistência militar com [ROOT.GetCountry.GetName] — comprometendo recursos de inteligência, pessoal consultivo, equipamentos e apoio logístico à campanha contracartel. O acordo é um desenvolvimento político significativo: sinaliza que [SCOPE.sCountry('c:USA').GetRuler.GetPrimaryRoleTitle] A administração de [SCOPE.sCountry('c:USA').GetRuler.GetLastName] considera a estabilidade de [ROOT.GetCountry.GetName] como uma questão de interesse nacional directo.\n\n Para [ROOT.GetCountry.GetName], os benefícios práticos são imediatos: a autoridade é restaurada, o equipamento está fluindo, e os cartéis agora enfrentam um inimigo com o aparato de inteligência completa de [SCOPE.sCountry('c:USA').GetName] trabalhando contra eles."
 mdw_events.20.f:0 "Quando [SCOPE.sCountry('c:USA').GetName] commits, o saldo muda."
 mdw_events.20.a:0 "Isto muda completamente a campanha"
 
 # ==========================================
 # MODIFIERS
 # ==========================================
 
 mdw_war_declared_modifier:0 "Guerra das drogas mexicana — campanha ativa"
 mdw_war_declared_modifier_desc:0 "[ROOT.GetCountry.GetName] comprometeu seus militares a uma campanha direta contra os narcocartels. A autoridade está sendo consumida e os militares estão envolvidos, mas o estado [ROOT.GetCountry.GetAdjective] está se afirmando."
 
 mdw_us_aid_modifier:0 "Assistência Militar dos EUA"
 mdw_us_aid_modifier_desc:0 "Um acordo de assistência militar ativa com [SCOPE.sCountry('c:USA').GetName] está fornecendo inteligência, logística e equipamentos para [ROOT.GetCountry.GetName] da campanha contracartel."
 
 mdw_victory_modifier:0 "Venceu a Guerra das Drogas"
 mdw_victory_modifier_desc:0 "[ROOT.GetCountry.GetName] venceu a Guerra das Drogas. O controle territorial do cartel foi quebrado e o estado [ROOT.GetCountry.GetAdjective] reafirmou a soberania. Restam as condições que produziram os cartéis — mas esta batalha foi vencida."
 
 mdw_commander_killed_modifier:0 "Comandante Morto em Ação"
 mdw_commander_killed_modifier_desc:0 "O assassinato do comandante do contracartel abalou a confiança do público em [ROOT.GetCountry.GetName] e encorajou os cartéis."
 
 mdw_troops_ambushed:0 "Tropas Afogadas"
 mdw_troops_ambushed_desc:0 "Uma coluna militar [ROOT.GetCountry.GetAdjective] foi emboscada por forças do cartel, causando baixas e reduzindo temporariamente a capacidade ofensiva."
 
 # Cartel territory modifier descriptions (MDW context)
 cartel_cjng_controlled:0 "Território CJNG"
 cartel_cjng_controlled_desc:0 "Os agentes do Cartel de Nova Geração Jalisco controlam a economia criminosa deste estado. A atividade industrial é interrompida, a infraestrutura está se deteriorando, e as pessoas estão deixando [ROOT.GetCountry.GetAdjective] território."
 
 cartel_gulf_controlled:0 "Território do Cartel do Golfo"
 cartel_gulf_controlled_desc:0 "O Cartel do Golfo estabeleceu o domínio territorial aqui. A atividade econômica é suprimida e [ROOT.GetCountry.GetAdjective] autoridade estatal é nominal."
 
 cartel_sinaloa_controlled:0 "Território do Cartel de Sinaloa"
 cartel_sinaloa_controlled_desc:0 "O Cartel de Sinaloa controla este estado. A produção agrícola foi interrompida e a economia local opera sob supervisão do cartel."
 
 cartel_northeast_controlled:0 "Território do Cartel Nordeste"
 cartel_northeast_controlled_desc:0 "O Cartel del Nordeste estabeleceu o domínio aqui. Infraestrutura e produtividade de construção em [ROOT.GetCountry.GetName] estão sofrendo."
 
 # usa war on drugs

 je_war_on_drugs:0 "A guerra contra as drogas"
 je_war_on_drugs_reason:0 "O fluxo de narcóticos para [ROOT.GetCountry.GetName] é uma crise nacional. A cocaína, a heroína e outras substâncias — produzidas em grande parte na América Latina e contrabandeadas através das fronteiras [ROOT.GetCountry.GetAdjective] — são comunidades devastadoras, alimentando crimes violentos e corrompendo instituições públicas.\n\n[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] A administração de [ROOT.GetCountry.GetRuler.GetLastName] comprometeu-se com uma campanha abrangente: parcerias internacionais para estrangular a oferta na fonte, aplicação doméstica para fechar as fronteiras e investimento social para lidar com a demanda. A campanha não é sem custo — os recursos que exige pesar na economia mais ampla — mas a alternativa é um país cada vez mais à mercê de redes criminosas estrangeiras.\n\n@information! O território do cartel pode estar se expandindo no México. Um acordo de assistência militar com o governo mexicano é a pedra angular da componente internacional desta campanha."

 narco_economy_plantation_bonus:0 "Economia do Narco"
 narco_economy_plantation_bonus_desc:0 "O comércio de drogas incorporou-se na economia agrícola de [ROOT.GetCountry.GetName]. A produção vegetal — em especial o ópio — está acima dos níveis normais, sustentada pela procura de cartéis e pelo fluxo corruptor do narco-monetário para as comunidades rurais."

 war_on_drugs_active_modifier:0 "Guerra contra as drogas"
 war_on_drugs_active_modifier_desc:0 "O governo [ROOT.GetCountry.GetAdjective] se comprometeu com uma campanha abrangente contra o narcotráfico. O esforço de execução — policiamento interno, operações de interdição e cooperação internacional — está retirando recursos de toda a economia e impondo um custo modesto mas real à produtividade nacional."

 war_on_drugs_victory_modifier:0 "Guerra contra as drogas — ganha"
 war_on_drugs_victory_modifier_desc:0 "O [ROOT.GetCountry.GetAdjective] A guerra contra as drogas atingiu os seus objectivos declarados. A oferta foi suprimida, as fronteiras são aplicadas e o quadro institucional está em vigor. A campanha reforçou a autoridade e o prestígio de [ROOT.GetCountry.GetName] — embora as condições subjacentes que produzem a demanda de drogas não tenham sido resolvidas."

 wod_je_status_active:0 "A campanha continua."
 wod_je_status_ready:0 "A campanha está pronta para concluir."

 wod_completion_mexico_tt:0 "Tenha um pacto #bold Assistência Militar#! com o México."
 wod_completion_enforcement_tt:0 "Adotar #bold National Guard#! ou #bold Secret Police#!."
 wod_completion_opium_price_tt:0 "Suprimir a oferta internacional de drogas até que as drogas sejam pelo menos #bold 65% pricier#! no mercado americano."
 wod_completion_schools_tt:0 "Elevar a instituição #bold Escolas#! para nível #bold 5#! ou superior."
 wod_completion_border_tt:0 "Adotar #bold Controles de Migração#! ou #bold Fronteiras Fechadas#!."
 wod_completion_no_safe_injection_tt:0 "Não tem #bold Locais de Injeção Seguros #!."
 wod_completion_no_trafficking_allowed_tt:0 "Não tem #bold Tráfico permitido#!."
 wod_completion_no_hard_drugs_decriminalized_tt:0 "Não tem #bold Medicamentos Rígidos Descriminalizados#!."
