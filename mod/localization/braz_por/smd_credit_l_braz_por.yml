l_braz_por:

 # ==========================================
 # THE DOLLAR 
 # ==========================================

 je_the_dollar:0 "O Dólar"
 je_the_dollar_reason:0 "O dólar dos Estados Unidos é a moeda de reserva do mundo. [ROOT.GetCountry.GetName] exporta mais crédito do que qualquer outro país – e ao fazê-lo, detém uma posição de poder financeiro extraordinário.\n\n Quando os distritos financeiros de outras nações exigem crédito para sustentar suas operações, eles procuram [ROOT.GetCountry.GetAdjective] bancos para fornecê-lo. Enquanto o dólar fluir, os capitalistas desses países podem construir, investir e lucrar. Se [ROOT.GetCountry.GetName] optar por restringir esse fluxo — através de sanções, embargo ou contração deliberada — as consequências para os mercados financeiros estrangeiros seriam imediatas e graves.\n\n@information! Exportar crédito não é simplesmente comércio. É o exercício da soberania monetária sobre países que passaram a depender da infraestrutura financeira [ROOT.GetCountry.GetAdjective]. Os distritos financeiros deles exigem crédito. Se o preço do crédito sobe acima do preço dos títulos, seus investidores começam a perder dinheiro. Se o crédito parar de fluir completamente, seus bancos têm de se embaraçar para produzir bastante domesticamente — um processo que leva tempo que talvez não tenham."

 je_dollar_status_hegemonic_tt:0 "#bold O dólar é hegemônico.#! [ROOT.GetCountry.GetName] está exportando mais de #v 20.000#! unidades de crédito. Os mercados financeiros estrangeiros estão profundamente integrados com a infraestrutura bancária [ROOT.GetCountry.GetAdjective]. A alavancagem que isto proporciona é substancial."
 je_dollar_status_stronger_tt:0 "#bold O dólar é poderoso.#! [ROOT.GetCountry.GetName] está exportando mais de #v 10.000#! unidades de crédito. Os mercados financeiros estrangeiros estão profundamente integrados com a infraestrutura bancária [ROOT.GetCountry.GetAdjective]. A alavancagem que isto proporciona é substancial."
 je_dollar_status_strong_tt:0 "#bold O dólar é influente.#! [ROOT.GetCountry.GetName] está exportando mais do que #v 5.000#! unidades de crédito. Os mercados financeiros estrangeiros estão profundamente integrados com a infraestrutura bancária [ROOT.GetCountry.GetAdjective]. A alavancagem que isto proporciona é substancial."
 je_dollar_status_moderate_tt:0 "#bold O dólar está bem estabelecido.#! [ROOT.GetCountry.GetName] está exportando mais de #v 2.500#! unidades de crédito. A dependência estrangeira do crédito [ROOT.GetCountry.GetAdjective] é real e crescente."
 je_dollar_status_marginal_tt:0 "#bold O dólar está emergindo.#! [ROOT.GetCountry.GetName] está exportando crédito internacionalmente. O papel do dólar como moeda de reserva está em suas fases iniciais — mas a fundação está sendo lançada."

 # ==========================================
 # THE RESERVE CURRENCY
 # ==========================================

 je_reserve_currency:0 "Moeda de reserva"
 je_reserve_currency_reason:0 "[ROOT.GetCountry.GetName] exporta crédito internacionalmente — tornando o setor bancário [ROOT.GetCountry.GetAdjective] um player significativo no sistema financeiro global.\n\n Quando os distritos financeiros de outras nações exigem crédito para sustentar suas operações, eles extraem de bancos [ROOT.GetCountry.GetAdjective]. Isso cria uma forma de alavanca estrutural: países que importam crédito de [ROOT.GetCountry.GetName] tornam-se, em certo grau, dependentes do fluxo contínuo desse crédito para a saúde de seus setores financeiros.\n\n@information! Os distritos financeiros nos países importadores exigem crédito para operar de forma eficiente. Quando o preço do crédito sobe acima do preço dos títulos, seus investidores perdem dinheiro na construção e desenvolvimento. Uma súbita contração de crédito — através de sanções ou embargo — obrigaria esses países a produzir crédito no mercado interno, um processo mais lento e dispendioso."

 je_reserve_status_strong_tt:0 "#bold [ROOT.GetCountry.GetAdjective] crédito é amplamente negociado.#! Exportações exceder #v 5.000#! unidades. Os mercados financeiros estrangeiros desenvolveram uma dependência significativa da oferta bancária [ROOT.GetCountry.GetAdjective]."
 je_reserve_status_moderate_tt:0 "#bold [ROOT.GetCountry.GetAdjective] crédito é internacionalmente ativo.#! Exportações excedem #v 2.500#! unidades. Uma parte significativa da atividade financeira estrangeira depende da oferta [ROOT.GetCountry.GetAdjective]."
 je_reserve_status_marginal_tt:0 "#bold [ROOT.GetCountry.GetAdjective] crédito está entrando em mercados internacionais.#! Exportações exceder #v 1.000#! unidades. O papel é modesto, mas crescente."

 # ==========================================
 # THE FINANCIAL SYSTEM — je_financial_system
 # ==========================================

 je_financial_system:0 "O Sistema Financeiro"
 je_financial_system_reason:0 "Esta entrada de diário é totalmente opcional — você não precisa se envolver com o sistema de crédito e títulos para jogar o jogo. É aqui como referência para aqueles que querem entendê-lo.\n\n#bold Como funciona o sistema#!\n\nOs bancos comerciais produzem #bold crédito#!. Os Distritos Financeiros compram crédito e, no método de produção negociado publicamente, vendem #bold títulos#!. Os títulos dão aos investidores um lucro adicional ao reinvestirem em novas construções — mas apenas quando o preço dos títulos é superior ao preço do crédito. Isto significa que existe um equilíbrio natural que o mercado procura:\n\n• Quando #bold o crédito é barato#! em relação aos títulos, os lucros dos distritos financeiros e os investidores constroem mais agressivamente. A construção acelera em toda a economia.\n\n• Quando #bold títulos são baratos#! em relação ao crédito, distritos financeiros perdem dinheiro comprando crédito que eles não podem lucrativamente converter. Os bancos acham seu produto menos valioso. A construção atrasa.\n\n@information! A relação de preço entre o crédito e os títulos é, portanto, o sinal-chave a observar. Um spread saudável — títulos acima do crédito — significa que o seu sector financeiro está a funcionar como previsto e que os seus capitalistas estão a receber retornos sobre o investimento na construção.\n\n@warning! Se o crédito subir acima dos títulos, seus distritos financeiros estão operando com uma perda em cada unidade que processam. Os bancos tornam-se rentáveis, mas os investidores atrasam a sua actividade e a sua economia cresce menos dinamicamente.\n\n#bold O Banco Central#!\n\n Você pode usar o #bold Banco Central#! instituição para influenciar diretamente a produção de títulos. Investir no Banco Central aumenta a oferta de títulos em seu mercado — o que reduz o preço em relação ao crédito. Isto irá #bold subestimar os seus bancos comerciais#!, que acham o seu crédito menos rentável para produzir, mas irá #bold expandir o investimento industrial#! mantendo os títulos de crédito espalhados favoráveis para os seus capitalistas.\n\n Este é um trade-off deliberado: O investimento no Banco Central favorece o crescimento industrial em detrimento da rentabilidade bancária. Se esse trade-off vale a pena fazer depende de sua estratégia econômica."

 je_financial_credit_expensive_tt:0 "#bold O crédito está a negociar acima do seu preço de base.#! Os bancos comerciais são rentáveis. Os distritos financeiros estão pagando um prêmio pelo crédito, que está apertando suas margens na produção de títulos. Os investidores podem retardar sua atividade de construção se o spread se tornar desfavorável."
 je_financial_securities_expensive_tt:0 "#bold Os títulos estão a negociar acima do seu preço de base.#! Os distritos financeiros são rentáveis — estão a converter o crédito em títulos a uma margem saudável. Os investidores estão recebendo bons retornos na construção. Os bancos enfrentam uma pressão modesta, uma vez que o seu produto tem preços inferiores aos produtos que alimentam."
 je_financial_balanced_tt:0 "Crédito e títulos estão negociando perto de seus preços de base. O sistema financeiro está em equilíbrio — os bancos são marginalmente rentáveis e os investidores recebem rendimentos moderados."

 ### Great Recession

 je_subprime_mortgage_crisis:0 "Crise de Hipoteca Subprime"
 je_subprime_mortgage_crisis_reason:0 "[ROOT.GetCountry.GetAdjective] as instituições financeiras estão a emitir e a embalar títulos garantidos por hipotecas em escala — agrupando empréstimos hipotecários subprime em instrumentos vendidos em todo o sistema financeiro global. Os títulos são considerados seguros. Eles não estão seguros. Quando as hipotecas subjacentes começarem a ser default, cada instituição detentora desses instrumentos descobrirá simultaneamente que os seus balanços são construídos em papel inútil.\n\n@warning! Se o preço dos títulos não corrigir significativamente antes da crise amadurecer, o sistema bancário [ROOT.GetCountry.GetAdjective] congelará — e o choque será sentido por cada economia com laços substanciais com [ROOT.GetCountry.GetName]."

 je_great_recession:0 "A Grande Recessão"
 je_great_recession_reason:0 "O sistema financeiro dos Estados Unidos entrou em colapso. Títulos hipotecários, que são detidos por bancos em todo o mundo, foram revelados como sem valor. Os mercados de crédito congelaram. Os bancos não se emprestam uns aos outros, muito menos às empresas. O investimento secou. A construção abrandou. A recessão é global.\n\n O mercado vai corrigir. Faz sempre. A questão é quanto dano é feito antes dele."

 # Status descriptions
 subprime_je_danger_tt:0 "O preço dos títulos não diminuiu suficientemente. [ROOT.GetCountry.GetAdjective] títulos garantidos por hipotecas ainda são sobrevalorizados — o mercado ainda não tem preço no risco. Quanto mais isso persistir, mais catastrófica será a eventual correção."
 subprime_je_safe_tt:0 "#bold Os títulos caíram mais de 35% abaixo do preço de base.#! O mercado está a corrigir. Se isto se mantiver, a queda pode ser evitada — ou pelo menos suavizada."

 great_recession_je_usa_tt:0 "O sistema bancário [ROOT.GetCountry.GetAdjective] está em crise. A crise do crédito é reduzir drasticamente o rendimento bancário, congelando investimento e construção. A recessão vai durar até que o mercado corrija — aproximadamente dez meses."
 great_recession_je_global_tt:0 "[ROOT.GetCountry.GetName] relações comerciais substanciais com [SCOPE.sCountry('c:USA').GetName] transmitiram o choque financeiro. [ROOT.GetCountry.GetAdjective] os bancos estão expostos a [SCOPE.sCountry('c:USA').GetAdjective] instrumentos financeiros. O crédito é mais apertado, o investimento diminuiu, e a recessão chegou."

 # ==========================================
 # MODIFIERS
 # ==========================================

 great_recession_credit_crunch:0 "Credit Crunch"
 great_recession_credit_crunch_desc:0 "O sistema bancário apreendeu-se. Os bancos recusam-se a emprestar — às empresas, uns aos outros, a qualquer pessoa. O crédito evaporou. O investimento entrou em colapso. A construção abrandou. A economia não recuperará até que a confiança retorne ao sistema financeiro."
