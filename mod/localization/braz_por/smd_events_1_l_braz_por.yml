je_rwandan_genocide: "Genocídio de Ruanda"
je_rwandan_genocide_reason: "Em abril de 1994, um avião que transportava os presidentes de Ruanda e Burundi foi abatido, desencadeando um dos genocídios mais terríveis do final do século XX.\n\n Milícias extremistas, com apoio do governo, começaram assassinatos em massa visando a minoria tutsi e hutus moderado. A consciência internacional foi lenta para construir, mas à medida que os massacres se espalhavam, os pedidos de intervenção foram montados.\n\n"

je_rwandan_genocide_progress_tt: "O progresso aumenta ao longo do tempo e através de eventos violentos. A intervenção pode reduzir o progresso."

rwandan_genocide.1.t: "O genocídio começa"
rwandan_genocide.1.d: "Após o assassinato do Presidente Habyarimana, as forças extremistas começaram a matar amplamente a minoria tutsi."
rwandan_genocide.1.a: "Um capítulo escuro começa."

rwandan_genocide.2.t: "Massacres Continuar"
rwandan_genocide.2.d: "Relatórios de regiões rurais descrevem comunidades inteiras eliminadas em ataques coordenados."
rwandan_genocide.2.a: "A violência aumenta."

rwandan_genocide.3.t: "Exclamação Internacional"
rwandan_genocide.3.d: "Imagens gráficas e contas de sobreviventes chegaram aos meios de comunicação globais, provocando apelos urgentes para que a ONU aja."
rwandan_genocide.3.a: "Peço tropas de paz."
rwandan_genocide.3.b: "Não faças nada."

rwandan_genocide_request_peacekeepers_tt: "Isto desencadeará uma votação das Nações Unidas sobre o envio de forças de manutenção da paz para Ruanda."
rwandan_genocide_community_angry: "Isso vai irritar a comunidade internacional"

rwandan_genocide.4.t: "Voto da ONU para a manutenção da paz"
rwandan_genocide.4.d: "O Conselho de Segurança das Nações Unidas convocou a votação sobre o envio de forças de manutenção da paz ao Ruanda."

