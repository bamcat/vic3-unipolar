 io_accession_events.1.t:0 "Adesão CEE Concluída"
 io_accession_events.1.d:0 "As nossas reformas cumpriram os requisitos para a adesão à CEE. Entramos no quadro económico europeu."
 io_accession_events.1.a:0 "Junta-te à CEE."

 io_accession_events.2.t:0 "Adesão da UE Concluída"
 io_accession_events.2.d:0 "O nosso processo de adesão está concluído. Juntamo-nos à União Europeia e entrámos no seu quadro político e económico."
 io_accession_events.2.a:0 "Junte-se à União Europeia."

 io_accession_events.3.t:0 "Adesão da CEE"
 io_accession_events.3.d:0 "O processo de adesão da CEE desmoronou-se depois de o nosso governo se ter afastado das normas democráticas."
 io_accession_events.3.a:0 "O processo acabou."

 io_accession_events.4.t:0 "Adesão da UE parada"
 io_accession_events.4.d:0 "O processo de adesão da UE entrou em colapso depois de o nosso governo se ter afastado das normas democráticas."
 io_accession_events.4.a:0 "O processo acabou."

 io_accession_events.10.t:0 "Expulso da NATO"
 io_accession_events.10.d:0 "A nossa adopção de leis autoritárias tornou impossível a continuação da adesão à NATO. A aliança expulsou-nos e os nossos pactos de defesa com os seus membros foram retirados."
 io_accession_events.10.a:0 "Estamos sozinhos."

 io_accession_events.11.t:0 "Expulso da CEE"
 io_accession_events.11.d:0 "A nossa adopção de leis autoritárias violou as expectativas políticas da cooperação europeia. Fomos expulsos da CEE."
 io_accession_events.11.a:0 "Que assim seja."

 io_accession_events.12.t:0 "Expulso da União Europeia"
 io_accession_events.12.d:0 "A nossa adopção de leis autoritárias violou as normas democráticas da União Europeia. Fomos expulsos da União."
 io_accession_events.12.a:0 "A União vira as costas."

 io_accession_events.13.t:0 "Expulso do G7"
 io_accession_events.13.d:0 "A nossa adopção de leis autoritárias tornou politicamente inaceitável a continuação da adesão ao G7. Fomos retirados do grupo."
 io_accession_events.13.a:0 "Um revés diplomático."

 io_accession_events.20.t:0 "Aviso de Normas Democráticas da OTAN"
 io_accession_events.20.d:0 "O nosso governo adoptou leis autoritárias. Se estas leis permanecerem em vigor, a adesão à NATO será revogada durante a próxima revisão."
 io_accession_events.20.a:0 "Fomos avisados."

