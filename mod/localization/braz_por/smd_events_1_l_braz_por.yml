 je_demographic_crisis: "Crise Demográfica"
 je_demographic_crisis_reason: "A nossa nação enfrenta uma crise demográfica iminente. Uma população envelhecida e taxas de natalidade em declínio ameaçam diminuir nossa força de trabalho e forçar nossos sistemas sociais. Temos de adoptar políticas pró-natalistas abrangentes e sustentá-las durante uma década para inverter esta tendência antes de expirar o tampão demográfico temporário."

 je_demographic_crisis_progressing_tt: "As políticas pró-natalistas estão em vigor e as condições estão a ser cumpridas. Progresso: #bold [Root.GetCountry.MakeScope.Var('demographic_months_sustained').GetValue|0]#! / 120 meses."
 je_demographic_crisis_stalling_tt: "#negative As condições pró-natais já não estão satisfeitas. #! O progresso está a deteriorar-se. Atual: #bold [Root.GetCountry.MakeScope.Var('demographic_months_sustained').GetValue|0]#! / 120 meses. Efectuar as leis de acolhimento de crianças, cuidados de saúde, bem-estar e habitação, mantendo o Standard of Living acima de 12."
 je_demographic_crisis_idle_tt: "Nenhum progresso para resolver a crise demográfica. Evitar políticas pró-natalistas: puericultura, saúde, bem-estar e leis de habitação. Mantenha um padrão médio de vida de pelo menos 12."

 demographic_crisis_sustained_tt: "As políticas pró-natalistas têm sido sustentadas por 10 anos contíguos (120 meses)."

