 intifada_2005.1.t:0 "O Segundo Ventos Intifada"
 intifada_2005.1.d:0 "Depois de anos de violência sustentada, exaustão, medidas de segurança, pressão diplomática e mudança política acabaram com a revolta."
 intifada_2005.1.f:0 "O conflito não está resolvido, mas a fase da intifada aberta terminou. Um cessar-fogo deixa ambos os lados marcados, suspeitos e incertos do que vem a seguir."
 intifada_2005.1.a:0 "Aceita uma paz branca."

 intifada_2005.2.t:0 "O Segundo Ventos Intifada"
 intifada_2005.2.d:0 "A luta diminuiu e a revolta entrou numa nova fase, mais silenciosa."
 intifada_2005.2.f:0 "Nenhum acordo final foi alcançado, mas a escalada queimou-se."
 intifada_2005.2.a:0 "A luta continua por outros meios."

 intifada_2005_ceasefire:0 "Segunda Intifada Cessar-fogo"
 intifada_2005_ceasefire_desc:0 "A fase aberta da Segunda Intifada terminou num frágil cessar-fogo."
 
 arab_spring_jihadist_breakaways.1.t:0 "O Estado Islâmico Emerge"
 arab_spring_jihadist_breakaways.1.d:0 "O caos da revolução e do colapso do Estado permitiu que as forças jihadistas consolidassem o território sob a bandeira do Estado Islâmico."
 arab_spring_jihadist_breakaways.1.f:0 "O velho estado combate a revolução. A revolução luta contra o velho estado. Nas ruínas entre eles, uma terceira força levanta sua bandeira."
 arab_spring_jihadist_breakaways.1.a:0 "Abre-se uma nova frente."

 arab_spring_jihadist_breakaways.2.t:0 "Jihadista Enclaves Emerge"
 arab_spring_jihadist_breakaways.2.d:0 "À medida que a Primavera Árabe desestabiliza a região, as células jihadistas tomaram território disperso e declararam lealdade ao Estado Islâmico."
 arab_spring_jihadist_breakaways.2.f:0 "Onde o Estado se retira, redes armadas se tornam administrações."
 arab_spring_jihadist_breakaways.2.a:0 "A crise espalha-se."

 arab_spring_jihadist_breakaways.3.t:0 "O Houthis apreende o território"
 arab_spring_jihadist_breakaways.3.d:0 "A revolução iemenita fraturou o país, permitindo que o movimento Houthi tomasse território e mobilizasse suas próprias forças."
 arab_spring_jihadist_breakaways.3.f:0 "A revolta não produziu uma oposição, mas muitos."
 arab_spring_jihadist_breakaways.3.a:0 "Estilhaços do Iémen."

