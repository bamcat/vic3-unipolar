# canada

canada.1.t:0 "Estrada das Lágrimas"
canada.1.d:0 "Um trecho da Rodovia 16 da Colúmbia Britânica, comumente chamada de Rodovia das Lágrimas, tornou-se um símbolo de tragédia e injustiça no Canadá, onde dezenas de mulheres e meninas indígenas desapareceram ou foram assassinadas desde a década de 1970. Entre o Príncipe Jorge e o Príncipe Rupert, há muito que falta transporte público, forçando muitos a pedir carona, muitas vezes com consequências mortais."
canada.1.f:0 "Colocaram-na numa caixa de aço. Tinha que ser um caixão fechado por causa da maneira que eles a encontraram ...” Ele pára para reter suas lágrimas, antes de gaguejar as palavras, “ela... estava deteriorada."

canada.1.a:0 "Infelizmente, há questões muito mais urgentes a enfrentar neste país."
canada.1.b:0 "Devíamos ter vergonha!"

je_indigenous_rights: "Direitos Indígenas"
je_indigenous_rights_reason: "A questão dos direitos indígenas continua sendo uma das questões não resolvidas mais significativas na política doméstica de [ROOT.GetCountry.GetName]. Gerações de despossessão, assimilação forçada e obrigações de tratado quebradas deixaram profundas desigualdades estruturais entre populações indígenas e não indígenas. Encerrar esta lacuna exigirá uma vontade política sustentada — e enfrentará a resistência daqueles que beneficiam do status quo."


 indigenous_je_status_usa_tt: "Nos Estados Unidos, mais de 570 tribos reconhecidas federalmente ocupam terras de reserva que representam uma fração de seus territórios ancestrais. A expectativa de vida, a escolaridade e o rendimento das reservas estão muito aquém das médias nacionais. A responsabilidade federal pela confiança — a obrigação legal de proteger a soberania e o bem - estar tribais — é amplamente reconhecida como inadequadamente cumprida."

 indigenous_je_status_can_tt: "As primeiras Nações do Canadá, Métis e Inuit são mais de um milhão, vivendo sob um sistema de reservas estabelecido pela Lei Indiana de 1876. O sistema escolar residencial indiano — que removeu à força as crianças indígenas de suas famílias para "assimilá-las" — operou até 1996, seu último encerramento escolar apenas recentemente. O trauma intergeracional desse sistema continua a moldar as comunidades indígenas hoje."

 indigenous_je_status_nzl_tt: "O povo maori — tangeta whenua, o povo da terra — assinou o Tratado de Waitangi com a Coroa Britânica em 1840. Esse tratado nunca foi totalmente honrado. Os confisco de terras no século XIX despojaram comunidades de Māori da maior parte de seu território, e os neozelandeses de Māori continuam enfrentando disparidades significativas nas taxas de saúde, renda e encarceramento. O Tribunal de Waitangi, criado em 1975, continua a ouvir reclamações contra a Coroa."

 indigenous_je_status_ast_tt: "Os povos aborígenes e ilhéus do Estreito de Torres da Austrália são as culturas contínuas mais antigas do mundo — e entre seus mais desfavorecidos. As "gerações roubadas" — crianças aborígenes forçadamente removidas de suas famílias sob políticas estatais de assimilação que continuaram até os anos 1970 — deixaram feridas que não curaram. A expectativa de vida dos indígenas australianos permanece mais de uma década abaixo da média nacional. A decisão Mabo de 1992 reconheceu pela primeira vez o título nativo, mas a implementação foi desigual."

 # indigenous.1 — Land Rights
 indigenous.1.t: "Alegação dos Direitos das Terras Indígenas"
 indigenous.1.d_usa: "Uma coalizão de nações tribais apresentou uma alegação formal afirmando direitos a uma parcela significativa de terra federal, argumentando que o território foi ilegalmente tomado em violação das obrigações do tratado. A alegação atraiu uma cobertura substancial dos meios de comunicação social e apoio jurídico. Os tribunais estão a observar, assim como a comunidade nativa americana."
 indigenous.1.d_can: "Uma banda de Primeiras Nações afirmou o título aborígene para uma área substancial de terras da Coroa, alegando que nenhum tratado válido extinguiu seus direitos ao território. O pedido chegou ao tribunal federal. Peritos legais notam que a jurisprudência canadense sobre o título aborígene tem evoluído significativamente, e a resposta do governo estabelecerá um precedente importante."
 indigenous.1.d_nzl: "O Tribunal de Waitangi emitiu um relatório que declara que a Coroa não honrou o Tratado de Waitangi em sua gestão de terras contestadas. As conclusões não são juridicamente vinculativas, mas carregam um peso moral e político significativo. As comunidades maori estão pedindo que o governo aja de acordo com as recomendações sem mais delongas."
 indigenous.1.d_ast: "O Tribunal Federal confirmou uma reivindicação de título nativo sobre uma região de terra atualmente arrendada a interesses pastorais. A decisão exige que o governo negocie com o grupo requerente sobre os direitos de uso da terra. Grupos da indústria pastoral estão fazendo lobby difícil para o governo para apelar da decisão."
 indigenous.1.f: "A terra sempre foi deles. A questão é se a lei o dirá."
 indigenous.1.a: "Negociar um acordo — honrar o pedido"
 indigenous.1.b: "Conteste o pedido em tribunal — nossa posição é defensável"

 # indigenous.2 — Treaty Obligations
 indigenous.2.t: "Obrigações do Tratado em análise"
 indigenous.2.d_usa: "Um relatório do Congresso descobriu que o governo federal não cumpre suas obrigações de tratado com dezenas de nações tribais — subfinanciando cuidados de saúde, educação e infraestrutura em reservas de bilhões de dólares anualmente. Líderes tribais estão pedindo uma revisão formal da responsabilidade da confiança federal e um compromisso para fechar a lacuna de financiamento."
 indigenous.2.d_can: "Uma comissão parlamentar apresentou um relatório sobre o subfinanciamento crónico das comunidades das primeiras nações relativamente às obrigações decorrentes de tratados históricos. O relatório identifica lacunas específicas na habitação, infra-estrutura hídrica e educação. O Governo tem de decidir como responder — e se compromete os recursos necessários para completar os tratados."
 indigenous.2.d_nzl: "Os líderes maoris apresentaram um memorando formal ao governo argumentando que uma série de decisões políticas recentes violam os princípios do Tratado de Waitangi. O memorando cita violações específicas em áreas de gestão de recursos, saúde e financiamento da educação, e pede uma revisão abrangente do cumprimento do tratado em todos os departamentos do governo."
 indigenous.2.d_ast: "Uma organização de direitos indígenas publicou uma análise detalhada da lacuna entre os compromissos assumidos pelo governo com as comunidades aborígenes e a real alocação de recursos. O relatório conclui que os compromissos de acordo e de acordo estão a ser cumpridos a menos de 60 cêntimos do dólar. Os líderes comunitários exigem uma auditoria formal e um compromisso vinculativo de plena conformidade."
 indigenous.2.f: "Uma promessa escrita no papel é tão boa quanto a vontade de mantê-la."
 indigenous.2.a: "Honrar plenamente as nossas obrigações — comprometer os recursos"
 indigenous.2.b: "Reconheça as carências — procure melhorar gradualmente"

 # indigenous.3 — Cultural Preservation
 indigenous.3.t: "A ameaça às línguas indígenas"
 indigenous.3.d: "Linguistas publicaram um relatório alertando que dezenas de línguas indígenas em [ROOT.GetCountry.GetName] estão à beira da extinção. Em muitos casos, resta apenas um punhado de falantes fluentes — todos idosos. Uma vez perdidas, estas línguas não podem ser recuperadas. Com eles vão histórias orais, conhecimento ecológico, tradições legais e formas de entender o mundo que não existe em nenhum outro lugar.\n\n A questão é se o governo está preparado para investir os recursos necessários para reverter essa trajetória — ou se vai assistir a história desaparecer em silêncio."
 indigenous.3.f: "Uma língua é um mundo. Sua morte é irreversível."
 indigenous.3.a: "Fundo Programas de revitalização da língua indígena"
 indigenous.3.b: "Esta é uma questão para as comunidades — não para o governo"

 # indigenous.4 — Health Crisis
 indigenous.4.t: "Crise de Saúde Indígena"
 indigenous.4.d: "Um relatório nacional de saúde destacou a forte lacuna entre desfechos de saúde indígenas e não indígenas em [ROOT.GetCountry.GetName]. A expectativa de vida é significativamente menor. As taxas de diabetes, vício e doença mental — muitas delas enraizadas em traumas intergeracionais — são drasticamente maiores. A mortalidade infantil nas reservas e em comunidades remotas é multiplicada pela média nacional.\n\n O estabelecimento médico pede serviços de saúde indígenas culturalmente adequados e adequadamente financiados. O custo da inacção — medido em vidas — é substancial."
 indigenous.4.f: "A desigualdade na saúde é uma escolha política."
 indigenous.4.a: "Investir em programas de saúde indígenas dedicados"
 indigenous.4.b: "O sistema de saúde existente é igualmente acessível a todos os cidadãos"

 # indigenous.5 — Reservation Conditions (USA/CAN)
 indigenous.5.t: "Condições aplicáveis às reservas"
 indigenous.5.d_usa: "Um relatório do inspetor geral federal descobriu que as condições de vida em muitas reservas nativas americanas estão significativamente abaixo dos padrões nacionais. A habitação está superlotada e degradada. Acesso a água potável limpa não é confiável em dezenas de reservas. As taxas de desemprego excedem 50% em muitas comunidades. O relatório chama a situação de "crise de negligência federal" e recomenda um aumento substancial do financiamento do Bureau of Indian Affairs."
 indigenous.5.d_can: "Uma auditoria do governo descobriu que centenas de comunidades das Primeiras Nações estão sob alertas de água fervente — alguns há mais de uma década. A habitação em muitas reservas é severamente superlotada. Os serviços de saúde mental estão em grande parte ausentes. A auditoria conclui que o governo federal está gastando aproximadamente 30% menos per capita em comunidades das Primeiras Nações do que em outros canadenses para serviços equivalentes."
 indigenous.5.f: "O sistema de reserva foi construído para conter — não para apoiar."
 indigenous.5.a: "Aumentar o financiamento federal para comunidades de reserva"
 indigenous.5.b: "Manter os actuais níveis de financiamento — o orçamento não permite mais"

 # indigenous.6 — Reservation Economic Development (USA/CAN)
 indigenous.6.t: "Desenvolvimento Econômico nas Terras Indígenas"
 indigenous.6.d_usa: "Várias nações tribais propuseram iniciativas de desenvolvimento econômico — incluindo operações de jogos, parcerias de extração de recursos e empreendimentos turísticos — que gerariam receitas significativas para comunidades de reservas. As propostas exigem aprovação federal e enfrentam oposição de governos estaduais adjacentes e interesses comerciais que veem as empresas tribais como competição. Os líderes tribais argumentam que a auto-suficiência econômica é o único caminho sustentável para sair da pobreza."
 indigenous.6.d_can: "As comunidades das primeiras nações em áreas ricas em recursos procuram negociar acordos de partilha de receitas para a extracção de recursos em ou perto dos seus territórios tradicionais. Várias comunidades também propuseram joint ventures com governos provinciais para o desenvolvimento florestal e energético. As propostas oferecem um caminho para a auto-suficiência econômica — mas exigem que o governo compartilhe o controle e a receita que historicamente reivindicava inteiramente."
 indigenous.6.f: "Soberania sem base econômica é uma palavra vazia."
 indigenous.6.a: "Apoiar o desenvolvimento económico indígena — aprovar as propostas"
 indigenous.6.b: "Priorizar os interesses dos recursos existentes — estas propostas criam complicações"

 # indigenous.20 — Ipperwash
 indigenous.20.t: "A Crise da Lavagem de Ipper"
 indigenous.20.d: "Os manifestantes de Stoney Point Ojibwe ocuparam o Parque Provincial Ipperwash em Ontário, afirmando que a terra — incluindo um cemitério sagrado — foi ilegalmente apreendida de sua comunidade durante a Segunda Guerra Mundial para uso como base militar e nunca retornou como prometido. A ocupação é pacífica, mas a Polícia Provincial de Ontário estabeleceu um perímetro e está solicitando orientações sobre como proceder.\n\n A situação está tensa. Há armas entre os manifestantes. Há também anciãos, famílias e uma queixa legítima que está desencaminhada há cinqüenta anos."
 indigenous.20.f: "Um cemitério foi tomado. Nunca foi devolvido."
 indigenous.20.a: "Ordenar que o OPP disperse a ocupação — restaurar a ordem"
 indigenous.20.b: "Dirige o OPP para se retirar — negociar uma resolução pacífica"

 # indigenous.21 — Last residential school
 indigenous.21.t: "A Última Escola Residencial Fecha"
 indigenous.21.d: "Gordon Residencial School, em Punnichy, Saskatchewan fechou suas portas — a última escola residencial indiana operada federalmente no Canadá. Desde 1874, o sistema escolar residencial retirou à força uma estimativa de 150 mil crianças aborígenes de suas famílias e as colocou em instituições onde língua, cultura e identidade indígenas eram ativamente suprimidas e onde o abuso físico e sexual eram generalizados.\n\n O encerramento da última escola não é uma resolução. É um reconhecimento de que um capítulo de destruição cultural deliberada finalmente, oficialmente, terminou. Os sobreviventes ainda vivem com as suas consequências."
 indigenous.21.f: "A última escola fechou. As feridas que criou não o fizeram."
 indigenous.21.a: "Um capítulo obscuro na história do Canadá acabou"

 # indigenous.22 — TRC
 indigenous.22.t: "Relatórios da Comissão sobre a Verdade e a Reconciliação"
 indigenous.22.d: "A Comissão de Verdade e Reconciliação do Canadá lançou seu relatório final — o culminar de seis anos de testemunho de mais de 6.500 sobreviventes do sistema escolar residencial indiano. O relatório documenta o abuso sistemático, o genocídio cultural e o trauma multigeracional infligido por uma política de assimilação forçada.\n\n A Comissão emitiu 94 convites à acção — recomendações específicas nos domínios do bem-estar das crianças, da educação, da língua, da saúde e da justiça. O relatório utiliza o termo genocídio cultural para descrever o que foi feito. O Governo tem agora de decidir como levar a sério o trabalho da Comissão."
 indigenous.22.f: "A verdade é o primeiro passo. A reconciliação é obra de gerações."
 indigenous.22.a: "Aceitar formalmente os apelos à acção — empenhar-se na reconciliação"
 indigenous.22.b: "Reconhecer o relatório — rever cuidadosamente os convites à acção"

 indigenous.10.t: "Um passo em direção à equidade"
 indigenous.10.d_usa: "A promulgação da legislação de ação afirmativa nos Estados Unidos marca um passo significativo para o enfrentamento das desigualdades estruturais enfrentadas pelas comunidades nativas americanas, ao lado de outros grupos historicamente marginalizados. Não é uma solução para todo o escopo da despossessão indígena, mas representa um compromisso significativo com o fechamento de lacunas que persistem há gerações."
 indigenous.10.d_can: "O Canadá promulgou legislação de ação afirmativa — um reconhecimento formal de que a desigualdade sistêmica requer remédio sistêmico. Para as comunidades Primeiras Nações, Métis e Inuit, a medida é uma peça de um quebra-cabeça muito maior. Mas ela sinaliza uma vontade política de levar a sério a questão da desvantagem indígena, e de apoiar essa vontade com a política."
 indigenous.10.d_nzl: "A Nova Zelândia promulgou legislação de ação afirmativa, reconhecendo que as disparidades entre Maori e Pākehā Nova Zelândia não são produto de fracasso individual, mas de política histórica. Para as comunidades de Māori, é um passo significativo — embora o Tribunal de Waitangi observe que muitas de suas recomendações permanecem sem implementação."
 indigenous.10.d_ast: "A Austrália promulgou legislação de ação afirmativa — uma mudança de política significativa que reconhece o caráter estrutural da desvantagem indígena. Para as comunidades aborígenes e ilhéus do estreito de Torres, representa progresso. A disparidade na expectativa de vida, nos resultados da saúde e na realização da educação não se fechará da noite para o dia, mas a direção da viagem mudou."
 indigenous.10.f: "O caminho para a justiça é longo. Isto é um passo em frente."
 indigenous.10.a: "É a coisa certa a fazer."

 indigenous_land_settlement: "Liquidação dos direitos fundiários"
 indigenous_land_settlement_desc: "Um acordo de direitos fundiários negociado melhorou as relações com as comunidades indígenas e reforçou a legitimidade do governo."

 indigenous_land_contested: "Direitos fundiários disputados"
 indigenous_land_contested_desc: "A decisão de contestar os direitos das terras indígenas na corte tem aumentado as tensões com as comunidades indígenas."

 indigenous_treaty_honoured: "Obrigações do Tratado Honradas"
 indigenous_treaty_honoured_desc: "O pleno cumprimento das obrigações do tratado fortaleceu a legitimidade e melhorou a posição do governo com as comunidades indígenas."

 indigenous_treaty_partial: "Obrigações do Tratado"
 indigenous_treaty_partial_desc: "O cumprimento parcial das obrigações do tratado não tem satisfeito os defensores dos direitos indígenas."

 indigenous_cultural_investment: "Investimento Cultural Indígena"
 indigenous_cultural_investment_desc: "O financiamento do governo para a língua indígena e programas culturais está apoiando a resiliência da comunidade."

 indigenous_health_investment: "Programas de Saúde Indígena"
 indigenous_health_investment_desc: "Programas de saúde indígenas dedicados estão melhorando os resultados de saúde nas comunidades indígenas."

 indigenous_health_cost: "Custos do Programa de Saúde Indígena"
 indigenous_health_cost_desc: "Novos programas de saúde indígena estão colocando demandas adicionais no orçamento de saúde."

 indigenous_health_neglect: "Negligência em Saúde Indígena"
 indigenous_health_neglect_desc: "A não abordagem das disparidades na saúde indígena está gerando descontentamento contínuo."

 indigenous_reservation_investment: "Reserva Investimento comunitário"
 indigenous_reservation_investment_desc: "O aumento do financiamento federal para as comunidades de reserva está começando a diminuir a lacuna nos padrões de vida."

 indigenous_reservation_cost: "Custos de Financiamento de Reservas"
 indigenous_reservation_cost_desc: "O aumento do financiamento comunitário de reserva está a forçar o orçamento federal."

 indigenous_reservation_neglect: "Reserva Comunidade Negligencia"
 indigenous_reservation_neglect_desc: "O subfinanciamento crônico das comunidades de reserva continua a gerar descontentamento e críticas internacionais."

 indigenous_economic_development: "Desenvolvimento Econômico Indígena"
 indigenous_economic_development_desc: "O apoio às iniciativas de desenvolvimento econômico indígena está gerando receita para as comunidades e melhorando a auto-suficiência."

 indigenous_economic_blocked: "Desenvolvimento econômico indígena bloqueado"
 indigenous_economic_blocked_desc: "A rejeição das propostas de desenvolvimento econômico indígena tem prejudicado as relações com as comunidades das primeiras nações."

 ipperwash_crackdown: "Crackdown Ipperwash"
 ipperwash_crackdown_desc: "A violenta dispersão de manifestantes indígenas em Ipperwash tem gerado críticas nacionais e internacionais significativas."

 ipperwash_negotiation: "Resolvido pacificamente"
 ipperwash_negotiation_desc: "A resolução pacífica do impasse do Ipperwash aumentou a credibilidade do governo com as comunidades indígenas."

 indigenous_residential_school_closed: "Última Escola Residencial Fechada"
 indigenous_residential_school_closed_desc: "O encerramento da última escola residencial indiana marca o fim formal de uma política de destruição cultural — embora suas consequências perduram."

 trc_accepted: "Verdade e Reconciliação Aceitadas"
 trc_accepted_desc: "A aceitação formal do Canadá das Chamadas à Ação da Comissão de Verdade e Reconciliação representa um compromisso significativo de abordar o legado das escolas residenciais."

 trc_enactment_bonus: "Mandato de Reconciliação"
 trc_enactment_bonus_desc: "O impulso do processo de Verdade e Reconciliação está facilitando a aprovação de legislação relacionada aos direitos indígenas."

 trc_partial: "TRC Confirmado"
 trc_partial_desc: "O governo reconheceu o relatório da Comissão da Verdade e Reconciliação, mas não se comprometeu a implementar seus apelos à ação."

 indigenous_rights_progress: "Legislação dos Direitos Indígenas"
 indigenous_rights_progress_desc: "A promulgação da legislação de ação afirmativa representa um compromisso significativo para enfrentar a desvantagem indígena. A disparidade não vai diminuir durante a noite — mas a orientação política mudou."


# japan

japan.1.t: "Desastre nuclear de Fukushima"
japan.1.d: "Após um enorme terremoto e tsunami, a Usina Nuclear Fukushima Daiichi sofreu falhas catastróficas, lançando material radioativo no ambiente. O desastre chocou o mundo, provocando debates globais sobre segurança nuclear e preparação para emergências."
japan.1.a: "Uma tragédia nacional — e um alerta global."

fukushima_nuclear_disaster: "Desastre nuclear de Fukushima"
fukushima_nuclear_disaster_desc: "Os graves danos causados à fábrica de Fukushima Daiichi levaram a uma contaminação radioactiva, a uma perturbação da infra-estrutura e a um esforço nacional de recuperação a longo prazo."

# south sudan

southsudan.1.t: "Referendo da Independência do Sudão do Sul"
southsudan.1.d: "Após décadas de conflito e um referendo decisivo, os estados do sul do Sudão se separaram para formar a República do Sudão do Sul. O governo central de Cartum enfrenta uma escolha fatídica: aceitar a nova nação ou ir à guerra para recuperá-la."
southsudan.1.a: "Não permitiremos que o Sudão seja dividido."
southsudan.1.b: "Deixa-os ir, por causa da paz."

# russia

first_chechen_war: "Primeira Guerra Chechena"

russia_parliament_resisting: "Resistência do Parlamento"
russia_military_loyality: "Complicidade Militar"
russia_parliamentary_support: "Apoio parlamentar"
russia_constitution_crisis_resolved_mod: "Crise evitada"

je_russian_constitutional_crisis: "Crise Constitucional Russa"
je_russian_constitutional_crisis_reason: "O ano de 1993 levou a Rússia à beira do colapso político.\n\n O Presidente Boris Yeltsin, procurando consolidar a autoridade executiva, ordenou a dissolução do parlamento russo, acusando os seus membros de obstruir as reformas e resistir à democratização. O parlamento, por sua vez, declarou o decreto de Yeltsin inconstitucional, recusando-se a dissolver e reunir apoiadores à sua causa.\n\n Durante semanas, as tensões aumentam como facções rivais ganham o apoio de diferentes elementos das forças militares, de segurança e do público em geral. O aparelho do governo fratura, com lealdade ao poder executivo ou legislativo determinando o destino da Federação Russa.\n\n Este confronto é mais do que uma disputa política – é uma batalha pela própria natureza da governança russa na era pós-soviética. Se a crise se descontrolar, a violência civil no coração de Moscovo não é apenas possível, mas inevitável."

je_russia_wild_nineties: "Os Noventa Selvagens"
je_russia_wild_nineties_reason: "O termo «The wild noventaties» (russo: "ихие девяносте, Likhiye devyanostyye") é um termo com uma conotação avaliativa negativa, caracterizando o período do período de transição após o colapso da União Soviética e da Federação Russa na década de 1990. \n\n A turbulenta transição da Rússia do governo soviético para uma democracia capitalista tem desencadeado uma onda de instabilidade, corrupção e violência. Os primeiros anos pós-soviéticos foram marcados pelo colapso econômico, o surgimento de oligarcas, confrontos políticos e um surto no crime organizado.\n\n Do bombardeio do parlamento aos escândalos de privatização, cada mês parece trazer novas reviravoltas. O país oscila entre a reforma e o caos, e a paciência do povo se esgota."

rus_events.0.t: "A crise constitucional russa de 1993 começa"
rus_events.0.d: "O Presidente Boris Yeltsin emitiu um decreto que dissolve o parlamento russo, acusando-o de obstruir reformas democráticas e ameaçar a estabilidade da Federação. O Parlamento declarou o movimento inconstitucional, apelando aos militares e aos cidadãos para que resistam.\n\nMoscow está se preparando para o confronto enquanto facções rivais reúnem seus apoiadores. O destino da frágil democracia russa está agora em jogo."
rus_events.0.a: "A nação prende a respiração."

1993_russian_crisis_tt: "A crise concluiu"
rus_events.1.t: "A Crise Constitucional"
rus_events.1.d: "O Presidente Yeltsin anunciou a dissolução do parlamento, mas os legisladores recusam-se a retirar-se, barricando-se na Casa Branca. As tensões estão a aumentar rapidamente."
rus_events.1.a: "Apoiar o Presidente"
rus_events.1.a.tt: "Os militares apoiarão o executivo."
rus_events.1.b: "Apoiar o Parlamento"
rus_events.1.b.tt: "Defenderemos a autoridade legislativa."

rus_events.2.t: "Militares apoiam o Presidente"
rus_events.2.d: "As forças armadas tomaram o controle das ruas, bombardeando o edifício do parlamento e garantindo a autoridade de Yeltsin."
rus_events.2.a: "A crise acabou."

rus_events.3.t: "Vitória Parlamentar"
rus_events.3.d: "Apesar da pressão do executivo, o parlamento reuniu apoio popular e manteve seu poder."
rus_events.3.a: "A crise acabou."

rus_events.4.t: "Invasão da Casa Branca"
rus_events.4.d: "Moscovo está um caos. As tropas pró-presidentes cercaram a Casa Branca Russa, lar da liderança do parlamento, e abriram fogo com tanques e armas pequenas. A fumaça sai dos pisos superiores quando o edifício está em chamas. A resistência final desmorona à medida que as forças militares tomam o controle, marcando o fim do impasse — mas ao custo de vidas e da inocência política do país."
rus_events.4.a: "A ordem foi restaurada — por enquanto."

# chechnya

je_first_chechen_war_reason: "A Primeira Guerra Chechena começou no final de 1994 quando a Federação Russa tentou recuperar o controle sobre a República Chechena de Ichkeria. O conflito seria caro em vidas e recursos, com feroz combate urbano em Grozny e devastação generalizada no Cáucaso do Norte.\n\n Terminar a guerra sem clara vitória poderia prejudicar a credibilidade do governo, mas continuar a luta corre o risco de prolongada instabilidade."
je_first_chechen_war: "Guerra Chechena"
chechen_war_resolved: "Resolução da Guerra Chechena"

chechen_events.1.t: "Guerra na Chechénia"
chechen_events.1.d: "As forças russas entraram na Chechénia para restabelecer o controlo federal, começando o que se espera que seja uma operação rápida. No entanto, o terreno montanhoso e a resistência local determinada poderiam transformar isso em um conflito prolongado."
chechen_events.1.a: "Vamos restaurar a ordem."

chechen_events.2.t: "Agressão a Grozny"
chechen_events.2.d: "A Batalha de Grozny começou, com as forças russas tentando tomar a capital chechena. A luta é intensa, com pesadas baixas em ambos os lados."
chechen_events.2.a: "Avance, não importa o custo."

chechen_events.3.t: "Conversas de paz na Chechênia"
chechen_events.3.d: "Depois de meses de luta, o cansaço de guerra cresceu em ambos os lados. Uma proposta de cessar-fogo foi colocada sobre a mesa, oferecendo um fim ao derramamento de sangue."
chechen_events.3.a: "Aceitem a paz e retirem as forças."
chechen_events.3.b: "Continue a guerra até à vitória."

# haiti

uphold_democracy: "Operação Manter a Democracia"

haiti_events.1.t: "Operação Manter a Democracia"
haiti_events.1.d: "Em setembro de 1994, os Estados Unidos lançaram uma intervenção militar no Haiti para restaurar o presidente democraticamente eleito Jean-Bertrand Aristide, expulso em 1991. As forças dos EUA, apoiadas por aliados internacionais, garantiram áreas-chave, abrindo caminho para o retorno de Aristide."
haiti_events.1.a: "Lançar forças para restaurar a democracia."
haiti_events.1.b: "Vamos preparar-nos para tropas estrangeiras."

haiti_events.2.t: "Chegam tropas estrangeiras"
haiti_events.2.d: "Forças americanas desembarcaram no Haiti, assumindo o controle de locais estratégicos. A intervenção justifica-se como meio de restabelecer a governação democrática, mas levanta questões sobre soberania e influência estrangeira."
haiti_events.2.a: "Temos de cooperar para evitar derramamento de sangue."

je_haiti_political_crisis: "Crise Política do Haiti"
je_haiti_political_crisis_reason: "Após a eleição democrática do Presidente Jean-Bertrand Aristide em 1990, o Haiti teve um breve momento de optimismo. No entanto, a frágil estabilidade foi destruída em setembro de 1991, quando um golpe militar expulsou Aristide, mergulhando o país no caos político.\n\n O regime militar enfrentou a condenação internacional, à medida que as violações dos direitos humanos e a repressão política se tornaram generalizadas. As sanções econômicas impostas pelas Nações Unidas e pela Organização dos Estados Americanos impactaram severamente a economia já em dificuldades do Haiti.\n\n Ao longo de 1992 e 1993, as negociações entre a junta militar e os apoiadores de Aristide vacilaram, enquanto a violência contra os opositores políticos e a população em geral se intensificou. Tentativas da Missão das Nações Unidas no Haiti (UNMIH) para restaurar a governança democrática se encontraram com obstrução.\n\n Em 1994, a crescente pressão da comunidade internacional, especialmente dos Estados Unidos, estabeleceu o palco para uma intervenção direta. A operação Uphold Democracy, liderada pelas forças norte-americanas em setembro de 1994, visava restaurar Aristide ao poder e pôr fim ao governo da junta."

# quebec
# [GetPlayer.MakeScope.GetVariable('quebec_happiness_var').GetValue|0]

je_quebec_happiness: "A Situação de Quebec"
je_quebec_happiness_reason: "O status de Quebec no Canadá tem sido uma questão controversa há décadas. A cultura, a língua e a história distintas de Quebec têm frequentemente alimentado debates sobre autonomia e independência.\n\n Nos anos que antecederam o referendo de Quebec de 1995, a relação entre Quebec e o governo federal do Canadá tem sido marcada pela tensão, negociação e o aumento ocasional do sentimento nacionalista.\n\n A província de Quebec, com sua única maioria francófona, identidade cultural distinta, e longa história de defesa da autonomia, tem procurado periodicamente redefinir seu lugar dentro da federação canadense. Alguns Quebecois desejam independência completa, outros desejam o aumento das potências provinciais, enquanto muitos ainda apoiam permanecer em um Canadá unificado.\n\nComo Primeiro-Ministro, sua tarefa é navegar nesta situação delicada. Você deve equilibrar a unidade nacional com respeito às aspirações culturais e políticas de Quebec. Cada decisão que você tomar — seja em leis linguísticas, política econômica ou investimento cultural — influenciará a felicidade da população quebequenita.\n\n Se a pontuação Quebec Felicidade permanece alta, o referendo pode terminar com um voto para ficar no Canadá. Mas, se o descontentamento aumentar demais, o povo de Quebec poderá votar pela independência, alterando para sempre o mapa da América do Norte."
quebec_happiness_bar_desc: "A felicidade franco-canadense"
quebec_happiness_monthly_tt: "Mudança mensal em Quebec Felicidade."
quebec_happiness_bar:0 "Apoio à independência de Quebec"
recently_pissed_quebec_off:0 "Não irritou recentemente Quebec"

too_many_quebec_concessions: "Muitas concessões; Quebeque"
quebec_happiness_10: "#green Aumentos #! Franco-Canadiana Felicidade por #green 5#! pontos"
quebec_happiness_minus_10: "#r Diminui #! Franco-Canadiana Felicidade em #r 5#! pontos"

quebec.6.t: "Complacência em Quebec"
quebec.6.d: "Com a esmagadora satisfação de Quebec, o governo federal tornou-se complacente. Ottawa acredita que a questão da unidade está resolvida, mas os críticos alertam que tal excesso de confiança pode levar a negligenciar outras questões importantes."
quebec.6.a: "Tabarnak!"

complacent_on_quebec: "Complacência em Quebec"
complacent_on_quebec_desc: "Com alto apoio de Quebec, o governo tornou-se complacente em suas negociações e atenção política, levando a críticas crescentes de outras facções."
 
quebec_concessions_button: "Faça concessões a Quebec"
quebec_concessions_button_desc: "Oferecer concessões políticas e culturais ao Quebec, aumentando sua felicidade."

quebec_ignore_button: "Ignorar as exigências de Quebec"
quebec_ignore_button_desc: "Recusar - se a se envolver com as exigências políticas de Quebeque, diminuindo sua felicidade."

quebec.1.t: "Tensões em Quebec"
quebec.1.d: "As tensões políticas aumentam em Quebec à medida que os debates sobre autonomia e direitos linguísticos se intensificam."
quebec.1.a: "Oferecer garantias ao Quebec."
quebec.1.b: "Mantenha-se firme na unidade nacional."

quebec.2.t: "O referendo de Quebec de 1995"
quebec.2.d: "Depois de anos de debate, Quebec vota se quer permanecer parte do Canadá ou se tornar uma nação independente."
quebec.2.a: "O povo escolheu a unidade."
quebec.2.b: "Quebec vota pela independência!"

quebec.3.t: "Linguagem Francesa Disputa"
quebec.3.d: "Uma proposta política federal ameaça reduzir o status de francês em Quebec, provocando indignação de muitos cidadãos."
quebec.3.a: "Proteja a língua francesa a todo o custo."
quebec.3.a.tt: "A felicidade de Quebec aumentará em #G +8#!."
quebec.3.b: "Manter a política actual."
quebec.3.b.tt: "A felicidade de Quebec diminuirá em #R -5#!."
quebec.3.b.tt2: "Poderá fazer mais concessões."

quebec.4.t: "Cortes federais de financiamento para Quebec"
quebec.4.d: "O governo federal enfrenta pressões orçamentárias, e o financiamento de Quebec para infraestrutura e serviços está no bloco de corte."
quebec.4.a: "Prossiga com os cortes."
quebec.4.a.tt: "A felicidade de Quebec diminuirá em #R -7#!."
quebec.4.b: "Corte menos de Quebec."
quebec.4.b.tt: "A felicidade de Quebec diminuirá em #R -2#!."

quebec.5.t: "Festival Cultural de Quebec"
quebec.5.d: "Uma celebração massiva da cultura Quebequeense chama a atenção nacional e internacional, promovendo orgulho e unidade."
quebec.5.a: "Celebrar e aumentar o financiamento da cultura."
quebec.5.a.tt: "A felicidade de Quebec aumentará em #G +10#!."
quebec.5.b: "Parabéns aos organizadores, mas sem financiamento extra."
quebec.5.b.tt: "A felicidade de Quebec aumentará em #G +3#!."

# China

je_china_southern_tour: "Tour Sul"
je_china_southern_tour_reason: "No início de 1992, Deng Xiaoping embarcou em seu famoso "Southern Tour", viajando para Shenzhen, Zhuhai, Guangzhou e Xangai.\n\n Os seus discursos promoveram a continuação da reforma económica, a liberalização do mercado e a expansão de zonas económicas especiais. A turnê revitalizou o impulso reformista dentro do Partido Comunista e garantiu aos investidores nacionais e estrangeiros que a 'reforma e abertura' da China continuaria.\n"
je_china_southern_tour_progress_tt: "O progresso aumenta a cada mês e através de certos eventos."

southern_tour_reforms: "Legado Econômico do Tour Sul"
je_china_southern_tour_complete: "Deng Xiaoping completou sua turnê"
china_southern_tour.1.t: "Passeio Sul de Deng Xiaoping"
china_southern_tour.1.d: "Deng Xiaoping iniciou uma visita altamente divulgada ao sul da China, visitando zonas econômicas especiais e exortando os funcionários a continuarem as reformas."
china_southern_tour.1.a: "A viagem começa."

china_southern_tour.2.t: "Requer reformas de mercado"
china_southern_tour.2.d: "Em discursos durante o Southern Tour, Deng Xiaoping apelou a um renovado compromisso com reformas orientadas para o mercado."
china_southern_tour.2.a: "Apoie o empurrão."
china_southern_tour.2.b: "Mantenha o ritmo atual."

china_southern_tour.3.t: "Resistência interna do partido"
china_southern_tour.3.d: "Os elementos conservadores no seio do Partido expressaram preocupações quanto ao ritmo e ao alcance da liberalização económica."
china_southern_tour.3.a: "Em frente, de qualquer maneira."
china_southern_tour.3.b: "Negociar um compromisso."

