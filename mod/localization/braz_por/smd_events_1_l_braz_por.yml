 demographic_events.1.t: "A crise demográfica"
 demographic_events.1.d: "Especialistas avisaram que nossa nação enfrenta uma grave crise demográfica. Décadas de taxas de natalidade em declínio produziram uma população envelhecida que em breve sobrecarregará nossa força de trabalho. Sem investimentos sustentados em assistência à saúde, moradia e assistência social, nossa base econômica vai corroer à medida que a proporção de trabalhadores para dependentes colapsa.\n\nUm tampão demográfico temporário atualmente mascara os piores efeitos, mas esse tampão vai se deteriorar nas próximas décadas. Temos de aprovar e manter reformas pró-natalistas abrangentes durante pelo menos dez anos para inverter a tendência."
 demographic_events.1.a: "Temos de agir antes que seja tarde demais."

 demographic_events.2.t: "Recuperação Demográfica"
 demographic_events.2.d: "Após uma década de investimento sustentado em nosso povo — cuidado universal com crianças, saúde acessível, bem-estar integral e habitação acessível — a taxa de natalidade de nossa nação se estabilizou. A crise demográfica que ameaçou prejudicar a nossa economia foi evitada. Uma nova geração de trabalhadores está entrando na força de trabalho, e o futuro parece brilhante."
 demographic_events.2.a: "A nossa paciência valeu a pena."

