 je_chechen_war_status_guerilla: "A guerra está em sua fase de guerrilha #bold#!. Os combatentes chechenos usam as montanhas para conduzir ataques de atropelamento e fuga. As batalhas mudam a pontuação da guerra e desbloqueiam grandes ofensivas."
