 chechen_war.1.t: "A Ofensiva Começa"
 chechen_war.1.d: "A fase decisiva da guerra começou. A guerrilha que definiu o conflito inicial dá lugar a um confronto direto. As montanhas do Cáucaso testemunharão a luta final pela Chechénia."
 chechen_war.1.a: "Pela Rússia!"
 chechen_war.1.a.che: "Pela Ichkeria!"
 
 chechen_war.2.t_rus: "Vitória Russa na Chechênia"
 chechen_war.2.d_rus: "A resistência chechena foi quebrada. As forças russas reafirmaram o controlo sobre a república separatista. O custo em vidas e infra-estruturas tem sido imenso, mas a integridade territorial da Federação Russa foi preservada."
 chechen_war.2.t_che: "Independência chechena"
 chechen_war.2.d_che: "Contra todas as probabilidades, os combatentes chechenos prevaleceram. Os militares russos retiraram-se e a República Chechena de Ichkeria é uma nação independente. O custo da liberdade tem sido surpreendente, mas a vontade do povo checheno tem se mostrado inquebrável."
 chechen_war.2.a: "A História lembrará deste dia"
 
 chechen_war.5.t: "Emboscada da Montanha"
 chechen_war.5.d: "Os nossos caças identificaram um comboio russo a mover-se através de uma estreita passagem de montanha. O terreno é perfeito para uma emboscada — falésias íngremes em ambos os lados, espaço limitado para manobrar, e floresta densa para cobrir nossos homens."
 chechen_war.5.a: "Ataque das montanhas"
 chechen_war.5.b: "Mantenham as nossas posições."
 
 chechen_war.6.t: "Invasão em linhas de suprimentos"
 chechen_war.6.d: "Os comboios de abastecimento russos têm-se deslocado pelas terras baixas com escolta mínima. Nossos caças poderiam interceptá-los, capturar suprimentos valiosos e interromper a logística do inimigo — mas a operação vai nos custar recursos e pode convidar retaliação."
 chechen_war.6.a: "Invadir as suas linhas de abastecimento"
 chechen_war.6.b: "Muito arriscado."
 
 chechen_war.7.t: "Guerra no Cáucaso"
 chechen_war.7.d: "A República Chechena de Ichkeria declarou sua independência, e a Rússia respondeu com força militar. O Cáucaso do Norte é engolido em guerra. O terreno montanhoso dá aos guerrilheiros chechenos uma vantagem natural, mas o poder militar da Rússia é formidável."
 chechen_war.7.a: "Então começa"
 
