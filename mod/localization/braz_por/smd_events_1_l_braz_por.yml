 oslo_usa_oslo_i_accepted_tt:0 "Ganhamos um bônus de reputação diplomática temporária como corretor do processo de Oslo."
 oslo_usa_oslo_i_rejected_tt:0 "Sofremos um retrocesso diplomático temporário devido ao colapso de Oslo I."
 oslo_usa_oslo_ii_accepted_tt:0 "Ganhamos um bónus de reputação diplomática temporária mais forte por apoiarmos a implementação de Oslo II."
 oslo_usa_oslo_ii_rejected_tt:0 "Sofremos um retrocesso diplomático temporário devido ao colapso de Oslo II."

 oslo_us_broker:0 "Oslo Broker"
 oslo_us_broker_desc:0 "Estamos a beneficiar diplomaticamente do seu apoio ao processo de Oslo."

 oslo_us_failed_mediation:0 "Mediação de Oslo Falhou"
 oslo_us_failed_mediation_desc:0 "O colapso do processo de Oslo prejudicou a confiança na mediação americana e ocidental."
 
 ## war on terror again
 
 wot_coalition.2.t:0 "Artigo 5.o"
 wot_coalition.2.d:0 "Na sequência dos ataques aos Estados Unidos, a NATO invocou o artigo 5.o. A aliança agora trata o ataque como um ataque a todos os membros."
 wot_coalition.2.f:0 "A aliança do Atlântico Norte foi construída para defesa coletiva. Sua primeira invocação não vem de tanques que atravessam uma fronteira, mas de um ataque terrorista."
 wot_coalition.2.a:0 "Fique com os Estados Unidos."

 wot_coalition.10.t:0 "Os Estados Unidos exigem cooperação"
 wot_coalition.10.d:0 "Os Estados Unidos exigiram a cooperação paquistanesa na Guerra contra o Terror. Washington espera acesso militar, baseando direitos, apoio à inteligência e rotas logísticas para o Afeganistão."
 wot_coalition.10.f:0 "A geografia do Paquistão torna-a indispensável. A recusa, no entanto, convidaria a acusação de que Islamabad está a proteger o terrorismo."
 wot_coalition.10.a:0 "Coopere com a coligação."
 wot_coalition.10.b:0 "Recusa o ultimato."

 wot_coalition.11.t:0 "Paquistão Coopera"
 wot_coalition.11.d:0 "O Paquistão concordou em cooperar com os Estados Unidos e parceiros de coalizão, concedendo acesso militar e hospedando bases militares para a campanha no Afeganistão."
 wot_coalition.11.f:0 "A estrada para o Afeganistão passa agora pelo Paquistão."
 wot_coalition.11.a:0 "Protejam as rotas."

 wot_coalition.12.t:0 "Paquistão Recusa"
 wot_coalition.12.d:0 "O Paquistão recusou exigências americanas de cooperação. Washington agora rotula o Paquistão como cúmplice no terrorismo e prepara ações militares diretas."
 wot_coalition.12.f:0 "A recusa transforma um parceiro logístico num alvo."
 wot_coalition.12.a:0 "Eles escolheram o seu lado."

 wot_article_5_join_war_tt:0 "Este membro da NATO juntar-se-á aos Estados Unidos em qualquer guerra activa contra o Afeganistão. Se a guerra ainda não começou, juntar-se-á quando a guerra começar."
 wot_pakistan_cooperate_tt:0 "O Paquistão assina tratados de 10 anos com os Estados Unidos e todos os parceiros da coalizão, concedendo #bold Acesso Militar#! e #bold Bases Militares anfitriãs#!."
 wot_pakistan_refuse_tt:0 "Os Estados Unidos lançam uma guerra de mudança de regime contra o Paquistão e a rotulam de cúmplice no terrorismo."

 wot_pakistan_coalition_access_treaty_name:0 "Acordo de acesso à coalizão terrorista"
 operation_enduring_freedom_pakistan:0 "Operação Perdurando a Liberdade — Paquistão"

 wot_article_5_commitment:0 "Artigo 5.o"
 wot_article_5_commitment_desc:0 "Este país comprometeu-se com a resposta da NATO após 11 de Setembro."

 wot_pakistan_cooperation:0 "Cooperação no domínio da coligação"
 wot_pakistan_cooperation_desc:0 "O Paquistão está a cooperar com os Estados Unidos e com parceiros de coligação na Guerra contra o Terror."

 wot_pakistan_complicit:0 "Complicidade Rotulada no Terrorismo"
