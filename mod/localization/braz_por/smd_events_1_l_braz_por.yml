 korea_reunification_bonus:0 "Coreia Reunificada"
 korea_reunification_bonus_desc:0 "A divisão da península coreana terminou. A nação está inteira pela primeira vez desde 1945. Autoridade, legitimidade e prestígio são drasticamente melhorados. As pressões separatistas e revolucionárias são suprimidas. O estado [ROOT.GetCountry.GetAdjective] pode iniciar o trabalho de integração de uma Coreia unificada."
 
 korea_stk_integration_bonus:0 "Integração Norte"
 korea_stk_integration_bonus_desc:0 "[ROOT.GetCountry.GetName] está absorvendo o primeiro território [SCOPE.sCountry('c:NRK').GetAdjective]. O fosso económico e administrativo entre o Norte e o Sul é vasto — a integração exige um investimento sustentado e uma incorporação acelerada. Os custos são reais, mas o objetivo é uma Coreia unificada."
 
 y2k_events.1.t: "O Erro do Milênio"
 y2k_events.1.d: "À medida que o ano 2000 se aproxima, uma ansiedade silenciosa tem se agarrado [ROOT.GetCountry.GetAdjective] Engenheiros, burocratas e departamentos de TI. O chamado problema Y2K — a descoberta que a maioria dos sistemas de computador armazena o ano como dois dígitos, e, portanto, interpretará '00' como 1900 ao invés de 2000 — desencadeou uma confusão global.\n\n Alguns dizem que as consequências podem ser catastróficas: falhas nas redes de energia, corrupção dos sistemas bancários, o controlo do tráfego aéreo a desaparecer. Outros dizem que a preocupação é muito exagerada e os consultores que vendem auditorias de conformidade estão simplesmente ficando ricos fora do pânico. [ROOT.GetCountry.GetName] deve decidir como levá-lo a sério."
 y2k_events.1.f: "A meia-noite está a chegar. Se as luzes ficam acesas é outra questão."
 
 y2k_events.1.a: "Investir na plena conformidade Y2K"
 y2k_events.1.a_tt: "Caros, minuciosos e provavelmente desnecessários — mas, se mesmo uma fração das predições estiverem certas, o custo de não fazer nada é muito maior. [ROOT.GetCountry.GetName] financiará programas de conformidade através de infraestrutura crítica."
 y2k_events.1.b: "É obviamente exagerado — ignore"
 y2k_events.1.b_tt: "O pânico é uma mina de ouro da indústria de consultoria e nada mais. [ROOT.GetCountry.GetName] não desperdiçará fundos públicos em um problema imaginário."
 
 # ── NEW YEAR 2000 ─────────────────────────
 
 y2k_events.2.t: "Feliz Ano Novo — Bem - vindo ao ano 2000"
 y2k_events.2.d: "Os relógios passaram da meia-noite de 31 de Dezembro de 1999, e as luzes ficaram acesas.\n\n Os aviões continuaram a voar. Os bancos abriram. As redes de energia vibraram. A água fluiu. O bug do milênio, a catástrofe mais esperada na história da computação, chegou com um sussurro em vez de um estrondo — ou talvez nunca tenha chegado, e os bilhões gastos em conformidade simplesmente funcionaram.\n\n Através de [ROOT.GetCountry.GetName], multidões encheram as ruas, fogos de artifício acenderam o céu, e por uma noite o mundo sentiu, brevemente, como se estivesse começando de novo. O século XXI começou. O que vem a seguir é o palpite de alguém."
 y2k_events.2.f: "O ano é 2000. O mundo não acabou. Isso, considerando tudo, são boas notícias."
 
 y2k_events.2.a: "Um novo século começa"
 
 # ── MODIFIERS ────────────────────────────
 
 y2k_compliance_investment: "Programas de conformidade Y2K"
 y2k_compliance_investment_desc: "[ROOT.GetCountry.GetName] investiu em abrangente conformidade Y2K em toda infraestrutura crítica. O custo é real, mas os sistemas estão prontos para o que a meia-noite traz."
 
 millennium_celebration: "Celebrações do Milênio"
 millennium_celebration_desc: "O ano 2000 chegou sem catástrofe. O humor do público é flutuante, as ruas ainda estão cheias de foliões, e [ROOT.GetCountry.GetName] entra no novo século com um otimismo cauteloso."
 
 y2k_minor_disruption: "Disrupção Y2K"
 y2k_minor_disruption_desc: "[ROOT.GetCountry.GetName] descartou preocupações de Y2K e agora enfrenta pequenas, mas reais rupturas como soluço de sistemas despreparados para o novo ano. Nada catastrófico — mas os críticos também não estavam totalmente errados."
 
  # ── TAGENTOPOLI ──────────────────────

 je_tangentopoli: "Tangentopoli"
 je_tangentopoli_reason: "A Itália tem um sistema de subornos. Contratos públicos — construção, infraestrutura, contratos de defesa, saúde — vão para empresas que pagam uma percentagem aos partidos políticos. Os democratas-cristãos tomam a sua parte. Os socialistas levam os deles. Os pequenos parceiros da coligação levam os deles. Toda a gente sabe. Todos participam. Tem sido assim desde a guerra.\n\n O sistema é chamado #bold Tangentopoli#! — Bribe City. É estável, eficiente e totalmente corrupto. A única questão é se pode sobreviver ao contacto com um juiz que se recusa a olhar para o outro lado."

 je_mani_pulite: "Mani Pulite"
 je_mani_pulite_reason: "A investigação está a decorrer. O juiz Antonio Di Pietro e o grupo de magistrados de Milão estão trabalhando através da rede de subornos e propinas que financiou a política italiana desde a fundação da República. Cada prisão leva a uma confissão. Cada confissão leva a um nome. Cada nome leva a outra prisão.\n\n A classe política está a revidar. Decretos de emergência, transferências de magistrados, ataques públicos ao judiciário. A questão é se a investigação pode chegar à sua conclusão antes que o sistema encontre uma forma de pará-lo.\n\n@information! O #bold barra de investigação#! acompanha o progresso dos magistrados. O #bold barra de resistência#! rastreia a capacidade da classe política de desligá-los."

 # Status descs — tangentopoli
 je_tangentopoli_contained_tt: "A investigação está em fase inicial. Um punhado de números menores foram presos. A classe política está rejeitando-o como uma questão provincial."
 je_tangentopoli_spreading_tt: "#bold A investigação está a espalhar-se. As confissões acumulam-se. Os nomes estão a surgir. Os magistrados de Milão estão a seguir cada linha."
 je_tangentopoli_critical_tt: "@warning! #bold O sistema está no ponto de ruptura.#! A escala de Tangentopoli está se tornando inegável. Uma crise política é iminente."

 # Status descs — mani pulite
 je_mani_pulite_early_tt: "A investigação está a aumentar. A equipa do Di Pietro está a trabalhar nas provas. A classe política ainda não organizou uma resposta coerente."
 je_mani_pulite_winning_tt: "#bold A investigação está a ganhar. Os magistrados estão à frente da resistência. Os nomes estão caindo mais rápido do que o sistema pode contê-los."
 je_mani_pulite_stalemate_tt: "@warning! A investigação e a resistência política são equilibradas. O resultado depende dos próximos movimentos."
 je_mani_pulite_suppressed_tt: "@warning! #bold A resistência política está ganhando vantagem.#! O sistema está se organizando. O inquérito pode ser enterrado antes de chegar à sua conclusão."

 # Progress bars
 tangentopoli_exposure_bar: "Exposição em rede"
 tangentopoli_exposure_bar_desc: "Até que ponto a rede de corrupção foi penetrada."
 tangentopoli_exposure_bar_second_desc: "A exposição cresce organicamente à medida que cada prisão leva a mais confissões."
 tangentopoli_bar_from_exposure: "Exposição judicial permanente da rede Tangentopoli"

 investigation_progress_bar: "Progresso no inquérito"
 investigation_progress_bar_desc: "Até onde chegaram os magistrados de Di Pietro."
 investigation_bar_progress: "Os magistrados avançam através das provas"

 political_resistance_bar: "Resistência política"
 political_resistance_bar_desc: "Resistência à Investigação"
 political_resistance_bar_progress: "A classe política organiza contra os magistrados"

 # ── EVENT TITLES AND TEXT ────────────────

 mani_pulite.1.t: "Um empresário tenta enxugar vinte milhões de liras"
 mani_pulite.1.d: "Mario Chiesa, presidente do Pio Albergo Trivulzio — uma casa de repouso em Milão — foi preso pelo juiz Antonio Di Pietro ao tentar deitar notas pela sanita abaixo. A Chiesa tinha sido apanhada a receber um suborno de 37 milhões de liras de uma empresa de limpeza.\n\n Os socialistas negaram-no imediatamente. Seu secretário do partido, Bettino Craxi, chama Chiesa de "ladrão" — não é uma escolha muito sábia de palavras, dado o que Di Pietro vai encontrar a seguir. A detenção é pequena. O que vai levar não é."
 mani_pulite.1.f: "Uma prisão de rotina. Ou assim parecia."
 mani_pulite.1.a: "Um embaraço local. O sistema está seguro."

 mani_pulite.2.t: "As Primeiras Confissões"
 mani_pulite.2.d: "Diante da prisão, funcionários menores começaram a falar. Não em troca de imunidade — não há acordo formal — mas porque a barragem quebrou e a lógica do silêncio já não se mantém. Cada nome leva a outro. Um nome leva a uma festa. Cada parte leva a um ministério.\n\n A investigação já não é sobre um homem com uma sanita cheia de notas. Trata-se de toda a arquitetura financeira da República."
 mani_pulite.2.f: "Quando um homem fala, todos falam."
 mani_pulite.2.a: "Prosseguir a investigação — não há como detê-la agora"
 mani_pulite.2.b: "Use a pressão executiva para conter o spread"

 mani_pulite.5.t: "Mani Pulite — Itália aprende o que todos sabiam"
 mani_pulite.5.d: "O conjunto de magistrados de Milão — Di Pietro, Colombo, Davigo, Borrelli — tornou-se público. As provas acumuladas tornam a escala inegável: ao longo das últimas décadas, praticamente todos os contratos públicos em Itália vieram com uma propina. As partes que dirigiam coletivamente a República consumiram um percentual de cada estrada, cada hospital, cada escola.\n\n Os jornais italianos têm um nome para isso: #bold Tangentopoli#!. A Primeira República está a ser julgada."
 mani_pulite.5.f: "Toda a gente sabia. Agora todos sabem que todos sabiam."
 mani_pulite.5.a: "A investigação irá para onde levar."

 mani_pulite.6.t: "Avvisi di Garanzia"
 mani_pulite.6.d: "Avisos de investigação estão chegando em [ROOT.GetCountry.GetName] — para empresários, funcionários do ministério, tesoureiros do partido, prefeitos. A #italic avviso di garanzia#! — uma notificação que está a ser investigada — tornou-se abreviatura para desonra. Os jornais imprimem-nos na primeira página. As carreiras terminam durante a noite.\n\n[SCOPE.gsInterestGroup('indicted_ig').GetName], entre outros, recebeu aviso prévio. A investigação já não se limita a Milão."
 mani_pulite.6.f: "O carteiro nunca foi tão temido."
 mani_pulite.6.a: "Cooperar – a resistência só vai piorar"
 mani_pulite.6.b: "Aplicar pressão executiva sobre o poder judiciário"

 mani_pulite.7.t: "Craxi e as Moedas"
 mani_pulite.7.d: "Bettino Craxi – ex-primeiro-ministro, secretário do partido socialista, o político mais poderoso da Itália há uma década – surgiu do Hotel Raphael em Roma para enfrentar uma multidão de várias centenas de cidadãos.\n\n Deram-lhe moedas e tomates. Moedas, porque eles sabem de onde veio o dinheiro.\n\n Craxi deu uma breve declaração defendendo o sistema de financiamento do partido — "todos sabiam, todos participaram" — e recuou para dentro. Dentro de meses ele voará para sua vila em Hammamet, Tunísia. Ele nunca voltará para Itália. Os socialistas, o partido que construiu, deixarão de existir."
 mani_pulite.7.f: "Um homem que roubou de um país, expulso por moedas."
 mani_pulite.7.a: "O antigo sistema está terminado — deixe-o cair"
 mani_pulite.7.b: "Gerenciar a transição — assumir a responsabilidade, buscar reformas"

 mani_pulite.8.t: "A Investigação Chega ao Sul"
 mani_pulite.8.d: "Tangentopoli nunca foi apenas um fenômeno do norte. Em [SCOPE.sState('tangentopoli_south_state').GetName] e em todo o Mezzogiorno, o sistema de propina foi tecido em subsídios agrícolas da UE, projetos de infraestrutura pública e a rede de relações entre política local e crime organizado.\n\nA investigação de Di Pietro seguiu o dinheiro para o sul. As redes políticas em [SCOPE.sState('tangentopoli_south_state').GetName] são mais antigas e mais profundamente enraizadas do que seus homólogos do norte. Não se desfarão facilmente."
 mani_pulite.8.f: "A corrupção desceu."
 mani_pulite.8.a: "Prorrogar o inquérito — sem excepções"
 mani_pulite.8.b: "Contêm o inquérito no Norte — o Sul é demasiado complexo"

 mani_pulite.9.t: "O Decreto Biondi"
 mani_pulite.9.d: "O ministro da Justiça Alfredo Biondi emitiu um decreto de emergência que proibiria o uso da custódia investigativa para uma série de delitos financeiros — incluindo precisamente os crimes no coração de Mani Pulite. Os críticos chamaram-lhe imediatamente o decreto #italic salvaladri#!: a lei 'salva-roubos'.\n\n Dentro de 24 horas, os magistrados de Milão anunciaram sua demissão coletiva em protesto. A resposta pública é esmagadora. Procuradores em toda a Itália receberam cartas de apoio de centenas de milhares de cidadãos. O custo político do processo está a tornar-se visível."
 mani_pulite.9.f: "Um governo que aprova uma lei para proteger seus próprios criminosos não sobrevive por muito tempo à tentativa."
 mani_pulite.9.a: "Impulsionar o decreto — a investigação deve ser contida"
 mani_pulite.9.b: "Retirar o decreto — a reacção do público é demasiado forte"

 mani_pulite.10.t: "A Primeira República está morta"
 mani_pulite.10.d: "Acabou. A democracia cristã — o partido que governou a Itália sem interrupção desde 1948 — dissolveu-se. Os socialistas desapareceram. Os partidos de coligação mais pequenos desapareceram. Quarenta e cinco anos da Primeira República, desmantelados em dois anos por um grupo de magistrados em Milão que simplesmente se recusaram a olhar para o outro lado.\n\n Mais de 1.200 políticos e empresários foram condenados. Cinco mil foram investigados. Ex-primeiros-ministros, ministros de gabinete e industriais enfrentaram julgamento.\n\n O que vem a seguir para [ROOT.GetCountry.GetName] é incerto. Mas o sistema que se alimentou da República durante meio século está terminado."
 mani_pulite.10.f: "Os juízes fizeram o que as eleições nunca conseguiram."
 mani_pulite.10.a: "Uma nova Itália — Abrace a ruptura limpa"
 mani_pulite.10.b: "Uma transição gerida — reforma sem ruptura"

 mani_pulite.15.t: "A investigação está enterrada"
 mani_pulite.15.d: "A classe política ganhou. Os magistrados foram transferidos, desacreditados ou desfinanciados. As provas foram seladas. O momento foi quebrado.\n\n Isso não significa que Tangentopoli não aconteceu. Significa que as pessoas que a construíram sobreviveram. A corrupção não acabou — foi para o subsolo, para novas formas e novos arranjos. [ROOT.GetCountry.GetName] Os cidadãos sabem o que foi feito. Eles sabem que não foi punido. Esse conhecimento não desaparece."
 mani_pulite.15.f: "Justiça adiada é justiça negada. E todos sabem disso."
 mani_pulite.15.a: "O sistema sobrevive — por enquanto"

 # ── MODIFIERS ────────────────────────────

 tangentopoli_systemic_corruption: "Tangentopoli"
 tangentopoli_systemic_corruption_desc: "O sistema de propina que financia a política [ROOT.GetCountry.GetAdjective] há décadas está incorporado em todos os contratos públicos. A legitimidade está estruturalmente enfraquecida. O sistema custa dinheiro e convida infâmia."

 tangentopoli_chiesa_arrest: "O caso Chiesa"
 tangentopoli_chiesa_arrest_desc: "A prisão de Mario Chiesa abriu a primeira fenda no sistema. A classe política está rejeitando-o, mas os magistrados estão seguindo o fio."

 tangentopoli_ig_under_scrutiny: "Sob investigação"
 tangentopoli_ig_under_scrutiny_desc: "Este grupo está sob controlo judicial em ligação com a rede de corrupção Tangentopoli. Sua força política e apelo popular são significativamente danificados."

 tangentopoli_widening_investigation: "Ampla investigação"
 tangentopoli_widening_investigation_desc: "O inquérito está a expandir-se para além do seu âmbito inicial. Cada confissão leva a uma nova prisão. O custo político da governação está a aumentar."

 tangentopoli_suppression_attempt: "Tentativa de Supressão"
 tangentopoli_suppression_attempt_desc: "[ROOT.GetCountry.GetName] tentou suprimir a investigação judicial. A comunidade internacional e a imprensa nacional registaram-no."

 tangentopoli_party_collapse: "Colapso da Festa"
 tangentopoli_party_collapse_desc: "Este partido foi destruído pelas revelações de Tangentopoli. A sua liderança está no exílio ou sob acusação. Os seus eleitores foram para outro lado."

 tangentopoli_legitimacy_crisis: "Crise da legitimidade"
 tangentopoli_legitimacy_crisis_desc: "A revelação da corrupção sistêmica destruiu a confiança pública em instituições [ROOT.GetCountry.GetAdjective]. O radicalismo está a aumentar. A autoridade está enfraquecida."

 tangentopoli_south_exposure: "Redes do Sul expostas"
 tangentopoli_south_exposure_desc: "A investigação Mani Pulite chegou ao Mezzogiorno, expondo a relação entre as redes políticas do sul e o sistema Tangentopoli."

 mani_pulite_investigation_begins: "Mani Pulite Investigação"
 mani_pulite_investigation_begins_desc: "O grupo de magistrados de Milão está a conduzir uma investigação completa. [ROOT.GetCountry.GetName] a reputação internacional beneficia do compromisso visível com a prestação de contas."

 mani_pulite_public_mandate: "Mandato público para a Justiça"
 mani_pulite_public_mandate_desc: "A retirada do decreto sob pressão pública demonstrou a amplitude do apoio popular à investigação."

 mani_pulite_clean_hands_victory: "Vitória das Mãos Limpas"
 mani_pulite_clean_hands_victory_desc: "Mani Pulite conseguiu. O sistema de partidos corruptos da Primeira República foi desmantelado pelo processo judicial. [ROOT.GetCountry.GetName] inicia sua Segunda República com maior legitimidade, uma fundação institucional mais limpa, e o reconhecimento internacional que vem de responsabilizar o poder."

 mani_pulite_cautious_transition: "Transição Gerenciada"
 mani_pulite_cautious_transition_desc: "A transição da Primeira para a Segunda República está a ser cuidadosamente gerida — reforma sem ruptura. Os partidos antigos desapareceram, mas a continuidade institucional está preservada."

 mani_pulite_investigation_buried: "Inquérito enterrado"
 mani_pulite_investigation_buried_desc: "Mani Pulite falhou. A classe política sobreviveu. [ROOT.GetCountry.GetName] Os cidadãos sabem o que foi feito e sabem que não foi punido. A corrupção continua sob a superfície. A legitimidade está permanentemente danificada."

 amendment_events.1.t: "Um programa federal de saúde para os pobres"
 amendment_events.1.d: "As propostas estão perante o Congresso para criar um programa de seguro de saúde financiado federalmente para americanos de baixa renda, idosos e deficientes. Os apoiadores argumentam que os mercados privados não podem nem servirão aqueles que não podem pagar prémios. Os opositores argumentam ser uma expansão inaceitável do envolvimento federal na saúde.\n\n A coalizão que apoia o projeto de lei é ampla — sindicatos, reformadores sociais e uma parcela significativa do público. Se [ROOT.GetCountry.GetName] agirá é uma questão de vontade política."
 amendment_events.1.f: "A medicina não deve depender se você pode pagar."
 amendment_events.1.a: "Enact Medicaid — cobertura de saúde federal para quem precisa"
 amendment_events.1.b: "Rejeitá-la — a saúde é uma questão privada"
 
 amendment_events.2.t: "A Lei de Cuidados Acessíveis"
 amendment_events.2.d: "A administração propôs uma reforma integral da saúde — a Lei de Cuidados Acessíveis. A lei determina que todos os cidadãos tenham seguro de saúde, criem mercados regulamentados, prorroguem a elegibilidade do Medicaid e impeçam as seguradoras de negar cobertura para condições pré-existentes.\n\n O mandato individual é profundamente controverso. Os apoiadores dizem que é a única forma de fazer funcionar os mercados de seguros. A oposição chama-lhe excesso de alcance do governo. O projeto de lei tem os votos — se a coalizão se mantiver."
 amendment_events.2.f: "Quarenta milhões de americanos não seguros. O Congresso pode mudar isso."
 amendment_events.2.a: "Assine o Affordable Care Act em lei"
 amendment_events.2.b: "Veto — o mandato vai longe demais"
 
 amendment_events.3.t: "A Lei PATRIOT"
 amendment_events.3.d: "Nas semanas após os ataques de 11 de setembro, o Congresso se moveu com uma velocidade extraordinária para aprovar a Lei PATRIOT dos EUA — expandindo drasticamente as autoridades de vigilância doméstica, reduzindo a supervisão judicial das operações de inteligência e permitindo a partilha sem precedentes de informações entre as agências policiais.\n\n A lei tem apoio quase unânime. Os defensores das liberdades civis advertem que a velocidade de passagem e a amplitude das provisões serão difíceis de voltar. O país ainda está de luto. A votação é amanhã."
 amendment_events.3.f: "O medo é um legislador."
 amendment_events.3.a: "Assinar a Lei PATRIOT — a segurança nacional exige-a"
 amendment_events.3.b: "Recusa — as liberdades civis não podem ser negociadas em pesar"
 
 amendment_events.4.t: "Proibição Federal de Agressões"
 amendment_events.4.d: "O Congresso está votando uma proibição federal de dez anos sobre a fabricação de armas semi-automáticas especificadas e revistas de alta capacidade para venda civil. O projeto de lei é apoiado por associações policiais e pelas famílias de vítimas de tiroteio. O lobby de armas gastou muito contra ele.\n\n A cláusula de dez anos foi adicionada para garantir os votos finais. A proibição expirará em 2004, a menos que seja renovada — e a coligação política para a renovar poderá não se manter."
 amendment_events.4.f: "Dez anos. Depois, a votação volta a acontecer."
 amendment_events.4.a: "Aprovar a proibição — dez anos é um começo"
 amendment_events.4.b: "Derrotá-lo — cidadãos cumpridores da lei não devem pagar pelas acções dos criminosos"
 
 amendment_events.5.t: "A lei de controlo e aplicação da lei violentas"
 amendment_events.5.d: "O Congresso está considerando a maior legislação criminal na história de [ROOT.GetCountry.GetName] — financiamento para 100.000 novos policiais, uma expansão significativa do sistema prisional federal, novas sentenças mínimas obrigatórias e a Lei de Violência contra as Mulheres como piloto.\n\n A lógica política é bipartidária. A onda de crimes do final dos anos 80 tornou a política de lei e ordem popular através das linhas do partido. A lei vai passar facilmente. Se vai funcionar é uma questão para mais tarde."
 amendment_events.5.f: "A lei passa facilmente. As consequências levam mais tempo."
 amendment_events.5.a: "Assine - o país exige ação contra o crime"
 amendment_events.5.b: "Rejeitar — os mínimos obrigatórios e o encarceramento em massa não são a resposta"
 
 amendment_events.6.t: "Reforma do sistema de partilha de impostos"
 amendment_events.6.d: "O ministro das Finanças Liu Jihua propôs a reforma fiscal mais significativa desde a fundação da República Popular — substituindo os acordos negociados de partilha de impostos entre Pequim e os governos locais por um imposto nacional sobre o valor acrescentado e uma fórmula de receita formal.\n\n A reforma iria centralizar drasticamente o poder fiscal, dando a Pequim um fluxo de receitas confiável e crescente. Os governos locais perderão a discrição, mas ganharão clareza. Os interesses industriais e comerciais que construíram relações com as autoridades locais são discretamente opostos."
 amendment_events.6.f: "O centro quer o que as províncias têm mantido."
 amendment_events.6.a: "Aplicar o sistema de partilha de impostos — centralizar a autoridade fiscal"
 amendment_events.6.b: "Manter as disposições existentes — não perturbar as funções"
 
 amendment_events.7.t: "A Semana de Trabalho das 35 Horas"
 amendment_events.7.d: "O Ministro do Trabalho, Martine Aubry, propôs legislação que obriga uma semana de trabalho legal de 35 horas para a maioria dos trabalhadores — reduzindo as horas normais de 39. A política é apresentada como uma forma de compartilhar o trabalho de forma mais ampla: menos horas por trabalhador, mais trabalhadores empregados.\n\n Os sindicatos estão entusiasmados. A federação dos empregadores alertou para uma crise de competitividade. Os economistas estão divididos. A coligação de esquerda que elegeu este governo cumpriu a promessa. A questão é se a devemos entregar."
 amendment_events.7.f: "Trinta e cinco horas. Duas horas a menos. Uma tempestade política."
 amendment_events.7.a: "Aprovar a Lei de Aubry — os trabalhadores merecem menos horas"
 amendment_events.7.b: "Retirar — o custo económico é demasiado elevado"
 
 patriot_act_rejected_modifier: "Ato PACRIOT rejeitado"
 patriot_act_rejected_modifier_desc: "A decisão de não aprovar a Lei PACRIOT deixou o estabelecimento de segurança frustrado e o consenso político pós-ataque tenso."
 
 china_tax_reform_rejected_modifier: "Reforma fiscal parada"
 china_tax_reform_rejected_modifier_desc: "A falta de centralização do sistema fiscal deixou a autoridade fiscal fragmentada. Os governos locais continuam a negociar os seus próprios acordos, reduzindo as receitas e a autoridade do centro."
 
 terrorism_a.1.t: "O Centro Mundial de Comércio é bombardeado"
 terrorism_a.1.d: "Uma bomba explodiu no estacionamento subterrâneo do World Trade Center em Nova Iorque. A explosão matou seis pessoas e feriu mais de mil. O edifício não caiu — mas a intenção era trazer uma torre para baixo sobre a outra.\n\nÉ o primeiro grande ataque terrorista internacional em [ROOT.GetCountry.GetName] solo. Os autores têm ligações às redes que operam fora do Médio Oriente e da Ásia Central. A investigação está em curso."
 terrorism_a.1.f: "O primeiro ataque. Não o último."
 terrorism_a.1.a: "Vamos encontrar os responsáveis."
 
 terrorism_a.2.t: "O furacão Andrew ataca"
 terrorism_a.2.d: "O furacão Andrew — o furacão mais destrutivo do Atlântico na época — atingiu o sul da Flórida, com ventos superiores a 165 quilômetros por hora. Os danos são catastróficos. Comunidades inteiras em Miami-Dade County foram destruídas. Estimativas preliminares sugerem que este será um dos desastres naturais mais caros na história de [ROOT.GetCountry.GetName]."
 terrorism_a.2.f: "O furacão não se importa com o que foi construído."
 terrorism_a.2.a: "Declarar um desastre federal — mobilizar ajuda humanitária"
 
 terrorism_a.3.t: "Terremoto de Northridge"
 terrorism_a.3.d: "Um terremoto de magnitude 6.7 atingiu o Vale de San Fernando ao norte de Los Angeles às 4:31 da manhã. Cinquenta e sete pessoas estão mortas, milhares estão feridas, e os danos às infra-estruturas — em particular ao sistema de auto-estradas e edifícios mais antigos — já ultrapassaram dezenas de milhares de milhões de dólares. O terremoto é o mais caro na história de [ROOT.GetCountry.GetName]."
 terrorism_a.3.f: "A Califórnia treme. Treme sempre."
 terrorism_a.3.a: "Mobilizar alívio federal imediatamente"
 
 terrorism_a.4.t: "Bombardeamento em Oklahoma City"
 terrorism_a.4.d: "Uma bomba de caminhão destruiu a frente do edifício Alfred P. Murrah Federal em Oklahoma City, matando 168 pessoas, incluindo 19 crianças na creche do prédio. É o ataque terrorista doméstico mais mortal na história de [ROOT.GetCountry.GetName].\n\n Os criminosos não são estrangeiros. Timothy McVeigh e Terry Nichols são [ROOT.GetCountry.GetAdjective] cidadãos motivados pela ideologia anti-governo. O país é confrontado com a realidade de que a ameaça pode vir de dentro."
 terrorism_a.4.f: "O inimigo não estava na fronteira. Ele já cá estava."
 terrorism_a.4.a: "Trata-se de terrorismo doméstico — responderemos com toda a força"
 
 terrorism_a.5.t: "Embaixadas dos EUA bombardeadas na África Oriental"
 terrorism_a.5.d: "Bombas simultâneas de caminhões explodiram fora das embaixadas [ROOT.GetCountry.GetAdjective] em Nairobi, Quênia e Dar es Salaam, Tanzânia. Os ataques mataram mais de 200 pessoas — a maioria deles civis quenianos e tanzanianos — e feriram mais milhares. Uma rede liderada por Osama Bin Laden assumiu a responsabilidade.\n\n Os ataques são uma declaração de que [ROOT.GetCountry.GetAdjective] interesses em todo o mundo são alvos. A resposta de [ROOT.GetCountry.GetName] definirá a forma de contraterrorismo para a próxima década."
 terrorism_a.5.f: "A guerra chegou às nossas embaixadas primeiro."
 terrorism_a.5.a: "Este é um ato de guerra — responderemos"
 
 terrorism_a.6.t: "O [ROOT.GetCountry.GetAdjective] Embaixada Está bombardeado"
 terrorism_a.6.d: "Uma bomba de caminhão explodiu fora da Embaixada dos Estados Unidos em Nairobi, matando mais de 200 pessoas — a maioria [ROOT.GetCountry.GetAdjective] Civis que estavam perto do edifício na altura. O ataque não foi direcionado para [ROOT.GetCountry.GetName]. [ROOT.GetCountry.GetName] teve o custo de qualquer maneira."
 terrorism_a.6.f: "A bomba não fazia distinção entre nações."
 terrorism_a.6.a: "Exigimos justiça para os nossos mortos"
 
 terrorism_a.7.t: "O [ROOT.GetCountry.GetAdjective] O Capital Está Apertado"
 terrorism_a.7.d: "Uma bomba explodiu perto da Embaixada dos Estados Unidos em Dar es Salaam, matando onze pessoas no que parece ser um ataque coordenado ao lado de um bombardeio simultâneo em Nairobi, Quênia. As vítimas eram principalmente [ROOT.GetCountry.GetAdjective] civis. O ataque abalou o país."
 terrorism_a.7.f: "O terrorismo chegou às nossas margens do outro lado do oceano."
 terrorism_a.7.a: "Estamos com o nosso povo"
 
 terrorism_a.8.t: "O USS Cole foi bombardeado"
 terrorism_a.8.d: "Um pequeno barco transportando explosivos detonou ao lado do USS Cole enquanto reabastecia no porto de Aden, Iémen. Dezessete marinheiros foram mortos e 39 feridos. O ataque é atribuído à al-Qaeda.\n\nUm navio de guerra do [ROOT.GetCountry.GetAdjective] A Marinha, numa paragem de reabastecimento num porto amigável, foi atacada por um bombista suicida num bote de borracha. A liderança militar está perguntando como isso foi permitido acontecer."
 terrorism_a.8.f: "A Marinha é suposto ser o alvo difícil."
 terrorism_a.8.a: "Isto não ficará sem resposta."
 
 terrorism_a.9.t: "The Bridge Creek–Moore Tornado"
 terrorism_a.9.d: "Um tornado EF5 — o mais forte registrado na escala Fujita — percorreu Bridge Creek e Moore, Oklahoma. A velocidade do vento excedeu 300 milhas por hora. O tornado esteve no chão durante 85 minutos e esculpiu um caminho de destruição total através de comunidades ao sul de Oklahoma City. Trinta e seis pessoas morreram."
 terrorism_a.9.f: "Não sobrou nada onde estava o tornado."
 terrorism_a.9.a: "Implantar alívio para as comunidades afetadas"
 
 terrorism_a.10.t: "32 Mortos na Virginia Tech"
 terrorism_a.10.d: "Um pistoleiro matou 32 estudantes e professores do Instituto Politécnico de Virgínia, em Blacksburg, Virginia, antes de se suicidar. É o tiroteio mais mortífero da história de [ROOT.GetCountry.GetName]. O atirador comprou legalmente suas armas de fogo apesar de um histórico de preocupações de saúde mental que deveria desqualificar-lhe de acordo com a lei existente.\n\n A falha do sistema de verificação de antecedentes está agora sob controlo."
 terrorism_a.10.f: "Ele comprou a arma legalmente."
 terrorism_a.10.a: "Revisão imediata dos procedimentos de verificação de antecedentes das armas de fogo"
 
 terrorism_a.11.t: "82 Tiros no Teatro Aurora"
 terrorism_a.11.d: "Um atirador abriu fogo durante uma estreia à meia-noite de um grande filme no Century 16 teatro em Aurora, Colorado, matando 12 pessoas e ferindo 70. O atacante estava armado com um rifle semi-automático, espingarda e pistolas — todas compradas legalmente nas semanas anteriores ao ataque.\n\nColorado e o país estão em choque."
 terrorism_a.11.f: "Uma noite no cinema. Doze pessoas não foram para casa."
 terrorism_a.11.a: "Uma tragédia que exige reflexão"
 
 terrorism_a.12.t: "Gunman mata 6 em Wisconsin Sikh Temple"
 terrorism_a.12.d: "Um supremacista branco abriu fogo no Templo Sikh de Wisconsin em Oak Creek, matando seis adoradores antes de ser baleado pela polícia. O atacante foi um veterano do Exército dos EUA com links para organizações neonazistas.\n\n As vítimas foram alvo por causa de sua religião e etnia. O ataque reacendeu o debate sobre o extremismo doméstico, o crime de ódio e o fracasso em monitorar redes nacionalistas brancas."
 terrorism_a.12.f: "Vieram rezar. Veio matá-los por quem eram."
 terrorism_a.12.a: "Isto é crime de ódio — não vamos ignorar o extremismo doméstico"
 
 terrorism_a.13.t: "Tragédia em Sandy Hook"
 terrorism_a.13.d: "Um atirador matou 20 crianças com idades entre seis e sete anos, e seis funcionários adultos, na Sandy Hook Elementary School, em Newtown, Connecticut. As crianças foram baleadas várias vezes com um rifle de assalto.\n\n Não há palavras adequadas. [ROOT.GetCountry.GetName] está em luto."
 terrorism_a.13.f: "Vinte crianças. Seis anos."
 terrorism_a.13.a: "O país sofre"
 
 terrorism_a.14.t: "O Massacre de Dunblane"
 terrorism_a.14.d: "Um atirador entrou na Escola Primária de Dunblane na Escócia e matou dezesseis crianças de cinco e seis anos, e seu professor, antes de se suicidar. É o tiro em massa mais mortal no histórico de [ROOT.GetCountry.GetName].\n\n A resposta nacional é esmagadora. Sobreviventes, pais e o público lançaram uma campanha para uma proibição total da propriedade de armas privadas. O governo enfrentará uma enorme pressão para agir."
 terrorism_a.14.f: "Dezasseis crianças. Cinco anos. A Escócia não esquecerá."
 terrorism_a.14.a: "Algo tem de mudar — o país exige-o"
 
 terrorism_a.15.t: "As enchentes de Yangtze"
 terrorism_a.15.d: "O rio Yangtze e seus afluentes inundaram catastróficamente após meses de chuvas invulgarmente pesadas. As inundações afetaram 240 milhões de pessoas no centro e no sul [ROOT.GetCountry.GetName] — 14 províncias, 56 milhões de hectares de terras agrícolas e milhares de assentamentos. Mais de 3.000 pessoas estão mortas e 14 milhões foram deslocadas.\n\n A mobilização estatal é maciça. Os militares enviaram centenas de milhares de tropas para o alívio das inundações. Este é o maior desastre natural na história recente [ROOT.GetCountry.GetAdjective]."
 terrorism_a.15.f: "O rio decidiu levar o que os diques tinham prometido guardar."
 terrorism_a.15.a: "A força total do Estado será mobilizada"
 
 terrorism_a.16.t: "Apartamento Edifícios Bombardeados em Moscou"
 terrorism_a.16.d: "Uma série de ataques de bomba em prédios de apartamentos em Moscou e outras cidades russas matou quase 300 pessoas enquanto dormiam. Os bombardeios foram atribuídos aos separatistas chechenos — embora as provas sejam contestadas por alguns observadores.\n\n Os ataques provocaram uma enorme pressão pública para uma resposta militar decisiva. Uma nova campanha militar na Chechénia está agora a ser seriamente analisada. A figura política que promete esmagar os terroristas vai descobrir que o público está pronto para segui-lo."
 terrorism_a.16.f: "O medo é uma ferramenta política poderosa. O luto também."
 terrorism_a.16.a: "Isto exige uma resposta militar completa"
 
 # ── MODIFIERS ────────────────────────────
 
 he_terror_attack_domestic: "Ataque terrorista doméstico"
 he_terror_attack_domestic_desc: "Um ataque terrorista ao solo [ROOT.GetCountry.GetAdjective] abalou a confiança do público e aumentou a radicalização e a agitação."
 
 he_terror_attack_foreign: "Ataque de Terror no Exterior"
 he_terror_attack_foreign_desc: "Um ataque terrorista a [ROOT.GetCountry.GetAdjective] interesses no exterior prejudicou o prestígio e a posição diplomática."
 
 he_counterterrorism_push: "Resposta contra o terrorismo"
 he_counterterrorism_push_desc: "Uma grande campanha contra o terrorismo está sendo montada. Autoridade e legitimidade são reforçadas — mas a infâmia gerada por operações agressivas no exterior levará tempo para se deteriorar."
 
 he_natural_disaster_emergency: "Emergência natural de desastres"
 he_natural_disaster_emergency_desc: "Um grande desastre natural provocou uma resposta de emergência federal. O custo é significativo e a capacidade do governo é estendida."
 
 he_disaster_zone: "Zona de Desastres"
 he_disaster_zone_desc: "Este estado foi gravemente danificado por um desastre natural. Infraestrutura, mortalidade e atração migratória são afetadas negativamente."
 
 he_domestic_extremism_response: "Resposta ao Extremismo Doméstico"
 he_domestic_extremism_response_desc: "Após um ataque terrorista doméstico, [ROOT.GetCountry.GetName] lançou uma resposta de segurança interna significativa visando redes extremistas."
 
 he_military_shock: "Choque Militar"
 he_military_shock_desc: "Um ataque bem sucedido contra os ativos militares [ROOT.GetCountry.GetAdjective] abalou as forças armadas e prejudicou o prestígio nacional."
 
 he_mass_shooting: "Tiro em Massa"
 he_mass_shooting_desc: "Um tiroteio em massa aumentou a ansiedade pública e a polarização política sobre a política de armas de fogo."
 
 he_mass_shooting_severe: "Tiro em massa — tragédia nacional"
 he_mass_shooting_severe_desc: "Um tiroteio em massa de gravidade excepcional criou profundo pesar nacional e intensa pressão política. A legitimidade da política existente está a ser questionada."
 
 he_hate_crime_shock: "Crime de ódio — choque nacional"
 he_hate_crime_shock_desc: "Um ataque ao crime de ódio direcionado chocou a nação e destacou a ameaça do extremismo doméstico dirigido às comunidades minoritárias."
 
 he_gun_reform_mandate: "Mandato público para a reforma de armas"
 he_gun_reform_mandate_desc: "A indignação pública após um tiroteio em massa criou um forte impulso político para a reforma das armas de fogo. A lei é mais fácil do que o habitual."
 
 he_security_state_response: "Resposta do Estado de Segurança"
 he_security_state_response_desc: "Um grande ataque terrorista gerou apoio público para a expansão dos poderes de segurança do Estado. Autoridade e legitimidade são reforçadas."
 
 ## breakup of czechoslovakia
 je_velvet_divorce: "O divórcio do veludo"
 je_velvet_divorce_reason: "A Federação está sob tensão. A transição do comunismo expôs as falhas económicas e políticas entre as metades checa e eslovaca do Estado. Os políticos eslovacos — liderados por Vladimír Mečiar — estão a promover uma maior autonomia e alguns pela plena independência. O lado checo, liderado por Václav Klaus, está cada vez mais disposto a deixá-los ir.\n\n Duas forças estão em movimento. [ROOT.GetCountry.GetName] deve construir #bold coesão federal#! — através de negociação, compromisso econômico e habilidade política — antes #bold pressão separatista#! torna a dissolução irreversível.\n\n Se a pressão atingir 100 antes da coesão, a federação dissolve-se. Em paz. É isso que significa "velvet"."
 
 je_velvet_divorce_stable_tt: "A Federação está a aguentar-se. As negociações continuam. O resultado ainda está nas mãos do governo."
 je_velvet_divorce_tense_tt: "@warning! #bold A pressão separatista está a aumentar. Os políticos eslovacos estão cada vez mais confiantes de que a independência é possível e desejável. A janela para um acordo negociado está a diminuir."
 je_velvet_divorce_critical_tt: "@warning! #bold A federação está em ponto de ruptura.#! As condições políticas para a dissolução estão quase completas. Sem uma intervenção dramática, a Checoslováquia não sobreviverá ao ano."
 
 federal_cohesion_bar: "Coesão Federal"
 federal_cohesion_bar_desc: "Coesão Federal"
 federal_cohesion_bar_progress_tt: "Nível de coesão federal"
 
 separatist_pressure_bar: "Pressão separatista"
 separatist_pressure_bar_desc: "Pressão separatista"
 separatist_pressure_bar_progress_tt: "Momento separatista"
 
 # ── EVENTS ───────────────────────────────
 
 velvet_divorce.1.t: "A crise constitucional começa"
 velvet_divorce.1.d: "As eleições de Junho de 1992 produziram um resultado impossível. Nos países checos, o Partido Democrático Cívico de Václav Klaus venceu numa plataforma de rápida liberalização do mercado. Na Eslováquia, o Movimento de Vladimír Mečiar por uma Eslováquia Democrática venceu numa plataforma de reformas mais lentas e de maior autonomia eslovaca. Os dois homens se encontraram em Brno e concordaram com uma coisa: o acordo atual não pode continuar. Eles discordam em quase tudo. O Presidente Václav Havel — que acredita que o público votaria para manter o país unido se lhe fosse pedido — foi afastado.\n\n O destino de [ROOT.GetCountry.GetName] é agora uma questão do que os próximos meses trazem."
 velvet_divorce.1.f: "Duas eleições. Dois mandatos. Um país."
 velvet_divorce.1.a: "O governo trabalhará para manter a federação unida"
 
 velvet_divorce.2.t: "Lamentações económicas eslovacas"
 velvet_divorce.2.d: "A economia da Eslováquia está a sofrer a transição do comunismo mais do que a Boêmia e a Morávia. A base industrial eslovaca — construída em torno da indústria pesada e da produção de armas para o Pacto de Varsóvia — entrou em colapso quase da noite para o dia. O desemprego está a aumentar acentuadamente. Os políticos eslovacos estão culpando a política econômica federal e exigindo redistribuição ou o direito de definir seu próprio curso.\n\n O fosso entre as duas metades do país está a tornar-se politicamente inflamável."
 velvet_divorce.2.f: "Quando metade de um país faz bem e a outra metade não, a questão do porquê torna-se uma questão de quem."
 velvet_divorce.2.a: "Reorientar os fundos federais para as regiões eslovacas"
 velvet_divorce.2.b: "O mercado encontrará o seu nível — nenhum tratamento especial"
 
 velvet_divorce.3.t: "Declaração Eslovaca de Soberania"
 velvet_divorce.3.d: "O Conselho Nacional da Eslováquia aprovou uma declaração da soberania da Eslováquia. O documento deixa de declarar independência, mas afirma que a lei eslovaca substitui a lei federal em território eslovaco.\n\n Isto é constitucionalmente ambíguo e politicamente explosivo. O Presidente Havel condenou-o e demitiu-se da sua presidência checa pouco depois. A declaração ainda não é uma ruptura — mas é o primeiro passo formal para um."
 velvet_divorce.3.f: "Ainda não é independência. Mas a direcção é clara."
 velvet_divorce.3.a: "Condenar a declaração — lei federal é suprema"
 velvet_divorce.3.b: "Conversas abertas — oferecer à Eslováquia mais autonomia formal no seio da federação"
 
 velvet_divorce.4.t: "Mečiar e Klaus: Dois Homens, Duas Visões"
 velvet_divorce.4.d: "Vladimír Mečiar e Václav Klaus encontraram-se novamente. As suas posições negociais endureceram. O Klaus quer uma união federal estreita com uma política económica unificada. Mečiar quer uma confederação solta com quase total autonomia doméstica eslovaca, ou independência.\n\n Os que participaram da reunião descrevem-na como civil, mas irreconciliável. Os dois homens não são inimigos — mas querem coisas fundamentalmente diferentes, e um deles terá o que quer."
 velvet_divorce.4.f: "Dois pragmáticos. Conclusões opostas."
 velvet_divorce.4.a: "Apoiar o programa unificado de reforma do mercado — apoiar Klaus"
 velvet_divorce.4.b: "Oferecer uma confederação mais solta — dar a Mečiar algo para trabalhar"
 
 velvet_divorce.5.t: "Solicita um Referendo"
 velvet_divorce.5.d: "Os políticos e os grupos cívicos eslovacos pedem um referendo sobre a independência. A proposta tem um apoio público significativo na Eslováquia, onde as sondagens sugerem que uma maioria estreita favorece alguma forma de separação.\n\n O Presidente Havel — ainda influente, apesar da sua demissão — defendeu um referendo. Ele acredita que o próprio processo inflamaria paixões e tornaria um resultado racional impossível. "As nações não decidem separar a forma como uma reunião de accionistas vota sobre uma fusão", afirmou. 'Eles sentem o seu caminho para ele, ou longe dele.'\n\n A questão de se realizar uma votação é em si uma votação sobre o que [ROOT.GetCountry.GetName] acredita que é."
 velvet_divorce.5.f: "Um referendo é uma questão. Mas fazer algumas perguntas muda a resposta."
 velvet_divorce.5.a: "Faça o referendo — deixe o povo falar"
 velvet_divorce.5.b: "Bloquear o referendo — seguir o conselho de Havel"
 
 velvet_divorce.10.t: "Tchecoslováquia Sobrevive"
 velvet_divorce.10.d: "A crise já passou. Através de uma combinação de compromisso econômico, negociação política e persistência das instituições federais, [ROOT.GetCountry.GetName] se manteve unida.\n\n O arranjo que surgiu não é a federação de 1990. A Eslováquia tem mais autonomia. A relação económica entre as duas metades foi reequilibrada. Mas o estado está intacto, e a bandeira está inalterada.\n\n A história notará que isso não era inevitável — que exigia escolhas ativas, e que essas escolhas foram feitas."
 velvet_divorce.10.f: "O divórcio de veludo não aconteceu. Isso é uma vitória."
 velvet_divorce.10.a: "A Checoslováquia resiste"
 
 velvet_divorce.15.t: "O divórcio do veludo"
 velvet_divorce.15.d: "Está feito. Em 1 de Janeiro de 1993, a Checoslováquia deixará de existir.\n\n A dissolução foi acordada pelo parlamento federal — não por referendo. O público nunca foi directamente solicitado. As pesquisas em ambas as metades do país consistentemente mostraram apoio maioritário para preservar alguma forma de estado comum, mas a classe política — Klaus e Mečiar acima de tudo — determinou que a união era inviável.\n\n A separação foi pacífica. Nenhum tiro foi disparado. Nenhuma fronteira foi contestada. Os ativos e passivos da federação foram divididos de acordo com uma fórmula baseada na população. O exército foi dividido. A moeda foi dividida. A bandeira foi dividida.\n\nCzechoslováquia existiu por setenta e quatro anos. Nasceu na revolução e dissolveu-se num voto parlamentar. Ambos os Estados sucessores já solicitaram a adesão da UE e da NATO."
 velvet_divorce.15.f: "Setenta e quatro anos. Terminado por papelada."
 velvet_divorce.15.a: "A dissolução prossegue"
 
 velvet_divorce.16.t: "Nasceu a República Checa"
 velvet_divorce.16.d: "Em 1 de janeiro de 1993, a República Checa se torna um Estado independente. O território da Boêmia, Morávia e Silésia Tcheca — com Praga como sua capital — forma um dos dois estados sucessores da federação tchecoslovaca.\n\n O novo Estado herda a metade mais desenvolvida da velha economia, um sistema democrático funcional e reconhecimento internacional imediato. O caminho para a Europa está aberto."
 velvet_divorce.16.f: "Um novo estado. Uma velha nação."
 velvet_divorce.16.a: "A República Checa começa"
 
 velvet_divorce.17.t: "Nasceu a República Eslovaca"
 velvet_divorce.17.d: "Em 1 de janeiro de 1993, a República Eslovaca se torna um Estado independente. Bratislava é a capital de um país que existe nesta forma há exatamente um dia.\n\nEslováquia herda um legado industrial mais pesado, maior desemprego e um ambiente político mais complicado — o estilo de governo de Mečiar em breve fará críticas internacionais. Mas o Estado é soberano, reconhecido e, pela primeira vez na história, totalmente independente."
 velvet_divorce.17.f: "Pela primeira vez na sua história: uma Eslováquia independente."
 velvet_divorce.17.a: "A República Eslovaca começa"
 
 velvet_divorce.18.t: "O que vem a seguir?"
 velvet_divorce.18.d: "A Checoslováquia está a dissolver-se. Os seus sucessores — a República Checa e a República Eslovaca — estão a tomar forma.\n\n Foste o líder de um país que já não existe. A questão agora é qual o papel que desempenharão no que se segue."
 velvet_divorce.18.f: "Um país. Dois futuros."
 velvet_divorce.18.a: "Continuar como República Checa"
 velvet_divorce.18.b: "Continuar como República Eslovaca"
 velvet_divorce.18.c: "Permanecer e observar a dissolução"
 
 # ── MODIFIERS ────────────────────────────
 
 czh_federal_strain: "Deformação Federal"
 czh_federal_strain_desc: "A crise constitucional está enfraquecendo as instituições federais. A legitimidade está a deteriorar-se e a promulgação da lei é mais difícil, uma vez que ambas as metades da federação questionam a autoridade do centro."
 
 czh_slovak_subsidy: "Programa de apoio económico da Eslováquia"
 czh_slovak_subsidy_desc: "Os fundos federais estão a ser reorientados para apoiar a economia eslovaca através da transição. Caro — mas melhorou a temperatura política."
 
 czh_federal_authority_asserted: "Autoridade Federal Assertada"
 czh_federal_authority_asserted_desc: "O governo federal condenou a declaração eslovaca e afirmou a supremacia do direito federal. A autoridade é reforçada, mas a raiva eslovaca intensificou-se."
 
 czh_autonomy_negotiations: "Negociações Autonômicas"
 czh_autonomy_negotiations_desc: "Estão em curso conversações formais para oferecer à Eslováquia uma maior autonomia dentro da federação. O processo melhorou o clima político."
 
 czh_confederation_talks: "Proposta da Confederação"
 czh_confederation_talks_desc: "Um modelo de confederação mais frouxo está a ser negociado. Ambos os lados estão a falar. O resultado é incerto, mas o impulso para a dissolução diminuiu."
 
 czh_referendum_blocked: "Referendum Suprimido"
 czh_referendum_blocked_desc: "O apelo a um referendo de independência foi rejeitado. Os políticos eslovacos e a sociedade civil reagiram com raiva. A pressão política não desapareceu — foi-lhe negada uma saída."
 
 czh_federal_union_preserved: "União Federal Preservada"
 czh_federal_union_preserved_desc: "A crise constitucional já passou. [ROOT.GetCountry.GetName] mantidos juntos. O acordo negociado reforçou as instituições federais e a confiança do público na união."
 
 czc_new_republic_founding: "República Checa"
 czc_new_republic_founding_desc: "A República Checa foi estabelecida como um Estado soberano. O reconhecimento internacional é imediato. As fundações da nova república são estáveis."
 
 svk_new_republic_founding: "República Eslovaca"
 svk_new_republic_founding_desc: "A República Eslovaca foi estabelecida como um Estado soberano. A primeira Eslováquia totalmente independente na história é encontrar a sua base."
 
