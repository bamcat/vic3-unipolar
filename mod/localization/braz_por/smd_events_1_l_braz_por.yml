 je_first_chechen_war: "A Primeira Guerra Chechena"
 je_first_chechen_war_reason: "A República Chechena de Ichkeria declarou independência da Rússia. Moscovo respondeu com força militar. O terreno montanhoso do Cáucaso do Norte favorece os guerrilheiros chechenos, mas a Rússia traz força convencional esmagadora. O resultado desta guerra determinará o destino da Chechénia — e testará a determinação da Federação Russa."
 
