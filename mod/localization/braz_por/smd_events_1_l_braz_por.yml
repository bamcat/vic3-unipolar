 ### ══════════════════════════════════════════

 intifada_events.1.t: "Os Conflitos Escalam"
 intifada_events.1.d: "A revolta aumentou para além dos confrontos de rua. O que começou como pedras e protestos tornou-se um confronto completo. Nos estreitos becos e campos de refugiados da Palestina, cada edifício é uma fortaleza e cada rua um campo de batalha."
 intifada_events.1.a: "Vamos restaurar a ordem."
 intifada_events.1.a.pal: "Nunca vamos parar de resistir."

 intifada_events.2.t_isr: "A Intifada Termina"
 intifada_events.2.d_isr: "A Segunda Intifada foi suprimida. As operações militares israelenses reafirmaram o controle sobre os territórios palestinos, embora o custo na reputação internacional e vidas civis palestinianas tenha sido enorme. As queixas subjacentes continuam por resolver."
 intifada_events.2.t_pal: "Resistência Palestiniana Prevales"
 intifada_events.2.d_pal: "A Segunda Intifada alcançou o que parecia impossível. Através de pura determinação e sacrifício, o povo palestiniano forçou Israel à mesa das negociações. O mundo testemunhou o poder da resistência popular contra a ocupação."
 intifada_events.2.a: "O que vem a seguir?"

 intifada_events.5.t: "Confrontos de rua"
 intifada_events.5.d: "Jovens palestinos se reuniram nas bordas de postos de controle israelenses, armados com pedras e pneus em chamas. As ruas estreitas canalizam o confronto para uma luta estreita onde veículos blindados israelenses não podem manobrar eficazmente. As câmaras de televisão de todo o mundo gravam as cenas."
 intifada_events.5.a: "Intensificar a resistência"
 intifada_events.5.b: "Mostrar contenção"

 intifada_events.6.t: "Invasões do ponto de verificação"
 intifada_events.6.d: "Os postos de controle militares israelenses que dividem comunidades palestinianas apresentam tanto um símbolo de ocupação quanto um alvo tático. Uma greve coordenada poderia perturbar o controle israelense de movimento dentro dos territórios, embora ele vai convidar dura retaliação."
 intifada_events.6.a: "Atacar os postos de controlo"
 intifada_events.6.b: "Muito perigoso."

 intifada_events.8.t: "Cobertura de Mídia Internacional"
 intifada_events.8.d: "Os meios de comunicação internacionais transmitem imagens da revolta em todo o mundo. Cenas de civis palestinos confrontados com forças militares israelenses provocaram protestos e condenação em capitais em todo o mundo. As nações da Liga Árabe estão se reunindo por trás da causa palestiniana, enquanto Israel enfrenta pressão diplomática crescente."
 intifada_events.8.a: "O mundo está a ver"

 intifada_events.7.t: "A Segunda Intifada"
 intifada_events.7.d: "Os territórios palestinianos entraram em erupção. Depois de anos de negociações de paz fracassadas e expansão contínua dos colonatos, a frustração do povo palestino transformou-se em uma revolta aberta. Nas ruas apertadas de Gaza e nas encostas da Cisjordânia, uma nova geração toma a luta."
 intifada_events.7.a: "Isto definirá uma geração"

 ### ══════════════════════════════════════════
 ### MODIFIERS
 ### ══════════════════════════════════════════

 intifada_urban_uprising: "Revolta Urbana"
 intifada_urban_uprising_desc: "Os combates ocorrem em áreas urbanas densamente alojadas e campos de refugiados onde as forças militares convencionais não podem operar eficazmente. O pequeno território torna as manobras em grande escala praticamente impossíveis."

 intifada_isr_morale: "Momento IDF"
 intifada_isr_morale_desc: "Os sucessos militares fortaleceram a decisão israelense de suprimir a revolta."

 intifada_popular_resistance: "Resistência Popular"
 intifada_popular_resistance_desc: "O povo palestiniano aumentou em massa. Cada bairro é uma fortaleza, cada civil um lutador em potencial."

 intifada_stone_throwing: "Resistência às ruas"
 intifada_stone_throwing_desc: "Os confrontos de rua e o arremesso de pedras sustentados tornaram as áreas ocupadas extremamente difíceis de controlar pelas forças israelitas."

 intifada_idf_crackdown: "IDF Crackdown"
 intifada_idf_crackdown_desc: "Operações militares israelenses em áreas civis estão causando baixas significativas."

 intifada_devastation: "Destruição Intifada"
 intifada_devastation_desc: "Os combates devastaram casas, infra-estruturas e meios de subsistência em todo o território."

 intifada_raid_expenses: "Operações de Resistência"
 intifada_raid_expenses_desc: "Financiamento de operações de resistência coordenadas contra posições militares israelitas."

 intifada_international_pressure: "Pressão internacional"
 intifada_international_pressure_desc: "A cobertura global dos meios de comunicação social do conflito prejudicou a reputação internacional e diplomática de Israel."

 intifada_isr_reward: "Intifada Suprimida"
 intifada_isr_reward_desc: "Israel reprimiu a Segunda Intifada, reafirmando o controle militar sobre os territórios palestinos."

 intifada_pal_reward: "Resistência Vitoriosa"
 intifada_pal_reward_desc: "O povo palestino prevaleceu através da resistência popular, ganhando reconhecimento e concessões através do sacrifício."
 
 je_israel_palestine_peacetime:0 "O estado de inquieto Quo"
 je_israel_palestine_peacetime_reason:0 "Não há intifada aberta ou grande escalada, mas o conflito continua através da coordenação de segurança, encerramentos, diplomacia, manifestações e incidentes periódicos."
 je_israel_palestine_tension_bar:0 "Tensão de Conflito"
 je_israel_palestine_tension_bar_desc:0 "Instabilidade regional"
 je_israel_palestine_tension_bar_second_desc:0 "Alta tensão pode desencadear um grande aviso de escalada e pode ser conectado ao seu sistema Segunda Intifada."

 je_ip_peacetime_status_calm:0 "A situação é relativamente calma. A coordenação da segurança, as negociações e a mediação internacional mantêm uma escalada mais ampla."
 je_ip_peacetime_status_fragile:0 "A calma é frágil. Incidentes, incursões, encerramentos, manifestações ou disputas de resolução poderiam rapidamente desfazer o equilíbrio atual."
 je_ip_peacetime_status_crisis:0 "A situação está à beira de uma grande escalada. Um único incidente pode ser suficiente para quebrar o status quo."
 je_ip_peacetime_complete_tt:0 "A tensão é muito baixa, as negociações são avançadas e a coordenação da segurança é duradoura."

 je_ip_peacetime_security_coordination:0 "Coordenação da segurança"
 je_ip_peacetime_security_coordination_desc:0 "Expandir a coordenação prática para evitar que os incidentes locais se tornem uma crise mais vasta. Isso diminui a tensão, mas pode criar uma reação política doméstica."

 je_ip_peacetime_closure_policy:0 "Política de encerramento"
 je_ip_peacetime_closure_policy_desc:0 "Aperte os controles de movimento e acesso para reduzir os riscos de segurança imediatos. Isto reduz a tensão a curto prazo, mas prejudica a economia palestiniana e aumenta a pressão internacional."

 je_ip_peacetime_settlement_freeze:0 "Congelamento de liquidação"
 je_ip_peacetime_settlement_freeze_desc:0 "Anuncie um congelamento temporário na expansão do acordo. Isto melhora as negociações e a posição internacional, mas cria uma reacção interna."

 je_ip_peacetime_international_mediation:0 "Mediação Internacional"
 je_ip_peacetime_international_mediation_desc:0 "Convide mediadores externos para estabilizar as conversas. Isto melhora a dinâmica da negociação, mas aumenta o escrutínio externo."

 je_ip_peacetime_grassroots_outreach:0 "Prosseguir as bases"
 je_ip_peacetime_grassroots_outreach_desc:0 "Apoiar a sociedade civil, organização local e iniciativas políticas não violentas. Isso diminui a tensão, mas pode irritar duramente."

 je_ip_peacetime_mass_mobilization:0 "Mobilização em Massa"
 je_ip_peacetime_mass_mobilization_desc:0 "Canal frustração pública em mobilização organizada. Isso aumenta a pressão internacional, mas corre o risco de empurrar a situação para a escalada."

 ip_uneasy_status_quo:0 "Quo de Estado Inquieto"
 ip_uneasy_status_quo_desc:0 "A luta aberta diminuiu, mas o conflito ainda molda a política, a diplomacia e a administração cotidiana."

 ip_security_coordination:0 "Coordenação da segurança"
 ip_security_coordination_desc:0 "A coordenação entre as forças de segurança está a limitar a escalada, embora seja politicamente dispendiosa."

 ip_closure_policy:0 "Política de encerramento"
 ip_closure_policy_desc:0 "As restrições à circulação reduzem alguns riscos de segurança, aumentando simultaneamente a pressão diplomática e humanitária."

 ip_economic_restrictions:0 "Restrições económicas"
 ip_economic_restrictions_desc:0 "As restrições à circulação e ao acesso estão a perturbar a vida económica."

 ip_settlement_freeze:0 "Congelamento de liquidação"
 ip_settlement_freeze_desc:0 "Uma pausa temporária na actividade de liquidação melhorou as condições diplomáticas."

 ip_international_mediation:0 "Mediação Internacional"
 ip_international_mediation_desc:0 "Os mediadores externos estão tentando manter vivo o processo político."

 ip_grassroots_outreach:0 "Prosseguir as bases"
 ip_grassroots_outreach_desc:0 "A sociedade civil e as iniciativas políticas locais estão a trabalhar para evitar que a situação surta em espiral."

 ip_mass_mobilization:0 "Mobilização em Massa"
 ip_mass_mobilization_desc:0 "A mobilização pública está aumentando a pressão política, mas também aumentando o risco de confronto."

 ip_security_alert:0 "Alerta de segurança"
 ip_security_alert_desc:0 "As forças de segurança estão em alerta depois da recente agitação."

 ip_international_scrutiny:0 "Controlo Internacional"
 ip_international_scrutiny_desc:0 "Os governos estrangeiros e os meios de comunicação estão a observar de perto os desenvolvimentos."

 ip_political_backlash:0 "Retrocesso político"
 ip_political_backlash_desc:0 "Compromisso ou coordenação irritou adversários domésticos."

 ip_stabilized_peace_process:0 "Processo de Paz Estabilizado"
 ip_stabilized_peace_process_desc:0 "Um período raro de baixa tensão e coordenação sustentada criou um ambiente diplomático mais estável."

 ip_breakdown_of_calm:0 "Repartição da Calma"
 ip_breakdown_of_calm_desc:0 "O status quo de tempo de paz foi quebrado e o público está se esforçando para a escalada."

 ip_peacetime.1.t:0 "Incidente no ponto de verificação"
 ip_peacetime.1.d:0 "Um incidente de segurança local chamou a atenção do público e aumentou a pressão para uma resposta."
 ip_peacetime.1.f:0 "Mesmo confrontos menores podem se tornar símbolos do conflito mais amplo."
 ip_peacetime.1.a:0 "Apertem os procedimentos de segurança."
 ip_peacetime.1.b:0 "Coordene em silêncio com as autoridades locais."

 ip_peacetime.2.t:0 "Crackdown de segurança"
 ip_peacetime.2.d:0 "Forças de segurança palestinianas enfrentam pressão para agir contra militantes e facções armadas."
 ip_peacetime.2.f:0 "A cooperação pode impedir a escalada, mas também pode parecer colaboração."
 ip_peacetime.2.a:0 "Vai contra as redes."
 ip_peacetime.2.b:0 "Evite um confronto."

 ip_peacetime.3.t:0 "Anúncio de liquidação"
 ip_peacetime.3.d:0 "Uma expansão proposta tornou-se um ponto de referência no processo diplomático."
 ip_peacetime.3.f:0 "Mapas, licenças e topos de morro podem carregar o peso da estratégia nacional."
 ip_peacetime.3.a:0 "Prossiga com o anúncio."
 ip_peacetime.3.b:0 "Atrasar a expansão."

 ip_peacetime.4.t:0 "Protestos de rua"
 ip_peacetime.4.d:0 "Demonstrações se espalharam por várias comunidades, desafiando o equilíbrio político atual."
 ip_peacetime.4.f:0 "A rua pode ser uma válvula de segurança, ou o primeiro sinal de algo maior."
 ip_peacetime.4.a:0 "Deixe a mobilização continuar."
 ip_peacetime.4.b:0 "Pede contenção."

 ip_peacetime.5.t:0 "Enviado Internacional"
 ip_peacetime.5.d:0 "Chegou um enviado estrangeiro com propostas de novo diálogo."
 ip_peacetime.5.f:0 "A diplomacia raramente resolve o conflito de uma só vez, mas pode ganhar tempo."
 ip_peacetime.5.a:0 "Recebe o enviado."
 ip_peacetime.5.b:0 "Rejeitar a pressão externa."

 ip_peacetime.6.t:0 "Conferência de doadores"
 ip_peacetime.6.d:0 "Os doadores estrangeiros estão a oferecer um novo apoio, mas esperam concessões políticas em troca."
 ip_peacetime.6.f:0 "A ajuda pode estabilizar as instituições, mas a dependência acarreta os seus próprios custos."
 ip_peacetime.6.a:0 "Aceite o quadro diplomático."
 ip_peacetime.6.b:0 "Exigir menos condições."

 ip_peacetime.10.t:0 "A calma quebra"
 ip_peacetime.10.d:0 "A pressão acumulada de incursões, protestos, encerramentos, colapso político, e conversações fracassadas trouxe a situação à beira da beira."
 ip_peacetime.10.f:0 "A língua de administração dá lugar à língua de emergência."
 ip_peacetime.10.a:0 "Preparem-se para a escalada."
 ip_peacetime.10.b:0 "Faça um último empurrão de emergência."

 ip_peacetime.20.t:0 "Uma calma duradoura"
 ip_peacetime.20.d:0 "Uma combinação rara de coordenação de segurança, contenção política e envolvimento diplomático estabilizou a situação."
 ip_peacetime.20.f:0 "Não é uma paz final, mas é mais do que a ausência de guerra."
 ip_peacetime.20.a:0 "Um sucesso frágil."
 
 oslo_accords.1.t:0 "O Acordo de Oslo I"
 oslo_accords.1.d:0 "Os negociadores israelitas chegaram a uma proposta de declaração de princípios com a liderança palestiniana. A proposta estabeleceria o reconhecimento mútuo e um quadro provisório para a auto-administração palestiniana."
 oslo_accords.1.f:0 "O acordo não estabelece fronteiras, Jerusalém, assentamentos, refugiados ou soberania final. No entanto, oferece um processo político organizado."
 oslo_accords.1.a:0 "Proponha a Declaração de Princípios."
 oslo_accords.1.b:0 "Atrasar o acordo."

 oslo_accords.10.t:0 "Israel Propõe o Acordo de Oslo I"
 oslo_accords.10.d:0 "Israel propôs uma declaração de princípios que estabelece o reconhecimento mútuo e um quadro provisório de auto-governo palestiniano."
 oslo_accords.10.f:0 "A aceitação iniciaria um novo processo político e acabaria com a subordinação formal a Israel, mas muitas questões de status final permaneceriam por resolver."
 oslo_accords.10.a:0 "Aceite a Declaração de Princípios."
 oslo_accords.10.b:0 "Rejeite a proposta."

 oslo_accords.11.t:0 "Palestina aceita Oslo I"
 oslo_accords.11.d:0 "Os dirigentes palestinianos aceitaram a Declaração de Princípios. O processo de paz provisório começou."
 oslo_accords.11.f:0 "O aperto de mão é histórico; o trabalho difícil está apenas começando."
 oslo_accords.11.a:0 "O processo começa."

 oslo_accords.12.t:0 "Palestina rejeita Oslo I"
 oslo_accords.12.d:0 "A liderança palestiniana rejeitou a proposta de Declaração de Princípios."
 oslo_accords.12.f:0 "Sem aceitação mútua, a abertura diplomática fecha."
 oslo_accords.12.a:0 "As conversas desmoronam."

 oslo_accords.2.t:0 "O Acordo de Oslo II"
 oslo_accords.2.d:0 "Dois anos após a Declaração de Princípios, os negociadores israelenses prepararam um acordo provisório que expandiu o governo autônomo palestino na Cisjordânia e em Gaza."
 oslo_accords.2.f:0 "A proposta divide a autoridade em zonas de controlo palestiniano, responsabilidade partilhada e controlo israelita continuado."
 oslo_accords.2.a:0 "Proponha o acordo provisório."
 oslo_accords.2.b:0 "Atrasar nova reafectação."

 oslo_accords.20.t:0 "Israel Propõe o Acordo de Oslo II"
 oslo_accords.20.d:0 "Israel propôs um acordo provisório de expansão do governo palestiniano e organização da Cisjordânia nas áreas A, B e C."
 oslo_accords.20.f:0 "O acordo promete uma autoridade ampliada, mas também entrincheira um mapa fragmentado de jurisdições sobrepostas."
 oslo_accords.20.a:0 "Aceite o Acordo Provisório."
 oslo_accords.20.b:0 "Rejeite a proposta."

 oslo_accords.21.t:0 "Palestina aceita Oslo II"
 oslo_accords.21.d:0 "Os dirigentes palestinianos aceitaram o Acordo Provisório. O processo de Oslo passa para a sua próxima fase."
 oslo_accords.21.f:0 "Mais autoridade é transferida, mas o acordo final permanece distante."
 oslo_accords.21.a:0 "Aplicar o acordo."

 oslo_accords.22.t:0 "Palestina Rejeita Oslo II"
 oslo_accords.22.d:0 "Os dirigentes palestinianos rejeitaram o acordo provisório proposto."
 oslo_accords.22.f:0 "A estrutura construída por Oslo I sobrevive, mas o seu próximo passo falhou."
 oslo_accords.22.a:0 "O processo para."

 oslo_i_peace_process:0 "Processo de Paz de Oslo I"
 oslo_i_peace_process_desc:0 "A Declaração de Princípios abriu um processo formal de paz provisório."

 oslo_i_palestinian_authority:0 "Criação da Autoridade Palestiniana"
 oslo_i_palestinian_authority_desc:0 "Uma autoridade palestiniana interina começou a assumir responsabilidades civis."

 oslo_talks_delayed:0 "Conversas Atrasadas"
 oslo_talks_delayed_desc:0 "O processo diplomático parou, aumentando a frustração e a incerteza."

 oslo_ii_interim_agreement:0 "Oslo II Acordo Provisório"
 oslo_ii_interim_agreement_desc:0 "O acordo provisório ampliou o quadro para a auto-administração palestiniana."

 oslo_ii_expanded_self_government:0 "Auto- Administração Expandida"
 oslo_ii_expanded_self_government_desc:0 "As instituições palestinianas assumiram maiores responsabilidades administrativas."

 oslo_ii_joint_security_framework:0 "Quadro Comum de Segurança"
 oslo_ii_joint_security_framework_desc:0 "As responsabilidades em matéria de segurança estão a ser coordenadas no quadro provisório."

 oslo_ii_administrative_fragmentation:0 "Fragmentação administrativa"
 oslo_ii_administrative_fragmentation_desc:0 "O território é governado por jurisdições fragmentadas e sobrepostas."

 oslo_ii_delayed_redeployment:0 "Reembolso Adiado"
 oslo_ii_delayed_redeployment_desc:0 "A nova reafectação foi adiada, prejudicando a confiança no processo."

 oslo_accords.30.t:0 "O Acordo de Oslo é assinado"
 oslo_accords.30.d:0 "Israel e a Palestina aceitaram a Declaração de Princípios. Espera-se agora que os Estados Unidos apoiem o novo processo de paz e ajudem a sustentar o quadro provisório."
 oslo_accords.30.f:0 "Surgiu uma abertura diplomática, mas precisará de garantes, dinheiro, pressão e paciência."
 oslo_accords.30.a:0 "Monitorize o processo."

 oslo_accords.31.t:0 "O Acordo de Oslo I falha"
 oslo_accords.31.d:0 "A declaração de princípios proposta foi rejeitada. A abertura diplomática foi encerrada antes de se poder estabelecer um quadro provisório."
 oslo_accords.31.f:0 "Sem aceitação mútua, a mediação externa não pode levar o processo sozinho."
 oslo_accords.31.a:0 "Um revés para a mediação."

 oslo_accords.32.t:0 "Assinatura do Acordo de Oslo II"
 oslo_accords.32.d:0 "Israel e a Palestina aceitaram o Acordo Provisório, expandindo a autonomia palestiniana e estabelecendo a próxima fase do processo de Oslo."
 oslo_accords.32.f:0 "O acordo é um sucesso diplomático, mas o seu mapa de autoridade dividida pode revelar-se difícil de administrar."
 oslo_accords.32.a:0 "Apoio à implementação."

 oslo_accords.33.t:0 "O Acordo de Oslo II falha"
 oslo_accords.33.d:0 "O acordo provisório proposto foi rejeitado. O processo de Oslo continua incompleto e o quadro territorial-administrativo é agora incerto."
 oslo_accords.33.f:0 "O primeiro passo não foi suficiente para garantir o segundo."
 oslo_accords.33.a:0 "O processo para."

