 # The Troubles

je_troubles_in_northern_ireland: "Os problemas na Irlanda do Norte"
je_troubles_in_northern_ireland_reason: "A Irlanda do Norte tornou-se um ponto de referência de violência política entre comunidades nacionalistas e sindicalistas, aumentando para conflitos armados envolvendo grupos paramilitares, civis e o Exército Britânico.\n\n Temos de gerir cuidadosamente a presença de tropas e as respostas políticas para estabilizar a região."

je_troubles_increase_troop_button: "Aumentar a Presença da Tropa"
je_troubles_increase_troop_button_desc: "Coloque mais forças do Exército Britânico na Irlanda do Norte para reforçar o controle e manter a ordem."

troubles_troop_strength_bar: "Presença de tropas na Irlanda do Norte"
troubles_troop_strength_bar_desc: "Força da tropa"
troubles_troop_strength_bar_monthly_desc: "Mede a força dos destacamentos de tropas britânicas na Irlanda do Norte."

troubles_events.1.t: "Bombardeamento em Belfast"
troubles_events.1.d: "Um carro bomba explodiu em Belfast, matando civis e aumentando as tensões."
troubles_events.1.a: "Trágico."

troubles_events.2.t: "Tropas sob ataque"
troubles_events.2.d: "Soldados britânicos foram atacados por insurgentes em Derry."
troubles_events.2.a: "Temos de responder."

troubles_events.3.t: "Protesto dos Direitos Civis"
troubles_events.3.d: "Um grande protesto em Londonderry tornou-se violento após confrontos com a polícia."
troubles_events.3.a: "Um desenvolvimento preocupante."

troubles_events.4.t: "Chegam Reforços"
troubles_events.4.d: "Novas tropas chegaram à Irlanda do Norte, reforçando a nossa presença."
troubles_events.4.a: "Óptimo."

troubles_events.5.t: "Homens armados matam civis no pub irlandês"
troubles_events.5.d: "Um tiroteio mortal na Irlanda do Norte abalou as comunidades locais, um triste reflexo da violência durante os problemas em curso."
troubles_events.5.a: "O caminho para a paz nunca é reto."
 
je_northern_ireland_peace_process: "Processo de paz na Irlanda do Norte"
je_northern_ireland_peace_process_reason: "Depois de décadas de conflito, conhecidos como "As Perturbações", os governos do Reino Unido e da Irlanda — ao lado dos partidos políticos da Irlanda do Norte — entraram num período de negociações.\n\n Da Declaração de Downing Street às conversações multipartidárias e potenciais cessar-fogos, essas discussões poderiam acabar com anos de derramamento de sangue.\n\n O resultado dependerá da vontade política, da opinião pública e da capacidade de compromisso."

ni_peace_process_success_tt: "O processo de paz conseguiu aumentar a estabilidade na Irlanda do Norte."

ni_peace_events.1.t: "Declaração de Downing Street"
ni_peace_events.1.d: "Os governos britânico e irlandês emitiram uma declaração conjunta afirmando o direito do povo da Irlanda do Norte de decidir o seu futuro."
ni_peace_events.1.a: "Um importante passo em frente."

ni_peace_events.2.t: "Começam as Conversas Multipartidárias"
ni_peace_events.2.d: "Pela primeira vez, os representantes da maioria das facções políticas do Norte da Irlanda encontram-se à mesa das negociações."
ni_peace_events.2.a: "O diálogo é o caminho para a paz."

ni_peace_events.3.t: "O Acordo de Sexta-Feira Santa"
ni_peace_events.3.d: "Os grupos paramilitares na Irlanda do Norte anunciaram um cessar-fogo, abrindo a porta a uma paz duradoura, na sequência de uma série de conversações positivas entre o Governo do Reino Unido e a Irlanda."
ni_peace_events.3.a: "As armas ficam em silêncio."

ni_peace_events.5.t: "Tropas britânicas chutadas da Irlanda do Norte"
ni_peace_events.5.d: "Com a presença de tropas na Irlanda do Norte reduzida a nada, o governo britânico não consegue manter o controle. Numa jogada surpresa, o governo cede formalmente a Irlanda do Norte à República da Irlanda."
ni_peace_events.5.a: "Não temos escolha."
ni_peace_events.5.a.tt: "A Irlanda do Norte será transferida para a Irlanda."

ni_peace_events.6.t: "Reunificação da Irlanda"
ni_peace_events.6.d: "Após décadas de divisão, a Irlanda do Norte aderiu oficialmente à República da Irlanda. As ruas enchem-se de celebrações enquanto a nação olha para um futuro unido."
ni_peace_events.6.a: "Abre o champanhe!"
reunification_pride: "Orgulho de Reunificação"
reunification_pride_desc: "A alegria da reunificação nacional reforçou a unidade pública e reforçou a posição do governo."

je_oil_titans:0 "Titãs do petróleo"
je_oil_titans_reason:0 "O Golfo fica no topo das maiores reservas de petróleo do planeta. O que [ROOT.GetCountry.GetName] faz com essa herança irá definir o próximo século — para a região, para o mercado global de energia, e para cada país cuja indústria, transporte e prosperidade é executada com petróleo.\n\n O objetivo não é apenas extrair petróleo. Torna-se indispensável — estar entre os três maiores produtores do mundo, de modo que quando o preço do petróleo se move, ele se move porque [ROOT.GetCountry.GetName] escolheu fazê-lo mover-se."
 
oil_titans_top3_tt:0 "#bold [ROOT.GetCountry.GetName] é um dos três maiores produtores mundiais de petróleo.#! A entrada da revista está completa — [ROOT.GetCountry.GetName] tornou-se um dos nós indispensáveis do sistema energético global."
oil_titans_top10_tt:0 "[ROOT.GetCountry.GetName] é um dos 10 maiores produtores mundiais de petróleo e aproximando-se do top 3. O investimento contínuo na extracção de petróleo irá colmatar a lacuna."
oil_titans_outside_tt:0 "[ROOT.GetCountry.GetName] ainda não está entre os 10 maiores produtores mundiais de petróleo. É necessário um investimento significativo na infra-estrutura de extracção de petróleo."
 
oil_titans_bonus:0 "Titã do Petróleo"
oil_titans_bonus_desc:0 "[ROOT.GetCountry.GetName] é um dos três maiores produtores mundiais de petróleo. As receitas que geram fluxo para o tesouro do estado, construção de fundos, e dar [ROOT.GetCountry.GetName] um grau de influência geopolítica que apenas seu tamanho populacional nunca justificaria. O mundo precisa de óleo [ROOT.GetCountry.GetAdjective]. Essa necessidade é poder."

bid_for_olympics_decision:0 "Anuncie o lance das Olimpíadas"
bid_for_olympics_decision_desc:0 "Temos a sorte de ter sido considerados pelo Comité Olímpico Internacional como o anfitrião dos próximos Jogos Olímpicos."
we_can_host_the_next_olympics_tt:0 "Podemos organizar os próximos Jogos Olímpicos."

 je_korea_reunification_nrk:0 "Reunificação Coreana"
 je_korea_reunification_nrk_reason:0 "A República Popular Democrática da Coreia é o único governo legítimo da nação coreana. A divisão da península no paralelo 38 é uma ferida artificial infligida por potências estrangeiras — um arranjo temporário que [ROOT.GetCountry.GetName] se compromete a corrigir.\n\nReunificação sob [ROOT.GetCountry.GetAdjective] a liderança restaurará a nação coreana à integridade. A administração sulista da Coreia do Sul deve ser levada para o estado [ROOT.GetCountry.GetAdjective] — pela força, por tratado, ou pelo peso do poder [ROOT.GetCountry.GetAdjective] tornando impossível mais resistência."
 
 korea_nrk_complete_tt:0 "#bold A península está unificada sob liderança [ROOT.GetCountry.GetAdjective].#! A Coreia é inteira. A divisão de 1945 foi corrigida."
 korea_nrk_subject_path_tt:0 "[SCOPE.sCountry('c:STK').GetName] é um assunto de [ROOT.GetCountry.GetName]. A administração meridional foi introduzida no estado [ROOT.GetCountry.GetAdjective]. Está em curso a plena integração da península."
 korea_nrk_incomplete_tt:0 "[SCOPE.sCountry('c:STK').GetName] controles [SCOPE.sState('STATE_SEOUL').GetName], [SCOPE.sState('STATE_BUSAN').GetName] e [SCOPE.sState('STATE_YANGHO').GetName]. A reunificação requer [ROOT.GetCountry.GetName] para possuir todos os três — ou ter [SCOPE.sCountry('c:STK').GetName] como sujeito."
 
 # ==========================================
 # SOUTH KOREA JE
 # ==========================================
 
 je_korea_reunification_stk:0 "Reunificação Coreana"
 je_korea_reunification_stk_reason:0 "A República da Coreia é o único governo legítimo da nação coreana. A divisão da península é um legado de ocupação estrangeira e rivalidade da Guerra Fria - [ROOT.GetCountry.GetName] nunca a aceitou como permanente.\n\nReunificação sob [ROOT.GetCountry.GetAdjective] a liderança reuniria o povo coreano sob uma ordem constitucional democrática. A administração norte-coreana deve ser absorvida pelo estado [ROOT.GetCountry.GetAdjective]. O regime de Pyonyang no norte é o último obstáculo."
 
 korea_stk_complete_tt:0 "#bold A península está unificada sob liderança [ROOT.GetCountry.GetAdjective].#! A Coreia é inteira. A divisão de 1945 foi corrigida."
 korea_stk_subject_path_tt:0 "[SCOPE.sCountry('c:NRK').GetName] é um assunto de [ROOT.GetCountry.GetName]. A administração do norte foi introduzida na ordem constitucional [ROOT.GetCountry.GetAdjective]. A integração do Norte está em curso — um empreendimento imenso."
 korea_stk_incomplete_tt:0 "[SCOPE.sCountry('c:NRK').GetName] controles [SCOPE.sState('STATE_PYONGYANG').GetName] e [SCOPE.sState('STATE_SARIWON').GetName]. Reunificação requer [ROOT.GetCountry.GetName] para possuir ambos — ou ter [SCOPE.sCountry('c:NRK').GetName] como sujeito."
 
