#################### JE ####################
# The Internet

je_internet:0 "A Internet"
je_internet_reason:0 "Está na hora de ligar o nosso país à Internet! Temos de melhorar a nossa rede de telecomunicações para além de apoiar o simples tráfego telefónico e, finalmente, introduzir os nossos cidadãos às maravilhas da World Wide Web!"

smd_tech.1.t:0 "[ROOT.GetCountry.GetName] Vai Online"
smd_tech.1.d:0 "Durante décadas, nossas comunicações têm confiado em jornais, rádio e televisão. Mas uma revolução silenciosa está varrendo o mundo — uma vasta rede de computadores interligados conhecidos como Internet. Uma vez que o domínio dos académicos e investigadores militares, agora promete mudar a forma como os nossos cidadãos trabalham, aprendem e se ligam."
smd_tech.1.f:0 "Internet discada: porque nada diz ' high-tech' como gritos bips e esperando 5 minutos para carregar uma foto de um gato."

smd_tech.1.a:0 "Talvez outras tecnologias devem se conectar à web também!"
smd_tech.1.b:0 "Poderíamos usar as interwebs para exercer controle sobre a opinião pública"

government_run_wifi_modifier:0 "Interferência do Governo em Wifi"

# Computer Science

je_computer_science:0 "Ciência da Computação"
je_computer_science_reason:0 "A ciência da computação é o estudo de como os computadores funcionam, como podem ser feitos para resolver problemas e como podemos usá-los de forma eficiente e segura."

smd_tech.2.t:0 "Graus de Ciência da Computação"
smd_tech.2.d:0 "Imagine - a como a ciência de pensar logicamente e resolver problemas — mas com máquinas que obedecem a cada pequena instrução. É abstracto e prático, e alimenta quase todas as tecnologias modernas à nossa volta, desde smartphones a carros auto-dirigidos."

# Pesticides

je_pesticides:0 "Herbicidas"
je_pesticides_reason:0 "Pesticidas são substâncias utilizadas para controlar pragas. Incluem herbicidas, inseticidas, nematicidas, fungicidas e muitos outros. Os mais comuns são os herbicidas, que representam aproximadamente 50% de todo o uso global de pesticidas. Com esta nova invenção, temos o dever de modernizar o nosso sector agrícola para incluir pesticidas."

smd_tech.3.t:0 "Um mar de pragas mortas"
smd_tech.3.d:0 "Por milênios, insetos e roedores têm permanecido uma ameaça implacável à atividade agrícola humana. Com a recente invenção de vários produtos químicos seguros de alimentos que repelem e matam insectos nocivos, podemos produzir colheitas mais abundantes, garantindo simultaneamente uma maior segurança alimentar de uma vez por todas!"

smd_tech.3.a:0 "Provavelmente seria melhor se fizessem menos danos ambientais..."

# Globalization

je_globalization:0 "Globalização"
je_globalization_reason:0 "A globalização é um fenômeno do final do século XX, definido por maior interconexão, o livre trânsito de cultura, bens, armas e pessoas, cada um desencadeado por maiores iniciativas de livre comércio em todo o mundo."

je_asian_economic_reform: "Reforma económica"
je_asian_economic_reform_reason: "A China e a Índia estão há muito vinculadas por restrições económicas. A economia global está a avançar rapidamente para a integração e o comércio livre. Por eliminarmos restrições ultrapassadas, podemos introduzir um crescimento sem precedentes. Até lá, os nossos mercados continuam limitados."

asian_economy_restrictions: "Restrições económicas"
asian_economy_restrictions_desc: "Ineficiências controladas pelo Estado e barreiras proteccionistas retardam o comércio, reduzindo a competitividade e o acesso internacional."

booming_trade_economy: "Economia comercial em expansão"
booming_trade_economy_desc: "Com restrições levantadas, os mercados estrangeiros e internos florescem, levando a uma maior prosperidade."

asia_reform.1.t: "Mercados Abertos"
asia_reform.1.d: "As reformas foram aprovadas e as políticas comerciais restritivas foram eliminadas. A China e a Índia estão agora na vanguarda da globalização económica."
asia_reform.1.f: "«Temos de abrir os nossos mercados, pois o isolamento já não é sustentável.»"
asia_reform.1.a: "Uma nova era de comércio começa."

# Starship

je_starships:0 "Naves estelares"
je_starships_reason:0 "A invenção do foguete reutilizável rapidamente estimulou a invenção de outro tipo de espaçonave, a nave estelar. Capaz de romper eficientemente as barreiras interplanetárias, aterrar em Marte e regressar à Terra, tudo mantendo os astronautas em saúde estável, é um novo design revolucionário que merece o nosso reconhecimento."

# coming soon

################ others ###########

# Cancer

cancer.1.t:0 "A cura para o câncer"
cancer.1.d:0 "Por mais de um século, o câncer tem assombrado a humanidade — uma aflição imprevisível que reivindicava milhões e evitava toda cura. Não conhecia fronteiras, não respeitava nenhum status, e deixava devastação em cada família que tocava. Mas hoje, depois de anos de pesquisa implacável, ensaios clínicos e colaboração internacional, os cientistas fizeram o impossível: desenvolveram uma cura universal e direcionada. Esta terapia de descoberta detecta e destrói células malignas sem prejudicar tecido saudável, tornando a remissão não apenas possível, mas garantida."
cancer.1.a:0 "Um triunfo para toda a humanidade."
cancer_eradication_prestige:0 "Cancro Erradicado"

# 2004 Indian Ocean earthquake and tsunami

indian_ocean_tsunami.1.t: "Terremoto ataca o oceano Índico"
indian_ocean_tsunami.1.d: "Um enorme terremoto subaquático desencadeou um tsunami catastrófico, devastador nas regiões costeiras do Sul e Sudeste da Ásia. Os danos são sem precedentes, e a recuperação levará anos."
indian_ocean_tsunami.1.a: "Temos de começar a reconstruir imediatamente."
indian_ocean_tsunami.1.f: "Numa das piores catástrofes registadas, um devastador terramoto e tsunami destruiu as nossas regiões costeiras."

je_indian_ocean_tsunami: "Recuperação de Tsunami"
je_indian_ocean_tsunami_reason: "Um tsunami devastador danificou a sua infra-estrutura costeira e abalou o país. Os esforços de reconstrução são cruciais para a recuperação e a estabilidade."

tsunami_recovery_success_tt: "Você iniciou com sucesso a recuperação nacional."

tsunami_disaster_struck: "Danos ao Tsunami em todo o país"
tsunami_local_destruction: "Devastação local de Tsunami"
tsunami_reconstruction_complete: "Reconstrução Completa"
  
indian_ocean_tsunami_recovery_title: "Esforços de Recuperação de Tsunami"
indian_ocean_tsunami_recovery_desc: "O seu país foi atingido pelo Tsunami do Oceano Índico. Aplicar ajuda e recuperação para estabilizar a sua população e infra-estrutura."

tsunami_aid_title: "Prestar ajuda humanitária"
tsunami_aid_desc: "Realize reformas de bem-estar ou atribua ajuda financeira para ajudar a reconstruir as zonas afectadas."

tsunami_disaster_struck: "Danos ao Tsunami em todo o país"
tsunami_local_destruction: "Devastação local de Tsunami"
tsunami_reconstruction_complete: "Esforço de reconstrução bem sucedido"
tsunami_recovery_success_tt: "O país promulgou uma lei de previdência social antes de dezembro de 2005."
 
indian_ocean_tsunami.2.t: "Tsunami Devastates Sul da Ásia"
indian_ocean_tsunami.2.d: "Um enorme terremoto e tsunami atingiram o Oceano Índico. A catástrofe humanitária aproxima-se. O mundo observa — agiremos?"
indian_ocean_tsunami.2.f: "Toda a costa desapareceu. A ajuda é necessária urgentemente."
indian_ocean_tsunami.2.a: "Envie ajuda de emergência."
indian_ocean_tsunami.2.b: "Temos as nossas prioridades."

indian_ocean_tsunami.3.t: "Ajuda recebida"
indian_ocean_tsunami.3.d: "Uma nação estrangeira enviou ajuda humanitária. O seu povo está grato."
indian_ocean_tsunami.3.a: "Graças a Deus pela solidariedade global."

tsunami_foreign_aid_sent: "Enviar ajuda externa às vítimas de Tsunami"
countries_available_to_request_aid_from:0 "Os países estão disponíveis para solicitar ajuda"
has_sent_iosa:0 "Já enviou ajuda"

je_request_iosa_aid_button:0 "Pedido de ajuda internacional"
je_request_iosa_aid_button_desc:0 "Solicitar ajuda da comunidade internacional para ajudar a se recuperar do devastador terremoto e tsunami."

tsunami_disaster_struck: "Afetado por 2004 Terremoto do Oceano Índico & Tsunami"

# Iraq disarmament Crisis

je_iraq_disarmament_crisis: "Crise do desarmamento no Iraque"
je_iraq_disarmament_crisis_reason: "Após a Guerra do Golfo, o Iraque foi obrigado pela Resolução 687 do Conselho de Segurança das Nações Unidas a desmantelar seus programas de destruição em massa. A comunidade internacional, através da UNSCOM e da AIEA, procurou verificar a conformidade, mas a obstrução do Iraque e as disputas sobre as inspeções criaram um impasse prolongado.\n\n A crise ameaça reavivar o conflito à medida que aumentam as tensões sobre a recusa do Iraque em cooperar plenamente com o regime de desarmamento."
iraq_disarmament_resolved_tt: "A crise do desarmamento iraquiano foi resolvida."

je_us_iraq_disarmament: "Crise do desarmamento no Iraque"
je_us_iraq_disarmament_reason: "Os Estados Unidos comprometeram-se a cumprir a Resolução 687 do Conselho de Segurança das Nações Unidas. Repetidas obstruções iraquianas das inspeções da UNSCOM e da AIEA comprometem a segurança global e alimentam as tensões na região do Golfo.\n\n Os esforços diplomáticos continuam, mas as opções militares permanecem na mesa se as inspecções falharem."

iraq_events.10.t: "Iraque rejeita aeronave UNSCOM"
iraq_events.10.d: "Num desafio ousado para a Comissão Especial das Nações Unidas (UNSCOM), o Iraque rejeitou propostas para que os inspectores utilizem as suas próprias aeronaves para entrar no país. Bagdade insiste no controlo total do acesso e dos transportes, suscitando novas preocupações quanto ao seu compromisso com o desarmamento."
iraq_events.10.a: "Rejeite seus termos — a soberania do Iraque vem em primeiro lugar."
iraq_events.10.b: "Permitir os voos — a cooperação pode aliviar as tensões."

us_events.10.t: "Iraque bloqueia aeronaves UNSCOM"
us_events.10.d: "O Iraque recusou-se a permitir que os inspectores da UNSCOM levassem o seu próprio avião para o país, dificultando ainda mais os esforços de inspecção. Este movimento é visto como um ato direto de desafio para a ONU e um revés para os esforços de desarmamento."
us_events.10.a: "Isto não pode ficar sem resposta."
us_events.10.b: "Evite a escalada — por enquanto."

################# COUNTRY-SPECIFIC ##############

# united states

rodney.1.t:0 "Polícia batendo de Rodney King"
rodney.1.d:0 "Um afro-americano desarmado, Rodney King foi violentamente espancado por oficiais do Departamento de Polícia de Los Angeles após uma perseguição de alta velocidade. Um espectador filmou o assalto, expondo brutalidade policial e provocando indignação nacional."
rodney.1.f:0 "Eles o cercaram e o espancaram com bastões. Ele não estava revidando. Foi horrível — como se quisessem fazer dele um exemplo."

rodney.1.a:0 "Vai ser um verão quente."

rodney.2.t:0 "Revoltas em Los Angeles"
rodney.2.d:0 "Na sequência dos policiais acusados de usar força excessiva no espancamento de Rodney King sendo abandonado, vastas faixas de pessoas tomaram as ruas, causando mais de 1 bilhão de dólares em danos à Cidade"
los_angeles_riots:0 "Rodney King Riots"
rodney.2.a:0 "Eles vão sossegar sozinhos."
rodney.2.b:0 "Enviem a Guarda Nacional!"

north_hollywood.1.t: "Tiroteio em North Hollywood"
north_hollywood.1.d: "Dois assaltantes estavam vestidos de colete e portavam rifles de assalto. Policiais sem armas tiveram de pedir armas a uma loja local para responder eficazmente."
north_hollywood.1.f: "Dois assaltantes de bancos fortemente armados se envolveram num longo tiroteio com a polícia de Los Angeles, ferindo vários oficiais e civis. O incidente chocou a nação e levantou questões sobre a preparação policial."
north_hollywood.1.a: "Um dia arrepiante na história da polícia."

north_hollywood_police_response:0 "Aumento do apoio à aplicação da lei"

wtc_bombing.1.t: "Bombardeamento do Centro Mundial de Comércio de 1993"
wtc_bombing.1.d: "Uma poderosa bomba de camião explodiu sob a Torre Norte do World Trade Center em Nova Iorque, matando seis pessoas e ferindo mais de mil. O ataque chocou a nação, revelando vulnerabilidades ao terrorismo dentro de suas próprias fronteiras."
wtc_bombing.1.a: "Aumentar as medidas de segurança interna."
wtc_bombing.1.b: "Mantenha-se calmo e evite exagerar."
heightened_security_measures: "Medidas de segurança reforçadas"
heightened_security_measures_desc: "Em resposta a um ataque terrorista, o governo implementou políticas de segurança interna mais fortes e coordenação da aplicação da lei."
oklahoma_city_aftermath: "Bombardeamento da Cidade de Oklahoma"
oklahoma_city_aftermath_desc: "O bombardeio devastador do Edifício Federal Alfred P. Murrah deixou a nação abalada. As preocupações de segurança e as repercussões políticas persistem à medida que o governo reforça a sua vigilância interna."
 
usa_events.1.t: "Resultados primários republicanos"
usa_events.1.d: "Após uma temporada primária aquecida cheia de debates e campanhas, o Partido Republicano escolheu seu novo porta-estandarte. George W. Bush saiu vitorioso, tomando as rédeas da Petite Bourgeoisie e prometendo um novo capítulo ousado para o partido."
usa_events.1.a: "A nomeação é dele."

usa_events.2.t: "A nomeação de Barack Obama"
usa_events.2.d: "Após uma temporada primária aquecida cheia de debates e campanhas, o Partido Democrata escolheu seu novo porta-estandarte. Barack Hussein Obama emergiu vitorioso, assumindo as rédeas da Petite Bourgeoisie e prometendo um novo capítulo ousado para o partido."
usa_events.2.a: "A nomeação é dele."

usa_events.3.t: "A Nomeação de Donald Trump"
usa_events.3.d: "Após uma temporada primária aquecida cheia de debates e campanhas, o Partido Republicano escolheu seu novo porta-estandarte. Donald John Trump, uma figura particularmente controversa, emergiu vitorioso, assumindo as rédeas dos Profissionais e prometendo um novo capítulo ousado para o partido."
usa_events.3.a: "A nomeação é dele."

# Storm of the Century
american_disasters.1.t: "1993 Tempestade do Século"
american_disasters.1.d: "Uma enorme tempestade ciclônica varreu o leste dos Estados Unidos, trazendo neve recorde, ventos de força de furacão, e graves inundações ao longo das costas. Milhões ficam sem poder, e o número de mortos aumenta diariamente."
american_disasters.1.a: "Temos de suportar a ira do inverno."

# Great Flood of 1993
american_disasters.2.t: "O Grande Dilúvio!"
american_disasters.2.d: "Semanas de chuva intensa e solo saturado fizeram com que os rios Mississippi e Missouri inchassem muito além de suas margens, submergindo vastas áreas do Centro - Oeste americano. Cidades inteiras estão debaixo de água, e os danos são sem precedentes."
american_disasters.2.a: "Um desastre para o coração."

great_flood_of_1993: "Grande Inundação de 1993"
storm_of_the_century: "1993 Tempestade do Século"

# Columbine

columbine.1.t: "Massacre de Colorado High School"
columbine.1.d: "Dois estudantes fortemente armados realizaram um ataque mortal no Colégio Columbine, no Colorado, matando e ferindo muitos antes de se suicidarem. O evento provocou pesar e debate nacional sobre controle de armas, segurança escolar e influências culturais."
columbine.1.a: "Pensamentos e orações"
columbine.1.b: "Temos de aumentar a segurança nas escolas em toda a nossa nação."

national_mourning_school_shooting: "Tiro na escola de luto"
school_security_measures: "Medidas de segurança das escolas"

better_school_security: "Melhor segurança escolar"
thoughts_and_prayers: "Pensamentos e Orações"
recent_mass_shooting: "Tiro em massa recente"

# September 11 Attacks 

ground_zero: "Ground Zero"
  
je_war_on_terror: "Guerra contra o terror"
je_war_on_terror_reason: "Os ataques terroristas de 11 de Setembro de 2001 contra os Estados Unidos marcaram o início de uma campanha global sustentada contra o terrorismo.\n\n Após os ataques, os Estados Unidos lançaram o que chamou de "Guerra contra o Terror" — uma estratégia ampla que combina operações militares, esforços de inteligência e medidas de segurança interna. As consequências reformularam a política externa, os debates sobre liberdades civis e as alianças internacionais.\n\n"

usa_wot.1.t: "América sob ataque"
usa_wot.1.d: "Ataques terroristas coordenados atingiram Nova Iorque e Washington, D.C., destruindo as torres do World Trade Center e prejudicando gravemente o Pentágono. Milhares foram mortos ou feridos. A nação está em choque e exige uma resposta."
usa_wot.1.a: "Um dia que viverá na infâmia."

usa_wot.2.t: "Uma guerra contra o terror"
usa_wot.2.d: "Após os ataques, o Presidente anunciou uma campanha global contra aqueles que planejam, apoiam ou abrigam organizações terroristas. Esta declaração conduzirá a um aumento das medidas de segurança no país e a compromissos militares no estrangeiro."
usa_wot.2.a: "Vamos levá-los à justiça."

global_wot.1.t: "EUA atacados; milhares mortos"
global_wot.1.d: "Os Estados Unidos sofreram ataques terroristas devastadores. Os líderes mundiais apresentaram condolências e muitos Estados estão reconsiderando seus arranjos de segurança."
global_wot.1.a: "Uma tragédia para toda a humanidade."

global_wot.2.t: "Estados Unidos declara guerra contra o terrorismo"
global_wot.2.d: "Após os ataques de 11 de setembro, os Estados Unidos declararam uma "Guerra ao Terror" global — convidando a comunidade internacional a se juntar a uma campanha contra grupos terroristas e seus apoiadores."
global_wot.2.a: "A ordem internacional muda."

global_wot.3.t: "Invocações dos EUA Artigo 5.o"
global_wot.3.d: "Na sequência dos ataques de 11 de Setembro e da subsequente campanha militar dos EUA no Afeganistão, o artigo 5o da Carta da NATO foi invocado pela primeira vez na história. Como Estado membro, somos chamados a juntar-nos ao esforço de guerra."
global_wot.3.a: "Estamos com os nossos aliados."

usa_wot.3.t: "Antraz ataca aterroriza a América"
usa_wot.3.d: "Nas semanas seguintes aos ataques de 11 de setembro, cartas anônimas contendo mortais esporos de antraz foram enviadas para organizações de notícias e senadores dos EUA. Os ataques semearam o medo em todo o país, provocaram grandes investigações e aumentaram as preocupações com a guerra biológica."
usa_wot.3.a: "A justiça será feita. E será rápido."
usa_wot.3.b: "Outra vez não!"
  
je_hunt_for_bin_laden: "A Caça a Osama Bin Laden"
je_hunt_for_bin_laden_reason: "Na sequência dos ataques de 11 de setembro de 2001, os Estados Unidos lançaram uma extensa e global busca por Osama Bin Laden, líder da Al-Qaeda. Esta missão passará por fronteiras, envolvendo operações militares, coleta de informações e pressão diplomática.\n\n"
intensified_intelligence_operations: "A Caça a Osama Bin Laden"

hunt_bin_laden_progress_bar: "Progresso na caça"
hunt_bin_laden_progress_bar_desc: "Progresso da Pesquisa"
osama_bar_completed: "Osama Bin Laden foi encontrado"

usa_wot.10.t: "A Caça a Osama Bin Laden"
usa_wot.10.d: "Com a Guerra contra o Terror em curso, agências de inteligência e forças especiais dos EUA começaram uma busca mundial por Osama Bin Laden. As decisões determinarão agora a intensidade e o âmbito da operação."
usa_wot.10.a: "Comprometa todos os recursos necessários."
usa_wot.10.b: "Concentre-se em outras prioridades."

usa_wot.12.t: "Capturado o Bin Laden"
usa_wot.12.d: "Após anos de perseguição, Osama Bin Laden foi localizado e neutralizado. Os Estados Unidos celebram uma vitória significativa na Guerra contra o Terror."
usa_wot.12.a: "A justiça foi feita."

usa_wot.11.t: "EUA Mata Bin Laden"
usa_wot.11.d: "Após meses de coleta e preparação de informações, os SEALs da Marinha dos EUA lançaram um ataque ousado a um complexo em Abbottabad, Paquistão. O objetivo: capturar ou matar Osama Bin Laden. O mundo aguarda o resultado."

usa_wot.11.a: "Covarde até ao fim."

usa_wot.11.success_tt: "Osama Bin Laden foi morto no Paquistão. A Guerra contra o Terror entra numa nova fase."

usa_wot.20.t: "Invasão da Inteligência"
usa_wot.20.d: "Agentes da CIA descobrem informações valiosas de militantes capturados, fornecendo novas pistas sobre o possível paradeiro de Bin Laden."
usa_wot.20.a: "Excelente, avance."
usa_wot.20.a.tt: "O progresso para encontrar Bin Laden aumentou."

usa_wot.21.t: "Bin Laden lança vídeo"
usa_wot.21.d: "Meses atrás de um suspeito que acreditava estar ligado ao Bin Laden acabaram por ser um beco sem saída. Os recursos foram desperdiçados. Para piorar as coisas, o terrorista do Oriente Médio lançou um vídeo para o público americano assistir."
usa_wot.21.a: "Contratempo frustrante."
usa_wot.21.a.tt: "O progresso para encontrar Bin Laden diminuiu."

usa_wot.22.t: "Cooperação regional"
usa_wot.22.d: "Paquistão e aliados regionais fornecem assistência na coleta de informações, acelerando a caça a Bin Laden."
usa_wot.22.a: "Isso nos ajudará muito."
usa_wot.22.a.tt: "Os progressos no sentido de encontrar Bin Laden aumentaram significativamente."
 
accuse_iraq_wmds_button: "Acusar o Iraque de transportar ADM"
accuse_iraq_wmds_button_desc: "Acusar o Iraque de desenvolver ou abrigar secretamente armas de destruição em massa. Isto aumentará as tensões e poderá justificar a acção militar."

end_war_on_terror_button: "Acabar com a guerra contra o terror"
end_war_on_terror_button_desc: "Declarar oficialmente a Guerra contra o Terror, acabar com as operações internacionais. Isto vai deixar as consequências em casa e no estrangeiro."

usa_wot.30.t: "Acusado de transportar ADM"
usa_wot.30.d: "Os Estados Unidos acusaram-nos publicamente de desenvolver e abrigar secretamente armas de destruição em massa. Isto marca um aumento significativo das tensões e pode aproximar o conflito."
usa_wot.30.a: "Assustador"
  
osama_extradited: "Osama Bin Laden foi extraditado"
war_on_terror_stopped_tt: "A Guerra contra o Terror terminou."
# War on TERROR

usa_wot.5.t: "Bin Laden em custódia"
usa_wot.5.d: "Num surpreendente avanço diplomático, o Afeganistão concordou em extraditar Osama bin Laden para os Estados Unidos. Esta concessão marca uma vitória significativa nas fases iniciais da Guerra contra o Terror."
usa_wot.5.a: "Esta é uma grande vitória diplomática."

usa_wot.6.t: "Afeganistão recusa-se a extraditar Bin Laden"
usa_wot.6.d: "O governo afegão recusou-se a entregar Osama bin Laden às autoridades dos EUA. As tensões aumentam à medida que Washington debate o seu próximo passo."
usa_wot.6.a: "Ou está com os terroristas, ou contra eles."
usa_wot.6.b: "Não vamos tomar nenhuma ação ousada, agora.."

je_request_bin_laden_extradition_button: "Solicitar a extradição de Bin Laden"
je_request_bin_laden_extradition_button_desc: "Solicite formalmente que o Afeganistão extradite Osama bin Laden para os Estados Unidos para julgamento."

bin_laden_extradition_accepted_country: "Extradição Bin Laden - Aceito"
