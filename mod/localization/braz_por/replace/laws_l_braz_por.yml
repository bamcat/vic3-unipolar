 enactment_phase_1_mon: "Considerações"
 enactment_phase_2_mon: "Assentimento"

 enactment_phase_0_generic: "Redação"
 enactment_phase_1_generic: "Alteração"
 enactment_phase_2_generic: "Votação"

 # Frontier Colonization
 law_frontier_colonization: "Colonização Fronteira"
 law_frontier_colonization_desc: "As fronteiras selvagens nas nossas fronteiras estão prontas para ser resolvidas, se puderem ser pacificadas e domesticadas."
