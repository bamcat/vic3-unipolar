l_braz_por:
  
  # Leader Ideologies
 ideology_moderate:0 "Moderado"
 ideology_moderate_desc:0 "#lore Este líder é considerado moderado em seu Grupo de Interesse, sem nenhuma ideologia em particular.#!"
 
 ideology_traditionalist:0 "Tradicionalista"
 ideology_traditionalist_desc:0 "#lore Este líder acredita em manter os costumes tradicionais, vendo-os como uma extensão das leis naturais. #!"

 ideology_traditionalist_minoritarian: "Tradicionalista minoritário"
 ideology_traditionalist_minoritarian_desc:0 "#lore Este líder acredita em manter os costumes tradicionais, vendo-os como uma extensão das leis naturais. Embora o seu país permaneça sob o domínio de uma religião diferente, opor-se-ão a impor a religião estatal à população. #!"

 ideology_atheist:1 "Niilista"
 ideology_atheist_desc:1 "#lore Este líder prioriza o questionamento e a derrubada da ordem social tradicionalista e das instituições a todo custo, buscando limpar o terreno para uma sociedade amplamente revolucionária. #!"

 ideology_republican_leader:0 "Republicano"
 ideology_republican_leader_desc:0 "#lore Este líder procura estabelecer uma república governada por funcionários eleitos. #!"

 ideology_radical:0 "Radical"
 ideology_radical_desc:0 "#lore Este líder se esforça por reformas liberais radicais avançando ideais democráticos. #!"

 ideology_abolitionist:0 "Abolicionista"
 ideology_abolitionist_desc:0 "#lore Este líder encontra a escravidão uma violação abominável dos direitos humanos e procura aboli-la do mundo. #!"

 ideology_slaver:0 "Escravo"
 ideology_slaver_desc:0 "#lore Este líder vê a escravidão como uma parte natural do seu modo de vida e opõe-se à sua abolição. #!"

 ideology_feminist:0 "Feminista"
 ideology_feminist_desc:0 "#lore Este líder sustenta que as mulheres são iguais aos homens e se esforça pela extensão de seus direitos como cidadãos.#!"
 
 ideology_reformer:0 "Reformador"
 ideology_reformer_desc:0 "#lore Este líder quer fazer algumas mudanças incrementais para tornar a sociedade apenas um pouco mais igual. Mas não muito.#!"

 ideology_pacifist:0 "Pacifista"
 ideology_pacifist_desc:0 "#lore Este líder acredita na não-violência como seu método e paz como seu objetivo.#!"

 ideology_jingoist_leader:0 "Jingoist"
 ideology_jingoist_leader_desc:0 "#lore Este líder defende uma política externa agressiva, enfatizando a disponibilidade para ir à guerra para avançar suas ambições. #!"

 ideology_royalist:0 "Realista"
 ideology_royalist_desc:0 "#lore As lealdades deste líder são para com a monarquia e seu legítimo governante.#!"
 
 ideology_social_democrat:0 "Socialdemocrata"
 ideology_social_democrat_desc:0 "#lore Este líder acredita em alcançar uma sociedade socialista através da reforma parlamentar. #!"

 ideology_communist:0 "Comunista"
 ideology_communist_desc:0 "#lore Este líder acredita na classe trabalhadora apoderando-se do poder político através de todos os meios necessários. #!"

 ideology_vanguardist:0 "Vanguardista"
 ideology_vanguardist_desc:0 "#lore Este líder acredita em alcançar uma sociedade socialista através de um partido de vanguarda de radicais dedicados. #!"

 ideology_fascist:0 "Fascista"
 ideology_fascist_desc:0 "#lore Este líder é um ultranacionalista que defende o reavivamento dos valores tradicionais e autoritários percebidos num contexto moderno. #!"

 ideology_anarchist:0 "Anarquista"
 ideology_anarchist_desc:0 "#lore Este líder busca a abolição da hierarquia, da autoridade e do estado, deixando que as pessoas se governem. #!"

 ideology_ethno_nationalist:0 "Ethno-Nationalist"
 ideology_ethno_nationalist_desc:0 "#lore Este líder acredita numa nação definida por motivos étnicos. #!"

 ideology_theocrat:0 "Theocrat"
 ideology_theocrat_desc:0 "#lore Este líder acredita em um estado gerido pela igreja de acordo com os valores doutrinais.#!"

 ideology_market_liberal:0 "Mercado Liberal"
 ideology_market_liberal_desc:0 "#lore Este líder acredita que a mão invisível do livre mercado deve ser a força orientadora da economia da nação."
 
 ideology_liberal_leader:0 "Liberais"
 ideology_liberal_leader_desc:0 "#lore Este líder prioriza a instituição da democracia e opõe-se à regra incontestável sobre a nação. #!"

  # Interest Group Ideologies

 ideology_paternalistic:0 "Paternalista"
 ideology_paternalistic_desc:0 "#lore Esse grupo tem pouca fé no povo tentando governar a si mesmo, acreditando que precisa da orientação de uma aristocracia tradicional.#!"
  
 ideology_patriarchal:0 "Patriarcal"
 ideology_patriarchal_desc:0 "#lore Esse grupo acredita que os homens devem ter autoridade política e que as mulheres devem obedecer seus pais e maridos.#!"
   
 ideology_republican:0 "Republicano"
 ideology_republican_desc:0 "#lore Este grupo acredita que os melhores líderes são eleitos por voto público e apoia uma forma de governo republicano.#!"
  
 ideology_populist:0 "Populista"
 ideology_populist_desc:0 "#lore Esse grupo acredita na governança do povo e busca expandir a franquia para todas as classes sociais.#!"
  
 ideology_stratocratic:0 "Estratocrática"
 ideology_stratocratic_desc:0 "#lore Esse grupo favorece a manutenção de uma hierarquia na sociedade por meio de formas tradicionais de tributação e relações de trabalho.#!"
  
 ideology_oligarchic:0 "Oligárquico"
 ideology_oligarchic_desc:0 "#lore Esse grupo favorece o poder monopolizante nas mãos de um estado secular controlado por oligarquias locais.#!"

 ideology_laissez_faire:0 "Laissez-Faire"
 ideology_laissez_faire_desc:0 "#lore Esse grupo acredita no livre fluxo de comércio e forças de trabalho, favorecendo o julgamento dos mercados sobre o dos governos.#!"
  
 ideology_individualist:0 "Individualista"
 ideology_individualist_desc:0 "#lore Esse grupo acredita que cada pessoa é responsável por seu próprio destino e se opõe a programas do governo para fornecer serviços que podem ser pagos pelo indivíduo.#!"
  
 ideology_pious:0 "Pio"
 ideology_pious_desc:0 "#lore Esse grupo acredita que os princípios religiosos são verdades morais fundamentais e que devem permear toda a sociedade.#!"
  
 ideology_particularist:0 "Particularista"
 ideology_particularist_desc:0 "#lore Esse grupo quer autonomia local em seu trabalho, livre de provisões feudais de servidão contratada.#!"
  
 ideology_isolationist:0 "Isolacionista"
 ideology_isolationist_desc:0 "#lore Este grupo quer que o estado se concentre em assuntos domésticos, opondo-se às ambições de expandir-se para terras estrangeiras, bem como imigração deles.#!"
  
 ideology_moralist:0 "Moralist"
 ideology_moralist_desc:1 "#lore Este grupo tem uma forte crença em uma ordem moral religiosa e vê diversidade de opinião como uma ameaça a essa ordem.#!"
  
 ideology_jingoist:0 "Jingoist"
 ideology_jingoist_desc:0 "#lore Este grupo acredita em uma política externa agressiva e manter um exército para apoiá-lo.#!"

 ideology_loyalist:0 "Leyalist"
 ideology_loyalist_desc:0 "#lore Este grupo acredita que cada cidadão deve pagar suas dívidas para financiar as funções vitais do estado.#!"
 
 ideology_meritocratic:0 "Meritocrático"
 ideology_meritocratic_desc:0 "#lore Esse grupo acredita que o sucesso é ganho e que aqueles que o alcançaram merecem a responsabilidade e riqueza que acompanham.#!"
   
 ideology_patriotic:0 "Patriótico"
 ideology_patriotic_desc:0 "#lore Este grupo é ferozmente dedicado ao seu país e quer medidas duras contra aqueles que iriam espalhar dissidência.#!"
  
 ideology_liberal:0 "Liberais"
 ideology_liberal_desc:0 "#lore Este grupo considera a liberdade e a igualdade jurídica como valores importantes a serem salvaguardados.#!"
  
 ideology_anti_clerical:0 "Anticlerical"
 ideology_anti_clerical_desc:1 "#lore Este grupo opõe-se à influência da religião organizada no sistema político e educacional. Eles acreditam que as mentes racionais devem estar na vanguarda da governança.#!"
  
 ideology_proletarian:0 "Proletário"
 ideology_proletarian_desc:0 "#lore Este grupo vê a política através da lente da luta de classes e dos lados com os trabalhadores neste conflito.#!"
  
 ideology_egalitarian:0 "Igualitário"
 ideology_egalitarian_desc:0 "#lore Este grupo acredita que o tratamento igual e humano das pessoas deve ser uma pedra angular da política política.#!"
   
 ideology_anti_slavery:0 "Anti- Slavery"
 ideology_anti_slavery_desc:0 "#lore Este grupo abomina a escravidão e a vê como uma característica de um passado bárbaro.#!"
 
 ideology_pro_slavery:0 "Pró- Escravidão"
 ideology_pro_slavery_desc:0 "#lore Esse grupo vê a escravidão como uma parte necessária de uma sociedade em bom funcionamento.#!"
  
 ideology_reactionary:0 "Reacionário"
 ideology_reactionary_desc:0 "#lore Este grupo é nostálgico para um passado, real ou imaginado, onde apenas reis governavam uma sociedade uniforme."
 
 ideology_plutocratic:0 "Plutocrática"
 ideology_plutocratic_desc:0 "#lore Este grupo acredita que os ricos provaram seu valor como tomadores de decisão e formam uma elite intelectual bem adequada para definir o curso da sociedade.#!"

 ideology_agrarian:0 "Agrário"
 ideology_agrarian_desc:0 "#lore Esse grupo acredita que o foco da política econômica deve ser na agricultura e nos interesses dos agricultores.#!"

 ideology_corporatist: "Corporatista"
 ideology_corporatist_desc: "#lore Este grupo acredita na resolução de conflitos entre classes através da aplicação de princípios religiosos.#!"

 ideology_corporatist_leader: "Corporatista"
 ideology_corporatist_leader_desc: "#lore Este líder acredita na resolução do conflito de classes através de concessões da classe alta e colaboração entre diferentes grupos sociais.#!"

 ideology_agrarian_jeffersonian:0 "Jeffersonian"
 ideology_agrarian_jeffersonian_desc:0 "#lore Esse grupo acredita que a classe de pequenos agricultores forma a fundação do país, apoiando o agarismo como base para uma sociedade livre.#!"

  # flavor ideologies

 ideology_republican_paternalistic:0 "Elitista"
 ideology_republican_paternalistic_desc:0 "#lore Este grupo favorece o governo da elite fundiária, mas ainda suporta uma forma republicana de governo.#!"

 ideology_scholar_paternalistic:0 "Scholar-Gentry"
 ideology_scholar_paternalistic_desc:0 "#lore Este grupo prefere ver o país governado por um monarca aconselhado pelos sábios e educados.#!"

 ideology_junker_paternalistic:0 "Junker"
 ideology_junker_paternalistic_desc:0 "#lore Este grupo acredita que a nobreza fundiária é mais adequada para levar o país ao seu futuro.#!"

 ideology_papal_paternalistic:1 "Baronesa"
 ideology_papal_paternalistic_desc:0 "#lore Este grupo apoia a autoridade do Papa e a hierarquia tradicional da Santa Sé.#!"

 ideology_confucian:0 "Confuciano"
 ideology_confucian_desc:0 "#lore Este grupo acredita nos ensinamentos de Confúcio, apoiando uma ordem social que eles veem como enraizada nas leis do Céu.#!"

 ideology_bakufu:0 "Bakufu"
 ideology_bakufu_desc:0 "#lore Este grupo apoia o xogunato e acredita que o poder pertence às mãos da classe guerreira.#!"
 
 ideology_shinto_moralist:0 "Xintoísmo"
 ideology_shinto_moralist_desc:0 "#lore Este grupo acredita na divindade do Imperador e liga essa crença à antiga adoração de deuses e espíritos."

 ideology_caudillismo:0 "Caudilismo"
 ideology_caudillismo_desc:0 "#lore Este grupo tende a apoiar líderes fortes com antecedentes militares sobre o Estado de direito constitucional.#!"

 ideology_heavenly_kingdom_theocratic:0 "Adorador de Deus"
 ideology_heavenly_kingdom_theocratic_desc:0 "#lore Este grupo apoia a ideia de que todas as pessoas se tornam filhos e filhas de Deus quando resgatadas por Cristo, e favorece uma forma teocrática de governo."

 ideology_papal_moralist:0 "Pontifica"
 ideology_papal_moralist_desc:0 "#lore Este grupo tem uma forte devoção à manutenção dos poderes temporais e eclesiásticos da Igreja Católica.#!"

 ideology_liberal_modern: "Liberais"
 ideology_liberal_modern_desc: "#lore Este grupo considera a liberdade e a igualdade jurídica como valores importantes a serem salvaguardados.#!"

 ideology_egalitarian_modern: "Igualitário"
 ideology_egalitarian_modern_desc: "#lore Este grupo acredita que o tratamento igual e humano das pessoas deve ser uma pedra angular da política política.#!"

 ideology_enclavist: "Enclavista"
 ideology_enclavist_desc: "#lore Os interesses desse grupo estão em preservar sua posição de classe dominante colonial, afastando-se de seus sujeitos e preservando seu poder por meio de um sistema burocrático intrincado e inexplicável.#!"

 ideology_malthusian: "Malthusian"
 ideology_malthusian_desc: "#lore Esse grupo subscreve as teorias econômicas estabelecidas por Thomas Malthus, acreditando em qualquer esforço para aliviar a pobreza para se autodestruir devido ao consequente crescimento populacional.#!"

 liberal_and_egalitarian_amended_tt: "As posições [GetIdeology('ideology_liberal').GetName] e [GetIdeology('ideology_egalitarian').GetName] [Concept('concept_ideology','$concept_ideologies$')]' sobre o $lawgroup_rights_of_women$ irão mudar"

 # Movement Ideologies

 ideology_royalist_movement: "Realista"
 ideology_royalist_movement_desc: "#lore As lealdades deste grupo são à monarquia e ao seu legítimo governante.#!"

 ideology_absolutist_movement: "Absolutista"
 ideology_absolutist_movement_desc: "#lore Esse grupo é leal à instituição da monarquia, e apoia a investi-la com poder absoluto.#!"

 ideology_anarchist_movement: "Anarquista"
 ideology_anarchist_movement_desc: "#lore Esse grupo busca a abolição da hierarquia, da autoridade e do Estado, deixando que as pessoas se governem. #!"

 ideology_communist_movement: "Comunista"
 ideology_communist_movement_desc: "#lore Este grupo acredita na classe trabalhadora apoderando-se do poder político através de todos os meios necessários. #!"

 ideology_vanguardist_movement: "Vanguardista"
 ideology_vanguardist_movement_desc: "#lore Este grupo acredita em alcançar uma sociedade socialista através de um partido de vanguarda de radicais dedicados. #!"

 ideology_radical_movement: "Radical"
 ideology_radical_movement_desc:1 "#lore Este grupo esforça-se por reformas liberais radicais avançando ideais democráticos. #!"

 ideology_liberal_movement: "Liberais"
 ideology_liberal_movement_desc: "#lore Este grupo valoriza a instituição da democracia e apoia a garantia das liberdades essenciais para os cidadãos. #!"

 ideology_pluralist_movement_1: "Pluralista"
 ideology_pluralist_movement_1_desc: "#lore Este grupo deseja salvaguardar as suas tradições culturais, identidade e linguagem. #!"

 ideology_pluralist_movement_2: "$ideology_pluralist_movement_1$"
 ideology_pluralist_movement_2_desc: "$ideology_pluralist_movement_1_desc$"

 ideology_pluralist_movement_3: "$ideology_pluralist_movement_1$"
 ideology_pluralist_movement_3_desc: "$ideology_pluralist_movement_1_desc$"

 ideology_pluralist_movement_4: "$ideology_pluralist_movement_1$"
 ideology_pluralist_movement_4_desc: "$ideology_pluralist_movement_1_desc$"

  # Government Principles group
 lawgroup_governance_principles:0 "Princípios de governação"
 lawgroup_governance_principles_desc:0 "Os princípios fundamentais e a autoridade pela qual o seu país é governado. Determina quem é o Chefe de Estado."
  
 law_chiefdom:0 "Principalidade"
 law_chiefdom_desc:0 "Um sistema político hierárquico pré-industrial baseado em parentesco, com um senhor da guerra ou ancião de uma família proeminente na cabeça. É incapaz de controlar eficientemente os estados inteiros."
 law_monarchy:0 "Monarquia"
 law_monarchy_desc:0 "Uma forma de governança onde uma dinastia aristocrática representa a identidade nacional do país e cede poderes executivos ao chefe real da dinastia."
 law_presidential_republic:0 "República Presidencial"
 law_presidential_republic_desc:0 "Um sistema político onde o poder é exercido pelo povo e seus representantes eleitos. As repúblicas têm um chefe de Estado eleito ou nomeado $RULER_TITLE_PRESIDENT$."
 law_parliamentary_republic:0 "República Parlamentar"
 law_parliamentary_republic_desc:0 "Um sistema político onde o poder é exercido pelo povo e seus representantes eleitos. O líder do legislativo atua como Chefe de Estado e é referido como $RULER_TITLE_CHANCELLOR$."
 law_theocracy:0 "Teocracia"
 law_theocracy_desc:0 "O governo é governado por um clero e sua interpretação da escritura sagrada. O Chefe de Estado é nominalmente a pessoa de adoração, embora na prática um representante mundano selecionado por mérito, status, ou nascimento."
 law_council_republic:0 "República do Conselho"
 law_council_republic_desc:0 "Um sistema político onde os trabalhadores elegem delegados para conselhos locais. Alarga conceitos de organização do local de trabalho à governança geral."
 law_corporate_state:0 "Estado da empresa"
 law_corporate_state_desc:0 "Um sistema político baseado na colaboração institucionalizada entre grupos corporativos oficialmente reconhecidos. O estado serve como fórum de negociação entre diferentes classes sociais."
 law_corporate_state_1:0 "Estado da empresa"
 law_corporate_state_1_desc:0 "Um sistema político baseado na colaboração institucionalizada entre grupos corporativos oficialmente reconhecidos. O estado serve como fórum de negociação entre diferentes classes sociais."
  # Free speech group
 lawgroup_free_speech:0 "Discurso Livre"
 lawgroup_free_speech_desc:0 "Leis que regulam a liberdade de expressão e o direito à assembleia pública."
  
 law_outlawed_dissent:0 "Proibido Dissidência"
 law_outlawed_dissent_desc:0 "Criticar o governo é considerado traição e ilegal."
 law_censorship:0 "Censura"
 law_censorship_desc:0 "Há censura ativa da imprensa e nenhum direito garantido de montagem."
 law_right_of_assembly:0 "Direito de Assembleia"
 law_right_of_assembly_desc:0 "Os cidadãos gozam do direito à assembleia pública."
 law_protected_speech:0 "Discurso Protegido"
 law_protected_speech_desc:0 "A protecção da liberdade de expressão está consagrada na lei."
  
  # Army Model group
 lawgroup_army_model:0 "Modelo do Exército"
 lawgroup_army_model_desc:0 "Como o seu exército é organizado e regulamentado."
  
 law_peasant_levies:0 "Levias camponesas"
 law_peasant_levies_desc:0 "A força principal do exército vem da infantaria recrutada com zero para o treinamento básico."
 law_national_militia:0 "Milícia Nacional"
 law_national_militia_desc:0 "O exército permanente é pequeno, mas as milícias locais podem ser ativadas para defender suas casas."
 law_mass_conscription:0 "Conscrição em Massa"
 law_mass_conscription_desc:0 "Grande número de recrutas de infantaria podem ser ativados conforme necessário para complementar o exército profissional."
 law_professional_army:0 "Exército Profissional"
 law_professional_army_desc:0 "O exército consiste em regulares profissionais bem treinados."
  
  # Distribution of Power group
 lawgroup_distribution_of_power:0 "Distribuição do Poder"
 lawgroup_distribution_of_power_desc:0 "Como o poder político é distribuído. Determina perante quem o Chefe de Estado é responsável."
  
 law_autocracy:0 "Autocracia"
 law_autocracy_desc:0 "O poder do Chefe de Estado é absoluto e são responsabilizados por nenhum poder terreno."
 law_oligarchy:0 "Oligarquia"
 law_oligarchy_desc:1 "O Chefe de Estado partilha o poder e a responsabilidade com um pequeno grupo de indivíduos poderosos e não eleitos."
 law_landed_voting:0 "Votação por terra"
 law_landed_voting_desc:0 "Aqueles que possuem terras ou bens de capital recebem um voto."
 law_wealth_voting:0 "Votação de Riqueza"
 law_wealth_voting_desc:1 "Os cidadãos ricos recebem uma votação. Homens mais ricos recebem mais votos."
 law_census_voting:0 "Sufrágio do Censo"
 law_census_voting_desc:0 "Literar homens de estatuto particular é dado um voto."
 law_universal_suffrage:0 "Sufrágio Universal"
 law_universal_suffrage_desc:0 "Todos os adultos têm um voto igual."
 law_elder_council:0 "Conselho Ancião"
 law_elder_council_desc:0 "Os homens mais venerados têm uma palavra a dizer sobre o governo da nação."
 law_anarchy:0 "Anarquia"
 law_anarchy_desc:1 "As comunidades locais governam seus próprios assuntos e enviam representantes para cumprir condições limitadas em conselhos cooperativos maiores. Sem hierarquias formais, a autoridade central é difícil de exercer."
 law_single_party_state: "Estado de partido único"
 law_single_party_state_desc: "O Estado é governado por um único partido político legal, que tem um monopólio sobre toda a atividade política dentro da nação."
 ruler_in_party_tt: "O [concept_ruler] desta nação é um membro de um [concept_interest_group] que tem um político ativo [concept_party]"
 sps_no_party_tt: "Esta nação não tem [Concept('concept_party', 'Political Parties')] ativo"
 sps_government_reshuffle_tt: "[concept_government] composição será atualizada com os membros da única legal [concept_party]"
  
  # Voting System group
 law_first_past_the_post:0 "Primeiro Passado O Post"
 law_first_past_the_post_desc:0 "Também conhecido como Vencedor Leva Tudo, este sistema elege o único candidato que ganha o maior número de assentos em sub-eleições regionais. Tende a criar governos monopartidários com mandatos fortes, mas é vulnerável ao gerrymandering."
 law_proportional_representation:0 "Representação proporcional"
 law_proportional_representation_desc:0 "Este sistema distribui lugares parlamentares proporcionalmente ao número de votos expressos. Tende a criar governos de coalizão multipartidários, onde o compromisso é fundamental para fazer qualquer coisa."
  
  # Workplace Safety group
 lawgroup_labor_rights:0 "Direitos do Trabalho"
 lawgroup_labor_rights_desc:0 "Os direitos dos trabalhadores."
  
 law_serfdom:0 "Serfão"
 law_serfdom_desc:0 "Os camponeses estão ligados à sua terra e devem realizar trabalho para seus mestres feudais."
 law_no_workers_rights:0 "Sem Direitos dos Trabalhadores"
 law_no_workers_rights_desc:0 "Os trabalhadores não têm direitos trabalhistas específicos garantidos pelo Estado."
 law_regulatory_bodies:0 "Órgãos Reguladores"
 law_regulatory_bodies_desc:0 "Foram criadas instituições governamentais para regular os excessos dos empregadores."
 law_worker_protections:0 "Protecção dos trabalhadores"
 law_worker_protections_desc:0 "Os trabalhadores gozam de amplas proteções consagradas na lei."
  
  # Children's Rights group
 lawgroup_childrens_rights:0 "Direitos das crianças"
 lawgroup_childrens_rights_desc:0 "Os direitos e proteções concedidos às crianças."
  
 law_child_labor_allowed:0 "Trabalho infantil permitido"
 law_child_labor_allowed_desc:0 "Não são impostas restrições legais sobre onde as crianças podem trabalhar."
 law_restricted_child_labor:0 "Trabalho infantil restrito"
 law_restricted_child_labor_desc:0 "Nenhuma criança é permitida no chão da fábrica."
 law_compulsory_primary_school:0 "Escola primária obrigatória"
 law_compulsory_primary_school_desc:0 "Todas as crianças devem frequentar vários anos de escola primária durante os quais são proibidas de trabalhar."
  
  # Slavery group
 lawgroup_slavery:0 "Escravidão"
 lawgroup_slavery_desc:0 "Pessoas como propriedade."
  
 law_slavery_banned:0 "Proibida a escravidão"
 law_slavery_banned_desc:0 "Nenhum ser humano pode pertencer a outro."
 law_debt_slavery:0 "Escravidão por Dívida"
 law_debt_slavery_desc:0 "Aqueles que não conseguem saldar as suas dívidas perdem a sua pessoa como propriedade do seu credor."
 law_slave_trade:0 "Comércio de escravos"
 law_slave_trade_desc:0 "A demanda por mão-de-obra barata é cumprida através de um comércio desumanizante em corpos estrangeiros."
 law_legacy_slavery:0 "Escravidão Legado"
 law_legacy_slavery_desc:0 "Como um compromisso entre abolicionistas e escravistas, a instituição da escravidão pode continuar enquanto não se expandir."
  
  # Church and State group
 lawgroup_church_and_state:0 "Igreja e Estado"
 lawgroup_church_and_state_desc:0 "A relação entre governadores físicos e espirituais."
  
 law_state_religion:0 "Religião do Estado"
 law_state_religion_desc:0 "A igreja é um órgão oficial do estado. Todas as religiões minoritárias são discriminadas."
 law_freedom_of_conscience:0 "Liberdade de consciência"
 law_freedom_of_conscience_desc:0 "O estado tem uma religião oficial do estado, mas as pessoas podem escolher o que acreditar. Apenas as religiões particularmente exóticas são discriminadas."
 law_total_separation:0 "Separação total"
 law_total_separation_desc:0 "Nenhuma igreja ou fé pode interferir nas funções governamentais. Nenhuma religião pode ser discriminada."
 law_atheist_state:0 "Estado ateu"
 law_atheist_state_desc:0 "Pregar a crença religiosa é proibido, e praticar a pessoa é desaprovado. Todas as religiões são discriminadas."
  
   # Citizenship group
 lawgroup_citizenship:0 "Cidadania"
 lawgroup_citizenship_desc:0 "Alargar os direitos da cidadania."
  
 law_ethnostate:0 "Etnostato"
 law_ethnostate_desc:1 "O Estado considera-se indissociavelmente ligado a uma determinada etnia, com outras etnias barradas da cidadania. Todas as culturas estrangeiras são discriminadas."
 law_national_supremacy:0 "Supremacia Nacional"
 law_national_supremacy_desc:1 "O Estado define seus cidadãos pelo cumprimento de uma determinada identidade nacional, que é considerada suprema sobre todos os outros. As culturas estrangeiras são discriminadas, a menos que compartilhem tanto o património como a língua (ou outros costumes)."
 law_racial_segregation:0 "Segregação Racial"
 law_racial_segregation_desc:1 "O Estado considera os direitos de cidadania vinculados ao conceito de patrimônio racial compartilhado. As culturas estrangeiras de diferentes patrimónios são discriminadas."
 law_cultural_exclusion:0 "Exclusão cultural"
 law_cultural_exclusion_desc:1 "O Estado oferece direitos de cidadania a pessoas de todas as identidades culturais, considerando que uma determinada identidade oficial é primordial. Culturas estrangeiras sem nada em comum com as suas culturas primárias são discriminadas."
 law_multicultural:0 "Multiculturalismo"
 law_multicultural_desc:1 "O Estado defende direitos iguais de cidadania para pessoas de todas as identidades culturais, e não faz nenhuma tentativa de defender oficialmente uma determinada cultura sobre outras. Nenhuma cultura é discriminada."
 law_subjecthood: "Subjetividade"
 law_subjecthood_desc: "O Estado define seu povo principalmente como sujeito de um soberano, fazendo pouco esforço para encorajar qualquer nacionalidade oficial. As culturas são largamente deixadas à sua própria disposição dentro das suas próprias comunidades."

  # Caste Hegemony, a Social Stratification law group
 lawgroup_caste_hegemony: "Hegemonia de castas"
 lawgroup_caste_hegemony_desc: "Eliminação dos direitos entre os membros da sociedade baseada no sistema britânico de castas indianas."
 law_hindu_caste_enforced: "Sistema de castas"
 law_hindu_caste_enforced_desc: "A hierarquia das castas é legalmente aplicada e impede a mobilidade socioeconómica ascendente."
 law_hindu_caste_codified: "Sistema de castas codificado"
 law_hindu_caste_codified_desc: "A hierarquia das castas é reconhecida e utilizada para restringir a mobilidade socioeconómica ascendente."
 law_hindu_caste_not_enforced: "Casta Não Forçada"
 law_hindu_caste_not_enforced_desc: "A mobilidade socioeconómica com base na casta não é juridicamente limitada, mas a discriminação pode continuar a persistir."
 law_affirmative_action: "Acção Afirmativa"
 law_affirmative_action_desc: "Medidas ativas para criar uma situação socioeconômica equitativa, priorizando grupos previamente marginalizados."
  
  # Economic System group
 lawgroup_economic_system:0 "Sistema Económico"
 lawgroup_economic_system_desc:0 "Os princípios fundamentais da sua economia."

 law_traditionalism:0 "Tradicionalismo"
 law_traditionalism_desc:0 "Economia de subsistência pré-industrial com pouco controle central."
 law_agrarianism:0 "Agrarianismo"
 law_agrarianism_desc:0 "Uma economia rural que enfatiza o desenvolvimento agrícola e a comunidade."
 law_cooperative_ownership:0 "Propriedade Cooperativa"
 law_cooperative_ownership_desc:0 "Um sistema econômico baseado no conceito de propriedade social, onde a produção excedentária é distribuída mais uniformemente entre os trabalhadores."
 law_command_economy:0 "Economia de Comandos"
 law_command_economy_desc:0 "Uma economia intervencionista voltada para dentro onde o governo gerencia diretamente a maioria dos aspectos da produção."
 law_laissez_faire:0 "Laissez-Faire"
 law_laissez_faire_desc:0 "Uma economia liberal fundada nos princípios da vantagem comparativa e que menos intervenções governamentais significam maior crescimento"
 law_interventionism:0 "Intervencionismo"
 law_interventionism_desc:0 "Para garantir a estabilidade da nossa nação, o governo deve conter os piores excessos de empresas privadas."

 # Trade Policy group
 lawgroup_trade_policy:0 "Política comercial"
 lawgroup_trade_policy_desc:0 "Leis que regem o comércio e o intercâmbio de mercadorias através das fronteiras."
 
 law_free_trade:0 "Livre Comércio"
 law_free_trade_desc:1 "A livre troca de bens não deve ser impedida, pois o comércio é em benefício de todos."
 law_protectionism:0 "Protecionismo"
 law_protectionism_desc:0 "As nossas indústrias devem ser protegidas contra as depredações dos actores do mercado estrangeiro."
 law_isolationism:0 "Isolacionismo"
 law_isolationism_desc:0 "Uma economia focada em suprir internamente as necessidades da nação, mantendo-se fora dos assuntos dos outros."
 law_mercantilism:0 "Focado na exportação"
 law_mercantilism_desc:0 "Uma economia orientada para as exportações com ênfase em manter uma conta corrente positiva e competir com outras nações."

  # Taxation Group
 lawgroup_taxation:0 "Tributação"
 lawgroup_taxation_desc:0 "Como o Estado aumenta as receitas tributando seus cidadãos."
 law_consumption_based_taxation:0 "Tributação baseada no consumo"
 law_consumption_based_taxation_desc:0 "Um sistema fiscal onde não há renda direta ou impostos per capita e, em vez disso, a receita é aumentada através da tributação do consumo de bens."
 law_land_based_taxation:0 "Tributação baseada em terrenos"
 law_land_based_taxation_desc:0 "Uma forma tradicional de tributação fundiária, coletada principalmente do campesinato."
 law_per_capita_based_taxation:0 "Tributação Regressiva"
 law_per_capita_based_taxation_desc:0 "Um sistema fiscal que desproporcionalmente tributa os pobres através de uma combinação de renda e impostos per capita."
 law_proportional_taxation:0 "Tributação proporcional"
 law_proportional_taxation_desc:0 "Um sistema fiscal baseado principalmente no rendimento que tenta garantir que todos pagam uma parte aproximadamente igual do seu rendimento ao Estado."
 law_graduated_taxation:0 "Tributação Progressiva"
 law_graduated_taxation_desc:0 "Um sistema fiscal que visa colocar o ónus da tributação principalmente sobre o bem-estar através de elevados impostos Dividendos."
  
  # Education System group
 lawgroup_education_system:0 "Sistema de Educação"
 lawgroup_education_system_desc:0 "Para quando as crianças são feitas com limpeza de chaminés tarefas."
  
 law_no_schools:0 "Sem Escolas"
 law_no_schools_desc:0 "A educação é responsabilidade dos pais. Apenas os cidadãos mais descontraídos aprendem a ler e a escrever."
 law_religious_schools:0 "Escolas Religiosas"
 law_religious_schools_desc:0 "Deixar a igreja cuidar da educação estatal garante uma população leal e moralmente saudável."
 law_private_schools:0 "Escolas particulares"
 law_private_schools_desc:0 "A educação é melhor deixada aos interesses privados que podem garantir a liberdade de escolha na sua educação."
 law_public_schools:0 "Escolas Públicas"
 law_public_schools_desc:0 "A escolarização é da responsabilidade do Estado, devendo ser padronizada e igualmente acessível a todos."
  
  # Health System group
 lawgroup_health_system:0 "Sistema de Saúde"
 lawgroup_health_system_desc:1 "Leis sobre o envolvimento do governo (ou sua falta) na prestação de cuidados de saúde aos seus cidadãos."
  
 law_no_health_system:0 "Nenhum Sistema de Saúde"
 law_no_health_system_desc:1 "O governo não financia nenhum sistema de saúde."
 law_charitable_health_system:0 "Hospitais de Caridade"
 law_charitable_health_system_desc:0 "Organizações caritativas — muitas vezes religiosas — fornecem alguma ajuda a quem está doente ou morrendo, na medida em que são capazes."
 law_private_health_insurance:0 "Seguro de saúde privado"
 law_private_health_insurance_desc:0 "A saúde da população é gerenciada por meio de um sistema de hospitais privados pagos por meio de programas de plano de saúde privado, garantindo o bem-estar daqueles que podem pagá-lo com impacto mínimo no tesouro do governo."
 law_public_health_insurance:0 "Seguro de Saúde Pública"
 law_public_health_insurance_desc:0 "O governo fornece um programa de seguro de saúde financiado publicamente garantindo o acesso igual a todos aos cuidados."
 
  # Welfare group
 lawgroup_welfare:0 "Assistência social"
 lawgroup_welfare_desc:0 "Assistência do Governo aos desfavorecidos."
  
 law_no_social_security:0 "Sem Segurança Social"
 law_no_social_security_desc:0 "Não é papel do Estado prover àqueles que não podem se sustentar."
 law_poor_laws:0 "Leis Pobres"
 law_poor_laws_desc:0 "Tirar os vagabundos e vagabundos das nossas ruas e entrar nas casas de trabalho vale o custo."
 law_wage_subsidies:1 "Subsídios salariais"
 law_wage_subsidies_desc:1 "Todos os que estão dispostos a trabalhar têm o direito de comer. Nenhum homem deve faltar os meios para sustentar sua família."
 law_old_age_pension:0 "Pensão de velhice"
 law_old_age_pension_desc:0 "Existe um limite prático para a idade em que a nossa mão-de-obra já não é eficiente e o seu bem-estar subsequente tem de estar sob a alçada do governo."
 law_disability_insurance:0 "Seguro de invalidez"
 law_disability_insurance_desc:0 "É responsabilidade do Estado cuidar daqueles que, sem culpa própria, se encontram incapazes de trabalhar."
  
  # Rights of Women group
 lawgroup_rights_of_women:0 "Direitos das mulheres"
 lawgroup_rights_of_women_desc:0 "Os regulamentos legais do sexo mais justo."
  
 law_no_womens_rights:0 "Guardião Jurídico"
 law_no_womens_rights_desc:0 "As mulheres estão legalmente sob a tutela dos homens e gozam de muito poucos direitos."
 law_women_own_property:0 "Mulheres Apropriadas"
 law_women_own_property_desc:0 "Herdou ou ganhou, até mesmo as mulheres têm o direito e o dever de possuir e valorizar seus bens."
 law_women_in_the_workplace:0 "Mulheres no local de trabalho"
 law_women_in_the_workplace_desc:0 "Como poderemos manter os fornos de progresso em chamas com apenas metade da força de trabalho potencial?"
 law_womens_suffrage:0 "Sufrágio das Mulheres"
 law_womens_suffrage_desc:0 "No ajustamento da nova ordem das coisas, nós, mulheres, exigimos uma voz igual; nada menos aceitaremos."
  
  # Policing
 lawgroup_policing:0 "Policiamento"
 lawgroup_policing_desc:0 "As prioridades da força policial nacional."

 law_no_police:0 "Sem polícia"
 law_no_police_desc:0 "Qualquer tipo de polícia estruturada não existe neste país."
 law_local_police:0 "Polícia local"
 law_local_police_desc:0 "Este país tem forças policiais locais operando."
 law_dedicated_police:0 "Força policial dedicada"
 law_dedicated_police_desc:0 "Este país tem uma força policial dedicada com treinamento padronizado."
 law_militarized_police:0 "Força Policial Militarizada"
 law_militarized_police_desc:0 "Ao dar à sua força policial equipamento militar e treinamento militar, sua eficácia na realização de sua vontade aumenta."
  
  # Bureaucracy
 lawgroup_bureaucracy:0 "Burocracia"
 lawgroup_bureaucracy_desc:0 "Como o seu país é administrado."

 law_hereditary_bureaucrats:0 "Burocratas hereditários"
 law_hereditary_bureaucrats_desc:0 "Os burocratas mantêm sua posição através da herança tradicional, passando as responsabilidades para seus filhos."
 law_appointed_bureaucrats:0 "Burocratas nomeados"
 law_appointed_bureaucrats_desc:0 "Os burocratas são nomeados pelos governantes para servir os melhores interesses do país em troca de salários elevados."
 law_meritocratic_bureaucracy:0 "Burocracia meritocrática"
 law_meritocratic_bureaucracy_desc:0 "Os burocratas disputam posições de poder através do mérito. Com o tempo, isso cria enormes administrações byzantinas."
 law_elected_bureaucrats:0 "Burocratas eleitos"
 law_elected_bureaucrats_desc:0 "Os governadores locais são eleitos pelos seus eleitores, descentralizando o poder, tornando os cidadãos mais fáceis de gerir."
  
  # Colonization
 lawgroup_colonization:0 "Colonização"
 lawgroup_colonization_desc:0 "Sua posição sobre estabelecer colônias para suplantar e conquistar [concept_decentralized_nation]."
  
 law_no_colonial_affairs:0 "Sem Assuntos Coloniais"
 law_no_colonial_affairs_desc:0 "O país não se envolve em nenhum tipo formal de colonização e não pode estabelecer colônias."
 law_colonial_resettlement:0 "Reinstalação Colonial"
 law_colonial_resettlement_desc:0 "As colônias estão estabelecidas para fornecer terras aos colonos dos estados incorporados do país."
 law_colonial_exploitation:0 "Exploração Colonial"
 law_colonial_exploitation_desc:0 "As colônias são estabelecidas para explorar a área por seus recursos naturais e mão-de-obra barata."
  
  # Internal Security
 lawgroup_internal_security:0 "Segurança Interna"
 lawgroup_internal_security_desc:0 "Manter os seus próprios assuntos em ordem."
  
 law_no_home_affairs:0 "Sem Assuntos Internos"
 law_no_home_affairs_desc:0 "O Estado não faz nenhuma tentativa especial de pôr fim a distúrbios e revoltas."
 law_national_guard:0 "Guarda Nacional"
 law_national_guard_desc:0 "O estado pode usar a força militar para suprimir a agitação doméstica."
 law_secret_police:0 "Polícia Secreta"
 law_secret_police_desc:0 "A polícia secreta mantém perto de elementos radicais e dissidentes."
 law_guaranteed_liberties:0 "Liberdades garantidas"
 law_guaranteed_liberties_desc:1 "O Departamento de Assuntos Internos do Estado está focado apenas em lidar com as queixas dos cidadãos, e é proibido de investigar ou prendê-los sem a devida causa."
  
  # Migration
 lawgroup_migration:0 "Migração"
 lawgroup_migration_desc:0 "Controlando o fluxo de pessoas."
  
 law_no_migration_controls:0 "Sem controles de migração"
 law_no_migration_controls_desc:0 "O país não faz nenhuma tentativa de controlar o movimento através de suas fronteiras."
 law_migration_controls:0 "Controlos das Migrações"
 law_migration_controls_desc:0 "Só pessoas de culturas e religiões não discriminadas podem migrar para dentro ou para fora do país."
 law_closed_borders:0 "Contornos Fechados"
 law_closed_borders_desc:0 "Nenhuma migração dentro ou fora do país é permitida."

 liberate_slaves_tt:0 "Todos [GetPopType('slaves').GetName] serão libertados"
 enslave_discriminated_farm_workers_tt:0 "Todos $laborers$ com baixo [concept_acceptance] trabalhando em fazendas, fazendas e plantações em ex-Estados Escravos serão [Concept('concept_slavery', '$concept_enslaved$')]."
 
 enact_law_radical_leftist_government_warning_desc:0 "@warning! A acção deste [concept_law] pode causar [Concept('concept_country', '$concept_countries$')] sem uma forma semelhante de $lawgroup_governance_principles$ tornar-se agressivo contra nós."
 enact_law_radical_leftist_economy_warning_desc:0 "@warning! A acção deste [concept_law] pode causar [Concept('concept_country', '$concept_countries$')] sem uma forma semelhante de $lawgroup_economic_system$ tornar-se agressivo contra nós."

 # Labour Associations
 lawgroup_labour_associations: "Associações Laborais"
 lawgroup_labour_associations_desc: "Regulamentos aplicados às associações de trabalhadores e artesãos."

 law_guild_system: "Sistema Guild"
 law_guild_system_desc: "Um sistema em que a elegibilidade para o emprego em determinados domínios depende da adesão a uma guilda formalizada de artesanato ou de comerciantes."
 law_combination_acts: "Atos de Combinação"
 law_combination_acts_desc: "A formação de associações laborais de qualquer tipo é proibida por lei."
 law_anti_strike_laws: "Leis Anti-Strike"
 law_anti_strike_laws_desc: "Enquanto a formação de associações de trabalho é permitida, greves e certas formas de negociação coletiva são proibidas."
 law_right_to_associate: "Direito de Associar"
 law_right_to_associate_desc: "Não há restrições especiais sobre a formação e atividade das associações laborais."
 law_corporatized_unions: "União Corporativa"
 law_corporatized_unions_desc: "As associações trabalhistas são colocadas sob o controle do Estado, por meio de amálgama obrigatória em uma única união nacional ou a incorporação de associações existentes em funções estatais."


# Luddites
 law_industry_banned: "Indústria Proibida"
 law_industry_banned_desc: "Uma visão econômica que rejeita a indústria pesada e a automação, preferindo os frutos do trabalho honesto sobre máquinas sem alma."
 industry_banned_tt: "Não será mais possível compilar #bold Indústria pesada #! edifícios"
 industry_banned_destroy_tt: "@warning! Todos #bold Indústria pesada #! edifícios neste país serão desmontados"
 ideology_luddite: "Luddita"
 ideology_luddite_desc: "Luddites se opõem à automação industrial, ou em casos mais extremos para a própria indústria."

  
 law_extraction_economy: "Economia de extração"
 law_extraction_economy_desc: "Um sistema econômico colonial que se concentra na extração máxima de capital em benefício da metrópole."

# Land Reform Laws
 lawgroup_land_reform: "Reforma agrária"
 lawgroup_land_reform_desc: "As leis que regem as terras agrícolas e as pessoas que a trabalham."
 law_tenant_farmers: "Agricultores"
 law_tenant_farmers_desc: "A terra agrícola pertence a elites hereditárias. Os trabalhadores não estão ligados à terra, e podem procurar emprego alternativo se a encontrarem."
 law_homesteading: "Acomodação"
 law_homesteading_desc: "Os agricultores reivindicam terrenos que trabalham ao lado de seus trabalhadores contratados."
 law_commercialized_agriculture: "Agricultura Comercializada"
 law_commercialized_agriculture_desc: "A agricultura é uma empresa como qualquer outra, sujeita às forças do mercado e detida pelo capital."
 law_collectivized_agriculture: "Agricultura Coletiva"
 law_collectivized_agriculture_desc:1 "A terra agrícola é organizada em parcelas trabalhadas por grupos de agricultores como uma empresa conjunta."

 pm_homesteading: "Acomodação"
 pm_homesteading_building_subsistence: "Acomodação"
 pm_privately_owned_plantation: "Propriedade privada"
 pm_publicly_traded_plantation: "Comercializados publicamente"
 pm_government_run_plantation: "Execução do Governo"

 # Jacksonian Democrat
 ideology_jacksonian_democrat: "Democrata Jacksoniano"
 ideology_jacksonian_democrat_desc: "Esse caráter defende uma maior participação do público no governo - para uma certa definição de "público"."

