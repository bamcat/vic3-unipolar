# Theocracies
 gov_theocracy:0 "Teocracia"
 gov_theocracy_desc:2 "Este é um [concept_government_type] onde o [concept_country] é governado pelo clero.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_theocratic_dictatorship:0 "Ditadura teocrática"
 gov_theocratic_dictatorship_desc:2 "Este é um [concept_government_type] onde o [concept_country] é governado pelo chefe do clero.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_theocratic_oligarchy:0 "Oligarquia teocrática"
 gov_theocratic_oligarchy_desc:2 "Este é um [concept_government_type] onde o [concept_country] é governado por uma classe de membros ricos e poderosos do clero.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_theocratic_democracy:0 "Democracia Teocrática"
 gov_theocratic_democracy_desc:2 "Este é um [concept_government_type] que é governado por um clero que são [Concept('concept_election','$concept_elected$')] pelo povo.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_theocratic_single_party_state: "Regime Teocrático"
 gov_theocratic_single_party_state_desc: "Este é um [concept_government_type] que é governado por um clero que são [Concept('concept_election','$concept_elected$')] por membros de um único partido governante legal.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_catholic_theocracy:0 "Teocracia Católica"
 gov_catholic_theocracy_desc:2 "Um [concept_government_type] governado pela hierarquia local da Igreja Católica. Os mais idosos [Concept('concept_ruler','$RULER_CARDINAL$')] assumem o papel de [concept_head_of_state].\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_protestant_theocracy:0 "Teocracia Protestante"
 gov_protestant_theocracy_desc:2 "A [concept_government_type] governada pela Igreja Protestante do Estado. Sua maior autoridade é chamada de [Concept('concept_ruler','$RULER_PRIMATE$')], que possui autoridade secular e espiritual.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_oriental_orthodox_theocracy:1 "Teocracia Ortodoxa Oriental"
 gov_oriental_orthodox_theocracy_desc:3 "Um [concept_government_type] governado pela Igreja Ortodoxa Oriental. Governada pelo [Concept('concept_ruler','$RULER_PATRIARCH$')], a Igreja controla todos os aspectos do estado.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_sunni_theocracy:0 "Imamato"
 gov_sunni_theocracy_desc:2 "Um teocrático [concept_government_type] governado por líderes da fé muçulmana sunita. Um idoso [Concept('concept_ruler','$RULER_IMAM$')] assume o papel de [concept_head_of_state].\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_papacy:0 "Papado"
 gov_papacy_desc:1 "Este é um [concept_government_type] governado pelo [Concept('concept_ruler','$RULER_POPE$')], o pontífice supremo, bispo de Roma, e chefe da Igreja Católica.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_jewish_theocracy:0 "Estado Rabínico"
 gov_jewish_theocracy_desc:2 "Uma teocracia judaica liderada pelo [Concept('concept_ruler','$RULER_CHIEF_RABBI$')].\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_prince_bishopric:0 "Príncipe-Bispado"
 gov_prince_bishopric_desc:2 "Este é um [concept_government_type] onde o [Concept('concept_ruler','$RULER_TITLE_PRINCE_BISHOP$')] exerce autoridade temporal e eclesiástica sobre o reino.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_zaidi_imamate:0 "Zaidi Imamate"
 gov_zaidi_imamate_desc:2 "Este é um [concept_government_type] onde o poder repousa com um semi-hereditário [Concept('concept_ruler','$RULER_IMAM$')] pertencente ao ramo Zaidi do Islão Shia.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_shiite_theocracy:0 "Teocracia xiita"
 gov_shiite_theocracy_desc:2 "Um [concept_government_type] teocrático governado por líderes da fé muçulmana xiita. Um idoso [Concept('concept_ruler','$RULER_AYATOLLAH$')] assume o papel de [concept_head_of_state].\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_bhutanese_dual_system_dharma:0 "Diarquia Butanesa"
 gov_bhutanese_dual_system_dharma_desc:1 "Este é um [concept_government_type] onde as autoridades religiosas e temporais compartilham poder, mas o religioso [Concept('concept_ruler','$RULER_TITLE_DHARMA_RAJA$')] detém maior influência.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_dalai_lama:0 "Reino Religioso"
 gov_dalai_lama_desc:2 "Este é um [concept_government_type] onde o [concept_country] é governado pelo chefe do clero.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_heavenly_kingdom_theocracy:0 "Reino Celestial"
