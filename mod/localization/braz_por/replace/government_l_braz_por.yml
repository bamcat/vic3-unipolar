 transfer_of_power_dictatorial:0 "Dictatorial"
 transfer_of_power_dictatorial_desc:1 "Sob o ditador [concept_transfer_of_power], [Concept('concept_ruler', '$concept_rulers$')] reinam para a vida. Na morte do $concept_ruler$, um novo $concept_ruler$ é escolhido do líder do [concept_interest_group] com o mais [concept_clout]."
