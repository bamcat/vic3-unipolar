 transfer_of_power_default_desc:1 "Em Random [concept_transfer_of_power], [Concept('concept_ruler', '$concept_rulers$')] reinar para a vida. Na morte do $concept_ruler$, um novo $concept_ruler$ é gerado aleatoriamente."

