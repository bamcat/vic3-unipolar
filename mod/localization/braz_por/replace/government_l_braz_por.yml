 gov_corporate_state: "Estado da empresa"
 gov_corporate_state_desc: "Trata-se de um [concept_government_type] organizado em linhas corporativas, dentro das quais o governo serve oficialmente como mediador entre diferentes classes sociais. Ele é liderado por um eleito [Concept('concept_ruler','$RULER_TITLE_PRESIDENT$')]\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_folkhemmet: "Folkhemmet"
 gov_folkhemmet_desc: "Trata-se de um [concept_government_type] organizado em linhas corporativas, dentro das quais o governo serve oficialmente como mediador entre diferentes classes sociais. Ele é liderado por um eleito [Concept('concept_ruler','$RULER_TITLE_STATSMINISTER$')]\n\n$TRANSFER_OF_POWER_NAME_DESC$"
