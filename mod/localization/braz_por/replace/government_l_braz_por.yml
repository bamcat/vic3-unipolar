 gov_danubian_federation_corporate_state_desc: "Trata-se de um [concept_government_type] dentro do qual o estado se organiza em uma infinidade de unidades federais traçadas em linhas étnicas, nas quais o governo serve oficialmente como mediador entre diferentes classes sociais. É dirigido por um eleito [Concept('concept_ruler','$RULER_TITLE_MINISTER_PRESIDENT$')].\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_danubian_federation_technocratic_corporate_state: "Federação Danubiana"
