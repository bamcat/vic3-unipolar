pm_no_public_housing: "Nenhuma habitação pública"
pm_no_public_housing_desc: "O estado não oferece apoio à habitação. Os centros urbanos produzem apenas os imóveis gerados pela atividade do mercado privado."
 
pm_the_projects: "Os Projetos"
pm_the_projects_desc: "Bloqueios de torre de alta densidade financiados pelo Estado e casas de habitação. Básico, funcional e construído rapidamente a partir de madeira e materiais pré-fabricados. A produção imobiliária aumenta significativamente à medida que o estado se torna um grande construtor."
 
pm_affordable_construction: "Construção acessível"
pm_affordable_construction_desc: "Um programa abrangente de habitação pública usando construção de qualidade — edifícios com estrutura de aço, fundações adequadas, materiais duráveis. A produção imobiliária aumenta substancialmente. Engenheiros e burocratas gerenciam o programa em expansão."
 
pm_housing_for_all: "Habitação para Todos"
pm_housing_for_all_desc: "Alojamento universal entregue em escala. O estado constrói e mantém habitações de alta qualidade para todos os cidadãos, consumindo insumos de construção significativos. A produção imobiliária atinge o seu máximo. Uma grande força de trabalho de trabalhadores, engenheiros e burocratas sustenta o programa."
