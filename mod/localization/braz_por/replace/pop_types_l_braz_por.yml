l_braz_por:
 aristocrats:0 "@aristocrats! $aristocrats_no_icon$"
 aristocrats_only_icon:0 "@aristocrats!"
 aristocrats_no_icon:0 "Aristocratas"
 aristocrats_desc:1 "Ricos proprietários de terras, dinheiro velho com conexões antigas. Eles trabalham exclusivamente em [GetBuildingType('building_manor_house').GetName] [Concept('concept_building', '$concept_buildings$')], onde possuem fazendas e plantações. Eles contribuem com alguns de seus lucros para o [concept_investment_pool]. Seus interesses políticos são representados como o [GetInterestGroupVariant('ig_landowners',GetPlayer).GetNameWithCountryVariant]."
 bureaucrats:0 "@bureaucrats! $bureaucrats_no_icon$"
 bureaucrats_only_icon:0 "@bureaucrats!"
 bureaucrats_no_icon:0 "Burocratas"
 bureaucrats_desc:0 "Funcionários responsáveis pela administração de funções e infra-estruturas governamentais. Politicamente, eles tendem a se alinhar com a Intelligentsia ou Petite Bourgeoisie."
 capitalists:0 "@capitalists! $capitalists_no_icon$"
 capitalists_only_icon:0 "@capitalists!"
 capitalists_no_icon:0 "Capitalistas"
 capitalists_desc:1 "Capitães da indústria, dinheiro novo para uma nova era. Eles trabalham exclusivamente em [GetBuildingType('building_financial_district').GetName] [Concept('concept_building', '$concept_buildings$')], onde possuem minas e manufaturas. Eles contribuem com alguns de seus lucros para o [concept_investment_pool]. Seus interesses políticos são representados como o [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetNameWithCountryVariant]."
 clergymen:0 "@clergymen! $clergymen_no_icon$"
 clergymen_only_icon:0 "@clergymen!"
 clergymen_no_icon:0 "Clero"
 clergymen_desc:0 "Sacerdotes, estudiosos e outros líderes religiosos que cuidam das necessidades espirituais da população rural. Politicamente, eles são a espinha dorsal do Devout."
 clerks:0 "@clerks! $clerks_no_icon$"
 clerks_only_icon:0 "@clerks!"
 clerks_no_icon:0 "Trabalhadores de colarinho branco"
 clerks_desc:0 "Trabalhadores de escritório de baixo escalão desempenhando tarefas administrativas em governo, infraestrutura e lojas. Frequentemente parte da Petite Bourgeoisie, embora alguns se juntem aos sindicatos."
 engineers:0 "@engineers! $engineers_no_icon$"
 engineers_only_icon:0 "@engineers!"
 engineers_no_icon:0 "Engenheiros"
 engineers_desc:1 "Inventores e designers de soluções técnicas, trabalhando com máquinas avançadas em setores como fabricação, mineração e construção. Alguns apoiam os industriais ou Petty Bourgeoisie, enquanto outros se juntam aos sindicatos."
 farmers:0 "@farmers! $farmers_no_icon$"
 farmers_only_icon:0 "@farmers!"
 farmers_no_icon:0 "Agricultores"
 farmers_desc:0 "Agricultores, pequenos agricultores e outros que fazem uma vida estável, mas escassa, produzindo alimentos ou cultivando colheitas em dinheiro. A maioria vê seus interesses representados como o Povo Rural."
 peasants:0 "@peasants! $peasants_no_icon$"
 peasants_only_icon:0 "@peasants!"
 peasants_no_icon:0 "Camponeses"
 peasants_desc:2 "Os agricultores de subsistência encontraram apenas em [Concept('concept_subsistence_building', '$concept_subsistence_buildings$')], onde produzem produtos agrícolas e manufaturados simples que utilizam principalmente para suas próprias necessidades. Eles dependem de [concept_subsistence_output] para sobrevivência e desempenham apenas um papel limitado na economia [concept_market]. Eles tendem a ser [Concept('concept_politically_unaligned_aligned', '$concept_politically_unaligned$')]."
 laborers:0 "@laborers! $laborers_no_icon$"
 laborers_only_icon:0 "@laborers!"
 laborers_no_icon:0 "Trabalhadores de colarinho azul"
 laborers_desc:0 "Trabalhadores diurnos, agricultores e outros com pouca ou nenhuma segurança de emprego, realizando qualquer trabalho disponível em toda a sociedade. Geralmente não estão envolvidos na política, mas podem envolver-se através de sindicatos."
 officers:0 "@officers! $officers_no_icon$"
 officers_only_icon:0 "@officers!"
 officers_no_icon:0 "Agentes"
 officers_desc:0 "Oficiais encomendados comandando as forças militares da nação no exército e na marinha. Politicamente, representam os escalões superiores das Forças Armadas."
 academics:0 "@academics! $academics_no_icon$"
 academics_only_icon:0 "@academics!"
 academics_no_icon:0 "Acadêmicos"
 academics_desc:0 "Pesquisadores, médicos, advogados e outros profissionais educados estudando e ensinando em instituições acadêmicas. Politicamente, eles estão na vanguarda da Intelligentsia."
 shopkeepers:0 "@shopkeepers! $shopkeepers_no_icon$"
 shopkeepers_only_icon:0 "@shopkeepers!"
 shopkeepers_no_icon:0 "Dono de Pequenas Empresas"
 shopkeepers_desc:0 "Proprietários e gerentes de lojas, vendendo mercadorias para clientes em cidades. Eles geralmente se enquadram na Petite Bourgeoisie politicamente."
 slaves:0 "@slaves! $slaves_no_icon$"
 slaves_only_icon:0 "@slaves!"
 slaves_no_icon:0 "Os escravos"
 slaves_desc:0 "Tratado não como pessoa, mas como propriedade, realizando trabalhos forçados em vários setores em países onde a escravidão é permitida. Devido ao seu estatuto, não podem participar na política."
 soldiers:1 "@soldiers! $soldiers_no_icon$"
 soldiers_only_icon:1 "@soldiers!"
 soldiers_no_icon:1 "Serviço"
 soldiers_desc:0 "Soldados e marinheiros que compõem a maior parte do pessoal militar da nação. Eles comumente se alinham politicamente com seu papel como parte das Forças Armadas."
 machinists:0 "@machinists! $machinists_no_icon$"
 machinists_only_icon:0 "@machinists!"
 machinists_no_icon:0 "Machinistas"
 machinists_desc:0 "Trabalhadores manuais com emprego estável que operam máquinas em manufaturas, minas, fazendas mecanizadas e outros setores. Politicamente, tendem a ser uma força motriz nos sindicatos."
  
 ACADEMICS_QUALIFICATIONS_DESC:0 "Apenas pops com id=0/> adequado <x podem tornar-se id=1/> $academics$#!. O potencial aumenta com maior [concept_literacy] e [concept_wealth]. Pops cujos [concept_culture] têm baixo [concept_acceptance] demoram muito mais tempo. #v $clerks$#! e #v $aristocrats$#! têm um momento particularmente fácil para se tornarem #v $academics$#!."
 ARISTOCRATS_QUALIFICATIONS_DESC:0 "Apenas pops com id=0/> adequado <x podem tornar-se id=1/> $aristocrats$#!. O potencial aumenta com maior [concept_wealth] e em menor grau [concept_literacy]. Pops cujos [concept_culture] têm baixo [concept_acceptance] demoram muito mais tempo. #v $officers$#! e #v $bureaucrats$#! têm um momento particularmente fácil para se tornarem #v $aristocrats$#!."
 BUREAUCRATS_QUALIFICATIONS_DESC:0 "Apenas pops com id=0/> adequado <x podem tornar-se id=1/> $bureaucrats$#!. O potencial aumenta com maior [concept_literacy]. Pops cujo [concept_culture] tem baixo [concept_acceptance] demoram muito mais tempo, enquanto vai mais rápido para aqueles de ambos [concept_culture] e [concept_religion] com alto $concept_acceptance$. #v $clerks$#! e #v $clergymen$#! têm um tempo particularmente fácil de se tornar #v $bureaucrats$#!."
 CAPITALISTS_QUALIFICATIONS_DESC:0 "Apenas pops com id=0/> adequado <x podem tornar-se id=1/> $capitalists$#!. O potencial aumenta com maior [concept_wealth] e [concept_literacy]. Pops cujos [concept_culture] têm baixo [concept_acceptance] demoram muito mais tempo. #v $shopkeepers$#! e #v $engineers$#! têm um momento particularmente fácil para se tornarem #v $capitalists$#!."
 CLERGYMEN_QUALIFICATIONS_DESC:0 "Apenas pops com id=0/> adequado <x podem tornar-se id=1/> $clergymen$#!. O potencial aumenta com maior [concept_literacy]. Pops cujo [concept_religion] tem baixo [concept_acceptance] demoram muito mais tempo, enquanto vai mais rápido para aqueles de [concept_religion] com alto $concept_acceptance$. #v $academics$#! e #v $aristocrats$#! têm um tempo particularmente fácil se tornando #v $clergymen$#!."
 CLERKS_QUALIFICATIONS_DESC:0 "Qualquer pop pode tornar-se #v $clerks$#!. Aumentos potenciais com maior [concept_literacy]. #v $laborers$#! têm um momento particularmente fácil de se tornar #v $clerks$#!."
 ENGINEERS_QUALIFICATIONS_DESC:0 "Apenas os pops com id=0/> adequados podem tornar-se #v $engineers$#!. Aumentos de potencial com id=4/> e id=5/>. #v $machinists$#! e #v $clerks$#! têm um momento particularmente fácil de se tornar #v $engineers$#!."
 FARMERS_QUALIFICATIONS_DESC:0 "Qualquer pop pode tornar-se #v $farmers$#!. Aumentos potenciais com maior [concept_wealth]. #v $peasants$#! e #v $laborers$#! têm um momento particularmente fácil para se tornarem #v $farmers$#!."
 MACHINISTS_QUALIFICATIONS_DESC:0 "Pops com mínimo [concept_literacy] podem tornar-se #v $machinists$#!. Aumentos potenciais com maior [concept_literacy]. #v $laborers$#! têm um momento particularmente fácil de se tornar #v $machinists$#!."
 OFFICERS_QUALIFICATIONS_DESC:0 "Apenas #v $soldiers$#! ou pops de [concept_culture] com [concept_acceptance] suficientemente alto podem tornar-se #v $officers$#!. Aumentos potenciais com maior [concept_literacy]. #v $aristocrats$#! têm um momento particularmente fácil se tornando #v $officers$#!."
 SHOPKEEPERS_QUALIFICATIONS_DESC:0 "Somente pops com algum [concept_wealth] podem se tornar #v $shopkeepers$#!. Aumentos de potencial com maior [concept_wealth]. #v $clerks$#! e #v $farmers$#! têm um momento particularmente fácil se tornando #v $shopkeepers$#!."
