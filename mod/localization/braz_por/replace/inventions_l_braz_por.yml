   #hereditary_aristocracy: "Hereditary Aristocracy"
  # Categories
  # Culture Technology
  # Economy Technology
  # Military Technology
  ### Technology Tooltips
  ##lenders_of_last_resort: "Lenders of Last Resort"
  ##lenders_of_last_resort_desc: "State-owned central banks are large enough to come to the rescue of smaller commercial banks, such as during bank runs. This can prevent a financial crisis spreading to other sectors of the economy. Often, even the promise of rescue in times of difficulty is enough to prevent bank runs occurring in the first place. Some 'critics' claim that such a promise will encourage risky behavior by the commercial banks, but these 'critics' are surely just anarchists looking to wreck the nation's economic security, as bankers are some of the most trustworthy people to walk the halls of power."
  ##limited_liability: "Limited Liability"
  ##limited_liability_desc: "A limited liability company draws a legal distinction between the company and its owners. This helps prevent the bankruptcy of a company ruining the personal lives of the investors, as creditors will not try to haul off the furniture of failed businessmen to recoup losses. This makes investing less risky, if perhaps less satisfying to watch from afar. As a separate legal entity, the company has its own finances that must be audited and taxed."
  ##marketing_desc: "Promotional schemes to grab more market share or create a new market from scratch were devised by Josiah Wedgwood, leader of the expanding pottery industry at the dawn of the Industrial Revolution."
  ##paper_money: "Paper Money"
  ##paper_money_desc: "A kind of promissory note issued by a bank, paper money allows private citizens to move and exchange large volumes of currency without the danger and discomfit of gold or silver coins which cannot be divided and are heavy to carry. Thus, commercial exchanges are easier and safer."
  ##regulated_private_notes: "Regulated Private Notes"
  ##regulated_private_notes_desc: "Bankers realized hundreds of years ago that their customers only rarely demand back their deposits all at once. By issuing loans in excess of their reserves in the form of private bank notes, bankers could make even more money from interest. Unfortunately, when all the bank's customers do demand their deposits at once, there will not be enough reserves. With better communications technology, these 'bank runs' become more frequent. To prevent bank runs, governments can restrict the issuance of private notes only to banks that meet certain criteria of fiduciary responsibility, such as being close personal friends to the finance minister."
  #alcohol: "Alcohol"
  #alcohol_desc: "An ancient technology, presumably discovered when a tribesman left some grain in a puddle and decided to drink it after a few months had passed, alcohol became central to the discipline of alchemy, and continues to serve men of reason in the field of chemistry in various processes, some of which do not involve drinking it."
  #atomic_theory_of_matter: "Atomic Theory of Matter"
  #atomic_theory_of_matter_desc: "Observations in chemistry seem to have disproven the notion held by supporters of phlogiston that matter is composed of the three fundamental essences of solidity, fluidity and inflammability. Air is not merely a void into which phlogiston flows during combustion - it contains oxygen, which combines with other matter during chemical reactions."
  #bankruptcy_law: "Bankruptcy Law"
  #bankruptcy_law_desc: "Having a legal framework for a company to declare bankruptcy allows investors and creditors to try to recoup losses via liquidation of assets. This makes investment less risky."
  #building_societies: "Building Societies"
  #building_societies_desc: "Originally set up within communities to help new families raise loans with which to buy homes and then disbanded once the members had all satisfied their requirements, building societies can also be permanent financial institutions that specialize in cheap mortgages."
  #census: "Census"
  #census_desc: "Knowing how many people we have in our country and roughly were they live is important so we know where to spend out money and how many men we will have if we have to fight. Should we be involved in that grubby business of having our lower orders actually having representation I suppose it will have a use for that as well."
  #chemical_batteries: "Chemical Batteries"
  #chemical_batteries_desc: "Electricity can be generated by exploiting the difference in charge as electrolytes pass through oxidation and reduction cells containing copper and zinc cathodes and annodes. Early experiments in this field took the form of a series of jars which had the appearance of a battery of artillery, hence the name."
  #civil_service: "Civil Service"
  #civil_service_desc: "The idea that the government should have a body of men on which they rely on to carry out administration is neither new nor necessarily efficient. The radical idea that people should be selected for these positions on merit and ability and that they should keep their positions if the government is changed are radical and leads to greater efficiency."
  #clinical_thermometer: "Clinical Thermometer"
  #clinical_thermometer_desc: "The mercury thermometer had been around since the mid 18th century. Its use for medical purposes were limited as they tended to be large (over a foot long) and could take over 20 minutes to measure someone's temperature. Now we have made the thermometer smaller and it only takes a few minutes to get a reading, making it truly useful for doctors."
  #commercial_banks: "Commercial Banks"
  #commercial_banks_desc: "Businesses need various financial services to operate normally. Payroll at the end of the month might require a short loan to cover a temporary shortfall. Expanding the business might likewise require borrowing, especially if the business is a limited liability company rather than a personal venture. Commercial banks offer financial services to these companies, as opposed to wealthy private individuals, middle-class savers or professional investors."
  #cooperatives: "Co-Operatives"
  #cooperatives_desc: "Intended as a mutually beneficial organization to help small businesses and workers buy basic necessities, a co-operative tends to be run democratically by its members to achieve social good rather than pure profit."
  #credit_unions: "Credit Unions"
  #credit_unions_desc: "Rather than being operated for the profit of an owner or shareholders, credit unions are a financial institution which tries to improve the welfare of its members through access to credit. They tend to be run democratically, with each member having a vote on the director of the credit union."
  #customs_tariffs: "Customs Tariffs"
  #customs_tariffs_desc: "Tariffs are a very important weapon in a government's arsenal. They can be used both to raise revenue and to 'guide' merchants and businesses into making choices beneficial to the national interest, as determined by the government. Tariffs can be charged on entry into a country, for the use of port facilities, or on the price of imported or exported goods. One important use for tariffs is in protecting native industries against more efficient foreign companies, which can give domestic firms time to catch up with their rivals abroad."
  #department_stores: "Department Stores"
  #department_stores_desc: "Having one large store that sells a huge variety of goods can be more convenient for customers and gives the retailer more buying-power over the distribution chains."
  #distribution_channels: "Distribution Channels"
  #distribution_channels_desc: "Companies can be structured to sell goods in a number of ways. Raw materials are generally sold to other industries; industries might then sell manufactured goods to wholesalers such as brokers; wholesalers then sell goods to retailers such as specific shops or chains of shops, and the retailer then sells the goods to the final customer. Innovations in this area include factory or outlet stores, which sell goods directly to customers from the factory complex, such as to workers and their families and community."
  #enclosure_acts: "Enclosure Acts"
  #enclosure_acts_desc: "Enclosure is the process of taking small strips of peasant land, passed down from father to son since the beginning of feudalism, and 'combining' them under one owner via Acts of Parliament. By merging these subsistence plots into enclosed fields, arable land can be turned into pasture, capital goods such as machinery can be invested in, and many small surpluses can be merged into a significant profit. Where the landless peasants go is up to them - am I my brother's keeper?"
  #espionage: "Espionage"
  #espionage_desc: "Know thy enemy. Knowledge of what is going on in places that could be hostile to us is vital if we are going to keep out country safe. This can be in the form of the mundane, like ensuring proper maps exist of areas we may end up being at war in to the significant like enemy forces and plans."
  #gold_standard: "Gold Standard"
  #hereditary_aristocracy_desc: "As a society becomes more productive enough food can be generated to allow people to specialize and do things that do not require you to farm. A military caste to protect yourself from hostile neighbors is a natural development and eventually they will entrench their position and hereditary aristocracy is born."
  #insurance: "Insurance"
  #insurance_desc: "Insurance against loss of property has existed for many hundreds of years, being especially important for merchant vessels traveling overseas. As global trade becomes more prevalent, the need for more secure maritime insurance increases. Lloyd's of London began as a specialist for maritime insurance but has expanded into other markets such as insuring properties against fire damage."
  #malthusianism: "Malthusianism"
  #malthusianism_desc: "Population is increasing much faster than our food supply. We must face the fact that if we allow this to continue we will face a catastrophe for our people. Further more we must face the face any such catastrophe will hurt the lower classes the most. The Tory ideal of paternalism is not good nor noble but instead will lead to a greater catastrophe on the least fortunate."
  #manifest_destiny: "Manifest Destiny"
  #manifest_destiny_desc: "If we are to spread our civilization to those less fortunate to have we must accept the fact that we have been uniquely blessed with virtues and institutions that others simply do not have. We have a mission to redeem the less fortunate by remaking them in our own image. It is no more that our destiny to do this."
  #oceanic_cablelaying: "Oceanic Cablelaying"
  #oceanic_cablelaying_desc: "With the technology of the telegraph, thought soon turned to how to lay a cable under bodies of water. Although it proved not technically difficult to lay cables of short stretches of water (like bays and straits), the wide oceans proved a greater challenge. Good news - after several false starts we have successfully mastered the techniques to lay such a cable so no longer must we rely on the good will of others."
  #ophthalmoscope: "Opthalmoscope"
  #ophthalmoscope_desc: "'every eye could be made luminous if the axis from a source of illumination directed towards a person's eye and the line of vision of the observer were coincident', this discovery revolutionized the treatment of eye problems. Creating a hand held device with a mirror that could shine the light, the ophthalmoscope, was made the doctor's life a lot easier."
  #positivism: "Positivism"
  #positivism_desc: "We we consider what knowledge is we know that there is certain knowledge. Information that comes from sensory experience and  then interpretation comes through logic and reason is the exclusive source of certain knowledge. We can extend this from the physical world to societies as a whole. Societies operate under general laws which if we took the time to analyze we would understand. Theology must be rejected because faith by its very nature denies reason and verification."
  #postal_banks: "Postal Banks"
  #postal_banks_desc: "Rural and otherwise isolated communities may not have access to a local bank branch. In such cases, a postal bank can operate to offer them financial services, such as savings and a current account, without the need to travel into a town or city."
  #savings_banks: "Savings Banks"
  #silver_standard: "Silver Standard"
  #vertical_filing_cabinet: "Vertical Filing Cabinet"
  #vertical_filing_cabinet_desc: "Gone but not forgotten"
 admiralty:0 "Radar Moderno"
 admiralty_desc:0 "O Almirantado é um complexo sistema de fileiras conectado por uma rígida cadeia de comando para ajudar a marinha a trabalhar de forma mais eficiente."
 anaesthetics:0 "Anestésicos"
 anaesthetics_desc:0 "Os anestésicos são sedativos ou analgésicos usados durante a cirurgia para prevenir que os pacientes sintam as facas e o prodding invasivo da equipe médica, o que poderia ser desconcertante."
 anarchism:0 "Socialismo do Mercado"
 anarchism_desc:0 "O socialismo de mercado é um tipo de sistema económico que envolve a propriedade social dos meios de produção no quadro de uma economia de mercado. Existem vários modelos para tal sistema, geralmente envolvendo empresas cooperativas e, por vezes, uma mistura que inclui empresas públicas ou privadas."
 aniline:0 "Algoritmo de aprendizagem de máquina"
 aniline_desc:0 "Um processo ou conjunto de regras a seguir em cálculos ou outras operações de resolução de problemas, especialmente por um computador. Usado por empresas de mídia social para a avaliação dos desejos do consumidor."
 anti_clericalism:0 "Anti-Clericalismo"
 anti_clericalism_desc:0 "Poder corruptos e instituições religiosas não são mais imunes a esta corrupção do que qualquer outro. Eles podem alegar oferecer salvação às massas, mas em vez disso, a procura de pena seus próprios ninhos e negar os direitos para aqueles que eles consideram indignos. Temos de eliminar a influência da religião organizada da nossa esfera pública e deixar essa matéria como uma escolha para os não iluminados."
 antibiotics:0 "Erradicação do cancro"
 antibiotics_desc:0 "A edição de genes permite a criação de genes insusceptíveis ao câncer e outras doenças."
 antiseptics:0 "Antissépticos"
 antiseptics_desc:0 "A ciência estabeleceu que a exposição ao calor destruirá os germes. O problema é que esta não é uma solução válida quando se trata de tecido vivo. No entanto, quando as experiências foram feitas onde as feridas foram cobertas com almofadas embebidas em uma solução de fenol, vimos incidentes de gangrena diminuir drasticamente. Esta ciência dos anticépticos nasceu."
 arc_welding:0 "Colonização Inter- Planetária"
 arc_welding_desc:0 "A colonização de diferentes planetas"
 army_reserves:0 "Refeição pronta para comer"
 army_reserves_desc:0 "Uma refeição pronta para comer (MRE) é uma ração militar projetada para uma longa vida útil, com uma grande diversidade de opções de alimentos."
 art_patronage:0 "Patronagem da Arte"
 art_patronage_desc:0 "A arte não é livre e para desenvolver arte e cultura você precisa dos ricos para ter um interesse e apoiar a arte. Em troca de fazerem isso, ganham prestígio por terem coisas tão bonitas ao seu redor."
 art_silk:0 "Vida Artificial"
 art_silk_desc:0 "Criando organismos com genomas sintéticos ou projetando organismos com propriedades completamente novas e não naturais. genomas sintéticos têm sido usados para criar novas formas de vida a partir do zero, como a primeira bactéria sintética criada por Craig Venter e equipe em 2010."
 artificial_fertilisers:0 "Fertilizantes artificiais"
 assembly_line:0 "Linha de Montagem"
 assembly_line_desc:0 "Ao racionalizar o processo de construção de coisas para que cada ação seja feita corretamente após a ação uma outra uma fábrica muito mais eficiente pode ser feita."
 atmospheric_engine:0 "Energia Limpa"
 atmospheric_engine_desc:0 "Métodos de produção de energia limpa, como os moinhos de vento, permitem a geração de energia sem causar poluição"
 automatic_bottle_blowers:0 "Mycoremediation"
 automatic_bottle_blowers_desc:0 "Isso envolve o uso de fungos para degradar poluentes ambientais. Os fungos podem ser usados para quebrar materiais perigosos, como produtos petrolíferos e solventes industriais."
 battlefleet_tactics:0 "Táticas da Frota Espacial-Battlefleet"
 battlefleet_tactics_desc:0 "Operar uma grande frota de batalha pode ser uma tarefa difícil. Ao praticar e aprender táticas específicas como frota, maior desempenho pode ser alcançado."
 battleship_tech:0 "Destruidor guiado-Drone"
 battleship_tech_desc:0 "Barcos de guerra ultra-massivos capazes de explodir enormes faixas de oceano"
 bessemer_process:0 "Polímeros"
 bessemer_process_desc:0 "Roupas e tecidos sintéticos permitem a produção em massa de bens comuns para os menos felizes."
 bessemer_steel:0 "Aço Bessemer"
 bessemer_steel_desc:0 "O Processo Bessemer detona o ar frio em ferro fundido, queima carbono, silício e manganês e cria aço leve. Isto não é tão de alta qualidade como o produzido em cadinhos, mas é muito mais barato, permitindo a utilização de minérios de ferro de baixa qualidade e permitindo a produção em massa de linhas ferroviárias e concreto armado."
 biological_determinism:0 "Determinação Biológica"
 biological_determinism_desc:0 "O estudo da genética e herança na natureza abre questões sobre quanto do comportamento humano é determinado pela biologia."
 feminism:0 "Economia Ambientalista"
 feminism_desc:0 "O ambientalismo ou direitos ambientais é uma filosofia ampla, ideologia e movimento social sobre o apoio à vida, habitats e arredores."
 blast_furnaces:0 "Fornos de explosão"
 blast_furnaces_desc:0 "Um alto-forno é usado para adicionar oxigênio extra a processos metalúrgicos, como a fundição de minério, originalmente com mão — ou fole movido a água. Isto faz com que o forno atinja temperaturas ainda maiores do que um forno de ar livre, queimando impurezas e permitindo ligas de metais exóticos. O alto-forno é especialmente útil para a produção de ferro-gusa, que pode então ser transformado em ferro forjado ou aço-bom usando processos mais avançados."
 bolt_action_rifles:0 "Cibernética"
 bolt_action_rifles_desc:0 "Soldados autônomos queriam salvar vidas reais no início da guerra."
 chemical_bleaching:0 "Computador Pessoal"
 chemical_bleaching_desc:0 "O computador pessoal emergiu em meados da década de 1980, com produtos como o Apple II, Macintosh e o IBM PC, tornando a computação acessível a indivíduos e pequenas empresas."
  # bone_china: "Bone China"
  # bone_china_desc: "Bone China is a form of porcelain which in part is made from bone ash, the greater strength of this type of porcelain makes it rather valuable."
 # artillery: "Artillery"	// There is already a loc key for this in Goods, require prefix to support unique localization
 artillery_desc:0 "Bombardeamento de longo alcance com munições pesadas intimida e dispersa as forças inimigas sem arriscar as suas próprias tropas. Incorrecto, lento e caro, mas um ingrediente crucial em qualquer exército moderno."
 breech_loading_artillery:0 "Bateria de Mísseis de Longa Distância"
 breech_loading_artillery_desc:0 "Baterias de mísseis de longo alcance, como o HIMARS fascinam a destruição de alvos em território estrangeiro."
 tech_bureaucracy:0 "Liberalismo social"
 tech_bureaucracy_desc:0 "O liberalismo social é uma ideologia que defende um mercado livre com forte influência e controle do governo para proteger os menos afortunados."
 centralization:0 "Capitalismo Autoritário"
 centralization_desc:0 "Relacionado e sobrepondo-se ao capitalismo de Estado, sistema no qual o Estado exerce atividade comercial, o capitalismo autoritário combina propriedade privada e o funcionamento das forças de mercado com restrições à discórdia."
 camera:0 "Starlink"
 camera_desc:0 "Starlink é uma constelação de internet via satélite operada pela Starlink Services, LLC, um fornecedor internacional de telecomunicações que é uma subsidiária integral da empresa aeroespacial americana SpaceX"
 canals:0 "Canais"
 canals_desc:0 "As barcaças costeiras e fluviais são um método muito eficiente de transporte de mercadorias. Escavar canais no interior de um país expande a cobertura dessas barcaças, embora possa ser uma proposição cara quando diferentes alturas precisam ser ponteadas por sistemas de bloqueio."
 canneries:0 "Alimentos ultraprocessados"
 canneries_desc:0 "Alimentos ultraprocessados (UPFs) são alimentos que foram significativamente alterados de sua forma original através do uso de processos industriais e da adição de ingredientes não tipicamente encontrados em uma cozinha doméstica."
 canning_jars:0 "Jarros Canning"
 canning_jars_desc:0 "Os exércitos da Revolução Francesa exigiam soluções inovadoras para os seus problemas de abastecimento. Uma solução era cozinhar alimentos dentro de frascos de vidro, para evitar humores ruins e miasma misturar com o conteúdo e, assim, estragar as rações. A cera derretida é derramada na boca do frasco para agir como um selo contra o mundo exterior."
 canning_machines:0 "Máquinas de Canning"
 canning_machines_desc:0 "A primeira produção de alimentos enlatados careceu de automação. As latas foram enroladas e soldadas à mão. O uso de máquinas para transformar rapidamente tinplate em latas melhora os padrões e aumenta a produtividade."
 carrier_tech:0 "Laserboat"
 carrier_tech_desc:0 "Laserboats são navios em campo um laser de alta potência com o propósito de eliminar rapidamente drones que chegam."
 catalytic_contact_process:0 "Processo de contato catalítico"
 catalytic_contact_process_desc:0 "Em 1831, o comerciante britânico de vinagre Peregrine Phillips inventou um processo para produzir ácido sulfúrico mais concentrado usando platina como catalisador. Embora não seja especialmente útil para a produção de soda de cinzas ou fertilizante, isso logo se tornou uma bênção para a produção de corante orgânico."
 chemical_isolation:0 "Isolamento químico"
 chemical_isolation_desc:0 "Os químicos podem ser purificados de muitas maneiras, tais como destilação, filtração e evaporação. A qualidade do processo de purificação irá obviamente afectar a qualidade do isolado."
 chemical_synthesis:0 "Síntese química"
 chemical_synthesis_desc:0 "A urina do cão foi sintetizada pelo químico alemão Friedrich Wöhler em 1828. Isso começou a desfocar as fronteiras entre química orgânica e inorgânica, e à medida que mais produtos químicos são sintetizados novos processos industriais estão se abrindo."
 chemical_warfare:0 "AI-Terrorismo"
 chemical_warfare_desc:0 "Certas combinações químicas produzem efeitos adversos ou até mesmo fatais quando os seres humanos são expostos a eles. Armar isso traz todo um novo aspecto horrível para a guerra."
 civilizing_mission:0 "Edição do gene CRISPR"
 civilizing_mission_desc:0 "A edição de genes através do CRISPR permite que os humanos cresçam novos órgãos."
 colonization:0 "O ultrassom"
 colonization_desc:0 "Avanços no final do século XX em transplante de órgãos, imagem médica por meio de ressonância magnética e tomografia computadorizada e máquinas ópticas permitiram tratamentos mais especializados e opostos para condições individuais"
 color_photography:0 "Fotografia a cores"
 color_photography_desc:0 "Técnica precoce para capturar fotografias em cores, baseada em insights sobre como a luz é percebida pelo olho. Ao efetivamente tirar três fotos através de filtros de cores diferentes, estes podem ser combinados em uma imagem recriando as cores originais."
 combination_acts:0 "Atos de Combinação"
 combination_acts_desc:0 "Os trabalhadores reunidos em segredo e jurando uns aos outros é uma ameaça à segurança do estado e claramente um meio para o radical Jacobin subverter a declaração. Pode também ser uma ameaça à nossa capacidade de nos defendermos de inimigos externos devido a ameaças de ação dos trabalhadores em momentos críticos do conflito. Vamos aprovar uma série de leis que nos permitirão regular tal comportamento para o bem comum."
 combustion_engine:0 "Nanocoatings"
 combustion_engine_desc:0 "Estes são aplicados em várias superfícies para torná-los mais resistentes à corrosão, desgaste e manchas. Superfícies de autolimpeza e nanocoes antibacterianas estão sendo desenvolvidas para aplicações em saúde, eletrônica e construção."
 central_planning:0 "Governação Digital"
 central_planning_desc:1 "Permite que o governo execute vários sistemas de computador seguros."
 compound_microscopes:0 "Microscópios Compostos"
 compound_microscopes_desc:0 "As lentes usadas em óptica requerem habilidades muito finas de fabricação de vidro. Uma inovação neste campo é usar duas lentes, uma focada em um objeto e outra focada na primeira lente, para aumentar a ampliação. Tal microscópio pode ser usado para ver bactérias vivas."
 compression_ignition:0 "Energia proveniente de resíduos"
 compression_ignition_desc:1 "Transformando os resíduos armazenados em aterros em energia, o nosso mundo pode gerar grandes quantidades de energia."
 concrete_dockyards:0 "Intervalo de testes artificiais"
 concrete_dockyards_desc:0 "Intervalos de teste totalmente gerados dentro de IA."
 concrete_fortifications:0 "Fortificações futuras"
 concrete_fortifications_desc:0 "Ao introduzir concreto em fortificações é possível fazer posições fortes entrincheiradas muito rapidamente."
 condensed_milk:0 "Leite condensado"
 condensed_milk_desc:0 "Normalmente, o leite deve ser consumido rapidamente após ser extrudido de uma glândula mamária bovina. Por diminuir a pressão dentro de um recipiente, como uma panela de vácuo, o teor de água do leite evapora, eo leite condensado pode então ser enlatado e vendido."
 conspicuous_consumption:0 "Consumo conspícuo"
 conspicuous_consumption_desc:0 "A riqueza tem um prestígio próprio. Exposições de riqueza podem fazer com que a pessoa pareça mais prestigiada e ajudar a avançar através das classes sociais, abrindo novas oportunidades para o escalador social, como contatos com empresários e políticos. Numa sociedade materialista, as frivolidades e a extravagância ajudam paradoxalmente a enriquecer."
 conveyors:0 "Fábricas automatizadas"
 conveyors_desc:0 "Aplicando os últimos sistemas de IA, é possível criar plataformas que movem mercadorias ao longo deles sem o uso de trabalho humano."
 cotton_gin:0 "Carros Modernos"
 cotton_gin_desc:0 "Os automóveis permitem o transporte rápido de pessoas e bens em todas as terras."
 crucible_steel:0 "Aço Crucível"
 crucible_steel_desc:0 "Produzido pela aplicação de calor a um cadinho de pedra contendo ferro em pó e carvão vegetal, acredita-se que esta liga de alto carbono seja semelhante ao "aço Damasco", criado na Índia e na Pérsia até cerca de 1750. Este processo produz aço de alta qualidade adequado para uso em ferramentas, molas e outros objetos extra-difíceis e caros."
 law_enforcement:0 "Racismo Sistémico"
 law_enforcement_desc:1 "O racismo sistêmico é uma forma de discriminação institucional baseada na raça ou grupo étnico e pode incluir políticas e práticas que existem em toda uma sociedade ou organização que resultam e apoiam uma vantagem injusta contínua para algumas pessoas e tratamento injusto ou prejudicial de outras."
 defense_in_depth:0 "Alvo guiado por IA"
 defense_in_depth_desc:0 "Ao fazer várias linhas de defesa, é possível espalhar-se e retardar o inimigo e às vezes até mesmo envoltá-los."
 democracy:0 "Queda do Bloco Oriental"
 democracy_desc:0 "No final da década de 1980-early 1990 uma série de eventos levam ao colapso do comunismo na Europa Oriental."
 distillation:0 "Eletrodomésticos"
 distillation_desc:0 "Os aparelhos incluem o uso de fornos, refrigeradores, microondas, misturadores, chaleiras e outros itens domésticos usados na produção de alimentos."
 divine_revelation:0 "Revelação Divina"
 divine_revelation_desc:0 "A base de toda a lei deriva de nossas sagradas escrituras. Só através da obediência a um poder superior pode a nossa sociedade ser devidamente ordenada e a estabilidade ser garantida."
 watertube_boiler:0 "Robótica"
 watertube_boiler_desc:0 "Os robôs foram introduzidos em linhas de montagem, especialmente na indústria automobilística, para melhorar a precisão, velocidade e segurança."
 dreadnought_desc:0 "Transportadores de drones, semelhantes aos porta-aviões de hoje, carregam enxames de drones, e desencadeiam ataques devastadores aos nossos inimigos."
 dreadnought_tech:0 "Transportador de drones"
 dynamite:0 "Mineração de Mar Profundo"
 dynamite_desc:0 "O desenvolvimento de tecnologias de mineração de profundidade avançou significativamente na década de 2000, à medida que as empresas começaram a explorar a extração de minerais valiosos (por exemplo, nódulos polimetálicos, metais de terras raras) do fundo do oceano."
 egalitarianism:0 "Guerra contra o Terror"
 egalitarianism_desc:0 "A guerra contra o terrorismo, oficialmente a Guerra Global contra o Terrorismo (GWOT), é uma campanha militar global iniciada pelos Estados Unidos após os ataques de 11 de setembro de 2001."
 electric_arc_process:0 "Neuralink"
 electric_arc_process_desc:0 "Empresas como Neuralink e Synchron estão desenvolvendo interfaces cérebro-computador que permitem a comunicação direta entre o cérebro e dispositivos digitais. Essas interfaces poderiam revolucionar tratamentos médicos, incluindo ajudar os indivíduos com paralisia recuperar o movimento, melhorar as habilidades cognitivas, e oferecer novas formas de interagir com a tecnologia."
 electric_railway:0 "Transporte Público em Massa"
 electric_railway_desc:0 "Com carros insustentáveis, o transporte público entre as cidades pode ser executado em massa"
 electrical_generation:0 "Computação quântica"
 electrical_generation_desc:0 "Os computadores quânticos são esperados para ser usados para problemas complexos que são atualmente intratáveis para computadores tradicionais, incluindo: descoberta de drogas, simulações de ciência de materiais, criptografia avançada, previsão meteorológica, modelagem financeira, desenvolvimento de inteligência artificial e problemas de otimização em campos como logística e produção de energia, principalmente por alavancar sua capacidade de processar grandes quantidades de dados e resolver problemas com muitas variáveis simultaneamente através de superposição quântica e emaranhamento."
 elevator:0 "Pods de Elevação"
 elevator_desc:0 "Transporte Pods, semelhante aos elevadores, que podem se mover em altas velocidades."
 empiricism:0 "World Wide Web"
 empiricism_desc:0 "A World Wide Web (WWW ou simplesmente a Web) é um sistema de informação que permite o compartilhamento de conteúdo através da Internet através de formas fáceis de usar destinadas a atrair usuários além de especialistas em TI e hobbyists."
 enlightenment_thought:0 "Pensamento de Iluminação"
 enlightenment_thought_desc:0 "Durante a Era da Razão, velhos dogmas começaram a ser questionados. Não foi mais aceito que "Deus o deseja", e os que estavam no poder começaram a justificar sua posição na sociedade. Mesmo os monarcas absolutos viram o prestígio destas novas ideias, e os "Déspotas Iluminados" reformaram os sistemas educativos, jurídicos e económicos da Europa. Estas reformas não foram suficientemente longe, no entanto, e pensadores como John Locke, Voltaire, Jean-Jacques Rousseau e Thomas Paine lideraram um ataque ao estabelecimento que culminou em revoluções na América e na França que eles mesmos inspiraram liberais em todo o mundo."
 fascism:0 "Fascismo"
 fascism_desc:0 "O fascismo é um sistema político onde o governo tem controle estrito sobre todos os aspectos da sociedade."
 field_works:0 "Barreira HESCO"
 field_works_desc:0 "As Barreiras Hesco podem ser erigidas mais rapidamente do que sacos de areia, e fornecer mais proteção."
 film:0 "Propaganda Direta"
 film_desc:0 "Usando implantes cerebrais, a propaganda pode ser inserida diretamente em nossa população"
 flash_freezing:0 "Portátil Freeze-Dryer"
 flash_freezing_desc:0 "Secadores portáteis para uso civil"
 floating_harbor:0 "Ilhas artificiais"
 floating_harbor_desc:0 "Ilhas artificiais são massas de terra feitas pelo homem, geralmente criadas para meios militares"
 food_sterilisation:0 "Esterilização de alimentos"
 food_sterilisation_desc:0 "Por tentativa e erro, os empresários descobriram métodos de preservação de alimentos, tais como o aquecimento do leite em pasteurização ou sua condensação em xarope grosso, a decapagem de frutas e legumes, e a conserva de carnes e sopas. A linha comum entre todas essas tecnologias é a eliminação de germes do alimento preservado, um conceito não totalmente compreendido até a descoberta de bactérias sob microscópios. Com uma compreensão ampla dessas ideias, os padrões na indústria alimentar estão melhorando, e com isso a saúde do público."
 four_field_crop_rotation:0 "Rotação de Quatro Campos"
 four_field_crop_rotation_desc:0 "Famosamente exposto pelo proprietário de terras Charles 'Turnip' Townsend, o uso de fixadores de nitrogênio, como nabos ou trevo, permite que as terras agrícolas permaneçam em uso constante sem se esgotarem ou terem que ser deixadas em pousio."
 fractional_distillation:0 "OGM"
 fractional_distillation_desc:0 "Organismos geneticamente modificados, (OGMs) são métodos feitos pelo homem de mudar a forma como plantas e animais crescem e aparecem para fins de produção de alimentos."
 fruit_jars:0 "Jarros de frutas"
 fruit_jars_desc:0 "A idéia de preservar carne e sopa dentro de latas de metal ganhou popularidade. Outros tipos de preservação de alimentos também estão se espalhando, tais como a preservação de frutas e legumes em líquidos de decapagem ou ferver em compotas."
 fulminates:0 "Fulminatos"
 fulminates_desc:0 "Um material fulminante é aquele que se inflama quando atingido agudamente. Tais materiais incluem íons de mercúrio, prata e potássio. Eles foram descobertos pela primeira vez por Edward Charles Howard em 1800, e sua aplicação militar em sistemas de tampa de percussão logo se tornou aparente."
 functionalism:0 "Funcionalismo"
 functionalism_desc:0 "Um referencial teórico que considera a sociedade como um sistema de componentes definido pelas funções sociais. Usando sistemas mecânicos e biológicos como metáfora, ele vê as estruturas da sociedade e sua interdependência como determinação de sua estabilidade."
 gantry_cranes:0 "Guindastes pesados"
 gantry_cranes_desc:0 "Útil na construção e transporte, guindastes pesados são grandes o suficiente para subir na largura de um navio. Isso lhes dá uma resistência que significa que eles podem levantar as cargas mais pesadas que um navio pode carregar."
 general_staff:0 "Drones"
 general_staff_desc:0 "Os drones são aviões não tripulados que podem ser utilizados para aplicações militares e civis"
 germ_theory:0 "Teoria do Germe"
 germ_theory_desc:0 "Tucídides foi a primeira pessoa a afirmar que as doenças poderiam se espalhar de pessoa para outra e desde tempos antigos temos acreditado que miasmas eram as causas de doenças como a cólera. No entanto, a ciência tem província de que os microrganismos, chamados germes, são responsáveis pela doença."
 gunpowder:0 "Pólvora"
 gunpowder_desc:0 "Um composto químico composto de enxofre, carvão e nitratos, pólvora conflagra rapidamente, expandindo-se em um gás que pode propelir projéteis para baixo tubos. A combustão deixa para trás grandes quantidades de fumaça do enxofre e carvão vegetal, o que torna a mosquetaria um negócio sujo e ofuscante no campo de batalha. As cargas de pólvora também têm mais usos civis na abertura da terra para mineração e construção. Os chineses inventaram a pólvora mil anos antes e usaram-na para fogos de artifício comemorativos e artilharia de cerco."
 gunsmithing:0 "Rifle de Agressão"
 gunsmithing_desc:0 "Os rifles de assalto combinam o poder de fogo de um SMG, e a precisão de um rifle para criar uma poderosa plataforma de armas pequenas."
 gymnastics:0 "Ginástica"
 gymnastics_desc:0 "Para os espartanos a ginástica fez parte do treinamento de vocês recrutas militares, e a palavra em si existe desde a década de 1570 para se referir a exercícios atléticos. Agora, embora percebamos que os espartanos estavam em algo, para disciplinar a mente devemos disciplinar o corpo. Os pioneiros educacionais desenvolveram uma série de exercícios para meninos em vários aparelhos para ajudá - los a desenvolver autodisciplina. Alguns radicais estão até sugerindo estender esses exercícios às meninas."
 gyroscopes:0 "Giroscópios"
 gyroscopes_desc:0 "Um giroscópio é feito combinando uma série de gimbals, que são simplesmente suportes rotativos. Um gimbal gira verticalmente e outro horizontalmente, para que o objeto mais interno suportado possa girar livremente em qualquer direção. Os giroscópios são úteis para manter um objeto estável enquanto seu entorno se move, como uma bússola magnética em um navio lançador."
 handcranked_machine_gun:0 "Sistemas anti-drone"
 handcranked_machine_gun_desc:0 "Sistemas de defesa concebidos para abater drones baratos."
 hydraulic_cranes:0 "Transportador de helicópteros"
 hydraulic_cranes_desc:0 "Transportadores de helicópteros permitem apoiar tropas logísticamente"
 hydraulic_power:0 "Potência hidráulica"
 hydraulic_power_desc:0 "As rodas de água têm sido usadas há muito tempo para moer grãos. Adaptando-os a outros usos industriais, como máquinas de alimentação, é um passo em frente lógico."
 hypodermic_syringes:0 "Seringas hipodérmicas"
 hypodermic_syringes_desc:0 "As inoculações foram originalmente administradas aos pacientes, abrindo a pele e esfregando material doente na ferida. A idéia de usar uma agulha oca para injetar fluidos em um paciente é obviamente mais higiênica, e também tem o benefício de permitir que volumes precisos sejam administrados pelo médico. As primeiras seringas foram feitas de prata, mas o vidro está se tornando popular à medida que os processos de fabricação se tornam mais refinados, permitindo que agulhas mais estreitas sejam feitas."
 idealism:0 "Idealismo"
 idealism_desc:0 "Uma série de filosofias sustentando que nosso conhecimento depende de como percebemos as coisas, o que nos limita a conhecer a ideia de uma coisa, em vez da coisa como ela realmente é."
 identification_documents:0 "Identificação Digital"
 identification_documents_desc:0 "A identificação digital é a representação eletrônica de uma pessoa que lhe permite acessar serviços online, fazer compras e interagir com outras pessoas."
 impressionism:0 "Impressionismo"
 impressionism_desc:0 "Um estilo de arte focado em técnicas recriando a sensação visual geral de uma cena. A mesma ambição artística de recriar o sentimento e a experiência de uma situação também foi aplicada em formas de arte para além do visual."
 improved_fertilizer:0 "Microencapsulação"
 improved_fertilizer_desc:0 "Microencapsulação envolve incluir ingredientes ativos, como vitaminas, sabores e probióticos em um revestimento protetor. Esta tecnologia tornou-se amplamente utilizada em alimentos funcionais para melhorar a entrega de nutrientes, a vida útil e a estabilidade de ingredientes sensíveis, oferecendo novas possibilidades na produção de alimentos, incluindo alimentos fortificados e bebidas."
 international_trade:0 "Neoliberalismo"
 international_trade_desc:0 "O neoliberalismo é distinto do liberalismo na medida em que não defende a política econômica laissez-faire, mas sim é altamente construtivista e defende um estado forte para trazer reformas de mercado em todos os aspectos da sociedade."
 ironclad_tech:0 "Navio de batalha do século 21"
 ironclad_tech_desc:0 "Os navios de guerra do século 21 são capazes de resistir a enormes bombardeamentos de mísseis."
 jeune_ecole:0 "Navio Litoral de Combate"
 jeune_ecole_desc:0 "Navios autônomos são barcos que são essencialmente drones no mar. Além disso, por ter muitas naves menores em vez de algumas grandes, é possível manter um certo nível de manobrabilidade que de outra forma seria impossível."
 labor_movement:0 "Smartphone"
 labor_movement_desc:0 "Um smartphone, muitas vezes chamado simplesmente de telefone, é um dispositivo móvel que combina a funcionalidade de um telefone móvel tradicional com recursos avançados de computação."
 land_reform:0 "Reforma agrária"
 land_reform_desc:0 "A propriedade da terra e a sociedade andam de mãos dadas. A terra é a principal fonte e riqueza e status em qualquer país e, portanto, quem fica a possuir a terra é quem tem riqueza e status. Se queremos criar a sociedade que queremos, temos de estar preparados para alterar fundamentalmente quem é o dono da terra."
 lathe:0 "Linhas de Produção"
 lathe_desc:0 "Uma linha de produção é uma montagem de trabalhadores, cada um com uma tarefa atribuída, que permite a racionalização da produção."
 lathes:0 "Tornos"
 lathes_desc:0 "Um torno é uma ferramenta que gira o material em que a ferramenta está trabalhando, em oposição a uma broca, que é em si girada contra o material. Isto reduz o material de forma simétrica. Isso tem aplicações em muitas indústrias, desde castiçais artesanais até o tédio de peças de artilharia. Os tornos iniciais são alimentados à mão, por cavalo, ou por rodas de água, dependendo do escopo da indústria."
 laws_of_physics:0 "Leis de Física"
 laws_of_physics_desc:0 "As leis fundamentais que regem os corpos em movimento podem ser facilmente observadas com o uso de um telescópio. Sir Isaac Newton foi pioneiro neste campo, graças à sua tecnologia de um telescópio reflexivo de alta qualidade e à aplicação rigorosa das suas observações às previsões científicas existentes por Johannes Kepler."
 crystal_glass:0 "Microprocessador"
 crystal_glass_desc:0 "O microprocessador é o coração da computação moderna, permitindo que os computadores se tornem menores, mais rápidos e mais acessíveis. Isso levou ao desenvolvimento de computadores pessoais e à rápida evolução da tecnologia."
 automatic_machine_guns:0 "Turret Autónoma"
 automatic_machine_guns_desc:0 "Torres estacionárias avançadas capazes de travar automaticamente em alvos inimigos."
 malaria_prevention:0 "Células STEM"
 malaria_prevention_desc:0 "Devido às condições extremas no espaço, os astronautas são especialmente vulneráveis a infecções, dado que a radiação cósmica, microgravidade e estresse psicológico tendem a comprometer o sistema imunológico humano."
 manufacturies:0 "Fabricação"
 manufacturies_desc:0 "As guildas controlavam os métodos e as práticas de contratação que um negócio poderia usar, limitando a entrada na força de trabalho e exigindo que apenas artesãos altamente qualificados e certificados (pela guilda, naturalmente) executassem certas tarefas. Cada vez mais, os industriais deixaram as cidades e fundaram novos locais de inovação, livres dos exigentes padrões e altos salários dos mestres da guilda."
 mass_communication:0 "Telemóveis"
 mass_communication_desc:0 "Comunicação em massa esta é a fácil disseminação de informações utilizando tecnologias como o celular."
 mass_propaganda:0 "Autoeducação"
 mass_propaganda_desc:0 "Através de implantes de chips, todas as informações no mundo podem ser transmitidas diretamente às crianças de nossas nações."
 mass_surveillance:0 "Democracia Direta em Massa"
 mass_surveillance_desc:0 "Permite que cada cidadão vote a qualquer momento, em qualquer coisa, através de microchips implantados pelo cérebro."
 mechanized_farming:0 "Base Interplanetária"
 mechanized_farming_desc:0 "Bases em outros planetas"
 mechanized_workshops:0 "Tecnologias Inteligentes"
 mechanized_workshops_desc:0 "Tecnologias inteligentes são tecnologias que não são tradicionalmente controladas por computadores, mas agora são."
 military:0 "Militar"
 military_aviation:0 "Ataque Orbital"
 military_aviation_desc:0 "Um ataque orbital é um satélite projetado para disparar um projétil de alta potência em um alvo na Terra."
 mobile_armor:0 "Mech"
 mobile_armor_desc:0 "Multi-Firepower-Platform (MFP) é um veículo pesado, semelhante a um tanque, equipado com a mais recente tecnologia para eliminar inimigos autônomos"
 modern_nursing:0 "Aeronaves furtivas"
 modern_nursing_desc:0 "Aeronaves furtivas são aviões projetados para ter uma assinatura de radar inferior."
 modern_sewerage:0 "Criptomoeda"
 modern_sewerage_desc:0 "Uma criptomoeda, criptomoeda ou criptomoeda é uma moeda digital projetada para trabalhar através de uma rede de computadores que não depende de nenhuma autoridade central, como um governo ou banco, para mantê-la ou mantê-la"
 currency_standards:0 "Comércio Online"
 currency_standards_desc:0 "Compras on-line é uma forma de comércio eletrônico que permite aos consumidores comprar diretamente bens ou serviços de um vendedor através da Internet usando um navegador web ou um aplicativo móvel."
 monitor_tech:0 "Navio AI"
 monitor_tech_desc:0 "Naves totalmente controladas pela inteligência artificial."
 musical_instruments:0 "Instrumentos musicais"
 musical_instruments_desc:0 "A música é uma parte fundamental do desenvolvimento de qualquer cultura e arte. Nesse sentido, a evolução dos instrumentos musicais que uma cultura cria primeiro tem uma influência ecoando em todos os desenvolvimentos culturais futuros."
 napoleonic_warfare:0 "Proxy War"
 napoleonic_warfare_desc:0 "Conflitos de proxy são guerras travadas pela influência de duas potências opostas, travadas através de duas potências mais fracas uma contra a outra."
 nationalism:0 "Terrorismo"
 nationalism_desc:0 "Quem sou eu? É uma questão chave que vai para o coração da identidade de uma pessoa. Em tempos passados as pessoas disseram que são de uma província, uma cidade ou até mesmo uma família como uma expressão dessa identidade. Desenvolveram-se novas ideias que transcendem estas noções e, em vez disso, vêem a identidade como algo que é partilhado entre a nação. Além disso, a nação deve estar unida num único país."
 natural_selection:0 "Seleção Natural"
 natural_selection_desc:0 "A seleção natural é um mecanismo pelo qual as formas de vida evoluem passando traços hereditários para as gerações futuras. Sua descoberta fornece uma explicação para como as espécies surgem e se adaptam de acordo com seu ambiente."
 naval_theory:0 "Teoria Naval"
 naval_theory_desc:0 "Aplicando alguma estratégia aos movimentos navais é possível fazer uma Marinha muito mais eficaz."
 drydocks:0 "Estaleiro moderno"
 drydocks_desc:0 "Criar áreas fechadas onde os navios podem ser atracados em terra seca permite uma manutenção mais fácil e completa de navios de carga e navios de guerra."
 navigation:0 "Construção naval moderna"
 navigation_desc:0 "Através de vários métodos diferentes, desde estrelas, mapas, até uma bússola é possível traçar corretamente um curso em todo o mundo."
 neoclassicism:0 "Neoclassicismo"
 neoclassicism_desc:0 "O período clássico de arte, teatro e música estendeu-se de 1750 a 1820, com inovações desde então sendo rotulado Neoclássico. O nome também faz alusão à Antiguidade Clássica, e, portanto, compara a alta cultura ocidental à de Roma e Grécia, estabelecendo assim o pedigree da classe dominante da Europa como mestres do mundo conhecido."
 nitrogen_fixation:0 "Mineração Astrofílicas"
 nitrogen_fixation_desc:0 "A mineração de astroides é a coleta de recursos de astróides no espaço"
 nitroglycerin:0 "Pipelines modernos"
 nitroglycerin_desc:0 "Oleodutos modernos permitem o transporte de carvão, petróleo, GNL (gás natural liquefeito) e outros líquidos em vastas distâncias."
 open_hearth_furnace:0 "Forno de Coração Aberto"
 open_hearth_furnace_desc:0 "A produção de aço envolve a remoção de impurezas de ferro fundido e, em seguida, adicionar em outros materiais para criar o grau de aço que você está depois. Para produzir aço requer temperaturas muito altas e o forno de lareira aberta usa o gás residual do forno para aquecer tijolos e reverter o fluxo de combustível e ar passa sobre esses tijolos para acumular o calor do forno. O processo é mais lento do que outros, mas é mais fácil de controlar e escala permitindo que grandes quantidades de aço sejam produzidas em um único lote."
 open_hearth_process:0 "Impressão 3D precoce"
 open_hearth_process_desc:0 "Enquanto a impressão 3D começou na década de 1980, a década de 2000 viu sua expansão em grande escala de produção. A tecnologia, que permite a construção camada a camada de materiais, ganhou impulso em indústrias como aeroespacial, automotivo e dispositivos médicos."
 opium_dens:0 "Dens de ópio"
 opium_dens_desc:0 "Um den de ópio é simplesmente um lugar onde o ópio pode ser comprado e fumado. No entanto, há pessoas que se preocupam que essas tocas sejam de uma inclinação mais sinistra e sejam uma fonte de corrupção moral."
 paddle_steamer:0 "Balística"
 paddle_steamer_desc:0 "O míssil sabe sempre onde está. Ele sabe disso porque sabe onde não está, subtraindo onde está, de onde não está, ou onde não está, de onde está, o que for maior, obtém uma diferença, ou desvio."
 pan-nationalism:0 "Pan-nationalism"
 pan-nationalism_desc:0 "Through organizations like the EU, de-facto super-states can be formed through trade & economic relations."
 percussion_cap:0 "Rifle de assalto pesado"
 percussion_cap_desc:0 "Fuzileiros pesados, como o SCAR-L, fornecem amplo poder de fogo para operações especiais."
 percussion_caps:0 "Cápsulas de Percussão"
 percussion_caps_desc:0 "As cápsulas de percussão pegam em armas de fogo anteriormente não confiáveis e permitem que disparem em qualquer tempo."
 personal_liberty:0 "Liberdade pessoal"
 personal_liberty_desc:0 "Além da questão de como a sociedade deve ser governada, há também a questão do que deve estar além da governança. Estabelecer liberdades individuais sobre as quais a tirania da maioria não pode interferir é uma parte crucial dos ideais liberais."
 social_media:0 "Redes Sociais"
 social_media_desc:0 "As mídias sociais são uma coleção de tecnologias que permitem aos usuários compartilhar informações, ideias e conteúdo através de comunidades e redes virtuais."
 policing_by_consent:0 "Policiamento por consentimento"
 policing_by_consent_desc:0 "Sir Robert Peel, ao servir como Ministro do Interior, criou a Polícia Metropolitana, uma polícia distinta da polícia de tiranos continentais porque eles são civis agindo no interesse público em vez de soldados reprimindo inimigos políticos."
 political_agitation:0 "Revoluções digitais"
 political_agitation_desc:0 "Ativismo Internet agora tem o poder de estimular grandes revoluções e eventos históricos."
 political_theory:0 "Teoria Política"
 political_theory_desc:0 "Como dirigir um país é uma questão que muitos começaram a fazer e várias teorias foram elaboradas sobre o que exatamente o melhor plano para um estado olharia."
 popular_sovereignty:0 "Soberania Popular"
 popular_sovereignty_desc:0 "A autoridade de um Estado e por extensão de seu governo só pode ser criada e sustentada através do consentimento de seu povo. Num governo livre, os governantes são os servos e o povo, seus superiores e soberanos."
 portland_cement:0 "Cimento Portland"
 portland_cement_desc:0 "Assim nomeado por sua semelhança com pedra quarried de uma ilha em Dorset, Inglaterra, este cimento é um componente eficaz no concreto, usado para construir grandes estruturas. É produzido a partir de calcário e outros materiais comuns, tornando-o muito barato."
 potash:0 "Potassa"
 potash_desc:0 "Produzido por queima de madeira e depósito de cinzas em uma panela de água, potassa é usado em processos químicos, como a produção de vidro, sabão, lixívia, pólvora e fertilizante. Empresta seu nome ao elemento potássio, que é o ingrediente ativo nestes processos."
 power_looms:0 "Teares de Energia"
 power_looms_desc:0 "Um tear é um dispositivo para tecer lã, algodão e outras fibras. Os teares primitivos usavam o poder da mão ou do pé para girar o fio. O "voador voador" inventado em 1733 é creditado com estimulando a revolução industrial, e o uso do poder mecânico na tecelagem permite que tecelões menos qualificados produzam tecido em massa. Outras inovações incluem o tear Jacquard, um sistema de cartões de soco programáveis desenvolvido em 1804 para automatizar padrões."
 power_of_the_purse:0 "Projecção de Energia"
 power_of_the_purse_desc:0 "Projecção de potência usa navios para exercer força em outros países através de pura intimidação."
 pre_modern_warfare:0 "Guerra pré-moderna"
 pre_modern_warfare_desc:0 "Os conflitos do passado são pálidos em comparação com as devastações da guerra moderna, mas ainda eram assuntos sangrentos por direito próprio."
 production:0 "Produção"
 propaganda:0 "Propaganda"
 propaganda_desc:0 "Durante as Guerras Revolucionárias e Napoleônicas, os governos da Europa estabeleceram asas de propaganda para obter apoio público para as dificuldades enfrentadas pelo povo comum. panfletos políticos e desenhos animados satíricos foram distribuídos nas cidades, enquanto versos patrióticos foram escritos para serem cantados em músicas populares."
 puddling_furnaces:0 "Fornos Puddling"
 puddling_furnaces_desc:0 "Um forno puddling é usado para produzir ferro forjado a partir de ferro gusa. Um forno de tijolos é aquecido de modo que o ferro derrete com o cimento que acompanha, após o qual a mistura é trabalhada mecanicamente, como com um pé-de-cabra, de modo que o excesso de carbono no ferro é trazido em contato com o ar, formando monóxido de carbono, enquanto enxofre e outras impurezas são levados para fora por escória mais leve que sobe para a superfície. Após duas horas de trabalho à mão, "bolas de poça" de forma de ferro forjado e pode ser removido da escória restante. Este é um trabalho difícil, hábil e, portanto, caro para executar."
 quinine:0 "Vacina mRNA"
 quinine_desc:0 "Uma vacina mRNA é um tipo de vacina que utiliza uma cópia de uma molécula chamada RNA mensageiro (mRNA) para produzir uma resposta imunitária."
 radio:0 "Comunicação Interplanetária"
 radio_desc:0 "Usando 'ondas' invisíveis, é possível passar informações por uma grande distância mais rápido do que o rádio."
 railways:0 "Caminhos-de-ferro de alta velocidade"
 railways_desc:0 "Tecnologias recentes permitem o transporte ultra-rápido de mercadorias e pessoas"
 rationalism:0 "Revolução Cultural"
 rationalism_desc:0 "A revolução cultural da década de 1960 estimulou uma mudança nas atitudes da sociedade em todo o mundo."
 realism:0 "Câmera Digital"
 realism_desc:0 "Uma câmera digital, também chamada de digicam, é uma câmera que captura fotografias em memória digital."
 reinforced_concrete:0 "BIM"
 reinforced_concrete_desc:0 "A modelagem da informação de construção (BIM) ganhou ampla adoção durante os anos 2000, é uma representação digital das características físicas e funcionais de um edifício. Esta tecnologia de modelagem 3D permitiu um planejamento, design e construção mais eficientes."
 repeaters:0 "Lasers"
 repeaters_desc:0 "Os lasers permitem a concentração de energia em determinadas direções para fins de combate"
 rifling:0 "Rifle de combate leve"
 rifling_desc:0 "O último rifle de combate leve permite ao nosso país equipar os nossos soldados com o poder de fogo mais eficiente possível."
 romanticism:0 "Gravador de Videocassette"
 romanticism_desc:0 "O Videocassette Recorder (VCR) ou gravador de vídeo é um dispositivo eletromecânico que grava áudio analógico e vídeo analógico de televisão ou outras fontes AV e pode reproduzir a gravação depois de rebobinar"
 rotary_valve_engine:0 "Inteligência Artificial"
 rotary_valve_engine_desc:0 "Utilização de IA para produzir mercadorias em massa"
 rubber_recycling:0 "Reciclagem de borracha"
 rubber_recycling_desc:0 "A utilização de um "mastigador" para mastigar e reformar a borracha antiga permite-nos reciclar e reutilizar este material valioso."
 rubberised_fabrics:0 "Tecidos Borrachados"
 rubberised_fabrics_desc:0 "Usando borracha natural para juntar dois tecidos, ou para combinar fibras vegetais em uma espécie de couro artificial, produz artigos à prova d'água, como o casaco Mackintosh, ou roupas elásticas, como suspensórios."
 rule_of_law:0 "Estado de direito"
 rule_of_law_desc:0 "Geralmente presente em um sistema de governo com uma constituição escrita (como nos Estados Unidos) ou não escrita (como no Reino Unido), o Estado de Direito consiste em um grupo de ideias relacionadas sobre jurisprudência, tais como que a violência do estado seja previsível, e, portanto, evitável, por ter o governo estabelecido claramente o que é ilegal e qual será a punição para crimes; e que os próprios agentes do estado estejam sujeitos às leis que eles impõem."
 screw_frigate:0 "Destruidor guiado de mísseis"
 screw_frigate_desc:0 "O destruidor de mísseis guiado usa mísseis para atingir alvos antes mesmo de saberem da existência de uma frota."
 sea_lane_strategies:0 "Estratégia Naval Futuro"
 sea_lane_strategies_desc:0 "Estratégias navais futuras provavelmente giram em torno de IA."
 semaphore_signalling:0 "Sinalização de Semaphore"
 semaphore_signalling_desc:0 "Os sinais ferroviários transmitem instruções aos trens ativos nas linhas ferroviárias, ajudando o tráfego direto mesmo quando uma locomotiva está em movimento e longe do pessoal em uma estação. O uso de sinais semáforos, inspirados em um sistema de sinalização militar utilizado pelos exércitos de Napoleão, cria um sistema uniforme que todas as ferrovias podem utilizar."
 separation_of_powers:0 "Separação de Poderes"
 separation_of_powers_desc:0 "A ideia de distintos ramos de governo com diferentes papéis que supervisionam uns aos outros para prevenir a corrupção e o abuso tornou-se muito mais popular desde o relativo sucesso da "grande experiência americana", com sua Constituição dividindo o governo em poderes executivos, legislativos e judiciais."
 sericulture:0 "Sericultura"
 sericulture_desc:0 "A técnica antiga e bem guardada de cultivar bichos da seda para a produção de seda."
 sewage_systems:0 "Sistemas de esgoto"
 sewage_systems_desc:0 "O crescimento das cidades levou a rios sufocados de esgoto, tornaram-se negros e cheiram a morte. É hora de olhar para trás, para os antigos que constroem sistemas de esgoto para transportar essas águas sujas da cidade."
 shaft_mining:0 "Máquinas de Mineração"
 shaft_mining_desc:0 "Através da implantação de máquinas pesadas, podemos competir no mercado global pela produção de recursos naturais."
 shell_gun:0 "Armadura Reactiva"
 shell_gun_desc:0 "Um tanque de batalha principal (MBT), também conhecido como tanque de batalha ou tanque universal ou simplesmente tanque, é um tanque que preenche o papel de fogo direto protegido por armaduras e manobra em muitos exércitos modernos."
 slag_fertilisers:0 "Fertilizantes de escória"
 slag_fertilisers_desc:0 "O baixo valor de pH dos resíduos de altos fornos e conversores de aço torna-o uma excelente adição ao solo para fins de agricultura. A escória de cal de silicato é mais solúvel do que o calcário natural ou a dolomite, aumentando o teor de fosfato do solo."
 socialism:0 "Populismo da Ala Direita"
 socialism_desc:0 "O populismo de direita, também chamado de populismo nacional e populismo de direita, é uma ideologia política que combina política de direita com retórica populista e temas"
 society:0 "Sociedade"
 enclosure:0 "Agricultura eficiente"
 enclosure_desc:0 "Ao praticar a agricultura em massa, com a ajuda de um sistema regulamentado pelo governo, podemos aumentar a nossa produção o suficiente para competir no mercado mundial."
 intensive_agriculture:0 "Pesticidas"
 intensive_agriculture_desc:0 "Produtos químicos usados na produção de alimentos que eliminam insetos e bactérias."
 steam_donkey:0 "Produção sustentável"
 steam_donkey_desc:0 "Com a crescente conscientização do impacto ambiental, os fabricantes passaram a adotar métodos de produção mais sustentáveis."
 threshing_machine:0 "Voo espacial comercial"
 threshing_machine_desc:0 "Aumenta a eficiência de nossos painéis solares, usinas nucleares e moinhos de vento"
 steel_frame_buildings:0 "Hologramas"
 steel_frame_buildings_desc:0 "A holografia é uma técnica que permite o registro de uma frente de onda e posterior reconstrução. É mais conhecido como um método de geração de imagens tridimensionais, e tem uma ampla gama de outros usos, incluindo armazenamento de dados, microscopia e interferometria. Em princípio, é possível fazer um holograma para qualquer tipo de onda."
 steel_railway_cars:0 "Automóvel elétrico"
 steel_railway_cars_desc:0 "Investigação e desenvolvimento em veículos autónomos acelerados durante os anos 2000. O Grande Desafio da DARPA (2004 e 2005), organizado pelo Departamento de Defesa dos EUA, foi um marco importante, mostrando tentativas iniciais de auto-driving carros."
 stormtroopers:0 "Especialista"
 stormtroopers_desc:0 "Ter tropas humanas treinadas e equipadas especificamente para a destruição de IA e captura de unidades."
 streamliners:0 "Flutuantes"
 streamliners_desc:0 "Novos projetos de trem que utilizam a potência de trator moderna e a nova construção de corpo de alumínio permitem que as ferrovias executem mais trens de forma confiável em velocidades mais altas."
 submarine:0 "Submarinos Futuros"
 submarine_desc:0 "Os futuros submarinos são impulsionados por tecnologias futuras, que permitem ataques devastadores."
 multilateral_alliances:1 "Criónica"
 multilateral_alliances_desc:0 "ryonics é a prática de preservar indivíduos que estão legalmente mortos, congelando-os em temperaturas muito baixas, com a esperança de que a tecnologia médica futura possa ser capaz de revivê-los e curar a condição que causou sua morte."
 synthetic_dye:0 "Tingimento sintético"
 synthetic_dye_desc:0 "Isso incorporou um processo químico que criou diferentes tipos de corante de forma sintética. Revolucionou a coloração do tecido e pôs fim à produção de corantes agrícolas, que se tornaram demasiado caros para produzir."
 system_gin:0 "O Automóvel"
 system_gin_desc:0 "Os automóveis permitem o transporte rápido de pessoas e bens em todas as terras."
 telegraph:0 "Telégrafo"
 telegraph_desc:0 "A eletricidade pode ser usada para passar sinais para baixo linhas quase instantaneamente, como com código Morse. A principal fonte de atraso está no operador humano, que precisa ser bem treinado para codificar e decodificar as mensagens que foram transferidas sob a forma de "pontos" curtos e longos e "pedaços" de ruído."
 telephone:0 "Cidade Inteligente"
 telephone_desc:0 "A integração de dispositivos IoT na infraestrutura da cidade permite que as cidades monitorem e gerenciem recursos como água, eletricidade, tráfego e resíduos em tempo real, melhorando a eficiência e a sustentabilidade."
 telephones:0 "Telefones"
 telephones_desc:0 "Em teoria, sabíamos que a ideia do telégrafo de fala poderia ser possível, mas não tínhamos a certeza de como. Os avanços no campo da eletrônica tornaram esta idéia finalmente possível e o telefone nasce."
 tin_cans:0 "Latas"
 tin_cans_desc:0 "O conceito de alimentos enlatados remonta aos frascos de vidro usados pelos exércitos da Revolução Francesa. Logo, a idéia se espalhou para uso civil. Carne ou sopa que foi cozida dentro de uma lata de metal é protegida da exposição ao mundo exterior e pode ser consumida no lazer por famílias de classe média. O nome deriva de tinplate, que tem uma fina camada de estanho fora da placa de ferro ou aço para proteger o metal da ferrugem ao ar livre."
 trench_works:0 "Tanque de Reconhecimento"
 trench_works_desc:0 "Dispositivos usados para enviar ondas de choque e bloquear tropas inimigas"
 triage:0 "Aeronaves VTOL"
 triage_desc:0 "A aeronave vertical de descolagem e aterragem (VTOL) é um tipo de aeronave que pode decolar e aterrar verticalmente sem necessidade de uma pista"
 urban_planning:0 "Moeda Fiat"
 urban_planning_desc:0 "As moedas fiat são fontes monetárias que não são apoiadas pelo ouro."
 urbanization:0 "Organizações Internacionais"
 urbanization_desc:0 "Organizações internacionais como as Nações Unidas visam manter a paz e promover o crescimento econômico em todo o mundo."
 vaccination:0 "Vacinação"
 vaccination_desc:0 "Inocular pessoas com o que se esperava ser formas menos virulentas de uma doença tinha sido conhecido por séculos, mas também era altamente arriscado. A vacinação, que envolvia o uso de uma doença menos perigosa, mas relacionada, ou o tratamento dos agentes das doenças para que perdessem a capacidade de infectar, era muito mais segura e muito mais confiável."
 vacuum_canning:0 "Fabricação Lean"
 vacuum_canning_desc:0 "A Lean manufacturing, conceito que surgiu na década de 1990, foca na redução de resíduos e na melhoria da eficiência dos sistemas de produção. Enfatiza a melhoria contínua dos processos, eliminando atividades de não-valorização, melhorando a qualidade e aumentando a satisfação do cliente."
 vulcanization:0 "Drones autônomos"
 vulcanization_desc:0 "Os drones de entrega avançaram além dos estágios experimentais, com empresas como Amazon e Wing testando sistemas comerciais de entrega de drones, capazes de mover pacotes de forma rápida e eficiente em áreas urbanas e rurais."
 wargaming:0 "Simulações de Combate"
 wargaming_desc:0 "Ao simular cenários de guerra imaginários e praticar estratégia, é possível melhorar as habilidades de combate dos oficiais."
 water_treatment:0 "Tratamento da Água"
 water_treatment_desc:0 "Descobriu - se que a água transporta doenças para nossas casas. Ainda a ciência tem a resposta, podemos simplesmente tornar a água limpa novamente pela aplicação de filtração e tratamentos químicos."
 wood_pulp_papermaking:0 "Fabricação de papel de celulose de madeira"
 # gold_standard_desc: "This meant a currency system based on gold. Money was rather expensive to produce by the government and this could sometimes result in a low of money stock. However, the good thing was that the gold prices were rather stable and the trust in gold was high, making the currency stable."
 # savings_banks_desc: "The middle-class is growing larger and wealthier thanks to education and a strong work ethic. Many individuals wish to be part of railways through Africa; dams across the Nile; fleets of ocean Greyhounds; majestic, self-amortizing canals; plantations of ripening tea; all from tuppence prudently, fruitfully, frugally invested (to be specific) in the Dawes-Tomes-Mousely-Grubbs Fidelity Fiduciary Bank."
 # silver_standard_desc: "This meant a currency system based on silver. Money was cheaper to produce by the government which meant that there was rarely any lack of money in the country. However, the problem was that the silver prices had a tendency to be dominated by gold prices, which meant that foreign trade was often suffering."
#  acidic_and_basic_converters: "Acidic and Basic Converters"
#  acidic_and_basic_converters_desc: "The original Bessemer converters had a lining of insulating clay between the walls and the molten iron. The #clay is acidic and affects the composition of the resulting steel. By replacing the clay with basic (alkaline) materials such as magnesite, chromite or dolomite, or more acidic materials such as ganister, the process can be fine tuned to remove even more impurities, depending upon the content of the iron ore."
#  fluid_compressed_steel: "Fluid Compressed Steel"
#  fluid_compressed_steel_desc: "This process involves the use of a hydraulic forging press to put the steel under great pressure while still a #fluid. This squeezes the tiny pockets of gas impurities out of the cooling ingots, allowing for a much higher quality steel by preventing the #formation of blowholes and piping."
#  global_trade_desc: "By the end of the 18th century, the world-system had encompassed almost the entire globe, with raw materials being imported #from the colonies and peripheral nations and turned into finished goods in the global core, to be exported in turn."
#  guilds: "Guilds"
#  guilds_desc: "The guild system was a way of organizing labor which mandated participation in the guild and in advancing through its ranks in order #to practice the guild trade within a city. While it protected the living standards of the guild members and supposedly ensured better quality #work, it also raised prices and stymied innovation."
#  hydraulic_forging_press: "Hydraulic Forging Press"
#  hydraulic_forging_press_desc: "A hydraulic forging press applies applies massive force, up to thousands of pounds per square inch, to a material #that is being worked while hot. An engine drives water, air or hydraulic fluid through valves connected to a piston, which in turn presses the #die onto the material. The valves can be turned on and off by the operator, allowing the material to be manipulated and precise amounts of force #applied at will."
#  mutualism_desc: "An economic theory usually associated with anarchism, mutualism opposes capital interest but advocates free markets and advocates #the formation of  mutual savings banks as a method for loans."
#  news_agencies: "News Agencies"
#  news_agencies_desc: "Organizations which sell news reports to various media, such as newspapers. This allows for media to include reports of #events and developments beyond the reach of their own bureaus and international news to be reported even in local media."
#  one-nationism: "One-nationism"
#  one-nationism_desc: "A type of conservative politics wherein social obligation and responsibility towards the poor and needy is combined with #traditional conservative ideals. Opposed to class struggle, one-nation conservatives seek to create a hierarchy wherein the classes support each #other."
#  percussion_oil_drilling: "Percussion Oil Drilling"
#  percussion_oil_drilling_desc: "When using a percussion drill, the drill-bit is raised by hand and then released to bite into the earth under the #force of gravity. Depths of up to around thirty metres are possible using this technique."
#  private_banks: "Private Banks"
#  private_banks_desc: "The wealthy merchant families of city states, and the royal families of European monarchies, need somewhere safe to keep #their piles of gold and someone to look after their finances. The first banks were created with this goal in mind."
#  ricardian_economics: "Ricardian Economics"
#  ricardian_economics_desc: "David Ricardo formalized several concepts that made up the Classical School of Economics, such as economic rent, the #labor theory of value, and comparative advantage."
#  self_acting_looms_desc: "Gradual improvements in loom technology have transformed the weaving industry and vastly increased the output of fabrics #factories. By using mechanical power for more and more operations, the role of the weaver is reduced to merely keeping the machine running and #clearing blockages. Children are especially useful for this as they can crawl into smaller spaces than adults. Shutting the machines down while #such work is carried out has been judged to be less profitable than allowing for the occasional child to be mangled."
#  smithian_economics: "Smithian Economics"
#  smithian_economics_desc: "Building upon the ideas of the earlier Physiocrats, with their agrarian opposition to the 'unproductive labor' of the #feudal system, Adam Smith led an attack on mercantilism which founded the Classical School of Economics."
#  steam_engines: "Steam Engines"
#  steam_engines_desc: "Pioneers in steam technology usually had uses other than locomotion in mind. For example, Richard Trevithick built huge #engine houses that dot the Cornish landscape to keep the tin mines free from flooding."
#  steam_hammer: "Steam Hammer"
#  steam_hammer_desc: "Hammering out metals is useful for both shaping and alloying the material. When used on pig iron, this creates wrought iron or #mild steel, the difference being how much carbon is left in the alloy. The use of steam means both more efficiency and better precision than #hammering out the alloy by hand."
#  steam_lathes: "Steam Lathes"
#  steam_lathes_desc: "The lathe is a machine used for boring holes of various shapes and sizes into materials, or for otherwise whittling them down #symmetrically. Exploiting steam power to drive lathes allows industry to use more precision in engineering."
#  stock_exchanges: "Stock Exchanges"
#  stock_exchanges_desc: "Organized trading of financial instruments dates back to the Italian city states and the Dutch Republic. A stock exchange #brings together buyers and sellers of assets such as government debt and shares in companies."#
#  tunnelling_shields: "Tunnelling Shields"
#  tunnelling_shields_desc: "When digging a mine shaft or railway tunnel, supporting the vast weight of the earth above the workers is vital for the #integrity of the project. A tunnelling shield is a mobile structure made of steel that provides temporary support on the active site of digging. #As the tunnelling shield is moved along, such as on a railway track, a more permanent support is laid, such as brickwork or timbers. The first #use of such a device was in the construction of the Thames Tunnel in 1825 by Anglo-French engineer Marc Isambard Brunel, the father of the more #famous Isambard Kingdom Brunel."
# alienation: "Alienation"
# alienation_desc: "The creation of the capitalist means of production has fundamentally altered the relationship of the worker to his work. No longer is he the craftsmen who creates something unique or the farmer who gains a share of the produce. In his production he is able to objectify his individuality and his character. Now though the capitalist means of production estranges a person from their very humanity, they are no longer the director of their own actions and through that they gain a profound sense of alienation."
# experimental_psychology: "Experimental Psychology"
# experimental_psychology_desc: "The human mind is a very complicated things, what do people experience when they receive a sensory stimulus and is it the same for you as it is for me? Trying to measure these things is no easy manner, but the recent advancements in the field of psychology have created a new field called experimental psychology where tests can be done to see how people react to stimuli."
# global_trade: "Global Trade"
# historical_materialism: "Historical Materialism"
# historical_materialism_desc: "What is society? This is a complicated question but if we were to define society as the union of the productive capacity and the relationships people have to the means of production we can begin to analyze past societies and how they have developed and evolved over time. We call this methodological approach Historical Materialism."
# individualism_desc: "A philosophy focused on the interests, happiness and autonomy of the individual. This includes the right of the individual to pursue its own self-interest, conclude for itself what is true and false, to think and act independently of society."
# institutionalization: "Institutionalization"
# institutionalization_desc: "If we want to expand the role of the state we need to expands the means the state has to deliver these roles. The building up the institutions of the state are the means to doing this. This steadily institutionalization of functions that were previously in the private sphere also bring along profound societal changes as well."
# pragmatism: "Pragmatism"
# pragmatism_desc: "The problem with philosophers is that they seek knowledge for knowledge sake and they also seek to create a nice unchanging universe to suit their theories. Pragmatism explicitly rejects these two tenants. Knowledge should actually be viewed only from the point of view of what practical use it has and we should accept that the universe itself is ever changing."
# religion_of_humanity: "Religion of Humanity"
# religion_of_humanity_desc: "The rise of secularism has started to free our people from the chains of superstition that religion forces on people but at the same time we lost the societal cohesion that organized religion provided. The religion of humanity offers the social cohesion of organized religion without the superstition. The cynics describe at as Catholicism minus Christianity but it also offers all the things a religion should."
# self_acting_looms: "Self-Acting Looms"
# transcendentalism: "Transcendentalism"
# transcendetalism_desc: "Transcendentalism was a philosophical movement that was founded by the German philosopher Immanuel Kant in his book Critique of Pure Reason published in 1781. It has also been described as critical philosophy as it sees philosophy's role as that of criticism rather than justification of knowledge. The task of philosophy shifts for being about establishing theories about knowledge and instead subjecting these theories to critical review to see who valid they are."
