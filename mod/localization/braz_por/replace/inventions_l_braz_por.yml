#vitamins_desc: "By isolating certain nutrients that the body needs, it is possible to make sure that more people have a healthy and balanced diet."

 central_archives:0 "Arquivos digitais"
 central_archives_desc:1 "Um arquivo digital é um site criado com a finalidade de preservar dados para uso posterior."
 steelworking:0 "Refinarias Offshore"
 steelworking_desc:1 "O óleo de refinaria permite a criação de combustíveis eficientes para veículos, eletricidade e plástico"
 prospecting:0 "FOREX"
 prospecting_desc:1 "A troca de moedas estrangeiras por um lucro."
 baking_powder:0 "Opções Vegetarianas"
 baking_powder_desc:1 "Carnes à base de plantas permitem que nossa população vegetariana prospere em bens uma vez inalcançáveis"
 mechanical_tools:0 "Agricultura de Fábrica"
 mechanical_tools_desc:1 "Agricultura industrial permite o produto em massa de carnes através da crueldade animal"
 rubber_mastication:0 "Tecnologias avançadas de levantamento"
 rubber_mastication_desc:1 "Sistemas de varredura LiDAR (Light Detection and Ranging) foram usados para criar modelos 3D de locais de construção altamente precisos, enquanto os equipamentos habilitados para GPS ajudaram a melhorar a precisão da escavação, classificação e outros trabalhos no local."
 pumpjacks:0 "Frete elétrico"
 pumpjacks_desc:1 "Semelhante aos carros elétricos, os caminhões de contentores elétricos permitem a entrega sem emissão de mercadorias para locais"
 shift_work:0 "Blockchain"
 shift_work_desc:1 "As cadeias de bloqueio são o rastreio da origem dos bens numa cadeia de abastecimento através da tecnologia informática. A adoção de blockchain por empresas como Walmart e IBM no final dos anos 2000 ajudou a garantir transparência na fonte de alimentos, melhorando a confiança dos consumidores."
 paved_roads:0 "Cidade Verde"
 paved_roads_desc:1 "Cidades totalmente verdes e automatizadas"
 pasteurization:0 "Carnes de laboratório"
 pasteurization_desc:1 "Produção em massa de carnes de laboratório"
 pneumatic_tools:0 "Megaestruturas"
 pneumatic_tools_desc:1 "A construção de megaestruturas via IA, Impressão 3D e Metaverso."
 steam_turbine:0 "Concreto neutro-carbono"
 steam_turbine_desc:1 "Concreto que não gera poluição"
 plastics:0 "Co-Bots"
 plastics_desc:1 "Robôs colaborativos (Cobots): Cobots trabalham ao lado de humanos em configurações de fabricação, auxiliando em tarefas como montagem, manuseio de materiais e inspeção de qualidade, o que aumenta a produtividade e reduz os riscos."
 dough_rollers:0 "Alimentos impressos em 3D"
 dough_rollers_desc:1 "A produção rápida de todos os alimentos através de computadores automatizados"
 oil_turbine:0 "Bioplásticos"
 oil_turbine_desc:1 "Soluções plásticas seguras e baseadas no ambiente."
 standing_army:0 "Doutrina do Exército da Guerra Fria"
 standing_army_desc:1 "Os desafios complexos da política externa e da agitação interna já não podem ser enfrentados por milícias apressadamente mutiladas. Os tempos modernos exigem que os militares estejam sempre prontos para agir."
 mandatory_service:0 "Rotorcraft"
 mandatory_service_desc:1 "A invenção do helicóptero permite opções de ataque e apoio baseadas em helicópteros."
 military_drill:0 "Exercícios de combate"
 military_drill_desc:1 "Como diz o ditado, "a prática faz a perfeição", e isso é tão verdadeiro para os soldados como é para os músicos. Não há exército mais valorizado pelos generais do que um exército que pode reagir a todos os comandos instantaneamente e sem confusão."
 line_infantry:0 "Infantaria por agressão"
 line_infantry_desc:1 "Soldados equipados com equipamento padronizado e treinados com métodos padronizados dão uma maior uniformidade a um exército, e assim lhe dão uma maior confiabilidade."
 logistics:0 "GPS"
 logistics_desc:1 "O Global Positioning System (GPS) é um sistema de satélites que fornece capacidades de posicionamento crítico para usuários militares, civis e comerciais em todo o mundo."
 electric_telegraph:0 "Arma de assalto"
 electric_telegraph_desc:1 "As armas de assalto modernas podem ser usadas da mesma forma que uma IFV para auxiliar as operações de infantaria."
 enlistment_offices:0 "Ataque Satélite"
 enlistment_offices_desc:1 "Os satélites de ataque podem destruir outros satélites para fins de combate"
 military_statistics:0 "Autônomo Jet-Fighter"
 military_statistics_desc:1 "Caças a jato totalmente controlados por inteligência artificial"
 self_propelled_torpedoes:0 "Submarino Autónoma"
 self_propelled_torpedoes_desc:1 "Submarinos autônomos são um tipo de navio totalmente controlado por submarinos."
 war_propaganda:0 "Propaganda gerada automaticamente"
 war_propaganda_desc:1 "Convencer uma população a comprometer o seu tempo, os seus recursos e o seu sangue, tudo por causa da vitória, é todo um campo de trabalho por si só."
 nco_training:0 "Helicóptero autónomo"
 nco_training_desc:1 "Helicópteros totalmente controlados por drones."
 destroyer:0 "Destruidor Futuro"
 destroyer_desc:1 "Navios mais leves, equipados com torpedos e armas menores, são tão importantes nas marinhas modernas quanto navios capitais."
 landing_craft:0 "Sistemas informáticos inter-ralados por IA"
 landing_craft_desc:1 "Sistemas computacionais intergratos com IA para nossas naves"
 flamethrowers:0 "Patógenos fabricados"
 flamethrowers_desc:1 "Um patogénico fabricado é uma doença criada num laboratório com o objectivo de matar o maior número possível de pessoas."
 banking:0 "E- mail"
 banking_desc:1 "E-mail (short for electronic mail; alternativamente soletrado e-mail) é um método de transmissão e recepção de mensagens usando dispositivos eletrônicos."
 academia:0 "Digitalização"
 academia_desc:1 "A digitalização do mundo através de avanços na tecnologia de sistemas de informação informática."
 international_relations:0 "A pílula"
 international_relations_desc:1 "Comprimidos ou antibióticos são cápsulas consumíveis que visam entorpecer os sintomas de doenças médicas. O comprimido muitas vezes se refere à invenção do controle de bith, permitindo um maior crescimento populacional."
 stock_exchange:0 "Globalização económica"
 stock_exchange_desc:1 "A globalização econômica é a crescente integração das economias em todo o mundo, que envolve a troca de bens, serviços, capital, tecnologia e pessoas."
 medical_degrees:0 "Disco compacto"
 medical_degrees_desc:1 "O disco compacto (CD) é um formato digital de armazenamento de dados de disco óptico que foi co-desenvolvido pela Philips e Sony para armazenar e reproduzir gravações de áudio digital."
 organized_sports:0 "Operações de Contra-Terror"
 organized_sports_desc:1 "A formação em combate ao terrorismo (por vezes designada por treino de resposta ao terrorismo ou preparação contra o terrorismo) aborda a ameaça de um ataque terrorista iminente, fornecendo métodos de sensibilização, preparação, prevenção e resposta."
 central_banking:0 "Esquerdo Moderno"
 central_banking_desc:1 "A política de esquerda descreve o leque de ideologias políticas que apoiam e buscam alcançar igualdade social e igualitarismo"
 corporate_charters: "Liberalismo empresarial"
 corporate_charters_desc: "Liberalismo corporativo é uma tese na historiografia dos Estados Unidos e uma ferramenta para sua porta aberta imperialismo em que a elite corporativa se tornar tanto os principais beneficiários e os principais lobistas para os regulamentos supostamente anti-negócio"
 joint_stock_companies: "Teoria Monetária Moderna"
 joint_stock_companies_desc: "A teoria monetária moderna ou teoria monetária moderna (MMT) é uma teoria macroeconômica heterodoxa que descreve a moeda como um monopólio público e desemprego como evidência de que uma moeda monopolista está restringindo excessivamente o fornecimento dos ativos financeiros necessários para pagar impostos e satisfazer desejos de poupança."
 investment_banks: "AI Consultores Financeiros"
 investment_banks_desc: "Os conselheiros de Robo utilizam algoritmos e inteligência artificial (IA) para fornecer serviços de planeamento financeiro com intervenção humana mínima"
 corporate_management: "Governação da Internet"
 corporate_management_desc: "Permite que o governo tome o controle total da internet"
 dialectics:0 "Influenciadores"
 dialectics_desc:1 "Um influenciador, também conhecido como influenciador das redes sociais, é um tipo de celebridade da Internet que é influente e bem conhecido nas redes sociais. O referente moderno do termo é geralmente um papel remunerado em que uma entidade de negócios paga para as mídias sociais influência-para-contratar atividade para promover seus produtos e serviços, conhecido como marketing influenciador."
 psychiatry:0 "Memes"
 psychiatry_desc:1 "Um meme da Internet, ou meme, é um item cultural (como uma ideia, comportamento ou estilo) que se espalha pela Internet, principalmente através de plataformas de mídia social."
 postal_savings:0 "Títulos hipotecários"
 postal_savings_desc:1 "Uma hipoteca subprime é um tipo de empréstimo que é dado a pessoas que não cumprem os requisitos típicos para uma hipoteca de um banco tradicional ou união de crédito."
 human_rights:0 "Bem-estar dos animais"
 human_rights_desc:1 "As posições de bem-estar dos animais afirmam que os animais devem ser protegidos de certas actividades humanas."
 mutual_funds:0 "Gigeconomy"
 mutual_funds_desc:1 "Em janeiro de 2021, um curto aperto do estoque do varejista de videogame americano GameStop e outros títulos ocorreu, causando grandes consequências financeiras para certos fundos hedge e grandes perdas para os vendedores curtos."
 zeppelins:0 "Nave estelar"
 zeppelins_desc:1 "Naves estelares permitem o transporte rápido de seres humanos e bens entre planetas"
 international_exchange_standards:0 "Mercado solar"
 international_exchange_standards_desc:1 "O mercado bolsista foi expandido para o espaço exterior"
 psychoanalysis:0 "Neuroplasticidade"
 psychoanalysis_desc:1 "Neuroplasticidade é o estudo da forma como os neurônios formam conexões no cérebro."
 philosophical_pragmatism:0 "Cyberwarfare"
 philosophical_pragmatism_desc:1 "Cyberwarfare é uma série de ataques cibernéticos ou contra-ataques entre estados-nação ou organizações internacionais para danificar ou perturbar os computadores, redes ou sistemas de informação de outra nação."
 modern_financial_instruments:0 "Fundo Hedge digital"
 modern_financial_instruments_desc:1 "Os métodos de fazer dinheiro continuam a crescer e a proliferar. Alguns métodos podem envolver dinheiro fluindo numa pirâmide para cima, mas todos eles envolvem cada vez mais dinheiro fluindo o tempo todo."
 macroeconomics:0 "Economia Digital"
 macroeconomics_desc:1 "O estudo da economia on-line e economia de serviços eletrônicos."
 behaviorism:0 "Terapia Psicodélica"
 behaviorism_desc:1 "A pesquisa sobre o potencial terapêutico de substâncias psicodélicas (como psilocibina, MDMA e LSD) ganhou impulso significativo. Estas substâncias estão sendo estudadas para seus efeitos em condições como transtorno de estresse pós-traumático (PTSD), depressão, ansiedade e dependência."
 analytical_philosophy:0 "Teleterapia"
 analytical_philosophy_desc:1 "Teleterapia e Aconselhamento Remoto: Telessaúde, que explodiu durante a pandemia de COVID-19, continua crescendo como uma maneira conveniente para os indivíduos acessarem a terapia remotamente."
 electrical_capacitors:0 "Nanomateriais"
 electrical_capacitors_desc:0 "A capacidade de manipular materiais em uma nanoescala (milionésimos de um metro) está levando a avanços em várias indústrias. O grafeno, uma única camada de átomos de carbono, é um dos nanomateriais mais promissores, oferecendo excepcional resistência, condutividade e flexibilidade."
 corporatism:0 "Pós-Neoliberalismo"
 corporatism_desc:0 "Com o fim do neoliberalismo, a sociedade visa melhorar o sistema capitalista atual."
 drone_carrier:0 "Transportador de drones"
 drone_carrier_desc:0 "Transportadores de drones, semelhantes aos porta-aviões de hoje, carregam enxames de drones, e desencadeiam ataques devastadores aos nossos inimigos."
