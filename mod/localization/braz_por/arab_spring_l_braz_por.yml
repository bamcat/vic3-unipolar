 # ==========================================
 # SPARK EVENTS
 # ==========================================

 2011_protests.1.t: "Um vendedor de rua se acende"
 2011_protests.1.d: "Na cidade provincial de Sidi Bouzid, um jovem vendedor de rua chamado Mohamed Bouazizi colocou fogo em frente aos escritórios do governo local depois que a polícia confiscou seu carrinho e o humilhou publicamente. O ato de desespero tornou-se um pára-raios. Em poucas horas, as imagens do seu protesto espalharam-se pelas redes sociais. As multidões reuniram-se não apenas em Sidi Bouzid, mas através de [ROOT.GetCountry.GetName]. A fúria acumulada de uma geração — sobre a corrupção, o desemprego e o peso moído da regra autoritária — encontrou o seu símbolo.\n\n O regime de [SCOPE.GetRootScope.GetCountry.GetRuler.GetLastName] deve decidir como responder. O que quer que faça, o mundo está a ver."
 2011_protests.1.f: "O desespero de um homem tornou-se de uma nação."
 2011_protests.1.a: "Destruam as manifestações antes que se espalhem."
 2011_protests.1.b: "Oferta de concessões – anunciar uma investigação sobre conduta policial"

 2011_protests.2.t: "O Tremor Tunisino"
 2011_protests.2.d: "A agitação na Tunísia enviou uma onda de choque pelo mundo árabe. Os canais de satélite estão transmitindo as cenas de Tunis o tempo todo — e pessoas comuns em [ROOT.GetCountry.GetName] estão assistindo. A questão que está sendo sussurrada nas cafeterias e nas redes sociais é a mesma que todo regime autoritário da região está se perguntando agora:\n\n Pode acontecer aqui?"
 2011_protests.2.f: "Todos os regimes estão a observar. Todos os dissidentes estão a tomar notas."
 2011_protests.2.a: "A Tunísia é diferente — isto não se espalhará para [ROOT.GetCountry.GetName]"
 2011_protests.2.b: "Tome precauções — aumente a segurança antes que isso saia do controle"

 # ==========================================
 # MISSING STRUCTURAL MODIFIERS
 # ==========================================

 modifier_arab_spring_transition_cabinet: "Governo de transição"
 modifier_arab_spring_transition_cabinet_desc: "Um novo governo está a ser formado na sequência da revolução. A legitimidade é elevada nestes primeiros dias — mas terá de ser consolidada antes que a contra-revolução encontre o seu fundamento."

 modifier_arab_spring_kick_out_of_insurrection: "Descendo das Barricadas"
 modifier_arab_spring_kick_out_of_insurrection_desc: "A revolução alcançou seus objetivos imediatos. Esse grupo está abandonando sua postura insurrecionária e entrando na vida política formal — impulsionada pela boa vontade do momento."

 modifier_arab_spring_regime_ig_defeated: "Derrotado pela Revolução"
 modifier_arab_spring_regime_ig_defeated_desc: "A associação deste grupo com o antigo regime custou-lhe caro. Foi empurrado para fora do governo e sua força política está diminuída. Resta ver se pode reconstruir das margens."

# ==========================================
 # ARAB SPRING INTERNATIONAL EVENTS
 # ==========================================

 # ── arab_spring_intl.1 ───────────────────

 arab_spring_intl.1.t: "O mundo árabe está queimando"
 arab_spring_intl.1.d: "Protestos irromperam em todo o mundo árabe, começando na Tunísia. Décadas de governo autoritário, estagnação econômica e repressão política levaram milhões às ruas."
 arab_spring_intl.1.f: "A história observa aqueles que assistem à história."
 arab_spring_intl.1.a: "Apoiar os manifestantes — a democracia e os direitos humanos exigem-no"
 arab_spring_intl.1.b: "Apoiar os regimes históricos — a estabilidade e os nossos interesses"
 arab_spring_intl.1.c: "Apelar à contenção de todas as partes — instar a uma resolução pacífica"

 # ── arab_spring_intl.2 ───────────────────

 arab_spring_intl.2.t: "A questão da intervenção"
 arab_spring_intl.2.d: "A situação em [scope:civil_war_country_scope.GetName] deteriorou-se em guerra civil aberta. As forças de [scope:civil_war_country_scope.GetRuler.GetName] estão atacando populações civis, e há relatos credíveis de massacres. A comunidade internacional está pedindo uma resposta.\n\n[ROOT.GetName] previamente expressaram apoio aos movimentos de protesto. A questão agora é se esse apoio se estende à ação — e a que custo."
 arab_spring_intl.2.f: "Palavras e ações são moedas diferentes."
 arab_spring_intl.2.a: "Forçar uma zona de exclusão aérea — proteger os civis dos ataques aéreos"
 arab_spring_intl.2.b: "Armar e apoiar as forças da oposição no terreno"
 arab_spring_intl.2.c: "Esta não é a nossa guerra — fique fora dela"

 # ── arab_spring_intl.3 ───────────────────

 arab_spring_intl.3.t: "A Primavera Árabe: Um Julgamento"
 arab_spring_intl.3.d_success: "A Primavera Árabe produziu pelo menos uma verdadeira transição democrática. É uma conquista frágil, facilmente revertida — mas é real. Para [ROOT.GetName], que assistiu a esses eventos desdobrarem-se à distância, há uma satisfação silenciosa em ver que o arco da história pode, às vezes, dobrar-se para a justiça. A questão agora é como apoiar o que foi ganho."
 arab_spring_intl.3.d_islamist: "A Primavera Árabe terminou — e não como seus arquitetos esperavam. Em toda a região, os movimentos islâmicos têm se mostrado mais bem organizados do que as coalizões de protesto secular que iniciaram as revoltas. Para [ROOT.GetName], o resultado é desconfortável: a democracia que defendeu produziu governos cujos valores diferem acentuadamente dos seus próprios. A relação com a nova ordem árabe exigirá uma navegação cuidadosa."
 arab_spring_intl.3.d_failure: "A Primavera Árabe foi extinta. Os regimes que pareciam tremer estabilizaram-se, os seus serviços de segurança reconstituídos, os seus adversários no exílio ou na prisão. Para [ROOT.GetName], o episódio é um lembrete de que a clareza moral é mais fácil do que a eficácia moral. As queixas que provocaram as revoltas não foram resolvidas. Eles só foram adiados."
 arab_spring_intl.3.f: "O mundo segue em frente. A região não esquece."
 arab_spring_intl.3.a: "Faça o balanço do que aconteceu"

 # ==========================================
 # INTERNATIONAL MODIFIER NAMES
 # ==========================================

 arab_spring_intl_pro_democracy_stance: "Poder pró-democracia"
 arab_spring_intl_pro_democracy_stance_desc: "Este país aliou-se publicamente aos movimentos de protesto da Primavera Árabe. O seu prestígio entre as nações democráticas aumentou — mas as relações com os regimes árabes em vigor esfriaram."

 arab_spring_intl_stability_first_stance: "Estabilidade Primeiro"
 arab_spring_intl_stability_first_stance_desc: "Este país optou por apoiar regimes árabes vigentes sobre os movimentos de protesto. As relações estratégicas na região são mais fortes — mas a um custo para a sua reputação internacional."

 arab_spring_intl_neutral_stance: "Restrição Cautelosa"
 arab_spring_intl_neutral_stance_desc: "Este país pediu uma resolução pacífica sem o apoio de nenhum dos lados. Conservou a sua flexibilidade diplomática — mas sacrificou a influência sobre o resultado."

 arab_spring_intl_western_backing: "Fundo Ocidental"
 arab_spring_intl_western_backing_desc: "Este movimento recebeu apoio público dos governos ocidentais. A atenção internacional está a aumentar o seu impulso e a tornar a repressão mais onerosa para o regime."

 arab_spring_intl_regime_backing: "Apoio ao Regime Ocidental"
 arab_spring_intl_regime_backing_desc: "Os governos ocidentais lançaram o seu peso por trás deste governo em vez dos manifestantes. A validação externa reforça a autoridade e a legitimidade do regime."

 arab_spring_intl_no_fly_zone: "Obrigação de uma zona de exclusão aérea"
 arab_spring_intl_no_fly_zone_desc: "Os militares estão a ser destacados para impor uma zona de exclusão aérea sobre a zona de conflito. A intervenção está a proteger os civis — mas é dispendiosa e atrai o escrutínio internacional."

 arab_spring_intl_arming_rebels: "Forças de Oposição Armadas"
 arab_spring_intl_arming_rebels_desc: "As armas e os equipamentos estão a ser canalizados para as forças de oposição no conflito. A política é secreta, mas não secreta — e as consequências a longo prazo de quem recebe este apoio permanecem pouco claras."

 arab_spring_intl_intervention_costs: "Custos da intervenção"
 arab_spring_intl_intervention_costs_desc: "A intervenção militar no exterior está sobrecarregando recursos e gerando debate político nacional. Os custos em tesouro e capital político são reais."

 arab_spring_intl_non_interventionist: "Não Intervencionista"
 arab_spring_intl_non_interventionist_desc: "Este país optou por não intervir na guerra civil árabe. A decisão reduziu sua exposição e preservou o capital político nacional — embora os críticos argumentem que abandonou seus valores declarados."
