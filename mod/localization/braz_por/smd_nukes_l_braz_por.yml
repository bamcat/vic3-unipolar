 MILITARY_PANEL_TAB_NUCLEAR_TOOLTIP: "Programa de Armas Nucleares"
 
 NUCLEAR_BEGIN_ENRICHMENT_TOOLTIP: "Lançar um programa de enriquecimento de urânio. Requer pelo menos #bold 3 centrais nucleares#! no seu território e estado de potência principal. O programa leva vários anos para ser concluído e atrairá a atenção internacional. \n #r Assinaturas do #b O Tratado de Não Proliferação #! não pode enriquecer o urânio. #!"
 NUCLEAR_BEGIN_PRODUCTION_TOOLTIP: "Fabricar uma ogiva nuclear. Requer pelo menos #bold 1 silo nuclear#!. Mais rápido que o enriquecimento. Cada produção completa adiciona uma ogiva ao seu arsenal."
 NUCLEAR_ENRICHMENT_PROGRESS_TOOLTIP: "Progresso no enriquecimento de urânio. Alcança 100 quando o enriquecimento está completo e a capacidade nuclear é alcançada."
 NUCLEAR_PRODUCTION_PROGRESS_TOOLTIP: "Progresso na produção da ogiva. Alcança 100 quando a ogiva estiver completa e adicionada ao seu arsenal."
 NUCLEAR_PLANTS_INFO: "Instalações nucleares no seu país: [GetPlayer.MakeScope.ScriptValue('nuclear_plant_count_sv')|v0] \n Obrigatória para iniciar o enriquecimento: #bold 3#!"
