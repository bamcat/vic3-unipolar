 # European Union
 
 je_european_union: "União Europeia"
 je_european_union_reason: "A União Europeia é um dos projectos políticos e económicos mais ambiciosos da era moderna.\n\n Baseada nos princípios da integração económica, da governação partilhada e da segurança colectiva, a UE proporciona aos seus membros um mercado comum, uma política comercial coordenada e um lugar à mesa na definição do futuro do continente. A adesão traz a promessa de livre circulação de bens, serviços, capitais e pessoas — uma oportunidade sem precedentes de prosperidade.\n\n No entanto, a União não está isenta dos seus desafios. Os membros devem navegar por negociações complexas, respeitar os regulamentos supranacionais e comprometer os elementos da soberania nacional. Quanto mais profunda a integração cresce, mais o destino de cada membro está ligado ao do coletivo.\n\n Se um país prospera ou luta na UE depende da sua capacidade de equilibrar os interesses nacionais com o bem comum, forjando um caminho dentro de uma união que pretende ser mais do que a soma das suas partes."

