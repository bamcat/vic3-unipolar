 opec_events.12.t: "Produção de cortes OPEP"
 opec_events.12.d: "Os Estados­‐Membros da OPEP votaram a favor da redução das quotas de produção de petróleo. Para o próximo ano, todas as nações membros restringirão sua produção de petróleo, a fim de apertar o abastecimento global e apoiar os preços."
 opec_events.12.a: "Vamos obedecer."

 opec_events.13.t: "OPEP Embargo de Petróleo Imposto"
 opec_events.13.d: "A Organização dos Países Exportadores de Petróleo votou para impor um embargo ao petróleo. Os Estados­‐Membros da OPEP restringirão colectivamente as exportações de petróleo à nação visada, perturbando gravemente a sua economia."
 opec_events.13.a: "Isto irá reformular o comércio global"

