 ### ═══════════════════════════════════════
 ### GAME CONCEPTS
 ### ═══════════════════════════════════════

 concept_international_organization: "Organização Internacional"
 concept_international_organization_desc: "Organizações internacionais são instituições que operam além das fronteiras nacionais para coordenar políticas, promover o comércio, garantir a segurança coletiva ou promover o intercâmbio cultural entre suas nações membros. Eles vêm em várias formas: [concept_free_trade_agreement]s, [concept_financial_agreement]s, [concept_military_defense_agreement]s, [concept_cultural_pact]s e [concept_cooperative_agreement]s."

 concept_intergovernmental_organization: "Organização Intergovernamental"
 concept_intergovernmental_organization_desc: "Uma Organização Intergovernamental é uma [concept_international_organization] cujos membros são nações soberanas. Ao contrário de [concept_nongovernmental_organization]s, os OIGs exigem adesão formal e podem proporcionar benefícios diplomáticos, econômicos ou militares significativos."

 concept_nongovernmental_organization: "Organização Não Governamental"
 concept_nongovernmental_organization_desc: "Organizações não governamentais são instituições independentes que operam internacionalmente sem serem controladas por qualquer governo. Todas as nações são afiliadas a ONGs por padrão. Os governos podem optar por bani-los, tolerar ou subvencionar, o que afeta a opinião da ONG e os benefícios que proporcionam."

 concept_international_treaty: "Tratado Internacional"
 concept_international_treaty_desc: "Um Tratado Internacional é um acordo formal vinculativo entre nações soberanas. Ao contrário de [concept_intergovernmental_organization]s, os tratados não exigem a adesão organizacional contínua — uma nação é signatária ou não. Os signatários recebem benefícios diplomáticos, enquanto a retirada prejudica as relações com outros signatários."

 international_treaty_type:0 "[concept_international_treaty]
 concept_free_trade_agreement: "Acordo de Comércio Livre"
 concept_free_trade_agreement_desc: "Um Acordo de Comércio Livre é um [concept_international_organization] que reduz as barreiras comerciais entre os países membros, promovendo a troca de bens e o crescimento econômico."

 concept_financial_agreement: "Acordo financeiro"
 concept_financial_agreement_desc: "Um Acordo Financeiro é um [concept_international_organization] focado na cooperação monetária, no financiamento do desenvolvimento e na estabilidade financeira entre seus membros. Membros recebem +5% de Influência e +1 de Reputação Diplomática."

 concept_military_defense_agreement: "Acordo de Defesa Militar"
 concept_military_defense_agreement_desc: "Um Acordo de Defesa Militar é um [concept_international_organization] construído sobre o princípio da segurança coletiva. Um ataque a um membro é considerado um ataque a todos."

 concept_cultural_pact: "Pacto Cultural"
 concept_cultural_pact_desc: "Um Pacto Cultural é um [concept_international_organization] que promove o intercâmbio de patrimônio compartilhado, linguagem e cultura entre seus membros."

 concept_cooperative_agreement: "Acordo de Cooperação"
 concept_cooperative_agreement_desc: "Um Acordo Cooperativo é um [concept_international_organization] focado na ampla diplomacia multilateral. Ao contrário de outros tipos de organização, os Acordos Cooperativos não fornecem modificadores diretamente. A sua influência é exercida através de resoluções e iniciativas."

 concept_united_nations: "Nações Unidas"
 concept_united_nations_desc: "As Nações Unidas são um [concept_cooperative_agreement] das nações do mundo, dedicadas à manutenção da paz internacional, segurança e cooperação."

 concept_nato: "NATO"
 concept_nato_desc: "A Organização do Tratado do Atlântico Norte é uma [concept_military_defense_agreement] que vincula nações norte-americanas e europeias em defesa coletiva."

 concept_g7: "G7"
 concept_g7_desc: "O Grupo dos Sete é um [concept_financial_agreement] das maiores economias avançadas do mundo, coordenando a política fiscal e monetária."

 concept_opec: "OPEP"
 concept_opec_desc: "A Organização dos Países Exportadores de Petróleo é um [concept_free_trade_agreement] que coordena as políticas de petróleo entre as principais nações produtoras de petróleo."

 concept_eec: "CEE"
 concept_eec_desc: "A Comunidade Económica Europeia é um [concept_free_trade_agreement] que estabelece um mercado comum entre os Estados-Membros europeus."

 concept_arab_league: "Liga Árabe"
 concept_arab_league_desc: "A Liga Árabe é um [concept_cultural_pact] promovendo a cooperação entre as nações de língua árabe."

 concept_imf: "FMI"
 concept_imf_desc: "O Fundo Monetário Internacional é um [concept_financial_agreement] promovendo a cooperação monetária internacional e a estabilidade financeira."

 concept_esa: "ESA"
 concept_esa_desc: "A Agência Espacial Europeia é um [concept_cooperative_agreement] dedicado à exploração e utilização do espaço."

 concept_asean: "ASEAN"
 concept_asean_desc: "A Associação das Nações do Sudeste Asiático é um [concept_cooperative_agreement] promovendo crescimento econômico e estabilidade regional no Sudeste Asiático."

 concept_saarc: "SAARC"
 concept_saarc_desc: "A Associação Sul-Asiática de Cooperação Regional é um [concept_cooperative_agreement] que promove a cooperação regional entre os estados da Ásia do Sul."

 concept_cis: "CIS"
 concept_cis_desc: "A Comunidade de Estados Independentes é um [concept_cooperative_agreement] para coordenação entre vários estados pós-soviéticos."

 concept_who: "QUEM"
 concept_who_desc: "A Organização Mundial de Saúde é uma [concept_cooperative_agreement] direcionando e coordenando a política internacional de saúde."

 concept_iaea: "AIEA"
 concept_iaea_desc: "A Agência Internacional de Energia Atômica é um [concept_nongovernmental_organization] que promove o uso pacífico da energia nuclear e trabalha para prevenir a proliferação nuclear."

