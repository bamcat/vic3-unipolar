 # United Nations
 je_united_nations: "Nações Unidas"
 je_united_nations_reason: "\n\nAs Nações Unidas servem como um organismo internacional de diplomacia, manutenção da paz e esforços humanitários.\n\nMembros do Conselho de Segurança Permanente:\n- [GetGlobalVariable('permanent_members_1').GetCountry.GetName]\n- [GetGlobalVariable('permanent_members_2').GetCountry.GetName]\n- [GetGlobalVariable('permanent_members_3').GetCountry.GetName]\n- [GetGlobalVariable('permanent_members_4').GetCountry.GetName]\n- [GetGlobalVariable('permanent_members_5').GetCountry.GetName]\n\n\n As Nações Unidas servem como um organismo internacional para diplomacia, manutenção da paz e esforços humanitários. As decisões da ONU — especialmente do Conselho de Segurança — podem influenciar directamente os acontecimentos futuros no seu país."

 # ── PROPOSE BUTTON ────────────────────────
 
 un_propose_motion_button: "Propor uma Resolução"
 un_propose_motion_button_desc: "Proponha uma resolução da ONU para que todos os Estados-Membros votem. Se a resolução for aprovada, todos os países terão os seus efeitos durante cinco anos. Só pode ser proposto uma vez por ano."
 un_no_motion_active_tt: "Nenhuma resolução está actualmente em debate"
 
 # ── VOTE BUTTONS ─────────────────────────
 
