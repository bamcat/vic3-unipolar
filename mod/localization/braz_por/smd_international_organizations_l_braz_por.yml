  ### ══════════════════════════════════════════
 ### AMNESTY INTERNATIONAL
 ### ══════════════════════════════════════════

 ngo_events.1.t: "Anistia Internacional condena nossas políticas"
 ngo_events.1.d: "A Amnistia Internacional publicou um relatório condenatório sobre os direitos humanos da nossa nação, citando as nossas leis atuais como uma violação sistemática das liberdades fundamentais. A comunidade internacional tomou conhecimento, e o nosso governo enfrenta uma pressão crescente para resolver estas preocupações."
 ngo_events.1.a: "Sua crítica não muda nada"
 ngo_events.1.b: "Vamos rever as suas preocupações"

 ngo_events.2.t: "Anistia internacional louva a reforma"
 ngo_events.2.d: "As nossas recentes reformas legislativas foram reconhecidas pela Amnistia Internacional como um importante passo em frente para os direitos humanos. O seu relatório anual destaca o nosso progresso, aumentando a reputação internacional da nossa nação."
 ngo_events.2.a: "Estamos orgulhosos do nosso progresso"

 ngo_events.3.t: "Relatórios de Anistia sobre Descanso Civil"
 ngo_events.3.d: "A Amnistia Internacional publicou um relatório especial que documenta a agitação civil generalizada que assola a nossa nação. Exortam o nosso governo a abordar as causas profundas do descontentamento através de reformas significativas e não de repressão."
 ngo_events.3.a: "Vamos considerar as reformas"
 ngo_events.3.b: "Os nossos assuntos internos não são da sua conta."

 ### ══════════════════════════════════════════
 ### RED CROSS
 ### ══════════════════════════════════════════

 ngo_events.10.t: "Cruz Vermelha oferece ajuda humanitária"
 ngo_events.10.d: "A Cruz Vermelha Internacional ofereceu-se para implantar trabalhadores humanitários para ajudar civis afetados pelo conflito em curso. Suas equipes de ajuda estão prontas para prestar cuidados médicos, abrigo e comida às populações deslocadas em nossas regiões devastadas pela guerra."
 ngo_events.10.a: "Congratulamo-nos com a sua assistência"
 ngo_events.10.b: "Não podemos permitir trabalhadores estrangeiros numa zona de guerra."

 ngo_events.11.t: "Cruz Vermelha critica conduta de guerra"
 ngo_events.11.d: "A Cruz Vermelha Internacional emitiu uma declaração pública expressando profunda preocupação com a conduta das nossas forças armadas. Relatos de extensas vítimas civis e destruição de infra-estruturas nas zonas de conflito chamaram a atenção internacional. Instam todas as partes a respeitarem as Convenções de Genebra."
 ngo_events.11.a: "Vamos cooperar com os investigadores deles."
 ngo_events.11.b: "Negamos estas alegações."

 ngo_events.12.t: "Cruz Vermelha oferece alívio de crise"
 ngo_events.12.d: "Apesar da ausência de guerra aberta, a Cruz Vermelha Internacional identificou uma crescente crise humanitária dentro das nossas fronteiras. A ampla agitação civil e a perturbação económica criaram condições que exigem assistência internacional. Oferecem-se para coordenar os esforços de socorro das populações afectadas."
 ngo_events.12.a: "Aceitamos a ajuda deles."
 ngo_events.12.b: "Podemos tratar disto sozinhos."

 ### ══════════════════════════════════════════
 ### IAEA
 ### ══════════════════════════════════════════

 ngo_events.20.t: "A AIEA solicita inspecção nuclear"
 ngo_events.20.d: "A Agência Internacional da Energia Atómica solicitou formalmente o acesso às nossas instalações nucleares para uma inspecção abrangente da segurança e da conformidade. Como não-signatário do Tratado de Não-Proliferação, o nosso programa nuclear tem atraído um maior escrutínio internacional. A AIEA assegura-nos que a inspecção é rotineira, mas a recusa enviaria um sinal claro à comunidade internacional."
 ngo_events.20.a: "Nossas instalações estão abertas à inspeção"
 ngo_events.20.b: "Nosso programa nuclear é uma questão soberana"

 ngo_events.21.t: "A AIEA recomenda o registo de segurança nuclear"
 ngo_events.21.d: "Após uma revisão do nosso programa nuclear, a Agência Internacional de Energia Atómica elogiou formalmente o nosso compromisso com as normas de segurança e o cumprimento das normas de não proliferação. A nossa adesão ao TNP e cooperação com os inspectores internacionais reforçou a nossa posição na comunidade nuclear global."
 ngo_events.21.a: "Continuamos empenhados na energia nuclear pacífica"

 ngo_events.22.t: "A AIEA suscita preocupações de proliferação"
 ngo_events.22.d: "A Agência Internacional de Energia Atómica alarmou a direcção do nosso programa nuclear. Sem a adesão do TNP e com a nossa recusa contínua de cooperar com os inspectores, a AIEA emitiu uma declaração formal expressando preocupação com o eventual desenvolvimento de armas. A comunidade internacional está atenta."
 ngo_events.22.a: "Estamos abertos ao diálogo"
 ngo_events.22.b: "Afirmamos o nosso direito soberano à tecnologia nuclear"

 ### ══════════════════════════════════════════
 ### MODIFIERS
 ### ══════════════════════════════════════════

 ngo_amnesty_scrutiny: "Sob a Anistia"
 ngo_amnesty_scrutiny_desc: "A Amnistia Internacional está a acompanhar de perto o nosso registo dos direitos humanos na sequência de recentes críticas. A legitimidade do governo está sob pressão."

 ngo_amnesty_reform_pressure: "Pressão da Reforma"
 ngo_amnesty_reform_pressure_desc: "O relatório da Anistia Internacional sobre a agitação civil criou pressão interna e internacional para a reforma, mas ajudou a amortecer o sentimento revolucionário."

 ngo_redcross_aid: "Ajuda Humanitária da Cruz Vermelha"
 ngo_redcross_aid_desc: "Os trabalhadores da Cruz Vermelha estão prestando assistência humanitária a civis em zonas de conflito, reduzindo a mortalidade e aumentando nossa reputação internacional."

 ngo_redcross_cooperation: "Cooperação na Cruz Vermelha"
 ngo_redcross_cooperation_desc: "Nossa cooperação com a Cruz Vermelha em relação à conduta em tempo de guerra melhorou nossa posição internacional e reduziu a infâmia gerada por nossas ações militares."

 ngo_redcross_relief: "Alívio de Crise na Cruz Vermelha"
 ngo_redcross_relief_desc: "A Cruz Vermelha está fornecendo ajuda humanitária durante este período de crise civil, ajudando a estabilizar as populações afetadas."

 ngo_iaea_inspectors: "Inspetores presentes da AIEA"
 ngo_iaea_inspectors_desc: "Os inspetores da AIEA estão operando dentro de nossas instalações nucleares, compartilhando conhecimentos técnicos e de segurança. A sua presença acelera a transferência de tecnologia e aumenta a nossa reputação diplomática."
