 ### ORGANIZATIONS — Names & Descriptions
 ### ═══════════════════════════════════════

 ### United Nations
 io_un_name: "Nações Unidas"
 io_un_abbreviation: "ONU"
 io_un_desc: "O [concept_united_nations] é um [concept_cooperative_agreement] fundado para manter a paz e segurança internacionais, desenvolver relações amigáveis entre as nações e promover o progresso social. Ao contrário de outros [concept_intergovernmental_organization]s, a ONU não fornece modificadores diretamente para seus membros. Sua influência é exercida através de resoluções diplomáticas, mandatos de manutenção da paz e iniciativas globais."
 io_un_tooltip: "O [concept_united_nations] é um [concept_cooperative_agreement] das nações do mundo.\n Clique para ver os detalhes."

 ### NATO
 io_nato_name: "Organização do Tratado do Atlântico Norte"
 io_nato_abbreviation: "NATO"
 io_nato_desc: "O [concept_nato] é um [concept_military_defense_agreement] estabelecido em 1949, vinculando nações norte-americanas e europeias em defesa coletiva. Um ataque armado contra um membro é considerado um ataque contra todos. A OTAN coordena exercícios militares conjuntos, padroniza equipamentos e mantém estruturas de comando integradas."

 ### G7
 io_g7_name: "Grupo de Sete"
 io_g7_abbreviation: "G7"
 io_g7_desc: "O [concept_g7] é um [concept_financial_agreement] composto pelas maiores economias avançadas do mundo. Os membros coordenam a política fiscal, a política monetária e a governança econômica. A adesão confere uma influência diplomática significativa e credibilidade financeira."

 ### OPEC
 io_opec_name: "Organização dos Países Exportadores de Petróleo"
 io_opec_abbreviation: "OPEP"
 io_opec_desc: "O [concept_opec] é um [concept_free_trade_agreement] dos principais países produtores de petróleo que coordenam as políticas de petróleo entre os países membros. A OPEP procura garantir a estabilização dos mercados petrolíferos e o retorno justo das nações produtoras."

 ### EEC
 io_eec_name: "Comunidade Económica Europeia"
 io_eec_abbreviation: "CEE"
 io_eec_desc: "O [concept_eec] é um [concept_free_trade_agreement] que estabelece um mercado comum entre os Estados-Membros europeus. Reduz as barreiras comerciais, harmoniza as regulamentações econômicas e promove a livre circulação de bens, serviços, capital e trabalho entre os países membros."
 
 ### Arab League
 io_arab_league_name: "Liga Árabe"
 io_arab_league_abbreviation: "LAS"
 io_arab_league_desc: "O [concept_arab_league] é um [concept_cultural_pact] de nações de língua árabe que promove a cooperação política, econômica, cultural e social entre seus membros. A Liga coordena políticas sobre assuntos de interesse comum e media disputas entre Estados árabes."

 ### IMF
 io_imf_name: "Fundo Monetário Internacional"
 io_imf_abbreviation: "FMI"
 io_imf_desc: "O [concept_imf] é um [concept_financial_agreement] que promove cooperação monetária internacional, estabilidade cambial e arranjos de câmbio ordenados. Fornece assistência financeira e aconselhamento político aos países membros que enfrentam dificuldades na balança de pagamentos."

 ### ESA
 io_esa_name: "Agência Espacial Europeia"
 io_esa_abbreviation: "ESA"
 io_esa_desc: "O [concept_esa] é um [concept_cooperative_agreement] dedicado à exploração e utilização do espaço exterior. Os Estados-Membros reúnem recursos para desenvolver veículos de lançamento, satélites e missões científicas que nenhuma nação europeia poderia realizar sozinha."

 ### ASEAN
 io_asean_name: "Associação das Nações do Sudeste Asiático"
 io_asean_abbreviation: "ASEAN"
 io_asean_desc: "O [concept_asean] é um [concept_cooperative_agreement] das nações do Sudeste Asiático promovendo crescimento econômico, progresso social e desenvolvimento cultural. A ASEAN facilita a estabilidade regional e proporciona um quadro para o diálogo multilateral na região Ásia-Pacífico."

 ### WHO
 io_saarc_name: "Associação Sul-Asiática para a Cooperação Regional"
 io_saarc_desc: "O [concept_saarc] é um [concept_cooperative_agreement] entre os países da Ásia do Sul voltados para a cooperação regional, coordenação do desenvolvimento e diálogo multilateral."

 io_cis_name: "Comunidade de Estados Independentes"
 io_cis_desc: "O [concept_cis] é um [concept_cooperative_agreement] entre os estados pós-soviéticos focados em consulta regional, coordenação econômica e cooperação intergovernamental prática."

 io_who_name: "Organização Mundial da Saúde"
 io_who_abbreviation: "QUEM"
 io_who_desc: "O [concept_who] é um [concept_cooperative_agreement] direcionando e coordenando a política internacional de saúde. Fornece liderança em questões de saúde globais, estabelece normas e padrões, monitora tendências de saúde e coordena respostas a emergências internacionais de saúde."

 ### ═══════════════════════════════════════
 ### TREATIES — Names & Descriptions
 ### ═══════════════════════════════════════

 io_treaty_geneva_name: "Convenções de Genebra"
 io_treaty_geneva_desc: "Uma série de tratados conhecidos como Convenções de Genebra são responsáveis pelo estabelecimento de normas de direito internacional para o tratamento humanitário durante conflitos armados. Os signatários do [concept_international_treaty] concordam em proteger soldados feridos, prisioneiros de guerra e civis em tempo de guerra."

 io_treaty_cwc_name: "Convenção sobre as Armas Químicas"
 io_treaty_cwc_desc: "A Convenção de Armas Químicas é um [concept_international_treaty] que proíbe o desenvolvimento, produção, aquisição, estoque, retenção, transferência e uso de armas químicas. Os signatários concordam em destruir os estoques existentes sob verificação internacional."

 io_treaty_npt_name: "Tratado de Não Proliferação"
 io_treaty_npt_desc: "O Tratado de Não Proliferação de Armas Nucleares é um [concept_international_treaty] destinado a impedir a propagação de armas nucleares, promover o desarmamento e facilitar o uso pacífico da energia nuclear sob salvaguardas internacionais."

 io_treaty_bwc_name: "Convenção sobre armas biológicas"
 io_treaty_bwc_desc: "A Convenção sobre Armas Biológicas é uma convenção de [concept_international_treaty] que proíbe o desenvolvimento, produção e armazenamento de armas biológicas e de toxinas. Foi o primeiro tratado multilateral de desarmamento a proibir toda uma categoria de armas."

 io_treaty_cat_name: "Convenção contra a Tortura"
 io_treaty_cat_desc: "A Convenção Contra a Tortura é uma Convenção que proíbe todas as formas de tortura e tratamentos ou castigos cruéis, desumanos ou degradantes. Os signatários comprometem-se a tomar medidas eficazes para impedir a tortura dentro da sua jurisdição."

 ### ═══════════════════════════════════════
 ### NGOs — Names & Descriptions
 ### ═══════════════════════════════════════

 io_iaea_name: "Agência Internacional da Energia Atómica"
 io_iaea_abbreviation: "AIEA"
 io_iaea_desc: "A AIEA promove o uso pacífico da energia nuclear e trabalha para impedir a sua utilização para fins militares. Realiza inspeções, presta assistência técnica e estabelece normas internacionais de segurança para instalações nucleares."

 io_redcross_name: "Cruz Vermelha Internacional"
 io_redcross_abbreviation: "CICV"
 io_redcross_desc: "A Cruz Vermelha Internacional fornece ajuda humanitária durante conflitos armados e desastres naturais. Controla o cumprimento das Convenções de Genebra, visita prisioneiros de guerra e facilita a comunicação entre familiares separados."

 io_amnesty_name: "Anistia Internacional"
 io_amnesty_abbreviation: "IA"
 io_amnesty_desc: "A Anistia Internacional investiga e expõe abusos de direitos humanos em todo o mundo. Faz campanhas para a libertação de presos políticos, a abolição da tortura e da pena de morte e a protecção dos refugiados e migrantes."

