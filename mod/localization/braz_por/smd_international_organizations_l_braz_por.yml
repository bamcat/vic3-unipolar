 je_imf_loan_reason: "Um empréstimo do Fundo Monetário Internacional foi alargado para [ROOT.GetCountry.GetName]. Em troca de financiamento de emergência, o país aceitou condições significativas: altas taxas de juros, comércio livre obrigatório e obrigações para com as grandes potências que subscrevem o fundo."

 imf_je_obligations_active_tt: "Grandes obrigações de poder ainda estão em vigor. Os credores estrangeiros mantêm influência sobre as principais decisões de política económica."
 imf_je_obligations_met_tt: "Grandes obrigações de poder foram cumpridas. O país mantém total soberania econômica — embora as condições de empréstimo permaneçam em vigor."

 decision_leave_imf: "Deixar o FMI"
 decision_leave_imf_desc: "Retirar do Fundo Monetário Internacional. O país deixará de ser elegível para apoio financeiro do FMI se se aproximar da falência, mas estará livre de obrigações e interferências do credor. Esta decisão não pode ser revertida.\n\n Nota: Você não pode sair enquanto estiver com um empréstimo ativo do FMI."
 imf_cannot_leave_while_indebted_tt: "Não é possível sair do FMI enquanto existe um empréstimo activo"


 imf_button_pay_obligations_name: "Obrigações de pagamento"
 imf_button_pay_obligations_desc: "Pagar as restantes grandes obrigações de poder cedo. Custa 500 ouro e requer dívida abaixo de 50%, mas imediatamente restaura a soberania econômica plena e melhora as relações com todas as grandes potências."
 imf_pay_obligations_cost_tt: "Requer dívida escalonada abaixo de 50% e 500 ouro"
 imf_obligations_paid_tt: "Obrigações pagas cedo. Grandes relações de poder melhoraram."

 # imf_events.1 — Loan offer
 imf_events.1.t: "Intervenção do FMI"
 imf_events.1.d: "O tesouro de [ROOT.GetCountry.GetName] está em crise. A dívida atingiu um nível que deixa os mercados nervosos e os credores cautelosos. O Fundo Monetário Internacional tomou conhecimento — e enviou uma delegação para oferecer financiamento de emergência.\n\n Os termos não são generosos. As taxas de juro serão fixadas a níveis punitivos. O país será obrigado a adoptar o comércio livre, independentemente da sua política económica existente. E os grandes poderes que subscrevem o fundo esperarão que certas obrigações sejam cumpridas. Mas a alternativa — que se aproxima da falência sem uma rede de segurança — pode ser pior."
 imf_events.1.f: "A soberania e a solvência raramente estão disponíveis ao mesmo tempo."
 imf_events.1.a: "Aceite o empréstimo — precisamos do financiamento"
 imf_events.1.b: "Recusar — vamos gerir os nossos próprios assuntos"

 # imf_events.2 — Great power notification
 imf_events.2.t: "Empréstimo do FMI Estendido"
 imf_events.2.d: "[SCOPE.sCountry('imf_debtor_scope').GetName] aceitou um pacote de empréstimos do FMI. Como uma das grandes potências que subscrevem o fundo, [ROOT.GetCountry.GetName] agora detém obrigações da nação devedora. O acordo vem com implicações estratégicas e financeiras."
 imf_events.2.f: "A dívida é uma forma de diplomacia."
 imf_events.2.a: "Bom — isso nos dá influência"
 imf_events.2.b: "Infelizmente — os termos impostos são demasiado severos"

 # imf_events.3 — Loan complete
 imf_events.3.t: "Programa do FMI concluído"
 imf_events.3.d: "Cinco anos após a aceitação de um empréstimo do FMI, [ROOT.GetCountry.GetName] cumpriu as suas obrigações de programa. Os pagamentos de juros foram feitos, as condições suportadas, e os grandes credores de poder satisfeitos. O país emerge da experiência com sua soberania restaurada — e, esperamos, com suas finanças em melhor ordem do que quando começou."
 imf_events.3.f: "O livro está equilibrado. As lições são mais difíceis de medir."
 imf_events.3.a: "Conseguimos passar por ela."

 # imf_events.4 — Leaving
 imf_events.4.t: "Retirada do FMI"
 imf_events.4.d: "[ROOT.GetCountry.GetName] está retirando-se do Fundo Monetário Internacional. A decisão reflecte a convicção de que os custos da adesão — as condições, as obrigações, a perda da soberania económica durante uma crise — ultrapassam os benefícios do acesso ao financiamento de emergência.\n\n Os grandes poderes não ficarão satisfeitos. E se [ROOT.GetCountry.GetName] se aproximar novamente da falência, não haverá rede de segurança."
 imf_events.4.f: "A independência tem um preço. Assim como a dependência."
 imf_events.4.a: "Estamos sozinhos — como devemos"

 # imf_events.5 — Great power notification of leaving
 imf_events.5.t: "Um país deixou o FMI"
 imf_events.5.d: "[SCOPE.sCountry('imf_leaver_scope').GetName] retirou-se do Fundo Monetário Internacional. A decisão é uma repreensão à ordem financeira internacional — e sinaliza que [SCOPE.sCountry('imf_leaver_scope').GetName] pretende traçar seu próprio curso econômico, para melhor ou para pior."
 imf_events.5.f: "Um devedor a menos. Uma alavanca a menos."
 imf_events.5.a: "Anotado"

 # imf_events.10 — War bonds
 imf_events.10.t: "Títulos de Guerra"
 imf_events.10.d: "Com o tesouro sobrecarregado e a guerra em curso, o Ministério das Finanças propôs uma medida de emergência: a emissão de títulos de guerra. Cidadãos e investidores seriam convidados a emprestar dinheiro ao Estado em troca de futuro reembolso com juros, proporcionando uma injeção imediata de dinheiro para financiar o esforço de guerra.\n\n As obrigações funcionarão — mas são dívidas, e dívidas nos compostos em tempo de guerra rapidamente. O consumo de suprimentos aumentará à medida que o dinheiro flui para a máquina militar."
 imf_events.10.f: "Uma nação toma emprestado contra seu futuro para defender seu presente."
 imf_events.10.a: "Emita as obrigações — precisamos do dinheiro agora"
 imf_events.10.b: "Decline — não vamos hipotecar o nosso futuro"

 imf_loan_modifier: "Condições de empréstimo do FMI"
 imf_loan_modifier_desc: "Está em vigor um empréstimo do FMI. As taxas de juro são extremamente elevadas e o comércio livre é obrigatório. O investimento estrangeiro está a fluir, mas a soberania económica é limitada e a legitimidade sofreu."

 imf_great_power_obligations: "Grandes Obrigações de Poder"
 imf_great_power_obligations_desc: "As grandes potências que subscrevem o FMI têm obrigações deste país como condição do empréstimo. A sua influência sobre a política económica é real."

 imf_refused_loan_modifier: "Empréstimo do FMI Recusado"
 imf_refused_loan_modifier_desc: "O país recusou a assistência do FMI e vai gerir a sua dívida sozinho. As condições de crédito pioraram em consequência."

 imf_post_loan_stability: "Recuperação pós-programa"
 imf_post_loan_stability_desc: "O programa do FMI concluiu. Tendo cumprido as suas obrigações, o governo ganhou uma certa credibilidade — e as finanças do país estão em melhor ordem."

 imf_left_modifier: "Fora do FMI"
 imf_left_modifier_desc: "Este país retirou-se do FMI. Está isenta de obrigações de credor, mas sem financiamento internacional de emergência. Os fluxos de investimento são reduzidos."

 war_bonds_modifier: "Emitidos laços de guerra"
 war_bonds_modifier_desc: "Foram emitidos títulos de guerra de emergência para financiar o esforço de guerra. As receitas aumentaram, mas a dívida está a aumentar e o consumo de abastecimento aumentou."

 war_bonds_refused_modifier: "Os laços de guerra declinaram"
 war_bonds_refused_modifier_desc: "O governo recusou-se a emitir títulos de guerra. A disciplina fiscal é mantida, mas o exército sente o aperto."

 un_events.6.t: "Nossas forças retornam da missão da ONU"
 un_events.6.d: "[ROOT.GetCountry.GetAdjective] forças completaram seu serviço na missão de manutenção de paz da ONU e estão retornando para casa. A contribuição foi modesta em termos militares, mas significativa diplomaticamente — [ROOT.GetCountry.GetName] estava presente quando importava. O general voltou."
 un_events.6.a: "Bem-vindo a casa"
 
 un_peacekeeping_contribution: "Contribuição da ONU para a manutenção da paz"
 un_peacekeeping_contribution_desc: "[ROOT.GetCountry.GetName] contribuiu com forças para uma missão de paz da ONU. A comunidade internacional tomou nota."
 
  # ── EVENT 300: RESOLUTION PASSED ─────────────────────────────────
 
 un_events.300.t: "Aprovação da Resolução da ONU"
 un_events.300.d: "A Assembleia Geral acordou numa resolução para abordar questões mundiais e coordenar a cooperação global sobre um determinado tema"
 un_events.300.f: "A resolução tem o peso do consenso internacional — pelo que vale."
 un_events.300.a: "Anotado"
 
 UN_RES_DESC_ENVIRONMENT: "#bold Resolução sobre Proteção Ambiental#!\nEstados-Membros comprometem-se a coordenar normas ambientais e gestão sustentável dos recursos.\n\n#tooltip_separator!\n@green_checkmark! Todos os países recebem o modificador #bold da Resolução Ambiental da ONU#! por 12 meses."
 UN_RES_DESC_PEACE: "#bold Resolução sobre a Paz Mundial#!\nA Assembleia Geral reafirma o compromisso com a resolução pacífica de conflitos e a redução do conflito interestadual.\n\n#tooltip_separator!\n@green_checkmark! Todos os países recebem o modificador #bold Resolução de Paz da ONU#! por 12 meses."
 UN_RES_DESC_ECONOMY: "#bold Resolução sobre Desenvolvimento Económico #!\nOs Estados-Membros subscrevem o investimento coordenado em economias em desenvolvimento e a redução das barreiras comerciais.\n\n#tooltip_separator!\n@green_checkmark! Todos os países recebem o modificador #bold Resolução de Desenvolvimento Económico da ONU#! por 12 meses."
 UN_RES_DESC_TECHNOLOGY: "#bold Resolução de Tecnologia da UNESCO#!\nA Assembleia Geral estabelece quadros para partilha de tecnologia e investigação científica cooperativa entre Estados-Membros.\n\n#tooltip_separator!\n@green_checkmark! Todos os países recebem o modificador #bold Resolução de Tecnologia da ONU#! por 12 meses."
 
 # ── EVENT 301: RESOLUTION FAILED ─────────────────────────────────
 
 un_events.301.t: "A Resolução da ONU falha em aprovar"
 un_events.301.d: "A moção perante a Assembleia Geral das Nações Unidas não conseguiu obter a maioria necessária. A resolução foi derrotada e a sessão interrompida sem resultado.\n\nNenhuma medida será implementada. A delegação patrocinadora manifestou o seu desapontamento. Outros não."
 un_events.301.f: "As Nações Unidas fazem o que as Nações Unidas fazem melhor."
 un_events.301.a: "Inexistência"
 
 # ── EVENT 302: SANCTIONS (TARGET) ────────────────────────────────
 
 un_events.302.t: "[ROOT.GetCountry.GetName] Sancionadas pelas Nações Unidas"
 un_events.302.d: "O Conselho de Segurança das Nações Unidas aprovou uma resolução que impõe sanções econômicas em [ROOT.GetCountry.GetName]. A resolução foi apoiada pela maioria necessária e produz efeito imediatamente.\n\n As restrições comerciais estão agora em vigor. O isolamento diplomático aprofunda-se. Espera-se que os Estados-Membros, embora não sejam obrigados a cumprir o regime de sanções.\n\n As sanções permanecerão em vigor durante cinco anos, a menos que o Conselho de Segurança as reveja."
 un_events.302.f: "A soberania não isola um país da opinião do mundo."
 un_events.302.a: "Rejeitamos esta resolução"
 
 # ── EVENT 303: CONDEMNATION (TARGET) ─────────────────────────────
 
 un_events.303.t: "[ROOT.GetCountry.GetName] Condenados pelas Nações Unidas"
 un_events.303.d: "A Assembleia Geral das Nações Unidas aprovou uma resolução formal condenando [ROOT.GetCountry.GetName]. A condenação foi aprovada por maioria após debate no plenário.\n\n A condenação não possui nenhum mecanismo vinculativo de execução, mas representa uma declaração formal de desaprovação internacional e afetará [ROOT.GetCountry.GetAdjective] estar na comunidade diplomática por anos vindouros."
 un_events.303.f: "Palavras não são armas. Mas deixam marcas."
 un_events.303.a: "Não seremos ensinados"
 
 # ── EVENT 304: SANCTIONS/CONDEMNATION (OBSERVERS) ────────────────
 
 un_events.304.t: "A resolução punitiva da ONU passou"
 un_events.304.d: "O Conselho de Segurança das Nações Unidas aprovou uma resolução que impõe sanções contra outro país. Enfrentarão severas penalidades à medida que o mundo coordena a tensão econômica contra eles."
 un_events.304.f: "O mecanismo da censura internacional gira lentamente, mas gira."
 un_events.304.a: "Anotado"
 
 UN_304_DESC_SANCTIONS: "O Conselho de Segurança das Nações Unidas votou para impor sanções econômicas em [global_var:un_sanction_target.GetName]. A resolução aprovada pela margem necessária.\n\n[global_var:un_sanction_target.GetName] enfrentará restrições comerciais, isolamento diplomático e sanções econômicas significativas durante o período de sanções. Espera-se que os Estados-Membros cumpram as restrições."
 UN_304_DESC_CONDEMNATION: "A Assembleia Geral das Nações Unidas condenou formalmente [global_var:un_sanction_target.GetName] por votação por maioria. A resolução representa uma declaração oficial de desaprovação internacional.\n\n Embora uma condenação não seja obrigatória, coloca [global_var:un_sanction_target.GetAdjective] conduta no registro e afeta sua posição internacional."
 
