 un_events.101.t: "Nações Unidas — Resolução em Debate"
 un_events.101.d: "Foi proposta uma resolução na Assembleia Geral das Nações Unidas. [ROOT.GetCountry.GetName] pode votar usando os botões Yay ou Nay na entrada do diário das Nações Unidas. Membros do Conselho de Segurança Permanente lançam votos de duplo peso. O resultado será anunciado em 120 dias."
