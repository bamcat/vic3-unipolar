 # ── TREATY ARTICLES ──────────────────────
 
 defense_attache: "Enviar o Adido de Defesa"
 defense_attache_desc: "Incorpore conselheiros militares e agentes de ligação com as forças armadas do país alvo. O alvo ganha experiência e reduz custos militares; a fonte ganha influência e posição diplomática. O país de origem deve manter uma projeção de energia maior do que o alvo."
 
 cultural_exchange: "Intercâmbio cultural"
 cultural_exchange_desc: "Estabelecer um programa formal de intercâmbio cultural — exposições compartilhadas, programas acadêmicos e contato de pessoas para pessoas. Ambos os países ganham prestígio, influência e tornam-se mais atraentes para os migrantes."
 
 research_partnership: "Parceria para a investigação"
 research_partnership_desc: "Um acordo formal para compartilhar programas de pesquisa e instituições acadêmicas. Ambos os países beneficiam de uma maior velocidade de investigação e de uma maior difusão tecnológica. Requer que ambas as partes sejam, pelo menos, poderes reconhecidos."
 
 human_development_collaboration: "Colaboração para o Desenvolvimento Humano"
 human_development_collaboration_desc: "O país mais rico financia programas de desenvolvimento no alvo — saúde, educação, bem-estar. A fonte paga custos contínuos em troca de influência e prestígio. O acordo quebra se a economia do país de origem cair abaixo da meta."
 
 research_partnership_rank_tt: "Ambos os países devem ter, pelo menos, poderes reconhecidos para entrar numa parceria de investigação"
 
