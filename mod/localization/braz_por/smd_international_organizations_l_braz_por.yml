 eu_cultural_exchange: "Intercâmbio cultural da UE"
 eu_cultural_exchange_desc: "A adesão à União Europeia tem promovido a compreensão cultural, a migração e a difusão de novas ideias e tecnologias."
 je_eu_membership_request: "Pedido de adesão à UE"
 je_eu_membership_request_reason: "O seu governo apresentou um pedido formal para aderir à União Europeia.\n\n Este processo envolve longas negociações, reformas políticas e alinhamento com as leis e normas da UE. Nos próximos anos, o seu país será avaliado sobre a sua estabilidade económica, governação, direitos humanos e adesão aos princípios democráticos.\n\nA adesão bem sucedida lhe concederia:\n- Acesso ao mercado único da UE Livre circulação de mercadorias, serviços, capitais e pessoas com outros Estados­‐Membros\n- Participação em órgãos de decisão da UE\n\n No entanto, o processo é politicamente sensível e pode encontrar resistência tanto a nível interno como dos actuais membros da UE."
