 notification_io_join_request_sent_notification_name: "Aplicação Apresentada"
 notification_io_join_request_sent_notification_desc: "Apresentámos um pedido de adesão à organização."
 notification_io_join_request_sent_notification_tooltip: "#header $notification_io_join_request_sent_notification_name$#!\n$TOOLTIP_DELIMITER$\n$notification_io_join_request_sent_notification_desc$"

 notification_io_left_org_notification_name: "Organização de Esquerda"
 notification_io_left_org_notification_desc: "Retiramo-nos da organização. As nossas relações com ex-membros deterioraram-se."
 notification_io_left_org_notification_tooltip: "#header $notification_io_left_org_notification_name$#!\n$TOOLTIP_DELIMITER$\n$notification_io_left_org_notification_desc$"

