 ### UPDATED ORG DESCRIPTIONS reflecting mechanics
 ### ══════════════════════════════════════════
 
 io_nato_desc: "O [concept_nato] é um [concept_military_defense_agreement] ligando nações norte-americanas e europeias em defesa coletiva. Um ataque armado contra um membro é considerado um ataque contra todos. A adesão à NATO cria automaticamente tratados de pacto de defesa mútua com todos os Estados-Membros existentes."
 
 io_opec_desc: "O [concept_opec] é uma organização de grandes países exportadores de petróleo que coordena as políticas de produção de petróleo. Os Estados-Membros beneficiam do poder de fixação de preços dos cartéis, obtendo uma vantagem comercial significativa sobre as exportações de petróleo e melhorando a produção de extracção a partir de investimentos coordenados."
 
 io_eec_desc: "O [concept_eec] é um [concept_free_trade_agreement] que estabelece uma união aduaneira entre os Estados-Membros europeus. Os membros partilham um mercado comum com regulamentos padronizados sobre produtos e políticas comerciais coordenadas, reduzindo as barreiras ao comércio transfronteiras."
 
 io_arab_league_desc: "O [concept_arab_league] é um [concept_cultural_pact] de nações de língua árabe que promove a cooperação política, econômica, cultural e social. O património partilhado acelera o intercâmbio de tecnologia e ideias, enquanto a solidariedade dos Estados­‐Membros ajuda a suprimir as pressões revolucionárias internas."
 
