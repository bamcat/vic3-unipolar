l_braz_por:

  # Base IGs
 ig_rural_folk:0 "Povo Rural"
 ig_rural_folk_only_icon:0 "@rural_folk!"
 ig_rural_folk_desc:0 "Pessoas no campo cujos interesses políticos estão em sua maioria alinhados com seus meios de subsistência agrária."
 ig_devout:0 "Fundamentalistas religiosos"
 ig_devout_only_icon:0 "@devout!"
 ig_devout_desc:0 "Os seguidores mais dedicados da religião majoritária, encarando - a como a melhor fonte de sabedoria moral e política."
 ig_industrialists:0 "Empresas"
 ig_industrialists_only_icon:0 "@industrialists!"
 ig_industrialists_desc:0 "Investidores e acionistas interessados no avanço tecnológico e no crescimento industrial."
 ig_landowners:0 "Proprietários"
 ig_landowners_only_icon:0 "@landowners!"
 ig_landowners_desc:0 "Os proprietários de grandes propriedades e vastas plantações, os proprietários de terras são guardiões de tradição e dinheiro velho."
 ig_intelligentsia:0 "Academia"
 ig_intelligentsia_only_icon:0 "@intelligentsia!"
 ig_intelligentsia_desc:0 "Os intelectuais que lideram as tendências da nação em literatura, arte, música e teatro. Também inclui a classe de gestão comum /"
 ig_petty_bourgeoisie:0 "Urbanitas"
 ig_petty_bourgeoisie_only_icon:0 "@petty_bourgeoisie!"
 ig_petty_bourgeoisie_desc:0 "Pequenas empresas, funcionários de escritório, contadores e outros indivíduos que são considerados entre os estratos ricos e pobres."
 ig_armed_forces:0 "Forças Armadas"
 ig_armed_forces_only_icon:0 "@armed_forces!"
 ig_armed_forces_desc:0 "Soldados profissionais e outros cujo interesse está fortemente ligado aos militares do país."
 ig_trade_unions:0 "Sindicatos"
 ig_trade_unions_only_icon:0 "@trade_unions!"
 ig_trade_unions_desc:0 "Trabalho organizado que procura organizar os trabalhadores nas minas, fábricas e campos e, ao fazê-lo, juntar as forças dos interesses díspares em uma só voz."

  # Religious IGs
 ig_catholic_church:0 "Igreja Católica"
 ig_catholic_church_desc:0 "O catolicismo é a maior seita do cristianismo. Os crentes afirmam que o Arcebispo de Roma, o Papa, é o sucessor ininterrupto da autoridade de Jesus Cristo através de São Pedro. Outras crenças importantes incluem veneração dos santos e da Virgem Maria."
 ig_orthodox_church:0 "Igreja Ortodoxa"
 ig_orthodox_church_desc:0 "As igrejas ortodoxas tendem a ser igrejas orientais não em comunhão com o Papa."
 ig_oriental_orthodox_church:1 "Igreja Ortodoxa Oriental"
 ig_oriental_orthodox_church_desc:1 "As igrejas ortodoxas orientais tendem a ser igrejas do Oriente Médio não em comunhão com o Papa."
 ig_anglican_church:0 "Igreja Anglicana"
 ig_anglican_church_desc:0 "A Igreja Anglicana foi criada pelo rei Henrique VIII durante a Reforma Protestante. Anglicanos acreditam que a Bíblia é a principal autoridade sobre o dogma cristão, rejeitando o Papa enquanto sendo menos radical do que outras igrejas evangélicas."
 ig_evangelical_church:0 "Igreja Evangélica"
 ig_evangelical_church_desc:0 "As igrejas evangélicas foram criadas principalmente no norte da Europa durante a Reforma Protestante. Os evangélicos acreditam que a Bíblia é a única autoridade sobre o dogma cristão, rejeitando o Papa e vendo a veneração católica dos santos como beirando a idolatria."
 ig_rabbinical_council:0 "Conselho Rabínico"
 ig_rabbinical_council_desc:0 "A liderança da população judaica de um país tende a ser Rabinos bem educados com fortes tradições de debate e bolsa de estudos."
 ig_sunni_madrasahs:1 "Ulema sunita"
 ig_sunni_madrasahs_desc:1 "O sunismo é a maior seita do Islão. Os crentes sustentam que Maomé foi sucedido como califa do Islão por seu tio, Abu Bakr, em oposição à opinião xiita de que seu genro Ali era o sucessor legítimo."
 ig_shia_madrasahs:1 "Shi’a Ulema"
 ig_shia_madrasahs_desc:1 "O xiísmo é a segunda maior seita do Islão. Os crentes sustentam que Maomé foi sucedido como califa do Islão por seu genro, Ali, em oposição à visão sunita de que seu tio Abu Bakr era o sucessor legítimo."
 ig_hindu_priesthood:0 "Sacerdócio hindu"
 ig_hindu_priesthood_desc:0 "Provavelmente a religião organizada mais antiga ainda existente, o hinduísmo sustenta que quebrar o ciclo da reencarnação e alcançar o Nirvana requer a adesão a um sistema de castas pelo qual os indivíduos servem um papel para melhorar seu carma, assim como os muitos deuses adorados pelos hindus servem papéis diferentes."
 ig_vajrayana_monks:0 "Monges Vajrayana"
 ig_vajrayana_monks_desc:0 "O budismo Vajrayana é mais forte no Tibete e na Mongólia. Enfatiza o uso da meditação e da autodisciplina."
 ig_mahayana_monks:0 "Monges Mahayana"
 ig_mahayana_monks_desc:0 "O budismo Mahayana é mais forte na China, Vietnã e Coréia. Enfatiza que todos na sociedade devem ser encorajados a buscar a iluminação através da perfeição. Mahayana vê Buda como uma figura semelhante a Deus."
 ig_theravada_monks:0 "Monges Theravada"
 ig_theravada_monks_desc:0 "Theravada Budismo é mais forte na Birmânia, Sião, Camboja e Ceilão. Coloca grande ênfase nos indivíduos que buscam o Nirvana para romper o ciclo da reencarnação. Theravada vê Buda não como um Deus, mas como um homem iluminado que mostrou ao resto da humanidade o caminho para a perfeição."
 ig_shinto_monks:0 "Monges Xintoístas"
 ig_shinto_monks_desc:0 "O xintoísmo é uma fé sincrética, combinando conceitos budistas de carma e reencarnação com adoração e placação de kami, os espíritos da natureza e ancestrais mortos."
 ig_pagan_shamans:0 "Xamãs Pagão"
 ig_pagan_shamans_desc:0 "O animismo é a adoração e a placação dos espíritos naturais. Rituais empreendidos por animistas incluem sacrifícios de alimentos e gado, e consumo de drogas alucinogênicas para viagens espirituais de introspecção."

  # Taiping IGs
 ig_taiping_god_worshippers:0 "Sociedade do Valor de Deus"
 ig_taiping_god_worshippers_desc:0 "A Adoração de Deus, ou Sociedade Imperador-Adoração, é uma fé cristã sincrética proeminente entre o Reino Celestial, apoiando uma interpretação do cristianismo que vê todos os crentes como filhos e filhas de Deus."

  # British IGs
 ig_landed_gentry:0 "Gentry Pousada"
 ig_landed_gentry_desc:0 "Os proprietários de grandes propriedades e propriedades vastas, a nobreza de terra são guardiães da tradição e do dinheiro velho."

  # Prussian IGs
 ig_junkers:0 "Junkers"
 ig_junkers_desc:0 "Descendentes dos 'jung herrs' (jovens senhores) que seguiram na sequência das conquistas Teutônicas do Báltico pagão para estabelecer e cristianizar as terras prussianas, os Junkers são a nobreza da Prússia e os maiores proprietários. Tendem a opor-se aos movimentos em direcção à democracia como ameaça ao governo de elite."

  # USA IGs
 ig_southern_planters:0 "Proprietários"
 ig_southern_planters_desc:0 "Embora a habitação tenha se tornado mais escassa nos últimos tempos, grupos de pessoas que afirmam ser associações de proprietários de casas envolvidas na compra e venda de imóveis para fins de lucros têm artificialmente inflado o custo de vida."
 ig_evangelicals:0 "Cristãos Ardentes"
 ig_evangelicals_desc:0 "Cristãos Ardentes de uma surpreendente variedade de denominações protestantes, o cristão todos concordam que a nação precisa encontrar seu próprio despertar espiritual, a fim de se salvar de um aumento do secularismo em toda a nação."
 ig_yeoman_farmers:0 "Sulistas rurais"
 ig_yeoman_farmers_desc:1 "A pequena classe rural americana, considerada por muitos dos Pais Fundadores como o alicerce da nação. A classe yeoman há muito se estabeleceu como a vanguarda do populismo rural americano."
 ig_wallstreet:0 "Wall Street"
 ig_wallstreet_desc:0 "Os bancos de investimento em Wall Street em Nova Iorque são a espinha dorsal do sistema financeiro americano, exercendo extrema influência sobre toda a economia."
 ig_silicon_valley:0 "Vale do Silício"
 ig_silicon_valley_desc:0 "Os programadores e wizzes de computador de trabalho de casa que gerenciam a vida cotidiana na internet."
 ig_american_middle_class:0 "América do Médio Oriente"
 ig_american_middle_class_desc:0 "A classe média americana compõe a maioria da base de consumo do país, empregos de trabalho que produzem salários habitáveis."
 ig_digital_activists:0 "Ativistas digitais"
 ig_digital_activists_desc:0 "Vários influenciadores online exercem poder sobre a nossa população."
  # Ottoman IGs
 ig_local_governors:0 "Governadores locais"
 ig_local_governors_desc:0 "Os governantes das províncias podem adquirir enorme influência construindo redes de patrocínio locais. As dinastias podem tornar-se tão poderosas que são estados efetivamente independentes apenas nominalmente ligados ao império."

  # Chinese IGs
 ig_literati:0 "Literati"
 ig_literati_desc:0 "Estudiosos na China desempenham um papel importante, tanto como defensores do governo como como críticos dele."
 ig_scholar_officials:0 "Funcionários bolsistas"
 ig_scholar_officials_desc:0 "A nobreza da China não é realmente a nobreza da China. Eles preservam sua riqueza através de propriedades de compra, mas eles devem seu poder para suas posições no governo."
 ig_confucian:0 "Estudiosos confucionistas"
 ig_confucian_desc:0 "Mais de uma tradição social, o confucionismo coexiste confortavelmente com uma multidão de fés, mas, no entanto, exige harmonia social e moral forte daqueles que a seguem."

  # Papal IGs
 ig_roman_landowners:1 "Nobilidade Cívica"
 ig_roman_landowners_desc:1 "Consistindo em famílias nobres e elites landholding concedidos títulos pelo Papa, a nobreza cívica romana servir como povo de riqueza, influência e poder temporal através dos territórios da Santa Sé."
 ig_roman_curia:0 "Cúria Romana"
 ig_roman_curia_desc:0 "A Cúria Romana, ou "Corte de Roma", como às vezes é conhecido, é a instituição administrativa da Santa Sé, exercendo poderes eclesiásticos e temporais."

  # Japanese IGs
 ig_samurai:0 "Samurai"
 ig_samurai_desc:0 "Os samurais são a nobreza militar hereditária do Japão, servindo como retentores privilegiados para o poderoso proprietário de terra Daimyo, e como executores da vontade de seus mestres feudais."
 ig_shogunate:0 "Xogunato"
 ig_shogunate_desc:0 "O xogunato refere - se ao governo militar que governa o Japão em nome do imperador desde o século XII. Ancorado no apoio de poderosos senhores feudais, o Daimyo, a insituição é dedicada à manutenção da ordem tradicional do Japão."
 ig_peasants:1 "Heimin"
 ig_peasants_desc:0 "Heimin denota a classe japonesa de plebeus, nascida sem qualquer tipo de privilégios sociais, e com interesses políticos refletindo principalmente os dos agricultores rurais."
 ig_buddhist_monks:0 "Monges Budistas"
 ig_buddhist_monks_desc:0 "Existe ao lado, e muitas vezes em desacordo com a crença nativa japonesa em kami, pelo século 19 Budismo está presente no Japão há mais de um milênio. As escolas budistas patrocinadas pelo estado ao longo da era Edo enfatizam a relação sincrética entre kami e buddhas."

  # Hawaiian IGs
 ig_christian_missionaries:0 "Missionários Cristãos"
 ig_christian_missionaries_desc:0 "Os Missionários Cristãos vieram para Hawai’i apenas algumas décadas atrás, mas já suplantaram os Kahuna como classe clerical dominante de Hawai’i. Eles defendem o comércio com as potências ocidentais, atraindo migrantes do Ocidente, e a conversão dos havaianos nativos para o cristianismo."
 ig_alii:0 "Ali’i"
 ig_alii_desc:0 "Os Ali’i representam os nobres menores de Hawai’i ao serviço do monarca reinante. Eles defendem os valores tradicionais e preservam o domínio da monarquia."
 ig_maka_ainana:0 "Maka’āinana"
 ig_maka_ainana_desc:0 "Os Maka’āinana representam a classe rural de Hawai’i, muitas vezes trabalhando em plantações e pescarias. Defendem os valores tradicionais e a contínua dependência económica do sector agrícola."
 ig_hawaiian_democrats:0 "Democratas"
 ig_hawaiian_democrats_desc:0 "Os Democratas representam os reformadores liberais de Hawai’i. Eles defendem para remover o poder absoluto do monarca em favor de um regime democrático e as relações comerciais contínuas com as potências ocidentais."

  # Swedish IGs
 ig_church_of_sweden:0 "Igreja da Suécia"
 ig_church_of_sweden_desc:0 "A Igreja da Suécia foi instigada pelo rei Gustavo Vasa no século XVI e é a Igreja estatal oficial da Suécia. Sendo uma instituição luterana, a Igreja afirma que a Bíblia é a única autoridade sobre o dogma cristão, rejeitando assim a autoridade do Papa e tradições como a veneração de santos."

  # Finnish IGs
 ig_church_of_finland: "Igreja da Finlândia"
 ig_church_of_finland_desc: "Nascido da separação da Finlândia da Suécia em 1809, a Igreja da Finlândia foi estabelecida como a igreja estatal oficial do país. Sendo uma instituição luterana, a Igreja afirma que a Bíblia é a única autoridade sobre o dogma cristão, rejeitando assim a autoridade do Papa e tradições como a veneração de santos."

# Danish IGs
 ig_church_of_denmark: "Igreja da Dinamarca"
 ig_church_of_denmark_desc: "Fundada no século XVI pelo rei Cristiano III, a Igreja da Dinamarca é a igreja oficial estatal da Dinamarca. Sendo uma instituição luterana, a Igreja afirma que a Bíblia é a única autoridade sobre o dogma cristão, rejeitando assim a autoridade do Papa e tradições como a veneração de santos."

# Norwegian IGs
 ig_aristocracy_of_officials: "Aristocracia dos Funcionários"
 ig_aristocracy_of_officials_desc: "Sem qualquer nobreza histórica significativa e com a instituição formalmente abolida em 1821, a classe alta da Noruega é composta por funcionários públicos, com advogados, sacerdotes e médicos ocupando as posições de uma nobreza tradicional."
 ig_church_of_norway: "Igreja da Noruega"
 ig_church_of_norway_desc: "A Igreja da Noruega foi estabelecida como um corpo separado da Igreja Católica Romana e integrado com o estado norueguês no século XVI como resultado da Reforma Protestante. Sendo uma instituição luterana, a Igreja afirma que a Bíblia é a única autoridade sobre o dogma cristão, rejeitando assim a autoridade do Papa e tradições como a veneração de santos."

  # Korean IGs
 ig_yangban:0 "Funcionários de Yangban"
 ig_yangban_desc:0 "O Yangban representa a nobreza de terra e não pousada da Coreia, que derivam seus títulos e influência de posições dentro do aparato burocrático do país. Exemplificando os ideais confucionistas do Scholar-Official, eles são defensores firmes da ordem tradicional coreana."

  # Russian IGs
 ig_gentry_assembly:0 "Assembleia de Gentry"
 ig_gentry_assembly_desc:0 "A Assembleia de Gentry é o corpo autogovernador que representa a aristocracia russa. Concedido status oficial em 1785, a Assembleia desde então tem defendido a retenção ou expansão dos poderes e privilégios tradicionais dos nobres."

  # Australian IGs
 ig_squattocracy: "Squattocracia"
 ig_squattocracy_desc: "A ‘esquatocracia’ representa a classe dos colonos brancos australianos que ocuparam grandes extensões de terra com pouca ou nenhuma reivindicação legal. Muitas vezes, os primeiros colonos a chegar em uma determinada área, a agachamentocracia ganhou imensa riqueza e influência social principalmente através do produto da criação de gado em seus territórios."

  # Austrian IGs
 austrian_aristocracy:0 "Aristocracia austríaca"
 austrian_aristocracy_desc: "A aristocracia austríaca representa a nobre classe estabelecida da Áustria, historicamente concedida com títulos nobres pelos imperadores e arquiduques da Áustria de Habsburgo, e possui grande influência dentro da corte imperial."

  # Misc Igs
 ig_red_army:0 "Exército Vermelho"
 ig_red_army_desc:0 "O Exército Vermelho é uma instituição dedicada à defesa e propagação da Revolução, nascida através da fusão das forças armadas tradicionais com o proletariado e ideologia comunista."
 ig_fellahin: "Fellahin"
 ig_fellahin_desc: "Ganhando o seu nome dos arados que trabalham e os campos que eles tiram, o felino são os agricultores e camponeses do Egito."

  # Indian IGs
  ig_zamindars: "Zamindars"
  ig_zamindars_desc: "Os Zamindars são os proprietários tipicamente hereditários de grandes propriedades. Eles muitas vezes representam os remanescentes da aristocracia da era Mughal, concedido o direito de coletar receitas de terra em nome de seus governantes."

  ig_east_india_company: "Companhia da Índia Oriental"
  ig_east_india_company_desc: "A Companhia das Índias Orientais é a empresa privada encarregada de governar a Índia sob a supervisão do Parlamento Britânico. Após a revogação do seu mandato comercial em 1833, tornou-se um órgão puramente administrativo."

  ig_presidency_armies: "Exércitos da Presidência"
  ig_presidency_armies_desc: "Os Exércitos da Presidência são as forças armadas da Índia colonial, tipicamente compostas de índios nativos sob o comando de oficiais europeus."

  ig_indian_army: "Exército Indiano"
  ig_indian_army_desc: "O Exército indiano é a principal força armada da Índia colonial, formada pela unificação dos Exércitos da Presidência em um corpo singular. É composta em grande parte de soldados indígenas nativos sob o comando de oficiais europeus."

  ig_ryots: "Ryots"
  ig_ryots_desc: "Os Ryots são os agricultores tradicionais e camponeses da Índia, normalmente sem qualquer terra própria. Seus interesses são em grande parte de natureza agrária."

  ig_civil_servants: "Agentes públicos"
  ig_civil_servants_desc: "Os Servos civis englobam a intelligentsia indígena nativa que se desenvolveu principalmente a partir dos vários órgãos da burocracia colonial indiana. Eles normalmente possuem ou têm desempenhado funções como funcionários ou outros administradores de baixo a médio nível."

  ig_government_of_india: "Governo da Índia"
  ig_government_of_india_desc: "O Governo da Índia refere-se à administração colonial europeia encarregada de promover os interesses da coroa britânica na Índia."

  ig_bhadralok: "Bhadraloks"
  ig_bhadralok_desc: "Os Bhadralok, ou "cavalheiros" englobam as classes médias da sociedade indiana. Este grupo na sua forma atual originou-se em Bengala, entre comerciantes bengali nativos, industriais e financiadores que se alinharam com a Companhia das Índias Orientais durante a sua conquista da Índia."

  ig_kisanharu: "Kisanharu"
  ig_kisanharu_desc: "Os Kisanharu são os agricultores tradicionais e camponeses do Nepal, normalmente sem nenhuma terra própria. Seus interesses são em grande parte de natureza agrária."
