 # leaders
 
 ideology_marxist_leader: "Marxista"
 ideology_marxist_leader_desc: "Líderes socialistas revolucionários que favorecem o governo do conselho, a propriedade pública, a agricultura coletivizada, e uma ruptura afiada com o capitalismo liberal."
 ideology_state_socialist_leader: "Estado Socialista"
 ideology_state_socialist_leader_desc: "Os líderes socialistas centralizadores que preferem a direção de um partido ou estado tecnocrático, a economia de comando e grandes sistemas públicos."
 ideology_left_wing_populist_leader: "Populista de Ala Esquerda"
 ideology_left_wing_populist_leader_desc: "Líderes anti-elitistas políticos de massa que misturam redistribuição, protecionismo, democracia e forte hostilidade ao domínio oligárquico."
 ideology_democratic_socialist_leader: "Socialista Democrático"
 ideology_democratic_socialist_leader_desc: "Líderes de esquerda democratas que favorecem eleições, poder operário, propriedade social, bem-estar forte, e liberdades civis."
 ideology_green_leader: "Verde"
 ideology_green_leader_desc: "Líderes democráticos ambientais focaram na regulação ecológica, bens públicos, liberdades civis e reforma pós-industrial."
 ideology_state_capitalist_leader: "Capitalista do Estado"
 ideology_state_capitalist_leader_desc: "Líderes desenvolvimentistas que aceitam mercados mas querem um estado forte, indústria estratégica, banco centralizado e investimento guiado."
 ideology_market_socialist_leader: "Mercado Socialista"
 ideology_market_socialist_leader_desc: "Líderes socialistas descentralizados que favorecem cooperativas, sindicatos, bem-estar e mecanismos de mercado sob supervisão democrática."
 ideology_progressive_leader: "Progressivo"
 ideology_progressive_leader_desc: "Líderes reformistas focaram em igualdade de direitos, expansão da assistência social, educação, liberdades civis e reforma de mercado gerenciada."
 ideology_social_liberal_leader: "Social Liberal"
 ideology_social_liberal_leader_desc: "Líderes Liberais-democratas que apoiam mercados com bem-estar, cidadania igual, educação e capitalismo regulamentado."
 ideology_technocrat_leader: "Tecnocrata"
 ideology_technocrat_leader_desc: "Líderes de regras especializadas que apoiam o secularismo, planejamento administrativo, capacidade estatal, mercados regulamentados e governança científica."
 ideology_liberal_leader: "Liberais"
 ideology_liberal_leader_desc: "Líderes liberais que apoiam repúblicas constitucionais, liberdades civis, comércio livre, mercados privados e igualdade legal."
 ideology_moderate_leader: "Moderado"
 ideology_moderate_leader_desc: "Líderes de estabelecimento pragmáticos que raramente empurram reformas radicais e são mais comuns em sistemas mistos estáveis."
 ideology_neoliberal_leader: "Neoliberal"
 ideology_neoliberal_leader_desc: "Líderes liberais orientados para o mercado que favorecem o comércio livre, laissez-faire, provisão privada, restrição fiscal e instituições tecnocráticas."
 ideology_conservative_leader: "Conservador"
 ideology_conservative_leader_desc: "Líderes de direita status-quo que favorecem a ordem social, reforma limitada, economia de mercado moderada, tradição e nacionalismo cauteloso."
 ideology_corporatist_leader: "Corporatista"
 ideology_corporatist_leader_desc: "Líderes de coordenação capitalistas que favorecem o capitalismo intervencionista ou laissez-faire organizado através de instituições estatais-empresa-trabalho."
 ideology_theocrat_leader: "Theocrat"
 ideology_theocrat_leader_desc: "Líderes religiosos que querem o estado, escolas, tribunais e cidadania ordenados em torno da religião oficial."
 ideology_right_wing_libertarian_leader: "Libertador de direita"
 ideology_right_wing_libertarian_leader_desc: "Líderes de mercado anti-Estado que favorecem instituições privadas, baixo bem-estar, mídia livre e fraca segurança interna."
 ideology_classical_liberal_leader: "Liberal Clássico"
 ideology_classical_liberal_leader_desc: "Antigos constitucionalistas liberais que favorecem o comércio livre, governo limitado, direitos de propriedade, instituições representativas e Estado de direito."
 ideology_neocon_leader: "Neocon"
 ideology_neocon_leader_desc: "Líderes militarizados liberal-conservadores que favorecem as forças armadas profissionais, intervenção no exterior, instituições capitalistas e segurança nacional."
 ideology_jihadist_leader: "Jihadista"
 ideology_jihadist_leader_desc: "Líderes religiosos militantes que só podem emergir de países islâmicos de religião estatal sob pressão radical."
 ideology_minarchist_leader: "Minarquista"
 ideology_minarchist_leader_desc: "Extremos líderes de mercado de pequenos estados que apoiam laissez-faire, sistemas privados e quase total retorno da autoridade pública."
 ideology_right_wing_populist_leader: "Populista de direita"
 ideology_right_wing_populist_leader_desc: "Líderes anti-elite nacional-populistas que se levantam em democracias liberais com altos radicais, misturando chauvinismo de bem-estar, protecionismo e reação cultural."
 ideology_authoritarian_capitalist_leader: "Capitalista Autoritário"
 ideology_authoritarian_capitalist_leader_desc: "Líderes capitalistas de ordem dura que favorecem o capitalismo privado ou guiado sob autocracia, poder policial, censura e oposição fraca."
 ideology_monarchist_leader: "Monarquista"
 ideology_monarchist_leader_desc: "Líderes lealistas dinásticos que quase só aparecem nas monarquias e favorecem a autoridade hereditária, tradição, igreja e hierarquia."
 ideology_fascist_leader: "Fascista"
 ideology_fascist_leader_desc: "Líderes autoritários ultranacionalistas que favorecem militarização, governo de partido único, violência estatal, sociedade fechada e economia corporativa-nacional."
 ideology_anarchist_leader: "Anarquista"
 ideology_anarchist_leader_desc: "Líderes socialistas anti-autoritários que favorecem o auto-governo apátrida, propriedade cooperativa, milícias, liberdade de expressão, sem polícia e forte autonomia local."
