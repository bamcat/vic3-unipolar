l_braz_por:

  # Landowners IG Traits
 ig_trait_noblesse_oblige:0 "Noblesse Oblige"
 ig_trait_noblesse_oblige_desc:0 "Somos melhores do que as pessoas comuns, o que significa que temos o dever de cuidar delas. Suas tentativas de organizar as coisas para si são autodestrutivas e condenadas ao fracasso."
 ig_trait_family_ties:0 "Gravatas Familiares"
 ig_trait_family_ties_desc:0 "Nestes tempos de mudança, ainda sabemos o valor de um bom casamento. As nossas ligações são mais antigas do que as fronteiras que ultrapassam e durarão tanto as alianças como os governos."
 ig_trait_noble_privileges:0 "Privilégios Nobres"
 ig_trait_noble_privileges_desc:0 "O que aconteceu com a idéia de que a nobreza deveria ser deixada para desempenhar suas funções sem ser perseguida por cobradores de impostos? É hora de trazer esses dias de volta."
 ig_trait_profitable_estates: "Imóveis Lucráveis"
 ig_trait_profitable_estates_desc: "Não sabias? O que é bom para a nobreza é bom para a nação – a prosperidade se move."
 ig_trait_the_velvet_book: "O Livro de Veludo"
 ig_trait_the_velvet_book_desc: "Apenas as famílias mais augustas podem encadernar seus nomes neste venerável livro. Sabemos quem pertence e quem não pertence."
 ig_trait_bad_boyars: "Boyars Maus"
 ig_trait_bad_boyars_desc: "Então querem dizer que o Czar Bom do país está a ser enganado pelos seus maus boiardos? Podemos mostrar-lhes do que os maus boiardos são capazes."
 ig_trait_latifundios: "Latifúndios"
 ig_trait_latifundios_desc: "A produtividade e riqueza dos nossos bens é incomparável. O dinheiro flui pelas nossas mãos como água pelas corredeiras. Na verdade, estes são dias de ouro para todos nós."
 ig_trait_junkerdom: "Junkerdom"
 ig_trait_junkerdom_desc: "Nosso poder vem de nossas terras, e nossas terras são terras poderosas. Tudo o que escolhemos fazer, a nação seguirá."
 ig_trait_patrician_philanthropy: "Filantropia Patrícia"
 ig_trait_patrician_philanthropy_desc: "Está na hora de fazermos algo para o nosso companheiro – e certificarmo-nos de que os nossos nomes fossem gravados no que quer que acabe por ser construído, claro."
 ig_trait_wiener_walzer: "Wiener Walzer"
 ig_trait_wiener_walzer_desc: "Alguém teve coragem na última bola de pedir um minueto para ser jogado. Minha querida, fazemos valsas! Nós definimos o que está na moda, e é #italic não#! o minueto!"
 ig_trait_fazenda_ibicaba: "Fazenda Ibicaba"
 ig_trait_fazenda_ibicaba_desc: "A mão-de-obra é uma questão constante para as nossas empresas, e por isso devemos seguir todos os caminhos possíveis para obter o trabalho que precisamos."
 ig_trait_summon_no_zamindars: "Invocação No Zamindars"
 ig_trait_summon_no_zamindars_desc: "Os governantes do nosso país demonstraram que não têm interesse em negociação ou flexibilidade. Se assim for, então não devem perder as coisas mais sutis que fazemos para manter a ordem."
 ig_trait_famine_reserves: "Reservas de Fome"
 ig_trait_famine_reserves_desc: "É nosso dever abrir nossas lojas de grãos quando surge uma necessidade premente. Qual é a melhor maneira de comprar boa vontade aos nossos inquilinos?"

  # Industrialists IG Traits
 ig_trait_job_creators:0 "Criadores de Emprego"
 ig_trait_job_creators_desc:0 "É preciso gastar dinheiro para ganhar dinheiro. Enquanto o governo não interferir com os nossos investimentos, não há nenhum lugar onde preferimos colocar os nossos lucros do que para o crescimento económico."
 ig_trait_engines_of_progress:0 "Motores de progresso"
 ig_trait_engines_of_progress_desc:0 "Eis as maravilhas da era moderna! Não há tempo para hesitações. Se ele pode ser pensado, projetado e patenteado, ele deve ser construído, testado e colocado em uso imediato."
 ig_trait_tax_avoidance:0 "Evitar impostos"
 ig_trait_tax_avoidance_desc:0 "Quem sabe melhor onde o nosso dinheiro deve ser gasto? Não o governo, e certamente não o atual. Felizmente, a sua incompetência deixou lacunas fiscais que podem ser aproveitadas."
 ig_trait_zaibatsu_cooperation: "Cooperação com o Zaibatsu"
 ig_trait_zaibatsu_cooperation_desc: "Uma relação saudável entre a indústria e o governo beneficia todos. É do nosso interesse assegurar que esta situação amigável continue."
 ig_trait_zaibatsu_withdrawal: "Retirada de Zaibatsu"
 ig_trait_zaibatsu_withdrawal_desc: "A nossa saúde financeira beneficiaria mais através de uma reorientação para a especulação monetária e para o reinvestimento interno. O comércio público não é, infelizmente para o governo, uma prioridade neste momento."
 ig_trait_kommerskollegium: "Kommerskollegium"
 ig_trait_kommerskollegium_desc: "Cabe-nos, à medida que a escala dos nossos interesses comerciais continua a crescer, assegurar que a riqueza adquirida seja gerida de forma equitativa."
 ig_trait_ventilate_unify_beautify: "Ventilar, Unificar e Embelezar"
 ig_trait_ventilate_unify_beautify_desc: "Já viste como é lá fora? É uma oficina de doenças, um lugar onde o sol nunca brilha, onde plantas para onde e perecem, e onde a miséria e a peste trabalham em conjunto. Cabe-nos, claro, resolver esta confusão."
 ig_trait_the_goods_must_flow: "Os bens devem fluir"
 ig_trait_the_goods_must_flow_desc: "É tudo bom e bom para produzir tanto quanto a nossa nação faz, mas de que serve se não consegue alcançar os mercados em que precisa ser vendido? Agora é o momento de garantir que o país entenda como é necessário um bom transporte."
 ig_trait_wounded_honor: "Honra Ferida"
 ig_trait_wounded_honor_desc: "Somos poucos iluminados numa terra que resiste a qualquer esclarecimento. Nossos métodos são superiores – qualquer desordem é uma traição, e a traição deve ser enfrentada com a sanção mais dura."
 ig_trait_stamped_and_signed: "Carimbados e Assinados"
 ig_trait_stamped_and_signed_desc: "Selos e livros são os métodos que usamos para criar ordem fora do caos. A governança da Índia requer um oceano de papel, e é nossa tarefa assegurar que ela circule sem falhas."
 ig_trait_responsible_government: "Governação responsável"
 ig_trait_responsible_government_desc: "Nossa missão é estender a justiça e a civilização a todos os homens – e, claro, perpetuar a regra que permite isso para sempre."

  # Armed Forces IG Traits
 ig_trait_patriotic_fervor:0 "Fervor Patriótico"
 ig_trait_patriotic_fervor_desc:0 "Não importa quão brilhante seja a estratégia e quão avançadas as armas, algumas batalhas só podem ser ganhas com trabalho duro e coragem. Soldados que realmente acreditam no que o seu país representa lutarão bravamente, independentemente das probabilidades."
 ig_trait_veteran_consultation:0 "Consulta Veterana"
 ig_trait_veteran_consultation_desc:0 "Os avanços tecnológicos estão mudando a face da guerra, mas só podemos fazer uso deles se entendermos como. Felizmente, aqueles de nós com experiência em primeira mão deve ter uma idéia."
 ig_trait_materiel_waste:0 "Resíduos de Materiel"
 ig_trait_materiel_waste_desc:0 "Lealdade à nação não é lealdade ao governo. Se não podemos confiar nas pessoas no comando, podemos muito bem usar o que nos é dado como quisermos."
 ig_trait_elan_vital: "Élan Vital"
 ig_trait_elan_vital_desc: "Enquanto os últimos braços e armamentos estão bem e bem, o caminho para a vitória depende de um espírito impulsionador que não se curvará diante da adversidade. Soldados que realmente acreditam no que a nação representa avançarão corajosamente, independentemente das probabilidades."
 ig_trait_newly_created_army: "Exército recém-criado"
 ig_trait_newly_created_army_desc: "O coração de um exército moderno não está nas últimas espingardas, ou nos melhores uniformes, mas na organização e logística. Para manter cada soldado fornecido, para manter o fluxo de munições e rações regulares e confiáveis, para garantir que cada homem saiba seu papel na vasta máquina militar – isso é como fazer um exército valer alguma coisa."
 ig_trait_self_strengthening: "Auto-fortalecimento"
 ig_trait_self_strengthening_desc: "Nossa inteligência e sabedoria são necessariamente superiores àqueles que nos cercam. Assim, o que temos de aprender no estrangeiro é apenas uma coisa: navios sólidos e armas eficazes."
 ig_trait_parochial_leadership: "Liderança Paroquial"
 ig_trait_parochial_leadership_desc: "Nestes tempos sombrios, é cada um por si, e cada província deve olhar para o seu próprio bem-estar em primeiro lugar. Não é razoável esperar que cada oficial leve entusiasticamente para longe de casa, quando sua própria lareira pode estar sob ameaça."
 ig_trait_el_buen_jefe: "El Buen Jefe"
 ig_trait_el_buen_jefe_desc: "Todo bom soldado precisa de um bom oficial para o liderar. Nestes tempos, o que toda a nação precisa é de um bom oficial."
 ig_trait_clube_militar: "Clube Militar"
 ig_trait_clube_militar_desc: "Um lugar onde oficiais e soldados como nós podem descansar, relaxar e organizar em seu tempo livre é certamente inofensivo. Um lugar onde possamos conversar e planejar as coisas pode servir ao país."
 ig_trait_coronelismo: "Coronelismo"
 ig_trait_coronelismo_desc: "Viu o último decreto do governo? Não percebem com quem estão a lidar? Um cavalheiro condecorado como eu, com todos os meus homens e propriedades, não deve ser enganado!"
 ig_trait_divided_ranks: "Classificações Divididas"
 ig_trait_divided_ranks_desc: "Há uma brecha fundamental entre os nossos soldados e os nossos oficiais, que cresceu demasiado para ignorar. Por que arriscaria a vida por alguém que trata seus costumes com desprezo?"
 ig_trait_imperial_service: "Serviço Imperial"
 ig_trait_imperial_service_desc: "Usar o nosso uniforme e expandir a nossa fronteira é uma grande honra, uma que milhões de pessoas procuram. É uma sorte para eles que haja sempre posições a preencher."
 ig_trait_veerta: "Veerta"
 ig_trait_veerta_desc: "O nosso é o exército que conquistou toda a Índia, produzindo um fluxo interminável de vitórias contra todos os inimigos. A nossa coragem e disciplina garantem que este rolo de honra nunca chegue ao fim."

  # Rural Folk IG Traits
 ig_trait_farmers_markets:0 "Mercados de Agricultores"
 ig_trait_farmers_markets_desc:0 "Obter os bens que produzimos para as pessoas que precisam deles parece ser uma grande preocupação hoje em dia. Sob boas circunstâncias, somos capazes de os levar onde precisam de ser nós mesmos."
 ig_trait_honest_work:0 "Trabalho Honesto"
 ig_trait_honest_work_desc:0 "Ganhamos a vida com trabalho honesto e suor honesto. Se isso significa que produzimos mais do que precisamos, muito melhor."
 ig_trait_old_ways:0 "Caminhos Antigos"
 ig_trait_old_ways_desc:0 "Estas pessoas que governam o país parecem ter todo o tipo de ideias sobre o futuro. Porque devemos confiar neles quando foram eles que fizeram do presente o que é?"
 ig_trait_obshchina: "Obshchina"
 ig_trait_obshchina_desc: "A vida na nossa aldeia não é assim tão má. Dividir o trabalho entre todos nós é fácil, e espalhar-se em torno dos produtos e lucros duplamente."
 ig_trait_fellahin: "Fellahin"
 ig_trait_fellahin_desc: "A nossa sorte na vida é trabalhar estes campos da melhor forma possível. Às vezes, o nosso trabalho compensa-nos."
 ig_trait_nucleos_coloniais: "Núcleos Coloniais"
 ig_trait_nucleos_coloniais_desc: "Um novo lar significa um novo começo na vida. Por que não adorar isso? Vamos, vamos ver o que esse novo acordo tem para oferecer."
 ig_trait_plantation_work: "Trabalhos de plantação"
 ig_trait_plantation_work_desc: "Trabalhamos duro dia após dia, e conseguimos o que precisamos para sobreviver. Alguns dias, porém, recebemos mais do que isso, e apreciamos esses dias."
 ig_trait_of_the_sovereign_alone: "Do Soberano Sozinha"
 ig_trait_of_the_sovereign_alone_desc: "O fardo que nos é imposto por aqueles que possuem a terra é insuportável. Estes intermediários devem ser lembrados de que somos ryots do soberano sozinho, e eles não têm poder legítimo sobre nós."
 ig_trait_imandari: "Imandari"
 ig_trait_imandari_desc: "Nossa terra é rica, e trabalhamos com diligência. Nos bons tempos, podemos produzir o que precisamos e muito mais."
 ig_trait_bazaar_bargains: "Negociações de Bazaar"
 ig_trait_bazaar_bargains_desc: "São os nossos bazares que enriquecem as nossas cidades e atraiem visitantes de quilómetros à volta. Se a prosperidade requer alguma organização extra, é um preço que estamos dispostos a pagar."

  # Trade Unions IG Traits
 ig_trait_solidarity:0 "Solidariedade"
 ig_trait_solidarity_desc:0 "Todos aqueles que querem trabalho devem ter trabalho! Ninguém será excluído ou excluído. Devemos apoiar o direito uns aos outros de trabalho compensado."
 ig_trait_industrial_organizers:0 "Organizadores industriais"
 ig_trait_industrial_organizers_desc:0 "Não importa quem está no comando, a forma como os trabalhadores colaboram, em última análise, tem um impacto maior sobre o quão bem uma fábrica funciona do que qualquer regra transmitida do alto."
 ig_trait_work_to_rule:0 "Trabalho em regime"
 ig_trait_work_to_rule_desc:0 "Parece que os responsáveis querem que nos calemos e façamos o que nos mandam, em vez de pensarmos por nós mesmos. Vamos ver como eles gostam se nós realmente aplicarmos essa filosofia ao nosso trabalho 'não qualificado'."
 ig_trait_bourse_du_travail: "Bourse du Travail"
 ig_trait_bourse_du_travail_desc: "A organização não termina no fim do dia de trabalho! Uma frente unida requer ajudar uns aos outros não só no chão da fábrica, mas também em nossas casas e comunidades."

  # Intelligentsia IG Traits
 ig_trait_propagandists:0 "Propagandistas"
 ig_trait_propagandists_desc:0 "Nas nossas poesias, nas nossas cartas e nos nossos manifestos políticos, devemos, acima de tudo, defender o progresso alcançado no nosso país natal como exemplo do que esta nova era tem de trazer a partes menos afortunadas do mundo."
 ig_trait_avant_garde:0 "Avant-garde"
 ig_trait_avant_garde_desc:0 "O que os outros nem sequer se atrevem a pensar, já estaremos falando em voz alta. Nossa arte e idéias cortarão diretamente aos corações e forçarão os olhos abertos, se não em espanto, então em choque!"
 ig_trait_social_criticism:0 "Crítica social"
 ig_trait_social_criticism_desc:0 "As pessoas no poder muitas vezes pensam que são irrepreensíveis, mas a autoridade não torna as ideias de alguém interessantes. Temos muitas coisas interessantes para dizer, e sabemos exatamente sobre quem dizer."
 ig_trait_restoration: "Restauração"
 ig_trait_restoration_desc: "Nesta era de grandes desafios e grandes conquistas, nos orgulhamos de nossa busca obstinada de restaurar a nação à sua velha grandeza. O trabalho extraordinário reafirmou o status de nossa civilização, e o trabalho extraordinário o trará a alturas ainda maiores."
 ig_trait_crisis_of_identity: "Crise de identidade"
 ig_trait_crisis_of_identity_desc: "A nação que servimos pode não ser a nação que realmente somos. Quanto temos em comum com as pessoas responsáveis?"
 ig_trait_les_beaux_arts: "Les Beaux-Arts"
 ig_trait_les_beaux_arts_desc: "As nossas artes, as nossas exposições e o nosso talento criativo estão em segundo lugar. Porque não nos devemos exibir? Merecemos fazer ciúmes aos outros."
 ig_trait_brasilidade: "Brasilidade"
 ig_trait_brasilidade_desc: "Venha, amigo, vamos comemorar esta noite! Aqui podemos ouvir as baladas mais bonitas sob a luz das estrelas com uma garrafa nas mãos, e ali - veja o que ele já está pintando! Não é esta a vida?"
 ig_trait_bachareis: "Bacharéis"
 ig_trait_bachareis_desc: "Sabemos do que a nação precisa! Afinal de contas, falamos pelo povo – O quê? Não, não dissemos que falamos #italic para#! as pessoas."
 ig_trait_swaraj: "Swaraj"
 ig_trait_swaraj_desc: "Encontramo-nos alienados e escravizados pelo Estado. Os nossos governantes negam-nos a agência enquanto solicitam o nosso serviço impensável. Tal coisa está condenada a falhar – e, se necessário, trabalharemos para que isso aconteça."
 ig_trait_westernisation: "Ocidentalização"
 ig_trait_westernisation_desc: "Nosso atual governo serve como representante da justiça e do progresso, mas grande parte do nosso país permanece distante dele. Temos de procurar reduzir a separação entre Estado e pessoas."

  # Petite-Bourgeoisie IG Traits
 ig_trait_treasury_bonds:0 "Obrigações do Tesouro"
 ig_trait_treasury_bonds_desc:0 "Enquanto o governo pode ser confiável para pagar as suas dívidas, colocando as nossas economias árdua para financiar esta grande nação não só é patriótico, mas um bom investimento."
 ig_trait_middle_managers:0 "Gestores Médios"
 ig_trait_middle_managers_desc:0 "Não podemos obrigar toda a gente a seguir as regras, mas podemos pelo menos manter o que está feito nos livros. Alguém tem de se lembrar da maneira correcta de fazer as coisas por aqui."
 ig_trait_xenophobia:0 "Xenofobia"
 ig_trait_xenophobia_desc:0 "Todos sabemos quem é o culpado pelo estado do nosso país, as pessoas têm medo de o dizer. Entretanto, riem-se pelas nossas costas pelo que os deixamos escapar. Alguém tem de agir."
 ig_trait_bergsbrukens_valdistrikten: "Bergsbrukens Valdistrikt"
 ig_trait_bergsbrukens_valdistrikten_desc: "A estreita colaboração entre os interesses mineiros e a propriedade burguesa significa que, em tempos melhores, podemos garantir que o Estado obtenha uma espécie de apoio que outros países só podem sonhar."
 ig_trait_effendi: "Effendi"
 ig_trait_effendi_desc: "Por hábitos sinceros e meios honestos, subimos ao topo, e nossos esforços são justamente louvados por todos."
 ig_trait_reorganization: "Reorganização"
 ig_trait_reorganization_desc: "Sabemos que, com os mandatos e os departamentos certos em vigor, tanto nos reformamos. É só dizeres e começamos."
 ig_trait_master_of_the_house: "Mestre da Casa"
 ig_trait_master_of_the_house_desc: "Por favor! Sente-se. Nós aspiramos ao refinamento aqui — para sermos servos dos pobres, mordomos dos grandes, consoladores e filósofos da nação."
 ig_trait_haute_finance: "Alta Finanças"
 ig_trait_haute_finance_desc: "No jogo das finanças continentais, pretendemos ser os vencedores sendo os primeiros a jogar a nossa mão."
 ig_trait_old_lady_of_threadneedle_street: "A velha senhora da Threadneedle Street"
 ig_trait_old_lady_of_threadneedle_street_desc: "Se a nação precisa de ajuda, há uma senhora idosa por perto que é prudente, segura, e sempre pode ser virada para uma crise: o Banco de Inglaterra."
 ig_trait_civil_service: "Função pública"
 ig_trait_civil_service_desc: "As pessoas têm ideias engraçadas sobre funcionários públicos. Estamos aqui para ajudá-lo a formular e implementar suas políticas, isso é tudo."
 ig_trait_bah_humbug: "Bah Humbug"
 ig_trait_bah_humbug_desc: "Os pobres e a destitude estão em falta, você diz. Não há prisões? As casas de trabalho ainda estão em funcionamento? Então, deixa-me em paz! Aqueles que estão mal devem ir para lá."
 ig_trait_swadesh: "Swadesh"
 ig_trait_swadesh_desc: "Somos tão laboriosos como qualquer outra pessoa, mas somos privados de crédito e forçados a servir as empresas estrangeiras. Se os nossos governantes procurarem excluir-nos da economia, faremos o mesmo por eles."
 ig_trait_lines_of_credit: "Linhas de crédito"
 ig_trait_lines_of_credit_desc: "Se não fosse o crédito fornecido pelos nossos próprios financiadores, a Companhia nunca teria conquistado a Índia. Se nos é dado um caso de negócio sólido, estamos inteiramente dispostos a continuar esta relação."
 ig_trait_cooperative_agencies: "Agências Cooperativas"
 ig_trait_cooperative_agencies_desc: "Nossos governantes possuem capital abundante, mas têm pouco conhecimento do nosso país. Reunindo os seus recursos e os nossos conhecimentos, podemos enriquecer a nossa terra natal muito mais do que eles jamais teriam feito sozinhos."

  # Devout IG Traits
 ig_trait_be_fruitful_and_multiply:0 "Seja frutífero e multiplique"
 ig_trait_be_fruitful_and_multiply_desc:0 "O ascetismo é bom para os poucos que dedicam sua vida às buscas espirituais, mas no povo comum, os valores mais importantes para incutir são os de construir uma família e cuidar dos filhos."
 ig_trait_divine_right:0 "Direito Divino"
 ig_trait_divine_right_desc:0 "Acreditamos que há uma ordem nas nossas vidas. A sociedade pode refletir essa ordem melhor ou pior. Enquanto os governantes forem virtuosos e os seus decretos justos, podemos garantir que o povo saiba porquê."
 ig_trait_pious_fiction:0 "Ficção piedosa"
 ig_trait_pious_fiction_desc:0 "Os valores de hoje são tão envenenados e a literatura tão corrompedora que a própria educação tem um efeito corrosivo sobre a moral. Melhor do que ensinar às pessoas o que o atual estabelecimento considera "verdadeiro" é ensinar-lhes o que deveria ser verdade."
 ig_trait_work_ethic: "Ética do trabalho"
 ig_trait_work_ethic_desc: "Lembre-se, o dinheiro tem uma natureza geradora. O dinheiro gera dinheiro; a produção de lucros é um ato de criação, uma honra e glorificação da própria obra de Deus."
 ig_trait_asceticism: "Ascetismo"
 ig_trait_asceticism_desc: "Abster-se dos prazeres deste mundo é o caminho certo. Não se deixe perturbar pelas mudanças materiais; estas também passarão."
 ig_trait_kar_seva: "Kar Seva"
 ig_trait_kar_seva_desc: "Deus está conosco e entre nós. Servir altruístamente os outros, então, é servir a criação de Deus e servir a Deus. Cabe a todos nós empenhar - nos em trabalho honesto e partilhar os frutos desse trabalho com os outros, e por esses meios estar mais perto de Deus."
 ig_trait_temporal_mandate: "Mandato Temporal"
 ig_trait_temporal_mandate_desc: "A linha entre os céus e a terra é muitas vezes turva; assim também é a linha entre a fé e o governo. É preciso todos os tipos para administrar o mundo secular – podemos sempre encontrar maneiras de fazer nossos sistemas trabalharem juntos."
 ig_trait_the_best_revenge: "A melhor vingança"
 ig_trait_the_best_revenge_desc: "Se quiser vingar-se de seu inimigo, adquira mais boas qualidades e caminhe no caminho da justiça. Ao fazer isso, você inevitavelmente se vingará de seu inimigo, pois ele ficará angustiado com suas boas qualidades, e ele ficará triste com sua boa reputação."
 ig_trait_yeshivot: "Yeshivot"
 ig_trait_yeshivot_desc: "Estudar o Sifrut Chazal é um dever fundamental de cada jovem. Se ninguém foi à escola, como poderiam as nossas leis ser lembradas e mantidas?"
 ig_trait_traditsye: "Traditsye"
 ig_trait_traditsye_desc: "O mundo está a mudar rapidamente à nossa volta. Como devemos manter o nosso equilíbrio se corrermos atrás deste inevitável turbilhão de mudanças?"
 ig_trait_heavenly_sovereign: "Soberano celestial"
 ig_trait_heavenly_sovereign_desc: "Os herdeiros do Imperador Jimmu cuidaram de uma das instituições mais veneráveis da Terra. Esta fonte de tradição merece justamente veneração, e como nação devemos reconhecer isso."
 ig_trait_secular_shrine_theory: "Teoria do Santuário Secular"
 ig_trait_secular_shrine_theory_desc: "Santuários são uma crença inerente do povo japonês, eles existem institucionalmente com o propósito de rituais públicos do estado. O xintoísmo é ideológico: é uma expressão de patriotismo que esperamos de cada cidadão."
 ig_trait_haibutsu_kishaku: "Haibutsu Kishaku"
 ig_trait_haibutsu_kishaku_desc: "As religiões estrangeiras devem ser abolidas da nação e os seus números destruídos. Veja o estrago que causaram! Entrai nos seus santuários, nos seus templos, nas suas cabanas, e mostrai-lhes que não têm lugar aqui!"
 ig_trait_da_wat: "Da'wat"
 ig_trait_da_wat_desc: "Devemos sair, convidar os outros a se juntarem a nós na fé e viver de acordo com a vontade de Deus. O ummah recebe todos."
 ig_trait_sharia: "Sharia"
 ig_trait_sharia_desc: "Viver corretamente requer conhecer as leis que definem o que é correto e o que não é. A interpretação da lei é um dos deveres mais honrados e solenes que podemos cumprir."
 ig_trait_mecelle: "Mecelle"
 ig_trait_mecelle_desc: "Sediado em Hanafi jurisprudência, o Mecelle-i Ahkâm-ı Adliye assegura que seguiremos um código que satisfaça tanto a nossa fé como as nossas expectativas de lei secular."

