 lgbtq_law_devout_empowered:0 "Devout Empowered"
 lgbtq_law_devout_empowered_desc:0 "A comunidade religiosa foi formalmente introduzida no enquadramento legislativo, reforçando a sua posição política e aprofundando o seu empenhamento."

 lgbtq_law_devout_sidelined:0 "Desenho lateralizado"
 lgbtq_law_devout_sidelined_desc:0 "O governo tem mantido o enquadramento religioso fora da justificação, deixando o devoto desengajado e silenciosamente frustrado."

 lgbtq_law_conservatives_unconvinced:0 "Conservadores Não convencidos"
 lgbtq_law_conservatives_unconvinced_desc:0 "A oposição conservadora ouviu o enquadramento do governo e permanece despersuadida, mantendo sua resistência à reforma."

 lgbtq_law_conservatives_rebuked:0 "Conservadores Rebuked"
 lgbtq_law_conservatives_rebuked_desc:0 "O governo desafiou publicamente a oposição conservadora à igualdade de casamento, envergonhando sua posição, mas aguçando sua determinação."

 lgbtq_law_conservatives_placated:0 "Conservadores Platados"
 lgbtq_law_conservatives_placated_desc:0 "As isenções religiosas reduziram a intensidade imediata da oposição conservadora sem resolver o desacordo subjacente."

 lgbtq_law_intelligentsia_engaged:0 "Intelligentsia Engajada"
 lgbtq_law_intelligentsia_engaged_desc:0 "Reformadores e estudiosos legais estão ativamente fazendo o caso público para os direitos LGBTQ, dando autoridade intelectual para o esforço de promulgação."

 lgbtq_law_intelligentsia_sidelined:0 "Intelligentsia Sidelined"
 lgbtq_law_intelligentsia_sidelined_desc:0 "O governo optou por manter a reforma em termos legislativos e não filosóficos, deixando a intelligentsia sem um papel formal no debate."

 abortion_law_moral_absolute:0 "Declarado Absoluto Moral"
 abortion_law_moral_absolute_desc:0 "Os devotos têm enquadrado com sucesso a proibição do aborto como um absoluto moral, dando autoridade teológica ao esforço de promulgação."

 abortion_law_demographic_framing:0 "Adoptado o Framing Demográfico"
 abortion_law_demographic_framing_desc:0 "O governo justificou a proibição do aborto por motivos demográficos e políticos, mantendo a linguagem religiosa fora da justificação oficial."

 abortion_law_exceptions_debate:0 "Excepções Debate resolvido"
 abortion_law_exceptions_debate_desc:0 "O governo tomou uma posição clara sobre a questão das exceções, proporcionando uma base firme para o processo de promulgação continuar."

 abortion_law_medical_exceptions:0 "Excepções médicas permitidas"
 abortion_law_medical_exceptions_desc:0 "Estreitas exceções médicas foram escritas na legislação, retardando a passagem, mas reduzindo a oposição de moderados."

 abortion_law_autonomy_argument:0 "Argumento de Autonomia Corporal"
 abortion_law_autonomy_argument_desc:0 "A intelligentsia tem feito da autonomia corporal a peça central do caso do aborto irrestrito, gerando forte apoio entre os GI reformistas."

 abortion_law_healthcare_framing:0 "Adotado o Framing de Cuidados de Saúde"
 abortion_law_healthcare_framing_desc:0 "O governo tem enquadrado o aborto irrestrito como uma questão de saúde, ampliando seu apelo, evitando o debate filosófico mais profundo."

 abortion_law_religious_opposition:0 "Oposição Religiosa Montada"
 abortion_law_religious_opposition_desc:0 "Os devotos estão paralisando ativamente a liberalização da lei do aborto, aumentando a oposição organizada que está testando a determinação do governo."

 abortion_law_devout_empowered:0 "Devout Empowered"
 abortion_law_devout_empowered_desc:0 "A comunidade religiosa foi colocada no centro da justificação da proibição do aborto, reforçando consideravelmente a sua posição política."

 abortion_law_devout_sidelined:0 "Desenho lateralizado"
 abortion_law_devout_sidelined_desc:0 "O governo tem mantido o enquadramento religioso fora da proibição do aborto, deixando o devoto presente, mas sem um papel formal na justificação."

 abortion_law_devout_rebuked:0 "Devot Rebuked"
 abortion_law_devout_rebuked_desc:0 "O governo tem enfrentado diretamente a oposição religiosa à liberalização do aborto, enfraquecendo a posição política do devoto, mas radicalizando sua base."

 abortion_law_devout_appeased:0 "Devoto Apagado"
 abortion_law_devout_appeased_desc:0 "As proteções da consciência para a equipe médica amoleceram a oposição religiosa à liberalização do aborto sem satisfazer as demandas centrais do devoto."

 abortion_law_intelligentsia_engaged:0 "Intelligentsia Engajada"
 abortion_law_intelligentsia_engaged_desc:0 "Estudiosos jurídicos e reformadores estão fazendo ativamente o caso público de direitos ao aborto, dando credibilidade intelectual e moral ao esforço de promulgação."

 abortion_law_intelligentsia_sidelined:0 "Intelligentsia Sidelined"
 abortion_law_intelligentsia_sidelined_desc:0 "A decisão de enquadrar o acesso ao aborto como uma questão de saúde tem mantido a intelligentsia fora do debate filosófico que eles queriam conduzir."
