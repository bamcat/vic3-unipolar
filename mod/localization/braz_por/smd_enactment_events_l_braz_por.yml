 lgbtq_law_enforcement_cost:0 "Custos de execução absorvidos"
 lgbtq_law_enforcement_cost_desc:0 "A plena aplicação das restrições está a ser financiada, colocando uma pressão adicional nas despesas públicas."

 lgbtq_law_decrim_framing:0 "Decriminalização emoldurada"
