 great_polarization.38.b:0 "Condenar o ataque e reconstruir a confiança."
 
 ## other western countries
 
 je_rise_of_the_right:0 "A ascensão da direita"
 je_rise_of_the_right_reason:0 "Em todo o Ocidente, os movimentos populistas de direita estão ganhando força através da fragmentação da mídia, da migração, da política de cultura-guerra e do ressentimento anti-establishment. Até 2035, os movimentos de direita são mais fortes e líderes populistas de direita são mais propensos a emergir."

 rise_of_the_right_status_baseline:0 "Os movimentos de direita estão a ganhar força."
 rise_of_the_right_status_strong:0 "Uma onda populista de direita está a remodelar a política nacional."
 rise_of_the_right_completion_header:0 "Esta onda diminui após 2035."
 rise_of_the_right_ends_2035_tt:0 "O Ascensão da Direita termina após #bold 1 de Janeiro de 2035#!."
 rise_of_the_right_spawnrate_tt:0 "A taxa de desova do líder populista de direita é aumentada. Os pesos exatos da desova são manuseados manualmente nos arquivos da desova ideologia/característica."

 rise_of_the_right.1.t:0 "A ascensão da direita"
 rise_of_the_right.1.d:0 "Uma nova corrente populista de direita entrou na política nacional. Ela tira força da desconfiança das instituições, raiva das elites, reação cultural e um ambiente de mídia fragmentado."
 rise_of_the_right.1.f:0 "As velhas festas ainda mantêm os escritórios. A nova política está aprendendo a segurar a multidão."
 rise_of_the_right.1.a:0 "O centro político já não é seguro."

 rise_of_the_right.10.t:0 "Raiva Algorítmica"
 rise_of_the_right.10.d:0 "As redes políticas online têm amplificado a indignação anti-establishment, dando movimentos populistas de direita novas maneiras de organizar fora dos partidos tradicionais."
 rise_of_the_right.10.f:0 "Um feed torna-se um comício. Uma queixa torna-se uma plataforma."
 rise_of_the_right.10.a:0 "A indignação espalha-se."
 rise_of_the_right.10.b:0 "Impulsionar as instituições cívicas."

 rise_of_the_right.11.t:0 "Backlash da migração"
 rise_of_the_right.11.d:0 "Um surto de raiva sobre a imigração, integração e identidade nacional tem reforçado os movimentos de direita."
 rise_of_the_right.11.f:0 "A fronteira torna-se um símbolo para cada medo que a velha ordem não pode responder."
 rise_of_the_right.11.a:0 "A reação aumenta."
 rise_of_the_right.11.b:0 "Desacelere o debate."

 rise_of_the_right.12.t:0 "Os populistas rompem"
 rise_of_the_right.12.d:0 "Uma facção populista de direita rompeu o antigo sistema partidário, forçando os principais partidos a responder à sua linguagem e agenda."
 rise_of_the_right.12.f:0 "Já estiveram fora da sala. Agora o quarto está construído à volta deles."
 rise_of_the_right.12.a:0 "Os picos certos."
 rise_of_the_right.12.b:0 "Reconstruir o centro."

 rise_of_the_right.13.t:0 "Política de Rua"
 rise_of_the_right.13.d:0 "Demonstrações, contra-demonstrações e confrontos virais aprofundaram a sensação de que a política saiu do parlamento e foi para as ruas."
 rise_of_the_right.13.f:0 "O canto é política em sua forma larval."
 rise_of_the_right.13.a:0 "As ruas radicalizam."
 rise_of_the_right.13.b:0 "Arrefece a temperatura."

 rise_of_the_right_baseline:0 "A ascensão da direita"
 rise_of_the_right_baseline_desc:0 "Os movimentos de direita estão ganhando força em toda a política nacional."

 rise_of_the_right_populist_surge:0 "Surge o populista de direita"
 rise_of_the_right_populist_surge_desc:0 "Os populistas de direita estão a remodelar a paisagem política."

 rise_of_the_right_migration_backlash:0 "Backlash da migração"
 rise_of_the_right_migration_backlash_desc:0 "A imigração e a identidade nacional tornaram-se condutores centrais da mobilização política."

 rise_of_the_right_online_radicalization:0 "Raiva Algorítmica"
 rise_of_the_right_online_radicalization_desc:0 "O ultraje online está acelerando a mobilização política de direita."

