 great_polarization.4.f:0 "A alimentação não convence. Aumenta."
 great_polarization.4.a:0 "A máquina de ultrajes acelera."
 great_polarization.4.b:0 "Plataformas de pressão moderadas."

 great_polarization.5.t:0 "Uma onda de exposição"
