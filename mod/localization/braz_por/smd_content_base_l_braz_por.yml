 great_polarization.130.t:0 "Liderar a América Azul?"
 great_polarization.130.d:0 "Com os Estados Unidos fraturados, o caráter liberal ou de centro-esquerda da administração o coloca mais próximo da América Azul. Você pode continuar a guerra como América Azul ou permanecer com os remanescentes dos Estados Unidos."
 great_polarization.130.f:0 "Um governo pode reivindicar continuidade, mas o poder segue as instituições que ainda obedecem."
 great_polarization.130.a:0 "Mude para a América Azul."
 great_polarization.130.b:0 "Permaneçam como Estados Unidos."

 great_polarization.131.t:0 "Liderar a América Vermelha?"
 great_polarization.131.d:0 "Com os Estados Unidos fraturados, o carácter de direita da administração coloca-o mais próximo da América Vermelha. Você pode continuar a guerra como América Vermelha ou permanecer com os remanescentes dos Estados Unidos."
 great_polarization.131.f:0 "A bandeira tem a mesma forma, mas o país por baixo mudou."
 great_polarization.131.a:0 "Mude para a América Vermelha."
 great_polarization.131.b:0 "Permaneçam como Estados Unidos."

