 great_polarization.1.t:0 "A Grande Polarização"
 great_polarization.1.d:0 "Os Estados Unidos estão entrando em uma nova era de polarização política, impulsionada pela fragmentação da mídia, pela política de cultura-guerra e pelo medo mútuo entre blocos ideológicos."
