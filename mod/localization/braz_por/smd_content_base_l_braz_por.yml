 great_polarization.3.f:0 "O tiro falhou seu alvo, mas atingiu a república."
 great_polarization.3.a:0 "O país recua."
 great_polarization.3.b:0 "Expandir a segurança de protecção."

 great_polarization.4.t:0 "Aborrecimento Algorítmico"
