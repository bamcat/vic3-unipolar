 great_polarization.1.a:0 "O centro começa a rachar."
 great_polarization.30.t:0 "A morte de George Floyd"
 great_polarization.30.d:0 "A morte de George Floyd pela polícia desencadeou uma onda de protesto nacional, com exigências de responsabilidade, reforma policial e justiça racial."
 great_polarization.30.f:0 "O vídeo não permanece local. Torna-se uma acusação nacional."
 great_polarization.30.a:0 "As ruas entram em erupção."
 great_polarization.30.b:0 "Promete uma reforma séria."
 great_polarization.31.t:0 "CHOP / CHAZ"
 great_polarization.31.d:0 "Uma zona de protesto ocupada formou-se em Seattle, tornando-se um símbolo nacional de ativismo anti-polícia e medos de retirada do estado."
 great_polarization.31.f:0 "Para seus apoiadores, é auto-governo comunitário. Para seus oponentes, é colapso em miniatura."
 great_polarization.31.a:0 "Deixe o impasse acabar."
 great_polarization.31.b:0 "Limpem a zona."
 great_polarization.32.t:0 "Tentativa de Assassinato em Butler"
 great_polarization.32.d:0 "Uma tentativa de assassinato de Donald Trump em um comício em Butler, Pensilvânia tem intensificado os medos de violência política e vingança."
 great_polarization.32.f:0 "A imagem viaja mais depressa do que os factos."
 great_polarization.32.a:0 "Os comícios certos com raiva."
 great_polarization.32.b:0 "Apelo à calma nacional."
 great_polarization.33.t:0 "Sem Reis"
 great_polarization.33.d:0 "Manifestações em massa sob o slogan "Sem Reis" encheram ruas em todo o país, enquadradas por apoiadores como uma defesa da democracia e por oponentes como resistência desestabilizadora."
 great_polarization.33.f:0 "A multidão canta contra a monarquia numa república que teme ter esquecido a diferença."
 great_polarization.33.a:0 "O movimento espalha-se."
 great_polarization.33.b:0 "Desative o confronto."
 great_polarization.34.t:0 "Minnesota legisladores alvo"
 great_polarization.34.d:0 "Tiros visando Minnesota legisladores estaduais têm aprofundado o medo nacional de que as disputas políticas estão deslizando para a violência organizada."
 great_polarization.34.f:0 "Uma porta torna-se uma linha de frente."
 great_polarization.34.a:0 "A segurança torna-se política."
 great_polarization.34.b:0 "Condenar a violência política em todo o espectro."
 great_polarization.35.t:0 "Charlie Kirk Assassinado"
 great_polarization.35.d:0 "O assassinato de Charlie Kirk enquanto falava num evento público tornou-se um ponto de referência na crescente crise política americana."
 great_polarization.35.f:0 "Um microfone se cala; um movimento cresce mais alto."
 great_polarization.35.a:0 "A direita radicaliza."
 great_polarization.35.b:0 "Condenar a matança e baixar a temperatura."
 great_polarization.36.t:0 "Tiros de ICE"
 great_polarization.36.d:0 "Tiros fatais envolvendo agentes federais de imigração têm desencadeado protestos anti-ICE, indignação nacional e argumentos ferozes sobre o poder federal."
 great_polarization.36.f:0 "O distintivo torna-se o argumento."
 great_polarization.36.a:0 "Os protestos espalharam-se."
 great_polarization.36.b:0 "Suspenda as operações e investigue."
 great_polarization.37.t:0 "Lei dos Direitos de Votação Estripada"
 great_polarization.37.d:0 "Uma decisão do Supremo Tribunal tem enfraquecido fortemente a Lei dos Direitos de Voto, provocando acusações de que o poder de voto das minorias está a ser desmantelado antes das eleições de 2026."
 great_polarization.37.f:0 "O tribunal fala em doutrina. O país ouve o poder."
 great_polarization.37.a:0 "A confiança desmorona."
 great_polarization.37.b:0 "Prosseguir a legislação sobre direitos de voto de emergência."
 great_polarization.100.t:0 "A Segunda Guerra Civil Americana"
 great_polarization.100.d:0 "Uma crise revolucionária quebrou os Estados Unidos. Autoridade federal é contestada, e facções armadas estão começando a esculpir o país em governos rivais."
 great_polarization.100.f:0 "A primeira guerra civil perguntou se a união poderia sobreviver. O segundo pergunta o que é a união."
 great_polarization.100.a:0 "As fracturas do sindicato."
