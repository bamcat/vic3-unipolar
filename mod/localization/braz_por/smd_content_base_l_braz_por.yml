 great_polarization.5.f:0 "O que tinha sido sussurrado é agora pesquisável."
 great_polarization.5.a:0 "O julgamento se espalha."
 great_polarization.5.b:0 "Construir canais institucionais para a responsabilização."

 great_polarization.6.t:0 "Minorias Destinadas"
 great_polarization.6.d:0 "Um surto de hostilidade em relação às comunidades minoritárias desencadeou protestos, contra-protestos e um renovado debate sobre racismo, identidade e pertença nacional."
 great_polarization.6.f:0 "Para alguns, é uma reação. Para outros, é sobrevivência."
 great_polarization.6.a:0 "As ruas enchem novamente."
 great_polarization.6.b:0 "Condene a reação e reduza a temperatura."

 great_polarization.20.t:0 "As Quedas de Temperatura"
 great_polarization.20.d:0 "A polarização não desapareceu, mas a espiral mais perigosa foi interrompida. As instituições políticas recuperaram alguma legitimidade."
 great_polarization.20.f:0 "Uma república sobrevive não porque seus cidadãos concordem, mas porque o suficiente deles aceitam perder."
 great_polarization.20.a:0 "A união dura."

 great_polarization.21.t:0 "O Dividido Entretido"
 great_polarization.21.d:0 "A crise imediata não explodiu na guerra civil, mas a polarização tornou-se incorporada na vida política americana."
 great_polarization.21.f:0 "A febre não diminuiu. Tornou-se crónico."
 great_polarization.21.a:0 "O novo normal."

