 great_polarization.2.t:0 "Tiro em massa politicamente motivado"
 great_polarization.2.d:0 "Um tiroteio em massa ligado à retórica política extremista chocou o país. As facções concorrentes argumentam imediatamente sobre a culpa, segurança, liberdades civis e ideologia."
