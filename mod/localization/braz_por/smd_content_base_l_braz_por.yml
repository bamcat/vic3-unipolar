 # transit rights
 
 je_transit_rights: "Aterrado!"
 je_transit_rights_reason: "[ROOT.GetCountry.GetName] não tem litoral. O acesso aos mercados internacionais depende inteiramente da boa vontade dos países vizinhos. Garantir um acordo de direitos de trânsito com pelo menos um deles é essencial para o comércio e a flexibilidade estratégica."
 secure_transit_rights_treaty:0 "Assinar um tratado de direitos de trânsito com qualquer país vizinho não fechado."
 # ==========================================
 # JOURNAL ENTRY
 # ==========================================
 
 je_covid_pandemic: "Pandemia de COVID-19"
 je_covid_pandemic_reason: "Um novo coronavírus respiratório surgiu em [ROOT.GetCountry.GetName] e está se espalhando rapidamente pelo mundo. COVID-19 espalha-se mais rápido do que qualquer patógeno na memória viva, explorando as densas redes de comércio e viagens que ligam o mundo moderno. A mortalidade concentra-se entre os idosos e os imunocomprometidos, mas o seu alcance ameaça sobrecarregar os sistemas de saúde em todos os países em que toca.\n\nUse o #bold COVID-19 Response#! decisão de definir políticas. Os bloqueios retardam a expansão, mas martelam a economia. Máscaras e distanciamento são menos eficazes mas mais sustentáveis. Também não fazer nada é uma escolha — um dos eleitores e os mortos se lembrarão."
 
 # ==========================================
 # covid.1 — PANDEMIC ARRIVES
 # ==========================================
 
 covid.1.t: "Um Coronavírus Novel"
 covid.1.d: "Foi notificado um grupo de casos de pneumonia invulgar em [SCOPE.sState('plague_origin_state').GetName], [ROOT.GetCountry.GetName]. A análise preliminar de [ROOT.GetCountry.GetAdjective] autoridades de saúde sugere um coronavírus previamente desconhecido — espalhando-se humano-humano, com um período de incubação suficientemente longo que os portadores são contagiosos antes de saberem que estão doentes.\n\nA Organização Mundial de Saúde foi notificada. Se isto continua a ser um surto local ou se torna algo mais depende das decisões tomadas nas próximas semanas."
 covid.1.f: "Um novo agente patogénico. Outra vez."
 covid.1.a: "Notificar a OMS e iniciar o rastreio de contacto"
 
 # ==========================================
 # covid.2 — SPREAD
 # ==========================================
 
 covid.2.t: "COVID-19 Alcança [ROOT.GetCountry.GetName]"
 covid.2.d: "Os casos do novo coronavírus identificados pela primeira vez em [SCOPE.sCountry('plague_originator_country').GetName] foram confirmados em [ROOT.GetCountry.GetName]. O vírus chegou — através de um viajante, uma rota comercial, ou simplesmente as correntes invisíveis de um mundo conectado.\n\n[ROOT.GetCountry.GetAdjective] as autoridades sanitárias estão ativando protocolos de resposta pandémica. Use a decisão #bold COVID-19 Response#! para definir a política."
 covid.2.f: "Era só uma questão de tempo."
 covid.2.a: "Ativar protocolos de pandemia"
 
 # ==========================================
 # covid.3 — SUBSEQUENT WAVES
 # ==========================================
 
 covid.3.t: "A variante Omicron"
 covid.3.d: "Uma nova variante causou uma nova onda de infecções por COVID-19. As autoridades sanitárias estão reavaliando os protocolos de contenção."
 covid.3.f: "O vírus ainda está connosco."
 
 # ==========================================
 # covid.4 — NOTIFICATION TO OTHER PLAYERS
 # ==========================================
 
 covid.4.t: "O novo vírus de Wuhan, China"
 covid.4.a: "Acompanhar de perto a situação"
 
 # ==========================================
 # covid.5 — RESPONSE CHOICE
 # ==========================================
 
 covid.5.t: "Política de resposta COVID-19"
 covid.5.d: "Como deve [ROOT.GetCountry.GetName] responder à pandemia? A escolha definirá a paisagem económica e social dos próximos anos."
 covid.5.f: "Não há boas opções. Só trocas."
 covid.5.a: "Bloqueio total — empresas próximas, movimentos restritos"
 covid.5.b: "Mandatos de máscaras e diretrizes de distanciamento social"
 covid.5.c: "Manter a economia aberta — priorizar a recuperação"
 
 # ==========================================
 # covid.7 — WAR SUPPORT
 # ==========================================
 
 covid.7.t: "A pandemia mina o esforço de guerra"
 covid.7.d: "Com a população de COVID-19 devastando [ROOT.GetCountry.GetName], [SCOPE.gsInterestGroup('pacifist_ig').GetName] — liderada por [SCOPE.sCharacter('pacifist_leader').GetFullName] — questiona-se se um país que combate uma pandemia pode sustentar uma guerra simultaneamente. A população está esgotada. Os hospitais de campo estão competindo com a logística de linha de frente para recursos."
 covid.7.f: "Combater o vírus ou combater o inimigo. Fazer as duas coisas é difícil."
 covid.7.a: "A guerra continua — o vírus não muda isso"
 covid.7.b: "Usar mensagens de saúde pública para manter a moral"
 covid.7.c: "Suprimir a narrativa derrotista"
 
 # ==========================================
 # covid.8 — POVERTY AND EVICTIONS
 # ==========================================
 
 covid.8.t: "O pedágio econômico da pandemia"
 covid.8.d: "A pandemia custou milhares de trabalhadores [ROOT.GetCountry.GetAdjective] seus empregos, e em [SCOPE.sState('plague_poverty_state').GetName], o desemprego ultrapassou 20%. As famílias não podem pagar renda. Os proprietários — apoiados por [SCOPE.gsInterestGroup('landowner_ig').GetName] — estão a pressionar pelo direito de despejar. A pobreza concentra-se nas áreas já mais atingidas pelo vírus."
 covid.8.f: "Uma pandemia dentro da pandemia."
 covid.8.a: "Impor um congelamento de renda e moratória de despejo"
 covid.8.b: "Aumentar as prestações de segurança social e de desemprego"
 covid.8.c: "O mercado vai resolver isso."
 
 # ==========================================
 # covid.9 — ANTI-MASK RESISTANCE
 # ==========================================
 
 covid.9.t: "Protestos Anti-Lockdown"
 covid.9.d: "[SCOPE.gsInterestGroup('anti_mask_ig').GetName], liderado por [SCOPE.sCharacter('anti_mask_ig_leader').GetFullName], organizou protestos em massa contra [ROOT.GetCountry.GetName] restrições de pandemia. Sua posição: os bloqueios e mandatos mascarados são o exagero do governo, o dano econômico é maior que o risco à saúde, e os cidadãos têm o direito de fazer suas próprias escolhas.\n\n Os protestos estão a aumentar. Como [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName] responde irá estabelecer um precedente."
 covid.9.f: "Máscaras. A colina que escolheram."
 covid.9.a: "Manter firme — as restrições permanecem"
 covid.9.b: "Retirar — levantar as restrições"
 covid.9.c: "Rebates científicos da Comissão e campanhas de saúde pública"
 
