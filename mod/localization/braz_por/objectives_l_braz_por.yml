objective_the_west_name_USA:0 "O único superpoder"
objective_the_west_name_GBR:0 "Os Problemas"
objective_the_west_name_FRA:0 "França de Mitterrand"

objective_the_west_desc_USA:0 "Os Estados Unidos da América encontram-se numa posição única na virada do século XXI. Sendo a principal superpotência do mundo, e a mais forte nação que a humanidade já viu, a República enfrenta um conjunto de problemas externos e internos difíceis. Apesar do colapso do principal rival da América, a União Soviética, a ameaça de terrorismo, a China e várias outras ameaças ao mundo livre colocam em questão o envolvimento da América. Será que os Estados Unidos continuarão a ser a superpotência mundial? O tempo dirá."
objective_the_west_desc_GBR:0 "Em 1992, o Reino Unido lutava contra a incerteza económica e a turbulência política. O país emergiu recentemente de uma profunda recessão, marcada por um elevado desemprego e uma queda na confiança dos consumidores. Acrescentando-se aos problemas britânicos, a instabilidade na Irlanda do Norte, agora conhecida como "As Perturbações", continua a ser um tema quente de debate. Como é que a Britânia vai sobreviver a estes tempos turbulentos?"
objective_the_west_desc_FRA:0 "A paisagem política da França foi marcada pela crescente tensão sobre a integração europeia e os desafios económicos internos. O presidente François Mitterrand, um socialista em seu segundo mandato, enfrentou o declínio da popularidade como o país lutou com o desemprego elevado e crescimento econômico lento. Seu governo, liderado pelo primeiro-ministro Pierre Bérégovoy, estava lutando com o descontentamento público sobre medidas de austeridade destinadas a estabilizar a economia. Politicamente, a França estava profundamente dividida em relação ao Tratado de Maastricht, que visava reforçar a integração europeia e abrir o caminho para o euro. A UE tem o necessário para sobreviver ao século XXI?"

objective_the_east_name_RUS:0 "Queda da União Soviética"
objective_the_east_name_PRC:0 "A Grande República Popular"
objective_the_east_name_IRQ:0 "Iraque de Saddam Hussein"

objective_the_east_desc_RUS:0 "A Rússia está a passar por uma dramática transformação política após a dissolução da União Soviética em Dezembro de 1991. Boris Yeltsin, o primeiro presidente da Federação Russa, enfrentou o imenso desafio de liderar uma democracia incipiente enquanto navegava a transição caótica de um sistema comunista centralizado para uma economia de mercado. Domesticamente, o governo de Yeltsin lutou com instabilidade política, inflação crescente e agitação social generalizada como reformas econômicas, conhecidas como “terapia de choque”, levaram a dificuldades para milhões. Diplomaticamente, a Rússia procurou redefinir seu papel no cenário mundial, forjando novas relações com as potências ocidentais, enquanto tentava manter influência sobre as antigas repúblicas soviéticas."
objective_the_east_desc_PRC:0 "A China está a emergir cautelosamente do isolamento internacional e das sanções das nações ocidentais. Politicamente, o país estava firmemente sob o controle do Partido Comunista Chinês (PCC), com Deng Xiaoping mantendo influência significativa, apesar de ter formalmente se aposentado de posições de liderança. Seu famoso "Southern Tour" no início de 1992 revigorou o compromisso da China com a reforma econômica e abertura, sinalizando um novo impulso para políticas orientadas para o mercado e uma maior integração com a economia global"
objective_the_east_desc_IRQ:0 "Reeling from a devastating loss in the Gulf War last year, and facing intense international isolation. Saddam Hussein remained firmly in power, maintaining an iron grip on the country through brutal repression of internal dissent, particularly against the Shi'a in the south and the Kurds in the north. Iraq truly has several paths going into the 2000s.

objective_rising_powers_name_IDA:0 "O século indiano"
objective_rising_powers_name_BRZ:0 "A ascensão do Brasil à dominação"
objective_rising_powers_name_VNM:0 "Ascensão do Vietname"

objective_rising_powers_desc_IDA:0 "A Índia está navegando por um período de mudanças políticas e econômicas significativas. O país foi liderado pelo primeiro-ministro P.V. Narasimha Rao, que tinha chegado ao poder em 1991 e iniciou uma série de reformas econômicas transformadoras destinadas a liberalizar a economia e integrá-la mais estreitamente com o mercado global."
objective_rising_powers_desc_BRZ:0 "Em 1992, o Brasil estava em meio a uma transição política após o fim do governo militar em 1985. O país foi governado pelo presidente Fernando Collor de Mello, que assumiu o cargo em 1990 como primeiro presidente eleito diretamente pelo Brasil em mais de 20 anos. O governo de Collor começou com uma onda de reformas econômicas destinadas a estabilizar a economia, mas sua administração logo enfrentou crescente desilusão pública devido ao aumento das alegações de inflação e corrupção. Em 1992, Collor estava envolvido em um grande escândalo de corrupção, levando a protestos em massa e pede seu impeachment. Diplomaticamente, o Brasil estava focado em melhorar sua imagem internacional e ampliar sua influência na América Latina. Buscava também estreitar laços com os países ocidentais ao mesmo tempo em que afirmava seu papel em questões globais, particularmente em questões ambientais relacionadas à floresta amazônica. No entanto, a instabilidade política e as dificuldades econômicas continuaram a dominar a agenda nacional."
objective_rising_powers_desc_VNM:0 "O Vietname estava gradualmente a reintegrar-se na comunidade internacional após anos de isolamento após o fim da Guerra do Vietname e os efeitos severos das sanções económicas. Em 1992, o Vietnã normalizou as relações com os Estados Unidos e juntou-se à Associação das Nações do Sudeste Asiático (ASEAN), sinalizando uma mudança para uma maior cooperação regional e um interesse em melhorar as relações com o Ocidente. Que caminho seguirá o Vietname? Depende de ti."
