l_braz_por:
 
  # Middle East
  YMN_FLAVOR_TEXT:0 "Os esforços para se manter no poder deram errado e a guerra irrompeu no Iêmen entre o antigo governo, o Conselho de Transição e o Houthi. Esta guerra brutal trouxe consigo os olhos curiosos dos poderes na Arábia, colocando-os uns contra os outros para balançar o Iémen em seu favor. Será que o Iémen terá de suportar a subjugação dos seus vizinhos, ou será capaz de sair por cima?"
  HOU_FLAVOR_TEXT:0 "$YMN_FLAVOR_TEXT$"
  STC_FLAVOR_TEXT:0 "$YMN_FLAVOR_TEXT$"
  SYR_FLAVOR_TEXT:0 "A Síria sofre actualmente de uma complexa guerra civil que se transformou numa guerra de procuração contra várias potências. A região continua extremamente hostil e os conflitos só aumentam entre os provisórios acreditando em seu direito de governar, e Rojava se libertando para formar uma república mais progressista. Os refugiados partem e enxameiam a Europa em busca de terras mais seguras para viver. Será que a Síria vai acabar com a guerra e trazer de volta sua população rapidamente fugaz, ou está destinada a falhar e se tornar um vácuo para as outras potências?"
  SIG_FLAVOR_TEXT:0 "$SYR_FLAVOR_TEXT$"
  ROJ_FLAVOR_TEXT:0 "$SYR_FLAVOR_TEXT$"
  IRA_FLAVOR_TEXT:0 "O Irã está à beira de sua própria revolução islâmica, O país se sente com a relativa estabilidade do Islã tradicional e não foi afetado pela primavera árabe. No entanto, os efeitos da Primavera Árabe não passaram despercebidos pela população mais jovem, e a população anseia pelo fim das suas formas extremistas-tradicionais. Pode o Irão manter os seus valores tradicionais? Ou serão derrubados por uma população mais multicultural?"
  
  # East Asia
  PRC_FLAVOR_TEXT:0 "A República Popular da China é um hegemão econômico global e tem sido um financiador de nações menos afortunadas. No entanto, os esquemas de retenção de dívidas estão contra-atacando, e a confiança em bens chineses está sendo enfraquecida por seus vizinhos próximos e automação. A China pode restabelecer o seu domínio económico. Ou estão destinados a desmoronar-se devido a tensões internas?"
  NRK_FLAVOR_TEXT:0 "A Coreia do Norte continua a ser o último bastião da ditadura maoísta no planeta. Os vários jogos mentais e lavagem cerebral da nação permanece excruciantemente eficaz, apesar de quão rigoroso e mortal seu regime é. O regime de 80 anos vai durar mais 80? Ou é para reunificar com o seu vizinho ao sul e reconstruir a partir daí?"
  JPN_FLAVOR_TEXT:0 "O Japão tem permanecido uma nação desarmada desde o fim da Segunda Guerra Mundial, mas isso não impediu o seu extremo controle econômico. Automotivos japoneses e eletrônicos japoneses são conhecidos em todo o mundo e reverenciados como os melhores dos melhores. Mas isto não é sem sacrifício... O país tem uma população envelhecida, e está entre muitas potências regionais. O que é preciso para o Japão permanecer independente?"
  
  # Oceania
  AUZ_FLAVOR_TEXT:0 "Austrália, a terra da oportunidade e o 'Sonho'. Enquanto a posição dos EUA vacila, a Austrália, apesar de suas deficiências e ambiente mais quente, o continente que atravessa o país tem reverenciado o nome 'A Terra da Oportunidade'. No entanto, divisões políticas internas e o clima de aquecimento procuram arruinar a chance da Austrália de ser um bastião de prosperidade. Pode a Austrália atravessar com êxito o mundo moderno?"
  
  # Balkans
  SRB_FLAVOR_TEXT:0 "A Sérvia é um estado de azáfama e resto final do fracasso da experiência Jugoslava. Tendo perdido tanto Montenegro e Kosovo nos últimos anos, a nação anseia por uma vitória. Irá a Sérvia recuperar a glória perdida da Jugoslávia?"
  
  # Europe
  ENG_FLAVOR_TEXT:0 "A Inglaterra rugiu ao longo do século XX, exercendo a força como um grande poder, no entanto múltiplas recessões, corrupção política em larga escala e diminuição da legitimidade puseram em causa o ato de união. Pode a Inglaterra manter o seu controlo sobre os seus domínios? Ou será que deixar o mercado europeu foi a gota d'água?"
  SCO_FLAVOR_TEXT:0 "A Escócia manteve-se relativamente ilesa durante as recessões do início do século XXI, e continua a prosperar desde que a desconcentração foi concedida. Corrupção em larga escala e falha de representação dentro da união têm colocado seu lugar em questão. Será próspero uma vez ganhando a independência? Ou será a união o caminho do futuro?"
  NIR_FLAVOR_TEXT:0 "A última posição do imperialismo britânico na Irlanda, a Irlanda do Norte é um barril de pólvora à espera de ser aceso. Os problemas podem ter acabado, mas a questão de sua soberania continua a permear-se à medida que a geração mais jovem anseia por unificação com seus irmãos do sul... Os britânicos aguentam a Irlanda, vai seguir o caminho dos monarcas?"
  IRE_FLAVOR_TEXT:0 "A Irlanda transformou-se de um país sob a bota imperial britânica, para o farol brilhante da anglosfera, os esforços para reacender a sua língua e distanciar-se do Reino Unido provaram-se bem sucedidos e os esforços entre si e o seu vizinho ao norte conduziram a um desejo de unidade. O que virá a seguir para as Ilhas Esmeraldas?"
  UKR_FLAVOR_TEXT:0 "Os esforços de ocidentalização na Ucrânia foram longe e as vidas de muitos ucranianos estão melhorando rapidamente, no entanto, uma invasão russa para a Crimeia 8 anos antes levou uma região importante. Separatistas no leste também deram à Rússia uma abertura para o coração. A Ucrânia pode trazer os separatistas de volta sob a dobra, ou são a Ucrânia o próximo alvo nas ambições crescentes da Rússia"
  CYP_FLAVOR_TEXT:0 "Chipre é uma ilha dividida pelos grupos étnicos, gregos no sul, turcos no norte. No entanto, uma crescente identidade cipriota está se formando e pode não demorar muito até que haja apelos para unificar a nação de uma vez por todas. Será que Chipre será capaz de unificar com êxito, ou será destinado a estar sempre dividido?"
  BYL_FLAVOR_TEXT:0 "A Bielorrússia está no início de uma revolução política, os seus cidadãos estão activamente contra o governo e o verdadeiro chefe de Estado perdeu a eleição através de um voto fraudulento. Lukashenko está se aproximando do vizinho russo para proteger seu controle. Será Lukashenko bem sucedido, ou os bielorrussos irão pôr fim ao seu governo ilegítimo?"
  SPA_FLAVOR_TEXT:0 "Espanha está suportando um boom agradável após a expulsão do movimento Falangista, É um país de rápida modernização, e está fazendo esforços para um futuro maior para o seu povo. No entanto, nem todos concordam com sua direção, como um movimento de independência na Catalunha ganha vapor. A Espanha prosperará com ou sem a Catalunha?"
  XSP_FLAVOR_TEXT:0 "Espanha está suportando um boom agradável após a expulsão do movimento Falangista, É um país de rápida modernização, e está fazendo esforços para um futuro maior para o seu povo. No entanto, nem todos concordam com sua direção, como um movimento de independência na Catalunha ganha vapor. A Espanha prosperará com ou sem a Catalunha?"
  NRW_FLAVOR_TEXT:0 "A Noruega continua a ser um dos poucos países que entram no século XXI uma nação mais forte do que antes, um sistema de segurança social forte e recursos poderosos que pode empurrar para o mercado torná-lo o luxuoso lugar de sonhos. No entanto, à medida que o mundo se afasta do petróleo, poderá a Noruega manter com êxito as suas proezas, ou será que o seu fim será a diminuição do petróleo?"
  RSF_FLAVOR_TEXT:0 "Desde a queda da União Soviética, a Rússia, seu estado sucessor, vacilou para se apegar ao mesmo poder econômico e proeza no entanto. A maioria de suas campanhas desde a queda da união foram para restabelecer o domínio econômico. Na Geórgia em 2008, e na Ucrânia em 2014. No entanto, os oligarcas falam de outra campanha na Ucrânia, para tomar as terras a leste do dnieper e as regiões separatistas do leste. É este o seu caminho no século 21, ou eles vão falhar?"
  EUR_FLAVOR_TEXT:0 "A União Europeia é o cérebro da reconstrução pós-guerra após a devastação trazida pela WW2. Desde então evoluiu para incluir a maioria do continente, bar algumas nações como Noruega e Suíça, ou os Balcãs Ocidentais e antigos estados de iugoslávia. A união só se reforçou desde a escolha incomum do Reino Unido para resgatá-lo, e a maioria das conversas de deixá-lo já não foram levadas a sério na maioria dos países, A União muito só é reforçada daqui à medida que fala de uma federação crescer. Irá a União Europeia evoluir para a Federação Europeia? Ou será que a União Europeia vai acabar por ser mencionada apenas nos livros de história?"
  TRK_FLAVOR_TEXT:0 "Türkiye é a principal barreira nas ambições marítimas da Rússia, e tem um gancho estratégico sobre muitos de seus vizinhos. Está ativamente envolvida nos conflitos ao sul, apoiando o governo provisório da Síria e tendo milícias ativas na África e no Oriente Médio. A posição de Türkiye na região anatoliana oferece-lhe um grande controle sobre as regiões ao seu redor, e entrincheira as ambições dos Osmans antes dele. Türkiye vai manter as suas ambições? Ou está destinado a falhar como os otomanos antes?"
  
  # North America
  USS_FLAVOR_TEXT:0 "Os Estados Unidos tiveram um próspero século XX graças ao boom econômico do pós-guerra e tem catapultado como a única superpotência até o final do século. No entanto, a corrupção em larga escala e táticas dissimuladas por corporações servem para rasgar o tecido na união. À medida que os EUA ficam ainda mais para trás, tanto socialmente como economicamente. O que reserva o futuro para a União, e poderão eles recuperar a sua antiga glória?"
  MEX_FLAVOR_TEXT:0 "Os cartéis de drogas e o imperialismo americano são as características definidoras do México do século 21. No entanto, muitos esforços foram feitos para resolver os cartéis sem que os EUA travassem uma guerra em seu solo. O que o México tem em reserva para o próximo século, e eles podem escapar com sucesso das garras do imperialismo americano"
  CAN_FLAVOR_TEXT:0 "O Canadá rugiu para o século 21 como uma nação estável, sem grandes problemas. No entanto, as primeiras nações estão exigindo concessões sobre seu tratamento horrível desde a fundação do reino canadense. Aceitará o Canadá?"
  
  # Central Asia
  AFH_FLAVOR_TEXT:0 "O Cemitério dos Impérios, Afeganistão, resistiu com sucesso aos esforços do imperialismo americano e garantiu sua soberania como uma potência regional. No entanto, os conflitos entre os vários grupos étnicos e detratores da fé ameaçam o modo de vida tradicional. Pode o Afeganistão ultrapassar com êxito as suas formas tradicionais?"
  AZB_FLAVOR_TEXT:0 "O Azerbaijão é uma próspera nação caucasiana, descobertas recentes de reservas de petróleo e gás tornaram-no um aliado importante para a Europa, no entanto os conflitos de Artsakh, e as guerras de fronteira subsequentes com sua vizinha Armênia tem impedido que eles cheguem ao seu maior. Pode o Azerbaijão resolver pacificamente esta crise, ou irá voltar-se para a guerra?"
  KZK_FLAVOR_TEXT:0 "O Cazaquistão está entre diferentes lideranças e governos e caiu para uma leve anarquia. Seu líder anterior deixou um enorme vácuo de poder e novos governantes apareceram para tentar conduzir o Cazaquistão em uma direção muito agradável. O Cazaquistão pode sobreviver à sua luta interna de poder?"
  UZB_FLAVOR_TEXT:0 "O Uzbequistão tem lutado para se libertar da ditadura desde a sua separação da URSS nos anos 90, no entanto, começou com sucesso a liberalizar e continua a melhorar a sua situação com os seus vizinhos. Embora continue a tornar-se mais afortunada, o mesmo não se pode dizer de alguns dos seus vizinhos, e terá de proclamar a sua soberania para sobreviver..."
  
  # Africa
  SAF_FLAVOR_TEXT:0 "A África do Sul é uma nação que está lutando para encontrar o seu caminho, os conflitos que definem a sua história levaram-nos a ser, na melhor das hipóteses, ressentimento entre os vários grupos étnicos, esta tensão só foi agravada a partir do apartheid. Se a África do Sul pretende prosperar, tem um caminho áspero de concessões, reconstrução e reforma política a fazer. A África do Sul pode fazer isso? Ou está destinado a desmoronar-se."
  SSD_FLAVOR_TEXT:0 "Sudão do Sul nasceu do conflito resultante dos grupos étnicos ao longo do Nilo, É o país mais novo a ser reconhecido pelas Nações Unidas, e tem um longo caminho a percorrer antes que possa ser considerado um sucesso. As tensões étnicas mantêm o país parado e devem ser feitas manobras cuidadosas para garantir que esta nação não seja de curta duração. É capaz disto?"
  ETH_FLAVOR_TEXT:0 "A Etiópia é uma nação de rápida modernização, e conseguiu ser relativamente ilesa por mãos coloniais. No entanto, a nação ainda tem seus problemas, como os somalis, tigray & oromia grupos étnicos ameaçam separar & arrastar a Etiópia para uma guerra civil cara. Pode a Etiópia continuar a prosperar apesar da tensão?"
  EGY_FLAVOR_TEXT:0 "Egito é experimentar um boom populacional em meio a uma extrema escassez de água, e um governo tradicional falhando. Egípcios estão deixando em massa para melhores terras e o Nilo está lentamente secando. Pode o Egito encontrar uma maneira de navegar pela crise?"
  KYA_FLAVOR_TEXT:0 "O Quénia é uma nação africana estruturalmente sã no meio de esforços bem sucedidos de modernização e de rápida melhoria dos padrões de vida. Embora o Quénia possa não ter problemas graves, os seus vizinhos não têm tanta sorte. Há conversações para formar um Superpoder da África Oriental dentro da esfera política. Será que o Quênia estabelecerá com sucesso as bases para formar uma superpotência africana? Ou o tumulto dentro de seus vizinhos afetará suas próprias terras."
  MOR_FLAVOR_TEXT:0 "Marrocos emergiu no século XXI forte e orgulhoso após sua inteligente subjugação da república sarauí, e suas principais melhorias para sua disparidade econômica. Procura agora a parceria das potências europeias para promover a sua mobilidade económica e tornar-se um grande actor no continente africano. As ambições de Marrocos serão alcançadas?"
  GHA_FLAVOR_TEXT:0 "Após uma brutal junta militar na década de 80, a situação econômica de Gana começou a desmoronar-se maciçamente. No entanto, desde o regresso dos partidos políticos e das eleições, o país regressou a um período de estabilidade e prosperidade económica, e prevê-se que continue a fazê-lo. No entanto, a crise climática e a desertificação do sahel ameaçam mais uma vez a instabilidade. Gana pode navegar com sucesso nestas condições?"
  
  # South Asia
  VNM_FLAVOR_TEXT:0 "O Vietname é uma nação de relativa estabilidade desde a sua descolonização. Sendo uma das poucas economias de mercado de esquerda tem suas vantagens, e enquanto os cidadãos suportam relativa paz, os turistas estão dominando o país. Escolhas cuidadosas e geopolítica inteligente pode permitir-lhe ter sucesso extremamente bem no século 21. No entanto, fará essas escolhas?"
  IDA_FLAVOR_TEXT:0 "A Índia não só sobreviveu, mas prosperou desde a dissolução do raj britânico e o fim de 400 anos de domínio colonial. No entanto, alguns traumas pós-coloniais com a separação de Myanmar, Bangladesh e Paquistão têm sido uma cicatriz em um registro decente. As tensões crescentes entre a Índia e o Paquistão sobre as terras de Jammu e Caxemira são, no entanto, uma das principais causas de preocupação, e as tensões crescentes com a RPC sobre Arunchal Pradesh estão a pôr em jogo o conflito armado. Poderá a Índia resistir com êxito a mais 100 anos de imperialismo?"
  PAK_FLAVOR_TEXT:0 "Paquistão separado do Raj nos anos 40 e 50 sobre as tensões religiosas entre hindus e muçulmanos. Enquanto muitos acreditam que o conflito tem um fim à vista, no entanto, entre os vários grupos étnicos do conflito Paquistão está se formando. Um movimento errado e pode haver um colapso do Estado, e com tensões tanto com a Índia quanto com o Afeganistão em sua altura, o Paquistão pode navegar por esses problemas?"
  
  # South and Central America
  ARG_FLAVOR_TEXT:0 "A Argentina é uma nação que, após ter experimentado um século 20 de sucesso sério, vacilou devido à intervenção dos EUA e a um conflito fracassado sobre Las Malvinas. As disputas entre os nativos Mapuche, os estados argentinos e o governo em Buenos Aires bloquearam muitas mudanças. A Argentina pode reclinar as fileiras e trazer seu país de volta à glória?"
  
  # Nonsense Countries
  GLI_FLAVOR_TEXT:2 "A Galiza é um país pequeno e pouco notável povoado por entusiastas da catedral. A Galiza recuperará a sua glória passada?"
  GENERIC_FLAVOR_TEXT:0 "The 21st Century is a time of relative peace & prosperity, however exploitation by the wealthy, waning standards of living and global communication have brought with it a resurgence in political activism and societal shifts like none ever seen. What will this new wave of political expression bring?
  REV_GENERIC_FLAVOR_TEXT:1 "Insatisfeitos com a direção que o chamado governo organizado estava tomando, esses revolucionários decidiram tomar armas para derrubá-lo. Será que conseguirão aproveitar o poder ou serão esmagados como tantas revoluções esquecidas do passado?"
  DECENTRALIZED_FLAVOR_TEXT:0 "Invadido por poderes mais organizados, este país luta para manter a sua autonomia. Será que verão o alvorecer de um novo século, ou o seu nome sobreviverá apenas nos livros de história?"
