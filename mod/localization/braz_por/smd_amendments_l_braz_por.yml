l_braz_por:

 # ==========================================
 # UNITED STATES
 # ==========================================

 amendment_medicaid: "Medicaid"
 amendment_medicaid_desc: "Seguros de saúde federais e estaduais para americanos de baixa renda, idosos e deficientes. A Medicaid preenche a lacuna deixada pelos mercados privados — abrangendo aqueles que não podem pagar prémios e aqueles cujas condições os tornam inseguras. O programa é caro e politicamente contestado, mas os seus efeitos de redução da mortalidade são mensuráveis e reais."

 amendment_affordable_care_act: "Ato de Cuidado Acessível"
 amendment_affordable_care_act_desc: "O Affordable Care Act — conhecido informalmente como Obamacare — determina que todos os cidadãos têm seguro de saúde, cria mercados regulamentados para cobertura privada e amplia a elegibilidade do Medicaid. Os segurados não podem negar a cobertura de condições pré-existentes. O mandato individual é profundamente controverso. Os apoiadores argumentam que é a única maneira de fazer os mercados de seguros funcionar. Os opositores chamam-lhe excesso de alcance do governo em decisões económicas privadas."

 amendment_federal_assault_weapons_ban: "Proibição Federal de Armas de Agressão"
 amendment_federal_assault_weapons_ban_desc: "Uma proibição federal de dez anos sobre o fabrico de armas semi-automáticas especificadas e revistas de alta capacidade para venda civil. A proibição é contestada — a sua eficácia contestada pelos opositores, a sua necessidade defendida pelos apoiantes. Ele expira após uma década, a menos que renovado. A coligação política que a passou é frágil, e o lobby de armas já está preparando sua resposta."

 amendment_authorization_military_force: "Autorização para o uso da força militar"
 amendment_authorization_military_force_desc: "A Autorização de Uso da Força Militar concede ao executivo autoridade para usar a força militar contra os responsáveis por ataques terroristas em [ROOT.GetCountry.GetName], e aqueles que os abrigaram. A linguagem é deliberadamente ampla. Estudiosos legais passarão décadas discutindo sobre seus limites — ou se eles têm algum. Na prática, reduz o custo diplomático da ação militar unilateral e amplia o alcance de [ROOT.GetCountry.GetName] na arena internacional."

 amendment_patriot_act: "A Lei PATRIOT"
 amendment_patriot_act_desc: "A Lei do Terrorismo Interceptado e Obstruído – conhecida como Lei PACRIOT – amplia drasticamente as autoridades de vigilância doméstica. A aplicação da lei pode monitorar comunicações, rastrear transações financeiras e compartilhar informações entre agências com menos verificações judiciais do que antes. Turmoil e pressão revolucionária caem. Os defensores das liberdades civis descrevem-na como a erosão mais significativa da privacidade constitucional na história de [ROOT.GetCountry.GetName]."

 amendment_crime_bill_1994: "Controlo de Crimes Violentos e Lei de Aplicação da Lei"
 amendment_crime_bill_1994_desc: "A Lei do Crime de 1994 é a maior legislação do crime na história de [ROOT.GetCountry.GetName]. Ele financia dezenas de milhares de novos policiais, amplia o sistema prisional federal, introduz penas mínimas obrigatórias para uma série de delitos, e cria a Lei de Violência contra as Mulheres como cavaleiro. O Turmoil cai. As comunidades mais fortemente policiadas sob ela terão uma visão diferente de seu legado."

 # ==========================================
 # CHINA
 # ==========================================

 amendment_china_tax_reform_1994: "Reforma do sistema de partilha de impostos"
 amendment_china_tax_reform_1994_desc: "A reforma fiscal de 1994 substituiu o sistema fiscal baseado nas empresas — no qual os governos locais negociaram acordos de partilha de receitas com Pequim — por um imposto nacional sobre o valor acrescentado e uma fórmula formal de repartição de receitas. A reforma centralizou dramaticamente o poder fiscal. Pequim ganhou um fluxo de receita confiável e crescente. Os governos locais perderam a discrição, mas ganharam clareza. É a base da arquitetura fiscal moderna de [ROOT.GetCountry.GetName]."

 amendment_one_child_policy: "Política para uma criança"
 amendment_one_child_policy_desc: "O Estado impõe o limite de uma criança por família através de uma combinação de incentivos financeiros, pressão social e, em alguns casos, intervenção coercitiva. A taxa de natalidade cai acentuadamente. Nas décadas seguintes, [ROOT.GetCountry.GetName] envelhecerá rapidamente, e a força de trabalho contratará. A política é aplicada mais estritamente nas áreas urbanas e mais desigualmente nas rurais. A comunidade internacional e os críticos nacionais se opõem aos seus métodos."

 amendment_socialist_market_economy: "Economia de Mercado Socialista"
 amendment_socialist_market_economy_desc: "A economia de mercado socialista é o referencial teórico sob o qual [ROOT.GetCountry.GetName] opera mecanismos de mercado, enquanto o Partido mantém a direção econômica e política final. A empresa privada é permitida e incentivada dentro dos limites estabelecidos pelo Estado. O investimento estrangeiro é saudado selectivamente. As contradições são reais e deliberadas — o quadro destina-se a aproveitar a eficiência do mercado sem ceder o controlo das partes. Funciona, à sua maneira."

 # ==========================================
 # FRANCE
 # ==========================================

 amendment_35_hour_work_week: "Semana de trabalho de 35 horas"
 amendment_35_hour_work_week_desc: "As Leis de Aubry exigem uma semana de trabalho legal de 35 horas para a maioria dos funcionários, reduzindo as horas padrão de 39. A política é apresentada como uma forma de compartilhar o trabalho mais amplamente em toda a população — menos horas por trabalhador, mais trabalhadores empregados. Os sindicatos celebram. Os empregadores argumentam que aumenta os custos e reduz a flexibilidade. O debate sobre se aumenta efectivamente o emprego ou apenas redistribui o trabalho existente não será resolvido rapidamente."

 amendment_pasqua_law: "Lei Pasqua"
 amendment_pasqua_law_desc: "A Lei Pasqua reforça significativamente os regulamentos de imigração — requisitos de naturalização mais rigorosos, redução dos direitos de reagrupamento familiar, ampliação dos motivos de deportação e novas restrições ao direito de permanecer para aqueles que entraram ilegalmente. O ministro do Interior, Charles Pasqua, enquadra-o como uma questão de ordem nacional e coerência cultural. Os críticos argumentam que é um retrocesso deliberado da tradição de asilo e inclusão de [ROOT.GetCountry.GetName]. A lei passa com apoio público significativo e protestos significativos."

 amendment_medicaid_modifier: "Medicaid"
 amendment_medicaid_modifier_desc: "O seguro de saúde federal abrange cidadãos de baixa renda. A mortalidade é reduzida, principalmente entre os estratos mais pobres."

 amendment_affordable_care_act_modifier: "Obamacare"
 amendment_affordable_care_act_modifier_desc: "Cobriu a saúde privada com subsídios e proteções pré-existentes. A mortalidade cai modestamente; os custos aumentam para os empregadores de renda média e para o estado."

 amendment_federal_assault_weapons_ban_modifier: "Proibição Federal de Armas de Agressão"
 amendment_federal_assault_weapons_ban_modifier_desc: "É proibida a fabricação e venda civil de armas semiautomáticas especificadas. A radicalização é marginalmente reduzida."

 amendment_authorization_military_force_modifier: "Autorização para o uso da força militar"
 amendment_authorization_military_force_modifier_desc: "A ampla autoridade executiva para usar a força militar contra atores não estatais reduz o custo diplomático da intervenção e amplia os interesses declarados de [ROOT.GetCountry.GetName]."

 amendment_patriot_act_modifier: "A Lei PATRIOT"
 amendment_patriot_act_modifier_desc: "Autoridades de vigilância doméstica ampliadas estão suprimindo tumulto e atividade revolucionária. A legitimidade e a reputação diplomática tiveram um golpe modesto."

 amendment_crime_bill_1994_modifier: "Projeto de lei do crime de 1994"
 amendment_crime_bill_1994_modifier_desc: "Policiamento expandido e mínimos obrigatórios estão reduzindo a turbulência. A mortalidade por execução aumentou modestamente. O orçamento está sob pressão."

 amendment_china_tax_reform_1994_modifier: "Reforma do sistema de partilha de impostos"
 amendment_china_tax_reform_1994_modifier_desc: "Um sistema centralizado de imposto sobre o valor acrescentado está a melhorar as receitas fiscais e a reduzir os resíduos. A autoridade está ligeiramente melhorada."

 amendment_one_child_policy_modifier: "Política para uma criança"
 amendment_one_child_policy_modifier_desc: "Os limites de natalidade aplicados pelo Estado reduziram drasticamente a taxa de natalidade. [ROOT.GetCountry.GetName] a população envelhecerá significativamente nas décadas seguintes."

 amendment_socialist_market_economy_modifier: "Economia de Mercado Socialista"
 amendment_socialist_market_economy_modifier_desc: "Os mecanismos de mercado que operam sob a direção do partido estão impulsionando a construção privada, melhorando o rendimento e expandindo o investimento industrial. O apoio do movimento comunista é modestamente reduzido."

 amendment_35_hour_work_week_modifier: "Semana de trabalho de 35 horas"
 amendment_35_hour_work_week_modifier_desc: "Os limites legais do horário de trabalho melhoraram significativamente as condições de trabalho. O rendimento é marginalmente reduzido. Os sindicatos estão satisfeitos; os empregadores não."

 amendment_pasqua_law_modifier: "Lei Pasqua"
 amendment_pasqua_law_modifier_desc: "Os requisitos mais rigorosos em matéria de imigração aumentaram as restrições e reduziram o esforço de migração. A aceitação cultural das populações não-domésticas diminuiu."
