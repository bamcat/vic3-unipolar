l_braz_por:

 je_national_development: "Caminho Nacional para o Desenvolvimento"
 je_national_development_reason: "Cada nação deve escolher onde focar suas energias. Um plano de desenvolvimento nacional concentra recursos, políticas e vontade política por trás de uma visão estratégica única por dez anos. Escolha sabiamente — a escolha não pode ser revertida até que o programa termine."

 je_foreign_investment: "Investimento estrangeiro"
 je_foreign_investment_reason: "Atrair capital de grandes poderes pode acelerar o desenvolvimento para além do que os recursos internos permitem. Um tratado de investimento estrangeiro abriria o país a empresas externas — com todas as oportunidades e dependências que isso implica."
 has_foreign_investment_or_trade_agreement_with_west_tt:0 "Assinar um acordo de investimento e comércio estrangeiros com os Estados Unidos, Reino Unido ou França"
 
 ndp_status_industrial_tt: "A expansão industrial está em curso. O país está direcionando recursos para a construção de sua base industrial e industrial pesada."
 ndp_status_military_tt: "A expansão militar está em andamento. O país está investindo em suas indústrias armadas, doutrina e defesa."
 ndp_status_resource_tt: "Recursos Desenvolvimento da economia está em andamento. O país está focado na agricultura e extração de matéria-prima."
 ndp_status_service_tt: "O desenvolvimento da economia de serviços está em curso. O país está construindo seu setor financeiro, educação e capacidade estatal."
 ndp_status_none_tt: "Nenhum caminho de desenvolvimento está ativo atualmente. Selecione um caminho para iniciar um programa nacional de desenvolvimento de dez anos."

 fi_status_seeking_tt: "O país procura um acordo de investimento estrangeiro com uma grande potência. Assine um tratado de investimento para completar esta entrada no periódico."
 fi_status_secured_tt: "Foi assegurado um acordo de investimento estrangeiro. O capital estrangeiro está a entrar."

 ndp_button_industrial_name: "Expansão Industrial"
 ndp_button_industrial_desc: "Concentre os recursos nacionais na construção da base de produção. Aumenta a indústria pesada, fabricação leve e construção. Sub-escolha no Ano 2: indústria pesada vs fabricação leve."

 ndp_button_military_name: "Expansão Militar"
 ndp_button_military_desc: "Priorize as forças armadas. Aumenta o exército e a marinha, a pesquisa militar e a produção de armas. Sub-escolha no Ano 2: doutrina terra vs construção naval."

 ndp_button_resource_name: "Economia de recursos"
 ndp_button_resource_desc: "Construir a economia em torno da terra. Aumenta as indústrias agrícolas e extractivas. Sub-escolha no ano 2: agricultura vs extração de matéria-prima."

 ndp_button_service_name: "Economia de serviços"
 ndp_button_service_desc: "Desenvolver a capacidade estatal, a educação e o setor financeiro. Aumenta a burocracia, a velocidade da pesquisa e o investimento. Sub-escolha no Ano 2: sector financeiro vs educação e burocracia."

 ndp_button_abandon_name: "Abandonar o Caminho"
 ndp_button_abandon_desc: "Abandonar o actual programa de desenvolvimento. Todos os modificadores ativos de caminho serão removidos, e uma penalidade de prestígio e legitimidade será aplicada por dois anos. Você pode então selecionar um novo caminho."

 fi_button_reject_name: "Rejeitar investimento estrangeiro"
 fi_button_reject_desc: "Feche a porta para o capital estrangeiro. Isto acabará com a entrada na revista e aplicará uma pena de investimento de longo prazo, mas preservará a independência econômica e impulsionará a autoridade."

